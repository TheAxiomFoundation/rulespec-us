format: rulespec/v1
module:
  status: deferred
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nm/statute/7-2-5.8
  summary: |-
    An individual may claim an exemption not exceeding federal exemptions multiplied by $2,500 of income includable in net income. Separate-return, single, and joint/surviving-spouse/head-of-household branches use stated AGI thresholds and phaseout rates.
  deferred_outputs:
    - output: us-nm:statutes/7-2-5/8#new_mexico_personal_exemption
      reason: The exemption formula depends on filing-status classifications and federal exemptions; the prompt supplies no importable upstream RuleSpec output for US tax filing status, and local filing-status facts are prohibited.
      source_values:
        - us-nm:statutes/7-2-5/8#exemption_amount_per_federal_exemption
        - us-nm:statutes/7-2-5/8#separate_return_full_exemption_agi_limit
        - us-nm:statutes/7-2-5/8#separate_return_phaseout_agi_limit
        - us-nm:statutes/7-2-5/8#separate_return_phaseout_rate
        - us-nm:statutes/7-2-5/8#single_full_exemption_agi_limit
        - us-nm:statutes/7-2-5/8#single_phaseout_agi_limit
        - us-nm:statutes/7-2-5/8#single_phaseout_rate
        - us-nm:statutes/7-2-5/8#joint_surviving_spouse_head_full_exemption_agi_limit
        - us-nm:statutes/7-2-5/8#joint_surviving_spouse_head_phaseout_agi_limit
        - us-nm:statutes/7-2-5/8#joint_surviving_spouse_head_phaseout_rate
rules:
  - name: exemption_amount_per_federal_exemption
    kind: parameter
    dtype: Money
    unit: USD
    source: N.M. Stat. § 7-2-5.8(A)-(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nm/statute/7-2-5.8
              excerpt: "two thousand five hundred dollars ($2,500) for each federal exemption"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          2500
  - name: separate_return_full_exemption_agi_limit
    kind: parameter
    dtype: Money
    unit: USD
    source: N.M. Stat. § 7-2-5.8(B)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nm/statute/7-2-5.8
              excerpt: "adjusted gross income is not over fifteen thousand dollars ($15,000)"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          15000
  - name: separate_return_phaseout_agi_limit
    kind: parameter
    dtype: Money
    unit: USD
    source: N.M. Stat. § 7-2-5.8(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nm/statute/7-2-5.8
              excerpt: "adjusted gross income up to twenty-seven thousand five hundred dollars ($27,500)"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          27500
  - name: separate_return_phaseout_rate
    kind: parameter
    dtype: Rate
    source: N.M. Stat. § 7-2-5.8(B)(2)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nm/statute/7-2-5.8
              excerpt: "twenty percent of the amount obtained by subtracting fifteen thousand dollars ($15,000)"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.20
