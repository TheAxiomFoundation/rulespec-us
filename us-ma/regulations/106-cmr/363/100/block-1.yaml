format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/363/100/block-1
  summary: |-
    Assets are items of value that may be converted into cash. All of the
    household's assets shall be counted in determining eligibility unless
    specifically exempted by 106 CMR 363.140. Liquid assets include, but are
    not limited to, cash on hand, bank deposits, securities, lump sum payments,
    IRAs, and certain Keogh plans. Nonliquid assets are those that are not
    readily convertible to cash. The countable value of a nonliquid asset shall
    be its equity value which is determined by fair market value less any
    encumbrances.
rules:
  - name: nonliquid_asset_countable_equity_value
    kind: derived
    entity: Asset
    dtype: Money
    period: Month
    unit: USD
    source: 106 CMR 363.100 - "The countable value of a nonliquid asset shall be its equity value which is determined by fair market value less any encumbrances."
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/363/100/block-1
              excerpt: "The countable value of a nonliquid asset shall be its equity value which is determined by fair market value less any encumbrances."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if asset_is_nonliquid: max(0, asset_fair_market_value - asset_encumbrances) else: 0
  - name: asset_is_counted_in_eligibility
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: 106 CMR 363.100 - "All of the household's assets shall be counted in determining eligibility unless specifically exempted by 106 CMR 363.140."
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/363/100/block-1
              excerpt: "All of the household's assets shall be counted in determining eligibility unless specifically exempted by 106 CMR 363.140."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_belongs_to_household
          and not asset_is_exempt_under_363_140
