format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/363/220/block-1
  summary: |-
    Support and alimony payments of up to $50 per month received as a TAFDC-Related Benefit by a household with a TAFDC client.
rules:
  - name: tafdc_related_support_alimony_unearned_income_cap
    kind: parameter
    dtype: Money
    unit: USD
    source: 106 CMR 363.220
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/363/220/block-1
              excerpt: "Support and alimony payments of up to $50 per month"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          50
  - name: tafdc_related_support_alimony_unearned_income
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 106 CMR 363.220
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/363/220/block-1
              excerpt: "Support and alimony payments of up to $50 per month received as a TAFDC-Related Benefit by a household with a TAFDC client"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if household_has_tafdc_client and household_receives_support_alimony_as_tafdc_related_benefit: min(household_support_alimony_received_amount, tafdc_related_support_alimony_unearned_income_cap) else: 0
