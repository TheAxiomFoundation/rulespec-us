format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/363/200/block-1
  summary: |-
    All income to the household, from whatever source, that is anticipated to be received during the period of certification shall be counted when determining a household's eligibility and benefit level except when specifically excluded below. Categorically eligible households, in accordance with 106 CMR 365.180, do not need to meet gross or net income eligibility standards.
rules:
  - name: household_must_meet_income_eligibility_standards
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 363.200
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/363/200/block-1
              excerpt: |-
                Categorically eligible households, in accordance with 106 CMR 365.180 : Categorically Eligible Assistance Units , do not need to meet gross or net income eligibility standards.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not household_is_categorically_eligible
