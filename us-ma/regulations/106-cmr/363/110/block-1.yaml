format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/363/110/block-1
  summary: |-
    The asset eligibility limits in 106 CMR 363.110 do not apply to categorically eligible households as defined in 106 CMR 365.180. These asset eligibility limits, however, shall be applied to any household with a member disqualified from receiving SNAP benefits due to failing to comply with the SNAP Work Program; or for any of the reasons listed in 106 CMR 367.800. Non-SSI elder and/or disabled households with income above the Categorical Eligibility Gross Income standards at 106 CMR 364.976 shall also be subject to asset limits. The household shall report all assets owned or anticipated to be received within the certification period. The equity value of all countable assets will be used to determine if the household is within asset eligibility limits.
rules:
  - name: household_subject_to_asset_limits
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 363.110
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/363/110/block-1
              excerpt: "asset eligibility limits ... do not apply to categorically eligible households ... shall be applied to any household with a member disqualified ... Non-SSI elder and/or disabled households with income above the Categorical Eligibility Gross Income standards ... shall also be subject to asset limits"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_has_member_disqualified_for_snap_work_program_noncompliance
          or household_has_member_disqualified_under_106_cmr_367_800
          or (
            household_is_non_ssi_elder_or_disabled
            and household_income_above_categorical_eligibility_gross_income_standards
          )
          or (
            not household_is_categorically_eligible_under_106_cmr_365_180
            and not household_has_member_disqualified_for_snap_work_program_noncompliance
            and not household_has_member_disqualified_under_106_cmr_367_800
            and not (
              household_is_non_ssi_elder_or_disabled
              and not household_income_above_categorical_eligibility_gross_income_standards
            )
          )
