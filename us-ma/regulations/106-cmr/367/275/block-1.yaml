format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/367/275/block-1
  summary: |-
    If a household requests a fair hearing within the period provided in 106 CMR 343.250 and its certification period has not expired, the household's participation in the program shall continue on the basis authorized immediately before the Notice of Adverse Action unless the household specifically waives continuation of benefits. When benefits are reduced or terminated due to a mass change, participation at the prior level shall be reinstated only if the issue being contested is that SNAP eligibility or benefits were improperly calculated or that federal law or regulations are being misapplied or misinterpreted by the Department.
rules:
  - name: continuation_of_benefits_pending_appeal_applies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 367.275
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/367/275/block-1
              excerpt: "the household's participation in the program shall continue on the basis authorized immediately before the Notice of Adverse Action unless the household specifically waives continuation of benefits"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_requested_fair_hearing_within_period
          and not household_certification_period_has_expired
          and not household_specifically_waived_continuation_of_benefits
  - name: benefits_reinstated_to_prior_level_for_untimely_request
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 367.275
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/367/275/block-1
              excerpt: "if the household establishes that its failure to make a timely request was for good cause, as defined by 106 CMR 343.320(D)(1) and (2), the Department shall reinstate the benefits to the prior level until a decision is made"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not household_requested_fair_hearing_within_period
          and household_established_good_cause_for_untimely_request
  - name: mass_change_prior_level_reinstatement_applies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 367.275
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/367/275/block-1
              excerpt: "When benefits are reduced or terminated due to a mass change, participation at the prior level shall be reinstated only if the issue being contested is that SNAP eligibility or benefits were improperly calculated or that federal law or regulations are being misapplied or misinterpreted by the Department."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          benefits_reduced_or_terminated_due_to_mass_change
          and (contested_issue_is_improper_calculation
               or contested_issue_is_misapplication_of_federal_law)
