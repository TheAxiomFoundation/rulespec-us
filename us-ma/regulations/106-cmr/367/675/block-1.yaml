  summary: |-
    The Department shall provide advance notice of an ADH in accordance with 106 CMR 367.625. No notice shall be sent and no ADH shall be held unless it is determined that the client received the penalty warning in the appropriate language prior to the date of the suspected IPV. This notice shall be sent by First Class Mail.
