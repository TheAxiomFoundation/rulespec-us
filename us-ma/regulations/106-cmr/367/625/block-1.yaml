format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/367/625/block-1
  summary: |-
    The Department shall provide written notice to the household member suspected of an IPV at least 30 days in advance of the hearing. The household member or representative is entitled to one postponement of up to 30 days provided the request for postponement is made at least ten days in advance of the hearing. Within 90 days of the date the household member is notified, the Division of Hearings shall conduct the hearing and the hearing official shall render a written decision. If the hearing is postponed, the 90-day time limit shall be extended for as many days as the hearing is postponed.
rules:
  - name: ipv_hearing_advance_notice_days
    kind: parameter
    dtype: Integer
    source: 106 CMR 367.625 - advance notice of hearing
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/367/625/block-1
              excerpt: "at least 30 days in advance of the hearing"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30
  - name: ipv_hearing_maximum_postponement_days
    kind: parameter
    dtype: Integer
    source: 106 CMR 367.625 - postponement of up to 30 days
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/367/625/block-1
              excerpt: "one postponement of up to 30 days"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30
  - name: ipv_hearing_postponement_request_advance_days
    kind: parameter
    dtype: Integer
    source: 106 CMR 367.625 - postponement request advance days
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/367/625/block-1
              excerpt: "request for postponement is made at least ten days in advance of the hearing"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10
  - name: ipv_hearing_decision_time_limit_days
    kind: parameter
    dtype: Integer
    source: 106 CMR 367.625 - 90-day hearing/decision time limit
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/367/625/block-1
              excerpt: "Within 90 days of the date the household member is notified"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          90
  - name: ipv_hearing_advance_notice_satisfied
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: 106 CMR 367.625 - written notice at least 30 days in advance
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/367/625/block-1
              excerpt: "written notice to the household member suspected of an IPV at least 30 days in advance of the hearing"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_member_received_written_ipv_hearing_notice
          and days_between_notice_and_hearing >= ipv_hearing_advance_notice_days
  - name: ipv_hearing_postponement_request_timely
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: 106 CMR 367.625 - postponement request timeliness
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/367/625/block-1
              excerpt: "provided the request for postponement is made at least ten days in advance of the hearing"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_member_requested_ipv_hearing_postponement
          and days_between_postponement_request_and_hearing >= ipv_hearing_postponement_request_advance_days
  - name: ipv_hearing_postponement_entitlement
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: 106 CMR 367.625 - entitlement to one postponement of up to 30 days
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/367/625/block-1
              excerpt: "household member or representative is entitled to one postponement of up to 30 days provided the request for postponement is made at least ten days in advance of the hearing"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          ipv_hearing_postponement_request_timely
          and prior_ipv_hearing_postponements_granted_count == 0
          and requested_ipv_hearing_postponement_days <= ipv_hearing_maximum_postponement_days
  - name: ipv_hearing_decision_deadline_days
    kind: derived
    entity: Person
    dtype: Integer
    period: Day
    source: 106 CMR 367.625 - 90-day limit extended by postponement days
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/367/625/block-1
              excerpt: "If the hearing is postponed, the 90-day time limit shall be extended for as many days as the hearing is postponed"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          ipv_hearing_decision_time_limit_days + ipv_hearing_postponement_days_granted
  - name: ipv_hearing_decision_timely
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: 106 CMR 367.625 - hearing held and decision rendered within deadline
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/367/625/block-1
              excerpt: "Within 90 days of the date the household member is notified, the Division of Hearings shall conduct the hearing and the hearing official shall render a written decision"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          ipv_hearing_held_and_written_decision_rendered
          and days_between_notice_and_written_decision <= ipv_hearing_decision_deadline_days
