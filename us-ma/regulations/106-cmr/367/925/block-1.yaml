format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/367/925/block-1
  summary: |-
    If the court finds the member guilty of an IPV, a written notice of the decision shall be sent to the client before the period of disqualification, whenever possible, in accordance with 106 CMR 367.825(B) and (C). Disqualification shall begin within 45 days of the court order, unless such time frame is contrary to the court order.
rules:
  - name: disqualification_start_max_days_after_court_order
    kind: parameter
    dtype: Integer
    source: 106 CMR 367.925
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/367/925/block-1
              excerpt: "Disqualification shall begin within 45 days of the court order"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          45
  - name: ipv_disqualification_start_compliant
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: 106 CMR 367.925
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/367/925/block-1
              excerpt: "Disqualification shall begin within 45 days of the court order, unless such time frame is contrary to the court order."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          disqualification_starts_within_max_days_of_court_order
          or court_order_specifies_different_time_frame
