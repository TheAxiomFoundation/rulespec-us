format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/367/950/block-1
  summary: |-
    In cases where an IPV decision is overturned or reversed by a court of appropriate jurisdiction, the Department shall reinstate the individual in the program if the household is eligible. The Department shall restore any benefits that were lost as a result of the disqualification.
rules:
  - name: individual_reinstated_in_program
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 106 CMR 367.950
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/367/950/block-1
              excerpt: "the Department shall reinstate the individual in the program if the household is eligible"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          ipv_decision_overturned_or_reversed_by_court
          and household_is_eligible
  - name: benefits_lost_due_to_disqualification_restored
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 106 CMR 367.950
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/367/950/block-1
              excerpt: "The Department shall restore any benefits that were lost as a result of the disqualification."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          ipv_decision_overturned_or_reversed_by_court
