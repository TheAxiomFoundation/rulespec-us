format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/367/125/block-1
  summary: |-
    A request for a hearing is defined as a clear expression, oral or written, by the household or its representative to the effect that it wishes to appeal a decision or that an opportunity to present its case to a higher authority is desired. The freedom to make a request for a hearing shall not be limited or interfered with in any way.
rules:
  - name: request_for_hearing
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 106 CMR 367.125
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/367/125/block-1
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_or_representative_made_clear_expression
          and (household_wishes_to_appeal_decision
          or household_desires_opportunity_to_present_case_to_higher_authority)
