format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/367/100/block-1
  summary: |-
    A household shall be allowed to request a hearing on any action by the Department, or on loss of benefits which occurred in the prior 90 days. Action by the Department includes a denial of a request for restoration of benefits lost more than 90 days but less than one year prior to the request. A household may also request a fair hearing within a certification period to dispute its current benefit level.
rules:
  - name: prior_loss_hearing_request_window_days
    kind: parameter
    dtype: Count
    source: 106 CMR 367.100, block 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/367/100/block-1
              excerpt: "loss of benefits which occurred in the prior 90 days"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          90

  - name: restoration_denial_prior_loss_lower_bound_days
    kind: parameter
    dtype: Count
    source: 106 CMR 367.100, block 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/367/100/block-1
              excerpt: "benefits lost more than 90 days"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          90

  - name: restoration_denial_prior_loss_upper_bound_years
    kind: parameter
    dtype: Count
    source: 106 CMR 367.100, block 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/367/100/block-1
              excerpt: "less than one year prior to the request"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1

  - name: restoration_denial_included_as_department_action
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 106 CMR 367.100, block 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/367/100/block-1
              excerpt: "Action by the Department includes a denial of a request for restoration of any benefits lost more than 90 days but less than one year prior to the request."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          department_denied_request_for_restoration_of_benefits
          and days_between_benefit_loss_and_restoration_request > restoration_denial_prior_loss_lower_bound_days
          and years_between_benefit_loss_and_restoration_request < restoration_denial_prior_loss_upper_bound_years

  - name: department_action_for_hearing_request
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 106 CMR 367.100, block 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/367/100/block-1
              excerpt: "any action by the Department"
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/367/100/block-1
              excerpt: "Action by the Department includes a denial of a request for restoration"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          department_took_action
          or restoration_denial_included_as_department_action

  - name: household_allowed_to_request_fair_hearing
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 106 CMR 367.100, block 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/367/100/block-1
              excerpt: "allowed to request a hearing on any action by the Department, or on loss of benefits which occurred in the prior 90 days"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/367/100/block-1
              excerpt: "at any time within a certification period a household may request a fair hearing to dispute its current level of benefits"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          department_action_for_hearing_request
          or (household_lost_benefits and days_between_benefit_loss_and_hearing_request <= prior_loss_hearing_request_window_days)
          or (household_is_within_certification_period and hearing_request_disputes_current_level_of_benefits)
