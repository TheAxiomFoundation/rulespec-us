format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/367/200/block-1
  summary: |-
    The household may request, and is entitled to receive, a postponement of the scheduled hearing. The postponement shall not exceed 30 days and the time limit for action on the decision (as provided in 106 CMR 367.450) may be extended for as many days as the hearing is postponed.
rules:
  - name: maximum_hearing_postponement_days
    kind: parameter
    dtype: Integer
    source: 106 CMR 367.200
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/367/200/block-1
              excerpt: "The postponement shall not exceed 30 days"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30
  - name: hearing_decision_time_limit_extension_days
    kind: derived
    entity: Household
    dtype: Integer
    period: Day
    source: 106 CMR 367.200
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/367/200/block-1
              excerpt: "the time limit for action on the decision ... may be extended for as many days as the hearing is postponed"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          min(max(0, hearing_postponement_days_requested), maximum_hearing_postponement_days)
