  summary: |-
    To determine the amount of any overissuance claim, the Department may combine a fair hearing and an ADH if the factual issues arise out of the same or related circumstances. The household member shall receive prior notice that the hearings will be consolidated and that the claim amount shall be determined as a result. The member shall also be informed that due to the consolidation, he or she shall not have the right to a subsequent fair hearing to dispute the claim amount. The timeliness standards of 106 CMR 367.625 shall be in effect.
