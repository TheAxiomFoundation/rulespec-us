format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/367/700/block-1
  summary: |-
    The time and place of the ADH shall be accessible to the household member suspected of an IPV. If the household member or his or her representative fails to appear at the hearings without good cause, the hearing shall be conducted... The household member has ten days from the date of the scheduled hearing to present reasons indicating good cause for failure to appear.
rules:
  - name: good_cause_presentation_period_days
    kind: parameter
    dtype: Integer
    source: 106 CMR 367.700
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/367/700/block-1
              excerpt: "ten days from the date of the scheduled hearing to present reasons indicating good cause for failure to appear"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10
  - name: adh_conducted_without_household_member
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: 106 CMR 367.700
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/367/700/block-1
              excerpt: "If the household member or his or her representative fails to appear at the hearings without good cause, the hearing shall be conducted"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_member_or_representative_failed_to_appear
          and not good_cause_for_failure_to_appear
  - name: ipv_determined_by_clear_and_convincing_evidence
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: 106 CMR 367.700
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/367/700/block-1
              excerpt: "the hearing official is required to carefully consider the evidence and determine if an IPV was committed based on clear and convincing evidence"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          adh_conducted_without_household_member
          and hearing_official_finds_ipv_by_clear_and_convincing_evidence
  - name: previous_ipv_decision_invalidated
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: 106 CMR 367.700
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/367/700/block-1
              excerpt: "If the household member is found to have committed an IPV but the Director of the Division of Hearings for the Department later determines that the household member or representative failed to appear with good cause, in accordance with 106 CMR 343.320(D), the previous decision shall no longer be valid and the Department shall conduct a new hearing."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_member_found_to_have_committed_ipv
          and director_determines_failure_to_appear_with_good_cause
  - name: new_hearing_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: 106 CMR 367.700
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/367/700/block-1
              excerpt: "the previous decision shall no longer be valid and the Department shall conduct a new hearing"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          previous_ipv_decision_invalidated
  - name: good_cause_presentation_timely
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: 106 CMR 367.700
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/367/700/block-1
              excerpt: "The household member has ten days from the date of the scheduled hearing to present reasons indicating good cause for failure to appear."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          days_since_scheduled_hearing <= good_cause_presentation_period_days
