format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/367/495/block-1
  summary: |-
    An overissuance claim of an unintentional program violation may be
    established due to either an inadvertent household error or an agency error
    that occurred no more than six years prior to the month in which the
    overissuance was discovered. If the Department did not act timely on a
    reported change, in no event shall the Department determine the month the
    change would have been made effective to be more than two months from the
    month in which the change occurred. The repayment agreement shall state
    that failure to return a completed and signed copy of the agreement within
    20 days shall result in automatic benefit reduction.
rules:
  - name: unintentional_claim_max_lookback_years
    kind: parameter
    dtype: Integer
    source: 106 CMR 367.495
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/367/495/block-1
              excerpt: "occurred no more than six years prior to the month in which the overissuance was discovered"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          6
  - name: agency_error_max_effective_lookback_months
    kind: parameter
    dtype: Integer
    source: 106 CMR 367.495
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/367/495/block-1
              excerpt: "In no event shall the Department determine the month the change would have been made effective to be more than two months from the month in which the change occurred"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          2
  - name: repayment_agreement_response_days
    kind: parameter
    dtype: Integer
    source: 106 CMR 367.495
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/367/495/block-1
              excerpt: "failure to return a completed and signed copy of the agreement within 20 days shall result in automatic benefit reduction"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          20
  - name: unintentional_claim_within_lookback
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 367.495
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/367/495/block-1
              excerpt: "occurred no more than six years prior to the month in which the overissuance was discovered"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          years_between_overissuance_and_discovery <= unintentional_claim_max_lookback_years
  - name: agency_error_effective_month_within_cap
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 367.495
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/367/495/block-1
              excerpt: "In no event shall the Department determine the month the change would have been made effective to be more than two months from the month in which the change occurred"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          months_between_change_and_assumed_effective_month <= agency_error_max_effective_lookback_months
  - name: automatic_benefit_reduction_triggered
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 367.495
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/367/495/block-1
              excerpt: "failure to return a completed and signed copy of the agreement within 20 days shall result in automatic benefit reduction"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          days_since_repayment_agreement_sent > repayment_agreement_response_days
          and not repayment_agreement_returned_signed
