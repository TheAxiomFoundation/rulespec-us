  summary: |-
    At the time of application, each household shall be informed in writing of its right to a hearing, how to request a hearing, that its case may be presented by a household member or an authorized representative, and that the household may bring an interpreter. The Department will provide an interpreter if requested at least one week before the hearing and the hearing may be postponed for this purpose. The household shall be reminded of the right to request a fair hearing whenever it expresses disagreement with a Department action. Availability of free legal representation shall be disclosed, and a copy of the hearing procedures shall be made available to any interested party upon request.
