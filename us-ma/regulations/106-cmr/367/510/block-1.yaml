format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/367/510/block-1
  summary: |-
    Payments on unintentional or intentional program violation claims shall be
    collected by regular installment, wage assignment, automatic benefit
    reduction (10% or $10 for unintentional; 20% or $20 for intentional),
    civil court action, or the Treasury Offset Program. Repayment begins no
    later than 30 days from the date the repayment agreement is mailed; the
    Department may adjust the claim to allow payment within three years
    without creating financial hardship, but shall not compromise below the
    automatic benefit reduction floor.
rules:
  - name: unintentional_violation_benefit_reduction_rate
    kind: parameter
    dtype: Rate
    source: 106 CMR 367.510 (unintentional program violation - 10%)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/367/510/block-1
              excerpt: "10% or $10, whichever is greater, for an unintentional program violation"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.10
  - name: unintentional_violation_benefit_reduction_minimum
    kind: parameter
    dtype: Money
    unit: USD
    source: 106 CMR 367.510 (unintentional program violation - $10 minimum)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/367/510/block-1
              excerpt: "10% or $10, whichever is greater, for an unintentional program violation"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10
  - name: intentional_violation_benefit_reduction_rate
    kind: parameter
    dtype: Rate
    source: 106 CMR 367.510 (intentional program violation - 20%)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/367/510/block-1
              excerpt: "20% or $20, whichever is greater, for an intentional program violation"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.20
  - name: intentional_violation_benefit_reduction_minimum
    kind: parameter
    dtype: Money
    unit: USD
    source: 106 CMR 367.510 (intentional program violation - $20 minimum)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/367/510/block-1
              excerpt: "20% or $20, whichever is greater, for an intentional program violation"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          20
  - name: claim_adjustment_payoff_period_years
    kind: parameter
    dtype: Integer
    source: 106 CMR 367.510 (three-year claim adjustment period)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/367/510/block-1
              excerpt: "reducing it to an amount that will allow the household to pay the claim within three years"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          3
  - name: repayment_start_days_from_agreement
    kind: parameter
    dtype: Integer
    source: 106 CMR 367.510 (repayment begins no later than 30 days from mailing)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/367/510/block-1
              excerpt: "Repayment shall begin no later than 30 days from the date the repayment agreement is mailed"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30
  - name: minimum_installment_or_wage_assignment_payment
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 106 CMR 367.510 (installment/wage assignment floor equals automatic benefit reduction)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/367/510/block-1
              excerpt: "The amount of regular installment payments or wage assignment payments shall not be less than the amount that could be collected by automatic benefit reduction"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if claim_is_intentional_program_violation: max(intentional_violation_benefit_reduction_minimum, intentional_violation_benefit_reduction_rate * household_monthly_benefit_amount) else: max(unintentional_violation_benefit_reduction_minimum, unintentional_violation_benefit_reduction_rate * household_monthly_benefit_amount)
  - name: claim_compromise_floor
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 106 CMR 367.510 (compromise floor)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/367/510/block-1
              excerpt: "The Department shall not compromise below the amount which could be collected by automatic benefit reduction"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if claim_is_intentional_program_violation: max(intentional_violation_benefit_reduction_minimum, intentional_violation_benefit_reduction_rate * household_monthly_benefit_amount) else: max(unintentional_violation_benefit_reduction_minimum, unintentional_violation_benefit_reduction_rate * household_monthly_benefit_amount)
  - name: benefit_reduction_is_collection_method
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 367.510 (benefit reduction when no agreement)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/367/510/block-1
              excerpt: "Benefit reduction shall be the collection method if repayment terms are not agreed upon"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not repayment_terms_agreed_upon
  - name: wage_assignment_is_collection_method
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 367.510 (wage assignment for employed delinquent former clients)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/367/510/block-1
              excerpt: "Wage assignment shall be the collection method for employed former clients who are delinquent"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_is_former_client
          and household_member_is_employed
          and household_is_delinquent_on_claim
rules_end_marker: ~
