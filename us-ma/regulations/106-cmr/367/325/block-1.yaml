format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/367/325/block-1
  summary: |-
    The time, date, and place of the hearing shall be arranged so that the
    hearing is accessible to the household. Advance written notice of the
    hearing shall be provided to all parties involved at least one week prior
    to the hearing. The household or its representative may request to
    expedite the hearing.
rules:
  - name: minimum_hearing_notice_weeks
    kind: parameter
    dtype: Integer
    source: 106 CMR 367.325
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/367/325/block-1
              excerpt: "at least one week prior to the hearing"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1
  - name: hearing_notice_satisfies_advance_notice_requirement
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 106 CMR 367.325
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/367/325/block-1
              excerpt: "advance written notice of the hearing shall be provided to all parties involved at least one week prior to the hearing"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/367/325/block-1
              excerpt: "the household or its representative may request to expedite the hearing"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_requested_expedited_hearing
          or (hearing_notice_is_written
              and hearing_notice_provided_to_all_parties
              and weeks_between_notice_and_hearing >= minimum_hearing_notice_weeks)
  - name: hearing_arrangement_is_accessible_to_household
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 106 CMR 367.325
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/367/325/block-1
              excerpt: "The time, date, and place of the hearing shall be arranged so that the hearing is accessible to the household."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          hearing_time_is_accessible_to_household
          and hearing_date_is_accessible_to_household
          and hearing_place_is_accessible_to_household
