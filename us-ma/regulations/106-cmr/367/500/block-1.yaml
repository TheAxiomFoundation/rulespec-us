format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/367/500/block-1
  summary: A claim for overissuance shall be pursued as an intentional program violation
    claim if an Administrative Disqualification Hearing, or a court of appropriate
    jurisdiction, has found that a household member committed an intentional program
    violation, or if the individual has filed a signed waiver of his or her right
    to an Administrative Disqualification Hearing or entered into a consent agreement
    with the court. If the household member is determined to have committed an intentional
    program violation by knowingly, willfully, and with deceitful intent failing to
    report a change in its household circumstances, the first month benefits were
    overissued shall be the first month the change would have been made effective
    had it been reported on time.
