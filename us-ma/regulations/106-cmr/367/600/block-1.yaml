  summary: |-
    The provisions of 106 CMR 367.350, 367.375, 367.400, 367.425(A) and 367.520 through 367.825 are applicable to ADHs. The hearing official shall advise the household member or his or her representative that he or she may refuse to answer questions during the ADH.
