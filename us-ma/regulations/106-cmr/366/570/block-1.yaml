format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/366/570/block-1
  summary: |-
    Regardless of current eligibility, the Department shall restore lost benefits to a household by issuing an allotment equal to the amount of benefits that were lost. For currently eligible households, the lost benefits shall be issued in a lump sum separate from the household's current monthly allotment. The Department shall honor reasonable requests that the benefits be restored in monthly installments.
rules:
  - name: restored_lost_benefits_allotment
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 106 CMR 366.570
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/366/570/block-1
              excerpt: "the Department shall restore lost benefits to a household by issuing an allotment equal to the amount of benefits that were lost"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          max(0, amount_of_benefits_lost)
