  summary: |-
    When it is determined that a loss of benefits occurred, the Department shall automatically take action to restore those benefits to the household. No action by the household is necessary. The household shall be notified of its entitlement, the amount of benefits to be restored, any offsetting that was done, the method of restoration and the right to appeal through the fair hearing process.
