format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/366/140/block-1
  summary: |-
    PA households are subject to the same reporting requirements as all other SNAP households (in accordance with 106 CMR 366.110) and shall use the SNAP Change Report Form and postage-paid envelope provided by the Department. PA households that report a change in circumstances to the PA case manager shall be considered to have reported the change for SNAP purposes.
rules:
  - name: pa_household_change_reported_for_snap
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 366.140
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/366/140/block-1
              excerpt: "PA households that report a change in circumstances to the PA case manager shall be considered to have reported the change for SNAP purposes."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_is_pa_household
          and household_reported_change_to_pa_case_manager
