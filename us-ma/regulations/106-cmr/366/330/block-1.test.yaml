- name: timely_application_and_fulfilled_responsibilities_triggers_duty
  period: 2026-01
  input:
    us-ma:regulations/106-cmr/366/330/block-1#input.household_made_timely_recertification_application: true
    us-ma:regulations/106-cmr/366/330/block-1#input.household_fulfilled_recertification_responsibilities: true
  output:
    ? us-ma:regulations/106-cmr/366/330/block-1#department_must_issue_recertification_determination_by_end_of_current_certification_period
    : holds
- name: untimely_application_does_not_trigger_duty
  period: 2026-01
  input:
    us-ma:regulations/106-cmr/366/330/block-1#input.household_made_timely_recertification_application: false
    us-ma:regulations/106-cmr/366/330/block-1#input.household_fulfilled_recertification_responsibilities: true
  output:
    ? us-ma:regulations/106-cmr/366/330/block-1#department_must_issue_recertification_determination_by_end_of_current_certification_period
    : not_holds
- name: unfulfilled_responsibilities_does_not_trigger_duty
  period: 2026-01
  input:
    us-ma:regulations/106-cmr/366/330/block-1#input.household_made_timely_recertification_application: true
    us-ma:regulations/106-cmr/366/330/block-1#input.household_fulfilled_recertification_responsibilities: false
  output:
    ? us-ma:regulations/106-cmr/366/330/block-1#department_must_issue_recertification_determination_by_end_of_current_certification_period
    : not_holds
