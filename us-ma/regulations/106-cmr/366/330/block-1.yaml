format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/366/330/block-1
  summary: |-
    When a household makes a timely application for recertification and fulfills its
    recertification responsibilities, the Department must certify or deny the
    application and send the household a notice of the eligibility determination by
    the end of the current certification period.
