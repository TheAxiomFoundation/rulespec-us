  summary: |-
    The provisions of 106 CMR 366.600 cannot be used without the specific authorization of FNS following a declaration by the President of a major disaster and other disaster periods declared by FNS. The authority for the issuance of disaster SNAP benefits is granted in the Disaster Relief Act of 1974 and the Food Stamp Act and its amendments.
