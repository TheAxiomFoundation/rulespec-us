  summary: |-
    Households certified for one or two months shall receive, at the time of certification, a separate notice of recertification responsibilities entitled Notice of Expiration. Those households certified for three months or more (except public assistance households) shall receive a separate Notice of Expiration in the month prior to the last month of their certification period. Public assistance households shall receive a notice of recertification responsibilities prior to the end of the SNAP certification period.
