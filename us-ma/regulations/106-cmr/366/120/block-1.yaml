  summary: |-
    The Department shall not impose any reporting requirements on households except as provided in 106 CMR 366. The Department shall act promptly on any reported change. During the certification period, the Department shall not act on changes in medical expenses learned from a source other than the household that would require contacting the household for verification. The Department shall act only on changes in medical expenses reported by the household or learned from another source if verified upon receipt and not necessitating household contact. The worker must document the reported change in the case record, provide another Change Report Form, and notify the household of the effect of the change.
