  summary: |-
    A household may be notified that its benefits will be reduced or terminated no later than the date the household receives, or would have received, its allotment, provided that the following conditions are met.
rules:
  - name: notice_of_reduction_or_termination_is_timely
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 366.215 (block 1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/366/215/block-1
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          notice_issued_no_later_than_allotment_receipt_date
          and following_conditions_for_late_notice_are_met
