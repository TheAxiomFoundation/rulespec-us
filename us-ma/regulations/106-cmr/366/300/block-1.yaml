format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/366/300/block-1
  summary: |-
    A household's SNAP benefits shall not continue beyond the certification period, unless the household has been recertified. To recertify, the household must submit a new application, be interviewed, and provide required verification in accordance with the timeliness standards set forth in 106 CMR 366.320. Those households that timely recertify and are found eligible shall be entitled to uninterrupted benefits.
rules:
  - name: household_entitled_to_uninterrupted_benefits
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 366.300
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/366/300/block-1
              excerpt: "Those households that timely recertify and are found eligible shall be entitled to uninterrupted benefits."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_timely_recertified
          and household_found_eligible_on_recertification
  - name: household_snap_benefits_continue
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 366.300
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/366/300/block-1
              excerpt: "A household's SNAP benefits shall not continue beyond the certification period, unless the household has been recertified."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_within_certification_period
          or household_has_been_recertified
  - name: household_recertification_complete
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 366.300
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/366/300/block-1
              excerpt: "To recertify, the household must submit a new application, be interviewed, and provide required verification"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_submitted_new_application
          and household_was_interviewed
          and household_provided_required_verification
