format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/366/550/block-1
  summary: |-
    If a claim against a household is unpaid, held in suspense or terminated, the amount to be restored shall be offset against the amount due on the claim before the balance is restored to the household. Offsetting shall not occur when a household is certified and receiving an initial allotment, even if the initial allotment is issued retroactively.
rules:
  - name: restoration_offset_applies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 366.550
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/366/550/block-1
              excerpt: "If a claim against a household is unpaid, held in suspense or terminated, the amount to be restored shall be offset against the amount due on the claim"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/366/550/block-1
              excerpt: "Offsetting shall not occur when a household is certified and receiving an initial allotment, even if the initial allotment is issued retroactively."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (claim_against_household_is_unpaid
            or claim_against_household_is_held_in_suspense
            or claim_against_household_is_terminated)
          and not household_is_receiving_initial_allotment
  - name: restoration_amount_offset_against_claim
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 106 CMR 366.550
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/366/550/block-1
              excerpt: "the amount to be restored shall be offset against the amount due on the claim before the balance is restored to the household"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if restoration_offset_applies: min(amount_to_be_restored, amount_due_on_claim) else: 0
  - name: restoration_balance_to_household
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 106 CMR 366.550
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/366/550/block-1
              excerpt: "before the balance is restored to the household"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if restoration_offset_applies: max(0, amount_to_be_restored - amount_due_on_claim) else: amount_to_be_restored
