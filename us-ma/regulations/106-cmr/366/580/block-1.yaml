format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/366/580/block-1
  summary: |-
    Whenever lost benefits are due because a household and the household's membership has changed, the Department shall restore the lost benefits to the household containing a majority of the individuals who were household members at the time the loss occurred. If the Department cannot locate or determine the household that contains a majority of household members, it shall restore the lost benefits to the household containing the head of the household at the time the loss occurred.
rules:
  - name: household_receives_restored_lost_benefits
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 366.580
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/366/580/block-1
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          lost_benefits_are_due_to_household_membership_change
          and (
            household_contains_majority_of_prior_members
            or (
              department_cannot_locate_or_determine_majority_household
              and household_contains_prior_head_of_household
            )
          )
