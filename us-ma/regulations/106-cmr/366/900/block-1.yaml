  summary: |-
    USDA granted waivers to certain standard policy items to facilitate the SSI application process. The revised policy items apply only to one-person SNAP households who receive SSI benefits and differ depending on whether the household is a Bay State CAP household or a regular SNAP household. The waivers apply only to the policy items addressed in 106 CMR 366.910 and 366.920.
