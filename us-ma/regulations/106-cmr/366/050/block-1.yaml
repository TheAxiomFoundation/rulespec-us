  summary: |-
    When an applicant household is determined eligible to participate in SNAP, the household is assigned a certification period. Responsibility for ensuring continuing eligibility lies with both the client and the Department. The client must inform the Department of changes in household circumstances that may affect eligibility. The Department must act to ensure the SNAP household receives the benefits to which it is entitled on time and in the right amount. These actions are called additional certification functions.
