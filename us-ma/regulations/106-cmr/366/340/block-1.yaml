format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/366/340/block-1
  summary: |-
    Any application for recertification not submitted in a timely fashion shall be treated as an application for initial certification. A household that fails to submit a timely application, or keep an interview scheduled after a timely application was submitted, or provide required verification by the last day of its current certification period shall lose its right to uninterrupted benefits. If a household submits an application for certification prior to the expiration of its certification period, or within 15 days of the notice of termination in accordance with 106 CMR 366.320, and is found eligible for the month following the end of the certification period, the benefits for that month shall not be prorated. Households that file a timely application, but refuse to complete the recertification process, shall have their applications denied.
rules:
  - name: post_termination_notice_filing_window_days
    kind: parameter
    dtype: Integer
    source: 106 CMR 366.340
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/366/340/block-1
              excerpt: "within 15 days of the notice of termination"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          15
  - name: untimely_recertification_treated_as_initial_application
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 366.340
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/366/340/block-1
              excerpt: "Any application for recertification not submitted in a timely fashion shall be treated as an application for initial certification."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_submitted_recertification_application
          and not household_recertification_application_was_timely
  - name: household_loses_right_to_uninterrupted_benefits
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 366.340
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/366/340/block-1
              excerpt: "a household that fails to submit a timely application, or keep an interview scheduled after a timely application was submitted, or provide required verification by the last day of its current certification period shall lose its right to uninterrupted benefits"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_failed_to_submit_timely_recertification_application
          or household_failed_to_keep_scheduled_recertification_interview
          or household_failed_to_provide_required_verification_by_last_day_of_certification_period
  - name: recertification_benefits_not_prorated_for_first_month
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 366.340
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/366/340/block-1
              excerpt: "If a household submits an application for certification prior to the expiration of its certification period, or within 15 days of the notice of termination in accordance with 106 CMR 366.320, and is found eligible for the month following the end of the certification period, the benefits for that month shall not be prorated."
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/366/340/block-1
              excerpt: "within 15 days of the notice of termination"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (
            household_submitted_recertification_application_prior_to_certification_period_expiration
            or (
              household_submitted_recertification_application_after_termination_notice
              and days_between_termination_notice_and_application <= post_termination_notice_filing_window_days
            )
          )
          and household_found_eligible_for_month_following_end_of_certification_period
  - name: recertification_application_denied_for_refusal_to_complete_process
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 366.340
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/366/340/block-1
              excerpt: "Households that file a timely application, but refuse to complete the recertification process, shall have their applications denied."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_filed_timely_recertification_application
          and household_refused_to_complete_recertification_process
