format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/366/200/block-1
  summary: |-
    Before reducing or terminating a household's benefits during the certification period, the worker shall provide advance notice of adverse action (except as specified in 106 CMR 366.210). The notice is timely if mailed to the household at least ten days before the effective date of the proposed action (except as specified in 106 CMR 366.215).
rules:
  - name: minimum_advance_notice_days
    kind: parameter
    dtype: Integer
    source: 106 CMR 366.200 ("at least ten days before the effective date of the proposed action")
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/366/200/block-1
              excerpt: "at least ten days before the effective date of the proposed action"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10
  - name: notice_of_adverse_action_is_timely
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 106 CMR 366.200 ("The notice of adverse action shall be considered timely if it is mailed to the household at least ten days before the effective date of the proposed action, except as specified in 106 CMR 366.215.")
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/366/200/block-1
              excerpt: "The notice of adverse action shall be considered timely if it is mailed to the household at least ten days before the effective date of the proposed action"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          days_between_notice_mailing_and_effective_date >= minimum_advance_notice_days
  - name: advance_notice_of_adverse_action_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 106 CMR 366.200 ("Before taking action to reduce or terminate a household's benefits during the certification period, the worker shall, except as specified in 106 CMR 366.210, provide the household with advance notice of adverse action.")
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/366/200/block-1
              excerpt: "Before taking action to reduce or terminate a household's benefits during the certification period, the worker shall, except as specified in 106 CMR 366.210, provide the household with advance notice of adverse action."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          action_reduces_or_terminates_household_benefits
          and action_occurs_during_certification_period
          and not exception_under_106_cmr_366_210_applies
