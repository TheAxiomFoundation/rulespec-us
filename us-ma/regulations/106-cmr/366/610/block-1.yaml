  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/366/610/block-1
  summary: |-
    The Commonwealth of Massachusetts Disaster SNAP Plan provides immediate relief to people in need of food assistance because of a disaster. Eligibility is based on information from an application form prescribed by the Department. Households certified under the disaster eligibility standards shall be provided disaster SNAP benefits for the maximum allotment for the household size.
rules:
