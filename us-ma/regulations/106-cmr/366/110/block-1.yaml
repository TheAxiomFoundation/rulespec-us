format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/366/110/block-1
  summary: |-
    EDSAP reporting households include elderly (age 60 or more) or disabled
    (regardless of age) household members. Children (less than 18 years old)
    may also be included in EDSAP households, regardless of disability
    status. EDSAP households are certified for 36 months and must recertify
    at the end of their certification period. EDSAP households are not
    required to complete an Interim Report. During the certification
    period, EDSAP households must report changes in household composition
    and whenever any household member begins to receive earned income.
rules:
  - name: edsap_elderly_age_threshold
    kind: parameter
    dtype: Integer
    source: 106 CMR 366.110(A) - "elderly (age 60 or more)"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/366/110/block-1
              excerpt: "elderly (age 60 or more)"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          60
  - name: edsap_child_age_threshold
    kind: parameter
    dtype: Integer
    source: 106 CMR 366.110(A) - "Children (less than 18 years old)"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/366/110/block-1
              excerpt: "Children (less than 18 years old)"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          18
  - name: edsap_certification_period_months
    kind: parameter
    dtype: Integer
    source: 106 CMR 366.110(A) - "EDSAP households are certified for 36 months"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/366/110/block-1
              excerpt: "EDSAP households are certified for 36 months"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          36
  - name: person_qualifies_for_edsap_household
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 106 CMR 366.110(A) - EDSAP households include elderly or disabled members; children may also be included
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/366/110/block-1
              excerpt: "EDSAP reporting households include elderly (age 60 or more) or disabled (regardless of age) household members. Children (less than 18 years old) may also be included in EDSAP households, regardless of disability status."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_age >= edsap_elderly_age_threshold
          or person_is_disabled
          or person_age < edsap_child_age_threshold
  - name: household_is_edsap
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 366.110(A) - EDSAP households include elderly or disabled members
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/366/110/block-1
              excerpt: "EDSAP reporting households include elderly (age 60 or more) or disabled (regardless of age) household members."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_has_elderly_member or household_has_disabled_member
  - name: edsap_household_must_report_change
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 366.110(A) - During the certification period, EDSAP households must report changes in household composition and whenever any household member begins to receive earned income.
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/366/110/block-1
              excerpt: "EDSAP households must report changes in household composition and whenever any household member begins to receive earned income"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_is_edsap
          and (household_composition_changed
               or household_member_began_receiving_earned_income)
  - name: edsap_household_required_to_complete_interim_report
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 366.110(A) - "EDSAP households are not required to complete an Interim Report."
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/366/110/block-1
              excerpt: "EDSAP households are not required to complete an Interim Report."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not household_is_edsap
  - name: information_is_verified_upon_receipt
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 366.110(A) - The Department considers information to be verified upon receipt when the information is not questionable and the provider is the primary source of the information.
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/366/110/block-1
              excerpt: "the Department considers information to be verified upon receipt when the information is not questionable, the provider is the primary source of the information"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not reported_information_is_questionable
          and provider_is_primary_source_of_information
