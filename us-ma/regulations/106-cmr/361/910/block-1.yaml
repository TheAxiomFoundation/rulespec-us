format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/361/910/block-1
  summary: |-
    A delay is considered the fault of the household if the household has failed
    to complete the application process even though the worker has taken all the
    action required to assist the household. The worker must have taken the
    actions in 106 CMR 361.920 before a delay can be considered the fault of the
    household.
rules:
  - name: delay_is_fault_of_household
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 361.910
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/361/910/block-1
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_failed_to_complete_application_process
          and worker_has_taken_all_required_assistance_actions
          and worker_has_taken_actions_in_106_cmr_361_920
