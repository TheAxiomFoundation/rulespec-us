  summary: |-
    The worker shall ensure that authorized representatives are properly designated. The name of the authorized representative shall be contained in the household's case file. Limits shall not be placed on the number of households an authorized representative may represent. The worker should exercise caution when a single authorized representative has access to a large number of SNAP benefits.
