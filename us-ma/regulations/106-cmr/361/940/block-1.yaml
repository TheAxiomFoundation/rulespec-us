format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/361/940/block-1
  summary: |-
    If the delay in the first 30-day period is considered to be the fault of
    the Department and the household was eligible for the month of application,
    benefits will be provided retroactively to the date of application. If the
    delay in the first 30-day period is considered to be the fault of the
    household, benefits are provided beginning with the month in which the
    household completes the application process.
rules:
  - name: snap_benefits_retroactive_to_application_date
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 361.940
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/361/940/block-1
              excerpt: |-
                If the delay in the first 30-day period is considered to be the
                fault of the Department and the household was eligible for the
                month of application, benefits will be provided retroactively
                to the date of application.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          first_30_day_period_delay_is_department_fault
          and household_was_eligible_for_month_of_application
  - name: snap_benefits_begin_month_application_completed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 361.940
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/361/940/block-1
              excerpt: |-
                If the delay in the first 30-day period is considered to be the
                fault of the household, benefits are provided beginning with
                the month in which the household completes the application
                process.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          first_30_day_period_delay_is_household_fault
