format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/361/100/block-1
  summary: |-
    An identifiable SNAP application contains the applicant's name and address
    and is signed by a responsible member of the household or the household's
    authorized representative.
rules:
  - name: snap_application_is_identifiable
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 361.100 (block-1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/361/100/block-1
              excerpt: "An identifiable SNAP application contains the applicant's name and address and is signed by a responsible member of the household or the household's authorized representative."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          snap_application_contains_applicant_name
          and snap_application_contains_applicant_address
          and (snap_application_signed_by_responsible_household_member
               or snap_application_signed_by_authorized_representative)
