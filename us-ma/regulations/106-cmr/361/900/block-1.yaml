format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/361/900/block-1
  summary: |-
    If an eligible household is not provided an opportunity to participate within 30 days or an ineligible household is not denied within 30 days, the worker must determine the cause of the delay. The word "fault" is used as an administrative term to establish the household's entitlement to retroactive benefits.
rules:
  - name: processing_period_days
    kind: parameter
    dtype: Integer
    source: 106 CMR 361.900
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/361/900/block-1
              excerpt: "within 30 days"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30
  - name: worker_must_determine_cause_of_delay
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 361.900
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/361/900/block-1
              excerpt: "the worker must determine the cause of the delay"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (household_is_eligible and not opportunity_to_participate_provided_within_processing_period)
          or (household_is_ineligible and not denial_issued_within_processing_period)
