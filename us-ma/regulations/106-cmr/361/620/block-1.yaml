format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/361/620/block-1
  summary: |-
    To be considered questionable, the information on the application must be
    inconsistent with statements made by the applicant, inconsistent with other
    information on the application or previous applications, or inconsistent
    with other information known or reported to the Department. No group shall
    be required to provide more intensive verification of questionable
    information due to their race, religion, ethnic background, or national
    origin.
rules:
  - name: information_is_questionable
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 361.620 block 1 (definition of questionable information)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/361/620/block-1
              excerpt: |-
                the information on the application must be inconsistent with
                statements made by the applicant, inconsistent with other
                information on the application or previous applications, or
                inconsistent with other information known or reported to the
                Department
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          information_inconsistent_with_applicant_statements
          or information_inconsistent_with_other_application_information
          or information_inconsistent_with_previous_applications
          or information_inconsistent_with_other_information_known_to_department
  - name: more_intensive_verification_requirement_based_on_protected_characteristics_permitted
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 361.620 block 1 (anti-discrimination in verification)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/361/620/block-1
              excerpt: |-
                No group shall be required to provide more intensive
                verification of questionable information due to their race,
                religion, ethnic background, or national origin
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not more_intensive_verification_required_due_to_race
          and not more_intensive_verification_required_due_to_religion
          and not more_intensive_verification_required_due_to_ethnic_background
          and not more_intensive_verification_required_due_to_national_origin
