  summary: |-
    The interview is an official and confidential discussion of household
    circumstances. The scope of the interview may not extend beyond an
    examination of household circumstances which directly relate to the
    determination of household eligibility and benefit level. The worker shall
    use interview techniques that explore and resolve unclear and incomplete
    information, fully advise the household of its rights and responsibilities,
    and at the interview an applying household must report changes related to
    eligibility which have occurred since the application was filed. Changes
    listed in 106 CMR 366.110 which occur after the interview but before the
    date of the notice of eligibility must be reported within ten days of the
    date of the notice.
