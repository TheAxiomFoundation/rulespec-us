format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/361/960/block-1
  summary: |-
    If an eligibility determination is not made by the 60th day following the date the application was filed, the worker must ensure that the application process is completed.
rules:
  - name: application_processing_deadline_days
    kind: parameter
    dtype: Integer
    source: 106 CMR 361.960 block 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/361/960/block-1
              excerpt: "the 60 th day following the date the application was filed"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          60
  - name: worker_must_ensure_application_process_completed
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: 106 CMR 361.960 block 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/361/960/block-1
              excerpt: "If an eligibility determination is not made by the 60 th day following the date the application was filed, the worker must ensure that the application process is completed."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          days_since_application_filed > application_processing_deadline_days
          and not eligibility_determination_made
