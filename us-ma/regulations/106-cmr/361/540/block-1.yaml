format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/361/540/block-1
  summary: |-
    The worker shall schedule face-to-face or out-of-office interviews as promptly as possible to ensure that eligible households are able to obtain SNAP benefits within 30 calendar days following the date the application is filed. If a household fails to appear for the first interview, the worker must notify the household that it missed the interview appointment and that it is the household's responsibility to contact the Department to reschedule the missed interview. The household may reschedule a missed interview without providing good cause for failing to appear for the first interview.
rules:
  - name: snap_application_processing_days
    kind: parameter
    dtype: Integer
    source: 106 CMR 361.540
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/361/540/block-1
              excerpt: "within 30 calendar days following the date the application is filed"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30
  - name: household_may_reschedule_missed_first_interview_without_good_cause
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 106 CMR 361.540
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/361/540/block-1
              excerpt: "The household may reschedule a missed interview without providing good cause for failing to appear for the first interview."
    versions:
