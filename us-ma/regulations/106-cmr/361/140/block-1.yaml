module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/361/140/block-1
  summary: |-
    If the household contacts the Department by telephone but does not wish to come to a local office to file an application that same day and instead prefers receiving an application through the mail rather than applying online, the Department shall mail the application form to the household on the same day as the telephone request. If a household makes a written request for SNAP assistance, the Department shall mail the application form to the household on the same day as the written request is received.
  status: deferred
  deferred_outputs:
    - output: us-ma:regulations/106-cmr/361/140/block-1#department_must_mail_application_same_day
      reason: |-
        The source states an administrative duty on the Department to mail an application form on the same day as a telephone or written request. This is a procedural/administrative obligation with no computable benefit amount, eligibility test, or rate. Per the source-scope protocol, broad administrative duty clauses without a computable policy condition should be preserved in the module summary and not encoded as executable derived outputs.
