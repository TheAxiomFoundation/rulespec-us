format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/361/520/block-1
  summary: |-
    Waiver of the office interview does not exempt the household from the verification requirements described in 106 CMR 361.600 through 361.660. Special procedures may be used to permit the household to provide verification in a timely manner, such as substituting a collateral contact where documentary evidence would normally be provided.
rules:
  - name: household_subject_to_verification_requirements_despite_office_interview_waiver
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 361.520 (block 1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/361/520/block-1
              excerpt: "Waiver of the office interview does not exempt the household from the verification requirements described in 106 CMR 361.600 through 361.660."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not household_is_exempt_from_verification_requirements_due_to_office_interview_waiver
  - name: collateral_contact_may_be_substituted_for_documentary_evidence
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 361.520 (block 1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/361/520/block-1
              excerpt: "the worker may substitute a collateral contact in instances where documentary evidence would normally be provided"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_office_interview_is_waived
          and documentary_evidence_would_normally_be_provided
