format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/361/120/block-1
  summary: |-
    For households consisting only of SSI applicants or recipients that apply for SNAP at an SSA office, the household's date of application is the date the signed SNAP application is received by the SSA office. For all other households, the date of application is the date an identifiable SNAP application is received by the Department through the online application, the DTA Document Processing Center, or at a Department local office, except that when an application is not received by 5:00 P.M. on a business day or is received on a weekend or holiday, the application date will be the next business day.
rules:
  - name: ssi_only_household_applying_at_ssa_office
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 106 CMR 361.120 (first paragraph)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/361/120/block-1
              excerpt: "households consisting only of SSI applicants or recipients that apply for SNAP benefits at an SSA office"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_consists_only_of_ssi_applicants_or_recipients
          and household_applied_for_snap_at_ssa_office

  - name: application_date_is_ssa_receipt_date
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 106 CMR 361.120 (first paragraph)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/361/120/block-1
              excerpt: "the household's date of application is the date the signed SNAP application is received by the SSA office"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          ssi_only_household_applying_at_ssa_office
          and signed_snap_application_received_by_ssa_office

  - name: application_date_advances_to_next_business_day
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 106 CMR 361.120 (second paragraph)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/361/120/block-1
              excerpt: "when an application is not received by 5:00 P.M. on a business day or is received on a weekend or holiday, the application date will be the next business day"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not ssi_only_household_applying_at_ssa_office
          and identifiable_snap_application_received_by_department
          and (
            application_not_received_by_5pm_on_business_day
            or application_received_on_weekend_or_holiday
          )

  - name: application_date_is_department_receipt_date
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 106 CMR 361.120 (second paragraph)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/361/120/block-1
              excerpt: "the household's date of application is the date an identifiable SNAP application is received by the Department through the online application, the DTA Document Processing Center or at a Department local office"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not ssi_only_household_applying_at_ssa_office
          and identifiable_snap_application_received_by_department
          and not application_not_received_by_5pm_on_business_day
          and not application_received_on_weekend_or_holiday
