format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/361/610/block-1
  summary: |-
    When a household member does not furnish an SSN which can be verified in accordance with 106 CMR 362.500(A), and does not have Good Cause for not providing an SSN, as specified in 106 CMR 362.500(C), the household member is ineligible and shall be considered a disqualified nonhousehold member in accordance with 106 CMR 365.520. Documents that are accepted as verification of the household's legal obligation to pay child support shall not be accepted as verification of the household's actual monthly child support payments.
rules:
  - name: member_disqualified_for_ssn_noncompliance
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 106 CMR 361.610
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/361/610/block-1
              excerpt: "does not furnish an SSN which can be verified ... and does not have Good Cause ... is ineligible and shall be considered a disqualified nonhousehold member"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not member_furnishes_verifiable_ssn
          and not member_has_good_cause_for_no_ssn
  - name: document_accepted_as_actual_child_support_payment_verification
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 106 CMR 361.610
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/361/610/block-1
              excerpt: "Documents that are accepted as verification of the household's legal obligation to pay child support shall not be accepted as verification of the household's actual monthly child support payments."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          document_verifies_actual_child_support_payment
          and not document_only_verifies_legal_obligation_to_pay_child_support
