format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/361/950/block-1
  summary: |-
    If the household is found ineligible during the second 30-day period, the worker shall send a Notice of Denial. If the denial is a result of lack of verifications, the written notice shall inform the household of their right to reapply at any time and shall also contain a statement advising the household of the missing verifications and the option to contact the Department for help.
