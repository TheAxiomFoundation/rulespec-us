  summary: |-
    Nonhousehold members' income and resources shall not be considered in determining the household's eligibility and benefit level, except for disqualified individuals described in 106 CMR 361.230(D). Nonhousehold members who are otherwise eligible may participate as separate households. This block-1 introduces a list of nonhousehold member categories that follows in subsequent provisions.
