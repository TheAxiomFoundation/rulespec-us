format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/361/190/block-1
  summary: |-
    Households of only SSI applicants or recipients may apply for SNAP at an SSA
    office. SSA forwards applications to the Department within one working day,
    and items verified on file at SSA are considered verified for SNAP purposes.
    SSI households that applied at SSA are not subject to an additional interview
    at the Department. SSI households are considered categorically eligible for
    SNAP benefits in accordance with 106 CMR 365.180.
rules:
  - name: ssi_household_categorically_eligible_for_snap
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 361.190
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/361/190/block-1
              excerpt: "SSI households are considered categorically eligible for SNAP benefits in accordance with 106 CMR 365.180"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          all_household_members_are_ssi_applicants_or_recipients
  - name: ssi_household_not_subject_to_additional_interview_at_department
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 361.190
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/361/190/block-1
              excerpt: "At initial application, SSI households that have applied at the SSA office shall not be subject to an additional interview at the Department"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          all_household_members_are_ssi_applicants_or_recipients
          and ssi_household_filed_snap_application_at_ssa_office
          and not snap_application_is_improperly_completed
          and not mandatory_verification_is_missing
          and not information_on_application_is_questionable
