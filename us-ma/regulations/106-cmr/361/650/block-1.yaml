    corpus_citation_path: us-ma/regulation/106-cmr/361/650/block-1
  summary: |-
    The household has primary responsibility for providing documentary evidence to support its income statements and to resolve any questionable information. The worker shall not require the household to present verification in person at the local office. If it would be difficult or impossible for the household to obtain the documentary evidence in a timely manner, or the household has presented insufficient documentation, the worker shall either offer assistance, except when verification of shelter or utility costs for unoccupied homes would have to be obtained from a source outside the State, or shall use a collateral contact or home visit.
  status: deferred
  deferred_outputs:
    - output: us-ma:regulations/106-cmr/361/650/block-1#verification_responsibility
      reason: |-
        Source text states administrative procedural duties (household has primary responsibility for documentary evidence; worker shall offer assistance or use collateral contact/home visit; worker shall not require in-person verification) without defining a computable benefit amount, eligibility test, or numeric condition. These are procedural duties governing the verification process, not calculable policy outputs.
