format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/361/930/block-1
  summary: |-
    If the worker cannot make an eligibility determination within 30 calendar
    days as specified in 106 CMR 361.700, he or she shall send the household a
    Notice of Pending Status on the 30th day. If household action is needed,
    the notice shall explain that the application will be denied if the
    required action is not taken within 60 calendar days following the date the
    application was filed. No further action is required by the worker after
    the Notice of Pending Status is sent if the household fails to take the
    required action within 60 calendar days following the date the application
    was filed.
rules:
  - name: eligibility_determination_period_days
    kind: parameter
    dtype: Integer
    source: 106 CMR 361.930 - "within 30 calendar days"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/361/930/block-1
              excerpt: "within 30 calendar days as specified in 106 CMR 361.700"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30
  - name: pending_status_application_deadline_days
    kind: parameter
    dtype: Integer
    source: 106 CMR 361.930 - "within 60 calendar days following the date the application was filed"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/361/930/block-1
              excerpt: "will be denied if the required action is not taken within 60 calendar days following the date the application was filed"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          60
  - name: notice_of_pending_status_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 106 CMR 361.930 - "he or she shall send the household a Notice of Pending Status on the 30th day"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/361/930/block-1
              excerpt: "If the worker cannot make an eligibility determination within 30 calendar days ... he or she shall send the household a Notice of Pending Status on the 30th day"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          days_since_application_filed >= eligibility_determination_period_days
          and not eligibility_determination_made
  - name: worker_must_take_immediate_corrective_action
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 106 CMR 361.930 - "If some action by the worker is needed ... he or she shall take immediate corrective action"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/361/930/block-1
              excerpt: "If some action by the worker is needed to complete the application process, he or she shall take immediate corrective action"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          notice_of_pending_status_required
          and worker_action_needed_to_complete_application
  - name: notice_must_explain_household_action_and_denial
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 106 CMR 361.930 - "the notice shall also explain what action the household must take and that its application will be denied if the required action is not taken within 60 calendar days"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/361/930/block-1
              excerpt: "the notice shall also explain what action the household must take and that its application will be denied if the required action is not taken within 60 calendar days following the date the application was filed"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          notice_of_pending_status_required
          and household_action_needed_to_complete_application
  - name: notice_must_advise_of_missing_verifications
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 106 CMR 361.930 - "If the pending status is the result of lack of verifications ... the written notice must also contain a statement advising the household of the missing verification(s) and the option to contact the worker for assistance"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/361/930/block-1
              excerpt: "If the pending status is the result of lack of verifications needed to make a determination of eligibility, the written notice must also contain a statement advising the household of the missing verification(s) and the option to contact the worker for assistance"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          notice_of_pending_status_required
          and pending_status_due_to_lack_of_verifications
  - name: no_further_worker_action_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 106 CMR 361.930 - "No further action is required by the worker after the Notice of Pending Status is sent if the household fails to take the required action within 60 calendar days"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/361/930/block-1
              excerpt: "No further action is required by the worker after the Notice of Pending Status is sent if the household fails to take the required action within 60 calendar days following the date the application was filed"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          notice_of_pending_status_sent
          and days_since_application_filed >= pending_status_application_deadline_days
          and not household_took_required_action
