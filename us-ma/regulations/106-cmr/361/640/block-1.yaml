  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/361/640/block-1
  summary: |-
    Sources of verification include documentary evidence, collateral contacts or home visits. The source of the verification must be documented in the case record. When the verification is an original document, a photocopy must be made if possible; otherwise the worker records the source and date. The household must be permitted to keep the original document. SDX documents are not considered collateral contacts and need not be designated by the household.
