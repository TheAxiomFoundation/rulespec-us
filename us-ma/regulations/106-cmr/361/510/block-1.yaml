    corpus_citation_path: us-ma/regulation/106-cmr/361/510/block-1
  summary: |-
    The households in 106 CMR 361.510(A) and (B) shall not be required to complete a face-to-face interview in the local office. For these households the interview must be conducted by telephone or home visit. Home visits shall be used only if the time of the visit is scheduled in advance with the household. Households who have been certified for 24 months shall have a telephone interview at the end of the 24-month period.
