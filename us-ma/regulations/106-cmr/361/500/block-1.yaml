format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/361/500/block-1
  summary: At initial certification, an interview shall not be conducted with SSI
    households that have filed an application at an SSA office. All other applicant
    households, including those submitting applications by mail, fax or through the
    online application shall be scheduled for a face-to-face interview in the local
    office unless the office interview requirement is waived as provided in 106 CMR
    361.510. The interview shall be conducted by the worker prior to initial certification
    and at all recertifications. The individual interviewed may be the head of household,
    spouse, other responsible member of the household, or the household's authorized
    representative.
  deferred_outputs:
  - output: us-ma:regulations/106-cmr/361/500/block-1#valid_interviewee
    reason: Generated rule treated a filing-status or marital-status legal classification
      as a local fact. This output is deferred until the upstream status source can
      be encoded or imported without inventing local tax-status component inputs.
rules:
- name: interview_required
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: 106 CMR 361.500
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-ma/regulation/106-cmr/361/500/block-1
  versions:
  - effective_from: '0001-01-01'
    formula: '(household_is_at_recertification

      or (household_is_applicant

      and not (household_is_initial_certification

      and household_is_ssi_household

      and application_filed_at_ssa_office)))

      and not office_interview_requirement_waived'
- name: face_to_face_interview_required
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: 106 CMR 361.500
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-ma/regulation/106-cmr/361/500/block-1
          excerpt: shall be scheduled for a face-to-face interview in the local office
            unless the office interview requirement is waived as provided in 106 CMR
            361.510
  versions:
  - effective_from: '0001-01-01'
    formula: 'household_is_applicant

      and not (household_is_initial_certification

      and household_is_ssi_household

      and application_filed_at_ssa_office)

      and not office_interview_requirement_waived'
