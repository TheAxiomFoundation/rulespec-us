format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/361/400/block-1
  summary: |-
    If the household refuses to cooperate with the worker in completing this process, the application shall be denied at the time of refusal. For a determination of refusal to be made, the household must be able to cooperate, but clearly demonstrate that it will not take actions that it can take and that are required to complete the application process. If there is any question as to whether the household has merely failed to cooperate as opposed to refused to cooperate, the household shall not be denied. The household shall also be determined ineligible if it refuses to cooperate in any subsequent review of its eligibility, including reviews generated by reported changes, recertifications, or as part of a Quality Control review. Once denied or terminated for refusal to cooperate, the household may reapply but shall not be determined eligible until it cooperates.
rules:
  - name: household_refuses_to_cooperate
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 361.400 - refusal determination
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/361/400/block-1
              excerpt: "the household must be able to cooperate, but clearly demonstrate that it will not take actions that it can take and that are required to complete the application process"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/361/400/block-1
              excerpt: "If there is any question as to whether the household has merely failed to cooperate as opposed to refused to cooperate, the household shall not be denied."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_is_able_to_cooperate
          and household_clearly_demonstrates_unwillingness_to_take_required_actions
          and not question_exists_whether_failure_versus_refusal
  - name: application_denied_for_refusal_to_cooperate
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 361.400 - denial at time of refusal
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/361/400/block-1
              excerpt: "If the household refuses to cooperate with the worker in completing this process, the application shall be denied at the time of refusal."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_has_pending_application
          and household_refuses_to_cooperate
  - name: household_ineligible_for_refusal_in_subsequent_review
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 361.400 - subsequent review refusal
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/361/400/block-1
              excerpt: "The household shall also be determined ineligible if it refuses to cooperate in any subsequent review of its eligibility, including reviews generated by reported changes, recertifications, or as part of a Quality Control review."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_is_in_subsequent_eligibility_review
          and household_refuses_to_cooperate
  - name: reapplication_ineligible_until_cooperates
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 361.400 - reapplication after denial or termination for refusal
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/361/400/block-1
              excerpt: "Once denied or terminated for refusal to cooperate, the household may reapply but shall not be determined eligible until it cooperates."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_previously_denied_or_terminated_for_refusal_to_cooperate
          and not household_has_since_cooperated
