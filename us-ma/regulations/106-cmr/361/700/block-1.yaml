format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/361/700/block-1
  summary: |-
    If the household complies after the tenth day but before the 30th day, benefits must be provided back to the date of application for eligible households. Delays beyond 30 days must be handled in accordance with 106 CMR 361.900.
rules:
  - name: compliance_lower_day_threshold
    kind: parameter
    dtype: Integer
    source: 106 CMR 361.700
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/361/700/block-1
              excerpt: "complies after the tenth day"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10
  - name: compliance_upper_day_threshold
    kind: parameter
    dtype: Integer
    source: 106 CMR 361.700
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/361/700/block-1
              excerpt: "before the 30th day"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30
  - name: benefits_paid_back_to_application_date
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 361.700
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/361/700/block-1
              excerpt: "If the household complies after the tenth day but before the 30th day, benefits must be provided back to the date of application for eligible households."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_is_eligible_for_benefits
          and days_until_household_compliance > compliance_lower_day_threshold
          and days_until_household_compliance < compliance_upper_day_threshold
