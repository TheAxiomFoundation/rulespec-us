format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/361/330/block-1
  summary: |-
    The authorized representative may use SNAP benefits to purchase food for the household's consumption with the full knowledge and consent of the household. The authorized representative must have a Mass EBT Card in his or her own name when purchasing food with SNAP benefits.
rules:
  - name: authorized_representative_may_purchase_food
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 106 CMR 361.330 block 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/361/330/block-1
              excerpt: "The authorized representative may use SNAP benefits to purchase food for the household's consumption with the full knowledge and consent of the household."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_authorized_representative
          and household_has_knowledge_of_purchase
          and household_consents_to_purchase
          and authorized_representative_has_mass_ebt_card_in_own_name
