format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/361/080/block-1
  summary: |-
    Eligible households must be given an opportunity to participate in SNAP no later than 30 calendar days following their date of application. Benefits must be provided retroactively to the date of application for households that complete the application process within the required time frame and are eligible to receive benefits in the month of application.
rules:
  - name: snap_application_processing_standard_days
    kind: parameter
    dtype: Integer
    source: 106 CMR 361.080
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/361/080/block-1
              excerpt: "no later than 30 calendar days following their date of application"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30
  - name: snap_opportunity_to_participate_timely
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 361.080
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/361/080/block-1
              excerpt: "An opportunity to participate consists of the Department's issuing SNAP benefits through the EBT system before the 30-day processing standard expires."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          snap_benefits_issued_through_ebt_before_30_day_standard_expires
  - name: snap_benefits_retroactive_to_application_date
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 361.080
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/361/080/block-1
              excerpt: "Benefits must be provided retroactively to the date of application for households that complete the application process within the required time frame and are eligible to receive benefits in the month of application."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_completes_application_process_within_required_time_frame
          and household_eligible_for_benefits_in_month_of_application
