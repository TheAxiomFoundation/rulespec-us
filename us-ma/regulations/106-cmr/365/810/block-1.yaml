format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/365/810/block-1
  summary: |-
    A household member who has changed jobs and continues to work for the same employer is still receiving income from the same source. A member's source of income is from the grower for whom the member is working and not from the crew chief; a member who travels with the same crew chief but moves from one grower to another has moved from a terminated income source to a new source. Travel advances received from a new employer by a household to journey to the new employment are disregarded when determining whether a household is eligible for expedited service but may be considered when determining the household's eligibility and benefit level in accordance with 106 CMR 365.850.
rules:
  - name: member_income_source_unchanged_after_job_change
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 106 CMR 365.810 (continuity of income source for same-employer job change)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/365/810/block-1
              excerpt: "A household member who has changed jobs and continues to work for the same employer shall be considered as still receiving income from the same source."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          member_changed_jobs and member_continues_to_work_for_same_employer
  - name: member_income_source_terminated_by_grower_change
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 106 CMR 365.810 (grower-not-crew-chief attribution; new grower terminates prior source)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/365/810/block-1
              excerpt: "A household member's source of income shall be considered to be from the grower for whom the member is working and not from the crew chief. A member who travels with the same crew chief but moves from one grower to another shall be considered to have moved from a terminated income source to a new source."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          member_travels_with_same_crew_chief and member_moved_from_one_grower_to_another
  - name: travel_advance_disregarded_for_expedited_service
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 365.810 (travel advances disregarded for expedited service)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/365/810/block-1
              excerpt: "Travel advances received from a new employer by a household to journey to the new employment shall be disregarded when determining whether a household is eligible for expedited service"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_received_travel_advance_from_new_employer
          and travel_advance_is_to_journey_to_new_employment
