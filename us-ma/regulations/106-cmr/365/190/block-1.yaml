format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/365/190/block-1
  summary: |-
    When certain TAFDC households close, the Department provides Transitional
    Benefits Alternative (TBA) SNAP benefits for five months. For TBA purposes,
    closed cash cases with an associated NPA SNAP household will have their
    Transitional Support Services (TSS) income excluded when determining the
    SNAP benefit amount. If at the time of the TAFDC closing, the household
    reports a change(s), the Department will recalculate the SNAP benefits. If
    the household is determined to be over income based on the recalculation,
    the TBA case will close for that reason during the TBA period.
rules:
  - name: tba_snap_benefit_period_months
    kind: parameter
    dtype: Count
    source: 106 CMR 365.190 - TBA five-month period
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/365/190/block-1
              excerpt: "Transitional Benefits Alternative (TBA) SNAP benefits for five months"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          5

  - name: tss_income_excluded_in_tba_snap_calculation
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 365.190 - TSS income exclusion for TBA NPA SNAP
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/365/190/block-1
              excerpt: "closed cash cases with an associated NPA SNAP household will have their Transitional Support Services (TSS) income excluded when determining the SNAP benefit amount"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_has_closed_tafdc_cash_case
          and household_has_associated_npa_snap_household

  - name: snap_benefits_recalculated_at_tafdc_closing
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 365.190 - recalculation on reported change at TAFDC closing
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/365/190/block-1
              excerpt: "If at the time of the TAFDC closing, the household reports a change(s), the Department will recalculate the SNAP benefits"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_has_closed_tafdc_cash_case
          and household_reported_change_at_tafdc_closing

  - name: tba_case_closes_for_over_income_during_tba_period
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 365.190 - TBA closure for over income on recalculation
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/365/190/block-1
              excerpt: "If the household is determined to be over income based on the recalculation, the TBA case will close for that reason during the TBA period"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          snap_benefits_recalculated_at_tafdc_closing
          and household_determined_over_income_on_recalculation
