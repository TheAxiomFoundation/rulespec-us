  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/365/600/block-1
  summary: |-
    Individuals, with or without their children, living in drug or alcohol treatment centers who are considered residents of institutions as specified 106 CMR 361.240: Ineligible Households may be eligible to participate in SNAP.
rules:
  - name: drug_or_alcohol_treatment_center_resident_may_participate
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 106 CMR 365.600
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/365/600/block-1
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_lives_in_drug_or_alcohol_treatment_center
          and person_is_considered_resident_of_institution_under_361_240
