format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/365/620/block-1
  summary: |-
    A group living arrangement is a community-based residential facility operated by a public or private nonprofit organization or institution authorized to serve no more than 16 residents, certified by an appropriate state agency under section 1616(e) of the Social Security Act or comparable standards. To be eligible for SNAP, residents of group living arrangements (excluding Teen Parent Structured Living Programs) must be blind or disabled as defined in 106 CMR 361.240. Before certifying a resident, the worker must verify that the facility is operated by a nonprofit organization or institution certified by the appropriate State agency and authorized to serve no more than 16 residents.
rules:
  - name: maximum_residents_for_group_living_arrangement
    kind: parameter
    dtype: Count
    source: 106 CMR 365.620
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/365/620/block-1
              excerpt: "authorized to serve no more than 16 residents"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          16
  - name: facility_is_certified_group_living_arrangement
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 365.620
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          facility_is_community_based_residential_facility
          and facility_operated_by_nonprofit_organization_or_institution
          and facility_authorized_resident_capacity <= maximum_residents_for_group_living_arrangement
          and facility_certified_by_appropriate_state_agency
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/365/620/block-1
              excerpt: "A group living arrangement is defined as a community-based residential facility operated by a public or private nonprofit organization or institution authorized to serve no more than 16 residents. The facility shall be certified by an appropriate state agency"
  - name: resident_eligible_for_snap_in_group_living_arrangement
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 106 CMR 365.620
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          resident_of_group_living_arrangement
          and not resident_of_teen_parent_structured_living_program
          and (person_is_blind or person_is_disabled)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/365/620/block-1
              excerpt: "residents of group living arrangements, not including Teen Parent Structured Living Programs (TLPs), must be blind or disabled as defined in 106 CMR 361.240"
  - name: worker_verified_group_living_arrangement_before_certification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 365.620
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          worker_verified_facility_operated_by_nonprofit_organization_or_institution
          and worker_verified_facility_certified_by_appropriate_state_agency
          and worker_verified_facility_authorized_resident_capacity <= maximum_residents_for_group_living_arrangement
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/365/620/block-1
              excerpt: "Before certifying a resident of a group living arrangement, the worker must verify that the facility is operated by a nonprofit organization or institution certified by the appropriate State agency and authorized to serve no more than 16 residents."
