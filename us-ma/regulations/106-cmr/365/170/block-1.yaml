format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/365/170/block-1
  summary: |-
    Except as provided in 106 CMR 365.170, action shall be taken on reported
    changes in accordance with the notification and timeliness standards
    specified in 106 CMR 366.100 through 366.220. PA households must be
    notified whenever their SNAP benefits are altered as a result of changes
    in their PA benefits. When the change requires a reduction in PA but an
    increase in SNAP, a PA notice of adverse action shall be issued; SNAP
    benefits shall not be increased until the household decides whether to
    appeal. If insufficient information exists to determine the effect on SNAP
    eligibility and benefit level, a Notice of SNAP Termination shall be sent;
    the household shall be entitled to uninterrupted benefits if it files an
    application by the 15th day of the last month of its certification period
    and completes its recertification responsibilities.
rules:
  - name: uninterrupted_benefits_reapplication_deadline_day_of_month
    kind: parameter
    dtype: Integer
    source: 106 CMR 365.170 - "files an application by the 15th day of the last month of its certification period"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/365/170/block-1
              excerpt: "files an application by the 15 th day of the last month of its certification period"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          15
  - name: household_entitled_to_uninterrupted_snap_benefits
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 365.170 - "shall be entitled to uninterrupted benefits if it files an application by the 15 th day of the last month of its certification period and completes its recertification responsibilities"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/365/170/block-1
              excerpt: "entitled to uninterrupted benefits if it files an application by the 15 th day of the last month of its certification period and completes its recertification responsibilities"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          snap_termination_notice_was_sent
          and household_is_eligible_for_snap_benefits
          and household_filed_reapplication_on_or_before_deadline_day
          and household_completed_recertification_responsibilities
  - name: snap_benefits_continue_at_previous_level_pending_appeal
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 365.170 - "If the household decides to appeal and its PA benefits are continued, the household's SNAP benefits shall continue at the previous level."
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/365/170/block-1
              excerpt: "If the household decides to appeal and its PA benefits are continued, the household's SNAP benefits shall continue at the previous level."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          pa_change_requires_pa_reduction_and_snap_increase
          and household_appealed_pa_adverse_action
          and pa_benefits_continued_pending_appeal
  - name: snap_termination_notice_required_for_pa_change
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 365.170 - "If there is insufficient information to determine the effect on the household's SNAP eligibility and benefit level, a Notice of SNAP Termination shall be sent."
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/365/170/block-1
              excerpt: "If there is insufficient information to determine the effect on the household's SNAP eligibility and benefit level, a Notice of SNAP Termination shall be sent."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          pa_household_circumstance_change_reported
          and not sufficient_information_to_determine_snap_effect
