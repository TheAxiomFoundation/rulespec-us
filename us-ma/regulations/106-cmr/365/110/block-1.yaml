format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/365/110/block-1
  summary: |-
    PA households are those households in which all members receive a cash
    grant under TAFDC or EAEDC. A TAFDC Full Employment Program (FEP)
    household will be considered a PA household even if it does not receive a
    cash grant.
rules:
  - name: is_pa_household
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 365.110 (PA household definition)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/365/110/block-1
              excerpt: |-
                PA households are those households in which all members
                receive a cash grant under one of the following programs:
                Transitional Aid to Families with Dependent Children (TAFDC),
                or Emergency Aid to the Elderly, Disabled, and Children
                (EAEDC). Even though a TAFDC Full Employment Program (FEP)
                household may not receive a cash grant, the household will be
                considered a PA household.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          all_members_receive_tafdc_cash_grant
          or all_members_receive_eaedc_cash_grant
          or household_is_tafdc_full_employment_program
