format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/365/700/block-1
  summary: |-
    A student is an individual enrolled in any kindergarten, grade school,
    vocational school, technical school, training program, college or
    university at least half-time as defined by the institution. A student's
    status is not altered during temporary periods of time in which the
    school is not in session, such as summer vacations or semester breaks,
    provided he or she is enrolled for the next regular session.
rules:
  - name: person_is_enrolled_in_qualifying_institution
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 106 CMR 365.700 (definition of student, first sentence)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/365/700/block-1
              excerpt: "enrolled in any kindergarten, grade school, vocational school, technical school, training program, college or university"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_enrolled_in_kindergarten
          or person_enrolled_in_grade_school
          or person_enrolled_in_vocational_school
          or person_enrolled_in_technical_school
          or person_enrolled_in_training_program
          or person_enrolled_in_college
          or person_enrolled_in_university
  - name: person_enrolled_at_least_half_time
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 106 CMR 365.700 (definition of student, first sentence)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/365/700/block-1
              excerpt: "at least half-time as defined by the institution"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_enrolled_in_qualifying_institution
          and person_enrollment_is_at_least_half_time_as_defined_by_institution
  - name: person_status_preserved_during_temporary_break
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 106 CMR 365.700 (definition of student, second sentence)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/365/700/block-1
              excerpt: "status is not altered during temporary periods of time in which the school is not in session, such as summer vacations or semester breaks, provided he or she is enrolled for the next regular session"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          school_is_in_temporary_non_session_period
          and person_is_enrolled_for_next_regular_session
  - name: student
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 106 CMR 365.700 (definition of student)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/365/700/block-1
              excerpt: "A student is an individual enrolled in any kindergarten, grade school, vocational school, technical school, training program, college or university at least half-time"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_enrolled_at_least_half_time
          or person_status_preserved_during_temporary_break
