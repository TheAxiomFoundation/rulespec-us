  summary: |-
    106 CMR 365.000 contains the SNAP policy and certification procedures for special situation households. Special certification procedures are prescribed when a household's receipt of income or other circumstances are substantially different from the typical SNAP household. These procedural deviations are intended to minimize any undue advantage or disadvantage to a household as a result of their unusual circumstances.
