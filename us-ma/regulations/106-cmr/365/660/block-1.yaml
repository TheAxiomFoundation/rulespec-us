  summary: |-
    USDA may disqualify or penalize an organization or institution if it is determined administratively or judicially that SNAP benefits were misappropriated or used for purchases that did not contribute to a certified household's meals. The worker shall promptly notify SNAP Management when there is reason to believe that an organization or institution is misusing SNAP benefits. The Department shall not take any action against the organization or institution before USDA takes action.
  status: deferred
