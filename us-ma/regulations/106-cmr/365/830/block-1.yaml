format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/365/830/block-1
  summary: |-
    The household's identity is the only eligibility factor that must be verified before expedited service is provided. The Social Security number requirements of 106 CMR 362.500 do not have to be met before expedited service is provided. These requirements must be met prior to the first full month of participation, unless good cause for not meeting these requirements is established. The applicant must register for work if subject to SNAP Work Requirements unless exempt or unless the household has designated an authorized representative. Every household member required to meet SNAP Work Requirements must register for work before expedited service is provided (this requirement shall be waived for disaster SNAP benefits). Identity must always be verified before expedited service is provided.
rules:
  - name: household_identity_verified
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 365.830 - "The household's identity is the only eligibility factor that must be verified before expedited service is provided."
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/365/830/block-1
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_identity_documented_or_collateral_contact_obtained
  - name: all_required_members_registered_for_work
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 365.830 - "Every household member required to meet SNAP Work Requirements must register for work before expedited service is provided"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/365/830/block-1
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          every_required_household_member_registered_for_work
          or household_designated_authorized_representative
          or household_receives_disaster_snap_benefits
  - name: expedited_service_pre_certification_requirements_met
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 365.830 - identity must always be verified and required members must register for work before expedited service is provided
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/365/830/block-1
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_identity_verified
          and all_required_members_registered_for_work
  - name: ssn_requirements_required_before_expedited_service
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 365.830 - "The Social Security number requirements of 106 CMR 362.500 ... do not have to be met before expedited service is provided."
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/365/830/block-1
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not household_seeks_expedited_service
