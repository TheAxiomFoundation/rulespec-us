format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/365/610/block-1
  summary: |-
    A drug or alcohol treatment and rehabilitation program is one managed by a publicly operated community mental health facility under part B of Title XIX of the Public Health Service Act or by a private nonprofit organization or institution. Residents of drug or alcohol treatment centers shall apply and be certified for SNAP benefits on their own behalf. The resident must authorize the transfer of their monthly SNAP benefit allotment to the center through the use of an on-site Point of Sale (POS) Terminal or Electronic Benefit Transfer (EBT) Manual Voucher System.
rules:
  - name: qualifying_drug_or_alcohol_treatment_program
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 106 CMR 365.610 block 1, sentence 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/365/610/block-1
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          program_managed_by_publicly_operated_community_mental_health_facility_under_title_xix_part_b
          or program_managed_by_private_nonprofit_organization_or_institution
  - name: resident_applies_for_snap_on_own_behalf
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 106 CMR 365.610 block 1, sentence 3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/365/610/block-1
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_resident_of_drug_or_alcohol_treatment_center
          and person_applied_for_snap_on_own_behalf
          and person_certified_for_snap_on_own_behalf
  - name: resident_authorized_allotment_transfer_to_center
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 106 CMR 365.610 block 1, sentence 4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/365/610/block-1
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_resident_of_drug_or_alcohol_treatment_center
          and (
            resident_authorized_transfer_via_on_site_pos_terminal
            or resident_authorized_transfer_via_ebt_manual_voucher_system
          )
