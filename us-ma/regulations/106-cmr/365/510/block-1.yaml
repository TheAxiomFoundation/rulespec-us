format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/365/510/block-1
  summary: |-
    Nondisqualified nonhousehold members shall be treated in accordance with the provisions of 106 CMR 365.510 (A) through (C). If otherwise eligible, nondisqualified nonhousehold members may be eligible as separate SNAP households.
rules:
  - name: nondisqualified_nonhousehold_member_may_be_separate_snap_household
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 106 CMR 365.510 block 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/365/510/block-1
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_nondisqualified_nonhousehold_member
          and person_is_otherwise_eligible_for_snap
