format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/365/940/block-1
  summary: |-
    Allowable costs of producing self-employment income include, but are not limited to, the identifiable costs of: labor; stock; raw materials; seed and fertilizer; payments on the principal of the purchase price of income-producing property and capital assets, equipment, machinery and other durable goods; interest paid to purchase income producing property; insurance premiums; taxes, assessments, and utilities paid on income-producing property; advertisement; licenses and permits; service and repair of income-producing property; legal and professional fees; and business supplies.
rules:
  - name: allowable_self_employment_cost
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: USD
    source: 106 CMR 365.940
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/365/940/block-1
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          max(0, labor_cost)
          + max(0, stock_cost)
          + max(0, raw_materials_cost)
          + max(0, seed_and_fertilizer_cost)
          + max(0, principal_payments_on_income_producing_property_cost)
          + max(0, interest_on_income_producing_property_cost)
          + max(0, insurance_premiums_cost)
          + max(0, taxes_assessments_and_utilities_on_income_producing_property_cost)
          + max(0, advertisement_cost)
          + max(0, licenses_and_permits_cost)
          + max(0, service_and_repair_of_income_producing_property_cost)
          + max(0, legal_and_professional_fees_cost)
          + max(0, business_supplies_cost)
