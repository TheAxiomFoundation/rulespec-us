format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/365/120/block-1
  summary: |-
    If the household provides the missing verification within the initial 30-day period, the
    Department must provide benefits from the date of application. If the household does not
    provide the missing verification or complete the application until the second 30 days, the
    Department must provide benefits from the date the household completes the application or
    furnishes the missing verification. If more than 60 days has elapsed from the date of
    initial application, the household would have to reapply for SNAP benefits.
rules:
  - name: snap_initial_processing_period_days
    kind: parameter
    dtype: Integer
    source: 106 CMR 365.120 (initial 30-day period)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/365/120/block-1
              excerpt: "the initial 30-day period"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30
  - name: snap_maximum_processing_period_days
    kind: parameter
    dtype: Integer
    source: 106 CMR 365.120 (more than 60 days reapplication threshold)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/365/120/block-1
              excerpt: "If more than 60 days has elapsed from the date of initial application, the household would have to reapply for SNAP benefits."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          60
  - name: snap_benefits_start_from_application_date
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 365.120 (benefits from date of application if verification within initial 30 days)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/365/120/block-1
              excerpt: "If the household provides the missing verification within the initial 30-day period, the Department must provide benefits from the date of application."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          days_since_initial_application <= snap_initial_processing_period_days
          and household_provided_missing_verification
  - name: snap_benefits_start_from_completion_date
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 365.120 (benefits from completion/verification date if completed in second 30 days)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/365/120/block-1
              excerpt: "If the household does not provide the missing verification or complete the application until the second 30 days, the Department must provide benefits from the date the household completes the application or furnishes the missing verification."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          days_since_initial_application > snap_initial_processing_period_days
          and days_since_initial_application <= snap_maximum_processing_period_days
          and household_provided_missing_verification
  - name: snap_reapplication_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 365.120 (reapplication required after 60 days)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/365/120/block-1
              excerpt: "If more than 60 days has elapsed from the date of initial application, the household would have to reapply for SNAP benefits."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          days_since_initial_application > snap_maximum_processing_period_days
