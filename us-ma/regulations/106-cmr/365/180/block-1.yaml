format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/365/180/block-1
  summary: |-
    Categorically eligible one-person and two-person households are entitled to a
    minimum of $16 per month except in the initial month. Categorically eligible
    households with three or more members who do not qualify for a benefit because
    their income exceeds the level at which benefits are issued cannot be denied;
    these households' benefits must be suspended.
rules:
  - name: categorical_eligibility_minimum_monthly_benefit
    kind: parameter
    dtype: Money
    unit: USD
    source: 106 CMR 365.180
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/365/180/block-1
              excerpt: "entitled to a minimum of $16 per month except in the initial month"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          16
  - name: small_household_categorical_minimum_snap_benefit
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 106 CMR 365.180
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/365/180/block-1
              excerpt: "Categorically eligible one-person and two-person households are entitled to a minimum of $16 per month except in the initial month."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if household_is_categorically_eligible
            and household_size <= 2
            and not is_initial_snap_month:
            categorical_eligibility_minimum_monthly_benefit
          else: 0
  - name: large_household_snap_benefits_must_be_suspended_for_excess_income
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 365.180
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/365/180/block-1
              excerpt: "Categorically eligible households with three or more members who do not qualify for a benefit because their income exceeds the level at which benefits are issued cannot be denied. These households' benefits must be suspended."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_is_categorically_eligible
          and household_size >= 3
          and household_income_exceeds_benefit_issuance_level
