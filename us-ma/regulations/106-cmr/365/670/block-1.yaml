            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/365/670/block-1
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (facility_is_treatment_center or facility_is_group_living_arrangement)
          and facility_is_disqualified_by_usda
