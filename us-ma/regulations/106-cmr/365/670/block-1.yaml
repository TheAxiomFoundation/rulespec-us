  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/365/670/block-1
  summary: |-
    The Department shall suspend the authorized representative status of any treatment center or group living arrangement that is disqualified by USDA. The authorized representative status shall remain suspended for as long as the facility is disqualified.
rules:
  - name: authorized_representative_status_suspended
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 365.670 block 1
