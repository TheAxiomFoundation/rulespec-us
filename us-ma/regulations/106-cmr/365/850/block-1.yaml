format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/365/850/block-1
  summary: |-
    Destitute (migrant) households must provide verification from sources outside the state before they are issued a third month's benefits. The third month's benefits shall be provided within seven working days from receipt of the verification or on the first day of the cyclical issuance period, whichever is later.
rules:
  - name: third_month_benefits_processing_days
    kind: parameter
    dtype: Integer
    source: 106 CMR 365.850
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/365/850/block-1
              excerpt: "within seven working days from receipt of the verification"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          7
  - name: destitute_migrant_household_third_month_verification_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 365.850 (destitute migrant verification requirement)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/365/850/block-1
              excerpt: "Destitute (migrant) households must provide verification from sources outside the state before they are issued a third month's benefits."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_is_destitute_migrant
          and month_is_third_consecutive_benefit_month
  - name: destitute_migrant_household_third_month_benefits_issuable
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 365.850 (third month issuance condition)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/365/850/block-1
              excerpt: "must provide verification from sources outside the state before they are issued a third month's benefits"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          out_of_state_verification_received
          or not destitute_migrant_household_third_month_verification_required
