format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/365/430/block-1
  summary: |-
    Teachers and other school employees who work under a renewable annual contract will be considered to be receiving compensation for an entire year even though pre-determined non-work periods are involved and actual compensation is paid during the work periods only.
rules:
  - name: person_receives_compensation_for_entire_year
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 106 CMR 365.430 block 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/365/430/block-1
              excerpt: "Teachers and other school employees who work under a renewable annual contract will be considered to be receiving compensation for an entire year"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_teacher_or_school_employee
          and person_works_under_renewable_annual_contract
