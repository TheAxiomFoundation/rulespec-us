format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/365/970/block-1
  summary: |-
    If the cost of producing self-employment income of farmers exceeds the income derived from self-employment, such losses shall be offset against any other countable income in the household, provided that the farmer has received or is anticipating receiving annual gross proceeds of $1000 or more from the farming enterprise; and provided that whatever base is used to determine any net income from self-employment farm operations, such as the previous year's tax return or current income, the same base is used in determining any net loss. Losses shall be prorated over the year in a manner comparable to that used to prorate farm self-employment income.
rules:
  - name: farm_self_employment_minimum_annual_gross_proceeds
    kind: parameter
    dtype: Money
    unit: USD
    source: 106 CMR 365.970
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/365/970/block-1
              excerpt: "annual gross proceeds of $1000 or more from the farming enterprise"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1000
  - name: farm_self_employment_loss_offsets_other_countable_income
    kind: derived
    entity: Household
    dtype: Judgment
    period: Year
    source: 106 CMR 365.970
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/365/970/block-1
              excerpt: "losses shall be offset against any other countable income in the household, provided that the farmer has received or is anticipating receiving annual gross proceeds of $1000 or more"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/365/970/block-1
              excerpt: "the same base is used in determining any net loss"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          farm_self_employment_cost_exceeds_income
          and farm_annual_gross_proceeds_received_or_anticipated >= farm_self_employment_minimum_annual_gross_proceeds
          and same_base_used_for_net_loss_as_for_net_income
