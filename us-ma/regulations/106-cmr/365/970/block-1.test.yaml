- name: farm_loss_offset_applies_when_all_conditions_met
  period:
    period_kind: custom
    name: calendar_year
    start: '2024-01-01'
    end: '2024-12-31'
  input:
    us-ma:regulations/106-cmr/365/970/block-1#input.farm_self_employment_cost_exceeds_income: true
    us-ma:regulations/106-cmr/365/970/block-1#input.farm_annual_gross_proceeds_received_or_anticipated: 1500
    us-ma:regulations/106-cmr/365/970/block-1#input.same_base_used_for_net_loss_as_for_net_income: true
  output:
    us-ma:regulations/106-cmr/365/970/block-1#farm_self_employment_minimum_annual_gross_proceeds: 1000
    us-ma:regulations/106-cmr/365/970/block-1#farm_self_employment_loss_offsets_other_countable_income: holds
- name: farm_loss_offset_blocked_when_no_loss
