  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/365/550/block-1
  summary: |-
    106 CMR 365.550 and the special provisions it contains, apply only to individuals residing in shelters for battered individuals and their children to whom the shelters provide meals. Shelters authorized by FNS of USDA to redeem SNAP benefits at a wholesale food store meet this definition. The Department shall take action to adjust the benefits of the resident's former SNAP household either by shortening that household's certification period and issuing a Notice of SNAP Termination (106 CMR 364.840) or by acting on the reported change and issuing a Notice of Adverse Action (106 CMR 364.860).
  deferred_outputs:
    - output: us-ma:regulations/106-cmr/365/550/block-1#shelter_for_battered_individuals_special_provisions_apply
      reason: |-
        Source is a scope/applicability and administrative-action clause for 106 CMR 365.550 referencing 106 CMR 364.840 (Notice of SNAP Termination) and 106 CMR 364.860 (Notice of Adverse Action). The substantive special provisions live in the rest of 365.550; this block only states scope, defines FNS-authorized shelters as meeting the definition, and directs the Department to adjust the former household's benefits. There is no source-stated computable amount, rate, threshold, or eligibility test in this block; encoding an executable output would be a pure paraphrase of a scope/administrative-duty clause.
