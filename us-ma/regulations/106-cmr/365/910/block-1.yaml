format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/365/910/block-1
  summary: |-
    Income from roomers, rental property, and boarders of a commercial boarding house is considered self-employment income for Program purposes. The income a household receives from a boarder, other than that received by a household who owns and operates a commercial boarding house, is also considered self-employment income.
rules:
  - name: commercial_boarding_house_income_is_self_employment
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 365.910 block 1 (roomers, rental property, and boarders of a commercial boarding house)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/365/910/block-1
              excerpt: "Income from roomers, rental property, and boarders of a commercial boarding house is considered self-employment income for Program purposes."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_has_income_from_roomers
          or household_has_income_from_rental_property
          or household_operates_commercial_boarding_house
  - name: non_commercial_boarder_income_is_self_employment
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 365.910 block 1 (boarder income other than commercial boarding house)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/365/910/block-1
              excerpt: "The income a household receives from a boarder, other than that received by a household who owns and operates a commercial boarding house, is also considered self-employment income"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_has_income_from_boarder
          and not household_operates_commercial_boarding_house
