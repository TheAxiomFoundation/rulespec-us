format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/362/310/block-1
  summary: |-
    Voluntary participants in an employment and training component will not be
    disqualified for failure to comply with employment and training requirements.
    Persons claiming temporary unfitness for employment due to illness will be
    required to meet work requirements once they become physically or mentally
    fit. If a child has his or her sixth birthday within a certification period,
    the caregiver shall fulfill the work requirements at the next scheduled
    recertification, unless the caregiver qualifies for another exemption. An
    exempt teen who turns 18 within a certification period must fulfill the work
    registration requirement at the next scheduled recertification unless he or
    she qualifies for another exemption. A person who loses exemption status due
    to a reportable change must register for work when the change is reported;
    those who lose exemption due to a non-reportable change must register at the
    household's next recertification. Persons enrolled less than half-time or
    who experience a break in enrollment do not qualify for the student
    exemption.
rules:
  - name: voluntary_et_participant_disqualified_for_noncompliance
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 106 CMR 362.310 - voluntary E&T participants not disqualified
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/362/310/block-1
              excerpt: |-
                Voluntary participants in an employment and training component
                will not be disqualified for failure to comply with employment
                and training requirements.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not person_is_voluntary_et_participant
          and person_failed_to_comply_with_et_requirements
          and person_disqualified_for_et_noncompliance
  - name: temporarily_unfit_person_must_meet_work_requirements
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 106 CMR 362.310 - temporary unfitness exemption ends when fit
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/362/310/block-1
              excerpt: |-
                Persons claiming temporary unfitness for employment due to
                illness will be required to meet work requirements once they
                become physically or mentally fit.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_claimed_temporary_unfitness_for_employment
          and person_is_physically_and_mentally_fit
  - name: caregiver_must_fulfill_work_requirements_at_next_recertification_due_to_child_age_six
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 106 CMR 362.310 - child sixth birthday within certification period
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/362/310/block-1
              excerpt: |-
                If the child has his or her sixth birthday within a
                certification period, the caregiver of the child shall fulfill
                the work requirements at the next scheduled recertification,
                unless the caregiver qualifies for another exemption.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          caregiver_of_child_who_turned_six_within_certification_period
          and current_month_is_next_scheduled_recertification
          and not caregiver_qualifies_for_another_work_requirement_exemption
  - name: teen_must_fulfill_work_registration_at_next_recertification_due_to_age_eighteen
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 106 CMR 362.310 - exempt teen turning 18 within certification period
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/362/310/block-1
              excerpt: |-
                An exempt teen who turns 18 years of age within a certification
                period must fulfill the work registration requirement at the
                next scheduled recertification unless he or she qualifies for
                another exemption.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_was_exempt_teen_who_turned_eighteen_within_certification_period
          and current_month_is_next_scheduled_recertification
          and not person_qualifies_for_another_work_registration_exemption
  - name: person_must_register_for_work_after_loss_of_exemption
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 106 CMR 362.310 - loss of exemption due to change in circumstances
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/362/310/block-1
              excerpt: |-
                A person who loses his or her exemption status due to changes
                in circumstances that he or she is required to report as a
                condition of SNAP certification must register for work when the
                change is reported. Those persons who lose their exemption due
                to a change in circumstances that is not subject to the
                reporting requirements must register for work at their
                household's next recertification.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_lost_exemption_status_due_to_change_in_circumstances
          and (
            (change_in_circumstances_is_subject_to_reporting_requirements
             and change_in_circumstances_has_been_reported)
            or (
              not change_in_circumstances_is_subject_to_reporting_requirements
              and current_month_is_household_next_recertification
            )
          )
  - name: student_qualifies_for_student_exemption
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 106 CMR 362.310 - student exemption disqualifying conditions
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/362/310/block-1
              excerpt: |-
                Persons enrolled less than half-time or who experience a break
                in their enrollment status due to graduation, expulsion or
                suspension, or who drop out or otherwise do not intend to
                return to school do not qualify for this exemption.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_would_otherwise_qualify_for_student_exemption
          and not person_enrolled_less_than_half_time
          and not person_experienced_break_in_enrollment_due_to_graduation_expulsion_or_suspension
          and not person_dropped_out_or_does_not_intend_to_return_to_school
