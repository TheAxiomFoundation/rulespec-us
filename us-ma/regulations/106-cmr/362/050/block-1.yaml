  summary: |-
    106 CMR 362.000 describes the nonfinancial eligibility standards that must be met by SNAP applicants and clients. Nonfinancial eligibility standards are residency, citizenship, alien status, student eligibility, and work registration. These eligibility standards must be met by all household members before a household's financial eligibility is determined.
