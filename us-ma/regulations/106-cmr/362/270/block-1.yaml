format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/362/270/block-1
  summary: The deeming of income and assets rules for sponsored noncitizens do not
    apply to categorically eligible households as defined in 106 CMR 365.180. Deeming
    rules will be applied to any household containing a member disqualified due to
    failure to comply with the ABAWD Work Program at 106 CMR 362.320, failure to comply
    with TAFDC Income Reporting requirements at 106 CMR 366.110, or any of the reasons
    listed in 106 CMR 367.800. In addition, non-SSI elder and/or disabled households
    with income, not including the income of the sponsor(s), that exceeds the Categorical
    Eligibility Gross Income Standards at 106 CMR 364.976 will be subject to sponsor
    deeming requirements. The sponsored noncitizen shall be ineligible. Each indigence
    determination is effective for 12 months and may be renewed for additional 12-month
    periods. No quarter may be claimed after December 31, 1996 if benefits from a
    means tested program were received from any state during that same quarter.
rules:
- name: indigency_determination_period_months
  kind: parameter
  dtype: Integer
  source: 106 CMR 362.270 ("Each indigence determination is effective for 12 months
    and may be renewed for additional 12-month periods.")
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-ma/regulation/106-cmr/362/270/block-1
          excerpt: Each indigence determination is effective for 12 months and may
            be renewed for additional 12-month periods.
  versions:
  - effective_from: '0001-01-01'
    formula: '12'
- name: sponsor_deeming_applies
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: 106 CMR 362.270 (deeming rules application and categorical eligibility exemption)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-ma/regulation/106-cmr/362/270/block-1
          excerpt: The deeming of income and assets rules for sponsored noncitizens
            do not apply to categorically eligible households
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-ma/regulation/106-cmr/362/270/block-1
          excerpt: will be applied to any household which contains a member disqualified
            from receiving SNAP benefits
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-ma/regulation/106-cmr/362/270/block-1
          excerpt: non-SSI elder and/or disabled households with income, not including
            the income of the sponsor(s), that exceeds the Categorical Eligibility
            Gross Income Standards
  versions:
  - effective_from: '0001-01-01'
    formula: "not household_is_categorically_eligible\nand (household_contains_member_failing_abawd_work_program\n\
      \     or household_contains_member_failing_tafdc_income_reporting\n     or household_contains_member_disqualified_under_367_800\n\
      \     or (household_is_non_ssi_elder_or_disabled\n         and household_income_excluding_sponsor_exceeds_gross_standard))"
- name: sponsored_noncitizen_ineligible
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: 106 CMR 362.270 ("The sponsored noncitizen shall be ineligible.")
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-ma/regulation/106-cmr/362/270/block-1
          excerpt: The sponsored noncitizen shall be ineligible.
  versions:
  - effective_from: '0001-01-01'
    formula: 'person_is_sponsored_noncitizen

      and person_household_subject_to_sponsor_deeming'
- name: indigency_determination_active
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: 106 CMR 362.270 (12-month indigence determination effectiveness)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-ma/regulation/106-cmr/362/270/block-1
          excerpt: Each indigence determination is effective for 12 months and may
            be renewed for additional 12-month periods.
  versions:
  - effective_from: '0001-01-01'
    formula: 'indigency_determination_made

      and months_since_indigency_determination < indigency_determination_period_months'
- name: battery_or_cruelty_exception_renewable
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: 106 CMR 362.270 (battery or cruelty exception review after 12-month period)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-ma/regulation/106-cmr/362/270/block-1
          excerpt: This exception may be reviewed and benefits continued after the
            12-month period if the noncitizen demonstrates that such battery or cruelty
            described above has been recognized in an order of a judge or administrative
            law judge or a prior determination of the USCIS, and that such battery
            or cruelty has a substantial connection to the need for benefits.
  versions:
  - effective_from: '0001-01-01'
    formula: 'battery_or_cruelty_recognized_in_judicial_order

      and battery_or_cruelty_has_substantial_connection_to_need_for_benefits'
- name: quarter_excluded_from_count
  kind: derived
  entity: Person
  dtype: Judgment
  period: Year
  source: 106 CMR 362.270 (quarter exclusion when means-tested benefits received)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-ma/regulation/106-cmr/362/270/block-1
          excerpt: no quarter may be claimed after December 31, 1996 if benefits from
            a means tested program were received from any state during that same quarter.
  versions:
  - effective_from: '0001-01-01'
    formula: 'quarter_is_after_means_tested_cutoff_date

      and means_tested_benefits_received_in_quarter'
