format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/362/420/block-1
  summary: |-
    Enrollment status begins on first day of school term, continues through normal class attendance, vacation and recess unless the student graduates, is suspended or expelled, drops out, or does not intend to register for the next normal school term (excluding summer school).
rules:
  - name: student_enrollment_status_continues
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 106 CMR 362.420 block 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/362/420/block-1
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          school_term_has_begun
          and not student_has_graduated
          and not student_is_suspended
          and not student_is_expelled
          and not student_has_dropped_out
          and not student_does_not_intend_to_register_for_next_normal_school_term
