format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/362/340/block-1
  summary: |-
    Persons disqualified for quitting a job without good cause carry their sanction
    to a new household. Federal, state, or local government employees dismissed for
    participating in a strike are considered to have voluntarily quit without good
    cause. If a household reapplies with less than 30 days remaining in the
    disqualification period, the Department uses the same application to deny
    benefits for the remainder of the disqualification period and to certify the
    household for subsequent month(s) if all other eligibility criteria are met,
    in accordance with 106 CMR 364.110(A).
rules:
  - name: same_application_remaining_disqualification_days_threshold
    kind: parameter
    dtype: Integer
    source: 106 CMR 362.340
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/362/340/block-1
              excerpt: "less than 30 days remaining in the disqualification period"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30
  - name: sanction_carries_to_new_household
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 106 CMR 362.340
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/362/340/block-1
              excerpt: "Persons who have been disqualified for quitting a job without good cause will carry their sanction with them if they join a new household."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_disqualified_for_quitting_job_without_good_cause
          and person_joined_new_household
  - name: strike_dismissal_treated_as_voluntary_quit_without_good_cause
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 106 CMR 362.340 Exception
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/362/340/block-1
              excerpt: "Federal, state, or local government employees who participate in a strike against such employers and who are dismissed from their jobs because of participation in the strike shall be considered to have voluntarily quit their job without good cause."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_federal_state_or_local_government_employee
          and person_participated_in_strike_against_such_employer
          and person_was_dismissed_for_strike_participation
  - name: same_application_used_for_remaining_disqualification_and_subsequent_months
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 362.340
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/362/340/block-1
              excerpt: "If a household reapplies with less than 30 days remaining in the disqualification period, the Department shall use the same application to deny benefits for the remainder of the disqualification period and to certify the household for subsequent month(s)"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_reapplied_during_disqualification_period
          and household_days_remaining_in_disqualification_period < same_application_remaining_disqualification_days_threshold
