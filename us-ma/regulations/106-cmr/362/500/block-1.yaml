format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/362/500/block-1
  summary: |-
    Once the SSN has been issued or validated, the Department will verify the SSN by computer match with SSA. Good cause must be verified monthly until the SSN is provided and verified by computer match with SSA in accordance with 106 CMR 362.500 (B)(1). The Department need not obtain the prior approval of the applicant or client to acquire and use the information from the sources and for the reasons indicated in 106 CMR 362.500 (D).
