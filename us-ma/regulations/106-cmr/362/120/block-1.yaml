format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/362/120/block-1
  summary: |-
    Residency shall be verified before initial certification except in unusual cases (such as homeless households, certain migrant farmworker households, or households that have just arrived in the state) where verification of residency cannot reasonably be accomplished.
rules:
  - name: household_is_unusual_case_for_residency_verification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 362.120 (unusual cases clause)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/362/120/block-1
              excerpt: "unusual cases (such as homeless households, certain migrant farmworker households, or households that have just arrived in the state) where verification of residency cannot reasonably be accomplished"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (household_is_homeless
          or household_is_migrant_farmworker_unable_to_verify_residency
          or household_just_arrived_in_state)
          and residency_verification_cannot_reasonably_be_accomplished
  - name: residency_verification_required_before_initial_certification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 362.120 (residency verification rule)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/362/120/block-1
              excerpt: "Residency shall be verified before initial certification except in unusual cases ... where verification of residency cannot reasonably be accomplished"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_is_applying_for_initial_certification
          and not household_is_unusual_case_for_residency_verification
