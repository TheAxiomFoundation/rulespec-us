format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/362/400/block-1
  summary: |-
    An institution of post-secondary education is any public or private
    educational institution that admits persons who are beyond the age of
    compulsory school attendance in the state in which the institution is
    located or normally requires a high school diploma or equivalency
    certificate for enrollment. The institution must be legally authorized
    or recognized by the state to provide an educational program beyond
    secondary education in the state or to provide a training program that
    will prepare students for gainful employment.
