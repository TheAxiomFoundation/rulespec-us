format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/362/330/block-1
  summary: |-
    Good cause for failure to meet the general SNAP work requirements
    found at 106 CMR 362.310 exists in the following situations:
    crisis/emergency (such as death, health emergency, domestic violence,
    or a child's school problem); breakdown of suitable state-standard
    childcare (with appropriate verification from the childcare provider
    or designated agency); and unavailability of suitable childcare for
    children with identified special needs. The individual may not refuse
    a Department referral to a childcare facility that provides suitable
    state-standard childcare within a reasonable distance. The good cause
    criteria described in 106 CMR 362.330(B) applies to SNAP work
    requirements only; they do not apply to ABA WD work program
    requirements.
rules:
  - name: crisis_or_emergency_situation_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 106 CMR 362.330(B) - crisis or emergency situations (death, health emergency, domestic violence, child's school problem)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/362/330/block-1
              excerpt: "Examples of crisis or emergency situations include, but are not limited to, a death, a health emergency, domestic violence or a child's school problem"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_experienced_death
          or person_experienced_health_emergency
          or person_experienced_domestic_violence
          or person_experienced_child_school_problem
          or person_experienced_other_crisis_or_emergency
  - name: childcare_breakdown_good_cause_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 106 CMR 362.330(B) - breakdown of suitable, state-standard childcare with appropriate verification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/362/330/block-1
              excerpt: "If there is a breakdown of suitable, state-standard childcare which is not provided through a designated agency under contract with the Department appropriate verifications, such as a statement from the childcare provider, must be submitted."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_has_suitable_state_standard_childcare_breakdown
          and person_submitted_childcare_breakdown_verification
          and not person_refused_department_referral_to_suitable_childcare
  - name: special_needs_childcare_unavailable_good_cause_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 106 CMR 362.330(B) - unavailability of suitable childcare for children with identified special needs, verified
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/362/330/block-1
              excerpt: "Unavailability of suitable childcare for children with identified special needs shall be verified by"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_has_unavailable_special_needs_childcare
          and person_submitted_special_needs_childcare_verification
  - name: snap_work_requirement_good_cause_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 106 CMR 362.330(B) - good cause criteria applies to SNAP work requirements only; not to ABA WD work program requirements
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/362/330/block-1
              excerpt: "The good cause criteria described in 106 CMR 362.330 (B) applies to SNAP work requirements only. They do not apply to ABA WD work program requirements."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (crisis_or_emergency_situation_applies
            or childcare_breakdown_good_cause_applies
            or special_needs_childcare_unavailable_good_cause_applies)
          and work_requirement_is_snap_work_requirement
          and not work_requirement_is_aba_wd_work_program_requirement
