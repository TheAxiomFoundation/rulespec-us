    corpus_citation_path: us-ma/regulation/106-cmr/362/110/block-1
  summary: |-
    The application contains spaces for both a physical address and a mailing address. If the two are different, the worker will request that both addresses be given. A mailing address only, such as a post office box or a rural route, will not be sufficient as it does not indicate where the household lives. If the address is a rural route, information should be given to identify the exact location of the home.
