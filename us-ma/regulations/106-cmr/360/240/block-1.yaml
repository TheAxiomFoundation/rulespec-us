  summary: |-
    The Department shall obtain racial and ethnic data on households in the manner specified by FNS. Applicants shall be asked to identify voluntarily their race or ethnicity on the application form. When the information is not voluntarily provided on the application form, alternative methods of gathering the data, such as observation during the interview, will be employed.
