  summary: |-
    The case record serves as documentation to support SNAP eligibility, ineligibility, and benefit level determinations. The case record shall include, but not be limited to, copies of applications for certification and recertification, Department notices sent to clients and any related responses, verifications received, case narratives and actions related to the fair hearing process.
