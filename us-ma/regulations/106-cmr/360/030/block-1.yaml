format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/360/030/block-1
  summary: |-
    Definitions: EBT, Homeless Individual (lacks fixed regular nighttime residence or primary nighttime residence is a supervised shelter, halfway house/similar institution, temporary accommodation in another's residence for no more than 90 days, or place not designed/ordinarily used as regular sleeping accommodation); Household; Household Disaster (declared by President or FEMA); Household Misfortune (loss of food due to loss of power/fire/flood not declared a disaster); Means-tested Program (lists SNAP, TAFDC, EAEDC, EA, SSI, SSP, Medicaid, SCHIP, TANF, Food Assistance in PR/AS/CNMI, Veterans' Service benefits); Month (cyclical month determined by last digit of SSN of head of household); SNAP Benefits.
rules:
  - name: max_days_temporary_accommodation_in_other_residence
    kind: parameter
    dtype: Integer
    source: 106 CMR 360.030 (Homeless Individual)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/360/030/block-1
              excerpt: "A temporary accommodation in the residence of another individual for no more than 90 days"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          90
  - name: individual_is_homeless
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: 106 CMR 360.030 (Homeless Individual)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/360/030/block-1
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_lacks_fixed_and_regular_nighttime_residence
          or primary_nighttime_residence_is_supervised_temporary_shelter
          or primary_nighttime_residence_is_halfway_house_or_similar_institution
          or (primary_nighttime_residence_is_temporary_accommodation_in_another_residence
              and days_in_temporary_accommodation_in_another_residence <= max_days_temporary_accommodation_in_other_residence)
          or primary_nighttime_residence_is_not_designed_for_regular_sleeping_accommodation
  - name: event_is_household_disaster
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 106 CMR 360.030 (Household Disaster)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/360/030/block-1
              excerpt: "An emergency situation declared a disaster by the President or the Federal Emergency Management Agency."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          emergency_situation_declared_disaster_by_president
          or emergency_situation_declared_disaster_by_fema
  - name: event_is_household_misfortune
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 106 CMR 360.030 (Household Misfortune)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/360/030/block-1
              excerpt: "A loss of food due to, but not limited to, loss of power, fire or flood that is not declared a disaster"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_experienced_loss_of_food_due_to_loss_of_power_fire_or_flood
          and not event_is_household_disaster
  - name: program_is_means_tested
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: 106 CMR 360.030 (Means-tested Program)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/360/030/block-1
              excerpt: "Supplemental Nutrition Assistance Program (SNAP), Transitional Assistance to Families with Dependent Children (TAFDC), Emergency Aid to the Elderly, Disabled and Children (EAEDC), Emergency Assistance (EA), Supplemental Security Income (SSI), State Supplement Program (SSP) to SSI, Medicaid, State Child Health Insurance (SCHIP), Temporary Assistance for Needy Families (TANF), Food Assistance Programs in Puerto Rico, American Samoa and the Northern Mariana Islands (CNMI) and Veterans' Service benefits"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          program_is_snap
          or program_is_tafdc
          or program_is_eaedc
          or program_is_emergency_assistance
          or program_is_ssi
          or program_is_ssp_to_ssi
          or program_is_medicaid
          or program_is_schip
          or program_is_tanf
          or program_is_food_assistance_in_puerto_rico
          or program_is_food_assistance_in_american_samoa
          or program_is_food_assistance_in_cnmi
          or program_is_veterans_service_benefits
