  summary: |-
    The Maximum Allowable Net Income Standards are based on household size and are adjusted annually by USDA/FNS. For more details on determining eligibility based on net income, see 106 CMR 364.550. Public Assistance categorically eligible households do not have to meet either the gross or net income eligibility standards. SNAP-only TANF Services Households are subject to the Gross Monthly Categorical Eligibility Standards at 106 CMR 364.976.
