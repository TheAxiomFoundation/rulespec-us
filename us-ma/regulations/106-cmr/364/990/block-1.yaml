format: rulespec/v1
module:
  status: deferred
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/364/990/block-1
  summary: |-
    SNAP Allotment Proration Table (S.L. 667, 11/21/1983). Two-dimensional
    lookup table keyed by monthly allotment amount (rows 1-400) and day of
    cyclical month (columns 1-30/31), returning the prorated initial SNAP
    allotment in dollars. The table provides approximately 12,000 published
    cells with no separately stated computational formula in the source text.
  deferred_outputs:
    - output: us-ma:regulations/106-cmr/364/990/block-1#prorated_snap_allotment
      reason: |-
        The source is a two-dimensional published proration table indexed by
        monthly allotment amount (1-400) and day of the cyclical month (1-31).
        The RuleSpec `kind: parameter` with `indexed_by` schema supports a
        single row-key axis (e.g., household size or income band), not a 2D
        amount-by-day matrix, and the source does not state a computational
        formula that the table implements. Encoding the ~12,000 published
        cells as match arms or numeric literals inside a derived formula is
        prohibited by encoding guidance. Defer until a 2D indexed parameter
        surface is supported or until the underlying computational formula
        from S.L. 667 (11/21/1983) is available as a separate source.
rules: []
