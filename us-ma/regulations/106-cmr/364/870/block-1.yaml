format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/364/870/block-1
  summary: |-
    The Unintentional Program Violation Claim Demand Letter shall be sent to all households whenever an overissuance of SNAP benefits occurs unless the amount of the claim is less than $125 or the minimum recovery threshold established by the Department, whichever is higher, unless the household is currently receiving SNAP benefits or the household cannot be located.
rules:
  - name: minimum_claim_amount
    kind: parameter
    dtype: Money
    unit: USD
    source: 106 CMR 364.870
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/364/870/block-1
              excerpt: "less than $125"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          125
  - name: applicable_claim_threshold
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 106 CMR 364.870
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/364/870/block-1
              excerpt: "less than $125 or the minimum recovery threshold established by the Department, whichever is higher"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          max(minimum_claim_amount, department_minimum_recovery_threshold)
  - name: unintentional_program_violation_claim_demand_letter_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 364.870
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/364/870/block-1
              excerpt: "shall be sent to all households whenever an overissuance of SNAP benefits occurs unless the amount of the claim is less than $125 or the minimum recovery threshold established by the Department, whichever is higher, unless the household is currently receiving SNAP benefits or the household cannot be located"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          snap_overissuance_occurred
          and claim_amount >= applicable_claim_threshold
          and not household_currently_receiving_snap
          and not household_cannot_be_located
