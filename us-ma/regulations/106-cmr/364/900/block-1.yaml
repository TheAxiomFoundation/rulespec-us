format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/364/900/block-1
  summary: |-
    The statement must be received by the Department within ten days of the date of the report. If the tenth day falls on a weekend or holiday, and the statement is received the day after the weekend or holiday, the Department shall consider the statement timely received. The Department shall mail the household to the address on file a notice that includes the date benefits will be expunged ... This notice must be mailed no later than 30 days before the date of expungement.
rules:
  - name: statement_deadline_days
    kind: parameter
    dtype: Integer
    source: 106 CMR 364.900 (statement received within ten days of the date of the report)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/364/900/block-1
              excerpt: "received by the Department within ten days of the date of the report"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10
  - name: expungement_notice_minimum_days
    kind: parameter
    dtype: Integer
    source: 106 CMR 364.900 (notice must be mailed no later than 30 days before the date of expungement)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/364/900/block-1
              excerpt: "no later than 30 days before the date of expungement"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30
  - name: statement_timely_received
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 106 CMR 364.900 (statement timely if within ten days, or weekend/holiday extension)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/364/900/block-1
              excerpt: "If the tenth day falls on a weekend or holiday, and the statement is received the day after the weekend or holiday, the Department shall consider the statement timely received."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          days_between_report_and_statement_received <= statement_deadline_days
          or (tenth_day_after_report_is_weekend_or_holiday
              and statement_received_on_day_after_weekend_or_holiday)
  - name: expungement_notice_timely_mailed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 106 CMR 364.900 (notice mailed no later than 30 days before expungement)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/364/900/block-1
              excerpt: "This notice must be mailed no later than 30 days before the date of expungement."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          days_between_notice_mailed_and_expungement_date >= expungement_notice_minimum_days
