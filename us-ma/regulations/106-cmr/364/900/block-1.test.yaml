- name: statement_received_within_ten_days_is_timely
  period:
    period_kind: custom
    name: day
    start: '2024-01-15'
    end: '2024-01-15'
  input:
    us-ma:regulations/106-cmr/364/900/block-1#input.days_between_report_and_statement_received: 7
    us-ma:regulations/106-cmr/364/900/block-1#input.tenth_day_after_report_is_weekend_or_holiday: false
    us-ma:regulations/106-cmr/364/900/block-1#input.statement_received_on_day_after_weekend_or_holiday: false
    us-ma:regulations/106-cmr/364/900/block-1#input.days_between_notice_mailed_and_expungement_date: 45
  output:
    us-ma:regulations/106-cmr/364/900/block-1#statement_deadline_days: 10
    us-ma:regulations/106-cmr/364/900/block-1#expungement_notice_minimum_days: 30
    us-ma:regulations/106-cmr/364/900/block-1#statement_timely_received: holds
    us-ma:regulations/106-cmr/364/900/block-1#expungement_notice_timely_mailed: holds
- name: statement_received_after_ten_days_not_timely
  period:
    period_kind: custom
    name: day
    start: '2024-01-20'
    end: '2024-01-20'
  input:
    us-ma:regulations/106-cmr/364/900/block-1#input.days_between_report_and_statement_received: 12
    us-ma:regulations/106-cmr/364/900/block-1#input.tenth_day_after_report_is_weekend_or_holiday: false
    us-ma:regulations/106-cmr/364/900/block-1#input.statement_received_on_day_after_weekend_or_holiday: false
    us-ma:regulations/106-cmr/364/900/block-1#input.days_between_notice_mailed_and_expungement_date: 20
  output:
    us-ma:regulations/106-cmr/364/900/block-1#statement_timely_received: not_holds
    us-ma:regulations/106-cmr/364/900/block-1#expungement_notice_timely_mailed: not_holds
- name: weekend_or_holiday_extension_makes_statement_timely
  period:
    period_kind: custom
    name: day
    start: '2024-02-12'
    end: '2024-02-12'
  input:
    us-ma:regulations/106-cmr/364/900/block-1#input.days_between_report_and_statement_received: 11
    us-ma:regulations/106-cmr/364/900/block-1#input.tenth_day_after_report_is_weekend_or_holiday: true
    us-ma:regulations/106-cmr/364/900/block-1#input.statement_received_on_day_after_weekend_or_holiday: true
    us-ma:regulations/106-cmr/364/900/block-1#input.days_between_notice_mailed_and_expungement_date: 30
  output:
    us-ma:regulations/106-cmr/364/900/block-1#statement_timely_received: holds
    us-ma:regulations/106-cmr/364/900/block-1#expungement_notice_timely_mailed: holds
- name: late_after_weekend_still_not_timely_and_notice_too_late
  period:
    period_kind: custom
    name: day
    start: '2024-03-15'
    end: '2024-03-15'
  input:
    us-ma:regulations/106-cmr/364/900/block-1#input.days_between_report_and_statement_received: 13
    us-ma:regulations/106-cmr/364/900/block-1#input.tenth_day_after_report_is_weekend_or_holiday: true
    us-ma:regulations/106-cmr/364/900/block-1#input.statement_received_on_day_after_weekend_or_holiday: false
    us-ma:regulations/106-cmr/364/900/block-1#input.days_between_notice_mailed_and_expungement_date: 29
  output:
    us-ma:regulations/106-cmr/364/900/block-1#statement_timely_received: not_holds
