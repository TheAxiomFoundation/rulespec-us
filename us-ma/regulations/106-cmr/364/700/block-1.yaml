format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/364/700/block-1
  summary: |-
    At the end of the certification period, benefits will be terminated without the right to a pretermination hearing for any household that fails, without good cause, to timely comply with its responsibilities for recertification.
rules:
  - name: benefits_terminated_without_pretermination_hearing
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 364.700 block-1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/364/700/block-1
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          certification_period_has_ended
          and household_failed_to_timely_comply_with_recertification
          and not household_has_good_cause_for_recertification_failure
