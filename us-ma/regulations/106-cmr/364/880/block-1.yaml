format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/364/880/block-1
  summary: |-
    The Intentional Program Violation Claim Demand Letter shall be sent to households found to have committed an Intentional Program Violation by Administrative Disqualification Hearing, court, signed waiver under 106 CMR 367.660, or consent agreement. It must be sent even if a Claim Demand Letter has already been sent. Repayment options shall be included in the repayment agreement letter in accordance with 106 CMR 367.825(C).
  status: deferred
  deferred_outputs:
    - output: us-ma:regulations/106-cmr/364/880/block-1#ipv_claim_demand_letter_required
      reason: |-
        The source states an administrative duty to send the Intentional Program
        Violation Claim Demand Letter to households found to have committed an IPV
        and to include repayment options per 106 CMR 367.825(C). This is an
        administrative furnishing/duty clause without a computable policy
        condition, amount, rate, threshold, or eligibility test. Per encoding
        guidance, administrative duty clauses are preserved in module.summary but
        not encoded as executable derived outputs.
rules: []
