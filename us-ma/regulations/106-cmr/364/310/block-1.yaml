format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/364/310/block-1
  summary: |-
    The Department shall count income already received during the certification period and any anticipated income the household and the Department are reasonably certain will be received during the remainder of the certification period. If the amount of income or timing of the income receipt is uncertain, that portion of the household's income shall not be counted. Where receipt of income is reasonably certain but the monthly amount may fluctuate, the household may choose to have their income averaged.
rules:
  - name: anticipated_income_is_reasonably_certain
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 364.310 block 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/364/310/block-1
              excerpt: "anticipated income the household and the Department are reasonably certain will be received"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          anticipated_income_amount_is_reasonably_certain
          and anticipated_income_timing_is_reasonably_certain
  - name: countable_anticipated_income
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 106 CMR 364.310 block 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/364/310/block-1
              excerpt: "If the exact amount of the income is not known, only that portion anticipated with reasonable certainty will be considered income."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if anticipated_income_is_reasonably_certain: anticipated_income_portion_reasonably_certain else: 0
  - name: household_may_elect_income_averaging
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 364.310 block 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/364/310/block-1
              excerpt: "Where receipt of income is reasonably certain but the monthly amount may fluctuate, the household may choose to have their income averaged."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          anticipated_income_timing_is_reasonably_certain
          and anticipated_income_monthly_amount_may_fluctuate
