format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/364/980/block-1
  summary: 'A client who is eligible for SNAP benefits will receive 100% of the SNAP

    benefit allotment listed in the Program Issuance Tables. The standards in

    the SNAP Issuance Tables are based on household size and are adjusted

    annually by USDA/FNS.'
rules:
- name: snap_allotment_percentage
  kind: parameter
  dtype: Rate
  source: 106 CMR 364.980
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-ma/regulation/106-cmr/364/980/block-1
          excerpt: will receive 100% of the SNAP benefit allotment listed in the Program
            Issuance Tables
  versions:
  - effective_from: '0001-01-01'
    formula: '1.0'
- name: snap_benefit_allotment
  kind: derived
  entity: Person
  dtype: Money
  period: Month
  unit: USD
  source: 106 CMR 364.980
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-ma/regulation/106-cmr/364/980/block-1
          excerpt: A client who is eligible for SNAP benefits will receive 100% of
            the SNAP benefit allotment listed in the Program Issuance Tables
  versions:
  - effective_from: '0001-01-01'
    formula: 'if household_is_eligible_for_snap: snap_allotment_percentage * snap_issuance_table_allotment
      else: 0'
