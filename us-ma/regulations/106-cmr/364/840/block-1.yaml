  summary: |-
    A Notice of Expiration shall be issued to all SNAP households before the end of their certification period. For households certified for three months or longer, the notice shall be sent no earlier than the first day of the next to last month of certification or no later than the last day of the next to last month of certification. When the Department cannot provide the notice by this date, because the household is certified for two months or less, the notice shall be provided at the time of certification.
  status: deferred
