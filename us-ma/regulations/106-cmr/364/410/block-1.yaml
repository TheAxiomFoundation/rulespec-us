format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/364/410/block-1
  summary: |-
    For households with a history of three or more months of paying child support, average at least three months' payments (including arrearages), taking into account any change in the legal obligation, and use this average as the household's support deduction. For households with either no or less than a three-month child support payment history, estimate the anticipated payments (excluding arrearages) and use this estimate as the household's support deduction.
rules:
  - name: child_support_history_minimum_months
    kind: parameter
    dtype: Integer
    source: 106 CMR 364.410
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/364/410/block-1
              excerpt: "three or more months"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          3
  - name: child_support_deduction
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 106 CMR 364.410
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/364/410/block-1
              excerpt: "use this average as the household's support deduction"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/364/410/block-1
              excerpt: "use this estimate as the household's support deduction"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if household_child_support_payment_history_months >= child_support_history_minimum_months: max(0, household_average_child_support_payment_including_arrearages) else: max(0, household_anticipated_child_support_payment_excluding_arrearages)
