format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/364/320/block-1
  summary: |-
    Income received during the previous four consecutive weeks shall be used as
    an indicator of anticipated income. If income fluctuates to the extent that
    a consecutive four week period alone cannot provide an accurate indication,
    the Department and the household may use a longer period of past time
    (e.g., eight weeks). The Department shall not automatically attribute past
    income to the household, nor use past income as an indicator of anticipated
    income when changes in income have occurred or can be anticipated during
    the certification period.
rules:
  - name: default_anticipated_income_lookback_weeks
    kind: parameter
    dtype: Integer
    source: 106 CMR 364.320
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/364/320/block-1
              excerpt: "Income received during the previous four consecutive weeks shall be used as an indicator of anticipated income."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          4
  - name: anticipated_income_lookback_weeks
    kind: derived
    entity: Household
    dtype: Integer
    period: Month
    source: 106 CMR 364.320
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/364/320/block-1
              excerpt: "If income fluctuates to the extent that a consecutive four week period alone cannot provide an accurate indication of anticipated income, the Department and the household may use a longer period of past time."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if income_fluctuates_beyond_four_week_indication: agreed_extended_anticipated_income_lookback_weeks else: default_anticipated_income_lookback_weeks
  - name: past_income_used_as_anticipated_income_indicator
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 364.320
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/364/320/block-1
              excerpt: "The Department shall not automatically attribute to the household the amounts of any past income, nor shall it use past income as an indicator of anticipated income when changes in income have occurred or can be anticipated during the certification period."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not income_changes_occurred_during_certification_period
          and not income_changes_anticipated_during_certification_period
