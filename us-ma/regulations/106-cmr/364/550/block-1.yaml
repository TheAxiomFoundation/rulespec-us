format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/364/550/block-1
  summary: |-
    All households must meet the net income standard, except for categorically eligible households (per 106 CMR 365.180). Households containing an elderly or disabled member (per 106 CMR 361.210) must have income eligibility based solely on net income standards. To determine eligibility with regard to net income standards, the household's net income must be compared to the Maximum Allowable Monthly Net Income Standards for the appropriate household size (per 106 CMR 364.970). If net income is greater than the standard, the household is ineligible; if equal to or less than the standard, the household is eligible with regard to net income.
rules:
  - name: household_meets_net_income_standard
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 364.550
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/364/550/block-1
              excerpt: "If the net income is equal to or less than the standard, the household is eligible with regard to net income."
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/364/550/block-1
              excerpt: "All households must meet the net income standard, except for categorically eligible households"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_categorically_eligible
          or household_net_income <= maximum_allowable_monthly_net_income_standard
