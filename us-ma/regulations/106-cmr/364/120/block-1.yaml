format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/364/120/block-1
  summary: |-
    If an application for recertification is submitted after the certification period ends, that application shall be considered an initial application and benefits for that month shall be prorated. If the household submits an application prior to the end of its certification period but is found ineligible for the first month following, then the first month of any subsequent participation shall be considered the initial month; if found eligible, that month shall not be considered the initial month. Any household that receives a Notice of Expiration shall not be subject to proration for the first month of its new certification period if the deadline for filing an application for recertification falls after the end of their current certification period. If a household is requested in writing to provide missing verifications by a specified date (at least ten calendar days after the request) that is beyond its current certification period, and provides the required verifications and is otherwise eligible, the household will not be subject to proration for the first month of its new certification period.
rules:
  - name: minimum_verification_response_days
    kind: parameter
    dtype: Integer
    source: 106 CMR 364.120
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/364/120/block-1
              excerpt: "at least ten calendar days after the request"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10

  - name: first_month_of_new_certification_period_is_initial_month
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 364.120
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/364/120/block-1
              excerpt: "If an application for recertification is submitted after the certification period ends, that application shall be considered an initial application"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/364/120/block-1
              excerpt: "found ineligible for the first month following the end of the certification period, then the first month of any subsequent participation shall be considered the initial month of the new certification period"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/364/120/block-1
              excerpt: "if the household submits an application for recertification prior to the end of its certification period and is found eligible for the first month following the end of the certification period, then that month shall not be considered the initial month"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          recertification_application_submitted_after_certification_period_ends
          or (
            recertification_application_submitted_prior_to_certification_period_end
            and household_found_ineligible_for_first_month_following_certification_period
            and month_is_first_month_of_subsequent_participation
          )

  - name: notice_of_expiration_proration_exception_applies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 364.120
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/364/120/block-1
              excerpt: "Any household that receives a Notice of Expiration at the time of or prior to recertification ... shall not be subject to proration for the first month of its new certification period if the deadline for filing an application for recertification falls after the end of their current certification period"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_received_notice_of_expiration_at_or_prior_to_recertification
          and recertification_filing_deadline_falls_after_current_certification_period_end

  - name: verification_request_proration_exception_applies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 364.120
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/364/120/block-1
              excerpt: "If a household is requested in writing to provide missing verifications by a specified date (at least ten calendar days after the request) that is beyond its current certification period, and provides the required verifications and is otherwise eligible, the household will not be subject to proration for the first month of its new certification period"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/364/120/block-1
              excerpt: "at least ten calendar days after the request"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_requested_in_writing_to_provide_missing_verifications
          and verification_request_specified_response_days >= minimum_verification_response_days
          and verification_response_deadline_is_beyond_current_certification_period
          and household_provided_required_verifications
          and household_otherwise_eligible

  - name: first_month_subject_to_proration
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 364.120
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/364/120/block-1
              excerpt: "benefits for that month shall be prorated in accordance with 106 CMR 364.650"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/364/120/block-1
              excerpt: "shall not be subject to proration for the first month of its new certification period"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          first_month_of_new_certification_period_is_initial_month
          and not notice_of_expiration_proration_exception_applies
          and not verification_request_proration_exception_applies
