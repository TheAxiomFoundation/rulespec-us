format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/364/420/block-1
  summary: |-
    The case manager must make a reasonable prediction of the amount the household
    expects to be billed during the certification period for allowable medical,
    dependent care, and shelter expenses. If the household voluntarily reports a
    change in medical expenses, the Department shall verify the change if it
    would increase the household's allotment; verification is required before
    the Department acts on the change. For a reported change that would decrease
    the household's allotment, or make the household ineligible, the Department
    shall act on the change without requiring verification, though verification
    required by 106 CMR 366.100 shall be obtained prior to recertification.
rules:
  - name: verification_required_before_acting_on_reported_medical_expense_change
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 364.420
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/364/420/block-1
              excerpt: |-
                If the household voluntarily reports a change in medical expenses,
                the Department shall verify the change in accordance with 106 CMR
                366.100 ... if the change would increase the household's allotment.
                Verification of the change in medical expenses is required before
                the Department acts on the change.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_voluntarily_reported_medical_expense_change
          and reported_medical_expense_change_would_increase_allotment
  - name: department_acts_on_reported_medical_expense_change_without_verification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 364.420
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/364/420/block-1
              excerpt: |-
                In the case of a reported change that would decrease the
                household's allotment, or make the household ineligible, the
                Department shall act on the change without requiring
                verification, though verification which is required by 106 CMR
                366.100 shall be obtained prior to the household's
                recertification.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_voluntarily_reported_medical_expense_change
          and (
            reported_medical_expense_change_would_decrease_allotment
            or reported_medical_expense_change_would_make_household_ineligible
          )
  - name: household_required_to_report_medical_expenses_during_certification_period
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 364.420
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/364/420/block-1
              excerpt: |-
                The household shall not be required to report its medical
                expenses during the certification period.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not household_is_in_certification_period
