format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/statute/62/62
  summary: |-
    Income taxable under chapter 62 is determined by the taxpayer's regular book accounting method unless that method does not clearly reflect income; taxpayers without books use cash receipts and disbursements; changed methods require commissioner consent to report differently from the preceding year; income is computed on a calendar year unless fiscal-year books are actually kept and fiscal-year reporting permission is obtained.
rules:
  - name: regular_book_accounting_method_required
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: 62
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/statute/62/62
              excerpt: "in accordance with the method of accounting regularly employed in keeping the books of the taxpayer"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ma/statute/62/62
              excerpt: "unless it is established that such method does not clearly reflect income"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          taxpayer_regularly_employs_accounting_method_in_keeping_books
          and accounting_method_clearly_reflects_income

  - name: cash_receipts_and_disbursements_method_required_without_books
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: 62
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/statute/62/62
              excerpt: "If a taxpayer does not keep books of account"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ma/statute/62/62
              excerpt: "his income shall be determined on the cash receipts and disbursements method of accounting"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not taxpayer_keeps_books_of_account

  - name: changed_accounting_method_reporting_permitted
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: 62
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/statute/62/62
              excerpt: "Any taxpayer who changes the method of accounting regularly employed by him in keeping his books"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/statute/62/62
              excerpt: "without obtaining the consent of the commissioner"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ma/statute/62/62
              excerpt: "shall not be permitted to report his income on a method different from that used for the preceding year"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          taxpayer_changes_method_regularly_employed_in_keeping_books
          and commissioner_consented_to_reporting_method_different_from_preceding_year

  - name: fiscal_year_reporting_permitted
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: 62
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/statute/62/62
              excerpt: "unless a taxpayer actually keeps his books of account on the basis of a fiscal year"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/statute/62/62
              excerpt: "and has obtained permission from the commissioner to report his income on such a basis"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          taxpayer_actually_keeps_books_of_account_on_fiscal_year_basis
          and commissioner_permission_for_fiscal_year_reporting

  - name: calendar_year_computation_basis_required
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: 62
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: default
            source:
              corpus_citation_path: us-ma/statute/62/62
              excerpt: "The period for which income is to be computed shall be on the basis of a calendar year"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ma/statute/62/62
              excerpt: "unless a taxpayer actually keeps his books of account on the basis of a fiscal year and has obtained permission from the commissioner"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not taxpayer_actually_keeps_books_of_account_on_fiscal_year_basis
          or not commissioner_permission_for_fiscal_year_reporting
