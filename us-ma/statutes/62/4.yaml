format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/statute/62/4
  summary: |-
    Part B taxable income shall be taxed at 5.3 per cent for tax years beginning on or after January 1, 2002. Subsequent Part B rates may be reduced by .05 per cent when specified baseline-tax growth conditions are met, but the rate shall not be less than 5 per cent.
rules:
  - name: part_b_initial_tax_rate
    kind: parameter
    dtype: Rate
    source: 4(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ma/statute/62/4
              excerpt: "Part B taxable income shall be taxed at the rate of 5.3 per cent"
    versions:
      - effective_from: '2002-01-01'
        formula: |-
          0.053
  - name: part_b_minimum_tax_rate
    kind: parameter
    dtype: Rate
    source: 4(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ma/statute/62/4
              excerpt: "Part B taxable income shall be taxed at a rate of not less than 5 per cent."
    versions:
      - effective_from: '2002-01-01'
        formula: |-
          0.05
  - name: part_b_rate_reduction_increment
    kind: parameter
    dtype: Rate
    source: 4(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ma/statute/62/4
              excerpt: "the rate in effect for the prior taxable year minus.05 per cent"
    versions:
      - effective_from: '2002-01-01'
        formula: |-
          0.0005
  - name: part_b_baseline_tax_growth_threshold
    kind: parameter
    dtype: Rate
    source: 4(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ma/statute/62/4
              excerpt: "inflation adjusted growth in baseline taxes ... exceeds 2.5 per cent"
    versions:
      - effective_from: '2002-01-01'
        formula: |-
          0.025
  - name: ma_income_tax_rate
    kind: derived
    entity: TaxUnit
    dtype: Rate
    period: Year
    source: 4(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ma/statute/62/4
              excerpt: "Part B taxable income shall be taxed at the lesser of: (i) the rate in effect for the prior taxable year minus.05 per cent if ...; or (ii) the rate in effect for the prior year."
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/statute/62/4
              excerpt: "For taxable years subsequent to tax years in which personal exemption amounts ... are the same as those amounts ... for the taxable year beginning on January 1, 2001"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/statute/62/4
              excerpt: "inflation-adjusted change in baseline taxes for each consecutive 3 month period reported by the commissioner between August and December of the previous year is greater than 0"
    versions:
      - effective_from: '2002-01-01'
        formula: |-
          if part_b_rate_adjustment_regime_applies: max(part_b_minimum_tax_rate, if personal_exemption_amounts_equal_amounts_for_taxable_year_beginning_january_1_2001 and inflation_adjusted_growth_in_baseline_taxes_for_prior_fiscal_year > part_b_baseline_tax_growth_threshold and inflation_adjusted_change_in_baseline_taxes_for_each_reported_consecutive_three_month_period_between_august_and_december_is_greater_than_zero: prior_taxable_year_part_b_tax_rate - part_b_rate_reduction_increment else: prior_taxable_year_part_b_tax_rate) else: part_b_initial_tax_rate
