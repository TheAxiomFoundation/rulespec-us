- name: resident receives forty percent of federal earned income credit
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    us-ma:statutes/62/6#input.taxpayer_qualified_for_and_claimed_federal_earned_income_credit: true
    us-ma:statutes/62/6#input.nonresident_for_entire_taxable_year: false
    us-ma:statutes/62/6#input.nonresident_for_part_of_taxable_year: false
    us-ma:statutes/62/6#input.federal_earned_income_credit_received: 1000
    us-ma:statutes/62/6#input.days_resided_in_commonwealth: 366
    us-ma:statutes/62/6#input.days_in_taxable_year: 366
  output:
    us-ma:statutes/62/6#ma_earned_income_credit: 400
