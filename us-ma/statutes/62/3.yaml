format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/statute/62/3
  summary: |-
    Part B(b) allows exemptions against Part B income: personal exemptions for single or married filing separately, head of household filing separately, and husband and wife filing jointly; additional exemptions for blindness and age 65; a $1,000 dependent exemption; medical expense and adoption-fee exemptions. Several personal exemption amounts are subject to annual inflation adjustment and caps.
  deferred_outputs:
    - output: us-ma:statutes/62/3/b#ma_personal_exemption
      reason: The final personal exemption depends on filing-status classifications, head-of-household status under Code section 2(b), dependent status under Code section 151(c), federal medical expense deductions under Code section 213, federal itemization, and joint-return coordination. Those upstream legal classifications and completed federal-return amounts are not supplied in copied context, so the final oracle-facing amount is deferred while source-stated scalar exemption amounts are retained.
      source_values:
        - us-ma:statutes/62/3#single_or_separate_personal_exemption_base
        - us-ma:statutes/62/3#single_or_separate_personal_exemption_cap
        - us-ma:statutes/62/3#head_of_household_personal_exemption_base
        - us-ma:statutes/62/3#head_of_household_personal_exemption_cap
        - us-ma:statutes/62/3#joint_return_personal_exemption_base
        - us-ma:statutes/62/3#joint_return_personal_exemption_cap
        - us-ma:statutes/62/3#blindness_additional_exemption
        - us-ma:statutes/62/3#age_sixty_five_additional_exemption
        - us-ma:statutes/62/3#dependent_exemption
rules:
  - name: single_or_separate_personal_exemption_base
    kind: parameter
    dtype: Money
    unit: USD
    period: Year
    source: 3(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/statute/62/3
              excerpt: "a personal exemption of $3,300"
    versions:
      - effective_from: '2002-01-01'
        formula: |-
          3300

  - name: single_or_separate_personal_exemption_increase
