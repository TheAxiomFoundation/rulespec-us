format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/statute/62/64
  summary: |-
    A taxpayer may use commissioner-prepared tax tables in lieu of computing chapter 62 taxes; table bracket taxes are computed on bracket median taxable income to the nearest whole dollar. After total tax from applicable tables, the taxpayer deducts the total rounded to the nearest whole dollar of withheld taxes, estimated tax payments, and credits. The commissioner may require taxpayers within prescribed taxable-income limits to use the tables.
rules:
  - name: tax_table_bracket_tax_rounding_unit
    kind: parameter
    dtype: Money
    unit: USD
    source: section 64
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: unit
            source:
              corpus_citation_path: us-ma/statute/62/64
              excerpt: "computed to the nearest whole dollar"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1

  - name: tax_table_payment_credit_total_rounding_unit
    kind: parameter
    dtype: Money
    unit: USD
    source: section 64
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: unit
            source:
              corpus_citation_path: us-ma/statute/62/64
              excerpt: "the total rounded to the nearest whole dollar of his withheld taxes and payments of his estimated taxes and the credits"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1

  - name: tax_table_bracket_tax
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: section 64
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ma/statute/62/64
              excerpt: "The tax for each bracket of such table shall be computed upon the median of the taxable income for such bracket and shall be computed to the nearest whole dollar."
          - path: versions[0].formula
            kind: import
            import:
              target: us-ma:statutes/62/64#tax_table_bracket_tax_rounding_unit
              output: tax_table_bracket_tax_rounding_unit
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          floor((tax_computed_on_median_taxable_income_for_bracket / tax_table_bracket_tax_rounding_unit) + 0.5) * tax_table_bracket_tax_rounding_unit

  - name: tax_table_payment_credit_total_deduction
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: section 64
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ma/statute/62/64
              excerpt: "the total rounded to the nearest whole dollar of his withheld taxes and payments of his estimated taxes and the credits"
          - path: versions[0].formula
            kind: import
            import:
              target: us-ma:statutes/62/64#tax_table_payment_credit_total_rounding_unit
              output: tax_table_payment_credit_total_rounding_unit
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          floor(((withheld_taxes + estimated_tax_payments + credits_to_which_taxpayer_is_entitled) / tax_table_payment_credit_total_rounding_unit) + 0.5) * tax_table_payment_credit_total_rounding_unit

  - name: tax_liability_using_applicable_tax_tables
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: section 64
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ma/statute/62/64
              excerpt: "After arriving at the total tax from the applicable tables, the taxpayer shall deduct therefrom"
          - path: versions[0].formula
            kind: import
            import:
              target: us-ma:statutes/62/64#tax_table_payment_credit_total_deduction
              output: tax_table_payment_credit_total_deduction
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          total_tax_from_applicable_tables - tax_table_payment_credit_total_deduction

  - name: commissioner_may_require_tax_table_use
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: section 64
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/statute/62/64
              excerpt: "The commissioner may require taxpayers having taxable income within such limits as he may prescribe to use the tax tables"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          taxable_income_within_limits_prescribed_by_commissioner_for_required_tax_table_use
