format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/statute/62/6l
  summary: This section applies to credits earned under subsection (l) of section
    6; at the written election of a taxpayer entitled to such a credit, the commissioner
    applies the credit against return liability after other credits and refunds 90
    per cent of the remaining credit balance. The commissioner may require substantiation
    before payment, and no section 40 chapter 62C interest accrues before receipt
    of requested substantiation.
rules:
- name: section_6l_refund_rate
  kind: parameter
  dtype: Rate
  source: 6l(a)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-ma/statute/62/6l
          excerpt: refund to the taxpayer 90 per cent of the balance of the credits
  versions:
  - effective_from: '0001-01-01'
    formula: '0.90'
- name: section_6l_credit_balance_after_liability
  kind: derived
  entity: TaxUnit
  dtype: Money
  period: Year
  unit: USD
  source: 6l(a)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-ma/statute/62/6l
          excerpt: apply the credit against the liability of the taxpayer as determined
            on its return, as first reduced by any other available credits
  versions:
  - effective_from: '0001-01-01'
    formula: 'if taxpayer_made_written_election_for_section_6_l_credit_refund and
      taxpayer_entitled_to_credit_under_subsection_l_of_section_6: max(0, credit_earned_under_subsection_l_of_section_6
      - max(0, return_liability_after_other_available_credits)) else: 0'
- name: section_6l_refund
  kind: derived
  entity: TaxUnit
  dtype: Money
  period: Year
  unit: USD
  source: 6l(a)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-ma/statute/62/6l
          excerpt: refund to the taxpayer 90 per cent of the balance of the credits
      - path: versions[0].formula
        kind: import
        import:
          target: us-ma:statutes/62/6l#section_6l_credit_balance_after_liability
          output: section_6l_credit_balance_after_liability
          hash: sha256:local
      - path: versions[0].formula
        kind: import
        import:
          target: us-ma:statutes/62/6l#section_6l_refund_rate
          output: section_6l_refund_rate
          hash: sha256:local
  versions:
  - effective_from: '0001-01-01'
    formula: section_6l_credit_balance_after_liability * section_6l_refund_rate
- name: section_6l_refund_interest_accrues_before_requested_substantiation_received
  kind: derived
  entity: TaxUnit
  dtype: Judgment
  period: Year
  source: 6l(a)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-ma/statute/62/6l
          excerpt: No interest shall accrue on the refund under section 40 of chapter
            62C before the commissioner's receipt of the substantiation he requested.
  versions:
  - effective_from: '0001-01-01'
    formula: 'not commissioner_requested_substantiation_of_refund_claim_before_payment

      or commissioner_received_requested_substantiation'
