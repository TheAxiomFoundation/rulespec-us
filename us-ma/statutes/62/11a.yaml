format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/statute/62/11a
  summary: Trustees of specified charitable trusts who are inhabitants of the commonwealth
    and pay taxable income to commonwealth-inhabitant beneficiaries must deduct and
    withhold tax at the chapter rate applicable to the income class; the withheld
    amount is credited to the beneficiary.
rules:
- name: trustee_payment_withholding_required
  kind: derived
  entity: Payment
  dtype: Judgment
  period: Year
  source: 11A
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-ma/statute/62/11a
          excerpt: Every trustee of a pooled income fund ... and every trustee of
            a charitable remainder annuity trust or a charitable remainder unitrust
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-ma/statute/62/11a
          excerpt: who is an inhabitant of the commonwealth and who makes payment
            to a beneficiary who is an inhabitant of the commonwealth
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-ma/statute/62/11a
          excerpt: of income subject to the taxes imposed by this chapter shall deduct
            and withhold tax
  versions:
  - effective_from: '0001-01-01'
    formula: '(payment_made_by_trustee_of_pooled_income_fund_defined_in_code_section_642_c_5

      or payment_made_by_trustee_of_charitable_remainder_annuity_trust_defined_in_code_section_664_d

      or payment_made_by_trustee_of_charitable_remainder_unitrust_defined_in_code_section_664_d)

      and trustee_is_inhabitant_of_commonwealth

      and beneficiary_is_inhabitant_of_commonwealth

      and payment_income_subject_to_taxes_imposed_by_this_chapter'
- name: tax_required_to_be_deducted_and_withheld_from_trust_payment
  kind: derived
  entity: Payment
  dtype: Money
  period: Year
  unit: USD
  source: 11A
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-ma/statute/62/11a
          excerpt: shall deduct and withhold tax upon such income at the rate or rates
            applicable under the provisions of this chapter to the class or classes
            of income so paid
      - path: versions[0].formula
        kind: import
        import:
          target: us-ma:statutes/62/11a#trustee_payment_withholding_required
          output: trustee_payment_withholding_required
          hash: sha256:local
  versions:
  - effective_from: '0001-01-01'
    formula: 'if trustee_payment_withholding_required: max(0, trust_payment_income_subject_to_chapter_tax)
      * applicable_tax_rate_for_class_of_income_under_this_chapter else: 0'
- name: beneficiary_credit_for_trust_payment_tax_withheld
  kind: derived
  entity: Payment
  dtype: Money
  period: Year
  unit: USD
  source: 11A
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-ma/statute/62/11a
          excerpt: The amount deducted and withheld as tax ... shall be allowed as
            a credit to the beneficiary
      - path: versions[0].formula
        kind: import
        import:
          target: us-ma:statutes/62/11a#tax_required_to_be_deducted_and_withheld_from_trust_payment
          output: tax_required_to_be_deducted_and_withheld_from_trust_payment
          hash: sha256:local
  versions:
  - effective_from: '0001-01-01'
    formula: tax_required_to_be_deducted_and_withheld_from_trust_payment
