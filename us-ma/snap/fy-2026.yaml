# Massachusetts SNAP -- FY 2026
#
# First compiled ECPS target for MA. Federal SNAP calculation rules supply the
# executable benefit formula; encoded MA 106 CMR 364 slices are included so the
# program can grow state-specific eligibility, income, deduction, proration, and
# issuance-table behavior as those surfaces become executable.

program: us-ma/snap
period: 2026-01

outputs:
  - snap_eligible
  - snap_benefit

auto_gate_outputs:
  - snap_eligible

scope:
  federal:
    - regulations/7-cfr/273/3
    - regulations/7-cfr/273/4
    - regulations/7-cfr/273/5
    - regulations/7-cfr/273/6
    - regulations/7-cfr/273/7
    - regulations/7-cfr/273/8
    - regulations/7-cfr/273/9/d/6/iii
    - regulations/7-cfr/273/10
    - statutes/7/2012/j
    - statutes/7/2014/a
    - statutes/7/2014/d
    - statutes/7/2014/e/2
    - statutes/7/2014/e/6/A
    - statutes/7/2014/g
    - statutes/7/2017/a
    - regulations/7-cfr/273/24

  state:
    - regulations/106-cmr/364/050/block-1
    - regulations/106-cmr/364/120/block-1
    - regulations/106-cmr/364/200/block-1
    - regulations/106-cmr/364/300/block-1
    - regulations/106-cmr/364/310/block-1
    - regulations/106-cmr/364/320/block-1
    - regulations/106-cmr/364/330/block-1
    - regulations/106-cmr/364/340/block-1
    - regulations/106-cmr/364/350/block-1
    - regulations/106-cmr/364/360/block-1
    - regulations/106-cmr/364/370/block-1
    - regulations/106-cmr/364/400/block-1
    - regulations/106-cmr/364/410/block-1
    - regulations/106-cmr/364/420/block-1
    - regulations/106-cmr/364/430/block-1
    - regulations/106-cmr/364/450/block-1
    - regulations/106-cmr/364/500/block-1
    - regulations/106-cmr/364/550/block-1
    - regulations/106-cmr/364/600/block-1
    - regulations/106-cmr/364/650/block-1
    - regulations/106-cmr/364/700/block-1
    - regulations/106-cmr/364/820/block-1
    - regulations/106-cmr/364/830/block-1
    - regulations/106-cmr/364/840/block-1
    - regulations/106-cmr/364/850/block-1
    - regulations/106-cmr/364/860/block-1
    - regulations/106-cmr/364/870/block-1
    - regulations/106-cmr/364/880/block-1
    - regulations/106-cmr/364/895/block-1
    - regulations/106-cmr/364/900/block-1
    - regulations/106-cmr/364/910/block-1
    - regulations/106-cmr/364/945/block-1
    - regulations/106-cmr/364/946/block-1
    - regulations/106-cmr/364/950/block-1
    - regulations/106-cmr/364/970/block-1
    - regulations/106-cmr/364/975/block-1
    - regulations/106-cmr/364/976/block-1
    - regulations/106-cmr/364/980/block-1
    - regulations/106-cmr/364/990/block-1
    - regulations/106-cmr/365/180/A
    - policies/dta/snap/fy-2026-cola/heating-cooling-standard-utility-allowance

transformations:
  - pattern: all_of
    name: snap_member_eligible
    effective_from: '2026-01-01'
    entity: Person
    dtype: Judgment
    period: Month
    source: us:statutes/7/2014
    conditions:
      - snap_member_citizenship_or_alien_status_eligible
      - snap_member_ssn_requirement_eligible
      - snap_member_work_requirement_eligible
      - snap_member_student_eligible

  - pattern: any_related
    name: snap_eligible
    effective_from: '2026-01-01'
    entity: Household
    period: Month
    source: us:statutes/7/2014
    relation: member_of_household
    condition: snap_member_eligible

  - pattern: all_of
    name: household_is_categorically_eligible
    effective_from: '2026-01-01'
    entity: Household
    dtype: Judgment
    period: Month
    source: axiom-programs/us-ma/snap/fy-2026 categorical eligibility composition
    conditions:
      - snap_household_is_categorically_eligible

  - pattern: all_of
    name: household_categorically_eligible
    effective_from: '2026-01-01'
    entity: Household
    dtype: Judgment
    period: Month
    source: axiom-programs/us-ma/snap/fy-2026 categorical eligibility composition
    conditions:
      - snap_household_is_categorically_eligible

  - pattern: all_of
    name: household_is_categorically_eligible_under_106_cmr_365_180
    effective_from: '2026-01-01'
    entity: Household
    dtype: Judgment
    period: Month
    source: axiom-programs/us-ma/snap/fy-2026 categorical eligibility composition
    conditions:
      - snap_household_is_categorically_eligible

  - pattern: sum_terms
    name: snap_countable_earned_income
    effective_from: '2026-01-01'
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: axiom-programs/us-ma/snap/fy-2026 income composition
    terms:
      - snap_gross_monthly_earned_income

  - pattern: sum_terms
    name: snap_countable_unearned_income
    effective_from: '2026-01-01'
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: axiom-programs/us-ma/snap/fy-2026 income composition
    terms:
      - snap_total_monthly_unearned_income

  - pattern: sum_terms
    name: snap_gross_monthly_income
    effective_from: '2026-01-01'
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: axiom-programs/us-ma/snap/fy-2026 income composition
    terms:
      - snap_countable_earned_income
      - snap_countable_unearned_income

  - pattern: sum_terms
    name: snap_monthly_household_income
    effective_from: '2026-01-01'
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: axiom-programs/us-ma/snap/fy-2026 income composition
    terms:
      - snap_countable_earned_income
      - snap_countable_unearned_income

  - pattern: sum_terms
    name: snap_total_allowable_shelter_expenses
    effective_from: '2026-01-01'
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: axiom-programs/us-ma/snap/fy-2026 shelter-cost composition
    terms:
      - household_shelter_costs_incurred
      - ma_snap_heating_cooling_standard_utility_allowance_for_shelter_costs

  - pattern: conditional_value
    name: ma_snap_heating_cooling_standard_utility_allowance_for_shelter_costs
    effective_from: '2026-01-01'
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: axiom-programs/us-ma/snap/fy-2026 shelter-cost composition
    condition: snap_standard_with_heating_or_cooling_component_available
    when_true: heating_cooling_standard_utility_allowance
    when_false: 0

  - pattern: sum_terms
    name: snap_excess_shelter_deduction
    effective_from: '2026-01-01'
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: axiom-programs/us-ma/snap/fy-2026 shelter deduction composition
    terms:
      - snap_excess_shelter_deduction_for_net_income

  - pattern: conditional_value
    name: snap_benefit
    effective_from: '2026-01-01'
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: axiom-programs/us-ma/snap/fy-2026 benefit composition
    condition: snap_eligible
    when_true: snap_monthly_allotment
    when_false: 0
