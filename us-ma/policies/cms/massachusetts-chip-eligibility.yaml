format: rulespec/v1
imports:
  - us:statutes/42/1397jj/c/1#child
  - us-ma:policies/cms/massachusetts-medicaid-chip-bhp-eligibility-levels#massachusetts_children_separate_chip_effective_fpl_limit
  - us-ma:policies/cms/massachusetts-medicaid-chip-bhp-eligibility-levels#massachusetts_pregnant_women_chip_available
  - us:policies/cms/medicaid-chip-bhp-eligibility-levels#magi_fpl_disregard_rate
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_paths:
      - us/form/cms/medicaid-chip-bhp-eligibility-levels
      - us/statute/42/1397jj/b/1
      - us/statute/42/1397ll/d/2
      - us/policy/cms/chip-spa/ma/ma-chipspa-15/pdf/page-10
      - us/statute/42/1397ll/f/1
      - us/regulation/42/457/10
      - us/regulation/42/435/603/d
    upstream_source_check:
      status: official_parameter_source
      checked_paths:
        - us/statute/42/1397jj/b/1
        - us/statute/42/1397jj/c/4
        - us/statute/42/1397jj/c/8
        - us/statute/42/1397ll/d/2
        - us/statute/42/1397ll/f/2
        - us/regulation/42/435/603/d
        - us/regulation/42/457/340
        - us/regulation/42/457/344
      rationale: |-
        Federal CHIP statute and regulations define the eligibility framework,
        targeted low-income child and low-income child predicates, uncovered
        child condition, pregnant eligibility options, and MAGI screen/process
        rules. The CMS Medicaid, CHIP and BHP eligibility-level table is the
        official current compiled source for the state-decided MAGI income
        levels and availability flags encoded in this module.
  summary: |-
    Massachusetts CHIP eligibility composition applies the federal CHIP child and standard-pregnant eligibility framework to the CMS state eligibility-level outputs. It also applies the CMS CHIP FCEP SPA source for state-set coverage from conception to birth income eligibility.
rules:
  - name: massachusetts_separate_chip_child_eligibility_available
    kind: derived
    dtype: Boolean
    period: Year
    source: CMS Medicaid, CHIP and BHP Eligibility Levels table, Massachusetts row
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/form/cms/medicaid-chip-bhp-eligibility-levels
              excerpt: "Children Separate CHIP"
    versions:
      - effective_from: '2023-12-01'
        formula: |-
          true
  - name: is_chip_eligible_child
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 42 USC 1397jj(b)(1), 42 USC 1397jj(c)(1), and CMS state CHIP eligibility levels
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/42/1397jj/c/1#child
              output: child
              hash: sha256:5983f9bd1c30a824da826ee4bc8fc3351cd2c631d4a0ce198b156446493ef9e0
          - path: versions[0].formula
            kind: import
            import:
              target: us-ma:policies/cms/massachusetts-medicaid-chip-bhp-eligibility-levels#massachusetts_children_separate_chip_effective_fpl_limit
              output: massachusetts_children_separate_chip_effective_fpl_limit
              hash: sha256:ed27312b7c3ee04693c189a03a0ff1dc5ff9ee6f3e143905b5035da35a7fdb4f
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/1397jj/b/1
              excerpt: "not found eligible for medical assistance under subchapter XIX"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/form/cms/medicaid-chip-bhp-eligibility-levels
              excerpt: "Children Separate CHIP"
    versions:
      - effective_from: '2023-12-01'
        formula: |-
          child
          and person_meets_chip_immigration_requirement
          and not found_eligible_for_medical_assistance_under_subchapter_xix
          and medicaid_income_level <= massachusetts_children_separate_chip_effective_fpl_limit
  - name: massachusetts_standard_pregnant_chip_eligibility_available
    kind: derived
    dtype: Boolean
    period: Year
    source: CMS Medicaid, CHIP and BHP Eligibility Levels table, Massachusetts row
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: import
            import:
              target: us-ma:policies/cms/massachusetts-medicaid-chip-bhp-eligibility-levels#massachusetts_pregnant_women_chip_available
              output: massachusetts_pregnant_women_chip_available
              hash: sha256:ed27312b7c3ee04693c189a03a0ff1dc5ff9ee6f3e143905b5035da35a7fdb4f
    versions:
      - effective_from: '2023-12-01'
        formula: |-
          massachusetts_pregnant_women_chip_available
  - name: is_chip_eligible_standard_pregnant_person
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 42 USC 1397ll(d)(2) and CMS state CHIP eligibility levels
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/form/cms/medicaid-chip-bhp-eligibility-levels
              excerpt: "Pregnant Women CHIP"
    versions:
      - effective_from: '2023-12-01'
        formula: |-
          false
  - name: massachusetts_fcep_eligibility_available
    kind: derived
    dtype: Boolean
    period: Year
    source: CMS CHIP FCEP SPA source, Massachusetts
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/policy/cms/chip-spa/ma/ma-chipspa-15/pdf/page-10
              excerpt: "Income: MassHealth Standard through the CHIP unborn child option is available to uninsured pregnant women with family incomes from zero percent of the FPL up to and including 200 percent of the FPL who are not otherwise eligible for MassHealth Standard."
    versions:
      - effective_from: '2014-01-01'
        formula: |-
          true
  - name: massachusetts_fcep_fpl_limit
    kind: parameter
    dtype: Rate
    period: Year
    source: CMS CHIP FCEP SPA source, Massachusetts
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/policy/cms/chip-spa/ma/ma-chipspa-15/pdf/page-10
              excerpt: "Income: MassHealth Standard through the CHIP unborn child option is available to uninsured pregnant women with family incomes from zero percent of the FPL up to and including 200 percent of the FPL who are not otherwise eligible for MassHealth Standard."
    versions:
      - effective_from: '2014-01-01'
        formula: |-
          2.00
  - name: massachusetts_fcep_effective_fpl_limit
    kind: derived
    dtype: Rate
    period: Year
    source: CMS CHIP FCEP SPA source, Massachusetts, including the MAGI 5% FPL disregard
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: import
            import:
              target: us:policies/cms/medicaid-chip-bhp-eligibility-levels#magi_fpl_disregard_rate
              output: magi_fpl_disregard_rate
              hash: sha256:ea0071602a4a4441e584a16bdbab3d8a3c36b40b7cea1151165533669423f5f5
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/regulation/42/435/603/d
              excerpt: "5 percentage points of the Federal poverty level"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/policy/cms/chip-spa/ma/ma-chipspa-15/pdf/page-10
              excerpt: "Income: MassHealth Standard through the CHIP unborn child option is available to uninsured pregnant women with family incomes from zero percent of the FPL up to and including 200 percent of the FPL who are not otherwise eligible for MassHealth Standard."
    versions:
      - effective_from: '2014-01-01'
        formula: |-
          massachusetts_fcep_fpl_limit + magi_fpl_disregard_rate
  - name: is_chip_fcep_eligible_person
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 42 USC 1397ll(f)(1), 42 CFR 457.10, and CMS CHIP FCEP SPA source for Massachusetts
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/policy/cms/chip-spa/ma/ma-chipspa-15/pdf/page-10
              excerpt: "Income: MassHealth Standard through the CHIP unborn child option is available to uninsured pregnant women with family incomes from zero percent of the FPL up to and including 200 percent of the FPL who are not otherwise eligible for MassHealth Standard."
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/1397ll/f/1
              excerpt: "through the application of sections 457.10"
    versions:
      - effective_from: '2014-01-01'
        formula: |-
          person_is_pregnant
          and not found_eligible_for_medical_assistance_under_subchapter_xix
          and medicaid_income_level <= massachusetts_fcep_effective_fpl_limit
