  versions:
  - effective_from: '2025-10-01'
    formula: |-
      (
        snap_standard_with_heating_or_cooling_component_available
        or public_housing_central_meter_sua_allowed
        or (
          liheaa_recipient_entitled_to_heating_cooling_sua
          and liheaa_or_similar_energy_assistance_payment_received_or_made_on_household_behalf_in_current_month_or_immediately_preceding_twelve_months
          and liheaa_or_similar_energy_assistance_annual_payment_amount
            > liheaa_or_similar_energy_assistance_annual_payment_threshold
        )
        or non_liheaa_household_eligible_for_heating_sua
      )
      and not electric_blower_sua_not_allowed
