format: rulespec/v1
imports:
  - us:regulations/7-cfr/273/9#snap_full_excess_shelter_deduction_applies
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/guidance/dta/policy-online/snap-cola/2025-10-01
    upstream_source_check:
      status: checked_higher_authority
      checked_paths:
        - us:regulations/7-cfr/273/9
      rationale: >-
        The Massachusetts DTA COLA guidance publishes the FY 2026 SNAP shelter
        deduction amounts effective October 1, 2025. Federal regulation context
        supplies the elderly or disabled household condition for applying the
        full excess shelter deduction instead of the capped amount.
  summary: >-
    Effective October 1, 2025, the maximum shelter deduction increases from
    $712 to $744, and the Homeless Shelter/Utility Deduction increases to
    $198.99, which BEACON rounds to $199.
rules:
  - name: snap_maximum_excess_shelter_expense_deduction
    kind: parameter
    dtype: Money
    unit: USD
    period: Month
    source: Massachusetts DTA SNAP COLA, Shelter Deduction
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/guidance/dta/policy-online/snap-cola/2025-10-01
              excerpt: The maximum shelter deduction ... will increase from $712 to $744.
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-ma/guidance/dta/policy-online/snap-cola/2025-10-01
              excerpt: Effective October 1, 2025
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          744
  - name: snap_excess_shelter_expense_deduction
    kind: derived
    entity: Household
    dtype: Money
    unit: USD
    period: Month
    source: Massachusetts DTA SNAP COLA, Shelter Deduction; 7 CFR 273.9
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/guidance/dta/policy-online/snap-cola/2025-10-01
              excerpt: The maximum shelter deduction ... will increase from $712 to $744.
          - path: versions[0].formula
            kind: import
            import:
              target: us:regulations/7-cfr/273/9#snap_full_excess_shelter_deduction_applies
              output: snap_full_excess_shelter_deduction_applies
              hash: sha256:76dd530624a00c5199f27bd4ec3ce866cd89e897fd7332b368164cf58f222b9f
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if snap_full_excess_shelter_deduction_applies: max(0, snap_excess_shelter_expenses_before_cap) else: min(max(0, snap_excess_shelter_expenses_before_cap), snap_maximum_excess_shelter_expense_deduction)
  - name: homeless_shelter_utility_deduction_beacon_rounded_amount
    kind: parameter
    dtype: Money
    unit: USD
    period: Month
    source: Massachusetts DTA SNAP COLA, Homeless Shelter Deduction
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/guidance/dta/policy-online/snap-cola/2025-10-01
              excerpt: The Homeless Shelter/Utility Deduction will increase to $198.99 (which BEACON will round to $199).
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-ma/guidance/dta/policy-online/snap-cola/2025-10-01
              excerpt: Effective October 1, 2025
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          199
  - name: snap_claimed_homeless_shelter_utility_deduction
    kind: derived
    entity: Household
    dtype: Money
    unit: USD
    period: Month
    source: Massachusetts DTA SNAP COLA, Homeless Shelter Deduction
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/guidance/dta/policy-online/snap-cola/2025-10-01
              excerpt: The Homeless Shelter/Utility Deduction will increase to $198.99 (which BEACON will round to $199).
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if household_eligible_for_homeless_shelter_utility_deduction: homeless_shelter_utility_deduction_beacon_rounded_amount else: 0
