format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/guidance/dta/policy-online/snap-cola/2025-10-01
    upstream_source_check:
      status: checked_higher_authority
      checked_paths:
        - us:policies/usda/snap/fy-2026-cola/deductions
        - us:regulations/7-cfr/273/9
        - us:regulations/7-cfr/273/10
      rationale: >-
        The Massachusetts DTA COLA guidance republishes the USDA FY 2026 SNAP
        shelter deduction amounts effective October 1, 2025. The federal COLA
        module owns those parameters, while 7 CFR 273.9 and 273.10 supply the
        excess-shelter conditions and nearest-dollar homeless-deduction
        calculation.
  summary: >-
    Effective October 1, 2025, the maximum shelter deduction increases from
    $712 to $744, and the Homeless Shelter/Utility Deduction increases to
    $198.99, which BEACON rounds to $199.
rules:
  - name: restates_snap_maximum_excess_shelter_deduction
    kind: source_relation
    source: Massachusetts DTA SNAP COLA, Shelter Deduction
    source_relation:
      type: restates
      target: us:policies/usda/snap/fy-2026-cola/deductions#snap_maximum_excess_shelter_deduction_48_states_dc
      authority: federal
    verification:
      values:
        snap_maximum_excess_shelter_deduction_48_states_dc: 744
  - name: restates_snap_homeless_shelter_deduction
    kind: source_relation
    source: Massachusetts DTA SNAP COLA, Homeless Shelter Deduction
    source_relation:
      type: restates
      target: us:policies/usda/snap/fy-2026-cola/deductions#snap_homeless_shelter_deduction
      authority: federal
    verification:
      values:
        snap_homeless_shelter_deduction: 198.99
