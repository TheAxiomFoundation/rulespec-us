format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/guidance/dta/policy-online/snap-cola/2025-10-01
    upstream_source_check:
      status: checked_higher_authority
      checked_paths:
        - us:policies/usda/snap/fy-2026-cola/deductions
        - us:regulations/7-cfr/273/9
      rationale: >-
        The Massachusetts DTA COLA guidance gives the state-published FY 2026
        SNAP standard deduction table effective October 1, 2025. Federal SNAP
        deductions context supplies the deduction framework.
  summary: >-
    Effective October 1, 2025, the standard deduction is $209 for assistance
    units of 1-3, $223 for 4, $261 for 5, and $299 for 6 or more.
rules:
  - name: snap_standard_deduction_household_size_six_or_more_key
    kind: parameter
    dtype: Count
    source: Massachusetts DTA SNAP COLA, standard deduction table
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ma/guidance/dta/policy-online/snap-cola/2025-10-01
              excerpt: 6 or more $291 $299
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          6
  - name: snap_standard_deduction_table
    kind: parameter
    dtype: Money
    unit: USD
    indexed_by: household_size
    source: Massachusetts DTA SNAP COLA, standard deduction table
    metadata:
      proof:
        atoms:
          - path: versions[0].values
            kind: parameter_table
            source:
              corpus_citation_path: us-ma/guidance/dta/policy-online/snap-cola/2025-10-01
              excerpt: New Standard Deduction 1 $209 2 $209 3 $209 4 $223 5 $261 6 or more $299
              table:
                header: New Standard Deduction
                row_key: household_size
                column_key: standard_deduction
    versions:
      - effective_from: '2025-10-01'
        values:
          1: 209
          2: 209
          3: 209
          4: 223
          5: 261
          6: 299
  - name: snap_standard_deduction
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: Massachusetts DTA SNAP COLA, standard deduction table
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ma/guidance/dta/policy-online/snap-cola/2025-10-01
              excerpt: New Standard Deduction 1 $209 2 $209 3 $209 4 $223 5 $261 6 or more $299
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          snap_standard_deduction_table[min(household_size, snap_standard_deduction_household_size_six_or_more_key)]
