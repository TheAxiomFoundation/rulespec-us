# Colorado SNAP -- FY 2026
#
# The executable SNAP surface is encoded as a RuleSpec composition in
# rulespec-us-co/policies/cdhs/snap/fy-2026-benefit-calculation. This
# axiom-programs wrapper keeps CO discoverable with the other state SNAP
# programs and only adds the dashboard-facing snap_benefit bridge.

program: us-co/snap
period: 2026-01

outputs:
  - snap_eligible
  - snap_benefit

acknowledged_incomplete:
  - snap_eligible

scope:
  state:
    - policies/cdhs/snap/fy-2026-benefit-calculation

transformations:
  - pattern: conditional_value
    name: snap_benefit
    effective_from: '2026-01-01'
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: axiom-programs/us-co/snap/fy-2026 benefit composition
    condition: snap_eligible
    when_true: snap_monthly_allotment
    when_false: 0
