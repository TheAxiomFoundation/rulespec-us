# US Federal Individual Income Tax -- TY 2026
#
# Exposes the encoded IRC chain: section 1(j) ordinary rates and
# regular tax before credits, and the section 26 non-refundable credit
# limitation ending in income_tax_before_refundable_credits. Upstream
# taxable-income assembly (sections 61-63) is not yet encoded, so
# taxable income remains a runtime input.
program: us/fiit
period: 2026-01
outputs:
  - regular_tax_before_credits
  - income_tax_before_refundable_credits
  - eitc
  - ctc_after_advance_payments
  - alternative_minimum_tax
  - income_tax_before_credits
acknowledged_incomplete:
  - regular_tax_before_credits
  - income_tax_before_refundable_credits
  - eitc
  - ctc_after_advance_payments
  - alternative_minimum_tax
  - income_tax_before_credits
scope:
  federal:
    - statutes/26/1/j
    - statutes/26/24
    - statutes/26/26
    - statutes/26/32
    - statutes/26/55
    - policies/irs/rev-proc-2025-32/income-tax-brackets
    - policies/irs/rev-proc-2025-32/child-tax-credit
    - policies/irs/rev-proc-2025-32/earned-income-credit
    - policies/irs/rev-proc-2025-32/alternative-minimum-tax
