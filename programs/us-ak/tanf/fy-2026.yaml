# Alaska ATAP -- FY 2026
#
# This program spec exposes the Alaska Temporary Assistance Program rules
# encoded from 7 AAC 45 and the Alaska DPA 2026 Temporary Assistance standards.
# The current bridge includes the adult-included standards, resource limit,
# income eligibility, care disregard, child-support income treatment, and
# payment amount formula. Broader nonfinancial gates, the full earned-income
# deduction schedule, low-shelter-cost calculation, and child-only/two-parent
# incapacitated/pregnant-woman variants are not yet fully composed at the
# top-level surface.

program: us-ak/tanf
period: 2026-01

outputs:
  - ak_atap_need_standard
  - ak_atap_gross_income_limit
  - ak_atap_maximum_payment
  - ak_atap_resources_eligible
  - ak_atap_childcare_deduction
  - ak_atap_countable_unearned_income
  - ak_atap_eligible
  - ak_atap

acknowledged_incomplete:
  - ak_atap_eligible
  - ak_atap

scope:
  state:
    - policies/dpa/atap/standards/2026/adult-included
    - policies/dpa/atap/standards/2026/adult-included-gross-income-limit
    - policies/dpa/atap/standards/2026/adult-included-maximum-payment
    - regulations/aac/title-7/chapter-45/45-280-resource-limit
    - regulations/aac/title-7/chapter-45/45-400-child-support-income
    - regulations/aac/title-7/chapter-45/45-470-gross-income-eligibility
    - regulations/aac/title-7/chapter-45/45-470-income-eligibility
    - regulations/aac/title-7/chapter-45/45-485-care-disregard
    - regulations/aac/title-7/chapter-45/45-525-payment-amount
