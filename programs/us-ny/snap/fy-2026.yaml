# New York SNAP eligibility — FY 2026
#
# Federal scope mirrors us-ca/snap (federal SNAP law applies the same to all
# states). State scope pulls in NY-encoded SNAP sections from
# rulespec-us-ny (18 NYCRR 385/387 and OTDA policies). NY's encoded
# content to date is largely restatement of federal rules, so the
# eligibility logic is dominated by the federal predicates while NY's
# scope is included so that state-specific options (e.g. categorical
# eligibility, expanded resource tests) can be layered in as they get
# encoded.

program: us-ny/snap
period: 2026-01

outputs:
  - snap_eligible
  - snap_benefit

auto_gate_outputs:
  - snap_eligible

scope:
  federal:
    - regulations/7-cfr/273/3
    - regulations/7-cfr/273/4
    - regulations/7-cfr/273/5
    - regulations/7-cfr/273/6
    - regulations/7-cfr/273/7
    - regulations/7-cfr/273/8
    - regulations/7-cfr/273/9
    - regulations/7-cfr/273/10
    - statutes/7/2012/j
    - statutes/7/2014/a
    - statutes/7/2014/d
    - statutes/7/2014/e/2
    - statutes/7/2014/e/6/A
    - statutes/7/2014/g
    - statutes/7/2017/a
    - regulations/7-cfr/273/24
    # Federal SNAP modules encoded but previously unscoped (rulespec-us#585):
    # expedited service, homeless shelter deduction, QC tolerances, and the
    # 7 USC 2015 disqualification ladder.
    - regulations/7-cfr/273/2/j
    - regulations/7-cfr/273/9/d/6/iii
    - regulations/7-cfr/275/23/d/1
    - regulations/7-cfr/275/23/d/2
    - regulations/7-cfr/275/23/e/1
    - statutes/7/2012/m/4
    - statutes/7/2014/c
    - statutes/7/2015/b/1
    - statutes/7/2015/d/2
    - statutes/7/2015/d/2/A
    - statutes/7/2015/d/2/B
    - statutes/7/2015/d/2/C
    - statutes/7/2015/d/2/D
    - statutes/7/2015/d/2/E
    - statutes/7/2015/d/2/F
    - statutes/7/2015/e

  state:
    # 18 NYCRR 385 — work requirements (general + ABAWD restatements)
    - regulations/18-nycrr/385/3
    # 18 NYCRR 387 — SNAP eligibility (income limits, deductions, residency)
    - regulations/18-nycrr/387/9/a/1
    - regulations/18-nycrr/387/9/a/2
    - regulations/18-nycrr/387/10
    - regulations/18-nycrr/387/12/a
    - regulations/18-nycrr/387/12/b
    - regulations/18-nycrr/387/12/f/3/v/a
    - regulations/18-nycrr/387/12/f/3/v/b
    - regulations/18-nycrr/387/12/f/3/v/c
    - regulations/18-nycrr/387/12/f/3/vi
    - regulations/18-nycrr/387/14/a/1
    - regulations/18-nycrr/387/14/a/5
    # OTDA FY 2026 SNAP benefit-calculation composition (rulespec-us#585):
    # supplies snap_eligible, income aggregation, and the NY excess-shelter
    # deduction chain.
    - policies/otda/snap/fy-2026-benefit-calculation

transformations:
  # Inline bridges for snap_member_eligible, snap_eligible,
  # snap_gross_monthly_income, snap_monthly_household_income, and
  # snap_excess_shelter_deduction were removed (rulespec-us#585): the OTDA
  # composition policies/otda/snap/fy-2026-benefit-calculation in scope now
  # produces them (with NY's own member-eligibility predicates and the
  # 387/12 excess-shelter chain); keeping the inline copies would create
  # duplicate derived rules. The inline snap_total_allowable_shelter_expenses
  # and snap_benefit bridges were removed the same way (rulespec-us#830): the
  # composition now binds the 273.10 shelter input from New York's
  # 387.12(f)(3)(vi) allowable shelter costs — which, unlike the removed
  # bridge, carries the homeless shelter-expense substitution — and exposes
  # the issued benefit with New York's initial-month proration, which the
  # removed conditional_value bridge lacked.
  - pattern: any_of
    name: snap_income_eligible
    effective_from: '2026-01-01'
    entity: Household
    dtype: Judgment
    period: Month
    source: us-ny:regulations/18-nycrr/387/14/a/5
    conditions:
      - snap_income_limit_exemption_for_categorically_eligible_household
      - snap_standard_income_eligible

  - pattern: sum_terms
    name: snap_countable_earned_income
    effective_from: '2026-01-01'
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: axiom-programs/us-ny/snap/fy-2026 income composition
    terms:
      - snap_gross_monthly_earned_income

  - pattern: sum_terms
    name: snap_countable_unearned_income
    effective_from: '2026-01-01'
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: axiom-programs/us-ny/snap/fy-2026 income composition
    terms:
      - snap_total_monthly_unearned_income
