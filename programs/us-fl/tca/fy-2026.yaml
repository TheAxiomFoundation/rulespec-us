# Florida Temporary Cash Assistance -- FY 2026
#
# This program spec composes the Florida ESS manual rules already encoded under
# us-fl/policies/dcf/ess-program-policy-manual. Technical and demographic TCA
# eligibility remains broader than the financial budget path encoded here, so
# the top-level eligibility and amount outputs are acknowledged as incomplete.

program: us-fl/tca
period: 2026-01

outputs:
  - fl_tca_payment_standard
  - fl_tca_gross_income
  - fl_tca_gross_income_eligible
  - fl_tca_countable_income
  - fl_tca_net_income_eligible
  - fl_tca_resources_eligible
  - fl_tca_eligible
  - fl_tca

acknowledged_incomplete:
  # fl_tca_gross_income_eligible is a component check (the 185 percent gross
  # income screen from the eligibility standard test only); it deliberately
  # does not reference the sibling net-income/resource gates or the top-level
  # fl_tca_eligible rollup.
  - fl_tca_gross_income_eligible
  # fl_tca_net_income_eligible and fl_tca_resources_eligible are likewise
  # component checks (post-budget net income test and asset test); the
  # top-level fl_tca_eligible rollup ANDs them together, so the components
  # themselves do not reference their siblings.
  - fl_tca_net_income_eligible
  - fl_tca_resources_eligible
  - fl_tca_eligible
  - fl_tca

