# Florida Temporary Cash Assistance -- FY 2026
#
# This program spec composes the Florida ESS manual rules already encoded under
# us-fl/policies/dcf/ess-program-policy-manual. Technical and demographic TCA
# eligibility remains broader than the financial budget path encoded here, so
# the top-level eligibility and amount outputs are acknowledged as incomplete.

program: us-fl/tca
period: 2026-01

outputs:
  - fl_tca_payment_standard
  - fl_tca_gross_income
  - fl_tca_gross_income_eligible
  - fl_tca_countable_income
  - fl_tca_net_income_eligible
  - fl_tca_resources_eligible
  - fl_tca_eligible
  - fl_tca

acknowledged_incomplete:
  - fl_tca_eligible
  - fl_tca

scope:
  state:
    - policies/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-20
    - policies/dcf/ess-program-policy-manual/2400-budgeting-income/page-27
    - policies/dcf/ess-program-policy-manual/2400-budgeting-income/page-28
    - policies/dcf/ess-program-policy-manual/2400-budgeting-income/page-29
    - policies/dcf/ess-program-policy-manual/2400-budgeting-income/page-30
    - policies/dcf/ess-program-policy-manual/2600-calculation-of-benefits/page-20
    - policies/dcf/ess-program-policy-manual/2600-calculation-of-benefits/page-21
    - policies/dcf/ess-program-policy-manual/appendix-a-5-temporary-cash-assistance-income-standards/page-1

transformations:
  - pattern: derived_formula
    name: fl_tca_payment_standard
    effective_from: '2026-01-01'
    entity: TanfUnit
    dtype: Money
    period: Month
    unit: USD
    source: axiom-programs/us-fl/tca/fy-2026 payment-standard bridge
    formula: tanf_payment_standard

  - pattern: derived_formula
    name: fl_tca_gross_income
    effective_from: '2026-01-01'
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: axiom-programs/us-fl/tca/fy-2026 gross-income bridge
    formula: tca_total_gross_income_for_eligibility_standard_test

  - pattern: derived_formula
    name: fl_tca_gross_income_eligible
    effective_from: '2026-01-01'
    entity: Household
    dtype: Judgment
    period: Month
    source: axiom-programs/us-fl/tca/fy-2026 gross-income eligibility bridge
    formula: tca_eligibility_standard_formula_satisfied

  - pattern: derived_formula
    name: fl_tca_countable_income
    effective_from: '2026-01-01'
    entity: TanfUnit
    dtype: Money
    period: Month
    unit: USD
    source: axiom-programs/us-fl/tca/fy-2026 countable-income bridge
    formula: tca_budget_countable_income

  - pattern: derived_formula
    name: fl_tca_net_income_eligible
    effective_from: '2026-01-01'
    entity: TanfUnit
    dtype: Judgment
    period: Month
    source: axiom-programs/us-fl/tca/fy-2026 net-income eligibility bridge
    formula: tca_assistance_group_eligible_after_budget

  - pattern: derived_formula
    name: fl_tca_resources_eligible
    effective_from: '2026-01-01'
    entity: TanfUnit
    dtype: Judgment
    period: Month
    source: axiom-programs/us-fl/tca/fy-2026 resource eligibility bridge
    formula: tca_standard_filing_unit_assets_within_limit

  - pattern: derived_formula
    name: fl_tca_eligible
    effective_from: '2026-01-01'
    entity: TanfUnit
    dtype: Judgment
    period: Month
    source: axiom-programs/us-fl/tca/fy-2026 financial eligibility composition
    formula: fl_tca_net_income_eligible and fl_tca_resources_eligible

  - pattern: conditional_value
    name: fl_tca
    effective_from: '2026-01-01'
    entity: TanfUnit
    dtype: Money
    period: Month
    unit: USD
    source: axiom-programs/us-fl/tca/fy-2026 benefit amount composition
    condition: fl_tca_eligible
    when_true: tca_cash_benefit_to_issue
    when_false: 0
