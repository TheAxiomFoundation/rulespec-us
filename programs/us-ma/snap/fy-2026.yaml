# Massachusetts SNAP -- FY 2026
#
# First compiled ECPS target for MA. Federal SNAP calculation rules supply the
# executable benefit formula; encoded MA 106 CMR 364 slices are included so the
# program can grow state-specific eligibility, income, deduction, proration, and
# issuance-table behavior as those surfaces become executable.

