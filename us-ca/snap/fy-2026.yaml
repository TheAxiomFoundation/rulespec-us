# California SNAP (CalFresh) — FY 2026 benefit calculation
#
# Federal scope mirrors us-co/snap (federal SNAP law applies the same to all
# states). State scope pulls in the CA-encoded CalFresh sections from MPP
# 63-xxx; the structure tracks CDSS Manual of Policies and Procedures.
#
# Status: bootstrap. axiom-compose#1 is still draft and rulespec-us-ca does
# not yet expose top-level `snap_benefit` / `snap_eligible` rules — once
# either composer maturity or atomic-rule coverage closes that gap, this
# spec becomes runnable end-to-end.

program: us-ca/snap
period: 2026-01
outputs:
  - snap_allotment
  - snap_eligible

scope:
  federal:
    - policies/usda/snap/fy-2026-cola/maximum-allotments
    - policies/usda/snap/fy-2026-cola/deductions
    - policies/usda/snap/fy-2026-cola/income-eligibility-standards
    - regulations/7-cfr/273/3
    - regulations/7-cfr/273/4
    - regulations/7-cfr/273/6
    - regulations/7-cfr/273/10
    - statutes/7/2014/e/2
    - statutes/7/2014/e/6/A
    - statutes/7/2017/a
    - regulations/7-cfr/273/24

  state:
    # 63-300: general provisions and definitions
    - regulations/mpp/63-300/1
    - regulations/mpp/63-300/3
    - regulations/mpp/63-300/5
    - regulations/mpp/63-300/6

    # 63-401–63-411: household composition, deprivation, residency,
    # citizenship/alien status, students, work registration, ABAWD
    - regulations/mpp/63-401/1
    - regulations/mpp/63-402/1
    - regulations/mpp/63-402/11
    - regulations/mpp/63-402/13
    - regulations/mpp/63-402/15
    - regulations/mpp/63-402/16
    - regulations/mpp/63-402/17
    - regulations/mpp/63-402/21
    - regulations/mpp/63-403/1
    - regulations/mpp/63-403/2
    - regulations/mpp/63-403/4
    - regulations/mpp/63-404/1
    - regulations/mpp/63-405/1
    - regulations/mpp/63-405/3
    - regulations/mpp/63-405/4
    - regulations/mpp/63-405/51
    - regulations/mpp/63-405/52
    - regulations/mpp/63-405/53
    - regulations/mpp/63-405/71
    - regulations/mpp/63-405/72
    - regulations/mpp/63-406/1
    - regulations/mpp/63-406/3
    - regulations/mpp/63-407/1
    - regulations/mpp/63-407/41
    - regulations/mpp/63-407/42
    - regulations/mpp/63-407/51
    - regulations/mpp/63-407/61
    - regulations/mpp/63-407/62
    - regulations/mpp/63-408/1
    - regulations/mpp/63-408/4
    - regulations/mpp/63-408/5
    - regulations/mpp/63-409/1
    - regulations/mpp/63-410/1
    - regulations/mpp/63-410/6
    - regulations/mpp/63-411/1

    # 63-501–63-503: income, deductions, benefit calculation
    - regulations/mpp/63-501/11
    - regulations/mpp/63-502/1
    - regulations/mpp/63-503/12
    - regulations/mpp/63-503/14
    - regulations/mpp/63-503/15
    - regulations/mpp/63-503/16
    - regulations/mpp/63-503/22
    - regulations/mpp/63-503/25
    - regulations/mpp/63-503/31
    - regulations/mpp/63-503/41
    - regulations/mpp/63-503/43

# Known gaps (documented for transparency until closed):
#
# 1. No `snap_benefit` / `snap_eligible` top-level rule exists in
#    rulespec-us-ca yet. axiom-compose is supposed to resolve the named
#    `outputs` against the assembled atomic rules — once a CA rule chain
#    produces `snap_benefit`, this spec compiles. Until then, the spec
#    documents the intended composition without being runnable.
#
# 2. Validation needs the federal SnapUnit `derived_relation` to land
#    somewhere in rulespec-us so CA can reference it. Tracked via the
#    bucket-E migration work in rulespec-us-co.
