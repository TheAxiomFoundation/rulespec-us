format: rulespec/v1
module:
  source_verification:
    corpus_citation_path: us/guidance/usda/fns/snap-fy2026-cola/page-1
  summary: |-
    California CalFresh FY 2026 benefit calculation composition. This module
    imports federal USDA FY 2026 SNAP allotment, deduction, resource-limit,
    income-standard, income-calculation, residency, citizenship, SSN, student,
    work-requirement, and allotment rules, plus encoded California MPP SNAP
    provisions. It composes those sources into CalFresh eligibility and monthly
    benefit calculations.
imports:
  - us:policies/usda/snap/state-plan-composition
  - us:regulations/7-cfr/273/8
  - us:regulations/7-cfr/273/9
  - us-ca:policies/cdss/snap/standard-utility-allowance
  - us-ca:regulations/mpp/63-503/324
rules:
  - name: snap_total_allowable_shelter_expenses
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: California CalFresh shelter utility allowance composition bridge
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          shelter_costs

  - name: snap_excess_shelter_deduction
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: California CalFresh FY 2026 benefit calculation composition
    versions:
      - effective_from: '2025-10-01'
        formula: snap_excess_shelter_deduction_for_net_income

  - name: snap_eligible
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: California CalFresh SNAP eligibility composition bridge
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          snap_residency_eligible
          and snap_household_member_eligible
          and calfresh_income_and_resource_eligible
  - name: shelter_costs
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: California CalFresh shelter utility allowance composition bridge
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_shelter_costs_incurred + snap_standard_utility_allowance
  - name: calfresh_income_and_resource_eligible
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: California CalFresh categorical eligibility composition bridge
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          snap_categorically_eligible_for_resource_exemption
          or (
            snap_resource_eligible
            and snap_standard_income_eligible
          )
