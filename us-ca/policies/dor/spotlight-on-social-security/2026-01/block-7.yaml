format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/guidance/dor/spotlight-on-social-security/2026-01/block-7
  summary: '"Maximum SSI payment amounts in California for 2026" lists federal SSI,
    CA supplement, and monthly payment amounts by category. It also states a 2026
    rent threshold of $351.33 for the Presumed Maximum Value and Student Earned Income
    Exclusion limits of $2,410 per month, $9,730 per year, for eligible students under
    age 22 regularly attending school.'
