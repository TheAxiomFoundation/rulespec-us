  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: 2026 SSI rental rule Presumed Maximum Value threshold
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: predicate
        source:
          corpus_citation_path: us-ca/guidance/dor/spotlight-on-social-security/2026-01/block-7
          excerpt: You pay $351.33 or more per month in rent.
  versions:
  - effective_from: '2026-01-01'
    formula: monthly_rent_paid >= presumed_maximum_value_rent_threshold
- name: student_earned_income_exclusion_eligible
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: 2026 Student Earned Income Exclusion eligibility condition
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: predicate
        source:
          corpus_citation_path: us-ca/guidance/dor/spotlight-on-social-security/2026-01/block-7
          excerpt: eligible students under age 22 who are regularly attending school
  versions:
  - effective_from: '2026-01-01'
    formula: 'person_age < student_earned_income_exclusion_age_limit

      and regularly_attending_school'
- name: student_earned_income_exclusion_monthly_amount
  kind: derived
  entity: Person
  dtype: Money
  period: Month
  unit: USD
  source: 2026 Student Earned Income Exclusion monthly earned income exclusion
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-ca/guidance/dor/spotlight-on-social-security/2026-01/block-7
          excerpt: exclude up to $2,410 per month in 2026
  versions:
  - effective_from: '2026-01-01'
    formula: 'if student_earned_income_exclusion_eligible: min(max(0, earned_income),
      student_earned_income_exclusion_monthly_limit) else: 0'
