format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_paths:
      - us-ca/form/individual-income-tax/2026/540-es-instructions/document-1
      - us-ca/form/individual-income-tax/2025/540-tax-rate-schedules/document-1
      - us-ca/statute/rtc/17041
      - us-ca/statute/rtc/17043
    upstream_source_check:
      status: official_parameter_source
      checked_paths:
        - us-ca/form/individual-income-tax/2026/540-es-instructions/document-1
        - us-ca/form/individual-income-tax/2025/540-tax-rate-schedules/document-1
        - us-ca/statute/rtc/17041
        - us-ca/statute/rtc/17043
      rationale: |-
        The official 2026 California Estimated Tax Worksheet directs taxpayers
        to figure line 4 tax on completed worksheet line 3 taxable income using
        the 2025 Form 540 or Form 540NR tax materials. The official 2025 Form
        540 instructions divide those materials at $100,000: the tax table is
        mandatory at or below $100,000, while the filing-status rate schedules
        are used only above $100,000. This module encodes only that official
        greater-than-$100,000 rate-schedule branch. When the precondition is
        not met, its monetary branch output is a non-applicable zero sentinel,
        not a claim that California tax is zero; the caller must route those
        cases to the official tax table.

        The caller supplies completed worksheet line 3 taxable income after all
        deductions; this module does not subtract the worksheet's standard
        deduction again. The caller also supplies the mutually exclusive joint
        or qualifying-survivor and head-of-household classifications. When
        both are false, Schedule X (single or married/RDP filing separately)
        applies. The 2026 instructions separately impose the 1% Behavioral
        Health Services Tax on taxable income above $1,000,000 and direct that
        amount to estimated-tax worksheet line 17. Revenue and Taxation Code
        sections 17041 and 17043 supply the higher-authority progressive-tax
        and additional-tax framework; the current official forms supply the
        indexed values and estimated-tax dependency boundary encoded here.
  summary: |-
    California tax-year-2026 estimated-tax rate-schedule branch for completed
    resident Form 540 taxable income strictly above $100,000. It applies the
    official 2025 Schedule X, Y, or Z incorporated by the 2026 Form 540-ES
    worksheet and adds the worksheet's 1% Behavioral Health Services Tax above
    $1,000,000.

    This module deliberately does not compute tax at or below $100,000 because
    the official tax table, not a continuous rate schedule, controls that
    range. The public applicability judgment is authoritative for this domain;
    a monetary zero when that judgment does not hold is only a non-applicable
    sentinel and must never be read as zero tax. It also excludes taxable-
    income construction, exemption credits,
    FTB 3800 and FTB 3803 tax, nonresident allocation, all other worksheet
    taxes and credits, payment percentages and installments, and final-return
    liability. It is bounded to tax year 2026 and makes no PolicyEngine or
    TAXSIM parity claim.
rules:
  - name: ca_pit_pilot_rate_schedule_threshold
    kind: parameter
    dtype: Money
    period: Year
    unit: USD
    source: 2025 California Tax Rate Schedules, exclusive applicability threshold
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ca/form/individual-income-tax/2025/540-tax-rate-schedules/document-1
              excerpt: "Use only if your taxable income on Form 540, line 19 is more than $100,000."
    versions:
