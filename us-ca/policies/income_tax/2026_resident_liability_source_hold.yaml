format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_paths:
      - us-ca/statute/rtc/17041
      - us-ca/statute/rtc/17043
      - us-ca/statute/rtc/17045
      - us-ca/statute/rtc/17052
      - us-ca/statute/rtc/17054
      - us-ca/statute/rtc/17073.5
      - us-ca/form/individual-income-tax/2025/540-tax-table/document-1
      - us-ca/form/individual-income-tax/2025/540-tax-rate-schedules/document-1
      - us-ca/form/individual-income-tax/2026/540-es-instructions/document-1
    upstream_source_check:
      status: official_parameter_source
      checked_paths:
        - us-ca/statute/rtc/17041
        - us-ca/statute/rtc/17043
        - us-ca/statute/rtc/17045
        - us-ca/statute/rtc/17052
        - us-ca/statute/rtc/17054
        - us-ca/statute/rtc/17073.5
        - us-ca/form/individual-income-tax/2025/540-tax-table/document-1
        - us-ca/form/individual-income-tax/2025/540-tax-rate-schedules/document-1
        - us-ca/form/individual-income-tax/2026/540-es-instructions/document-1
      rationale: |-
        The pinned official corpus proves that California imposes resident
        personal income tax, a one-percent additional tax above $1,000,000,
        filing-status-specific regular tax, personal exemption credits, a
        standard deduction, and a refundable earned income credit. It also
        proves that the Franchise Tax Board must recompute the brackets,
        exemption credits, and standard deduction annually.

        The corpus does not contain the final tax-year-2026 Form 540,
        instructions, Schedule CA, annual tax table, annual rate schedules,
        indexed standard deduction, indexed exemption credits, Budget Act
        California EITC adjustment factor, or the complete annual-return credit
        and ordering surface. The 2026 Form 540-ES directs an estimated-tax
        computation to the 2025 annual materials. Those estimated-tax
        materials are preserved in the separate pilot, but they are not
        substituted here for unpublished 2026 annual-return authority.

        Because California adjusted gross income and taxable income cannot be
        constructed from the pinned sources, the otherwise source-complete
        one-percent additional-tax formula cannot be evaluated without a
        prohibited caller-completed California taxable-income input. Every
        annual monetary stage therefore fails closed to a zero sentinel while
        explicit typed source holds remain active. The sentinel is not a claim
        that the taxpayer owes zero California tax.
  summary: |-
    Tax-year-2026 California full-year-resident annual individual-income-tax
    source-hold surface. It validates the resident filing-status boundary and
    exposes typed holds for state-income construction, annually indexed
    deductions and exemptions, annual regular tax, and annual credits and
    ordering.

    Public monetary stages cover California adjusted gross income, taxable
    income, tax before credits including the additional tax, tax after
    nonrefundable credits, refundable credits, and signed net liability before
    payments. They return only a fail-closed zero sentinel while the complete
    liability hold applies. No caller-completed California income, taxable
    income, tax, deduction, exemption, or credit amount is accepted.

    This module is intentionally incomplete and makes no annual-liability or
    oracle-parity claim. Withholding, estimated payments, extensions,
    penalties, interest, local taxes, nonresident allocation, and part-year
    allocation are outside scope. The separate estimated-tax pilot remains
    bounded to its stated worksheet domain and is not composed into this
    annual-return surface.
  deferred_outputs:
    - output: us-ca:policies/income_tax/2026_resident_liability_source_hold#ca_pit_2026_state_adjusted_gross_income
      reason: |-
        The pinned corpus lacks the final 2026 Form 540, Schedule CA, and the
        complete federal-conformity, addition, and subtraction provisions
        needed to construct California adjusted gross income from federal
        return outputs and raw facts.
      source_values:
        - us-ca:policies/income_tax/2026_resident_liability_source_hold#ca_pit_2026_state_income_source_hold_applies
    - output: us-ca:policies/income_tax/2026_resident_liability_source_hold#ca_pit_2026_state_taxable_income
      reason: |-
        The pinned corpus lacks the FTB-published 2026 indexed standard
        deduction, complete itemized-deduction surface, and indexed exemption
        credit inputs required for the annual return.
      source_values:
        - us-ca:policies/income_tax/2026_resident_liability_source_hold#ca_pit_2026_deduction_and_exemption_source_hold_applies
    - output: us-ca:policies/income_tax/2026_resident_liability_source_hold#ca_pit_2026_tax_before_credits
      reason: |-
        RTC 17041 requires annual bracket recomputation and the final 2026
        annual tax table and schedules are not pinned. RTC 17043 additional tax
        also depends on the unavailable California taxable-income stage.
      source_values:
        - us-ca:policies/income_tax/2026_resident_liability_source_hold#ca_pit_2026_regular_tax_source_hold_applies
    - output: us-ca:policies/income_tax/2026_resident_liability_source_hold#ca_pit_2026_tax_after_nonrefundable_credits
      reason: |-
        The complete 2026 annual nonrefundable-credit eligibility and ordering
        surface is not present in the pinned corpus.
      source_values:
        - us-ca:policies/income_tax/2026_resident_liability_source_hold#ca_pit_2026_credit_surface_source_hold_applies
    - output: us-ca:policies/income_tax/2026_resident_liability_source_hold#ca_pit_2026_refundable_credits
      reason: |-
        The pinned corpus lacks the operative 2026 Budget Act California EITC
        adjustment factor and the complete 2026 refundable-credit surface.
      source_values:
        - us-ca:policies/income_tax/2026_resident_liability_source_hold#ca_pit_2026_credit_surface_source_hold_applies
    - output: us-ca:policies/income_tax/2026_resident_liability_source_hold#ca_pit_2026_net_income_tax_liability_before_payments
      reason: |-
        Signed net annual liability cannot be completed until every upstream
        annual source hold is cleared and the final 2026 ordering is pinned.
      source_values:
        - us-ca:policies/income_tax/2026_resident_liability_source_hold#ca_pit_2026_complete_liability_source_hold_applies

rules:
  - name: ca_pit_2026_filing_status_is_valid
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: RTC 17041, 17045, and 17054, mutually exclusive individual filing statuses
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/statute/rtc/17041
              excerpt: "except the head of a household as defined in Section 17042"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/statute/rtc/17045
              excerpt: "In the case of a joint return of spouses"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/statute/rtc/17054
              excerpt: "a single individual, a head of household, or a spouse making a separate return"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          (
            ca_pit_2026_filing_status_single
            and not ca_pit_2026_filing_status_married_separate
            and not ca_pit_2026_filing_status_joint_or_surviving_spouse
            and not ca_pit_2026_filing_status_head_of_household
          )
          or (
            not ca_pit_2026_filing_status_single
            and ca_pit_2026_filing_status_married_separate
            and not ca_pit_2026_filing_status_joint_or_surviving_spouse
            and not ca_pit_2026_filing_status_head_of_household
          )
          or (
            not ca_pit_2026_filing_status_single
            and not ca_pit_2026_filing_status_married_separate
            and ca_pit_2026_filing_status_joint_or_surviving_spouse
            and not ca_pit_2026_filing_status_head_of_household
          )
          or (
            not ca_pit_2026_filing_status_single
            and not ca_pit_2026_filing_status_married_separate
            and not ca_pit_2026_filing_status_joint_or_surviving_spouse
            and ca_pit_2026_filing_status_head_of_household
          )

  - name: ca_pit_2026_input_domain_is_valid
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: RTC 17041(a) and (c), full-year California resident individual return
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/statute/rtc/17041
              excerpt: "every resident of this state who is not a part-year resident"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          ca_pit_2026_is_full_year_california_resident_return
          and ca_pit_2026_filing_status_is_valid

  - name: ca_pit_2026_state_income_source_hold_applies
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: Missing pinned 2026 California adjusted-gross-income construction authority
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/statute/rtc/17041
              excerpt: "upon the entire taxable income of every resident of this state"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: true

  - name: ca_pit_2026_deduction_and_exemption_source_hold_applies
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: Missing FTB-published 2026 indexed deduction and exemption amounts
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/statute/rtc/17073.5
              excerpt: "multiply the standard deduction amounts in the preceding taxable year by the inflation adjustment factor"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/statute/rtc/17054
              excerpt: "multiply the immediately preceding taxable year credits by the inflation adjustment factor"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: true

  - name: ca_pit_2026_regular_tax_source_hold_applies
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: Missing final 2026 annual Form 540 tax table and rate schedules
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/statute/rtc/17041
              excerpt: "the Franchise Tax Board shall recompute the income tax brackets"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/form/individual-income-tax/2025/540-tax-table/document-1
              excerpt: "2025 California Tax Table"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/form/individual-income-tax/2026/540-es-instructions/document-1
              excerpt: "2025 Form 540"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: true

  - name: ca_pit_2026_credit_surface_source_hold_applies
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: Missing complete 2026 annual credits, Budget Act factor, and ordering
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/statute/rtc/17052
              excerpt: "Unless otherwise specified in the annual Budget Act"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/statute/rtc/17052
              excerpt: "If the amount allowable as a credit under this section exceeds the tax liability"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/statute/rtc/17043
              excerpt: "The provisions of Section 17039, relating to the allowance of credits"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: true

  - name: ca_pit_2026_complete_liability_source_hold_applies
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: Combined source hold for the incomplete 2026 annual resident liability chain
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/statute/rtc/17041
              excerpt: "There shall be imposed for each taxable year"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/statute/rtc/17043
              excerpt: "in addition to any other taxes imposed by this part"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          ca_pit_2026_state_income_source_hold_applies
          or ca_pit_2026_deduction_and_exemption_source_hold_applies
          or ca_pit_2026_regular_tax_source_hold_applies
          or ca_pit_2026_credit_surface_source_hold_applies

  - name: ca_pit_2026_state_adjusted_gross_income
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Fail-closed annual California adjusted-gross-income sentinel while source held
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/statute/rtc/17073.5
              excerpt: "deductions other than those which are to be subtracted from gross income in computing adjusted gross income"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: '0'

  - name: ca_pit_2026_state_taxable_income
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Fail-closed annual California taxable-income sentinel while source held
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/statute/rtc/17041
              excerpt: "upon the entire taxable income of every resident of this state"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: '0'

  - name: ca_pit_2026_tax_before_credits
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Fail-closed annual regular and additional tax sentinel while source held
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/statute/rtc/17041
              excerpt: "taxes in the following amounts and at the following rates"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/statute/rtc/17043
              excerpt: "an additional tax shall be imposed at the rate of 1 percent"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: '0'

  - name: ca_pit_2026_tax_after_nonrefundable_credits
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Fail-closed annual tax-after-nonrefundable-credits sentinel while source held
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/statute/rtc/17054
              excerpt: "credits for personal exemption may be deducted from the tax imposed under Section 17041"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: '0'

  - name: ca_pit_2026_refundable_credits
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Fail-closed annual refundable-credit sentinel while source held
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/statute/rtc/17052
              excerpt: "the balance, if any, shall be paid from the Tax Relief and Refund Account and refunded to the taxpayer"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: '0'

  - name: ca_pit_2026_net_income_tax_liability_before_payments
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Fail-closed signed annual resident liability sentinel before payments while source held
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/statute/rtc/17052
              excerpt: "exceeds the tax liability computed under this part for the taxable year"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: '0'

inputs:
  - name: ca_pit_2026_is_full_year_california_resident_return
    entity: TaxUnit
    dtype: Bool
    period: Year
    description: True only for a California resident who is not a part-year resident for tax year 2026.
  - name: ca_pit_2026_filing_status_single
    entity: TaxUnit
    dtype: Bool
    period: Year
    description: True only for a single filer.
  - name: ca_pit_2026_filing_status_married_separate
    entity: TaxUnit
    dtype: Bool
    period: Year
    description: True only for a spouse filing a separate return.
  - name: ca_pit_2026_filing_status_joint_or_surviving_spouse
    entity: TaxUnit
    dtype: Bool
    period: Year
    description: True only for a joint return or qualifying surviving-spouse return.
  - name: ca_pit_2026_filing_status_head_of_household
    entity: TaxUnit
    dtype: Bool
    period: Year
    description: True only for a head-of-household return.
