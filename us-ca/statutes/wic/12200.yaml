format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/statute/wic/12200
  summary: |-
    An aged, blind or disabled applicant or recipient shall be paid aid which, when added to federal Title XVI Part A benefits and other nonexempt income and resources, equals listed monthly grant levels; subdivision (i) reduces certain grant levels for in-kind support and maintenance, subject to Section 12204.
  deferred_outputs:
    - output: us-ca:statutes/wic/12200#ca_state_supplement
      reason: Final aid computation for individuals or couples whose federal benefit is reduced for in-kind support and maintenance is expressly subject to Section 12204, which is not available in copied context.
rules:
  - name: blind_individual_grant_level
    kind: parameter
    dtype: Money
    period: Month
    unit: USD
    source: Welf. & Inst. Code § 12200(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ca/statute/wic/12200
              excerpt: "For a blind applicant or recipient, the sum of seven hundred four dollars ($704) per month"
    versions:
      - effective_from: '1991-07-01'
        formula: |-
          704
