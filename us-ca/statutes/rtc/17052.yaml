format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/statute/rtc/17052
  summary: California allows a refundable California Earned Income Tax Credit determined
    by reference to IRC section 32 as modified by this section. The section substitutes
    state credit percentages, earned income amounts, phaseout amounts, investment
    income limit, inflation rules, temporary and later alternative tables, ITIN identification-number
    treatment, administrative authority, and reporting/finding clauses.
  deferred_outputs:
  - output: us-ca:statutes/rtc/17052/a#california_earned_income_tax_credit
    reason: The final credit depends on IRC section 32, RTC section 17039 net tax,
      annual Budget Act authorization, and other cited federal and California mechanics
      not provided as copied RuleSpec dependencies.
  - output: us-ca:statutes/rtc/17052/e#inflation_adjusted_earned_income_credit_amounts
    reason: The recomputation method depends on RTC section 17041(h), which is not
      provided as copied RuleSpec context; local CPI floor parameters are encoded
      independently.
  - output: us-ca:statutes/rtc/17052/g#franchise_tax_board_administrative_authority
    reason: Administrative rulemaking, guidance, and emergency-regulation authority
      is not a taxpayer-level computable amount or eligibility condition.
  - output: us-ca:statutes/rtc/17052/j#annual_reporting_requirement
    reason: Legislative reporting requirements for the Franchise Tax Board are administrative
      outputs outside the supported taxpayer computation surface.
  - output: us-ca:statutes/rtc/17052/r#undocumented_persons_legislative_finding
    reason: Legislative finding/declaration is non-operative for formula execution;
      credit eligibility still depends on the otherwise-qualified credit computation.
  - output: us-ca:statutes/rtc/17052#qualifying_child_count_category
    reason: Generated rule ignored a source-stated substitution, modification, or
      limitation parameter. This output is deferred until the upstream cross-referenced
      mechanics can be imported or composed without stranding the modifier.
    source_values:
    - us-ca:statutes/rtc/17052#investment_income_limit
