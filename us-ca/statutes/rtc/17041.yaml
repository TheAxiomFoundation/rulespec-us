format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/statute/rtc/17041
  summary: Section 17041 imposes California personal income tax by taxable-income
    brackets for residents other than heads of household, provides a temporary 0.25
    percentage-point rate increase for taxable years beginning on or after January
    1, 2009, and before January 1, 2011, sets separate head-of-household brackets,
    prorates nonresident and part-year resident tax by California taxable income,
    applies subdivision (a) rates to estates, trusts, and common trust funds, states
    that the tax is not a surtax, modifies IRC section 1(g), requires annual inflation
    recomputation of brackets, and defines taxable income of nonresidents and part-year
    residents.
  deferred_outputs:
  - output: us-ca:statutes/rtc/17041#resident_non_head_tax
    reason: The resident non-head tax depends on whether the taxpayer is a head of
      household as defined in Section 17042, but no copied RuleSpec source provides
      that filing-status definition.
    source_values:
    - us-ca:statutes/rtc/17041#regular_tax_base_amount_by_band
    - us-ca:statutes/rtc/17041#regular_tax_rate_by_band
    - us-ca:statutes/rtc/17041#regular_tax_excess_floor_by_band
    - us-ca:statutes/rtc/17041#temporary_rate_increase
  - output: us-ca:statutes/rtc/17041#head_of_household_tax
    reason: The head-of-household tax depends on the head-of-household status defined
      in Section 17042, but no copied RuleSpec source provides that definition.
    source_values:
    - us-ca:statutes/rtc/17041#head_of_household_tax_base_amount_by_band
    - us-ca:statutes/rtc/17041#head_of_household_tax_rate_by_band
    - us-ca:statutes/rtc/17041#head_of_household_tax_excess_floor_by_band
    - us-ca:statutes/rtc/17041#temporary_rate_increase
  - output: us-ca:statutes/rtc/17041#nonresident_or_part_year_resident_tax
    reason: The nonresident or part-year resident tax requires taxable income as defined
      using Section 17014 and California-source income rules in Article 9 of Chapter
      3 and Chapter 11, and those cited RuleSpec sources are unavailable.
    source_values:
    - us-ca:statutes/rtc/17041#temporary_rate_increase
  - output: us-ca:statutes/rtc/17041/g#children_unearned_income_tax_treatment
    reason: The source incorporates and modifies IRC section 1(g), but no copied RuleSpec
