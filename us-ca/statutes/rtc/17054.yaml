    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ca/statute/rtc/17054
              excerpt: "a credit of fifty-two dollars ($52)"
    versions:
      - effective_from: '2021-01-01'
        formula: |-
          52
  - name: dependent_personal_exemption_credit_amount
