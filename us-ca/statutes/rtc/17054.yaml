format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/statute/rtc/17054
  summary: |-
    In the case of individuals, credits for personal exemption may be deducted from tax imposed under Sections 17041 or 17048, less specified Section 17560 increases. The section states $52 single/head/separate credits, $104 surviving-spouse/joint credits, $52 age-65-or-over and blindness credits, a $227 dependent credit, dependent-credit identification requirements, temporary dependent-credit rules, a blindness definition using 20/200 acuity and 20-degree visual field thresholds, a zero-credit rule where another taxpayer may claim the individual, and annual inflation adjustment computation.
  deferred_outputs:
    - output: us-ca:statutes/rtc/17054#personal_exemption_credit
      reason: Final tax-unit personal exemption credit depends on filing-status classifications, Section 17041 or 17048 tax, Section 17560 increases, surviving-spouse definition under Section 17046, dependent definition under Section 17056, and dependent exemption allowance under IRC Section 151(c), none of which are supplied as executable RuleSpec context.
      source_values:
        - us-ca:statutes/rtc/17054#base_individual_personal_exemption_credit
        - us-ca:statutes/rtc/17054#joint_or_surviving_spouse_personal_exemption_credit
        - us-ca:statutes/rtc/17054#senior_personal_exemption_credit
        - us-ca:statutes/rtc/17054#dependent_personal_exemption_credit_amount
        - us-ca:statutes/rtc/17054#taxpayer_blind_personal_exemption_credit
        - us-ca:statutes/rtc/17054#spouse_blind_personal_exemption_credit
    - output: us-ca:statutes/rtc/17054/d#dependent_personal_exemption_credit
      reason: The dependent credit amount is source-stated, but determining eligible dependents depends on Section 17056, IRC Section 151(c), and identification-number rules under IRC Section 6109, which are not supplied as executable RuleSpec context.
      source_values:
        - us-ca:statutes/rtc/17054#dependent_personal_exemption_credit_amount
rules:
  - name: base_individual_personal_exemption_credit
    kind: parameter
    dtype: Money
    unit: USD
    source: 17054(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ca/statute/rtc/17054
              excerpt: "a credit of fifty-two dollars ($52)"
    versions:
      - effective_from: '2021-01-01'
        formula: |-
          52
  - name: joint_or_surviving_spouse_personal_exemption_credit
