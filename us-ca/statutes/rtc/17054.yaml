  - name: individual_is_blind
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 17054(g)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-ca/statute/rtc/17054
              excerpt: "central visual acuity does not exceed 20/200 ... or ... limitation in the fields of vision"
          - path: versions[0].formula
            kind: import
            import:
              target: us-ca:statutes/rtc/17054#central_visual_acuity_numerator_threshold
              output: central_visual_acuity_numerator_threshold
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-ca:statutes/rtc/17054#central_visual_acuity_denominator_threshold
              output: central_visual_acuity_denominator_threshold
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-ca:statutes/rtc/17054#visual_field_angle_threshold
              output: visual_field_angle_threshold
              hash: sha256:local
    versions:
      - effective_from: '2021-01-01'
        formula: |-
          better_eye_central_visual_acuity_with_correcting_lenses <= central_visual_acuity_numerator_threshold / central_visual_acuity_denominator_threshold
          or (better_eye_central_visual_acuity_with_correcting_lenses > central_visual_acuity_numerator_threshold / central_visual_acuity_denominator_threshold and widest_visual_field_diameter_angle <= visual_field_angle_threshold)
  - name: individual_personal_exemption_credit_zero_due_to_another_taxpayer
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: USD
    source: 17054(h)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/statute/rtc/17054
              excerpt: "the credit amount applicable to that individual for that individual's taxable year is zero"
    versions:
      - effective_from: '2021-01-01'
        formula: |-
          if credit_under_this_section_allowable_to_another_taxpayer_for_taxable_year_beginning_in_same_calendar_year: 0 else: personal_exemption_credit_amount_before_subdivision_h
