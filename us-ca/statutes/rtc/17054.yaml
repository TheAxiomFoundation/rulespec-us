              corpus_citation_path: us-ca/statute/rtc/17054
              excerpt: "20/200 in the better eye"
    versions:
      - effective_from: '2021-01-01'
        formula: |-
          20
  - name: central_visual_acuity_denominator_threshold
    kind: parameter
    dtype: Integer
    source: 17054(g)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/statute/rtc/17054
              excerpt: "20/200 in the better eye"
    versions:
      - effective_from: '2021-01-01'
        formula: |-
          200
  - name: visual_field_angle_threshold
    kind: parameter
    dtype: Integer
    source: 17054(g)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/statute/rtc/17054
              excerpt: "an angle no greater than 20 degrees"
    versions:
      - effective_from: '2021-01-01'
        formula: |-
