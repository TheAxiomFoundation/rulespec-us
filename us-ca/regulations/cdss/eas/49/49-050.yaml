format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/cdss/eas/49/49-050
  summary: |-
    ".1 CAPI payment standards are equivalent to SSI/SSP payment standards, except that" individual standards are "$10 less," eligible-couple standards are "$20 less," and mixed CAPI/SSI-SSP couple standards are "$10 less" than SSI/SSP eligible-couple standards. ".2 A person's living arrangement affects which CAPI payment standard is selected" as of the first moment of the month, subject to throughout-a-month institution and reduced-needs rules. The source also states disabled-child, Title XIX medical-facility, temporary medical-confinement, and blind-standard branches.
  deferred_outputs:
    - output: us-ca:regulations/cdss/eas/49/49-050#ca_capi_living_arrangement_payment_standard_selection
      reason: The source makes living-arrangement-specific payment-standard selection depend on SSI/SSP living-arrangement rules and cited MPP Sections 46-160, 46-140, and 49-035.521, which are not available as copied RuleSpec sources for this artifact. The executable payment-standard formula therefore applies the source-stated CAPI reductions to caller-supplied SSI/SSP standards already selected for the applicable living arrangement.
      source_values:
        - us-ca:regulations/cdss/eas/49/49-050#ca_capi_individual_payment_standard_reduction
        - us-ca:regulations/cdss/eas/49/49-050#ca_capi_eligible_couple_payment_standard_reduction
        - us-ca:regulations/cdss/eas/49/49-050#ca_capi_mixed_capi_ssi_ssp_couple_payment_standard_reduction
        - us-ca:regulations/cdss/eas/49/49-050#ca_capi_disabled_child_payment_standard_age_limit_years
        - us-ca:regulations/cdss/eas/49/49-050#ca_capi_title_xix_medical_facility_medi_cal_cost_share_threshold
        - us-ca:regulations/cdss/eas/49/49-050#ca_capi_temporary_medical_confinement_max_days
rules:
  - name: ca_capi_individual_payment_standard_reduction
    kind: parameter
    dtype: Money
    unit: USD
    period: Month
    source: MPP 49-050.11
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ca/regulation/cdss/eas/49/49-050
              excerpt: "individuals are $10 less"
    versions:
      - effective_from: '2003-10-16'
        formula: |-
          10

  - name: ca_capi_eligible_couple_payment_standard_reduction
    kind: parameter
    dtype: Money
    unit: USD
    period: Month
    source: MPP 49-050.12
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ca/regulation/cdss/eas/49/49-050
              excerpt: "eligible couples are $20 less"
    versions:
      - effective_from: '2003-10-16'
        formula: |-
          20

  - name: ca_capi_mixed_capi_ssi_ssp_couple_payment_standard_reduction
    kind: parameter
    dtype: Money
    unit: USD
    period: Month
    source: MPP 49-050.13
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ca/regulation/cdss/eas/49/49-050
              excerpt: "one member is receiving or applying for CAPI and the other is receiving SSI/SSP is $10 less"
    versions:
      - effective_from: '2003-10-16'
        formula: |-
          10

  - name: ca_capi_disabled_child_payment_standard_age_limit_years
    kind: parameter
    dtype: Count
    period: Month
    source: MPP 49-050.25
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/cdss/eas/49/49-050
              excerpt: "disabled children under age 18"
    versions:
      - effective_from: '2003-10-16'
        formula: |-
          18

  - name: ca_capi_title_xix_medical_facility_medi_cal_cost_share_threshold
    kind: parameter
    dtype: Rate
    period: Month
    source: MPP 49-050.26
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/cdss/eas/49/49-050
              excerpt: "pays more than 50 percent"
    versions:
      - effective_from: '2003-10-16'
        formula: |-
          0.50

  - name: ca_capi_temporary_medical_confinement_max_days
    kind: parameter
    dtype: Count
    period: Month
    source: MPP 49-050.261(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/cdss/eas/49/49-050
              excerpt: "90 consecutive days or less"
    versions:
      - effective_from: '2003-10-16'
        formula: |-
          90

  - name: ca_capi_payment_standard
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: USD
    source: MPP 49-050.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/cdss/eas/49/49-050
              excerpt: "CAPI payment standards are equivalent to SSI/SSP payment standards, except that"
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ca/regulation/cdss/eas/49/49-050
              excerpt: "$10 less ... $20 less ... $10 less"
    versions:
      - effective_from: '2003-10-16'
        formula: |-
          if couple_one_member_receiving_or_applying_for_capi_and_other_receiving_ssi_ssp:
            max(0, ssi_ssp_payment_standard_for_selected_eligible_couple_living_arrangement - ca_capi_mixed_capi_ssi_ssp_couple_payment_standard_reduction)
          else:
            if person_is_member_of_eligible_couple:
              max(0, ssi_ssp_payment_standard_for_selected_eligible_couple_living_arrangement - ca_capi_eligible_couple_payment_standard_reduction)
            else:
              max(0, ssi_ssp_payment_standard_for_selected_individual_living_arrangement - ca_capi_individual_payment_standard_reduction)
