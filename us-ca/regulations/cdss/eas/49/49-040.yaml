  - name: ca_capi_retroactive_payment_resource_exclusion_months
    kind: parameter
    dtype: Count
    period: Month
    source: MPP 49-040.3(n)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ca/regulation/cdss/eas/49/49-040
