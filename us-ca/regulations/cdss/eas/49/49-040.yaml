  - name: ca_capi_resource_eligible
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: MPP 49-040.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/cdss/eas/49/49-040
              excerpt: "non-excludable resources must not exceed $2,000 for an individual or $3,000 for a couple"
    versions:
      - effective_from: '2003-10-16'
        formula: |-
          (applicant_is_member_of_couple and ca_capi_countable_resources <= ca_capi_couple_resource_limit)
          or ((not applicant_is_member_of_couple) and ca_capi_countable_resources <= ca_capi_individual_resource_limit)
