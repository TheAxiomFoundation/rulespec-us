    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ca/regulation/cdss/eas/49/49-040
              excerpt: "Up to $1,500 each set aside for burial expenses"
    versions:
