format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/cdss/eas/49/49-040
  summary: |-
    ".1 To be eligible for CAPI, an individual’s or couple’s non-excludable resources must not exceed $2,000 for an individual or $3,000 for a couple." Section 49-040.3 lists resource exclusions including home, household goods and personal effects up to $2,000, one automobile subject to a $4,500 market value rule, self-support property thresholds, life insurance face-value and burial-fund limits, and time-limited exclusions for retroactive payments, tax credits, crime-victim payments, and relocation assistance. Resource determinations are made as of the first moment of the month.
rules:
  - name: ca_capi_individual_resource_limit
    kind: parameter
    dtype: Money
    unit: USD
    period: Month
    source: MPP 49-040.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ca/regulation/cdss/eas/49/49-040
              excerpt: "must not exceed $2,000 for an individual"
    versions:
      - effective_from: '2003-10-16'
        formula: |-
          2000

  - name: ca_capi_couple_resource_limit
    kind: parameter
    dtype: Money
    unit: USD
    period: Month
    source: MPP 49-040.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ca/regulation/cdss/eas/49/49-040
              excerpt: "or $3,000 for a couple"
    versions:
      - effective_from: '2003-10-16'
        formula: |-
          3000

  - name: ca_capi_household_goods_personal_effects_equity_exclusion_limit
    kind: parameter
    dtype: Money
    unit: USD
    period: Month
    source: MPP 49-040.3(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ca/regulation/cdss/eas/49/49-040
              excerpt: "does not exceed $2,000"
    versions:
      - effective_from: '2003-10-16'
        formula: |-
          2000

  - name: ca_capi_unusual_household_item_market_value_safe_harbor
    kind: parameter
    dtype: Money
    unit: USD
    period: Month
    source: MPP 49-040.3(b)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ca/regulation/cdss/eas/49/49-040
              excerpt: "current market value of $1,000 or less"
    versions:
      - effective_from: '2003-10-16'
        formula: |-
          1000

  - name: ca_capi_automobile_market_value_exclusion_limit
    kind: parameter
    dtype: Money
    unit: USD
    period: Month
    source: MPP 49-040.3(c)(5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ca/regulation/cdss/eas/49/49-040
              excerpt: "current market value does not exceed $4,500"
    versions:
      - effective_from: '2003-10-16'
        formula: |-
          4500

  - name: ca_capi_nonbusiness_self_support_property_equity_limit
    kind: parameter
    dtype: Money
    unit: USD
    period: Month
    source: MPP 49-040.3(e)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ca/regulation/cdss/eas/49/49-040
              excerpt: "equity is less than $6,000"
    versions:
      - effective_from: '2003-10-16'
        formula: |-
          6000

  - name: ca_capi_nonbusiness_self_support_property_income_rate
    kind: parameter
    dtype: Rate
    period: Year
    source: MPP 49-040.3(e)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ca/regulation/cdss/eas/49/49-040
              excerpt: "at least 6 percent of the excluded equity"
    versions:
      - effective_from: '2003-10-16'
        formula: |-
          0.06

  - name: ca_capi_life_insurance_combined_face_value_exclusion_limit
    kind: parameter
    dtype: Money
    unit: USD
    period: Month
    source: MPP 49-040.3(h)
