  - name: ca_capi_earned_income_tax_credit_resource_exclusion_months
    kind: parameter
    dtype: Count
    period: Month
    source: MPP 49-040.3(o)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ca/regulation/cdss/eas/49/49-040
              excerpt: "for the month following the month of receipt"
    versions:
      - effective_from: '2003-10-16'
