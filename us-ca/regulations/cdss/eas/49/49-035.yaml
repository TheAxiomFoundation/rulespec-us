format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/cdss/eas/49/49-035
  summary: |-
    ".1 To be eligible for CAPI, an individual’s or couple’s countable income must be lower than the appropriate CAPI payment standard." Countable income is gross income after exclusions and disregards, including spouse or ineligible-parent income in the same household. Sections 49-035.4 and 49-035.53 list ordered earned and unearned income exclusions, including $10, $400 monthly/$1,620 yearly, $20, $65, one-half of remaining earned income, and one-third of absent-parent child support. The source also describes in-kind support and maintenance valuation, items that are not income, and deeming from ineligible spouses, ineligible parents, and sponsors.
  deferred_outputs:
    - output: us-ca:regulations/cdss/eas/49/49-035#ca_capi_countable_income
      reason: Countable income requires detailed SSI/SSP income rules in 20 CFR Part 416, Subpart K, and cited internal CAPI deeming and sponsor-deeming provisions that are not available as copied RuleSpec sources for this artifact. This file retains source-stated local exclusion parameters and encodes income eligibility from the externally determined countable income and appropriate payment standard.
      source_values:
        - us-ca:regulations/cdss/eas/49/49-035#ca_capi_earned_infrequent_irregular_income_exclusion_limit
        - us-ca:regulations/cdss/eas/49/49-035#ca_capi_student_child_earned_income_monthly_exclusion_limit
        - us-ca:regulations/cdss/eas/49/49-035#ca_capi_student_child_earned_income_annual_exclusion_limit
        - us-ca:regulations/cdss/eas/49/49-035#ca_capi_general_income_monthly_exclusion
        - us-ca:regulations/cdss/eas/49/49-035#ca_capi_earned_income_initial_exclusion
        - us-ca:regulations/cdss/eas/49/49-035#ca_capi_remaining_earned_income_exclusion_rate
        - us-ca:regulations/cdss/eas/49/49-035#ca_capi_irregular_unearned_income_exclusion_limit
        - us-ca:regulations/cdss/eas/49/49-035#ca_capi_absent_parent_child_support_exclusion_rate
