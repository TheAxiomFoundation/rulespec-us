format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/cdss/eas/49/49-025
  summary: |-
    ".1 To be eligible for CAPI as an aged individual, a person must be 65 years of age or older." Blind and disabled CAPI eligibility require meeting the SSI/SSP requirements, with current Title II, SSI/SSP, or Medi-Cal determinations usable if not lapsed. A new CAPI applicant engaging in substantial gainful activity is not considered disabled. Counties may make presumptive disability determinations for listed diagnoses; benefits based on presumptive disability require all other eligibility criteria, cannot be paid longer than 6 months, and are not overpayments if the applicant is ultimately not blind or disabled.
