  - name: ca_capi_eligible_person
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: MPP 49-025.1-.4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/cdss/eas/49/49-025
    versions:
      - effective_from: '2008-07-01'
        formula: |-
          (
            person_age_years >= ca_capi_aged_minimum_age_years
            and (
              (
                date_of_birth_public_or_religious_record_available
                and (
                  applicant_submitted_public_record_of_birth
                  or applicant_submitted_religious_birth_or_baptism_record_recorded_before_required_age
                )
              )
              or (
                not date_of_birth_public_or_religious_record_available
                and applicant_submitted_other_evidence_of_date_of_birth
              )
              or (
                applicant_alleged_age_years >= ca_capi_alleged_age_document_sufficiency_minimum_age_years
                and applicant_submitted_document_age_years >= ca_capi_alleged_age_document_minimum_age_years
              )
            )
          )
          or person_meets_blindness_requirements_specified_for_ssi_ssp_program
          or current_blindness_determination_for_title_ii_ssi_ssp_or_medi_cal_has_not_lapsed
          or (
            (
              better_eye_central_visual_acuity_numerator_with_correcting_lens == ca_capi_statutory_blindness_visual_acuity_numerator
              and better_eye_central_visual_acuity_denominator_with_correcting_lens >= ca_capi_statutory_blindness_visual_acuity_denominator
            )
            or widest_diameter_of_visual_field_degrees <= ca_capi_statutory_blindness_visual_field_max_degrees
          )
          or (
            not person_engaging_in_substantial_gainful_activity_at_new_capi_application_filing
            and (
              person_meets_disability_requirements_specified_for_ssi_ssp_program
              or current_disability_determination_for_title_ii_ssi_ssp_or_medi_cal_has_not_lapsed
              or (
                person_age_years >= ca_capi_child_disability_age_limit_years
                and adult_has_medically_determinable_impairment_causing_inability_to_do_substantial_gainful_activity
                and adult_impairment_expected_to_result_in_death_or_last_required_duration
                and adult_severe_impairment_prevents_previous_work_or_other_substantial_gainful_activity
              )
              or (
                person_age_years < ca_capi_child_disability_age_limit_years
                and child_has_medically_determinable_impairment_causing_marked_and_severe_functional_limitations
                and child_impairment_expected_to_cause_death_or_last_required_duration
              )
            )
          )
          or (
            person_meets_all_other_capi_eligibility_criteria
            and capi_payments_already_made_based_on_presumptive_disability_months < ca_capi_presumptive_disability_payment_limit_months
            and (
              person_has_amputation_of_two_limbs
              or person_has_amputation_of_leg_at_hip
              or person_alleges_total_deafness
              or person_alleges_total_blindness
              or person_alleges_bed_confinement_or_immobility_without_assistive_device_due_to_long_standing_condition
              or (
                person_alleges_stroke
                and months_since_stroke > ca_capi_presumptive_stroke_lookback_minimum_months
                and person_has_continued_marked_difficulty_walking_or_using_hand_or_arm
              )
              or (
                person_alleges_cerebral_palsy_muscular_dystrophy_or_muscle_atrophy
                and person_has_marked_difficulty_walking_speaking_or_coordinating_hands_or_arms
              )
              or person_alleges_diabetes_with_amputation_of_foot
              or person_alleges_down_syndrome
              or (
                severe_mental_deficiency_alleged_by_individual_filing_on_claimants_behalf
                and person_age_years >= ca_capi_presumptive_severe_mental_deficiency_minimum_age_years
              )
              or (
                child_age_months <= ca_capi_presumptive_low_birth_weight_child_max_age_months
                and birth_weight_grams < ca_capi_presumptive_low_birth_weight_grams
              )
              or person_has_hiv_infection_with_medical_source_statement_regarding_manifestations
              or (
                child_age_months <= ca_capi_presumptive_low_birth_weight_child_max_age_months
                and (
                  (
                    gestational_age_at_birth_weeks >= ca_capi_presumptive_gestational_age_37_weeks
                    and gestational_age_at_birth_weeks <= ca_capi_presumptive_gestational_age_40_weeks
                    and birth_weight_grams < ca_capi_presumptive_gestational_weight_37_to_40_grams
                  )
                  or (
                    gestational_age_at_birth_weeks == ca_capi_presumptive_gestational_age_36_weeks
                    and birth_weight_grams <= ca_capi_presumptive_gestational_weight_36_grams
                  )
                  or (
                    gestational_age_at_birth_weeks == ca_capi_presumptive_gestational_age_35_weeks
                    and birth_weight_grams <= ca_capi_presumptive_gestational_weight_35_grams
                  )
                  or (
                    gestational_age_at_birth_weeks == ca_capi_presumptive_gestational_age_34_weeks
                    and birth_weight_grams <= ca_capi_presumptive_gestational_weight_34_grams
                  )
                  or (
                    gestational_age_at_birth_weeks == ca_capi_presumptive_gestational_age_33_weeks
                    and birth_weight_grams <= ca_capi_presumptive_gestational_weight_33_grams
                  )
                )
              )
              or physician_or_knowledgeable_hospice_official_confirms_hospice_services_due_to_terminal_cancer
            )
          )

  - name: ca_capi_presumptive_disability_payments_not_overpayments_when_later_not_blind_or_disabled
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: MPP 49-025.44
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/cdss/eas/49/49-025
              excerpt: "Payments based on a presumptive disability are not considered overpayments if the applicant is ultimately determined to be not blind or disabled."
    versions:
      - effective_from: '2003-10-16'
        formula: |-
          payments_were_based_on_presumptive_disability
          and applicant_ultimately_determined_not_blind_or_disabled
