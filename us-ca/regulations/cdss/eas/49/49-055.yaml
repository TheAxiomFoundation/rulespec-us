format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/cdss/eas/49/49-055
  summary: '".1 Retrospective monthly accounting is used in determining the CAPI benefit
    amount" using countable income received "two months prior to the current month"
    as the budget month, subject to listed exceptions for initial eligibility months,
    non-recurring income, in-kind support and maintenance, and deemed income after
    an ineligible spouse or parent dies or a child attains age 18. ".31 Determine
    the correct payment standard for the payment month"; ".32 Subtract the individual''s,
    or couple''s, countable income from the budget month"; ".33 The difference is
    the CAPI benefit amount." ".4 Each member of an eligible couple receives one-half
    of the couple''s benefit amount when each member is eligible for CAPI."'
  deferred_outputs:
  - output: us-ca:regulations/cdss/eas/49/49-055#ca_capi_countable_income_for_payment_month_under_retrospective_accounting
    reason: The source's retrospective monthly accounting exceptions require selecting
      and adjusting income across eligibility months, income types, living-arrangement
      reduction status, and death or age-attainment timing. This artifact keeps the
      final CAPI amount executable from the source-stated payment standard and a caller-supplied
      countable income amount already selected for the payment month under MPP 49-055.2.
    source_values:
    - us-ca:regulations/cdss/eas/49/49-055#ca_capi_retrospective_budget_month_lag_months
    - us-ca:regulations/cdss/eas/49/49-055#ca_capi_initial_eligibility_same_month_accounting_months
    - us-ca:regulations/cdss/eas/49/49-055#ca_capi_budget_month_parent_deeming_child_age_limit_years
imports:
- us-ca:regulations/cdss/eas/49/49-050#ca_capi_payment_standard
rules:
- name: ca_capi_retrospective_budget_month_lag_months
  kind: parameter
  dtype: Count
  period: Month
  source: MPP 49-055.1 and 49-055.11
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-ca/regulation/cdss/eas/49/49-055
          excerpt: countable income received two months prior to the current month
  versions:
  - effective_from: '2003-10-16'
    formula: '2'
- name: ca_capi_initial_eligibility_same_month_accounting_months
  kind: parameter
  dtype: Count
  period: Month
  source: MPP 49-055.21
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-ca/regulation/cdss/eas/49/49-055
          excerpt: For the first two months of initial eligibility
  versions:
  - effective_from: '2003-10-16'
    formula: '2'
- name: ca_capi_budget_month_parent_deeming_child_age_limit_years
  kind: parameter
  dtype: Count
  period: Month
  source: MPP 49-055.24
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-ca/regulation/cdss/eas/49/49-055
          excerpt: after the month child attains age 18
  versions:
  - effective_from: '2003-10-16'
    formula: '18'
- name: ca_capi_eligible_couple_member_share_rate
  kind: parameter
  dtype: Rate
  period: Month
  source: MPP 49-055.4
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-ca/regulation/cdss/eas/49/49-055
          excerpt: receives one-half of the couple's benefit amount
  versions:
  - effective_from: '2003-10-16'
    formula: 1 / 2
- name: ca_capi
  kind: derived
  entity: Person
  dtype: Money
  period: Month
  unit: USD
  source: MPP 49-055.3 and 49-055.4
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-ca/regulation/cdss/eas/49/49-055
          excerpt: Subtract the individual's, or couple's, countable income from the
            budget month from the payment standard
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-ca/regulation/cdss/eas/49/49-055
          excerpt: The difference is the CAPI benefit amount
      - path: versions[0].formula
        kind: import
        import:
          target: us-ca:regulations/cdss/eas/49/49-050#ca_capi_payment_standard
          output: ca_capi_payment_standard
          hash: sha256:cd856cd02d3e991d13c2736c604e38fda2105160fa491902a4bec2311ab85a7a
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-ca/regulation/cdss/eas/49/49-055
          excerpt: Each member of an eligible couple receives one-half
  versions:
  - effective_from: '2003-10-16'
    formula: 'if each_member_of_eligible_couple_receives_capi: ca_capi_eligible_couple_member_share_rate
      * max(0, ca_capi_payment_standard - ca_capi_countable_income_for_payment_month_under_retrospective_accounting)
      else: max(0, ca_capi_payment_standard - ca_capi_countable_income_for_payment_month_under_retrospective_accounting)'
