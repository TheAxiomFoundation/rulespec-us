format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/cdss/eas/49/49-030
  summary: To be eligible for CAPI, an individual must be ineligible for SSI/SSP solely
    due to immigration status. Ineligibility may be verified by specified SSA denial
    communications or county determination; a pending SSI/SSP application or qualifying
    pending appeal may be used in lieu of those evidence items.
  deferred_outputs:
  - output: us-ca:regulations/cdss/eas/49/49-030#ca_capi_eligible_person
    reason: Generated rule used a local name that collides with a sibling RuleSpec
      export. This output is deferred until it can be encoded with a semantic branch-specific
      name without creating ambiguous sibling imports.
rules:
- name: ca_capi_ssi_ssp_ineligibility_evidence_present
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: MPP Section 49-030.11
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-ca/regulation/cdss/eas/49/49-030
  versions:
  - effective_from: '2008-07-01'
    formula: 'formal_ssa_denial_letter_states_ssi_ssp_ineligible_due_to_immigration_status

      or informal_ssa_denial_or_communication_indicates_ssi_ssp_ineligible_due_to_immigration_status

      or county_determines_applicant_not_qualified_alien_or_considered_as_such'
- name: ca_capi_pending_ssi_ssp_application_or_qualifying_appeal
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: MPP Section 49-030.2-.21
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-ca/regulation/cdss/eas/49/49-030
  versions:
  - effective_from: '2008-07-01'
    formula: 'ssi_ssp_application_filed_with_ssa_pending_final_determination

      or pending_ssi_ssp_appeal_issue_related_to_disability

      or pending_ssi_ssp_appeal_issue_related_to_immigration_status'
- name: ca_capi_ssi_ssp_ineligibility_requirement_met
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: MPP Section 49-030.11-.2
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-ca/regulation/cdss/eas/49/49-030
  versions:
  - effective_from: '2008-07-01'
    formula: 'ca_capi_ssi_ssp_ineligibility_evidence_present

      or ca_capi_pending_ssi_ssp_application_or_qualifying_appeal'
