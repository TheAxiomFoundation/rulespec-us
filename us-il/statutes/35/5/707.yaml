format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-il/statute/35/5/707
  summary: |-
    Governmental Employers. If the employer is the United States, a state, Territory, political subdivision, the District of Columbia, or an agency or instrumentality of the foregoing, the withholding return may be made by an officer or employee having control of the compensation payment or appropriately designated for that purpose.
rules:
  - name: governmental_employer_withholding_return_maker_authorized
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 35 ILCS 5/707
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-il/statute/35/5/707
              excerpt: "If the employer is the United States, or a state, Territory, or political subdivision thereof, or the District of Columbia, or any agency or instrumentality"
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-il/statute/35/5/707
              excerpt: "may be made by any officer or employee"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-il/statute/35/5/707
              excerpt: "having control of the payment of such compensation, or appropriately designated for that purpose"
    versions:
      - effective_from: '2017-07-01'
        formula: |-
          employer_is_governmental_employer
          and person_is_officer_or_employee_of_that_governmental_employer
          and (person_has_control_of_compensation_payment or person_is_appropriately_designated_to_make_withholding_return)
