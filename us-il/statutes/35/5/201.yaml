format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-il/statute/35/5/201
  summary: Sec. 201 imposes Illinois income tax measured by net income. For taxable
    years beginning on or after July 1, 2017, the rate is 4.95% for an individual,
    trust, or estate and 7% for a corporation. The section also contains investment,
    enterprise-zone, high-impact-business, research, remediation, education, River
    Edge remediation, and pass-through entity provisions with cross-referenced definitions
    and computations.
  deferred_outputs:
  - output: us-il:statutes/35/5/201/e#investment_credit
    reason: Investment credit computation depends on qualified property definitions,
      depreciation, purchase, mining, partnership allocation, carryforward, and other
      cited provisions not supplied in context.
  - output: us-il:statutes/35/5/201/f#enterprise_zone_river_edge_investment_credit
    reason: Enterprise Zone and River Edge Redevelopment Zone credit depends on zone
      designation, qualified property definitions, Section 251 allocation rules, Section
      211 carryforward mechanics, and Illinois Enterprise Zone Act provisions not
      supplied in context.
  - output: us-il:statutes/35/5/201/h#high_impact_business_investment_credit
    reason: High Impact Business credit depends on Illinois Enterprise Zone Act designation
      and minimum-investment provisions and qualified property mechanics not supplied
      in context.
  - output: us-il:statutes/35/5/201/k#research_and_development_credit
    reason: Research credit depends on federal Section 41 qualifying expenditure definitions
      and base-period mechanics not supplied in context.
  - output: us-il:statutes/35/5/201/l#environmental_remediation_tax_credit
    reason: Environmental remediation credit depends on Environmental Protection Act
      approval, No Further Remediation Letter, site definition, related-party rules,
      and transfer mechanics not supplied in context.
  - output: us-il:statutes/35/5/201/m#education_expense_credit
    reason: Education expense credit depends on qualifying pupil, school compliance,
      custodian status, qualified expenses, filing status for the joint-return income
      cap, and family-level aggregation surfaces not supplied in context.
  - output: us-il:statutes/35/5/201/n#river_edge_redevelopment_zone_site_remediation_tax_credit
    reason: River Edge site remediation credit depends on Environmental Protection
      Act approval, River Edge zone site facts, No Further Remediation Letter, related-party
      rules, and transfer mechanics not supplied in context.
  - output: us-il:statutes/35/5/201/p#pass_through_entity_tax
    reason: Pass-through entity tax depends on partnership and Subchapter S corporation
      election mechanics, net income under Section 202 with Section 203/204/207 modifications,
      tiered partnership rules, Section 164(b)(6), and liability allocation surfaces
      not supplied in context.
rules:
- name: individual_trust_or_estate_current_income_tax_rate
  kind: parameter
  dtype: Rate
  source: 201(b)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-il/statute/35/5/201
          excerpt: for taxable years beginning on or after July 1, 2017, an amount
            equal to 4.95%
  versions:
  - effective_from: '2017-07-01'
    formula: '0.0495'
- name: corporation_current_income_tax_rate
  kind: parameter
  dtype: Rate
  source: 201(b)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-il/statute/35/5/201
          excerpt: In the case of a corporation, for taxable years beginning on or
            after July 1, 2017, an amount equal to 7%
  versions:
  - effective_from: '2017-07-01'
    formula: '0.07'
- name: il_income_tax_rate
  kind: derived
  entity: TaxUnit
  dtype: Rate
  period: Year
  source: 201(b)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-il/statute/35/5/201
          excerpt: In the case of an individual, trust, or estate...4.95%; In the
            case of a corporation...7%
  versions:
  - effective_from: '2017-07-01'
    formula: 'if taxpayer_is_corporation: corporation_current_income_tax_rate else:
      individual_trust_or_estate_current_income_tax_rate'
