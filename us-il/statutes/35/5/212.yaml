format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-il/statute/35/5/212
  summary: |-
    Each individual taxpayer is entitled to an Illinois earned income tax credit equal to specified percentages of the federal earned income tax credit, with nonresident or part-year resident proration. For taxable years beginning on or after January 1, 2003, excess credit is refunded; for years before January 1, 2003, the credit may not reduce liability below zero. For taxable years beginning on or after January 1, 2023, certain age and ITIN restrictions in federal EITC rules are disregarded for Illinois purposes.
rules:
  - name: federal_credit_percentage_for_illinois_earned_income_credit
    kind: parameter
    dtype: Rate
    source: 35 ILCS 5/212(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-il/statute/35/5/212
              excerpt: "5% of the federal tax credit"
          - path: versions[1].formula
            kind: parameter
            source:
              corpus_citation_path: us-il/statute/35/5/212
              excerpt: "7.5% of the federal tax credit"
          - path: versions[2].formula
            kind: parameter
            source:
              corpus_citation_path: us-il/statute/35/5/212
              excerpt: "10% of the federal tax credit"
          - path: versions[3].formula
            kind: parameter
            source:
              corpus_citation_path: us-il/statute/35/5/212
              excerpt: "14% of the federal tax credit"
          - path: versions[4].formula
            kind: parameter
            source:
              corpus_citation_path: us-il/statute/35/5/212
              excerpt: "18% of the federal tax credit"
          - path: versions[5].formula
            kind: parameter
            source:
              corpus_citation_path: us-il/statute/35/5/212
              excerpt: "20% of the federal tax credit"
    versions:
      - effective_from: '2000-01-01'
        formula: |-
          0.05
      - effective_from: '2012-01-01'
        formula: |-
          0.075
      - effective_from: '2013-01-01'
        formula: |-
          0.10
      - effective_from: '2017-01-01'
        formula: |-
          0.14
      - effective_from: '2018-01-01'
        formula: |-
          0.18
      - effective_from: '2023-01-01'
        formula: |-
          0.20

  - name: credit_refundable_after_liability
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: 212(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-il/statute/35/5/212
              excerpt: "For each taxable year beginning on or after January 1, 2003, if the amount of the credit exceeds the income tax liability for the applicable tax year, then the excess credit shall be refunded"
    versions:
      - effective_from: '2003-01-01'
        formula: |-
          true

  - name: federal_earned_income_credit_base_for_illinois_credit
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 35 ILCS 5/212(a), (b-5), (b-10), (b-15)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-il/statute/35/5/212
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-il/statute/35/5/212
              excerpt: "without regard to any age requirements"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-il/statute/35/5/212
              excerpt: "without applying the restrictions regarding social security numbers"
    versions:
      - effective_from: '2023-01-01'
        formula: |-
          max(0, max(federal_earned_income_tax_credit_allowed_for_taxable_year, max(federal_earned_income_tax_credit_without_age_requirements_for_taxpayer_without_qualifying_child, federal_earned_income_tax_credit_without_social_security_number_restrictions)))

  - name: il_earned_income_credit
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 35 ILCS 5/212(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-il/statute/35/5/212
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-il/statute/35/5/212
              excerpt: "20% of the federal tax credit"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-il/statute/35/5/212
              excerpt: "For a non-resident or part-year resident, the amount of the credit under this Section shall be in proportion to the amount of income attributable to this State."
    versions:
      - effective_from: '2023-01-01'
        formula: |-
          max(0, federal_earned_income_credit_base_for_illinois_credit * federal_credit_percentage_for_illinois_earned_income_credit * illinois_income_attribution_proportion)
