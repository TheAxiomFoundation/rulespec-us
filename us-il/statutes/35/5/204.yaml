format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-il/statute/35/5/204
  summary: |-
    Sec. 204 allows a standard exemption equal to the subsection (b), (c), and (d) amounts multiplied by the Illinois-allocable base-income fraction. Subsection (d) allows $1,000 additional exemptions for an individual taxpayer or qualifying spouse who is age 65 or older, and $1,000 additional exemptions for blindness. Subsection (g) bars any exemption for taxable years beginning on or after January 1, 2017 if adjusted gross income exceeds $500,000 for spouses filing a joint federal return or $250,000 for all other taxpayers.
  deferred_outputs:
    - output: us-il:statutes/35/5/204#il_standard_exemption
      reason: The final standard exemption depends on amounts determined under subsection (b), subsection (c), and subsection (d), plus the subsection (g) AGI limitation. Subsection (b) is expressly subject to Section 205, and subsection (c) depends on exemptions allowable under Section 151 of the Internal Revenue Code; those cited sources are not available in copied RuleSpec context.
    - output: us-il:statutes/35/5/204/d#additional_exemptions_for_individual_taxpayer_and_spouse
      reason: Subsection (d) requires person-role facts for the taxpayer and spouse, separate-return or non-joint-return status, spouse gross income, spouse dependency, taxpayer or spouse age, and blindness as defined in subsection (d)(2)(C). A faithful executable relation for taxpayer and spouse role-specific exemptions is not available in the current RuleSpec context.
      source_values:
        - us-il:statutes/35/5/204#age_or_blindness_additional_exemption_amount
rules:
  - name: default_basic_exemption_amount
    kind: parameter
    dtype: Money
    unit: USD
    source: 204(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-il/statute/35/5/204
              excerpt: "each taxpayer shall be allowed a basic amount of $1000"
    versions:
      - effective_from: '2017-07-01'
        formula: |-
          1000

  - name: corporation_basic_exemption_amount
    kind: parameter
    dtype: Money
    unit: USD
    source: 204(b)
    metadata:
