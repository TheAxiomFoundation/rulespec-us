  source_verification:
    corpus_citation_path: us-il/statute/35/5/306
  summary: |-
    Items of income and deduction taken into account by an estate or trust in computing base income are allocated or apportioned to Illinois as provided by Sections 301 through 304 and, to the extent properly paid, credited, or required to be distributed to beneficiaries for the taxable year, are deemed paid, credited, or distributed pro rata.
  deferred_outputs:
    - output: us-il:statutes/35/5/306#estate_or_trust_items_allocated_or_apportioned_to_illinois
      reason: The Illinois allocation or apportionment depends on Sections 301 through 304, which are cited by this source but not supplied in copied RuleSpec context.
    - output: us-il:statutes/35/5/306#estate_or_trust_distributed_items_deemed_distributed_pro_rata_to_beneficiaries
      reason: The pro rata deemed payment, credit, or distribution requires item-level estate or trust income and deduction amounts, beneficiary-level distribution shares, and the amount properly paid, credited, or required to be distributed for the taxable year; the supported local context does not provide a faithful relation surface for those item and beneficiary allocations.
