format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-il/statute/35/5/402
  summary: |-
    For Illinois income tax purposes, a person's accounting method is the same as the person's federal income tax accounting method. If no accounting method has been regularly used, base and net income are computed under the Department's fair-reflection method. If the federal method changes, the Illinois method is similarly changed.
rules:
  - name: illinois_accounting_method_for_income_tax
    kind: derived
    entity: Person
    dtype: String
    period: Year
    source: 35 ILCS 5/402(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-il/statute/35/5/402
              excerpt: "a person's method of accounting shall be the same as such person's method of accounting for federal income tax purposes"
          - path: versions[0].formula
            kind: default
            source:
              corpus_citation_path: us-il/statute/35/5/402
              excerpt: "If no method of accounting has been regularly used by such person, base and net income ... shall be computed under such method as in the opinion of the Department fairly reflects income"
    versions:
      - effective_from: '2000-01-01'
        formula: |-
          if person_has_regular_federal_income_tax_accounting_method: federal_income_tax_accounting_method else: department_method_fairly_reflecting_income

  - name: illinois_accounting_method_must_similarly_change
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 35 ILCS 5/402(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-il/statute/35/5/402
              excerpt: "If a person's method of accounting is changed for federal income tax purposes, for purposes of this Act it shall be similarly changed"
    versions:
      - effective_from: '2000-01-01'
        formula: |-
          federal_income_tax_accounting_method_changed
