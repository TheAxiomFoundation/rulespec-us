format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-il/statute/35/5/402
  summary: |-
    For purposes of the tax imposed by the Act, a person's method of accounting shall be the same as the person's method for federal income tax purposes; if no method has been regularly used, base and net income are computed under a Department-approved method that fairly reflects income; if the federal method changes, the Illinois method is similarly changed.
rules:
  - name: illinois_accounting_method_matches_federal_method_required
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: 35 ILCS 5/402(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-il/statute/35/5/402
              excerpt: "a person's method of accounting shall be the same as such person's method of accounting for federal income tax purposes"
    versions:
      - effective_from: '2000-01-01'
        formula: |-
          true

  - name: department_fair_reflection_method_computes_base_and_net_income
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: 35 ILCS 5/402(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-il/statute/35/5/402
              excerpt: "If no method of accounting has been regularly used by such person"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-il/statute/35/5/402
              excerpt: "computed under such method as in the opinion of the Department fairly reflects income"
    versions:
      - effective_from: '2000-01-01'
        formula: |-
          no_accounting_method_regularly_used
          and department_opinion_method_fairly_reflects_income

  - name: illinois_accounting_method_change_required_after_federal_change
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: 35 ILCS 5/402(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-il/statute/35/5/402
              excerpt: "If a person's method of accounting is changed for federal income tax purposes"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-il/statute/35/5/402
              excerpt: "for purposes of this Act it shall be similarly changed"
    versions:
      - effective_from: '2000-01-01'
        formula: |-
          federal_income_tax_accounting_method_changed
