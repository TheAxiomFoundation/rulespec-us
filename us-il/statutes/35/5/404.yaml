format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-il/statute/35/5/404
  summary: |-
    Sec. 404(a) authorizes the Director, when an agreement, understanding, or arrangement between persons causes base income allocable to Illinois to be improperly or inaccurately reflected, to adjust income, deduction, and allocation-factor items as reasonably required to determine the person's properly Illinois-allocable base income. Sec. 404(b) bars an adjustment with the same effect as retroactively applying amendments made by Public Act 93-0840, Public Act 95-0233, or Public Act 95-0707.
rules:
  - name: director_reallocation_adjustment_authorized
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: 404(a), 404(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-il/statute/35/5/404
              excerpt: "any agreement, understanding or arrangement exists between any persons"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-il/statute/35/5/404
              excerpt: "causes any person's base income allocable to this State to be improperly or inaccurately reflected"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-il/statute/35/5/404
              excerpt: "to such extent as may reasonably be required to determine the base income of such person properly allocable to this State"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-il/statute/35/5/404
              excerpt: "may not make an adjustment to base income under this Section that has the same effect as retroactively applying any amendments"
    versions:
      - effective_from: '2008-08-29'
        formula: |-
          agreement_understanding_or_arrangement_exists_between_persons
          and arrangement_causes_base_income_allocable_to_illinois_to_be_improperly_or_inaccurately_reflected
          and adjustment_reasonably_required_to_determine_base_income_properly_allocable_to_illinois
          and not adjustment_has_same_effect_as_retroactively_applying_public_act_amendments
