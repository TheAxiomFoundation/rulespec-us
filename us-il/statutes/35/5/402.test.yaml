- name: regular_federal_accounting_method_controls_illinois_method
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    us-il:statutes/35/5/402#input.person_has_regular_federal_income_tax_accounting_method: true
    us-il:statutes/35/5/402#input.federal_income_tax_accounting_method: accrual
    us-il:statutes/35/5/402#input.department_method_fairly_reflecting_income: cash
    us-il:statutes/35/5/402#input.federal_income_tax_accounting_method_changed: false
  output:
    us-il:statutes/35/5/402#illinois_accounting_method_for_income_tax: accrual
    us-il:statutes/35/5/402#illinois_accounting_method_must_similarly_change: not_holds
- name: department_fair_reflection_method_used_when_no_regular_method
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    us-il:statutes/35/5/402#input.person_has_regular_federal_income_tax_accounting_method: false
    us-il:statutes/35/5/402#input.federal_income_tax_accounting_method: accrual
    us-il:statutes/35/5/402#input.department_method_fairly_reflecting_income: cash
    us-il:statutes/35/5/402#input.federal_income_tax_accounting_method_changed: false
  output:
    us-il:statutes/35/5/402#illinois_accounting_method_for_income_tax: cash
    us-il:statutes/35/5/402#illinois_accounting_method_must_similarly_change: not_holds
- name: federal_accounting_method_change_requires_similar_illinois_change
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    us-il:statutes/35/5/402#input.person_has_regular_federal_income_tax_accounting_method: true
    us-il:statutes/35/5/402#input.federal_income_tax_accounting_method: accrual
    us-il:statutes/35/5/402#input.department_method_fairly_reflecting_income: cash
    us-il:statutes/35/5/402#input.federal_income_tax_accounting_method_changed: true
  output:
    us-il:statutes/35/5/402#illinois_accounting_method_for_income_tax: accrual
    us-il:statutes/35/5/402#illinois_accounting_method_must_similarly_change: holds
