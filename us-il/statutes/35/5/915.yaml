format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-il/statute/35/5/915
  summary: |-
    No person shall be excused from testifying or producing evidence before the Department when ordered on the ground of self-incrimination or criminal penalty; immunity extends only to a natural person who obeys a subpoena and gives testimony or produces evidence under oath, and does not exempt perjury committed in so testifying.
rules:
  - name: person_not_excused_from_department_evidence_order_on_incrimination_ground
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: 35 ILCS 5/915, first clause
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-il/statute/35/5/915
    versions:
      - effective_from: '2000-01-01'
        formula: |-
          department_or_officer_or_employee_ordered_testimony_or_evidence_in_investigation_or_hearing
          and ground_is_that_testimony_or_evidence_may_incriminate_or_subject_to_criminal_penalty
  - name: criminal_transaction_immunity_for_subpoenaed_under_oath_evidence
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: 35 ILCS 5/915, immunity proviso
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-il/statute/35/5/915
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-il/statute/35/5/915
    versions:
      - effective_from: '2000-01-01'
        formula: |-
          person_is_natural_person
          and person_acted_in_obedience_to_subpoena
          and proceeding_was_before_department_or_officer_or_employee
          and (person_gave_testimony_under_oath or person_produced_evidence_under_oath)
          and prosecution_or_penalty_is_for_transaction_or_thing_concerning_that_testimony_or_evidence
          and not perjury_committed_in_that_testimony
  - name: perjury_prosecution_immunity_excluded
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: 35 ILCS 5/915, final sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-il/statute/35/5/915
    versions:
      - effective_from: '2000-01-01'
        formula: |-
          person_gave_testimony_under_oath
          and perjury_committed_in_that_testimony
