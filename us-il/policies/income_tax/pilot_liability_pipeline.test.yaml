- name: single_260k_exemption_phased_out
  # AGI 260000 > 250000 non-joint limit -> exemption removed entirely;
  # 260000 - 0 = 260000; 260000 * 0.0495 = 12870.00.
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
