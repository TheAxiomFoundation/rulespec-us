# Fixtures are hand-computed at the 2026 tax year (encode#1060 convention: the
# expected values are the author's own shown arithmetic, not an oracle
# read-back). Illinois liability = 0.0495 * max(0, base income - standard
# exemption), where the standard exemption = 2,925 per allowable exemption
# (IDOR Informational Bulletin FY 2026-15), removed entirely when AGI exceeds
# 250,000 (non-joint) or 500,000 (joint) under 35 ILCS 5/204(g).
- name: single_30k_one_exemption
  # 30000 - 2925 = 27075; 27075 * 0.0495 = 1340.2125.
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    us-il:policies/income_tax/pilot_liability_pipeline#input.il_pit_pilot_supplied_base_income: 30000
    us-il:policies/income_tax/pilot_liability_pipeline#input.il_pit_pilot_adjusted_gross_income: 30000
    us-il:policies/income_tax/pilot_liability_pipeline#input.il_pit_pilot_supplied_personal_exemption: 2925
    us-il:policies/income_tax/pilot_liability_pipeline#input.il_pit_pilot_supplied_income_tax_rate: 0.0495
    us-il:policies/income_tax/pilot_liability_pipeline#input.il_pit_pilot_allowable_exemption_count: 1
    us-il:policies/income_tax/pilot_liability_pipeline#input.il_pit_pilot_filing_status_joint: false
  output:
    us-il:policies/income_tax/pilot_liability_pipeline#il_pit_pilot_standard_exemption: 2925
    us-il:policies/income_tax/pilot_liability_pipeline#il_pit_pilot_net_income_after_exemption: 27075
    us-il:policies/income_tax/pilot_liability_pipeline#il_pit_pilot_income_tax_liability: 1340.2125
