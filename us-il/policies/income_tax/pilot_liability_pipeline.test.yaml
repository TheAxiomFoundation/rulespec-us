# Fixtures are hand-computed at the 2026 tax year. Illinois income tax before
# nonrefundable credits equals 4.95% of nonnegative Illinois taxable income plus
# any supplied investment-credit recapture amount.
- name: zero_taxable_income
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    us-il:policies/income_tax/pilot_liability_pipeline#input.il_pit_pilot_state_taxable_income: 0
    us-il:policies/income_tax/pilot_liability_pipeline#input.il_pit_pilot_recapture_of_investment_credit: 0
  output:
    us-il:policies/income_tax/pilot_liability_pipeline#il_pit_pilot_taxable_income: 0
    us-il:policies/income_tax/pilot_liability_pipeline#il_pit_pilot_income_tax_liability: 0
- name: negative_taxable_income_is_floored
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    us-il:policies/income_tax/pilot_liability_pipeline#input.il_pit_pilot_state_taxable_income: -1000
    us-il:policies/income_tax/pilot_liability_pipeline#input.il_pit_pilot_recapture_of_investment_credit: 0
  output:
    us-il:policies/income_tax/pilot_liability_pipeline#il_pit_pilot_taxable_income: 0
    us-il:policies/income_tax/pilot_liability_pipeline#il_pit_pilot_income_tax_liability: 0
- name: positive_taxable_income
  # 100000 * 0.0495 = 4950.
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    us-il:policies/income_tax/pilot_liability_pipeline#input.il_pit_pilot_state_taxable_income: 100000
    us-il:policies/income_tax/pilot_liability_pipeline#input.il_pit_pilot_recapture_of_investment_credit: 0
  output:
    us-il:policies/income_tax/pilot_liability_pipeline#il_pit_pilot_taxable_income: 100000
    us-il:policies/income_tax/pilot_liability_pipeline#il_pit_pilot_income_tax_liability: 4950
- name: positive_taxable_income_with_recapture
  # 100000 * 0.0495 + 125 = 5075.
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    us-il:policies/income_tax/pilot_liability_pipeline#input.il_pit_pilot_state_taxable_income: 100000
    us-il:policies/income_tax/pilot_liability_pipeline#input.il_pit_pilot_recapture_of_investment_credit: 125
  output:
    us-il:policies/income_tax/pilot_liability_pipeline#il_pit_pilot_taxable_income: 100000
    us-il:policies/income_tax/pilot_liability_pipeline#il_pit_pilot_income_tax_liability: 5075
