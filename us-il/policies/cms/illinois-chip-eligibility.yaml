  - name: illinois_fcep_eligibility_available
    kind: derived
    dtype: Boolean
    period: Year
    source: CMS CHIP FCEP SPA source, Illinois
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/policy/cms/chip-spa/il/il-21-0006-chip/pdf/page-13
              excerpt: "(42 CFR 457.80(a)) Illinois has chosen to target the unborn children (conception to birth) of mothers who do not meet legal immigration status with incomes to 208% FPL throughout the state."
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          true
  - name: illinois_fcep_fpl_limit
    kind: parameter
    dtype: Rate
