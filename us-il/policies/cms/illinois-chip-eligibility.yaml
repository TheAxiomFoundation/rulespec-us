              excerpt: "(42 CFR 457.80(a)) Illinois has chosen to target the unborn children (conception to birth) of mothers who do not meet legal immigration status with incomes to 208% FPL throughout the state."
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          2.08
  - name: illinois_fcep_effective_fpl_limit
    kind: derived
    dtype: Rate
    period: Year
    source: CMS CHIP FCEP SPA source, Illinois, including the MAGI 5% FPL disregard
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: import
            import:
              target: us:policies/cms/medicaid-chip-bhp-eligibility-levels#magi_fpl_disregard_rate
