          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/regulation/42/435/603/d
              excerpt: "5 percentage points of the Federal poverty level"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/policy/cms/chip-spa/il/il-21-0006-chip/pdf/page-13
              excerpt: "(42 CFR 457.80(a)) Illinois has chosen to target the unborn children (conception to birth) of mothers who do not meet legal immigration status with incomes to 208% FPL throughout the state."
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          illinois_fcep_fpl_limit + magi_fpl_disregard_rate
  - name: is_chip_fcep_eligible_person
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 42 USC 1397ll(f)(1), 42 CFR 457.10, and CMS CHIP FCEP SPA source for Illinois
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/policy/cms/chip-spa/il/il-21-0006-chip/pdf/page-13
              excerpt: "(42 CFR 457.80(a)) Illinois has chosen to target the unborn children (conception to birth) of mothers who do not meet legal immigration status with incomes to 208% FPL throughout the state."
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/1397ll/f/1
              excerpt: "through the application of sections 457.10"
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          person_is_pregnant
          and not found_eligible_for_medical_assistance_under_subchapter_xix
          and medicaid_income_level <= illinois_fcep_effective_fpl_limit
