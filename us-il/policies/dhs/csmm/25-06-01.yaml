  - name: aabd_grant_adjustment_requires_certified_cash_case
    kind: parameter
    dtype: Integer
    period: Month
    source: WAG 25-06-01 grant adjustment footnote
    metadata:
      proof:
        atoms:
          - path: versions
            kind: condition
