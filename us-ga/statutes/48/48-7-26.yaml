format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_paths:
      - us-ga/statute/48/48-7-26
      - us-ga/statute/session-laws/2023/sb56/document-1
      - us-ga/statute/session-laws/2024/hb1021/document-1
      - us-ga/statute/session-laws/2026/hb463/document-1
  summary: |-
    Through taxable year 2023, subsection (b) allowed personal exemptions of $7,400.00 for a joint return, $3,700.00 for separate returns, and $2,700.00 for other taxpayers. The dependent exemption was $3,000.00 through 2023, increased to $4,000.00 for taxable years 2024 and 2025, and is $5,000.00 for taxable year 2026. Scheduled increases beginning in 2027 are contingent on annual revenue-condition delay tests and are not encoded as fixed amounts. The estate and trust deductions in lieu of a personal exemption remain $2,700.00 and $1,350.00, respectively.
  deferred_outputs:
    - output: us-ga:statutes/48/48-7-26#dependent
      reason: The definition of dependent adopts the Internal Revenue Code and adds unborn children with detectable human heartbeat as defined in Code Section 1-2-1, but the cited definitional sources are not available in copied context.
    - output: us-ga:statutes/48/48-7-26#dependent_exemption_deduction
      reason: Computing the deduction for each dependent requires the unavailable dependent definition, including the missing Code Section 1-2-1 definitions for the unborn-child branch.
      source_values:
        - us-ga:statutes/48/48-7-26#dependent_exemption_amount
    - output: us-ga:statutes/48/48-7-26#dependent_exemption_amount
      reason: For taxable years beginning in 2027, Act 465 schedules annual $125.00 increases until the dependent exemption reaches $6,000.00, but each increase is subject to annual revenue-condition delay tests under paragraph (1.1) of subsection (a) of Code Section 48-7-27. The amount for 2027 and later cannot be fixed until those tests are resolved.
