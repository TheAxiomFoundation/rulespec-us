format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ga/statute/48/48-7A-3
  summary: |-
    Resident taxpayers filing individual income tax returns may claim a credit if not claimed or otherwise eligible to be claimed as another taxpayer's dependent, except food stamp recipients and incarcerated or confined individuals. The credit schedule is based on adjusted gross income and the number of dependents entitled to be claimed, with one additional credit unit for each taxpayer or spouse age 65 or over. The credit is capped by income tax liability and waived if not filed by the end of the twelfth month after the taxable year closes.
rules:
  - name: low_income_credit_allowed
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: 48-7A-3(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ga/statute/48/48-7A-3
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ga/statute/48/48-7A-3
    versions:
      - effective_from: '2010-01-01'
        formula: |-
          resident_taxpayer_files_individual_income_tax_return
          and not taxpayer_claimed_or_eligible_as_dependent_by_another
          and not individual_receives_food_stamp_allotment_for_any_part_of_taxable_year
          and not individual_incarcerated_or_confined_for_any_part_of_taxable_year

  - name: low_income_credit_claim_timely
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: 48-7A-3(d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ga/statute/48/48-7A-3
    versions:
      - effective_from: '2010-01-01'
        formula: |-
          claim_filed_on_or_before_end_of_twelfth_month_following_close_of_taxable_year

  - name: adjusted_gross_income_band
    kind: derived
    entity: TaxUnit
    dtype: Integer
    period: Year
    source: 48-7A-3(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ga/statute/48/48-7A-3
    versions:
      - effective_from: '2010-01-01'
        formula: |-
          if adjusted_gross_income < agi_band_0_upper_bound: 0 else: if adjusted_gross_income >= agi_band_1_lower_bound and adjusted_gross_income <= agi_band_1_upper_bound: 1 else: if adjusted_gross_income >= agi_band_2_lower_bound and adjusted_gross_income <= agi_band_2_upper_bound: 2 else: if adjusted_gross_income >= agi_band_3_lower_bound and adjusted_gross_income <= agi_band_3_upper_bound: 3 else: if adjusted_gross_income >= agi_band_4_lower_bound and adjusted_gross_income <= agi_band_4_upper_bound: 4 else: -1

  - name: agi_band_0_upper_bound
    kind: parameter
    dtype: Money
    unit: USD
    period: Year
    source: 48-7A-3(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ga/statute/48/48-7A-3
              excerpt: "Under $6,000.00"
    versions:
      - effective_from: '2010-01-01'
        formula: |-
          6000

  - name: agi_band_1_lower_bound
    kind: parameter
    dtype: Money
    unit: USD
    period: Year
    source: 48-7A-3(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ga/statute/48/48-7A-3
              excerpt: "6,000.00 but not more than 7,999.00"
    versions:
      - effective_from: '2010-01-01'
        formula: |-
          6000

  - name: agi_band_1_upper_bound
    kind: parameter
    dtype: Money
    unit: USD
    period: Year
    source: 48-7A-3(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ga/statute/48/48-7A-3
              excerpt: "6,000.00 but not more than 7,999.00"
    versions:
      - effective_from: '2010-01-01'
        formula: |-
          7999

  - name: agi_band_2_lower_bound
    kind: parameter
    dtype: Money
    unit: USD
    period: Year
    source: 48-7A-3(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ga/statute/48/48-7A-3
              excerpt: "8,000.00 but not more than 9,999.00"
    versions:
      - effective_from: '2010-01-01'
        formula: |-
          8000

  - name: agi_band_2_upper_bound
    kind: parameter
    dtype: Money
    unit: USD
    period: Year
    source: 48-7A-3(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ga/statute/48/48-7A-3
              excerpt: "8,000.00 but not more than 9,999.00"
    versions:
      - effective_from: '2010-01-01'
        formula: |-
          9999

  - name: agi_band_3_lower_bound
    kind: parameter
    dtype: Money
    unit: USD
    period: Year
    source: 48-7A-3(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ga/statute/48/48-7A-3
              excerpt: "10,000.00 but not more than 14,999.00"
    versions:
      - effective_from: '2010-01-01'
        formula: |-
          10000

  - name: agi_band_3_upper_bound
    kind: parameter
    dtype: Money
    unit: USD
    period: Year
    source: 48-7A-3(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ga/statute/48/48-7A-3
              excerpt: "10,000.00 but not more than 14,999.00"
    versions:
      - effective_from: '2010-01-01'
        formula: |-
          14999

  - name: agi_band_4_lower_bound
    kind: parameter
    dtype: Money
    unit: USD
    period: Year
    source: 48-7A-3(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ga/statute/48/48-7A-3
              excerpt: "15,000.00 but not more than 19,999.00"
    versions:
      - effective_from: '2010-01-01'
        formula: |-
          15000

  - name: agi_band_4_upper_bound
    kind: parameter
    dtype: Money
    unit: USD
    period: Year
    source: 48-7A-3(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ga/statute/48/48-7A-3
              excerpt: "15,000.00 but not more than 19,999.00"
    versions:
      - effective_from: '2010-01-01'
        formula: |-
          19999

  - name: credit_amount_per_dependent
    kind: parameter
    dtype: Money
    unit: USD
    period: Year
    indexed_by: adjusted_gross_income_band
    source: 48-7A-3(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].values
            kind: parameter_table
            source:
              corpus_citation_path: us-ga/statute/48/48-7A-3
              table:
                header: "TAX CREDIT SCHEDULE Adjusted Gross Income Tax Credit"
                row_key: "adjusted_gross_income_band"
                column_key: "tax_credit"
    versions:
      - effective_from: '2010-01-01'
        values:
          0: 26
          1: 20
          2: 14
          3: 8
          4: 5

  - name: additional_age_credit_units
    kind: derived
    entity: TaxUnit
    dtype: Integer
    period: Year
    source: 48-7A-3(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ga/statute/48/48-7A-3
              excerpt: "Each taxpayer 65 years of age or over may claim double the tax credit."
    versions:
      - effective_from: '2010-01-01'
        formula: |-
          (if taxpayer_is_65_years_of_age_or_over: 1 else: 0) + (if spouse_is_65_years_of_age_or_over: 1 else: 0)

  - name: low_income_credit_before_liability_cap
    kind: derived
    entity: TaxUnit
    dtype: Money
    unit: USD
    period: Year
    source: 48-7A-3(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ga/statute/48/48-7A-3
    versions:
      - effective_from: '2010-01-01'
        formula: |-
          if low_income_credit_allowed and adjusted_gross_income_band >= 0: credit_amount_per_dependent[adjusted_gross_income_band] * (dependents_entitled_to_claim_count + additional_age_credit_units) else: 0

  - name: low_income_credit_claimable_before_liability_cap
    kind: derived
    entity: TaxUnit
    dtype: Money
    unit: USD
    period: Year
    source: 48-7A-3(a)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ga/statute/48/48-7A-3
    versions:
      - effective_from: '2010-01-01'
        formula: |-
          if husband_and_wife_file_separate_returns_for_year_when_joint_return_could_have_been_filed: credit_to_which_spouses_would_have_been_entitled_had_joint_return_been_filed else: low_income_credit_before_liability_cap

  - name: low_income_credit
    kind: derived
    entity: TaxUnit
    dtype: Money
    unit: USD
    period: Year
    source: 48-7A-3(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ga/statute/48/48-7A-3
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ga/statute/48/48-7A-3
    versions:
      - effective_from: '2010-01-01'
        formula: |-
          if low_income_credit_claim_timely: min(max(0, low_income_credit_claimable_before_liability_cap), max(0, individual_income_tax_liability)) else: 0
