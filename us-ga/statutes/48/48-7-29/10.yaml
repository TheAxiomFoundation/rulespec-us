format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_paths:
      - us-ga/statute/48/48-7-29.10
      - us-ga/statute/session-laws/2025/hb136/document-1
  summary: |-
    A taxpayer shall be allowed a credit against the tax imposed by Code Section 48-7-20 for qualified child and dependent care expenses. The credit is a percentage of the Section 21 Internal Revenue Code credit claimed and allowed: ten percent for taxable years beginning on or after January 1, 2006 and before January 1, 2007; twenty percent for taxable years beginning on or after January 1, 2007 and before January 1, 2008; thirty percent for taxable years beginning on or after January 1, 2008 and before January 1, 2025; and fifty percent beginning in 2025. The credit may not exceed income tax liability, may not be carried forward, and may not be allowed against prior years' liability.
rules:
  - name: child_and_dependent_care_credit_percentage
    kind: parameter
    dtype: Rate
    period: Year
    source: O.C.G.A. § 48-7-29.10(a)(1)-(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ga/statute/48/48-7-29.10
              excerpt: "Ten percent for all taxable years beginning on or after January 1, 2006, and prior to January 1, 2007"
          - path: versions[1].formula
            kind: parameter
            source:
              corpus_citation_path: us-ga/statute/48/48-7-29.10
              excerpt: "Twenty percent for all taxable years beginning on or after January 1, 2007, and prior to January 1, 2008"
          - path: versions[2].formula
            kind: parameter
            source:
              corpus_citation_path: us-ga/statute/48/48-7-29.10
              excerpt: "Thirty percent for all taxable years beginning on or after January 1, 2008"
          - path: versions[3].formula
            kind: parameter
            source:
              corpus_citation_path: us-ga/statute/session-laws/2025/hb136/document-1
              excerpt: "The amount of such credit shall be equal to 50 percent of the amount of the credit provided for in Section 21 of the Internal Revenue Code"
          - path: versions[3].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-ga/statute/session-laws/2025/hb136/document-1
              excerpt: "Section 1-1 of this Act shall be applicable to all taxable years beginning on or after January 1, 2025"
    versions:
      - effective_from: '2006-01-01'
        formula: |-
          0.10
      - effective_from: '2007-01-01'
        formula: |-
          0.20
      - effective_from: '2008-01-01'
        effective_to: '2024-12-31'
        formula: |-
          0.30
      - effective_from: '2025-01-01'
        formula: |-
          0.50

  - name: child_and_dependent_care_tax_credit
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: O.C.G.A. § 48-7-29.10(a)-(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ga/statute/48/48-7-29.10
              excerpt: "determined by applying a percentage to the amount of the credit provided for in Section 21 of the Internal Revenue Code which is claimed and allowed"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ga/statute/48/48-7-29.10
              excerpt: "In no event shall the total amount of the tax credit under this Code section for a taxable year exceed the taxpayer's income tax liability."
    versions:
      - effective_from: '2006-01-01'
        formula: |-
          min(max(0, georgia_income_tax_liability), child_and_dependent_care_credit_percentage * max(0, federal_child_and_dependent_care_credit_claimed_and_allowed))

  - name: unused_child_and_dependent_care_tax_credit_carryforward_allowed
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: O.C.G.A. § 48-7-29.10(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ga/statute/48/48-7-29.10
              excerpt: "Any unused tax credit shall not be allowed to be carried forward to apply to the taxpayer's succeeding years' tax liability."
    versions:
      - effective_from: '2006-01-01'
        formula: |-
          false

  - name: child_and_dependent_care_tax_credit_against_prior_year_liability_allowed
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: O.C.G.A. § 48-7-29.10(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ga/statute/48/48-7-29.10
              excerpt: "No such tax credit shall be allowed the taxpayer against prior years' tax liability."
    versions:
      - effective_from: '2006-01-01'
        formula: |-
          false
