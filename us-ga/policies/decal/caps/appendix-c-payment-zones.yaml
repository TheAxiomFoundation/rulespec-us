              excerpt: "Appendix C- CAPS Reimbursement Rates, effective March 2, 2026"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ga/manual/decal/caps/appendix-c-reimbursement-rates/page-2
              excerpt: "Zone 1 Camden Cherokee Clayton Cobb DeKalb Douglas Fayette Forsyth Fulton Gwinnett Hall Henry Paulding Rockdale"
