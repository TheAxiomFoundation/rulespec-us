  - name: maximum_weekly_reimbursement_when_multiple_care_types_are_provided
    kind: derived
    entity: Person
    dtype: Money
    period: Week
    unit: USD
    source: CAPS Appendix C, multiple types of care weekly maximum rule
    metadata:
