format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ga/manual/decal/caps/appendix-c-reimbursement-rates/page-1
  summary: |-
    Appendix C- CAPS Reimbursement Rates, effective March 2, 2026. CAPS has established a state maximum rate to reimburse providers based on location, provider type, child age, and type of care. When multiple types of care are provided for the same child within the same service week, the maximum rate reimbursed is the state maximum rate for full time care.
