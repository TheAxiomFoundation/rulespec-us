format: rulespec/v1
imports:
- us-ga:policies/decal/caps/appendix-d-family-fee-chart#weekly_family_fee
- us-ga:policies/decal/caps/appendix-d-family-fee-chart#weekly_family_fee_per_child_in_care
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ga/manual/decal/caps/policy-manual/page-54
  summary: 'CAPS Family Fees, Page 54: family fees are based on a percentage of annual
    gross applicable income; the assessed fee is a family fee for all children in
    care, paid by the parent directly to the provider. Fees are calculated at initial
    eligibility, redetermination, and reported changes to family size, income, or
    number of children in care; a fee may be reduced but will not increase during
    the eligibility period, although it can increase at redetermination. Fees are
    not assessed for children in DFCS custody. If multiple scholarships exist in a
    service week for the same child, the fee applies on all active scholarships except
    part-time scholarships.'
rules:
- name: assessed_weekly_family_fee_for_eligibility_period
  kind: derived
  entity: Family
  dtype: Money
  period: Week
  unit: USD
  source: "CAPS Policy Manual \xA7 9.3.2"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-ga/manual/decal/caps/policy-manual/page-54
          excerpt: Family fees are calculated at the time of initial eligibility,
            at redetermination, and when a change is reported ... The fee may be reduced
            but will not increase during the eligibility period.
      - path: versions[0].formula
        kind: import
        import:
          target: us-ga:policies/decal/caps/appendix-d-family-fee-chart#weekly_family_fee
          output: weekly_family_fee
          hash: sha256:98a32658096b0c8fd5e6c8976da3ad527a72c75f11cfc5f91619788bcaffee5a
  versions:
  - effective_from: '2025-10-06'
    formula: 'if initial_eligibility_or_redetermination: weekly_family_fee else: min(previously_assessed_weekly_family_fee,
      weekly_family_fee)'
- name: weekly_family_fee_for_all_children_in_care
  kind: derived
  entity: Family
  dtype: Money
  period: Week
  unit: USD
  source: "CAPS Policy Manual \xA7 9.3.1"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-ga/manual/decal/caps/policy-manual/page-54
          excerpt: The assessed fee is a family fee for all children in care, not
            a fee for each child.
      - path: versions[0].formula
        kind: import
        import:
          target: us-ga:policies/decal/caps/appendix-d-family-fee-chart#weekly_family_fee
          output: weekly_family_fee
          hash: sha256:98a32658096b0c8fd5e6c8976da3ad527a72c75f11cfc5f91619788bcaffee5a
  versions:
  - effective_from: '2025-10-06'
    formula: weekly_family_fee
- name: weekly_family_fee_distributed_per_child_in_care
  kind: derived
  entity: Family
  dtype: Money
  period: Week
  unit: USD
  source: "CAPS Policy Manual \xA7\xA7 9.3.1, 9.4.3"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-ga/manual/decal/caps/policy-manual/page-54
          excerpt: If there are multiple children with child care scholarships in
            the family unit, the family fee will be distributed among the scholarships.
      - path: versions[0].formula
        kind: import
        import:
          target: us-ga:policies/decal/caps/appendix-d-family-fee-chart#weekly_family_fee_per_child_in_care
          output: weekly_family_fee_per_child_in_care
          hash: sha256:98a32658096b0c8fd5e6c8976da3ad527a72c75f11cfc5f91619788bcaffee5a
  versions:
  - effective_from: '2025-10-06'
    formula: weekly_family_fee_per_child_in_care
- name: child_care_service_family_fee_assessed
  kind: derived
  entity: Family
  dtype: Judgment
  period: Week
  source: "CAPS Policy Manual \xA7\xA7 9.4.1, 9.5.1"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-ga/manual/decal/caps/policy-manual/page-54
          excerpt: "Family fees are assessed for CAPS services: At initial application;\
            \ At redetermination; When there is a change in the family size, the family\u2019\
            s income, or the number of children in care"
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-ga/manual/decal/caps/policy-manual/page-54
          excerpt: "Family fees are not assessed ... Children who are in Georgia\u2019\
