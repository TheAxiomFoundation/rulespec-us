- name: active_non_part_time_scholarship_family_fee_applies
  kind: derived
  entity: ChildCareScholarship
  dtype: Judgment
  period: Week
  source: "CAPS Policy Manual \xA7 9.4.4"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-ga/manual/decal/caps/policy-manual/page-54
          excerpt: If there are multiple child care scholarships during the same service
            week for the same child, the family fee will be applied on all active
            scholarships, except part time scholarships.
  versions:
  - effective_from: '2025-10-06'
    formula: 'multiple_child_care_scholarships_for_same_child_during_same_service_week

      and scholarship_is_active

      and not scholarship_is_part_time'
