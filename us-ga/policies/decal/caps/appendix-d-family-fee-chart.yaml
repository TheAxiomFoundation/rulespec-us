  - name: family_fee_rate_by_income_band
    kind: parameter
    dtype: Rate
    indexed_by: family_fee_income_band
    source: CAPS Appendix D, Family fee row
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-ga/manual/decal/caps/appendix-d-family-fee-chart/page-1
              excerpt: "Appendix D – CAPS Family Fee, effective March 2, 2026"
          - path: versions[0].values
