format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ga/manual/decal/caps/appendix-d-family-fee-chart/page-1
  summary: |-
    Appendix D – CAPS Family Fee, effective March 2, 2026. Family fees are based on a percentage of annual gross applicable income; weekly family fee = annual gross applicable income x .03, .05, or .07, divided by 52 weeks, rounded down to whole dollar amount. The resulting family fee will be divided among all children in care.
rules:
  - name: no_family_fee_income_upper_limit_by_family_unit_size
    kind: parameter
    dtype: Money
    period: Year
    unit: USD
    indexed_by: family_unit_size
    source: CAPS Appendix D, Family Fee table, No family fee income range upper limit
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-ga/manual/decal/caps/appendix-d-family-fee-chart/page-1
              excerpt: "Appendix D – CAPS Family Fee, effective March 2, 2026"
          - path: versions[0].values
            kind: parameter_table
            source:
              corpus_citation_path: us-ga/manual/decal/caps/appendix-d-family-fee-chart/page-1
              excerpt: "Family fee: No family fee 3% of income 5% of income 7% of income"
              table:
                header: "CAPS Family Fee"
                row_key: "Family unit size"
                column_key: "No family fee annual income range"
    versions:
      - effective_from: '2026-03-02'
        values:
