                column_key: "Family fee"
    versions:
      - effective_from: '2026-03-02'
        values:
          0: 0
          1: 0.03
          2: 0.05
          3: 0.07

  - name: weekly_family_fee_divisor_weeks
    kind: parameter
    dtype: Count
    source: CAPS Appendix D, weekly family fee formula
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-ga/manual/decal/caps/appendix-d-family-fee-chart/page-1
              excerpt: "Appendix D – CAPS Family Fee, effective March 2, 2026"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ga/manual/decal/caps/appendix-d-family-fee-chart/page-1
              excerpt: "divided by 52 weeks"
    versions:
      - effective_from: '2026-03-02'
        formula: |-
          52

  - name: family_fee_income_band
    kind: derived
    entity: Family
    dtype: Integer
    period: Year
    source: CAPS Appendix D, Family Fee income ranges
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ga/manual/decal/caps/appendix-d-family-fee-chart/page-1
              excerpt: "Family unit size Annual income ... Family fee: No family fee 3% of income 5% of income 7% of income"
          - path: versions[0].formula
            kind: import
            import:
              target: us-ga:policies/decal/caps/appendix-d-family-fee-chart#no_family_fee_income_upper_limit_by_family_unit_size
              output: no_family_fee_income_upper_limit_by_family_unit_size
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-ga:policies/decal/caps/appendix-d-family-fee-chart#three_percent_fee_income_upper_limit_by_family_unit_size
              output: three_percent_fee_income_upper_limit_by_family_unit_size
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-ga:policies/decal/caps/appendix-d-family-fee-chart#five_percent_fee_income_upper_limit_by_family_unit_size
              output: five_percent_fee_income_upper_limit_by_family_unit_size
              hash: sha256:local
    versions:
      - effective_from: '2026-03-02'
        formula: |-
          if annual_gross_applicable_income <= no_family_fee_income_upper_limit_by_family_unit_size[family_unit_size]: 0 else: if annual_gross_applicable_income <= three_percent_fee_income_upper_limit_by_family_unit_size[family_unit_size]: 1 else: if annual_gross_applicable_income <= five_percent_fee_income_upper_limit_by_family_unit_size[family_unit_size]: 2 else: 3

  - name: weekly_family_fee
    kind: derived
    entity: Family
    dtype: Money
    period: Week
    unit: USD
    source: CAPS Appendix D, weekly family fee formula
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ga/manual/decal/caps/appendix-d-family-fee-chart/page-1
              excerpt: "Weekly family fee = annual gross applicable income x .03, .05, or .07 (3, 5, or 7%), divided by 52 weeks, rounded down to whole dollar amount."
          - path: versions[0].formula
            kind: import
            import:
              target: us-ga:policies/decal/caps/appendix-d-family-fee-chart#family_fee_income_band
              output: family_fee_income_band
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-ga:policies/decal/caps/appendix-d-family-fee-chart#family_fee_rate_by_income_band
              output: family_fee_rate_by_income_band
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-ga:policies/decal/caps/appendix-d-family-fee-chart#weekly_family_fee_divisor_weeks
              output: weekly_family_fee_divisor_weeks
              hash: sha256:local
    versions:
      - effective_from: '2026-03-02'
        formula: |-
          floor((annual_gross_applicable_income * family_fee_rate_by_income_band[family_fee_income_band]) / weekly_family_fee_divisor_weeks)

  - name: weekly_family_fee_per_child_in_care
    kind: derived
    entity: Family
    dtype: Money
    period: Week
    unit: USD
    source: CAPS Appendix D, division of resulting family fee among children in care
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ga/manual/decal/caps/appendix-d-family-fee-chart/page-1
              excerpt: "The resulting family fee will be divided among all children in care."
          - path: versions[0].formula
            kind: import
            import:
              target: us-ga:policies/decal/caps/appendix-d-family-fee-chart#weekly_family_fee
              output: weekly_family_fee
              hash: sha256:local
    versions:
      - effective_from: '2026-03-02'
        formula: |-
          if children_in_care_count > 0: weekly_family_fee / children_in_care_count else: 0
