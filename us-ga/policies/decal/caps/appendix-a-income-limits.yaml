format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ga/manual/decal/caps/appendix-a-income-limits/page-1
  summary: |-
    CAPS Appendix A – Maximum Income Limits, effective March 2, 2026

    CAPS Maximum Income Limits Income limits for CAPS eligibility are set in accordance with the income guidelines established by the United States Department of Health and Human Services. The federal poverty level (FPL) guidelines are used to set the income limit for families who qualify for the very low-income priority group. The state median income (SMI) guidelines are used to set the income limit for families new to CAPS and for ongoing eligibility and redetermination.

    Family Unit Size Very Low-Income Priority Group1 Initial Eligibility2 Ongoing Eligibility and Redetermination3
rules:
  - name: very_low_income_priority_group_fpl_percentage
    kind: parameter
    dtype: Rate
    source: CAPS Appendix A, footnote 1
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-ga/manual/decal/caps/appendix-a-income-limits/page-1
              excerpt: "CAPS Appendix A – Maximum Income Limits, effective March 2, 2026"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ga/manual/decal/caps/appendix-a-income-limits/page-1
              excerpt: "The threshold for families in the very low-income priority group is 50% of the federal poverty level (FPL) guidelines"
    versions:
      - effective_from: '2026-03-02'
        formula: |-
          0.50

  - name: initial_eligibility_smi_percentage
    kind: parameter
    dtype: Rate
    source: CAPS Appendix A, footnote 2
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
