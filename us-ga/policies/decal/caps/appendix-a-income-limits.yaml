          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ga/manual/decal/caps/appendix-a-income-limits/page-1
              excerpt: "The threshold for initial eligibility is 50% of the state median income (SMI)."
    versions:
