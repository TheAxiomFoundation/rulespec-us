      - us-ga/manual/dfcs/snap/3617/block-9
      - us-ga/manual/dfcs/snap/3617/block-10
      - us-ga/manual/dfcs/snap/3617/block-12
  summary: |-
    Georgia DFCS SNAP policy manual section 3617 (Shelter and Utility
    Deductions), FY 2026 standard utility allowances effective October 2025:
    the heating/cooling standard utility allowance (H/C SUA) is 405 dollars,
    the limited standard utility allowance (LSUA) is 358 dollars, and the
    telephone standard is 47 dollars, statewide.
