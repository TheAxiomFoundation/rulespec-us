format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ga/manual/dfcs/snap/3612
  summary: |-
    Allow a 20% earned income deduction for assistance units (AUs) with earned income. Apply the 20% earned income deduction to the AU’s total countable gross earned income. Failure to report earned income timely will result in the loss of the 20% earned income deduction.
rules:
  - name: earned_income_deduction_rate
    kind: parameter
    dtype: Rate
    source: 3612 Requirements; Basic Considerations
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3612
              excerpt: "20% earned income deduction"
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3612
              excerpt: "Effective Date: December 2019"
    versions:
      - effective_from: '2019-12-01'
        formula: |-
          0.20

  - name: earned_income_deduction_allowed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 3612 Requirements; Basic Considerations
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3612
              excerpt: "assistance units (AUs) with earned income"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3612
              excerpt: "Failure to report earned income timely will result in the loss"
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3612
              excerpt: "Effective Date: December 2019"
    versions:
      - effective_from: '2019-12-01'
        formula: |-
          total_countable_gross_earned_income > 0
          and not assistance_unit_failed_to_report_earned_income_timely

  - name: earned_income_deduction
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 3612 Requirements; Basic Considerations
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3612
              excerpt: "Apply the 20% earned income deduction to the AU’s total countable gross earned income."
          - path: versions[0].formula
            kind: import
            import:
              target: us-ga:policies/dfcs/snap/3612#earned_income_deduction_rate
              output: earned_income_deduction_rate
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-ga:policies/dfcs/snap/3612#earned_income_deduction_allowed
              output: earned_income_deduction_allowed
              hash: sha256:local
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3612
              excerpt: "Effective Date: December 2019"
    versions:
      - effective_from: '2019-12-01'
        formula: |-
          if earned_income_deduction_allowed: earned_income_deduction_rate * total_countable_gross_earned_income else: 0
