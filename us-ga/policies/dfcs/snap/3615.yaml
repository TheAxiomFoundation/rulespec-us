format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ga/manual/dfcs/snap/3615
  summary: |-
    The dependent care deduction is allowed when necessary for an AU member to search for, accept, or continue employment, comply with E&T requirements, attend training, or pursue education preparatory to employment. Deduct full costs incurred or billed to the AU for children under 18 or incapacitated persons of any age, including transportation, meals, and other care and maintenance costs. Title IV-paid expenses, expenses paid to an AU member providing care, solely educational costs, and costs also allowed as medical expenses are not allowable.
rules:
  - name: dependent_child_under_age_limit
    kind: parameter
    dtype: Count
    source: 3615 Basic Considerations
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3615
              excerpt: "children under 18"
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3615
              excerpt: "Effective Date: January 2025"
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          18

  - name: dependent_care_expense_recipient_qualifies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 3615 Basic Considerations
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3615
              excerpt: "children under 18 or incapacitated persons of any age"
          - path: versions[0].formula
            kind: import
            import:
              target: us-ga:policies/dfcs/snap/3615#dependent_child_under_age_limit
              output: dependent_child_under_age_limit
              hash: sha256:local
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          dependent_care_recipient_is_child
          and dependent_care_recipient_age < dependent_child_under_age_limit
          or dependent_care_recipient_is_incapacitated_person

  - name: dependent_care_expense_necessary_for_allowable_activity
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 3615 Requirements; Basic Considerations
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3615
              excerpt: "search for, accept, or continue employment"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3615
              excerpt: "attend training or pursue education which is preparatory to employment"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3615
              excerpt: "comply with Employment and Training (E&T) requirements"
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          necessary_for_au_member_to_search_for_accept_or_continue_employment
          or necessary_for_au_member_to_attend_training_or_pursue_education_preparatory_to_employment
          or necessary_for_au_member_to_comply_with_employment_and_training_requirements

  - name: dependent_care_expense_type_is_allowable
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 3615 Basic Considerations
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3615
              excerpt: "Dependent care expenses may include the cost of transporting the child or other dependent to or from the provider, for meals, and other costs associated with the care and maintenance of a dependent."
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3615
              excerpt: "Mileage driven to and from the provider may be allowed as a dependent care deduction if at least one of the household vehicles is used for transportation."
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          expense_is_dependent_care_cost
          or expense_is_transportation_to_or_from_dependent_care_provider
          or expense_is_meal_cost_associated_with_dependent_care
          or expense_is_other_cost_associated_with_care_and_maintenance_of_dependent
          or (
              expense_is_mileage_to_or_from_dependent_care_provider
              and at_least_one_household_vehicle_used_for_transportation
              and vehicle_belongs_to_snap_au_member
          )

  - name: dependent_care_expense_verification_met
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 3615 Verification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3615
              excerpt: "Client statement may be accepted for dependent care expenses unless the information appears questionable."
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3615
              excerpt: "Information received from the CAPS Unit is primary verification of the childcare expense billed to the AU."
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3615
              excerpt: "verify dependent care costs through any of the following sources"
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          not dependent_care_expense_information_appears_questionable
          or dependent_care_cost_verified_by_receipt_from_provider
          or dependent_care_cost_verified_by_statement_from_provider
          or dependent_care_cost_verified_by_subsidized_childcare_record_or_caps_worker
          or dependent_care_cost_verified_by_caps_disposition_parent_information_notice_or_child_care_certificate
          or childcare_expense_billed_to_au_verified_by_caps_unit_information

  - name: dependent_care_expense_not_disallowed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 3615 Basic Considerations
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3615
              excerpt: "Do not allow the dependent care expense as a deduction if the expense is paid to an AU member who provides the care."
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3615
              excerpt: "Dependent care expenses do not include costs that are separate and identified solely as educational."
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3615
              excerpt: "the cost may be allowed as a medical expense or dependent care expense, not both"
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          not expense_paid_to_au_member_who_provides_care
          and not expense_separate_and_identified_solely_as_educational
          and not expense_already_allowed_as_medical_expense

  - name: dependent_care_expense_eligible_for_deduction
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 3615 Requirements; Basic Considerations; Verification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3615
              excerpt: "dependent care deduction is allowed when necessary"
          - path: versions[0].formula
            kind: import
            import:
              target: us-ga:policies/dfcs/snap/3615#dependent_care_expense_recipient_qualifies
              output: dependent_care_expense_recipient_qualifies
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-ga:policies/dfcs/snap/3615#dependent_care_expense_necessary_for_allowable_activity
              output: dependent_care_expense_necessary_for_allowable_activity
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-ga:policies/dfcs/snap/3615#dependent_care_expense_type_is_allowable
              output: dependent_care_expense_type_is_allowable
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-ga:policies/dfcs/snap/3615#dependent_care_expense_verification_met
              output: dependent_care_expense_verification_met
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-ga:policies/dfcs/snap/3615#dependent_care_expense_not_disallowed
              output: dependent_care_expense_not_disallowed
              hash: sha256:local
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          dependent_care_expense_recipient_qualifies
          and dependent_care_expense_necessary_for_allowable_activity
          and dependent_care_expense_type_is_allowable
          and dependent_care_expense_verification_met
          and dependent_care_expense_not_disallowed

  - name: snap_allowable_monthly_dependent_care_expenses
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 3615 Requirements; Basic Considerations
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3615
              excerpt: "Dependent care costs that are fully incurred by the AU (including transportation costs) are allowed as a deduction."
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3615
              excerpt: "Deduct the full amount incurred or billed to the AU for dependent care."
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3615
              excerpt: "All or any portion of dependent care expenses paid under Title IV of the Social Security Act is not allowable."
          - path: versions[0].formula
            kind: import
            import:
              target: us-ga:policies/dfcs/snap/3615#dependent_care_expense_eligible_for_deduction
              output: dependent_care_expense_eligible_for_deduction
              hash: sha256:local
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if dependent_care_expense_eligible_for_deduction:
              max(0, monthly_dependent_care_costs_incurred_or_billed_to_au - monthly_dependent_care_costs_paid_under_title_iv_of_social_security_act)
          else: 0
