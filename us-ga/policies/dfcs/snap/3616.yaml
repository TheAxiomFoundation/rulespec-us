format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ga/manual/dfcs/snap/3616
  summary: |-
    A child support deduction is allowed when an AU member is legally obligated to pay support for children outside of the AU. Deduct the actual monthly amount of legally obligated child support paid by an AU member to or for an individual who is not a member of the same AU, including direct cash, support such as clothing or infant products, and third-party payments in lieu of child support. Verify the legal obligation, amount legally obligated, and current payment; actual payments may be verified for the most current three-month period. Alimony is not allowed as a child support deduction.
rules:
  - name: child_support_payment_verification_lookback_months
    kind: parameter
    dtype: Count
    source: 3616 Budgeting Child Support Deduction
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3616
              excerpt: "most current three-month period"
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3616
              excerpt: "Effective Date: May 2024"
    versions:
      - effective_from: '2024-05-01'
        formula: |-
          3

  - name: child_support_payment_type_allowable
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 3616 Basic Considerations
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3616
              excerpt: "Cash payments made directly to or for an individual."
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3616
              excerpt: "Support such as the costs of clothing or infant products."
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3616
              excerpt: "Direct payments to a third party in lieu of child support payment."
    versions:
      - effective_from: '2024-05-01'
        formula: |-
          payment_is_cash_made_directly_to_or_for_non_au_individual
          or payment_is_support_such_as_clothing_or_infant_products
          or payment_is_direct_third_party_payment_in_lieu_of_child_support

  - name: child_support_legal_obligation_verification_met
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 3616 Basic Considerations
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3616
              excerpt: "Court order"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3616
              excerpt: "Order issued through an administrative process"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3616
              excerpt: "Divorce or separation documents"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3616
              excerpt: "Verbal confirmation of existing documents from a knowledgeable source"
    versions:
      - effective_from: '2024-05-01'
        formula: |-
          legal_obligation_verified_by_court_order
          or legal_obligation_verified_by_administrative_order
          or legal_obligation_verified_by_divorce_or_separation_documents
          or legal_obligation_verified_by_verbal_confirmation_from_knowledgeable_source

  - name: actual_child_support_payment_verification_met
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 3616 Budgeting Child Support Deduction
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3616
              excerpt: "Receipts"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3616
              excerpt: "Checks"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3616
              excerpt: "Personal money logs"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3616
              excerpt: "Administrative records"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3616
              excerpt: "Statement from individual paying the support"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3616
              excerpt: "Division of Child Support Services (DCSS) computer matches or records."
    versions:
      - effective_from: '2024-05-01'
        formula: |-
          actual_payment_verified_for_most_current_child_support_payment_verification_lookback_months_by_receipts
          or actual_payment_verified_for_most_current_child_support_payment_verification_lookback_months_by_checks
          or actual_payment_verified_for_most_current_child_support_payment_verification_lookback_months_by_personal_money_logs
          or actual_payment_verified_for_most_current_child_support_payment_verification_lookback_months_by_administrative_records
          or actual_payment_verified_for_most_current_child_support_payment_verification_lookback_months_by_statement_from_individual_paying_support
          or actual_payment_verified_for_most_current_child_support_payment_verification_lookback_months_by_dcss_matches_or_records

  - name: current_child_support_deduction_eligible
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 3616 Requirements; Basic Considerations
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3616
              excerpt: "A child support deduction is allowed when an AU member is legally obligated to pay support for children outside of the AU."
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3616
              excerpt: "paid by an AU member to or for an individual who is not a member of the same AU"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3616
              excerpt: "Alimony is not allowed as a child support deduction."
          - path: versions[0].formula
            kind: import
            import:
              target: us-ga:policies/dfcs/snap/3616#child_support_payment_type_allowable
              output: child_support_payment_type_allowable
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-ga:policies/dfcs/snap/3616#child_support_legal_obligation_verification_met
              output: child_support_legal_obligation_verification_met
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-ga:policies/dfcs/snap/3616#actual_child_support_payment_verification_met
              output: actual_child_support_payment_verification_met
              hash: sha256:local
    versions:
      - effective_from: '2024-05-01'
        formula: |-
          au_member_is_legally_obligated_to_pay_child_support_for_child_outside_au
          and child_support_paid_by_au_member_to_or_for_non_au_member
          and child_support_payment_type_allowable
          and child_support_legal_obligation_verification_met
          and legally_obligated_child_support_amount_verified
          and actual_child_support_payment_verification_met
          and not payment_is_alimony

  - name: past_due_child_support_deduction_eligible
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 3616 Budgeting Child Support Deduction
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3616
              excerpt: "the amount that is past due must be verified and not have been deducted in a previous SNAP budget"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3616
              excerpt: "Also verify the legal obligation to pay the past due amount if it was not established by the original child support document."
    versions:
      - effective_from: '2024-05-01'
        formula: |-
          past_due_child_support_amount_verified
          and not past_due_child_support_amount_deducted_in_previous_snap_budget
          and (
            past_due_legal_obligation_established_by_original_child_support_document
            or past_due_legal_obligation_separately_verified
          )

  - name: snap_child_support_deduction
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 3616 Basic Considerations; Budgeting Child Support Deduction
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3616
              excerpt: "Deduct the actual monthly amount of legally obligated child support paid"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3616
              excerpt: "To allow past due child support as a deduction"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3616
              excerpt: "Alimony is not allowed as a child support deduction."
          - path: versions[0].formula
            kind: import
            import:
              target: us-ga:policies/dfcs/snap/3616#current_child_support_deduction_eligible
              output: current_child_support_deduction_eligible
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-ga:policies/dfcs/snap/3616#past_due_child_support_deduction_eligible
              output: past_due_child_support_deduction_eligible
              hash: sha256:local
    versions:
      - effective_from: '2024-05-01'
        formula: |-
          max(0, (if current_child_support_deduction_eligible: monthly_actual_legally_obligated_child_support_paid_excluding_alimony else: 0) + (if past_due_child_support_deduction_eligible: monthly_past_due_child_support_paid else: 0))
