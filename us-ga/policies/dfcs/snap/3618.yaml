format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ga/manual/dfcs/snap/3618
  summary: |-
    Effective October 2025, the homeless shelter deduction is an option for homeless households not receiving free shelter throughout the month. If the head of household is homeless, the entire Applicant Group is considered homeless. A homeless household claiming verified allowable shelter expense at or below $199 is eligible for the homeless shelter deduction; households cannot receive both the homeless shelter deduction and the excess shelter deduction and/or standard utility allowance.
rules:
  - name: homeless_shelter_deduction_amount
    kind: parameter
    dtype: Money
    unit: USD
    period: Month
    source: 3618 Basic Considerations
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3618
              excerpt: "homeless shelter deduction amount of $199"
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3618
              excerpt: "Effective Date: October 2025"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          199

  - name: temporary_accommodation_maximum_days
    kind: parameter
    dtype: Count
    source: 3618 Basic Considerations
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3618
              excerpt: "A temporary accommodation for not more than 90 days"
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3618
              excerpt: "Effective Date: October 2025"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          90

  - name: imminent_loss_nighttime_residence_days
    kind: parameter
    dtype: Count
    source: 3618 Basic Considerations
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3618
              excerpt: "due to lose its primary nighttime residence within 14 days"
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3618
              excerpt: "Effective Date: October 2025"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          14

  - name: household_imminently_homeless
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 3618 Basic Considerations
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3618
              excerpt: "due to lose its primary nighttime residence within 14 days, does not have an alternative residence, and lacks the resources to secure permanent housing"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_due_to_lose_primary_nighttime_residence_within_imminent_loss_nighttime_residence_days
          and household_has_no_alternative_residence
          and household_lacks_resources_to_secure_permanent_housing

  - name: head_of_household_homeless
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 3618 Basic Considerations
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3618
              excerpt: "lacks a fixed or regular nighttime residence or the household’s primary nighttime residence meets one of the following"
          - path: versions[0].formula
            kind: import
            import:
              target: us-ga:policies/dfcs/snap/3618#household_imminently_homeless
              output: household_imminently_homeless
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_imminently_homeless
          or head_lacks_fixed_or_regular_nighttime_residence
          or head_primary_nighttime_residence_is_halfway_house_or_similar_temporary_institution
          or head_primary_nighttime_residence_is_temporary_accommodation_in_another_individual_residence_not_more_than_temporary_accommodation_maximum_days
          or head_primary_nighttime_residence_is_place_not_designed_or_ordinarily_used_as_regular_sleeping_accommodation
          or head_primary_nighttime_residence_is_supervised_homeless_shelter

  - name: homeless_household
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 3618 Basic Considerations
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3618
              excerpt: "If the head of household is homeless, the entire Applicant Group will be considered a homeless household."
          - path: versions[0].formula
            kind: import
            import:
              target: us-ga:policies/dfcs/snap/3618#head_of_household_homeless
              output: head_of_household_homeless
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          head_of_household_homeless

  - name: allowable_homeless_shelter_expense_reported
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 3618 Allowable Expenses
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3618
              excerpt: "payments to a homeless shelter; payments to a motel, hotel, or extended stay; payments to family or friends; payments on their vehicle"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_reports_payments_to_homeless_shelter
          or household_reports_payments_to_motel_hotel_or_extended_stay_for_temporary_lodging
          or household_reports_payments_to_family_or_friends_for_temporary_housing_less_than_temporary_accommodation_maximum_days
          or household_reports_vehicle_payments_and_resides_in_vehicle

  - name: homeless_household_claims_expense_at_or_below_deduction_amount
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 3618 Basic Considerations
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3618
              excerpt: "claims an allowable shelter expense at or below the homeless shelter deduction amount"
          - path: versions[0].formula
            kind: import
            import:
              target: us-ga:policies/dfcs/snap/3618#homeless_shelter_deduction_amount
              output: homeless_shelter_deduction_amount
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-ga:policies/dfcs/snap/3618#allowable_homeless_shelter_expense_reported
              output: allowable_homeless_shelter_expense_reported
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          allowable_homeless_shelter_expense_reported
          and claimed_allowable_shelter_expense_amount <= homeless_shelter_deduction_amount

  - name: homeless_shelter_deduction_eligible
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 3618 Requirements; Verification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3618
              excerpt: "an option for homeless households that are not receiving free shelter throughout the month"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3618
              excerpt: "If the household reports shelter expenses, third-party verification is required."
          - path: versions[0].formula
            kind: import
            import:
              target: us-ga:policies/dfcs/snap/3618#homeless_household
              output: homeless_household
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-ga:policies/dfcs/snap/3618#homeless_household_claims_expense_at_or_below_deduction_amount
              output: homeless_household_claims_expense_at_or_below_deduction_amount
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          homeless_household
          and homeless_household_claims_expense_at_or_below_deduction_amount
          and household_not_receiving_free_shelter_throughout_month
          and shelter_expense_verified_by_third_party

  - name: snap_claimed_homeless_shelter_deduction
    kind: derived
    entity: Household
    dtype: Money
    unit: USD
    period: Month
    source: 3618 Applying the Homeless Shelter Deduction
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3618
              excerpt: "$199 homeless shelter deduction must be subtracted from the net income"
          - path: versions[0].formula
            kind: import
            import:
              target: us-ga:policies/dfcs/snap/3618#homeless_shelter_deduction_amount
              output: homeless_shelter_deduction_amount
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-ga:policies/dfcs/snap/3618#homeless_shelter_deduction_eligible
              output: homeless_shelter_deduction_eligible
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if homeless_shelter_deduction_eligible: homeless_shelter_deduction_amount else: 0

  - name: homeless_shelter_deduction_applied_to_budget
    kind: derived
    entity: Household
    dtype: Money
    unit: USD
    period: Month
    source: 3618 Applying the Homeless Shelter Deduction
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: ordering
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3618
              excerpt: "Gateway will apply the appropriate deduction based on which one is most beneficial to the AU."
          - path: versions[0].formula
            kind: import
            import:
              target: us-ga:policies/dfcs/snap/3618#snap_claimed_homeless_shelter_deduction
              output: snap_claimed_homeless_shelter_deduction
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if homeless_shelter_deduction_is_most_beneficial_to_assistance_unit: snap_claimed_homeless_shelter_deduction else: 0
