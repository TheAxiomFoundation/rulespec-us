format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ga/manual/dfcs/snap/3617
  summary: |-
    Monthly shelter expenses in excess of 50% of the AU's income after other deductions may be allowed, not to exceed the maximum shelter deduction. Do not allow more than $744 per month as an excess shelter deduction, except if at least one AU individual is age 60 or older or SNAP Disabled, allow the full excess shelter expense. The H/C SUA is $405, the LSUA is $358, and the telephone standard is $47.
rules:
  - name: sets_snap_standard_utility_allowance
    kind: source_relation
    source: 3617 Heating/Cooling Standard Utility Allowance
    source_relation:
      type: sets
      target: us:regulations/7-cfr/273/9#snap_standard_utility_allowance_state_option
      authority: state
      value: us-ga:policies/dfcs/snap/3617#snap_standard_utility_allowance
      basis:
        delegation: us:regulations/7-cfr/273/9#snap_state_standard_utility_allowance_delegation

  - name: sets_snap_limited_utility_allowance
    kind: source_relation
    source: 3617 Limited Standard Utility Allowance
    source_relation:
      type: sets
      target: us:regulations/7-cfr/273/9#snap_limited_utility_allowance_state_option
      authority: state
      value: us-ga:policies/dfcs/snap/3617#snap_limited_utility_allowance
      basis:
        delegation: us:regulations/7-cfr/273/9#snap_state_standard_utility_allowance_delegation

  - name: sets_snap_individual_utility_allowance
    kind: source_relation
    source: 3617 Telephone Standard for the Cost of One Basic Service Fee
    source_relation:
      type: sets
      target: us:regulations/7-cfr/273/9#snap_individual_utility_allowance_state_option
      authority: state
      value: us-ga:policies/dfcs/snap/3617#snap_individual_utility_allowance
      basis:
        delegation: us:regulations/7-cfr/273/9#snap_state_standard_utility_allowance_delegation

  - name: excess_shelter_income_percentage
    kind: parameter
    dtype: Rate
    source: 3617 Basic Considerations
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3617
              excerpt: monthly shelter costs in excess of 50% of the AU's income after all other deductions
    versions:
      - effective_from: '2025-11-01'
        formula: |-
          0.50

  - name: maximum_excess_shelter_deduction
    kind: parameter
    dtype: Money
    unit: USD
    period: Month
    source: 3617 Excess Shelter Deduction
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3617
              excerpt: Do not allow more than $744 per month as an excess shelter deduction.
    versions:
      - effective_from: '2025-11-01'
        formula: |-
          744

  - name: elderly_member_age_threshold
    kind: parameter
    dtype: Count
    source: 3617 Excess Shelter Deduction
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3617
              excerpt: at least one individual in the AU is 60 years of age or older
    versions:
      - effective_from: '2025-11-01'
        formula: |-
          60

  - name: heating_cooling_standard_utility_allowance_amount
    kind: parameter
    dtype: Money
    unit: USD
    period: Month
    source: 3617 Heating/Cooling Standard Utility Allowance
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3617
              excerpt: The H/C SUA is $405.
    versions:
      - effective_from: '2025-11-01'
        formula: |-
          405

  - name: limited_standard_utility_allowance_amount
    kind: parameter
    dtype: Money
    unit: USD
    period: Month
    source: 3617 Limited Standard Utility Allowance
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3617
              excerpt: The LSUA is $358
    versions:
      - effective_from: '2025-11-01'
        formula: |-
          358

  - name: telephone_standard_amount
    kind: parameter
    dtype: Money
    unit: USD
    period: Month
    source: 3617 Telephone Standard for the Cost of One Basic Service Fee
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3617
              excerpt: The telephone standard of $47 is included in the SUAs.
    versions:
      - effective_from: '2025-11-01'
        formula: |-
          47

  - name: liheap_minimum_payment_for_heating_cooling_allowance
    kind: parameter
    dtype: Money
    unit: USD
    source: 3617 Heating/Cooling Standard Utility Allowance
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3617
              excerpt: The LIHEAP payment must be an amount greater than $20/year
    versions:
      - effective_from: '2025-11-01'
        formula: |-
          20

  - name: actual_utility_averaging_months
    kind: parameter
    dtype: Count
    source: 3617 Actual Utilities
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3617
              excerpt: Divide the total by twelve to obtain the average actual monthly utility expense
    versions:
      - effective_from: '2025-11-01'
        formula: |-
          12

  - name: excess_shelter_expense
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 3617 Basic Considerations
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3617
              excerpt: monthly shelter costs in excess of 50% of the AU's income after all other deductions
          - path: versions[0].formula
            kind: import
            import:
              target: us-ga:policies/dfcs/snap/3617#excess_shelter_income_percentage
              output: excess_shelter_income_percentage
              hash: sha256:local
    versions:
      - effective_from: '2025-11-01'
        formula: |-
          max(0, monthly_allowable_shelter_costs - (excess_shelter_income_percentage * assistance_unit_income_after_other_deductions))

  - name: uncapped_excess_shelter_deduction_applies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 3617 Excess Shelter Deduction
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3617
              excerpt: If at least one individual in the AU is 60 years of age or older or is SNAP Disabled
    versions:
      - effective_from: '2025-11-01'
        formula: |-
          assistance_unit_has_member_age_at_least_elderly_member_age_threshold
          or assistance_unit_has_snap_disabled_member

  - name: excess_shelter_deduction
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 3617 Requirements and Excess Shelter Deduction
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3617
              excerpt: Do not allow more than $744 per month as an excess shelter deduction.
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3617
              excerpt: allow the full amount of the excess shelter expense as a deduction
          - path: versions[0].formula
            kind: import
            import:
              target: us-ga:policies/dfcs/snap/3617#excess_shelter_expense
              output: excess_shelter_expense
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-ga:policies/dfcs/snap/3617#uncapped_excess_shelter_deduction_applies
              output: uncapped_excess_shelter_deduction_applies
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-ga:policies/dfcs/snap/3617#maximum_excess_shelter_deduction
              output: maximum_excess_shelter_deduction
              hash: sha256:local
    versions:
      - effective_from: '2025-11-01'
        formula: |-
          if uncapped_excess_shelter_deduction_applies: excess_shelter_expense else: min(excess_shelter_expense, maximum_excess_shelter_deduction)

  - name: temporarily_unoccupied_residence_shelter_costs_allowed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 3617 Temporarily Unoccupied Residence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3617
    versions:
      - effective_from: '2025-11-01'
        formula: |-
          residence_temporarily_unoccupied_due_to_employment_training_illness_natural_disaster_or_casualty_loss
          and assistance_unit_intends_to_return_to_home
          and current_occupants_are_not_claiming_shelter_costs_for_snap
          and not home_is_rented_or_leased_during_absence

  - name: snap_standard_utility_allowance_eligible
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 3617 Heating/Cooling Standard Utility Allowance
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3617
              excerpt: Allow the H/C SUA if the AU is billed or expects to be billed in the next 12 months for a heating or cooling cost separate from the rent or mortgage
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3617
              excerpt: includes an elderly or disabled member AND received a low-income energy assistance payment (LIHEAP)
          - path: versions[0].formula
            kind: import
            import:
              target: us-ga:policies/dfcs/snap/3617#liheap_minimum_payment_for_heating_cooling_allowance
              output: liheap_minimum_payment_for_heating_cooling_allowance
              hash: sha256:local
    versions:
      - effective_from: '2025-11-01'
        formula: |-
          assistance_unit_is_billed_or_expects_billing_for_heating_or_cooling_cost_separate_from_rent_or_mortgage
          or ((assistance_unit_has_elderly_or_disabled_member) and (liheap_payment_received_in_application_month_or_previous_12_months > liheap_minimum_payment_for_heating_cooling_allowance))
          or assistance_unit_is_billed_or_expects_billing_for_excess_heating_or_cooling_expense_in_any_housing

  - name: snap_standard_utility_allowance
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 3617 Heating/Cooling Standard Utility Allowance
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3617
          - path: versions[0].formula
            kind: import
            import:
              target: us-ga:policies/dfcs/snap/3617#heating_cooling_standard_utility_allowance_amount
              output: heating_cooling_standard_utility_allowance_amount
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-ga:policies/dfcs/snap/3617#snap_standard_utility_allowance_eligible
              output: snap_standard_utility_allowance_eligible
              hash: sha256:local
    versions:
      - effective_from: '2025-11-01'
        formula: |-
          if snap_standard_utility_allowance_eligible: heating_cooling_standard_utility_allowance_amount else: 0

  - name: snap_limited_utility_allowance_eligible
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 3617 Limited Standard Utility Allowance
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3617
              excerpt: billed/expects to be billed for at least two utility costs that are not used to heat or cool
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3617
              excerpt: billed/expects to be billed for a non-heating/non-cooling excess utility costs in any housing
    versions:
      - effective_from: '2025-11-01'
        formula: |-
          (non_heating_non_cooling_utility_cost_count_billed_separately_from_rent_or_mortgage >= 2)
          or assistance_unit_is_billed_or_expects_billing_for_non_heating_non_cooling_excess_utility_cost_in_any_housing

  - name: snap_limited_utility_allowance
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 3617 Limited Standard Utility Allowance
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3617
          - path: versions[0].formula
            kind: import
            import:
              target: us-ga:policies/dfcs/snap/3617#limited_standard_utility_allowance_amount
              output: limited_standard_utility_allowance_amount
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-ga:policies/dfcs/snap/3617#snap_limited_utility_allowance_eligible
              output: snap_limited_utility_allowance_eligible
              hash: sha256:local
    versions:
      - effective_from: '2025-11-01'
        formula: |-
          if snap_limited_utility_allowance_eligible: limited_standard_utility_allowance_amount else: 0

  - name: actual_monthly_utility_expense
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 3617 Actual Utilities
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3617
              excerpt: Total the verified expenses for the most recent 12-month period; Divide the total by twelve
          - path: versions[0].formula
            kind: import
            import:
              target: us-ga:policies/dfcs/snap/3617#actual_utility_averaging_months
              output: actual_utility_averaging_months
              hash: sha256:local
    versions:
      - effective_from: '2025-11-01'
        formula: |-
          if assistance_unit_incurred_only_one_utility_expense_other_than_heating_or_cooling and actual_utility_expense_verified_by_third_party: verified_utility_expenses_for_most_recent_12_months / actual_utility_averaging_months else: 0

  - name: snap_one_utility_allowance
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 3617 Actual Utilities
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3617
              excerpt: Allow the AU to use the cost of actual monthly utilities when only one utility expense is incurred other than heating and/or cooling
          - path: versions[0].formula
            kind: import
            import:
              target: us-ga:policies/dfcs/snap/3617#actual_monthly_utility_expense
              output: actual_monthly_utility_expense
              hash: sha256:local
    versions:
      - effective_from: '2025-11-01'
        formula: |-
          actual_monthly_utility_expense

  - name: snap_telephone_allowance_eligible
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 3617 Telephone Standard for the Cost of One Basic Service Fee
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3617
              excerpt: If the AU incurs only a telephone expense, the telephone standard is used to allow the deduction.
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3617
              excerpt: The telephone standard is not allowed if the AU incurs the cost of long-distance telephone service only
    versions:
      - effective_from: '2025-11-01'
        formula: |-
          assistance_unit_incurs_only_basic_telephone_service_expense
          and not dwelling_is_eligible_for_heating_cooling_sua
          and not dwelling_is_eligible_for_limited_sua
          and not assistance_unit_incurs_long_distance_telephone_service_only
          and not assistance_unit_incurs_only_telephone_usage_fee
          and not other_snap_household_members_in_dwelling_claim_an_sua_for_different_phone

  - name: snap_individual_utility_allowance
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 3617 Telephone Standard for the Cost of One Basic Service Fee
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ga/manual/dfcs/snap/3617
          - path: versions[0].formula
            kind: import
            import:
              target: us-ga:policies/dfcs/snap/3617#telephone_standard_amount
              output: telephone_standard_amount
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-ga:policies/dfcs/snap/3617#snap_telephone_allowance_eligible
              output: snap_telephone_allowance_eligible
              hash: sha256:local
    versions:
      - effective_from: '2025-11-01'
        formula: |-
          if snap_telephone_allowance_eligible: telephone_standard_amount else: 0
