format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ga/guidance/dfcs/tanf/eligibility-requirements/block-1
  summary: |-
    In order to be determined eligible to receive TANF benefits, the following criteria must be met by the members of the assistance unit (AU): Age: A child must be less than 18 years of age (less than 19 years if a member is a full-time student). Enumeration: All assistance unit members must have or apply for a Social Security number. Lifetime Limits: Receipt of cash assistance is limited to 48 months in a lifetime. Work Requirement: Every parent, pregnant woman, and grantee relative that is considered work eligible ... is required to participate in work activities and training for at least 30 hours weekly. Cooperation with Division of Child Support Services is a requirement for receiving TANF benefits, unless good cause exists.
imports:
  - us-ga:policies/dfcs/tanf/eligibility-requirements/income-resources#income_resources_financial_criteria_met
rules:
  - name: tanf_dependent_child_age_requirement_satisfied
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: DFCS TANF eligibility requirements - Age
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ga/guidance/dfcs/tanf/eligibility-requirements/block-1
              excerpt: "A child must be less than 18 years of age (less than 19 years if a member is a full-time student)."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          child_age_is_less_than_18
          or (member_is_full_time_student and child_age_is_less_than_19)

  - name: tanf_applicant_or_recipient_other_benefits_requirement_satisfied
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: DFCS TANF eligibility requirements - Application for other benefits
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ga/guidance/dfcs/tanf/eligibility-requirements/block-1
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          tanf_applicant_or_recipient_applied_for_and_accepts_other_monetary_benefits_for_which_member_may_be_eligible

  - name: tanf_recipient_citizenship_requirement_satisfied
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: DFCS TANF eligibility requirements - Citizenship
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ga/guidance/dfcs/tanf/eligibility-requirements/block-1
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          recipient_is_us_citizen
          or recipient_is_lawful_resident_alien

  - name: tanf_deprivation_requirement_satisfied
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: DFCS TANF eligibility requirements - Deprivation
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ga/guidance/dfcs/tanf/eligibility-requirements/block-1
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          at_least_one_parent_is_continuously_absent_from_home
          or at_least_one_parent_has_physical_or_mental_incapacity
          or parent_is_deceased
          or (child_is_in_two_parent_family_with_both_parents_able_bodied and one_parent_has_recent_connection_to_workforce)

  - name: tanf_enumeration_requirement_satisfied
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: DFCS TANF eligibility requirements - Enumeration
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ga/guidance/dfcs/tanf/eligibility-requirements/block-1
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          assistance_unit_member_has_social_security_number
          or assistance_unit_member_has_applied_for_social_security_number

  - name: tanf_school_attendance_requirement_satisfied
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: DFCS TANF eligibility requirements - School Attendance
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ga/guidance/dfcs/tanf/eligibility-requirements/block-1
              excerpt: "All children ages 6 through 18 who have not graduated from high school or who have not received a certificate of high school equivalency must attend school and have satisfactory attendance."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not child_is_age_6_through_18_without_high_school_graduation_or_equivalency
          or (child_attends_school and child_has_satisfactory_school_attendance and (not child_is_18_year_old_dependent or dependent_child_has_verification_of_full_time_enrollment))

  - name: tanf_immunization_requirement_satisfied
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: DFCS TANF eligibility requirements - Immunization
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ga/guidance/dfcs/tanf/eligibility-requirements/block-1
              excerpt: "All children under 7 must be immunized, unless good cause exists."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not child_is_under_7
          or child_is_immunized
          or good_cause_exists_for_lack_of_immunization

  - name: tanf_paternity_requirement_satisfied
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: DFCS TANF eligibility requirements - Paternity
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ga/guidance/dfcs/tanf/eligibility-requirements/block-1
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          assistance_unit_cooperates_in_establishment_of_paternity
          and paternity_of_child_is_established_at_application_or_when_added_to_active_case

  - name: tanf_work_requirement_satisfied_scalar_limit
    kind: parameter
    dtype: Count
    source: DFCS TANF eligibility requirements - Work Requirement
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ga/guidance/dfcs/tanf/eligibility-requirements/block-1
              excerpt: "at least 30 hours weekly"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: tanf_work_requirement_satisfied
    kind: derived
    entity: Person
    dtype: Judgment
    period: Week
    source: DFCS TANF eligibility requirements - Work Requirement
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ga/guidance/dfcs/tanf/eligibility-requirements/block-1
              excerpt: "required to participate in work activities and training for at least 30 hours weekly"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not parent_pregnant_woman_or_grantee_relative_is_work_eligible
          or weekly_work_activities_and_training_hours >= tanf_work_requirement_satisfied_scalar_limit

  - name: tanf_child_support_cooperation_requirement_satisfied
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: DFCS TANF eligibility requirements - Division of Child Support Services cooperation
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ga/guidance/dfcs/tanf/eligibility-requirements/block-1
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_cooperates_with_division_of_child_support_services
          or good_cause_exists_for_not_cooperating_with_division_of_child_support_services

  - name: tanf_lifetime_cash_assistance_limit_months
    kind: parameter
    dtype: Count
    source: DFCS TANF eligibility requirements - Lifetime Limits
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ga/guidance/dfcs/tanf/eligibility-requirements/block-1
              excerpt: "Receipt of cash assistance is limited to 48 months in a lifetime"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          48

  - name: tanf_lifetime_limit_requirement_satisfied
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: DFCS TANF eligibility requirements - Lifetime Limits
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ga/guidance/dfcs/tanf/eligibility-requirements/block-1
              excerpt: "The limit may be extended if it is determined that an extension is justified due to certain hardships"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          countable_lifetime_cash_assistance_months_received_in_all_states <= tanf_lifetime_cash_assistance_limit_months
          or lifetime_limit_extension_is_justified_due_to_hardship

  - name: tanf_financial_criteria_requirement_satisfied
    kind: derived
    entity: TanfUnit
    dtype: Judgment
    period: Month
    source: DFCS TANF eligibility requirements - Income/Resources
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: import
            import:
              target: us-ga:policies/dfcs/tanf/eligibility-requirements/income-resources#income_resources_financial_criteria_met
              output: income_resources_financial_criteria_met
              hash: sha256:bccf786a7bdf0bf290ed7acc3f4d8008d94cc85796e60abaf39bcd9f90c0c34e
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ga/guidance/dfcs/tanf/eligibility-requirements/block-1
              excerpt: "AU must meet the financial criteria to receive TANF."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          income_resources_financial_criteria_met
