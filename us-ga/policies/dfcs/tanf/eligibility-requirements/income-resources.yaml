format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ga/guidance/dfcs/tanf/eligibility-requirements/income-resources/block-1
  summary: |-
    AU must meet the financial criteria to receive TANF; for example, an AU of three must have gross income below $784 a month and countable assets of less than $1,000.
imports:
  - us-ga:policies/dfcs/tanf/appendix-a#gross_income_ceiling
  - us-ga:policies/dfcs/tanf/appendix-a/block-3#assistance_unit_limit
rules:
  - name: income_resources_financial_criteria_met
    kind: derived
    entity: TanfUnit
    dtype: Judgment
    period: Month
    source: DFCS TANF eligibility requirements income/resources block 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ga/guidance/dfcs/tanf/eligibility-requirements/income-resources/block-1
              excerpt: "AU must meet the financial criteria to receive TANF"
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ga/guidance/dfcs/tanf/eligibility-requirements/income-resources/block-1
              excerpt: "gross income below $784 a month and countable assets of less than $1,000"
          - path: versions[0].formula
            kind: import
            import:
              target: us-ga:policies/dfcs/tanf/appendix-a#gross_income_ceiling
              output: gross_income_ceiling
              hash: sha256:5eb46e90e0b027db4ba85994be630634ce990629547c1ce2713a33a0568781f3
          - path: versions[0].formula
            kind: import
            import:
              target: us-ga:policies/dfcs/tanf/appendix-a/block-3#assistance_unit_limit
              output: assistance_unit_limit
              hash: sha256:a01373585eb37e58b35fb130c5f41ecf88388a0b08f2f3f990a5f36b0469fee3
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          assistance_unit_gross_income < gross_income_ceiling[au_size]
          and assistance_unit_countable_assets < assistance_unit_limit
