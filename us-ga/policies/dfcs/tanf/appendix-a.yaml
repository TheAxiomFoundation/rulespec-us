format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ga/manual/dfcs/tanf/appendix-a/block-2
  summary: |-
    Appendix A table lists AU Size 1-11 with Gross Income Ceiling, Standard of Need, Family Maximum TANF, and 160% FPL GRG Income Limits; each additional member adds +44, +24, +17, and +757 respectively.
rules:
  - name: gross_income_ceiling
    kind: parameter
    dtype: Money
    unit: USD
    indexed_by: au_size
    source: Appendix A, AU Size Gross Income Ceiling table
    metadata:
      proof:
        atoms:
          - path: versions[0].values
            kind: parameter_table
            source:
              corpus_citation_path: us-ga/manual/dfcs/tanf/appendix-a/block-2
              excerpt: "AU Size Gross Income Ceiling ... 1 $435 ... 11 1591"
              table:
                header: "AU Size Gross Income Ceiling Standard of Need Family Maximum TANF 160% FPL GRG Income Limits"
                row_key: "AU Size"
                column_key: "Gross Income Ceiling"
    versions:
      - effective_from: '0001-01-01'
        values:
          1: 435
          2: 659
          3: 784
          4: 925
          5: 1060
