format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ga/manual/dfcs/tanf/1605/block-3
  summary: |-
    The GIC is used to determine the AU’s financial eligibility based on the AU’s gross countable income. Gross countable income is the AU’s included income plus income deemed from a non-AU member, or less income allocated to a non-AU member. The AU’s gross countable income must be equal to or less than the GIC for the AU size.
imports:
  - us-ga:policies/dfcs/tanf/appendix-a#gross_income_ceiling
rules:
  - name: gross_countable_income
    kind: derived
    entity: TanfUnit
    dtype: Money
    period: Month
    unit: USD
    source: DFCS TANF 1605 block 3, gross countable income definition
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-ga/manual/dfcs/tanf/1605/block-3
              excerpt: "included income plus income deemed from a non-AU member, or less income allocated"
    versions:
      - effective_from: '2019-12-01'
        formula: |-
          assistance_unit_included_income
          + income_deemed_from_non_assistance_unit_members
          - income_allocated_to_non_assistance_unit_members

  - name: financially_eligible_under_gross_income_ceiling
    kind: derived
    entity: TanfUnit
    dtype: Judgment
    period: Month
    source: DFCS TANF 1605 block 3, GIC financial eligibility test
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ga/manual/dfcs/tanf/1605/block-3
              excerpt: "gross countable income must be equal to or less than the GIC for the AU size"
          - path: versions[0].formula
            kind: import
            import:
              target: us-ga:policies/dfcs/tanf/appendix-a#gross_income_ceiling
              output: gross_income_ceiling
              hash: sha256:5eb46e90e0b027db4ba85994be630634ce990629547c1ce2713a33a0568781f3
          - path: versions[0].formula
            kind: import
            import:
              target: us-ga:policies/dfcs/tanf/1605/block-3#gross_countable_income
              output: gross_countable_income
              hash: sha256:local
    versions:
      - effective_from: '2019-12-01'
        formula: |-
          gross_countable_income <= gross_income_ceiling[au_size]
