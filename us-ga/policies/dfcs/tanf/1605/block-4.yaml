          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ga/manual/dfcs/tanf/1605/block-4
              excerpt: "$250 standard work deduction at application"
          - path: versions[0].formula
            kind: import
            import:
              target: us-ga:policies/dfcs/tanf/1615/block-5#standard_work_deduction_amount
              output: standard_work_deduction_amount
              hash: sha256:c6b1045ce619fdc9fd5ce6c6a7f054672eb7852a3ba43c12d0a634f46c90201f
          - path: versions[0].formula
