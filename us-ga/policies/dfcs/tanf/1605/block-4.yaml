format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ga/manual/dfcs/tanf/1605/block-4
  summary: |-
    Net countable income is the AU’s gross countable income minus allowable earned income deductions. The AU’s net countable income must be less than the SON for the AU size. The SON is also used in the SON trial budget to determine if an employed individual qualifies for the $250 standard work deduction at application.
imports:
  - us-ga:policies/dfcs/tanf/1605/block-3#gross_countable_income
  - us-ga:policies/dfcs/tanf/appendix-a#standard_of_need
  - us-ga:policies/dfcs/tanf/1615/block-5#standard_work_deduction_amount
rules:
  - name: net_countable_income
    kind: derived
    entity: TanfUnit
    dtype: Money
    period: Month
    unit: USD
    source: DFCS TANF 1605 block 4, net countable income definition
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-ga/manual/dfcs/tanf/1605/block-4
              excerpt: "Net countable income is the AU’s gross countable income minus allowable earned income deductions."
          - path: versions[0].formula
            kind: import
            import:
              target: us-ga:policies/dfcs/tanf/1605/block-3#gross_countable_income
              output: gross_countable_income
              hash: sha256:5052a0b7450cdb5478a35085a6394b89fc48ecaf1eaa9ae1d43dd4c3fd20f482
    versions:
      - effective_from: '2019-12-01'
        formula: |-
          gross_countable_income - allowable_earned_income_deductions

  - name: financially_eligible_under_standard_of_need
    kind: derived
    entity: TanfUnit
    dtype: Judgment
    period: Month
    source: DFCS TANF 1605 block 4, SON financial eligibility test
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ga/manual/dfcs/tanf/1605/block-4
              excerpt: "net countable income must be less than the SON for the AU size"
          - path: versions[0].formula
            kind: import
            import:
              target: us-ga:policies/dfcs/tanf/appendix-a#standard_of_need
              output: standard_of_need
              hash: sha256:5eb46e90e0b027db4ba85994be630634ce990629547c1ce2713a33a0568781f3
          - path: versions[0].formula
            kind: import
            import:
              target: us-ga:policies/dfcs/tanf/1605/block-4#net_countable_income
              output: net_countable_income
              hash: sha256:local
    versions:
      - effective_from: '2019-12-01'
        formula: |-
          net_countable_income < standard_of_need[au_size]

  - name: assistance_unit_has_employed_individual_qualified_by_son_trial_budget_at_application
    kind: derived
    entity: TanfUnit
    dtype: Judgment
    period: Month
    source: DFCS TANF 1605 block 4, SON trial budget standard work deduction qualification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ga/manual/dfcs/tanf/1605/block-4
              excerpt: "SON trial budget to determine if an employed individual qualifies for the $250 standard work deduction at application"
          - path: versions[0].formula
            kind: import
            import:
              target: us-ga:policies/dfcs/tanf/appendix-a#standard_of_need
              output: standard_of_need
              hash: sha256:5eb46e90e0b027db4ba85994be630634ce990629547c1ce2713a33a0568781f3
    versions:
      - effective_from: '2019-12-01'
        formula: |-
          assistance_unit_has_employed_individual
          and determination_is_at_application
          and son_trial_budget_net_countable_income < standard_of_need[au_size]

  - name: standard_work_deduction_available_in_son_trial_budget_at_application
