format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ga/manual/dfcs/tanf/1615/block-5
  summary: |-
    The standard work deduction of $250 is subtracted from the earned income of each employed individual. An employed individual is eligible for the standard work deduction at application, renewal and change. If the applicant has more than one job, combine the income of both and then deduct the $250 from the total income.
rules:
  - name: standard_work_deduction_amount
    kind: parameter
    dtype: Money
    unit: USD
    source: DFCS TANF 1615 block 5
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ga/manual/dfcs/tanf/1615/block-5
              excerpt: "standard work deduction of $250"
    versions:
      - effective_from: '2019-12-01'
        formula: |-
          250

  - name: earned_income_base_for_standard_work_deduction
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: USD
    source: DFCS TANF 1615 block 5
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ga/manual/dfcs/tanf/1615/block-5
              excerpt: "If the applicant has more than one job, combine the income of both"
    versions:
      - effective_from: '2019-12-01'
        formula: |-
          max(0, earned_income_from_primary_job + earned_income_from_additional_jobs)

  - name: standard_work_deduction_eligible
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: DFCS TANF 1615 block 5
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ga/manual/dfcs/tanf/1615/block-5
              excerpt: "An employed individual is eligible for the standard work deduction at application, renewal and change."
    versions:
      - effective_from: '2019-12-01'
        formula: |-
          individual_is_employed
          and determination_is_at_application_renewal_or_change

  - name: standard_work_deduction
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: USD
    source: DFCS TANF 1615 block 5
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ga/manual/dfcs/tanf/1615/block-5
              excerpt: "The standard work deduction of $250 is subtracted from the earned income of each employed individual."
          - path: versions[0].formula
            kind: import
            import:
              target: us-ga:policies/dfcs/tanf/1615/block-5#standard_work_deduction_amount
              output: standard_work_deduction_amount
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-ga:policies/dfcs/tanf/1615/block-5#earned_income_base_for_standard_work_deduction
              output: earned_income_base_for_standard_work_deduction
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-ga:policies/dfcs/tanf/1615/block-5#standard_work_deduction_eligible
              output: standard_work_deduction_eligible
              hash: sha256:local
    versions:
      - effective_from: '2019-12-01'
        formula: |-
          if standard_work_deduction_eligible: min(max(0, earned_income_base_for_standard_work_deduction), standard_work_deduction_amount) else: 0

  - name: earned_income_after_standard_work_deduction
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: USD
    source: DFCS TANF 1615 block 5
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ga/manual/dfcs/tanf/1615/block-5
              excerpt: "combine the income of both and then deduct the $250 from the total income"
          - path: versions[0].formula
            kind: import
            import:
              target: us-ga:policies/dfcs/tanf/1615/block-5#earned_income_base_for_standard_work_deduction
              output: earned_income_base_for_standard_work_deduction
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-ga:policies/dfcs/tanf/1615/block-5#standard_work_deduction
              output: standard_work_deduction
              hash: sha256:local
    versions:
      - effective_from: '2019-12-01'
        formula: |-
          max(0, earned_income_base_for_standard_work_deduction - standard_work_deduction)
