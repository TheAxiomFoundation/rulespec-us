          + (if or_pit_2026_is_married_filing_separately: or_pit_2026_table_index_one else: or_pit_2026_table_index_zero)
          + (if or_pit_2026_is_qualifying_surviving_spouse: or_pit_2026_table_index_one else: or_pit_2026_table_index_zero)

