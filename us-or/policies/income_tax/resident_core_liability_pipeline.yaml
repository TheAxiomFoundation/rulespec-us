          elif (
            or_pit_2026_is_married_filing_separately
            and or_pit_2026_spouse_itemizes
          ):
            0
          elif or_pit_2026_is_married_filing_jointly or or_pit_2026_is_qualifying_surviving_spouse:
            or_pit_2026_standard_deduction_joint_or_surviving
