  - name: or_pit_2026_profile_candidate_schedule_tax
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: ORS 316.037, 316.042, and 2026 Publication OR-ESTIMATE charts
    metadata: {proof: {atoms: [{path: 'versions[0].formula', kind: formula, source: {corpus_citation_path: us-or/statute/316.037, excerpt: "A tax is imposed for each taxable year on the entire taxable income of every resident"}}, {path: 'versions[0].formula', kind: condition, source: {corpus_citation_path: us-or/statute/316.042, excerpt: "tax imposed ... shall be twice the tax which would be imposed if the taxable income were cut in half"}}]}}
