    metadata: {private: true, proof: {atoms: [{path: 'versions[0].formula', kind: formula, source: {corpus_citation_path: us-or/form/individual-income-tax/2026/or-estimate/document-1, excerpt: "Chart S: Single or Married filing separately"}}, {path: 'versions[0].formula', kind: formula, source: {corpus_citation_path: us-or/form/individual-income-tax/2026/or-estimate/document-1, excerpt: "Chart J: Married filing jointly, Head of household, or Qualifying surviving spouse"}}]}}
