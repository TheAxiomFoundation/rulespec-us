            + max(0, or_pit_2026_nonqualified_oregon_529_previously_subtracted_principal)
            + max(0, or_pit_2026_nonqualified_able_previously_subtracted_principal)
            + max(0, or_pit_2026_federal_qualified_passenger_vehicle_loan_interest_deduction)
