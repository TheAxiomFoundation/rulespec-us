    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Supported Chapter 316 credits against tax otherwise due
    metadata: {proof: {atoms: [{path: 'versions[0].formula', kind: ordering, source: {corpus_citation_path: us-or/form/individual-income-tax/2026/or-estimate/document-1, excerpt: "Nonrefundable credits ... may reduce your tax liability to zero"}}]}}
