    source: ORS 316.695(3), restricted below every possible indexed phaseout floor
    metadata: {proof: {atoms: [{path: 'versions[0].formula', kind: condition, source: {corpus_citation_path: us-or/statute/316.695, excerpt: "$125,000, or, if reported on a joint return, less than $250,000"}}, {path: 'versions[0].formula', kind: condition, source: {corpus_citation_path: us-or/statute/316.695, excerpt: "limits applicable to a joint return shall apply to a head of household or a surviving spouse"}}]}}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          (
            (
