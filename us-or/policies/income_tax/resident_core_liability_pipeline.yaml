          )
          or (
            not or_pit_2026_is_married_filing_jointly
            and not or_pit_2026_is_head_of_household
            and not or_pit_2026_is_qualifying_surviving_spouse
            and or_pit_2026_federal_adjusted_gross_income < or_pit_2026_federal_tax_phaseout_single_floor
