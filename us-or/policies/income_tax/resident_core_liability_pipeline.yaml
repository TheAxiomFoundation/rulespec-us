  - name: or_pit_2026_profile_candidate_military_subtraction
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: ORS 316.792
    metadata: {proof: {atoms: [{path: 'versions[0].formula', kind: condition, source: {corpus_citation_path: us-or/statute/316.792, excerpt: "Service not otherwise qualified ... not to exceed $6,000 per year"}}, {path: 'versions[0].formula', kind: condition, source: {corpus_citation_path: us-or/statute/316.792, excerpt: "may not exceed the taxpayer’s total military pay included in federal taxable income"}}]}}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if or_pit_2026_bounded_profile_applies:
            (
              min(
                max(0, or_pit_2026_taxpayer_military_pay_in_federal_taxable_income),
                max(0, or_pit_2026_taxpayer_initial_discharge_out_of_state_military_pay)
                + max(0, or_pit_2026_taxpayer_persian_gulf_out_of_state_military_pay)
                + max(0, or_pit_2026_taxpayer_qualifying_reserve_component_military_pay)
                + max(0, or_pit_2026_taxpayer_oregon_national_guard_state_active_duty_pay)
                + min(
                  or_pit_2026_general_military_pay_cap,
                  max(0, or_pit_2026_taxpayer_other_military_pay)
                )
              )
              + (
                if or_pit_2026_is_married_filing_jointly:
                  min(
                    max(0, or_pit_2026_spouse_military_pay_in_federal_taxable_income),
                    max(0, or_pit_2026_spouse_initial_discharge_out_of_state_military_pay)
                    + max(0, or_pit_2026_spouse_persian_gulf_out_of_state_military_pay)
                    + max(0, or_pit_2026_spouse_qualifying_reserve_component_military_pay)
                    + max(0, or_pit_2026_spouse_oregon_national_guard_state_active_duty_pay)
                    + min(
                      or_pit_2026_general_military_pay_cap,
                      max(0, or_pit_2026_spouse_other_military_pay)
                    )
                  )
                else:
                  0
              )
            )
          else:
            0

  - name: or_pit_2026_profile_candidate_supported_subtractions
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Direct supported ORS 316 resident subtractions
    metadata:
      proof:
        atoms:
          - {path: 'versions[0].formula', kind: formula, source: {corpus_citation_path: us-or/statute/316.054, excerpt: "Social Security benefits ... included in gross income for federal income tax purposes"}}
          - {path: 'versions[0].formula', kind: formula, source: {corpus_citation_path: us-or/statute/316.056, excerpt: "interest or dividends on obligations of ... The State of Oregon ... [or] A public body"}}
          - {path: 'versions[0].formula', kind: formula, source: {corpus_citation_path: us-or/statute/316.680, excerpt: "interest or dividends on obligations of the United States"}}
          - {path: 'versions[0].formula', kind: formula, source: {corpus_citation_path: us-or/statute/316.777, excerpt: "income derived from sources within the boundaries of federally recognized Indian country"}}
          - {path: 'versions[0].formula', kind: formula, source: {corpus_citation_path: us-or/statute/316.812, excerpt: "traveling expenses ... incurred by a construction worker during the first year"}}
          - {path: 'versions[0].formula', kind: formula, source: {corpus_citation_path: us-or/statute/316.832, excerpt: "traveling expenses incurred by a logger in job-related travel"}}
          - {path: 'versions[0].formula', kind: formula, source: {corpus_citation_path: us-or/statute/316.846, excerpt: "scholarship ... used for housing expenses"}}
          - {path: 'versions[0].formula', kind: formula, source: {corpus_citation_path: us-or/statute/316.847, excerpt: "national service educational award"}}
          - {path: 'versions[0].formula', kind: formula, source: {corpus_citation_path: us-or/statute/316.848, excerpt: "taxpayer deposits to an individual development account"}}
          - {path: 'versions[0].formula', kind: formula, source: {corpus_citation_path: us-or/statute/316.698, excerpt: "labor rebate ... included in federal taxable income"}}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if or_pit_2026_bounded_profile_applies:
            max(0, or_pit_2026_social_security_benefits_in_federal_agi)
            + max(
              0,
              or_pit_2026_us_obligation_income_in_federal_agi
              - or_pit_2026_us_obligation_carrying_expenses
            )
            + max(
              0,
              or_pit_2026_oregon_public_obligation_income_in_federal_agi
              - or_pit_2026_oregon_public_obligation_carrying_expenses
            )
            + (
              if (
                or_pit_2026_is_enrolled_tribal_member
                and or_pit_2026_resided_in_oregon_indian_country_when_earned
              ):
                max(0, or_pit_2026_income_earned_in_oregon_indian_country)
              else:
                0
            )
            + max(0, or_pit_2026_qualified_529_withdrawals_in_federal_agi)
            + max(0, or_pit_2026_qualified_able_distributions_in_federal_agi)
            + max(0, or_pit_2026_authorized_marijuana_280e_disallowed_deductions)
            + max(0, or_pit_2026_authorized_psilocybin_280e_disallowed_deductions)
            + max(0, or_pit_2026_oregon_film_labor_rebate_received_and_included_in_federal_taxable_income)
            + max(0, or_pit_2026_first_year_construction_travel_expenses)
            + max(0, or_pit_2026_logger_job_travel_expenses)
            + max(0, or_pit_2026_scholarship_housing_award_in_federal_agi)
            + max(0, or_pit_2026_national_service_award_in_federal_agi)
            + max(0, or_pit_2026_individual_development_account_deposits)
            + max(0, or_pit_2026_taxable_approved_ida_withdrawals)
            + or_pit_2026_profile_candidate_military_subtraction
          else:
            0

