  - name: or_pit_2026_profile_candidate_personal_exemption_credit
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 2026 Publication OR-ESTIMATE personal exemption line and thresholds
    metadata: {proof: {atoms: [{path: 'versions[0].formula', kind: amount, source: {corpus_citation_path: us-or/form/individual-income-tax/2026/or-estimate/document-1, excerpt: "Personal exemption credit ($260 x number of exemptions"}}, {path: 'versions[0].formula', kind: condition, source: {corpus_citation_path: us-or/form/individual-income-tax/2026/or-estimate/document-1, excerpt: "exemption credit is $0 if your federal AGI is over $100,000"}}]}}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if (
            or_pit_2026_bounded_profile_applies
            and (
              (
                or_pit_2026_is_married_filing_jointly
                or or_pit_2026_is_head_of_household
                or or_pit_2026_is_qualifying_surviving_spouse
              )
              and or_pit_2026_federal_adjusted_gross_income <= or_pit_2026_personal_exemption_joint_agi_limit
              or (
                not or_pit_2026_is_married_filing_jointly
                and not or_pit_2026_is_head_of_household
                and not or_pit_2026_is_qualifying_surviving_spouse
                and or_pit_2026_federal_adjusted_gross_income <= or_pit_2026_personal_exemption_other_filer_agi_limit
              )
            )
          ):
            (
              or_pit_2026_table_index_one
              + (
                if (
                  or_pit_2026_is_married_filing_jointly
                  or (
                    or_pit_2026_is_married_filing_separately
                    and or_pit_2026_spouse_has_no_gross_income
                    and not or_pit_2026_spouse_is_dependent_of_another
                  )
                ):
                  or_pit_2026_table_index_one
                else:
                  or_pit_2026_table_index_zero
              )
            )
            * or_pit_2026_personal_exemption_credit_unit
          else:
            0

  - name: or_pit_2026_profile_candidate_additional_exemption_credits
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: ORS 316.758 and 316.765 severe-disability credits
    metadata: {proof: {atoms: [{path: 'versions[0].formula', kind: formula, source: {corpus_citation_path: us-or/statute/316.758, excerpt: "additional personal exemption credit for the taxpayer"}}, {path: 'versions[0].formula', kind: formula, source: {corpus_citation_path: us-or/statute/316.765, excerpt: "In the case of a joint return, each spouse who has a severe disability"}}]}}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if (
            or_pit_2026_bounded_profile_applies
            and or_pit_2026_federal_adjusted_gross_income <= or_pit_2026_additional_exemption_agi_limit
          ):
            (
              (if or_pit_2026_taxpayer_has_severe_disability: or_pit_2026_table_index_one else: or_pit_2026_table_index_zero)
              + (
                if (
                  or_pit_2026_spouse_has_severe_disability
                  and (
                    or_pit_2026_is_married_filing_jointly
                    or (
                      or_pit_2026_is_married_filing_separately
                      and or_pit_2026_spouse_has_no_gross_income
                      and not or_pit_2026_spouse_is_dependent_of_another
                    )
                  )
                ):
                  or_pit_2026_table_index_one
                else:
                  or_pit_2026_table_index_zero
              )
            )
            * or_pit_2026_personal_exemption_credit_unit
          else:
            0

  - name: or_pit_2026_profile_candidate_other_supported_nonrefundable_credits
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: ORS 316.102 political-contribution credit
    metadata: {proof: {atoms: [{path: 'versions[0].formula', kind: formula, source: {corpus_citation_path: us-or/statute/316.102, excerpt: "voluntary contributions in money"}}, {path: 'versions[0].formula', kind: condition, source: {corpus_citation_path: us-or/statute/316.102, excerpt: "federal adjusted gross income in excess of $150,000 on a joint return or $75,000"}}]}}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if or_pit_2026_bounded_profile_applies:
            (
              if (
                (
                  or_pit_2026_is_married_filing_jointly
                  and or_pit_2026_federal_adjusted_gross_income <= or_pit_2026_political_contribution_joint_agi_limit
                )
                or (
                  not or_pit_2026_is_married_filing_jointly
                  and or_pit_2026_federal_adjusted_gross_income <= or_pit_2026_political_contribution_single_agi_limit
                )
              ):
                min(
                  max(
                    0,
                    or_pit_2026_money_contributed_to_oregon_qualified_political_parties
                    + or_pit_2026_money_contributed_to_oregon_ballot_or_filed_candidates
                    + or_pit_2026_money_contributed_to_oregon_registered_political_committees
                  ),
                  (
                    if or_pit_2026_is_married_filing_jointly:
                      or_pit_2026_political_contribution_joint_cap
                    else:
                      or_pit_2026_political_contribution_single_cap
                  )
                )
              else:
                0
            )
          else:
            0

