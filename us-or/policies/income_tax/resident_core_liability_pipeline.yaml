  - name: or_pit_2026_schedule_selector
    kind: derived
    entity: TaxUnit
    dtype: Count
    period: Year
    source: 2026 Publication OR-ESTIMATE Chart S and J rows
    metadata: {private: true, proof: {atoms: [{path: 'versions[0].formula', kind: parameter_table, source: {corpus_citation_path: us-or/form/individual-income-tax/2026/or-estimate/document-1, excerpt: "Rate charts for estimating 2026 Oregon tax"}}]}}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if or_pit_2026_is_married_filing_jointly or or_pit_2026_is_head_of_household or or_pit_2026_is_qualifying_surviving_spouse:
            if or_pit_2026_profile_candidate_taxable_income <= or_pit_2026_chart_j_first_ceiling: or_pit_2026_table_index_four
            else: if or_pit_2026_profile_candidate_taxable_income <= or_pit_2026_chart_j_second_ceiling: or_pit_2026_table_index_five
            else: if or_pit_2026_profile_candidate_taxable_income <= or_pit_2026_chart_j_third_ceiling: or_pit_2026_table_index_six
            else: or_pit_2026_table_index_seven
          else:
            if or_pit_2026_profile_candidate_taxable_income <= or_pit_2026_chart_s_first_ceiling: or_pit_2026_table_index_zero
            else: if or_pit_2026_profile_candidate_taxable_income <= or_pit_2026_chart_s_second_ceiling: or_pit_2026_table_index_one
            else: if or_pit_2026_profile_candidate_taxable_income <= or_pit_2026_chart_s_third_ceiling: or_pit_2026_table_index_two
            else: or_pit_2026_table_index_three

