  - {name: or_pit_2026_is_nonresident_alien, entity: TaxUnit, dtype: Judgment, period: Year, description: Whether the taxpayer is a nonresident noncitizen whose deduction branch is held.}
  - {name: or_pit_2026_spouse_itemizes, entity: TaxUnit, dtype: Judgment, period: Year, description: For married-separate status, whether the spouse claims itemized deductions.}
  - {name: or_pit_2026_taxpayer_is_claimable_as_dependent, entity: TaxUnit, dtype: Judgment, period: Year, description: Whether another taxpayer may claim the individual for federal section 151 purposes.}
  - {name: or_pit_2026_federal_dependent_standard_deduction, entity: TaxUnit, dtype: Money, period: Year, unit: USD, description: Federal section 63(c)(5) dependent standard deduction, an allowed federal output.}
  - {name: or_pit_2026_taxpayer_age_at_year_end, entity: TaxUnit, dtype: Count, period: Year, description: Taxpayer age at the close of 2026.}
