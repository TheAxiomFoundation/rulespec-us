  - {name: or_pit_2026_oregon_income_tax_within_federal_itemized_deductions, entity: TaxUnit, dtype: Money, period: Year, unit: USD, description: Oregon income tax included in the federal itemized-deduction output.}
  - {name: or_pit_2026_accrued_federal_income_tax_excluding_eitc_and_self_employment_tax, entity: TaxUnit, dtype: Money, period: Year, unit: USD, description: Federal income tax accrued under ORS 316.685 after excluding EITC and self-employment tax.}
  - {name: or_pit_2026_refund_of_previously_deducted_federal_income_tax, entity: TaxUnit, dtype: Money, period: Year, unit: USD, description: Federal tax refund for which a prior Oregon tax benefit was received.}
  - {name: or_pit_2026_federally_exempt_non_oregon_bond_income, entity: TaxUnit, dtype: Money, period: Year, unit: USD, description: Federally exempt income on foreign-state or nonimmune federal territorial obligations.}
  - {name: or_pit_2026_non_oregon_bond_carrying_expenses, entity: TaxUnit, dtype: Money, period: Year, unit: USD, description: Carrying expenses attributable to federally exempt non-Oregon obligations.}
  - {name: or_pit_2026_federally_exempt_us_instrumentality_income_state_taxable, entity: TaxUnit, dtype: Money, period: Year, unit: USD, description: Federally exempt U.S. instrumentality income not immune from Oregon tax.}
