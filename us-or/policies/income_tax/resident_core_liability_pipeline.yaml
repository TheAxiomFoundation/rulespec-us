    period: Year
    indexed_by: or_pit_2026_schedule_selector
    source: 2026 Publication OR-ESTIMATE Chart S and J rates
    metadata: {private: true, proof: {atoms: [{path: 'versions[0].values', kind: parameter_table, source: {corpus_citation_path: us-or/form/individual-income-tax/2026/or-estimate/document-1, table: {header: "2026 Chart S and Chart J", row_key: bracket, column_key: marginal_rate}}}]}}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        values: {0: 0.0475, 1: 0.0675, 2: 0.0875, 3: 0.099, 4: 0.0475, 5: 0.0675, 6: 0.0875, 7: 0.099}

  - name: or_pit_2026_profile_candidate_schedule_tax
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: ORS 316.037, 316.042, and 2026 Publication OR-ESTIMATE charts
    metadata: {proof: {atoms: [{path: 'versions[0].formula', kind: formula, source: {corpus_citation_path: us-or/statute/316.037, excerpt: "A tax is imposed for each taxable year on the entire taxable income of every resident"}}, {path: 'versions[0].formula', kind: condition, source: {corpus_citation_path: us-or/statute/316.042, excerpt: "tax imposed ... shall be twice the tax which would be imposed if the taxable income were cut in half"}}]}}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if or_pit_2026_bounded_profile_applies:
            or_pit_2026_schedule_base[or_pit_2026_schedule_selector]
            + or_pit_2026_schedule_rate[or_pit_2026_schedule_selector]
            * (
              or_pit_2026_profile_candidate_taxable_income
              - or_pit_2026_schedule_floor[or_pit_2026_schedule_selector]
            )
          else:
            0

  - name: or_pit_2026_profile_candidate_personal_exemption_credit
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: ORS 316.085 and 2026 Publication OR-ESTIMATE
    metadata: {proof: {atoms: [{path: 'versions[0].formula', kind: amount, source: {corpus_citation_path: us-or/form/individual-income-tax/2026/or-estimate/document-1, excerpt: "Personal exemption credit ($260 x number of exemptions"}}, {path: 'versions[0].formula', kind: condition, source: {corpus_citation_path: us-or/statute/316.085, excerpt: "may not claim the credit if ... federal adjusted gross income exceeds $200,000 ... or $100,000"}}]}}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if (
            or_pit_2026_bounded_profile_applies
            and not or_pit_2026_taxpayer_exemption_credit_allowable_to_another
            and (
              (
                or_pit_2026_is_married_filing_jointly
                or or_pit_2026_is_head_of_household
                or or_pit_2026_is_qualifying_surviving_spouse
              )
              and or_pit_2026_federal_adjusted_gross_income <= or_pit_2026_personal_exemption_joint_agi_limit
              or (
                not or_pit_2026_is_married_filing_jointly
                and not or_pit_2026_is_head_of_household
                and not or_pit_2026_is_qualifying_surviving_spouse
                and or_pit_2026_federal_adjusted_gross_income <= or_pit_2026_personal_exemption_other_filer_agi_limit
              )
            )
          ):
            max(0, or_pit_2026_federal_section_151_personal_exemption_count)
            * or_pit_2026_personal_exemption_credit_unit
          else:
            0

  - name: or_pit_2026_profile_candidate_additional_exemption_credits
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: ORS 316.099, 316.758, and 316.765
    metadata: {proof: {atoms: [{path: 'versions[0].formula', kind: formula, source: {corpus_citation_path: us-or/statute/316.099, excerpt: "additional personal exemption credit for a child with a disability"}}, {path: 'versions[0].formula', kind: formula, source: {corpus_citation_path: us-or/statute/316.758, excerpt: "additional personal exemption credit for the taxpayer"}}, {path: 'versions[0].formula', kind: formula, source: {corpus_citation_path: us-or/statute/316.765, excerpt: "In the case of a joint return, each spouse who has a severe disability"}}]}}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if (
            or_pit_2026_bounded_profile_applies
            and or_pit_2026_federal_adjusted_gross_income <= or_pit_2026_additional_exemption_agi_limit
          ):
            (
              max(0, or_pit_2026_qualifying_children_with_disabilities)
              + (if or_pit_2026_taxpayer_has_severe_disability: or_pit_2026_table_index_one else: or_pit_2026_table_index_zero)
              + (
                if (
                  or_pit_2026_spouse_has_severe_disability
                  and (
                    or_pit_2026_is_married_filing_jointly
                    or (
                      or_pit_2026_is_married_filing_separately
                      and or_pit_2026_spouse_has_no_gross_income
                      and not or_pit_2026_spouse_is_dependent_of_another
                    )
                  )
                ):
                  or_pit_2026_table_index_one
                else:
                  or_pit_2026_table_index_zero
              )
            )
            * or_pit_2026_personal_exemption_credit_unit
          else:
            0

  - name: or_pit_2026_dependent_care_first_ceiling
    kind: parameter
    dtype: Money
    period: Year
    unit: USD
    source: ORS 316.078
    metadata: {private: true, proof: {atoms: [{path: 'versions[0].formula', kind: amount, source: {corpus_citation_path: us-or/statute/316.078, excerpt: "Not over $5,000 30%"}}]}}
    versions: [{effective_from: '2026-01-01', effective_to: '2026-12-31', formula: '5000'}]

  - name: or_pit_2026_dependent_care_second_ceiling
    kind: parameter
    dtype: Money
    period: Year
    unit: USD
    source: ORS 316.078
    metadata: {private: true, proof: {atoms: [{path: 'versions[0].formula', kind: amount, source: {corpus_citation_path: us-or/statute/316.078, excerpt: "over $5,000 but not over $10,000 15%"}}]}}
    versions: [{effective_from: '2026-01-01', effective_to: '2026-12-31', formula: '10000'}]

  - name: or_pit_2026_dependent_care_third_ceiling
    kind: parameter
    dtype: Money
    period: Year
    unit: USD
    source: ORS 316.078
    metadata: {private: true, proof: {atoms: [{path: 'versions[0].formula', kind: amount, source: {corpus_citation_path: us-or/statute/316.078, excerpt: "over $10,000 but not over $15,000 8%"}}]}}
    versions: [{effective_from: '2026-01-01', effective_to: '2026-12-31', formula: '15000'}]

  - name: or_pit_2026_dependent_care_fourth_ceiling
    kind: parameter
    dtype: Money
    period: Year
    unit: USD
    source: ORS 316.078
    metadata: {private: true, proof: {atoms: [{path: 'versions[0].formula', kind: amount, source: {corpus_citation_path: us-or/statute/316.078, excerpt: "over $15,000 but not over $25,000 6%"}}]}}
    versions: [{effective_from: '2026-01-01', effective_to: '2026-12-31', formula: '25000'}]

  - name: or_pit_2026_dependent_care_fifth_ceiling
    kind: parameter
    dtype: Money
    period: Year
    unit: USD
    source: ORS 316.078
    metadata: {private: true, proof: {atoms: [{path: 'versions[0].formula', kind: amount, source: {corpus_citation_path: us-or/statute/316.078, excerpt: "over $25,000 but not over $35,000 5%"}}]}}
    versions: [{effective_from: '2026-01-01', effective_to: '2026-12-31', formula: '35000'}]

  - name: or_pit_2026_dependent_care_sixth_ceiling
    kind: parameter
    dtype: Money
    period: Year
    unit: USD
    source: ORS 316.078
    metadata: {private: true, proof: {atoms: [{path: 'versions[0].formula', kind: amount, source: {corpus_citation_path: us-or/statute/316.078, excerpt: "over $35,000 but not over $45,000 4%"}}]}}
    versions: [{effective_from: '2026-01-01', effective_to: '2026-12-31', formula: '45000'}]

  - name: or_pit_2026_dependent_care_rate_selector
    kind: derived
    entity: TaxUnit
    dtype: Count
    period: Year
    source: ORS 316.078 federal-taxable-income percentage table
    metadata: {private: true, proof: {atoms: [{path: 'versions[0].formula', kind: parameter_table, source: {corpus_citation_path: us-or/statute/316.078, excerpt: "If federal taxable income is: The percentage is"}}]}}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if or_pit_2026_federal_taxable_income <= or_pit_2026_dependent_care_first_ceiling: or_pit_2026_table_index_zero
          else: if or_pit_2026_federal_taxable_income <= or_pit_2026_dependent_care_second_ceiling: or_pit_2026_table_index_one
          else: if or_pit_2026_federal_taxable_income <= or_pit_2026_dependent_care_third_ceiling: or_pit_2026_table_index_two
          else: if or_pit_2026_federal_taxable_income <= or_pit_2026_dependent_care_fourth_ceiling: or_pit_2026_table_index_three
          else: if or_pit_2026_federal_taxable_income <= or_pit_2026_dependent_care_fifth_ceiling: or_pit_2026_table_index_four
          else: if or_pit_2026_federal_taxable_income <= or_pit_2026_dependent_care_sixth_ceiling: or_pit_2026_table_index_five
          else: or_pit_2026_table_index_six

  - name: or_pit_2026_dependent_care_rate
    kind: parameter
    dtype: Rate
    period: Year
    indexed_by: or_pit_2026_dependent_care_rate_selector
    source: ORS 316.078(1)
    metadata: {private: true, proof: {atoms: [{path: 'versions[0].values', kind: parameter_table, source: {corpus_citation_path: us-or/statute/316.078, table: {header: "Federal taxable income / percentage", row_key: band, column_key: percentage}}}]}}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        values: {0: 0.30, 1: 0.15, 2: 0.08, 3: 0.06, 4: 0.05, 5: 0.04, 6: 0}

  - name: or_pit_2026_profile_candidate_dependent_care_credit
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: ORS 316.078
    metadata: {proof: {atoms: [{path: 'versions[0].formula', kind: formula, source: {corpus_citation_path: us-or/statute/316.078, excerpt: "percentage of employment-related expenses allowable pursuant to section 21"}}]}}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if or_pit_2026_bounded_profile_applies:
            or_pit_2026_dependent_care_rate[or_pit_2026_dependent_care_rate_selector]
            * max(0, or_pit_2026_federal_section_21_employment_related_expenses)
          else:
            0

  - name: or_pit_2026_profile_candidate_other_supported_nonrefundable_credits
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: ORS 316.079, 316.087, and 316.102
    metadata: {proof: {atoms: [{path: 'versions[0].formula', kind: formula, source: {corpus_citation_path: us-or/statute/316.079, excerpt: "permanent and complete loss of function of both legs or both arms or one leg and one arm"}}, {path: 'versions[0].formula', kind: formula, source: {corpus_citation_path: us-or/statute/316.087, excerpt: "40 percent of the credit"}}, {path: 'versions[0].formula', kind: condition, source: {corpus_citation_path: us-or/statute/316.102, excerpt: "federal adjusted gross income in excess of $150,000 on a joint return or $75,000"}}]}}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if or_pit_2026_bounded_profile_applies:
            (
              if or_pit_2026_has_certified_permanent_complete_limb_function_loss:
                or_pit_2026_disability_credit_amount
              else:
                0
            )
            + (
              or_pit_2026_elderly_disabled_credit_rate
              * max(0, or_pit_2026_federal_section_22_elderly_disabled_credit)
            )
            + (
              if (
                (
                  or_pit_2026_is_married_filing_jointly
                  and or_pit_2026_federal_adjusted_gross_income <= or_pit_2026_political_contribution_joint_agi_limit
                )
                or (
                  not or_pit_2026_is_married_filing_jointly
                  and or_pit_2026_federal_adjusted_gross_income <= or_pit_2026_political_contribution_single_agi_limit
                )
              ):
                min(
                  max(0, or_pit_2026_qualifying_political_contributions),
                  (
                    if or_pit_2026_is_married_filing_jointly:
                      or_pit_2026_political_contribution_joint_cap
                    else:
                      or_pit_2026_political_contribution_single_cap
                  )
                )
              else:
                0
            )
          else:
            0

  - name: or_pit_2026_profile_candidate_total_nonrefundable_credits
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Supported Chapter 316 credits against tax otherwise due
    metadata: {proof: {atoms: [{path: 'versions[0].formula', kind: ordering, source: {corpus_citation_path: us-or/form/individual-income-tax/2026/or-estimate/document-1, excerpt: "Nonrefundable credits ... may reduce your tax liability to zero"}}]}}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if or_pit_2026_bounded_profile_applies:
            or_pit_2026_profile_candidate_personal_exemption_credit
            + or_pit_2026_profile_candidate_additional_exemption_credits
            + or_pit_2026_profile_candidate_dependent_care_credit
            + or_pit_2026_profile_candidate_other_supported_nonrefundable_credits
          else:
            0

  - name: or_pit_2026_bounded_tax_after_nonrefundable_credits
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Publication OR-ESTIMATE nonrefundable-credit floor
    metadata: {proof: {atoms: [{path: 'versions[0].formula', kind: condition, source: {corpus_citation_path: us-or/form/individual-income-tax/2026/or-estimate/document-1, excerpt: "Nonrefundable credits ... may reduce your tax liability to zero"}}]}}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if or_pit_2026_bounded_profile_applies:
            max(
              0,
              or_pit_2026_profile_candidate_schedule_tax
              - or_pit_2026_profile_candidate_total_nonrefundable_credits
            )
          else:
            0

  - name: or_pit_2026_profile_candidate_refundable_earned_income_credit
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: ORS 315.266
    metadata: {proof: {atoms: [{path: 'versions[0].formula', kind: formula, source: {corpus_citation_path: us-or/statute/315.266, excerpt: "nine percent of the earned income credit"}}, {path: 'versions[0].formula', kind: exception, source: {corpus_citation_path: us-or/statute/315.266, excerpt: "dependent under the age of three ... 12 percent"}}, {path: 'versions[0].formula', kind: ordering, source: {corpus_citation_path: us-or/statute/315.266, excerpt: "amount of the excess shall be refunded"}}]}}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if or_pit_2026_bounded_profile_applies:
            max(0, or_pit_2026_federal_earned_income_credit)
            * (
              if or_pit_2026_has_dependent_under_age_three_at_year_end:
                or_pit_2026_earned_income_credit_young_dependent_rate
              else:
                or_pit_2026_earned_income_credit_base_rate
            )
          else:
            0

  - name: or_pit_2026_bounded_net_income_tax_liability_candidate
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Tax after supported nonrefundable credits and fully refundable Oregon EITC, before payments
    metadata: {proof: {atoms: [{path: 'versions[0].formula', kind: ordering, source: {corpus_citation_path: us-or/form/individual-income-tax/2026/or-estimate/document-1, excerpt: "Refundable credits may reduce your tax liability below zero"}}, {path: 'versions[0].formula', kind: ordering, source: {corpus_citation_path: us-or/statute/315.266, excerpt: "amount of the excess shall be refunded"}}]}}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if or_pit_2026_bounded_profile_applies:
            or_pit_2026_bounded_tax_after_nonrefundable_credits
            - or_pit_2026_profile_candidate_refundable_earned_income_credit
          else:
            0

inputs:
  - {name: or_pit_2026_federal_adjusted_gross_income, entity: TaxUnit, dtype: Money, period: Year, unit: USD, description: Federal adjusted gross income for tax year 2026.}
  - {name: or_pit_2026_federal_taxable_income, entity: TaxUnit, dtype: Money, period: Year, unit: USD, description: Federal taxable income used by the ORS 316.078 dependent-care percentage table.}
  - {name: or_pit_2026_federal_section_63_deduction_claimed, entity: TaxUnit, dtype: Money, period: Year, unit: USD, description: Federal itemized or standard deduction actually claimed under section 63, an allowed federal output that Oregon replaces under ORS 316.695.}
  - {name: or_pit_2026_is_full_year_resident, entity: TaxUnit, dtype: Judgment, period: Year, description: Whether the individual is an Oregon resident for all of 2026.}
