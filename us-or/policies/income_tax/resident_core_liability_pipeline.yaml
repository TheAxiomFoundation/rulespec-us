    metadata: {proof: {atoms: [{path: 'versions[0].formula', kind: condition, source: {corpus_citation_path: us-or/form/individual-income-tax/2026/or-estimate/document-1, excerpt: "Nonrefundable credits ... may reduce your tax liability to zero"}}]}}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if or_pit_2026_bounded_profile_applies:
            max(
              0,
              or_pit_2026_profile_candidate_schedule_tax
              - or_pit_2026_profile_candidate_total_nonrefundable_credits
            )
          else:
            0

  - name: or_pit_2026_profile_candidate_refundable_earned_income_credit
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Oregon Laws 2026, chapter 142, section 3 (SB 1507)
    metadata: {proof: {atoms: [{path: 'versions[0].formula', kind: formula, source: {corpus_citation_path: us-or/statute/session-laws/2026/sb1507/document-1, excerpt: "14 percent of the earned income credit allowable"}}, {path: 'versions[0].formula', kind: exception, source: {corpus_citation_path: us-or/statute/session-laws/2026/sb1507/document-1, excerpt: "dependent under the age of three ... 17 percent"}}, {path: 'versions[0].formula', kind: ordering, source: {corpus_citation_path: us-or/statute/session-laws/2026/sb1507/document-1, excerpt: "amount of the excess shall be refunded"}}]}}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if or_pit_2026_bounded_profile_applies:
            max(0, or_pit_2026_federal_earned_income_credit)
            * (
              if or_pit_2026_has_dependent_under_age_three_at_year_end:
                or_pit_2026_earned_income_credit_young_dependent_rate
              else:
                or_pit_2026_earned_income_credit_base_rate
            )
          else:
            0

  - name: or_pit_2026_bounded_net_income_tax_liability_candidate
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Tax after supported nonrefundable credits and fully refundable Oregon EITC, before payments
    metadata: {proof: {atoms: [{path: 'versions[0].formula', kind: ordering, source: {corpus_citation_path: us-or/form/individual-income-tax/2026/or-estimate/document-1, excerpt: "Refundable credits may reduce your tax liability below zero"}}, {path: 'versions[0].formula', kind: ordering, source: {corpus_citation_path: us-or/statute/session-laws/2026/sb1507/document-1, excerpt: "amount of the excess shall be refunded"}}]}}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if or_pit_2026_bounded_profile_applies:
            or_pit_2026_bounded_tax_after_nonrefundable_credits
            - or_pit_2026_profile_candidate_refundable_earned_income_credit
          else:
            0

