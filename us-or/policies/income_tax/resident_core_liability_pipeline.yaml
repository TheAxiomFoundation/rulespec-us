format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_paths:
      - us-or/form/individual-income-tax/2026/or-estimate/document-1
      - us-or/statute/session-laws/2026/sb1507/document-1
      - us-or/statute/session-laws/2026/hb4084/document-1
      - us-or/statute/session-laws/2026/sb1510/document-1
      - us-or/statute/316.037
      - us-or/statute/316.042
      - us-or/statute/316.048
      - us-or/statute/316.054
      - us-or/statute/316.056
      - us-or/statute/316.099
      - us-or/statute/316.102
      - us-or/statute/316.680
      - us-or/statute/316.685
      - us-or/statute/316.695
      - us-or/statute/316.698
      - us-or/statute/316.758
      - us-or/statute/316.765
      - us-or/statute/316.777
      - us-or/statute/316.792
      - us-or/statute/316.812
      - us-or/statute/316.821
      - us-or/statute/316.832
      - us-or/statute/316.837
      - us-or/statute/316.846
      - us-or/statute/316.847
      - us-or/statute/316.848
      - us-or/statute/316.853
      - us-or/statute/316.859
      - us-or/statute/316.861
    upstream_source_check:
      status: checked_higher_authority
      checked_paths:
        - us-or/form/individual-income-tax/2026/or-estimate/document-1
        - us-or/statute/chapter-316
        - us-or/statute/session-laws/2026/sb1507/document-1
        - us-or/statute/session-laws/2026/hb4084/document-1
        - us-or/statute/session-laws/2026/sb1510/document-1
      rationale: |-
        The pinned official 2025 Oregon Revised Statutes Chapter 316 snapshot
        supplies the resident base, modifications, deductions, ordinary and
        specialty rate authority, and the Chapter 316 credit inventory. The
        official chaptered 2026 SB 1507 supplies the operative passenger-
        vehicle-interest, qualified-small-business-stock, bonus-depreciation,
        earned-income-credit, and new-jobs provisions. Chaptered HB 4084
        supplies the final qualified-industry limits on the new-jobs credit.
        Chaptered SB 1510 extends the elective pass-through-entity tax and
        member credit through tax years beginning before 2028. The official
        2026 Publication OR-ESTIMATE supplies the Department of Revenue's
        estimated 2026 indexed standard deductions, $8,750 federal-tax
        subtraction ceiling, $260 exemption-credit unit, and Chart S/J rates.

        Chapters 314 and 315 are not present as complete chapters in the pinned
        corpus. It also
        lacks the Oregon constitutional and ORS chapter 291 surplus-kicker
        authority, the final 2026 Form OR-40 and instructions, the 2026
        federal-tax-subtraction phaseout thresholds, and operative specialty
        forms. Consequently this module is a maximum bounded core and does not
        claim the campaign final output.

        The bounded profile is restricted below the unindexed statutory
        federal-tax-subtraction phaseout floor, where annual indexing cannot
        reduce the ceiling. Every other Chapter 314/315 credit, kicker,
        specialty-rate, recapture, carryforward, and complex modification
        branch is an explicit raw-activity hold. The 2026 session-law
        modifications are either directly encoded from federal amount inputs
        or separately held when their certification, carryover, or entity-level
        surfaces are not source-complete. No caller supplies completed Oregon
        income, taxable income, deduction, credit, rate, tax, or liability.
  summary: |-
    Tax-year-2026 Oregon full-year-resident individual-income-tax bounded core.
    For the explicit no-held-branch profile, it starts with federal taxable
    income, adds back the federal section 63 deduction, computes supported
    Chapter 316 additions and subtractions from raw federal and transaction
    facts, substitutes the larger supported Oregon standard or itemized
    deduction, applies the source-safe federal-income-tax subtraction, and
    derives an Oregon taxable-income candidate.

    It then applies the official 2026 Chart S or Chart J schedule selected from
    filing status. Supported nonrefundable credits include directly sourced
    personal, severe-disability, and political-contribution surfaces. SB 1507
    supplies a 14-percent or 17-percent fully refundable Oregon EITC, so the
    bounded net candidate may be negative. Credits under ORS 316.078, 316.079,
    and 316.087 are excluded because their statutory notes prohibit claims for
    tax years beginning on or after January 1, 2016.

    The candidate is not a complete annual resident liability. The absent
    Chapter 314/315 inventory, surplus kicker, final-return credit ordering,
    indexed high-income federal-tax phaseout thresholds, qualified-business,
    farm-gain and income-averaging taxes, SB 1507/HB 4084 new-jobs
    certification and statewide allocation, SB 1510 pass-through-entity
    member-credit surfaces, and other expressly listed branches remain typed
    holds.
  deferred_outputs:
    - output: us-or:policies/income_tax/resident_core_liability_pipeline#or_pit_2026_complete_oregon_income
      reason: |-
        ORS 316.028-.031, .047, .159, the unencoded pension, Roth,
        memorial-fund, and cross-title branches of .680, .681-.683, .687, .690,
        .697, .699, .707-.749, .778, .797-.801, .836, .838, .844,
        .850, .856, .866 and .867, plus cross-title Chapter 314 and
        Chapter 315 modifications, and the SB 1510 elective pass-through-entity
        member-credit/addback surface are held whenever applicable. The bounded
        core directly supports the simpler listed Chapter 316 and SB 1507
        modifications.
      source_values:
        - us-or:policies/income_tax/resident_core_liability_pipeline#or_pit_2026_bounded_profile_applies
        - us-or:policies/income_tax/resident_core_liability_pipeline#or_pit_2026_profile_candidate_oregon_income_before_deductions
    - output: us-or:policies/income_tax/resident_core_liability_pipeline#or_pit_2026_complete_oregon_taxable_income
      reason: |-
        Publication OR-ESTIMATE labels its indexed values as estimates, the
        final 2026 resident-return instructions are absent, and the 2026
        indexed federal-tax-subtraction phaseout thresholds are absent. The
        bounded profile therefore supports only federal AGI below the
        unindexed statutory phaseout floor.
      source_values:
        - us-or:policies/income_tax/resident_core_liability_pipeline#or_pit_2026_profile_candidate_taxable_income
    - output: us-or:policies/income_tax/resident_core_liability_pipeline#or_pit_2026_complete_tax_before_credits
      reason: |-
        ORS 316.043 qualified-business rates, ORS 316.045 farm-gain rates,
        farm-income averaging, and separate taxes or recaptures require
        specialty forms or cross-title sources absent from the pinned corpus.
      source_values:
        - us-or:policies/income_tax/resident_core_liability_pipeline#or_pit_2026_profile_candidate_schedule_tax
    - output: us-or:policies/income_tax/resident_core_liability_pipeline#or_pit_2026_complete_tax_after_nonrefundable_credits
      reason: |-
        The complete Chapter 315 credit inventory and final 2026 return
        ordering are absent. The SB 1507/HB 4084 new-jobs credit additionally
        depends on certification, statewide allocation, and carryforward
        facts. Supported credits are applied only when every held credit,
        carryforward, and other-state-credit branch is explicitly absent.
      source_values:
        - us-or:policies/income_tax/resident_core_liability_pipeline#or_pit_2026_bounded_tax_after_nonrefundable_credits
    - output: us-or:policies/income_tax/resident_core_liability_pipeline#or_pit_2026_net_income_tax_liability
      reason: |-
        Oregon's surplus kicker, remaining refundable Chapter 315 credits, and
        final-return ordering are not present in the pinned official corpus.
        The bounded net candidate is not exposed as campaign final liability.
      source_values:
        - us-or:policies/income_tax/resident_core_liability_pipeline#or_pit_2026_bounded_net_income_tax_liability_candidate

