  - name: or_pit_2026_profile_candidate_additional_standard_deduction
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: ORS 316.695(7), age and blindness additions
    metadata: {proof: {atoms: [{path: 'versions[0].formula', kind: condition, source: {corpus_citation_path: us-or/statute/316.695, excerpt: "attained age 65 before the close of the taxpayer’s tax year"}}, {path: 'versions[0].formula', kind: condition, source: {corpus_citation_path: us-or/statute/316.695, excerpt: "blind at the close of the tax year"}}]}}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if not or_pit_2026_bounded_profile_applies:
            0
          else:
            (
              (if or_pit_2026_taxpayer_age_at_year_end >= or_pit_2026_age_for_additional_standard_deduction: or_pit_2026_table_index_one else: or_pit_2026_table_index_zero)
              + (if or_pit_2026_taxpayer_is_blind_at_year_end: or_pit_2026_table_index_one else: or_pit_2026_table_index_zero)
            )
            * (
              if or_pit_2026_is_single or or_pit_2026_is_head_of_household:
                or_pit_2026_additional_standard_unmarried_unit
              else:
                or_pit_2026_additional_standard_joint_unit
            )
            + (
              if (
                or_pit_2026_is_married_filing_jointly
                and or_pit_2026_spouse_qualifies_for_additional_standard_deduction
              ):
                (
                  (if or_pit_2026_spouse_age_at_year_end >= or_pit_2026_age_for_additional_standard_deduction: or_pit_2026_table_index_one else: or_pit_2026_table_index_zero)
                  + (if or_pit_2026_spouse_is_blind_at_year_end: or_pit_2026_table_index_one else: or_pit_2026_table_index_zero)
                )
                * or_pit_2026_additional_standard_joint_unit
              else:
