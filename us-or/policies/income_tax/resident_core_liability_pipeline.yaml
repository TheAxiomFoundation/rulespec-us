    period: Year
    unit: USD
    indexed_by: or_pit_2026_schedule_selector
    source: 2026 Publication OR-ESTIMATE Chart S and J floors
    metadata: {private: true, proof: {atoms: [{path: 'versions[0].values', kind: parameter_table, source: {corpus_citation_path: us-or/form/individual-income-tax/2026/or-estimate/document-1, table: {header: "2026 Chart S and Chart J", row_key: bracket, column_key: excess_floor}}}]}}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        values: {0: 0, 1: 4550, 2: 11400, 3: 125000, 4: 0, 5: 9100, 6: 22800, 7: 250000}

  - name: or_pit_2026_schedule_base
    kind: parameter
    dtype: Money
    period: Year
    unit: USD
    indexed_by: or_pit_2026_schedule_selector
    source: 2026 Publication OR-ESTIMATE Chart S and J bases
    metadata: {private: true, proof: {atoms: [{path: 'versions[0].values', kind: parameter_table, source: {corpus_citation_path: us-or/form/individual-income-tax/2026/or-estimate/document-1, table: {header: "2026 Chart S and Chart J", row_key: bracket, column_key: base_tax}}}]}}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
