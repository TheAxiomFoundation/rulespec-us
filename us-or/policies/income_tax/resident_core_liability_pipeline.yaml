    metadata: {proof: {atoms: [{path: 'versions[0].formula', kind: parameter_table, source: {corpus_citation_path: us-or/form/individual-income-tax/2026/or-estimate/document-1, excerpt: "Standard deduction: Single or married filing separately: $2,900. Head of household: $4,650. Married filing jointly or Qualifying surviving spouse: $5,800"}}]}}
    versions:
