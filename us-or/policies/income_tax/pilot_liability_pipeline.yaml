format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_paths:
      - us-or/statute/316.037
      - us-or/form/individual-income-tax/2026/or-estimate/document-1
    upstream_source_check:
      status: official_parameter_source
      checked_paths:
        - us-or/statute/316.037
        - us-or/form/individual-income-tax/2026/or-estimate/document-1
      rationale: |-
        ORS 316.037(1)(a) imposes tax on resident taxable income and subsection
        (1)(b) directs the Department of Revenue to publish an annually indexed
        replacement table while retaining the statutory rates. The official
        tax-year-2026 Publication OR-ESTIMATE supplies that replacement schedule
        on page 3. Chart S applies to single and married-separate returns; Chart J
        applies to joint returns, heads of household, and qualifying surviving
        spouses. Each row expressly supplies its upper bound, base amount, rate,
        and excess-income floor, so this module applies those printed values
        directly to caller-supplied completed Oregon taxable income.

        The source does not complete federal-to-Oregon taxable-income
        construction, credits, part-year apportionment, qualified-business-income
        rates, farm capital-gain rates, farm income averaging, or a final-return
        rounding convention. Those matters remain outside this narrow schedule
        module. Its decimal output preserves the exact arithmetic specified by
        the printed chart and fails closed outside tax year 2026.
  summary: |-
    Oregon tax-year-2026 ordinary personal-income-tax schedule amount under
    ORS 316.037 and Publication OR-ESTIMATE. The caller supplies completed
    Oregon taxable income and whether Chart J applies. The module floors
    nonpositive taxable income at zero and applies every printed Chart S or
    Chart J base-plus-excess row exactly. It stops before credits and all other
    final-return adjustments and makes no PolicyEngine-parity claim.
  deferred_outputs:
    - output: us-or:policies/income_tax/pilot_liability_pipeline#oregon_taxable_income_construction
      reason: |-
        OR-ESTIMATE describes Oregon taxable income as federal taxable income
        with Oregon additions, subtractions, and modifications, but it does not
        contain the complete operative rules needed to calculate those amounts.
        This module therefore accepts completed Oregon taxable income as an
        upstream boundary.
    - output: us-or:policies/income_tax/pilot_liability_pipeline#special_rate_and_final_return_adjustments
      reason: |-
        The publication directs taxpayers using the reduced qualified-business-
        income rate, farm capital-gain rate, or farm income averaging to retain
        their separate calculations. It also does not establish a final-return
        rounding convention. Those computations, credits, and part-year
        apportionment are not encoded here.
rules:
  - name: or_pit_pilot_taxable_income
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: ORS 316.037 and 2026 Publication OR-ESTIMATE, supplied completed Oregon taxable income
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-or/statute/316.037
              excerpt: "A tax is imposed for each taxable year on the entire taxable income of every resident of this state."
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-or/form/individual-income-tax/2026/or-estimate/document-1
              excerpt: "2026 Publication OR-ESTIMATE"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: max(0, or_pit_pilot_state_taxable_income)

  - name: or_pit_pilot_chart_s_first_upper_bound
    kind: parameter
    dtype: Money
    unit: USD
    source: 2026 Publication OR-ESTIMATE Chart S first upper bound
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-or/form/individual-income-tax/2026/or-estimate/document-1
              excerpt: "Not over $4,550"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: '4550'

  - name: or_pit_pilot_chart_s_second_upper_bound
    kind: parameter
    dtype: Money
    unit: USD
    source: 2026 Publication OR-ESTIMATE Chart S second upper bound
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-or/form/individual-income-tax/2026/or-estimate/document-1
              excerpt: "Over $4,550 but not over $11,400"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: '11400'

  - name: or_pit_pilot_chart_s_third_upper_bound
    kind: parameter
    dtype: Money
    unit: USD
    source: 2026 Publication OR-ESTIMATE Chart S third upper bound
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-or/form/individual-income-tax/2026/or-estimate/document-1
              excerpt: "Over $11,400 but not over $125,000"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: '125000'

  - name: or_pit_pilot_chart_j_first_upper_bound
    kind: parameter
    dtype: Money
    unit: USD
    source: 2026 Publication OR-ESTIMATE Chart J first upper bound
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-or/form/individual-income-tax/2026/or-estimate/document-1
              excerpt: "Not over $9,100"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: '9100'

  - name: or_pit_pilot_chart_j_second_upper_bound
    kind: parameter
    dtype: Money
    unit: USD
    source: 2026 Publication OR-ESTIMATE Chart J second upper bound
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-or/form/individual-income-tax/2026/or-estimate/document-1
              excerpt: "Over $9,100 but not over $22,800"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: '22800'

  - name: or_pit_pilot_chart_j_third_upper_bound
    kind: parameter
    dtype: Money
    unit: USD
    source: 2026 Publication OR-ESTIMATE Chart J third upper bound
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-or/form/individual-income-tax/2026/or-estimate/document-1
              excerpt: "Over $22,800 but not over $250,000"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: '250000'

  - name: or_pit_pilot_bracket_selector
    kind: derived
    entity: TaxUnit
    dtype: Integer
    period: Year
    source: 2026 Publication OR-ESTIMATE Chart S and Chart J row selection
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-or/form/individual-income-tax/2026/or-estimate/document-1
              excerpt: "Chart S: Single or Married filing separately"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-or/form/individual-income-tax/2026/or-estimate/document-1
              excerpt: "Chart J: Married filing jointly, Head of household, or Qualifying surviving spouse"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if or_pit_pilot_uses_chart_j:
              if or_pit_pilot_taxable_income <= or_pit_pilot_chart_j_first_upper_bound: 4
              else: if or_pit_pilot_taxable_income <= or_pit_pilot_chart_j_second_upper_bound: 5
              else: if or_pit_pilot_taxable_income <= or_pit_pilot_chart_j_third_upper_bound: 6
              else: 7
          else:
              if or_pit_pilot_taxable_income <= or_pit_pilot_chart_s_first_upper_bound: 0
              else: if or_pit_pilot_taxable_income <= or_pit_pilot_chart_s_second_upper_bound: 1
              else: if or_pit_pilot_taxable_income <= or_pit_pilot_chart_s_third_upper_bound: 2
              else: 3

  - name: or_pit_pilot_bracket_floor
    kind: parameter
    dtype: Money
    unit: USD
    indexed_by: or_pit_pilot_bracket_selector
    source: 2026 Publication OR-ESTIMATE Chart S and Chart J excess-income floors
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].values
            kind: parameter_table
            source:
              corpus_citation_path: us-or/form/individual-income-tax/2026/or-estimate/document-1
              table: {header: "2026 Chart S and Chart J", row_key: bracket, column_key: excess_floor}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        values: {0: 0, 1: 4550, 2: 11400, 3: 125000, 4: 0, 5: 9100, 6: 22800, 7: 250000}

  - name: or_pit_pilot_bracket_base
    kind: parameter
    dtype: Money
    unit: USD
    indexed_by: or_pit_pilot_bracket_selector
    source: 2026 Publication OR-ESTIMATE Chart S and Chart J printed base amounts
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].values
            kind: parameter_table
            source:
              corpus_citation_path: us-or/form/individual-income-tax/2026/or-estimate/document-1
              table: {header: "2026 Chart S and Chart J", row_key: bracket, column_key: base_tax}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        values: {0: 0, 1: 216, 2: 678, 3: 10618, 4: 0, 5: 432, 6: 1357, 7: 21237}

  - name: or_pit_pilot_bracket_rate
    kind: parameter
    dtype: Rate
    indexed_by: or_pit_pilot_bracket_selector
    source: 2026 Publication OR-ESTIMATE Chart S and Chart J marginal rates
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].values
            kind: parameter_table
            source:
              corpus_citation_path: us-or/form/individual-income-tax/2026/or-estimate/document-1
              table: {header: "2026 Chart S and Chart J", row_key: bracket, column_key: marginal_rate}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        values: {0: 0.0475, 1: 0.0675, 2: 0.0875, 3: 0.099, 4: 0.0475, 5: 0.0675, 6: 0.0875, 7: 0.099}

  - name: or_pit_pilot_schedule_tax
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 2026 Publication OR-ESTIMATE page 3, Chart S and Chart J ordinary tax-rate schedules
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-or/statute/316.037
              excerpt: "The amount of the tax shall be determined in accordance with the following table"
          - path: versions[0].formula
            kind: import
            import:
              target: us-or:policies/income_tax/pilot_liability_pipeline#or_pit_pilot_bracket_floor
              output: or_pit_pilot_bracket_floor
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-or:policies/income_tax/pilot_liability_pipeline#or_pit_pilot_bracket_base
              output: or_pit_pilot_bracket_base
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-or:policies/income_tax/pilot_liability_pipeline#or_pit_pilot_bracket_rate
              output: or_pit_pilot_bracket_rate
              hash: sha256:local
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-or/form/individual-income-tax/2026/or-estimate/document-1
              excerpt: "Rate charts for estimating 2026 Oregon tax"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          or_pit_pilot_bracket_base[or_pit_pilot_bracket_selector]
          + or_pit_pilot_bracket_rate[or_pit_pilot_bracket_selector]
          * max(0, or_pit_pilot_taxable_income - or_pit_pilot_bracket_floor[or_pit_pilot_bracket_selector])

  - name: or_pit_pilot_income_tax_liability
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 2026 Publication OR-ESTIMATE ordinary schedule amount before credits and other final-return adjustments
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-or/form/individual-income-tax/2026/or-estimate/document-1
              excerpt: "Use the tax rate chart for your filing status on page 3 to figure the tax on the amount on line 13."
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: or_pit_pilot_schedule_tax
inputs:
  - name: or_pit_pilot_state_taxable_income
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    description: Completed Oregon taxable income supplied by the caller after all upstream additions, subtractions, modifications, and deductions.
  - name: or_pit_pilot_uses_chart_j
    entity: TaxUnit
    dtype: Bool
    period: Year
    description: True for married filing jointly, head of household, or qualifying surviving spouse; false for single or married filing separately.
