              corpus_citation_path: us-ny/policy/otda/tanf-state-plan-2024-2026/standard-of-need-and-monthly-grant
              excerpt: "must provide a monthly allowance for rent in the amount actually paid, for cases with a verified rental obligation"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if household_has_verified_rental_obligation: min(monthly_rent_amount_actually_paid, monthly_shelter_allowance_with_children_maximum[min(family_size, 8)]) else: 0
