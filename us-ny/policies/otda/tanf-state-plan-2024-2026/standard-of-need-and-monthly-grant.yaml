format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ny/policy/otda/tanf-state-plan-2024-2026/standard-of-need-and-monthly-grant
  summary: |-
    The statewide monthly need schedule effective October 1, 2012 lists regular recurring monthly needs, exclusive of shelter and home energy items, as $158, $252, $336, $433, $534, $617, and $85 for each additional person. Monthly grants and allowances use the same SA-2a amounts, plus SA-2b home energy payments and SA-2c supplemental home energy payments. Rent allowances are the verified amount actually paid, up to listed local maximum monthly shelter allowances.
rules:
  - name: household_size_threshold_for_each_additional_person
    kind: parameter
    dtype: Count
    source: us-ny/policy/otda/tanf-state-plan-2024-2026/standard-of-need-and-monthly-grant(g)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ny/policy/otda/tanf-state-plan-2024-2026/standard-of-need-and-monthly-grant
              excerpt: "Number of persons in household One Two Three Four Five Six Each Additional Person"
    versions:
      - effective_from: '2012-10-01'
        formula: |-
          6

  - name: regular_recurring_monthly_need_schedule
    kind: parameter
    dtype: Money
    unit: USD
    indexed_by: household_size
    source: us-ny/policy/otda/tanf-state-plan-2024-2026/standard-of-need-and-monthly-grant(g)
    metadata:
      proof:
        atoms:
          - path: versions[0].values
            kind: parameter_table
            source:
              corpus_citation_path: us-ny/policy/otda/tanf-state-plan-2024-2026/standard-of-need-and-monthly-grant
              excerpt: "EFFECTIVE October 1, 2012 ... One Two Three Four Five Six Each Additional Person $158 $252 $336 $433 $534 $617 $85"
              table:
                header: "SCHEDULE SA-1 - STATEWIDE STANDARD OF NEED"
                row_key: "number_of_persons_in_household"
                column_key: "regular_recurring_monthly_needs"
    versions:
      - effective_from: '2012-10-01'
        values:
          1: 158
          2: 252
          3: 336
          4: 433
          5: 534
          6: 617

  - name: regular_recurring_monthly_need_each_additional_person
    kind: parameter
    dtype: Money
    unit: USD
    source: us-ny/policy/otda/tanf-state-plan-2024-2026/standard-of-need-and-monthly-grant(g)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ny/policy/otda/tanf-state-plan-2024-2026/standard-of-need-and-monthly-grant
              excerpt: "Each Additional Person $85"
    versions:
      - effective_from: '2012-10-01'
        formula: |-
          85

  - name: regular_recurring_monthly_need
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: us-ny/policy/otda/tanf-state-plan-2024-2026/standard-of-need-and-monthly-grant(g)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ny/policy/otda/tanf-state-plan-2024-2026/standard-of-need-and-monthly-grant
              excerpt: "regular recurring monthly needs, exclusive of shelter, fuel for heating, home energy payments and supplemental home energy payments, in accordance with the following schedule"
    versions:
      - effective_from: '2012-10-01'
        formula: |-
          if number_of_persons_in_household <= household_size_threshold_for_each_additional_person: regular_recurring_monthly_need_schedule[number_of_persons_in_household] else: regular_recurring_monthly_need_schedule[household_size_threshold_for_each_additional_person] + ((number_of_persons_in_household - household_size_threshold_for_each_additional_person) * regular_recurring_monthly_need_each_additional_person)

