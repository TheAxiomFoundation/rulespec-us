            source:
              corpus_citation_path: us-ny/policy/otda/tanf-state-plan-2024-2026/financial-eligibility-and-income-disregards
              excerpt: "second instance, until failure to participate ceases, or 120 days"
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          120

  - name: treatment_third_or_subsequent_instance_disqualification_days
    kind: parameter
    dtype: Count
    period: Day
    source: TANF State Plan 2024-2026, financial eligibility and income disregards, paragraph 8(iii)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ny/policy/otda/tanf-state-plan-2024-2026/financial-eligibility-and-income-disregards
              excerpt: "third and subsequence instances, until failure to participate ceases or 180 days"
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          180

  - name: application_resource_limit
    kind: derived
    entity: TanfUnit
    dtype: Money
    unit: USD
    period: Month
    source: TANF State Plan 2024-2026, financial eligibility and income disregards, paragraph 10
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ny/policy/otda/tanf-state-plan-2024-2026/financial-eligibility-and-income-disregards
              excerpt: "$2,500 except for households in which any member is age 60 or over or is disabled in which case $3,750"
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          if unit_has_member_age_sixty_or_over or unit_has_disabled_member: application_asset_limit_with_aged_or_disabled_member else: application_asset_limit

  - name: recipient_resource_limit
    kind: derived
    entity: TanfUnit
    dtype: Money
    unit: USD
    period: Month
    source: TANF State Plan 2024-2026, financial eligibility and income disregards, paragraph 10
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ny/policy/otda/tanf-state-plan-2024-2026/financial-eligibility-and-income-disregards
              excerpt: "PA recipients may own assets totaling up to $10,000, regardless of age or disability status"
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          recipient_asset_limit

  - name: asset_amount_exempt_from_resource_test
    kind: derived
    entity: Asset
    dtype: Money
    unit: USD
    period: Month
    source: TANF State Plan 2024-2026, financial eligibility and income disregards, paragraph 10(i)-(xiii)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ny/policy/otda/tanf-state-plan-2024-2026/financial-eligibility-and-income-disregards
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          if asset_is_usual_residence_home: asset_value else: if asset_is_one_exempt_automobile: min(asset_fair_market_value, automobile_fair_market_value_exemption_limit) else: if asset_is_basic_maintenance_item_essential_to_day_to_day_living: asset_value else: if asset_is_one_burial_plot_for_household_member: asset_value else: if asset_is_one_bona_fide_funeral_agreement_for_household_member: min(asset_equity_value, funeral_agreement_equity_exemption_limit) else: if asset_is_real_property_under_six_month_good_faith_sale_agreement: asset_value else: if asset_is_tangible_personal_property_necessary_for_business_or_employment: asset_value else: if asset_is_funds_in_individual_development_account: asset_value else: if asset_is_earned_income_tax_credit: asset_value else: if asset_is_recipient_vehicle_purchase_account_and_funds_not_misused: min(asset_value, recipient_vehicle_purchase_account_exemption_limit) else: if asset_is_recipient_tuition_account_and_funds_not_misused: min(asset_value, recipient_tuition_account_exemption_limit) else: if asset_is_funds_in_qualified_tuition_program: asset_value else: if asset_is_funds_in_new_york_able_account: asset_value else: 0

  - name: countable_asset_amount
    kind: derived
    entity: Asset
    dtype: Money
    unit: USD
    period: Month
    source: TANF State Plan 2024-2026, financial eligibility and income disregards, paragraph 10(i)-(xiii)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ny/policy/otda/tanf-state-plan-2024-2026/financial-eligibility-and-income-disregards
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          max(0, asset_value - asset_amount_exempt_from_resource_test)

  - name: earned_income_disregard_applies_in_application_month
    kind: derived
    entity: TanfUnit
    dtype: Judgment
    period: Month
    source: TANF State Plan 2024-2026, financial eligibility and income disregards, paragraph 11
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ny/policy/otda/tanf-state-plan-2024-2026/financial-eligibility-and-income-disregards
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          working_applicant_received_public_assistance_in_one_of_previous_four_months
          or working_applicant_eligible_for_public_assistance_without_earned_income_disregard

  - name: regular_earned_income_disregarded_amount
    kind: derived
    entity: TanfUnit
    dtype: Money
    unit: USD
    period: Month
    source: TANF State Plan 2024-2026, financial eligibility and income disregards, paragraph 11
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ny/policy/otda/tanf-state-plan-2024-2026/financial-eligibility-and-income-disregards
              excerpt: "The EID, if applicable, is applied ... and then the $150 work disregard is applied"
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          if gross_earned_and_unearned_income_is_below_poverty_level and earned_income_disregard_applies_in_application_month: min(earned_income, (earned_income * earned_income_disregard_rate) + work_disregard_amount) else: 0

  - name: assistance_amount_after_income_disregards
    kind: derived
    entity: TanfUnit
    dtype: Money
    unit: USD
    period: Month
    source: TANF State Plan 2024-2026, financial eligibility and income disregards, paragraph 11
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ny/policy/otda/tanf-state-plan-2024-2026/financial-eligibility-and-income-disregards
              excerpt: "The amount of assistance is the standard of need less any income which is not disregarded"
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          max(0, standard_of_need - max(0, earned_income + unearned_income - regular_earned_income_disregarded_amount))

  - name: unsubsidized_employment_full_earned_income_disregard_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: TANF State Plan 2024-2026, financial eligibility and income disregards, paragraph 12
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ny/policy/otda/tanf-state-plan-2024-2026/financial-eligibility-and-income-disregards
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          person_is_tanf_recipient
          and person_entered_unsubsidized_employment
          and months_since_job_entry <= unsubsidized_employment_disregard_month_limit
          and resulting_total_income <= expanded_earned_income_disregard_fpl_limit_ratio * federal_poverty_level
          and not person_has_previously_used_lifetime_unsubsidized_employment_disregard

  - name: unsubsidized_employment_earned_income_disregarded_amount
    kind: derived
    entity: Person
    dtype: Money
    unit: USD
    period: Month
    source: TANF State Plan 2024-2026, financial eligibility and income disregards, paragraph 12
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ny/policy/otda/tanf-state-plan-2024-2026/financial-eligibility-and-income-disregards
              excerpt: "100% of their earned income disregarded"
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          if unsubsidized_employment_full_earned_income_disregard_applies: earned_income * unsubsidized_employment_disregard_rate else: 0

  - name: qualified_work_activity_earned_income_disregard_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: TANF State Plan 2024-2026, financial eligibility and income disregards, paragraph 13
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ny/policy/otda/tanf-state-plan-2024-2026/financial-eligibility-and-income-disregards
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          person_is_tanf_recipient
          and earned_income_is_from_otda_qualified_work_activity_or_training_program
          and resulting_total_income <= expanded_earned_income_disregard_fpl_limit_ratio * federal_poverty_level

  - name: qualified_work_activity_earned_income_disregarded_amount
    kind: derived
    entity: Person
    dtype: Money
    unit: USD
    period: Month
    source: TANF State Plan 2024-2026, financial eligibility and income disregards, paragraph 13
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ny/policy/otda/tanf-state-plan-2024-2026/financial-eligibility-and-income-disregards
              excerpt: "all of the earned income ... is exempt and must be disregarded"
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          if qualified_work_activity_earned_income_disregard_applies: earned_income else: 0

  - name: person_ineligible_for_public_assistance_for_failing_screening_or_assessment
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: TANF State Plan 2024-2026, financial eligibility and income disregards, paragraph 8
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ny/policy/otda/tanf-state-plan-2024-2026/financial-eligibility-and-income-disregards
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          person_failed_to_participate_in_screening_or_assessment_process

  - name: treatment_nonparticipation_disqualification_minimum_days
    kind: derived
    entity: Person
    dtype: Count
    period: Day
    source: TANF State Plan 2024-2026, financial eligibility and income disregards, paragraph 8(i)-(iii)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ny/policy/otda/tanf-state-plan-2024-2026/financial-eligibility-and-income-disregards
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          if treatment_nonparticipation_instance_number == 1: treatment_first_instance_disqualification_days else: if treatment_nonparticipation_instance_number == 2: treatment_second_instance_disqualification_days else: treatment_third_or_subsequent_instance_disqualification_days
