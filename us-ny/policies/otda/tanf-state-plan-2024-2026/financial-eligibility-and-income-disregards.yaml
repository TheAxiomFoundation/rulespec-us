  - name: unsubsidized_employment_disregard_rate
    kind: parameter
    dtype: Rate
    period: Month
    source: TANF State Plan 2024-2026, financial eligibility and income disregards, paragraph 12
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ny/policy/otda/tanf-state-plan-2024-2026/financial-eligibility-and-income-disregards
              excerpt: "100% of their earned income disregarded"
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          1.00

  - name: unsubsidized_employment_disregard_month_limit
    kind: parameter
    dtype: Count
    period: Month
    source: TANF State Plan 2024-2026, financial eligibility and income disregards, paragraph 12
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ny/policy/otda/tanf-state-plan-2024-2026/financial-eligibility-and-income-disregards
              excerpt: "for a period of up to six consecutive months following job entry"
    versions:
      - effective_from: '2024-10-01'
        formula: |-
