format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ny/policy/otda/tanf-state-plan-2024-2026/financial-eligibility-and-income-disregards
  summary: |-
    The amount of assets that a family may own at application and qualify for PA is $2,500 except for households in which any member is age 60 or over or is disabled in which case $3,750 in assets can be owned. PA recipients may own assets totaling up to $10,000. One automobile is exempt up to $12,000 fair market value. One bona fide funeral agreement per household member is exempt up to an equity value of $1,500. Recipient vehicle-purchase accounts are exempt up to $4,650 and tuition accounts up to $1,400 if used only for the stated purpose. The EID is applied first, then the $150 work disregard; as of June 2023, 62% of earnings are disregarded. Beginning FFY '24, TANF recipients entering unsubsidized employment may disregard 100% of earned income for up to six consecutive months if total income is not more than 200% FPL, once per lifetime; earned income from qualified work activity or training is also disregarded if total income is not more than 200% FPL.
