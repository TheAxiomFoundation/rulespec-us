  - name: expanded_earned_income_disregard_fpl_limit_ratio
    kind: parameter
    dtype: Rate
    period: Month
    source: TANF State Plan 2024-2026, financial eligibility and income disregards, paragraphs 12-13
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ny/policy/otda/tanf-state-plan-2024-2026/financial-eligibility-and-income-disregards
              excerpt: "resulting total income is not more than 200% of the Federal Poverty Level"
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          2.00

  - name: treatment_first_instance_disqualification_days
    kind: parameter
    dtype: Count
    period: Day
    source: TANF State Plan 2024-2026, financial eligibility and income disregards, paragraph 8(i)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ny/policy/otda/tanf-state-plan-2024-2026/financial-eligibility-and-income-disregards
              excerpt: "first instance, until the failure to participate ceases or 45 days, whichever is longer"
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          45

  - name: treatment_second_instance_disqualification_days
    kind: parameter
    dtype: Count
