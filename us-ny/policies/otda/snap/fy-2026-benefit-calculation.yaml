format: rulespec/v1
module:
  proof_validation:
    required: true
  kind: composition
  summary: |-
    New York SNAP FY 2026 benefit calculation composition. This module imports
    the federal USDA FY 2026 SNAP maximum allotment, standard deduction, excess
    shelter, resource-limit, income-standard, income-calculation, residency,
    citizenship, SSN, student, work-requirement, and allotment rules, then adds
    New York's FY 2026 standard utility allowances and initial-month
    proration rule. It composes those sources into New York SNAP eligibility
    and allotment calculations.
  source_verification:
    corpus_citation_path: us/guidance/usda/fns/snap-fy2026-cola/page-1
imports:
  - us:policies/usda/snap/state-plan-composition
  - us:regulations/7-cfr/273/8
  - us:regulations/7-cfr/273/9
  - us:statutes/7/2014/e/2
  - us:statutes/7/2014/e/6/A
  - us:statutes/7/2017/a
  - us-ny:regulations/18-nycrr/387/10
  - us-ny:regulations/18-nycrr/387/14/a/1
  - us-ny:regulations/18-nycrr/387/14/a/5
  - us-ny:regulations/18-nycrr/387/12/a
  - us-ny:regulations/18-nycrr/387/12/b
  - us-ny:regulations/18-nycrr/387/12/f/3/vi
  - us-ny:regulations/18-nycrr/387/9/a/1
  - us-ny:regulations/18-nycrr/387/9/a/2
  - us-ny:regulations/18-nycrr/385/3
  - us-ny:regulations/18-nycrr/387/12/f/3/v/a
  - us-ny:regulations/18-nycrr/387/12/f/3/v/b
  - us-ny:regulations/18-nycrr/387/12/f/3/v/c
rules:
  - name: shelter_costs
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: New York SNAP FY 2026 benefit calculation composition
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/guidance/usda/fns/snap-fy2026-cola/page-1
              span: 'New York SNAP FY 2026 benefit calculation composition'
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_shelter_costs_incurred
          + snap_standard_utility_allowance
          + snap_limited_utility_allowance
          + snap_individual_utility_allowance
  - name: ny_snap_excess_shelter_cost
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: New York SNAP FY 2026 benefit calculation composition
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/guidance/usda/fns/snap-fy2026-cola/page-1
              span: 'New York SNAP FY 2026 benefit calculation composition'
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          max(
              0,
              snap_allowable_shelter_costs
              - (snap_net_income_pre_shelter * snap_excess_shelter_income_share)
          )
  - name: snap_total_allowable_shelter_expenses
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: New York SNAP FY 2026 benefit calculation composition
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/guidance/usda/fns/snap-fy2026-cola/page-1
              span: 'New York SNAP FY 2026 benefit calculation composition'
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          snap_allowable_shelter_costs

  - name: snap_excess_shelter_deduction
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: New York SNAP FY 2026 benefit calculation composition
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/guidance/usda/fns/snap-fy2026-cola/page-1
              span: 'New York SNAP FY 2026 benefit calculation composition'
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if snap_full_excess_shelter_deduction_applies:
              ny_snap_excess_shelter_cost
          else:
              min(ny_snap_excess_shelter_cost, snap_maximum_excess_shelter_deduction_48_states_dc)
  - name: snap_eligible
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: New York SNAP FY 2026 benefit calculation composition
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/guidance/usda/fns/snap-fy2026-cola/page-1
              span: 'New York SNAP FY 2026 benefit calculation composition'
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (
            snap_income_limit_exemption_for_categorically_eligible_household
            or snap_standard_income_eligible
          )
          and (snap_resource_eligible or ny_snap_categorically_eligible)
          and snap_ssn_eligible
          and snap_work_requirement_eligible
          and snap_student_eligible
          and snap_household_residency_and_citizenship_eligible

  # Binds the 7 CFR 273.10(e) shelter input to New York's allowable shelter
  # costs (18 NYCRR 387.12(f)(3)(vi)), so the regulation's whole-dollar
  # benefit chain computes over the same shelter total as the composed
  # statutory chain — the same binding the California composition makes. On
  # the homeless path the vi rule substitutes the standard homeless shelter
  # allowance as a shelter expense, so the federal pre-shelter homeless
  # deduction stays off (the snap_claimed_homeless_shelter_deduction binding
  # below).
  - name: snap_claimed_homeless_shelter_deduction
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 18 NYCRR 387.12(f)(3)(vi)
    metadata:
      proof:
        atoms:
          # Composition-source atom (validator constraint, as above); the
          # shelter-expense election this zero binding implements is proven
          # in the vi module, whose restates relation covers the federal
          # homeless deduction.
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/guidance/usda/fns/snap-fy2026-cola/page-1
              span: 'New York SNAP FY 2026 benefit calculation composition'
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          0

  # The issued monthly benefit. Rides the 7 CFR 273.10(e)(1)-(2) chain, which
  # computes in whole dollars (earned-income deduction cents dropped, excess
  # shelter rounded to the nearest dollar under the 273.10(e)(1)(ii)(A)
  # election, minimum-benefit floor for one- and two-person households) — the
  # computation FNS applies in the SNAP quality control database and New
  # York's eligibility systems apply in issuance. Initial months ride New
  # York's certification-period proration (18 NYCRR 387.10) through
  # snap_initial_month_allotment_after_minimum_issuance. The composed
  # 2014(e)/2017(a) statutory chain above stays pure (it carries cents) and
  # is not the issued amount.
