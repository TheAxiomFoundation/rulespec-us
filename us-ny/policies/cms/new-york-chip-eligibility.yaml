format: rulespec/v1
imports:
  - us:statutes/42/1397jj/c/1#child
  - us-ny:policies/cms/new-york-medicaid-chip-bhp-eligibility-levels#new_york_children_separate_chip_effective_fpl_limit
  - us-ny:policies/cms/new-york-medicaid-chip-bhp-eligibility-levels#new_york_pregnant_women_chip_available
  - us:policies/cms/medicaid-chip-bhp-eligibility-levels#magi_fpl_disregard_rate
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_paths:
      - us/form/cms/medicaid-chip-bhp-eligibility-levels
      - us/statute/42/1397jj/b/1
      - us/statute/42/1397ll/d/2
      - us/policy/cms/chip-spa/ny/ny-25-0041-chip/pdf/page-30
      - us/statute/42/1397ll/f/1
      - us/regulation/42/457/10
      - us/regulation/42/435/603/d
    upstream_source_check:
      status: official_parameter_source
      checked_paths:
        - us/statute/42/1397jj/b/1
        - us/statute/42/1397jj/c/4
        - us/statute/42/1397jj/c/8
        - us/statute/42/1397ll/d/2
        - us/statute/42/1397ll/f/2
        - us/regulation/42/435/603/d
        - us/regulation/42/457/340
        - us/regulation/42/457/344
      rationale: |-
        Federal CHIP statute and regulations define the eligibility framework,
        targeted low-income child and low-income child predicates, uncovered
        child condition, pregnant eligibility options, and MAGI screen/process
        rules. The CMS Medicaid, CHIP and BHP eligibility-level table is the
        official current compiled source for the state-decided MAGI income
        levels and availability flags encoded in this module.
  summary: |-
    New York CHIP eligibility composition applies the federal CHIP child and standard-pregnant eligibility framework to the CMS state eligibility-level outputs. It also applies the CMS CHIP FCEP SPA source for state-set coverage from conception to birth income eligibility.
rules:
  - name: new_york_separate_chip_child_eligibility_available
    kind: derived
    dtype: Boolean
    period: Year
    source: CMS Medicaid, CHIP and BHP Eligibility Levels table, New York row
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/form/cms/medicaid-chip-bhp-eligibility-levels
              excerpt: "Children Separate CHIP"
    versions:
      - effective_from: '2023-12-01'
        formula: |-
          true
  - name: is_chip_eligible_child
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 42 USC 1397jj(b)(1), 42 USC 1397jj(c)(1), and CMS state CHIP eligibility levels
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/42/1397jj/c/1#child
              output: child
              hash: sha256:5983f9bd1c30a824da826ee4bc8fc3351cd2c631d4a0ce198b156446493ef9e0
          - path: versions[0].formula
            kind: import
            import:
              target: us-ny:policies/cms/new-york-medicaid-chip-bhp-eligibility-levels#new_york_children_separate_chip_effective_fpl_limit
              output: new_york_children_separate_chip_effective_fpl_limit
              hash: sha256:eb4c24da5e60aff4e2223c432548144b86fd4fbd6a63e40e7b598e9d400ee118
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/1397jj/b/1
              excerpt: "not found eligible for medical assistance under subchapter XIX"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/form/cms/medicaid-chip-bhp-eligibility-levels
              excerpt: "Children Separate CHIP"
    versions:
      - effective_from: '2023-12-01'
        formula: |-
          child
          and person_meets_chip_immigration_requirement
          and not found_eligible_for_medical_assistance_under_subchapter_xix
          and medicaid_income_level <= new_york_children_separate_chip_effective_fpl_limit
  - name: new_york_standard_pregnant_chip_eligibility_available
    kind: derived
    dtype: Boolean
    period: Year
    source: CMS Medicaid, CHIP and BHP Eligibility Levels table, New York row
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: import
            import:
              target: us-ny:policies/cms/new-york-medicaid-chip-bhp-eligibility-levels#new_york_pregnant_women_chip_available
              output: new_york_pregnant_women_chip_available
              hash: sha256:eb4c24da5e60aff4e2223c432548144b86fd4fbd6a63e40e7b598e9d400ee118
    versions:
      - effective_from: '2023-12-01'
        formula: |-
          new_york_pregnant_women_chip_available
  - name: is_chip_eligible_standard_pregnant_person
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 42 USC 1397ll(d)(2) and CMS state CHIP eligibility levels
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/form/cms/medicaid-chip-bhp-eligibility-levels
              excerpt: "Pregnant Women CHIP"
    versions:
      - effective_from: '2023-12-01'
        formula: |-
          false
  - name: new_york_fcep_eligibility_available
    kind: derived
    dtype: Boolean
    period: Year
    source: CMS CHIP FCEP SPA source, New York
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/policy/cms/chip-spa/ny/ny-25-0041-chip/pdf/page-30
              excerpt: "New York will claim CHIP federal financial participation (FFP) under this HSI through the last day of the 12th month of the postpartum period for mothers of targeted low-income children with income from 0 to 218% FPL, plus 5% deduction, not otherwise eligible for Medicaid or CHIP previously covered from conception to end of pregnancy whose pregnancies result in a live birth."
    versions:
      - effective_from: '2024-04-01'
        formula: |-
          true
  - name: new_york_fcep_fpl_limit
    kind: parameter
    dtype: Rate
    period: Year
    source: CMS CHIP FCEP SPA source, New York
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/policy/cms/chip-spa/ny/ny-25-0041-chip/pdf/page-30
              excerpt: "New York will claim CHIP federal financial participation (FFP) under this HSI through the last day of the 12th month of the postpartum period for mothers of targeted low-income children with income from 0 to 218% FPL, plus 5% deduction, not otherwise eligible for Medicaid or CHIP previously covered from conception to end of pregnancy whose pregnancies result in a live birth."
    versions:
      - effective_from: '2024-04-01'
        formula: |-
          2.18
  - name: new_york_fcep_effective_fpl_limit
    kind: derived
    dtype: Rate
    period: Year
    source: CMS CHIP FCEP SPA source, New York, including the MAGI 5% FPL disregard
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: import
            import:
              target: us:policies/cms/medicaid-chip-bhp-eligibility-levels#magi_fpl_disregard_rate
              output: magi_fpl_disregard_rate
              hash: sha256:ea0071602a4a4441e584a16bdbab3d8a3c36b40b7cea1151165533669423f5f5
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/regulation/42/435/603/d
              excerpt: "5 percentage points of the Federal poverty level"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/policy/cms/chip-spa/ny/ny-25-0041-chip/pdf/page-30
              excerpt: "New York will claim CHIP federal financial participation (FFP) under this HSI through the last day of the 12th month of the postpartum period for mothers of targeted low-income children with income from 0 to 218% FPL, plus 5% deduction, not otherwise eligible for Medicaid or CHIP previously covered from conception to end of pregnancy whose pregnancies result in a live birth."
    versions:
      - effective_from: '2024-04-01'
        formula: |-
          new_york_fcep_fpl_limit + magi_fpl_disregard_rate
  - name: is_chip_fcep_eligible_person
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 42 USC 1397ll(f)(1), 42 CFR 457.10, and CMS CHIP FCEP SPA source for New York
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/policy/cms/chip-spa/ny/ny-25-0041-chip/pdf/page-30
              excerpt: "New York will claim CHIP federal financial participation (FFP) under this HSI through the last day of the 12th month of the postpartum period for mothers of targeted low-income children with income from 0 to 218% FPL, plus 5% deduction, not otherwise eligible for Medicaid or CHIP previously covered from conception to end of pregnancy whose pregnancies result in a live birth."
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/1397ll/f/1
              excerpt: "through the application of sections 457.10"
    versions:
      - effective_from: '2024-04-01'
        formula: |-
          person_is_pregnant
          and not found_eligible_for_medical_assistance_under_subchapter_xix
          and medicaid_income_level <= new_york_fcep_effective_fpl_limit
