# Fixtures are hand-computed. The imported section 11-1701 module receives
# city_taxable_income; current school tax credit is supplied because the final
# aggregator does not recompose that separate credit module.
- name: single_top_bracket_with_school_rate_reduction
  # Other-resident section 11-1701 tax at 100,000 is 1,591 + 3.4% of the
  # excess over 50,000 = 3,291. The section 11-1704.1 add-on is 14% of
  # 3,291 = 460.74. Before credits = 3,751.74. Supplied school tax credit
  # is 221.64. Final tax = 3,751.74 - 221.64 = 3,530.10.
  period:
    period_kind: tax_year
    start: '2025-01-01'
    end: '2025-12-31'
  input:
    us-ny:statutes/NYC/11-1701#input.city_taxable_income: 100000
    us-ny:policies/income_tax/nyc_composed_liability_pipeline#input.nyc_pit_composed_joint_or_surviving_spouse_return: false
    us-ny:policies/income_tax/nyc_composed_liability_pipeline#input.nyc_pit_composed_head_of_household_return: false
    us-ny:policies/income_tax/nyc_composed_liability_pipeline#input.nyc_pit_composed_supplied_household_credit: 0
    us-ny:policies/income_tax/nyc_composed_liability_pipeline#input.nyc_pit_composed_supplied_unincorporated_business_tax_credit: 0
    us-ny:policies/income_tax/nyc_composed_liability_pipeline#input.nyc_pit_composed_supplied_school_tax_credit: 221.64
    us-ny:policies/income_tax/nyc_composed_liability_pipeline#input.nyc_pit_composed_supplied_earned_income_tax_credit: 0
    us-ny:policies/tax/it-216-instructions/nyc-child-dependent-care-credit#input.is_full_year_new_york_city_resident: true
    us-ny:policies/tax/it-216-instructions/nyc-child-dependent-care-credit#input.fagi: 50000
    us-ny:policies/tax/it-216-instructions/nyc-child-dependent-care-credit#input.has_child_under_four_years_old: false
    us-ny:policies/tax/it-216-instructions/nyc-child-dependent-care-credit#input.qualifies_for_new_york_state_child_dependent_care_credit: false
    us-ny:policies/tax/it-216-instructions/nyc-child-dependent-care-credit#input.form_it216_line_14_amount: 0
    us-ny:policies/tax/it-216-instructions/nyc-child-dependent-care-credit#input.form_it216_line_23_amount: 0
    us-ny:policies/tax/it-216-instructions/nyc-child-dependent-care-credit#input.form_it216_line_3a_amount: 1
    us-ny:policies/tax/it-216-instructions/nyc-child-dependent-care-credit#input.nyc_child_dependent_care_credit_limitation_table_decimal_amount: 0
  output:
    us-ny:policies/income_tax/nyc_composed_liability_pipeline#nyc_pit_composed_section_1701_tax: '3291'
    us-ny:policies/income_tax/nyc_composed_liability_pipeline#nyc_pit_composed_pre_2027_fourteen_percent_section_1704_1_tax: '460.74'
    us-ny:policies/income_tax/nyc_composed_liability_pipeline#nyc_pit_composed_income_tax_before_credits: '3751.74'
    us-ny:policies/income_tax/nyc_composed_liability_pipeline#nyc_pit_composed_nonrefundable_credits: '0'
    us-ny:policies/income_tax/nyc_composed_liability_pipeline#nyc_pit_composed_school_tax_credit: '221.64'
    us-ny:policies/income_tax/nyc_composed_liability_pipeline#nyc_pit_composed_refundable_credits: '221.64'
    us-ny:policies/income_tax/nyc_composed_liability_pipeline#nyc_pit_composed_income_tax: '3530.1'

- name: joint_with_nonrefundable_and_refundable_credits
  # Joint section 11-1701 tax at 50,000 is 1,355 + 3.35% of the excess over
  # 45,000 = 1,522.50. The section 11-1704.1 add-on is 213.15, so before
  # credits is 1,735.65. Nonrefundable credits are 90 + 10 = 100, leaving
  # 1,635.65. Supplied school credit is 101.752. CDCC fixture: state credit
  # 1,000 * (2,000 / 4,000) * 50% = 250. EITC supplied 25. Refundable total
  # 376.752; final tax 1,258.898.
  period:
    period_kind: tax_year
    start: '2025-01-01'
    end: '2025-12-31'
  input:
    us-ny:statutes/NYC/11-1701#input.city_taxable_income: 50000
    us-ny:policies/income_tax/nyc_composed_liability_pipeline#input.nyc_pit_composed_joint_or_surviving_spouse_return: true
    us-ny:policies/income_tax/nyc_composed_liability_pipeline#input.nyc_pit_composed_head_of_household_return: false
    us-ny:policies/income_tax/nyc_composed_liability_pipeline#input.nyc_pit_composed_supplied_household_credit: 90
    us-ny:policies/income_tax/nyc_composed_liability_pipeline#input.nyc_pit_composed_supplied_unincorporated_business_tax_credit: 10
    us-ny:policies/income_tax/nyc_composed_liability_pipeline#input.nyc_pit_composed_supplied_school_tax_credit: 101.752
    us-ny:policies/income_tax/nyc_composed_liability_pipeline#input.nyc_pit_composed_supplied_earned_income_tax_credit: 25
    us-ny:policies/tax/it-216-instructions/nyc-child-dependent-care-credit#input.is_full_year_new_york_city_resident: true
    us-ny:policies/tax/it-216-instructions/nyc-child-dependent-care-credit#input.fagi: 25000
    us-ny:policies/tax/it-216-instructions/nyc-child-dependent-care-credit#input.has_child_under_four_years_old: true
    us-ny:policies/tax/it-216-instructions/nyc-child-dependent-care-credit#input.qualifies_for_new_york_state_child_dependent_care_credit: true
    us-ny:policies/tax/it-216-instructions/nyc-child-dependent-care-credit#input.form_it216_line_14_amount: 1000
    us-ny:policies/tax/it-216-instructions/nyc-child-dependent-care-credit#input.form_it216_line_23_amount: 2000
    us-ny:policies/tax/it-216-instructions/nyc-child-dependent-care-credit#input.form_it216_line_3a_amount: 4000
    us-ny:policies/tax/it-216-instructions/nyc-child-dependent-care-credit#input.nyc_child_dependent_care_credit_limitation_table_decimal_amount: 0.5
  output:
    us-ny:policies/income_tax/nyc_composed_liability_pipeline#nyc_pit_composed_section_1701_tax: '1522.5'
    us-ny:policies/income_tax/nyc_composed_liability_pipeline#nyc_pit_composed_pre_2027_fourteen_percent_section_1704_1_tax: '213.15'
    us-ny:policies/income_tax/nyc_composed_liability_pipeline#nyc_pit_composed_income_tax_before_credits: '1735.65'
    us-ny:policies/income_tax/nyc_composed_liability_pipeline#nyc_pit_composed_nonrefundable_credits: '100'
    us-ny:policies/income_tax/nyc_composed_liability_pipeline#nyc_pit_composed_income_tax_before_refundable_credits: '1635.65'
    us-ny:policies/income_tax/nyc_composed_liability_pipeline#nyc_pit_composed_school_tax_credit: '101.752'
    us-ny:policies/income_tax/nyc_composed_liability_pipeline#nyc_pit_composed_refundable_credits: '376.752'
    us-ny:policies/income_tax/nyc_composed_liability_pipeline#nyc_pit_composed_income_tax: '1258.898'
