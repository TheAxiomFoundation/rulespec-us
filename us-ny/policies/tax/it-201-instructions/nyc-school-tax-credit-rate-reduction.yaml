  - name: nyc_school_tax_credit_rate_reduction_amount
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: IT-201-I (2025), page 21, Calculation of NYC school tax credit (rate reduction amount)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ny/form/tax/it-201-instructions/page-21
              excerpt: "The credit is: Calculation of NYC school tax credit (rate reduction amount)"
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if nyc_school_tax_credit_rate_reduction_joint_table_applies:
            if nyc_taxable_income <= nyc_school_tax_credit_joint_first_band_upper_bound:
              nyc_school_tax_credit_rate_reduction_low_rate * max(0, nyc_taxable_income)
            else:
              if nyc_taxable_income <= nyc_school_tax_credit_joint_second_band_upper_bound:
                nyc_school_tax_credit_joint_second_band_base_amount + nyc_school_tax_credit_rate_reduction_excess_rate * max(0, nyc_taxable_income - nyc_school_tax_credit_joint_first_band_upper_bound)
              else:
                0
          else:
            if nyc_school_tax_credit_rate_reduction_single_table_applies:
              if nyc_taxable_income <= nyc_school_tax_credit_single_first_band_upper_bound:
                nyc_school_tax_credit_rate_reduction_low_rate * max(0, nyc_taxable_income)
              else:
                if nyc_taxable_income <= nyc_school_tax_credit_single_second_band_upper_bound:
                  nyc_school_tax_credit_single_second_band_base_amount + nyc_school_tax_credit_rate_reduction_excess_rate * max(0, nyc_taxable_income - nyc_school_tax_credit_single_first_band_upper_bound)
                else:
                  0
            else:
              if nyc_school_tax_credit_rate_reduction_head_of_household_table_applies:
                if nyc_taxable_income <= nyc_school_tax_credit_head_of_household_first_band_upper_bound:
                  nyc_school_tax_credit_rate_reduction_low_rate * max(0, nyc_taxable_income)
                else:
                  if nyc_taxable_income <= nyc_school_tax_credit_head_of_household_second_band_upper_bound:
                    nyc_school_tax_credit_head_of_household_second_band_base_amount + nyc_school_tax_credit_rate_reduction_excess_rate * max(0, nyc_taxable_income - nyc_school_tax_credit_head_of_household_first_band_upper_bound)
                  else:
                    0
              else:
                0
