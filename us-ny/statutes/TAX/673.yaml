format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ny/statute/TAX/673
  summary: |-
    "Any amount of tax actually deducted and withheld under this article in any calendar year shall be deemed to have been paid to the tax commission on behalf of the person from whom withheld," and that person is credited for the taxable year beginning in that calendar year; for a taxable year of less than twelve months, the credit is made under tax commission regulations.
rules:
  - name: credit_for_tax_withheld
    kind: derived
    entity: Person
    dtype: Money
    unit: USD
    period: Year
    source: N.Y. Tax Law § 673
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ny/statute/TAX/673
              excerpt: "any amount of tax actually deducted and withheld under this article in any calendar year shall be deemed to have been paid ... on behalf of the person from whom withheld"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ny/statute/TAX/673
              excerpt: "For a taxable year of less than twelve months, the credit shall be made under regulations of the tax commission."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if taxable_year_is_less_than_twelve_months: credit_made_under_tax_commission_regulations else: tax_actually_deducted_and_withheld_under_this_article_in_calendar_year
  - name: wages_taxable_as_if_no_withholding_required
    kind: derived
    entity: Person
    dtype: Money
    unit: USD
    period: Year
    source: N.Y. Tax Law § 673
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ny/statute/TAX/673
              excerpt: "Wages upon which tax is required to be withheld shall be taxable under this article as if no withholding were required"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          wages_upon_which_tax_is_required_to_be_withheld
