    corpus_citation_path: us-ny/statute/TAX/613
  summary: |-
    "The New York deduction of a resident individual shall be his New York standard deduction unless he elects to deduct his New York itemized deduction"; if the taxpayer elected itemized but the department determines the standard deduction is greater, the department recomputes tax liability using the standard deduction and notifies the taxpayer.
  deferred_outputs:
    - output: us-ny:statutes/TAX/613#new_york_deduction_of_resident_individual
      reason: The deduction selection depends on the New York standard deduction allowable pursuant to section 614 and the New York itemized deduction computed pursuant to section 615. The copied section 614 context is deferred and exports no executable standard-deduction amount, and no executable section 615 context is supplied.
    - output: us-ny:statutes/TAX/613#department_recomputed_tax_liability_using_standard_deduction
      reason: The recomputation clause depends on determining that the section 614 New York standard deduction is greater than the section 615 New York itemized deduction and then recomputing tax liability pursuant to section 611. Executable RuleSpec outputs for the needed section 614, section 615, and section 611 computations are unavailable in the supplied context.
