  source_verification:
    corpus_citation_path: us-ny/statute/TAX/613
  summary: |-
    "The New York deduction of a resident individual shall be his New York standard deduction unless he elects to deduct his New York itemized deduction"; if itemized was elected but the department determines the standard deduction is greater, the department recomputes tax liability using the standard deduction and notifies the taxpayer.
  deferred_outputs:
    - output: us-ny:statutes/TAX/613#new_york_deduction_of_resident_individual
      reason: The deduction choice depends on the New York standard deduction allowable under section 614 and the New York itemized deduction computed under section 615. Section 614 is supplied only as a deferred context file with no executable export, section 615 is not supplied, and the prompt provides no executable upstream source for either deduction amount. Encoding this output with local cross-reference placeholders would not faithfully compose the cited legal mechanics.
    - output: us-ny:statutes/TAX/613#department_recomputed_tax_liability_using_standard_deduction
      reason: The recomputation clause depends on determining that the section 614 New York standard deduction is greater than the section 615 New York itemized deduction and then recomputing tax liability pursuant to section 611. The needed executable outputs for sections 614, 615, and 611 are unavailable in the supplied context.
