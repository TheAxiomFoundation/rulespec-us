- name: regular taxable year credits actual tax withheld
  period:
    period_kind: tax_year
    start: '2024-01-01'
    end: '2024-12-31'
  input:
    us-ny:statutes/TAX/673#input.taxable_year_is_less_than_twelve_months: false
    us-ny:statutes/TAX/673#input.tax_actually_deducted_and_withheld_under_this_article_in_calendar_year: 1200
    us-ny:statutes/TAX/673#input.credit_made_under_tax_commission_regulations: 700
    us-ny:statutes/TAX/673#input.wages_upon_which_tax_is_required_to_be_withheld: 50000
  output:
    us-ny:statutes/TAX/673#credit_for_tax_withheld: 1200
    us-ny:statutes/TAX/673#wages_taxable_as_if_no_withholding_required: 50000
