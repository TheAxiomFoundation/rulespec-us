format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ny/statute/TAX/611
  summary: |-
    "The New York taxable income of a resident individual shall be his New York adjusted gross income less his New York deduction and New York exemptions"; resident spouses generally determine New York taxable income separately or jointly consistently with separate or joint federal-return treatment, with special election rules when no federal return is filed or when one spouse is nonresident or part-year resident.
rules:
  - name: new_york_taxable_income_of_resident_individual
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: NY Tax Law § 611(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ny/statute/TAX/611
              excerpt: "New York adjusted gross income less his New York deduction and New York exemptions"
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-ny/statute/TAX/611
              excerpt: "The New York taxable income of a resident individual"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          max(0, new_york_adjusted_gross_income - new_york_deduction - new_york_exemptions)
