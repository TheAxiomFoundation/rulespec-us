module:
  status: deferred
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ny/statute/TAX/601
  summary: |-
    "There is hereby imposed for each taxable year on the New York taxable income" of resident joint-return filers, surviving spouses, heads of households, unmarried individuals, separate filers, estates and trusts a tax determined by tables; supplemental tax table benefit recapture applies under subsections (d) through (d-7); nonresident and part-year resident tax equals the tax base multiplied by the New York source fraction.
  deferred_outputs:
    - output: us-ny:statutes/TAX/601#ny_income_tax_before_credits
      reason: The source computes tax from New York taxable income, New York adjusted gross income, residency/part-year status, source fraction, credits under section 606, and filing-status classifications including joint return, surviving spouse, head of household, unmarried individual, separate filer, estate, and trust. The prompt supplies no executable upstream RuleSpec exports for those filing-status classifications or cross-referenced resident/nonresident tax-base inputs, and RuleSpec guidance prohibits replacing filing status with local status inputs. Encoding the broad tax and recapture tables without those upstream legal classifications would create an unfaithful executable surface.
