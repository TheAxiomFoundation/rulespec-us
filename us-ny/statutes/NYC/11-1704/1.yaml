format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ny/statute/NYC/11-1704.1
  summary: |-
    "there is hereby imposed for each taxable year beginning after nineteen hundred ninety but before two thousand twenty-seven, an additional tax" calculated at "fourteen percent" of the section 11-1701 tax for years beginning after 1998, with a temporary notwithstanding calculation for years beginning after 2000 but before 2002 using 5.25%, 12.25%, and thresholds of $90,000, $60,000, and $50,000.
  deferred_outputs:
    - output: us-ny:statutes/NYC/11-1704/1#combined_section_taxes_additional_tax
      reason: The branch for taxable years beginning after 1990 but before 1999 requires the sum of taxes determined pursuant to sections 11-1701 and 11-1704; no copied RuleSpec context provides the section 11-1704 tax.
    - output: us-ny:statutes/NYC/11-1704/1#temporary_joint_or_surviving_spouse_additional_tax
      reason: The temporary notwithstanding calculation requires applying section 11-1701 tax mechanics to city taxable income up to and above the temporary threshold and depends on resident return/status classifications cross-referenced to section 11-1751; the copied section 11-1701 context does not export the needed historical 2001 split-tax computation.
      source_values:
        - us-ny:statutes/NYC/11-1704/1#temporary_base_portion_additional_tax_rate
        - us-ny:statutes/NYC/11-1704/1#temporary_excess_portion_additional_tax_rate
        - us-ny:statutes/NYC/11-1704/1#temporary_joint_or_surviving_spouse_threshold
    - output: us-ny:statutes/NYC/11-1704/1#temporary_head_of_household_additional_tax
      reason: The temporary notwithstanding calculation requires applying section 11-1701 tax mechanics to city taxable income up to and above the temporary threshold and depends on resident head-of-household classification; the copied section 11-1701 context does not export the needed historical 2001 split-tax computation.
      source_values:
        - us-ny:statutes/NYC/11-1704/1#temporary_base_portion_additional_tax_rate
        - us-ny:statutes/NYC/11-1704/1#temporary_excess_portion_additional_tax_rate
        - us-ny:statutes/NYC/11-1704/1#temporary_head_of_household_threshold
    - output: us-ny:statutes/NYC/11-1704/1#temporary_other_resident_additional_tax
      reason: The temporary notwithstanding calculation requires applying section 11-1701 tax mechanics to city taxable income up to and above the temporary threshold and depends on resident return/status classifications; the copied section 11-1701 context does not export the needed historical 2001 split-tax computation.
      source_values:
        - us-ny:statutes/NYC/11-1704/1#temporary_base_portion_additional_tax_rate
        - us-ny:statutes/NYC/11-1704/1#temporary_excess_portion_additional_tax_rate
        - us-ny:statutes/NYC/11-1704/1#temporary_other_resident_threshold
imports:
