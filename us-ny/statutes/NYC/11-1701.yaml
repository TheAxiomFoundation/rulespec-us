format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ny/statute/NYC/11-1701
  summary: |-
    "A tax is hereby imposed on the city taxable income of every city resident individual, estate and trust" using subdivision (a) rates for taxable years beginning before 2027 and subdivision (b) rates for taxable years beginning after 2026. Subdivision (a)(1)-(3)(A) and subdivision (b)(1)-(3) provide city taxable income rate tables for joint/surviving spouse, head of household, and other resident taxpayers.
  deferred_outputs:
    - output: us-ny:statutes/NYC/11-1701#city_resident_income_tax
      reason: The final all-status tax selector depends on resident return/status classifications cross-referenced to NYC Administrative Code section 11-1751 and city taxable income definitions cross-referenced to sections 11-1711 and 11-1718; no copied RuleSpec context exports those upstream legal definitions or classifications.
    - output: us-ny:statutes/NYC/11-1701#tax_table_benefit_recapture_supplemental_tax
      reason: Subdivision (h) recapture depends on taxable-income table mechanics, New York adjusted gross income, and taxpayer status for taxable years beginning after 2002 and before 2006; the required upstream status and taxable-income definitions are not available in copied RuleSpec context.
