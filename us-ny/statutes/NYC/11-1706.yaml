format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ny/statute/NYC/11-1706
  summary: |-
    § 11-1706(g) allows a credit for city pass-through entity tax equal to a taxpayer's direct share of city pass-through entity tax, summed across multiple electing city partnerships or electing city resident S corporations. The credit is not allowed unless the entity return provides sufficient identifying information, may not exceed the direct share reported on that entity return, and excess over tax due is treated as an overpayment without interest. Other subdivisions create additional credits subject to unresolved cross-referenced tax, filing-status, or external-law computations.
  deferred_outputs:
    - output: us-ny:statutes/NYC/11-1706#net_capital_gain_credit
      reason: The final credit is capped by tax imposed under § 11-1701 after credits under § 11-1721 and subdivision (b); the § 11-1721 credit computation is not provided in copied RuleSpec context.
    - output: us-ny:statutes/NYC/11-1706#household_credit
      reason: The household credit depends on federal filing/status classifications, federal exemption entitlement under IRC § 151, § 11-1721 credit coordination, and part-year resident mechanics not fully provided in copied RuleSpec context.
    - output: us-ny:statutes/NYC/11-1706#state_school_tax_reduction_credit
      reason: The credit depends on income as defined in Real Property Tax Law § 425, federal dependent status, filing categories, age status for joint returns, and inflation-adjusted income limitations not fully provided in copied RuleSpec context.
    - output: us-ny:statutes/NYC/11-1706#unincorporated_business_tax_credit
      reason: The credit depends on taxes and credits imposed under chapter five, including § 11-503, and on partnership/business allocation relations not provided in copied RuleSpec context.
    - output: us-ny:statutes/NYC/11-1706#earned_income_tax_credit
      reason: The final refundable credit depends on the federal earned income credit under IRC § 32, New York adjusted gross income under Tax Law article 22, and taxes authorized by this chapter reduced by all chapter credits.
    - output: us-ny:statutes/NYC/11-1706#household_and_dependent_care_credit
      reason: The credit depends on credits allowed under Tax Law § 606(c) and (c-2), qualifying-individual rules under IRC § 21, and separate-spouse tax allocation mechanics not provided in copied RuleSpec context.
    - output: us-ny:statutes/NYC/11-1706#general_corporation_tax_paid_credit
      reason: The credit depends on New York S corporation and exempt QSSS classifications, subchapter two chapter six tax, § 11-604 credits, and shareholder pro rata share mechanics not provided in copied RuleSpec context.
    - output: us-ny:statutes/NYC/11-1706#income_below_threshold_credit
      reason: The credit depends on return filing categories and coordination with credits under Tax Law § 863(a) and subdivision (g), plus all credits permitted by this chapter.
rules:
  - name: city_pass_through_entity_tax_credit
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: NYC Admin. Code § 11-1706(g)(2), (g)(3), (g)(5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ny/statute/NYC/11-1706
              excerpt: "The amount of the credit shall be equal to the partner's, member's or shareholder's direct share of the city pass-through entity tax."
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ny/statute/NYC/11-1706
              excerpt: "If a taxpayer is a partner, member or shareholder in more than one... the amount of the credit... shall be equal to the sum..."
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ny/statute/NYC/11-1706
              excerpt: "No credit shall be allowed... unless the electing city partnership or electing city resident S corporation provided sufficient information..."
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ny/statute/NYC/11-1706
              excerpt: "The credit... shall not exceed the direct share of city pass-through entity tax reported..."
    versions:
      - effective_from: '2022-01-01'
        formula: |-
          if electing_city_entity_reported_sufficient_identifying_information: min(sum_of_direct_shares_of_city_pass_through_entity_tax, sum_of_reported_direct_shares_of_city_pass_through_entity_tax) else: 0

  - name: city_pass_through_entity_tax_credit_overpayment
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: NYC Admin. Code § 11-1706(g)(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ny/statute/NYC/11-1706
              excerpt: "If the amount of the credit allowable... exceeds the tax due... the excess amount shall be treated as an overpayment..."
          - path: versions[0].formula
            kind: import
            import:
              target: us-ny:statutes/NYC/11-1706#city_pass_through_entity_tax_credit
              output: city_pass_through_entity_tax_credit
              hash: sha256:local
    versions:
      - effective_from: '2022-01-01'
        formula: |-
          max(0, city_pass_through_entity_tax_credit - city_pass_through_entity_tax_due)
