format: rulespec/v1
module:
  summary: |-
    New York's SNAP work-registration regulation restates federal work
    registration exemptions, work registrant requirements, and ABAWD time-limit
    eligibility. The executable general work-requirement and ABAWD rules are
    imported from 7 CFR 273.7 and 7 CFR 273.24.
  source_verification:
    corpus_citation_path: us-ny/regulation/18-nycrr/385/3
imports:
  - us:regulations/7-cfr/273/7
  - us:regulations/7-cfr/273/24
rules:
  - name: restates_general_work_requirement_eligibility
    kind: source_relation
    source: 18 NYCRR 385.3(a)-(c)
    source_relation:
      type: restates
      target: us:regulations/7-cfr/273/7#snap_member_general_work_requirement_eligible
      authority: federal
  - name: restates_abawd_time_limit_eligibility
    kind: source_relation
    source: 18 NYCRR 385.3(d)
    source_relation:
      type: restates
      target: us:regulations/7-cfr/273/24#snap_member_abawd_time_limit_eligible
      authority: federal
  - name: restates_work_requirement_eligibility
    kind: source_relation
    source: 18 NYCRR 385.3
    source_relation:
      type: restates
      target: us:regulations/7-cfr/273/24#snap_member_work_requirement_eligible
      authority: federal
