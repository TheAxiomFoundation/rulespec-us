format: rulespec/v1
module:
  summary: |-
    New York's SNAP standard-deduction regulation points to the federally
    published annual standard deduction amounts. The executable FY 2026 values
    are imported from the USDA SNAP COLA file.
  source_verification:
    corpus_citation_path: us-ny/regulation/18-nycrr/387/12/a
imports:
  - us:policies/usda/snap/fy-2026-cola/deductions
rules:
  - name: restates_standard_deduction
    kind: source_relation
    source: 18 NYCRR 387.12(a)
    source_relation:
      type: restates
      target: us:policies/usda/snap/fy-2026-cola/deductions#snap_standard_deduction
      authority: federal
