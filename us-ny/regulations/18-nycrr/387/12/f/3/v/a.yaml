format: rulespec/v1
module:
  summary: |-
    New York's SNAP standard allowance for heating/cooling is available to
    households with qualifying heating or cooling costs, or to households with
    an elderly or disabled member entitled to a HEAP or LIHEAA payment. Effective
    October 1, 2025, the monthly amounts are 1,062 dollars for New York City,
    988 dollars for Nassau or Suffolk Counties, and 877 dollars for the rest of
    New York State.
  source_verification:
    corpus_citation_path: us-ny/regulation/18-nycrr/387/12/f/3/v/a
    values:
      heating_cooling_standard_amount_new_york_city: 1062
      heating_cooling_standard_amount_nassau_suffolk: 988
      heating_cooling_standard_amount_rest_of_state: 877
imports:
  - us:statutes/7/2012/j
rules:
  - name: sets_snap_heating_cooling_standard_allowance
    kind: source_relation
    source: 18 NYCRR 387.12(f)(3)(v)(a)
    source_relation:
      type: sets
      target: us:regulations/7-cfr/273/9#snap_standard_utility_allowance_state_option
      authority: state
      value: us-ny:regulations/18-nycrr/387/12/f/3/v/a#snap_standard_utility_allowance
      basis:
        delegation: us:regulations/7-cfr/273/9#snap_state_standard_utility_allowance_delegation
  - name: snap_heating_cooling_standard_allowance_eligible
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 18 NYCRR 387.12(f)(3)(v)(a)
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (
              household_incurred_or_anticipated_heating_or_cooling_costs_separate_from_rent_or_mortgage
              and not household_in_central_meter_housing_charged_only_for_excess_heating_or_cooling
          )
          or (
              snap_household_has_elderly_or_disabled_member
              and household_entitled_to_heap_or_liheaa_payment
          )
  - name: heating_cooling_standard_amount_new_york_city
    kind: parameter
    dtype: Money
    unit: USD
    source: 18 NYCRR 387.12(f)(3)(v)(a)
    versions:
      - effective_from: '2025-10-01'
        formula: '1062'
  - name: heating_cooling_standard_amount_nassau_suffolk
    kind: parameter
    dtype: Money
    unit: USD
    source: 18 NYCRR 387.12(f)(3)(v)(a)
    versions:
      - effective_from: '2025-10-01'
        formula: '988'
  - name: heating_cooling_standard_amount_rest_of_state
    kind: parameter
    dtype: Money
    unit: USD
    source: 18 NYCRR 387.12(f)(3)(v)(a)
    versions:
      - effective_from: '2025-10-01'
        formula: '877'
  - name: snap_standard_utility_allowance
    kind: derived
    entity: SnapUnit
    dtype: Money
    period: Month
    unit: USD
    source: 18 NYCRR 387.12(f)(3)(v)(a)
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if snap_heating_cooling_standard_allowance_eligible:
              if household_resides_in_new_york_city:
                  heating_cooling_standard_amount_new_york_city
              else:
                  if household_resides_in_nassau_or_suffolk_county:
                      heating_cooling_standard_amount_nassau_suffolk
                  else:
                      heating_cooling_standard_amount_rest_of_state
          else: 0
