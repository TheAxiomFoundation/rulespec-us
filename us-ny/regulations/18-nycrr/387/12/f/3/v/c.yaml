format: rulespec/v1
module:
  summary: |-
    (c) The standard allowance for telephone consists of the cost for basic service for one telephone. The standard allowance for telephone is available to households which do not qualify for the standard allowance for heating/cooling or the standard allowance for utilities. As of October 1, [2024] 2025, but subject to subsequent adjustments as required by the USDA, the standard allowance for telephone for all SNAP applicant and recipient households residing in New York State is [$31] $32.
  source_verification:
    corpus_citation_path: us-ny/regulation/18-nycrr/387/12/f/3/v/c
    values:
      telephone_standard_allowance_amount: 32
imports:
  - us-ny:regulations/18-nycrr/387/12/f/3/v/a
  - us-ny:regulations/18-nycrr/387/12/f/3/v/b
rules:
  - name: sets_snap_telephone_utility_allowance
    kind: source_relation
    source: 18 NYCRR 387.12(f)(3)(v)(c)
    source_relation:
      type: sets
      target: us:regulations/7-cfr/273/9#snap_individual_utility_allowance_state_option
      authority: state
      value: us-ny:regulations/18-nycrr/387/12/f/3/v/c#snap_individual_utility_allowance
      basis:
        delegation: us:regulations/7-cfr/273/9#snap_state_standard_utility_allowance_delegation
  - name: telephone_standard_allowance_amount
    kind: parameter
    dtype: Money
    unit: USD
    source: 18 NYCRR 387.12(f)(3)(v)(c)
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          32
  - name: snap_telephone_standard_allowance_eligible
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 18 NYCRR 387.12(f)(3)(v)(c)
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_incurred_or_anticipated_basic_service_cost_for_one_telephone
          and not snap_heating_cooling_standard_allowance_eligible
          and not snap_utilities_standard_allowance_eligible
  - name: snap_individual_utility_allowance
    kind: derived
    entity: SnapUnit
    dtype: Money
    period: Month
    unit: USD
    source: 18 NYCRR 387.12(f)(3)(v)(c)
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if snap_heating_cooling_standard_allowance_eligible:
              0
          else:
              if snap_utilities_standard_allowance_eligible:
                  0
              else:
                  if household_incurred_or_anticipated_basic_service_cost_for_one_telephone:
                      telephone_standard_allowance_amount
                  else:
                      0
