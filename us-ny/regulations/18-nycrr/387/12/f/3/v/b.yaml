format: rulespec/v1
module:
  summary: |-
    New York's SNAP standard allowance for utilities is available to households
    billed separately from rent or mortgage for one or more listed utilities
    other than telephone and that do not qualify for the standard allowance for
    heating/cooling. Effective October 1, 2025, the monthly amounts are 419
    dollars for New York City, 388 dollars for Nassau or Suffolk Counties, and
    355 dollars for the rest of New York State.
  source_verification:
    corpus_citation_path: us-ny/regulation/18-nycrr/387/12/f/3/v/b
    values:
      utilities_standard_amount_new_york_city: 419
      utilities_standard_amount_nassau_suffolk: 388
      utilities_standard_amount_rest_of_state: 355
imports:
  - us-ny:regulations/18-nycrr/387/12/f/3/v/a
rules:
  - name: sets_snap_utilities_standard_allowance
    kind: source_relation
    source: 18 NYCRR 387.12(f)(3)(v)(b)
    source_relation:
      type: sets
      target: us:regulations/7-cfr/273/9#snap_limited_utility_allowance_state_option
      authority: state
      value: us-ny:regulations/18-nycrr/387/12/f/3/v/b#snap_limited_utility_allowance
      basis:
        delegation: us:regulations/7-cfr/273/9#snap_state_standard_utility_allowance_delegation
  - name: snap_utilities_standard_allowance_eligible
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 18 NYCRR 387.12(f)(3)(v)(b)
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_billed_separately_for_non_telephone_standard_utility
          and not snap_heating_cooling_standard_allowance_eligible
  - name: utilities_standard_amount_new_york_city
    kind: parameter
    dtype: Money
    unit: USD
    source: 18 NYCRR 387.12(f)(3)(v)(b)
    versions:
      - effective_from: '2025-10-01'
        formula: '419'
  - name: utilities_standard_amount_nassau_suffolk
    kind: parameter
    dtype: Money
    unit: USD
    source: 18 NYCRR 387.12(f)(3)(v)(b)
    versions:
      - effective_from: '2025-10-01'
        formula: '388'
  - name: utilities_standard_amount_rest_of_state
    kind: parameter
    dtype: Money
    unit: USD
    source: 18 NYCRR 387.12(f)(3)(v)(b)
    versions:
      - effective_from: '2025-10-01'
        formula: '355'
  - name: snap_limited_utility_allowance
    kind: derived
    entity: SnapUnit
    dtype: Money
    period: Month
    unit: USD
    source: 18 NYCRR 387.12(f)(3)(v)(b)
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if snap_utilities_standard_allowance_eligible:
              if household_resides_in_new_york_city:
                  utilities_standard_amount_new_york_city
              else:
                  if household_resides_in_nassau_or_suffolk_county:
                      utilities_standard_amount_nassau_suffolk
                  else:
                      utilities_standard_amount_rest_of_state
          else: 0
