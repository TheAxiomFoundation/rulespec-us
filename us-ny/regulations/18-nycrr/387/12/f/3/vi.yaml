format: rulespec/v1
module:
  summary: |-
    New York's homeless shelter provision allows homeless households that are
    not receiving free shelter throughout the month and that incur or reasonably
    expect to incur shelter costs to use the standard homeless shelter allowance
    as a shelter expense, unless verified actual shelter costs are higher.
  source_verification:
    corpus_citation_path: us-ny/regulation/18-nycrr/387/12/f/3/vi
imports:
  - us:policies/usda/snap/fy-2026-cola/deductions
rules:
  - name: restates_homeless_shelter_deduction
    kind: source_relation
    source: 18 NYCRR 387.12(f)(3)(vi)
    source_relation:
      type: restates
      target: us:policies/usda/snap/fy-2026-cola/deductions#snap_homeless_shelter_deduction
      authority: federal
  - name: snap_allowable_shelter_costs
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 18 NYCRR 387.12(f)(3)(vi)
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if all_household_members_experiencing_homelessness:
              if homeless_household_free_shelter_all_month: 0
              else:
                  if verified_higher_homeless_shelter_costs:
                      shelter_costs
                  else:
                      if homeless_household_has_shelter_costs:
                          snap_homeless_shelter_deduction
                      else: 0
          else: shelter_costs
