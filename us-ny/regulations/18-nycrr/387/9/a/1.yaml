format: rulespec/v1
module:
  summary: |-
    New York's SNAP residency provision requires residence in the geographic
    area served by the local department where the household files, while
    preserving the federal rule that a permanent dwelling or fixed mailing
    address cannot be required.
  source_verification:
    corpus_citation_path: us-ny/regulation/18-nycrr/387/9/a/1
imports:
  - us:regulations/7-cfr/273/3
rules:
  - name: restates_state_residency
    kind: source_relation
    source: 18 NYCRR 387.9(a)(1)
    source_relation:
      type: restates
      target: us:regulations/7-cfr/273/3#snap_household_residency_eligible
      authority: federal
