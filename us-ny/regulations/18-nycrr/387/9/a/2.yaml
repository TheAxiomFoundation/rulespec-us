format: rulespec/v1
module:
  summary: |-
    New York's SNAP citizenship and eligible-alien provision restates that SNAP
    participants must be United States citizens or eligible aliens. The
    executable member-level citizenship and alien-status eligibility rules are
    imported from 7 CFR 273.4.
  source_verification:
    corpus_citation_path: us-ny/regulation/18-nycrr/387/9/a/2
imports:
  - us:regulations/7-cfr/273/4
rules:
  - name: restates_citizenship_or_alien_status_eligibility
    kind: source_relation
    source: 18 NYCRR 387.9(a)(2)
    source_relation:
      type: restates
      target: us:regulations/7-cfr/273/4#snap_member_citizenship_or_alien_status_eligible
      authority: federal
