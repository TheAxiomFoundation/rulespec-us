format: rulespec/v1
module:
  summary: |-
    New York's SNAP income-standard regulation restates the federal gross and
    net income tests and annual USDA updates. Categorical eligibility is encoded
    in 18 NYCRR 387.14(a)(5); the executable federal income standards are
    imported from USDA FY 2026 SNAP COLA and 7 CFR 273.9.
  source_verification:
    corpus_citation_path: us-ny/regulation/18-nycrr/387/10
imports:
  - us:regulations/7-cfr/273/9
  - us:policies/usda/snap/fy-2026-cola/income-eligibility-standards
rules:
  - name: restates_gross_income_limit_130_percent_fpl
    kind: source_relation
    source: 18 NYCRR 387.10(a)(1)
    source_relation:
      type: restates
      target: us:policies/usda/snap/fy-2026-cola/income-eligibility-standards#snap_gross_income_limit_130_percent_fpl_48_states_dc
      authority: federal
  - name: restates_net_income_limit_100_percent_fpl
    kind: source_relation
    source: 18 NYCRR 387.10(a)(2)
    source_relation:
      type: restates
      target: us:policies/usda/snap/fy-2026-cola/income-eligibility-standards#snap_net_income_limit_100_percent_fpl_48_states_dc
      authority: federal
  - name: restates_standard_income_eligibility
    kind: source_relation
    source: 18 NYCRR 387.10(a)
    source_relation:
      type: restates
      target: us:regulations/7-cfr/273/9#snap_standard_income_eligible
      authority: federal
