format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/guidance/ssa/contribution-and-benefit-base/2026/block-1
  summary: |-
    The formula for determining the OASDI contribution and benefit base is set by law. The formula is applicable only if a cost-of-living increase becomes effective for December of the year in which a determination of the base would ordinarily be made. Because there is a cost-of-living increase for December 2025, the formula is applicable. The formula states that the base for any year Y after 1994 is equal to the 1994 base of $60,600 multiplied by the ratio of the national average wage index for year (Y-2) to that for 1992, with the result rounded to the nearest multiple of $300. If the result is less than the current base, the base is not reduced.

    Under the above formula, the base for 2026 shall be the 1994 base of $60,600 multiplied by the ratio of the national average wage index for 2024 to that for 1992, or, if larger, the 2025 base of $176,100. If the amount so determined is not a multiple of $300, it is rounded to the nearest multiple of $300.

    Calculation details| Amounts in formula | 1994 base | $60,600 | | --- | | 1992 average wage index | 22,935.42 | | 2024 average wage index | 69,846.57 | | Computation | $60,600 times 69,846.57 divided by 22,935.42 equals $184,548.71, which rounds to $184,500 | | Higher amount | $184,500 exceeds the base for 2025, so the base for 2026 is $184,500 |
rules:
  - name: base_year_contribution_and_benefit_base
    kind: parameter
    dtype: Money
    unit: USD
    source: Contribution and Benefit Base Determination, Base for 2026
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/guidance/ssa/contribution-and-benefit-base/2026/block-1
              excerpt: "the 1994 base of $60,600"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          60600
  - name: base_year_average_wage_index
    kind: parameter
    dtype: Decimal
    source: Contribution and Benefit Base Determination, calculation details
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/guidance/ssa/contribution-and-benefit-base/2026/block-1
              excerpt: "1992 average wage index | 22,935.42"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          22935.42
  - name: computation_year_average_wage_index
    kind: parameter
    dtype: Decimal
    source: Contribution and Benefit Base Determination, calculation details
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/guidance/ssa/contribution-and-benefit-base/2026/block-1
              excerpt: "2024 average wage index | 69,846.57"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          69846.57
  - name: prior_year_contribution_and_benefit_base
    kind: parameter
    dtype: Money
    unit: USD
    source: Contribution and Benefit Base Determination, Base for 2026
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/guidance/ssa/contribution-and-benefit-base/2026/block-1
              excerpt: "the 2025 base of $176,100"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          176100
  - name: contribution_and_benefit_base_rounding_multiple
    kind: parameter
    dtype: Money
    unit: USD
    source: Contribution and Benefit Base Determination, Method for determining the base
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/guidance/ssa/contribution-and-benefit-base/2026/block-1
              excerpt: "rounded to the nearest multiple of $300"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          300
  - name: wage_indexed_contribution_and_benefit_base
    kind: parameter
    dtype: Money
    unit: USD
    source: Contribution and Benefit Base Determination, Base for 2026
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/guidance/ssa/contribution-and-benefit-base/2026/block-1
              excerpt: "the base for 2026 shall be the 1994 base of $60,600 multiplied by the ratio of the national average wage index for 2024 to that for 1992"
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/guidance/ssa/contribution-and-benefit-base/2026/block-1
              excerpt: "$60,600 times 69,846.57 divided by 22,935.42 equals $184,548.71, which rounds to $184,500"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          floor(((base_year_contribution_and_benefit_base * computation_year_average_wage_index / base_year_average_wage_index) / contribution_and_benefit_base_rounding_multiple) + (1 / 2)) * contribution_and_benefit_base_rounding_multiple
  - name: contribution_and_benefit_base_under_section_230_of_social_security_act
    kind: parameter
    dtype: Money
    unit: USD
    source: Contribution and Benefit Base Determination, Base for 2026
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/guidance/ssa/contribution-and-benefit-base/2026/block-1
              excerpt: "or, if larger, the 2025 base of $176,100"
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/guidance/ssa/contribution-and-benefit-base/2026/block-1
              excerpt: "$184,500 exceeds the base for 2025, so the base for 2026 is $184,500"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          max(wage_indexed_contribution_and_benefit_base, prior_year_contribution_and_benefit_base)
