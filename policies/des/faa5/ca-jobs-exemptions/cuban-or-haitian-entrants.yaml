format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-az/manual/des/faa5/ca-jobs-exempt-cuban-or-haitian-entrants/block-1
  summary: |-
    Cubans or Haitians classified as Cuban or Haitian Entrants under Section 501(e) of the Refugee Education and Assistance Act of 1980 are considered qualified noncitizens. Cuban or Haitian Entrants who do not have the EAD and are CA mandatory Jobs referrals are temporarily exempt from referring to the Jobs Program.
rules:
  - name: cuban_haitian_entrant_jobs_referral_temporary_exemption_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: DES FAA5 CA Jobs Exempt Cuban or Haitian Entrants, Revision 51
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
