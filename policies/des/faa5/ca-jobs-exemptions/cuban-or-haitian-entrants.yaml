          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/manual/des/faa5/ca-jobs-exempt-cuban-or-haitian-entrants/block-1
              excerpt: "with the approved parolee status"
          - path: versions[0].formula
