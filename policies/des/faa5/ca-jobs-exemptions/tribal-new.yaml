format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-az/manual/des/faa5/ca-jobs-exempt-tribal-new/block-1
  summary: |-
    An enrolled tribal member who resides within the geographic area specified by a tribe as its Native Employment Work (NEW) Program area is exempt from Jobs participation.
rules:
  - name: tribal_new_program_area_exemption_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: REVISION 40, FAA5 CA Jobs exemptions, Tribal NEW
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/manual/des/faa5/ca-jobs-exempt-tribal-new/block-1
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-az/manual/des/faa5/ca-jobs-exempt-tribal-new/block-1
              excerpt: "02/01/16 - 03/31/16"
    versions:
      - effective_from: '2016-02-01'
        formula: |-
          person_is_enrolled_tribal_member
          and person_resides_in_tribe_specified_native_employment_work_program_area
