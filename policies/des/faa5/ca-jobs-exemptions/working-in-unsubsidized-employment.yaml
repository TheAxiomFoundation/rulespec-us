              excerpt: "Paid at least minimum wage"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/manual/des/faa5/ca-jobs-exempt-working-in-unsubsidized-emp/block-1
              excerpt: "Employment lasts at least 30 days"
          - path: versions[0].formula
            kind: import
            import:
              target: us-az:policies/des/faa5/ca-jobs-exemptions/working-in-unsubsidized-employment#minimum_average_weekly_work_hours_for_unsubsidized_employment_exemption
              output: minimum_average_weekly_work_hours_for_unsubsidized_employment_exemption
              hash: sha256:local
          - path: versions[0].formula
