format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-az/manual/des/faa5/ca-jobs-exempt-working-in-unsubsidized-emp/block-1
  summary: |-
    A participant working in unsubsidized employment is exempt from Jobs Program Participation when working an average of 30 hours or more per week, paid at least minimum wage, and the employment lasts at least 30 days.
rules:
  - name: minimum_average_weekly_work_hours_for_unsubsidized_employment_exemption
    kind: parameter
    dtype: Decimal
    source: DES FAA5 CA Jobs Exempt Working in Unsubsidized Employment, Revision 39
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-az/manual/des/faa5/ca-jobs-exempt-working-in-unsubsidized-emp/block-1
              excerpt: "Working an average of 30 hours or more per week"
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-az/manual/des/faa5/ca-jobs-exempt-working-in-unsubsidized-emp/block-1
              excerpt: "12/01/15 –01/31/16"
    versions:
      - effective_from: '2015-12-01'
        formula: |-
          30

  - name: minimum_employment_duration_days_for_unsubsidized_employment_exemption
    kind: parameter
    dtype: Count
    source: DES FAA5 CA Jobs Exempt Working in Unsubsidized Employment, Revision 39
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-az/manual/des/faa5/ca-jobs-exempt-working-in-unsubsidized-emp/block-1
              excerpt: "Employment lasts at least 30 days"
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-az/manual/des/faa5/ca-jobs-exempt-working-in-unsubsidized-emp/block-1
              excerpt: "12/01/15 –01/31/16"
    versions:
      - effective_from: '2015-12-01'
        formula: |-
          30

  - name: unsubsidized_employment_exemption_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: DES FAA5 CA Jobs Exempt Working in Unsubsidized Employment, Revision 39
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/manual/des/faa5/ca-jobs-exempt-working-in-unsubsidized-emp/block-1
              excerpt: "working in unsubsidized employment"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/manual/des/faa5/ca-jobs-exempt-working-in-unsubsidized-emp/block-1
