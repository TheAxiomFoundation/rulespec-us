      - effective_from: '2015-12-01'
        formula: |-
          working_in_unsubsidized_employment
          and average_weekly_work_hours >= minimum_average_weekly_work_hours_for_unsubsidized_employment_exemption
          and paid_at_least_minimum_wage
          and employment_duration_days >= minimum_employment_duration_days_for_unsubsidized_employment_exemption
