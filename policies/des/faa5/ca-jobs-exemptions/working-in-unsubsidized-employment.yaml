            import:
              target: us-az:policies/des/faa5/ca-jobs-exemptions/working-in-unsubsidized-employment#minimum_employment_duration_days_for_unsubsidized_employment_exemption
              output: minimum_employment_duration_days_for_unsubsidized_employment_exemption
              hash: sha256:local
          - path: versions[0].effective_from
