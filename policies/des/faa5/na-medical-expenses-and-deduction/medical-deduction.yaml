format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-az/manual/des/faa5/na-medical-expenses-and-deduction/block-2
  summary: |-
    Medical expenses are allowable as a deduction for NA budgetary units with elderly participants or participants with a disability; the expenses must belong to and be billed to the elderly or disabled participant. A $35 disregard is applied to the budgetary unit's combined medical expenses. When eligible, the unit receives the $145 Standard Medical Deduction, or the actual amount minus the $35 disregard when expenses exceed the SMD amount. Participants eligible for the deduction include elderly or disabled participants, qualifying deceased participants, and SSI recipients for expenses incurred from the later of the NA application date or SSI eligibility date.
rules:
  - name: medical_expense_disregard
    kind: parameter
    dtype: Money
    unit: USD
    source: Arizona DES FAA5 NA Medical Expenses and Deduction, block 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-az/manual/des/faa5/na-medical-expenses-and-deduction/block-2
              excerpt: "A $35 disregard is applied to the budgetary unit's combined medical expenses"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          35

  - name: standard_medical_deduction_gross_amount
    kind: parameter
    dtype: Money
    unit: USD
    source: Arizona DES FAA5 NA Medical Expenses and Deduction, block 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-az/manual/des/faa5/na-medical-expenses-and-deduction/block-2
              excerpt: "The SMD net amount is $145 ($180 minus the $35 disregard equals $145)."
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          180

  - name: standard_medical_deduction_net_amount
    kind: parameter
    dtype: Money
    unit: USD
    source: Arizona DES FAA5 NA Medical Expenses and Deduction, block 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-az/manual/des/faa5/na-medical-expenses-and-deduction/block-2
              excerpt: "The SMD net amount is $145"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          145

  - name: minimum_verified_expense_for_standard_medical_deduction
    kind: parameter
    dtype: Money
    unit: USD
    source: Arizona DES FAA5 NA Medical Expenses and Deduction, block 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-az/manual/des/faa5/na-medical-expenses-and-deduction/block-2
              excerpt: "At least $35.01 when using the SMD."
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          35.01

  - name: medical_expense_participant_is_deduction_eligible
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Arizona DES FAA5 NA Medical Expenses and Deduction, block 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/manual/des/faa5/na-medical-expenses-and-deduction/block-2
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-az/manual/des/faa5/na-medical-expenses-and-deduction/block-2
              excerpt: "eligible for a medical expense deduction when the budgetary unit's combined out-of-pocket medical expense is greater than $35"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          monthly_combined_out_of_pocket_medical_expenses > medical_expense_disregard
          and (
              (
                  budgetary_unit_includes_elderly_or_disabled_participant_with_medical_expenses
                  and medical_expenses_belong_to_and_are_billed_to_elderly_or_disabled_participant
              )
              or (
                  deceased_participant_would_have_been_eligible_in_month_expense_was_billed
                  and remaining_budgetary_unit_participants_are_legally_responsible_for_bill
              )
              or (
                  participant_is_eligible_for_and_receiving_ssi
                  and ssi_recipient_expenses_incurred_from_later_of_na_application_or_ssi_eligibility_begin_date
              )
          )

  - name: standard_medical_deduction_verification_met
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Arizona DES FAA5 NA Medical Expenses and Deduction, block 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/manual/des/faa5/na-medical-expenses-and-deduction/block-2
              excerpt: "FAA verifies the out-of-pocket medical expenses before allowing ... At least $35.01 when using the SMD."
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          verified_out_of_pocket_medical_expenses >= minimum_verified_expense_for_standard_medical_deduction

  - name: actual_medical_expense_verification_met
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Arizona DES FAA5 NA Medical Expenses and Deduction, block 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/manual/des/faa5/na-medical-expenses-and-deduction/block-2
              excerpt: "FAA verifies ... All expenses when the expenses exceed $180 per month."
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          verified_out_of_pocket_medical_expenses >= monthly_combined_out_of_pocket_medical_expenses

  - name: medical_deduction
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: Arizona DES FAA5 NA Medical Expenses and Deduction, block 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-az/manual/des/faa5/na-medical-expenses-and-deduction/block-2
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-az/manual/des/faa5/na-medical-expenses-and-deduction/block-2
              excerpt: "actual amount, minus the $35 disregard when expenses are more than the $145 SMD amount"
          - path: versions[0].formula
            kind: ordering
            source:
              corpus_citation_path: us-az/manual/des/faa5/na-medical-expenses-and-deduction/block-2
              excerpt: "The higher medical expense deduction is allowed for the benefit of the budgetary unit."
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          if medical_expense_participant_is_deduction_eligible:
              if monthly_combined_out_of_pocket_medical_expenses > standard_medical_deduction_gross_amount:
                  if actual_medical_expense_verification_met:
                      max(0, monthly_combined_out_of_pocket_medical_expenses - medical_expense_disregard)
                  else: 0
              else:
                  if standard_medical_deduction_verification_met:
                      standard_medical_deduction_net_amount
                  else: 0
          else: 0
