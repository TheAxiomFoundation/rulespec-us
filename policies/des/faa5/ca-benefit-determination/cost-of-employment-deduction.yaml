format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-az/manual/des/faa5/ca-benefit-determination/block-7
  summary: |-
    The COE is a $90 monthly deduction from the total countable gross earned income of each participant who is employed. Job-related expenses include transportation, uniforms, and mandatory payroll deductions.
rules:
  - name: cost_of_employment_monthly_deduction_amount
    kind: parameter
    dtype: Money
    unit: USD
    source: FAA5 CA Benefit Determination, Cost of Employment Deduction
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-az/manual/des/faa5/ca-benefit-determination/block-7
              excerpt: "$90 monthly deduction"
    versions:
      - effective_from: '2025-09-02'
        formula: |-
          90

  - name: cost_of_employment_deduction_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FAA5 CA Benefit Determination, Cost of Employment Deduction
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/manual/des/faa5/ca-benefit-determination/block-7
              excerpt: "calculated for each wage earner in the needy family"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/manual/des/faa5/ca-benefit-determination/block-7
              excerpt: "each participant who is employed"
    versions:
      - effective_from: '2025-09-02'
        formula: |-
          participant_is_in_needy_family
          and participant_is_employed

  - name: cost_of_employment_deduction
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: USD
    source: FAA5 CA Benefit Determination, Cost of Employment Deduction
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-az/manual/des/faa5/ca-benefit-determination/block-7
              excerpt: "$90 monthly deduction from the total countable gross earned income of each participant who is employed"
          - path: versions[0].formula
            kind: import
            import:
              target: us-az:policies/des/faa5/ca-benefit-determination/cost-of-employment-deduction#cost_of_employment_monthly_deduction_amount
              output: cost_of_employment_monthly_deduction_amount
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-az:policies/des/faa5/ca-benefit-determination/cost-of-employment-deduction#cost_of_employment_deduction_applies
              output: cost_of_employment_deduction_applies
              hash: sha256:local
    versions:
      - effective_from: '2025-09-02'
        formula: |-
          if cost_of_employment_deduction_applies: cost_of_employment_monthly_deduction_amount else: 0
