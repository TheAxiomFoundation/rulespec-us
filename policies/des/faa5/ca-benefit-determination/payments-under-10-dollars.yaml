format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-az/manual/des/faa5/ca-benefit-determination/block-11
  summary: |-
    When a budgetary unit is prospectively eligible with a payment amount under $10, the case is designated as eligible no pay. The CA budgetary unit is eligible to receive Jobs Program Supportive Services and Child and Community Services Division (CCSD) services. CA renewal interviews are still required for eligible no pay CA cases. Supplemental payments cannot be issued unless regular benefits and supplemental benefits total $10 or more.
imports:
  - us-az:policies/des/faa5/ca-benefit-determination/payment-standard-test#ca_payment_standard_net_unrounded_payment
  - us-az:policies/des/faa5/ca-benefit-determination/payment-standard-test#ca_prospective_eligibility_requirements_met
rules:
