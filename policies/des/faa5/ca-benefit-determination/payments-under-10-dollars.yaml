    kind: parameter
    dtype: Money
    unit: USD
    source: FAA5 CA Benefit Determination, Payments Under $10
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-az/manual/des/faa5/ca-benefit-determination/block-11
              excerpt: "payment amount under $10"
    versions:
      - effective_from: '2025-09-02'
        formula: |-
