format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-az/manual/des/faa5/ca-jobs-work-program-requirements/block-1
  summary: |-
    REVISION 51 (01/01/23 - 12/31/23). All of the following are required to participate in the Jobs Program unless exempt: all CA participants; CA participants disqualified due to being a fleeing felon; CA participants disqualified due to a felony drug conviction.
rules:
  - name: ca_jobs_program_participation_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: DES FAA5, CA Jobs Work Program Requirements, Revision 51
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-az/manual/des/faa5/ca-jobs-work-program-requirements/block-1
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-az/manual/des/faa5/ca-jobs-work-program-requirements/block-1
              excerpt: "REVISION 51 (01/01/23 - 12/31/23)"
    versions:
      - effective_from: '2023-01-01'
        formula: |-
          (
            ca_participant
            or ca_participant_disqualified_due_to_being_fleeing_felon
            or ca_participant_disqualified_due_to_felony_drug_conviction
          )
          and not ca_participant_is_jobs_exempt
