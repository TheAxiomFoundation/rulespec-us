format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-az/manual/des/faa5/na-child-support-expense/block-2
  summary: |-
    Allowable NA child support expenses include court-ordered child or cash medical support paid to an agency or court, DCSS-added recurring arrearages verified as paid, certain nonrecurring lump-sum payments in the month paid, and court-ordered third-party payments. The deduction is the lesser of the court-ordered amount and the verified amount actually paid, subject to stated arrearage/clearinghouse-fee exceptions; spousal maintenance is not allowable.
rules:
  - name: allowable_child_support_expense_amount
    kind: derived
    entity: Payment
    dtype: Money
    period: Month
    unit: USD
    source: DES FAA5 NA Child Support Expense, allowable deductions
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-az/manual/des/faa5/na-child-support-expense/block-2
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/manual/des/faa5/na-child-support-expense/block-2
              excerpt: "Court-ordered child support or cash medical support payments made by a participant to an agency ... or to the court."
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/manual/des/faa5/na-child-support-expense/block-2
              excerpt: "Recurring arrearage amounts ... added to the court order by DCSS."
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/manual/des/faa5/na-child-support-expense/block-2
              excerpt: "Recurring legally owed child or cash medical support arrearages are allowable only when the expense has been verified as paid."
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/manual/des/faa5/na-child-support-expense/block-2
              excerpt: "Nonrecurring lump sum child or cash medical support expenses are allowable in the month the expense is paid."
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-az/manual/des/faa5/na-child-support-expense/block-2
              excerpt: "only the court-ordered amount is allowed unless the expense includes recurring child or cash medical support arrearages or clearinghouse fees."
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/manual/des/faa5/na-child-support-expense/block-2
              excerpt: "The participant may pay their legally owed child support or cash medical support payment to a third party in place of the cash payment in accordance with the court order."
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-az/manual/des/faa5/na-child-support-expense/block-2
              excerpt: "Payment of spousal maintenance (also known as alimony) is not an allowable expense."
          - path: versions[0].formula
            kind: ordering
            source:
              corpus_citation_path: us-az/manual/des/faa5/na-child-support-expense/block-2
              excerpt: "The deduction amount is the lesser of ... The court-ordered amount ... The verified amount actually paid"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if payment_is_recurring_arrearage_added_to_court_order_by_dcss and recurring_arrearage_expense_verified_as_paid: verified_amount_actually_paid_excluding_spousal_maintenance else: if payment_is_nonrecurring_lump_sum_child_or_cash_medical_support_expense_paid_in_month and payment_includes_recurring_arrearages_or_clearinghouse_fees: verified_amount_actually_paid_excluding_spousal_maintenance else: if payment_is_court_ordered_child_or_cash_medical_support_to_agency_or_court or payment_is_nonrecurring_lump_sum_child_or_cash_medical_support_expense_paid_in_month or payment_is_third_party_child_or_cash_medical_support_payment_in_accordance_with_court_order: min(monthly_court_order_amount, verified_amount_actually_paid_excluding_spousal_maintenance) else: 0
