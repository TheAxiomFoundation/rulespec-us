format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-az/manual/des/faa5/na-categorical-eligibility/block-5
  summary: |-
    "gross income exceeds 185% of the current FPL"; "eligible for at least the minimum NA allotment"; "three or more participant budgetary units are not eligible for at least the minimum NA allotment"; "reduced to less than the minimum NA allotment, as a result of NA proration"
imports:
  - us-az:policies/des/faa5/na-categorical-eligibility/expanded-categorical-eligibility#expanded_categorical_eligibility_fpl_limit_rate
rules:
  - name: minimum_allotment_actual_benefit_participant_cutoff
    kind: parameter
    dtype: Count
    source: Arizona DES FAA5 NA Categorical Eligibility, Categorical Eligibility Benefit Calculation
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-az/manual/des/faa5/na-categorical-eligibility/block-5
              excerpt: three or more participant budgetary units
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          3

  - name: basic_categorically_eligible_budgetary_unit_income_within_net_income_standard
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Arizona DES FAA5 NA Categorical Eligibility, Categorical Eligibility Benefit Calculation
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-az/manual/des/faa5/na-categorical-eligibility/block-5
              excerpt: compares the income of an NA basic categorically eligible budgetary unit against the Net Income Standard
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          budgetary_unit_is_na_basic_categorically_eligible
          and net_income <= net_income_standard_amount

  - name: expanded_categorical_eligibility_blocked_by_gross_income_limit
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Arizona DES FAA5 NA Categorical Eligibility, Categorical Eligibility Benefit Calculation
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/manual/des/faa5/na-categorical-eligibility/block-5
              excerpt: gross income exceeds 185% of the current FPL
          - path: versions[0].formula
            kind: import
            import:
              target: us-az:policies/des/faa5/na-categorical-eligibility/expanded-categorical-eligibility#expanded_categorical_eligibility_fpl_limit_rate
              output: expanded_categorical_eligibility_fpl_limit_rate
              hash: sha256:c422e733ca353c9a207bfad53e8e3683e8f1fddf325faa5a82d8336d82022dd0
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          budgetary_unit_is_considered_for_na_expanded_categorical_eligibility
          and gross_income > expanded_categorical_eligibility_fpl_limit_rate * current_federal_poverty_level_amount

  - name: na_categorically_eligible_for_benefit_calculation
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Arizona DES FAA5 NA Categorical Eligibility, Categorical Eligibility Benefit Calculation
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/manual/des/faa5/na-categorical-eligibility/block-5
              excerpt: When the budgetary unit's gross income exceeds 185% of the current FPL, the budgetary unit is not categorically eligible.
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/manual/des/faa5/na-categorical-eligibility/block-5
              excerpt: NA categorically eligible budgetary units
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          budgetary_unit_is_na_basic_categorically_eligible
          or (
            budgetary_unit_is_considered_for_na_expanded_categorical_eligibility
            and not expanded_categorical_eligibility_blocked_by_gross_income_limit
          )

  - name: categorically_eligible_budgetary_unit_eligible_for_minimum_allotment
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Arizona DES FAA5 NA Categorical Eligibility, Categorical Eligibility Benefit Calculation
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/manual/des/faa5/na-categorical-eligibility/block-5
              excerpt: eligible for at least the minimum NA allotment
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-az/manual/des/faa5/na-categorical-eligibility/block-5
              excerpt: three or more participant budgetary units are not eligible for at least the minimum NA allotment
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          na_categorically_eligible_for_benefit_calculation
          and number_of_participants_in_budgetary_unit < minimum_allotment_actual_benefit_participant_cutoff

  - name: categorically_eligible_three_or_more_participant_unit_must_receive_actual_benefit_amount
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Arizona DES FAA5 NA Categorical Eligibility, Categorical Eligibility Benefit Calculation
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-az/manual/des/faa5/na-categorical-eligibility/block-5
              excerpt: These budgetary units must receive the actual amount of benefits.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          na_categorically_eligible_for_benefit_calculation
          and number_of_participants_in_budgetary_unit >= minimum_allotment_actual_benefit_participant_cutoff

  - name: na_benefit_amount_after_categorical_eligibility_minimum_allotment_rule
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: Arizona DES FAA5 NA Categorical Eligibility, Categorical Eligibility Benefit Calculation
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-az/manual/des/faa5/na-categorical-eligibility/block-5
              excerpt: Benefits are calculated based on NA income criteria.
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/manual/des/faa5/na-categorical-eligibility/block-5
              excerpt: eligible for at least the minimum NA allotment
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-az/manual/des/faa5/na-categorical-eligibility/block-5
              excerpt: These budgetary units must receive the actual amount of benefits.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if categorically_eligible_three_or_more_participant_unit_must_receive_actual_benefit_amount: max(0, actual_benefit_amount_based_on_na_income_criteria) else: if categorically_eligible_budgetary_unit_eligible_for_minimum_allotment: max(max(0, actual_benefit_amount_based_on_na_income_criteria), minimum_na_allotment_amount) else: max(0, actual_benefit_amount_based_on_na_income_criteria)

  - name: eligible_no_pay_status_due_to_na_proration
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Arizona DES FAA5 NA Categorical Eligibility, Categorical Eligibility Benefit Calculation
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/manual/des/faa5/na-categorical-eligibility/block-5
              excerpt: benefits that are reduced to less than the minimum NA allotment, as a result of NA proration
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          benefits_reduced_as_result_of_na_proration
          and prorated_na_benefit_amount < minimum_na_allotment_amount
