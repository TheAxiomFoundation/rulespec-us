format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-az/manual/des/faa5/na-categorical-eligibility/block-4
  summary: Expanded categorical eligibility (ECE) exists when gross income does not
    exceed 185% of the current FPL, the NA budgetary unit does not meet BCE requirements,
    the resources of participants with certain disqualifications are not over the
    NA resource limit, and the budgetary unit does not have a participant who has
    a disqualification. AZTECS automatically considers an NA ECE budgetary unit to
    have met resources and gross and net income tests.
rules:
- name: expanded_categorical_eligibility_fpl_limit_rate
  kind: parameter
  dtype: Rate
  source: Arizona DES FAA5 NA Categorical Eligibility, Expanded Categorical Eligibility
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-az/manual/des/faa5/na-categorical-eligibility/block-4
          excerpt: Gross income does not exceed 185% of the current federal poverty
            level (FPL)
  versions:
  - effective_from: '0001-01-01'
    formula: '1.85'
- name: gross_income_within_expanded_categorical_eligibility_fpl_limit
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: Arizona DES FAA5 NA Categorical Eligibility, Expanded Categorical Eligibility
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-az/manual/des/faa5/na-categorical-eligibility/block-4
          excerpt: Gross income does not exceed 185% of the current federal poverty
            level (FPL)
  versions:
  - effective_from: '0001-01-01'
    formula: gross_income <= expanded_categorical_eligibility_fpl_limit_rate * current_federal_poverty_level_amount
- name: budgetary_unit_does_not_meet_basic_categorical_eligibility_requirements
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: Arizona DES FAA5 NA Categorical Eligibility, Expanded Categorical Eligibility
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-az/manual/des/faa5/na-categorical-eligibility/block-4
          excerpt: The NA budgetary unit does not meet basic categorical eligibility
            (BCE) requirements
  versions:
  - effective_from: '0001-01-01'
    formula: not budgetary_unit_meets_basic_categorical_eligibility_requirements
- name: disqualified_participant_resources_not_over_na_resource_limit
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: Arizona DES FAA5 NA Categorical Eligibility, Expanded Categorical Eligibility
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-az/manual/des/faa5/na-categorical-eligibility/block-4
          excerpt: The resources of participants with certain disqualifications are
            not over the NA resource limit
  versions:
  - effective_from: '0001-01-01'
    formula: resources_of_participants_with_certain_disqualifications_are_not_over_na_resource_limit
- name: no_participant_has_disqualification_that_blocks_expanded_categorical_eligibility
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: Arizona DES FAA5 NA Categorical Eligibility, Expanded Categorical Eligibility
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-az/manual/des/faa5/na-categorical-eligibility/block-4
          excerpt: The budgetary unit does not have a participant who has a disqualification
  versions:
  - effective_from: '0001-01-01'
    formula: not budgetary_unit_has_participant_with_disqualification
- name: na_expanded_categorical_eligibility
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: Arizona DES FAA5 NA Categorical Eligibility, Expanded Categorical Eligibility
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-az/manual/des/faa5/na-categorical-eligibility/block-4
  versions:
  - effective_from: '0001-01-01'
    formula: 'gross_income_within_expanded_categorical_eligibility_fpl_limit

      and budgetary_unit_does_not_meet_basic_categorical_eligibility_requirements

      and disqualified_participant_resources_not_over_na_resource_limit

      and no_participant_has_disqualification_that_blocks_expanded_categorical_eligibility'
