format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-az/manual/des/faa5/na-categorical-eligibility/block-3
  summary: 'Basic categorical eligibility (BCE) exists when the budgetary unit does
    not have a participant meeting certain disqualification criteria, and all budgetary
    unit participants receive listed TANF, Grant Diversion, Kinship Foster Care, Tribal
    TANF, RCA, BIA General Assistance, SSI, or BIA GA and SSI benefits/statuses.

    NOTE Budgetary units that include SSI participants who are in suspended status
    for failure to comply with a drug and alcohol treatment requirement are not considered
    to be in BCE.'
rules:
- name: member_of_budgetary_unit
  kind: data_relation
  data_relation:
    predicate: member_of_budgetary_unit
    arity: 2
    arguments:
    - Person
    - Household
  source: Arizona DES FAA5 NA Categorical Eligibility, Basic Categorical Eligibility
  metadata:
    proof:
      atoms:
      - path: data_relation
        kind: definition
        source:
          corpus_citation_path: us-az/manual/des/faa5/na-categorical-eligibility/block-3
- name: participant_receives_tanf_cash_assistance_benefit_for_bce
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: Arizona DES FAA5 NA Categorical Eligibility, Basic Categorical Eligibility
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: definition
        source:
          corpus_citation_path: us-az/manual/des/faa5/na-categorical-eligibility/block-3
  versions:
  - effective_from: '0001-01-01'
    formula: 'participant_receives_tanf_cash_assistance_benefit

      or participant_is_cash_assistance_eligible_but_no_cash_assistance_benefit_is_paid

      or participant_has_any_cash_assistance_benefit_recouped_for_overpayment'
- name: participant_receives_bce_qualifying_benefit_or_status
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: Arizona DES FAA5 NA Categorical Eligibility, Basic Categorical Eligibility
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-az/manual/des/faa5/na-categorical-eligibility/block-3
  versions:
  - effective_from: '0001-01-01'
    formula: 'participant_receives_tanf_cash_assistance_benefit_for_bce

      or participant_receives_tanf_services

      or participant_receives_grant_diversion

      or participant_receives_kinship_foster_care

      or participant_receives_tribal_tanf

      or participant_receives_refugee_cash_assistance

      or participant_receives_bia_general_assistance

      or participant_receives_ssi

      or participant_ssi_benefits_are_in_no_pay_status

      or participant_ssi_benefits_are_in_suspend_status'
- name: no_budgetary_unit_participant_meets_bce_disqualification_criterion
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: Arizona DES FAA5 NA Categorical Eligibility, Basic Categorical Eligibility
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-az/manual/des/faa5/na-categorical-eligibility/block-3
  versions:
  - effective_from: '0001-01-01'
    formula: count_where(member_of_budgetary_unit, participant_meets_categorical_eligibility_disqualification_criterion)
      == 0
- name: all_budgetary_unit_participants_receive_listed_bce_benefit_or_status
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: Arizona DES FAA5 NA Categorical Eligibility, Basic Categorical Eligibility
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-az/manual/des/faa5/na-categorical-eligibility/block-3
  versions:
  - effective_from: '0001-01-01'
    formula: count_where(member_of_budgetary_unit, participant_receives_bce_qualifying_benefit_or_status)
      == len(member_of_budgetary_unit)
- name: budgetary_unit_includes_ssi_participant_suspended_for_drug_alcohol_treatment_noncompliance
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: Arizona DES FAA5 NA Categorical Eligibility, Basic Categorical Eligibility
    note
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-az/manual/des/faa5/na-categorical-eligibility/block-3
  versions:
  - effective_from: '0001-01-01'
    formula: count_where(member_of_budgetary_unit, participant_ssi_suspended_for_failure_to_comply_with_drug_and_alcohol_treatment_requirement)
      > 0
- name: na_basic_categorical_eligibility
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: Arizona DES FAA5 NA Categorical Eligibility, Basic Categorical Eligibility
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-az/manual/des/faa5/na-categorical-eligibility/block-3
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-az/manual/des/faa5/na-categorical-eligibility/block-3
  versions:
  - effective_from: '0001-01-01'
    formula: 'no_budgetary_unit_participant_meets_bce_disqualification_criterion

      and all_budgetary_unit_participants_receive_listed_bce_benefit_or_status

      and not budgetary_unit_includes_ssi_participant_suspended_for_drug_alcohol_treatment_noncompliance'
