format: rulespec/v1
module:
  proof_validation:
    required: true
  summary: |-
    USDA SNAP FY 2026 cost-of-living adjustments set deductions for the
    48 states and the District of Columbia effective October 1, 2025 through
    September 30, 2026. The standard deductions are 209, 209, 209, 223,
    261, and 299 for household sizes 1, 2, 3, 4, 5, and 6 or more. The
    same table sets Alaska standard deductions at 358, 358, 358, 358, 358,
    and 374; Guam at 420, 420, 420, 445, 522, and 598; Hawaii at 295, 295,
    295, 295, 300, and 344; and the Virgin Islands at 184, 184, 185, 223,
    261, and 299. The maximum excess shelter deductions are 744, 1189, 873,
    1003, and 586 for the 48 states and District of Columbia, Alaska, Guam,
    Hawaii, and the Virgin Islands. The homeless shelter deduction is 198.99.
    The maximum asset limits are 4500 for households with at least one member
    age 60 or older or disabled, and 3000 for all other households.
  source_verification:
    corpus_citation_path: us/guidance/usda/fns/snap-fy2026-cola/page-2
    values:
      snap_standard_deduction_48_states_dc_table:
        1: 209
        2: 209
        3: 209
        4: 223
        5: 261
        6: 299
      snap_standard_deduction_alaska_table:
        1: 358
        2: 358
        3: 358
        4: 358
        5: 358
        6: 374
      snap_standard_deduction_guam_table:
        1: 420
        2: 420
        3: 420
        4: 445
        5: 522
        6: 598
      snap_standard_deduction_hawaii_table:
        1: 295
