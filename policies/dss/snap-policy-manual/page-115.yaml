format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-115
  summary: |-
    ABAWDs can gain an additional 3 months of eligibility only if they regained eligibility by meeting the ABAWD work requirement and are no longer fulfilling it; the months must be consecutive and the provision may be used once in a 3-year period. Good cause may excuse missed hours when the absence is temporary. Discretionary exemptions are allotted each year based on 8% of the Agency's caseload ineligible because of the ABAWD Time Limit, and each exemption extends eligibility to one ABAWD for one month.
rules:
  - name: additional_abawd_eligibility_months
    kind: parameter
    dtype: Count
    source: SNAP Manual 8.20
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-115
              excerpt: "additional 3 months of eligibility"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          3

  - name: additional_abawd_eligibility_period_years
    kind: parameter
    dtype: Count
    source: SNAP Manual 8.20
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-115
              excerpt: "once in a 3-year period"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          3

  - name: discretionary_exemption_allotment_rate
    kind: parameter
    dtype: Rate
    source: SNAP Manual 8.22
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-115
              excerpt: "based on 8% of the Agency's caseload"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.08

  - name: months_extended_per_discretionary_exemption
    kind: parameter
    dtype: Count
    source: SNAP Manual 8.22
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-115
              excerpt: "extends eligibility to one ABAWD for one month"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1

  - name: additional_three_month_eligibility_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual 8.20
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-115
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-115
              excerpt: "must be used consecutively"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_abawd
          and regained_eligibility_by_meeting_abawd_work_requirement
          and no_longer_fulfilling_abawd_work_requirement
          and additional_three_months_are_used_consecutively
          and not already_used_additional_three_month_eligibility_in_current_three_year_period

  - name: good_cause_for_not_meeting_abawd_work_requirement
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual 8.21
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-115
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          illness_prevented_abawd_from_meeting_work_requirement
          or household_member_illness_required_abawd_presence
          or household_emergency_prevented_abawd_from_meeting_work_requirement
          or transportation_unavailable_to_meet_abawd_work_requirement
          or other_circumstance_beyond_abawd_control_prevented_work_requirement

  - name: considered_fulfilled_abawd_work_requirement_with_good_cause
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual 8.21
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-115
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          would_have_fulfilled_abawd_work_requirement_but_for_missed_hours
          and missed_hours_absence_is_temporary
          and good_cause_for_not_meeting_abawd_work_requirement

  - name: discretionary_exemptions_allotted
    kind: derived
    entity: Household
    dtype: Count
    period: Year
    source: SNAP Manual 8.22
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-115
              excerpt: "based on 8% of the Agency's caseload"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          floor(agency_caseload_ineligible_because_of_abawd_time_limit * discretionary_exemption_allotment_rate)

  - name: discretionary_exemption_extends_eligibility
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual 8.22
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-115
              excerpt: "would otherwise be ineligible because of the 3 in 36-month time limit"
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-115
              excerpt: "one ABAWD for one month"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_abawd
          and person_would_otherwise_be_ineligible_because_of_abawd_time_limit
          and discretionary_exemption_assigned_to_person_for_month
