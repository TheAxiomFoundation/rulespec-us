  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-277
  summary: |-
    As part of USDA FNS Performance Reporting System requirements, the Agency is responsible for conducting quality control reviews of SNAP households. QC reviews measure the validity of SNAP cases at the review date, support error-rate and liability determinations, corrective action, and bonus-funding eligibility. A sample of households is selected from categories including active SNAP cases, which are reviewed to determine eligibility and correct allotment by comparing review eligibility data against the master issuance file amount.
  deferred_reason: |-
    The source unit states administrative quality-control review purposes, objectives, and review methodology. It does not define a computable household, person, amount, threshold, eligibility condition, or relation supported by the available RuleSpec schema.
