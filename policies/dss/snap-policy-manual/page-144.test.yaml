- name: garnished unearned income payment requires court ordered debt diversion
  period: 2026-01
  input:
    us-sc:policies/dss/snap-policy-manual/page-144#input.payment_is_unearned_income: true
    ? us-sc:policies/dss/snap-policy-manual/page-144#input.payment_required_by_court_order_to_be_withheld_and_diverted_to_third_party_as_payment_on_debt
    : true
  output:
    us-sc:policies/dss/snap-policy-manual/page-144#garnished_unearned_income_payment: holds
- name: government and housing payment categories
  period: 2026-01
  input:
    us-sc:policies/dss/snap-policy-manual/page-144#input.payment_from_government_sponsored_program: true
    us-sc:policies/dss/snap-policy-manual/page-144#input.payment_is_governmental_rent_subsidy: false
    us-sc:policies/dss/snap-policy-manual/page-144#input.payment_is_governmental_housing_subsidy: true
  output:
    us-sc:policies/dss/snap-policy-manual/page-144#government_sponsored_program_payment: holds
    us-sc:policies/dss/snap-policy-manual/page-144#governmental_rent_or_housing_subsidy: holds
- name: home energy and federal non title iv energy assistance
  period: 2026-01
  input:
    us-sc:policies/dss/snap-policy-manual/page-144#input.payment_or_allowance_made_to_provide_energy_assistance: true
    us-sc:policies/dss/snap-policy-manual/page-144#input.payment_or_allowance_made_for_purpose_of_providing_energy_assistance: true
    us-sc:policies/dss/snap-policy-manual/page-144#input.payment_made_under_federal_law: true
    us-sc:policies/dss/snap-policy-manual/page-144#input.payment_made_under_part_a_of_title_iv_of_social_security_act: false
  output:
    us-sc:policies/dss/snap-policy-manual/page-144#home_energy_assistance_payment: holds
    us-sc:policies/dss/snap-policy-manual/page-144#energy_assistance_payment_under_federal_law_other_than_part_a_title_iv: holds
- name: remaining home energy excluded payment categories
  period: 2026-01
  input:
    us-sc:policies/dss/snap-policy-manual/page-144#input.payment_or_allowance_is_one_time_and_applied_for_on_as_needed_basis: true
    us-sc:policies/dss/snap-policy-manual/page-144#input.payment_made_under_federal_or_state_law: true
    ? us-sc:policies/dss/snap-policy-manual/page-144#input.payment_for_weatherization_or_emergency_repair_or_replacement_of_heating_or_cooling_devices
    : true
    ? us-sc:policies/dss/snap-policy-manual/page-144#input.payment_provided_through_hhs_low_income_home_energy_assistance_program
    : false
    ? us-sc:policies/dss/snap-policy-manual/page-144#input.payment_provided_through_community_services_administration_energy_crisis_assistance
    : true
    ? us-sc:policies/dss/snap-policy-manual/page-144#input.payment_provided_through_community_services_administration_crisis_intervention_program
    : false
    us-sc:policies/dss/snap-policy-manual/page-144#input.payment_is_hud_payment: true
    us-sc:policies/dss/snap-policy-manual/page-144#input.payment_paid_for_utilities: true
  output:
    us-sc:policies/dss/snap-policy-manual/page-144#one_time_weatherization_or_emergency_heating_cooling_payment: holds
    us-sc:policies/dss/snap-policy-manual/page-144#energy_assistance_payment_through_hhs_or_csa_crisis_program: holds
    us-sc:policies/dss/snap-policy-manual/page-144#hud_utility_payment: holds
