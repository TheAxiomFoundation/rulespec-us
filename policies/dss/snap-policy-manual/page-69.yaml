format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-69
  summary: |-
    SNAP households already receiving the SM deduction remain eligible at subsequent recertification if they declare medical expenses continue to exceed $35.00 per month; verification is not required unless the declaration is questionable or expenses exceed $210.00 per month. During certification, income changes are not verified when the source has not changed and the amount changed by $50 or less, unless information is incomplete, inaccurate, inconsistent or outdated; actual utility expenses are not verified when unchanged or changed by $25 or less, unless information is incomplete, inaccurate, inconsistent or outdated. Reported medical-expense changes require verification for new non-recurring or recurring expenses; recurring new expenses are rebudgeted if they increase the allotment, while decreases wait until the next mandatory rebudget.
rules:
  - name: sm_medical_expense_monthly_threshold
    kind: parameter
    dtype: Money
    period: Month
    unit: USD
    source: SNAP Manual page 69, subsequent recertification SM deduction threshold
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-69
              excerpt: "exceed $35.00 per month"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          35

  - name: sm_medical_expense_verification_monthly_threshold
    kind: parameter
    dtype: Money
    period: Month
    unit: USD
    source: SNAP Manual page 69, subsequent recertification verification threshold
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-69
              excerpt: "expenses that exceed $210.00 per month"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          210

  - name: income_change_verification_tolerance
    kind: parameter
    dtype: Money
    unit: USD
    source: SNAP Manual page 69, income-change verification exception
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-69
              excerpt: "amount has changed by $50 or less"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          50

  - name: actual_utility_expense_change_verification_tolerance
    kind: parameter
    dtype: Money
    unit: USD
    source: SNAP Manual page 69, actual utility expense verification exception
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-69
              excerpt: "changed by $25 or less"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          25

  - name: subsequent_recertification_sm_deduction_remains_eligible
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 69, SM deduction eligibility at subsequent recertification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-69
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-69
              excerpt: "exceed $35.00 per month"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_already_receiving_sm_deduction
          and household_declares_medical_expenses_continue_to_exceed_sm_medical_expense_monthly_threshold

  - name: subsequent_recertification_medical_expense_verification_required_for_sm_deduction
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 69, SM deduction medical-expense verification at subsequent recertification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-69
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-69
              excerpt: "expenses that exceed $210.00 per month"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_at_subsequent_recertification
          and household_already_receiving_sm_deduction
          and (medical_expense_declaration_is_questionable or monthly_medical_expenses > sm_medical_expense_verification_monthly_threshold)

  - name: income_change_verification_not_required_during_certification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 69, reported income-change verification exception during certification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-69
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-69
              excerpt: "changed by $50 or less"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          income_change_reported_during_certification_period
          and income_source_has_not_changed
          and income_amount_change <= income_change_verification_tolerance
          and not reported_information_is_incomplete
          and not reported_information_is_inaccurate
          and not reported_information_is_inconsistent
          and not reported_information_is_outdated

  - name: actual_utility_expense_change_verification_not_required_during_certification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 69, actual utility expense verification exception during certification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-69
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-69
              excerpt: "changed by $25 or less"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          actual_utility_expense_change_reported_during_certification_period
          and actual_utility_expense_change <= actual_utility_expense_change_verification_tolerance
          and not reported_information_is_incomplete
          and not reported_information_is_inaccurate
          and not reported_information_is_inconsistent
          and not reported_information_is_outdated

  - name: new_nonrecurring_medical_expense_verification_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 69, reported new non-recurring medical expense
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-69
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          medical_expense_change_reported
          and new_medical_expense_is_nonrecurring

  - name: new_nonrecurring_medical_expense_budgeted_at_annual_recertification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 69, reported new non-recurring medical expense budgeting
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-69
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          medical_expense_change_reported
          and new_medical_expense_is_nonrecurring

  - name: new_recurring_medical_expense_verification_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 69, reported new recurring medical expense
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-69
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          medical_expense_change_reported
          and new_medical_expense_is_recurring

  - name: case_rebudgeted_for_new_recurring_medical_expense
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 69, reported new recurring medical expense rebudgeting
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-69
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          medical_expense_change_reported
          and new_medical_expense_is_recurring
          and new_medical_expense_will_increase_allotment

  - name: medical_expense_decrease_action_deferred_until_next_mandatory_rebudget
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 69, reported medical expense change decreasing benefit
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-69
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          medical_expense_change_reported
          and reported_medical_expense_change_will_decrease_benefit
