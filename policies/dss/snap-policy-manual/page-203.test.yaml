- name: person_age_sixty_is_elderly_or_disabled_member
  period: 2026-01
  input:
    us-sc:policies/dss/snap-policy-manual/page-203#input.person_age_in_years: 60
    us-sc:policies/dss/snap-policy-manual/page-203#input.disabled_under_section_5_1_verification_prior_to_certification: false
  output:
    us-sc:policies/dss/snap-policy-manual/page-203#elderly_age_minimum: 60
    us-sc:policies/dss/snap-policy-manual/page-203#elderly_or_disabled_member: holds
- name: person_under_sixty_disabled_is_elderly_or_disabled_member
  period: 2026-01
  input:
    us-sc:policies/dss/snap-policy-manual/page-203#input.person_age_in_years: 45
    us-sc:policies/dss/snap-policy-manual/page-203#input.disabled_under_section_5_1_verification_prior_to_certification: true
  output:
    us-sc:policies/dss/snap-policy-manual/page-203#elderly_or_disabled_member: holds
- name: certified_household_loses_eligibility_on_substantial_winnings
  period: 2026-01
  input:
    us-sc:policies/dss/snap-policy-manual/page-203#input.household_certified_to_receive_snap_benefits: true
    ? us-sc:policies/dss/snap-policy-manual/page-203#input.any_individual_in_household_received_substantial_lottery_or_gambling_winnings
    : true
    us-sc:policies/dss/snap-policy-manual/page-203#input.household_had_substantial_lottery_or_gambling_winnings: true
    us-sc:policies/dss/snap-policy-manual/page-203#input.household_resources: 4499
    us-sc:policies/dss/snap-policy-manual/page-203#input.household_meets_income_eligibility_requirements: true
  output:
    us-sc:policies/dss/snap-policy-manual/page-203#substantial_winnings_reporting_deadline_day_after_change_month: 10
    us-sc:policies/dss/snap-policy-manual/page-203#allowable_resource_limit_for_regaining_eligibility: 4500
    us-sc:policies/dss/snap-policy-manual/page-203#household_loses_snap_eligibility_due_to_substantial_winnings: holds
    us-sc:policies/dss/snap-policy-manual/page-203#household_regains_eligibility_after_substantial_winnings: holds
    us-sc:policies/dss/snap-policy-manual/page-203#household_remains_ineligible_after_substantial_winnings: not_holds
- name: household_with_resources_at_limit_remains_ineligible
  period: 2026-01
  input:
    us-sc:policies/dss/snap-policy-manual/page-203#input.household_certified_to_receive_snap_benefits: false
    ? us-sc:policies/dss/snap-policy-manual/page-203#input.any_individual_in_household_received_substantial_lottery_or_gambling_winnings
    : false
    us-sc:policies/dss/snap-policy-manual/page-203#input.household_had_substantial_lottery_or_gambling_winnings: true
    us-sc:policies/dss/snap-policy-manual/page-203#input.household_resources: 4500
    us-sc:policies/dss/snap-policy-manual/page-203#input.household_meets_income_eligibility_requirements: true
  output:
    us-sc:policies/dss/snap-policy-manual/page-203#household_loses_snap_eligibility_due_to_substantial_winnings: not_holds
    us-sc:policies/dss/snap-policy-manual/page-203#household_regains_eligibility_after_substantial_winnings: not_holds
    us-sc:policies/dss/snap-policy-manual/page-203#household_remains_ineligible_after_substantial_winnings: holds
