format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-97
  summary: |-
    "(C) Drug Addiction and Alcohol Treatment and Rehabilitation Program Participants: A regular participant ... in a drug addiction or alcohol treatment and rehabilitation program ... (AD). (D) Employed: An employed or self-employed person working a minimum of 30 hours weekly or earning weekly wages at least equal to the Federal minimum wage multiplied by 30 hours ... migrant and seasonal farmworkers ... to begin employment within 30 days ... (EM). (E) TANF Recipients ... subject to and complying with TANF work activity requirements (WP). (F) Incapacitated: Recipients of SSI and persons who are physically or mentally incapable of engaging in gainful employment ... verification must be provided (IN). (G) Students: A student, age 18 and older, enrolled at least half-time (SP) ..."
rules:
  - name: employed_exemption_minimum_weekly_hours
    kind: parameter
    dtype: Decimal
    period: Week
    source: SNAP Manual page 97, paragraph D
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-97
              excerpt: "working a minimum of 30 hours weekly"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: employed_exemption_federal_minimum_wage_hour_multiplier
    kind: parameter
    dtype: Decimal
    period: Week
    source: SNAP Manual page 97, paragraph D
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-97
              excerpt: "Federal minimum wage multiplied by 30 hours"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: migrant_or_seasonal_farmworker_begin_employment_day_limit
    kind: parameter
    dtype: Count
    period: Day
    source: SNAP Manual page 97, paragraph D
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-97
              excerpt: "to begin employment within 30 days"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: student_exemption_minimum_age
    kind: parameter
    dtype: Count
    period: Year
    source: SNAP Manual page 97, paragraph G
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-97
              excerpt: "age 18 and older"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          18

  - name: drug_or_alcohol_treatment_participant_exemption_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 97, paragraph C
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-97
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_regular_participant_as_defined_by_program
          and person_participates_in_drug_addiction_or_alcohol_treatment_and_rehabilitation_program
          and (
            program_is_conducted_by_private_nonprofit_organization_or_institution
            or program_is_publicly_operated_community_mental_health_center
          )
          and program_meets_part_b_title_xix_public_health_service_act_criteria

  - name: employed_exemption_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Week
    source: SNAP Manual page 97, paragraph D
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-97
          - path: versions[0].formula
            kind: import
            import:
              target: us-sc:policies/dss/snap-policy-manual/page-97#employed_exemption_minimum_weekly_hours
              output: employed_exemption_minimum_weekly_hours
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-sc:policies/dss/snap-policy-manual/page-97#employed_exemption_federal_minimum_wage_hour_multiplier
              output: employed_exemption_federal_minimum_wage_hour_multiplier
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-sc:policies/dss/snap-policy-manual/page-97#migrant_or_seasonal_farmworker_begin_employment_day_limit
              output: migrant_or_seasonal_farmworker_begin_employment_day_limit
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_employed_or_self_employed
          and (
            weekly_hours_worked >= employed_exemption_minimum_weekly_hours
            or weekly_wages >= federal_minimum_wage * employed_exemption_federal_minimum_wage_hour_multiplier
            or (
              person_is_migrant_or_seasonal_farmworker
              and person_has_contract_or_similar_agreement_with_employer_or_crew_chief
              and days_until_employment_begins <= migrant_or_seasonal_farmworker_begin_employment_day_limit
            )
          )

  - name: tanf_work_activity_exemption_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 97, paragraph E
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-97
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_receives_tanf
          and person_is_subject_to_tanf_work_activity_requirements
          and person_complies_with_tanf_work_activity_requirements

  - name: incapacitated_exemption_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 97, paragraph F
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-97
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_receives_ssi
          or (
            person_is_physically_or_mentally_incapable_of_engaging_in_gainful_employment
            and (
              not disability_claim_is_questionable
              or disability_verification_provided
            )
          )

  - name: student_exemption_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 97, paragraph G
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-97
          - path: versions[0].formula
            kind: import
            import:
              target: us-sc:policies/dss/snap-policy-manual/page-97#student_exemption_minimum_age
              output: student_exemption_minimum_age
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_age >= student_exemption_minimum_age
          and person_is_student
          and person_is_enrolled_at_least_half_time_as_defined_by_school_program_or_institution
          and person_is_enrolled_in_recognized_school_secondary_or_adult_education
