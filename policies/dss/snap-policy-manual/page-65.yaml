format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-65
  summary: |-
    "Once a month, before the last Friday of the month, a file will be created that contains all active SNAP recipients who: are age 16 or older, effective the end of the calendar month; have a SSN; and have a participation code other than 'CO' or 'OU' on CHIP SEPA screen."
rules:
  - name: selected_for_monthly_new_hire_file
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p.65, New Hires
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-65
              excerpt: "all active SNAP recipients who: are age 16 or older, effective the end of the calendar month; have a SSN; and have a participation code other than 'CO' or 'OU'"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_active_snap_recipient
          and person_is_age_16_or_older_effective_end_of_calendar_month
          and person_has_ssn
          and not person_participation_code_is_co
          and not person_participation_code_is_ou
