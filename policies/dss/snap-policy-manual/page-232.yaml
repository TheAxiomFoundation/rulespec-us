format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-232
  summary: |-
    (L) Dismiss the fair hearing if the household fails to call, or otherwise attend, the hearing within 10 minutes of the scheduled date and time. The burden of proof in a fair hearing generally falls on the Economic Services worker or Economic Services supervisor.
rules:
  - name: fair_hearing_household_nonattendance_grace_period_minutes
    kind: parameter
    dtype: Integer
    source: SNAP Manual 18.9 responsibilities of hearing officer, item (L)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-232
              excerpt: "within 10 minutes of the scheduled date and time"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10

  - name: fair_hearing_dismissal_for_household_nonattendance_applies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: SNAP Manual 18.9 responsibilities of hearing officer, item (L)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-232
          - path: versions[0].formula
            kind: import
            import:
              target: us-sc:policies/dss/snap-policy-manual/page-232#fair_hearing_household_nonattendance_grace_period_minutes
              output: fair_hearing_household_nonattendance_grace_period_minutes
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_failed_to_call_or_otherwise_attend_fair_hearing
          and minutes_after_scheduled_hearing_time >= fair_hearing_household_nonattendance_grace_period_minutes
