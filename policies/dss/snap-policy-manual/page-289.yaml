format: rulespec/v1
module:
  status: entity_not_supported
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-289
  summary: Liability for payment will be established whenever there is a 95 percent
    statistical probability that, for the second or subsequent consecutive fiscal
    year, an Agency's payment error rate exceeds 105 percent of the national performance
    measure. The amount of the liability will be equal to the product of the Agency's
    allotments, the difference between the Agency's payment error rate and 6 percent,
    and 10 percent. State agencies may request appeal and good-cause relief for specified
    unusual events.
  deferred_outputs:
  - output: us-sc:policies/dss/snap-policy-manual/page-289#state_agency_payment_error_rate_liability
    reason: The operative legal subject is a State agency and the supported RuleSpec
      entity list has no StateAgency or equivalent administrative-agency entity; encoding
      on Household, Person, Payment, or another allowed entity would mis-scope the
      liability formula.
  - output: us-sc:policies/dss/snap-policy-manual/page-289#good_cause_relief_for_state_agency_liability
    reason: The relief claim and unusual-event showing are State-agency administrative
      determinations, but StateAgency is not a supported executable entity in this
      RuleSpec schema.
