format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-366
  summary: Verified Upon Receipt includes information obtained through IEVS from agencies
    administering programs and payment information received through CHIP or CHIP Interface.
    Veteran means a person who served in active military, naval, or air service and
    was discharged or released under conditions other than dishonorable. Work Registrant
    means a SNAP recipient non-exempt from SNAP Work Requirements and subject to disqualification
    for failure to comply without good cause. Work Registration is completed when
    recorded on the CHIP Employment Programs (EMPR) screen.
  deferred_outputs:
  - output: us-sc:policies/dss/snap-policy-manual/page-366#work_registration_completed
    reason: Generated rule used a local name that collides with a sibling RuleSpec
      export. This output is deferred until it can be encoded with a semantic branch-specific
      name without creating ambiguous sibling imports.
rules:
- name: payment_information_verified_upon_receipt
  kind: derived
  entity: Payment
  dtype: Judgment
  period: Month
  source: SNAP Manual page 366, "Verified Upon Receipt"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: definition
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-366
  versions:
  - effective_from: '0001-01-01'
    formula: 'payment_information_received_through_chip

      or payment_information_received_through_chip_interface'
- name: veteran
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: SNAP Manual page 366, "Veteran"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: definition
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-366
  versions:
  - effective_from: '0001-01-01'
    formula: 'person_served_in_active_military_naval_or_air_service

      and person_was_discharged_or_released_from_service

      and discharge_or_release_conditions_were_other_than_dishonorable'
- name: work_registrant
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: SNAP Manual page 366, "Work Registrant"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: definition
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-366
  versions:
  - effective_from: '0001-01-01'
    formula: 'person_is_snap_recipient

      and person_is_not_exempt_from_snap_work_requirements

      and person_is_subject_to_snap_disqualification_for_failure_to_comply_without_good_cause'
