format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-106
  summary: In the case of an applicant household, the Agency must determine if any
    household member subject to SNAP work requirements voluntarily quit his or her
    job or reduced his or her work effort within 60 days prior to the date of application.
    Upon determining that an individual voluntarily quit employment or reduced work
    effort, the Agency must determine if the voluntary quit or reduction of work effort
    was with good cause. In the case of an individual who is a member of an applicant
    household, if the voluntary quit or reduction in work effort was without good
    cause, the individual will be determined ineligible to participate and will be
    disqualified.
rules:
- name: applicant_household_voluntary_quit_lookback_days
  kind: parameter
  dtype: Count
  source: SNAP Manual page 106, voluntary quit or reduction of work effort determination
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-106
          excerpt: within 60 days prior to the date of application
  versions:
  - effective_from: '0001-01-01'
    formula: '60'
- name: applicant_member_voluntary_quit_or_reduction_review_required
  kind: derived
  entity: Person
  dtype: Judgment
  period: Day
  source: SNAP Manual page 106, applicant household voluntary quit or work effort
    review
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-106
      - path: versions[0].formula
        kind: import
        import:
          target: us-sc:policies/dss/snap-policy-manual/page-106#applicant_household_voluntary_quit_lookback_days
          output: applicant_household_voluntary_quit_lookback_days
          hash: sha256:local
  versions:
  - effective_from: '0001-01-01'
    formula: 'person_is_member_of_applicant_household

      and person_is_subject_to_snap_work_requirements

      and days_prior_to_application_of_quit_or_reduction <= applicant_household_voluntary_quit_lookback_days'
- name: applicant_member_voluntary_quit_or_reduction_disqualified
  kind: derived
  entity: Person
  dtype: Judgment
  period: Day
  source: SNAP Manual page 106, disqualification for applicant household member without
    good cause
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-106
  versions:
  - effective_from: '0001-01-01'
    formula: 'person_is_member_of_applicant_household

      and person_voluntarily_quit_employment_or_reduced_work_effort

      and not voluntary_quit_or_reduction_was_with_good_cause'
- name: applicant_member_ineligible_to_participate
  kind: derived
  entity: Person
  dtype: Judgment
  period: Day
  source: SNAP Manual page 106, applicant household member ineligibility after voluntary
    quit or reduction without good cause
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-106
      - path: versions[0].formula
        kind: import
        import:
          target: us-sc:policies/dss/snap-policy-manual/page-106#applicant_member_voluntary_quit_or_reduction_disqualified
          output: applicant_member_voluntary_quit_or_reduction_disqualified
          hash: sha256:local
  versions:
  - effective_from: '0001-01-01'
    formula: applicant_member_voluntary_quit_or_reduction_disqualified
- name: one_person_household_application_denied_for_voluntary_quit_or_reduction
  kind: derived
  entity: Person
  dtype: Judgment
  period: Day
  source: SNAP Manual page 106, one-person household denial when voluntary quit or
    reduction disqualification is imposed
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-106
  versions:
  - effective_from: '0001-01-01'
    formula: 'household_is_one_person_household

      and voluntary_quit_or_reduction_work_disqualification_imposed'
