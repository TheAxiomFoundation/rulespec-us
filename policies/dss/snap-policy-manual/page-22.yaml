format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-22
  summary: |-
    Economic Services workers should not take action on cases involving their own case, relatives, friends, co-workers, known associates, or other conflicts of interest; if such a case appears in SCOSA or interview rotation, the worker must notify a supervisor. Economic Services worker includes administrative, case management, certification/eligibility, E&T, workforce consultant, and other personnel with Economic Services system access.
rules:
  - name: economic_services_worker
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual § 1.7 Conflicts of Interest
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-22
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          worker_is_administrative_personnel
          or worker_is_case_management_personnel
          or worker_is_certification_or_eligibility_personnel
          or worker_is_employment_and_training_personnel
          or worker_is_workforce_consultant
          or worker_has_access_to_economic_services_eligibility_system

  - name: case_conflict_of_interest_exists
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual § 1.7 Conflicts of Interest
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-22
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          case_is_workers_own_case
          or case_involves_workers_relative
          or case_involves_workers_friend
          or case_involves_workers_coworker
          or case_involves_workers_known_associate
          or worker_has_other_conflict_of_interest_in_case

  - name: worker_must_not_take_action_on_case
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual § 1.7 Conflicts of Interest
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-22
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          economic_services_worker
          and case_conflict_of_interest_exists
          and (
            worker_would_access_case
            or worker_would_update_address
            or worker_would_carce_case_to_anyone
            or worker_would_make_change_affecting_eligibility
            or worker_would_make_case_notes
            or worker_would_make_collateral_contacts
          )

  - name: worker_must_notify_supervisor_of_potential_conflict
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual § 1.7 Conflicts of Interest
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-22
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          economic_services_worker
          and case_conflict_of_interest_exists
          and (
            worker_discovers_case_in_scosa
            or worker_discovers_case_in_interview_rotation
          )
