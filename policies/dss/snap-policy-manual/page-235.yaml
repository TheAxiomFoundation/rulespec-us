format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-235
  summary: |-
    In the event the hearing decision upholds the Agency action, any benefits continued pending the hearing will be discontinued beginning with the next scheduled issuance. When the hearing official decides in favor of the household, SNAP benefits will begin or be reinstated as required, and lost benefits must be issued as soon as possible. The household may appeal an adverse Fair Hearing Committee decision to the Administrative Law Court within 30 days.
rules:
  - name: fair_hearing_appeal_deadline_days
    kind: parameter
    dtype: Count
    source: SNAP Manual page 235, section 18.12
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-235
              excerpt: "within 30 days of the decision"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: continued_benefits_discontinued_next_issuance
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 235, Implementation of Fair Hearing decisions (A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-235
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          hearing_authority_upholds_agency_action
          and benefits_continued_pending_hearing

  - name: benefits_begin_or_reinstated_after_household_favorable_decision
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 235, Implementation of Fair Hearing decisions (B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-235
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          hearing_official_decides_in_favor_of_household

  - name: lost_benefits_due_issued_as_soon_as_possible
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 235, Implementation of Fair Hearing decisions (B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-235
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          hearing_official_decides_in_favor_of_household
          and lost_benefits_due_to_household

  - name: administrative_law_court_appeal_timely
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 235, section 18.12
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-235
          - path: versions[0].formula
            kind: import
            import:
              target: us-sc:policies/dss/snap-policy-manual/page-235#fair_hearing_appeal_deadline_days
              output: fair_hearing_appeal_deadline_days
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          fair_hearing_committee_decision_adverse
          and administrative_law_court_appeal_initiated
          and days_after_fair_hearing_committee_decision <= fair_hearing_appeal_deadline_days
