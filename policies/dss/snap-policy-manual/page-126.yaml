format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-126
  summary: |-
    Child care services are available for SNAP E&T participants for up to 52 weeks based on SC Voucher availability, with at least 20 hours per week participation or scheduled participation in a component. Rent assistance is available for participants in danger of eviction while participating in an allowable component, up to $1,000 one-time, excluding late fees and court costs. Technology support services are available for online SNAP E&T participants, up to three months of internet access and total one-time support not exceeding $225, excluding clients receiving technology support from a SNAP2WORK provider. DSS provides a 50% state match on transportation one-time component-related expense and retention services.
rules:
  - name: transportation_component_and_retention_state_match_rate
    kind: parameter
    dtype: Rate
    source: SNAP Manual page 126, transportation one-time component-related expense and retention services
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-126
              excerpt: "DSS will provide a 50% state match"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.50

  - name: child_care_voucher_max_weeks
    kind: parameter
    dtype: Count
    period: Week
    source: SNAP Manual page 126, paragraph (D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-126
              excerpt: "up to 52 weeks of child care"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          52

  - name: child_care_component_hours_per_week_minimum
    kind: parameter
    dtype: Count
    period: Week
    source: SNAP Manual page 126, paragraph (D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-126
              excerpt: "at least 20 hours per week"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          20

  - name: child_care_nonparticipation_day_limit
    kind: parameter
    dtype: Count
    period: Day
    source: SNAP Manual page 126, paragraph (D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-126
              excerpt: "fails to participate ... for 90 days"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          90

  - name: child_care_nonparticipation_month_limit
    kind: parameter
    dtype: Count
    period: Month
    source: SNAP Manual page 126, paragraph (D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-126
              excerpt: "3 consecutive months"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          3

  - name: rent_assistance_maximum
    kind: parameter
    dtype: Money
    unit: USD
    source: SNAP Manual page 126, paragraph (E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-126
              excerpt: "maximum assistance will be up to $1,000.00"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1000

  - name: technology_support_internet_month_limit
    kind: parameter
    dtype: Count
    period: Month
    source: SNAP Manual page 126, paragraph (F)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-126
              excerpt: "up to three months of internet access"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          3

  - name: technology_support_total_maximum
    kind: parameter
    dtype: Money
    unit: USD
    source: SNAP Manual page 126, paragraph (F)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-126
              excerpt: "cannot exceed $225.00"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          225

  - name: child_care_voucher_eligible
    kind: derived
    entity: Person
    dtype: Judgment
    period: Week
    source: SNAP Manual page 126, paragraph (D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-126
          - path: versions[0].formula
            kind: import
            import:
              target: us-sc:policies/dss/snap-policy-manual/page-126#child_care_component_hours_per_week_minimum
              output: child_care_component_hours_per_week_minimum
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          snap_et_participant
          and sc_vouchers_available
          and state_office_determines_child_care_eligible
          and (participating_in_snap_et_component or scheduled_to_begin_snap_et_component)
          and snap_et_component_hours_per_week >= child_care_component_hours_per_week_minimum

  - name: child_care_voucher_subject_to_loss_for_nonparticipation
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 126, paragraph (D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-126
          - path: versions[0].formula
            kind: import
            import:
              target: us-sc:policies/dss/snap-policy-manual/page-126#child_care_nonparticipation_day_limit
              output: child_care_nonparticipation_day_limit
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-sc:policies/dss/snap-policy-manual/page-126#child_care_nonparticipation_month_limit
              output: child_care_nonparticipation_month_limit
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          snap_et_participant_in_household_has_child_care_voucher
          and (
            allowable_snap_et_component_nonparticipation_days >= child_care_nonparticipation_day_limit
            or allowable_snap_et_component_nonparticipation_consecutive_months >= child_care_nonparticipation_month_limit
          )

  - name: rent_assistance_available
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 126, paragraph (E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-126
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          snap_et_participant
          and in_danger_of_eviction
          and participating_in_allowable_snap_et_component
          and rent_assistance_funds_available
          and state_office_approves_rent_assistance

  - name: rent_assistance_payable_amount
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: USD
    source: SNAP Manual page 126, paragraph (E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-126
          - path: versions[0].formula
            kind: import
            import:
              target: us-sc:policies/dss/snap-policy-manual/page-126#rent_assistance_maximum
              output: rent_assistance_maximum
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if rent_assistance_available: min(max(0, rent_assistance_requested_amount_excluding_late_fees_and_court_costs), rent_assistance_maximum) else: 0

  - name: technology_support_eligible
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 126, paragraph (F)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-126
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-126
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          snap_et_client
          and participating_in_online_snap_et_component
          and technology_support_funds_available
          and not receiving_technology_support_from_snap2work_provider

  - name: technology_support_payable_amount
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: USD
    source: SNAP Manual page 126, paragraph (F)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-126
          - path: versions[0].formula
            kind: import
            import:
              target: us-sc:policies/dss/snap-policy-manual/page-126#technology_support_total_maximum
              output: technology_support_total_maximum
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if technology_support_eligible: min(max(0, technology_support_requested_amount), technology_support_total_maximum) else: 0
