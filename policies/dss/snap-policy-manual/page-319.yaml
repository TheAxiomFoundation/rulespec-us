format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-319
  summary: |-
    If verification is not submitted by the end of the following month, benefits will be prorated from the date verification is received. When the agency sends the pending notice late, the household must be given at least 10 days to submit verification; if the last day is a holiday, the next day is timely, and agency-caused delay results in a full allotment outside the regular issuance cycle.
rules:
  - name: verification_timely_for_regular_issuance
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 319, Example #1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-319
              excerpt: "The household submits verification on June 28th. Case must be processed by June 30th to be timely."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          interview_completed
          and pending_notice_sent_on_interview_date
          and verification_submitted_by_end_of_month_following_interview

  - name: benefits_prorated_from_verification_received_date
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 319, introductory sentence and Example #2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-319
              excerpt: "Household submits verification on July 8th. Benefits are prorated from July 8th."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          interview_completed
          and pending_notice_sent_on_interview_date
          and not verification_submitted_by_end_of_month_following_interview
          and verification_submitted_after_end_of_month_following_interview

  - name: late_pending_notice_verification_timely
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 319, Example #3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-319
              excerpt: "The household must be given at least 10 days to submit verification."
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-319
              excerpt: "Since July 4th is a holiday, the verification will be considered timely received if submitted by July 5th."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          interview_completed
          and pending_notice_sent_after_interview_date
          and household_given_at_least_minimum_verification_response_period
          and verification_submitted_by_extended_due_date_or_next_day_after_holiday

  - name: agency_caused_delay_full_allotment_outside_regular_issuance
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 319, Example #3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-319
              excerpt: "The approval action however is untimely since the delay is agency caused."
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-319
              excerpt: "The household receives a full allotment of July benefits outside of the regular issuance cycle."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          late_pending_notice_verification_timely
          and approval_action_untimely_due_to_agency_caused_delay
