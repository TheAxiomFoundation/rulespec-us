format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-123
  summary: |-
    "OJT candidates must have the availability to follow instructions, locate information, comprehend new skills, and meet the minimum qualifications as required by the employer"; referral requires "an open position available that will not displace another worker" and participants meeting employer specifications. Education provides remedial and post-secondary education services for SNAP E&T participants.
rules:
  - name: ojt_candidate_minimum_qualified
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 123, OJT Candidate Qualifications
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-123
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          candidate_available_to_follow_instructions
          and candidate_available_to_locate_information
          and candidate_available_to_comprehend_new_skills
          and candidate_meets_employer_minimum_qualifications_for_training_position
  - name: ojt_candidate_referral_may_be_initiated
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 123, OJT Candidate Referral
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-123
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          open_position_available_for_potential_ojt_placement
          and ojt_placement_will_not_displace_another_worker
  - name: e_and_t_coordinator_refers_participant_to_employer
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 123, OJT Candidate Referral
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-123
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_snap_e_and_t_participant
          and participant_meets_employer_previously_identified_specifications
  - name: adult_education_services_available_to_snap_e_and_t_participant
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 123, Education
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-123
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_snap_e_and_t_participant
          and local_adult_education_office_provides_service
