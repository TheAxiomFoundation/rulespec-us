format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-161
  summary: |-
    "A shelter deduction will be allowed only in the month the expense is billed or otherwise becomes due... Amounts carried forward from past billing periods are not deductible... Households may elect to have an expense that is billed less often than monthly averaged... Only the following expenses are allowable shelter costs..."
rules:
  - name: elderly_or_disabled_disqualified_member_does_not_create_unlimited_shelter_deduction
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 161 note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-161
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_has_elderly_or_disabled_member_who_is_ineligible_noncitizen_or_ssn_disqualified
  - name: shelter_expense_allowed_in_month_billed_or_due
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 161, billed expenses
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-161
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          shelter_expense_is_billed_or_otherwise_due_in_month
          and not shelter_expense_amount_carried_forward_from_past_billing_period
  - name: monthly_rent_structure_rent_considered_each_month
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 161, billed expenses
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-161
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_occupies_residence_with_monthly_rent_structure
  - name: less_than_monthly_shelter_expense_averaging_allowed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 161, averaging shelter expenses
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-161
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_elects_to_average_shelter_expense
          and shelter_expense_is_billed_less_often_than_monthly
  - name: shelter_expense_with_no_scheduled_interval_averaging_allowed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 161, averaging shelter expenses
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-161
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_elects_to_average_shelter_expense
          and shelter_expense_has_no_scheduled_billing_interval
  - name: shelter_cost_allowable_continuing_charge
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 161, allowed shelter costs (A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-161
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          shelter_cost_is_continuing_charge_for_household_shelter
  - name: reverse_mortgage_shelter_cost_allowable
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 161, reverse mortgage note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-161
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          shelter_cost_is_reverse_mortgage
          and household_is_billed_for_reverse_mortgage_expense
  - name: shelter_cost_allowable_property_tax_or_assessment
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 161, allowed shelter costs (B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-161
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          shelter_cost_is_property_tax_or_state_or_local_assessment
  - name: shelter_cost_allowable_structure_insurance
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 161, allowed shelter costs (C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-161
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          shelter_cost_is_insurance_premium_on_structure_itself
          and not shelter_cost_is_separate_insurance_for_furniture_or_personal_belongings
  - name: shelter_cost_allowable_utility_or_telephone_service
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 161, allowed shelter costs (D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-161
              excerpt: "service fees for one telephone. NOTE: One-time deposits cannot be included."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          shelter_cost_is_fuel_utility_water_sewer_well_septic_garbage_trash_or_one_telephone_service_fee
          and not shelter_cost_is_one_time_deposit
