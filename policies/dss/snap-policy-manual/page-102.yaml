format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-102
  summary: '"Comply means to satisfy work registration"; the household initiates work
    registration by requesting to be added back to the budget or filing an application
    if the case is closed or recertification is due. Individuals may request fair
    hearings to appeal specified work-requirement actions. At the end of a mandatory
    disqualification period, participation may resume if the individual reapplies
    and is determined in compliance; during the period, participation may resume if
    otherwise eligible by becoming exempt from work requirements. Employment is suitable
    unless the offered wage is less than the highest applicable Federal or State minimum
    wage.'
rules:
- name: household_satisfies_work_registration
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: SNAP Manual 8.6 note, page 102
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: definition
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-102
  versions:
  - effective_from: '0001-01-01'
    formula: 'household_requested_to_be_added_back_to_budget

      or ((case_is_closed or recertification_is_due) and household_filed_application)'
- name: fair_hearing_request_right_for_work_requirement_action
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: SNAP Manual 8.7, page 102
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-102
  versions:
  - effective_from: '0001-01-01'
    formula: 'benefits_denied_reduced_or_terminated_due_to_nonexempt_status

      or benefits_denied_reduced_or_terminated_due_to_failure_to_comply_with_snap_work_requirements

      or agency_action_concerns_exemption_status

      or agency_action_concerns_type_of_work_requirement_imposed

      or agency_refused_to_find_good_cause_for_work_requirement_noncompliance'
- name: participation_may_resume_after_disqualification_period
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: SNAP Manual 8.8, page 102
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-102
  versions:
  - effective_from: '0001-01-01'
    formula: 'applicable_mandatory_disqualification_period_has_ended

      and disqualified_individual_applied_again

      and agency_determined_individual_in_compliance_with_work_requirements'
- name: participation_may_resume_during_disqualification_period
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: SNAP Manual 8.8, page 102
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-102
  versions:
  - effective_from: '0001-01-01'
    formula: 'individual_is_in_disqualification_period

      and individual_is_otherwise_eligible

      and individual_became_exempt_from_work_requirements'
- name: offered_employment_is_suitable_under_minimum_wage_rule
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: SNAP Manual 8.9(A), page 102
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-102
  versions:
  - effective_from: '0001-01-01'
    formula: offered_wage >= max(applicable_federal_minimum_wage, applicable_state_minimum_wage)
