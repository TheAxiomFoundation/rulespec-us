format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-80
  summary: |-
    c) A member of an Indian tribe as defined in Section 4(e) of the Indian Self-determination and Education Assistance Act... d) An American Indian born in Canada who possesses at least 50 per centum of blood of the American Indian race... e) Lawfully residing in the U.S. and was a member of a Hmong or Highland Laotian tribe at the time that the tribe rendered assistance to U.S. personnel... f) The spouse; or surviving spouse... g) An unmarried dependent child... h) An unmarried child... of such a deceased Hmong or Highland Laotian... i) An unmarried disabled child age 18 or older... j) Individuals who lawfully reside in the U.S. in accordance with section 141 of the Compacts of Free Association... k) An individual who is both a qualified non-citizen and an eligible non-citizen as defined in the charts below. A Qualified Non-Citizen is: 1. A non-citizen who is lawfully admitted for permanent residence under the INA... 2. ... conditional entry... 3. ... battered or subjected to extreme cruelty... 4. ... Cuban or Haitian entrant...
rules:
  - name: american_indian_blood_quantum_threshold
    kind: parameter
    dtype: Rate
    source: SNAP Manual page 80, paragraph d
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-80
              excerpt: "at least 50 per centum of blood of the American Indian race"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.50

  - name: indian_tribe_member_status
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 80, paragraph c
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-80
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          member_of_indian_tribe_recognized_for_special_programs_and_services

  - name: american_indian_born_in_canada_status
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 80, paragraph d
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-80
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-80
              excerpt: "at least 50 per centum of blood of the American Indian race"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          american_indian_born_in_canada
          and american_indian_blood_quantum >= american_indian_blood_quantum_threshold
          and ina_section_289_applies

  - name: hmong_or_highland_laotian_tribe_member_status
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 80, paragraph e
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-80
              excerpt: "Lawfully residing in the U.S. and was a member of a Hmong or Highland Laotian tribe"
          - path: versions[0].formula
            kind: effective_period
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-80
              excerpt: "during the Vietnam era (beginning August 5, 1964 and ending May 7, 1975)"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          lawfully_residing_in_us
          and member_of_hmong_or_highland_laotian_tribe_when_tribe_assisted_us_personnel
          and tribe_rendered_assistance_to_us_personnel_in_military_or_rescue_operation_during_vietnam_era

  - name: spouse_or_surviving_spouse_of_hmong_or_highland_laotian_status
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 80, paragraph f
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-80
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          spouse_of_hmong_or_highland_laotian
          or surviving_spouse_of_deceased_hmong_or_highland_laotian

  - name: unmarried_dependent_child_of_hmong_or_highland_laotian_status
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 80, paragraph g
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-80
              excerpt: "An unmarried dependent child of such Hmong or Highland Laotian who is under the age of 18 or if a full-time student under the age of 22"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          unmarried_dependent_child_of_hmong_or_highland_laotian
          and (child_is_under_age_18 or child_is_full_time_student_under_age_22)

  - name: unmarried_child_of_deceased_hmong_or_highland_laotian_status
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 80, paragraph h
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-80
              excerpt: "provided the child was dependent upon him or her at the time of his or her death"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          unmarried_child_of_deceased_hmong_or_highland_laotian
          and (child_is_under_age_18 or child_is_full_time_student_under_age_22)
          and child_was_dependent_on_hmong_or_highland_laotian_at_time_of_death

  - name: unmarried_disabled_adult_child_of_hmong_or_highland_laotian_status
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 80, paragraph i
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-80
              excerpt: "An unmarried disabled child age 18 or older if the child was disabled and dependent on a Hmong or Highland Laotian prior to the child's 18th birthday"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          unmarried_disabled_child_age_18_or_older
          and child_was_disabled_and_dependent_on_hmong_or_highland_laotian_prior_to_18th_birthday

  - name: compact_of_free_association_lawful_resident_status
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 80, paragraph j
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-80
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          lawfully_resides_in_us_under_section_141_compacts_of_free_association

  - name: qualified_non_citizen_status
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 80, qualified non-citizen chart items 1 through 4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-80
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          non_citizen_lawfully_admitted_for_permanent_residence_under_ina
          or non_citizen_granted_conditional_entry_under_ina_section_203_a_7_before_april_1_1980
          or non_citizen_battered_or_subject_to_extreme_cruelty_as_described
          or cuban_or_haitian_entrant_under_refugee_education_assistance_act_section_501_e

  - name: qualified_and_eligible_non_citizen_status
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 80, paragraph k
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-80
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          qualified_non_citizen_status
          and eligible_non_citizen_as_defined_in_charts_below

  - name: listed_non_citizen_status_on_page_80
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 80, paragraphs c through k
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-80
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          indian_tribe_member_status
          or american_indian_born_in_canada_status
          or hmong_or_highland_laotian_tribe_member_status
          or spouse_or_surviving_spouse_of_hmong_or_highland_laotian_status
          or unmarried_dependent_child_of_hmong_or_highland_laotian_status
          or unmarried_child_of_deceased_hmong_or_highland_laotian_status
          or unmarried_disabled_adult_child_of_hmong_or_highland_laotian_status
          or compact_of_free_association_lawful_resident_status
          or qualified_and_eligible_non_citizen_status
