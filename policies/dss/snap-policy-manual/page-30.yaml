format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-30
  summary: |-
    The SNAP application form is DSS Form 3800 and may be paper, online, or a recorded conversation. The form contains notification of the household's right to immediately file the application as long as it contains the applicant's name and address and the signature of a responsible household member or the household's authorized representative.
rules:
  - name: snap_application_immediately_fileable
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: SNAP Manual 3.3, SNAP Application Form, Content
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-30
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          application_contains_applicant_name
          and application_contains_applicant_address
          and (application_signed_by_responsible_household_member or application_signed_by_household_authorized_representative)
