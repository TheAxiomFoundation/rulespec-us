format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-216
  summary: |-
    The Agency may notify a household that benefits will be reduced or terminated no later than the allotment receipt date if the household's signed written report permits determining allotment or ineligibility, hearing and continuation rights are retained, and any required previous benefit level is continued within five working days of a hearing request. Individual notices of adverse action will not be provided for listed circumstances, including mass changes except when annual or seasonal federal benefit adjustments terminate or decrease SNAP benefits.
rules:
  - name: continued_previous_benefit_level_deadline_working_days
    kind: parameter
    dtype: Count
    source: SNAP Manual 216(F)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-216
              excerpt: "within five working days"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          5

  - name: previous_benefit_level_continuation_requirement_met
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 216(F)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-216
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not previous_benefit_level_continuation_required
          or (
            household_requested_fair_hearing
            and working_days_from_fair_hearing_request_to_previous_benefit_level_continuation <= continued_previous_benefit_level_deadline_working_days
          )

  - name: notice_by_allotment_date_allowed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 216(A)-(F)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-216
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_reports_information_resulting_in_reduction_or_termination
          and reported_information_is_in_writing_and_signed_by_household
          and agency_can_determine_allotment_or_ineligibility_based_solely_on_household_written_report
          and household_retains_fair_hearing_right_as_allowed
          and household_retains_continued_benefits_if_timely_fair_hearing_requested
          and previous_benefit_level_continuation_requirement_met

  - name: individual_notice_of_adverse_action_not_provided
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 16.2(A)-(G)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-216
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (
            state_initiates_mass_change
            and not annual_or_seasonal_adjustment_to_ssa_ssi_or_other_federal_benefits_results_in_snap_termination_or_decrease
          )
          or agency_determines_from_reliable_information_all_household_members_have_died
          or agency_determines_from_reliable_information_household_moved_from_state
          or lost_benefit_restoration_complete_and_household_previously_notified_when_increased_allotment_would_terminate
          or allotment_varies_month_to_month_for_anticipated_certification_changes_and_household_was_notified_at_certification
          or household_jointly_applied_for_tanf_and_snap_receiving_snap_pending_tanf_and_notified_snap_would_reduce_on_tanf_approval
          or household_member_disqualified_for_ipv_or_remaining_benefits_reduced_or_terminated_to_reflect_disqualification
