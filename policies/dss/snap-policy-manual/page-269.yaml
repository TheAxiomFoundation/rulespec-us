format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-269
  summary: |-
    "A determination of fraud can only be made by a criminal court. Fraud must be proven by evidence which is beyond reasonable doubt." "An individual, not a household, who intentionally violates SNAP regulations, must be disqualified from SNAP participation." "The following individuals are responsible for paying a claim:"
rules:
  - name: snap_fraud_determination_valid
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 269, fraud determinations
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-269
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          criminal_court_made_determination_of_fraud
          and fraud_proven_beyond_reasonable_doubt

  - name: person_disqualified_from_snap_participation_for_intentional_program_violation
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 269, intentional SNAP regulation violations
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-269
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_intentionally_violated_snap_regulations

  - name: person_responsible_for_paying_recipient_claim
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual § 23.4, Liability for Recipient Claims
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-269
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          adult_member_when_overpayment_occurred
          or (
            adult_member_when_trafficking_occurred
            and (
              not person_is_principal_informant
              or direct_evidence_identifies_person_as_guilty_party_for_trafficking
              or circumstantial_evidence_shows_principal_informant_complicity_in_trafficking
            )
          )
          or sponsor_of_non_citizen_household_is_at_fault
          or person_connected_to_household_caused_overpayment
          or person_connected_to_snap_household_actually_trafficked
