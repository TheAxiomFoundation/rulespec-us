format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-209
  summary: Although simplified reporting households are not required to report interim
    changes unless gross income exceeds 130% of poverty, an ABAWD's work hours fall
    below 20 hours per week, or a household member wins substantial lottery or gambling
    winnings ($4500 or more), the household may report other changes. The Agency acts
    on other reported interim changes only if they increase benefits, except that
    a sanction is imposed for voluntary quit or reduction of work effort without good
    cause regardless of benefit effect. Listed changes, including an ABAWD moving
    out, ABAWD status revealed, an ABAWD obtaining a job, fleeing felon or probation/parole
    violator identification, and verified substantial lottery or gambling winnings,
    must be acted on regardless of allotment increase or decrease.
  deferred_outputs:
  - output: us-sc:policies/dss/snap-policy-manual/page-209#agency_acts_on_other_interim_change_reported_by_household
    reason: The source-stated rule for other interim changes requires excluding changes
      addressed in Section 15.4(1) and Section 15.4(2), but the RuleSpec outputs for
      those cited categories were not provided.
rules:
- name: abawd_weekly_work_hours_reporting_threshold
  kind: parameter
  dtype: Count
  period: Week
  source: "SNAP Manual \xA7 15.4(3), p. 209"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-209
          excerpt: work hours fall below 20 hours per week
  versions:
  - effective_from: '0001-01-01'
    formula: '20'
- name: substantial_lottery_or_gambling_winnings_reporting_threshold
  kind: parameter
  dtype: Money
  unit: USD
  source: "SNAP Manual \xA7 15.4(3), p. 209"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-209
          excerpt: substantial lottery or gambling winnings ($4500 or more)
  versions:
  - effective_from: '0001-01-01'
    formula: '4500'
- name: mandatory_interim_change_report_required
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: "SNAP Manual \xA7 15.4(3), p. 209"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-209
  versions:
  - effective_from: '0001-01-01'
    formula: "household_is_simplified_reporting_household\nand (\n  household_gross_income\
      \ > gross_income_poverty_reporting_threshold_rate * household_poverty_guideline_amount\n\
      \  or (household_has_abawd and abawd_weekly_work_hours < abawd_weekly_work_hours_reporting_threshold)\n\
      \  or household_member_lottery_or_gambling_winnings_amount >= substantial_lottery_or_gambling_winnings_reporting_threshold\n\
      )"
- name: agency_must_take_action_on_reported_required_interim_change
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: "SNAP Manual \xA7 15.4(2)(F)-(K), p. 209"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-209
  versions:
  - effective_from: '0001-01-01'
    formula: 'reported_change_is_abawd_moved_out_of_snap_household

      or reported_change_reveals_snap_household_member_is_abawd

      or reported_change_is_abawd_obtained_job

      or household_member_identified_as_fleeing_felon

      or household_member_identified_as_probation_or_parole_violator

      or agency_verified_household_member_won_substantial_lottery_or_gambling_winnings'
- name: agency_should_impose_work_registration_sanction_for_reported_income_loss
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: "SNAP Manual \xA7 15.4(3) exception, p. 209"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-209
  versions:
  - effective_from: '0001-01-01'
    formula: "(\n  household_reports_loss_of_income_due_to_voluntary_quit\n  or household_reports_loss_of_income_due_to_reduction_of_work_effort\n\
      )\nand household_member_is_subject_to_work_registration\nand voluntary_quit_or_reduction_of_work_effort_was_without_good_cause"
imports:
- us-sc:policies/dss/snap-policy-manual/page-207#gross_income_poverty_reporting_threshold_rate
