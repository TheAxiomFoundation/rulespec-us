format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-320
  summary: |-
    Untimely 16th – 30th (31st). Annual recertification form is due June 15th. The household submits form on June 20th. When the “A” Form is registered, the interview date field is populated 10 days from registration. With no additional verification, process case within 30 days from receipt. With additional verification, the household is given 10 days, but has 30 days from receipt to provide requested verification and still be entitled to a full month allotment.
rules:
  - name: interview_scheduling_days_from_registration
    kind: parameter
    dtype: Integer
    source: SNAP Manual 320 Untimely, interview notice process
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-320
              excerpt: interview date 10 days from the date of registration
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10

  - name: no_additional_verification_case_processing_days_from_a_form_received
    kind: parameter
    dtype: Integer
    source: SNAP Manual 320 Untimely, no additional verification process
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-320
              excerpt: Process case within 30 days from the date the “A” form was received.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: verification_request_response_days
    kind: parameter
    dtype: Integer
    source: SNAP Manual 320 Untimely, additional verification process
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-320
              excerpt: The household is given 10 days to provide requested information.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10

  - name: full_month_allotment_verification_submission_days_from_a_form_received
    kind: parameter
    dtype: Integer
    source: SNAP Manual 320 Untimely, additional verification full allotment window
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-320
              excerpt: has 30 days from the date the “A” Form was received to provide requested verification
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: interview_date_populated_on_required_schedule
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 320 Untimely, interview date field process
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-320
              excerpt: interview date field ... populated with an interview date 10 days from the date of registration
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          a_form_registered_in_scwins_on_date_received
          and days_from_a_form_registration_to_populated_interview_date == interview_scheduling_days_from_registration

  - name: no_additional_verification_case_processed_within_deadline
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 320 Untimely, no additional verification process
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-320
              excerpt: No additional verification needed after the interview ... Process case within 30 days
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          annual_recertification_form_submitted_16th_through_month_end
          and interview_completed
          and no_additional_verification_needed_after_interview
          and days_from_a_form_received_to_case_processed <= no_additional_verification_case_processing_days_from_a_form_received

  - name: verification_response_period_matches_required_days
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 320 Untimely, additional verification process
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-320
              excerpt: Send written request for verification/pending notice ... household is given 10 days
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          additional_verification_needed_as_result_of_interview
          and written_request_for_verification_pending_notice_sent
          and verification_response_days_given_after_request == verification_request_response_days

  - name: additional_verification_provided_within_full_allotment_window
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 320 Untimely, additional verification full allotment window
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-320
              excerpt: has 30 days from the date the “A” Form was received to provide requested verification
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          annual_recertification_form_submitted_16th_through_month_end
          and interview_completed
          and additional_verification_needed_as_result_of_interview
          and requested_verification_provided
          and days_from_a_form_received_to_requested_verification_provided <= full_month_allotment_verification_submission_days_from_a_form_received

  - name: full_month_allotment_entitled_for_untimely_recertification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 320 Untimely, full allotment examples and verification window
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-320
              excerpt: The household receives a full allotment for July.
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-320
              excerpt: still be entitled to a full month allotment
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          no_additional_verification_case_processed_within_deadline
          or additional_verification_provided_within_full_allotment_window
