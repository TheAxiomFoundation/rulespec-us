format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-170
  summary: |-
    "Allowable medical costs are:" medical and dental care; hospitalization or outpatient treatment, nursing care and nursing home care; drugs, medical supplies and equipment; health, hospitalization and insurance premiums; Medicare premiums. The Agency must not give the deduction until the expense and reimbursement are verified. The SNAP medical deduction may not be given for Schedule I controlled substances or expenses associated with their use, and specified health/accident or income-maintenance policy costs are not deductible.
rules:
  - name: medical_expense_is_allowable_cost_category
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: SNAP Manual p.170 allowable medical costs list (A)-(E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-170
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          cost_is_medical_or_dental_care
          or cost_is_hospitalization_or_outpatient_treatment_or_nursing_care_or_nursing_home_care
          or cost_is_drug_medical_supply_or_equipment
          or cost_is_health_hospitalization_or_insurance_premium
          or cost_is_medicare_premium
  - name: snap_medical_expense_deduction_allowed
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: SNAP Manual p.170 verification rule and allowable medical expense notes
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-170
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-170
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          expense_and_reimbursement_verified
          and medical_expense_is_allowable_cost_category
          and not cost_is_for_schedule_i_controlled_substance_or_associated_use
          and not premium_is_for_nondeductible_health_accident_or_income_maintenance_policy
          and not premium_portion_is_attributable_to_nondeductible_coverage_or_person_not_entitled_to_medical_deduction
