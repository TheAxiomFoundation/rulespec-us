format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-79
  summary: |-
    Good cause for failure to apply must be shown monthly in order for such a household member to continue to participate. Once an application for SSN has been filed, the Agency will permit the member to continue to participate, pending notification of the household member's SSN. If the Agency determines that a household member has refused or failed without good cause to provide or apply for a SSN, then that individual will be ineligible to participate in SNAP. The household member(s) disqualified may become eligible upon providing the Agency with an SSN. No person is eligible to participate in SNAP unless that person is: a) A U.S. citizen b) A U.S. non-citizen national
  deferred_outputs:
    - output: us-sc:policies/dss/snap-policy-manual/page-79#income_and_resources_counted_for_ssn_disqualified_individual
      reason: The source directs treatment of income and resources for an SSN-disqualified individual to Section 14.1, but that cited source was not provided.
rules:
  - name: ssn_failure_to_apply_good_cause_continuation
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 79, SSN good cause for failure to apply
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-79
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_member_applying_for_ssn_has_been_unable_to_obtain_documents_required_by_ssa
          and good_cause_for_failure_to_apply_for_ssn_shown_this_month

  - name: ssn_application_pending_continuation
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 79, filed SSN application pending notification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-79
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          ssn_application_has_been_filed
          and household_member_ssn_notification_pending

  - name: ineligible_for_snap_due_to_ssn_noncompliance
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 79, failure to comply with SSN requirement
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-79
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          agency_determines_household_member_refused_or_failed_to_provide_or_apply_for_ssn
          and not good_cause_for_failure_to_provide_or_apply_for_ssn

  - name: ssn_disqualification_ended
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 79, ending disqualification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-79
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_member_disqualified_for_ssn_noncompliance
          and household_member_provided_agency_with_ssn

  - name: meets_snap_citizenship_status_requirement
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 79, citizenship and non-citizen status
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-79
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_us_citizen
          or person_is_us_non_citizen_national
