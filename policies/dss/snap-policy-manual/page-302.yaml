format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-302
  summary: |-
    Others Who Are Eligible on the Same Basis as U.S. Citizens: An American Indian born in Canada who possesses at least 50 per centum of blood of the American Indian race to whom the provisions of the Immigration and Nationality Act (INA) apply. Verification includes USCIS Form I-551 with code S13, or an unexpired temporary I-551 stamp in Canadian passport or on USCIS Form I-94 with code S13.
rules:
  - name: american_indian_blood_quantum_minimum
    kind: parameter
    dtype: Rate
    source: SNAP Manual page 302, Others Who Are Eligible on the Same Basis as U.S. Citizens
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-302
              excerpt: "at least 50 per centum of blood"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.50

  - name: american_indian_born_in_canada_eligible_same_basis_as_us_citizen
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 302, Others Who Are Eligible on the Same Basis as U.S. Citizens
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-302
          - path: versions[0].formula
            kind: import
            import:
              target: us-sc:policies/dss/snap-policy-manual/page-302#american_indian_blood_quantum_minimum
              output: american_indian_blood_quantum_minimum
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_american_indian_born_in_canada
          and american_indian_blood_quantum >= american_indian_blood_quantum_minimum
          and immigration_and_nationality_act_provisions_apply_to_person

  - name: american_indian_born_in_canada_status_verified
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 302, Category Verification for American Indian born in Canada
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-302
              excerpt: "USCIS Form I-551 with code S13; OR"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-302
              excerpt: "Unexpired temporary I-551 stamp in Canadian passport or on USCIS Form I-94 with code S13"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          uscic_form_i_551_has_code_s13
          or unexpired_temporary_i_551_stamp_in_canadian_passport_has_code_s13
          or unexpired_temporary_i_551_stamp_on_uscis_form_i_94_has_code_s13
