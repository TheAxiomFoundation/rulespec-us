format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-455
  summary: |-
    "(Y) Trusts (Irrevocable) Any funds in a trust or transferred to a trust, and the income produced by that trust to the extent it is not available to the household ... will be considered inaccessible to the household if" the listed trust, trustee, investment, and funding conditions are met. "(Z) Unable to sell (for significant return) Resources that, as a practical matter, the household is unable to sell for any significant return" are addressed, excluding financial instruments; significant return and significant amount of funds mean more than $1,500.
rules:
  - name: significant_return_threshold
    kind: parameter
    dtype: Money
    unit: USD
    source: SNAP Manual page 455, paragraph (Z) note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-455
              excerpt: "more than $1,500"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1500

  - name: irrevocable_trust_funds_inaccessible_to_household
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: SNAP Manual page 455, paragraph (Y)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-455
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_funds_in_or_transferred_to_trust_or_unavailable_trust_income
          and trust_arrangement_not_likely_to_cease_during_certification_period
          and no_household_member_has_power_to_revoke_trust_arrangement_during_certification_period
          and no_household_member_has_power_to_change_trust_beneficiary_during_certification_period
          and (trustee_is_court_or_independent_institution_corporation_or_organization or trustee_is_court_appointed_individual_with_court_imposed_limitations_meeting_paragraph)
          and trust_investments_do_not_directly_involve_or_assist_household_member_controlled_business_or_corporation
          and ((trust_established_from_household_own_funds and trustee_uses_funds_solely_for_trust_investments_or_named_person_education_or_medical_expenses) or trust_established_from_non_household_funds_by_non_household_member)

  - name: unable_to_sell_resource_for_significant_return
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: SNAP Manual page 455, paragraph (Z)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-455
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-455
              excerpt: "more than $1,500"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not resource_is_financial_instrument_stock_bond_or_negotiable_financial_instrument
          and ((household_interest_in_resource_is_relatively_slight or costs_of_selling_household_interest_are_relatively_great or sale_or_disposition_unlikely_to_produce_significant_amount_for_household_support or cost_of_selling_resource_would_be_relatively_great)
          and estimated_return_after_sale_costs_and_household_ownership_interest <= significant_return_threshold)
