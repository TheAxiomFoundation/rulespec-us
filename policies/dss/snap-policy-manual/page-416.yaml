format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-416
  summary: |-
    "3.9 Household Cooperation with SNAP Quality Control (QC) Reviewer" reflects a change from seven to nine months from the end of the annual review period for household ineligibility after refusal to cooperate with a Federal QC reviewer. "5.1 Verification Prior to Certification" reflects that DSS must give households at least 10 days to provide verification. "6.3 Denying the Application" clarifies that if the household fails to complete the interview process, the Agency must not deny the application prior to the 30th day.
rules:
  - name: qc_refusal_ineligibility_period_months
    kind: parameter
    dtype: Count
    source: SNAP Manual 416, section 3.9 update note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-416
              excerpt: "change from seven to nine months from the end of the annual review period"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          9
  - name: verification_response_minimum_days
    kind: parameter
    dtype: Count
    source: SNAP Manual 416, section 5.1 update note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-416
              excerpt: "DSS must give households at least 10 days to provide verification"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10
  - name: application_denial_no_interview_earliest_day
    kind: parameter
    dtype: Count
    source: SNAP Manual 416, section 6.3 update note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-416
              excerpt: "must not deny the application prior to the 30th day"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30
  - name: federal_qc_refusal_ineligibility_applies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 416, section 3.9 update note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-416
              excerpt: "household will be determined ineligible for refusal to cooperate with a Federal QC reviewer during the completed QC period"
          - path: versions[0].formula
            kind: import
            import:
              target: us-sc:policies/dss/snap-policy-manual/page-416#qc_refusal_ineligibility_period_months
              output: qc_refusal_ineligibility_period_months
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_refused_to_cooperate_with_federal_qc_reviewer_during_completed_qc_period
          and months_since_end_of_annual_review_period < qc_refusal_ineligibility_period_months
  - name: verification_response_period_is_sufficient
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: SNAP Manual 416, section 5.1 update note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-416
              excerpt: "DSS must give households at least 10 days to provide verification"
          - path: versions[0].formula
            kind: import
            import:
              target: us-sc:policies/dss/snap-policy-manual/page-416#verification_response_minimum_days
              output: verification_response_minimum_days
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          days_given_to_provide_verification >= verification_response_minimum_days
  - name: denial_for_incomplete_interview_permitted
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: SNAP Manual 416, section 6.3 update note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-416
              excerpt: "if the household fails to complete the interview process, the Agency must not deny the application prior to the 30th day"
          - path: versions[0].formula
            kind: import
            import:
              target: us-sc:policies/dss/snap-policy-manual/page-416#application_denial_no_interview_earliest_day
              output: application_denial_no_interview_earliest_day
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_failed_to_complete_interview_process
          and application_day_number >= application_denial_no_interview_earliest_day
