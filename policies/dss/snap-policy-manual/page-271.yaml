format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-271
  summary: |-
    Benefit Integrity Claims staff must accept any payment for a claim whether it represents full or partial payment in any acceptable form of repayment. Acceptable forms include reducing benefits before issuance, reducing SNAP benefits after issuance, accepting cash or generally accepted equivalents, and requiring public service. Written notification of bankruptcy stops all collection actions. A recipient claim is delinquent if the initial-demand due date passes without payment or agreement, or if a scheduled repayment-agreement payment is missed, subject to the stated same-household prior-claim exception.
rules:
  - name: claim_payment_is_in_acceptable_repayment_form
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: SNAP Manual page 271, acceptable forms of repayment
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-271
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          payment_reduces_benefits_prior_to_issuance
          or payment_reduces_snap_benefits_after_issuance
          or payment_is_cash_or_generally_accepted_equivalent
          or household_performs_required_public_service

  - name: benefit_integrity_staff_must_accept_claim_payment
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: SNAP Manual page 271, Benefit Integrity Claims staff accepting claim payments
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-271
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          payment_represents_full_or_partial_payment_for_claim
          and claim_payment_is_in_acceptable_repayment_form

  - name: collection_actions_must_stop_due_to_bankruptcy_notice
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 271, Section 23.8 Collection Action on Bankruptcy Cases
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-271
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          agency_received_written_notification_person_filed_for_bankruptcy

  - name: recipient_claim_is_delinquent_after_initial_demand
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 271, Section 23.9(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-271
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          initial_demand_letter_due_date_has_passed
          and not claim_paid_by_initial_demand_due_date
          and not satisfactory_repayment_agreement_has_been_made

  - name: recipient_claim_is_delinquent_after_missed_scheduled_payment
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 271, Section 23.9(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-271
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          repayment_agreement_has_been_made
          and scheduled_payment_due_date_has_passed
          and not scheduled_payment_made_by_due_date

  - name: same_household_prior_claim_exception_to_delinquency_applies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 271, Section 23.9 same-household prior-claim exception
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-271
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          another_claim_for_same_household_is_currently_being_paid_through_repayment_agreement_or_allotment_reduction
          and agency_expects_to_begin_collection_once_prior_claims_settled

  - name: recipient_claim_is_delinquent
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 271, Section 23.9 Delinquent Recipient Claims
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-271
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (recipient_claim_is_delinquent_after_initial_demand
          or recipient_claim_is_delinquent_after_missed_scheduled_payment)
          and not same_household_prior_claim_exception_to_delinquency_applies
