format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-125
  summary: |-
    Workfare is a household responsibility; all non-exempt household members can share the hourly obligation over the month, and SNAP E&T will not require participants to work beyond the maximum. The example computes a household maximum as monthly SNAP benefits divided by South Carolina's $7.25 minimum wage, rounded down. SNAP E&T allows up to 30 days of Job Retention Services per year. E&T reimbursement funds include transportation up to $150 monthly during component participation, component-related expenses up to $150 for a month with SNAP E&T participation, and Job Retention Services support services up to $150 over the 30-day period.
rules:
  - name: south_carolina_minimum_wage
    kind: parameter
    dtype: Money
    unit: USD
    period: Hour
    source: SNAP Manual page 125, workfare example
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-125
              excerpt: "minimum wage is $7.25"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          7.25

  - name: workfare_maximum_monthly_hours
    kind: derived
    entity: Household
    dtype: Count
    period: Month
    source: SNAP Manual page 125, workfare household responsibility
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-125
              excerpt: "$200.00 / by $7.25 = 27.58 or 27 hours"
          - path: versions[0].formula
            kind: import
            import:
              target: us-sc:policies/dss/snap-policy-manual/page-125#south_carolina_minimum_wage
              output: south_carolina_minimum_wage
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          floor(monthly_snap_benefit_amount / south_carolina_minimum_wage)

  - name: job_retention_services_annual_day_limit
    kind: parameter
    dtype: Count
    period: Year
    source: SNAP Manual page 125, Job Retention Services
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-125
              excerpt: "up to 30 days of Job Retention Services per year"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: job_retention_services_available
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: SNAP Manual page 125, Job Retention Services and reimbursement subsection (C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-125
              excerpt: "secured employment after participating in another E&T component and remain eligible for SNAP benefits"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-125
              excerpt: "Individuals leaving SNAP ... secured employment within 30 days of participating"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (secured_employment_after_participating_in_another_et_component and remains_eligible_for_snap_benefits)
          or (no_longer_qualifies_for_snap_benefits and secured_employment_within_30_days_of_participating_in_another_et_component)

  - name: transportation_reimbursement_monthly_limit
    kind: parameter
    dtype: Money
    unit: USD
    period: Month
    source: SNAP Manual page 125, reimbursement funds subsection (A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-125
              excerpt: "transportation up to $150.00 monthly"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          150.00

  - name: transportation_reimbursement_amount
    kind: derived
    entity: Person
    dtype: Money
    unit: USD
    period: Month
    source: SNAP Manual page 125, reimbursement funds subsection (A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-125
              excerpt: "participants needing reimbursement for transportation up to $150.00 monthly during component participation"
          - path: versions[0].formula
            kind: import
            import:
              target: us-sc:policies/dss/snap-policy-manual/page-125#transportation_reimbursement_monthly_limit
              output: transportation_reimbursement_monthly_limit
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if et_participant_needs_transportation_reimbursement and participating_in_et_component_during_month: min(transportation_reimbursement_need, transportation_reimbursement_monthly_limit) else: 0

  - name: component_related_expense_monthly_limit
    kind: parameter
    dtype: Money
    unit: USD
    period: Month
    source: SNAP Manual page 125, reimbursement funds subsection (B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-125
              excerpt: "component-related expense in the amount up to $150.00"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          150.00

  - name: component_related_expense_reimbursement_amount
    kind: derived
    entity: Person
    dtype: Money
    unit: USD
    period: Month
    source: SNAP Manual page 125, reimbursement funds subsection (B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-125
              excerpt: "provided the participation occurred in a SNAP E&T component for that month"
          - path: versions[0].formula
            kind: import
            import:
              target: us-sc:policies/dss/snap-policy-manual/page-125#component_related_expense_monthly_limit
              output: component_related_expense_monthly_limit
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if participation_occurred_in_snap_et_component_for_month: min(component_related_expense_need, component_related_expense_monthly_limit) else: 0

  - name: job_retention_support_services_limit
    kind: parameter
    dtype: Money
    unit: USD
    period: Month
    source: SNAP Manual page 125, reimbursement funds subsection (C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-125
              excerpt: "$150.00 over the 30-day period"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          150.00

  - name: job_retention_support_services_amount
    kind: derived
    entity: Person
    dtype: Money
    unit: USD
    period: Month
    source: SNAP Manual page 125, reimbursement funds subsection (C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-125
              excerpt: "maximum support services allowable for Job Retention Services will be $150.00 over the 30-day period"
          - path: versions[0].formula
            kind: import
            import:
              target: us-sc:policies/dss/snap-policy-manual/page-125#job_retention_services_available
              output: job_retention_services_available
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-sc:policies/dss/snap-policy-manual/page-125#job_retention_support_services_limit
              output: job_retention_support_services_limit
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if job_retention_services_available: min(job_retention_support_services_need, job_retention_support_services_limit) else: 0
