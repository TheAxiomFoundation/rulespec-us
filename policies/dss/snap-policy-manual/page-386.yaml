format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-386
  summary: |-
    Section 2.2(1) Required Household Combinations - Spouses: same sex spouses living together must be considered married for SNAP purposes if their marriage is recognized in the jurisdiction where the marriage occurred. Section 6.6 clarifies that expedited-service households do not lose entitlement when they do not call by the 6th day if the delay is agency caused.
rules:
  - name: same_sex_spouse_considered_married_for_snap
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 386, Section 2.2(1) update
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-386
    versions:
      - effective_from: '2015-01-01'
        formula: |-
          person_has_same_sex_spouse_living_together
          and marriage_recognized_in_jurisdiction_where_occurred
  - name: expedited_service_entitlement_retained_after_agency_delay
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 386, Section 6.6 update
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-386
              excerpt: "households who meet the criteria for expedited services do not lose their entitlement to this service when they do not call by the 6th day if the delay is a result of an agency caused delay"
    versions:
      - effective_from: '2015-01-01'
        formula: |-
          household_meets_criteria_for_expedited_services
          and household_did_not_call_by_sixth_day
          and delay_is_agency_caused
