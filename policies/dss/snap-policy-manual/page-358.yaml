format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-358
  summary: Negative Case Error Rate is an estimate of incorrectly denied, suspended,
    or terminated cases, expressed as a percentage of completed negative quality control
    reviews with stated exclusions. Net Income means gross income minus allowable
    deductions. Non-Citizen, Non-Citizen National, Non-immigrant, Non Means-tested,
    Non-recurring, NOMI, Over-issuance, and Overpayment Error Rate are defined terms.
  deferred_outputs:
  - output: us-sc:policies/dss/snap-policy-manual/page-358#non_immigrant
    reason: Generated rule used a local name that collides with a sibling RuleSpec
      export. This output is deferred until it can be encoded with a semantic branch-specific
      name without creating ambiguous sibling imports.
rules:
- name: over_issuance
  kind: derived
  entity: Household
  dtype: Money
  period: Month
  unit: USD
  source: SNAP Manual p.358, "Over-issuance"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-358
  versions:
  - effective_from: '0001-01-01'
    formula: max(0, snap_benefits_issued - eligible_snap_benefit_amount)
- name: non_citizen
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: SNAP Manual p.358, "Non-Citizen"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: definition
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-358
  versions:
  - effective_from: '0001-01-01'
    formula: 'not person_is_citizen_of_united_states

      and not person_is_national_of_united_states'
- name: non_citizen_national
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: SNAP Manual p.358, "Non-Citizen National"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: definition
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-358
  versions:
  - effective_from: '0001-01-01'
    formula: 'person_born_in_outlying_us_possession_after_us_acquired_possession

      or person_has_parents_who_are_us_non_citizen_nationals'
- name: notice_of_missed_interview_required
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: SNAP Manual p.358, "Notice of Missed Interview (NOMI)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: definition
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-358
  versions:
  - effective_from: '0001-01-01'
    formula: household_misses_scheduled_interview
imports:
