format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-298
  summary: |-
    Lists thyroid, parathyroid, adrenal, diabetes/pancreatic, non-mosaic Down Syndrome, epilepsy, vascular insult to the brain, benign brain tumors, Parkinsonian Syndrome, Cerebral Palsy, spinal cord disorders, Multiple Sclerosis, ALS, Post-Polio Syndrome, Myasthenia Gravis, Muscular Dystrophy, Peripheral Neuropathy, neurodegenerative central-system disorders, traumatic brain injury, coma or persistent vegetative state, and motor neuron disorders other than ALS.
rules:
  - name: person_has_listed_endocrine_congenital_or_neurological_disorder
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 298 listed disorders
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-298
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_has_thyroid_gland_disorder
          or person_has_parathyroid_gland_disorder
          or person_has_adrenal_gland_disorder
          or person_has_diabetes_mellitus_or_other_pancreatic_disorder
          or person_has_non_mosaic_down_syndrome
          or person_has_epilepsy
          or person_has_vascular_insult_to_the_brain
          or person_has_benign_brain_tumor
          or person_has_parkinsonian_syndrome
          or person_has_cerebral_palsy
          or person_has_spinal_cord_disorder
          or person_has_multiple_sclerosis
          or person_has_amyotrophic_lateral_sclerosis
          or person_has_post_polio_syndrome
          or person_has_myasthenia_gravis
          or person_has_muscular_dystrophy
          or person_has_peripheral_neuropathy
          or person_has_neurodegenerative_disorder_of_central_system
          or person_has_traumatic_brain_injury
          or person_has_coma_or_persistent_vegetative_state
          or person_has_motor_neuron_disorder_other_than_als
