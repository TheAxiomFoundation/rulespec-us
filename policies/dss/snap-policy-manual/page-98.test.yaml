    : false
    us-sc:policies/dss/snap-policy-manual/page-98#input.individual_qualifies_for_another_work_registration_exemption: false
  output:
    us-sc:policies/dss/snap-policy-manual/page-98#student_exemption_loss_requires_work_registration: holds
- name: unemployment compensation application path
  period: 2026-05
  input:
    us-sc:policies/dss/snap-policy-manual/page-98#input.person_receives_unemployment_compensation: false
    us-sc:policies/dss/snap-policy-manual/page-98#input.person_has_applied_for_unemployment_compensation: true
    ? us-sc:policies/dss/snap-policy-manual/page-98#input.person_complies_with_unemployment_compensation_application_work_requirements
    : true
  output:
    us-sc:policies/dss/snap-policy-manual/page-98#unemployment_compensation_exemption_applies: holds
- name: recertification registration paths
  period: 2026-05
  input:
    ? us-sc:policies/dss/snap-policy-manual/page-98#input.person_loses_exemption_due_to_change_subject_to_chapter_15_reporting_requirements
    : true
    us-sc:policies/dss/snap-policy-manual/page-98#input.exemption_status_change_is_reported: true
    ? us-sc:policies/dss/snap-policy-manual/page-98#input.person_loses_exemption_due_to_change_not_subject_to_chapter_15_reporting_requirements
    : true
    us-sc:policies/dss/snap-policy-manual/page-98#input.household_is_at_next_recertification: true
    us-sc:policies/dss/snap-policy-manual/page-98#input.person_is_subject_to_simplified_reporting_requirements: true
    us-sc:policies/dss/snap-policy-manual/page-98#input.person_loses_exemption_due_to_change_not_required_to_be_reported: true
  output:
    us-sc:policies/dss/snap-policy-manual/page-98#employment_registration_required_when_reportable_exemption_loss_reported: holds
    ? us-sc:policies/dss/snap-policy-manual/page-98#employment_registration_required_at_next_recertification_after_nonreportable_exemption_loss
    : holds
    ? us-sc:policies/dss/snap-policy-manual/page-98#simplified_reporting_household_member_work_registered_at_next_recertification
    : holds
