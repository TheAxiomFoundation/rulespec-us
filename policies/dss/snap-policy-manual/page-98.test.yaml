- name: student exemption continues during class attendance
  period: 2026-05
  input:
    us-sc:policies/dss/snap-policy-manual/page-98#input.student_is_exempt_from_work_registration: true
    us-sc:policies/dss/snap-policy-manual/page-98#input.normal_period_of_class_attendance: true
    us-sc:policies/dss/snap-policy-manual/page-98#input.school_vacation_or_recess: false
  output:
    us-sc:policies/dss/snap-policy-manual/page-98#student_exemption_continues_during_school_period: holds
- name: student loss requires registration absent another exemption
  period: 2026-05
  input:
    us-sc:policies/dss/snap-policy-manual/page-98#input.student_graduates: false
    us-sc:policies/dss/snap-policy-manual/page-98#input.student_enrolls_less_than_half_time: true
    us-sc:policies/dss/snap-policy-manual/page-98#input.student_is_suspended_or_expelled: false
    us-sc:policies/dss/snap-policy-manual/page-98#input.student_drops_out: false
