format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-40
  summary: |-
    The Agency must schedule all interviews as promptly as possible to ensure eligible households receive an opportunity to participate within 30 days after the application is filed. All initial applications, reapplications, and annual recertifications must be registered in SCWINS. A date set ten days from the application file date (four days for expedited application) will be automatically entered on CHIP INRD screen in the INTERVIEW DATE field. If the interview is not completed within the applicable timeframe (ten days for non-expedited or four days for expedited applications) or if the interview is not acknowledged with a “Y” in the INTERVIEW COMPLETED field on INRD within the applicable timeframe, a Notice of Missed Interview (NOMI) will be sent to the household.
rules:
  - name: interview_participation_opportunity_window_days
    kind: parameter
    dtype: Integer
    source: SNAP Manual page 40 interview scheduling
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-40
              excerpt: "within 30 days after the application is filed"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: non_expedited_interview_timeframe_days
    kind: parameter
    dtype: Integer
    source: SNAP Manual page 40 procedure
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-40
              excerpt: "ten days for non-expedited"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10

  - name: expedited_interview_timeframe_days
    kind: parameter
    dtype: Integer
    source: SNAP Manual page 40 procedure
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-40
              excerpt: "four days for expedited applications"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          4

  - name: interview_opportunity_timely_scheduled
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: SNAP Manual page 40 interview scheduling
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-40
              excerpt: "within 30 days after the application is filed"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          days_after_application_filed_for_interview_opportunity <= interview_participation_opportunity_window_days

  - name: interview_completed_within_applicable_timeframe
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: SNAP Manual page 40 procedure
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-40
              excerpt: "ten days for non-expedited or four days for expedited applications"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (application_is_expedited and days_from_application_file_date_to_interview_completion <= expedited_interview_timeframe_days)
          or (not application_is_expedited and days_from_application_file_date_to_interview_completion <= non_expedited_interview_timeframe_days)

  - name: interview_completion_acknowledged_within_applicable_timeframe
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: SNAP Manual page 40 procedure
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-40
              excerpt: "acknowledged with a “Y” in the INTERVIEW COMPLETED field on INRD within the applicable timeframe"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          interview_completed_field_coded_y
          and ((application_is_expedited and days_from_application_file_date_to_interview_completed_y_code <= expedited_interview_timeframe_days)
          or (not application_is_expedited and days_from_application_file_date_to_interview_completed_y_code <= non_expedited_interview_timeframe_days))

  - name: notice_of_missed_interview_sent
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: SNAP Manual page 40 procedure
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-40
              excerpt: "If the interview is not completed within the applicable timeframe ... or if the interview is not acknowledged with a “Y” ... a Notice of Missed Interview (NOMI) will be sent"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not interview_completed_within_applicable_timeframe
          or not interview_completion_acknowledged_within_applicable_timeframe
