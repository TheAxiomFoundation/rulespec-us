format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-295
  summary: |-
    "Permanent Disability Established by the Social Security Act" requires the Agency, when making disability determinations for specified individuals, to use the SSA most current list of disabilities considered permanent; listed impairments include musculoskeletal, special senses and speech, and respiratory disorders.
rules:
  - name: permanent_disability_established_by_social_security_act
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 295, Permanent Disability Established by the Social Security Act
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-295
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          major_dysfunction_of_joint
          or reconstructive_surgery_or_surgical_arthrodesis_of_major_weight_bearing_joint
          or disorder_of_spine
          or amputation
          or fracture_of_femur_tibia_pelvis_or_tarsal_bones
          or fracture_of_upper_extremity
          or soft_tissue_injury
          or loss_of_central_visual_acuity
          or contraction_of_visual_field_in_better_eye
          or loss_of_visual_efficiency
          or disturbance_of_labyrinthine_vestibular_function
          or loss_of_speech
          or hearing_loss_not_treated_with_cochlear_implantation
          or hearing_loss_treated_with_cochlear_implantation
          or chronic_respiratory_disorder
