  summary: |-
    USDA, FNS will determine the efficiency and effectiveness of a State's administration of SNAP by measuring State compliance and corrective action efforts. FNS will estimate the State Agency's error rates based on QC review reports, including active case error, payment error, under-issuance error, and negative case error rates.
  deferred_outputs:
    - output: us-sc:policies/dss/snap-policy-manual/page-288#state_agency_active_case_error_rate
      reason: The source defines State Agency-level QC error rates, but the supported RuleSpec entities do not include State Agency or QC sample-case aggregate relations needed to represent the denominator and numerator faithfully.
    - output: us-sc:policies/dss/snap-policy-manual/page-288#state_agency_payment_error_rate
      reason: The source defines State Agency-level aggregate payment error values from QC review reports, but the supported RuleSpec entities do not include State Agency or QC sample-case aggregate relations needed to represent the computation faithfully.
    - output: us-sc:policies/dss/snap-policy-manual/page-288#state_agency_negative_case_error_rate
      reason: The source defines State Agency-level QC negative case error rates, but the supported RuleSpec entities do not include State Agency or negative sample-case aggregate relations needed to represent the denominator and numerator faithfully.
