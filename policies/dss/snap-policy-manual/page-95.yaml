format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-95
  summary: |-
    As a condition of eligibility for SNAP benefits, each household member not exempt under 8.2 must comply with listed SNAP work requirements: register for work at application and every 12 months after initial registration; provide employment-status or availability information; report to a referred employer if potential employment meets Section 8.9 suitability requirements; accept a bona fide offer of suitable employment meeting stated strike/lockout and wage conditions; and not voluntarily and without good cause quit or reduce work effort below 30 hours a week. Work registration is completed when recorded on CHIP EMPR. Strikers whose households are eligible under Section 2.4 are subject to SNAP work requirements unless exempt under Section 8.2 at application.
  deferred_outputs:
    - output: us-sc:policies/dss/snap-policy-manual/page-95#snap_work_requirements_apply
      reason: Computing the population subject to SNAP work requirements depends on exemptions under Section 8.2, which is cited but not provided in the copied source context.
    - output: us-sc:policies/dss/snap-policy-manual/page-95#snap_work_requirements_satisfied
      reason: Full compliance depends on unavailable cited mechanics for exemptions under Section 8.2, suitable employment under Section 8.9, voluntary quit/reduction rules under Section 8.11, and striker household eligibility under Section 2.4.
    - output: us-sc:policies/dss/snap-policy-manual/page-95#suitable_employment_offer_must_be_accepted
      reason: The source requires accepting suitable employment as defined in Section 8.9, but that cited source is not provided in context.
    - output: us-sc:policies/dss/snap-policy-manual/page-95#referred_employer_reporting_requirement_applies
      reason: The reporting requirement applies only if potential employment meets suitability requirements described in Section 8.9, which is not provided in context.
rules:
  - name: work_registration_interval_months
    kind: parameter
    dtype: Count
    period: Month
    source: SNAP Manual Chapter 8, Section 8.1(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-95
              excerpt: "every 12 months after initial registration"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          12

  - name: full_time_work_hours_per_week_threshold
    kind: parameter
    dtype: Count
    period: Week
    source: SNAP Manual Chapter 8, Section 8.1(E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-95
              excerpt: "30 or more hours a week"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: minimum_wage_comparison_rate
    kind: parameter
    dtype: Rate
    period: Month
    source: SNAP Manual Chapter 8, Section 8.1(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-95
              excerpt: "80 percent of the wage"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.80

  - name: work_registration_completed
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual Chapter 8, Section 8.1(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-95
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          work_registration_recorded_on_chip_empr_screen

  - name: primary_informant_signature_registers_required_members
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual Chapter 8, Section 8.1(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-95
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          primary_informant_signed_application_or_recertification_form
          and household_member_required_to_be_registered

  - name: employment_status_or_availability_information_provided
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual Chapter 8, Section 8.1(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-95
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          sufficient_information_regarding_employment_status_or_availability_for_work_provided_to_agency

  - name: employment_offer_wage_requirement_satisfied
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual Chapter 8, Section 8.1(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-95
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          offered_wage_is_at_least_higher_of_federal_or_state_minimum_wage
          or offered_wage_is_at_least_minimum_wage_comparison_rate_of_fair_labor_standards_act_wage

  - name: employment_offer_site_not_subject_to_strike_or_lockout
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual Chapter 8, Section 8.1(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-95
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          offered_employment_site_or_plant_not_subject_to_strike_or_lockout

  - name: voluntary_quit_or_reduction_disqualification_condition
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual Chapter 8, Section 8.1(E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-95
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          voluntarily_and_without_good_cause_quit_job_of_at_least_full_time_work_hours_per_week_threshold_hours_per_week
          or voluntarily_and_without_good_cause_reduced_work_effort_below_full_time_work_hours_per_week_threshold_hours_per_week

  - name: no_voluntary_quit_or_reduction_violation
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual Chapter 8, Section 8.1(E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-95
          - path: versions[0].formula
            kind: import
            import:
              target: us-sc:policies/dss/snap-policy-manual/page-95#voluntary_quit_or_reduction_disqualification_condition
              output: voluntary_quit_or_reduction_disqualification_condition
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not voluntary_quit_or_reduction_disqualification_condition
