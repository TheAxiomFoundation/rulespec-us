format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-314
  summary: |-
    Individuals admitted as refugees under INA §207 or granted asylum under INA §208(b) are eligible immediately. Parolees under INA §212(d)(5) for at least 1 year are eligible after a 5-year waiting period, unless under 18, with 40 qualifying work quarters, blind or disabled, lawfully residing and 65 or older on August 22, 1996, or with a U.S. military connection. Certain Afghan and Ukrainian nationals granted parole during the stated date windows are eligible immediately.
rules:
  - name: refugee_or_asylee_snap_eligible_immediately
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p.314, refugee and asylum rows
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-314
              excerpt: "Admitted as a refugee into the U.S. under §207 of the INA ... Granted asylum into the U.S. under §208(b) of the INA Eligible immediately"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          admitted_as_refugee_under_ina_207
          or granted_asylum_under_ina_208_b

  - name: parolee_subject_to_five_year_waiting_period
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p.314, parolees row
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-314
              excerpt: "Paroled into the U.S. under §212(d)(5) of the INA for a period of at least 1 year. Eligible after a 5-year waiting period"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-314
              excerpt: "not subject to the 5-year waiting period if he/she: • Is under 18 years old; • Has 40 qualifying work quarters; • Is blind or disabled"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-314
              excerpt: "Was lawfully residing in the U.S. and 65 or older on August 22, 1996; or • Has a U.S. military connection"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          paroled_under_ina_212_d_5_for_at_least_one_year
          and not person_is_under_18
          and not person_has_40_qualifying_work_quarters
          and not person_is_blind_or_disabled
          and not person_was_lawfully_residing_and_65_or_older_on_august_22_1996
          and not person_has_us_military_connection

  - name: parolee_snap_eligible_after_waiting_period
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p.314, parolees row
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-314
              excerpt: "Paroled into the U.S. under §212(d)(5) of the INA for a period of at least 1 year. Eligible after a 5-year waiting period"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          parolee_subject_to_five_year_waiting_period
          and person_has_completed_five_year_waiting_period

  - name: parolee_snap_eligible_without_waiting_period
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p.314, parolees waiting-period exceptions
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-314
              excerpt: "not subject to the 5-year waiting period if he/she: • Is under 18 years old; • Has 40 qualifying work quarters; • Is blind or disabled"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-314
              excerpt: "Was lawfully residing in the U.S. and 65 or older on August 22, 1996; or • Has a U.S. military connection"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          paroled_under_ina_212_d_5_for_at_least_one_year
          and (person_is_under_18
          or person_has_40_qualifying_work_quarters
          or person_is_blind_or_disabled
          or person_was_lawfully_residing_and_65_or_older_on_august_22_1996
          or person_has_us_military_connection)

  - name: afghan_or_ukrainian_parolee_snap_eligible_immediately
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p.314, Afghan and Ukrainian parole rows
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-314
              excerpt: "Certain Afghan Nationals Granted Parole Between July 31, 2021 and September 30, 2023 Eligible immediately"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-314
              excerpt: "Certain Ukrainian Nationals Granted Parole Between February 24, 2022 and September 30, 2024 Eligible immediately"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          afghan_national_granted_parole_between_stated_dates
          or ukrainian_national_granted_parole_between_stated_dates

  - name: snap_non_citizen_status_eligible_immediately
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p.314, immediate eligibility rows
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-314
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          refugee_or_asylee_snap_eligible_immediately
          or parolee_snap_eligible_without_waiting_period
          or afghan_or_ukrainian_parolee_snap_eligible_immediately
