format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-191
  summary: |-
    "entitled to a notice of adverse action"; "Cash payments from the non-household member to the household"; "expenses will be prorated evenly"; "count that prorated portion".
  deferred_outputs:
    - output: us-sc:policies/dss/snap-policy-manual/page-191#notice_for_non_intentional_program_violation_ineligibility
      reason: The source requires a notice of adverse action in accordance with Section 16.1, but the referenced Section 16.1 notice mechanics are not available in copied context.
    - output: us-sc:policies/dss/snap-policy-manual/page-191#other_non_household_member_income_and_resources_not_considered_available_to_household
      reason: The covered non-household member class depends on Section 2.2 categories and exclusion from Section 14.1, neither of which is available in copied context.
rules:
  - name: notice_required_before_out_of_state_disqualification_action
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual p.191, notice paragraph
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-191
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          participating_household
          and agency_determines_household_contains_individual_disqualified_in_another_state_still_within_period
          and agency_action_would_reduce_suspend_or_terminate_household_benefits

  - name: cash_payments_from_non_household_member_income_amount
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    source: SNAP Manual p.191, Section 14.2, cash payments
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-191
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if household_received_cash_payments_from_non_household_member: max(0, cash_payments_from_non_household_member_to_household_amount) else: 0

  - name: vendor_payments_from_non_household_member_excluded_income_amount
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    source: SNAP Manual p.191, Section 14.2, vendor payments
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-191
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if household_received_vendor_payments_from_non_household_member: max(0, vendor_payments_from_non_household_member_amount) else: 0

  - name: deductible_shared_expense_with_non_household_member
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    source: SNAP Manual p.191, Section 14.2, shared deductible expenses
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-191
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if household_shares_deductible_expense_with_non_household_member: if shared_deductible_expense_payments_or_contributions_can_be_differentiated: max(0, household_amount_actually_paid_or_contributed_to_shared_deductible_expense) else: max(0, shared_deductible_expense_total_amount * household_persons_actually_paying_or_contributing_to_shared_expense_count / persons_actually_paying_or_contributing_to_shared_expense_count) else: 0

  - name: earned_income_from_combined_wage_with_non_household_member
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    source: SNAP Manual p.191, Section 14.2, combined earned income wage
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-191
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if household_members_and_non_household_member_earned_income_combined_into_one_wage: if household_share_of_combined_wage_can_be_identified: max(0, identified_household_share_of_combined_wage) else: max(0, combined_wage_earned_income_amount * household_members_covered_by_combined_wage_count / persons_whom_combined_wage_intended_to_cover_count) else: 0
