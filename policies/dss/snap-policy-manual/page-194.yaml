  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-194
  summary: '"When a household leaves the DAA treatment center, the center must perform
    the following: Notify SCDSS... Provide the household with its EBT card if it was
    in the possession of the DAA treatment center... If the household leaves the DAA
    treatment center prior to using any of the household''s allotment, the center
    must provide the allotment to the household... prior to the 16th of the month...
    provide the household with 1/2 of its monthly benefits... on or after the 16th...
    provide the household with a prorated amount of benefits... The DAA treatment
    center must return to the local county DSS office any EBT cards or benefits not
    provided to departing residents by the end of the month."'
  deferred_outputs:
  - output: us-sc:policies/dss/snap-policy-manual/page-194#daa_treatment_center_departure_duties
    reason: The operative legal subject is a DAA treatment center, including duties
      to notify SCDSS, provide or return EBT cards, provide or return allotments,
      and prorate benefits for departing resident households. The supported RuleSpec
      entity set does not include a treatment center or institutional custodian entity
      capable of holding cards, benefits, resident lists, or end-of-month return duties.
