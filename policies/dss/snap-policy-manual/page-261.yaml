format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-261
  summary: |-
    Households relocating to other States may use their EBT card in these States for remaining account benefits. For household misfortune replacements, staff must determine valid issuance, timely report within 10 days, DSS Form 1634B completion/signature, and that the loss was due to household misfortune.
rules:
  - name: household_misfortune_loss_report_deadline_days
    kind: parameter
    dtype: Count
    source: SNAP Manual section 22.8, report timing
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-261
              excerpt: "within 10 days of the reported destruction"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10

  - name: household_misfortune
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual section 22.8, definition of household misfortune
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-261
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          isolated_personal_disaster_destroyed_or_substantially_damaged_food_purchased_with_snap_benefits
          and occurrence_caused_by_power_outage_flood_fire_or_similar

  - name: household_misfortune_replacement_prerequisites_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual section 22.8(A)-(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-261
          - path: versions[0].formula
            kind: import
            import:
              target: us-sc:policies/dss/snap-policy-manual/page-261#household_misfortune
              output: household_misfortune
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-sc:policies/dss/snap-policy-manual/page-261#household_misfortune_loss_report_deadline_days
              output: household_misfortune_loss_report_deadline_days
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          benefits_were_validly_issued
          and days_between_reported_destruction_and_loss_report <= household_misfortune_loss_report_deadline_days
          and dss_form_1634b_completed_and_signed_by_responsible_household_member
          and household_misfortune

  - name: relocating_household_may_use_ebt_card_in_other_states
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual section 22.7
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-261
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_relocating_to_other_state
          and household_has_remaining_benefits_in_ebt_account
