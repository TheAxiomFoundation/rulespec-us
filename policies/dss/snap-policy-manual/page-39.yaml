format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-39
  summary: |-
    If a SNAP household member does not speak English or is limited English proficient (LEP), the Agency is responsible for obtaining a qualified interpreter. Family members, friends, or the authorized representative should not be used as interpreters. Except for households certified for longer than 12 months, households must have a face-to-face or telephone interview with an ES Worker at initial certification and at least once every 12 months thereafter. The Agency may not require households to report for an in-office interview during their certification period. If all adult members are elderly or disabled with no earned income and the household is certified for 24 months, a face-to-face interview is not required during the certification period.
rules:
  - name: regular_interview_interval_months
    kind: parameter
    dtype: Count
    source: SNAP Manual page 39, section 3.8 Interviews
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-39
              excerpt: "at least once every 12 months thereafter"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          12

  - name: extended_elderly_disabled_certification_months
    kind: parameter
    dtype: Count
    source: SNAP Manual page 39, section 3.8 Interviews
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-39
              excerpt: "certified for 24 months"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          24

  - name: qualified_interpreter_must_be_obtained
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 39, LEP interpreter services
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-39
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_member_does_not_speak_english
          or household_member_is_limited_english_proficient

  - name: family_friend_or_authorized_representative_interpreter_should_not_be_used
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 39, LEP interpreter services
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-39
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          proposed_interpreter_is_family_member
          or proposed_interpreter_is_friend
          or proposed_interpreter_is_authorized_representative

  - name: interpreter_code_must_be_entered
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 39, CHIP System interpreter needed field
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-39
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          interpreter_needed
          or translated_materials_needed

  - name: regular_certification_interview_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 39, section 3.8 Interviews
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-39
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (household_at_initial_certification or months_since_last_interview >= regular_interview_interval_months)
          and not certification_period_longer_than_regular_interview_interval

  - name: in_office_interview_requirement_prohibited_during_certification_period
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 39, section 3.8 Interviews
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-39
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_is_within_certification_period

  - name: face_to_face_interview_not_required_during_certification_period
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 39, section 3.8 Interviews
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-39
              excerpt: "all adult members are elderly or disabled with no earned income is certified for 24 months"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          all_adult_members_are_elderly_or_disabled
          and no_adult_member_has_earned_income
          and certification_period_months == extended_elderly_disabled_certification_months
