format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-156
  summary: |-
    "The payments/benefits received from the following sources are excluded as income by federal law: (A) Agent Orange payments by Aetna Life and Casualty; (B) Allowances, earnings, or payments to individuals participating in WIOA programs except earnings paid to participants in on-the-job training programs; (C) Child Care Development Block Grant ... NOTE: Payments from this funding to an individual providing the child care are counted as earned income." The page also states educational-income exclusion timing and cap rules, including that a student's total educational income exclusions cannot exceed that student's total educational income.
  deferred_outputs:
    - output: us-sc:policies/dss/snap-policy-manual/page-156#dependent_care_cost_educational_income_exclusion_not_also_excluded_under_general_dependent_care_deduction
      reason: The note coordinates dependent care cost exclusion with the general exclusion provisions of Section 12.6 Dependent Care Deduction, but that cited source is not available in copied context.
rules:
  - name: payment_excluded_from_income_by_federal_law
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: SNAP Manual page 156, Section 11.8(A)-(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-156
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          payment_is_agent_orange_payment_by_aetna_life_and_casualty
          or (payment_is_allowance_earning_or_payment_to_wioa_participant and
          not payment_is_earnings_paid_to_wioa_on_the_job_training_participant)
          or payment_is_child_care_development_block_grant_payment
  - name: child_care_development_block_grant_provider_payment_counted_as_earned_income
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: SNAP Manual page 156, Section 11.8(C) note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-156
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          payment_is_from_child_care_development_block_grant_funding
          and payment_is_to_individual_providing_child_care
  - name: educational_income_exclusion_amount
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: USD
    source: SNAP Manual page 156, educational income exclusion cap and timing provisions
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-156
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          min(student_total_educational_income, allowable_educational_expenses_incurred_or_anticipated_for_period_educational_income_intended_to_cover + allowable_educational_expenses_paid_from_other_income_before_educational_income_received + allowable_educational_expenses_used_over_earmarked_amounts)
