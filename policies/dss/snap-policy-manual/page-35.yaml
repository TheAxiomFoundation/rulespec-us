format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-35
  summary: |-
    The household may withdraw its application before eligibility is determined; the Agency documents any stated reason, confirms the withdrawal, and advises the household it may reapply. To determine SNAP eligibility, the application must be completed and signed, the household or authorized representative interviewed, and certain information verified. If the household refuses to cooperate, the application is denied at the time of refusal; refusal requires ability to cooperate, a clear demonstration of unwillingness to take required available actions, and refusal to be interviewed rather than merely failing to appear.
rules:
  - name: application_withdrawal_allowed_before_eligibility_determination
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: SNAP Manual section 3.4(8), Withdrawing application
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-35
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_voluntarily_withdraws_application
          and eligibility_has_not_been_determined

  - name: application_denied_for_refusal_to_cooperate
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: SNAP Manual section 3.5, Household Cooperation in Filing an Application for SNAP
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-35
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_able_to_cooperate
          and household_clearly_demonstrates_will_not_take_required_application_actions_it_can_take
          and household_refuses_to_be_interviewed
          and not household_merely_failed_to_appear_for_interview
          and not question_whether_household_merely_failed_to_cooperate_rather_than_refused
