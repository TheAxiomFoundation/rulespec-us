format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-338
  summary: |-
    "even though the client is told he/she must call the Intake Center within 4 days, the client is entitled to expedited service if he/she calls within 6 days from the date of application." Good cause should be granted when information indicates the client may not have received the notice in time or may not have been able to get through by the 6th day, and the case should be expedited if all other expedited criteria have been met.
rules:
  - name: intake_center_call_instruction_days
    kind: parameter
    dtype: Count
    period: Day
    source: SNAP Manual, Processing Standards for Expedited Service
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-338
              excerpt: "client is told he/she must call the Intake Center within 4 days"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          4

  - name: expedited_call_time_frame_days
    kind: parameter
    dtype: Count
    period: Day
    source: SNAP Manual, Processing Standards for Expedited Service
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-338
              excerpt: "entitled to expedited service if he/she calls within 6 days from the date of application"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          6

  - name: expedited_service_call_timing_satisfied
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: SNAP Manual, Processing Standards for Expedited Service
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-338
              excerpt: "entitled to expedited service if he/she calls within 6 days from the date of application"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-338
              excerpt: "good cause should be granted to the client"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          client_called_intake_center_within_six_day_time_frame
          or good_cause_for_calling_after_sixth_day

  - name: good_cause_for_calling_after_sixth_day
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: SNAP Manual, Processing Standards for Expedited Service
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-338
              excerpt: "may not have received the notice in time to call the Intake Center"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-338
              excerpt: "may not have been able to get through to the interview center by the 6th day"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          client_may_not_have_received_notice_in_time_to_call
          or client_may_not_have_been_able_to_get_through_by_sixth_day
          or application_or_annual_recertification_form_not_registered_timely

  - name: expedited_processing_allowed_under_call_standard
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: SNAP Manual, Processing Standards for Expedited Service
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-338
              excerpt: "case should be expedited if all other expedited criteria have been met"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-338
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          all_other_expedited_criteria_met
          and expedited_service_call_timing_satisfied
