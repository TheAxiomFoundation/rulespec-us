format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-49
  summary: |-
    For joint TANF/SNAP applications, SCDSS uses SNAP verification for SNAP-only factors and TANF verification for factors needed by both programs, but cannot deny or delay SNAP when Chapter 5 SNAP verification is sufficient and TANF verification is not. If TANF is denied, SCDSS must determine or continue SNAP eligibility from the original joint application and use other documented TANF information relevant to SNAP. SSI/SNAP simultaneous applicants are subject to SNAP eligibility criteria until categorically eligible.
rules:
  - name: tanf_verification_failure_cannot_be_basis_for_snap_denial
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 49, joint TANF/SNAP verification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-49
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_applies_for_both_tanf_and_snap
          and household_provided_sufficient_snap_chapter_5_verification
          and household_failed_to_provide_sufficient_tanf_verification
  - name: snap_application_must_be_processed_under_snap_verification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 49, joint TANF/SNAP processing after TANF verification failure
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-49
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_applies_for_both_tanf_and_snap
          and household_provided_sufficient_snap_chapter_5_verification
          and household_failed_to_provide_sufficient_tanf_verification
  - name: original_joint_application_continues_for_snap_after_tanf_denial
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 49, joint TANF/SNAP application when TANF denied
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-49
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_filed_joint_tanf_snap_application
          and tanf_application_denied
  - name: simultaneous_ssi_snap_applicant_subject_to_snap_criteria_until_categorical_eligibility
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 49, applicant SSI households
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-49
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_applies_simultaneously_for_ssi_and_snap
          and not household_considered_categorically_eligible
