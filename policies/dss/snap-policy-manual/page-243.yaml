format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-243
  summary: '"An ESAP household may complete a DSS Form 16176, Application for ESAP;
    or a DSS Form 3800 in order to apply for SNAP benefits." "Once the application
    is registered in SCWINS, an Interview Notice will be sent to the applicant to
    call and complete an interview." "ESAP households are required to complete a DSS
    Form 3808, Interim Contact/Notice of Expiration, annually at the 12th month and
    24th month of the 36-month certification period."'
  deferred_outputs:
  - output: us-sc:policies/dss/snap-policy-manual/page-243#esap_certification_period_months
    reason: Generated rule used a local name that collides with a sibling RuleSpec
      export. This output is deferred until it can be encoded with a semantic branch-specific
      name without creating ambiguous sibling imports.
  - output: us-sc:policies/dss/snap-policy-manual/page-243#household_must_complete_interim_contact_form
    reason: Generated rule depends on an output that validation deferred because it
      flattened thresholded, capped, base-limited, or cross-referenced mechanics,
      or borrowed an unrelated same-named section term.
  - output: us-sc:policies/dss/snap-policy-manual/page-243#interim_contact_form_required
    reason: Generated rule used a local name that collides with a sibling RuleSpec
      export. This output is deferred until it can be encoded with a semantic branch-specific
      name without creating ambiguous sibling imports.
