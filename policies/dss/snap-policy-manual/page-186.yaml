format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-186
  summary: |-
    The Agency will provide applicants with one of the following written notices as soon as a determination is made, but no later than 30 days after the date of the initial application: notice of eligibility or notice of denial. Eligibility notices state the allotment, certification period dates, anticipated benefit variations, hearing/contact/legal-services information, and special expedited/postponed-verification and notice-of-expiration content where applicable.
rules:
  - name: initial_application_notice_deadline_days
    kind: parameter
    dtype: Integer
    source: SNAP Manual 13.9(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-186
              excerpt: "no later than 30 days after the date of the initial application"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: initial_application_notice_timely
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 13.9(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-186
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          initial_application_determination_made
          and initial_application_written_notice_provided
          and days_after_initial_application_when_notice_provided <= initial_application_notice_deadline_days

  - name: approved_application_notice_complete
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 13.9(1)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-186
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          application_approved
          and notice_states_allotment_amount
          and notice_states_certification_beginning_date
          and notice_states_certification_ending_date
          and notice_advises_anticipated_benefit_variations
          and notice_advises_fair_hearing_right
          and notice_provides_snap_office_telephone_number

  - name: initial_allotment_multiple_month_notice_complete
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 13.9(1)(A)1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-186
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          initial_allotment_contains_application_month_and_current_month_benefits
          and notice_explains_initial_allotment_includes_more_than_one_month_benefits
          and notice_indicates_monthly_allotment_for_remainder_of_certification_period

  - name: expedited_without_verification_notice_complete
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 13.9(1)(A)2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-186
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          application_approved_on_expedited_basis_without_verification
          and notice_explains_household_must_provide_waived_verification
          and notice_explains_consequences_of_failure_to_provide_postponed_verification

  - name: notice_of_eligibility_may_be_combined_with_expiration_notice
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 13.9(1)(A)3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-186
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_provided_notice_of_expiration_at_certification
          and (eligibility_notice_combined_with_notice_of_expiration or separate_eligibility_and_expiration_notices_sent)

  - name: denied_application_notice_complete
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 13.9(1)(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-186
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          application_denied
          and denial_notice_explains_basis_for_denial
          and denial_notice_advises_fair_hearing_right
          and denial_notice_provides_snap_office_telephone_number
