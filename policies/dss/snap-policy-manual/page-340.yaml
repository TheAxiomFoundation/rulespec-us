format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-340
  summary: |-
    "RE Refugee REF Refugee ... ST6 Victims of severe form of trafficking (T1 non-immigrant) ... SU6 Victim of criminal activity (U1 non-immigrants) ... Immigrant Classes of Admission: An immigrant is a non-citizen entering the United States to reside permanently. For example, a Lawful Permanent Resident (LPR)."
rules:
  - name: immigrant
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 340, Immigrant Classes of Admission
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-340
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_non_citizen
          and person_enters_united_states_to_reside_permanently
