format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-29
  summary: |-
    "The application process includes filing and completing an application form, being interviewed, and having certain information verified." The Agency must act promptly, provide SNAP benefits retroactive to the month of application to eligible households that completed the application process, meet application processing timelines, and make expedited service available to households in immediate need.
rules:
  - name: application_process_completed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 3.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-29
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          application_form_filed
          and application_form_completed
          and household_interviewed
          and required_information_verified
  - name: retroactive_benefits_to_month_of_application_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 3.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-29
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          application_process_completed
          and household_determined_eligible_for_snap
  - name: expedited_service_available
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 3.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-29
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_in_immediate_need
