format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-251
  summary: |-
    The Agency will restore to households' benefits which were lost whenever the loss was caused by an error by the Agency ... or if there is a statement elsewhere in the regulations specifically stating that the household is entitled to restoration of lost benefits. ... benefits will be restored for not more than twelve months prior to whichever ... occurred first. The Agency will restore to households' benefits which were found by any judicial action to have been wrongfully withheld. ... Benefits will be restored even if the household is currently ineligible.
  deferred_outputs:
    - output: us-sc:policies/dss/snap-policy-manual/page-251#lost_benefits_restoration_entitlement
      reason: The complete entitlement rule includes restoration when an administrative disqualification for intentional Program violation was subsequently reversed as specified in Section 21.5, but Section 21.5 is not available in copied context.
rules:
  - name: ordinary_restoration_lookback_month_limit
    kind: parameter
    dtype: Count
    source: SNAP Manual Chapter 21.1, ordinary restoration period limit
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-251
              excerpt: "not more than twelve months"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          12

  - name: judicial_first_action_restoration_lookback_month_limit
    kind: parameter
    dtype: Count
    source: SNAP Manual Chapter 21.1, judicial action as first action period limit
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-251
              excerpt: "not more than twelve months from the date the court action was initiated"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          12

  - name: judicial_review_restoration_lookback_month_limit
    kind: parameter
    dtype: Count
    source: SNAP Manual Chapter 21.1, judicial review of Agency action period limit
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-251
              excerpt: "Never more than one year from when the Agency is notified of, or discovers, the loss"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          12

  - name: ordinary_restoration_entitlement_without_section_21_5_branch
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual Chapter 21.1, non-Section 21.5 ordinary entitlement grounds
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-251
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          lost_benefits_were_caused_by_agency_error
          or regulations_elsewhere_specifically_state_household_entitled_to_restoration

  - name: judicial_wrongful_withholding_restoration_entitlement
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual Chapter 21.1, judicial wrongful withholding entitlement
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-251
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          judicial_action_found_benefits_wrongfully_withheld

  - name: restoration_available_despite_current_ineligibility
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual Chapter 21.1, current ineligibility rule
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-251
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_currently_ineligible
          and (ordinary_restoration_entitlement_without_section_21_5_branch or judicial_wrongful_withholding_restoration_entitlement)
