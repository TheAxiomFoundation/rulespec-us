format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-206
  summary: |-
    "Applicant households are required to report any change(s) which has occurred in its circumstances since filing the application at the certification interview; however, reportable changes which occur after the interview, but before notification of eligibility, must be reported by the household by the tenth day of the month following the month in which the household receives the notice of eligibility." At specified certification and simplified-reporting transfer events, the Agency must provide written and oral explanations of simplified reporting, reporting requirements, what must be reported and verified, when the report is due, and how to obtain assistance.
rules:
  - name: application_change_reporting_requirement_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual Chapter 15.2, Changes During the Application for Certification Process
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-206
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-206
              excerpt: "by the tenth day of the month following the month in which the household receives the notice of eligibility"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (not household_had_change_since_application_filing_before_certification_interview or household_reported_that_change_at_certification_interview)
          and (not household_had_reportable_change_after_interview_before_eligibility_notice or household_reported_that_change_by_tenth_day_of_month_following_eligibility_notice)
  - name: simplified_reporting_explanation_requirement_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual Chapter 15.3, Simplified Reporting Households
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-206
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-206
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (not household_is_at_initial_certification_annual_recetification_six_month_recetification_tri_annual_recetification_or_transfer_to_simplified_reporting)
          or (agency_provided_written_and_oral_explanation_of_how_simplified_reporting_works
          and agency_provided_written_and_oral_explanation_of_reporting_requirements
          and agency_explained_what_needs_to_be_reported_and_verified
          and agency_explained_when_the_report_is_due
          and agency_explained_how_to_obtain_assistance)
