format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-200
  summary: |-
    A TANF sanction may occur for failure to meet SSN requirements, school enrollment or attendance failures by a TANF recipient under age 19, failure to comply with CSSD, or failure to comply with TANF work requirements. A decreased TANF benefit will usually result in an increased SNAP allotment; however, the household must not receive an increase in SNAP benefits. This provision does not apply to initial TANF applications, new-member ineligibility, time limits, family cap child ineligibility, TANF annual redetermination failure, inability to perform, or purely procedural requirements.
rules:
  - name: tanf_sanction_for_failure_to_comply
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 14.8(1), listed TANF sanction reasons
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-200
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          tanf_sanction_due_to_failure_to_meet_ssn_requirements
          or tanf_sanction_due_to_under_19_school_enrollment_or_attendance_failure
          or tanf_sanction_due_to_failure_to_comply_with_cssd
          or tanf_sanction_due_to_failure_to_comply_with_tanf_work_requirement
  - name: tanf_penalty_continuity_requirement_met
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 14.8(1), TANF receiving/continued-benefits continuity rule
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-200
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          tanf_benefits_reduced_suspended_or_terminated_due_to_failure_to_comply
          or household_applied_for_continued_tanf_benefits_with_no_break_in_participation
  - name: tanf_sanction_snap_increase_bar_applies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 14.8(1), SNAP increase bar and exceptions
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-200
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-200
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          tanf_sanction_for_failure_to_comply
          and tanf_penalty_continuity_requirement_met
          and household_receiving_snap_at_time_of_tanf_failure_to_comply
          and not initial_tanf_application
          and not new_member_determined_ineligible
          and not tanf_time_limit_reached
          and not child_ineligible_because_of_family_cap
          and not tanf_annual_redetermination_not_completed
          and not individual_unable_to_perform_required_action
          and not failure_to_comply_with_purely_procedural_requirement
