format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-217
  summary: |-
    "(H) The Agency has assigned a longer certification period to a household certified on an expedited basis and for whom verification was postponed..." "(J) The Agency is terminating the eligibility of a resident of a Drug Addiction or Alcoholic (DAA) treatment center or a Group Living Arrangement (GLA) if the facility loses either its certification... or has its status as an authorized representative suspended..." "(K) The household voluntarily requests, in writing or in the presence of a caseworker, that its participation be terminated..." "(L) The Agency determines, based on reliable information that the household will not be residing in the State..." "16.3 ADEQUATE NOTICE WHEN THE HOUSEHOLD'S ADDRESS IS UNKNOWN The Agency will take no action during the certification period when the household's address is unknown, and mail directed to it... has been returned by the post office indicating no known forwarding address."
  deferred_outputs:
    - output: us-sc:policies/dss/snap-policy-manual/page-217#benefit_reduction_for_repayment_failure_conversion_applies
      reason: Section 23.7 is cited for agreed-upon repayment and recipient-claim collection mechanics, but no copied context provides the referenced source needed to compute that branch faithfully.
    - output: us-sc:policies/dss/snap-policy-manual/page-217#claim_recoupment_initiation_applies
      reason: Section 23.9 is cited for delinquent recipient-claim recoupment mechanics, but no copied context provides the referenced source needed to compute that branch faithfully.
    - output: us-sc:policies/dss/snap-policy-manual/page-217#unknown_address_information_acted_on_at_next_mandatory_rebudget
      reason: Section 15.4 is cited for the next mandatory re-budget of simplified reporting households, but no copied context provides the referenced source needed to compute that timing branch faithfully.
rules:
  - name: agency_may_act_without_further_notice_on_postponed_verification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 217(H)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-217
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          agency_assigned_longer_certification_period
          and household_certified_on_expedited_basis
          and verification_was_postponed
          and household_received_written_notice_benefits_beyond_application_month_contingent_on_postponed_verification
          and household_received_written_notice_agency_may_act_on_verified_information_without_further_notice
  - name: daa_or_gla_resident_eligibility_termination_applies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 217(J)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-217
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          agency_is_terminating_eligibility_of_resident_of_daa_treatment_center_or_gla
          and (facility_lost_state_certification or facility_authorized_representative_status_suspended_due_to_fns_retailer_disqualification)
          and not gla_resident_applies_on_own_behalf
  - name: household_voluntary_participation_termination_applies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 217(K)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-217
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_voluntarily_requests_participation_termination_in_writing
          or household_voluntarily_requests_participation_termination_in_presence_of_caseworker
  - name: agency_must_send_voluntary_withdrawal_confirmation_letter
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 217(K)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-217
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_voluntarily_requests_participation_termination_in_presence_of_caseworker
          and not household_voluntarily_requests_participation_termination_in_writing
  - name: household_may_request_fair_hearing_after_voluntary_withdrawal_confirmation
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 217(K)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-217
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          agency_sent_voluntary_withdrawal_confirmation_letter
  - name: out_of_state_next_allotment_termination_applies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 217(L)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-217
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          agency_determines_based_on_reliable_information_household_will_not_reside_in_state
          and household_will_not_be_entitled_to_obtain_next_allotment
  - name: agency_must_take_no_action_during_certification_period_for_unknown_address
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 217 section 16.3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-217
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_address_unknown
          and mail_directed_to_household_returned_by_post_office
          and returned_mail_indicates_no_known_forwarding_address
          and household_is_within_certification_period
