format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-359
  summary: |-
    Payment Error Rate is the sum of overpayment and underpayment component error rates. Processing Standards require eligible households completing the initial application process to have an opportunity to participate in SNAP no later than 30 calendar days after filing for regular applications and no later than 6 calendar days after filing for expedited applications.
rules:
  - name: regular_application_processing_standard_days
    kind: parameter
    dtype: Count
    source: SNAP Manual p. 359, Processing Standards
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-359
              excerpt: "no later than 30 calendar days"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: expedited_application_processing_standard_days
    kind: parameter
    dtype: Count
    source: SNAP Manual p. 359, Processing Standards
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-359
              excerpt: "no later than 6 calendar days"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          6
