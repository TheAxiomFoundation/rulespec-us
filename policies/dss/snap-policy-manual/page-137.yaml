format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-137
  summary: |-
    "Self-employment income is income earned directly from one's own business, trade or profession rather than a specified salary or wages from an employer." Self-employment income must be averaged over the period the income is intended to cover, unless a substantial business increase or decrease requires calculation on anticipated earnings.
rules:
  - name: self_employment_income
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: SNAP Manual 11.4 Self-Employment Income
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-137
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          payment_is_income_earned_directly_from_own_business_trade_or_profession
          and
          not payment_is_specified_salary_or_wages_from_employer

  - name: monthly_self_employment_income_from_business
    kind: derived
    entity: Business
    dtype: Money
    period: Month
    unit: USD
    source: SNAP Manual 11.4(1), Treatment of self-employment income
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-137
              excerpt: "Self-employment income must be averaged over the period the income is intended to cover"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-137
              excerpt: "substantial increase or decrease in business ... calculate ... on the basis of anticipated"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-137
              excerpt: "business enterprise that has been in existence at least a year"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-137
              excerpt: "business enterprise that has been in existence less than a year"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if business_income_substantially_increased_or_decreased:
            if earnings_reflecting_increase_or_decrease_are_available:
              anticipated_monthly_earnings_reflecting_increase_or_decrease
            else:
              best_estimated_monthly_self_employment_income
          else:
            if business_enterprise_has_existed_at_least_a_year:
              self_employment_income_for_period_income_intended_to_cover / months_income_intended_to_cover
            else:
              self_employment_income_for_period_business_has_operated / months_business_has_operated
