format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-383
  summary: |-
    Section 15.4 clarifies that out-of-state move reports from another SNAP agency must be acted on regardless of allotment effect. Section 19.1 reflects SCCAP changes in which clients with excess medical over $50 and legally obligated child support may opt out. Section 5.7 says a reported change in actual rent/mortgage expenses at recertification will not require verification if equal to or less than $25. Section 9.1 defines an ABAWD for SNAP 2 WORK as household members 18-35 who are able bodied and have no dependents.
rules:
  - name: recertification_rent_mortgage_change_verification_threshold
    kind: parameter
    dtype: Money
    period: Month
    unit: USD
    source: SNAP Manual page 383, Section 5.7 change note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-383
              excerpt: "equal to or less than $25"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          25

  - name: reported_rent_mortgage_change_at_recertification_requires_verification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 383, Section 5.7 change note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-383
              excerpt: "a reported change in actual rent/ mortgage expenses at recertification will not require verification if equal to or less than $25"
          - path: versions[0].formula
            kind: import
            import:
              target: us-sc:policies/dss/snap-policy-manual/page-383#recertification_rent_mortgage_change_verification_threshold
              output: recertification_rent_mortgage_change_verification_threshold
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          reported_change_in_actual_rent_mortgage_expenses_at_recertification
          and actual_rent_mortgage_expense_change_amount > recertification_rent_mortgage_change_verification_threshold

  - name: sccap_excess_medical_opt_out_threshold
    kind: parameter
    dtype: Money
    period: Month
    unit: USD
    source: SNAP Manual page 383, Section 19.1 change note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-383
              excerpt: "excess medical over $50"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          50

  - name: sccap_client_may_opt_out
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 383, Section 19.1 change note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-383
              excerpt: "clients with excess medical over $50 and legally obligated child support may opt out"
          - path: versions[0].formula
            kind: import
            import:
              target: us-sc:policies/dss/snap-policy-manual/page-383#sccap_excess_medical_opt_out_threshold
              output: sccap_excess_medical_opt_out_threshold
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          client_excess_medical_amount > sccap_excess_medical_opt_out_threshold
          and client_has_legally_obligated_child_support

  - name: out_of_state_move_report_from_another_snap_agency_must_be_acted_on
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 383, Section 15.4 change note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-383
              excerpt: "reports received by the agency from another SNAP agency, that clients have moved out of state must be acted on"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-383
              excerpt: "regardless of whether the change causes an increase or decrease in the SNAP allotment"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          agency_received_report_from_another_snap_agency
          and clients_have_moved_out_of_state

  - name: snap_2_work_abawd
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 383, Section 9.1 change note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-383
              excerpt: "defined an ABAWD to household members 18-35 who are able bodied and have no dependents"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_household_member
          and person_is_age_18_to_35
          and person_is_able_bodied
          and person_has_no_dependents
