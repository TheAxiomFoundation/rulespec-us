format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-83
  summary: |-
    Certain American Indians born abroad American Indians born in Canada living in the United States (U.S.) under §289 of the Immigration and Nationality Act (INA) or non-citizen members of a federally recognized Indian tribe under §4(e) of the Indian Self- Determination and Education Assistance Act.
    Non-citizens who are not eligible unless status adjust to an LPR and are not eligible until after the 5-year waiting period.
rules:
  - name: person_has_page_83_snap_non_citizen_status
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 83, listed non-citizen status categories
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-83
              excerpt: American Indians born in Canada living in the United States (U.S.) under §289
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-83
              excerpt: non-citizen members of a federally recognized Indian tribe under §4(e)
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-83
              excerpt: Hmong or Highland Laotian tribe that rendered assistance to U.S. personnel
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-83
              excerpt: spouse (or un-remarried surviving spouse) or unmarried dependent children
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-83
              excerpt: Granted special immigrant status under §101(a)(27) of the INA
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-83
              excerpt: Admitted as a refugee into the U.S. under §207 of the INA
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-83
              excerpt: Victims under the Trafficking Victims Protection Act of 2000
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-83
              excerpt: Ukrainians Granted parole in the Additional Ukraine Supplemental Appropriations Act, 2022
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-83
              excerpt: not eligible unless status adjust to an LPR and are not eligible until after the 5-year waiting period
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-83
              excerpt: Paroled into the U.S. under §212(d)(5) of the INA for a period of at least 1 year
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          american_indian_born_in_canada_living_in_us_under_ina_289
          or non_citizen_member_of_federally_recognized_indian_tribe_under_indian_self_determination_act_4_e
          or (
            lawfully_residing_in_us
            and (
              hmong_or_highland_laotian_tribal_member_assisted_us_personnel_during_vietnam_era
              or spouse_or_unremarried_surviving_spouse_of_hmong_or_highland_laotian_qualifying_member
              or unmarried_dependent_child_of_hmong_or_highland_laotian_qualifying_member
            )
          )
          or granted_iraqi_or_afghan_special_immigrant_status_under_ina_101_a_27
          or admitted_as_refugee_under_ina_207
          or subjected_to_severe_forms_of_trafficking_in_persons
          or family_member_granted_derivative_t_nonimmigrant_status
          or granted_ukrainian_parole_under_additional_ukraine_supplemental_appropriations_act_section_401
          or (
            adjusted_to_lawful_permanent_resident
            and completed_five_year_waiting_period_after_lpr_adjustment
            and (
              battered_non_citizen_or_subject_to_extreme_cruelty_in_us
              or qualifying_relative_of_battered_person_with_petition_pending
              or granted_conditional_entry_under_ina_203_a_7_before_cutoff
              or paroled_into_us_under_ina_212_d_5_for_at_least_one_year
            )
          )
