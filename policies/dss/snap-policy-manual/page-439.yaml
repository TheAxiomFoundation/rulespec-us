    source: SNAP Manual page 439, 8.15 Exceptions to ABAWD Work Requirement update note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-439
              excerpt: all veterans meet an exception to the ABAWD Work Requirement, regardless if they were honorably or dishonorably discharged
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_veteran
