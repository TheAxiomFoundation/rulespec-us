format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-21
  summary: |-
    "To ensure that all SNAP applicants or recipients have access to nondiscrimination statutes and policies, complaint procedures and the rights of participants, the information must be provided within 10 days of the date of a request." The Agency maintains a program complaint system, excluding discrimination complaints handled under Section 1.5 and complaints that can be pursued through a fair hearing under Section 18.1.
  deferred_outputs:
    - output: us-sc:policies/dss/snap-policy-manual/page-21#program_complaint_procedure_applies
      reason: The complaint-procedure surface excludes discrimination complaints handled under Section 1.5 and complaints pursued through fair hearing under Section 18.1, but those cited sources are not available in context.
rules:
  - name: nondiscrimination_information_response_deadline_days
    kind: parameter
    dtype: Count
    source: SNAP Manual page 21, nondiscrimination information request deadline
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-21
              excerpt: "within 10 days of the date of a request"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10

  - name: nondiscrimination_information_timely_provided
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: SNAP Manual page 21, nondiscrimination information access requirement
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-21
          - path: versions[0].formula
            kind: import
            import:
              target: us-sc:policies/dss/snap-policy-manual/page-21#nondiscrimination_information_response_deadline_days
              output: nondiscrimination_information_response_deadline_days
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_snap_applicant_or_recipient
          and person_requested_nondiscrimination_information
          and days_between_request_and_information_provision <= nondiscrimination_information_response_deadline_days
