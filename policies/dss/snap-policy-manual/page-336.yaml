format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-336
  summary: |-
    Example #6: If the recertification form was received on January 10th and screening indicates the household is entitled to expedited service. Case must be processed no later than January 16th for January (since the form was received on or before the 15th of the month). Benefits are prorated from January 10th. Case is processed with postponed verification.
rules:
  - name: expedited_recertification_form_received_on_or_before_fifteenth_processed_with_postponed_verification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 336, Example #6
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-336
              excerpt: "recertification form was received on January 10th and screening indicates the household is entitled to expedited service"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-336
              excerpt: "on or before the 15th of the month"
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-336
              excerpt: "Case is processed with postponed verification."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          recertification_form_received_on_or_before_fifteenth_of_month
          and screening_indicates_household_entitled_to_expedited_service

  - name: expedited_recertification_form_received_after_fifteenth_processed_with_postponed_verification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 336, Example immediately before Example #6
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-336
              excerpt: "since form is received after the 15th of the month"
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-336
              excerpt: "Case is processed with postponed verification."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          recertification_form_received_after_fifteenth_of_month
          and screening_indicates_household_entitled_to_expedited_service

  - name: expedited_recertification_benefits_prorated_from_form_receipt_date
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 336, examples on proration from January 20th and January 10th
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-336
              excerpt: "Benefits are prorated from January 20th."
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-336
              excerpt: "Benefits are prorated from January 10th."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          screening_indicates_household_entitled_to_expedited_service
          and (recertification_form_received_on_or_before_fifteenth_of_month or recertification_form_received_after_fifteenth_of_month)
