format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-388
  summary: Section 3.7 Interviews and Section 13.8 (1) (C) clarify that households
    in which all adult members are elderly or disabled "with no earned income" are
    certified for up to 24 months. Section 12.6 clarifies that a dependent should
    be in the SNAP household or reside in the home of the SNAP household member and
    that the household must pay an individual outside of the SNAP household for dependent
    care service. Section 15.3 clarifies that these households are assigned a 24-month
    certification period and are not subject to simplified reporting requirements
    within each six-month certification.
  deferred_outputs:
  - output: us-sc:policies/dss/snap-policy-manual/page-388#certification_period_months_for_elderly_disabled_no_earned_income_household
    reason: Generated rule depends on an output that validation deferred because it
      flattened thresholded, capped, base-limited, or cross-referenced mechanics,
      or borrowed an unrelated same-named section term.
  - output: us-sc:policies/dss/snap-policy-manual/page-388#elderly_disabled_no_earned_income_certification_period_months
    reason: Generated rule used a local name that collides with a sibling RuleSpec
      export. This output is deferred until it can be encoded with a semantic branch-specific
      name without creating ambiguous sibling imports.
