  summary: |-
    Coordinate with Work Force Development staff and employers to develop employment and training opportunities; establish community, business, education, faith, and other partnerships; track local economic and labor market information; assist TPRP providers; provide case management. The SNAP E&T Program includes a Vocational Training component providing occupational training, with Quick Jobs and similar programs generally lasting three months or less and all courses lasting less than one year.
