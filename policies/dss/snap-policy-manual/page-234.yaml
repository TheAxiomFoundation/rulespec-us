format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-234
  summary: |-
    The household must be informed of the Fair Hearing Committee decision within 60 days of the initial request. The Agency must effectuate benefit changes within 10 days after receiving the final decision. A party may file a written Motion for Reconsideration within 10 days of service of the order; OAH may order reconsideration on its own motion within 10 days after service and will dispose of the motion within 30 days after filing.
rules:
  - name: fair_hearing_decision_notice_deadline_days
    kind: parameter
    dtype: Count
    source: SNAP Manual page 234 (C)(3), Time frames
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-234
              excerpt: "within 60 days of the initial request"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          60

  - name: agency_benefit_change_effectuation_deadline_days
    kind: parameter
    dtype: Count
    source: SNAP Manual page 234 (C)(3), Time frames
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-234
              excerpt: "within 10 days of receiving the final decision"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10

  - name: motion_for_reconsideration_filing_deadline_days
    kind: parameter
    dtype: Count
    source: SNAP Manual page 234 (C)(4), Motion for reconsideration
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-234
              excerpt: "within 10 days of the service of the order"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10

  - name: office_own_motion_reconsideration_deadline_days
    kind: parameter
    dtype: Count
    source: SNAP Manual page 234 (C)(4), Motion for reconsideration
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-234
              excerpt: "within 10 days after the service of the final order"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10

  - name: motion_for_reconsideration_disposition_deadline_days
    kind: parameter
    dtype: Count
    source: SNAP Manual page 234 (C)(4), Motion for reconsideration
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-234
              excerpt: "within 30 days after it is filed"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: motion_for_reconsideration_grant_basis_exists
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: SNAP Manual page 234 (C)(4), Motion for reconsideration
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-234
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          motion_identifies_material_error_of_law
          or motion_identifies_material_error_of_fact
          or motion_identifies_new_evidence_sufficient_to_reverse_or_modify_order_not_previously_discoverable_by_due_diligence
