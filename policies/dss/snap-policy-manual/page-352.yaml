format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-352
  summary: |-
    "Eligible Foods" includes food or food products for human consumption except alcoholic beverages, tobacco, hot foods prepared for immediate consumption, and excess returnable-container deposit fees; also seeds and plants for personal food consumption, specified authorized meals, specified Alaska subsistence hunting and fishing equipment, and specified meals for homeless SNAP households. "Employment & Training (E&T) Program" means a program operated by the Agency consisting of case management and one or more E&T components.
  deferred_outputs:
    - output: us-sc:policies/dss/snap-policy-manual/page-352#employment_and_training_program
      reason: The source defines a program operated by the Agency, but the supported RuleSpec entity set has no Program or Agency entity for a faithful executable definition.
rules:
  - name: eligible_food
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: SNAP Manual page 352, Eligible Foods
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-352
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (
            (
              asset_is_food_or_food_product_intended_for_human_consumption
              and not asset_is_alcoholic_beverage
              and not asset_is_tobacco
              and not asset_is_hot_food_or_hot_food_product_prepared_for_immediate_consumption
              and not asset_is_deposit_fee_in_excess_of_state_fee_reimbursement_required_for_returnable_container
            )
            or asset_is_seed_or_plant_to_grow_food_for_personal_consumption_of_eligible_household
            or asset_is_meal_prepared_and_delivered_by_authorized_meal_delivery_service_to_household_eligible_to_use_snap_for_delivered_meals
            or asset_is_meal_served_by_authorized_communal_dining_facility_to_household_eligible_to_use_snap_for_communal_dining
            or asset_is_meal_prepared_and_served_by_drug_addict_or_alcoholic_treatment_and_rehabilitation_center_to_resident_addict_or_alcoholic_or_child_living_with_them
            or asset_is_meal_prepared_and_served_by_group_living_arrangement_facility_to_blind_or_disabled_resident
            or asset_is_meal_prepared_and_served_by_shelter_for_battered_women_and_children_to_eligible_resident
            or (
              asset_is_equipment_for_procuring_food_for_eligible_household_in_alaska_area_with_extremely_difficult_food_store_access_and_subsistence_hunting_or_fishing_reliance
              and not asset_is_equipment_for_transportation_clothing_or_shelter
              and not asset_is_firearm_ammunition_or_other_explosive
            )
            or asset_is_meal_prepared_for_and_served_to_homeless_snap_household_by_authorized_public_or_private_nonprofit_establishment_approved_by_state_or_local_agency
            or asset_is_meal_prepared_by_restaurant_contracting_with_state_agency_to_serve_homeless_persons_at_concessional_prices
          )
