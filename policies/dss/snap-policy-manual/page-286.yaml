  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-286
  summary: |-
    The Office of Economic Services will ensure that local SNAP office corrective action plans are prepared for deficiencies not required in the State plan. Local plans remain open-ended until deficiencies are reduced substantially or eliminated. Unreported deficiencies requiring incorporation must be submitted within 60 days of identification, and plans must include descriptions, sources, magnitude when appropriate, and geographic extent of each deficiency.
  unsupported_reason: |-
    The source imposes administrative duties on the Office of Economic Services, the State Agency, FNS, and local SNAP offices. RuleSpec's supported executable entities do not include agencies, offices, corrective action plans, deficiencies, or administrative submissions, so the obligations cannot be faithfully scoped to an allowed entity.
