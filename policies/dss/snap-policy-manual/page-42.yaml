format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-42
  summary: |-
    "voter registration services be provided to all SNAP applicants and recipients at application, recertification, and when a change of address is reported"; if not registered, the interviewer asks whether the client wants to register; if the PI wishes to register, Form 210 will be mailed.
rules:
  - name: voter_registration_services_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: SNAP Manual 3.10, Voter Registration Requirements
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-42
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_snap_applicant_or_recipient
          and (
            application_event
            or recertification_event
            or change_of_address_reported
          )
  - name: interviewer_must_ask_whether_client_wants_to_register
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: SNAP Manual 3.10, Procedure
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-42
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          initial_application_or_annual_recertification_interview
          and client_is_not_registered_to_vote
  - name: chip_pi_voter_status_declined_code_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: SNAP Manual 3.10, Procedure
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-42
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          initial_application_or_annual_recertification_interview
          and client_is_not_registered_to_vote
          and principal_individual_declines_to_register_to_vote
  - name: form_210_must_be_mailed_to_client
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: SNAP Manual 3.10, Procedure
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-42
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          initial_application_or_annual_recertification_interview
          and client_is_not_registered_to_vote
          and principal_individual_wants_to_register_to_vote
