format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-316
  summary: |-
    “When the ‘A’ Form is registered in SCWINS ... the interview date field on CHIP INRD screen will automatically be populated with an interview date 10 days from the date of registration.” “As long as the household completes the interview by June 30th, the household is entitled to uninterrupted benefits.”
rules:
  - name: automated_interview_notice_offset_days
    kind: parameter
    dtype: Count
    source: SNAP Manual page 316, SNAP Annual (12-Month) Recertification Chart
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-316
              excerpt: "interview date 10 days from the date of registration"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10

  - name: annual_recertification_entitled_to_uninterrupted_benefits
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 316, note to timely annual recertification interview completion example
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-316
              excerpt: "As long as the household completes the interview by June 30th, the household is entitled to uninterrupted benefits."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          annual_recertification_a_form_submitted_timely
          and household_completes_interview_by_end_of_recertification_month

  - name: chip_interview_date_field_automatically_populated_from_registration
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: SNAP Manual page 316, process for registering timely A Form in SCWINS
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-316
              excerpt: "interview date field on CHIP INRD screen will automatically be populated with an interview date 10 days from the date of registration"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          annual_recertification_a_form_registered_in_scwins
          and a_form_registered_on_date_of_receipt
          and chip_inrd_interview_date_field_is_populated_automatically
          and chip_inrd_interview_date_is_automated_interview_notice_offset_days_after_registration
