format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-225
  summary: SNAP benefits must be continued at the level authorized immediately prior
    to the notice of adverse action, unless the household specifically declines continued
    benefits. Continuation is timely when the household requests a fair hearing within
    the notice of adverse action period, at least 10 days, and the certification period
    has not expired. If an untimely household later establishes good cause, the Agency
    must reinstate benefits to the prior basis. Once continued or reinstated, benefits
    may not be reduced or terminated before the official hearing decision unless listed
    exceptions apply.
  deferred_outputs:
  - output: us-sc:policies/dss/snap-policy-manual/page-225#continued_benefits_must_not_be_reduced_or_terminated_before_official_hearing_decision
    reason: The source unit ends the exception list with item (D) followed by "or",
      so the complete set of exceptions needed to compute the before-hearing-decision
      reduction or termination rule is not available in this source unit.
  - output: us-sc:policies/dss/snap-policy-manual/page-225#continued_benefits_pending_hearing_amount
    reason: Generated rule exported a broad amount, base, inclusion, or exclusion
      while a source-stated purpose-specific limitation was deferred. This generic
      surface is deferred until the affected purpose-specific outputs can be encoded
      or split without applying the non-excepted rule too broadly.
rules:
- name: minimum_notice_of_adverse_action_period_days
  kind: parameter
  dtype: Count
  source: SNAP Manual 18.3(1)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-225
          excerpt: notice of adverse action period (at least 10- days
  versions:
  - effective_from: '0001-01-01'
    formula: '10'
- name: notice_of_adverse_action_period_meets_minimum_duration
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: SNAP Manual 18.3(1)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-225
          excerpt: notice of adverse action period (at least 10- days
  versions:
  - effective_from: '0001-01-01'
    formula: notice_of_adverse_action_period_days >= minimum_notice_of_adverse_action_period_days
- name: timely_request_for_continuation_of_benefits
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: SNAP Manual 18.3(1)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-225
  versions:
  - effective_from: '0001-01-01'
    formula: 'household_requests_fair_hearing_within_notice_of_adverse_action_period

      and notice_of_adverse_action_period_meets_minimum_duration

      and certification_period_has_not_expired_and_case_has_not_closed_due_to_recertification_or_interim_contact'
- name: good_cause_reinstated_benefit_amount
  kind: derived
  entity: Household
  dtype: Money
  period: Month
  unit: USD
  source: SNAP Manual 18.3(2)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-225
  versions:
  - effective_from: '0001-01-01'
    formula: 'if household_did_not_request_fair_hearing_during_notice_of_adverse_action_period
      and household_later_establishes_good_cause_for_untimely_hearing_request: max(0,
      benefit_amount_on_prior_basis) else: 0'
