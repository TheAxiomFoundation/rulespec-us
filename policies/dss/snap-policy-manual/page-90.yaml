format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-90
  summary: '"the entire household is ineligible until such time as the household provides
    the needed sponsor information or verification." Section 7.4 states that an individual
    enrolled at least half-time in an institution of higher education is ineligible
    for SNAP unless a student exemption applies; a student with a meal plan covering
    over 50% of daily meals is not entitled to participate. An individual is enrolled
    in higher education if enrolled in specified diploma-requiring schools or in a
    regular curriculum at a college or university offering degree programs, including
    online or web-based learning.'
  deferred_outputs:
  - output: us-sc:policies/dss/snap-policy-manual/page-90#student_ineligible_unless_exempt
    reason: The source makes final student ineligibility depend on student exemptions
      contained in Section 7.4(2), but that cited exemption text is not provided in
      context.
rules:
- name: daily_meal_plan_coverage_limit
  kind: parameter
  dtype: Rate
  source: SNAP Manual, Section 7.4(1), meal plan note
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-90
          excerpt: meal plan that covers over 50% of his/her meals daily
  versions:
  - effective_from: '0001-01-01'
    formula: '0.50'
- name: enrolled_in_institution_of_higher_education
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: SNAP Manual, Section 7.4(1), definition of enrollment in institution of
    higher education
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: definition
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-90
  versions:
  - effective_from: '0001-01-01'
    formula: 'enrolled_in_business_technical_trade_or_vocational_school_that_normally_requires_high_school_diploma_or_equivalency

      or enrolled_in_regular_curriculum_at_college_or_university_that_offers_degree_programs'
- name: snap_student
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: SNAP Manual, Section 7.4(1), student applicability
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-90
  versions:
  - effective_from: '0001-01-01'
    formula: 'enrolled_at_least_half_time_as_defined_by_institution

      and enrolled_in_institution_of_higher_education'
- name: student_not_entitled_due_to_meal_plan
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: SNAP Manual, Section 7.4(1), meal plan note
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-90
          excerpt: meal plan that covers over 50% of his/her meals daily
  versions:
  - effective_from: '0001-01-01'
    formula: 'snap_student

      and student_daily_meal_plan_coverage_rate > daily_meal_plan_coverage_limit'
- name: student_exemption_verification_required
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: SNAP Manual, Section 7.4(1), hints and obvious-exemption exception
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-90
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-90
  versions:
  - effective_from: '0001-01-01'
    formula: 'snap_student

      and not individual_meets_obvious_student_exemption'
- name: household_ineligible_due_to_missing_sponsor_information
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: SNAP Manual, page 90, sponsor information or verification
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-90
  versions:
  - effective_from: '0001-01-01'
    formula: 'household_needs_sponsor_information_or_verification

      and not household_provides_needed_sponsor_information_or_verification'
