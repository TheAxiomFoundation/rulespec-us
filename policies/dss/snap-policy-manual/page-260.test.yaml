    ? us-sc:policies/dss/snap-policy-manual/page-260#input.individual_used_ebt_card_to_make_transaction_reducing_or_increasing_account_balance
    : true
    us-sc:policies/dss/snap-policy-manual/page-260#input.individual_authorized_by_any_household_member: false
