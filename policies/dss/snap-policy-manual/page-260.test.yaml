    us-sc:policies/dss/snap-policy-manual/page-260#input.individual_received_ebt_card: true
    us-sc:policies/dss/snap-policy-manual/page-260#input.individual_has_pin_access: true
  output:
    us-sc:policies/dss/snap-policy-manual/page-260#individual_authorized_to_make_ebt_transactions: holds
- name: unauthorized card use when transaction made without household authorization
  period: 2026-05
