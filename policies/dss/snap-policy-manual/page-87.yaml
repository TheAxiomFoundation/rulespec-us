  summary: |-
    Only in the event a sponsored non-citizen is an eligible non-citizen in accordance with Section 7.3 Citizenship and Non-Citizen Status, the Agency considers available to the household the income and resources of the sponsor and spouse. The monthly income deemed is total monthly earned and unearned income as defined in Sections 11.3, 11.4, and 11.5 with exclusions in Section 11.6, reduced by a 20% earned income amount and the Program's monthly gross income eligibility limit for the sponsor's household/dependents. Resources are deemed after reduction by $1,500, and amounts may be divided where the sponsor sponsors other non-citizens.
  deferred_outputs:
    - output: us-sc:policies/dss/snap-policy-manual/page-87#sponsor_deemed_monthly_income
      reason: The income deeming formula depends on missing upstream Section 7.3 eligible non-citizen status and Sections 11.3, 11.4, 11.5, and 11.6 income definitions and exclusions.
