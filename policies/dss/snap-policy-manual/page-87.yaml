        - us-sc:policies/dss/snap-policy-manual/page-87#sponsor_household_gross_income_limit_reduction
    - output: us-sc:policies/dss/snap-policy-manual/page-87#sponsor_deemed_resources
      reason: The resource deeming rule applies only when the sponsored non-citizen is an eligible non-citizen under missing Section 7.3, and the source fragment is incomplete after the clause requiring division when the sponsor sponsors other non-citizens.
