format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-173
  summary: |-
    Divide total representative income by the number of representative pay dates, then multiply by frequency: weekly x 4.33, bi-weekly x 2.16, semi-monthly x 2, monthly x 1. Daily or sporadic income uses all income received in the past 30 days, divided by 4, then multiplied by 4.33.
rules:
  - name: weekly_income_monthly_conversion_factor
    kind: parameter
    dtype: Decimal
    source: SNAP Manual p. 173, Step (E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-173
              excerpt: "Weekly average income x 4.33"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          4.33

  - name: biweekly_income_monthly_conversion_factor
    kind: parameter
    dtype: Decimal
    source: SNAP Manual p. 173, Step (E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-173
              excerpt: "Bi-weekly average income x 2.16"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          2.16

  - name: semimonthly_income_monthly_conversion_factor
    kind: parameter
    dtype: Decimal
    source: SNAP Manual p. 173, Step (E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-173
              excerpt: "Semi-monthly average income x 2"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          2

  - name: monthly_income_monthly_conversion_factor
    kind: parameter
    dtype: Decimal
    source: SNAP Manual p. 173, Step (E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-173
              excerpt: "Monthly income (one-month average) x 1"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1

  - name: daily_or_sporadic_income_averaging_weeks
    kind: parameter
    dtype: Count
    source: SNAP Manual p. 173, Step (E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-173
              excerpt: "divide by 4"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          4

  - name: representative_pay_date_average_income
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: SNAP Manual p. 173, Steps (C)-(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-173
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          representative_pay_total / representative_pay_date_count

  - name: weekly_representative_income_monthly_amount
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: SNAP Manual p. 173, Step (E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-173
              excerpt: "Weekly average income x 4.33"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          representative_pay_date_average_income * weekly_income_monthly_conversion_factor

  - name: biweekly_representative_income_monthly_amount
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: SNAP Manual p. 173, Step (E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-173
              excerpt: "Bi-weekly average income x 2.16"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          representative_pay_date_average_income * biweekly_income_monthly_conversion_factor

  - name: semimonthly_representative_income_monthly_amount
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: SNAP Manual p. 173, Step (E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-173
              excerpt: "Semi-monthly average income x 2"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          representative_pay_date_average_income * semimonthly_income_monthly_conversion_factor

  - name: monthly_representative_income_monthly_amount
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: SNAP Manual p. 173, Step (E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-173
              excerpt: "Monthly income (one-month average) x 1"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          representative_pay_date_average_income * monthly_income_monthly_conversion_factor

  - name: daily_or_sporadic_income_four_week_average
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: SNAP Manual p. 173, Step (E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-173
              excerpt: "add all income received in the past 30 days ... and divide by 4"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          daily_or_sporadic_income_received_in_past_30_days / daily_or_sporadic_income_averaging_weeks

  - name: daily_or_sporadic_income_monthly_amount
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: SNAP Manual p. 173, Step (E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-173
              excerpt: "Convert average income to a monthly figure by multiplying by 4.33"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          daily_or_sporadic_income_four_week_average * weekly_income_monthly_conversion_factor

  - name: noninterfaced_child_support_counted_for_expected_month
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 173
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-173
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          child_support_payment_is_noninterfaced
          and child_support_payment_is_expected_to_be_received_in_month

  - name: scwins_interfaced_child_support_action_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 173, simplified reporting policy
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-173
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          child_support_income_interfaced_through_scwins
          and (household_is_at_recertification or household_change_causes_mandatory_rebudget)
