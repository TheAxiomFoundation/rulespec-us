format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-193
  summary: |-
    "Once this certification is obtained, residents may be eligible for SNAP participation." Residents of DAA treatment centers must apply and be certified through an authorized representative employed and designated by the center, and once the household leaves the DAA treatment center, the center can no longer act as authorized representative for application or issuance purposes.
rules:
  - name: daa_resident_may_participate_after_certification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 193, DAA certification and resident participation
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-193
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_resides_in_daa_treatment_center
          and daa_treatment_center_has_required_title_xix_certification
  - name: daa_authorized_representative_requirement_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 193, authorized representatives for SNAP participants in DAAs
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-193
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not household_resides_in_daa_treatment_center
          or (authorized_representative_is_employed_by_daa_treatment_center
          and authorized_representative_is_designated_by_daa_treatment_center
          and household_designates_daa_treatment_center_as_authorized_representative_for_receiving_and_using_allotment)
  - name: daa_center_may_act_as_authorized_representative_for_application_or_issuance
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 193, household leaves DAA treatment center
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-193
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_resides_in_daa_treatment_center
          and not household_has_left_daa_treatment_center
          and household_designates_daa_treatment_center_as_authorized_representative_for_receiving_and_using_allotment
  - name: daa_facility_certified_resident_list_requirement_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 193, processing provisions for DAAs
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-193
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not household_resides_in_daa_treatment_center
          or daa_treatment_center_provides_monthly_or_semimonthly_certified_list_of_current_snap_residents
