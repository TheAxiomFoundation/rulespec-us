format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-219
  summary: |-
    "The recertification process can be used for: (A) Households which apply for recertification prior to the end of their certification period AND (B) Households which file an application within 30 days after the end of the certification period." "At least one interview (face-to-face or telephone) must be conducted for each household ... once every 12 months, unless the household receives a 24-month certification period because all adult members are elderly or disabled with no earned income." "The Agency must make sufficient effort to complete the interview so that the household has at least 10 days after the interview in which to provide verification before the certification period expires."
rules:
  - name: recertification_post_expiration_filing_window_days
    kind: parameter
    dtype: Count
    source: SNAP Manual page 219, recertification application
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-219
              excerpt: "within 30 days after the end of the certification period"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: annual_recertification_form_completion_month
    kind: parameter
    dtype: Count
    source: SNAP Manual page 219, recertification application
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-219
              excerpt: "completed at the 12th month (Annual Recertification)"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          12

  - name: six_month_recertification_form_completion_month
    kind: parameter
    dtype: Count
    source: SNAP Manual page 219, recertification application
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-219
              excerpt: "6-month interval (Six-Month Recertification)"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          6

  - name: triannual_recertification_form_completion_month
    kind: parameter
    dtype: Count
    source: SNAP Manual page 219, recertification application
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-219
              excerpt: "4-month intervals (Tri-annual Recertification)"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          4

  - name: recertification_interview_interval_months
    kind: parameter
    dtype: Count
    source: SNAP Manual section 17.2, page 219
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-219
              excerpt: "once every 12 months"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          12

  - name: elderly_disabled_no_earned_income_certification_period_months
    kind: parameter
    dtype: Count
    source: SNAP Manual section 17.2, page 219
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-219
              excerpt: "receives a 24-month certification period"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          24

  - name: interim_contact_form_month_for_24_month_certification
    kind: parameter
    dtype: Count
    source: SNAP Manual section 17.2, page 219
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-219
              excerpt: "DSS Form 3808, Interim Contact Form, at 12 months"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          12

  - name: post_interview_verification_minimum_days
    kind: parameter
    dtype: Count
    source: SNAP Manual section 17.2, page 219
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-219
              excerpt: "at least 10 days after the interview"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10

  - name: recertification_application_accepted_for_recertification_process
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 219, recertification application
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-219
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          new_household_signature_provided
          and (application_filed_prior_to_end_of_certification_period or days_after_certification_period_end_application_filed <= recertification_post_expiration_filing_window_days)

  - name: recertification_form_completion_timing_matches_interval
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 219, recertification application
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-219
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (annual_recertification and months_elapsed_in_current_certification_period == annual_recertification_form_completion_month)
          or (six_month_recertification and months_elapsed_in_current_certification_period == six_month_recertification_form_completion_month)
          or (triannual_recertification and months_elapsed_in_current_certification_period == triannual_recertification_form_completion_month)

  - name: elderly_disabled_no_earned_income_24_month_certification_exception
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual section 17.2, page 219
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-219
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          certification_period_months == elderly_disabled_no_earned_income_certification_period_months
          and all_adult_members_are_elderly_or_disabled
          and no_adult_members_have_earned_income

  - name: recertification_interview_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual section 17.2, page 219
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-219
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          months_since_last_recertification_interview >= recertification_interview_interval_months
          and not elderly_disabled_no_earned_income_24_month_certification_exception

  - name: interim_contact_form_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual section 17.2, page 219
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-219
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          elderly_disabled_no_earned_income_24_month_certification_exception
          and months_elapsed_in_current_certification_period == interim_contact_form_month_for_24_month_certification

  - name: missed_interview_rescheduling_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual section 17.2, page 219
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-219
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_missed_interview
          and household_requested_another_interview

  - name: denial_for_early_missed_interview_barred
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual section 17.2, page 219
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-219
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          interview_scheduled_before_last_month_of_certification_period
          and household_failed_to_appear_for_interview_prior_to_certification_period_end

  - name: interview_timing_allows_minimum_verification_period
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual section 17.2, page 219
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-219
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          days_after_interview_available_for_verification_before_certification_period_expires >= post_interview_verification_minimum_days
