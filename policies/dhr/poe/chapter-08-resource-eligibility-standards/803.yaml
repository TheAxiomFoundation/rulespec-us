format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-al/manual/dhr/poe/chapter-08-resource-eligibility-standards/803
  summary: |-
    Excluded funds kept in a separate account and not commingled with non-excluded
    funds retain their resource exclusion for an unlimited period. Resources
    excluded because they were counted as income prorated over a specific period
    retain their exclusion for the prorated period even if commingled. All other
    excluded moneys commingled with non-excluded funds retain their exemption for
    six months from the date of commingling. After six months, all funds in the
    commingled account are counted as a resource. Interest on commingled accounts
    is counted as unearned income in the month received and thereafter as a
    resource.
rules:
  - name: commingled_exclusion_period_months
    kind: parameter
    dtype: Integer
    source: AL DHR POE 803 - "six months from the date they are commingled"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-08-resource-eligibility-standards/803
              excerpt: "shall retain their exemption for six months from the date they are commingled"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          6
  - name: excluded_funds_retain_resource_exclusion
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: AL DHR POE 803 - retention of resource exclusion for excluded funds
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-08-resource-eligibility-standards/803
              excerpt: "Excluded funds that are kept in a separate account, and that are not commingled in an account with non-excluded funds, shall retain their resource exclusion for an unlimited period of time."
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-08-resource-eligibility-standards/803
              excerpt: "Resources which are excluded because they were counted as income prorated over a specific period of time retain their exclusion for the period of time over which they have been prorated as income, even if commingled with other non-excluded funds."
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-08-resource-eligibility-standards/803
              excerpt: "All other excluded moneys which are commingled in an account with no excluded funds shall retain their exemption for six months from the date they are commingled."
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-08-resource-eligibility-standards/803
              excerpt: "six months from the date they are commingled"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (funds_kept_in_separate_account and not funds_commingled_with_non_excluded_funds)
          or (funds_excluded_as_prorated_income and current_month_within_proration_period)
          or (funds_commingled_with_non_excluded_funds and months_since_commingling < commingled_exclusion_period_months)
  - name: commingled_account_funds_counted_as_resource
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: AL DHR POE 803 - "After six months from the date of commingling, all funds in the commingled account shall be counted as a resource."
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-08-resource-eligibility-standards/803
              excerpt: "After six months from the date of commingling, all funds in the commingled account shall be counted as a resource."
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-08-resource-eligibility-standards/803
              excerpt: "six months from the date of commingling"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          funds_commingled_with_non_excluded_funds
          and months_since_commingling >= commingled_exclusion_period_months
  - name: commingled_account_interest_is_unearned_income
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: AL DHR POE 803 - "Interest on accounts with commingled funds would be counted as unearned income in the month received"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-08-resource-eligibility-standards/803
              excerpt: "Interest on accounts with commingled funds would be counted as unearned income in the month received"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          funds_commingled_with_non_excluded_funds
          and interest_received_in_current_month
  - name: commingled_account_interest_is_resource
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: AL DHR POE 803 - "after that month, the interest would become a resource"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-08-resource-eligibility-standards/803
              excerpt: "after that month, the interest would become a resource"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          funds_commingled_with_non_excluded_funds
          and not interest_received_in_current_month
          and interest_received_in_prior_month
