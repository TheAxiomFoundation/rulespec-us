format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-al/manual/dhr/poe/chapter-04-citizenship-and-alien-status/406
  summary: |-
    A person must be a U.S. citizen or an eligible non-citizen to qualify for food assistance. Qualified aliens 1-4 (LPR, parolees under 212(d)(5) for at least one year, conditional entrants under 203(a)(7), and battered spouses/children) must meet one of: military connection; lawfully in U.S. and under 18; lawfully in U.S. and receiving blind or disability benefits; lawfully in U.S. and 65 or older on 8/22/96; lived in U.S. in qualified status for 5 years; LPR credited with 40 quarters of work. Qualified aliens 5-11 (asylees, refugees, withholding of deportation, Cuban/Haitian entrants, trafficking victims, Iraqi/Afghan SIVs, Amerasian immigrants) are eligible without an additional requirement. Certain Hmong/Highland Laotians, American Indians born in Canada under INA 289 and members of Indian tribes, and U.S. non-citizen nationals may be eligible indefinitely even if not qualified aliens.
rules:
  - name: person_is_qualified_alien_category_1_to_4
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: POE 406 qualified aliens list items 1-4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-04-citizenship-and-alien-status/406
    versions:
      - effective_from: '2012-03-13'
        formula: |-
          person_is_lawful_permanent_resident
          or person_is_paroled_under_ina_212_d_5_for_at_least_one_year
          or person_is_conditional_entrant_under_ina_203_a_7
          or person_is_battered_spouse_child_or_parent_with_pending_petition
  - name: person_is_qualified_alien_category_5_to_11
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: POE 406 qualified aliens list items 5-11
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-04-citizenship-and-alien-status/406
    versions:
      - effective_from: '2012-03-13'
        formula: |-
          person_is_granted_asylum_under_ina_208
          or person_is_refugee_admitted_under_ina_207
          or person_has_deportation_withheld_under_ina_243_h_or_241_b_3
          or person_is_cuban_or_haitian_entrant
          or person_is_trafficking_victim_or_eligible_family_member
          or person_is_iraqi_or_afghan_special_immigrant
          or person_is_amerasian_immigrant
  - name: person_meets_additional_food_assistance_eligibility_requirement
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: POE 406 indefinitely eligible additional requirements list
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-04-citizenship-and-alien-status/406
    versions:
      - effective_from: '2012-03-13'
        formula: |-
          person_has_military_connection
          or (person_is_lawfully_in_us and person_is_under_18)
          or (person_is_lawfully_in_us and person_receives_blind_or_disability_benefits)
          or (person_is_lawfully_in_us and person_was_65_or_older_on_august_22_1996)
          or person_lived_in_us_in_qualified_status_for_5_years
          or person_is_lpr_with_40_qualifying_quarters_of_work
  - name: person_is_eligible_non_qualified_alien
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: POE 406 list of aliens eligible even if not qualified aliens
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-04-citizenship-and-alien-status/406
    versions:
      - effective_from: '2012-03-13'
        formula: |-
          person_is_hmong_or_highland_laotian_or_eligible_family_member
          or person_is_american_indian_born_in_canada_under_ina_289
          or person_is_member_of_indian_tribe_under_25_usc_450_e
          or person_is_us_non_citizen_national
  - name: person_meets_food_assistance_citizenship_or_alien_status
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: POE 406 opening sentence and combined alien eligibility framework
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-04-citizenship-and-alien-status/406
    versions:
      - effective_from: '2012-03-13'
        formula: |-
          person_is_us_citizen
          or (person_is_qualified_alien_category_1_to_4
              and person_meets_additional_food_assistance_eligibility_requirement)
          or person_is_qualified_alien_category_5_to_11
          or person_is_eligible_non_qualified_alien
