format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-al/manual/dhr/poe/chapter-04-citizenship-and-alien-status/404
  summary: |-
    The county department may report unlawful presence only those non-citizens who have applied for food assistance benefits; not other household members, and not adults applying strictly for their children. A government entity "knows" that a non-citizen is not lawfully present only when the entity's finding or conclusion of unlawful presence is made as part of a formal determination, is subject to administrative review, and is supported by a determination of DHS or the EOIR, such as a Final Order of Deportation. Suspected unlawful presence must not be reported if the county department does not have verification of a formal determination of unlawful presence.
rules:
  - name: county_department_knows_non_citizen_unlawfully_present
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: AL DHR POE Chapter 4, Section 404 (citing 65 FR 58301)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-04-citizenship-and-alien-status/404
              excerpt: |-
                A government entity "knows" that a non-citizen is not lawfully present in the United States only when the entity's finding or conclusion of unlawful presence is made as part of a formal determination by the entity, is subject to administrative review and is supported by a determination of the Department of Homeland Security (DHS) or the Executive Office for Immigration Review, such as a Final Order of Deportation.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          unlawful_presence_finding_made_as_part_of_formal_determination
          and unlawful_presence_finding_subject_to_administrative_review
          and unlawful_presence_finding_supported_by_dhs_or_eoir_determination
  - name: county_department_must_report_non_citizen_to_ins
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: AL DHR POE Chapter 4, Section 404
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-04-citizenship-and-alien-status/404
              excerpt: |-
                The county department may report unlawful presence only those non-citizens who have applied for food assistance benefits; not other household members, and not adults applying strictly for their children.
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-04-citizenship-and-alien-status/404
              excerpt: |-
                If the county department "knows" as explained in the Interagency Notice that a non-citizen is not lawfully present in the United States, then the county department must report to INS only the non-citizen who is present in the United States in violation of the INA. Suspected unlawful presence of non-citizens must not be reported if the county department does not have verification of a formal determination of unlawful presence.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          county_department_knows_non_citizen_unlawfully_present
          and non_citizen_applied_for_food_assistance_benefits
          and not adult_applying_strictly_for_children
