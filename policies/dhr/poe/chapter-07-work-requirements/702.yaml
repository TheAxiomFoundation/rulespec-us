format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-al/manual/dhr/poe/chapter-07-work-requirements/702
  summary: |-
    The county department shall ... 4. Take appropriate action within ten working days after learning of noncompliance. Counties should ensure that the lines of communication between the units responsible for certification and the units responsible for the employment and training program be efficient and that noncompliance be reported within ten working days after such noncompliance is determined.
rules:
  - name: noncompliance_action_working_days_limit
    kind: parameter
    dtype: Count
    source: Section 702(4) - "Take appropriate action within ten working days after learning of noncompliance."
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-07-work-requirements/702
              excerpt: "Take appropriate action within ten working days after learning of noncompliance."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10
  - name: county_action_on_noncompliance_is_timely
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: Section 702(4) - county shall take appropriate action within ten working days after learning of noncompliance.
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-07-work-requirements/702
              excerpt: "Take appropriate action within ten working days after learning of noncompliance."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          working_days_since_learning_of_noncompliance <= noncompliance_action_working_days_limit
  - name: noncompliance_report_between_units_is_timely
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: Section 702(4) - noncompliance be reported within ten working days after such noncompliance is determined.
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-07-work-requirements/702
              excerpt: "noncompliance be reported within ten working days after such noncompliance is determined."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          working_days_since_noncompliance_determined <= noncompliance_action_working_days_limit
