format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-al/manual/dhr/poe/chapter-07-work-requirements/707
  summary: |-
    Households whose members are applying for SSI and food assistance in accordance with Section 210 shall have the work registration requirement waived until they are determined eligible for SSI (and thereby become exempt from work registration) or they are determined ineligible for SSI and, where applicable, a determination of their work registration status is then made through recertification procedures or through other means.
rules:
  - name: work_registration_requirement_waived
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: AL DHR POE 707 (work registration waiver pending SSI determination)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-07-work-requirements/707
              excerpt: "shall have the work registration requirement waived until they are determined eligible for SSI ... or they are determined ineligible for SSI"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_applying_for_ssi_and_food_assistance_jointly
          and not person_has_received_ssi_eligibility_determination
