format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-al/manual/dhr/poe/chapter-07-work-requirements/700
  summary: |-
    Each household member who is not exempt by Section 701 shall be registered for employment at the time of certification and once every twelve months after initial registration by the county department as a condition of eligibility.
rules:
  - name: member_must_be_registered_for_employment
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: AL DHR POE Chapter 7, Section 700
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-07-work-requirements/700
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not member_is_exempt_under_section_701
  - name: member_satisfies_work_registration_eligibility_condition
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: AL DHR POE Chapter 7, Section 700
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-07-work-requirements/700
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          member_is_exempt_under_section_701
          or member_is_registered_for_employment_at_certification_or_within_twelve_months
