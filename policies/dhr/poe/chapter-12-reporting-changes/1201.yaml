format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-al/manual/dhr/poe/chapter-12-reporting-changes/1201
  summary: |-
    A household that requests a fair hearing due to a mass change shall be
    entitled to continued benefits at its previous level only if the household
    meets three criteria: (1) The household does not specifically waive its
    right to a continuation of benefits. (2) The household requests a fair
    hearing in accordance with Chapter 15. (3) The household's fair hearing is
    based upon improper computation of food assistance eligibility or benefits,
    or upon misapplication or misinterpretation of Federal law or regulation.
