format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-al/manual/dhr/poe/chapter-05-students/504
  summary: |-
    Refugees enrolled in ESL courses only, at institutions of higher education, should not be required to meet one of the students' eligibility requirements in Section 501. When a refugee is taking an ESL course(s) as part of a total program, the refugee would then need to meet one of the student eligibility requirements, if he/she otherwise fits the definition of student.
rules:
  - name: refugee_esl_only_exempt_from_student_eligibility
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: AL DHR POE Chapter 5, Section 504
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-05-students/504
    versions:
      - effective_from: '2010-05-01'
        formula: |-
          person_is_refugee
          and person_is_enrolled_in_esl_course
          and person_is_enrolled_at_institution_of_higher_education
          and not person_esl_course_is_part_of_total_program
