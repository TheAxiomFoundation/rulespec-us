format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-al/manual/dhr/poe/chapter-03-residency/300
  summary: |-
    Households must be living in the project areas in which they file
    applications. No individual may participate as a member of more than one
    household or in more than one project area in any month, unless the
    individual is a resident of a shelter for battered individuals and children
    as defined in Section 1106 and was a member of a household containing the
    person who abused him or her. The county department may not impose any
    durational residency requirement, may not require a permanent dwelling or
    fixed mailing address as a condition of eligibility, and residency does not
    require an intent to reside permanently in the state or project area.
    Persons in a project area solely for vacation purposes are not considered
    residents.
rules:
  - name: person_dual_participation_exception_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: chapter-03-residency/300 — battered-shelter exception to one-household/one-project-area rule
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-03-residency/300
              excerpt: "unless an individual is a resident of a shelter for battered individuals and children as defined in Section 1106, and was a member of a household containing the person who abused him or her"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_resident_of_shelter_for_battered_individuals_under_section_1106
          and person_was_member_of_household_containing_abuser
  - name: person_is_resident_of_project_area
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: chapter-03-residency/300 — residency definition with vacation-only exclusion
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-03-residency/300
              excerpt: "Residency does not require an intent to reside permanently in the state or project area. Persons in a project area solely for vacation purposes shall not be considered residents."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_physically_present_in_project_area
          and not person_is_in_project_area_solely_for_vacation
