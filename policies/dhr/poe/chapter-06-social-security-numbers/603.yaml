format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-al/manual/dhr/poe/chapter-06-social-security-numbers/603
  summary: |-
    Good cause for failure to apply for/provide SSN: documentary evidence or collateral information that the household member has applied for an SSN or made every effort to supply SSA with necessary information is good cause. Good cause does not include delays due to illness, lack of transportation, or temporary absences. If good cause is shown, member may participate for one month in addition to the month of application; after the second month, good cause must be determined monthly. Once an SSN application is filed, member continues to participate pending notification. When SSA-2853 is provided, the case is flagged for review six months from the month the SSA-2853 is received if remaining certification months exceed six. If SSA is at fault for failing to assign the number, member shall continue to participate.
rules:
  - name: additional_months_allowed_with_good_cause
    kind: parameter
    dtype: Count
    source: AL DHR POE 603 ("allowed to participate for one month in addition to the month of application")
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-06-social-security-numbers/603
              excerpt: "allowed to participate for one month in addition to the month of application"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1
  - name: months_after_which_good_cause_redetermined_monthly
    kind: parameter
    dtype: Count
    source: AL DHR POE 603 ("After the second month, good cause for failure to apply for a SSN must be determined monthly")
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-06-social-security-numbers/603
              excerpt: "After the second month, good cause for failure to apply for a SSN must be determined monthly"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          2
  - name: ssa_2853_review_period_months
    kind: parameter
    dtype: Count
    source: AL DHR POE 603 ("flagged for review six months from the month the SSA-2853 is received")
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-06-social-security-numbers/603
              excerpt: "flagged for review six months from the month the SSA-2853 is received if the remaining months in the certification exceed six months"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          6
  - name: good_cause_for_failure_to_apply_for_ssn
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: AL DHR POE 603 (good cause definition; exclusions for illness, lack of transportation, temporary absences)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-06-social-security-numbers/603
              excerpt: "Documentary evidence or collateral information that the household member has applied for a SSN or made every effort to supply SSA with the necessary information ... shall be considered good cause"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-06-social-security-numbers/603
              excerpt: "Good cause does not include delays due to illness, lack of transportation or temporary absences"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (member_has_documentary_evidence_of_ssn_application
          or member_made_every_effort_to_supply_ssa_with_necessary_information)
          and not delay_is_due_to_illness
          and not delay_is_due_to_lack_of_transportation
          and not delay_is_due_to_temporary_absence
  - name: ssn_application_filed_with_ssa
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: AL DHR POE 603 ("Once an application for a SSN has been filed (such applications are not considered by SSA to be filed unless the application is complete)")
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-06-social-security-numbers/603
              excerpt: "such applications are not considered by SSA to be filed unless the application is complete"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          member_submitted_ssn_application_to_ssa
          and ssn_application_is_complete
  - name: household_member_may_continue_to_participate_pending_ssn
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: AL DHR POE 603 (continuation of participation pending SSN issuance; SSA at fault)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-06-social-security-numbers/603
              excerpt: "the county department shall permit the member to continue to participate pending notification to the county department of the household member's SSN"
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-06-social-security-numbers/603
              excerpt: "If the SSA is at fault for failing to assign the number, the household member shall continue to participate"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          ssn_application_filed_with_ssa
          or ssa_is_at_fault_for_delay_in_assigning_ssn
  - name: ssa_2853_case_flagged_for_review
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: AL DHR POE 603 (SSA-2853 case flag at six-month review if remaining certification months exceed six)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-06-social-security-numbers/603
              excerpt: "the case shall be flagged for review six months from the month the SSA-2853 is received if the remaining months in the certification exceed six months"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-06-social-security-numbers/603
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          ssa_2853_received_as_proof_of_ssn_application
          and remaining_months_in_certification > ssa_2853_review_period_months
