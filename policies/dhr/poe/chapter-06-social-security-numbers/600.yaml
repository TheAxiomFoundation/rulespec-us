format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-al/manual/dhr/poe/chapter-06-social-security-numbers/600
  summary: |-
    A household participating or applying for participation in the Food Stamp Program must, for each household member, provide the member's SSN (or all SSNs if more than one) or apply for an SSN before certification. Refusal or failure without good cause to provide an SSN will result in disqualification of the individual for whom an SSN is not obtained.
rules:
  - name: member_meets_ssn_requirement
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: AL DHR POE Chapter 6, Section 600
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-06-social-security-numbers/600
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          member_provided_all_ssns
          or member_applied_for_ssn_before_certification
  - name: member_disqualified_for_ssn_noncompliance
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: AL DHR POE Chapter 6, Section 600
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-06-social-security-numbers/600
              excerpt: "refusal or failure without good cause to provide an SSN will result in disqualification of the individual for whom an SSN is not obtained"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not member_provided_all_ssns
          and not member_applied_for_ssn_before_certification
          and not member_has_good_cause_for_ssn_noncompliance
