format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-al/manual/dhr/poe/chapter-06-social-security-numbers/601
  summary: |-
    For applicants who provide SSNs prior to certification, the county records the number. Households with SSA-2853 or a birth certificate noting SSN applied for by the hospital must report the SSN by the next recertification or six months, whichever is later. If the client has not received the SSN, the household member has good cause. For those without an SSN, the household is referred to SSA to apply via SS-5. Proof of application is required prior to certification, consisting of the DHR-PAD-1542 marked complete, the SSA-5028, the SSA-2853, or a copy of a birth certificate or other documentary evidence showing an SSN application was submitted.
  status: deferred
  deferred_outputs:
    - output: us-al:policies/dhr/poe/chapter-06-social-security-numbers/601#proof_of_ssn_application_provided
      reason: |-
        The provision describes administrative procedures (county-department actions, SS-5 referral, review of DHR-PAD-1542 with the applicant, advising the client of SSA hours/address, informing the client to take DHR-PAD-1542 to SSA) and enumerates acceptable forms of proof of SSN application prior to certification. These are documentary/procedural duties rather than a computable household-eligibility test; faithful encoding requires modeling of which proof document was actually received, which is not stated as a calculable condition in the source.
    - output: us-al:policies/dhr/poe/chapter-06-social-security-numbers/601#ssn_reporting_good_cause
      reason: |-
        Good cause when the client has not received the SSN is conditional on the SSA-2853/birth-certificate report path and downstream certification mechanics not stated as computable conditions in this source slice.
