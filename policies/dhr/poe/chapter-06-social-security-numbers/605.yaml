  summary: |-
    The State Agency, D.H.R., is authorized to use SSN's in the administration of the Food Stamp Program to access information, through IEVS, regarding individual Food Stamp Program applicants and participants who receive benefits under Title XVI of the Social Security Act. State agencies shall use SDX to the maximum extent possible. SSN's shall also be used to: 1. Prevent duplicate participation. 2. Facilitate mass changes. 3. Determine the accuracy and/or reliability of information given by households.
