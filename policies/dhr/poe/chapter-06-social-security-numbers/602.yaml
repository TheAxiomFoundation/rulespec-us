format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-al/manual/dhr/poe/chapter-06-social-security-numbers/602
  summary: |-
    If the county department determines that a household member has refused or failed without good cause to provide or apply for an SSN, then that individual shall be ineligible to participate in the Food Stamp Program. The disqualification applies to the individual for whom the SSN is not provided and not to the entire household.
rules:
  - name: individual_disqualified_for_ssn_noncompliance
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: AL DHR POE Chapter 6, Section 602
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-06-social-security-numbers/602
              excerpt: "refused or failed without good cause to provide or apply for an SSN, then that individual shall be ineligible to participate in the Food Stamp Program"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          county_department_determined_member_refused_or_failed_to_provide_or_apply_for_ssn
          and not member_had_good_cause_for_ssn_noncompliance
