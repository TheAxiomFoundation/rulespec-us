format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-al/manual/dhr/poe/chapter-13-notice-of-adverse-action/1300
  summary: |-
    Prior to any action to reduce or terminate a household's benefits within the
    certification period, the county department shall provide the household a
    timely and adequate Notice of Adverse Action, except: semi-annual reporting
    households who report on their six month report changes which cause a
    reduction or termination of benefits, and households described in Section
    1301. Timely: at least 10 days from mailing to effective date. Adequate:
    explains proposed action, reason, right to fair hearing, contact
    information, availability of continued benefits, liability for
    over-issuances, and availability of free legal representation. Special
    conditions allow notification without 10 days notice if the household
    reports the information in writing, signed, the county can determine
    allotment solely from that information, the household retains its right to
    a fair hearing and continued benefits within 10 days of mailing, and the
    county continues the previous benefit level within five working days of a
    timely fair hearing request.
  deferred_outputs:
    - output: us-al:policies/dhr/poe/chapter-13-notice-of-adverse-action/1300#household_not_entitled_to_naa_under_section_1301
      reason: |-
        Source carve-out depends on the membership defined in Section 1301,
        which is not available as RuleSpec context. Encoded as a boundary
        category input on the parent rule.
rules:
  - name: minimum_notice_days
    kind: parameter
    dtype: Integer
    source: "Section 1300: 'There are at least 10 days from the date the notice is mailed to the date upon which the action becomes effective.'"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-13-notice-of-adverse-action/1300
              excerpt: "at least 10 days from the date the notice is mailed to the date upon which the action becomes effective"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10
  - name: continuation_response_working_days
    kind: parameter
    dtype: Integer
    source: "Section 1300: 'continues household's previous benefit level, if required, within five working days of the household's request for a fair hearing if timely made.'"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-13-notice-of-adverse-action/1300
              excerpt: "within five working days of the household's request for a fair hearing"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          5
  - name: notice_of_adverse_action_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: "Section 1300: 'Prior to any action to reduce or terminate a household's benefits within the certification period, the county department shall provide the household a timely and adequate Notice of Adverse Action ... except: Semi-annual reporting households who report on their six month report changes which cause a reduction or termination of benefits ... and Households described in Section 1301'."
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-13-notice-of-adverse-action/1300
              excerpt: "Prior to any action to reduce or terminate a household's benefits within the certification period, the county department shall provide the household a timely and adequate Notice of Adverse Action"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-13-notice-of-adverse-action/1300
              excerpt: "Semi-annual reporting households who report on their six month report changes which cause a reduction or termination of benefits are not entitled to a Notice of Adverse Action"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-13-notice-of-adverse-action/1300
              excerpt: "Households described in Section 1301 below are not entitled to Notices of Adverse Action"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          action_reduces_or_terminates_benefits
          and action_occurs_within_certification_period
          and not (
            household_is_semi_annual_reporter
            and reduction_or_termination_results_from_six_month_report
          )
          and not household_described_in_section_1301
  - name: notice_is_timely
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: "Section 1300: 'The Notice of Adverse Action shall be considered timely when: There are at least 10 days from the date the notice is mailed to the date upon which the action becomes effective. If the 10th day falls on a weekend or holiday, and a request for a fair hearing and continuation of benefits is received the day after the weekend or holiday, the State agency shall consider the request timely received.'"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-13-notice-of-adverse-action/1300
              excerpt: "There are at least 10 days from the date the notice is mailed to the date upon which the action becomes effective"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-13-notice-of-adverse-action/1300
              excerpt: "If the 10th day falls on a weekend or holiday, and a request for a fair hearing and continuation of benefits is received the day after the weekend or holiday, the State agency shall consider the request timely received"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          days_between_mailing_and_effective_date >= minimum_notice_days
  - name: notice_is_adequate
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: "Section 1300: 'The Notice of Adverse Action shall be considered adequate if it explains in easily understandable language the following items: 1. The proposed action. 2. The reason for the proposed action. 3. The household's right to request a fair hearing. 4. The telephone number and, if possible, the name of the person to contact for additional information. 5. The availability of continued benefits. 6. The liability of the household for any over-issuances received while awaiting a fair hearing if the hearing official's decision is adverse to the household. 7. When there is an individual or organization available that provides free legal representation, the notice shall also advise the household of the availability of the service.'"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-13-notice-of-adverse-action/1300
              excerpt: "The Notice of Adverse Action shall be considered adequate if it explains in easily understandable language the following items"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          notice_explains_proposed_action
          and notice_explains_reason_for_proposed_action
          and notice_explains_right_to_request_fair_hearing
          and notice_states_contact_telephone_number
          and notice_explains_availability_of_continued_benefits
          and notice_explains_liability_for_overissuances_pending_hearing
          and (
            not free_legal_representation_available
            or notice_advises_availability_of_free_legal_representation
          )
  - name: reduced_notice_period_applies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: "Section 1300 Special Conditions: 'Under the following conditions, the county department shall notify a household that its benefits will be reduced or terminated, WITHOUT 10 DAYS NOTICE ... 1. The household reports the information which results in the reduction or termination. 2. The reported information is in writing and signed by the household. 3. The county department can determine the household's allotment or ineligibility based solely on the above information as provided by the household. 4. The household retains its right to a fair hearing. 5. The household retains its right to continued benefits if the fair hearing is requested within 10 days from the date the notification is mailed or given to the household. 6. The county department continues household's previous benefit level, if required, within five working days of the household's request for a fair hearing if timely made.'"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-13-notice-of-adverse-action/1300
              excerpt: "the county department shall notify a household that its benefits will be reduced or terminated, WITHOUT 10 DAYS NOTICE; however, the notification shall not be later than the date the household receives, or would have received its allotment"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_reported_information_causing_reduction_or_termination
          and reported_information_is_written_and_signed
          and county_can_determine_allotment_solely_from_household_information
          and household_retains_right_to_fair_hearing
          and household_retains_right_to_continued_benefits_within_10_days
          and county_continues_previous_benefit_level_within_five_working_days_if_timely_requested
          and notification_not_later_than_allotment_receipt_date
