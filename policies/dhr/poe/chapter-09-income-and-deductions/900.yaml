format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-al/manual/dhr/poe/chapter-09-income-and-deductions/900
  summary: |-
    Households with an elderly or disabled member shall meet the net income eligibility standard. Households without an elderly or disabled member shall meet both the net income and the gross income eligibility standards. Categorically eligible households do not have to meet either standard. Net and gross income eligibility standards are found in the annual Basis of Issuance Chart.
rules:
  - name: household_meets_snap_income_eligibility_standards
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: AL DHR POE Chapter 9, Section 900
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-09-income-and-deductions/900
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_is_categorically_eligible
          or (household_contains_elderly_or_disabled_member and household_meets_net_income_eligibility_standard)
          or (household_meets_net_income_eligibility_standard and household_meets_gross_income_eligibility_standard)
