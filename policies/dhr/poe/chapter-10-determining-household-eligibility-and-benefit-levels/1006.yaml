  summary: |-
    Applicant households must be provided one of the following written notices as soon as a determination of eligibility is made, but no later than 30 days after the date of initial application. Notices of Eligibility, Denial, Pending Status, recertification notices, and Identification (ID) Cards are described. These are administrative notice and identification-card procedures with no calculable benefit, amount, condition, or exception affecting computation.
