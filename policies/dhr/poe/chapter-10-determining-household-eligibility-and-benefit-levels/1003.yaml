format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-al/manual/dhr/poe/chapter-10-determining-household-eligibility-and-benefit-levels/1003
  summary: |-
    Deductible deductions include only certain dependent care, shelter, and medical expenses. Disallowed expenses include those covered by excluded reimbursement or vendor payment (except LIHEAP energy assistance). Expenses are deductible only if provided by someone outside the household and the household makes a money payment. Deductions allowed in the month billed or otherwise due. Weekly/biweekly expenses converted by multiplying weekly by 4.3 or biweekly by 2.15.
rules:
  - name: weekly_to_monthly_conversion_factor
    kind: parameter
    dtype: Decimal
    source: Section 1003.E
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-10-determining-household-eligibility-and-benefit-levels/1003
              excerpt: "multiplying an average weekly amount by 4.3"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          4.3
  - name: biweekly_to_monthly_conversion_factor
    kind: parameter
    dtype: Decimal
    source: Section 1003.E
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-10-determining-household-eligibility-and-benefit-levels/1003
              excerpt: "an average biweekly amount by 2.15"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          2.15
  - name: minimum_months_for_expense_averaging
    kind: parameter
    dtype: Count
    source: Section 1003.C
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-10-determining-household-eligibility-and-benefit-levels/1003
              excerpt: "a minimum of two months expenses shall be used to determine a monthly average"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          2
  - name: expense_is_deductible
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Section 1003.A
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-10-determining-household-eligibility-and-benefit-levels/1003
              excerpt: "Expenses shall only be deductible if the service is provided by someone outside of the household and the household makes a money payment for the service."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          service_provided_by_non_household_member
          and household_makes_money_payment_for_service
          and not expense_covered_by_excluded_reimbursement_or_vendor_payment_other_than_liheap
  - name: monthly_deduction_from_weekly_expense
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: Section 1003.E
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-10-determining-household-eligibility-and-benefit-levels/1003
              excerpt: "multiplying an average weekly amount by 4.3"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          max(0, average_weekly_expense_amount) * weekly_to_monthly_conversion_factor
  - name: monthly_deduction_from_biweekly_expense
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: Section 1003.E
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-10-determining-household-eligibility-and-benefit-levels/1003
              excerpt: "an average biweekly amount by 2.15"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          max(0, average_biweekly_expense_amount) * biweekly_to_monthly_conversion_factor
