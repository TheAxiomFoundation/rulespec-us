format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-al/manual/dhr/poe/chapter-10-determining-household-eligibility-and-benefit-levels/1001
  summary: |-
    Available resources at the time the household is interviewed shall be used to determine the household's eligibility. Future resources for which the month and amount of anticipated receipt are known shall be used in determining the household's continued eligibility at the time of certification.
rules:
  - name: countable_resources_for_eligibility
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: AL DHR POE Chapter 10, Section 1001
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-10-determining-household-eligibility-and-benefit-levels/1001
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          available_resources_at_interview
          + (if future_resource_month_and_amount_known: anticipated_future_resource_amount else: 0)
