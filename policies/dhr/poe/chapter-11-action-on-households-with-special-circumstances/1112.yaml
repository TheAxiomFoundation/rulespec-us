format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-al/manual/dhr/poe/chapter-11-action-on-households-with-special-circumstances/1112
  summary: |-
    Payments made to day care providers to provide meals for children, other than their own, are considered self-employment income. Allowable costs of doing business are excluded from gross self-employment income, and the remainder is subject to the 20% earned income deduction. A standard 40% of the gross income will be excluded as the cost of doing business.
rules:
  - name: day_care_meal_provider_cost_of_doing_business_rate
    kind: parameter
    dtype: Rate
    source: AL DHR POE Manual 1112(2) (Rev. 5-01-11)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-11-action-on-households-with-special-circumstances/1112
              excerpt: "A standard 40% of the gross income will be excluded as the cost of doing business."
    versions:
      - effective_from: '2011-05-01'
        formula: |-
          0.40
  - name: day_care_meal_provider_net_self_employment_income
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: AL DHR POE Manual 1112(1)-(2) (Rev. 5-01-11)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-11-action-on-households-with-special-circumstances/1112
              excerpt: "Allowable costs of doing business are excluded from the gross self-employment income"
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-11-action-on-households-with-special-circumstances/1112
              excerpt: "A standard 40% of the gross income will be excluded as the cost of doing business."
    versions:
      - effective_from: '2011-05-01'
        formula: |-
          max(0, day_care_meal_provider_gross_income - (day_care_meal_provider_gross_income * day_care_meal_provider_cost_of_doing_business_rate))
