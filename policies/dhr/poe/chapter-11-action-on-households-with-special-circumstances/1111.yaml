format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-al/manual/dhr/poe/chapter-11-action-on-households-with-special-circumstances/1111
  summary: |-
    The time period for the disqualification begins when the individual is determined eligible for benefits, regardless of whether the sanction is actually imposed. If the county department fails to impose a penalty in a timely manner, only the remaining sanction time can be imposed. If there are no remaining months, no penalty shall be imposed. An un-served disqualification shall still be counted when determining the number of confirmed offenses against an individual.
rules:
  - name: ipv_disqualification_months_to_impose
    kind: derived
    entity: Person
    dtype: Count
    period: Month
    source: POE Chapter 11, Section 1111(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-11-action-on-households-with-special-circumstances/1111
              excerpt: "only the remaining sanction time can be imposed"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          max(0, ipv_original_disqualification_months - ipv_imposition_delay_months)
  - name: ipv_penalty_imposed
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: POE Chapter 11, Section 1111(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-11-action-on-households-with-special-circumstances/1111
              excerpt: "If there are no remaining months, no penalty shall be imposed"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          ipv_disqualification_months_to_impose > 0
  - name: ipv_unserved_disqualification_counts_as_confirmed_offense
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: POE Chapter 11, Section 1111(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-11-action-on-households-with-special-circumstances/1111
              excerpt: "An un-served disqualification shall still be counted when determining the number of confirmed offenses against an individual"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_has_unserved_ipv_disqualification
