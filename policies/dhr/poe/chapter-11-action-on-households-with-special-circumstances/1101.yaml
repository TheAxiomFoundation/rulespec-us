format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-al/manual/dhr/poe/chapter-11-action-on-households-with-special-circumstances/1101
  summary: |-
    Households with Boarders: boarders who are not requested to be treated as a household member shall be excluded. Payments from the boarder shall be treated as self-employment income. The household will receive a 40% deduction from the gross income generated from the boarders as a cost of doing business. Shelter expenses paid directly by boarders to someone outside of the household shall not be counted as income. Non-boarders for whom household furnishes meals: that portion of the cash compensation that exceeds the cost of producing the meals would be considered income.
rules:
  - name: boarder_cost_of_doing_business_deduction_rate
    kind: parameter
    dtype: Rate
    source: Section 1101.C
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-11-action-on-households-with-special-circumstances/1101
              excerpt: "The household will receive a 40% deduction from the gross income generated from the boarders as a cost of doing business."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.40
  - name: boarder_gross_income
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: Section 1101.B
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-11-action-on-households-with-special-circumstances/1101
              excerpt: "The income from boarders shall include all direct payments to the household for room and meals, including contributions to the household's shelter expenses. Shelter expenses paid directly by boarders to someone outside of the household shall not be counted as income to the household."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          max(0, boarder_direct_payments_for_room_and_meals + boarder_contributions_to_household_shelter_expenses)
  - name: boarder_self_employment_net_income
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: Section 1101.C
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-11-action-on-households-with-special-circumstances/1101
              excerpt: "The household will receive a 40% deduction from the gross income generated from the boarders as a cost of doing business."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          max(0, boarder_gross_income - (boarder_cost_of_doing_business_deduction_rate * boarder_gross_income))
  - name: non_boarder_meals_income
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: Section 1101 - Non-boarders for Whom Household Furnishes Meals
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-11-action-on-households-with-special-circumstances/1101
              excerpt: "That portion of the cash compensation that the household receives for providing meals to such an individual that exceeds the cost of producing the meals would be considered income to the household."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          max(0, non_boarder_meal_cash_compensation - non_boarder_meal_production_cost)
