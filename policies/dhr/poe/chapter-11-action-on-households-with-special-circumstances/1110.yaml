format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-al/manual/dhr/poe/chapter-11-action-on-households-with-special-circumstances/1110
  summary: |-
    Public/General Assistance Program Requirement: There will be no increase in food assistance benefits to households in which a penalty resulting in a decrease of PA and GA benefits has been imposed for noncompliance with a federal, state, or local means-tested public assistance program. Food assistance benefits shall be calculated using the benefit amount that would have been issued if no penalty or recoupment had been applied. Two conditions must exist: (1) the agency administering the other program (FA) must advise of noncompliance or client caused overpayment, and (2) the individual, unit, or household must have been receiving assistance from the other program at the time of the violation and that assistance must be decreased, suspended, or terminated because of this failure to comply. This policy does not apply to households during the time the household is serving a sanction for both food assistance and FA due to noncompliance with a JOBS requirement.
rules:
  - name: other_program_noncompliance_penalty_rule_applies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: "POE 1110 - Public/General Assistance Program Requirement, two conditions"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-11-action-on-households-with-special-circumstances/1110
              excerpt: "The agency that is administering the other program (FA) must advise that there has been a noncompliance or client caused overpayment."
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-11-action-on-households-with-special-circumstances/1110
              excerpt: "The individual, unit, or household must have been receiving assistance from the other program at the time of the violation and that assistance must be decreased, suspended, or terminated because of this failure to comply."
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-11-action-on-households-with-special-circumstances/1110
              excerpt: "This policy does not apply to households during the time the household or a household member is serving a sanction for both food assistance and FA due to noncompliance with a JOBS requirement"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          other_program_advised_of_noncompliance_or_client_caused_overpayment
          and household_was_receiving_other_program_assistance_at_time_of_violation
          and other_program_assistance_decreased_suspended_or_terminated_due_to_noncompliance
          and not household_serving_concurrent_jobs_sanction_for_food_assistance_and_fa
  - name: attributed_penalty_amount_in_food_assistance_budget
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: "POE 1110 - Determining Benefit Level; Food assistance benefits shall be calculated using the benefit amount that would have been issued if no penalty or recoupment had been applied"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-11-action-on-households-with-special-circumstances/1110
              excerpt: "The food assistance benefits shall then be calculated using the benefit amount which would have been issued by that program if no penalty/recoupment had been applied against that program's benefit amount."
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-11-action-on-households-with-special-circumstances/1110
              excerpt: "If the member who committed the noncompliance moves out of the household, the penalty amount will be removed from the food assistance budget of that household."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if other_program_noncompliance_penalty_rule_applies and not noncomplying_member_moved_out_of_household: pa_ga_penalty_or_recoupment_amount else: 0
