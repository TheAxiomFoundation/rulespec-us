format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-al/manual/dhr/poe/chapter-16-restoration-of-lost-benefits/1603
  summary: |-
    After correcting the loss for future months and excluding those months for which benefits may have been lost prior to the 12-month time limits, the county department shall calculate the amount to be restored. For each month the household was eligible, the county department shall calculate the allotment the household should have received; if the household received a smaller allotment than it was eligible to receive, the difference between the actual and correct allotments equals the amount to be restored. If a claim against a household is unpaid or held in suspense, the amount to be restored shall be offset against the amount due on the claim before the balance, if any, is restored to the household. At the point in time when the household is certified and receives an initial allotment, the initial allotment shall not be reduced to offset claims, even if the initial allotment is paid retroactively.
rules:
  - name: month_household_considered_ineligible_for_restoration
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: "For each month the household cannot provide the necessary information to demonstrate its eligibility, the household shall be considered ineligible."
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-16-restoration-of-lost-benefits/1603
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not household_provided_necessary_eligibility_information_for_month
  - name: month_loss_amount
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: "If the household received a smaller allotment than it was eligible to receive, the difference between the actual and correct allotments equals the amount to be restored."
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-16-restoration-of-lost-benefits/1603
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if household_eligible_for_month_of_loss: max(0, correct_allotment_for_month - actual_allotment_received_for_month) else: 0
  - name: amount_restored_to_household_for_month
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: "the amount to be restored shall be offset against the amount due on the claim before the balance, if any, is restored to the household. At the point in time when the household is certified and receives an initial allotment, the initial allotment shall not be reduced to offset claims, even if the initial allotment is paid retroactively."
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-16-restoration-of-lost-benefits/1603
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if restoration_is_initial_allotment_at_certification: month_loss_amount else: max(0, month_loss_amount - unpaid_or_suspended_claim_balance_against_household)
