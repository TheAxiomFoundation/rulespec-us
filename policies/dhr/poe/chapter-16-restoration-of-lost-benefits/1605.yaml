format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-al/manual/dhr/poe/chapter-16-restoration-of-lost-benefits/1605
  summary: |-
    The county department shall restore lost benefits to a household by issuing an allotment equal to the amount of benefits that were lost, in addition to the current allotment. The county department shall honor reasonable requests by households to restore lost benefits in monthly installments.
rules:
  - name: restored_lost_benefits_allotment
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: AL DHR POE Chapter 16, Section 1605
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-16-restoration-of-lost-benefits/1605
              excerpt: "issuing an allotment equal to the amount of benefits that were lost"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if household_requests_monthly_installments: monthly_installment_amount else: max(0, amount_of_benefits_lost)
  - name: restored_benefits_in_addition_to_current_allotment
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: AL DHR POE Chapter 16, Section 1605
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-16-restoration-of-lost-benefits/1605
              excerpt: "issued in addition to the allotment currently eligible households are entitled to receive"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          amount_of_benefits_lost > 0
  - name: monthly_installment_request_honored
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: AL DHR POE Chapter 16, Section 1605
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-16-restoration-of-lost-benefits/1605
              excerpt: "shall honor reasonable requests by households to restore lost benefits in monthly installments"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_requests_monthly_installments
          and household_request_is_reasonable
