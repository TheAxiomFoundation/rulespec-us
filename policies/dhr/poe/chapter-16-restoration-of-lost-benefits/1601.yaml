format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-al/manual/dhr/poe/chapter-16-restoration-of-lost-benefits/1601
  summary: |-
    If the county department determines that a loss of benefits has occurred and the household is entitled to restoration, the county department shall automatically take action to restore those benefits. Benefits shall not be restored if they were lost more than 12 months prior to the month the loss was discovered by the county department in the normal course of business, or more than 12 months prior to the month the county department was notified in writing or orally of a possible loss.
rules:
  - name: restoration_lookback_months
    kind: parameter
    dtype: Integer
    source: Alabama DHR POE Manual 1601
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-16-restoration-of-lost-benefits/1601
              excerpt: "benefits were lost more than 12 months prior to the month"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          12
  - name: lost_benefits_restoration_allowed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Alabama DHR POE Manual 1601
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-16-restoration-of-lost-benefits/1601
              excerpt: "benefits shall not be restored if the benefits were lost more than 12 months prior to the month the loss was discovered by the county department in the normal course of business, or the benefits were lost more than 12 months prior to the month the county department was notified in writing or orally of a possible loss"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          county_department_determined_loss_of_benefits_occurred
          and household_entitled_to_restoration
          and months_between_loss_and_discovery_or_notification <= restoration_lookback_months
  - name: county_department_automatic_restoration_action_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Alabama DHR POE Manual 1601
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-16-restoration-of-lost-benefits/1601
              excerpt: "The county department shall automatically take action to restore any benefits that were lost. No action by the household is necessary."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          lost_benefits_restoration_allowed
