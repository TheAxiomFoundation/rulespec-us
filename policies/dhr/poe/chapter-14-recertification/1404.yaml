format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-al/manual/dhr/poe/chapter-14-recertification/1404
  summary: |-
    County department failure to provide an opportunity to participate, within the time frames in Section 1403, to an eligible household which has filed a timely application for recertification and met all processing steps in a timely manner shall be considered an administrative error. These households shall be entitled to restoration of lost benefits if, as a result of such error, the household was unable to participate for the month following the expiration of the certification period.
rules:
  - name: county_failure_is_administrative_error
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: AL DHR POE Chapter 14 Section 1404
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-14-recertification/1404
              excerpt: "County department failure to provide an opportunity to participate, within the time frames in Section 1403 above, to an eligible household which has filed a timely application for recertification and met all processing steps in a timely manner shall be considered an administrative error."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_is_eligible
          and household_filed_timely_recertification_application
          and household_met_all_processing_steps_timely
          and county_failed_to_provide_opportunity_to_participate_within_section_1403_time_frames
  - name: household_entitled_to_restoration_of_lost_benefits
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: AL DHR POE Chapter 14 Section 1404
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-14-recertification/1404
              excerpt: "These households shall be entitled to restoration of lost benefits if, as a result of such error, the household was unable to participate for the month following the expiration of the certification period."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          county_failure_is_administrative_error
          and household_was_unable_to_participate_month_following_certification_period_expiration_due_to_error
