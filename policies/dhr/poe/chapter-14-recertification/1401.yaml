  source_verification:
    corpus_citation_path: us-al/manual/dhr/poe/chapter-14-recertification/1401
  summary: |-
    Each certified household shall be provided with a Notice of Expiration prior to the start of the last month of the household's certification period. Any household certified for one month or when the certification action is not completed until the second month of a two-month certification shall have a Notice of Expiration provided at the time of certification. The notice shall contain the date by which the household must timely reapply in order to ensure uninterrupted benefits.
  deferred_outputs:
    - output: us-al:policies/dhr/poe/chapter-14-recertification/1401#notice_of_expiration_required
      reason: |-
        Source states an administrative furnishing duty (provide a Notice of Expiration) and notice-content requirements rather than a computable benefit, amount, eligibility test, or condition. No source-stated numeric amount, rate, threshold, cap, or limit; no source-stated calculable predicate beyond administrative timing.
