format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-al/manual/dhr/poe/chapter-17-simplified-reporting-procedures-for-all-households/1710
  summary: |-
    A household's eligibility for food assistance is based on current and anticipated circumstances. In six-month reporting, income is anticipated for the first six months based on information provided at interview. After the first six months, the six month report is used. For households with no earned income and all adult members elderly or disabled, income is anticipated for twelve months. All households must verify earned and unearned income received in the thirty days prior to the interview. Income received more frequently than monthly may be converted using factors 4.3, 2.15, or 2. Income must have a known estimated date of receipt and amount; uncertain income is not included.
rules:
  - name: weekly_conversion_factor
    kind: parameter
    dtype: Decimal
    source: Chapter 17 Section 1710 - conversion factor 4.3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-17-simplified-reporting-procedures-for-all-households/1710
              excerpt: "appropriate conversion factor of 4.3, 2.15 or 2"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          4.3
  - name: biweekly_conversion_factor
    kind: parameter
    dtype: Decimal
    source: Chapter 17 Section 1710 - conversion factor 2.15
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-17-simplified-reporting-procedures-for-all-households/1710
              excerpt: "appropriate conversion factor of 4.3, 2.15 or 2"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          2.15
  - name: semimonthly_conversion_factor
    kind: parameter
    dtype: Decimal
    source: Chapter 17 Section 1710 - conversion factor 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-17-simplified-reporting-procedures-for-all-households/1710
              excerpt: "appropriate conversion factor of 4.3, 2.15 or 2"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          2
  - name: income_verification_lookback_days
    kind: parameter
    dtype: Integer
    source: Chapter 17 Section 1710 - thirty days prior to interview
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-17-simplified-reporting-procedures-for-all-households/1710
              excerpt: "verification of earned and unearned income received in the thirty (30) days prior to the interview"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30
  - name: six_month_anticipation_months
    kind: parameter
    dtype: Integer
    source: Chapter 17 Section 1710 - first six months of certification period
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-17-simplified-reporting-procedures-for-all-households/1710
              excerpt: "income is anticipated for the first six months of the certification period"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          6
  - name: elderly_disabled_anticipation_months
    kind: parameter
    dtype: Integer
    source: Chapter 17 Section 1710 - twelve months for no earned income elderly/disabled
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-17-simplified-reporting-procedures-for-all-households/1710
              excerpt: "income is anticipated for twelve months based on the information/verification provided by the household"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          12
  - name: income_anticipation_period_months
    kind: derived
    entity: Household
    dtype: Integer
    period: Month
    source: Chapter 17 Section 1710 - anticipation period selection
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-17-simplified-reporting-procedures-for-all-households/1710
              excerpt: "For households with no earned income and all adult members are elderly or disabled, income is anticipated for twelve months"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if household_has_no_earned_income and household_all_adults_elderly_or_disabled: elderly_disabled_anticipation_months else: six_month_anticipation_months
  - name: income_included_in_budget
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Chapter 17 Section 1710 - reasonable income inclusion test
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-17-simplified-reporting-procedures-for-all-households/1710
              excerpt: "an estimated date of receipt and estimated amount of income must be known. ... Any income which is uncertain, based on amount or receipt date, should not be included in the budget."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          income_estimated_date_of_receipt_known
          and income_estimated_amount_known
          and not income_is_uncertain
