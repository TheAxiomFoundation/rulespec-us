format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-al/manual/dhr/poe/chapter-17-simplified-reporting-procedures-for-all-households/1709
  summary: |-
    Six-month reporting households are subject to normal recertification policy. Households with no earned income and all adult members elderly or disabled are given a twelve-month certification period and only required to report changes once every 12 months.
rules:
  - name: six_month_reporting_certification_period_months
    kind: parameter
    dtype: Integer
    source: AL DHR POE Chapter 17, Section 1709 ("first six months of the new certification period")
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-17-simplified-reporting-procedures-for-all-households/1709
              excerpt: "the first six months of the new certification period"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          6
  - name: elderly_disabled_no_earned_income_certification_period_months
    kind: parameter
    dtype: Integer
    source: AL DHR POE Chapter 17, Section 1709 ("twelve-month certification period")
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-17-simplified-reporting-procedures-for-all-households/1709
              excerpt: "will be given a twelve-month certification period"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          12
  - name: elderly_disabled_no_earned_income_reporting_interval_months
    kind: parameter
    dtype: Integer
    source: AL DHR POE Chapter 17, Section 1709 ("required to report changes once every 12 months")
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-17-simplified-reporting-procedures-for-all-households/1709
              excerpt: "only required to report changes once every 12 months"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          12
  - name: household_qualifies_for_twelve_month_certification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: AL DHR POE Chapter 17, Section 1709 ("Households with no earned income and all adult members are elderly or disabled")
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-17-simplified-reporting-procedures-for-all-households/1709
              excerpt: "Households with no earned income and all adult members are elderly or disabled will be given a twelve-month certification period"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_has_no_earned_income
          and household_all_adult_members_elderly_or_disabled
  - name: household_certification_period_months
    kind: derived
    entity: Household
    dtype: Integer
    period: Month
    source: AL DHR POE Chapter 17, Section 1709
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-17-simplified-reporting-procedures-for-all-households/1709
              excerpt: "twelve-month certification period ... first six months of the new certification period"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if household_qualifies_for_twelve_month_certification: elderly_disabled_no_earned_income_certification_period_months else: six_month_reporting_certification_period_months
