  summary: |-
    Chapter 17, Section 1706: The county office should react to reported changes during the certification period. Covers required household reported changes (income exceeding 130% of poverty, ABAWD work-hour reduction), non-required voluntary changes (increases in benefits with/without verification, decreases, PA grant changes, voluntary termination, member removal, death of all members, verified-upon-receipt information, IEVS unverified-upon-receipt handling, BENDEX death and Prisoner Verification matches), unclear-information procedures (including the 60-day rule), and special reopening procedures for six-month reporting households that fail to provide verification (reinstatement within month following closure, restoration for month of reinstatement with prorated benefits, reopening following month with new application date and original 12-month certification period). This source describes administrative procedures, time frames, and case-action workflows that do not define a computable benefit amount, threshold, or eligibility test independent of cross-referenced cited sections (e.g., section 205, simplified reporting requirements at chapter 17 sections 1700-1705) not provided in the supplied context.
