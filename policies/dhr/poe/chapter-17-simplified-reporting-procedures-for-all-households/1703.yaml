    corpus_citation_path: us-al/manual/dhr/poe/chapter-17-simplified-reporting-procedures-for-all-households/1703
  summary: |-
    Six-month reporting households are sent a six-month report form during the fifth month (report month) of the certification period to be completed and returned between the first and tenth of the sixth month (processing month). The form is generated on the 20th (or prior business day) and mailed on the 24th (or prior business day). If not received by the 10th of the processing month, an automated notice is generated after close of business on the 15th. Forms received between the 1st and 10th must be logged on the SR universe by the 15th to prohibit the reminder/termination notice.
