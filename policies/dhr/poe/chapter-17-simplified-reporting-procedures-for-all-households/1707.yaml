  summary: |-
    Section 1707 sets administrative procedures for transitions between simplified reporting and six-month reporting when a household reports a change during the certification period. Increases in benefits and reporting-status changes take effect the month following notification (within 10 days); decreases in benefits do not take effect until the six-month report is received or recertification, whichever is earlier. Households containing a child who turns 19 (simplified to six-month) or whose only adult turns 60 (six-month to simplified) are not tracked for age changes during the certification period. Cross-references sections 1700, 1701, and 1702.
