format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-al/manual/dhr/poe/chapter-02-application-processing/213
  summary: |-
    Newly certified households, except expedited service households, shall be given an opportunity to participate no later than 30 calendar days following the date the application was filed. If food assistance is mailed, two days shall be allowed for delivery. Households that apply after the fifteenth of a month, fulfill all eligibility requirements, and are determined eligible for both the month of application and the next subsequent month shall receive both allotments at the same time within the appropriate timeliness standards; the period of intended use for an aggregate allotment is two months. No more than 40 days shall be allowed to elapse between any two issuances provided to a household, except for households who receive their combined allotment during the first month of the certification period.
rules:
  - name: opportunity_to_participate_days
    kind: parameter
    dtype: Integer
    source: Alabama DHR POE Manual chapter 2 section 213(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-02-application-processing/213
              excerpt: "no later than 30 calendar days following the date the application was filed"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30
  - name: mail_delivery_days
    kind: parameter
    dtype: Integer
    source: Alabama DHR POE Manual chapter 2 section 213(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-02-application-processing/213
              excerpt: "two days shall be allowed for delivery"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          2
  - name: aggregate_allotment_application_day_threshold
    kind: parameter
    dtype: Integer
    source: Alabama DHR POE Manual chapter 2 section 213(B)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-02-application-processing/213
              excerpt: "Apply for food assistance after the fifteenth of a month"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          15
  - name: aggregate_allotment_period_months
    kind: parameter
    dtype: Integer
    source: Alabama DHR POE Manual chapter 2 section 213(B)(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-02-application-processing/213
              excerpt: "The period of intended use for an aggregate allotment is two months"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          2
  - name: max_days_between_issuances
    kind: parameter
    dtype: Integer
    source: Alabama DHR POE Manual chapter 2 section 213(C)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-02-application-processing/213
              excerpt: "No more than 40 days shall be allowed to elapse between any two issuances"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          40
  - name: aggregate_allotment_applies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Alabama DHR POE Manual chapter 2 section 213(B)(1)-(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-02-application-processing/213
              excerpt: "Apply for food assistance after the fifteenth of a month. Fulfill all eligibility requirements and Are determined to be eligible for both the month of application and the next subsequent month"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_applied_after_fifteenth_of_month
          and household_fulfills_all_eligibility_requirements
          and household_eligible_month_of_application
          and household_eligible_next_subsequent_month
  - name: max_days_between_issuances_rule_applies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Alabama DHR POE Manual chapter 2 section 213(C)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-02-application-processing/213
              excerpt: "this policy does not apply to households who receive their combined allotment during the first month of the certification period"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not household_received_combined_allotment_first_month_of_certification_period
  - name: opportunity_to_participate_deadline_met
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Alabama DHR POE Manual chapter 2 section 213(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-02-application-processing/213
              excerpt: "shall be given an opportunity to participate no later than 30 calendar days following the date the application was filed"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-02-application-processing/213
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_received_expedited_service
          or days_from_application_to_opportunity_to_participate <= opportunity_to_participate_days
