  status: deferred
  summary: |-
    An applicant for or recipient of social security benefits under Title II of the Social Security Act shall be informed at the SSA office of the availability of benefits under the Food Assistance Program and the availability of a Food Assistance Program application at the SSA office. The SSA office is not required to accept applications and conduct interviews for Title II applicants/recipients.
