format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-al/manual/dhr/poe/chapter-15-fair-hearings/1511
  summary: |-
    At least 10 days prior to the hearing, advance written notice shall be provided to all parties involved to permit adequate preparation of the case.
rules:
  - name: hearing_advance_notice_minimum_days
    kind: parameter
    dtype: Integer
    source: AL DHR POE Chapter 15, Section 1511
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-15-fair-hearings/1511
              excerpt: "At least 10 days prior to the hearing, advance written notice shall be provided"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10
  - name: hearing_advance_notice_requirement_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: AL DHR POE Chapter 15, Section 1511
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-15-fair-hearings/1511
              excerpt: "At least 10 days prior to the hearing, advance written notice shall be provided to all parties involved"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-15-fair-hearings/1511
              excerpt: "Advises the household of the name, address and phone number to contact"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-15-fair-hearings/1511
              excerpt: "Includes a copy of the State agency's hearing procedures"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-15-fair-hearings/1511
              excerpt: "Explains that the household or representative may examine the case file prior to the hearing"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-15-fair-hearings/1511
              excerpt: "Advises the household that failure to appear for the hearing or failure to arrange a delay will result in the hearing being dismissed"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          days_between_notice_and_hearing >= hearing_advance_notice_minimum_days
          and notice_provided_to_all_parties
          and notice_advises_contact_name_address_phone
          and notice_includes_state_agency_hearing_procedures
          and notice_explains_case_file_examination_right
          and notice_advises_failure_to_appear_results_in_dismissal
