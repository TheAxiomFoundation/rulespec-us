    corpus_citation_path: us-al/manual/dhr/poe/chapter-15-fair-hearings/1512
  summary: |-
    Hearings shall be conducted by an impartial official(s) who does not have any personal stake or involvement in the case, was not directly involved in the initial determination of the action which is being contested, and was not the immediate supervisor of the eligibility worker who took the action. The hearing official shall be an employee of Food Assistance Division, State Department of Human Resources. The hearing official shall have enumerated powers and duties including administering oaths, ensuring relevant issues are considered, receiving evidence, regulating hearing conduct, deciding admissibility, ordering independent medical/professional evaluations, providing a hearing record and rendering a decision in accordance with Section 1516, issuing subpoenas, granting continuances, ruling on petitions/motions, and regulating witness presence.
