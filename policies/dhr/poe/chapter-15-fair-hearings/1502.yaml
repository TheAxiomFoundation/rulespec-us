format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-al/manual/dhr/poe/chapter-15-fair-hearings/1502
  summary: |-
    Within 60 days of the receipt of a request for a fair hearing, the State agency shall assure the hearing is conducted, a decision is reached, and the household and county department is notified of the decision. The decision must be issued no later than 30 days from the date the hearing is conducted. If the household timely requests reinstatement of a hearing that was orally withdrawn, the agency will have an additional 60 days from the date the reinstatement was requested. Decisions resulting in an increase shall be reflected in the coupon allotment within 10 days of receipt of the hearing decision. Decisions resulting in a decrease shall be reflected in the next scheduled issuance. The household may request a postponement not to exceed 30 days; the 60-day time limit may be extended for as many days as the hearing is postponed.
rules:
  - name: hearing_process_completion_days
    kind: parameter
    dtype: Integer
    source: POE 1502 - "Within 60 days of the receipt of a request for a fair hearing"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-15-fair-hearings/1502
              excerpt: "Within 60 days of the receipt of a request for a fair hearing"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          60
  - name: decision_issuance_days_after_hearing
    kind: parameter
    dtype: Integer
    source: POE 1502 - "the decision must be issued no later than 30 days from the date the hearing is conducted"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-15-fair-hearings/1502
              excerpt: "the decision must be issued no later than 30 days from the date the hearing is conducted"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30
  - name: reinstatement_additional_days
    kind: parameter
    dtype: Integer
    source: POE 1502 - "the agency will have an additional 60 days from the date the reinstatement was requested"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-15-fair-hearings/1502
              excerpt: "an additional 60 days from the date the reinstatement was requested"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          60
  - name: increase_allotment_reflection_days
    kind: parameter
    dtype: Integer
    source: POE 1502 - "shall be reflected in the coupon allotment within 10 days of the receipt of the hearing decision"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-15-fair-hearings/1502
              excerpt: "reflected in the coupon allotment within 10 days of the receipt of the hearing decision"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10
  - name: postponement_maximum_days
    kind: parameter
    dtype: Integer
    source: POE 1502 - "The postponement shall not exceed 30 days"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-15-fair-hearings/1502
              excerpt: "The postponement shall not exceed 30 days"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30
  - name: hearing_process_deadline_days
    kind: derived
    entity: Household
    dtype: Integer
    period: Day
    source: POE 1502 - 60-day deadline extended by postponement days and reinstatement additional days
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-15-fair-hearings/1502
              excerpt: "the time limit, 60 days, for action on the decision may be extended for as many days as the hearing is postponed"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-15-fair-hearings/1502
              excerpt: "an additional 60 days from the date the reinstatement was requested to complete the hearing process"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          hearing_process_completion_days
          + min(postponement_days_requested, postponement_maximum_days)
          + (if reinstatement_of_orally_withdrawn_hearing_timely_requested: reinstatement_additional_days else: 0)
