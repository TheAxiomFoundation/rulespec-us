    corpus_citation_path: us-al/manual/dhr/poe/chapter-15-fair-hearings/1507
  summary: |-
    A request for a hearing is defined as a clear expression, oral or written, by the household or its representative to the effect that it wishes to appeal a decision or that an opportunity to present its case to a higher authority is desired. The agency may request the household to clarify its grievance when the request is unclear. The freedom to make a request for a hearing shall not be limited or interfered with in any way.
