format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-al/manual/dhr/poe/chapter-15-fair-hearings/1504
  summary: |-
    The State Agency may respond to a series of individual requests for hearings by conducting a single "group" hearing. Only cases where individual issues of fact are not disputed and where related issues of State and/or Federal law, regulation or policy are the sole issues being raised may be consolidated. In all group hearings, the regulations governing individual hearings must be followed. Each individual household shall be permitted to present its own case or have its case presented by a representative.
rules:
  - name: group_hearing_consolidation_permitted
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: AL DHR POE Chapter 15-1504 (group hearings)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-15-fair-hearings/1504
              excerpt: "Only cases where individual issues of fact are not disputed and where related issues of State and/or Federal law, regulation or policy are the sole issues being raised may be consolidated."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not individual_issues_of_fact_disputed
          and related_issues_of_law_regulation_or_policy_are_sole_issues_raised
