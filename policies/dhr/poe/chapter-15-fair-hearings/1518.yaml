format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-al/manual/dhr/poe/chapter-15-fair-hearings/1518
  summary: |-
    A. Rehearing: application may be filed within 15 days of the final decision; replies within 10 days; hearing officer acts within 30 days; if no decision within 30 days, the application is deemed denied. B. Judicial Review available through the court system.
rules:
  - name: rehearing_application_filing_days
    kind: parameter
    dtype: Integer
    source: 1518.A (within 15 days of the final decision)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-15-fair-hearings/1518
              excerpt: "within 15 days of the final decision"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          15
  - name: rehearing_reply_filing_days
    kind: parameter
    dtype: Integer
    source: 1518.A (parties may file replies within 10 days)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-15-fair-hearings/1518
              excerpt: "may file replies thereto within 10 days"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10
  - name: rehearing_officer_action_days
    kind: parameter
    dtype: Integer
    source: 1518.A (within 30 days after the filing of an application for a rehearing)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-15-fair-hearings/1518
              excerpt: "Within 30 days after the filing of an application for a rehearing"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30
  - name: rehearing_application_timely
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 1518.A (application filed within 15 days of the final decision)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-15-fair-hearings/1518
              excerpt: "may file an application for a rehearing within 15 days of the final decision"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          days_since_final_decision <= rehearing_application_filing_days
  - name: rehearing_reply_timely
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 1518.A (copies served on all parties who may file replies thereto within 10 days)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-15-fair-hearings/1518
              excerpt: "Copies of the application for a rehearing shall be served on all parties who may file replies thereto within 10 days"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          days_since_application_served <= rehearing_reply_filing_days
  - name: rehearing_application_deemed_denied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 1518.A (If no decision is entered within 30 days, application shall be deemed denied)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-15-fair-hearings/1518
              excerpt: "If no decision is entered within 30 days after the filing of an application for a rehearing, the application shall be deemed denied"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          days_since_application_filed > rehearing_officer_action_days
          and not rehearing_officer_decision_entered
  - name: rehearing_dismissed_for_nonappearance
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 1518.A (failure to appear or arrange delay without good cause results in dismissal)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-15-fair-hearings/1518
              excerpt: "Failure of the party requesting the rehearing to appear for or arrange for a delay of the scheduled rehearing without good cause will result in the rehearing being dismissed"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          requesting_party_failed_to_appear
          and not delay_arranged
          and not good_cause_for_nonappearance
  - name: rehearing_procedures_apply
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 1518.A Note (procedures do not apply to State Appeals of County ADH)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-15-fair-hearings/1518
              excerpt: "The above procedures do not apply to State Appeals of County Administration Disqualification Hearings"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not matter_is_state_appeal_of_county_adh
