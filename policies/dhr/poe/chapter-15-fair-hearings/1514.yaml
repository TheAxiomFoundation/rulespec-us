format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-al/manual/dhr/poe/chapter-15-fair-hearings/1514
  summary: |-
    Failure of the household and/or its representative to appear or to arrange for a delay or reschedule will result in the hearing being dismissed and no decision rendered.
rules:
  - name: hearing_dismissed_for_nonappearance
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: AL DHR POE Manual 1514
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-15-fair-hearings/1514
              excerpt: "Failure of the household and/or its representative to appear or to arrange for a delay or reschedule will result in the hearing being dismissed"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not household_or_representative_appeared_at_hearing
          and not household_arranged_delay_or_reschedule
