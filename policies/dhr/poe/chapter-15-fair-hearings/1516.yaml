    corpus_citation_path: us-al/manual/dhr/poe/chapter-15-fair-hearings/1516
  summary: |-
    Decisions of the hearing authority shall comply with Federal law and regulations and shall be based on the hearing record. The recording of testimony or verbatim transcripts and exhibits, together with all papers and requests filed in the preceding, shall constitute the exclusive record for a final decision by the hearing authority. The household and the county department shall each be notified in writing of: the decision; a summary of the facts; specific reasons and supporting evidence; pertinent Federal regulations; and the right to request a rehearing, including judicial review if the decision upholds the agency action.
