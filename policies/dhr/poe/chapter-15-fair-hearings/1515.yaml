    corpus_citation_path: us-al/manual/dhr/poe/chapter-15-fair-hearings/1515
  summary: |-
    The household or its representative must be given adequate opportunity to examine documents and records before and during the hearing (with confidential information protected); confidential information and other documents the household cannot contest shall not be introduced; present the case personally or via counsel; bring witnesses; advance arguments without undue interference; question or refute testimony and cross-examine adverse witnesses; and submit evidence to establish pertinent facts.
