format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-al/manual/dhr/poe/chapter-15-fair-hearings/1503
  summary: |-
    The county department shall offer agency conferences to households which
    wish to contest a denial of expedited service or an agency action which
    adversely affected the household. An agency conference for households
    contesting a denial of expedited service shall be scheduled within 2
    working days, unless the household requests that it be scheduled later or
    states it does not wish to have an agency conference. Use of an agency
    conference is optional and shall in no way delay or replace the hearing
    process.
rules:
  - name: expedited_service_agency_conference_scheduling_days
    kind: parameter
    dtype: Integer
    source: AL DHR POE 1503 (expedited service agency conference scheduling timeframe)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-15-fair-hearings/1503
              excerpt: "scheduled within 2 working days"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          2
  - name: expedited_service_agency_conference_must_be_scheduled_within_standard_timeframe
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: AL DHR POE 1503 (scheduling required within 2 working days unless household opts out or requests later)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-15-fair-hearings/1503
              excerpt: "scheduled within 2 working days, unless the household requests that it be scheduled later or states it does not wish to have an agency conference"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_contests_denial_of_expedited_service
          and not household_requests_later_scheduling
          and not household_declines_agency_conference
