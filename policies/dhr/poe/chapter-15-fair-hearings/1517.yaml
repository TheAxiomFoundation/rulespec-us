  summary: |-
    The county department is responsible for ensuring final hearing decisions are reflected in the household's allotment within the time limits in Section 1502. When the hearing authority finds benefits were improperly denied or under-issued, lost benefits are restored under Chapter 16. Benefits are restored before a household leaves the project area when possible; otherwise an authorization is forwarded to the household or new project area. When the hearing authority upholds the county action, a claim is prepared for any over-issuance (except work registration sanction). If a hearing is dismissed and benefits were continued under Section 1510 rather than the proposed reduction/termination, the county department: (1) makes the planned reduction/termination effective the first of the following month; (2) sends a letter (not a Notice of Adverse Action) advising of the reduction/termination and effective month; (3) prepares a claim for the months benefits were continued, except for work registration sanction; (4) prepares a claim only for the month(s) the original action would have been effective if the certification period has expired or offsetting changes have occurred; (5) continues benefits at the original level upon good cause for failing to appear until a change is reported, mass change occurs, certification period expires, or a decision is rendered; (6) notifies Food Assistance Division of the good cause; (7) implements the action and prepares a claim if the rehearing decision finds for the agency.
