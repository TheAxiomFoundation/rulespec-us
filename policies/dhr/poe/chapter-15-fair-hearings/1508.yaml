format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-al/manual/dhr/poe/chapter-15-fair-hearings/1508
  summary: |-
    Upon receipt of a hearing request and during the hearing process the county must do the following: 1. Within 10 days of the request notify Food Assistance Division. Use form titled "Notification of Hearing Request" for this purpose. 2. Offer a conference with the household and/or its representative. 3. Upon request, make available without charge specific materials necessary for a household to prepare for a hearing. 4. Upon request, assist the household in preparing for the hearing. 5. Advise the household of the availability of legal services. 6. Advise Food Assistance Division of the need of an expedited hearing process. 7. Advise Food Assistance Division of changes. 8. Review the case in question for agency compliance with policies and procedures. 9. Prepare the agency's testimony.
rules:
  - name: county_notification_deadline_days
    kind: parameter
    dtype: Integer
    source: Alabama DHR POE Chapter 15, Section 1508(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-15-fair-hearings/1508
              excerpt: "Within 10 days of the request notify Food Assistance Division."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10
  - name: county_notification_timely
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: Alabama DHR POE Chapter 15, Section 1508(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-15-fair-hearings/1508
              excerpt: "Within 10 days of the request notify Food Assistance Division."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          days_since_hearing_request <= county_notification_deadline_days
          and food_assistance_division_notified
