    versions:
      - effective_from: '2026-01-01'
        formula: |-
          max(dependent_standard_deduction_floor_amount, dependent_earned_income_addition_amount + earned_income)

  - name: basic_standard_deduction_after_dependent_limit
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
