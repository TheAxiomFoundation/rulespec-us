              corpus_citation_path: us/guidance/irs/rev-proc-2025-32/page-18
              excerpt: "for an individual who may be claimed as a dependent by another taxpayer cannot exceed the greater of (1) $1,350, or (2) the sum of $450 and the individual's earned income"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          if may_be_claimed_as_dependent_by_another_taxpayer:
            min(basic_standard_deduction_by_filing_status, dependent_standard_deduction_limit)
          else:
            basic_standard_deduction_by_filing_status

