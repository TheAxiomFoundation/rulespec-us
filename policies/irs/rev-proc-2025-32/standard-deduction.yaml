format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/guidance/irs/rev-proc-2025-32/page-18
  summary: |-
    .14 Standard Deduction. (1) In general. For taxable years beginning in 2026, the standard deduction amounts under § 63(c)(2) are as follows: Filing Status Standard Deduction Married Individuals Filing Joint Returns and Surviving Spouses (§ 1(j)(2)(A)) $32,200 Heads of Households (§ 1(j)(2)(B)) $24,150 Unmarried Individuals (other than Surviving Spouses and Heads of Households) (§ 1(j)(2)(C)) $16,100 Married Individuals Filing Separate Returns (§ 1(j)(2)(D)) $16,100

    (2) Dependent. For taxable years beginning in 2026, the standard deduction amount under § 63(c)(5) for an individual who may be claimed as a dependent by another taxpayer cannot exceed the greater of (1) $1,350, or (2) the sum of $450 and the individual's earned income. (3) Aged or blind. For taxable years beginning in 2026, the additional standard deduction amount under § 63(f) for the aged or the blind is $1,650. The additional standard deduction amount is increased to $2,050 if the individual is also unmarried and not a surviving spouse.
