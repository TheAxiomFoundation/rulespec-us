format: rulespec/v1
module:
  summary: |-
    IRS Revenue Procedure 2025-32 publishes the tax year 2026
    inflation-adjusted section 1(j)(5) maximum zero-rate and 15-percent-rate
    amounts for net capital gain.
  source_verification:
    corpus_citation_path: us/guidance/irs/rev-proc-2025-32/page-13
    values:
      capital_gains_zero_rate_threshold_joint: 98900
      capital_gains_zero_rate_threshold_separate: 49450
      capital_gains_zero_rate_threshold_head_of_household: 66200
      capital_gains_zero_rate_threshold_single: 49450
      capital_gains_fifteen_percent_threshold_joint: 613700
      capital_gains_fifteen_percent_threshold_separate: 306850
      capital_gains_fifteen_percent_threshold_head_of_household: 579600
      capital_gains_fifteen_percent_threshold_single: 545500
rules:
  - name: capital_gains_zero_rate_threshold_joint
    kind: parameter
    dtype: Money
    unit: USD
    source: Rev. Proc. 2025-32 section 4.03
    versions:
      - effective_from: '2026-01-01'
        formula: '98900'
  - name: capital_gains_zero_rate_threshold_separate
    kind: parameter
    dtype: Money
    unit: USD
    source: Rev. Proc. 2025-32 section 4.03
    versions:
      - effective_from: '2026-01-01'
        formula: '49450'
  - name: capital_gains_zero_rate_threshold_head_of_household
    kind: parameter
    dtype: Money
    unit: USD
    source: Rev. Proc. 2025-32 section 4.03
    versions:
      - effective_from: '2026-01-01'
        formula: '66200'
  - name: capital_gains_zero_rate_threshold_single
    kind: parameter
    dtype: Money
    unit: USD
    source: Rev. Proc. 2025-32 section 4.03
    versions:
      - effective_from: '2026-01-01'
        formula: '49450'
  - name: capital_gains_fifteen_percent_threshold_joint
    kind: parameter
    dtype: Money
    unit: USD
    source: Rev. Proc. 2025-32 section 4.03
    versions:
      - effective_from: '2026-01-01'
        formula: '613700'
  - name: capital_gains_fifteen_percent_threshold_separate
    kind: parameter
    dtype: Money
    unit: USD
    source: Rev. Proc. 2025-32 section 4.03
    versions:
      - effective_from: '2026-01-01'
        formula: '306850'
  - name: capital_gains_fifteen_percent_threshold_head_of_household
    kind: parameter
    dtype: Money
    unit: USD
    source: Rev. Proc. 2025-32 section 4.03
    versions:
      - effective_from: '2026-01-01'
        formula: '579600'
  - name: capital_gains_fifteen_percent_threshold_single
    kind: parameter
    dtype: Money
    unit: USD
    source: Rev. Proc. 2025-32 section 4.03
    versions:
      - effective_from: '2026-01-01'
        formula: '545500'
  - name: capital_gains_zero_rate_threshold
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Rev. Proc. 2025-32 section 4.03
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          match filing_status:
              1 => capital_gains_zero_rate_threshold_joint
              4 => capital_gains_zero_rate_threshold_joint
              2 => capital_gains_zero_rate_threshold_separate
              3 => capital_gains_zero_rate_threshold_head_of_household
              0 => capital_gains_zero_rate_threshold_single
  - name: capital_gains_fifteen_percent_threshold
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Rev. Proc. 2025-32 section 4.03
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          match filing_status:
              1 => capital_gains_fifteen_percent_threshold_joint
              4 => capital_gains_fifteen_percent_threshold_joint
              2 => capital_gains_fifteen_percent_threshold_separate
              3 => capital_gains_fifteen_percent_threshold_head_of_household
              0 => capital_gains_fifteen_percent_threshold_single
