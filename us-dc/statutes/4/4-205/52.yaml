  source_verification:
    corpus_citation_path: us-dc/statute/4/4-205.52
  summary: "To determine the TANF, POWER or GAC payment for an assistance unit, the\
    \ Mayor subtracts assistance-unit income, after applicable disregards, from the\
    \ current payment level for a family of that size. Subsection (c) sets standard\
    \ payment levels and levels of assistance for family sizes 1 through 19. Assistance\
    \ levels are adjusted annually for inflation, with specified increases for Fiscal\
    \ Years 2017, 2018, and 2019. Assistance units subject to \xA7 4-205.11b receive\
    \ reduced or no public assistance payments under subsections (c-2) and (c-3)."
  deferred_outputs:
