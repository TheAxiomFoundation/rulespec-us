format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/guidance/ssa/poms/si-01415-058/2026/block-11
  summary: "Use OS code \u201CA\u201D for a certified resident of an adult foster\
    \ care home with 50 or fewer residents; \u201CB\u201D for more than 50 residents;\
    \ \u201CG\u201D for Title XIX facility residents; \u201CY\u201D when optional\
    \ supplementation is waived; and \u201CZ\u201D for recipients not included in\
    \ A, B, G, or Y."
rules:
- name: adult_foster_care_home_os_code_resident_threshold
  kind: parameter
  dtype: Count
  source: POMS SI 01415.058, block 11, OS codes A and B definitions
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us/guidance/ssa/poms/si-01415-058/2026/block-11
          excerpt: adult foster care home with 50 or fewer residents
  versions:
  - effective_from: '2026-01-01'
    formula: '50'
- name: adult_foster_care_small_os_code_applies
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: POMS SI 01415.058, block 11, OS code A definition
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: definition
        source:
          corpus_citation_path: us/guidance/ssa/poms/si-01415-058/2026/block-11
  versions:
  - effective_from: '2026-01-01'
    formula: 'department_of_health_certification_received

      and recipient_is_adult_foster_care_home_resident

      and adult_foster_care_home_resident_count <= adult_foster_care_home_os_code_resident_threshold'
- name: adult_foster_care_large_os_code_applies
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: POMS SI 01415.058, block 11, OS code B definition
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: definition
        source:
          corpus_citation_path: us/guidance/ssa/poms/si-01415-058/2026/block-11
  versions:
  - effective_from: '2026-01-01'
    formula: 'department_of_health_certification_received

      and recipient_is_adult_foster_care_home_resident

      and adult_foster_care_home_resident_count > adult_foster_care_home_os_code_resident_threshold'
- name: title_xix_facility_os_code_applies
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: POMS SI 01415.058, block 11, OS code G definition
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: definition
        source:
          corpus_citation_path: us/guidance/ssa/poms/si-01415-058/2026/block-11
  versions:
  - effective_from: '2026-01-01'
    formula: recipient_is_title_xix_facility_resident
- name: no_supplement_os_code_applies
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: POMS SI 01415.058, block 11, OS code Z definition
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: default
        source:
          corpus_citation_path: us/guidance/ssa/poms/si-01415-058/2026/block-11
  versions:
  - effective_from: '2026-01-01'
    formula: 'not adult_foster_care_small_os_code_applies

      and not adult_foster_care_large_os_code_applies

      and not title_xix_facility_os_code_applies

      and not optional_supplement_waived_os_code_applies'
- name: dc_ossp_living_arrangement_os_code
  kind: derived
  entity: Person
  dtype: String
  period: Month
  source: POMS SI 01415.058, block 11, OS code definitions
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us/guidance/ssa/poms/si-01415-058/2026/block-11
  versions:
  - effective_from: '2026-01-01'
    formula: 'if adult_foster_care_small_os_code_applies: "A" else: if adult_foster_care_large_os_code_applies:
      "B" else: if title_xix_facility_os_code_applies: "G" else: if optional_supplement_waived_os_code_applies:
      "Y" else: "Z"'
imports:
- us:policies/ssa/poms/si-01415-058/2026/federally-administered-optional-supplement-common#optional_supplement_waived_os_code_applies
