    State OS Code A has FBR 1491.00, State Supplement Level 1717.00, Total Payment
    Level 3208.00; State OS Code B has 1937.00 and 3428.00; State OS Code Z has 0.00
    and 1491.00. Federal Code B / State OS Code Z has 994.00, 0.00, 994.00. Federal
    Code D / State OS Code G has 60.00, 158.00, 218.00.'
