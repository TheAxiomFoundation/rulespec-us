format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_paths:
      - us-dc/statute/47/47-1801.04
      - us-dc/statute/47/47-1803.02
      - us-dc/statute/47/47-1803.03
      - us-dc/statute/47/47-1806.01
      - us-dc/statute/47/47-1806.02
      - us-dc/statute/47/47-1806.03/block-1
      - us-dc/statute/47/47-1806.04
    upstream_source_check:
      status: checked_higher_authority
      checked_paths:
        - us-dc/statute/47/47-1801.04
        - us-dc/statute/47/47-1803.02
        - us-dc/statute/47/47-1803.03
        - us-dc/statute/47/47-1806.01
        - us-dc/statute/47/47-1806.02
        - us-dc/statute/47/47-1806.03/block-1
        - us-dc/statute/47/47-1806.04
      rationale: |-
        The pinned official District Code supplies the resident definition,
        federal gross-income and adjusted-gross-income starting points,
        directly stated individual exclusions, deduction framework, personal
        exemptions, taxable-income definition, post-2021 regular rate
        schedule, and central resident credit provisions.

        This module starts with federal adjusted gross income and separately
        named raw amounts for three directly stated District exclusions:
        federally taxable United States-obligation interest, state or local
        income-tax refunds, and federally taxable Social Security or tier 1
        railroad retirement benefits. The supported profile fails closed when
        another District gross-income exclusion, addition, federal-conformity
        difference, or above-the-line adjustment must be reconstructed.

        The pinned corpus has no final tax-year-2026 D-40, instructions, or
        schedules. It also lacks the Chief Financial Officer's 2026 low-income
        credit table and authoritative annual confirmation of the
        availability-funded standard-deduction and personal-exemption settings
        and indexed values. Complete annual credit eligibility, ordering, and
        carryforward surfaces likewise are not pinned as executable return
        materials. Those gaps are typed source holds. The existing direct-rate
        pilot is preserved but is not composed using its prohibited
        caller-completed District taxable-income input.
  summary: |-
    Tax-year-2026 District of Columbia full-year-resident individual-income-tax
    core with a source-complete adjusted-gross-income stage for an explicit
    ordinary profile. It accepts federal adjusted gross income and raw
    District exclusion amounts, validates residency and filing status, and
    computes District adjusted gross income without accepting a completed
    District income result.

    Public taxable income, tax before credits, tax after nonrefundable credits,
    refundable credits, and signed net liability before payments fail closed
    to zero while the annual deduction, exemption, and credit source holds are
    active. These zeros are non-applicable sentinels, not claims of zero tax.
    The module is intentionally incomplete and makes no annual-liability or
    oracle-parity claim.

    Itemized deductions, specialty income adjustments, separate-return
    allocation and election mechanics, other-jurisdiction credits, property
    tax credits, business and certified credits, carryforwards, and all other
    annual return credits remain deferred. Withholding, estimated payments,
    extensions, penalties, interest, filing administration, local taxes,
    nonresident allocation, and part-year allocation are outside scope.
  deferred_outputs:
    - output: us-dc:policies/income_tax/2026_resident_liability_source_hold#dc_pit_2026_complete_adjusted_gross_income
      reason: |-
        Complete District adjusted gross income requires every exclusion,
        addition, federal-conformity difference, and above-the-line adjustment
        in section 47-1803.02 and incorporated federal law. The public amount
        is valid only for the explicit supported profile.
      source_values:
        - us-dc:policies/income_tax/2026_resident_liability_source_hold#dc_pit_2026_supported_income_profile_applies
        - us-dc:policies/income_tax/2026_resident_liability_source_hold#dc_pit_2026_supported_profile_adjusted_gross_income
    - output: us-dc:policies/income_tax/2026_resident_liability_source_hold#dc_pit_2026_taxable_income
      reason: |-
        The final 2026 D-40 materials and authoritative implementation values
        for the availability-funded and annually adjusted deduction and
        exemption provisions are absent from the pinned corpus.
      source_values:
        - us-dc:policies/income_tax/2026_resident_liability_source_hold#dc_pit_2026_deduction_and_exemption_source_hold_applies
    - output: us-dc:policies/income_tax/2026_resident_liability_source_hold#dc_pit_2026_tax_before_credits
      reason: |-
        The statutory rate schedule is pinned, but it cannot be applied until
        District taxable income is source-complete without a caller-completed
        District result.
      source_values:
        - us-dc:policies/income_tax/2026_resident_liability_source_hold#dc_pit_2026_complete_liability_source_hold_applies
    - output: us-dc:policies/income_tax/2026_resident_liability_source_hold#dc_pit_2026_tax_after_nonrefundable_credits
      reason: |-
        The complete 2026 nonrefundable-credit eligibility, limitation,
        ordering, and carryforward surface is not pinned.
      source_values:
        - us-dc:policies/income_tax/2026_resident_liability_source_hold#dc_pit_2026_credit_surface_source_hold_applies
    - output: us-dc:policies/income_tax/2026_resident_liability_source_hold#dc_pit_2026_refundable_credits
      reason: |-
        The final 2026 D-40 credit schedules and complete refundable-credit
        eligibility and ordering surface are not pinned.
      source_values:
        - us-dc:policies/income_tax/2026_resident_liability_source_hold#dc_pit_2026_credit_surface_source_hold_applies
    - output: us-dc:policies/income_tax/2026_resident_liability_source_hold#dc_pit_2026_net_income_tax_liability_before_payments
      reason: |-
        Signed annual resident liability cannot be completed until every
        upstream annual source hold is cleared.
      source_values:
        - us-dc:policies/income_tax/2026_resident_liability_source_hold#dc_pit_2026_complete_liability_source_hold_applies

rules:
  - name: dc_pit_2026_filing_status_is_valid
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: D.C. Code sections 47-1801.04 and 47-1803.03, individual filing-status branches
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-dc/statute/47/47-1801.04
              excerpt: "Head of household shall have the same meaning as defined in section 2(b) of the Internal Revenue Code of 1986"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-dc/statute/47/47-1803.03
              excerpt: "If spouses or domestic partners file separate returns"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          (
            dc_pit_2026_filing_status_single
            and not dc_pit_2026_filing_status_married_separate
            and not dc_pit_2026_filing_status_joint_or_surviving_spouse
            and not dc_pit_2026_filing_status_head_of_household
          )
          or (
            not dc_pit_2026_filing_status_single
            and dc_pit_2026_filing_status_married_separate
            and not dc_pit_2026_filing_status_joint_or_surviving_spouse
            and not dc_pit_2026_filing_status_head_of_household
          )
          or (
            not dc_pit_2026_filing_status_single
            and not dc_pit_2026_filing_status_married_separate
            and dc_pit_2026_filing_status_joint_or_surviving_spouse
            and not dc_pit_2026_filing_status_head_of_household
          )
          or (
            not dc_pit_2026_filing_status_single
            and not dc_pit_2026_filing_status_married_separate
            and not dc_pit_2026_filing_status_joint_or_surviving_spouse
            and dc_pit_2026_filing_status_head_of_household
          )

  - name: dc_pit_2026_input_domain_is_valid
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: D.C. Code sections 47-1801.04 and 47-1803.02, full-year resident input domain
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-dc/statute/47/47-1801.04
              excerpt: "Resident means an individual domiciled in the District at any time during the taxable year"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-dc/statute/47/47-1803.02
              excerpt: "not required to file a District return for a complete calendar or fiscal year"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          dc_pit_2026_is_full_year_district_resident_return
          and dc_pit_2026_federal_and_district_filing_units_are_aligned
          and dc_pit_2026_filing_status_is_valid
          and dc_pit_2026_federally_taxable_us_obligation_interest >= 0
          and dc_pit_2026_federally_taxable_state_or_local_income_tax_refund >= 0
          and dc_pit_2026_federally_taxable_social_security_or_tier_1_railroad_benefits >= 0

  - name: dc_pit_2026_supported_income_profile_applies
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: D.C. Code section 47-1803.02, profile limited to directly encoded individual exclusions
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-dc/statute/47/47-1803.02
              excerpt: "the following items shall also be included or excluded in the computation of District gross income"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          dc_pit_2026_input_domain_is_valid
          and not dc_pit_2026_has_other_district_gross_income_exclusion_or_addition
          and not dc_pit_2026_has_district_specific_above_the_line_adjustment
          and not dc_pit_2026_has_federal_conformity_difference

  - name: dc_pit_2026_directly_encoded_gross_income_exclusions
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: D.C. Code section 47-1803.02(a)(2)(A), (E), and (L)
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-dc/statute/47/47-1803.02
              excerpt: "interest and dividend income on obligations or securities of the United States"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-dc/statute/47/47-1803.02
              excerpt: "Any state or local income tax refund included in federal gross income"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-dc/statute/47/47-1803.02
              excerpt: "Social security and tier 1 railroad retirement benefits subject to taxation"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          dc_pit_2026_federally_taxable_us_obligation_interest
          + dc_pit_2026_federally_taxable_state_or_local_income_tax_refund
          + dc_pit_2026_federally_taxable_social_security_or_tier_1_railroad_benefits

  - name: dc_pit_2026_profile_candidate_adjusted_gross_income
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: D.C. Code section 47-1803.02, federal AGI starting point less directly encoded District exclusions
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-dc/statute/47/47-1803.02
              excerpt: "Adjusted gross income"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-dc/statute/47/47-1803.02
              excerpt: "the same meaning as defined in § 62 of the Internal Revenue Code of 1986"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          dc_pit_2026_federal_adjusted_gross_income
          - dc_pit_2026_directly_encoded_gross_income_exclusions

  - name: dc_pit_2026_supported_profile_adjusted_gross_income
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Public supported-profile District adjusted gross income
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-dc/statute/47/47-1803.02
              excerpt: "Adjusted gross income"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if dc_pit_2026_supported_income_profile_applies:
            dc_pit_2026_profile_candidate_adjusted_gross_income
          else:
            0

  - name: dc_pit_2026_deduction_and_exemption_source_hold_applies
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: Missing final 2026 D-40 implementation values for deductions and exemptions
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-dc/statute/47/47-1801.04
              excerpt: "Subject to availability of funding"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-dc/statute/47/47-1806.02
              excerpt: "increased annually by the cost-of-living adjustment"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: true

  - name: dc_pit_2026_credit_surface_source_hold_applies
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: Missing final 2026 D-40 credit tables, schedules, and ordering
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-dc/statute/47/47-1806.04
              excerpt: "The credit shall be calculated in accordance with a table prescribed by the Chief Financial Officer"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-dc/statute/47/47-1806.04
              excerpt: "increased annually by the cost-of-living adjustment"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: true

  - name: dc_pit_2026_complete_liability_source_hold_applies
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: Combined source hold for incomplete 2026 annual resident liability
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-dc/statute/47/47-1806.01
              excerpt: "the term taxable income means the entire net income of every resident"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-dc/statute/47/47-1806.03/block-1
              excerpt: "there is imposed on the taxable income of every resident a tax determined in accordance with the following table"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          dc_pit_2026_deduction_and_exemption_source_hold_applies
          or dc_pit_2026_credit_surface_source_hold_applies

  - name: dc_pit_2026_taxable_income
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Fail-closed District taxable-income sentinel while source held
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-dc/statute/47/47-1806.01
              excerpt: "taxable income means the entire net income of every resident"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: '0'

  - name: dc_pit_2026_tax_before_credits
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Fail-closed District regular tax sentinel while taxable income is source held
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-dc/statute/47/47-1806.03/block-1
              excerpt: "there is imposed on the taxable income of every resident a tax determined in accordance with the following table"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: '0'

  - name: dc_pit_2026_tax_after_nonrefundable_credits
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Fail-closed District tax-after-nonrefundable-credits sentinel while source held
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-dc/statute/47/47-1806.04
              excerpt: "shall be allowed, against the tax imposed by this chapter"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: '0'

  - name: dc_pit_2026_refundable_credits
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Fail-closed District refundable-credit sentinel while source held
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-dc/statute/47/47-1806.04
              excerpt: "The credit allowed under this subsection shall be refundable to the resident claiming the credit"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: '0'

  - name: dc_pit_2026_net_income_tax_liability_before_payments
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Fail-closed signed annual District resident liability sentinel before payments
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-dc/statute/47/47-1806.04
              excerpt: "the amount of tax payable under this subchapter by a resident of the District"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: '0'

inputs:
  - name: dc_pit_2026_federal_adjusted_gross_income
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    description: Federal adjusted gross income from the aligned federal return.
  - name: dc_pit_2026_federally_taxable_us_obligation_interest
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    description: United States-obligation interest included in federal adjusted gross income.
  - name: dc_pit_2026_federally_taxable_state_or_local_income_tax_refund
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    description: State or local income-tax refund included in federal adjusted gross income.
  - name: dc_pit_2026_federally_taxable_social_security_or_tier_1_railroad_benefits
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    description: Social Security or tier 1 railroad benefits included in federal adjusted gross income.
  - name: dc_pit_2026_is_full_year_district_resident_return
    entity: TaxUnit
    dtype: Bool
    period: Year
    description: True only for a full-year District resident return.
  - name: dc_pit_2026_federal_and_district_filing_units_are_aligned
    entity: TaxUnit
    dtype: Bool
    period: Year
    description: True only when the federal and District individual filing units are aligned.
  - name: dc_pit_2026_filing_status_single
    entity: TaxUnit
    dtype: Bool
    period: Year
    description: True only for a single filer.
  - name: dc_pit_2026_filing_status_married_separate
    entity: TaxUnit
    dtype: Bool
    period: Year
    description: True only for a married or domestic-partner separate return.
  - name: dc_pit_2026_filing_status_joint_or_surviving_spouse
    entity: TaxUnit
    dtype: Bool
    period: Year
    description: True only for a joint or qualifying surviving-spouse return.
  - name: dc_pit_2026_filing_status_head_of_household
    entity: TaxUnit
    dtype: Bool
    period: Year
    description: True only for a head-of-household return.
  - name: dc_pit_2026_has_other_district_gross_income_exclusion_or_addition
    entity: TaxUnit
    dtype: Bool
    period: Year
    description: True when another section 47-1803.02 gross-income modification applies.
  - name: dc_pit_2026_has_district_specific_above_the_line_adjustment
    entity: TaxUnit
    dtype: Bool
    period: Year
    description: True when a District-specific above-the-line adjustment must be reconstructed.
  - name: dc_pit_2026_has_federal_conformity_difference
    entity: TaxUnit
    dtype: Bool
    period: Year
    description: True when incorporated federal adjusted-gross-income rules differ for District purposes.
