format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-dc/manual/dhs/esa/snap-policy-manual/page-167
    upstream_source_check:
      status: checked_higher_authority
      checked_paths:
        - us:regulations/7-cfr/273/9/d/6/iii
      rationale: |-
        Federal utility-allowance authority was checked for the SNAP heating/cooling standard structure and energy-assistance threshold delegation. The District ESA manual remains the direct source for the local HCSUA and Heat and Eat eligibility paths encoded here, including the $20.01 Heat and Eat benefit and District verification process.
  summary: |-
    "Households that are responsible for a heating or cooling cost that is separate from their rent or mortgage are eligible for the HCSUA," including LIHEAP or Heat and Eat assistance "of at least $20.01 in the last 12 months," other energy assistance expected to pay heating or cooling expenses, listed rental billing arrangements, and intermittent billing. Heat and Eat provides "certain SNAP households a $20.01 yearly energy assistance benefit" when they do not already qualify for HCSUA, would not receive the maximum allotment without HCSUA, and HCSUA would increase the monthly allotment; ESA must verify a LIHEAP Heat and Eat payment within the last 12 months before providing HCSUA.
rules:
  - name: hcsua_minimum_energy_assistance_payment
    kind: parameter
    dtype: Money
    unit: USD
    source: ESA SNAP Policy Manual 12.7.3.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-dc/manual/dhs/esa/snap-policy-manual/page-167
              excerpt: "of at least $20.01 in the last 12 months"
    versions:
      - effective_from: '2008-10-01'
        formula: |-
          20.01

  - name: heat_and_eat_annual_energy_assistance_benefit_amount
    kind: parameter
    dtype: Money
    unit: USD
    source: ESA SNAP Policy Manual 12.7.3.1.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-dc/manual/dhs/esa/snap-policy-manual/page-167
              excerpt: "$20.01 yearly energy assistance benefit"
    versions:
      - effective_from: '2008-10-01'
        formula: |-
          20.01

  - name: household_hcsua_base_eligibility
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: ESA SNAP Policy Manual 12.7.3.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-dc/manual/dhs/esa/snap-policy-manual/page-167
              excerpt: "responsible for a heating or cooling cost that is separate from their rent or mortgage"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-dc/manual/dhs/esa/snap-policy-manual/page-167
              excerpt: "LIHEAP of at least $20.01 in the last 12 months"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-dc/manual/dhs/esa/snap-policy-manual/page-167
              excerpt: "LIHEAP Heat and Eat in the last 12 months"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-dc/manual/dhs/esa/snap-policy-manual/page-167
              excerpt: "direct or indirect energy assistance payments other than LIHEAP"
    versions:
      - effective_from: '2008-10-01'
        formula: |-
          household_responsible_for_heating_or_cooling_cost_separate_from_rent_or_mortgage
          or (
            household_received_liheap_energy_assistance_within_last_twelve_months
            and liheap_energy_assistance_payment_amount >= hcsua_minimum_energy_assistance_payment
          )
          or (
            household_received_liheap_heat_and_eat_payment_within_last_twelve_months
            and liheap_heat_and_eat_payment_amount >= hcsua_minimum_energy_assistance_payment
          )
          or household_receives_non_liheap_energy_assistance_expected_to_pay_oop_heating_or_cooling_expenses_during_certification
          or private_rental_housing_billed_monthly_by_landlord_for_heating_or_cooling_based_on_individual_use_or_flat_rate
          or public_or_private_housing_with_central_meter_charged_only_for_excess_heating_or_cooling_costs

  - name: hcsua_continues_between_billing_periods
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: ESA SNAP Policy Manual 12.7.3.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-dc/manual/dhs/esa/snap-policy-manual/page-167
              excerpt: "incurring heating or cooling costs on an intermittent basis but otherwise eligible"
    versions:
      - effective_from: '2008-10-01'
        formula: |-
          household_incurs_heating_or_cooling_costs_on_intermittent_basis
          and household_otherwise_eligible_for_hcsua_between_billing_periods

  - name: heat_and_eat_benefit_triggered
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: ESA SNAP Policy Manual 12.7.3.1.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-dc/manual/dhs/esa/snap-policy-manual/page-167
              excerpt: "SNAP households that do not already qualify for the HCSUA"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-dc/manual/dhs/esa/snap-policy-manual/page-167
              excerpt: "If the Heat and Eat benefit would increase the household’s monthly allotment"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-dc/manual/dhs/esa/snap-policy-manual/page-167
              excerpt: "will receive the maximum allotment without applying the HCSUA"
    versions:
      - effective_from: '2008-10-01'
        formula: |-
          snap_household
          and not household_already_qualifies_for_hcsua_without_heat_and_eat
          and heat_and_eat_benefit_would_increase_monthly_allotment
          and not household_will_receive_maximum_allotment_without_hcsua

  - name: hcsua_provided_through_heat_and_eat
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: ESA SNAP Policy Manual 12.7.3.1.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-dc/manual/dhs/esa/snap-policy-manual/page-167
              excerpt: "system will trigger a Heat and Eat benefit and provide the HCSUA"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-dc/manual/dhs/esa/snap-policy-manual/page-167
              excerpt: "ESA must verify that the household received a LIHEAP Heat and Eat payment within the last 12 months"
    versions:
      - effective_from: '2008-10-01'
        formula: |-
          heat_and_eat_benefit_triggered
          and household_received_verified_liheap_heat_and_eat_payment_within_last_twelve_months

  - name: heat_and_eat_benefit_payment
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: ESA SNAP Policy Manual 12.7.3.1.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-dc/manual/dhs/esa/snap-policy-manual/page-167
              excerpt: "$20.01 yearly energy assistance benefit"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-dc/manual/dhs/esa/snap-policy-manual/page-167
              excerpt: "system will trigger a Heat and Eat benefit"
    versions:
      - effective_from: '2008-10-01'
        formula: |-
          if heat_and_eat_benefit_triggered: heat_and_eat_annual_energy_assistance_benefit_amount else: 0

  - name: household_eligible_for_hcsua
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: ESA SNAP Policy Manual 12.7.3.1 and 12.7.3.1.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-dc/manual/dhs/esa/snap-policy-manual/page-167
              excerpt: "are eligible for the HCSUA"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-dc/manual/dhs/esa/snap-policy-manual/page-167
              excerpt: "may continue to receive it between billing periods"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-dc/manual/dhs/esa/snap-policy-manual/page-167
              excerpt: "provide the HCSUA to the household"
    versions:
      - effective_from: '2008-10-01'
        formula: |-
          household_hcsua_base_eligibility
          or hcsua_continues_between_billing_periods
          or hcsua_provided_through_heat_and_eat

  - name: hcsua_eligibility_implements_federal_heating_cooling_standard
    kind: source_relation
    source_relation:
      type: implements
      target: us:regulations/7-cfr/273/9/d/6/iii#snap_standard_with_heating_or_cooling_component_available
      value: us-dc:policies/dhs/esa/snap-policy-manual/page-167#household_eligible_for_hcsua
      basis:
        delegation: us:regulations/7-cfr/273/9/d/6/iii#snap_standard_with_heating_or_cooling_component_available
