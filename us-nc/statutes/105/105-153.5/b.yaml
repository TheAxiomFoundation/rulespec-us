  summary: |-
    Other Deductions. In calculating North Carolina taxable income, a taxpayer may deduct specified items included in adjusted gross income, including listed interest, gains, Social Security and Railroad Retirement benefits, tax refunds, certain government retirement payments, tribal income, basis differences, depreciation add-back deductions, business expense credit add-backs, education account deposits, disaster relief payments, economic incentives, COVID-related grants, Extra Credit grants, and State net operating loss amounts.
  deferred_outputs:
    - output: us-nc:statutes/105/105-153.5/b#other_deductions
      reason: The subsection enumerates a broad deduction total whose branches depend on numerous external legal classifications and cross-referenced sources, including G.S. 105-153.6, G.S. 105-153.5A, federal military and survivor-benefit definitions, court-order settlement exemptions, disaster and grant program classifications, and taxable-year effective windows. Encoding a faithful aggregate requires those branch outputs or canonical classifications rather than opaque placeholder inputs.
