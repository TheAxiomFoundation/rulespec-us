format: rulespec/v1
module:
  status: deferred
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/statute/105/105-153.5/a
  summary: In calculating North Carolina taxable income, a taxpayer may deduct from
    adjusted gross income either the standard deduction amount or the itemized deduction
    amount. Standard deduction amounts vary by filing status and taxable-year effective
    period; itemized deductions include charitable contributions, qualified residence
    interest plus real estate taxes capped at $20,000, medical and dental expenses,
    and certain repayments. A child deduction is allowed per qualifying child with
    amounts determined by filing status and adjusted gross income for taxable years
    before and after January 1, 2022.
  deferred_outputs:
  - output: us-nc:statutes/105/105-153.5/a#deduction_amount
    reason: Computing the final deduction requires upstream filing-status classification
      under federal/state tax law and federal-return deduction amounts under Code
      sections 63, 68, 163, 164, 170, 213, 408(d)(8), and 1341 that are not supplied
      as executable RuleSpec imports in this prompt.
  - output: us-nc:statutes/105/105-153.5/a#child_deduction_amount
    reason: Computing the per-child deduction requires upstream filing-status classification
      and federal child tax credit eligibility under section 24 of the Code, neither
      of which is supplied as an executable RuleSpec import in this prompt.
