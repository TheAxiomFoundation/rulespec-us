format: rulespec/v1
module:
  status: deferred
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/statute/105/105-153.5/a1
  summary: |-
    Effective for taxable years beginning before January 1, 2022, a taxpayer allowed a federal child tax credit under section 24 is allowed a North Carolina deduction for each qualifying child, with the per-child amount set by filing status and federal adjusted gross income.
  deferred_outputs:
    - output: us-nc:statutes/105/105-153.5/a1#child_deduction_amount
      reason: The provision requires the shared federal tax filing status classification and federal child tax credit allowance under section 24. No copied RuleSpec context supplies the required filing-status output, and RuleSpec instructions prohibit synthesizing filing status as a local input.
      source_values:
        - us-nc:statutes/105/105-153.5/a1#child_deduction_amount_by_band
        - us-nc:statutes/105/105-153.5/a1#child_deduction_band_lower_agi
        - us-nc:statutes/105/105-153.5/a1#child_deduction_band_upper_agi
