format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_paths:
      - us-nc/statute/105/105-153.7
    upstream_source_check:
      status: composed_from_supplied_current_authority
      checked_paths:
        - us-nc/statute/105/105-153.7
      rationale: |-
        This pipeline computes the section 105-153.7 flat individual income tax
        on North Carolina taxable income for full-year resident tax units in tax
        year 2026, before credits. Section 105-153.7(a) imposes the tax on North
        Carolina taxable income. The caller supplies that completed-return state
        taxable income as the explicit upstream boundary; this module does not
        claim to reconstruct the federal and North Carolina adjustments,
        deductions, and filing-status rules that produce the boundary. The
        encoded us-nc/statutes/105/105-153/7 module supplies the operative 3.99
        per cent rate, which this pipeline imports instead of accepting from the
        caller. Credits remain outside this before-credit target. The pipeline
        adds no policy-bearing numeric literal of its own; zero is only the
        nonnegative taxable-income floor. Because subsection (a1) may change the
        rate beginning in 2027, both rules are bounded to tax year 2026.
  summary: |-
    Composed North Carolina individual income-tax pipeline for the 2026
    before-credit target. It accepts one TaxUnit-level completed-return North
    Carolina taxable-income boundary, floors it at zero, and applies the rate
    imported from the encoded section 105-153.7 module. It deliberately excludes
    all credits and makes no independent claim about the upstream federal and
    state adjustment chain. This narrow boundary is suitable for comparison
    with PolicyEngine's nc_taxable_income feeding
    nc_income_tax_before_credits for full-year resident tax units.
imports:
  - us-nc:statutes/105/105-153/7#individual_income_tax_rate
rules:
  - name: nc_pit_pilot_taxable_income
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: N.C. Gen. Stat. 105-153.7, supplied completed-return state taxable income floored at zero
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/statute/105/105-153.7
              excerpt: "A tax is imposed for each taxable year on the North Carolina taxable income of every individual"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          max(0, nc_pit_pilot_state_taxable_income)
  - name: nc_pit_pilot_income_tax_liability
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: N.C. Gen. Stat. 105-153.7(a), the 3.99 per cent flat tax on North Carolina taxable income before credits
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:statutes/105/105-153/7#individual_income_tax_rate
              output: individual_income_tax_rate
              hash: sha256:c0306fd55fd67ea700a1abdc65cdbfa473c781522aa15e9f4d2b4fecc2277e0d
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/statute/105/105-153.7
              excerpt: "the tax is a percentage of the taxpayer's North Carolina taxable income computed as follows"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          nc_pit_pilot_taxable_income * individual_income_tax_rate
