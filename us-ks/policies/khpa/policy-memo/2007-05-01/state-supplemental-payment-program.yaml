format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ks/guidance/khpa/policy-memo/2007-05-01/state-supplemental-payment-program
  summary: |-
    The Kansas State Supplemental Payment Program (SSPP) is a state-funded cash
    assistance program for persons living in a Medicaid-approved institution,
    implemented on 2007-05-01 and retroactively effective 2006-07-01. Eligibility
    requires "Residing in a Kansas institution"; "receiving a reduced SSI benefit
    based on residence in a Medicaid facility"; "Receiving Kansas Medicaid (full
    Medicaid benefits only)"; and "Be age 18 or over as of the month of payment."
    "Each individual determined eligible for SSPP will receive a $20.00 monthly
    cash benefit."
rules:
  - name: ks_sspp_monthly_payment
    kind: parameter
    dtype: Money
    period: Month
    unit: USD
    source: KHPA Policy Memo 2007-05-01, Section IV - State Supplemental Payment Program Benefits
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ks/guidance/khpa/policy-memo/2007-05-01/state-supplemental-payment-program/page-2
              excerpt: 'Each individual determined eligible for SSPP will receive a $20.00 monthly cash benefit.'
    versions:
      - effective_from: '2006-07-01'
        formula: |-
          20.00
  - name: ks_sspp_minimum_age
    kind: parameter
    dtype: Count
    period: Year
    source: KHPA Policy Memo 2007-05-01, Section III(4) - State Supplemental Payment Program Eligibility Criteria
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ks/guidance/khpa/policy-memo/2007-05-01/state-supplemental-payment-program/page-2
              excerpt: 'Be age 18 or over as of the month of payment'
    versions:
      - effective_from: '2006-07-01'
        formula: |-
          18
  - name: ks_sspp_eligible
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: KHPA Policy Memo 2007-05-01, Section III - State Supplemental Payment Program Eligibility Criteria
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ks/guidance/khpa/policy-memo/2007-05-01/state-supplemental-payment-program/page-2
              excerpt: '1. Residing in a Kansas institution 2. SSI Recipient Status. Specifically, receiving a reduced SSI benefit based on residence in a Medicaid facility. 3. Receiving Kansas Medicaid (full Medicaid benefits only) 4. Be age 18 or over as of the month of payment'
    versions:
      - effective_from: '2006-07-01'
        formula: |-
          resides_in_kansas_medicaid_institution
          and receives_reduced_ssi_for_institutional_residence
          and receives_kansas_full_medicaid
          and age >= ks_sspp_minimum_age
  - name: ks_sspp
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: USD
    source: KHPA Policy Memo 2007-05-01, Sections III-IV - State Supplemental Payment Program
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ks/guidance/khpa/policy-memo/2007-05-01/state-supplemental-payment-program/page-2
              excerpt: 'Each individual determined eligible for SSPP will receive a $20.00 monthly cash benefit. All eligibles will receive the same payment amount. The benefit will not be modified based on other income or resources.'
    versions:
      - effective_from: '2006-07-01'
        formula: |-
          if ks_sspp_eligible: ks_sspp_monthly_payment else: 0
