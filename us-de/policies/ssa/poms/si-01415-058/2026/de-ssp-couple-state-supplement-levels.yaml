      - us-de/regulation/admin-code/title16/dssm/13000/page-21
      rationale: Delaware Administrative Code Title 16 DSSM 13000 states that SSA
        determines eligibility for State Supplementary Payments for individuals residing
        in adult residential care arrangements. The Delaware POMS payment-level chart
        is the official current SSA parameter source for the 2026 federally administered
        Delaware SSP couple payment levels.
  summary: 'Delaware couple payment levels: Federal Code A / State OS Code A has FBR
    1491.00, State Supplement Level 448.00, Total Payment Level 1939.00. Federal Code
    A, B, and D with State OS Code Z have State Supplement Level 0.00; Federal Code
    D uses a 60.00 Title XIX institution payment cap.'
  deferred_outputs:
  - output: us-de:policies/ssa/poms/si-01415-058/2026/de-ssp-couple-state-supplement-levels#de_ssp
    reason: Generated rule used a local name that collides with a sibling RuleSpec
      export. This output is deferred until it can be encoded with a semantic branch-specific
      name without creating ambiguous sibling imports.
