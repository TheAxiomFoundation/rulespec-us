format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-de/guidance/ssa/poms/si-01415-058/delaware/block-1
  summary: "OS code \u201CA\u201D applies when the State documents residence in a\
    \ certified adult residential care facility, assisted living facility, or adult\
    \ foster care home. Code \u201CY\u201D applies when optional supplementation is\
    \ waived. Code \u201CZ\u201D applies to recipients not included in A or Y, or\
    \ to an \u201Cintervening\u201D Federal code \u201CA.\u201D"
rules:
- name: adult_residential_care_os_code_applies
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: POMS SI 01415.058, Delaware block 1, OS code A definition
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: definition
        source:
          corpus_citation_path: us-de/guidance/ssa/poms/si-01415-058/delaware/block-1
  versions:
  - effective_from: '2026-01-01'
    formula: 'state_documentation_received

      and recipient_is_resident_of_certified_adult_residential_care_facility'
- name: assisted_living_facility_os_code_applies
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: POMS SI 01415.058, Delaware block 1, OS code A definition
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: definition
        source:
          corpus_citation_path: us-de/guidance/ssa/poms/si-01415-058/delaware/block-1
  versions:
  - effective_from: '2026-01-01'
    formula: 'state_documentation_received

      and recipient_is_resident_of_certified_assisted_living_facility'
- name: adult_foster_care_home_os_code_applies
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: POMS SI 01415.058, Delaware block 1, OS code A definition
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: definition
        source:
          corpus_citation_path: us-de/guidance/ssa/poms/si-01415-058/delaware/block-1
  versions:
  - effective_from: '2026-01-01'
    formula: 'state_documentation_received

      and recipient_is_resident_of_certified_adult_foster_care_home'
- name: os_code_a_applies
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: POMS SI 01415.058, Delaware block 1, OS code A definition
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-de/guidance/ssa/poms/si-01415-058/delaware/block-1
  versions:
  - effective_from: '2026-01-01'
    formula: 'adult_residential_care_os_code_applies

      or assisted_living_facility_os_code_applies

      or adult_foster_care_home_os_code_applies'
- name: no_supplement_os_code_applies
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: POMS SI 01415.058, Delaware block 1, OS code Z definition
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: default
        source:
          corpus_citation_path: us-de/guidance/ssa/poms/si-01415-058/delaware/block-1
  versions:
  - effective_from: '2026-01-01'
    formula: "recipient_is_intervening_federal_code_a\nor (\n  not os_code_a_applies\n\
      \  and not optional_supplement_waived_os_code_applies\n)"
- name: de_ssp_living_arrangement
  kind: derived
  entity: Person
  dtype: String
  period: Month
  source: POMS SI 01415.058, Delaware block 1, OS code definitions
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-de/guidance/ssa/poms/si-01415-058/delaware/block-1
  versions:
  - effective_from: '2026-01-01'
    formula: 'if no_supplement_os_code_applies: "Z" else: if os_code_a_applies: "A"
      else: if optional_supplement_waived_os_code_applies: "Y" else: "Z"'
imports:
