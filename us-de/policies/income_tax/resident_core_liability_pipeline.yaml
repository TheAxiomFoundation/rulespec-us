format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_paths:
      - us-de/statute/30/1102
      - us-de/statute/30/1108
      - us-de/statute/30/1109
      - us-de/statute/30/1110
      - us-de/statute/30/1114
      - us-de/statute/30/1117
    upstream_source_check:
      status: checked_higher_authority
      checked_paths:
        - us-de/statute/30/1102
        - us-de/statute/30/1108
        - us-de/statute/30/1109
        - us-de/statute/30/1110
        - us-de/statute/30/1114
        - us-de/statute/30/1117
      rationale: |-
        The pinned official Delaware Code Chapter 11 document supplies the
        tax-year-2026 resident base, additions, subtractions, standard
        deduction, rate schedule, and credit formulas encoded here. The
        provision records are coarse: the recovered official document contains
        sections 1105 through 1118 under citation paths whose leaf records do
        not always isolate each subsection. Proof atoms therefore cite the
        available provision paths but match exact subsection excerpts from that
        recovered official document.

        This module composes the supported rules from federal adjusted gross
        income and raw taxpayer facts, except for three explicitly named
        completed partial boundaries: the taxpayer's section 1634 fiduciary
        adjustment, the section 1122 sourced taxable income for one other
        jurisdiction, and the section 1106(b)(2) low-income exclusion trigger.
        It does not accept completed Delaware adjusted gross income, taxable
        income, deductions, credits, rates, schedule tax, or final tax.

        The pinned corpus does not contain a tax-year-2026 final resident
        return, instructions, Director-prescribed section 1102(d) tax tables,
        or the administrative material needed to establish annual-return
        ordering across all credits. It also does not contain the current
        Chapter 18 historic-rehabilitation calculation. The module therefore
        exposes the exact subsection 1102(a)(14) schedule amount and separate
        credit branches, but does not claim the prescribed-table tax, combined
        tax after credits, or final liability.
  summary: |-
    Tax-year-2026 Delaware full-year resident personal-income-tax core for one
    non-joint resident individual who elects the standard deduction, uses no
    separate-spouse mechanics, has no section 1102(b) lump-sum distribution,
    supplies nonnegative raw category amounts, and has exactly zero in each
    explicitly held section 1106 category. Within that fail-closed profile, it
    starts with federal adjusted gross income, computes source-supported
    additions and subtractions, applies the 2026 federal-depreciation
    decoupling adjustment, computes profile-candidate adjusted gross income,
    standard deduction, taxable income, and section 1102(a)(14) schedule tax.

    The module also computes separately capped personal, one-other-jurisdiction,
    and child/dependent-care credit candidates only when the supported profile
    holds and the schedule method definitely controls. Each remains a candidate
    because the pinned sources do not establish complete annual-return credit
    ordering. Section 1102(d) makes the table method definite through $20,000,
    permits a Director-set ceiling above $20,000 through $60,000, and makes the
    schedule definite only above $60,000. Because the 2026 Director ceiling and
    tables are absent, the module exposes three mutually exclusive statuses and
    never caps credits against a schedule amount in the uncertain range.

    The section 1106 low-income age/disability exclusion, pension and retirement
    exclusions, NOL-carryback addback, DE529 subtraction, and ABLE subtraction
    are also deferred because their dollar limits are present in the recovered
    official document but not grounded in a separately addressable pinned
    RuleSpec source fragment. Section 1634 fiduciary allocation, section 1122
    sourcing, and the low-income exclusion trigger are caller-completed partial
    boundaries rather than raw computations. Joint and separate-spouse return
    selection, itemized deductions, section 1102(b) lump-sum tax, the
    historic-rehabilitation credit, prescribed-table rounding, combined credit
    ordering, payments, penalties, and final liability remain deferred.
  deferred_outputs:
    - output: us-de:policies/income_tax/resident_core_liability_pipeline#de_pit_2026_complete_adjusted_gross_income
      reason: |-
        The recovered official document contains the controlling dollar limits
        for the NOL-carryback, low-income age/disability, retirement, DE529,
        and ABLE modifications, but those values are not grounded in separately
        addressable pinned RuleSpec source fragments. The encoded adjusted
        gross income is therefore valid only when the supported-profile status
        holds.
      source_values:
        - us-de:policies/income_tax/resident_core_liability_pipeline#de_pit_2026_supported_profile_applies
        - us-de:policies/income_tax/resident_core_liability_pipeline#de_pit_2026_profile_candidate_adjusted_gross_income
    - output: us-de:policies/income_tax/resident_core_liability_pipeline#de_pit_2026_itemized_deduction
      reason: |-
        The pinned source does not supply the tax-year-2026 final instructions
        or annual state employee mileage allowance needed to complete section
        1109 itemized deductions and their return placement.
      source_values:
        - us-de:policies/income_tax/resident_core_liability_pipeline#de_pit_2026_profile_candidate_adjusted_gross_income
    - output: us-de:policies/income_tax/resident_core_liability_pipeline#de_pit_2026_section_1102_b_lump_sum_distribution_tax
      reason: |-
        Section 1102(b) imposes a separate tax on the ordinary-income portion
        of a lump-sum distribution. The bounded profile excludes taxpayers with
        such a distribution and does not calculate that separate tax.
      source_values:
        - us-de:policies/income_tax/resident_core_liability_pipeline#de_pit_2026_supported_profile_applies
    - output: us-de:policies/income_tax/resident_core_liability_pipeline#de_pit_2026_income_tax_before_credits
      reason: |-
        Section 1102(d) substitutes Director-prescribed tables through a
        Director-set ceiling that must be at least $20,000 and no more than
        $60,000. The pinned corpus supplies neither the 2026 tables nor that
        annual ceiling.
      source_values:
        - us-de:policies/income_tax/resident_core_liability_pipeline#de_pit_2026_profile_candidate_taxable_income
        - us-de:policies/income_tax/resident_core_liability_pipeline#de_pit_2026_profile_candidate_schedule_tax
        - us-de:policies/income_tax/resident_core_liability_pipeline#de_pit_2026_definite_tax_table_method_controls
        - us-de:policies/income_tax/resident_core_liability_pipeline#de_pit_2026_tax_method_uncertain_without_2026_director_ceiling
        - us-de:policies/income_tax/resident_core_liability_pipeline#de_pit_2026_definite_schedule_method_controls
    - output: us-de:policies/income_tax/resident_core_liability_pipeline#de_pit_2026_tax_after_nonrefundable_credits
      reason: |-
        Chapter 11 supplies individual credit formulas but the pinned corpus
        lacks the 2026 final-return ordering and the current Chapter 18
        historic-rehabilitation calculation.
      source_values:
        - us-de:policies/income_tax/resident_core_liability_pipeline#de_pit_2026_profile_candidate_schedule_tax
        - us-de:policies/income_tax/resident_core_liability_pipeline#de_pit_2026_definite_schedule_personal_credit_candidate
        - us-de:policies/income_tax/resident_core_liability_pipeline#de_pit_2026_definite_schedule_other_jurisdiction_credit_candidate
        - us-de:policies/income_tax/resident_core_liability_pipeline#de_pit_2026_definite_schedule_child_and_dependent_care_credit_candidate
    - output: us-de:policies/income_tax/resident_core_liability_pipeline#de_pit_2026_net_income_tax_liability
      reason: |-
        Final liability additionally requires the missing prescribed-table tax,
        joint/separate-spouse mechanics, complete itemized deductions, historic
        rehabilitation, earned-income, volunteer-service and organ-donation
        credit return mechanics, combined nonrefundable and refundable credit
        ordering, and the tax-year-2026 final-return instructions.
      source_values:
        - us-de:policies/income_tax/resident_core_liability_pipeline#de_pit_2026_profile_candidate_schedule_tax

imports:
  - us-de:statutes/30/1108#resident_individual_standard_deduction
  - us-de:statutes/30/1108#additional_standard_deduction_per_circumstance
  - us-de:statutes/30/1110#post_1995_personal_credit_amount
  - us-de:statutes/30/1114#child_and_dependent_care_credit_percentage

rules:
  - name: de_pit_2026_input_domain_is_valid
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: Fail-closed nonnegative-domain guard for unsigned raw and completed amount inputs
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source: {corpus_citation_path: us-de/statute/30/1102, excerpt: "the amount of taxable income"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          de_pit_2026_federal_nol_carryback_deduction >= 0
          and de_pit_2026_pension_retirement_or_military_income >= 0
          and de_pit_2026_de529_total_contributions >= 0
          and de_pit_2026_able_total_contributions >= 0
          and de_pit_2026_non_delaware_obligation_interest >= 0
          and de_pit_2026_ric_non_delaware_obligation_dividends >= 0
          and de_pit_2026_federal_percentage_depletion_deduction >= 0
          and de_pit_2026_us_obligation_interest >= 0
          and de_pit_2026_ric_us_obligation_dividends >= 0
          and de_pit_2026_taxable_social_security_and_railroad_retirement >= 0
          and de_pit_2026_section_280c_disallowed_wages >= 0
          and de_pit_2026_taxable_travelink_benefits >= 0
          and de_pit_2026_delaware_nol_carryforward >= 0
          and de_pit_2026_retirement_distribution_used_for_higher_education >= 0
          and de_pit_2026_delaware_income_tax_refund_in_federal_agi >= 0
          and de_pit_2026_federal_70301_expensing_deduction >= 0
          and de_pit_2026_pre_70301_depreciation_deduction >= 0
          and de_pit_2026_federal_70307_production_property_deduction >= 0
          and de_pit_2026_pre_70307_production_property_depreciation_deduction >= 0
          and de_pit_2026_federal_personal_exemption_count >= 0
          and de_pit_2026_income_tax_paid_to_other_jurisdiction >= 0
          and de_pit_2026_completed_section_1122_other_jurisdiction_taxable_income >= 0
          and de_pit_2026_federal_child_and_dependent_care_credit >= 0

  - name: de_pit_2026_supported_profile_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: Fail-closed status for the bounded full-year resident standard-deduction profile
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source: {corpus_citation_path: us-de/statute/30/1102, excerpt: "The entire taxable income of a resident of this State"}
          - path: versions[0].formula
            kind: condition
            source: {corpus_citation_path: us-de/statute/30/1108, excerpt: "The deduction of a resident individual shall be the standard deduction, unless the individual elects to itemize deductions"}
          - path: versions[0].formula
            kind: condition
            source: {corpus_citation_path: us-de/statute/30/1108, excerpt: "the standard deduction of a resident individual shall be $3,250, and the standard deduction of resident spouses shall be $6,500 if they file a joint return and $3,250 each if they file separate returns"}
          - path: versions[0].formula
            kind: exception
            source: {corpus_citation_path: us-de/statute/30/1114, excerpt: "spouses who file a joint federal return but who elect to determine their Delaware taxes separately"}
          - path: versions[0].formula
            kind: exception
            source: {corpus_citation_path: us-de/statute/30/1102, excerpt: "a separate tax in the amount determined in paragraph (b)(2) of this section, on the ordinary income portion of a lump sum distribution"}
          - path: versions[0].formula
            kind: exception
            source: {corpus_citation_path: us-de/statute/30/1102, excerpt: "Any deduction, to the extent such deduction exceeds $30,000, for a net operating loss carryback"}
          - path: versions[0].formula
            kind: exception
            source: {corpus_citation_path: us-de/statute/30/1102, excerpt: "The amount of $2,000 by any person who has a total and permanent disability or by a person who is over 60 years of age"}
          - path: versions[0].formula
            kind: exception
            source: {corpus_citation_path: us-de/statute/30/1102, excerpt: "For persons age 60 or older, amounts received, not to exceed $12,500, as pensions"}
          - path: versions[0].formula
            kind: exception
            source: {corpus_citation_path: us-de/statute/30/1102, excerpt: "contributed by an individual during the taxable year to 1 or more accounts established and maintained pursuant to the DE529 Education Savings Plan"}
          - path: versions[0].formula
            kind: exception
            source: {corpus_citation_path: us-de/statute/30/1102, excerpt: "contributed by an individual during the taxable year to 1 or more accounts established and maintained pursuant to the Delaware Achieving a Better Life Experience"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          de_pit_2026_input_domain_is_valid
          and de_pit_2026_is_full_year_resident
          and not de_pit_2026_is_joint_return
          and de_pit_2026_elects_standard_deduction
          and not de_pit_2026_uses_separate_spouse_mechanics
          and not de_pit_2026_has_section_1102_b_lump_sum_distribution
          and de_pit_2026_federal_nol_carryback_deduction == 0
          and not de_pit_2026_completed_low_income_age_or_disability_exclusion_trigger
          and de_pit_2026_pension_retirement_or_military_income == 0
          and de_pit_2026_de529_total_contributions == 0
          and de_pit_2026_able_total_contributions == 0

  - name: de_pit_2026_tax_table_income_ceiling
    kind: parameter
    dtype: Money
    period: Year
    unit: USD
    source: 30 Del. C. section 1102(d)(1)
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source: {corpus_citation_path: us-de/statute/30/1102, excerpt: "tax table income for the taxable year does not exceed $60,000"}
    versions:
      - {effective_from: '2026-01-01', effective_to: '2026-12-31', formula: '60000'}

  - name: de_pit_2026_minimum_director_tax_table_income_ceiling
    kind: parameter
    dtype: Money
    period: Year
    unit: USD
    source: 30 Del. C. section 1102(d)(1)
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source: {corpus_citation_path: us-de/statute/30/1102, excerpt: "but in any event not less than $20,000"}
    versions:
      - {effective_from: '2026-01-01', effective_to: '2026-12-31', formula: '20000'}

  - name: de_pit_2026_zero_bracket_ceiling
    kind: parameter
    dtype: Money
    period: Year
    unit: USD
    source: 30 Del. C. section 1102(a)(14)
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source: {corpus_citation_path: us-de/statute/30/1102, excerpt: "taxable income in excess of $2,000"}
    versions:
      - {effective_from: '2026-01-01', effective_to: '2026-12-31', formula: '2000'}

  - name: de_pit_2026_first_bracket_ceiling
    kind: parameter
    dtype: Money
    period: Year
    unit: USD
    source: 30 Del. C. section 1102(a)(14)
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source: {corpus_citation_path: us-de/statute/30/1102, excerpt: "not in excess of $5,000"}
    versions:
      - {effective_from: '2026-01-01', effective_to: '2026-12-31', formula: '5000'}

  - name: de_pit_2026_second_bracket_ceiling
    kind: parameter
    dtype: Money
    period: Year
    unit: USD
    source: 30 Del. C. section 1102(a)(14)
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source: {corpus_citation_path: us-de/statute/30/1102, excerpt: "not in excess of $10,000"}
    versions:
      - {effective_from: '2026-01-01', effective_to: '2026-12-31', formula: '10000'}

  - name: de_pit_2026_third_bracket_ceiling
    kind: parameter
    dtype: Money
    period: Year
    unit: USD
    source: 30 Del. C. section 1102(a)(14)
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source: {corpus_citation_path: us-de/statute/30/1102, excerpt: "not in excess of $20,000"}
    versions:
      - {effective_from: '2026-01-01', effective_to: '2026-12-31', formula: '20000'}

  - name: de_pit_2026_fourth_bracket_ceiling
    kind: parameter
    dtype: Money
    period: Year
    unit: USD
    source: 30 Del. C. section 1102(a)(14)
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source: {corpus_citation_path: us-de/statute/30/1102, excerpt: "not in excess of $25,000"}
    versions:
      - {effective_from: '2026-01-01', effective_to: '2026-12-31', formula: '25000'}

  - name: de_pit_2026_fifth_bracket_ceiling
    kind: parameter
    dtype: Money
    period: Year
    unit: USD
    source: 30 Del. C. section 1102(a)(14)
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source: {corpus_citation_path: us-de/statute/30/1102, excerpt: "not in excess of $60,000"}
    versions:
      - {effective_from: '2026-01-01', effective_to: '2026-12-31', formula: '60000'}

  - name: de_pit_2026_first_rate
    kind: parameter
    dtype: Rate
    period: Year
    source: 30 Del. C. section 1102(a)(14)
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source: {corpus_citation_path: us-de/statute/30/1102, excerpt: "2.2% of taxable income"}
    versions:
      - {effective_from: '2026-01-01', effective_to: '2026-12-31', formula: '0.022'}

  - name: de_pit_2026_second_rate
    kind: parameter
    dtype: Rate
    period: Year
