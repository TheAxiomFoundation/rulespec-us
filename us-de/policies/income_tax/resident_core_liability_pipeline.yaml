            kind: parameter
            source: {corpus_citation_path: us-de/statute/30/1102, excerpt: "6.6% of taxable income in excess of $60,000"}
    versions:
      - {effective_from: '2026-01-01', effective_to: '2026-12-31', formula: '0.066'}

  - name: de_pit_2026_profile_candidate_statutory_additions
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: USD
    source: 30 Del. C. section 1106(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-de/statute/30/1102, excerpt: "There shall be added to federal adjusted gross income"}
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-de/statute/30/1102, excerpt: "Interest qualifying under § 103 of the United States Internal Revenue Code of 1986"}
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-de/statute/30/1102, excerpt: "Dividends paid by a regulated investment company (sometimes referred to as a mutual fund)"}
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-de/statute/30/1102, excerpt: "deduction for depletion of oil and gas wells"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          max(0, de_pit_2026_non_delaware_obligation_interest)
          + max(0, de_pit_2026_ric_non_delaware_obligation_dividends)
          + max(0, de_pit_2026_federal_percentage_depletion_deduction)

  - name: de_pit_2026_profile_candidate_other_statutory_subtractions
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: USD
    source: 30 Del. C. section 1106(b), excluding the low-income exclusion
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-de/statute/30/1102, excerpt: "There shall be subtracted from federal adjusted gross income"}
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-de/statute/30/1102, excerpt: "Interest on obligations of the United States and its territories and possessions"}
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-de/statute/30/1102, excerpt: "dividends are attributable to interest paid on obligations of the United States and its territories and possessions"}
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-de/statute/30/1102, excerpt: "Social Security benefits paid by the United States and all payments received under the Railroad Retirement Act of 1974"}
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-de/statute/30/1102, excerpt: "portion of the wages paid or incurred for the taxable year which is disallowed as a deduction for federal tax purposes under § 280C"}
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-de/statute/30/1102, excerpt: "Benefits received by a resident individual through participation in a travelink program certified by the Delaware Department of Transportation"}
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-de/statute/30/1102, excerpt: "carry forward losses which were carried back in calculating federal taxable income but which were prevented from being carried back"}
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-de/statute/30/1102, excerpt: "Distributions received from qualified retirement plans as defined in § 4974 of the Internal Revenue Code"}
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-de/statute/30/1102, excerpt: "refund of Delaware State income taxes imposed under this chapter, to the extent included in federal adjusted gross income"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          max(0, de_pit_2026_us_obligation_interest)
          + max(0, de_pit_2026_ric_us_obligation_dividends)
          + max(0, de_pit_2026_taxable_social_security_and_railroad_retirement)
          + max(0, de_pit_2026_section_280c_disallowed_wages)
          + max(0, de_pit_2026_taxable_travelink_benefits)
          + max(0, de_pit_2026_delaware_nol_carryforward)
          + max(0, de_pit_2026_retirement_distribution_used_for_higher_education)
          + max(0, de_pit_2026_delaware_income_tax_refund_in_federal_agi)

  - name: de_pit_2026_profile_candidate_statutory_subtractions
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: USD
    source: 30 Del. C. section 1106(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-de/statute/30/1102, excerpt: "There shall be subtracted from federal adjusted gross income"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          de_pit_2026_profile_candidate_other_statutory_subtractions

  - name: de_pit_2026_profile_candidate_adjusted_gross_income
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: USD
    source: 30 Del. C. sections 1105 and 1106
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-de/statute/30/1102, excerpt: "federal adjusted gross income as defined in the laws of the United States as the same are or shall become effective for any taxable year with the modifications"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          de_pit_2026_federal_adjusted_gross_income
          + de_pit_2026_profile_candidate_statutory_additions
          - de_pit_2026_profile_candidate_statutory_subtractions
          + de_pit_2026_completed_section_1634_fiduciary_adjustment

  - name: de_pit_2026_federal_depreciation_decoupling_adjustment
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: USD
    source: 30 Del. C. section 1106(d), property placed in service during 2026-2030
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-de/statute/30/1102, excerpt: "to continue the amortization and depreciation of such property under the United States Internal Revenue Code provisions in effect immediately before"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          de_pit_2026_federal_70301_expensing_deduction
          - de_pit_2026_pre_70301_depreciation_deduction
          + de_pit_2026_federal_70307_production_property_deduction
          - de_pit_2026_pre_70307_production_property_depreciation_deduction

  - name: de_pit_2026_profile_candidate_standard_deduction
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: USD
    source: 30 Del. C. section 1108(a)-(b), one non-joint resident individual
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-de/statute/30/1108, excerpt: "shall be added to the standard deduction determined under subsection (a)"}
          - path: versions[0].formula
            kind: condition
            source: {corpus_citation_path: us-de/statute/30/1108, excerpt: "attained the age of 65 before the close of the taxable year"}
          - path: versions[0].formula
            kind: condition
            source: {corpus_citation_path: us-de/statute/30/1108, excerpt: "blind at the close of the taxable year"}
          - path: versions[0].formula
            kind: import
            import: {target: us-de:statutes/30/1108#resident_individual_standard_deduction, output: resident_individual_standard_deduction, hash: sha256:efe1da8c17954115ee7698e477c2589f7cdf8dda4c174f4a239cb17dcca7fba2}
          - path: versions[0].formula
            kind: import
            import: {target: us-de:statutes/30/1108#additional_standard_deduction_per_circumstance, output: additional_standard_deduction_per_circumstance, hash: sha256:efe1da8c17954115ee7698e477c2589f7cdf8dda4c174f4a239cb17dcca7fba2}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          resident_individual_standard_deduction
          + additional_standard_deduction_per_circumstance
            * (
              (if de_pit_2026_resident_attained_age_65_before_year_end: 1 else: 0)
              + (if de_pit_2026_resident_is_blind: 1 else: 0)
            )

  - name: de_pit_2026_profile_candidate_income_before_nonnegative_tax_base
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: USD
    source: 30 Del. C. sections 1105-1108, bounded standard-deduction branch
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-de/statute/30/1102, excerpt: "with the modifications and less the deductions and personal exemptions provided in this subchapter"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          de_pit_2026_profile_candidate_adjusted_gross_income
          - de_pit_2026_profile_candidate_standard_deduction
          + de_pit_2026_federal_depreciation_decoupling_adjustment

  - name: de_pit_2026_profile_candidate_taxable_income
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: USD
    source: Nonnegative base for the section 1102 rate schedule
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-de/statute/30/1102, excerpt: "the amount of taxable income"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: max(0, de_pit_2026_profile_candidate_income_before_nonnegative_tax_base)

  - name: de_pit_2026_profile_candidate_schedule_tax
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: USD
    source: 30 Del. C. section 1102(a)(14), before table substitution and credits
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-de/statute/30/1102, excerpt: "For taxable years beginning after December 31, 2013, the amount of tax shall be determined as follows"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          de_pit_2026_first_rate * min(max(0, de_pit_2026_profile_candidate_taxable_income - de_pit_2026_zero_bracket_ceiling), de_pit_2026_first_bracket_ceiling - de_pit_2026_zero_bracket_ceiling)
          + de_pit_2026_second_rate * min(max(0, de_pit_2026_profile_candidate_taxable_income - de_pit_2026_first_bracket_ceiling), de_pit_2026_second_bracket_ceiling - de_pit_2026_first_bracket_ceiling)
          + de_pit_2026_third_rate * min(max(0, de_pit_2026_profile_candidate_taxable_income - de_pit_2026_second_bracket_ceiling), de_pit_2026_third_bracket_ceiling - de_pit_2026_second_bracket_ceiling)
          + de_pit_2026_fourth_rate * min(max(0, de_pit_2026_profile_candidate_taxable_income - de_pit_2026_third_bracket_ceiling), de_pit_2026_fourth_bracket_ceiling - de_pit_2026_third_bracket_ceiling)
          + de_pit_2026_fifth_rate * min(max(0, de_pit_2026_profile_candidate_taxable_income - de_pit_2026_fourth_bracket_ceiling), de_pit_2026_fifth_bracket_ceiling - de_pit_2026_fourth_bracket_ceiling)
          + de_pit_2026_top_rate * max(0, de_pit_2026_profile_candidate_taxable_income - de_pit_2026_fifth_bracket_ceiling)

  - name: de_pit_2026_definite_tax_table_method_controls
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 30 Del. C. section 1102(d), Director ceiling statutory floor
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source: {corpus_citation_path: us-de/statute/30/1102, excerpt: "but in any event not less than $20,000"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          de_pit_2026_supported_profile_applies
          and de_pit_2026_profile_candidate_taxable_income
            <= de_pit_2026_minimum_director_tax_table_income_ceiling

  - name: de_pit_2026_tax_method_uncertain_without_2026_director_ceiling
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 30 Del. C. section 1102(d), annual Director ceiling absent
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source: {corpus_citation_path: us-de/statute/30/1102, excerpt: "does not exceed $60,000, or such lesser amount as the Director may determine but in any event not less than $20,000"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          de_pit_2026_supported_profile_applies
          and de_pit_2026_profile_candidate_taxable_income
            > de_pit_2026_minimum_director_tax_table_income_ceiling
          and de_pit_2026_profile_candidate_taxable_income
            <= de_pit_2026_tax_table_income_ceiling

  - name: de_pit_2026_definite_schedule_method_controls
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 30 Del. C. section 1102(d), above maximum possible table ceiling
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source: {corpus_citation_path: us-de/statute/30/1102, excerpt: "whose tax table income for the taxable year does not exceed $60,000"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          de_pit_2026_supported_profile_applies
          and de_pit_2026_profile_candidate_taxable_income
            > de_pit_2026_tax_table_income_ceiling

  - name: de_pit_2026_definite_schedule_personal_credit_candidate
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: USD
    source: 30 Del. C. section 1110(b)-(c), definite-schedule-only candidate
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-de/statute/30/1110, excerpt: "In no event shall the credit allowed under subsection (b) of this section exceed the tax otherwise due"}
          - path: versions[0].formula
            kind: amount
            source: {corpus_citation_path: us-de/statute/30/1110, excerpt: "$110 for each personal exemption to which such individual is entitled"}
          - path: versions[0].formula
            kind: condition
            source: {corpus_citation_path: us-de/statute/30/1110, excerpt: "An additional $110 in the case of each resident person age 60 or over"}
          - path: versions[0].formula
            kind: import
            import: {target: us-de:statutes/30/1110#post_1995_personal_credit_amount, output: post_1995_personal_credit_amount, hash: sha256:a19ee5a14062e5f015026010b53d1714a3986e028f6681b09029f7f094c0d94b}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if de_pit_2026_definite_schedule_method_controls:
            min(
              de_pit_2026_profile_candidate_schedule_tax,
              post_1995_personal_credit_amount
              * (
                de_pit_2026_federal_personal_exemption_count
                + (if de_pit_2026_resident_is_age_60_or_older: 1 else: 0)
              )
            )
          else:
            0

  - name: de_pit_2026_definite_schedule_other_jurisdiction_credit_candidate
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: USD
    source: 30 Del. C. section 1111, definite-schedule-only one-jurisdiction candidate
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-de/statute/30/1110, excerpt: "A resident individual shall be allowed a credit against the tax otherwise due under this chapter"}
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-de/statute/30/1110, excerpt: "shall not exceed the amount computed by multiplying the tax otherwise due under this chapter by a fraction"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if de_pit_2026_definite_schedule_method_controls:
            min(
              max(0, de_pit_2026_income_tax_paid_to_other_jurisdiction),
              de_pit_2026_profile_candidate_schedule_tax
              * min(
                1,
                max(0, de_pit_2026_completed_section_1122_other_jurisdiction_taxable_income)
                / max(0, de_pit_2026_profile_candidate_taxable_income)
              )
            )
          else:
            0

  - name: de_pit_2026_definite_schedule_child_and_dependent_care_credit_candidate
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: USD
    source: 30 Del. C. section 1114(a), definite-schedule-only candidate
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-de/statute/30/1114, excerpt: "50 percent of the child and dependent care expense credit allowable for federal income tax purposes"}
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-de/statute/30/1114, excerpt: "In no event shall the allowable credit under this subsection exceed the tax otherwise due"}
          - path: versions[0].formula
            kind: import
            import: {target: us-de:statutes/30/1114#child_and_dependent_care_credit_percentage, output: child_and_dependent_care_credit_percentage, hash: sha256:793cd5eed73c53ad5d2e0754881024261101031b2164b4b5cdf13e6e7b5390e1}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if de_pit_2026_definite_schedule_method_controls:
            min(
              de_pit_2026_profile_candidate_schedule_tax,
              child_and_dependent_care_credit_percentage
              * de_pit_2026_federal_child_and_dependent_care_credit
            )
          else:
            0

inputs:
  - {name: de_pit_2026_federal_adjusted_gross_income, entity: Person, dtype: Money, period: Year, unit: USD, description: Federal adjusted gross income for the bounded resident individual.}
  - {name: de_pit_2026_is_full_year_resident, entity: Person, dtype: Judgment, period: Year, description: Whether the individual was a Delaware resident for the full taxable year.}
  - {name: de_pit_2026_is_joint_return, entity: Person, dtype: Judgment, period: Year, description: Whether the taxpayer files a joint return; true is outside this one-individual profile.}
  - {name: de_pit_2026_elects_standard_deduction, entity: Person, dtype: Judgment, period: Year, description: Whether the taxpayer uses the section 1108 standard deduction rather than electing itemized deductions.}
  - {name: de_pit_2026_uses_separate_spouse_mechanics, entity: Person, dtype: Judgment, period: Year, description: Whether separate-spouse allocation or separate Delaware tax mechanics are required; true is outside this profile.}
  - {name: de_pit_2026_has_section_1102_b_lump_sum_distribution, entity: Person, dtype: Judgment, period: Year, description: Whether section 1102(b) imposes a separate lump-sum-distribution tax; true is outside this profile.}
  - {name: de_pit_2026_federal_nol_carryback_deduction, entity: Person, dtype: Money, period: Year, unit: USD, description: Raw federal NOL carryback deduction; any positive amount places the taxpayer outside the supported modification profile.}
  - {name: de_pit_2026_completed_low_income_age_or_disability_exclusion_trigger, entity: Person, dtype: Judgment, period: Year, description: Caller-completed section 1106(b)(2) eligibility trigger after applying age or disability earned-income and adjusted-gross-income tests; true is outside this profile.}
  - {name: de_pit_2026_pension_retirement_or_military_income, entity: Person, dtype: Money, period: Year, unit: USD, description: Raw pension retirement or military-pension income; any positive amount places the taxpayer outside the supported modification profile.}
  - {name: de_pit_2026_de529_total_contributions, entity: Person, dtype: Money, period: Year, unit: USD, description: Raw current-year DE529 contributions; any positive amount places the taxpayer outside the supported modification profile.}
  - {name: de_pit_2026_able_total_contributions, entity: Person, dtype: Money, period: Year, unit: USD, description: Raw current-year Delaware ABLE contributions; any positive amount places the taxpayer outside the supported modification profile.}
  - {name: de_pit_2026_resident_is_age_60_or_older, entity: Person, dtype: Judgment, period: Year, description: Whether the resident is age 60 or older for the retirement subtraction and personal credit.}
  - {name: de_pit_2026_resident_attained_age_65_before_year_end, entity: Person, dtype: Judgment, period: Year, description: Whether the resident attained age 65 before the close of tax year 2026.}
  - {name: de_pit_2026_resident_is_blind, entity: Person, dtype: Judgment, period: Year, description: Whether the resident meets the section 1108(c) blindness test.}
  - {name: de_pit_2026_non_delaware_obligation_interest, entity: Person, dtype: Money, period: Year, unit: USD, description: Section 103 interest other than obligations of Delaware and its subdivisions or authorities.}
  - {name: de_pit_2026_ric_non_delaware_obligation_dividends, entity: Person, dtype: Money, period: Year, unit: USD, description: RIC dividends attributable to non-Delaware tax-exempt obligations.}
  - {name: de_pit_2026_federal_percentage_depletion_deduction, entity: Person, dtype: Money, period: Year, unit: USD, description: Federal oil-and-gas percentage depletion deduction under section 613.}
  - {name: de_pit_2026_us_obligation_interest, entity: Person, dtype: Money, period: Year, unit: USD, description: Federally included interest on qualifying United States obligations exempt from state tax.}
  - {name: de_pit_2026_ric_us_obligation_dividends, entity: Person, dtype: Money, period: Year, unit: USD, description: RIC dividends reported as attributable to qualifying United States obligation interest.}
  - {name: de_pit_2026_taxable_social_security_and_railroad_retirement, entity: Person, dtype: Money, period: Year, unit: USD, description: Social Security and Railroad Retirement benefits included in federal adjusted gross income.}
  - {name: de_pit_2026_section_280c_disallowed_wages, entity: Person, dtype: Money, period: Year, unit: USD, description: Wages disallowed federally under section 280C for the new-jobs credit.}
  - {name: de_pit_2026_taxable_travelink_benefits, entity: Person, dtype: Money, period: Year, unit: USD, description: Certified travelink benefits included in federal adjusted gross income.}
  - {name: de_pit_2026_delaware_nol_carryforward, entity: Person, dtype: Money, period: Year, unit: USD, description: Delaware loss carryforward associated with a carryback prevented by section 1106(a)(3).}
  - {name: de_pit_2026_retirement_distribution_used_for_higher_education, entity: Person, dtype: Money, period: Year, unit: USD, description: Federally included qualifying retirement distribution applied during the year to eligible higher-education costs.}
  - {name: de_pit_2026_delaware_income_tax_refund_in_federal_agi, entity: Person, dtype: Money, period: Year, unit: USD, description: Delaware income-tax refund included in federal adjusted gross income.}
  - {name: de_pit_2026_completed_section_1634_fiduciary_adjustment, entity: Person, dtype: Money, period: Year, unit: USD, description: Caller-completed signed taxpayer share of the section 1634 fiduciary adjustment; this module does not derive fiduciary allocation.}
  - {name: de_pit_2026_federal_70301_expensing_deduction, entity: Person, dtype: Money, period: Year, unit: USD, description: Federal deduction under P.L. 119-21 section 70301 for covered property placed in service during 2026.}
  - {name: de_pit_2026_pre_70301_depreciation_deduction, entity: Person, dtype: Money, period: Year, unit: USD, description: Depreciation or amortization for the same property under federal law immediately before P.L. 119-21.}
  - {name: de_pit_2026_federal_70307_production_property_deduction, entity: Person, dtype: Money, period: Year, unit: USD, description: Federal deduction under P.L. 119-21 section 70307 for covered qualified production property.}
  - {name: de_pit_2026_pre_70307_production_property_depreciation_deduction, entity: Person, dtype: Money, period: Year, unit: USD, description: Depreciation or amortization for the same production property under prior federal law.}
  - {name: de_pit_2026_federal_personal_exemption_count, entity: Person, dtype: Count, period: Year, description: Personal exemptions to which the individual is entitled for federal income-tax purposes.}
  - {name: de_pit_2026_income_tax_paid_to_other_jurisdiction, entity: Person, dtype: Money, period: Year, unit: USD, description: Income tax imposed for 2026 by one other state or the District of Columbia on income also taxed by Delaware.}
  - {name: de_pit_2026_completed_section_1122_other_jurisdiction_taxable_income, entity: Person, dtype: Money, period: Year, unit: USD, description: Caller-completed Delaware taxable income sourced to one other jurisdiction after applying section 1122; this module does not derive sourcing.}
  - {name: de_pit_2026_federal_child_and_dependent_care_credit, entity: Person, dtype: Money, period: Year, unit: USD, description: Federal child and dependent care expense credit allowable for 2026.}
