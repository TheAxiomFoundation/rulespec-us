    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source: {corpus_citation_path: us-de/statute/30/1102, excerpt: "3.9% of taxable income"}
    versions:
      - {effective_from: '2026-01-01', effective_to: '2026-12-31', formula: '0.039'}

  - name: de_pit_2026_third_rate
    kind: parameter
    dtype: Rate
    period: Year
    source: 30 Del. C. section 1102(a)(14)
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source: {corpus_citation_path: us-de/statute/30/1102, excerpt: "4.8% of taxable income"}
    versions:
      - {effective_from: '2026-01-01', effective_to: '2026-12-31', formula: '0.048'}

  - name: de_pit_2026_fourth_rate
    kind: parameter
    dtype: Rate
    period: Year
    source: 30 Del. C. section 1102(a)(14)
    metadata:
      private: true
