format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_paths:
      - us-de/statute/30/1102
      - us-de/statute/30/1108
      - us-de/statute/30/1109
      - us-de/statute/30/1110
      - us-de/statute/30/1114
      - us-de/statute/30/1117
    upstream_source_check:
      status: checked_higher_authority
      checked_paths:
        - us-de/statute/30/1102
        - us-de/statute/30/1108
        - us-de/statute/30/1109
        - us-de/statute/30/1110
        - us-de/statute/30/1114
        - us-de/statute/30/1117
      rationale: |-
        The pinned official Delaware Code Chapter 11 source supplies the
        tax-year-2026 resident base, additions, subtractions, standard
        deduction, rate schedule, and the credit formulas encoded here. This
        module composes those rules from federal adjusted gross income,
        explicitly named federal outputs, and raw taxpayer facts. It does not
        accept completed Delaware adjusted gross income, taxable income,
        deductions, credits, rates, or tax as caller inputs.

        The pinned corpus does not contain a tax-year-2026 final resident
        return, instructions, Director-prescribed section 1102(d) tax tables,
        or the administrative material needed to establish annual-return
        ordering across all credits. It also does not contain the current
        Chapter 18 historic-rehabilitation calculation. The module therefore
        exposes the exact subsection 1102(a)(14) schedule amount and separate
        credit branches, but does not claim the prescribed-table tax, combined
        tax after credits, or final liability.
  summary: |-
    Tax-year-2026 Delaware full-year resident personal-income-tax core for one
    non-joint resident individual using the standard deduction and having none
    of the section 1106 modification categories whose controlling dollar limits
    are not grounded in a separately encoded pinned source module. Within that
    disclosed profile, it starts with federal adjusted gross income, computes
    the source-supported additions and subtractions from raw facts, applies the
    2026 federal-depreciation decoupling adjustment, computes the individual
    standard deduction and taxable-income candidate, and applies the section
    1102(a)(14) schedule.

    The module also computes source-supported personal, one-other-jurisdiction,
    child/dependent-care credit branches. Each branch is calculated separately
    because the pinned sources do not establish their complete annual-return
    ordering. For taxable income at or below $60,000, section 1102(d) requires
    a Director-prescribed table that is absent from the pinned corpus; the
    schedule amount remains visible for audit but is not represented as tax
    before credits.

    The section 1106 low-income age/disability exclusion, pension and retirement
    exclusions, NOL-carryback addback, DE529 subtraction, and ABLE subtraction
    are also deferred because their dollar limits are present in the recovered
    official document but not grounded in a separately addressable pinned
    RuleSpec source fragment. Joint and separate-spouse return selection,
    itemized deductions, the historic-rehabilitation credit, prescribed-table
    rounding, combined credit ordering, payments, penalties, and final
    liability remain deferred.
  deferred_outputs:
    - output: us-de:policies/income_tax/resident_core_liability_pipeline#de_pit_2026_complete_adjusted_gross_income
      reason: |-
        The recovered official document contains the controlling dollar limits
        for the NOL-carryback, low-income age/disability, retirement, DE529,
        and ABLE modifications, but those values are not grounded in separately
        addressable pinned RuleSpec source fragments. The encoded adjusted
        gross income is therefore valid only when the supported-profile status
        holds.
      source_values:
        - us-de:policies/income_tax/resident_core_liability_pipeline#de_pit_2026_supported_modification_profile_applies
        - us-de:policies/income_tax/resident_core_liability_pipeline#de_pit_2026_adjusted_gross_income
    - output: us-de:policies/income_tax/resident_core_liability_pipeline#de_pit_2026_itemized_deduction
      reason: |-
        The pinned source does not supply the tax-year-2026 final instructions
        or annual state employee mileage allowance needed to complete section
        1109 itemized deductions and their return placement.
      source_values:
        - us-de:policies/income_tax/resident_core_liability_pipeline#de_pit_2026_adjusted_gross_income
    - output: us-de:policies/income_tax/resident_core_liability_pipeline#de_pit_2026_income_tax_before_credits
      reason: |-
        Section 1102(d) substitutes Director-prescribed tables when tax-table
        income does not exceed the applicable ceiling. The pinned corpus
        supplies neither the 2026 tables nor a lower Director-set ceiling.
      source_values:
        - us-de:policies/income_tax/resident_core_liability_pipeline#de_pit_2026_taxable_income
        - us-de:policies/income_tax/resident_core_liability_pipeline#de_pit_2026_schedule_tax
        - us-de:policies/income_tax/resident_core_liability_pipeline#de_pit_2026_tax_table_method_applies
    - output: us-de:policies/income_tax/resident_core_liability_pipeline#de_pit_2026_tax_after_nonrefundable_credits
      reason: |-
        Chapter 11 supplies individual credit formulas but the pinned corpus
        lacks the 2026 final-return ordering and the current Chapter 18
        historic-rehabilitation calculation.
      source_values:
        - us-de:policies/income_tax/resident_core_liability_pipeline#de_pit_2026_schedule_tax
        - us-de:policies/income_tax/resident_core_liability_pipeline#de_pit_2026_personal_credit
        - us-de:policies/income_tax/resident_core_liability_pipeline#de_pit_2026_other_jurisdiction_credit
        - us-de:policies/income_tax/resident_core_liability_pipeline#de_pit_2026_child_and_dependent_care_credit
    - output: us-de:policies/income_tax/resident_core_liability_pipeline#de_pit_2026_net_income_tax_liability
      reason: |-
        Final liability additionally requires the missing prescribed-table tax,
        joint/separate-spouse mechanics, complete itemized deductions, historic
        rehabilitation, earned-income, volunteer-service and organ-donation
        credit return mechanics, combined nonrefundable and refundable credit
        ordering, and the tax-year-2026 final-return instructions.
      source_values:
        - us-de:policies/income_tax/resident_core_liability_pipeline#de_pit_2026_schedule_tax

imports:
  - us-de:statutes/30/1108#resident_individual_standard_deduction
  - us-de:statutes/30/1108#additional_standard_deduction_per_circumstance
  - us-de:statutes/30/1110#post_1995_personal_credit_amount
  - us-de:statutes/30/1114#child_and_dependent_care_credit_percentage

rules:
  - name: de_pit_2026_supported_modification_profile_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: Status for the section 1106 categories included in this bounded core
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source: {corpus_citation_path: us-de/statute/30/1102, excerpt: "There shall be added to federal adjusted gross income"}
          - path: versions[0].formula
            kind: exception
            source: {corpus_citation_path: us-de/statute/30/1102, excerpt: "There shall be subtracted from federal adjusted gross income"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          de_pit_2026_federal_nol_carryback_deduction <= 0
          and not de_pit_2026_potential_low_income_age_or_disability_exclusion
          and de_pit_2026_pension_retirement_or_military_income <= 0
          and de_pit_2026_de529_total_contributions <= 0
          and de_pit_2026_able_total_contributions <= 0

  - name: de_pit_2026_tax_table_income_ceiling
    kind: parameter
    dtype: Money
    period: Year
    unit: USD
    source: 30 Del. C. section 1102(d)(1)
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source: {corpus_citation_path: us-de/statute/30/1102, excerpt: "tax table income for the taxable year does not exceed $60,000"}
    versions:
      - {effective_from: '2026-01-01', effective_to: '2026-12-31', formula: '60000'}

  - name: de_pit_2026_zero_bracket_ceiling
    kind: parameter
    dtype: Money
    period: Year
    unit: USD
    source: 30 Del. C. section 1102(a)(14)
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source: {corpus_citation_path: us-de/statute/30/1102, excerpt: "taxable income in excess of $2,000"}
    versions:
      - {effective_from: '2026-01-01', effective_to: '2026-12-31', formula: '2000'}

  - name: de_pit_2026_first_bracket_ceiling
    kind: parameter
    dtype: Money
    period: Year
    unit: USD
    source: 30 Del. C. section 1102(a)(14)
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source: {corpus_citation_path: us-de/statute/30/1102, excerpt: "not in excess of $5,000"}
    versions:
      - {effective_from: '2026-01-01', effective_to: '2026-12-31', formula: '5000'}

  - name: de_pit_2026_second_bracket_ceiling
    kind: parameter
    dtype: Money
    period: Year
    unit: USD
    source: 30 Del. C. section 1102(a)(14)
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source: {corpus_citation_path: us-de/statute/30/1102, excerpt: "not in excess of $10,000"}
    versions:
      - {effective_from: '2026-01-01', effective_to: '2026-12-31', formula: '10000'}

  - name: de_pit_2026_third_bracket_ceiling
    kind: parameter
    dtype: Money
    period: Year
    unit: USD
    source: 30 Del. C. section 1102(a)(14)
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source: {corpus_citation_path: us-de/statute/30/1102, excerpt: "not in excess of $20,000"}
    versions:
      - {effective_from: '2026-01-01', effective_to: '2026-12-31', formula: '20000'}

  - name: de_pit_2026_fourth_bracket_ceiling
    kind: parameter
    dtype: Money
    period: Year
    unit: USD
    source: 30 Del. C. section 1102(a)(14)
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source: {corpus_citation_path: us-de/statute/30/1102, excerpt: "not in excess of $25,000"}
    versions:
      - {effective_from: '2026-01-01', effective_to: '2026-12-31', formula: '25000'}

  - name: de_pit_2026_fifth_bracket_ceiling
    kind: parameter
    dtype: Money
    period: Year
    unit: USD
    source: 30 Del. C. section 1102(a)(14)
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source: {corpus_citation_path: us-de/statute/30/1102, excerpt: "not in excess of $60,000"}
    versions:
      - {effective_from: '2026-01-01', effective_to: '2026-12-31', formula: '60000'}

  - name: de_pit_2026_first_rate
    kind: parameter
    dtype: Rate
    period: Year
    source: 30 Del. C. section 1102(a)(14)
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source: {corpus_citation_path: us-de/statute/30/1102, excerpt: "2.2% of taxable income"}
    versions:
      - {effective_from: '2026-01-01', effective_to: '2026-12-31', formula: '0.022'}

  - name: de_pit_2026_second_rate
    kind: parameter
    dtype: Rate
    period: Year
    source: 30 Del. C. section 1102(a)(14)
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source: {corpus_citation_path: us-de/statute/30/1102, excerpt: "3.9% of taxable income"}
    versions:
      - {effective_from: '2026-01-01', effective_to: '2026-12-31', formula: '0.039'}

  - name: de_pit_2026_third_rate
    kind: parameter
    dtype: Rate
    period: Year
    source: 30 Del. C. section 1102(a)(14)
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source: {corpus_citation_path: us-de/statute/30/1102, excerpt: "4.8% of taxable income"}
    versions:
      - {effective_from: '2026-01-01', effective_to: '2026-12-31', formula: '0.048'}

  - name: de_pit_2026_fourth_rate
    kind: parameter
    dtype: Rate
    period: Year
    source: 30 Del. C. section 1102(a)(14)
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source: {corpus_citation_path: us-de/statute/30/1102, excerpt: "5.2% of taxable income"}
    versions:
      - {effective_from: '2026-01-01', effective_to: '2026-12-31', formula: '0.052'}

  - name: de_pit_2026_fifth_rate
    kind: parameter
    dtype: Rate
    period: Year
    source: 30 Del. C. section 1102(a)(14)
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source: {corpus_citation_path: us-de/statute/30/1102, excerpt: "5.55% of taxable income"}
    versions:
      - {effective_from: '2026-01-01', effective_to: '2026-12-31', formula: '0.0555'}

  - name: de_pit_2026_top_rate
    kind: parameter
    dtype: Rate
    period: Year
    source: 30 Del. C. section 1102(a)(14)
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source: {corpus_citation_path: us-de/statute/30/1102, excerpt: "6.6% of taxable income in excess of $60,000"}
    versions:
      - {effective_from: '2026-01-01', effective_to: '2026-12-31', formula: '0.066'}

  - name: de_pit_2026_statutory_additions
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: USD
    source: 30 Del. C. section 1106(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-de/statute/30/1102, excerpt: "There shall be added to federal adjusted gross income"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          max(0, de_pit_2026_non_delaware_obligation_interest)
          + max(0, de_pit_2026_ric_non_delaware_obligation_dividends)
          + max(0, de_pit_2026_federal_percentage_depletion_deduction)

  - name: de_pit_2026_other_statutory_subtractions
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: USD
    source: 30 Del. C. section 1106(b), excluding the low-income exclusion
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-de/statute/30/1102, excerpt: "There shall be subtracted from federal adjusted gross income"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          max(0, de_pit_2026_us_obligation_interest)
          + max(0, de_pit_2026_ric_us_obligation_dividends)
          + max(0, de_pit_2026_taxable_social_security_and_railroad_retirement)
          + max(0, de_pit_2026_section_280c_disallowed_wages)
          + max(0, de_pit_2026_taxable_travelink_benefits)
          + max(0, de_pit_2026_delaware_nol_carryforward)
          + max(0, de_pit_2026_retirement_distribution_used_for_higher_education)
          + max(0, de_pit_2026_delaware_income_tax_refund_in_federal_agi)

  - name: de_pit_2026_statutory_subtractions
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: USD
    source: 30 Del. C. section 1106(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-de/statute/30/1102, excerpt: "There shall be subtracted from federal adjusted gross income"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          de_pit_2026_other_statutory_subtractions

  - name: de_pit_2026_adjusted_gross_income
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: USD
    source: 30 Del. C. sections 1105 and 1106
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-de/statute/30/1102, excerpt: "federal adjusted gross income as defined in the laws of the United States as the same are or shall become effective for any taxable year with the modifications"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          de_pit_2026_federal_adjusted_gross_income
          + de_pit_2026_statutory_additions
          - de_pit_2026_statutory_subtractions
          + de_pit_2026_fiduciary_adjustment

  - name: de_pit_2026_federal_depreciation_decoupling_adjustment
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: USD
    source: 30 Del. C. section 1106(d), property placed in service during 2026-2030
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-de/statute/30/1102, excerpt: "to continue the amortization and depreciation of such property under the United States Internal Revenue Code provisions in effect immediately before"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          de_pit_2026_federal_70301_expensing_deduction
          - de_pit_2026_pre_70301_depreciation_deduction
          + de_pit_2026_federal_70307_production_property_deduction
          - de_pit_2026_pre_70307_production_property_depreciation_deduction

  - name: de_pit_2026_standard_deduction
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: USD
    source: 30 Del. C. section 1108(a)-(b), one non-joint resident individual
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-de/statute/30/1108, excerpt: "shall be added to the standard deduction determined under subsection (a)"}
          - path: versions[0].formula
            kind: import
            import: {target: us-de:statutes/30/1108#resident_individual_standard_deduction, output: resident_individual_standard_deduction, hash: sha256:efe1da8c17954115ee7698e477c2589f7cdf8dda4c174f4a239cb17dcca7fba2}
          - path: versions[0].formula
            kind: import
            import: {target: us-de:statutes/30/1108#additional_standard_deduction_per_circumstance, output: additional_standard_deduction_per_circumstance, hash: sha256:efe1da8c17954115ee7698e477c2589f7cdf8dda4c174f4a239cb17dcca7fba2}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          resident_individual_standard_deduction
          + additional_standard_deduction_per_circumstance
            * (
              (if de_pit_2026_resident_attained_age_65_before_year_end: 1 else: 0)
              + (if de_pit_2026_resident_is_blind: 1 else: 0)
            )

  - name: de_pit_2026_income_before_nonnegative_tax_base
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: USD
    source: 30 Del. C. sections 1105-1108, bounded standard-deduction branch
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-de/statute/30/1102, excerpt: "with the modifications and less the deductions and personal exemptions provided in this subchapter"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          de_pit_2026_adjusted_gross_income
          - de_pit_2026_standard_deduction
          + de_pit_2026_federal_depreciation_decoupling_adjustment

  - name: de_pit_2026_taxable_income
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: USD
    source: Nonnegative base for the section 1102 rate schedule
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-de/statute/30/1102, excerpt: "the amount of taxable income"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: max(0, de_pit_2026_income_before_nonnegative_tax_base)

  - name: de_pit_2026_schedule_tax
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: USD
    source: 30 Del. C. section 1102(a)(14), before table substitution and credits
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-de/statute/30/1102, excerpt: "For taxable years beginning after December 31, 2013, the amount of tax shall be determined as follows"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          de_pit_2026_first_rate * min(max(0, de_pit_2026_taxable_income - de_pit_2026_zero_bracket_ceiling), de_pit_2026_first_bracket_ceiling - de_pit_2026_zero_bracket_ceiling)
          + de_pit_2026_second_rate * min(max(0, de_pit_2026_taxable_income - de_pit_2026_first_bracket_ceiling), de_pit_2026_second_bracket_ceiling - de_pit_2026_first_bracket_ceiling)
          + de_pit_2026_third_rate * min(max(0, de_pit_2026_taxable_income - de_pit_2026_second_bracket_ceiling), de_pit_2026_third_bracket_ceiling - de_pit_2026_second_bracket_ceiling)
          + de_pit_2026_fourth_rate * min(max(0, de_pit_2026_taxable_income - de_pit_2026_third_bracket_ceiling), de_pit_2026_fourth_bracket_ceiling - de_pit_2026_third_bracket_ceiling)
          + de_pit_2026_fifth_rate * min(max(0, de_pit_2026_taxable_income - de_pit_2026_fourth_bracket_ceiling), de_pit_2026_fifth_bracket_ceiling - de_pit_2026_fourth_bracket_ceiling)
          + de_pit_2026_top_rate * max(0, de_pit_2026_taxable_income - de_pit_2026_fifth_bracket_ceiling)

  - name: de_pit_2026_tax_table_method_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 30 Del. C. section 1102(d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source: {corpus_citation_path: us-de/statute/30/1102, excerpt: "tax table income for the taxable year does not exceed $60,000"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: de_pit_2026_taxable_income <= de_pit_2026_tax_table_income_ceiling

  - name: de_pit_2026_schedule_method_controls
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 30 Del. C. section 1102(d), complement of the statutory table range
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source: {corpus_citation_path: us-de/statute/30/1102, excerpt: "whose tax table income for the taxable year does not exceed $60,000"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: de_pit_2026_taxable_income > de_pit_2026_tax_table_income_ceiling

  - name: de_pit_2026_personal_credit
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: USD
    source: 30 Del. C. section 1110(b)-(c), separately capped schedule branch
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-de/statute/30/1110, excerpt: "In no event shall the credit allowed under subsection (b) of this section exceed the tax otherwise due"}
          - path: versions[0].formula
            kind: import
            import: {target: us-de:statutes/30/1110#post_1995_personal_credit_amount, output: post_1995_personal_credit_amount, hash: sha256:a19ee5a14062e5f015026010b53d1714a3986e028f6681b09029f7f094c0d94b}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          min(
            max(0, de_pit_2026_schedule_tax),
            post_1995_personal_credit_amount
            * (
              max(0, de_pit_2026_federal_personal_exemption_count)
              + (if de_pit_2026_resident_is_age_60_or_older: 1 else: 0)
            )
          )

  - name: de_pit_2026_other_jurisdiction_credit
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: USD
    source: 30 Del. C. section 1111, one other taxing jurisdiction
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-de/statute/30/1110, excerpt: "shall not exceed the amount computed by multiplying the tax otherwise due under this chapter by a fraction"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if de_pit_2026_taxable_income > 0:
            min(
              max(0, de_pit_2026_income_tax_paid_to_other_jurisdiction),
              max(0, de_pit_2026_schedule_tax)
              * min(
                1,
                max(0, de_pit_2026_taxable_income_from_other_jurisdiction)
                / max(0, de_pit_2026_taxable_income)
              )
            )
          else:
            0

