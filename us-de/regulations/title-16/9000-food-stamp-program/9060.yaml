format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-de/regulation/title-16/9000-food-stamp-program/9060
    upstream_source_check:
      status: checked_higher_authority
      checked_paths:
        - us:regulations/7-cfr/273/9/d/6/iii
        - us:statutes/7/2014/e/6/A
      rationale: |-
        This Delaware regulation is itself regulation authority for the state SNAP/FSP deduction rules and restates state implementation details, including Delaware-specific treatment of homeless shelter, utility, shelter, medical, earned-income, dependent-care, and unoccupied-home deductions. Federal context was checked for related utility and net-income structure, but the local regulation remains the direct source for the encoded Delaware rules and values.
  summary: |-
    DSS deducts the standard deduction, earned income deduction, excess medical, dependent care, child support payments, shelter costs, standard utility allowances, and costs of unoccupied homes and disaster repairs. The source states a 20% earned income deduction; unreimbursed medical expenses in excess of $35 per month for age-60-or-older or disability recipients; actual dependent care costs necessary for work, training, or education; a $143 homeless shelter deduction for all-homeless households with anticipated monthly shelter expenses at or below $143; excess shelter costs over 50% of countable income, with no maximum limit for households with an elderly or disabled member; utility allowance categories; and conditions for unoccupied-home and disaster-repair deductions.
rules:
  - name: earned_income_deduction_rate
    kind: parameter
    dtype: Rate
    source: DSSM 9060(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-de/regulation/title-16/9000-food-stamp-program/9060
              excerpt: "twenty percent (20%) earned income deduction"
    versions:
      - effective_from: '2008-10-01'
        formula: |-
          0.20

  - name: excess_medical_monthly_threshold
    kind: parameter
    dtype: Money
    unit: USD
    source: DSSM 9060(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-de/regulation/title-16/9000-food-stamp-program/9060
              excerpt: "in excess of thirty-five dollars ($35.00) per month"
    versions:
      - effective_from: '2008-10-01'
        formula: |-
          35

  - name: elderly_medical_deduction_age_threshold
    kind: parameter
    dtype: Count
    source: DSSM 9060(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-de/regulation/title-16/9000-food-stamp-program/9060
              excerpt: "age sixty (60) or older"
    versions:
      - effective_from: '2008-10-01'
        formula: |-
          60

  - name: homeless_shelter_deduction_amount
    kind: parameter
    dtype: Money
    unit: USD
    source: DSSM 9060(E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-de/regulation/title-16/9000-food-stamp-program/9060
              excerpt: "homeless shelter deduction of one hundred forty-three dollars ($143.00)"
    versions:
      - effective_from: '2008-10-01'
        formula: |-
          143

  - name: excess_shelter_countable_income_share
    kind: parameter
    dtype: Rate
    source: DSSM 9060(F)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-de/regulation/title-16/9000-food-stamp-program/9060
              excerpt: "exceed fifty percent (50%) of the household’s countable income"
    versions:
      - effective_from: '2008-10-01'
        formula: |-
          0.50

  - name: energy_assistance_payment_threshold_for_hcsua
    kind: parameter
    dtype: Money
    unit: USD
    source: DSSM 9060(G)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-de/regulation/title-16/9000-food-stamp-program/9060
              excerpt: "an amount greater than twenty dollars ($20.00)"
    versions:
      - effective_from: '2008-10-01'
        formula: |-
          20

  - name: limited_utility_allowance_required_utility_count
    kind: parameter
    dtype: Count
    source: DSSM 9060(G)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-de/regulation/title-16/9000-food-stamp-program/9060
              excerpt: "costs for two non-heat or non-cooling utilities"
    versions:
      - effective_from: '2008-10-01'
        formula: |-
          2

  - name: one_utility_standard_required_utility_count
    kind: parameter
    dtype: Count
    source: DSSM 9060(G)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-de/regulation/title-16/9000-food-stamp-program/9060
              excerpt: "only one non-heat, non-cooling, or non-telephone utility"
    versions:
      - effective_from: '2008-10-01'
        formula: |-
          1

  - name: standard_utility_allowance_count_for_occupied_and_unoccupied_homes
    kind: parameter
    dtype: Count
    source: DSSM 9060(H)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-de/regulation/title-16/9000-food-stamp-program/9060
              excerpt: "Give only one standard utility allowance"
    versions:
      - effective_from: '2008-10-01'
        formula: |-
          1

  - name: snap_earned_income_deduction
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: DSSM 9060(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-de/regulation/title-16/9000-food-stamp-program/9060
              excerpt: "Give the earned income deduction to self-employed individuals after the standard business deduction."
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-de/regulation/title-16/9000-food-stamp-program/9060
              excerpt: "Do not give the earned income deduction to individuals with rental income when they do not manage the property at least twenty (20) hours a week."
    versions:
      - effective_from: '2008-10-01'
        formula: |-
          if rental_income_is_unearned_because_property_not_managed_at_least_twenty_hours_per_week: 0 else: earned_income_deduction_rate * max(0, earned_income_after_standard_business_deduction)

  - name: person_eligible_for_excess_medical_deduction
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: DSSM 9060(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-de/regulation/title-16/9000-food-stamp-program/9060
              excerpt: "only to individuals who are age sixty (60) or older or receiving a disability payment"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-de/regulation/title-16/9000-food-stamp-program/9060
              excerpt: "Do not give the medical deduction to spouses or other persons receiving benefits as a dependent"
    versions:
      - effective_from: '2008-10-01'
        formula: |-
          (
            person_age >= elderly_medical_deduction_age_threshold
            or person_receives_disability_payment
            or person_receives_emergency_ssi_based_on_presumptive_eligibility
          )
          and not person_receives_benefits_as_spouse_or_dependent_of_disabled_recipient

  - name: excess_medical_deduction
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: USD
    source: DSSM 9060(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-de/regulation/title-16/9000-food-stamp-program/9060
              excerpt: "medical deduction for unreimbursed medical expenses in excess of thirty-five dollars ($35.00) per month"
    versions:
      - effective_from: '2008-10-01'
        formula: |-
          if person_eligible_for_excess_medical_deduction: max(0, unreimbursed_allowable_medical_expenses - excess_medical_monthly_threshold) else: 0

  - name: dependent_care_deduction
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: DSSM 9060(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-de/regulation/title-16/9000-food-stamp-program/9060
              excerpt: "Give the actual costs the household pays for the dependent care deduction."
    versions:
      - effective_from: '2008-10-01'
        formula: |-
          if dependent_care_needed_to_seek_employment or dependent_care_needed_to_accept_employment or dependent_care_needed_to_continue_employment or dependent_care_needed_to_comply_with_employment_and_training_requirements or dependent_care_needed_to_attend_training_or_education_preparatory_to_employment: max(0, actual_dependent_care_costs_paid_by_household) else: 0

  - name: homeless_shelter_deduction
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: DSSM 9060(E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-de/regulation/title-16/9000-food-stamp-program/9060
              excerpt: "when their anticipated monthly shelter expenses are at or less than one hundred forty-three dollars ($143.00)"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-de/regulation/title-16/9000-food-stamp-program/9060
              excerpt: "Do not give the homeless shelter deduction to households that are provided free housing and utilities or households that work for their shelter."
    versions:
      - effective_from: '2008-10-01'
        formula: |-
          if all_household_members_are_homeless and anticipated_monthly_shelter_expenses <= homeless_shelter_deduction_amount and not household_provided_free_housing_and_utilities and not household_works_for_shelter: homeless_shelter_deduction_amount else: 0

  - name: delaware_snap_excess_shelter_deduction
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: DSSM 9060(F)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-de/regulation/title-16/9000-food-stamp-program/9060
              excerpt: "costs that exceed fifty percent (50%) of the household’s countable income up to the maximum excess shelter limit"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-de/regulation/title-16/9000-food-stamp-program/9060
              excerpt: "with no limit"
    versions:
      - effective_from: '2008-10-01'
        formula: |-
          if household_has_member_age_sixty_or_older_or_disabled_per_dssm_9013: max(0, allowable_monthly_shelter_costs - (excess_shelter_countable_income_share * household_countable_income)) else: min(max(0, allowable_monthly_shelter_costs - (excess_shelter_countable_income_share * household_countable_income)), maximum_excess_shelter_limit)

  - name: heating_and_cooling_standard_utility_allowance_available
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: DSSM 9060(G)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-de/regulation/title-16/9000-food-stamp-program/9060
              excerpt: "heating or cooling costs separate and apart from their rent or mortgage payments"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-de/regulation/title-16/9000-food-stamp-program/9060
              excerpt: "LIHEAP ... current month or in the immediately preceding twelve (12) months of an amount greater than twenty dollars ($20.00)"
    versions:
      - effective_from: '2008-10-01'
        formula: |-
          household_has_heating_or_cooling_costs_separate_from_rent_or_mortgage
          or household_in_private_rental_housing_billed_by_landlord_for_actual_usage_or_flat_rate
          or (
            household_received_liheap_energy_payment_in_current_month_or_immediately_preceding_twelve_months
            and liheap_energy_payment_amount > energy_assistance_payment_threshold_for_hcsua
          )
          or (
            household_received_non_liheap_excluded_energy_assistance_in_current_month_or_immediately_preceding_twelve_months
            and non_liheap_excluded_energy_assistance_amount > energy_assistance_payment_threshold_for_hcsua
            and household_continues_to_incur_out_of_pocket_heating_or_cooling_expenses
          )
          or household_in_public_or_other_rental_housing_with_central_meters_charged_only_for_excess_heating_or_cooling_costs

  - name: limited_utility_allowance_available
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: DSSM 9060(G)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-de/regulation/title-16/9000-food-stamp-program/9060
              excerpt: "costs for two non-heat or non-cooling utilities"
    versions:
      - effective_from: '2008-10-01'
        formula: |-
          non_heating_non_cooling_utility_count >= limited_utility_allowance_required_utility_count

  - name: one_utility_standard_available
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: DSSM 9060(G)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-de/regulation/title-16/9000-food-stamp-program/9060
              excerpt: "only one non-heat, non-cooling, or non-telephone utility"
    versions:
      - effective_from: '2008-10-01'
        formula: |-
          non_heating_non_cooling_non_telephone_utility_count == one_utility_standard_required_utility_count

  - name: telephone_allowance_available
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: DSSM 9060(G)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-de/regulation/title-16/9000-food-stamp-program/9060
              excerpt: "Give the telephone allowance to households with only telephone costs."
    versions:
      - effective_from: '2008-10-01'
        formula: |-
          household_has_only_telephone_costs

  - name: unoccupied_home_shelter_costs_allowable
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: DSSM 9060(H)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-de/regulation/title-16/9000-food-stamp-program/9060
              excerpt: "Employment or training away from home, Illness, or Abandonment caused by a natural disaster or casualty loss"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-de/regulation/title-16/9000-food-stamp-program/9060
              excerpt: "intend to return to the home"
    versions:
      - effective_from: '2008-10-01'
        formula: |-
          (
            unoccupied_home_due_to_employment_or_training_away_from_home
            or unoccupied_home_due_to_illness
            or unoccupied_home_due_to_abandonment_caused_by_natural_disaster_or_casualty_loss
          )
          and household_intends_to_return_to_unoccupied_home
          and not current_occupants_claim_shelter_costs_for_food_benefit_purposes
          and not unoccupied_home_leased_or_rented_during_household_absence

  - name: disaster_repair_charges_deductible
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: DSSM 9060(H)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-de/regulation/title-16/9000-food-stamp-program/9060
              excerpt: "repair of the home substantially damaged or destroyed by a natural disaster such as a flood or fire"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-de/regulation/title-16/9000-food-stamp-program/9060
              excerpt: "will not include charges for repair of the home that have been or will be reimbursed"
    versions:
      - effective_from: '2008-10-01'
        formula: |-
          home_substantially_damaged_or_destroyed_by_natural_disaster
          and not repair_charges_have_been_or_will_be_reimbursed
          and not repair_charges_are_other_than_due_to_natural_disaster
