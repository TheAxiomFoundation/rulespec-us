  - name: minnesota_fcep_eligibility_available
    kind: derived
    dtype: Boolean
    period: Year
    source: CMS CHIP FCEP SPA source, Minnesota
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/policy/cms/chip-spa/mn/mn-chipspa-4/pdf/page-26
              excerpt: "Income: At or Below 275% of the Federal Poverty Guideline 4.1.4."
    versions:
      - effective_from: '2009-07-01'
        formula: |-
          true
  - name: minnesota_fcep_fpl_limit
    kind: parameter
    dtype: Rate
    period: Year
    source: CMS CHIP FCEP SPA source, Minnesota
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/policy/cms/chip-spa/mn/mn-chipspa-4/pdf/page-26
              excerpt: "Income: At or Below 275% of the Federal Poverty Guideline 4.1.4."
    versions:
      - effective_from: '2009-07-01'
        formula: |-
          2.75
  - name: minnesota_fcep_effective_fpl_limit
    kind: derived
    dtype: Rate
    period: Year
    source: CMS CHIP FCEP SPA source, Minnesota, including the MAGI 5% FPL disregard
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: import
            import:
              target: us:policies/cms/medicaid-chip-bhp-eligibility-levels#magi_fpl_disregard_rate
              output: magi_fpl_disregard_rate
              hash: sha256:ea0071602a4a4441e584a16bdbab3d8a3c36b40b7cea1151165533669423f5f5
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/regulation/42/435/603/d
              excerpt: "5 percentage points of the Federal poverty level"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/policy/cms/chip-spa/mn/mn-chipspa-4/pdf/page-26
              excerpt: "Income: At or Below 275% of the Federal Poverty Guideline 4.1.4."
    versions:
      - effective_from: '2009-07-01'
        formula: |-
          minnesota_fcep_fpl_limit + magi_fpl_disregard_rate
  - name: is_chip_fcep_eligible_person
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 42 USC 1397ll(f)(1), 42 CFR 457.10, and CMS CHIP FCEP SPA source for Minnesota
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/policy/cms/chip-spa/mn/mn-chipspa-4/pdf/page-26
              excerpt: "Income: At or Below 275% of the Federal Poverty Guideline 4.1.4."
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/1397ll/f/1
              excerpt: "through the application of sections 457.10"
    versions:
      - effective_from: '2009-07-01'
        formula: |-
          person_is_pregnant
          and not found_eligible_for_medical_assistance_under_subchapter_xix
          and medicaid_income_level <= minnesota_fcep_effective_fpl_limit
