format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-mn/statute/290.0123
  summary: |-
    Standard deduction equals $27,650 for married joint filers or surviving spouses, $20,800 for heads of household, and one-half the joint amount for other filers, plus additional senior/blind amounts. Dependent deductions are limited. The deduction is disallowed for specified filers and reduced for adjusted gross income over $220,650, with additional thresholds and 80 percent caps. Amounts are inflation-adjusted after taxable year 2023 under section 270C.22.
  deferred_outputs:
    - output: us-mn:statutes/290/0123#standard_deduction
      reason: Final standard deduction depends on filing-status classifications and on cited upstream definitions and inflation adjustment mechanics not provided in copied context, including IRC sections 151 and 152 and Minnesota section 270C.22.
      source_values:
        - us-mn:statutes/290/0123#joint_or_surviving_spouse_standard_deduction_amount
        - us-mn:statutes/290/0123#head_of_household_standard_deduction_amount
        - us-mn:statutes/290/0123#additional_amount_for_married_or_surviving_spouse_senior_taxpayer
        - us-mn:statutes/290/0123#additional_amount_for_other_senior_taxpayer
        - us-mn:statutes/290/0123#additional_amount_for_married_or_surviving_spouse_blind_taxpayer
        - us-mn:statutes/290/0123#additional_amount_for_other_blind_taxpayer
        - us-mn:statutes/290/0123#dependent_standard_deduction_floor
        - us-mn:statutes/290/0123#dependent_earned_income_addition
        - us-mn:statutes/290/0123#standard_deduction_reduction_first_agi_threshold
        - us-mn:statutes/290/0123#standard_deduction_reduction_second_agi_threshold
        - us-mn:statutes/290/0123#standard_deduction_reduction_high_income_threshold
        - us-mn:statutes/290/0123#standard_deduction_reduction_first_rate
        - us-mn:statutes/290/0123#standard_deduction_reduction_second_rate
        - us-mn:statutes/290/0123#standard_deduction_reduction_cap_rate
