format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-hi/regulation/har/17/680/page-11
    corpus_citation_paths:
      - us-hi/regulation/har/17/680/page-11
      - us-hi/regulation/har/17/680/page-12
  summary: |-
    "The monthly financial assistance payment for individuals, who are prospectively determined eligible, shall be determined by subtracting the monthly net income from the monthly standard of assistance"; recipients receive the full monthly payment; applicants receive the full payment when applying on the first of the month, or a prorated initial monthly payment when applying from the second through the end of the month. Proration uses a standard thirty-day month, treats a thirty-first-day application as the thirtieth day, drops the ratio after four decimal places, rounds down to the next lower whole dollar, and provides no payment for a pre-rounding prorated payment between $.01 and $9.99.
rules:
  - name: full_payment_application_day
    kind: parameter
    dtype: Count
    source: HAR §17-680-12(b)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-hi/regulation/har/17/680/page-11
              excerpt: first of the month
    versions:
      - effective_from: '1993-03-19'
        formula: |-
          1

  - name: prorated_application_start_day
    kind: parameter
    dtype: Count
    source: HAR §17-680-12(b)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-hi/regulation/har/17/680/page-11
              excerpt: between the second to the end of the month
    versions:
      - effective_from: '1993-03-19'
        formula: |-
          2

  - name: standard_proration_month_days
    kind: parameter
    dtype: Count
    source: HAR §17-680-12(b)(3)(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-hi/regulation/har/17/680/page-11
              excerpt: standard thirty-day month
    versions:
      - effective_from: '1993-03-19'
        formula: |-
          30

  - name: proration_numerator_base_day
    kind: parameter
    dtype: Count
    source: HAR §17-680-12(b)(3)(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-hi/regulation/har/17/680/page-11
              excerpt: thirty-one minus the calendar day
    versions:
      - effective_from: '1993-03-19'
        formula: |-
          31

  - name: application_day_treated_for_thirty_first
    kind: parameter
    dtype: Count
    source: HAR §17-680-12(b)(3)(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-hi/regulation/har/17/680/page-11
              excerpt: thirty-first of a month shall be treated as though it applied on the thirtieth
    versions:
      - effective_from: '1993-03-19'
        formula: |-
          30

  - name: proration_quotient_accuracy_scale
    kind: parameter
    dtype: Decimal
    source: HAR §17-680-12(b)(3)(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-hi/regulation/har/17/680/page-12
              excerpt: quotient ... to an accuracy of four decimal places and drop the remaining decimals
    versions:
      - effective_from: '1993-03-19'
        formula: |-
          10000

  - name: prorated_no_payment_lower_bound
    kind: parameter
    dtype: Money
    unit: USD
    source: HAR §17-680-12(b)(3)(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-hi/regulation/har/17/680/page-12
              excerpt: payment between $.0l and $9.99 prior to rounding down shall not receive a payment
    versions:
      - effective_from: '1993-03-19'
        formula: |-
          0.01

  - name: prorated_no_payment_upper_bound
    kind: parameter
    dtype: Money
    unit: USD
    source: HAR §17-680-12(b)(3)(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-hi/regulation/har/17/680/page-12
              excerpt: payment between $.0l and $9.99 prior to rounding down shall not receive a payment
    versions:
      - effective_from: '1993-03-19'
        formula: |-
          9.99

  - name: monthly_financial_assistance_payment
    kind: derived
    entity: TanfUnit
    dtype: Money
    period: Month
    unit: USD
    source: HAR §17-680-12(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-hi/regulation/har/17/680/page-11
              excerpt: subtracting the monthly net income from the monthly standard of assistance
    versions:
      - effective_from: '1993-03-19'
        formula: |-
          if prospectively_determined_eligible: max(0, monthly_standard_of_assistance - monthly_net_income) else: 0

  - name: prorated_initial_monthly_financial_assistance_payment_before_whole_dollar_rounding
    kind: derived
    entity: TanfUnit
    dtype: Money
    period: Month
    unit: USD
    source: HAR §17-680-12(b)(3)(A)-(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-hi/regulation/har/17/680/page-11
              excerpt: financial assistance shall be provided from the date of application
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-hi/regulation/har/17/680/page-11
              excerpt: multiply the amount of the monthly financial assistance by the ratio of thirty-one minus the calendar day
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-hi/regulation/har/17/680/page-12
              excerpt: quotient ... to an accuracy of four decimal places and drop the remaining decimals
          - path: versions[0].formula
            kind: import
            import:
              target: us-hi:regulations/har/17/680/17-680-12#monthly_financial_assistance_payment
              output: monthly_financial_assistance_payment
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-hi:regulations/har/17/680/17-680-12#prorated_application_start_day
              output: prorated_application_start_day
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-hi:regulations/har/17/680/17-680-12#standard_proration_month_days
              output: standard_proration_month_days
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-hi:regulations/har/17/680/17-680-12#proration_numerator_base_day
              output: proration_numerator_base_day
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-hi:regulations/har/17/680/17-680-12#application_day_treated_for_thirty_first
              output: application_day_treated_for_thirty_first
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-hi:regulations/har/17/680/17-680-12#proration_quotient_accuracy_scale
              output: proration_quotient_accuracy_scale
              hash: sha256:local
    versions:
      - effective_from: '1993-03-19'
        formula: |-
          if prospectively_determined_eligible and applicant and application_calendar_day >= prorated_application_start_day and application_calendar_day <= proration_numerator_base_day and family_meets_all_conditions_of_eligibility: monthly_financial_assistance_payment * (floor(((proration_numerator_base_day - (if application_calendar_day == proration_numerator_base_day: application_day_treated_for_thirty_first else: application_calendar_day)) / standard_proration_month_days) * proration_quotient_accuracy_scale) / proration_quotient_accuracy_scale) else: 0

  - name: hi_tanf
    kind: derived
    entity: TanfUnit
    dtype: Money
    period: Month
    unit: USD
    source: HAR §17-680-12(a)-(b)(3)(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-hi/regulation/har/17/680/page-11
              excerpt: Recipients shall be provided the full monthly financial assistance payment
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-hi/regulation/har/17/680/page-11
              excerpt: Applicants shall be provided the full monthly financial assistance payment when they apply on the first
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-hi/regulation/har/17/680/page-12
              excerpt: prorated financial assistance payment shall be rounded down to the next lower whole dollar
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-hi/regulation/har/17/680/page-12
              excerpt: payment between $.0l and $9.99 prior to rounding down shall not receive a payment
          - path: versions[0].formula
            kind: import
            import:
              target: us-hi:regulations/har/17/680/17-680-12#monthly_financial_assistance_payment
              output: monthly_financial_assistance_payment
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-hi:regulations/har/17/680/17-680-12#prorated_initial_monthly_financial_assistance_payment_before_whole_dollar_rounding
              output: prorated_initial_monthly_financial_assistance_payment_before_whole_dollar_rounding
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-hi:regulations/har/17/680/17-680-12#full_payment_application_day
              output: full_payment_application_day
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-hi:regulations/har/17/680/17-680-12#prorated_application_start_day
              output: prorated_application_start_day
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-hi:regulations/har/17/680/17-680-12#proration_numerator_base_day
              output: proration_numerator_base_day
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-hi:regulations/har/17/680/17-680-12#prorated_no_payment_lower_bound
              output: prorated_no_payment_lower_bound
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-hi:regulations/har/17/680/17-680-12#prorated_no_payment_upper_bound
              output: prorated_no_payment_upper_bound
              hash: sha256:local
    versions:
      - effective_from: '1993-03-19'
        formula: |-
          if prospectively_determined_eligible and recipient: monthly_financial_assistance_payment else: if prospectively_determined_eligible and applicant and application_calendar_day == full_payment_application_day: monthly_financial_assistance_payment else: if prospectively_determined_eligible and applicant and application_calendar_day >= prorated_application_start_day and application_calendar_day <= proration_numerator_base_day and family_meets_all_conditions_of_eligibility: (if prorated_initial_monthly_financial_assistance_payment_before_whole_dollar_rounding >= prorated_no_payment_lower_bound and prorated_initial_monthly_financial_assistance_payment_before_whole_dollar_rounding <= prorated_no_payment_upper_bound: 0 else: floor(prorated_initial_monthly_financial_assistance_payment_before_whole_dollar_rounding)) else: 0
