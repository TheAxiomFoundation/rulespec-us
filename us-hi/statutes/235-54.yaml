format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-hi/statute/235-54
  summary: 'Personal exemptions: individual exemptions equal IRC-lawful exemption
    count plus an additional exemption for taxpayer or spouse age 65 or older, multiplied
    by $1,144 for taxable years beginning after December 31, 1984; nonresidents prorate
    as provided in section 235-5; dependent individuals have zero. Estates deduct
    $400; all-income-currently-distributing trusts deduct $200; other trusts deduct
    $80. Blind, deaf, or totally disabled persons deduct $7,000 instead of subsection
    (a).'
rules:
- name: individual_personal_exemption_unit_amount
  kind: parameter
  dtype: Money
  unit: USD
  source: "HRS \xA7235-54(a)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-hi/statute/235-54
          excerpt: multiply that number by $1,144, for taxable years beginning after
            December 31, 1984
  versions:
  - effective_from: '1985-01-01'
    formula: '1144'
- name: estate_exemption_amount
  kind: parameter
  dtype: Money
  unit: USD
  source: "HRS \xA7235-54(b)(1)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-hi/statute/235-54
          excerpt: An estate shall be allowed a deduction of $400.
  versions:
  - effective_from: '0001-01-01'
    formula: '400'
- name: current_income_distribution_trust_exemption_amount
  kind: parameter
  dtype: Money
  unit: USD
  source: "HRS \xA7235-54(b)(2)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-hi/statute/235-54
          excerpt: required to distribute all of its income currently shall be allowed
            a deduction of $200
  versions:
  - effective_from: '0001-01-01'
    formula: '200'
- name: other_trust_exemption_amount
  kind: parameter
  dtype: Money
  unit: USD
  source: "HRS \xA7235-54(b)(3)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-hi/statute/235-54
          excerpt: All other trusts shall be allowed a deduction of $80.
  versions:
  - effective_from: '0001-01-01'
    formula: '80'
- name: blind_deaf_or_totally_disabled_person_exemption_amount
  kind: parameter
  dtype: Money
  unit: USD
  source: "HRS \xA7235-54(c)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-hi/statute/235-54
          excerpt: the amount of $7,000
  versions:
  - effective_from: '0001-01-01'
    formula: '7000'
- name: individual_personal_exemption_deduction
  kind: derived
  entity: TaxUnit
  dtype: Money
  period: Year
  unit: USD
  source: "HRS \xA7235-54(a), (c)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-hi/statute/235-54
          excerpt: Ascertain the number of exemptions which the individual can lawfully
            claim under the Internal Revenue Code, add an additional exemption for
            the taxpayer or the taxpayer's spouse who is sixty-five years of age or
            older within the taxable year, multiply that number by $1,144
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-hi/statute/235-54
          excerpt: the personal exemption amount applicable to such individual under
            this subsection for such individual's taxable year shall be zero
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-hi/statute/235-54
          excerpt: A nonresident shall prorate the personal exemptions on account
            of income from sources outside the State as provided in section 235-5.
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-hi/statute/235-54
          excerpt: A blind person, a deaf person, and any person totally disabled
            ... shall be allowed ... instead of the exemptions provided by subsection
            (a), the amount of $7,000.
  versions:
  - effective_from: '1985-01-01'
    formula: "if individual_is_blind_or_deaf_or_totally_disabled:\n  blind_deaf_or_totally_disabled_person_exemption_amount\n\
      else:\n  if exemption_under_this_section_allowable_to_another_taxpayer:\n  \
      \  0\n  else:\n    if individual_is_nonresident:\n      individual_personal_exemption_unit_amount\
      \ * (personal_exemptions_lawfully_claimable_under_internal_revenue_code_count\
      \ + taxpayer_or_spouse_sixty_five_or_older_within_taxable_year_count) * personal_exemption_proration_ratio_provided_in_section_235_5\n\
      \    else:\n      individual_personal_exemption_unit_amount * (personal_exemptions_lawfully_claimable_under_internal_revenue_code_count\
      \ + taxpayer_or_spouse_sixty_five_or_older_within_taxable_year_count)"
- name: estate_exemption_deduction
  kind: derived
  entity: Estate
  dtype: Money
  period: Year
  unit: USD
  source: "HRS \xA7235-54(b)(1)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-hi/statute/235-54
          excerpt: An estate shall be allowed a deduction of $400.
  versions:
  - effective_from: '0001-01-01'
    formula: estate_exemption_amount
- name: trust_exemption_deduction
  kind: derived
  entity: Trust
  dtype: Money
  period: Year
  unit: USD
  source: "HRS \xA7235-54(b)(2)-(3)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-hi/statute/235-54
          excerpt: A trust which, under its governing instrument, is required to distribute
            all of its income currently shall be allowed a deduction of $200. All
            other trusts shall be allowed a deduction of $80.
  versions:
  - effective_from: '0001-01-01'
    formula: 'if trust_required_by_governing_instrument_to_distribute_all_income_currently:
      current_income_distribution_trust_exemption_amount else: other_trust_exemption_amount'
