    formula: 'if food_excise_adjusted_gross_income < single_return_food_excise_credit_band_upper_bound[0]:
      0 else: if food_excise_adjusted_gross_income < single_return_food_excise_credit_band_upper_bound[1]:
      1 else: if food_excise_adjusted_gross_income < single_return_food_excise_credit_band_upper_bound[2]:
