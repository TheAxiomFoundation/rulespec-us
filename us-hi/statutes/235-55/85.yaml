        kind: parameter_table
        source:
          corpus_citation_path: us-hi/statute/235-55.85
          excerpt: 'Adjusted gross income Credit per exemption for taxpayers filing
            a single return: Under $15,000; $15,000 under $20,000; $20,000 under $25,000;
            $25,000 under $30,000; $30,000 under $40,000; $40,000 and over.'
- name: single_return_food_excise_credit_band
  kind: derived
