format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-hi/statute/235-55.85
  summary: 'Refundable food/excise tax credit: an individual taxpayer may claim the
    credit if not claimed or otherwise eligible to be claimed as another taxpayer''s
    dependent; credit per qualified exemption is determined from adjusted gross income
    tables; qualified exemptions require more than nine months'' physical presence
    in the State and exclude extra age-65 or disability exemptions; specified full-year
    confined persons are ineligible; excess credits are refunded, but no refunds or
    payments are made for amounts less than $1; claims are due by the end of the twelfth
    month after the taxable year; "adjusted gross income" means adjusted gross income
    as defined by the Internal Revenue Code.'
  deferred_outputs:
  - output: us-hi:statutes/235-55/85/b#refundable_food_excise_tax_credit
    reason: Final credit computation requires the taxpayer's filing-status classification
      and qualified-exemption count under this chapter, including the special separate-return
      limitation for spouses who could have filed jointly; those upstream legal classifications
      are not provided in this source slice or copied context.
  - output: us-hi:statutes/235-55/85/c#qualified_exemptions_for_food_excise_tax_credit
    reason: The source depends on exemptions permitted under this chapter and a taxpayer's
      parent/guardian/dependent relationships; those upstream exemption mechanics
      and relations are not available in this source slice or copied context.
  - output: us-hi:statutes/235-55/85/e#refundable_food_excise_tax_credit_refund_payment
    reason: Refundability and the no-refund-under-$1 rule require the final properly
      claimed credit amount and individual income tax liability/payment due, but the
      final credit computation is deferred.
  - output: us-hi:statutes/235-55/85/f#food_excise_tax_credit_claim_timely
    reason: Claim timeliness depends on filing-date and taxable-year-close date facts;
      this source states the deadline but the supported formula surface lacks date
      arithmetic for the twelfth-month-after-close test.
