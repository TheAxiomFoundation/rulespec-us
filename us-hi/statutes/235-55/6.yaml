            kind: amount
            source:
              corpus_citation_path: us-hi/statute/235-55.6
              excerpt: Over $25,000 but not over $30,000
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          25000
  - name: adjusted_gross_income_band_1_upper_bound
