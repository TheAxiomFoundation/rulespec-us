            kind: amount
            source:
              corpus_citation_path: us-hi/statute/235-55.6
              excerpt: Over $45,000 but not over $50,000
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          45000
  - name: adjusted_gross_income_band_5_upper_bound
    kind: parameter
    dtype: Money
