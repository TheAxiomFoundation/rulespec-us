        formula: |-
          if hi_pit_2026_filing_status_joint_or_surviving_spouse:
            hi_pit_2026_schedule_a_base[hi_pit_2026_alternative_schedule_a_bracket]
            + hi_pit_2026_alternative_schedule_a_rate[hi_pit_2026_alternative_schedule_a_bracket]
