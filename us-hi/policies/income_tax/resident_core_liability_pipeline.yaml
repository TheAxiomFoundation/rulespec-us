format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_paths:
      - us-hi/statute/235-2.3
      - us-hi/statute/235-2.4
      - us-hi/statute/235-4
      - us-hi/statute/235-7
      - us-hi/statute/235-54
      - us-hi/statute/235-51
      - us-hi/statute/235-55
      - us-hi/statute/235-55.6
      - us-hi/statute/235-55.7
      - us-hi/statute/235-55.75
      - us-hi/statute/235-55.85
      - us-hi/statute/235-91.5
      - us-hi/form/individual-income-tax/2025/n-11-instructions/capital-gains-tax-worksheet
    upstream_source_check:
      status: checked_higher_authority
      checked_paths:
        - us-hi/statute/chapter-235
        - us-hi/statute/235-2.3
        - us-hi/statute/235-2.4
        - us-hi/statute/235-4
        - us-hi/statute/235-7
        - us-hi/statute/235-54
        - us-hi/statute/235-51
        - us-hi/statute/235-55
        - us-hi/statute/235-55.6
        - us-hi/statute/235-55.7
        - us-hi/statute/235-55.75
        - us-hi/statute/235-55.85
        - us-hi/statute/235-91.5
        - us-hi/form/individual-income-tax/2025/n-11-instructions/capital-gains-tax-worksheet
      rationale: |-
        The pinned Chapter 235 package supplies Hawaii's December 31, 2024
        federal-conformity date, directly stated resident additions and
        exclusions, tax-year-2026 standard deductions, personal exemptions,
        all individual rate schedules, the capital-gain limitation, and the
        resident refundable credits encoded here. The official 2025 Form N-11
        instructions supply the capital-gain worksheet mechanics; no 2025
        filing-status dollar is projected because the 2026 statutory schedules
        determine the amount taxed below 7.25 percent.

        Federal adjusted gross income and federal earned-income credit are
        cross-system federal results expressly referenced by Chapter 235, not
        completed Hawaii results. All Hawaii additions, exclusions,
        deductions, exemptions, gain adjustments, and credits are reconstructed
        from separately named facts. The supported profile fails closed when a
        post-2024 federal conformity difference, itemized deduction, special
        exemption, unencoded Chapter 235 modification, other-jurisdiction
        credit, business credit, or cross-title credit is present.

        The pinned corpus has no final 2026 N-11, 2026 credit ordering
        instructions, 2026 forms for specialty credits, current military pay
        table needed to quantify the reserve-component exclusion, or the
        numerous cross-title provisions incorporated by Chapter 235. Those
        cases are typed holds, never caller-completed Hawaii amounts.
  summary: |-
    Tax-year-2026 Hawaii full-year-resident individual-income-tax core. For an
    aligned federal and Hawaii filing unit in the disclosed supported profile,
    the module starts with federal adjusted gross income, applies directly
    sourced additions and exclusions, computes the enacted standard deduction
    and personal exemption, and derives Hawaii taxable income. It reconstructs
    the capital-gain worksheet line-10 amount from federal gains and Hawaii
    long- and short-term adjustments, then applies every bracket and the 7.25
    percent alternative-tax limitation.

    It also computes the source-complete refundable earned-income,
    food/excise, low-income-renter, and child/dependent-care credits from raw
    facts, applies refundable-first ordering, and exposes supported-profile
    liability before payments plus refundable excess. Diagnostic schedule
    amounts are private. Public monetary outputs return zero unless every
    transitive supported-profile condition holds.

    Itemized deductions, special disability exemptions, reserve pay requiring
    the missing military table, other-state credit limitation, renewable,
    film, business, pass-through, and cross-title credits remain deferred.
    Payments, withholding, filing administration, local taxes, nonresident
    allocation, trusts, estates, and the section 235-51(e) business election
    are outside scope. The bounded result is not represented as complete for a
    taxpayer outside the supported profile.
  deferred_outputs:
    - output: us-hi:policies/income_tax/resident_core_liability_pipeline#hi_pit_2026_complete_itemized_deduction
      reason: The pinned corpus has no final 2026 N-11 itemized-deduction schedule or complete annual inputs.
      source_values:
        - us-hi:policies/income_tax/resident_core_liability_pipeline#hi_pit_2026_supported_profile_applies
    - output: us-hi:policies/income_tax/resident_core_liability_pipeline#hi_pit_2026_complete_other_jurisdiction_credit
      reason: Section 235-55 requires a Hawaii-only counterfactual and satisfactory-evidence determinations not established by pinned 2026 forms.
      source_values:
        - us-hi:policies/income_tax/resident_core_liability_pipeline#hi_pit_2026_supported_profile_tax_before_credits
    - output: us-hi:policies/income_tax/resident_core_liability_pipeline#hi_pit_2026_complete_specialty_credits
      reason: Chapter 235 and incorporated cross-title law contain specialty credits whose 2026 forms, ordering, and cross-title elements are not pinned.
      source_values:
        - us-hi:policies/income_tax/resident_core_liability_pipeline#hi_pit_2026_supported_profile_applies
    - output: us-hi:policies/income_tax/resident_core_liability_pipeline#hi_pit_2026_net_income_tax_liability
      reason: The public bounded liability is complete only for the explicit no-specialty-credit supported profile.
      source_values:
        - us-hi:policies/income_tax/resident_core_liability_pipeline#hi_pit_2026_supported_profile_net_income_tax_liability
