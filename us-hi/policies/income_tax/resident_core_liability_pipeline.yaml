  - name: hi_pit_2026_supported_profile_tax_before_credits
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Public supported-profile regular or capital-gain-limited tax
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-hi/statute/235-51, excerpt: "the tax imposed by this section shall not exceed"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if hi_pit_2026_supported_profile_applies:
            hi_pit_2026_income_tax_liability
          else:
            0

  - name: hi_pit_2026_supported_profile_refundable_credits
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Public supported-profile refundable credits
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-hi/statute/235-91.5, excerpt: "shall be used first"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if hi_pit_2026_supported_profile_applies:
            hi_pit_2026_total_refundable_credits
          else:
            0

  - name: hi_pit_2026_supported_profile_net_income_tax_liability
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Supported-profile annual resident liability before payments
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-hi/statute/235-91.5, excerpt: "offsetting of a taxpayer's income tax liability"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if hi_pit_2026_supported_profile_applies:
            max(0, hi_pit_2026_income_tax_liability - hi_pit_2026_total_refundable_credits)
          else:
            0

  - name: hi_pit_2026_supported_profile_refundable_excess_before_payments
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Supported-profile refundable credit excess before payments
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-hi/statute/235-55.75, excerpt: "the excess of credit over payments due shall be refunded"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if hi_pit_2026_supported_profile_applies:
            max(0, hi_pit_2026_total_refundable_credits - hi_pit_2026_income_tax_liability)
          else:
            0
