          else: if hi_pit_2026_filing_status_head_of_household:
            hi_pit_2026_schedule_b_base[hi_pit_2026_alternative_schedule_b_bracket]
            + hi_pit_2026_alternative_schedule_b_rate[hi_pit_2026_alternative_schedule_b_bracket]
            * max(0, hi_pit_2026_alternative_schedule_taxable_income - hi_pit_2026_schedule_b_floor[hi_pit_2026_alternative_schedule_b_bracket])
          else:
            hi_pit_2026_schedule_c_base[hi_pit_2026_alternative_schedule_c_bracket]
            + hi_pit_2026_alternative_schedule_c_rate[hi_pit_2026_alternative_schedule_c_bracket]
            * max(0, hi_pit_2026_alternative_schedule_taxable_income - hi_pit_2026_schedule_c_floor[hi_pit_2026_alternative_schedule_c_bracket])

