  summary: |-
    The table provides MAGI eligibility levels as percentages of FPL, based on state decisions as of December 1, 2023. Hawaii row: Children Medicaid Ages 0-1 308%; Children Medicaid Ages 1-5 308%; Children Medicaid Ages 6-18 308%; Children Separate CHIP N/A; Pregnant Women Medicaid 191%; Pregnant Women CHIP N/A; Adults (Medicaid) Parent/Caretaker 105%; Adults (Medicaid) Expansion to Adults 133%. The MAGI-based rules generally include a 5% FPL disregard.
