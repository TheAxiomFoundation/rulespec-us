format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_paths:
      - us-me/guidance/revenue/individual-income-tax/2026/rate-schedules/document-1
      - us-me/statute/36/5111/block-2
    upstream_source_check:
      status: official_parameter_source
      checked_paths:
        - us-me/guidance/revenue/individual-income-tax/2026/rate-schedules/document-1
        - us-me/statute/36/5111/block-2
      rationale: |-
        Maine Revenue Services' official tax-year-2026 rate schedule supplies
        the 5.8, 6.75, and 7.15 percent rates and the exact indexed thresholds
        and cumulative bracket bases for single and married-separate,
        head-of-household, and married-joint or surviving-spouse joint returns.
        It also increases the tax calculated under those schedules by 2 percent
        of Maine taxable income above the filing-status threshold.

        The source heading classifies "Married Individuals and Surviving
        Spouses Filing Joint Returns" in one base-schedule category. This module
        therefore exposes one joint-return or surviving-spouse selector. The
        source's surcharge note assigns $1,500,000 to married-joint and
        head-of-household returns; a surviving spouse represented by this
        selector is specifically a surviving spouse filing a joint return under
        the source heading, so the joint-return threshold applies. No treatment
        is inferred for a surviving spouse who is not filing in that source
        category.

        The caller supplies completed-return Maine taxable income and mutually
        exclusive filing-status classifications. All selectors false means
        single. The module does not determine taxable income, deductions,
        exemptions, residency, allocation, credits, withholding, tax-table
        substitution, or final-return liability. It fails closed outside tax
        year 2026.
  summary: |-
    Maine 2026 individual income-tax rate schedule and surcharge from completed
    Maine taxable income. The module selects the official filing-status
    thresholds and published cumulative bracket bases, applies the
    5.8/6.75/7.15-percent graduated schedule, and adds the 2-percent surcharge
    above the official filing-status threshold.

    This is a schedule-only computation, not final Maine income-tax liability or
    a completed return. It excludes all upstream taxable-income construction and
    all downstream additions, allocations, credits, payments, and rounding
    instructions. PolicyEngine and TAXSIM parity are not claimed; the official
    2026 Maine Revenue Services schedule and boundary fixtures are the acceptance
    standard.
