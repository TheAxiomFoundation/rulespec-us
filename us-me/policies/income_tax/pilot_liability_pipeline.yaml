            + me_pit_pilot_middle_rate * (me_pit_pilot_taxable_income - me_pit_pilot_first_threshold)
          else:
            me_pit_pilot_second_bracket_base
            + me_pit_pilot_high_rate * (me_pit_pilot_taxable_income - me_pit_pilot_second_threshold)

