  - name: maine_snap_full_standard_utility_allowance_entitled
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Maine Chapter 301 Section 555-5, FSUA eligibility
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-me/regulation/dhhs/ofi/chapter-301/block-135
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-me/regulation/dhhs/ofi/chapter-301/block-136
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (
            snap_household_contains_elderly_or_disabled_member
            and snap_household_received_liheap_or_similar_energy_assistance_current_or_prior_12_months
            and snap_household_energy_assistance_annual_amount > maine_snap_liheap_energy_assistance_threshold
          )
          or (
            snap_household_incurs_heating_or_air_conditioning_expense_apart_from_rent_or_mortgage
            and not snap_outside_party_pays_entire_heating_or_cooling_as_excluded_vendor_payment
          )
          or snap_household_central_meter_charged_only_for_excess_utility_costs

  - name: maine_snap_non_heat_utility_allowance_entitled
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Maine Chapter 301 Section 555-5, NHUA eligibility
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-me/regulation/dhhs/ofi/chapter-301/block-136
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          not maine_snap_full_standard_utility_allowance_entitled
          and snap_household_non_heat_utility_expense_count >= maine_snap_non_heat_utility_minimum_expense_count

  - name: maine_snap_actual_single_nontelephone_utility_expense_allowed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Maine Chapter 301 Section 555-5, one non-telephone utility expense
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-me/regulation/dhhs/ofi/chapter-301/block-136
              excerpt: "If the one expense is not telephone, actual expense must be used."
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          not maine_snap_full_standard_utility_allowance_entitled
          and not maine_snap_non_heat_utility_allowance_entitled
          and snap_household_has_exactly_one_nontelephone_non_heat_utility_expense

  - name: maine_snap_phone_only_utility_allowance_entitled
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Maine Chapter 301 Section 555-5, PhUA eligibility
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-me/regulation/dhhs/ofi/chapter-301/block-136
              excerpt: "incur telephone expenses including basic line charges, cellular phone fees, or telephone cards"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          not maine_snap_full_standard_utility_allowance_entitled
          and not maine_snap_non_heat_utility_allowance_entitled
          and snap_household_incurred_telephone_expense

  - name: maine_snap_full_standard_utility_allowance_state_option
    kind: derived
