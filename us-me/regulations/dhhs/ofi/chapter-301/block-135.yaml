    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if maine_snap_homeless_shelter_deduction_entitled:
            maine_snap_homeless_shelter_deduction_amount
          else:
            0

  - name: maine_snap_excess_shelter_deduction_before_cap
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: Maine Chapter 301 Section 555-5, Excess Shelter Deduction
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-me/regulation/dhhs/ofi/chapter-301/block-134
              excerpt: "Shelter costs over 50% of the household's income"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          max(0, snap_household_monthly_shelter_costs + maine_snap_utility_allowance - snap_household_income_after_other_deductions * maine_snap_excess_shelter_income_share)

  - name: maine_snap_excess_shelter_deduction
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: Maine Chapter 301 Section 555-5 and Chart 8, Excess Shelter Deduction cap
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-me/regulation/dhhs/ofi/chapter-301/block-134
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if snap_household_contains_elderly_or_disabled_member:
            maine_snap_excess_shelter_deduction_before_cap
          else:
            min(maine_snap_excess_shelter_deduction_before_cap, maine_snap_maximum_excess_shelter_deduction)
