        formula: |-
          maine_snap_full_standard_utility_allowance_state_option
          + maine_snap_non_heat_utility_allowance_state_option
          + maine_snap_phone_only_utility_allowance_state_option

  - name: maine_snap_homeless_shelter_deduction_entitled
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Maine Chapter 301 Section 555-5, Homeless Shelter Deduction
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-me/regulation/dhhs/ofi/chapter-301/block-134
              excerpt: "Households experiencing homelessness who incur or reasonably expect to incur shelter costs"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          snap_household_experiencing_homelessness
          and snap_household_incurs_or_reasonably_expects_shelter_costs_during_month

  - name: maine_snap_homeless_shelter_deduction
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: Maine Chapter 301 Section 555-5 and Chart 8, Homeless Shelter Deduction
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
