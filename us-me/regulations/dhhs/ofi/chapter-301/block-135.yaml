    upstream_source_check:
      status: delegated_parameter_source
      checked_paths:
        - us:regulations/7-cfr/273/9#snap_utility_allowance_for_shelter_costs
      rationale: |-
        7 CFR 273.9 delegates SNAP utility allowance treatment to state standards. Maine Chapter 301 sections 555-5 and 999-3 Chart 8 provide the state-specific utility allowance amounts, homeless deduction, and excess shelter cap encoded here.
  summary: |-
    Maine SNAP shelter deductions use a $1,096 Full Standard Utility Allowance, a $598 Non-Heat Utility Allowance, a $114 Phone Only Utility Allowance, a $198.99 homeless shelter deduction, and a $744 maximum shelter deduction unless the household includes an elderly member or a member with a disability.
