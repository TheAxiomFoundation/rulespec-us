  - name: adult_included_standard_of_need
    kind: derived
    entity: TanfUnit
    dtype: Money
    period: Month
    unit: USD
    source: TANF Rule 125A, Adult Included SON and special need housing addition
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-me/regulation/dhhs/ofi/chapter-331/tanf-rule-125a/maximum-benefit-and-standard-of-need
              excerpt: "Adult Included SON ... Add Member ... For Special Need Housing Households, add $300 to each figure."
    versions:
      - effective_from: '2021-10-01'
        formula: |-
          adult_included_standard_of_need_base[min(tanf_household_size, tanf_table_max_household_size)] + (max(0, tanf_household_size - tanf_table_max_household_size) * adult_included_standard_of_need_add_member) + (if household_has_special_need_housing: special_need_housing_addition else: 0)
