    kind: parameter
    dtype: Money
    unit: USD
    period: Year
    source: 36 M.R.S. § 5219-SS(1), (1-A), (2), (2-A), (3), (3-A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-me/statute/36/5219-SS
              excerpt: "equal to $300 for each"
    versions:
