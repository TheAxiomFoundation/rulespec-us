  - name: young_child_credit_multiplier
    kind: parameter
    dtype: Decimal
    period: Year
    source: 36 M.R.S. § 5219-SS(5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-me/statute/36/5219-SS
              excerpt: "has not attained 6 years of age before the end of the taxable year is multiplied by 2"
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          2
