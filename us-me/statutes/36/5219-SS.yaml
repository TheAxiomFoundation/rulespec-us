format: rulespec/v1
module:
  status: deferred
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-me/statute/36/5219-SS
  summary: |-
    For tax years beginning on or after January 1, 2018 and before January 1, 2026, resident, nonresident, and part-year resident individuals are allowed a $300 credit for each qualifying child and dependent for whom the taxpayer was eligible to claim the federal child tax credit under Code Section 24, subject to subsection 4 and prorated for nonresident and part-year resident taxpayers. For tax years beginning on or after January 1, 2026, the same structure applies for each dependent for whom the taxpayer was eligible to claim the federal personal exemption under Code Section 151 in an amount greater than $0. For tax years beginning before January 1, 2024, the credit may not reduce tax below zero; for tax years beginning on or after January 1, 2024, credits under subsections 1, 1-A, 3, and 3-A are refundable. For tax years beginning on or after January 1, 2025, the credit amount for each qualifying child and dependent under 6 years of age is multiplied by 2.
  deferred_outputs:
    - output: us-me:statutes/36/5219-SS#resident_child_and_dependent_credit
      reason: Depends on taxpayer eligibility to claim the federal child tax credit under Code Section 24, which is not available in copied RuleSpec context.
      source_values:
        - us-me:statutes/36/5219-SS#base_child_and_dependent_credit_amount
        - us-me:statutes/36/5219-SS#young_child_credit_multiplier
    - output: us-me:statutes/36/5219-SS#resident_dependent_credit
      reason: Depends on taxpayer eligibility to claim the federal personal exemption under Code Section 151 in an amount greater than $0, which is not available in copied RuleSpec context.
      source_values:
        - us-me:statutes/36/5219-SS#base_child_and_dependent_credit_amount
        - us-me:statutes/36/5219-SS#young_child_credit_multiplier
    - output: us-me:statutes/36/5219-SS#nonresident_child_and_dependent_credit
      reason: Depends on federal child tax credit eligibility under Code Section 24 and Maine adjusted gross income definitions under sections 5102 and 5122, none of which are available in copied RuleSpec context.
      source_values:
        - us-me:statutes/36/5219-SS#base_child_and_dependent_credit_amount
        - us-me:statutes/36/5219-SS#young_child_credit_multiplier
    - output: us-me:statutes/36/5219-SS#nonresident_dependent_credit
      reason: Depends on federal personal exemption eligibility under Code Section 151 and Maine adjusted gross income definitions under sections 5102 and 5122, none of which are available in copied RuleSpec context.
      source_values:
        - us-me:statutes/36/5219-SS#base_child_and_dependent_credit_amount
        - us-me:statutes/36/5219-SS#young_child_credit_multiplier
    - output: us-me:statutes/36/5219-SS#part_year_resident_child_and_dependent_credit
      reason: Depends on federal child tax credit eligibility under Code Section 24, part-year resident filing under section 5224-A, and Maine adjusted gross income definitions under sections 5102 and 5122, none of which are available in copied RuleSpec context.
      source_values:
        - us-me:statutes/36/5219-SS#base_child_and_dependent_credit_amount
        - us-me:statutes/36/5219-SS#young_child_credit_multiplier
    - output: us-me:statutes/36/5219-SS#part_year_resident_dependent_credit
      reason: Depends on federal personal exemption eligibility under Code Section 151, part-year resident filing under section 5224-A, and Maine adjusted gross income definitions under sections 5102 and 5122, none of which are available in copied RuleSpec context.
      source_values:
        - us-me:statutes/36/5219-SS#base_child_and_dependent_credit_amount
        - us-me:statutes/36/5219-SS#young_child_credit_multiplier
rules:
