    dtype: Money
    period: Year
    unit: USD
    source: Private reference calculation from the official 2026 estimated-tax schedule
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-nd/statute/57/57-38-30.3, excerpt: "corresponding to an individual's filing status used for federal income tax purposes"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if nd_pit_2026_filing_status_is_joint_or_surviving_spouse:
            nd_pit_2026_profile_candidate_joint_tax
          else: if nd_pit_2026_filing_status_is_married_separate:
            nd_pit_2026_profile_candidate_separate_tax
          else: if nd_pit_2026_filing_status_is_head_of_household:
            nd_pit_2026_profile_candidate_head_tax
          else:
