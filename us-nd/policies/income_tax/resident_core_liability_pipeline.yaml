inputs:
  - {name: nd_pit_2026_federal_taxable_income, entity: TaxUnit, dtype: Money, period: Year, unit: USD, description: Federal taxable income for the aligned full-year resident individual filing unit.}
  - {name: nd_pit_2026_is_full_year_resident_individual_return, entity: TaxUnit, dtype: Judgment, period: Year, description: Whether the filing unit is an individual full-year North Dakota resident return.}
  - {name: nd_pit_2026_filing_status_is_single, entity: TaxUnit, dtype: Judgment, period: Year, description: Whether the federal and state filing status is single.}
  - {name: nd_pit_2026_filing_status_is_joint_or_surviving_spouse, entity: TaxUnit, dtype: Judgment, period: Year, description: Whether the federal and state filing status is joint or qualifying surviving spouse.}
  - {name: nd_pit_2026_filing_status_is_joint_return, entity: TaxUnit, dtype: Judgment, period: Year, description: Whether the combined schedule status is specifically a married joint return rather than a qualifying surviving-spouse return.}
  - {name: nd_pit_2026_filing_status_is_married_separate, entity: TaxUnit, dtype: Judgment, period: Year, description: Whether the federal and state filing status is married filing separately.}
  - {name: nd_pit_2026_filing_status_is_head_of_household, entity: TaxUnit, dtype: Judgment, period: Year, description: Whether the federal and state filing status is head of household.}
  - {name: nd_pit_2026_us_obligation_interest_in_federal_taxable_income, entity: TaxUnit, dtype: Money, period: Year, unit: USD, description: United States obligation interest included in federal taxable income and exempt under subsection 2(a).}
  - {name: nd_pit_2026_federally_protected_income_in_federal_taxable_income, entity: TaxUnit, dtype: Money, period: Year, unit: USD, description: Other income included federally but exempt from state tax under federal law or constitutional authority.}
  - {name: nd_pit_2026_qualified_fund_exempt_distribution_in_federal_taxable_income, entity: TaxUnit, dtype: Money, period: Year, unit: USD, description: Qualified-investment-fund distribution attributable to exempt obligations and included federally.}
  - {name: nd_pit_2026_pass_through_allocated_earnings_in_federal_taxable_income, entity: TaxUnit, dtype: Money, period: Year, unit: USD, description: Section 57-38-01.35 allocated earnings passed through and included federally.}
  - {name: nd_pit_2026_federal_net_long_term_capital_gain, entity: TaxUnit, dtype: Money, period: Year, unit: USD, description: Federal net long-term capital gain before the federal net short-term capital loss offset.}
  - {name: nd_pit_2026_federal_net_short_term_capital_loss, entity: TaxUnit, dtype: Money, period: Year, unit: USD, description: Federal net short-term capital loss used in the federal excess computation.}
  - {name: nd_pit_2026_net_long_term_capital_gain_allocated_to_nd, entity: TaxUnit, dtype: Money, period: Year, unit: USD, description: Net long-term capital gain allocated to North Dakota, which caps the otherwise allowable federal excess.}
  - {name: nd_pit_2026_allocated_qualified_dividends_taxed_below_regular_rates, entity: TaxUnit, dtype: Money, period: Year, unit: USD, description: North-Dakota-allocated qualified dividends taxed federally below ordinary rates.}
  - {name: nd_pit_2026_allocated_dividends_taxed_at_regular_rates, entity: TaxUnit, dtype: Money, period: Year, unit: USD, description: Allocated dividends to which subsection 2(d)(2)'s alternate thirty-percent rule applies.}
  - {name: nd_pit_2026_lump_sum_distribution_subject_to_income_averaging, entity: TaxUnit, dtype: Money, period: Year, unit: USD, description: Resident lump-sum distribution for which federal section 402 income averaging was elected.}
  - {name: nd_pit_2026_pass_through_allocated_losses, entity: TaxUnit, dtype: Money, period: Year, unit: USD, description: Section 57-38-01.35 allocated losses passed through to the taxpayer.}
  - {name: nd_pit_2026_qualifying_military_pay_in_federal_taxable_income, entity: TaxUnit, dtype: Money, period: Year, unit: USD, description: Statutorily qualifying military pay included in federal taxable income.}
  - {name: nd_pit_2026_new_expanding_business_exempt_income, entity: TaxUnit, dtype: Money, period: Year, unit: USD, description: Income exempt under section 40-57.1-04 and included in the federal starting amount.}
  - {name: nd_pit_2026_qualifying_veteran_payment_in_federal_taxable_income, entity: TaxUnit, dtype: Money, period: Year, unit: USD, description: Payment under sections 37-28-03 or 37-28-04 included federally.}
  - {name: nd_pit_2026_hard_to_fill_employer_payment_in_federal_taxable_income, entity: TaxUnit, dtype: Money, period: Year, unit: USD, description: Certified hard-to-fill employer payment included federally.}
  - {name: nd_pit_2026_bank_of_nd_higher_education_plan_contributions, entity: TaxUnit, dtype: Money, period: Year, unit: USD, description: Contributions to the Bank of North Dakota higher-education savings plan before the filing-status cap.}
  - {name: nd_pit_2026_qualifying_reservation_income_in_federal_taxable_income, entity: TaxUnit, dtype: Money, period: Year, unit: USD, description: Qualifying enrolled-tribal-member reservation-source income included federally.}
  - {name: nd_pit_2026_employer_education_reimbursement_in_federal_taxable_income, entity: TaxUnit, dtype: Money, period: Year, unit: USD, description: Employer-reimbursed higher or career-technical education expense reported as federal taxable income.}
  - {name: nd_pit_2026_military_retirement_benefits_in_federal_taxable_income, entity: TaxUnit, dtype: Money, period: Year, unit: USD, description: Qualifying retired military or survivor benefits included federally.}
  - {name: nd_pit_2026_social_security_benefits_in_federal_adjusted_gross_income, entity: TaxUnit, dtype: Money, period: Year, unit: USD, description: Social Security benefits included in federal adjusted gross income under IRC section 86.}
  - {name: nd_pit_2026_qualifying_law_enforcement_retirement_in_federal_taxable_income, entity: TaxUnit, dtype: Money, period: Year, unit: USD, description: Qualifying retired-law-enforcement benefits included federally.}
  - {name: nd_pit_2026_has_farm_income_averaging_election, entity: TaxUnit, dtype: Judgment, period: Year, description: Whether subsection 9 farm-income averaging applies; true invokes a prior-year computation hold.}
  - {name: nd_pit_2026_has_joint_deduction_recomputation_claim, entity: TaxUnit, dtype: Judgment, period: Year, description: Whether subsection 2(o)'s commissioner-prescribed joint deduction recomputation yields a claim.}
  - {name: nd_pit_2026_has_stillbirth_deduction_claim, entity: TaxUnit, dtype: Judgment, period: Year, description: Whether subsection 2(p)'s annually indexed stillbirth deduction applies.}
  - {name: nd_pit_2026_has_renaissance_zone_exemption, entity: TaxUnit, dtype: Judgment, period: Year, description: Whether the cross-title section 40-63-04 exemption applies.}
  - {name: nd_pit_2026_has_subsection_7_specialty_credit, entity: TaxUnit, dtype: Judgment, period: Year, description: Whether any specialty credit listed in subsection 7, including carryovers, applies.}
  - {name: nd_pit_2026_has_unresolved_refundable_credit, entity: TaxUnit, dtype: Judgment, period: Year, description: Whether the absent 2026 annual return identifies any refundable state income-tax credit applicable to the filing unit.}
  - {name: nd_pit_2026_has_living_organ_donation_expense_claim, entity: TaxUnit, dtype: Judgment, period: Year, description: Whether one or more organ-donation instances require the per-donor per-instance ten-thousand-dollar rule.}
  - {name: nd_pit_2026_has_planned_gift_credit_or_addback, entity: TaxUnit, dtype: Judgment, period: Year, description: Whether the planned-gift credit and its federally deducted contribution recomputation apply.}
  - {name: nd_pit_2026_has_other_state_income_tax_credit, entity: TaxUnit, dtype: Judgment, period: Year, description: Whether Schedule ND-1CR processing is required for one or more other jurisdictions.}
