  - name: nd_pit_2026_profile_candidate_single_tax
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Official 2026 Form ND-1ES single schedule
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-nd/statute/57/57-38-30.3, excerpt: "Single, other than head of household or surviving spouse"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if nd_pit_2026_profile_candidate_taxable_income <= nd_pit_2026_single_zero_ceiling: 0
          else: if nd_pit_2026_profile_candidate_taxable_income <= nd_pit_2026_single_top_threshold:
            nd_pit_2026_middle_rate * (nd_pit_2026_profile_candidate_taxable_income - nd_pit_2026_single_zero_ceiling)
          else:
            nd_pit_2026_single_top_base
            + nd_pit_2026_top_rate * (nd_pit_2026_profile_candidate_taxable_income - nd_pit_2026_single_top_threshold)

