format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_paths:
      - us-nd/statute/57/57-38-30.3
    upstream_source_check:
      status: checked_higher_authority
      checked_paths:
        - us-nd/statute/57
        - us-nd/statute/57/57-38-30.3
      rationale: |-
        The pinned official North Dakota Century Code chapter 57-38 and the
        Tax Commissioner's official 2026 Form ND-1ES jointly provide the
        federal-taxable-income starting point, the subsection 2 addition and
        subtraction inventory, the full-year resident other-jurisdiction
        credit statute, and the four 2026 estimated-tax schedules retained
        here only as private reference candidates.

        The pinned corpus does not contain the 2026 Form ND-1 annual return,
        its instructions, Schedule ND-1SA, Schedule ND-1CR, or the forms for
        the twenty-one specialty credits enumerated in subsection 7. It also
        lacks the Commissioner's 2026 indexed stillbirth deduction and
        marriage-penalty-credit amounts and the prescribed joint-deduction
        recomputation method. Section 57-38-30.3(10) also requires taxpayers
        to use any annual tax tables prescribed by the Commissioner, but no
        2026 annual table is pinned. Those branches are typed holds. No completed
        North Dakota income, taxable income, adjustment, credit, rate, or tax
        is accepted from the caller.
  summary: |-
    Tax-year-2026 North Dakota full-year-resident individual-income-tax core.
    It starts from federal taxable income and raw qualifying category facts,
    computes the directly source-grounded additions and reductions in
    N.D.C.C. section 57-38-30.3(2), and floors North Dakota taxable income at
    zero. The official 2026 estimated-tax schedules are retained as private
    diagnostics, not annual-return tax.

    The base profile excludes farm-income averaging, the prescribed
    joint-deduction recomputation, the indexed stillbirth deduction,
    renaissance-zone exemptions, other-jurisdiction credits, organ-donation
    claims, planned-gift claims, and completed legal-result inputs that cannot
    be derived from the available raw facts. Every ungated candidate amount is
    private. Public upstream income outputs use the base-profile gate. Public
    annual tax outputs return zero because the prescribed 2026 annual tax
    table, annual return chain, specialty-credit ordering, indexed amounts,
    and refundable-credit disposition are absent from the pinned corpus.
  deferred_outputs:
    - output: us-nd:policies/income_tax/resident_core_liability_pipeline#nd_pit_2026_complete_tax_after_nonrefundable_credits
      reason: |-
        The 2026 Form ND-1, Schedule ND-1CR, and specialty-credit forms are
        not pinned. Section 57-38-30.3(7) lists twenty-one credit families but
        does not establish their annual-return ordering or all operative
        commissioner-determined amounts.
      source_values:
        - us-nd:policies/income_tax/resident_core_liability_pipeline#nd_pit_2026_supported_profile_candidate_tax_after_nonrefundable_credits
    - output: us-nd:policies/income_tax/resident_core_liability_pipeline#nd_pit_2026_net_income_tax_liability
      reason: |-
        The final 2026 annual-return instructions are required to establish
        every nonrefundable and refundable credit line and ordering before a
        complete before-payments liability can be exposed.
      source_values:
        - us-nd:policies/income_tax/resident_core_liability_pipeline#nd_pit_2026_supported_profile_candidate_net_income_tax_liability

rules:
  - name: nd_pit_2026_input_domain_is_valid
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: Fail-closed domain for raw full-year-resident facts
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source: {corpus_citation_path: us-nd/statute/57/57-38-30.3, excerpt: "North Dakota taxable income means the federal taxable income"}
          - path: versions[0].formula
            kind: condition
            source: {corpus_citation_path: us-nd/statute/57/57-38-30.3, excerpt: "The same filing status used when filing federal income tax returns"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          (
            nd_pit_2026_filing_status_is_single
            or nd_pit_2026_filing_status_is_joint_or_surviving_spouse
            or nd_pit_2026_filing_status_is_married_separate
            or nd_pit_2026_filing_status_is_head_of_household
          )
          and not (
            nd_pit_2026_filing_status_is_single
            and (
              nd_pit_2026_filing_status_is_joint_or_surviving_spouse
              or nd_pit_2026_filing_status_is_married_separate
              or nd_pit_2026_filing_status_is_head_of_household
            )
          )
          and not (
            nd_pit_2026_filing_status_is_joint_or_surviving_spouse
            and (
              nd_pit_2026_filing_status_is_married_separate
              or nd_pit_2026_filing_status_is_head_of_household
            )
          )
          and not (
            nd_pit_2026_filing_status_is_married_separate
            and nd_pit_2026_filing_status_is_head_of_household
          )
          and (
            not nd_pit_2026_filing_status_is_joint_return
            or nd_pit_2026_filing_status_is_joint_or_surviving_spouse
          )
          and nd_pit_2026_us_obligation_interest_in_federal_taxable_income >= 0
          and nd_pit_2026_federally_protected_income_in_federal_taxable_income >= 0
          and nd_pit_2026_qualified_fund_exempt_distribution_in_federal_taxable_income >= 0
          and nd_pit_2026_pass_through_allocated_earnings_in_federal_taxable_income >= 0
          and nd_pit_2026_federal_net_long_term_capital_gain >= 0
          and nd_pit_2026_federal_net_short_term_capital_loss >= 0
          and nd_pit_2026_net_long_term_capital_gain_allocated_to_nd >= 0
          and nd_pit_2026_allocated_qualified_dividends_taxed_below_regular_rates >= 0
          and nd_pit_2026_allocated_dividends_taxed_at_regular_rates >= 0
          and nd_pit_2026_lump_sum_distribution_subject_to_income_averaging >= 0
          and nd_pit_2026_pass_through_allocated_losses >= 0
          and nd_pit_2026_qualifying_military_pay_in_federal_taxable_income >= 0
          and nd_pit_2026_new_expanding_business_exempt_income >= 0
          and nd_pit_2026_qualifying_veteran_payment_in_federal_taxable_income >= 0
          and nd_pit_2026_hard_to_fill_employer_payment_in_federal_taxable_income >= 0
          and nd_pit_2026_bank_of_nd_higher_education_plan_contributions >= 0
          and nd_pit_2026_qualifying_reservation_income_in_federal_taxable_income >= 0
          and nd_pit_2026_employer_education_reimbursement_in_federal_taxable_income >= 0
          and nd_pit_2026_military_retirement_benefits_in_federal_taxable_income >= 0
          and nd_pit_2026_social_security_benefits_in_federal_adjusted_gross_income >= 0
          and nd_pit_2026_qualifying_law_enforcement_retirement_in_federal_taxable_income >= 0

  - name: nd_pit_2026_base_profile_applies
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: Source-readiness status for the bounded resident core
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source: {corpus_citation_path: us-nd/statute/57/57-38-30.3, excerpt: "A tax is hereby imposed for each taxable year"}
          - path: versions[0].formula
            kind: exception
            source: {corpus_citation_path: us-nd/statute/57/57-38-30.3, excerpt: "If an individual taxpayer engaged in a farming business elects to average farm income"}
          - path: versions[0].formula
            kind: exception
            source: {corpus_citation_path: us-nd/statute/57/57-38-30.3, excerpt: "Married individuals filing jointly shall compute the available reduction"}
          - path: versions[0].formula
            kind: exception
            source: {corpus_citation_path: us-nd/statute/57/57-38-30.3, excerpt: "the deduction amount must be adjusted annually"}
          - path: versions[0].formula
            kind: exception
            source: {corpus_citation_path: us-nd/statute/57/57-38-30.3, excerpt: "entitled to the following tax credits"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          nd_pit_2026_input_domain_is_valid
          and nd_pit_2026_is_full_year_resident_individual_return
          and not nd_pit_2026_has_farm_income_averaging_election
          and not nd_pit_2026_has_joint_deduction_recomputation_claim
          and not nd_pit_2026_has_stillbirth_deduction_claim
          and not nd_pit_2026_has_renaissance_zone_exemption
          and not nd_pit_2026_has_subsection_7_specialty_credit
          and not nd_pit_2026_has_unresolved_refundable_credit
          and not nd_pit_2026_has_living_organ_donation_expense_claim
          and not nd_pit_2026_has_planned_gift_credit_or_addback
          and not nd_pit_2026_has_other_state_income_tax_credit
          and nd_pit_2026_federally_protected_income_in_federal_taxable_income == 0
          and nd_pit_2026_qualified_fund_exempt_distribution_in_federal_taxable_income == 0
          and nd_pit_2026_pass_through_allocated_earnings_in_federal_taxable_income == 0
          and nd_pit_2026_allocated_qualified_dividends_taxed_below_regular_rates == 0
          and nd_pit_2026_allocated_dividends_taxed_at_regular_rates == 0
          and nd_pit_2026_lump_sum_distribution_subject_to_income_averaging == 0
          and nd_pit_2026_pass_through_allocated_losses == 0
          and nd_pit_2026_qualifying_military_pay_in_federal_taxable_income == 0
          and nd_pit_2026_new_expanding_business_exempt_income == 0
          and nd_pit_2026_qualifying_veteran_payment_in_federal_taxable_income == 0
          and nd_pit_2026_hard_to_fill_employer_payment_in_federal_taxable_income == 0
          and nd_pit_2026_qualifying_reservation_income_in_federal_taxable_income == 0
          and nd_pit_2026_employer_education_reimbursement_in_federal_taxable_income == 0
          and nd_pit_2026_military_retirement_benefits_in_federal_taxable_income == 0
          and nd_pit_2026_social_security_benefits_in_federal_adjusted_gross_income == 0
          and nd_pit_2026_qualifying_law_enforcement_retirement_in_federal_taxable_income == 0

  - name: nd_pit_2026_annual_tax_table_authority_is_complete
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: Typed source hold for the Commissioner's prescribed 2026 annual tax table
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source: {corpus_citation_path: us-nd/statute/57/57-38-30.3, excerpt: "tax commissioner may prescribe tax tables"}
    versions:
      - {effective_from: '2026-01-01', effective_to: '2026-12-31', formula: 'false'}

  - name: nd_pit_2026_supported_profile_applies
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: Annual-liability source-readiness status
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source: {corpus_citation_path: us-nd/statute/57/57-38-30.3, excerpt: "tax commissioner may prescribe tax tables"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: 'false'

  - name: nd_pit_2026_capital_gain_reduction_rate
    kind: parameter
    dtype: Rate
    period: Year
    source: N.D.C.C. section 57-38-30.3(2)(d)(1)
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source: {corpus_citation_path: us-nd/statute/57/57-38-30.3, excerpt: "Reduced by forty percent of"}
    versions:
      - {effective_from: '2026-01-01', effective_to: '2026-12-31', formula: '0.40'}

  - name: nd_pit_2026_regular_rate_dividend_reduction_rate
    kind: parameter
    dtype: Rate
    period: Year
    source: N.D.C.C. section 57-38-30.3(2)(d)(2)
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source: {corpus_citation_path: us-nd/statute/57/57-38-30.3, excerpt: "reduction allowed under this subdivision is equal to thirty percent"}
    versions:
      - {effective_from: '2026-01-01', effective_to: '2026-12-31', formula: '0.30'}

  - name: nd_pit_2026_education_plan_single_cap
    kind: parameter
    dtype: Money
    period: Year
    unit: USD
    source: N.D.C.C. section 57-38-30.3(2)(m)
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source: {corpus_citation_path: us-nd/statute/57/57-38-30.3, excerpt: "maximum of five thousand dollars, or ten thousand dollars if a joint return"}
    versions:
      - {effective_from: '2026-01-01', effective_to: '2026-12-31', formula: '5000'}

  - name: nd_pit_2026_education_plan_joint_cap
    kind: parameter
    dtype: Money
    period: Year
    unit: USD
    source: N.D.C.C. section 57-38-30.3(2)(m)
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source: {corpus_citation_path: us-nd/statute/57/57-38-30.3, excerpt: "ten thousand dollars if a joint return is filed"}
    versions:
      - {effective_from: '2026-01-01', effective_to: '2026-12-31', formula: '10000'}

  - name: nd_pit_2026_profile_candidate_additions
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: N.D.C.C. section 57-38-30.3(2)(e) and (f)
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-nd/statute/57/57-38-30.3, excerpt: "Increased by the amount of a lump sum distribution"}
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-nd/statute/57/57-38-30.3, excerpt: "Increased by an amount equal to the losses that are passed through"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          nd_pit_2026_lump_sum_distribution_subject_to_income_averaging
          + nd_pit_2026_pass_through_allocated_losses

  - name: nd_pit_2026_profile_candidate_capital_and_dividend_reduction
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: N.D.C.C. section 57-38-30.3(2)(d)
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-nd/statute/57/57-38-30.3, excerpt: "excess of the taxpayer's net long-term capital gain"}
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-nd/statute/57/57-38-30.3, excerpt: "Qualified dividends as defined under Internal Revenue Code section"}
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-nd/statute/57/57-38-30.3, excerpt: "if taxed at a federal income tax rate that is lower"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          nd_pit_2026_capital_gain_reduction_rate
            * max(
              0,
              min(
                nd_pit_2026_federal_net_long_term_capital_gain
                  - nd_pit_2026_federal_net_short_term_capital_loss,
                nd_pit_2026_net_long_term_capital_gain_allocated_to_nd
              )
            )
          + nd_pit_2026_capital_gain_reduction_rate
            * nd_pit_2026_allocated_qualified_dividends_taxed_below_regular_rates
          + nd_pit_2026_regular_rate_dividend_reduction_rate
            * nd_pit_2026_allocated_dividends_taxed_at_regular_rates

  - name: nd_pit_2026_profile_candidate_education_plan_reduction
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: N.D.C.C. section 57-38-30.3(2)(m)
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-nd/statute/57/57-38-30.3, excerpt: "contributions made under a higher education savings plan"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if nd_pit_2026_filing_status_is_joint_return:
            min(nd_pit_2026_bank_of_nd_higher_education_plan_contributions, nd_pit_2026_education_plan_joint_cap)
          else:
            min(nd_pit_2026_bank_of_nd_higher_education_plan_contributions, nd_pit_2026_education_plan_single_cap)

  - name: nd_pit_2026_profile_candidate_reductions
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: N.D.C.C. section 57-38-30.3(2)(a)-(d), (g)-(i), and (k)-(t)
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-nd/statute/57/57-38-30.3, excerpt: "Reduced by interest income from obligations of the United States"}
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-nd/statute/57/57-38-30.3, excerpt: "Reduced by the portion of a distribution from a qualified investment fund"}
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-nd/statute/57/57-38-30.3, excerpt: "Reduced by the amount equal to the earnings that are passed through"}
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-nd/statute/57/57-38-30.3, excerpt: "Reduced by the amount of military pay received"}
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-nd/statute/57/57-38-30.3, excerpt: "Reduced by income from a new and expanding business"}
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-nd/statute/57/57-38-30.3, excerpt: "Reduced by the amount of any payment received by a veteran"}
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-nd/statute/57/57-38-30.3, excerpt: "Reduced by the amount received by a taxpayer"}
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-nd/statute/57/57-38-30.3, excerpt: "income of a taxpayer, who resides anywhere within the exterior boundaries"}
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-nd/statute/57/57-38-30.3, excerpt: "expenses incurred by an employee which are directly related"}
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-nd/statute/57/57-38-30.3, excerpt: "retired military personnel benefits"}
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-nd/statute/57/57-38-30.3, excerpt: "social security benefits included in a taxpayer's federal adjusted gross income"}
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-nd/statute/57/57-38-30.3, excerpt: "retired law enforcement personnel benefits"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          nd_pit_2026_us_obligation_interest_in_federal_taxable_income
          + nd_pit_2026_federally_protected_income_in_federal_taxable_income
          + nd_pit_2026_qualified_fund_exempt_distribution_in_federal_taxable_income
          + nd_pit_2026_pass_through_allocated_earnings_in_federal_taxable_income
          + nd_pit_2026_profile_candidate_capital_and_dividend_reduction
          + nd_pit_2026_qualifying_military_pay_in_federal_taxable_income
          + nd_pit_2026_new_expanding_business_exempt_income
          + nd_pit_2026_qualifying_veteran_payment_in_federal_taxable_income
          + nd_pit_2026_hard_to_fill_employer_payment_in_federal_taxable_income
          + nd_pit_2026_profile_candidate_education_plan_reduction
          + nd_pit_2026_qualifying_reservation_income_in_federal_taxable_income
          + nd_pit_2026_employer_education_reimbursement_in_federal_taxable_income
          + nd_pit_2026_military_retirement_benefits_in_federal_taxable_income
          + nd_pit_2026_social_security_benefits_in_federal_adjusted_gross_income
          + nd_pit_2026_qualifying_law_enforcement_retirement_in_federal_taxable_income

  - name: nd_pit_2026_profile_candidate_state_income_after_additions
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: N.D.C.C. section 57-38-30.3(2)
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-nd/statute/57/57-38-30.3, excerpt: "federal taxable income of an individual"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: nd_pit_2026_federal_taxable_income + nd_pit_2026_profile_candidate_additions

  - name: nd_pit_2026_profile_candidate_taxable_income
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: N.D.C.C. section 57-38-30.3(2)
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-nd/statute/57/57-38-30.3, excerpt: "North Dakota taxable income means the federal taxable income"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: max(0, nd_pit_2026_profile_candidate_state_income_after_additions - nd_pit_2026_profile_candidate_reductions)

  - name: nd_pit_2026_middle_rate
    kind: parameter
    dtype: Rate
    period: Year
    source: Official 2026 Form ND-1ES schedules
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source: {corpus_citation_path: us-nd/statute/57/57-38-30.3, excerpt: "$0.00 + 1.95%"}
    versions:
      - {effective_from: '2026-01-01', effective_to: '2026-12-31', formula: '0.0195'}

  - name: nd_pit_2026_top_rate
    kind: parameter
    dtype: Rate
    period: Year
    source: Official 2026 Form ND-1ES schedules
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source: {corpus_citation_path: us-nd/statute/57/57-38-30.3, excerpt: "$3,916.09 + 2.50%"}
    versions:
      - {effective_from: '2026-01-01', effective_to: '2026-12-31', formula: '0.025'}

  - name: nd_pit_2026_single_zero_ceiling
    kind: parameter
    dtype: Money
    period: Year
    unit: USD
    source: Official 2026 Form ND-1ES single schedule
    metadata: {private: true, proof: {atoms: [{path: 'versions[0].formula', kind: amount, source: {corpus_citation_path: us-nd/statute/57/57-38-30.3, excerpt: "$0 | $49,575"}}]}}
    versions:
      - {effective_from: '2026-01-01', effective_to: '2026-12-31', formula: '49575'}

  - name: nd_pit_2026_single_top_threshold
    kind: parameter
    dtype: Money
    period: Year
    unit: USD
    source: Official 2026 Form ND-1ES single schedule
    metadata: {private: true, proof: {atoms: [{path: 'versions[0].formula', kind: amount, source: {corpus_citation_path: us-nd/statute/57/57-38-30.3, excerpt: "$49,575 | $250,400"}}]}}
    versions:
      - {effective_from: '2026-01-01', effective_to: '2026-12-31', formula: '250400'}

