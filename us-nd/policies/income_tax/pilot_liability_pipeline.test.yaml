    us-nd:policies/income_tax/pilot_liability_pipeline#input.nd_pit_pilot_supplied_marginal_rate: 0.0195
  output:
    us-nd:policies/income_tax/pilot_liability_pipeline#nd_pit_pilot_taxable_income: '133900'
