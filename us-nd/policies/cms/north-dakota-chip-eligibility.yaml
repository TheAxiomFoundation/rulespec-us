module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/form/cms/medicaid-chip-bhp-eligibility-levels
  summary: |-
    North Dakota CHIP eligibility composition applies the federal CHIP child and standard-pregnant eligibility framework to the CMS state eligibility-level outputs. It intentionally does not encode FCEP state income limits until primary state-plan or CMS source coverage is available.
