format: rulespec/v1
imports:
  - us:statutes/42/1397jj/c/1#child
  - us-ct:policies/cms/connecticut-medicaid-chip-bhp-eligibility-levels#connecticut_children_separate_chip_effective_fpl_limit
  - us-ct:policies/cms/connecticut-medicaid-chip-bhp-eligibility-levels#connecticut_pregnant_women_chip_available
  - us:policies/cms/medicaid-chip-bhp-eligibility-levels#magi_fpl_disregard_rate
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/form/cms/medicaid-chip-bhp-eligibility-levels
  summary: |-
    Connecticut CHIP eligibility composition applies the federal CHIP child and standard-pregnant eligibility framework to the CMS state eligibility-level outputs. It also applies the CMS CHIP FCEP SPA source for state-set coverage from conception to birth income eligibility.
rules:
  - name: connecticut_separate_chip_child_eligibility_available
    kind: derived
    dtype: Boolean
    period: Year
    source: CMS Medicaid, CHIP and BHP Eligibility Levels table, Connecticut row
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/1397ll/d/2
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/regulation/42/457/10
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/form/cms/medicaid-chip-bhp-eligibility-levels
              excerpt: "Children Separate CHIP"
    versions:
      - effective_from: '2023-12-01'
        formula: |-
          true
  - name: is_chip_eligible_child
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 42 USC 1397jj(b)(1), 42 USC 1397jj(c)(1), and CMS state CHIP eligibility levels
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/42/1397jj/c/1#child
              output: child
              hash: sha256:5983f9bd1c30a824da826ee4bc8fc3351cd2c631d4a0ce198b156446493ef9e0
          - path: versions[0].formula
            kind: import
            import:
              target: us-ct:policies/cms/connecticut-medicaid-chip-bhp-eligibility-levels#connecticut_children_separate_chip_effective_fpl_limit
              output: connecticut_children_separate_chip_effective_fpl_limit
              hash: sha256:7951caaaf963c070665958e63fe888f2f42281139aa4f2932067b815771468cd
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/1397jj/b/1
              excerpt: "not found eligible for medical assistance under subchapter XIX"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/form/cms/medicaid-chip-bhp-eligibility-levels
              excerpt: "Children Separate CHIP"
    versions:
      - effective_from: '2023-12-01'
        formula: |-
          child
          and person_meets_chip_immigration_requirement
          and not found_eligible_for_medical_assistance_under_subchapter_xix
          and medicaid_income_level <= connecticut_children_separate_chip_effective_fpl_limit
  - name: connecticut_standard_pregnant_chip_eligibility_available
    kind: derived
    dtype: Boolean
    period: Year
    source: CMS Medicaid, CHIP and BHP Eligibility Levels table, Connecticut row
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: import
            import:
              target: us-ct:policies/cms/connecticut-medicaid-chip-bhp-eligibility-levels#connecticut_pregnant_women_chip_available
              output: connecticut_pregnant_women_chip_available
              hash: sha256:7951caaaf963c070665958e63fe888f2f42281139aa4f2932067b815771468cd
    versions:
      - effective_from: '2023-12-01'
        formula: |-
          connecticut_pregnant_women_chip_available
  - name: is_chip_eligible_standard_pregnant_person
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 42 USC 1397ll(d)(2) and CMS state CHIP eligibility levels
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/form/cms/medicaid-chip-bhp-eligibility-levels
              excerpt: "Pregnant Women CHIP"
    versions:
      - effective_from: '2023-12-01'
        formula: |-
          false
  - name: connecticut_fcep_eligibility_available
    kind: derived
    dtype: Boolean
    period: Year
    source: CMS CHIP FCEP SPA source, Connecticut
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/policy/cms/chip-spa/ct/ct-22-0001-and-ct-22-0001-chip/pdf/page-2
              excerpt: "Through these SPAs, Connecticut extends CHIP eligibility to children from conception to the end of pregnancy (otherwise known as “unborn”) whose parents are not otherwise eligible for Medicaid or CHIP with incomes up to and including 258 percent of the federal poverty level (FPL)."
    versions:
      - effective_from: '2022-04-01'
        formula: |-
          true
  - name: connecticut_fcep_fpl_limit
    kind: parameter
    dtype: Rate
    period: Year
    source: CMS CHIP FCEP SPA source, Connecticut
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/policy/cms/chip-spa/ct/ct-22-0001-and-ct-22-0001-chip/pdf/page-2
              excerpt: "Through these SPAs, Connecticut extends CHIP eligibility to children from conception to the end of pregnancy (otherwise known as “unborn”) whose parents are not otherwise eligible for Medicaid or CHIP with incomes up to and including 258 percent of the federal poverty level (FPL)."
    versions:
      - effective_from: '2022-04-01'
        formula: |-
          2.58
  - name: connecticut_fcep_effective_fpl_limit
    kind: derived
    dtype: Rate
    period: Year
    source: CMS CHIP FCEP SPA source, Connecticut, including the MAGI 5% FPL disregard
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: import
            import:
              target: us:policies/cms/medicaid-chip-bhp-eligibility-levels#magi_fpl_disregard_rate
              output: magi_fpl_disregard_rate
              hash: sha256:ea0071602a4a4441e584a16bdbab3d8a3c36b40b7cea1151165533669423f5f5
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/regulation/42/435/603/d
              excerpt: "5 percentage points of the Federal poverty level"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/policy/cms/chip-spa/ct/ct-22-0001-and-ct-22-0001-chip/pdf/page-2
              excerpt: "Through these SPAs, Connecticut extends CHIP eligibility to children from conception to the end of pregnancy (otherwise known as “unborn”) whose parents are not otherwise eligible for Medicaid or CHIP with incomes up to and including 258 percent of the federal poverty level (FPL)."
    versions:
      - effective_from: '2022-04-01'
        formula: |-
          connecticut_fcep_fpl_limit + magi_fpl_disregard_rate
  - name: is_chip_fcep_eligible_person
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 42 USC 1397ll(f)(1), 42 CFR 457.10, and CMS CHIP FCEP SPA source for Connecticut
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/policy/cms/chip-spa/ct/ct-22-0001-and-ct-22-0001-chip/pdf/page-2
              excerpt: "Through these SPAs, Connecticut extends CHIP eligibility to children from conception to the end of pregnancy (otherwise known as “unborn”) whose parents are not otherwise eligible for Medicaid or CHIP with incomes up to and including 258 percent of the federal poverty level (FPL)."
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/1397ll/f/1
              excerpt: "through the application of sections 457.10"
    versions:
      - effective_from: '2022-04-01'
        formula: |-
          person_is_pregnant
          and not found_eligible_for_medical_assistance_under_subchapter_xix
          and medicaid_income_level <= connecticut_fcep_effective_fpl_limit
