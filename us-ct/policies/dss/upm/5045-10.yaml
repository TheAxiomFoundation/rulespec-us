format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ct/policy/dss/upm/5045.10/block-1
  summary: |-
    Except for determining AABD eligibility and benefit amounts for individuals residing in long term care facilities, applied earned income is calculated for aged or disabled individuals by reducing monthly earnings by self-employment expenses, $65.00, eligible impairment-related expenses, 1/2 of the remaining difference, and qualifying approved self-support-plan earned income. For blind individuals, the method uses self-employment expenses, $85.00, 1/2 of the remaining difference, personal employment expenses, eligible blind work expenses, and qualifying approved self-support-plan earned income. Applied unearned income is gross unearned income reduced by the appropriate living-arrangement disregard and self-support-plan expenses. Total applied income is the sum of applied earnings, applied unearned income, and the amount deemed.
imports:
  - us-ct:policies/dss/upm/4520-20#assistance_unit_resides_in_long_term_care_facility
  - us-ct:policies/dss/upm/5030-10#aged_disabled_general_monthly_base_disregard
  - us-ct:policies/dss/upm/5030-10#blind_monthly_base_disregard
  - us-ct:policies/dss/upm/5030-10#remaining_earned_income_disregard_rate
