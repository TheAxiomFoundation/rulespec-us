  - name: reasonable_boarder_compensation_more_than_two_meals_per_day
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: DSS SNAP tables, Reasonable Room and Board Compensation
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
