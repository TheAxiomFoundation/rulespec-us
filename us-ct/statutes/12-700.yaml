format: rulespec/v1
module:
  status: deferred
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ct/statute/12-700
  summary: |-
    Connecticut imposes resident, nonresident, and part-year resident income tax. Subsection (d) provides that chapter provisions apply with respect to any person, trust or estate, and that references to "any person" include any trust and any estate unless the context could not apply to a trust or estate.
  deferred_outputs:
    - output: us-ct:statutes/12-700/a#resident_connecticut_income_tax
      reason: >
        The resident tax schedules depend on upstream federal filing-status classifications and multiple Connecticut tax-base concepts that are not available as copied RuleSpec imports for this target. Encoding would otherwise require prohibited local filing-status inputs and a large temporal bracket table without the needed upstream return-status sources.
    - output: us-ct:statutes/12-700/b#nonresident_connecticut_income_tax
      reason: >
        The nonresident tax is computed from the resident tax as if the nonresident were a resident, then apportioned by Connecticut adjusted gross income. The resident tax dependency is deferred and the required Connecticut adjusted gross income and exemption mechanics are not available as copied executable imports.
    - output: us-ct:statutes/12-700/c#part_year_resident_connecticut_income_tax
      reason: >
        The part-year resident tax is computed from the resident tax as if the part-year resident were a resident, then apportioned by Connecticut-source adjusted gross income and accrual adjustments under section 12-717. The resident tax and cited adjustment mechanics are not available as copied executable imports.
    - output: us-ct:statutes/12-700/d#person_trust_or_estate_chapter_applicability
      reason: >
        Subsection (d) is a broad chapter-wide interpretive applicability clause for persons, trusts, and estates. It does not itself define a computable amount, rate, threshold, eligibility test, or relation that can be encoded as an executable RuleSpec output without the chapter provisions it modifies.
rules: []
