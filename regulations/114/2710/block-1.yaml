  summary: |-
    The Department of Social Services is designated by USDA as the single State agency to administer the Food Stamp Program under 7 CFR Parts 210-299. Part 274 contains options for issuance of food stamp benefits. These State regulations describe issuance of food stamp benefits using an Electronic Benefits Transfer System, as permitted by 7 CFR Part 274. Statewide implementation of EBT was accomplished on December 1, 1995. 7 CFR Part 278 is also referenced.
