  summary: |-
    SCDSS issues food stamp benefits to eligible households through its EBT system, credits EBT accounts based on eligibility data, debits accounts based on food purchase transactions at authorized retailers, and contracts with an EBT Contractor for the majority of EBT Services. This is an administrative/operational description without a computable policy condition.
