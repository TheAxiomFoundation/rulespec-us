  summary: |-
    Section 099 (Signatures): Applicants/recipients may sign by handwritten, electronic, or telephonically recorded representation of name. Section 100 (Application): Household or authorized representative must complete and file application, complete interview, and verify information; no age requirement; Department grants Food Stamps back to date of application. Section 101 (Application Forms): Households can file the day they contact the Department; AFA available on request by phone, in person, or through another person; mailed or given same day. Section 103 (Filing an Application): AFA must contain applicant's name, address, signature, and application date; page one of AFA filed at Food Stamp office protects application date; first month prorated from application date; AFA may be submitted by household or authorized representative at field office, by mail, fax, or email. Also includes acronym definitions: SAVE, SDX, SQC, SUA, SSA, SSI, SSN, TAFI, TOP, TUA, UI, USDA, VA, WIOA; Sections 015-098 and 102 reserved.
