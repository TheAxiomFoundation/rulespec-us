format: rulespec/v1
module:
  summary: |-
    7 CFR 273.24 limits SNAP eligibility for able-bodied adults unless they
    fulfill the ABAWD work requirement, qualify for an exception or waiver,
    have not exceeded the countable-month limit, or have regained eligibility.
    This module composes that time-limit rule with the general work
    requirement in 7 CFR 273.7.
  source_verification:
    corpus_citation_path: us/regulation/7/273/24
imports:
  - us:regulations/7-cfr/273/7
rules:
  - name: snap_member_abawd_fulfilling_work_requirement
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 7 CFR 273.24(a)(1)
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          member_abawd_weekly_work_hours >= 20
          or member_abawd_monthly_work_hours >= 80
          or member_participates_in_abawd_work_program_20_hours_weekly
          or member_combines_work_and_work_program_20_hours_weekly
          or member_participates_in_abawd_workfare_program
  - name: snap_member_abawd_exception_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 7 CFR 273.24(c)
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          member_age < 18
          or member_age >= 55
          or member_medically_certified_physically_or_mentally_unfit_for_employment
          or member_is_parent_of_household_member_under_age_eighteen
          or member_resides_with_household_member_under_age_eighteen
          or snap_member_general_work_requirement_exempt
          or member_is_pregnant
          or member_is_homeless
          or member_is_veteran
          or member_age_24_or_younger_and_was_in_foster_care_on_attaining_age_18
  - name: snap_member_abawd_time_limit_inapplicable
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 7 CFR 273.24(b)(1), 7 CFR 273.24(c), 7 CFR 273.24(f)
    versions:
      - effective_from: '2025-10-01'
        formula: snap_member_abawd_exception_applies or member_covered_by_abawd_time_limit_waiver
  - name: snap_member_abawd_countable_month_limit_exceeded
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 7 CFR 273.24(b)
    versions:
      - effective_from: '2025-10-01'
        formula: snap_abawd_countable_months_in_three_year_period > 3
  - name: snap_member_abawd_regained_or_additional_eligibility
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 7 CFR 273.24(d), 7 CFR 273.24(e)
    versions:
      - effective_from: '2025-10-01'
        formula: member_regained_abawd_eligibility or member_has_additional_three_month_abawd_eligibility
  - name: snap_member_abawd_time_limit_eligible
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 7 CFR 273.24(a)-(f)
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          snap_member_abawd_time_limit_inapplicable
          or snap_member_abawd_fulfilling_work_requirement
          or not snap_member_abawd_countable_month_limit_exceeded
          or snap_member_abawd_regained_or_additional_eligibility
  - name: snap_member_work_requirement_eligible
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 7 CFR 273.7, 7 CFR 273.24
    versions:
      - effective_from: '2025-10-01'
        formula: snap_member_general_work_requirement_eligible and snap_member_abawd_time_limit_eligible
  - name: snap_member_work_requirement_ineligible
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 7 CFR 273.7, 7 CFR 273.24
    versions:
      - effective_from: '2025-10-01'
        formula: not snap_member_work_requirement_eligible
