- name: all_member_pa_or_ssi_household_is_regular_categorically_eligible
  period: 2026-01
  input: &base_regular_categorical_case
    us:regulations/7-cfr/273/2/j#input.household_all_members_receive_or_authorized_pa_or_ssi: true
    us:regulations/7-cfr/273/2/j#input.household_all_members_receive_or_authorized_tanf_cash_assistance: false
    us:regulations/7-cfr/273/2/j#input.household_all_members_receive_or_authorized_qualifying_tanf_non_cash_assistance: false
    us:regulations/7-cfr/273/2/j#input.household_member_disqualified_for_intentional_program_violation: false
    us:regulations/7-cfr/273/2/j#input.household_member_failed_monthly_reporting_requirement: false
    us:regulations/7-cfr/273/2/j#input.entire_household_disqualified_for_workfare_noncompliance: false
    us:regulations/7-cfr/273/2/j#input.household_head_disqualified_for_work_requirement_noncompliance: false
    us:regulations/7-cfr/273/2/j#input.household_member_ineligible_due_to_drug_felony_fleeing_or_sentence_noncompliance: false
  output:
    us:regulations/7-cfr/273/2/j#snap_regular_categorical_pa_or_ssi_status: holds
    us:regulations/7-cfr/273/2/j#snap_regular_categorical_tanf_moe_status: not_holds
    us:regulations/7-cfr/273/2/j#snap_regular_categorical_disqualification_applies: not_holds
    us:regulations/7-cfr/273/2/j#snap_regular_categorically_eligible: holds

- name: single_ssi_member_does_not_create_all_member_pa_or_ssi_status
  period: 2026-01
  input:
    <<: *base_regular_categorical_case
    us:regulations/7-cfr/273/2/j#input.household_all_members_receive_or_authorized_pa_or_ssi: false
  output:
    us:regulations/7-cfr/273/2/j#snap_regular_categorical_pa_or_ssi_status: not_holds
    us:regulations/7-cfr/273/2/j#snap_regular_categorically_eligible: not_holds

- name: all_member_tanf_cash_household_is_regular_categorically_eligible
  period: 2026-01
  input:
    <<: *base_regular_categorical_case
    us:regulations/7-cfr/273/2/j#input.household_all_members_receive_or_authorized_pa_or_ssi: false
    us:regulations/7-cfr/273/2/j#input.household_all_members_receive_or_authorized_tanf_cash_assistance: true
  output:
    us:regulations/7-cfr/273/2/j#snap_regular_categorical_tanf_moe_status: holds
    us:regulations/7-cfr/273/2/j#snap_regular_categorically_eligible: holds

- name: disqualification_blocks_regular_categorical_eligibility
  period: 2026-01
  input:
    <<: *base_regular_categorical_case
    us:regulations/7-cfr/273/2/j#input.household_member_disqualified_for_intentional_program_violation: true
  output:
    us:regulations/7-cfr/273/2/j#snap_regular_categorical_pa_or_ssi_status: holds
    us:regulations/7-cfr/273/2/j#snap_regular_categorical_disqualification_applies: holds
    us:regulations/7-cfr/273/2/j#snap_regular_categorically_eligible: not_holds
