format: rulespec/v1
module:
  summary: |-
    7 CFR 273.2(j) defines SNAP categorical eligibility for households whose
    members receive or are authorized to receive qualifying public assistance,
    SSI, or TANF-funded cash, non-cash, in-kind benefits, or services. This
    module encodes the all-member regular categorical eligibility status and
    the categorical-eligibility disqualification bar, leaving GA and optional
    expanded categorical eligibility to separately sourced rules.
  source_verification:
    corpus_citation_path: us/regulation/7/273/2
rules:
  - name: snap_regular_categorical_pa_or_ssi_status
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 7 CFR 273.2(j)(2)(i)(A), (D)-(E)
    versions:
      - effective_from: '2025-10-01'
        formula: household_all_members_receive_or_authorized_pa_or_ssi
  - name: snap_regular_categorical_tanf_moe_status
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 7 CFR 273.2(j)(2)(i)(A)-(C)
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_all_members_receive_or_authorized_tanf_cash_assistance
          or household_all_members_receive_or_authorized_qualifying_tanf_non_cash_assistance
  - name: snap_regular_categorical_disqualification_applies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 7 CFR 273.2(j)(2)(vii)
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_member_disqualified_for_intentional_program_violation
          or household_member_failed_monthly_reporting_requirement
          or entire_household_disqualified_for_workfare_noncompliance
          or household_head_disqualified_for_work_requirement_noncompliance
          or household_member_ineligible_due_to_drug_felony_fleeing_or_sentence_noncompliance
  - name: snap_regular_categorically_eligible
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 7 CFR 273.2(j)(2)
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (
              snap_regular_categorical_pa_or_ssi_status
              or snap_regular_categorical_tanf_moe_status
          )
          and not snap_regular_categorical_disqualification_applies
