format: rulespec/v1
module:
  deferred_outputs:
    - output: us:regulations/7-cfr/273/9/b#household_income_inclusion_composition
      blocked_by:
        - us:regulations/7-cfr/273/9#household_income_composition_context
      reason: >-
        Paragraph (b) defines earned and unearned income included in household
        income. This module applies income eligibility standards to resolved
        gross and net income amounts; detailed income inclusion composition is
        deferred.
    - output: us:regulations/7-cfr/273/9/c#household_income_exclusion_composition
      blocked_by:
        - us:regulations/7-cfr/273/9#household_income_exclusion_context
      reason: >-
        Paragraph (c) lists income exclusions. This module consumes resolved
        gross and net income amounts; detailed exclusion treatment is deferred
        to the income composition layer.
  summary: |-
    7 CFR 273.9(a) sets the federal SNAP income eligibility standards.
    Households with an elderly or disabled member must meet the net income
    standard. Other non-categorically eligible households must meet both the
    gross income standard and the net income standard. Households with an
    elderly or disabled member also receive the full excess shelter deduction
    rather than the capped excess shelter deduction. The monthly gross and net
    standards are imported from the USDA FY 2026 income eligibility tables.
  source_verification:
    corpus_citation_path: us/regulation/7/273/9
imports:
  - us:statutes/7/2012/j
  - us:regulations/7-cfr/273/10
  - us:policies/usda/snap/fy-2026-cola/income-eligibility-standards
rules:
  - name: snap_standard_gross_income_eligible
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 7 CFR 273.9(a)(1)
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          snap_household_has_elderly_or_disabled_member
          or snap_total_gross_income <= snap_gross_income_limit_130_percent_fpl_48_states_dc
  - name: snap_standard_net_income_eligible
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 7 CFR 273.9(a)(2)
    versions:
      - effective_from: '2025-10-01'
        formula: snap_net_monthly_income <= snap_net_income_limit_100_percent_fpl_48_states_dc
  - name: snap_standard_income_eligible
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 7 CFR 273.9(a)
    versions:
      - effective_from: '2025-10-01'
        formula: snap_standard_gross_income_eligible and snap_standard_net_income_eligible
  - name: snap_full_excess_shelter_deduction_applies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 7 CFR 273.9(d)(6)(ii)
    versions:
      - effective_from: '2025-10-01'
        formula: snap_household_has_elderly_or_disabled_member
