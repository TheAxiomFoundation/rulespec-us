format: rulespec/v1
module:
  deferred_outputs:
    - output: us:regulations/7-cfr/273/8/d#jointly_owned_resource_countable_amount
      blocked_by:
        - us:regulations/7-cfr/273/8#household_countable_resource_composition
      reason: >-
        Paragraph (d) governs when jointly owned resources are available to a
        household and how to count accessible portions. This module consumes a
        resolved countable-resource total; jointly owned resource allocation is
        deferred to the resource composition layer.
    - output: us:regulations/7-cfr/273/8/e#excluded_resource_amount
      blocked_by:
        - us:regulations/7-cfr/273/8#household_resource_exclusion_composition
      reason: >-
        Paragraph (e) lists resources excluded from countable resources. This
        module applies the final resource limit to a resolved countable-resource
        amount; individual resource exclusions are deferred.
    - output: us:regulations/7-cfr/273/8/f#non_excluded_vehicle_resource_value
      blocked_by:
        - us:regulations/7-cfr/273/8#vehicle_resource_valuation_context
      reason: >-
        Paragraph (f) governs valuation of non-excluded vehicles. Vehicle
        valuation is part of countable-resource construction and is deferred
        from this top-level resource-limit module.
    - output: us:regulations/7-cfr/273/8/h#transfer_of_resources_ineligibility
      blocked_by:
        - us:regulations/7-cfr/273/8#resource_transfer_disqualification_context
      reason: >-
        Paragraph (h) governs transfers of resources and resulting
        disqualification periods. This module encodes resource eligibility
        against a countable-resource total; transfer-disqualification tracking
        is deferred.
  summary: |-
    7 CFR 273.8 sets SNAP resource eligibility standards. Categorically
    eligible households do not have to meet the resource limits or definitions
    in the section. Other households are resource eligible when countable
    liquid and non-liquid financial resources do not exceed the federally
    adjusted SNAP asset limit.
  source_verification:
    corpus_citation_path: us/regulation/7/273/8
imports:
  - us:policies/usda/snap/fy-2026-cola/deductions
rules:
  - name: snap_resource_limit_categorical_exemption_applies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 7 CFR 273.8(a)
    versions:
      - effective_from: '2025-10-01'
        formula: snap_categorically_eligible_for_resource_exemption
  - name: snap_financial_resources_within_limit
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 7 CFR 273.8(b)
    versions:
      - effective_from: '2025-10-01'
        formula: snap_countable_financial_resources <= snap_asset_limit
  - name: snap_resource_eligible
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 7 CFR 273.8(a), 7 CFR 273.8(b)
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          snap_resource_limit_categorical_exemption_applies
          or snap_financial_resources_within_limit
