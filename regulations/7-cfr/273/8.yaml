format: rulespec/v1
module:
  summary: |-
    7 CFR 273.8 sets SNAP resource eligibility standards. Categorically
    eligible households do not have to meet the resource limits or definitions
    in the section. Other households are resource eligible when countable
    liquid and non-liquid financial resources do not exceed the federally
    adjusted SNAP asset limit.
  source_verification:
    corpus_citation_path: us/regulation/7/273/8
imports:
  - us:policies/usda/snap/fy-2026-cola/deductions
rules:
  - name: snap_resource_limit_categorical_exemption_applies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 7 CFR 273.8(a)
    versions:
      - effective_from: '2025-10-01'
        formula: snap_categorically_eligible_for_resource_exemption
  - name: snap_financial_resources_within_limit
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 7 CFR 273.8(b)
    versions:
      - effective_from: '2025-10-01'
        formula: snap_countable_financial_resources <= snap_asset_limit
  - name: snap_resource_eligible
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 7 CFR 273.8(a), 7 CFR 273.8(b)
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          snap_resource_limit_categorical_exemption_applies
          or snap_financial_resources_within_limit
