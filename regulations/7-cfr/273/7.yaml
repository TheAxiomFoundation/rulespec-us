format: rulespec/v1
module:
  summary: |-
    7 CFR 273.7 makes non-exempt SNAP household members comply with general
    work requirements: registration, assigned E&T or workfare participation,
    employment-status cooperation, suitable-employment referrals and offers,
    and the voluntary-quit or work-effort-reduction rule. It exempts specified
    persons including children, older adults, persons unfit for work, caretakers,
    unemployment-compensation participants, treatment-program participants,
    workers meeting the 30-hour or minimum-wage earnings threshold, and
    qualifying half-time students.
  source_verification:
    corpus_citation_path: us/regulation/7/273/7
rules:
  - name: snap_member_general_work_requirement_exempt
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 7 CFR 273.7(b)(1)
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          member_age < 16
          or member_age >= 60
          or member_age_16_or_17_is_not_household_head_or_attends_school_or_training_half_time
          or member_physically_or_mentally_unfit_for_employment
          or member_subject_to_and_complying_with_title_iv_work_requirement
          or member_responsible_for_dependent_child_under_six_or_incapacitated_person
          or member_receiving_or_applying_for_unemployment_compensation_and_complying
          or member_regular_participant_in_drug_or_alcohol_treatment
          or member_weekly_work_hours >= 30
          or member_weekly_wages >= federal_or_state_minimum_wage * 30
          or migrant_or_seasonal_farmworker_under_contract_to_begin_employment_within_30_days
          or alaska_subsistence_hunts_or_fishes_30_hours_weekly
          or member_student_enrolled_at_least_half_time_and_student_eligible
  - name: snap_member_general_work_requirement_compliant
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 7 CFR 273.7(a)(1)
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          member_registered_for_work_or_registered_by_state
          and member_participated_in_snap_et_if_assigned
          and member_participated_in_workfare_if_assigned
          and member_provided_employment_status_or_availability_information
          and member_reported_to_referred_suitable_employer_if_referred
          and member_accepted_bona_fide_suitable_employment_offer_if_offered
          and not member_voluntarily_quit_or_reduced_work_below_30_hours_without_good_cause
  - name: snap_member_general_work_requirement_waived
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 7 CFR 273.7(a)(6)
    versions:
      - effective_from: '2025-10-01'
        formula: member_snap_work_requirements_waived_due_to_pending_ssi_joint_application
  - name: snap_member_general_work_requirement_eligible
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 7 CFR 273.7(a), 7 CFR 273.7(b)
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          snap_member_general_work_requirement_exempt
          or snap_member_general_work_requirement_waived
          or snap_member_general_work_requirement_compliant
