format: rulespec/v1
module:
  deferred_outputs:
    - output: us:regulations/7-cfr/273/7/c#state_agency_work_registration_responsibilities
      blocked_by:
        - us:regulations/7-cfr/273/7#state_agency_work_registration_workflow
      reason: >-
        Paragraph (c) governs State agency registration, notices, screening,
        and referral responsibilities. This module encodes person-level work
        requirement exemptions and compliance; registration administration is
        deferred until the State agency workflow is encoded.
    - output: us:regulations/7-cfr/273/7/d#employment_and_training_federal_financial_participation
      blocked_by:
        - us:regulations/7-cfr/273/7#state_agency_et_grant_administration
      reason: >-
        Paragraph (d) governs Federal financial participation and grants for
        E&T programs. This module does not encode grant allocation or State
        administrative funding rules.
    - output: us:regulations/7-cfr/273/7/e#employment_and_training_program_requirements
      blocked_by:
        - us:regulations/7-cfr/273/7#state_agency_et_program_design
      reason: >-
        Paragraph (e) governs State E&T program components, participant
        screening, and provider responsibilities. This module treats E&T
        participation as an input to person-level compliance; detailed E&T
        program administration is deferred.
    - output: us:regulations/7-cfr/273/7/f#work_requirement_noncompliance_disqualification
      blocked_by:
        - us:regulations/7-cfr/273/7#work_requirement_sanction_and_good_cause_context
      reason: >-
        Paragraph (f) governs refusal or failure to comply, good cause, and
        disqualification periods. This module encodes current compliance as a
        predicate; sanction timing and good-cause adjudication are deferred.
    - output: us:regulations/7-cfr/273/7/g#ending_work_requirement_disqualification
      blocked_by:
        - us:regulations/7-cfr/273/7#work_requirement_disqualification_reentry_context
      reason: >-
        Paragraph (g) governs when participation may resume after a work
        requirement disqualification. This reentry workflow is deferred until
        disqualification period tracking is encoded.
    - output: us:regulations/7-cfr/273/7/j#voluntary_quit_and_work_effort_reduction_determination
      blocked_by:
        - us:regulations/7-cfr/273/7#voluntary_quit_good_cause_and_lookback_context
      reason: >-
        Paragraph (j) governs the lookback period, household application
        handling, and good-cause determinations for voluntary quit or work
        effort reduction. This module currently consumes a resolved
        voluntary-quit-without-good-cause predicate; the determination workflow
        is deferred.
    - output: us:regulations/7-cfr/273/7/k#employment_initiatives_program
      blocked_by:
        - us:regulations/7-cfr/273/7#state_agency_employment_initiatives_program_context
      reason: >-
        Paragraph (k) governs optional State employment initiatives programs.
        This module does not encode that program election or its cash-equivalent
        benefit administration.
    - output: us:regulations/7-cfr/273/7/m#optional_workfare_program
      blocked_by:
        - us:regulations/7-cfr/273/7#state_agency_optional_workfare_program_context
      reason: >-
        Paragraph (m) governs optional SNAP workfare program operation. This
        module consumes workfare participation as a compliance input; program
        operation and assignment rules are deferred.
    - output: us:regulations/7-cfr/273/7/n#workforce_partnership_requirements
      blocked_by:
        - us:regulations/7-cfr/273/7#state_agency_workforce_partnership_context
      reason: >-
        Paragraph (n) governs workforce partnership requirements and reporting.
        This module does not encode workforce partnership administration.
  summary: |-
    7 CFR 273.7 makes non-exempt SNAP household members comply with general
    work requirements: registration, assigned E&T or workfare participation,
    employment-status cooperation, suitable-employment referrals and offers,
    and the voluntary-quit or work-effort-reduction rule. It exempts specified
    persons including children, older adults, persons unfit for work, caretakers,
    unemployment-compensation participants, treatment-program participants,
    workers meeting the 30-hour or minimum-wage earnings threshold, and
    qualifying half-time students.
  source_verification:
    corpus_citation_path: us/regulation/7/273/7
rules:
  - name: snap_member_general_work_requirement_exempt
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 7 CFR 273.7(b)(1)
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          member_age < 16
          or member_age >= 60
          or member_age_16_or_17_is_not_household_head_or_attends_school_or_training_half_time
          or member_physically_or_mentally_unfit_for_employment
          or member_subject_to_and_complying_with_title_iv_work_requirement
          or member_responsible_for_dependent_child_under_six_or_incapacitated_person
          or member_receiving_or_applying_for_unemployment_compensation_and_complying
          or member_regular_participant_in_drug_or_alcohol_treatment
          or member_weekly_work_hours >= 30
          or member_weekly_wages >= federal_or_state_minimum_wage * 30
          or migrant_or_seasonal_farmworker_under_contract_to_begin_employment_within_30_days
          or alaska_subsistence_hunts_or_fishes_30_hours_weekly
          or member_student_enrolled_at_least_half_time_and_student_eligible
  - name: snap_member_general_work_requirement_compliant
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 7 CFR 273.7(a)(1)
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          member_registered_for_work_or_registered_by_state
          and member_participated_in_snap_et_if_assigned
          and member_participated_in_workfare_if_assigned
          and member_provided_employment_status_or_availability_information
          and member_reported_to_referred_suitable_employer_if_referred
          and member_accepted_bona_fide_suitable_employment_offer_if_offered
          and not member_voluntarily_quit_or_reduced_work_below_30_hours_without_good_cause
  - name: snap_member_general_work_requirement_waived
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 7 CFR 273.7(a)(6)
    versions:
      - effective_from: '2025-10-01'
        formula: member_snap_work_requirements_waived_due_to_pending_ssi_joint_application
  - name: snap_member_general_work_requirement_eligible
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 7 CFR 273.7(a), 7 CFR 273.7(b)
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          snap_member_general_work_requirement_exempt
          or snap_member_general_work_requirement_waived
          or snap_member_general_work_requirement_compliant
