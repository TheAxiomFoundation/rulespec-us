format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/regulation/42/435/556
  summary: |-
    "A State must require applicable individuals ... to demonstrate community engagement ... or be deemed to demonstrate community engagement ... as a condition of eligibility for medical assistance." For applicants the required demonstration period is "at least one, but not more than 3 consecutive months ... immediately preceding the month of application." For enrolled beneficiaries it is "1 or more months ... whether or not consecutive" during the applicable verification period, and the State "must not require" a period exceeding paragraph (a)(2). The State may not apply paragraph (a) to a specified excluded individual and must give eligibility notices specifying the assessment basis.
  deferred_outputs:
    - output: us:regulations/42-cfr/435/556#community_engagement_condition_for_medical_assistance_met
      source: 42 CFR 435.556(a)
      reason: The complete medical-assistance condition requires determining whether the individual demonstrates community engagement under 42 CFR 435.552. The copied 42 CFR 435.552 context defers the aggregate community-engagement-demonstrated output because one seasonal-worker path depends on an unavailable cited definition.
      blocked_by:
        - us:regulations/42-cfr/435/552#community_engagement_demonstrated_for_month
imports:
  - us:regulations/42-cfr/435/551#applicable_individual
rules:
  - name: application_lookback_months_minimum
    kind: parameter
    dtype: Count
    source: 42 CFR 435.556(a)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/regulation/42/435/556
              excerpt: "at least one, but not more than 3 consecutive months"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1

  - name: application_lookback_months_maximum
    kind: parameter
    dtype: Count
    source: 42 CFR 435.556(a)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/regulation/42/435/556
              excerpt: "at least one, but not more than 3 consecutive months"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          3

  - name: enrolled_demonstration_months_minimum
    kind: parameter
    dtype: Count
    source: 42 CFR 435.556(a)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/regulation/42/435/556
              excerpt: "demonstration of community engagement for 1 or more months"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1

  - name: community_engagement_assessment_requirement_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 CFR 435.556(a), (c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/regulation/42/435/556
          - path: versions[0].formula
            kind: import
            import:
              target: us:regulations/42-cfr/435/551#applicable_individual
              output: applicable_individual
              hash: sha256:cca95e1fa04f699fa6772bcb8f861f973d78bd86a027414e6be1cb26467e2c01
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          applicable_individual
          and (
            individual_files_application_for_medical_assistance_under_state_plan_or_waiver
            or individual_is_enrolled_and_receiving_medical_assistance_under_state_plan_or_waiver
          )

  - name: application_lookback_period_within_required_limits
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 CFR 435.556(a)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/regulation/42/435/556
          - path: versions[0].formula
            kind: import
            import:
              target: us:regulations/42-cfr/435/551#applicable_individual
              output: applicable_individual
              hash: sha256:cca95e1fa04f699fa6772bcb8f861f973d78bd86a027414e6be1cb26467e2c01
          - path: versions[0].formula
            kind: import
            import:
              target: us:regulations/42-cfr/435/556#application_lookback_months_minimum
              output: application_lookback_months_minimum
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us:regulations/42-cfr/435/556#application_lookback_months_maximum
              output: application_lookback_months_maximum
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          applicable_individual
          and individual_files_application_for_medical_assistance_under_state_plan_or_waiver
          and state_plan_application_demonstration_month_count >= application_lookback_months_minimum
          and state_plan_application_demonstration_month_count <= application_lookback_months_maximum
          and state_plan_application_demonstration_period_is_consecutive_and_immediately_preceding_application_month

  - name: enrolled_demonstration_period_within_required_limits
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 CFR 435.556(a)(2), (b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/regulation/42/435/556
          - path: versions[0].formula
            kind: import
            import:
              target: us:regulations/42-cfr/435/551#applicable_individual
              output: applicable_individual
              hash: sha256:cca95e1fa04f699fa6772bcb8f861f973d78bd86a027414e6be1cb26467e2c01
          - path: versions[0].formula
            kind: import
            import:
              target: us:regulations/42-cfr/435/556#enrolled_demonstration_months_minimum
              output: enrolled_demonstration_months_minimum
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          applicable_individual
          and individual_is_enrolled_and_receiving_medical_assistance_under_state_plan_or_waiver
          and state_plan_enrolled_demonstration_month_count >= enrolled_demonstration_months_minimum
          and state_plan_enrolled_demonstration_period_does_not_exceed_applicable_paragraph_a_2_period
          and (
            (
              state_has_not_opted_to_conduct_more_frequent_verifications_under_section_435_557_d
              and enrolled_demonstration_months_are_during_period_from_most_recent_determination_or_renewal_to_renewal_due
            )
            or (
              state_has_opted_to_conduct_more_frequent_verifications_under_section_435_557_d
              and enrolled_demonstration_months_are_during_period_from_most_recent_demonstration_to_next_demonstration_due
            )
            or (
              individual_became_applicable_due_to_redetermination_based_on_change_in_circumstances
              and enrolled_demonstration_months_are_during_period_from_most_recent_determination_or_renewal_to_month_before_becoming_applicable
            )
          )

  - name: eligibility_notice_specifies_community_engagement_assessment_basis
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 CFR 435.556(d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/regulation/42/435/556
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          notice_informs_applicant_or_beneficiary_of_eligibility_determination
          and notice_includes_clear_basis_of_eligibility_or_intended_action_and_specific_reasons
          and (
            notice_specifies_individual_meets_criteria_as_specified_excluded_individual
            or (
              notice_specifies_individual_determined_to_be_applicable_individual
              and notice_specifies_whether_individual_demonstrates_or_is_deemed_to_have_demonstrated_community_engagement_for_required_months
            )
          )
