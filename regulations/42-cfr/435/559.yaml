format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/regulation/42/435/559
  summary: |-
    Unless granted an exemption under Sec. 435.560, the agency must require applicable individuals to comply with or be deemed to have demonstrated community engagement as a condition of eligibility for medical assistance furnished on or after January 1, 2027. The agency may elect to implement before January 1, 2027. For a beneficiary enrolled as of the State's implementation date, the agency must verify compliance at the first renewal initiated on or after that date.
imports:
  - us:regulations/42-cfr/435/551#applicable_individual
  - us:regulations/42-cfr/435/553#community_engagement_mandatory_exception_applies
rules:
  - name: community_engagement_requirement_applies_as_condition_of_eligibility
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 CFR 435.559(a)-(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/regulation/42/435/559
              excerpt: "Unless granted an exemption under Sec. 435.560"
          - path: versions[0].formula
            kind: effective_period
            source:
              corpus_citation_path: us/regulation/42/435/559
              excerpt: "on or after January 1, 2027"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/regulation/42/435/559
              excerpt: "may elect to implement Sec. Sec. 435.550 through 435.563 before January 1, 2027"
          - path: versions[0].formula
            kind: import
            import:
              target: us:regulations/42-cfr/435/551#applicable_individual
              output: applicable_individual
              hash: sha256:cca95e1fa04f699fa6772bcb8f861f973d78bd86a027414e6be1cb26467e2c01
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          applicable_individual
          and not individual_granted_exemption_under_section_435_560
          and (
            medical_assistance_furnished_on_or_after_mandatory_implementation_date
            or state_elected_early_implementation_under_state_plan_or_section_1115
          )

  - name: community_engagement_demonstrated_for_condition_of_eligibility
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 CFR 435.559(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/regulation/42/435/559
          - path: versions[0].formula
            kind: import
            import:
              target: us:regulations/42-cfr/435/553#community_engagement_mandatory_exception_applies
              output: community_engagement_mandatory_exception_applies
              hash: sha256:fdd2ff369baed1aaa28f9ee342d34194d2f9c498c0c9be67001aac2960bcfef5
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_demonstrated_community_engagement_under_sections_435_552_and_435_556
          or community_engagement_mandatory_exception_applies
          or individual_deemed_to_have_demonstrated_community_engagement_under_section_435_555

  - name: community_engagement_condition_of_eligibility_satisfied
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 CFR 435.559(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/regulation/42/435/559
          - path: versions[0].formula
            kind: import
            import:
              target: us:regulations/42-cfr/435/559#community_engagement_requirement_applies_as_condition_of_eligibility
              output: community_engagement_requirement_applies_as_condition_of_eligibility
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us:regulations/42-cfr/435/559#community_engagement_demonstrated_for_condition_of_eligibility
              output: community_engagement_demonstrated_for_condition_of_eligibility
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not community_engagement_requirement_applies_as_condition_of_eligibility
          or community_engagement_demonstrated_for_condition_of_eligibility

  - name: community_engagement_verification_due_at_first_renewal
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 CFR 435.559(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/regulation/42/435/559
              excerpt: "beneficiary who is enrolled as of the State's implementation date"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/regulation/42/435/559
              excerpt: "first renewal initiated on or after the implementation date"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          beneficiary_enrolled_as_of_state_implementation_date
          and renewal_is_first_renewal_initiated_on_or_after_state_implementation_date
