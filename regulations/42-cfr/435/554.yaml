format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/regulation/42/435/554
  summary: |-
    "Dependent child means a child 13 years of age or under who relies on another individual for care." An individual meeting one or more paragraph (c) categories is "excluded from the definition of an applicable individual"; "Community engagement is not a condition of eligibility for specified excluded individuals."
rules:
  - name: specified_excluded_individuals_implement_section_1902_xx
    kind: source_relation
    source_relation:
      type: implements
      target: us:statutes/42/1396a/xx
      basis:
        delegation: us:statutes/42/1396a/xx#state_must_apply_community_engagement_requirement
    source: 42 CFR 435.550

  - name: dependent_child_maximum_age
    kind: parameter
    dtype: Count
    source: 42 CFR 435.554(a) (Dependent child definition)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/regulation/42/435/554
              excerpt: "Dependent child means a child 13 years of age or under"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          13

  - name: family_caregiver_monthly_nonincidental_assistance_hours_minimum
    kind: parameter
    dtype: Count
    period: Month
    source: 42 CFR 435.554(c)(3)(i)(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/regulation/42/435/554
              excerpt: "not less than 80 hours of assistance that is not solely incidental in nature per month"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          80

  - name: veteran_total_disability_rating
    kind: parameter
    dtype: Rate
    source: 42 CFR 435.554(c)(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/regulation/42/435/554
              excerpt: "rated as 100 percent (total)"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1.00

  - name: substance_use_disorder_stable_recovery_years_minimum
    kind: parameter
    dtype: Count
    source: 42 CFR 435.554(c)(5)(i)(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/regulation/42/435/554
              excerpt: "stable recovery (which means, an individual who is in recovery for 5 or more years)"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          5

  - name: dependent_child
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 CFR 435.554(a) (Dependent child definition)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/regulation/42/435/554
          - path: versions[0].formula
            kind: import
            import:
              target: us:regulations/42-cfr/435/554#dependent_child_maximum_age
              output: dependent_child_maximum_age
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_age <= dependent_child_maximum_age
          and individual_relies_on_another_individual_for_care

  - name: parent
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 CFR 435.554(a) (Parent definition)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/regulation/42/435/554
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_has_legal_status_of_mother_or_father_including_by_adoption
          and individual_provides_some_level_of_care_to_dependent_child_or_disabled_individual

  - name: guardian
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 CFR 435.554(a) (Guardian definition)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/regulation/42/435/554
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_is_adult_appointed_by_court_to_care_for_and_make_personal_decisions_for_dependent_child_or_disabled_individual
          and dependent_child_or_disabled_individual_cannot_care_for_themselves

  - name: caretaker_relative
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 CFR 435.554(a) (Caretaker relative definition)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/regulation/42/435/554
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_is_relative_by_blood_adoption_or_marriage_of_dependent_child_or_disabled_individual
          and individual_lives_with_dependent_child_or_disabled_individual
          and individual_assumes_primary_responsibility_for_dependent_child_or_disabled_individual_care
          and (
            relationship_is_parent_grandparent_sibling_stepparent_stepsibling_uncle_aunt_first_cousin_nephew_or_niece
            or relationship_is_husband_wife_son_daughter_stepchild_grandchild_of_disabled_individual
            or individual_is_spouse_of_such_parent_or_relative_even_after_marriage_termination
            or state_elected_optional_caretaker_relationship_for_section_435_110_and_this_definition
          )

  - name: family_caregiver
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 CFR 435.554(a) (Family caregiver definition)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/regulation/42/435/554
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_is_adult_family_member_or_other_individual
          and individual_has_significant_relationship_with_dependent_child_or_disabled_individual
          and individual_provides_care_within_broad_range_of_assistance_to_dependent_child_or_disabled_individual

  - name: family_caregiver_exclusion_criteria_met
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 CFR 435.554(c)(3)(i)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/regulation/42/435/554
          - path: versions[0].formula
            kind: import
            import:
              target: us:regulations/42-cfr/435/554#family_caregiver_monthly_nonincidental_assistance_hours_minimum
              output: family_caregiver_monthly_nonincidental_assistance_hours_minimum
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          family_caregiver
          and (
            (
              individual_primarily_resides_with_dependent_child_or_disabled_individual
              and assistance_to_dependent_child_or_disabled_individual_occurs_regularly_and_not_solely_incidental
            )
            or (
              individual_is_relative_specified_in_caretaker_relative_definition_without_live_in_or_primary_responsibility_requirements
              and individual_does_not_reside_with_dependent_child_or_disabled_individual
              and assistance_to_dependent_child_or_disabled_individual_occurs_regularly_and_not_solely_incidental
            )
            or (
              individual_does_not_reside_with_dependent_child_or_disabled_individual
              and individual_is_not_relative_specified_in_caretaker_relative_definition
              and family_caregiver_monthly_nonincidental_assistance_hours >= family_caregiver_monthly_nonincidental_assistance_hours_minimum
            )
          )

  - name: veteran_with_total_va_disability
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 CFR 435.554(c)(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/regulation/42/435/554
          - path: versions[0].formula
            kind: import
            import:
              target: us:regulations/42-cfr/435/554#veteran_total_disability_rating
              output: veteran_total_disability_rating
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_is_veteran_with_temporary_or_permanent_disability_from_department_of_veterans_affairs
          and department_of_veterans_affairs_disability_rating >= veteran_total_disability_rating

  - name: medically_frail_or_special_medical_needs
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 CFR 435.554(c)(5)(i)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/regulation/42/435/554
          - path: versions[0].formula
            kind: import
            import:
              target: us:regulations/42-cfr/435/554#substance_use_disorder_stable_recovery_years_minimum
              output: substance_use_disorder_stable_recovery_years_minimum
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          physical_mental_or_behavioral_health_condition_significantly_impairs_ability_to_comply_with_community_engagement_requirement
          and (
            individual_is_blind_or_disabled_as_defined_in_section_1614_of_social_security_act
            or (
              individual_has_substance_use_disorder
              and individual_years_in_recovery_from_substance_use_disorder < substance_use_disorder_stable_recovery_years_minimum
            )
            or individual_has_disabling_mental_disorder
            or individual_has_physical_intellectual_or_developmental_disability_significantly_impairing_one_or_more_activities_of_daily_living
            or individual_has_serious_or_complex_medical_condition
          )

  - name: specified_excluded_individual
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 CFR 435.554(b)-(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/regulation/42/435/554
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_meets_former_foster_care_children_group_definition
          or individual_meets_indian_definition
          or parent
          or guardian
          or caretaker_relative
          or family_caregiver_exclusion_criteria_met
          or veteran_with_total_va_disability
          or medically_frail_or_special_medical_needs
          or individual_is_compliant_with_state_requirements_imposed_in_accordance_with_section_407
          or (
            individual_is_member_of_household_that_receives_snap_benefits
            and not individual_is_exempt_from_snap_work_requirement
          )
          or (
            individual_participates_in_drug_addiction_or_alcoholic_treatment_and_rehabilitation_program
            and (
              not state_established_minimum_time_commitment_for_treatment_program
              or individual_meets_state_minimum_time_commitment_for_treatment_program
            )
          )
          or individual_is_inmate_of_public_institution
          or individual_is_pregnant
          or individual_entitled_to_postpartum_medical_assistance

  - name: community_engagement_not_condition_of_eligibility_for_specified_excluded_individual
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 CFR 435.554(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/regulation/42/435/554
              excerpt: "Community engagement is not a condition of eligibility for specified excluded individuals."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          specified_excluded_individual
