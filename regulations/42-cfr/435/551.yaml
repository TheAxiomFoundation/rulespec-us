format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/regulation/42/435/551
  summary: |-
    An applicable individual is an individual who is not a specified excluded individual and who is eligible to enroll or enrolled under 42 CFR 435.119, or otherwise eligible/enrolled in a qualifying section 1115(a)(2) demonstration project and meets the listed age, pregnancy, Medicare, and State plan conditions.
rules:
  - name: minimum_age_for_demonstration_project_path
    kind: parameter
    dtype: Count
    source: 42 CFR 435.551(b)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/regulation/42/435/551
              excerpt: "At least 19 and under 65 years of age"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          19

  - name: maximum_age_exclusive_for_demonstration_project_path
    kind: parameter
    dtype: Count
    source: 42 CFR 435.551(b)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/regulation/42/435/551
              excerpt: "At least 19 and under 65 years of age"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          65

  - name: applicable_individual
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 CFR 435.551
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/regulation/42/435/551
          - path: versions[0].formula
            kind: parameter
            import:
              target: us:regulations/42-cfr/435/551#minimum_age_for_demonstration_project_path
              output: minimum_age_for_demonstration_project_path
              hash: sha256:local
          - path: versions[0].formula
            kind: parameter
            import:
              target: us:regulations/42-cfr/435/551#maximum_age_exclusive_for_demonstration_project_path
              output: maximum_age_exclusive_for_demonstration_project_path
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not individual_is_specified_excluded_individual_under_section_435_554
          and (
            eligible_to_enroll_or_enrolled_under_state_plan_section_435_119
            or (
              otherwise_eligible_to_enroll_or_enrolled_in_section_1115_a_2_demonstration_project
              and demonstration_project_coverage_meets_minimum_essential_coverage_requirements
              and individual_age >= minimum_age_for_demonstration_project_path
              and individual_age < maximum_age_exclusive_for_demonstration_project_path
              and not individual_is_pregnant
              and not individual_is_entitled_to_or_enrolled_for_title_xviii_part_a_benefits
              and not individual_is_enrolled_for_title_xviii_part_b_benefits
              and not individual_is_otherwise_eligible_to_enroll_under_state_plan
            )
          )
