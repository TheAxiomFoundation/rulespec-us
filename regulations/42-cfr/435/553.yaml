format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/regulation/42/435/553
  summary: |-
    "A State must deem an applicable individual to have demonstrated community engagement under Sec. 435.552 for a month if--" the individual met listed statuses for part or all of that month, or was an inmate of a public institution during the 3-month period ending on the first day of that month.
rules:
  - name: minor_age_limit_for_mandatory_exception
    kind: parameter
    dtype: Integer
    source: 42 CFR 435.553(a)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/regulation/42/435/553
              excerpt: "Under the age of 19 years"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          19

  - name: community_engagement_mandatory_exception_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 CFR 435.553
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/regulation/42/435/553
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/regulation/42/435/553
              excerpt: "At any point during the 3-month period ending on the first day of that month"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_age < minor_age_limit_for_mandatory_exception
          or individual_was_entitled_to_or_enrolled_for_medicare_part_a_for_part_or_all_of_month
          or individual_was_enrolled_for_medicare_part_b_for_part_or_all_of_month
          or individual_was_described_in_mandatory_coverage_groups_under_section_1902_a_10_a_i_subclauses_i_through_vii_for_part_or_all_of_month
          or individual_was_specified_excluded_individual_under_section_435_554_for_part_or_all_of_month
          or individual_was_inmate_of_public_institution_during_three_month_period_ending_on_first_day_of_month
