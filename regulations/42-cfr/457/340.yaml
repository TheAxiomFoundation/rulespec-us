format: rulespec/v1
module:
  source_verification:
    corpus_citation_path: us/regulation/42/457/340
  summary: |-
    Section 457.340(d)(1) applies the timely-determination terms in 42 CFR 435.912 to CHIP, excluding section 435.912(e)(3), while using section 457.350 for account transfers to other insurance affordability programs and section 457.348 for receiving applications from those programs. The revised paragraph sunsets on October 1, 2034.
rules:
  - name: chip_timely_determination_cross_reference_satisfied
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 CFR 457.340(d)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/regulation/42/457/340
              excerpt: "terms in Sec. 435.912 of this chapter"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/regulation/42/457/340
              excerpt: "exclusive of Sec. 435.912(e)(3)"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/regulation/42/457/340
              excerpt: "pursuant to Sec. 457.350"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/regulation/42/457/340
              excerpt: "pursuant to Sec. 457.348"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          chip_eligibility_determination
          and section_435_912_terms_applied_to_chip
          and not section_435_912_e3_applied_to_chip
          and account_transfer_standards_follow_section_457_350
          and application_receipt_standards_follow_section_457_348
