format: rulespec/v1
module:
  source_verification:
    corpus_citation_path: us/regulation/42/457/960
  summary: |-
    Section 457.960 requires a CHIP State that requires reporting of eligibility-affecting changes to establish timely and accurate change-reporting procedures and promptly redetermine eligibility when the State has information about those changes. The new section sunsets on October 1, 2034.
rules:
  - name: chip_change_reporting_procedures_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 CFR 457.960(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/regulation/42/457/960
              excerpt: "If the State requires reporting of changes in circumstances"
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us/regulation/42/457/960
              excerpt: "Establish procedures to ensure that enrollees make timely and accurate reports"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          state_requires_reporting_of_changes_affecting_child_health_assistance_eligibility

  - name: chip_eligibility_redetermination_required_after_change_information
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 CFR 457.960(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/regulation/42/457/960
              excerpt: "Promptly redetermine eligibility when the State has information about these changes"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          state_requires_reporting_of_changes_affecting_child_health_assistance_eligibility
          and state_has_information_about_changes_affecting_child_health_assistance_eligibility
