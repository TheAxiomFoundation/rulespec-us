format: rulespec/v1
module:
  source_verification:
    corpus_citation_path: us/regulation/42/600/320
  summary: |-
    Section 600.320(b) applies the Medicaid timely-determination terms in 42 CFR 435.912 to eligibility determinations for enrollment in a standard health plan, excludes sections 435.912(c)(3)(i) and 435.912(e)(3), and requires the State's standards to be included in the BHP Blueprint.
rules:
  - name: standard_health_plan_timely_determination_cross_reference_satisfied
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 CFR 600.320(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/regulation/42/600/320
              excerpt: "The terms of Sec. 435.912 of this chapter"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/regulation/42/600/320
              excerpt: "exclusive of Sec. 435.912(c)(3)(i) and (e)(3)"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/regulation/42/600/320
              excerpt: "included in the BHP Blueprint"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          standard_health_plan_eligibility_determination
          and section_435_912_terms_applied_to_standard_health_plan
          and not section_435_912_c3i_applied_to_standard_health_plan
          and not section_435_912_e3_applied_to_standard_health_plan
          and timely_determination_standards_included_in_bhp_blueprint
