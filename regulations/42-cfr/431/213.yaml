format: rulespec/v1
module:
  source_verification:
    corpus_citation_path: us/regulation/42/431/213
  summary: |-
    Section 431.213(d) allows an exception from advance notice when the beneficiary's whereabouts are unknown and agency mail is returned by the post office with no forwarding address. The revised paragraph sunsets on October 1, 2034.
  deferred_outputs:
    - output: us:regulations/42-cfr/431/213#death_advance_notice_exception_applies
      source: "42 CFR 431.213(a)"
      reason: Paragraph (a) is an existing advance-notice exception outside the CMS-2454-IFC whereabouts-unknown amendment encoded in this module.
    - output: us:regulations/42-cfr/431/213#written_statement_advance_notice_exception_applies
      source: "42 CFR 431.213(b)"
      reason: Paragraph (b) is an existing advance-notice exception outside the CMS-2454-IFC whereabouts-unknown amendment encoded in this module.
    - output: us:regulations/42-cfr/431/213#institution_admission_advance_notice_exception_applies
      source: "42 CFR 431.213(c)"
      reason: Paragraph (c) is an existing advance-notice exception outside the CMS-2454-IFC whereabouts-unknown amendment encoded in this module.
    - output: us:regulations/42-cfr/431/213#accepted_by_other_jurisdiction_advance_notice_exception_applies
      source: "42 CFR 431.213(e)"
      reason: Paragraph (e) is an existing advance-notice exception outside the CMS-2454-IFC whereabouts-unknown amendment encoded in this module.
    - output: us:regulations/42-cfr/431/213#physician_level_of_care_change_advance_notice_exception_applies
      source: "42 CFR 431.213(f)"
      reason: Paragraph (f) is an existing advance-notice exception outside the CMS-2454-IFC whereabouts-unknown amendment encoded in this module.
    - output: us:regulations/42-cfr/431/213#preadmission_screening_adverse_determination_advance_notice_exception_applies
      source: "42 CFR 431.213(g)"
      reason: Paragraph (g) is an existing advance-notice exception outside the CMS-2454-IFC whereabouts-unknown amendment encoded in this module.
    - output: us:regulations/42-cfr/431/213#nursing_facility_transfer_or_discharge_timing_exception_applies
      source: "42 CFR 431.213(h)"
      reason: Paragraph (h) is an existing advance-notice exception outside the CMS-2454-IFC whereabouts-unknown amendment encoded in this module.
rules:
  - name: whereabouts_unknown_advance_notice_exception_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 CFR 431.213(d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/regulation/42/431/213
              excerpt: "beneficiary's whereabouts are unknown"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/regulation/42/431/213
              excerpt: "post office returns agency mail directed to him indicating no forwarding address"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          beneficiary_whereabouts_unknown
          and post_office_returned_agency_mail_indicating_no_forwarding_address
