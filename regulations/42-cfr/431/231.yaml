format: rulespec/v1
module:
  source_verification:
    corpus_citation_path: us/regulation/42/431/231
  summary: |-
    Section 431.231(d) requires discontinued services to be reinstated when a beneficiary's whereabouts were unknown because unforwardable agency mail was returned and the beneficiary's whereabouts become known while the beneficiary remains eligible for services. The new paragraph sunsets on October 1, 2034.
rules:
  - name: discontinued_services_must_be_reinstated_when_whereabouts_become_known
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 CFR 431.231(d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/regulation/42/431/231
              excerpt: "beneficiary's whereabouts are unknown"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/regulation/42/431/231
              excerpt: "any discontinued services must be reinstated if his whereabouts become known"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/regulation/42/431/231
              excerpt: "during the time he is eligible for services"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          services_were_discontinued
          and beneficiary_whereabouts_unknown_due_to_returned_unforwardable_agency_mail
          and beneficiary_whereabouts_become_known
          and beneficiary_is_eligible_for_services
