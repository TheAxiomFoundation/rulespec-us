format: rulespec/v1
module:
  source_verification:
    corpus_citation_path: us/regulation/42/438/58
  summary: |-
    Section 438.58 requires conflict-of-interest safeguards for managed care contracting and bars a State from using an MCO, PIHP, PAHP, or financially related contractor to determine beneficiary compliance with the Medicaid community engagement requirement.
rules:
  - name: community_engagement_determination_contractor_satisfies_conflict_safeguard
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 CFR 438.58(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/regulation/42/438/58
              excerpt: "unless the entity is not"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/regulation/42/438/58
              excerpt: "has no direct or indirect financial relationship with"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not entity_is_mco_pihp_or_pahp
          and not entity_has_direct_or_indirect_financial_relationship_with_service_responsible_mco_pihp_or_pahp

  - name: state_may_use_entity_for_community_engagement_compliance_determination
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 CFR 438.58(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/regulation/42/438/58
              excerpt: "to determine beneficiary compliance with the community engagement requirement"
          - path: versions[0].formula
            kind: import
            import:
              target: us:regulations/42-cfr/438/58#community_engagement_determination_contractor_satisfies_conflict_safeguard
              output: community_engagement_determination_contractor_satisfies_conflict_safeguard
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          entity_will_determine_beneficiary_community_engagement_compliance
          and community_engagement_determination_contractor_satisfies_conflict_safeguard
