  summary: |-
    Applicants may apply for public assistance in person or by phone, mail, the internet, or fax. An application must contain at least the individual's name, address, and signature to initiate the application process. An applicant can withdraw the application at any time without affecting their right to reapply. For the Medicaid Program, the time standard begins on the date of application and ends on the date the Department mails an eligibility notice. All days counted after the date of application are calendar days. Applicant delay days do not count in determining the Department's compliance with the time standard.
