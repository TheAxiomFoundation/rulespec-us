format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-al/regulation/660-4/2/11/block-1
  summary: |-
    Federal regulations concerning the treatment of resources are followed with exceptions. Only certain liquid resources owned by a household member will be used to determine the household's countable resources. Income counted to the household for a month cannot be counted as a resource for that same month. The resources of a household member who is categorically eligible (receives SSI and/or FA benefits) will not be included in the resource determination. The resources of a household member determined categorically eligible based on expanded categorical eligibility rules will not be included. The resources of household members who are disqualified or ineligible will be included as detailed in Section 1102. The resources deemed to a sponsored alien will be included as detailed in Section 1108. If a jointly-owned resource is accessible but the household member claims not to be the owner, it is the household's responsibility to establish non-ownership.
rules:
  - name: member_resources_included_in_household_resource_determination
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Alabama Admin. Code r. 660-4-2-.11 (Treatment of Resources)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/regulation/660-4/2/11/block-1
              excerpt: "The resources of a household member who is categorically eligible (receives SSI and/or FA benefits) will not be included in the resource determination for the household."
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/regulation/660-4/2/11/block-1
              excerpt: "The resources of a household member that is determined categorically eligible based on expanded categorical eligibility rules will not be included in the resource determination for the household."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not member_is_categorically_eligible
          and not member_is_expanded_categorically_eligible
  - name: income_counted_as_resource_same_month
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Alabama Admin. Code r. 660-4-2-.11 (Treatment of Resources)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/regulation/660-4/2/11/block-1
              excerpt: "Income counted to the household for a month cannot be counted as a resource for that same month."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not amount_counted_as_income_in_month
