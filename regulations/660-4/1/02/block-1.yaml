format: rulespec/v1
module:
  status: deferred
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-al/regulation/660-4/1/02/block-1
  summary: |-
    The Department adopts by reference Title 7, Code of Federal Regulations, revised as of January 1, 1994, selected sections of Parts 271-274 (specifically: 271.1 thru 271.7; 272.1; 272.3; 272.4 thru 272.6; 272.8 thru 272.11; 273.1 thru 273.6; 273.7(a), (b), (g), (h), (i), (j), (l), (m), (n); 273.8 thru 273.15; 273.16(e)(8), (h)(2), (h)(3); 273.17; 273.21; 274.1 thru 274.11; 280.1 and all of same as may be amended). Also adopted by reference are Waivers 950032, 900017, and 950059.
  deferred_outputs:
    - output: us-al:regulations/660-4/1/02/block-1#adopts_federal_snap_regulations_by_reference
      reason: |-
        This provision adopts selected sections of 7 CFR Parts 271-274 and three
        waivers by reference. It is an administrative adoption clause that does
        not itself state a computable benefit, amount, condition, or exception.
        The legal effect is to incorporate the cited federal SNAP regulations,
        whose RuleSpec encodings are not enumerated here and are not available
        as a single importable target. Encoding a generic boolean
        "federal regulations are adopted" would be a vacuous restatement of the
        adoption clause rather than a computable rule.
