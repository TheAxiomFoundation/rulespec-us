format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-al/regulation/660-4/1/03/block-1
  summary: |-
    Mandatory minimum disqualification periods for failure to comply with work or workfare requirements: first violation - the later of the date they comply or one month; second violation - the later of the date they comply with work rules or 3 months; third violation - the later of the date they comply with work rules or 6 months. The Balanced Budget Act of 1997 allows state agencies to exempt up to 15 percent of the state's caseload subject to ABAWDS provisions from the three-month/36-month time limit.
rules:
  - name: first_violation_minimum_disqualification_months
    kind: parameter
    dtype: Integer
    source: AL 660-4-1-.03 first violation
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/regulation/660-4/1/03/block-1
              excerpt: "First violation-the later of the date they comply or one month."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1
  - name: second_violation_minimum_disqualification_months
    kind: parameter
    dtype: Integer
    source: AL 660-4-1-.03 second violation
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/regulation/660-4/1/03/block-1
              excerpt: "Second violation- the later of the date they comply with work rules or 3 months."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          3
  - name: third_violation_minimum_disqualification_months
    kind: parameter
    dtype: Integer
    source: AL 660-4-1-.03 third violation
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/regulation/660-4/1/03/block-1
              excerpt: "Third violation-The later of the date they comply with work rules or 6 months."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          6
  - name: abawd_caseload_exemption_share
    kind: parameter
    dtype: Rate
    source: AL 660-4-1-.03 Balanced Budget Act of 1997 ABAWD exemption
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/regulation/660-4/1/03/block-1
              excerpt: "exempt from the three-month/36-month time limit up to 15 percent of the state's caseload"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.15
  - name: abawd_time_limit_period_months
    kind: parameter
    dtype: Integer
    source: AL 660-4-1-.03 ABAWD 36-month period
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/regulation/660-4/1/03/block-1
              excerpt: "considered the first month of the 36-month period"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          36
  - name: abawd_work_hours_threshold_per_week
    kind: parameter
    dtype: Integer
    source: AL 660-4-1-.03 ABAWD work hours threshold
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/regulation/660-4/1/03/block-1
              excerpt: "working at least 20 hours or participating in an allowable work or training program for 20 hours"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          20
  - name: minimum_disqualification_months
    kind: derived
    entity: Person
    dtype: Integer
    period: Month
    source: AL 660-4-1-.03 violation tier selection
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-al/regulation/660-4/1/03/block-1
              excerpt: "First violation ... one month. Second violation ... 3 months. Third violation ... 6 months."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if person_work_rule_violation_count == 1: first_violation_minimum_disqualification_months else: if person_work_rule_violation_count == 2: second_violation_minimum_disqualification_months else: if person_work_rule_violation_count >= 3: third_violation_minimum_disqualification_months else: 0
