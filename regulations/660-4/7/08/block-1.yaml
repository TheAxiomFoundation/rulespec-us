format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-al/regulation/660-4/7/08/block-1
  summary: |-
    All other households who submit identifiable applications between the first day and by the 15th day of the last month of the certification period shall be considered to have a timely application for recertification. The county department shall ensure that any household which timely reapplies does not lose its rights to uninterrupted benefits for failure to submit any requested verification prior to the date the household submits a timely application for recertification.
rules:
  - name: timely_recertification_application_first_day_of_month
    kind: parameter
    dtype: Integer
    source: Ala. Admin. Code 660-4-7-.08
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/regulation/660-4/7/08/block-1
              excerpt: "between the first day"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1
  - name: timely_recertification_application_last_day_of_month
    kind: parameter
    dtype: Integer
    source: Ala. Admin. Code 660-4-7-.08
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/regulation/660-4/7/08/block-1
              excerpt: "by the 15th day"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          15
  - name: timely_application_for_recertification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Ala. Admin. Code 660-4-7-.08
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/regulation/660-4/7/08/block-1
              excerpt: "submit identifiable applications between the first day and by the 15th day of the last month of the certification period shall be considered to have a timely application for recertification"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_submitted_identifiable_application
          and application_submitted_in_last_month_of_certification_period
          and application_submission_day_of_month >= timely_recertification_application_first_day_of_month
          and application_submission_day_of_month <= timely_recertification_application_last_day_of_month
