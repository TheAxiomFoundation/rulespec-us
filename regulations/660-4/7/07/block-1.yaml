format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-al/regulation/660-4/7/07/block-1
  summary: |-
    If the six-month report form is received by the 10th of the processing month and is incomplete, the county office must return the incomplete form within 10 days. If the household returns the completed form by the end of the processing month, the county office must process the complete form within 10 days. If the household submits the completed report after the 10th but before the end of the processing month, the county office has 10 days to process. Benefits must not be prorated. When the last day of the month falls on a weekend or holiday, reports received on the first workday after the deadline must be considered as received before the deadline. For reinstatement in the seventh month after termination, benefits for the month of reinstatement must be prorated.
rules:
  - name: county_office_processing_days
    kind: parameter
    dtype: Integer
    source: Alabama SNAP Manual 660-4-7-07 - "must return the incomplete form within 10 days" / "must process the complete form within 10 days"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/regulation/660-4/7/07/block-1
              excerpt: "must return the incomplete form within 10 days"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10
  - name: processing_month_cutoff_day
    kind: parameter
    dtype: Integer
    source: Alabama SNAP Manual 660-4-7-07 - "received by the 10th of the processing month"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/regulation/660-4/7/07/block-1
              excerpt: "received by the 10th of the processing month"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10
  - name: benefits_must_be_prorated_for_seventh_month_reinstatement
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Alabama SNAP Manual 660-4-7-07 - "If eligible, benefits for the month of reinstatement must be prorated."
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/regulation/660-4/7/07/block-1
              excerpt: "If eligible, benefits for the month of reinstatement must be prorated."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_submitted_six_month_report_in_seventh_month
          and household_case_was_terminated_for_failure_to_six_month_report
          and household_eligible_for_reinstatement_month
  - name: case_must_close_for_failure_to_report
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Alabama SNAP Manual 660-4-7-07 - "the case will close for failure to provide a complete six-month report"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/regulation/660-4/7/07/block-1
              excerpt: "the case will close for failure to provide a complete six-month report"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_received_notice_of_incomplete_six_month_report
          and not household_returned_complete_form_by_end_of_processing_month
  - name: report_considered_timely_when_received_on_first_workday_after_weekend_or_holiday
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Alabama SNAP Manual 660-4-7-07 - "When the last day of the month falls on a weekend or a holiday, those reports received ... on the first workday after the final deadline must be considered as received before the deadline."
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/regulation/660-4/7/07/block-1
              excerpt: "those reports received in person, by mail, fax, or internet ( MyAlabama.gov ) on the first workday after the final deadline must be considered as received before the deadline"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          last_day_of_processing_month_falls_on_weekend_or_holiday
          and report_received_on_first_workday_after_final_deadline
  - name: case_must_remain_closed_after_seventh_month
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Alabama SNAP Manual 660-4-7-07 - "If the household fails to return a complete form with the required documentation and verification by the end of the seventh month, the case must remain closed and the household must reapply."
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/regulation/660-4/7/07/block-1
              excerpt: "If the household fails to return a complete form ... by the end of the seventh month, the case must remain closed and the household must reapply."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          six_month_report_was_incomplete_in_seventh_month
          and not household_returned_complete_form_by_end_of_seventh_month
