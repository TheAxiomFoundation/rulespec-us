  status: deferred
  summary: |-
    The state agency shall administer such temporary emergency standards of eligibility that may be established by the Secretary of USDA during periods of emergency for households who are victims of a disaster which disrupts commercial channels of food distribution, if such households are in need of temporary food assistance and if commercial channels of food distribution have again become available to meet the temporary food needs of such households.
