format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/363/210/block-1
  summary: |-
    When verifying that income is exempt as a loan, a legally binding agreement
    is not required. A statement signed by both parties that indicates that the
    payment is a loan and must be repaid is sufficient verification. However, if
    the household receives payments on a recurrent or regular basis from the
    same source but claims the payments are loans, the case manager may also
    require that the provider of the loan sign an affidavit that states that
    repayments are being made or that payments will be made in accordance with
    an established repayment schedule. Self-employment income, in accordance
    with 106 CMR 365.900 through 365.970, shall be verified by business records,
    tax returns and other appropriate documents showing gross income and the
    total business expenses associated with the gross income earned.
rules:
  - name: loan_income_verification_sufficient
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 363.210
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/363/210/block-1
              excerpt: |-
                A statement signed by both parties that indicates that the
                payment is a loan and must be repaid is sufficient verification.
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/363/210/block-1
              excerpt: |-
                if the household receives payments on a recurrent or regular
                basis from the same source but claims the payments are loans,
                the case manager may also require that the provider of the loan
                sign an affidavit
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_has_signed_loan_statement_by_both_parties
          and (not loan_payments_are_recurrent_from_same_source
               or not case_manager_requires_repayment_affidavit
               or provider_signed_repayment_affidavit)
  - name: self_employment_income_verification_sufficient
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 363.210
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/363/210/block-1
              excerpt: |-
                Self-employment income, in accordance with 106 CMR 365.900
                through 365.970, shall be verified by business records, tax
                returns and other appropriate documents showing gross income
                and the total business expenses associated with the gross
                income earned.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          self_employment_documents_show_gross_income
          and self_employment_documents_show_total_business_expenses
