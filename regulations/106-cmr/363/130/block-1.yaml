format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/363/130/block-1
  summary: |-
    Countable assets are all those that must be included in determining the total value of the household's assets. Funds in a bank account are considered available when a member of the household has both ownership of, and access to, the balance of funds. Crowdfunding accounts shall also be considered liquid resources if funds are accessible to the household. If at recertification the household member declares a balance of $25 or less in an account, other than a checking account, verification shall not be required if the balance was $25 or less at the last eligibility determination and the account balance, in combination with other countable assets, is not over the asset limit.
rules:
  - name: recertification_low_balance_verification_threshold
    kind: parameter
    dtype: Money
    unit: USD
    source: 106 CMR 363.130 - "If at recertification the household member declares a balance of $25 or less in an account, other than a checking account, verification shall not be required"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/363/130/block-1
              excerpt: "balance of $25 or less in an account"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          25
  - name: bank_account_funds_are_available_asset
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: 106 CMR 363.130 - "Funds in a bank account are considered available when a member of the household has both ownership of, and access to, the balance of funds in the account."
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/363/130/block-1
              excerpt: "Funds in a bank account are considered available when a member of the household has both ownership of, and access to, the balance of funds in the account."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_member_has_ownership_of_account_funds
          and household_member_has_access_to_account_funds
  - name: crowdfunding_account_is_liquid_resource
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: 106 CMR 363.130 - "Crowdfunding accounts (e.g., GoFundMe and Kickstarter) shall also be considered liquid resources if funds are accessible to the household."
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/363/130/block-1
              excerpt: "Crowdfunding accounts (e.g., GoFundMe and Kickstarter) shall also be considered liquid resources if funds are accessible to the household."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_crowdfunding_account
          and crowdfunding_funds_accessible_to_household
  - name: recertification_account_balance_verification_waived
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: 106 CMR 363.130 - "If at recertification the household member declares a balance of $25 or less in an account, other than a checking account, verification shall not be required if the balance was $25 or less at the last eligibility determination and the account balance, in combination with other countable assets, is not over the asset limit."
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/363/130/block-1
              excerpt: "verification shall not be required if the balance was $25 or less at the last eligibility determination and the account balance, in combination with other countable assets, is not over the asset limit"
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/363/130/block-1
              excerpt: "balance of $25 or less"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          determination_is_at_recertification
          and not account_is_checking_account
          and declared_account_balance <= recertification_low_balance_verification_threshold
          and last_eligibility_determination_account_balance <= recertification_low_balance_verification_threshold
          and not countable_assets_exceed_asset_limit
