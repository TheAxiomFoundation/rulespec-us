format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/363/140/block-1
  summary: |-
    Lists noncountable assets for SNAP eligibility: property essential to employment or self-employment (continuing for one year after termination of farming self-employment, with no fair-market-value income test); installment contracts for sale of land or buildings that annually produce income consistent with fair market value; inaccessible assets including security deposits on rental property or utilities, property in probate, property the household is making a good faith effort to sell at a reasonable price, and irrevocable trust funds; lands held in trust for Native Americans, property purchased with payments under Public Laws 92-254, 93-134, 94-540, and funds distributed to or held in trust for members of any Indian tribe under Public Laws 94-114, 93-134, 96-420, 97-458, 98-64, and 102-71; and student financial assistance for the purposes of obtaining a degree or certificate from an institution of higher education. An asset is also noncountable when the household member demonstrates lack of ownership or inaccessibility.
rules:
  - name: asset_is_noncountable
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: 106 CMR 363.140
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/363/140/block-1
              excerpt: "The following assets are not countable when determining the total value of assets available to a household."
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/363/140/block-1
              excerpt: "shall continue to be excluded for one year after the household member terminates his or her self-employment from farming"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/363/140/block-1
              excerpt: "Installment contracts for the sale of land or buildings must annually produce income consistent with their fair market value in order to be considered a noncountable asset."
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/363/140/block-1
              excerpt: "Inaccessible assets include, but are not limited to: security deposits on rental property or utilities, property in probate, property that the household is making a good faith effort to sell at a reasonable price and that has not been sold, and irrevocable trust funds."
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/363/140/block-1
              excerpt: "If the household member demonstrates lack of ownership, inaccessibility to the asset or both, the asset is not countable in the determination of eligibility."
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/363/140/block-1
              excerpt: "Lands held in trust for Native Americans; property purchased with payments made to Native Americans under Public Laws 92-254, 93-134, 94-540; and funds distributed to, or held in trust for, members of any Indian tribe pursuant to a judgment of the Indian Claims Settlements or the Secretary of the Interior under Public Laws 94-114, 93-134, 96-420, 97-458, 98-64 and 102-71"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/363/140/block-1
              excerpt: "Any financial assistance paid to a student such as a financial aid package, grant, loan or scholarship for the purposes of obtaining a degree or certificate from an institution of higher education is a noncountable asset."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_property_essential_to_employment_or_self_employment
          or asset_is_farming_property_within_one_year_of_termination
          or (asset_is_installment_contract_for_sale_of_land_or_buildings and asset_produces_income_consistent_with_fair_market_value)
          or asset_is_security_deposit_on_rental_or_utilities
          or asset_is_property_in_probate
          or asset_is_property_being_sold_in_good_faith_at_reasonable_price
          or asset_is_irrevocable_trust_fund
          or asset_is_inaccessible_trust_fund
          or asset_is_land_held_in_trust_for_native_americans
          or asset_is_property_purchased_with_native_american_settlement_payments
          or asset_is_native_american_judgment_or_trust_funds
          or asset_is_student_financial_assistance_for_higher_education
          or household_member_demonstrates_lack_of_ownership_or_inaccessibility
