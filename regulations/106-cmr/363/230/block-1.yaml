format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/363/230/block-1
  summary: |-
    The following kinds of income will be excluded when determining a household's
    eligibility and benefit level: (1) cash contributions from a non-legally
    responsible person restricted for a specific purpose for rent/mortgage,
    fuel, utilities, food, or other needs; (2) vendor payments where a person
    or organization outside the household uses its own funds to make a direct
    payment to a household's creditors or service providers, including
    employer-provided housing; (3) PASS (Plan to Achieve Self-Support) funds
    set aside under an SSA-approved plan to achieve a work goal. SSI benefits
    are not used as PASS funds and remain countable income for SNAP purposes.
rules:
  - name: cash_contribution_from_non_legally_responsible_person_is_excluded
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 363.230 (cash contributions from non-legally responsible persons)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/363/230/block-1
              excerpt: |-
                Any cash contributions from a non-legally responsible person
                (i.e., someone without a court order or other binding
                agreement) that are restricted for a specific purpose and
                provide for a portion of any rent or mortgage, fuel,
                utilities and/or food or other needs are excluded from income.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          contribution_is_cash
          and contributor_is_not_legally_responsible
          and contribution_is_restricted_for_specific_purpose
          and contribution_provides_for_rent_mortgage_fuel_utilities_food_or_other_needs

  - name: vendor_payment_is_excluded
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 363.230 (vendor payments)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/363/230/block-1
              excerpt: |-
                A vendor payment is excluded from income whenever a person or
                organization outside the household uses its own funds to make
                a direct payment to a household's creditors or to a person or
                organization providing a service to the household.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          payer_is_outside_household
          and payer_uses_own_funds
          and (payment_is_direct_to_household_creditor or payment_is_direct_to_household_service_provider)

  - name: employer_provided_housing_is_excluded_vendor_payment
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 363.230 (employer-provided housing as vendor payment)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/363/230/block-1
              excerpt: |-
                If the employer provides housing to an employee, the value of
                the housing shall also be an excluded vendor payment.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          employer_provides_housing_to_employee

  - name: pass_funds_are_excluded_from_income
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 106 CMR 363.230 (PASS funds exclusion)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/363/230/block-1
              excerpt: |-
                These specified funds are to be used to achieve the work goal
                stated in the approved PASS and shall be excluded from income
                in determining SNAP eligibility and benefit level.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_has_ssa_approved_pass
          and funds_are_set_aside_under_pass
          and funds_are_to_be_used_for_pass_work_goal
          and not funds_are_ssi_benefits

  - name: pass_funds_exclusion_is_verified
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 106 CMR 363.230 (PASS verification)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/363/230/block-1
              excerpt: |-
                Exclusion of PASS funds from income for SNAP purposes is
                verified by a copy of the PASS agreement and the PASS approval
                letter from the SSA.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          copy_of_pass_agreement_provided
          and pass_approval_letter_from_ssa_provided

  - name: ssi_benefits_are_countable_income_for_snap
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 106 CMR 363.230 (SSI treatment for SNAP)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/363/230/block-1
              excerpt: |-
                SSI benefits are not used as PASS funds and, therefore, are
                still considered countable income for SNAP purposes.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_receives_ssi_benefits
