format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/361/240/block-1
  summary: |-
    Individuals who pay less than reasonable compensation are not boarders and must be household members. Boarders are ineligible to participate separately, but may participate as members at the request of the household providing lodging and meals. If not requested, boarder income and resources are not available to the household except the boarder payment treatment. Foster care households may include foster care children and adults, and foster care payments are then counted as unearned income.
rules:
  - name: individual_paying_less_than_reasonable_compensation_not_boarder_and_household_member
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 106 CMR 361.240, less-than-reasonable-compensation individuals
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/361/240/block-1
              excerpt: "pay less than reasonable compensation are not boarders and must be members"
    versions:
      - effective_from: '2025-10-01'
        formula: individual_pays_less_than_reasonable_compensation_for_lodging_and_meals

  - name: boarder_separate_participation_ineligible
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 106 CMR 361.240, boarder separate participation
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/361/240/block-1
              excerpt: "Boarders are ineligible to participate separately"
    versions:
      - effective_from: '2025-10-01'
        formula: person_is_boarder

  - name: boarder_member_participation_allowed_at_providing_household_request
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 106 CMR 361.240, boarder participation as household member
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/361/240/block-1
              excerpt: "may participate as members of the household providing these services and at the request"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          person_is_boarder
          and household_providing_lodging_and_meals_requests_boarder_included

  - name: unrequested_boarder_income_and_resources_unavailable_to_providing_household
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 106 CMR 361.240, unrequested boarder income and resources
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/361/240/block-1
              excerpt: "has not requested that its boarders be included ... none of the income and resources"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          person_is_boarder
          and not household_providing_lodging_and_meals_requests_boarder_included

  - name: unrequested_boarder_payment_treatment_under_365_200_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 106 CMR 361.240, boarder payment cross-reference
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/361/240/block-1
              excerpt: "except that the payment of the boarder to the household shall be treated"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          person_is_boarder
          and not household_providing_lodging_and_meals_requests_boarder_included
          and boarder_makes_payment_to_household_providing_lodging_and_meals

  - name: foster_care_person_included_in_snap_household_by_household_option
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 106 CMR 361.240, foster care household option
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/361/240/block-1
              excerpt: "has the option of including the foster care children and adults"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          person_is_foster_care_child_or_adult
          and foster_care_household_elects_to_include_foster_care_children_and_adults_in_snap_household

  - name: included_foster_care_payments_counted_as_unearned_income
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 361.240, foster care payments as unearned income
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/361/240/block-1
              excerpt: "foster care payments shall then be counted as unearned income"
    versions:
      - effective_from: '2025-10-01'
        formula: foster_care_household_elects_to_include_foster_care_children_and_adults_in_snap_household
