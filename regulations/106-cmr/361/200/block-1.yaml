format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/361/200/block-1
  summary: |-
    Spouse is defined as either of two individuals who are legally married to one another, or who are living together and holding themselves out to the community as husband and wife. Parental control means providing financial support or supervision, or both, to an individual younger than 18 years old. If disability is not obvious, verification by a physician statement that the individual is unable to purchase food and prepare meals because of the disability is required. An elderly and disabled individual who meets the two conditions in 106 CMR 361.200(B)(4) and lives with spouse, natural/adopted/stepchildren younger than 22, or children younger than 18 under parental control must be in the same household as them.
rules:
  - name: parental_control_age_limit
    kind: parameter
    dtype: Integer
    source: 106 CMR 361.200 - Parental control definition
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/361/200/block-1
              excerpt: "individual younger than 18 years old"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          18
  - name: child_age_limit_for_same_household
    kind: parameter
    dtype: Integer
    source: 106 CMR 361.200 - same household rule for elderly/disabled
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/361/200/block-1
              excerpt: "natural, adopted or stepchildren younger than 22 years old"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          22
  - name: parental_control_child_age_limit
    kind: parameter
    dtype: Integer
    source: 106 CMR 361.200 - children under parental control
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/361/200/block-1
              excerpt: "children younger than 18 years old living under his or her parental control"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          18
  - name: is_spouse
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 106 CMR 361.200 - Spouse definition
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/361/200/block-1
              excerpt: "Spouse is defined as either of two individuals who are legally married to one another, or who are living together and holding themselves out to the community as husband and wife"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_legally_married_to_other
          or (person_is_living_together_with_other
              and person_holds_out_as_spouse_to_community)
  - name: has_parental_control_over_individual
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 106 CMR 361.200 - Parental control definition
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/361/200/block-1
              excerpt: "Parental control means providing financial support or supervision, or both, to an individual younger than 18 years old"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (person_provides_financial_support_to_individual
           or person_provides_supervision_to_individual)
          and individual_age < parental_control_age_limit
  - name: disability_verification_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 106 CMR 361.200 - Disability verification requirement
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/361/200/block-1
              excerpt: "If this disability is not obvious to the Department, verification of the disability is required"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_claims_disability
          and not disability_is_obvious_to_department
  - name: disability_verification_is_sufficient
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 106 CMR 361.200 - Physician statement requirement
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/361/200/block-1
              excerpt: "The verification shall be a statement from a physician that the individual is unable to purchase food and prepare meals because of the disability"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          has_physician_statement
          and physician_statement_attests_unable_to_purchase_food_and_prepare_meals_due_to_disability
  - name: person_is_unable_to_purchase_food_and_prepare_meals
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 106 CMR 361.200 - Disabled individuals meeting definition deemed unable
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/361/200/block-1
              excerpt: "Individuals meeting the disabled definition in 106 CMR 361.210 shall also be considered unable to purchase food and prepare meals for themselves"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_meets_disabled_definition_under_106_cmr_361_210
          or person_is_otherwise_unable_to_purchase_food_and_prepare_meals
  - name: elderly_and_disabled_individual_must_be_in_same_household
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 106 CMR 361.200(A) - Same household requirement for elderly/disabled
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/361/200/block-1
              excerpt: "An elderly and disabled individual who meets the two conditions in 106 CMR 361.200 (B)(4) and lives with his or her spouse, natural, adopted or stepchildren younger than 22 years old, or children younger than 18 years old living under his or her parental control must be in the same household"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_meets_two_conditions_under_106_cmr_361_200_b_4
          and (person_lives_with_spouse
               or person_lives_with_natural_adopted_or_stepchildren_under_age_22
               or person_lives_with_children_under_age_18_under_parental_control)
