format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/361/210/block-1
  summary: |-
    Individuals meeting the following requirements are entitled to special treatment including ... a maximum asset limit of $3250 (see 106 CMR 363.110(A)) ... and the 165% Income Standard for Elderly and Disabled Individuals (see 106 CMR 361.200).
rules:
  - name: special_treatment_maximum_asset_limit
    kind: parameter
    dtype: Money
    unit: USD
    source: 106 CMR 361.210
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/361/210/block-1
              excerpt: "a maximum asset limit of $3250"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          3250
  - name: special_treatment_entitled
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 106 CMR 361.210
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/361/210/block-1
              excerpt: "Individuals meeting the following requirements are entitled to special treatment"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_meets_special_treatment_requirements
