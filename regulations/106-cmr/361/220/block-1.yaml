format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/361/220/block-1
  summary: |-
    Primary responsibility for designating the head of household for SNAP purposes rests with the household. The head of household may be any adult member of the household, except that if there is a minor child, the head of household must be an adult who has parental control of the child. The household may select its head of household at initial certification and at each subsequent recertification. It may not change the designation during a certification period unless there is a change in the household composition, including a change due to death or institutionalization of a household member.
rules:
  - name: person_eligible_as_head_of_household
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 106 CMR 361.220 - "head of household may be any adult member of the household, except that if there is a minor child, the head of household must be an adult who has parental control of the child"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/361/220/block-1
              excerpt: "The head of household may be any adult member of the household, except that if there is a minor child, the head of household must be an adult who has parental control of the child."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_adult_member_of_household
          and (not minor_child_in_household or person_has_parental_control_of_minor_child)
  - name: head_of_household_change_allowed_during_certification_period
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 361.220 - "It may not change the designation during a certification period unless there is a change in the household composition, including a change due to death or institutionalization of a household member."
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/361/220/block-1
              excerpt: "It may not change the designation during a certification period unless there is a change in the household composition, including a change due to death or institutionalization of a household member."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_composition_changed_during_certification_period
  - name: household_may_select_head_of_household
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 361.220 - "The household may select its head of household at initial certification and at each subsequent recertification."
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/361/220/block-1
              excerpt: "The household may select its head of household at initial certification and at each subsequent recertification."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_is_at_initial_certification
          or household_is_at_recertification
          or head_of_household_change_allowed_during_certification_period
