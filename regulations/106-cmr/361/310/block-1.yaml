  summary: 'When the head of household, spouse or other household member cannot apply

    for the household, an authorized representative may be designated for that

    purpose. Exception: where the only adult member of a household is classified

    as a non-household member (see 106 CMR 361.230), that person may be

    designated as the authorized representative for household members who are

    minors.'
