- name: all_members_applying_for_cash_assistance_allows_simultaneous_snap_application
  period: 2024-01
  input:
    us-ma:regulations/106-cmr/361/160/block-1#input.all_household_members_applying_for_cash_assistance: true
  output:
    us-ma:regulations/106-cmr/361/160/block-1#simultaneous_snap_application_allowed: holds
    us-ma:regulations/106-cmr/361/160/block-1#snap_eligibility_based_solely_on_snap_criteria: holds
    us-ma:regulations/106-cmr/361/160/block-1#snap_certified_under_snap_processing_standards: holds
- name: not_all_members_applying_for_cash_assistance_does_not_trigger_simultaneous_snap_application
  period: 2024-01
  input:
    us-ma:regulations/106-cmr/361/160/block-1#input.all_household_members_applying_for_cash_assistance: false
  output:
    us-ma:regulations/106-cmr/361/160/block-1#simultaneous_snap_application_allowed: not_holds
    us-ma:regulations/106-cmr/361/160/block-1#snap_eligibility_based_solely_on_snap_criteria: holds
    us-ma:regulations/106-cmr/361/160/block-1#snap_certified_under_snap_processing_standards: holds
