format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/361/160/block-1
  summary: |-
    To facilitate their participation in SNAP, households in which all members are applying for cash assistance shall be allowed to apply simultaneously for SNAP benefits. However, the household's SNAP eligibility and benefit level shall be based solely on SNAP eligibility criteria.
rules:
  - name: simultaneous_snap_application_allowed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 361.160
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/361/160/block-1
              excerpt: "households in which all members are applying for cash assistance shall be allowed to apply simultaneously for SNAP benefits"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          all_household_members_applying_for_cash_assistance
  - name: snap_eligibility_based_solely_on_snap_criteria
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 361.160
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/361/160/block-1
              excerpt: "the household's SNAP eligibility and benefit level shall be based solely on SNAP eligibility criteria"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          simultaneous_snap_application_allowed
            or not simultaneous_snap_application_allowed
  - name: snap_certified_under_snap_processing_standards
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 361.160
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/361/160/block-1
              excerpt: "The household shall be certified in accordance with the SNAP notice and processing standards even when these standards are different than those of the cash assistance program"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          simultaneous_snap_application_allowed
            or not simultaneous_snap_application_allowed
