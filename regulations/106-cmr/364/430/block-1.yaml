format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/364/430/block-1
  summary: |-
    Except for expenses the household elects to average, the expense is
    deducted in the month it is billed or otherwise becomes due, regardless
    of when the household intends to pay the expense. A particular expense
    may be deducted only once. Amounts carried forward from past billing
    periods are not deductible in a subsequent month even if included in
    the most recent billing or actually paid by the household in the most
    recent billing period.
rules:
  - name: expense_is_deductible_this_month
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 364.430 (block 1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/364/430/block-1
              excerpt: |-
                Except for expenses the household elects to average, the
                expense is deducted in the month it is billed or otherwise
                becomes due
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/364/430/block-1
              excerpt: |-
                A particular expense may be deducted only once. Amounts
                carried forward from past billing periods are not
                deductible in a subsequent month
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          expense_is_billed_or_becomes_due_this_month
          and not household_elects_to_average_expense
          and not expense_is_amount_carried_forward_from_past_billing_period
          and not expense_was_previously_deducted
