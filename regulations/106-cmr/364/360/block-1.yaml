format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/364/360/block-1
  summary: |-
    Households with a TAFDC household member that receives a child support
    payment of up to $50 monthly as a TAFDC Related Benefit from the DOR
    Child Support Enforcement Division as provided in 106 CMR 705.900 shall
    have the payment used in the calculation of benefits for the month after
    receipt.
rules:
  - name: maximum_tafdc_related_child_support_payment
    kind: parameter
    dtype: Money
    unit: USD
    period: Month
    source: 106 CMR 364.360
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/364/360/block-1
              excerpt: "child support payment of up to $50 monthly"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          50
  - name: countable_tafdc_related_child_support_payment
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 106 CMR 364.360
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/364/360/block-1
              excerpt: "shall have the payment used in the calculation of benefits for the month after receipt"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/364/360/block-1
              excerpt: "Households with a TAFDC household member that receives a child support payment"
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/364/360/block-1
              excerpt: "up to $50 monthly"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if household_has_tafdc_member_receiving_tafdc_related_child_support_payment_prior_month: min(tafdc_related_child_support_payment_received_prior_month, maximum_tafdc_related_child_support_payment) else: 0
