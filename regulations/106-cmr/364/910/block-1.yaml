  summary: |-
    The primary applicant and/or the individual authorized to access the SNAP benefits must be informed that the Department may conduct matches authorized by law for the purposes of verifying eligibility and the effective administration of the Department's programs. 106 CMR 364.910(C) does not apply to disaster SNAP EBT cards issued in accordance with 106 CMR 366.620(B)(4).
