format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/364/500/block-1
  summary: |-
    Net monthly income of destitute (migrant) households is calculated per 106 CMR 365.810. For all other households, round down each income and allotment calculation ending in .01 through .49 cents and round up each calculation ending in .50 through .99 cents. If these costs exceed $35 per month, go to the next step. If these costs are $35 or less, go to 106 CMR 364.500(G).
rules:
  - name: cost_threshold
    kind: parameter
    dtype: Money
    unit: USD
    source: 106 CMR 364.500 block-1 ("If these costs exceed $35 per month")
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/364/500/block-1
              excerpt: "$35 per month"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          35
  - name: costs_exceed_threshold
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 364.500 block-1 ("If these costs exceed $35 per month, go to the next step.")
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/364/500/block-1
              excerpt: "If these costs exceed $35 per month, go to the next step."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_monthly_costs > cost_threshold
  - name: route_to_section_g
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 364.500 block-1 ("If these costs are $35 or less, go to 106 CMR 364.500 (G).")
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/364/500/block-1
              excerpt: "If these costs are $35 or less, go to 106 CMR 364.500 (G)."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_monthly_costs <= cost_threshold
