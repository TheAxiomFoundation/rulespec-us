    corpus_citation_path: us-ma/regulation/106-cmr/364/950/block-1
  summary: |-
    The Maximum Gross Monthly Income Standards are based on household size and are adjusted annually by USDA/FNS. Public Assistance categorically eligible households do not have to meet the gross income eligibility standards. SNAP-only TANF Services Households are subject to the Gross Monthly Categorical Eligibility Standards at 106 CMR 364.976.
  status: deferred
  deferred_outputs:
    - output: us-ma:regulations/106-cmr/364/950/block-1#gross_income_eligibility_standard_met
      reason: |-
        The provision references the Maximum Gross Monthly Income Standards (adjusted annually by USDA/FNS and posted at www.mass.gov/dta) and cross-references 106 CMR 364.370 for gross-income eligibility details and 106 CMR 364.976 for the Gross Monthly Categorical Eligibility Standards applied to SNAP-only TANF Services Households. The source text itself does not state the numeric standards, the household-size table, or the computational mechanics needed to encode an executable gross-income test. Those values live in the externally posted USDA/FNS tables and in the cited sibling regulations, which are not provided in this slice.
