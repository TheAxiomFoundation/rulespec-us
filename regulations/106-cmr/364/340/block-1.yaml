format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/364/340/block-1
  summary: |-
    Whenever a full month's income is anticipated but is received on a weekly or biweekly basis, the Department shall convert the income to a monthly amount by multiplying weekly amounts by 4.333 and biweekly amounts by 2.167.
rules:
  - name: weekly_to_monthly_conversion_factor
    kind: parameter
    dtype: Decimal
    source: 106 CMR 364.340 (weekly amounts multiplied by 4.333)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/364/340/block-1
              excerpt: "multiplying weekly amounts by 4.333"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          4.333
  - name: biweekly_to_monthly_conversion_factor
    kind: parameter
    dtype: Decimal
    source: 106 CMR 364.340 (biweekly amounts multiplied by 2.167)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/364/340/block-1
              excerpt: "biweekly amounts by 2.167"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          2.167
  - name: converted_monthly_income
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 106 CMR 364.340 (conversion of weekly/biweekly income to monthly)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/364/340/block-1
              excerpt: "the Department shall convert the income to a monthly amount by multiplying weekly amounts by 4.333 and biweekly amounts by 2.167"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if full_month_income_anticipated and income_received_weekly: weekly_income_amount * weekly_to_monthly_conversion_factor else: if full_month_income_anticipated and income_received_biweekly: biweekly_income_amount * biweekly_to_monthly_conversion_factor else: 0
