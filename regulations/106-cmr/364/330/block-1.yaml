format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/364/330/block-1
  summary: |-
    Income anticipated during the certification period shall be counted as income only in the month it is expected to be received, unless the income is averaged. Nonrecurring lump sum payments are counted as an asset in the month received and not counted as income.
rules:
  - name: payment_counted_as_income_in_month
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: 106 CMR 364.330
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/364/330/block-1
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          payment_is_anticipated_income
          and not payment_income_is_averaged
          and month_is_expected_receipt_month
          and not payment_is_nonrecurring_lump_sum
  - name: nonrecurring_lump_sum_counted_as_asset_in_month
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: 106 CMR 364.330
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/364/330/block-1
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          payment_is_nonrecurring_lump_sum
          and month_is_payment_receipt_month
