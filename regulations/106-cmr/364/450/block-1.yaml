format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/364/450/block-1
  summary: |-
    If a deductible expense must be verified but obtaining the verification would delay certification, the household may elect to be certified without the deduction. If the household later provides the missing verification, the case manager treats it as a reported change. The household is not entitled to lost benefits unless the expense could not be verified within the 30-day application processing standard because the worker did not allow at least ten days from the date of the initial request or did not provide required assistance. Households ineligible because a claimed but unverified expense is disallowed must be sent a Notice of Pending/Denial on the 30th day following the date of application.
rules:
  - name: application_processing_standard_days
    kind: parameter
    dtype: Integer
    source: 106 CMR 364.450
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/364/450/block-1
              excerpt: "within the 30-day application processing standard"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30
  - name: minimum_verification_request_days
    kind: parameter
    dtype: Integer
    source: 106 CMR 364.450
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/364/450/block-1
              excerpt: "at least ten days from the date of the initial request"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10
  - name: notice_of_pending_denial_day
    kind: parameter
    dtype: Integer
    source: 106 CMR 364.450
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/364/450/block-1
              excerpt: "Notice of Pending/Denial on the 30 th day following the date of application"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30
  - name: household_may_elect_certification_without_deduction
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 364.450
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/364/450/block-1
              excerpt: "the worker must inform the household that it may elect to be certified without receiving the deduction for the unverified expense"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          deductible_expense_must_be_verified
          and obtaining_verification_would_delay_certification
  - name: later_verification_treated_as_reported_change
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 364.450
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/364/450/block-1
              excerpt: "the case manager shall treat the information as a reported change and provide increased benefits, if any"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_was_certified_without_deduction_for_unverified_expense
          and household_subsequently_provided_missing_verification
  - name: household_entitled_to_lost_benefits
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 364.450
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/364/450/block-1
              excerpt: "not entitled to lost benefits unless the expense could not be verified within the 30-day application processing standard because the worker did not allow the household at least ten days from the date of the initial request to provide the verification or because the worker did not provide the household assistance when required"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/364/450/block-1
              excerpt: "within the 30-day application processing standard"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/364/450/block-1
              excerpt: "at least ten days from the date of the initial request"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          expense_could_not_be_verified_within_application_processing_standard
          and (worker_did_not_allow_minimum_verification_days_from_initial_request
          or worker_did_not_provide_required_assistance)
  - name: notice_of_pending_denial_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 364.450
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/364/450/block-1
              excerpt: "Households ineligible because a claimed, but unverified expense, is disallowed must be sent a Notice of Pending/Denial on the 30 th day following the date of application"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_ineligible_because_claimed_unverified_expense_disallowed
