  summary: |-
    Individuals who believe they have been subject to discrimination as specified in 106 CMR 360.200 may file a written complaint with the Secretary of Agriculture, the Administrator of FNS, and/or with the Department's Director of Equal Opportunity. The worker shall explain both complaint systems and advise the individual of the right to file in either or both. Provides USDA complaint filing instructions and Massachusetts Commission Against Discrimination contact information.
