format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/360/600/block-1
  summary: |-
    Any household that refuses to cooperate (as defined in 106 CMR 361.400) in furnishing information for Quality Control purposes shall be determined ineligible for SNAP. Once denied or terminated, the household shall remain ineligible until it does cooperate and all other eligibility requirements are met.
rules:
  - name: household_ineligible_for_snap_due_to_quality_control_noncooperation
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 360.600
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/360/600/block-1
              excerpt: "Any household that refuses to cooperate (as defined in 106 CMR 361.400 : Household Refusal to Cooperate ) in furnishing information for Quality Control purposes shall be determined ineligible for SNAP."
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/360/600/block-1
              excerpt: "Once denied or terminated, the household shall remain ineligible until it does cooperate and all other eligibility requirements are met."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_refuses_to_cooperate_with_quality_control
          or (
            household_previously_denied_or_terminated_for_quality_control_noncooperation
            and not household_has_subsequently_cooperated_with_quality_control
          )
