- name: household_currently_refuses_to_cooperate_is_ineligible
  period: 2026-01
  input:
    us-ma:regulations/106-cmr/360/600/block-1#input.household_refuses_to_cooperate_with_quality_control: true
    ? us-ma:regulations/106-cmr/360/600/block-1#input.household_previously_denied_or_terminated_for_quality_control_noncooperation
    : false
    us-ma:regulations/106-cmr/360/600/block-1#input.household_has_subsequently_cooperated_with_quality_control: false
  output:
    us-ma:regulations/106-cmr/360/600/block-1#household_ineligible_for_snap_due_to_quality_control_noncooperation: holds
- name: previously_terminated_household_that_has_not_cooperated_remains_ineligible
  period: 2026-01
  input:
    us-ma:regulations/106-cmr/360/600/block-1#input.household_refuses_to_cooperate_with_quality_control: false
    ? us-ma:regulations/106-cmr/360/600/block-1#input.household_previously_denied_or_terminated_for_quality_control_noncooperation
    : true
    us-ma:regulations/106-cmr/360/600/block-1#input.household_has_subsequently_cooperated_with_quality_control: false
  output:
    us-ma:regulations/106-cmr/360/600/block-1#household_ineligible_for_snap_due_to_quality_control_noncooperation: holds
- name: previously_terminated_household_that_has_now_cooperated_is_no_longer_ineligible_under_this_rule
  period: 2026-01
  input:
    us-ma:regulations/106-cmr/360/600/block-1#input.household_refuses_to_cooperate_with_quality_control: false
    ? us-ma:regulations/106-cmr/360/600/block-1#input.household_previously_denied_or_terminated_for_quality_control_noncooperation
    : true
    us-ma:regulations/106-cmr/360/600/block-1#input.household_has_subsequently_cooperated_with_quality_control: true
  output:
    us-ma:regulations/106-cmr/360/600/block-1#household_ineligible_for_snap_due_to_quality_control_noncooperation: not_holds
- name: cooperating_household_with_no_prior_termination_is_not_ineligible
  period: 2026-01
  input:
    us-ma:regulations/106-cmr/360/600/block-1#input.household_refuses_to_cooperate_with_quality_control: false
    ? us-ma:regulations/106-cmr/360/600/block-1#input.household_previously_denied_or_terminated_for_quality_control_noncooperation
    : false
    us-ma:regulations/106-cmr/360/600/block-1#input.household_has_subsequently_cooperated_with_quality_control: false
  output:
    us-ma:regulations/106-cmr/360/600/block-1#household_ineligible_for_snap_due_to_quality_control_noncooperation: not_holds
