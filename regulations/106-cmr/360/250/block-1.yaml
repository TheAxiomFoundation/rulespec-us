format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/360/250/block-1
  summary: |-
    Disability does not include psychoactive substance abuse disorder
    resulting from current illegal use of drugs. An individual who poses a
    direct threat to the health and safety of others is not a qualified
    individual. An individual currently engaging in the illegal use of drugs
    when the Department acts on the basis of such use is not a qualified
    individual.
rules:
  - name: condition_qualifies_as_disability
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: 106 CMR 360.250 (block 1) - Disability exclusion
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/360/250/block-1
              excerpt: "Disability, does not include psychoactive substance abuse disorder resulting from current illegal use of drugs."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not condition_is_psychoactive_substance_abuse_from_current_illegal_drug_use
  - name: is_qualified_individual
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: 106 CMR 360.250 (block 1) - Qualified individual exclusions
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/360/250/block-1
              excerpt: "An individual who poses a direct threat to the health and safety of others is not a qualified individual."
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/360/250/block-1
              excerpt: "An individual who is currently engaging in the illegal use of drugs when the Department acts on the basis of such use is not a qualified individual."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not individual_poses_direct_threat_to_health_and_safety_of_others
