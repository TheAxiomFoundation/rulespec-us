  summary: |-
    Provision of benefits in SNAP is subject to the availability of sufficient appropriations by the United States Congress. In the event that USDA reduces, suspends, or cancels program benefits, the Department shall administer SNAP in conformity with USDA regulations concerning said reduction, suspension, or cancellation, notwithstanding any Department regulations to the contrary.
