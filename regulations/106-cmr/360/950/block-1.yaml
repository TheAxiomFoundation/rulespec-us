format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/360/950/block-1
  summary: |-
    Voter registration application forms shall be made available at all local offices to applicants and recipients who are U.S. citizens, and 18 years of age or older or who will be 18 years of age on or before the next election. Completed voter registration application forms submitted to local offices must be transmitted to the proper state election offices within five days.
rules:
  - name: voter_registration_transmittal_deadline_days
    kind: parameter
    dtype: Integer
    source: 106 CMR 360.950
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/360/950/block-1
              excerpt: "transmitted to the proper state election offices for processing within five days of accepting the completed forms"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          5
  - name: voter_registration_minimum_age
    kind: parameter
    dtype: Integer
    source: 106 CMR 360.950
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/360/950/block-1
              excerpt: "18 years of age or older or who will be 18 years of age on or before the next election"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          18
  - name: voter_registration_form_available_to_person
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: 106 CMR 360.950
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/360/950/block-1
              excerpt: "applicants and recipients who are U.S. citizens, and 18 years of age or older or who will be 18 years of age on or before the next election"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (person_is_applicant_or_recipient
          and person_is_us_citizen)
          and (person_age >= voter_registration_minimum_age
          or person_will_be_minimum_age_on_or_before_next_election)
