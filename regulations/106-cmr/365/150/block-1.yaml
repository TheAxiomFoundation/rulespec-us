format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/365/150/block-1
  summary: |-
    PA households shall be recertified for SNAP, to the extent possible, at the
    same time their cash assistance eligibility is reviewed. If a PA household
    has not had its PA eligibility reviewed by the end of the 11th month
    following its initial SNAP certification or last eligibility review, a
    Notice of SNAP Termination shall be sent to the household.
rules:
  - name: months_without_pa_review_triggering_snap_termination_notice
    kind: parameter
    dtype: Integer
    source: 106 CMR 365.150
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/365/150/block-1
              excerpt: "by the end of the 11 th month following its initial SNAP certification or last eligibility review"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          11
  - name: snap_termination_notice_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 365.150
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/365/150/block-1
              excerpt: "a Notice of SNAP Termination shall be sent to the household"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_is_pa_household
          and months_since_initial_snap_certification_or_last_eligibility_review > months_without_pa_review_triggering_snap_termination_notice
          and not pa_eligibility_reviewed_since_initial_snap_certification_or_last_eligibility_review
