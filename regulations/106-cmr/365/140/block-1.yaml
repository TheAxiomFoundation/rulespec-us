format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/365/140/block-1
  summary: |-
    PA households shall be assigned a 12-month certification period. The certification period shall expire the month following the household's next scheduled PA redetermination or at the end of the 12-month certification period, whichever occurs first.
rules:
  - name: pa_household_certification_period_months
    kind: parameter
    dtype: Integer
    source: 106 CMR 365.140
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/365/140/block-1
              excerpt: "PA households shall be assigned a 12-month certification period."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          12
  - name: pa_household_certification_period_end_month
    kind: derived
    entity: Household
    dtype: Integer
    period: Month
    source: 106 CMR 365.140
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/365/140/block-1
              excerpt: "The certification period shall expire the month following the household's next scheduled PA redetermination or at the end of the 12-month certification period, whichever occurs first."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          min(months_until_next_pa_redetermination + 1, pa_household_certification_period_months)
