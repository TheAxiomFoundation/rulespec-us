    corpus_citation_path: us-ma/regulation/106-cmr/365/800/block-1
  summary: |-
    Each local office shall designate personnel to screen each application on the day it is made so that a determination can be made on that day as to whether the household is entitled to expedited service. The expedited service households described in 106 CMR 365.810 are the only households entitled to expedited service at initial certification. A household not entitled to expedited service shall have its application processed according to normal processing standards.
  deferred_outputs:
    - output: us-ma:regulations/106-cmr/365/800/block-1#entitled_to_expedited_service
      reason: |-
        The provision defines entitlement to expedited service by cross-reference to 106 CMR 365.810 (households described therein are the only households entitled at initial certification), and the recertification branch is a sentence fragment ("they have either:") whose enumerated conditions are not included in this source slice. The administrative same-day screening duty and the default routing of non-expedited households to normal processing standards are administrative/process clauses without an independently computable RuleSpec output. Encoding without 106 CMR 365.810 and the truncated recertification conditions would misrepresent the legal test.
