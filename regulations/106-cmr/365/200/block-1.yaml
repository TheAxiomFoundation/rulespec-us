format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/365/200/block-1
  summary: |-
    Payment from a boarder who is not a household member is self-employment income to the household per 106 CMR 365.200; commercial boarding houses follow 106 CMR 365.900. Income and resources of non-member boarders are not considered available to the household. The amount allowed as a cost of doing business shall not exceed the payment received from the boarder. Shelter costs shall not include shelter expenses paid by the boarder directly to a third party such as the landlord or utility company.
rules:
  - name: boarder_payment_is_self_employment_income
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 365.200
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/365/200/block-1
              excerpt: "The amount of payment a household receives from a boarder who is not a household member shall be considered self-employment income to the household"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_receives_payment_from_non_member_boarder
  - name: non_member_boarder_income_and_resources_excluded
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 365.200
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/365/200/block-1
              excerpt: "boarders who are not members of the household shall have none of their income and resources considered available to the household"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_has_non_member_boarder
  - name: boarder_cost_of_doing_business_allowed
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 106 CMR 365.200
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/365/200/block-1
              excerpt: "the amount allowed as a cost of doing business can never exceed the amount of payment the household receives from the boarder"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          min(max(0, claimed_boarder_cost_of_doing_business), max(0, boarder_payment_received_by_household))
  - name: boarder_shelter_costs_paid_to_third_party_excluded
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 106 CMR 365.200
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/365/200/block-1
              excerpt: "Shelter costs for households with boarders shall not include any shelter expenses paid by the boarder directly to a third party, such as the landlord or utility company"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          max(0, total_household_shelter_expenses - shelter_expenses_paid_by_boarder_directly_to_third_party)
