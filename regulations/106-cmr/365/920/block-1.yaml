format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/365/920/block-1
  summary: |-
    When all or part of a household's income is from self-employment, the household members must comply with SNAP Work Requirements in accordance with 106 CMR 362.300 unless exempt.
rules:
  - name: self_employed_household_member_must_comply_with_work_requirements
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 106 CMR 365.920
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/365/920/block-1
              excerpt: "household members must comply with SNAP Work Requirements in accordance with 106 CMR 362.300 : Work Requirements unless exempt"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_has_self_employment_income
          and not member_is_exempt_from_snap_work_requirements
