format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/365/130/block-1
  summary: |-
    Cash assistance recipients are exempt from the SNAP Program Work Requirements if subject to and complying with a cash assistance work requirement. PA households shall not receive an increase in SNAP benefits if a household member refuses to comply with the TAFDC or EAEDC work requirements.
rules:
  - name: person_exempt_from_snap_work_requirements
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 106 CMR 365.130
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/365/130/block-1
              excerpt: "Cash assistance recipients are exempt from the SNAP Program Work Requirements if subject to and complying with a cash assistance work requirement."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_cash_assistance_recipient
          and person_is_subject_to_cash_assistance_work_requirement
          and person_is_complying_with_cash_assistance_work_requirement
  - name: snap_benefit_increase_blocked_for_pa_household
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 365.130
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/365/130/block-1
              excerpt: "PA households shall not receive an increase in SNAP benefits if a household member refuses to comply with the TAFDC or EAEDC work requirements."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_is_pa_household
          and household_member_refuses_to_comply_with_tafdc_or_eaedc_work_requirements
