module:
  status: deferred
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/365/160/block-1
  summary: |-
    Except for changes in grant amounts, PA households are subject to the same reporting requirements as SNAP Change Reporting households specified in 106 CMR 366.110, and shall use the SNAP Change Report Form. PA households that report a change in circumstances to the PA worker shall be considered to have reported the change for SNAP purposes.
  deferred_outputs:
    - output: us-ma:regulations/106-cmr/365/160/block-1#pa_household_reporting_requirements
      reason: |-
        The provision is an administrative cross-reference imposing SNAP Change Reporting requirements (106 CMR 366.110) on PA households except for grant-amount changes, and deeming reports made to the PA worker as SNAP-reported. The cited 106 CMR 366.110 reporting-requirements source is not available as an importable RuleSpec target, so the substantive reporting obligations cannot be composed faithfully. The remaining clauses are administrative duties (use of SNAP Change Report Form; deemed reporting to PA worker) without a calculable benefit, amount, condition, or exception suitable for an executable derived output.
