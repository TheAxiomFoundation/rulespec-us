format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/365/730/block-1
  summary: |-
    Student households are subject to the asset eligibility standards set forth in 106 CMR 363.000 through 363.150. In determining the assets of students, deferred payment loans and other monies that have been averaged as income as specified in 106 CMR 365.740 shall not be counted as an asset.
rules:
  - name: student_household_asset_exclusion_for_income_averaged_monies
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 106 CMR 365.730
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/365/730/block-1
              excerpt: "deferred payment loans and other monies that have been averaged as income as specified in 106 CMR 365.740 shall not be counted as an asset"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if household_contains_student:
            max(0, student_deferred_payment_loans_averaged_as_income)
            + max(0, student_other_monies_averaged_as_income_under_365_740)
          else: 0
