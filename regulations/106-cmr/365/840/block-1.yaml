format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/365/840/block-1
  summary: |-
    All income received or reasonably expected to be received in the month of application must be considered when determining SNAP eligibility and benefit level. For Destitute (Migrant) Households, income already received during the month of application must be considered; income anticipated to be received after the application has been made shall be disregarded. If a travel advance has been received during the month of application, it shall be disregarded if it is considered a reimbursement. If it is considered by written contract as an advance on wages to be earned later, the travel advance shall be considered income. The provisions of 106 CMR 364.650: Prorating Initial Month's Benefits shall apply to all expedited service households.
rules:
  - name: anticipated_income_in_month_of_application_disregarded
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 365.840
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/365/840/block-1
              excerpt: "For Destitute (Migrant) Households ... Income anticipated to be received after the application has been made shall be disregarded."
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          household_is_destitute_migrant

  - name: travel_advance_disregarded_as_reimbursement
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 365.840
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/365/840/block-1
              excerpt: "If a travel advance has been received during the month of application, it shall be disregarded if it is considered a reimbursement."
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          household_is_destitute_migrant
          and travel_advance_received_in_month_of_application
          and travel_advance_is_reimbursement

  - name: travel_advance_counted_as_income_under_written_contract
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 365.840
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/365/840/block-1
              excerpt: "If it is considered by written contract as an advance on wages to be earned later, the travel advance shall be considered income."
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          household_is_destitute_migrant
          and travel_advance_received_in_month_of_application
          and travel_advance_is_written_contract_advance_on_future_wages

  - name: proration_of_initial_month_benefits_applies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 365.840
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/365/840/block-1
              excerpt: "The provisions of 106 CMR 364.650 : Prorating Initial Month's Benefits concerning the proration of initial month's benefits shall apply to all expedited service households."
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          household_is_expedited_service_household
