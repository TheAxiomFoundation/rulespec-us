format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/367/490/block-1
  summary: |-
    The Department shall establish a claim for overissuance against any household that has received more SNAP benefits than it was entitled to receive. The Department must establish a claim for overissuance against any household that contains an adult member who was also an adult member of another household that received more SNAP benefits than it was entitled to receive. All adult household members shall be jointly and severally liable for the value of any overissuance of benefits to the household.
