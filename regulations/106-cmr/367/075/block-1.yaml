  summary: |-
    The Department may respond to a series of individual requests for hearings by conducting a single group hearing. The Department may consolidate only cases where the sole issue is one of state and/or federal law, regulations or policy and when individual issues of fact are not disputed. In all group hearings, the regulations governing individual hearings shall be followed. Each individual household shall be permitted to present its own case or have the case presented by a representative.
