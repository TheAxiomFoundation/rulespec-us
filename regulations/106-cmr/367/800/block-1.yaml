format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/367/800/block-1
  summary: |-
    Fleeing felons ineligible for SNAP. Voluntary quit without good cause:
    3 months (1st finding), 6 months (2nd), 12 months (3rd). Head of household
    voluntary quit: entire household ineligible for 6 months. Quit sanctions
    carry with the individual to a new household. Households with disqualified
    members are not categorically eligible. IPV disqualification timing and
    benefit-level non-increase rules. Pre-12/30/2016 IPV standards preserved.
rules:
  - name: voluntary_quit_first_finding_disqualification_months
    kind: parameter
    dtype: Integer
    source: 106 CMR 367.800
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/367/800/block-1
              excerpt: "three months for the first finding"
    versions:
      - effective_from: '2016-12-30'
        formula: |-
          3
  - name: voluntary_quit_second_finding_disqualification_months
    kind: parameter
    dtype: Integer
    source: 106 CMR 367.800
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/367/800/block-1
              excerpt: "six months for the second finding"
    versions:
      - effective_from: '2016-12-30'
        formula: |-
          6
  - name: voluntary_quit_third_finding_disqualification_months
    kind: parameter
    dtype: Integer
    source: 106 CMR 367.800
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/367/800/block-1
              excerpt: "12 months for the third finding"
    versions:
      - effective_from: '2016-12-30'
        formula: |-
          12
  - name: head_of_household_quit_disqualification_months
    kind: parameter
    dtype: Integer
    source: 106 CMR 367.800
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/367/800/block-1
              excerpt: "entire household shall be ineligible for SNAP benefits for a period of six months if the head of household voluntarily quits a job"
    versions:
      - effective_from: '2016-12-30'
        formula: |-
          6
  - name: person_ineligible_as_fleeing_felon
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 106 CMR 367.800
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/367/800/block-1
              excerpt: "fleeing to avoid prosecution, custody or confinement after conviction of a felony ... or is violating a condition of probation or parole shall be ineligible for SNAP benefits"
    versions:
      - effective_from: '2016-12-30'
        formula: |-
          person_is_fleeing_to_avoid_felony_prosecution_custody_or_confinement
          or person_is_violating_condition_of_probation_or_parole
  - name: person_voluntary_quit_disqualification_months
    kind: derived
    entity: Person
    dtype: Integer
    period: Month
    source: 106 CMR 367.800
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/367/800/block-1
              excerpt: "three months for the first finding, six months for the second finding and 12 months for the third finding"
    versions:
      - effective_from: '2016-12-30'
        formula: |-
          if person_voluntary_quit_finding_count == 1: voluntary_quit_first_finding_disqualification_months
          else: if person_voluntary_quit_finding_count == 2: voluntary_quit_second_finding_disqualification_months
          else: if person_voluntary_quit_finding_count >= 3: voluntary_quit_third_finding_disqualification_months
          else: 0
  - name: person_ineligible_due_to_voluntary_quit
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 106 CMR 367.800
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/367/800/block-1
              excerpt: "client subject to the SNAP work requirements is unemployed and has voluntarily quit a job without good cause, the individual shall be ineligible for SNAP benefits"
    versions:
      - effective_from: '2016-12-30'
        formula: |-
          person_subject_to_snap_work_requirements
          and person_is_unemployed
          and person_voluntarily_quit_job_without_good_cause
          and person_within_voluntary_quit_disqualification_period
  - name: household_ineligible_due_to_head_voluntary_quit
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 367.800
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/367/800/block-1
              excerpt: "entire household shall be ineligible for SNAP benefits for a period of six months if the head of household voluntarily quits a job"
    versions:
      - effective_from: '2016-12-30'
        formula: |-
          head_of_household_voluntarily_quit_job_while_participating
          and household_within_head_quit_disqualification_period
  - name: household_categorically_eligible_blocked_by_disqualified_member
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 367.800
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/367/800/block-1
              excerpt: "Households cannot be considered categorically eligible if they contain one or more disqualified members"
    versions:
      - effective_from: '2016-12-30'
        formula: |-
          household_contains_disqualified_member
  - name: household_benefit_level_increase_from_ipv_disqualification_prohibited
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 367.800
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/367/800/block-1
              excerpt: "household's benefit level shall not be increased as a result of an IPV disqualification"
    versions:
      - effective_from: '2016-12-30'
        formula: |-
          household_contains_ipv_disqualified_member
  - name: law_enforcement_actively_seeking_established
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 106 CMR 367.800
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/367/800/block-1
              excerpt: "presentation of a felony arrest warrant to a State agency by a law enforcement officer establishes that the law enforcement agency is \"actively seeking\""
    versions:
      - effective_from: '2016-12-30'
        formula: |-
          felony_arrest_warrant_presented_to_state_agency_by_law_enforcement_officer
