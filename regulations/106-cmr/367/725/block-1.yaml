  summary: |-
    The Department shall determine the eligibility and benefit level for a household awaiting an ADH decision by considering all factors except those concerning the IPV or related recoupment. Changed circumstances, the expiration of the certification period, and all other program rules shall be treated in the usual manner.
  deferred_outputs:
    - output: us-ma:regulations/106-cmr/367/725/block-1#eligibility_and_benefit_level_pending_adh
      reason: |-
        The provision is an administrative directive instructing the Department to determine eligibility and benefit level while an Administrative Disqualification Hearing (ADH) decision is pending, excluding factors concerning the alleged Intentional Program Violation (IPV) or related recoupment. Faithful encoding requires importing the full SNAP eligibility and benefit-level calculation along with IPV/recoupment definitions; those upstream sources are not provided in this slice. No standalone computable amount, rate, threshold, cap, or condition is stated in this block.
