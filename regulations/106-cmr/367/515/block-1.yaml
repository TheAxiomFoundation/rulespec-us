  summary: |-
    The Department shall act on behalf of and as FNS in any bankruptcy proceedings against bankrupt households owing SNAP claims. The Department shall possess any rights, priorities, interests, liens or privileges, and shall participate in any distributions of assets, to the same extent as FNS. Acting as FNS, the Department shall have the power and authority to file objections to discharge, proofs of claims, exceptions to discharge petitions for revocation of discharge, and any other documents, motions or objections which FNS might have filed.
