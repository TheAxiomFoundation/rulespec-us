format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/367/900/block-1
  summary: |-
    The Department shall disqualify an individual(s) found guilty of an IPV by the court, in accordance with 106 CMR 367.800, unless otherwise ordered by the court. The Department shall begin the disqualification period with the first possible month after the date the disqualification was ordered.
rules:
  - name: person_disqualified_for_court_ipv
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 106 CMR 367.900
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/367/900/block-1
              excerpt: "The Department shall disqualify an individual(s) found guilty of an IPV by the court, in accordance with 106 CMR 367.800, unless otherwise ordered by the court."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_found_guilty_of_ipv_by_court
          and not court_ordered_otherwise
          and month_is_on_or_after_first_possible_month_after_disqualification_ordered
