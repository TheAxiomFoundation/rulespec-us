    period: Day
    source: 106 CMR 367.750
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/367/750/block-1
              excerpt: "clear and convincing evidence which demonstrates that the household member willfully, knowingly, and with deceitful intent committed an IPV"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          evidence_is_clear_and_convincing
          and household_member_acted_willfully
          and household_member_acted_knowingly
          and household_member_acted_with_deceitful_intent
          and household_member_committed_ipv
