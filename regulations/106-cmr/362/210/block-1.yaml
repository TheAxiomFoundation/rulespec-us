format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/362/210/block-1
  summary: |-
    If the household member provided proof of citizenship to receive TAFDC or
    EAEDC benefits, this is acceptable verification of citizenship for SNAP.
    If the household cannot provide the above forms of verification but can
    provide a reasonable explanation as to why verification is not available,
    the Department shall accept a signed statement from a U.S. citizen that
    declares, under penalty of perjury, that the household member in question
    is a U.S. citizen. The signed statement shall contain a warning of the
    penalties for helping someone commit fraud.
rules:
  - name: snap_citizenship_verified_by_tafdc_or_eaedc
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 106 CMR 362.210 block 1 (TAFDC/EAEDC proof acceptable)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/362/210/block-1
              excerpt: |-
                If the household member provided proof of citizenship to
                receive TAFDC or EAEDC benefits, this is acceptable
                verification of citizenship for SNAP.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          member_provided_citizenship_proof_for_tafdc
          or member_provided_citizenship_proof_for_eaedc
  - name: snap_citizenship_signed_statement_accepted
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 106 CMR 362.210 block 1 (signed statement fallback)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/362/210/block-1
              excerpt: |-
                If the household cannot provide the above forms of
                verification but can provide a reasonable explanation as to
                why verification is not available, the Department shall
                accept a signed statement from a U.S. citizen that declares,
                under penalty of perjury, that the household member in
                question is a U.S. citizen. The signed statement shall
                contain a warning of the penalties for helping someone
                commit fraud.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_cannot_provide_other_citizenship_verification
          and household_provided_reasonable_explanation_for_unavailability
          and signed_statement_provided_by_us_citizen
          and signed_statement_declares_member_is_us_citizen_under_penalty_of_perjury
          and signed_statement_contains_fraud_penalty_warning
  - name: snap_citizenship_verification_accepted
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 106 CMR 362.210 block 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/362/210/block-1
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          snap_citizenship_verified_by_tafdc_or_eaedc
          or snap_citizenship_signed_statement_accepted
