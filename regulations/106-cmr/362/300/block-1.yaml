format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/362/300/block-1
  summary: |-
    Nonexempt household members between 16 and 59 years of age must comply with the mandatory SNAP work requirements (106 CMR 362.310(A)). Failure without good cause results in disqualification (106 CMR 367.800; good cause at 106 CMR 362.330). Unless an exemption applies, household members between 18 and 49 years of age must also comply with the ABAWD work program requirements (106 CMR 362.320). Failure for three months in a three-year period without good cause may result in ineligibility (good cause at 106 CMR 362.320(C)).
rules:
  - name: mandatory_work_minimum_age
    kind: parameter
    dtype: Integer
    source: 106 CMR 362.300
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/362/300/block-1
              excerpt: "household members between 16 and 59 years of age"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          16
  - name: mandatory_work_maximum_age
    kind: parameter
    dtype: Integer
    source: 106 CMR 362.300
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/362/300/block-1
              excerpt: "household members between 16 and 59 years of age"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          59
  - name: abawd_minimum_age
    kind: parameter
    dtype: Integer
    source: 106 CMR 362.300
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/362/300/block-1
              excerpt: "household members between 18 and 49 years of age"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          18
  - name: abawd_maximum_age
    kind: parameter
    dtype: Integer
    source: 106 CMR 362.300
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/362/300/block-1
              excerpt: "household members between 18 and 49 years of age"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          49
  - name: abawd_noncompliance_month_limit
    kind: parameter
    dtype: Count
    source: 106 CMR 362.300
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/362/300/block-1
              excerpt: "Failure to comply with these requirements for three months in a three-year period"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          3
  - name: person_subject_to_mandatory_snap_work_requirements
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 106 CMR 362.300
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/362/300/block-1
              excerpt: "nonexempt household members between 16 and 59 years of age must comply with the mandatory SNAP work requirements"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_snap_household_member
          and not person_is_exempt_from_mandatory_snap_work_requirements
          and person_age >= mandatory_work_minimum_age
          and person_age <= mandatory_work_maximum_age
  - name: person_disqualified_for_mandatory_snap_work_noncompliance
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 106 CMR 362.300; 106 CMR 367.800
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/362/300/block-1
              excerpt: "Failure to comply with these requirements without good cause will result in disqualification in accordance with 106 CMR 367.800"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_subject_to_mandatory_snap_work_requirements
          and person_failed_to_comply_with_mandatory_snap_work_requirements
          and not person_has_good_cause_for_mandatory_snap_work_noncompliance
  - name: person_subject_to_abawd_work_requirements
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 106 CMR 362.300
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/362/300/block-1
              excerpt: "Unless an exemption applies, household members between 18 and 49 years of age must also comply with the ABAWD work program requirements"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_snap_household_member
          and not person_is_exempt_from_abawd_work_requirements
          and person_age >= abawd_minimum_age
          and person_age <= abawd_maximum_age
  - name: person_ineligible_for_abawd_noncompliance
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 106 CMR 362.300; 106 CMR 362.320
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/362/300/block-1
              excerpt: "Failure to comply with these requirements for three months in a three-year period without good cause may result in ineligibility"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_subject_to_abawd_work_requirements
          and person_abawd_noncompliance_months_in_three_year_period >= abawd_noncompliance_month_limit
          and not person_has_good_cause_for_abawd_noncompliance
