format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/362/100/block-1
  summary: |-
    A household must be living in the state in which it files an application. In any month no individual may participate as a member of more than one household nor may any household participate in more than one state. The only individuals exempt from these dual participation restrictions are certain residents of shelters for battered women and their children as defined in 106 CMR 365.550. There is no durational residency or fixed residency requirement. Individuals in an area solely for vacation purposes are not considered residents. An otherwise eligible household is not required to live in a permanent dwelling or have a fixed mailing address as a condition of eligibility.
rules:
  - name: household_meets_residency_requirement
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 362.100
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/362/100/block-1
              excerpt: "A household must be living in the state in which it files an application."
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/362/100/block-1
              excerpt: "individuals in an area solely for vacation purposes are not considered residents"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_is_living_in_state
          and not household_is_in_area_solely_for_vacation
  - name: individual_meets_dual_participation_restriction
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 106 CMR 362.100
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/362/100/block-1
              excerpt: "In any month no individual may participate as a member of more than one household nor may any household participate in more than one state. The only individuals exempt from these dual participation restrictions are certain residents of shelters for battered women and their children as defined in 106 CMR 365.550"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_exempt_resident_of_shelter_for_battered_women_and_children
          or (
            not person_participates_in_more_than_one_household_this_month
            and not person_participates_in_more_than_one_state_this_month
          )
