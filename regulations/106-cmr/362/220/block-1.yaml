format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/362/220/block-1
  summary: |-
    A noncitizen applying for SNAP must verify eligible noncitizen status. A member unable or unwilling to provide acceptable verification of eligible noncitizen status, or to provide or apply for a Social Security Number due to immigration status, is ineligible; the Department shall not continue efforts to obtain documentation. The Commissioner or designee must report noncitizens "known to be in the U.S. unlawfully" to USCIS. No quarter may be claimed after December 31, 1996 if benefits from a federal means-tested program were received from any state during that same quarter. If documentation is lost or missing and the noncitizen verifies that they have formally requested verification of their noncitizen status from a Federal agency, the Department shall certify the individual for up to six months from the date of the original request.
rules:
  - name: temporary_certification_max_months
    kind: parameter
    dtype: Integer
    source: 106 CMR 362.220 block 1 — "certify the individual for up to six months from the date of the original request for verification"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/362/220/block-1
              excerpt: "up to six months from the date of the original request for verification"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          6
  - name: noncitizen_member_ineligible_due_to_verification
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 106 CMR 362.220 block 1 — inability or unwillingness to provide verification of eligible noncitizen status, or to provide or apply for an SSN due to immigration status
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/362/220/block-1
              excerpt: "indicates an inability or unwillingness to provide information about, or acceptable verification of, his or her eligible noncitizen status, that household member shall be ineligible"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/362/220/block-1
              excerpt: "indicates an inability or unwillingness to provide, or apply for, a Social Security Number due to immigration status he or she is ineligible"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          noncitizen_unable_or_unwilling_to_verify_eligible_status
          or noncitizen_unable_or_unwilling_to_provide_ssn_due_to_immigration_status
  - name: noncitizen_eligible_for_temporary_certification
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 106 CMR 362.220 block 1 — lost or missing documentation paired with verified formal federal verification request
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/362/220/block-1
              excerpt: "If the noncitizen claims an eligible noncitizen status but the documentation is lost or missing, and he or she verified that they have formally requested from a Federal agency verification of their noncitizen status, the Department shall certify the individual for up to six months from the date of the original request for verification"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          noncitizen_claims_eligible_noncitizen_status
          and noncitizen_documentation_lost_or_missing
          and noncitizen_formally_requested_federal_verification
  - name: noncitizen_temporary_certification_months
    kind: derived
    entity: Person
    dtype: Integer
    period: Month
    source: 106 CMR 362.220 block 1 — up to six months certification from the date of the original verification request
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/362/220/block-1
              excerpt: "certify the individual for up to six months from the date of the original request for verification"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if noncitizen_eligible_for_temporary_certification: temporary_certification_max_months else: 0
  - name: quarter_not_claimable
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 106 CMR 362.220 block 1 — no quarter claimable after December 31, 1996 if federal means-tested program benefits were received during that same quarter
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/362/220/block-1
              excerpt: "No quarter may be claimed after December 31, 1996 if benefits from a federal means-tested program, defined by 106 CMR 362.240 , were received from any state during that same quarter"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          quarter_ends_after_means_tested_cutoff_date
          and federal_means_tested_benefits_received_during_quarter
  - name: commissioner_must_report_to_uscis
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 106 CMR 362.220 block 1 — Commissioner or designee required to report noncitizens "known to be in the U.S. unlawfully" to USCIS
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/362/220/block-1
              excerpt: "The Commissioner or designee is required to report to the United States Citizenship and Immigration Services (USCIS) information about noncitizens \"known to be in the U.S. unlawfully\""
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          noncitizen_known_to_be_in_us_unlawfully
