format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/366/220/block-1
  summary: |-
    If, within the advance notice period, a household requests a fair hearing and does not waive continuation of benefits, the household's participation in the program shall be continued at the level authorized immediately prior to the Notice of Adverse Action. Benefits will continue until the Fair Hearing Decision is issued or the certification period expires, whichever occurs first. If a hearing request is not made within the advance period, the benefits shall be reduced or terminated as proposed. However, if the household establishes that its failure to make the request within the advance notice period was for good cause, the Department shall reinstate benefits to the prior level.
rules:
  - name: benefits_continued_at_prior_level
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 366.220
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/366/220/block-1
              excerpt: "within the advance notice period, a household requests a fair hearing and does not waive continuation of benefits"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/366/220/block-1
              excerpt: "Benefits will continue until the Fair Hearing Decision is issued or the certification period expires, whichever occurs first"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_requested_fair_hearing_within_advance_notice_period
          and not household_waived_continuation_of_benefits
          and not fair_hearing_decision_issued
          and not certification_period_expired
  - name: benefits_reinstated_to_prior_level
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 366.220
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/366/220/block-1
              excerpt: "if the household establishes that its failure to make the request within the advance notice period was for good cause, the Department shall reinstate benefits to the prior level"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not household_requested_fair_hearing_within_advance_notice_period
          and household_established_good_cause_for_late_request
  - name: benefits_reduced_or_terminated_as_proposed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 366.220
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/366/220/block-1
              excerpt: "If a hearing request is not made within the advance period, the benefits shall be reduced or terminated as proposed"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not household_requested_fair_hearing_within_advance_notice_period
          and not household_established_good_cause_for_late_request
