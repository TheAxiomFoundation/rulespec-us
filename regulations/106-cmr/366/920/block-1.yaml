  summary: |-
    SSA will take a regular SNAP application for pure SSI households who do not meet the Bay State CAP criteria or who meet Bay State CAP criteria but are subject to a disability determination that will take longer than 30 days to process. Any obligation attributed to SSA in 106 CMR 366.920 is included for informational purposes only. If an application is filed at a TAO or online, the date of application shall be the date the identifiable SNAP application is received by the Department. At initial certification and recertification, if the application is filed at a TAO or online, the household must have a face-to-face or telephone interview, in accordance with 106 CMR 361.500.
