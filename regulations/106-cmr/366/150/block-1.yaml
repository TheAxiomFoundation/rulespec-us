format: rulespec/v1
module:
  status: deferred
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/366/150/block-1
  summary: |-
    Action shall be taken on all changes reported during a household's
    certification period in accordance with the timeliness standards set forth
    in 106 CMR 366.120. Households shall be notified whenever their monthly
    SNAP allotment is changed as a result of changes in their public assistance
    grant or whenever their SNAP certification period is shortened. In jointly
    processed SSA/Department cases where the SSI determination results in
    denial, the worker shall send the household a notice of termination if the
    worker believes the household's SNAP eligibility or benefit level may be
    affected; the notice shall advise that the certification period will expire
    in the month following the notice and that the household must reapply to
    continue receiving SNAP benefits.
  deferred_outputs:
    - output: us-ma:regulations/106-cmr/366/150/block-1#change_processing_action
      reason: |-
        The source text states only administrative duties (act on reported
        changes in accordance with timeliness standards in 106 CMR 366.120;
        notify households when allotment changes or certification period is
        shortened; send a notice of termination in jointly processed SSA/SSI
        denial cases). It does not state computable benefit amounts,
        thresholds, rates, or eligibility predicates. The timeliness standards
        and notice mechanics are defined in cross-referenced provisions
        (106 CMR 366.120, 106 CMR 365.170, 106 CMR 361.190), which are not
        included in the source for this artifact.
