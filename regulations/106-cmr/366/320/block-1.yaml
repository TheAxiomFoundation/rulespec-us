format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/366/320/block-1
  summary: Households sent a separate notice during their certification period shall
    be considered to have timely reapplied if they file a new application by the 15th
    day of the last month of their certification period. Pure SSI households may make
    a timely application for recertification at SSA. Pure SSI households that completed
    the application at SSA shall not be required to complete a second interview. Time
    frames (at least ten calendar days from the date of the Department's initial request)
    may be established for required verification. Noncountable income shall be verified
    only if the information provided by the household is questionable.
rules:
- name: timely_reapplication_day_of_month
  kind: parameter
  dtype: Integer
  source: 106 CMR 366.320 block 1
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-ma/regulation/106-cmr/366/320/block-1
          excerpt: file a new application by the 15 th day of the last month of their
            certification period
  versions:
  - effective_from: '0001-01-01'
    formula: '15'
- name: household_timely_reapplied
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: 106 CMR 366.320 block 1
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-ma/regulation/106-cmr/366/320/block-1
          excerpt: Households sent a separate notice during their certification period
            shall be considered to have timely reapplied if they file a new application
            by the 15 th day of the last month of their certification period
  versions:
  - effective_from: '0001-01-01'
    formula: 'household_sent_separate_notice_during_certification_period

      and household_filed_new_application_in_last_month_of_certification_period

      and day_of_month_new_application_filed <= timely_reapplication_day_of_month'
- name: pure_ssi_household_timely_recertification_at_ssa
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: 106 CMR 366.320 block 1
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-ma/regulation/106-cmr/366/320/block-1
          excerpt: Households consisting solely of SSI applicants or recipients (pure
            SSI households) may make a timely application for recertification at a
            Social Security Administration (SSA) office. An application shall be considered
            filed for normal processing purposes when the signed application is received
            by the SSA.
  versions:
  - effective_from: '0001-01-01'
    formula: 'household_consists_solely_of_ssi_applicants_or_recipients

      and signed_recertification_application_received_by_ssa'
- name: pure_ssi_household_exempt_from_second_interview
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: 106 CMR 366.320 block 1
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-ma/regulation/106-cmr/366/320/block-1
          excerpt: Pure SSI households that have completed the application for recertification
            at the SSA office shall not be required to complete a second interview.
  versions:
  - effective_from: '0001-01-01'
    formula: 'household_consists_solely_of_ssi_applicants_or_recipients

      and household_completed_recertification_application_at_ssa'
- name: verification_response_timeframe_is_valid
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: 106 CMR 366.320 block 1
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-ma/regulation/106-cmr/366/320/block-1
          excerpt: Time frames (at least ten calendar days from the date of the Department's
            initial request) may be established within which the household must submit
            any required verification
  versions:
  - effective_from: '0001-01-01'
    formula: calendar_days_allowed_for_verification_response >= minimum_verification_response_days
- name: noncountable_income_must_be_verified
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: 106 CMR 366.320 block 1
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-ma/regulation/106-cmr/366/320/block-1
          excerpt: Noncountable income shall be verified only if the information provided
            by the household is questionable.
  versions:
  - effective_from: '0001-01-01'
    formula: noncountable_income_information_is_questionable
imports:
- us-ma:regulations/106-cmr/364/120/block-1#minimum_verification_response_days
