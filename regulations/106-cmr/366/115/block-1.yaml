  summary: |-
    During the certification period, the Department must pursue clarification and verification of unclear information received about a household's circumstances when specified criteria are met; otherwise, the Department must not act on the information until the household's Interim Report or recertification, and may not take adverse action if the household does not respond to voluntary follow-up.
