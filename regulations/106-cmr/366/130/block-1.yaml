format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/366/130/block-1
  summary: |-
    If the Department has at least 30 days advance knowledge of the amount of
    PA adjustments, SNAP benefits shall be recomputed and the new monthly
    allotment will be effective in the same month as the PA change. If the
    Department does not have sufficient notice, the SNAP change shall be
    effective no later than the month following the month the PA change was
    made. The change shall be reflected no later than the second allotment
    issued after the month in which the change becomes effective.
rules:
  - name: mass_change_advance_notice_days_threshold
    kind: parameter
    dtype: Integer
    source: 106 CMR 366.130 (block 1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/366/130/block-1
              excerpt: "at least 30 days advance knowledge of the amount of PA adjustments"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30
  - name: snap_mass_change_effective_same_month_as_pa_change
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 366.130 (block 1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/366/130/block-1
              excerpt: "If the Department has at least 30 days advance knowledge ... SNAP benefits shall be recomputed and the new monthly allotment will be effective in the same month as the PA change"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          department_advance_knowledge_days_of_pa_adjustment >= mass_change_advance_notice_days_threshold
  - name: snap_mass_change_effective_month_following_pa_change
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 106 CMR 366.130 (block 1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/366/130/block-1
              excerpt: "If the Department does not have sufficient notice, the SNAP change shall be effective no later than the month following the month the PA change was made"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          department_advance_knowledge_days_of_pa_adjustment < mass_change_advance_notice_days_threshold
