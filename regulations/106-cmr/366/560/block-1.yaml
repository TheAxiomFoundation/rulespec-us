format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ma/regulation/106-cmr/366/560/block-1
  summary: |-
    Individuals disqualified for an intentional program violation are entitled to restoration of any benefits lost during the months they were disqualified only if the decision to disqualify is subsequently reversed. For each month the individual was disqualified, the amount to be restored, if any, shall be determined by comparing the allotment the household received with the allotment the household would have received had the disqualified member been allowed to participate. Benefits shall be restored regardless of the length of time that has elapsed since the household member was disqualified.
rules:
  - name: ipv_disqualification_reversed
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 106 CMR 366.560
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/366/560/block-1
              excerpt: "only if the decision to disqualify is subsequently reversed"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_was_disqualified_for_intentional_program_violation
          and disqualification_decision_subsequently_reversed
  - name: ipv_restoration_entitlement
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 106 CMR 366.560
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/366/560/block-1
              excerpt: "entitled to restoration of any benefits lost during the months they were disqualified only if the decision to disqualify is subsequently reversed"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          ipv_disqualification_reversed
  - name: ipv_restoration_amount
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 106 CMR 366.560
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ma/regulation/106-cmr/366/560/block-1
              excerpt: "the amount to be restored, if any, shall be determined by comparing the allotment the household received with the allotment the household would have received had the disqualified member been allowed to participate"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if disqualified_member_restoration_entitled: max(0, allotment_household_would_have_received_with_disqualified_member - allotment_household_received) else: 0
