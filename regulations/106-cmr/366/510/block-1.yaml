  summary: |-
    A household is entitled to lost benefits only for those months the household was eligible to participate. For each month the household cannot provide necessary information to demonstrate eligibility, it shall be considered ineligible for restoration of lost benefits. Households are also entitled to lost benefits if a Department policy specifically provides for restoration.
