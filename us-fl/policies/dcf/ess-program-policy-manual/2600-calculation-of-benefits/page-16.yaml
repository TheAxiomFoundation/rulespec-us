  kind: derived
  entity: Person
  dtype: Money
  unit: USD
  period: Month
  source: 2610.0408.01
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/2600-calculation-of-benefits/page-16
