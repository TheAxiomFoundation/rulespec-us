format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/2600-calculation-of-benefits/page-10
  summary: |-
    "The net monthly income is multiplied by 30%; the resulting product is rounded up to the next whole dollar; and the result is then subtracted from the Maximum Benefit... if the monthly computation results in $1, $3 or $5, round up to $2, $4 or $6, respectively." "Initial month: Issue no benefits less than $10." "Recurring months: Issue a minimum of eight percent of the maximum benefit for a one-person assistance group to one or two person assistance groups who are eligible. Issue a benefit less than the minimum benefit to eligible assistance groups of three or more." Sponsored-noncitizen deeming is also described, with exceptions referenced in passage 2610.0202.02.
  deferred_outputs:
    - output: us-fl:policies/dcf/ess-program-policy-manual/2600-calculation-of-benefits/page-10#sponsor_income_and_assets_counted_for_sponsored_noncitizen
      reason: The source says exceptions to the sponsored-noncitizen deeming policy are found in passage 2610.0202.02, which is not included in this source unit or copied context.
    - output: us-fl:policies/dcf/ess-program-policy-manual/2600-calculation-of-benefits/page-10#sponsor_spouse_income_and_assets_counted_for_sponsored_noncitizen
      reason: The source says exceptions to the sponsored-noncitizen deeming policy are found in passage 2610.0202.02, which is not included in this source unit or copied context.
rules:
  - name: net_monthly_income_benefit_reduction_rate
    kind: parameter
    dtype: Rate
    source: 2610.0106.01 Determining the Monthly Benefit
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/2600-calculation-of-benefits/page-10
              excerpt: "the net monthly income is multiplied by 30%"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.30

  - name: initial_month_minimum_issuance_amount
    kind: parameter
    dtype: Money
    unit: USD
    source: 2610.0106.02 Minimum Benefit
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/2600-calculation-of-benefits/page-10
              excerpt: "Initial month: Issue no benefits less than $10."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10

  - name: recurring_minimum_benefit_rate
    kind: parameter
    dtype: Rate
    source: 2610.0106.02 Minimum Benefit
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/2600-calculation-of-benefits/page-10
              excerpt: "Issue a minimum of eight percent of the maximum benefit"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.08

  - name: one_person_assistance_group_size
    kind: parameter
    dtype: Count
    source: 2610.0106.02 Minimum Benefit
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/2600-calculation-of-benefits/page-10
              excerpt: "for a one-person assistance group"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1

  - name: two_person_assistance_group_size
    kind: parameter
    dtype: Count
    source: 2610.0106.02 Minimum Benefit
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/2600-calculation-of-benefits/page-10
              excerpt: "one or two person assistance groups"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          2

  - name: three_person_assistance_group_minimum_size
    kind: parameter
    dtype: Count
    source: 2610.0106.02 Minimum Benefit
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/2600-calculation-of-benefits/page-10
              excerpt: "assistance groups of three or more"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          3

  - name: small_benefit_first_unrounded_amount
    kind: parameter
    dtype: Money
    unit: USD
    source: 2610.0106.01 Determining the Monthly Benefit
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/2600-calculation-of-benefits/page-10
              excerpt: "if the monthly computation results in $1, $3 or $5"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1

  - name: small_benefit_first_rounded_amount
    kind: parameter
    dtype: Money
    unit: USD
    source: 2610.0106.01 Determining the Monthly Benefit
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/2600-calculation-of-benefits/page-10
              excerpt: "round up to $2, $4 or $6, respectively"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          2

  - name: small_benefit_second_unrounded_amount
    kind: parameter
    dtype: Money
    unit: USD
    source: 2610.0106.01 Determining the Monthly Benefit
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/2600-calculation-of-benefits/page-10
              excerpt: "if the monthly computation results in $1, $3 or $5"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          3

  - name: small_benefit_second_rounded_amount
    kind: parameter
    dtype: Money
    unit: USD
    source: 2610.0106.01 Determining the Monthly Benefit
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/2600-calculation-of-benefits/page-10
              excerpt: "round up to $2, $4 or $6, respectively"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          4

  - name: small_benefit_third_unrounded_amount
    kind: parameter
    dtype: Money
    unit: USD
    source: 2610.0106.01 Determining the Monthly Benefit
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/2600-calculation-of-benefits/page-10
              excerpt: "if the monthly computation results in $1, $3 or $5"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          5

  - name: small_benefit_third_rounded_amount
    kind: parameter
    dtype: Money
    unit: USD
    source: 2610.0106.01 Determining the Monthly Benefit
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/2600-calculation-of-benefits/page-10
              excerpt: "round up to $2, $4 or $6, respectively"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          6

  - name: assistance_group_has_one_or_two_persons
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 2610.0106.02 Minimum Benefit
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/2600-calculation-of-benefits/page-10
              excerpt: "one or two person assistance groups"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          assistance_group_size == one_person_assistance_group_size
          or assistance_group_size == two_person_assistance_group_size

  - name: assistance_group_has_three_or_more_persons
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 2610.0106.02 Minimum Benefit
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/2600-calculation-of-benefits/page-10
              excerpt: "assistance groups of three or more"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          assistance_group_size >= three_person_assistance_group_minimum_size

  - name: income_contribution_for_monthly_benefit
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 2610.0106.01 Determining the Monthly Benefit
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/2600-calculation-of-benefits/page-10
              excerpt: "the net monthly income is multiplied by 30%; the resulting product is rounded up to the next whole dollar"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          ceil(max(0, net_monthly_income) * net_monthly_income_benefit_reduction_rate)

  - name: monthly_benefit_before_small_amount_rounding
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 2610.0106.01 Determining the Monthly Benefit
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/2600-calculation-of-benefits/page-10
              excerpt: "the result is then subtracted from the Maximum Benefit"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          max(0, maximum_benefit_for_appropriate_assistance_group_size - income_contribution_for_monthly_benefit)

  - name: monthly_benefit_after_small_amount_rounding
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 2610.0106.01 Determining the Monthly Benefit
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/2600-calculation-of-benefits/page-10
              excerpt: "if the monthly computation results in $1, $3 or $5, round up to $2, $4 or $6, respectively"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if monthly_benefit_before_small_amount_rounding == small_benefit_first_unrounded_amount: small_benefit_first_rounded_amount else: if monthly_benefit_before_small_amount_rounding == small_benefit_second_unrounded_amount: small_benefit_second_rounded_amount else: if monthly_benefit_before_small_amount_rounding == small_benefit_third_unrounded_amount: small_benefit_third_rounded_amount else: monthly_benefit_before_small_amount_rounding

  - name: recurring_minimum_benefit_for_one_or_two_person_assistance_group
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 2610.0106.02 Minimum Benefit
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/2600-calculation-of-benefits/page-10
              excerpt: "Issue a minimum of eight percent of the maximum benefit for a one-person assistance group"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          maximum_benefit_for_one_person_assistance_group * recurring_minimum_benefit_rate

  - name: recurring_monthly_benefit_for_three_or_more_person_assistance_group
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 2610.0106.02 Minimum Benefit
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/2600-calculation-of-benefits/page-10
              excerpt: "Issue a benefit less than the minimum benefit to eligible assistance groups of three or more."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if assistance_group_has_three_or_more_persons: monthly_benefit_after_small_amount_rounding else: 0

  - name: recurring_monthly_benefit_for_eligible_assistance_group
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 2610.0106.02 Minimum Benefit
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/2600-calculation-of-benefits/page-10
              excerpt: "Recurring months: Issue a minimum... to one or two person assistance groups who are eligible. Issue a benefit less than the minimum benefit to eligible assistance groups of three or more."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if assistance_group_has_one_or_two_persons: max(monthly_benefit_after_small_amount_rounding, recurring_minimum_benefit_for_one_or_two_person_assistance_group) else: recurring_monthly_benefit_for_three_or_more_person_assistance_group

  - name: initial_monthly_benefit_for_eligible_assistance_group
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 2610.0106.02 Minimum Benefit
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/2600-calculation-of-benefits/page-10
              excerpt: "Initial month: Issue no benefits less than $10."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if monthly_benefit_after_small_amount_rounding < initial_month_minimum_issuance_amount: 0 else: monthly_benefit_after_small_amount_rounding
