format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/2600-calculation-of-benefits/page-20
  summary: |-
    "To be financially eligible, the total gross income of the assistance group cannot exceed the appropriate Eligibility Standard and the total net income cannot exceed the appropriate income limit." For the Eligibility Standard Test, full-time student income is excluded, the standard earned income disregard is not deducted, and "(Eligibility Standards) - (Total Gross Income)" yields a deficit or exact equal that meets requirements, while a surplus is ineligible.
rules:
  - name: tca_eligibility_standard_test_rate
    kind: parameter
    dtype: Rate
    source: 2620.0109.02 Formula for 185% of Standard (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/2600-calculation-of-benefits/page-20
              excerpt: "Formula for 185% of Standard"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1.85

  - name: tca_standard_earned_income_disregard_initial_amount_not_deducted
    kind: parameter
    dtype: Money
    unit: USD
    source: 2620.0109.01 Eligibility Standard Test (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/2600-calculation-of-benefits/page-20
              excerpt: "The standard earned income disregard, 200 and 1/2"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          200

  - name: tca_standard_earned_income_disregard_fraction_not_deducted
    kind: parameter
    dtype: Rate
    source: 2620.0109.01 Eligibility Standard Test (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/2600-calculation-of-benefits/page-20
              excerpt: "The standard earned income disregard, 200 and 1/2"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1 / 2

  - name: tca_standard_earned_income_disregard_included_amount_not_deducted
    kind: parameter
    dtype: Money
    unit: USD
    source: 2620.0109.01 Eligibility Standard Test (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/2600-calculation-of-benefits/page-20
              excerpt: "includes the standard earned income disregard of $90"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          90

  - name: tca_total_gross_income_for_eligibility_standard_test
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 2620.0109.01 Eligibility Standard Test (TCA); 2620.0109.02 Formula for 185% of Standard (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/2600-calculation-of-benefits/page-20
              excerpt: "Net Unearned + Adjusted Gross Earned = (Total Gross Income)"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/2600-calculation-of-benefits/page-20
              excerpt: "The income of a full-time student is excluded in this test."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          max(0, net_unearned_income + adjusted_gross_earned_income - full_time_student_income_excluded_from_eligibility_standard_test)

  - name: tca_assistance_group_financially_eligible_under_gross_and_net_tests
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 2620.0107 Budgets and Tests (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/2600-calculation-of-benefits/page-20
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          tca_total_gross_income_for_eligibility_standard_test <= appropriate_eligibility_standard
          and total_net_income <= appropriate_income_limit

  - name: tca_coverage_group_eligibility_lost_due_to_surplus
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 2620.0102 Changes Affecting Eligibility (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/2600-calculation-of-benefits/page-20
              excerpt: "surplus (the countable income exceeds the applicable standard"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          countable_income > applicable_standard_for_specific_type_of_assistance

  - name: tca_initial_eligibility_standard_test_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 2620.0109.01 Eligibility Standard Test (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/2600-calculation-of-benefits/page-20
              excerpt: "applies only to cases that use the payment standard"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/2600-calculation-of-benefits/page-20
              excerpt: "gross income cannot exceed the appropriate Eligibility Standard at the initial determination"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          assistance_case_uses_payment_standard_as_financial_eligibility_criteria
          and tca_total_gross_income_for_eligibility_standard_test <= appropriate_eligibility_standard

  - name: tca_eligibility_standard_formula_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 2620.0109.02 Formula for 185% of Standard (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/2600-calculation-of-benefits/page-20
              excerpt: "Deficit or Exact Equal: Meets the Requirements"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          appropriate_eligibility_standard - tca_total_gross_income_for_eligibility_standard_test >= 0

  - name: tca_eligibility_standard_test_computation_required_after_application
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 2620.0109.03 Standard Test after Application (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: ordering
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/2600-calculation-of-benefits/page-20
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          eligibility_review
          or income_initially_received
          or income_received_from_new_source
          or income_increases
          or standard_for_fewer_persons_used
          or tier_ii_or_tier_iii_used_in_place_of_tier_i
