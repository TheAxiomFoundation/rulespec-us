- name: adjusted_net_monthly_income
  kind: derived
  entity: Household
  dtype: Money
  period: Month
  unit: USD
  source: 2610.0105 Determining Net Income (FS), Steps 8 and capped/uncapped shelter
    paragraphs
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/2600-calculation-of-benefits/page-9
      - path: versions[0].formula
        kind: import
        import:
          target: us-fl:policies/dcf/ess-program-policy-manual/2600-calculation-of-benefits/page-9-net-income-test#income_after_dependent_care_deduction
          output: income_after_dependent_care_deduction
          hash: sha256:local
      - path: versions[0].formula
        kind: import
        import:
          target: us-fl:policies/dcf/ess-program-policy-manual/2600-calculation-of-benefits/page-9-net-income-test#excess_shelter_cost
          output: excess_shelter_cost
          hash: sha256:local
      - path: versions[0].formula
        kind: import
        import:
          target: us-fl:policies/dcf/ess-program-policy-manual/2600-calculation-of-benefits/page-9-net-income-test#maximum_shelter_disregard
          output: maximum_shelter_disregard
          hash: sha256:local
  versions:
  - effective_from: '0001-01-01'
    formula: 'if assistance_group_subject_to_capped_shelter_disregard: max(0, income_after_dependent_care_deduction
      - min(excess_shelter_cost, maximum_shelter_disregard)) else: max(0, income_after_dependent_care_deduction
      - excess_shelter_cost)'
- name: net_income_test_passed
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: 2610.0104.04 Net Income Test (FS)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/2600-calculation-of-benefits/page-9
      - path: versions[0].formula
        kind: import
        import:
          target: us-fl:policies/dcf/ess-program-policy-manual/2600-calculation-of-benefits/page-9-net-income-test#adjusted_net_monthly_income
          output: adjusted_net_monthly_income
          hash: sha256:local
  versions:
  - effective_from: '0001-01-01'
    formula: 'assistance_group_passes_gross_income_test

      and adjusted_net_monthly_income < allowable_net_income_limit'
