format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-cic-rap/page-12
  summary: |-
    1650.0541.02: "The period of exclusion is nine months, or until the property is sold, whichever is sooner." Sale proceeds remaining after excess TCA repayment are included as assets; cases close if the property is not sold during the exclusion period or another ineligibility occurs. 1650.0541.03 lists verification sources. 1650.0541.04 addresses sale, reevaluation, cancellation, overpayment, and ongoing eligibility review. 1650.0550 excludes certain Indian land. 1650.0553-1650.0555 include available life insurance cash value and require verification for stated face value or age thresholds.
rules:
  - name: good_faith_sale_exclusion_period_months
    kind: parameter
    dtype: Count
    source: ESS Program Policy Manual 1650.0541.02
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-cic-rap/page-12
              excerpt: "The period of exclusion is nine months"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          9

  - name: good_faith_effort_advertisement_age_day_limit
    kind: parameter
    dtype: Count
    source: ESS Program Policy Manual 1650.0541.03
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-cic-rap/page-12
              excerpt: "clippings of advertisements less than 30 days old"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: property_sale_cancellation_advance_notice_day_count
    kind: parameter
    dtype: Count
    source: ESS Program Policy Manual 1650.0541.04
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-cic-rap/page-12
              excerpt: "allowing 10 days advance notice"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10

  - name: life_insurance_face_value_verification_threshold
    kind: parameter
    dtype: Money
    unit: USD
    source: ESS Program Policy Manual 1650.0553
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-cic-rap/page-12
              excerpt: "face value of the policy is $5,000 or more"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          5000

  - name: life_insurance_policy_age_verification_years
    kind: parameter
    dtype: Count
    source: ESS Program Policy Manual 1650.0553
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-cic-rap/page-12
              excerpt: "the policy is five years old or more"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          5

  - name: good_faith_sale_exclusion_period_active
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1650.0541.02
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-cic-rap/page-12
              excerpt: "nine months, or until the property is sold, whichever is sooner"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not excluded_property_has_been_sold
          and months_since_good_faith_sale_exclusion_period_began < good_faith_sale_exclusion_period_months

  - name: good_faith_effort_to_sell_verification_document_provided
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1650.0541.03
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-cic-rap/page-12
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          written_statement_from_real_estate_dealer_provided
          or (advertisement_clipping_provided and advertisement_clipping_age_days < good_faith_effort_advertisement_age_day_limit)
          or conditional_sales_contract_copy_provided

  - name: property_sale_proceeds_after_tca_repayment_countable_asset_value
    kind: derived
    entity: Asset
    dtype: Money
    period: Month
    unit: USD
    source: ESS Program Policy Manual 1650.0541.02
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-cic-rap/page-12
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          max(0, sale_proceeds_remaining_after_repayment_of_excess_tca_benefits)

  - name: indian_land_excluded_as_asset
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1650.0550
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-cic-rap/page-12
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_land_held_by_enrolled_member_of_indian_tribe
          and asset_cannot_be_sold_or_transferred_without_permission_of_others_tribe_or_federal_agency

  - name: life_insurance_or_annuity_policy_available
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1650.0553
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-cic-rap/page-12
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_life_insurance_or_annuity_policy
          and policy_owned_by_individual
          and (person_insured_is_individual or person_insured_is_assistance_group_member)
          and not policy_carried_on_individual_or_tca_child_by_relative_or_other_with_needs_or_assets_excluded

  - name: life_insurance_or_annuity_policy_countable_asset_value
    kind: derived
    entity: Asset
    dtype: Money
    period: Month
    unit: USD
    source: ESS Program Policy Manual 1650.0553
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-cic-rap/page-12
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if life_insurance_or_annuity_policy_available: max(0, policy_cash_value) else: 0

  - name: life_insurance_cash_value_verification_required
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1650.0553
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-cic-rap/page-12
              excerpt: "$5,000 or more or the policy is five years old or more"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_life_insurance_or_annuity_policy
          and (policy_face_value >= life_insurance_face_value_verification_threshold or policy_age_years >= life_insurance_policy_age_verification_years)

  - name: case_closure_required_after_exclusion_period
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1650.0541.02
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-cic-rap/page-12
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          month_is_month_after_end_of_exclusion_period
          and (excluded_property_not_sold_during_exclusion_period or individual_became_ineligible_for_other_reason_during_exclusion_period)

  - name: property_sale_asset_reevaluation_required_by_next_change_deadline
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1650.0541.04
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-cic-rap/page-12
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          property_sale_reported

  - name: property_sale_overpayment_not_considered_due_to_asset_level
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1650.0541.04
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-cic-rap/page-12
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          property_sold
          and property_sale_net_profit + other_sfu_assets_value_at_beginning_of_exclusion_period < allowable_asset_limit

  - name: property_sale_case_cancellation_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1650.0541.04
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-cic-rap/page-12
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          property_sold
          and individual_assets_exceed_allowable_limits_after_sale

  - name: property_sale_cancellation_notice_compliant
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1650.0541.04
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-cic-rap/page-12
              excerpt: "allowing 10 days advance notice"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          property_sale_case_cancellation_required
          and cancellation_notice_advance_days >= property_sale_cancellation_advance_notice_day_count

  - name: tca_property_sale_overpayment_amount
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: USD
    source: ESS Program Policy Manual 1650.0541.04
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-cic-rap/page-12
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if property_sold and individual_assets_exceed_allowable_limits_after_sale: max(0, tca_benefits_received_that_would_not_have_been_received_if_disposal_occurred_at_beginning_of_exclusion_period) else: 0

  - name: ongoing_eligibility_complete_review_required_after_property_sale
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1650.0541.04
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-cic-rap/page-12
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          property_sold
          and individual_remains_eligible_on_factor_of_assets_after_property_sold
