format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-cic-rap/page-9
  summary: |-
    Verification of an individual's bank account assets includes account type, institution name and location, joint owners, and balance. Funeral agreements include arrangements with a legitimate funeral service provider to pay burial expenses, and each assistance group member can exclude a maximum of $1,500 of equity value in a single funeral agreement; additional amounts are included as an asset. Burial spaces or plots include grave sites, crypts, mausoleums, and urns.
rules:
  - name: funeral_agreement_equity_exclusion_limit
    kind: parameter
    dtype: Money
    unit: USD
    source: ESS Program Policy Manual 1650.0508, Funeral Agreement (CIC)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-cic-rap/page-9
              excerpt: "exclude a maximum of $1,500 of equity value"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1500

  - name: bank_account_verification_information_complete
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1650.0506, Verification of Bank Account (CIC)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-cic-rap/page-9
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_bank_account
          and bank_account_type_verified
          and financial_institution_name_and_location_verified
          and joint_owner_names_verified
          and account_balance_verified

  - name: time_deposit_certificate_verification_information_complete
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1650.0506, Verification of Bank Account (CIC)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-cic-rap/page-9
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_time_deposit_certificate
          and withdrawal_availability_verified
          and early_withdrawal_penalties_verified

  - name: funeral_agreement
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1650.0508, Funeral Agreement (CIC)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-cic-rap/page-9
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          arrangement_is_with_legitimate_funeral_service_provider
          and arrangement_pays_for_burial_expenses

  - name: countable_funeral_agreement_asset_value
    kind: derived
    entity: Asset
    dtype: Money
    period: Month
    unit: USD
    source: ESS Program Policy Manual 1650.0508, Funeral Agreement (CIC)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-cic-rap/page-9
              excerpt: "Any additional funeral agreement amounts are included as an asset."
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1600-assets-cic-rap/page-9#funeral_agreement_equity_exclusion_limit
              output: funeral_agreement_equity_exclusion_limit
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1600-assets-cic-rap/page-9#funeral_agreement
              output: funeral_agreement
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if funeral_agreement and funeral_agreement_is_single_agreement_of_assistance_group_member: max(0, funeral_agreement_equity_value - funeral_agreement_equity_exclusion_limit) else: funeral_agreement_equity_value

  - name: burial_space_or_plot
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1650.0515, Burial Spaces/Plots (CIC)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-cic-rap/page-9
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_conventional_grave_site
          or asset_is_crypt
          or asset_is_mausoleum
          or asset_is_urn
