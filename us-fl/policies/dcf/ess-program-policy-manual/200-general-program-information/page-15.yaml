format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/200-general-program-information/page-15
  summary: |-
    Optional State Supplementation is a cash assistance program for an eligible individual who meets age or Title XVI blindness/disability, Florida residence with intent to remain, citizenship or qualified noncitizen status, Department income standards, SSI asset standards, pursuit of other monetary benefits, qualifying licensed living arrangement, and counselor certification. HCDA states a 300% SSI Federal Benefit Rate income limit and $2000 individual / $3000 couple asset limits.
rules:
  - name: mssi_countable_asset_limit_individual
    kind: parameter
    dtype: Money
    unit: USD
    period: Month
    source: Chapter 0200 General Program Information, Program MSSI/SFP, item 13
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/200-general-program-information/page-15
              excerpt: "countable assets must not exceed the limit of $2000 (Individual)"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          2000
  - name: mssi_countable_asset_limit_couple
    kind: parameter
    dtype: Money
    unit: USD
    period: Month
    source: Chapter 0200 General Program Information, Program MSSI/SFP, item 13
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/200-general-program-information/page-15
              excerpt: "countable assets must not exceed the limit of $2000 (Individual), $3000 (Couple)"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          3000
  - name: hcda_income_limit_ssi_fbr_rate
    kind: parameter
    dtype: Rate
    period: Month
    source: 0240.0119 Home Care for the Disabled Adult, income limit
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/200-general-program-information/page-15
              excerpt: "Income limit: 300% of SSI Federal Benefit Rate."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          3.00
  - name: hcda_asset_limit_individual
    kind: parameter
    dtype: Money
    unit: USD
    period: Month
    source: 0240.0119 Home Care for the Disabled Adult, asset limit
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/200-general-program-information/page-15
              excerpt: "Asset limit: $2000 (Individual)"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          2000
  - name: hcda_asset_limit_couple_both_eligible_living_together
    kind: parameter
    dtype: Money
    unit: USD
    period: Month
    source: 0240.0119 Home Care for the Disabled Adult, asset limit
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/200-general-program-information/page-15
              excerpt: "Asset limit: $2000 (Individual), $3000 (Couple) - living together, both eligible for HCDA."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          3000
  - name: fl_oss_eligible
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 0240.0118 Optional State Supplementation eligibility criteria
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/200-general-program-information/page-15
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (oss_age_65_or_older or oss_age_18_or_older_and_blind_or_disabled_title_xvi)
          and living_in_florida_with_intent_to_remain
          and us_citizen_or_qualified_noncitizen
          and income_within_department_oss_standard
          and assets_within_ssi_standard
          and applied_for_and_pursues_other_monetary_benefits
          and living_in_licensed_oss_facility_meeting_needs
          and certified_in_need_of_oss_care_by_authorized_counselor
