format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-cic-rap/page-42
  summary: |-
    "Within five working days the eligibility specialist must notify the Regional Workforce Board/designee of all changes to TCA and Refugee Assistance Program (RAP) benefits for persons who are mandatory participants." "A nonexempt refugee must, except for good cause, participate in RAP E&T." "RAP E&T mandatory participants must participate prior to application approval or the application for the individual cannot be approved."
rules:
  - name: rwb_notification_deadline_working_days
    kind: parameter
    dtype: Count
    source: ESS Program Policy Manual 1460.1903 (RAP)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-cic-rap/page-42
              excerpt: "Within five working days"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          5

  - name: employment_or_penalty_change_reportable_to_rwb
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1460.1903 (RAP)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-cic-rap/page-42
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_is_mandatory_participant
          and (
            employment_gained_or_lost
            or benefit_cancelled_due_to_employment_or_sanction
            or benefit_reduced_due_to_employment
          )

  - name: other_case_change_reportable_to_rwb
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1460.1903 (RAP)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-cic-rap/page-42
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_is_mandatory_participant
          and (
            application_approved_or_denied
            or participation_status_changed
            or case_cancelled_for_reason_other_than_employment
            or individuals_needs_removed
            or address_unit_county_or_district_changed
          )

  - name: rwb_notification_required_for_mandatory_participant_change
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1460.1903 (RAP)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-cic-rap/page-42
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          employment_or_penalty_change_reportable_to_rwb
          or other_case_change_reportable_to_rwb

  - name: rwb_notification_timeliness_requirement_satisfied
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1460.1903 (RAP)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-cic-rap/page-42
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not rwb_notification_required_for_mandatory_participant_change
          or working_days_until_rwb_notified <= rwb_notification_deadline_working_days

  - name: rap_et_participation_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1460.1904 (RAP)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-cic-rap/page-42
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_is_nonexempt_refugee
          and not individual_has_good_cause_for_not_participating_in_rap_et

  - name: mandatory_rap_applicant_prior_participation_requirement_satisfied
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1460.1904 (RAP)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-cic-rap/page-42
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not individual_is_rap_et_mandatory_applicant
          or individual_participated_prior_to_application_approval

  - name: rrp_registration_counts_as_rap_et_participation
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1460.1904 (RAP)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-cic-rap/page-42
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          appropriate_rrp_employment_services_agency_available_in_county_of_residence
          and individual_registered_with_that_rrp_employment_services_agency

  - name: rap_et_volunteer_formal_referral_to_rwb_not_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1460.1904 (RAP)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-cic-rap/page-42
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_is_rap_et_volunteer
