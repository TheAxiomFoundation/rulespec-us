format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-57
  summary: |-
    The Department reviews incapacity when the parent's condition is expected to improve or usual functioning will resume. TCA applicants are not pended for incapacity or disability verification unless a caregiver claims a time limit and work activity exemption for caring for the incapacitated or disabled member. Ongoing incapacity information is obtained on active cases when a need for care exemption is claimed and incapacity is anticipated to end or RWB reports a medical-condition change. Deprivation exists due to unemployment/underemployment when both parents live with the child and one or both are unemployed or underemployed. If parents claim no current employment, loss of employment within the prior 60 days must be verified. A child must live in a home maintained by a parent or specified relative.
rules:
  - name: prior_employment_loss_verification_window_days
    kind: parameter
    dtype: Count
    source: ESS Program Policy Manual 1420.0724.05
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-57
              excerpt: "verify any loss of employment that occurred within the prior 60 days"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          60

  - name: parent_incapacity_review_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0722.03
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-57
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          parent_condition_expected_to_improve_sufficiently
          or parent_expected_to_resume_usual_level_of_competency

  - name: tca_applicant_incapacity_or_disability_verification_not_pended
    kind: derived
    entity: TanfUnit
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0722.03
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-57
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          not caregiver_claims_time_limit_and_work_activity_exemption_for_caring_for_incapacitated_or_disabled_member

  - name: ongoing_incapacity_information_required
    kind: derived
    entity: TanfUnit
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0722.04
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-57
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          case_is_active
          and caregiver_claims_need_for_care_exemption
          and (
            incapacity_is_anticipated_to_end
            or rwb_notifies_agency_of_change_in_incapacitated_individual_medical_condition
          )

  - name: tca_deprivation_due_to_unemployment_or_underemployment
    kind: derived
    entity: TanfUnit
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0723
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-57
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          both_parents_live_with_child
          and (
            one_or_both_parents_are_not_working
            or (
              one_or_both_parents_are_working
              and assistance_group_net_countable_income_less_than_payment_standard
            )
          )

  - name: recent_loss_of_employment_verification_required
    kind: derived
    entity: TanfUnit
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0724.05
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-57
              excerpt: "If the parents claim no current employment, the eligibility specialist must verify any loss of employment that occurred within the prior 60 days."
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          parents_claim_no_current_employment
          and employment_loss_occurred_days_before_verification <= prior_employment_loss_verification_window_days

  - name: tca_child_living_in_home_requirement_met
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0800
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-57
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          child_lives_in_home_maintained_by_parent_or_specified_relative
