rules:
- name: adopted_child_adoption_age_limit_years
  kind: parameter
  dtype: Count
  source: 1420.0102 Definition of U.S. Citizenship (TCA), adopted child condition
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-35
          excerpt: adopted while under age 16
  versions:
  - effective_from: '0001-01-01'
    formula: '16'
- name: adopted_child_current_age_limit_years
  kind: parameter
  dtype: Count
  source: 1420.0102 Definition of U.S. Citizenship (TCA), adopted child condition
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-35
          excerpt: under age 18, or was under age 18 on February 27, 2001
  versions:
  - effective_from: '0001-01-01'
    formula: '18'
- name: adopted_child_legal_custody_residence_minimum_years
  kind: parameter
  dtype: Count
  source: 1420.0102 Definition of U.S. Citizenship (TCA), adopted child condition
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-35
          excerpt: for at least two years
  versions:
  - effective_from: '0001-01-01'
    formula: '2'
- name: tca_citizenship_declaration_requirement_satisfied
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: 1420.0101 Declaration of Citizenship/Noncitizen Status (TCA)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-35
  versions:
  - effective_from: '0001-01-01'
    formula: 'not person_applies_for_tca

      or (citizenship_or_lawful_immigration_status_declared_in_writing_for_person

      and application_declaring_status_signed_under_penalty_of_perjury_at_application_or_review_for_person)'
- name: naturalized_citizen
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: 1420.0102 Definition of U.S. Citizenship (TCA), naturalized citizen
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: definition
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-35
  versions:
  - effective_from: '0001-01-01'
    formula: 'person_gained_us_citizenship_after_birth_through_individual_naturalization

      or person_derived_us_citizenship_from_naturalized_parent'
