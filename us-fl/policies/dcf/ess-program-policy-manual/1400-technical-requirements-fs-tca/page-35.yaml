    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-35
  summary: Each applicant applying for public assistance must declare in writing whether
    each individual in the assistance group is a U.S. citizen or a noncitizen in lawful
    immigration status. To be considered a U.S. citizen, an individual must be born
    in the U.S., D.C., or a U.S. territory, be a naturalized citizen, or be adopted
    by a U.S. citizen and meet the stated adoption, custody, residence, age, and qualified-noncitizen
    conditions.
