format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-20
  summary: "Applicants for and recipients of food stamps (including caretaker relatives\
    \ receiving food stamps) must cooperate with Child Support Enforcement (CSE) as\
    \ a condition of eligibility, unless it is determined that good cause for non-cooperation\
    \ exists.\nCooperation includes the following: providing complete information\
    \ required to obtain child support; completing and signing affidavits attesting\
    \ to paternity of the child; and making court appearances and providing testimony\
    \ in paternity hearings and support actions.\nThe term \u201Cnon-custodial parent\u201D\
    \ refers to non-custodial (absent) legal fathers, non-custodial (absent) mothers,\
    \ and all putative (non-legal biological) fathers."
  deferred_outputs:
  - output: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-20#non_custodial_parent
    reason: Generated rule used a local name that collides with a sibling RuleSpec
      export. This output is deferred until it can be encoded with a semantic branch-specific
      name without creating ambiguous sibling imports.
rules:
- name: child_support_cooperation_required
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: ESS Program Policy Manual 1410.1700 and 1410.1702 (FS)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-20
  versions:
  - effective_from: '0001-01-01'
    formula: "person_is_parent_or_caretaker_relative\nand person_applies_for_or_receives_food_stamps\n\
      and (\n  paternity_has_not_been_established_and_alleged_father_is_not_in_home\n\
      \  or one_or_both_parents_are_absent_from_home\n)\nand not good_cause_for_non_cooperation_exists_as_determined_by_cse"
