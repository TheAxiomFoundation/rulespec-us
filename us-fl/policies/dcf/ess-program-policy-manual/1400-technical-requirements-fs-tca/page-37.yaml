format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-37
  summary: |-
    North American Indians born in Canada, who are residing in the U.S., are eligible for TCA based on immigration status if they are subject to Section 289 of the INA or a member of an Indian Tribe. Proof includes I-551 with code S-13, unexpired I-551 stamp in a Canadian passport, I-94 with code S-13, or tribal evidence certifying 50% American Indian blood with evidence of birth in Canada. LPRs may be eligible for TCA based on noncitizen status under the listed entry and five-year qualified-noncitizen conditions. Noncitizens serving in the U.S. Armed Forces, qualifying veterans, and their spouses and unmarried dependent children are eligible for TCA on the factor of noncitizen status.
  deferred_outputs:
    - output: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-37#north_american_indian_born_in_canada_full_tca_immigration_status_eligible
      reason: The full eligibility rule includes an alternative for individuals subject to Section 289 of the Immigration and Nationality Act. That cited source is not available in copied context, so this artifact encodes the independent federally recognized tribal-membership branch and defers the complete disjunctive surface.
    - output: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-37#north_american_indian_born_in_canada_full_five_year_ban_exemption
      reason: The full five-year-ban exemption applies to all individuals described in the preceding North American Indian eligibility sentence, including the unavailable Section 289 branch. This artifact encodes the independent tribal-membership branch and defers the complete exemption surface.
rules:
  - name: american_indian_blood_fraction_required_for_birth_in_canada_proof
    kind: parameter
    dtype: Rate
    source: Chapter 1400 Technical Requirements Program TCA; North American Indian status proof
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-37
              excerpt: "certifying 50% American Indian blood"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.50

  - name: qualified_noncitizen_residence_minimum_years_for_lpr_tca_eligibility
    kind: parameter
    dtype: Count
    source: 1420.0106 Lawful Permanent Resident (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-37
              excerpt: "lived in the U.S. as a qualified noncitizen for at least five years"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          5

  - name: armed_forces_veteran_minimum_active_duty_service_months
    kind: parameter
    dtype: Count
    source: 1420.0106.01 Noncitizens Serving in the United States Armed Forces (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-37
              excerpt: "24 months or the period for which the person was called to active duty"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          24

  - name: north_american_indian_born_in_canada_status_proof_supported
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Chapter 1400 Technical Requirements Program TCA; North American Indian status proof
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-37
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_has_i_551_with_code_s_13
          or person_has_unexpired_i_551_stamp_in_canadian_passport
          or person_has_i_94_with_code_s_13
          or (
            person_has_letter_or_tribal_document_certifying_american_indian_blood
            and person_american_indian_blood_fraction >= american_indian_blood_fraction_required_for_birth_in_canada_proof
            and person_has_birth_certificate_or_other_satisfactory_evidence_of_birth_in_canada
          )

  - name: tribal_membership_verification_supported
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Chapter 1400 Technical Requirements Program TCA; verification of membership in an Indian tribe
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-37
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_has_tribal_membership_card_demonstrating_membership_in_federally_recognized_indian_tribe
          or person_has_other_tribal_document_demonstrating_membership_in_federally_recognized_indian_tribe
          or (
            not person_has_document_evidencing_tribal_membership
            and tribal_government_confirms_persons_membership
          )

  - name: north_american_indian_born_in_canada_tribal_member_tca_immigration_status_eligible
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Chapter 1400 Technical Requirements Program TCA; North American Indians born in Canada
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-37
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_north_american_indian_born_in_canada
          and person_resides_in_united_states
          and person_is_member_of_federally_recognized_indian_tribe

  - name: north_american_indian_born_in_canada_tribal_member_not_subject_to_five_year_ban
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Chapter 1400 Technical Requirements Program TCA; five-year ban note for North American Indians born in Canada
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-37
              excerpt: "These individuals are not subject to the five-year ban."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_north_american_indian_born_in_canada
          and person_resides_in_united_states
          and person_is_member_of_federally_recognized_indian_tribe

  - name: lawful_permanent_resident_tca_noncitizen_status_eligible
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 1420.0106 Lawful Permanent Resident (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-37
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_lawful_permanent_resident
          and (
            (
              person_entered_before_prwora_cutoff
              and person_has_remained_continuously_present
            )
            or (
              person_entered_on_or_after_prwora_cutoff
              and (
                person_entered_under_prior_asylee_status
                or person_entered_under_prior_refugee_status
                or person_entered_under_prior_amerasian_status
                or person_entered_under_prior_deportation_withheld_status
                or person_entered_under_prior_cuban_haitian_entrant_status
              )
            )
            or (
              person_entered_on_or_after_prwora_cutoff
              and person_years_lived_in_us_as_qualified_noncitizen >= qualified_noncitizen_residence_minimum_years_for_lpr_tca_eligibility
            )
          )

  - name: tca_lawful_permanent_resident_status_proof_supported
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 1420.0106 Lawful Permanent Resident (TCA); proof of LPR status
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-37
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_has_resident_alien_card_i_551
          or person_has_re_entry_permit_i_327
          or person_has_foreign_passport_with_temporary_lawful_permanent_resident_status_stamp

  - name: tca_lpr_entering_after_prwora_cutoff_subject_to_five_year_ban_absent_exception
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 1420.0106 Lawful Permanent Resident (TCA); five-year ban note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: default
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-37
              excerpt: "LPRs who entered after 8/22/96 are subject to the five-year ban, unless otherwise noted."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_lawful_permanent_resident
          and person_entered_on_or_after_prwora_cutoff
          and not person_is_otherwise_noted_as_exempt_from_five_year_ban

  - name: noncitizen_tca_noncitizen_status_eligible_for_armed_forces_status
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 1420.0106.01 Noncitizens Serving in the United States Armed Forces (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-37
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_noncitizen
          and (
            person_is_serving_in_us_armed_forces_on_active_duty_for_purpose_other_than_training
            or (
              person_is_honorably_discharged_from_us_armed_forces
              and not person_discharge_was_for_noncitizen_status
              and (
                person_active_duty_service_months >= armed_forces_veteran_minimum_active_duty_service_months
                or person_served_period_for_which_called_to_active_duty
              )
            )
            or person_is_spouse_of_noncitizen_active_duty_or_qualifying_veteran
            or person_is_unmarried_dependent_child_of_noncitizen_active_duty_or_qualifying_veteran
          )
