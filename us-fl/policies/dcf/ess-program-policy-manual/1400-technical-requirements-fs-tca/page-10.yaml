format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-10
  summary: 'The following LPRs are not subject to qualifying quarter criteria: active
    duty or honorably discharged U.S. Armed Forces personnel, veterans, their spouses
    and unmarried dependent children; LPRs originally admitted as refugees, Amerasians,
    persons having deportation withheld, asylees, or Cuban/Haitian Entrants; and LPRs
    who were 65 on or before 8/22/96, are under 18, or are currently receiving assistance
    due to blindness or disability and eligible indefinitely. Noncitizens serving
    in the U.S. Armed Forces on active duty for purposes other than training, qualifying
    honorably discharged veterans, and their spouses and unmarried dependent children
    are eligible for food stamps on the factor of noncitizen status.'
  deferred_outputs:
  - output: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-10#active_duty_military_status_verification_supported
    reason: Generated rule used a local name that collides with a sibling RuleSpec
      export. This output is deferred until it can be encoded with a semantic branch-specific
      name without creating ambiguous sibling imports.
  - output: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-10#honorable_discharge_proof_supported
    reason: Generated rule used a local name that collides with a sibling RuleSpec
      export. This output is deferred until it can be encoded with a semantic branch-specific
      name without creating ambiguous sibling imports.
rules:
- name: lpr_not_subject_to_qualifying_quarter_criteria
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: Chapter 1400 Technical Requirements Program FS; qualifying quarter criteria
    exceptions
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-10
  versions:
  - effective_from: '0001-01-01'
    formula: "person_is_lawful_permanent_resident\nand (\n  person_is_active_duty_us_armed_forces_member\n\
      \  or person_is_honorably_discharged_us_armed_forces_member_or_veteran\n  or\
      \ person_is_spouse_of_active_duty_or_honorably_discharged_us_armed_forces_member_or_veteran\n\
      \  or person_is_unmarried_dependent_child_of_active_duty_or_honorably_discharged_us_armed_forces_member_or_veteran\n\
      \  or person_was_originally_admitted_as_refugee\n  or person_was_originally_admitted_as_amerasian\n\
      \  or person_was_originally_admitted_with_deportation_withheld\n  or person_was_originally_admitted_as_asylee\n\
      \  or person_was_originally_admitted_as_cuban_haitian_entrant\n  or person_was_age_65_or_older_on_prwora_cutoff\n\
      \  or person_is_under_age_18\n  or (person_currently_receives_assistance_due_to_blindness_or_disability\
      \ and person_is_eligible_indefinitely)\n)"
- name: lawful_permanent_resident_status_proof_supported
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: Chapter 1400 Technical Requirements Program FS; proof of LPR status
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: predicate
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-10
  versions:
  - effective_from: '0001-01-01'
    formula: 'person_has_resident_alien_card_i_551

      or person_has_re_entry_permit_i_327

      or person_has_foreign_passport_with_temporary_lawful_permanent_resident_status_stamp'
- name: lpr_entering_after_prwora_cutoff_subject_to_five_year_ban_absent_exception
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: Chapter 1400 Technical Requirements Program FS; five-year ban note
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: default
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-10
          excerpt: LPRs who enter after 8/22/96 are subject to the five-year ban,
            unless otherwise noted.
  versions:
  - effective_from: '0001-01-01'
    formula: 'person_is_lawful_permanent_resident

      and person_entered_after_prwora_cutoff

      and not person_is_otherwise_noted_as_exempt_from_five_year_ban'
- name: noncitizen_food_stamp_citizenship_factor_eligible_for_armed_forces_status
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: 1410.0106.01 Noncitizens Serving in the United States Armed Forces (FS)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-10
  versions:
  - effective_from: '0001-01-01'
    formula: "person_is_noncitizen\nand (\n  person_is_serving_in_us_armed_forces_on_active_duty_for_purpose_other_than_training\n\
      \  or (\n    person_is_honorably_discharged_from_us_armed_forces\n    and not\
      \ person_discharge_was_for_noncitizen_status\n    and (\n      person_original_enlistment_was_before_minimum_service_requirement_start_date\n\
      \      or person_met_minimum_active_duty_service_requirement_under_38_usc_5303a_d\n\
      \    )\n  )\n  or person_is_spouse_of_noncitizen_active_duty_or_qualifying_veteran\n\
      \  or person_is_unmarried_dependent_child_of_noncitizen_active_duty_or_qualifying_veteran\n\
      )"
