format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-36
  summary: Individuals born abroad to a U.S. citizen who make a written declaration
    of citizenship to the U.S. Consulate are considered U.S. citizens. Citizenship
    is acquired at birth under the listed parent-citizenship conditions, and children
    become U.S. citizens after birth when one parent is a U.S. citizen, the child
    meets the under-age-18 condition, resides in the United States in the legal and
    physical custody of the U.S. citizen parent, and has qualified noncitizen status.
    U.S. birth statements are accepted unless questionable; if questioned, U.S. citizenship
    must be verified by listed sources.
  deferred_outputs:
  - output: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-36#child_becomes_us_citizen_after_birth
    reason: Generated rule used a local name that collides with a sibling RuleSpec
      export. This output is deferred until it can be encoded with a semantic branch-specific
      name without creating ambiguous sibling imports.
  - output: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-36#us_citizenship_statement_accepted_without_verification
    reason: Generated rule used a local name that collides with a sibling RuleSpec
      export. This output is deferred until it can be encoded with a semantic branch-specific
      name without creating ambiguous sibling imports.
rules:
- name: born_abroad_to_us_citizen_with_consular_declaration_us_citizen
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: ESS Program Policy Manual 1420.0102, born abroad to a U.S. citizen
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: definition
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-36
  versions:
  - effective_from: '0001-01-01'
    formula: 'person_was_born_abroad_to_us_citizen

      and person_made_written_declaration_of_citizenship_to_us_consulate'
- name: child_born_abroad_to_unwed_parents_acquires_citizenship_at_birth
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: ESS Program Policy Manual 1420.0102, child born abroad to unwed parents
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-36
  versions:
  - effective_from: '0001-01-01'
    formula: 'child_was_born_abroad_to_unwed_parents

      and ((one_parent_was_us_citizen_at_child_birth and legal_paternity_has_been_established)

      or (childs_mother_was_us_citizen_at_child_birth and childs_mother_resided_in_us_or_us_territory_before_child_birth))'
- name: child_born_abroad_acquires_citizenship_at_birth
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: ESS Program Policy Manual 1420.0102, citizenship acquired at birth
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-36
      - path: versions[0].formula
        kind: import
        import:
          target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-36#child_born_abroad_to_unwed_parents_acquires_citizenship_at_birth
          output: child_born_abroad_to_unwed_parents_acquires_citizenship_at_birth
          hash: sha256:local
  versions:
  - effective_from: '0001-01-01'
    formula: '(both_parents_were_us_citizens_at_child_birth and at_least_one_parent_resided_in_us_or_us_territory_before_child_birth)

      or (one_parent_was_us_citizen_at_child_birth and other_parent_was_noncitizen_at_child_birth)

      or child_born_abroad_to_unwed_parents_acquires_citizenship_at_birth'
- name: citizenship_claim_under_one_citizen_one_noncitizen_parent_requires_uscis_determination
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: ESS Program Policy Manual 1420.0102, USCIS determination note
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-36
          excerpt: one parent is a citizen and the other is a noncitizen
  versions:
  - effective_from: '0001-01-01'
    formula: 'child_was_born_abroad

      and one_parent_was_us_citizen_at_child_birth

      and other_parent_was_noncitizen_at_child_birth'
- name: us_citizenship_verification_required_when_questioned
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: ESS Program Policy Manual 1420.0103 Verification Sources for U.S. Citizens
    (TCA)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-36
          excerpt: If questioned, U.S. citizenship must be verified.
  versions:
  - effective_from: '0001-01-01'
    formula: 'person_claims_us_citizenship

      and citizenship_information_is_questionable'
- name: us_citizenship_verified_by_page_36_source
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: ESS Program Policy Manual 1420.0103 Verification Sources for U.S. Citizens
    (TCA)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-36
          excerpt: Sources of verification include
  versions:
  - effective_from: '0001-01-01'
    formula: '(birth_or_hospital_certificate_shows_us_birth

      and

      not birth_certificate_is_voided_puerto_rican_birth_certificate_after_cutoff)

      or person_has_us_citizen_identification_card_form_i197

      or religious_document_recorded_in_us_shortly_after_birth

      or ssa_records_verify_us_citizenship

      or person_has_us_passport

      or person_has_certificate_of_citizenship_or_naturalization'
- name: noncitizen_may_qualify_for_tca_based_on_uscis_status
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: ESS Program Policy Manual 1420.0104 Noncitizens (TCA)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-36
  versions:
  - effective_from: '0001-01-01'
    formula: 'person_is_noncitizen

      and person_has_status_granted_by_uscis'
