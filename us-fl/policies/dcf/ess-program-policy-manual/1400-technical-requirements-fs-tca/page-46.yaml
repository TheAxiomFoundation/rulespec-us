format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-46
  summary: |-
    Residency exists when the intent of the individual is to remain in the state, and does not exist when the stay is temporary, such as vacation, with intent to return to another state. An individual must reside in Florida with intent to remain, or live in Florida for employment purposes without intent to remain while not receiving assistance from another state and having a job commitment or actively seeking employment. Temporary absences do not affect residency; a temporary absence is 30 days or less, and longer absences require reasons, return plans, and intended return date.
rules:
  - name: employment_purpose_residency_verification_supported
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1400, TCA Residency, verification for residency for employment purposes
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-46
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_has_employment_agency_letter
          or person_has_employment_offer_letter
          or person_has_residency_verified_by_home_visit
          or person_has_residency_verified_by_collateral_contact
          or person_has_rent_mortgage_or_utility_receipt
          or person_has_other_form_of_id
          or person_has_driver_license_record
          or person_is_institutionalized_in_title_xix_facility

  - name: ordinary_florida_residency_requirement_satisfied
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1400, TCA Residency, intent to remain path
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-46
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_resides_in_florida
          and person_intends_to_remain_in_florida
          and not (person_stay_in_florida_is_for_temporary_purpose and person_intends_to_return_to_residence_in_another_state)

  - name: employment_purpose_residency_requirement_satisfied
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1400, TCA Residency, employment-purpose path
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-46
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_living_in_florida_for_employment_purposes
          and person_lacks_intent_to_remain_in_florida
          and person_or_caretaker_relative_not_receiving_assistance_from_another_state
          and (person_or_caretaker_relative_came_to_florida_with_job_commitment or person_or_caretaker_relative_actively_seeking_employment_during_florida_stay)
          and employment_purpose_residency_verification_supported

  - name: migrant_agricultural_worker_child_considered_florida_resident
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1400, TCA Residency, migrant agricultural worker caretaker rule
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-46
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_child
          and parent_or_caretaker_relative_is_migrant_agricultural_worker
          and parent_or_caretaker_relative_maintains_florida_as_home_for_children
          and parent_or_caretaker_relative_intends_to_return_to_florida

  - name: us_born_child_of_undocumented_or_ineligible_noncitizen_parents_may_meet_residency
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1400, TCA Residency, U.S.-born children of undocumented or ineligible noncitizen parents
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-46
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_child_born_in_united_states
          and parents_are_undocumented_or_ineligible_noncitizens
          and parents_reside_in_florida
          and person_intends_to_remain_in_florida

  - name: temporary_visa_residency_verification_supported
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1400, TCA Residency, temporary visa residency verification examples
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-46
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_has_employment_or_school_record
          or person_has_bank_statement
          or person_has_lease_agreement
          or person_has_utility_bill
          or person_has_florida_driver_license_or_state_id
          or person_has_other_reliable_residency_information

  - name: temporary_visa_or_us_born_child_residency_may_be_met
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1400, TCA Residency, temporary visa and U.S.-born children rule
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-46
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_individual_in_us_with_temporary_visa_or_us_born_child_of_such_individual
          and temporary_visa_residency_verification_supported
          and person_intends_to_remain_in_florida

  - name: florida_tca_residency_requirement_satisfied
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1400, TCA Residency, residency requirement paths
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-46
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          ordinary_florida_residency_requirement_satisfied
          or employment_purpose_residency_requirement_satisfied
          or migrant_agricultural_worker_child_considered_florida_resident
          or us_born_child_of_undocumented_or_ineligible_noncitizen_parents_may_meet_residency
          or temporary_visa_or_us_born_child_residency_may_be_met

  - name: temporary_absence_maximum_days
    kind: parameter
    dtype: Count
    source: ESS Program Policy Manual 1420.0310, Temporary Absence from the State
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-46
              excerpt: Temporary absence exists when an absence is 30 days or less.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: temporary_absence_exists
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: ESS Program Policy Manual 1420.0310, Temporary Absence from the State
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-46
              excerpt: Temporary absence exists when an absence is 30 days or less.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          state_absence_days <= temporary_absence_maximum_days

  - name: prolonged_absence_information_provided
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: ESS Program Policy Manual 1420.0310, Temporary Absence from the State
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-46
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          state_absence_days > temporary_absence_maximum_days
          and person_provided_reasons_absence_prolonged
          and person_provided_plans_to_return_to_florida
          and person_provided_date_intends_to_return_to_florida
