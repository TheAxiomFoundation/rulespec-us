format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-13
  summary: |-
    A noncitizen whose deportation has been withheld pursuant to Section 243(h) or 241(b)(3) of the INA may be eligible for food stamps on the factor of citizenship from the date deportation was withheld. Cuban/Haitian Entrants are defined as nationals of Cuba or Haiti with the listed parole, special-status, proceedings, or pending-asylum conditions. These individuals are not subject to the five-year ban.
rules:
  - name: deportation_withheld_food_stamp_citizenship_factor_eligible
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 1410.0111 Deportation Withheld (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-13
              excerpt: "A noncitizen whose deportation has been withheld ... may be eligible for food stamps"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_noncitizen
          and person_deportation_withheld_under_section_243_h_or_removal_withheld_under_section_241_b_3

  - name: cuban_haitian_entrant
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 1410.0112 Cuban/Haitian Entrants (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-13
              excerpt: "any national of Cuba or Haiti who"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_national_of_cuba_or_haiti
          and (person_was_granted_parole_status_as_cuban_haitian_entrant_status_pending
          or person_was_granted_special_status_subsequently_established_under_immigration_laws_for_nationals_of_cuba_or_haiti
          or (person_was_paroled_into_united_states and person_has_not_acquired_other_status_under_immigration_and_nationality_act)
          or person_is_subject_of_exclusion_or_deportation_proceedings_under_immigration_and_nationality_act
          or (person_has_application_for_asylum_pending_with_uscis and final_nonappealable_legally_enforceable_order_of_deportation_or_exclusion_has_not_been_entered_for_person))

  - name: person_not_subject_to_five_year_ban_under_page_13
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 1410.0111 Deportation Withheld (FS) and 1410.0112 Cuban/Haitian Entrants (FS), five-year ban notes
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-13
              excerpt: "These individuals are not subject to the five-year ban."
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-13#deportation_withheld_food_stamp_citizenship_factor_eligible
              output: deportation_withheld_food_stamp_citizenship_factor_eligible
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-13#cuban_haitian_entrant
              output: cuban_haitian_entrant
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          deportation_withheld_food_stamp_citizenship_factor_eligible
          or cuban_haitian_entrant
