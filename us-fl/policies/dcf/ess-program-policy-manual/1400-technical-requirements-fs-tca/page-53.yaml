            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-53
              excerpt: "must be explored. This information must be recorded at application and each complete eligibility review."
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-53#child_deprived_due_to_parent_death
              output: child_deprived_due_to_parent_death
