format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-53
  summary: |-
    If the eligibility specialist does not question the individual's information or verification regarding non-custodial-parent support, the case should not be held pending for a reply from the absent parent. Contact with the non-custodial parent is not made when a CSE state collection case is open, the parent is incarcerated in a state or federal institution, a good-cause exception exists or is pending, or prior correspondence was returned "moved, left no forwarding address"; county jail still requires contact. Children and unborn children must be deprived of support or care because of parental incapacity, continuous absence, no legal father and absent natural father, income below the payment standard, death, nonlegal-father denial pending paternity, or single-parent adoption.
rules:
  - name: case_not_held_pending_for_absent_parent_reply_when_support_information_unquestioned
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.071 Note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-53
              excerpt: "does not question the information/verification provided by the individual regarding the non-custodial parent’s support"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_provided_information_or_verification_regarding_noncustodial_parent_support
          and
          not eligibility_specialist_questions_that_support_information_or_verification

  - name: noncustodial_parent_contact_exception_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0711 Exceptions to Contact the Non-Custodial Parent (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-53
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          cse_has_open_state_collection_case_for_noncustodial_parent
          or noncustodial_parent_is_incarcerated_in_state_or_federal_institution
          or good_cause_exception_to_contact_noncustodial_parent_exists
          or good_cause_exception_to_contact_noncustodial_parent_pending_approval
          or prior_noncustodial_parent_correspondence_returned_moved_left_no_forwarding_address

  - name: absent_parent_in_county_jail_contact_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0711 Exceptions to Contact the Non-Custodial Parent (TCA), item 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-53
              excerpt: "when the absent parent is in a county jail, the contact is still required"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          absent_parent_is_in_county_jail

  - name: legal_father_presumed_for_unborn_child_of_married_pregnant_woman
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0712 Reasons for Deprivation (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-53
              excerpt: "When a pregnant woman is married, the man to whom she is married is presumed to be the legal father"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          unborn_child_of_pregnant_woman
          and pregnant_woman_is_married

  - name: child_or_unborn_child_deprived_due_to_parental_incapacity
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0712 Reasons for Deprivation (TCA), reason 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-53
              excerpt: "the mother and legal father live in the home and one or both are incapacitated"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          childs_mother_and_legal_father_live_in_home
          and (childs_mother_is_incapacitated or childs_legal_father_is_incapacitated)

  - name: child_or_unborn_child_deprived_due_to_parent_continuous_absence
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0712 Reasons for Deprivation (TCA), reason 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-53
              excerpt: "a parent is continuously absent from the home due to death, desertion, marital separation, incarceration, or divorce"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          childs_parent_is_continuously_absent_due_to_death
          or childs_parent_is_continuously_absent_due_to_desertion
          or childs_parent_is_continuously_absent_due_to_marital_separation
          or childs_parent_is_continuously_absent_due_to_incarceration
          or childs_parent_is_continuously_absent_due_to_divorce

  - name: child_or_unborn_child_deprived_due_to_natural_father_absence_without_legal_father
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0712 Reasons for Deprivation (TCA), reason 3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-53
              excerpt: "the natural father is continuously absent from the home (if there is no legal father)"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          child_has_no_legal_father
          and childs_natural_father_is_continuously_absent_from_home

  - name: child_or_unborn_child_deprived_due_to_assistance_group_income_below_payment_standard
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0712 Reasons for Deprivation (TCA), reason 4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-53
              excerpt: "the mother and father (legal or non-legal) live in the home and their income is below the payment standard"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          childs_mother_and_legal_or_nonlegal_father_live_in_home
          and assistance_group_income_is_below_payment_standard_for_size

  - name: child_or_unborn_child_deprived_due_to_nonlegal_father_denial_pending_paternity
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0712 Reasons for Deprivation (TCA), note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-53
              excerpt: "deprivation is considered to exist until such time paternity is established"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          nonlegal_father_resides_in_home_with_child_and_mother
          and nonlegal_father_denies_he_is_natural_father
          and
          not paternity_established_for_child

  - name: child_deprived_due_to_parent_death
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0713 Deprivation Due to Death (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-53
              excerpt: "A child is deprived when one or both parents are deceased."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          childs_mother_is_deceased
          or childs_father_is_deceased

  - name: deceased_parent_statement_sufficient_unless_questioned
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0713 Deprivation Due to Death (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-53
              excerpt: "The individual’s statement is sufficient unless questioned."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          surviving_parent_or_caretaker_provided_deceased_parent_date_and_place_of_death
          and
          not eligibility_specialist_questions_deceased_parent_statement

  - name: survivor_pension_possibility_exploration_and_recording_required
