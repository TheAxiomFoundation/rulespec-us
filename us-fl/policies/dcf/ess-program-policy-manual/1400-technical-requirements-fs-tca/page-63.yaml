format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-63
  summary: |-
    "Pregnant women who are receiving Temporary Cash Assistance for themselves and other dependent children are required to cooperate with CSE unless they have good cause reasons not to cooperate." Good cause may exist for listed harm, incest or forcible rape, adoption proceedings, or social-agency adoption relinquishment assistance "valid for three months." "Deny the application for Temporary Cash Assistance if the applicant does not express an intent to claim good cause or the intent to cooperate with Child support Enforcement."
rules:
  - name: social_agency_adoption_relinquishment_good_cause_validity_months
    kind: parameter
    dtype: Count
    source: ESS Program Policy Manual 1420.1708, Reasons for Good Cause (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-63
              excerpt: "this circumstance is valid for three months"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          3

  - name: social_agency_adoption_relinquishment_good_cause_reason
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.1708, Reasons for Good Cause (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-63
              excerpt: "the parent or caretaker relative is being assisted by a public or licensed private social agency to determine whether or not to relinquish the child for adoption (this circumstance is valid for three months)"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          parent_or_caretaker_relative_is_assisted_by_public_or_licensed_private_social_agency_to_determine_whether_to_relinquish_child_for_adoption
          and months_since_social_agency_adoption_relinquishment_assistance_began <= social_agency_adoption_relinquishment_good_cause_validity_months

  - name: child_support_good_cause_reason_may_exist
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.1708, Reasons for Good Cause (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-63
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          child_support_cooperation_could_result_in_physical_harm_to_child
          or child_support_cooperation_could_result_in_emotional_harm_to_child
          or child_support_cooperation_could_result_in_physical_harm_to_parent_or_caretaker_relative_reducing_capacity_to_care_for_child
          or child_support_cooperation_could_result_in_emotional_harm_to_parent_or_caretaker_relative_diminishing_capacity_to_care_for_child
          or child_was_conceived_as_result_of_incest_or_forcible_rape
          or legal_proceedings_for_child_adoption_are_pending_before_court
          or social_agency_adoption_relinquishment_good_cause_reason

  - name: pregnancy_related_tca_child_support_cooperation_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.1707 and note following 1420.1709
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-63
              excerpt: "Pregnant women who are receiving Temporary Cash Assistance for themselves and other dependent children are required to cooperate with CSE unless they have good cause reasons not to cooperate."
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-63
              excerpt: "A pregnant woman with no other deprived children is not subject to child support cooperation until the child’s birth."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (
            person_is_pregnant_woman_receiving_tca_for_self_and_other_dependent_children
            or (
              person_is_in_pregnant_woman_with_no_other_deprived_children_case
              and child_has_been_born
            )
          )
          and not cse_has_determined_good_cause_for_not_cooperating

  - name: tca_application_denial_required_for_non_custodial_parent_information_refusal
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.1709, Failure to Cooperate (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-63
              excerpt: "Deny the application for Temporary Cash Assistance if the applicant does not express an intent to claim good cause or the intent to cooperate with Child support Enforcement."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          applicant_refuses_to_provide_information_regarding_non_custodial_parent_during_tca_application
          and not applicant_expresses_intent_to_claim_good_cause
          and not applicant_expresses_intent_to_cooperate_with_child_support_enforcement

  - name: entire_tca_group_sanction_required_for_cse_noncompliance
    kind: derived
    entity: TanfUnit
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.1710, CSE Reports of Failure to Cooperate (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-63
              excerpt: "CSE directs the eligibility specialist to impose sanctions based upon a Temporary Cash Assistance group member’s ... noncompliance with Child Support Enforcement requirements"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          child_support_enforcement_directs_eligibility_specialist_to_impose_sanctions
          and sanction_direction_is_based_on_tca_group_member_noncompliance_with_cse_requirements
