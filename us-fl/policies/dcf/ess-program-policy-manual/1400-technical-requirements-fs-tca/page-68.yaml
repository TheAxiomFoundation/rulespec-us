format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-68
  summary: |-
    An individual's statement should be considered questionable when notice of truancy or dropout status is received from the school through Learnfare. For TCA, an individual required to be in the home to provide personal care for a disabled family member is exempt from work activities and not subject to time limits during the allowed exemption period. Verification of the family member's disability is required; disability may be shown by temporary or permanent disability benefits or by a physician or licensed certified psychologist statement. The need for care must be reviewed annually; temporary disability verification is valid until the expected end or one year, whichever is earlier. One custodial parent of a child under three months is exempt.
rules:
  - name: disabled_family_care_need_review_interval_years
    kind: parameter
    dtype: Count
    source: 1420.1906.05 Care of a Disabled Family Member (TCA), annual review
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-68
              excerpt: "must be reviewed annually"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1

  - name: temporary_disability_verification_max_validity_years
    kind: parameter
    dtype: Count
    source: 1420.1906.05 Care of a Disabled Family Member (TCA), temporary disability verification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-68
              excerpt: "or one year, whichever is earlier"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1

  - name: child_under_three_months_age_limit_months
    kind: parameter
    dtype: Count
    source: 1420.1906.07 Child Under Three Months (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-68
              excerpt: "child under three months"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          3

  - name: truancy_or_dropout_statement_questionable
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Chapter 1400 Technical Requirements Program TCA, Learnfare note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-68
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          school_notice_of_individual_truancy_or_dropout_status_received_via_learnfare_data_exchange

  - name: disabled_family_member_for_care_exemption
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 1420.1906.05 Care of a Disabled Family Member (TCA), disabled family member definition
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-68
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          family_member_related_by_blood_or_marriage_to_caregiver
          and family_member_resides_in_home_with_caregiver

  - name: family_member_disability_verification_satisfied
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 1420.1906.05 Care of a Disabled Family Member (TCA), disability verification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-68
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          family_member_receives_temporary_or_permanent_disability_benefits_from_government_or_private_source
          or physician_or_licensed_certified_psychologist_statement_indicates_family_member_is_disabled

  - name: disabled_family_care_two_parent_limit_satisfied
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 1420.1906.05 Care of a Disabled Family Member (TCA), two-parent assistance group limits
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-68
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          assistance_group_is_not_two_parent
          or (assistance_group_has_one_disabled_individual_requiring_care and individual_is_the_only_parent_exempted_to_care_for_that_disabled_individual)
          or (assistance_group_has_more_than_one_disabled_member_requiring_care and each_parent_cares_for_a_different_disabled_household_member)

  - name: disabled_family_care_work_exemption_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 1420.1906.05 Care of a Disabled Family Member (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-68
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-68#disabled_family_member_for_care_exemption
              output: disabled_family_member_for_care_exemption
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-68#family_member_disability_verification_satisfied
              output: family_member_disability_verification_satisfied
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-68#disabled_family_care_two_parent_limit_satisfied
              output: disabled_family_care_two_parent_limit_satisfied
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          caregiver_statement_of_need_to_provide_care_in_home_provided
          and disabled_family_member_for_care_exemption
          and family_member_disability_verification_satisfied
          and caregiver_self_declares_lack_of_alternative_care
          and disabled_family_care_two_parent_limit_satisfied
          and caregiver_is_not_parent_in_need_of_care

  - name: disabled_family_care_annual_need_review_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 1420.1906.05 Care of a Disabled Family Member (TCA), annual need-for-care review
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-68
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-68#disabled_family_care_work_exemption_applies
              output: disabled_family_care_work_exemption_applies
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-68#disabled_family_care_need_review_interval_years
              output: disabled_family_care_need_review_interval_years
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          disabled_family_care_work_exemption_applies
          and years_since_last_need_for_care_review >= disabled_family_care_need_review_interval_years

  - name: temporary_disability_verification_valid_for_care_exemption
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 1420.1906.05 Care of a Disabled Family Member (TCA), temporary disability verification validity
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-68
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-68#temporary_disability_verification_max_validity_years
              output: temporary_disability_verification_max_validity_years
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          family_member_disability_is_temporary
          and temporary_disability_verification_period_years <= temporary_disability_verification_max_validity_years
          and verification_period_does_not_extend_beyond_expected_end_of_temporary_disability

  - name: permanent_disability_reverification_not_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 1420.1906.05 Care of a Disabled Family Member (TCA), total and permanent disability
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-68
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          family_member_disability_is_total_and_permanent

  - name: child_age_statement_sufficient_for_under_three_month_exemption
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 1420.1906.07 Child Under Three Months (TCA), child age statement
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-68
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_statement_of_child_age_provided
          and individual_statement_of_child_age_is_not_questionable

  - name: child_under_three_months_work_exemption_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 1420.1906.07 Child Under Three Months (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-68
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-68#child_under_three_months_age_limit_months
              output: child_under_three_months_age_limit_months
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_is_custodial_parent
          and individual_is_selected_custodial_parent_for_child_under_three_months_exemption
          and youngest_child_age_in_months < child_under_three_months_age_limit_months
