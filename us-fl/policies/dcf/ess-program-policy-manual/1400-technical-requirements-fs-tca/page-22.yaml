format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-22
  summary: Remove CSE imposed sanctions upon CSE compliance request, or without CSE
    approval when the last child leaves or turns 18, a legally established absent
    parent moves in, or a non-legal parent completes DH 432 and staff forwards it.
    ABAWDs are persons 18 through 54 without dependent children and without an exemption;
    time-limited ABAWDs lose food stamp eligibility after receiving food stamps for
    three noncompliant months in the assigned 36-month period.
rules:
- name: abawd_minimum_age_years
  kind: parameter
  dtype: Count
  source: 1410.1800 Able-Bodied Adult Without Dependents (FS)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-22
          excerpt: ABAWDs are persons 18 through 54 years of age.
  versions:
  - effective_from: '0001-01-01'
    formula: '18'
- name: abawd_maximum_age_years
  kind: parameter
  dtype: Count
  source: 1410.1800 Able-Bodied Adult Without Dependents (FS)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-22
          excerpt: ABAWDs are persons 18 through 54 years of age.
  versions:
  - effective_from: '0001-01-01'
    formula: '54'
- name: potential_abawd_certification_period_months
  kind: parameter
  dtype: Count
  source: 1410.1800 Able-Bodied Adult Without Dependents (FS)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-22
          excerpt: within the four-month certification period
  versions:
  - effective_from: '0001-01-01'
    formula: '4'
- name: abawd_monthly_work_hours_requirement
  kind: parameter
  dtype: Count
  source: 1410.1801 ABAWD Provisions (FS)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-22
          excerpt: Working 80 hours or more monthly.
  versions:
  - effective_from: '0001-01-01'
    formula: '80'
- name: abawd_assigned_period_months
  kind: parameter
  dtype: Count
  source: 1410.1801 ABAWD Provisions (FS)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-22
          excerpt: during the assigned 36-month period preceding the month of application
  versions:
  - effective_from: '0001-01-01'
    formula: '36'
- name: abawd_food_stamp_time_limit_months
  kind: parameter
  dtype: Count
  source: 1410.1801 ABAWD Provisions (FS)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-22
          excerpt: any three months
  versions:
  - effective_from: '0001-01-01'
    formula: '3'
- name: cse_sanction_removed_without_cse_approval
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: Chapter 1400 Technical Requirements Program FS; CSE imposed sanction removal
    without CSE approval
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-22
  versions:
  - effective_from: '0001-01-01'
    formula: "person_has_cse_imposed_sanction_for_noncooperation\nand (\n  last_child_subject_to_cooperation_left_home\n\
      \  or last_child_subject_to_cooperation_age_in_years >= child_support_cooperation_child_age_limit_years\n\
      \  or absent_parent_with_established_legal_paternity_moved_into_home\n  or (\n\
      \    non_legal_parent_moved_into_home\n    and non_legal_parent_completed_dh_432_acknowledging_paternity\n\
      \    and staff_forwarded_completed_dh_432_to_cse_or_vital_statistics\n  )\n)"
- name: cse_sanction_removal_required_after_compliance_or_policy_event
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: Chapter 1400 Technical Requirements Program FS; CSE sanction removal
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-22
  versions:
  - effective_from: '0001-01-01'
    formula: "(\n  person_has_cse_imposed_sanction\n  and cse_requests_removal_because_individual_complied\n\
      )\nor cse_sanction_removed_without_cse_approval"
- name: sanctioned_individual_added_back_without_new_application
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: Chapter 1400 Technical Requirements Program FS; add sanctioned individual
    back to food stamp assistance group
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-22
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-22
          excerpt: Not require an application unless the entire food stamp assistance
            group is closed.
  versions:
  - effective_from: '0001-01-01'
    formula: 'cse_sanction_removal_required_after_compliance_or_policy_event

      and individual_meets_all_other_food_stamp_eligibility_factors

      and not entire_food_stamp_assistance_group_is_closed'
- name: sanctioned_individual_addition_effective_month
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: Chapter 1400 Technical Requirements Program FS; effective date for adding
    sanctioned individual
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: effective_period
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-22
          excerpt: The effective date for adding the sanctioned individual is the
            first month following the date of compliance.
  versions:
  - effective_from: '0001-01-01'
    formula: 'sanctioned_individual_added_back_without_new_application

      and month_is_first_month_following_date_of_compliance'
- name: able_bodied_adult_without_dependents
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: 1410.1800 Able-Bodied Adult Without Dependents (FS)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: definition
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-22
  versions:
  - effective_from: '0001-01-01'
    formula: 'person_age_in_years >= abawd_minimum_age_years

      and person_age_in_years <= abawd_maximum_age_years

      and not person_has_dependent_children

      and not person_meets_abawd_exemption'
- name: potential_abawd
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: 1410.1800 Able-Bodied Adult Without Dependents (FS)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: definition
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-22
  versions:
  - effective_from: '0001-01-01'
    formula: 'person_is_reasonably_anticipated_to_become_abawd

      and person_months_until_reasonably_anticipated_abawd_status <= potential_abawd_certification_period_months

      and not person_will_meet_any_other_abawd_exemption'
- name: time_limited_abawd
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: 1410.1800 Able-Bodied Adult Without Dependents (FS)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: definition
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-22
  versions:
  - effective_from: '0001-01-01'
    formula: 'able_bodied_adult_without_dependents

      and not person_otherwise_exempt_from_snap_et_work_registration_and_participation

      and not person_meets_exemption_to_abawd_time_limits'
- name: abawd_monthly_work_or_participation_requirement_met
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: 1410.1801 ABAWD Provisions (FS)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-22
  versions:
  - effective_from: '0001-01-01'
    formula: 'person_work_hours_monthly >= abawd_monthly_work_hours_requirement

      or person_employment_program_activity_hours_monthly >= abawd_monthly_work_hours_requirement

      or person_combined_work_and_work_program_activity_hours_monthly >= abawd_monthly_work_hours_requirement'
- name: time_limited_abawd_food_stamp_technically_ineligible_after_time_limit_exhausted
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: 1410.1801 ABAWD Provisions (FS)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-22
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-22
          excerpt: exhausted their time limit (three months in the designated 36-month
            period)
  versions:
  - effective_from: '0001-01-01'
    formula: 'time_limited_abawd

      and person_assigned_period_preceding_application_months == abawd_assigned_period_months

      and person_food_stamp_months_received_without_abawd_monthly_requirement_in_assigned_period
      >= abawd_food_stamp_time_limit_months'
imports:
- us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-64#child_support_cooperation_child_age_limit_years
