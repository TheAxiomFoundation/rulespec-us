format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-16
  summary: |-
    If secondary verification shows that a noncitizen no longer has eligible immigration status, Benefit Recovery referral is initiated for the total assistance received during the interim investigation period. VIS-CPS must be completed for noncitizens at application or reapplication, when adding a noncitizen individual, at every review for individuals without permanent resident status, and when alien status changes. Certain noncitizens are not eligible for food stamps on the citizenship factor. Substantial evidence and a formal non-appealable order of deportation are required before reporting unlawful presence, and listed VIS-CPS or documentation situations must not be treated as unlawful-presence determinations.
rules:
  - name: benefit_recovery_referral_required_for_interim_assistance_after_secondary_verification_status_loss
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.0115, FS
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-16
              excerpt: If the secondary verification shows that the noncitizen no longer has an eligible immigration status, a Benefit Recovery referral will be initiated.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_noncitizen
          and secondary_verification_shows_person_no_longer_has_eligible_immigration_status
          and person_received_assistance_during_interim_investigation_period
  - name: benefit_recovery_referral_amount_for_interim_assistance_after_secondary_verification_status_loss
    kind: derived
    entity: Person
    dtype: Money
    unit: USD
    period: Month
    source: ESS Program Policy Manual 1410.0115, FS
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-16
              excerpt: for the total amount of assistance received during the interim investigation period
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if benefit_recovery_referral_required_for_interim_assistance_after_secondary_verification_status_loss: assistance_received_during_interim_investigation_period_amount else: 0
  - name: vis_cps_completion_required_for_noncitizen
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.0115 VIS-CPS (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-16
              excerpt: VIS-CPS must be completed for noncitizens at application or reapplication, when adding a noncitizen individual, at every review for individuals who do not have a permanent resident status, and any time there is a change to alien status.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_noncitizen
          and (person_is_at_application_or_reapplication
          or noncitizen_individual_is_being_added
          or (person_is_at_review and not person_has_permanent_resident_status)
          or person_has_change_to_alien_status)
  - name: benefits_not_held_denied_or_terminated_pending_secondary_verification
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.0115 VIS-CPS (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-16
              excerpt: Do not hold, deny or terminate benefits waiting for the secondary verification.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_noncitizen
          and person_has_apparently_good_uscis_document
          and vis_cps_indicates_contradictory_information
          and not secondary_verification_returned_confirming_status
  - name: noncitizen_food_stamp_citizenship_factor_ineligible_under_page_16
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.0117 Noncitizens not Eligible for Assistance (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-16
              excerpt: The following individuals are not eligible for food stamps on the factor of citizenship status.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_noncitizen
          and (person_is_foreign_government_representative_on_official_business_or_family_or_servant
          or person_is_visitor_for_business_or_pleasure_including_exchange_visitor
          or person_is_crewman_on_shore_leave
          or person_is_noncitizen_in_travel_status_traveling_directly_through_us
          or person_is_treaty_trader_or_investor_or_family
          or person_is_foreign_student
          or person_is_international_organization_representative_or_family_or_servant
          or person_is_temporary_worker_including_agricultural_contract_worker
          or person_is_member_of_foreign_press_radio_film_or_other_information_media_or_family)
  - name: unlawful_presence_reporting_to_uscis_permitted_under_page_16
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.0118 Reporting Illegal Noncitizens (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-16
              excerpt: Substantial evidence of unlawful presence in the United States must exist before an individual can be reported to USCIS.
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-16
              excerpt: Do not attempt to make a determination of unlawful presence in the following situations.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_applies_for_benefits
          and substantial_evidence_of_unlawful_presence_exists
          and person_provided_formal_nonappealable_order_of_deportation
          and not individual_declines_to_present_immigration_status_documentation
          and not vis_cps_response_shows_no_uscis_record_on_individual
          and not vis_cps_response_shows_immigration_status_makes_individual_ineligible_for_benefits
          and not secondary_verification_shows_individual_uscis_status_expired
  - name: vis_cps_or_secondary_verification_for_nonapplicant_prohibited
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.0118 Reporting Illegal Noncitizens (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-16
              excerpt: staff should not seek verification status through VIS-CPS, or through any secondary verification process, for individuals who are not applying for benefits
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not person_applies_for_benefits
