format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-47
  summary: To determine if TCA should continue for temporarily absent assistance groups,
    the assistance group must have maintained Florida residence and have plans to
    return. Temporary absence does not exist if another state determines residency
    for TCA/TANF, the individual leaves the U.S. intending permanent residence outside
    the U.S., or there is no intent to return to Florida. Out-of-state TCA use for
    more than 30 days with no subsequent in-state usage requires termination unless
    Florida residency or temporary absence with intent to return is verified. Identity
    must be verified before benefit authorization; discovered and authenticated identity
    establishes the identity factor, with verbal authentication required for unanswered,
    incorrectly answered, or paper applications. A TCA child is unmarried, not legally
    emancipated, and under 18, or under 19 and a full-time student.
  deferred_outputs:
  - output: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-47#identity_technical_eligibility_factor_established
    reason: Generated rule used a local name that collides with a sibling RuleSpec
      export. This output is deferred until it can be encoded with a semantic branch-specific
      name without creating ambiguous sibling imports.
  - output: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-47#verbal_authentication_process_required
    reason: Generated rule used a local name that collides with a sibling RuleSpec
      export. This output is deferred until it can be encoded with a semantic branch-specific
      name without creating ambiguous sibling imports.
rules:
- name: tca_residency_lost_continuation_period_months
  kind: parameter
  dtype: Count
  source: Chapter 1400 Technical Requirements, TCA temporary absence/residency
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-47
          excerpt: TCA may continue for one month following the month of departure.
  versions:
  - effective_from: '0001-01-01'
    formula: '1'
- name: tca_out_of_state_usage_termination_threshold_days
  kind: parameter
  dtype: Count
  source: Chapter 1400 Technical Requirements, TCA out-of-state benefit usage
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-47
          excerpt: out of state for more than 30 days
  versions:
  - effective_from: '0001-01-01'
    formula: '30'
- name: tca_child_general_age_limit_years
  kind: parameter
  dtype: Count
  source: 1420.0504 Definition of a Child (TCA)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-47
          excerpt: under age 18
  versions:
  - effective_from: '0001-01-01'
    formula: '18'
- name: tca_child_student_age_limit_years
  kind: parameter
  dtype: Count
  source: 1420.0504 Definition of a Child (TCA)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-47
          excerpt: under age 19 and a full-time student
  versions:
  - effective_from: '0001-01-01'
    formula: '19'
- name: tca_temporary_absence_not_recognized
  kind: derived
  entity: TanfUnit
  dtype: Judgment
  period: Month
  source: Chapter 1400 Technical Requirements, TCA temporary absence/residency
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-47
          excerpt: Temporary absence does not exist
  versions:
  - effective_from: '0001-01-01'
    formula: 'assistance_group_has_member_determined_resident_of_another_state_for_tca_or_tanf

      or assistance_group_member_left_us_intending_permanent_residence_outside_us

      or assistance_group_has_no_intent_to_return_to_florida'
- name: tca_may_continue_during_temporary_absence
  kind: derived
  entity: TanfUnit
  dtype: Judgment
  period: Month
  source: Chapter 1400 Technical Requirements, TCA temporary absence/residency
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-47
          excerpt: must have maintained its residence in Florida
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-47
          excerpt: plans to return to Florida
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-47
          excerpt: Temporary absence does not exist
  versions:
  - effective_from: '0001-01-01'
    formula: 'assistance_group_maintained_florida_residence_during_temporary_absence_period

      and assistance_group_has_plans_to_return_to_florida_when_absence_reason_ends

      and not tca_temporary_absence_not_recognized'
- name: tca_continuation_months_after_departure_when_residency_lost
  kind: derived
  entity: TanfUnit
  dtype: Count
  period: Month
  source: Chapter 1400 Technical Requirements, TCA loss of Florida residency
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-47
          excerpt: leaves Florida with the intent of establishing its home in another
            state
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-47
          excerpt: continue for one month following the month of departure
  versions:
  - effective_from: '0001-01-01'
    formula: 'if assistance_group_leaves_florida_intending_to_establish_home_in_another_state:
      tca_residency_lost_continuation_period_months else: 0'
- name: household_verifies_florida_residency_or_temporary_absence_with_return_intent
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: Chapter 1400 Technical Requirements, TCA out-of-state benefit usage
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-47
          excerpt: unless the household can verify Florida residency or temporary
            absence
  versions:
  - effective_from: '0001-01-01'
    formula: "household_can_verify_florida_residency\nor (\n  household_can_verify_temporary_absence_from_state\n\
      \  and household_has_intent_to_return_to_florida\n)"
- name: tca_benefits_must_be_terminated_for_out_of_state_use
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: Chapter 1400 Technical Requirements, TCA out-of-state benefit usage
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-47
          excerpt: out of state for more than 30 days
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-47
          excerpt: with no subsequent in-state usage
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-47
          excerpt: unless the household can verify Florida residency
  versions:
  - effective_from: '0001-01-01'
    formula: 'tca_benefit_out_of_state_usage_days > tca_out_of_state_usage_termination_threshold_days

      and not household_has_subsequent_in_state_tca_benefit_usage

      and not household_verifies_florida_residency_or_temporary_absence_with_return_intent'
- name: tca_child
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: 1420.0504 Definition of a Child (TCA)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: definition
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-47
          excerpt: unmarried ... not legally emancipated
      - path: versions[0].formula
        kind: definition
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-47
          excerpt: under age 18, or under age 19 and a full-time student
  versions:
  - effective_from: '0001-01-01'
    formula: "person_is_unmarried_for_tca_child_definition\nand not person_is_legally_emancipated\n\
      and (\n  person_age_in_years < tca_child_general_age_limit_years\n  or (\n \
      \   person_age_in_years < tca_child_student_age_limit_years\n    and person_is_full_time_student_in_secondary_school_or_equivalent_vocational_or_technical_training\n\
      \  )\n)"
- name: tca_age_eligibility_through_birthday_month
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: 1420.0504 Definition of a Child (TCA)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-47
          excerpt: through the month of the child's appropriate birthday
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-47
          excerpt: unless born on the first day of the month
  versions:
  - effective_from: '0001-01-01'
    formula: 'child_reaches_appropriate_birthday_this_month

      and not child_was_born_on_first_day_of_month'
- name: tca_age_eligibility_ceases_effective_birth_month
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: 1420.0504 Definition of a Child (TCA)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-47
          excerpt: Eligibility then ceases effective the birth month.
  versions:
  - effective_from: '0001-01-01'
    formula: 'child_reaches_appropriate_birthday_this_month

      and child_was_born_on_first_day_of_month'
