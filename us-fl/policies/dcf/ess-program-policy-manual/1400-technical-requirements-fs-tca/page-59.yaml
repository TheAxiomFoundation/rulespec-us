format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-59
  summary: |-
    Relationship evidence may include listed court, adoption, medical, religious, personal, census, family, agency, insurance, tax, school, SSA, trust, military, government, newspaper, and local history records. Specified relatives other than the mother or legal father who are under age 18 must have the disability of non-age removed legally to receive TCA. When the natural father resides with the mother and does not respond within 10 days to a paternity Request for Information that is not returned, his nonresponse may be considered a statement of paternity. The child must live continually in the home of the parent or specified relative, and inmates or persons in state-paid licensed maternity homes are not living in the home; for Title IV-E, a child born to an incarcerated mother or a mother who does not plan to bring the child home from the hospital satisfies the technical factor.
rules:
  - name: social_agency_relationship_record_minimum_age_years
    kind: parameter
    dtype: Count
    source: ESS Program Policy Manual 1420.0800 relationship evidence, social agency records
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-59
              excerpt: "social agency records including those of DCF which are at least one year old"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1

  - name: insurance_relationship_policy_minimum_age_years
    kind: parameter
    dtype: Count
    source: ESS Program Policy Manual 1420.0800 relationship evidence, insurance policies
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-59
              excerpt: "insurance policies at least one year old"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1

  - name: specified_relative_nonage_age_limit_years
    kind: parameter
    dtype: Count
    source: ESS Program Policy Manual 1420.0800 specified relatives under non-age
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-59
              excerpt: "under age 18"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          18

  - name: natural_father_paternity_response_limit_days
    kind: parameter
    dtype: Count
    source: ESS Program Policy Manual 1420.0800 paternity note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-59
              excerpt: "contact the eligibility specialist within 10 days"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10

  - name: relationship_to_child_supported_by_page_59_evidence
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0800 relationship evidence, items 2 through 18
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-59
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-59#social_agency_relationship_record_minimum_age_years
              output: social_agency_relationship_record_minimum_age_years
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-59#insurance_relationship_policy_minimum_age_years
              output: insurance_relationship_policy_minimum_age_years
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          relationship_specified_by_marriage_license_divorce_record_or_other_court_record
          or relationship_specified_by_adoption_papers
          or relationship_specified_by_hospital_birth_record_or_attending_birth_professional_statement
          or relationship_specified_by_religious_record
          or relationship_supported_by_statement_of_individual_in_position_to_know_relationship
          or relationship_listed_in_census_bureau_family_record
          or relationship_specified_by_unaltered_ink_family_bible_or_other_family_record
          or (relationship_specified_by_social_agency_record_including_dcf and social_agency_record_age_in_years >= social_agency_relationship_record_minimum_age_years and social_agency_record_consistently_specifies_degree_of_relationship)
          or relationship_specified_by_juvenile_court_other_court_or_hospital_record
          or (relationship_specified_by_insurance_policy and insurance_policy_age_in_years >= insurance_relationship_policy_minimum_age_years)
          or relationship_listed_on_income_tax_return_copy
          or relationship_specified_by_school_record
          or rsdi_award_to_child_based_on_parents_account_supported_by_ssa_evidence
          or relationship_specified_by_trust_or_related_document
          or relationship_specified_by_military_or_veterans_record
          or relationship_specified_by_uscis_indian_agency_or_other_government_or_agency_record
          or relationship_specified_by_newspaper_record_or_local_history

  - name: specified_relative_nonage_requirement_satisfied_for_tca
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0800 specified relatives under non-age
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-59
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-59#specified_relative_nonage_age_limit_years
              output: specified_relative_nonage_age_limit_years
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not person_is_specified_relative_other_than_mother_or_legal_father
          or person_age_in_years >= specified_relative_nonage_age_limit_years
          or disability_of_non_age_removed_legally

  - name: natural_father_nonresponse_may_be_considered_paternity_statement
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0800 paternity note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-59
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-59#natural_father_paternity_response_limit_days
              output: natural_father_paternity_response_limit_days
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          natural_father_resides_with_mother
          and request_for_information_form_mailed_to_natural_father_requesting_contact_if_not_childs_father
          and days_since_request_for_information_form_mailed >= natural_father_paternity_response_limit_days
          and not natural_father_contacted_eligibility_specialist_to_deny_paternity
          and not correspondence_returned_from_post_office

  - name: living_in_the_home
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0805 Definition of Living in the Home (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-59
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (child_lives_on_continual_basis_in_home_of_parent_or_specified_relative or joint_custody_partial_residence_conditions_as_outlined_in_1420_0719_are_met)
          and home_is_family_setting_shared_by_parent_or_specified_relative
          and parent_or_specified_relative_assumes_and_continues_day_to_day_care_and_responsibility_for_child_in_family_setting
          and not child_is_under_detention_or_custody_of_penal_correctional_detention_or_psychiatric_facility_or_institution
          and not child_is_in_licensed_maternity_home_with_care_paid_for_by_state

  - name: title_iv_e_living_in_the_home_technical_factor_met
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0805 Title IV-E living-in-home technical factor
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-59
              excerpt: "For Title IV-E, a child born to a mother who is incarcerated or does not plan to bring the child home from the hospital"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          child_was_born_to_mother_who_is_incarcerated
          or child_was_born_to_mother_who_does_not_plan_to_bring_child_home_from_hospital
