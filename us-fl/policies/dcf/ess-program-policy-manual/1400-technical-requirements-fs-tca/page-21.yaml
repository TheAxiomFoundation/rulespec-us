format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-21
  summary: |-
    Good cause may exist when cooperation in establishing paternity or securing child support could result in physical or emotional harm to the child, parent, or caretaker relative, or when the child was conceived by incest or forcible rape, adoption proceedings are pending, or adoption-relinquishment counseling by a public or licensed private social agency is within its three-month validity. A parent, teen parent, or caretaker relative who refuses non-custodial-parent information for a child under age 18 must be reviewed for child-support cooperation; a pregnant woman with no other deprived children is not subject until birth. Deny food stamp assistance to an adult or teen parent subject to cooperation who does not express intent to claim good cause or cooperate. When CSE requests a sanction for noncompliance, remove the noncompliant custodial parent or caretaker relative with 10-day notice and treat the person as technically ineligible for budgeting.
rules:
  - name: adoption_relinquishment_agency_assistance_valid_months
    kind: parameter
    dtype: Count
    source: ESS Program Policy Manual 1410.1708 Reasons for Good Cause (FS), adoption-relinquishment agency assistance
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-21
              excerpt: "this circumstance is valid for three months"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          3

  - name: noncustodial_parent_information_child_age_limit_years
    kind: parameter
    dtype: Count
    source: ESS Program Policy Manual 1410.1709 Failure to Cooperate (FS), child age
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-21
              excerpt: "child under the age of 18 residing in the home"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          18

  - name: cse_failure_adverse_action_notice_days
    kind: parameter
    dtype: Count
    source: ESS Program Policy Manual 1410.1710 CSE Reports of Failure to Cooperate (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-21
              excerpt: "allowing for a 10-day notice of adverse action"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10

  - name: child_support_good_cause_may_exist
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.1708 Reasons for Good Cause (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-21
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-21#adoption_relinquishment_agency_assistance_valid_months
              output: adoption_relinquishment_agency_assistance_valid_months
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          cooperation_could_result_in_physical_harm_to_child
          or cooperation_could_result_in_emotional_harm_to_child
          or cooperation_could_result_in_physical_harm_to_parent_or_caretaker_reducing_capacity_to_care_for_child
          or cooperation_could_result_in_emotional_harm_to_parent_or_caretaker_diminishing_capacity_to_care_for_child
          or child_was_conceived_as_result_of_incest
          or child_was_conceived_as_result_of_forcible_rape
          or legal_proceedings_for_adoption_of_child_are_pending_before_court
          or (parent_or_caretaker_is_assisted_by_public_or_licensed_private_social_agency_to_determine_relinquishment_for_adoption and months_since_adoption_relinquishment_agency_assistance_began <= adoption_relinquishment_agency_assistance_valid_months)

  - name: pregnant_woman_not_subject_to_child_support_cooperation_until_child_birth
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.1709 Failure to Cooperate (FS), note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-21
              excerpt: "A pregnant woman with no other deprived children is not subject to child support cooperation until the child’s birth."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_pregnant_woman
          and person_has_no_other_deprived_children
          and pregnancy_child_has_not_been_born

  - name: person_subject_to_child_support_cooperation_after_pregnancy_note
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.1709 Failure to Cooperate (FS), pregnant-woman note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-21
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-21#pregnant_woman_not_subject_to_child_support_cooperation_until_child_birth
              output: pregnant_woman_not_subject_to_child_support_cooperation_until_child_birth
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_would_otherwise_be_subject_to_child_support_cooperation
          and
          not pregnant_woman_not_subject_to_child_support_cooperation_until_child_birth

  - name: cse_referral_required_despite_apparent_good_cause
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.1700 Child Support Cooperation (FS), good cause referral
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-21
              excerpt: "must refer the individual to CSE even when it appears that good cause exists"
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-21#person_subject_to_child_support_cooperation_after_pregnancy_note
              output: person_subject_to_child_support_cooperation_after_pregnancy_note
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_subject_to_child_support_cooperation_after_pregnancy_note
          and person_appears_to_have_good_cause_for_child_support_noncooperation

  - name: child_support_cooperation_requirements_review_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.1709 Failure to Cooperate (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-21
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-21#noncustodial_parent_information_child_age_limit_years
              output: noncustodial_parent_information_child_age_limit_years
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (person_is_parent or person_is_teen_parent or person_is_caretaker_relative)
          and person_refuses_to_provide_information_regarding_noncustodial_parent
          and child_age_in_years < noncustodial_parent_information_child_age_limit_years
          and child_resides_in_home
          and (food_stamp_application_in_progress or eligibility_review_in_progress)

  - name: individual_food_stamp_assistance_denied_for_child_support_noncooperation
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.1709 Failure to Cooperate (FS), denial
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-21
              excerpt: "Deny food stamp assistance for the individual ... if he/she does not express an intent to claim good cause or the intent to cooperate"
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-21#person_subject_to_child_support_cooperation_after_pregnancy_note
              output: person_subject_to_child_support_cooperation_after_pregnancy_note
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (person_is_adult_parent or person_is_teen_parent)
          and person_subject_to_child_support_cooperation_after_pregnancy_note
          and
          not person_expresses_intent_to_claim_good_cause
          and
          not person_expresses_intent_to_cooperate_with_cse

  - name: cse_referral_not_necessary_when_no_intent_to_cooperate_or_claim_good_cause
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.1709 Failure to Cooperate (FS), referral exception
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-21
              excerpt: "A referral ... is not necessary when the individual expresses intent not to cooperate or claim “good cause”."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_expresses_intent_not_to_cooperate_with_cse
          and person_expresses_intent_not_to_claim_good_cause

  - name: cse_failure_sanction_notice_requirement_met
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.1710 CSE Reports of Failure to Cooperate (FS), notice
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-21
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-21#cse_failure_adverse_action_notice_days
              output: cse_failure_adverse_action_notice_days
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          notice_of_adverse_action_days_allowed >= cse_failure_adverse_action_notice_days

  - name: food_stamp_removal_action_required_for_cse_noncompliance
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.1710 CSE Reports of Failure to Cooperate (FS), sanction removal
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-21
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-21#cse_failure_sanction_notice_requirement_met
              output: cse_failure_sanction_notice_requirement_met
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          child_support_enforcement_requests_sanction_for_noncompliance
          and person_did_not_comply_with_child_support_enforcement_requirements
          and (person_is_custodial_parent or person_is_caretaker_relative)
          and cse_failure_sanction_notice_requirement_met

  - name: noncooperative_custodial_parent_or_caretaker_technically_ineligible_for_food_stamp_budgeting
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.1710 CSE Reports of Failure to Cooperate (FS), budgeting treatment
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-21
              excerpt: "The non-cooperative custodial parent will be treated as “technically ineligible” for food stamp budgeting purposes."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          child_support_enforcement_requests_sanction_for_noncompliance
          and person_did_not_comply_with_child_support_enforcement_requirements
          and (person_is_custodial_parent or person_is_caretaker_relative)
