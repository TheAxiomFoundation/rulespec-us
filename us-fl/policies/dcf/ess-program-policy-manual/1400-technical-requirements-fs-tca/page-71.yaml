format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-71
  summary: |-
    Temporary Cash Assistance is terminated for the entire assistance group. The penalty period remains in effect for three months. The individual is required to contact the RWB/or designee and comply with work activities prior to reinstatement of assistance. The penalty period must be served prior to reinstatement of assistance. Temporary Cash Assistance may be provided to children under the age of 16 through a protective payee.
    TCA - When a sanctioned individual files an application and is now exempt, lift the sanction. If the individual becomes mandatory again, they are once again subject to the requirements for compliance and the remaining sanction period they did not serve.
    Food Stamps - If the individual reapplies and is is exempt from work requirements, lift the sanction. Do not apply Riverside policy during periods when a non-compliant individual is exempt.
    Food Stamps - Once an individual is serving a sanction for food stamps due to a TCA related sanction, the sanctioned individual must serve the food stamp sanction period unless they become exempt, or the RWB, their designee, or the eligibility specialist determines the individual had good cause for non-compliance with TCA related work requirements.
    First Non-Compliance: TCA - Terminate the TCA for the entire AG for a minimum of 10 days.
rules:
  - name: protective_payee_child_age_limit_years
    kind: parameter
    dtype: Count
    source: Chapter 1400 Technical Requirements Program TCA; protective payee age limit
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-71
              excerpt: children under the age of 16 through a protective payee
    versions:
      - effective_from: '0001-01-01'
