format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-64
  summary: |-
    1420.1711 Ending Sanction (TCA): staff must remove the sanction upon CSE's request that the individual complied, not require an application when compliance is within 30 calendar days, and require an application when compliance is more than 30 calendar days. CSE imposed sanctions for noncooperation may be removed without CSE approval in the listed child, absent-parent, and DH 432 situations. Individuals whose needs are not included in the benefit calculation are not subject to TCA employment and training requirements. A teen parent has a child of their own, meets the minor-child age/student definition, and is not married or divorced.
rules:
  - name: cse_sanction_compliance_application_window_days
    kind: parameter
    dtype: Count
    source: 1420.1711 Ending Sanction (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-64
              excerpt: "within 30 calendar days from the effective date of the sanction"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: child_support_cooperation_child_age_limit_years
    kind: parameter
    dtype: Count
    source: 1420.1711 Ending Sanction (TCA), sanctions removed without CSE approval
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-64
              excerpt: "When the last child subject to cooperation turns 18."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          18

  - name: teen_parent_general_age_limit_years
    kind: parameter
    dtype: Count
    source: 1420.1901 Teen Parents (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-64
              excerpt: "under age 18"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          18

  - name: teen_parent_student_age_limit_years
    kind: parameter
    dtype: Count
    source: 1420.1901 Teen Parents (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-64
              excerpt: "under age 19 and a full-time student"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          19

  - name: medicaid_removal_for_child_support_noncompliance_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Chapter 1400 Technical Requirements Program TCA, child support noncompliance actions
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-64
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_noncompliant_with_child_support_cooperation
          and not person_is_pregnant

  - name: tca_cse_sanction_ending_without_new_application
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 1420.1711 Ending Sanction (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-64
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-64#cse_sanction_compliance_application_window_days
              output: cse_sanction_compliance_application_window_days
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          child_support_enforcement_requested_sanction_removal_because_individual_complied
          and calendar_days_from_sanction_effective_date_to_compliance <= cse_sanction_compliance_application_window_days

  - name: tca_cse_sanction_ending_requires_application
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 1420.1711 Ending Sanction (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-64
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-64#cse_sanction_compliance_application_window_days
              output: cse_sanction_compliance_application_window_days
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          child_support_enforcement_requested_sanction_removal_because_individual_complied
          and calendar_days_from_sanction_effective_date_to_compliance > cse_sanction_compliance_application_window_days

  - name: cse_noncooperation_sanction_removable_without_cse_approval
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 1420.1711 Ending Sanction (TCA), sanctions removed without CSE approval
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-64
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-64#child_support_cooperation_child_age_limit_years
              output: child_support_cooperation_child_age_limit_years
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          last_child_subject_to_cooperation_has_left_home
          or last_child_subject_to_cooperation_age_in_years >= child_support_cooperation_child_age_limit_years
          or absent_parent_with_established_legal_paternity_moved_into_home
          or (nonlegal_parent_moved_into_home and nonlegal_parent_completed_dh_432_acknowledging_paternity and staff_forwarded_completed_dh_432_to_cse_or_vital_statistics)

  - name: person_subject_to_tca_employment_and_training_or_work_requirements
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 1420.1900 Employment and Training (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-64
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_needs_are_included_in_tca_benefit_calculation
          and person_is_in_category_required_to_register_or_participate_in_tca_employment_and_training_or_work_activities

  - name: tca_applicant_work_registration_overview_requirement_satisfied
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 1420.1900 Employment and Training (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-64
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not (person_is_tca_applicant or person_is_parent_in_intact_household_for_tca_application)
          or (person_work_registered_before_tca_benefit_authorization and person_completed_overview_of_tanf_work_requirements_basic_options_and_services_before_benefit_authorization)

  - name: teen_parent
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 1420.1901 Teen Parents (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-64
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-64#teen_parent_general_age_limit_years
              output: teen_parent_general_age_limit_years
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-64#teen_parent_student_age_limit_years
              output: teen_parent_student_age_limit_years
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_has_child_or_children_of_their_own
          and (person_age_in_years < teen_parent_general_age_limit_years or (person_is_full_time_student_in_secondary_school_or_approved_ged_program and person_age_in_years < teen_parent_student_age_limit_years))
          and person_is_not_married_or_divorced

  - name: teen_parent_policy_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 1420.1901 Teen Parents (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-64
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-64#teen_parent
              output: teen_parent
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          teen_parent
          and (person_receives_temporary_cash_assistance_as_child_in_parents_case or person_receives_temporary_cash_assistance_as_parent)
