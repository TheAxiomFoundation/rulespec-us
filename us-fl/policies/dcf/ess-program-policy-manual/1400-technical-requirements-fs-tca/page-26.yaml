format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-26
  summary: |-
    Good cause reasons include circumstances beyond the individual's control that DCF can anticipate will continue for the entire certification period. Work registration must occur at the application interview, when an exemption is lost, after re-entry following an absence of at least one month, or when 12 months have passed since last registration. Individuals meeting listed conditions are exempt from SNAP E&T work requirements, including age, disability, TCA compliance, care responsibilities, unemployment compensation, treatment, work hours or earnings, student, SSI/SSDI, UCB, and ORR E&T refugee participation.
rules:
  - name: snap_e_and_t_minimum_work_age_years
    kind: parameter
    dtype: Integer
    source: ESS Program Policy Manual 1410.1906
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-26
              excerpt: "Under age 16"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          16

  - name: snap_e_and_t_senior_age_threshold_years
    kind: parameter
    dtype: Integer
    source: ESS Program Policy Manual 1410.1906
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-26
              excerpt: "age 60 or older"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          60

  - name: snap_e_and_t_teen_upper_age_years
    kind: parameter
    dtype: Integer
    source: ESS Program Policy Manual 1410.1906
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-26
              excerpt: "age 16 or 17"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          17

  - name: care_exemption_dependent_child_age_limit_years
    kind: parameter
    dtype: Integer
    source: ESS Program Policy Manual 1410.1906
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-26
              excerpt: "dependent child under age six"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          6

  - name: snap_e_and_t_monthly_work_hours_minimum
    kind: parameter
    dtype: Count
    source: ESS Program Policy Manual 1410.1906
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-26
              excerpt: "Working a minimum of 120 hours/month"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          120

  - name: snap_e_and_t_monthly_earnings_equivalent_threshold
    kind: parameter
    dtype: Money
    unit: USD
    source: ESS Program Policy Manual 1410.1906
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-26
              excerpt: "at least $870 monthly"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          870

  - name: migrant_or_seasonal_farm_worker_employment_start_window_days
    kind: parameter
    dtype: Count
    source: ESS Program Policy Manual 1410.1906
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-26
              excerpt: "begin employment within the next 30 days"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: transportation_reimbursement_allowable_limit
    kind: parameter
    dtype: Money
    unit: USD
    source: ESS Program Policy Manual 1410.1906 good cause reasons
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-26
              excerpt: "transportation cost exceeds the allowable $25 reimbursement"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          25

  - name: dependent_child_care_good_cause_minimum_age_years
    kind: parameter
    dtype: Integer
    source: ESS Program Policy Manual 1410.1906 good cause reasons
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-26
              excerpt: "dependent child between the ages of six and 12"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          6

  - name: dependent_child_care_good_cause_maximum_age_years
    kind: parameter
    dtype: Integer
    source: ESS Program Policy Manual 1410.1906 good cause reasons
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-26
              excerpt: "dependent child between the ages of six and 12"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          12

  - name: unreasonable_distance_round_trip_threshold_hours
    kind: parameter
    dtype: Decimal
    source: ESS Program Policy Manual 1410.1906 good cause reasons
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-26
              excerpt: "more than two hours round trip"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          2

  - name: expedited_sfu_certification_period_months
    kind: parameter
    dtype: Count
    source: ESS Program Policy Manual 1410.1906 good cause reasons
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-26
              excerpt: "expedited SFUs certified for one month"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1

  - name: food_stamp_reentry_absence_minimum_months
    kind: parameter
    dtype: Count
    source: ESS Program Policy Manual work registration
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-26
              excerpt: "after an absence of at least one month"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1

  - name: work_registration_renewal_interval_months
    kind: parameter
    dtype: Count
    source: ESS Program Policy Manual work registration
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-26
              excerpt: "when 12 months have passed"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          12

  - name: snap_e_and_t_good_cause_deferral_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.1906 good cause reasons
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-26
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          dcf_can_anticipate_good_cause_reason_continues_for_entire_certification_period
          and (
            person_has_temporary_illness
            or (
              person_presence_required_due_to_illness_of_another_person_in_home
              and other_person_illness_good_cause_documentation_requirement_satisfied
            )
            or sfu_emergency_or_circumstances_beyond_control_prevent_work_requirement_compliance
            or (
              public_or_private_transportation_not_available_consistently_in_area
              and transportation_cost_for_work_requirement_compliance > transportation_reimbursement_allowable_limit
            )
            or (
              person_responsible_for_dependent_child_with_no_adequate_child_care
              and dependent_child_age_in_years >= dependent_child_care_good_cause_minimum_age_years
              and dependent_child_age_in_years <= dependent_child_care_good_cause_maximum_age_years
            )
            or (
              person_resides_unreasonable_distance_from_potential_employment
              and round_trip_hours_to_potential_employment_excluding_child_care_transport > unreasonable_distance_round_trip_threshold_hours
            )
            or (
              sfu_is_expedited
              and sfu_certification_period_months == expedited_sfu_certification_period_months
            )
            or person_resides_in_department_determined_area_without_funds_for_services
          )

  - name: snap_work_registration_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual work registration
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-26
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          application_interview_is_occurring
          or individual_lost_snap_work_registration_exemption
          or (
            individual_reenters_food_stamp_program
            and absence_from_food_stamp_program_months >= food_stamp_reentry_absence_minimum_months
          )
          or months_since_individual_last_registered_for_work >= work_registration_renewal_interval_months

  - name: individual_exempt_from_snap_e_and_t_work_requirements
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.1906 Exemptions from SNAP E&T
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-26
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_age_in_years < snap_e_and_t_minimum_work_age_years
          or person_age_in_years >= snap_e_and_t_senior_age_threshold_years
          or (
            person_age_in_years >= snap_e_and_t_minimum_work_age_years
            and person_age_in_years <= snap_e_and_t_teen_upper_age_years
            and (
              person_is_not_payee_or_head_of_household
              or person_is_attending_school
              or person_is_enrolled_in_employment_and_training_program_at_least_half_time
            )
          )
          or person_physically_or_mentally_unable_to_work
          or person_complies_with_tca_work_requirements
          or (
            person_responsible_for_care_of_dependent_child_for_snap_e_and_t_exemption
            and dependent_child_age_for_snap_e_and_t_care_exemption_in_years < care_exemption_dependent_child_age_limit_years
          )
          or person_responsible_for_care_of_incapacitated_individual
          or person_applies_for_or_receives_unemployment_compensation
          or person_participates_in_drug_or_alcohol_treatment_and_rehabilitation_program_other_than_aa_na_or_sober_living
          or person_monthly_work_hours >= snap_e_and_t_monthly_work_hours_minimum
          or person_monthly_earnings >= snap_e_and_t_monthly_earnings_equivalent_threshold
          or (
            person_is_migrant_or_seasonal_farm_worker_under_agreement_with_employer_or_crew_chief
            and days_until_employment_begins_under_agreement <= migrant_or_seasonal_farm_worker_employment_start_window_days
          )
          or person_is_student_enrolled_at_least_half_time_in_recognized_school
          or person_receives_ssi_or_ssdi
          or person_is_ucb_applicant_or_recipient
          or person_is_refugee_participating_in_orr_employment_and_training_program
