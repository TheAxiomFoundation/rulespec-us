format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-76
  summary: 'When a break occurs for less than six continuous months, the family cap
    continues to apply as if there were no break. 1420.2102 Children Not Subject to
    Family Cap (TCA) A child is not subject to the family cap provision in the following
    situations... The following are not considered Temporary Cash Assistance recipients
    for determining family cap: SSI mothers, and cash assistance received in another
    state. 1420.2200 INDIVIDUAL CONVICTED OF FELONY DRUG TRAFFICKING (TCA) Temporary
    Cash Assistance benefits shall be denied to an individual who has been convicted
    of a felony for drug trafficking... committed after 8/22/1996. This disqualification
    is a lifetime disqualification.'
rules:
- name: family_cap_short_tca_break_limit_months
  kind: parameter
  dtype: Count
  source: Chapter 1400 Technical Requirements Program TCA; family cap break rule
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-76
          excerpt: less than six continuous months
  versions:
  - effective_from: '0001-01-01'
    formula: '6'
- name: family_cap_reapplication_break_minimum_continuous_months
  kind: parameter
  dtype: Count
  source: 1420.2102 Children Not Subject to Family Cap (TCA)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-76
          excerpt: following a break in receipt of TCA of six or more continuous months
  versions:
  - effective_from: '0001-01-01'
    formula: '6'
- name: family_cap_birth_timing_limit_months
  kind: parameter
  dtype: Count
  source: 1420.2102 Children Not Subject to Family Cap (TCA)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-76
          excerpt: Children born ten months or less from the initial date of application
            or ten months or less from a reapplication
  versions:
  - effective_from: '0001-01-01'
    formula: '10'
- name: rape_assault_or_incest_police_report_deadline_days
  kind: parameter
  dtype: Count
  source: 1420.2102 Children Not Subject to Family Cap (TCA)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-76
          excerpt: the mother filed a police report within 30 days of the incident
  versions:
  - effective_from: '0001-01-01'
    formula: '30'
- name: family_cap_continues_after_short_tca_break
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: Chapter 1400 Technical Requirements Program TCA; family cap break rule
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-76
      - path: versions[0].formula
        kind: import
        import:
          target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-76#family_cap_short_tca_break_limit_months
          output: family_cap_short_tca_break_limit_months
          hash: sha256:local
  versions:
  - effective_from: '0001-01-01'
    formula: 'family_had_break_in_receipt_of_tca

      and tca_break_continuous_months < family_cap_short_tca_break_limit_months'
- name: child_not_subject_to_family_cap
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: 1420.2102 Children Not Subject to Family Cap (TCA)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-76
      - path: versions[0].formula
        kind: import
        import:
          target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-76#rape_assault_or_incest_police_report_deadline_days
          output: rape_assault_or_incest_police_report_deadline_days
          hash: sha256:local
      - path: versions[0].formula
        kind: import
        import:
          target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-76#family_cap_birth_timing_limit_months
          output: family_cap_birth_timing_limit_months
          hash: sha256:local
      - path: versions[0].formula
        kind: import
        import:
          target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-76#family_cap_reapplication_break_minimum_continuous_months
          output: family_cap_reapplication_break_minimum_continuous_months
          hash: sha256:local
  versions:
  - effective_from: '0001-01-01'
    formula: "child_is_firstborn_of_minor_receiving_tca_as_dependent_in_minor_parents_assistance_group\n\
      or (\n  child_was_conceived_as_result_of_rape_sexual_assault_or_incest\n  and\
      \ mother_filed_police_report_for_incident\n  and days_between_incident_and_police_report\
      \ <= rape_assault_or_incest_police_report_deadline_days\n)\nor child_parental_custody_legally_transferred\n\
      or child_no_longer_able_to_live_with_parents_due_to_death_of_parents\nor child_no_longer_able_to_live_with_parents_due_to_physician_documented_parent_incapacity\n\
      or child_no_longer_able_to_live_with_parents_due_to_parent_incarceration_and_parent_not_temporarily_absent\n\
      or child_no_longer_able_to_live_with_parents_due_to_extended_parent_institutionalization_and_absence_not_temporary\n\
      or months_between_child_birth_and_initial_tca_application <= family_cap_birth_timing_limit_months\n\
      or (\n  months_between_child_birth_and_tca_reapplication <= family_cap_birth_timing_limit_months\n\
      \  and tca_break_before_reapplication_continuous_months >= family_cap_reapplication_break_minimum_continuous_months\n\
      )"
- name: person_not_counted_as_tca_recipient_for_family_cap_determination
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: 1420.2102 Children Not Subject to Family Cap (TCA)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-76
  versions:
  - effective_from: '0001-01-01'
    formula: 'person_is_ssi_mother

      or person_received_cash_assistance_in_another_state'
- name: individual_lifetime_disqualified_from_tca_for_felony_drug_trafficking
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: 1420.2200 Individual Convicted of Felony Drug Trafficking (TCA)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-76
          excerpt: convicted of a felony for drug trafficking... committed after 8/22/1996
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-76
          excerpt: If a court expunges the felony drug trafficking conviction, the
            individual is not subject to the disqualification.
  versions:
  - effective_from: '0001-01-01'
    formula: 'person_was_convicted_of_felony_drug_trafficking_or_related_conspiracy

      and illegal_behavior_that_led_to_conviction_occurred_after_drug_trafficking_cutoff

      and not person_has_proven_court_expungement_of_felony_drug_trafficking_conviction'
