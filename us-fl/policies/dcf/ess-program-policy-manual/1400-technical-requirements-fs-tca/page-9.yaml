format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-9
  summary: |-
    Individuals may be credited with qualifying quarters from their own work history; spouse quarters during legal marriage unless divorce; unremarried surviving-spouse quarters; and biological or adoptive parent quarters while the individual was under 18 and unmarried, including prebirth quarters. Current and preceding years' quarters may be unavailable for up to seven quarters; missing SSA quarters require income verification. Outside-SFU quarters require manual determination and statements are accepted until SSA verification. Non-U.S. work history and post-1996 federally means-tested public-assistance quarters are not credited. SSA disputes allow food stamps for up to six months.
rules:
  - name: qualifying_quarters_required_for_alien_quarter_computation
    kind: parameter
    dtype: Count
    source: ESS Program Policy Manual 1400 Technical Requirements (FS/TCA), page 9
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-9
              excerpt: "40 qualifying quarters"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          40
  - name: maximum_recent_quarters_potentially_unavailable
    kind: parameter
    dtype: Count
    source: ESS Program Policy Manual 1400 Technical Requirements (FS/TCA), page 9
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-9
              excerpt: "up to seven quarters"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          7
  - name: maximum_food_stamp_continuation_months_during_ssa_research
    kind: parameter
    dtype: Count
    source: ESS Program Policy Manual 1400 Technical Requirements (FS/TCA), page 9
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-9
              excerpt: "up to six months"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          6
  - name: qualifying_quarter_creditable_for_individual
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1400 Technical Requirements (FS/TCA), page 9
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-9
              excerpt: "Individuals may be credited with qualifying quarters from the following sources"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-9
              excerpt: "No work history from countries other than the U.S. or qualifying quarters earned after December 31, 1996"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (
            quarter_from_individual_work_history
            or (
              quarter_earned_by_spouse_during_period_of_legal_marriage
              and
              not legal_marriage_ended_in_divorce
            )
            or (
              individual_is_unremarried_surviving_spouse
              and quarter_earned_during_legal_marriage_to_deceased_spouse
            )
            or (
              quarter_earned_by_biological_or_adoptive_parent
              and (
                quarter_earned_while_individual_under_age_18_and_unmarried
                or quarter_earned_by_parent_prior_to_individual_birth
              )
            )
          )
          and
          not quarter_based_on_work_history_from_country_other_than_united_states
          and
          not quarter_earned_during_post_reform_federally_means_tested_public_assistance_period
  - name: qualifying_quarters_requirement_satisfied
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1400 Technical Requirements (FS/TCA), page 9
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-9
              excerpt: "40 qualifying quarters"
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-9#qualifying_quarters_required_for_alien_quarter_computation
              output: qualifying_quarters_required_for_alien_quarter_computation
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          credited_qualifying_quarters_count >= qualifying_quarters_required_for_alien_quarter_computation
  - name: recent_unavailable_quarters_within_verification_gap
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1400 Technical Requirements (FS/TCA), page 9
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-9
              excerpt: "current and preceding years' quarters of coverage may not be available... up to seven quarters"
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-9#maximum_recent_quarters_potentially_unavailable
              output: maximum_recent_quarters_potentially_unavailable
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          current_or_preceding_years_quarters_unavailable_due_to_tax_return_filing_timing
          and unavailable_recent_quarters_count <= maximum_recent_quarters_potentially_unavailable
  - name: income_verification_source_accepted_for_missing_ssa_quarters
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1400 Technical Requirements (FS/TCA), page 9
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-9
              excerpt: "Sources of verification include: W-2... any other evidence of probative value."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          w_2_or_w_2c_available
          or employer_prepared_earnings_statement_available
          or employer_records_custodian_signed_earnings_statement_available
          or irs_copy_of_employee_tax_return_available
          or timely_filed_self_employed_tax_return_available
          or other_self_employment_evidence_shows_business_and_profit_available
          or unsigned_employer_earnings_statement_available
          or union_records_available
          or individual_copy_of_federal_or_state_tax_return_available
          or state_unemployment_insurance_records_available
          or individual_personal_records_or_statements_available
          or other_evidence_of_probative_value_available
  - name: missing_ssa_quarter_income_verification_satisfied
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1400 Technical Requirements (FS/TCA), page 9
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-9
              excerpt: "must verify income to determine any quarters credited which do not appear in the Social Security Administration's records"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          quarters_credited_do_not_appear_in_social_security_administration_records
          and income_verification_source_accepted_for_missing_ssa_quarters
  - name: manual_quarter_determination_required_for_outside_sfu_individual
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1400 Technical Requirements (FS/TCA), page 9
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-9
              excerpt: "a manual determination must be made for individuals outside the SFU whose quarters may be used"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_outside_standard_filing_unit
          and outside_sfu_individual_quarters_may_be_used
  - name: outside_sfu_statement_accepted_pending_ssa_verification
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1400 Technical Requirements (FS/TCA), page 9
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-9
              excerpt: "statement regarding work history and earnings of individuals outside the SFU is accepted... until... verified by SSA"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_outside_standard_filing_unit
          and outside_sfu_individual_quarters_may_be_used
          and individual_statement_regarding_outside_sfu_work_history_and_earnings_provided
          and
          not social_security_administration_has_verified_outside_sfu_information
  - name: food_stamps_may_continue_during_ssa_dispute_research
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1400 Technical Requirements (FS/TCA), page 9
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-9
              excerpt: "dispute regarding the information received from SSA... continue to receive food stamps for up to six months"
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-9#maximum_food_stamp_continuation_months_during_ssa_research
              output: maximum_food_stamp_continuation_months_during_ssa_research
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          ssa_quarter_information_dispute_exists
          and food_stamp_continuation_month_count_during_ssa_research <= maximum_food_stamp_continuation_months_during_ssa_research
  - name: stepparent_relationship_continues_for_quarter_source
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1400 Technical Requirements (FS/TCA), page 9
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-9
              excerpt: "stepparent's relationship... based on the marital relationship... If the marital relationship ends, other than by death, the stepparent relationship also ends."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          stepparent_relationship_based_on_marital_relationship_to_childs_natural_parent
          and
          not marital_relationship_to_childs_natural_parent_ended_other_than_by_death
