format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-7
  summary: |-
    A child acquires citizenship after birth or through adoption only if the adoption, age, custody/residence, U.S.-citizen-parent custody, qualified-noncitizen-status, same-day, and unmarried conditions are met. Individuals born abroad to a U.S. citizen may be citizens by consular declaration or parentage rules. Citizenship statements of U.S. birth are accepted unless questionable; if questioned, U.S. citizenship must be verified by listed sources.
rules:
  - name: adopted_child_acquires_us_citizenship
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.0102, acquired citizenship after birth or through adoption
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-7
              excerpt: "adopted while under the age of 16... at least two years... under the age of 18... qualified noncitizen status"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-7
              excerpt: "all at the same time... between February 27, 2001 and the present"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-7
              excerpt: "must not have been married at any time on or before the day they meet all the criteria"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_was_adopted_while_under_age_16
          and person_has_been_in_legal_custody_of_and_resided_with_adopting_us_citizen_parents_for_at_least_two_years
          and person_satisfies_under_age_requirement_for_after_birth_citizenship
          and person_is_or_was_residing_in_united_states_in_legal_and_physical_custody_of_us_citizen_parents
          and person_has_qualified_noncitizen_status
          and adoption_citizenship_criteria_met_on_same_day_in_required_period
          and
          not person_was_married_on_or_before_day_adoption_citizenship_criteria_met
  - name: born_abroad_person_considered_us_citizen_by_consular_declaration
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.0102, born abroad to a U.S. citizen
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-7
              excerpt: "born abroad to a U.S. citizen and who make a written declaration of citizenship to the U.S. Consulate"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_was_born_abroad_to_us_citizen
          and person_made_written_declaration_of_citizenship_to_us_consulate
  - name: born_abroad_child_acquires_citizenship_at_birth
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.0102, citizenship acquired at birth for children born abroad
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-7
              excerpt: "parents were not married... one of the parents is a U.S. citizen... legal paternity has been established"
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-7
              excerpt: "both parents are U.S. citizens... one parent resides in the U.S. or a U.S. territory before the birth"
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-7
              excerpt: "one parent is a citizen and the other is a noncitizen at the time of the child's birth"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_was_born_abroad
          and (
            (
              child_was_born_abroad_to_parents_who_were_not_married
              and one_parent_was_us_citizen_at_child_birth
              and legal_paternity_has_been_established
            )
            or (
              child_was_illegitimate_child_born_abroad_to_us_citizen_mother
              and mothers_us_citizenship_and_prior_us_or_territory_residence_established
            )
            or (
              both_parents_were_us_citizens_at_child_birth
              and at_least_one_parent_resided_in_us_or_us_territory_before_child_birth
            )
            or one_parent_was_us_citizen_and_other_parent_was_noncitizen_at_child_birth
          )
  - name: one_citizen_one_noncitizen_parentage_claim_requires_uscis_determination
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.0102, USCIS determination for one-citizen-one-noncitizen parentage claims
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-7
              excerpt: "Individuals claiming citizenship under this provision must be referred to USCIS to obtain a formal determination"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_was_born_abroad
          and one_parent_was_us_citizen_and_other_parent_was_noncitizen_at_child_birth
          and person_claims_citizenship_under_one_citizen_one_noncitizen_parentage_provision
  - name: child_becomes_us_citizen_after_birth
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.0102, children become U.S. citizens after birth
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-7
              excerpt: "one parent is a U.S. citizen by birth or naturalization... under age 18... legal and physical custody... qualified noncitizen status"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          one_parent_is_us_citizen_by_birth_or_naturalization
          and child_satisfies_under_age_requirement_for_after_birth_citizenship
          and child_is_or_was_residing_in_united_states_in_legal_and_physical_custody_of_us_citizen_parent
          and child_has_qualified_noncitizen_status
  - name: us_birth_statement_accepted_without_verification
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.0103 Verification Sources for U.S. Citizens (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-7
              excerpt: "verbal or written statement of date and place of birth must be accepted if they were born in the United States... unless... questionable"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_claims_us_citizenship
          and person_verbal_or_written_statement_of_date_and_place_of_birth_shows_us_birth
          and
          not date_or_place_of_birth_information_is_questionable
  - name: us_citizenship_verification_required_for_questionable_information
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.0103 Verification Sources for U.S. Citizens (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-7
              excerpt: "If questioned, U.S. citizenship must be verified."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_claims_us_citizenship
          and us_citizenship_information_is_questionable
  - name: us_citizenship_verification_source_available
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.0103 Verification Sources for U.S. Citizens (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-7
              excerpt: "Sources of verification include... Birth or hospital certificates... Form I-197... SSA records... U.S. passport... Certificate"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-7
              excerpt: "except for voided Puerto Rican birth certificates after September 30, 2010"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (
            birth_or_hospital_certificate_shows_us_birth
            and
            not verification_source_is_voided_puerto_rican_birth_certificate_after_cutoff
          )
          or form_i_197_us_citizen_id_card_present
          or religious_document_recorded_in_us_shortly_after_birth_present
          or ssa_records_show_us_citizenship
          or us_passport_present
          or certificate_of_citizenship_or_naturalization_present
