format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-42
  summary: |-
    "The noncitizen, the noncitizen's child or the noncitizen child's parent has been abused in the U.S." The battered noncitizen, child, or parent no longer lives with the abuser, and there is a substantial connection between the battery or extreme cruelty and the need for public assistance. Proof includes statements, USCIS petitions or orders, restraining orders or convictions, charges leading to conviction, or credible evidence. The eligibility specialist cannot delay authorization while awaiting verification, must make a Benefit Recovery referral if criteria later fail, and must verify immigration status of all noncitizens applying for or receiving TCA through USCIS.
rules:
  - name: tca_domestic_violence_cancellation_or_suspension_application_path_met
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0113 Battered (TCA), requirement 1.d
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-42
              excerpt: "an application for cancellation of removal or suspension of deportation filed as a victim of domestic violence"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_noncitizen
          and person_has_cancellation_or_suspension_application_as_domestic_violence_victim

  - name: tca_battered_status_abuse_requirement_met
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0113 Battered (TCA), requirement 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-42
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_was_battered_or_subject_to_extreme_cruelty_in_us_by_spouse_parent_or_consented_household_family_member
          or persons_child_was_battered_or_subject_to_extreme_cruelty_in_us_by_spouse_parent_or_consented_household_family_member_and_person_did_not_actively_participate
          or parent_of_noncitizen_child_was_battered_or_subject_to_extreme_cruelty_in_us_by_spouse_or_consented_household_family_member

  - name: tca_battered_status_separate_household_and_public_assistance_connection_requirement_met
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0113 Battered (TCA), requirements 3-4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-42
              excerpt: "no longer lives in the same household as the abuser(s) ... substantial connection"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          battered_noncitizen_child_or_parent_no_longer_lives_in_same_household_as_abuser
          and battery_or_extreme_cruelty_has_substantial_connection_to_need_for_public_assistance

  - name: tca_battered_status_proof_supported_by_page_42_evidence
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0113 Battered (TCA), proof of battered status
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-42
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_has_individual_statement_no_longer_lives_with_abuser_and_direct_connection_to_public_assistance_need
          or person_has_approved_petition_or_order_granted_by_uscis
          or person_has_restraining_order_or_criminal_conviction_against_abuser
          or charges_brought_about_lead_to_conviction_of_abuser
          or person_has_credible_evidence_of_battery_or_extreme_cruelty

  - name: tca_authorization_not_delayed_pending_battery_or_extreme_cruelty_verification
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0113 Battered (TCA), pending verification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-42
              excerpt: "cannot delay authorization of an application or request for additional assistance while awaiting verification"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_has_application_or_request_for_additional_assistance_pending
          and verification_to_establish_battery_or_extreme_cruelty_is_pending

  - name: tca_benefit_recovery_referral_required_after_failed_battered_criteria
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0113 Battered (TCA), later discovery
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-42
              excerpt: "If it is later discovered that the noncitizen does not meet these criteria, a Benefit Recovery referral must be made."
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-42#tca_authorization_not_delayed_pending_battery_or_extreme_cruelty_verification
              output: tca_authorization_not_delayed_pending_battery_or_extreme_cruelty_verification
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          tca_authorization_not_delayed_pending_battery_or_extreme_cruelty_verification
          and later_discovered_person_does_not_meet_battery_or_extreme_cruelty_criteria

  - name: tca_noncitizen_immigration_status_verification_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0114 Verification Requirements for Noncitizens (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-42
              excerpt: "verify the immigration status of all noncitizens applying for or receiving TCA through the US Citizenship and Immigration Service"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_noncitizen
          and person_applies_for_or_receives_tca

  - name: tca_battered_criteria_determination_not_required_for_other_qualified_status
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0113 Battered (TCA), note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-42
              excerpt: "does not need to determine if the battered noncitizen meets the three criteria ... unless it is to the noncitizens advantage"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_noncitizen
          and person_meets_other_qualified_noncitizen_status
          and not battered_status_criteria_determination_is_to_noncitizens_advantage
