format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-52
  summary: |-
    Biological parents are considered parents except as noted in passage 1420.0705. Common-law marriages valid under the stated Florida cutoff or another jurisdiction's law make the children legitimate and the mother and father parents. Paternity may be established by court order, juvenile-court acknowledgment, another state, Florida birth-certificate surname placement by written request, or a signed notarized perjury statement. Legal adoption supersedes other parental relationships, with a stepparent-adoption exception preserving relationships to a deceased parent's relatives. Non-custodial-parent contact is required when an address is known at application or complete eligibility review, subject to passage 1420.0711 exceptions.
rules:
  - name: parent_by_established_paternity_for_tca
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0708
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-52
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          paternity_established_by_civil_court_order_declaring_natural_father_legal_father
          or paternity_acknowledged_in_writing_by_natural_father_before_juvenile_court_judge
          or paternity_established_in_another_state
          or father_voluntarily_placed_surname_on_florida_birth_certificate_after_both_parents_written_request
          or father_signed_notarized_statement_under_penalty_of_perjury_and_fraud_prosecution_that_he_is_childs_father
  - name: child_legitimate_by_valid_common_law_marriage_for_tca
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0707
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-52
              excerpt: "occurred in Florida prior to January 1, 1968"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          child_was_born_to_father_and_mother_who_had_common_law_marriage
          and (
            (parents_common_law_marriage_occurred_in_florida and common_law_marriage_occurred_before_florida_common_law_cutoff_date)
            or parents_common_law_marriage_occurred_in_another_state_or_foreign_country_under_that_jurisdictions_laws
          )
  - name: parent_by_valid_common_law_marriage_for_tca
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0707
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-52
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_mother_or_father_married_through_common_law_marriage
          and (
            (parents_common_law_marriage_occurred_in_florida and common_law_marriage_occurred_before_florida_common_law_cutoff_date)
            or parents_common_law_marriage_occurred_in_another_state_or_foreign_country_under_that_jurisdictions_laws
          )
  - name: nonjudicial_paternity_determination_required_to_establish_deprivation
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0706
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-52
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          childs_mother_resides_in_home
          and childs_natural_father_resides_in_home
  - name: other_parental_relationships_superseded_by_legal_adoption
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0709
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-52
    versions:
      - effective_from: '0001-01-01'
        formula: |-
