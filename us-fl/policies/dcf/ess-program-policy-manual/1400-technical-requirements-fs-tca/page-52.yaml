  - name: deceased_parent_relatives_relationship_remains_intact_after_stepparent_adoption
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0709
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-52
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          childs_parent_has_died
          and child_was_adopted_by_stepparent
  - name: noncustodial_parent_contact_trigger_condition_before_passage_exceptions
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0710
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-52
              excerpt: "when any address (last known or current) is known at the time of application"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (person_is_noncustodial_parent_legal_or_nonlegal or person_is_noncustodial_parent_of_unborn_child)
          and noncustodial_parent_has_last_known_or_current_address
          and (application_or_child_added_is_at_issue or complete_eligibility_review_is_occurring)
