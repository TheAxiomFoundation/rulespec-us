format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-11
  summary: |-
    An unmarried child is the biological or legally adopted dependent child of an honorably discharged veteran or active duty U.S. Armed Forces member, not married, and under 18 or under 22 if a full-time student. Un-remarried noncitizen surviving spouses may also be eligible under stated veteran or active-duty death and marriage conditions. Amerasians described in Section 584 and asylees granted asylum under Section 208 are eligible on the citizenship factor and are not subject to the five-year ban.
rules:
  - name: unmarried_child_general_age_limit_years
    kind: parameter
    dtype: Count
    source: Chapter 1400 Technical Requirements Program FS, unmarried child definition
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-11
              excerpt: "under the age of 18"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          18

  - name: unmarried_child_student_age_limit_years
    kind: parameter
    dtype: Count
    source: Chapter 1400 Technical Requirements Program FS, unmarried child definition
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-11
              excerpt: "under the age of 22 if a full-time student"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          22

  - name: post_discharge_marriage_window_years_for_surviving_spouse
    kind: parameter
    dtype: Count
    source: Section 1304 marriage definition in Chapter 1400 Technical Requirements Program FS
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-11
              excerpt: "within 15 years after discharge"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          15

  - name: minimum_marriage_duration_years_for_surviving_spouse
    kind: parameter
    dtype: Count
    source: Section 1304 marriage definition in Chapter 1400 Technical Requirements Program FS
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-11
              excerpt: "married for a period of at least one year"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1

  - name: unmarried_child_of_veteran_or_active_duty_member
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Chapter 1400 Technical Requirements Program FS, unmarried child definition
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-11
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-11#unmarried_child_general_age_limit_years
              output: unmarried_child_general_age_limit_years
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-11#unmarried_child_student_age_limit_years
              output: unmarried_child_student_age_limit_years
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_biological_or_legally_adopted_dependent_child_of_honorably_discharged_veteran_or_active_duty_us_armed_forces_member
          and person_is_not_married
          and (person_age_in_years < unmarried_child_general_age_limit_years or (person_is_full_time_student and person_age_in_years < unmarried_child_student_age_limit_years))

  - name: marriage_fulfills_section_1304_for_surviving_spouse
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Section 1304 marriage definition in Chapter 1400 Technical Requirements Program FS
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-11
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-11#post_discharge_marriage_window_years_for_surviving_spouse
              output: post_discharge_marriage_window_years_for_surviving_spouse
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-11#minimum_marriage_duration_years_for_surviving_spouse
              output: minimum_marriage_duration_years_for_surviving_spouse
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          ((veteran_or_active_duty_personnel_died_while_on_active_duty or years_between_relevant_discharge_and_marriage <= post_discharge_marriage_window_years_for_surviving_spouse)
          and years_married_to_veteran_or_active_duty_personnel >= minimum_marriage_duration_years_for_surviving_spouse)
          or child_was_born_during_relationship_with_veteran_or_active_duty_personnel_during_or_before_marriage

  - name: unremarried_noncitizen_surviving_spouse_may_be_eligible
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Chapter 1400 Technical Requirements Program FS, un-remarried noncitizen surviving spouse provision
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-11
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-11#marriage_fulfills_section_1304_for_surviving_spouse
              output: marriage_fulfills_section_1304_for_surviving_spouse
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_noncitizen_surviving_spouse
          and person_has_not_remarried
          and (veteran_spouse_was_filipino_described_in_section_107_title_38 or (veteran_or_active_duty_personnel_died_while_on_active_duty and marriage_fulfills_section_1304_for_surviving_spouse))

  - name: amerasian_food_stamp_citizenship_factor_eligible
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 1410.0106.02 Amerasians (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-11
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_was_born_in_vietnam
          and person_was_fathered_by_us_citizen
          and person_was_admitted_to_us_as_immigrant_under_section_584_foreign_operations_appropriations_act_1988

  - name: asylee_granted_asylum_status
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 1410.0107 Asylees (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-11
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_noncitizen
          and person_was_granted_asylum_under_section_208

  - name: person_not_subject_to_five_year_ban_under_page_11
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Chapter 1400 Technical Requirements Program FS, five-year ban notes on page 11
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-11
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-11#unmarried_child_of_veteran_or_active_duty_member
              output: unmarried_child_of_veteran_or_active_duty_member
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-11#unremarried_noncitizen_surviving_spouse_may_be_eligible
              output: unremarried_noncitizen_surviving_spouse_may_be_eligible
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-11#amerasian_food_stamp_citizenship_factor_eligible
              output: amerasian_food_stamp_citizenship_factor_eligible
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-11#asylee_granted_asylum_status
              output: asylee_granted_asylum_status
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          unmarried_child_of_veteran_or_active_duty_member
          or unremarried_noncitizen_surviving_spouse_may_be_eligible
          or amerasian_food_stamp_citizenship_factor_eligible
          or asylee_granted_asylum_status
