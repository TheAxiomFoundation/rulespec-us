format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-58
  summary: |-
    1420.0802 Definition of Parent/Specified Relative (TCA): The individual with whom the child resides must be related to the child as specified, including mother, legal or biological father, blood relatives within the fifth degree, step relatives, adoptive relatives, and legal spouses of those groups. When both a legal and biological father exist, the biological father is a specified relative rather than a parent. 1420.0803 Verifying Parenthood/Specified Relationship (TCA): verbal statements are sufficient unless questioned for mother, legal father, maternal relatives and relatives of the legal father; natural biological fathers or relatives require a recorded nonjudicial paternal determination, substantiated by any two listed sources.
rules:
  - name: blood_kinship_max_degree_for_tca_specified_relative
    kind: parameter
    dtype: Count
    source: 1420.0802 Definition of Parent/Specified Relative (TCA), blood relatives group
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-58
              excerpt: "within the fifth degree of kinship"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          5

  - name: paternal_relationship_required_verification_source_count
    kind: parameter
    dtype: Count
    source: 1420.0803 Verifying Parenthood/Specified Relationship (TCA), nonjudicial paternal determination
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-58
              excerpt: "Any two of the following sources may be used"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          2

  - name: tca_parent
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 1420.0802 Definition of Parent/Specified Relative (TCA), parent group
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-58
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_is_childs_mother_with_legal_ties_not_severed_by_adoption
          or individual_is_childs_legal_father
          or individual_is_childs_biological_father_and_no_separate_legal_father_exists

  - name: blood_kinship_degree_within_tca_specified_relative_limit
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 1420.0802 Definition of Parent/Specified Relative (TCA), blood relatives group
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-58
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-58#blood_kinship_max_degree_for_tca_specified_relative
              output: blood_kinship_max_degree_for_tca_specified_relative
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_blood_kinship_degree_to_child <= blood_kinship_max_degree_for_tca_specified_relative

  - name: tca_specified_relative
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 1420.0802 Definition of Parent/Specified Relative (TCA), specified relative groups and notes
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-58
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-58#blood_kinship_degree_within_tca_specified_relative_limit
              output: blood_kinship_degree_within_tca_specified_relative_limit
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_is_childs_biological_father_when_legal_father_also_exists
          or individual_is_biological_parent_or_biological_relative_after_childs_adoption
          or (individual_is_blood_relative_in_source_list_including_half_blood_and_not_second_cousin and blood_kinship_degree_within_tca_specified_relative_limit)
          or individual_is_childs_stepfather
          or individual_is_childs_stepmother
          or individual_is_childs_stepbrother
          or individual_is_childs_stepsister
          or individual_legally_adopted_child_or_childs_parent
          or individual_is_natural_or_legally_adopted_child_or_other_relative_of_adoptive_parent
          or individual_is_legal_spouse_or_former_spouse_by_death_or_divorce_of_tca_parent_or_specified_relative

  - name: parent_or_specified_relative
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 1420.0802 Definition of Parent/Specified Relative (TCA), residency and relationship requirement
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-58
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-58#tca_parent
              output: tca_parent
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-58#tca_specified_relative
              output: tca_specified_relative
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          child_resides_with_individual
          and (tca_parent or tca_specified_relative)

  - name: relationship_statement_sufficient_unless_questioned
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 1420.0803 Verifying Parenthood/Specified Relationship (TCA), verbal statement rule
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-58
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_is_mother_legal_father_maternal_relative_or_relative_of_legal_father
          and individual_provided_sufficient_information_to_explain_exact_relationship_to_child
          and not relationship_statement_is_questioned

  - name: nonjudicial_paternal_relationship_substantiated
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 1420.0803 Verifying Parenthood/Specified Relationship (TCA), natural biological father or relatives
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-58
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-58#paternal_relationship_required_verification_source_count
              output: paternal_relationship_required_verification_source_count
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_is_natural_biological_father_or_relative_of_natural_biological_father
          and eligibility_specialist_made_and_recorded_nonjudicial_paternal_relationship_determination
          and acceptable_paternal_relationship_source_count_from_birth_certificates_statements_or_other_documentation >= paternal_relationship_required_verification_source_count
