          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-61
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-61#pregnancy_stage_is_third_trimester
              output: pregnancy_stage_is_third_trimester
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          pregnant_woman_has_no_other_children_for_whom_assistance_is_requested
