format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-61
  summary: |-
    A pregnant woman may be eligible for TCA due to pregnancy if she has no other children for whom assistance is requested, the unborn is deprived, and she is in the last month of pregnancy or in the third trimester and unable to participate in work activities. The third trimester begins the seventh month. Pregnancy verification by the woman's statement is sufficient unless questionable; questionable cases require a provider statement confirming pregnancy and anticipated delivery date. Third-trimester work inability requires a licensed physician's written statement. Fathers of unborn children living in the home with no other children may not receive TCA under the two-parent policy until after birth. Certain legacy VA pension recipients may elect a lower pension to retain TCA eligibility.
rules:
  - name: third_trimester_beginning_month_of_pregnancy
    kind: parameter
    dtype: Count
    source: 1420.1001 Pregnancy Policy (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-61
              excerpt: "The third trimester begins the seventh month."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          7

  - name: pregnancy_stage_is_third_trimester
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 1420.1001 Pregnancy Policy (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-61
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-61#third_trimester_beginning_month_of_pregnancy
              output: third_trimester_beginning_month_of_pregnancy
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_pregnancy_month_number >= third_trimester_beginning_month_of_pregnancy

  - name: pregnant_woman_may_be_eligible_for_tca_due_to_pregnancy
