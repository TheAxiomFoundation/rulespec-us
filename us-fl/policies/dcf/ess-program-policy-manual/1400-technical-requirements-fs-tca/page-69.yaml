format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-69
  summary: |-
    1420.1906.13: an individual determined by the RWB or contract provider to be unable to comply with work requirements because compliance would probably prevent escape from domestic violence is exempt, but must comply with an alternative plan. A domestic-violence-related mental or physical impairment may also support a time-limited work activity exemption. 1420.1912: non-exempt individuals who fail required work activities without good cause are subject to penalties. 1420.1913: good cause exists when circumstances beyond the individual's control prevent participation; listed reasons include child care, verified temporary medical incapacity, pending SSI or SSDI application, and domestic violence.
rules:
  - name: domestic_violence_escape_exempts_tca_work_requirements
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.1906.13
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-69
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          rwb_or_provider_determined_compliance_would_probably_prevent_escape_from_domestic_violence
  - name: domestic_violence_impairment_may_exempt_tca_work_activities
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.1906.13
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-69
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          rwb_or_provider_determined_unable_to_comply_due_to_mental_or_physical_impairment_related_to_past_domestic_violence
          and rwb_career_manager_determined_domestic_violence_impairment_exemption_period_currently_applies
  - name: alternative_plan_required_for_domestic_violence_work_exemption
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.1906.13
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-69
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          domestic_violence_escape_exempts_tca_work_requirements
          or domestic_violence_impairment_may_exempt_tca_work_activities
  - name: domestic_violence_alternative_plan_noncompliance_triggers_work_penalties
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.1906.13
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-69
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          alternative_plan_required_for_domestic_violence_work_exemption
          and individual_failed_to_comply_with_alternative_plan
  - name: good_cause_for_tca_noncompliance
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.1913
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-69
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          circumstances_beyond_individual_control_prevent_work_activity_participation
          and (
            child_care_good_cause_reason_established
            or temporary_medical_incapacity_verified_by_licensed_physician
            or pending_ssi_or_ssdi_application_verified
            or domestic_violence_escape_exempts_tca_work_requirements
          )
  - name: tca_noncompliance_penalty_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.1912
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-69
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          individual_is_not_exempt_from_tca_work_requirements
          and individual_failed_to_comply_with_required_work_activities
          and not good_cause_for_tca_noncompliance
