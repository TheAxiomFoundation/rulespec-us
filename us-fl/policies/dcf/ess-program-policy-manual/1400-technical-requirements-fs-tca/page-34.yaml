format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-34
  summary: |-
    1410.2501 Fleeing Felon: all four criteria must be present and verified: felony warrant, awareness or reasonable expectation of warrant, action to avoid arrest or jail, and law enforcement actively seeking by informing the Department it intends to enforce the outstanding felony warrant. 1410.2502 Probation or Parole Violator: violation of probation or parole condition and law enforcement actively seeking by informing the Department it intends to enforce an outstanding misdemeanor or felony warrant for that violation. 1410.2700: certain adult felony convictions for listed crimes disqualify an individual from food stamps when the individual is not in compliance with sentence, probation, or parole and committed the crime after February 7, 2014; questionable compliance statements require pending the household for proof when compliance cannot be verified.
rules:
  - name: fleeing_felon_food_stamp_ineligible
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.2501
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-34
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_has_felony_warrant
          and person_is_aware_or_should_reasonably_expect_felony_warrant_has_or_would_have_been_issued
          and person_has_taken_action_to_avoid_arrest_or_jail
          and law_enforcement_informed_department_it_intends_to_enforce_outstanding_felony_warrant
  - name: probation_or_parole_violator_food_stamp_ineligible
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.2502
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-34
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_violated_condition_of_probation_or_parole
          and law_enforcement_informed_department_it_intends_to_enforce_outstanding_misdemeanor_or_felony_warrant_for_probation_or_parole_violation
  - name: listed_felony_crime_conviction_for_food_stamp_disqualification
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.2700(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-34
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_felony_conviction_was_for_aggravated_sexual_abuse
          or person_felony_conviction_was_for_murder
          or person_felony_conviction_was_for_sexual_exploitation_and_related_abuse_of_children
          or person_felony_conviction_was_for_offense_involving_sexual_assault
          or person_felony_conviction_was_for_state_law_offense_similar_to_listed_felony_crime
  - name: certain_convicted_felon_food_stamp_disqualified
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.2700
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-34
              excerpt: "after February 7, 2014"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_convicted_as_adult_resulting_in_federal_or_state_felony
          and listed_felony_crime_conviction_for_food_stamp_disqualification
          and person_not_in_compliance_with_terms_of_sentence_probation_or_parole
          and person_committed_listed_crime_after_disqualification_cutoff_date
  - name: individual_statement_sufficient_for_sentence_compliance
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.2700
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-34
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_provides_statement_of_sentence_compliance
          and
          not person_statement_of_sentence_compliance_is_questionable
  - name: household_pended_for_sentence_compliance_proof_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.2700
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-34
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_member_statement_of_sentence_compliance_is_questionable
          and eligibility_worker_cannot_verify_household_member_sentence_compliance
