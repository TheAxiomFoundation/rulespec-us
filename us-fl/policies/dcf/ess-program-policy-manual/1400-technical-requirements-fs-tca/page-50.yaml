format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-50
  summary: |-
    1420.0603 Verification (TCA): The teen parent's statement is suitable verification for living in one of the required living arrangements unless questionable. The teen parent who has good cause for maintaining a separate living arrangement must provide verification of where the teen parent resides and why the teen parent is not living with an adult. School Attendance - The teen parent's statement is suitable verification for school attendance unless questionable. If the teen parent is not in school but expresses an interest in attending school, the assistance group must be given a 10 day pending period to verify registration and attendance. 1420.0700 Deprivation (TCA): Each child in the assistance group must be deprived based on death, only one legal parent, continued absence, incapacity, or unemployment/underemployment of parent(s).
rules:
  - name: school_registration_attendance_pending_period_days
    kind: parameter
    dtype: Count
    source: ESS Program Policy Manual 1420.0603 Verification (TCA), School Attendance note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-50
              excerpt: 10 day pending period
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10

  - name: required_living_arrangement_statement_suitable_verification
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0603 Verification (TCA), Living Arrangements
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-50
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          teen_parent_statement_offered_to_verify_required_living_arrangement
          and not teen_parent_living_arrangement_statement_questionable

  - name: separate_living_arrangement_verification_requirement_satisfied
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0603 Verification (TCA), Living Arrangements
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-50
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not teen_parent_has_good_cause_for_separate_living_arrangement
          or (
            teen_parent_verification_of_residence_provided
            and teen_parent_verification_of_reason_not_living_with_adult_provided
          )

  - name: school_attendance_statement_suitable_verification
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0603 Verification (TCA), School Attendance
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-50
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          teen_parent_statement_offered_to_verify_school_attendance
          and not teen_parent_school_attendance_statement_questionable

  - name: school_registration_attendance_pending_period_days_for_interested_teen_parent
    kind: derived
    entity: Person
    dtype: Count
    period: Month
    source: ESS Program Policy Manual 1420.0603 Verification (TCA), School Attendance note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-50
              excerpt: If the teen parent is not in school but expresses an interest in attending school
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if teen_parent_is_not_in_school and teen_parent_expresses_interest_in_attending_school: school_registration_attendance_pending_period_days else: 0

  - name: teen_parent_tca_payee_or_assistance_group_ineligible_due_to_school_attendance
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0603 Verification (TCA), School Attendance note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-50
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          teen_parent_is_not_in_school
          and (
            not teen_parent_expresses_interest_in_attending_school
            or teen_parent_states_no_intent_to_attend_school
            or teen_parent_fails_to_verify_school_attendance
          )

  - name: child_deprived_of_parental_support_or_care_for_tca
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0700 Deprivation (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-50
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          one_or_both_parents_deceased
          or child_has_only_one_legal_parent
          or one_or_both_parents_continued_absence
          or one_or_both_parents_incapacitated
          or parents_unemployed_or_underemployed

  - name: shelter_obligation_may_be_included_for_good_cause_supervised_setting_payment
    kind: derived
    entity: TanfUnit
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0602, teen parent good cause supervised setting payment
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-50
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          eligibility_specialist_determines_good_cause_for_teen_parent_not_residing_with_parent_caretaker_relative_or_legal_guardian
          and teen_parent_resides_in_adult_supervised_setting

  - name: protective_payee_required_for_good_cause_supervised_setting_payment
    kind: derived
    entity: TanfUnit
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0602, teen parent good cause supervised setting payment
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-50
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          eligibility_specialist_determines_good_cause_for_teen_parent_not_residing_with_parent_caretaker_relative_or_legal_guardian
          and teen_parent_resides_in_adult_supervised_setting

  - name: assistance_group_must_be_closed_or_denied_for_teen_parent_adult_living_rule
    kind: derived
    entity: TanfUnit
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0602 note, teen parent not living with adult and no exception
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-50
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          teen_parent_is_not_living_with_adult
          and eligibility_specialist_and_supervisor_determine_teen_parent_does_not_meet_adult_living_rule_exception
