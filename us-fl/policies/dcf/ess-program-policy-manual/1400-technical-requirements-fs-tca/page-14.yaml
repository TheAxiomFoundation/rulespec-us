format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-14
  summary: |-
    Battered noncitizens that have not been in a battered status for five years or more must be in another qualified status to be eligible for food stamps. Sponsored noncitizens who meet battered noncitizen status are exempt from sponsor deeming for a period not to exceed a total of 12 months, and the battered status must be reviewed every 12 months. Noncitizens claiming battered status must show an approved or pending prima facie petition, qualifying abuse in the U.S., no longer living with the abuser, and a substantial connection between the abuse and need for public assistance. Battered children under age 18 are not subject to the five-year ban.
rules:
  - name: battered_status_minimum_years_for_food_stamp_eligibility
    kind: parameter
    dtype: Count
    source: ESS Program Policy Manual 1410.0113 Battered (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-14
              excerpt: "not been in a battered status for five years or more"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          5

  - name: sponsored_battered_noncitizen_deeming_exemption_limit_months
    kind: parameter
    dtype: Count
    source: ESS Program Policy Manual 1410.0113 Battered (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-14
              excerpt: "not to exceed a total of 12 months"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          12

  - name: battered_status_review_interval_months
    kind: parameter
    dtype: Count
    source: ESS Program Policy Manual 1410.0113 Battered (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-14
              excerpt: "reviewed every 12 months"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          12

  - name: battered_child_five_year_ban_exemption_age_limit_years
    kind: parameter
    dtype: Count
    source: ESS Program Policy Manual 1410.0113 Battered (FS), note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-14
              excerpt: "Battered children under the age of 18"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          18

  - name: battered_status_prima_facie_petition_requirement_met
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.0113 Battered (FS), requirement 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-14
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_has_form_i130_filed_by_spouse_or_childs_parent
          or person_has_form_i130_petition_as_widower_of_us_citizen
          or person_has_approved_vawa_self_petition
          or person_has_cancellation_or_suspension_application_as_domestic_violence_victim

  - name: battered_status_abuse_requirement_met
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.0113 Battered (FS), requirement 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-14
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_was_battered_or_subject_to_extreme_cruelty_in_us_by_spouse_parent_or_consented_household_family_member
          or persons_child_was_battered_or_subject_to_extreme_cruelty_in_us_by_spouse_parent_or_consented_household_family_member_and_person_did_not_actively_participate
          or parent_of_noncitizen_child_was_battered_or_subject_to_extreme_cruelty_in_us_by_spouse_or_consented_household_family_member

  - name: battered_noncitizen_status
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.0113 Battered (FS), requirements 1-4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-14
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_noncitizen
          and battered_status_prima_facie_petition_requirement_met
          and battered_status_abuse_requirement_met
          and battered_noncitizen_child_or_parent_no_longer_lives_in_same_household_as_abuser
          and battery_or_extreme_cruelty_has_substantial_connection_to_need_for_public_assistance

  - name: battered_child_under_five_year_ban_age_limit
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.0113 Battered (FS), note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-14
              excerpt: "Battered children under the age of 18 are not subject to the five-year ban."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_battered_child
          and person_age_in_years < battered_child_five_year_ban_exemption_age_limit_years

  - name: battered_noncitizen_not_subject_to_five_year_ban
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.0113 Battered (FS), note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-14
              excerpt: "subject to the five-year ban if entry date is after 8/22/96. Battered children under the age of 18 are not subject"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          battered_noncitizen_status
          and (battered_child_under_five_year_ban_age_limit or not person_entry_date_after_prwora_cutoff)

  - name: battered_noncitizen_food_stamp_citizenship_factor_eligible
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.0113 Battered (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-14
              excerpt: "must be in another qualified status to be eligible for food stamps"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          battered_noncitizen_status
          and (person_years_in_battered_status >= battered_status_minimum_years_for_food_stamp_eligibility or person_is_in_another_qualified_noncitizen_status)

  - name: sponsored_battered_noncitizen_within_sponsor_deeming_exemption_total_limit
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.0113 Battered (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-14
              excerpt: "exempt from sponsored noncitizen deeming for a period not to exceed a total of 12 months"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_sponsored_noncitizen
          and battered_noncitizen_status
          and person_months_of_sponsored_battered_deeming_exemption_used < sponsored_battered_noncitizen_deeming_exemption_limit_months

  - name: battered_status_review_current_for_sponsor_deeming_exemption
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.0113 Battered (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-14
              excerpt: "must be reviewed every 12 months so that the noncitizen may continue to be exempt"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          battered_noncitizen_status
          and person_months_since_last_battered_status_review < battered_status_review_interval_months

  - name: sponsored_battered_noncitizen_sponsor_deeming_exemption_currently_available
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.0113 Battered (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-14
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          sponsored_battered_noncitizen_within_sponsor_deeming_exemption_total_limit
          and battered_status_review_current_for_sponsor_deeming_exemption
