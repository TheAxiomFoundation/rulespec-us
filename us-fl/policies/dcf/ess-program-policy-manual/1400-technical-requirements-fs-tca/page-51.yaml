format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-51
  summary: |-
    1420.0702 defines a biological father as an alleged biological father for whom the Department has made a non-judicial paternity determination. If a child has a legal father and the mother alleges another biological father, that alleged father cannot be considered the child's parent until paternity is legally established, and his presence does not affect deprivation; he may still be a specified relative after non-judicial paternity determination. 1420.0703 defines legal father through marriage at conception or birth, post-birth marriage by a natural biological father when no legal father existed, legal establishment of paternity, birth-certificate surname amendment procedures, or adoption. 1420.0704-1420.0705 list parent-creating circumstances and define ceremonial marriage.
rules:
  - name: biological_father
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0702, Definition of Biological Father (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-51
              excerpt: "An individual is the biological father when he or the child's mother alleges that he is the biological father, and the Department has made a non-judicial determination of paternity."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (individual_alleges_he_is_biological_father or childs_mother_alleges_individual_is_biological_father)
          and department_has_made_nonjudicial_determination_of_paternity

  - name: legal_father
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0703, Definition of a Legal Father (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-51
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_was_married_to_mother_at_child_conception_or_birth
          or individual_is_natural_biological_father_who_married_mother_after_child_birth_when_no_legal_father_existed
          or paternity_of_this_individual_legally_established
          or child_surname_birth_certificate_amendment_procedures_conducted
          or individual_is_adoptive_father

  - name: alleged_biological_father_blocked_from_parent_for_deprivation
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0702, legal father and alleged biological father rule
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-51
              excerpt: "the alleged biological father cannot be considered the child's parent until paternity of the alleged biological father is legally established"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          child_has_legal_father
          and childs_mother_alleges_this_individual_other_than_legal_father_is_biological_father
          and not paternity_of_this_individual_legally_established

  - name: alleged_biological_father_presence_does_not_affect_deprivation
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0702, deprivation effect of alleged biological father's presence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-51
              excerpt: "the alleged biological father's presence in the home does not affect deprivation"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          alleged_biological_father_blocked_from_parent_for_deprivation

  - name: alleged_biological_father_specified_relative
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0702 note on specified relative status
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-51
              excerpt: "the biological father can be considered a specified relative if the eligibility specialist makes a non-judicial determination of paternity"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          alleged_biological_father_blocked_from_parent_for_deprivation
          and department_has_made_nonjudicial_determination_of_paternity

  - name: biological_father_may_be_considered_parent_for_deprivation
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0702, biological father parent status for deprivation
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-51
              excerpt: "cannot be considered the child's parent until paternity of the alleged biological father is legally established"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          biological_father
          and not alleged_biological_father_blocked_from_parent_for_deprivation

  - name: ceremonial_marriage
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0705, Ceremonial Marriage (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-51
              excerpt: "A ceremonial marriage is a wedding ceremony in which a marriage license is obtained."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          marriage_license_obtained
          and wedding_ceremony_performed_by_religious_official_judge_notary_or_other_authorized_individual

  - name: out_of_wedlock_child_parent_after_mother_and_alleged_father_marry
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0705, post-birth marriage of mother and alleged father
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-51
              excerpt: "If the mother of a child born out of wedlock and the alleged father marry each other at any time after the child's birth, they become the child's parents."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          child_was_born_out_of_wedlock
          and childs_mother_and_alleged_father_married_each_other_after_child_birth
          and ceremonial_marriage

  - name: parent
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0704, When an Individual Becomes a Parent (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-51
              excerpt: "An individual becomes a parent under the following circumstances: ceremonial marriage, common-law marriage, being a biological parent, establishing paternity, or adoption."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_is_natural_or_biological_mother_of_child
          or individual_is_adoptive_mother_or_father_of_child
          or legal_father
          or biological_father_may_be_considered_parent_for_deprivation
          or out_of_wedlock_child_parent_after_mother_and_alleged_father_marry
          or individual_became_parent_by_common_law_marriage
          or individual_became_parent_by_adoption
