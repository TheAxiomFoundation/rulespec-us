format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-70
  summary: |-
    VISTA volunteers enrolled for full-time service cannot be penalized for TCA or Food Stamp Programs if they fail to register for work or complete assigned work activities. An individual temporarily unable to participate due to circumstances beyond their control may be granted an exception from noncompliance penalties. If a penalty has been imposed or scheduled and the Regional Workforce Board indicates good cause, the eligibility specialist will remove the penalty. Before requesting a TANF penalty, counseling is required and a letter allows 10 days to contact the career manager. First and second noncompliance terminate Temporary Cash Assistance for the entire assistance group until the individual contacts the RWB/contract provider or designee and complies.
rules:
  - name: tanf_penalty_counseling_contact_period_days
    kind: parameter
    dtype: Count
    source: ESS Program Policy Manual 1420.1914 Requirement to Counsel (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-70
              excerpt: "allow the individual 10 days to contact them for counseling"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10

  - name: vista_full_time_volunteer_work_noncompliance_penalty_prohibited
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.1910, good cause reason 5
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-70
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_vista_or_americorps_vista_volunteer_enrolled_for_full_time_service
          and person_failed_or_refused_to_register_seek_accept_employment_training_or_complete_assigned_work_activities

  - name: domestic_violence_impairment_work_requirement_exemption_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.1910, domestic violence impairment
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-70
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_determined_unable_to_comply_with_work_requirements_due_to_mental_or_physical_impairment_related_to_past_domestic_violence
          and regional_workforce_board_or_designated_provider_exempted_individual_from_work_requirements

  - name: alternative_plan_noncompliance_work_activity_penalties_apply
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.1910, domestic violence impairment
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-70
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          domestic_violence_impairment_work_requirement_exemption_applies
          and not individual_complies_with_alternative_plan

  - name: other_good_cause_noncompliance_penalty_exception_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.1910, good cause reason 6
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-70
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_temporarily_unable_to_participate_due_to_circumstances_beyond_control
          and regional_workforce_board_or_designated_provider_granted_exception_from_noncompliance_penalties

  - name: work_activity_penalty_removed_when_good_cause_indicated
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.1910, good cause penalty removal
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-70
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (work_activity_penalty_has_been_imposed or work_activity_penalty_is_scheduled_to_be_imposed)
          and regional_workforce_board_indicates_individual_had_good_cause_for_not_participating_in_work_activities

  - name: tanf_penalty_counseling_required_before_request
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.1914 Requirement to Counsel (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-70
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_is_noncompliant_with_work_activity_requirements
          and regional_workforce_board_career_manager_is_prior_to_requesting_tanf_penalty

  - name: counseling_letter_contact_period_satisfies_requirement
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.1914 Requirement to Counsel (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-70
              excerpt: "send a letter of counseling ... allow the individual 10 days"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          regional_workforce_board_career_manager_sends_letter_of_counseling
          and counseling_letter_contact_period_days >= tanf_penalty_counseling_contact_period_days

  - name: second_noncompliance_interview_and_counseling_required_before_penalty_request
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.1917 Length of Penalty Periods (TCA), second noncompliance
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-70
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_has_second_work_activity_noncompliance
          and rwb_or_designee_is_prior_to_requesting_second_work_noncompliance_penalty

  - name: first_noncompliance_tca_termination_applies
    kind: derived
    entity: TanfUnit
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.1917 Length of Penalty Periods (TCA), first noncompliance
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-70
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          assistance_group_member_has_first_noncompliance_with_prescribed_work_activities
          and (
            not first_noncompliant_individual_contacts_rwb_contract_provider
            or not first_noncompliant_individual_complies_with_prescribed_work_activities
          )

  - name: second_noncompliance_tca_termination_applies
    kind: derived
    entity: TanfUnit
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.1917 Length of Penalty Periods (TCA), second noncompliance
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-70
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          assistance_group_member_has_second_noncompliance_with_prescribed_work_activities
          and (
            not second_noncompliant_individual_contacts_rwb_or_designee
            or not second_noncompliant_individual_complies_with_work_activities
          )
