format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-60
  summary: |-
    1420.0806 requires documentation/verification when the information is questioned or the parent/relative resides in a group facility. 1420.0807 provides that temporary absences of 30 days or less do not affect eligibility, and longer non-residential-care absences do not affect eligibility when care and control continues, a definite return plan exists, and the absence is not for a reason listed in passage 1420.0805. 1420.0809 allows a parent or caretaker relative in out-of-home residential treatment not exceeding 150 days to remain in the assistance group if the plan is to resume care and control. 1420.0810 states an emergency-care TCA benefit may be paid for 90 days only to a nonrelative caretaker.
rules:
  - name: temporary_absence_general_duration_limit_days
    kind: parameter
    dtype: Count
    source: 1420.0807 Temporary Absence from the Home (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-60
              excerpt: "30 days or less duration"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: residential_treatment_temporary_absence_limit_days
    kind: parameter
    dtype: Count
    source: 1420.0809 Temporary Absence in Residential Treatment Program (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-60
              excerpt: "not to exceed 150 days"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          150

  - name: emergency_nonrelative_care_payment_limit_days
    kind: parameter
    dtype: Count
    source: 1420.0810 Temporary Arrangement for Emergency Care (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-60
              excerpt: "paid for 90 days only"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          90

  - name: tca_living_arrangement_verification_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 1420.0806 Verification/Documentation (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-60
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          information_about_child_home_setting_or_living_arrangement_is_questioned
          or parent_or_relative_resides_in_group_facility

  - name: tca_care_and_control_during_temporary_absence
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 1420.0807 Temporary Absence from the Home (TCA), care and control note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-60
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          parent_or_relative_continues_contact_with_child_through_visits_phone_calls_or_mail
          and parent_or_relative_gives_directions_on_child_care_to_substitute_caretaker

  - name: tca_temporary_absence_does_not_affect_eligibility
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 1420.0807 Temporary Absence from the Home (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-60
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-60#temporary_absence_general_duration_limit_days
              output: temporary_absence_general_duration_limit_days
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-60#tca_care_and_control_during_temporary_absence
              output: tca_care_and_control_during_temporary_absence
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          absent_person_is_child_parent_or_relative
          and not temporary_absence_due_to_out_of_home_residential_care
          and (temporary_absence_duration_days <= temporary_absence_general_duration_limit_days
          or (temporary_absence_duration_days > temporary_absence_general_duration_limit_days
          and tca_care_and_control_during_temporary_absence
          and definite_plan_exists_for_absent_child_parent_or_relative_to_return_home
          and not absence_reason_listed_in_passage_1420_0805))

  - name: residential_treatment_absence_continues_assistance_group_membership
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 1420.0809 Temporary Absence in Residential Treatment Program (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-60
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-60#residential_treatment_temporary_absence_limit_days
              output: residential_treatment_temporary_absence_limit_days
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          parent_or_caretaker_relative_absent_due_to_out_of_home_residential_treatment
          and residential_treatment_absence_duration_days <= residential_treatment_temporary_absence_limit_days
          and participant_has_plan_to_resume_care_and_control_at_conclusion_of_treatment

  - name: emergency_tca_benefit_payable_to_nonrelative_caretaker_within_limit
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 1420.0810 Temporary Arrangement for Emergency Care (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-60
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-60#emergency_nonrelative_care_payment_limit_days
              output: emergency_nonrelative_care_payment_limit_days
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          parent_or_relative_in_active_tca_case_can_no_longer_provide_care_due_to_crisis_or_emergency
          and emergency_caretaker_is_nonrelative
          and emergency_caretaker_is_looking_after_children
          and emergency_care_payment_duration_days <= emergency_nonrelative_care_payment_limit_days
