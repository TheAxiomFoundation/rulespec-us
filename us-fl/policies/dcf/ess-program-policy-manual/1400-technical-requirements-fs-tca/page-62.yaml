format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-62
  summary: |-
    VA pensioners applying for or receiving TCA cannot be required to file for or receive the December 1978 VA pension increase as a condition of eligibility. TCA applicants and recipients, including caretaker relatives, must cooperate with CSE unless CSE determines good cause for non-cooperation. Cooperation requirements include locating parents, establishing paternity, obtaining child support, and reporting direct child support payments within 10 calendar days. A pregnant woman with no other children is not required to cooperate with CSE until the child's birth.
rules:
  - name: direct_child_support_payment_reporting_deadline_days
    kind: parameter
    dtype: Count
    source: ESS Program Policy Manual 1420.1704, Definition of Cooperation (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-62
              excerpt: "reporting to the eligibility specialist within 10 calendar days payments of child support"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10

  - name: va_december_1978_pension_increase_filing_not_required_for_tca
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual Chapter 1400, TCA, page 57
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-62
              excerpt: "Any VA pensioner who is applying for or receiving Temporary Cash Assistance cannot be required"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_va_pensioner
          and person_applies_for_or_receives_temporary_cash_assistance

  - name: child_support_cooperation_required_for_tca
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.1702, Child Support Cooperation Requirements (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-62
              excerpt: "Cooperation with Child Support Enforcement (CSE) by a parent or caretaker relative is required when"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_parent_or_caretaker_relative
          and person_applies_for_or_receives_temporary_cash_assistance_for_child
          and paternity_has_not_been_established_and_alleged_father_is_not_in_home
          and one_or_both_parents_are_absent_from_home
          and not good_cause_for_non_cooperation_with_cse_exists_as_determined_by_cse
          and not pregnant_woman_with_no_other_children_before_child_birth

  - name: child_support_cooperation_condition_of_tca_eligibility
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.1700, Child Support Cooperation (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-62
              excerpt: "must cooperate with Child Support Enforcement (CSE) as a condition of eligibility unless"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_applies_for_or_receives_temporary_cash_assistance
          and not good_cause_for_non_cooperation_with_cse_exists_as_determined_by_cse
          and not pregnant_woman_with_no_other_children_before_child_birth

  - name: cooperation_with_cse
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.1704, Definition of Cooperation (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-62
              excerpt: "Cooperation includes the following"
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-62#direct_child_support_payment_reporting_deadline_days
              output: direct_child_support_payment_reporting_deadline_days
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_provides_complete_information_required_to_obtain_child_support
          and person_completes_and_signs_paternity_affidavits
          and person_makes_court_appearances_and_provides_testimony_for_paternity_and_support_actions
          and direct_child_support_payments_are_reported_to_eligibility_specialist_within_deadline_days <= direct_child_support_payment_reporting_deadline_days

  - name: non_custodial_parent
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.1705.01, Definition of Non-custodial Parent (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-62
              excerpt: "non-custodial (absent) legal fathers, non-custodial (absent) mothers, and all putative"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_non_custodial_absent_legal_father
          or person_is_non_custodial_absent_mother
          or person_is_putative_nonlegal_biological_father

  - name: information_on_each_parent_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.1705.02, Legal Father and Natural Father (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-62
              excerpt: "If both a legal and putative father exists, or the responsibility for support is not clear"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_parent_or_caretaker_relative
          and (both_legal_and_putative_father_exist or responsibility_for_support_is_not_clear)
