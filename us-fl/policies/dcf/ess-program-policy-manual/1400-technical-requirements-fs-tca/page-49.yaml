format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-49
  summary: |-
    If failure to immunize is due to religious reasons, the applicant's or recipient's statement that the individual practices a religion opposed to immunization may be accepted. If due to a permanent medical condition, a doctor's statement is acceptable verification. To be eligible for Temporary Cash Assistance, a teen parent must live with parents, relatives, or another supervised setting; attend school or an approved GED program unless the teen's minor child is less than 12 weeks old or the teen has completed high school; meet payment, deeming, protective payee, and parenting-class requirements. Exceptions to the responsible-adult residence requirement include no available parent or guardian, no parent or guardian willing to allow residence, at least one year of prior separate living, or good cause with jeopardy to health or safety.
rules:
  - name: teen_parent_school_exception_child_age_limit_weeks
    kind: parameter
    dtype: Count
    source: 1420.0601 Teen Parent Requirements (TCA), school attendance exceptions
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-49
              excerpt: "minor child less than 12 weeks old"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          12

  - name: teen_parent_prior_separate_living_exception_years
    kind: parameter
    dtype: Count
    source: 1420.0602 Exception to Teen Parent Requirements (TCA), prior separate living exception
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-49
              excerpt: "lived apart from their parent or legal guardian for at least one year"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1

  - name: immunization_religious_statement_acceptable_verification
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Chapter 1400 Technical Requirements Program TCA, immunization verification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-49
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          child_failure_to_immunize_due_to_religious_reasons
          and applicant_or_recipient_statement_indicates_individual_practices_religion_opposed_to_immunization

  - name: immunization_permanent_medical_condition_doctor_statement_acceptable_verification
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Chapter 1400 Technical Requirements Program TCA, immunization verification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-49
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          child_failure_to_immunize_due_to_permanent_medical_condition
          and doctor_statement_verifies_permanent_medical_condition

  - name: teen_parent_responsible_adult_residence_exception_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 1420.0602 Exception to Teen Parent Requirements (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-49
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-49#teen_parent_prior_separate_living_exception_years
              output: teen_parent_prior_separate_living_exception_years
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          no_parent_or_legal_guardian_living_or_whereabouts_known_for_teen_parent
          or no_parent_or_legal_guardian_will_allow_teen_parent_to_live_in_their_home
          or years_teen_parent_lived_apart_from_parent_or_legal_guardian_before_dependent_child_birth >= teen_parent_prior_separate_living_exception_years
          or years_teen_parent_lived_apart_from_parent_or_legal_guardian_before_tca_application >= teen_parent_prior_separate_living_exception_years
          or (good_cause_exists_for_teen_parent_separate_living_arrangement and physical_or_emotional_health_or_safety_of_teen_parent_or_child_would_be_jeopardized_by_residing_with_parent_or_legal_guardian)

  - name: teen_parent_temporary_cash_assistance_requirements_met
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 1420.0601 Teen Parent Requirements (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-49
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-49#teen_parent_school_exception_child_age_limit_weeks
              output: teen_parent_school_exception_child_age_limit_weeks
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-49#teen_parent_responsible_adult_residence_exception_applies
              output: teen_parent_responsible_adult_residence_exception_applies
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_teen_parent
          and (teen_parent_lives_with_parent or teen_parent_lives_with_relative or teen_parent_lives_in_setting_with_adult_guidance_and_support_to_be_responsible_parent_stay_in_school_and_prepare_for_independent_living or teen_parent_responsible_adult_residence_exception_applies)
          and (teen_parent_attends_secondary_school_or_approved_program_leading_to_ged or teen_parent_has_completed_high_school or teen_parent_minor_child_age_in_weeks < teen_parent_school_exception_child_age_limit_weeks)
          and (not teen_parent_heads_own_temporary_cash_assistance_group or (temporary_cash_payments_based_on_tier_iii_payment_standard and protective_payee_appointed_for_teen_parent_tca_group))
          and (not (teen_parent_lives_with_parent and teen_parent_heads_own_temporary_cash_assistance_group) or income_deemed_from_parents_for_teen_parent_tca_group)
          and (not parenting_and_family_classes_program_available_in_area or teen_parent_attends_parenting_and_family_classes)
