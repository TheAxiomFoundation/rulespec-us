        formula: |-
          individual_is_parent_or_caretaker_relative
          and minor_child_will_be_out_of_home
          and minor_child_out_of_home_consecutive_days >= child_out_of_home_consecutive_day_threshold
          and days_until_parent_or_caretaker_reported_minor_child_out_of_home > child_out_of_home_report_deadline_days
          and temporary_absence_policy_applied_before_penalty

