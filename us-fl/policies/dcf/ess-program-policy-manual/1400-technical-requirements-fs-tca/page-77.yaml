format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-77
  summary: |-
    TCA recipients must report changes within 10 calendar days, and a parent or caretaker relative must report within 5 calendar days that a minor child will be out of the home for 30 or more consecutive days. Failure results in 30, 60, or 90 day TCA penalties by occurrence. TCA benefits must be denied to an individual who is a fleeing felon or in violation of probation or parole. All four fleeing-felon criteria must be present and verified.
rules:
  - name: tca_general_change_report_deadline_days
    kind: parameter
    dtype: Count
    source: 1420.2400 Failure to Report Child Out of Home (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-77
              excerpt: "Temporary Cash Assistance recipients are required to report changes within 10 calendar days."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10

  - name: child_out_of_home_report_deadline_days
