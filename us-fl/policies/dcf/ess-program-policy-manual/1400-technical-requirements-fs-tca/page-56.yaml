format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-56
  summary: |-
    1420.0720.04: Deprivation exists when one or both parents are resident citizens of a foreign country and are unable to legally enter the United States. 1420.0721.01: Deprivation due to continued absence is considered to exist when the nonlegal father is not living in the home with the mother and child or pregnant woman, or the mother or legal father live apart from the child. 1420.0722.01: Incapacity exists when the parent has a medically supported physical or mental condition expected to last longer than 30 days and severe enough to substantially reduce or eliminate ability to support or care for the child.
rules:
  - name: foreign_country_resident_parent_deprivation
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0720.04 Resident Citizen of a Foreign Country (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-56
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          one_or_both_parents_are_resident_citizens_of_foreign_country
          and one_or_both_parents_are_unable_to_legally_enter_united_states

  - name: foreign_country_parent_information_sufficient
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0720.04 Resident Citizen of a Foreign Country (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-56
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          parent_or_caretaker_relative_gives_information_about_reasons_absent_parent_cannot_enter_united_states
          and reason_parent_cannot_enter_united_states_is_political_or_medical
          and current_immigration_laws_known_to_prohibit_entry_for_specific_reason_given

  - name: other_continued_absence_deprivation
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0721.01 Other Continued Absences (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-56
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          nonlegal_father_not_living_in_home_with_mother_and_child
          or nonlegal_father_not_living_in_home_with_pregnant_woman
          or mother_lives_apart_from_child
          or legal_father_lives_apart_from_child

  - name: incapacity_duration_threshold_days
    kind: parameter
    dtype: Count
    source: ESS Program Policy Manual 1420.0722.01 Definition of Incapacity (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-56
              excerpt: expected to last longer than 30 days
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: incapacity
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0722.01 Definition of Incapacity (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-56
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-56#incapacity_duration_threshold_days
              output: incapacity_duration_threshold_days
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          parent_has_physical_or_mental_illness_impairment_or_defect_supported_by_medical_evidence
          and incapacity_expected_duration_days > incapacity_duration_threshold_days
          and incapacity_substantially_reduces_or_eliminates_ability_to_support_or_care_for_child
          and (
            parent_unable_to_work
            or parent_unable_full_time_usual_occupation_caring_for_children_or_comparable_alternate_occupation
            or parent_accepts_substantially_reduced_wages_due_to_debilitating_condition
            or parent_handicapped_or_disabled_entire_life
          )

  - name: incapacity_verification_established
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0722.02 Verification of Incapacity (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-56
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          parent_receives_social_security_rsdi_or_ssi_benefits_on_basis_of_disability_or_blindness
          or licensed_physician_medical_statement_says_incapacity_or_disability_exists

  - name: parental_incapacity_deprivation
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0722 Incapacity (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-56
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (both_parents_live_together and one_or_both_parents_determined_physically_or_mentally_incapacitated)
          or one_parent_absent_due_to_incapacitating_condition
