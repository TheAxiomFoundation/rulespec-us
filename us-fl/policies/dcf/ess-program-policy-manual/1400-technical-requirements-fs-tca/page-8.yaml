format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-8
  summary: |-
    "The following individuals are eligible for food stamps indefinitely under the factor of citizenship even if they do not meet the qualified noncitizen status" including Hmong or Highland Laotians tribe members and specified family members lawfully living in the United States, and American Indians born in Canada residing in the United States if subject to INA section 289 or members of a covered Indian Tribe. "Note: These individuals are not subject to the five-year ban." LPRs may be eligible if they entered before 8/22/96 and remained continuously present, entered after that date under specified prior statuses, or lived in the U.S. as a qualified noncitizen for at least five years or have 40 quarters of work.
rules:
  - name: qualified_noncitizen_minimum_years_for_lpr_food_stamp_eligibility
    kind: parameter
    dtype: Count
    source: ESS Program Policy Manual 1410.0106, Lawful Permanent Resident
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-8
              excerpt: "have lived in the U.S. as a qualified noncitizen for at least five years"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          5

  - name: lpr_work_quarters_threshold_for_food_stamp_eligibility
    kind: parameter
    dtype: Count
    source: ESS Program Policy Manual 1410.0106, Lawful Permanent Resident
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-8
              excerpt: "credited with 40 quarters of work"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          40

  - name: maximum_qualifying_work_quarters_per_calendar_year
    kind: parameter
    dtype: Count
    source: ESS Program Policy Manual 1410.0106, Lawful Permanent Resident
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-8
              excerpt: "At no time may an individual earn more than four qualifying quarters in one calendar year."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          4

  - name: american_indian_blood_percentage_threshold_for_ina_section_289_proof
    kind: parameter
    dtype: Rate
    source: ESS Program Policy Manual 1410.0104, Noncitizens
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-8
              excerpt: "certifying at least 50% American Indian blood"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.50

  - name: hmong_or_highland_laotian_food_stamp_citizenship_factor_eligible
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.0104, item 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-8
              excerpt: "Persons who were Hmong or Highland Laotians tribe members between August 5, 1964 and May 7, 1975 (including spouses and children, and un-remarried surviving spouses) lawfully living in the United States."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_lawfully_living_in_united_states
          and (
            person_was_hmong_or_highland_laotian_tribe_member_during_specified_period
            or person_is_spouse_of_hmong_or_highland_laotian_tribe_member_during_specified_period
            or person_is_child_of_hmong_or_highland_laotian_tribe_member_during_specified_period
            or (
              person_is_surviving_spouse_of_hmong_or_highland_laotian_tribe_member_during_specified_period
              and person_has_not_remarried
            )
          )

  - name: american_indian_born_in_canada_ina_section_289_blood_requirement_met
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.0104, item 2(d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-8
              excerpt: "certifying at least 50% American Indian blood"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_american_indian_blood_percentage >= american_indian_blood_percentage_threshold_for_ina_section_289_proof

  - name: american_indian_born_in_canada_ina_section_289_documentary_proof_supported
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.0104, item 2(d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-8
              excerpt: "a letter or other tribal document certifying at least 50% American Indian blood ... combined with a birth certificate or other satisfactory evidence of birth in Canada."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_has_letter_or_other_tribal_document_certifying_american_indian_blood
          and american_indian_born_in_canada_ina_section_289_blood_requirement_met
          and person_has_birth_certificate_or_other_satisfactory_evidence_of_birth_in_canada

  - name: american_indian_born_in_canada_status_proof_supported
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.0104, item 2 proof list
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-8
              excerpt: "Proof of this status includes: a. I-551 with code S-13; b. unexpired temporary I-551 stamp in a Canadian passport; c. I-94 with code S-13, or d. a letter or other tribal document..."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_has_form_i551_with_code_s13
          or person_has_unexpired_temporary_i551_stamp_in_canadian_passport
          or person_has_form_i94_with_code_s13
          or american_indian_born_in_canada_ina_section_289_documentary_proof_supported

  - name: indian_tribe_membership_verification_supported
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.0104, item 2 membership verification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-8
              excerpt: "Verification of membership in an Indian tribe includes a membership card or other tribal document... If the individual has no document evidencing tribal membership, contact the tribal government for confirmation..."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_has_indian_tribe_membership_card
          or person_has_other_tribal_document_demonstrating_membership_in_federally_recognized_indian_tribe
          or tribal_government_confirms_person_membership

  - name: american_indian_born_in_canada_food_stamp_immigration_status_eligible
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.0104, item 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-8
              excerpt: "American Indians born in Canada, who are residing in the U.S., are eligible for food stamps... if they are subject to Section 289 ... or a member of an Indian Tribe..."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_american_indian_born_in_canada
          and person_resides_in_united_states
          and (
            person_is_subject_to_immigration_and_nationality_act_section_289
            or person_is_member_of_indian_tribe_defined_in_indian_self_determination_and_education_assistance_act_section_4_e
          )

  - name: qualifying_work_quarters_within_calendar_year_limit
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.0106, Lawful Permanent Resident
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-8
              excerpt: "At no time may an individual earn more than four qualifying quarters in one calendar year."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_qualifying_work_quarters_earned_in_calendar_year <= maximum_qualifying_work_quarters_per_calendar_year

  - name: lawful_permanent_resident_food_stamp_citizenship_factor_eligible
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.0106, Lawful Permanent Resident
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-8
              excerpt: "LPRs may be eligible for food stamps based on citizenship if they entered the U.S.: 1. prior to 8/22/96 and have remained continuously present, 2. on or after 8/22/96 under a prior asylee, refugee, Amerasian, deportation withheld or Cuban/Haitian Entrant status, or 3. on or after 8/22/96 and have lived in the U.S. as a qualified noncitizen for at least five years or if they can be credited with 40 quarters of work."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_lawful_permanent_resident
          and (
            (
              person_entered_united_states_before_prwora_cutoff
              and person_has_remained_continuously_present_since_entry
            )
            or (
              person_entered_united_states_on_or_after_prwora_cutoff
              and person_entered_under_prior_asylee_refugee_amerasian_deportation_withheld_or_cuban_haitian_entrant_status
            )
            or (
              person_entered_united_states_on_or_after_prwora_cutoff
              and (
                person_years_lived_in_united_states_as_qualified_noncitizen >= qualified_noncitizen_minimum_years_for_lpr_food_stamp_eligibility
                or person_credited_quarters_of_work >= lpr_work_quarters_threshold_for_food_stamp_eligibility
              )
            )
          )

  - name: person_not_subject_to_five_year_ban_under_page_8
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.0104, note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-8
              excerpt: "Note: These individuals are not subject to the five-year ban."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          hmong_or_highland_laotian_food_stamp_citizenship_factor_eligible
          or american_indian_born_in_canada_food_stamp_immigration_status_eligible
