format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-28
  summary: |-
    "Individuals subject to and complying with any work requirement under Title IV-A of the Social Security Act (TCA participants) are exempt from SNAP E&T work requirements." Individuals receiving unemployment compensation, or certain applicants required to register for work with CareerSource, are exempt. Individuals are also exempt if employed or self-employed and working at least 120 hours/month, earning at least $870 monthly, or migrant/seasonal farm workers under contract to begin work within 30 days.
rules:
  - name: monthly_work_hours_threshold
    kind: parameter
    dtype: Count
    period: Month
    source: 1410.1906.12 Working Minimum of 120 Hours Monthly (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-28
              excerpt: "working a minimum of 120 hours/month"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          120

  - name: monthly_earnings_threshold
    kind: parameter
    dtype: Money
    period: Month
    unit: USD
    source: 1410.1906.12 Working Minimum of 120 Hours Monthly (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-28
              excerpt: "at least $870 monthly"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          870

  - name: migrant_seasonal_work_start_window_days
    kind: parameter
    dtype: Count
    source: 1410.1906.12 Working Minimum of 120 Hours Monthly (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-28
              excerpt: "begin work within 30 days"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: treatment_program_participation_verification_met
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 1410.1906 substance abuse treatment participation verification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-28
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          substance_abuse_program_certifies_treatment_center_as_eligible_facility
          and provider_verifies_person_participating_in_treatment_program

  - name: title_iv_a_work_requirement_exempts_snap_et_work_requirements
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 1410.1906.10 Complying with Work Requirements for TCA/RAP/Match Grant (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-28
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_subject_to_title_iv_a_work_requirement
          and person_complies_with_title_iv_a_work_requirement

  - name: unemployment_compensation_exempts_snap_et_work_requirements
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 1410.1906.11 Receiving Unemployment Compensation (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-28
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_receives_unemployment_compensation
          or (
            person_applied_for_unemployment_compensation
            and not person_receives_unemployment_compensation
            and unemployment_compensation_application_requires_careersource_work_registration
          )

  - name: minimum_work_or_earnings_exempts_snap_et_work_requirements
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 1410.1906.12 Working Minimum of 120 Hours Monthly (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-28
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_employed_or_self_employed
          and (
            person_monthly_work_hours >= monthly_work_hours_threshold
            or person_monthly_earnings >= monthly_earnings_threshold
            or (
              person_is_migrant_or_seasonal_farm_worker
              and person_has_contract_or_similar_agreement_with_employer_to_begin_work
              and person_days_until_work_begins_under_contract <= migrant_seasonal_work_start_window_days
            )
          )

  - name: self_employed_full_time_exemption_basis_met
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 1410.1906.12 self-employment determination
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-28
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_self_employed
          and (
            person_monthly_self_employment_income >= monthly_earnings_threshold
            or (
              person_claims_full_time_self_employment
              and person_self_employment_enterprise_monthly_hours_required_on_annual_basis >= monthly_work_hours_threshold
              and person_cooperates_to_establish_volume_of_work_and_income_justify_full_time_self_employment
            )
          )

  - name: unpaid_or_in_kind_work_exempts_snap_et_work_requirements
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 1410.1906.12 unpaid or in-kind work
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-28
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_works_without_pay_in_exchange_for_expenses_or_in_kind_services
          and (
            person_monthly_unpaid_or_in_kind_work_hours >= monthly_work_hours_threshold
            or person_monthly_expense_or_in_kind_value >= monthly_earnings_threshold
          )

  - name: food_stamp_sanction_applies_for_tca_work_noncompliance
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 1410.1906.10 sanctions for failure to comply with TCA work requirements
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-28
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_sanctioned_for_tca_work_requirement_noncompliance
          and not person_meets_food_stamp_exemption

  - name: snap_et_work_requirements_apply_after_loss_of_exemption
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 1410.1907 Loss of Exemption While Certified (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-28
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_lost_snap_et_exemption_due_to_change_in_circumstances

  - name: snap_et_referral_required_after_reported_loss_of_exemption
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 1410.1907 Loss of Exemption While Certified (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-28
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          customer_reports_change_causing_loss_of_exemption
