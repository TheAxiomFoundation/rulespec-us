format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-48
  summary: |-
    1420.0505: The parent or caretaker relative's statement of the child's birth date and marital status is sufficient to verify age unless information is questionable. 1420.0506: An individual's statement that a child age 18 to 19 is attending school full-time is acceptable unless questionable. 1420.0509.01-.03: TCA applicants and recipients with a preschool child under age five must complete appropriate childhood immunizations; refugee initial-application verification may be waived for 12 months; verification is required unless newborn timing permits delay; religious reasons or a permanent medical condition may waive the requirement.
rules:
  - name: preschool_child_age_limit_years
    kind: parameter
    dtype: Count
    source: 1420.0509.01 Immunization (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-48
              excerpt: "preschool child under age five"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          5

  - name: student_status_minimum_age_years
    kind: parameter
    dtype: Count
    source: 1420.0506 Verification of Student Status (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-48
              excerpt: "child age 18 to 19"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          18

  - name: student_status_maximum_age_years
    kind: parameter
    dtype: Count
    source: 1420.0506 Verification of Student Status (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-48
              excerpt: "child age 18 to 19"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          19

  - name: refugee_initial_application_immunization_verification_waiver_months
    kind: parameter
    dtype: Count
    source: 1420.0509.01 Immunization (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-48
              excerpt: "within their 12-months from date of entry, status, or asylum"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          12

  - name: newborn_immunization_verification_postponement_age_limit_months
    kind: parameter
    dtype: Count
    source: 1420.0509.02 Verification Requirement (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-48
              excerpt: "less than three months of age"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          3

  - name: age_statement_sufficient_to_verify_age
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 1420.0505 Verification of Age (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-48
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          parent_or_caretaker_relative_statement_of_child_birth_date_and_marital_status_provided
          and not child_age_or_marital_status_information_questionable

  - name: age_documentation_acceptable_for_questionable_information
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 1420.0505 Verification of Age (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-48
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          child_birth_certificate_provided
          or child_hospital_certificate_provided
          or child_medical_records_provided
          or child_bvs_record_provided
          or dh_form_432_consenting_affidavit_acknowledging_paternity_provided
          or physician_statement_provided
          or census_records_provided

  - name: student_status_statement_sufficient
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 1420.0506 Verification of Student Status (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-48
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-48#student_status_minimum_age_years
              output: student_status_minimum_age_years
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-48#student_status_maximum_age_years
              output: student_status_maximum_age_years
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          child_age_in_years >= student_status_minimum_age_years
          and child_age_in_years <= student_status_maximum_age_years
          and individual_statement_child_attending_school_full_time_provided
          and not child_school_attendance_is_questionable

  - name: child_considered_in_school_attendance
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 1420.0506 Verification of Student Status (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-48
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          child_attending_school_full_time_as_defined_by_school_or_institution
          or child_is_in_school_vacation
          or current_month_is_month_child_completes_school
          or current_month_is_month_child_discontinues_attendance

  - name: school_attendance_verification_must_be_obtained
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 1420.0506 Verification of Student Status (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-48
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          child_school_attendance_is_questionable

  - name: preschool_child_immunization_good_cause
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 1420.0509.03 Good Cause (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-48
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          immunization_failure_due_to_religious_reasons
          or immunization_failure_due_to_permanent_medical_condition

  - name: tca_child_immunization_condition_satisfied
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 1420.0509.01 Immunization (TCA); 1420.0509.03 Good Cause (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-48
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-48#preschool_child_age_limit_years
              output: preschool_child_age_limit_years
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-48#preschool_child_immunization_good_cause
              output: preschool_child_immunization_good_cause
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          child_age_in_years >= preschool_child_age_limit_years
          or child_has_completed_appropriate_childhood_immunizations
          or preschool_child_immunization_good_cause

  - name: refugee_initial_application_immunization_verification_waived
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 1420.0509.01 Immunization (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-48
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-48#preschool_child_age_limit_years
              output: preschool_child_age_limit_years
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-48#refugee_initial_application_immunization_verification_waiver_months
              output: refugee_initial_application_immunization_verification_waiver_months
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          child_age_in_years < preschool_child_age_limit_years
          and refugee_is_applying_for_tca_with_child
          and tca_application_is_initial_application
          and months_since_refugee_date_of_entry_status_or_asylum <= refugee_initial_application_immunization_verification_waiver_months

  - name: newborn_immunization_verification_may_be_postponed_until_next_review
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 1420.0509.02 Verification Requirement (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-48
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-48#newborn_immunization_verification_postponement_age_limit_months
              output: newborn_immunization_verification_postponement_age_limit_months
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          child_is_newborn_added_to_tca_benefit
          and eligibility_review_is_first_after_child_was_added_to_tca_benefit
          and child_age_in_months < newborn_immunization_verification_postponement_age_limit_months

  - name: immunization_verification_document_acceptable
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 1420.0509.02 Verification Requirement (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-48
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          verification_contains_current_immunization_status_next_due_date_and_licensed_health_care_professional_signature_and_date

  - name: tca_assistance_group_pended_for_immunization_verification
    kind: derived
    entity: TanfUnit
    dtype: Judgment
    period: Month
    source: 1420.0509.02 Verification Requirement (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-48
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          immunization_documentation_not_provided_at_eligibility_review
          and immunization_cannot_be_verified_independently_via_florida_shots_database

  - name: tca_denied_or_terminated_when_only_child_fails_immunization_requirement
    kind: derived
    entity: TanfUnit
    dtype: Judgment
    period: Month
    source: 1420.0509.01 Immunization (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-48
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          assistance_group_has_only_one_child
          and only_child_in_assistance_group_does_not_meet_immunization_requirement
