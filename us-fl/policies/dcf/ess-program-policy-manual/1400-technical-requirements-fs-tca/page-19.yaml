format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-19
  summary: |-
    Once an individual's identity is both discovered and authenticated, the technical eligibility factor of identity is established. Residents of institutions, with certain exceptions, are not eligible to participate in the Food Stamp Program. Individuals are considered residents of institutions when the institution provides them with the majority of their meals (50% of three meals a day) as a part of its normal services, and the institution has not been authorized by FNS to accept food stamps.
rules:
  - name: institutional_meal_majority_rate
    kind: parameter
    dtype: Rate
    source: ESS Program Policy Manual 1410.1101 Residents of Institutions (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-19
              excerpt: 50% of three meals a day
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.50

  - name: institutional_standard_meals_per_day
    kind: parameter
    dtype: Count
    source: ESS Program Policy Manual 1410.1101 Residents of Institutions (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-19
              excerpt: three meals a day
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          3

  - name: detention_ineligibility_duration_limit_days
    kind: parameter
    dtype: Count
    source: ESS Program Policy Manual 1410.1101 Residents of Institutions (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-19
              excerpt: more than 30 days
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: small_group_living_arrangement_resident_capacity_limit
    kind: parameter
    dtype: Count
    source: ESS Program Policy Manual 1410.1102 Exemptions from Institutional Provisions (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-19
              excerpt: licensed for 16 residents or fewer
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          16

  - name: identity_technical_eligibility_factor_established
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.0400 Identity (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-19
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_identity_discovered
          and person_identity_authenticated

  - name: verbal_authentication_process_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.0400 Identity (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-19
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_opts_not_to_answer_authentication_questions
          or person_does_not_correctly_answer_authentication_questions
          or person_submits_paper_application

  - name: online_application_may_continue_without_answering_authentication_questions
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.0400 Identity (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-19
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_submits_online_application
          and person_does_not_answer_authentication_questions

  - name: institutional_resident_for_food_stamp_program
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.1101 Residents of Institutions (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-19
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_resides_in_institution
          and institution_meals_provided_to_person_per_day >= institutional_meal_majority_rate * institutional_standard_meals_per_day
          and not institution_authorized_by_fns_to_accept_food_stamps

  - name: student_resident_of_institution_by_school_meals
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.1101 Residents of Institutions (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-19
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_student
          and school_facility_meals_purchased_by_person_per_day >= institutional_meal_majority_rate * institutional_standard_meals_per_day

  - name: person_ineligible_due_to_detention_or_custody
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.1101 Residents of Institutions (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-19
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_prisoner_inmate_detainee_or_convict
          and person_is_under_detention_or_custody_of_federal_state_or_local_penal_correctional_or_other_detention_facility_or_institution
          and detention_or_custody_duration_days > detention_ineligibility_duration_limit_days

  - name: institutional_meals_not_received_food_stamp_eligible
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.1101 Residents of Institutions (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-19
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_resides_in_institution
          and person_does_not_receive_meals_from_institution
          and (person_prepares_own_food
          or person_participates_in_delivered_meals_program
          or person_participates_in_communal_dining_program)
          and not institution_authorized_by_fns_to_accept_food_stamps

  - name: narcotics_or_alcohol_treatment_resident_exempt_from_institutional_provisions
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.1102 Exemptions from Institutional Provisions (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-19
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_narcotics_addict_or_alcoholic
          and person_resides_at_facility_or_treatment_center_supervised_by_drug_or_alcoholic_treatment_and_rehabilitation_program
          and not person_ineligible_due_to_detention_or_custody

  - name: federally_subsidized_elderly_housing_exempt_from_institutional_provisions
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.1102 Exemptions from Institutional Provisions (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-19
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_resides_in_federally_subsidized_elderly_housing_under_section_202_or_236

  - name: blind_or_disabled_small_group_living_arrangement_exempt_from_institutional_provisions
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.1102 Exemptions from Institutional Provisions (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-19
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_blind_or_disabled
          and person_lives_in_authorized_small_group_living_arrangement
          and small_group_living_arrangement_licensed_resident_capacity <= small_group_living_arrangement_resident_capacity_limit

  - name: battered_person_shelter_resident_exempt_from_institutional_provisions
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.1102 Exemptions from Institutional Provisions (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-19
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_or_person_with_children_temporarily_resides_in_shelter_for_battered_persons

  - name: homeless_shelter_resident_exempt_from_institutional_provisions
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.1102 Exemptions from Institutional Provisions (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-19
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_resides_in_public_or_private_nonprofit_shelter_for_homeless_individuals

  - name: institutional_provision_exemption_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.1102 Exemptions from Institutional Provisions (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-19
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          narcotics_or_alcohol_treatment_resident_exempt_from_institutional_provisions
          or federally_subsidized_elderly_housing_exempt_from_institutional_provisions
          or blind_or_disabled_small_group_living_arrangement_exempt_from_institutional_provisions
          or battered_person_shelter_resident_exempt_from_institutional_provisions
          or homeless_shelter_resident_exempt_from_institutional_provisions

  - name: food_stamp_ineligible_due_to_living_arrangement
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.1101-1410.1102, FS
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-19
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_ineligible_due_to_detention_or_custody
          or ((institutional_resident_for_food_stamp_program
          or student_resident_of_institution_by_school_meals)
          and not institutional_provision_exemption_applies)
