format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-18
  summary: |-
    Suspected multiple SSNs exist when the eligibility specialist has reason to believe that an individual has more than one SSN; confirmed multiple SSNs exist when different Social Security cards are presented with the same or similar names and different numbers. Individuals must live in the state, vacation-only presence is not residency, homeless individuals are residents, and residency must be verified. Temporary absence is a visit out of state for less than one calendar month with intent to return; full-calendar-month absence requires removal from the assistance group. Identity of the applicant, and of an authorized representative when one applies, must be established; applicants and recipients must have identity verified before authorization of benefits.
rules:
  - name: suspected_multiple_ssns_under_page_18
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.0205, FS
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-18
              excerpt: Suspected multiple SSNs exist when the eligibility specialist has reason to believe that an individual has more than one SSN.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          eligibility_specialist_has_reason_to_believe_individual_has_more_than_one_ssn
  - name: confirmed_multiple_ssns_under_page_18
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.0205, FS
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-18
              excerpt: Confirmed multiple SSNs exist when an individual presents different Social Security cards with the same or similar names and different numbers.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_presents_different_social_security_cards
          and social_security_cards_have_same_or_similar_names
          and social_security_cards_have_different_numbers
  - name: multiple_ssn_clarification_with_ssa_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.0205, FS
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-18
              excerpt: If either of these situations arises the individual must be asked to clarify the problem with the SSA office.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          suspected_multiple_ssns_under_page_18
          or confirmed_multiple_ssns_under_page_18
  - name: food_stamp_resident_under_page_18
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.0300, FS
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-18
              excerpt: Individuals must live in the state ... Individuals in the state solely for vacation purposes are not considered residents.
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-18
              excerpt: Homeless individuals are considered residents.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (person_lives_in_state or person_is_homeless)
          and not person_is_in_state_solely_for_vacation_purposes
  - name: residency_verified_under_page_18
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.0300, FS
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-18
              excerpt: Residency must be verified ... in conjunction with verification of other factors including identity, and through collateral contact or other available documentary evidence.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          residency_verified_with_identity_or_other_factor_verification
          or residency_verified_through_collateral_contact
          or residency_verified_through_available_documentary_evidence
  - name: food_stamp_residency_factor_met_under_page_18
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.0300, FS
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-18
              excerpt: Individuals must live in the state ... Residency must be verified.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          food_stamp_resident_under_page_18
          and residency_verified_under_page_18
  - name: temporary_absence_from_state_under_page_18
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.0310, FS
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-18
              excerpt: Temporary absence from the state exists when a visit for a period of less than one calendar month is made out of the state and the intent is to return.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          visit_out_of_state_is_less_than_one_calendar_month
          and person_intends_to_return_to_state
  - name: household_member_status_maintained_during_vacation_or_illness_absence
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.0310, FS
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-18
              excerpt: Household members away from home because of a vacation or illness will maintain their household member status if they are in the home during any part of the calendar month.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (person_is_away_from_home_because_of_vacation or person_is_away_from_home_because_of_illness)
          and person_is_in_home_during_any_part_of_calendar_month
  - name: removal_from_assistance_group_required_for_full_calendar_month_absence
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.0310, FS
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-18
              excerpt: If the absence is to cover a full calendar month, the individual(s) should be removed from the assistance group.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_absence_covers_full_calendar_month
  - name: applicant_identity_established_under_page_18
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.0400, FS
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-18
              excerpt: Use any available documentation as proof of identity, but if unavailable, make a collateral contact. If the individual(s) is known to the interviewer, this information must be recorded.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          identity_established_by_available_documentation
          or identity_established_by_collateral_contact
          or individual_known_to_interviewer_and_identity_recorded
  - name: application_identity_requirement_met_under_page_18
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.0400, FS
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-18
              excerpt: If an authorized representative applies on behalf of a household, the identity of both the authorized representative and the individual making application must be established.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          applicant_identity_established_under_page_18
          and (not authorized_representative_applies_on_behalf_of_household or identity_of_authorized_representative_established)
  - name: customer_authentication_completed_for_authorization
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.0400.01, FS
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-18
              excerpt: Applicants and recipients must have their identity verified prior to authorization of benefits. Customer Authentication is a two-step process that “Discovers and Authenticates” an individual’s identity.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_applicant_or_recipient
          and customer_authentication_discovery_matches_actual_identity
          and customer_authentication_process_authenticates_individual_identity
