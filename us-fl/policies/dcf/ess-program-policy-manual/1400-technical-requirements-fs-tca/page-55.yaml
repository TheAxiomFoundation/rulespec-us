format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-55
  summary: |-
    If the child is temporarily absent from the parent's home, the child is not eligible for inclusion in the requestor's TCA assistance group. For joint custody with partial residence, one parent must be established as primary caretaker, and once established the child is considered temporarily absent while with the other parent. Deprivation exists for temporary removal of custody and parent deportation; legal prohibition against living with the child includes temporary custody removal, parent deportation, and a foreign-country resident citizen unable to legally enter the U.S.
rules:
  - name: child_ineligible_for_requestors_tca_assistance_group_due_to_temporary_absence
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1400 Technical Requirements, TCA, page 55
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-55
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          child_temporarily_absent_from_parents_home
  - name: child_temporarily_absent_while_with_other_parent_after_primary_caretaker_established
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0719 Divorce (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-55
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          joint_custody_primary_caretaker_established
          and child_is_with_other_parent
  - name: tca_deprivation_exists_due_to_temporary_removal_of_custody
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0720.02 Temporary Removal of Custody (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-55
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-55
              excerpt: "Temporary removal of custody is not the same as permanent severance of parental rights."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          child_temporarily_removed_from_parental_custody
          and not parental_rights_permanently_severed_or_terminated
  - name: tca_deprivation_exists_due_to_parent_deportation
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0720.03 Deportation of a Parent (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-55
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          parent_deported_from_united_states
  - name: legal_prohibition_against_living_with_child_exists
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0720.01 Prohibition against Living with Child (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-55
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          tca_deprivation_exists_due_to_temporary_removal_of_custody
          or tca_deprivation_exists_due_to_parent_deportation
          or parent_is_resident_citizen_of_foreign_country_unable_to_legally_enter_united_states
