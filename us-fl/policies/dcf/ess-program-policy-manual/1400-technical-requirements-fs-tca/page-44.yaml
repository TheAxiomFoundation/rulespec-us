format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-44
  summary: |-
    Substantial evidence of unlawful presence in the United States (US) must exist before an individual can be reported.
rules:
  - name: quarterly_report_deadline_days_after_quarter_end
    kind: parameter
    dtype: Count
    source: ESS Program Policy Manual 1420.0118, Reporting Illegal Noncitizens (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-44
              excerpt: within 15 days following the quarter
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          15

  - name: unlawful_presence_determination_or_reporting_barred_under_tca
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0118, Reporting Illegal Noncitizens (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-44
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not person_applies_for_benefits
          or individual_declines_to_present_immigration_status_documentation
          or vis_cps_response_shows_no_uscis_record
          or vis_cps_response_shows_immigration_status_makes_individual_ineligible_for_benefits
          or secondary_verification_from_vis_cps_shows_uscis_status_expired

  - name: unlawful_presence_reporting_to_uscis_required_under_tca
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0118, Reporting Illegal Noncitizens (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-44
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-44#unlawful_presence_determination_or_reporting_barred_under_tca
              output: unlawful_presence_determination_or_reporting_barred_under_tca
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_noncitizen
          and person_applies_for_benefits
          and person_provided_formal_nonappealable_order_of_deportation
          and not unlawful_presence_determination_or_reporting_barred_under_tca

  - name: quarterly_unlawful_presence_report_submission_timely_under_tca
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0118, Reporting Illegal Noncitizens (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-44
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-44#quarterly_report_deadline_days_after_quarter_end
              output: quarterly_report_deadline_days_after_quarter_end
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-44#unlawful_presence_reporting_to_uscis_required_under_tca
              output: unlawful_presence_reporting_to_uscis_required_under_tca
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          unlawful_presence_reporting_to_uscis_required_under_tca
          and days_after_quarter_end_report_sent <= quarterly_report_deadline_days_after_quarter_end

  - name: ssn_documentation_requirement_met_under_tca
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0200, Social Security Number (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-44
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (individual_provided_verbal_statement_of_ssn and ssn_validated_through_data_exchange)
          or (
            not ssn_validated_through_data_exchange
            and eligibility_specialist_obtained_documentation_of_individual_ssn
          )

  - name: social_security_number_condition_of_eligibility_met_under_tca
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0200, Social Security Number (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-44
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-44#ssn_documentation_requirement_met_under_tca
              output: ssn_documentation_requirement_met_under_tca
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          eligibility_specialist_verified_individual_has_applied_for_social_security_number
          or ssn_documentation_requirement_met_under_tca
