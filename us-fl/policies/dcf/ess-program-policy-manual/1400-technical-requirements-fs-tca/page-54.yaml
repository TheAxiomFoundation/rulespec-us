format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-54
  summary: |-
    "A child is considered to be deprived when one or both parents are continuously absent from the home." Continued absence includes anticipated absence "for at least 30 days duration without interruption" for stated reasons, or parents never residing in the home or not assuming parental responsibilities. "Separation exists when there is a break in the marital ties" with some non-custodial-parent responsibilities fulfilled, but planned separations that do not break marital ties do not create deprivation. "Desertion exists when one or both legal parents have completely abandoned all responsibilities for the care, guidance, supervision, and support of a child."
rules:
  - name: continued_absence_minimum_duration_days
    kind: parameter
    dtype: Count
    source: 1420.0715.01 Continued Absence of One or Both Parents (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-54
              excerpt: "at least 30 days duration without interruption"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: marital_separation_continued_absence_reason
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 1420.0716 Marital Separation (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-54
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          noncustodial_parent_absence_breaks_marital_ties
          and noncustodial_parent_fulfills_some_care_supervision_or_support_responsibilities
          and not separation_was_planned_and_does_not_break_marital_ties

  - name: desertion_continued_absence_reason
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 1420.0718 Determination of Desertion (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-54
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          parent_completely_abandoned_care_responsibility
          and parent_completely_abandoned_guidance_responsibility
          and parent_completely_abandoned_supervision_responsibility
          and parent_completely_abandoned_support_responsibility

  - name: continued_absence_has_recognized_reason
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 1420.0715.01 and 1420.0715.02 Continued Absence reasons (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-54
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-54#marital_separation_continued_absence_reason
              output: marital_separation_continued_absence_reason
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-54#desertion_continued_absence_reason
              output: desertion_continued_absence_reason
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          marital_separation_continued_absence_reason
          or parent_absence_is_result_of_incarceration
          or desertion_continued_absence_reason
          or parent_absence_is_result_of_divorce
          or parent_legally_prohibited_from_living_with_child
          or parent_absence_is_result_of_removal_of_custody_due_to_court_order
          or parent_absence_has_other_continued_absence_reason

  - name: child_deprived_due_to_continued_parental_absence
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 1420.0715.01 Continued Absence of One or Both Parents (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-54
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-54#continued_absence_minimum_duration_days
              output: continued_absence_minimum_duration_days
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-54#continued_absence_has_recognized_reason
              output: continued_absence_has_recognized_reason
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (anticipated_parent_absence_duration_days >= continued_absence_minimum_duration_days
          and parent_absence_without_interruption
          and continued_absence_has_recognized_reason)
          or parent_has_never_resided_in_childs_home
          or parent_may_not_have_assumed_parental_responsibilities
