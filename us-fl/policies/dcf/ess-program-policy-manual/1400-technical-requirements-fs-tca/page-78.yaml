format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-78
  summary: |-
    To be a probation or parole violator ineligible for TCA benefits, the individual must have violated a condition of probation or parole and law enforcement must be actively seeking the individual. Law enforcement is actively seeking when it informs the Department it intends to enforce an outstanding misdemeanor or felony warrant for a probation or parole violation.
rules:
  - name: law_enforcement_actively_seeking_person_to_enforce_probation_or_parole_conditions
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.2502, Probation or Parole Violator (TCA), active seeking definition
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-78
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          law_enforcement_informed_department_it_intends_to_enforce_outstanding_misdemeanor_or_felony_warrant_for_probation_or_parole_violation
  - name: probation_or_parole_violator_ineligible_for_tca_benefits
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.2502, Probation or Parole Violator (TCA), two required conditions
    metadata:
