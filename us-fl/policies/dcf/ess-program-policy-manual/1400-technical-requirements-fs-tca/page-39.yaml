format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-39
  summary: |-
    Amerasians born in Vietnam fathered by a U.S. citizen and admitted to the U.S. as immigrants under Section 584 ... are eligible for Temporary Cash Assistance on the factor of citizenship.
    Noncitizens granted asylum under Section 208 ... Proof of this status include ... other conclusive documentation of this status.
    Refugees are defined as those noncitizens given permission to enter the U.S. under Section 207 of the Immigration and Nationality Act (INA).
    Note: These individuals are not subject to the five-year ban.
    Victims of severe forms of human trafficking are eligible for benefits to the same extent as a noncitizen who is admitted to the United States as a refugee under section 207 of the Immigration and Nationality Act.
rules:
  - name: amerasian_tca_citizenship_factor_eligible
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0106.02 Amerasians (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-39
              excerpt: Amerasians born in Vietnam fathered by a U.S. citizen and admitted to the U.S. as immigrants under Section 584 ... are eligible for Temporary Cash Assistance on the factor of citizenship.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_has_amerasian_status_under_section_584

  - name: amerasian_status_proof_accepted
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0106.02 Amerasians (TCA), proof of status
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-39
              excerpt: Proof of this status includes unexpired temporary USCIS Form I-551 with code AM6, AM7, or AM8, or USCIS Form I-94 with codes AM1, AM2, or AM3.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_has_unexpired_temporary_uscis_form_i551_with_code_am6_am7_or_am8
          or person_has_uscis_form_i94_with_code_am1_am2_or_am3

  - name: asylee_tca_citizenship_factor_eligible
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0107 Asylees (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-39
              excerpt: Noncitizens granted asylum under Section 208 ... may be considered for asylum.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_has_asylum_granted_under_section_208

  - name: asylee_status_proof_accepted
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0107 Asylees (TCA), proof of status
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-39
              excerpt: Proof of this status include ... USCIS Form I-94 showing grant of asylum under Section 208 ... other conclusive documentation of this status.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_has_uscis_form_i94_showing_grant_of_asylum_under_section_208
          or person_has_uscis_form_i688b_annotated_274a12_a5
          or person_has_uscis_form_i766_annotated_a5
          or person_has_asylum_office_grant_of_asylum_letter
          or person_has_immigration_judge_order_granting_asylum
          or person_has_other_conclusive_asylee_status_documentation

  - name: refugee_tca_citizenship_factor_eligible
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0108 Refugees (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-39
              excerpt: Refugees are defined as those noncitizens given permission to enter the U.S. under Section 207 of the Immigration and Nationality Act (INA).
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_has_refugee_status_under_ina_section_207

  - name: refugee_status_proof_accepted
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0108 Refugees (TCA), proof of status
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-39
              excerpt: Proof of this status include ... USCIS Form I-94 or I-551 bearing Section 207 ... other conclusive documentation of this status.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_has_uscis_form_i94_or_i551_bearing_section_207
          or person_has_uscis_form_i688b_annotated_274a12_a3
          or person_has_uscis_form_i766_annotated_a3
          or person_has_uscis_form_i571_refugee_travel_document
          or person_has_other_conclusive_refugee_status_documentation

  - name: tca_status_not_subject_to_five_year_ban
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0106.02, 1420.0107, and 1420.0108 notes
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-39
              excerpt: "Note: These individuals are not subject to the five-year ban."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_has_amerasian_status_under_section_584
          or person_has_asylum_granted_under_section_208
          or person_has_refugee_status_under_ina_section_207

  - name: human_trafficking_victim_documentation_accepted
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0109 Victims of Human Trafficking (TCA), documentation
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-39
              excerpt: Adult victims will provide a certification letter from the Department of HHS. Children under 18 years old ... will instead be provided an eligibility letter.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not person_is_under_18_years_old
          and adult_victim_has_hhs_certification_letter
          or (
            person_is_under_18_years_old
            and child_victim_has_hhs_eligibility_letter
          )

  - name: human_trafficking_victim_tca_benefits_eligible_to_refugee_extent
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0109 Victims of Human Trafficking (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-39
              excerpt: Victims of severe forms of human trafficking are eligible for benefits to the same extent as a noncitizen who is admitted to the United States as a refugee under section 207.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_victim_of_severe_form_of_human_trafficking
          and human_trafficking_victim_documentation_accepted
