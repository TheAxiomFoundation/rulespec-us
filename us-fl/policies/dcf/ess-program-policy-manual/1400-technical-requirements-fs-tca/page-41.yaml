format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-41
  summary: |-
    Cuban/Haitian Entrants (TCA) are nationals of Cuba or Haiti with the listed parole, special-status, proceedings, or pending-asylum conditions. These individuals are not subject to the five-year ban. For Battered (TCA), individuals are subject to the five-year ban if entry date is after 8/22/96, but battered children under the age of 18 are not subject to the five-year ban.
rules:
  - name: tca_deportation_withheld_not_subject_to_five_year_ban
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0111 Deportation Withheld (TCA), note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-41
              excerpt: "The court will include the date deportation was withheld ... These individuals are not subject to the five-year ban."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_deportation_was_withheld

  - name: tca_cuban_haitian_entrant
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0112 Cuban/Haitian Entrants (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-41
              excerpt: "any national of Cuba or Haiti who"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_national_of_cuba_or_haiti
          and (person_was_granted_parole_status_as_cuban_haitian_entrant_status_pending
          or person_was_granted_other_special_status_established_under_immigration_laws_for_nationals_of_cuba_or_haiti
          or (person_was_paroled_into_united_states and person_has_not_acquired_other_status_under_immigration_and_nationality_act)
          or person_is_subject_of_exclusion_or_deportation_proceedings_under_immigration_and_nationality_act
          or (person_has_application_for_asylum_pending_with_uscis and final_nonappealable_legally_enforceable_order_of_deportation_or_exclusion_has_not_been_entered_for_person))

  - name: tca_battered_child_five_year_ban_exemption_age_limit_years
    kind: parameter
    dtype: Count
    source: ESS Program Policy Manual 1420.0113 Battered (TCA), note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-41
              excerpt: "Battered children under the age of 18"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          18

  - name: tca_battered_child_under_five_year_ban_age_limit
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0113 Battered (TCA), note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-41
              excerpt: "Battered children under the age of 18 are not subject to the five-year ban."
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-41#tca_battered_child_five_year_ban_exemption_age_limit_years
              output: tca_battered_child_five_year_ban_exemption_age_limit_years
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_battered_child
          and person_age_in_years < tca_battered_child_five_year_ban_exemption_age_limit_years

  - name: tca_battered_person_subject_to_five_year_ban
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0113 Battered (TCA), note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-41
              excerpt: "These individuals are subject to the five-year ban if entry date is after 8/22/96."
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-41#tca_battered_child_under_five_year_ban_age_limit
              output: tca_battered_child_under_five_year_ban_age_limit
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_battered_person
          and person_entry_date_after_prwora_cutoff
          and not tca_battered_child_under_five_year_ban_age_limit

  - name: tca_person_not_subject_to_five_year_ban_under_page_41
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0111-1420.0113 (TCA), five-year ban notes
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-41
              excerpt: "These individuals are not subject to the five-year ban."
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-41
              excerpt: "Battered children under the age of 18 are not subject to the five-year ban."
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-41
              excerpt: "subject to the five-year ban if entry date is after 8/22/96"
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-41#tca_deportation_withheld_not_subject_to_five_year_ban
              output: tca_deportation_withheld_not_subject_to_five_year_ban
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-41#tca_cuban_haitian_entrant
              output: tca_cuban_haitian_entrant
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-41#tca_battered_child_under_five_year_ban_age_limit
              output: tca_battered_child_under_five_year_ban_age_limit
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          tca_deportation_withheld_not_subject_to_five_year_ban
          or tca_cuban_haitian_entrant
          or tca_battered_child_under_five_year_ban_age_limit
          or (person_is_battered_person and not person_entry_date_after_prwora_cutoff)
