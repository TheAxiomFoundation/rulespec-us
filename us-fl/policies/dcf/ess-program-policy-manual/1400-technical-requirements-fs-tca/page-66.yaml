format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-66
  summary: |-
    Individuals subject to work registration must complete the DEO online work registration process or report to the local RWB/designee for work registration and an overview before authorization. Applicants subject to work registration are pending and TCA is denied if registration is not completed within applicable time standards. Individuals who meet a TCA or Food Stamp exemption do not have a requirement to participate in work activities.
rules:
  - name: tca_minor_child_exemption_age_limit_years
    kind: parameter
    dtype: Count
    source: 1420.1905 TCA exemptions
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-66
              excerpt: "Minor children under age 16"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          16

  - name: tca_custodial_parent_child_age_limit_months
    kind: parameter
    dtype: Count
    source: 1420.1905 TCA exemptions
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-66
              excerpt: "child under three months of age"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          3

  - name: food_stamp_child_exemption_age_limit_years
    kind: parameter
    dtype: Count
    source: 1420.1905 Food Stamp exemptions
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-66
              excerpt: "Children under age 16"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          16

  - name: food_stamp_older_adult_exemption_age_years
    kind: parameter
    dtype: Count
    source: 1420.1905 Food Stamp exemptions
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-66
              excerpt: "Age 60 or over"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          60

  - name: food_stamp_youth_exemption_lower_age_years
    kind: parameter
    dtype: Count
    source: 1420.1905 Food Stamp exemptions
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-66
              excerpt: "Age 16 or 17"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          16

  - name: food_stamp_youth_exemption_upper_age_years
    kind: parameter
    dtype: Count
    source: 1420.1905 Food Stamp exemptions
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-66
              excerpt: "Age 16 or 17"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          17

  - name: food_stamp_dependent_child_care_age_limit_years
    kind: parameter
    dtype: Count
    source: 1420.1905 Food Stamp exemptions
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-66
              excerpt: "dependent child under age six"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          6

  - name: food_stamp_minimum_work_hours_per_week_for_exemption
    kind: parameter
    dtype: Count
    source: 1420.1905 Food Stamp exemptions
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-66
              excerpt: "Working a minimum of 30 hours per week"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: food_stamp_federal_minimum_wage_equivalent_hours
    kind: parameter
    dtype: Count
    source: 1420.1905 Food Stamp exemptions
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-66
              excerpt: "federal minimum wage multiplied by 30 hours"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: tca_applicant_work_registration_and_overview_required_before_authorization
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Chapter 1400 Technical Requirements Program TCA, work registration for applicants
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-66
              excerpt: "Individuals subject to work registration must be informed that they must complete ... work registration ... prior to authorization of benefits."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_tca_applicant
          and person_is_subject_to_work_registration

  - name: tca_denial_required_after_untimely_work_registration
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Chapter 1400 Technical Requirements Program TCA, applicant pending status
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-66
              excerpt: "If the customer does not complete the registration process within applicable time standards, Temporary Cash Assistance will be denied."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_tca_applicant
          and person_is_subject_to_work_registration
          and
          not person_completed_work_registration_within_applicable_time_standards

  - name: tca_recipient_referral_required_when_prior_exemption_ends
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Chapter 1400 Technical Requirements Program TCA, recipients previously exempt
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-66
              excerpt: "All recipients previously determined exempt, who subsequently no longer meet an exemption, must be referred"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_tca_recipient
          and person_was_previously_determined_exempt
          and person_no_longer_meets_exemption

  - name: continued_benefit_authorization_verification_not_required_for_prior_exempt_recipient
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Chapter 1400 Technical Requirements Program TCA, recipients previously exempt
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-66
              excerpt: "Verification of work registration and the overview, prior to authorization of continued benefits, is not a requirement for these individuals."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_tca_recipient
          and person_was_previously_determined_exempt
          and person_no_longer_meets_exemption

  - name: temporary_cash_assistance_work_activity_exemption_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 1420.1905 TCA exemptions
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-66
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-66#tca_minor_child_exemption_age_limit_years
              output: tca_minor_child_exemption_age_limit_years
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-66#tca_custodial_parent_child_age_limit_months
              output: tca_custodial_parent_child_age_limit_months
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (person_is_child and person_age_in_years < tca_minor_child_exemption_age_limit_years)
          or person_receives_ssi_or_ssdi_benefits
          or person_is_adult_not_included_in_tca_calculation_in_child_only_case
          or (person_is_one_custodial_parent and youngest_child_age_in_months < tca_custodial_parent_child_age_limit_months)
          or person_cares_for_disabled_family_member

  - name: food_stamp_youth_status_exemption_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 1420.1905 Food Stamp exemptions, youth age 16 or 17
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-66
              excerpt: "Age 16 or 17 who is not the payee/head of a household, or who is attending school, or enrolled in an Employment and Training Program at least half time"
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-66#food_stamp_youth_exemption_lower_age_years
              output: food_stamp_youth_exemption_lower_age_years
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-66#food_stamp_youth_exemption_upper_age_years
              output: food_stamp_youth_exemption_upper_age_years
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_age_in_years >= food_stamp_youth_exemption_lower_age_years
          and person_age_in_years <= food_stamp_youth_exemption_upper_age_years
          and (not person_is_payee_or_head_of_household or person_is_attending_school or person_is_enrolled_in_employment_and_training_program_at_least_half_time)

  - name: food_stamp_tca_rap_or_match_grant_compliance_exemption_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 1420.1905 Food Stamp exemptions, TCA/RAP/Match Grant work requirements note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-66
              excerpt: "Complying with TCA, RAP, or Match Grant work requirements (Note: Do not use this exemption when an individual is non-compliant with a TCA work requirement.)"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_complying_with_tca_rap_or_match_grant_work_requirements
          and
          not person_is_noncompliant_with_tca_work_requirement

  - name: food_stamp_hours_or_earnings_exemption_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 1420.1905 Food Stamp exemptions, work hours or earnings
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-66
              excerpt: "Working a minimum of 30 hours per week or receiving earnings equal to or greater than the federal minimum wage multiplied by 30 hours"
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-66#food_stamp_minimum_work_hours_per_week_for_exemption
              output: food_stamp_minimum_work_hours_per_week_for_exemption
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-66#food_stamp_federal_minimum_wage_equivalent_hours
              output: food_stamp_federal_minimum_wage_equivalent_hours
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_work_hours_per_week >= food_stamp_minimum_work_hours_per_week_for_exemption
          or person_weekly_earnings_amount >= federal_minimum_wage_hourly_amount * food_stamp_federal_minimum_wage_equivalent_hours

  - name: food_stamp_work_activity_exemption_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 1420.1905 Food Stamp exemptions
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-66
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-66#food_stamp_child_exemption_age_limit_years
              output: food_stamp_child_exemption_age_limit_years
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-66#food_stamp_older_adult_exemption_age_years
              output: food_stamp_older_adult_exemption_age_years
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-66#food_stamp_youth_status_exemption_applies
              output: food_stamp_youth_status_exemption_applies
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-66#food_stamp_dependent_child_care_age_limit_years
              output: food_stamp_dependent_child_care_age_limit_years
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-66#food_stamp_tca_rap_or_match_grant_compliance_exemption_applies
              output: food_stamp_tca_rap_or_match_grant_compliance_exemption_applies
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-66#food_stamp_hours_or_earnings_exemption_applies
              output: food_stamp_hours_or_earnings_exemption_applies
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (person_is_child and person_age_in_years < food_stamp_child_exemption_age_limit_years)
          or person_age_in_years >= food_stamp_older_adult_exemption_age_years
          or food_stamp_youth_status_exemption_applies
          or person_is_physically_or_mentally_unable_to_work
          or person_is_responsible_for_incapacitated_individual
          or (person_is_responsible_for_care_of_dependent_child and dependent_child_age_in_years < food_stamp_dependent_child_care_age_limit_years)
          or person_is_student_enrolled_at_least_half_time_in_recognized_school
          or person_is_drug_or_alcohol_treatment_program_participant
          or food_stamp_tca_rap_or_match_grant_compliance_exemption_applies
          or (person_is_applying_for_or_receiving_unemployment_compensation and person_is_complying_with_unemployment_compensation_work_requirements)
          or food_stamp_hours_or_earnings_exemption_applies
          or person_is_school_employee_under_contract
          or person_is_vista_or_americorps_vista_volunteer
