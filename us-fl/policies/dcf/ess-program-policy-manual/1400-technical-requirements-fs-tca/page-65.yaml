format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-65
  summary: The eligibility specialist must explain TCA work requirements in writing
    and verbally; notify the RWB/designee within five working days of changes to TCA
    benefits for mandatory participants; determine each assistance-group individual's
    participation status at application, review, or upon change information; and immediately
    refer nonexempt TCA applicants to the RWB/designee.
rules:
- name: tca_work_information_explanation_requirement_satisfied
  kind: derived
  entity: Person
  dtype: Judgment
  period: Day
  source: DCF ESS Program Policy Manual 1420.1902, Explanation of Benefits (TCA)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: predicate
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-65
  versions:
  - effective_from: '0001-01-01'
    formula: "not (\n  person_is_payee_or_caretaker_relative_of_tca_assistance_group\n\
      \  or person_is_required_to_participate_in_tca_work_requirements\n)\nor (\n\
      \  required_tca_work_information_was_provided_in_writing\n  and required_tca_work_information_was_explained_verbally\n\
      )"
- name: rwb_change_notification_requirement_satisfied
  kind: derived
  entity: Person
  dtype: Judgment
  period: Day
  source: DCF ESS Program Policy Manual 1420.1903, Notification of Changes (TCA)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-65
      - path: versions[0].formula
        kind: import
        import:
          target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-cic-rap/page-42#rwb_notification_deadline_working_days
          output: rwb_notification_deadline_working_days
          hash: sha256:377746b249e82b93079f3cc81ec73044d0c1cb6d1c1dc66660842bee97d70251
  versions:
  - effective_from: '0001-01-01'
    formula: "not (\n  person_is_mandatory_tca_participant\n  and (\n    person_had_gain_or_loss_of_employment\n\
      \    or tca_benefits_cancelled_due_to_employment_or_sanction\n    or tca_benefits_reduced_due_to_employment\n\
      \    or tca_application_approved_or_denied\n    or tca_participation_status_changed\n\
      \    or tca_case_cancelled_for_reason_other_than_employment\n    or individuals_needs_removed_from_tca_case\n\
      \    or address_unit_county_or_district_changed\n  )\n)\nor working_days_elapsed_since_tca_change\
      \ <= rwb_notification_deadline_working_days"
- name: tca_participation_status_determination_requirement_satisfied
  kind: derived
  entity: Person
  dtype: Judgment
  period: Day
  source: DCF ESS Program Policy Manual 1420.1904, Determination of Participation
    Status (TCA)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: predicate
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-65
  versions:
  - effective_from: '0001-01-01'
    formula: "not (\n  person_is_in_tca_assistance_group\n  and (\n    tca_initial_application_occurs\n\
      \    or tca_eligibility_review_occurs\n    or information_received_indicates_tca_participation_status_may_have_changed\n\
      \  )\n)\nor (\n  tca_participation_status_determined_as_mandatory_exempt_or_volunteer\n\
      \  and tca_exemptions_reviewed_for_person\n  and person_allowed_opportunity_to_claim_tca_exemption\n\
      \  and (\n    not person_is_exempt_and_able_to_work\n    or person_encouraged_to_volunteer_for_tca_work_activities\n\
      \  )\n)"
- name: nonexempt_tca_applicant_rwb_referral_requirement_satisfied
  kind: derived
  entity: Person
  dtype: Judgment
  period: Day
  source: DCF ESS Program Policy Manual 1420.1904, Applicants
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: predicate
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-65
  versions:
  - effective_from: '0001-01-01'
    formula: "not (\n  person_applies_for_temporary_cash_assistance\n  and person_signed_and_dated_tca_application\n\
      \  and not person_meets_tca_participation_exemption\n)\nor person_was_referred_to_rwb_or_designee_immediately"
imports:
- us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-cic-rap/page-42#rwb_notification_deadline_working_days
