format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-45
  summary: |-
    "If the SSN is unknown or has never been obtained, the individual must" apply. "Evidence that the individual has applied includes" listed SSA, birth certificate, or BVS proof. After SSN application, follow-up occurs after 90 days, monthly beginning the second month, and SS-5 resubmission at review no sooner than three months. Failure to provide or apply excludes the applicable needs; specified children are ineligible. Multiple SSNs require SSA clarification. TCA residency includes homeless individuals and residents of public or private nonprofit homeless shelters.
rules:
  - name: ssn_application_follow_up_wait_days
    kind: parameter
    dtype: Count
    source: ESS Program Policy Manual 1420.0203, SSN Application Follow-Up
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-45
              excerpt: "After 90 days"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          90

  - name: ssn_contact_start_month_after_application
    kind: parameter
    dtype: Count
    source: ESS Program Policy Manual 1420.0203, SSN Application Follow-Up
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-45
              excerpt: "the second month after the month of application"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          2

  - name: ss5_resubmission_minimum_months
    kind: parameter
    dtype: Count
    source: ESS Program Policy Manual 1420.0203, SSN Application Follow-Up
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-45
              excerpt: "no sooner than three months from the previous SSN application"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          3

  - name: acceptable_ssn_evidence_provided
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0203, SSN evidence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-45
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_has_ss_card
          or person_has_other_ssa_correspondence_containing_name_and_account_number

  - name: ssn_application_required_when_unknown_or_never_obtained
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0203, unknown or never obtained SSN
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-45
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_ssn_is_unknown_or_has_never_been_obtained

  - name: ssn_application_evidence_provided
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0203, SSN application evidence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-45
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_has_ssa_filing_receipt_for_ssn_application
          or person_has_ssa_2853_showing_ssn_requested_at_hospital
          or childs_birth_certificate_has_yes_annotated_in_section_11d
          or bvs_screen_print_has_y_indicator_in_child_issue_field

  - name: ssn_reapplication_need_determination_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0203, SSN Application Follow-Up
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-45
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_applied_for_ssn
          and person_has_not_received_ssn
          and days_since_ssn_application >= ssn_application_follow_up_wait_days

  - name: monthly_ssn_contact_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0203, SSN Application Follow-Up
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-45
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_applied_for_ssn
          and person_has_not_received_ssn
          and months_after_ssn_application >= ssn_contact_start_month_after_application

  - name: ss5_resubmission_required_at_review
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0203, SSN Application Follow-Up
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-45
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_previously_applied_for_ssn
          and person_has_not_received_ssn
          and next_complete_eligibility_review_has_occurred
          and months_since_previous_ssn_application >= ss5_resubmission_minimum_months

  - name: sfu_non_assistance_group_member_ssn_request_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0203, SFU member SSN request
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-45
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          sfu_member_income_or_assets_are_included_in_budget
          and not person_is_member_of_assistance_group

  - name: sfu_non_assistance_group_member_not_required_to_comply_with_ssn_request
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0203, SFU member SSN request
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-45
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          sfu_member_income_or_assets_are_included_in_budget
          and not person_is_member_of_assistance_group

  - name: person_needs_excluded_from_tca_assistance_group_for_ssn_failure
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0204, When SSN is not Provided/Refusal to Apply
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-45
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_failed_to_provide_or_apply_for_own_ssn
          or responsible_individual_failed_to_provide_or_apply_for_persons_ssn

  - name: child_ineligible_due_to_ssn_application_failure
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0204, child in facility or with nonrelative
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-45
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          child_resides_in_facility_or_with_nonrelative
          and parent_caretaker_relative_or_designated_facility_official_failed_to_apply_for_child_ssn

  - name: suspected_multiple_ssns
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0205, Suspected Multiple SSNs
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-45
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          eligibility_specialist_has_reason_to_believe_person_has_more_than_one_ssn

  - name: confirmed_multiple_ssns
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0205, Confirmed Multiple SSNs
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-45
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_presented_different_social_security_cards_with_same_or_similar_names_and_different_numbers

  - name: ssa_clarification_request_required_for_multiple_ssns
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0205, Suspected and Confirmed Multiple SSNs
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-45
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          suspected_multiple_ssns
          or confirmed_multiple_ssns

  - name: tca_residency_factor_eligible
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0300, Residency
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-45
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_otherwise_resident
          or person_is_homeless
          or person_resides_in_public_or_private_nonprofit_shelter_for_homeless
