format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-43
  summary: |-
    If a noncitizen cannot provide immigration-status documentation, the eligibility specialist is not responsible for contacting USCIS unless assistance is requested. Expired cards do not necessarily mean lost status; undue hardship, hospitalization, or medical disability requires declared status and continued application processing. VIS-CPS must be completed at application or reapplication, when adding a noncitizen, at reviews for non-permanent residents, and upon alien-status changes. Benefits may not be held, denied, or terminated while secondary verification is pending.
rules:
  - name: tca_uscis_contact_for_missing_documentation_not_required_without_request
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0114 Verification Requirements for Noncitizens (TCA), missing documentation
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-43
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_noncitizen
          and person_is_unable_to_provide_any_documentation_to_verify_immigration_status
          and not person_requests_assistance_obtaining_documentation_or_verification_of_immigration_status
  - name: tca_undue_hardship_obtaining_current_uscis_documentation
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0114 Verification Requirements for Noncitizens (TCA), undue hardship examples
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-43
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_lives_a_distance_from_uscis_office
          or person_lacks_transportation_to_uscis_office
          or person_faces_several_months_waiting_period_for_uscis_appointment
          or other_undue_hardship_obtaining_current_uscis_documentation
  - name: tca_application_processing_continues_despite_missing_current_uscis_documentation
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0114 Verification Requirements for Noncitizens (TCA), expired registration card
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-43
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_noncitizen
          and person_has_expired_noncitizen_registration_card
          and vis_cps_does_not_indicate_acceptable_immigration_status
          and (tca_undue_hardship_obtaining_current_uscis_documentation or person_is_hospitalized or person_has_medical_disability)
  - name: tca_registration_number_verification_acceptable_documentation
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0114 Verification Requirements for Noncitizens (TCA), noncitizen registration number
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-43
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_noncitizen
          and person_lacks_documentation_of_immigration_status
          and person_can_provide_noncitizen_registration_number
          and vis_cps_verifies_noncitizen_registration_number
          and vis_cps_indicates_person_has_immigration_status
          and person_identity_verified_for_noncitizen_registration_number
  - name: tca_uscis_documentation_showing_eligible_section_accepted
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0114 Verification Requirements for Noncitizens (TCA), USCIS documentation note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-43
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_provides_any_form_of_uscis_documentation
          and documentation_shows_eligible_immigration_act_section
  - name: tca_benefits_not_withheld_pending_secondary_verification
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0114 Verification Requirements for Noncitizens (TCA), secondary verification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-43
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          tca_uscis_documentation_showing_eligible_section_accepted
          and vis_cps_requests_secondary_verification
          and all_other_technical_eligibility_factors_are_met
  - name: tca_benefit_recovery_referral_required_for_interim_assistance_after_secondary_verification_status_loss
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0114 Verification Requirements for Noncitizens (TCA), failed secondary verification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-43
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_noncitizen
          and secondary_verification_shows_person_no_longer_has_eligible_immigration_status
          and person_received_assistance_during_interim_investigation_period
  - name: tca_benefit_recovery_referral_amount_for_interim_assistance_after_secondary_verification_status_loss
    kind: derived
    entity: Person
    dtype: Money
    unit: USD
    period: Month
    source: ESS Program Policy Manual 1420.0114 Verification Requirements for Noncitizens (TCA), interim investigation assistance
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-43
              excerpt: total amount of assistance received during the interim investigation period
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if tca_benefit_recovery_referral_required_for_interim_assistance_after_secondary_verification_status_loss: assistance_received_during_interim_investigation_period_amount else: 0
  - name: tca_vis_cps_completion_required_for_noncitizen
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0115 VIS-CPS (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-43
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_noncitizen
          and (person_is_at_application_or_reapplication
          or noncitizen_individual_is_being_added
          or (person_is_at_review and not person_has_permanent_resident_status)
          or person_has_change_to_alien_status)
  - name: tca_benefits_not_held_denied_or_terminated_pending_secondary_verification
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0115 VIS-CPS (TCA), contradictory VIS-CPS information
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-43
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_noncitizen
          and person_has_apparently_good_uscis_document
          and vis_cps_indicates_contradictory_information
          and not secondary_verification_returned_confirming_status
  - name: tca_noncitizen_citizenship_factor_ineligible_under_page_43
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1420.0117 Noncitizens not Eligible for Assistance (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-43
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_noncitizen
          and (person_is_foreign_government_representative_on_official_business_or_family_or_servant
          or person_is_visitor_for_business_or_pleasure_including_exchange_visitor)
