format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-33
  summary: |-
    The entire food stamp AG becomes ineligible for six months when the payee/head of household is non-compliant; after six months the payee remains ineligible until compliance, while other AG members may reapply. A non-compliant AG member is individually ineligible for at least six months or until compliance, whichever is later. Felony drug trafficking convictions for illegal behavior after 8/22/1996 cause a lifetime individual disqualification unless expunged. Quality Control refusal denies or terminates the household, follows the non-cooperative individual, and requires 10 calendar days' written notice before adverse action. Food stamp benefits must be denied to a fleeing felon or probation/parole violator.
rules:
  - name: food_stamp_work_activity_sanction_period_months
    kind: parameter
    dtype: Count
    source: Chapter 1400 Technical Requirements Program FS, work activity non-compliance sanctions
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-33
              excerpt: "ineligible for six months"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          6

  - name: quality_control_cooperation_notice_period_days
    kind: parameter
    dtype: Count
    source: 1410.2300 Cooperation with Quality Control (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-33
              excerpt: "allowing 10 calendar days to cooperate with QC"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10

  - name: repeat_food_stamp_sanction_threshold_noncompliances
    kind: parameter
    dtype: Count
    source: Chapter 1400 Technical Requirements Program FS, repeated non-compliance
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-33
              excerpt: "any non-compliance after the third non- compliance requires the same sanction period"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          3

  - name: food_stamp_assistance_group_ineligible_during_payee_or_head_sanction
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Chapter 1400 Technical Requirements Program FS, payee/head of household non-compliance
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-33
              excerpt: "Payee/ head of household of the food stamp AG is non-compliant. The entire AG becomes ineligible for six months."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          payee_or_head_of_household_of_food_stamp_assistance_group_is_noncompliant
          and months_since_payee_or_head_noncompliance < food_stamp_work_activity_sanction_period_months

  - name: payee_food_stamp_ineligible_after_initial_sanction_until_compliance
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Chapter 1400 Technical Requirements Program FS, payee/head sanction after six months
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-33
              excerpt: "the payee of the AG remains ineligible for food stamps until compliance"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_payee_of_food_stamp_assistance_group
          and person_was_noncompliant_payee_or_head
          and months_since_payee_or_head_noncompliance >= food_stamp_work_activity_sanction_period_months
          and
          not person_meets_work_activity_exemption
          and
          not person_is_complying_with_work_activities

  - name: other_ag_member_may_reapply_after_payee_sanction_period
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Chapter 1400 Technical Requirements Program FS, other AG members after payee/head sanction
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-33
              excerpt: "Other members of the food stamp AG may reapply at the end of the six-month sanction period."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_other_member_of_food_stamp_ag_with_noncompliant_payee_or_head
          and months_since_payee_or_head_noncompliance >= food_stamp_work_activity_sanction_period_months

  - name: noncompliant_ag_member_food_stamp_ineligible_for_minimum_period_or_until_compliance
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Chapter 1400 Technical Requirements Program FS, AG member non-compliance
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-33
              excerpt: "The individual only becomes ineligible for a minimum of six months or until they comply, whichever is later."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_nonpayee_food_stamp_ag_member_who_was_noncompliant
          and (
            months_since_ag_member_noncompliance < food_stamp_work_activity_sanction_period_months
            or
            not person_is_complying_with_work_activities
          )

  - name: repeat_food_stamp_noncompliance_after_third_uses_third_sanction_period
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Chapter 1400 Technical Requirements Program FS, no forgiveness policy
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-33
              excerpt: "There is no forgiveness policy for food stamps and any non-compliance after the third non- compliance requires the same sanction period"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          current_food_stamp_noncompliance_count > repeat_food_stamp_sanction_threshold_noncompliances

  - name: felony_drug_trafficking_lifetime_food_stamp_disqualification
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 1410.2200 Individual Convicted of Felony Drug Trafficking (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-33
              excerpt: "committed after 8/22/1996. This disqualification is a lifetime disqualification."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_convicted_of_felony_drug_trafficking
          and felony_drug_trafficking_illegal_behavior_occurred_after_cutoff
          and
          not court_expunged_felony_drug_trafficking_conviction

  - name: expungement_proof_required_to_avoid_felony_drug_trafficking_disqualification
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 1410.2200 Individual Convicted of Felony Drug Trafficking (FS), expungement
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-33
              excerpt: "If a court expunges the felony drug trafficking conviction, the individual is not subject to the disqualification. The individual must provide proof of the expungement."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_convicted_of_felony_drug_trafficking
          and court_expunged_felony_drug_trafficking_conviction

  - name: riverside_policy_not_applied_to_felony_drug_trafficking_disqualification
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 1410.2200 Individual Convicted of Felony Drug Trafficking (FS), Riverside policy
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-33
              excerpt: "felony conviction for drug trafficking is not considered noncompliance with specific program requirements"
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-33#felony_drug_trafficking_lifetime_food_stamp_disqualification
              output: felony_drug_trafficking_lifetime_food_stamp_disqualification
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          felony_drug_trafficking_lifetime_food_stamp_disqualification

  - name: household_benefits_denied_or_terminated_for_quality_control_refusal
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 1410.2300 Cooperation with Quality Control (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-33
              excerpt: "Refusal to cooperate will result in the denial or termination of benefits for the entire household."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          any_household_individual_refuses_to_cooperate_with_quality_control

  - name: quality_control_sanction_follows_noncooperative_individual
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 1410.2300 Cooperation with Quality Control (FS), sanction follows individual
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-33
              excerpt: "The sanction will follow the non-cooperative individual."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_refused_to_cooperate_with_quality_control

  - name: remaining_household_members_may_apply_after_noncooperative_individual_moves_out
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 1410.2300 Cooperation with Quality Control (FS), non-cooperative individual moves out
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-33
              excerpt: "If the non-cooperative individual moves out of the household, the remaining household members can apply for benefits."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          noncooperative_individual_moved_out_of_household

  - name: household_benefits_denied_or_terminated_when_noncooperative_individual_applies_or_moves_in
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 1410.2300 Cooperation with Quality Control (FS), sanction follows new household
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-33
              excerpt: "If the non- cooperative individual applies for benefits for them self or moves in with another household, benefits will be denied or terminated"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          noncooperative_individual_applies_for_benefits_for_self_or_moves_into_household

  - name: advance_notice_required_before_qc_refusal_denial_or_termination
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 1410.2300 Cooperation with Quality Control (FS), QC refusal notice process
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-33
              excerpt: "If the household does not respond or cooperate with QC within 10 calendar days, advance notice of adverse action is required"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          quality_control_issued_refusal_to_cooperate_finding
          and household_received_qc_cooperation_notice
          and days_since_qc_cooperation_notice >= quality_control_cooperation_notice_period_days
          and household_did_not_respond_or_cooperate_with_quality_control

  - name: eligibility_staff_must_contact_qc_on_reapplication_after_refusal
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 1410.2300 Cooperation with Quality Control (FS), reapplication after refusal
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-33
              excerpt: "If the household reapplies, eligibility staff must contact QC"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_reapplies_after_quality_control_refusal_finding

  - name: food_stamp_benefits_denied_to_fleeing_felon_or_probation_parole_violator
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 1410.2500 Fleeing Felons and Probation or Parole Violators (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-33
              excerpt: "Food stamp benefits must be denied to an individual who is a fleeing felon or in violation of probation or parole."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_fleeing_felon
          or person_is_in_violation_of_probation_or_parole

  - name: riverside_policy_not_applied_to_fleeing_felon_or_probation_parole_disqualification
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 1410.2500 Fleeing Felons and Probation or Parole Violators (FS), Riverside policy
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-33
              excerpt: "is not considered a noncompliance with a specific program requirement, “Riverside” policy will not be applied"
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-33#food_stamp_benefits_denied_to_fleeing_felon_or_probation_parole_violator
              output: food_stamp_benefits_denied_to_fleeing_felon_or_probation_parole_violator
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          food_stamp_benefits_denied_to_fleeing_felon_or_probation_parole_violator
