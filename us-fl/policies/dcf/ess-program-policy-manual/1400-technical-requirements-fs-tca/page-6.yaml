format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-6
  summary: |-
    1410.0101 requires each public-assistance applicant to declare in writing whether each AG individual is a U.S. citizen or lawful-status noncitizen; the declaration application must be signed under penalty of perjury at application and recertification. 1410.0102 defines U.S. citizenship by birth in the U.S., D.C., or U.S. territory; naturalization; or adoption by a U.S. citizen, and accepts a citizenship statement unless questionable.
rules:
  - name: citizenship_status_declaration_requirement_satisfied
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.0101 Declaration of Citizenship/Noncitizen Status (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-6
              excerpt: "Each applicant applying for public assistance must declare in writing... application... must be signed under penalty of perjury"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not person_applies_for_public_assistance
          or (
            citizenship_or_lawful_noncitizen_status_declared_in_writing_for_person
            and application_declaring_status_signed_under_penalty_of_perjury
            and declaration_form_signed_at_application_or_recertification
          )
  - name: us_citizen
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.0102 Definition of U.S. Citizenship (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-6
              excerpt: "To be considered a U.S. citizen... born... naturalized... adopted by a U.S. citizen."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_was_born_in_united_states_district_of_columbia_or_us_territory
          or person_is_naturalized_citizen
          or person_was_adopted_by_us_citizen
  - name: us_citizenship_statement_accepted_without_verification
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.0102 Definition of U.S. Citizenship (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-6
              excerpt: "The individual’s statement of U.S. citizenship is accepted, unless questionable."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_states_us_citizenship
          and
          not us_citizenship_statement_is_questionable
  - name: us_citizenship_verification_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.0102 Definition of U.S. Citizenship (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-6
              excerpt: "If questionable, verification is required."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          us_citizenship_statement_is_questionable
