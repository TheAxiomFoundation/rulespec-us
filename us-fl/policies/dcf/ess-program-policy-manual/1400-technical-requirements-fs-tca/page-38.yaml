format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-38
  summary: |-
    Verification of active duty military status includes a current DD Form 2, RAPIDS verification, or DEERS contact. Proof of honorable discharge is DD Form 214 or equivalent showing discharge under Honorable conditions. An unmarried dependent child is under 18, or under 22 if a full-time student. An un-remarried noncitizen surviving spouse may be eligible under the stated Filipino-veteran, active-duty-death, and Section 1304 marriage conditions. These individuals are not subject to the five-year ban.
rules:
  - name: military_identification_card_expiration_threshold_years
    kind: parameter
    dtype: Count
    source: Chapter 1400 Technical Requirements Program TCA, active duty military status verification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-38
              excerpt: "more than one year from the date of determination"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1

  - name: unmarried_dependent_child_general_age_limit_years
    kind: parameter
    dtype: Count
    source: Chapter 1400 Technical Requirements Program TCA, unmarried dependent child definition
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-38
              excerpt: "under the age of 18"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          18

  - name: unmarried_dependent_child_student_age_limit_years
    kind: parameter
    dtype: Count
    source: Chapter 1400 Technical Requirements Program TCA, unmarried dependent child definition
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-38
              excerpt: "under the age of 22 if a full-time student"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          22

  - name: surviving_spouse_post_discharge_marriage_window_years
    kind: parameter
    dtype: Count
    source: Section 1304 marriage definition in Chapter 1400 Technical Requirements Program TCA
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-38
              excerpt: "within 15 years after discharge"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          15

  - name: surviving_spouse_minimum_marriage_duration_years
    kind: parameter
    dtype: Count
    source: Section 1304 marriage definition in Chapter 1400 Technical Requirements Program TCA
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-38
              excerpt: "married for a period of at least one year"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1

  - name: active_duty_military_status_verification_supported
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Chapter 1400 Technical Requirements Program TCA, verification of active duty military status
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-38
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-38#military_identification_card_expiration_threshold_years
              output: military_identification_card_expiration_threshold_years
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (person_has_current_dd_form_2_military_identification_card
          and (dd_form_2_expiration_years_from_determination > military_identification_card_expiration_threshold_years
          or (dd_form_2_expiration_years_from_determination < military_identification_card_expiration_threshold_years
          and person_presented_copy_of_current_military_orders)))
          or active_duty_status_verified_through_nearest_rapids
          or active_duty_status_verified_by_deers_support_office_contact

  - name: honorable_discharge_proof_supported
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Chapter 1400 Technical Requirements Program TCA, proof of honorable discharge
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-38
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          discharge_certificate_dd_form_214_or_equivalent_indicates_discharge_under_honorable_conditions

  - name: veteran_status_va_regional_office_referral_indicated
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Chapter 1400 Technical Requirements Program TCA, missing discharge certificate referral
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-38
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_not_in_possession_of_discharge_certificate

  - name: minimum_active_duty_service_requirement_not_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Chapter 1400 Technical Requirements Program TCA, original enlistment note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-38
              excerpt: "prior to September 7, 1980"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          discharge_certificate_indicates_original_enlistment_before_minimum_service_requirement_cutoff

  - name: unmarried_dependent_child
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Chapter 1400 Technical Requirements Program TCA, unmarried dependent child definition
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-38
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-38#unmarried_dependent_child_general_age_limit_years
              output: unmarried_dependent_child_general_age_limit_years
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-38#unmarried_dependent_child_student_age_limit_years
              output: unmarried_dependent_child_student_age_limit_years
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_biological_or_legally_adopted_dependent_child_of_honorably_discharged_veteran_or_active_duty_us_armed_forces_member
          and person_is_not_married
          and (person_age_in_years < unmarried_dependent_child_general_age_limit_years
          or (person_is_full_time_student and person_age_in_years < unmarried_dependent_child_student_age_limit_years))

  - name: surviving_spouse_marriage_requirement_met
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Section 1304 marriage definition in Chapter 1400 Technical Requirements Program TCA
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-38
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-38#surviving_spouse_post_discharge_marriage_window_years
              output: surviving_spouse_post_discharge_marriage_window_years
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-38#surviving_spouse_minimum_marriage_duration_years
              output: surviving_spouse_minimum_marriage_duration_years
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          ((veteran_or_active_duty_personnel_died_while_on_active_duty
          or (injury_or_disease_leading_to_death_was_incurred_or_aggravated_in_relevant_discharge
          and years_between_relevant_discharge_and_marriage <= surviving_spouse_post_discharge_marriage_window_years))
          and years_married_to_veteran_or_active_duty_personnel >= surviving_spouse_minimum_marriage_duration_years)
          or child_was_born_during_relationship_with_veteran_or_active_duty_personnel_during_or_before_marriage

  - name: unremarried_noncitizen_surviving_spouse_eligible
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Chapter 1400 Technical Requirements Program TCA, un-remarried noncitizen surviving spouse provision
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-38
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-38#surviving_spouse_marriage_requirement_met
              output: surviving_spouse_marriage_requirement_met
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_noncitizen_surviving_spouse
          and person_has_not_remarried
          and (veteran_spouse_was_filipino_described_in_title_38_section_107
          or (veteran_or_active_duty_personnel_died_while_on_active_duty and surviving_spouse_marriage_requirement_met))

  - name: veteran_family_member_not_subject_to_five_year_ban
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Chapter 1400 Technical Requirements Program TCA, five-year ban note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-38
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-38#unmarried_dependent_child
              output: unmarried_dependent_child
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-38#unremarried_noncitizen_surviving_spouse_eligible
              output: unremarried_noncitizen_surviving_spouse_eligible
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          unmarried_dependent_child
          or unremarried_noncitizen_surviving_spouse_eligible
