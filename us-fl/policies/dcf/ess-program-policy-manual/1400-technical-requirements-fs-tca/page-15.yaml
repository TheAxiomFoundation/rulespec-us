format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-15
  summary: |-
    The eligibility specialist cannot delay authorization while awaiting verification to establish battery or extreme cruelty. The eligibility specialist must verify the immigration status of all noncitizens applying for or receiving food stamps through USCIS. If a noncitizen does not wish the Agency to contact USCIS, the household may withdraw or participate without that member, and that individual is technically ineligible. USCIS documentation, including expired documentation showing an eligible Immigration Act section, is accepted and verified through VIS-CPS; benefits may not be withheld pending secondary verification when all other technical eligibility factors are met.
rules:
  - name: battery_or_extreme_cruelty_verification_supported_by_page_15_evidence
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.0113 Battered (FS), verification evidence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-15
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_has_approved_petition_or_order_granted_by_uscis
          or person_has_restraining_order_or_criminal_conviction_against_abuser
          or charges_brought_about_lead_to_conviction_of_abuser
          or person_has_credible_evidence_of_battery_or_extreme_cruelty

  - name: authorization_not_delayed_pending_battery_or_extreme_cruelty_verification
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.0113 Battered (FS), pending verification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-15
              excerpt: "cannot delay authorization of an application or request for additional assistance while awaiting verification"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_has_application_or_request_for_additional_assistance_pending
          and verification_to_establish_battery_or_extreme_cruelty_is_pending

  - name: benefit_recovery_referral_required_after_failed_battered_criteria
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.0113 Battered (FS), later discovery
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-15
              excerpt: "If it is later discovered that the noncitizen does not meet these criteria, a Benefit Recovery referral must be made."
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-15#authorization_not_delayed_pending_battery_or_extreme_cruelty_verification
              output: authorization_not_delayed_pending_battery_or_extreme_cruelty_verification
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          authorization_not_delayed_pending_battery_or_extreme_cruelty_verification
          and later_discovered_person_does_not_meet_battery_or_extreme_cruelty_criteria

  - name: food_stamp_noncitizen_immigration_status_verification_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.0114 Verification Requirements for Noncitizens (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-15
              excerpt: "verify the immigration status of all noncitizens applying for or receiving food stamps through USCIS"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_noncitizen
          and person_applies_for_or_receives_food_stamps

  - name: noncitizen_technically_ineligible_when_uscis_contact_refused
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.0114 Verification Requirements for Noncitizens (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-15
              excerpt: "participating without that member ... that individual is technically ineligible for benefits"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_noncitizen
          and person_does_not_wish_agency_to_contact_uscis_to_verify_immigration_status
          and household_participates_without_that_noncitizen_member

  - name: uscis_contact_for_missing_documentation_not_required_without_request
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.0114 Verification Requirements for Noncitizens (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-15
              excerpt: "not responsible for contacting USCIS ... unless the individual requests assistance"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_noncitizen
          and person_is_unable_to_provide_any_documentation_to_verify_immigration_status
          and
          not person_requests_assistance_obtaining_documentation_or_verification_of_immigration_status

  - name: undue_hardship_obtaining_current_uscis_documentation
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.0114 Verification Requirements for Noncitizens (FS), undue hardship examples
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-15
              excerpt: "Examples of undue hardship include ... living a distance ... lack of transportation ... several months waiting period"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_lives_a_distance_from_uscis_office
          or person_lacks_transportation_to_uscis_office
          or person_faces_several_months_waiting_period_for_uscis_appointment
          or other_undue_hardship_obtaining_current_uscis_documentation

  - name: application_processing_continues_despite_missing_current_uscis_documentation
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.0114 Verification Requirements for Noncitizens (FS), expired registration card
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-15
              excerpt: "must continue to process the application"
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-15#undue_hardship_obtaining_current_uscis_documentation
              output: undue_hardship_obtaining_current_uscis_documentation
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_noncitizen
          and person_has_expired_noncitizen_registration_card
          and vis_cps_does_not_indicate_acceptable_immigration_status
          and (undue_hardship_obtaining_current_uscis_documentation or person_is_hospitalized or person_has_medical_disability)

  - name: registration_number_verification_acceptable_documentation
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.0114 Verification Requirements for Noncitizens (FS), noncitizen registration number
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-15
              excerpt: "If the number is verified, and VIS-CPS indicates the individual has an immigration status, this is acceptable documentation"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_noncitizen
          and person_lacks_documentation_of_immigration_status
          and person_can_provide_noncitizen_registration_number
          and vis_cps_verifies_noncitizen_registration_number
          and vis_cps_indicates_person_has_immigration_status
          and person_identity_verified_for_noncitizen_registration_number

  - name: uscis_documentation_showing_eligible_section_accepted
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.0114 Verification Requirements for Noncitizens (FS), note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-15
              excerpt: "provides any form of USCIS documentation, regardless of the expiration date, showing an eligible Immigration Act section"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_provides_any_form_of_uscis_documentation
          and documentation_shows_eligible_immigration_act_section

  - name: benefits_not_withheld_pending_secondary_verification
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1410.0114 Verification Requirements for Noncitizens (FS), secondary verification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-15
              excerpt: "benefits may not be withheld pending response from the secondary verification, providing all other technical eligibility factors are met"
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1400-technical-requirements-fs-tca/page-15#uscis_documentation_showing_eligible_section_accepted
              output: uscis_documentation_showing_eligible_section_accepted
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          uscis_documentation_showing_eligible_section_accepted
          and vis_cps_requests_secondary_verification
          and all_other_technical_eligibility_factors_are_met
