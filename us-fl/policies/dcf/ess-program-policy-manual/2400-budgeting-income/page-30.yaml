format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/2400-budgeting-income/page-30
  summary: |-
    If a teen parent's needs are not included with her child because the teen parent is not eligible for TCA, Tier I standards can be budgeted when the teen parent has a shelter obligation, except when living with a parent, legal guardian, or other adult relative. In child-only caretaker relative cases, use the caretaker's stated amount that the children must pay; for AGs with an SSI parent, use the parent's shelter obligation and verify it only if questionable. Reported shelter decreases are acted on with sufficient information; shelter-change prospective ineligibility terminates the next month with 10 days notice. Student earned income is disregarded for a minor child whose needs are included and who attends elementary or secondary school or equivalent full-time.
rules:
  - name: tca_shelter_change_termination_notice_days
    kind: parameter
    dtype: Count
    source: ESS Program Policy Manual 2420.0342
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/2400-budgeting-income/page-30
              excerpt: "10 days notice can be provided"
    versions:
      - effective_from: '1996-07-01'
        formula: |-
          10

  - name: tca_tier_i_budgeting_available_for_ineligible_teen_parent
    kind: derived
    entity: TanfUnit
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 2420.0341, teen parent note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/2400-budgeting-income/page-30
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/2400-budgeting-income/page-30
              excerpt: "Exception: The teen parent is living with a parent, legal guardian or other adult relative."
    versions:
      - effective_from: '1996-07-01'
        formula: |-
          teen_parent_needs_not_included_in_child_benefit_due_to_tca_ineligibility
          and teen_parent_has_shelter_obligation
          and not teen_parent_living_with_parent_legal_guardian_or_adult_relative

  - name: tca_child_only_caretaker_relative_shelter_obligation_amount
    kind: derived
    entity: TanfUnit
    dtype: Money
    unit: USD
    period: Month
    source: ESS Program Policy Manual 2420.0341, caretaker relative cases
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/2400-budgeting-income/page-30
    versions:
      - effective_from: '1996-07-01'
        formula: |-
          if child_only_caretaker_relative_case: caretaker_relative_stated_child_required_shelter_payment_amount else: 0

  - name: tca_child_only_caretaker_relative_statement_sufficient
    kind: derived
    entity: TanfUnit
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 2420.0341, caretaker relative cases
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/2400-budgeting-income/page-30
              excerpt: "The relative's statement is sufficient."
    versions:
      - effective_from: '1996-07-01'
        formula: |-
          child_only_caretaker_relative_case
          and caretaker_relative_stated_child_required_shelter_payment_amount > 0

  - name: tca_ssi_parent_shelter_obligation_used
    kind: derived
    entity: TanfUnit
    dtype: Money
    unit: USD
    period: Month
    source: ESS Program Policy Manual 2420.0341, SSI parent
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/2400-budgeting-income/page-30
    versions:
      - effective_from: '1996-07-01'
        formula: |-
          if assistance_group_has_ssi_parent: ssi_parent_shelter_obligation_amount else: 0

  - name: tca_ssi_parent_shelter_obligation_verification_required
    kind: derived
    entity: TanfUnit
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 2420.0341, SSI parent
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/2400-budgeting-income/page-30
              excerpt: "must be verified only if questionable"
    versions:
      - effective_from: '1996-07-01'
        formula: |-
          assistance_group_has_ssi_parent
          and ssi_parent_shelter_obligation_questionable

  - name: tca_reported_shelter_decrease_action_required
    kind: derived
    entity: TanfUnit
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 2420.0341, reported decrease
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/2400-budgeting-income/page-30
    versions:
      - effective_from: '1996-07-01'
        formula: |-
          participant_reported_decrease_in_shelter_obligation
          and sufficient_information_to_act_on_shelter_change

  - name: tca_shelter_change_prospective_ineligibility_termination_effective_next_notice_month
    kind: derived
    entity: TanfUnit
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 2420.0342
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/2400-budgeting-income/page-30
              excerpt: "If a change in shelter obligation results in prospective ineligibility"
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/2400-budgeting-income/page-30
              excerpt: "10 days notice can be provided"
    versions:
      - effective_from: '1996-07-01'
        formula: |-
          shelter_obligation_change_results_in_prospective_ineligibility
          and notice_days_available_before_next_month >= tca_shelter_change_termination_notice_days

  - name: tca_pending_application_month_tier_based_on_incurred_shelter_obligation
    kind: derived
    entity: TanfUnit
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 2420.0342, pending application
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/2400-budgeting-income/page-30
    versions:
      - effective_from: '1996-07-01'
        formula: |-
          application_pending
          and individual_changed_shelter_while_application_pending
          and individual_incurred_shelter_obligation_in_month

  - name: tca_new_individual_tier_based_on_existing_group_actual_circumstances
    kind: derived
    entity: TanfUnit
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 2420.0343
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/2400-budgeting-income/page-30
    versions:
      - effective_from: '1996-07-01'
        formula: |-
          adding_new_individuals_to_existing_assistance_group
          and existing_assistance_group_actual_circumstances_known_for_month

  - name: tca_child_under_nineteen_full_time_high_school_mandatory_filing_unit_member
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 2420.0363, mandatory filing unit
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/2400-budgeting-income/page-30
              excerpt: "under age 19 and attending high school or its equivalent on a full-time basis"
    versions:
      - effective_from: '1996-07-01'
        formula: |-
          child_is_under_age_19
          and child_attends_high_school_or_equivalent_full_time

  - name: tca_student_earned_income_disregard_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 2420.0363, student earned income disregard
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/2400-budgeting-income/page-30
              excerpt: "Student refers to the minor child whose needs are included in the benefit."
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/2400-budgeting-income/page-30
              excerpt: "attends an elementary or secondary school ... full-time"
    versions:
      - effective_from: '1996-07-01'
        formula: |-
          minor_child_needs_included_in_tca_benefit
          and child_attends_elementary_or_secondary_or_equivalent_full_time

  - name: tca_student_earned_income_disregarded_amount
    kind: derived
    entity: Person
    dtype: Money
    unit: USD
    period: Month
    source: ESS Program Policy Manual 2420.0363, student earned income disregard
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/2400-budgeting-income/page-30
              excerpt: "The earned income of a child is disregarded"
    versions:
      - effective_from: '1996-07-01'
        formula: |-
          if tca_student_earned_income_disregard_applies: child_gross_earned_income else: 0

  - name: tca_student_full_time_attendance_verification_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 2420.0363, verification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/2400-budgeting-income/page-30
              excerpt: "Verification of full-time attendance is required."
    versions:
      - effective_from: '1996-07-01'
        formula: |-
          minor_child_needs_included_in_tca_benefit
          and child_attends_elementary_or_secondary_or_equivalent_full_time

  - name: tca_student_child_gross_earned_income_verification_not_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 2420.0363, gross income information
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/2400-budgeting-income/page-30
              excerpt: "gross income earned by the child; however, verification is not required"
    versions:
      - effective_from: '1996-07-01'
        formula: |-
          tca_student_earned_income_disregard_applies
          and parent_or_relative_provides_child_gross_earned_income_information
