format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/appendix-a-5-temporary-cash-assistance-income-standards/page-1
  summary: |-
    Appendix A-5 Temporary Cash Assistance Income Standards lists 185% of FPL, CNS (100% of FPL), and Tier I, Tier II, and Tier III payment standards by filing unit size. Tier I is "$50.01/UP", Tier II is ".01-$50", and Tier III is "0"; additional-person increments are +848, +458, and payment-standard increments of +31/+26/+24 per .5 person and +62/+52/+48 per 1 person.
