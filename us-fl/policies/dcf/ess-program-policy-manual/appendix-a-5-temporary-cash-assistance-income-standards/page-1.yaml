  - name: tanf_185_percent_fpl_income_standard
    kind: derived
    entity: TanfUnit
    dtype: Money
    unit: USD
    period: Month
    source: Appendix A-5 Temporary Cash Assistance Income Standards, 185% of FPL column and additional person row
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/appendix-a-5-temporary-cash-assistance-income-standards/page-1
              excerpt: 185% of FPL ... 24 21,915 ... Add. Person +848
    versions:
      - effective_from: '2025-04-01'
        formula: |-
          tanf_185_percent_fpl_income_standard_at_listed_size[filing_unit_income_standard_size] + (max(0, ceil(filing_unit_size) - maximum_listed_filing_unit_size) * additional_person_185_percent_fpl_increment)
  - name: tanf_cns_100_percent_fpl_income_standard
    kind: derived
    entity: TanfUnit
    dtype: Money
    unit: USD
    period: Month
    source: Appendix A-5 Temporary Cash Assistance Income Standards, CNS column and additional person row
