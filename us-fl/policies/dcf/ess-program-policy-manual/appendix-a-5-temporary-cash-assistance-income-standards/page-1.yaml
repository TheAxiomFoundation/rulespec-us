              excerpt: CNS (100 % of FPL) ... 24 ... 11,846 Add. Person +458
    versions:
      - effective_from: '2025-04-01'
        formula: |-
          tanf_cns_100_percent_fpl_income_standard_at_listed_size[filing_unit_income_standard_size] + (max(0, ceil(filing_unit_size) - maximum_listed_filing_unit_size) * additional_person_cns_100_percent_fpl_increment)
  - name: tanf_payment_standard
    kind: derived
    entity: TanfUnit
    dtype: Money
    unit: USD
    period: Month
    source: Appendix A-5 Temporary Cash Assistance Income Standards, Tier I, Tier II, and Tier III Payment Standard columns
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/appendix-a-5-temporary-cash-assistance-income-standards/page-1
              excerpt: TIER I $50.01/UP .01-$50 0 ... Payment Standard
    versions:
      - effective_from: '1996-07-01'
        formula: |-
          if countable_monthly_income >= tier_i_lower_income_threshold:
            tier_i_payment_standard_at_listed_half_unit_size[min(filing_unit_half_unit_index, maximum_listed_half_unit_index)] + (floor(max(0, filing_unit_half_unit_index - maximum_listed_half_unit_index) / 2) * additional_person_tier_i_payment_increment) + ((max(0, filing_unit_half_unit_index - maximum_listed_half_unit_index) - (floor(max(0, filing_unit_half_unit_index - maximum_listed_half_unit_index) / 2) * 2)) * additional_half_person_tier_i_payment_increment)
          else:
            if countable_monthly_income >= tier_ii_lower_income_threshold and countable_monthly_income <= tier_ii_upper_income_threshold:
              tier_ii_payment_standard_at_listed_half_unit_size[min(filing_unit_half_unit_index, maximum_listed_half_unit_index)] + (floor(max(0, filing_unit_half_unit_index - maximum_listed_half_unit_index) / 2) * additional_person_tier_ii_payment_increment) + ((max(0, filing_unit_half_unit_index - maximum_listed_half_unit_index) - (floor(max(0, filing_unit_half_unit_index - maximum_listed_half_unit_index) / 2) * 2)) * additional_half_person_tier_ii_payment_increment)
            else:
              tier_iii_payment_standard_at_listed_half_unit_size[min(filing_unit_half_unit_index, maximum_listed_half_unit_index)] + (floor(max(0, filing_unit_half_unit_index - maximum_listed_half_unit_index) / 2) * additional_person_tier_iii_payment_increment) + ((max(0, filing_unit_half_unit_index - maximum_listed_half_unit_index) - (floor(max(0, filing_unit_half_unit_index - maximum_listed_half_unit_index) / 2) * 2)) * additional_half_person_tier_iii_payment_increment)
