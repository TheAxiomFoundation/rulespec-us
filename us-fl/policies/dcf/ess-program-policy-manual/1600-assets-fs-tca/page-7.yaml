format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-7
  summary: |-
    Assets unavailable due to circumstances beyond the individual's control are not considered in the determination of eligibility. For cash or payable-on-demand assets, actual value is cash value; for other assets, actual value is fair market value. Proceeds from sale or conversion are assets rather than income, and the newly acquired item is subject to asset valuation policy with verification required.
rules:
  - name: circumstances_beyond_control_asset_not_considered_for_eligibility
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1610.0321, Assets Unavailable - Circumstances Beyond Control (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-7
              excerpt: unavailable due to circumstances beyond the individual's control are not considered
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-7
              excerpt: present convincing evidence
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_unavailable_due_to_circumstances_beyond_individual_control
          and individual_presented_convincing_evidence_asset_unavailable_due_to_circumstances_beyond_control
          and eligibility_specialist_independently_assessed_asset_unavailable_based_on_evidence

  - name: actual_asset_value
    kind: derived
    entity: Asset
    dtype: Money
    period: Month
    unit: USD
    source: ESS Program Policy Manual 1610.0407, Definition of Actual Value (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-7
              excerpt: cash value ... fair market value
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if asset_is_cash_or_payable_in_cash_on_demand: asset_cash_value else: asset_fair_market_value

  - name: asset_conversion_proceeds_treated_as_asset_not_income
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1610.0409, Conversion of Assets (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-7
              excerpt: Proceeds ... are considered assets rather than income.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_proceeds_from_sale_or_conversion_of_asset

  - name: converted_or_sold_asset_new_item_subject_to_asset_valuation_policy
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1610.0409, Conversion of Assets (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-7
              excerpt: newly acquired item is an asset subject to all asset valuation policy
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          new_item_acquired_from_asset_sale_or_conversion

  - name: verification_required_for_new_asset_after_conversion
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1610.0409, Conversion of Assets (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-7
              excerpt: Verification concerning the new asset must be obtained regardless of whether a liquid or nonliquid asset is involved.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          new_item_acquired_from_asset_sale_or_conversion
          and (
            new_asset_is_liquid
            or new_asset_is_nonliquid
          )
