format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-16
  summary: |-
    FS 13 excludes federal income tax returns/refunds as assets for 12 months from receipt; educational assistance is not an asset, with commingled excluded funds excluded for six months and separate-account funds excluded without time limit; SSI PASS set-aside payments must be separated; and listed compensation, relocation, persecution, crime-victim, EEOICP, mixed-household SSI/TCA member assets, and specified American Indian payments are excluded assets.
rules:
  - name: federal_income_tax_return_asset_exclusion_period_months
    kind: parameter
    dtype: Count
    source: ESS Program Policy Manual 1600 Assets, FS 13, item 7
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-16
              excerpt: "excluded as an asset for 12 months from the date of receipt"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          12

  - name: educational_assistance_commingled_asset_exclusion_period_months
    kind: parameter
    dtype: Count
    source: ESS Program Policy Manual 1600 Assets, FS 13, item 8
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-16
              excerpt: "commingled in an account with other funds are excluded for six months"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          6

  - name: listed_asset_excluded_from_food_stamp_assets
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1600 Assets, FS 13, items 7-17
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-16
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (
            asset_is_federal_income_tax_return_refund_refundable_tax_credit_or_overwithholding
            and months_since_asset_receipt <= federal_income_tax_return_asset_exclusion_period_months
          )
          or (
            asset_is_educational_assistance
            and (
              asset_kept_in_separate_account
              or (
                asset_commingled_with_other_funds
                and months_since_asset_combined_with_other_funds <= educational_assistance_commingled_asset_exclusion_period_months
              )
            )
          )
          or (
            asset_is_payment_set_aside_under_ssi_approved_pass
            and asset_separated_from_other_funds
          )
          or asset_is_radiation_exposure_compensation_act_compensation
          or (
            asset_owner_receives_ssi_or_tca_benefits
            and asset_owner_resides_in_mixed_food_stamp_household
          )
          or asset_is_uniform_relocation_assistance_reimbursement
          or asset_is_wartime_relocation_civilians_payment
          or asset_is_nazi_persecution_victim_payment
          or asset_is_crime_victim_compensation_program_payment
          or asset_is_eeoicp_payment
          or asset_is_assiniboine_fort_belknap_or_fort_peck_per_capita_or_interest_payment
          or asset_is_blackfeet_grosventre_assiniboine_or_papago_payment
          or asset_is_chippewas_lake_superior_per_capita_or_trust_fund
