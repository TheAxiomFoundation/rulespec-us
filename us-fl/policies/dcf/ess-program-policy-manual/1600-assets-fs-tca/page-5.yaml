format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-5
  summary: |-
    If a challenge to presumed account ownership is successful, account funds are not counted as the individual's asset; if unsuccessful, they are considered an asset. Joint "or" bank accounts are entirely available unless proved to be convenience accounts. For real property, only the individual's ownership interest is included, equal shares are presumed without documentation, and a share that cannot be sold because another owner refuses consent is not countable. Assets are available with unrestricted access or representative access, while legal restrictions beyond the individual's control make them unavailable unless caused or requested by the individual. Jointly owned assets of separate assistance groups are available unless shown unavailable, and an indivisible jointly owned asset is excluded when access depends on a refusing joint owner, except for negotiable financial instruments.
rules:
  - name: financial_account_funds_countable_as_asset_to_individual
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual Chapter 1600, Program FS 2, joint financial account ownership
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-5
              excerpt: If the challenge is successful, do not count the funds ... If the challenge ... is not successful, you must consider the funds as an asset.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          account_is_checking_savings_certificate_of_deposit_or_other_joint_financial_account
          and individual_has_presumed_ownership_of_funds_in_account
          and (
            not individual_alleges_funds_in_account_belong_to_someone_else
            or not individual_successfully_challenged_presumption_of_ownership_for_account
          )

  - name: or_joint_bank_account_entirely_available_to_individual
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual Chapter 1600, Program FS 2, joint bank account setup
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-5
              excerpt: Accounts set up as John or Jane Doe are considered entirely available ... unless ... funds belong entirely to the other ... and ... convenience account.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          financial_account_set_up_as_or_joint_account
          and (
            not individual_states_funds_belong_entirely_to_other_joint_account_holder
            or not individual_proves_account_is_convenience_account
          )

  - name: individual_real_property_ownership_share
    kind: derived
    entity: Asset
    dtype: Decimal
    period: Month
    source: ESS Program Policy Manual 1610.0305.02, Shared Ownership of Real Property (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-5
              excerpt: If there is no documentation defining the portion owned by each individual owner, all owners are assumed to have equal shares.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if real_property_shared_ownership_has_documentation_defining_individual_portion: documented_individual_real_property_ownership_share else: 1 / number_of_real_property_owners

  - name: real_property_share_countable_as_asset_to_individual
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1610.0305.02, Shared Ownership of Real Property (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-5
              excerpt: If the individual cannot sell his share ... without the consent of the other owner and the other owner refuses ... the property cannot be considered a countable asset.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_owns_share_of_real_property
          and (
            not individual_cannot_sell_share_without_other_owner_consent
            or not other_owner_refuses_to_give_consent_to_sell_share
          )

  - name: asset_available_to_individual
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1610.0308, General Availability (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-5
              excerpt: Assets are considered available ... when the individual has unrestricted access ... countable if ... available to a representative ... only exception ... legal restrictions were caused or requested by the individual.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_has_unrestricted_access_to_asset
          or representative_has_legal_ability_to_make_asset_available_for_individual_support_and_maintenance
          or (
            asset_unavailable_due_to_legal_restriction_or_factor_beyond_individual_control
            and legal_restriction_or_factor_was_caused_or_requested_by_individual
          )

  - name: asset_available_to_assistance_group_when_jointly_owned_by_separate_groups
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1610.0309.01, Availability of Assets (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-5
              excerpt: Assets jointly owned by separate assistance groups are included as available to each assistance group unless it is shown that any of the funds are unavailable.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_jointly_owned_by_separate_assistance_groups
          and not any_funds_in_jointly_owned_asset_shown_unavailable

  - name: entire_jointly_owned_asset_value_excluded
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1610.0309.01, Availability of Assets (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-5
              excerpt: The entire value of a jointly owned asset is excluded if it cannot be practically subdivided ... This does not apply to assets such as stocks, bonds, and other negotiable financial instruments.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          jointly_owned_asset_cannot_be_practically_subdivided
          and access_to_jointly_owned_asset_depends_on_joint_owner_agreement
          and joint_owner_refuses_to_comply
          and not asset_is_stock_bond_or_other_negotiable_financial_instrument
