format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-31
  summary: |-
    1620.0562 excludes grants, loans, gifts, and scholarships received for educational expenses as assets, even when deposited as cash in a bank, and requires information on amount and type. 1620.0564 excludes personal effects and household goods as assets. 1620.0566 treats the current market quotation as the asset value of stocks and bonds. 1620.0567 defines stock as corporate ownership and uses the most current closing price to establish stock value.
rules:
  - name: tca_loan_verification_documentation_complete
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1620.0559 (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-31
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          loan_documentation_or_information_contains_type
          and loan_documentation_or_information_contains_amount
          and loan_documentation_or_information_contains_unpaid_balance

  - name: tca_student_education_funds_excluded_as_asset
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1620.0562 (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-31
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_grant_loan_gift_or_scholarship_received_for_educational_expenses

  - name: tca_student_education_funds_information_complete
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1620.0562 (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-31
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          educational_funds_amount_information_provided
          and educational_funds_type_information_provided

  - name: tca_personal_property
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1620.0563 (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-31
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_personal_effect
          or asset_is_household_good

  - name: tca_personal_effects_and_household_goods_excluded_as_asset
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1620.0564 (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-31
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_personal_effect
          or asset_is_household_good

  - name: tca_stock
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1620.0567 (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-31
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_represents_ownership_in_corporation

  - name: tca_stock_or_bond_investment_asset_value
    kind: derived
    entity: Asset
    dtype: Money
    unit: USD
    period: Month
    source: ESS Program Policy Manual 1620.0566 (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-31
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if asset_is_stock_or_bond_investment: stock_or_bond_current_market_quotation else: 0

  - name: tca_stock_value_established_by_current_closing_price
    kind: derived
    entity: Asset
    dtype: Money
    unit: USD
    period: Month
    source: ESS Program Policy Manual 1620.0567 (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-31
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if tca_stock: stock_most_current_closing_price else: 0

  - name: tca_stock_ownership_documentation_satisfied
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1620.0567 (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-31
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          tca_stock
          and (
            stock_certificates_furnished
            or (stock_held_by_securities_firm and securities_firm_most_recent_statement_obtained)
          )
