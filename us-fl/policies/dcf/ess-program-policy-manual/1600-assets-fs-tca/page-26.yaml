  - name: tca_earned_lump_sum_payment_counted_as_earned_income_in_month_of_receipt
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1620.0520, Lump Sum Payments (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-26
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          payment_is_lump_sum_payment
          and lump_sum_payment_is_earned_income
          and payment_month_is_month_of_receipt

  - name: tca_federal_income_tax_return_excluded_as_income_in_month_of_receipt
