        formula: |-
          asset_is_nfip_payment_made_under_national_flood_insurance_act

  - name: tca_interest_earned_on_disaster_assistance_payment_excluded_from_assets
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1620.0526, Disaster Assistance (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-26
    versions:
      - effective_from: '0001-01-01'
        formula: |-
