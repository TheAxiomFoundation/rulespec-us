format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-23
  summary: |-
    1620.0406: The amount of the asset included is the actual value of the asset minus indebtedness. 1620.0407: Cash or demand-payable assets use cash value; other assets use fair market value. 1620.0409: Sale or conversion proceeds are assets rather than income and the new asset must be evaluated and verified. 1620.0410: Cash and in-kind replacements, including interest, for replacing or repairing a lost, damaged, or stolen excluded asset are excluded while used for that purpose.
rules:
  - name: asset_actual_value
    kind: derived
    entity: Asset
    dtype: Money
    period: Month
    unit: USD
    source: ESS Program Policy Manual 1620.0407
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-23
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if asset_is_cash_or_payable_in_cash_on_demand: asset_cash_value else: asset_fair_market_value
  - name: tca_asset_included_value
    kind: derived
    entity: Asset
    dtype: Money
    period: Month
    unit: USD
    source: ESS Program Policy Manual 1620.0406
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-23
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          max(0, asset_actual_value - asset_indebtedness_amount_needed_to_satisfy_contract_terms_for_ownership)
  - name: converted_asset_proceeds_considered_asset_not_income
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1620.0409
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-23
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_proceeds_from_sale_or_conversion_of_asset
  - name: newly_acquired_converted_asset_subject_to_asset_valuation_policy
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1620.0409
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-23
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_newly_acquired_item_from_conversion_or_sale
  - name: new_asset_verification_required_after_conversion
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1620.0409
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-23
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_newly_acquired_item_from_conversion_or_sale
  - name: excluded_asset_replacement_excluded_as_asset
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1620.0410
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-23
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_cash_or_in_kind_replacement_including_interest
          and replacement_is_for_lost_damaged_or_stolen_excluded_asset
          and individual_continues_to_use_replacement_for_replacement_or_repair
