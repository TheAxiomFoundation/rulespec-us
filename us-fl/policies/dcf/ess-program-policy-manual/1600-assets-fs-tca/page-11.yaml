format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-11
  summary: |-
    Business inventory related to a business or farm operation is excluded as an asset. Home property is excluded as an asset, regardless of value, if it is the individual's principal place of residence; only one residence can be excluded. A temporarily unoccupied home continues to be excluded for six months or less when the absence is for illness, casualty or natural disaster, training for future employment, or employment and the AG intends to return. A lot and partially completed home may be excluded when the individual does not already own a home and is building or intends to build a permanent home. Property may be temporarily excluded during a verified good faith effort to sell it at fair market value when no reasonable offer has been declined.
rules:
  - name: home_exclusion_residence_limit
    kind: parameter
    dtype: Count
    source: ESS Program Policy Manual 1610.0534, Home (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-11
              excerpt: Only one residence can be excluded under this provision.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1

  - name: temporary_home_unoccupancy_initial_exclusion_limit_months
    kind: parameter
    dtype: Count
    source: ESS Program Policy Manual 1610.0535, Home Temporarily Unoccupied (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-11
              excerpt: temporarily unoccupied for six months or less
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          6

  - name: temporarily_unoccupied_home_reevaluation_interval_months
    kind: parameter
    dtype: Count
    source: ESS Program Policy Manual 1610.0535, Home Temporarily Unoccupied (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-11
              excerpt: subject to reevaluation every six months
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          6

  - name: business_or_farm_inventory_property_excluded_as_asset
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1610.0530, Business Inventory (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-11
              excerpt: Property of inventory related to a business or a farm operation ... is excluded as an asset.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_property_of_inventory_related_to_business_or_farm_operation

  - name: home_property_excluded_as_asset
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1610.0534, Home (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-11
              excerpt: A home is any shelter in which the individual has an ownership interest and that is used ... as the principal place of residence.
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-11#home_exclusion_residence_limit
              output: home_exclusion_residence_limit
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (
            asset_is_shelter_in_which_individual_has_ownership_interest
            or asset_is_land_appertaining_to_that_shelter
            or asset_is_building_located_on_that_land
          )
          and shelter_used_by_individual_and_spouse_if_any_as_principal_place_of_residence
          and number_of_other_residences_excluded_under_home_provision_for_individual < home_exclusion_residence_limit

  - name: temporarily_unoccupied_home_continues_excluded_as_asset
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1610.0535, Home Temporarily Unoccupied (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-11
              excerpt: If the home is temporarily unoccupied for six months or less, it continues to be excluded if the absence is due to illness, casualty or natural disaster, training for future employment, or employment.
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-11#temporary_home_unoccupancy_initial_exclusion_limit_months
              output: temporary_home_unoccupancy_initial_exclusion_limit_months
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_temporarily_unoccupied_home
          and months_home_has_been_temporarily_unoccupied <= temporary_home_unoccupancy_initial_exclusion_limit_months
          and assistance_group_intends_to_return_to_home
          and (
            absence_from_home_due_to_illness
            or absence_from_home_due_to_casualty_or_natural_disaster
            or absence_from_home_due_to_training_for_future_employment
            or absence_from_home_due_to_employment
          )

  - name: temporarily_unoccupied_home_due_for_six_month_reevaluation
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1610.0535, Home Temporarily Unoccupied (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-11
              excerpt: If at the end of six months the AG has not returned ... Thereafter, this will be subject to reevaluation every six months.
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-11#temporary_home_unoccupancy_initial_exclusion_limit_months
              output: temporary_home_unoccupancy_initial_exclusion_limit_months
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-11#temporarily_unoccupied_home_reevaluation_interval_months
              output: temporarily_unoccupied_home_reevaluation_interval_months
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_temporarily_unoccupied_home
          and assistance_group_has_not_returned_to_home
          and months_home_has_been_temporarily_unoccupied >= temporary_home_unoccupancy_initial_exclusion_limit_months
          and months_since_last_temporary_home_exclusion_evaluation >= temporarily_unoccupied_home_reevaluation_interval_months

  - name: lot_or_partially_completed_home_excluded_for_intent_to_build_home
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1610.0536, Intent to Build a Home (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-11
              excerpt: An individual can exclude the value of a lot and a partially completed home if the individual does not already own a home; owns or is purchasing a lot with the intent to build; or is building a permanent home.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_lot_or_partially_completed_home
          and individual_does_not_already_own_home
          and (
            individual_owns_or_is_purchasing_lot_with_intent_to_build
            or individual_is_building_permanent_home
          )

  - name: property_excluded_as_asset_during_good_faith_sale_effort
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1610.0537, Good Faith Effort to Sell (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-11
              excerpt: Property may be temporarily excluded if the individual is making a good faith effort to sell it at fair market value.
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-11
              excerpt: The eligibility specialist must verify that the property is for sale and that a reasonable offer has not been declined.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_property
          and individual_making_good_faith_effort_to_sell_asset_at_fair_market_value
          and asset_is_for_sale_verified
          and no_reasonable_offer_for_asset_has_been_declined
          and asset_has_not_been_sold
          and (
            (
              not asset_is_home_property
            )
            or home_property_cannot_be_excluded_as_individual_principal_place_of_residence
          )
