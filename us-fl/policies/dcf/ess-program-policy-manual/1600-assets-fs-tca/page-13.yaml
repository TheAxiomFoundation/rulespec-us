format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-13
  summary: |-
    Student grants, loans, gifts or scholarships received for educational expenses are excluded as assets; commingled excluded funds are excluded for six months, while funds kept in a separate account are excluded without time limit. Personal property is generally excluded. Stocks, bonds, mutual fund shares, and savings bonds are countable assets valued by current market quotation, market value, or sale value as stated.
rules:
  - name: student_education_funds_commingled_exclusion_period_months
    kind: parameter
    dtype: Count
    period: Month
    source: ESS Program Policy Manual 1610.0562
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-13
              excerpt: "excluded for six months from the date they were combined"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          6

  - name: student_education_funds_excluded_as_asset
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1610.0562
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-13
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-13#student_education_funds_commingled_exclusion_period_months
              output: student_education_funds_commingled_exclusion_period_months
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_grant_loan_gift_or_scholarship_received_for_educational_expenses
          and individual_provided_amount_and_type_of_grant_loan_gift_or_scholarship
          and (
            excluded_student_education_funds_kept_in_separate_account
            or (
              excluded_student_education_funds_commingled_in_account_with_other_funds
              and months_since_excluded_student_education_funds_combined <= student_education_funds_commingled_exclusion_period_months
            )
          )

  - name: personal_property_excluded_as_asset
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1610.0563
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-13
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_personal_property

  - name: stock_or_bond_current_market_quotation_asset_value
    kind: derived
    entity: Asset
    dtype: Money
    period: Month
    unit: USD
    source: ESS Program Policy Manual 1610.0566
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-13
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if asset_is_stock_or_bond_investment and information_sufficient_to_establish_ownership_provided: current_market_quotation_value else: 0

  - name: mutual_fund_share_countable_as_asset
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1610.0570
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-13
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_mutual_fund_share

  - name: mutual_fund_share_asset_value
    kind: derived
    entity: Asset
    dtype: Money
    period: Month
    unit: USD
    source: ESS Program Policy Manual 1610.0570
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-13
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if asset_is_mutual_fund_share: current_market_quotation_value else: 0

  - name: transferable_bond_included_as_asset
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1610.0571
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-13
    versions:
