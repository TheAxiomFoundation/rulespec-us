  - name: bond_current_cash_value_before_maturity
    kind: derived
    entity: Asset
    dtype: Money
    period: Month
    unit: USD
    source: ESS Program Policy Manual 1610.0571
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-13
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if asset_is_bond_before_maturity: bond_current_market_value else: 0

  - name: savings_bond_countable_as_asset
