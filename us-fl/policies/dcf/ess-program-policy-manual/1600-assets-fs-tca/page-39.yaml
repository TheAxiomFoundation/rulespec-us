  summary: 'Program: TCA. Listed exclusions include payments under the Experimental
    Housing Allowance Program, ACTION volunteer assistance, foster-grandparent and
    service-corps supportive-service payments, federal income tax returns excluded
    as assets for 12 months from receipt, Radiation Exposure Compensation Act payments,
    Maine Indian Claims Settlement Act funds, homeless-shelter moving funds for standard
    filing units receiving Temporary Cash Assistance, Crime Victim Compensation Program
    payments, EEOICP payments, ABLE accounts, and Nazi persecution victim payments.
    ABLE account verification must be requested if questionable, if value exceeds
    $100,000, or if combined assets exceed the program limit.'
  deferred_outputs:
  - output: us-fl:policies/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-39#able_account_verification_must_be_requested
