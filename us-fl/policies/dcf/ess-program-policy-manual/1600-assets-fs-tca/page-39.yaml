          hash: sha256:4e5dc69ff243a33dcc61e9cac910dec24b3a6f4f69a3e909fa98a08fc703e9d4
  versions:
  - effective_from: '0001-01-01'
    formula: "asset_is_experimental_housing_allowance_program_payment_under_qualifying_pre_cutoff_contract\n\
      or asset_is_assistance_to_action_program_volunteer\nor asset_is_supportive_service_payment_or_expense_reimbursement_to_covered_volunteer_or_service_corps_person\n\
      or (\n  asset_is_federal_income_tax_return_refund_refundable_tax_credit_or_overwithholding\n\
      \  and months_since_asset_receipt <= tca_federal_income_tax_return_asset_exclusion_period_months\n\
      )\nor asset_is_radiation_exposure_compensation_act_payment\nor asset_is_maine_indian_claims_settlement_funds_to_member_of_listed_tribe_or_band\n\
      or (\n  asset_is_funds_paid_to_homeless_shelter_by_or_for_standard_filing_unit\n\
      \  and standard_filing_unit_receives_temporary_cash_assistance\n  and funds_enable_family_to_pay_deposits_or_moving_costs_for_stable_shelter_arrangement\n\
      )\nor asset_is_crime_victim_compensation_program_payment\nor asset_is_eeoicp_payment\n\
      or (\n  asset_is_able_account\n  and (\n    able_account_owner_meets_social_security_administration_definition_of_disabled\n\
      \    or able_account_owner_has_physician_certification_of_disability_before_required_age\n\
      \  )\n)\nor asset_is_nazi_persecution_victim_payment"
