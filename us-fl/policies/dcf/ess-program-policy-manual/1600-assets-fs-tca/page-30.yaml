format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-30
  summary: 1620.0550 Indian Land (TCA) Land held by an enrolled member of an Indian
    tribe is excluded from assets if it cannot be sold or transferred without permission.
    1620.0551 Life Estate Interest (TCA) life estate interests held by the individual,
    spouse, child, or specified relative are excluded, transfers need not be examined,
    and only income made available is counted. 1620.0553-0555 Life Insurance (TCA)
    cash value is included and must be verified if face value is $5,000 or more or
    the policy is five years old or more; availability depends on ownership and insured
    person. 1620.0558 Loans (TCA) money loaned to another person is an asset when
    verified by legal document, valued by the balance owed.
rules:
- name: life_insurance_policy_age_verification_threshold_years
  kind: parameter
  dtype: Count
  source: 1620.0553 Life Insurance (TCA); 1620.0555 Verification of Life Insurance
    (TCA)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-30
          excerpt: policy is five years old or more
  versions:
  - effective_from: '0001-01-01'
    formula: '5'
- name: local_indian_land_excluded_as_asset
  kind: derived
  entity: Asset
  dtype: Judgment
  period: Month
  source: 1620.0550 Indian Land (TCA)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: predicate
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-30
  versions:
  - effective_from: '0001-01-01'
    formula: 'asset_is_land_held_by_enrolled_member_of_indian_tribe

      and land_cannot_be_sold_or_transferred_without_permission_of_other_individuals_tribe_or_federal_agency'
- name: life_estate_interest_excluded_as_asset
  kind: derived
  entity: Asset
  dtype: Judgment
  period: Month
  source: 1620.0551 Life Estate Interest (TCA)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: predicate
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-30
  versions:
  - effective_from: '0001-01-01'
    formula: 'asset_is_life_estate_interest

      and life_estate_holder_is_individual_spouse_child_or_specified_relative'
- name: life_estate_transfer_need_not_be_examined_for_potential_penalties
  kind: derived
  entity: Asset
  dtype: Judgment
  period: Month
  source: 1620.0551 Life Estate Interest (TCA)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: predicate
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-30
  versions:
  - effective_from: '0001-01-01'
    formula: 'asset_is_life_estate_interest

      and life_estate_holder_is_individual_spouse_child_or_specified_relative'
- name: life_estate_income_counted_as_income_to_individual
  kind: derived
  entity: Asset
  dtype: Money
  period: Month
  unit: USD
  source: 1620.0551 Life Estate Interest (TCA)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-30
  versions:
  - effective_from: '0001-01-01'
    formula: 'if asset_is_life_estate_interest and life_estate_holder_is_individual_spouse_child_or_specified_relative:
      life_estate_income_made_available_to_individual else: 0'
- name: life_insurance_cash_value_must_be_verified
  kind: derived
  entity: Asset
  dtype: Judgment
  period: Month
  source: 1620.0553 Life Insurance (TCA); 1620.0555 Verification of Life Insurance
    (TCA)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-30
  versions:
  - effective_from: '0001-01-01'
    formula: "asset_is_life_insurance_or_annuity_policy\nand (\n  policy_face_value\
      \ >= life_insurance_face_value_verification_threshold\n  or policy_age_in_years\
      \ >= life_insurance_policy_age_verification_threshold_years\n)"
- name: life_insurance_policy_available_as_asset
  kind: derived
  entity: Asset
  dtype: Judgment
  period: Month
  source: 1620.0553 Life Insurance (TCA)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: predicate
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-30
  versions:
  - effective_from: '0001-01-01'
    formula: 'asset_is_life_insurance_or_annuity_policy

      and policy_owned_by_individual_and_insured_person_is_individual_or_assistance_group_member

      and

      not policy_carried_on_individual_or_tca_child_by_relative_or_other_with_excluded_needs_or_assets'
- name: life_insurance_cash_value_included_as_asset_amount
  kind: derived
  entity: Asset
  dtype: Money
  period: Month
  unit: USD
  source: 1620.0553 Life Insurance (TCA)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-30
  versions:
  - effective_from: '0001-01-01'
    formula: 'if life_insurance_policy_available_as_asset: life_insurance_policy_cash_value
      else: 0'
- name: loan_to_another_person_included_as_asset
  kind: derived
  entity: Asset
  dtype: Judgment
  period: Month
  source: 1620.0558 Loans (TCA)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: predicate
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-30
  versions:
  - effective_from: '0001-01-01'
    formula: 'asset_is_money_loaned_to_another_person

      and individual_parent_or_relative_has_legal_document_verifying_loan'
- name: loan_asset_value
  kind: derived
  entity: Asset
  dtype: Money
  period: Month
  unit: USD
  source: 1620.0558 Loans (TCA)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-30
  versions:
  - effective_from: '0001-01-01'
    formula: 'if loan_to_another_person_included_as_asset: balance_owed_to_applicant_or_recipient_on_loan
      else: 0'
imports:
- us-fl:policies/dcf/ess-program-policy-manual/1600-assets-cic-rap/page-12#life_insurance_face_value_verification_threshold
