format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-10
  summary: |-
    Disaster related insurance settlements or assistance for replacement or repair of a lost, damaged or stolen excluded asset are excluded as income and assets. Up-front diversion payments are excluded from the food stamp income budget. Earned lump sums are counted as earned income in the month received and remaining earned lump sum funds after that month are assets. Recurring SSI lump sums are unearned income. Prorated lump sum money for self-employed individuals or students is not an asset during the proration period, with commingled excluded funds excluded for six months. Disaster assistance and NFIP payments, interest on disaster assistance, and authorized energy assistance payments or allowances are excluded.
rules:
  - name: commingled_excluded_funds_exclusion_period_months
    kind: parameter
    dtype: Count
    source: ESS Program Policy Manual 1610.0521 and 1610.0526, commingled excluded funds (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-10
              excerpt: excluded for six months from the date they were combined
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          6

  - name: disaster_replacement_payment_excluded_from_food_stamp_income_and_assets
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual Chapter 1600, Program FS 7, disaster related insurance settlements or assistance exception
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-10
              excerpt: Disaster related insurance settlements or assistance ... for the replacement or repair of a lost, damaged or stolen excluded asset is excluded as income and assets
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          payment_is_disaster_related_insurance_settlement_or_assistance_from_other_source
          and payment_received_for_replacement_or_repair_of_lost_damaged_or_stolen_excluded_asset

  - name: upfront_diversion_payment_excluded_from_food_stamp_income_budget
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual Chapter 1600, Program FS 7, up-front diversion payment exception
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-10
              excerpt: Up-front diversion payments ... are excluded as income in the food stamp budget.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          payment_is_up_front_diversion_payment

  - name: earned_lump_sum_payment_counted_as_earned_income_in_month_of_receipt
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual Chapter 1600, Program FS 7, earned lump sum income
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-10
              excerpt: If the lump sum payment is earned income ... it must be counted as earned income in the month of receipt.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          payment_is_lump_sum_payment
          and lump_sum_payment_is_earned_income
          and payment_month_is_month_of_receipt

  - name: recurring_ssi_lump_sum_payment_included_as_unearned_income
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual Chapter 1600, Program FS 7, recurring SSI lump sum payments
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-10
              excerpt: Recurring SSI lump sum payments are included as unearned income.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          payment_is_recurring_ssi_lump_sum_payment

  - name: energy_assistance_payment_or_allowance_excluded
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1610.0529, Energy Assistance Payments (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-10
              excerpt: Payments or allowances made for energy assistance are excluded if federal, state, or local laws authorize them.
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-10
              excerpt: must be clearly identified as energy assistance by the legislative body
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          payment_or_allowance_is_made_for_energy_assistance
          and federal_state_or_local_law_authorizes_payment_or_allowance
          and legislative_body_clearly_identified_payment_or_allowance_as_energy_assistance

  - name: earned_lump_sum_remainder_after_receipt_month_considered_asset
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual Chapter 1600, Program FS 7, earned lump sum remainder
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-10
              excerpt: Any earned income left over after the month of receipt will be considered an asset.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_earned_lump_sum_payment_funds
          and funds_remain_after_month_of_receipt

  - name: prorated_lump_sum_money_not_included_as_asset_during_proration_period
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1610.0521, Prorated Money (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-10
              excerpt: Money received as a lump sum intended to be used over a specified period by self-employed individuals or students is not included as an asset.
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-10
              excerpt: The exclusion period covers the entire period for which the income is prorated.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_money_received_as_lump_sum_intended_for_use_over_specified_period
          and recipient_is_self_employed_individual_or_student
          and current_period_within_period_for_which_income_is_prorated

  - name: prorated_lump_sum_funds_commingled_excluded_within_six_months
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1610.0521, Prorated Money (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-10
              excerpt: excluded funds that are combined with other funds in a checking or savings account will be excluded for six months from the date they were combined
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-10#prorated_lump_sum_money_not_included_as_asset_during_proration_period
              output: prorated_lump_sum_money_not_included_as_asset_during_proration_period
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-10#commingled_excluded_funds_exclusion_period_months
              output: commingled_excluded_funds_exclusion_period_months
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          prorated_lump_sum_money_not_included_as_asset_during_proration_period
          and excluded_funds_combined_with_other_funds_in_checking_or_savings_account
          and months_since_funds_were_combined <= commingled_excluded_funds_exclusion_period_months

  - name: disaster_relief_act_payment_excluded_from_assets
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1610.0526, Disaster Assistance (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-10
              excerpt: payments, including disaster unemployment assistance, received under the Disaster Relief Act of 1974 ... from assets
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_payment_including_disaster_unemployment_assistance_received_under_disaster_relief_act

  - name: national_flood_insurance_program_payment_excluded_from_assets
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1610.0526, Disaster Assistance (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-10
              excerpt: National Flood Insurance Program (NFIP) payments made under the National Flood Insurance Act of 1968
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_nfip_payment_made_under_national_flood_insurance_act

  - name: interest_earned_on_disaster_assistance_payment_excluded_from_assets
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1610.0526, Disaster Assistance (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-10
              excerpt: Exclude interest earned on disaster assistance payments from assets.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_interest_earned_on_disaster_assistance_payment

  - name: disaster_assistance_funds_commingled_excluded_within_six_months
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1610.0526, Disaster Assistance (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-10
              excerpt: Excluded funds commingled in an account with other funds are excluded for six months from the date they were combined.
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-10#commingled_excluded_funds_exclusion_period_months
              output: commingled_excluded_funds_exclusion_period_months
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_excluded_disaster_assistance_funds
          and excluded_disaster_assistance_funds_commingled_in_account_with_other_funds
          and months_since_disaster_assistance_funds_were_combined <= commingled_excluded_funds_exclusion_period_months

  - name: disaster_assistance_funds_in_separate_account_excluded_without_time_limit
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1610.0526, Disaster Assistance (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-10
              excerpt: Excluded funds kept in a separate account are excluded from assets for an unlimited amount of time.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_excluded_disaster_assistance_funds
          and excluded_disaster_assistance_funds_kept_in_separate_account
