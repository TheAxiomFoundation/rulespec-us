format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-21
  summary: |-
    "If the joint owner(s) is an applicant/recipient enrolled or eligible for TCA, the total funds in the account are presumed to be equally shared." "If the joint owner(s) is not an applicant/recipient eligible for TCA, the entire balance of the account is considered as the asset value." Rebuttal requires written statements and financial institution documentation. For shared real property, only the individual's interest is included; without documentation owners are assumed equal, and property is not countable if the individual cannot sell without consent and the other owner refuses. "Assets that are part of an unprobated estate are not countable assets."
rules:
  - name: joint_account_ownership_successfully_rebutted
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1620.0302.03, Rebuttal of Ownership (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-21
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_joint_account
          and individual_has_unrestricted_access_to_account_funds
          and individual_does_not_consider_self_owner_of_part_or_all_account_funds
          and proof_account_funds_not_used_to_meet_individual_needs
          and individual_explains_why_name_is_on_account
          and individual_written_statement_describes_claims_reasons_transactions_and_spending
          and other_joint_owners_written_statement_confirms_information
          and financial_institution_documents_name_removed_or_no_access_to_account_funds

  - name: joint_account_name_removal_or_loss_of_access_not_transfer_of_assets
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1620.0302.03, Rebuttal of Ownership (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-21
              excerpt: "This is not considered to be a transfer of assets."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          joint_account_ownership_successfully_rebutted
          and financial_institution_documents_name_removed_or_no_access_to_account_funds

  - name: joint_account_asset_value_for_tca
    kind: derived
    entity: Asset
    dtype: Money
    period: Month
    source: ESS Program Policy Manual 1600 Assets, TCA, p. 21, joint accounts
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-21
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if joint_account_ownership_successfully_rebutted: individual_actual_ownership_interest_in_joint_account_funds else: if other_joint_owners_are_applicants_or_recipients_enrolled_or_eligible_for_tca: account_total_funds / joint_account_owner_count else: account_total_funds

  - name: real_property_owned_by_individual
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1620.0304, Ownership of Real Property (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-21
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (individual_has_legal_title_to_real_property and individual_has_right_to_control_real_property)
          or individual_has_right_to_use_real_property_without_title

  - name: shared_real_property_asset_value_for_tca
    kind: derived
    entity: Asset
    dtype: Money
    period: Month
    source: ESS Program Policy Manual 1620.0305.02, Shared Ownership of Real Property (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-21
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if asset_is_real_property_shared_with_others and shared_real_property_cannot_be_sold_without_other_owner_consent and other_real_property_owner_refuses_to_give_consent_to_sell_share: 0 else: if asset_is_real_property_shared_with_others and documentation_defines_each_owner_portion_of_real_property: real_property_total_value * individual_documented_real_property_ownership_fraction else: if asset_is_real_property_shared_with_others: real_property_total_value / real_property_owner_count else: 0

  - name: unprobated_estate_asset_countable_value_for_tca
    kind: derived
    entity: Asset
    dtype: Money
    period: Month
    source: ESS Program Policy Manual 1620.0306, Unprobated Estate (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-21
              excerpt: "Assets that are part of an unprobated estate are not countable assets."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if asset_is_part_of_unprobated_estate: 0 else: asset_value_before_unprobated_estate_exclusion
