format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-25
  summary: Verification of bank account assets requires account type, financial institution
    name and location, joint owners, and balance. Each assistance group member may
    exclude up to $1,500 of equity value in a single funeral agreement; additional
    funeral agreement amounts are assets. One burial space per assistance group member
    is excluded.
rules:
- name: local_bank_account_verification_information_complete
  kind: derived
  entity: Asset
  dtype: Judgment
  period: Month
  source: ESS Program Policy Manual 1620.0506
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-25
  versions:
  - effective_from: '0001-01-01'
    formula: 'asset_is_bank_account

      and bank_account_type_verified

      and financial_institution_name_and_location_verified

      and joint_owner_names_verified

      and bank_account_balance_verified'
- name: local_time_deposit_certificate_verification_information_complete
  kind: derived
  entity: Asset
  dtype: Judgment
  period: Month
  source: ESS Program Policy Manual 1620.0506
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-25
  versions:
  - effective_from: '0001-01-01'
    formula: 'asset_is_time_deposit_certificate

      and withdrawal_timing_verified

      and early_withdrawal_penalty_verified

      and (individual_provided_time_deposit_information or eligibility_specialist_requested_time_deposit_information_from_financial_institution)'
- name: funeral_agreement_excluded_equity_value
  kind: derived
  entity: Asset
  dtype: Money
  period: Month
  unit: USD
  source: ESS Program Policy Manual 1620.0508
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-25
      - path: versions[0].formula
        kind: import
        import:
          target: us-fl:policies/dcf/ess-program-policy-manual/1600-assets-cic-rap/page-9#funeral_agreement_equity_exclusion_limit
          output: funeral_agreement_equity_exclusion_limit
          hash: sha256:f81914130a58eb800826b5124562d7d933afd8f0959c97a69b27e4e20df0f1d8
  versions:
  - effective_from: '0001-01-01'
    formula: 'if asset_is_funeral_agreement and funeral_agreement_is_single_agreement_for_assistance_group_member:
      min(funeral_agreement_equity_value, funeral_agreement_equity_exclusion_limit)
      else: 0'
- name: funeral_agreement_included_asset_value
  kind: derived
  entity: Asset
  dtype: Money
  period: Month
  unit: USD
  source: ESS Program Policy Manual 1620.0508
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-25
      - path: versions[0].formula
        kind: import
        import:
          target: us-fl:policies/dcf/ess-program-policy-manual/1600-assets-cic-rap/page-9#funeral_agreement_equity_exclusion_limit
          output: funeral_agreement_equity_exclusion_limit
          hash: sha256:f81914130a58eb800826b5124562d7d933afd8f0959c97a69b27e4e20df0f1d8
  versions:
  - effective_from: '0001-01-01'
    formula: 'if asset_is_funeral_agreement and funeral_agreement_is_single_agreement_for_assistance_group_member:
      max(0, funeral_agreement_equity_value - funeral_agreement_equity_exclusion_limit)
      else: funeral_agreement_equity_value'
- name: burial_space_excluded_as_asset
  kind: derived
  entity: Asset
  dtype: Judgment
  period: Month
  source: ESS Program Policy Manual 1620.0516
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-25
          excerpt: One burial space per member of the assistance group is excluded.
  versions:
  - effective_from: '0001-01-01'
    formula: 'asset_is_burial_space

      and burial_space_is_one_per_assistance_group_member'
- name: funeral_agreement_verification_information_complete
  kind: derived
  entity: Asset
  dtype: Judgment
  period: Month
  source: ESS Program Policy Manual 1620.0517
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-25
  versions:
  - effective_from: '0001-01-01'
    formula: 'asset_is_funeral_agreement

      and (funeral_contract_or_agreement_copy_provided or funeral_services_provider_letter_outlines_contract_type_and_terms)'
imports:
- us-fl:policies/dcf/ess-program-policy-manual/1600-assets-cic-rap/page-9#funeral_agreement_equity_exclusion_limit
