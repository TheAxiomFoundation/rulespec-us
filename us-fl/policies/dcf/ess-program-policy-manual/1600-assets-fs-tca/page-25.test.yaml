- name: bank account verification requires all listed information
  period: 2026-01
  input:
    us-fl:policies/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-25#input.asset_is_bank_account: true
    us-fl:policies/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-25#input.bank_account_type_verified: true
    ? us-fl:policies/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-25#input.financial_institution_name_and_location_verified
    : true
    us-fl:policies/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-25#input.joint_owner_names_verified: true
    us-fl:policies/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-25#input.bank_account_balance_verified: true
  output:
    ? us-fl:policies/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-25#local_bank_account_verification_information_complete
    : holds
- name: time deposit verification can rely on financial institution request
  period: 2026-01
  input:
    us-fl:policies/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-25#input.asset_is_time_deposit_certificate: true
    us-fl:policies/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-25#input.withdrawal_timing_verified: true
    us-fl:policies/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-25#input.early_withdrawal_penalty_verified: true
    us-fl:policies/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-25#input.individual_provided_time_deposit_information: false
    ? us-fl:policies/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-25#input.eligibility_specialist_requested_time_deposit_information_from_financial_institution
    : true
  output:
    ? us-fl:policies/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-25#local_time_deposit_certificate_verification_information_complete
    : holds
- name: funeral agreement exclusion is capped and excess is included
  period: 2026-01
  input:
    us-fl:policies/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-25#input.asset_is_funeral_agreement: true
    ? us-fl:policies/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-25#input.funeral_agreement_is_single_agreement_for_assistance_group_member
    : true
    us-fl:policies/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-25#input.funeral_agreement_equity_value: 2000
  output:
    us-fl:policies/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-25#funeral_agreement_excluded_equity_value: 1500
    us-fl:policies/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-25#funeral_agreement_included_asset_value: 500
- name: burial space and funeral agreement verification conditions hold
  period: 2026-01
  input:
    us-fl:policies/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-25#input.asset_is_burial_space: true
    ? us-fl:policies/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-25#input.burial_space_is_one_per_assistance_group_member
    : true
    us-fl:policies/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-25#input.asset_is_funeral_agreement: true
    us-fl:policies/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-25#input.funeral_contract_or_agreement_copy_provided: false
    ? us-fl:policies/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-25#input.funeral_services_provider_letter_outlines_contract_type_and_terms
    : true
  output:
    us-fl:policies/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-25#burial_space_excluded_as_asset: holds
    ? us-fl:policies/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-25#funeral_agreement_verification_information_complete
    : holds
