format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-37
  summary: |-
    Use the average trade-in value listed in the NADA book with no adjustments for special equipment as fair market value in determining equity value. If a vehicle is not listed in the named vehicle guides, the individual must obtain an appraisal or produce other evidence of value. Disaster assistance payments and specified student financial assistance for attendance costs are excluded assets.
rules:
  - name: nada_vehicle_equity_value
    kind: derived
    entity: Asset
    dtype: Money
    period: Month
    unit: USD
    source: ESS Program Policy Manual 1620.0592, Verification of Vehicle Value (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-37
              excerpt: "fair market value minus indebtedness"
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-37
              excerpt: "average trade-in value listed in the National Automobile Dealers' Association (NADA) book with no adjustments"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          vehicle_nada_average_trade_in_value_without_special_equipment_adjustments - vehicle_indebtedness_amount

  - name: unlisted_vehicle_appraisal_or_other_value_evidence_required
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1620.0592, Verification of Vehicle Value (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-37
              excerpt: "not listed in the Southeastern Edition, NADA book, the Official Used Car Guide or the NADA Older Car Guide"
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-37
              excerpt: "must obtain an appraisal or produce other evidence of the vehicle's value"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_vehicle
          and not vehicle_listed_in_southeastern_nada_book
          and not vehicle_listed_in_official_used_car_guide
          and not vehicle_listed_in_nada_older_car_guide

  - name: disaster_assistance_payment_excluded_as_asset
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1620.0593, Assets Excluded by Federal Law (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-37
              excerpt: "Disaster assistance payments (P.L. 100-707). This exclusion applies to federal disaster assistance and comparable state or local assistance."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_federal_disaster_assistance_payment_under_public_law_100_707
          or asset_is_comparable_state_or_local_disaster_assistance_payment

  - name: student_financial_assistance_attendance_costs_excluded_as_asset
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1620.0593, Assets Excluded by Federal Law (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-37
              excerpt: "Effective 7/1/93"
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-37
              excerpt: "financial assistance provided under programs in Title IV of the Higher Education Act and under Bureau of Indian Affairs student assistance programs"
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-37
              excerpt: "student financial assistance for attendance costs under the Carl D. Perkins Vocational and Applied Technology Education Act is also excluded"
    versions:
      - effective_from: '1993-07-01'
        formula: |-
          asset_is_title_iv_higher_education_act_financial_assistance_for_attendance_costs
          or asset_is_bureau_of_indian_affairs_student_assistance_for_attendance_costs
          or asset_is_carl_perkins_student_financial_assistance_for_attendance_costs
