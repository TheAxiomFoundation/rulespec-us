format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-20
  summary: |-
    Assets are items of value owned singly or jointly by an individual with access to cash value on disposition. TCA SFU countable assets cannot exceed $2,000, except deemed individuals' assets are not considered. Noncash assets must be verified when total SFU assets are within $100 of the asset limit, unless the statement clearly shows excess assets or another ineligibility factor. Joint account holders with unrestricted access are presumed to own all funds unless a successful challenge shows the funds belong to someone else.
rules:
  - name: tca_standard_filing_unit_asset_limit
    kind: parameter
    dtype: Money
    unit: USD
    source: ESS Program Policy Manual 1620.0200 (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-20
              excerpt: "cannot exceed $2,000"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          2000

  - name: tca_asset_verification_margin
    kind: parameter
    dtype: Money
    unit: USD
    source: ESS Program Policy Manual 1620.0206 (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-20
              excerpt: "within $100 of the asset limit"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          100

  - name: tca_asset
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1620.0100 (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-20
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_owned_single_or_jointly_by_individual
          and individual_has_access_to_cash_value_upon_asset_disposition

  - name: tca_standard_filing_unit_assets_within_limit
    kind: derived
    entity: TanfUnit
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1620.0200 (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-20
              excerpt: "TCA deemed individuals' assets are not considered"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-20
              excerpt: "cannot exceed $2,000"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          tca_sfu_total_countable_assets_excluding_tca_deemed_individual_assets <= tca_standard_filing_unit_asset_limit

  - name: tca_noncash_asset_verification_required
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1620.0206 (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-20
              excerpt: "Verification of all assets, except cash, is required"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-20
              excerpt: "assets need not be verified"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not asset_is_cash
          and tca_sfu_total_assets >= tca_standard_filing_unit_asset_limit - tca_asset_verification_margin
          and not individual_statement_clearly_shows_total_assets_exceed_asset_limit
          and not individual_ineligible_on_another_factor

  - name: joint_financial_account_funds_counted_as_asset_to_individual
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1620.0302.01 (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-20
              excerpt: "joint account holder who has unrestricted access"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-20
              excerpt: "If the challenge is successful, do not count the funds"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_is_joint_account_holder_with_unrestricted_access_to_funds_in_joint_financial_account
          and not individual_successfully_challenged_presumption_that_funds_in_account_belong_to_someone_else
