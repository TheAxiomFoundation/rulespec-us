format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-32
  summary: |-
    "Use the bid price to determine the market value" of over-the-counter stock; non-public close-corporation stock value is determined by net assets divided by shares; mutual fund shares are generally liquid and valued like stocks; bonds are generally included as assets; Series I/J/H savings bonds are liquid, while Series E bonds must be held at least 60 days before cash conversion.
rules:
  - name: close_corporation_stock_liquidity_conversion_period_days
    kind: parameter
    dtype: Count
    source: 1620.0568 Stock in a Close Corporation (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-32
              excerpt: "cannot be converted to cash within 20 days"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          20

  - name: series_e_savings_bond_minimum_holding_period_days
    kind: parameter
    dtype: Count
    source: 1620.0572 Savings Bonds (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-32
              excerpt: "Series E bonds, must be held at least 60 days"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          60

  - name: listed_stock_verified_market_value
    kind: derived
    entity: Asset
    dtype: Money
    period: Month
    unit: USD
    source: Chapter 1600 Assets, TCA, stock valuation
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-32
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if asset_is_stock: (if stock_closing_price_shown_in_following_day_newspaper: stock_closing_price_from_following_day_newspaper else: local_securities_firm_determined_stock_value) else: 0

  - name: over_the_counter_stock_market_value
    kind: derived
    entity: Asset
    dtype: Money
    period: Month
    unit: USD
    source: Chapter 1600 Assets, TCA, over-the-counter stock valuation
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-32
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if asset_is_over_the_counter_stock: over_the_counter_stock_bid_price else: 0

  - name: stock_worthlessness_statement_supported
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: Chapter 1600 Assets, TCA, stock worthlessness verification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-32
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_stock
          and individual_states_stock_is_worthless
          and local_securities_dealer_statement_supports_stock_worthlessness

  - name: close_corporation_stock_not_convertible_within_liquid_asset_period
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: 1620.0568 Stock in a Close Corporation (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-32
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_close_corporation_stock
          and close_corporation_stock_cash_conversion_days > close_corporation_stock_liquidity_conversion_period_days

  - name: non_public_close_corporation_stock_value
    kind: derived
    entity: Asset
    dtype: Money
    period: Month
    unit: USD
    source: 1620.0568 Stock in a Close Corporation (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-32
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if asset_is_close_corporation_stock and not close_corporation_stock_traded_publicly: max(0, (close_corporation_total_assets - close_corporation_liabilities) / close_corporation_total_number_of_shares) else: 0

  - name: mutual_fund_share_generally_liquid_asset
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: 1620.0570 Mutual Fund Shares (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-32
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_mutual_fund_share

  - name: mutual_fund_share_value_by_stock_method
    kind: derived
    entity: Asset
    dtype: Money
    period: Month
    unit: USD
    source: 1620.0570 Mutual Fund Shares (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-32
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if asset_is_mutual_fund_share: (if mutual_fund_share_closing_price_shown_in_following_day_newspaper: mutual_fund_share_closing_price_from_following_day_newspaper else: mutual_fund_share_value_determined_by_local_securities_firm) else: 0

  - name: bond_generally_included_as_asset
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: 1620.0571 Bonds (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-32
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_bond

  - name: non_savings_bond_market_cash_value_before_maturity
    kind: derived
    entity: Asset
    dtype: Money
    period: Month
    unit: USD
    source: 1620.0571 Bonds (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-32
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if asset_is_bond and asset_is_bond_before_maturity: bond_current_market_value else: 0

  - name: savings_bond_not_transferable
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: 1620.0572 Savings Bonds (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-32
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_us_savings_bond

  - name: savings_bond_series_i_j_or_h_liquid_asset
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: 1620.0572 Savings Bonds (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-32
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_us_savings_bond
          and savings_bond_series_is_i_j_or_h

  - name: series_e_savings_bond_convertible_after_minimum_holding_period
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: 1620.0572 Savings Bonds (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-32
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_us_savings_bond
          and asset_is_series_e_savings_bond
          and savings_bond_days_held_from_issue >= series_e_savings_bond_minimum_holding_period_days
