format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-40
  summary: |-
    The AG must not have made an intentional assignment, sale, gift, or transfer of assets to qualify for or maintain eligibility; when these transactions are made, the AG is ineligible for two years from the transfer date. The individual may dispose of assets without penalty if assets are below the asset limit or do not affect eligibility. The net value from disposition must be assessed against the asset maximum. An individual's statement is accepted without verification for listed low-value vehicle, life-insurance, and account losses; other assets require verification or documentation. The individual may spend money from a converted asset for any reason.
rules:
  - name: tca_asset_transfer_ineligibility_period_years
    kind: parameter
    dtype: Count
    source: ESS Program Policy Manual 1620.0603, Transfer of Assets Affecting Eligibility (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-40
              excerpt: ineligible for two years from the date of the transfer
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          2

  - name: only_vehicle_statement_acceptance_net_value_limit
    kind: parameter
    dtype: Money
    unit: USD
    source: ESS Program Policy Manual 1620.0604, Net Value from Disposition (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-40
              excerpt: only vehicle owned, with a net value of less than $1,500
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1500

  - name: life_insurance_statement_acceptance_age_limit_years
    kind: parameter
    dtype: Count
    source: ESS Program Policy Manual 1620.0604, Net Value from Disposition (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-40
              excerpt: life insurance policy less than five years old
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          5

  - name: life_insurance_statement_acceptance_face_value_limit
    kind: parameter
    dtype: Money
    unit: USD
    source: ESS Program Policy Manual 1620.0604, Net Value from Disposition (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-40
              excerpt: face value of $5,000 or less
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          5000

  - name: account_statement_acceptance_balance_limit
    kind: parameter
    dtype: Money
    unit: USD
    source: ESS Program Policy Manual 1620.0604, Net Value from Disposition (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-40
              excerpt: savings or checking account with a balance of less than $200
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          200

  - name: intentional_asset_transfer_to_qualify_or_maintain_tca_eligibility
    kind: derived
    entity: TanfUnit
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1620.0603, Transfer of Assets Affecting Eligibility (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-40
              excerpt: intentional assignment, sale, gift, or transfer of assets in order to qualify for or maintain eligibility
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-40
              excerpt: determination of ineligibility must be based on the intent of the transfer rather than the value
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (
            assistance_group_made_assignment_of_asset
            or assistance_group_made_sale_of_asset
            or assistance_group_made_gift_of_asset
            or assistance_group_made_transfer_of_asset
          )
          and transaction_made_in_order_to_qualify_for_or_maintain_eligibility

  - name: assistance_group_ineligible_due_to_intentional_asset_transfer
    kind: derived
    entity: TanfUnit
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1620.0603, Transfer of Assets Affecting Eligibility (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-40
              excerpt: When these transactions are made, the AG is ineligible for two years from the date of the transfer.
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-40#intentional_asset_transfer_to_qualify_or_maintain_tca_eligibility
              output: intentional_asset_transfer_to_qualify_or_maintain_tca_eligibility
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          intentional_asset_transfer_to_qualify_or_maintain_tca_eligibility
          and current_period_within_asset_transfer_ineligibility_period

  - name: disposition_net_value_would_cause_assets_to_exceed_asset_maximum
    kind: derived
    entity: TanfUnit
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1620.0604, Net Value from Disposition (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-40
              excerpt: net value received from the disposition of assets must be assessed to determine if the value will cause the total assets to exceed the asset maximum
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          total_assets_including_net_value_from_disposition > asset_maximum

  - name: asset_disposition_without_penalty_allowed
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1620.0604, Net Value from Disposition (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-40
              excerpt: right to dispose of assets without penalty if assets are below the asset limit, or assets do not affect eligibility for any reason
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          assets_are_below_asset_limit
          or assets_do_not_affect_eligibility_for_any_reason

  - name: individual_statement_accepted_without_verification_for_asset_loss
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1620.0604, Net Value from Disposition (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-40
              excerpt: The individual's statement is accepted without verification or documentation when the asset is a listed vehicle, life insurance policy, or account.
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-40#only_vehicle_statement_acceptance_net_value_limit
              output: only_vehicle_statement_acceptance_net_value_limit
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-40#life_insurance_statement_acceptance_age_limit_years
              output: life_insurance_statement_acceptance_age_limit_years
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-40#life_insurance_statement_acceptance_face_value_limit
              output: life_insurance_statement_acceptance_face_value_limit
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-40#account_statement_acceptance_balance_limit
              output: account_statement_acceptance_balance_limit
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (
            (
              (
                asset_is_car
                or asset_is_truck
                or asset_is_van
              )
              and asset_is_only_vehicle_owned
              and asset_net_value < only_vehicle_statement_acceptance_net_value_limit
            )
            or (
              asset_is_life_insurance_policy
              and life_insurance_policy_age_years < life_insurance_statement_acceptance_age_limit_years
              and life_insurance_policy_face_value <= life_insurance_statement_acceptance_face_value_limit
            )
            or (
              (
                asset_is_savings_account
                or asset_is_checking_account
              )
              and account_balance < account_statement_acceptance_balance_limit
            )
          )

  - name: asset_loss_requires_verification_or_documentation
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1620.0604, Net Value from Disposition (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-40
              excerpt: If any other asset, the eligibility specialist must verify or document that the individual no longer owns the asset, what happened to the asset, and if sold, what happened to the proceeds.
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-40#individual_statement_accepted_without_verification_for_asset_loss
              output: individual_statement_accepted_without_verification_for_asset_loss
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not individual_statement_accepted_without_verification_for_asset_loss

  - name: converted_asset_money_may_be_spent_for_any_reason
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1620.0604, Net Value from Disposition (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-40
              excerpt: The individual always has the right to spend money from a converted asset for any reason.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_money_from_converted_asset
