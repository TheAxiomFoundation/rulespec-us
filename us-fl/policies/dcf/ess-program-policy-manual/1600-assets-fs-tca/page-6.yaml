format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-6
  summary: |-
    Assets individually or jointly owned and not easily converted to cash may be considered unavailable when the ownership interest is $1500 or less or sale would yield no significant return ($1500 or less). Trust funds and trust income are excluded when the trust and trustee meet stated restrictions. Joint assets of shelter residents are unavailable when access requires consent of a former-household joint owner. Assets unavailable due to legal restrictions are not includable.
rules:
  - name: ownership_interest_unavailability_threshold
    kind: parameter
    dtype: Money
    unit: USD
    source: ESS Program Policy Manual Chapter 1600, Program FS 3, unavailable hard-to-convert assets
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-6
              excerpt: ownership interest is $1500 or less
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1500

  - name: no_significant_return_threshold
    kind: parameter
    dtype: Money
    unit: USD
    source: ESS Program Policy Manual Chapter 1600, Program FS 3, unavailable hard-to-convert assets
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-6
              excerpt: no significant return ($1500 or less)
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1500

  - name: hard_to_convert_asset_may_be_considered_unavailable
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual Chapter 1600, Program FS 3, unavailable hard-to-convert assets
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-6
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-6#ownership_interest_unavailability_threshold
              output: ownership_interest_unavailability_threshold
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-6#no_significant_return_threshold
              output: no_significant_return_threshold
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_individually_or_jointly_owned
          and asset_cannot_easily_be_converted_to_cash
          and (
            asset_ownership_interest_amount <= ownership_interest_unavailability_threshold
            or net_sale_return_after_selling_cost <= no_significant_return_threshold
          )

  - name: low_return_joint_asset_verification_not_required
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual Chapter 1600, Program FS 3, verification note for low-return jointly owned asset
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-6
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          jointly_owned_asset_will_yield_return_to_assistance_group_less_than_half_asset_limit
          and not jointly_owned_asset_return_is_questionable
          and not assistance_group_unable_to_provide_sufficient_information_to_clearly_establish_ownership_interest
          and not assistance_group_unable_to_provide_sufficient_information_to_clearly_establish_cost_of_sale

  - name: verification_required_before_unavailability_determination
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual Chapter 1600, Program FS 3, verification note for low-return jointly owned asset
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-6
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          jointly_owned_asset_will_yield_return_to_assistance_group_less_than_half_asset_limit
          and (
            jointly_owned_asset_return_is_questionable
            or assistance_group_unable_to_provide_sufficient_information_to_clearly_establish_ownership_interest
            or assistance_group_unable_to_provide_sufficient_information_to_clearly_establish_cost_of_sale
          )

  - name: trust_funds_and_income_excluded
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1610.0309.02, Availability of Trusts (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-6
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (
            asset_is_funds_in_trust_or_transferred_to_trust
            or asset_is_income_produced_by_that_trust
          )
          and trust_arrangement_not_likely_to_cease_during_certification_period
          and no_assistance_group_member_can_revoke_trust_or_change_beneficiary
          and trustee_administering_funds_meets_source_exclusion_status
          and trust_investments_do_not_involve_business_under_assistance_group_member_control
          and (
            irrevocable_trust_established_from_assistance_group_own_funds_and_trustee_uses_funds_only_for_investment_or_named_person_education_or_medical_expenses
            or irrevocable_trust_established_from_nonassistance_group_funds_by_nonassistance_group_member
          )

  - name: shelter_resident_joint_asset_entire_value_unavailable
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1610.0309.03, Residents of Shelters (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-6
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_resides_in_shelter_for_battered_persons
          and asset_jointly_owned_by_individual_and_member_of_former_assistance_group
          and individual_cannot_access_asset_without_consent_of_joint_owner
          and joint_owner_still_resides_in_former_household

  - name: legally_restricted_asset_not_includable
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1610.0316, Legal Restrictions to Availability (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-6
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_owns_asset
          and asset_unavailable_due_to_legal_restrictions
