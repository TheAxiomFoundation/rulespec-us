format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-22
  summary: |-
    Assets are considered available to an individual when the individual has unrestricted access to the asset. An asset is countable if available to a representative with legal ability to make it available for support and maintenance. Assets not available due to legal restrictions or factors beyond the individual's control are not considered, except when legal restrictions were caused or requested by the individual. Irrevocable trust funds may be excluded when the family lacks legal ability to convert the funds to cash for support and maintenance.
rules:
  - name: asset_available_due_to_unrestricted_access
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: 1620.0308 General Availability (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-22
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_ownership_interest_established
          and individual_has_unrestricted_access_to_asset

  - name: asset_available_due_to_representative_legal_access
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: 1620.0308 General Availability (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-22
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_ownership_interest_established
          and representative_has_legal_ability_to_make_asset_available_for_individual_support_and_maintenance

  - name: trust_funds_irrevocable_for_tca
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: 1620.0309 Availability of Trusts (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-22
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_trust_funds_or_funds_transferred_to_trust_or_income_produced_by_trust
          and family_lacks_legal_ability_to_convert_trust_funds_to_cash_for_support_and_maintenance

  - name: irrevocable_trust_funds_excluded_as_asset
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: 1620.0309 Availability of Trusts (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-22
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_trust_funds_or_funds_transferred_to_trust_or_income_produced_by_trust
          and family_lacks_legal_ability_to_convert_trust_funds_to_cash_for_support_and_maintenance

  - name: asset_excluded_due_to_legal_restriction
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: 1620.0316 Legal Restrictions to Availability (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-22
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_unavailable_due_to_legal_restrictions_supported_by_evidence_and_independent_assessment
          and not legal_restrictions_were_caused_or_requested_by_individual

  - name: asset_excluded_due_to_circumstances_beyond_control
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: 1620.0321 Assets Unavailable - Circumstances Beyond Control (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-22
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_unavailable_due_to_circumstances_beyond_control_proven_by_convincing_evidence_and_independent_assessment

  - name: asset_considered_available_for_tca_asset_determination
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: 1620.0308 General Availability (TCA); 1620.0309 Availability of Trusts (TCA); 1620.0316 Legal Restrictions to Availability (TCA); 1620.0321 Assets Unavailable - Circumstances Beyond Control (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-22
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_ownership_interest_established
          and (
            individual_has_unrestricted_access_to_asset
            or representative_has_legal_ability_to_make_asset_available_for_individual_support_and_maintenance
            or not applicant_recipient_asserts_asset_unavailable
            or legal_restrictions_were_caused_or_requested_by_individual
          )
          and not asset_excluded_due_to_legal_restriction
          and not asset_excluded_due_to_circumstances_beyond_control
          and not irrevocable_trust_funds_excluded_as_asset
