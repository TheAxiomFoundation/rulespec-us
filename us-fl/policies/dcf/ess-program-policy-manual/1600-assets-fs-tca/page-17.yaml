format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-17
  summary: |-
    Program: FS. Payments received by listed Indian tribes and bands are enumerated. Payments received by the heirs of deceased Indians under the Old Age Assistance Claims Settlement Act shall not be used to deny food stamps except for per capita shares in excess of $2,000. Per capita payments (judgement awards) of $2,000 or less received under the Indian Judgement Fund Act are excluded, including trust fund distributions.
rules:
  - name: old_age_assistance_claims_settlement_per_capita_share_food_stamp_exclusion_limit
    kind: parameter
    dtype: Money
    unit: USD
    period: Month
    source: ESS Program Policy Manual 1600 Assets, FS, page 17, item k
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-17
              excerpt: "except for the per capita shares in excess of $2,000"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          2000

  - name: indian_judgment_fund_act_per_capita_payment_asset_exclusion_limit
    kind: parameter
    dtype: Money
    unit: USD
    period: Month
    source: ESS Program Policy Manual 1600 Assets, FS, page 17, item l
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-17
              excerpt: "Per capita payments (judgement awards) of $2,000 or less"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          2000

  - name: page17_indian_payment_excluded_from_food_stamp_assets
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1600 Assets, FS, page 17, items d-n
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-17
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-17#old_age_assistance_claims_settlement_per_capita_share_food_stamp_exclusion_limit
              output: old_age_assistance_claims_settlement_per_capita_share_food_stamp_exclusion_limit
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-17#indian_judgment_fund_act_per_capita_payment_asset_exclusion_limit
              output: indian_judgment_fund_act_per_capita_payment_asset_exclusion_limit
              hash: sha256:local
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          asset_is_chippewas_of_mississippi_per_capita_payment
          or asset_is_red_lake_band_of_chippewas_per_capita_or_interest_payment
          or asset_is_saginaw_chippewa_indian_tribe_of_michigan_payment
          or asset_is_turtle_mountain_band_of_chippewas_payment
          or asset_is_colville_reservation_grand_coulee_dam_settlement_act_payment
          or asset_is_white_earth_reservation_land_settlement_act_payment_to_white_earth_band
          or asset_is_submarginal_land_trust_payment_to_listed_indian_tribe
          or (asset_is_old_age_assistance_claims_settlement_payment_to_heir_of_deceased_indian and (not asset_is_old_age_assistance_claims_settlement_per_capita_share or asset_amount <= old_age_assistance_claims_settlement_per_capita_share_food_stamp_exclusion_limit))
          or (asset_is_indian_judgment_fund_act_per_capita_payment_or_trust_fund_distribution and asset_amount <= indian_judgment_fund_act_per_capita_payment_asset_exclusion_limit)
          or asset_is_navajo_or_hopi_relocation_assistance_payment
          or asset_is_grand_river_band_of_ottawa_indians_fund_disposition_payment
