format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-27
  summary: |-
    Excluded funds must be identifiable. When excluded funds are commingled in an account with other funds, assume non-excluded funds are withdrawn first.
    Payments or allowances made for energy assistance are excluded if they are authorized by federal, state, or local laws.
    Property/inventory related to a business (a farm operated for profit) is included as an asset. The net value of the business inventory is the current market value minus any indebtedness.
    Home property is excluded as an asset, regardless of its value, if it is the individual's principal place of residence. Only one residence can be excluded under this provision.
rules:
  - name: tca_excluded_funds_identifiability_requirement_satisfied
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: Chapter 1600 Assets Program TCA, excluded funds
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-27
              excerpt: Excluded funds must be identifiable.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not asset_is_claimed_as_excluded_funds
          or claimed_excluded_funds_are_identifiable

  - name: tca_commingled_account_nonexcluded_funds_treated_as_withdrawn_first
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: Chapter 1600 Assets Program TCA, commingled excluded funds
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: ordering
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-27
              excerpt: When excluded funds are commingled in an account with other funds, assume non-excluded funds are withdrawn first.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          excluded_funds_are_commingled_in_account_with_other_funds

  - name: tca_energy_assistance_payment_or_allowance_excluded_as_asset
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1620.0529, Energy Assistance Payments (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-27
              excerpt: Payments or allowances made for energy assistance are excluded if they are authorized by federal, state, or local laws.
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-27
              excerpt: These payments or allowances must be clearly identified as energy assistance by the legislative body authorizing the program or providing the funds.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_payment_or_allowance_made_for_energy_assistance
          and asset_payment_or_allowance_authorized_by_federal_state_or_local_law
          and asset_payment_or_allowance_clearly_identified_as_energy_assistance_by_authorizing_legislative_body

  - name: tca_business_inventory_included_as_asset
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1620.0531, Business Inventory (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-27
              excerpt: Property/inventory related to a business (a farm operated for profit) is included as an asset.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_property_or_inventory_related_to_business_or_farm_operated_for_profit

  - name: tca_business_inventory_net_asset_value
    kind: derived
    entity: Asset
    dtype: Money
    period: Month
    unit: USD
    source: ESS Program Policy Manual 1620.0531, Business Inventory (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-27
              excerpt: The net value of the business inventory is the current market value minus any indebtedness.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if tca_business_inventory_included_as_asset: business_inventory_current_market_value - business_inventory_indebtedness else: 0

  - name: tca_home_excluded_residence_limit
    kind: parameter
    dtype: Count
    source: ESS Program Policy Manual 1620.0534, Home (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-27
              excerpt: Only one residence can be excluded under this provision.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1

  - name: tca_home_property_excluded_as_asset
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1620.0534, Home (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-27
              excerpt: Home property is excluded as an asset, regardless of its value, if it is the individual's principal place of residence.
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-27
              excerpt: A home is any shelter in which the individual has an ownership interest.
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-27#tca_home_excluded_residence_limit
              output: tca_home_excluded_residence_limit
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_shelter_with_individual_ownership_interest
          and asset_used_by_individual_and_spouse_if_any_as_principal_place_of_residence
          and number_of_residences_excluded_under_home_provision <= tca_home_excluded_residence_limit
