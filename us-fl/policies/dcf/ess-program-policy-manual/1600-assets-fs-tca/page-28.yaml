format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-28
  summary: |-
    "When the individual, couple, child, parent or relative leaves the home and establishes residence elsewhere, the home becomes an asset ... unless a legal spouse or dependent child under 18 or under age 19 and in school, resides in the home." A temporarily unoccupied home remains excluded for six months or less when the individual clearly intends to return and the absence is due to illness, casualty loss, or natural disaster. For an absence of more than six months, the eligibility specialist must obtain a signed statement. Property may be excluded for up to nine months during a good faith effort to sell if the family agrees to use sale proceeds to repay Temporary Cash Assistance and signs the required real-property agreement.
rules:
  - name: tca_temporary_home_unoccupancy_exclusion_limit_months
    kind: parameter
    dtype: Count
    source: ESS Program Policy Manual 1620.0539.02, Home Temporarily Unoccupied (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-28
              excerpt: temporarily unoccupied for six months or less
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          6

  - name: tca_good_faith_sale_real_property_exclusion_period_months
    kind: parameter
    dtype: Count
    source: ESS Program Policy Manual 1620.0541.01, Good Faith Effort to Sell (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-28
              excerpt: excluded for up to nine months
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          9

  - name: tca_real_property_agreement_asset_limit
    kind: parameter
    dtype: Money
    unit: USD
    source: ESS Program Policy Manual 1620.0541.01, Good Faith Effort to Sell (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-28
              excerpt: exceeds the $2,000 asset limit
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          2000

  - name: qualifying_spouse_or_dependent_child_resides_in_home_for_tca_home_asset_exception
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1620.0539.01, The Home as Principal Place of Residence (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-28
              excerpt: unless a legal spouse or dependent child under 18 or under age 19 and in school, resides in the home
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          legal_spouse_resides_in_home
          or dependent_child_under_18_resides_in_home
          or dependent_child_under_age_19_and_in_school_resides_in_home

  - name: home_counted_as_tca_asset_after_residence_established_elsewhere
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1620.0539.01, The Home as Principal Place of Residence (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-28
              excerpt: leaves the home and establishes residence elsewhere, the home becomes an asset
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-28#qualifying_spouse_or_dependent_child_resides_in_home_for_tca_home_asset_exception
              output: qualifying_spouse_or_dependent_child_resides_in_home_for_tca_home_asset_exception
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_home
          and individual_couple_child_parent_or_relative_left_home
          and individual_couple_child_parent_or_relative_established_residence_elsewhere
          and not qualifying_spouse_or_dependent_child_resides_in_home_for_tca_home_asset_exception

  - name: tca_temporarily_unoccupied_home_continues_excluded_as_asset
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1620.0539.02, Home Temporarily Unoccupied (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-28
              excerpt: temporarily unoccupied for six months or less and the individual(s) clearly intends to return
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-28
              excerpt: absence is due to physical or mental illness, casualty loss, or natural disaster
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-28#tca_temporary_home_unoccupancy_exclusion_limit_months
              output: tca_temporary_home_unoccupancy_exclusion_limit_months
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_home_temporarily_unoccupied
          and months_home_temporarily_unoccupied <= tca_temporary_home_unoccupancy_exclusion_limit_months
          and individual_clearly_intends_to_return_to_home
          and (
            absence_from_home_due_to_physical_or_mental_illness
            or absence_from_home_due_to_casualty_loss
            or absence_from_home_due_to_natural_disaster
          )

  - name: tca_home_absence_signed_statement_required_after_six_months
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1620.0539.02, Home Temporarily Unoccupied (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-28
              excerpt: In situations where an absence of more than six months occurs, the eligibility specialist must obtain a signed statement
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-28#tca_temporary_home_unoccupancy_exclusion_limit_months
              output: tca_temporary_home_unoccupancy_exclusion_limit_months
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_home_temporarily_unoccupied
          and months_home_temporarily_unoccupied > tca_temporary_home_unoccupancy_exclusion_limit_months

  - name: tca_real_property_exceeds_asset_limit_for_real_property_agreement
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1620.0541.01, Good Faith Effort to Sell (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-28
              excerpt: owns real property the value of which exceeds the $2,000 asset limit (or, when combined with other assets, the total value exceeds the limit)
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-28#tca_real_property_agreement_asset_limit
              output: tca_real_property_agreement_asset_limit
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_real_property
          and (
            real_property_value > tca_real_property_agreement_asset_limit
            or family_combined_asset_value > tca_real_property_agreement_asset_limit
          )

  - name: tca_real_property_excluded_during_good_faith_sale_effort
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1620.0541.01, Good Faith Effort to Sell (TCA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-28
              excerpt: making a good faith effort to sell property, it can be excluded for up to nine months
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-28
              excerpt: family agrees to use the proceeds from the sale to repay the Temporary Cash Assistance received
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-28
              excerpt: must provide evidence of good faith effort to sell the property prior to approval for assistance
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-28
              excerpt: must sign a CF-ES 2672 form, Real Property Agreement, in the presence of a witness
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-28#tca_good_faith_sale_real_property_exclusion_period_months
              output: tca_good_faith_sale_real_property_exclusion_period_months
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-28#tca_real_property_exceeds_asset_limit_for_real_property_agreement
              output: tca_real_property_exceeds_asset_limit_for_real_property_agreement
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_real_property
          and individual_making_good_faith_effort_to_sell_property
          and evidence_of_good_faith_effort_to_sell_property_provided_prior_to_approval_for_assistance
          and family_agrees_to_use_sale_proceeds_to_repay_temporary_cash_assistance_received
          and months_property_excluded_for_good_faith_sale_effort <= tca_good_faith_sale_real_property_exclusion_period_months
          and parent_or_relative_signed_real_property_agreement_form_in_presence_of_witness
          and tca_real_property_exceeds_asset_limit_for_real_property_agreement
          and family_agrees_to_dispose_property
          and family_agrees_to_repay_temporary_cash_assistance_benefits_that_would_not_have_been_received_had_disposal_occurred_at_beginning_of_exclusion_period
