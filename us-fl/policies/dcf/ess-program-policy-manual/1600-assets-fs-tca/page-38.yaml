format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-38
  summary: |-
    Program: TCA. Excluded payments include specified Vietnam veteran child payments, Employment and Training reimbursements, LIHEAP assistance, foster and adoption assistance in stated circumstances, child income collected into Fee Collections trust accounts, food and nutrition benefits, relocation assistance, specified Indian tribe funds, and Alaska Native Corporation distributions. Fee Collections trust funds are not counted as assets, and Alaska Native Corporation per capita payments are limited to $2,000 or less per year.
rules:
  - name: alaska_native_corporation_per_capita_payment_annual_exclusion_limit
    kind: parameter
    dtype: Money
    unit: USD
    period: Year
    source: ESS Program Policy Manual 1600 Assets, TCA 35, item 12(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-38
              excerpt: "Per capita payments of $2,000 or less per year"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          2000

  - name: listed_payment_excluded_in_tca_eligibility_determination
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1600 Assets, TCA 35, items 1-12
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-38
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-38#alaska_native_corporation_per_capita_payment_annual_exclusion_limit
              output: alaska_native_corporation_per_capita_payment_annual_exclusion_limit
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (
            payment_is_to_natural_child_of_vietnam_veteran_born_with_spina_bifida_due_to_agent_orange_parental_exposure
            and not payment_birth_defect_is_spina_bifida_occulta
          )
          or payment_is_to_natural_child_of_woman_vietnam_veteran_born_with_birth_defect_resulting_in_permanent_physical_or_mental_disability
          or payment_is_employment_and_training_program_employment_related_expense_reimbursement
          or payment_is_low_income_home_energy_assistance_program_payment_administered_by_department_of_community_affairs
          or (
            payment_is_from_agency_to_foster_parent
            and payment_intended_to_provide_for_needs_of_foster_child_or_adult_placed_in_home
          )
          or (
            payment_is_adoption_assistance_payment
            and individual_whose_needs_are_paid_by_adoption_assistance_not_in_filing_unit
          )
          or (
            payment_is_income_for_child_in_department_custody
            and payment_collected_by_fee_collections
            and payment_placed_into_fee_collections_trust_account_on_behalf_of_child
          )
          or payment_is_value_of_food_stamp_act_benefits
          or payment_is_value_of_usda_donated_foods
          or payment_is_value_of_supplemental_food_assistance_under_child_nutrition_act
          or payment_is_value_of_special_food_service_program_for_children_under_national_school_lunch_act
          or payment_is_title_vii_nutrition_program_for_elderly_benefit_under_older_americans_act
          or payment_is_title_ii_uniform_relocation_assistance
          or payment_is_funds_distributed_per_capita_to_member_of_indian_tribe_under_public_law_92_254_93_134_or_94_540
          or (
            payment_is_alaska_native_corporation_per_capita_payment_including_cash_stock_dividend
            and alaska_native_corporation_per_capita_payment_amount_received_in_year <= alaska_native_corporation_per_capita_payment_annual_exclusion_limit
          )

  - name: listed_asset_excluded_in_tca_asset_determination
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1600 Assets, TCA 35, items 6, 11, and 12
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-38
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-38#alaska_native_corporation_per_capita_payment_annual_exclusion_limit
              output: alaska_native_corporation_per_capita_payment_annual_exclusion_limit
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (
            asset_is_fee_collections_trust_account_funds
            and asset_held_on_behalf_of_child_in_department_custody
          )
          or asset_is_funds_distributed_per_capita_to_member_of_indian_tribe_under_public_law_92_254_93_134_or_94_540
          or asset_is_funds_held_in_trust_for_member_of_indian_tribe_under_public_law_92_254_93_134_or_94_540
          or asset_is_initial_purchase_made_with_funds_distributed_under_public_law_93_134_or_98_64
          or (
            asset_is_alaska_native_corporation_per_capita_payment_including_cash_stock_dividend
            and alaska_native_corporation_per_capita_payment_amount_received_in_year <= alaska_native_corporation_per_capita_payment_annual_exclusion_limit
          )
          or asset_is_stock_issued_or_distributed_by_alaska_native_corporation
          or asset_is_partnership_interest_distributed_by_alaska_native_corporation
          or asset_is_land_or_interest_in_land_distributed_by_alaska_native_corporation
          or asset_is_interest_in_alaska_native_settlement_trust
