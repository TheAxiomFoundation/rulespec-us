format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-24
  summary: '"The asset value is the balance in the account on the date on which eligibility
    is established." Time deposits are assets when available, with early-withdrawal
    interest penalties deducted. Retirement accounts and pension plans are excluded,
    but distributed funds are counted as unearned income if installments or as an
    asset in the month received if lump sum. IDA funds, including interest, are disregarded
    for cash assistance eligibility when funded in part with TANF or AFIA dollars.'
  deferred_outputs:
  - output: us-fl:policies/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-24#bank_account_interest_excluded_as_unearned_income
    reason: Generated rule used a local name that collides with a sibling RuleSpec
      export. This output is deferred until it can be encoded with a semantic branch-specific
      name without creating ambiguous sibling imports.
  - output: us-fl:policies/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-24#retirement_account_or_pension_plan_excluded_as_asset
    reason: Generated rule used a local name that collides with a sibling RuleSpec
      export. This output is deferred until it can be encoded with a semantic branch-specific
      name without creating ambiguous sibling imports.
  - output: us-fl:policies/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-24#time_deposit_asset_value
    reason: Generated rule used a local name that collides with a sibling RuleSpec
      export. This output is deferred until it can be encoded with a semantic branch-specific
      name without creating ambiguous sibling imports.
rules:
- name: checking_savings_account_asset_value
  kind: derived
  entity: Asset
  dtype: Money
  period: Month
  unit: USD
  source: ESS Program Policy Manual 1620.0502, Checking and Savings Accounts (TCA)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-24
  versions:
  - effective_from: '2026-01-01'
    formula: 'if asset_is_checking_or_savings_account: checking_or_savings_account_balance_on_eligibility_date
      else: 0'
- name: time_deposit_included_as_asset
  kind: derived
  entity: Asset
  dtype: Judgment
  period: Month
