format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-8
  summary: |-
    "Interest earned on bank accounts is excluded as unearned income." "The asset value is the balance in the account on the date on which eligibility is established." Time deposits usually are available and included as assets, with pre-maturity interest penalties deducted. Retirement accounts and pension plans are excluded; distributed funds are counted as unearned income if installment payments or as an asset in the month received if lump sum. IDA funds and interest are disregarded for food stamp eligibility when the IDA is funded in part with TANF or AFIA dollars.
rules:
  - name: bank_account_asset_value
    kind: derived
    entity: Asset
    dtype: Money
    period: Month
    unit: USD
    source: ESS Program Policy Manual 1610.0501, Bank Accounts (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-8
              excerpt: The asset value is the balance in the account on the date on which eligibility is established.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if asset_is_bank_account: account_balance_on_eligibility_established_date else: 0

  - name: bank_account_interest_excluded_as_unearned_income
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1610.0501, Bank Accounts (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-8
              excerpt: Interest earned on bank accounts is excluded as unearned income.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          payment_is_interest_earned_on_bank_account

  - name: sfu_member_joint_bank_account_verified_as_convenience_account
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1610.0503, Funds in a Convenience Bank Account (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-8
              excerpt: funds in the account are not owned or accessed by any SFU member; and any SFU member's name on the account is for the sole benefit of a non-SFU member
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          sfu_member_name_on_joint_bank_account
          and sfu_claims_sfu_members_do_not_own_funds_in_account
          and verification_funds_not_owned_or_accessed_by_any_sfu_member
          and verification_sfu_member_name_on_account_for_sole_benefit_of_non_sfu_member

  - name: available_time_deposit_included_as_asset
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1610.0504, Time Deposits (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-8
              excerpt: The availability of funds is the deciding factor ... Time deposits ... usually are available to the individual and are included as assets.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_time_deposit
          and time_deposit_funds_available_to_individual

  - name: time_deposit_asset_value
    kind: derived
    entity: Asset
    dtype: Money
    period: Month
    unit: USD
    source: ESS Program Policy Manual 1610.0504, Time Deposits (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-8
              excerpt: Any interest penalties imposed for withdrawing the time deposit funds prior to maturity are deducted from the total amount
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if asset_is_time_deposit and time_deposit_funds_available_to_individual: max(0, time_deposit_total_amount - early_withdrawal_interest_penalty_amount) else: 0

  - name: retained_time_deposit_interest_asset_value
    kind: derived
    entity: Asset
    dtype: Money
    period: Month
    unit: USD
    source: ESS Program Policy Manual 1610.0504, Time Deposits (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-8
              excerpt: Any interest retained after the month it is available is included as an asset.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if time_deposit_interest_retained_after_month_available: retained_time_deposit_interest_amount else: 0

  - name: retirement_account_or_pension_plan_excluded_as_asset
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1610.0505, Retirement Accounts and Pension Plans (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-8
              excerpt: Exclude all retirement accounts and pension plans.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_retirement_account_or_pension_plan

  - name: retirement_or_pension_installment_distribution_counted_as_unearned_income
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1610.0505, Retirement Accounts and Pension Plans (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-8
              excerpt: unearned income if made available through installment payments
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          payment_is_distributed_retirement_or_pension_funds
          and payment_made_available_through_installment_payments

  - name: retirement_or_pension_lump_sum_distribution_counted_as_asset_in_month_received
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1610.0505, Retirement Accounts and Pension Plans (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-8
              excerpt: an asset in the month received if made available as a lump sum payment
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          payment_is_distributed_retirement_or_pension_funds
          and payment_made_available_as_lump_sum_payment
          and payment_received_in_current_month

  - name: individual_development_account_funds_and_interest_disregarded_for_food_stamps_eligibility
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1610.0505.07, Individual Development Accounts (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-8
              excerpt: Excluded IDAs must be funded in part with TANF or Assets for Independence Act (AFIA) dollars. Funds in an IDA, including interest accruing in such accounts, shall be disregarded
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (
            asset_is_funds_in_individual_development_account
            or asset_is_interest_accruing_in_individual_development_account
          )
          and individual_development_account_funded_in_part_with_tanf_or_afia_dollars
