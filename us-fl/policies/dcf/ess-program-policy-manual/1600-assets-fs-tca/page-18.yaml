format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-18
  summary: |-
    FS 15, items o-u list specified tribal, Indian-claims, and Indian Child Welfare Act payments, funds, assets, or income. Item r limits Seminole judgment funds to $2,000 or less. FS 18 covers ABLE accounts established for individuals meeting disability criteria before age 26 and requires verification if questionable, if the ABLE account exceeds $100,000, or if combined assets exceed the program limit. Transfer of assets provisions require transfer information at application and reviews, distinguish disposition from transfer, excuse transfers for reasons other than FS eligibility, and state a disqualification consequence for knowing transfers during the 90 days before application made to qualify for FS.
rules:
  - name: seminole_judgment_award_asset_exclusion_limit
    kind: parameter
    dtype: Money
    unit: USD
    period: Month
    source: ESS Program Policy Manual 1600 Assets, FS 15, item r
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-18
              excerpt: "Funds of $2,000 or less appropriated in satisfaction of judgments awarded to the Seminole Indians"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          2000

  - name: able_account_verification_value_threshold
    kind: parameter
    dtype: Money
    unit: USD
    period: Month
    source: ESS Program Policy Manual 1600 Assets, FS 18
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-18
              excerpt: "value of ABLE account exceeds $100,000"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          100000

  - name: asset_transfer_prior_application_lookback_period_days
    kind: parameter
    dtype: Count
    source: ESS Program Policy Manual 1610.0602, Transfer of Assets Affecting Eligibility (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-18
              excerpt: "during the 90 day period prior to application"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          90

  - name: intentional_asset_transfer_disqualification_maximum_years
    kind: parameter
    dtype: Count
    source: ESS Program Policy Manual 1610.0602, Transfer of Assets Affecting Eligibility (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-18
              excerpt: "disqualification of the assistance group for up to one year"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          1

  - name: page18_indian_payment_excluded_from_food_stamp_assets
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1600 Assets, FS 15, items o-u
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-18
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-18#seminole_judgment_award_asset_exclusion_limit
              output: seminole_judgment_award_asset_exclusion_limit
              hash: sha256:local
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          asset_is_payment_received_by_passamaquoddy_penobscot_or_houlton_band_of_maliset_under_maine_indian_claims_settlement_act
          or asset_is_fund_asset_or_income_from_puyallup_tribe_settlement_act
          or asset_is_payment_received_under_sac_and_fox_indian_claims_agreement
          or (
            asset_is_fund_appropriated_in_satisfaction_of_judgment_awarded_to_listed_seminole_indians
            and asset_amount <= seminole_judgment_award_asset_exclusion_limit
          )
          or asset_is_payment_received_under_seneca_nation_settlement_act
          or asset_is_payment_received_by_yakima_or_mescalero_apache_from_indian_claims_commission
          or asset_is_payment_from_child_and_family_service_program_under_indian_child_welfare_act

  - name: able_account_excluded_from_food_stamp_assets
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1600 Assets, FS 18
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-18
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          asset_is_achieving_better_life_experience_account
          and (
            able_account_beneficiary_meets_social_security_administration_definition_of_disabled_before_age_26
            or able_account_beneficiary_has_physician_disability_certification_before_age_26
          )

  - name: able_account_verification_must_be_requested
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1600 Assets, FS 18, verification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-18
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-18#able_account_verification_value_threshold
              output: able_account_verification_value_threshold
              hash: sha256:local
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          asset_is_achieving_better_life_experience_account
          and (
            able_account_information_is_questionable
            or asset_value > able_account_verification_value_threshold
            or value_of_combined_assets_exceeds_program_limit
          )

  - name: savings_money_disposed_to_buy_car_not_transfer_of_assets
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1610.0601, Transfer Versus Disposition (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-18
              excerpt: "dispose of money in a savings account in order to buy a car and this would not be considered a transfer of assets"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          asset_is_money_in_savings_account_disposed_to_buy_car

  - name: asset_transfer_for_reason_other_than_food_stamp_eligibility_has_no_penalty
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1610.0601, Transfer Versus Disposition (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-18
              excerpt: "transferred property for a reason other than to be eligible for FS"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          asset_was_transferred
          and asset_transfer_reason_other_than_to_be_eligible_for_food_stamps

  - name: asset_transfer_triggers_assistance_group_disqualification
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1610.0602, Transfer of Assets Affecting Eligibility (FS)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-18
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-18#asset_transfer_prior_application_lookback_period_days
              output: asset_transfer_prior_application_lookback_period_days
              hash: sha256:local
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          asset_transfer_is_intentional
          and asset_was_knowingly_transferred_by_member_of_assistance_group
          and days_before_application_asset_was_transferred <= asset_transfer_prior_application_lookback_period_days
          and asset_transferred_for_purpose_of_qualifying_for_food_stamps
