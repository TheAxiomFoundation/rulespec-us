format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-34
  summary: |-
    If good cause exists, a partial eligibility review must be set for two months in the future and every two months as needed while a good faith effort is made to obtain a court decision; the trust remains excluded until a decision. If at the end of the 90 day period the court has not been petitioned and/or good cause cannot be demonstrated, the asset is available. Court-unavailable trusts and trust interest remaining in the trust are excluded; court-available trusts are assets beginning with the decision month. Real estate that is not homestead and does not involve life estate is included unless otherwise non-excluded real property is being sold in good faith; value is county tax assessment minus debts.
rules:
  - name: trust_petition_review_interval_months
    kind: parameter
    dtype: Count
    source: ESS Program Policy Manual 1620.0575.03, Trusts good-cause review
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-34
              excerpt: "two months in the future (and every two months as needed)"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          2

  - name: trust_court_petition_initial_period_days
    kind: parameter
    dtype: Count
    source: ESS Program Policy Manual 1620.0575.03, Trust petition period
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-34
              excerpt: "at the end of the 90 day period"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          90

  - name: assistance_closure_advance_notice_days
    kind: parameter
    dtype: Count
    source: ESS Program Policy Manual 1620.0575.03, advance notice for closure
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-34
              excerpt: "allowing ten days advance notice"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10

  - name: good_cause_trust_review_interval_months
    kind: derived
    entity: Asset
    dtype: Count
    period: Month
    source: ESS Program Policy Manual 1620.0575.03, good-cause trust review
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-34
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-34#trust_petition_review_interval_months
              output: trust_petition_review_interval_months
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if asset_is_trust and trust_petition_good_cause_exists and applicant_recipient_making_good_faith_effort_to_obtain_court_decision and court_decision_on_trust_availability_not_reached: trust_petition_review_interval_months else: 0

  - name: trust_excluded_pending_court_decision_with_good_cause
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1620.0575.03, excluded trust pending court decision
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-34
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_trust
          and trust_petition_good_cause_exists
          and applicant_recipient_making_good_faith_effort_to_obtain_court_decision
          and court_decision_on_trust_availability_not_reached

  - name: trust_court_petition_period_days_for_asset
    kind: derived
    entity: Asset
    dtype: Count
    period: Month
    source: ESS Program Policy Manual 1620.0575.03, court petition period
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-34
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-34#trust_court_petition_initial_period_days
              output: trust_court_petition_initial_period_days
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if asset_is_trust: trust_court_petition_initial_period_days else: 0

  - name: trust_available_after_petition_period_without_petition_or_good_cause
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1620.0575.03, trust available after petition period
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-34
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_trust
          and trust_court_petition_period_has_ended
          and (not applicant_recipient_has_petitioned_court or not applicant_recipient_demonstrates_trust_petition_good_cause)

  - name: trust_petition_status_nonresponse_advance_notice_days
    kind: derived
    entity: Asset
    dtype: Count
    period: Month
    source: ESS Program Policy Manual 1620.0575.03, no response to petition status request
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-34
          - path: versions[0].formula
            kind: import
            import:
              target: us-fl:policies/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-34#assistance_closure_advance_notice_days
              output: assistance_closure_advance_notice_days
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if asset_is_trust and applicant_recipient_does_not_respond_to_petition_status_request and ongoing_assistance_eligibility_cannot_be_determined: assistance_closure_advance_notice_days else: 0

  - name: court_unavailable_trust_excluded_as_asset
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1620.0575.03, court decision trust unavailable
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-34
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_trust
          and court_determined_trust_unavailable

  - name: interest_remaining_in_unavailable_trust_excluded_as_income
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1620.0575.03, interest in unavailable trust
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-34
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_trust
          and court_determined_trust_unavailable
          and interest_earned_on_trust_remains_in_trust

  - name: court_available_trust_counted_as_asset_in_decision_month
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1620.0575.03, court decision trust available
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-34
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_trust
          and court_determined_trust_available
          and current_month_is_month_court_decision_reached

  - name: real_property_excluded_for_good_faith_sale_effort
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1620.0578, good faith effort to sell real property
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-34
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_otherwise_nonexcluded_real_property
          and individual_or_family_making_good_faith_effort_to_sell

  - name: real_estate_counted_as_asset_after_good_faith_sale_exclusion
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: ESS Program Policy Manual 1620.0578, real estate inclusion and sale exclusion
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-34
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_real_estate
          and not asset_is_homestead
          and not asset_involves_life_estate
          and not (asset_is_otherwise_nonexcluded_real_property and individual_or_family_making_good_faith_effort_to_sell)

  - name: real_property_value
    kind: derived
    entity: Asset
    dtype: Money
    period: Month
    unit: USD
    source: ESS Program Policy Manual 1620.0580, value of real property
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-fl/manual/dcf/ess-program-policy-manual/1600-assets-fs-tca/page-34
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if asset_is_real_property: max(0, county_tax_assessment_value - property_debts) else: 0
