format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-fl/regulation/fac/65a-1/711/block-1
  summary: |-
    To qualify for Medicaid an individual must meet the general and categorical
    requirements in 42 C.F.R. Part 435, subparts E and F (2007), with the
    exception that individuals who are neither aged nor disabled may qualify
    for breast and cervical cancer treatment. Individuals who are in Florida
    temporarily may be considered residents of the state on a case-by-case
    basis, if they indicate an intent to reside in Florida and can verify that
    they are residing in Florida.
rules:
  - name: person_considered_florida_resident_for_medicaid
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Fla. Admin. Code r. 65A-1.711 (Florida temporary residents may be considered residents on a case-by-case basis if intent and verification are shown)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-fl/regulation/fac/65a-1/711/block-1
              excerpt: "Individuals who are in Florida temporarily may be considered residents of the state on a case-by-case basis, if they indicate an intent to reside in Florida and can verify that they are residing in Florida."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_indicates_intent_to_reside_in_florida
          and person_verifies_residing_in_florida
  - name: person_may_qualify_for_breast_and_cervical_cancer_treatment_medicaid
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Fla. Admin. Code r. 65A-1.711 (exception that individuals who are neither aged nor disabled may qualify for breast and cervical cancer treatment)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-fl/regulation/fac/65a-1/711/block-1
              excerpt: "individuals who are neither aged nor disabled may qualify for breast and cervical cancer treatment"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not person_is_aged
          and not person_is_disabled
          and person_meets_breast_and_cervical_cancer_treatment_program_requirements
