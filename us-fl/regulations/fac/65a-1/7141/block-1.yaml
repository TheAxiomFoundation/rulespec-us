  summary: |-
    After an individual is determined eligible for Hospice, ICP, PACE, iBudget,
    or SMMC-LTC, the Department determines patient responsibility — the amount
    AHCA must reduce its payments toward the individual's cost of care. Patient
    responsibility is based on income remaining after deductions applied
    pursuant to 42 CFR 435.725 and 42 CFR 435.726. This process is called
    "post eligibility treatment of income."
  deferred_outputs:
    - output: us-fl:regulations/fac/65a-1/7141/block-1#patient_responsibility
      reason: |-
        Source text is an introductory/definitional clause describing the
        post-eligibility treatment of income process and pointing to 42 CFR
        435.725 and 42 CFR 435.726 for the operative deduction mechanics. The
        cited federal deduction sources are not provided as RuleSpec context,
        and this block-1 source itself does not enumerate the deduction amounts
        or formulas needed to compute patient responsibility.
