format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/7/2015
  summary: |-
    (2) A person who otherwise would be required to comply with the requirements of paragraph (1) of this subsection shall be exempt from such requirements if he or she is (A) currently subject to and complying with a work registration requirement under title IV of the Social Security Act, as amended ( 42 U.S.C. 602 ), or the Federal-State unemployment compensation system, in which case, failure by such person to comply with any work requirement to which such person is subject shall be the same as failure to comply with that requirement of paragraph (1);
rules:
  - name: title_iv_or_unemployment_work_registration_compliance_exemption_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 7 U.S.C. 2015(d)(2)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/7/2015
    versions:
      - effective_from: '2008-10-01'
        formula: |-
          person_otherwise_required_to_comply_with_paragraph_1_requirements
          and (
              (
                  currently_subject_to_title_iv_work_registration_requirement
                  and complying_with_title_iv_work_registration_requirement
              )
              or (
                  currently_subject_to_federal_state_unemployment_compensation_work_registration_requirement
                  and complying_with_federal_state_unemployment_compensation_work_registration_requirement
              )
          )
  - name: subject_work_requirement_noncompliance_treated_as_paragraph_1_failure
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 7 U.S.C. 2015(d)(2)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/7/2015
    versions:
      - effective_from: '2008-10-01'
        formula: |-
          person_otherwise_required_to_comply_with_paragraph_1_requirements
          and person_fails_to_comply_with_any_work_requirement_to_which_person_is_subject
          and (
              currently_subject_to_title_iv_work_registration_requirement
              or currently_subject_to_federal_state_unemployment_compensation_work_registration_requirement
          )
