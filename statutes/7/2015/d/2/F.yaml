format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/7/2015
  summary: |-
    (2) A person who otherwise would be required to comply with the requirements of paragraph (1) of this subsection shall be exempt from such requirements if he or she is ... (F) a person between the ages of sixteen and eighteen who is not a head of a household or who is attending school, or enrolled in an employment training program, on at least a half-time basis.
rules:
  - name: youth_exemption_lower_age_years
    kind: parameter
    dtype: Count
    source: 7 U.S.C. 2015(d)(2)(F)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/7/2015
    versions:
      - effective_from: '2008-10-01'
        formula: |-
          16

  - name: youth_exemption_upper_age_years
    kind: parameter
    dtype: Count
    source: 7 U.S.C. 2015(d)(2)(F)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/7/2015
    versions:
      - effective_from: '2008-10-01'
        formula: |-
          18

  - name: youth_work_requirement_exemption_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 7 U.S.C. 2015(d)(2)(F)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/7/2015
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/7/2015
    versions:
      - effective_from: '2008-10-01'
        formula: |-
          person_otherwise_required_to_comply_with_paragraph_1_requirements
          and person_age_years >= youth_exemption_lower_age_years
          and person_age_years < youth_exemption_upper_age_years
          and (
              not person_is_head_of_household
              or person_is_attending_school_at_least_half_time
              or person_is_enrolled_in_employment_training_program_at_least_half_time
          )
