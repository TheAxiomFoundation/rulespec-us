format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/7/2015
  summary: |-
    (2) A person who otherwise would be required to comply with the requirements of paragraph (1) of this subsection shall be exempt from such requirements if he or she is ... (C) a bona fide student enrolled at least half time in any recognized school, training program, or institution of higher education (except that any such person enrolled in an institution of higher education shall be ineligible to participate in the supplemental nutrition assistance program unless he or she meets the requirements of subsection (e) of this section);
imports:
  - us:statutes/7/2015/e
rules:
  - name: bona_fide_student_half_time_enrollment_exemption_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 7 U.S.C. 2015(d)(2)(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/7/2015
    versions:
      - effective_from: '2008-10-01'
        formula: |-
          person_otherwise_required_to_comply_with_paragraph_1_requirements
          and (
              person_is_bona_fide_student_enrolled_at_least_half_time_in_recognized_school_or_training_program
              or person_is_bona_fide_student_enrolled_at_least_half_time_in_institution_of_higher_education
          )

  - name: higher_education_student_ineligible_for_snap_participation
