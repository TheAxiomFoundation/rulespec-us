format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/7/2015
  summary: |-
    (2) A person who otherwise would be required to comply with the requirements of paragraph (1) of this subsection shall be exempt from such requirements if he or she is ... (E) employed a minimum of thirty hours per week or receiving weekly earnings which equal the minimum hourly rate under the Fair Labor Standards Act of 1938, as amended ( 29 U.S.C. 206(a)(1) ), multiplied by thirty hours;
rules:
  - name: minimum_employment_hours_per_week
    kind: parameter
    dtype: Count
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/7/2015
    versions:
      - effective_from: '2008-10-01'
        formula: |-
          30
  - name: employment_or_earnings_exemption_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/7/2015
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/7/2015
    versions:
      - effective_from: '2008-10-01'
        formula: |-
          person_otherwise_required_to_comply_with_paragraph_1_requirements
          and (
              employed_hours_per_week >= minimum_employment_hours_per_week
              or weekly_earnings >= minimum_hourly_rate_under_fair_labor_standards_act * minimum_employment_hours_per_week
          )
