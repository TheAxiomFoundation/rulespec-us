format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/7/2015
  summary: |-
    (b) Fraud and misrepresentation; disqualification penalties; ineligibility period; applicable procedures (1) Any person who has been found by any State or Federal court or administrative agency to have intentionally (A) made a false or misleading statement, or misrepresented, concealed or withheld facts, or (B) committed any act that constitutes a violation of this chapter, the regulations issued thereunder, or any State statute, for the purpose of using, presenting, transferring, acquiring, receiving, or possessing program benefits shall, immediately upon the rendering of such determination, become ineligible for further participation in the program— (i) for a period of 1 year upon the first occasion of any such determination; (ii) for a period of 2 years upon— (I) the second occasion of any such determination; or (II) the first occasion of a finding by a Federal, State, or local court of the trading of a controlled substance (as defined in section 802 of title 21 ) for benefits; and (iii) permanently upon— (I) the third occasion of any such determination; (II) the second occasion of a finding by a Federal, State, or local court of the trading of a controlled substance (as defined in section 802 of title 21 ) for benefits; (III) the first occasion of a finding by a Federal, State, or local court of the trading of firearms, ammunition, or explosives for benefits; or (IV) a conviction of an offense under subsection (b) or (c) of section 2024 of this title involving an item covered by subsection (b) or (c) of section 2024 of this title having a value of $500 or more. During the period of such ineligibility, no household shall receive increased benefits under this chapter as the result of a member of such household having been disqualified under this subsection.
rules:
  - name: one_year_ineligibility_period_years
    kind: parameter
    dtype: Count
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/7/2015
    versions:
      - effective_from: '2008-10-01'
        formula: |-
          1
  - name: two_year_ineligibility_period_years
    kind: parameter
    dtype: Count
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/7/2015
    versions:
      - effective_from: '2008-10-01'
        formula: |-
          2
  - name: high_value_covered_item_threshold
    kind: parameter
    dtype: Money
    unit: USD
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/7/2015
          - path: unit
            kind: unit
            source:
              corpus_citation_path: us/statute/7/2015
    versions:
      - effective_from: '2008-10-01'
        formula: |-
          500
  - name: intentional_program_violation_determination
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/7/2015
    versions:
      - effective_from: '2008-10-01'
        formula: |-
          (
              state_or_federal_court_or_administrative_agency_found_intentional_false_or_misleading_statement_or_misrepresentation_concealment_or_withholding
              or state_or_federal_court_or_administrative_agency_found_intentional_violation_of_snap_law_regulations_or_state_statute
          )
          and found_conduct_for_purpose_of_using_presenting_transferring_acquiring_receiving_or_possessing_program_benefits
  - name: one_year_ineligibility_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/7/2015
    versions:
      - effective_from: '2008-10-01'
        formula: |-
          intentional_program_violation_determination
          and first_occasion_of_any_such_determination
  - name: two_year_ineligibility_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/7/2015
    versions:
      - effective_from: '2008-10-01'
        formula: |-
          (intentional_program_violation_determination and second_occasion_of_any_such_determination)
          or federal_state_or_local_court_first_found_trading_controlled_substance_for_benefits
  - name: permanent_ineligibility_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/7/2015
    versions:
      - effective_from: '2008-10-01'
        formula: |-
          (intentional_program_violation_determination and third_occasion_of_any_such_determination)
          or federal_state_or_local_court_second_found_trading_controlled_substance_for_benefits
          or federal_state_or_local_court_first_found_trading_firearms_ammunition_or_explosives_for_benefits
          or (person_convicted_under_7_usc_2024_b_or_c_involving_covered_item and section_2024_b_or_c_covered_item_value >= high_value_covered_item_threshold)
  - name: nonpermanent_ineligibility_period_years
    kind: derived
    entity: Person
    dtype: Count
    period: Month
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/7/2015
    versions:
      - effective_from: '2008-10-01'
        formula: |-
          if permanent_ineligibility_applies:
              0
          else:
              if two_year_ineligibility_applies:
                  two_year_ineligibility_period_years
              else:
                  if one_year_ineligibility_applies:
                      one_year_ineligibility_period_years
                  else: 0
  - name: person_becomes_ineligible_for_further_snap_participation
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/7/2015
    versions:
      - effective_from: '2008-10-01'
        formula: |-
          one_year_ineligibility_applies
          or two_year_ineligibility_applies
          or permanent_ineligibility_applies
  - name: household_increased_benefits_due_to_disqualified_member_barred
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/7/2015
    versions:
      - effective_from: '2008-10-01'
        formula: |-
          household_has_member_disqualified_under_this_subsection
          and household_would_receive_increased_benefits_as_result_of_member_disqualification
