format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/7/2015
  summary: |-
    (1) Any person who has been found by any State or Federal court or administrative agency to have intentionally (A) made a false or misleading statement, or misrepresented, concealed or withheld facts, or (B) committed any act that constitutes a violation of this chapter, the regulations issued thereunder, or any State statute, for the purpose of using, presenting, transferring, acquiring, receiving, or possessing program benefits shall, immediately upon the rendering of such determination, become ineligible for further participation in the program— (i) for a period of 1 year upon the first occasion of any such determination; (ii) for a period of 2 years upon— (I) the second occasion of any such determination; or (II) the first occasion of a finding by a Federal, State, or local court of the trading of a controlled substance (as defined in section 802 of title 21 ) for benefits; and (iii) permanently upon— (I) the third occasion of any such determination; (II) the second occasion of a finding by a Federal, State, or local court of the trading of a controlled substance (as defined in section 802 of title 21 ) for benefits; (III) the first occasion of a finding by a Federal, State, or local court of the trading of firearms, ammunition, or explosives for benefits; or (IV) a conviction of an offense under subsection (b) or (c) of section 2024 of this title involving an item covered by subsection (b) or (c) of section 2024 of this title having a value of $500 or more. During the period of such ineligibility, no household shall receive increased benefits under this chapter as the result of a member of such household having been disqualified under this subsection.
rules:
