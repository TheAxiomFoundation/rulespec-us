    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/7/2015
    versions:
      - effective_from: '2008-10-01'
        formula: |-
          2

  - name: firearms_ammunition_or_explosives_first_finding_occasion_number
    kind: parameter
    dtype: Count
    source: 7 U.S.C. 2015(b)(1)(iii)(III)
    metadata:
