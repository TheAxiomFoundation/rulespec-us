            kind: amount
            source:
              corpus_citation_path: us/statute/7/2015
    versions:
      - effective_from: '2008-10-01'
        formula: |-
          1

  - name: section_2024_item_value_permanent_disqualification_threshold
    kind: parameter
    dtype: Money
    unit: USD
    source: 7 U.S.C. 2015(b)(1)(iii)(IV)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/7/2015
    versions:
      - effective_from: '2008-10-01'
        formula: |-
          500

  - name: intentional_program_violation_determination
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 7 U.S.C. 2015(b)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/7/2015
    versions:
      - effective_from: '2008-10-01'
        formula: |-
          found_by_state_or_federal_court_or_administrative_agency
          and (
              intentionally_made_false_or_misleading_statement_or_misrepresented_concealed_or_withheld_facts
              or intentionally_committed_act_constituting_violation_of_chapter_regulations_or_state_statute
          )
          and act_was_for_purpose_of_using_presenting_transferring_acquiring_receiving_or_possessing_program_benefits

  - name: ineligible_for_one_year
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 7 U.S.C. 2015(b)(1)(i)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/7/2015
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/7/2015
    versions:
      - effective_from: '2008-10-01'
        formula: |-
          intentional_program_violation_determination
          and determination_occasion_number == first_determination_occasion_number

  - name: ineligible_for_two_years
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 7 U.S.C. 2015(b)(1)(ii)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/7/2015
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/7/2015
    versions:
      - effective_from: '2008-10-01'
        formula: |-
          (
              intentional_program_violation_determination
              and determination_occasion_number == second_determination_occasion_number
          )
          or (
              federal_state_or_local_court_finding_of_trading_controlled_substance_for_benefits
              and controlled_substance_trading_finding_occasion_number == controlled_substance_first_finding_occasion_number
          )

  - name: permanently_ineligible
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 7 U.S.C. 2015(b)(1)(iii)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/7/2015
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/7/2015
    versions:
      - effective_from: '2008-10-01'
        formula: |-
          (
              intentional_program_violation_determination
              and determination_occasion_number >= third_determination_occasion_number
          )
          or (
              federal_state_or_local_court_finding_of_trading_controlled_substance_for_benefits
              and controlled_substance_trading_finding_occasion_number >= controlled_substance_second_finding_occasion_number
          )
          or (
              federal_state_or_local_court_finding_of_trading_firearms_ammunition_or_explosives_for_benefits
              and firearms_ammunition_or_explosives_trading_finding_occasion_number >= firearms_ammunition_or_explosives_first_finding_occasion_number
          )
          or (
              convicted_of_offense_under_7_usc_2024_b_or_c_involving_item_covered_by_7_usc_2024_b_or_c
              and section_2024_item_value >= section_2024_item_value_permanent_disqualification_threshold
          )

  - name: ineligible_for_further_participation
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 7 U.S.C. 2015(b)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/7/2015
    versions:
      - effective_from: '2008-10-01'
        formula: |-
          ineligible_for_one_year
          or ineligible_for_two_years
          or permanently_ineligible

  - name: household_barred_from_increased_benefits_due_to_member_disqualification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 7 U.S.C. 2015(b)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/7/2015
              excerpt: no household shall receive increased benefits under this chapter
    versions:
      - effective_from: '2008-10-01'
        formula: |-
          household_has_member_disqualified_under_this_subsection_during_period_of_ineligibility
