format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/5/5566
  summary: |-
    (a) The head of the agency concerned or his designee may make any determination necessary to administer this subchapter, and when so made it is conclusive as to— (1) death or finding of death; (2) the fact of dependency under this subchapter; (3) any other status covered by this subchapter; (4) an essential date, including one on which evidence or information is received by the head of the agency concerned; and (5) whether information received concerning an employee is to be construed and acted on as an official report of death.
