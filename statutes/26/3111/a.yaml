format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/26/3111
  summary: |-
    In addition to other taxes, an excise tax is imposed on every employer equal to 6.2 percent of wages paid by the employer with respect to employment.
rules:
  - name: employer_oasdi_excise_tax_rate
    kind: parameter
    dtype: Rate
    source: 26 USC 3111(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/26/3111
              excerpt: equal to 6.2 percent
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          0.062

  - name: employer_oasdi_excise_tax
    kind: derived
    entity: Employer
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 3111(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/3111
              excerpt: wages (as defined in section 3121(a)) paid by the employer with respect to employment (as defined in section 3121(b))
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/26/3111/a#employer_oasdi_excise_tax_rate
              output: employer_oasdi_excise_tax_rate
              hash: sha256:local
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          wages * employer_oasdi_excise_tax_rate
