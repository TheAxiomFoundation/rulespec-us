- name: employer_hospital_insurance_tax_applies_to_wages
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    us:statutes/26/3111/b#input.wages: 100000
  output:
    us:statutes/26/3111/b#hospital_insurance_employer_tax_rate: 0.0145
    us:statutes/26/3111/b#hospital_insurance_employer_tax: 1450
- name: employer_hospital_insurance_tax_is_zero_when_no_wages_are_paid
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    us:statutes/26/3111/b#input.wages: 0
  output:
    us:statutes/26/3111/b#hospital_insurance_employer_tax_rate: 0.0145
    us:statutes/26/3111/b#hospital_insurance_employer_tax: 0
