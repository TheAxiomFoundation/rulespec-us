              excerpt: there shall be allowed a deduction in an amount equal to $6,000 for each qualified individual with respect to the taxpayer
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/26/151#senior_deduction_eligible
              output: senior_deduction_eligible
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/26/151#senior_deduction_amount_per_qualified_individual
              output: senior_deduction_amount_per_qualified_individual
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/26/151#senior_deduction_qualified_individual
              output: senior_deduction_qualified_individual
              hash: sha256:local
    versions:
