              excerpt: In the case of a taxable year beginning before January 1, 2029
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/26/151
              excerpt: If the taxpayer is a married individual (within the meaning of section 7703), this subparagraph shall apply only if the taxpayer and the taxpayer’s spouse file a joint return for the taxable year.
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          taxpayer_is_individual
          and taxable_year_begins_before_senior_deduction_termination
          and (
              not taxpayer_is_married_individual_within_section_7703
              or joint_return_made_by_taxpayer_and_spouse
          )

