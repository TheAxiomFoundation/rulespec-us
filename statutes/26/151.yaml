  - name: exemption_individual_eligible
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 26 USC 151(b), 151(e)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/26/151
              excerpt: An exemption of the exemption amount for the taxpayer; and an additional exemption of the exemption amount for the spouse of the taxpayer if a joint return is not made by the taxpayer and his spouse, and if the spouse ... has no gross income and is not the dependent of another taxpayer.
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/26/151
              excerpt: No exemption shall be allowed under this section with respect to any individual unless the TIN of such individual is included on the return claiming the exemption.
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          tin_included_on_return_claiming_exemption
          and (
              is_taxpayer
              or (
                  is_spouse_of_taxpayer
                  and not joint_return_made_by_taxpayer_and_spouse
                  and spouse_has_no_gross_income_for_calendar_year
                  and not spouse_is_dependent_of_another_taxpayer
              )
          )

  - name: section_151_exemption_deduction
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 151(a), 151(b), 151(c), 151(d)(5)(A), 151(e)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/151
              excerpt: the exemptions provided by this section shall be allowed as deductions in computing taxable income
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/26/151#exemption_amount
              output: exemption_amount
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/26/151#exemption_individual_eligible
              output: exemption_individual_eligible
              hash: sha256:local
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          if taxpayer_is_individual:
              exemption_amount * count_where(exemption_individual_of_tax_unit, exemption_individual_eligible)
          else:
              0

  - name: senior_deduction_qualified_individual
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 26 USC 151(d)(5)(C)(ii), 151(d)(5)(C)(iv)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/statute/26/151
              excerpt: the term “qualified individual” means— (I) the taxpayer, if the taxpayer has attained age 65 before the close of the taxable year, and (II) in the case of a joint return, the taxpayer’s spouse, if such spouse has attained age 65 before the close of the taxable year.
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/26/151
              excerpt: Clause (i) shall not apply with respect to a qualified individual unless the taxpayer includes such qualified individual’s social security number on the return of tax for the taxable year.
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          qualified_individual_social_security_number_included_on_return
          and age >= senior_deduction_age_threshold
          and (
              is_taxpayer
              or (
                  is_spouse_of_taxpayer
                  and joint_return_made_by_taxpayer_and_spouse
              )
          )

  - name: senior_deduction_modified_adjusted_gross_income
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 151(d)(5)(C)(iii)(II)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/statute/26/151
              excerpt: modified adjusted gross income means the adjusted gross income of the taxpayer for the taxable year increased by any amount excluded from gross income under section 911, 931, or 933.
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/26/911/a#section_911_amount_excluded_from_gross_income
              output: section_911_amount_excluded_from_gross_income
              hash: sha256:b128d251a0f74fc46a27e516e864e53c8d25442f5b419c7bb3bb4b607542d725
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/26/931#amount_excluded_from_gross_income_under_section_931
              output: amount_excluded_from_gross_income_under_section_931
              hash: sha256:1163e1502bf90ef95eb8738416435de4a4a90a1f9f756532fc30b0a7a727db98
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/26/933#income_excluded_from_gross_income_under_section_933
              output: income_excluded_from_gross_income_under_section_933
              hash: sha256:e9b939801362efae757d1886823555c38a5f4ea828538308fe531f3619adc72f
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          max(
              0,
              adjusted_gross_income
              + section_911_amount_excluded_from_gross_income
              + amount_excluded_from_gross_income_under_section_931
              + income_excluded_from_gross_income_under_section_933
          )

  - name: senior_deduction_phaseout_threshold
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 151(d)(5)(C)(iii)(I)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/26/151
              excerpt: exceeds $75,000 ($150,000 in the case of a joint return)
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          if joint_return_made_by_taxpayer_and_spouse:
              senior_deduction_phaseout_threshold_joint
          else:
              senior_deduction_phaseout_threshold_other

  - name: senior_deduction_amount_per_qualified_individual
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 151(d)(5)(C)(i), 151(d)(5)(C)(iii)(I)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/151
              excerpt: the $6,000 amount in clause (i) shall be reduced (but not below zero) by 6 percent of so much of the taxpayer’s modified adjusted gross income as exceeds $75,000 ($150,000 in the case of a joint return)
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/26/151#senior_deduction_modified_adjusted_gross_income
              output: senior_deduction_modified_adjusted_gross_income
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/26/151#senior_deduction_phaseout_threshold
              output: senior_deduction_phaseout_threshold
              hash: sha256:local
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          max(
              0,
              senior_deduction_base_amount
              - (
                  senior_deduction_phaseout_rate
                  * max(
                      0,
                      senior_deduction_modified_adjusted_gross_income
                      - senior_deduction_phaseout_threshold
                  )
              )
          )

  - name: senior_deduction_eligible
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: 26 USC 151(d)(5)(C)(i), 151(d)(5)(C)(v)
    metadata:
