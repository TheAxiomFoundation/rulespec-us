    : 5000
    us:statutes/26/1212/a/1#input.net_capital_loss_not_attributable_to_foreign_expropriation_loss: 12000
    us:statutes/26/1212/a/1#input.net_capital_loss_attributable_to_foreign_expropriation_loss: 0
  output:
    us:statutes/26/1212/a/1#taxable_year_in_capital_loss_carryback_period: not_holds
    us:statutes/26/1212/a/1#taxable_year_in_general_capital_loss_carryover_period: holds
    us:statutes/26/1212/a/1#taxable_year_in_foreign_expropriation_capital_loss_carryover_period: holds
    us:statutes/26/1212/a/1#corporation_capital_loss_carryback_to_taxable_year: 0
    us:statutes/26/1212/a/1#corporation_general_capital_loss_carryover_to_taxable_year: 7000
    us:statutes/26/1212/a/1#corporation_foreign_expropriation_capital_loss_carryover_to_taxable_year: 0
    us:statutes/26/1212/a/1#corporation_capital_loss_carry_amount_treated_as_short_term_capital_loss: 7000
