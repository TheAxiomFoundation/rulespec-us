- name: carryback_to_preceding_year_limited_by_net_operating_loss_rule
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    us:statutes/26/1212/a/1#input.taxable_year_precedes_loss_year: true
    us:statutes/26/1212/a/1#input.taxable_years_between_taxable_year_and_loss_year: 3
    us:statutes/26/1212/a/1#input.taxable_year_succeeds_loss_year: false
    us:statutes/26/1212/a/1#input.taxable_years_between_loss_year_and_taxable_year: 0
    us:statutes/26/1212/a/1#input.net_capital_loss_not_attributable_to_foreign_expropriation_capital_loss: 10000
    ? us:statutes/26/1212/a/1#input.capital_loss_carryback_amount_that_does_not_increase_or_produce_net_operating_loss_under_section_172_c
    : 8000
    ? us:statutes/26/1212/a/1#input.total_capital_gain_net_income_for_prior_taxable_years_to_which_loss_may_be_carried_after_required_disregard_and_clause_ii_limit
    : 0
    us:statutes/26/1212/a/1#input.net_capital_loss_not_attributable_to_foreign_expropriation_loss: 10000
    us:statutes/26/1212/a/1#input.net_capital_loss_attributable_to_foreign_expropriation_loss: 0
  output:
    us:statutes/26/1212/a/1#capital_loss_carryback_period_years: 3
    us:statutes/26/1212/a/1#general_capital_loss_carryover_period_years: 5
    us:statutes/26/1212/a/1#foreign_expropriation_capital_loss_carryover_period_years: 10
    us:statutes/26/1212/a/1#taxable_year_in_capital_loss_carryback_period: holds
    us:statutes/26/1212/a/1#taxable_year_in_general_capital_loss_carryover_period: not_holds
    us:statutes/26/1212/a/1#taxable_year_in_foreign_expropriation_capital_loss_carryover_period: not_holds
    us:statutes/26/1212/a/1#corporation_capital_loss_carryback_to_taxable_year: 8000
    us:statutes/26/1212/a/1#corporation_general_capital_loss_carryover_to_taxable_year: 0
    us:statutes/26/1212/a/1#corporation_foreign_expropriation_capital_loss_carryover_to_taxable_year: 0
    us:statutes/26/1212/a/1#corporation_capital_loss_carry_amount_treated_as_short_term_capital_loss: 8000
