format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/26/1212
  summary: |-
    (1) In general If a corporation has a net capital loss for any taxable year (hereinafter in this paragraph referred to as the “loss year”), the amount thereof shall be— (A) a capital loss carryback to each of the 3 taxable years preceding the loss year, but only to the extent— (i) such loss is not attributable to a foreign expropriation capital loss, and (ii) the carryback of such loss does not increase or produce a net operating loss (as defined in section 172(c)) for the taxable year to which it is being carried back; (B) except as provided in subparagraph (C), a capital loss carryover to each of the 5 taxable years succeeding the loss year; and (C) a capital loss carryover to each of the 10 taxable years succeeding the loss year, but only to the extent such loss is attributable to a foreign expropriation loss, and shall be treated as a short-term capital loss in each such taxable year. The entire amount of the net capital loss for any taxable year shall be carried to the earliest of the taxable years to which such loss may be carried, and the portion of such loss which shall be carried to each of the other taxable years to which such loss may be carried shall be the excess, if any, of such loss over the total of the capital gain net income for each of the prior taxable years to which such loss may be carried. For purposes of the preceding sentence, the capital gain net income for any such prior taxable year shall be computed without regard to the net capital loss for the loss year or for any taxable year thereafter. In the case of any net capital loss which cannot be carried back in full to a preceding taxable year by reason of clause (ii) of subparagraph (A), the capital gain net income for such prior taxable year shall in no case be treated as greater than the amount of such loss which can be carried back to such preceding taxable year upon the application of such clause (ii).
rules:
  - name: capital_loss_carryback_period_years
    kind: parameter
    dtype: Integer
    source: 26 USC 1212(a)(1)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/26/1212
              excerpt: "a capital loss carryback to each of the 3 taxable years preceding the loss year"
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          3

  - name: general_capital_loss_carryover_period_years
    kind: parameter
    dtype: Integer
    source: 26 USC 1212(a)(1)(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/26/1212
              excerpt: "a capital loss carryover to each of the 5 taxable years succeeding the loss year"
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          5

  - name: foreign_expropriation_capital_loss_carryover_period_years
    kind: parameter
    dtype: Integer
    source: 26 USC 1212(a)(1)(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/26/1212
              excerpt: "a capital loss carryover to each of the 10 taxable years succeeding the loss year"
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          10

  - name: taxable_year_in_capital_loss_carryback_period
    kind: derived
    entity: Corporation
    dtype: Judgment
    period: Year
    source: 26 USC 1212(a)(1)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/26/1212
              excerpt: "to each of the 3 taxable years preceding the loss year"
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          taxable_year_precedes_loss_year
          and taxable_years_between_taxable_year_and_loss_year >= 1
          and taxable_years_between_taxable_year_and_loss_year <= capital_loss_carryback_period_years

  - name: taxable_year_in_general_capital_loss_carryover_period
    kind: derived
    entity: Corporation
    dtype: Judgment
    period: Year
    source: 26 USC 1212(a)(1)(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/26/1212
              excerpt: "to each of the 5 taxable years succeeding the loss year"
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          taxable_year_succeeds_loss_year
          and taxable_years_between_loss_year_and_taxable_year >= 1
          and taxable_years_between_loss_year_and_taxable_year <= general_capital_loss_carryover_period_years

  - name: taxable_year_in_foreign_expropriation_capital_loss_carryover_period
    kind: derived
    entity: Corporation
    dtype: Judgment
    period: Year
    source: 26 USC 1212(a)(1)(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/26/1212
              excerpt: "to each of the 10 taxable years succeeding the loss year"
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          taxable_year_succeeds_loss_year
          and taxable_years_between_loss_year_and_taxable_year >= 1
          and taxable_years_between_loss_year_and_taxable_year <= foreign_expropriation_capital_loss_carryover_period_years

  - name: corporation_capital_loss_carryback_to_taxable_year
    kind: derived
    entity: Corporation
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 1212(a)(1)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/1212
              excerpt: "the amount thereof shall be... a capital loss carryback"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/26/1212
              excerpt: "only to the extent... such loss is not attributable to a foreign expropriation capital loss"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/26/1212
              excerpt: "only to the extent... the carryback of such loss does not increase or produce a net operating loss"
          - path: versions[0].formula
            kind: ordering
            source:
              corpus_citation_path: us/statute/26/1212
              excerpt: "the portion of such loss which shall be carried to each of the other taxable years... shall be the excess, if any, of such loss over the total of the capital gain net income for each of the prior taxable years"
          - path: versions[0].formula
            kind: ordering
            source:
              corpus_citation_path: us/statute/26/1212
              excerpt: "capital gain net income for any such prior taxable year shall be computed without regard to the net capital loss for the loss year or for any taxable year thereafter"
          - path: versions[0].formula
            kind: ordering
            source:
              corpus_citation_path: us/statute/26/1212
              excerpt: "capital gain net income for such prior taxable year shall in no case be treated as greater than the amount of such loss which can be carried back"
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          if taxable_year_in_capital_loss_carryback_period:
              max(
                  0,
                  min(
                      net_capital_loss_not_attributable_to_foreign_expropriation_capital_loss,
                      capital_loss_carryback_amount_that_does_not_increase_or_produce_net_operating_loss_under_section_172_c
                  )
                  - total_capital_gain_net_income_for_prior_taxable_years_to_which_loss_may_be_carried_after_required_disregard_and_clause_ii_limit
              )
          else:
              0

  - name: corporation_general_capital_loss_carryover_to_taxable_year
    kind: derived
    entity: Corporation
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 1212(a)(1)(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/1212
              excerpt: "except as provided in subparagraph (C), a capital loss carryover"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/26/1212
              excerpt: "except as provided in subparagraph (C)"
          - path: versions[0].formula
            kind: ordering
            source:
              corpus_citation_path: us/statute/26/1212
              excerpt: "the portion of such loss which shall be carried to each of the other taxable years... shall be the excess, if any, of such loss over the total of the capital gain net income for each of the prior taxable years"
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          if taxable_year_in_general_capital_loss_carryover_period:
              max(
                  0,
                  net_capital_loss_not_attributable_to_foreign_expropriation_loss
                  - total_capital_gain_net_income_for_prior_taxable_years_to_which_loss_may_be_carried_after_required_disregard_and_clause_ii_limit
              )
          else:
              0

  - name: corporation_foreign_expropriation_capital_loss_carryover_to_taxable_year
    kind: derived
    entity: Corporation
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 1212(a)(1)(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/1212
              excerpt: "a capital loss carryover to each of the 10 taxable years succeeding the loss year, but only to the extent such loss is attributable to a foreign expropriation loss"
          - path: versions[0].formula
            kind: ordering
            source:
              corpus_citation_path: us/statute/26/1212
              excerpt: "the portion of such loss which shall be carried to each of the other taxable years... shall be the excess, if any, of such loss over the total of the capital gain net income for each of the prior taxable years"
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          if taxable_year_in_foreign_expropriation_capital_loss_carryover_period:
              max(
                  0,
                  net_capital_loss_attributable_to_foreign_expropriation_loss
                  - total_capital_gain_net_income_for_prior_taxable_years_to_which_loss_may_be_carried_after_required_disregard_and_clause_ii_limit
              )
          else:
              0

  - name: corporation_capital_loss_carry_amount_treated_as_short_term_capital_loss
    kind: derived
    entity: Corporation
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 1212(a)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/1212
              excerpt: "the amount thereof shall be... a capital loss carryback... a capital loss carryover"
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/statute/26/1212
              excerpt: "and shall be treated as a short-term capital loss in each such taxable year"
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          corporation_capital_loss_carryback_to_taxable_year
          + corporation_general_capital_loss_carryover_to_taxable_year
          + corporation_foreign_expropriation_capital_loss_carryover_to_taxable_year
