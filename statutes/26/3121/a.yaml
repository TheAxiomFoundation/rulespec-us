format: rulespec/v1
module:
  status: deferred
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/26/3121
  summary: |-
    26 USC 3121(a) defines “wages” for purposes of the chapter as all remuneration for employment, including the cash value of remuneration and benefits paid in a medium other than cash, subject to enumerated exclusions in paragraphs (1) through (23), a chapter-24 regulatory nonconformity rule, and a third-party-employer treatment rule for certain payments included solely by reason of paragraph (2)(A).
  deferred_outputs:
    - output: us:statutes/26/3121/a#wages
      reason: >-
        The subsection is the definition of “wages” and must expose the final wages output.
        Computing that output faithfully requires composing all enumerated exclusions.
        Several branches depend on cited sources or mechanics that are not executable in the copied context, including paragraph (5) plan/trust/arrangement exclusions under sections 401(a), 501(a), 403(a), 408(k), 403(b), 125, 408(p), and 457(e), and the paragraph (6)(A) employee-tax branch under section 3101 where the copied section 3101 parent context is not executable. Because these unresolved branches can change the final defined wage amount, a final executable wages definition would be misleading.
    - output: us:statutes/26/3121/a#payment_or_benefit_excludable_under_section_139B_excluded_from_wages
      reason: >-
        Paragraph (23) excludes a benefit or payment that is excludable from the employee's gross income under section 139B(a), but no copied context provides an executable RuleSpec target for section 139B(a). The affected exclusion branch is deferred until that upstream exclusion is encoded.
    - output: us:statutes/26/3121/a#third_party_treated_as_employer_for_parenthetical_paragraph_2_A_wages
      reason: >-
        The final sentence treats a third party as the employer for payments included in wages solely by reason of the parenthetical matter in paragraph (2)(A), except as otherwise provided in regulations prescribed by the Secretary. No copied executable regulatory context is available to determine the regulatory exception, so this employer-treatment surface is deferred.
