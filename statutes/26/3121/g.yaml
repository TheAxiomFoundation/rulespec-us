format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/26/3121
  summary: |-
    (g) Agricultural labor For purposes of this chapter, the term “agricultural labor” includes all service performed— (1) on a farm, in the employ of any person, in connection with cultivating the soil, or in connection with raising or harvesting any agricultural or horticultural commodity, including the raising, shearing, feeding, caring for, training, and management of livestock, bees, poultry, and fur-bearing animals and wildlife; (2) in the employ of the owner or tenant or other operator of a farm, in connection with the operation, management, conservation, improvement, or maintenance of such farm and its tools and equipment, or in salvaging timber or clearing land of brush and other debris left by a hurricane, if the major part of such service is performed on a farm; (3) in connection with the production or harvesting of any commodity defined as an agricultural commodity in section 15(g) of the Agricultural Marketing Act, as amended ( 12 U.S.C. 1141j ), or in connection with the ginning of cotton, or in connection with the operation or maintenance of ditches, canals, reservoirs, or waterways, not owned or operated for profit, used exclusively for supplying and storing water for farming purposes; (4) (A) in the employ of the operator of a farm in handling, planting, drying, packing, packaging, processing, freezing, grading, storing, or delivering to storage or to market or to a carrier for transportation to market, in its unmanufactured state, any agricultural or horticultural commodity; but only if such operator produced more than one-half of the commodity with respect to which such service is performed; (B) in the employ of a group of operators of farms (other than a cooperative organization) in the performance of service described in subparagraph (A), but only if such operators produced all of the commodity with respect to which such service is performed. For purposes of this subparagraph, any unincorporated group of operators shall be deemed a cooperative organization if the number of operators comprising such group is more than 20 at any time during the calendar year in which such service is performed; (C) the provisions of subparagraphs (A) and (B) shall not be deemed to be applicable with respect to service performed in connection with commercial canning or commercial freezing or in connection with any agricultural or horticultural commodity after its delivery to a terminal market for distribution for consumption; or (5) on a farm operated for profit if such service is not in the course of the employer’s trade or business. As used in this subsection, the term “farm” includes stock, dairy, poultry, fruit, fur-bearing animal, and truck farms, plantations, ranches, nurseries, ranges, greenhouses or other similar structures used primarily for the raising of agricultural or horticultural commodities, and orchards.
