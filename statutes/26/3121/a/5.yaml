format: rulespec/v1
module:
  status: deferred
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/26/3121
  summary: |-
    (5) any payment made to, or on behalf of, an employee or his beneficiary— (A) from or to a trust described in section 401(a) which is exempt from tax under section 501(a) at the time of such payment unless such payment is made to an employee of the trust as remuneration for services rendered as such employee and not as a beneficiary of the trust, (B) under or to an annuity plan which, at the time of such payment, is a plan described in section 403(a), (C) under a simplified employee pension (as defined in section 408(k)(1)), other than any contributions described in section 408(k)(6), (D) under or to an annuity contract described in section 403(b), other than a payment for the purchase of such contract which is made by reason of a salary reduction agreement (whether evidenced by a written instrument or otherwise), (E) under or to an exempt governmental deferred compensation plan (as defined in subsection (v)(3)), (F) to supplement pension benefits under a plan or trust described in any of the foregoing provisions of this paragraph to take into account some portion or all of the increase in the cost of living (as determined by the Secretary of Labor) since retirement but only if such supplemental payments are under a plan which is treated as a welfare plan under section 3(2)(B)(ii) of the Employee Retirement Income Security Act of 1974, (G) under a cafeteria plan (within the meaning of section 125) if such payment would not be treated as wages without regard to such plan and it is reasonable to believe that (if section 125 applied for purposes of this section) section 125 would not treat any wages as constructively received, (H) under an arrangement to which section 408(p) applies, other than any elective contributions under paragraph (2)(A)(i) thereof, or (I) under a plan described in section 457(e)(11)(A)(ii) and maintained by an eligible employer (as defined in section 457(e)(1));
  deferred_outputs:
    - output: us:statutes/26/3121/a/5#payment_excluded_from_wages_under_paragraph_5
      reason: >-
        The paragraph excludes payments from wages by reference to plans, trusts,
        arrangements, and exceptions defined or described in unavailable upstream
        sources, including sections 401(a), 501(a), 403(a), 408(k)(1),
        408(k)(6), 403(b), 125, 408(p), 457(e)(11)(A)(ii), and 457(e)(1).
        Those cross-referenced definitions and exceptions are necessary to
        compute the exclusion faithfully and cannot be replaced with local
        placeholder predicates under the missing-citation protocol.
