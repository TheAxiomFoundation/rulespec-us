- name: acquisition_without_immediate_successor_employment_does_not_count_predecessor_remuneration
  period:
    period_kind: custom
    name: calendar_year
    start: '2026-01-01'
    end: '2026-12-31'
  input: {}
  tables:
    Payment:
    - ? us:statutes/26/3121/a/1#input.successor_employer_acquired_substantially_all_trade_or_business_property_from_predecessor_during_calendar_year
      : true
      ? us:statutes/26/3121/a/1#input.successor_employer_acquired_substantially_all_property_used_in_separate_unit_of_predecessor_trade_or_business_during_calendar_year
      : false
      us:statutes/26/3121/a/1#input.individual_employed_by_successor_immediately_after_acquisition: false
      us:statutes/26/3121/a/1#input.individual_employed_by_predecessor_immediately_before_acquisition: true
      ? us:statutes/26/3121/a/1#input.predecessor_remuneration_other_than_succeeding_paragraphs_paid_or_considered_paid_to_individual_before_acquisition_during_calendar_year
      : 50000
      ? us:statutes/26/3121/a/1#input.remuneration_other_than_succeeding_paragraphs_paid_to_individual_by_employer_during_calendar_year_before_payment
      : 80000
      us:statutes/26/3121/a/1#input.contribution_and_benefit_base_under_section_230_of_social_security_act: 100000
      us:statutes/26/3121/a/1#input.remuneration_paid_to_individual_by_employer_with_respect_to_employment: 10000
  output:
    us:statutes/26/3121/a/1#successor_employer_base_continuity_applies:
    - not_holds
    us:statutes/26/3121/a/1#predecessor_remuneration_counted_for_successor_base:
    - 0
    us:statutes/26/3121/a/1#remuneration_counted_toward_oasdi_base_before_payment:
    - 80000
    us:statutes/26/3121/a/1#remaining_oasdi_contribution_and_benefit_base_before_payment:
    - 20000
    us:statutes/26/3121/a/1#oasdi_wage_base_excess_excluded_remuneration:
    - 0
