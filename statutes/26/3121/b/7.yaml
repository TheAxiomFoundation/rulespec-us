format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/26/3121
  summary: |-
    26 USC 3121(b)(7) excludes from "employment" service in the employ of a State, political subdivision, or wholly owned instrumentality, except for covered transportation service; Guam or American Samoa officer/employee service; specified District of Columbia non-Federal-retirement service; specified Guam temporary or intermittent non-Guam-retirement service; service included under a section 218 Social Security Act agreement; and other-State service by an individual not a member of the relevant retirement system, subject to listed carve-outs including unemployment-relief, patient/inmate, emergency, low-paid election-worker, and fee-basis self-employment-trade-or-business service.
rules:
  - name: election_worker_remuneration_threshold_for_calendar_years_before_adjustment
    kind: parameter
    dtype: Money
    unit: USD
    source: 26 USC 3121(b)(7)(F)(iv)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/26/3121
              excerpt: "less than $1,000 with respect to service performed during any calendar year commencing on or after January 1, 1995, ending on or before December 31, 1999"
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          1000

  - name: guam_american_samoa_officer_employee_service_exception_to_state_employment_exclusion
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Year
    source: 26 USC 3121(b)(7)(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/26/3121
              excerpt: "service in the employ of the Government of Guam or the Government of American Samoa ... performed by an officer or employee thereof"
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          service_in_employ_of_government_of_guam_or_american_samoa_or_wholly_owned_instrumentality
          and service_performed_by_officer_or_employee_of_that_government_or_subdivision_or_instrumentality

  - name: district_of_columbia_non_federal_retirement_service_exception_to_state_employment_exclusion
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Year
    source: 26 USC 3121(b)(7)(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/26/3121
              excerpt: "service performed in the employ of the District of Columbia ... if such service is not covered by a retirement system established by a law of the United States"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/26/3121
              excerpt: "except that the provisions of this subparagraph shall not be applicable to service performed"
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          service_in_employ_of_district_of_columbia_or_wholly_owned_instrumentality
          and service_not_covered_by_retirement_system_established_by_law_of_united_states_other_than_fers
          and not service_in_hospital_or_penal_institution_by_patient_or_inmate
          and not district_of_columbia_section_5351_2_student_hospital_employee_service_other_than_medical_or_dental_intern_or_resident
          and not service_by_temporary_emergency_employee_for_fire_storm_snow_earthquake_flood_or_similar_emergency
          and not service_by_district_of_columbia_board_committee_or_council_member_paid_on_fee_basis

  - name: guam_temporary_or_intermittent_non_guam_retirement_service_exception_to_state_employment_exclusion
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Year
    source: 26 USC 3121(b)(7)(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/26/3121
              excerpt: "service performed in the employ of the Government of Guam ... by an employee properly classified as a temporary or intermittent employee"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/26/3121
              excerpt: "except that ... shall not be applicable to services performed by an elected official or a member of the legislature or in a hospital or penal institution by a patient or inmate"
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          service_in_employ_of_government_of_guam_or_wholly_owned_instrumentality
          and employee_properly_classified_as_temporary_or_intermittent_employee
          and service_not_covered_by_retirement_system_established_by_law_of_guam
          and not service_performed_by_elected_official
          and not service_performed_by_member_of_legislature
          and not service_in_hospital_or_penal_institution_by_patient_or_inmate

  - name: other_state_non_retirement_member_service_exception_to_state_employment_exclusion
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Year
    source: 26 USC 3121(b)(7)(F)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/26/3121
              excerpt: "service in the employ of a State (other than the District of Columbia, Guam, or American Samoa) ... by an individual who is not a member of a retirement system"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/26/3121
              excerpt: "except that the provisions of this subparagraph shall not be applicable to service performed"
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          service_in_employ_of_state_other_than_district_of_columbia_guam_or_american_samoa_or_subdivision_or_wholly_owned_instrumentality
          and individual_not_member_of_retirement_system_of_state_subdivision_or_instrumentality
          and not individual_employed_to_relieve_individual_from_unemployment
          and not service_in_hospital_home_or_other_institution_by_patient_or_inmate
          and not service_by_temporary_emergency_employee_for_fire_storm_snow_earthquake_flood_or_similar_emergency
          and not election_official_or_worker_service_with_remuneration_less_than_applicable_threshold
          and not employee_position_compensated_solely_on_fee_basis_treated_as_trade_or_business_for_net_earnings_from_self_employment

