    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    us:statutes/26/3121/l#input.agreement_entered_into_pursuant_to_this_subsection: true
    us:statutes/26/3121/l#input.employee_is_citizen_or_resident_of_united_states: true
