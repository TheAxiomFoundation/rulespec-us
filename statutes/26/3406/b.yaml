module:
  status: deferred
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/26/3406
  deferred_outputs:
    - output: us:statutes/26/3406/b#reportable_payment
      reason: >-
        Section 3406(b)(1) defines "reportable payment" by reference to
        reportable interest or dividend payments and other reportable payments.
        Those component definitions in paragraphs (2) and (3), and the threshold
        and special rules in paragraphs (4) through (8), depend on unencoded
        upstream return-reporting requirements under sections 6049(a), 6042(a),
        6044, 6041, 6041A(a), 6045, 6050A, 6050N, 6050W, 6041(a),
        6050W(e)(2), and 6050W(e)(1), and on regulations for the small-payment
        and similar-instrument exceptions. The final definition cannot be
        computed faithfully without those dependencies.
    - output: us:statutes/26/3406/b#reportable_interest_or_dividend_payment
      reason: >-
        Section 3406(b)(2) defines "reportable interest or dividend payment" by
        reference to payments required to be shown on returns required under
        sections 6049(a), 6042(a), and 6044, with money-only and patronage
        dividend special rules. The cited upstream reporting requirements are
        not available as executable RuleSpec context.
    - output: us:statutes/26/3406/b#other_reportable_payment
      reason: >-
        Section 3406(b)(3), (6), and (8) define and limit "other reportable
        payment" by reference to returns required under sections 6041,
        6041A(a), 6045, 6050A, 6050N, and 6050W, including thresholds under
        sections 6041(a), 6050W(e)(2), and 6050W(e)(1). The cited upstream
        reporting requirements and thresholds are not available as executable
        RuleSpec context.
    - output: us:statutes/26/3406/b#reportable_interest_or_dividend_payment_for_subsection_a_1_C_and_D
      reason: >-
        Section 3406(b)(2)(B) and (7) create purpose-specific exclusions for
        subsection (a)(1)(C) and (D), including patronage-dividend money
        percentage rules and window-payment interest exceptions. These depend on
        the unavailable section 6044 definition and regulations for similar
        instruments, and the generic reportable-interest-or-dividend definition
        is itself deferred.
  summary: |-
    For purposes of section 3406, "reportable payment" means any reportable interest or dividend payment and any other reportable payment. Reportable interest or dividend payments are tied to returns under sections 6049(a), 6042(a), and 6044, subject to money-only and special patronage-dividend/window-payment rules. Other reportable payments are tied to returns under sections 6041, 6041A(a), 6045, 6050A, 6050N, and 6050W, with minimum-amount, small-payment, section 6041/6041A threshold, and third-party network transaction threshold rules.
