  deferred_outputs:
    - output: us:statutes/26/3406/f#information_use_confidentiality_requirement
      reason: >-
        Section 3406(f)(1) prohibits use of information obtained under section
        3406 except for purposes of meeting requirements under section 3406 or,
        subject to section 6103 safeguards, for purposes permitted under section
        6103. The permitted-purpose exception depends on section 6103, which is
        not available as an executable RuleSpec source in the copied context.
    - output: us:statutes/26/3406/f#civil_damages_cross_reference
      reason: >-
        Section 3406(f)(2) is a cross-reference to civil damages under section
        7431. Section 7431 is not available as an executable RuleSpec source in
        the copied context, and this subsection does not itself define the
        damages computation.
  summary: |-
    No person may use information obtained under section 3406 except for purposes of meeting a section 3406 requirement or, subject to section 6103 safeguards, for purposes permitted under section 6103. For civil damages for violation, see section 7431.
