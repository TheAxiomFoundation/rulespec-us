  - name: taxable_income_for_individual_who_does_not_itemize
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 63(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/26/63
              excerpt: "In the case of an individual who does not elect to itemize his deductions for the taxable year"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/63
              excerpt: "the term “taxable income” means adjusted gross income, minus—"
    versions:
