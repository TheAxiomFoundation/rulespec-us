format: rulespec/v1
imports:
  - us:statutes/26/63/c#standard_deduction
  - us:statutes/26/163#qualified_passenger_vehicle_loan_interest_deduction
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/26/63
  summary: |-
    (a) In general Except as provided in subsection (b), for purposes of this subtitle, the term “taxable income” means gross income minus the deductions allowed by this chapter (other than the standard deduction).

    (b) Individuals who do not itemize their deductions In the case of an individual who does not elect to itemize his deductions for the taxable year, for purposes of this subtitle, the term “taxable income” means adjusted gross income, minus— (1) the standard deduction, (2) the deduction for personal exemptions provided in section 151, (3) any deduction provided in section 199A, (4) the deduction provided in section 170(p), (5) the deduction provided in section 224, (6) the deduction provided in section 225 and (7) so much of the deduction allowed by section 163(a) as is attributable to the exception under section 163(h)(4)(A).

    (d) Itemized deductions For purposes of this subtitle, the term “itemized deductions” means the deductions allowable under this chapter other than— (1) the deductions allowable in arriving at adjusted gross income, and (2) any deduction referred to in any paragraph of subsection (b).

    (e) Election to itemize (1) In general Unless an individual makes an election under this subsection for the taxable year, no itemized deduction shall be allowed for the taxable year. For purposes of this subtitle, the determination of whether a deduction is allowable under this chapter shall be made without regard to the preceding sentence. (2) Time and manner of election Any election under this subsection shall be made on the taxpayer’s return, and the Secretary shall prescribe the manner of signifying such election on the return. (3) Change of election Under regulations prescribed by the Secretary, a change of election with respect to itemized deductions for any taxable year may be made after the filing of the return for such year.

    (g) Marital status For purposes of this section, marital status shall be determined under section 7703.
