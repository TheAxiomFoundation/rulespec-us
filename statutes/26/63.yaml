format: rulespec/v1
module:
  summary: |-
    Internal Revenue Code section 63 defines taxable income. It distinguishes
    individuals who itemize from those who do not, includes the standard
    deduction only for non-itemizers, and computes taxable income after
    exemptions and applicable taxable-income deductions.
  source_verification:
    corpus_citation_path: us/statute/26/63
imports:
  - us:statutes/26/63/c
rules:
  - name: taxable_income_deductions_if_itemizing
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 63(a), 63(d), 63(e)
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          itemized_taxable_income_deductions
          + qualified_business_income_deduction
          + wagering_losses_deduction
          + tip_income_deduction
          + overtime_income_deduction
          + additional_senior_deduction
          + auto_loan_interest_deduction
  - name: taxable_income_deductions_if_not_itemizing
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 63(b), 63(c)
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          standard_deduction
          + qualified_business_income_deduction
          + charitable_deduction_for_non_itemizers
          + tip_income_deduction
          + overtime_income_deduction
          + additional_senior_deduction
          + auto_loan_interest_deduction
  - name: taxable_income_deductions
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 63(a), 63(b), 63(e)
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          if tax_unit_itemizes:
              taxable_income_deductions_if_itemizing
          else:
              taxable_income_deductions_if_not_itemizing
  - name: taxable_income
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 63(a), 63(b)
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          max(
              0,
              adjusted_gross_income
              - exemptions
              - taxable_income_deductions
          )
