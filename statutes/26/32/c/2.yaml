format: rulespec/v1
imports:
  - us:statutes/26/164/f#self_employment_tax_deduction_attributable_to_nonemployee_trade_or_business
  - us:statutes/26/1402/a#net_earnings_before_paragraph_12_adjustment
  - us:statutes/26/112
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/26/32
  summary: |-
    (2) Earned income (A) The term “earned income” means— (i) wages, salaries, tips, and other employee compensation, but only if such amounts are includible in gross income for the taxable year, plus (ii) the amount of the taxpayer’s net earnings from self-employment for the taxable year (within the meaning of section 1402(a)), but such net earnings shall be determined with regard to the deduction allowed to the taxpayer by section 164(f). (B) For purposes of subparagraph (A)— (i) the earned income of an individual shall be computed without regard to any community property laws, (ii) no amount received as a pension or annuity shall be taken into account, (iii) no amount to which section 871(a) applies (relating to income of nonresident alien individuals not connected with United States business) shall be taken into account, (iv) no amount received for services provided by an individual while the individual is an inmate at a penal institution shall be taken into account, (v) no amount described in subparagraph (A) received for service performed in work activities as defined in paragraph (4) or (7) of section 407(d) of the Social Security Act to which the taxpayer is assigned under any State program under part A of title IV of such Act shall be taken into account, but only to the extent such amount is subsidized under such State program, and (vi) a taxpayer may elect to treat amounts excluded from gross income by reason of section 112 as earned income.
rules:
