format: rulespec/v1
module:
  status: deferred
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/26/32
  summary: |-
    The term "earned income" means "wages, salaries, tips, and other employee compensation" includible in gross income, plus "net earnings from self-employment ... (within the meaning of section 1402(a))" determined with regard to section 164(f). Subparagraph (B) excludes pensions or annuities, section 871(a) amounts, inmate-service amounts, subsidized State work-activity amounts, and permits an election for section 112 excluded amounts.
  deferred_outputs:
    - output: us:statutes/26/32/c/2#earned_income
      reason: >-
        The source defines earned income by adding net earnings from self-employment
        within the meaning of section 1402(a), determined with regard to the section
        164(f) deduction. The copied RuleSpec context for us:statutes/26/1402/a is
        deferred and does not export an executable net earnings from self-employment
        amount, so the defined earned_income output cannot be computed faithfully in
        this file.
      blocked_by:
        - us:statutes/26/1402/a#net_earnings_from_self_employment
rules: []
