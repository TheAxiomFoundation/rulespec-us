format: rulespec/v1
imports:
  - us:statutes/26/1402/a#net_earnings_from_self_employment
  - us:statutes/26/1402/a#paragraph_12_deduction
  - us:statutes/26/164/f#self_employment_tax_deduction_attributable_to_nonemployee_trade_or_business
  - us:statutes/26/112#amount_excluded_from_gross_income_by_reason_of_section_112
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/26/32
  summary: |-
    "Earned income" means wages, salaries, tips, and other employee compensation includible in gross income, plus net earnings from self-employment within section 1402(a), determined with regard to the section 164(f) deduction. Pensions or annuities, section 871(a) amounts, inmate-service amounts, and subsidized State work-activity amounts are not taken into account, and a taxpayer may elect to treat section 112 excluded amounts as earned income.
rules:
  - name: taxpayer_or_spouse_of_tax_unit
    kind: data_relation
    data_relation:
      predicate: person_is_taxpayer_or_spouse_of_tax_unit
      arity: 2
      arguments:
        - Person
        - TaxUnit
    source: 26 USC 32(c)(2)(A)

  - name: employee_compensation_earned_income_before_section_112_election
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 32(c)(2)(A)(i), 26 USC 32(c)(2)(B)(ii)-(v)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/statute/26/32
              excerpt: wages, salaries, tips, and other employee compensation, but only if such amounts are includible in gross income
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/26/32
              excerpt: no amount received as a pension or annuity shall be taken into account
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/26/32
              excerpt: no amount to which section 871(a) applies
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/26/32
              excerpt: services provided by an individual while the individual is an inmate at a penal institution
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/26/32
              excerpt: service performed in work activities ... only to the extent such amount is subsidized
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          max(0,
            wages_salaries_tips_and_other_employee_compensation_includible_in_gross_income
            - pension_or_annuity_amounts_received
            - amounts_to_which_section_871_a_applies
            - amounts_received_for_services_while_inmate_at_penal_institution
            - subsidized_state_work_activity_amounts_received)

  - name: self_employment_earned_income_component
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 32(c)(2)(A)(ii)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/statute/26/32
              excerpt: net earnings from self-employment for the taxable year (within the meaning of section 1402(a))
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/32
              excerpt: determined with regard to the deduction allowed to the taxpayer by section 164(f)
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/26/1402/a#net_earnings_from_self_employment
              output: net_earnings_from_self_employment
              hash: sha256:21e6dd1b4a549f1068886076cb191871b816c1a31be693be512e6e342770a0f9
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/26/1402/a#paragraph_12_deduction
              output: paragraph_12_deduction
              hash: sha256:21e6dd1b4a549f1068886076cb191871b816c1a31be693be512e6e342770a0f9
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/26/164/f#self_employment_tax_deduction_attributable_to_nonemployee_trade_or_business
              output: self_employment_tax_deduction_attributable_to_nonemployee_trade_or_business
              hash: sha256:ca74df5d9910288610bc224b4f6d49a958a9f4a971b2b91f2fdcf848ae7ddd0c
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          net_earnings_from_self_employment
          + paragraph_12_deduction
          - self_employment_tax_deduction_attributable_to_nonemployee_trade_or_business

  - name: earned_income_before_section_112_election
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 32(c)(2)(A), 26 USC 32(c)(2)(B)(i)-(v)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/26/32/c/2#employee_compensation_earned_income_before_section_112_election
              output: employee_compensation_earned_income_before_section_112_election
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/26/32/c/2#self_employment_earned_income_component
              output: self_employment_earned_income_component
              hash: sha256:local
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/statute/26/32
              excerpt: wages, salaries, tips, and other employee compensation ... plus ... net earnings from self-employment
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/32
              excerpt: computed without regard to any community property laws
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          employee_compensation_earned_income_before_section_112_election
          + self_employment_earned_income_component

  - name: earned_income
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 32(c)(2)(A), 26 USC 32(c)(2)(B)(vi)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/26/32/c/2#earned_income_before_section_112_election
              output: earned_income_before_section_112_election
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/26/112#amount_excluded_from_gross_income_by_reason_of_section_112
              output: amount_excluded_from_gross_income_by_reason_of_section_112
              hash: sha256:a7549fc6774224d725eaf654655707e7e97aecfa9fcebf378918778482f67512
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/26/32
              excerpt: a taxpayer may elect to treat amounts excluded from gross income by reason of section 112 as earned income
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          max(0,
            sum_where(taxpayer_or_spouse_of_tax_unit, earned_income_before_section_112_election, person_is_taxpayer_or_spouse_of_tax_unit)
            + (if taxpayer_elects_to_treat_section_112_excluded_amounts_as_earned_income: amount_excluded_from_gross_income_by_reason_of_section_112 else: 0))

  - name: tax_unit_earned_income
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 32(c)(2)(A), 26 USC 32(c)(2)(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/26/32/c/2#earned_income_before_section_112_election
              output: earned_income_before_section_112_election
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/26/112#amount_excluded_from_gross_income_by_reason_of_section_112
              output: amount_excluded_from_gross_income_by_reason_of_section_112
              hash: sha256:a7549fc6774224d725eaf654655707e7e97aecfa9fcebf378918778482f67512
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/32
              excerpt: The term "earned income" means
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          max(0,
            sum_where(taxpayer_or_spouse_of_tax_unit, earned_income_before_section_112_election, person_is_taxpayer_or_spouse_of_tax_unit)
            + (if taxpayer_elects_to_treat_section_112_excluded_amounts_as_earned_income: amount_excluded_from_gross_income_by_reason_of_section_112 else: 0))
