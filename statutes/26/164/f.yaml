format: rulespec/v1
imports:
- us:statutes/26/1401/a#old_age_survivors_and_disability_insurance_tax
- us:statutes/26/1401/b/1#self_employment_income_tax
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/26/164
  summary: |-
    In the case of an individual, a deduction is allowed for the taxable year equal to one-half of the taxes imposed by section 1401, other than section 1401(b)(2). The deduction is treated as attributable to a nonemployee trade or business.
rules:
- name: self_employment_tax_deduction_fraction
  kind: parameter
  dtype: Rate
  source: 26 USC 164(f)(1)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us/statute/26/164
          excerpt: one-half
  versions:
  - effective_from: '1990-01-01'
    formula: |-
      1 / 2
- name: self_employment_tax_deduction
  kind: derived
  entity: Person
  dtype: Money
  period: Year
  unit: USD
  source: 26 USC 164(f)(1)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us/statute/26/164
          excerpt: allowed as a deduction ... one-half of the taxes imposed by section 1401
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us/statute/26/164
          excerpt: In the case of an individual
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us/statute/26/164
          excerpt: other than the taxes imposed by section 1401(b)(2)
      - path: versions[0].formula
        kind: import
        import:
          target: us:statutes/26/1401/a#old_age_survivors_and_disability_insurance_tax
          output: old_age_survivors_and_disability_insurance_tax
          hash: sha256:bbcc72c707c2df4d61df98feaa9ffefa6cc2e77511ff5663a9d68cc290e2f6bc
      - path: versions[0].formula
        kind: import
        import:
          target: us:statutes/26/1401/b/1#self_employment_income_tax
          output: self_employment_income_tax
          hash: sha256:2a93284cfa8815f5618d5410e2b50509f72051eb00950c059b07cb9f89f8d055
      - path: versions[0].formula
        kind: import
        import:
          target: us:statutes/26/164/f#self_employment_tax_deduction_fraction
          output: self_employment_tax_deduction_fraction
          hash: sha256:local
  versions:
  - effective_from: '1990-01-01'
    formula: |-
      if taxpayer_is_individual: (old_age_survivors_and_disability_insurance_tax + self_employment_income_tax) * self_employment_tax_deduction_fraction else: 0
- name: self_employment_tax_deduction_attributable_to_nonemployee_trade_or_business
  kind: derived
  entity: Person
  dtype: Money
  period: Year
  unit: USD
  source: 26 USC 164(f)(2)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: definition
        source:
          corpus_citation_path: us/statute/26/164
          excerpt: deduction allowed by paragraph (1) shall be treated as attributable to a trade or business
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us/statute/26/164
          excerpt: does not consist of the performance of services by the taxpayer as an employee
      - path: versions[0].formula
        kind: import
        import:
          target: us:statutes/26/164/f#self_employment_tax_deduction
          output: self_employment_tax_deduction
          hash: sha256:local
  versions:
  - effective_from: '1990-01-01'
    formula: |-
      self_employment_tax_deduction
