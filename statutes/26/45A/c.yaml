format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/26/45A
  summary: |-
    (c) Qualified employee For purposes of this section— (1) In general Except as otherwise provided in this subsection, the term “qualified employee” means, with respect to any period, any employee of an employer if— (A) the employee is an enrolled member of an Indian tribe or the spouse of an enrolled member of an Indian tribe, (B) substantially all of the services performed during such period by such employee for such employer are performed within an Indian reservation, and (C) the principal place of abode of such employee while performing such services is on or near the reservation in which the services are performed. (2) Individuals receiving wages in excess of $30,000 not eligible An employee shall not be treated as a qualified employee for any taxable year of the employer if the total amount of the wages paid or incurred by such employer to such employee during such taxable year (whether or not for services within an Indian reservation) exceeds the amount determined at an annual rate of $30,000. (3) Inflation adjustment The Secretary shall adjust the $30,000 amount under paragraph (2) for years beginning after 1994 at the same time and in the same manner as under section 415(d), except that the base period taken into account for purposes of such adjustment shall be the calendar quarter beginning October 1, 1993 . (4) Employment must be trade or business employment An employee shall be treated as a qualified employee for any taxable year of the employer only if more than 50 percent of the wages paid or incurred by the employer to such employee during such taxable year are for services performed in a trade or business of the employer. Any determination as to whether the preceding sentence applies with respect to any employee for any taxable year shall be made without regard to subsection (e)(2). (5) Certain employees not eligible The term “qualified employee” shall not include— (A) any individual described in subparagraph (A), (B), or (C) of section 51(i)(1), (B) any 5-percent owner (as defined in section 416(i)(1)(B)), and (C) any individual if the services performed by such individual for the employer involve the conduct of class I, II, or III gaming as defined in section 4 of the Indian Gaming Regulatory Act ( 25 U.S.C. 2703 ), or are performed in a building housing such gaming activity. (6) Indian tribe defined The term “Indian tribe” means any Indian tribe, band, nation, pueblo, or other organized group or community, including any Alaska Native village, or regional or village corporation, as defined in, or established pursuant to, the Alaska Native Claims Settlement Act ( 43 U.S.C. 1601 et seq.) which is recognized as eligible for the special programs and services provided by the United States to Indians because of their status as Indians. (7) Indian reservation defined The term “Indian reservation” has the meaning given such term by section 168(j)(6).
