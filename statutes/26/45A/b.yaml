format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/26/45A
  summary: |-
    (b) Qualified wages; qualified employee health insurance costs For purposes of this section— (1) Qualified wages (A) In general The term “qualified wages” means any wages paid or incurred by an employer for services performed by an employee while such employee is a qualified employee. (B) Coordination with work opportunity credit The term “qualified wages” shall not include wages attributable to service rendered during the 1-year period beginning with the day the individual begins work for the employer if any portion of such wages is taken into account in determining the credit under section 51. If any portion of wages are taken into account under subsection (e)(1)(A) of section 51, the preceding sentence shall be applied by substituting “2-year period” for “1-year period”. (2) Qualified employee health insurance costs (A) In general The term “qualified employee health insurance costs” means any amount paid or incurred by an employer for health insurance to the extent such amount is attributable to coverage provided to any employee while such employee is a qualified employee. (B) Exception for amounts paid under salary reduction arrangements No amount paid or incurred for health insurance pursuant to a salary reduction arrangement shall be taken into account under subparagraph (A). (3) Limitation The aggregate amount of qualified wages and qualified employee health insurance costs taken into account with respect to any employee for any taxable year (and for the base period under subsection (a)(2)) shall not exceed $20,000.
rules:
  - name: work_opportunity_credit_coordination_period_years
    kind: parameter
    dtype: Integer
    source: 26 USC 45A(b)(1)(B), "1-year period"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/26/45A
              excerpt: "shall not include wages attributable to service rendered during the 1-year period beginning with the day the individual begins work for the employer"
    versions:
      - effective_from: '1994-01-01'
        formula: |-
          1

  - name: section_51_e_1_A_coordination_period_years
    kind: parameter
    dtype: Integer
    source: 26 USC 45A(b)(1)(B), "2-year period"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/26/45A
              excerpt: "If any portion of wages are taken into account under subsection (e)(1)(A) of section 51, the preceding sentence shall be applied by substituting “2-year period” for “1-year period”"
    versions:
      - effective_from: '1994-01-01'
        formula: |-
          2

  - name: employee_qualified_costs_cap
    kind: parameter
    dtype: Money
    unit: USD
    source: 26 USC 45A(b)(3), "$20,000"
    metadata:
