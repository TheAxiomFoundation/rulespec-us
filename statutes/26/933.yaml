  source_verification:
    corpus_citation_path: us/statute/26/933
  summary: |-
    Section 933 excludes specified Puerto Rico-source income from gross income.
rules:
  - name: amount_excluded_from_gross_income_under_section_933
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 933
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/933
