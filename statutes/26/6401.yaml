format: rulespec/v1
module:
  summary: |-
    Internal Revenue Code section 6401 treats refundable credits that exceed
    tax liability as overpayments. For current-law 2026 individual cases, the
    refundable-credit aggregate includes the refundable credits modeled in
    Subpart C and payroll-tax refundable credits, and final federal income tax
    is income tax before refundable credits reduced by that aggregate.
  source_verification:
    corpus_citation_path: us/statute/26/6401
rules:
  - name: income_tax_refundable_credits
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 6401(b), Subpart C of Part IV of Subchapter A of Chapter 1
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          eitc
          + refundable_american_opportunity_credit
          + refundable_ctc
          + recovery_rebate_credit
          + refundable_payroll_tax_credit
  - name: income_tax
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 6401(b)
    versions:
      - effective_from: '2026-01-01'
        formula: income_tax_before_refundable_credits - income_tax_refundable_credits
