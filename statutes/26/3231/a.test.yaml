- name: carrier_is_employer
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    us:statutes/26/3231/a#input.carrier_as_defined_in_subsection_g: true
    us:statutes/26/3231/a#input.company_directly_or_indirectly_owned_or_controlled_by_carriers_or_under_common_control: false
    us:statutes/26/3231/a#input.operates_equipment_or_facility_or_performs_service_in_connection_with_railroad_transportation: false
    ? us:statutes/26/3231/a#input.performs_service_in_connection_with_receipt_delivery_elevation_transfer_refrigeration_icing_storage_or_handling_of_property_transported_by_railroad
    : false
    us:statutes/26/3231/a#input.performs_only_trucking_service: false
    us:statutes/26/3231/a#input.performs_only_casual_service: false
    us:statutes/26/3231/a#input.performs_only_casual_operation_of_equipment_or_facilities: false
    us:statutes/26/3231/a#input.receiver_trustee_or_other_individual_or_body_judicial_or_otherwise: false
    us:statutes/26/3231/a#input.in_possession_of_property_of_such_employer: false
    us:statutes/26/3231/a#input.operating_all_or_any_part_of_business_of_such_employer: false
    us:statutes/26/3231/a#input.railroad_transportation_association_bureau_agency_or_organization: false
    us:statutes/26/3231/a#input.controlled_and_maintained_wholly_or_principally_by_two_or_more_employers_as_defined: false
    us:statutes/26/3231/a#input.engaged_in_services_in_connection_with_or_incidental_to_railroad_transportation: false
    us:statutes/26/3231/a#input.railway_labor_organization_national_in_scope_organized_under_railway_labor_act: false
    ? us:statutes/26/3231/a#input.state_or_national_legislative_committee_general_committee_insurance_department_local_lodge_or_division_of_such_railway_labor_organization
    : false
    us:statutes/26/3231/a#input.street_interurban_or_suburban_electric_railway: false
    us:statutes/26/3231/a#input.operating_as_part_of_general_steam_railroad_system_of_transportation: false
    us:statutes/26/3231/a#input.part_of_general_steam_railroad_system_operated_by_other_motive_power: false
    us:statutes/26/3231/a#input.company_included_only_by_reason_of_coal_mining: false
    ? us:statutes/26/3231/a#input.company_included_only_by_reason_of_supplying_coal_to_employer_where_delivery_is_not_beyond_mine_tipple
    : false
    ? us:statutes/26/3231/a#input.company_included_only_by_reason_of_operating_equipment_or_facilities_for_coal_mining_or_supplying
    : false
  output:
    us:statutes/26/3231/a#carrier_or_controlled_service_company_included: holds
    us:statutes/26/3231/a#electric_railway_exception_applies: not_holds
    us:statutes/26/3231/a#coal_company_exception_applies: not_holds
    us:statutes/26/3231/a#employer: holds
