  summary: |-
    (4) Special rules for taxable years 2025 through 2028 relating to qualified passenger vehicle loan interest (A) In general In the case of taxable years beginning after December 31, 2024 , and before January 1, 2029 , for purposes of this subsection the term “personal interest” shall not include qualified passenger vehicle loan interest. (B) Qualified passenger vehicle loan interest defined (i) In general For purposes of this paragraph, the term “qualified passenger vehicle loan interest” means any interest which is paid or accrued during the taxable year on indebtedness incurred by the taxpayer after December 31, 2024 , for the purchase of, and that is secured by a first lien on, an applicable passenger vehicle for personal use. (ii) Exceptions Such term shall not include any amount paid or incurred on any of the following: (I) A loan to finance fleet sales. (II) A loan incurred for the purchase of a commercial vehicle that is not used for personal purposes. (III) Any lease financing. (IV) A loan to finance the purchase of a vehicle with a salvage title. (V) A loan to finance the purchase of a vehicle intended to be used for scrap or parts. (iii) VIN requirement Interest shall not be treated as qualified passenger vehicle loan interest under this paragraph unless the taxpayer includes the vehicle identification number of the applicable passenger vehicle described in clause (i) on the return of tax for the taxable year. (C) Limitations (i) Dollar limit The amount of interest taken into account by a taxpayer under subparagraph (B) for any taxable year shall not exceed $10,000. (ii) Limitation based on modified adjusted gross income (I) In general The amount which is otherwise allowable as a deduction under subsection (a) as qualified passenger vehicle loan interest (determined without regard to this clause and after the application of clause (i)) shall be reduced (but not below zero) by $200 for each $1,000 (or portion thereof) by which the modified adjusted gross income of the taxpayer for the taxable year exceeds $100,000 ($200,000 in the case of a joint return). (II) Modified adjusted gross income For purposes of this clause, the term “modified adjusted gross income” means the adjusted gross income of the taxpayer for the taxable year increased by any amount excluded from gross income under section 911, 931, or 933. (D) Applicable passenger vehicle The term “applicable passenger vehicle” means any vehicle— (i) the original use of which commences with the taxpayer, (ii) which is manufactured primarily for use on public streets, roads, and highways (not including a vehicle operated exclusively on a rail or rails), (iii) which has at least 2 wheels, (iv) which is a car, minivan, van, sport utility vehicle, pickup truck, or motorcycle, (v) which is treated as a motor vehicle for purposes of title II of the Clean Air Act, and (vi) which has a gross vehicle weight rating of less than 14,000 pounds. Such term shall not include any vehicle the final assembly of which did not occur within the United States. (E) Other definitions and special rules For purposes of this paragraph— (i) Final assembly For purposes of subparagraph (D), the term “final assembly” means the process by which a manufacturer produces a vehicle at, or through the use of, a plant, factory, or other place from which the vehicle is delivered to a dealer with all component parts necessary for the mechanical operation of the vehicle included with the vehicle, whether or not the component parts are permanently installed in or on the vehicle. (ii) Treatment of refinancing Indebtedness described in subparagraph (B) shall include indebtedness that results from refinancing any indebtedness described in such subparagraph, and that is secured by a first lien on the applicable passenger vehicle with respect to which the refinanced indebtedness was incurred, but only to the extent the amount of such resulting indebtedness does not exceed the amount of such refinanced indebtedness. (iii) Related parties Indebtedness described in subparagraph (B) shall not include any indebtedness owed to a person who is related (within the meaning of section 267(b) or 707(b)(1)) to the taxpayer.
