  summary: |-
    (4) Special rules for taxable years 2025 through 2028 relating to qualified passenger vehicle loan interest ... (B) Qualified passenger vehicle loan interest defined ... (ii) Exceptions Such term shall not include any amount paid or incurred on any of the following: (I) A loan to finance fleet sales.
