format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/26/163
  summary: |-
    (4) Special rules for taxable years 2025 through 2028 relating to qualified passenger vehicle loan interest ... (A) In general In the case of taxable years beginning after December 31, 2024, and before January 1, 2029, for purposes of this subsection the term “personal interest” shall not include qualified passenger vehicle loan interest. (B) Qualified passenger vehicle loan interest defined ... (ii) Exceptions Such term shall not include any amount paid or incurred on any of the following: ... (II) A loan incurred for the purchase of a commercial vehicle that is not used for personal purposes.
