    end: '2026-12-31'
  tables:
    Payment:
    - us:statutes/26/163/h/4/B/ii/V#input.amount_paid_or_incurred_on_loan: true
      us:statutes/26/163/h/4/B/ii/V#input.loan_finances_purchase_of_vehicle_intended_to_be_used_for_scrap_or_parts: true
