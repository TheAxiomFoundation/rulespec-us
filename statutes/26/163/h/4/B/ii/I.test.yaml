- name: amount_paid_on_fleet_sales_loan_triggers_exception
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  tables:
    Payment:
    - us:statutes/26/163/h/4/B/ii/I#input.amount_paid_or_incurred_on_loan: true
      us:statutes/26/163/h/4/B/ii/I#input.loan_finances_fleet_sales: true
  output:
    us:statutes/26/163/h/4/B/ii/I#fleet_sales_loan_exception_applies:
    - holds
- name: amount_not_on_loan_does_not_trigger_exception
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  tables:
    Payment:
    - us:statutes/26/163/h/4/B/ii/I#input.amount_paid_or_incurred_on_loan: false
      us:statutes/26/163/h/4/B/ii/I#input.loan_finances_fleet_sales: true
  output:
    us:statutes/26/163/h/4/B/ii/I#fleet_sales_loan_exception_applies:
    - not_holds
- name: non_fleet_sales_loan_does_not_trigger_exception
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  tables:
    Payment:
    - us:statutes/26/163/h/4/B/ii/I#input.amount_paid_or_incurred_on_loan: true
      us:statutes/26/163/h/4/B/ii/I#input.loan_finances_fleet_sales: false
  output:
    us:statutes/26/163/h/4/B/ii/I#fleet_sales_loan_exception_applies:
    - not_holds
