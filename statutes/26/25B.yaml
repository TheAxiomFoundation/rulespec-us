          savers_credit_joint_third_threshold * savers_credit_threshold_multiplier
  - name: savers_credit_applicable_percentage
    kind: derived
    entity: TaxUnit
    dtype: Rate
    period: Year
    source: 26 USC 25B(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/25B
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          if savers_credit_modified_adjusted_gross_income <= savers_credit_first_threshold:
              savers_credit_high_rate
          else:
              if savers_credit_modified_adjusted_gross_income <= savers_credit_second_threshold:
                  savers_credit_middle_rate
              else:
                  if savers_credit_modified_adjusted_gross_income <= savers_credit_third_threshold:
                      savers_credit_low_rate
                  else:
                      savers_credit_zero_rate
  - name: savers_credit_eligible_individual
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: 26 USC 25B(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/26/151#exemption_individual_eligible
              output: exemption_individual_eligible
              hash: sha256:28fb0e7c50d48ad764ff1ddee8b654a18006fc3dde026034b4dfb6efb90a0fb2
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us/statute/26/25B
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          age_at_close_of_taxable_year >= savers_credit_age_threshold
          and not exemption_individual_eligible
          and not is_student_under_section_152_f_2
  - name: savers_credit_gross_contributions
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 25B(d)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/statute/26/25B
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          able_account_contributions
          + (
              if retirement_contribution_inclusion_window_applies:
                  qualified_retirement_contributions
                  + elective_deferrals
                  + eligible_deferred_compensation_deferrals
                  + voluntary_employee_qualified_plan_contributions
              else:
                  0
          )
  - name: savers_credit_excepted_distributions
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 25B(d)(2)(A), 25B(d)(2)(C)
    metadata:
