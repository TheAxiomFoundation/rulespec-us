        formula: |-
          min(
              savers_credit_qualified_retirement_savings_contributions,
              savers_credit_contribution_cap
          )
  - name: savers_credit
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 25B(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/25B
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          if savers_credit_eligible_individual:
              savers_credit_applicable_percentage
              * savers_credit_contributions_taken_into_account
          else:
              0
