format: rulespec/v1
imports:
  - us:statutes/26/151#exemption_individual_eligible
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/26/25B
  summary: |-
    (a) In the case of an eligible individual, there shall be allowed as a credit against the tax imposed by this subtitle for the taxable year an amount equal to the applicable percentage of so much of the qualified retirement savings contributions of the eligible individual for the taxable year as do not exceed $2,000.
    (b) For joint returns, the applicable percentage is 50 percent if adjusted gross income is not over $30,000, 20 percent if over $30,000 but not over $32,500, 10 percent if over $32,500 but not over $50,000, and zero percent if over $50,000. Head-of-household thresholds are 75 percent of the joint-return dollar amounts, and other returns use 50 percent of those amounts. For taxable years beginning after 2006, the paragraph (1) dollar amounts are increased by the section 1(f)(3) cost-of-living adjustment determined by substituting calendar year 2005 for calendar year 2016, rounded to the nearest multiple of $500.
    (c) Eligible individual means an individual who has attained age 18 as of the close of the taxable year, excluding any individual with respect to whom a section 151 deduction is allowed to another taxpayer for a taxable year beginning in the same calendar year and any student as defined in section 152(f)(2).
    (d) Qualified retirement savings contributions equal ABLE-account contributions plus, for taxable years beginning before January 1, 2027, qualified retirement contributions, elective deferrals, eligible deferred-compensation deferrals, and voluntary employee contributions to qualified retirement plans, reduced not below zero by aggregate testing-period distributions from relevant entities. Trustee-to-trustee transfers or rollover-distribution portions, distributions referred to in sections 72(p), 401(k)(8), 401(m)(6), 402(g)(2), 404(k), 408(d)(4), and distributions to which section 408A(d)(3) applies are not taken into account. Spousal distributions are treated as received by the individual if joint returns are filed for the credit year and distribution year.
    (e) Adjusted gross income is determined without regard to sections 911, 931, and 933.
    (f) A qualified retirement savings contribution shall not fail to be included in determining investment in the contract for section 72 purposes by reason of the credit.
