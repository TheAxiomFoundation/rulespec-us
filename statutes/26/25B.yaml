    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 25B(b)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/25B
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          savers_credit_joint_first_threshold * savers_credit_threshold_multiplier
  - name: savers_credit_second_threshold
