        formula: |-
          trustee_to_trustee_transfer_or_rollover_distribution_portion
          + section_72_p_distribution
          + section_401_k_8_distribution
          + section_401_m_6_distribution
          + section_402_g_2_distribution
          + section_404_k_distribution
          + section_408_d_4_distribution
          + section_408A_d_3_distribution
  - name: savers_credit_spouse_distributions_treated_as_received
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 25B(d)(2)(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/25B
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          if filing_status == 1 and filing_status_for_spouse_distribution_year == 1:
              spouse_testing_period_distributions
          else:
              0
  - name: savers_credit_distributions_taken_into_account
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 25B(d)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/25B
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          max(
              0,
              individual_testing_period_distributions
              + savers_credit_spouse_distributions_treated_as_received
              - savers_credit_excepted_distributions
          )
  - name: savers_credit_qualified_retirement_savings_contributions
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 25B(d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/25B
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          max(
              0,
              savers_credit_gross_contributions
              - savers_credit_distributions_taken_into_account
          )
  - name: savers_credit_contributions_taken_into_account
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 25B(a)
    metadata:
