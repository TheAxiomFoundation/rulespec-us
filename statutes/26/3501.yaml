  source_verification:
    corpus_citation_path: us/statute/26/3501
  summary: |-
    The taxes imposed by this subtitle shall be collected by the Secretary and paid into the Treasury as internal-revenue collections. Taxes with respect to non-cash fringe benefits shall be collected or paid by the employer at the time and in the manner prescribed by the Secretary by regulations.
  deferred_outputs:
    - output: us:statutes/26/3501#subtitle_taxes_collected_by_secretary_and_paid_into_treasury
      reason: >-
        Section 3501(a) states an administrative collection and Treasury deposit
        duty involving the Secretary and the Treasury, which are not supported
        executable entities in the RuleSpec ontology and do not define a
        computable tax amount, rate, threshold, or taxpayer condition.
    - output: us:statutes/26/3501#employer_collection_or_payment_of_non_cash_fringe_benefit_taxes
      reason: >-
        Section 3501(b) assigns collection or payment of non-cash fringe benefit
        taxes to the employer at the time and in the manner prescribed by
        Treasury regulations. The source does not itself state the regulatory
        timing or manner needed for an executable computation.
