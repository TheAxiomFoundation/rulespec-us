format: rulespec/v1
imports:
  - us:statutes/26/1402/a#net_earnings_from_self_employment
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/26/1402
  deferred_outputs:
    - output: us:statutes/26/1402/b#wages_for_paragraph_1_including_section_3121_l_remuneration_and_sections_3201_or_3211_compensation
      reason: >-
        For purposes of paragraph (1), subsection (b) defines wages to include
        remuneration for services included under an agreement under section
        3121(l) that would be wages under section 3121(a) if the services
        constituted employment under section 3121(b), and compensation subject
        to section 3201 or 3211 tax. The copied section 3121(a) and section
        3211 contexts are deferred and do not export executable wages or section
        3211 compensation mechanics, so the complete wage-definition surface is
        deferred. The executable section 1401(a) cap below uses a source-stated
        boundary amount for wages paid to the individual for that purpose.
      blocked_by:
        - us:statutes/26/3121/a#wages
    - output: us:statutes/26/1402/b#church_employee_income_special_threshold_rule_under_subsection_j_2
      reason: >-
        The final sentence provides that, in the case of church employee income,
        the special rules of subsection (j)(2) apply for purposes of paragraph
        (2). No copied executable context for subsection (j)(2) is available, so
        the executable income output exposes a source-named boundary adjustment
        for the paragraph (2) threshold test rather than computing subsection
        (j)(2) mechanics.
  summary: |-
    “Self-employment income” means the net earnings from self-employment derived
    by an individual during a taxable year, other than a nonresident alien
    individual except as provided by a Social Security Act section 233
    agreement. The term excludes net earnings under $400 and, for the section
    1401(a) tax, excludes net earnings above the contribution and benefit base
    reduced by wages. Certain noncitizen territory residents are not considered
    nonresident alien individuals for this chapter.
rules:
  - name: self_employment_income_inclusion_threshold
    kind: parameter
    dtype: Money
    unit: USD
    source: 26 USC 1402(b)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/26/1402
              excerpt: "less than $400"
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          400

  - name: individual_excluded_from_self_employment_income_definition
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: "26 USC 1402(b): Self-employment income The term “self-employment income” means the net earnings from self-employm..."
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/26/1402
              excerpt: "other than a nonresident alien individual, except as provided by an agreement under section 233 of the Social Security Act"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/26/1402
              excerpt: "shall not ... be considered to be a nonresident alien individual"
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          individual_is_nonresident_alien
          and not social_security_agreement_under_section_233_applies_to_nonresident_alien
          and not individual_is_noncitizen_territory_resident

  - name: self_employment_income
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: USD
    source: "26 USC 1402(b): Self-employment income The term “self-employment income” means the net earnings from self-employm..."
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/statute/26/1402
              excerpt: "means the net earnings from self-employment derived by an individual"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/26/1402
              excerpt: "other than a nonresident alien individual, except as provided by an agreement under section 233 of the Social Security Act"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/26/1402
              excerpt: "shall not include ... the net earnings from self-employment, if such net earnings for the taxable year are less than $400"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/26/1402
              excerpt: "In the case of church employee income, the special rules of subsection (j)(2) shall apply for purposes of paragraph (2)."
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/26/1402/a#net_earnings_from_self_employment
              output: net_earnings_from_self_employment
              hash: sha256:21e6dd1b4a549f1068886076cb191871b816c1a31be693be512e6e342770a0f9
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/26/1402/b#self_employment_income_inclusion_threshold
              output: self_employment_income_inclusion_threshold
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/26/1402/b#individual_excluded_from_self_employment_income_definition
              output: individual_excluded_from_self_employment_income_definition
              hash: sha256:local
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          if individual_excluded_from_self_employment_income_definition: 0 else: if net_earnings_from_self_employment + church_employee_income_adjustment_under_subsection_j_2_for_threshold_test < self_employment_income_inclusion_threshold: 0 else: net_earnings_from_self_employment

  - name: self_employment_income_for_section_1401_a
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 1402(b)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/26/1402
              excerpt: "in the case of the tax imposed by section 1401(a)"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/1402
              excerpt: "contribution and benefit base ... minus ... the amount of the wages paid to such individual"
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/26/1402/b#self_employment_income
              output: self_employment_income
              hash: sha256:local
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          min(
            self_employment_income,
            max(
              0,
              contribution_and_benefit_base_under_section_230_of_social_security_act - wages_paid_to_individual_for_section_1401_a
            )
          )
