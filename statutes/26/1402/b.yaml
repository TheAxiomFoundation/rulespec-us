format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/26/1402
  deferred_outputs:
    - output: us:statutes/26/1402/b#wages_for_paragraph_1
      reason: >-
        Subsection (b) defines wages for paragraph (1) by reference to section
        3121(a), services under section 3121(l), employment under section
        3121(b), and compensation subject to sections 3201 or 3211. The copied
        section 3121(a) and section 3211 contexts are deferred and do not export
        executable wage or compensation mechanics, so the complete wage amount
        for paragraph (1) is left as a source-named boundary amount in the
        section 1401(a) cap formula.
    - output: us:statutes/26/1402/b#church_employee_income_special_rules_for_paragraph_2
      reason: >-
        The final sentence applies the special rules of subsection (j)(2) for
        purposes of paragraph (2) in the case of church employee income. No
        copied executable context for subsection (j)(2) is available, so the
        paragraph (2) threshold formula uses a source-named boundary amount for
        net earnings after any applicable special rule.
  summary: |-
    “Self-employment income” means “the net earnings from self-employment derived by an individual ... during any taxable year”; it does not include, for section 1401(a), net earnings “in excess of” the contribution and benefit base “minus ... wages,” or net earnings “less than $400.” Certain noncitizen territory residents “shall not ... be considered to be a nonresident alien individual.”
rules:
  - name: self_employment_income_inclusion_threshold
    kind: parameter
    dtype: Money
    unit: USD
    source: 26 USC 1402(b)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/26/1402
              excerpt: "less than $400"
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          400

  - name: individual_excluded_from_self_employment_income_definition
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: '26 USC 1402(b): Self-employment income The term “self-employment income” means the net earnings from self-employm...'
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/26/1402
              excerpt: "other than a nonresident alien individual, except as provided by an agreement under section 233 of the Social Security Act"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/26/1402
              excerpt: "shall not ... be considered to be a nonresident alien individual"
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          individual_is_nonresident_alien
          and not agreement_under_social_security_act_section_233_provides_for_individual
          and not individual_is_not_united_states_citizen_and_resident_of_puerto_rico_virgin_islands_guam_or_american_samoa

  - name: self_employment_income
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: USD
    source: '26 USC 1402(b): Self-employment income The term “self-employment income” means the net earnings from self-employm...'
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/statute/26/1402
              excerpt: "means the net earnings from self-employment derived by an individual"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/26/1402
              excerpt: "other than a nonresident alien individual, except as provided by an agreement under section 233 of the Social Security Act"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/26/1402
              excerpt: "shall not include ... net earnings ... less than $400"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/26/1402
              excerpt: "In the case of church employee income, the special rules of subsection (j)(2) shall apply for purposes of paragraph (2)."
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/26/1402/b#self_employment_income_inclusion_threshold
              output: self_employment_income_inclusion_threshold
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/26/1402/b#individual_excluded_from_self_employment_income_definition
              output: individual_excluded_from_self_employment_income_definition
              hash: sha256:local
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          if individual_excluded_from_self_employment_income_definition: 0 else: if net_earnings_from_self_employment_for_paragraph_2_threshold_test < self_employment_income_inclusion_threshold: 0 else: net_earnings_from_self_employment

  - name: self_employment_income_for_section_1401_a
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 1402(b)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/26/1402
              excerpt: "in the case of the tax imposed by section 1401(a)"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/1402
              excerpt: "contribution and benefit base ... minus ... the amount of the wages paid to such individual"
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/26/1402/b#self_employment_income
              output: self_employment_income
              hash: sha256:local
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          min(
            self_employment_income,
            max(
              0,
              contribution_and_benefit_base_effective_for_calendar_year_in_which_taxable_year_begins - wages_paid_to_individual_during_taxable_year_for_section_1401_a
            )
          )
