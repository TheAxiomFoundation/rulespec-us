          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/26/1401#self_employment_oasdi_tax_rate
              output: self_employment_oasdi_tax_rate
              hash: sha256:a844cf97fb59ac576f3b4f44a604c9658bbdd6cc5b4c84d136ac066d8166948b
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/26/1401#self_employment_hospital_insurance_tax_rate
