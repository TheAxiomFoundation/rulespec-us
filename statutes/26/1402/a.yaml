format: rulespec/v1
imports:
  - us:statutes/26/1401#self_employment_oasdi_tax_rate
  - us:statutes/26/1401#self_employment_hospital_insurance_tax_rate
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/26/1402
  summary: |-
    (a) Net earnings from self-employment The term “net earnings from self-employment” means the gross income derived by an individual from any trade or business carried on by such individual, less the deductions allowed by this subtitle which are attributable to such trade or business, plus his distributive share (whether or not distributed) of income or loss described in section 702(a)(8) from any trade or business carried on by a partnership of which he is a member; except that in computing such gross income and deductions and such distributive share of partnership ordinary income or loss— ... (12) in lieu of the deduction provided by section 164(f) (relating to deduction for one-half of self-employment taxes), there shall be allowed a deduction equal to the product of— (A) the taxpayer’s net earnings from self-employment for the taxable year (determined without regard to this paragraph), and (B) one-half of the sum of the rates imposed by subsections (a) and (b) of section 1401 for such year (determined without regard to the rate imposed under paragraph (2) of section 1401(b)); ... If the taxable year of a partner is different from that of the partnership, the distributive share which he is required to include in computing his net earnings from self-employment shall be based on the ordinary income or loss of the partnership for any taxable year of the partnership ending within or with his taxable year.
rules:
  - name: self_employment_tax_equivalent_deduction_fraction
    kind: parameter
    dtype: Rate
    source: 26 USC 1402(a)(12)(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/26/1402
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          1 / 2

  - name: net_earnings_before_paragraph_12_adjustment
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 1402(a), before paragraph (12)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/statute/26/1402
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/1402
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          self_employment_trade_or_business_gross_income
          - self_employment_trade_or_business_deductions
          + partnership_section_702_a_8_income_or_loss

  - name: paragraph_12_deduction_rate
    kind: derived
    entity: TaxUnit
    dtype: Rate
    period: Year
