format: rulespec/v1
imports:
  - us:statutes/26/1401#self_employment_oasdi_tax_rate
  - us:statutes/26/1401#self_employment_hospital_insurance_tax_rate
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/26/1402
  deferred_outputs:
    - output: us:statutes/26/1402/a#comprehensive_net_earnings_from_self_employment_after_all_paragraph_1_through_17_adjustments
      reason: >-
        The full subsection (a) computation requires all paragraph (1) through
        (17) exclusions and special rules, including rentals, dividends and
        interest, gains and losses, net operating loss and personal exemption
        disallowances, community-property rules, Puerto Rico and possession
        rules, minister and church employee rules, partner retirement payments,
        limited partner rules, Indian fishing-rights income, section 199
        disallowance, and qualified joint venture treatment. Several cited
        legal dependencies, including sections 702(a)(8), 631, 107, 119,
        414(e), 707(c), 7873, 199, and 761(f), are not available as executable
        RuleSpec outputs in this prompt. The executable rules below compute a
        core subsection (a) amount from boundary inputs already adjusted for the
        unavailable exclusions and special rules, plus the directly stated
        paragraph (12) rate deduction.
    - output: us:statutes/26/1402/a#agricultural_optional_method_net_earnings
      blocked_by:
        - us:statutes/26/3121/g#agricultural_labor
      reason: >-
        The agricultural optional method requires applying section 3121(g)
        agricultural-labor classification to the trade or business, section
        707(c) guaranteed-payment reductions, statutory upper and lower limits,
        and partnership distributive-share mechanics. The copied context does
        not provide all mechanics needed for a faithful executable output.
    - output: us:statutes/26/1402/a#nonfarm_optional_method_net_earnings
      reason: >-
        The nonfarm optional method requires subsection (h) regular-basis
        status, statutory upper and lower limits, aggregation across all trades
        or businesses and partnerships, a five-taxable-year limit, and
        coordination with the agricultural optional method. Those mechanics are
        not fully available in this source slice.
    - output: us:statutes/26/1402/a#partner_distributive_share_timing_for_different_taxable_years
      reason: >-
        The timing rule for a partner whose taxable year differs from the
        partnership year depends on partnership ordinary income or loss and
        section 702(a)(8) distributive-share mechanics. No copied context
        provides an executable section 702(a)(8) output.
  summary: |-
    “Net earnings from self-employment” means gross income derived by an
    individual from a trade or business carried on by the individual, less
    attributable subtitle deductions, plus the individual’s distributive share
    of section 702(a)(8) income or loss from a partnership trade or business,
    subject to the exclusions and special rules in paragraphs (1) through (17).
    Paragraph (12) allows, in lieu of the section 164(f) deduction, a deduction
    equal to net earnings determined without paragraph (12) multiplied by
    one-half of the section 1401(a) and section 1401(b) rates, determined
    without the section 1401(b)(2) rate.
rules:
  - name: self_employment_tax_equivalent_deduction_fraction
    kind: parameter
    dtype: Rate
    source: 26 USC 1402(a)(12)(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/26/1402
              excerpt: "one-half of the sum of the rates imposed by subsections (a) and (b) of section 1401"
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          1 / 2

