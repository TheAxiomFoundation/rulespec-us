    versions:
      - effective_from: '1990-01-01'
        formula: |-
          if taxpayer_makes_lump_sum_election_under_subsection_e and lump_sum_payment_portion_attributable_to_prior_taxable_years > 0: min(
              inclusion_by_reason_of_prior_year_lump_sum_portion_before_subsection_e_limitation,
              sum_of_prior_year_gross_income_increases_from_lump_sum_portion
          ) else: inclusion_by_reason_of_prior_year_lump_sum_portion_before_subsection_e_limitation

