        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/86
              excerpt: "Except as provided in paragraph (2) ... includes social security benefits ... In the case of a taxpayer ... exceeds the adjusted base amount, the amount included ... shall be equal to the lesser of"
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          if social_security_additional_amount_rule_applies: social_security_additional_inclusion_amount else: if taxpayer_subject_to_social_security_inclusion: social_security_paragraph_one_inclusion_amount else: 0

