            kind: formula
            source:
              corpus_citation_path: us/statute/26/86
              excerpt: "the sum of— (i) the modified adjusted gross income of the taxpayer for the taxable year, plus (ii) one-half of the social security benefits received during the taxable year"
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          social_security_modified_adjusted_gross_income
          + social_security_one_half_rate * social_security_benefits_received

  - name: social_security_excess_over_base_amount
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 86(b)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/86
              excerpt: "exceeds (B) the base amount"
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          max(
              0,
              social_security_provisional_income
              - social_security_base_amount
          )

  - name: taxpayer_subject_to_social_security_inclusion
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: 26 USC 86(b)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/26/86
              excerpt: "A taxpayer is described in this subsection if ... the sum ... exceeds ... the base amount"
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          social_security_provisional_income > social_security_base_amount

  - name: social_security_paragraph_one_inclusion_amount
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 86(a)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/86
              excerpt: "includes social security benefits in an amount equal to the lesser of— (A) one-half of the social security benefits received during the taxable year, or (B) one-half of the excess described in subsection (b)(1)"
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          min(
              social_security_one_half_rate * social_security_benefits_received,
              social_security_one_half_rate * social_security_excess_over_base_amount
          )

  - name: social_security_excess_over_adjusted_base_amount
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 86(a)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/86
              excerpt: "the amount determined under subsection (b)(1)(A) exceeds the adjusted base amount"
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          max(
              0,
              social_security_provisional_income
              - social_security_adjusted_base_amount
          )

  - name: social_security_additional_amount_rule_applies
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: 26 USC 86(a)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/26/86
              excerpt: "In the case of a taxpayer with respect to whom the amount determined under subsection (b)(1)(A) exceeds the adjusted base amount"
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          social_security_provisional_income > social_security_adjusted_base_amount

  - name: social_security_additional_inclusion_amount
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 86(a)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/86
              excerpt: "the amount included in gross income under this section shall be equal to the lesser of— (A) the sum of— (i) 85 percent of such excess, plus (ii) the lesser of the amount determined under paragraph (1) or an amount equal to one-half of the difference between the adjusted base amount and the base amount of the taxpayer, or (B) 85 percent of the social security benefits received during the taxable year"
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          min(
              social_security_additional_inclusion_rate * social_security_excess_over_adjusted_base_amount
              + min(
                  social_security_paragraph_one_inclusion_amount,
                  social_security_one_half_rate * max(
                      0,
                      social_security_adjusted_base_amount - social_security_base_amount
                  )
              ),
              social_security_additional_inclusion_rate * social_security_benefits_received
          )

