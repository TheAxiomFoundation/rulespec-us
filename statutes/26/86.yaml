        formula: |-
          adjusted_gross_income_determined_without_regard_to_sections_86_85_c_135_137_221_911_931_933
          + tax_exempt_interest_received_or_accrued

  - name: social_security_base_amount
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 86(c)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/26/86
              excerpt: "The term “base amount” means— (A) except as otherwise provided ... $25,000, (B) $32,000 in the case of a joint return, and (C) zero in the case of a taxpayer who ... is married ... but does not file a joint return ... and does not live apart from his spouse at all times"
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          match filing_status:
              1 => social_security_base_amount_joint
              2 => if married_taxpayer_lived_apart_from_spouse_at_all_times_during_taxable_year: social_security_base_amount_other else: social_security_base_amount_married_separate_not_apart
              0 => social_security_base_amount_other
              3 => social_security_base_amount_other
              4 => social_security_base_amount_other

  - name: social_security_adjusted_base_amount
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 86(c)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/26/86
              excerpt: "The term “adjusted base amount” means— (A) except as otherwise provided ... $34,000, (B) $44,000 in the case of a joint return, and (C) zero in the case of a taxpayer described in paragraph (1)(C)"
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          match filing_status:
              1 => social_security_adjusted_base_amount_joint
              2 => if married_taxpayer_lived_apart_from_spouse_at_all_times_during_taxable_year: social_security_adjusted_base_amount_other else: social_security_adjusted_base_amount_married_separate_not_apart
              0 => social_security_adjusted_base_amount_other
              3 => social_security_adjusted_base_amount_other
              4 => social_security_adjusted_base_amount_other

  - name: social_security_provisional_income
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 86(b)(1)(A)
    metadata:
