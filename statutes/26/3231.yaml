      reason: >-
        Subsection (a)'s employer definition is already encoded in the copied
        child target us:statutes/26/3231/a#employer. This aggregate parent adds
        no further source-stated computation beyond that child definition, and
        an alias-only re-export would be a pure pass-through rule.
    - output: us:statutes/26/3231/b#employee
      reason: >-
        Subsection (b)'s employee definition is already encoded in the copied
        child target us:statutes/26/3231/b#employee. This aggregate parent adds
        no further source-stated computation beyond that child definition, and
        an alias-only re-export would be a pure pass-through rule.
