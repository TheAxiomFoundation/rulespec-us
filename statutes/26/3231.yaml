module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/26/3231
  summary: |-
    “For purposes of this chapter,” section 3231 defines employer, employee, employee representative, service, compensation, company, carrier, timing for tips constituting compensation, and the common-paymaster rule for concurrent employment. Subsection (h) provides that tips constituting compensation for section 3201 taxes “shall be deemed to be paid at the time a written statement including such tips is furnished to the employer pursuant to section 6053(a) or (if no statement including such tips is so furnished) at the time received.”
  deferred_outputs:
