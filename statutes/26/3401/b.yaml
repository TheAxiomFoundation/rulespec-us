format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/26/3401
  summary: |-
    26 USC 3401(b): “payroll period” means a period for which a payment of wages is ordinarily made to the employee by his employer; “miscellaneous payroll period” means a payroll period other than daily, weekly, biweekly, semimonthly, monthly, quarterly, semiannual, or annual.
rules:
  - name: payroll_period
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Year
    source: 26 USC 3401(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/statute/26/3401
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          payment_of_wages_is_ordinarily_made_to_employee_by_employer_for_period
  - name: miscellaneous_payroll_period
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Year
    source: 26 USC 3401(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/statute/26/3401
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          payroll_period
          and not payroll_period_is_daily
          and not payroll_period_is_weekly
          and not payroll_period_is_biweekly
          and not payroll_period_is_semimonthly
          and not payroll_period_is_monthly
          and not payroll_period_is_quarterly
          and not payroll_period_is_semiannual
          and not payroll_period_is_annual
