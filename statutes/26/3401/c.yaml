format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/26/3401
  summary: |-
    26 USC 3401(c): For purposes of this chapter, “employee” includes officers, employees, or elected officials of the United States, a State, political subdivisions, the District of Columbia, or their agencies or instrumentalities, and also includes an officer of a corporation.
rules:
  - name: employee
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 26 USC 3401(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/statute/26/3401
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_officer_employee_or_elected_official_of_united_states
          or person_is_officer_employee_or_elected_official_of_state
          or person_is_officer_employee_or_elected_official_of_political_subdivision
          or person_is_officer_employee_or_elected_official_of_district_of_columbia
          or person_is_officer_employee_or_elected_official_of_agency_or_instrumentality_of_foregoing
          or person_is_officer_of_corporation
