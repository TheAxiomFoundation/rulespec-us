format: rulespec/v1
module:
  status: deferred
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/26/3401
  summary: |-
    26 USC 3401(a) defines “wages” for purposes of chapter 24 as all remuneration, other than fees paid to a public official, for services performed by an employee for an employer, including cash value of noncash remuneration and benefits, except enumerated remuneration categories in paragraphs (1) through (23). The subsection also provides that “wages” includes any amount includible in an employee's gross income under section 409A, with payment treated as made in the taxable year of inclusion.
  deferred_outputs:
    - output: us:statutes/26/3401/a#wages
      reason: >-
        Section 3401(a) is a definition of “wages” and requires a final wages output.
        A faithful executable definition must compose all enumerated inclusions and
        exclusions. Several operative branches depend on cited legal definitions or
        exclusions for which no executable copied RuleSpec target is available, including
        section 3121(a) for the agricultural-labor exception, plan and trust exclusions
        under sections 401(a), 501(a), 403(a), 402(h)(1) and (2), 408(p), 457(b), and
        457(e)(1)(A), Peace Corps Act exceptions, exclusions under sections 127, 129,
        134(b)(4), 134(b)(5), 74(c), 108(f)(4), 117, 132, 105(h)(6), 106(b), 106(d),
        139B(b), and inclusion under section 409A. Because these unresolved branches can
        change the final defined wage amount, an executable final wages definition would
        be misleading.
rules: []
