format: rulespec/v1
module:
  summary: |-
    Internal Revenue Code section 1(j) applies the post-2017 individual
    income tax rate tables and requires the Secretary to prescribe adjusted
    tables for later taxable years. Annual adjusted dollar thresholds are
    imported from the IRS tax-year authority, not encoded in this statute file.
  source_verification:
    corpus_citation_path: us/statute/26/1
imports:
  - us:statutes/26/1/h
  - us:policies/irs/rev-proc-2025-32/income-tax-brackets
rules:
  - name: ordinary_taxable_income
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 1(h)(1)(A), 1(j)(2)-(3)
    versions:
      - effective_from: '2026-01-01'
        formula: max(0, taxable_income - capital_gains_excluded_from_taxable_income)
  - name: income_tax_main_rates
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 1(h)(1)(A), 1(j)(2)-(3)
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          (
              income_tax_bracket_1_rate
              * min(ordinary_taxable_income, income_tax_bracket_1_threshold)
          )
          + (
              income_tax_bracket_2_rate
              * max(
                  0,
                  min(ordinary_taxable_income, income_tax_bracket_2_threshold)
                  - income_tax_bracket_1_threshold
              )
          )
          + (
              income_tax_bracket_3_rate
              * max(
                  0,
                  min(ordinary_taxable_income, income_tax_bracket_3_threshold)
                  - income_tax_bracket_2_threshold
              )
          )
          + (
              income_tax_bracket_4_rate
              * max(
                  0,
                  min(ordinary_taxable_income, income_tax_bracket_4_threshold)
                  - income_tax_bracket_3_threshold
              )
          )
          + (
              income_tax_bracket_5_rate
              * max(
                  0,
                  min(ordinary_taxable_income, income_tax_bracket_5_threshold)
                  - income_tax_bracket_4_threshold
              )
          )
          + (
              income_tax_bracket_6_rate
              * max(
                  0,
                  min(ordinary_taxable_income, income_tax_bracket_6_threshold)
                  - income_tax_bracket_5_threshold
              )
          )
          + (
              income_tax_bracket_7_rate
              * max(0, ordinary_taxable_income - income_tax_bracket_6_threshold)
          )
  - name: regular_tax_before_credits
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 1(h), 1(j), and 55(c)
    versions:
      - effective_from: '2026-01-01'
        formula: income_tax_main_rates
