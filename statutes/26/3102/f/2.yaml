format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/26/3102
  summary: |-
    To the extent that tax imposed by section 3101(b)(2) is not collected by the employer, the tax shall be paid by the employee.
rules:
