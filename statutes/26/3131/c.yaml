  source_verification:
    corpus_citation_path: us/statute/26/3131
  summary: |-
    The term "qualified sick leave wages" means wages paid by an employer which would be required to be paid by reason of the Emergency Paid Sick Leave Act as if such Act applied after March 31, 2021. If an employer fails to comply with any requirement of such Act with respect to paid sick time, amounts paid with respect to such paid sick time shall not be taken into account as qualified sick leave wages.
  deferred_outputs:
    - output: us:statutes/26/3131/c#qualified_sick_leave_wages
      reason: The definition requires applying the Emergency Paid Sick Leave Act as modified by 26 USC 3131(c)(2), including section 5102(a)(3), section 5102(b)(1), paid sick time as defined in section 5110, compliance requirements determined without regard to section 5109, and actions described in section 5104. No copied RuleSpec context provides those Emergency Paid Sick Leave Act mechanics, and this definition cross-reference cannot be replaced with a local placeholder without losing the legal requirements.
