format: rulespec/v1
imports:
- us:statutes/26/3111/a#employer_oasdi_excise_tax_rate
- us:statutes/26/3111/b#hospital_insurance_employer_tax_rate
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/26/3221
  summary: 26 USC 3221 imposes on every employer tier 1 and tier 2 excise taxes on
    compensation paid for services. The tier 1 applicable percentage is the sum of
    the rates in effect under section 3111(a) and (b); the tier 2 percentage is determined
    under section 3241. Section 3231(e)(2) governs different contribution bases for
    the taxes imposed by subsections (a) and (b).
  deferred_outputs:
  - output: us:statutes/26/3221/a#tier_1_employer_tax
    reason: Subsection (c) directs application of different contribution bases under
      section 3231(e)(2) for the tax imposed by subsection (a). The available section
      3231(e)(2) context defers the purpose-specific hospital-insurance carve-out
      needed to determine the compensation base for the section 3221(a) tax, so a
      raw compensation-times-rate formula would ignore the statutory base rule.
    blocked_by:
    - us:statutes/26/3231/e/2#compensation_excess_excluded_for_section_3201_a_or_3221_a_rate_portion
    source_values:
    - us:statutes/26/3221#tier_1_applicable_percentage
  - output: us:statutes/26/3221/b#tier_2_employer_tax
    reason: Subsection (c) directs application of different contribution bases under
      section 3231(e)(2) for the tax imposed by subsection (b). The available section
      3231(e)(2) context defers the applicable base for tier 2 taxes, so the tier
      2 tax cannot be faithfully computed on raw compensation paid.
    blocked_by:
    - us:statutes/26/3231/e/2#applicable_base_for_tier_2_taxes_and_average_monthly_compensation
    source_values:
    - us:statutes/26/3221#tier_2_applicable_percentage
  - output: us:statutes/26/3221/b#tier_2_applicable_percentage
    reason: Generated rule used a local name that collides with a sibling RuleSpec
      export. This output is deferred until it can be encoded with a semantic branch-specific
      name without creating ambiguous sibling imports.
rules:
- name: tier_1_applicable_percentage
  kind: derived
  entity: Employer
  dtype: Rate
  period: Year
  source: 26 USC 3221(a)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us/statute/26/3221
          excerpt: "the term \u201Capplicable percentage\u201D means the percentage\
            \ equal to the sum of the rates of tax in effect under subsections (a)\
            \ and (b) of section 3111"
      - path: versions[0].formula
        kind: import
        import:
          target: us:statutes/26/3111/a#employer_oasdi_excise_tax_rate
          output: employer_oasdi_excise_tax_rate
          hash: sha256:0bca2cb6ef64473e7a802903f3c3ffd0afb887c481303cad6d620b9b2159ef82
      - path: versions[0].formula
        kind: import
        import:
          target: us:statutes/26/3111/b#hospital_insurance_employer_tax_rate
          output: hospital_insurance_employer_tax_rate
          hash: sha256:02cb26afb163a49113d15e8cea6adc2f2c8e82e67a2dc46b905950d39c2f198e
  versions:
  - effective_from: '1990-01-01'
    formula: employer_oasdi_excise_tax_rate + hospital_insurance_employer_tax_rate
