format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/26/104
  summary: |-
    (4) amounts received as a pension, annuity, or similar allowance for personal injuries or sickness resulting from active service in the armed forces of any country or in the Coast and Geodetic Survey or the Public Health Service, or as a disability annuity payable under the provisions of section 808 of the Foreign Service Act of 1980;
rules:
  - name: service_injury_pension_exclusion_applies
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Year
    source: 26 USC 104(a)(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/26/104
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/statute/26/104
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          (
              payment_received_as_pension_annuity_or_similar_allowance
              and (
                  personal_injuries_or_sickness_resulted_from_active_service_in_armed_forces_of_any_country
                  or personal_injuries_or_sickness_resulted_from_active_service_in_coast_and_geodetic_survey
                  or personal_injuries_or_sickness_resulted_from_active_service_in_public_health_service
              )
          )
          or payment_received_as_disability_annuity_payable_under_section_808_of_foreign_service_act_1980
  - name: service_injury_pension_excluded_amount
    kind: derived
    entity: Payment
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 104(a)(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/104
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/26/104
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          if service_injury_pension_exclusion_applies: payment_amount else: 0
