format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/26/3202
  summary: |-
    Section 3202 requires taxes imposed by section 3201 to be collected by the employer by deducting the taxes from employee compensation as paid; an employer required to deduct the tax is liable for payment and not liable to any person for the amount paid. For tips constituting compensation, collection is limited to tips included in written statements furnished pursuant to section 6053(a), with monthly and quarterly collection deadlines. For specified post-employment group-term life insurance payments that constitute compensation, subsection (a) does not apply and the section 3201 tax is paid by the employee.
  deferred_outputs:
    - output: us:statutes/26/3202#section_3201_taxes_collectible_by_employer_deduction
      reason: The collection amount depends on the taxes imposed by section 3201. The copied 26 USC 3201 context does not export executable section 3201 tax amounts needed to compute the amount deductible from compensation.
      blocked_by:
        - us:statutes/26/3201/a#tier_1_employee_tax
        - us:statutes/26/3201/b#tier_2_employee_tax
    - output: us:statutes/26/3202#tips_section_3201_tax_collectible_by_employer
      reason: The special rule for tips depends on the taxes imposed by section 3201 with respect to tips included in written statements furnished pursuant to section 6053(a), and no copied context is available for section 6053(a) statement mechanics or executable section 3201 tax amounts.
      source_values:
        - us:statutes/26/3202#monthly_tip_collection_deadline_day
        - us:statutes/26/3202#quarterly_tip_collection_deadline_day
        - us:statutes/26/3202#tip_statement_low_total_threshold_amount
    - output: us:statutes/26/3202#tips_section_3201_tax_excess_paid_by_employee
      reason: The employee-paid excess for tips depends on the tax imposed by section 3201 with respect to tips that constitute compensation and on the portion collectible by the employer under paragraph (1) or paragraph (3). Those tax and statement mechanics are not executable from the copied context.
      source_values:
        - us:statutes/26/3202#monthly_tip_collection_deadline_day
        - us:statutes/26/3202#quarterly_tip_collection_deadline_day
    - output: us:statutes/26/3202#group_term_life_insurance_section_3201_tax_paid_by_employee
      reason: The special rule for certain taxable group-term life insurance benefits requires the tax imposed by section 3201 on qualifying payments, but the copied 26 USC 3201 context does not export executable payment-scoped section 3201 tax amounts.
      blocked_by:
        - us:statutes/26/3201/a#tier_1_employee_tax
        - us:statutes/26/3201/b#tier_2_employee_tax
    - output: us:statutes/26/3202#group_term_life_insurance_section_6051_separate_reporting_amount
      reason: The reporting rule requires separately including amounts on the statement required under section 6051, but no copied RuleSpec context is available for section 6051 reporting mechanics.
rules:
  - name: monthly_tip_collection_deadline_day
    kind: parameter
    dtype: Integer
    source: 26 USC 3202(c)(1), 3202(c)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/26/3202
              excerpt: "before the close of the 10th day following the calendar month"
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          10

  - name: quarterly_tip_collection_deadline_day
    kind: parameter
    dtype: Integer
    source: 26 USC 3202(c)(1), 3202(c)(2), 3202(c)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/26/3202
              excerpt: "the 30th day following the quarter"
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          30

  - name: tip_statement_low_total_threshold_amount
    kind: parameter
    dtype: Money
    unit: USD
    source: 26 USC 3202(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/26/3202
              excerpt: "is less than $20"
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          20

  - name: employer_section_3201_tax_payment_liability
    kind: derived
    entity: Employer
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 3202(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/3202
              excerpt: "Every employer required under subsection (a) to deduct the tax shall be liable for the payment of such tax"
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          if employer_required_under_subsection_a_to_deduct_tax: max(0, tax_required_to_deduct_from_employee_compensation) else: 0

  - name: employer_indemnified_section_3201_tax_payment_amount
    kind: derived
    entity: Employer
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 3202(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/3202
              excerpt: "shall not be liable to any person for the amount of any such payment"
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          if employer_required_under_subsection_a_to_deduct_tax: max(0, amount_of_section_3201_tax_payment_made_by_employer) else: 0

  - name: group_term_life_insurance_special_rule_applies
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Year
    source: 26 USC 3202(d)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/26/3202
              excerpt: "any payment for group-term life insurance to the extent— (A) such payment constitutes compensation, and (B) such payment is for coverage for periods during which an employment relationship no longer exists"
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          payment_is_for_group_term_life_insurance
          and payment_constitutes_compensation
          and coverage_periods_after_employment_relationship_no_longer_exists

  - name: subsection_a_collection_rule_inapplicable_to_group_term_life_payment
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Year
    source: 26 USC 3202(d)(1)(A), 3202(d)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/26/3202
              excerpt: "In the case of any payment for group-term life insurance to which this subsection applies— (A) subsection (a) shall not apply"
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/26/3202#group_term_life_insurance_special_rule_applies
              output: group_term_life_insurance_special_rule_applies
              hash: sha256:local
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          group_term_life_insurance_special_rule_applies
