format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/26/3202
  summary: |-
    26 USC 3202 states that "The taxes imposed by section 3201 shall be collected by the employer" by deducting them from employee compensation, and that "Every employer required under subsection (a) to deduct the tax shall be liable for the payment of such tax." For tips, collection is limited by written-statement and employer-control rules before "the 10th day following the calendar month" or "the 30th day following the quarter." For qualifying group-term life insurance payments, "subsection (a) shall not apply" and the employee pays the section 3201 tax.
  deferred_outputs:
    - output: us:statutes/26/3202/a#section_3201_taxes_collectible_by_employer_deduction
      reason: The collection amount depends on executable taxes imposed by section 3201. The copied 26 USC 3201 context does not export the section 3201 tax amounts needed to compute the amount deductible from compensation.
      blocked_by:
        - us:statutes/26/3201/a#tier_1_employee_tax
        - us:statutes/26/3201/b#tier_2_employee_tax
    - output: us:statutes/26/3202/a#low_total_tip_statement_section_3201_tax_deductible_from_non_tip_compensation
      reason: The low-total tip statement deduction rule depends on tips reported pursuant to section 6053(a), paragraph (3) of section 3231(e), and the section 3201 tax amount with respect to those tips. No copied context is available for section 6053(a), and copied section 3201 context does not export executable tax amounts.
      blocked_by:
        - us:statutes/26/3201/a#tier_1_employee_tax
        - us:statutes/26/3201/b#tier_2_employee_tax
      source_values:
        - us:statutes/26/3202#tip_statement_low_total_threshold_amount
    - output: us:statutes/26/3202/c/1#tips_section_3201_tax_collectible_by_employer
      reason: The special collection rule for tips depends on tips included in written statements furnished pursuant to section 6053(a), section 3201 tax amounts with respect to those tips, and collection under employer control. The section 6053(a) statement mechanics and section 3201 tax amounts are not executable from copied context.
      blocked_by:
        - us:statutes/26/3201/a#tier_1_employee_tax
        - us:statutes/26/3201/b#tier_2_employee_tax
      source_values:
        - us:statutes/26/3202#monthly_tip_collection_deadline_day
        - us:statutes/26/3202#quarterly_tip_collection_deadline_day
    - output: us:statutes/26/3202/c/2#tips_excess_section_3201_tax_amount_employee_may_furnish_to_employer
      reason: The amount the employee may furnish equals the excess of section 3201 taxes on reported tips over compensation from which the employer is required to collect under paragraph (1). Those section 3201 tax and section 6053(a) statement mechanics are unavailable in copied context.
      blocked_by:
        - us:statutes/26/3201/a#tier_1_employee_tax
        - us:statutes/26/3201/b#tier_2_employee_tax
      source_values:
        - us:statutes/26/3202#monthly_tip_employee_excess_furnishing_deadline_day
        - us:statutes/26/3202#quarterly_tip_employee_excess_furnishing_deadline_day
    - output: us:statutes/26/3202/c/4#tips_section_3201_tax_excess_paid_by_employee
      reason: The employee-paid excess depends on the section 3201 tax with respect to tips constituting compensation and the portion collectible by the employer under paragraph (1) or paragraph (3). Those upstream tax and tip-statement mechanics are not executable from copied context.
      blocked_by:
        - us:statutes/26/3201/a#tier_1_employee_tax
        - us:statutes/26/3201/b#tier_2_employee_tax
      source_values:
        - us:statutes/26/3202#quarterly_tip_adjustment_window_days
    - output: us:statutes/26/3202/d/1/b#group_term_life_insurance_section_6051_statement_separate_reporting
      reason: The reporting rule requires separate inclusion on the statement required under section 6051, but no copied RuleSpec context is available for section 6051 reporting mechanics.
    - output: us:statutes/26/3202/d/1/c#group_term_life_insurance_section_3201_tax_paid_by_employee
      reason: The employee-paid tax rule for qualifying group-term life insurance payments requires the tax imposed by section 3201 on those payments, but copied 26 USC 3201 context does not export executable payment-scoped section 3201 tax amounts.
      blocked_by:
        - us:statutes/26/3201/a#tier_1_employee_tax
        - us:statutes/26/3201/b#tier_2_employee_tax
rules:
  - name: tip_statement_low_total_threshold_amount
    kind: parameter
    dtype: Money
    unit: USD
    source: 26 USC 3202(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/26/3202
              excerpt: "is less than $20"
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          20

  - name: monthly_tip_collection_deadline_day
    kind: parameter
    dtype: Integer
    source: 26 USC 3202(c)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/26/3202
              excerpt: "before the close of the 10th day following the calendar month"
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          10

  - name: quarterly_tip_collection_deadline_day
    kind: parameter
    dtype: Integer
    source: 26 USC 3202(c)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/26/3202
              excerpt: "the 30th day following the quarter"
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          30

  - name: monthly_tip_employee_excess_furnishing_deadline_day
    kind: parameter
    dtype: Integer
    source: 26 USC 3202(c)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/26/3202
              excerpt: "on or before the 10th day of the following month"
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          10

  - name: quarterly_tip_employee_excess_furnishing_deadline_day
    kind: parameter
    dtype: Integer
    source: 26 USC 3202(c)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/26/3202
              excerpt: "on or before the 30th day of the following quarter"
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          30

  - name: quarterly_tip_adjustment_window_days
    kind: parameter
    dtype: Integer
    source: 26 USC 3202(c)(3)(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/26/3202
              excerpt: "during such quarter (and within 30 days thereafter)"
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          30

  - name: employer_section_3201_tax_payment_liability
    kind: derived
    entity: Employer
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 3202(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/3202
              excerpt: "Every employer required under subsection (a) to deduct the tax shall be liable for the payment of such tax"
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          if employer_required_to_deduct_tax: max(0, tax_required_to_deduct_from_employee_compensation) else: 0

  - name: employer_indemnified_section_3201_tax_payment_amount
    kind: derived
    entity: Employer
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 3202(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/3202
              excerpt: "shall not be liable to any person for the amount of any such payment"
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          if employer_required_to_deduct_tax: max(0, amount_of_section_3201_tax_payment_made_by_employer) else: 0

  - name: group_term_life_insurance_special_rule_applies
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Year
    source: 26 USC 3202(d)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/26/3202
              excerpt: "any payment for group-term life insurance"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/26/3202
              excerpt: "such payment constitutes compensation"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/26/3202
              excerpt: "coverage for periods during which an employment relationship no longer exists"
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          payment_is_for_group_term_life_insurance
          and payment_constitutes_compensation
          and payment_is_for_coverage_for_periods_after_employment_relationship_no_longer_exists

  - name: subsection_a_collection_rule_inapplicable_to_group_term_life_payment
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Year
    source: 26 USC 3202(d)(1)(A), 3202(d)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/26/3202
              excerpt: "subsection (a) shall not apply"
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/26/3202#group_term_life_insurance_special_rule_applies
              output: group_term_life_insurance_special_rule_applies
              hash: sha256:local
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          group_term_life_insurance_special_rule_applies
