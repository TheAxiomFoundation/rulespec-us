  - name: taxpayer_blind_additional_amount_entitlement
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: IRC section 63(f)(2)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
