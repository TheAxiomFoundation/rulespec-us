format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/26/63
  summary: |-
    (f) Aged or blind additional amounts (1) Additional amounts for the aged The taxpayer shall be entitled to an additional amount of $600— (A) for himself if he has attained age 65 before the close of his taxable year, and (B) for the spouse of the taxpayer if the spouse has attained age 65 before the close of the taxable year and an additional exemption is allowable to the taxpayer for such spouse under section 151(b). (2) Additional amount for blind The taxpayer shall be entitled to an additional amount of $600— (A) for himself if he is blind at the close of the taxable year, and (B) for the spouse of the taxpayer if the spouse is blind as of the close of the taxable year and an additional exemption is allowable to the taxpayer for such spouse under section 151(b). For purposes of subparagraph (B), if the spouse dies during the taxable year the determination of whether such spouse is blind shall be made as of the time of such death. (3) Higher amount for certain unmarried individuals In the case of an individual who is not married and is not a surviving spouse, paragraphs (1) and (2) shall be applied by substituting “$750” for “$600”. (4) Blindness defined For purposes of this subsection, an individual is blind only if his central visual acuity does not exceed 20/200 in the better eye with correcting lenses, or if his visual acuity is greater than 20/200 but is accompanied by a limitation in the fields of vision such that the widest diameter of the visual field subtends an angle no greater than 20 degrees.
rules:
  - name: aged_or_blind_additional_amount
    kind: parameter
    dtype: Money
    unit: USD
    source: IRC section 63(f)(1), (2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/26/63
              excerpt: "The taxpayer shall be entitled to an additional amount of $600"
    versions:
      - effective_from: '2018-01-01'
        formula: |-
          600

  - name: unmarried_not_surviving_spouse_additional_amount
    kind: parameter
    dtype: Money
    unit: USD
    source: IRC section 63(f)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/26/63
              excerpt: "In the case of an individual who is not married and is not a surviving spouse, paragraphs (1) and (2) shall be applied by substituting “$750” for “$600”."
    versions:
      - effective_from: '2018-01-01'
        formula: |-
          750

  - name: blindness_visual_acuity_numerator
    kind: parameter
    dtype: Decimal
    source: IRC section 63(f)(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/26/63
              excerpt: "central visual acuity does not exceed 20/200"
    versions:
      - effective_from: '2018-01-01'
        formula: |-
          20

  - name: blindness_visual_acuity_denominator
    kind: parameter
    dtype: Decimal
    source: IRC section 63(f)(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/26/63
              excerpt: "central visual acuity does not exceed 20/200"
    versions:
      - effective_from: '2018-01-01'
        formula: |-
          200

  - name: blindness_visual_field_angle_limit
    kind: parameter
    dtype: Decimal
    source: IRC section 63(f)(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/26/63
              excerpt: "the widest diameter of the visual field subtends an angle no greater than 20 degrees"
    versions:
      - effective_from: '2018-01-01'
        formula: |-
          20

  - name: blind_under_subsection_f
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: IRC section 63(f)(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/statute/26/63
              excerpt: "an individual is blind only if his central visual acuity does not exceed 20/200 in the better eye with correcting lenses, or if his visual acuity is greater than 20/200 but is accompanied by a limitation in the fields of vision such that the widest diameter of the visual field subtends an angle no greater than 20 degrees."
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/26/63
              excerpt: "20/200"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/26/63
              excerpt: "20 degrees"
    versions:
      - effective_from: '2018-01-01'
        formula: |-
          central_visual_acuity_in_better_eye_with_correcting_lenses <= blindness_visual_acuity_numerator / blindness_visual_acuity_denominator
          or
          (
            central_visual_acuity_in_better_eye_with_correcting_lenses > blindness_visual_acuity_numerator / blindness_visual_acuity_denominator
            and widest_diameter_of_visual_field_angle <= blindness_visual_field_angle_limit
          )

  - name: taxpayer_aged_additional_amount_entitlement
    kind: derived
    entity: TaxUnit
    dtype: Judgment
