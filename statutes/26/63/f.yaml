      - effective_from: '2018-01-01'
        formula: |-
          taxpayer_is_blind_at_close_of_taxable_year

  - name: spouse_blind_additional_amount_entitlement
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: IRC section 63(f)(2)(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/26/63
              excerpt: "for the spouse of the taxpayer if the spouse is blind as of the close of the taxable year and an additional exemption is allowable to the taxpayer for such spouse under section 151(b). For purposes of subparagraph (B), if the spouse dies during the taxable year the determination of whether such spouse is blind shall be made as of the time of such death."
    versions:
      - effective_from: '2018-01-01'
        formula: |-
          spouse_is_blind_as_of_close_of_taxable_year_or_time_of_death
          and additional_exemption_allowable_for_spouse_under_section_151_b

  - name: applicable_aged_or_blind_additional_amount
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: IRC section 63(f)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/63
              excerpt: "In the case of an individual who is not married and is not a surviving spouse, paragraphs (1) and (2) shall be applied by substituting “$750” for “$600”."
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/26/63
              excerpt: "additional amount of $600"
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/26/63
              excerpt: "substituting “$750” for “$600”"
    versions:
      - effective_from: '2018-01-01'
        formula: |-
          if filing_status == 0 or filing_status == 3: unmarried_not_surviving_spouse_additional_amount else: aged_or_blind_additional_amount

  - name: additional_standard_deduction_amount_under_subsection_f
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: IRC section 63(f)(1)-(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/63
              excerpt: "The taxpayer shall be entitled to an additional amount of $600— (A) for himself if he has attained age 65 before the close of his taxable year, and (B) for the spouse of the taxpayer if the spouse has attained age 65 before the close of the taxable year and an additional exemption is allowable to the taxpayer for such spouse under section 151(b)."
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/63
              excerpt: "The taxpayer shall be entitled to an additional amount of $600— (A) for himself if he is blind at the close of the taxable year, and (B) for the spouse of the taxpayer if the spouse is blind as of the close of the taxable year and an additional exemption is allowable to the taxpayer for such spouse under section 151(b)."
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/63
              excerpt: "In the case of an individual who is not married and is not a surviving spouse, paragraphs (1) and (2) shall be applied by substituting “$750” for “$600”."
    versions:
      - effective_from: '2018-01-01'
        formula: |-
          applicable_aged_or_blind_additional_amount
          *
          (
            (if taxpayer_aged_additional_amount_entitlement: 1 else: 0)
            + (if spouse_aged_additional_amount_entitlement: 1 else: 0)
            + (if taxpayer_blind_additional_amount_entitlement: 1 else: 0)
            + (if spouse_blind_additional_amount_entitlement: 1 else: 0)
          )
