format: rulespec/v1
imports:
- us:statutes/26/151#exemption_individual_eligible
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/26/63
  deferred_outputs:
  - output: us:statutes/26/63/f#additional_amount_for_each_aged_or_blind_entitlement
    blocked_by:
    - us:statutes/26/7703#taxpayer_considered_married_after_living_apart_rule
    - us:statutes/26/2/a#surviving_spouse
    reason: Paragraph (3) substitutes $750 for $600 for an individual who is not married
      and is not a surviving spouse, but the required upstream married and surviving-spouse
      classifications are not both available without creating prohibited local filing-status
      or surviving-spouse inputs.
    source_values:
    - us:statutes/26/63/f#aged_or_blind_additional_amount
    - us:statutes/26/63/f#unmarried_not_surviving_spouse_additional_amount
  summary: (f) Aged or blind additional amounts (1) Additional amounts for the aged
    The taxpayer shall be entitled to an additional amount of $600— (A) for himself
    if he has attained age 65 before the close of his taxable year, and (B) for the
    spouse of the taxpayer if the spouse has attained age 65 before the close of the
    taxable year and an additional exemption is allowable to the taxpayer for such
    spouse under section 151(b). (2) Additional amount for blind The taxpayer shall
    be entitled to an additional amount of $600— (A) for himself if he is blind at
    the close of the taxable year, and (B) for the spouse of the taxpayer if the spouse
    is blind as of the close of the taxable year and an additional exemption is allowable
    to the taxpayer for such spouse under section 151(b). For purposes of subparagraph
    (B), if the spouse dies during the taxable year the determination of whether such
    spouse is blind shall be made as of the time of such death. (3) Higher amount
    for certain unmarried individuals In the case of an individual who is not married
    and is not a surviving spouse, paragraphs (1) and (2) shall be applied by substituting
    “$750” for “$600”. (4) Blindness defined For purposes of this subsection, an individual
    is blind only if his central visual acuity does not exceed 20/200 in the better
    eye with correcting lenses, or if his visual acuity is greater than 20/200 but
    is accompanied by a limitation in the fields of vision such that the widest diameter
    of the visual field subtends an angle no greater than 20 degrees.
