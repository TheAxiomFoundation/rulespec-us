format: rulespec/v1
imports:
  - us:statutes/26/151#exemption_individual_eligible
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/26/63
  summary: |-
    (5) Limitation on basic standard deduction in the case of certain dependents In the case of an individual with respect to whom a deduction under section 151 is allowable to another taxpayer for a taxable year beginning in the calendar year in which the individual’s taxable year begins, the basic standard deduction applicable to such individual for such individual’s taxable year shall not exceed the greater of— (A) $500, or (B) the sum of $250 and such individual’s earned income.
rules:
  - name: exemption_individual_of_another_tax_unit
    kind: data_relation
    data_relation:
      predicate: exemption_individual_of_another_tax_unit
      arity: 2
      arguments:
        - TaxUnit
        - Person

  - name: dependent_basic_standard_deduction_statutory_floor_amount
    kind: parameter
    dtype: Money
    unit: USD
    source: IRC section 63(c)(5)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/26/63
              excerpt: "the greater of— (A) $500"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          500

  - name: dependent_basic_standard_deduction_statutory_earned_income_addition_amount
    kind: parameter
    dtype: Money
    unit: USD
    source: IRC section 63(c)(5)(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/26/63
              excerpt: "(B) the sum of $250 and such individual’s earned income."
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          250

  - name: dependent_basic_standard_deduction_limitation_applies
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: IRC section 63(c)(5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/26/63
              excerpt: "In the case of an individual with respect to whom a deduction under section 151 is allowable to another taxpayer for a taxable year beginning in the calendar year in which the individual’s taxable year begins"
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/26/151#exemption_individual_eligible
              output: exemption_individual_eligible
              hash: sha256:28fb0e7c50d48ad764ff1ddee8b654a18006fc3dde026034b4dfb6efb90a0fb2
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          count_where(exemption_individual_of_another_tax_unit, exemption_individual_eligible) > 0

  - name: dependent_basic_standard_deduction_statutory_limit
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: IRC section 63(c)(5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/63
              excerpt: "the basic standard deduction applicable to such individual for such individual’s taxable year shall not exceed the greater of— (A) $500, or (B) the sum of $250 and such individual’s earned income."
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/26/63
              excerpt: "the greater of— (A) $500"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/26/63
              excerpt: "(B) the sum of $250 and such individual’s earned income."
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          max(dependent_basic_standard_deduction_statutory_floor_amount, dependent_basic_standard_deduction_statutory_earned_income_addition_amount + earned_income)
