- name: person_blind_by_visual_acuity
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    us:statutes/26/63/f#input.central_visual_acuity_in_better_eye_with_correcting_lenses: 0.1
    us:statutes/26/63/f#input.widest_diameter_of_visual_field_angle: 30
  output:
    us:statutes/26/63/f#aged_or_blind_additional_amount: 600
    us:statutes/26/63/f#unmarried_not_surviving_spouse_additional_amount: 750
    us:statutes/26/63/f#blindness_visual_acuity_numerator: 20
    us:statutes/26/63/f#blindness_visual_acuity_denominator: 200
    us:statutes/26/63/f#blindness_visual_field_angle_limit: 20
    us:statutes/26/63/f#blind_under_subsection_f: holds
- name: person_blind_by_limited_visual_field
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    us:statutes/26/63/f#input.central_visual_acuity_in_better_eye_with_correcting_lenses: 0.2
    us:statutes/26/63/f#input.widest_diameter_of_visual_field_angle: 20
  output:
    us:statutes/26/63/f#blind_under_subsection_f: holds
- name: single_taxpayer_aged_and_blind_gets_higher_amount_twice
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    us:statutes/26/63/f#input.filing_status: 0
    us:statutes/26/63/f#input.taxpayer_has_attained_age_65_before_close_of_taxable_year: true
    us:statutes/26/63/f#input.spouse_has_attained_age_65_before_close_of_taxable_year: false
    us:statutes/26/63/f#input.additional_exemption_allowable_for_spouse_under_section_151_b: false
    us:statutes/26/63/f#input.taxpayer_is_blind_at_close_of_taxable_year: true
    us:statutes/26/63/f#input.spouse_is_blind_as_of_close_of_taxable_year_or_time_of_death: false
  output:
    us:statutes/26/63/f#taxpayer_aged_additional_amount_entitlement: holds
    us:statutes/26/63/f#spouse_aged_additional_amount_entitlement: not_holds
    us:statutes/26/63/f#taxpayer_blind_additional_amount_entitlement: holds
    us:statutes/26/63/f#spouse_blind_additional_amount_entitlement: not_holds
    us:statutes/26/63/f#applicable_aged_or_blind_additional_amount: 750
    us:statutes/26/63/f#additional_standard_deduction_amount_under_subsection_f: 1500
- name: joint_taxpayer_and_spouse_all_entitlements_use_regular_amount
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    us:statutes/26/63/f#input.filing_status: 1
    us:statutes/26/63/f#input.taxpayer_has_attained_age_65_before_close_of_taxable_year: true
    us:statutes/26/63/f#input.spouse_has_attained_age_65_before_close_of_taxable_year: true
    us:statutes/26/63/f#input.additional_exemption_allowable_for_spouse_under_section_151_b: true
    us:statutes/26/63/f#input.taxpayer_is_blind_at_close_of_taxable_year: true
    us:statutes/26/63/f#input.spouse_is_blind_as_of_close_of_taxable_year_or_time_of_death: true
  output:
    us:statutes/26/63/f#taxpayer_aged_additional_amount_entitlement: holds
    us:statutes/26/63/f#spouse_aged_additional_amount_entitlement: holds
    us:statutes/26/63/f#taxpayer_blind_additional_amount_entitlement: holds
    us:statutes/26/63/f#spouse_blind_additional_amount_entitlement: holds
    us:statutes/26/63/f#applicable_aged_or_blind_additional_amount: 600
    us:statutes/26/63/f#additional_standard_deduction_amount_under_subsection_f: 2400
