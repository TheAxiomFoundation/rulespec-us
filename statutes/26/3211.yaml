format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/26/3211
  summary: |-
    Subsection (a) imposes a tier 1 tax on each employee representative using an applicable percentage equal to the sum of rates under sections 3101(a), 3101(b), 3111(a), and 3111(b). Subsection (b) imposes a tier 2 tax using the percentage determined under section 3241. Subsection (c) cross-references section 3231(e)(2) for different contribution bases.
  status: deferred
  deferred_outputs:
    - output: us:statutes/26/3211/a#tier_1_employee_representative_applicable_percentage
      reason: >-
        Subsection (a) defines the tier 1 applicable percentage by reference to
        rates in effect under section 3101(a), section 3101(b), section 3111(a),
        and section 3111(b). The copied section 3101(b)(2) context includes a
        thresholded additional Medicare tax, so a single flat percentage for all
        compensation cannot be computed faithfully without composing the cited
        threshold, excess-wage, and base mechanics for this employee-representative
        tax.
      blocked_by:
        - us:statutes/26/3101/b/2#additional_medicare_tax
    - output: us:statutes/26/3211/a#tier_1_employee_representative_tax
      reason: >-
        Subsection (a) imposes the tax on compensation received by each employee
        representative, but subsection (c) directs application of different
        contribution bases under section 3231(e)(2). The available context does
        not provide a complete executable section 3211(a) compensation base for
        each rate portion, including the hospital-insurance carve-out mechanics.
      blocked_by:
        - us:statutes/26/3231/e/2#compensation_excess_excluded_before_hospital_insurance_carveout
        - us:statutes/26/3231/e/2#clause_i_compensation_excess_excluded_for_section_3211_a_hospital_insurance_rate_portion
    - output: us:statutes/26/3211/b#tier_2_employee_representative_applicable_percentage
      reason: >-
        Subsection (b) uses the percentage determined under section 3241. The
        copied section 3241 context provides the cited percentage as a TaxUnit-scoped
        annual output, while this source imposes the tax on each employee
        representative; a local Person-scoped alias is deferred until the cited
        calendar-year percentage can be composed without an entity mismatch.
    - output: us:statutes/26/3211/b#tier_2_employee_representative_tax
      reason: >-
        Subsection (b) imposes a tier 2 tax on compensation received by each
        employee representative, but subsection (c) directs application of different
        contribution bases under section 3231(e)(2). The available context does
        not provide an executable tier 2 compensation base for this Person-scoped
        tax.
    - output: us:statutes/26/3211/c#different_contribution_bases_cross_reference
      reason: >-
        Subsection (c) is a cross-reference directing application of section
        3231(e)(2) contribution bases to the taxes imposed by subsections (a) and
        (b), and states no independent executable amount apart from that deferred
        base composition.
rules: []
