format: rulespec/v1
imports:
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/26/3211
  summary: Section 3211 imposes tier 1 and tier 2 taxes on the income of each employee
    representative. The tier 1 applicable percentage is the sum of rates in effect
    under sections 3101(a), 3101(b), 3111(a), and 3111(b). The tier 2 tax uses the
    percentage determined under section 3241. Section 3231(e)(2) governs different
    contribution bases for the taxes imposed by subsections (a) and (b).
  deferred_outputs:
  - output: us:statutes/26/3211/a#tier_1_employee_representative_applicable_percentage
    reason: Subsection (a) defines the tier 1 applicable percentage by reference to
      the rates in effect under section 3101(a), section 3101(b), section 3111(a),
      and section 3111(b). The copied section 3101(b) context includes both the 1.45
      percent hospital-insurance rate and a thresholded additional Medicare tax mechanism,
      so a single flat percentage for all compensation cannot be computed faithfully
      from the available executable contexts.
    blocked_by:
    - us:statutes/26/3101/b/2#additional_medicare_tax
  - output: us:statutes/26/3211/a#tier_1_employee_representative_tax
    reason: Subsection (a) imposes a tier 1 tax on compensation received by each employee
      representative, but subsection (c) cross-references section 3231(e)(2) for different
      contribution bases. The available section 3231(e)(2) context does not provide
      a complete purpose-specific compensation base for the section 3211(a) rate portions,
      including hospital-insurance carve-out treatment, so a raw rate-times-compensation
      formula would ignore the cross-referenced base limitation.
    blocked_by:
    - us:statutes/26/3231/e/2#compensation_excess_excluded_before_hospital_insurance_carveout
  - output: us:statutes/26/3211/b#tier_2_employee_representative_tax
    reason: Subsection (b) imposes a tier 2 tax using the percentage determined under
      section 3241, but subsection (c) cross-references section 3231(e)(2) for different
      contribution bases. The copied section 3231(e)(2) context does not provide an
      executable tier 2 applicable compensation base that can be composed here, so
      a raw percentage-times-compensation formula would ignore the cross-referenced
      contribution-base rule.
  - output: us:statutes/26/3211/b#tier_2_employee_representative_applicable_percentage
    reason: Generated rule kept a local numeric rate, percentage, amount, or base
      that the source sets by cross-reference to another legal section. This output
      is deferred until the cited numeric mechanics can be imported or composed without
      a local placeholder.
  status: deferred
