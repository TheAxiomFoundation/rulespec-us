format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/26/3101
  summary: |-
    (b) Hospital insurance (1) In general In addition to the tax imposed by the preceding subsection, there is hereby imposed on the income of every individual a tax equal to 1.45 percent of the wages (as defined in section 3121(a)) received by him with respect to employment (as defined in section 3121(b)).
rules:
  - name: hospital_insurance_wage_tax_rate
    kind: parameter
    dtype: Rate
    source: 26 USC 3101(b)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/26/3101
              span: "tax equal to 1.45 percent"
    versions:
      - effective_from: '1986-01-01'
        formula: '0.0145'
  - name: hospital_insurance_wage_tax
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 3101(b)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/3101
              span: "tax equal to 1.45 percent of the wages (as defined in section 3121(a)) received by him with respect to employment (as defined in section 3121(b))"
    versions:
      - effective_from: '1986-01-01'
        formula: |-
          wages * hospital_insurance_wage_tax_rate
