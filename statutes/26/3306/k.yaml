format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/26/3306
  summary: |-
    For purposes of this chapter, “agricultural labor” has the meaning assigned by 26 USC 3121(g), except that 26 USC 3121(g)(4)(B) is treated as covering service for a group of farm operators or their cooperative only if those operators produced more than one-half of the commodity.
imports:
  - us:statutes/26/3121/g#operator_commodity_production_more_than_one_half_threshold
  - us:statutes/26/3121/g#farm_cultivation_or_raising_service
  - us:statutes/26/3121/g#farm_operation_service_with_major_part_on_farm
  - us:statutes/26/3121/g#agricultural_marketing_cotton_or_irrigation_service
  - us:statutes/26/3121/g#farm_operator_unmanufactured_commodity_handling_service
  - us:statutes/26/3121/g#nonbusiness_service_on_for_profit_farm
rules:
  - name: chapter_group_operator_unmanufactured_commodity_handling_service
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 26 USC 3306(k), substituted 26 USC 3121(g)(4)(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/26/3306
              excerpt: in the employ of a group of operators of farms (or a cooperative organization of which such operators are members)
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/26/3306
              excerpt: service described in subparagraph (A)
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/26/3306
              excerpt: only if such operators produced more than one-half of the commodity
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/26/3121/g#operator_commodity_production_more_than_one_half_threshold
              output: operator_commodity_production_more_than_one_half_threshold
              hash: sha256:408a1e11c348e9bb5d3587e4630d84c9770988c929a041d4d9150e9c590c69ee
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          (
            service_performed_in_employ_of_group_of_operators_of_farms
            or service_performed_in_employ_of_cooperative_organization_of_which_such_operators_are_members
          )
          and service_in_handling_planting_drying_packing_packaging_processing_freezing_grading_storing_or_delivering_unmanufactured_agricultural_or_horticultural_commodity
          and not service_performed_in_connection_with_commercial_canning_or_commercial_freezing
          and not service_performed_after_commodity_delivery_to_terminal_market_for_distribution_for_consumption
          and farm_operator_group_produced_fraction_of_commodity_with_respect_to_service > operator_commodity_production_more_than_one_half_threshold

