format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/26/3306
  summary: "\u201Ccontributions\u201D means payments required by a State law to be\
    \ made into an unemployment fund by any person on account of having individuals\
    \ in his employ, to the extent made without being deducted or deductible from\
    \ the remuneration of individuals in his employ."
imports:
- us:statutes/26/3306/f#unemployment_fund
rules:
- name: payment_destination_fund
  kind: data_relation
  source: 26 USC 3306(g), "made into an unemployment fund"
  data_relation:
    predicate: payment_destination_fund
    arity: 2
    arguments:
    - Payment
    - Asset
- name: contributions
  kind: derived
  entity: Payment
  dtype: Money
  period: Year
  unit: USD
  source: 26 USC 3306(g)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: definition
        source:
          corpus_citation_path: us/statute/26/3306
      - path: versions[0].formula
        kind: import
        import:
          target: us:statutes/26/3306/f#unemployment_fund
          output: unemployment_fund
          hash: sha256:d9246d9dad8c2f369b7a6020e4df24cad1ccad831c1dcebe2d84b112a7aba70a
  versions:
  - effective_from: '1990-01-01'
    formula: 'if count_where(payment_destination_fund, unemployment_fund) >= 1 and
      payment_required_by_state_law_to_be_made_into_destination_fund and payment_made_by_person_on_account_of_having_individuals_in_employ:
      max(0, payment_amount_made_by_person - payment_amount_deducted_or_deductible_from_remuneration_of_individuals_in_employ)
      else: 0'
