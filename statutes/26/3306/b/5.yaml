format: rulespec/v1
imports:
  - us:statutes/26/3121/v#exempt_governmental_deferred_compensation_plan
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/26/3306
  summary: |-
    "(5) any payment made to, or on behalf of, an employee or his beneficiary" from or under specified qualified plans, annuity plans or contracts, simplified employee pensions, exempt governmental deferred compensation plans, cost-of-living pension supplements, cafeteria plans, and section 408(p) arrangements, with stated carve-outs.
  deferred_outputs:
    - output: us:statutes/26/3306/b/5#section_408_p_arrangement_payment_excluded_from_wages
      reason: Clause (H) depends on whether the payment is under an arrangement to which section 408(p) applies and whether it is an elective contribution under paragraph (2)(A)(i) thereof. The copied section 408(p)(2)(A) context is entity_not_supported and provides no executable arrangement-status output, so this branch cannot be faithfully computed without the upstream arrangement definition.
    - output: us:statutes/26/3306/b/5#qualified_plan_cafeteria_or_deferred_compensation_payment_excluded_from_wages
      reason: The complete paragraph (5) wage exclusion includes clause (H), which is blocked by the unsupported section 408(p) arrangement dependency. This file therefore exposes executable non-408(p) branches only.
rules:
  - name: non_408_p_exclusion_category_applies
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Year
    source: 26 USC 3306(b)(5)(A)-(G)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/26/3306
              excerpt: "from or to a trust described in section 401(a) which is exempt from tax under section 501(a)"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/26/3306
              excerpt: "unless such payment is made to an employee of the trust as remuneration for services rendered as such employee"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/26/3306
              excerpt: "under or to an annuity plan ... described in section 403(a)"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/26/3306
              excerpt: "under a simplified employee pension ... other than any contributions described in section 408(k)(6)"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/26/3306
              excerpt: "under or to an annuity contract described in section 403(b), other than a payment for the purchase of such contract"
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/26/3121/v#exempt_governmental_deferred_compensation_plan
              output: exempt_governmental_deferred_compensation_plan
              hash: sha256:6ec35b93bf860b6a33ca7ce8c5547ddface37026e0ec358a7f80c0df0e1cb956
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/26/3306
              excerpt: "to supplement pension benefits ... to take into account ... the increase in the cost of living"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/26/3306
              excerpt: "only if such supplemental payments are under a plan which is treated as a welfare plan"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/26/3306
              excerpt: "under a cafeteria plan ... if such payment would not be treated as wages without regard to such plan"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/26/3306
              excerpt: "reasonable to believe ... section 125 would not treat any wages as constructively received"
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          (
            payment_from_or_to_trust_described_in_section_401_a_exempt_under_section_501_a_at_time_of_payment
            and not payment_made_to_employee_of_trust_as_remuneration_for_services_rendered_as_employee_and_not_as_beneficiary
          )
          or payment_under_or_to_annuity_plan_described_in_section_403_a_at_time_of_payment
          or (
            payment_under_simplified_employee_pension_defined_in_section_408_k_1
            and not payment_is_contribution_described_in_section_408_k_6
          )
          or (
            payment_under_or_to_annuity_contract_described_in_section_403_b
            and not payment_for_purchase_of_annuity_contract_made_by_reason_of_salary_reduction_agreement
          )
          or exempt_governmental_deferred_compensation_plan
          or (
            payment_supplements_pension_benefits_under_foregoing_plan_or_trust_to_account_for_secretary_of_labor_cost_of_living_increase_since_retirement
            and supplemental_payments_under_plan_treated_as_welfare_plan_under_erisa_section_3_2_b_ii
          )
          or (
            payment_under_cafeteria_plan_within_meaning_of_section_125
            and payment_would_not_be_treated_as_wages_without_regard_to_cafeteria_plan
            and reasonable_to_believe_section_125_would_not_treat_any_wages_as_constructively_received_for_this_section
          )

  - name: non_408_p_payment_excluded_from_wages
    kind: derived
    entity: Payment
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 3306(b)(5)(A)-(G)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/26/3306
              excerpt: "any payment made to, or on behalf of, an employee or his beneficiary"
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/26/3306/b/5#non_408_p_exclusion_category_applies
              output: non_408_p_exclusion_category_applies
              hash: sha256:local
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          if payment_made_to_or_on_behalf_of_employee_or_beneficiary and non_408_p_exclusion_category_applies: payment_amount else: 0
