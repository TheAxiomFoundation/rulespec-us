format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/26/3306
  summary: |-
    Employer means, for a calendar year, a person meeting the general wage or employment-day tests; in the case of agricultural labor, meeting the agricultural wage or employment-day tests; and in the case of specified domestic service, paying cash wages of $1,000 or more. Domestic-service wages and employment are excluded from the general rule, and paragraph (3) employer status does not extend to other services unless paragraph (1) or (2) applies.
rules:
  - name: general_calendar_quarter_wage_threshold
    kind: parameter
    dtype: Money
    unit: USD
    source: 26 USC 3306(a)(1)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/26/3306
              excerpt: "paid wages of $1,500 or more"
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          1500

  - name: general_employment_day_threshold
    kind: parameter
    dtype: Count
    source: 26 USC 3306(a)(1)(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/26/3306
              excerpt: "on each of some 20 days"
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          20

  - name: general_individuals_per_employment_day_threshold
    kind: parameter
    dtype: Count
    source: 26 USC 3306(a)(1)(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/26/3306
              excerpt: "employed at least one individual"
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          1

  - name: agricultural_calendar_quarter_wage_threshold
    kind: parameter
    dtype: Money
    unit: USD
    source: 26 USC 3306(a)(2)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/26/3306
              excerpt: "paid wages of $20,000 or more for agricultural labor"
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          20000

  - name: agricultural_employment_day_threshold
    kind: parameter
    dtype: Count
    source: 26 USC 3306(a)(2)(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/26/3306
              excerpt: "on each of some 20 days"
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          20

  - name: agricultural_individuals_per_employment_day_threshold
    kind: parameter
    dtype: Count
    source: 26 USC 3306(a)(2)(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/26/3306
              excerpt: "employed at least 10 individuals"
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          10

  - name: domestic_service_cash_wage_threshold
    kind: parameter
    dtype: Money
    unit: USD
    source: 26 USC 3306(a)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/26/3306
              excerpt: "paid wages in cash of $1,000 or more"
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          1000

  - name: employer_under_general_rule
    kind: derived
    entity: Employer
    dtype: Judgment
    period: Year
    source: 26 USC 3306(a)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/statute/26/3306
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/26/3306
              excerpt: "there shall not be taken into account any wages paid to, or employment of, an employee performing domestic services"
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/26/3306/a#general_calendar_quarter_wage_threshold
              output: general_calendar_quarter_wage_threshold
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/26/3306/a#general_employment_day_threshold
              output: general_employment_day_threshold
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/26/3306/a#general_individuals_per_employment_day_threshold
              output: general_individuals_per_employment_day_threshold
              hash: sha256:local
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          maximum_wages_paid_in_a_calendar_quarter_current_or_preceding_year_excluding_domestic_service >= general_calendar_quarter_wage_threshold
          or (
            general_employment_days_in_current_or_preceding_year_different_calendar_weeks >= general_employment_day_threshold
            and minimum_individuals_employed_in_employment_on_each_general_counted_day_excluding_domestic_service >= general_individuals_per_employment_day_threshold
          )

  - name: employer_for_agricultural_labor
    kind: derived
    entity: Employer
    dtype: Judgment
    period: Year
    source: 26 USC 3306(a)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/statute/26/3306
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/26/3306/a#agricultural_calendar_quarter_wage_threshold
              output: agricultural_calendar_quarter_wage_threshold
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/26/3306/a#agricultural_employment_day_threshold
              output: agricultural_employment_day_threshold
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/26/3306/a#agricultural_individuals_per_employment_day_threshold
              output: agricultural_individuals_per_employment_day_threshold
              hash: sha256:local
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          maximum_agricultural_labor_wages_paid_in_a_calendar_quarter_current_or_preceding_year >= agricultural_calendar_quarter_wage_threshold
          or (
            agricultural_labor_employment_days_in_current_or_preceding_year_different_calendar_weeks >= agricultural_employment_day_threshold
            and minimum_individuals_employed_in_agricultural_labor_on_each_counted_day >= agricultural_individuals_per_employment_day_threshold
          )

  - name: employer_for_domestic_service
    kind: derived
    entity: Employer
    dtype: Judgment
    period: Year
    source: 26 USC 3306(a)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/statute/26/3306
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/26/3306/a#domestic_service_cash_wage_threshold
              output: domestic_service_cash_wage_threshold
              hash: sha256:local
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          maximum_cash_wages_paid_for_domestic_service_in_private_home_local_college_club_or_local_chapter_of_college_fraternity_or_sorority_in_a_calendar_quarter_current_or_preceding_year >= domestic_service_cash_wage_threshold

  - name: employer_with_respect_to_service_other_than_domestic_service
    kind: derived
    entity: Employer
    dtype: Judgment
    period: Year
    source: 26 USC 3306(a)(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/26/3306
              excerpt: "shall not be treated as an employer with respect to wages paid for any service other than domestic service"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/26/3306
              excerpt: "unless such person is treated as an employer under paragraph (1) or (2)"
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/26/3306/a#employer_under_general_rule
              output: employer_under_general_rule
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/26/3306/a#employer_for_agricultural_labor
              output: employer_for_agricultural_labor
              hash: sha256:local
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          employer_under_general_rule
          or employer_for_agricultural_labor

