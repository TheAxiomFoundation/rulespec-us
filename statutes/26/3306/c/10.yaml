format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/26/3306
  summary: |-
    26 USC 3306(c)(10) covers service for certain exempt organizations when remuneration is less than $50; school, college, or university service by students and advised student spouses; full-time credit work-experience program service at nonprofit or public educational institutions, except employer-established programs; and hospital service by patients.
rules:
  - name: exempt_organization_service_remuneration_quarter_threshold
    kind: parameter
    dtype: Money
    unit: USD
    source: 26 USC 3306(c)(10)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/26/3306
              excerpt: "less than $50"
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          50

  - name: exempt_organization_service_remuneration_below_threshold
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 26 USC 3306(c)(10)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/26/3306
              excerpt: "remuneration for such service is less than $50"
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          remuneration_for_service_in_calendar_quarter < exempt_organization_service_remuneration_quarter_threshold

  - name: service_in_employ_of_qualifying_exempt_organization
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 26 USC 3306(c)(10)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/26/3306
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/26/3306
              excerpt: "other than an organization described in section 401(a)"
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          service_performed_in_employ_of_organization
          and (
            (
              employer_is_section_501_a_income_tax_exempt_organization
              and not employer_is_section_401_a_organization
            )
            or employer_is_section_521_income_tax_exempt_organization
          )

  - name: exempt_organization_low_remuneration_service_excepted_from_employment
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 26 USC 3306(c)(10)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/3306
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          service_in_employ_of_qualifying_exempt_organization
          and exempt_organization_service_remuneration_below_threshold

  - name: student_school_service_excepted_from_employment
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 26 USC 3306(c)(10)(B)(i)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/26/3306
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          service_performed_in_employ_of_school_college_or_university
          and service_performed_by_student_enrolled_and_regularly_attending_classes_at_employing_school_college_or_university

  - name: student_spouse_school_service_excepted_from_employment
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 26 USC 3306(c)(10)(B)(ii)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/26/3306
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          service_performed_in_employ_of_school_college_or_university
          and service_performed_by_spouse_of_student_enrolled_and_regularly_attending_classes_at_employing_school_college_or_university
          and spouse_advised_at_commencement_employment_provided_under_school_financial_assistance_program_for_student
          and spouse_advised_at_commencement_employment_not_covered_by_unemployment_insurance_program

  - name: school_student_or_spouse_service_excepted_from_employment
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 26 USC 3306(c)(10)(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/3306
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          student_school_service_excepted_from_employment
          or student_spouse_school_service_excepted_from_employment

  - name: work_experience_education_program_service_excepted_from_employment
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 26 USC 3306(c)(10)(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/26/3306
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/26/3306
              excerpt: "program established for or on behalf of an employer"
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          individual_enrolled_at_qualifying_nonprofit_or_public_educational_institution_as_full_time_credit_student
          and institution_normally_maintains_regular_faculty_and_curriculum
          and institution_normally_has_regularly_organized_body_of_students_in_attendance_at_educational_activity_place
          and program_combines_academic_instruction_with_work_experience
          and service_is_integral_part_of_full_time_work_experience_program
          and institution_certified_service_integral_to_program_to_employer
          and not program_established_for_or_on_behalf_of_employer_or_group_of_employers

  - name: hospital_patient_service_excepted_from_employment
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 26 USC 3306(c)(10)(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/26/3306
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          service_performed_in_employ_of_hospital
          and service_performed_by_patient_of_hospital

  - name: educational_health_and_exempt_organization_service_excepted_from_employment
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 26 USC 3306(c)(10)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/3306
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          exempt_organization_low_remuneration_service_excepted_from_employment
          or school_student_or_spouse_service_excepted_from_employment
          or work_experience_education_program_service_excepted_from_employment
          or hospital_patient_service_excepted_from_employment
