format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/26/3306
  summary: |-
    Agricultural labor is excepted from employment unless the employer meets either the $20,000 cash-remuneration-quarter test or the 20-days/10-individuals agricultural-labor test, and the labor is not performed by an alien admitted to perform agricultural labor under the cited Immigration and Nationality Act provisions.
rules:
  - name: agricultural_labor_cash_remuneration_quarter_threshold
    kind: parameter
    dtype: Money
    unit: USD
    source: 26 USC 3306(c)(1)(A)(i)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/26/3306
              excerpt: cash of $20,000 or more
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          20000

  - name: agricultural_labor_days_different_weeks_threshold
    kind: parameter
    dtype: Count
    source: 26 USC 3306(c)(1)(A)(ii)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/26/3306
              excerpt: some 20 days
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          20

  - name: agricultural_labor_individuals_per_day_threshold
    kind: parameter
    dtype: Count
    source: 26 USC 3306(c)(1)(A)(ii)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/26/3306
              excerpt: 10 or more individuals
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          10

  - name: agricultural_labor_cash_remuneration_test_satisfied
    kind: derived
    entity: Employer
    dtype: Judgment
    period: Year
    source: 26 USC 3306(c)(1)(A)(i)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/26/3306
              excerpt: during any calendar quarter in the calendar year or the preceding calendar year paid remuneration in cash of $20,000 or more
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          maximum_cash_remuneration_paid_to_agricultural_labor_individuals_including_immigration_and_nationality_act_agricultural_worker_aliens_in_any_calendar_quarter_during_calendar_year_or_preceding_calendar_year >= agricultural_labor_cash_remuneration_quarter_threshold

  - name: agricultural_labor_day_count_test_satisfied
    kind: derived
    entity: Employer
    dtype: Judgment
    period: Year
    source: 26 USC 3306(c)(1)(A)(ii)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/26/3306
              excerpt: on each of some 20 days ... each day being in a different calendar week ... 10 or more individuals
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          counted_days_during_calendar_year_or_preceding_calendar_year_each_in_different_calendar_week >= agricultural_labor_days_different_weeks_threshold
          and minimum_agricultural_labor_individuals_including_immigration_and_nationality_act_agricultural_worker_aliens_employed_for_some_portion_of_each_counted_day >= agricultural_labor_individuals_per_day_threshold

  - name: agricultural_labor_employer_test_satisfied
    kind: derived
    entity: Employer
    dtype: Judgment
    period: Year
    source: 26 USC 3306(c)(1)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/3306
              excerpt: who— (i) ... or (ii) ...
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          agricultural_labor_cash_remuneration_test_satisfied
          or agricultural_labor_day_count_test_satisfied

  - name: agricultural_labor_excepted_from_employment
    kind: derived
    entity: Employer
    dtype: Judgment
    period: Year
    source: 26 USC 3306(c)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/26/3306
              excerpt: agricultural labor ... unless ... and ... such labor is not agricultural labor performed by an individual who is an alien admitted to the United States to perform agricultural labor
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          labor_is_agricultural_labor
          and (
            not agricultural_labor_employer_test_satisfied
            or labor_performed_by_immigration_and_nationality_act_agricultural_worker_alien
          )
