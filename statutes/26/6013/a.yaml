          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/6013
              excerpt: "the executor or administrator may disaffirm such joint return by making, within 1 year after the last day prescribed by law for filing the return of the surviving spouse, a separate return for the taxable year of the decedent with respect to which the joint return was made"
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/26/6013/a#executor_disaffirm_deadline_years
              output: executor_disaffirm_deadline_years
              hash: sha256:local
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          executor_or_administrator_of_decedent_appointed_after_surviving_spouse_made_joint_return
          and separate_return_for_decedent_taxable_year_made_by_executor_or_administrator
          and years_after_last_day_prescribed_for_filing_surviving_spouse_return <= executor_disaffirm_deadline_years

