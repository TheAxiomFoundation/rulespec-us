format: rulespec/v1
imports:
  - us:statutes/26/443/a/1#annual_accounting_period_change_with_secretary_approval
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/26/6013
  summary: |-
    (a) Joint returns A husband and wife may make a single return jointly of income taxes under subtitle A, even though one of the spouses has neither gross income nor deductions, except as provided below: (1) no joint return shall be made if either the husband or wife at any time during the taxable year is a nonresident alien; (2) no joint return shall be made if the husband and wife have different taxable years; except that if such taxable years begin on the same day and end on different days because of the death of either or both, then the joint return may be made with respect to the taxable year of each. The above exception shall not apply if the surviving spouse remarries before the close of his taxable year, nor if the taxable year of either spouse is a fractional part of a year under section 443(a)(1); (3) in the case of death of one spouse or both spouses the joint return with respect to the decedent may be made only by his executor or administrator; except that in the case of the death of one spouse the joint return may be made by the surviving spouse with respect to both himself and the decedent if no return for the taxable year has been made by the decedent, no executor or administrator has been appointed, and no executor or administrator is appointed before the last day prescribed by law for filing the return of the surviving spouse. If an executor or administrator of the decedent is appointed after the making of the joint return by the surviving spouse, the executor or administrator may disaffirm such joint return by making, within 1 year after the last day prescribed by law for filing the return of the surviving spouse, a separate return for the taxable year of the decedent with respect to which the joint return was made, in which case the return made by the survivor shall constitute his separate return.
rules:
  - name: executor_disaffirm_deadline_years
    kind: parameter
    dtype: Integer
    source: 26 USC 6013(a)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/26/6013
              excerpt: "within 1 year after the last day prescribed by law for filing the return of the surviving spouse"
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          1

  - name: different_taxable_years_death_exception_available
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: 26 USC 6013(a)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/26/6013
              excerpt: "except that if such taxable years begin on the same day and end on different days because of the death of either or both, then the joint return may be made with respect to the taxable year of each"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/26/6013
              excerpt: "The above exception shall not apply if the surviving spouse remarries before the close of his taxable year"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/26/6013
              excerpt: "nor if the taxable year of either spouse is a fractional part of a year under section 443(a)(1)"
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/26/443/a/1#annual_accounting_period_change_with_secretary_approval
              output: annual_accounting_period_change_with_secretary_approval
              hash: sha256:0a652578d31c44182e5a1706434b7a4acce3474d5e482d51f1bf3be0c6d1dd15
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          spouses_have_different_taxable_years
          and taxable_years_begin_on_same_day
          and taxable_years_end_on_different_days_because_of_death_of_either_or_both_spouses
          and not surviving_spouse_remarries_before_close_of_surviving_spouse_taxable_year
          and not annual_accounting_period_change_with_secretary_approval

  - name: decedent_joint_return_maker_authorized
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: 26 USC 6013(a)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/26/6013
              excerpt: "in the case of death of one spouse or both spouses the joint return with respect to the decedent may be made only by his executor or administrator"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/26/6013
              excerpt: "except that in the case of the death of one spouse the joint return may be made by the surviving spouse with respect to both himself and the decedent if no return for the taxable year has been made by the decedent, no executor or administrator has been appointed, and no executor or administrator is appointed before the last day prescribed by law for filing the return of the surviving spouse"
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          not death_of_one_spouse_or_both_spouses
          or joint_return_with_respect_to_decedent_made_by_executor_or_administrator
          or (
              death_of_one_spouse
              and joint_return_with_respect_to_both_survivor_and_decedent_made_by_surviving_spouse
              and no_return_for_taxable_year_made_by_decedent
              and no_executor_or_administrator_has_been_appointed
              and no_executor_or_administrator_appointed_before_last_day_prescribed_for_filing_surviving_spouse_return
          )

  - name: joint_return_may_be_made
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: 26 USC 6013(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/6013
              excerpt: "A husband and wife may make a single return jointly of income taxes under subtitle A, even though one of the spouses has neither gross income nor deductions, except as provided below"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/26/6013
              excerpt: "no joint return shall be made if either the husband or wife at any time during the taxable year is a nonresident alien"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/26/6013
              excerpt: "no joint return shall be made if the husband and wife have different taxable years"
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/26/6013/a#different_taxable_years_death_exception_available
              output: different_taxable_years_death_exception_available
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/26/6013/a#decedent_joint_return_maker_authorized
              output: decedent_joint_return_maker_authorized
              hash: sha256:local
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          taxpayers_are_husband_and_wife
          and single_return_jointly_of_income_taxes_under_subtitle_a_is_made
          and not either_spouse_is_nonresident_alien_at_any_time_during_taxable_year
          and (
              not spouses_have_different_taxable_years
              or different_taxable_years_death_exception_available
          )
          and decedent_joint_return_maker_authorized

