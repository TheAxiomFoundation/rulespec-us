  - name: average_account_benefits_ratio_band
    kind: derived
    entity: TaxUnit
    dtype: Integer
    period: Year
    source: 26 USC 3241(b), tax rate schedule, Average account benefits ratio bands
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/3241
              excerpt: "Average account benefits ratio | At least | But less than"
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/26/3241/b#average_account_benefits_ratio_band_lower_bound
              output: average_account_benefits_ratio_band_lower_bound
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/26/3241/b#average_account_benefits_ratio_band_upper_bound
              output: average_account_benefits_ratio_band_upper_bound
              hash: sha256:local
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          if average_account_benefits_ratio < average_account_benefits_ratio_band_upper_bound[1]: 1 else: if average_account_benefits_ratio >= average_account_benefits_ratio_band_lower_bound[2] and average_account_benefits_ratio < average_account_benefits_ratio_band_upper_bound[2]: 2 else: if average_account_benefits_ratio >= average_account_benefits_ratio_band_lower_bound[3] and average_account_benefits_ratio < average_account_benefits_ratio_band_upper_bound[3]: 3 else: if average_account_benefits_ratio >= average_account_benefits_ratio_band_lower_bound[4] and average_account_benefits_ratio < average_account_benefits_ratio_band_upper_bound[4]: 4 else: if average_account_benefits_ratio >= average_account_benefits_ratio_band_lower_bound[5] and average_account_benefits_ratio < average_account_benefits_ratio_band_upper_bound[5]: 5 else: if average_account_benefits_ratio >= average_account_benefits_ratio_band_lower_bound[6] and average_account_benefits_ratio < average_account_benefits_ratio_band_upper_bound[6]: 6 else: if average_account_benefits_ratio >= average_account_benefits_ratio_band_lower_bound[7] and average_account_benefits_ratio < average_account_benefits_ratio_band_upper_bound[7]: 7 else: if average_account_benefits_ratio >= average_account_benefits_ratio_band_lower_bound[8] and average_account_benefits_ratio < average_account_benefits_ratio_band_upper_bound[8]: 8 else: if average_account_benefits_ratio >= average_account_benefits_ratio_band_lower_bound[9] and average_account_benefits_ratio < average_account_benefits_ratio_band_upper_bound[9]: 9 else: if average_account_benefits_ratio >= average_account_benefits_ratio_band_lower_bound[10] and average_account_benefits_ratio < average_account_benefits_ratio_band_upper_bound[10]: 10 else: if average_account_benefits_ratio >= average_account_benefits_ratio_band_lower_bound[11] and average_account_benefits_ratio < average_account_benefits_ratio_band_upper_bound[11]: 11 else: 12

