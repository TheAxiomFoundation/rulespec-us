    kind: parameter
    dtype: Decimal
    indexed_by: average_account_benefits_ratio_band
    source: 26 USC 3241(b), tax rate schedule, Average account benefits ratio At least column
    metadata:
      proof:
        atoms:
          - path: versions[0].values
            kind: parameter_table
            source:
              corpus_citation_path: us/statute/26/3241
              excerpt: "At least: 2.5, 3.0, 3.5, 4.0, 6.1, 6.5, 7.0, 7.5, 8.0, 8.5, 9.0"
              table:
                header: Tax rate schedule
                row_key: Average account benefits ratio band
                column_key: At least
    versions:
      - effective_from: '1990-01-01'
        values:
          2: 2.5
          3: 3.0
          4: 3.5
          5: 4.0
          6: 6.1
          7: 6.5
          8: 7.0
          9: 7.5
          10: 8.0
          11: 8.5
          12: 9.0

