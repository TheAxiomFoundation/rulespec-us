format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/26/3241
  summary: |-
    Tax rate schedule for average account benefits ratio bands gives applicable percentages for sections 3211(b) and 3221(b), and for section 3201(b).
rules:
