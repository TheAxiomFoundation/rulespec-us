  source_verification:
    corpus_citation_path: us/statute/26/3512
  summary: |-
    Section 3512 treats remuneration paid to a motion picture project worker by a motion picture project employer during a calendar year as remuneration paid with respect to employment of that worker by that employer for purposes of sections 3121(a)(1) and 3306(b)(1), with employer identity determined under section 3512 and without regard to usual common-law employer-employee rules. Subsection (b) defines “motion picture project employer,” “motion picture project worker,” “motion picture project,” and “affiliate; affiliated.”
  deferred_outputs:
    - output: us:statutes/26/3512#motion_picture_project_employer
      reason: >-
        The definition in 26 USC 3512(b)(1) depends on unresolved upstream legal definitions and mechanics, including control of payment within the meaning of section 3401(d)(1), affiliate status under section 414(b) or (c), and whether remuneration is paid to motion picture project workers as defined through affiliated-client and motion-picture-project concepts. No copied RuleSpec context provides executable targets for section 3401(d)(1) or section 414, and the definition-of-X rule cannot faithfully expose the final defined term while replacing those dependencies with local placeholders.
      source_values:
        - us:statutes/26/3512#motion_picture_project_worker_remuneration_percentage_threshold
    - output: us:statutes/26/3512#motion_picture_project_worker
      reason: >-
        The definition in 26 USC 3512(b)(2) requires determining whether clients are affiliated with the motion picture project employer, and affiliation is defined by 26 USC 3512(b)(4) by reference to persons treated as a single employer under section 414(b) or (c). No copied executable RuleSpec context provides section 414(b) or (c).
    - output: us:statutes/26/3512#motion_picture_project
      reason: >-
        The definition in 26 USC 3512(b)(3) depends on whether production property is described in section 168(f)(3) and whether records are required under 18 USC 2257. No copied executable RuleSpec context provides section 168(f)(3), and the missing described-property definition is essential to the defined term.
    - output: us:statutes/26/3512#affiliate
      reason: >-
        The definition in 26 USC 3512(b)(4) depends on whether persons are treated as a single employer under section 414(b) or (c). No copied executable RuleSpec context provides section 414(b) or (c).
    - output: us:statutes/26/3512/b#definitions
      reason: >-
        Subsection 3512(b) is a definitions subsection. Its operative defined terms cannot be computed faithfully because several essential upstream definitions and cross-referenced mechanics are unavailable in copied executable RuleSpec context: section 3401(d)(1), section 168(f)(3), and section 414(b) or (c).
      source_values:
        - us:statutes/26/3512#motion_picture_project_worker_remuneration_percentage_threshold
    - output: us:statutes/26/3512#a_remuneration_treated_as_paid_with_respect_to_employment_for_sections_3121_a_1_and_3306_b_1
      reason: >-
        The treatment rule in 26 USC 3512(a) depends on the final definitions of motion picture project worker and motion picture project employer in subsection (b), including the unresolved upstream dependencies listed for those definitions. It also applies for purposes of sections 3121(a)(1) and 3306(b)(1), but the employer-identity rule cannot be encoded before subsection (b)'s defined terms are executable.
