  summary: |-
    The Secretary shall prescribe such regulations or other guidance as may be necessary to carry out the purposes of this section, including guidance on avoidance, compliance burdens, deposit-penalty waivers, recapture, wage conformity, credit advances, and allocation, reporting, and substantiation of collectively bargained pension and apprenticeship contributions.
