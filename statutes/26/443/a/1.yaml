format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/26/443
  summary: |-
    (1) Change of annual accounting period When the taxpayer, with the approval of the Secretary, changes his annual accounting period. In such a case, the return shall be made for the short period beginning on the day after the close of the former taxable year and ending at the close of the day before the day designated as the first day of the new taxable year.
rules:
  - name: annual_accounting_period_change_with_secretary_approval
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: 26 USC 443(a)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/26/443
              excerpt: "When the taxpayer, with the approval of the Secretary, changes his annual accounting period."
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          taxpayer_changes_annual_accounting_period
          and secretary_approves_change_of_annual_accounting_period

  - name: return_made_for_required_short_period_after_accounting_period_change
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: 26 USC 443(a)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/26/443
              excerpt: "When the taxpayer, with the approval of the Secretary, changes his annual accounting period."
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/443
              excerpt: "In such a case, the return shall be made for the short period beginning on the day after the close of the former taxable year and ending at the close of the day before the day designated as the first day of the new taxable year."
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          not annual_accounting_period_change_with_secretary_approval
          or (
              return_is_made_for_short_period
              and short_period_begins_on_day_after_close_of_former_taxable_year
              and short_period_ends_at_close_of_day_before_first_day_of_new_taxable_year
          )
