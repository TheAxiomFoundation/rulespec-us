              corpus_citation_path: us/statute/26/931
              excerpt: "An individual shall not be allowed— (1) as a deduction from gross income any deductions (other than the deduction under section 151, relating to personal exemptions) ... properly allocable or chargeable against amounts excluded from gross income under this section."
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          max(
              0,
              deductions_other_than_section_151_before_section_931_denial
              - section_931_disallowed_deductions_excluding_section_151
          )

