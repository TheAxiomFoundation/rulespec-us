  summary: |-
    (a) General rule There shall be allowed as a deduction all interest paid or accrued within the taxable year on indebtedness.

    (d) Limitation on investment interest (1) In general In the case of a taxpayer other than a corporation, the amount allowed as a deduction under this chapter for investment interest for any taxable year shall not exceed the net investment income of the taxpayer for the taxable year. (2) Carryforward of disallowed interest The amount not allowed as a deduction for any taxable year by reason of paragraph (1) shall be treated as investment interest paid or accrued by the taxpayer in the succeeding taxable year.

    (h) Disallowance of deduction for personal interest (1) In general In the case of a taxpayer other than a corporation, no deduction shall be allowed under this chapter for personal interest paid or accrued during the taxable year. ... (4) Special rules for taxable years 2025 through 2028 relating to qualified passenger vehicle loan interest (A) In general In the case of taxable years beginning after December 31, 2024 , and before January 1, 2029 , for purposes of this subsection the term “personal interest” shall not include qualified passenger vehicle loan interest. (B) Qualified passenger vehicle loan interest defined (i) In general For purposes of this paragraph, the term “qualified passenger vehicle loan interest” means any interest which is paid or accrued during the taxable year on indebtedness incurred by the taxpayer after December 31, 2024 , for the purchase of, and that is secured by a first lien on, an applicable passenger vehicle for personal use. ... (C) Limitations (i) Dollar limit The amount of interest taken into account by a taxpayer under subparagraph (B) for any taxable year shall not exceed $10,000. (ii) Limitation based on modified adjusted gross income (I) In general The amount which is otherwise allowable as a deduction under subsection (a) as qualified passenger vehicle loan interest (determined without regard to this clause and after the application of clause (i)) shall be reduced (but not below zero) by $200 for each $1,000 (or portion thereof) by which the modified adjusted gross income of the taxpayer for the taxable year exceeds $100,000 ($200,000 in the case of a joint return). (II) Modified adjusted gross income For purposes of this clause, the term “modified adjusted gross income” means the adjusted gross income of the taxpayer for the taxable year increased by any amount excluded from gross income under section 911, 931, or 933. (D) Applicable passenger vehicle The term “applicable passenger vehicle” means any vehicle— (i) the original use of which commences with the taxpayer, (ii) which is manufactured primarily for use on public streets, roads, and highways (not including a vehicle operated exclusively on a rail or rails), (iii) which has at least 2 wheels, (iv) which is a car, minivan, van, sport utility vehicle, pickup truck, or motorcycle, (v) which is treated as a motor vehicle for purposes of title II of the Clean Air Act, and (vi) which has a gross vehicle weight rating of less than 14,000 pounds. Such term shall not include any vehicle the final assembly of which did not occur within the United States.

    (j) Limitation on business interest (1) In general The amount allowed as a deduction under this chapter for any taxable year for business interest shall not exceed the sum of— (A) the business interest income of such taxpayer for such taxable year, (B) 30 percent of the adjusted taxable income of such taxpayer for such taxable year, plus (C) the floor plan financing interest of such taxpayer for such taxable year. The amount determined under subparagraph (B) shall not be less than zero. (2) Carryforward of disallowed business interest The amount of any business interest not allowed as a deduction for any taxable year by reason of paragraph (1) shall be treated as business interest paid or accrued in the succeeding taxable year. ... (10) Coordination with interest capitalization provisions (A) In general In applying this subsection— (i) the limitation under paragraph (1) shall apply to business interest without regard to whether the taxpayer would otherwise deduct such business interest or capitalize such business interest under an interest capitalization provision, and (ii) any reference in this subsection to a deduction for business interest shall be treated as including a reference to the capitalization of business interest.

    This parent provision contains multiple “to the extent” and cross-referenced limitation regimes, including subsection (h)(4) interaction with subsection (a), section 911/931/933 modified adjusted gross income components, filing-status-dependent thresholds, and child-fragment computations already encoded separately. Under the current executable schema, this aggregate parent cannot faithfully recompute or wire adjusted bases into those child results without local placeholders or import cycles; executable rules are therefore deferred for this parent artifact.
