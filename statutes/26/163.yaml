format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/26/163
  summary: |-
    26 USC 163(a): There shall be allowed as a deduction all interest paid or accrued within the taxable year on indebtedness.
    26 USC 163(h)(1): In the case of a taxpayer other than a corporation, no deduction shall be allowed under this chapter for personal interest paid or accrued during the taxable year.
    26 USC 163(h)(4)(A): In the case of taxable years beginning after December 31, 2024, and before January 1, 2029, for purposes of subsection (h) the term "personal interest" shall not include qualified passenger vehicle loan interest.
    26 USC 163(h)(4)(B): Qualified passenger vehicle loan interest means any interest paid or accrued during the taxable year on indebtedness incurred by the taxpayer after December 31, 2024, for the purchase of, and secured by a first lien on, an applicable passenger vehicle for personal use. It does not include amounts paid or incurred on a loan to finance fleet sales, a loan for a commercial vehicle not used for personal purposes, lease financing, a loan for a vehicle with a salvage title, or a loan for a vehicle intended to be used for scrap or parts. Interest is not treated as qualified passenger vehicle loan interest unless the taxpayer includes the vehicle identification number on the return.
    26 USC 163(h)(4)(C): The amount of interest taken into account shall not exceed $10,000 and is reduced, but not below zero, by $200 for each $1,000 (or portion thereof) by which modified adjusted gross income exceeds $100,000 ($200,000 in the case of a joint return). Modified adjusted gross income means adjusted gross income increased by any amount excluded under section 911, 931, or 933.
    26 USC 163(h)(4)(D): Applicable passenger vehicle means a vehicle the original use of which commences with the taxpayer, manufactured primarily for use on public streets, roads, and highways and not operated exclusively on rail, with at least 2 wheels, which is a car, minivan, van, sport utility vehicle, pickup truck, or motorcycle, treated as a motor vehicle for purposes of title II of the Clean Air Act, with gross vehicle weight rating less than 14,000 pounds, and excludes any vehicle whose final assembly did not occur within the United States.
rules:
  - name: passenger_vehicle_loan_interest_cap
    kind: parameter
    dtype: Money
    unit: USD
    source: 26 USC 163(h)(4)(C)(i)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/26/163
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          10000

  - name: passenger_vehicle_loan_interest_phaseout_reduction
    kind: parameter
    dtype: Money
    unit: USD
    source: 26 USC 163(h)(4)(C)(ii)(I)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/26/163
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          200

  - name: passenger_vehicle_loan_interest_phaseout_increment
    kind: parameter
    dtype: Money
    unit: USD
    source: 26 USC 163(h)(4)(C)(ii)(I)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/26/163
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          1000

  - name: passenger_vehicle_loan_interest_phaseout_threshold_other
    kind: parameter
    dtype: Money
    unit: USD
    source: 26 USC 163(h)(4)(C)(ii)(I)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/26/163
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          100000

  - name: passenger_vehicle_loan_interest_phaseout_threshold_joint
    kind: parameter
    dtype: Money
    unit: USD
    source: 26 USC 163(h)(4)(C)(ii)(I)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/26/163
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          200000

  - name: applicable_passenger_vehicle_minimum_wheels
    kind: parameter
    dtype: Integer
    source: 26 USC 163(h)(4)(D)(iii)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/26/163
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          2

  - name: applicable_passenger_vehicle_gvwr_limit
    kind: parameter
    dtype: Integer
    source: 26 USC 163(h)(4)(D)(vi)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/26/163
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          14000

  - name: passenger_vehicle_loan_interest_modified_adjusted_gross_income
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 163(h)(4)(C)(ii)(II)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/163
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/statute/26/163
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          adjusted_gross_income
          + amount_excluded_from_gross_income_under_section_911
          + amount_excluded_from_gross_income_under_section_931
          + amount_excluded_from_gross_income_under_section_933

  - name: passenger_vehicle_loan_interest_phaseout_threshold
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 163(h)(4)(C)(ii)(I)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/163
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/26/163
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          match filing_status:
              1 => passenger_vehicle_loan_interest_phaseout_threshold_joint
              4 => passenger_vehicle_loan_interest_phaseout_threshold_joint
              0 => passenger_vehicle_loan_interest_phaseout_threshold_other
              2 => passenger_vehicle_loan_interest_phaseout_threshold_other
              3 => passenger_vehicle_loan_interest_phaseout_threshold_other

  - name: applicable_passenger_vehicle
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: 26 USC 163(h)(4)(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/statute/26/163
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/26/163
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          vehicle_original_use_commences_with_taxpayer
          and vehicle_manufactured_primarily_for_public_streets_roads_and_highways
          and not vehicle_operated_exclusively_on_rail_or_rails
          and vehicle_wheel_count >= applicable_passenger_vehicle_minimum_wheels
          and vehicle_is_car_minivan_van_suv_pickup_truck_or_motorcycle
          and vehicle_treated_as_motor_vehicle_under_clean_air_act_title_II
          and vehicle_gross_vehicle_weight_rating < applicable_passenger_vehicle_gvwr_limit
          and vehicle_final_assembly_occurred_within_united_states

  - name: qualified_passenger_vehicle_loan_interest_applies
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: 26 USC 163(h)(4)(A)-(B), (E)(ii)-(iii)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/26/163
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/26/163
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          taxable_year_begins_after_2024_and_before_2029
          and indebtedness_incurred_after_2024_for_purchase_of_vehicle
          and indebtedness_secured_by_first_lien_on_vehicle
          and vehicle_purchased_for_personal_use
          and applicable_passenger_vehicle
          and vehicle_identification_number_included_on_return
          and not loan_finances_fleet_sales
          and not loan_for_commercial_vehicle_not_used_for_personal_purposes
          and not lease_financing
          and not loan_finances_vehicle_with_salvage_title
          and not loan_finances_vehicle_intended_for_scrap_or_parts
          and not indebtedness_owed_to_related_person_under_section_267_b_or_707_b_1

  - name: passenger_vehicle_loan_interest_before_phaseout
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 163(h)(4)(B), (C)(i)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/163
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/26/163
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if qualified_passenger_vehicle_loan_interest_applies:
              min(passenger_vehicle_loan_interest_paid_or_accrued, passenger_vehicle_loan_interest_cap)
          else:
              0

  - name: passenger_vehicle_loan_interest_phaseout_amount
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 163(h)(4)(C)(ii)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/163
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/26/163
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          passenger_vehicle_loan_interest_phaseout_reduction
          * ceil(
              max(
                  0,
                  passenger_vehicle_loan_interest_modified_adjusted_gross_income
                  - passenger_vehicle_loan_interest_phaseout_threshold
              )
              / passenger_vehicle_loan_interest_phaseout_increment
          )

  - name: qualified_passenger_vehicle_loan_interest_deduction
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 163(h)(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/163
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/26/163
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(
              0,
              passenger_vehicle_loan_interest_before_phaseout
              - passenger_vehicle_loan_interest_phaseout_amount
          )
