format: rulespec/v1
module:
  status: entity_not_supported
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/26/3111
  summary: |-
    26 USC 3111 imposes employer OASDI and hospital insurance excise taxes on wages paid with respect to employment; exempts wages covered exclusively by certain foreign social security systems under section 233 agreements; provides a qualified-veteran employment credit against subsection (a) tax; and provides qualified-small-business research credits against subsection (a) and (b) taxes, with carryovers and deduction coordination.
  deferred_outputs:
    - output: us:statutes/26/3111#employer_excise_tax_after_international_agreement_exemption_and_credits
      reason: >-
        The parent provision combines child computations under subsections (a), (b), (c), (e), and (f). Subsection (c) exempts wages "to the extent" subject exclusively to foreign social security laws, but the executable child tax outputs cannot receive a locally adjusted wage base. Recomputing the child taxes or creating a before-exemption/after-exemption local wage helper would approximate the source and conflict with the aggregate-parent schema guidance.
      source_values:
        - us:statutes/26/3111/a#employer_oasdi_excise_tax
        - us:statutes/26/3111/b#hospital_insurance_employer_tax_rate
        - us:statutes/26/3111/c#wages_exempt_by_international_social_security_agreement
        - us:statutes/26/3111/e#veteran_employment_credit_against_subsection_a_tax
        - us:statutes/26/3111/f#unused_research_credit_carryover_from_subsection_a_tax_limit
        - us:statutes/26/3111/f#unused_research_credit_carryover_from_subsection_b_tax_limit
    - output: us:statutes/26/3111/e#veteran_employment_credit_against_subsection_a_tax
      reason: >-
        Subsection (e) is already encoded in the copied child fragment at us:statutes/26/3111/e. In the parent aggregate module, faithfully composing the subsection (e) credit with subsection (a) tax and subsection (c) wage exemptions is blocked because the parent cannot pass an adjusted wage base into the imported subsection (a) child computation or recompute that child branch locally.
      source_values:
        - us:statutes/26/3111/e#applicable_period_years
        - us:statutes/26/3111/e#qualified_veteran_wages_taken_into_account
        - us:statutes/26/3111/e#section_51_full_rate_after_subsection_e_modification
        - us:statutes/26/3111/e#section_51_partial_rate_after_subsection_e_modification
        - us:statutes/26/3111/e#veteran_employment_credit_against_subsection_a_tax
rules: []
