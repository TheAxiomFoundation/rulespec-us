format: rulespec/v1
imports:
  - us:statutes/26/3241/b#applicable_percentage_for_section_3201_b
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/26/3201
  summary: |-
    (a) Tier 1 tax: applicable percentage means the percentage equal to the sum of the rates of tax in effect under section 3101(a) and (b).
    (b) Tier 2 tax: tax equal to the percentage determined under section 3241 of compensation received during the calendar year.
    (c) For application of different contribution bases with respect to the taxes imposed by subsections (a) and (b), see section 3231(e)(2).
  deferred_outputs:
    - output: us:statutes/26/3201/a#tier_1_applicable_percentage
      reason: Subsection (a) defines the tier 1 applicable percentage by reference to rates under section 3101(a) and (b). The copied section 3101(b) context includes thresholded additional Medicare tax mechanics, so a single flat executable percentage would flatten cited mechanics rather than compose them faithfully.
    - output: us:statutes/26/3201/a#tier_1_employee_tax
      reason: Subsection (a) imposes a tax on employee compensation, but subsection (c) directs application of different contribution bases under section 3231(e)(2). The copied context does not provide an executable person-level annual compensation base for the separate section 3201(a) rate portions.
    - output: us:statutes/26/3201/b#tier_2_employee_tax
      reason: Subsection (b) imposes a tier 2 tax on employee compensation using the percentage determined under section 3241, but subsection (c) directs application of different contribution bases under section 3231(e)(2). The copied context does not provide an executable person-level annual compensation base for the section 3201(b) tax.
rules:
  - name: tier_1_tax_tier_number
    kind: parameter
    dtype: Integer
    source: 26 USC 3201(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/26/3201
              excerpt: Tier 1 tax
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          1

  - name: tier_2_tax_tier_number
    kind: parameter
    dtype: Integer
    source: 26 USC 3201(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/26/3201
              excerpt: Tier 2 tax
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          2

  - name: tier_2_applicable_percentage
    kind: derived
    entity: Person
    dtype: Rate
    period: Year
    source: 26 USC 3201(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/3201
              excerpt: tax equal to the percentage determined under section 3241
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/26/3241/b#applicable_percentage_for_section_3201_b
              output: applicable_percentage_for_section_3201_b
              hash: sha256:92e19c92a35668c208e398950a3418b2584b8c66477c71eb5c08e308756ffe79
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          applicable_percentage_for_section_3201_b
