format: rulespec/v1
imports:
- us:statutes/26/3241/b#applicable_percentage_for_section_3201_b
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/26/3201
  summary: "(a) Tier 1 tax: imposed on the income of each employee, equal to the applicable\
    \ percentage of compensation received during any calendar year for services rendered;\
    \ \u201Capplicable percentage\u201D means the percentage equal to the sum of the\
    \ rates of tax in effect under section 3101(a) and (b) for the calendar year.\n\
    \n(b) Tier 2 tax: imposed on the income of each employee, equal to the percentage\
    \ determined under section 3241 for any calendar year of compensation received\
    \ during such calendar year for services rendered.\n\n(c) Cross reference: for\
    \ application of different contribution bases with respect to the taxes imposed\
    \ by subsections (a) and (b), see section 3231(e)(2)."
  deferred_outputs:
  - output: us:statutes/26/3201/a#tier_1_employee_tax
    reason: Subsection (a) imposes a tier 1 tax on each employee's compensation, but
      subsection (c) directs application of different contribution bases under section
      3231(e)(2). The copied section 3231(e)(2) context does not provide an executable
      purpose-specific annual compensation base for the section 3201(a) tax, so multiplying
      the tier 1 applicable percentage by raw compensation would ignore the cross-referenced
      base limitation.
    blocked_by:
    - us:statutes/26/3231/e/2#compensation_excess_excluded_before_hospital_insurance_carveout
    source_values:
    - us:statutes/26/3201#tier_1_applicable_percentage
  - output: us:statutes/26/3201/b#tier_2_employee_tax
    reason: Subsection (b) imposes a tier 2 tax on each employee's compensation using
      the percentage determined under section 3241, but subsection (c) directs application
      of different contribution bases under section 3231(e)(2). The copied section
      3231(e)(2) context does not provide an executable purpose-specific annual compensation
      base for the section 3201(b) tax, so applying the imported section 3241 percentage
      to raw compensation would ignore the cross-referenced base limitation.
    blocked_by:
    - us:statutes/26/3231/e/2#compensation_excess_excluded_before_hospital_insurance_carveout
    source_values:
    - us:statutes/26/3201#tier_2_applicable_percentage
  - output: us:statutes/26/3201/a#tier_1_applicable_percentage
    reason: Generated rule used a thresholded, capped, base-limited, or excess-amount
      imported rate as a flat percentage. This output is deferred until the cited
      mechanics can be composed without flattening the imported rate.
