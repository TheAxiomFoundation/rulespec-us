module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/form/cms/medicaid-chip-bhp-eligibility-levels
  summary: |-
    The table provides MAGI eligibility levels as percentages of FPL, based on state decisions as of December 1, 2023. Mississippi row: Children Medicaid Ages 0-1 194%; Children Medicaid Ages 1-5 143%; Children Medicaid Ages 6-18 133%; Children Separate CHIP 209%; Pregnant Women Medicaid 194%; Pregnant Women CHIP N/A; Adults (Medicaid) Parent/Caretaker 19%($); Adults (Medicaid) Expansion to Adults No. The MAGI-based rules generally include a 5% FPL disregard.
