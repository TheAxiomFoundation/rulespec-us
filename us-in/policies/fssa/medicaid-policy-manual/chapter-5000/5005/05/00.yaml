format: rulespec/v1
imports:
  - us-in:statutes/12-15-32-6#medicaid_facility_resident_personal_allowance_amount
  - us-in:policies/fssa/medicaid-policy-manual/chapter-5000/5005/00/00#in_ssp_sapn_eligible
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-in/manual/fssa/medicaid-policy-manual/chapter-5000/5005.05.00
    upstream_source_check:
      status: checked_higher_authority
      checked_paths:
        - us-in:statutes/12-15-32-6#medicaid_facility_resident_personal_allowance_amount
        - us-in:statutes/12-15-32-6/5#in_ssp_sapn_exempt_income
        - us-in:policies/fssa/medicaid-policy-manual/chapter-5000/5005/00/00#in_ssp_sapn_eligible
      rationale: |-
        Indiana statutory context supplies the $52 personal allowance and facility-resident supplement framework, and the prior SAPN manual section supplies SAPN eligibility. This manual section is still used because it states the SAPN payment range, benefit calculation from budgeted earned and unearned income, and the post-eligibility liability exclusion.
  summary: |-
    SAPN payments are not countable income in the Medicaid determination, including eligibility and post-eligibility liability. The SAPN benefit can range from $1.00 to $22.00 and is based on budgeted earned and unearned income subtracted from the $52.00 Medicaid Personal Needs Allowance.
rules:
  - name: sapn_minimum_benefit_amount
    kind: parameter
    dtype: Money
    period: Month
    unit: USD
    source: FSSA Medicaid Policy Manual 5005.05.00
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-in/manual/fssa/medicaid-policy-manual/chapter-5000/5005.05.00
              excerpt: range from $1.00 to $22.00
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1
