format: rulespec/v1
imports:
  - us-in:statutes/12-15-32-6#medicaid_facility_resident_personal_allowance_amount
  - us-in:policies/fssa/medicaid-policy-manual/chapter-5000/5005/00/00#in_ssp_sapn_eligible
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-in/manual/fssa/medicaid-policy-manual/chapter-5000/5005.05.00
  summary: |-
    SAPN payments are not countable income in the Medicaid determination, including eligibility and post-eligibility liability. The SAPN benefit can range from $1.00 to $22.00 and is based on budgeted earned and unearned income subtracted from the $52.00 Medicaid Personal Needs Allowance.
rules:
  - name: sapn_minimum_benefit_amount
    kind: parameter
    dtype: Money
    period: Month
    unit: USD
    source: FSSA Medicaid Policy Manual 5005.05.00
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-in/manual/fssa/medicaid-policy-manual/chapter-5000/5005.05.00
              excerpt: range from $1.00 to $22.00
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1
  - name: sapn_maximum_benefit_amount
    kind: parameter
    dtype: Money
    period: Month
    unit: USD
    source: FSSA Medicaid Policy Manual 5005.05.00
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-in/manual/fssa/medicaid-policy-manual/chapter-5000/5005.05.00
              excerpt: range from $1.00 to $22.00
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          22
  - name: sapn_benefit_amount
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: USD
    source: FSSA Medicaid Policy Manual 5005.05.00
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-in/manual/fssa/medicaid-policy-manual/chapter-5000/5005.05.00
              excerpt: based on the calculation of budgeted earned and unearned income subtracted from the $52.00 Medicaid Personal Needs Allowance
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-in/manual/fssa/medicaid-policy-manual/chapter-5000/5005.05.00
              excerpt: range from $1.00 to $22.00
          - path: versions[0].formula
            kind: import
            import:
              target: us-in:statutes/12-15-32-6#medicaid_facility_resident_personal_allowance_amount
              output: medicaid_facility_resident_personal_allowance_amount
              hash: sha256:63f966911701d9a32494d2008fecd058da1f93d14b2d2a9795565a936da6191c
          - path: versions[0].formula
            kind: import
            import:
              target: us-in:policies/fssa/medicaid-policy-manual/chapter-5000/5005/00/00#in_ssp_sapn_eligible
              output: in_ssp_sapn_eligible
              hash: sha256:698cc96226d9d18f7ca31698167d4045333d6bf883ac0f219e6dc7416b665dcb
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if in_ssp_sapn_eligible: min(sapn_maximum_benefit_amount, max(0, max(sapn_minimum_benefit_amount, medicaid_facility_resident_personal_allowance_amount - (budgeted_earned_income + budgeted_unearned_income)))) else: 0
  - name: sapn_payment_countable_income_for_medicaid_eligibility
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: USD
    source: FSSA Medicaid Policy Manual 5005.05.00
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-in/manual/fssa/medicaid-policy-manual/chapter-5000/5005.05.00
              excerpt: SAPN payments are not countable income in the Medicaid determination. The payments are not counted in the eligibility step
    versions:
