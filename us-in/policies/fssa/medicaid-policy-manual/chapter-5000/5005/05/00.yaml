    unit: USD
    source: FSSA Medicaid Policy Manual 5005.05.00
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-in/manual/fssa/medicaid-policy-manual/chapter-5000/5005.05.00
              excerpt: not counted in the eligibility step nor in the post-eligibility calculation of the liability
    versions:
