# Hand-computed tax-year-2026 fixtures. The pipeline applies the IC 6-3-2-1
# rate of 2.95 per cent to completed-return Indiana adjusted gross income. The
# output is state AGI tax before credits and excludes the separate county tax.
- name: zero Indiana adjusted gross income produces zero state AGI tax
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    us-in:policies/income_tax/pilot_liability_pipeline#input.in_pit_pilot_indiana_adjusted_gross_income: 0
  output:
    us-in:policies/income_tax/pilot_liability_pipeline#in_pit_pilot_income_tax_liability: '0'
- name: negative Indiana adjusted gross income is floored at zero
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    us-in:policies/income_tax/pilot_liability_pipeline#input.in_pit_pilot_indiana_adjusted_gross_income: -1000
  output:
    us-in:policies/income_tax/pilot_liability_pipeline#in_pit_pilot_income_tax_liability: '0'
- name: one thousand dollars of Indiana adjusted gross income
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    us-in:policies/income_tax/pilot_liability_pipeline#input.in_pit_pilot_indiana_adjusted_gross_income: 1000
  output:
    us-in:policies/income_tax/pilot_liability_pipeline#in_pit_pilot_income_tax_liability: '29.5'
- name: representative thirty thousand dollar Indiana adjusted gross income
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    us-in:policies/income_tax/pilot_liability_pipeline#input.in_pit_pilot_indiana_adjusted_gross_income: 30000
  output:
    us-in:policies/income_tax/pilot_liability_pipeline#in_pit_pilot_income_tax_liability: '885'
- name: representative sixty thousand dollar Indiana adjusted gross income
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    us-in:policies/income_tax/pilot_liability_pipeline#input.in_pit_pilot_indiana_adjusted_gross_income: 60000
  output:
    us-in:policies/income_tax/pilot_liability_pipeline#in_pit_pilot_income_tax_liability: '1770'
