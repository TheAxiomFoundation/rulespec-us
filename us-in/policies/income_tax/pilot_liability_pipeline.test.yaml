  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    us-in:policies/income_tax/pilot_liability_pipeline#input.in_pit_pilot_indiana_adjusted_gross_income: 150000
  output:
