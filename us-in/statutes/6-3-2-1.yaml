format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-in/statute/6-3-2-1
  summary: |-
    Indiana imposes an adjusted-gross-income tax on resident individuals and
    other listed taxpayers. For taxable years beginning after December 31,
    2025, and before January 1, 2027, IC 6-3-2-1(a)(3) sets the rate at 2.95
    per cent. This module encodes only that official tax-year-2026 rate and
    deliberately expires it at the end of 2026 so later rate changes are not
    inferred from this source window.
rules:
  - name: individual_adjusted_gross_income_tax_rate
    kind: parameter
    dtype: Rate
    period: Year
    source: IC 6-3-2-1(b)(7)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-in/statute/6-3-2-1
              excerpt: "two and ninety-five hundredths percent (2.95%)"
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-in/statute/6-3-2-1
              excerpt: "For taxable years beginning after December 31, 2025"
          - path: versions[0].effective_to
            kind: effective_period
            source:
              corpus_citation_path: us-in/statute/6-3-2-1
              excerpt: "and before January 1, 2027"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          0.0295
