format: rulespec/v1
imports:
  - us-in:statutes/12-15-32-6#medicaid_facility_resident_personal_allowance_amount
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-in/statute/12-15-32-6.5
  summary: |-
    If a facility resident is an SSI recipient and receives income less than the monthly personal allowance described in section 6, the office shall pay the individual the difference; money paid under subsection (a) is exempt from income eligibility consideration.
rules:
  - name: facility_resident_supplement_eligible
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Indiana Code § 12-15-32-6.5(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-in/statute/12-15-32-6.5
              excerpt: resident of a facility
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-in/statute/12-15-32-6.5
              excerpt: is a recipient of assistance under the federal Supplemental Security Income (SSI) program
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-in/statute/12-15-32-6.5
              excerpt: receives an income that is less than the amount described in section 6
          - path: versions[0].formula
            kind: import
            import:
              target: us-in:statutes/12-15-32-6#medicaid_facility_resident_personal_allowance_amount
              output: medicaid_facility_resident_personal_allowance_amount
              hash: sha256:63f966911701d9a32494d2008fecd058da1f93d14b2d2a9795565a936da6191c
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_resident_of_facility
          and person_is_recipient_of_ssi
          and income_including_ssi < medicaid_facility_resident_personal_allowance_amount
  - name: in_ssp_sapn
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: USD
    source: Indiana Code § 12-15-32-6.5(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-in/statute/12-15-32-6.5
              excerpt: amount equal to the difference between the amount of the monthly personal allowance described in section 6 and the amount of income
          - path: versions[0].formula
            kind: import
            import:
              target: us-in:statutes/12-15-32-6#medicaid_facility_resident_personal_allowance_amount
              output: medicaid_facility_resident_personal_allowance_amount
              hash: sha256:63f966911701d9a32494d2008fecd058da1f93d14b2d2a9795565a936da6191c
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if facility_resident_supplement_eligible: max(0, medicaid_facility_resident_personal_allowance_amount - income_including_ssi) else: 0
  - name: in_ssp_sapn_exempt_income
    kind: derived
