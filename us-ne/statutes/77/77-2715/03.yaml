  deferred_outputs:
    - output: us-ne:statutes/77/77-2715/03#inflation_adjusted_individual_income_tax_brackets
      reason: The source requires bracket inflation adjustment by section 1(f) of the Internal Revenue Code for 2015-2017 and by CPI-U changes thereafter, but the cited section 1(f) source and annual CPI-U values are not supplied in context.
      source_values:
        - us-ne:statutes/77/77-2715/03#statutory_bracket_minimum_single
        - us-ne:statutes/77/77-2715/03#statutory_bracket_maximum_single
        - us-ne:statutes/77/77-2715/03#statutory_bracket_minimum_joint
