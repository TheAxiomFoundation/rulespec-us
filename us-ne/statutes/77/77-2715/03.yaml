        - us-ne:statutes/77/77-2715/03#bracket_adjustment_rounding_increment
  summary: |-
    For taxable years beginning on or after January 1, 2013, and before January 1, 2014, Nebraska individual income tax brackets use four rates: 2.46%, 3.51%, 5.01%, and 6.84%, with separate dollar brackets for single, joint, head of household, married separate, and estates/trusts.
    For taxable years beginning on or after January 1, 2014, statutory base bracket amounts are established, with rate three equal to 5.01% before 2026, 4.55% for 2026, and 3.99% thereafter, and rate four phasing from 6.84% to 3.99%.
    Beginning in 2015, brackets are adjusted for inflation and rounded to the nearest ten-dollar amount, with five rounded up. The tax rate applied to other federal taxes included in Nebraska individual income tax is 29.6%, and tax table bracket differences may not exceed fifteen dollars.
