format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ne/statute/77/77-2716.01
  summary: |-
    Through tax year 2017, Nebraska allowed an individual personal exemption credit based on the number of federal exemptions, with stated credit amounts for 1993 through 1998 and later inflation adjustment. Beginning tax year 2018, the credit amount is $134 adjusted for CPI after 2018 and multiplied by child and dependent credits plus one or two return-based amounts, except for individuals claimable for federal child or dependent credit by another taxpayer. Standard deduction amounts are stated for tax years 2003, 2007-2017, and 2018 and later, including additional amounts for age or blindness, inflation adjustment, and itemized-deduction coordination.
  deferred_outputs:
    - output: us-ne:statutes/77/77-2716/01#personal_exemption_credit
      reason: Computing the final personal exemption credit depends on federal return filing status and, for inflation-adjusted or nonresident/partial-year branches, missing cited sources for Internal Revenue Code section 151 and Nebraska section 77-2715.
    - output: us-ne:statutes/77/77-2716/01#standard_deduction
      reason: Computing the final Nebraska standard deduction depends on federal filing status, the federal standard deduction actually allowed, inflation mechanics under missing Internal Revenue Code section 151 for pre-2018 years, section 77-2716.03 adjustments for 2003, and itemized-deduction coordination.
    - output: us-ne:statutes/77/77-2716/01#itemized_or_standard_deduction_subtraction
      reason: The itemized deduction branch depends on the federal itemized deductions definition in missing Internal Revenue Code section 63(d) and exclusion of state or local income taxes included before federal disallowance.
