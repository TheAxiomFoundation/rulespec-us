    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/form/cms/medicaid-chip-bhp-eligibility-levels
              excerpt: "Pregnant Women CHIP"
    versions:
      - effective_from: '2023-12-01'
        formula: |-
          false
  - name: nebraska_fcep_eligibility_available
    kind: derived
    dtype: Boolean
    period: Year
    source: CMS CHIP FCEP SPA source, Nebraska
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/policy/cms/chip-spa/ne/ne-cspa-07/pdf/page-1
              excerpt: "This amendment creates a separate CHIP to provide coverage to otherwise eligible targeted low-income children from conception to birth up to 185 percent of the federal poverty level whose mothers are ineligible for Medicaid."
    versions:
      - effective_from: '2003-06-01'
        formula: |-
          true
  - name: nebraska_fcep_fpl_limit
    kind: parameter
    dtype: Rate
    period: Year
    source: CMS CHIP FCEP SPA source, Nebraska
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/policy/cms/chip-spa/ne/ne-cspa-07/pdf/page-1
              excerpt: "This amendment creates a separate CHIP to provide coverage to otherwise eligible targeted low-income children from conception to birth up to 185 percent of the federal poverty level whose mothers are ineligible for Medicaid."
    versions:
      - effective_from: '2003-06-01'
        formula: |-
          1.85
  - name: nebraska_fcep_effective_fpl_limit
    kind: derived
    dtype: Rate
    period: Year
    source: CMS CHIP FCEP SPA source, Nebraska, including the MAGI 5% FPL disregard
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: import
            import:
              target: us:policies/cms/medicaid-chip-bhp-eligibility-levels#magi_fpl_disregard_rate
              output: magi_fpl_disregard_rate
              hash: sha256:ea0071602a4a4441e584a16bdbab3d8a3c36b40b7cea1151165533669423f5f5
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/regulation/42/435/603/d
              excerpt: "5 percentage points of the Federal poverty level"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/policy/cms/chip-spa/ne/ne-cspa-07/pdf/page-1
              excerpt: "This amendment creates a separate CHIP to provide coverage to otherwise eligible targeted low-income children from conception to birth up to 185 percent of the federal poverty level whose mothers are ineligible for Medicaid."
    versions:
      - effective_from: '2003-06-01'
        formula: |-
          nebraska_fcep_fpl_limit + magi_fpl_disregard_rate
  - name: is_chip_fcep_eligible_person
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 42 USC 1397ll(f)(1), 42 CFR 457.10, and CMS CHIP FCEP SPA source for Nebraska
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/policy/cms/chip-spa/ne/ne-cspa-07/pdf/page-1
              excerpt: "This amendment creates a separate CHIP to provide coverage to otherwise eligible targeted low-income children from conception to birth up to 185 percent of the federal poverty level whose mothers are ineligible for Medicaid."
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/1397ll/f/1
              excerpt: "through the application of sections 457.10"
    versions:
      - effective_from: '2003-06-01'
        formula: |-
          person_is_pregnant
          and not found_eligible_for_medical_assistance_under_subchapter_xix
          and medicaid_income_level <= nebraska_fcep_effective_fpl_limit
