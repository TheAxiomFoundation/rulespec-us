              target: us-ne:policies/cms/nebraska-medicaid-chip-bhp-eligibility-levels#nebraska_pregnant_women_chip_available
              output: nebraska_pregnant_women_chip_available
              hash: sha256:91470207813afd8543773046e739aa1308cabc042a0720a9eeee1817957d5271
