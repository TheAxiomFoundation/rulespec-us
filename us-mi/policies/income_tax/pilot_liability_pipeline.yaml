format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_paths:
      - us-mi/guidance/treasury/taxpayer-notices/2026/04/15/individual-income-tax-rate/rate-determination
    upstream_source_check:
      status: official_parameter_source
      checked_paths:
        - us-mi:statutes/206.51/10/d#taxable_income
        - us-mi/guidance/treasury/taxpayer-notices/2026/04/15/individual-income-tax-rate/rate-determination
      rationale: |-
        This pipeline computes the Michigan individual income tax for tax year
        2026 before nonrefundable credits. The caller supplies completed-return
        Michigan taxable income as an explicit upstream boundary, so this
        module does not claim to reconstruct Michigan adjusted gross income,
        exemptions, deductions, or other adjustments. The encoded Treasury
        determination supplies the final 2026 rate of 4.25 per cent rather
        than accepting a policy-bearing rate from the caller. Credits remain
        outside the before-credit target. Zero is used only as the
        nonnegative taxable-income floor. The section 206.51 definition module
        was checked as the higher-authority taxable-income reference, while
        the official Treasury notice controls the annual numeric rate.
  summary: |-
    Composed Michigan individual income-tax pipeline for the 2026 before-
    nonrefundable-credit target. It accepts one TaxUnit-level completed-return
    Michigan taxable-income boundary, floors it at zero, and applies the final
    2026 rate imported from Michigan Treasury's MCL 206.51 determination. It
    deliberately excludes credits and makes no independent claim about the
    upstream federal or Michigan adjustment chain. This narrow boundary is
    suitable for comparison with PolicyEngine's mi_taxable_income feeding
    mi_income_tax_before_non_refundable_credits for full-year resident tax
    units.
imports:
  - us-mi:policies/income_tax/2026_rate_determination#individual_income_tax_rate
rules:
  - name: mi_pit_pilot_taxable_income
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Supplied completed-return Michigan taxable income, floored at zero
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-mi/guidance/treasury/taxpayer-notices/2026/04/15/individual-income-tax-rate/rate-determination
              excerpt: "Individuals and fiduciaries subject to tax under Part 1 of the Income Tax Act"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          max(0, mi_pit_pilot_state_taxable_income)
  - name: mi_pit_pilot_income_tax_liability
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Michigan Treasury 2026 determination, 4.25 per cent of supplied Michigan taxable income before nonrefundable credits
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: import
            import:
              target: us-mi:policies/income_tax/2026_rate_determination#individual_income_tax_rate
              output: individual_income_tax_rate
              hash: sha256:9c683c6578bdee770cfd2ed3eaa68eed897f492c4a625d4da91c94ccfc19f25a
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-mi/guidance/treasury/taxpayer-notices/2026/04/15/individual-income-tax-rate/rate-determination
              excerpt: "the rate in effect under Section 51 for the 2026 tax year is 4.25%"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          mi_pit_pilot_taxable_income * individual_income_tax_rate
inputs:
  - name: mi_pit_pilot_state_taxable_income
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    description: Completed-return Michigan taxable income supplied by the caller as an upstream oracle boundary.
