format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-mi/guidance/treasury/taxpayer-notices/2026/04/15/individual-income-tax-rate/rate-determination
    upstream_source_check:
      status: official_parameter_source
      checked_paths:
        - us-mi/statute/206.51/1
      rationale: |-
        MCL 206.51 was checked as the higher-authority tax-imposition and
        taxable-income reference. This narrow pipeline imports the final annual
        rate from the official Treasury determination and accepts completed-
        return Michigan taxable income as an explicit upstream boundary, so
        the notice remains the correct controlling source for the 2026 value.
  summary: |-
    Composed Michigan individual income-tax schedule for tax year 2026 only.
    It accepts one TaxUnit-level completed-return Michigan taxable-income
    boundary, floors it at zero, and applies the final 2026 rate imported from
    Michigan Treasury's MCL 206.51 determination. Despite the legacy
    mi_pit_pilot_income_tax_liability output name, the result is schedule-only
    tax before nonrefundable credits; it is not final liability or a complete
    return calculation. The module deliberately excludes credits and makes no
    independent claim about the upstream federal or Michigan adjustment chain.
    Zero is only the nonnegative taxable-income floor. MCL 206.51 was checked
    as the higher-authority taxable-income reference, while the official
    Treasury notice controls the annual numeric rate.
imports:
  - us-mi:policies/income_tax/2026_rate_determination#individual_income_tax_rate
rules:
  - name: mi_pit_pilot_taxable_income
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Supplied completed-return Michigan taxable income, floored at zero
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-mi/guidance/treasury/taxpayer-notices/2026/04/15/individual-income-tax-rate/rate-determination
              excerpt: "Individuals and fiduciaries subject to tax under Part 1 of the Income Tax Act"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          max(0, mi_pit_pilot_state_taxable_income)
  - name: mi_pit_pilot_income_tax_liability
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Michigan Treasury 2026 determination, schedule-only tax at 4.25 per cent of supplied completed-return Michigan taxable income before nonrefundable credits
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: import
            import:
              target: us-mi:policies/income_tax/2026_rate_determination#individual_income_tax_rate
              output: individual_income_tax_rate
              hash: sha256:24bbcb7f8d145bf1fe0b51a9ae97568091cca3aa580710c1b817e4f24ede1485
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-mi/guidance/treasury/taxpayer-notices/2026/04/15/individual-income-tax-rate/rate-determination
              excerpt: "the rate in effect under Section 51 for the 2026 tax year is 4.25%"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          mi_pit_pilot_taxable_income * individual_income_tax_rate
inputs:
  - name: mi_pit_pilot_state_taxable_income
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    description: Completed-return Michigan taxable income supplied by the caller; this module does not calculate that upstream amount.
