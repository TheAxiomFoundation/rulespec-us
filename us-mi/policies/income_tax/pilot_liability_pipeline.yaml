format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-mi/statute/206.51/1
  summary: |-
    Composed Michigan individual income-tax pipeline for the 2026 before-
    nonrefundable-credit target. It accepts one TaxUnit-level completed-return
    Michigan taxable-income boundary, floors it at zero, and applies the final
    2026 rate imported from Michigan Treasury's MCL 206.51 determination. It
    deliberately excludes credits and makes no independent claim about the
    upstream federal or Michigan adjustment chain. Zero is only the
    nonnegative taxable-income floor. MCL 206.51 was checked as the higher-
    authority taxable-income reference, while the official Treasury notice
    controls the annual numeric rate. This narrow boundary is suitable for
    comparison with PolicyEngine's mi_taxable_income feeding
    mi_income_tax_before_non_refundable_credits for full-year resident tax
    units.
imports:
  - us-mi:policies/income_tax/2026_rate_determination#individual_income_tax_rate
rules:
  - name: mi_pit_pilot_taxable_income
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Supplied completed-return Michigan taxable income, floored at zero
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-mi/statute/206.51/1
              excerpt: "upon the taxable income of every person other than a corporation"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          max(0, mi_pit_pilot_state_taxable_income)
  - name: mi_pit_pilot_income_tax_liability
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: MCL 206.51(1)(b) and 1(c), applying Michigan Treasury's 2026 determination to supplied Michigan taxable income before nonrefundable credits
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: import
            import:
              target: us-mi:policies/income_tax/2026_rate_determination#individual_income_tax_rate
              output: individual_income_tax_rate
              hash: sha256:eb23887c0fd34e0585413b24d9eb58bd691ca7dde65f08643ebf4e37581b556e
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-mi/statute/206.51/1
              excerpt: "there is levied and imposed under this part upon the taxable income"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          mi_pit_pilot_taxable_income * individual_income_tax_rate
inputs:
  - name: mi_pit_pilot_state_taxable_income
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    description: Completed-return Michigan taxable income supplied by the caller as an upstream oracle boundary.
