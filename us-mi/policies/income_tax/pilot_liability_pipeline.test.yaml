# Full-Populace boundary fixture: callers supply completed-return Michigan
# taxable income, and the pipeline applies only the final 2026 Treasury rate.
- name: zero taxable income produces zero liability
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    us-mi:policies/income_tax/pilot_liability_pipeline#input.mi_pit_pilot_state_taxable_income: 0
  output:
    us-mi:policies/income_tax/pilot_liability_pipeline#mi_pit_pilot_taxable_income: 0
    us-mi:policies/income_tax/pilot_liability_pipeline#mi_pit_pilot_income_tax_liability: 0
- name: negative supplied taxable income is floored at zero
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    us-mi:policies/income_tax/pilot_liability_pipeline#input.mi_pit_pilot_state_taxable_income: -100
  output:
    us-mi:policies/income_tax/pilot_liability_pipeline#mi_pit_pilot_taxable_income: 0
    us-mi:policies/income_tax/pilot_liability_pipeline#mi_pit_pilot_income_tax_liability: 0
- name: one hundred dollars taxable income
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    us-mi:policies/income_tax/pilot_liability_pipeline#input.mi_pit_pilot_state_taxable_income: 100
  output:
    us-mi:policies/income_tax/pilot_liability_pipeline#mi_pit_pilot_taxable_income: 100
    us-mi:policies/income_tax/pilot_liability_pipeline#mi_pit_pilot_income_tax_liability: '4.25'
- name: representative single taxable income
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    us-mi:policies/income_tax/pilot_liability_pipeline#input.mi_pit_pilot_state_taxable_income: 24050
  output:
    us-mi:policies/income_tax/pilot_liability_pipeline#mi_pit_pilot_taxable_income: 24050
    us-mi:policies/income_tax/pilot_liability_pipeline#mi_pit_pilot_income_tax_liability: '1022.125'
- name: representative joint taxable income
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    us-mi:policies/income_tax/pilot_liability_pipeline#input.mi_pit_pilot_state_taxable_income: 108100
  output:
    us-mi:policies/income_tax/pilot_liability_pipeline#mi_pit_pilot_taxable_income: 108100
    us-mi:policies/income_tax/pilot_liability_pipeline#mi_pit_pilot_income_tax_liability: '4594.25'
- name: high taxable income remains linear
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    us-mi:policies/income_tax/pilot_liability_pipeline#input.mi_pit_pilot_state_taxable_income: 1000000
  output:
    us-mi:policies/income_tax/pilot_liability_pipeline#mi_pit_pilot_taxable_income: 1000000
    us-mi:policies/income_tax/pilot_liability_pipeline#mi_pit_pilot_income_tax_liability: 42500
