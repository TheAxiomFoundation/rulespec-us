format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-mi/guidance/treasury/taxpayer-notices/2026/04/15/individual-income-tax-rate/rate-determination
  summary: |-
    The Michigan Department of Treasury determined under MCL 206.51 that the
    individual and fiduciary income-tax rate for tax year 2026 remains 4.25
    per cent. The statutory reduction formula is redetermined annually, so
    this module encodes only the final 2026 rate stated in Treasury's notice.
    MCL 206.51 was checked as the higher-authority definition of taxable
    income, but the official determination is the controlling numeric source.
  deferred_outputs:
    - output: us-mi:policies/income_tax/2026_rate_determination#individual_income_tax_rate
      reason: Later-year rates depend on annual determinations under MCL 206.51 and cannot be fixed from the 2026 notice.
    - output: us-mi:policies/income_tax/2026_rate_determination#individual_income_tax
      reason: Complete liability requires Michigan taxable income and credit rules outside this rate-determination module.
      source_values:
        - us-mi:policies/income_tax/2026_rate_determination#individual_income_tax_rate
rules:
  - name: individual_income_tax_rate
    kind: parameter
    dtype: Rate
    period: Year
    source: Michigan Department of Treasury 2026 individual income-tax rate determination under MCL 206.51
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-mi/guidance/treasury/taxpayer-notices/2026/04/15/individual-income-tax-rate/rate-determination
              excerpt: "the rate in effect under Section 51 for the 2026 tax year is 4.25%"
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-mi/guidance/treasury/taxpayer-notices/2026/04/15/individual-income-tax-rate/rate-determination
              excerpt: "For each tax year beginning on and after January 1, 2023, the rate may be subject to a formulary reduction"
          - path: versions[0].effective_to
            kind: effective_period
            source:
              corpus_citation_path: us-mi/guidance/treasury/taxpayer-notices/2026/04/15/individual-income-tax-rate/rate-determination
              excerpt: "the rate in effect under Section 51 for the 2026 tax year is 4.25%"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          0.0425
