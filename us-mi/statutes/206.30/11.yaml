format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-mi/statute/206.30/11
  summary: |-
    For tax years beginning on and after January 1, 2023, a taxpayer with retirement or pension benefits received for services as specified public police, fire, state police, or county corrections personnel may elect either the subsection (1)(f) deduction without additional limitations or the limitations and restrictions in subsection (9) or (10).
rules:
  - name: qualifying_public_safety_or_corrections_retirement_benefits
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: MCL 206.30(11)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-mi/statute/206.30/11
              excerpt: retirement or pension benefits received for services as a public police or fire department employee, state police trooper or sergeant, or county corrections officer
    versions:
      - effective_from: '2023-01-01'
        formula: |-
          retirement_or_pension_benefits_received_for_services_as_public_police_or_fire_department_employee_subject_to_1969_pa_312
          or retirement_or_pension_benefits_received_for_services_as_state_police_trooper_or_sergeant_subject_to_1980_pa_17
          or retirement_or_pension_benefits_received_for_services_as_corrections_officer_employed_by_county_sheriff_in_adult_prisoner_facility
  - name: unrestricted_subsection_1_f_retirement_pension_deduction_election_applies
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: MCL 206.30(11)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-mi/statute/206.30/11
              excerpt: may elect to deduct retirement or pension benefits as provided under subsection (1)(f) without any additional limitations or restrictions
          - path: versions[0].formula
            kind: import
            import:
              target: us-mi:statutes/206.30/11#qualifying_public_safety_or_corrections_retirement_benefits
              output: qualifying_public_safety_or_corrections_retirement_benefits
              hash: sha256:local
    versions:
      - effective_from: '2023-01-01'
        formula: |-
          qualifying_public_safety_or_corrections_retirement_benefits
          and taxpayer_elects_subsection_1_f_deduction_without_additional_limitations
  - name: retirement_pension_deduction_without_additional_limitations
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: MCL 206.30(11)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-mi/statute/206.30/11
              excerpt: may elect to deduct retirement or pension benefits as provided under subsection (1)(f) without any additional limitations or restrictions
          - path: versions[0].formula
            kind: import
            import:
              target: us-mi:statutes/206.30/11#unrestricted_subsection_1_f_retirement_pension_deduction_election_applies
              output: unrestricted_subsection_1_f_retirement_pension_deduction_election_applies
              hash: sha256:local
    versions:
      - effective_from: '2023-01-01'
        formula: |-
          if unrestricted_subsection_1_f_retirement_pension_deduction_election_applies: max(0, retirement_or_pension_benefits_deduction_amount_under_subsection_1_f) else: 0
  - name: subsection_9_or_10_limitation_election_applies
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: MCL 206.30(11)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-mi/statute/206.30/11
              excerpt: or elect to apply the limitations and restrictions in subsection (9) or (10)
          - path: versions[0].formula
            kind: import
            import:
              target: us-mi:statutes/206.30/11#qualifying_public_safety_or_corrections_retirement_benefits
              output: qualifying_public_safety_or_corrections_retirement_benefits
              hash: sha256:local
    versions:
      - effective_from: '2023-01-01'
        formula: |-
          qualifying_public_safety_or_corrections_retirement_benefits
          and taxpayer_elects_limitations_and_restrictions_in_subsection_9_or_10
