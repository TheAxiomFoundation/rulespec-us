- name: 2023 phase in limits elected deduction to 25 percent of subsection 1 f iv
    maximum
  period:
    period_kind: tax_year
    start: '2023-01-01'
    end: '2023-12-31'
  input:
    us-mi:statutes/206.30/10#input.taxpayer_elects_subsection_10_retirement_or_pension_benefits_deduction: true
    us-mi:statutes/206.30/10#input.applicable_subsection_10_birth_cohort_person_is_in_phase_in_cohort: true
    us-mi:statutes/206.30/10#input.retirement_or_pension_benefits: 100000
    us-mi:statutes/206.30/10#input.maximum_retirement_or_pension_benefits_deduction_under_subsection_1_f_iv: 80000
    us-mi:statutes/206.30/10#input.retirement_or_pension_benefits_deduction_as_provided_under_subsection_1_f: 0
    us-mi:statutes/206.30/10#input.amounts_deductible_under_subsection_1_f_i_and_ii_combined: 0
  output:
    us-mi:statutes/206.30/10#retirement_or_pension_benefits_deduction_under_subsection_10: 20000
