format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-mi/statute/206.30/7
  summary: |-
    For tax years beginning on and after January 1, 2013, personal exemptions under subsection (2) and exemptions under subsection (3) are adjusted by specified United States Consumer Price Index fractions and rounded to the nearest $100.00 increment; for 2022 and later tax years, the subsection (2) adjusted amount is increased by an additional $600.00.
rules:
  - name: additional_personal_exemption_increase
    kind: parameter
    dtype: Money
    unit: USD
    source: MCL 206.30(7), additional increase for 2022 and later tax years
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: default
            source:
              corpus_citation_path: us-mi/statute/206.30/7
              excerpt: "For the 2022 tax year and each tax year after 2022"
          - path: versions[1].formula
            kind: amount
            source:
              corpus_citation_path: us-mi/statute/206.30/7
              excerpt: "increased by an additional $600.00"
    versions:
      - effective_from: '2013-01-01'
        formula: |-
          0
      - effective_from: '2022-01-01'
        formula: |-
          600

  - name: exemption_rounding_increment
    kind: parameter
    dtype: Money
    unit: USD
    source: MCL 206.30(7), rounding increment for adjusted exemptions
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-mi/statute/206.30/7
              excerpt: "rounded to the nearest $100.00 increment"
    versions:
      - effective_from: '2013-01-01'
        formula: |-
          100

  - name: adjusted_personal_exemption_allowed_under_subsection_2
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: MCL 206.30(7), personal exemption adjustment under subsection (2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-mi/statute/206.30/7
              excerpt: "the personal exemption allowed under subsection (2) shall be adjusted by multiplying the exemption for the tax year beginning in 2012 by a fraction"
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-mi/statute/206.30/7
              excerpt: "increased by an additional $600.00"
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-mi/statute/206.30/7
              excerpt: "rounded to the nearest $100.00 increment"
    versions:
      - effective_from: '2013-01-01'
        formula: |-
          floor(((((personal_exemption_allowed_under_subsection_2_for_tax_year_beginning_in_2012 * united_states_consumer_price_index_for_state_fiscal_year_ending_in_prior_tax_year) / united_states_consumer_price_index_for_2010_2011_state_fiscal_year) + additional_personal_exemption_increase) / exemption_rounding_increment) + 0.5) * exemption_rounding_increment

  - name: adjusted_exemptions_allowed_under_subsection_3
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: MCL 206.30(7), exemption adjustment under subsection (3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-mi/statute/206.30/7
              excerpt: "exemptions allowed under subsection (3) shall be adjusted by multiplying the exemption amount under subsection (3) for the tax year by a fraction"
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-mi/statute/206.30/7
              excerpt: "rounded to the nearest $100.00 increment"
    versions:
      - effective_from: '2013-01-01'
        formula: |-
          floor((((exemption_amount_under_subsection_3_for_tax_year * united_states_consumer_price_index_for_state_fiscal_year_ending_in_prior_tax_year) / united_states_consumer_price_index_for_1998_1999_state_fiscal_year) / exemption_rounding_increment) + 0.5) * exemption_rounding_increment
