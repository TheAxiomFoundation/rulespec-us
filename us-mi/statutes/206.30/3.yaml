format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-mi/statute/206.30/3
  summary: Except as otherwise provided in subsection (7), a single additional exemption
    is subtracted in calculating taxable income. Subdivision (a) states $1,800.00
    for each taxpayer and dependent with listed disabilities. Subdivision (b) states,
    for tax years beginning after 2007, $250.00 for each taxpayer and dependent who
    is a qualified disabled veteran, with a taxpayer-or-dependent-but-not-both claiming
    rule when the dependent files an annual return.
  deferred_outputs:
  - output: us-mi:statutes/206.30/3/a#listed_disability_additional_exemption
    reason: Subdivision (a)'s final exemption depends on unavailable upstream legal
      definitions for blind persons under section 504 and totally and permanently
      disabled persons under section 522, and also cites an external definition of
      deaf person. The source-stated scalar is retained, but the affected executable
      surface is deferred.
rules:
- name: listed_disability_additional_exemption_amount
  kind: parameter
  dtype: Money
  unit: USD
  source: 3(a)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-mi/statute/206.30/3
          excerpt: $1,800.00 for each taxpayer and every dependent
  versions:
  - effective_from: '0001-01-01'
    formula: '1800'
- name: qualified_disabled_veteran_additional_exemption_amount
  kind: parameter
  dtype: Money
  unit: USD
  source: 3(b)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-mi/statute/206.30/3
          excerpt: For tax years beginning after 2007, $250.00
  versions:
  - effective_from: '2008-01-01'
    formula: '250'
- name: taxpayer_and_dependents_for_qualified_disabled_veteran_additional_exemption
  kind: data_relation
  data_relation:
    predicate: taxpayer_and_dependents_for_qualified_disabled_veteran_additional_exemption
    arity: 2
- name: qualified_disabled_veteran_additional_exemption
  kind: derived
  entity: TaxUnit
  dtype: Money
  period: Year
  unit: USD
  source: 3(b)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-mi/statute/206.30/3
          excerpt: $250.00 for each taxpayer and every dependent of the taxpayer who
            is a qualified disabled veteran
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-mi/statute/206.30/3
          excerpt: the taxpayer or dependent of the taxpayer, but not both, may claim
      - path: versions[0].formula
        kind: import
        import:
          target: us-mi:statutes/206.30/3#qualified_disabled_veteran_additional_exemption_amount
          output: qualified_disabled_veteran_additional_exemption_amount
          hash: sha256:local
  versions:
  - effective_from: '2008-01-01'
    formula: qualified_disabled_veteran_additional_exemption_amount * count_where(taxpayer_and_dependents_for_qualified_disabled_veteran_additional_exemption,
      qualified_disabled_veteran_additional_exemption_claimable_by_tax_unit)
