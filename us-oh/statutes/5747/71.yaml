format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-oh/statute/5747.71
  summary: '"allowed a nonrefundable credit ... for a taxpayer who is an ''eligible
    individual'' as defined in section 32 of the Internal Revenue Code. The credit
    shall equal thirty per cent of the federal credit allowed for the taxable year.
    The credit shall not exceed the aggregate amount of tax otherwise due under section
    5747.02 ... after deducting any other nonrefundable credits that precede the credit
    allowed under this section"'
rules:
- name: federal_credit_percentage
  kind: parameter
  dtype: Rate
  source: "Ohio Rev. Code \xA7 5747.71"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-oh/statute/5747.71
          excerpt: The credit shall equal thirty per cent of the federal credit allowed
            for the taxable year.
  versions:
  - effective_from: '0001-01-01'
    formula: '0.30'
- name: earned_income_credit
  kind: derived
  entity: TaxUnit
  dtype: Money
  period: Year
  unit: USD
  source: "Ohio Rev. Code \xA7 5747.71"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-oh/statute/5747.71
          excerpt: for a taxpayer who is an "eligible individual" as defined in section
            32 of the Internal Revenue Code
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-oh/statute/5747.71
          excerpt: The credit shall equal thirty per cent of the federal credit allowed
            for the taxable year.
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-oh/statute/5747.71
          excerpt: The credit shall not exceed the aggregate amount of tax otherwise
            due under section 5747.02 ... after deducting any other nonrefundable
            credits that precede the credit
  versions:
  - effective_from: '0001-01-01'
    formula: 'if eligible_individual_as_defined_in_section_32: min(federal_credit_percentage
      * max(0, federal_credit_allowed_for_taxable_year), max(0, aggregate_tax_liability_under_section_5747_02
      - other_nonrefundable_credits_preceding_this_credit)) else: 0'
