- name: excess exemptions reduce individual taxable business income before three percent
    tax
  period:
    period_kind: tax_year
    start: '2024-01-01'
    end: '2024-12-31'
  input:
    us-oh:statutes/5747/02#input.exemptions_allowed_under_division_a3: 14000
    us-oh:statutes/5747/02#input.ohio_adjusted_gross_income: 20000
    us-oh:statutes/5747/02#input.taxable_business_income: 10000
  output:
    us-oh:statutes/5747/02#excess_exemptions_deductible_from_taxable_business_income: 4000
    us-oh:statutes/5747/02#taxable_business_income_after_excess_exemptions: 6000
    us-oh:statutes/5747/02#individual_taxable_business_income_tax: 180
