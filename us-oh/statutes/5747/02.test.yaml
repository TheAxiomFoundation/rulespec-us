  output:
    us-oh:statutes/5747/02#excess_exemptions_deductible_from_taxable_business_income: 0
    us-oh:statutes/5747/02#taxable_business_income_after_excess_exemptions: 10000
    us-oh:statutes/5747/02#individual_taxable_business_income_tax: 300
