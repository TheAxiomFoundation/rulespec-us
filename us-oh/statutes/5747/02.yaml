format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-oh/statute/5747.02
  summary: |-
    Division (A)(4)(a) provides that, for individuals, the tax on taxable business income equals three per cent of taxable business income after subtracting any amount allowed under division (A)(4)(b). Division (A)(4)(b) provides: "If the exemptions allowed to an individual under division (A)(3) of this section exceed the taxpayer's Ohio adjusted gross income less taxable business income, the excess shall be deducted from taxable business income before computing the tax under division (A)(4)(a) of this section." Division (A)(3) also states a $26,050 no-tax threshold for individuals and, for taxable years beginning in 2026 and thereafter, "$332.00 plus 2.75% of the amount in excess of $26,050." Division (A)(2) states estate rates for income not more than $26,050 for taxable years beginning in 2024, 2025, and 2026 and thereafter. Division (A)(5) prescribes annual adjustment and rounding to the nearest multiple of fifty dollars.
rules:
  - name: individual_taxable_business_income_tax_rate
    kind: parameter
    dtype: Rate
    source: 5747.02(A)(4)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-oh/statute/5747.02
              excerpt: "the tax imposed by this section on taxable business income shall equal three per cent"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.03

  - name: individual_income_tax_no_tax_threshold
    kind: parameter
    dtype: Money
    unit: USD
    source: 5747.02(A)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-oh/statute/5747.02
              excerpt: "equal to or less than twenty-six thousand fifty dollars, no tax shall be imposed"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          26050

  - name: estate_low_income_threshold
    kind: parameter
    dtype: Money
    unit: USD
    source: 5747.02(A)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-oh/statute/5747.02
              excerpt: "not more than twenty-six thousand fifty dollars of such income"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          26050

  - name: estate_low_income_tax_rate
    kind: parameter
    dtype: Rate
    source: 5747.02(A)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-oh/statute/5747.02
              excerpt: "1.38462% for taxable years beginning in 2024"
          - path: versions[1].formula
            kind: parameter
            source:
              corpus_citation_path: us-oh/statute/5747.02
              excerpt: "1.31287% for taxable years beginning in 2025"
          - path: versions[2].formula
            kind: parameter
            source:
              corpus_citation_path: us-oh/statute/5747.02
              excerpt: "1.27448% for taxable years beginning in 2026 and thereafter"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          0.0138462
      - effective_from: '2025-01-01'
        formula: |-
          0.0131287
      - effective_from: '2026-01-01'
        formula: |-
          0.0127448

  - name: individual_nonbusiness_income_tax_base_amount
    kind: parameter
    dtype: Money
    unit: USD
    source: 5747.02(A)(3)(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-oh/statute/5747.02
              excerpt: "For taxable years beginning in 2026 and thereafter, $332.00 plus 2.75%"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          332

  - name: individual_nonbusiness_income_tax_excess_rate
    kind: parameter
    dtype: Rate
    source: 5747.02(A)(3)(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-oh/statute/5747.02
              excerpt: "For taxable years beginning in 2026 and thereafter, $332.00 plus 2.75% of the amount in excess of $26,050"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          0.0275

  - name: annual_adjustment_rounding_multiple
    kind: parameter
    dtype: Money
    unit: USD
    source: 5747.02(A)(5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: unit
            source:
              corpus_citation_path: us-oh/statute/5747.02
              excerpt: "rounding the resulting sum to the nearest multiple of fifty dollars"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          50

  - name: excess_exemptions_deductible_from_taxable_business_income
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 5747.02(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-oh/statute/5747.02
              excerpt: "If the exemptions allowed ... exceed the taxpayer's Ohio adjusted gross income less taxable business income, the excess shall be deducted"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          max(0, exemptions_allowed_under_division_a3 - (ohio_adjusted_gross_income - taxable_business_income))

  - name: taxable_business_income_after_excess_exemptions
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 5747.02(A)(4)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-oh/statute/5747.02
              excerpt: "the excess shall be deducted from taxable business income before computing the tax"
          - path: versions[0].formula
            kind: import
            import:
              target: us-oh:statutes/5747/02#excess_exemptions_deductible_from_taxable_business_income
              output: excess_exemptions_deductible_from_taxable_business_income
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          max(0, taxable_business_income - excess_exemptions_deductible_from_taxable_business_income)

  - name: individual_taxable_business_income_tax
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 5747.02(A)(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-oh/statute/5747.02
              excerpt: "shall equal three per cent of the result obtained by subtracting any amount allowed under division (A)(4)(b)"
          - path: versions[0].formula
            kind: import
            import:
              target: us-oh:statutes/5747/02#individual_taxable_business_income_tax_rate
              output: individual_taxable_business_income_tax_rate
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-oh:statutes/5747/02#taxable_business_income_after_excess_exemptions
              output: taxable_business_income_after_excess_exemptions
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_taxable_business_income_tax_rate * taxable_business_income_after_excess_exemptions
