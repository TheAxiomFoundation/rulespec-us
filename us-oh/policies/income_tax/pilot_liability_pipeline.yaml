format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-oh/statute/5747.02
    upstream_source_check:
      status: official_parameter_source
      checked_paths:
        - us-oh/statute/5747.02
      rationale: |-
        Ohio Revised Code section 5747.02(A)(3)(c), as enacted by House Bill
        96, fixes the tax-year-2026 individual nonbusiness-income schedule at
        $332 plus 2.75 percent of the amount above $26,050. The enacted bill's
        temporary-law provision suspends inflation indexing for tax years 2025
        and 2026; the Ohio Legislative Service Commission's final analysis of
        H.B. 96 confirms both that suspension and this exact 2026 table. The
        current official section in the pinned corpus supplies the operative
        threshold, base amount, rate, and tax-year applicability.
  summary: |-
    Composed Ohio individual nonbusiness-income tax schedule for tax year
    2026 before nonrefundable credits. It accepts completed-return Ohio taxable
    nonbusiness income as one TaxUnit-level upstream boundary, floors the
    declared amount at zero, and applies Ohio Revised Code section
    5747.02(A)(3)(c): no tax through $26,050, then $332 plus 2.75 percent of the
    excess. Upstream Ohio adjusted gross income, taxable-business-income
    separation, personal exemptions, residency and allocation decisions are
    outside this legal schedule module, as are the separate three-percent
    business-income tax and all credits.

    PolicyEngine-US 1.752.2 directly feeds `oh_taxable_income` into the
    distinct `oh_income_tax_before_non_refundable_credits` schedule target and
    applies the same 2026 parameters. Across all 2,144 positive-weight Ohio tax
    units in the certified 2024 Populace routed to tax year 2026, this legal
    schedule had maximum absolute error $0.345000001, maximum relative error
    0.00000614497, weighted MAE $0.00120563774, zero differences above $1, and
    zero differences outside $0.01 absolute or 1e-7 relative tolerance. The
    residual is PolicyEngine floating-point marginal-scale arithmetic at large
    incomes, not a substantive schedule difference. All rules fail closed
    outside tax year 2026.
  deferred_outputs:
    - output: us-oh:statutes/5747.02/b#taxable_business_income_after_excess_exemptions
      reason: |-
        Section 5747.02(A)(4)(b) coordinates personal exemptions with Ohio's
        separate three-percent taxable-business-income schedule. This module
        accepts completed-return nonbusiness taxable income and intentionally
        ends before that separate business-income branch; encoding it requires
        completed-return taxable business income and the excess-exemption
        allocation that this one-boundary schedule does not claim to derive.
imports:
  - us-oh:statutes/5747/02#individual_income_tax_no_tax_threshold
  - us-oh:statutes/5747/02#individual_nonbusiness_income_tax_base_amount
  - us-oh:statutes/5747/02#individual_nonbusiness_income_tax_excess_rate
rules:
  - name: oh_pit_pilot_taxable_income
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Ohio Rev. Code § 5747.02(A)(3), supplied completed-return Ohio taxable nonbusiness income
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-oh/statute/5747.02
              excerpt: "the tax imposed by this section on income other than taxable business income shall be measured by Ohio adjusted gross income, less taxable business income and less an exemption"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: max(0, oh_pit_pilot_state_taxable_income)

  - name: oh_pit_pilot_schedule_tax
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Ohio Rev. Code § 5747.02(A)(3)(c), nonbusiness-income schedule tax
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-oh/statute/5747.02
              excerpt: "If the balance thus obtained is equal to or less than twenty-six thousand fifty dollars, no tax shall be imposed on that balance."
          - path: versions[0].formula
            kind: import
            import:
              target: us-oh:statutes/5747/02#individual_income_tax_no_tax_threshold
              output: individual_income_tax_no_tax_threshold
              hash: sha256:d3b48ea9b0c51ff43f43ac71d9a9a0d883fc90739a8de7a9af580ba323f73f65
          - path: versions[0].formula
            kind: import
            import:
              target: us-oh:statutes/5747/02#individual_nonbusiness_income_tax_base_amount
              output: individual_nonbusiness_income_tax_base_amount
              hash: sha256:d3b48ea9b0c51ff43f43ac71d9a9a0d883fc90739a8de7a9af580ba323f73f65
          - path: versions[0].formula
            kind: import
            import:
              target: us-oh:statutes/5747/02#individual_nonbusiness_income_tax_excess_rate
              output: individual_nonbusiness_income_tax_excess_rate
              hash: sha256:d3b48ea9b0c51ff43f43ac71d9a9a0d883fc90739a8de7a9af580ba323f73f65
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-oh/statute/5747.02
              excerpt: "For taxable years beginning in 2026 and thereafter, $332.00 plus 2.75% of the amount in excess of $26,050."
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if oh_pit_pilot_taxable_income <= individual_income_tax_no_tax_threshold:
            0
          else:
            individual_nonbusiness_income_tax_base_amount
            + individual_nonbusiness_income_tax_excess_rate * (oh_pit_pilot_taxable_income - individual_income_tax_no_tax_threshold)

  - name: oh_pit_pilot_income_tax_liability
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Ohio Rev. Code § 5747.02(A)(3), tax before nonrefundable credits
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-oh/statute/5747.02
              excerpt: "the tax imposed by this section on income other than taxable business income"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: max(0, oh_pit_pilot_schedule_tax)
inputs:
  - name: oh_pit_pilot_state_taxable_income
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    description: Completed-return Ohio taxable nonbusiness income supplied by the caller as the sole upstream oracle boundary.
