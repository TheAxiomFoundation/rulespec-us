  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.160
  summary: |-
    The local office must comply with State Department complaint-reporting procedures, advise and assist households wishing to file complaints, make every effort to resolve non-discrimination complaints locally, and inform complainants of the right to contact the State Department if dissatisfied. The State Department must make complaint-system information available through written materials and posters, including the USDA “And Justice for All” poster, prominently displayed in certification and issuance offices.
