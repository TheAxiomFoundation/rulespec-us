        The source imposes an administrative compliance duty on local offices but does not state a computable benefit, eligibility condition, amount, threshold, exception, or relation suitable for executable RuleSpec encoding.
    - output: us-co:regulations/10-ccr-2506-1/4.160#state_department_complaint_system_information_availability
      reason: >-
        The source imposes an administrative information-availability and posting duty on the State Department but does not state a computable benefit, eligibility condition, amount, threshold, exception, or relation suitable for executable RuleSpec encoding.
    - output: us-co:regulations/10-ccr-2506-1/4.160#local_office_non_discrimination_complaint_resolution_process
      reason: >-
        The source describes local complaint-resolution and notice procedures, excluding discrimination complaints, but does not define a computable SNAP household eligibility or benefit rule.
