format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.309.4
  summary: |-
    Group living arrangements are residential alternatives to institutional living. To be eligible as residents, persons must be persons with disabilities, and the local office shall verify that the arrangement is a public or private nonprofit facility with no more than sixteen residents and certified as a group living arrangement by CDPHE and the State Department under Section 1616(e) of the Social Security Act, or certified by FNS under comparable USDA standards. Residents must voluntarily elect to participate in SNAP, may apply through a facility-employed authorized representative or on their own behalf/through their own representative, and applications, changes, recertifications, expedited service, notices, fair hearings, and lost-benefit rights follow the same standards as for other SNAP households.
rules:
  - name: group_living_arrangement_resident_count_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.309.4(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.309.4
              excerpt: "no more than sixteen (16) residents"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          16

  - name: group_living_arrangement_expedited_service_calendar_day_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.309.4(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.309.4
              excerpt: "no later than seven (7) calendar days following the date the application was filed"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          7

  - name: group_living_arrangement_facility_qualifies
    kind: derived
    entity: ResidentialFacility
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.309.4(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.309.4
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.309.4#group_living_arrangement_resident_count_limit
              output: group_living_arrangement_resident_count_limit
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          not facility_is_institutional_setting
          and facility_is_public_or_private_nonprofit
          and facility_resident_count <= group_living_arrangement_resident_count_limit
          and (
              facility_certified_as_group_living_arrangement_by_cdphe_and_state_department_under_social_security_act_1616e
              or facility_certified_by_fns_under_comparable_usda_standards
          )

  - name: person_eligible_as_group_living_arrangement_resident
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.309.4(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.309.4
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          person_has_disabilities
          and person_resides_in_verified_group_living_arrangement

  - name: for_profit_facility_resident_considered_institution_resident
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.309.4(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.309.4
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          individual_resides_in_for_profit_facility

  - name: group_living_arrangement_resident_voluntary_snap_election
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.309.4(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.309.4
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          person_is_group_living_arrangement_resident
          and resident_voluntarily_elected_to_participate_in_snap

  - name: facility_authorized_representative_application_path_valid
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.309.4(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.309.4
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          resident_household_applies_through_authorized_representative_employed_and_designated_by_group_living_arrangement
          and eligibility_determined_as_one_person_household
          and (
              group_living_arrangement_receives_and_spends_allotment_on_food_prepared_or_served_to_eligible_resident
              or group_living_arrangement_allows_eligible_resident_to_use_all_or_part_of_allotment
          )

  - name: own_behalf_application_path_valid
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.309.4(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.309.4
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (
              resident_household_applies_on_own_behalf
              or resident_household_applies_through_authorized_representative_of_own_choice
          )
          and group_living_arrangement_determined_resident_may_apply_on_own_behalf_based_on_physical_and_mental_capability
          and application_accepted_as_one_person_household_or_grouping_of_residents_household
          and (
              allotment_returned_to_facility_to_purchase_food_for_meals_served_to_eligible_residents
              or eligible_residents_use_allotment_to_purchase_and_prepare_food_for_own_consumption
              or eligible_residents_use_allotment_to_purchase_meals_prepared_and_served_by_group_living_arrangement
          )

  - name: facility_authorized_representative_ebt_access_responsibility_met
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.309.4(B)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.309.4
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          facility_employee_designated_to_serve_as_authorized_representative
          and authorized_representative_obtained_own_ebt_card_and_pin_to_access_resident_benefits
          and resident_remains_resident_of_facility

  - name: resident_personal_ebt_card_security_met
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.309.4(B)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.309.4
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          resident_resides_in_group_living_facility
          and resident_ebt_card_stored_in_secure_area
          and not group_living_facility_has_access_to_resident_personal_ebt_card_pin
          and not group_living_facility_has_knowledge_of_resident_personal_ebt_card_pin

  - name: group_living_arrangement_expedited_service_timely
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.309.4(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.309.4
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.309.4#group_living_arrangement_expedited_service_calendar_day_limit
              output: group_living_arrangement_expedited_service_calendar_day_limit
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          group_living_arrangement_resident_household_entitled_to_expedited_service
          and benefits_available_for_spending_calendar_days_after_application_filed <= group_living_arrangement_expedited_service_calendar_day_limit
          and required_verification_obtained_before_further_benefits_issued

  - name: group_living_arrangement_application_processing_standard_met
