format: rulespec/v1
module:
  summary: |-
    Colorado's SNAP rule manual requires prospective budgeting for all SNAP
    households. Income is counted only to the extent the amount and month of
    receipt can be anticipated with reasonable certainty. Income received in
    the past 30 days may indicate issuance-month income unless changes require
    adjustment, and a longer past period or last season may be used when more
    representative. Except for eligible strikers, past income is not
    automatically attributed to the household.
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.402.1
rules:
  - name: snap_anticipated_income_reasonably_certain
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.402.1(B)
    versions:
      - effective_from: '2025-10-01'
        formula: anticipated_income_amount_reasonably_certain and anticipated_income_receipt_month_reasonably_certain
  - name: snap_countable_reasonably_certain_anticipated_income
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.402.1(B)
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if snap_anticipated_income_reasonably_certain:
              anticipated_income_certain_portion
          else: 0
  - name: snap_past_30_day_income_representative
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.402.1(C)
    versions:
      - effective_from: '2025-10-01'
        formula: income_received_within_past_30_days and not anticipated_income_change_requires_adjustment
  - name: snap_representative_income_for_prospective_budgeting
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.402.1(C)
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if snap_anticipated_income_reasonably_certain:
              anticipated_income_certain_portion
          elif snap_past_30_day_income_representative:
              income_received_in_past_30_days
          elif longer_past_period_more_accurate_for_anticipated_income:
              longer_past_period_average_income
          elif seasonal_income_last_season_more_accurate:
              last_season_average_income
          elif eligible_striker:
              striker_income_for_prospective_budgeting
          else: 0
