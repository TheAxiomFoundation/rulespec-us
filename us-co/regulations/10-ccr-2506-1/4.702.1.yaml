        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.702.1
  versions:
  - effective_from: '2025-10-01'
    formula: "household_received_fewer_benefits_than_eligible_to_receive\nand (\n\
      \    underissuance_due_to_local_office_error\n    or court_overturned_or_reversed_ipv_disqualification\n\
      \    or court_determined_household_should_have_received_more_benefits_during_issuance_period\n\
