format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.702.1
  summary: To be eligible for restored benefits, the household must have had SNAP
    benefits wrongfully delayed, denied, or terminated; delay means an eligibility
    determination was not accomplished within processing timeframe standards. Restoration
    is warranted when a household received fewer benefits than eligible due to local
    office error, specified court actions, or a court determination. Benefits are
    restored for not more than twelve months before the first applicable notice, discovery,
    hearing request, or judicial-action date, and restored even if the household is
    currently ineligible. State-ordered reductions or cancellations do not create
    entitlement to restoration unless the Secretary of Agriculture directs restoration.
rules:
- name: standard_restoration_prior_month_limit
  kind: parameter
  dtype: Count
  source: 10 CCR 2506-1 section 4.702.1(C), (E)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.702.1
          excerpt: not more than twelve (12) months prior
  versions:
  - effective_from: '2025-10-01'
    formula: '12'
- name: judicial_first_action_restoration_prior_month_limit
  kind: parameter
  dtype: Count
  source: 10 CCR 2506-1 section 4.702.1(D)(1)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.702.1
          excerpt: not more than twelve (12) months prior to the date the court action
            was initiated
  versions:
  - effective_from: '2025-10-01'
    formula: '12'
- name: judicial_review_restoration_prior_month_limit
