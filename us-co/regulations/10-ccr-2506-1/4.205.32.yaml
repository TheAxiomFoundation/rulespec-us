format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.205.32
  summary: |-
    Whenever an initial thirty-day application delay is the fault of the local office, the office must take immediate corrective action, must not deny the application for that delay, and must notify the household of any action needed. If the household is found eligible during the second thirty-day period, retroactive prorated benefits are provided; if found ineligible, the application is denied and a notice of action is sent when the determination is made.
imports:
  - us-co:regulations/10-ccr-2506-1/4.205.3#application_processing_calendar_day_limit
  - us-co:regulations/10-ccr-2506-1/4.205.3#delay_beyond_processing_standard_caused_by_local_office
  - us-co:regulations/10-ccr-2506-1/4.207.2#snap_initial_month_proration_applies
  - us-co:regulations/10-ccr-2506-1/4.207.2#snap_allotment
rules:
  - name: second_application_processing_calendar_day_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.205.32
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.205.32
              excerpt: "during the second thirty (30) day period"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          30

