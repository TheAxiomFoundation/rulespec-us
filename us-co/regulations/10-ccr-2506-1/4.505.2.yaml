format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.505.2
  summary: |-
    All SSNs provided by the household shall be verified through SSA under IEVS procedures; SOLQ-I may also be used. Certification, eligibility determinations, and benefits for otherwise eligible households or members shall not be delayed while SSN verification or IEVS response is pending, and members who provide an SSN shall not be denied benefits for inability to present a Social Security card or other official documentation. For discrepant IEVS notice, the local office shall review the case record, correct and resubmit errors, send written non-adverse-action discrepancy notice if no submission error is found, assist the household, and may disqualify the noncooperating individual whose SSN cannot be verified until cooperation unless good cause exists.
rules:
  - name: household_ssns_verification_source_valid
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.505.2(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.505.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not household_provided_ssns)
          or ssns_verified_through_ssa_under_ievs
          or ssns_verified_using_solq_i
          or (
              household_members_are_basic_categorically_eligible_clients
              and local_office_accepted_ssns_as_verified_by_categorically_eligible_programs
          )

  - name: otherwise_eligible_member_certification_delayed_for_ssn_verification_prohibited
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.505.2(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.505.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_member_otherwise_eligible
          and household_member_provided_ssn
          and certification_delayed_to_verify_ssn_provided_by_client

  - name: provided_ssn_documentation_denial_prohibited
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.505.2(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.505.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_member_provided_ssn
          and benefits_denied_for_failure_or_inability_to_present_social_security_card_or_other_official_documentation

  - name: otherwise_eligible_household_ievs_response_delay_prohibited
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.505.2(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.505.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_otherwise_eligible
          and awaiting_response_from_ievs
          and (
              eligibility_determination_delayed_while_awaiting_ievs_response
              or benefits_delayed_while_awaiting_ievs_response
          )

  - name: discrepant_ssn_case_record_review_completed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.505.2(B)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.505.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not local_office_received_ievs_notice_participant_ssn_cannot_be_verified_or_is_discrepant)
          or (
              local_office_conducted_case_record_review
              and local_office_confirmed_case_record_ssn_matches_ssn_submitted_to_ssa
          )

  - name: ssn_submission_error_corrected_and_resubmitted
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.505.2(B)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.505.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not local_office_received_ievs_notice_participant_ssn_cannot_be_verified_or_is_discrepant)
          or (not error_occurred_in_original_ssn_verification_submittal)
          or (
              local_office_corrected_original_ssn_verification_submittal_error
              and ssn_resubmitted_through_ievs_for_verification
          )

  - name: ssn_discrepancy_written_notice_provided
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.505.2(B)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.505.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not local_office_received_ievs_notice_participant_ssn_cannot_be_verified_or_is_discrepant)
          or error_occurred_in_original_ssn_verification_submittal
          or (
              local_office_advised_household_in_writing_member_ssn_could_not_be_verified
              and local_office_instructed_household_to_contact_local_office_to_resolve_discrepancy
              and written_ssn_discrepancy_notice_not_treated_as_advance_notice_of_adverse_action
          )

  - name: ssn_discrepancy_resolution_assistance_provided
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.505.2(B)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.505.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not local_office_received_ievs_notice_participant_ssn_cannot_be_verified_or_is_discrepant)
          or (
              local_office_made_every_effort_to_assist_household_resolving_ssn_discrepancy
              and local_office_referred_household_to_appropriate_ssa_office
              and local_office_assisted_household_obtaining_documents_available_to_local_office_required_by_ssa
          )

  - name: discrepant_ssn_noncooperation_disqualification_permitted
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.505.2(B)(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.505.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          individual_ssn_cannot_be_verified
          and household_or_participant_failed_or_refused_to_cooperate_resolving_ssn_discrepancy
          and not good_cause_exists_for_failure_or_refusal_to_cooperate
          and disqualification_effective_month_following_expiration_of_notice_of_adverse_action
