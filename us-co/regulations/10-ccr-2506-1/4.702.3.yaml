format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.702.3
  summary: Individuals disqualified for intentional Program violation/fraud are not
    entitled to restoration for disqualified months unless the disqualification decision
    is subsequently reversed. For each disqualified month, not to exceed twelve months,
    the restored amount is the difference between the household allotment received
    and the allotment the household would have received if the disqualified member
    had participated. Participation in a contested administrative disqualification
    hearing or referral for prosecution is considered a request for restored benefits;
    if a final agency IPV decision is later overturned by a court, restoration is
    calculated for a period not to exceed twelve months before the original administrative
    hearing.
rules:
- name: disqualified_month_restoration_month_limit
  kind: parameter
  dtype: Count
  source: 10 CCR 2506-1 section 4.702.3
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.702.3
          excerpt: For each month the individual was disqualified, not to exceed twelve
            (12) months
  versions:
  - effective_from: '2025-10-01'
    formula: '12'
- name: court_overturn_restoration_lookback_month_limit
  kind: parameter
  dtype: Count
  source: 10 CCR 2506-1 section 4.702.3
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.702.3
          excerpt: calculated for a period not to exceed twelve (12) months prior
            to the date of the original administrative hearing
  versions:
  - effective_from: '2025-10-01'
    formula: '12'
- name: intentional_program_violation_disqualified_individual_restoration_entitlement
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: 10 CCR 2506-1 section 4.702.3
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.702.3
      - path: versions[0].formula
        kind: import
        import:
          target: us-co:regulations/10-ccr-2506-1/4.702.3#disqualified_month_restoration_month_limit
          output: disqualified_month_restoration_month_limit
          hash: sha256:local
  versions:
  - effective_from: '2025-10-01'
    formula: 'individual_disqualified_for_intentional_program_violation_or_fraud

      and disqualification_decision_subsequently_reversed

      and disqualified_month_sequence_number <= disqualified_month_restoration_month_limit'
- name: disqualified_month_restored_benefit_amount
  kind: derived
  entity: Person
  dtype: Money
  period: Month
  unit: USD
  source: 10 CCR 2506-1 section 4.702.3
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.702.3
      - path: versions[0].formula
        kind: import
        import:
          target: us-co:regulations/10-ccr-2506-1/4.702.3#disqualified_month_restoration_month_limit
          output: disqualified_month_restoration_month_limit
          hash: sha256:local
  versions:
  - effective_from: '2025-10-01'
    formula: 'if individual_disqualified_for_intentional_program_violation_or_fraud
      and disqualification_decision_subsequently_reversed and disqualified_month_sequence_number
      <= disqualified_month_restoration_month_limit: max(0, household_allotment_would_have_received_if_disqualified_member_allowed_to_participate
      - household_allotment_received) else: 0'
- name: contested_intentional_program_violation_proceeding_restored_benefits_request
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: 10 CCR 2506-1 section 4.702.3
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.702.3
  versions:
  - effective_from: '2025-10-01'
    formula: "(\n    person_participated_in_state_or_local_administrative_disqualification_hearing\n\
      \    or person_referred_for_prosecution\n)\nand person_contests_local_office_assertion_of_intentional_program_violation_or_fraud"
- name: court_overturned_final_agency_decision_restoration_period_applies
