format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.160.2
  summary: |-
    State and local offices shall not discriminate against any applicant or participant in any aspect of program administration for listed protected reasons. Local offices shall ensure the FNS nondiscrimination poster is prominently displayed. A local office shall explain discrimination complaint procedures and advise of the right to file; such information shall be made available within ten (10) calendar days from request.
rules:
  - name: discrimination_complaint_information_calendar_day_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.160.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.160.2
              excerpt: "within ten (10) calendar days from the date of request"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          10

  - name: program_administration_nondiscrimination_requirement_satisfied
    kind: derived
    entity: StateAgency
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.160.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.160.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          not office_discriminated_against_applicant_or_participant_in_program_administration_for_prohibited_reason

  - name: local_office_nondiscrimination_poster_requirement_satisfied
    kind: derived
    entity: StateAgency
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.160.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.160.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          not office_is_local_office
          or fns_nondiscrimination_poster_prominently_displayed

  - name: discrimination_complaint_procedure_information_requirement_satisfied
    kind: derived
    entity: StateAgency
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.160.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.160.2
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.160.2#discrimination_complaint_information_calendar_day_limit
              output: discrimination_complaint_information_calendar_day_limit
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          not person_requested_discrimination_complaint_procedure_information
          or (
              local_office_explained_discrimination_complaint_procedures_to_person
              and local_office_advised_person_of_right_to_file_discrimination_complaint_under_procedure
              and calendar_days_from_request_to_information_available <= discrimination_complaint_information_calendar_day_limit
          )
