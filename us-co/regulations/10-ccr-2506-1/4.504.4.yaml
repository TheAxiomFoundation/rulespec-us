format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.504.4
  summary: |-
    USCIS SAVE verifies the alien status of applicant non-citizens; SAVE use must be documented in the case record with the request submission date, Form G-845 when applicable, and any verification response.
rules:
  - name: applicant_non_citizen_alien_status_verified_by_save
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.504.4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.504.4
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not applicant_is_non_citizen)
          or save_system_verified_applicant_alien_status

  - name: save_verification_use_documented_in_case_record
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.504.4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.504.4
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not save_used_to_verify_applicant_non_citizen_alien_status)
          or (
              save_use_documented_in_case_record
              and case_record_contains_date_primary_or_secondary_request_submitted
              and (
                  (not form_g_845_applicable)
                  or case_record_contains_copy_of_form_g_845
              )
              and case_record_contains_response_to_verification_request
          )
