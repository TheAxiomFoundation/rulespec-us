format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.803.42
  summary: |-
    A. The time and place of the state or local-level administrative disqualification hearing shall be arranged so that the hearing is accessible to the household member suspected of intentional program violation. The state-level hearing may be conducted by telephone using conference call techniques unless one of the parties objects ... The household member ... has the right to request a face-to-face hearing at any time ... but not once the telephonic hearing is concluded.
    B. Persons ... notified that a local-level administrative disqualification hearing has been scheduled have the right to request that their case be heard by a state-level Administrative Law Judge ... within (10) calendar days ... If a state-level hearing is requested, the local office shall forward the request ... no later than three (3) working days ... No local-level administrative disqualification hearing shall be held if the accused requests a state-level hearing within these specified guidelines.
    C. If the household member or representative cannot be located or fails to appear ... without good cause, the hearing shall be conducted without the household member represented ... If the household provides a statement of non-receipt and the county or the office of administrative courts cannot document receipt of the notice, a re-hearing ... shall be scheduled ...
    D. If the household member is found to have committed intentional program violation but ... later determines that the household member or representative had good cause for not appearing ... the previous decision shall no longer remain valid and ... shall conduct a new hearing ... ten (10) calendar days from the date of the hearing to present reasons indicating a good cause ...
  deferred_outputs:
    - output: us-co:regulations/10-ccr-2506-1/4.803.42#rehearing_required_after_statement_of_nonreceipt
      reason: The re-hearing rule depends on whether notice was provided in accordance with Section 4.803.43, which is cited but not supplied in context.
rules:
  - name: state_level_hearing_request_calendar_day_limit
    kind: parameter
    dtype: Integer
    source: 10 CCR 2506-1, 4.803.42(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.803.42
              excerpt: "within (10) calendar days of being notified of a local-level hearing"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10

  - name: local_office_forwarding_working_day_limit
    kind: parameter
    dtype: Integer
    source: 10 CCR 2506-1, 4.803.42(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.803.42
              excerpt: "no later than three (3) working days from receipt of the request"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          3

  - name: good_cause_reasons_calendar_day_limit
    kind: parameter
    dtype: Integer
    source: 10 CCR 2506-1, 4.803.42(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.803.42
              excerpt: "ten (10) calendar days from the date of the hearing to present reasons"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10

  - name: telephonic_state_hearing_may_be_used
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: 10 CCR 2506-1, 4.803.42(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.803.42
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          state_level_administrative_disqualification_hearing
          and not a_party_objects_to_telephone_hearing

  - name: face_to_face_hearing_request_timely
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: 10 CCR 2506-1, 4.803.42(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.803.42
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_member_charged_with_intentional_program_violation
          and face_to_face_hearing_requested
          and telephonic_hearing_has_not_concluded

  - name: state_level_hearing_request_within_guidelines
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: 10 CCR 2506-1, 4.803.42(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.803.42
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.803.42#state_level_hearing_request_calendar_day_limit
              output: state_level_hearing_request_calendar_day_limit
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_charged_with_intentional_program_violation
          and person_notified_local_level_hearing_scheduled
          and state_level_hearing_requested
