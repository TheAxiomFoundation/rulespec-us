    entity: Person
    dtype: Judgment
    period: Day
    source: 10 CCR 2506-1, 4.803.42(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.803.42
    versions:
