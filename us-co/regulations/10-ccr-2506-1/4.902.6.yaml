format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.902.6
  summary: |-
    State and local offices shall ensure SNAP staff responsible for administration,
    issuance, review, and eligibility determination are knowledgeable about civil
    rights procedures and able to assist clients with civil rights complaints.
    Local office staff must undergo state-prescribed civil rights training annually.
rules:
  - name: snap_staff_subject_to_civil_rights_procedure_requirements
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 10 CCR 2506-1 section 4.902.6
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.902.6
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          staff_responsible_for_snap_administration
          or staff_responsible_for_snap_issuance
          or staff_responsible_for_snap_review
          or staff_responsible_for_snap_eligibility_determination
  - name: snap_staff_civil_rights_procedure_capability_compliant
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 10 CCR 2506-1 section 4.902.6
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.902.6
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.902.6#snap_staff_subject_to_civil_rights_procedure_requirements
              output: snap_staff_subject_to_civil_rights_procedure_requirements
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not snap_staff_subject_to_civil_rights_procedure_requirements)
          or (
              staff_knowledgeable_about_civil_rights_procedures
