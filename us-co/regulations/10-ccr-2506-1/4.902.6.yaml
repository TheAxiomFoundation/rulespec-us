            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.902.6
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.902.6#snap_staff_subject_to_civil_rights_procedure_requirements
              output: snap_staff_subject_to_civil_rights_procedure_requirements
              hash: sha256:local
    versions:
