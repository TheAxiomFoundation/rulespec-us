format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.706.1
  summary: |-
    Where USDA/FNS has issued a disaster declaration of individual assistance, eligible emergency SNAP household individuals shall not receive both the disaster allotment and a replacement allotment.
rules:
  - name: emergency_snap_disaster_and_replacement_allotment_dual_receipt_prohibited
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.706.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.706.1
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          usda_fns_has_issued_disaster_declaration_of_individual_assistance
          and individual_in_household_eligible_for_emergency_snap_benefits
          and individual_received_disaster_allotment
          and individual_received_replacement_allotment
