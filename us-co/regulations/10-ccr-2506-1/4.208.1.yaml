format: rulespec/v1
imports:
- us-co:regulations/10-ccr-2506-1/4.403#payment_considered_earned_income
- us-co:regulations/10-ccr-2506-1/4.204#twenty_four_month_certification_period_months
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.208.1
  summary: Households are assigned either a six-month or twenty-four-month certification
    period. Twenty-four months applies to households containing only members aged
    60 and older and/or with a disability and with no earned income as defined in
    Section 4.403 at certification; such households must complete a periodic report
    form at the twelfth month interval. All other households receive six months.
rules:
- name: elderly_or_disabled_member_age_threshold_years
  kind: parameter
  dtype: Integer
  source: 10 CCR 2506-1 section 4.208.1(A)(1)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.208.1
          excerpt: aged 60 and older
  versions:
  - effective_from: '2025-10-01'
    formula: '60'
- name: six_month_certification_period_months
  kind: parameter
  dtype: Count
  source: 10 CCR 2506-1 section 4.208.1(B)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.208.1
          excerpt: Six (6) Month Certification Period
  versions:
  - effective_from: '2025-10-01'
    formula: '6'
- name: twenty_four_month_periodic_report_interval_months
  kind: parameter
  dtype: Count
  source: 10 CCR 2506-1 section 4.208.1(A)(2)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.208.1
          excerpt: at the twelfth (12th) month interval
  versions:
  - effective_from: '2025-10-01'
    formula: '12'
- name: household_payments
  kind: data_relation
  data_relation:
    predicate: household_payments
    arity: 2
    arguments:
    - Household
    - Payment
  source: 10 CCR 2506-1 section 4.208.1(A)(1)
- name: household_has_no_earned_income_at_certification
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: 10 CCR 2506-1 section 4.208.1(A)(1)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.208.1
      - path: versions[0].formula
        kind: import
        import:
          target: us-co:regulations/10-ccr-2506-1/4.403#payment_considered_earned_income
          output: payment_considered_earned_income
          hash: sha256:cb3ed30387b04815fb983096ae943ecc0c5ce10af8a53ad4daaa1a8304a1a1b6
  versions:
  - effective_from: '2025-10-01'
    formula: count_where(household_payments, payment_considered_earned_income) ==
      0
- name: household_assigned_twenty_four_month_certification_period
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: 10 CCR 2506-1 section 4.208.1(A)(1)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.208.1
  versions:
  - effective_from: '2025-10-01'
    formula: 'household_contains_only_members_aged_at_least_elderly_or_disabled_member_age_threshold_years_or_with_disability

      and household_has_no_earned_income_at_certification'
- name: household_assigned_six_month_certification_period
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: 10 CCR 2506-1 section 4.208.1(B)(1)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.208.1
  versions:
  - effective_from: '2025-10-01'
    formula: not household_assigned_twenty_four_month_certification_period
- name: assigned_certification_period_months
  kind: derived
  entity: Household
  dtype: Count
  period: Month
  source: 10 CCR 2506-1 section 4.208.1
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.208.1
      - path: versions[0].formula
        kind: import
        import:
          target: us-co:regulations/10-ccr-2506-1/4.204#twenty_four_month_certification_period_months
          output: twenty_four_month_certification_period_months
          hash: sha256:0a0817d140bb869fa20609be3a73ccaf429b78af18cf382479010d3d99e030d3
      - path: versions[0].formula
        kind: import
        import:
          target: us-co:regulations/10-ccr-2506-1/4.208.1#six_month_certification_period_months
          output: six_month_certification_period_months
          hash: sha256:local
  versions:
  - effective_from: '2025-10-01'
    formula: 'if household_assigned_twenty_four_month_certification_period: twenty_four_month_certification_period_months
      else: six_month_certification_period_months'
- name: twenty_four_month_periodic_report_requirement_satisfied
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: 10 CCR 2506-1 section 4.208.1(A)(2)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.208.1
      - path: versions[0].formula
        kind: import
        import:
          target: us-co:regulations/10-ccr-2506-1/4.208.1#twenty_four_month_periodic_report_interval_months
          output: twenty_four_month_periodic_report_interval_months
          hash: sha256:local
  versions:
  - effective_from: '2025-10-01'
    formula: "(not household_assigned_twenty_four_month_certification_period)\nor\
      \ (\n    periodic_report_form_completed_at_month_interval\n    and periodic_report_form_month_interval\
      \ == twenty_four_month_periodic_report_interval_months\n    and (\n        periodic_report_form_returned\n\
      \        or (\n            case_closed_following_notice_of_adverse_action_period\n\
      \            and notice_states_reason_for_ending_certification_period\n    \
      \        and notice_states_certification_period_will_end_following_adverse_action_period\n\
      \        )\n    )\n)"
