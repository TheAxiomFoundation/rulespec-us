format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.202.1
  summary: |-
    Households applying for PA must be notified of, and allowed to exercise, the right to apply for SNAP at the same time. For joint SNAP/PA applications, the local office uses the original application and pertinent subsequent information, without re-interviewing, using mail or telephone contact for changes. If the PA application is denied, the household is not required to file a new SNAP application and SNAP eligibility is determined or continued from the joint application and later documented information.
rules:
  - name: pa_applicant_simultaneous_snap_application_right_provided
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.202.1(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.202.1
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not household_applying_for_pa)
          or (
              household_notified_of_right_to_apply_for_snap_at_same_time_as_pa
              and household_allowed_to_apply_for_snap_at_same_time_as_pa
          )

  - name: joint_snap_pa_application_processed_without_reinterview
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.202.1(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.202.1
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not household_filed_joint_snap_pa_application)
          or (
              local_office_provided_benefits_using_original_application
              and local_office_used_pertinent_information_occurring_after_original_application
              and not local_office_reinterviewed_household
              and local_office_used_mail_or_telephone_contact_to_obtain_information_about_changes
          )

  - name: categorically_eligible_after_pa_approval_processed_without_reinterview
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.202.1(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.202.1
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not household_categorically_eligible_when_determined_pa_eligible_after_snap_denial)
          or (
              local_office_used_original_application_for_categorically_eligible_household
              and local_office_used_relevant_subsequent_information_for_categorically_eligible_household
              and not local_office_reinterviewed_household
              and local_office_used_mail_or_telephone_contact_to_obtain_information_about_changes
          )

  - name: pa_denied_joint_snap_application_continued_without_new_application
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.202.1(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.202.1
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not household_pa_application_denied)
          or (
              household_filed_joint_snap_pa_application
              and not household_required_to_file_new_snap_application_after_pa_denial
              and snap_eligibility_determined_or_continued_based_on_joint_pa_snap_application
              and snap_eligibility_determined_or_continued_based_on_documented_information_obtained_after_application_used_in_pa_determination
          )
