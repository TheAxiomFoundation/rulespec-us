format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.300
  summary: |-
    Non-financial criteria for eligibility apply to all households, including PA households, and are considered prospectively for the issuance month based on anticipated circumstances at application and when changes are made known. The criteria consist of identity, residency, Social Security Number, citizenship/non-citizenship status, household composition including student and striker eligibility, and work registration and employment requirements.
rules:
  - name: household_subject_to_non_financial_eligibility_criteria
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.300
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.300
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          true

  - name: non_financial_criteria_prospectively_considered_for_issuance_month
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.300
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.300
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          eligibility_technician_anticipated_circumstances_for_issuance_month
          and (
              circumstances_considered_at_time_of_application
              or changes_made_known_to_local_office
          )

  - name: household_meets_non_financial_eligibility_criteria
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.300(A)-(F)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.300
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          applicant_identity_criterion_met
          and residency_criterion_met
          and social_security_number_criterion_met
          and citizenship_or_non_citizenship_status_criterion_met
          and household_composition_student_and_striker_eligibility_criterion_met
          and work_registration_and_employment_requirements_criterion_met
