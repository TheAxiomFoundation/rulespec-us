format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.500
  summary: |-
    Verification is documentary evidence or third-party contact used to confirm household statements. The case record must document sources and results of verification, denial or termination reasons, fair-hearing and ADH correspondence. The local office must give clear, bilingual verification-requirements notice and assist cooperating households; households have primary responsibility for documentary evidence and resolving questionable information. A household is ineligible if it refuses to cooperate in subsequent eligibility review.
rules:
  - name: verification_method_valid
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.500(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.500
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          documentary_evidence_used_to_confirm_information_and_accuracy
          or third_party_contact_used_to_confirm_information_and_accuracy

  - name: case_record_supports_verification_determination
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.500(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.500
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          case_record_contains_verification_sources
          and case_record_contains_verification_results
          and statements_sufficiently_detailed_to_support_eligibility_determination
          and statements_permit_reviewer_to_determine_reasonableness_of_technician_determination

  - name: ineligibility_decision_case_record_documented
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.500(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.500
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not ineligibility_determined)
          or (
              case_record_clearly_indicates_reason_for_snap_denial_or_termination
              and case_record_contains_verification_used_for_ineligibility_decision
          )

  - name: additional_verification_reason_documented
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.500(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.500
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not information_considered_questionable)
          and (not alternate_source_of_verification_requested)
          or reason_for_additional_verification_documented_in_case_record

  - name: fair_hearing_correspondence_retained_in_case_record
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.500(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.500
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not fair_hearing_correspondence_exists)
          or (
              case_record_contains_household_fair_hearing_request
              and case_record_contains_fair_hearing_scheduling_notice
              and case_record_contains_fair_hearing_decisions
              and case_record_contains_formal_exceptions_to_fair_hearing_ruling
          )

  - name: administrative_disqualification_hearing_correspondence_retained_in_case_record
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.500(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.500
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not administrative_disqualification_hearing_correspondence_exists)
          or (
              case_record_contains_notice_of_alleged_ipv_or_fraud
              and case_record_contains_adh_waiver_notice_if_given
              and case_record_contains_adh_scheduling_notice_if_waiver_not_returned
              and case_record_contains_adh_outcome_decisions
              and case_record_contains_disqualification_notice_sent_to_household
          )

  - name: verification_requirements_notice_provided
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.500(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.500
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not household_at_application_recertification_or_periodic_report_process)
          or (
              local_office_provided_notice_of_verification_requirements
              and notice_informs_household_local_office_will_assist_if_household_cooperates
              and notice_written_in_clear_and_simple_language
              and notice_meets_bilingual_requirements
          )

  - name: household_documentary_verification_responsibility_met
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.500(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.500
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_provided_documentary_evidence_for_required_verification
          and household_resolved_questionable_information

  - name: local_office_assistance_for_cooperating_household_provided
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.500(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.500
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not household_cooperating_with_local_office)
          or local_office_assisted_household_to_obtain_necessary_documentation

  - name: subsequent_review_cooperation_refusal_ineligibility_applies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.500(E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.500
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_refused_to_cooperate_in_subsequent_eligibility_review
          and review_is_reported_change_recertification_or_quality_control_review
