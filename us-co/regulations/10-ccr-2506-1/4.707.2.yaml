format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.2
  summary: |-
    Each office shall designate a security officer, distribute written robbery-attempt instructions, secure bulk and overnight EBT card supplies, limit issuance-office EBT card supplies to a one- or two-day supply, provide escorts for EBT card transport and itinerant issuance points, divide issuance responsibilities, reconcile discrepancies, and conduct at least monthly physical counts reported on Form FNS-250 and verified by the supervisor.
rules:
  - name: issuance_office_ebt_card_supply_day_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.707.2(A)-(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.2
              excerpt: "limited to a one- or two-day supply"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          2

  - name: physical_count_minimum_monthly_interval_months
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.707.2(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.2
              excerpt: "At a minimum, supervisory personnel must take a monthly physical count"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          1

  - name: security_officer_designation_and_employee_acquaintance_compliant
    kind: derived
    entity: IssuanceOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.707.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          security_officer_designated
          and security_officer_continually_reviews_facilities_and_procedures_to_improve_security_and_deter_loss
          and employees_acquainted_with_precautions_during_issuance
          and employees_acquainted_with_night_security
          and employees_acquainted_with_person_and_ebt_card_transit_safety

  - name: written_robbery_instructions_distributed
    kind: derived
    entity: IssuanceOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.707.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          written_instructions_distributed_to_all_employees
          and written_instructions_cover_appropriate_behavior_during_robbery_attempt
          and written_instructions_cover_reporting_theft_to_law_enforcement
          and written_instructions_cover_reporting_theft_to_state_department

  - name: overnight_ebt_storage_security_compliant
    kind: derived
    entity: IssuanceOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.707.2(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.2
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.707.2#issuance_office_ebt_card_supply_day_limit
              output: issuance_office_ebt_card_supply_day_limit
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not ebt_cards_stored_in_issuance_office_overnight)
          or (
              overnight_ebt_card_supply_days <= issuance_office_ebt_card_supply_day_limit
              and doors_and_windows_affording_building_access_secured
              and doors_equipped_with_double_cylinder_dead_bolt_locks_or_equivalent
              and glass_in_doors_and_windows_barred_or_otherwise_protected_against_breakage
              and connecting_doors_locked_as_securely_as_exterior_doors
              and all_doors_and_windows_checked_locked_before_closing
          )

  - name: issuance_office_ebt_supplies_safe_storage_compliant
    kind: derived
    entity: IssuanceOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.707.2(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          issuance_office_ebt_supplies_kept_in_safe
          and not issuance_office_ebt_supplies_kept_in_desk_or_file_cabinet
          and safe_immovable
          and safe_in_part_of_office_not_visible_to_outside

  - name: robbery_temptation_minimization_compliant
    kind: derived
    entity: IssuanceOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.707.2(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.2
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.707.2#issuance_office_ebt_card_supply_day_limit
              output: issuance_office_ebt_card_supply_day_limit
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          issuance_office_ebt_card_supply_days <= issuance_office_ebt_card_supply_day_limit
          and cashier_supply_out_of_public_view
          and cashier_supply_issued_from_drawer_out_of_clients_reach

  - name: local_law_enforcement_informed_of_issuing_operation
    kind: derived
    entity: IssuanceOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.707.2(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          county_director_or_office_supervisor_informed_local_law_enforcement_of_issuing_office_operation
          and county_director_or_office_supervisor_advised_local_law_enforcement_of_maximum_ebt_card_amounts_handled

  - name: ebt_card_transport_escort_compliant
    kind: derived
    entity: IssuanceOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.707.2(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not ebt_cards_returned_to_bank_at_end_of_day_by_issuance_personnel)
          or (
              escort_provided_for_end_of_day_bank_return
              and not ebt_card_delivery_made_by_only_one_person
          )

  - name: ebt_card_mailing_transport_escort_compliant
    kind: derived
    entity: IssuanceOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.707.2(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not ebt_card_mailings_delivered_to_post_office_by_issuance_personnel)
          or (
              escort_provided_for_post_office_delivery
              and not ebt_card_delivery_made_by_only_one_person
          )

  - name: itinerant_issuance_point_security_compliant
    kind: derived
    entity: IssuanceOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.707.2(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not office_uses_itinerant_issuance_points)
          or (
              additional_precautions_taken_to_protect_ebt_cards_in_transit_and_during_issuance
              and escort_provided_to_and_from_itinerant_point
              and escort_present_during_itinerant_issuance_hours
          )

  - name: embezzlement_prevention_controls_compliant
    kind: derived
    entity: IssuanceOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.707.2(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          issuance_responsibilities_divided
          and supervisor_verified_issuance_records
          and supervisor_resolved_or_documented_daily_reconciliation_discrepancies

  - name: monthly_physical_inventory_compliant
    kind: derived
    entity: IssuanceOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.707.2(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.2
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.707.2#physical_count_minimum_monthly_interval_months
              output: physical_count_minimum_monthly_interval_months
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          months_since_supervisory_physical_count <= physical_count_minimum_monthly_interval_months
          and supervisory_personnel_counted_all_ebt_cards_in_bulk_storage_points
          and supervisory_personnel_counted_ebt_cards_in_each_cashier_working_stock
          and (
              end_of_month_physical_inventory_accomplished_after_close_of_business_on_last_issuance_day_of_reporting_month
              or end_of_month_physical_inventory_accomplished_before_opening_of_business_on_first_issuance_day_of_following_month
          )
          and actual_inventory_count_reported_on_form_fns_250
          and supervisor_verified_accuracy_of_fns_250_report
