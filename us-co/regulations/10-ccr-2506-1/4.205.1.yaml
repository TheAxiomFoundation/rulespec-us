            import:
              target: us-co:regulations/10-ccr-2506-1/4.205.1#expedited_service_entitlement
              output: expedited_service_entitlement
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.205.1#expedited_ebt_access_calendar_day_limit
              output: expedited_ebt_access_calendar_day_limit
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          expedited_service_entitlement
          and required_interview_not_completed_within_calendar_days_after_application > expedited_ebt_access_calendar_day_limit

  - name: after_fifteenth_initial_month_and_next_month_allotments_issued_together
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.205.1(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.205.1
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.205.1#initial_benefits_after_day_of_month_threshold
              output: initial_benefits_after_day_of_month_threshold
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_applies_for_initial_benefits_under_expedited_service
          and application_day_of_month > initial_benefits_after_day_of_month_threshold
          and household_completed_application_within_expedited_timeframe
          and household_provided_all_verification_within_expedited_timeframe
          and household_determined_eligible_for_initial_month
          and household_determined_eligible_for_subsequent_month
          and application_month_prorated_allotment_and_next_full_month_allotment_received_at_same_time

  - name: postponed_verification_second_month_and_prorated_allotment_available_on_seventh_day
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.205.1(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.205.1
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.205.1#initial_benefits_after_day_of_month_threshold
