format: rulespec/v1
imports:
  - us-co:regulations/10-ccr-2506-1/4.406#snap_destitute_income_household
  - us-co:regulations/10-ccr-2506-1/4.407.31#snap_standard_utility_allowance
  - us-co:regulations/10-ccr-2506-1/4.407.31#snap_limited_utility_allowance
  - us-co:regulations/10-ccr-2506-1/4.407.31#snap_one_utility_allowance
  - us-co:regulations/10-ccr-2506-1/4.407.31#snap_individual_utility_allowance
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.205.1
  summary: |-
    Households are entitled to expedited service if they meet one of the listed liquid-resource/income, destitute migrant or seasonal farm worker, or shelter-cost tests. Expedited households must be able to access EBT benefits no later than the seventh calendar day after application, subject to the required interview. Initial applicants after the fifteenth of the month receive specified first- and second-month issuance treatment. Later-screened households receive expedited timeframes from the later determination date. Reductions, suspensions, and cancellations under Section 4.904.4 modify issuance as stated.
rules:
  - name: expedited_liquid_resources_limit
    kind: parameter
    dtype: Money
    unit: USD
    source: 10 CCR 2506-1 section 4.205.1(A)(1)-(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.205.1
              excerpt: "liquid resources do not exceed one hundred dollars ($100)"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          100

  - name: expedited_expected_gross_monthly_income_limit
    kind: parameter
    dtype: Money
    unit: USD
    source: 10 CCR 2506-1 section 4.205.1(A)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.205.1
              excerpt: "less than one hundred fifty dollars ($150) of gross monthly income"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          150

  - name: expedited_ebt_access_calendar_day_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.205.1(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.205.1
              excerpt: "no later than the seventh (7th) calendar day following the date of application"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          7

  - name: initial_benefits_after_day_of_month_threshold
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.205.1(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.205.1
              excerpt: "after the fifteenth (15th) of the month"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          15

  - name: cancellation_processing_calendar_day_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.205.1(E)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.205.1
              excerpt: "five (5) calendar days or the end of the month of application, whichever date is later"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          5

  - name: expedited_shelter_cost_threshold
    kind: derived
    entity: Household
    dtype: Money
    unit: USD
    period: Month
    source: 10 CCR 2506-1 section 4.205.1(A)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.205.1
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.407.31#snap_standard_utility_allowance
              output: snap_standard_utility_allowance
              hash: sha256:03b8f5e9838047e00b5f0e3b20590c9feeeef936afd6f548154f5a4a84908850
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.407.31#snap_limited_utility_allowance
              output: snap_limited_utility_allowance
              hash: sha256:03b8f5e9838047e00b5f0e3b20590c9feeeef936afd6f548154f5a4a84908850
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.407.31#snap_one_utility_allowance
              output: snap_one_utility_allowance
              hash: sha256:03b8f5e9838047e00b5f0e3b20590c9feeeef936afd6f548154f5a4a84908850
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.407.31#snap_individual_utility_allowance
              output: snap_individual_utility_allowance
              hash: sha256:03b8f5e9838047e00b5f0e3b20590c9feeeef936afd6f548154f5a4a84908850
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          anticipated_monthly_rent_or_mortgage
          + snap_standard_utility_allowance
          + snap_limited_utility_allowance
          + snap_one_utility_allowance
          + snap_individual_utility_allowance

  - name: expedited_service_entitlement
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.205.1(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.205.1
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.406#snap_destitute_income_household
              output: snap_destitute_income_household
              hash: sha256:89dc7c36d290725b25b610c1b2ef9eb89d2ad6f71620c3d9397d9a866643721e
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.205.1#expedited_liquid_resources_limit
              output: expedited_liquid_resources_limit
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.205.1#expedited_expected_gross_monthly_income_limit
              output: expedited_expected_gross_monthly_income_limit
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.205.1#expedited_shelter_cost_threshold
              output: expedited_shelter_cost_threshold
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (
              migrant_or_seasonal_farm_worker_household
              and liquid_resources <= expedited_liquid_resources_limit
              and snap_destitute_income_household
          )
          or (
              liquid_resources <= expedited_liquid_resources_limit
              and reasonably_expected_gross_monthly_income_in_application_month < expedited_expected_gross_monthly_income_limit
          )
          or (
              household_eligible_for_snap
              and combined_monthly_gross_income_and_liquid_resources < expedited_shelter_cost_threshold
          )

  - name: expedited_ebt_benefits_available_timely
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.205.1(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.205.1
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.205.1#expedited_ebt_access_calendar_day_limit
              output: expedited_ebt_access_calendar_day_limit
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.205.1#expedited_service_entitlement
              output: expedited_service_entitlement
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          expedited_service_entitlement
          and household_completed_required_interview_before_eligibility_determination
          and ebt_benefits_available_calendar_days_after_application <= expedited_ebt_access_calendar_day_limit

  - name: expedited_application_process_completed_timely
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.205.1(B)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.205.1
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.205.1#expedited_ebt_access_calendar_day_limit
              output: expedited_ebt_access_calendar_day_limit
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.205.1#expedited_service_entitlement
              output: expedited_service_entitlement
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          expedited_service_entitlement
          and (
              household_cannot_be_reached
              or local_office_conducted_interview
          )
          and application_process_completed_calendar_days_after_application <= expedited_ebt_access_calendar_day_limit

  - name: seventh_day_expedited_benefits_entitlement_lost_for_missed_interview
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.205.1(B)(2)
    metadata:
      proof:
        atoms:
