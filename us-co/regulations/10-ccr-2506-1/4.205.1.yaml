      - effective_from: '2025-10-01'
        formula: |-
          household_not_initially_screened_as_requiring_expedited_service
          and household_subsequently_determined_entitled_to_expedited_service
          and expedited_processing_timeframes_began_on_date_subsequent_entitlement_determination_made

  - name: reduced_allotment_issued_within_expedited_timeframes
    kind: derived
