              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.205.1#expedited_ebt_access_calendar_day_limit
              output: expedited_ebt_access_calendar_day_limit
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_applies_for_initial_benefits_under_expedited_service
          and application_day_of_month > initial_benefits_after_day_of_month_threshold
          and verification_postponed
          and second_month_benefits_and_prorated_allotment_available_calendar_day == expedited_ebt_access_calendar_day_limit
          and postponed_verification_provided_before_third_month_benefits_issued

  - name: subsequently_identified_expedited_timeframes_begin_on_determination_date
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.205.1(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.205.1
