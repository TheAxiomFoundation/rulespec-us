    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.205.1(E)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.205.1
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_receives_expedited_service_in_month_reductions_are_in_effect
          and household_determined_eligible
          and allotment_reduced_in_accordance_with_reduction_in_effect
          and reduced_allotment_available_within_expedited_timeframes

  - name: suspended_month_benefit_issuance_follows_expedited_timing_or_postponement
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.205.1(E)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.205.1
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_receives_expedited_service_in_month_suspensions_are_in_effect
          and household_determined_eligible
          and (
              benefits_issued_within_expedited_timeframes
              or (
                  suspension_still_in_effect_at_time_issuance_would_be_made
                  and issuance_postponed_until_suspension_ended
              )
          )

  - name: cancellation_month_expedited_processing_deadline_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.205.1(E)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.205.1
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.205.1#cancellation_processing_calendar_day_limit
              output: cancellation_processing_calendar_day_limit
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_eligible_to_receive_expedited_processing
          and household_applies_for_program_benefits_during_month_cancellations_are_in_effect
