format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.708
  summary: |-
    The issuance supervisor is responsible for taking a physical count of EBT cards on hand after the last issuance day of the month, including all cards in bulk storage and each cashier's working card stock, to validate inventories reported on Forms FS-13 and FNS-250.
rules:
  - name: monthly_ebt_card_physical_count_completed
    kind: derived
    entity: StateAgency
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.708
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.708
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          issuance_supervisor_took_physical_count_of_ebt_cards_on_hand
          and physical_count_taken_after_last_issuance_day_of_month

  - name: ebt_card_inventory_validation_count_complete
    kind: derived
    entity: StateAgency
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.708
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.708
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          actual_count_of_all_ebt_cards_in_bulk_storage_facilities_completed
          and actual_count_of_all_ebt_cards_in_each_cashiers_working_card_stock_completed
          and count_used_to_validate_ebt_card_inventories_reported_on_form_fs_13
          and count_used_to_validate_ebt_card_inventories_reported_on_form_fns_250
