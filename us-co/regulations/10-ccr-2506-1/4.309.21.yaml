format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.309.21
  summary: |-
    Women or women with their children temporarily residing in a shelter for battered women and children that serves over fifty percent of their meals are exempt from the residents-of-institutions prohibition; they may apply as individual parent/child units, may participate in one additional project area and/or household when the other household contains the abuser, and separate shelter households are certified only on their own income, resources, and responsible expenses.
rules:
  - name: battered_shelter_meal_service_rate_threshold
    kind: parameter
    dtype: Rate
    source: 10 CCR 2506-1 section 4.309.21
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.309.21
              excerpt: "serves over fifty percent (50%) of their meals"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          0.50

  - name: battered_shelter_additional_participation_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.309.21(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.309.21
              excerpt: "one (1) additional project area and/or household"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          1

  - name: battered_shelter_monthly_additional_allotment_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.309.21(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.309.21
              excerpt: "additional allotment only once in a month"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          1

  - name: battered_shelter_resident_institution_prohibition_exemption
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.309.21
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.309.21
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.309.21#battered_shelter_meal_service_rate_threshold
              output: battered_shelter_meal_service_rate_threshold
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          person_is_woman_or_woman_with_children
          and person_temporarily_resides_in_shelter_for_battered_women_and_children
          and shelter_serves_resident_meals_rate > battered_shelter_meal_service_rate_threshold

  - name: battered_shelter_additional_participation_allowed
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.309.21(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.309.21
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.309.21#battered_shelter_additional_participation_limit
              output: battered_shelter_additional_participation_limit
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.309.21#battered_shelter_monthly_additional_allotment_limit
              output: battered_shelter_monthly_additional_allotment_limit
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          person_was_previously_certified_in_household_of_abuser
          and person_does_not_have_access_to_former_household_allotment
          and additional_project_areas_or_households_person_participates_in <= battered_shelter_additional_participation_limit
          and one_participating_household_contains_individual_who_abused_person
          and additional_allotments_received_in_month <= battered_shelter_monthly_additional_allotment_limit

  - name: battered_shelter_parent_child_unit_application_allowed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.309.21(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.309.21
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not household_members_are_battered_shelter_residents)
          or (
              household_allowed_to_apply_as_individual_parent_child_unit
              and household_not_considered_part_of_household_consisting_of_all_shelter_residents
          )

  - name: local_office_prompt_former_household_benefit_action
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.309.21(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.309.21
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not household_composition_changed_due_to_battered_shelter_resident_application)
          or (
              local_office_acted_promptly_to_reflect_household_composition_changes
              and local_office_acted_to_reduce_or_terminate_former_household_benefits_as_appropriate
          )

  - name: separate_battered_shelter_household_certification_basis_valid
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.309.21(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.309.21
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not shelter_residents_apply_as_separate_household)
          or (
              certified_based_solely_on_shelter_household_income
              and certified_based_solely_on_shelter_household_resources
              and certified_based_solely_on_expenses_for_which_shelter_household_is_responsible
              and former_household_income_resources_and_expenses_disregarded
              and (
                  not jointly_held_resource_access_depends_on_agreement_of_joint_owner_still_in_former_household
                  or jointly_held_resources_considered_inaccessible_to_shelter_household
              )
          )
