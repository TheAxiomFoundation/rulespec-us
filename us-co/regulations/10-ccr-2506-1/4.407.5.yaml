format: rulespec/v1
module:
  summary: |-
    Colorado's SNAP rule manual excludes verified legally binding child
    support payments made to or for non-household members. Households with a
    history of 3 or more months use averaged support payments; households with
    less than a 3 month record use estimated anticipated payments. If the
    monthly child support payment or legal obligation is not reported and
    verified, the exclusion is not allowed.
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.407.5
rules:
  - name: child_support_deduction
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.407.5
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if child_support_payment_verified:
              if child_support_payment_history_months >= 3:
                  average_monthly_child_support_paid
              else: estimated_monthly_child_support_paid
          else: 0
