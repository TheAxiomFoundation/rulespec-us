format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.83
  summary: |-
    The local office shall maintain issuance and reconciliation records for three years from the month of origination; the period may be extended with written USDA/FNS approval; required information may be kept as records or easily retrievable microfilm, microfiche, or computer tapes.
rules:
  - name: issuance_reconciliation_record_retention_years
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.707.83
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.83
              excerpt: "for a period of three (3) years from the month of origination"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          3

  - name: issuance_reconciliation_record_retention_extension_authorized
    kind: derived
    entity: LocalOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.707.83
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.83
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          issuance_reconciliation_record_retention_period_extended
          and written_approval_of_usda_fns_for_retention_extension_obtained

  - name: issuance_reconciliation_records_maintained_in_permitted_form
    kind: derived
    entity: LocalOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.707.83
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.83
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          original_issuance_and_reconciliation_records_maintained
          or (
              easily_retrievable_microfilm_microfiche_or_computer_tapes_maintained
              and alternative_media_contains_required_issuance_and_reconciliation_information
          )

  - name: issuance_reconciliation_record_retention_requirement_met
    kind: derived
    entity: LocalOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.707.83
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.83
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.707.83#issuance_reconciliation_record_retention_years
              output: issuance_reconciliation_record_retention_years
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.707.83#issuance_reconciliation_records_maintained_in_permitted_form
              output: issuance_reconciliation_records_maintained_in_permitted_form
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          local_office_maintains_issuance_and_reconciliation_records
          and issuance_reconciliation_records_include_minimum_required_reports_forms_files_rosters_and_substantiating_documents
          and issuance_reconciliation_records_maintained_in_permitted_form
          and issuance_reconciliation_records_retained_years_from_month_of_origination >= issuance_reconciliation_record_retention_years
