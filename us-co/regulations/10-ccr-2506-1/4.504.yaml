format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.504
  summary: |-
    Local offices shall accept pertinent documentary evidence provided by the household; shall accept minimum verification requirements unless questionable; and, if written verification cannot be obtained, the eligibility technician shall substitute an acceptable collateral contact.
rules:
  - name: pertinent_documentary_evidence_acceptance_requirement_met
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.504
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.504
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not household_provided_pertinent_documentary_evidence)
          or (
              local_office_accepted_pertinent_documentary_evidence
              and local_office_primarily_concerned_with_verification_adequacy
          )

  - name: minimum_verification_acceptance_requirement_met
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.504
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.504
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not verification_meets_minimum_verification_requirements)
          or verification_is_questionable
          or local_office_accepted_minimum_verification

  - name: collateral_contact_substitution_requirement_met
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.504
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.504
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not written_verification_cannot_be_obtained)
          or eligibility_technician_substituted_acceptable_collateral_contact
