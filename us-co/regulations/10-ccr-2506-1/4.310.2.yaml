format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.310.2
  summary: |-
    At initial application and recertification, when an interview is required, SNAP households must receive written notice and verbal explanation of SNAP general work requirements, rights and responsibilities, consequences of noncompliance, and available additional employment and training programs and services outside Employment First. When no recertification interview is required, a written statement to work registrants in the household is sufficient.
rules:
  - name: interview_required_work_requirements_notice_and_explanation_provided
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.310.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.310.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not household_at_initial_application_or_recertification)
          or (not interview_required)
          or (
              eligibility_technician_provided_written_notice
              and eligibility_technician_provided_verbal_explanation
              and notice_and_explanation_included_snap_general_work_requirements
              and notice_and_explanation_included_work_requirement_rights_and_responsibilities
              and notice_and_explanation_included_consequences_of_failure_to_comply_with_work_requirements
              and notice_and_explanation_included_availability_of_additional_employment_and_training_programs_and_services_outside_employment_first_in_community
          )

  - name: recertification_without_interview_written_statement_sufficient
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.310.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.310.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not household_at_recertification)
          or interview_required
          or written_statement_of_work_requirements_provided_to_work_registrants_in_household
