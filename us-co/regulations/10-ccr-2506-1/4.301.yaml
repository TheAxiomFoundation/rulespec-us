format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.301
  summary: |-
    The identity of the person submitting an application shall be verified through interfaces, collateral contact, or client-provided verification; when an authorized representative applies for a household, both the authorized representative and head of household identities shall be verified.
rules:
  - name: application_submitter_identity_verified_by_allowed_method
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.301
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.301
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not person_submitting_application)
          or (
              submitter_identity_verified_through_interfaces
              or submitter_identity_verified_through_collateral_contact
              or submitter_identity_verified_through_client_provided_verification
          )

  - name: authorized_representative_application_identity_verification_completed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.301
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.301
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not authorized_representative_applies_on_behalf_of_household)
          or (
              (
                  authorized_representative_identity_verified_through_interfaces
                  or authorized_representative_identity_verified_through_collateral_contact
                  or authorized_representative_identity_verified_through_client_provided_verification
              )
              and (
                  head_of_household_identity_verified_through_interfaces
                  or head_of_household_identity_verified_through_collateral_contact
                  or head_of_household_identity_verified_through_client_provided_verification
              )
          )
