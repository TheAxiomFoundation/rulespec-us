              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.207.1
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_eligible
          and household_had_opportunity_to_receive_benefits_prior_to_end_of_period_of_intended_use

  - name: extended_intended_use_period_for_late_certified_household_applied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.207.1(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.207.1
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.207.1#certified_after_day_threshold_for_extended_intended_use_period
              output: certified_after_day_threshold_for_extended_intended_use_period
              hash: sha256:local
