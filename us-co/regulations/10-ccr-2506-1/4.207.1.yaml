format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.207.1
  summary: |-
    All households shall be placed on an issuance schedule to receive benefits on or about the same date each month. Newly certified households must have an opportunity to participate no later than 30 calendar days after filing, or 7 calendar days for expedited service; opportunity means an active EBT card and PIN, benefits posted to the EBT account, and benefits available for spending. Local offices shall mail EBT cards and PINs, if applicable, by the 28th day using at least first class mail. Initial applications after the 15th may receive combined initial prorated and next full month benefits; postponed verification for expedited households must be provided before the third calendar month. Eligible households must have an opportunity to receive benefits before the end of the period of intended use.
rules:
  - name: normal_participation_calendar_day_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.207.1(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.207.1
              excerpt: "no later than thirty (30) calendar days following the date the application was filed"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          30

  - name: expedited_participation_calendar_day_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.207.1(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.207.1
              excerpt: "no later than seven (7) calendar days following the date the application was filed"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          7

  - name: ebt_card_and_pin_mailing_calendar_day_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.207.1(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.207.1
              excerpt: "by the twenty-eighth (28th) day"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          28

  - name: combined_initial_and_next_month_application_day_threshold
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.207.1(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.207.1
              excerpt: "after the fifteenth (15th) day of the month"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          15

  - name: certified_after_day_threshold_for_extended_intended_use_period
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.207.1(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.207.1
              excerpt: "certified after the twentieth (20th) of the month"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          20

  - name: household_monthly_issuance_schedule_assigned
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.207.1(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.207.1
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_placed_on_issuance_schedule
          and household_receives_benefits_on_or_about_same_date_each_month

  - name: normal_newly_certified_household_opportunity_to_participate_timely
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.207.1(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.207.1
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.207.1#normal_participation_calendar_day_limit
              output: normal_participation_calendar_day_limit
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          newly_certified_household
          and not household_eligible_for_expedited_service
          and local_office_received_application_in_correct_county
          and household_provided_active_ebt_card_and_pin
          and benefits_posted_to_household_ebt_account
          and benefits_available_for_spending
          and calendar_days_following_application_filing_until_opportunity_to_participate <= normal_participation_calendar_day_limit

  - name: expedited_newly_certified_household_opportunity_to_participate_timely
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.207.1(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.207.1
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.207.1#expedited_participation_calendar_day_limit
              output: expedited_participation_calendar_day_limit
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          newly_certified_household
          and household_eligible_for_expedited_service
          and local_office_received_application_in_correct_county
          and household_provided_active_ebt_card_and_pin
          and benefits_posted_to_household_ebt_account
          and benefits_available_for_spending
          and calendar_days_following_application_filing_until_opportunity_to_participate <= expedited_participation_calendar_day_limit

  - name: ebt_card_and_pin_mailing_system_timely
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.207.1(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.207.1
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.207.1#ebt_card_and_pin_mailing_calendar_day_limit
              output: ebt_card_and_pin_mailing_calendar_day_limit
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          local_office_used_mailing_system_for_ebt_card_and_pin_if_applicable
          and ebt_card_and_pin_mailed_calendar_day <= ebt_card_and_pin_mailing_calendar_day_limit
          and local_office_used_at_least_first_class_mail_for_ebt_card

  - name: initial_and_next_month_allotments_issued_together
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.207.1(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.207.1
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.207.1#combined_initial_and_next_month_application_day_threshold
              output: combined_initial_and_next_month_application_day_threshold
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          application_for_initial_month_benefits_day_of_month > combined_initial_and_next_month_application_day_threshold
          and household_fulfills_eligibility_requirements
          and household_determined_eligible_for_initial_month
          and household_determined_eligible_for_next_subsequent_month
          and household_received_prorated_initial_month_allotment_and_first_full_month_allotment_at_same_time

  - name: expedited_postponed_verification_combined_allotments_and_verification_timely
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.207.1(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.207.1
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.207.1#combined_initial_and_next_month_application_day_threshold
              output: combined_initial_and_next_month_application_day_threshold
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_eligible_for_expedited_service
          and application_for_initial_month_benefits_day_of_month > combined_initial_and_next_month_application_day_threshold
          and verification_postponed_for_expedited_household
          and household_received_combined_first_and_second_month_benefits_in_required_timeframes
          and postponed_verification_provided_prior_to_third_calendar_month

  - name: postponed_verification_missing_requires_application_denial
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.207.1(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.207.1
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          verification_postponed_for_expedited_household
          and not postponed_verification_provided_prior_to_third_calendar_month
          and application_denied

  - name: benefits_available_before_end_of_intended_use_period
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.207.1(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
