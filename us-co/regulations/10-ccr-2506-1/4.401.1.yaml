format: rulespec/v1
module:
  summary: |-
    Colorado's SNAP rule manual restates FY 2026 federal income eligibility
    standards at 130 percent and 165 percent of the federal poverty level.
    Colorado also applies a 200 percent federal poverty level gross income
    threshold to Expanded Categorical Eligibility households. The federal
    income standards are imported from the USDA SNAP FY 2026 income
    eligibility standards file; the Colorado-specific rule here is the 200
    percent ECE threshold.
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.401.1
imports:
  - us:policies/usda/snap/fy-2026-cola/income-eligibility-standards
rules:
  - name: restates_gross_income_limit_130_percent_fpl
    kind: source_relation
    source: 10 CCR 2506-1 section 4.401.1
    source_relation:
      type: restates
      target: us:policies/usda/snap/fy-2026-cola/income-eligibility-standards#snap_gross_income_limit_130_percent_fpl_48_states_dc
      authority: federal
  - name: restates_gross_income_limit_165_percent_fpl
    kind: source_relation
    source: 10 CCR 2506-1 section 4.401.1
    source_relation:
      type: restates
      target: us:policies/usda/snap/fy-2026-cola/income-eligibility-standards#snap_gross_income_limit_165_percent_fpl_48_states_dc
      authority: federal
  - name: co_snap_expanded_categorical_income_fpl_ratio
    kind: parameter
    dtype: Rate
    source: 10 CCR 2506-1 section 4.401.1
    versions:
      - effective_from: '2025-10-01'
        formula: '2.00'
  - name: co_snap_expanded_categorical_gross_income_limit
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.401.1
    versions:
      - effective_from: '2025-10-01'
        formula: snap_net_income_limit_100_percent_fpl_48_states_dc * co_snap_expanded_categorical_income_fpl_ratio
