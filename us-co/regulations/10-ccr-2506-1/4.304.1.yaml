format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.304.1
  summary: |-
    Mandatory household members who live together must be considered in the same household. This includes certain parents and children, spouses, and persons aged sixty (60) and older experiencing a disability who are unable to purchase and prepare meals and reside with others whose income exceeds 165% of the FPL.
rules:
  - name: child_living_with_parent_age_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.304.1(A)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.304.1
              excerpt: "aged twenty-one (21) years and younger"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          21

  - name: nonparental_control_child_age_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.304.1(A)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.304.1
              excerpt: "under eighteen (18) years of age"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          18

  - name: elderly_disabled_person_age_threshold
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.304.1(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.304.1
              excerpt: "Persons aged sixty (60) and older"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          60

  - name: elderly_disabled_other_individuals_income_fpl_threshold
    kind: parameter
    dtype: Rate
    source: 10 CCR 2506-1 section 4.304.1(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.304.1
              excerpt: "165% of the Federal Poverty Line (FPL)"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          1.65

  - name: child_21_or_younger_living_with_parent_mandatory_member
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.304.1(A)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.304.1
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.304.1#child_living_with_parent_age_limit
              output: child_living_with_parent_age_limit
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          person_age_in_years <= child_living_with_parent_age_limit
          and person_lives_with_natural_or_adoptive_parent_or_stepparent

  - name: both_parents_included_when_child_lives_with_both
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.304.1(A)(1)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.304.1
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          child_lives_in_same_home_with_both_parents
          and both_parents_included_in_snap_household

  - name: child_under_18_parental_control_by_dependency
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.304.1(A)(2)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.304.1
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.304.1#nonparental_control_child_age_limit
              output: nonparental_control_child_age_limit
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          person_age_in_years < nonparental_control_child_age_limit
          and child_financially_or_otherwise_dependent_on_household_member
          and not child_emancipated_under_state_law

  - name: nonfoster_child_under_18_living_with_nonparent_controller_mandatory_member
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.304.1(A)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.304.1
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.304.1#nonparental_control_child_age_limit
              output: nonparental_control_child_age_limit
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.304.1#child_under_18_parental_control_by_dependency
              output: child_under_18_parental_control_by_dependency
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          person_age_in_years < nonparental_control_child_age_limit
          and not child_is_foster_child
          and child_lives_with_household_member_other_than_parent
          and child_under_18_parental_control_by_dependency

  - name: spouse_relationship_recognized
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.304.1(B)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.304.1
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          persons_defined_as_married_to_each_other_under_state_law
          or (
              persons_live_together
              and persons_are_free_to_marry
              and persons_represent_themselves_as_spouses_to_relatives_friends_neighbors_or_community
          )

  - name: spouses_living_together_mandatory_same_household
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.304.1(B)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.304.1
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          spouses_live_together
          and spouse_relationship_recognized_for_household

  - name: absent_spouse_financial_contribution_counted_as_unearned_income
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.304.1(B)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.304.1
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          spouse_has_established_residence_elsewhere
          and spouse_contributes_financially_to_household
          and spouse_financial_contribution_value_counted_as_unearned_income_to_household

  - name: elderly_disabled_person_with_high_income_others_mandatory_same_household
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.304.1(C)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.304.1
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.304.1#elderly_disabled_person_age_threshold
              output: elderly_disabled_person_age_threshold
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.304.1#elderly_disabled_other_individuals_income_fpl_threshold
              output: elderly_disabled_other_individuals_income_fpl_threshold
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          person_age_in_years >= elderly_disabled_person_age_threshold
          and person_experiencing_disability
          and person_unable_to_purchase_and_prepare_own_meals
          and person_residing_with_other_individuals
          and other_individuals_income_as_fpl_ratio > elderly_disabled_other_individuals_income_fpl_threshold

  - name: spouse_excluded_from_elderly_disabled_household_165_test
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.304.1(C)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.304.1
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          person_is_spouse_of_elderly_person_with_disabilities
          and not spouse_is_person_purchasing_and_preparing_meals
          and spouse_income_and_resources_excluded_in_household_eligibility_calculation
