              target: us-co:regulations/10-ccr-2506-1/4.210#prf_regular_mailing_calendar_days
              output: prf_regular_mailing_calendar_days
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.210#prf_acp_mailing_calendar_days
              output: prf_acp_mailing_calendar_days
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          prf_reminder_return_calendar_days + (if household_participates_in_acp: prf_acp_mailing_calendar_days else: prf_regular_mailing_calendar_days)

  - name: snap_case_terminated_after_prf_extended_due_date_missed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.210(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.210
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.210#prf_termination_effective_month
              output: prf_termination_effective_month
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_has_not_submitted_completed_prf_by_extended_due_date_on_reminder_notice
          and snap_case_terminated
          and termination_effective_month_of_certification_period == prf_termination_effective_month
          and termination_letter_mailed_to_household

  - name: benefits_issued_without_proration_after_timely_post_termination_prf_or_pa_change_report
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.210(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.210
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.210#prf_post_termination_reinstatement_calendar_day_limit
              output: prf_post_termination_reinstatement_calendar_day_limit
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.210#prf_termination_effective_month
              output: prf_termination_effective_month
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (household_submitted_prf_after_termination_effective_date or household_reported_changes_for_other_pa_program_after_termination_effective_date)
          and calendar_days_after_termination_effective_date <= prf_post_termination_reinstatement_calendar_day_limit
          and household_provided_all_required_verification
          and benefits_issued_without_proration_from_beginning_of_month == prf_termination_effective_month

  - name: adequate_notice_for_complete_prf_reduction_or_termination_mailed_timely
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.210(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.210
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.210#adequate_notice_business_days_before_normal_benefit_receipt
              output: adequate_notice_business_days_before_normal_benefit_receipt
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_filed_complete_prf_resulting_in_reduction_or_termination
          and agency_sent_adequate_notice
          and adequate_notice_mailed_business_days_before_normal_benefit_receipt >= adequate_notice_business_days_before_normal_benefit_receipt

  - name: deductible_expense_missing_information_or_verification_handled_without_termination
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.210(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.210
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_failed_to_provide_sufficient_information_or_verification_regarding_deductible_expense
          and not county_local_office_terminated_household
          and county_local_office_determined_benefits_without_allowing_deduction

  - name: prf_reportable_change_exists
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.210(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.210
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.210#unearned_income_change_reporting_threshold
              output: unearned_income_change_reporting_threshold
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          unearned_income_change_amount > unearned_income_change_reporting_threshold
          or income_source_changed_including_starting_job
          or household_composition_changed
          or home_address_changed_with_resulting_shelter_cost_change
          or acquired_licensed_vehicle_not_fully_excludable
          or liquid_resources_reached_or_exceeded_applicable_resource_limit_unless_excluded
          or legal_obligation_to_pay_child_support_changed
          or household_member_won_substantial_lottery_or_gambling_winnings

  - name: verified_allowable_medical_expense_increase_acted_upon_for_remainder_of_certification_period
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.210(E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.210
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          allowable_medical_expenses_reported
          and allowable_medical_expenses_verified
          and medical_expense_change_results_in_increase_in_benefits
          and medical_expense_change_acted_upon_for_remainder_of_certification_period
