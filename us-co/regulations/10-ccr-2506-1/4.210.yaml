    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.210
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.210#elderly_disabled_no_earned_income_certification_period_months
              output: elderly_disabled_no_earned_income_certification_period_months
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_certified_for_months == elderly_disabled_no_earned_income_certification_period_months
          and not interview_required_during_certification_period

  - name: prf_mailed_in_required_month
    kind: derived
    entity: Household
    dtype: Judgment
