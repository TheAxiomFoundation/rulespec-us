        formula: |-
          prf_not_submitted_to_local_office_by_initial_due_date
          and initial_due_date_day_of_twelfth_month == prf_initial_due_day_of_twelfth_month
          and reminder_notice_sent_to_household

  - name: prf_extended_due_calendar_days_after_reminder
    kind: derived
    entity: Household
    dtype: Count
    period: Month
    source: 10 CCR 2506-1 section 4.210(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.210
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.210#prf_reminder_return_calendar_days
              output: prf_reminder_return_calendar_days
