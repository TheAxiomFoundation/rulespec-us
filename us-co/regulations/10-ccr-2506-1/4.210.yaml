    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.210(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.210
              excerpt: "aged sixty (60) years and older"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          60

  - name: elderly_disabled_no_earned_income_certification_period_months
