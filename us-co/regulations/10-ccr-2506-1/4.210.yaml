              target: us-co:regulations/10-ccr-2506-1/4.210#prf_mailing_month_of_certification_period
              output: prf_mailing_month_of_certification_period
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          prf_mailed_to_household
          and prf_mailed_month_of_certification_period == prf_mailing_month_of_certification_period

  - name: prf_reminder_notice_sent_when_initial_due_date_missed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.210(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.210
          - path: versions[0].formula
