  - name: elderly_disabled_no_earned_income_24_month_certification_available
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.210(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.210
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.210#elderly_disabled_no_earned_income_certification_period_months
              output: elderly_disabled_no_earned_income_certification_period_months
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_consists_solely_of_members_who_are_disabled_or_at_least_elderly_minimum_age
          and household_has_no_earned_income
          and certification_period_months == elderly_disabled_no_earned_income_certification_period_months

  - name: no_interview_required_during_24_month_certification_period
    kind: derived
