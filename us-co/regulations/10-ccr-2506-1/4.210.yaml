format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.210
  summary: |-
    A household consisting solely of persons with a disability and/or persons aged sixty years and older with no earned income can be certified for twenty-four months without an interview during that certification period, must report changes at the twelve-month interim report, receives a PRF in month eleven, and is subject to reminder, termination, reinstatement-without-proration, notice, deductible-expense, reportable-change, and verified medical-expense rules.
rules:
