format: rulespec/v1
module:
  summary: |-
    Colorado's SNAP rule manual allows the total dollar amount a household is
    responsible to pay for dependent care expenses when the care is necessary
    for employment, seeking employment, or training or education preparatory
    to employment. Reimbursed expenses, expenses paid by JOBS or Transitional
    Child Care, and in-kind payments are not deductible.
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.407.4
rules:
  - name: dependent_care_deduction
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.407.4
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if dependent_care_expense_necessary_for_work_or_training:
              max(0, dependent_care_expenses_paid - dependent_care_reimbursed_or_paid_by_other_program)
          else: 0
