format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.803.44
  summary: |-
    "A pending state or local-level administrative disqualification hearing shall not affect the individual's or the household's right to be certified and to participate in the program." The local office cannot disqualify for intentional program violation until a signed waiver or finding, and must determine eligibility and benefit level as for any other household. Benefits continue if the suspected action does not affect current circumstances; terminate if certification expired after notice and no reapplication; reduce or terminate with substantiating documentation and no fair-hearing request after adverse-action notice.
rules:
  - name: certification_and_participation_right_preserved_during_pending_hearing
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1, 4.803.44, opening sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.803.44
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          pending_state_or_local_administrative_disqualification_hearing
  - name: local_office_must_determine_eligibility_same_as_other_households
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1, 4.803.44, second sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.803.44
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_member_suspected_of_intentional_program_violation
          and not local_office_has_signed_waiver_of_administrative_hearing
          and not hearing_official_or_state_department_found_intentional_program_violation
  - name: allotment_continues_or_recertification_based_on_current_circumstances
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1, 4.803.44(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.803.44
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          action_suspected_of_intentional_program_violation_does_not_affect_current_circumstances
  - name: benefits_must_be_terminated_for_expired_certification_without_reapplication
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1, 4.803.44(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.803.44
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          certification_period_has_expired
          and household_received_notice_of_expiration
          and household_failed_to_reapply
  - name: benefits_must_be_reduced_or_terminated_for_substantiated_ineligibility_without_fair_hearing_request
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1, 4.803.44(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.803.44
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          local_office_has_documentation_substantiating_household_ineligible_or_eligible_for_fewer_benefits
          and household_received_notice_of_adverse_action
          and household_failed_to_request_fair_hearing
