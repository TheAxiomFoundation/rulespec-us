format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.305.1
  summary: |-
    The following non-citizens are not eligible to participate in SNAP as a member of any household, including lawfully present non-qualified non-citizens, undocumented non-citizens, visitors, tourists, diplomats, temporary students, TPS holders unless in another qualifying status, Compact of Free Association admittees, and U Visa holders unless adjusted to qualified non-citizen status.
rules:
  - name: non_citizen_ineligible_to_participate_in_snap_as_household_member
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.305.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.305.1
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          person_is_non_citizen
          and (
              non_citizen_lawfully_present_in_us_but_not_in_qualified_status
              or undocumented_non_citizen
              or non_citizen_visitor
              or tourist
              or diplomat
              or student_entered_us_temporarily_with_no_intention_of_abandoning_foreign_residence
              or (
                  individual_granted_temporary_protection_status
                  and not individual_in_some_other_qualifying_status
              )
              or compact_of_free_association_admittee_from_palau_micronesia_or_marshall_islands
              or (
                  individual_has_u_visa_including_minor_child_under_age_eighteen
                  and not individual_adjusted_to_qualified_non_citizen_status
              )
          )
