format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.82
  summary: |-
    EBT cards shall be maintained in a secure location with access limited to authorized personnel. Issuance supervisors shall establish tracking and accounting methods to replenish cashier EBT card stock, issuers shall reconcile issuance daily, automated printout totals shall be reconciled with physical counts, and unresolved discrepancies must be verified daily and on Form FS-10.
rules:
  - name: ebt_cards_securely_maintained
    kind: derived
    entity: StateAgency
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.707.82
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.82
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          ebt_cards_maintained_in_secure_location
          and ebt_card_access_limited_to_authorized_personnel

  - name: cashier_ebt_card_stock_replenishment_tracking_established
    kind: derived
    entity: StateAgency
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.707.82
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.82
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          issuance_supervisor_established_tracking_methods_to_replenish_each_cashier_ebt_card_stock_as_needed
          and issuance_supervisor_established_accounting_methods_to_replenish_each_cashier_ebt_card_stock_as_needed

  - name: ebt_card_issuance_daily_reconciled
    kind: derived
    entity: StateAgency
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.707.82
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.82
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          ebt_card_issuers_reconcile_issuance_daily
          and (
              daily_reconciliation_uses_daily_tally_sheets
              or daily_reconciliation_uses_cashiers_daily_reports
              or daily_reconciliation_uses_tapes
              or daily_reconciliation_uses_printouts
          )

  - name: automated_printout_issuance_total_reconciled_with_physical_count
    kind: derived
    entity: StateAgency
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.707.82
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.82
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not automated_system_records_daily_total_of_ebt_card_issuances_for_printouts)
          or (
              automated_printout_daily_total_reconciled_with_cashiers_daily_total_actual_ebt_card_issuance
              and cashiers_daily_total_actual_ebt_card_issuance_determined_by_physical_count
          )

  - name: unresolved_ebt_card_issuance_discrepancy_verified
    kind: derived
    entity: StateAgency
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.707.82
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.82
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not unresolved_ebt_card_issuance_discrepancy_exists)
          or (
              unresolved_ebt_card_issuance_discrepancy_verified_daily
              and unresolved_ebt_card_issuance_discrepancy_verified_on_cashiers_form_fs_10
          )
