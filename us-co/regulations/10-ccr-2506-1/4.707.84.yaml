format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.84
  summary: |-
    Local offices shall control all issuance documents establishing household eligibility while transferred and processed within the local office, use numbers, batching, inventory control logs, or similar controls from initial receipt through issuance and reconciliation, and limit access to specified Notices of Action and blank EBT cards to authorized personnel.
rules:
  - name: household_eligibility_issuance_documents_controlled_during_local_office_processing
    kind: derived
    entity: LocalOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.707.84
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.84
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not household_eligibility_issuance_documents_transferred_and_processed_within_local_office)
          or local_office_controls_all_household_eligibility_issuance_documents_during_transfer_and_processing

  - name: issuance_document_controls_used_through_issuance_and_reconciliation
    kind: derived
    entity: LocalOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.707.84
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.84
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not local_office_initially_received_issuance_documents)
          or (
              local_office_used_numbers_batching_inventory_control_logs_or_similar_controls
              and local_office_used_controls_from_initial_receipt_through_issuance_and_reconciliation_process
          )

  - name: master_issuance_file_notices_and_blank_ebt_cards_access_limited
    kind: derived
    entity: LocalOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.707.84
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.84
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (
              (not local_office_has_notices_of_action_that_initiate_or_terminate_master_issuance_file)
              or access_to_master_issuance_file_initiation_or_termination_notices_limited_to_authorized_personnel
          )
          and (
              (not local_office_has_blank_ebt_cards)
              or access_to_blank_ebt_cards_limited_to_authorized_personnel
          )
