format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.505.51
  summary: |-
    A client's statement of citizenship is questionable when the claim is inconsistent with the client's statements or information from another source. The criteria must not result in discrimination or special targeting, and the eligibility technician shall not rely on foreign-seeming surname, accent, appearance, or lack of English ability. A member whose citizenship is in question is ineligible until proof is obtained, except as provided in Section 4.505.6(E); until then the member's income less a prorated share and all resources are considered available to remaining household members. The case record must include the citizenship verification method and result.
rules:
  - name: citizenship_statement_questionable_due_to_inconsistency
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.505.51(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.505.51
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          citizenship_claim_inconsistent_with_client_statements
          or citizenship_claim_inconsistent_with_information_from_another_source

  - name: citizenship_questioning_discrimination_or_targeting_prohibited
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.505.51(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.505.51
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          eligibility_technician_applied_citizenship_questionable_criteria
          and (
              application_resulted_in_discrimination_based_on_race_religion_ethnic_background_or_national_origin
              or migrant_farm_workers_or_american_indians_targeted_for_special_verification
          )

  - name: foreign_seeming_traits_used_to_question_citizenship_prohibited
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.505.51(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.505.51
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          eligibility_technician_relied_on_surname_accent_or_appearance_that_seems_foreign_to_find_citizenship_claim_questionable

  - name: lack_of_english_ability_used_to_question_citizenship_prohibited
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.505.51(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.505.51
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          eligibility_technician_relied_on_lack_of_english_speaking_reading_or_writing_ability_to_question_citizenship_claim

  - name: citizenship_in_question_member_ineligible_until_proof_obtained
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.505.51(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.505.51
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          member_citizenship_is_in_question
          and not proof_of_citizenship_obtained
          and not exception_in_section_4_505_6_e_applies

  - name: citizenship_in_question_member_income_and_resources_available_to_remaining_household
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.505.51(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.505.51
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          member_citizenship_is_in_question
          and not proof_of_citizenship_obtained
          and member_income_less_prorated_share_considered_available_to_remaining_household_members
          and all_member_resources_considered_available_to_remaining_household_members

  - name: citizenship_verification_documentation_in_case_record
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.505.51(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.505.51
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          citizenship_verification_method_included_in_case_record
          and citizenship_verification_result_included_in_case_record
