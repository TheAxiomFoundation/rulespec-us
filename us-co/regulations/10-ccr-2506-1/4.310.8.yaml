format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.310.8
  summary: |-
    If the local office determines that an individual voluntarily quit or failed to accept suitable employment without good cause, the individual is ineligible to participate in SNAP and treated as a disqualified member. The first, second, and third or subsequent failures without good cause carry one-, three-, and six-month disqualification periods; the period begins the month following expiration of the Notice of Adverse Action unless a fair hearing is requested. Newly exempt level-sanction disqualified individuals may become eligible based on the stated application, reinstatement, or exemption-information date rules.
