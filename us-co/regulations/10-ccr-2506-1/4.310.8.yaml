        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.310.8
              excerpt: "The first (1st) time"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          1

