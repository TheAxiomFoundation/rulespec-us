format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.305.2
  summary: |-
    Section 4.305.2 applies sponsor-deeming rules only to non-citizens with legally binding affidavits of support executed on or after December 19, 1997. For an eligible sponsored non-citizen, sponsor and spouse income and resources are deemed as the non-citizen's unearned income and resources until citizenship, forty work quarters, or sponsor death, subject to stated exclusions, a 20% earned-income reduction, the SNAP gross income limit for the sponsor household, proration among sponsored non-citizens, and a $1,500 resource reduction. Verification must be provided at application and recertification; pending verification, the sponsored non-citizen is ineligible and remaining members are determined under disqualified-member treatment.
  deferred_outputs:
    - output: us-co:regulations/10-ccr-2506-1/4.305.2#local_office_acts_on_sponsor_change_as_reported_change
      reason: >-
        Sections 4.305.2(G) and (H) require the local office to act on information as a reported change in household circumstances under Section 4.604, but no copied RuleSpec context provides Section 4.604.
imports:
  - us:policies/usda/snap/fy-2026-cola/income-eligibility-standards#snap_gross_income_limit_130_percent_fpl_48_states_dc
rules:
  - name: sponsor_earned_income_disregard_rate
    kind: parameter
    dtype: Rate
    source: 10 CCR 2506-1 section 4.305.2(D)(2)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.305.2
              excerpt: "Reduced by an amount equal to twenty percent (20%) of the earned income"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          0.20

  - name: sponsor_resource_disregard_amount
    kind: parameter
    dtype: Money
    unit: USD
