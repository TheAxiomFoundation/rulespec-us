    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.305.2
              excerpt: "forty (40) work quarters under Title II of the Social Security Act"
    versions:
