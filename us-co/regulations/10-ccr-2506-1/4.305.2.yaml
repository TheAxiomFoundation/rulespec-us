          or sponsored_by_organization_or_group
          or non_citizen_not_required_to_have_sponsor_under_ina
          or indigent_non_citizen
          or battered_non_citizen_sponsorship_exemption_applies
          or sponsored_non_citizen_has_obtained_citizenship
          or sponsor_has_died
          or credited_work_quarters_under_title_ii >= qualifying_work_quarter_threshold

  - name: indigent_non_citizen
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.305.2(E)(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.305.2
          - path: versions[0].formula
            kind: import
            import:
              target: us:policies/usda/snap/fy-2026-cola/income-eligibility-standards#snap_gross_income_limit_130_percent_fpl_48_states_dc
              output: snap_gross_income_limit_130_percent_fpl_48_states_dc
              hash: sha256:94d8f5eaefa63fd65fc5f4d19ee1ff5c4dd07d26189e29007bc914218bd5c3a4
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          eligible_sponsored_non_citizen_household_own_income_plus_cash_and_in_kind_assistance <= snap_gross_income_limit_130_percent_fpl_48_states_dc
          and not receiving_in_kind_benefits_exceeding_gross_income_level_for_household_size

  - name: sponsor_deeming_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.305.2(A), (C), (D), (E)
    metadata:
