            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.305.2
              excerpt: "reduced by one thousand five hundred dollars ($1,500)"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          1500

  - name: qualifying_work_quarter_threshold
