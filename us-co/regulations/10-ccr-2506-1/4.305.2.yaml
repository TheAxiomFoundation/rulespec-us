          and non_citizen_lawfully_admitted_for_permanent_residence
          and non_citizen_is_eligible_non_citizen
          and not sponsor_deeming_exception_applies

  - name: sponsor_deemed_unearned_income
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.305.2(C), (D)(2), (D)(3), (D)(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.305.2
          - path: versions[0].formula
            kind: import
            import:
              target: us:policies/usda/snap/fy-2026-cola/income-eligibility-standards#snap_gross_income_limit_130_percent_fpl_48_states_dc
              output: snap_gross_income_limit_130_percent_fpl_48_states_dc
              hash: sha256:94d8f5eaefa63fd65fc5f4d19ee1ff5c4dd07d26189e29007bc914218bd5c3a4
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if sponsor_deeming_applies:
              max(0, (
                  sponsor_and_spouse_monthly_earned_income
                  + sponsor_and_spouse_monthly_unearned_income
                  - (sponsor_earned_income_disregard_rate * sponsor_and_spouse_monthly_earned_income)
                  - snap_gross_income_limit_130_percent_fpl_48_states_dc
              ) / max(number_of_non_citizens_sponsored_by_same_sponsor, 1))
              + max(0, actual_money_paid_by_sponsor_and_spouse_to_non_citizen - max(0, (
                  sponsor_and_spouse_monthly_earned_income
                  + sponsor_and_spouse_monthly_unearned_income
                  - (sponsor_earned_income_disregard_rate * sponsor_and_spouse_monthly_earned_income)
                  - snap_gross_income_limit_130_percent_fpl_48_states_dc
              ) / max(number_of_non_citizens_sponsored_by_same_sponsor, 1)))
          else: 0

