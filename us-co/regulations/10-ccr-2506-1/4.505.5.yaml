format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.505.5
  summary: |-
    If questionable, U.S. citizenship may be verified by listed documents or COVIS information. If those forms cannot be obtained and the household gives a reasonable explanation, the local office shall accept a signed third-party statement with personal knowledge, a penalty-of-perjury declaration, and a fraud-penalty warning.
rules:
  - name: questionable_us_citizenship_verified_by_primary_source
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.505.5(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.505.5
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          citizenship_is_questionable
          and (
              person_has_us_birth_certificate
              or person_possesses_us_passport
              or person_has_certificate_of_us_citizenship
              or person_has_certificate_of_naturalization
              or person_has_certificate_of_birth_abroad_as_us_citizen
              or person_has_identification_card_for_us_citizens
              or citizenship_information_obtained_through_covis
          )

  - name: third_party_statement_accepted_for_us_citizenship_verification
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.505.5(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.505.5
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          citizenship_is_questionable
          and primary_citizenship_verification_forms_cannot_be_obtained
          and household_provided_reasonable_explanation_verification_not_available
          and third_party_signed_statement_provided
          and third_party_has_personal_knowledge_of_person_status
          and third_party_declares_under_penalty_of_perjury_person_is_us_citizen
          and signed_statement_contains_warning_of_fraud_penalties

  - name: questionable_us_citizenship_verification_acceptable
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.505.5(A)-(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.505.5#questionable_us_citizenship_verified_by_primary_source
              output: questionable_us_citizenship_verified_by_primary_source
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.505.5#third_party_statement_accepted_for_us_citizenship_verification
              output: third_party_statement_accepted_for_us_citizenship_verification
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          questionable_us_citizenship_verified_by_primary_source
          or third_party_statement_accepted_for_us_citizenship_verification
