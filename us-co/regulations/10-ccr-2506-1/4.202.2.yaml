format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.202.2
  summary: |-
    Ineligibility of certain individuals does not prohibit remaining household members from applying for and receiving SNAP. Ineligible individuals are not eligible household members, but their income and resources are considered. If all eligible members are unemancipated minors and the only adult is ineligible, that ineligible individual may apply for the minors without applying for themself; if any eligible adult is present, that eligible adult should file as head of household.
rules:
  - name: remaining_members_snap_application_and_receipt_not_barred_by_ineligible_individual
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.202.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.202.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_has_certain_ineligible_individual
          and remaining_household_members_apply_for_snap_or_receive_snap

  - name: ineligible_individual_excluded_from_eligible_household_members
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.202.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.202.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          individual_is_ineligible_for_snap
          and individual_lives_in_applicant_household

  - name: ineligible_individual_income_and_resources_counted
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.202.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.202.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          individual_is_ineligible_for_snap
          and individual_lives_in_applicant_household
          and individual_income_and_resources_considered_in_household_eligibility_determination_and_benefit_allotment

  - name: ineligible_only_adult_may_apply_for_eligible_unemancipated_minors_without_self_application
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.202.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.202.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          eligible_household_members_are_all_unemancipated_minors
          and only_adult_in_household_is_ineligible_individual
          and ineligible_individual_applies_on_behalf_of_eligible_minors
          and not ineligible_individual_considered_to_have_applied_for_self

  - name: eligible_adult_should_file_as_head_of_household
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.202.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.202.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_has_any_other_eligible_adult
          and eligible_adult_files_application_as_head_of_household
