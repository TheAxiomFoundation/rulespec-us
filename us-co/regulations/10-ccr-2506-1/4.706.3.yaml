format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.706.3
  summary: |-
    Households cannot receive replacement SNAP benefits reported stolen and used from the EBT card without the household's knowledge and consent. An EBT card received by a household and later mutilated or found improperly manufactured shall be replaced.
rules:
  - name: stolen_and_used_ebt_snap_benefits_replacement_allotment_prohibited
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.706.3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.706.3
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          snap_benefits_reported_stolen_from_ebt_card
          and snap_benefits_used_from_ebt_card_by_someone_without_household_knowledge_and_consent

  - name: ebt_card_replacement_required_after_mutilation_or_improper_manufacture
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.706.3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.706.3
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_received_ebt_card
          and (
              ebt_card_subsequently_mutilated
              or ebt_card_found_to_be_improperly_manufactured
          )
