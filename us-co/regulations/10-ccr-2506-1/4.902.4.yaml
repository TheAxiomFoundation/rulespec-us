format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.902.4
  summary: |-
    Local offices shall establish a documented method to review a random sample of current SNAP determinations for correctness, keep a record of reviewed cases for management evaluation/audit purposes, demonstrate to the State Department that review frequency and scope are adequate to ensure program and client integrity, and demonstrate a consistent process for tracking error trends, timely correcting case records, and improving eligibility technicians' program knowledge.
rules:
  - name: documented_random_sample_review_method_established
    kind: derived
    entity: LocalOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.902.4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.902.4
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          local_office_has_documented_method_to_review_random_sample_of_current_snap_certifications_denials_and_terminations_for_correctness
