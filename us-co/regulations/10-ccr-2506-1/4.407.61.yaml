format: rulespec/v1
module:
  summary: |-
    Colorado's SNAP rule manual sets a Standard Medical Expense Deduction
    (SMED) of 165 dollars beginning October 1, 2016. The SMED is used when the
    excess medical expense calculated under 10 CCR 2506-1 section 4.407.6 is
    greater than zero and less than or equal to the SMED. A household may claim
    actual expenses when verified expenses after deducting the first 35 dollars
    exceed the SMED.
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.407.61
imports:
  - us-co:regulations/10-ccr-2506-1/4.407.6
rules:
  - name: snap_state_sme_flat_amount
    kind: parameter
    dtype: Money
    unit: USD
    source: 10 CCR 2506-1 section 4.407.61
    versions:
      - effective_from: '2016-10-01'
        formula: '165'
  - name: medical_deduction
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.407.61
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          if medical_excess > snap_state_sme_flat_amount:
              medical_excess
          else:
              if medical_excess > 0:
                  snap_state_sme_flat_amount
              else: 0
