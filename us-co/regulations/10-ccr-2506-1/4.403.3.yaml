format: rulespec/v1
module:
  summary: |-
    Colorado's SNAP rule manual averages income for teachers and other school
    employees who receive non-hourly and non-piecework income from renewable
    annual contracts. The income is treated as compensation for an entire year
    even if there are predictable non-work periods, and annual contract income
    is averaged over 12 months. Other monthly household income is added to the
    school employee's average monthly contract income to determine household
    eligibility.
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.403.3
rules:
  - name: snap_school_employee_contract_income_subject_to_annual_averaging
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.403.3(A)-(C)
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          school_employee
          and employment_contract_renewable_on_annual_basis
          and not school_contract_income_hourly_or_piecework
  - name: snap_school_employee_average_monthly_contract_income
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.403.3(D)
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if snap_school_employee_contract_income_subject_to_annual_averaging:
              school_employee_annual_contract_income / 12
          else: 0
  - name: snap_household_income_with_school_employee_contract_income
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.403.3(D)
    versions:
      - effective_from: '2025-10-01'
        formula: household_other_monthly_income + household_school_employee_average_monthly_contract_income
