    period: Month
    source: 10 CCR 2506-1 section 4.802.2(A)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.802.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          individual_illness_precluded_timely_appeal
          or illness_of_another_household_member_required_presence_and_precluded_timely_appeal
          or household_emergency_precluded_timely_appeal
          or transportation_unavailability_precluded_timely_appeal
          or other_circumstances_precluded_required_action

  - name: late_appeal_reinstatement_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.802.2(A)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
