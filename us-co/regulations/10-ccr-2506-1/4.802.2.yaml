format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.802.2
  summary: |-
    Eligibility for continuation of benefits: if a household requests a state-level fair hearing or local-level dispute resolution conference before the effective date of the Notice of Adverse Action and the certification period has not expired, participation shall continue on the basis authorized immediately before the notice unless waived. If the required advance notice period plus mailing time was not given, the household has ten calendar days after mailing to appeal and receive continued benefits unless waived. Late appeals may lead to reinstatement when failure was due to circumstances beyond the individual's control. Recertification-process appeals are not eligible for continued benefits; mass-change reinstatement is limited to improper computation or misapplication/misinterpretation issues.
rules:
  - name: adverse_action_advance_notice_days
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.802.2(A)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.802.2
              excerpt: ten (10) day advance notice period
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          10

  - name: adverse_action_standard_mailing_days
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.802.2(A)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.802.2
              excerpt: one (1) additional calendar day for mailing time
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          1

  - name: adverse_action_acp_mailing_days
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.802.2(A)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.802.2
              excerpt: five (5) additional calendar days for mailing for households participating in the address confidentiality program (ACP)
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          5

  - name: deficient_notice_appeal_days_after_mailing
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.802.2(A)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.802.2
              excerpt: ten (10) calendar days after the date the notice is mailed
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          10

  - name: required_advance_notice_period_days
    kind: derived
    entity: Household
    dtype: Count
    period: Month
    source: 10 CCR 2506-1 section 4.802.2(A)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.802.2
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.802.2#adverse_action_advance_notice_days
              output: adverse_action_advance_notice_days
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.802.2#adverse_action_standard_mailing_days
              output: adverse_action_standard_mailing_days
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.802.2#adverse_action_acp_mailing_days
              output: adverse_action_acp_mailing_days
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          adverse_action_advance_notice_days
          + (if household_participates_in_address_confidentiality_program:
              adverse_action_acp_mailing_days
          else:
              adverse_action_standard_mailing_days)

  - name: continuation_of_benefits_assumed_desired
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.802.2(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: default
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.802.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          not appeal_request_positively_indicates_waiver_of_continuation

  - name: standard_timely_appeal_continuation_eligible
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.802.2(A)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.802.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_requested_state_fair_hearing_or_local_dispute_resolution_before_notice_effective_date
          and household_certification_period_has_not_expired
          and continuation_of_benefits_assumed_desired
          and not household_appeals_decision_based_on_information_reported_as_part_of_recertification_process

  - name: deficient_notice_continuation_eligible
    kind: derived
