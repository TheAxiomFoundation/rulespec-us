          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.802.2#late_appeal_failure_beyond_control
              output: late_appeal_failure_beyond_control
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          appeal_request_not_made_within_required_time
          and household_established_failure_was_for_circumstances_beyond_individual_control
          and late_appeal_failure_beyond_control
          and continuation_of_benefits_assumed_desired
          and not household_appeals_decision_based_on_information_reported_as_part_of_recertification_process

