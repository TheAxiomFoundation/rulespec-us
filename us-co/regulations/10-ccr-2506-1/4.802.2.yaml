            kind: condition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.802.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_was_not_given_required_advance_notice_period_plus_mailing_time
          and household_appealed_within_deficient_notice_appeal_period_after_notice_mailed
          and household_certification_period_has_not_expired
          and continuation_of_benefits_assumed_desired
          and not household_appeals_decision_based_on_information_reported_as_part_of_recertification_process

  - name: late_appeal_failure_beyond_control
    kind: derived
    entity: Household
