format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.209.1
  summary: |-
    Households reapply timely for recertification by filing on or before the fifteenth day of the last certification month; timely applications must be approved or denied before the current period ends and eligible households must have an opportunity for normal issuance. Untimely applications filed from the sixteenth through the last day require notice within thirty calendar days. Applications filed within thirty calendar days after expiration are processed as recertifications with prorated initial-month allotments unless the local office caused the delay. Cases denied for failure to take required action are reopened if action is completed by the certification-period end, or within the next thirty calendar days with benefits retroactive to the action date. After the fifteenth day, specified failures cause loss of uninterrupted benefits; verification requests must allow at least ten days, benefits must be provided within thirty days or within five days after missing verification when delay is due to verification time, and refusal to cooperate results in denial.
  deferred_outputs:
    - output: us-co:regulations/10-ccr-2506-1/4.209.1#late_recertification_verification_requirements_consistent_with_section_4_502_b
      reason: >-
        The source requires verification requirements for applications received within thirty calendar days after certification-period expiration to remain consistent with Section 4.502(B), but no copied RuleSpec context provides Section 4.502(B).
