format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.203.3
  summary: |-
    The household may designate an emergency authorized representative during the certification period if the need arises. The emergency authorized representative obtains the EBT Card when neither a household member nor the previously designated authorized representative is able to obtain it because of unforeseen circumstances. The designation must be in writing by the head of household, spouse, or other responsible household member. Local offices must develop a system for month-specific emergency-authorized-representative designations, and households must not be required to travel to a local office to designate one.
rules:
  - name: emergency_authorized_representative_designation_valid
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.203.3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.203.3
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          emergency_authorized_representative_designated_during_certification_period
          and need_for_emergency_authorized_representative_arose
          and neither_household_member_nor_previously_designated_authorized_representative_able_to_obtain_ebt_card
          and inability_to_obtain_ebt_card_due_to_unforeseen_circumstances
          and emergency_authorized_representative_designated_in_writing
          and designation_made_by_head_of_household_spouse_or_other_responsible_household_member

  - name: local_office_emergency_authorized_representative_designation_system_provided
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.203.3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.203.3
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          local_office_developed_system_for_household_to_designate_emergency_authorized_representative
          and system_allows_designation_to_obtain_household_benefits_for_particular_month
          and not household_required_to_travel_to_local_office_to_designate_emergency_authorized_representative
