module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.802.21
  summary: The household has the right to appeal through the fair hearing process
    if it disagrees with any action taken to grant or restore lost benefits. If the
    local office determined restoration entitlement but the household appeals calculation
    or restoration, the household receives the local-office-determined lost benefits
    pending hearing results, and the local office shall comply with the final agency
    decision. Restored-benefit eligibility requires SNAP benefits wrongfully delayed,
    denied, or terminated; denial includes certification-office error causing net
    income to be larger than properly determined and preventing the full eligible
    allotment; delay means eligibility determination was not accomplished within Section
    4.205.2 time limits.
  deferred_outputs:
  - output: us-co:regulations/10-ccr-2506-1/4.802.21#household_eligible_for_restored_benefits
    reason: Generated rule used a local name that collides with a sibling RuleSpec
      export. This output is deferred until it can be encoded with a semantic branch-specific
      name without creating ambiguous sibling imports.
