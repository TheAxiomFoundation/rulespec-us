format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.505.4
  summary: |-
    Local offices shall accept the household's statement regarding household composition without verification unless questionable or unclear. Persons aged sixty and older experiencing the described disability who declare separate household status are responsible for requested income and medical statements when questionable. A household requesting benefits for a child already receiving benefits elsewhere must verify that it provides the child the majority of meals before receiving benefits for that child.
rules:
  - name: household_composition_statement_accepted_without_verification_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.505.4(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.505.4
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_made_statement_regarding_household_composition
          and local_office_accepted_household_composition_statement
          and local_office_did_not_require_household_composition_verification
          and not household_composition_statement_is_questionable
          and not household_composition_information_is_unclear

  - name: separate_household_status_requested_information_responsibility_satisfied
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.505.4(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.505.4
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.505.4
              excerpt: "Persons aged sixty (60) and older experiencing a disability"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not person_aged_sixty_or_older_experiencing_disability_declares_separate_household_status)
          or (
              not separate_household_status_information_questionable
          )
          or (
              not local_office_requested_income_information_and_medical_statements
          )
          or (
              person_provided_necessary_income_information_of_other_household_members
              and person_provided_medical_statements_cannot_purchase_and_prepare_own_meals
          )

  - name: child_majority_meals_verification_completed_before_benefits
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.505.4(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.505.4
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not household_requests_benefits_for_child_already_receiving_benefits_in_another_household)
          or (
              household_verified_provides_child_majority_of_meals
              and verification_completed_before_receiving_benefits_for_child
          )
