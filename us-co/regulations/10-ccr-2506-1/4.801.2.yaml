format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.2
  summary: Local offices shall establish SNAP claims only above specified AE/IHE thresholds
    or when quality-control or IPV-pursuit circumstances apply; AE/IHE claims may
    not cover more than 12 months, IPV claims may not cover more than six years, trafficking
    claims shall be established, and claims are established against adult household
    members and connected persons who traffic benefits or cause over-issuance.
  deferred_outputs:
  - output: us-co:regulations/10-ccr-2506-1/4.801.2#snap_trafficking_definition
    reason: The source states that trafficking has the same meaning as described in
      26-2-306, C.R.S. and 7 C.F.R. 271.2 as incorporated by section 4.000.1, but
      no copied RuleSpec context provides section 4.000.1 or the cited incorporated
      definition. Executable claim rules therefore use source-stated factual predicates
      for trafficked benefits or connected-person trafficking without re-encoding
      the unavailable definition.
rules:
- name: participating_household_ae_ihe_claim_amount_threshold
  kind: parameter
  dtype: Money
  unit: USD
  source: 10 CCR 2506-1 section 4.801.2(A)(1)(a)(1)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.2
          excerpt: When the amount of the claim is greater than $200
  versions:
  - effective_from: '2025-10-01'
    formula: '200'
- name: nonparticipating_household_ae_claim_amount_threshold
  kind: parameter
  dtype: Money
  unit: USD
  source: 10 CCR 2506-1 section 4.801.2(A)(1)(b)(1)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.2
          excerpt: When the amount of the AE claim is greater than $400
  versions:
  - effective_from: '2025-10-01'
    formula: '400'
- name: nonparticipating_household_ihe_claim_amount_threshold
  kind: parameter
  dtype: Money
  unit: USD
  source: 10 CCR 2506-1 section 4.801.2(A)(1)(b)(2)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.2
          excerpt: due to an IHE and is greater than $200
  versions:
  - effective_from: '2025-10-01'
    formula: '200'
- name: ae_ihe_claim_month_limit
  kind: parameter
  dtype: Count
  source: 10 CCR 2506-1 section 4.801.2(A)(2)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.2
          excerpt: An AE or IHE claim shall not be established for a period of more
            than twelve (12) months
  versions:
  - effective_from: '2025-10-01'
    formula: '12'
- name: ipv_claim_year_limit
  kind: parameter
  dtype: Count
  source: 10 CCR 2506-1 section 4.801.2(A)(2)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.2
          excerpt: cannot be established for a period more than six (6) years
  versions:
  - effective_from: '2025-10-01'
    formula: '6'
- name: adult_household_member_age_threshold_for_claim_liability
  kind: parameter
  dtype: Count
  source: 10 CCR 2506-1 section 4.801.2(A)(4)(a)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.2
          excerpt: All adult household members aged eighteen (18) years of age or
            older
  versions:
  - effective_from: '2025-10-01'
    formula: '18'
- name: claim_within_allowable_lookback
  kind: derived
  entity: SnapOverissuanceClaim
  dtype: Judgment
  period: Month
  source: 10 CCR 2506-1 section 4.801.2(A)(2)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.2
      - path: versions[0].formula
        kind: import
        import:
          target: us-co:regulations/10-ccr-2506-1/4.801.2#ae_ihe_claim_month_limit
          output: ae_ihe_claim_month_limit
          hash: sha256:local
      - path: versions[0].formula
        kind: import
        import:
          target: us-co:regulations/10-ccr-2506-1/4.801.2#ipv_claim_year_limit
          output: ipv_claim_year_limit
          hash: sha256:local
  versions:
  - effective_from: '2025-10-01'
    formula: "((claim_associated_with_intentional_program_violation) and claim_period_years\
      \ <= ipv_claim_year_limit)\n  or (not (claim_associated_with_intentional_program_violation)\
      \ and claim_period_months <= ae_ihe_claim_month_limit)"
- name: snap_claim_establishment_required
  kind: derived
  entity: SnapOverissuanceClaim
  dtype: Judgment
  period: Month
  source: 10 CCR 2506-1 section 4.801.2(A)(1), 4.801.2(A)(2), and 4.801.2(A)(3)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.2
      - path: versions[0].formula
        kind: import
        import:
          target: us-co:regulations/10-ccr-2506-1/4.801.2#participating_household_ae_ihe_claim_amount_threshold
          output: participating_household_ae_ihe_claim_amount_threshold
          hash: sha256:local
      - path: versions[0].formula
        kind: import
        import:
          target: us-co:regulations/10-ccr-2506-1/4.801.2#nonparticipating_household_ae_claim_amount_threshold
          output: nonparticipating_household_ae_claim_amount_threshold
          hash: sha256:local
      - path: versions[0].formula
        kind: import
        import:
          target: us-co:regulations/10-ccr-2506-1/4.801.2#nonparticipating_household_ihe_claim_amount_threshold
          output: nonparticipating_household_ihe_claim_amount_threshold
          hash: sha256:local
      - path: versions[0].formula
        kind: import
        import:
          target: us-co:regulations/10-ccr-2506-1/4.801.2#claim_within_allowable_lookback
          output: claim_within_allowable_lookback
          hash: sha256:local
  versions:
  - effective_from: '2025-10-01'
    formula: "benefits_were_trafficked\nor (\n    claim_within_allowable_lookback\n\
      \    and (\n        (\n            household_participating_in_snap\n       \
      \     and (claim_due_to_administrative_error or claim_due_to_inadvertent_household_error)\n\
      \            and (\n                claim_amount > participating_household_ae_ihe_claim_amount_threshold\n\
      \                or overissuance_identified_through_federal_or_state_quality_control_review\n\
      \                or (claim_due_to_inadvertent_household_error and ihe_claim_being_pursued_as_intentional_program_violation)\n\
      \            )\n        )\n        or (\n            not household_participating_in_snap\n\
      \            and (\n                (claim_due_to_administrative_error and claim_amount\
      \ > nonparticipating_household_ae_claim_amount_threshold)\n                or\
      \ (claim_due_to_inadvertent_household_error and claim_amount > nonparticipating_household_ihe_claim_amount_threshold)\n\
      \                or overissuance_identified_through_federal_or_state_quality_control_review\n\
      \                or (claim_due_to_inadvertent_household_error and ihe_claim_being_pursued_as_intentional_program_violation)\n\
      \            )\n        )\n    )\n)"
- name: ihe_ipv_collection_pursued_allowed
  kind: derived
  entity: SnapOverissuanceClaim
  dtype: Judgment
  period: Month
  source: 10 CCR 2506-1 section 4.801.2(A)(1)(a)(3) and 4.801.2(A)(1)(b)(4)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.2
          excerpt: if the IHE claim does not result in an IPV, collection shall not
            be pursued
  versions:
  - effective_from: '2025-10-01'
    formula: "not (\n    claim_due_to_inadvertent_household_error\n    and ihe_claim_being_pursued_as_intentional_program_violation\n\
      \    and not ihe_claim_resulted_in_intentional_program_violation\n)"
- name: person_subject_to_snap_claim
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: 10 CCR 2506-1 section 4.801.2(A)(4)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.2
      - path: versions[0].formula
        kind: import
        import:
          target: us-co:regulations/10-ccr-2506-1/4.801.2#adult_household_member_age_threshold_for_claim_liability
          output: adult_household_member_age_threshold_for_claim_liability
          hash: sha256:local
  versions:
  - effective_from: '2025-10-01'
    formula: "(\n    person_was_household_member_at_time_overissuance_occurred\n \
      \   and person_age_at_time_overissuance_occurred >= adult_household_member_age_threshold_for_claim_liability\n\
      )\nor (\n    person_connected_to_household\n    and (person_trafficked_snap_benefits\
      \ or person_otherwise_caused_overissuance)\n)"
