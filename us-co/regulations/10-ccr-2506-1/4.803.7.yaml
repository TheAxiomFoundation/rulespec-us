format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.803.7
  summary: |-
    Once the local-level hearing decision or a final state-level decision has been made, written notice, prior to disqualification, will be provided to the household member, to the local office, and to the state department containing: the decision; the reason for the decision including pertinent regulations and a response to client presented arguments; the disqualification period, including the date the disqualification will take effect; specified hearing or judicial-review information for local-level and state-level administrative hearings.
rules:
  - name: disqualification_written_notice_contents_satisfied
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: 10 CCR 2506-1 4.803.7
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.803.7
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.803.7
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          local_level_hearing_decision_or_final_state_level_decision_has_been_made
          and written_notice_provided_prior_to_disqualification_to_household_member_local_office_and_state_department
          and notice_contains_the_decision
          and notice_contains_reason_for_decision_including_pertinent_regulations_and_response_to_client_arguments
          and notice_contains_disqualification_period_including_effective_date
          and (
            not decision_is_local_level_hearing_decision
            or notice_states_local_level_disqualification_takes_effect_unless_state_level_hearing_requested
          )
          and (
            not individual_is_no_longer_participating
            or notice_informs_nonparticipating_individual_of_effective_disqualification_timing
          )
          and (
            not local_level_administrative_hearing_household_member_not_satisfied_with_decision
            or notice_states_household_member_may_request_hearing_through_office_of_administrative_courts
          )
          and (
            not state_level_administrative_hearing_household_member_not_satisfied_with_final_state_agency_decision
            or notice_states_household_member_may_seek_judicial_review
          )
