format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.205.11
  summary: |-
    Households requesting, but not entitled to, expedited service are processed under normal standards. Before expedited certification, identity must be verified and reasonable efforts made to verify residency, income or lack thereof, and other eligibility factors; verification may be postponed when needed to meet expedited standards. Postponed-verification cases receive limited initial expedited benefits, verification-request notices, later-month issuance within five working days or the applicable first day, termination after thirty calendar days without adverse-action notice except for migrant out-of-state verification, and migrant out-of-state postponement only once per season. Repeat expedited certification is allowed only after completing prior postponed verification or after normal processing since the last expedited certification.
rules:
  - name: application_after_fifteenth_day_threshold
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.205.11(B)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.205.11
              excerpt: "applying after the fifteenth (15th) of the month"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          15

  - name: postponed_verification_later_month_issuance_working_day_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.205.11(B)(2)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.205.11
              excerpt: "within five working days from receipt of the verification"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          5

  - name: postponed_verification_completion_calendar_day_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.205.11(B)(2)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.205.11
              excerpt: "within thirty (30) calendar days from the date of application"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          30

  - name: migrant_out_of_state_verification_postponement_season_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.205.11(B)(2)(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.205.11
              excerpt: "only once each season"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          1

  - name: non_entitled_expedited_request_processed_normally
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.205.11(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.205.11
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_requested_expedited_service
          and not household_entitled_to_expedited_service
          and application_processed_according_to_normal_processing_standards

  - name: expedited_applicant_identity_verified_before_certification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.205.11(B)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.205.11
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          expedited_certification_requested_or_processed
          and applicant_identity_verified_prior_to_certification

  - name: expedited_eligibility_verification_efforts_or_postponement_completed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.205.11(B)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.205.11
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          expedited_certification_requested_or_processed
          and reasonable_efforts_made_to_verify_residency_income_or_lack_thereof_and_other_eligibility_factors
          and (
              verification_obtained_in_time_to_meet_expedited_processing_standards
              or verification_postponed_because_not_obtainable_in_time_to_meet_expedited_processing_standards
          )

  - name: postponed_verification_initial_expedited_benefit_period_limited
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.205.11(B)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.205.11
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.205.11#application_after_fifteenth_day_threshold
              output: application_after_fifteenth_day_threshold
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          verification_postponed_because_not_obtainable_in_time_to_meet_expedited_processing_standards
          and household_determined_eligible_for_expedited_benefits
          and (
              (
                  application_day_of_month <= application_after_fifteenth_day_threshold
                  and household_certified_for_expedited_benefits_for_month_of_application
              )
              or (
                  application_day_of_month > application_after_fifteenth_day_threshold
                  and household_certified_for_expedited_benefits_for_month_of_application
                  and household_certified_for_expedited_benefits_for_subsequent_month
              )
          )

  - name: postponed_verification_request_form_annotated_for_further_benefits
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.205.11(B)(2)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.205.11
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.205.11#application_after_fifteenth_day_threshold
              output: application_after_fifteenth_day_threshold
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_certified_for_expedited_benefits_for_month_of_application
          and household_certified_for_expedited_benefits_for_subsequent_month
          and verification_postponed_because_not_obtainable_in_time_to_meet_expedited_processing_standards
          and not (
              household_is_migrant_household
              and application_day_of_month > application_after_fifteenth_day_threshold
          )
          and request_for_verification_form_annotated_to_indicate_verification_required_for_further_benefits

  - name: postponed_verification_second_month_benefits_issued_timely
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.205.11(B)(2)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.205.11
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.205.11#application_after_fifteenth_day_threshold
              output: application_after_fifteenth_day_threshold
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.205.11#postponed_verification_later_month_issuance_working_day_limit
              output: postponed_verification_later_month_issuance_working_day_limit
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          application_day_of_month <= application_after_fifteenth_day_threshold
          and household_provided_required_postponed_verification
          and second_month_benefits_issued
          and (
              working_days_from_receipt_of_postponed_verification_to_second_month_issuance <= postponed_verification_later_month_issuance_working_day_limit
              or second_month_benefits_issued_on_first_of_second_month_because_later
          )

  - name: postponed_verification_third_month_benefits_issued_timely
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.205.11(B)(2)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.205.11
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.205.11#application_after_fifteenth_day_threshold
              output: application_after_fifteenth_day_threshold
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.205.11#postponed_verification_later_month_issuance_working_day_limit
              output: postponed_verification_later_month_issuance_working_day_limit
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          application_day_of_month > application_after_fifteenth_day_threshold
          and household_provided_required_postponed_verification
          and third_month_benefits_issued
          and (
              working_days_from_receipt_of_postponed_verification_to_third_month_issuance <= postponed_verification_later_month_issuance_working_day_limit
              or third_month_benefits_issued_on_first_of_third_month_because_later
          )

  - name: postponed_verification_noncompletion_termination_without_adverse_action_notice
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.205.11(B)(2)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.205.11
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.205.11#postponed_verification_completion_calendar_day_limit
              output: postponed_verification_completion_calendar_day_limit
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          not migrant_household_needing_out_of_state_verification
          and not postponed_verification_completed
          and calendar_days_from_application_date >= postponed_verification_completion_calendar_day_limit
          and household_participation_terminated_on_thirtieth_calendar_day
          and not notice_of_adverse_action_provided

  - name: migrant_out_of_state_verification_postponement_within_season_limit
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.205.11(B)(2)(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.205.11
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.205.11#migrant_out_of_state_verification_postponement_season_limit
              output: migrant_out_of_state_verification_postponement_season_limit
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_is_migrant_household
          and household_requests_expedited_service
          and out_of_state_verification_postponement_count_this_season <= migrant_out_of_state_verification_postponement_season_limit
          and (
              out_of_state_verification_postponement_count_this_season < migrant_out_of_state_verification_postponement_season_limit
              or out_of_state_verification_postponed_only_for_initial_month_issuance
          )

  - name: migrant_after_fifteenth_long_certification_verification_notice_provided
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.205.11(B)(2)(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.205.11
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.205.11#application_after_fifteenth_day_threshold
              output: application_after_fifteenth_day_threshold
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_is_migrant_household
          and household_eligible_for_expedited_service
          and application_day_of_month > application_after_fifteenth_day_threshold
          and certification_period_longer_than_one_month
          and request_for_verification_notifies_in_state_postponed_verification_required_before_second_month_benefits
          and request_for_verification_notifies_out_of_state_verification_required_before_third_month_benefits
          and notice_advises_changes_from_verification_acted_on_without_advance_notice_of_adverse_action

  - name: repeat_expedited_certification_allowed_after_prior_verification_or_normal_processing
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.205.11(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.205.11
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_seeks_expedited_certification
          and (
              verification_requirements_postponed_at_last_expedited_certification_completed_before_current_expedited_certification
              or household_certified_under_normal_processing_standards_since_last_expedited_certification
          )
