format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.311.1
  summary: |-
    Any individual who meets the definition of an ABAWD can be exempt from the ABAWD work requirement by meeting one of the listed exemptions: general work requirements exemption, pregnancy, homelessness, veteran status, aged twenty-four years and younger and in foster care on the eighteenth birthday, USDA FNS waiver, or Colorado-defined state exemptions in the current SNAP Employment and Training State Plan.
rules:
  - name: abawd_work_requirement_exemption_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.311.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.311.1
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          individual_meets_definition_of_abawd
          and (
              individual_exempt_from_general_work_requirements
              or individual_is_pregnant
              or person_experiencing_homelessness_as_defined_in_section_4_000_1
              or individual_is_veteran
              or (
                  individual_aged_twenty_four_years_or_younger
                  and individual_was_in_foster_care_on_eighteenth_birthday
              )
              or individual_exempt_under_usda_fns_approved_waiver
              or individual_exempt_under_colorado_state_exemptions_in_current_snap_employment_and_training_state_plan
          )
