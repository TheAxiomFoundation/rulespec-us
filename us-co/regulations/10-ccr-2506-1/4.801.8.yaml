format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.8
  summary: |-
    The FNS-209 Report is an automated quarterly report reflecting claim
    activities and payments during a quarter. SNAP benefits received as claim
    payments and payment corrections are handled through the automated system.
    The report is available for review from the first of the month immediately
    following the end of the quarter through the last working day of the
    quarter; a consolidated final report is available after that last working
    day. Local offices need not submit Form FS-209 if the automated-system
    report is accurate and complete for that local office.
rules:
  - name: fns_209_report_run_required_even_without_claim_activity
    kind: derived
    entity: StateAgency
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.801.8
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.8
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          fns_209_reporting_period_is_quarterly_cycle
          and not local_office_collected_payments_or_other_claims_activities

  - name: snap_claim_payment_recording_requirement_satisfied
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.801.8
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.8
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          not snap_benefits_received_as_claim_payment
          or claim_payment_recorded_in_automated_system

  - name: claim_payment_correction_requirement_satisfied
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.801.8
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.8
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          not payment_correction_needed
          or payment_correction_made_through_automated_system

  - name: fns_209_report_available_for_review
    kind: derived
    entity: StateAgency
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.801.8
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.8
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          report_month_immediately_follows_end_of_quarter
          and review_date_is_on_or_after_first_of_month
          and review_date_is_on_or_before_last_working_day_of_quarter

  - name: fns_209_consolidated_final_report_available_to_print
    kind: derived
    entity: StateAgency
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.801.8
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.8
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          report_date_follows_last_working_day_of_quarter

  - name: local_office_fs_209_form_submission_not_required
    kind: derived
    entity: StateAgency
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.801.8
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.8
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          automated_system_fs_209_accurate_for_local_office
          and automated_system_fs_209_complete_for_local_office
