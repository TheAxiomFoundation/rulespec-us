format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.305.3
  summary: |-
    The local office shall immediately inform the local USCIS office whenever certification or recertification personnel determine that a household member is ineligible for SNAP because the member is present in the United States in violation of immigration laws. The determination must not be made merely from inability or unwillingness to provide non-citizen-status documentation; reporting is not permitted on mere suspicion or prejudice and requires firm evidence, including knowledge of a final outstanding deportation order. Failure to report is not a quality assurance error or administrative deficiency.
rules:
  - name: immigration_violation_final_deportation_order_appeal_period_days
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.305.3(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.305.3
              excerpt: "the relevant statutory appeal period of ten (10) days has expired"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          10

  - name: member_known_present_in_violation_of_immigration_laws
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.305.3(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.305.3
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.305.3#immigration_violation_final_deportation_order_appeal_period_days
              output: immigration_violation_final_deportation_order_appeal_period_days
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          person_is_non_citizen_found_in_united_states
          and person_has_outstanding_order_of_deportation
          and (
              deportation_order_not_subject_to_appeal_because_appeal_period_expired
              and deportation_order_appeal_period_days_since_order >= immigration_violation_final_deportation_order_appeal_period_days
              or deportation_order_not_subject_to_appeal_because_no_lawful_grounds_for_appeal
              or deportation_order_not_subject_to_appeal_because_administrative_and_judicial_appeals_exhausted
          )
          and not deportation_order_subject_to_review_under_limited_reopening_standards

  - name: immigration_violation_determination_based_only_on_documentation_refusal_prohibited
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.305.3(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.305.3
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          determination_person_present_in_violation_of_immigration_laws_made
          and person_indicates_inability_or_unwillingness_to_provide_non_citizen_status_documentation
          and not local_office_has_other_basis_for_immigration_violation_determination

  - name: documentation_efforts_limited_after_non_citizen_status_documentation_refusal
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.305.3(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.305.3
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_member_indicates_inability_or_unwillingness_to_provide_non_citizen_status_documentation
          and not local_office_continued_efforts_to_obtain_non_citizen_status_documentation
          and local_office_obtained_only_documentation_necessary_for_income_and_resources_available_to_remaining_members

  - name: ineligible_non_citizen_status_not_equivalent_to_immigration_violation
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.305.3(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.305.3
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          person_determined_ineligible_non_citizen_for_snap
          and not determination_person_present_in_violation_of_immigration_laws_made

  - name: immigration_violation_determination_reported_to_supervisor
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.305.3(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.305.3
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          eligibility_technician_able_to_determine_member_in_fact_present_in_violation_of_immigration_laws_based_on_snap_eligibility_review_information
          and eligibility_technician_reported_determination_to_supervisor

  - name: uscis_report_based_on_mere_suspicion_or_prejudice_prohibited
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.305.3(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.305.3
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          report_to_uscis_made
          and (
              report_to_uscis_based_on_mere_suspicion
              or report_to_uscis_based_on_prejudice
              or not firm_evidence_household_illegally_in_united_states
          )

  - name: uscis_report_written_if_made
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.305.3(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.305.3
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not report_to_uscis_made)
          or report_to_uscis_made_in_writing

  - name: local_office_uscis_notification_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.305.3(A), (D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.305.3
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          certification_or_recertification_personnel_determine_household_member_ineligible_for_snap_because_present_in_violation_of_immigration_laws
          and local_office_immediately_informed_local_uscis_office

  - name: failure_to_report_immigration_violation_not_quality_assurance_error_or_administrative_deficiency
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.305.3(E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.305.3
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          non_citizen_illegally_present_in_united_states_not_reported_to_uscis
          and not failure_to_report_assessed_as_quality_assurance_error
          and not failure_to_report_assessed_as_administrative_deficiency
