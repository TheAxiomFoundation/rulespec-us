format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.505.8
  summary: |-
    At application and when adding a new SNAP household member, the office verifies the national IPV/disqualification database for members aged eighteen or older, without delaying application processing while awaiting another state's verification. Colorado must not act on specified out-of-state disqualifications not pursued in Colorado; must independently verify unattested out-of-state IPVs before adverse action; gives states and local offices twenty calendar days to respond to IPV verification requests; provides advance notice and appeal opportunity for adverse action; and may reclaim benefits issued while awaiting verification if the individual was disqualified when issued.
rules:
  - name: adult_household_member_age_threshold
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.505.8
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.505.8
              excerpt: "household members aged eighteen (18) or older"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          18

  - name: other_state_ipv_verification_response_calendar_day_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.505.8(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.505.8
              excerpt: "States shall be given twenty (20) calendar days to respond"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          20

  - name: colorado_ipv_verification_response_calendar_day_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.505.8(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.505.8
              excerpt: "Local offices shall be given twenty (20) calendar days to respond"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          20

  - name: adult_member_national_ipv_database_verification_completed
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.505.8
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.505.8
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.505.8#adult_household_member_age_threshold
              output: adult_household_member_age_threshold
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_at_time_of_application_or_adding_new_member
          and household_member_age_years >= adult_household_member_age_threshold
          and office_verified_member_with_national_ipv_disqualification_database

  - name: out_of_state_disqualification_not_acted_upon_due_to_colorado_nonpursuit
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.505.8(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.505.8
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          active_out_of_state_disqualification_identified
          and (
              out_of_state_disqualification_due_to_drug_related_felony
              or out_of_state_disqualification_not_pursued_in_colorado_due_to_waiver_or_state_statute
          )
          and not local_office_acted_upon_out_of_state_disqualification

  - name: benefits_issued_while_awaiting_ipv_verification_reclaimable
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.505.8
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.505.8
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          local_office_issued_benefits_to_individual_while_awaiting_ipv_verification
          and individual_determined_disqualified_at_time_benefits_were_issued

  - name: application_processing_not_delayed_for_other_state_verification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.505.8
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.505.8
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          awaiting_verification_from_another_state
          and not application_processing_delayed_while_awaiting_verification_from_another_state

  - name: unattested_out_of_state_ipv_independently_verified_before_adverse_action
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.505.8(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.505.8
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          out_of_state_ipv_or_disqualification_identified
          and client_unable_to_attest_to_accuracy_of_disqualification
          and adverse_action_taken_against_household_snap_benefits
          and disqualification_independently_verified_with_originating_state_before_adverse_action

  - name: out_of_state_disqualification_not_acted_upon_when_verification_unavailable
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.505.8(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.505.8
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          verification_cannot_be_provided_by_other_state
          and not local_office_acted_upon_out_of_state_disqualification

  - name: other_state_given_ipv_verification_response_period
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.505.8(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.505.8
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.505.8#other_state_ipv_verification_response_calendar_day_limit
              output: other_state_ipv_verification_response_calendar_day_limit
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          request_for_verification_sent_to_other_state
          and calendar_days_given_to_other_state_to_respond >= other_state_ipv_verification_response_calendar_day_limit

  - name: colorado_ipv_verification_request_response_timely
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.505.8(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.505.8
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.505.8#colorado_ipv_verification_response_calendar_day_limit
              output: colorado_ipv_verification_response_calendar_day_limit
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          another_state_requested_verification_of_colorado_ipv
          and local_office_responded_to_colorado_ipv_verification_request
          and calendar_days_before_local_office_response_to_colorado_ipv_request <= colorado_ipv_verification_response_calendar_day_limit

  - name: unverified_colorado_ipv_removed_from_national_database
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.505.8(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.505.8
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          local_office_cannot_provide_verification_of_colorado_ipv
          and local_office_took_steps_to_remove_ipv_from_national_database

  - name: advance_notice_granted_before_verified_ipv_adverse_action
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.505.8(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.505.8
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          independent_verification_received
          and benefits_reduced_suspended_denied_or_terminated
          and advance_notice_of_adverse_action_granted_before_benefit_action

  - name: disqualified_individual_adverse_action_appeal_opportunity_provided
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.505.8(E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.505.8
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          adverse_action_taken_against_disqualified_individual
          and disqualified_individual_provided_opportunity_to_appeal_adverse_action
