format: rulespec/v1
module:
  summary: |-
    Colorado's SNAP rule manual allows an excess medical deduction for monthly
    unreimbursed allowable medical expenses above 35 dollars, but only when
    the expense is incurred by a household member who is age 60 or older or a
    person with disabilities. Costs for other household members cannot be
    claimed under this provision.
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.407.6
imports:
  - us:statutes/7/2012/j
rules:
  - name: snap_medical_deduction_threshold
    kind: parameter
    dtype: Money
    unit: USD
    source: 10 CCR 2506-1 section 4.407.6
    versions:
      - effective_from: '2025-10-01'
        formula: '35'
  - name: medical_excess
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.407.6
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if snap_household_has_elderly_or_disabled_member:
              max(0, total_medical_expenses - snap_medical_deduction_threshold)
          else: 0
