format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.205.3
  summary: |-
    If eligibility and an opportunity to participate are not provided within thirty calendar days after filing, the local office determines whether delay was caused by household failure to act or local-office failure to act. Household fault includes failure to complete an assisted application, specified work-registration failures, missing verification after assistance, written notice, and ten days, and interview failures or postponements; local-office fault includes failure to assist, give required time, provide written verification notice, timely schedule or notify about second interviews, or request needed verification/action.
rules:
  - name: application_processing_calendar_day_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.205.3 introductory paragraph
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.205.3
              excerpt: "within thirty (30) calendar days following the date the application was filed"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          30

  - name: household_information_supply_calendar_day_minimum
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.205.3(B)-(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.205.3
              excerpt: "at least ten (10) calendar days to supply information"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          10

  - name: household_interview_delay_fault
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.205.3(D)-(E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.205.3
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.205.3#application_processing_calendar_day_limit
              output: application_processing_calendar_day_limit
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          local_office_did_not_determine_eligibility_and_provide_opportunity_to_participate
          and calendar_days_after_application_filing > application_processing_calendar_day_limit
          and (
              household_failed_to_appear_for_first_interview
              or household_failed_to_schedule_second_interview
              or household_requested_to_postpone_interview_until_after_application_processing_calendar_day_limit
              or (
                  household_missed_both_scheduled_interviews
                  and household_requested_another_interview
              )
          )

  - name: household_application_form_delay_fault
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.205.3(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
