format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.504.2
  summary: |-
    A collateral contact is verbal confirmation of household circumstances by a person outside the household, made in person, in writing, or by telephone; acceptable contacts can provide accurate third-party verification and must be documented. Confidentiality must be maintained, only necessary information disclosed, and the local office must not state that the household applied for SNAP. If the household fails to provide an acceptable contact, the technician may select one. The local office shall not determine ineligibility because a person outside the household fails to cooperate; disqualified or ineligible household members are not outside the household. Contradictory information must be resolved by giving the household a reasonable opportunity before eligibility determination.
rules:
  - name: collateral_contact_acceptable
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.504.2(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.504.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          contact_provides_verbal_confirmation_of_household_circumstances
          and contact_is_person_outside_household
          and contact_confirmation_made_in_person_in_writing_or_by_telephone
          and contact_can_be_expected_to_provide_accurate_third_party_verification

  - name: collateral_contact_documentation_complete
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.504.2(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.504.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          individual_contacted_name_documented_in_case_record
          and individual_contacted_contact_information_documented_in_case_record
          and information_provided_by_contact_documented_in_case_record

  - name: collateral_contact_confidentiality_maintained
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.504.2(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.504.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          local_office_disclosed_only_information_necessary_to_get_information_sought
          and not local_office_stated_individual_or_household_applied_for_snap_to_collateral_contact

  - name: eligibility_technician_selected_collateral_contact_permitted
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.504.2(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.504.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (household_failed_to_provide_collateral_contact
          or household_provided_contact_unacceptable_to_eligibility_technician)
          and eligibility_technician_selected_collateral_contact
          and selected_collateral_contact_can_provide_needed_information

  - name: outside_person_noncooperation_ineligibility_determination_prohibited
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.504.2(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.504.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          local_office_determined_household_ineligible
          and person_failed_to_cooperate_with_verification_request
          and person_is_outside_household_for_verification_request
          and not person_is_disqualified_or_in_ineligible_status_household_member

  - name: household_afforded_discrepancy_resolution_opportunity_before_determination
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.504.2(E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.504.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not information_from_another_source_contradicts_household_statements)
          or household_afforded_reasonable_opportunity_to_resolve_discrepancy_before_eligibility_determination
