            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.902.32
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.902.3#snap_certification_employee_qualified
              output: snap_certification_employee_qualified
              hash: sha256:a61a58eb5c67391192d16c77132be193cb0d465523da22114fe650502be92691
    versions:
