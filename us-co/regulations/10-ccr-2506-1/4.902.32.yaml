format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.902.32
  summary: |-
    Volunteers or other personnel who do not meet Section 4.902.3 criteria may not interview or certify households, but may be used for pre-screening, application assistance, verification assistance, and client transportation. Volunteers may serve as authorized representatives in certain situations, and as translators or interpreters when necessary, subject to local-office availability and confidentiality education requirements. Parties to a strike or lockout may not interview or certify households, secure required verification, or have their facilities used in the certification process or as interview sites, but may serve as verification sources when normally the best source.
imports:
  - us-co:regulations/10-ccr-2506-1/4.902.3#snap_certification_employee_qualified
  - us-co:regulations/10-ccr-2506-1/4.902.3#snap_certification_worker_considered_party_to_strike_or_lockout
rules:
  - name: snap_unqualified_volunteer_or_personnel_barred_from_interviewing_or_certifying
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.902.32(A)
    metadata:
      proof:
        atoms:
