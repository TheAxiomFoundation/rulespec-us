  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: 10 CCR 2506-1 section 4.406
  versions:
  - effective_from: '2025-10-01'
    formula: "migrant_or_seasonal_farmworker_household\nand first_month_of_certification_period\n\
      and (\n    snap_destitute_due_to_terminated_source\n    or snap_destitute_due_to_new_source\n\
      \    or snap_destitute_due_to_terminated_and_new_sources\n)"
  metadata:
    proof:
      atoms:
