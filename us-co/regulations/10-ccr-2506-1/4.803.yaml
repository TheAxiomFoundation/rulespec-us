format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.803
  summary: |-
    Local offices shall investigate alleged intentional program violation/fraud cases and ensure appropriate cases are acted on through hearings, court referral, hearing waiver, or signed disqualification consent agreement. With sufficient documentary evidence, administrative disqualification procedures or prosecution referral should be initiated; if not initiated for an over-issuance caused by suspected IPV/fraud, an inadvertent household error claim shall be established. Reversed fraud determinations require reinstatement if otherwise eligible and restoration of benefits lost due to disqualification. Households must receive written IPV penalty warnings each time they apply for SNAP, in clear boldface on the application forms.
rules:
  - name: alleged_ipv_fraud_case_investigation_and_action_completed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.803(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.803
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not household_has_alleged_intentional_program_violation_or_fraud_case)
          or (
              local_office_investigated_alleged_intentional_program_violation_or_fraud_case
              and (
                  appropriate_case_acted_upon_through_administrative_hearing
                  or appropriate_case_referred_to_court_of_appropriate_jurisdiction
                  or waiver_of_administrative_hearing_obtained
                  or signed_disqualification_consent_agreement_obtained
              )
          )

  - name: documentary_evidence_ipv_fraud_case_action_or_claim_completed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.803(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.803
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (
              not local_office_has_sufficient_documentary_evidence_to_substantiate_individual_committed_one_or_more_ipv_or_fraud_acts
              or administrative_disqualification_procedures_initiated
              or referral_for_prosecution_initiated
          )
          and (
              not case_involves_over_issuance_caused_by_suspected_ipv_or_fraud
              or administrative_disqualification_procedures_initiated
              or referral_for_prosecution_initiated
              or inadvertent_household_error_claim_established_against_household
          )

  - name: reversed_fraud_disqualification_reinstatement_and_restoration_completed
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.803(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.803
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not fraud_determination_reversed_by_court_or_final_agency_decision)
          or (
              (
                  not household_otherwise_eligible_for_snap
                  or individual_reinstated_in_program
              )
              and benefits_lost_as_result_of_disqualification_restored
          )

  - name: household_ipv_penalty_warning_provided_on_application
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.803(E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.803
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not household_applies_for_snap_benefits)
          or (
              household_informed_in_writing_of_ipv_disqualification_penalties
              and snap_application_forms_include_penalty_warning_in_clear_boldface_lettering
          )
