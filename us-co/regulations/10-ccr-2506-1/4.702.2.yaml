format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.702.2
  summary: |-
    A household that disagrees with local-office action to restore lost benefits or the lost-benefit amount may request a fair hearing within ninety calendar days of the restoration-entitlement notice. If the request is made before or during the restoration period, under-issued benefits continue pending the hearing decision, and after final decision benefits are restored in accordance with that decision. If the hearing disputes a determination that the household is not eligible for restored benefits, restored benefits for the period in question are not issued while awaiting final agency decision.
rules:
  - name: restoration_fair_hearing_request_calendar_day_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.702.2(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.702.2
              excerpt: "within ninety (90) calendar days"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          90

  - name: restoration_fair_hearing_request_timely
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.702.2(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.702.2
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.702.2#restoration_fair_hearing_request_calendar_day_limit
              output: restoration_fair_hearing_request_calendar_day_limit
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_disagrees_with_local_office_restoration_action_or_lost_benefit_amount
          and household_requested_fair_hearing_on_restoration_action_or_amount
          and calendar_days_after_restoration_entitlement_notice_before_fair_hearing_request <= restoration_fair_hearing_request_calendar_day_limit

  - name: under_issued_benefits_continued_pending_restoration_hearing
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.702.2(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.702.2
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.702.2#restoration_fair_hearing_request_timely
              output: restoration_fair_hearing_request_timely
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not restoration_fair_hearing_request_timely)
          or (not fair_hearing_request_made_before_or_during_lost_benefits_restoration_period)
          or local_office_continued_to_issue_under_issued_benefits_pending_fair_hearing_decision

  - name: benefits_restored_in_accordance_with_final_restoration_hearing_decision
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.702.2(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.702.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not final_decision_reached_on_restoration_fair_hearing)
          or local_office_restored_benefits_in_accordance_with_final_decision

  - name: restored_benefits_not_issued_pending_ineligibility_dispute
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.702.2(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.702.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not household_requested_fair_hearing_disputing_local_office_determination_not_eligible_for_restored_benefits)
          or (not awaiting_final_agency_decision_on_restored_benefit_ineligibility_dispute)
          or not restored_benefits_for_period_in_question_issued_to_household
