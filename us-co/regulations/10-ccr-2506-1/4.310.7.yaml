format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.310.7
  summary: |-
    The local office is responsible for determining and clearly documenting good cause when a non-exempt individual appears to have voluntarily quit or failed to accept suitable employment. Good cause for voluntary quit includes circumstances beyond the member's control, including listed discrimination, unreasonable work conditions, employment or education requiring leaving work, retirement recognized by the employer for persons under 60, unsuitable employment, failed full-time employment, migrant/construction work patterns, illness, household emergency, transportation unavailability, employer-required reduction in work effort or salary, and lack of adequate child care for children age 6 through under 12.
rules:
  - name: employer_recognized_retirement_age_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.310.7(E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.310.7
              excerpt: "persons under the age of sixty (60)"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          60

  - name: failed_full_time_employment_hour_threshold
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.310.7(G)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.310.7
              excerpt: "less than thirty (30) hours a week"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          30

  - name: child_care_good_cause_minimum_child_age
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.310.7(N)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.310.7
              excerpt: "children who have reached age 6"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          6

  - name: child_care_good_cause_child_age_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.310.7(N)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.310.7
              excerpt: "under age 12"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          12

  - name: good_cause_determination_and_documentation_requirement_met
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.310.7 introductory paragraph
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.310.7
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not non_exempt_individual)
          or (
              not individual_appears_to_have_voluntarily_quit_employment
              and not individual_appears_to_have_failed_to_accept_offer_of_suitable_employment
          )
          or (
              local_office_determined_good_cause
              and case_file_clearly_documents_good_cause_or_lack_of_good_cause
          )

  - name: good_cause_for_voluntary_quit
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.310.7(A)-(N)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.310.7
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.310.7#employer_recognized_retirement_age_limit
              output: employer_recognized_retirement_age_limit
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.310.7#failed_full_time_employment_hour_threshold
              output: failed_full_time_employment_hour_threshold
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.310.7#child_care_good_cause_minimum_child_age
              output: child_care_good_cause_minimum_child_age
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.310.7#child_care_good_cause_child_age_limit
              output: child_care_good_cause_child_age_limit
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          individual_voluntarily_quit_employment
          and (
              voluntary_quit_due_to_circumstances_beyond_individual_control
              or employer_discriminated_based_on_age_race_sex_color_handicap_religion_national_origin_or_political_beliefs
              or work_demands_or_conditions_rendered_continued_employment_unreasonable
              or individual_accepted_employment_that_required_leaving_employment
              or individual_enrolled_at_least_half_time_in_recognized_school_training_program_or_higher_education_requiring_leaving_employment
              or other_household_member_accepted_employment_in_another_county_or_political_subdivision_requiring_household_move_and_individual_leave_employment
              or other_household_member_enrolled_at_least_half_time_in_recognized_school_training_program_or_higher_education_in_another_county_or_political_subdivision_requiring_household_move_and_individual_leave_employment
              or (
                  individual_age_years < employer_recognized_retirement_age_limit
                  and resignation_recognized_by_employer_as_retirement
              )
              or resigned_from_employment_that_does_not_meet_suitable_employment
              or (
                  because_of_circumstances_beyond_individual_control_accepted_full_time_employment_did_not_materialize
                  or (
                      because_of_circumstances_beyond_individual_control_accepted_full_time_employment_resulted_in_less_than_threshold_hours_or_earnings
                      and (
                          resulting_weekly_hours < failed_full_time_employment_hour_threshold
                          or resulting_weekly_earnings < federal_minimum_wage * failed_full_time_employment_hour_threshold
                      )
                  )
              )
              or left_job_in_connection_with_frequent_employer_movement_pattern
              or individual_illness_required_leaving_employment
              or household_member_illness_required_individual_presence
              or household_emergency_required_leaving_employment
              or transportation_unavailable
              or employer_demanded_reduction_in_work_effort_or_salary_through_no_employee_fault
              or (
                  lack_of_adequate_child_care
                  and child_age_years >= child_care_good_cause_minimum_child_age
                  and child_age_years < child_care_good_cause_child_age_limit
              )
          )
