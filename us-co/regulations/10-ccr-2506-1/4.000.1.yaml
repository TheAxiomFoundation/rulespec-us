  summary: "Section 4.000.1 defines SNAP terms, including that an \u201CAble-Bodied\
    \ Adult Without Dependents (ABAWD)\u201D is an individual aged eighteen through\
    \ fifty-four without a physical or mental disability who lives in a household\
    \ with no one under eighteen; \u201CHousehold\u201D means individuals who live\
    \ together and customarily purchase and prepare food together for home consumption;\
    \ and \u201CPerson experiencing homelessness\u201D includes an individual lacking\
    \ a fixed and regular nighttime residence or whose primary residence is a listed\
    \ temporary setting, including temporary accommodation in another individual's\
    \ residence for ninety days or less."
