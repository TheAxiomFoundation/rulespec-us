format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.42
  summary: |-
    Applies to AE, IHE, and IPV claims unless otherwise stated. The local office shall document the reason for suspending collection action. Collection action may be suspended when no action was initiated and the household cannot be located or a court postpones collection; after initiation and at least one demand letter, AE/IHE non-participating household claims may be suspended for specified collection barriers; IPV/fraud collection shall be suspended if the guilty individual cannot be located; any non-participating household claim may be suspended after six months of no response.
rules:
  - name: demand_letter_minimum_for_initiated_ae_ihe_suspension
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 § 4.801.42(B)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.42
              excerpt: "at least one (1) demand letter was sent"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1

  - name: no_response_months_for_non_participating_household_suspension
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 § 4.801.42(B)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.42
              excerpt: "after six (6) months of no response"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          6

  - name: collection_action_shall_be_suspended_for_unlocated_guilty_ipv_individual
    kind: derived
    entity: Claim
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 § 4.801.42(B)(2)(d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.42
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_found_guilty_of_intentional_program_violation_or_fraud
          and local_office_documents_guilty_individual_cannot_be_located

  - name: collection_action_may_be_suspended
    kind: derived
    entity: Claim
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 § 4.801.42(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.42
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.801.42#collection_action_shall_be_suspended_for_unlocated_guilty_ipv_individual
              output: collection_action_shall_be_suspended_for_unlocated_guilty_ipv_individual
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.801.42#demand_letter_minimum_for_initiated_ae_ihe_suspension
              output: demand_letter_minimum_for_initiated_ae_ihe_suspension
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.801.42#no_response_months_for_non_participating_household_suspension
              output: no_response_months_for_non_participating_household_suspension
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (
            collection_action_not_initiated
            and (
              local_office_has_documentation_household_cannot_be_located
              or court_decision_postpones_collection_activity
            )
          )
          or (
            collection_action_initiated
            and demand_letters_sent_count >= demand_letter_minimum_for_initiated_ae_ihe_suspension
            and claim_is_agency_error_or_inadvertent_household_error
            and household_is_non_participating
            and (
              household_cannot_be_located
              or cost_of_further_collection_action_likely_exceeds_amount_recoverable
              or household_financially_unable_to_pay_claim
            )
          )
          or collection_action_shall_be_suspended_for_unlocated_guilty_ipv_individual
          or (
            household_is_non_participating
            and months_of_no_response >= no_response_months_for_non_participating_household_suspension
          )

  - name: local_office_must_document_reason_for_suspending_collection_action
    kind: derived
    entity: Claim
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 § 4.801.42(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.42
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          collection_action_is_suspended
