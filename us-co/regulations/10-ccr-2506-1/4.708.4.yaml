format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.708.4
  summary: |-
    Form FNS-46 shall be submitted by each local office operating an issuance system and prepared where actual reconciliation occurs. Local offices shall identify and report the number and value of issuances that do not reconcile, and shall continue monthly inventory-to-issuance reconciliation on Form FNS-250 with Form FNS-259 attached.
rules:
  - name: fns_46_issuance_reconciliation_report_submitted
    kind: derived
    entity: LocalOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.708.4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.708.4
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not local_office_operates_issuance_system)
          or (
              form_fns_46_submitted_by_local_office
              and form_fns_46_prepared_at_actual_reconciliation_level
          )

  - name: unreconciled_issuances_number_and_value_reported
    kind: derived
    entity: LocalOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.708.4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.708.4
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not issuances_do_not_reconcile_with_record_for_issuance_and_master_issuance_file)
          or (
              number_of_unreconciled_issuances_identified_and_reported
              and value_of_unreconciled_issuances_identified_and_reported
          )

  - name: monthly_inventory_against_issuances_reconciliation_completed
    kind: derived
    entity: LocalOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.708.4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.708.4
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          inventory_levels_reconciled_against_issuances_each_month_on_form_fns_250
          and form_fns_259_attached_for_reconciliation
