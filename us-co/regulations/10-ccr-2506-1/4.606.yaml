format: rulespec/v1
imports:
  - us-co:regulations/10-ccr-2506-1/4.604#standard_notice_of_adverse_action_expiration_calendar_days
  - us-co:regulations/10-ccr-2506-1/4.604#address_confidentiality_program_notice_of_adverse_action_expiration_calendar_days
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.606
  summary: |-
    Households receiving PA benefits that report a change to the PA technician are considered to have reported the change for SNAP purposes. Information reported and verified to a PA program that changes the PA benefit amount and meets SNAP verification rules is considered VUR as of the date the PA program processes the change and authorizes the new PA benefit amount. When PA and SNAP changes correspond, the local office must coordinate notices, continued benefits, interim relief, verification requests, and SNAP increases after PA adverse-action periods. SNAP benefits may not increase because of a penalty for IPV or failure to comply with another means-tested publicly funded benefit program.
  deferred_outputs:
    - output: us-co:regulations/10-ccr-2506-1/4.606#advance_notice_required_for_verified_upon_receipt_information
      reason: >-
        Section 4.606(A) requires advance Notice of Adverse Action when acting on VUR except as noted in Section 4.608.1, but no copied RuleSpec context provides Section 4.608.1 and the exception affects the executable notice requirement.
