format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.905
  summary: |-
    D-SNAP may be implemented for a major disaster or temporary emergency. A Presidential disaster declaration for individual assistance must be declared for affected areas to be eligible. A major disaster is a listed catastrophe determined by the President to be a major disaster. A temporary emergency is a non-major-disaster emergency caused by a disaster and determined by FNS to have disrupted commercial channels of food distribution. Disaster-victim households are certified when they need temporary SNAP, the disaster disrupted commercial food distribution channels, and those channels have again become available.
rules:
  - name: household_affected_by_major_disaster
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.905, definition of "major disaster"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.905
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_affected_by_listed_or_other_catastrophe
          and president_determined_catastrophe_is_major_disaster

  - name: household_affected_by_temporary_emergency
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.905, definition of "temporary emergency"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.905
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.905#household_affected_by_major_disaster
              output: household_affected_by_major_disaster
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_affected_by_emergency_caused_by_natural_or_human_disaster
          and fns_determined_disaster_disrupted_commercial_channels_of_food_distribution
          and not household_affected_by_major_disaster

  - name: household_in_dsnap_eligible_affected_area
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.905, Presidential disaster declaration requirement
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.905
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_in_affected_area
          and presidential_disaster_declaration_for_individual_assistance_declared_for_affected_area

  - name: household_disaster_snap_certification_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.905, disaster-victim certification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.905
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_is_victim_of_disaster
          and disaster_disrupts_commercial_channels_of_food_distribution
          and household_needs_temporary_snap
          and commercial_channels_of_food_distribution_again_available_to_meet_temporary_food_needs
