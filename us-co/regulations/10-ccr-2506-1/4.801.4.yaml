format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.4
  summary: 'A.1: "All adult household members aged eighteen (18) years or older at
    the time the over-issuance occurred, sponsors, or other persons ... who trafficked
    or otherwise caused an over-issuance or trafficking to occur ... shall be jointly
    and severally liable for the value of any over-issuance of benefits to the household."

    A.2.a: "Under no circumstances shall the office collect more than the amount of
    the claim."

    D: "Allotment reduction must begin with the first allotment issued ten (10) calendar
    days after the demand letter is mailed."

    D.2: "additional demand letters shall be sent at reasonable Intervals, such as
    thirty (30) calendar days apart."

    E.1.c: "For purposes of the Federal Treasury Offset Program (TOP), a delinquent
    claim is one which is past due more than one hundred twenty (120) calendar days."'
rules:
- name: adult_household_member_liability_age_years
  kind: parameter
  dtype: Integer
  source: 10 CCR 2506-1 4.801.4(A)(1)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.4
          excerpt: aged eighteen (18) years or older
  versions:
  - effective_from: '0001-01-01'
    formula: '18'
- name: allotment_reduction_start_wait_days
  kind: parameter
  dtype: Integer
  source: 10 CCR 2506-1 4.801.4(D)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.4
          excerpt: ten (10) calendar days after the demand letter is mailed
  versions:
  - effective_from: '0001-01-01'
    formula: '10'
- name: reasonable_additional_demand_letter_interval_days
  kind: parameter
  dtype: Integer
  source: 10 CCR 2506-1 4.801.4(D)(2)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.4
          excerpt: reasonable Intervals, such as thirty (30) calendar days apart
  versions:
  - effective_from: '0001-01-01'
    formula: '30'
- name: top_delinquency_days_past_due_threshold
  kind: parameter
  dtype: Integer
  source: 10 CCR 2506-1 4.801.4(E)(1)(c)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.4
          excerpt: past due more than one hundred twenty (120) calendar days
  versions:
  - effective_from: '0001-01-01'
    formula: '120'
- name: jointly_and_severally_liable_for_overissuance
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: 10 CCR 2506-1 4.801.4(A)(1)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.4
      - path: versions[0].formula
        kind: import
        import:
          target: us-co:regulations/10-ccr-2506-1/4.801.4#adult_household_member_liability_age_years
          output: adult_household_member_liability_age_years
          hash: sha256:local
  versions:
  - effective_from: '0001-01-01'
    formula: '(person_was_household_member_connected_at_time_overissuance_occurred
      and age_at_time_overissuance_occurred_years >= adult_household_member_liability_age_years)

      or sponsor_connected_with_household

      or other_person_connected_with_household_and_trafficked_or_caused_overissuance_or_trafficking'
- name: collectible_claim_collection_amount
  kind: derived
  entity: Household
  dtype: Money
  period: Month
  unit: USD
  source: 10 CCR 2506-1 4.801.4(A)(2)(a)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.4
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.4
          excerpt: Under no circumstances shall the office collect more than the amount
            of the claim.
  versions:
  - effective_from: '0001-01-01'
    formula: min(proposed_collection_amount, claim_amount)
- name: allotment_reduction_must_begin_with_first_allotment
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: 10 CCR 2506-1 4.801.4(D)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.4
      - path: versions[0].formula
        kind: import
        import:
          target: us-co:regulations/10-ccr-2506-1/4.801.4#allotment_reduction_start_wait_days
          output: allotment_reduction_start_wait_days
          hash: sha256:local
  versions:
  - effective_from: '0001-01-01'
    formula: 'household_participating_in_program

      and household_subject_to_allotment_reduction

      and first_allotment_calendar_days_after_demand_letter_mailed >= allotment_reduction_start_wait_days'
- name: claim_delinquent_for_treasury_offset_program
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: 10 CCR 2506-1 4.801.4(E)(1)(c)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.4
      - path: versions[0].formula
        kind: import
        import:
          target: us-co:regulations/10-ccr-2506-1/4.801.4#top_delinquency_days_past_due_threshold
          output: top_delinquency_days_past_due_threshold
          hash: sha256:local
  versions:
  - effective_from: '0001-01-01'
    formula: claim_days_past_due > top_delinquency_days_past_due_threshold
