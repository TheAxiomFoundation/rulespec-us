format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.202.31
  summary: |-
    If SSA takes an SSI application or recertification by telephone from a household consisting only of SSI clients, SSA must complete a SNAP application during the telephone interview, mail it to the client for signature and return, and forward received SNAP applications to the local office; the local office must not require another interview but may contact the household for additional information. SSA must mail information about the client's right to file SNAP at SSA if all household members are SSI clients or at the local office, and the right to a local-office interview. For SSI-only households applying for SNAP certification at SSA, the application is filed for normal processing when received by SSA.
rules:
  - name: ssa_telephone_ssi_only_snap_application_completed_and_mailed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.202.31(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.202.31
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not ssa_office_takes_ssi_application_or_recertification_by_telephone_from_ssi_only_household)
          or (
              snap_application_completed_during_ssa_telephone_interview
              and snap_application_mailed_by_ssa_to_client_for_signature_and_return
          )

  - name: ssa_received_snap_application_forwarded_to_local_office
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.202.31(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.202.31
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not ssa_office_received_snap_application_from_client)
          or ssa_office_forwarded_received_snap_application_to_local_office

  - name: local_office_processes_ssa_telephone_application_without_reinterview
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.202.31(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.202.31
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not local_office_received_ssa_forwarded_snap_application)
          or (
              not local_office_required_household_to_be_interviewed_again
          )

  - name: ssa_snap_filing_and_interview_rights_information_mailed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.202.31(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.202.31
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          ssa_office_mailed_information_that_client_may_file_snap_application_at_ssa_if_all_household_members_are_ssi_clients
          and ssa_office_mailed_information_that_client_may_file_snap_application_at_local_office
          and ssa_office_mailed_information_that_client_has_right_to_local_office_interview

  - name: ssi_only_ssa_snap_application_filed_for_normal_processing
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.202.31(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.202.31
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_consists_entirely_of_ssi_clients
          and household_applies_for_snap_certification_at_ssa_office
          and snap_application_received_by_ssa_office
