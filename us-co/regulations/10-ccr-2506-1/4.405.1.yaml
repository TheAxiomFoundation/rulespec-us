format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.405.1
  summary: |-
    "All education assistance including grants, scholarships, fellowships, work-study, veteran's educational benefits, and any other money received specifically for educational expenses are exempt from consideration as income."
rules:
  - name: education_assistance_exempt_from_income_consideration
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.405.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.405.1
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          payment_is_educational_grant
          or payment_is_educational_scholarship
          or payment_is_educational_fellowship
          or payment_is_work_study
          or payment_is_veterans_educational_benefit
          or payment_is_other_money_received_specifically_for_educational_expenses
