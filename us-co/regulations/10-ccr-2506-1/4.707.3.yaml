format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.3
  summary: |-
    Issuance offices shall maintain EBT card inventory at proper levels determined by issuance volume, adequate storage facilities and insurance coverage; inventory levels shall not exceed a six-month supply, including cards on hand and on order. Security shall be continually monitored to ensure safeguards and insurance coverage. Sufficient-volume offices receive direct USDA/FNS shipments; low-volume offices receive shipments from the state department storage vault by fully insured registered mail.
rules:
  - name: ebt_card_inventory_supply_month_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.707.3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.3
              excerpt: "shall not exceed a six-month supply"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          6

  - name: ebt_card_inventory_level_compliant
    kind: derived
    entity: IssuanceOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.707.3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.3
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.707.3#ebt_card_inventory_supply_month_limit
              output: ebt_card_inventory_supply_month_limit
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          ebt_card_inventory_level_determined_by_issuance_volume
          and adequate_storage_facilities_available_for_ebt_card_inventory
          and insurance_coverage_available_for_ebt_card_inventory
          and ebt_cards_on_hand_and_on_order_supply_months <= ebt_card_inventory_supply_month_limit

  - name: ebt_card_inventory_security_monitoring_compliant
    kind: derived
    entity: IssuanceOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.707.3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.3
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          issuance_office_security_continually_monitored
          and adequate_safeguards_provided_for_ebt_card_inventory_on_hand
          and insurance_coverage_provided_for_ebt_card_inventory_on_hand

  - name: sufficient_volume_office_direct_usda_fns_shipment_arranged
    kind: derived
    entity: IssuanceOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.707.3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.3
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not issuance_office_has_sufficient_issuance_volume_for_direct_shipments)
          or issuance_office_receives_ebt_card_shipments_directly_from_usda_fns

  - name: low_volume_office_state_vault_registered_mail_shipment_arranged
    kind: derived
    entity: IssuanceOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.707.3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.3
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not issuance_office_has_low_issuance_volume)
          or (
              issuance_office_receives_ebt_card_shipments_from_state_department_storage_vault
              and ebt_card_shipments_sent_by_fully_insured_registered_mail
          )

  - name: direct_shipment_office_reconciliation_and_ordering_practice_followed
    kind: derived
    entity: IssuanceOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.707.3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.3
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not issuance_office_receives_ebt_card_shipments_directly_from_usda_fns)
          or (
              issuance_office_checks_ebt_cards_after_monthly_reconciliation
              and issuance_office_orders_ebt_cards_according_to_usda_fns_instructions
          )

  - name: requisition_adjustment_prior_notice_provided
    kind: derived
    entity: IssuanceOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.707.3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.3
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not usda_fns_adjusted_ebt_card_requisition)
          or requisitioning_issuance_office_notified_before_requisition_adjustment

  - name: state_vault_supply_office_requisition_compliant
    kind: derived
    entity: IssuanceOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.707.3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.3
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not issuance_office_receives_ebt_card_supply_from_state_department_storage_vault)
          or (
              issuance_office_requisitions_ebt_cards_according_to_state_department_instructions
              and state_department_instructions_advise_procedures_for_ordering_from_contractual_ebt_card_provider
          )
