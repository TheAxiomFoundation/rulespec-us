format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.505.1
  summary: |-
    The identity of the person making an application shall be verified; if an authorized representative applies for a household, both the representative and head of household shall be verified. Identity may be verified by documentary evidence, collateral contact, or electronic DMV information, and no specific document type may be imposed. EBT card issuance may not require identity verification beyond what was used for SNAP eligibility, including collateral contact verification.
rules:
  - name: application_identity_verification_requirement_met
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.505.1(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.505.1
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not household_makes_snap_application)
          or (
              authorized_representative_applies_on_behalf_of_household
              and authorized_representative_identity_verified
              and head_of_household_identity_verified
          )
          or (
              not authorized_representative_applies_on_behalf_of_household
              and person_making_application_identity_verified
          )

  - name: identity_verification_method_acceptable
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.505.1(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.505.1
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          identity_verified_through_readily_available_documentary_evidence
          or identity_verified_through_collateral_contact
          or identity_verified_through_electronic_information_from_colorado_dmv

  - name: specific_identity_document_requirement_imposed_prohibited
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.505.1(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.505.1
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          specific_type_of_identity_document_required

  - name: ebt_card_extra_identity_verification_requirement_prohibited
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.505.1(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.505.1
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_obtaining_ebt_card
          and (
              household_required_to_provide_identity_verification_beyond_snap_eligibility_identity_verification
              or (
                  identity_established_for_snap_eligibility_through_collateral_contact
                  and not collateral_contact_identity_verification_accepted_for_ebt_card
              )
          )
