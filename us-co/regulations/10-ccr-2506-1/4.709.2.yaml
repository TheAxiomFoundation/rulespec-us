format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.709.2
  summary: |-
    CO/EBTS debit cards for eligible recipients will be replaced when reported lost, stolen, or non-functioning within three business days of recipient notification. Local offices shall not charge specified replacement-card fees and shall not collect replacement fees by debiting a recipient's SNAP account.
rules:
  - name: co_ebts_replacement_card_business_day_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.709.2(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.709.2
              excerpt: "within three (3) business days"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          3

  - name: reported_lost_stolen_or_nonfunctioning_card_replaced_timely
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.709.2(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.709.2
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.709.2#co_ebts_replacement_card_business_day_limit
              output: co_ebts_replacement_card_business_day_limit
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          recipient_eligible_for_co_ebts_debit_card
          and recipient_reported_card_lost_stolen_or_nonfunctioning
          and replacement_card_issued
          and business_days_after_recipient_notification_before_replacement <= co_ebts_replacement_card_business_day_limit

  - name: replacement_card_mail_issuance_fee_prohibited
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.709.2(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.709.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          replacement_card_issued_by_mail
          and local_office_charged_replacement_card_fee

  - name: replacement_card_original_inoperable_no_client_fault_fee_prohibited
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.709.2(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.709.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          original_card_inoperable_due_to_no_fault_of_client
          and local_office_charged_replacement_card_fee

  - name: recertification_after_nonparticipation_destroyed_lost_or_damaged_card_fee_prohibited
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.709.2(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.709.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          client_being_recertified
          and during_period_of_nonparticipation_client_destroyed_lost_or_damaged_original_card
          and local_office_charged_replacement_card_fee

  - name: replacement_fee_collection_by_snap_account_debit_prohibited
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.709.2(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.709.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          local_office_collected_replacement_fee_by_debiting_recipient_snap_account
