format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.706.2
  summary: |-
    Local offices shall follow procedures for EBT cards reported lost or stolen from the mail before household receipt: determine mailing/delivery/return status, issue a replacement card and new PIN, and take corrective action such as address correction.
rules:
  - name: ebt_card_mail_delivery_status_determined
    kind: derived
    entity: LocalOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.706.2(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.706.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not ebt_card_reported_lost_in_mail_or_stolen_from_mail_before_household_receipt)
          or (
              local_office_determined_if_ebt_card_was_mailed
              and local_office_determined_if_sufficient_time_elapsed_for_delivery
              and local_office_determined_if_ebt_card_was_returned_in_mail_to_local_office
          )

  - name: replacement_ebt_card_and_new_pin_issued
    kind: derived
    entity: LocalOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.706.2(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.706.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not ebt_card_reported_lost_in_mail_or_stolen_from_mail_before_household_receipt)
          or (
              local_office_issued_replacement_ebt_card
              and local_office_issued_new_pin
          )

  - name: ebt_mail_replacement_corrective_action_taken
    kind: derived
    entity: LocalOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.706.2(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.706.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not ebt_card_reported_lost_in_mail_or_stolen_from_mail_before_household_receipt)
          or local_office_took_other_action_such_as_correcting_household_mailing_or_home_address_in_automated_system

  - name: ebt_mail_loss_or_theft_replacement_procedures_complied
    kind: derived
    entity: LocalOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.706.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.706.2
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.706.2#ebt_card_mail_delivery_status_determined
              output: ebt_card_mail_delivery_status_determined
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.706.2#replacement_ebt_card_and_new_pin_issued
              output: replacement_ebt_card_and_new_pin_issued
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.706.2#ebt_mail_replacement_corrective_action_taken
              output: ebt_mail_replacement_corrective_action_taken
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          ebt_card_mail_delivery_status_determined
          and replacement_ebt_card_and_new_pin_issued
          and ebt_mail_replacement_corrective_action_taken
