format: rulespec/v1
imports:
  - us-co:regulations/10-ccr-2506-1/4.304.4#boarding_house_or_institution_resident_snap_ineligible
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.309.3
  summary: |-
    Residents of publicly operated community mental health centers or private non-profit organizations or institutions operating residential drug or alcohol treatment or rehabilitation programs are eligible to participate in SNAP through an authorized representative employed and designated by the facility; the center must be approved by CDHS/OBH, verified as FNS-approved as a retailer, and certified by OBH before residents are certified. Residents and their children in a certified center must voluntarily elect SNAP participation, with residents treated as one-person households unless children live with them at the center. Expedited-service residents must have benefits available no later than seven calendar days after filing. Non-resident drug and alcohol treatment program participants are included in their applicant household, and the household may use SNAP benefits for food prepared or served during the program if FNS has authorized the program.
rules:
  - name: residential_treatment_expedited_benefit_availability_calendar_day_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.309.3(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.309.3
              excerpt: "no later than seven (7) calendar days following the date the application was filed"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          7

  - name: residential_treatment_center_residents_snap_participation_available
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.309.3(A)-(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.309.3
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_resides_in_publicly_operated_community_mental_health_center_or_private_nonprofit_residential_drug_or_alcohol_treatment_or_rehabilitation_program
          and application_made_through_authorized_representative_employed_by_facility
          and authorized_representative_designated_by_facility_for_snap_application_purpose
          and center_approved_by_cdhs_office_of_behavioral_health
          and local_office_verified_center_approved_by_fns_as_retailer
          and local_office_verified_center_certified_by_office_of_behavioral_health

  - name: certified_center_resident_household_composition_and_child_meal_treatment
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.309.3(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.309.3
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          residents_and_children_reside_in_certified_center
          and residents_and_children_voluntarily_elect_snap_participation
          and (
              (
                  resident_has_no_children_residing_with_resident_at_center
                  and resident_eligibility_determined_as_one_person_household
              )
              or (
                  children_reside_with_resident_parent_in_treatment_center
                  and children_qualify_for_snap
                  and meals_served_to_children_eligible_for_purchase_with_snap_benefits
              )
          )
          and local_office_certified_center_residents_using_same_provisions_as_other_applicant_households

  - name: residential_treatment_expedited_service_benefits_available_timely
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.309.3(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.309.3
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.309.3#residential_treatment_expedited_benefit_availability_calendar_day_limit
              output: residential_treatment_expedited_benefit_availability_calendar_day_limit
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          resident_of_center_qualifies_for_expedited_service
          and benefits_available_for_spending_calendar_days_after_application_filed <= residential_treatment_expedited_benefit_availability_calendar_day_limit

