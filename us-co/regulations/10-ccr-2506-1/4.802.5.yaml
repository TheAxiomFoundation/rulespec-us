format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.802.5
  summary: |-
    Before denying, terminating, reducing, or recovering SNAP benefits, the local office shall provide the household an opportunity for a DRC; an individual may bypass DRC and appeal directly to the SNAP fair hearings unit. If requested, the local office shall arrange a DRC, with counsel or other aid persons permitted. Untimely DRC request or failure to appear without timely postponement abandons the DRC right unless good cause is shown. SNAP DRC may be consolidated with similar disputes concerning other assistance payments, Colorado Works, or Medicaid eligibility when consolidation facilitates resolution.
rules:
  - name: snap_drc_opportunity_required_before_adverse_benefit_action
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.802.5(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.802.5
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          local_office_will_deny_terminate_reduce_or_recover_snap_benefits

  - name: individual_may_bypass_snap_drc_and_appeal_directly
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.802.5(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.802.5
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          individual_chooses_to_bypass_drc_process_and_appeal_directly

  - name: local_office_must_arrange_requested_snap_drc
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.802.5(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.802.5
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_requests_snap_drc

  - name: household_may_have_counsel_or_aid_persons_at_snap_drc
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.802.5(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.802.5
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_requests_snap_drc

  - name: snap_drc_good_cause_for_failure
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.802.5(C)(1)-(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.802.5
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          death_or_incapacity_of_client_immediate_family_member_or_representative
          or health_or_medical_condition_of_emergency_nature
          or other_circumstances_beyond_client_control_prevent_reasonable_person_from_timely_drc_request_or_postponement

  - name: snap_drc_right_abandoned
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.802.5(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.802.5
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (
              client_failed_to_request_drc_within_prior_notice_period
              or (
                  client_failed_to_appear_at_scheduled_drc
                  and not client_made_timely_request_for_drc_postponement
              )
          )
          and not snap_drc_good_cause_for_failure

  - name: local_office_may_consolidate_snap_drc_with_related_disputes
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.802.5(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.802.5
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (
              household_has_dispute_regarding_other_assistance_payments_program
              or household_has_dispute_regarding_colorado_works_program
              or household_has_dispute_concerning_medicaid_eligibility
          )
          and disputed_facts_are_similar
          and consolidation_will_facilitate_resolution_of_all_disputes
