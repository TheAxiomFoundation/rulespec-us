format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.304.2
  summary: |-
    When different households apply for the same child, the household applying second must establish majority custody and/or provide a majority of the child's meals. If the second household verifies both majority custody and majority meals, the information is unclear as to the first case and an RFC must be initiated on the first case if prior verification was not provided, following Section 4.140 confidentiality rules. If households cannot agree, the child is included with the household providing the majority of meals; conclusive second-household verification removes the child from the first case and adds the child to the second case under Section 4.604.G to avoid dual participation. Equal meals favor the current/first applicant household, and failure by one household to verify meal percentage leaves the child in the household where SNAP benefits first began.
rules:
  - name: second_requesting_household_child_verification_requirement_met
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.304.2(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.304.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not different_households_apply_for_same_child_and_this_household_applies_second)
          or (
              this_household_established_majority_custody_of_child
              or this_household_provides_majority_of_child_meals
          )

  - name: second_household_verification_creates_unclear_information_for_first_case
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.304.2(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.304.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          second_requesting_household_provided_verification_indicating_majority_custody
          and second_requesting_household_provided_verification_indicating_majority_of_meals
          and child_currently_receives_benefits_under_first_household

  - name: first_case_rfc_requirement_after_unclear_child_information_met
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.304.2(B)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.304.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not second_household_verification_creates_unclear_information_for_first_case)
          or first_case_previously_provided_verification_establishing_majority_custody_or_majority_meals
          or (
              request_for_contact_initiated_on_first_case
              and section_4_140_confidentiality_rules_followed_for_request
          )

  - name: disputed_child_included_with_household_providing_majority_meals
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.304.2(B)(1)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.304.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          two_households_applying_for_same_child_cannot_agree_where_child_receives_benefits
          and this_household_provides_majority_of_child_meals
          and eligibility_technician_considered_sufficient_time_period_for_custody_and_meals_arrangement

  - name: child_removed_from_first_and_added_to_second_to_avoid_dual_participation
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.304.2(B)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.304.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          second_requesting_household_verification_conclusively_proves_majority_custody_as_of_request
          and second_requesting_household_verification_conclusively_proves_majority_of_meals_as_of_request
          and child_removed_from_first_case
          and child_added_to_second_case_under_section_4_604_G
          and dual_participation_avoided

  - name: current_or_first_applicant_household_receives_child_benefits_when_meals_equal
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.304.2(B)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.304.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          two_households_provide_equal_number_of_meals_to_child
          and (
              this_household_currently_receives_snap_benefits_for_child
              or this_household_applied_first_for_child
          )

  - name: child_remains_in_first_snap_household_when_meal_verification_missing
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.304.2(B)(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.304.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          one_household_failed_to_provide_verification_of_percentage_of_meals_provided_to_child
          and child_remained_in_household_where_snap_benefits_first_began
