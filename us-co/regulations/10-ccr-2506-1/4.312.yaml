format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.312
  summary: |-
    In Colorado, the Employment and Training program is called EF. CDHS must submit an annual Employment and Training State Plan for approval by USDA Food and Nutrition Service. The EF program is voluntary for SNAP applicants and recipients, and failure to participate with EF will not result in a work requirement disqualification.
rules:
  - name: cdhs_annual_employment_and_training_state_plan_submission_requirement_satisfied
    kind: derived
    entity: StateAgency
    dtype: Judgment
    period: Year
    source: 10 CCR 2506-1 section 4.312
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.312
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not agency_is_cdhs)
          or cdhs_submitted_annual_employment_and_training_state_plan_to_usda_food_and_nutrition_service_for_approval

  - name: ef_program_voluntary_for_snap_applicant_or_recipient
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.312
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.312
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not person_is_snap_applicant_or_recipient)
          or ef_program_participation_treated_as_voluntary_for_person

  - name: ef_nonparticipation_does_not_result_in_work_requirement_disqualification
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.312
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.312
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not person_failed_to_participate_with_ef_program)
          or not work_requirement_disqualification_imposed_because_of_ef_nonparticipation
