format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.61
  summary: |-
    Local assistance offices may contract with other parties for issuance and storage of EBT cards; contractors may subcontract assigned issuance responsibilities with local-office approval. Any delegation of issuance and EBT card security must clearly delineate both parties' responsibilities. Local offices remain responsible for assigned duties and liable to USDA/FNS for all EBT-card losses. If an issuance office/agent or bulk storage point is being closed for noncompliance with contractual agreements, the local assistance office shall perform weekly reconciliation until alternative issuance or storage points are obtained.
rules:
  - name: ebt_card_issuance_and_storage_contracting_permitted
    kind: derived
    entity: LocalAssistanceOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.707.61
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.61
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          true

  - name: contractor_subcontracting_assigned_issuance_responsibilities_permitted
    kind: derived
    entity: LocalAssistanceOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.707.61
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.61
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          contractor_subcontracts_assigned_issuance_responsibilities
          and local_office_approved_subcontract

  - name: delegated_issuance_and_card_security_responsibilities_delineated
    kind: derived
    entity: LocalAssistanceOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.707.61
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.61
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not issuance_or_ebt_card_security_delegated)
          or responsibilities_of_both_parties_clearly_delineated

  - name: assigned_ebt_card_duties_carried_out_under_regulations
    kind: derived
    entity: LocalAssistanceOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.707.61
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.61
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not ebt_card_issuance_or_storage_duties_assigned_to_other_party)
          or assigned_duties_carried_out_in_accordance_with_regulations

  - name: local_office_liability_to_usda_fns_for_ebt_card_losses
    kind: derived
    entity: LocalAssistanceOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.707.61
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.61
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          true

  - name: weekly_reconciliation_performed_during_noncompliance_closure
    kind: derived
    entity: LocalAssistanceOffice
    dtype: Judgment
    period: Week
    source: 10 CCR 2506-1 section 4.707.61
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.61
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not issuance_office_agent_or_bulk_storage_point_being_closed_for_noncompliance_with_contractual_agreements)
          or alternative_issuance_or_storage_points_obtained
          or local_assistance_office_performed_weekly_reconciliation
