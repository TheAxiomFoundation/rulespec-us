    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not individual_making_request_communicates_in_language_other_than_english
          or not verbal_explanation_of_hearing_procedures_requested_in_that_language
          or hearing_procedures_verbally_explained_in_client_language

  - name: household_hearing_process_help_requirement_satisfied
