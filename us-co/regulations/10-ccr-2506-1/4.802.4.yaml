format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.802.4
  summary: |-
    Upon request, the local office shall make hearing materials available without charge, provide language assistance and verbal hearing-procedure explanations in the client's language when needed and requested, help households with the hearing process, and advise households of available legal services. The local office shall expedite certain hearing requests when necessary for households planning to move before the usual decision time. The local office bears the preponderance burden of proof for appealed issues at state fair hearings or local DRCs, except IPV matters governed by section 4.803.2.
imports:
  - us-co:regulations/10-ccr-2506-1/4.803.2#intentional_program_violation_established
rules:
  - name: hearing_materials_access_requirement_satisfied
    kind: derived
    entity: LocalOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.802.4(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.802.4
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not household_or_representative_requested_hearing_materials
          or specific_materials_necessary_for_hearing_decision_or_preparation_made_available_without_charge

  - name: hearing_language_assistance_requirement_satisfied
    kind: derived
    entity: LocalOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.802.4(A)
    metadata:
      proof:
        atoms:
