format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.709.1
  summary: |-
    Local offices establish procedures for issuance of CO/EBTS debit cards and PINs; households receive a debit card within seven calendar days for expedited cases and within thirty calendar days for non-expedited cases. Local offices maintain, reorder, secure, and account for debit cards, and household PINs are issued through state-supplied encryption devices.
rules:
  - name: expedited_case_debit_card_issuance_calendar_day_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.709.1(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.709.1
              excerpt: "within seven (7) calendar days from the date of application for expedited cases"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          7

  - name: non_expedited_case_debit_card_issuance_calendar_day_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.709.1(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.709.1
              excerpt: "within thirty (30) calendar days for non-expedited cases"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          30

  - name: debit_card_issued_timely_for_expedited_case
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.709.1(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.709.1
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.709.1#expedited_case_debit_card_issuance_calendar_day_limit
              output: expedited_case_debit_card_issuance_calendar_day_limit
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_application_is_expedited_case
          and household_issued_debit_card
          and debit_card_issued_calendar_days_from_application <= expedited_case_debit_card_issuance_calendar_day_limit

  - name: debit_card_issued_timely_for_non_expedited_case
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.709.1(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.709.1
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.709.1#non_expedited_case_debit_card_issuance_calendar_day_limit
              output: non_expedited_case_debit_card_issuance_calendar_day_limit
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_application_is_non_expedited_case
          and household_issued_debit_card
          and debit_card_issued_calendar_days_from_application <= non_expedited_case_debit_card_issuance_calendar_day_limit

  - name: local_office_debit_card_supply_maintained_and_secured
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.709.1(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.709.1
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          local_office_maintains_debit_cards_on_site_at_primary_location
          and local_office_maintains_debit_cards_on_site_at_satellite_offices
          and ebts_contractor_provided_initial_supply_of_sequentially_numbered_pre_embossed_cards
          and local_office_reordered_cards_to_ensure_adequate_supply
          and debit_cards_secured_and_accounted_for_through_inventory_and_distribution_forms

  - name: household_pin_issued_through_state_encryption_devices
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.709.1(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.709.1
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_pin_issued
          and household_pin_issued_through_encryption_devices_supplied_by_state_department
