format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.902.3
  summary: |-
    County employees assigned to certify SNAP households must be employed under current merit-system personnel standards, and only such qualified employees may interview SNAP households and determine eligibility, ineligibility, or benefit level. Parties to a strike or lockout may not interview or certify households or secure required verification, but may be used as verification sources when they would normally be the best source. An eligibility technician who is the spouse of a striker is not considered party to a strike, but may not certify his or her own household.
rules:
  - name: snap_certification_employee_qualified
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.902.3(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.902.3
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          county_employee_assigned_to_certify_snap_households
          and county_employee_employed_in_accordance_with_current_merit_system_personnel_standards
          and county_employee_is_qualified_to_certify_snap_households

  - name: snap_certification_worker_considered_party_to_strike_or_lockout
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.902.3(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.902.3
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          person_is_party_to_strike_or_lockout
          and not eligibility_technician_is_spouse_of_striker

  - name: snap_certification_worker_may_interview_or_certify_households
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.902.3(A)-(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.902.3
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.902.3#snap_certification_employee_qualified
              output: snap_certification_employee_qualified
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.902.3#snap_certification_worker_considered_party_to_strike_or_lockout
              output: snap_certification_worker_considered_party_to_strike_or_lockout
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          snap_certification_employee_qualified
          and not snap_certification_worker_considered_party_to_strike_or_lockout
          and not snap_eligibility_technician_spouse_of_striker_certifying_own_household

  - name: snap_eligibility_technician_spouse_of_striker_certifying_own_household
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.902.3(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.902.3
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          eligibility_technician_is_spouse_of_striker
          and certification_household_is_eligibility_technicians_own_household

  - name: strike_or_lockout_party_may_be_verification_source
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.902.3(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.902.3
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.902.3#snap_certification_worker_considered_party_to_strike_or_lockout
              output: snap_certification_worker_considered_party_to_strike_or_lockout
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          snap_certification_worker_considered_party_to_strike_or_lockout
          and under_normal_circumstances_person_expected_to_be_best_verification_source_for_applicant_household_information
