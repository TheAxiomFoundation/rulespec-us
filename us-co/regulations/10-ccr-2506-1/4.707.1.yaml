format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.1
  summary: |-
    Electronic benefit issuance areas shall be physically separated from clients and non-accountability employees; non-accountability persons shall be barred from EBT card storage. Local offices and contract issuers shall take precautions against counterfeit or unauthorized SNAP benefit activity and safeguard EBT cards. Bulk card inventory vaults shall be locked except for withdrawals, keys and combinations restricted, cashier card supplies controlled, cards removed from public view and reach, and the office not left unattended during issuance hours unless secured as after business hours.
rules:
  - name: electronic_benefit_issuance_area_access_control_compliant
    kind: derived
    entity: LocalOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.707.1, first paragraph
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.1
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          electronic_benefit_issuance_area_physically_separated_from_clients
          and electronic_benefit_issuance_area_physically_separated_from_nonaccountability_employees
          and persons_not_responsible_for_benefit_issuance_accountability_barred_from_ebt_card_storage_area

  - name: snap_benefit_and_ebt_card_safeguards_compliant
    kind: derived
    entity: LocalOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.707.1, second paragraph
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.1
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          precautions_taken_to_avoid_acceptance_transfer_negotiation_or_use_of_counterfeit_snap_benefits
          and precautions_taken_to_avoid_unauthorized_use_transfer_acquisition_alteration_or_possession_of_snap_benefits
          and ebt_cards_safeguarded_from_theft_embezzlement_loss_damage_or_destruction

  - name: bulk_card_inventory_vault_control_compliant
    kind: derived
    entity: LocalOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.707.1, third paragraph
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.1
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          issuance_supervisors_give_each_cashier_daily_supply_of_blank_ebt_cards_from_bulk_card_inventory
          and (
              not high_volume_issuance_day_replenishment_needed
              or cashier_supply_replenished_during_issuance_hours_from_office_vault
          )
          and vault_containing_bulk_card_inventory_locked_unless_opened_to_withdraw_cards
          and keys_and_lock_combinations_controlled_and_restricted_to_as_few_individuals_as_possible
          and (
              not individual_who_received_combinations_or_locks_left_office_employment
              or combinations_and_locks_changed_after_that_individual_left_office_employment
          )

  - name: cashier_ebt_card_handling_compliant
    kind: derived
    entity: LocalOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.707.1, fourth paragraph
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.1
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          ebt_cards_removed_from_public_view_and_reach
          and each_cashier_operates_from_card_drawer_rather_than_countertop_sources
          and (
              not cashier_left_issuance_area_for_any_reason
              or ebt_cards_locked_in_drawer_when_cashier_left_issuance_area
          )
          and (
              not small_office_without_separate_cashier_ebt_card_supply
              or (
                  ebt_cards_counted_whenever_one_cashier_assumes_duties_of_another_at_issuance_counter
                  and ebt_cards_transferred_to_assuming_cashier_responsibility
              )
          )

  - name: issuance_office_attendance_security_compliant
    kind: derived
    entity: LocalOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.707.1, fifth paragraph
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.1
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          not office_left_unattended_during_hours_of_issuance
          or building_secured_as_after_business_hours_when_office_left_unattended_during_issuance

