format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.609.4
  summary: |-
    If a household receiving T-SNAP returns to CW during the transitional period, the local office shall complete the recertification process for SNAP to determine continued eligibility and benefit amount. If the household remains eligible, a new certification period is assigned.
rules:
  - name: local_office_completed_snap_recertification_after_tsnap_household_returns_to_cw
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.609.4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.609.4
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not household_receiving_tsnap_returns_to_cw_during_transitional_period)
          or (
              local_office_completed_snap_recertification_process
              and local_office_determined_household_continued_snap_eligibility
              and local_office_determined_household_snap_benefit_amount
          )

  - name: new_snap_certification_period_assigned_after_tsnap_return_to_cw
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.609.4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.609.4
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_receiving_tsnap_returns_to_cw_during_transitional_period
          and household_remains_eligible_for_snap
          and household_assigned_new_snap_certification_period
