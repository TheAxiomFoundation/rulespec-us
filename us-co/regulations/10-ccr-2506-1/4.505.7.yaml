            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.505.7
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          same_sponsor_responsible_for_entire_household
          and needed_sponsor_information_or_verification_missing

  - name: local_office_assistance_with_verification_required_when_household_cooperates
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.505.7(C)
    metadata:
      proof:
