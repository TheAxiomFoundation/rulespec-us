    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.505.7(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.505.7
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          sponsored_non_citizen_refuses_to_cooperate_in_providing_or_verifying_needed_information
          and other_adult_household_members_provided_or_verified_needed_information

  - name: entire_household_ineligible_when_same_sponsor_and_verification_missing
    kind: derived
    entity: Household
