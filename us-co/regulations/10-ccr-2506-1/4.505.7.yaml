format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.505.7
  summary: |-
    At initial application and recertification, the local office shall verify sponsor income/resources, other sponsored non-citizens, sponsor/spouse tax dependents, and sponsor contact information. Until needed information or verification is provided, the sponsored non-citizen is ineligible; later verification is acted on as a reported change. Remaining household members' eligibility is determined, counting the ineligible non-citizen's income/resources except attributed sponsor/spouse income/resources. If the sponsored non-citizen refuses to cooperate, other adult household members are responsible; if the same sponsor is responsible for the entire household, the entire household is ineligible until verification is provided, and the local office must assist when the household cooperates.
rules:
  - name: sponsor_information_verified_at_application_or_recertification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.505.7(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.505.7
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (sponsored_non_citizen_initial_application_or_recertification)
          and local_office_verified_sponsor_and_spouse_income_and_resources
          and local_office_verified_names_and_alien_registration_numbers_of_other_non_citizens_with_sponsor_affidavit
          and local_office_verified_number_of_sponsor_and_spouse_federal_tax_dependents
          and local_office_verified_sponsor_name_address_and_phone_number

  - name: sponsored_non_citizen_ineligible_until_needed_verification_provided
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.505.7(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.505.7
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          sponsored_non_citizen
          and information_or_verification_needed_to_determine_eligibility
          and not non_citizen_provided_needed_information_or_verification

  - name: provided_sponsor_verification_acted_on_as_reported_change
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.505.7(B), (C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.505.7
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          needed_sponsor_information_or_verification_subsequently_received
          and local_office_acted_on_information_as_reported_change

  - name: remaining_household_members_eligibility_determined_with_ineligible_non_citizen_income_resources
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.505.7(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.505.7
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_has_remaining_members_after_sponsored_non_citizen_ineligible
          and eligibility_of_remaining_household_members_determined
          and income_and_resources_of_ineligible_non_citizen_considered_available_for_remaining_members
          and attributed_sponsor_and_spouse_income_and_resources_excluded_from_ineligible_non_citizen_income_resources

  - name: adult_household_members_responsible_when_sponsored_non_citizen_refuses
    kind: derived
