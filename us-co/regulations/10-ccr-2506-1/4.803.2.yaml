format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.803.2
  summary: |-
    An intentional program violation shall be established only if an administrative disqualification hearing official or a court has found a household member committed IPV/fraud or if a signed waiver or signed disqualification consent agreement has been obtained. For ADH purposes, IPV turns on intentional false or misleading statements, misrepresentation/concealment/withholding of facts, or intentional acts violating SNAP law/rules for using, presenting, transferring, acquiring, receiving, possessing, or trafficking benefits or access devices. The determination must be based on clear and convincing evidence; the burden is with the local office. Disqualification start timing differs for ADH, waiver, court decisions, and consent agreements.
rules:
  - name: administrative_disqualification_hearing_start_deadline_months_after_notice
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 4.803.2(F)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.803.2
              excerpt: "begin no later than the second month which follows the date the individual receives written notice"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          2

  - name: waiver_disqualification_start_months_after_notice
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 4.803.2(F)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.803.2
              excerpt: "begin with the first month which follows the date the household member receives written notification"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1

  - name: court_disqualification_initiation_deadline_calendar_days
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 4.803.2(F)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.803.2
              excerpt: "within forty-five (45) calendar days"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          45

  - name: consent_agreement_disqualification_start_deadline_calendar_days
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 4.803.2(F)(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.803.2
              excerpt: "begin within forty-five (45) calendar days from the date the household member signed the disqualification consent agreement"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          45

  - name: intentional_program_violation_established
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 4.803.2(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.803.2
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          administrative_disqualification_hearing_official_found_household_member_committed_intentional_program_violation_or_fraud
          or court_of_appropriate_jurisdiction_found_household_member_committed_intentional_program_violation_or_fraud
          or signed_waiver_of_administrative_hearing_obtained
          or signed_disqualification_consent_agreement_obtained

  - name: intentional_program_violation_by_administrative_disqualification_hearing
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 4.803.2(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.803.2
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          intentionally_made_false_or_misleading_statement_or_misrepresented_concealed_or_withheld_facts
          or intentionally_committed_snap_violation_for_benefits_or_access_device_purpose

  - name: intentional_program_violation_determination_supported
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 4.803.2(C), (E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.803.2
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          clear_and_convincing_evidence_demonstrates_household_member_committed_ipv
          and clear_and_convincing_evidence_demonstrates_household_member_intended_to_commit_ipv
          and local_office_met_burden_of_proving_ipv_or_fraud

  - name: repeated_same_act_may_be_separated_for_separate_disqualification_periods
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 4.803.2(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.803.2
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not same_act_of_ipv_or_fraud_repeated_over_period_of_time

  - name: administrative_disqualification_hearing_disqualification_must_begin_by_deadline
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 4.803.2(F)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.803.2
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.803.2
              excerpt: "no later than the second month"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          ipv_or_fraud_determined_through_administrative_disqualification_hearing
          and individual_notified_in_writing_of_disqualification
          and disqualification_period_begins_no_later_than_month_number_after_notice <= administrative_disqualification_hearing_start_deadline_months_after_notice

  - name: waiver_disqualification_begins_with_required_month
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 4.803.2(F)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.803.2
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.803.2
              excerpt: "first month which follows"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          ipv_or_fraud_determined_through_signed_waiver_of_administrative_disqualification_hearing
          and household_member_received_written_notification_of_disqualification
          and disqualification_period_begins_month_number_after_notice == waiver_disqualification_start_months_after_notice

  - name: court_disqualification_initiated_within_required_days
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 4.803.2(F)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.803.2
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.803.2
              excerpt: "within forty-five (45) calendar days"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_determined_through_court_to_be_disqualified_for_ipv_or_fraud
          and court_order_does_not_specify_disqualification_start_date
          and individual_currently_eligible
          and local_office_initiates_disqualification_within_calendar_days <= court_disqualification_initiation_deadline_calendar_days

  - name: consent_agreement_disqualification_begins_under_required_timing
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 4.803.2(F)(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.803.2
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.803.2
              excerpt: "within forty-five (45) calendar days"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          signed_disqualification_consent_agreement_obtained
          and (
            (not court_order_imposes_disqualification_period_or_specifies_start_date
              and disqualification_period_begins_within_calendar_days_from_consent_agreement <= consent_agreement_disqualification_start_deadline_calendar_days)
            or (court_order_imposes_disqualification_period_or_specifies_start_date
              and household_member_disqualified_in_accordance_with_court_order)
          )
