- name: verification_received_within_ten_calendar_days_sets_report_date_to_notification_date
  period: 2026-01
  input:
    us-co:regulations/10-ccr-2506-1/4.602#input.local_office_notified_of_change: true
    us-co:regulations/10-ccr-2506-1/4.602#input.required_verification_received: true
    us-co:regulations/10-ccr-2506-1/4.602#input.calendar_days_from_local_office_notification_to_required_verification_receipt: 10
    us-co:regulations/10-ccr-2506-1/4.602#input.verification_received_during_adverse_action_period: false
  output:
    us-co:regulations/10-ccr-2506-1/4.602#change_considered_reported_on_local_office_notification_date: holds
    us-co:regulations/10-ccr-2506-1/4.602#change_considered_reported_on_verification_receipt_date: not_holds
- name: verification_received_after_ten_calendar_days_sets_report_date_to_verification_receipt_date
  period: 2026-01
  input:
    us-co:regulations/10-ccr-2506-1/4.602#input.local_office_notified_of_change: true
    us-co:regulations/10-ccr-2506-1/4.602#input.required_verification_received: true
    us-co:regulations/10-ccr-2506-1/4.602#input.calendar_days_from_local_office_notification_to_required_verification_receipt: 11
    us-co:regulations/10-ccr-2506-1/4.602#input.verification_received_during_adverse_action_period: false
  output:
    us-co:regulations/10-ccr-2506-1/4.602#change_considered_reported_on_local_office_notification_date: not_holds
    us-co:regulations/10-ccr-2506-1/4.602#change_considered_reported_on_verification_receipt_date: holds
- name: verification_received_during_adverse_action_period_sets_report_date_to_verification_receipt_date
  period: 2026-01
  input:
    us-co:regulations/10-ccr-2506-1/4.602#input.local_office_notified_of_change: true
    us-co:regulations/10-ccr-2506-1/4.602#input.required_verification_received: true
    us-co:regulations/10-ccr-2506-1/4.602#input.calendar_days_from_local_office_notification_to_required_verification_receipt: 10
    us-co:regulations/10-ccr-2506-1/4.602#input.verification_received_during_adverse_action_period: true
  output:
    us-co:regulations/10-ccr-2506-1/4.602#change_considered_reported_on_local_office_notification_date: not_holds
    us-co:regulations/10-ccr-2506-1/4.602#change_considered_reported_on_verification_receipt_date: holds
- name: no_notification_or_verification_does_not_establish_reported_date_under_this_rule
  period: 2026-01
  input:
    us-co:regulations/10-ccr-2506-1/4.602#input.local_office_notified_of_change: false
    us-co:regulations/10-ccr-2506-1/4.602#input.required_verification_received: false
    us-co:regulations/10-ccr-2506-1/4.602#input.calendar_days_from_local_office_notification_to_required_verification_receipt: 10
    us-co:regulations/10-ccr-2506-1/4.602#input.verification_received_during_adverse_action_period: false
  output:
    us-co:regulations/10-ccr-2506-1/4.602#change_considered_reported_on_local_office_notification_date: not_holds
    us-co:regulations/10-ccr-2506-1/4.602#change_considered_reported_on_verification_receipt_date: not_holds
