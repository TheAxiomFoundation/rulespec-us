format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.903.2
  summary: |-
    FNS regulations require prompt State Department notification of lawsuits involving SNAP administration; all SNAP legal proceedings must be brought to the State Department's attention immediately for FNS notification.
rules:
  - name: snap_lawsuit_fns_prompt_notification_requirement_satisfied
    kind: derived
    entity: StateAgency
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.903.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.903.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not lawsuit_involving_administration_of_snap)
          or state_department_notified_fns_promptly_of_lawsuit
  - name: snap_legal_proceeding_state_department_immediate_attention_requirement_satisfied
    kind: derived
    entity: StateAgency
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.903.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.903.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not legal_proceeding_involving_snap)
          or legal_proceeding_brought_to_state_department_attention_immediately
