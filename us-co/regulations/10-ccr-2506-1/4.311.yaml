format: rulespec/v1
module:
  summary: |-
    Colorado's SNAP rule manual requires ABAWDs to satisfy an ABAWD work
    requirement in addition to the general work requirements, identifies
    exceptions for age, medical unfitness, and residence with a minor, and
    applies the three-countable-month time limit. This section restates the
    federal ABAWD time-limit rule in 7 CFR 273.24.
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.311
imports:
  - us:regulations/7-cfr/273/24
rules:
  - name: restates_abawd_exceptions
    kind: source_relation
    source: 10 CCR 2506-1 section 4.311(A)
    source_relation:
      type: restates
      target: us:regulations/7-cfr/273/24#snap_member_abawd_exception_applies
      authority: federal
  - name: restates_abawd_work_requirement
    kind: source_relation
    source: 10 CCR 2506-1 section 4.311(B)
    source_relation:
      type: restates
      target: us:regulations/7-cfr/273/24#snap_member_abawd_fulfilling_work_requirement
      authority: federal
  - name: restates_abawd_countable_month_limit
    kind: source_relation
    source: 10 CCR 2506-1 section 4.311
    source_relation:
      type: restates
      target: us:regulations/7-cfr/273/24#snap_member_abawd_countable_month_limit_exceeded
      authority: federal
  - name: restates_abawd_time_limit_eligibility
    kind: source_relation
    source: 10 CCR 2506-1 section 4.311
    source_relation:
      type: restates
      target: us:regulations/7-cfr/273/24#snap_member_abawd_time_limit_eligible
      authority: federal
