format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.311
  summary: |-
    ABAWDs must fulfill an ABAWD work requirement in addition to the general work requirements. Individuals are not ABAWDs if aged 17 or younger, aged 55 or older, medically certified physically or mentally unfit for employment, or residing in the same physical household with an individual under age 18. The ABAWD work requirement is fulfilled by working, participating in a work program, any combination totaling 20 hours per week or 80 hours monthly, or participating in Colorado Workfare. Failure results in losing eligibility if three countable months accrue within a 36-calendar-month period.
imports:
rules:
