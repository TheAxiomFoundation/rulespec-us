    versions:
      - effective_from: '2025-10-01'
        formula: |-
          member_abawd_weekly_work_hours >= abawd_work_requirement_weekly_hours
          or member_abawd_monthly_work_hours >= abawd_work_requirement_monthly_hours
          or member_participates_in_abawd_work_program_20_hours_weekly
          or member_combined_work_and_work_program_hours_meet_abawd_requirement
          or member_participates_in_and_complies_with_colorado_workfare_program

