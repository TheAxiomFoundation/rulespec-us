  - name: colorado_abawd_medically_certified_unfit_for_employment
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.311(A)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.311
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          member_receiving_temporary_or_permanent_disability_benefits
          or member_obviously_mentally_or_physically_unfit_for_employment_as_determined_by_local_office
          or member_provided_qualified_health_professional_statement_of_unfitness_for_employment

  - name: colorado_abawd_exclusion_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.311(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.311
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.311#colorado_abawd_medically_certified_unfit_for_employment
              output: colorado_abawd_medically_certified_unfit_for_employment
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          member_age <= abawd_exclusion_maximum_minor_age
          or member_age >= abawd_exclusion_minimum_older_age
          or colorado_abawd_medically_certified_unfit_for_employment
          or member_resides_in_same_physical_household_with_individual_under_age_eighteen

  - name: colorado_abawd_fulfilling_work_requirement
    kind: derived
    entity: Person
