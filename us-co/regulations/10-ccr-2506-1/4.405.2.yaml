format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.405.2
  summary: |-
    "The following government payments are received for a specific purpose and are excluded as income." The section lists general exclusions including child nutrition assistance, relocation reimbursements, domestic volunteer payments, NCSA/JTPA-type payments, disaster assistance, WIOA payments subject to on-the-job-training exceptions, energy assistance, Older Americans Act Title V funds for persons age 55 or older, private nonprofit cash donations based on need up to $300 per fiscal quarter, portions of military retirement paid to an ex-spouse, combat-zone additional military payments, certain child-care payments, EITC, Employment First participation cost payments, PASS amounts, radiation exposure payments, family investment center services excluding wages or stipends, Nazi persecution victim payments, crime victim compensation, spina bifida allowances, and numerous American Indian or Alaska Native settlement, judgment, trust, relocation, and tribal payments, with stated caps of $2,000 in specified per-capita/trust-interest contexts and payment amounts of up to $20,000 or $12,000 in specified civil-liberties/Aleut contexts.
rules:
  - name: private_nonprofit_cash_donation_quarterly_cap
    kind: parameter
    dtype: Money
    unit: USD
    source: 10 CCR 2506-1, 4.405.2(A)(10)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.405.2
              excerpt: "not exceeding three hundred dollars ($300) in the aggregate, per fiscal quarter"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          300

  - name: japanese_ancestry_civil_liberties_payment_limit
    kind: parameter
    dtype: Money
    unit: USD
    source: 10 CCR 2506-1, 4.405.2(A)(14)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.405.2
              excerpt: "Payments to U.S. citizens of Japanese ancestry and resident Japanese non-citizens of up to twenty thousand dollars ($20,000) each"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          20000

  - name: eligible_aleut_civil_liberties_payment_limit
    kind: parameter
    dtype: Money
    unit: USD
    source: 10 CCR 2506-1, 4.405.2(A)(14)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.405.2
              excerpt: "payments to certain eligible Aleuts of up to twelve thousand dollars ($12,000) each"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          12000

  - name: ncsa_summer_for_safety_educational_award_amount
    kind: parameter
    dtype: Money
    unit: USD
    source: 10 CCR 2506-1, 4.405.2(A)(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.405.2
              excerpt: "a one thousand dollar ($1,000) post-service educational award"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1000

  - name: older_americans_title_v_minimum_age
    kind: parameter
    dtype: Integer
    source: 10 CCR 2506-1, 4.405.2(A)(9)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.405.2
              excerpt: "persons fifty-five (55) years of age and older"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          55

  - name: wioa_on_the_job_training_minor_age_limit
    kind: parameter
    dtype: Integer
    source: 10 CCR 2506-1, 4.405.2(A)(6)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.405.2
              excerpt: "members under nineteen (19) years of age who are participating in WIOA Programs"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          19

  - name: indian_judgment_or_trust_per_capita_payment_exclusion_limit
    kind: parameter
    dtype: Money
    unit: USD
    source: 10 CCR 2506-1, 4.405.2(B)(2), (B)(13), and (B)(19)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.405.2
              excerpt: "per capita Payments ... of two thousand dollars ($2,000) or less"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          2000

  - name: individual_indian_trust_or_restricted_land_interest_annual_exclusion_limit
    kind: parameter
    dtype: Money
    unit: USD
    source: 10 CCR 2506-1, 4.405.2(B)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.405.2
              excerpt: "interest ... in trust or restricted lands up to two thousand dollars ($2,000) per year"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          2000

  - name: payment_excluded_as_income
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1, 4.405.2(A)-(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.405.2
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          child_nutrition_act_assistance_to_children
          or uniform_relocation_act_reimbursement
          or title_ii_domestic_volunteer_services_payment
          or title_i_vista_payment_excludable_for_snap_or_pa_recipient_at_joining_or_conversion_contract
          or ncsa_title_i_project_payment
          or emergency_or_major_disaster_assistance
          or wioa_payment_excludable_as_income
          or federal_energy_assistance_or_weatherization_or_furnace_repair_payment
          or youth_incentive_or_ceta_title_iv_payment
          or older_americans_title_v_payment_to_person_at_least_minimum_age
          or private_nonprofit_cash_donation_based_on_need
          or military_retirement_property_settlement_payment_to_ex_spouse
          or excludable_military_combat_payment
          or mandatory_military_education_pay_deduction
          or civil_liberties_japanese_ancestry_or_resident_japanese_payment_within_limit
          or civil_liberties_eligible_aleut_payment_within_limit
          or migrant_or_seasonal_farmworker_emergency_assistance_payment
          or wic_in_kind_benefit
          or title_iv_a_child_care_payment
          or agent_orange_settlement_fund_payment
          or at_risk_block_grant_child_care_payment
          or earned_income_tax_credit_payment
          or employment_first_participation_cost_payment
          or pass_amount
          or radiation_exposure_compensation_trust_fund_payment
          or child_care_development_block_grant_care_payment_or_reimbursement
          or public_housing_family_investment_center_service
          or hud_demonstration_earned_income_increase_exclusion
          or nazi_persecution_victim_payment
          or crime_victim_compensation_program_payment
          or vietnam_veteran_child_spina_bifida_allowance
          or alaska_native_claims_settlement_compensation
          or indian_judgment_or_trust_per_capita_payment_within_limit
          or individual_indian_trust_or_restricted_land_interest_within_annual_limit
          or navajo_or_hopi_relocation_assistance_payment
          or submarginal_indian_tribal_land_income
          or sac_and_fox_per_capita_or_trust_fund_payment
          or grand_river_band_ottawa_fund_disposition_payment
          or yakima_or_mescalero_indian_claims_commission_payment
          or maine_indian_claims_settlement_payment
          or turtle_mountain_chippewa_payment
          or blackfeet_grosventre_assiniboine_or_papago_payment
          or red_lake_chippewa_fund_distribution
          or fort_belknap_or_fort_peck_assiniboine_payment
          or old_age_assistance_claims_settlement_payment_within_limit
          or chippewas_lake_superior_per_capita_or_trust_fund_payment
          or white_earth_reservation_land_settlement_payment
          or saginaw_chippewa_payment
          or chippewas_of_mississippi_per_capita_or_trust_fund_payment
          or puyallup_settlement_fund_or_income_payment
          or seminole_judgment_payment_within_limit
          or seneca_nation_settlement_payment_or_income
          or colville_grand_coulee_dam_settlement_payment

  - name: older_americans_title_v_payment_to_person_at_least_minimum_age
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1, 4.405.2(A)(9)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.405.2
              excerpt: "Funds received by persons fifty-five (55) years of age and older under the Senior Community Service Employment Program under Title V"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          older_americans_title_v_payment and recipient_age >= older_americans_title_v_minimum_age

  - name: wioa_payment_excludable_as_income
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1, 4.405.2(A)(6)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.405.2
              excerpt: "Payments, allowances and earnings under WIOA are excluded ... Earnings paid for on-the-job training are still counted ... On-the-job training payments for members under nineteen (19) years of age ... shall be excluded"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          wioa_payment
          and (
            not wioa_on_the_job_training_payment
            or wioa_summer_youth_employment_and_training_program_payment
            or (recipient_age < wioa_on_the_job_training_minor_age_limit and participating_in_wioa_program_and_under_parental_control_of_adult_household_member)
          )

  - name: civil_liberties_japanese_ancestry_or_resident_japanese_payment_within_limit
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1, 4.405.2(A)(14)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.405.2
              excerpt: "Payments to U.S. citizens of Japanese ancestry and resident Japanese non-citizens of up to twenty thousand dollars ($20,000) each"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          civil_liberties_japanese_ancestry_or_resident_japanese_payment and payment_amount <= japanese_ancestry_civil_liberties_payment_limit

  - name: civil_liberties_eligible_aleut_payment_within_limit
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1, 4.405.2(A)(14)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.405.2
              excerpt: "payments to certain eligible Aleuts of up to twelve thousand dollars ($12,000) each"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          civil_liberties_eligible_aleut_payment and payment_amount <= eligible_aleut_civil_liberties_payment_limit

  - name: private_nonprofit_cash_donation_excluded_amount
    kind: derived
    entity: Payment
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1, 4.405.2(A)(10)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.405.2
              excerpt: "cash donations, based upon need ... not exceeding three hundred dollars ($300) in the aggregate, per fiscal quarter"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if private_nonprofit_cash_donation_based_on_need: min(payment_amount, private_nonprofit_cash_donation_quarterly_cap) else: 0

  - name: indian_judgment_or_trust_per_capita_excluded_amount
    kind: derived
    entity: Payment
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1, 4.405.2(B)(2), (B)(13), and (B)(19)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.405.2
              excerpt: "per capita ... of two thousand dollars ($2,000) or less ... The first two thousand dollars ($2,000) of each payment is excluded."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if indian_judgment_or_trust_per_capita_payment: min(payment_amount, indian_judgment_or_trust_per_capita_payment_exclusion_limit) else: 0

  - name: excluded_income_amount
    kind: derived
    entity: Payment
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1, 4.405.2(A)-(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.405.2
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if private_nonprofit_cash_donation_based_on_need: min(payment_amount, private_nonprofit_cash_donation_quarterly_cap) else: if indian_judgment_or_trust_per_capita_payment: min(payment_amount, indian_judgment_or_trust_per_capita_payment_exclusion_limit) else: if individual_indian_trust_or_restricted_land_interest: min(payment_amount, individual_indian_trust_or_restricted_land_interest_annual_exclusion_limit) else: if payment_excluded_as_income: payment_amount else: 0
