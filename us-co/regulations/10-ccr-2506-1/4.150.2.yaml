format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.150.2
  summary: |-
    Records concerning voter registration and declination to register to vote shall be maintained for two years by the local office; these records shall not be part of the SNAP case record and are not subject to subpoena. The local office shall ensure confidentiality, and completed voter registration applications may be used only for voter registration.
rules:
  - name: voter_registration_record_retention_years
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.150.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.150.2
              excerpt: "shall be maintained for two years"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          2

  - name: voter_registration_records_retention_compliant
    kind: derived
    entity: LocalOffice
    dtype: Judgment
    period: Year
    source: 10 CCR 2506-1 section 4.150.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.150.2
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.150.2#voter_registration_record_retention_years
              output: voter_registration_record_retention_years
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          voter_registration_and_declination_records_maintained_years >= voter_registration_record_retention_years

  - name: voter_registration_records_separate_and_nonsubpoenaable
    kind: derived
    entity: LocalOffice
    dtype: Judgment
    period: Year
    source: 10 CCR 2506-1 section 4.150.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.150.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          voter_registration_and_declination_records_not_part_of_snap_case_record
          and voter_registration_and_declination_records_not_subject_to_subpoena

  - name: voter_registration_confidentiality_ensured
    kind: derived
    entity: LocalOffice
    dtype: Judgment
    period: Year
    source: 10 CCR 2506-1 section 4.150.2
    metadata:
      proof:
        atoms:
