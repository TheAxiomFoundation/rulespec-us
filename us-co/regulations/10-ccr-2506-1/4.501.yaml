format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.501
  summary: |-
    Eligibility technicians determining SNAP eligibility may exercise reasonable judgment, also known as PPP, and should consider whether that judgment is reasonable based on their SNAP experience and knowledge.
rules:
  - name: snap_eligibility_reasonable_judgment_consideration_satisfied
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.501
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.501
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not eligibility_technician_making_snap_eligibility_decision)
          or (
              eligibility_technician_considered_whether_judgment_reasonable
              and consideration_based_on_experience_with_and_knowledge_of_snap
          )
