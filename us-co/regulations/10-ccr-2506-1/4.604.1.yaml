format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.604.1
  summary: Before action is taken on reported changes and to determine the effect
    on benefits, additional verification is required for specified unclear information.
    The local office sends a verification request notice with ten calendar days plus
    mailing time, assists if needed, and initiates closure if the household fails
    or refuses to provide verification or request assistance. Older, unrequired, or
    non-conflicting information is not acted on until recertification or periodic
    report. Benefit-increasing changes are verified before adjustment. Prisoner and
    deceased computer matches require a notice of match before action, with removal
    and benefit adjustment if the match is substantiated, unanswered, or insufficiently
    challenged, and no removal or adjustment if invalid.
rules:
- name: unclear_information_age_calendar_day_limit
  kind: parameter
  dtype: Count
  source: 10 CCR 2506-1 section 4.604.1(A)(1)-(2)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.604.1
          excerpt: Fewer than sixty (60) days old
  versions:
  - effective_from: '2025-10-01'
    formula: '60'
- name: verification_response_calendar_day_limit
  kind: parameter
  dtype: Count
  source: 10 CCR 2506-1 section 4.604.1(A)(1)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.604.1
          excerpt: within ten (10) calendar days
  versions:
