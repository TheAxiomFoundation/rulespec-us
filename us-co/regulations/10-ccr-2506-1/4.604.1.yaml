      \ + (standard_mailing_calendar_days))) and process_for_closing_case_initiated\
      \ and notice_of_action_advised_change_occurred_could_not_be_acted_upon and notice_of_action_advised_case_is_being_closed\
      \ and notice_of_action_advised_needed_verification_required_to_continue_participation"
- name: household_may_be_required_to_reapply_after_verification_delay
