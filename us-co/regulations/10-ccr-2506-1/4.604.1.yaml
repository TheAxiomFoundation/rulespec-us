  dtype: Count
  source: 10 CCR 2506-1 section 4.604.1(A)(1) and (B)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.604.1
          excerpt: five (5) additional calendar days for mailing time
  versions:
  - effective_from: '2025-10-01'
