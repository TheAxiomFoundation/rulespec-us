      - path: versions[0].formula
        kind: import
        import:
          target: us-co:regulations/10-ccr-2506-1/4.604.1#verification_response_calendar_day_limit
          output: verification_response_calendar_day_limit
          hash: sha256:local
      - path: versions[0].formula
        kind: import
        import:
          target: us-co:regulations/10-ccr-2506-1/4.604.1#standard_mailing_calendar_days
