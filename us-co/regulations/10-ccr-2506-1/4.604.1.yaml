          output: address_confidentiality_program_mailing_calendar_days
          hash: sha256:local
  versions:
  - effective_from: '2025-10-01'
    formula: "unclear_information_verification_request_required and household_failed_or_refused_to_provide_verification\
      \ and not household_requested_assistance_obtaining_verification and (((household_participates_in_address_confidentiality_program)\
      \ and calendar_days_after_verification_request_without_response > verification_response_calendar_day_limit\
      \ + (address_confidentiality_program_mailing_calendar_days))\n  or (not (household_participates_in_address_confidentiality_program)\
