- name: unclear_information_verification_request_required
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: 10 CCR 2506-1 section 4.604.1(A)(1)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.604.1
      - path: versions[0].formula
        kind: import
        import:
          target: us-co:regulations/10-ccr-2506-1/4.604.1#unclear_information_age_calendar_day_limit
          output: unclear_information_age_calendar_day_limit
          hash: sha256:local
  versions:
  - effective_from: '2025-10-01'
    formula: "local_office_received_information_about_changes_in_household_circumstances\n\
      and local_office_cannot_determine_if_or_how_change_affects_benefits\nand information_age_calendar_days_relative_to_current_month\
      \ < unclear_information_age_calendar_day_limit\nand (\n    information_required_to_have_been_reported_per_simplified_reporting_rules\n\
      \    or information_appears_significantly_conflicting_with_certification_circumstances_including_categorical_eligibility_tier\n\
      )"
- name: unclear_information_verification_request_notice_sent_timely
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: 10 CCR 2506-1 section 4.604.1(A)(1)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.604.1
      - path: versions[0].formula
        kind: import
        import:
          target: us-co:regulations/10-ccr-2506-1/4.604.1#verification_response_calendar_day_limit
          output: verification_response_calendar_day_limit
          hash: sha256:local
      - path: versions[0].formula
        kind: import
        import:
          target: us-co:regulations/10-ccr-2506-1/4.604.1#standard_mailing_calendar_days
          output: standard_mailing_calendar_days
          hash: sha256:local
      - path: versions[0].formula
        kind: import
        import:
          target: us-co:regulations/10-ccr-2506-1/4.604.1#address_confidentiality_program_mailing_calendar_days
          output: address_confidentiality_program_mailing_calendar_days
          hash: sha256:local
  versions:
  - effective_from: '2025-10-01'
    formula: "unclear_information_verification_request_required and verification_request_notice_sent_to_household\
      \ and verification_request_notice_requested_specific_information_or_verification\
      \ and (((household_participates_in_address_confidentiality_program) and verification_request_notice_response_calendar_days\
      \ <= verification_response_calendar_day_limit + (address_confidentiality_program_mailing_calendar_days))\n\
      \  or (not (household_participates_in_address_confidentiality_program) and verification_request_notice_response_calendar_days\
      \ <= verification_response_calendar_day_limit + (standard_mailing_calendar_days)))\
      \ and ( not household_cannot_obtain_information or local_office_assisted_client_in_obtaining_verification\
      \ )"
- name: unclear_information_case_closure_process_initiated
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: 10 CCR 2506-1 section 4.604.1(A)(1)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
