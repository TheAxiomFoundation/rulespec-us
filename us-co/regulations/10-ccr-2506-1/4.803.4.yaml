format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.803.4
  summary: |-
    Whenever the local office has accumulated evidence to substantiate an intentional program violation, the IPV shall be determined by an administrative disqualification hearing, signed waiver, or court disqualification consent agreement. Before requesting a waiver, evidence must be reviewed by uninvolved staff with sufficient SNAP policy understanding. Administrative disqualification hearings should be initiated in specified non-prosecution circumstances, shall not be requested while the same factual issues are being prosecuted or after prosecutor/court action, and the hearing notice must be sent at least thirty (30) calendar days before the scheduled local hearing. Fair hearings and IPV hearings may be combined if factual issues arise from the same or related circumstances and prior notice is given.
rules:
  - name: administrative_disqualification_hearing_notice_advance_days
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 § 4.803.4(F), (G)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.803.4
              excerpt: "at least thirty (30) calendar days in advance"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: waiver_opportunity_required_before_administrative_disqualification_hearing
    kind: derived
    entity: LocalOffice
    dtype: Judgment
    period: Day
    source: 10 CCR 2506-1 § 4.803.4(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.803.4
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          local_office_determines_evidence_substantiates_ipv_fraud
          and local_office_is_prior_to_initiating_administrative_disqualification_hearing

  - name: waiver_request_may_be_provided_after_required_evidence_review
    kind: derived
    entity: LocalOffice
    dtype: Judgment
    period: Day
    source: 10 CCR 2506-1 § 4.803.4(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.803.4
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          evidence_reviewed_by_staff_member_not_involved_in_household_investigation
          and reviewing_staff_member_has_sufficient_snap_policy_understanding
          and reviewing_staff_member_ensures_policy_correctly_applied
          and reviewing_staff_member_ensures_evidence_meets_clear_and_convincing_criteria

  - name: administrative_disqualification_hearing_should_be_initiated
    kind: derived
    entity: LocalOffice
    dtype: Judgment
    period: Day
    source: 10 CCR 2506-1 § 4.803.4(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.803.4
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_facts_do_not_warrant_civil_or_criminal_prosecution
          or case_previously_referred_for_prosecution_and_declined_by_legal_authority
          or previously_referred_case_had_no_action_within_reasonable_time_and_was_formally_withdrawn_by_local_office

  - name: administrative_hearing_request_prohibited_due_to_prosecution
    kind: derived
    entity: LocalOffice
    dtype: Judgment
    period: Day
    source: 10 CCR 2506-1 § 4.803.4(E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.803.4
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          administrative_hearing_factual_issues_arise_out_of_same_or_related_circumstances
          and (accused_individual_case_currently_referred_for_prosecution
          or action_taken_against_accused_individual_by_prosecutor_or_court)

  - name: administrative_hearing_request_allowed_notwithstanding_prosecution_bar
    kind: derived
    entity: LocalOffice
    dtype: Judgment
    period: Day
    source: 10 CCR 2506-1 § 4.803.4(E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.803.4
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not administrative_hearing_request_prohibited_due_to_prosecution

  - name: notice_of_hearing_sent_timely_for_local_ipv_hearing
    kind: derived
    entity: LocalOffice
    dtype: Judgment
    period: Day
    source: 10 CCR 2506-1 § 4.803.4(F)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.803.4
              excerpt: "Notice of Hearing form shall be sent ... at least thirty (30) calendar days in advance"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          notice_of_hearing_form_sent_to_household_member
          and days_notice_before_scheduled_local_hearing >= administrative_disqualification_hearing_notice_advance_days

  - name: fair_hearing_and_administrative_disqualification_hearing_may_be_combined
    kind: derived
    entity: LocalOffice
    dtype: Judgment
    period: Day
    source: 10 CCR 2506-1 § 4.803.4(G)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.803.4
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          fair_hearing_and_administrative_disqualification_hearing_factual_issues_arise_out_of_same_or_related_circumstances
          and household_receives_prior_notice_hearings_will_be_combined

  - name: household_loses_subsequent_fair_hearing_right_on_claim_amount_after_combined_hearing
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 10 CCR 2506-1 § 4.803.4(G)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.803.4
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          intentional_program_violation_hearing_and_fair_hearing_combined_to_settle_claim_amount_and_determine_whether_ipv_occurred

  - name: household_may_waive_advance_notice_period_for_combined_hearing_on_request
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 10 CCR 2506-1 § 4.803.4(G)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.803.4
              excerpt: "upon request of the household, allow the household to waive the thirty (30) day advance notice period"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          intentional_program_violation_hearing_and_fair_hearing_are_combined
          and household_requests_waiver_of_advance_notice_period
