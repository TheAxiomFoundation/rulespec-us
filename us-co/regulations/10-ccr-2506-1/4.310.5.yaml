format: rulespec/v1
imports:
  - us-co:regulations/10-ccr-2506-1/4.308.1#listed_voluntary_quit_good_cause_reason_established
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.310.5
  summary: |-
    When a household files an initial application or recertification, the local office must determine whether any nonexempt household member voluntarily quit a job of 30 or more hours per week or reduced work effort below 30 hours per week without good cause. Benefits must not be delayed beyond normal processing times pending that determination. A level sanction is imposed if the voluntary quit occurred within 60 calendar days before application or after application but before eligibility determination and was without good cause as defined in section 4.308.1. Individuals who voluntarily quit are ineligible for SNAP and treated as disqualified members; a federal, state, or local government employee dismissed for participating in a strike against that government is considered to have voluntarily quit without good cause. A prior voluntary quit is not a basis for disqualification if the individual later secured comparable employment and lost the new job through no fault of their own.
rules:
  - name: voluntary_quit_prior_application_lookback_calendar_days
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.310.5(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.310.5
              excerpt: "within sixty (60) calendar days prior to the date of application"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          60

  - name: voluntary_quit_weekly_hours_threshold
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.310.5(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.310.5
              excerpt: "job of 30 or more hours a week or reduced his or her work effort to be less than 30 hours a week"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          30

  - name: local_office_voluntary_quit_determination_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.310.5(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.310.5
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.308.1#listed_voluntary_quit_good_cause_reason_established
              output: listed_voluntary_quit_good_cause_reason_established
              hash: sha256:719f1c69c20eb8aec3e469ba1dad690ee387403ab82774803ee8e28e5bd7b2bc
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_filed_initial_application_or_recertification
          and household_member_not_exempt_from_work_requirements
          and (
              job_quit_weekly_hours >= voluntary_quit_weekly_hours_threshold
              or (
                  work_effort_reduced
                  and resulting_weekly_work_hours < voluntary_quit_weekly_hours_threshold
              )
          )
          and not listed_voluntary_quit_good_cause_reason_established

  - name: voluntary_quit_determination_processing_delay_prohibited
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.310.5(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.310.5
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          benefits_delayed_pending_voluntary_quit_determination
          and benefits_delayed_beyond_normal_processing_times

  - name: government_strike_dismissal_voluntary_quit_without_good_cause
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.310.5(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.310.5
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          employee_of_federal_state_or_local_government
          and participated_in_strike_against_that_government
          and dismissed_from_job_because_of_participation_in_strike

  - name: prior_voluntary_quit_not_basis_for_disqualification_after_comparable_job_loss
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.310.5(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.310.5
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          individual_quit_job
          and individual_secured_new_employment_at_comparable_wages_or_hours
          and individual_lost_new_job_through_no_fault_of_own

  - name: voluntary_quit_sanction_condition
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.310.5(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.310.5
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.308.1#listed_voluntary_quit_good_cause_reason_established
              output: listed_voluntary_quit_good_cause_reason_established
              hash: sha256:719f1c69c20eb8aec3e469ba1dad690ee387403ab82774803ee8e28e5bd7b2bc
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (
              (
                  voluntary_quit_occurred_before_application
                  and calendar_days_between_voluntary_quit_and_application <= voluntary_quit_prior_application_lookback_calendar_days
              )
              or voluntary_quit_occurred_after_application_but_before_eligibility_determination
          )
          and not listed_voluntary_quit_good_cause_reason_established
          and not prior_voluntary_quit_not_basis_for_disqualification_after_comparable_job_loss

  - name: voluntary_quit_disqualified_member_ineligible_for_snap
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.310.5(B)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.310.5
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          voluntary_quit_sanction_condition

  - name: abawd_disqualification_period_continues_in_new_household
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.310.5(B)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.310.5
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          disqualified_member_joins_another_household
          and not abawd_disqualification_period_completed
