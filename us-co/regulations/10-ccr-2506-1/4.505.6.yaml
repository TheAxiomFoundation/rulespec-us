format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.505.6
  summary: |-
    SNAP applications must notify households that non-citizen status is subject to USCIS verification, and must include an adult representative's signed perjury attestation to each member's citizenship or non-citizen status. The local office verifies non-citizen eligibility status through USCIS SAVE, documents SAVE use and verification requests in the case record, offers withdrawal or participation without a member who does not want immigration-status verification, provides a reasonable opportunity to submit documentation by the thirtieth calendar day after application or at least ten calendar days after a document request, withholds certification when documentation is not timely provided except during pending federal verification or SSA quarters investigations, uses secondary SAVE when documentation is questionable or primary SAVE is unavailable, takes adverse action with proper notices and fair-hearing opportunity after determining ineligible alien status, and treats untimely later verification as a reported membership change without retroactive benefits.
  deferred_outputs:
    - output: us-co:regulations/10-ccr-2506-1/4.505.6#form_g_845_case_record_copy_when_applicable
      reason: >-
        Section 4.505.6(C) requires a copy of Form G-845 when applicable as incorporated by reference in section 4.000.1, but no copied RuleSpec context provides section 4.000.1.
    - output: us-co:regulations/10-ccr-2506-1/4.505.6#other_refugee_asylee_or_withholding_evidence_accepted
      reason: >-
        Section 4.505.6(C)(2) requires accepting documentation or corroboration that the non-citizen is classified pursuant to INA sections 207, 208, or 243(h), or other conclusive evidence such as a court order under section 243(h); no copied RuleSpec context provides those cited sections.
rules:
  - name: noncitizen_documentation_submission_calendar_day_limit_after_application
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.505.6(E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.505.6
              excerpt: "up to the thirtieth (30th) calendar day following the date of application"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          30

