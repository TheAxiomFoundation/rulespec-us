format: rulespec/v1
module:
  summary: |-
    Colorado's SNAP rule manual values nonexempt resources as of the
    application filing date. Liquid resources use the current redemption rate
    less encumbrances. Non-liquid resources use fair market value from the
    best available source, adjusted for poor or unusable condition when
    warranted, less verified encumbrances. Real property may use a county
    assessor actual value, or current assessed valuation divided by the
    assessment percentage rate, less the amount owed.
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.408.1
rules:
  - name: snap_liquid_resource_value
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.408.1(A)
    versions:
      - effective_from: '2025-10-01'
        formula: max(0, liquid_resource_current_redemption_rate - liquid_resource_encumbrances)
  - name: snap_non_liquid_resource_fair_market_value
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.408.1(B)
    versions:
      - effective_from: '2025-10-01'
        formula: max(0, non_liquid_resource_market_value - non_liquid_resource_condition_adjustment)
  - name: snap_non_liquid_resource_value
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.408.1(B)
    versions:
      - effective_from: '2025-10-01'
        formula: max(0, snap_non_liquid_resource_fair_market_value - non_liquid_resource_verified_encumbrances)
  - name: snap_real_property_fair_market_value
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.408.1(B)
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if real_property_actual_value_reported_by_county_assessor:
              real_property_county_assessor_actual_value
          else:
              real_property_current_assessed_valuation / real_property_assessment_percentage_rate
  - name: snap_real_property_resource_value
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.408.1(B)
    versions:
      - effective_from: '2025-10-01'
        formula: max(0, snap_real_property_fair_market_value - real_property_amount_owed)
