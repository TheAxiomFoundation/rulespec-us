format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707
  summary: |-
    Local offices shall establish issuance and accountability systems ensuring certified eligible households receive benefits, EBT cards are accepted, stored, and protected, benefits are timely distributed in correct amounts, and issuance and reconciliation are properly conducted and accurately reported. Electronic benefit issuance shall be handled through the state department and designated contractor sites through CO/EBTS. Local offices shall separate certification from issuance functions; data entry may be performed by certification or a separate data-entry unit, but not issuance. Issuance offices are responsible for timely and accurate SNAP issuance through an approved accountability and delivery system.
rules:
  - name: local_office_issuance_accountability_system_compliant
    kind: derived
    entity: LocalOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.707(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          local_office_established_issuance_and_accountability_systems
          and issuance_and_accountability_systems_comply_with_snap_issuance_rules
          and issuance_and_accountability_systems_ensure_only_certified_eligible_households_receive_benefits
          and issuance_and_accountability_systems_ensure_ebt_cards_accepted_stored_and_protected_after_delivery_to_receiving_points
          and issuance_and_accountability_systems_ensure_benefits_timely_distributed_in_correct_amounts
          and issuance_and_accountability_systems_ensure_benefit_issuance_and_reconciliation_properly_conducted
          and issuance_and_accountability_systems_ensure_benefit_issuance_and_reconciliation_accurately_reported

  - name: electronic_benefit_issuance_handled_through_co_ebts
    kind: derived
    entity: StateAgency
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.707(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          electronic_benefit_issuance_handled_through_state_department
          and electronic_benefit_issuance_at_designated_contractor_sites_handled_through_co_ebts

  - name: local_office_certification_and_issuance_functions_separated
    kind: derived
    entity: LocalOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.707(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          local_office_assures_separation_of_certification_functions_from_issuance_functions
          and local_office_separation_provides_internal_controls_and_fraud_prevention
          and certification_unit_determines_household_eligibility
          and certification_unit_ensures_household_eligibility_current_and_accurate
          and eligibility_updated_and_maintained_in_automated_system
          and certification_unit_completed_all_automated_system_actions_to_authorize_benefit_issuance
          and (
              case_information_data_entry_completed_by_certification_unit
              or case_information_data_entry_completed_by_separate_data_entry_unit
          )
          and not case_information_data_entry_completed_by_issuance_unit

  - name: issuance_office_benefit_issuance_delivery_system_compliant
    kind: derived
    entity: LocalOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.707(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          issuance_office_timely_issues_snap_benefits_to_eligible_participant_households
          and issuance_office_accurately_issues_snap_benefits_to_eligible_participant_households
          and approved_accountability_and_benefit_issuance_delivery_system_established
          and approved_delivery_system_ensures_eligibility_information_is_data_entered
          and approved_delivery_system_ensures_automated_system_has_issuance_available
          and approved_delivery_system_ensures_only_certified_households_receive_benefits
