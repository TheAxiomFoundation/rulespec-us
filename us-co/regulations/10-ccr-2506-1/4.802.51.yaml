format: rulespec/v1
imports:
  - us-co:regulations/10-ccr-2506-1/4.802.2#continuation_of_benefits_required
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.802.51
  summary: |-
    The DRC shall be informal; the local office shall make every effort to ensure the household understands the specific reasons and applicable rules, have pertinent case-file documents available, schedule within the prior notice period where possible, delay disputed adverse action if the DRC cannot be held in that period unless benefits continuation is waived, schedule contested expedited-service denial DRCs within two working days unless the household requests later, provide reasonable written notice, use an uninvolved presider, provide interpreters or translators when needed, reduce agreements or unresolved disputes to writing, immediately provide the written decision to the client or representative, and forward a copy to the State Department within five working days.
rules:
  - name: expedited_service_denial_drc_scheduling_working_day_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.802.51(B)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.802.51
              excerpt: "within two (2) working days"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          2

  - name: state_department_drc_decision_forwarding_working_day_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.802.51(F)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.802.51
              excerpt: "within five (5) working days"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          5

  - name: adverse_action_delayed_until_drc_when_not_held_in_prior_notice_period
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.802.51(B)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.802.51
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          local_office_cannot_conduct_drc_within_prior_notice_period
          and not household_waives_continuation_of_benefits
          and adverse_action_in_dispute_delayed_until_drc_can_be_held

  - name: expedited_service_denial_drc_scheduled_timely
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.802.51(B)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.802.51
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.802.51#expedited_service_denial_drc_scheduling_working_day_limit
              output: expedited_service_denial_drc_scheduling_working_day_limit
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          drc_requested_to_resolve_contested_denial_of_expedited_service
          and (
              household_requests_drc_be_held_later
              or working_days_after_drc_request_receipt_before_scheduling <= expedited_service_denial_drc_scheduling_working_day_limit
          )

  - name: drc_reasonable_notice_provided
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.802.51(B)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.802.51
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          local_office_provided_reasonable_notice_to_household_of_drc_time_and_location_or_telephone_time
          and drc_notice_was_in_writing

  - name: drc_presider_independent_and_qualified
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 sections 4.802.51(C), 4.802.51(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.802.51
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          drc_presider_not_directly_involved_in_initial_determination
          and individual_who_initiated_disputed_action_did_not_conduct_drc
          and drc_presider_position_knowledge_experience_and_training_enable_validity_determination

  - name: drc_accessibility_support_provided_when_needed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.802.51(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.802.51
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (
              not household_does_not_speak_english_or_is_visually_or_hearing_impaired
          )
          or local_office_provided_interpreter_or_translator

  - name: joint_drc_location_convenient_to_client
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.802.51(E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.802.51
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          two_or_more_local_offices_established_joint_drc_process
          and drc_location_convenient_to_client

  - name: unwarranted_adverse_action_cancelled_after_drc
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.802.51(F)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.802.51
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          additional_information_presented_in_drc_proves_adverse_action_not_warranted
          and case_record_documented
          and notice_of_adverse_action_cancelled

  - name: resolved_drc_written_agreement_and_decision_distribution_complete
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.802.51(F)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.802.51
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.802.51#state_department_drc_decision_forwarding_working_day_limit
              output: state_department_drc_decision_forwarding_working_day_limit
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          dispute_resolved_at_drc
          and presider_reduced_parties_agreement_to_writing
          and written_agreement_signed_by_parties_or_representatives
          and copy_of_written_decision_immediately_provided_to_client_or_representative
          and local_office_forwarded_decision_copy_to_state_department
          and working_days_after_drc_hearing_before_state_department_forwarding <= state_department_drc_decision_forwarding_working_day_limit

  - name: unresolved_drc_written_statement_complete
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.802.51(F)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.802.51
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.802.2#continuation_of_benefits_required
              output: continuation_of_benefits_required
              hash: sha256:7b9252b4d67a67dbbdd90f2a70c03dd70c54d78c1c4124cd2eecffb061f2f044
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          dispute_not_resolved_at_drc
          and presider_prepared_written_statement_that_dispute_was_not_resolved
          and written_statement_explains_client_right_to_request_state_level_fair_hearing
          and written_statement_includes_time_limit_for_requesting_state_level_hearing
          and (
              not continuation_of_benefits_required
              or written_statement_includes_previous_benefit_amount_continuation_pending_final_state_decision_if_state_appeal_timely
          )
