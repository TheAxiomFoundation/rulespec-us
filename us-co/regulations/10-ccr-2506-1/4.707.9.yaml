format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.9
  summary: |-
    The issuance office shall mail EBT cards to all eligible households if the household does not utilize any available in person pick up option. Certified households must be issued EBT cards by the end of the month except when benefits are suspended, cancelled, or reduced. If suspended benefits are resumed, mailed or over-the-counter EBT cards will be staggered through the end of the month or over a five-day period following resumption, which could result in issuance after the suspension month.
rules:
  - name: resumed_benefit_ebt_card_staggering_day_period
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.707.9
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.9
              excerpt: "over a five-day period following the resumption of issuance"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          5

  - name: eligible_household_ebt_card_mailed_when_no_in_person_pickup
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.707.9
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.9
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          eligible_household
          and not household_utilizes_available_in_person_ebt_card_pickup_option
          and issuance_office_mailed_ebt_card_to_household

  - name: certified_household_ebt_card_issued_by_end_of_month_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.707.9
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.9
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          certified_household
          and not benefits_suspended
          and not benefits_cancelled
          and not benefits_reduced
          and ebt_card_issued_by_end_of_month

  - name: resumed_suspended_benefit_ebt_card_issuance_staggered_timely
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.707.9
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.9
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.707.9#resumed_benefit_ebt_card_staggering_day_period
              output: resumed_benefit_ebt_card_staggering_day_period
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          benefits_suspended
          and local_office_received_directive_to_resume_issuance_of_benefits
          and (
              ebt_card_issuance_staggered_through_end_of_month
              or days_following_resumption_over_which_ebt_card_issuance_staggered <= resumed_benefit_ebt_card_staggering_day_period
          )
