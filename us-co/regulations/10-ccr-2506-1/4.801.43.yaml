format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.43
  summary: |-
    Applies to AE, IHE, and IPV claims. Collection action on a claim shall be terminated only in listed situations, including after three years suspended or delinquent, invalid hearing/court determination, all adult members deceased with no estate collection, and claims of $25 or less delinquent for 90 calendar days.
rules:
  - name: suspended_collection_uncollectible_year_threshold
    kind: parameter
    dtype: Decimal
    source: 10 CCR 2506-1, 4.801.43(B)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.43
              excerpt: "suspended for three (3) years"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          3

  - name: delinquent_claim_year_threshold
    kind: parameter
    dtype: Decimal
    source: 10 CCR 2506-1, 4.801.43(B)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.43
              excerpt: "delinquent for a period of three (3) years"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          3

  - name: small_claim_termination_amount_limit
    kind: parameter
    dtype: Money
    unit: USD
    source: 10 CCR 2506-1, 4.801.43(B)(5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.43
              excerpt: "twenty-five dollars ($25) or less"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          25

  - name: small_claim_delinquency_calendar_day_threshold
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1, 4.801.43(B)(5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.43
              excerpt: "delinquent for ninety (90) calendar days"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          90

  - name: claim_collection_action_termination_required
    kind: derived
    entity: Claim
    dtype: Judgment
    period: Day
    source: 10 CCR 2506-1, 4.801.43(B)(3)-(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.43
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          claim_found_invalid_by_administrative_fair_hearing_decision_or_court_determination
          or (all_adult_members_are_deceased and not agency_is_pursuing_collection_from_estate)

  - name: claim_collection_action_termination_permitted
    kind: derived
    entity: Claim
    dtype: Judgment
    period: Day
    source: 10 CCR 2506-1, 4.801.43(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.43
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.43
              excerpt: "twenty-five dollars ($25) or less and delinquent for ninety (90) calendar days"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          claim_collection_action_termination_required
          or collection_action_has_been_suspended_years >= suspended_collection_uncollectible_year_threshold
          or claim_has_been_delinquent_years >= delinquent_claim_year_threshold
          or (claim_balance <= small_claim_termination_amount_limit and claim_has_been_delinquent_calendar_days >= small_claim_delinquency_calendar_day_threshold)

  - name: terminated_claim_reactivation_for_collection_permitted
    kind: derived
    entity: Claim
    dtype: Judgment
    period: Day
    source: 10 CCR 2506-1, 4.801.43(A), (B)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.43
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          false
