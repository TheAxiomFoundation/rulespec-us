format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.311.3
  summary: ABAWDs are not eligible to participate in SNAP if they have received SNAP
    benefits for more than three countable months during a thirty-six month period.
    Countable months accrue when an ABAWD received SNAP for the full benefit month
    but did not meet an exemption or fulfill work requirements; the month an individual
    turns eighteen does not accrue. Good cause temporary absences count as meeting
    work requirements. The time-limit clock resets accrued countable months and ABAWD
    disqualifications every thirty-six calendar months starting July 1, 2023. A denied
    individual may regain eligibility by, in a thirty-calendar-day period, working
    eighty or more hours, complying with a work program for eighty or more hours,
    complying with Workfare under section 4.313, or becoming exempt; after regaining
    eligibility, a one-time consecutive three-month eligibility period may apply after
    failure to continue requirements.
  deferred_outputs:
  - output: us-co:regulations/10-ccr-2506-1/4.311.3#abawd_countable_month_limit
    reason: Generated rule used a local name that collides with a sibling RuleSpec
      export. This output is deferred until it can be encoded with a semantic branch-specific
      name without creating ambiguous sibling imports.
  - output: us-co:regulations/10-ccr-2506-1/4.311.3#abawd_ineligible_due_to_time_limit
    reason: Generated rule depends on an output that validation deferred because it
      flattened thresholded, capped, base-limited, or cross-referenced mechanics,
      or borrowed an unrelated same-named section term.
