format: rulespec/v1
module:
  summary: |-
    Colorado's SNAP rule manual reviews resource transfers for households not
    eligible under expanded or basic categorical eligibility when a household
    member, ineligible non-citizen, or disqualified person transferred
    resources within the 3-month period before application or after the
    household is found eligible. Transfers do not affect eligibility when the
    resources would not otherwise affect eligibility, were sold or traded at or
    near fair market value, were transferred between household members, or were
    transferred for reasons other than SNAP qualification. A knowing transfer
    to qualify for SNAP can disqualify the household for up to 1 year. The
    disqualification table is 1 month for excess resources from 1 dollar
    through 249 dollars, 3 months for 250 dollars through 999 dollars, 6
    months for 1000 dollars through 2999 dollars, 9 months for 3000 dollars
    through 4999 dollars, and 12 months for 5000 dollars or more.
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.408.2
imports:
  - us:policies/usda/snap/fy-2026-cola/deductions
rules:
  - name: snap_resource_transfer_review_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.408.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          not snap_expanded_categorical_eligible
          and not snap_basic_categorical_eligible
          and resource_transfer_by_counted_person_within_review_period
  - name: snap_resource_transfer_exempt_from_disqualification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.408.2(A)
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          transferred_resources_would_not_affect_eligibility
          or transferred_resources_sold_or_traded_at_or_near_fair_market_value
          or resources_transferred_between_same_household_members
          or transfer_reason_other_than_snap_qualification
  - name: snap_resource_transfer_disqualification_applies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.408.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          snap_resource_transfer_review_required
          and resource_transferred_knowingly_to_qualify_for_snap
          and not snap_resource_transfer_exempt_from_disqualification
  - name: snap_transferred_resource_excess_amount
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.408.2(B)
    versions:
      - effective_from: '2025-10-01'
        formula: max(0, nonexempt_transferred_resources + other_countable_resources - snap_asset_limit)
  - name: snap_resource_transfer_disqualification_months
    kind: derived
    entity: Household
    dtype: Integer
    period: Month
    source: 10 CCR 2506-1 section 4.408.2(C)
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if not snap_resource_transfer_disqualification_applies or snap_transferred_resource_excess_amount <= 0:
              0
          elif snap_transferred_resource_excess_amount <= 249:
              1
          elif snap_transferred_resource_excess_amount <= 999:
              3
          elif snap_transferred_resource_excess_amount <= 2999:
              6
          elif snap_transferred_resource_excess_amount <= 4999:
              9
          else: 12
