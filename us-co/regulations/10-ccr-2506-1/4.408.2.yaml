  dtype: Judgment
  period: Month
  source: 10 CCR 2506-1 section 4.408.2
  versions:
  - effective_from: '2025-10-01'
    formula: 'not snap_expanded_categorical_eligible

      and not snap_basic_categorical_eligible

      and resource_transfer_by_counted_person_within_review_period'
  metadata:
