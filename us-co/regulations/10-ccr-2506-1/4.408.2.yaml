format: rulespec/v1
module:
  summary: 'Colorado''s SNAP rule manual reviews resource transfers for households
    not

    eligible under expanded or basic categorical eligibility when a household

    member, ineligible non-citizen, or disqualified person transferred

    resources within the 3-month period before application or after the

    household is found eligible. Transfers do not affect eligibility when the

    resources would not otherwise affect eligibility, were sold or traded at or

    near fair market value, were transferred between household members, or were

    transferred for reasons other than SNAP qualification. A knowing transfer

    to qualify for SNAP can disqualify the household for up to 1 year. The

    disqualification table is 1 month for excess resources from 1 dollar

    through 249 dollars, 3 months for 250 dollars through 999 dollars, 6

    months for 1000 dollars through 2999 dollars, 9 months for 3000 dollars

    through 4999 dollars, and 12 months for 5000 dollars or more.'
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.408.2
  proof_validation:
    required: true
imports:
- us:policies/usda/snap/fy-2026-cola/deductions
