format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.202.33
  summary: |-
    If the local office, with State Department approval and SSA concurrence, chooses to outstation eligibility technicians at SSA offices: SSA provides adequate space; the local office has at least one outstationed technician on duty during all referral periods; specified SSI and Title II households are entitled to file and be interviewed by the technician; SNAP interviews occur on the day of application unless there is insufficient time; the technician may not refuse service based on county or project-area residence for clients residing within the SSA office and State jurisdiction; filed dates and normal/expedited time standards depend on whether the household is entitled to joint processing.
rules:
  - name: ssa_outstationed_technician_space_provided
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.202.33(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.202.33
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not local_office_with_state_approval_and_ssa_concurrence_chose_to_outstation_eligibility_technicians_at_ssa_offices)
          or ssa_provided_adequate_space_for_snap_eligibility_technician_in_ssa_offices

  - name: outstationed_technician_available_during_referral_periods
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.202.33(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.202.33
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not households_referred_for_snap_application_processing_at_ssa_office_during_period)
          or local_office_had_at_least_one_outstationed_technician_on_duty_during_all_referral_periods

  - name: household_entitled_to_outstationed_joint_processing
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.202.33(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.202.33
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_contains_ssi_client
          or (
              household_contains_title_ii_applicant_or_recipient
              and county_and_ssa_have_agreement_to_process_title_ii_households_at_ssa_offices
          )

  - name: outstationed_joint_processing_filing_and_interview_right_provided
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.202.33(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.202.33
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_entitled_to_outstationed_joint_processing
          and household_entitled_to_file_snap_application_with_outstationed_eligibility_technician
          and household_entitled_to_be_interviewed_by_outstationed_eligibility_technician

  - name: outstationed_snap_interview_timing_requirement_met
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.202.33(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.202.33
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          snap_interview_conducted_on_day_of_application
          or (
              insufficient_time_to_conduct_interview_on_day_of_application
              and county_arranged_outstationed_technician_interview_as_soon_as_possible
          )

  - name: outstationed_service_refusal_based_on_local_residence_prohibited
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.202.33(E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.202.33
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          client_resides_within_jurisdiction_served_by_ssa_office_and_state
          and client_does_not_reside_in_county_or_project_area_where_ssa_office_is_located
          and outstationed_eligibility_technician_refused_service_because_client_does_not_reside_in_county_or_project_area_where_ssa_office_is_located

  - name: non_ssa_jurisdiction_county_resident_application_forwarding_sufficient
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.202.33(E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.202.33
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          person_not_residing_within_ssa_office_jurisdiction_but_resides_within_county_jurisdiction
          and county_forwarded_forms_to_correct_local_office

  - name: outstationed_technician_eligibility_determination_path_permitted
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.202.33(F)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.202.33
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          county_permitted_outstationed_eligibility_technician_to_determine_household_eligibility
          or county_required_completed_applications_forwarded_elsewhere_for_eligibility_determination

  - name: joint_processing_application_filed_on_technician_submission_date
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.202.33(G)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.202.33
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_entitled_to_outstationed_joint_processing
          and application_submitted_to_outstationed_eligibility_technician
          and application_considered_filed_on_date_submitted_to_outstationed_technician
          and normal_service_time_standard_began_on_date_submitted_to_outstationed_technician
          and expedited_service_time_standard_began_on_date_submitted_to_outstationed_technician

  - name: non_joint_processing_application_forwarded_and_filed_on_local_office_receipt
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.202.33(H)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.202.33
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          not household_entitled_to_outstationed_joint_processing
          and household_obtained_and_submitted_snap_application_at_ssa_office
          and outstationed_eligibility_technician_forwarded_application_to_correct_local_office
          and application_considered_filed_upon_receipt_by_correct_local_office
          and normal_service_time_standard_began_on_correct_local_office_receipt_date
          and expedited_service_time_standard_began_on_correct_local_office_receipt_date
