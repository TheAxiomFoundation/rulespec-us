format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.602
  summary: |-
    A change is reported as of the date the local office is notified if required verification is received within ten calendar days; if verification is obtained after that timeframe or during the adverse action period, the change is reported on the day verification is received.
rules:
  - name: change_report_verification_calendar_day_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.602(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.602
              excerpt: "within ten (10) calendar days"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          10

  - name: change_considered_reported_on_local_office_notification_date
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.602(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.602
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.602#change_report_verification_calendar_day_limit
              output: change_report_verification_calendar_day_limit
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          local_office_notified_of_change
          and required_verification_received
          and calendar_days_from_local_office_notification_to_required_verification_receipt <= change_report_verification_calendar_day_limit
          and not verification_received_during_adverse_action_period

  - name: change_considered_reported_on_verification_receipt_date
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.602(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.602
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.602#change_report_verification_calendar_day_limit
              output: change_report_verification_calendar_day_limit
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          local_office_notified_of_change
          and required_verification_received
          and (
              calendar_days_from_local_office_notification_to_required_verification_receipt > change_report_verification_calendar_day_limit
              or verification_received_during_adverse_action_period
          )
