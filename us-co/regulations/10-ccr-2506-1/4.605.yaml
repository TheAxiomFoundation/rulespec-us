format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.605
  summary: |-
    If SNAP benefits are over-issued because a household fails to timely report required changes, a claim shall be established; upon claim establishment, overpayment notice, explanation, and repayment agreement will be mailed; if discovery is within the certification period and benefits are to be reduced, advance notice of adverse action must be given.
rules:
  - name: untimely_change_reporting_overissuance_claim_establishment_requirement_met
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.605
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.605
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not snap_benefits_over_issued_because_household_failed_timely_report_changes)
          or claim_established

  - name: established_claim_overpayment_materials_mailed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.605
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.605
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not claim_established)
          or (
              notice_of_overpayment_mailed_to_household
              and detailed_explanation_of_why_claim_was_established_mailed_to_household
              and repayment_agreement_mailed_to_household
          )

  - name: certification_period_reduction_advance_adverse_action_notice_requirement_met
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.605
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.605
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not discovery_made_within_certification_period)
          or (not benefits_to_be_reduced)
          or advance_notice_of_adverse_action_given_to_household
