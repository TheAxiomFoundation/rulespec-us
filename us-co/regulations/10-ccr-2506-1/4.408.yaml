format: rulespec/v1
module:
  summary: |-
    Colorado's SNAP rule manual exempts households eligible under Expanded
    Categorical Eligibility or Basic Categorical Eligibility from resource
    eligibility criteria. Other households use anticipated resources after
    section 4.410 exemptions for the issuance month. Sponsor resources counted
    toward a non-citizen household equal the sponsor's total resources less
    2000 dollars and are added to post-exemption countable resources. The
    resulting resource eligibility test is the federal 7 CFR 273.8 resource
    standard using USDA FY 2026 COLA asset limits.
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.408
imports:
  - us:regulations/7-cfr/273/8
  - us:policies/usda/snap/fy-2026-cola/deductions
rules:
  - name: restates_resource_limits
    kind: source_relation
    source: 10 CCR 2506-1 section 4.408(E)
    source_relation:
      type: restates
      target: us:policies/usda/snap/fy-2026-cola/deductions#snap_asset_limit
      authority: federal
    verification:
      values:
        snap_asset_limit_elderly_or_disabled_member: 4500
        snap_asset_limit_other_households: 3000
  - name: snap_categorically_eligible_for_resource_exemption
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.408(A)
    versions:
      - effective_from: '2025-10-01'
        formula: snap_expanded_categorical_eligible or snap_basic_categorical_eligible
  - name: snap_sponsor_resources_counted
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.408(B)
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          if sponsored_noncitizen_household:
              max(0, sponsor_total_resources - 2000)
          else: 0
  - name: snap_countable_resources_for_resource_test
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.408(B)
    versions:
      - effective_from: '2024-10-01'
        formula: snap_countable_resources_after_exemptions + snap_sponsor_resources_counted
  - name: snap_countable_financial_resources
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.408(B)
    versions:
      - effective_from: '2024-10-01'
        formula: snap_countable_resources_for_resource_test
