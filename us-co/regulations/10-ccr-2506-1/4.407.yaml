format: rulespec/v1
imports:
  - us-co:regulations/10-ccr-2506-1/4.407.61#medical_deduction
  - us-co:regulations/10-ccr-2506-1/4.402#snap_monthly_income_conversion_factor
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.407
  summary: |-
    Allowable deductions are subtracted from total monthly gross income to determine monthly net SNAP income. Expenses covered by vendor payments, reimbursements, or excluded vendor payments converted to direct cash payments are not deductible. Households may average fluctuating or less-than-monthly expenses, medical expenses may be averaged as described in Sections 4.407.6 and 4.407.61, weekly or biweekly billed expenses are converted under Section 4.402, legally obligated child support is an income exclusion, and the only income deductions are the standard, earned income, excess shelter, dependent care, and excess medical deductions.
rules:
  - name: snap_expense_deductible_after_vendor_or_reimbursement_exclusion
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.407(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.407
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if expense_covered_by_vendor_payment:
              0
          else:
              if expense_covered_by_reimbursement:
                  0
              else:
                  if expense_covered_by_excluded_vendor_payment_converted_to_direct_cash_payment_under_federally_authorized_demonstration_project:
                      0
                  else: source_expense_amount

  - name: weekly_or_biweekly_billed_expense_monthly_amount
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.407(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.407
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.402#snap_monthly_income_conversion_factor
              output: snap_monthly_income_conversion_factor
              hash: sha256:a4eda84680c5bc2747cc314545168ca60b6fcf289069f3c8a81a4ab43c74dacc
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          billed_expense_amount_per_billing_period * snap_monthly_income_conversion_factor

  - name: allowable_monthly_deductions
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.407(E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.407
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.407.61#medical_deduction
              output: medical_deduction
              hash: sha256:2b3b0ec6dd39109e5e269813c1d68aa6260f3c7834be224f2c3bcabd98d8ebe8
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          standard_deduction_amount
          + earned_income_deduction_amount
          + excess_shelter_deduction_amount
          + dependent_care_deduction_amount
          + medical_deduction

  - name: monthly_net_snap_income
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.407(A), (E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.407
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.407#allowable_monthly_deductions
              output: allowable_monthly_deductions
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          max(0, total_monthly_gross_income - allowable_monthly_deductions)

  - name: legally_obligated_child_support_income_exclusion
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.407(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.407
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          legally_obligated_child_support_amount

  - name: averaged_expense_reporting_requirements_apply
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.407(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.407
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_has_elected_to_average_expenses
