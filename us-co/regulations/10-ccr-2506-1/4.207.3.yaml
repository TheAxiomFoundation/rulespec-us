format: rulespec/v1
module:
  summary: |-
    Colorado's SNAP rule manual determines monthly benefit allotments by
    multiplying SNAP net monthly income by 30 percent, subtracting that result
    from the federally determined maximum benefit for household size, and
    rounding the result down to the nearest dollar. The minimum monthly
    allotment for household sizes 1 through 2 is 24.
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.207.3
imports:
  - us:policies/usda/snap/fy-2026-cola/maximum-allotments
  - us:statutes/7/2017/a
rules:
  - name: restates_regular_allotment
    kind: source_relation
    source: 10 CCR 2506-1 section 4.207.3(A)
    source_relation:
      type: restates
      target: us:statutes/7/2017/a#snap_regular_month_allotment
      authority: federal
  - name: restates_maximum_allotment
    kind: source_relation
    source: 10 CCR 2506-1 section 4.207.3(D)
    source_relation:
      type: restates
      target: us:policies/usda/snap/fy-2026-cola/maximum-allotments#snap_maximum_allotment
      authority: federal
    verification:
      values:
        snap_maximum_allotment_table:
          1: 298
          2: 546
          3: 785
          4: 994
          5: 1183
          6: 1421
          7: 1571
          8: 1789
        snap_maximum_allotment_additional_member: 218
  - name: restates_minimum_allotment
    kind: source_relation
    source: 10 CCR 2506-1 section 4.207.3(D)
    source_relation:
      type: restates
      target: us:statutes/7/2017/a#snap_minimum_monthly_allotment
      authority: federal
  - name: snap_application_denied_for_zero_benefit
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.207.3(B)
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not snap_basic_categorical_eligible)
          and (not snap_expanded_categorical_eligible)
          and household_size >= 3
          and snap_allotment_before_minimum == 0
          and (not initial_application_month)
