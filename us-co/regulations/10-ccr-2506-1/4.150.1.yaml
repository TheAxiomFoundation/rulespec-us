format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.150.1
  summary: |-
    A completed voter registration application shall be transmitted to the county clerk and recorder not later than ten calendar days after acceptance, except applications accepted within five calendar days before the last registration day must be transmitted not later than five calendar days after acceptance.
rules:
  - name: standard_completed_voter_registration_application_transmission_day_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.150.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.150.1
              excerpt: "not later than ten (10) calendar days after the date of acceptance"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          10

  - name: pre_registration_deadline_acceptance_window_days
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.150.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.150.1
              excerpt: "accepted within five (5) calendar days before the last day for registration to vote"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          5

  - name: pre_registration_deadline_completed_voter_registration_application_transmission_day_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.150.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.150.1
              excerpt: "not later than five (5) calendar days after the date of acceptance"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          5

  - name: completed_voter_registration_application_accepted_within_pre_registration_deadline_window
    kind: derived
    entity: VoterRegistrationApplication
    dtype: Judgment
    period: Day
    source: 10 CCR 2506-1 section 4.150.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.150.1
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.150.1#pre_registration_deadline_acceptance_window_days
              output: pre_registration_deadline_acceptance_window_days
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          completed_voter_registration_application
          and calendar_days_between_acceptance_date_and_last_day_for_registration_to_vote >= 0
          and calendar_days_between_acceptance_date_and_last_day_for_registration_to_vote <= pre_registration_deadline_acceptance_window_days

  - name: completed_voter_registration_application_transmission_day_limit
    kind: derived
    entity: VoterRegistrationApplication
    dtype: Count
    period: Day
    source: 10 CCR 2506-1 section 4.150.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.150.1
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.150.1#standard_completed_voter_registration_application_transmission_day_limit
              output: standard_completed_voter_registration_application_transmission_day_limit
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.150.1#pre_registration_deadline_completed_voter_registration_application_transmission_day_limit
              output: pre_registration_deadline_completed_voter_registration_application_transmission_day_limit
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.150.1#completed_voter_registration_application_accepted_within_pre_registration_deadline_window
              output: completed_voter_registration_application_accepted_within_pre_registration_deadline_window
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if completed_voter_registration_application_accepted_within_pre_registration_deadline_window: pre_registration_deadline_completed_voter_registration_application_transmission_day_limit else: standard_completed_voter_registration_application_transmission_day_limit

  - name: completed_voter_registration_application_transmitted_timely
    kind: derived
    entity: VoterRegistrationApplication
    dtype: Judgment
    period: Day
    source: 10 CCR 2506-1 section 4.150.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.150.1
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.150.1#completed_voter_registration_application_transmission_day_limit
              output: completed_voter_registration_application_transmission_day_limit
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          completed_voter_registration_application
          and application_transmitted_to_county_clerk_and_recorder_for_county_in_which_local_office_is_located
          and calendar_days_after_acceptance_when_application_transmitted <= completed_voter_registration_application_transmission_day_limit
