format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.1
  summary: |-
    Claims shall be classified as agency error claims when the over-issuance is caused by local-office error; inadvertent household error claims when the over-issuance is caused by household misunderstanding or unintentional error; and IPV/fraud claims only after an ADH official or court finding, a signed ADH waiver, or a signed disqualification consent agreement. Before waiver, consent agreement, or IPV/fraud determination, the household claim is handled as an inadvertent household error claim.
rules:
  - name: snap_claim_local_office_error_cause
    kind: derived
    entity: SnapClaim
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.801.1(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.1
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          over_issuance_caused_by_local_office_error
          or local_office_failed_to_take_prompt_action_on_household_reported_change
          or local_office_incorrectly_computed_income_or_deductions_or_assigned_incorrect_allotment
          or local_office_continued_snap_after_certification_period_expired_without_recirtification
          or local_office_failed_to_reduce_snap_when_pa_grant_changed

  - name: snap_agency_error_claim
    kind: derived
    entity: SnapClaim
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.801.1(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.1
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.801.1#snap_claim_local_office_error_cause
              output: snap_claim_local_office_error_cause
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          snap_claim_local_office_error_cause

  - name: snap_household_unintentional_error_cause
    kind: derived
    entity: SnapClaim
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.801.1(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.1
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          over_issuance_caused_by_household_misunderstanding_or_unintentional_error
          or household_unintentionally_failed_to_provide_correct_or_complete_information
          or household_unintentionally_failed_to_report_changes_in_circumstances
          or household_unintentionally_received_continued_hearing_benefits_based_on_mistaken_belief_of_entitlement
          or (
              household_was_receiving_snap_solely_because_of_basic_categorical_eligibility
              and household_subsequently_determined_ineligible_for_cw_or_ssi_during_benefit_receipt
              and claim_based_on_change_in_net_income_or_household_size
          )
          or (
              ssa_failed_to_act_resulting_in_basic_categorical_eligibility_and_improper_ssi_receipt
              and claim_based_on_change_in_net_income_or_household_size
          )

  - name: snap_ipv_fraud_claim_determination_or_agreement
    kind: derived
    entity: SnapClaim
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.801.1(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.1
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          adh_official_or_court_found_household_member_committed_ipv_or_fraud
          or signed_adh_waiver_received
          or signed_disqualification_consent_agreement_obtained

  - name: snap_ipv_fraud_claim
    kind: derived
    entity: SnapClaim
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.801.1(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.1
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.801.1#snap_ipv_fraud_claim_determination_or_agreement
              output: snap_ipv_fraud_claim_determination_or_agreement
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          snap_ipv_fraud_claim_determination_or_agreement

  - name: snap_inadvertent_household_error_claim
    kind: derived
    entity: SnapClaim
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.801.1(B) and 4.801.1(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.1
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.801.1#snap_household_unintentional_error_cause
              output: snap_household_unintentional_error_cause
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.801.1#snap_ipv_fraud_claim_determination_or_agreement
              output: snap_ipv_fraud_claim_determination_or_agreement
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          snap_household_unintentional_error_cause
          or (
              claim_against_household_prior_to_ipv_fraud_waiver_consent_or_determination
              and not snap_ipv_fraud_claim_determination_or_agreement
          )
