format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.700
  summary: |-
    CO/EBTS allows electronic debiting of benefits onto an EBT card for certified eligible households. Every household must be informed of available issuance accommodations; local offices must provide adequate issuance locations and hours; SNAP benefits issued to eligible households may be used for eligible food in every state.
rules:
  - name: ebt_electronic_debiting_allowed_for_certified_eligible_household
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.700
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.700
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not household_is_certified_eligible)
          or electronic_debiting_of_benefits_onto_ebt_card_allowed_for_household

  - name: issuance_accommodation_information_requirement_met
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.700
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.700
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          issuance_accommodations_are_available
          and household_informed_of_available_issuance_accommodations

  - name: snap_benefits_interstate_eligible_food_purchase_use_allowed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.700
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.700
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not snap_benefits_issued_to_eligible_household)
          or benefits_may_be_used_to_purchase_eligible_food_in_every_state

  - name: local_office_issuance_locations_and_hours_adequate
    kind: derived
    entity: LocalOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.700
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.700
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          local_office_provided_adequate_number_of_issuance_locations
          and local_office_provided_adequate_hours_of_operation_for_eligible_households_to_receive_ebt_cards
