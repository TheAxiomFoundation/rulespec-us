format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.309.41
  summary: |-
    Group living arrangements must provide signed current-resident lists to the local office monthly or semimonthly, report changes when acting as authorized representative, give departing households their EBT card and required remaining benefits, cease acting as authorized representative after departure, not pull benefits after departure, return EBT cards within five calendar days, provide a change report form and ten-day reporting advice, bear liability for knowing misrepresentation, fraud, losses, misuse, and resident over-issuances, and ensure SNAP benefits are used for meals intended for each resident.
  deferred_outputs:
    - output: us-co:regulations/10-ccr-2506-1/4.309.41#own_applicant_household_change_reporting_under_section_4_603
      reason: >-
        Section 4.309.41(B) requires a resident household that applied on its own behalf to report changes in accordance with Section 4.603, but no copied RuleSpec context provides Section 4.603.
rules:
  - name: departure_before_partial_month_benefit_cutoff_day
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.309.41(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.309.41
              excerpt: "prior to the sixteenth (16th) of the month"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          16

  - name: pre_cutoff_departure_benefit_fraction
    kind: parameter
    dtype: Rate
    source: 10 CCR 2506-1 section 4.309.41(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.309.41
              excerpt: "one half of his/her monthly allotment"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          1 / 2

  - name: ebt_card_return_calendar_day_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.309.41(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.309.41
              excerpt: "within five (5) calendar days"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          5

  - name: change_report_return_calendar_day_advice_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.309.41(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.309.41
              excerpt: "within ten (10) days"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          10

  - name: resident_participation_list_furnished_and_verified
    kind: derived
    entity: GroupLivingArrangement
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.309.41(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.309.41
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          group_living_arrangement_provided_currently_participating_resident_list_to_local_office
          and local_office_required_resident_list_monthly_or_semimonthly
          and resident_list_signed_by_responsible_center_official_attesting_validity
          and local_office_conducted_periodic_random_onsite_visits_for_list_accuracy_and_records_currency

  - name: authorized_representative_change_notice_provided
    kind: derived
    entity: GroupLivingArrangement
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.309.41(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.309.41
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not group_living_arrangement_acts_as_authorized_representative)
          or (
              local_office_notified_of_household_income_or_circumstance_changes
              and local_office_notified_when_individual_leaves_group_living_arrangement
          )

  - name: departing_household_ebt_card_provided
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.309.41(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.309.41
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_left_group_living_facility
          and group_living_arrangement_acted_as_authorized_representative_or_retained_use_of_benefits
          and resident_provided_with_ebt_card

  - name: departing_household_authorized_issuance_receipt_allowed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.309.41(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.309.41
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_left_group_living_facility
          and household_allowed_to_receive_authorized_issuance
          and not group_living_arrangement_allowed_to_receive_departing_household_authorized_issuance

  - name: departing_household_benefit_amount_due
    kind: derived
    entity: Household
    dtype: Money
    unit: USD
    period: Month
    source: 10 CCR 2506-1 section 4.309.41(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.309.41
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.309.41#departure_before_partial_month_benefit_cutoff_day
              output: departure_before_partial_month_benefit_cutoff_day
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.309.41#pre_cutoff_departure_benefit_fraction
              output: pre_cutoff_departure_benefit_fraction
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if not household_left_group_living_facility:
              0
          else:
              if no_benefits_spent_on_behalf_of_individual_household:
                  monthly_allotment
              else:
                  if benefits_already_issued_and_any_portion_spent_on_behalf_of_individual and household_departure_day_of_month < departure_before_partial_month_benefit_cutoff_day:
                      monthly_allotment * pre_cutoff_departure_benefit_fraction
                  else:
                      0

  - name: authorized_representative_status_ended_after_departure
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.309.41(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.309.41
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          resident_left_group_living_arrangement
          and not group_living_arrangement_continued_to_act_as_authorized_representative_after_departure

  - name: post_departure_ebt_benefit_pull_prohibited
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.309.41(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.309.41
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          resident_or_group_of_residents_left_group_living_facility
          and group_living_arrangement_pulled_benefits_from_ebt_card_after_departure

  - name: departure_ebt_cards_returned_timely
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.309.41(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.309.41
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.309.41#ebt_card_return_calendar_day_limit
              output: ebt_card_return_calendar_day_limit
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          resident_left_group_living_arrangement
          and facility_returned_authorized_representative_ebt_card_to_issuing_office
          and (not resident_card_left_behind or facility_returned_resident_ebt_card_to_issuing_office)
          and calendar_days_after_departure_before_ebt_card_return <= ebt_card_return_calendar_day_limit

  - name: departing_household_change_report_form_and_advice_provided
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.309.41(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.309.41
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.309.41#change_report_return_calendar_day_advice_limit
              output: change_report_return_calendar_day_advice_limit
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          group_living_arrangement_has_knowledge_of_household_plan_to_leave_facility
          and group_living_arrangement_provided_change_report_form_as_soon_as_it_had_knowledge
          and group_living_arrangement_advised_household_to_return_form_to_local_office
          and advised_return_days_after_required_reportable_change <= change_report_return_calendar_day_advice_limit

  - name: group_living_arrangement_responsible_for_knowing_misrepresentation_or_fraud
    kind: derived
    entity: GroupLivingArrangement
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.309.41(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.309.41
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          group_living_arrangement_acts_as_authorized_representative
          and group_living_arrangement_knowingly_committed_misrepresentation_or_fraud_in_certification_of_residents

  - name: facility_strictly_liable_for_resident_benefit_losses_misuse_and_overissuances
    kind: derived
    entity: GroupLivingArrangement
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.309.41(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.309.41
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          benefits_held_on_behalf_of_resident_households_or_overissuance_occurred_while_households_were_residents
          and facility_held_benefits_or_households_were_residents_at_overissuance
          and facility_strictly_liable_for_losses_misuse_or_overissuances

  - name: self_applying_resident_responsible_for_overissuance
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.309.41(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.309.41
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          resident_applied_on_own_behalf
          and resident_responsible_for_overissuance_as_any_other_household

  - name: group_basis_food_purchase_and_preparation_allowed
    kind: derived
    entity: GroupLivingArrangement
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.309.41(E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.309.41
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          group_living_arrangement_purchases_and_prepares_food_for_eligible_residents_on_group_basis
          and (
              residents_normally_obtain_meals_at_central_location_as_part_of_group_living_arrangement_services
              or meals_prepared_at_central_location_for_delivery_to_individual_residents
          )

  - name: individual_consumption_snap_benefits_used_for_intended_resident_meals
    kind: derived
    entity: GroupLivingArrangement
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.309.41(E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.309.41
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          residents_purchase_or_prepare_food_for_individual_consumption
          and group_living_arrangement_ensured_each_resident_snap_benefits_used_for_meals_intended_for_that_resident

  - name: resident_retaining_allotment_food_purchase_options_allowed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.309.41(E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.309.41
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          resident_retains_use_of_own_allotment
          and resident_allowed_to_use_benefits_to_purchase_facility_prepared_meals
          and resident_allowed_to_use_benefits_to_purchase_food_to_prepare_meals_for_own_consumption
