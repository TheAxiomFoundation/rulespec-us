format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.804.1
  summary: |-
    If county prosecutors pursue a disqualification consent agreement, the agreement must give the household advance notice of the consequences and contain specified signature blocks, consequence statements, a SNAP fraud-penalty warning, and a claim-repayment statement. If the suspected household member signs, the member is disqualified unless contrary to the court order; an imposed disqualification continues uninterrupted. Before disqualification, the local office must give written notice of the disqualification and effective date, and must notify remaining household members of their allotment during disqualification or that they must reapply if the certification period expired.
imports:
  - us-co:regulations/10-ccr-2506-1/4.803.2#consent_agreement_disqualification_begins_under_required_timing
rules:
  - name: dca_agreement_content_requirement_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1, Section 4.804.1(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.804.1
              excerpt: "If county prosecutors pursue a DCA, the agreement shall provide the household advance notification of the consequences ... The consent agreement shall contain the following"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (not county_prosecutors_pursue_dca)
          or (
              agreement_provides_household_advance_notification_of_consequences_of_consenting_to_disqualification
              and agreement_contains_accused_individual_understands_consequences_statement_to_sign
              and agreement_contains_accused_individual_signature_block
              and agreement_states_head_of_household_must_sign_if_accused_individual_is_not_head_of_household
              and agreement_contains_head_of_household_signature_block
              and agreement_states_consenting_results_in_disqualification_and_benefit_reduction_without_fraud_or_misrepresentation_guilt_finding
              and agreement_warns_of_snap_fraud_disqualification_penalties_and_states_hearing_office_applicable_penalty
              and agreement_states_remaining_members_responsible_for_resulting_claim_unless_accused_individual_repaid_claim
          )

  - name: dca_disqualification_imposed
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1, Section 4.804.1(B)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.804.1
              excerpt: "If the household member suspected of fraud signs the disqualification consent agreement, the household member shall be disqualified ... unless contrary to the court order."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_member_suspected_of_fraud_signs_disqualification_consent_agreement
          and not court_order_is_contrary_to_disqualification

  - name: dca_disqualification_period_required_timing_satisfied
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1, Section 4.804.1(B)(1) and Section 4.803.2(F)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.804.1
              excerpt: "shall be disqualified in accordance with the disqualification periods specified in Section 4.803.2, F"
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.803.2#consent_agreement_disqualification_begins_under_required_timing
              output: consent_agreement_disqualification_begins_under_required_timing
              hash: sha256:b862eca9fd535c5c7daf3c3e959ff15e9fe94cec7dcf9d0c1d4308fb0d7e3361
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (not dca_disqualification_imposed)
          or consent_agreement_disqualification_begins_under_required_timing

  - name: dca_disqualification_continues_uninterrupted
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1, Section 4.804.1(B)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.804.1
              excerpt: "Once a disqualification penalty has been imposed against a currently participating household member, the period of disqualification shall continue uninterrupted until completed"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          disqualification_penalty_imposed_against_currently_participating_household_member
          and disqualification_period_has_not_been_completed

  - name: dca_disqualification_notice_requirement_satisfied
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1, Section 4.804.1(C)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.804.1
              excerpt: "The notice shall be provided prior to disqualification. The notice shall inform the household member of the disqualification and the date the disqualification will take effect."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (not household_member_suspected_of_fraud_signs_disqualification_consent_agreement)
          or (
              local_office_provides_written_notice_to_household_member_prior_to_disqualification
              and notice_informs_household_member_of_disqualification
              and notice_informs_household_member_of_disqualification_effective_date
          )

  - name: remaining_household_responsible_for_overissuance_repayment
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1, Section 4.804.1(A)(7) and (B)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.804.1
              excerpt: "remaining household members, if any, will be held responsible for repayment of the resulting claim, unless the accused individual has already repaid the claim"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.804.1
              excerpt: "the disqualified member's household shall continue to be responsible for repayment of the over-issuance ... regardless of its eligibility"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_has_remaining_members
          and overissuance_resulted_from_disqualified_members_suspected_fraudulent_act
          and not accused_individual_already_repaid_claim

  - name: remaining_household_notice_requirement_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1, Section 4.804.1(C)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.804.1
              excerpt: "provide to the remaining household members, if any, the allotment they will receive during the period of disqualification or notice that they must reapply because the certification period has expired."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (not household_member_suspected_of_fraud_signs_disqualification_consent_agreement)
          or (not household_has_remaining_members)
          or local_office_provides_remaining_members_allotment_during_disqualification
          or (
              certification_period_has_expired
              and local_office_provides_remaining_members_notice_that_they_must_reapply
          )
