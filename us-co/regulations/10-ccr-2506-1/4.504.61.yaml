format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.504.61
  summary: |-
    Some information received from sources other than the household are not considered VUR and shall be subject to independent verification prior to taking adverse action against a household's SNAP benefits during the certification period. Listed non-VUR sources include specified death, VA, wage, IRS, railroad retirement, PARIS, prisoner, NDNH, Social Security award-letter, and other-state IPV/disqualification information.
rules:
  - name: information_source_not_considered_vur
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.504.61(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.504.61
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          death_information_received_from_source_other_than_burial_assistance_program
          or veterans_assistance_benefit_amounts_obtained_through_ievs
          or wage_data_obtained_through_ievs_or_dole
          or irs_income_and_asset_information_obtained_through_ievs
          or railroad_retirement_benefit_information_obtained_through_ievs
          or information_received_from_paris
          or prisoner_information_received_during_certification_period
          or information_received_from_ndnh
          or social_security_benefit_amounts_reported_via_household_award_letter
          or other_state_ipv_or_disqualification_data_reported_through_disqualified_recipient_database

  - name: adverse_snap_action_without_independent_verification_for_non_vur_information
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.504.61(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.504.61
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.504.61#information_source_not_considered_vur
              output: information_source_not_considered_vur
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          information_received_from_source_other_than_household
          and information_source_not_considered_vur
          and adverse_action_taken_against_household_snap_benefits_during_certification_period
          and not information_independently_verified_before_adverse_action
