format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.903.44
  summary: |-
    For validating the State's QA findings, the FNS Regional Office conducts a sub-sample re-review and may request case records and/or verify aspects of state QA findings. Local offices shall forward selected case records in their entirety as outlined in Section 4.903.41 within ten calendar days of the request.
imports:
  - us-co:regulations/10-ccr-2506-1/4.903.41#qa_requested_case_record_prepared_with_required_contents
rules:
  - name: fns_regional_review_case_record_forwarding_deadline_calendar_days
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.903.44
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.903.44
              excerpt: "within ten (10) calendar days of the request"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          10

  - name: fns_regional_review_case_record_request_authorized
    kind: derived
    entity: LocalOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.903.44
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.903.44
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          fns_regional_office_conducts_subsample_rereview_to_validate_state_qa_findings
          and fns_regional_office_requested_case_records_or_verification

  - name: fns_regional_review_selected_case_records_timely_forwarded
    kind: derived
