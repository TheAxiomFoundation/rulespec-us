            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.903.44
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.903.41#qa_requested_case_record_prepared_with_required_contents
              output: qa_requested_case_record_prepared_with_required_contents
              hash: sha256:4f156af8283c66e6227d215d1588a3d5fa95785335c036d0b156aaee56980062
          - path: versions[0].formula
            kind: import
            import:
