format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.202.3
  summary: |-
    Whenever a member of a household consisting only of SSI clients transacts business at an SSA office, the member may apply for SNAP at the SSA office or local office; SSA informs SSI clients of SNAP availability, refers non-SSI households, accepts and forwards SSI-household SNAP applications within one working day, prescreens and marks apparent expedited applications, and local offices prescreen SSA-forwarded applications on the day received at the correct office and prevent duplicate participation.
  deferred_outputs:
    - output: us-co:regulations/10-ccr-2506-1/4.202.3#ssa_forwarded_expedited_application_certified_under_cited_sections
      reason: >-
        Section 4.202.3(D) requires households entitled to expedited service to be certified in accordance with Sections 4.205.1 and 4.205.11, but no copied RuleSpec context provides those cited provisions.
rules:
  - name: ssa_snap_application_forwarding_working_day_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.202.3(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.202.3
              excerpt: "within one working day"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          1

  - name: ssi_only_household_snap_application_location_right_provided
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.202.3(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.202.3
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not member_of_household_consisting_only_of_ssi_clients_transacts_business_at_ssa_office)
          or (
              member_permitted_to_apply_for_snap_at_ssa_office
              and member_permitted_to_apply_for_snap_at_local_office
          )

  - name: ssa_non_ssi_household_referral_provided
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.202.3(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.202.3
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not household_is_non_ssi_household_at_ssa_office)
          or ssa_office_referred_household_to_correct_local_office

  - name: ssi_client_snap_information_provided_at_ssa
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.202.3(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.202.3
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not ssi_client_at_ssa_office)
          or (
              ssi_client_informed_of_snap_benefit_availability
              and ssi_client_informed_snap_application_available_at_ssa_office
          )

  - name: public_institution_resident_joint_ssi_snap_application_completed_by_ssa
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.202.3(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.202.3
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not resident_of_public_institution_applies_for_ssi_before_release)
          or (
              ssa_office_completed_joint_ssi_and_snap_application
              and client_permitted_to_apply_for_snap_while_applying_for_ssi
          )

  - name: ssa_forwarded_signed_ssi_household_application_timely
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.202.3(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.202.3
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.202.3#ssa_snap_application_forwarding_working_day_limit
              output: ssa_snap_application_forwarding_working_day_limit
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not ssa_office_received_signed_snap_application_from_ssi_household)
          or (
              ssa_office_accepted_and_completed_snap_application
              and ssa_office_used_snap_application
              and ssa_office_transmitted_verification_documentation_obtained
              and ssa_office_forwarded_application_to_appropriate_local_office
              and working_days_after_signed_application_receipt_before_forwarding <= ssa_snap_application_forwarding_working_day_limit
          )

  - name: ssa_misdirected_application_corrected_timely
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.202.3(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.202.3
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.202.3#ssa_snap_application_forwarding_working_day_limit
              output: ssa_snap_application_forwarding_working_day_limit
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not ssa_office_sent_snap_application_and_documentation_to_incorrect_local_office)
          or (
              application_and_documentation_sent_to_correct_office
              and working_days_after_misdirection_before_sent_to_correct_office <= ssa_snap_application_forwarding_working_day_limit
          )

  - name: ssa_expedited_prescreening_and_notice_completed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.202.3(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.202.3
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          ssa_office_prescreened_snap_application_for_expedited_service
          and (
              not household_appears_entitled_to_expedited_service
              or (
                  ssa_office_marked_expedited_processing_on_first_page
                  and ssa_informed_household_benefits_may_be_issued_sooner_if_apply_directly_at_local_office
                  and household_permitted_to_take_application_to_local_office_for_screening_interviewing_and_processing
              )
          )

  - name: local_office_boundary_information_furnished_to_ssa
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.202.3(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.202.3
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not local_office_has_ssa_office_serving_geographical_area)
          or (
              local_office_furnished_ssa_street_map_or_boundary_map
              and local_office_furnished_ssa_addresses_of_local_offices_in_project_area
          )

  - name: local_office_expedited_prescreening_completed_on_receipt_day
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.202.3(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.202.3
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not correct_local_office_received_application_from_ssa_office)
          or local_office_prescreened_application_for_expedited_service_on_day_received

  - name: expedited_processing_standard_begins_on_correct_county_local_office_receipt
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.202.3(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.202.3
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not household_entitled_to_expedited_service_after_ssa_forwarding)
          or expedited_processing_time_standard_began_on_date_application_received_at_local_office_in_correct_county

  - name: local_office_duplicate_participation_prevention_method_implemented
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.202.3(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.202.3
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not ssi_household_application_forwarded_by_ssa_office)
          or local_office_developed_and_implemented_method_to_determine_current_snap_participation
