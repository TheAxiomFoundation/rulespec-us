format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.313
  summary: |-
    In Colorado, the Section 20 Workfare Program is called the Colorado Workfare Program. CDHS must submit an annual Section 20 Workfare State Plan for USDA, FNS approval.
rules:
  - name: colorado_section_20_workfare_program_name
    kind: parameter
    dtype: String
    source: 10 CCR 2506-1 section 4.313
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.313
              excerpt: "is called the Colorado Workfare Program"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          "Colorado Workfare Program"

  - name: cdhs_annual_section_20_workfare_state_plan_submitted_for_approval
    kind: derived
    entity: StateAgency
    dtype: Judgment
    period: Year
    source: 10 CCR 2506-1 section 4.313
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.313
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          state_agency_is_cdhs
          and annual_section_20_workfare_state_plan_submitted
          and section_20_workfare_state_plan_submitted_for_usda_fns_approval
