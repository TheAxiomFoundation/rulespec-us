format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.902.5
  summary: |-
    Each local office shall retain all program records in an orderly fashion for audit and review purposes for no less than three years from the month of origin. Fiscal records and accountable documents are retained for three years from fiscal or administrative closure. IPV disqualification case records and related household notices are retained indefinitely until reliable death information is obtained or national database removal information is received because of the individual's eightieth birthday.
rules:
  - name: program_record_minimum_retention_years
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.902.5
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.902.5
              excerpt: no less than three (3) years from the month of origin
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          3
  - name: fiscal_record_minimum_retention_years_after_closure
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.902.5(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.902.5
              excerpt: fiscal records and accountable documents for three (3) years from the date of fiscal or administrative closure
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          3
  - name: ipv_database_removal_birthday_age
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.902.5(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.902.5
              excerpt: because of the individual's eightieth (80th) birthday
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          80
  - name: program_record_retention_required
    kind: derived
    entity: ProgramRecord
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.902.5
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.902.5
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.902.5#program_record_minimum_retention_years
              output: program_record_minimum_retention_years
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          record_age_years_from_month_of_origin <= program_record_minimum_retention_years
  - name: fiscal_record_retention_required_after_closure
    kind: derived
    entity: ProgramRecord
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.902.5(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.902.5
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.902.5#fiscal_record_minimum_retention_years_after_closure
              output: fiscal_record_minimum_retention_years_after_closure
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          record_is_fiscal_record_or_accountable_document
          and years_since_fiscal_or_administrative_closure <= fiscal_record_minimum_retention_years_after_closure
  - name: ipv_case_record_retention_required
    kind: derived
    entity: ProgramRecord
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.902.5(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.902.5
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.902.5#ipv_database_removal_birthday_age
              output: ipv_database_removal_birthday_age
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          record_relates_to_ipv_disqualification_or_related_household_notice
          and not reliable_information_disqualified_individual_died
          and not (
              information_received_from_national_disqualified_recipient_database_system_records_may_be_removed
              and disqualified_individual_age >= ipv_database_removal_birthday_age
          )
