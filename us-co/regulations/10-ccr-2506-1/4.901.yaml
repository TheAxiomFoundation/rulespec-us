format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.901
  summary: |-
    SNAP shall be administered in every county in accordance with Colorado Department regulations and these rules; local offices administer SNAP unless the State Department has a written agreement for a state-administered county program; local offices must comply with automated-system security and case-processing requirements; counties must obtain State Department approval before using county-developed SNAP forms.
  deferred_outputs:
    - output: us-co:regulations/10-ccr-2506-1/4.901#county_bears_required_administrative_and_program_cost_proportion
      reason: >-
        Section 4.901(B) requires each county to bear the proportion of total administrative and program costs required by Section 26-1-122, C.R.S., but no copied RuleSpec context provides the referenced Section 26-1-122 computation or standard.
rules:
  - name: county_snap_administered_according_to_state_rules
    kind: derived
    entity: County
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.901(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.901
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          snap_administered_in_county
          and snap_administered_in_accordance_with_colorado_department_regulations
          and snap_administered_in_accordance_with_these_rules

  - name: county_snap_administered_by_required_office_or_state_program
    kind: derived
    entity: County
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.901(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.901
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (
              state_department_has_written_agreement_for_state_administered_program_in_county
              and snap_administered_by_state_administered_program_in_county
          )
          or (
              not state_department_has_written_agreement_for_state_administered_program_in_county
              and snap_administered_by_local_office_of_social_or_human_services
          )

  - name: local_office_automated_system_requirements_complied_with
    kind: derived
    entity: LocalOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.901(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.901
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          local_office_complies_with_automated_system_security_requirements
          and local_office_complies_with_automated_system_case_processing_requirements

  - name: county_developed_snap_forms_approved_before_use
    kind: derived
    entity: County
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.901(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.901
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not county_uses_county_developed_forms_in_snap_administration)
          or county_received_state_department_approval_before_using_county_developed_forms
