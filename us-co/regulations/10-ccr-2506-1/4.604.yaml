format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.604
  summary: |-
    Changes to a household's circumstances shall be acted on prospectively and processed within ten calendar days from the date reported. Benefit increases must be acted on, verified before adjustment, and effective no later than the first allotment issued ten or more calendar days after report; certain late-month increases require a supplemental allotment. Benefit decreases and ineligibility changes are processed within ten calendar days and made effective on the last day of the month in which the Notice of Adverse Action expires; NOAA expires after eleven calendar days, or fifteen for ACP households. During certification, the county local office shall not act on benefit-decreasing changes unless one of the listed exceptions applies.
rules:
  - name: reported_change_processing_calendar_day_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.604(A), (C), (D), and (E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.604
              excerpt: "processed within ten (10) calendar days from the date the change is reported"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          10

  - name: standard_notice_of_adverse_action_expiration_calendar_days
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.604(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.604
              excerpt: "The NOAA expires eleven (11) calendar days from the date it is issued"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          11

  - name: address_confidentiality_program_notice_of_adverse_action_expiration_calendar_days
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.604(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.604
              excerpt: "fifteen (15) calendar days for households participating in the address confidentiality program (ACP)"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          15

  - name: no_gross_threshold_or_expanded_eligibility_initial_income_fpl_limit
    kind: parameter
    dtype: Rate
    source: 10 CCR 2506-1 section 4.604(D)(8)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.604
              excerpt: "initially certified with income below one hundred thirty percent (130%) FPL"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          1.30

  - name: expanded_categorical_eligibility_gross_income_fpl_limit
    kind: parameter
    dtype: Rate
    source: 10 CCR 2506-1 section 4.604(D)(8)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.604
              excerpt: "gross income level up to two hundred percent (200%) FPL"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          2.00

  - name: reported_change_general_processing_timely
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.604(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.604
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.604#reported_change_processing_calendar_day_limit
              output: reported_change_processing_calendar_day_limit
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_reported_change_in_circumstances
          and local_office_acted_on_change_prospectively
          and change_documented_in_snap_case_record_with_change_and_report_date
          and calendar_days_from_change_report_to_processing <= reported_change_processing_calendar_day_limit

  - name: notice_of_action_for_allotment_change_issued
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.604(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.604
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          reported_change_causes_change_to_household_allotment
          and notice_of_action_form_issued_to_inform_household_of_new_basis_of_issuance_or_supplemental_allotment

  - name: supplemental_allotment_amount_for_reported_change
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.604(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.604
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if supplemental_allotment_is_to_be_issued: max(0, allotment_household_eligible_to_receive_due_to_reported_change - allotment_household_received_for_current_month) else: 0

  - name: recertification_or_periodic_report_changes_acted_on
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.604(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.604
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_filed_recertification_or_periodic_report
          and local_office_acted_on_all_changes_reported_in_recertification_or_periodic_report

  - name: unrequired_reduction_information_reviewed_at_later_certification_or_periodic_report
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.604(B) and (H)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.604
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_reported_information_during_certification_period_not_required_to_report
          and local_office_documented_information_in_case_record
          and information_was_not_acted_upon_because_it_would_reduce_benefit_allotment
          and not benefit_decreasing_change_may_be_acted_on_during_certification_period
          and local_office_reviewed_information_at_subsequent_certification_or_twelve_month_periodic_report_for_twenty_four_month_certification

  - name: benefit_increase_change_processing_timely
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.604(C)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.604
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_reported_change_that_will_increase_benefits
          and local_office_acted_on_change_that_will_increase_benefits
          and increased_allotment_made_no_later_than_first_allotment_issued_at_least_reported_change_processing_calendar_day_limit_days_after_report
          and increase_takes_effect_month_following_month_change_considered_reported
          and not supplemental_allotment_issued_for_month_in_which_change_occurred

  - name: late_month_increase_supplemental_allotment_timely
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.604(C)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.604
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.604#reported_change_processing_calendar_day_limit
              output: reported_change_processing_calendar_day_limit
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          benefit_increase_change_reported_after_twentieth_of_month
          and not possible_to_adjust_following_month_allotment_before_next_normal_issuance_day
          and supplemental_allotment_issued_in_addition_to_previously_authorized_monthly_allotment
          and calendar_days_from_change_report_to_supplemental_allotment_issuance <= reported_change_processing_calendar_day_limit
          and not supplemental_allotment_issued_for_month_in_which_change_occurred

  - name: benefit_increase_change_verification_completed_before_allotment_adjustment
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.604(C)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.604
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.604#reported_change_processing_calendar_day_limit
              output: reported_change_processing_calendar_day_limit
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          change_results_in_increased_snap_benefits
          and household_provided_verification_of_increase_change
          and calendar_days_from_change_report_to_household_verification <= reported_change_processing_calendar_day_limit
          and change_verified_before_household_allotment_adjusted

  - name: benefit_increase_allotment_remains_original_until_verification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.604(C)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.604
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          change_results_in_increased_snap_benefits
          and household_failed_to_provide_verification
          and benefits_remained_at_original_level_until_verification_obtained

  - name: benefit_decreasing_change_may_be_acted_on_during_certification_period
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.604(D)(1)-(9)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.604
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          change_results_in_decreased_allotment
          and (
              head_of_household_requests_case_closed
              or head_of_household_requests_any_member_removed
              or adult_member_requests_to_be_removed_from_case
              or adult_member_requests_self_and_children_removed_from_case
              or agency_has_information_about_household_circumstances_verified_upon_receipt
              or household_public_assistance_grant_changed
              or agency_is_acting_on_mass_change
              or (
                  household_has_no_gross_income_threshold_or_is_eligible_for_gross_income_level_up_to_expanded_categorical_eligibility_gross_income_fpl_limit
                  and household_initially_certified_with_income_below_no_gross_threshold_or_expanded_eligibility_initial_income_fpl_limit_fpl
                  and household_combined_gross_monthly_income_exceeds_no_gross_threshold_or_expanded_eligibility_initial_income_fpl_limit_fpl_during_certification_period
              )
              or (
                  agency_received_prisoner_verification_system_or_deceased_matching_system_information_member_no_longer_resides_in_home
                  and (
                      household_failed_to_respond_to_notice_of_match
                      or household_provided_insufficient_evidence_to_contrary
                      or household_confirmed_match
                  )
              )
          )

  - name: allotment_decrease_change_processing_timely_and_effective
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.604(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.604
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.604#reported_change_processing_calendar_day_limit
              output: reported_change_processing_calendar_day_limit
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.604#standard_notice_of_adverse_action_expiration_calendar_days
              output: standard_notice_of_adverse_action_expiration_calendar_days
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.604#address_confidentiality_program_notice_of_adverse_action_expiration_calendar_days
              output: address_confidentiality_program_notice_of_adverse_action_expiration_calendar_days
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          benefit_decreasing_change_may_be_acted_on_during_certification_period
          and calendar_days_from_change_considered_reported_to_processing <= reported_change_processing_calendar_day_limit
          and decrease_made_effective_on_last_day_of_month_in_which_notice_of_adverse_action_expires
          and (
              (
                  household_participates_in_address_confidentiality_program
                  and notice_of_adverse_action_expires_calendar_days_from_issuance == address_confidentiality_program_notice_of_adverse_action_expiration_calendar_days
              )
              or (
                  not household_participates_in_address_confidentiality_program
                  and notice_of_adverse_action_expires_calendar_days_from_issuance == standard_notice_of_adverse_action_expiration_calendar_days
              )
          )

  - name: ineligibility_change_processing_timely_and_effective
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.604(E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.604
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.604#reported_change_processing_calendar_day_limit
              output: reported_change_processing_calendar_day_limit
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          change_results_in_household_becoming_ineligible
          and calendar_days_from_change_considered_reported_to_processing <= reported_change_processing_calendar_day_limit
          and (
              change_does_not_require_adverse_action
              or ineligibility_made_effective_on_last_day_of_month_in_which_notice_of_adverse_action_expires
          )

  - name: categorical_eligibility_change_re_evaluated_or_verification_requested
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.604(F)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.604
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_reports_change_during_certification_period_resulting_in_no_longer_meeting_original_categorical_eligibility_tier
          and (
              household_eligibility_re_evaluated_using_next_appropriate_category
              or (
                  reported_categorical_eligibility_change_not_verified_or_questionable
                  and cannot_determine_which_categorical_or_standard_eligibility_criteria_should_be_used
                  and request_for_verification_initiated
              )
          )

  - name: household_composition_change_prospective_determination_completed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.604(G)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.604
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_composition_changed
          and local_office_able_to_affect_change_before_determination_of_following_month_allotment
          and household_composition_change_acted_on_prospectively_for_following_month
          and anticipated_income_deductions_and_financial_and_nonfinancial_criteria_of_new_member_considered
          and anticipated_income_deductions_and_financial_and_nonfinancial_criteria_of_removed_member_no_longer_considered

  - name: remaining_household_members_eligibility_determined_after_member_disqualification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.604(G)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.604
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          individual_disqualified_during_household_certification_period
          and remaining_household_members_eligibility_or_ineligibility_determined_based_on_case_record_information
          and (
              case_record_information_sufficient_for_remaining_member_determination
              or additional_information_obtained_as_needed
          )

  - name: intentional_program_violation_disqualification_notice_to_remaining_members_completed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.604(G)(2)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.604
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_benefits_reduced_or_terminated_within_certification_period_because_member_disqualified_for_intentional_program_violation_or_fraud
          and remaining_members_notified_of_eligibility_and_benefit_level_at_same_time_disqualified_member_notified_of_disqualification

  - name: other_member_disqualification_notice_of_adverse_action_completed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.604(G)(2)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.604
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_benefits_reduced_or_terminated_within_certification_period_because_member_disqualified_for_ineligible_noncitizen_work_requirement_or_social_security_number_failure
          and notice_of_adverse_action_sent_informing_household_of_disqualification
          and notice_of_adverse_action_informs_reason_for_disqualification
          and notice_of_adverse_action_informs_eligibility_and_benefit_level_of_remaining_members
          and notice_of_adverse_action_informs_actions_disqualified_member_must_take_to_end_disqualification
