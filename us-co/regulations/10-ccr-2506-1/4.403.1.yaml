format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.403.1
  summary: |-
    "Self-employment is defined as a situation where some or all income is received from a self-operated business or enterprise" with control, business risks, and expenses. Members in an enterprise for gain are considered self-employed if actively engaged day-to-day; hiring another to handle day-to-day activities means self-employment income but not self-employed for work registration. Work-registration exemption is not automatic and depends on technician assessment and household declaration that the enterprise requires or annually averages thirty hours per week.
rules:
  - name: self_employment_work_hours_per_week_threshold
    kind: parameter
    dtype: Decimal
    source: 10 CCR 2506-1 section 4.403.1(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.403.1
              excerpt: "requires thirty (30) hours of work per week or averages annually thirty (30) hours per week"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: person_self_employed_for_work_registration
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.403.1(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.403.1
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          income_received_from_self_operated_business_or_enterprise
          and individual_retains_control_over_work_or_services_offered
          and individual_assumes_necessary_business_risks_and_expenses
          and individual_actively_engaged_in_enterprise_on_day_to_day_basis

  - name: self_employment_income_without_work_registration_self_employed_status
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.403.1(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.403.1
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_has_self_employment_income
          and another_person_or_firm_hired_or_contracted_to_handle_day_to_day_activities_of_enterprise

  - name: self_employment_hours_support_work_registration_exemption
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.403.1(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.403.1
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.403.1#self_employment_work_hours_per_week_threshold
              output: self_employment_work_hours_per_week_threshold
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          eligibility_technician_assesses_self_employment_enterprise_supports_work_registration_exemption
          and (
              household_declares_self_employment_enterprise_requires_hours_per_week >= self_employment_work_hours_per_week_threshold
              or household_declares_self_employment_enterprise_annual_average_hours_per_week >= self_employment_work_hours_per_week_threshold
          )
