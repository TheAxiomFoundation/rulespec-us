format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.5
  summary: |-
    IPV claims tied to an actual determination of fraud through an ADH or court
    hearing cannot be discharged through bankruptcy. An ADH waiver with an
    admission of fraud or guilt also cannot be discharged; a waiver without such
    an admission has no actual fraud determination. Local offices act as FNS
    agents in bankruptcy proceedings against bankrupt households owing SNAP
    claims and may exercise FNS bankruptcy rights and filing powers.
rules:
  - name: ipv_claim_tied_to_actual_fraud_determination
    kind: derived
    entity: SnapClaim
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.801.5(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.5
              excerpt: fraud through either an ADH or a court hearing
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          fraud_determined_through_administrative_disqualification_hearing
          or fraud_determined_through_court_hearing

  - name: adh_waiver_admits_fraud_or_guilt
    kind: derived
    entity: SnapClaim
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.801.5(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.5
              excerpt: signs an ADH waiver and admits to committing fraud or guilt
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          individual_signed_administrative_disqualification_hearing_waiver
          and individual_admitted_fraud_or_guilt_when_accepting_disqualification

  - name: adh_waiver_without_admission_lacks_actual_fraud_determination
    kind: derived
    entity: SnapClaim
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.801.5(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.5
              excerpt: signs the ADH waiver without admitting to fraud or guilt
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          individual_signed_administrative_disqualification_hearing_waiver
          and not individual_admitted_fraud_or_guilt_when_accepting_disqualification
          and not fraud_determined_through_administrative_disqualification_hearing
          and not fraud_determined_through_court_hearing

  - name: ipv_claim_not_dischargeable_through_bankruptcy
    kind: derived
    entity: SnapClaim
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.801.5(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.5
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.801.5#ipv_claim_tied_to_actual_fraud_determination
              output: ipv_claim_tied_to_actual_fraud_determination
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.801.5#adh_waiver_admits_fraud_or_guilt
              output: adh_waiver_admits_fraud_or_guilt
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          ipv_claim_tied_to_actual_fraud_determination
          or adh_waiver_admits_fraud_or_guilt

  - name: local_office_fns_agent_in_snap_claim_bankruptcy
    kind: derived
    entity: LocalOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.801.5(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.5
              excerpt: act on behalf of, and as an agent of, FNS in any bankruptcy proceedings
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          bankruptcy_proceeding_against_bankrupt_household
