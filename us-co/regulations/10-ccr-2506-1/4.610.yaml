format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.610
  summary: |-
    A household may be eligible for reinstatement of benefits without filing a new application during the remaining month(s) of the certification period if the original closure reason has been resolved and eligibility may be reestablished; the local office may reinstate if the household reports and verifies a change reestablishing eligibility within 30 calendar days following the date of ineligibility; eligible reinstated benefits are prorated from the date the household took all required actions; a new application is needed if the certification period has ended or will end during the reestablishment month.
rules:
  - name: reinstatement_change_reporting_calendar_day_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.610
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.610
              excerpt: "within 30 calendar days following the date of ineligibility"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          30

  - name: household_reinstatement_without_new_application_available
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.610
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.610
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.610#reinstatement_change_reporting_calendar_day_limit
              output: reinstatement_change_reporting_calendar_day_limit
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_is_within_remaining_months_of_certification_period
          and original_closure_reason_resolved
          and eligibility_may_be_reestablished
          and household_reports_change_in_circumstances_that_reestablishes_eligibility
          and household_verifies_reported_change_in_circumstances
          and calendar_days_after_date_of_ineligibility_when_change_reported_and_verified <= reinstatement_change_reporting_calendar_day_limit
          and local_office_reviewed_case_within_standard_processing_timeframes
          and household_continues_to_meet_all_other_eligibility_requirements
          and not certification_period_has_already_ended
          and not certification_period_will_end_during_month_household_attempts_to_reestablish_eligibility

  - name: new_application_needed_for_reestablishment
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.610
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.610
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          certification_period_has_already_ended
          or certification_period_will_end_during_month_household_attempts_to_reestablish_eligibility

  - name: reinstated_snap_benefits_prorated_from_required_actions_date
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.610
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.610
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_eligible_for_reinstatement
          and local_office_prorated_snap_benefits_from_date_household_took_all_required_actions_to_reestablish_eligibility
