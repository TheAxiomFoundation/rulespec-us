format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.304.4
  summary: |-
    Disqualified individuals shall not participate in SNAP as separate households. Fleeing felons and parole or probation violators are not eligible household members when the stated warrant, awareness, avoidance, violation, and actively-seeking conditions are met. Boarding-house and institution residents are not eligible unless exempt in Section 4.304.41; an institution provides more than fifty percent of daily meals and is not authorized by FNS to accept SNAP benefits.
rules:
  - name: abawd_disqualification_benefit_month_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.304.4(A)(5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.304.4
              excerpt: "after receiving three (3) months of SNAP benefits"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          3

  - name: abawd_disqualification_lookback_month_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.304.4(A)(5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.304.4
              excerpt: "within a period of thirty-six (36) months"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          36

  - name: law_enforcement_information_request_active_seeking_day_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.304.4(C)(1)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.304.4
              excerpt: "within twenty (20) days of submitting a request for information"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          20

  - name: local_office_warrant_request_active_seeking_day_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.304.4(C)(1)(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.304.4
              excerpt: "within thirty (30) days of the date of a request from a local office"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          30

  - name: institution_daily_meal_share_threshold
    kind: parameter
    dtype: Rate
    source: 10 CCR 2506-1 section 4.304.4(D)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.304.4
              excerpt: "more than fifty percent (50%) of their daily meals"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          0.50

  - name: student_meal_plan_meal_share_threshold
    kind: parameter
    dtype: Rate
    source: 10 CCR 2506-1 section 4.304.4(D)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.304.4
              excerpt: "more than fifty percent (50%) of his/her meals"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          0.50

  - name: disqualified_individual_separate_household_participation_prohibited
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.304.4(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.304.4
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.304.4#abawd_disqualification_benefit_month_limit
              output: abawd_disqualification_benefit_month_limit
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.304.4#abawd_disqualification_lookback_month_limit
              output: abawd_disqualification_lookback_month_limit
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          individual_seeks_to_participate_in_snap_as_separate_household
          and (
              individual_disqualified_for_ipv_or_fraud
              or individual_disqualified_for_failure_to_provide_or_obtain_ssn
              or individual_is_ineligible_non_citizen
              or individual_disqualified_for_failure_to_comply_with_work_requirements
              or (
                  individual_is_abawd
                  and individual_disqualified_after_receiving_snap_months
                  and snap_benefit_months_received_in_lookback_period >= abawd_disqualification_benefit_month_limit
                  and snap_benefit_lookback_period_months <= abawd_disqualification_lookback_month_limit
              )
              or (
                  individual_has_adult_felony_conviction_for_listed_serious_crime_after_relevant_conduct_date
                  and not individual_in_compliance_with_terms_of_sentence
              )
          )

  - name: law_enforcement_actively_seeking_individual
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.304.4(C)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.304.4
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.304.4#law_enforcement_information_request_active_seeking_day_limit
              output: law_enforcement_information_request_active_seeking_day_limit
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.304.4#local_office_warrant_request_active_seeking_day_limit
              output: local_office_warrant_request_active_seeking_day_limit
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (
              law_enforcement_informed_local_office_it_intends_to_enforce_warrant_or_arrest_for_violation
              and days_after_information_request_to_local_office <= law_enforcement_information_request_active_seeking_day_limit
          )
          or law_enforcement_presented_felony_arrest_warrant
          or (
              law_enforcement_stated_it_intends_to_enforce_warrant_or_arrest_for_violation_after_local_office_request
              and days_after_local_office_request <= local_office_warrant_request_active_seeking_day_limit
          )

  - name: fleeing_felon_snap_ineligible_member
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.304.4(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.304.4
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.304.4#law_enforcement_actively_seeking_individual
              output: law_enforcement_actively_seeking_individual
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          outstanding_felony_warrant_or_new_jersey_high_misdemeanor_warrant_for_crime_or_attempt
          and individual_aware_or_reasonably_expected_warrant_issued_or_would_be_issued
          and individual_took_action_to_avoid_arrest_or_jail
          and law_enforcement_actively_seeking_individual

  - name: parole_or_probation_violator_snap_ineligible_member
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.304.4(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.304.4
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.304.4#law_enforcement_actively_seeking_individual
              output: law_enforcement_actively_seeking_individual
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          impartial_party_determined_individual_violated_probation_or_parole_condition
          and law_enforcement_actively_seeking_individual

  - name: institution_resident
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.304.4(D)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.304.4
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.304.4#institution_daily_meal_share_threshold
              output: institution_daily_meal_share_threshold
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          place_not_authorized_by_fns_to_accept_snap_benefits
          and resident_daily_meal_share_provided_by_place_as_normal_service > institution_daily_meal_share_threshold

  - name: higher_education_student_institution_resident
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.304.4(D)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.304.4
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.304.4#student_meal_plan_meal_share_threshold
              output: student_meal_plan_meal_share_threshold
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          student_purchases_meal_plan_through_institution_of_higher_education
          and student_meal_share_provided_by_meal_plan > student_meal_plan_meal_share_threshold
          and not individual_otherwise_exempt_from_institution_provisions

  - name: boarding_house_or_institution_resident_snap_ineligible
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.304.4(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.304.4
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.304.4#institution_resident
              output: institution_resident
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.304.4#higher_education_student_institution_resident
              output: higher_education_student_institution_resident
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (
              resident_of_commercial_or_noncommercial_boarding_house
              or institution_resident
              or higher_education_student_institution_resident
          )
          and not individual_exempt_under_section_4_304_41

  - name: boarding_house_proprietor_household_separate_participation_available
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.304.4(D)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.304.4
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_is_household_of_boarding_house_proprietor
          and household_participates_separate_and_apart_from_boarding_house_residents
          and household_meets_all_snap_eligibility_requirements
