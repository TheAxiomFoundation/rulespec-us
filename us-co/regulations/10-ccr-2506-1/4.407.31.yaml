format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.407.31
  summary: 'Effective October 1, 2008, a four-tiered mandatory standard utility allowance
    deduction was implemented. Households cannot claim actual utility expenses and
    are only entitled to one of the four utility allowances. Effective October 1,
    2025, Colorado''s standards are: HCUA $594, BUA $377, OUA $71, and telephone standard
    $97.'
