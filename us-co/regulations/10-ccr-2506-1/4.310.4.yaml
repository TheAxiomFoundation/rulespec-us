format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.310.4
  summary: |-
    Individuals exempt from work requirements are not required to report changes in their exemption status during their certification period. At recertification, all individuals subject to work requirements will be reassessed for work requirement exemptions. If an individual loses their exemption status during their certification period, they retain their original work requirement exemption through the certification period unless they are considered an ABAWD.
rules:
  - name: work_requirement_exemption_status_change_reporting_not_required_during_certification_period
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.310.4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.310.4
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          individual_exempt_from_work_requirements
          and individual_is_in_certification_period

  - name: work_requirement_exemption_reassessment_required_at_recertification
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.310.4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.310.4
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          individual_subject_to_work_requirements
          and individual_at_recertification
          and individual_reassessed_for_work_requirement_exemptions

  - name: original_work_requirement_exemption_retained_after_loss_during_certification_period
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.310.4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.310.4
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          individual_loses_work_requirement_exemption_status_during_certification_period
          and individual_is_in_certification_period
          and not individual_considered_abawd
