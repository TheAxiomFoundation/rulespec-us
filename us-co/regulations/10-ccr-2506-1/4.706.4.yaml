format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.706.4
  summary: |-
    No limit shall be placed on replacement of SNAP benefits when food purchased with SNAP benefits was destroyed in a household misfortune. Local offices shall deny or delay apparently fraudulent replacement requests, notify households by Notice of Action when denying or delaying replacement, inform them of county dispute resolution and state fair hearing rights, and not replace benefits while the denial or delay is appealed. Replacement issuances are due within ten calendar days after report of loss, fifteen days if issuance was by certified or registered mail, or within two working days after receiving the signed household statement, whichever is later; late-month replacement requests issue in the next month and are posted and reconciled to the replacement issuance month.
rules:
  - name: replacement_report_loss_standard_calendar_day_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.706.4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.706.4
              excerpt: "within ten (10) calendar days after report of loss"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          10

  - name: replacement_report_loss_mail_calendar_day_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.706.4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.706.4
              excerpt: "fifteen (15) days if issuance was by certified or registered mail"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          15

  - name: replacement_signed_statement_working_day_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.706.4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.706.4
              excerpt: "within two (2) working days of receiving the signed household statement"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          2

  - name: misfortune_destroyed_food_replacement_number_limit_prohibited
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.706.4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.706.4
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not food_purchased_with_snap_benefits_destroyed_in_household_misfortune)
          or not local_office_placed_number_limit_on_replacement_of_benefits

  - name: fraudulent_replacement_request_denied_or_delayed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.706.4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.706.4
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not available_documentation_indicates_replacement_request_appears_fraudulent)
          or local_office_denied_or_delayed_replacement_issuance

  - name: replacement_denial_or_delay_notice_and_appeal_rights_provided
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.706.4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.706.4
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not local_office_intends_to_deny_or_delay_replacement_for_any_reason)
          or (
              household_notified_of_delay_or_denial_using_notice_of_action_form
              and household_informed_of_right_to_county_dispute_resolution_conference
              and household_informed_of_right_to_state_level_fair_hearing
          )

  - name: replacement_not_made_while_denial_or_delay_appealed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.706.4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.706.4
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not replacement_denial_or_delay_is_being_appealed)
          or not replacement_made_while_denial_or_delay_is_being_appealed

  - name: replacement_issuance_report_loss_deadline_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.706.4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.706.4
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.706.4#replacement_report_loss_standard_calendar_day_limit
              output: replacement_report_loss_standard_calendar_day_limit
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.706.4#replacement_report_loss_mail_calendar_day_limit
              output: replacement_report_loss_mail_calendar_day_limit
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (
              replacement_issuance_was_by_certified_or_registered_mail
              and calendar_days_after_report_of_loss_to_replacement_issuance <= replacement_report_loss_mail_calendar_day_limit
          )
          or (
              not replacement_issuance_was_by_certified_or_registered_mail
              and calendar_days_after_report_of_loss_to_replacement_issuance <= replacement_report_loss_standard_calendar_day_limit
          )

  - name: replacement_issuance_signed_statement_deadline_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.706.4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.706.4
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.706.4#replacement_signed_statement_working_day_limit
              output: replacement_signed_statement_working_day_limit
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          working_days_after_receiving_signed_household_statement_to_replacement_issuance <= replacement_signed_statement_working_day_limit

  - name: replacement_issuance_timing_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.706.4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.706.4
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.706.4#replacement_issuance_report_loss_deadline_satisfied
              output: replacement_issuance_report_loss_deadline_satisfied
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.706.4#replacement_issuance_signed_statement_deadline_satisfied
              output: replacement_issuance_signed_statement_deadline_satisfied
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          replacement_issuance_report_loss_deadline_satisfied
          and replacement_issuance_signed_statement_deadline_satisfied

  - name: late_month_replacement_issued_in_next_month_and_reconciled
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.706.4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.706.4
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not replacement_request_made_late_in_issuance_month)
          or (
              replacement_issued_in_month_after_original_allotment_month
              and replacement_posted_to_month_of_replacement_issuance
              and replacement_reconciled_to_month_of_replacement_issuance
          )
