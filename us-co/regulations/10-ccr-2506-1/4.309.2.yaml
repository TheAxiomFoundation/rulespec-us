format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.309.2
  summary: |-
    No restrictions apply to how long a center operates or the number of shelter residents served. The local office determines and documents a shelter's status as a shelter for battered women and children. This subsection applies specifically to centers providing meals; centers not providing meals are not institutions and residents' eligibility is determined under standard eligibility rules.
rules:
  - name: shelter_operation_length_and_resident_count_unrestricted
    kind: derived
    entity: Shelter
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.309.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.309.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          not shelter_restricted_by_length_of_operation
          and not shelter_restricted_by_number_of_residents_served

  - name: battered_women_and_children_shelter_status_determination_documented
    kind: derived
    entity: Shelter
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.309.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.309.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          local_office_determined_status_as_shelter_for_battered_women_and_children
          and local_office_documented_basis_for_shelter_status_determination

  - name: meal_providing_center_subject_to_subsection_rules
    kind: derived
    entity: Shelter
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.309.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.309.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          center_provides_meals_to_residents

  - name: non_meal_center_not_institution_and_standard_eligibility_used
    kind: derived
    entity: Shelter
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.309.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.309.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          not center_provides_meals_to_residents
          and center_not_considered_institution
          and residents_eligibility_determined_using_standard_rules_for_eligibility
