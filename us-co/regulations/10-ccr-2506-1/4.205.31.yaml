format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.205.31
  summary: Any postponement requested by the household that delays the thirty calendar
    day processing is the household's fault. If requested verification is provided
    after the thirtieth day and on or before the sixtieth day from application, the
    local office shall reopen without a new application, prorate benefits from the
    verification date, and consider household changes.
rules:
- name: verification_reopen_after_application_day_lower_bound
  kind: parameter
  dtype: Count
  source: 10 CCR 2506-1 section 4.205.31
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.205.31
          excerpt: after the thirtieth (30th) day
  versions:
  - effective_from: '2025-10-01'
    formula: '30'
- name: verification_reopen_after_application_day_upper_bound
  kind: parameter
  dtype: Count
  source: 10 CCR 2506-1 section 4.205.31
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.205.31
          excerpt: on or before the sixtieth (60th) day from the date of application
  versions:
  - effective_from: '2025-10-01'
    formula: '60'
- name: household_fault_for_postponement_delay
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: 10 CCR 2506-1 section 4.205.31
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.205.31
      - path: versions[0].formula
        kind: import
        import:
          target: us-co:regulations/10-ccr-2506-1/4.205.2#normal_processing_calendar_day_limit
          output: normal_processing_calendar_day_limit
          hash: sha256:62f0459f3e6f788161abcccd16e8d30007210cf30c5c4bec34648df89f760fb0
  versions:
  - effective_from: '2025-10-01'
    formula: 'household_requested_postponement

      and processing_calendar_days_after_application_due_to_postponement > normal_processing_calendar_day_limit'
- name: requested_verification_provided_in_reopen_window
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: 10 CCR 2506-1 section 4.205.31
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.205.31
      - path: versions[0].formula
        kind: import
        import:
          target: us-co:regulations/10-ccr-2506-1/4.205.31#verification_reopen_after_application_day_lower_bound
          output: verification_reopen_after_application_day_lower_bound
          hash: sha256:local
      - path: versions[0].formula
        kind: import
        import:
          target: us-co:regulations/10-ccr-2506-1/4.205.31#verification_reopen_after_application_day_upper_bound
          output: verification_reopen_after_application_day_upper_bound
          hash: sha256:local
  versions:
  - effective_from: '2025-10-01'
    formula: 'household_provided_requested_verification

      and calendar_days_from_application_to_requested_verification > verification_reopen_after_application_day_lower_bound

      and calendar_days_from_application_to_requested_verification <= verification_reopen_after_application_day_upper_bound'
