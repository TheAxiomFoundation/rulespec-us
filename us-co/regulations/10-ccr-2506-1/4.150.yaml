format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.150
  summary: |-
    A client for SNAP benefits shall be provided the opportunity to register to vote, and the local office shall provide all clients the prescribed voter registration application. The local office shall not influence political preference or party registration, display political preference or party allegiance, discourage voter registration, or imply that registration decisions affect services or benefits.
rules:
  - name: snap_client_voter_registration_opportunity_provided
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.150
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.150
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          person_is_client_for_snap_benefits
          and person_provided_opportunity_to_register_to_vote

  - name: snap_client_prescribed_voter_registration_application_provided
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.150
