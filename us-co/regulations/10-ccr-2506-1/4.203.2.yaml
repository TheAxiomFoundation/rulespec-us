format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.203.2
  summary: |-
    The head of household, spouse, or another responsible household member may designate in writing an authorized representative to apply, obtain an EBT card, and/or use the EBT card for the household. The local office assists when a household needs but cannot obtain a representative and must assure proper designation and case-record documentation. Application representatives must know relevant household circumstances and households must be told they are liable for over-issuances from erroneous representative information. Use of an EBT card requires the household's full knowledge and consent. Multiple-household representation is allowed only for bona fide need with specified safeguards, and the only adult non-household member living with minor household members may be their authorized representative.
rules:
  - name: local_office_authorized_representative_assistance_and_designation_assurance_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.203.2(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.203.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (
              (not household_needs_authorized_representative_but_is_unable_to_obtain_one)
              or local_office_assisted_household_in_finding_authorized_representative
          )
          and (
              (not household_designated_authorized_representative_in_writing)
              or (
                  local_office_maintained_authorized_representative_name_in_permanent_case_record
                  and (
                      authorized_representative_is_household_member
                      or local_office_maintained_justification_for_appointing_person_outside_household
                  )
              )
          )

  - name: authorized_representative_application_submission_requirements_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.203.2(A)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.203.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not authorized_representative_submits_application_for_household)
          or (
              authorized_representative_sufficiently_aware_of_relevant_household_circumstances
              and (
                  head_of_household_or_spouse_cannot_prepare_or_review_application
                  or head_of_household_or_spouse_prepared_or_reviewed_application
              )
              and local_office_informed_household_of_liability_for_overissuance_from_erroneous_authorized_representative_information
          )

  - name: household_encouraged_to_name_ebt_card_obtaining_authorized_representative_when_member_can_apply
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.203.2(A)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.203.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not household_member_can_apply_and_obtain_ebt_card)
          or household_encouraged_to_name_authorized_representative_responsible_for_obtaining_ebt_card

  - name: authorized_representative_ebt_card_use_valid
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.203.2(A)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.203.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          authorized_representative_uses_household_ebt_card_to_purchase_food_for_household_consumption
          and authorized_representative_acts_with_full_knowledge_and_consent_of_household

  - name: multiple_household_authorized_representative_arrangement_approved_with_bona_fide_need
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.203.2(A)(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.203.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          authorized_representative_acts_on_behalf_of_more_than_one_household
          and bona_fide_need_for_multiple_household_authorized_representative_arrangement
          and proximity_of_households_considered
          and distance_to_certification_or_issuance_office_considered
          and availability_of_transportation_considered
          and health_of_household_members_considered

  - name: employer_or_multiple_ebt_card_authorized_representative_safeguards_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.203.2(A)(4)(a)-(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.203.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (
              (not employer_designated_as_authorized_representative)
              and not single_authorized_representative_has_access_to_multiple_ebt_cards
          )
          or (
              household_freely_requested_assistance_of_authorized_representative
              and household_circumstances_correctly_stated
              and household_receives_correct_amount_of_benefits
              and authorized_representative_properly_uses_ebt_card
          )

  - name: only_adult_non_household_member_may_represent_minor_household_members
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.203.2(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.203.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          only_adult_living_with_household_is_classified_as_non_household_member
          and individual_is_authorized_representative_for_minor_household_members
