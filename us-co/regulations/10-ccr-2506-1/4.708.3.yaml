format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.708.3
  summary: |-
    The state department shall establish an accounting system to review Form FNS-250 completed by all local offices and determine the propriety and reasonableness of EBT card inventories, issuance activities, and reconciliation records; specified EBT-card records and supporting over-issuance and under-issuance documentation shall be used to assure monthly report accuracy.
rules:
  - name: state_department_ebt_card_accounting_system_review_compliant
    kind: derived
    entity: StateAgency
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.708.3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.708.3
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          state_department_established_accounting_system
          and accounting_system_reviews_form_fns_250_completed_by_all_local_offices
          and accounting_system_determines_propriety_and_reasonableness_of_ebt_card_inventories
          and accounting_system_determines_propriety_and_reasonableness_of_ebt_card_issuance_activities
          and accounting_system_determines_propriety_and_reasonableness_of_ebt_card_reconciliation_records

  - name: monthly_ebt_card_report_accuracy_assured_by_required_records
    kind: derived
    entity: StateAgency
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.708.3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.708.3
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          ebt_card_requisition_records_used_to_assure_monthly_report_accuracy
          and ebt_card_receipt_records_used_to_assure_monthly_report_accuracy
          and returned_mail_ebt_card_issuance_records_used_to_assure_monthly_report_accuracy
          and records_of_replacements_for_ebt_cards_lost_in_mail_used_to_assure_monthly_report_accuracy
          and records_of_replacements_for_improperly_manufactured_ebt_cards_used_to_assure_monthly_report_accuracy
          and records_of_mutilated_ebt_cards_used_to_assure_monthly_report_accuracy
          and supporting_remarks_and_documentation_for_monthly_over_issuance_used_to_assure_monthly_report_accuracy
          and supporting_remarks_and_documentation_for_monthly_under_issuance_used_to_assure_monthly_report_accuracy
