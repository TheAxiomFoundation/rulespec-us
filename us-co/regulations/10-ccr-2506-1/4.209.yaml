format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.209
  summary: |-
    Local offices shall provide notice that a household's certification is about to expire; benefits will not continue beyond the certification period unless recertified. Notice must be received not less than 30 and not more than 60 calendar days before expiration, with two extra mailing days. Households filing by the 15th of the last month, or by the notice-specified date, timely reapply. Required interviews and verification schedules must preserve at least 10 calendar days for verification, and missed interviews require simultaneous missed-interview and denial notices.
rules:
  - name: notice_expiration_minimum_calendar_days_before_expiration
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.209(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.209
              excerpt: "not less than thirty (30) calendar days"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          30

  - name: notice_expiration_maximum_calendar_days_before_expiration
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.209(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.209
              excerpt: "not more than sixty (60) calendar days"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          60

  - name: mailed_notice_delivery_delay_calendar_days
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.209(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.209
              excerpt: "allowing two (2) extra days for delivery delay"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          2

  - name: last_month_timely_reapplication_day
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.209(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.209
              excerpt: "on or before the fifteenth (15th) of the last month"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          15

  - name: notice_response_calendar_day_minimum
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.209(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.209
              excerpt: "gives the household fifteen (15) calendar days to respond"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          15

  - name: household_certified_six_months_or_less_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.209(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.209
              excerpt: "households certified for six (6) months or less"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          6

  - name: interview_recurrence_month_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.209(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.209
              excerpt: "a minimum of once every twelve (12) months"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          12

  - name: verification_calendar_days_before_certification_end_minimum
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.209(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.209
              excerpt: "at least ten (10) calendar days to provide verification"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          10

  - name: recertification_expiration_notice_provided
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.209(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.209
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_certification_about_to_expire
          and notice_of_expiration_provided_to_household
          and notice_advises_certification_period_ending
          and notice_advises_new_application_must_be_filed

  - name: benefits_not_continued_beyond_certification_without_recertification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.209(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.209
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not benefits_continued_beyond_end_of_certification_period)
          or household_recertified

  - name: notice_expiration_received_within_required_window
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.209(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.209
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.209#notice_expiration_minimum_calendar_days_before_expiration
              output: notice_expiration_minimum_calendar_days_before_expiration
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.209#notice_expiration_maximum_calendar_days_before_expiration
              output: notice_expiration_maximum_calendar_days_before_expiration
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          notice_of_expiration_received_calendar_days_prior_to_expiration >= notice_expiration_minimum_calendar_days_before_expiration
          and notice_of_expiration_received_calendar_days_prior_to_expiration <= notice_expiration_maximum_calendar_days_before_expiration

  - name: mailed_notice_expiration_timing_and_response_date_valid
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.209(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.209
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.209#mailed_notice_delivery_delay_calendar_days
              output: mailed_notice_delivery_delay_calendar_days
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.209#notice_response_calendar_day_minimum
              output: notice_response_calendar_day_minimum
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not notice_of_expiration_mailed)
          or (
              mailed_notice_allowed_calendar_days_for_delivery_delay >= mailed_notice_delivery_delay_calendar_days
              and mailed_notice_specified_date_allows_calendar_days_mail_time >= mailed_notice_delivery_delay_calendar_days
              and mailed_notice_specified_date_gives_household_calendar_days_to_respond >= notice_response_calendar_day_minimum
          )

  - name: household_timely_reapplied_for_recertification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.209(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.209
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.209#last_month_timely_reapplication_day
              output: last_month_timely_reapplication_day
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (
              application_filed_in_last_month_of_certification_period
              and application_filed_day_of_last_month <= last_month_timely_reapplication_day
          )
          or recertification_application_submitted_by_notice_specified_date

  - name: required_recertification_interview_completed_within_twelve_months
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.209(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.209
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.209#household_certified_six_months_or_less_limit
              output: household_certified_six_months_or_less_limit
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.209#interview_recurrence_month_limit
              output: interview_recurrence_month_limit
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (household_certification_period_months > household_certified_six_months_or_less_limit)
          or (
              interview_conducted_with_adult_household_member_or_authorized_representative
              and months_since_last_completed_interview <= interview_recurrence_month_limit
          )

  - name: recertification_interview_scheduled_with_verification_time
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.209(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.209
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.209#verification_calendar_days_before_certification_end_minimum
              output: verification_calendar_days_before_certification_end_minimum
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not recertification_interview_required)
          or scheduled_interview_allows_household_calendar_days_to_provide_verification_before_certification_period_ends >= verification_calendar_days_before_certification_end_minimum

  - name: missed_required_interview_notices_mailed_together
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.209(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.209
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not recertification_interview_required)
          or (not household_failed_to_attend_scheduled_interview)
          or (
              notice_of_missed_interview_mailed_to_household
              and notice_of_denial_mailed_to_household
              and missed_interview_notice_and_denial_notice_mailed_at_same_time
          )

  - name: early_recertification_interview_failure_not_denied_and_rescheduled
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.209(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.209
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not interview_scheduled_prior_to_last_month_or_prior_to_timely_application_date)
          or (not household_failed_or_refused_to_appear_for_early_interview)
          or (
              not household_denied_for_failing_or_refusing_early_interview
              and notice_sent_to_reschedule_interview_on_or_after_timely_application_date
          )

  - name: recertification_information_sufficient_for_accurate_eligibility_determination
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.209(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.209
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          recertification_process_elicited_sufficient_information_from_household
          and household_information_combined_with_case_record_ensures_accurate_eligibility_determination

  - name: required_verification_notice_provided_with_due_date
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.209(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.209
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          notice_of_required_verification_provided_to_household
          and notice_of_required_verification_states_date_by_which_verification_must_be_provided
