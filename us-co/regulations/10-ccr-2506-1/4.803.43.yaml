format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.803.43
  summary: 'A. Written notice to the household member suspected of intentional program
    violation must be provided at least thirty (30) calendar days before a local-office
    initiated administrative disqualification hearing.

    B. If no proof of receipt is obtained, a household member''s statement of non-receipt
    is good cause for not appearing; the notice must include hearing details, charges,
    evidence summary, nonappearance warning, ten (10) day good-cause statement, fraud
    disqualification penalties, prosecution/collection statement, free legal-advice
    contact, and local-level/state-level ADH information where applicable.

    B.6. Fraud penalties include twelve (12) months for a first violation, twenty-four
    (24) months for a second violation, permanent disqualification for a third violation,
    ten (10) years for certain identity/residence multiple-benefit fraud except permanent
    on third violation, twenty-four (24) months then permanent for court findings
    of purchasing controlled substances with SNAP benefits, permanent disqualification
    for firearm/ammunition/explosives transactions, and permanent disqualification
    for trafficking benefits of five hundred dollars ($500) or more.

    D. The Administrative Law Judge shall not enter a default for failure to file
    a written answer to the notice of hearing.'
