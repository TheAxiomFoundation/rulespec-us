format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.708.1
  summary: |-
    Local offices shall be liable to USDA/FNS for the face value of EBT card loss from thefts, embezzlements, cashier error, and unexplained causes, unless the investigation was reported directly to USDA/FNS prior to the loss; local offices shall not be liable for EBT cards issued for duplicate issuances in the correct amount that result from authorized replacement issuances.
rules:
  - name: local_office_liable_for_ebt_card_loss_face_value
    kind: derived
    entity: LocalOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.708.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.708.1
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.708.1
              excerpt: "unless the investigation was reported directly to USDA/FNS prior to the loss"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          ebt_card_loss_occurred
          and (
              ebt_card_loss_occurred_because_of_theft
              or ebt_card_loss_occurred_because_of_embezzlement
              or ebt_card_loss_occurred_because_of_cashier_error
              or ebt_card_loss_occurred_because_of_unexplained_causes
          )
          and not investigation_reported_directly_to_usda_fns_prior_to_loss
          and not ebt_cards_issued_for_duplicate_issuances_in_correct_amount_resulting_from_authorized_replacement_issuances

  - name: local_office_not_liable_for_authorized_replacement_duplicate_issuance_value
    kind: derived
    entity: LocalOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.708.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.708.1
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          ebt_cards_issued_for_duplicate_issuances_in_correct_amount_resulting_from_authorized_replacement_issuances
