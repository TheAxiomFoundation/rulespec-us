format: rulespec/v1
module:
  summary: |-
    Colorado's SNAP rule manual calculates monthly self-employment income by
    taking gross self-employment income, including capital gains, subtracting
    allowable costs of doing business, and dividing the net amount by the
    number of months over which the income is intended to cover. When income
    is calculated on an anticipated basis, anticipated capital gains for the
    next 12 months are averaged monthly and combined with anticipated monthly
    self-employment income before anticipated allowable costs are deducted.
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.403.11
rules:
  - name: snap_self_employment_period_gross_income
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.403.11(A)
    versions:
      - effective_from: '2025-10-01'
        formula: self_employment_gross_income_for_period + self_employment_capital_gains_for_period
  - name: snap_self_employment_period_net_income
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.403.11(A)
    versions:
      - effective_from: '2025-10-01'
        formula: snap_self_employment_period_gross_income - allowable_self_employment_business_costs_for_period
  - name: snap_average_monthly_self_employment_income
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.403.11(A)
    versions:
      - effective_from: '2025-10-01'
        formula: snap_self_employment_period_net_income / self_employment_income_period_months
  - name: snap_anticipated_monthly_capital_gains
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.403.11(D)
    versions:
      - effective_from: '2025-10-01'
        formula: anticipated_capital_gains_next_12_months / 12
  - name: snap_anticipated_monthly_net_self_employment_income
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.403.11(D)
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          anticipated_monthly_self_employment_income
          + snap_anticipated_monthly_capital_gains
          - anticipated_monthly_allowable_self_employment_business_costs
  - name: snap_monthly_self_employment_income
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.403.11
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if self_employment_income_calculated_on_anticipated_basis:
              snap_anticipated_monthly_net_self_employment_income
          else: snap_average_monthly_self_employment_income
