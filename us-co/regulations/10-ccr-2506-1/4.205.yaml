format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.205
  summary: |-
    Newly certified households, except expedited-service households, must be given an opportunity to participate no later than thirty calendar days following the application filing date. Expedited-service households must have benefits available no later than the seventh calendar day following the application date. For processing, day one is the first calendar day after the application is received by a local office in the correct county.
  deferred_outputs:
    - output: us-co:regulations/10-ccr-2506-1/4.205#application_processing_delay_cause_determined_under_cited_sections
      reason: >-
        The source requires the local office, after missing the thirty-calendar-day eligibility/opportunity deadline, to determine whether the delay was caused by failure to act by the household or by the local office as outlined in Sections 4.205.3 through 4.205.4. The cited delay-cause standards are not available in copied RuleSpec context, so the affected executable surface is deferred.
rules:
  - name: normal_processing_opportunity_calendar_day_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.205
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.205
              excerpt: "no later than thirty (30) calendar days following the date the application was filed"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          30

  - name: expedited_service_benefit_availability_calendar_day_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.205
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.205
              excerpt: "no later than the seventh calendar day following the date of application"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          7

  - name: application_processing_day_one_calendar_day_offset
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.205
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.205
              excerpt: "day “one” (1) is the first calendar day after the application is received"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          1

  - name: newly_certified_non_expedited_household_opportunity_to_participate_timely
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.205
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.205
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.205#normal_processing_opportunity_calendar_day_limit
              output: normal_processing_opportunity_calendar_day_limit
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not household_newly_certified)
          or household_given_expedited_service
          or (
              household_given_opportunity_to_participate
              and calendar_days_following_application_filing_before_opportunity_to_participate <= normal_processing_opportunity_calendar_day_limit
          )

  - name: expedited_service_household_benefits_available_timely
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.205
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.205
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.205#expedited_service_benefit_availability_calendar_day_limit
              output: expedited_service_benefit_availability_calendar_day_limit
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not household_entitled_to_expedited_service)
          or (
              benefits_available_to_household
              and calendar_days_following_application_before_benefits_available <= expedited_service_benefit_availability_calendar_day_limit
          )

  - name: application_processing_day_one_set_from_correct_county_local_office_receipt
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.205
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.205
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.205#application_processing_day_one_calendar_day_offset
              output: application_processing_day_one_calendar_day_offset
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          application_received_by_local_office_in_correct_county
          and application_processing_day_one_calendar_days_after_receipt == application_processing_day_one_calendar_day_offset
