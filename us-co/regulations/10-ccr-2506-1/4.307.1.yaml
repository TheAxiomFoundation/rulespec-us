format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.307.1
  summary: |-
    Employees qualify under this strike-related list when their workplace is closed by an employer lockout, when they are unable to work because of other striking employees, or when they do not want to cross a picket line due to fear of personal injury or death, excluding sympathy refusals. Persons also qualify when they were exempt from work registration the day before the strike, such as caretakers of a child under six years of age, except persons exempt solely because they were employed.
rules:
  - name: employer_lockout_workplace_closure_condition
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.307.1(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.307.1
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          person_is_employee
          and employee_workplace_closed_by_employer_lockout

  - name: unable_to_work_due_to_other_striking_employees_condition
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.307.1(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.307.1
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          person_is_employee
          and employee_unable_to_work_as_result_of_other_striking_employees

  - name: picket_line_fear_of_injury_or_death_condition
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.307.1(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.307.1
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.307.1
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          person_is_employee
          and employee_does_not_want_to_cross_picket_line_due_to_fear_of_personal_injury_or_death
          and not employee_refuses_to_cross_picket_line_due_to_sympathy_with_strike

  - name: prior_day_work_registration_exemption_condition
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.307.1(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.307.1
              excerpt: "exempt from work registration the day before the strike"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.307.1
              excerpt: "other than those exempt solely on the ground that they were employed"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          person_exempt_from_work_registration_day_before_strike
          and not person_exempt_from_work_registration_day_before_strike_solely_because_employed
