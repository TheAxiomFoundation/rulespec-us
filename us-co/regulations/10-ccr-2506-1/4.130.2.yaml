format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.130.2
  summary: |-
    Households can only purchase eligible foods with SNAP benefits. Eligible foods include food or food products intended for human consumption, except alcoholic beverages, tobacco, and hot food sold above room temperature for immediate consumption, and seeds and plants to grow foods for personal consumption by eligible household members.
rules:
  - name: human_consumption_food_snap_eligible
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.130.2(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.130.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          food_or_food_product_intended_for_human_consumption
          and not food_or_food_product_is_alcoholic_beverage
          and not food_or_food_product_is_tobacco
          and not food_or_food_product_is_hot_food_sold_above_room_temperature_for_immediate_consumption

  - name: seeds_or_plants_snap_eligible
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.130.2(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.130.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          item_is_seed_or_plant
          and item_used_to_grow_foods_for_personal_consumption_by_eligible_household_members

  - name: snap_eligible_food
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.130.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.130.2
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.130.2#human_consumption_food_snap_eligible
              output: human_consumption_food_snap_eligible
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.130.2#seeds_or_plants_snap_eligible
              output: seeds_or_plants_snap_eligible
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          human_consumption_food_snap_eligible
          or seeds_or_plants_snap_eligible
