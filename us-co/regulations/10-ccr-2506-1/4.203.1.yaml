format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.203.1
  summary: |-
    The local office shall allow a household to select an adult parent of children living in the household, or an adult with parental control over children under 18 living in the household, as head of household if all adult members agree. The designation may be made each certification, but not changed during a certification period unless household composition changes. The designation shall not be used to impose special requirements; if the household cannot or does not choose, the local office may make a reasonable determination. If the only adult in the home is ineligible for SNAP and not required to be included, that adult can be designated as head and apply for unemancipated minors.
rules:
  - name: household_head_selection_valid
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.203.1(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.203.1
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          all_adult_household_members_agree_to_head_selection
          and (
              selected_head_is_adult_parent_of_children_of_any_age_living_in_household
              or selected_head_is_adult_with_parental_control_over_children_under_18_living_in_household
          )

  - name: head_designation_change_during_certification_period_permitted
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.203.1(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.203.1
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_changes_head_designation_during_certification_period
          and household_composition_changed_during_certification_period

  - name: head_designation_change_during_certification_period_prohibited
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.203.1(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.203.1
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_changes_head_designation_during_certification_period
          and not household_composition_changed_during_certification_period

  - name: head_designation_special_requirements_imposed_prohibited
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.203.1(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.203.1
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          local_office_used_head_designation_to_impose_special_requirement
          or local_office_required_head_rather_than_other_responsible_member_to_appear_to_apply_for_benefits

  - name: local_office_reasonable_head_determination_permitted
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.203.1(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.203.1
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (
              household_not_able_to_select_head_of_household
              or eligible_household_does_not_choose_to_select_head_of_household
          )
          and local_office_made_reasonable_head_of_household_determination
          and local_office_understood_head_is_usually_member_with_most_knowledge_of_household_financial_circumstances

  - name: ineligible_only_adult_may_be_head_and_apply_for_unemancipated_minors
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.203.1(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.203.1
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          only_adult_living_in_home_not_eligible_for_snap
          and only_adult_living_in_home_not_required_to_be_included_in_household
          and only_adult_designated_as_head_of_household
          and only_adult_applies_on_behalf_of_unemancipated_minors_in_home
