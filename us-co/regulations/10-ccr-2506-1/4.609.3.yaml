format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.609.3
  summary: |-
    In the final month of the transitional period, the household must undergo recertification to determine continued eligibility and benefit amount.
rules:
  - name: transitional_final_month_recertification_requirement_met
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.609.3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.609.3
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not household_is_in_final_month_of_transitional_period)
          or (
              household_underwent_recertification_process
              and recertification_process_determined_household_continued_eligibility
              and recertification_process_determined_household_benefit_amount
          )
