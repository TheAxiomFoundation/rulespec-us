    us-co:regulations/10-ccr-2506-1/4.208#input.benefits_continued_beyond_end_of_certification_period: true
    us-co:regulations/10-ccr-2506-1/4.208#input.new_determination_of_eligibility_completed: false
    us-co:regulations/10-ccr-2506-1/4.208#input.further_snap_eligibility_established_after_certification_period_expiration: true
