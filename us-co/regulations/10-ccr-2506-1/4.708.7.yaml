format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.708.7
  summary: |-
    EBT Cards will be accounted for on Form FNS-135 and destroyed under procedures pertaining to Form FNS-471; a copy of Form FNS-135 will be retained in the household's case file for audit purposes.
rules:
  - name: ebt_card_accounting_and_destruction_requirement_met
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.708.7
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.708.7
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not asset_is_ebt_card)
          or (
              ebt_card_accounted_for_on_form_fns_135
              and ebt_card_destroyed_under_form_fns_471_procedures
          )

  - name: form_fns_135_copy_retention_requirement_met
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.708.7
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.708.7
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not household_has_form_fns_135_for_return_or_exchange_of_food_coupons)
          or form_fns_135_copy_retained_in_household_case_file_for_audit_purposes
