format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.507
  summary: |-
    Verification of dependent and child care expenses is required to grant a deduction. A household's declaration of responsibility and amount for shelter and utility costs is acceptable unless questionable; special verification rules apply to unoccupied homes, questionable shelter expenses not verified within thirty calendar days, and restoration after later verification. Medical bills, reimbursable portions, recertification changes over $25, reported medical-expense changes, and one-time expenses in twenty-four-month certifications have stated verification and deduction treatment. Child-support obligation and actual-payment verification are separately required, with special rules for child support services agency payments and re-verification at recertification or periodic report.
rules:
  - name: questionable_shelter_verification_calendar_day_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.507(B)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.507
              excerpt: "within thirty (30) calendar days from the date of application"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          30

  - name: shelter_restoration_verification_calendar_day_minimum
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.507(B)(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.507
              excerpt: "at least ten (10) calendar days to provide verification"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          10

  - name: medical_expense_reverification_change_threshold
    kind: parameter
    dtype: Money
    unit: USD
    source: 10 CCR 2506-1 section 4.507(C)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.507
              excerpt: "changed more than twenty-five dollars ($25)"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          25

  - name: extended_certification_months_for_one_time_medical_expense_option
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.507(C)(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.507
              excerpt: "Households certified for twenty-four (24) months"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          24

  - name: first_twelve_months_of_certification_period
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.507(C)(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.507
              excerpt: "during the first twelve (12) months"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          12

  - name: dependent_care_expense_verification_required_for_deduction
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.507(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.507
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not dependent_or_child_care_expense_deduction_granted)
          or dependent_and_child_care_expenses_verified

  - name: household_shelter_declaration_acceptable_verification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.507(B)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.507
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_declared_responsibility_to_pay_shelter_and_utility_costs
          and household_declared_amount_responsible_to_pay
          and not shelter_and_utility_cost_declaration_questionable

  - name: unoccupied_home_shelter_cost_verification_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.507(B)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.507
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not household_claims_shelter_costs_for_unoccupied_home_due_to_employment_training_illness_abandonment_natural_disaster_or_casualty_loss)
          or (
              (not actual_utility_costs_would_result_in_deduction or actual_utility_costs_verified)
              and (not other_shelter_cost_questionable_and_would_result_in_deduction or other_shelter_costs_verified)
          )

  - name: questionable_shelter_expense_disallowed_after_verification_delay
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.507(B)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.507
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.507#questionable_shelter_verification_calendar_day_limit
              output: questionable_shelter_verification_calendar_day_limit
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          shelter_expense_questionable
          and days_from_application_until_verification_available > questionable_shelter_verification_calendar_day_limit
          and local_office_determined_eligibility_and_benefit_level_without_unverified_expense_deduction

  - name: later_verified_questionable_shelter_costs_handled_as_reported_change
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.507(B)(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.507
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_subsequently_provided_missing_verification_for_questionable_shelter_costs
          and missing_verification_information_handled_as_reported_change

  - name: restoration_due_for_disallowed_questionable_shelter_cost
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.507(B)(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.507
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.507#shelter_restoration_verification_calendar_day_minimum
              output: shelter_restoration_verification_calendar_day_minimum
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_subsequently_provided_missing_verification_for_questionable_shelter_costs
          and household_lost_benefits_due_to_disallowance_of_expense_not_verified_within_thirty_day_period
          and (
              calendar_days_given_to_provide_verification < shelter_restoration_verification_calendar_day_minimum
              or necessary_second_interview_could_only_be_scheduled_between_twentieth_and_thirtieth_day_of_processing_period
          )

  - name: initial_medical_bill_and_reimbursement_verification_completed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.507(C)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.507
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not initial_certification_medical_expense_deduction_considered)
          or (
              amount_of_medical_bills_verified
              and reimbursable_portion_of_medical_bills_verified
          )

  - name: recertification_medical_expense_reverification_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.507(C)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.507
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.507#medical_expense_reverification_change_threshold
              output: medical_expense_reverification_change_threshold
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          at_recertification
          and (
              medical_expense_source_changed
              or total_medical_expense_amount_changed_since_last_verification > medical_expense_reverification_change_threshold
              or medical_expense_information_incomplete_inaccurate_inconsistent_or_outdated
          )

  - name: reported_medical_expense_increase_verified_and_acted_on
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.507(C)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.507
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_reports_change_in_medical_expenses
          and change_will_increase_household_benefit_allotment
          and local_office_verified_medical_expense_change
          and local_office_acted_on_medical_expense_change_during_certification_period

  - name: discovered_medical_expense_change_contact_prohibited
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.507(C)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.507
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          medical_expense_change_discovered_through_another_source
          and local_office_contacted_household_to_verify_discovered_medical_expense_change

  - name: one_time_medical_expense_deduction_option_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.507(C)(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.507
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.507#extended_certification_months_for_one_time_medical_expense_option
              output: extended_certification_months_for_one_time_medical_expense_option
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.507#first_twelve_months_of_certification_period
              output: first_twelve_months_of_certification_period
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_certification_period_months == extended_certification_months_for_one_time_medical_expense_option
          and household_incurred_one_time_medical_expense
          and (
              (
                  one_time_medical_expense_incurred_month_of_certification_period <= first_twelve_months_of_certification_period
                  and (
                      household_chose_one_month_deduction_for_one_time_medical_expense
                      or household_chose_average_over_remainder_of_first_twelve_months
                      or household_chose_average_over_remainder_of_certification_period
                  )
              )
              or (
                  one_time_medical_expense_incurred_month_of_certification_period > first_twelve_months_of_certification_period
                  and (
                      household_chose_one_month_deduction_for_one_time_medical_expense
                      or household_chose_average_over_remaining_months_in_certification_period
                  )
              )
          )

  - name: child_support_legal_obligation_document_accepted
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.507(D)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.507
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_provided_document_verifying_legal_obligation_to_pay_child_support
          and local_office_accepted_child_support_legal_obligation_document

  - name: child_support_actual_payment_documentation_accepted
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.507(D)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.507
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_provided_documentation_verifying_actual_child_support_payment
          and local_office_accepted_child_support_actual_payment_documentation

  - name: child_support_obligation_document_not_actual_payment_verification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.507(D)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.507
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          document_accepted_as_child_support_legal_obligation_verification
          and not same_document_accepted_as_actual_monthly_child_support_payment_verification

  - name: child_support_services_agency_payment_verification_obtained
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.507(D)(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.507
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          child_support_payments_made_to_child_support_services_agency
          and local_office_obtained_verification_of_child_support_services_agency_payments
          and (
              not discrepancy_between_household_and_agency_child_support_verification
              or household_given_opportunity_to_resolve_child_support_verification_discrepancy
          )

  - name: child_support_reverification_at_recertification_or_periodic_report_completed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.507(D)(5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.507
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (at_recertification or at_periodic_report)
          and local_office_required_reverification_of_legally_obligated_child_support_amount
          and local_office_required_reverification_of_actual_monthly_child_support_payments
