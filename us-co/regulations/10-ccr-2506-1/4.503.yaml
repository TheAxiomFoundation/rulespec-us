format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.503
  summary: The case record shall consist of statements and documentation regarding
    the sources and results of verification used to determine eligibility and ineligibility.
    Statements shall be entered into a physical case file and/or statewide automated
    system, must be sufficiently detailed to support the determination and permit
    review, and when ineligibility is determined must clearly indicate the reason
    for denial or termination and verification used. If information is questionable
    or an alternate verification source was requested, the reason for additional verification
    shall be documented. The record shall show contacts, wage and income figures,
    utility responsibility, verification methods including non-citizen status if applicable,
    and work-registration completion notations.
  deferred_outputs:
  - output: us-co:regulations/10-ccr-2506-1/4.503#additional_verification_reason_documented
    reason: Generated rule used a local name that collides with a sibling RuleSpec
      export. This output is deferred until it can be encoded with a semantic branch-specific
      name without creating ambiguous sibling imports.
