format: rulespec/v1
module:
  summary: |-
    Colorado's SNAP rule manual determines household income prospectively and,
    when testing gross or net income limits, converts anticipated income to a
    monthly amount by pay frequency. Weekly income is multiplied by 4.3,
    biweekly income by 2.15, semi-monthly income by 2, every-other-month
    income by 0.5, quarterly income by 0.333333, twice-yearly income by
    0.166666, and annual income by 0.083.
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.402
rules:
  - name: snap_monthly_income_conversion_factor
    kind: derived
    entity: Household
    dtype: Rate
    period: Month
    source: 10 CCR 2506-1 section 4.402(A)(2)
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if income_pay_frequency == "weekly": 4.3
          elif income_pay_frequency == "biweekly": 2.15
          elif income_pay_frequency == "semi_monthly": 2
          elif income_pay_frequency == "every_other_month": 0.5
          elif income_pay_frequency == "quarterly": 0.333333
          elif income_pay_frequency == "twice_yearly": 0.166666
          elif income_pay_frequency == "annual": 0.083
          else: 1
  - name: snap_converted_monthly_income
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.402(A)(2)
    versions:
      - effective_from: '2025-10-01'
        formula: average_income_per_pay_period * snap_monthly_income_conversion_factor
  - name: snap_prospectively_counted_income
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 sections 4.402(A)(1), 4.402(A)(3), and 4.402.1(B)
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if anticipated_income_reasonably_certain:
              snap_converted_monthly_income
          else: 0
