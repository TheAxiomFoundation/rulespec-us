- name: snap_monthly_income_conversion_factor
  kind: derived
  entity: Household
  dtype: Rate
  period: Month
  source: 10 CCR 2506-1 section 4.402(A)(2)
  versions:
  - effective_from: '2025-10-01'
    formula: 'if income_pay_frequency == "weekly": snap_monthly_income_conversion_factor_scalar_limit

      elif income_pay_frequency == "biweekly": snap_monthly_income_conversion_factor_scalar_limit_2

      elif income_pay_frequency == "semi_monthly": 2

      elif income_pay_frequency == "every_other_month": snap_monthly_income_conversion_factor_scalar_limit_3

      elif income_pay_frequency == "quarterly": snap_monthly_income_conversion_factor_scalar_limit_4

      elif income_pay_frequency == "twice_yearly": snap_monthly_income_conversion_factor_scalar_limit_5

      elif income_pay_frequency == "annual": snap_monthly_income_conversion_factor_scalar_limit_6

      else: 1'
