format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.140
  summary: |-
    If there is a written request by a responsible household member, current authorized representative, or person acting on behalf of the household to review case-record materials, the materials and information shall be made available, while confidential information is withheld. Use or disclosure of SNAP/IEVS information obtained exclusively for SNAP is restricted to listed persons and purposes. SNAP is subject to section 26-1-114, C.R.S. confidentiality requirements to the extent not preempted by Federal law.
rules:
  - name: case_record_review_access_provided
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.140(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.140
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          written_case_record_review_request_made_by_responsible_household_member_current_authorized_representative_or_person_acting_on_behalf_of_household
          and case_record_material_and_information_made_available_to_requestor
          and local_office_withheld_confidential_information_from_case_record_review

  - name: snap_information_disclosure_authorized
    kind: derived
    entity: DisclosureRequest
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.140(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.140
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          information_obtained_from_snap_household_or_ievs_exclusively_for_snap
          and (
              requester_directly_connected_with_food_stamp_act_or_assistance_program_administration_or_enforcement
              or requester_is_comptroller_general_employee_for_audit_examination_authorized_by_law
              or (
                  law_enforcement_official_requested_information_for_alleged_food_stamp_act_violation
                  and law_enforcement_request_is_written
                  and law_enforcement_request_includes_requester_identity_and_authority
                  and law_enforcement_request_includes_violation_being_investigated
                  and law_enforcement_request_identifies_person_about_whom_information_requested
              )
              or (
                  law_enforcement_officer_acting_in_official_capacity_requested_address_social_security_number_or_available_photograph
                  and law_enforcement_request_is_written
                  and law_enforcement_request_includes_name_of_household_member_being_sought
                  and household_member_being_sought_is_fleeing_felony_prosecution_or_custody_or_violating_probation_or_parole
                  and agency_discloses_only_information_necessary_to_comply_with_specific_authorized_law_enforcement_request
              )
              or (
                  law_enforcement_officer_acting_in_official_capacity_requested_information_from_other_household_member
                  and law_enforcement_request_is_written
                  and law_enforcement_request_includes_name_of_person_being_sought
                  and other_household_member_has_information_necessary_for_apprehension_or_investigation_of_fleeing_or_probation_or_parole_violating_household_member
                  and agency_discloses_only_information_necessary_to_comply_with_specific_authorized_law_enforcement_request
              )
              or (
                  requester_connected_with_parent_locator_service
                  and information_disclosed_to_parent_locator_service_restricted_to_client_most_recent_address_and_place_of_employment
              )
              or requester_directly_connected_with_child_support_program_or_hhs_titles_ii_or_xvi_eligibility_or_benefit_assistance
              or (
                  requester_directly_connected_with_save_immigration_status_verification
                  and information_disclosed_only_to_extent_necessary_to_identify_individual_for_verification
              )
              or requester_is_school_authority_determining_children_from_snap_families_for_school_meal_eligibility
              or (
                  requester_directly_connected_with_ievs_program_administration_or_enforcement
                  and ievs_information_stored_and_processed_to_prevent_unauthorized_access_or_retrieval
                  and persons_with_ievs_access_advised_of_permitted_access_circumstances_and_sanctions
              )
          )

  - name: law_enforcement_fleeing_member_information_procedure_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.140(B)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.140
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          law_enforcement_authorities_provided_document_reasonably_establishing_identity_of_household_member_being_sought
          and (
              not law_enforcement_documentation_indicates_household_member_fleeing_felony_prosecution_or_custody_or_violating_probation_or_parole
              or (
                  agency_followed_snap_eligibility_termination_procedures_for_fleeing_or_probation_or_parole_violation_documentation
                  and not member_participation_terminated_based_on_request_for_information_not_complying_with_required_terms_and_procedures
              )
          )

  - name: state_confidentiality_requirement_applies_to_nonpreempted_snap_confidentiality
    kind: derived
    entity: StateAgency
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.140(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.140
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          snap_confidentiality_matter_within_section_26_1_114_crs
          and not section_26_1_114_crs_confidentiality_provision_preempted_by_federal_law
          and agency_applies_section_26_1_114_crs_confidentiality_requirement_to_snap
