format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.204
  summary: |-
    Applicant households must receive a phone or face-to-face interview before initial certification and at least once every twelve months, with special interview exceptions for twenty-four-month households. Local offices must schedule and document interviews, provide notices after missed interviews, deny missed-interview applications only on the thirtieth day when no timely subsequent interview is scheduled, use a single interview for joint PA/SNAP applications, and avoid an additional SNAP interview for SSI-only households applying and interviewed through SSA.
  deferred_outputs:
    - output: us-co:regulations/10-ccr-2506-1/4.204#interview_scheduled_promptly_under_processing_guidelines
      reason: >-
        Section 4.204(B) requires interviews to be scheduled as promptly as possible to ensure participation within SNAP processing guidelines as outlined in Section 4.205, but no copied RuleSpec context provides Section 4.205.
rules:
  - name: initial_and_periodic_interview_month_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.204(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.204
              excerpt: "at least once every twelve (12) months"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          12

  - name: twenty_four_month_certification_period_months
    kind: parameter
