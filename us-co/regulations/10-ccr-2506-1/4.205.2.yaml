format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.205.2
  summary: |-
    The local office shall process applications expeditiously, notify eligible households in writing by Notice of Action stating the eligibility period and SNAP allotment, provide eligible households an opportunity to obtain benefits no later than thirty calendar days after filing, treat a valid application as filed when received by the correct county local office with name, address, and signature, and provide/assist with missing-verification notice and timing rules.
rules:
  - name: normal_processing_calendar_day_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.205.2(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.205.2
              excerpt: "no later than thirty (30) calendar days following the date the application was filed"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          30

  - name: missing_verification_response_calendar_day_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.205.2(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.205.2
              excerpt: "allow the household ten (10) calendar days to provide the missing verifications"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          10

  - name: missed_first_appointment_interview_reschedule_after_day_threshold
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.205.2(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.205.2
              excerpt: "after the twentieth (20th) day"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          20

  - name: normal_processing_valid_application_filed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.205.2(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.205.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          correct_county_local_office_received_application
          and application_contains_applicant_name
          and application_contains_address
          and application_contains_signature

  - name: eligible_household_notice_of_action_provided
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.205.2(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.205.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_eligible
          and household_received_notice_of_action_form
          and notice_of_action_indicates_household_period_of_eligibility
          and notice_of_action_indicates_snap_allotment

  - name: eligible_household_benefits_available_timely
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.205.2(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.205.2
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.205.2#normal_processing_calendar_day_limit
              output: normal_processing_calendar_day_limit
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_eligible
          and normal_processing_valid_application_filed
          and household_provided_opportunity_to_obtain_benefits
          and calendar_days_after_application_filed_before_benefits_available <= normal_processing_calendar_day_limit

  - name: incomplete_verification_notice_and_assistance_provided
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.205.2(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.205.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          verification_incomplete
          and local_office_provided_statement_of_required_verification_on_state_prescribed_notice_form
          and local_office_offered_to_assist_household_obtaining_required_verification

  - name: missing_verification_response_period_allowed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.205.2(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.205.2
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.205.2#missing_verification_response_calendar_day_limit
              output: missing_verification_response_calendar_day_limit
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          verification_incomplete
          and not household_missed_first_appointment
          and calendar_days_allowed_to_provide_missing_verifications >= missing_verification_response_calendar_day_limit

  - name: missed_first_appointment_thirtieth_day_requirements_met
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.205.2(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.205.2
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.205.2#missed_first_appointment_interview_reschedule_after_day_threshold
              output: missed_first_appointment_interview_reschedule_after_day_threshold
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.205.2#normal_processing_calendar_day_limit
              output: normal_processing_calendar_day_limit
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_missed_first_appointment
          and interview_cannot_otherwise_be_rescheduled_until_after_day_following_application_filing > missed_first_appointment_interview_reschedule_after_day_threshold
          and interview_cannot_otherwise_be_rescheduled_until_after_day_following_application_filing < normal_processing_calendar_day_limit
          and household_appeared_for_interview_by_thirtieth_day
          and household_brought_verification_by_thirtieth_day
          and household_registered_members_for_work_by_thirtieth_day

  - name: one_application_two_month_determination_available
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.205.2(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.205.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          sufficient_information_available_to_determine_month_of_application_and_following_month
          and household_found_eligible_or_ineligible_for_month_of_application
          and household_found_eligible_or_ineligible_for_following_month
          and determination_based_on_one_application
          and notice_of_action_reflects_specific_months_of_eligibility_and_ineligibility
