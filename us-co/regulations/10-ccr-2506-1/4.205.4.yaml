          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.205.4#initial_application_processing_period_day_count
              output: initial_application_processing_period_day_count
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.205.4#second_application_processing_period_day_count
              output: second_application_processing_period_day_count
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          application_process_incomplete
          and application_processing_days_elapsed > initial_application_processing_period_day_count + second_application_processing_period_day_count

