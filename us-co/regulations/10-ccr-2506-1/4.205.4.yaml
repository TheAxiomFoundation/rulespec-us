format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.205.4
  summary: |-
    If the local office is at fault for not completing the application process by the end of the second thirty-day period, a complete record continues on the original application until eligibility is determined; eligible households receive retroactive benefits to the month of application if the office also caused the initial thirty-day delay, but only back to the month after application if the initial delay was the household's fault. If the record is insufficient, the office denies and requests a new application. If the household is at fault by the end of the second thirty-day period, the application is denied, a new application is required, and no lost benefits are due.
rules:
  - name: initial_application_processing_period_day_count
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.205.4(A), (C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.205.4
              excerpt: "initial thirty (30) days"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          30

  - name: second_application_processing_period_day_count
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.205.4(A), (B), (C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.205.4
              excerpt: "second thirty (30) day period"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          30

  - name: application_process_exceeded_second_thirty_day_period
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.205.4(A), (B), (C)
    metadata:
      proof:
