format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.608
  summary: |-
    Local offices notify households of benefit-level changes, reasons, and effective dates on the Notice of Action form except as specified in Section 4.608.1. Households receive advance Notice of Adverse Action at least ten calendar days plus mailing time before adverse action during the certification period, with five additional mailing days for ACP households. If the advance notice period ends on a weekend or holiday, a fair-hearing and continued-benefits request received the next business day is timely. Participants may request a conference or appeal before the adverse-action effective date, and eligibility technicians explain that any over-issued benefits determined by the hearing officer will be demanded.
  deferred_outputs:
    - output: us-co:regulations/10-ccr-2506-1/4.608#notice_of_action_for_benefit_level_change_required
      reason: >-
        Section 4.608(A) requires notice of changes from the prior benefit level except as specified in Section 4.608.1, but no copied RuleSpec context provides Section 4.608.1 exceptions.
    - output: us-co:regulations/10-ccr-2506-1/4.608#advance_notice_of_adverse_action_timely
      reason: >-
        Section 4.608(B) requires advance Notice of Adverse Action before adverse action except as specified in Section 4.608.1, but no copied RuleSpec context provides Section 4.608.1 exceptions.
    - output: us-co:regulations/10-ccr-2506-1/4.608#decreased_allotment_or_ineligibility_change_notice_timely
      reason: >-
        The ten-calendar-day notice issuance rule for changes resulting in decreased allotment or ineligibility operates within the adverse-action notice framework that is expressly subject to Section 4.608.1 exceptions, but no copied RuleSpec context provides Section 4.608.1.
rules:
  - name: adverse_action_advance_notice_calendar_day_minimum
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.608(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
