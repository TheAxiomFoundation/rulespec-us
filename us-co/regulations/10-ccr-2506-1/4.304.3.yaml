format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.304.3
  summary: |-
    Individuals residing with a household shall not be considered household members for SNAP eligibility or allotment unless otherwise stated, including aged sixty (60) and older disabled persons meeting the 165% FPL co-resident income test, foster children depending on foster-parent choice, and boarders depending on household request and reasonable meal payment.
rules:
  - name: elderly_disabled_separate_household_age_minimum
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.304.3(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.304.3
              excerpt: "Persons aged sixty (60) and older"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          60

  - name: elderly_disabled_co_resident_income_fpl_limit
    kind: parameter
    dtype: Rate
    source: 10 CCR 2506-1 section 4.304.3(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.304.3
              excerpt: "income does not exceed 165% Federal Poverty Level (FPL)"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          1.65

  - name: foster_child_separate_application_age_minimum
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.304.3(B)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.304.3
              excerpt: "unless they are over eighteen (18)"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          18

  - name: boarder_more_than_two_meals_daily_threshold
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.304.3(C)(5)(A)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.304.3
              excerpt: "more than two (2) meals per day"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          2

  - name: boarder_two_or_fewer_meals_daily_threshold
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.304.3(C)(5)(A)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.304.3
              excerpt: "two (2) meals or fewer per day"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          2

  - name: boarder_two_or_fewer_meals_allotment_fraction
    kind: parameter
    dtype: Rate
    source: 10 CCR 2506-1 section 4.304.3(C)(5)(A)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.304.3
              excerpt: "two-thirds of the maximum allotment"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          2 / 3

  - name: elderly_disabled_person_may_be_separate_household
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.304.3(A)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.304.3
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.304.3#elderly_disabled_separate_household_age_minimum
              output: elderly_disabled_separate_household_age_minimum
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.304.3#elderly_disabled_co_resident_income_fpl_limit
              output: elderly_disabled_co_resident_income_fpl_limit
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          person_age_years >= elderly_disabled_separate_household_age_minimum
          and person_has_disability
          and person_unable_to_purchase_and_prepare_own_meals
          and person_resides_with_other_individuals
          and co_resident_individuals_income <= elderly_disabled_co_resident_income_fpl_limit * federal_poverty_level_amount

  - name: elderly_disabled_spouse_excluded_from_household_calculation
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.304.3(A)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.304.3
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          person_is_spouse_of_elderly_disabled_person
          and not spouse_is_person_purchasing_and_preparing_meals

  - name: foster_child_excluded_from_snap_household_determination
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.304.3(B)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.304.3
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          person_is_foster_child
          and foster_parent_chooses_not_to_include_foster_child_in_snap_household
          and foster_child_income_resources_assets_and_needs_not_included_in_eligibility_determination

  - name: foster_child_included_in_snap_household_determination
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.304.3(B)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.304.3
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          person_is_foster_child
          and foster_parent_chooses_to_include_foster_child_in_snap_household
          and foster_child_income_resources_assets_and_needs_considered_in_eligibility_determination

  - name: foster_child_may_apply_separately_from_foster_family
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.304.3(B)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.304.3
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.304.3#foster_child_separate_application_age_minimum
              output: foster_child_separate_application_age_minimum
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          person_is_foster_child_or_child_or_spouse_of_foster_child
          and person_age_years > foster_child_separate_application_age_minimum
          and not person_under_parental_control_of_foster_parents

  - name: boarder_counted_as_snap_household_member
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.304.3(C)(1), (C)(3), (C)(5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.304.3
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          person_is_boarder
          and snap_household_requests_to_include_boarder_as_household_member

  - name: boarder_income_and_resources_excluded_from_household
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.304.3(C)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.304.3
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          person_is_boarder
          and not snap_household_requests_to_include_boarder_as_household_member

  - name: boarder_payment_treated_as_household_self_employment_income
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.304.3(C)(2)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.304.3
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if person_is_boarder: boarder_payment_to_household_for_lodging_and_meals else: 0

  - name: boarder_income_and_resources_counted_for_household
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.304.3(C)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.304.3
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          person_is_boarder
          and snap_household_requests_to_include_boarder_as_household_member
          and boarder_income_and_resources_assets_considered_available_to_snap_household

  - name: person_not_classified_as_boarder_for_nonmonetary_or_third_party_exchange
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.304.3(C)(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.304.3
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          person_only_works_and_provides_no_monetary_compensation_for_meals
          or person_makes_payments_to_third_party_on_household_behalf_in_exchange_for_meals

  - name: boarder_reasonable_monthly_meal_payment_met
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.304.3(C)(5)(A)-(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.304.3
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.304.3#boarder_more_than_two_meals_daily_threshold
              output: boarder_more_than_two_meals_daily_threshold
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.304.3#boarder_two_or_fewer_meals_daily_threshold
              output: boarder_two_or_fewer_meals_daily_threshold
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.304.3#boarder_two_or_fewer_meals_allotment_fraction
              output: boarder_two_or_fewer_meals_allotment_fraction
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          person_is_boarder
          and (
              (
                  board_arrangement_meals_per_day > boarder_more_than_two_meals_daily_threshold
                  and boarder_payment_for_meals >= maximum_snap_allotment_for_boarder_household_size
              )
              or (
                  board_arrangement_meals_per_day <= boarder_two_or_fewer_meals_daily_threshold
                  and boarder_payment_for_meals >= boarder_two_or_fewer_meals_allotment_fraction * maximum_snap_allotment_for_boarder_household_size
              )
          )

  - name: individual_paying_less_than_reasonable_boarder_payment_counted_as_household_member
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.304.3(C)(5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.304.3
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.304.3#boarder_more_than_two_meals_daily_threshold
              output: boarder_more_than_two_meals_daily_threshold
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.304.3#boarder_two_or_fewer_meals_daily_threshold
              output: boarder_two_or_fewer_meals_daily_threshold
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.304.3#boarder_two_or_fewer_meals_allotment_fraction
              output: boarder_two_or_fewer_meals_allotment_fraction
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          person_receives_meals_and_lodging_from_household
          and not person_only_works_and_provides_no_monetary_compensation_for_meals
          and not person_makes_payments_to_third_party_on_household_behalf_in_exchange_for_meals
          and (
              (
                  board_arrangement_meals_per_day > boarder_more_than_two_meals_daily_threshold
                  and boarder_payment_for_meals < maximum_snap_allotment_for_boarder_household_size
              )
              or (
                  board_arrangement_meals_per_day <= boarder_two_or_fewer_meals_daily_threshold
                  and boarder_payment_for_meals < boarder_two_or_fewer_meals_allotment_fraction * maximum_snap_allotment_for_boarder_household_size
              )
          )
