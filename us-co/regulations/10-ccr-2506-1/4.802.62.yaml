format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.802.62
  summary: |-
    CDHS shall not deny or dismiss a hearing request unless it is untimely under
    Section 4.802.1, withdrawn in writing, or the household/representative fails
    without good cause to appear. Defaults may not be entered for failure to file
    a written answer. Dismissals other than failure to appear are initial
    decisions pending Office of Appeals review. Failure to appear after proper
    notice and without timely advance acceptable good cause abandons the appeal,
    with a ten-calendar-day mailed-order period to explain good cause; accepted
    good cause vacates dismissal and reschedules hearing, no letter leads to OOA
    confirmation and implementation within three working days after the effective
    decision, and rejected good cause leads to an initial decision confirming
    dismissal.
imports:
  - us-co:regulations/10-ccr-2506-1/4.802.1#household_may_request_appeal_for_recent_local_office_action
  - us-co:regulations/10-ccr-2506-1/4.802.1#household_may_request_appeal_for_benefit_loss
  - us-co:regulations/10-ccr-2506-1/4.802.1#household_may_request_fair_hearing_for_current_benefit_level
