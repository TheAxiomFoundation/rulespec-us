format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.304.41
  summary: |-
    Categories listed include residents of federally subsidized housing for persons aged sixty and older, narcotic addicts or alcoholics and their children residing at treatment facilities for regular program participation, blind or disabled residents of nonprofit group living arrangements, battered women and children temporarily residing in nonprofit shelters, and residents of nonprofit homeless shelters.
rules:
  - name: subsidized_senior_housing_minimum_age
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.304.41(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.304.41
              excerpt: "persons aged sixty (60) and older"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          60

  - name: federally_subsidized_senior_housing_resident
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.304.41(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.304.41
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.304.41#subsidized_senior_housing_minimum_age
              output: subsidized_senior_housing_minimum_age
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          resident_of_federally_subsidized_housing_for_persons_aged_sixty_and_older_under_12_usc_1701q_or_1715z_1
          and person_age >= subsidized_senior_housing_minimum_age

  - name: drug_or_alcohol_treatment_facility_resident
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.304.41(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.304.41
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (person_is_narcotic_addict or person_is_alcoholic or person_is_child_of_narcotic_addict_or_alcoholic)
          and person_resides_at_facility_or_treatment_center_for_regular_participation_in_drug_or_alcoholic_treatment_and_rehabilitation_program

  - name: blind_or_disabled_nonprofit_group_living_arrangement_resident
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.304.41(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.304.41
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          resident_of_public_or_private_nonprofit_group_living_arrangement_facility
          and (person_is_blind or person_has_disabilities)

  - name: battered_women_and_children_shelter_temporary_resident
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.304.41(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.304.41
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          person_temporarily_resides_in_public_or_private_nonprofit_shelter_for_battered_women_and_children
          and (person_is_woman or person_is_child_of_woman_temporarily_residing_in_shelter_for_battered_women_and_children)

  - name: homeless_shelter_resident
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.304.41(E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.304.41
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          resident_of_public_or_private_nonprofit_shelter_for_homeless_persons
