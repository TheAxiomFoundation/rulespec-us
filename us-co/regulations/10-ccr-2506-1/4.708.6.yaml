format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.708.6
  summary: |-
    Local offices shall exercise security and controls for EBT cards that are undeliverable or returned during the valid issuance period; Forms FNS-471 and FNS-135 shall be completed as appropriate, and EBT cards shall be returned to inventory and noted on the issuance log and Form FNS-250.
rules:
  - name: undeliverable_or_returned_ebt_card_forms_completed_as_appropriate
    kind: derived
    entity: EbtCard
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.708.6
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.708.6
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not ebt_card_undeliverable_or_returned_during_valid_issuance_period)
          or (
              (not form_fns_471_appropriate_for_ebt_card or form_fns_471_completed_by_local_office)
              and (not form_fns_135_appropriate_for_ebt_card or form_fns_135_completed_by_local_office)
          )

  - name: undeliverable_or_returned_ebt_card_inventory_and_accountability_records_completed
    kind: derived
    entity: EbtCard
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.708.6
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.708.6
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not ebt_card_undeliverable_or_returned_during_valid_issuance_period)
          or (
              ebt_card_returned_to_inventory
              and ebt_card_return_to_inventory_noted_on_issuance_log
              and ebt_card_return_to_inventory_noted_on_form_fns_250
          )
