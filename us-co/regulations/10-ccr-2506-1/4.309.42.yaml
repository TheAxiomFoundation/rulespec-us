format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.309.42
  summary: |-
    A group living arrangement facility authorized by FNS may be penalized or disqualified upon an administrative or judicial determination that benefits were misappropriated or used for purchases not contributing to certified household meals. The local office must promptly notify the state department when it believes a facility is misusing benefits, take no action before FNS action, and establish claims for discovered over-issuances. If the facility loses FNS authorization or Colorado Department of Public Health and Environment certification, residents using it as authorized representative may no longer participate, receive written termination notice but no Notice of Adverse Action, while residents applying on their own behalf may still participate if otherwise eligible.
rules:
  - name: facility_penalty_or_disqualification_authorized_for_benefit_misuse
    kind: derived
    entity: GroupLivingArrangementFacility
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.309.42
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.309.42
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          facility_authorized_by_fns
          and administrative_or_judicial_determination_benefits_misappropriated_or_used_for_nonmeal_purchases

  - name: local_office_state_department_misuse_notice_satisfied
    kind: derived
    entity: LocalOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.309.42
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
