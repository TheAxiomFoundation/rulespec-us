            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.309.42
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not local_office_has_reason_to_believe_facility_is_misusing_benefits)
          or local_office_promptly_notified_state_department_of_believed_facility_misuse

  - name: local_office_action_before_fns_action_prohibited
