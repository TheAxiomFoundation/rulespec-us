format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.902.31
  summary: |-
    Local offices with a significant LEP household population, or during a significant influx of seasonal or migrant farmworkers, shall provide sufficient bilingual staff and/or translators for timely application processing. If translators or interpreters are used, they must be readily available for pre-screening, interviews, and eligibility activities; the office may not require or imply that the client must provide an interpreter, and may not delay pre-screening or appointments because bilingual staff or translators/interpreters are unavailable.
rules:
  - name: lep_household_population_language_access_staffing_requirement_satisfied
    kind: derived
    entity: LocalOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.902.31(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.902.31
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not state_department_determined_local_office_has_significant_population_of_lep_households)
          or (
              local_office_provides_sufficient_bilingual_staff_or_translators_for_timely_application_processing
              and local_office_staff_trained_and_familiar_with_language_access_procedures
          )

  - name: seasonal_or_migrant_farmworker_influx_language_access_staffing_requirement_satisfied
    kind: derived
    entity: LocalOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.902.31(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.902.31
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not significant_influx_of_seasonal_or_migrant_farmworkers)
          or local_office_provides_sufficient_bilingual_staff_or_translators_for_timely_processing_of_such_applicants

  - name: utilized_translator_or_interpreter_readily_available_requirement_satisfied
    kind: derived
    entity: LocalOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.902.31(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.902.31
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not translators_or_interpreters_utilized)
          or (
              translators_or_interpreters_readily_available_to_assist_in_prescreening_for_expedited_processing_standards
              and translators_or_interpreters_readily_available_to_assist_in_completing_interview
              and translators_or_interpreters_readily_available_to_assist_in_other_eligibility_determination_activities
          )

  - name: client_translator_or_interpreter_not_required_requirement_satisfied
    kind: derived
    entity: LocalOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.902.31(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.902.31
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not local_office_requires_client_to_provide_translator_or_interpreter_as_condition_for_prescreening_or_interview)
          and (not local_office_implies_client_provided_interpreter_required_as_condition_for_prescreening_or_interview)

  - name: prescreening_and_appointments_not_delayed_for_language_staff_unavailability_requirement_satisfied
    kind: derived
    entity: LocalOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.902.31(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.902.31
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not local_office_postpones_prescreening_process_or_appointments_because_bilingual_staff_or_translators_interpreters_unavailable)
          and (not local_office_in_any_way_delays_prescreening_process_or_appointments_because_bilingual_staff_or_translators_interpreters_unavailable)
