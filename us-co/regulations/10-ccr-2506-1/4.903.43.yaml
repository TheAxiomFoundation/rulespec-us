format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.903.43
  summary: |-
    QA shall notify local offices on State-prescribed forms of review findings
    for each sampled active and negative case. If findings show no error and/or
    only observations, a local-office response is not required, but payment-
    accuracy observations must be corrected and a claim or restoration
    established. If findings document an error resulting in ineligibility,
    over-issuance, under-issuance, or incorrect negative action, the local
    office shall correct errors within ten calendar days. After final
    notification, the local office must terminate ineligible households within
    ten calendar days, restore lost benefits, or establish a claim. Local
    offices must report twice a year on QA findings requiring case corrections.
rules:
  - name: qa_case_error_correction_days_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.903.43(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.903.43
              excerpt: within ten (10) calendar days
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          10

  - name: final_ineligible_household_termination_days_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.903.43(C)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.903.43
              excerpt: terminate ineligible households within ten (10) calendar days
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          10

  - name: qa_correction_status_reports_per_year_required
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.903.43(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.903.43
              excerpt: report twice a year
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          2

  - name: qa_review_notification_complete
    kind: derived
    entity: LocalOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.903.43
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.903.43
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          qa_notified_local_office_on_state_prescribed_forms
          and review_findings_given_for_each_sampled_active_and_negative_case
          and review_findings_include_brief_descriptions_with_applicable_rule_references

  - name: local_office_response_not_required_for_no_error_findings
    kind: derived
    entity: LocalOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.903.43(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.903.43
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          review_findings_document_no_error
          or review_findings_note_only_other_observations

  - name: payment_accuracy_observation_correction_complete
    kind: derived
    entity: LocalOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.903.43(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.903.43
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          observation_affects_payment_accuracy
          and payment_accuracy_observation_corrected
          and (claim_established_in_accordance_with_section_4_801_2_or_restoration_established_in_accordance_with_section_4_702)

  - name: qa_review_findings_report_retained_in_case_record
    kind: derived
    entity: LocalOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.903.43(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.903.43
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          report_of_review_findings_retained_in_case_record

  - name: qa_error_finding_requires_case_correction
    kind: derived
    entity: LocalOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.903.43(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.903.43
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          review_findings_document_error_resulted_in_ineligibility
          or review_findings_document_error_resulted_in_over_issuance
          or review_findings_document_error_resulted_in_under_issuance
          or review_findings_document_error_resulted_in_incorrect_negative_action

  - name: qa_error_case_correction_timely
    kind: derived
    entity: LocalOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.903.43(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.903.43
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.903.43#qa_case_error_correction_days_limit
              output: qa_case_error_correction_days_limit
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          qa_error_finding_requires_case_correction
          and local_office_took_action_to_correct_discovered_errors
          and days_after_error_finding_when_correction_action_taken <= qa_case_error_correction_days_limit

  - name: local_office_disagreement_response_sent_for_state_review
    kind: derived
    entity: LocalOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.903.43(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.903.43
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          local_office_disagrees_with_review_finding
          and response_sent_to_state_department_for_further_review

  - name: state_department_review_of_local_response_complete
    kind: derived
    entity: StateAgency
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.903.43(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.903.43
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          state_department_received_local_office_response_to_qa_findings
          and (
              state_department_concurred_with_qa_findings
              or state_department_concurred_with_local_office_rebuttal
              or state_department_concurred_or_disagreed_with_local_office_corrective_action
          )

  - name: final_qa_review_findings_notice_sent_to_local_office
    kind: derived
    entity: StateAgency
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.903.43(C)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.903.43
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          local_office_notified_of_final_qa_review_findings

  - name: final_findings_corrective_action_complete
    kind: derived
    entity: LocalOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.903.43(C)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.903.43
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.903.43#final_ineligible_household_termination_days_limit
              output: final_ineligible_household_termination_days_limit
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          local_office_received_final_notification_of_findings_results
          and (
              (
                  corrective_action_terminates_ineligible_households
                  and days_after_final_notification_when_ineligible_households_terminated <= final_ineligible_household_termination_days_limit
              )
              or lost_benefits_restored
              or claim_established_in_accordance_with_section_4_801_2_or_restoration_established_in_accordance_with_section_4_702
          )

  - name: qa_correction_status_reporting_frequency_met
    kind: derived
    entity: LocalOffice
    dtype: Judgment
    period: Year
    source: 10 CCR 2506-1 section 4.903.43(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.903.43
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.903.43#qa_correction_status_reports_per_year_required
              output: qa_correction_status_reports_per_year_required
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          qa_review_findings_required_case_corrections
          and qa_correction_status_reports_to_state_department_per_year >= qa_correction_status_reports_per_year_required
