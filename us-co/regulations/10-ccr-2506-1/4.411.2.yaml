format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.411.2
  summary: |-
    For non-household members that have not been disqualified, income and resources are not considered available to the household; cash payments to the household are income and vendor payments are excluded. Shared deductible expenses are limited to the household's actual contribution, or prorated if contributions cannot be differentiated. Combined wages of household and non-household members are identified or prorated. An ineligible student is treated as a non-household member, with income, resources, deductions, and allotment treatment excluded from the remaining household.
rules:
  - name: nondisqualified_non_household_member_income_excluded
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.411.2(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.411.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if individual_is_non_household_member
             and not individual_has_been_disqualified:
              non_household_member_income
          else: 0

  - name: nondisqualified_non_household_member_resources_excluded
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.411.2(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.411.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if individual_is_non_household_member
             and not individual_has_been_disqualified:
              non_household_member_resources
          else: 0

  - name: ineligible_student_non_household_member_treatment_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.411.2(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.411.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          person_is_ineligible_student_for_snap_purposes

  - name: ineligible_student_excluded_from_household_income_resources_deductions_and_allotment
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.411.2(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.411.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          person_is_ineligible_student_for_snap_purposes
          and ineligible_student_income_not_considered_available_to_other_household_members
          and ineligible_student_resources_not_considered_available_to_other_household_members
          and ineligible_student_not_considered_in_household_deductions
          and ineligible_student_not_considered_in_household_allotment

  - name: ineligible_non_citizen_student_income_prorated_under_non_citizen_provisions
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.411.2(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.411.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          person_is_ineligible_non_citizen
          and person_is_ineligible_student_for_snap_purposes
          and person_purchases_and_prepares_food_with_household

  - name: non_household_member_cash_payments_countable_income
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.411.2(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.411.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if cash_payments_from_non_household_member_to_household_received:
              cash_payments_from_non_household_member_to_household
          else: 0

  - name: non_household_member_vendor_payments_countable_income
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.411.2(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.411.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          0

  - name: shared_expense_deductible_household_expense
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.411.2(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.411.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if household_shares_deductible_expense_with_non_household_member
             and not expense_is_mandatory_telephone_allowance:
              if payments_or_contributions_can_be_differentiated:
                  amount_actually_paid_or_contributed_by_household_for_shared_expense
              else:
                  total_shared_deductible_expense * household_persons_actually_paying_or_contributing_count / persons_actually_paying_or_contributing_to_expense_count
          else: household_deductible_expense_without_non_household_member_sharing_rule

  - name: household_earned_income_from_combined_wage
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.411.2(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.411.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if earned_income_of_household_members_and_non_household_member_combined_into_one_wage:
              if household_share_of_combined_wage_can_be_identified:
                  identified_household_share_of_combined_wage
              else:
                  combined_wage_amount * household_members_covered_by_combined_wage_count / persons_covered_by_combined_wage_count
          else: household_earned_income_not_from_combined_wage

  - name: remaining_members_may_be_certified_with_ineligible_student
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.411.2(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.411.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_contains_ineligible_student
          and other_household_members_certified
