format: rulespec/v1
module:
  summary: |-
    Colorado's SNAP rule manual treats payments from boarders as
    self-employment income for households that are not commercial boarding
    houses. The cost of doing business is the maximum allotment for the number
    of boarders, the higher actual documented room-and-meal cost when it
    exceeds that allotment, or the full foster-care boarder payment. The cost
    of doing business may not exceed the payment received from the boarder.
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.403.2
rules:
  - name: snap_boarder_income
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.403.2(A)
    versions:
      - effective_from: '2025-10-01'
        formula: boarder_payments_for_room_meals_and_shelter_contributions
  - name: snap_boarder_room_and_meals_cost_basis
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.403.2(B)
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if actual_documented_boarder_room_and_meal_costs > max_allotment_for_number_of_boarders:
              actual_documented_boarder_room_and_meal_costs
          else: max_allotment_for_number_of_boarders
  - name: snap_boarder_cost_of_doing_business
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.403.2(B)
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if boarder_income_is_foster_care_payment:
              snap_boarder_income
          else: min(snap_boarder_income, snap_boarder_room_and_meals_cost_basis)
  - name: snap_boarder_net_self_employment_income
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.403.2(C)
    versions:
      - effective_from: '2025-10-01'
        formula: snap_boarder_income - snap_boarder_cost_of_doing_business
  - name: snap_earned_income_including_boarder_net_income
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.403.2(C)
    versions:
      - effective_from: '2025-10-01'
        formula: earned_income_excluding_boarder_net_income + snap_boarder_net_self_employment_income
  - name: snap_shelter_costs_excluding_boarder_direct_third_party_payments
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.403.2(D)
    versions:
      - effective_from: '2025-10-01'
        formula: max(0, household_shelter_costs_incurred - shelter_expenses_paid_directly_by_boarder_to_third_party)
