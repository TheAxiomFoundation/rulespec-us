format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.6
  summary: |-
    When a household moves out of Colorado, the local office that last handled the case involving a claim may initiate or continue collection for over-issuance that occurred while the household was under that office's jurisdiction. Counties may transfer a claim to another state or Colorado county if the transferee accepts, are not obligated to accept transfers, and counties that accept transfers shall pursue collection and retain appropriate collection incentives.
rules:
  - name: local_office_may_collect_after_household_moves_out_of_state
    kind: derived
    entity: SnapOverissuanceClaim
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.801.6
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.6
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_moved_out_of_state
          and overissuance_occurred_while_household_under_last_local_office_jurisdiction

  - name: county_may_transfer_claim_to_accepting_jurisdiction
    kind: derived
    entity: SnapOverissuanceClaim
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.801.6
