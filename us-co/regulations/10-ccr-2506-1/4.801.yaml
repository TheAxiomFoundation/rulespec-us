format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801
  summary: |-
    A claim is established when a household is over-issued benefits; an over-issuance is the amount by which SNAP benefits issued to a household exceeds the SNAP allotment.
rules:
  - name: over_issuance_amount
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.801
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          max(0, snap_benefits_issued_to_household - snap_allotment)

  - name: claim_established_for_over_issuance
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.801
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.801#over_issuance_amount
              output: over_issuance_amount
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          over_issuance_amount > 0
