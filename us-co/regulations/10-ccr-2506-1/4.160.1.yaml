format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.160.1
  summary: |-
    The State Department maintains and reviews complaint records; appropriate direct complaints are referred to local offices. Local offices must respond by the Department-specified date when requested. The State-level complaint system must notify complainants of action taken within three business days for expedited-services complaints and thirty calendar days for all other complaints. If a fair hearing can resolve a complaint, the complainant must be advised of and offered assistance with the fair-hearing request process.
rules:
  - name: expedited_services_complaint_response_business_day_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.160.1(C)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.160.1
              excerpt: "no later than three (3) business days"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          3

  - name: other_complaint_response_calendar_day_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.160.1(C)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.160.1
              excerpt: "no later than thirty (30) calendar days"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          30

  - name: state_level_complaint_notification_timeframe_met
    kind: derived
    entity: Complaint
    dtype: Judgment
    period: Day
    source: 10 CCR 2506-1 section 4.160.1(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.160.1
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.160.1#expedited_services_complaint_response_business_day_limit
              output: expedited_services_complaint_response_business_day_limit
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.160.1#other_complaint_response_calendar_day_limit
              output: other_complaint_response_calendar_day_limit
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          complaint_investigated_and_complainant_notified_of_action_taken
          and (
              (
                  complaint_involves_expedited_services
                  and business_days_following_state_department_receipt_until_response_provided <= expedited_services_complaint_response_business_day_limit
              )
              or (
                  not complaint_involves_expedited_services
                  and calendar_days_following_state_department_receipt_until_response_provided <= other_complaint_response_calendar_day_limit
              )
          )

  - name: local_office_forwarded_complaint_response_completed
    kind: derived
    entity: Complaint
    dtype: Judgment
    period: Day
    source: 10 CCR 2506-1 section 4.160.1(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.160.1
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          state_department_requested_local_office_response_to_forwarded_complaint
          and local_office_acknowledged_receipt_by_department_specified_response_date
          and local_office_successfully_completed_department_resolution_criteria_by_specified_response_date

  - name: fair_hearing_complaint_process_assistance_offered
    kind: derived
    entity: Complaint
    dtype: Judgment
    period: Day
    source: 10 CCR 2506-1 section 4.160.1(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.160.1
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          complaint_can_be_resolved_through_fair_hearing_process
          and state_department_advised_complainant_of_fair_hearing_request_process
          and state_department_offered_complainant_assistance_to_request_fair_hearing
