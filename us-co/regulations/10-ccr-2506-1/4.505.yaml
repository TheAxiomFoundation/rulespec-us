format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.505
  summary: |-
    Information received from sources other than the household is not considered verified and must be independently verified before adverse action is taken against a household's SNAP benefits during the certification period.
rules:
  - name: nonhousehold_information_adverse_action_without_independent_verification_prohibited
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.505(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.505
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          information_received_from_source_other_than_household
          and adverse_action_taken_against_household_snap_benefits
          and adverse_action_during_certification_period
          and not independent_verification_completed_prior_to_adverse_action
