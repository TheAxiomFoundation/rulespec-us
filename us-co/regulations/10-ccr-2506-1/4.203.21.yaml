format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.203.21
  summary: |-
    The following individuals cannot be an authorized representative unless otherwise stated: certain local office employees and supervisors; employees of FNS-authorized SNAP retailers and meal services; individuals disqualified for IPV/fraud during the disqualification period, subject to the only-adult/no-other-representative exception; and, in no event, an authorized meal provider for persons experiencing homeless.
rules:
  - name: local_office_worker_authorized_representative_bar_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.203.21(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.203.21
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (
              local_office_employee_involved_in_program_eligibility_determination_or_issuance_processes
              or supervisor_of_local_office_employee_involved_in_program_eligibility_determination_or_issuance_processes
          )
          and not local_office_determines_no_other_authorized_representative_available

  - name: fns_authorized_retailer_or_meal_service_employee_authorized_representative_bar_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.203.21(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.203.21
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          employee_of_fns_authorized_retailer_or_meal_service_authorized_to_accept_snap_benefits
          and not local_office_determines_no_other_authorized_representative_available

  - name: ipv_fraud_disqualified_individual_authorized_representative_bar_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.203.21(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.203.21
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          individual_disqualified_for_ipv_or_fraud
          and individual_is_within_period_of_disqualification
          and not (
              individual_is_only_adult_in_household
              and office_unable_to_arrange_for_another_authorized_representative
          )

  - name: local_office_ipv_fraud_representative_need_determination_completed
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.203.21(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.203.21
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          individual_disqualified_for_ipv_or_fraud
          and local_office_determined_whether_disqualified_individual_needed_to_apply_on_behalf_of_household
          and local_office_determined_whether_disqualified_individual_needed_to_obtain_snap_benefits_for_household
          and local_office_determined_whether_disqualified_individual_needed_to_use_household_snap_benefits_to_purchase_food

  - name: homeless_meal_provider_authorized_representative_bar_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.203.21(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.203.21
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          authorized_meal_provider_for_persons_experiencing_homeless

  - name: individual_cannot_be_authorized_representative
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.203.21
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.203.21
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.203.21#local_office_worker_authorized_representative_bar_applies
              output: local_office_worker_authorized_representative_bar_applies
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.203.21#fns_authorized_retailer_or_meal_service_employee_authorized_representative_bar_applies
              output: fns_authorized_retailer_or_meal_service_employee_authorized_representative_bar_applies
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.203.21#ipv_fraud_disqualified_individual_authorized_representative_bar_applies
              output: ipv_fraud_disqualified_individual_authorized_representative_bar_applies
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.203.21#homeless_meal_provider_authorized_representative_bar_applies
              output: homeless_meal_provider_authorized_representative_bar_applies
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          local_office_worker_authorized_representative_bar_applies
          or fns_authorized_retailer_or_meal_service_employee_authorized_representative_bar_applies
          or ipv_fraud_disqualified_individual_authorized_representative_bar_applies
          or homeless_meal_provider_authorized_representative_bar_applies
