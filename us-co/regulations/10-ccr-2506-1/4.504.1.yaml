format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.504.1
  summary: |-
    Documentary evidence consists of written confirmation of a household's circumstances; households may supply it in person, through mail, facsimile or other electronic device, or through an authorized representative, and the local office shall not require in-person verification at the office.
rules:
  - name: household_documentary_evidence_submission_method_permitted
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.504.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.504.1
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          documentary_evidence_is_written_confirmation_of_household_circumstances
          and (
              household_supplied_documentary_evidence_in_person
              or household_supplied_documentary_evidence_through_mail
              or household_supplied_documentary_evidence_by_facsimile_or_other_electronic_device
              or household_supplied_documentary_evidence_through_authorized_representative
          )

  - name: local_office_in_person_verification_requirement_prohibited
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.504.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.504.1
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          local_office_required_household_to_present_verification_in_person_at_office
