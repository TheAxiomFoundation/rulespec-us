format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.504.6
  summary: |-
    VUR is a state-prescribed list of specific information from the primary source and free from question. VUR shall be acted upon for all households at application, recertification, periodic report, and during the certification period if it changes SNAP benefits; VUR is verified unless the office has reason to believe it may be inaccurate. Only the listed categories are VUR, including SSA Social Security/SSI amounts, Burial Assistance death information, IEVS/DOLE UIB, PA benefit amounts and PA-verified changes, ACSES child support, EF ABAWD non-compliance, Colorado IPVs, SAVE non-citizen status, specified household-composition changes, and fleeing-felon disqualification.
  deferred_outputs:
    - output: us-co:regulations/10-ccr-2506-1/4.504.6#advance_notice_of_adverse_action_given_when_acting_on_vur
      reason: >-
        Section 4.504.6(C) requires advance notice of adverse action when acting on VUR information except as noted in Section 4.608.1, but no copied RuleSpec context provides Section 4.608.1.
rules:
  - name: household_information_is_vur
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.504.6(A), (D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.504.6
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          social_security_or_ssi_benefit_amount_obtained_from_ssa
          or death_information_received_from_burial_assistance_program
          or unemployment_insurance_benefits_reported_through_ievs_and_obtained_through_dole
          or pa_benefit_amount_obtained_from_state_department
          or information_reported_and_verified_to_pa_program_changes_pa_benefit_and_meets_snap_verification
          or child_support_income_or_expense_amount_obtained_through_acses
          or ef_agency_noncompliance_information_for_abawd_work_requirement_failure
          or colorado_intentional_program_violation_information
          or save_system_non_citizen_status_information
          or reported_verified_household_composition_change_removes_member_from_one_snap_household_and_adds_to_new_or_existing_snap_household
          or child_welfare_reported_verified_household_composition_change_removes_child_from_one_snap_household_and_adds_to_new_or_existing_snap_household
          or household_member_disqualified_as_fleeing_felon

  - name: household_vur_information_verified
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.504.6(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.504.6
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.504.6#household_information_is_vur
              output: household_information_is_vur
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_information_is_vur
          and not office_has_reason_to_believe_vur_information_may_be_inaccurate

  - name: household_vur_information_action_requirement_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.504.6(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.504.6
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.504.6#household_information_is_vur
              output: household_information_is_vur
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not household_information_is_vur)
          or (
              local_office_acted_on_vur_information
              and (
                  acted_at_application
                  or acted_at_recertification
                  or acted_at_periodic_report
                  or (
                      acted_during_household_certification_period
                      and vur_information_causes_change_in_snap_benefit_amount
                  )
              )
          )

