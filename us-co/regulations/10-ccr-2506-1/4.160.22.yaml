format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.160.22
  summary: |-
    When the local office receives an alleged-discrimination complaint and obtains a complete discrimination complaint, it must transmit a copy to the FNS national office and/or State Department within five working days; the State Department files with FNS for the complainant if the local office does not.
rules:
  - name: local_office_discrimination_complaint_transmission_working_day_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.160.22
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.160.22
              excerpt: "within five (5) working days"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          5

  - name: local_office_discrimination_complaint_copy_transmission_requirement_satisfied
    kind: derived
    entity: LocalOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.160.22
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.160.22
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.160.22#local_office_discrimination_complaint_transmission_working_day_limit
              output: local_office_discrimination_complaint_transmission_working_day_limit
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          not local_office_receives_complaint_of_alleged_discrimination
          or not local_office_obtains_complete_discrimination_complaint
          or (
              local_office_transmits_copy_of_complete_discrimination_complaint_to_fns_national_office_or_state_department
              and working_days_after_complete_discrimination_complaint_obtained_when_copy_transmitted <= local_office_discrimination_complaint_transmission_working_day_limit
          )

  - name: state_department_fns_discrimination_complaint_filing_requirement_satisfied
    kind: derived
    entity: StateDepartment
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.160.22
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.160.22
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          local_office_files_discrimination_complaint_with_fns_national_office
          or state_department_files_discrimination_complaint_with_fns_national_office_on_behalf_of_complainant
