format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.308.1
  summary: |-
    Upon a determination that the individual voluntarily quit employment, the local office shall determine if there was good cause, including discrimination, unreasonable work demands or conditions, employment or at least half-time school/training enrollment requiring leaving employment, household relocation for another member's employment or enrollment, employer-recognized retirement under age sixty, illness, household emergency, unavailable transportation, employer-demanded reduction in work effort or salary through no fault of the employee, and lack of adequate child care for children who have reached age 6 but are under age 12.
  deferred_outputs:
    - output: us-co:regulations/10-ccr-2506-1/4.308.1#unsuitable_employment_resignation_good_cause_reason
      reason: >-
        Section 4.308.1(F) treats resignation from employment that does not meet
        suitable criteria specified in Section 4.310.7 as good cause, but the
        copied Section 4.310 context does not export the Section 4.310.7 suitable
        criteria needed to compute that branch.
rules:
  - name: employer_recognized_retirement_maximum_age_exclusive
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.308.1(E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.308.1
              excerpt: "persons under the age of sixty (60)"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          60

  - name: failed_full_time_employment_weekly_hours_threshold
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.308.1(G)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.308.1
              excerpt: "less than thirty (30) hours a week"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          30

  - name: federal_minimum_wage_multiplier_hours
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.308.1(G)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.308.1
              excerpt: "federal minimum wage multiplied by thirty (30) hours"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          30

  - name: inadequate_child_care_minimum_child_age_inclusive
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.308.1(N)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.308.1
              excerpt: "children who have reached age 6"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          6

  - name: inadequate_child_care_maximum_child_age_exclusive
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.308.1(N)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.308.1
              excerpt: "under age 12"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          12

  - name: listed_voluntary_quit_good_cause_reason_established
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.308.1(A)-(E), (G)-(N)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.308.1
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.308.1#employer_recognized_retirement_maximum_age_exclusive
              output: employer_recognized_retirement_maximum_age_exclusive
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.308.1#failed_full_time_employment_weekly_hours_threshold
              output: failed_full_time_employment_weekly_hours_threshold
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.308.1#federal_minimum_wage_multiplier_hours
              output: federal_minimum_wage_multiplier_hours
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.308.1#inadequate_child_care_minimum_child_age_inclusive
              output: inadequate_child_care_minimum_child_age_inclusive
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.308.1#inadequate_child_care_maximum_child_age_exclusive
              output: inadequate_child_care_maximum_child_age_exclusive
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          local_office_determined_individual_voluntarily_quit_employment
          and (
              employer_discriminated_based_on_age_race_sex_color_handicap_religious_beliefs_national_origin_or_political_beliefs
              or work_demands_or_conditions_rendered_continued_employment_unreasonable
              or individual_accepted_employment_requiring_individual_to_leave_employment
              or individual_enrolled_at_least_half_time_in_recognized_school_training_program_or_higher_education_requiring_leave_employment
              or other_household_member_accepted_employment_or_enrolled_at_least_half_time_in_recognized_school_training_program_or_higher_education_in_another_county_or_political_subdivision_requiring_household_move_and_individual_leave_employment
              or (
                  individual_age < employer_recognized_retirement_maximum_age_exclusive
                  and resignation_recognized_by_employer_as_retirement
              )
              or (
                  accepted_full_time_employment_failed_to_materialize_or_resulted_in_insufficient_hours_or_earnings_because_of_circumstances_beyond_individual_control
                  and (
                      resulting_weekly_work_hours < failed_full_time_employment_weekly_hours_threshold
                      or resulting_weekly_earnings < federal_minimum_wage * federal_minimum_wage_multiplier_hours
                  )
              )
              or individual_left_job_in_connection_with_employment_pattern_where_workers_frequently_move_from_one_employer_to_another
              or head_of_household_illness_required_individual_to_leave_employment
              or another_household_member_illness_required_presence_of_head_of_household
              or household_emergency_required_individual_to_leave_employment
              or transportation_unavailable_required_individual_to_leave_employment
              or employer_demanded_reduction_in_work_effort_or_salary_through_no_fault_of_employee
              or (
                  lack_of_adequate_child_care_required_individual_to_leave_employment
                  and child_age >= inadequate_child_care_minimum_child_age_inclusive
                  and child_age < inadequate_child_care_maximum_child_age_exclusive
              )
          )
