format: rulespec/v1
module:
  summary: 'Colorado''s SNAP rule manual prorates the initial month allotment from
    the

    application date through the end of the month, using the exact number of

    days in the calendar month. Residents of a public institution who apply

    jointly for SSI and SNAP before release use the release date instead of

    the application date. Migrant and seasonal farm worker households in the

    job stream receive the full month allotment when the break in

    participation does not exceed 30 days.'
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.207.2
  proof_validation:
    required: true
imports:
- us:policies/usda/snap/fy-2026-cola/maximum-allotments
- us:regulations/7-cfr/273/10
- us:statutes/7/2014/e/6/A
- us:statutes/7/2017/a
rules:
- name: snap_initial_month_proration_start_date
  kind: derived
  entity: Household
  dtype: Date
  period: Month
  source: 10 CCR 2506-1 section 4.207.2(A)
  versions:
  - effective_from: '2025-10-01'
    formula: "if public_institution_joint_ssi_snap_application_before_release:\n \
      \   public_institution_release_date\nelse: application_date"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.207.2
          span: 10 CCR 2506-1 section 4.207.2(A)
- name: snap_initial_month_proration_exception_scalar_limit
  kind: parameter
  dtype: Count
  source: 10 CCR 2506-1 section 4.207.2(B)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.207.2
          span: 10 CCR 2506-1 section 4.207.2(B)
  versions:
  - effective_from: '2025-10-01'
    formula: '30'
- name: snap_initial_month_proration_exception
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: 10 CCR 2506-1 section 4.207.2(B)
  versions:
  - effective_from: '2025-10-01'
    formula: 'migrant_or_seasonal_farmworker_household_in_job_stream

      and break_in_participation_days <= snap_initial_month_proration_exception_scalar_limit'
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: import
        import:
          target: us-co:regulations/10-ccr-2506-1/4.207.2#snap_initial_month_proration_exception_scalar_limit
          output: snap_initial_month_proration_exception_scalar_limit
          hash: sha256:local
- name: snap_initial_month_proration_applies
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: 10 CCR 2506-1 section 4.207.2
  versions:
  - effective_from: '2025-10-01'
    formula: initial_application_month and not snap_initial_month_proration_exception
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.207.2
          span: 10 CCR 2506-1 section 4.207.2
- name: snap_days_in_application_month
  kind: derived
  entity: Household
  dtype: Integer
  period: Month
  source: 10 CCR 2506-1 section 4.207.2(C)
  versions:
  - effective_from: '2025-10-01'
    formula: days_between(period_start, date_add_days(period_end, 1))
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.207.2
          span: 10 CCR 2506-1 section 4.207.2(C)
- name: snap_initial_month_proration_days
  kind: derived
  entity: Household
  dtype: Integer
  period: Month
  source: 10 CCR 2506-1 section 4.207.2(C)
  versions:
  - effective_from: '2025-10-01'
    formula: "days_between(\n    snap_initial_month_proration_start_date,\n    date_add_days(period_end,\
      \ 1)\n)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.207.2
          span: 10 CCR 2506-1 section 4.207.2(C)
- name: snap_initial_month_proration_factor
  kind: derived
  entity: Household
  dtype: Rate
  period: Month
  source: 10 CCR 2506-1 section 4.207.2(C)
  versions:
  - effective_from: '2025-10-01'
    formula: snap_initial_month_proration_days / snap_days_in_application_month
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.207.2
          span: 10 CCR 2506-1 section 4.207.2(C)
- name: snap_initial_month_prorated_allotment
  kind: derived
  entity: Household
  dtype: Money
  period: Month
  unit: USD
  source: 10 CCR 2506-1 section 4.207.2(C)
  versions:
  - effective_from: '2025-10-01'
    formula: "min(\n    snap_calculated_monthly_allotment_before_minimums,\n    floor(snap_calculated_monthly_allotment_before_minimums\
      \ * snap_initial_month_proration_factor)\n)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.207.2
          span: 10 CCR 2506-1 section 4.207.2(C)
