          span: 10 CCR 2506-1 section 4.207.2 and 7 CFR 273.10(e)(2)(ii)(B)
- name: snap_allotment
  kind: derived
  entity: Household
  dtype: Money
  period: Month
  unit: USD
  source: 10 CCR 2506-1 sections 4.207.2 and 4.207.3(B)
  versions:
