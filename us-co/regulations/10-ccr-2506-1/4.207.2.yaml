  source: 10 CCR 2506-1 section 4.207.2 and 7 CFR 273.10(e)(2)(ii)(B)
  versions:
  - effective_from: '2025-10-01'
    formula: 'if snap_initial_month_prorated_allotment < snap_initial_month_minimum_issuance:
      0 else: snap_initial_month_prorated_allotment'
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
