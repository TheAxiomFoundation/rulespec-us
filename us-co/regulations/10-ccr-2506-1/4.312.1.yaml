format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.312.1
  summary: |-
    Local offices choosing to administer an EF program shall submit a county plan as prescribed by CDHS and operate in alignment with the CDHS Employment and Training plan; failure to adhere results in a Corrective Action Plan. Contractual agreements for EF service delivery shall be reviewed by CDHS before implementation. Every EF program must monitor ABAWDs who choose to use EF to meet their ABAWD work requirement. The EF provider shall deliver prescribed case management, submit reports, coordinate with state EF staff, reimburse participants appropriately, use required forms, attend required meetings and training, ensure allowable program costs, avoid suspending program services for longer than fourteen consecutive days, and communicate discovered exemptions to county eligibility.
rules:
  - name: ef_program_service_suspension_consecutive_day_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.312.1(B)(8)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.312.1
              excerpt: "not suspended for longer than fourteen (14) consecutive days"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          14

  - name: local_office_ef_county_plan_and_alignment_compliant
    kind: derived
    entity: StateAgency
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.312.1 opening paragraph
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.312.1
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not local_office_chooses_to_administer_ef_program)
          or (
              local_office_submitted_county_plan_as_prescribed_by_cdhs
              and local_office_operates_ef_program_in_alignment_with_cdhs_employment_and_training_plan
          )

  - name: cdhs_corrective_action_plan_result_triggered
    kind: derived
    entity: StateAgency
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.312.1 opening paragraph
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.312.1
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          local_office_failed_to_adhere_to_requirements_described_in_cdhs_employment_and_training_plan

  - name: ef_contractual_agreement_cdhs_reviewed_before_implementation
    kind: derived
    entity: StateAgency
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.312.1 second paragraph
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.312.1
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not local_office_entered_contractual_agreement_for_ef_program_service_delivery)
          or (
              cdhs_reviewed_ef_contractual_agreement_for_adherence_to_program_requirements
              and cdhs_reviewed_ef_contractual_agreement_before_implementation
          )

  - name: abawd_ef_work_requirement_monitoring_completed
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.312.1(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.312.1
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          abawd_chooses_to_use_ef_to_meet_abawd_work_requirement
          and (
              ef_program_obtained_employment_or_volunteer_working_hours_information
              or ef_program_ensured_abawd_participating_in_allowable_employment_first_component
          )

  - name: ef_provider_case_management_services_delivered
    kind: derived
    entity: StateAgency
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.312.1(B)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.312.1
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          ef_provider_delivered_case_management_services_as_prescribed_in_cdhs_ef_state_plan

  - name: ef_provider_required_reports_submitted_timely
    kind: derived
    entity: StateAgency
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.312.1(B)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.312.1
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          ef_provider_compiled_data
          and ef_provider_submitted_required_reports_within_prescribed_timeframes

  - name: ef_provider_operations_coordinated_with_state_staff
    kind: derived
    entity: StateAgency
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.312.1(B)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.312.1
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          ef_provider_coordinated_program_operations_with_state_ef_staff
          and coordination_in_accordance_with_annual_cdhs_employment_and_training_plan
          and coordination_in_accordance_with_specific_county_ef_plan

  - name: ef_participant_reimbursement_appropriate
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.312.1(B)(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.312.1
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          ef_participant_received_appropriate_reimbursement_for_participation
          and (
              reimbursement_was_for_actual_transportation_costs
              or reimbursement_was_for_other_costs_outlined_in_cdhs_employment_and_training_plan
          )

  - name: ef_provider_required_forms_utilized
    kind: derived
