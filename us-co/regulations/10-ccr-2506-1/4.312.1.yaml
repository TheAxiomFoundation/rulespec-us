          and ef_provider_attended_ef_program_training_as_required

  - name: ef_funds_expended_allowable_program_costs
    kind: derived
    entity: StateAgency
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.312.1(B)(7)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.312.1
