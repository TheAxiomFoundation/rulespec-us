    source: 10 CCR 2506-1 section 4.312.1(B)(5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.312.1
    versions:
