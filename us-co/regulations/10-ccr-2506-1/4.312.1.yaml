        formula: |-
          ef_provider_utilized_forms_prescribed_or_approved_by_state

  - name: ef_provider_required_meetings_and_training_attended
    kind: derived
    entity: StateAgency
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.312.1(B)(6)
    metadata:
