format: rulespec/v1
module:
  summary: 'Colorado''s SNAP rule manual calculates destitute households'' application

    month eligibility and benefit level by considering only income received

    between the first of the month and the application date. If the

    application is an initial month application or the first application after

    the prior certification expired, the initial month allotment is prorated

    from the application date to the end of the month. Income of more than 25

    dollars from a new source is disregarded when it has not been received or

    anticipated within 10 calendar days. Employer travel advances reimbursing

    relocation travel costs are exempt; wage advances under written contract

    count as income but do not affect whether later employer payments are from

    a new source or whether the household is destitute.'
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.406.1
  proof_validation:
    required: true
rules:
- name: snap_destitute_new_source_income_disregard_scalar_limit
  kind: parameter
  dtype: Count
  source: 10 CCR 2506-1 section 4.406.1(B)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.406.1
          span: 10 CCR 2506-1 section 4.406.1(B)
  versions:
  - effective_from: '2025-10-01'
    formula: '25'
- name: snap_destitute_new_source_income_disregard
  kind: derived
  entity: Household
  dtype: Money
  period: Month
  unit: USD
  source: 10 CCR 2506-1 section 4.406.1(B)
  versions:
  - effective_from: '2025-10-01'
    formula: "if new_source_income_amount > snap_destitute_new_source_income_disregard_scalar_limit\
      \ and not new_source_income_received_or_anticipated_within_10_days:\n    new_source_income_amount\n\
      else: 0"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: import
        import:
          target: us-co:regulations/10-ccr-2506-1/4.406.1#snap_destitute_new_source_income_disregard_scalar_limit
          output: snap_destitute_new_source_income_disregard_scalar_limit
          hash: sha256:local
- name: snap_destitute_application_month_countable_income
  kind: derived
  entity: Household
  dtype: Money
  period: Month
  unit: USD
  source: 10 CCR 2506-1 section 4.406.1(A)-(B)
  versions:
  - effective_from: '2025-10-01'
    formula: "if snap_destitute_income_household:\n    max(\n        0,\n        income_received_from_first_of_month_through_application_date\n\
      \        - snap_destitute_new_source_income_disregard\n    )\nelse: normal_application_month_countable_income"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.406.1
          span: 10 CCR 2506-1 section 4.406.1(A)-(B)
- name: snap_destitute_initial_month_proration_required
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
