format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.309.1
  summary: |-
    Households with special circumstances, such as a person with disabilities, persons aged sixty (60) and older, or group living arrangements, may be authorized to use SNAP benefits to buy food from authorized communal dining facilities, meals on wheels, drug and alcohol treatment and rehabilitation centers, and shelters for battered women and children. Households experiencing homelessness may use SNAP benefits for prepared meals from approved restaurants and meals prepared for and served by an authorized provider that feeds persons experiencing homelessness.
rules:
  - name: household_has_source_listed_special_circumstance
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.309.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.309.1
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_includes_person_with_disabilities
          or household_includes_person_aged_sixty_or_older
          or household_is_group_living_arrangement

  - name: special_circumstance_household_authorized_facility_food_purchase
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.309.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.309.1
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.309.1#household_has_source_listed_special_circumstance
              output: household_has_source_listed_special_circumstance
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_has_source_listed_special_circumstance
          and snap_benefits_used_to_buy_food
          and (
              food_bought_from_authorized_communal_dining_facility
              or food_bought_from_authorized_meals_on_wheels
              or food_bought_from_authorized_drug_and_alcohol_treatment_and_rehabilitation_center
              or food_bought_from_authorized_shelter_for_battered_women_and_children
          )

  - name: homeless_household_prepared_restaurant_meal_purchase_authorized
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.309.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.309.1
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_experiencing_homelessness
          and snap_benefits_used_to_purchase_prepared_meals
          and prepared_meals_purchased_from_approved_restaurant

  - name: homeless_household_authorized_provider_meal_use_authorized
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.309.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.309.1
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_experiencing_homelessness
          and food_benefits_used_for_meals_prepared_for_and_served_by_authorized_provider
          and authorized_provider_feeds_persons_experiencing_homelessness
