format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.81
  summary: |-
    The cashier shall use Form FS-10 each issuance day to record beginning EBT card inventory, replenishment receipts, returns to inventory, and end-of-day physical-count cards on hand; actual issuance totals must be reconciled with Form FS-52, Form FS-11, or other authorizing documents each issuance day.
rules:
  - name: cashier_fs_10_daily_ebt_card_inventory_report_completed
    kind: derived
    entity: Cashier
    dtype: Judgment
    period: Day
    source: 10 CCR 2506-1 section 4.707.81
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.81
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not cashier_has_issuance_day)
          or fs_10_used_to_record_required_daily_ebt_card_inventory_information

  - name: cashier_actual_ebt_card_issuance_totals_reconciled
    kind: derived
    entity: Cashier
    dtype: Judgment
    period: Day
    source: 10 CCR 2506-1 section 4.707.81
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.81
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not cashier_has_issuance_day)
          or (
              cashier_actual_issuance_totals_reconciled
              and (
                  reconciliation_used_form_fs_52
                  or reconciliation_used_form_fs_11
                  or reconciliation_used_other_authorizing_documents
              )
          )
