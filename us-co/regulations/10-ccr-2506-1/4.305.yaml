              output: qualified_noncitizen_status_without_additional_condition
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.305#qualified_noncitizen_status_requiring_additional_condition
              output: qualified_noncitizen_status_requiring_additional_condition
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.305#qualified_noncitizen_additional_condition_met
              output: qualified_noncitizen_additional_condition_met
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          qualified_noncitizen_status_without_additional_condition
          or qualified_noncitizen_is_under_eighteen_and_in_qualified_status
          or (
              qualified_noncitizen_status_requiring_additional_condition
              and qualified_noncitizen_additional_condition_met
          )

