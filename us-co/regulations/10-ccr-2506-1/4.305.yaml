          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.305#qualified_work_quarters_required
              output: qualified_work_quarters_required
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          qualifying_work_quarters_countable_for_snap >= qualified_work_quarters_required

  - name: qualified_noncitizen_additional_condition_met
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.305(B)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.305
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.305#qualified_status_five_year_residence_years
              output: qualified_status_five_year_residence_years
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.305#qualifying_work_quarters_condition_met
              output: qualifying_work_quarters_condition_met
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          qualified_noncitizen_years_lived_in_united_states_in_qualified_status >= qualified_status_five_year_residence_years
          or qualifying_work_quarters_condition_met
          or qualified_noncitizen_is_under_eighteen_and_lawfully_resides_in_united_states
          or qualified_noncitizen_is_blind_or_disabled_and_receives_benefits_or_assistance_for_condition
          or qualified_noncitizen_born_on_or_before_august_22_1931_and_lawfully_resided_in_united_states_on_august_22_1996
          or qualified_noncitizen_has_eligible_military_connection

  - name: qualified_noncitizen_status_eligible
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.305(B)(1) and 4.305(B)(3)
    metadata:
