format: rulespec/v1
module:
  summary: |-
    Colorado's SNAP rule manual describes citizen, non-citizen national,
    qualified non-citizen, and certain non-qualified non-citizen categories
    that can satisfy SNAP citizenship or non-citizen status eligibility. This
    section restates the federal citizenship and alien-status eligibility rule
    in 7 CFR 273.4.
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.305
imports:
  - us:regulations/7-cfr/273/4
rules:
  - name: restates_citizen_or_national_status
    kind: source_relation
    source: 10 CCR 2506-1 section 4.305(A)
    source_relation:
      type: restates
      target: us:regulations/7-cfr/273/4#snap_member_citizen_or_national_status_eligible
      authority: federal
  - name: restates_special_nonqualified_alien_status
    kind: source_relation
    source: 10 CCR 2506-1 section 4.305(B)(2)
    source_relation:
      type: restates
      target: us:regulations/7-cfr/273/4#snap_member_special_nonqualified_alien_status_eligible
      authority: federal
  - name: restates_qualified_alien_status
    kind: source_relation
    source: 10 CCR 2506-1 section 4.305(B)(1) and 4.305(B)(3)
    source_relation:
      type: restates
      target: us:regulations/7-cfr/273/4#snap_member_qualified_alien_status_eligible
      authority: federal
  - name: restates_citizenship_or_alien_status_eligibility
    kind: source_relation
    source: 10 CCR 2506-1 section 4.305
    source_relation:
      type: restates
      target: us:regulations/7-cfr/273/4#snap_member_citizenship_or_alien_status_eligible
      authority: federal
