format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.305
  summary: |-
    Citizens and non-citizen nationals have the same potential SNAP eligibility, provided other eligibility requirements are met. Qualified non-citizens and certain non-qualified non-citizens are eligible under listed conditions; some qualified non-citizens are eligible without an additional condition, while others must satisfy one additional condition such as five years in qualified status, forty qualifying work quarters, being under eighteen, receiving blindness or disability benefits, qualifying age/residence, or a military connection.
imports:
  - us:regulations/7-cfr/273/4
rules:
  - name: qualified_status_five_year_residence_years
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.305(B)(3)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.305
              excerpt: "Five (5) Years of Residence"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          5

  - name: qualified_work_quarters_required
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.305(B)(3)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.305
              excerpt: "Forty (40) Qualifying Work Quarters"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          40

  - name: trafficking_minor_interim_assistance_letter_calendar_day_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.305(B)(1)(a)(2)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.305
              excerpt: "interim assistance letters that are provided to children are valid for ninety (90) calendar days"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          90

  - name: trafficking_minor_interim_assistance_extension_calendar_day_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.305(B)(1)(a)(2)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.305
              excerpt: "ORR may extend the interim eligibility an additional thirty (30) calendar days"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          30

  - name: citizen_or_noncitizen_national_status_potentially_eligible
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.305(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.305
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          person_is_united_states_citizen
          or person_is_noncitizen_national

  - name: trafficking_victim_status_documentation_accepted
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.305(B)(1)(a)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.305
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.305#trafficking_minor_interim_assistance_letter_calendar_day_limit
              output: trafficking_minor_interim_assistance_letter_calendar_day_limit
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.305#trafficking_minor_interim_assistance_extension_calendar_day_limit
              output: trafficking_minor_interim_assistance_extension_calendar_day_limit
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          trafficking_victim_certification_or_eligibility_letter_present
          or (
              trafficked_minor_has_interim_assistance_letter
              and trafficking_minor_interim_assistance_letter_calendar_days_since_effective_date <= trafficking_minor_interim_assistance_letter_calendar_day_limit + trafficking_minor_interim_assistance_extension_calendar_day_limit
          )

  - name: qualified_noncitizen_status_without_additional_condition
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.305(B)(1)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.305
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.305#trafficking_victim_status_documentation_accepted
              output: trafficking_victim_status_documentation_accepted
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          person_is_refugee
          or trafficking_victim_status_documentation_accepted
          or person_is_asylee
          or person_has_deportation_or_removal_withheld
          or person_is_cuban_or_haitian_entrant
          or person_is_amerasian
          or person_is_iraqi_or_afghan_special_immigrant

  - name: battered_noncitizen_qualified_status_established
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.305(B)(1)(b)(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.305
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          person_is_battered_or_subject_to_extreme_cruelty_covered_noncitizen
          and battered_noncitizen_has_approved_or_pending_qualifying_immigration_petition
          and substantial_connection_between_battery_or_extreme_cruelty_and_need_for_snap
          and battered_noncitizen_child_or_parent_no_longer_resides_with_abuser

  - name: qualified_noncitizen_status_requiring_additional_condition
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.305(B)(1)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.305
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.305#battered_noncitizen_qualified_status_established
              output: battered_noncitizen_qualified_status_established
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (
              person_is_lawful_permanent_resident
              and not person_adjusted_to_lpr_after_status_without_additional_condition
          )
          or person_paroled_into_united_states_for_at_least_one_year
          or person_granted_conditional_entry_before_applicable_1980_date
          or battered_noncitizen_qualified_status_established

