format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.803.41
  summary: |-
    Households mailed a waiver request receive a statement of rights and notice of a fifteen-day response period. Completion is voluntary. If the suspected intentional-program-violation member signs and returns the waiver within fifteen days, that person and the head of household receive a notice of disqualification; disqualification begins the first month after receipt. After waiver, no further administrative appeal exists, though court relief or stay may be sought. If the waiver is not returned, local-level hearing offices mail a Notice of Intentional Program Violation Hearing with hearing procedure within five working days after the waiver deadline.
rules:
  - name: waiver_response_period_days
    kind: parameter
    dtype: Integer
    source: 10 CCR 2506-1, 4.803.41(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.803.41
              excerpt: "fifteen (15) days from the date the waiver ... was dated and mailed"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          15

  - name: hearing_notice_mailing_period_working_days
    kind: parameter
    dtype: Integer
    source: 10 CCR 2506-1, 4.803.41(F)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.803.41
              excerpt: "within five (5) working days after the deadline"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          5

  - name: waiver_returned_within_response_period
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 10 CCR 2506-1, 4.803.41(A), (C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.803.41
              excerpt: "returns the waiver ... within fifteen (15) days from the date it is dated and mailed"
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.803.41#waiver_response_period_days
              output: waiver_response_period_days
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          waiver_returned_to_local_office
          and days_since_waiver_dated_and_mailed <= waiver_response_period_days

  - name: statement_of_rights_must_be_provided
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 10 CCR 2506-1, 4.803.41(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.803.41
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_mailed_request_for_waiver_of_administrative_disqualification_hearing

  - name: waiver_completion_must_be_voluntary
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 10 CCR 2506-1, 4.803.41(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.803.41
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          waiver_of_administrative_disqualification_hearing_completion_is_voluntary
          and not local_office_requires_waiver_completion
          and not local_office_actions_appear_to_require_waiver_completion

  - name: notice_of_disqualification_for_waived_hearing_must_be_provided
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: 10 CCR 2506-1, 4.803.41(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.803.41
              excerpt: "that person and the head of household shall be provided with a notice of disqualification"
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.803.41#waiver_response_period_days
              output: waiver_response_period_days
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          suspected_intentional_program_violation_member_signed_waiver
          and waiver_returned_to_local_office
          and days_since_waiver_dated_and_mailed <= waiver_response_period_days
          and (person_is_suspected_intentional_program_violation_member or person_is_head_of_household)

  - name: administrative_appeal_available_after_voluntary_waiver
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: 10 CCR 2506-1, 4.803.41(E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.803.41
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not individual_voluntarily_waived_right_to_administrative_disqualification_hearing_for_intentional_program_violation

  - name: court_relief_available_after_voluntary_waiver
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: 10 CCR 2506-1, 4.803.41(E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.803.41
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_voluntarily_waived_right_to_administrative_disqualification_hearing_for_intentional_program_violation

  - name: intentional_program_violation_hearing_notice_must_be_mailed_with_procedure
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 10 CCR 2506-1, 4.803.41(F)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.803.41
              excerpt: "If the waiver is not returned ... within five (5) working days after the deadline"
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.803.41#hearing_notice_mailing_period_working_days
              output: hearing_notice_mailing_period_working_days
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          local_office_conducts_local_level_administrative_disqualification_hearings
          and not waiver_returned_to_local_office
          and working_days_after_waiver_receipt_deadline <= hearing_notice_mailing_period_working_days
