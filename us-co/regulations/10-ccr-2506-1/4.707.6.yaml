format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.6
  summary: |-
    Local offices shall establish issuance locations for EBT cards. The state department must be notified of issuance-location and EBT-card shipment receiving point creations, changes, or terminations at least thirty calendar days before the effective date. Terminated issuance offices or bulk storage points require closeout accountability audit, USDA/FNS forwarding, inventory count and transfer, and Form FNS-250 documentation. Participants must be notified at least thirty calendar days before closure, with alternative locations, public transportation information, prominent office notice, and uninterrupted service. Inter-project-area EBT-card transfers are allowed only in emergencies and only when authorized by the state department, with Form FNS-300 and Form FNS-250 documentation.
rules:
  - name: issuance_location_action_state_department_notice_calendar_day_minimum
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.707.6(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.6
              excerpt: "at least thirty (30) calendar days prior to THE effective date of action"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          30

  - name: terminated_issuance_office_or_bulk_storage_audit_calendar_day_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.707.6(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.6
              excerpt: "within thirty (30) calendar days of the termination"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          30

  - name: issuance_location_closure_participant_notice_calendar_day_minimum
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.707.6(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.6
              excerpt: "At least thirty (30) calendar days prior to closure of an issuance location"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          30

  - name: local_office_issuance_locations_established
    kind: derived
    entity: LocalOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.707.6(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.6
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          local_office_has_responsibility_for_snap_ebt_card_issuance
          and local_office_established_issuance_locations
          and issuance_locations_accomplish_ebt_card_issuance_to_certified_snap_households

  - name: issuance_location_or_receiving_point_action_notice_timely
    kind: derived
    entity: LocalOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.707.6(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.6
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.707.6#issuance_location_action_state_department_notice_calendar_day_minimum
              output: issuance_location_action_state_department_notice_calendar_day_minimum
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not issuance_location_or_ebt_card_shipment_receiving_point_created_changed_or_terminated)
          or (
              state_department_notified_of_issuance_location_or_receiving_point_action
              and calendar_days_notice_before_effective_date_of_action >= issuance_location_action_state_department_notice_calendar_day_minimum
          )

  - name: terminated_issuance_office_or_bulk_storage_closeout_completed
    kind: derived
    entity: StateAgency
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.707.6(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.6
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.707.6#terminated_issuance_office_or_bulk_storage_audit_calendar_day_limit
              output: terminated_issuance_office_or_bulk_storage_audit_calendar_day_limit
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not issuance_office_or_bulk_storage_point_terminated)
          or (
              closeout_accountability_audit_completed
              and calendar_days_after_termination_before_audit_completed <= terminated_issuance_office_or_bulk_storage_audit_calendar_day_limit
              and audit_findings_forwarded_to_usda_fns_immediately
              and ebt_cards_on_hand_count_performed
              and ebt_card_inventory_transferred_to_another_issuance_office_or_bulk_storage_point
              and actual_inventory_and_transfer_properly_documented
              and actual_inventory_and_transfer_reported_on_form_fns_250
          )

  - name: issuance_location_closure_participant_service_continuity_completed
    kind: derived
    entity: LocalOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.707.6(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.6
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.707.6#issuance_location_closure_participant_notice_calendar_day_minimum
              output: issuance_location_closure_participant_notice_calendar_day_minimum
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not issuance_location_closure_impending)
          or (
              snap_participants_notified_of_impending_issuance_location_closure
              and calendar_days_notice_before_issuance_location_closure >= issuance_location_closure_participant_notice_calendar_day_minimum
              and closure_notification_included_alternative_issuance_locations
              and closure_notification_included_available_public_transportation_information
              and notice_of_closure_prominently_displayed_in_issuance_office
              and necessary_action_taken_to_maintain_participant_service_without_interruption
          )

  - name: inter_project_area_ebt_card_transfer_requirements_met
    kind: derived
    entity: LocalOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.707.6(E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.6
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not ebt_cards_transferred_between_project_areas)
          or (
              transfer_between_project_areas_is_emergency_situation
              and state_department_authorized_transfer_between_project_areas
              and transferring_office_initiated_form_fns_300
              and transferring_office_retained_copy_4_of_form_fns_300
              and transferring_office_forwarded_all_other_form_fns_300_parts_to_receiving_office_with_ebt_card_shipment
              and receiving_office_dated_and_signed_form_fns_300_on_verification_of_shipment
              and receiving_office_returned_copy_3_of_form_fns_300_to_transferring_office
              and transferring_out_county_documented_transaction_on_form_fns_250
              and transferring_in_county_documented_transaction_on_form_fns_250
              and form_fns_250_submitted_at_end_of_month
          )
