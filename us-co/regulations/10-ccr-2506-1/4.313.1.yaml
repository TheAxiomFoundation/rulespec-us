format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.313.1
  summary: |-
    Local offices choosing to administer a Colorado Workfare program shall submit a county plan as prescribed by CDHS and operate in alignment with the CDHS Section 20 Workfare plan; failure to adhere to that plan results in a Correct Action Plan.
rules:
  - name: colorado_workfare_program_administration_requirements_satisfied
    kind: derived
    entity: LocalOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.313.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.313.1
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not local_office_chooses_to_administer_colorado_workfare_program)
          or (
              local_office_submitted_county_plan_as_prescribed_by_cdhs
              and local_office_operates_workfare_program_in_alignment_with_cdhs_section_20_workfare_plan
          )

  - name: corrective_action_plan_required_after_section_20_workfare_plan_nonadherence
    kind: derived
    entity: LocalOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.313.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.313.1
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          local_office_chooses_to_administer_colorado_workfare_program
          and not local_office_adhered_to_cdhs_section_20_workfare_plan_requirements
