format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.701.2
  summary: |-
    Certification units shall issue a CO/EBTS debit card to each certified household; cards are issued under the Social Security Number or client ID number of the authorized household member or authorized representative. Households or authorized representatives present the card to transact allotments or exchange benefits for eligible food. Cards must include space for the authorized name and signature, replacements are limited to specified circumstances, replacement notice must assure only the most recently issued card is used, specified elderly, disabled, housebound, or handicapped members and spouses may use benefits for USDA/FNS-authorized meal services, and EBT cards must be kept in secure storage with access limited to authorized personnel.
rules:
  - name: elderly_or_disabled_delivery_meal_purchase_with_ebt_permitted
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.701.2(E)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.701.2
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.701.2
              excerpt: "sixty (60) years of age or over"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          member_is_eligible_household_member
          and (
              member_is_sixty_years_of_age_or_over
              or member_is_housebound
              or member_is_physically_handicapped
              or member_is_person_with_disabilities_unable_to_adequately_prepare_all_meals
              or member_is_spouse_of_eligible_member_described_for_delivery_meals
          )
          and benefits_used_to_purchase_meals_prepared_for_and_delivered_to_member
          and meal_delivery_service_is_nonprofit
          and meal_delivery_service_authorized_by_usda_fns

  - name: elderly_communal_dining_meal_purchase_with_ebt_permitted
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.701.2(E)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.701.2
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.701.2
              excerpt: "sixty (60) years of age or over"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          member_is_eligible_household_member
          and (
              member_is_sixty_years_of_age_or_over
              or member_is_spouse_of_eligible_member_sixty_years_of_age_or_over
          )
          and benefits_used_to_purchase_meals_prepared_especially_for_member
          and meals_purchased_at_communal_dining_facility
          and communal_dining_facility_authorized_by_usda_fns_for_that_purpose

  - name: ebt_card_issued_to_certified_household
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.701.2(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.701.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not household_is_certified)
          or (
              certification_unit_issued_co_ebts_debit_card_to_household
              and card_issued_under_social_security_number_or_client_id_number_of_authorized_recipient
              and authorized_recipient_designated_by_household_to_receive_issuance
          )

  - name: household_presented_ebt_card_for_benefit_transaction
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.701.2(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.701.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_or_authorized_representative_presented_co_ebts_debit_card
          and (
              card_presented_at_issuance_point
              or card_presented_at_retail_outlet
              or card_presented_at_meal_service
          )
          and (
              transaction_was_allotment_authorization
              or transaction_exchanged_benefits_for_eligible_food
          )

  - name: ebt_card_contains_authorized_name_and_signature_space
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.701.2(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.701.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          ebt_card_contains_space_for_name_and_signature_of_household_member_to_whom_allotment_is_issued
          or ebt_card_contains_space_for_name_and_signature_of_authorized_representative_designated_by_household

  - name: ebt_card_replacement_permitted
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.701.2(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.701.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          ebt_card_is_lost
          or ebt_card_is_mutilated
          or ebt_card_is_destroyed
          or person_authorized_to_obtain_benefits_changed
          or local_office_determines_new_ebt_card_needed

  - name: local_office_ebt_card_issuance_limited_to_initial_certification_or_permitted_replacement
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.701.2(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.701.2
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.701.2#ebt_card_replacement_permitted
              output: ebt_card_replacement_permitted
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          ebt_card_issued_at_initial_certification
          or ebt_card_replacement_permitted

  - name: replaced_ebt_card_collected_when_possible
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.701.2(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.701.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not local_office_replaced_ebt_card)
          or (not local_office_could_collect_replaced_ebt_card)
          or local_office_collected_replaced_ebt_card

  - name: replacement_ebt_card_notice_assures_only_most_recent_card_used
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.701.2(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.701.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not replacement_ebt_card_issued)
          or (
              issuance_unit_notified_of_replacement_ebt_card
              and only_most_recently_issued_ebt_card_used_for_benefit_issuance
          )

  - name: ebt_cards_secure_storage_access_limited
    kind: derived
    entity: StateAgency
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.701.2(F)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.701.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          ebt_cards_kept_in_secure_storage
          and access_to_ebt_card_storage_limited_to_authorized_personnel_only
