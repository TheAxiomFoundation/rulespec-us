format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.7
  summary: |-
    The state department shall conduct an onsite review of each EBT issuance office and bulk storage point at least once every three (3) years; all offices or units of an EBT issuance office are subject to review; each review is based on specific activities, includes a physical EBT card inventory compared with records and monthly reports, and may include branch sites as well as main offices for multi-office issuers and bulk storage points.
rules:
  - name: ebt_onsite_review_year_interval_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.707.7
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.7
              excerpt: "at least once every three (3) years"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          3

  - name: ebt_issuance_office_or_bulk_storage_point_onsite_review_timely
    kind: derived
    entity: StateAgency
    dtype: Judgment
    period: Year
    source: 10 CCR 2506-1 section 4.707.7
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.7
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.707.7#ebt_onsite_review_year_interval_limit
              output: ebt_onsite_review_year_interval_limit
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          location_is_ebt_issuance_office_or_bulk_storage_point
          and state_department_conducted_onsite_review
          and years_since_prior_onsite_review <= ebt_onsite_review_year_interval_limit

  - name: ebt_issuance_office_units_subject_to_onsite_review
    kind: derived
    entity: StateAgency
    dtype: Judgment
    period: Year
    source: 10 CCR 2506-1 section 4.707.7
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.7
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          location_is_office_or_unit_of_ebt_issuance_office
          and location_subject_to_onsite_review_requirement

  - name: ebt_onsite_review_based_on_specific_activities
    kind: derived
    entity: StateAgency
    dtype: Judgment
    period: Year
    source: 10 CCR 2506-1 section 4.707.7
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.7
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          location_is_ebt_card_issuer_or_bulk_storage_point
          and review_based_on_specific_activities_performed_by_location

  - name: ebt_card_physical_inventory_review_completed
    kind: derived
    entity: StateAgency
    dtype: Judgment
    period: Year
    source: 10 CCR 2506-1 section 4.707.7
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.7
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          physical_inventory_of_ebt_cards_taken_at_location
          and ebt_card_count_compared_with_perpetual_inventory_records
          and ebt_card_count_compared_with_monthly_reports_of_issuer_or_bulk_storage_point

  - name: ebt_multi_office_branch_and_main_site_review_permitted
    kind: derived
    entity: StateAgency
    dtype: Judgment
    period: Year
    source: 10 CCR 2506-1 section 4.707.7
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.7
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          issuer_or_bulk_storage_point_operates_in_more_than_one_office
          and review_conducted_at_branch_sites_or_main_offices
