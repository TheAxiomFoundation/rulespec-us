format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.706
  summary: A household may request replacement issuance when food purchased with program
    benefits was destroyed in a household misfortune. Replacement is in the amount
    of the loss, not to exceed one month's allotment, unless restored benefits are
    included and replaced up to full value. The household must report destruction
    within ten calendar days and sign and return a statement or Affidavit within ten
    calendar days of the report, with weekend/holiday extension for the tenth day.
    The local office must verify the disaster, issue replacement benefits within ten
    calendar days of the loss report if the signed statement is received, or within
    two business days when the statement is received on the ninth or tenth day, document
    the replacement, and place no limit on the number of replacements for food destroyed
    in household misfortune.
rules:
