format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.201
  summary: |-
    Local offices shall not impose additional SNAP application conditions beyond State SNAP rules; shall act promptly and provide benefits retroactive to the month of application for eligible households that complete the process; shall screen applications for expedited or normal processing without pre-eligibility screening before securing the application date; shall document voluntary withdrawal or termination reasons and send a Notice of Action within ten calendar days; shall not deny SNAP solely because another program is denied or terminated without a separate SNAP eligibility determination; public-institution residents applying jointly for SSI and SNAP before release are not SNAP eligible until release; racial and ethnic data are recorded only to ensure nondiscrimination and must not affect eligibility or benefit levels.
  deferred_outputs:
    - output: us-co:regulations/10-ccr-2506-1/4.201#snap_application_processing_service_track
      reason: >-
        Section 4.201(C) requires expedited-service households to be served in
        accordance with sections 4.205.1 and 4.205.11 and normal-processing
        households to be served in accordance with section 4.205.2, but those
        cited RuleSpec sources are not available in the copied context.
rules:
  - name: voluntary_withdrawal_notice_calendar_day_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.201(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.201
              excerpt: "within ten (10) calendar days"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          10

  - name: voluntary_withdrawal_or_termination_notice_timely
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.201(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.201
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.201#voluntary_withdrawal_notice_calendar_day_limit
              output: voluntary_withdrawal_notice_calendar_day_limit
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_voluntarily_withdrew_application_or_terminated_participation
          and notice_of_action_sent_to_household
          and notice_of_action_sent_calendar_days_after_decision <= voluntary_withdrawal_notice_calendar_day_limit

  - name: snap_denial_based_solely_on_other_program_action_prohibited
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.201(E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.201
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          snap_benefits_denied
          and application_to_participate_in_another_program_denied_or_benefits_under_another_program_terminated
          and not local_office_made_separate_determination_household_failed_snap_eligibility_requirement

  - name: public_institution_joint_ssi_snap_applicant_ineligible_until_release
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.201(F)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.201
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          resident_of_public_institution_applied_jointly_for_ssi_and_snap_before_release
          and not individual_released_from_public_institution

  - name: race_ethnicity_information_affects_snap_eligibility_or_benefit_level_prohibited
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.201(G)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.201
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          racial_or_ethnic_data_used_to_affect_snap_eligibility_or_level_of_benefits

  - name: additional_race_ethnicity_observation_or_questioning_prohibited
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.201(G)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.201
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_did_not_declare_race_or_ethnicity_information
          and household_subject_to_additional_observation_or_questioning_to_obtain_race_or_ethnicity_information

  - name: eligibility_technician_challenge_or_change_self_declared_race_ethnicity_prohibited
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.201(G)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.201
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          eligibility_technician_challenged_or_changed_household_member_race_or_ethnicity_self_declaration
