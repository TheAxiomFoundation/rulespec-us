format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.504.3
  summary: |-
    Home visits are verification for eligibility only if documentary evidence cannot be obtained, the visit is scheduled in advance with the household, and supplied documentation or verification is insufficient on a case-by-case basis.
rules:
  - name: home_visit_as_eligibility_verification_permitted
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.504.3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.504.3
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          home_visit_used_as_verification_for_eligibility
          and documentary_evidence_cannot_be_obtained
          and home_visit_scheduled_in_advance_with_household
          and supplied_documentation_or_verification_insufficient
          and home_visit_used_on_case_by_case_basis
