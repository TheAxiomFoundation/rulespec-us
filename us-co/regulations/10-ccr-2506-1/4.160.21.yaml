format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.160.21
  summary: |-
    Individuals who believe they have been subject to discrimination may file a written complaint; complaints shall be submitted to the FNS national office. Verbal allegations must be documented in writing if the complainant is unable or unwilling to write them. A complaint shall not be investigated unless items C.2 through C.4 are provided, and must be filed no later than 180 calendar days from the alleged discrimination.
rules:
  - name: discrimination_complaint_filing_day_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.160.21(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.160.21
              excerpt: "no later than one hundred eighty (180) calendar days"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          180

  - name: discrimination_complaint_written_documentation_satisfied
    kind: derived
    entity: DiscriminationComplaint
    dtype: Judgment
    period: Day
    source: 10 CCR 2506-1 section 4.160.21(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.160.21
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          complaint_made_in_writing
          or (
              allegations_of_discrimination_made_verbally
              and complainant_unable_or_unwilling_to_put_allegations_in_writing
              and state_or_county_employee_documented_complaint_in_writing
          )

  - name: discrimination_complaint_submitted_to_fns_national_office
    kind: derived
    entity: DiscriminationComplaint
    dtype: Judgment
    period: Day
    source: 10 CCR 2506-1 section 4.160.21(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.160.21
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          complaint_submitted_to_fns_national_office

  - name: discrimination_complaint_filing_timely
    kind: derived
    entity: DiscriminationComplaint
    dtype: Judgment
    period: Day
    source: 10 CCR 2506-1 section 4.160.21(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.160.21
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.160.21#discrimination_complaint_filing_day_limit
              output: discrimination_complaint_filing_day_limit
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          days_from_alleged_discrimination_to_complaint_filing <= discrimination_complaint_filing_day_limit

  - name: discrimination_complaint_investigable_information_provided
    kind: derived
    entity: DiscriminationComplaint
    dtype: Judgment
    period: Day
    source: 10 CCR 2506-1 section 4.160.21(B), (C)(2)-(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.160.21
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          complaint_includes_location_and_name_of_accused_office
          and complaint_includes_nature_of_incident_action_or_program_administration_aspect
          and complaint_includes_reason_for_alleged_discrimination

  - name: discrimination_complaint_complete_information_provided
    kind: derived
    entity: DiscriminationComplaint
    dtype: Judgment
    period: Day
    source: 10 CCR 2506-1 section 4.160.21(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.160.21
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          complaint_includes_name_address_and_contact_means_of_person_alleging_discrimination
          and complaint_includes_location_and_name_of_accused_office
          and complaint_includes_nature_of_incident_action_or_program_administration_aspect
          and complaint_includes_reason_for_alleged_discrimination
          and complaint_includes_names_and_titles_of_persons_with_knowledge_if_appropriate
          and complaint_includes_dates_of_alleged_discriminatory_actions
