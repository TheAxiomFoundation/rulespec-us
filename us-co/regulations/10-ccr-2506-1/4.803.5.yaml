  - name: local_level_hearing_officer_qualified
    kind: derived
    entity: LocalLevelHearingOfficer
    dtype: Judgment
    period: Day
    source: 10 CCR 2506-1, 4.803.5(A)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
