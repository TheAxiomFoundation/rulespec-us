format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.803.5
  summary: |-
    A local-level hearing officer must be impartial, lack a personal stake or involvement, not have been directly involved in the initial contested determination, not have been the immediate supervisor of the eligibility technician who initiated the IPV action, and be a county employee, county contractor, or designated public-agency/statutory-board/legal-entity employee. The officer must determine, based on clear and convincing evidence, whether the individual intended to commit an IPV. Local-level decisions require written notices and specified contents; appeals must be received within fifteen calendar days of household receipt; OAC advance notice must be at least ten calendar days and include specified contents; a nonappearing appellant has ten calendar days from mailing of dismissal to explain good cause; and the local office must implement actions within three working days after the effective agency decision.
  deferred_outputs:
    - output: us-co:regulations/10-ccr-2506-1/4.803.5#household_notified_of_local_level_ipv_decision_in_accordance_with_disqualification_notice_rules
      reason: The source requires notification in accordance with Section 4.803.7 when a local-level hearing officer determines that an IPV occurred, but the cited Section 4.803.7 source is not available in context.
    - output: us-co:regulations/10-ccr-2506-1/4.803.5#household_participation_allowed_on_local_level_appeal
      reason: The source provides that the household shall be allowed to participate as described in Section 4.803.44, but the cited Section 4.803 source is not available in context.
    - output: us-co:regulations/10-ccr-2506-1/4.803.5#appellant_exceptions_to_initial_decision_available
      reason: The source provides that the appellant may file exceptions pursuant to Section 4.802.63, D, but the cited Section 4.802 source is not available in context.
rules:
  - name: local_level_appeal_receipt_deadline_calendar_days
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1, 4.803.5(C)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.803.5
              excerpt: "within fifteen (15) calendar days of the date of household receipt"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          15

