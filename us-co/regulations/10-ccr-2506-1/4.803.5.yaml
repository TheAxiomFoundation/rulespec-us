            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.803.5
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          hearing_officer_is_impartial
          and not hearing_officer_has_personal_stake_or_involvement_in_case
          and not hearing_officer_was_directly_involved_in_initial_contested_determination
          and not hearing_officer_was_immediate_supervisor_of_eligibility_technician_who_initiated_ipv_action
          and (hearing_officer_is_county_employee or hearing_officer_is_individual_under_contract_with_county or hearing_officer_is_employee_of_county_designated_public_agency_statutory_board_or_legal_entity)

