    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.803.5
              excerpt: "at least ten (10) calendar days in advance of the scheduled hearing"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10

  - name: good_cause_letter_period_after_dismissal_mailing_calendar_days
