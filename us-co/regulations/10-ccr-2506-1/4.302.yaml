format: rulespec/v1
module:
  summary: |-
    Colorado's SNAP rule manual requires each household member to provide an
    SSN or proof of application for an SSN, and disqualifies only the
    individual who refuses or fails without good cause to provide or apply for
    an SSN. This section restates the federal SSN eligibility rule in 7 CFR
    273.6.
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.302
imports:
  - us:regulations/7-cfr/273/6
rules:
  - name: restates_ssn_good_cause
    kind: source_relation
    source: 10 CCR 2506-1 section 4.302(C)
    source_relation:
      type: restates
      target: us:regulations/7-cfr/273/6#snap_member_ssn_good_cause_applies
      authority: federal
  - name: restates_ssn_disqualification
    kind: source_relation
    source: 10 CCR 2506-1 section 4.302(A), 4.302(B), and 4.302(C)
    source_relation:
      type: restates
      target: us:regulations/7-cfr/273/6#snap_member_ssn_requirement_ineligible
      authority: federal
  - name: restates_ssn_eligibility
    kind: source_relation
    source: 10 CCR 2506-1 section 4.302
    source_relation:
      type: restates
      target: us:regulations/7-cfr/273/6#snap_member_ssn_requirement_eligible
      authority: federal
