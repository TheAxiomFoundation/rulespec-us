format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.304
  summary: |-
    A household is a group of individuals who live together and customarily purchase and prepare food together for home consumption. Each household may apply separately if they are not mandatory household members due to relationships or financial responsibility. Individuals experiencing homelessness can be determined as separate households, and separate household status can be granted when a client currently purchases and prepares with others but intends to purchase and prepare separately upon SNAP approval.
rules:
  - name: snap_household_composition_met
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.304(A)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.304
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          individuals_live_together
          and individuals_customarily_purchase_and_prepare_food_together_for_home_consumption

  - name: separate_household_application_permitted_when_not_mandatory_members
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.304(A)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.304
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_seeks_to_apply_as_separate_household
          and household_members_are_not_mandatory_household_members_due_to_relationships_or_financial_responsibility

  - name: homeless_individual_separate_household_determination_available
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.304(A)(2)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.304
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          individual_experiencing_homelessness
          and separate_household_determination_requested_under_this_provision

  - name: intended_separate_purchase_and_preparation_status_grantable
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.304(A)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.304
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          client_currently_purchasing_and_preparing_with_other_individuals
          and client_intends_upon_snap_approval_to_purchase_and_prepare_separately
