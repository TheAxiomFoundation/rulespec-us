format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.607
  summary: |-
    Certain mass changes not caused by the household affect a mass portion of the SNAP caseload simultaneously. For federal eligibility-standard, allotment, deduction, benefit reduction/cancellation/suspension changes and state Standard Utility Allowance adjustments, Advance Notice of Adverse Action is not required, but households shall be notified by news media, posters, other frequented locations, or general mailed notices, and federal/state utility standards are implemented prospectively. For mass PA grant, COLA, RSDI, SSI Title XVI, and Social Security Act Title II changes, Notice of Adverse Action is required when SNAP benefits are decreased or terminated, affected households must receive specified minimum information, and mass changes are processed prospectively. If the local office has at least thirty calendar days' advance knowledge of the PA adjustment amount, the SNAP change is effective in the same month as the PA grant change; otherwise no later than the following month.
rules:
  - name: pa_mass_change_advance_knowledge_calendar_day_threshold
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.607(B)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.607
              excerpt: "at least thirty (30) calendar days’ advance knowledge"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          30

  - name: federal_or_utility_mass_change_notice_and_prospective_implementation
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.607(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.607
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          mass_change_is_federal_adjustment_or_state_standard_utility_allowance_adjustment_or_federal_benefit_reduction_cancellation_or_suspension
          and not advance_notice_of_adverse_action_required_for_such_mass_change
          and (
              household_notified_of_mass_change_through_news_media
              or household_notified_of_mass_change_by_posters_in_certification_or_issuance_offices
              or household_notified_of_mass_change_by_posters_or_notice_in_other_locations_frequented_by_participating_households
              or household_notified_of_mass_change_by_general_notice_mailed_to_participating_households
          )
          and federal_or_state_utility_standard_adjustment_implemented_prospectively

  - name: pa_related_mass_change_adverse_notice_minimum_information_provided
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.607(B)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.607
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          mass_change_is_pa_grant_cola_rsdi_ssi_or_social_security_act_change
          and (
              not snap_benefits_decreased_or_terminated_by_mass_change
              or (
                  notice_of_adverse_action_provided_to_household
                  and notice_provided_as_much_before_scheduled_issuance_date_as_reasonably_possible
                  and notice_informs_household_of_general_nature_of_change
                  and notice_informs_household_of_examples_of_change_effect_on_household_allotments
                  and notice_informs_household_of_month_change_will_take_effect
                  and notice_informs_household_of_right_to_fair_hearing
                  and notice_informs_household_of_right_to_continuation_of_benefits_if_criteria_met
                  and notice_informs_household_continuation_requires_no_specific_waiver
                  and notice_informs_household_continuation_requires_fair_hearing_request_based_on_improper_computation_or_misapplication_or_misinterpretation
                  and notice_informs_household_of_liability_for_overissued_benefits_if_hearing_decision_adverse
                  and notice_informs_household_whom_to_contact_for_additional_information
              )
          )

  - name: pa_related_mass_changes_processed_prospectively
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.607(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.607
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          mass_change_is_pa_grant_cola_rsdi_ssi_or_social_security_act_change
          and mass_change_processed_prospectively_for_household

  - name: pa_grant_mass_change_snap_recalculation_timing_compliant
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.607(B)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.607
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.607#pa_mass_change_advance_knowledge_calendar_day_threshold
              output: pa_mass_change_advance_knowledge_calendar_day_threshold
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          pa_grant_cost_of_living_or_social_security_act_ssi_cost_of_living_increase_treated_as_snap_mass_change
          and snap_benefits_recalculated_for_pa_grant_mass_change
          and (
              (
                  calendar_days_local_office_advance_knowledge_of_pa_adjustment_amount >= pa_mass_change_advance_knowledge_calendar_day_threshold
                  and snap_change_effective_same_month_as_pa_grant_change
              )
              or (
                  calendar_days_local_office_advance_knowledge_of_pa_adjustment_amount < pa_mass_change_advance_knowledge_calendar_day_threshold
                  and snap_change_effective_no_later_than_month_following_pa_grant_change
              )
          )
