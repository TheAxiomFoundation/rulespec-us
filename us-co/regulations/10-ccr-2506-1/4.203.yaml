format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.203
  summary: |-
    Application for participation shall be made in the name of the household by the head, spouse, another household member, or an authorized representative.
rules:
  - name: household_application_filed_by_permitted_person
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.203
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.203
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          application_for_participation_made_in_name_of_household
          and (
              application_filed_by_head_of_household
              or application_filed_by_spouse
              or application_filed_by_another_household_member
              or application_filed_by_authorized_representative
          )
