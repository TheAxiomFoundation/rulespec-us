              output: applicable_suitable_employment_hourly_wage
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          wages_offered < applicable_suitable_employment_hourly_wage

  - name: piece_rate_employment_unsuitable_due_to_insufficient_average_hourly_yield
    kind: derived
