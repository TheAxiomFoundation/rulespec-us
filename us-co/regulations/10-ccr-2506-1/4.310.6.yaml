              output: major_field_registration_calendar_day_period
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          employment_offered_not_in_household_members_major_field_experience
          and (
              calendar_days_since_registration <= major_field_registration_calendar_day_period
              or job_opportunities_in_major_field_have_been_offered_after_registration_period
