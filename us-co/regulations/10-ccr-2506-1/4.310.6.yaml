format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.310.6
  summary: |-
    Employment will be considered suitable unless listed conditions apply, including wages below the higher applicable minimum wage, piece-rate yield below that wage, required labor-organization action, strike or lockout site without injunction, unreasonable health or safety risk, medical unfitness, work outside the member's major field before the stated registration period exception, unreasonable commuting distance or time, lack of transportation, or interference with religious observances, convictions, or beliefs.
rules:
  - name: fallback_federal_minimum_wage_percentage
    kind: parameter
    dtype: Rate
    source: 10 CCR 2506-1 section 4.310.6(A)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.310.6
              excerpt: "Eighty percent (80%) of the federal minimum wage"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          0.80

  - name: major_field_registration_calendar_day_period
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.310.6(E)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.310.6
              excerpt: "after a period of thirty (30) calendar days from registration"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          30

  - name: daily_commuting_time_hour_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.310.6(E)(5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.310.6
              excerpt: "exceeds two (2) hours per day"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          2

  - name: applicable_suitable_employment_hourly_wage
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.310.6(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.310.6
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.310.6#fallback_federal_minimum_wage_percentage
              output: fallback_federal_minimum_wage_percentage
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if federal_minimum_wage_is_applicable and state_minimum_wage_is_applicable: max(federal_minimum_wage, state_minimum_wage) else: if federal_minimum_wage_is_applicable: federal_minimum_wage else: if state_minimum_wage_is_applicable: state_minimum_wage else: fallback_federal_minimum_wage_percentage * federal_minimum_wage

  - name: employment_unsuitable_due_to_insufficient_wages
    kind: derived
