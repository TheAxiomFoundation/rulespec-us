format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.609.5
  summary: |-
    During the transitional period, a household may apply for recertification to determine whether it is eligible for a higher SNAP allotment; all changes in household circumstances are acted upon. If eligible for a lower benefit, the local office encourages withdrawal and, if not withdrawn, denies the application while transitional benefits continue. If eligible for higher benefits, the increase and new certification period begin the first day of the month following the reapplication month. The local office must interview if none occurred within the previous 12 months, provide required-verification notice with at least 10 calendar days to respond, and notify eligibility or ineligibility no later than 30 calendar days after filing, with stated continuation/denial procedures.
rules:
  - name: transitional_recertification_interview_lookback_month_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.609.5(B)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.609.5
              excerpt: "within the previous 12 months"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          12

  - name: transitional_recertification_verification_response_calendar_day_minimum
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.609.5(B)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.609.5
              excerpt: "a minimum of ten (10) calendar days"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          10

  - name: transitional_recertification_eligibility_notice_calendar_day_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.609.5(B)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.609.5
              excerpt: "no later than thirty (30) calendar days following the date the application was filed"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          30

  - name: transitional_period_recertification_for_higher_allotment_available
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.609.5(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.609.5
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_is_in_transitional_period
          and household_applied_for_recertification_to_determine_higher_snap_allotment

  - name: transitional_recertification_higher_allotment_changes_acted_upon
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.609.5(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.609.5
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not household_is_in_transitional_period)
          or (not household_applied_for_recertification_to_determine_higher_snap_allotment)
          or (
              local_office_determined_whether_household_eligible_for_higher_allotment
              and all_changes_in_household_circumstances_acted_upon
          )

  - name: lower_than_transitional_recertification_application_handled
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.609.5(A)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.609.5
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not household_determined_eligible_for_benefit_lower_than_transitional_benefit)
          or (
              local_office_encouraged_household_to_withdraw_recertification_application
              and (
                  household_withdrew_recertification_application
                  or (
                      household_chose_not_to_withdraw_recertification_application
                      and local_office_denied_recertification_application
                      and local_office_allowed_transitional_period_to_run_its_course
                  )
              )
          )

  - name: higher_than_transitional_recertification_increase_and_new_certification_period
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.609.5(A)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.609.5
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_eligible_for_benefits_higher_than_transitional_benefit_amount
          and increased_benefits_take_effect_first_day_of_month_following_reapplication_month
          and transitional_certification_period_ended
          and new_certification_period_assigned
          and new_certification_period_begins_first_day_of_month_following_application_month

  - name: transitional_recertification_interview_requirement_met
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.609.5(B)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.609.5
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.609.5#transitional_recertification_interview_lookback_month_limit
              output: transitional_recertification_interview_lookback_month_limit
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not household_applied_for_recertification_during_transitional_period)
          or (
              months_since_last_completed_interview <= transitional_recertification_interview_lookback_month_limit
              or (
                  local_office_scheduled_interview
                  and local_office_completed_interview
              )
          )

  - name: transitional_recertification_verification_notice_requirement_met
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.609.5(B)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.609.5
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.609.5#transitional_recertification_verification_response_calendar_day_minimum
              output: transitional_recertification_verification_response_calendar_day_minimum
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not household_applied_for_recertification_during_transitional_period)
          or (
              local_office_provided_notice_of_required_verification
              and verification_notice_provided_calendar_days_to_provide_required_verification >= transitional_recertification_verification_response_calendar_day_minimum
          )

  - name: transitional_recertification_eligibility_notice_timely
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.609.5(B)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.609.5
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.609.5#transitional_recertification_eligibility_notice_calendar_day_limit
              output: transitional_recertification_eligibility_notice_calendar_day_limit
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_applied_for_recertification_during_transitional_period
          and household_notified_of_eligibility_or_ineligibility
          and eligibility_or_ineligibility_notice_calendar_days_after_application_filed <= transitional_recertification_eligibility_notice_calendar_day_limit

  - name: undetermined_transitional_recertification_after_thirty_days_continues_processing_and_benefits
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.609.5(B)(3)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.609.5
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.609.5#transitional_recertification_eligibility_notice_calendar_day_limit
              output: transitional_recertification_eligibility_notice_calendar_day_limit
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_applied_for_recertification_during_transitional_period
          and not local_office_determined_household_eligibility
          and calendar_days_after_application_date > transitional_recertification_eligibility_notice_calendar_day_limit
          and local_office_continued_processing_application
          and local_office_continued_household_transitional_benefits

  - name: household_failure_to_act_recertification_application_may_be_denied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.609.5(B)(3)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.609.5
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          application_process_cannot_be_completed_because_household_failed_to_take_required_action
          and (
              local_office_denied_application_at_that_time
              or local_office_denied_application_at_end_of_thirty_calendar_days
          )

  - name: ineligible_transitional_recertification_application_denied_and_benefits_continue_to_period_end
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.609.5(B)(3)(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.609.5
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_determined_ineligible_on_transitional_recertification_application
          and local_office_denied_household_recertification_application
          and local_office_continued_household_transitional_benefits_to_end_of_transitional_benefit_period
