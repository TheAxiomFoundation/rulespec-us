format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.21
  summary: |-
    Upon a robbery or burglary, local law enforcement and the state department shall be notified immediately; the office shall be protected so evidence is not destroyed; nonemployee names shall be obtained if they insist on leaving before law enforcement arrives; each employee shall write pertinent information before discussion; and, after law enforcement examination and approval, immediate EBT-card reconciliation shall identify any stolen cards by serial number.
rules:
  - name: robbery_or_burglary_immediate_notifications_completed
    kind: derived
    entity: IssuanceOffice
    dtype: Judgment
    period: Day
    source: 10 CCR 2506-1 section 4.707.21
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.21
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not robbery_or_burglary_occurred_at_issuance_office)
          or (
              designated_reporting_person_at_issuance_office_notified_local_law_enforcement_immediately
              and state_department_notified_immediately
          )

  - name: robbery_or_burglary_evidence_protected
    kind: derived
    entity: IssuanceOffice
    dtype: Judgment
    period: Day
    source: 10 CCR 2506-1 section 4.707.21
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.21
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not robbery_or_burglary_occurred_at_issuance_office)
          or (
              office_protected_to_ensure_evidence_not_destroyed
              and articles_touched_by_robbers_not_touched_before_law_enforcement_arrival
          )

  - name: departing_nonemployee_witness_names_obtained
    kind: derived
    entity: IssuanceOffice
    dtype: Judgment
    period: Day
    source: 10 CCR 2506-1 section 4.707.21
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.21
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not nonemployees_in_office_at_time_of_robbery_insisted_on_leaving_before_law_enforcement_arrival)
          or names_of_departing_nonemployees_obtained

  - name: employee_robbery_information_recorded_before_discussion
    kind: derived
    entity: IssuanceOffice
    dtype: Judgment
    period: Day
    source: 10 CCR 2506-1 section 4.707.21
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.21
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not robbery_occurred_at_issuance_office)
          or (
              each_employee_wrote_down_all_pertinent_information_about_robbery
              and employees_told_to_record_own_impressions_and_observations_before_discussion_with_other_employees
          )

  - name: post_examination_ebt_card_reconciliation_completed
    kind: derived
    entity: IssuanceOffice
    dtype: Judgment
    period: Day
    source: 10 CCR 2506-1 section 4.707.21
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.21
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not law_enforcement_officers_completed_examinations_and_approved_reconciliation)
          or (
              immediate_reconciliation_of_ebt_cards_made_to_determine_loss_amount
              and stolen_ebt_cards_identified_by_serial_numbers
          )
