format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.902.1
  summary: |-
    Local offices must ensure adequate SNAP locations and hours, parking, disability accessibility, and timely application/EBT processing. Counties must establish office procedures best serving county households, including assistance for households with special needs such as persons aged sixty (60) and older, persons with disabilities, rural low-income members, homelessness, limited English proficiency, and working persons. Households apply in the county of residence, but another county may secure the application date, process, issue an EBT card, and transfer the case; eligible households may request a more accessible office, and SNAP-only certification or EBT duties may be transferred to a closer neighboring county office.
rules:
  - name: snap_special_needs_aged_person_age_threshold
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.902.1, special-needs household examples
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.902.1
              excerpt: aged sixty (60) and older
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          60

  - name: snap_household_has_local_office_special_needs
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.902.1, special-needs household procedures
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.902.1
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_oldest_member_age >= snap_special_needs_aged_person_age_threshold
          or household_contains_person_with_disability
          or household_in_rural_area_with_low_income_member
          or household_experiencing_homelessness
          or household_contains_adult_not_proficient_in_english
          or household_contains_working_person

  - name: local_office_location_and_hours_meet_snap_client_needs
    kind: derived
    entity: LocalOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.902.1, location and hours duties
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.902.1
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          adequate_locations_and_hours_exist_to_meet_snap_client_needs
          and ample_parking_available
          and location_accessible_to_persons_with_disabilities
          and hours_sufficient_for_timely_application_processing_and_ebt_card_issuance

  - name: county_local_office_operating_procedures_best_serve_households
    kind: derived
    entity: LocalOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.902.1, county operating procedures
    metadata:
      proof:
