          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.902.1
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          county_established_local_office_operating_procedures
          and procedures_best_serve_households_within_county

  - name: local_office_special_needs_assistance_procedures_established
    kind: derived
    entity: LocalOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.902.1, special-needs assistance procedures
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.902.1
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          local_office_established_procedures_to_assist_special_needs_households

  - name: out_of_county_snap_application_processing_authorized
    kind: derived
    entity: LocalOffice
