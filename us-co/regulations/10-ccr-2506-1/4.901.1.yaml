format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.901.1
  summary: |-
    If a county does not comply with State Department SNAP administration rules requiring a county SNAP Program and payment of the county share, the State Department may use specified remedies, recover the county share by reducing other PA or welfare grant-in-aid, pursue judicial enforcement, and take other appropriate enforcement action.
