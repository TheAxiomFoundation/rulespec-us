format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.708.2
  summary: |-
    Form FNS-250 shall be executed monthly by EBT card issuers and bulk storage points, signed by the issuer or appropriate official certifying the information as true and correct, data entered by the 15th of the month, and supported by documentation submitted to the state department for verification.
rules:
  - name: fns_250_monthly_data_entry_day_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.708.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.708.2
              excerpt: "needs to be data entered by the 15th of the month"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          15

  - name: fns_250_monthly_execution_completed
    kind: derived
    entity: EbtCardAccountabilityReportingEntity
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.708.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.708.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (reporting_entity_is_ebt_card_issuer or reporting_entity_is_bulk_storage_point)
          and form_fns_250_executed_monthly
          and form_fns_250_signed_by_ebt_card_issuer_or_appropriate_official
          and signer_certified_information_true_and_correct_to_best_of_knowledge_and_belief

  - name: fns_250_data_entered_timely
    kind: derived
    entity: EbtCardAccountabilityReportingEntity
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.708.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.708.2
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.708.2#fns_250_monthly_data_entry_day_limit
              output: fns_250_monthly_data_entry_day_limit
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (reporting_entity_is_ebt_card_issuer or reporting_entity_is_bulk_storage_point)
          and form_fns_250_available_through_automated_system
          and form_fns_250_data_entered
          and day_of_month_form_fns_250_data_entered <= fns_250_monthly_data_entry_day_limit

  - name: fns_250_supporting_documentation_submitted_for_state_verification
    kind: derived
    entity: EbtCardAccountabilityReportingEntity
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.708.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.708.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (reporting_entity_is_ebt_card_issuer or reporting_entity_is_bulk_storage_point)
          and supporting_documentation_to_form_fns_250_submitted_to_state_department
          and supporting_documentation_supports_ebt_card_shipments
          and supporting_documentation_supports_ebt_card_transfers
          and supporting_documentation_supports_destruction_of_ebt_cards
