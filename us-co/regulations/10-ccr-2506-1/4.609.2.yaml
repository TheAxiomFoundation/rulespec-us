format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.609.2
  summary: |-
    During the five (5) month transitional period, the household is not required to report any changes, including changes that put the household over one hundred thirty percent (130%) of the Federal Poverty Level (FPL).
rules:
  - name: transitional_period_month_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.609.2(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.609.2
              excerpt: "five (5) month transitional period"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          5

  - name: transitional_period_fpl_reporting_threshold
    kind: parameter
    dtype: Rate
    source: 10 CCR 2506-1 section 4.609.2(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.609.2
              excerpt: "one hundred thirty percent (130%) of the Federal Poverty Level (FPL)"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          1.30

  - name: household_change_reporting_not_required_during_transitional_period
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.609.2(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.609.2
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.609.2#transitional_period_month_limit
              output: transitional_period_month_limit
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_is_in_transitional_period
          and transitional_period_month_number <= transitional_period_month_limit

  - name: household_over_fpl_change_reporting_not_required_during_transitional_period
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.609.2(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.609.2
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.609.2#transitional_period_month_limit
              output: transitional_period_month_limit
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.609.2#transitional_period_fpl_reporting_threshold
              output: transitional_period_fpl_reporting_threshold
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_is_in_transitional_period
          and transitional_period_month_number <= transitional_period_month_limit
          and household_change_puts_household_over_fpl_threshold
          and household_income_ratio_to_federal_poverty_level > transitional_period_fpl_reporting_threshold
