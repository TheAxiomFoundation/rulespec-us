format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.304.32
  summary: |-
    Mandatory household members who live together must be included in the same household unless one mandatory individual has established a residence separate and apart. A separate residence is established only when the individual pays shelter expenses, supports maintenance of the other residence, or has provided that separate address to another governmental organization or an employer as the individual's primary residence. Money provided by a normally mandatory member who has established a separate residence and is not required to be part of the SNAP household is unearned income.
rules:
  - name: mandatory_member_established_separate_residence
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.304.32
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.304.32
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          mandatory_household_member_has_residence_separate_and_apart
          and (
              individual_pays_shelter_expenses_for_other_residence
              or individual_supports_maintenance_of_other_residence
              or individual_provided_separate_address_to_governmental_organization_as_primary_residence
              or individual_provided_separate_address_to_employer_as_primary_residence
          )

  - name: mandatory_member_included_in_same_snap_household
    kind: derived
