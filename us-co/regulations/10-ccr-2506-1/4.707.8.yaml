format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.8
  summary: |-
    Over the counter and mail issuance responsibilities shall be divided between a cashier and another issuance employee. Local offices that justify deviation and assume added risk may request state-department permission for one-person issuance. If mail issuance is performed by only one person, second-party EBT card inventory review is required each day and reconciliation of certified households issued EBT cards to mailings prepared is required biweekly. Cashiers must perform specified identification, issuance-log, form-posting, signature, and mail-date duties.
