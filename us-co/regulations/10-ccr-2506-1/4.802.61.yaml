format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.802.61
  summary: |-
    SNAP fair hearings must be scheduled accessibly with at least ten calendar days' advance written notice unless the household requests less notice; moving households' requests must be processed faster when needed; hearings must be completed within twenty-five calendar days of appeal-notice receipt; household postponements may not exceed thirty days; counties may not request or be entitled to postponements; telephone or video hearings are allowed unless a party objects; and SNAP group hearings may be consolidated only for SNAP cases with undisputed facts and only law, regulation, or policy issues.
rules:
  - name: fair_hearing_advance_notice_days
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.802.61(A)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.802.61
              excerpt: "At least ten (10) calendar days prior to the hearing"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          10

  - name: fair_hearing_completion_days
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.802.61(A)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.802.61
              excerpt: "no more than twenty-five (25) calendar days"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          25

  - name: fair_hearing_household_postponement_limit_days
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.802.61(A)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.802.61
              excerpt: "The postponement shall not exceed 30 days"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          30

  - name: fair_hearing_advance_written_notice_timely
    kind: derived
    entity: SnapFairHearing
    dtype: Judgment
    period: Day
    source: 10 CCR 2506-1 section 4.802.61(A)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.802.61
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.802.61#fair_hearing_advance_notice_days
              output: fair_hearing_advance_notice_days
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          advance_written_notice_provided
          and (
              household_requested_less_advance_notice
              or advance_notice_calendar_days >= fair_hearing_advance_notice_days
          )

  - name: expedited_processing_required_for_moving_household
    kind: derived
    entity: SnapFairHearing
    dtype: Judgment
    period: Day
    source: 10 CCR 2506-1 section 4.802.61(A)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.802.61
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_plans_to_move_from_area
          and faster_processing_needed_to_receive_decision_and_restoration_before_leaving_area

  - name: fair_hearing_completed_timely
    kind: derived
    entity: SnapFairHearing
    dtype: Judgment
    period: Day
    source: 10 CCR 2506-1 section 4.802.61(A)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.802.61
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.802.61#fair_hearing_completion_days
              output: fair_hearing_completion_days
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          days_from_snap_fair_hearings_unit_receipt_of_appeal_notice_to_hearing_completion <= fair_hearing_completion_days

  - name: household_postponement_within_limit
    kind: derived
    entity: SnapFairHearing
    dtype: Judgment
    period: Day
    source: 10 CCR 2506-1 section 4.802.61(A)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.802.61
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.802.61#fair_hearing_household_postponement_limit_days
              output: fair_hearing_household_postponement_limit_days
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_requested_postponement
          and requested_postponement_calendar_days <= fair_hearing_household_postponement_limit_days

  - name: county_postponement_entitled
    kind: derived
    entity: SnapFairHearing
    dtype: Judgment
    period: Day
    source: 10 CCR 2506-1 section 4.802.61(A)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.802.61
              excerpt: "A county may not request and is not entitled to receive a postponement."
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          false

  - name: remote_hearing_method_allowed
    kind: derived
    entity: SnapFairHearing
    dtype: Judgment
    period: Day
    source: 10 CCR 2506-1 section 4.802.61(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.802.61
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (
              hearing_conducted_by_telephone_conference_call
              or hearing_conducted_by_video_conference
          )
          and not party_objects_to_selected_remote_hearing_method

  - name: snap_group_hearing_consolidation_allowed
    kind: derived
    entity: SnapFairHearing
    dtype: Judgment
    period: Day
    source: 10 CCR 2506-1 section 4.802.61(A)(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.802.61
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          cases_are_snap_related
          and individual_issues_of_fact_are_not_disputed
          and related_issues_of_state_or_federal_law_regulation_or_policy_are_sole_issues_raised
