format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.309.31
  summary: |-
    Drug or alcohol treatment and rehabilitation centers are responsible for EBT/PIN controls, certified resident lists, reporting resident departures, returning post-departure benefits and cards, providing change report forms, fraud or misrepresentation knowingly committed in resident certification, and consequences for misuse or misappropriation of SNAP benefits.

rules:
  - name: departure_before_reduced_allotment_cutoff_day
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.309.31(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.309.31
              excerpt: "prior to the sixteenth (16th) of the month"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          16

  - name: departed_resident_spent_benefit_before_cutoff_allotment_fraction
    kind: parameter
    dtype: Rate
    source: 10 CCR 2506-1 section 4.309.31(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.309.31
              excerpt: "the center shall provide the resident with one half of his/her monthly allotment"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          1 / 2

  - name: departed_resident_card_return_calendar_day_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.309.31(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.309.31
              excerpt: "within five (5) calendar days of the resident’s departure"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          5

  - name: household_change_report_return_calendar_day_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.309.31(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.309.31
              excerpt: "within ten (10) days of any change the household is required to report"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          10

  - name: authorized_representative_ebt_card_and_pin_controls_met
    kind: derived
    entity: DrugAlcoholTreatmentCenter
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.309.31(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.309.31
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not center_employee_designated_to_serve_as_authorized_representative)
          or (
              designated_employee_obtained_own_ebt_card_and_pin_to_access_resident_account_benefits
              and resident_remains_resident_of_facility
              and resident_ebt_card_stored_in_secure_area_while_resident_receives_treatment
              and not center_has_access_to_resident_own_ebt_card_pin
              and not center_has_knowledge_of_resident_own_ebt_card_pin
          )

  - name: participating_resident_certified_list_provided
    kind: derived
    entity: DrugAlcoholTreatmentCenter
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.309.31(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.309.31
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          center_provided_certification_office_certified_list_of_currently_participating_residents
          and center_list_includes_children_residing_with_participating_residents
          and certification_office_requires_list_monthly_or_semimonthly

  - name: departing_resident_required_allotment_amount
    kind: derived
    entity: DrugAlcoholTreatmentCenter
    dtype: Money
    unit: USD
    period: Month
    source: 10 CCR 2506-1 section 4.309.31(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.309.31
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.309.31#departure_before_reduced_allotment_cutoff_day
              output: departure_before_reduced_allotment_cutoff_day
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.309.31#departed_resident_spent_benefit_before_cutoff_allotment_fraction
              output: departed_resident_spent_benefit_before_cutoff_allotment_fraction
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if benefits_issued_and_no_benefits_spent_on_departing_resident_behalf: resident_monthly_allotment else: if benefits_issued_and_any_benefits_spent_on_departing_resident_behalf and resident_departure_day_of_month < departure_before_reduced_allotment_cutoff_day: resident_monthly_allotment * departed_resident_spent_benefit_before_cutoff_allotment_fraction else: 0

  - name: resident_departure_reporting_and_benefit_return_completed
    kind: derived
    entity: DrugAlcoholTreatmentCenter
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.309.31(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.309.31
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not resident_left_center)
          or (
              center_reported_resident_left_center
              and center_returned_to_issuing_office_any_benefits_received_after_household_left_center
              and center_provided_residents_with_ebt_card_when_household_left_program
              and not center_acted_as_household_authorized_representative_after_household_left_center
          )

  - name: post_departure_ebt_access_and_card_return_requirements_met
    kind: derived
    entity: DrugAlcoholTreatmentCenter
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.309.31(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.309.31
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.309.31#departed_resident_card_return_calendar_day_limit
              output: departed_resident_card_return_calendar_day_limit
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not resident_left_center)
          or (
              not center_pulled_benefits_from_ebt_card_after_resident_left_facility
              and center_returned_authorized_representative_ebt_card_to_issuing_office
              and (not resident_own_ebt_card_left_behind or center_returned_resident_own_ebt_card_to_issuing_office)
              and calendar_days_after_resident_departure_before_card_return <= departed_resident_card_return_calendar_day_limit
          )

  - name: departure_change_report_form_and_advice_provided
    kind: derived
    entity: DrugAlcoholTreatmentCenter
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.309.31(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.309.31
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.309.31#household_change_report_return_calendar_day_limit
              output: household_change_report_return_calendar_day_limit
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not center_has_knowledge_household_plans_to_leave_facility)
          or (
              center_provided_household_with_change_report_form_as_soon_as_it_had_knowledge
              and center_advised_household_to_return_form_to_local_office_within_required_days
              and advised_change_report_return_day_limit == household_change_report_return_calendar_day_limit
          )

  - name: center_responsible_for_knowing_certification_misrepresentation_or_fraud
    kind: derived
    entity: DrugAlcoholTreatmentCenter
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.309.31(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.309.31
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          center_knowingly_committed_misrepresentation_or_fraud_in_certification_of_center_residents

  - name: authorized_representative_household_circumstance_review_completed
    kind: derived
    entity: DrugAlcoholTreatmentCenter
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.309.31(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.309.31
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not organization_or_institution_serves_as_authorized_representative)
          or (
              organization_or_institution_is_knowledgeable_about_household_circumstances
              and organization_or_institution_reviewed_household_circumstances_with_residents_before_applying_on_their_behalf
          )

  - name: center_penalty_or_disqualification_permitted_after_misuse_determination
    kind: derived
    entity: DrugAlcoholTreatmentCenter
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.309.31(E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.309.31
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          benefits_determined_administratively_or_judicially_misappropriated_or_used_for_non_household_meal_purchases
          and fns_investigation_occurred_before_action_against_center

  - name: local_office_state_department_misuse_notice_required
    kind: derived
    entity: DrugAlcoholTreatmentCenter
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.309.31(E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.309.31
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not local_office_has_reason_to_believe_center_is_misusing_snap_benefits_in_possession)
          or local_office_promptly_notified_state_department_of_belief_center_is_misusing_snap_benefits

  - name: overissuance_claim_established_after_fns_discovery
    kind: derived
    entity: DrugAlcoholTreatmentCenter
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.309.31(E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.309.31
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not overissuances_discovered_because_of_fns_investigation_or_hearing)
          or local_office_established_claim_for_overissuance_of_snap_benefits_held_on_behalf_of_center_residents

  - name: authorized_representative_status_suspended_for_fns_disqualification_period
    kind: derived
    entity: DrugAlcoholTreatmentCenter
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.309.31(E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.309.31
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not fns_disqualified_center_as_authorized_drug_and_alcohol_rehabilitation_and_treatment_center)
          or local_office_suspended_center_authorized_representative_status_for_same_period
