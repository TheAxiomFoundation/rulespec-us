format: rulespec/v1
imports:
  - us-co:regulations/10-ccr-2506-1/4.607#federal_or_utility_mass_change_notice_and_prospective_implementation
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.608.1
  summary: |-
    Advance Notice of Adverse Action may be given, but is not required for listed situations, including Section 4.607(A) mass changes publicized in advance; reliable verified determinations that all household members died or that the household moved from the project area; completed restored-benefit allotments with prior written termination notice; anticipated monthly allotment variations noticed at certification; joint PA/SNAP cases pending PA approval with prior reduction notice; expedited cases assigned longer certification periods after postponed verification with prior written reduction notice; facility authorization loss for residents certified with the facility as authorized representative; IPV/fraud disqualification changes; conversion to allotment reduction after failure to make agreed repayments; failure to respond to a claim repayment agreement; and specified recertification or periodic-report decreases.
rules:
  - name: recertification_reporting_certification_period_month_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.608.1(L)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.608.1
              excerpt: "certified for six (6) months"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          6

  - name: periodic_reporting_certification_period_month_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.608.1(L)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.608.1
              excerpt: "certified for twenty-four (24) months"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          24

  - name: advance_notice_of_adverse_action_not_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.608.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.608.1
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.607#federal_or_utility_mass_change_notice_and_prospective_implementation
              output: federal_or_utility_mass_change_notice_and_prospective_implementation
              hash: sha256:7b99daf82220b5efcf905edd9fc9e2814404e7aac935ea8a655bbb8ad373e705
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.608.1#recertification_reporting_certification_period_month_limit
              output: recertification_reporting_certification_period_month_limit
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.608.1#periodic_reporting_certification_period_month_limit
              output: periodic_reporting_certification_period_month_limit
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          federal_or_utility_mass_change_notice_and_prospective_implementation
          or local_office_determined_from_reliable_verified_information_all_household_members_died
          or local_office_determined_from_reliable_verified_information_household_moved_from_project_area
          or (
              household_received_increased_allotment_to_restore_lost_benefits
              and restoration_of_lost_benefits_is_complete
              and household_previously_notified_in_writing_when_increased_allotment_would_terminate
          )
          or (
              household_allotment_varies_month_to_month_within_certification_period_for_anticipated_changes
              and household_notified_at_certification_of_anticipated_monthly_allotment_variation
          )
          or (
              household_applied_for_pa_and_snap_jointly
              and household_receiving_snap_benefits_pending_pa_grant_approval
              and household_notified_at_certification_snap_benefits_would_be_reduced_upon_pa_grant_approval
          )
          or (
              certification_office_elected_longer_certification_period_for_expedited_household
              and expedited_household_verification_was_postponed
              and household_received_prior_written_notice_verification_may_reduce_benefits
          )
          or (
              facility_lost_state_or_usda_fns_authorization
              and local_office_terminates_eligibility_of_residents_in_drug_or_alcohol_treatment_center_or_group_living_arrangement
              and residents_certified_with_facility_acting_as_authorized_representative
          )
          or household_member_disqualified_for_ipv_or_fraud
          or remaining_household_members_benefits_reduced_or_terminated_to_reflect_member_disqualification
          or (
              household_converted_from_cash_or_snap_claim_repayment_to_allotment_reduction
              and conversion_due_to_failure_to_make_agreed_on_repayments
          )
          or (
              household_issued_repayment_agreement_for_claim
              and household_failed_to_respond_to_repayment_agreement
          )
          or (
              change_reported_at_recertification
              and household_certification_period_months == recertification_reporting_certification_period_month_limit
              and reported_change_results_in_decrease_to_snap_allotment
          )
          or (
              change_reported_at_periodic_report
              and household_certification_period_months == periodic_reporting_certification_period_month_limit
              and reported_change_results_in_decrease_to_snap_allotment
          )
