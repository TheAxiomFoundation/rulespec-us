format: rulespec/v1
module:
  summary: |-
    Colorado's SNAP rule manual excludes specified income from eligibility:
    irregular income of no more than 30 dollars in three months, payments used
    for non-household beneficiaries, qualifying child student earnings,
    qualifying recoupments, non-recurring lump sums, loans, in-kind benefits,
    vendor payments, reimbursements that do not exceed identified expenses,
    educational assistance, and income excluded by federal statute. Private
    nonprofit cash donations based on need are excluded up to 300 dollars per
    fiscal quarter.
  source_verification:
    corpus_citation_paths:
      - us-co/regulation/10-ccr-2506-1/4.405
      - us-co/regulation/10-ccr-2506-1/4.405.1
      - us-co/regulation/10-ccr-2506-1/4.405.2
rules:
  - name: snap_irregular_income_exclusion
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.405(A)
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if irregular_income_received_too_infrequently_or_irregularly_to_anticipate and irregular_income_received_in_three_months <= 30:
              irregular_income_received_in_three_months
          else: 0
  - name: snap_countable_irregular_income
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.405(A)
    versions:
      - effective_from: '2025-10-01'
        formula: max(0, irregular_income_received_in_three_months - snap_irregular_income_exclusion)
  - name: snap_non_household_beneficiary_payment_exclusion
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.405(B)
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if third_party_beneficiary_payment_received:
              if non_household_beneficiary_portion_readily_identified:
                  min(
                      identified_non_household_beneficiary_payment_portion,
                      payment_used_for_non_household_beneficiary
                  )
              else:
                  min(
                      third_party_beneficiary_payment * non_household_beneficiary_count / intended_beneficiary_count,
                      payment_used_for_non_household_beneficiary
                  )
          else: 0
  - name: snap_countable_non_household_beneficiary_payment
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.405(B)
    versions:
      - effective_from: '2025-10-01'
        formula: max(0, third_party_beneficiary_payment - snap_non_household_beneficiary_payment_exclusion)
  - name: snap_child_student_earnings_exclusion
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.405(C)
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if child_lives_with_parent_or_under_parental_control
             and child_student_at_least_half_time
             and (child_under_18 or child_turns_18_in_current_month):
              child_earned_income
          else: 0
  - name: snap_countable_child_student_earnings
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.405(C)
    versions:
      - effective_from: '2025-10-01'
        formula: max(0, child_earned_income - snap_child_student_earnings_exclusion)
  - name: snap_countable_recouped_income_source_payment
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.405(D)
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if recoupment_from_same_nonexempt_income_source and not intentional_means_tested_program_noncompliance_overpayment:
              max(0, gross_nonexempt_income_source_payment - recouped_overpayment_amount)
          else: gross_nonexempt_income_source_payment
  - name: snap_transferred_title_iv_a_child_support_exclusion
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.405(D)(2)
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if title_iv_a_participant and child_support_must_be_transferred_to_title_iv_d:
              child_support_payment_received
          else: 0
  - name: snap_nonrecurring_lump_sum_income_exclusion
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.405(E)
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if nonrecurring_lump_sum_payment_received:
              nonrecurring_lump_sum_payment
          else: 0
  - name: snap_nonrecurring_lump_sum_resource
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.405(E)
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if nonrecurring_lump_sum_payment_received and not lump_sum_excluded_as_resource_by_federal_law:
              nonrecurring_lump_sum_payment_remaining_as_resource
          else: 0
  - name: snap_loan_income_exclusion
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.405(F)
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if bona_fide_loan_received or reverse_annuity_mortgage_loan_received:
              loan_amount_received
          else: 0
  - name: snap_in_kind_benefit_income_exclusion
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.405(G)
    versions:
      - effective_from: '2025-10-01'
        formula: in_kind_benefit_value
  - name: snap_vendor_payment_exclusion
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.405(H)
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if vendor_payment_is_direct_third_party_payment_using_non_household_funds
             and not vendor_payment_funds_otherwise_payable_to_household:
              vendor_payment_amount
          elif emergency_pa_ga_payment_to_third_party_for_migrant_seasonal_job_stream:
              vendor_payment_amount
          elif vendor_payment_is_medical_childcare_emergency_special_or_housing_authority_assistance:
              vendor_payment_amount
          elif employer_pays_rent_directly_in_addition_to_regular_wages or employer_provided_housing:
              vendor_payment_amount
          elif court_ordered_support_or_alimony_paid_to_third_party:
              vendor_payment_amount
          elif federally_authorized_demo_cash_conversion_of_vendor_payment:
              vendor_payment_amount
          else: 0
  - name: snap_countable_vendor_payment
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.405(H)
    versions:
      - effective_from: '2025-10-01'
        formula: max(0, vendor_payment_amount - snap_vendor_payment_exclusion)
  - name: snap_reimbursement_exclusion
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.405(I)
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if reimbursement_for_identified_non_living_expense and reimbursement_used_for_intended_expense:
              min(reimbursement_amount, actual_reimbursed_non_living_expense)
          else: 0
  - name: snap_countable_reimbursement
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.405(I)
    versions:
      - effective_from: '2025-10-01'
        formula: max(0, reimbursement_amount - snap_reimbursement_exclusion)
  - name: snap_education_assistance_income_exclusion
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.405.1
    versions:
      - effective_from: '2025-10-01'
        formula: education_assistance_for_educational_expenses
  - name: snap_vista_income_exclusion
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.405.2(A)(3)
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if vista_or_title_i_domestic_volunteer_payment and vista_volunteer_was_receiving_snap_or_pa_when_joined:
              vista_or_title_i_domestic_volunteer_payment_amount
          else: 0
  - name: snap_wioa_payment_exclusion
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.405.2(A)(6)
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if wioa_payment_received
             and (
                 not wioa_on_the_job_training_earnings
                 or wioa_participant_under_19_and_under_parental_control
             ):
              wioa_payment_amount
          else: 0
  - name: snap_federal_energy_assistance_income_exclusion
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.405.2(A)(7)
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if federal_energy_assistance_not_title_iv_a
             or one_time_weatherization_or_heating_cooling_repair_payment:
              energy_assistance_payment
          else: 0
  - name: snap_private_nonprofit_cash_donation_exclusion
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.405.2(A)(10)
    versions:
      - effective_from: '2025-10-01'
        formula: min(private_nonprofit_cash_donations_based_on_need_in_fiscal_quarter, 300)
