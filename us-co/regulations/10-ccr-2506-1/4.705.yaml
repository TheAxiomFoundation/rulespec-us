format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.705
  summary: Local offices shall ensure there is no SNAP benefit increase as the result
    of an IPV, work-requirement, or other means-tested-program penalty; when such
    a penalty decreases another program's benefits, the SNAP allotment is calculated
    using the benefit amount that program would issue if no penalty had been imposed.
    A benefit freeze is not such a penalty, and unrelated household-circumstance changes
    that increase SNAP benefits are not affected.
rules:
- name: snap_benefit_increase_from_means_tested_program_penalty_prohibited
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: 10 CCR 2506-1 section 4.705(A)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.705
  versions:
  - effective_from: '2025-10-01'
    formula: snap_benefits_increased_as_result_of_penalty_imposed_for_ipv_or_work_or_other_means_tested_program_requirement
- name: other_program_benefit_amount_used_for_snap_allotment
  kind: derived
  entity: Household
  dtype: Money
  period: Month
  unit: USD
  source: 10 CCR 2506-1 section 4.705(B)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.705
  versions:
  - effective_from: '2025-10-01'
    formula: 'if other_program_benefit_decreased_due_to_penalty_for_ipv_or_work_or_other_means_tested_program_requirement
      and not other_program_benefits_frozen_at_current_level: max(0, other_program_benefit_amount_if_no_penalty_imposed)
      else: max(0, actual_other_program_benefit_amount)'
- name: unrelated_household_circumstance_snap_increase_unaffected
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: 10 CCR 2506-1 section 4.705(B)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.705
  versions:
  - effective_from: '2025-10-01'
    formula: 'household_circumstance_change_not_related_to_penalty_results_in_snap_increase

      and snap_benefit_increase_from_unrelated_household_circumstance_not_affected_by_penalty_provisions'
