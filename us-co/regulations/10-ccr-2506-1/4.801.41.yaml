format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.41
  summary: |-
    The local office shall collect claims by lump sum, SNAP allotment reduction, benefits from an EBT account, state income tax refund offset, the Federal Treasury Offset Program, or other collection activities. For allotment reduction, court-ordered judgments are excluded; AE and IHE claims recover the greater of 10% of monthly allotment or $10, and IPV claims recover the greater of 20% of monthly allotment or $20. Initial-month benefits are not reduced. EBT deductions require written permission, except an oral one-time deduction from an active EBT account; stale EBT accounts require prior written notice and 10 calendar days to object. TOP delinquency is more than 120 calendar days, with other stated bankruptcy/hearing exclusions and notice/review procedures.
rules:
  - name: ae_or_ihe_allotment_reduction_rate
    kind: parameter
    dtype: Rate
    source: 10 CCR 2506-1 4.801.41(B)(3)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.41
              excerpt: "For AE claims and IHE claims ... ten percent (10%)"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.10

  - name: ae_or_ihe_minimum_monthly_allotment_reduction
    kind: parameter
    dtype: Money
    unit: USD
    period: Month
    source: 10 CCR 2506-1 4.801.41(B)(3)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.41
              excerpt: "or ten dollars ($10) each month, whichever is greater"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10

  - name: ipv_allotment_reduction_rate
    kind: parameter
    dtype: Rate
    source: 10 CCR 2506-1 4.801.41(B)(3)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.41
              excerpt: "For IPV claims ... twenty percent (20%)"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.20

  - name: ipv_minimum_monthly_allotment_reduction
    kind: parameter
    dtype: Money
    unit: USD
    period: Month
    source: 10 CCR 2506-1 4.801.41(B)(3)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.41
              excerpt: "or twenty dollars ($20) per month, whichever is greater"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          20

  - name: stale_ebt_account_inactivity_months
    kind: parameter
    dtype: Count
    period: Month
    source: 10 CCR 2506-1 4.801.41(C)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.41
              excerpt: "not been accessed for at least three (3) consecutive calendar months"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          3

  - name: stale_ebt_objection_period_days
    kind: parameter
    dtype: Count
    period: Day
    source: 10 CCR 2506-1 4.801.41(C)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.41
              excerpt: "ten (10) calendar days to object"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10

  - name: active_ebt_oral_receipt_deadline_business_days
    kind: parameter
    dtype: Count
    period: Day
    source: 10 CCR 2506-1 4.801.41(C)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.41
              excerpt: "written receipt within ten (10) business days"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10

  - name: state_tax_offset_objection_period_days
    kind: parameter
    dtype: Count
    period: Day
    source: 10 CCR 2506-1 4.801.41(D)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.41
              excerpt: "within thirty (30) calendar days"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: top_delinquency_threshold_days
    kind: parameter
    dtype: Count
    period: Day
    source: 10 CCR 2506-1 4.801.41(E)(1)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.41
              excerpt: "past due more than one hundred twenty (120) calendar days"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          120

  - name: top_referral_notice_period_days
    kind: parameter
    dtype: Count
    period: Day
    source: 10 CCR 2506-1 4.801.41(E)(3)(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.41
              excerpt: "refer the claim within sixty (60) days"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          60

  - name: federal_salary_offset_garnishment_rate_cap
    kind: parameter
    dtype: Rate
    source: 10 CCR 2506-1 4.801.41(E)(7)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.41
              excerpt: "garnish up to fifteen percent (15%)"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.15

  - name: fns_review_request_period_days
    kind: parameter
    dtype: Count
    period: Day
    source: 10 CCR 2506-1 4.801.41(E)(9)(a)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.41
              excerpt: "within thirty (30) calendar days after the date of the state agency's notice"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: allotment_reduction_permitted
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 4.801.41(B)(1), (B)(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.41
              excerpt: "households currently participating in the Program ... court-ordered judgment ... shall not occur ... initial month will not be reduced"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_currently_participating_in_program
          and not claim_has_court_ordered_judgment_for_repayment
          and not benefits_authorized_for_initial_month

  - name: monthly_snap_allotment_reduction_amount
    kind: derived
    entity: Household
    dtype: Money
    unit: USD
    period: Month
    source: 10 CCR 2506-1 4.801.41(B)(2)-(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.41
              excerpt: "amount ... recovered each month ... ten percent ... or ten dollars ... twenty percent ... or twenty dollars ... Benefits authorized for an initial month will not be reduced"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if allotment_reduction_permitted:
            if claim_is_ae_or_ihe:
              max(ae_or_ihe_allotment_reduction_rate * monthly_snap_allotment, ae_or_ihe_minimum_monthly_allotment_reduction)
            else:
              if claim_is_ipv:
                max(ipv_allotment_reduction_rate * monthly_snap_allotment, ipv_minimum_monthly_allotment_reduction)
              else:
                0
          else:
            0

  - name: stale_ebt_account
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 4.801.41(C)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.41
              excerpt: "A stale EBT account means an account that has benefits but has not been accessed for at least three (3) consecutive calendar months."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          ebt_account_has_benefits
          and ebt_account_months_not_accessed >= stale_ebt_account_inactivity_months

  - name: stale_ebt_offset_permitted
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 4.801.41(C)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.41
              excerpt: "prior written notice ... benefits will be applied ... unless the household objects ... ten (10) calendar days to object"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          stale_ebt_account
          and prior_written_notice_of_stale_ebt_offset_given
          and days_since_stale_ebt_offset_notice >= stale_ebt_objection_period_days
          and not household_objected_to_stale_ebt_offset

  - name: written_ebt_deduction_agreement_valid
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 4.801.41(C)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.41
              excerpt: "written agreement shall be obtained prior to removing benefits ... shall include ... voluntary ... amount ... frequency ... length ... revoke"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          written_permission_obtained_before_ebt_deduction
          and agreement_states_collection_is_voluntary
          and agreement_states_payment_amount
          and agreement_states_payment_frequency
          and agreement_states_length
          and agreement_states_household_may_revoke_at_any_time

  - name: lump_sum_payment_must_be_accepted
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 4.801.41(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.41
              excerpt: "If the household requests to make a lump sum cash and/or food benefit payment as full or partial payment of the claim, the local office shall accept this method"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_requests_lump_sum_cash_or_food_benefit_payment_for_claim
