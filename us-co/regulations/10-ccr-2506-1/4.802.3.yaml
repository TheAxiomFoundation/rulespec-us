format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.802.3
  summary: |-
    A household is entitled to representation at the DRC or state-level fair hearing, adequate opportunity to examine the case file and hearing documents before and during the hearing, a free copy of relevant case-file portions on request, protection from disclosure of specified confidential information, exclusion of protected or uncontestable material from the hearing and decision, and the opportunity to present new information. The household, its representative, and the local office may present the case, bring witnesses, advance arguments, question or refute testimony and evidence, and submit evidence.
rules:
