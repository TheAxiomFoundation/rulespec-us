format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.803.6
  summary: |-
    The Office of Appeals reviews the ALJ initial decision and enters a final agency decision. For judicial review, the effective date of the final agency decision is the third day after mailing, even if that day is Saturday, Sunday, or a legal holiday, and the parties must be advised of this. The state department or local office must initiate action to comply within three working days after the effective date and must comply even if reconsideration is requested unless the effective date is postponed. If a household member committed IPV, the member is disqualified under Section 4.803.3, and the same act of IPV must not be separated so separate penalties can be imposed.
  deferred_outputs:
    - output: us-co:regulations/10-ccr-2506-1/4.803.6#ipv_disqualification_period
      reason: The disqualification period for a household member who committed IPV is specified by Section 4.803.3, which is cited by this source but not available in copied RuleSpec context.
