format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.803.1
  summary: |-
    Local offices shall enter disqualified individuals before the second-to-last working day of the month and prepare quarterly FS-36A reports due 15 calendar days after quarter end.
rules:
  - name: monthly_disqualification_entry_deadline_working_day_from_end
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1, 4.803.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.803.1
              excerpt: "prior to the second (2nd) to the last working day of the month"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          2
  - name: quarterly_investigation_report_due_days_after_quarter_end
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1, 4.803.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.803.1
              excerpt: "due fifteen (15) calendar days after the end of the quarter"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          15
