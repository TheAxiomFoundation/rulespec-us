format: rulespec/v1
module:
  summary: 'Colorado''s SNAP rule manual excludes specified resources from household

    resource eligibility. Vehicles, the home and surrounding property, prorated

    income still being counted as income, household goods, personal effects,

    tax-preferred retirement accounts, and tax-deferred education accounts are

    exempt. One bona fide pre-purchased funeral agreement per household member

    is exempt up to 1500 dollars in equity. Income-producing property is exempt

    when it produces annual income consistent with fair market value; farm

    self-employment property remains exempt for 1 year after farming

    self-employment terminates. Inaccessible resources include non-liquid

    resources with net return of 1500 dollars or less, qualifying trusts,

    resources with no significant return of 1500 dollars or less, and resources

    inaccessible to battered women in shelters. Certain government payments,

    EITC payments for up to 12 months, and federal income tax refunds received

    beginning January 1, 2010 for 12 months are also excluded.'
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.410
  proof_validation:
    required: true
