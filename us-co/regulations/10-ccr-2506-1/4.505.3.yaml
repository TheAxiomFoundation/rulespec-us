format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.505.3
  summary: |-
    Except for basic categorically eligible households, residency shall be verified prior to certification, except in unusual cases when verification cannot reasonably be accomplished. Any documents or collateral contacts which reasonably establish the applicant’s residency must be accepted and no requirement for a specific type of verification may be imposed. If reasonable efforts to verify residency have proved impossible, the household may be certified if otherwise eligible; if county residency cannot be verified but Colorado residency is not questionable, the individual shall be certified if otherwise eligible and not participating in another SNAP household.
rules:
  - name: residency_verification_required_before_certification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.505.3(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.505.3
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          not household_is_basic_categorically_eligible
          and not unusual_case_verification_cannot_reasonably_be_accomplished

  - name: residency_verification_specific_type_requirement_prohibited
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.505.3(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.505.3
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          applicant_residency_reasonably_established_by_documents_or_collateral_contacts
          and specific_type_of_residency_verification_required

  - name: household_certification_after_impossible_residency_verification_permitted
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.505.3(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.505.3
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          eligibility_technician_and_client_made_reasonable_efforts_to_verify_residency
          and residency_verification_proved_impossible
          and household_otherwise_eligible

  - name: individual_certification_when_county_residency_unverified_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.505.3(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.505.3
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          county_residency_cannot_be_verified
          and not colorado_residency_questionable
          and individual_otherwise_eligible
          and not individual_participating_in_another_snap_household

  - name: client_supplied_residency_documentary_verification_acceptable
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.505.3(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.505.3
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          client_supplied_residency_verification_by_drivers_license
          or client_supplied_residency_verification_by_rent_receipt
          or client_supplied_residency_verification_by_utility_or_other_recent_bill
          or client_supplied_residency_verification_by_voter_registration
          or client_supplied_residency_verification_by_similar_means

  - name: non_documentary_residency_information_source_acceptable
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.505.3(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.505.3
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          client_unable_to_supply_documentary_evidence
          and (
              information_obtained_from_telephone_or_city_directory
              or information_obtained_from_detailed_area_map
          )

  - name: collateral_contact_residency_verification_acceptable
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.505.3(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.505.3
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          documentary_evidence_not_available
          and collateral_contact_provided_residency_verification

  - name: home_visit_residency_verification_feasible
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.505.3(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.505.3
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          not documentary_evidence_available
          and not collateral_contact_available
          and scheduled_home_visit_feasible
