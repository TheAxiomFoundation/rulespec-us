format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.802.63
  summary: Administrative adjudicator decisions must be based on the hearing record
    and not run counter to law, rule, or statute. Initial decisions are due within
    ten calendar days of the hearing, subject to household-requested delay extensions
    up to thirty calendar days. Notices of intent, exceptions, responses, final agency
    decisions, reconsideration motions, and implementation actions are governed by
    the stated calendar-day and working-day deadlines. Initial decisions are not implemented
    pending Office of Appeals review and entry of a final agency decision; final agency
    decisions become effective on the third day after mailing, require compliance
    action within three working days after the effective date unless postponed, and
    govern retroactive benefits, over-issuance claims, and benefit-increase or benefit-decrease
    timing.
rules:
