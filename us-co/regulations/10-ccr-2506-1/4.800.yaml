format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.800
  summary: |-
    SNAP benefits are obligations of the United States within the meaning of 18 USC Chapter 15; Title 18 counterfeiting, misuse, and alteration provisions apply to SNAP benefits. Unauthorized issuance, use, transfer, acquisition, alteration, possession, or presentation of SNAP benefits may subject an individual, partnership, corporation, or other legal entity to prosecution under federal law and/or Colorado criminal statutes.
rules:
