- name: normal_processing_opportunity_to_participate_timely
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: 10 CCR 2506-1 section 4.701(A)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.701
      - path: versions[0].formula
        kind: import
        import:
          target: us-co:regulations/10-ccr-2506-1/4.701#normal_processing_opportunity_to_participate_calendar_day_limit
          output: normal_processing_opportunity_to_participate_calendar_day_limit
          hash: sha256:local
