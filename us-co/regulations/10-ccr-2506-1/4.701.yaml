format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.701
  summary: Local offices are responsible for timely and accurate issuance of benefits.
    Newly certified households, except expedited-service households, must receive
    an opportunity to participate no later than thirty calendar days after the application
    was filed; expedited-service households must have benefits available not later
    than the seventh calendar day after application, with mail card issuance no later
    than the end of the fifth calendar day. Mail issuance must use at least first-class
    mail, sturdy non-forwarding envelopes or packages, and separate EBT-card and PIN
    mailings. Specified households must receive assistance obtaining an EBT card,
    and eligibility technicians must know enough about issuance operations to answer
    household questions about when, where, and how to access EBT benefits.
  deferred_outputs:
  - output: us-co:regulations/10-ccr-2506-1/4.701#disability_related_ebt_card_assistance_provided
    reason: Section 4.701(B) covers persons with a disability who have difficulty
      reaching issuance offices as described in Section 4.707, but no copied RuleSpec
      context provides Section 4.707 to determine that cited disability category.
rules:
- name: normal_processing_opportunity_to_participate_calendar_day_limit
  kind: parameter
  dtype: Count
  source: 10 CCR 2506-1 section 4.701(A)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.701
          excerpt: no later than thirty (30) calendar days following the date the
            application was filed
  versions:
  - effective_from: '2025-10-01'
    formula: '30'
