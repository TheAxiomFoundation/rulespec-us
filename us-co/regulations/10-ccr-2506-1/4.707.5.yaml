format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.5
  summary: |-
    Prior to issuance, each carton and box of EBT cards shall be examined. Shortages or overages require Form FNS-471 signed by two witnesses and specific FNS-250 line treatment. Improperly manufactured or mutilated EBT cards require Form FNS-471, immediate cancellation, and destruction/disposition procedures; boxes improperly manufactured require local-office contact with the state department for USDA/FNS instructions and destruction within thirty calendar days after the close of the receipt month. Out-of-sequence serial numbers present no problem if the box contains the correct number of cards and are issued normally.
  deferred_outputs:
    - output: us-co:regulations/10-ccr-2506-1/4.707.5#improperly_manufactured_or_mutilated_cards_destroyed_at_end_of_month_under_section_4_708_5
      reason: >-
        Section 4.707.5(B) requires destruction at the end of the month in
        accordance with Section 4.708.5, and also directs readers to Section
        4.708.5 for disposition of mutilated EBT cards returned by participants,
        but no copied RuleSpec context provides Section 4.708.5.
rules:
  - name: improperly_manufactured_box_destruction_calendar_day_limit_after_close_of_receipt_month
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.707.5(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.5
              excerpt: "within thirty (30) calendar days from the close of the month in which the EBT cards were received"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          30

  - name: ebt_card_carton_or_box_examined_before_issuance
    kind: derived
    entity: EbtCardShipment
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.707.5(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.5
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not ebt_cards_issued_from_carton_or_box)
          or carton_and_box_examined_before_issuance

  - name: shortage_or_overage_fns_471_completed_with_two_witnesses
    kind: derived
    entity: EbtCardShipment
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.707.5(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.5
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not shipment_has_shortage_or_overage_of_ebt_cards)
          or (
              form_fns_471_completed
              and form_fns_471_signed_by_two_witnesses
          )

  - name: shortage_amount_reported_as_fns_250_line_13_credits
    kind: derived
    entity: EbtCardShipment
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.707.5(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.5
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not shipment_has_shortage_of_ebt_cards)
          or shortage_amount_shown_on_fns_250_line_13_as_credits

  - name: overage_amount_reported_as_fns_250_line_9_shipments_received
    kind: derived
    entity: EbtCardShipment
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.707.5(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.5
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not shipment_has_overage_of_ebt_cards)
          or overage_amount_shown_on_fns_250_line_9_as_shipments_received_from_usda_fcs_regardless_of_origin

  - name: improperly_manufactured_or_mutilated_fns_471_completed
    kind: derived
    entity: EbtCardShipment
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.707.5(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.5
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not shipment_has_improperly_manufactured_or_mutilated_ebt_cards)
          or form_fns_471_completed

  - name: improperly_manufactured_or_mutilated_cards_cancelled_immediately
    kind: derived
    entity: EbtCardShipment
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.707.5(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.5
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not shipment_has_improperly_manufactured_or_mutilated_ebt_cards)
          or ebt_cards_cancelled_immediately

  - name: improperly_manufactured_boxes_disposition_instructions_requested
    kind: derived
    entity: EbtCardShipment
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.707.5(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.5
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not one_or_more_boxes_of_ebt_cards_were_improperly_manufactured)
          or (
              local_office_contacted_state_department
              and state_department_contacted_usda_fns_for_disposition_instructions_for_destructible_ebt_cards
          )

  - name: improperly_manufactured_box_cards_destroyed_timely_after_receipt_month_close
    kind: derived
    entity: EbtCardShipment
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.707.5(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.5
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.707.5#improperly_manufactured_box_destruction_calendar_day_limit_after_close_of_receipt_month
              output: improperly_manufactured_box_destruction_calendar_day_limit_after_close_of_receipt_month
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not one_or_more_boxes_of_ebt_cards_were_improperly_manufactured)
          or (
              ebt_cards_destroyed
              and calendar_days_from_close_of_receipt_month_to_destruction <= improperly_manufactured_box_destruction_calendar_day_limit_after_close_of_receipt_month
          )

  - name: out_of_sequence_correct_count_cards_issued_normally
    kind: derived
    entity: EbtCardShipment
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.707.5(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.5
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          box_contains_out_of_sequence_serial_numbered_ebt_cards
          and correct_number_of_ebt_cards_contained_in_box
          and ebt_cards_issued_in_normal_manner
