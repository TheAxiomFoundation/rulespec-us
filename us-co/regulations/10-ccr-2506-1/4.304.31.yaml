              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.304.31
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.304.31#live_in_attendant
              output: live_in_attendant
              hash: sha256:local
