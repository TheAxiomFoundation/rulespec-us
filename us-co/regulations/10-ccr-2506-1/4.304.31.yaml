format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.304.31
  summary: |-
    Individuals residing with a household who are boarders, roomers, or live-in attendants shall not be considered household members in determining eligibility or allotment unless otherwise stated in 4.304.3. Boarders cannot participate in SNAP as separate households; roomers and live-in attendants who are otherwise eligible may participate as separate households.
  deferred_outputs:
    - output: us-co:regulations/10-ccr-2506-1/4.304.31#individual_not_considered_household_member_for_eligibility_or_allotment
      reason: >-
        The source-stated household-member exclusion is expressly subject to the
        exception "unless otherwise stated in 4.304.3"; no copied RuleSpec
        context provides section 4.304.3's exception mechanics for this final
        exclusion.
rules:
  - name: boarder
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.304.31(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.304.31
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          individual_resides_with_others
          and individual_pays_reasonable_compensation_for_lodging
          and individual_pays_reasonable_compensation_for_meals

  - name: boarder_separate_snap_household_participation_prohibited
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.304.31(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.304.31
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.304.31#boarder
              output: boarder
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          boarder

  - name: roomer
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.304.31(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.304.31
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_furnishes_lodging_to_individual
          and not household_furnishes_meals_to_individual
          and individual_pays_compensation_for_lodging

  - name: otherwise_eligible_roomer_may_participate_as_separate_snap_household
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.304.31(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.304.31
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.304.31#roomer
              output: roomer
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          roomer
          and individual_is_otherwise_eligible_for_snap

  - name: live_in_attendant
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.304.31(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.304.31
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          individual_lives_with_household
          and (
              individual_provides_medical_services_to_household
              or individual_provides_housekeeping_services_to_household
              or individual_provides_childcare_services_to_household
              or individual_provides_other_similar_personal_services_to_household
          )

  - name: otherwise_eligible_live_in_attendant_may_participate_as_separate_snap_household
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.304.31(C)
    metadata:
      proof:
        atoms:
