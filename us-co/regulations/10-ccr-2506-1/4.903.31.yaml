format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.903.31
  summary: |-
    The State Department shall conduct ME reviews of all SNAP operations at
    least annually for large project areas, every two years for medium project
    areas, and every three years for small project areas, unless USDA FNS gives
    written approval for an alternative schedule. The State Department completes
    ME reports for reviewed counties and monitors county responses. Counties
    must submit factual corrections and a final corrective plan within twenty
    state working days, with added monitoring and at least quarterly progress
    reporting when ongoing problems in critical areas are identified.
rules:
