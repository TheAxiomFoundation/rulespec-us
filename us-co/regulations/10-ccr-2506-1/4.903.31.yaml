    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.903.31(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.903.31
              excerpt: "more than twenty-five thousand and one (25,001) participating households"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          25001

