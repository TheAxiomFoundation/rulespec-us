          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.903.31#large_project_area_me_review_interval_years
              output: large_project_area_me_review_interval_years
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.903.31#medium_project_area_me_review_interval_years
              output: medium_project_area_me_review_interval_years
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.903.31#small_project_area_me_review_interval_years
              output: small_project_area_me_review_interval_years
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if participating_households >= large_project_area_participating_household_minimum:
              large_project_area_me_review_interval_years
          else:
              if participating_households >= medium_project_area_participating_household_minimum and participating_households <= medium_project_area_participating_household_maximum:
                  medium_project_area_me_review_interval_years
              else:
                  if participating_households <= small_project_area_participating_household_maximum:
                      small_project_area_me_review_interval_years
                  else:
                      medium_project_area_me_review_interval_years

