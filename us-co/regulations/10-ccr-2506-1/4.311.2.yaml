format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.311.2
  summary: ABAWDs are not required to report exemption-status changes during a certification
    period; non-exempt months after loss of exemption count toward the three countable
    months in a thirty-six calendar month period, and remaining certification-period
    benefits are not over-issuances and do not create claims.
  deferred_outputs:
  - output: us-co:regulations/10-ccr-2506-1/4.311.2#abawd_countable_month_limit
    reason: Generated rule used a local name that collides with a sibling RuleSpec
      export. This output is deferred until it can be encoded with a semantic branch-specific
      name without creating ambiguous sibling imports.
  - output: us-co:regulations/10-ccr-2506-1/4.311.2#month_after_abawd_exemption_loss_counts_toward_limit
    reason: Generated rule depends on an output that validation deferred because it
      flattened thresholded, capped, base-limited, or cross-referenced mechanics,
      or borrowed an unrelated same-named section term.
