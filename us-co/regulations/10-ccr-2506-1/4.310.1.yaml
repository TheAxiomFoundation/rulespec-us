format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.310.1
  summary: |-
    Client statements are considered acceptable verification unless questionable. If verification is requested from the client because the client statement is considered questionable, case documentation must thoroughly explain why the original client statement was considered questionable. Examples of verification to resolve questionable information include disability-benefit receipts, statements from specified medical personnel, and statements from specified social workers.
rules:
  - name: client_statement_acceptable_verification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.310.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.310.1
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          client_statement_provided_for_verification
          and not client_statement_questionable

  - name: questionable_client_statement_documentation_complete
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.310.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.310.1
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          verification_requested_from_client_because_client_statement_questionable
          and case_documentation_thoroughly_explains_why_original_client_statement_questionable

  - name: questionable_information_resolved_by_disability_benefit_receipt
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.310.1(A)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.310.1
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          questionable_information_needs_resolution
          and receipt_of_temporary_or_permanent_disability_benefits_issued_by_government_or_private_sources_obtained

  - name: questionable_information_resolved_by_medical_statement
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.310.1(A)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.310.1
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          questionable_information_needs_resolution
          and statement_provided_from_physician_physician_assistant_nurse_nurse_practitioner_physician_office_representative_psychologist_or_county_approved_medical_personnel
          and statement_verifies_work_registrant_physically_or_mentally_unfit_for_employment

  - name: questionable_information_resolved_by_social_worker_statement
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.310.1(A)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.310.1
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          questionable_information_needs_resolution
          and statement_provided_from_licensed_social_worker_or_social_worker_for_501c3_nonprofit_or_government_entity
