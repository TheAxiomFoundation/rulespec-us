format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.310
  summary: |-
    As a condition of SNAP eligibility, each non-exempt household member must register for work, provide employment status or availability information, avoid voluntary quit, accept suitable employment, and report to a suitable referred employer.
imports:
  - us:regulations/7-cfr/273/7
rules:
  - name: colorado_snap_member_work_requirement_compliant
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.310(A)-(E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.310
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          member_registered_for_work_at_initial_application_or_recognition_by_required_signature
          and member_registered_for_work_at_recognition_by_required_signature
          and member_provided_eligibility_technician_sufficient_employment_status_or_availability_information
          and not member_committed_act_of_voluntary_quit
          and member_accepted_offer_of_suitable_employment
          and member_reported_to_employer_if_referred_by_local_office_and_potential_employment_was_suitable

  - name: colorado_snap_member_work_requirement_eligible
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.310
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.310
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.310#colorado_snap_member_work_requirement_compliant
              output: colorado_snap_member_work_requirement_compliant
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          member_determined_exempt_from_snap_work_requirements
          or colorado_snap_member_work_requirement_compliant

  - name: restates_general_work_requirement_compliance
    kind: source_relation
    source: 10 CCR 2506-1 section 4.310
    source_relation:
      type: restates
      target: us:regulations/7-cfr/273/7#snap_member_general_work_requirement_compliant
      authority: federal

  - name: restates_general_work_requirement_eligibility
