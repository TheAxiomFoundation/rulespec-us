format: rulespec/v1
module:
  summary: |-
    Colorado's SNAP rule manual requires each non-exempt household member to
    register for work, provide employment-status or availability information,
    avoid voluntary quit, accept suitable employment, and report to a suitable
    referred employer. This section restates the federal general work
    requirement in 7 CFR 273.7.
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.310
imports:
  - us:regulations/7-cfr/273/7
rules:
  - name: restates_general_work_requirement_compliance
    kind: source_relation
    source: 10 CCR 2506-1 section 4.310
    source_relation:
      type: restates
      target: us:regulations/7-cfr/273/7#snap_member_general_work_requirement_compliant
      authority: federal
  - name: restates_general_work_requirement_eligibility
    kind: source_relation
    source: 10 CCR 2506-1 section 4.310
    source_relation:
      type: restates
      target: us:regulations/7-cfr/273/7#snap_member_general_work_requirement_eligible
      authority: federal
