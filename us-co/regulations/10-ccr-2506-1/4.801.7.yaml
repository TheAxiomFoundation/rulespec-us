format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.7
  summary: |-
    Counties may retain 20% of collections from inadvertent household error
    claims and 35% of collections from intentional Program violation/fraud
    claims. Collections from agency error claims are retained by USDA, Food and
    Nutrition Service.
rules:
  - name: county_inadvertent_household_error_claim_collection_retention_rate
    kind: parameter
    dtype: Rate
    source: 10 CCR 2506-1 section 4.801.7
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.7
              excerpt: "twenty percent (20%) of collections from inadvertent household error claims"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          0.20

  - name: county_intentional_program_violation_fraud_claim_collection_retention_rate
    kind: parameter
    dtype: Rate
    source: 10 CCR 2506-1 section 4.801.7
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.7
              excerpt: "thirty-five percent (35%) of collections from intentional Program violation/fraud claims"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          0.35

  - name: county_authorized_retained_inadvertent_household_error_claim_collections
    kind: derived
    entity: County
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.801.7
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.7
              excerpt: "Counties may retain twenty percent (20%) of collections from inadvertent household error claims"
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.801.7#county_inadvertent_household_error_claim_collection_retention_rate
              output: county_inadvertent_household_error_claim_collection_retention_rate
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          max(0, collections_from_inadvertent_household_error_claims)
          * county_inadvertent_household_error_claim_collection_retention_rate

  - name: county_authorized_retained_intentional_program_violation_fraud_claim_collections
    kind: derived
    entity: County
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.801.7
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.7
              excerpt: "Counties may retain ... thirty-five percent (35%) of collections from intentional Program violation/fraud claims"
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.801.7#county_intentional_program_violation_fraud_claim_collection_retention_rate
              output: county_intentional_program_violation_fraud_claim_collection_retention_rate
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          max(0, collections_from_intentional_program_violation_fraud_claims)
          * county_intentional_program_violation_fraud_claim_collection_retention_rate

  - name: county_authorized_retained_claim_collections
    kind: derived
    entity: County
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.801.7
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.801.7#county_authorized_retained_inadvertent_household_error_claim_collections
              output: county_authorized_retained_inadvertent_household_error_claim_collections
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.801.7#county_authorized_retained_intentional_program_violation_fraud_claim_collections
              output: county_authorized_retained_intentional_program_violation_fraud_claim_collections
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          county_authorized_retained_inadvertent_household_error_claim_collections
          + county_authorized_retained_intentional_program_violation_fraud_claim_collections

  - name: agency_error_claim_collections_retained_by_usda_food_and_nutrition_service
    kind: derived
    entity: County
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.801.7
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.801.7
              excerpt: "The total amount of collections from agency error claims is retained by the USDA, Food and Nutrition Service."
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          max(0, collections_from_agency_error_claims)
