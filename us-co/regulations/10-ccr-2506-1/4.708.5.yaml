format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.708.5
  summary: |-
    Unusable EBT cards shall be destroyed by the local office by burning, shredding, or tearing with two witnesses. Form FNS-471 must be completed, signed by the required witnesses, and mailed to the state department. FNS-135 and FNS-471 documents support necessary destruction, with monthly reporting and retention requirements for improperly manufactured or mutilated cards, cards received from recipients, and cards received from claims collections.
rules:
  - name: ebt_card_destruction_required_witness_count
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.708.5
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.708.5
              excerpt: "two (2) persons witness the EBT card destruction"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          2

  - name: unusable_ebt_card_destruction_method_and_witness_requirements_met
    kind: derived
    entity: LocalOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.708.5
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.708.5
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.708.5#ebt_card_destruction_required_witness_count
              output: ebt_card_destruction_required_witness_count
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          unusable_ebt_cards_destroyed_by_local_office
          and (
              unusable_ebt_cards_destroyed_by_burning
              or unusable_ebt_cards_destroyed_by_shredding
              or unusable_ebt_cards_destroyed_by_tearing
          )
          and persons_witnessing_ebt_card_destruction_count >= ebt_card_destruction_required_witness_count

  - name: fns_471_destruction_report_completed_signed_and_mailed
    kind: derived
    entity: LocalOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.708.5
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.708.5
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not unusable_ebt_cards_destroyed_by_local_office)
          or (
              form_fns_471_completed_for_ebt_card_destruction
              and form_fns_471_signed_by_required_witnesses
              and form_fns_471_mailed_to_state_department
          )

  - name: improperly_manufactured_or_mutilated_shipment_destruction_reporting_completed
    kind: derived
    entity: LocalOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.708.5
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.708.5
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not destruction_involves_improperly_manufactured_or_mutilated_ebt_cards_from_shipments)
          or (
              destruction_reported_on_form_fns_471
              and form_fns_471_completed_on_destruction_of_improperly_manufactured_or_mutilated_shipment_cards
              and form_fns_471_submitted_with_form_fns_250_for_appropriate_month
          )

  - name: recipient_returned_unusable_card_destruction_documents_retained_for_audit
    kind: derived
    entity: LocalOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.708.5
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.708.5
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not ebt_cards_received_from_recipients_for_destruction)
          or (
              original_form_fns_135_for_recipient_return_attached_to_copy_of_form_fns_471
              and attached_forms_retained_in_local_office_for_future_review_and_audit
          )

  - name: claims_collection_card_destruction_reported_on_fns_471
    kind: derived
    entity: LocalOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.708.5
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.708.5
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not destruction_involves_ebt_cards_received_from_claims_collections_due_to_household_claim_payment)
          or destruction_reported_on_form_fns_471

  - name: fns_135_receipt_for_returned_unusable_cards
    kind: derived
    entity: LocalOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.708.5
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.708.5
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not unusable_ebt_cards_returned_by_clients_for_exchange_or_claim_payments)
          or form_fns_135_acted_as_receipt_for_returned_unusable_ebt_cards
