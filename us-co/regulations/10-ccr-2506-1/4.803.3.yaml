  kind: parameter
  dtype: Integer
  source: 10 CCR 2506-1 4.803.3(A)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.803.3
          excerpt: twelve (12) months for the first (1st) IPV
  versions:
