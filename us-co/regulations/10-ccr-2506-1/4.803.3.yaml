format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.803.3
  summary: Individuals who waived or were found to have committed an IPV are ineligible
    for 12 months for the first IPV, 24 months for the second IPV, and permanently
    for the third IPV/fraud. Misrepresenting identity or residency to receive duplicate
    benefits causes a 10-year SNAP disqualification, overridden by a permanent third-offense
    disqualification. Trafficking penalties are cross-referenced to Section 26-2-306(2),
    C.R.S.; a court conviction for trafficking $500 or more causes permanent disqualification.
    Drug convictions disqualify only when SNAP-benefit misuse is part of court findings;
    qualifying first drug convictions are 24 months and second convictions are permanent.
    Trading or purchasing firearms, ammunition, or explosives with SNAP benefits causes
    permanent disqualification on first conviction, including deferred adjudication.
  deferred_outputs:
  - output: us-co:regulations/10-ccr-2506-1/4.803.3#trafficking_benefits_penalties_under_section_26_2_306_2
    reason: The source says trafficking SNAP benefit penalties are outlined in Section
      26-2-306(2), C.R.S., but that cited source is not available in the provided
      context; only the independent $500-or-more permanent-disqualification branch
      is encoded here.
rules:
