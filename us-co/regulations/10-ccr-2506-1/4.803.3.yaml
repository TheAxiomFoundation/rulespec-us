  source: 10 CCR 2506-1 4.803.3(A)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.803.3
      - path: versions[0].formula
        kind: import
        import:
          target: us-co:regulations/10-ccr-2506-1/4.803.3#first_ipv_disqualification_months
          output: first_ipv_disqualification_months
          hash: sha256:local
      - path: versions[0].formula
        kind: import
        import:
          target: us-co:regulations/10-ccr-2506-1/4.803.3#second_ipv_disqualification_months
          output: second_ipv_disqualification_months
          hash: sha256:local
  versions:
  - effective_from: '0001-01-01'
    formula: "if individual_waived_or_was_found_to_have_committed_ipv and first_ipv:\n\
      \  first_ipv_disqualification_months\nelse:\n  if individual_waived_or_was_found_to_have_committed_ipv\
      \ and second_ipv:\n    second_ipv_disqualification_months\n  else:\n    0"
- name: permanently_disqualified_for_third_ipv_or_fraud
