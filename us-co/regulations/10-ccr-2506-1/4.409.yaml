format: rulespec/v1
module:
  summary: |-
    Colorado's SNAP rule manual counts liquid resources, non-liquid resource
    equity, accessible jointly owned resources, and commingled excluded funds
    after the six-month commingling protection period. Non-liquid resource
    equity is fair market value less verified amounts owed. A jointly owned
    resource is counted in full unless the household demonstrates no access or
    only partial access.
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.409
rules:
  - name: snap_countable_liquid_resources
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.409(A)
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          cash_on_hand
          + checking_account_balances
          + savings_account_balances
          + savings_certificates_value
          + stocks_and_bonds_value
          + countable_lump_sum_resources
  - name: snap_non_liquid_resource_equity_value
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.409(B)
    versions:
      - effective_from: '2025-10-01'
        formula: max(0, non_liquid_resource_fair_market_value - non_liquid_resource_verified_amount_owed)
  - name: snap_jointly_owned_resource_countable_value
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.409(C)
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if household_demonstrates_no_access_to_joint_resource:
              0
          elif household_demonstrates_partial_access_to_joint_resource:
              accessible_joint_resource_value
          else: jointly_owned_resource_total_value
  - name: snap_joint_resource_inaccessible_due_to_refusing_joint_owner
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.409(C)
    versions:
      - effective_from: '2025-10-01'
        formula: joint_resource_cannot_practically_be_subdivided and joint_owner_refuses_to_comply
  - name: snap_commingled_excluded_funds_countable_resource
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.409(D)
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if excluded_funds_kept_in_separate_uncommingled_account:
              0
          elif months_since_excluded_funds_were_commingled <= 6:
              0
          else: commingled_excluded_funds_amount
  - name: snap_countable_resources
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.409
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          snap_countable_liquid_resources
          + snap_non_liquid_resource_equity_value
          + snap_jointly_owned_resource_countable_value
          + snap_commingled_excluded_funds_countable_resource
