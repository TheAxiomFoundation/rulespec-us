format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.208
  summary: Certification periods shall conform to calendar months; households shall
    receive the longest certification period possible based on predictable anticipated
    income and circumstances; entitlement ends at expiration, with further eligibility
    only on a newly completed recertification application and a new eligibility determination.
    The Notice of Action must indicate the certification period for eligible households.
    At recertification, the new period is based on a new review, and delinquent PA
    recertification shall not delay SNAP recertification beyond the SNAP certification-period
    ending date.
rules:
- name: certification_period_conforms_to_calendar_months
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: 10 CCR 2506-1 section 4.208(A)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.208
  versions:
  - effective_from: '2025-10-01'
    formula: 'certification_period_assigned

      and certification_period_conforms_to_calendar_months_fact'
- name: longest_predictable_certification_period_assigned
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: 10 CCR 2506-1 section 4.208(A)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.208
  versions:
  - effective_from: '2025-10-01'
    formula: 'certification_period_assigned

      and assigned_longest_certification_period_possible_based_on_predictability_of_anticipated_income_and_other_circumstances'
- name: benefits_not_continued_after_certification_period_without_new_eligibility_determination
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: 10 CCR 2506-1 section 4.208(A)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.208
  versions:
  - effective_from: '2025-10-01'
    formula: 'certification_period_expired

      and benefits_continued_beyond_end_of_certification_period

      and not new_determination_of_eligibility_completed'
- name: recertification_eligibility_established_only_on_newly_completed_application
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: 10 CCR 2506-1 section 4.208(A)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.208
  versions:
  - effective_from: '2025-10-01'
    formula: 'further_snap_eligibility_established_after_certification_period_expiration

      and newly_completed_application_for_recertification_submitted'
- name: notice_of_action_indicates_certification_period_for_eligible_household
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: 10 CCR 2506-1 section 4.208(A)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.208
  versions:
  - effective_from: '2025-10-01'
    formula: "(not household_determined_eligible_for_snap)\nor (\n    state_prescribed_notice_of_action_provided_to_applicant_household\n\
      \    and notice_of_action_indicates_period_of_certification\n)"
- name: recertification_period_based_on_new_review_of_circumstances
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: 10 CCR 2506-1 section 4.208(B)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.208
  versions:
  - effective_from: '2025-10-01'
    formula: '(not household_approved_at_time_of_recertification)

      or recertification_period_assigned_based_on_new_review_of_household_circumstances'
- name: delinquent_pa_recertification_does_not_delay_snap_recertification
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: 10 CCR 2506-1 section 4.208(C)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.208
  versions:
  - effective_from: '2025-10-01'
    formula: '(not pa_recertification_delinquent)

      or snap_recertification_not_delayed_beyond_snap_certification_period_ending_date'
