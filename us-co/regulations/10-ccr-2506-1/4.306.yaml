format: rulespec/v1
module:
  summary: |-
    Colorado's SNAP rule manual states that students age 18 through 49 who are
    enrolled at least half-time in an institution of higher education are
    ineligible unless they satisfy the student exemptions. This section
    restates the federal student eligibility rule in 7 CFR 273.5.
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.306
imports:
  - us:regulations/7-cfr/273/5
rules:
  - name: restates_student_eligibility
    kind: source_relation
    source: 10 CCR 2506-1 section 4.306
    source_relation:
      type: restates
      target: us:regulations/7-cfr/273/5#snap_member_student_ineligible
      authority: federal
  - name: restates_student_enrollment_status
    kind: source_relation
    source: 10 CCR 2506-1 section 4.306
    source_relation:
      type: restates
      target: us:regulations/7-cfr/273/5#snap_member_enrolled_in_institution_of_higher_education
      authority: federal
