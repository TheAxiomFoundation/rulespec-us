format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.306
  summary: |-
    Persons age eighteen through forty-nine enrolled at least half time in an institution of higher education are not eligible for SNAP unless they meet exemption criteria at 4.306.1. Persons outside those age/enrollment categories, high school attendees, full-time non-higher-education school or training participants, and participants in on-the-job training are not considered under student eligibility criteria. Enrollment status begins for eligibility when classes start and continues through attendance, vacation, and recess unless an ending event occurs.
imports:
  - us:regulations/7-cfr/273/5
rules:
  - name: snap_student_criteria_minimum_age
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.306(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.306
              excerpt: age eighteen (18) through forty-nine (49)
    versions:
      - effective_from: '2019-06-14'
        formula: |-
          18

  - name: snap_student_criteria_maximum_age
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.306(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.306
              excerpt: age eighteen (18) through forty-nine (49)
    versions:
      - effective_from: '2019-06-14'
        formula: |-
          49

  - name: snap_student_criteria_underage_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.306(B)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.306
              excerpt: Persons aged seventeen (17) or under
    versions:
      - effective_from: '2019-06-14'
        formula: |-
          17

  - name: snap_student_criteria_older_age_minimum
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.306(B)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.306
              excerpt: Persons aged fifty (50) or over
    versions:
      - effective_from: '2019-06-14'
        formula: |-
          50

  - name: participating_in_on_the_job_training_program_for_student_criteria
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.306(B)(6)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.306
    versions:
      - effective_from: '2019-06-14'
        formula: |-
          training_in_employment_environment
          and not internship_field_work_or_practical_experience_associated_with_higher_education_course

  - name: subject_to_snap_student_eligibility_criteria
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.306(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.306
    versions:
      - effective_from: '2019-06-14'
        formula: |-
          person_age >= snap_student_criteria_minimum_age
          and person_age <= snap_student_criteria_maximum_age
          and enrolled_at_least_half_time_in_institution_of_higher_education

  - name: not_considered_under_snap_student_eligibility_criteria
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.306(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.306
    versions:
      - effective_from: '2019-06-14'
        formula: |-
          person_age <= snap_student_criteria_underage_limit
          or person_age >= snap_student_criteria_older_age_minimum
          or enrolled_less_than_half_time
          or enrolled_full_time_in_school_or_training_program_that_is_not_institution_of_higher_education
          or attending_high_school
          or participating_in_on_the_job_training_program_for_student_criteria

  - name: snap_student_ineligible_under_student_criteria
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.306(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.306
    versions:
      - effective_from: '2019-06-14'
        formula: |-
          subject_to_snap_student_eligibility_criteria
          and not meets_student_exemption_criteria_at_4_306_1

  - name: student_enrollment_status_active_for_snap_eligibility
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.306(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.306
    versions:
      - effective_from: '2019-06-14'
        formula: |-
          student_started_classes_for_school_term
          and not student_graduated
          and not student_suspended_or_expelled
          and not student_dropped_out
          and not student_does_not_intend_to_register_for_next_normal_school_term_excluding_summer_session

  - name: restates_student_eligibility
    kind: source_relation
    source: 10 CCR 2506-1 section 4.306
    source_relation:
      type: restates
      target: us:regulations/7-cfr/273/5#snap_member_student_ineligible
      authority: federal

  - name: restates_student_enrollment_status
    kind: source_relation
    source: 10 CCR 2506-1 section 4.306
    source_relation:
      type: restates
      target: us:regulations/7-cfr/273/5#snap_member_enrolled_in_institution_of_higher_education
      authority: federal
