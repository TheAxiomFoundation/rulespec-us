format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.91
  summary: |-
    EBT cards shall be mailed first-class in sturdy non-forwarding envelopes. USDA/FCS assumes financial liability for properly issued EBT cards lost in the mail except losses above 0.3% of the state total quarterly mail issuance loss. Local offices with quarterly mail loss are assessed a percentage of any state penalty. Local offices using mail issuance must submit Form FNS-259 so it is received by the fifteenth day of the next month.
rules:
  - name: state_quarterly_mail_issuance_loss_excess_rate_limit
    kind: parameter
    dtype: Rate
    source: 10 CCR 2506-1 section 4.707.91(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.91
              excerpt: "in excess of three tenths of a percent (0.3%)"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          0.003

  - name: fns_259_receipt_day_of_next_month_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.707.91(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.91
              excerpt: "received by the fifteenth (15th) day of the next month"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          15

  - name: ebt_card_mail_loss_prevention_requirements_met
    kind: derived
    entity: StateAgency
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.707.91(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.91
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          all_ebt_cards_mailed_as_first_class_mail
          and all_ebt_cards_mailed_in_sturdy_non_forwarding_envelopes

  - name: usda_fcs_assumes_financial_liability_for_mail_lost_ebt_cards
    kind: derived
    entity: StateAgency
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.707.91(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.91
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.707.91#state_quarterly_mail_issuance_loss_excess_rate_limit
              output: state_quarterly_mail_issuance_loss_excess_rate_limit
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          ebt_cards_properly_issued
          and ebt_cards_lost_in_mail
          and state_quarterly_mail_issuance_loss_rate <= state_quarterly_mail_issuance_loss_excess_rate_limit

  - name: local_office_assessed_share_of_state_mail_loss_penalty
    kind: derived
    entity: StateAgency
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.707.91(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.91
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          local_office_had_mail_loss_during_quarter
          and usda_fns_assessed_penalty_against_state
          and local_office_assessed_percentage_of_state_total_penalty

  - name: local_office_fns_259_report_received_timely
    kind: derived
    entity: StateAgency
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.707.91(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.91
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.707.91#fns_259_receipt_day_of_next_month_limit
              output: fns_259_receipt_day_of_next_month_limit
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          local_office_unit_uses_mail_issuance_system
          and form_fns_259_report_submitted_by_local_office
          and form_fns_259_report_received_day_of_next_month <= fns_259_receipt_day_of_next_month_limit
