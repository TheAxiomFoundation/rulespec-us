format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.4
  summary: |-
    Local offices ordering EBT cards shall designate at least two authorized receiving agents and notify the State Department by letter of names, receiving-location address, and delivery-acceptance hours. Issuance offices and bulk storage points shall promptly verify and acknowledge EBT card shipments in writing and control and store EBT cards. USDA/FNS shipments use Form FNS 261; State Department shipments use Form FNS-300, each with an original and three copies, with specified actions depending on whether the shipment is in order.
rules:
  - name: minimum_authorized_ebt_card_receiving_agents
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.707.4(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.4
              excerpt: "designate at least two persons"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          2

  - name: fns_advice_of_shipment_copy_count
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.707.4(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.4
              excerpt: "an original and three (3) copies of Form FNS 261"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          3

  - name: state_advice_of_transfer_copy_count
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.707.4(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.4
              excerpt: "the original and three (3) copies"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          3

  - name: local_office_ebt_card_receiving_agents_designated_and_state_notified
    kind: derived
    entity: LocalOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.707.4(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.4
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.707.4#minimum_authorized_ebt_card_receiving_agents
              output: minimum_authorized_ebt_card_receiving_agents
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          local_office_orders_ebt_cards
          and authorized_ebt_card_receiving_agent_count >= minimum_authorized_ebt_card_receiving_agents
          and state_department_notified_by_letter_of_authorized_personnel_names
          and state_department_notified_by_letter_of_ebt_card_receiving_location_address
          and state_department_notified_by_letter_of_ebt_card_delivery_acceptance_hours

  - name: ebt_card_shipment_verified_acknowledged_and_controlled
    kind: derived
    entity: EbtCardShipment
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.707.4(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.4
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          ebt_card_shipment_received_at_issuance_office_or_bulk_storage_point
          and shipment_contents_promptly_verified
          and shipment_contents_acknowledged_in_writing
          and ebt_cards_control_and_storage_responsibility_maintained
          and blank_ebt_card_carton_serial_numbers_verified_upon_receipt
          and receiving_agent_ensured_indicated_number_of_cartons_received_before_signing_receipt_form

  - name: usda_fns_ebt_card_shipment_receipt_processed
    kind: derived
    entity: EbtCardShipment
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.707.4(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.4
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.707.4#fns_advice_of_shipment_copy_count
              output: fns_advice_of_shipment_copy_count
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          shipment_received_from_usda_fns
          and form_fns_261_original_mailed_to_receiving_agent
          and form_fns_261_copy_count_mailed_to_receiving_agent >= fns_advice_of_shipment_copy_count
          and (
              (
                  usda_fns_shipment_is_in_order
                  and receiving_agent_completed_form_fns_261
              )
              or (
                  not usda_fns_shipment_is_in_order
                  and state_department_immediately_notified_of_usda_fns_shipment_not_in_order
                  and receiving_agent_instructed_to_annotate_form_fns_261
                  and form_fns_261_annotated_with_ebt_card_discrepancy_or_damaged_condition
              )
          )
          and form_fns_261_signed
          and form_fns_261_dated
          and form_fns_261_submitted_in_normal_manner

  - name: state_department_ebt_card_shipment_receipt_processed
    kind: derived
    entity: EbtCardShipment
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.707.4(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.707.4
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.707.4#state_advice_of_transfer_copy_count
              output: state_advice_of_transfer_copy_count
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          shipment_received_from_state_department
          and form_fns_300_original_mailed_to_receiving_agent
          and form_fns_300_copy_count_mailed_to_receiving_agent >= state_advice_of_transfer_copy_count
          and (
              (
                  state_department_shipment_is_in_order
                  and form_fns_300_original_signed_and_dated_by_receiving_agent
                  and all_form_fns_300_copies_signed_and_dated_by_receiving_agent
              )
              or (
                  not state_department_shipment_is_in_order
                  and state_department_immediately_notified_of_state_department_shipment_not_in_order
              )
          )
