format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.609.6
  summary: |-
    When a household is approved for T-SNAP, the household shall be notified that it will receive transitional benefits and the length of the transitional period; that it may apply for recertification at any time and otherwise must undergo recertification at the end; that return to Colorado Works during T-SNAP requires recertification; of benefit-amount changes due to loss of Colorado Works basic cash assistance or changes outlined in Section 4.609.1(B) and (C); that changes need not be reported or verified until recertification; and that the local office will not act on reported changes during the transitional period and the household should apply for recertification if income decreases or expenses or household size increase.
imports:
  - us-co:regulations/10-ccr-2506-1/4.609.1#t_snap_transitional_certification_period_months
rules:
  - name: t_snap_approval_notice_required_information_provided
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.609.6
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.609.6
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.609.1#t_snap_transitional_certification_period_months
              output: t_snap_transitional_certification_period_months
              hash: sha256:abc04307ad63a9a1501a5b5419f509eadbf960061dd8ce9b0fe507754e5c248f
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not household_approved_for_t_snap)
          or (
              notice_informs_household_receiving_transitional_benefits
              and notice_transitional_period_length_months == t_snap_transitional_certification_period_months
              and notice_informs_household_may_apply_for_recertification_any_time_during_transitional_period
              and notice_informs_household_must_undergo_recertification_at_transitional_period_end_if_no_recertification_application_during_period
              and notice_informs_household_return_to_cw_during_t_snap_requires_recertification_for_continued_eligibility_and_new_snap_allotment
              and notice_explains_benefit_amount_changes_due_to_loss_of_cw_basic_cash_assistance_or_section_4_609_1_b_and_c_changes
              and notice_informs_household_not_required_to_report_or_verify_changes_until_recertification_completed
              and notice_informs_household_local_office_will_not_act_on_reported_changes_during_transitional_period
              and notice_informs_household_should_apply_for_recertification_if_income_decreases_or_expenses_or_household_size_increase_before_deadline
          )
