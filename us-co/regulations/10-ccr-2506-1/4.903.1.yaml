format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.903.1
  summary: |-
    Federal regulations, FNS notices and policy memos, SNAP rules, and State
    Plans of Operation shall be available upon request for public examination
    during State Department office hours. Copies are available for a minimal
    printing charge. SNAP rules shall be available upon request at each local
    county office and online through the Secretary of State's Colorado Code of
    Regulations publication.
rules:
