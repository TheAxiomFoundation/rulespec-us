format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.902.2
  summary: |-
    Each local office telephone number available to the public must be listed
    under two specified alphabetical listings. Each local office must provide
    either a toll-free number or a number accepting collect calls for households
    outside the local calling area. These standardized listings do not restrict
    other telephone-directory listings.
rules:
  - name: local_office_public_number_required_alphabetical_listing_count
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.902.2(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.902.2
              excerpt: "following two alphabetical listings"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          2

  - name: local_office_public_number_alphabetical_listing_count
    kind: derived
    entity: LocalOffice
    dtype: Count
    period: Month
    source: 10 CCR 2506-1 section 4.902.2(A)(1)-(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.902.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (if local_office_public_number_listed_under_snap_certification_and_issuance_office: 1 else: 0)
          + (if local_office_public_number_listed_under_county_department_of_human_or_social_services: 1 else: 0)

  - name: local_office_public_number_standard_directory_listing_compliant
    kind: derived
    entity: LocalOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.902.2(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.902.2
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.902.2#local_office_public_number_required_alphabetical_listing_count
              output: local_office_public_number_required_alphabetical_listing_count
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.902.2#local_office_public_number_alphabetical_listing_count
              output: local_office_public_number_alphabetical_listing_count
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          local_office_public_number_alphabetical_listing_count >= local_office_public_number_required_alphabetical_listing_count

  - name: local_office_outside_calling_area_phone_access_compliant
    kind: derived
    entity: LocalOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.902.2(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.902.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          local_office_provides_toll_free_number
          or local_office_accepts_collect_calls_for_households_outside_local_calling_area

  - name: local_office_additional_directory_listings_allowed
    kind: derived
    entity: LocalOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.902.2(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: default
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.902.2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          true
