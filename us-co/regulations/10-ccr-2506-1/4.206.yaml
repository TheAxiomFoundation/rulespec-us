format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.206
  summary: |-
    SNAP applicant households must be determined eligible under Basic Categorical Eligibility, Expanded Categorical Eligibility, or Standard Eligibility. BCE and ECE households are deemed to have met conferring-program income and resource requirements but remain subject to stated disqualification exceptions and verification of SNAP eligibility factors when needed. SE applies to specified households and requires the stated income, resource, and nonfinancial criteria. Changed BCE/ECE circumstances require re-evaluation, and substantial lottery or gambling winnings disqualify the household in the month received and require later SE consideration before the next categorical re-evaluation.
  deferred_outputs:
    - output: us-co:regulations/10-ccr-2506-1/4.206#standard_eligibility_resource_limit_met
      reason: >-
        Section 4.206(C)(3)(b) requires households reviewed under Standard Eligibility to have resources below the limit prescribed in Section 4.408, but the copied Section 4.408 context provides countable resources and a categorical resource exemption, not the final source-referenced resource-limit judgment at the Section 4.206 eligibility-category scope.
    - output: us-co:regulations/10-ccr-2506-1/4.206#standard_eligibility_nonfinancial_criteria_met
      reason: >-
        Section 4.206(C)(3)(b)(3) requires households to meet nonfinancial eligibility criteria set out in Section 4.300, but no copied RuleSpec context provides Section 4.300.
    - output: us-co:regulations/10-ccr-2506-1/4.206#reported_change_verification_request_under_sections_4_604_and_4_604_1
      reason: >-
        Section 4.206(D) requires a request for verification in accordance with Sections 4.604 and 4.604.1 when documentation is insufficient after re-evaluation, but no copied RuleSpec context provides those cited provisions.
