format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.130.1
  summary: |-
    Specified persons may use SNAP benefits to purchase meals from listed USDA/FNS-approved or authorized meal providers, including meal delivery services, communal dining facilities, treatment and rehabilitation centers, group living arrangements, and shelters for battered women and children. Households containing persons experiencing homelessness may use benefits to purchase prepared meals from USDA/FNS-approved nonprofit providers for persons experiencing homelessness and may also purchase meals from USDA/FNS-authorized restaurants that discount or serve food at concessional prices to such households.
rules:
  - name: specified_person_snap_meal_purchase_authorized
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.130.1(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.130.1
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_contains_specified_person
          and (
              meal_purchased_from_usda_fns_approved_meal_delivery_service
              or meal_purchased_from_communal_dining_facility_for_persons_aged_sixty_or_older_or_ssi_households
              or meal_purchased_from_authorized_drug_or_alcoholic_treatment_and_rehabilitation_center
              or meal_purchased_from_authorized_public_or_private_nonprofit_group_living_arrangement_facility
              or meal_purchased_from_shelter_for_battered_women_and_children
          )

  - name: homeless_household_nonprofit_prepared_meal_purchase_authorized
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.130.1(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.130.1
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_contains_person_experiencing_homelessness
          and prepared_meal_purchased_from_public_or_private_nonprofit_provider_for_persons_experiencing_homelessness
          and provider_for_persons_experiencing_homelessness_approved_by_usda_fns

  - name: homeless_household_restaurant_meal_purchase_authorized
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.130.1(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.130.1
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_contains_person_experiencing_homelessness
          and meal_purchased_from_restaurant
          and restaurant_offers_discounts_to_or_serves_food_at_concessional_prices_to_households_containing_persons_experiencing_homelessness
          and restaurant_authorized_by_usda_fns_as_retailer
