format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.310.3
  summary: |-
    At all determinations of eligibility including initial, ongoing, and recertification, eligibility technicians must explore whether a household member meets an exemption rather than placing the burden solely on the member to self-report. General work requirement exemptions include specified age, care responsibility, unfitness, student, employment, unemployment-insurance, treatment/rehabilitation, and CW/CRSP compliance categories.
rules:
  - name: maximum_age_for_child_age_exemption
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.310.3(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.310.3
              excerpt: "A person 15 years of age or younger"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          15

  - name: minimum_age_for_older_age_exemption
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.310.3(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.310.3
              excerpt: "60 years of age or older"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          60

  - name: minimum_age_for_minor_youth_exemption
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.310.3(A)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.310.3
              excerpt: "A person age 16 or 17"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          16

  - name: maximum_age_for_minor_youth_exemption
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.310.3(A)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.310.3
              excerpt: "A person age 16 or 17"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          17

  - name: dependent_child_care_age_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.310.3(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.310.3
              excerpt: "dependent child under 6"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          6

  - name: minimum_weekly_work_hours_for_employment_exemption
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.310.3(E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.310.3
              excerpt: "working a minimum of thirty (30) hours per week"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          30

  - name: migrant_or_seasonal_farm_worker_employment_start_day_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.310.3(E)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.310.3
              excerpt: "begin employment within thirty (30) days"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          30

  - name: physical_or_mental_unfitness_example_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.310.3(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.310.3
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          person_experiencing_homelessness_as_defined_in_4_000_1
          or person_recently_released_from_institution
          or person_with_disabilities_as_defined_in_4_100
          or person_has_self_declared_temporary_condition_preventing_successful_work_activity_participation
          or person_receives_temporary_or_permanent_disability_benefits_from_government_or_private_source
          or person_participates_in_vocational_rehabilitation
          or person_applies_for_or_appeals_ssi_benefits
          or person_unable_to_maintain_employment
          or person_impacted_by_domestic_violence

  - name: general_work_requirement_exemption_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.310.3(A)-(H)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.310.3
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.310.3#maximum_age_for_child_age_exemption
              output: maximum_age_for_child_age_exemption
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.310.3#minimum_age_for_older_age_exemption
              output: minimum_age_for_older_age_exemption
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.310.3#minimum_age_for_minor_youth_exemption
              output: minimum_age_for_minor_youth_exemption
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.310.3#maximum_age_for_minor_youth_exemption
              output: maximum_age_for_minor_youth_exemption
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.310.3#minimum_weekly_work_hours_for_employment_exemption
              output: minimum_weekly_work_hours_for_employment_exemption
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.310.3#migrant_or_seasonal_farm_worker_employment_start_day_limit
              output: migrant_or_seasonal_farm_worker_employment_start_day_limit
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.310.3#physical_or_mental_unfitness_example_applies
              output: physical_or_mental_unfitness_example_applies
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          person_age_years <= maximum_age_for_child_age_exemption
          or person_age_years >= minimum_age_for_older_age_exemption
          or (
              person_age_years >= minimum_age_for_minor_youth_exemption
              and person_age_years <= maximum_age_for_minor_youth_exemption
              and (
                  not person_is_head_of_household
                  or person_attends_school_at_least_half_time
                  or person_enrolled_in_employment_training_program_at_least_half_time
              )
          )
          or person_responsible_for_care_of_dependent_child_under_dependent_child_care_age_limit
          or person_responsible_for_care_of_incapacitated_person
          or person_physically_or_mentally_unfit_for_employment
          or physical_or_mental_unfitness_example_applies
          or (
              student_enrolled_at_least_half_time_in_accredited_school_training_program_or_institution_of_higher_education
              and (
                  not student_enrolled_in_institution_of_higher_education
                  or student_meets_snap_student_eligibility_requirements
              )
              and student_is_in_normal_class_attendance_or_school_break
              and not student_has_disqualifying_enrollment_break_or_lacks_intent_to_register_next_normal_term
          )
          or (
              employed_or_self_employed
              and (
                  weekly_work_hours >= minimum_weekly_work_hours_for_employment_exemption
                  or weekly_earnings >= federal_minimum_wage * minimum_weekly_work_hours_for_employment_exemption
              )
          )
          or (
              migrant_or_seasonal_farm_worker
              and under_contract_or_similar_agreement_to_begin_employment
              and days_until_employment_begins <= migrant_or_seasonal_farm_worker_employment_start_day_limit
          )
          or (
              person_works_in_action_program_including_vista
              and weekly_work_hours >= minimum_weekly_work_hours_for_employment_exemption
              and employer_employee_relationship_documented
          )
          or person_applies_for_or_receives_unemployment_insurance_benefits
          or person_denied_unemployment_insurance_benefits_and_appealing_decision
          or person_regular_participant_in_drug_or_alcohol_treatment_or_rehabilitation_program
          or person_subject_to_and_complying_with_cw_or_crsp_work_program

  - name: eligibility_technician_exemption_exploration_requirement_met
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.310.3 opening paragraph
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.310.3
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not eligibility_determination_conducted)
          or (
              eligibility_determination_is_initial_ongoing_or_recertification
              and eligibility_technician_explored_whether_household_member_meets_exemption
              and not eligibility_technician_placed_burden_solely_on_household_member_to_self_report_exemption
          )
