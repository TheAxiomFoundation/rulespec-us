format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.203.22
  summary: |-
    An authorized or emergency authorized representative may be disqualified from representing a SNAP household for up to one year if the local office has evidence of knowing false information, misrepresentation of household circumstances, or improper use of benefits; written notice must be sent to affected households and the representative thirty calendar days before disqualification and include specified information. This provision is not applicable to drug and alcohol treatment centers or heads of group living arrangements acting as authorized representatives for residents, though intentional misrepresentation by those entities may be prosecuted under state fraud statutes.
rules:
  - name: representative_disqualification_year_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.203.22
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.203.22
              excerpt: "for up to one (1) year"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          1

  - name: representative_disqualification_notice_calendar_day_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.203.22
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.203.22
              excerpt: "thirty (30) calendar days prior to the date of disqualification"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          30

  - name: representative_may_be_disqualified_for_misconduct
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.203.22
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.203.22
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          representative_is_authorized_or_emergency_authorized_representative
          and representative_acting_for_household_whose_application_filed_by_permitted_person
          and local_office_obtained_evidence_of_representative_misconduct
          and (
              representative_misrepresented_household_circumstances
              or representative_knowingly_provided_false_information_pertaining_to_household
              or representative_made_improper_use_of_snap_benefits
          )
          and not representative_is_drug_or_alcohol_treatment_center_acting_for_residents
          and not representative_is_head_of_group_living_arrangement_acting_for_residents

  - name: representative_disqualification_notice_timely_and_complete
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.203.22
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.203.22
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.203.22#representative_disqualification_notice_calendar_day_limit
              output: representative_disqualification_notice_calendar_day_limit
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          written_notification_sent_to_affected_household
          and written_notification_sent_to_representative
          and notification_sent_calendar_days_before_disqualification >= representative_disqualification_notice_calendar_day_limit
          and notification_includes_proposed_action
          and notification_includes_reason_for_proposed_action
          and notification_includes_household_right_to_request_fair_hearing
          and notification_includes_office_telephone_number
          and (
              contact_person_name_not_possible_to_include
              or notification_includes_contact_person_name_for_additional_information
          )

  - name: treatment_center_or_group_living_arrangement_representative_disqualification_provision_inapplicable
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.203.22
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.203.22
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          representative_is_drug_or_alcohol_treatment_center_acting_for_residents
          or representative_is_head_of_group_living_arrangement_acting_for_residents

  - name: treatment_center_or_group_living_arrangement_fraud_prosecution_possible
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.203.22
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.203.22
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (
              representative_is_drug_or_alcohol_treatment_center_acting_for_residents
              or representative_is_head_of_group_living_arrangement_acting_for_residents
          )
          and representative_intentionally_misrepresented_household_circumstances
imports:
