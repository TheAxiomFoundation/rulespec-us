format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.904
  summary: |-
    Outreach activities performed by state and local personnel are ineligible
    for federal matching funds. Local offices must perform SNAP program
    informational activities, and program informational material must be
    available in non-English languages and include a nondiscrimination
    statement.
rules:
  - name: state_or_local_outreach_activity_federal_matching_funds_ineligible
    kind: derived
    entity: Activity
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.904
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.904
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          outreach_activity_performed_by_state_or_local_personnel
  - name: snap_program_informational_activity
    kind: derived
    entity: Activity
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.904
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.904
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          activity_conveys_information_about_snap_to_households
  - name: local_office_required_to_perform_snap_program_informational_activities
    kind: derived
    entity: LocalOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.904
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.904
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          true
  - name: snap_program_informational_material_language_requirement_satisfied
    kind: derived
    entity: ProgramInformationalMaterial
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.904
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.904
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          material_available_in_languages_other_than_english
  - name: snap_program_informational_material_nondiscrimination_statement_requirement_satisfied
    kind: derived
    entity: ProgramInformationalMaterial
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.904
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.904
              excerpt: available to all without regard to race, color, sex, age, mental or physical disability, religious creed, national origin, or political belief
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          material_includes_statement_program_available_without_regard_to_protected_characteristics
  - name: snap_program_informational_material_requirements_satisfied
    kind: derived
    entity: ProgramInformationalMaterial
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.904
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.904#snap_program_informational_material_language_requirement_satisfied
              output: snap_program_informational_material_language_requirement_satisfied
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.904#snap_program_informational_material_nondiscrimination_statement_requirement_satisfied
              output: snap_program_informational_material_nondiscrimination_statement_requirement_satisfied
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          snap_program_informational_material_language_requirement_satisfied
          and snap_program_informational_material_nondiscrimination_statement_requirement_satisfied
