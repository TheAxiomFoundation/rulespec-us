format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.903.41
  summary: |-
    Each month a statistically random sample of active and negative cases is
    selected for QA review through the automated-system master file. Local
    offices must make requested case records available no later than seven
    business days after receiving the request. For QA-requested cases, records
    must include documents and notes supporting eligibility decisions and basis
    of issuance for the sample/review month, and the local office must not take
    actions that might alter findings or misrepresent household circumstances.
    These provisions do not apply to routine case management.
rules:
  - name: qa_case_record_availability_deadline_business_days
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.903.41(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.903.41
              excerpt: "no later than seven (7) business days"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          7

  - name: monthly_qa_sample_selection_complies
    kind: derived
    entity: StateAgency
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.903.41(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.903.41
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          monthly_statistically_random_sample_of_active_and_negative_cases_selected
          and active_and_negative_cases_sampled_through_automated_system_master_file

  - name: requested_case_records_timely_available
    kind: derived
    entity: LocalOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.903.41(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.903.41
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.903.41#qa_case_record_availability_deadline_business_days
              output: qa_case_record_availability_deadline_business_days
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          local_office_received_qa_case_record_request
          and business_days_from_request_receipt_to_case_record_availability <= qa_case_record_availability_deadline_business_days

  - name: qa_requested_case_record_prepared_with_required_contents
    kind: derived
    entity: CaseRecord
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.903.41(C)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.903.41
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          case_record_requested_for_qa_review
          and all_documents_and_notes_supporting_review_month_eligibility_decisions_or_basis_of_issuance_included
          and all_documents_and_notes_supporting_review_month_local_office_actions_included

  - name: qa_bias_altering_action_prohibited
    kind: derived
    entity: LocalOffice
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.903.41(C)(2) and 4.903.41(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.903.41
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          local_office_received_qa_case_record_request
          and not action_is_routine_case_management
          and (
              local_office_made_changes_that_would_affect_eligibility_and_payment
              or local_office_added_or_removed_documentation_or_verification_from_official_case_record
              or local_office_contacted_household_qa_reviewer_or_collateral_contact_to_alter_findings_or_misrepresent_review_month_circumstances
          )
