format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.704
  summary: Regardless of current eligibility, the local office shall restore lost
    benefits by issuing an allotment equal to the benefits lost, in addition to the
    next month's allotment for currently eligible households. If household membership
    has changed, restoration goes to the household containing a majority of the original
    members, or if that household cannot be located or determined, to the household
    containing the prior head of household. Each local office shall maintain an accounting
    system documenting calculation, reason, remaining balance, and offsets by household
    claims.
rules:
- name: restored_lost_benefit_allotment_amount
  kind: derived
  entity: Household
  dtype: Money
  period: Month
  unit: USD
  source: 10 CCR 2506-1 section 4.704(A)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.704
  versions:
  - effective_from: '2025-10-01'
    formula: 'if lost_benefits_are_due_to_household: max(0, amount_of_benefits_lost)
      else: 0'
- name: next_month_allotment_with_restored_lost_benefits
  kind: derived
  entity: Household
  dtype: Money
  period: Month
  unit: USD
  source: 10 CCR 2506-1 section 4.704(A)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.704
      - path: versions[0].formula
        kind: import
        import:
          target: us-co:regulations/10-ccr-2506-1/4.704#restored_lost_benefit_allotment_amount
          output: restored_lost_benefit_allotment_amount
          hash: sha256:local
  versions:
  - effective_from: '2025-10-01'
    formula: 'if household_currently_eligible_for_next_month_allotment: max(0, current_next_month_allotment_entitlement)
      + restored_lost_benefit_allotment_amount else: restored_lost_benefit_allotment_amount'
- name: changed_membership_restoration_to_majority_original_member_household
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: 10 CCR 2506-1 section 4.704(B)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.704
  versions:
  - effective_from: '2025-10-01'
    formula: 'lost_benefits_are_due_to_household

      and household_membership_changed_since_loss_occurred

      and household_contains_majority_of_individuals_who_were_members_at_time_loss_occurred'
- name: changed_membership_restoration_to_prior_head_household
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: 10 CCR 2506-1 section 4.704(B)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.704
  versions:
  - effective_from: '2025-10-01'
    formula: 'lost_benefits_are_due_to_household

      and household_membership_changed_since_loss_occurred

      and local_office_cannot_locate_or_determine_household_containing_majority_of_original_members

      and household_contains_person_who_was_head_at_time_loss_occurred'
- name: lost_benefit_restoration_accounting_system_maintained
  kind: derived
  entity: StateAgency
  dtype: Judgment
  period: Month
  source: 10 CCR 2506-1 section 4.704(C)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.704
  versions:
  - effective_from: '2025-10-01'
    formula: 'local_office_maintains_accounting_system_documenting_household_entitlement_to_restoration

      and local_office_accounting_system_records_balance_of_lost_benefits_to_be_restored

      and local_office_documents_how_amount_to_be_restored_was_calculated

      and local_office_documents_reason_lost_benefits_must_be_restored

      and local_office_accounting_system_readily_identifies_claim_offset_situations'
