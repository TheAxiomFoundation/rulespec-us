format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.803.45
  summary: |-
    At the ADH, the ALJ or local hearing officer advises the household member or representative they may refuse to answer questions. Hearing decision and party notification occur within ninety calendar days from written notice that a requested hearing has been scheduled. A household member or representative is entitled to a postponement of up to thirty calendar days if requested at least ten calendar days before the hearing date, unless good cause is shown; postponed hearings extend the limits by the postponement days. Hearing records are retained for three years.
rules:
  - name: hearing_decision_notification_deadline_calendar_days
    kind: parameter
    dtype: Integer
    source: 10 CCR 2506-1 4.803.45(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.803.45
              excerpt: "within ninety (90) calendar days"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          90

  - name: maximum_postponement_calendar_days
    kind: parameter
    dtype: Integer
    source: 10 CCR 2506-1 4.803.45(E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.803.45
              excerpt: "postponement of up to thirty (30) calendar days"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: postponement_advance_request_calendar_days
    kind: parameter
    dtype: Integer
    source: 10 CCR 2506-1 4.803.45(E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.803.45
              excerpt: "at least ten (10) calendar days prior"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10

  - name: hearing_record_retention_years
    kind: parameter
    dtype: Integer
    source: 10 CCR 2506-1 4.803.45(G)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.803.45
              excerpt: "retained by the local office for a period of three (3) years"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          3

  - name: household_member_or_representative_entitled_to_postponement
    kind: derived
    entity: AdministrativeDisqualificationHearing
    dtype: Judgment
    period: Day
    source: 10 CCR 2506-1 4.803.45(E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.803.45
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.803.45#maximum_postponement_calendar_days
              output: maximum_postponement_calendar_days
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.803.45#postponement_advance_request_calendar_days
              output: postponement_advance_request_calendar_days
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          postponement_requested_by_household_member_or_representative
          and requested_postponement_calendar_days <= maximum_postponement_calendar_days
          and (
            days_before_scheduled_hearing_date_when_postponement_requested >= postponement_advance_request_calendar_days
            or good_cause_shown_for_failure_to_request_postponement_within_required_timeframe
          )

  - name: hearing_decision_notification_deadline_with_postponement_calendar_days
    kind: derived
    entity: AdministrativeDisqualificationHearing
    dtype: Integer
    period: Day
    source: 10 CCR 2506-1 4.803.45(B), (E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.803.45
              excerpt: "If the hearing is postponed, the above limits shall be extended for as many days as the hearing is postponed."
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.803.45#hearing_decision_notification_deadline_calendar_days
              output: hearing_decision_notification_deadline_calendar_days
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          hearing_decision_notification_deadline_calendar_days + (if hearing_is_postponed: hearing_postponed_calendar_days else: 0)

  - name: local_office_record_retention_requirement_satisfied
    kind: derived
    entity: AdministrativeDisqualificationHearing
    dtype: Judgment
    period: Day
    source: 10 CCR 2506-1 4.803.45(G)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.803.45
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.803.45#hearing_record_retention_years
              output: hearing_record_retention_years
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          verbatim_transcript_or_recording_of_testimony_and_exhibits_made
          and proceeding_papers_and_requests_retained_by_local_office
          and records_retained_years >= hearing_record_retention_years
          and records_available_to_household_or_representative_during_business_hours_for_copying_and_inspection
