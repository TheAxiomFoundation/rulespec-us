  - name: ievs_application_notice_provided
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.504.5(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.504.5
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (initial_certification_or_recertification)
          and written_statement_provided_on_or_with_application_form
          and written_statement_says_ievs_information_will_be_requested_and_verified_through_collateral_sources_when_discrepancies_found
          and written_statement_says_ievs_information_will_be_used_and_may_affect_household_eligibility_and_benefit_level

