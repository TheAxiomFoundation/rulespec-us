          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.504.5#non_uib_ievs_action_calendar_day_limit
              output: non_uib_ievs_action_calendar_day_limit
              hash: sha256:local
    versions:
