format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.504.5
  summary: |-
    The Colorado IEVS exchanges SNAP client information with SSA, IRS, and DOLE. At initial certification and recertification, SNAP applicants shall receive a written statement that IEVS information will be requested, verified through collateral sources when discrepancies are found, used, and may affect eligibility and benefit levels. For all household members, including excluded members with an available SSN, the agency shall request IEVS or locally accessed automated verification at the first available opportunity after application. Before benefit approval at initial application, recertification, and periodic report, the local office shall verify potential earnings or unemployment benefits through DOLE for all applicants. Eligibility and benefit determinations shall not be delayed past application processing standards or while awaiting IEVS verification. The local office shall act on IEVS information within forty-five calendar days, except UIB information from DOLE, which is governed by Section 4.604. DOLE wage data and IRS unearned-income information reported through IEVS are not verified on receipt and are subject to independent verification; benefits shall not be delayed while collateral verification is pending.
  deferred_outputs:
    - output: us-co:regulations/10-ccr-2506-1/4.504.5#dole_uib_ievs_information_acted_on_under_section_4_604
      reason: >-
        Section 4.504.5(F) requires UIB information received from DOLE to be acted upon in accordance with Section 4.604, but no copied RuleSpec context provides Section 4.604.
rules:
  - name: non_uib_ievs_action_calendar_day_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.504.5(F)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.504.5
              excerpt: "within forty-five (45) calendar days"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          45

  - name: ievs_household_contact_response_calendar_day_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.504.5(G)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.504.5
              excerpt: "requesting a response within ten (10) calendar days"
    versions:
