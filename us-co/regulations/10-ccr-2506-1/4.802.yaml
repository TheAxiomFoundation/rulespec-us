format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.802
  summary: |-
    Any household aggrieved by any local-office action affecting SNAP participation may appeal by requesting a local-level dispute resolution conference and/or a state-level fair hearing; the household may request a DRC or bypass it and appeal directly to CDHS for a state-level fair hearing. CDHS may deny fair hearings for mass-change disputes or disputes over a statewide reduction, cancellation, or suspension unless the request is based on the household's belief that rules were misapplied. Combined appeals are bifurcated between the SNAP fair hearings unit and OAC.
rules:
  - name: aggrieved_household_may_request_local_dispute_resolution_conference
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.802
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.802
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_aggrieved_by_local_office_action_affecting_snap_participation

  - name: aggrieved_household_may_request_state_fair_hearing
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.802
    metadata:
      proof:
        atoms:
