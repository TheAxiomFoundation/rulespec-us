format: rulespec/v1
module:
  summary: |-
    Colorado's SNAP rule manual requires applicants to live in the county or
    district where they apply, bars duplicate participation in more than one
    household or county/district in a month except for battered-shelter
    residents, treats non-vacation presence and homelessness as satisfying
    residency, and forbids durational residency or permanent-intent
    requirements. This section restates the federal residency and duplicate
    participation rule in 7 CFR 273.3.
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.303
imports:
  - us:regulations/7-cfr/273/3
rules:
  - name: restates_state_residency
    kind: source_relation
    source: 10 CCR 2506-1 section 4.303(A), 4.303(C), 4.303(D), and 4.303(E)
    source_relation:
      type: restates
      target: us:regulations/7-cfr/273/3#snap_household_state_resident
      authority: federal
  - name: restates_duplicate_participation_bar
    kind: source_relation
    source: 10 CCR 2506-1 section 4.303(B)
    source_relation:
      type: restates
      target: us:regulations/7-cfr/273/3#snap_household_duplicate_participation_barred
      authority: federal
  - name: restates_residency_eligibility
    kind: source_relation
    source: 10 CCR 2506-1 section 4.303
    source_relation:
      type: restates
      target: us:regulations/7-cfr/273/3#snap_household_residency_eligible
      authority: federal
