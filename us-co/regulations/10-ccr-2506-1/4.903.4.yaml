format: rulespec/v1
module:
  status: deferred
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.903.4
  summary: |-
    QA reviews are conducted during the annual federal QA review period, the twelve-month period from October 1 through September 30. QA reviews are federally mandated to measure SNAP caseload validity, determine error rates, provide corrective-action information, and establish liability/funding bases. Reviews are conducted on active cases and negative cases; negative-case review includes case record review, error analysis, client notification, and reporting review findings.
  deferred_outputs:
    - output: us-co:regulations/10-ccr-2506-1/4.903.4#annual_federal_qa_review_period
      reason: >-
        The source defines an administrative federal QA review period using calendar
        dates from October 1 through September 30. The supported RuleSpec formula
        surface does not provide date-valued period construction or month/day
        extraction needed to compute membership in that fiscal-year-style review
        period without decomposing legal dates into unsupported date literals.
    - output: us-co:regulations/10-ccr-2506-1/4.903.4#snap_qa_review_scope
      reason: >-
        The source states administrative purposes and review activities for active
        and negative SNAP cases, but it does not define a computable benefit,
        household eligibility condition, error-rate formula, liability amount, or
        sampling statistic. Encoding these process descriptions as household or
        case-level pass-through booleans would not be a source-faithful executable
        legal computation.
