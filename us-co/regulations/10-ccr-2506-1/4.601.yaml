format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.601
  summary: |-
    Households are only required to report and verify if combined gross income exceeds 130% of the Federal Poverty Level for household size; income increases must be reported within ten calendar days from the end of the month of change; changes may be reported in person, by telephone, in writing, or through the online system.
rules:
  - name: income_reporting_fpl_percentage_threshold
    kind: parameter
    dtype: Rate
    source: 10 CCR 2506-1 section 4.601(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.601
              excerpt: "one hundred thirty percent (130%) of the Federal Poverty Level (FPL)"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          1.30

  - name: income_increase_reporting_calendar_day_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.601(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.601
              excerpt: "no later than ten (10) calendar days from the end of the calendar month"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          10

  - name: household_income_report_and_verification_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.601(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.601
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.601#income_reporting_fpl_percentage_threshold
              output: income_reporting_fpl_percentage_threshold
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_combined_gross_income > household_size_federal_poverty_level * income_reporting_fpl_percentage_threshold

  - name: income_increase_reporting_requirement_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.601(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.601
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/10-ccr-2506-1/4.601#income_increase_reporting_calendar_day_limit
              output: income_increase_reporting_calendar_day_limit
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (not household_income_increased)
          or (
              income_increase_reported
              and calendar_days_from_end_of_change_month_to_income_increase_report <= income_increase_reporting_calendar_day_limit
          )

  - name: household_change_report_method_allowed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.601(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.601
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          change_reported_in_person
          or change_reported_by_telephone
          or change_reported_in_writing
          or change_reported_through_online_system
