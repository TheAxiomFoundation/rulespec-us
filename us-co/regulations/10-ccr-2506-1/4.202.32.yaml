format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.202.32
  summary: |-
    Where an application has been completed at the SSA office, the local office shall ensure that Section 4.502 information is verified before certification, and expedited households shall be processed under Sections 4.205.1 and 4.205.11. If the SSI household submits its SNAP application to the local office rather than through SSA, all verification, including SSA benefit verification, is provided by the household, SDX, BENDEX, or obtained by the local office rather than by SSA. For simultaneous SSI and SNAP processing, the local office shall question the household and/or use SDX listings to obtain SSI determination information, may inquire in writing to SSA if that information cannot be obtained, and shall act under Section 4.604 within ten calendar days of learning of the SSI determination. For clients who filed before release from a public institution, expedited processing begins on the release date; SSA shall notify the local office of the release date, and benefits are restored back to the release date when timely release notice was not provided after a joint SSI/SNAP application while institutionalized.
  deferred_outputs:
    - output: us-co:regulations/10-ccr-2506-1/4.202.32#ssa_completed_application_verified_before_certification_under_section_4_502
      reason: >-
        The source requires verification of information required by Section 4.502 before certification, but no copied RuleSpec context provides Section 4.502.
    - output: us-co:regulations/10-ccr-2506-1/4.202.32#ssa_completed_expedited_household_processed_under_cited_sections
      reason: >-
        The source requires expedited certification processing in accordance with Sections 4.205.1 and 4.205.11, but no copied RuleSpec context provides those cited sections.
    - output: us-co:regulations/10-ccr-2506-1/4.202.32#local_office_acts_after_ssi_determination_under_section_4_604
      reason: >-
        The source requires the local office to act in accordance with Section 4.604 within ten calendar days after learning of the SSI application determination, but no copied RuleSpec context provides Section 4.604.
rules:
  - name: ssi_determination_action_calendar_day_limit
    kind: parameter
    dtype: Count
    source: 10 CCR 2506-1 section 4.202.32(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.202.32
              excerpt: "Within ten (10) calendar days of learning of the determination of the SSI application"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          10

  - name: local_office_source_for_local_ssi_snap_application_verification_valid
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.202.32(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.202.32
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          ssi_household_submits_snap_application_to_local_office_rather_than_through_ssa
          and (
              all_verification_provided_by_household
              or all_verification_provided_by_sdx_or_bendex
              or all_verification_obtained_by_local_office
          )
          and not verification_provided_by_ssa

  - name: simultaneous_ssi_snap_determination_information_sought
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.202.32(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.202.32
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          ssi_and_snap_processed_simultaneously
          and (
              local_office_questioned_household_about_ssi_determination
              or local_office_used_sdx_listings_to_obtain_ssi_determination_information
          )

  - name: written_ssa_inquiry_for_ssi_determination_status_permitted
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.202.32(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.202.32
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          ssi_and_snap_processed_simultaneously
          and ssi_determination_information_cannot_be_obtained_through_sdx_listings
          and ssi_determination_information_cannot_be_obtained_by_questioning_household
          and local_office_made_written_inquiry_to_ssa_for_ssi_determination_status

  - name: public_institution_pre_release_filer_expedited_processing_begins_on_release
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.202.32(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.202.32
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          client_filed_prior_to_release_from_public_institution
          and expedited_processing_time_standard_began_on_date_client_released_from_public_institution

  - name: ssa_public_institution_release_notice_provided
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.202.32(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.202.32
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          client_released_from_public_institution
          and ssa_notified_local_office_of_client_release_date

  - name: public_institution_release_date_benefits_restored_after_untimely_notice
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1 section 4.202.32(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.202.32
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          client_jointly_applied_for_ssi_and_snap_while_in_public_institution
          and local_office_not_notified_timely_of_client_release
          and benefits_restored_back_to_client_release_date
