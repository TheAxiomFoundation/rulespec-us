format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.534
  summary: "\u201CDeduct $65 from the client\u2019s spouse's gross earned income;\u201D\
    \ then \u201CDivide the remainder by two (2).\u201D A spouse receiving Adult Financial\
    \ grant payments, SSI benefits, or Medicaid assistance whose income is no greater\
    \ than the OAP limit is not deemed. If the spouse is institutionalized and the\
    \ client retained the MMMNA, the MMMNA is deducted from that spouse\u2019s total\
    \ income."
  deferred_outputs:
  - output: us-co:regulations/9-ccr-2503-5/3.534#spouse_deemed_unearned_income
    reason: Calculation requires the SSI benefit standard defined in uncopied section
      3.510.
  - output: us-co:regulations/9-ccr-2503-5/3.534#sponsor_deemed_unearned_income
    reason: Calculation requires SSI benefit standards defined in uncopied section
      3.510 and sponsor-dependent criteria defined in uncopied section 3.520.68.B.2.b.1.
rules:
- name: spouse_earned_income_disregard
  kind: parameter
  dtype: Money
  unit: USD
  source: "9 CCR 2503-5 \xA7 3.534(A)(1)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.534
          excerpt: "Deduct $65 from the client\u2019s spouse's gross earned income"
  versions:
  - effective_from: '2016-10-01'
    formula: '65'
- name: spouse_income_not_deemed
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: "9 CCR 2503-5 \xA7 3.534(C)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.534
          excerpt: "If a client\u2019s spouse is receiving Adult Financial grant payments,\
            \ SSI benefits, or Medicaid assistance and has income no greater than\
            \ the OAP limit, his or her income shall not be considered as available\
            \ to the client and shall not be deemed."
  versions:
  - effective_from: '2016-10-01'
    formula: "spouse_income_no_greater_than_oap_limit\nand (\n  spouse_receives_adult_financial_grant_payments\n\
      \  or spouse_receives_ssi_benefits\n  or spouse_receives_medicaid_assistance\n\
      )"
- name: spouse_deemed_earned_income
  kind: derived
  entity: Person
  dtype: Money
  period: Month
  unit: USD
  source: "9 CCR 2503-5 \xA7 3.534(A)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.534
          excerpt: "Deduct $65 from the client\u2019s spouse's gross earned income;\
            \ and, Divide the remainder by two (2)."
  versions:
  - effective_from: '2016-10-01'
    formula: 'if spouse_income_not_deemed: 0 else: (spouse_gross_countable_earned_income_including_court_garnished_wages
      - spouse_earned_income_disregard) / 2'
- name: institutionalized_spouse_mmmna_deduction
  kind: derived
  entity: Person
  dtype: Money
  period: Month
  unit: USD
  source: "9 CCR 2503-5 \xA7 3.534(C)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.534
          excerpt: "If a client\u2019s spouse is institutionalized and the client\
            \ has retained the minimum monthly maintenance needs allowance (MMMNA),\
            \ the MMMNA shall be deducted from the institutionalized spouse\u2019\
            s total income."
  versions:
  - effective_from: '2016-10-01'
    formula: 'if spouse_is_institutionalized and client_has_retained_mmmna: client_retained_mmmna_amount
      else: 0'
