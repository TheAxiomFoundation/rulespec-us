format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.540.1
  summary: |-
    “Blind or blindness” means central visual acuity of 20/200 or less in the better eye with a correcting lens; a visual field no greater than 20 degrees is considered such acuity. “Reasonable commute” means no further than one hour one way. Definitions also address employment existing in the community, improvement, residual functional capacity, substantial gainful activity, and total disability.
rules:
  - name: blindness_visual_acuity_numerator
    kind: parameter
    dtype: Decimal
    source: 9 CCR 2503-5 § 3.540.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.540.1
              excerpt: central visual acuity of 20/200
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          20

  - name: blindness_visual_acuity_denominator
    kind: parameter
    dtype: Decimal
    source: 9 CCR 2503-5 § 3.540.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.540.1
              excerpt: central visual acuity of 20/200
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          200

  - name: blindness_maximum_visual_field_diameter_degrees
    kind: parameter
    dtype: Decimal
    source: 9 CCR 2503-5 § 3.540.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.540.1
              excerpt: angle no greater than 20 degrees
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          20

  - name: reasonable_commute_one_way_hours
    kind: parameter
    dtype: Decimal
    source: 9 CCR 2503-5 § 3.540.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.540.1
              excerpt: no further than one hour one way
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          1

  - name: client_is_blind
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5 § 3.540.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.540.1
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          (client_better_eye_corrected_visual_acuity_numerator / client_better_eye_corrected_visual_acuity_denominator)
          <= (blindness_visual_acuity_numerator / blindness_visual_acuity_denominator)
          or client_widest_visual_field_diameter_degrees <= blindness_maximum_visual_field_diameter_degrees

  - name: employment_exists_in_community
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5 § 3.540.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.540.1
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          jobs_for_which_client_has_competence_exist
          and client_one_way_commute_hours_to_competent_jobs <= reasonable_commute_one_way_hours

  - name: medical_condition_has_improved
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5 § 3.540.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.540.1
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          client_is_able_to_engage_in_sga
          and (
            physical_or_mental_impairment_has_decreased_since_most_recent_medical_certification
            or residual_functional_capacity_has_increased_since_most_recent_medical_certification
          )

  - name: residual_functional_capacity
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5 § 3.540.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.540.1
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          client_has_maximum_remaining_ability_to_perform_work_regularly_and_continuously
          and client_has_disabling_limitations

  - name: work_activity_is_significant
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5 § 3.540.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.540.1
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          work_involves_physical_or_mental_activities
          and work_activities_are_useful_in_accomplishing_job_or_operating_business
          and work_activities_have_economic_value

  - name: work_activity_is_gainful
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5 § 3.540.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.540.1
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          work_is_of_type_usually_done_for_pay_or_profit

  - name: substantial_gainful_activity
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5 § 3.540.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.540.1
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          work_activity_is_significant
          and work_activity_is_gainful
          and not activity_is_generally_excluded_from_sga

  - name: client_has_total_disability
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5 § 3.540.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.540.1
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          client_has_disabling_physical_or_mental_impairment
          and age_training_experience_and_social_setting_substantially_preclude_useful_occupation
