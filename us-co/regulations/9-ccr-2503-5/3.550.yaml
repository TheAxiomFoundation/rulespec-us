format: rulespec/v1
imports:
- us-co:regulations/9-ccr-2503-5/3.520.72#person_resource_limit_under_3_520_72
- us-co:regulations/9-ccr-2503-5/3.520.72#client_countable_resources_including_deemed_from_sponsors_under_3_520_72
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.550
  summary: "For OAP, cases are redetermined every twenty-four months when there is\
    \ no earned income and countable resources are at least $200 under the client\u2019\
    s resource limit; all other OAP cases are redetermined every twelve months."
rules:
- name: oap_resource_margin_below_limit_for_long_redetermination
  kind: parameter
  dtype: Money
  unit: USD
  source: 9 CCR 2503-5 3.550 A.1.a.2
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.550
          excerpt: "at least two hundred ($200) under the client\u2019s resource limit"
  versions:
  - effective_from: '2016-10-01'
    formula: '200'
- name: oap_long_redetermination_interval_months
  kind: parameter
  dtype: Count
  source: 9 CCR 2503-5 3.550 A.1.a
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.550
          excerpt: OAP cases shall be redetermined every twenty-four (24) months
  versions:
  - effective_from: '2016-10-01'
    formula: '24'
- name: oap_standard_redetermination_interval_months
  kind: parameter
  dtype: Count
  source: 9 CCR 2503-5 3.550 A.1.b
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.550
          excerpt: All other OAP cases shall be redetermined every twelve (12) months.
  versions:
  - effective_from: '2016-10-01'
    formula: '12'
- name: oap_redetermination_interval_months
  kind: derived
  entity: Person
  dtype: Count
  period: Month
  source: 9 CCR 2503-5 3.550 A.1
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.550
          excerpt: "There is no earned income; and, The value of the client\u2019\
            s countable resources are at least two hundred ($200) under the client\u2019\
            s resource limit"
      - path: versions[0].formula
        kind: import
        import:
          target: us-co:regulations/9-ccr-2503-5/3.520.72#person_resource_limit_under_3_520_72
          output: person_resource_limit_under_3_520_72
          hash: sha256:f4251fd78c26aac368d154abdd18c9f4c07a12b042c622393cc80e81e11c67a0
      - path: versions[0].formula
        kind: import
        import:
          target: us-co:regulations/9-ccr-2503-5/3.520.72#client_countable_resources_including_deemed_from_sponsors_under_3_520_72
          output: client_countable_resources_including_deemed_from_sponsors_under_3_520_72
          hash: sha256:f4251fd78c26aac368d154abdd18c9f4c07a12b042c622393cc80e81e11c67a0
  versions:
  - effective_from: '2016-10-01'
    formula: 'if not client_has_earned_income and client_countable_resources_including_deemed_from_sponsors_under_3_520_72
      <= person_resource_limit_under_3_520_72 - oap_resource_margin_below_limit_for_long_redetermination:
      oap_long_redetermination_interval_months else: oap_standard_redetermination_interval_months'
