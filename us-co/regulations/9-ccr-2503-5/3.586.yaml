format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.586
  summary: |-
    "The dispute resolution process is available for disputes concerning county department actions related to eligibility, reduction of grant payment amounts, redetermination procedures, and other county actions that do not involve allegations of fraudulent acts or IPV on the part of the client." "Failure of the client to request a county conference within ninety (90) calendar days ... without making a request for postponement ... shall constitute abandonment of the right to a conference." "Failure of the client to appear ... without making a request for postponement ... shall constitute abandonment ... unless the client can show good cause."
rules:
  - name: county_conference_available
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5 § 3.586 (opening paragraph)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.586
              excerpt: "available for disputes concerning county department actions ... that do not involve allegations of fraudulent acts or IPV"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          dispute_concerns_covered_county_action
          and not dispute_involves_alleged_fraudulent_act
          and not dispute_involves_alleged_ipv

  - name: county_conference_right_abandoned_for_lack_of_timely_request
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5 § 3.586(A)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.586
              excerpt: "Failure ... to request a county conference within ninety (90) calendar days ... without making a request for postponement ... shall constitute abandonment"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          not client_requested_county_conference_within_required_period
          and not client_requested_postponement_within_required_period

  - name: county_conference_right_abandoned_for_failure_to_appear
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5 § 3.586(A)(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.586
              excerpt: "Failure ... to appear ... without making a request for postponement ... shall constitute abandonment ... unless the client can show good cause"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          client_failed_to_appear_at_scheduled_county_conference
          and not client_requested_postponement_before_scheduled_conference
          and not client_has_good_cause_for_failure_to_appear
