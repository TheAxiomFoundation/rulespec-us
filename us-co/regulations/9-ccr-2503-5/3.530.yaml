format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.530
  summary: |-
    The Old Age Pension (OAP) program provides financial assistance and may provide health care benefits for low-income Colorado residents who are sixty years of age or older and meet all financial and non-financial eligibility requirements. Effective January 1, 2026, the total monthly OAP grant standard is $1,032, the maximum monthly in-kind support and maintenance (ISM) shelter-cost deduction is $351, and the OAP payment floor standard is $189.
rules:
  - name: oap_total_monthly_grant_standard
    kind: parameter
    dtype: Money
    unit: USD
    source: 9 CCR 2503-5 3.530 A
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.530
              excerpt: "The total monthly OAP grant standard, as set by the State Board of Human Services, is $1,032 effective January 1, 2026."
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.530
              excerpt: "The total monthly OAP grant standard ... is $1,032 effective January 1, 2026."
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          1032

  - name: oap_maximum_monthly_ism_shelter_deduction_amount
    kind: parameter
    dtype: Money
    unit: USD
    source: 9 CCR 2503-5 3.530 B
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.530
              excerpt: "Effective January 1, 2026, the maximum monthly In-Kind Support and Maintenance (ISM) deduction amount for shelter costs is $351."
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.530
              excerpt: "the maximum monthly In-Kind Support and Maintenance (ISM) deduction amount for shelter costs is $351."
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          351

  - name: oap_payment_floor_standard
    kind: parameter
    dtype: Money
    unit: USD
    source: 9 CCR 2503-5 3.530 C
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.530
              excerpt: "Effective January 1, 2026, the payment floor standard for OAP is $189."
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.530
              excerpt: "the payment floor standard for OAP is $189."
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          189

  - name: oap_minimum_age_years
    kind: parameter
    dtype: Integer
    source: 9 CCR 2503-5 3.530
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.530
              excerpt: "Colorado residents who are sixty (60) years of age or older"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          60

  - name: oap_age_requirement_met
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5 3.530
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.530
              excerpt: "Colorado residents who are sixty (60) years of age or older who meet all financial and non-financial eligibility requirements."
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          age_in_years >= oap_minimum_age_years
