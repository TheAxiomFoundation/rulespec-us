format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.69
  summary: |-
    This section applies to qualified non-citizens who entered the country on or after August 22, 1996. An affidavit of support presumes sponsor capacity at 125% of Federal Poverty Guidelines. Sponsor deeming does not apply to admitted refugees or political asylees; interim and later sponsorship-agreement rules determine which sponsors are deemed. Failure to provide required sponsor information requires denial or discontinuance.
  deferred_outputs:
    - output: us-co:regulations/9-ccr-2503-5/3.520.69#sponsor_deemed_income_and_resources_amount
      reason: The source directs deeming under Sections 3.534, 3.520.69.B, and 3.520.72, but the required income-deeming methodology and sponsor-to-client resource amounts are not available in copied RuleSpec context.
rules:
  - name: minimum_sponsor_support_share_of_federal_poverty_guidelines
    kind: parameter
    dtype: Rate
    source: 9 CCR 2503-5, § 3.520.69(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.69
              excerpt: "one hundred twenty-five percent (125%) of the Federal Poverty Guidelines"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          1.25

  - name: qualifying_quarters_required_to_end_sponsor_support
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5, § 3.520.69(B)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.69
              excerpt: "forty (40) qualifying quarters of coverage"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          40

  - name: sponsor_financial_capacity_is_presumed
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5, § 3.520.69(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.69
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.69
              excerpt: "an affidavit of support demonstrates the sponsor's ability"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          qualified_non_citizen_is_within_sponsor_deeming_scope
          and client_is_sponsored_qualified_non_citizen
          and sponsor_has_signed_affidavit_of_support
          and sponsor_available_income_and_resources_as_share_of_federal_poverty_guidelines >= minimum_sponsor_support_share_of_federal_poverty_guidelines

  - name: qualifying_quarters_end_sponsor_support_obligation
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5, § 3.520.69(B)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.69
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.69
              excerpt: "has worked, or can be credited with forty (40) qualifying quarters"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          qualified_non_citizen_is_within_sponsor_deeming_scope
          and client_is_sponsored_qualified_non_citizen
          and sponsor_has_signed_affidavit_of_support
          and qualified_non_citizen_qualifying_quarters_of_coverage >= qualifying_quarters_required_to_end_sponsor_support

  - name: sponsor_deeming_applies_to_client
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5, § 3.520.69(C)(1)-(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.69
              excerpt: "Sponsor deeming shall not apply to qualified non-citizens admitted as refugees or as political asylees."
          - path: versions[0].formula
            kind: effective_period
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.69
              excerpt: "Effective January 1, 2014, sponsor deeming shall apply to all"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          qualified_non_citizen_is_within_sponsor_deeming_scope
          and client_is_sponsored_qualified_non_citizen
          and not client_is_admitted_as_refugee_or_political_asylee
          and sponsorship_agreement_was_signed_on_or_after_deeming_start_date
          and (
            sponsorship_agreement_is_in_later_deeming_period
            or (
              sponsorship_agreement_is_in_interim_deeming_period
              and (
                sponsor_is_client_spouse
                or sponsor_is_client_nonrelative
              )
            )
          )

  - name: pending_refugee_or_asylee_status_precludes_grant_payments
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5, § 3.520.69(C)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.69
              excerpt: "such non-citizen is not eligible to receive grant payments"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          qualified_non_citizen_is_within_sponsor_deeming_scope
          and noncitizen_refugee_or_asylee_status_is_not_determined_or_finalized

  - name: missing_sponsor_information_requires_assistance_denial_or_discontinuance
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5, § 3.520.69(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.69
              excerpt: "If the qualified non-citizen fails to provide information related to the sponsor(s) ... assistance shall be denied or discontinued"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          qualified_non_citizen_is_within_sponsor_deeming_scope
          and client_fails_to_provide_required_sponsor_information
