format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.65
  summary: |-
    “When a client is eligible for a SSN, refusal or failure to apply for or provide their SSN shall result in denial for Adult Financial programs.”
rules:
  - name: adult_financial_denial_due_to_ssn_refusal_or_failure_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5, § 3.520.65(A)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.65
              excerpt: "When a client is eligible for a SSN, refusal or failure to apply for or provide their SSN shall result in denial for Adult Financial programs."
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          client_is_eligible_for_ssn
          and (
            client_refuses_or_fails_to_apply_for_ssn
            or client_refuses_or_fails_to_provide_ssn
          )
