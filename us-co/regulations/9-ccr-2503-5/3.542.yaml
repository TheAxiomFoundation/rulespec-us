format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.542
  summary: |-
    "Eligibility shall begin with the date of application or the date the client meets all eligibility requirements, whichever is later."
rules:
  - name: client_eligibility_begins
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: 9 CCR 2503-5, § 3.542(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: ordering
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.542
              excerpt: "the date of application or the date the client meets all eligibility requirements, whichever is later"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          (day_is_application_date
          and application_date_is_on_or_after_date_client_meets_eligibility_requirements)
          or (day_is_date_client_meets_eligibility_requirements
          and date_client_meets_eligibility_requirements_is_after_application_date)
