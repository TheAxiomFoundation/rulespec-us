format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.64
  summary: |-
    "To be eligible for Adult Financial programs, a client shall be a resident of Colorado." Residency is established upon declaration, subject to permanent residence elsewhere, relocation, temporary-absence presumptions, county residence, and other-state assistance restrictions.
  deferred_outputs:
    - output: us-co:regulations/9-ccr-2503-5/3.520.64#adult_financial_grant_payment_denial_for_refusal_to_verify_residency
      reason: The denial must follow policies in Section 3.554, which is not available in copied RuleSpec context.
rules:
  - name: country_absence_presumption_days
    kind: parameter
    dtype: Integer
    source: 9 CCR 2503-5 § 3.520.64(E)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.64
              excerpt: "thirty (30) or more consecutive days"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          30
  - name: out_of_state_absence_presumption_days
    kind: parameter
    dtype: Integer
    source: 9 CCR 2503-5 § 3.520.64(E)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.64
              excerpt: "ninety (90) or more consecutive days"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          90
  - name: calendar_year_out_of_state_absence_presumption_days
    kind: parameter
    dtype: Integer
    source: 9 CCR 2503-5 § 3.520.64(E)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.64
              excerpt: "more than one hundred eighty (180) days in any calendar year"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          180
  - name: military_family_care_absence_presumption_days
    kind: parameter
    dtype: Integer
    source: 9 CCR 2503-5 § 3.520.64(E)(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.64
              excerpt: "one hundred eighty (180) or more consecutive days"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          180
  - name: client_is_considered_colorado_resident
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5 § 3.520.64(A)-(B), (D)-(E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.64
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.64
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.64
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          client_declares_colorado_residency
          and not client_has_permanent_residence_in_another_state_or_country
          and not client_has_moved_out_of_colorado_or_is_resident_of_another_state
          and (
            not client_is_temporarily_out_of_colorado
            or (
              (
                client_consecutive_days_outside_country < country_absence_presumption_days
                or client_rebuts_country_absence_residency_presumption
              )
              and (
                client_consecutive_days_outside_colorado < out_of_state_absence_presumption_days
                or client_is_temporarily_out_of_colorado_for_documented_medical_treatment
                or client_rebuts_out_of_state_absence_residency_presumption
              )
              and (
                client_total_days_outside_colorado_in_calendar_year <= calendar_year_out_of_state_absence_presumption_days
                or client_rebuts_calendar_year_absence_residency_presumption
              )
              and (
                client_consecutive_days_caring_for_immediate_family_member_injured_in_military_duty < military_family_care_absence_presumption_days
                or client_rebuts_military_family_care_absence_residency_presumption
              )
            )
          )
  - name: client_satisfies_application_county_residence_requirement
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5 § 3.520.64(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.64
              excerpt: "The client shall live in the county in which the application is made."
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.64
              excerpt: "resides in a county but who is homeless or does not have a fixed mailing address"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          client_lives_in_application_county
          or (
            client_resides_in_application_county
            and (
              client_is_homeless
              or client_has_no_fixed_mailing_address
            )
          )
  - name: adult_financial_residency_and_county_requirement_met
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5 § 3.520.64(A)-(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.64
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.64
              excerpt: "shall not be eligible ... during any month in which a payment is made by the other state"
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/9-ccr-2503-5/3.520.64#client_is_considered_colorado_resident
              output: client_is_considered_colorado_resident
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/9-ccr-2503-5/3.520.64#client_satisfies_application_county_residence_requirement
              output: client_satisfies_application_county_residence_requirement
              hash: sha256:local
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          client_is_considered_colorado_resident
          and client_satisfies_application_county_residence_requirement
          and not client_receives_financial_assistance_payment_from_another_state
