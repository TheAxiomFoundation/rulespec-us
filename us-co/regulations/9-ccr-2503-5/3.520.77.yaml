    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.77
              excerpt: six (6) months for restoration or replacement of exempt real property
    versions:
      - effective_from: '2016-10-01'
        formula: |-
