    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.77
              excerpt: maximum of six thousand dollars ($6,000) of the equity value
