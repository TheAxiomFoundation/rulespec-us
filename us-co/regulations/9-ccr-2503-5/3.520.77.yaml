format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.77
  summary: |-
    “A maximum of six thousand dollars ($6,000) of the equity value” of qualifying non-business property used to produce goods necessary for daily activities is exempt. Revocable burial trusts and revocable prepaid burial contracts are exempt up to $1,500. Retroactive SSI or Social Security benefits are exempt for nine months following receipt, and income tax refunds are exempt in the month received with any remaining balance counted after twelve months.
rules:
  - name: self_employment_property_nonuse_exemption_months
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5, 3.520.77(D)(1)(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.77
              excerpt: exemption for such property shall continue for twelve (12) months
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          12
  - name: self_employment_property_disabling_nonuse_exemption_months
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5, 3.520.77(D)(1)(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.77
              excerpt: exemption is for twenty-four (24) months where non-use is due to a disabling condition
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          24
