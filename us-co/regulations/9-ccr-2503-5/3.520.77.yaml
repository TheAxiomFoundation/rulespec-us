          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.77
              excerpt: exemption is allowed for up to six (6) months
    versions:
      - effective_from: '2016-10-01'
