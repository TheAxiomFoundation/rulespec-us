  - name: irrevocable_burial_trust_self_beneficiary_countable_value_cap
    kind: parameter
    dtype: Money
    unit: USD
    source: 9 CCR 2503-5, 3.520.77(G)(2)(d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.77
              excerpt: value exceeding $1500 is a countable resource
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          1500
  - name: revocable_burial_trust_exemption_cap
    kind: parameter
    dtype: Money
    unit: USD
    source: 9 CCR 2503-5, 3.520.77(G)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.77
              excerpt: value of the trust does not exceed one thousand five hundred dollars ($1,500)
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          1500
  - name: prepaid_burial_contract_exemption_cap
    kind: parameter
    dtype: Money
    unit: USD
    source: 9 CCR 2503-5, 3.520.77(H)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.77
              excerpt: revocable and does not exceed one thousand five hundred dollars ($1,500)
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          1500
  - name: retroactive_ssi_or_social_security_resource_exemption_months
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5, 3.520.77(J)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.77
              excerpt: exempt as a resource for nine months following the month they are received
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          9
  - name: income_tax_refund_resource_exemption_months
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5, 3.520.77(K)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.77
              excerpt: remaining balance shall be counted as a resource after twelve (12) months
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          12
  - name: nonbusiness_daily_activity_property_exempt_equity
    kind: derived
    entity: Asset
    dtype: Money
    period: Month
    unit: USD
    source: 9 CCR 2503-5, 3.520.77(D)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.77
              excerpt: non-business property used to produce goods necessary for the client's daily activities
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.77
              excerpt: exemption period shall be twenty-four (24) months where nonuse is due to a disabling condition
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          if nonbusiness_property_used_to_produce_daily_activity_goods and
             (property_currently_in_use or
              (reasonable_expectation_property_use_will_resume and
               months_since_nonbusiness_daily_activity_property_use <=
               (if nonuse_due_to_disabling_condition:
                nonbusiness_daily_activity_property_disabling_nonuse_exemption_months
                else: nonbusiness_daily_activity_property_nonuse_exemption_months))):
            min(nonbusiness_daily_activity_property_equity_value, nonbusiness_daily_activity_property_exemption_cap)
          else: 0
  - name: revocable_burial_trust_exempt_amount
    kind: derived
    entity: Asset
    dtype: Money
    period: Month
    unit: USD
    source: 9 CCR 2503-5, 3.520.77(G)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.77
              excerpt: revocable burial trust is exempt if the value of the trust does not exceed one thousand five hundred dollars ($1,500). Any interest on the exempt $1,500 is also exempt.
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          if burial_trust_is_revocable:
            min(revocable_burial_trust_principal_value, revocable_burial_trust_exemption_cap) +
            accrued_interest_on_exempt_revocable_burial_trust_principal
          else: 0
  - name: revocable_burial_trust_countable_principal_amount
    kind: derived
    entity: Asset
    dtype: Money
    period: Month
    unit: USD
    source: 9 CCR 2503-5, 3.520.77(G)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.77
              excerpt: Any amount over $1,500 is a countable resource.
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          if burial_trust_is_revocable:
            max(0, revocable_burial_trust_principal_value - revocable_burial_trust_exemption_cap)
          else: 0
  - name: revocable_prepaid_burial_contract_exempt_amount
    kind: derived
    entity: Asset
    dtype: Money
    period: Month
    unit: USD
    source: 9 CCR 2503-5, 3.520.77(H)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.77
              excerpt: Only the paid-up amount of the contract, not the face value, is taken into consideration; any interest on the exempt $1500 is also exempt.
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          if prepaid_burial_contract_is_revocable:
            min(prepaid_burial_contract_paid_up_amount, prepaid_burial_contract_exemption_cap) +
            accrued_interest_on_exempt_prepaid_burial_contract_amount
          else: 0
  - name: revocable_prepaid_burial_contract_countable_amount
    kind: derived
    entity: Asset
    dtype: Money
    period: Month
    unit: USD
    source: 9 CCR 2503-5, 3.520.77(H)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.77
              excerpt: Any amount in excess of $1,500 shall be a countable resource.
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          if prepaid_burial_contract_is_revocable:
            max(0, prepaid_burial_contract_paid_up_amount - prepaid_burial_contract_exemption_cap)
          else: 0
  - name: retained_retroactive_ssi_or_social_security_countable_amount
    kind: derived
    entity: Asset
    dtype: Money
    period: Month
    unit: USD
    source: 9 CCR 2503-5, 3.520.77(J)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.77
              excerpt: retroactive SSI or Social Security retirement or disability benefits still remaining after the month of receipt shall be exempt as a resource for nine months following the month they are received
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          if retroactive_ssi_or_social_security_benefits_received and
             months_since_retroactive_benefit_receipt > retroactive_ssi_or_social_security_resource_exemption_months:
            remaining_retroactive_benefit_amount
          else: 0
  - name: retained_income_tax_refund_countable_amount
    kind: derived
    entity: Asset
    dtype: Money
    period: Month
    unit: USD
    source: 9 CCR 2503-5, 3.520.77(K)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.77
              excerpt: income tax refund, including the Property Tax/Rent/Heat Credit (PTC) rebate, shall be exempt in the month received. Any remaining balance shall be counted as a resource after twelve (12) months.
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          if income_tax_refund_received and
             months_since_income_tax_refund_receipt > income_tax_refund_resource_exemption_months:
            remaining_income_tax_refund_amount
          else: 0
