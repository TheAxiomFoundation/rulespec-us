  - name: meals_scoring_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5 § 3.570.15(B)(3)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.570.15
              excerpt: A child age 5 to 18 years shall not be scored for meals.
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          age_in_years < instrumental_adl_scoring_exemption_minimum_age_years
          or age_in_years > instrumental_adl_scoring_exemption_maximum_age_years
