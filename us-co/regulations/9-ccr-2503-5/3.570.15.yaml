format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.570.15
  summary: |-
    “Activities of daily living (ADL) shall be scored using the functional capacity impairment scale and the need for paid care scale.” Instrumental and supportive ADL are defined, with specified age ranges during which meals, housekeeping, laundry, shopping, medicine, appointment, money, access, and telephone shall not be scored.
rules:
  - name: instrumental_adl_scoring_exemption_minimum_age_years
    kind: parameter
    dtype: Integer
    source: 9 CCR 2503-5 § 3.570.15(B)(3)(a)-(d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.570.15
              excerpt: A child age 5 to 18 years shall not be scored for meals, housekeeping, laundry, or shopping.
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          5
  - name: instrumental_adl_scoring_exemption_maximum_age_years
