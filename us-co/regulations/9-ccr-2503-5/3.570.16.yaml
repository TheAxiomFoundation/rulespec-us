format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.570.16
  summary: |-
    “One-time deep cleaning” may be purchased when Adult Protective Services initiates a referral and the CMA determines it necessary. Providers must be at least eighteen years old and able to provide appropriate services. Care plans must be reviewed at least every twelve months and sooner upon changed client needs; functional reassessments are due within twelve months and sooner when the client’s condition changes.
rules:
  - name: care_plan_review_interval_months
    kind: parameter
    dtype: Integer
    source: 9 CCR 2503-5 § 3.570.16(B)(1)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.570.16
              excerpt: Reviewed and updated at least once every twelve months.
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          12
  - name: functional_reassessment_interval_months
    kind: parameter
    dtype: Integer
    source: 9 CCR 2503-5 § 3.570.16(E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.570.16
              excerpt: within twelve (12) months of the initial functional assessment and every twelve months thereafter.
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          12
  - name: one_time_deep_cleaning_is_allowable
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5 § 3.570.16(A)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.570.16
              excerpt: One-time deep cleaning if a referral is initiated by Adult Protective Services and determined necessary by the CMA.
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          adult_protective_services_referral_initiated
          and cma_determined_deep_cleaning_necessary
  - name: service_provider_meets_minimum_requirements
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5 § 3.570.16(B)(2)(c)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.570.16
              excerpt: Providers shall be at least eighteen (18) years of age or older and have the ability to provide appropriate services.
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          provider_is_at_least_eighteen_years_old
          and provider_can_provide_appropriate_services
  - name: care_plan_review_requirement_met
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5 § 3.570.16(B)(1)(b)-(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.570.16
              excerpt: Reviewed and updated at least once every twelve months; and, Reviewed sooner if there is a change in the client's needs.
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          months_since_last_care_plan_review <= care_plan_review_interval_months
          and (
            not client_needs_changed
            or care_plan_reviewed_after_client_need_change
          )
  - name: functional_reassessment_requirement_met
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5 § 3.570.16(E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.570.16
              excerpt: A reassessment shall be completed sooner if the client's condition changes.
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          months_since_last_functional_assessment_or_reassessment <= functional_reassessment_interval_months
          and (
            not client_condition_changed
            or functional_reassessment_completed_after_condition_change
          )
