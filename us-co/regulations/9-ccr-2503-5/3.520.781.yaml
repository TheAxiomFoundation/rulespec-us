format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.781
  summary: "\u201CIf a client's total countable income equals or exceeds the Adult\
    \ Financial program grant standard, the client shall not be eligible for that\
    \ specific Adult Financial program.\u201D \u201CThe total countable income of\
    \ the client shall be deducted from the AND or OAP grant standard to determine\
    \ the grant payment amount.\u201D Rental property is self-employment income when\
    \ actively managed an average of at least twenty hours per week and is averaged\
    \ over twelve months."
rules:
- name: rental_property_active_management_hours_weekly_threshold
  kind: parameter
  dtype: Count
  period: Week
  source: "9 CCR 2503-5, \xA7 3.520.781(G)(2)(e)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.781
          excerpt: at least an average of twenty (20) hours per week
  versions:
  - effective_from: '2016-10-01'
    formula: '20'
- name: regular_nonfarm_self_employment_income_averaging_months
  kind: parameter
  dtype: Count
  period: Month
  source: "9 CCR 2503-5, \xA7 3.520.781(G)(2)(c)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.781
          excerpt: counted as received in a three (3) month period
  versions:
  - effective_from: '2016-10-01'
    formula: '3'
- name: fluctuating_income_averaging_months
  kind: parameter
  dtype: Count
  period: Month
  source: "9 CCR 2503-5, \xA7 3.520.781(G)(2)(d)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.781
          excerpt: a period of twelve (12) months
  versions:
  - effective_from: '2016-10-01'
    formula: '12'
- name: rental_income_averaging_months
  kind: parameter
  dtype: Count
  period: Month
  source: "9 CCR 2503-5, \xA7 3.520.781(G)(2)(e)(2)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.781
          excerpt: averaged over a twelve month period
  versions:
  - effective_from: '2016-10-01'
    formula: '12'
- name: client_income_is_below_adult_financial_program_grant_standard
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: "9 CCR 2503-5, \xA7 3.520.781(A)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.781
  versions:
  - effective_from: '2016-10-01'
    formula: client_total_countable_income < adult_financial_program_grant_standard
- name: adult_financial_grant_payment_after_countable_income
  kind: derived
  entity: Person
  dtype: Money
  unit: USD
  period: Month
  source: "9 CCR 2503-5, \xA7 3.520.781(F)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.781
  versions:
  - effective_from: '2016-10-01'
    formula: max(0, adult_financial_program_grant_standard - client_total_countable_income)
- name: income_is_counted_in_current_month
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: "9 CCR 2503-5, \xA7 3.520.781(G)(1)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.781
  versions:
  - effective_from: '2016-10-01'
    formula: "income_is_actually_received_in_current_month\nor income_legally_becomes_available_in_current_month\n\
      or (\n  income_can_be_anticipated_with_reasonable_certainty\n  and income_is_expected_in_current_month\n\
      )"
- name: regular_nonfarm_self_employment_monthly_income
  kind: derived
  entity: Person
  dtype: Money
  unit: USD
  period: Month
  source: "9 CCR 2503-5, \xA7 3.520.781(G)(2)(c)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.781
  versions:
  - effective_from: '2016-10-01'
    formula: 'if income_is_regularly_received_self_employment_income and income_is_not_farm_income:
      net_self_employment_income_for_averaging_period / regular_nonfarm_self_employment_income_averaging_months
      else: 0'
- name: rental_income_is_self_employment_income
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: "9 CCR 2503-5, \xA7 3.520.781(G)(2)(e)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.781
  versions:
  - effective_from: '2016-10-01'
    formula: rental_property_management_hours_per_week >= rental_property_active_management_hours_weekly_threshold
- name: rental_income_is_unearned_income
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: "9 CCR 2503-5, \xA7 3.520.781(G)(2)(e)(1)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.781
  versions:
  - effective_from: '2016-10-01'
    formula: rental_property_management_hours_per_week < rental_property_active_management_hours_weekly_threshold
- name: monthly_rental_income
  kind: derived
  entity: Person
  dtype: Money
  unit: USD
  period: Month
  source: "9 CCR 2503-5, \xA7 3.520.781(G)(2)(e)(2)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.781
  versions:
  - effective_from: '2016-10-01'
    formula: rental_income_for_twelve_month_period / rental_income_averaging_months
- name: client_rental_income_share_from_jointly_owned_property
  kind: derived
  entity: Person
  dtype: Money
  unit: USD
  period: Month
  source: "9 CCR 2503-5, \xA7 3.520.781(G)(2)(e)(3)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.781
  versions:
  - effective_from: '2016-10-01'
    formula: "max(\n  jointly_owned_property_income * client_percentage_ownership_of_rental_property,\n\
      \  actual_rental_income_received_from_jointly_owned_property\n)"
