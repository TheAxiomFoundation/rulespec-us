format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.783
  summary: |-
    “An individual involved in a profit making activity shall be classified as self-employed.” Net profit is gross income less cost of doing business. Farm income is averaged from prior-year net income; actively managed rental income is averaged over twelve months; board, room, and room-and-board payments are reduced by directly related documented expenses. Licensed child care providers receive allowances of $55 for the first child and $22 for each additional child. Irregular self-employment income is averaged over twelve months.
rules:
  - name: individual_in_profit_making_activity_is_self_employed
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5 §3.520.783(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.783
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          individual_is_involved_in_profit_making_activity

  - name: self_employment_earned_income
    kind: derived
    entity: Person
    dtype: Money
    unit: USD
    period: Month
    source: 9 CCR 2503-5 §3.520.783(B), (D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.783
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          gross_self_employment_income - allowable_cost_of_doing_business

  - name: self_employment_income_averaging_months
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5 §3.520.783(C)(2)(a), (F)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.783
              excerpt: "twelve (12) month period"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          12

  - name: farm_monthly_earned_income
    kind: derived
    entity: Person
    dtype: Money
    unit: USD
    period: Month
    source: 9 CCR 2503-5 §3.520.783(C)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.783
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          if individual_continues_to_farm: prior_year_farm_net_income / self_employment_income_averaging_months else: 0

  - name: active_rental_management_weekly_hours
    kind: parameter
    dtype: Decimal
    period: Week
    source: 9 CCR 2503-5 §3.520.783(C)(2)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.783
              excerpt: "at least twenty (20) hours a week"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          20

  - name: actively_managed_rental_monthly_earned_income
    kind: derived
    entity: Person
    dtype: Money
    unit: USD
    period: Month
    source: 9 CCR 2503-5 §3.520.783(C)(2)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.783
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          if weekly_hours_actively_managing_self_owned_rental_property >= active_rental_management_weekly_hours: rental_income_over_twelve_months / self_employment_income_averaging_months else: 0

  - name: board_payment_countable_earned_income
    kind: derived
    entity: Person
    dtype: Money
    unit: USD
    period: Month
    source: 9 CCR 2503-5 §3.520.783(C)(2)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.783
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          board_payments_received_in_month - documented_board_provision_expenses

  - name: room_payment_countable_earned_income
    kind: derived
    entity: Person
    dtype: Money
    unit: USD
    period: Month
    source: 9 CCR 2503-5 §3.520.783(C)(2)(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.783
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          room_payments_received_in_month - documented_room_provision_expenses

  - name: room_and_board_payment_countable_earned_income
    kind: derived
    entity: Person
    dtype: Money
    unit: USD
    period: Month
    source: 9 CCR 2503-5 §3.520.783(C)(2)(d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.783
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          room_and_board_payments_received_in_month - documented_room_and_board_provision_expenses

  - name: licensed_child_care_first_child_allowance
    kind: parameter
    dtype: Money
    unit: USD
    period: Month
    source: 9 CCR 2503-5 §3.520.783(C)(3)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.783
              excerpt: "For the first child for whom day care is provided, deduct $55"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          55

  - name: licensed_child_care_additional_child_allowance
    kind: parameter
    dtype: Money
    unit: USD
    period: Month
    source: 9 CCR 2503-5 §3.520.783(C)(3)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.783
              excerpt: "For each additional child deduct $22"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          22

  - name: licensed_child_care_provider_earned_income
    kind: derived
    entity: Person
    dtype: Money
    unit: USD
    period: Month
    source: 9 CCR 2503-5 §3.520.783(C)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.783
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          if individual_is_licensed_child_care_provider:
            child_care_gross_income - (if documented_child_care_cost_of_doing_business > (licensed_child_care_first_child_allowance + max(0, number_of_children_receiving_day_care - 1) * licensed_child_care_additional_child_allowance): documented_child_care_cost_of_doing_business else: licensed_child_care_first_child_allowance + max(0, number_of_children_receiving_day_care - 1) * licensed_child_care_additional_child_allowance)
          else: 0

  - name: monthly_self_employment_income
    kind: derived
    entity: Person
    dtype: Money
    unit: USD
    period: Month
    source: 9 CCR 2503-5 §3.520.783(F)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.783
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          if self_employment_income_receipt_is_irregular: self_employment_income_over_selected_twelve_months / self_employment_income_averaging_months else: self_employment_income_received_in_month
