format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.547
  summary: |-
    To meet the disability eligibility requirement for AND-CS, the client must be approved for SSI due to a disability or blindness. The county department shall verify SSI eligibility through SVES or SDX and document it, enter client, resource, and income information into the statewide automated system, and the client has the right to decide how to spend the AND-CS grant payment. If a client is terminated from SSI, the client shall lose eligibility for the AND-CS program.
rules:
  - name: and_cs_ssi_status_eligibility_met
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5 3.547 A, D
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.547
              excerpt: the client must be approved for SSI due to a disability or blindness
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.547
              excerpt: If a client is terminated from SSI, the client shall lose eligibility for the AND-CS program.
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          client_approved_for_ssi_due_to_disability_or_blindness
          and not client_terminated_from_ssi
