format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.570.14
  summary: |-
    “The need for skilled personal care shall not be included in the scoring of the need for paid care.” A client must score at least twenty one points for Home Care Allowance eligibility. Functional capacity is scored 0 through 3 for each ADL; paid-care need is scored 0 through 3, with services provided through another program, agency, or individual scored 0. Children under age 5 are not scored and are not eligible.
rules:
  - name: minimum_functional_assessment_score
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5, § 3.570.14(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.570.14
              excerpt: "score a minimum of twenty one (21) points"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          21

  - name: minimum_home_care_allowance_age_years
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5, § 3.570.14(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.570.14
              excerpt: "Children under the age of 5 shall not be scored"
    versions:
