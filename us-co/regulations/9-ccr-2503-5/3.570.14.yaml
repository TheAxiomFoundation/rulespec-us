  - name: child_assessment_uses_age_appropriate_criteria
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5, § 3.570.14(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.570.14
              excerpt: "children age five (5) through eighteen (18) years"
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/9-ccr-2503-5/3.570.14#minimum_home_care_allowance_age_years
              output: minimum_home_care_allowance_age_years
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/9-ccr-2503-5/3.570.14#age_appropriate_assessment_maximum_age_years
              output: age_appropriate_assessment_maximum_age_years
              hash: sha256:local
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          client_age_in_years >= minimum_home_care_allowance_age_years
          and client_age_in_years <= age_appropriate_assessment_maximum_age_years
