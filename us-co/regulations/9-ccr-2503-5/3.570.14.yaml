  - name: functional_capacity_score_for_assessed_adl
    kind: derived
    entity: Person
    dtype: Count
    period: Month
    source: 9 CCR 2503-5, § 3.570.14(B)(1)-(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.570.14
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/9-ccr-2503-5/3.570.14#independent_functional_capacity_score
              output: independent_functional_capacity_score
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/9-ccr-2503-5/3.570.14#low_functional_capacity_score
              output: low_functional_capacity_score
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/9-ccr-2503-5/3.570.14#moderate_functional_capacity_score
              output: moderate_functional_capacity_score
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/9-ccr-2503-5/3.570.14#severe_functional_capacity_score
              output: severe_functional_capacity_score
              hash: sha256:local
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          if client_is_totally_unable_to_perform_assessed_adl or client_requires_constant_supervision_for_assessed_adl:
            severe_functional_capacity_score
          else:
            if client_is_unable_to_perform_majority_of_assessed_adl_components and client_requires_hands_on_frequent_assistance_for_assessed_adl:
              moderate_functional_capacity_score
            else:
              if client_can_perform_all_essential_assessed_adl_components and client_has_impairment_despite_assistive_device and client_requires_limited_occasional_or_intermittent_assistance_for_assessed_adl:
                low_functional_capacity_score
              else:
                independent_functional_capacity_score

  - name: need_for_paid_care_score_for_assessed_adl
    kind: derived
    entity: Person
    dtype: Count
    period: Month
    source: 9 CCR 2503-5, § 3.570.14(C)-(E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.570.14
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/9-ccr-2503-5/3.570.14#no_paid_care_need_score
              output: no_paid_care_need_score
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/9-ccr-2503-5/3.570.14#weekly_paid_care_need_score
              output: weekly_paid_care_need_score
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/9-ccr-2503-5/3.570.14#daily_paid_care_need_score
              output: daily_paid_care_need_score
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/9-ccr-2503-5/3.570.14#twice_daily_paid_care_need_score
              output: twice_daily_paid_care_need_score
              hash: sha256:local
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          if paid_care_services_are_provided_by_another_program_agency_or_individual:
            no_paid_care_need_score
          else:
            if client_needs_paid_care_two_or_more_times_daily_at_least_five_days_weekly:
              twice_daily_paid_care_need_score
            else:
              if client_needs_paid_care_more_than_once_weekly_up_to_once_daily:
                daily_paid_care_need_score
              else:
                if client_needs_paid_care_up_to_once_weekly:
                  weekly_paid_care_need_score
                else:
                  no_paid_care_need_score

  - name: client_meets_minimum_functional_assessment_score
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5, § 3.570.14(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.570.14
              excerpt: "score a minimum of twenty one (21) points"
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/9-ccr-2503-5/3.570.14#minimum_functional_assessment_score
              output: minimum_functional_assessment_score
              hash: sha256:local
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          client_total_functional_assessment_score >= minimum_functional_assessment_score

