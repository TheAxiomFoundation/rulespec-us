format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.570.51
  summary: |-
    "The payment shall not exceed two thousand dollars ($2,000) per client, per disaster." The payment period begins upon a county, Governor, or Federal disaster declaration and ends when none remains; a client may petition after rescission when disaster effects appear afterward.
  deferred_outputs:
    - output: us-co:regulations/9-ccr-2503-5/3.570.51#disaster_assistance_payment_amount_for_client_per_disaster
      reason: The source caps an actual payment per client and per disaster, but this slice provides no payment-to-disaster relation or actual payment amount from which to compute that amount faithfully.
      source_values:
        - us-co:regulations/9-ccr-2503-5/3.570.51#maximum_disaster_assistance_payment_per_client_per_disaster
rules:
  - name: maximum_disaster_assistance_payment_per_client_per_disaster
    kind: parameter
    dtype: Money
    unit: USD
    source: 9 CCR 2503-5, § 3.570.51(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.570.51
              excerpt: "shall not exceed two thousand dollars ($2,000) per client, per disaster"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          2000
  - name: eligible_client_is_within_disaster_assistance_payment_period
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5, § 3.570.51(A)-(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.570.51
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          client_is_eligible_for_disaster_assistance
          and (county_has_declared_disaster
          or governor_has_declared_disaster
          or federal_government_has_declared_disaster)
  - name: client_may_petition_after_rescinded_disaster_declaration
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5, § 3.570.51(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.570.51
              excerpt: "effects of the disaster appear after the disaster declaration has been rescinded"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          disaster_effects_appear_after_declaration_rescinded
