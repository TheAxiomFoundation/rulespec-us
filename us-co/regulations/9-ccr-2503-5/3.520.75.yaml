format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.75
  summary: |-
    "If the total face value ... is equal to $1,500 or less, the full CSV ... is exempt." For OAP, policies above $1,500 receive the stated 48-month and $250,000 CSV exemptions; the original face value controls the exemption test. CSV may be estimated from the chart when unavailable.
rules:
  - name: life_insurance_face_value_exemption_threshold
    kind: parameter
    dtype: Money
    unit: USD
    source: 9 CCR 2503-5 § 3.520.75(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.75
              excerpt: "equal to $1,500 or less"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          1500

  - name: oap_life_insurance_csv_exemption_cap
    kind: parameter
    dtype: Money
    unit: USD
    source: 9 CCR 2503-5 § 3.520.75(E)-(F)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.75
              excerpt: "CSV of all policies combined is $250,000 or less"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          250000

  - name: policy_purchase_and_contribution_lookback_months
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5 § 3.520.75(E)-(F)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.75
              excerpt: "forty-eight (48) months"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          48

