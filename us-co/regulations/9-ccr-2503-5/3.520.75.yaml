  - name: life_insurance_estimated_csv_rate
    kind: parameter
    dtype: Rate
    indexed_by: life_insurance_csv_estimate_band
    source: 9 CCR 2503-5 § 3.520.75(H)
    metadata:
      proof:
        atoms:
          - path: versions[0].values
            kind: parameter_table
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.75
              table:
                header: "LIFE INSURANCE ESTIMATED CSV IS THIS PERCENTAGE OF FACE VALUE"
                row_key: "years life insurance policy has been in effect"
                column_key: "estimated CSV percentage of face value"
    versions:
      - effective_from: '2016-10-01'
        values:
          0: 0.60
          1: 0.50
          2: 0.45
          3: 0.30
          4: 0.20
          5: 0.10
          6: 0.05
          7: 0

  - name: life_insurance_csv_estimate_band
    kind: derived
    entity: Person
    dtype: Integer
    period: Month
    source: 9 CCR 2503-5 § 3.520.75(H)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: table_cell
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.75
              table:
                header: "LIFE INSURANCE ESTIMATED CSV IS THIS PERCENTAGE OF FACE VALUE"
                row: "20 OR MORE; 15-19; 11-14; 6-10; 4-5; 3; 2; 1"
                column: "YEARS LIFE INSURANCE POLICY HAS BEEN IN EFFECT"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          if life_insurance_policy_years_in_effect >= csv_estimate_twenty_year_duration: 0 else: if life_insurance_policy_years_in_effect >= csv_estimate_fifteen_year_duration and life_insurance_policy_years_in_effect <= csv_estimate_nineteen_year_duration: 1 else: if life_insurance_policy_years_in_effect >= csv_estimate_eleven_year_duration and life_insurance_policy_years_in_effect <= csv_estimate_fourteen_year_duration: 2 else: if life_insurance_policy_years_in_effect >= csv_estimate_six_year_duration and life_insurance_policy_years_in_effect <= csv_estimate_ten_year_duration: 3 else: if life_insurance_policy_years_in_effect >= csv_estimate_four_year_duration and life_insurance_policy_years_in_effect <= csv_estimate_five_year_duration: 4 else: if life_insurance_policy_years_in_effect == csv_estimate_three_year_duration: 5 else: if life_insurance_policy_years_in_effect == csv_estimate_two_year_duration: 6 else: if life_insurance_policy_years_in_effect == csv_estimate_one_year_duration: 7 else: -1

  - name: estimated_life_insurance_cash_surrender_value
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: USD
    source: 9 CCR 2503-5 § 3.520.75(H)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.75
              excerpt: "Use the following chart to estimate a life insurance policy's CSV"
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/9-ccr-2503-5/3.520.75#life_insurance_csv_estimate_band
              output: life_insurance_csv_estimate_band
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/9-ccr-2503-5/3.520.75#life_insurance_estimated_csv_rate
              output: life_insurance_estimated_csv_rate
              hash: sha256:local
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          if life_insurance_csv_estimate_band == -1: 0 else: life_insurance_policy_original_face_value * life_insurance_estimated_csv_rate[life_insurance_csv_estimate_band]

  - name: oap_life_insurance_countable_cash_surrender_value
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: USD
    source: 9 CCR 2503-5 § 3.520.75(D)-(G)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.75
              excerpt: "the total CSV is a countable resource"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.75
              excerpt: "the original cash value amount prior to the 48 month period remains exempt"
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/9-ccr-2503-5/3.520.75#life_insurance_face_value_exemption_threshold
              output: life_insurance_face_value_exemption_threshold
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/9-ccr-2503-5/3.520.75#oap_life_insurance_csv_exemption_cap
              output: oap_life_insurance_csv_exemption_cap
              hash: sha256:local
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          if total_life_insurance_original_face_value <= life_insurance_face_value_exemption_threshold: 0 else: if any_life_insurance_policy_was_purchased_within_lookback_period: total_life_insurance_current_cash_surrender_value else: if total_life_insurance_current_cash_surrender_value <= oap_life_insurance_csv_exemption_cap: if additional_life_insurance_contributions_were_made_within_lookback_period: additional_life_insurance_contributions_within_lookback_period else: 0 else: if additional_life_insurance_contributions_were_made_within_lookback_period: additional_life_insurance_contributions_within_lookback_period + max(0, total_life_insurance_current_cash_surrender_value - oap_life_insurance_csv_exemption_cap) else: max(0, total_life_insurance_current_cash_surrender_value - oap_life_insurance_csv_exemption_cap)
