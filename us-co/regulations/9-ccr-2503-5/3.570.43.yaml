format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.570.43
  summary: A burial benefit is available for a deceased client receiving specified
    assistance when the estate and legally responsible persons' resources are insufficient
    and burial costs do not exceed $2,500, excluding a qualifying prepaid or donated
    burial plot. Effective March 1, 2020, the burial benefit shall not exceed $1,500.
    Available insurance, estate resources, and legally responsible persons' excess
    resources reduce the burial grant payment.
rules:
- name: burial_services_maximum_cost
  kind: parameter
  dtype: Money
  unit: USD
  source: "9 CCR 2503-5, \xA7 3.570.43.A.4"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.570.43
          excerpt: does not total more than two thousand five hundred dollars ($2,500)
  versions:
  - effective_from: '2016-10-01'
    formula: '2500'
- name: prepaid_burial_plot_value_limit
  kind: parameter
  dtype: Money
  unit: USD
  source: "9 CCR 2503-5, \xA7 3.570.43.A.4.a"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.570.43
          excerpt: a prepaid burial plot valued at two thousand dollars ($2,000) or
            less
  versions:
  - effective_from: '2016-10-01'
    formula: '2000'
- name: burial_grant_payment_limit
  kind: parameter
  dtype: Money
  unit: USD
  source: "9 CCR 2503-5, \xA7 3.570.43.B.1"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.570.43
          excerpt: Effective March 1, 2020, the burial benefit shall not exceed one
            thousand five hundred dollars ($1,500).
  versions:
  - effective_from: '2020-03-01'
    formula: '1500'
- name: legally_responsible_individual_resource_limit
  kind: parameter
  dtype: Money
  unit: USD
  source: "9 CCR 2503-5, \xA7 3.570.43.D.3.b"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.570.43
          excerpt: SSI resource limit of $2,000 for an individual
  versions:
  - effective_from: '2016-10-01'
    formula: '2000'
- name: legally_responsible_couple_resource_limit
  kind: parameter
  dtype: Money
  unit: USD
  source: "9 CCR 2503-5, \xA7 3.570.43.D.3.b"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.570.43
          excerpt: $3,000 for a couple
  versions:
  - effective_from: '2016-10-01'
    formula: '3000'
- name: burial_cost_counted_toward_maximum
  kind: derived
  entity: Person
  dtype: Money
  period: Month
  unit: USD
  source: "9 CCR 2503-5, \xA7 3.570.43.A.4.a-b"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.570.43
          excerpt: the cost of a burial plot shall not be included in the $2,500 maximum
            cost limit
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.570.43
  versions:
  - effective_from: '2016-10-01'
    formula: 'if (client_has_prepaid_burial_plot and prepaid_burial_plot_value_at_purchase
      <= prepaid_burial_plot_value_limit) or burial_plot_was_donated_to_client: max(0,
      total_burial_services_cost - burial_plot_cost) else: total_burial_services_cost'
- name: legally_responsible_resource_amount_applied
  kind: derived
  entity: Person
  dtype: Money
  period: Month
  unit: USD
  source: "9 CCR 2503-5, \xA7 3.570.43.D.3.a-c"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.570.43
          excerpt: the amount of resources over the limit shall be used to reduce
            the burial grant payment
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.570.43
  versions:
  - effective_from: '2016-10-01'
    formula: 'if legally_responsible_person_is_couple: max(0, legally_responsible_person_resources
      - legally_responsible_couple_resource_limit) else: max(0, legally_responsible_person_resources
      - legally_responsible_individual_resource_limit)'
- name: burial_benefit_eligibility_requirements_met
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: "9 CCR 2503-5, \xA7 3.570.43.A.1-4"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.570.43
          excerpt: A deceased client was receiving Old Age Pension (OAP), Aid to the
            Needy Disabled (AND-SO OR AND-CS), Home Care Allowance, and/or Colorado
            Medicaid assistance at the time of death
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.570.43
          excerpt: estate is insufficient ... resources of the legally responsible
            person(s) ... are insufficient
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.570.43
  versions:
  - effective_from: '2016-10-01'
    formula: 'deceased_client_received_qualifying_assistance_at_death

      and burial_cost_counted_toward_maximum <= burial_services_maximum_cost

      and deceased_client_estate_available_for_burial < burial_cost_counted_toward_maximum

      and (deceased_client_estate_available_for_burial + legally_responsible_resource_amount_applied)
      < burial_cost_counted_toward_maximum'
- name: approved_burial_grant_payment
  kind: derived
  entity: Person
  dtype: Money
  period: Month
  unit: USD
  source: "9 CCR 2503-5, \xA7 3.570.43.B, D.1-4"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: ordering
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.570.43
          excerpt: First, subtract monies due from any insurance policy ... Subtract
            the value of the deceased client's estate ... Subtract monies from the
            legally responsible person(s)
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.570.43
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.570.43
  versions:
  - effective_from: '2020-03-01'
    formula: 'if burial_benefit_eligibility_requirements_met: min( burial_grant_payment_limit,
      max( 0, burial_cost_counted_toward_maximum - insurance_proceeds_available_for_burial
      - deceased_client_estate_available_for_burial - legally_responsible_resource_amount_applied
      - voluntary_contributions_to_burial_services ) ) else: 0'
