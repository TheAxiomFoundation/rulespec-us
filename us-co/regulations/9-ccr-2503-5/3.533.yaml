format: rulespec/v1
imports:
- us-co:regulations/9-ccr-2503-5/3.530#oap_total_monthly_grant_standard
- us-co:regulations/9-ccr-2503-5/3.530#oap_payment_floor_standard
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.533
  summary: For Old Age Pension (OAP), income disregards are applied before determining
    total countable income. Countable earned income is found by deducting $65 from
    gross earned income and dividing the remainder by two, with any unused portion
    of the $20 unearned-income disregard applied to the earned-income calculation
    when gross unearned income is less than $20. Countable unearned income is determined
    by excluding SSI from gross unearned income, applying a $20 monthly disregard
    (split equally between spouses if married and not available to clients who only
    receive SSI), then adding SSI back. The OAP grant payment equals the OAP grant
    standard minus the sum of countable earned and unearned income, and if this payment
    is below the OAP payment floor a state supplementary payment raises it to that
    floor.
rules:
- name: oap_earned_income_base_disregard_amount
  kind: parameter
  dtype: Money
  unit: USD
  source: 9 CCR 2503-5 3.533 A.1.a
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.533
          excerpt: Deduct $65 from the gross earned income.
  versions:
  - effective_from: '2016-10-01'
    formula: '65'
- name: oap_unearned_income_general_disregard_amount
  kind: parameter
  dtype: Money
  unit: USD
  source: 9 CCR 2503-5 3.533 A.2.c
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.533
          excerpt: Deduct $20.00 from the remainder.
  versions:
  - effective_from: '2016-10-01'
    formula: '20'
- name: oap_unearned_income_remaining_disregard_amount_available_for_earned_under_3_533
  kind: derived
  entity: Person
  dtype: Money
  period: Month
  unit: USD
  source: 9 CCR 2503-5 3.533 A.2.c-f
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.533
          excerpt: If the client's gross unearned income is less than $20.00, the
            difference between the gross unearned income and the $20.00 deduction
            shall be applied to the earned income calculation, if applicable.
  versions:
  - effective_from: '2016-10-01'
    formula: "if gross_unearned_income <= 0:\n  0\nelse:\n  if gross_unearned_income\
      \ == ssi_income_amount and gross_unearned_income > 0:\n    0\n  else:\n    if\
      \ gross_unearned_income < oap_unearned_income_general_disregard_amount:\n  \
      \    oap_unearned_income_general_disregard_amount - gross_unearned_income\n\
      \    else:\n      0"
- name: oap_countable_earned_income_under_3_533
  kind: derived
  entity: Person
  dtype: Money
  period: Month
  unit: USD
  source: 9 CCR 2503-5 3.533 A.1, A.2.f
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.533
          excerpt: 'To determine countable earned income: Deduct $65 from the gross
            earned income; and, Divide the remainder by two (2). ... the difference
            ... shall be applied to the earned income calculation, if applicable.'
  versions:
  - effective_from: '2016-10-01'
    formula: 'if gross_earned_income <= 0: 0 else: max( 0, (gross_earned_income -
      (oap_earned_income_base_disregard_amount + oap_unearned_income_remaining_disregard_amount_available_for_earned_under_3_533))
      / 2 )'
- name: oap_countable_unearned_income_under_3_533
  kind: derived
  entity: Person
  dtype: Money
  period: Month
  unit: USD
  source: 9 CCR 2503-5 3.533 A.2
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.533
          excerpt: 'To determine countable unearned income: Determine the client''s
            gross unearned income from all sources. Subtract any amount received from
            SSI. Deduct $20.00 from the remainder... A client who receives SSI only,
            and does not receive any other unearned income, does not receive an unearned
            income disregard. Add the full SSI income back to the remainder. The remainder
            is countable unearned income.'
  versions:
  - effective_from: '2016-10-01'
    formula: "if gross_unearned_income <= 0:\n  0\nelse:\n  if gross_unearned_income\
      \ == ssi_income_amount and gross_unearned_income > 0:\n    max(0, (max(0, gross_unearned_income\
      \ - ssi_income_amount))) + ssi_income_amount\n  else:\n    max(0, (max(0, gross_unearned_income\
      \ - ssi_income_amount)) - (min((oap_unearned_income_general_disregard_amount\
      \ / (if client_is_married: 2 else: 1)), (max(0, gross_unearned_income - ssi_income_amount)))))\
      \ + ssi_income_amount"
- name: oap_total_countable_income_under_3_533
  kind: derived
  entity: Person
  dtype: Money
  period: Month
  unit: USD
  source: 9 CCR 2503-5 3.533 (intro), A, B
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.533
          excerpt: "Disregards shall be applied before determining a client\u2019\
            s total countable income. ... Subtract the countable earned and countable\
            \ unearned income from the OAP grant standard to determine the grant payment\
            \ amount."
  versions:
  - effective_from: '2016-10-01'
    formula: oap_countable_earned_income_under_3_533 + oap_countable_unearned_income_under_3_533
- name: oap_authorized_grant_payment_under_3_533
  kind: derived
  entity: Person
  dtype: Money
  period: Month
  unit: USD
  source: 9 CCR 2503-5 3.533 B
  metadata:
    proof:
      atoms:
      - kind: import
        path: versions[0].formula
        import:
          target: us-co:regulations/9-ccr-2503-5/3.530#oap_total_monthly_grant_standard
          output: oap_total_monthly_grant_standard
          hash: sha256:8b3031855cedaee3683e939c2794f44b088ebc47ee9e306130689130824bd48e
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.533
          excerpt: Subtract the countable earned and countable unearned income from
            the OAP grant standard to determine the grant payment amount.
  versions:
  - effective_from: '2016-10-01'
    formula: max(0, oap_total_monthly_grant_standard - oap_total_countable_income_under_3_533)
- name: oap_state_supplementary_payment_under_3_533
  kind: derived
  entity: Person
  dtype: Money
  period: Month
  unit: USD
  source: 9 CCR 2503-5 3.533 B
  metadata:
    proof:
      atoms:
      - kind: import
        path: versions[0].formula
        import:
          target: us-co:regulations/9-ccr-2503-5/3.530#oap_payment_floor_standard
          output: oap_payment_floor_standard
          hash: sha256:8b3031855cedaee3683e939c2794f44b088ebc47ee9e306130689130824bd48e
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.533
          excerpt: If the grant payment amount is less than the OAP payment floor
            standard ... a state supplementary payment will be issued to raise the
            grant payment to meet the payment floor standard.
  versions:
  - effective_from: '2016-10-01'
    formula: 'if oap_total_countable_income_under_3_533 < oap_total_monthly_grant_standard
      and oap_authorized_grant_payment_under_3_533 < oap_payment_floor_standard: oap_payment_floor_standard
      - oap_authorized_grant_payment_under_3_533 else: 0'
