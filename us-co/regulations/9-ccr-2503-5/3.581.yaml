- name: partial_month_grant_payment_after_cent_dropping
  kind: derived
  entity: Person
  dtype: Money
  unit: USD
  period: Month
  source: "9 CCR 2503-5 \xA7 3.581(D)(1)-(4), (E)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.581
          excerpt: "Multiply the client\u2019s monthly grant payment amount ... by\
            \ the decimal figure in the table."
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.581
          excerpt: except in cases where SSI income reduces the grant.
  versions:
  - effective_from: '2016-10-01'
    formula: 'if ssi_income_reduces_grant: monthly_grant_payment_amount * partial_month_payment_fraction[eligible_assistance_days_in_month]
      else: floor(monthly_grant_payment_amount * partial_month_payment_fraction[eligible_assistance_days_in_month])'
