format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.581
  summary: "\"Multiply the client\u2019s monthly grant payment amount ... by the decimal\
    \ figure in the table ... to determine the grant payment amount for the partial\
    \ month.\" \"All payments, including partial payments, shall have any cents dropped\
    \ to the nearest dollar, except in cases where SSI income reduces the grant.\""
