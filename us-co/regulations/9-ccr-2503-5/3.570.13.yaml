        formula: |-
          38

  - name: hca_tier_3_maximum_paid_care_score
    kind: parameter
    dtype: Integer
    source: 9 CCR 2503-5 § 3.570.13(C)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.570.13
              excerpt: "38 to 51"
