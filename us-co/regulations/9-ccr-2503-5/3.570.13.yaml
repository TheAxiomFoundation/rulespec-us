  - name: client_financially_eligible_for_hca
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5 § 3.570.13(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.570.13
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          client_approved_for_ssi_benefits
          or client_meets_all_and_so_eligibility_criteria
          or client_has_continuous_legacy_oap_and_hca_eligibility

  - name: client_functionally_eligible_for_hca
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5 § 3.570.13(C), (E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.570.13
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.570.13
              excerpt: "21 or Higher ... 1 to 23 ... 24 to 37 ... 38 to 51"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          client_functional_capacity_score >= hca_minimum_functional_capacity_score
          and client_need_for_paid_care_score >= hca_tier_1_minimum_paid_care_score
          and client_need_for_paid_care_score <= hca_tier_3_maximum_paid_care_score

  - name: client_hca_grant_payment_tier
    kind: derived
    entity: Person
    dtype: Enum[HcaGrantPaymentTier]
    period: Month
    source: 9 CCR 2503-5 § 3.570.13(C)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.570.13
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.570.13
              excerpt: "Tier ... 1 to 23 ... 24 to 37 ... 38 to 51"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          if client_functionally_eligible_for_hca:
            if client_need_for_paid_care_score <= hca_tier_1_maximum_paid_care_score: 1
            else: if client_need_for_paid_care_score <= hca_tier_2_maximum_paid_care_score: 2 else: 3
          else: 0

  - name: client_eligible_for_hca_payment
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5 § 3.570.13(A), (E)(2)-(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.570.13
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          client_financially_eligible_for_hca
          and client_functionally_eligible_for_hca
