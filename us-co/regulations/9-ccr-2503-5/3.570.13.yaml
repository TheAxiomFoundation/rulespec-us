format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.570.13
  summary: |-
    “The client shall meet eligibility for both financial and functional requirements to be approved for an HCA payment.” Financial eligibility includes SSI, AND-SO eligibility, or continuous legacy OAP and HCA eligibility. Functional eligibility requires a capacity score of 21 or higher and paid-care scores of 1 to 51, with tiers 1 through 3.
  deferred_outputs:
    - output: us-co:regulations/9-ccr-2503-5/3.570.13#hca_grant_payment_start_date
      reason: The source specifies a later-of-date payment start rule and prohibits retroactive payments, but the supported schema has no date-valued output or date comparison inputs.
rules:
  - name: hca_minimum_functional_capacity_score
    kind: parameter
    dtype: Integer
    source: 9 CCR 2503-5 § 3.570.13(C)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.570.13
              excerpt: "21 or Higher"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          21

  - name: hca_tier_1_minimum_paid_care_score
    kind: parameter
