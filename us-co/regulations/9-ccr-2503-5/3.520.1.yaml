format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.1
  summary: |-
    “A decision by the client to ‘withdraw’ shall be treated as a denial by the county department.” The client must receive a State approved Notice of Action form within eleven calendar days. A partially or totally illiterate client may satisfy the signature requirement by making a witnessed mark. A county conference must be requested no later than ninety calendar days from the mailing date of the notice of action.
rules:
  - name: withdrawal_notice_deadline_calendar_days
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5, § 3.520.1(B)(8)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.1
              excerpt: "within ELEVEN (11) calendar days of the action"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          11

  - name: illiterate_client_signature_witness_minimum_count
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5, § 3.520.1(C)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.1
              excerpt: "witnessed by at least one other individual"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          1

  - name: county_conference_request_deadline_calendar_days
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5, § 3.520.1(I)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.1
              excerpt: "no later than ninety (90) calendar days"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          90

  - name: illiterate_client_mark_signature_requirement_met
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: 9 CCR 2503-5, § 3.520.1(C)(1)-(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.1
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.1
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          client_makes_mark_on_signature_line
          and number_of_witnesses_to_client_mark >= illiterate_client_signature_witness_minimum_count
          and (not witness_is_county_department_staff or not county_staff_witness_is_related_to_client)

  - name: withdrawal_notice_requirement_met
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: 9 CCR 2503-5, § 3.520.1(B)(8)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.1
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.1
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          not client_withdraws_application
          or (
            withdrawal_is_treated_as_denial
            and withdrawal_notice_uses_state_approved_notice_of_action_form
            and calendar_days_between_withdrawal_action_and_notice <= withdrawal_notice_deadline_calendar_days
          )

  - name: county_conference_request_is_timely
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: 9 CCR 2503-5, § 3.520.1(I)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.1
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          calendar_days_since_notice_of_action_was_mailed <= county_conference_request_deadline_calendar_days
