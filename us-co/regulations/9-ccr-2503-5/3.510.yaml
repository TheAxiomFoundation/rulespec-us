format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.510
  summary: |-
    “Timely notice” means the county shall generate notice to the client at least eleven (11) calendar days before initiation of a decrease, suspension, termination, or discontinuance. “Twenty-four (24) month redetermination” requires an interview and traditional verification methods and recurs every twenty-four (24) months after application.
rules:
  - name: timely_notice_minimum_lead_time_days
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5, § 3.510 (definition of “Timely notice”)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.510
              excerpt: "at least eleven (11) calendar days prior"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          11
  - name: timely_notice_requirement_met
    kind: derived
    entity: CountyDepartment
    dtype: Judgment
    period: Day
    source: 9 CCR 2503-5, § 3.510 (definition of “Timely notice”)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.510
              excerpt: "shall generate a notice to the client at least eleven (11) calendar days prior to the initiation"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          notice_generated_calendar_days_before_initiation >= timely_notice_minimum_lead_time_days
  - name: twenty_four_month_redetermination_interval_months
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5, § 3.510 (definition of “Twenty-four (24) month redetermination”)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.510
              excerpt: "recurs every twenty-four (24) months after application"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          24
  - name: twenty_four_month_redetermination_requirements_met
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5, § 3.510 (definition of “Twenty-four (24) month redetermination”)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.510
              excerpt: "requires an interview and traditional verification methods, and recurs every twenty-four (24) months after application"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          redetermination_includes_interview
          and redetermination_uses_traditional_verification_methods
          and months_since_application == twenty_four_month_redetermination_interval_months
