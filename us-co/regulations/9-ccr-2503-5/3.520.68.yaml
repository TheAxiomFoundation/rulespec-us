format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.68
  summary: |-
    Qualified non-citizens arriving in the U.S. on or after August 22, 1996, are barred from receiving AND for five years beginning on the date of admission for legal permanent residence, as verified through SAVE.
rules:
  - name: and_qualified_non_citizen_lpr_admission_waiting_period_years
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5 § 3.520.68(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.68
              excerpt: "barred from receiving AND for five years"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          5
  - name: qualified_non_citizen_barred_from_and_during_lpr_admission_waiting_period
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5 § 3.520.68(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.68
              excerpt: "Qualified non-citizens arriving in the U.S. on or after August 22, 1996"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.68
              excerpt: "date of admission into the United States for legal permanent residence, as verified through SAVE"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.68
              excerpt: "barred from receiving AND for five years beginning on the qualified non-citizen's date of admission"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          person_is_qualified_non_citizen
          and person_arrival_date_triggers_and_waiting_period
          and person_lpr_admission_date_verified_through_save
          and years_since_person_lpr_admission < and_qualified_non_citizen_lpr_admission_waiting_period_years
