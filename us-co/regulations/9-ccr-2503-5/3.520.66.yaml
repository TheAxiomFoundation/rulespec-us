  source_verification:
    corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.66
  summary: |-
    To verify a client's identity, the client shall produce and provide a valid Colorado driver's license or Colorado identification card, specified military or maritime identification, a Native American tribal document, or another document authorized by Colorado Department of Revenue Rule 16.
rules:
  - name: client_identity_verification_evidence_is_acceptable
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5 § 3.520.66(A)-(E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.66
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          valid_colorado_drivers_license_provided
          or valid_colorado_identification_card_provided
          or united_states_military_card_provided
          or military_dependents_identification_card_provided
          or united_states_coast_guard_merchant_mariner_card_provided
