format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.587
  summary: |-
    A direct state appeal requires a written request mailed or delivered to the Office of Administrative Courts no later than ninety (90) calendar days from the date timely notice of the proposed action was mailed. A verbal hearing request must be reduced to writing within ten (10) calendar days.
rules:
  - name: state_level_appeal_request_deadline_days
    kind: parameter
    dtype: Count
    period: Day
    source: 9 CCR 2503-5 § 3.587(A)(1)-(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.587
              excerpt: "within the ninety (90) day period"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          90

  - name: verbal_hearing_request_documentation_deadline_days
    kind: parameter
    dtype: Count
    period: Day
    source: 9 CCR 2503-5 § 3.587(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.587
              excerpt: "within ten (10) calendar days"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          10

  - name: direct_state_appeal_request_is_proper_and_timely
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: 9 CCR 2503-5 § 3.587(A)(2)-(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.587
              excerpt: "a written request for an appeal must be mailed or delivered"
          - path: versions[0].formula
            kind: effective_period
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.587
              excerpt: "no later than ninety (90) calendar days"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.587
              excerpt: "mailed or delivered to the Office of Administrative Courts"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          client_submits_written_appeal_request
          and client_mails_or_delivers_request_to_oac_within_appeal_deadline
