format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.741
  summary: |-
    "The actual value less encumbrances" of the ownership interest is determined;
    only direct and documented encumbrances against the specific property count.
    Reasonable price is "two-thirds of the actual value." Equity is exempt where
    a non-spouse, non-sponsor co-owner would suffer documented undue hardship, or
    where the property cannot be sold at a reasonable price despite continuing
    reasonable efforts to sell.
  deferred_outputs:
    - output: us-co:regulations/9-ccr-2503-5/3.520.741#primary_residence_home_value_exemption
      reason: The primary-residence exemption is expressly governed by section 3.520.77.C, whose operative exemption mechanics are not supplied.
rules:
  - name: reasonable_sale_price_numerator
    kind: parameter
    dtype: Integer
    source: 9 CCR 2503-5, § 3.520.741(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.741
              excerpt: "two-thirds of the actual value"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          2

  - name: reasonable_sale_price_denominator
    kind: parameter
    dtype: Integer
    source: 9 CCR 2503-5, § 3.520.741(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.741
              excerpt: "two-thirds of the actual value"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          3

  - name: reasonable_sale_price_fraction
    kind: parameter
    dtype: Rate
    source: 9 CCR 2503-5, § 3.520.741(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.741
              excerpt: "Reasonable price is determined to be two-thirds of the actual value."
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/9-ccr-2503-5/3.520.741#reasonable_sale_price_numerator
              output: reasonable_sale_price_numerator
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/9-ccr-2503-5/3.520.741#reasonable_sale_price_denominator
              output: reasonable_sale_price_denominator
              hash: sha256:local
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          reasonable_sale_price_numerator / reasonable_sale_price_denominator

  - name: actual_value_less_documented_encumbrances
    kind: derived
    entity: Asset
    dtype: Money
    unit: USD
    period: Month
    source: 9 CCR 2503-5, § 3.520.741(B)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.741
              excerpt: "The actual value less encumbrances of the ownership interest"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.741
              excerpt: "Only direct and documented encumbrances against a specific item or property shall be considered."
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          actual_property_value - direct_documented_encumbrances

  - name: ownership_interest_equity_value
    kind: derived
    entity: Asset
    dtype: Money
    unit: USD
    period: Month
    source: 9 CCR 2503-5, § 3.520.741(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.741
              excerpt: "The actual value less encumbrances is determined and charged in proportion to ... share of ownership."
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/9-ccr-2503-5/3.520.741#actual_value_less_documented_encumbrances
              output: actual_value_less_documented_encumbrances
              hash: sha256:local
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          actual_value_less_documented_encumbrances * ownership_interest_fraction

  - name: reasonable_sale_price
    kind: derived
    entity: Asset
    dtype: Money
    unit: USD
    period: Month
    source: 9 CCR 2503-5, § 3.520.741(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.741
              excerpt: "Reasonable price is determined to be two-thirds of the actual value."
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/9-ccr-2503-5/3.520.741#reasonable_sale_price_fraction
              output: reasonable_sale_price_fraction
              hash: sha256:local
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          actual_property_value * reasonable_sale_price_fraction

  - name: co_owner_undue_hardship_exemption_applies
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5, § 3.520.741(D)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.741
              excerpt: "the client ... equity in the property shall be exempted, unless the co-owner is the spouse or sponsor(s)"
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.741
              excerpt: "Undue hardship for this purpose is defined as"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          co_owner_uses_property_as_primary_residence
          and sale_would_require_co_owner_to_move
          and co_owner_has_no_other_available_housing_or_fair_market_rent_income
          and co_owner_documented_undue_hardship_in_writing
          and county_determines_undue_hardship_reasonable_under_prudent_person_principle
          and not co_owner_is_client_spouse_or_sponsor

  - name: equity_exempt_due_to_continuing_sale_efforts
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5, § 3.520.741(D)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.741
              excerpt: "cannot sell the property for two-thirds of the actual value, the property shall be exempted provided there continues to be reasonable efforts to sell"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          property_cannot_be_sold_for_reasonable_price
          and county_determines_reasonable_effort_to_sell

  - name: rejected_reasonable_sale_offer_requires_counting_equity
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5, § 3.520.741(D)(3)(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.741
              excerpt: "rejects an offer to purchase the property that is at least two-thirds the actual value"
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/9-ccr-2503-5/3.520.741#reasonable_sale_price
              output: reasonable_sale_price
              hash: sha256:local
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          owner_rejected_purchase_offer
          and property_purchase_offer_amount >= reasonable_sale_price
