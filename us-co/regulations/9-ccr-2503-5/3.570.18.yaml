format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.570.18
  summary: |-
    “Notify the CMA in writing ... Within five (5) working days of determining HCA eligibility.” “Complete the HCA functional assessment within thirty (30) calendar days of referral.” “Immediately report ... any congregate facility, with three (3) or more residents, that is not licensed.”
rules:
  - name: county_hca_eligibility_notification_deadline_working_days
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5 § 3.570.18(A)(3)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.570.18
              excerpt: "Within five (5) working days of determining HCA eligibility."
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          5

  - name: county_hca_financial_ineligibility_notification_deadline_working_days
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5 § 3.570.18(A)(3)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.570.18
              excerpt: "Within five (5) working days after the eligibility worker determines that the client is no longer financially eligible."
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          5

  - name: county_written_appeal_notification_deadline_working_days
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5 § 3.570.18(A)(3)(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.570.18
              excerpt: "Within one (1) working day when the client has filed a written appeal."
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          1

  - name: county_appeal_resolution_notification_deadline_working_days
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5 § 3.570.18(A)(3)(d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.570.18
              excerpt: "Within one (1) working day when the client has withdrawn the appeal or a final agency decision has been entered."
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          1

  - name: county_response_to_cma_information_request_deadline_working_days
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5 § 3.570.18(A)(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.570.18
              excerpt: "Respond to requests for information from the CMA within ten (10) working days."
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          10

  - name: cma_intake_completion_deadline_working_days
