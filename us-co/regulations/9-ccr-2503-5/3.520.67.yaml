format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.67
  summary: |-
    "The following are citizens of the United States and are eligible to apply for AND."
    "Qualified non-citizens who are considered legal immigrants by USCIS are eligible to apply for Adult Financial programs."
    "The following non-citizens and temporary residents shall not be eligible for AND."
rules:
  - name: client_is_us_citizen_for_and
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5 § 3.520.67(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.67
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          client_was_born_in_the_united_states_or_named_territory
          or client_became_a_citizen_through_naturalization
          or client_was_born_outside_the_united_states_to_us_citizens_with_appropriate_documentation

  - name: client_is_ineligible_for_and_due_to_non_citizen_or_temporary_resident_status
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5 § 3.520.67(G)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.67
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          client_is_non_citizen_without_uscis_status_verification
          or client_was_granted_a_specific_voluntary_departure_date
          or client_does_not_have_current_qualified_status
          or client_is_temporarily_in_the_united_states_on_an_employment_education_or_visit_visa

  - name: client_eligible_to_apply_for_and
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5 § 3.520.67(A), (E), (G)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.67
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          client_is_us_citizen_for_and
          or (
            client_is_qualified_non_citizen_considered_legal_immigrant_by_uscis
            and not client_is_ineligible_for_and_due_to_non_citizen_or_temporary_resident_status
          )

  - name: citizenship_verification_required_for_and
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5 § 3.520.67(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.67
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          citizenship_claim_is_inconsistent_with_client_statements_or_current_or_previous_application_information
          or citizenship_claim_is_inconsistent_with_information_received_from_another_source

  - name: citizenship_verification_evidence_is_acceptable_for_and
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5 § 3.520.67(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.67
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          birth_certificate_viewed
          or united_states_passport_viewed
          or uscis_certificate_of_us_citizenship_viewed
          or uscis_certificate_of_naturalization_viewed
          or department_of_state_certificate_of_birth_abroad_viewed
          or uscis_identification_card_for_us_citizen_viewed

  - name: client_meets_non_citizen_documentation_verification_requirement_for_and
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5 § 3.520.67(F)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.67
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          client_is_qualified_non_citizen_considered_legal_immigrant_by_uscis
          and client_presented_uscis_documentation_showing_non_citizen_status
          and client_uscis_documentation_was_verified_through_save
