format: rulespec/v1
imports:
  - us-co:regulations/9-ccr-2503-5/3.530#oap_payment_floor_standard
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.531
  summary: |-
    State Supplementary Payments are included with regular grants when an OAP client's Adult Financial grant is less than the payment floor standard, bringing the monthly benefit amount equal to that standard.
rules:
  - name: oap_client_grant_is_below_payment_floor
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5, § 3.531(D)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.531
              excerpt: "when an OAP ... client's Adult Financial grant is less than the payment floor standard"
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/9-ccr-2503-5/3.530#oap_payment_floor_standard
              output: oap_payment_floor_standard
              hash: sha256:8b3031855cedaee3683e939c2794f44b088ebc47ee9e306130689130824bd48e
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          client_is_enrolled_in_oap
          and client_adult_financial_grant_amount < oap_payment_floor_standard
  - name: oap_monthly_payment_floor_supplement
    kind: derived
    entity: Person
    dtype: Money
    unit: USD
    period: Month
    source: 9 CCR 2503-5, § 3.531(D)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.531
              excerpt: "The supplemental payment is in addition to the grant payment and brings the client's monthly benefit amount equal to the payment floor standard."
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/9-ccr-2503-5/3.530#oap_payment_floor_standard
              output: oap_payment_floor_standard
              hash: sha256:8b3031855cedaee3683e939c2794f44b088ebc47ee9e306130689130824bd48e
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          if oap_client_grant_is_below_payment_floor:
            max(0, oap_payment_floor_standard - client_adult_financial_grant_amount)
          else: 0
