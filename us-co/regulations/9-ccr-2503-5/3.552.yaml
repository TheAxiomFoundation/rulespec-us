format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.552
  summary: |-
    Clients shall report and verify changes by the 10th of the following month. When a change occurs and the county determines failure to cooperate with necessary verification, eligibility shall be terminated following written timely notice; the client must have been notified and allowed at least eleven calendar days to obtain verification.
rules:
  - name: change_reporting_deadline_day_of_following_month
    kind: parameter
    dtype: Integer
    source: 9 CCR 2503-5, § 3.552(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.552
              excerpt: "by the 10th of the month following the month in which the change occurred"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          10

  - name: county_interface_change_action_deadline_calendar_days
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5, § 3.552(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.552
              excerpt: "within ten (10) calendar days of the date of the change"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          10

  - name: minimum_calendar_days_to_obtain_requested_verification
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5, § 3.552(F)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.552
              excerpt: "at least eleven (11) calendar days was allowed to obtain the verification"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          11

  - name: client_eligibility_termination_required_after_verification_noncooperation
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5, § 3.552(F)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.552
              excerpt: "When a change in client circumstances occurs"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.552
              excerpt: "has failed to cooperate in providing verification necessary to determine eligibility"
          - path: versions[0].formula
            kind: ordering
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.552
              excerpt: "eligibility shall be terminated following written timely notice"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.552
              excerpt: "client was notified of the needed verification"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.552
              excerpt: "at least eleven (11) calendar days was allowed"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          client_circumstances_changed
          and county_determined_client_failed_to_cooperate_with_necessary_verification
          and written_timely_termination_notice_provided
          and client_notified_of_needed_verification
          and calendar_days_allowed_to_obtain_verification >= minimum_calendar_days_to_obtain_requested_verification
