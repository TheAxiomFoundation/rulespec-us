format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.72
  summary: |-
    For Adult Financial programs, all countable resources of the client, spouse, and sponsor(s) are compared to a resource limit, which is $2,000 for an unmarried client or sponsor and for a married sponsor whose spouse is a co-sponsor (each co-sponsor receives a $2,000 limit, for a combined $4,000), and $3,000 for a married client or a married sponsor whose spouse is not a co-sponsor. Sponsor resources are counted only toward the non-citizen client they sponsor, and any sponsor resources in excess of the sponsor resource limit are deemed to the non-citizen client and added to the client’s own countable resources for comparison to the client’s resource limit.
rules:
  - name: resource_limit_amount_for_unmarried_person_under_3_520_72
    kind: parameter
    dtype: Money
    unit: USD
    source: 9 CCR 2503-5 3.520.72 A.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.72
              excerpt: "$2,000 for: a. An unmarried client; b. An unmarried sponsor; and, c. A married sponsor whose spouse is a co-sponsor."
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          2000

  - name: resource_limit_amount_for_married_person_under_3_520_72
    kind: parameter
    dtype: Money
    unit: USD
    source: 9 CCR 2503-5 3.520.72 A.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.72
              excerpt: "$3,000 for: a. A married client; or, b. A married sponsor whose spouse is not a co-sponsor."
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          3000

  - name: person_resource_limit_under_3_520_72
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: USD
    source: 9 CCR 2503-5 3.520.72 A
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.72
              excerpt: "The resource limit is: $2,000 for ... an unmarried client; ... an unmarried sponsor; ... a married sponsor whose spouse is a co-sponsor. ... $3,000 for: a married client; ... a married sponsor whose spouse is not a co-sponsor."
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          if person_is_sponsor:
            if person_is_married and sponsor_spouse_is_co_sponsor:
              resource_limit_amount_for_unmarried_person_under_3_520_72
            else:
              if person_is_married:
                resource_limit_amount_for_married_person_under_3_520_72
              else:
                resource_limit_amount_for_unmarried_person_under_3_520_72
          else:
            if person_is_married:
              resource_limit_amount_for_married_person_under_3_520_72
            else:
              resource_limit_amount_for_unmarried_person_under_3_520_72

  - name: client_countable_resources_including_deemed_from_sponsors_under_3_520_72
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: USD
    source: 9 CCR 2503-5 3.520.72 A, E
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.72
              excerpt: "Unless otherwise specified, a resource is countable, and together with all other countable resources of the client, spouse, and sponsor(s) shall be considered against the resource limit. ... All countable resources over the sponsor(s) resource limit ... are then deemed to the non-citizen client. The deemed amount from the client’s sponsor(s) is then added to the non-citizen client’s countable resources..."
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          client_own_countable_resources_under_3_520_72
          + deemed_resources_from_sponsors_under_3_520_72

  - name: client_resources_within_limit_under_3_520_72
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5 3.520.72 A, E
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.72
              excerpt: "Countable resources ... shall be considered against the resource limit. ... The deemed amount from the client’s sponsor(s) is then added to the non-citizen client’s countable resources and compared to the non-citizen client’s resource limit..."
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          client_countable_resources_including_deemed_from_sponsors_under_3_520_72
          <= person_resource_limit_under_3_520_72
