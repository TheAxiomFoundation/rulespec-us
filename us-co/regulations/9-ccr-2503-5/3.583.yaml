format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.583
  summary: |-
    “The disqualification shall be in effect for twelve (12) months upon the first occasion of any such offense; twenty-four (24) months upon the second occasion of any such offense and permanently upon the third such offense.”
rules:
  - name: first_ipv_offense_count
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5 § 3.583(N)(2)(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.583
              excerpt: "upon the first occasion"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          1

  - name: second_ipv_offense_count
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5 § 3.583(N)(2)(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.583
              excerpt: "upon the second occasion"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          2

  - name: third_ipv_offense_count
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5 § 3.583(N)(2)(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.583
              excerpt: "upon the third such offense"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          3

  - name: first_ipv_disqualification_months
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5 § 3.583(N)(2)(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.583
              excerpt: "twelve (12) months upon the first occasion"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          12

  - name: second_ipv_disqualification_months
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5 § 3.583(N)(2)(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.583
              excerpt: "twenty-four (24) months upon the second occasion"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          24

  - name: ipv_waiver_return_deadline_calendar_days
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5 § 3.583(J)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.583
              excerpt: "fifteen (15) calendar days"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          15

  - name: ipv_disqualification_is_permanent
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5 § 3.583(N)(2)(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.583
              excerpt: "permanently upon the third such offense"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.583
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          ipv_offense_count >= third_ipv_offense_count

  - name: temporary_ipv_disqualification_months
    kind: derived
    entity: Person
    dtype: Count
    period: Month
    source: 9 CCR 2503-5 § 3.583(N)(2)(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.583
              excerpt: "twelve (12) months upon the first occasion ... twenty-four (24) months upon the second occasion"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          if ipv_offense_count == first_ipv_offense_count: first_ipv_disqualification_months else: if ipv_offense_count == second_ipv_offense_count: second_ipv_disqualification_months else: 0
