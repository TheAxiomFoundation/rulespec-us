format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.582
  summary: |-
    “If the client against whom a collection action has been initiated is not participating in the program when a collection action for a claim is initiated or ... no response is made ... within eleven (11) calendar days ... the county department shall pursue all legal recovery methods ...”
rules:
  - name: public_assistance_repayment_agreement_response_period_days
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5, § 3.582(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.582
              excerpt: "within eleven (11) calendar days of the date the notice is mailed"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          11

  - name: public_assistance_repayment_agreement_response_missing_after_deadline
    kind: derived
    entity: OverpaymentClaim
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5, § 3.582(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.582
              excerpt: "no response is made to the public assistance repayment agreement form within eleven (11) calendar days"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.582
              excerpt: "within eleven (11) calendar days of the date the notice is mailed"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          client_has_not_responded_to_public_assistance_repayment_agreement_form
          and days_since_public_assistance_repayment_agreement_notice_mailed > public_assistance_repayment_agreement_response_period_days

  - name: county_department_must_pursue_legal_recovery_methods
    kind: derived
    entity: OverpaymentClaim
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5, § 3.582(C)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.582
              excerpt: "not participating in the program when a collection action for a claim is initiated"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.582
              excerpt: "the county department shall pursue all legal recovery methods ... in order to recover the overpayment"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.582
              excerpt: "or if a collection action has been initiated for repayment of a claim and no response is made"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          collection_action_has_been_initiated
          and (
            not client_participates_in_adult_financial_program_when_collection_action_initiated
            or public_assistance_repayment_agreement_response_missing_after_deadline
          )
