format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.560
  summary: |-
    “If the client notifies a county department of a change in address while the client's case is approved,” the case transfer shall be completed or additional verification requested “within three (3) working days.”
rules:
  - name: case_transfer_or_verification_deadline_working_days
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5 §3.560(B)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.560
              excerpt: within three (3) working days
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          3
  - name: case_transfer_or_verification_timing_requirement_satisfied
    kind: derived
    entity: CountyDepartment
    dtype: Judgment
    period: Day
    source: 9 CCR 2503-5 §3.560(B)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.560
              excerpt: If the client notifies a county department of a change in address while the client's case is approved
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.560
              excerpt: The case transfer shall be completed or additional verification shall be requested within three (3) working days.
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          not (client_notified_county_department_of_address_change and client_case_is_approved)
          or working_days_from_address_notice_to_case_transfer_or_verification <= case_transfer_or_verification_deadline_working_days
