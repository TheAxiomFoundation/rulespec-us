format: rulespec/v1
imports:
  - us-co:regulations/9-ccr-2503-5/3.540.1#client_has_total_disability
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.541.2
  summary: |-
    Following Section 3.554 policies, AND-SO assistance shall be denied or discontinued for an erroneous prior disability determination, or when medical-condition or residual-functional-capacity improvement means the client is no longer totally disabled. Documented covered work with income exceeding the AND-SO grant standard after applicable disregards requires denial or discontinuance from grant payments.
rules:
  - name: medical_condition_improvement_demonstrated_for_discontinuance
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5 § 3.541.2(A)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.541.2
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          observations_or_findings_show_positive_medical_condition_changes
          or observations_or_findings_show_medical_impairment_effect_has_decreased
          or new_medical_evidence_shows_therapy_or_technology_reduced_or_eliminated_adverse_effect
          or new_diagnostic_techniques_or_evaluations_show_condition_less_serious
          or client_prognosis_has_changed
          or client_has_adjusted_to_medical_condition_and_can_engage_in_sga
          or client_refuses_prescribed_corrective_medical_treatment_without_good_cause

  - name: residual_functional_capacity_improvement_demonstrated_for_discontinuance
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5 § 3.541.2(A)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.541.2
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          observations_or_findings_show_positive_residual_functional_capacity_changes
          or observations_or_findings_show_social_factor_effect_on_residual_functional_capacity_has_decreased
          or new_evidence_shows_vocational_abilities_or_residual_functional_capacity_permit_sga
          or vocational_opportunities_for_which_client_has_competence_are_available_in_community
          or client_has_adjusted_to_social_factors_and_can_engage_in_sga
          or residual_functional_capacity_is_not_a_barrier_to_existing_community_employment

  - name: negative_action_complies_with_discrepancy_information_requirement
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5 § 3.541.2(A)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.541.2
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          not prior_disability_determination_was_erroneous
          or county_department_gathered_more_information_on_discrepancies

  - name: and_so_assistance_denial_or_discontinuance_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5 § 3.541.2(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.541.2
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/9-ccr-2503-5/3.540.1#client_has_total_disability
              output: client_has_total_disability
              hash: sha256:cca364ce53536dde280549013d4a331d5740a4dc0370f8980e93de873e0e8728
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          prior_disability_determination_was_erroneous
          or (
            medical_condition_improvement_demonstrated_for_discontinuance
            and not client_has_total_disability
          )
          or (
            residual_functional_capacity_improvement_demonstrated_for_discontinuance
            and not client_has_total_disability
          )

  - name: client_has_excess_and_so_earnings_for_grant_payment_discontinuance
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5 § 3.541.2(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.541.2
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          county_department_has_documented_evidence_of_covered_work
          and client_income_exceeds_and_so_grant_standard_after_applicable_disregards

  - name: and_so_grant_payment_denial_or_discontinuance_required_for_excess_earnings
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5 § 3.541.2(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.541.2
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          client_has_excess_and_so_earnings_for_grant_payment_discontinuance
