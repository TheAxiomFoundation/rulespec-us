- name: and_so_subsequent_ssa_application_verification_deadline_days
  kind: parameter
  dtype: Count
  source: 9 CCR 2503-5 3.520.71 C
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.71
          excerpt: Subsequent applications for AND-SO require verification of application
