format: rulespec/v1
imports:
- us-co:regulations/9-ccr-2503-5/3.520.72#client_resources_within_limit_under_3_520_72
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.71
  summary: '"To receive Adult Financial program assistance, the client shall ... have
    countable resources below the resource limit as outlined in Section 3.520.72."
    Clients referred to SSA must provide verification within eleven calendar days;
    AND-SO clients have sixty calendar days from the initial interview, and subsequent
    AND-SO applications require verification within thirty calendar days.'
  deferred_outputs:
  - output: us-co:regulations/9-ccr-2503-5/3.520.71#adult_financial_income_requirement_met
    reason: The income limit is determined by Section 3.520.78, for which no executable
      RuleSpec source was provided.
  - output: us-co:regulations/9-ccr-2503-5/3.520.71#adult_financial_financial_requirements_met
    reason: The complete financial requirement combines the resource requirement with
      the income limit in Section 3.520.78, which is not available as RuleSpec context.
  - output: us-co:regulations/9-ccr-2503-5/3.520.71#oap_ssi_income_threshold_met
    reason: OAP SSI eligibility at age sixty-five depends on the SSI benefit standard
      defined in Section 3.510, for which no executable RuleSpec source was provided.
