- name: ssa_application_verification_requirement_met
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: 9 CCR 2503-5 3.520.71 C
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: predicate
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.71
          excerpt: Clients referred to the SSA ... shall be required to provide verification
            of application for such benefits within eleven (11) calendar days ...
            For AND-SO ... within sixty (60) calendar days from the initial interview
            date ... Subsequent applications for AND-SO require verification ... within
            thirty (30) calendar days.
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.71
          excerpt: Subsequent applications for AND-SO submitted by the client shall
            not be approved prior to receipt of proof of application for SSA benefits.
  versions:
  - effective_from: '2016-10-01'
    formula: "not client_referred_to_ssa\nor (\n  ssa_application_verification_provided\n\
      \  and (\n    (\n      not client_is_and_so\n      and calendar_days_since_ssa_application\n\
      \          <= non_and_so_ssa_application_verification_deadline_days\n    )\n\
      \    or (\n      client_is_and_so\n      and not and_so_application_is_subsequent\n\
      \      and calendar_days_since_initial_interview\n          <= and_so_initial_ssa_application_verification_deadline_days\n\
      \    )\n    or (\n      client_is_and_so\n      and and_so_application_is_subsequent\n\
      \      and calendar_days_since_subsequent_and_so_application\n          <= and_so_subsequent_ssa_application_verification_deadline_days\n\
      \    )\n  )\n)"
