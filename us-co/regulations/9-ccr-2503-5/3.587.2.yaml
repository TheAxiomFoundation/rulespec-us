format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.587.2
  summary: |-
    “No motion for reconsideration shall be granted unless it is filed in writing with the Office of Appeals within fifteen (15) days of the date that the final agency decision is mailed to the parties. The motion must state specific grounds for reconsideration of the final agency decision.”
rules:
  - name: exceptions_filing_deadline_days
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5 § 3.587.2(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.587.2
              excerpt: "within fifteen (15) days"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          15

  - name: exceptions_mailing_extension_days
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5 § 3.587.2(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.587.2
              excerpt: "plus three days for mailing"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          3

  - name: exceptions_response_deadline_calendar_days
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5 § 3.587.2(C)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.587.2
              excerpt: "ten (10) calendar days"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          10

  - name: transcript_advance_payment_deadline_days
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5 § 3.587.2(C)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.587.2
              excerpt: "Within five (5) days of the request for a transcript"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          5

  - name: final_decision_effective_after_mailing_days
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5 § 3.587.2(C)(9)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.587.2
              excerpt: "the third day after the date the decision is mailed"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          3

  - name: final_decision_compliance_deadline_working_days
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5 § 3.587.2(C)(10)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.587.2
              excerpt: "within three (3) working days after the effective date"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          3

  - name: reconsideration_filing_deadline_days
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5 § 3.587.2(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.587.2
              excerpt: "within fifteen (15) days of the date that the final agency decision is mailed"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          15

  - name: judicial_review_filing_deadline_days
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5 § 3.587.2(F)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.587.2
              excerpt: "within thirty-five (35) days after the final agency decision becomes effective"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          35

  - name: reconsideration_motion_may_be_granted
    kind: derived
    entity: Appeal
    dtype: Judgment
    period: Day
    source: 9 CCR 2503-5 § 3.587.2(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.587.2
              excerpt: "filed in writing with the Office of Appeals within fifteen (15) days"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.587.2
              excerpt: "The motion must state specific grounds"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.587.2
              excerpt: "A showing of good cause for failure to file exceptions"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.587.2
              excerpt: "clear or plain error of fact or law"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          reconsideration_motion_is_written
          and reconsideration_motion_is_filed_within_deadline
          and reconsideration_motion_states_specific_grounds
          and (
            good_cause_for_failure_to_file_initial_decision_exceptions
            or final_agency_decision_has_clear_or_plain_error_of_fact_or_law
          )
