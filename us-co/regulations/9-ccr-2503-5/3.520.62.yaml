format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.62
  summary: |-
    The county department shall verify the client's age by viewing statewide automated system interface information or specified identity, vital-record, Social Security, school, church, family, voting, or census records.
rules:
  - name: client_age_verification_evidence_is_acceptable
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5 § 3.520.62
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.62
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          statewide_automated_system_interface_information_viewed
          or birth_certificate_viewed
          or valid_colorado_identification_or_drivers_license_viewed
          or valid_out_of_state_identification_or_drivers_license_viewed
          or naturalization_immigration_or_passport_papers_viewed
          or vital_statistics_legal_document_viewed
          or social_security_information_viewed
          or school_record_viewed
          or baptismal_certificate_or_documented_church_record_viewed
          or genealogy_or_documented_family_birth_record_viewed
          or voting_record_viewed
          or united_states_census_record_viewed
