- name: client_must_repay_and_so_from_initial_retroactive_ssi_payment
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: "9 CCR 2503-5, \xA7 3.545(A)(1)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.545
          excerpt: If the first retroactive SSI payment is sent to the client... he
            or she is required to repay
  versions:
  - effective_from: '2016-10-01'
    formula: client_received_initial_retroactive_ssi_payment_directly
- name: client_ssi_payment_counted_as_income_in_month_received
  kind: derived
  entity: Person
  dtype: Money
  unit: USD
  period: Month
  source: "9 CCR 2503-5, \xA7 3.545(D)-(E)(3)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.545
          excerpt: consider the payment as income in the month received and shall
            not be counted as income
  versions:
  - effective_from: '2016-10-01'
    formula: 'if client_received_ssi_payment: max(0, ssi_payment_amount_received -
      iar_recovery_from_initial_retroactive_ssi_payment_made_in_same_month) else:
      0'
