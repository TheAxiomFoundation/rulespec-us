- name: iar_case_record_retention_years
  kind: parameter
  dtype: Count
  period: Year
  source: "9 CCR 2503-5, \xA7 3.545(I)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.545
          excerpt: four (4) years
  versions:
