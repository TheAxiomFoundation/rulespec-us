format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.545
  summary: '"When the SSI payment is received by the client, the county department
    shall consider the payment as income in the month received." "Any amount recovered
    in the same month as the month in which the retroactive payment was received shall
    not be counted as income." A client receiving the initial retroactive SSI payment
    directly is required to repay AND-SO grant payments.'
rules:
- name: im14_ssa_notification_deadline_calendar_days
  kind: parameter
  dtype: Count
  period: Day
  source: "9 CCR 2503-5, \xA7 3.545(A)(2)(a)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.545
          excerpt: within 30 calendar days
  versions:
  - effective_from: '2016-10-01'
    formula: '30'
- name: iar_discrepancy_resolution_deadline_calendar_days
  kind: parameter
  dtype: Count
  period: Day
  source: "9 CCR 2503-5, \xA7 3.545(A)(2)(b)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.545
          excerpt: within thirty (30) calendar days
  versions:
  - effective_from: '2016-10-01'
    formula: '30'
- name: apportionment_notice_deadline_working_days
  kind: parameter
  dtype: Count
  period: Day
  source: "9 CCR 2503-5, \xA7 3.545(B)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.545
          excerpt: Within ten (10) working days
