format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.5
  summary: |-
    “This information must be provided within eleven (11) days”; “act on all information received through IEVS within forty five (45) calendar days”; and the county department shall not delay IEVS processing beyond that period for more than twenty (20) percent of targeted follow-up information when the stated conditions are met.
rules:
  - name: dole_wage_verification_response_deadline_calendar_days
    kind: parameter
    dtype: Integer
    source: 9 CCR 2503-5, § 3.520.5(A)(2)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.5
              excerpt: "within eleven (11) days following the date of the county’s request"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          11
  - name: ievs_information_action_deadline_calendar_days
    kind: parameter
    dtype: Integer
    source: 9 CCR 2503-5, § 3.520.5(A)(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.5
              excerpt: "within forty five (45) calendar days of receipt"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          45
  - name: maximum_ievs_follow_up_delayed_share
    kind: parameter
    dtype: Rate
    source: 9 CCR 2503-5, § 3.520.5(A)(5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.5
              excerpt: "more than twenty (20) percent of the information targeted for follow-up"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          0.20
  - name: dole_wage_verification_response_is_timely
    kind: derived
    entity: StateAgency
    dtype: Judgment
    period: Day
    source: 9 CCR 2503-5, § 3.520.5(A)(2)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.5
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.5
              excerpt: "within eleven (11) days following the date of the county’s request"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          calendar_days_following_dole_wage_verification_request <= dole_wage_verification_response_deadline_calendar_days
  - name: ievs_information_action_is_timely
    kind: derived
    entity: StateAgency
    dtype: Judgment
    period: Day
    source: 9 CCR 2503-5, § 3.520.5(A)(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.5
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.5
              excerpt: "within forty five (45) calendar days of receipt"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          calendar_days_since_ievs_information_received <= ievs_information_action_deadline_calendar_days
  - name: ievs_follow_up_delay_is_permitted
    kind: derived
    entity: StateAgency
    dtype: Judgment
    period: Day
    source: 9 CCR 2503-5, § 3.520.5(A)(5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.5
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.5
              excerpt: "more than twenty (20) percent of the information targeted for follow-up"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          share_of_targeted_ievs_follow_up_delayed <= maximum_ievs_follow_up_delayed_share
          and delay_is_due_to_nonreceipt_of_requested_third_party_verification
          and action_is_completed_promptly_when_verification_is_received_or_at_redetermination
