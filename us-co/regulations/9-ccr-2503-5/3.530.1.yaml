format: rulespec/v1
imports:
  - us-co:regulations/9-ccr-2503-5/3.530#oap_minimum_age_years
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.530.1
  summary: |-
    “OAP” is a program for a client sixty (60) years of age or older. “OAP-C” is for a client age sixty (60) or older committed to the Colorado Mental Health Institute or a Regional Center by district or probate court order.
rules:
  - name: client_meets_oap_definition
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5 3.530.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.530.1
              excerpt: "“OAP” is a program for a client sixty (60) years of age or older."
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/9-ccr-2503-5/3.530#oap_minimum_age_years
              output: oap_minimum_age_years
              hash: sha256:8b3031855cedaee3683e939c2794f44b088ebc47ee9e306130689130824bd48e
    versions:
