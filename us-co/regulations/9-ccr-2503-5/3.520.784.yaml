format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.784
  summary: |-
    Uncompensated work or personal services are countable earned income when regular and scheduled, necessary, would otherwise require hiring someone, and exceed five hours weekly. Their value uses the greater of the community rate for similar work or current minimum wage. Community-betterment volunteerism averaging less than thirty hours weekly is not income.
rules:
  - name: donated_services_countable_weekly_hours_exclusive_threshold
    kind: parameter
    dtype: Count
    period: Week
    source: 9 CCR 2503-5 § 3.520.784(A)(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.784
              excerpt: "greater than five (5) hours per week"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          5

  - name: community_volunteerism_weekly_hours_exclusive_threshold
    kind: parameter
    dtype: Count
    period: Week
    source: 9 CCR 2503-5 § 3.520.784(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.784
              excerpt: "less than an average of thirty (30) hours per week"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          30

  - name: donated_services_are_countable_earned_income
    kind: derived
    entity: Person
    dtype: Judgment
    period: Week
    source: 9 CCR 2503-5 § 3.520.784(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.784
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          work_or_personal_services_are_provided_without_monetary_compensation
          and services_are_provided_to_business_self_employed_person_or_person_in_need_of_employee
          and work_is_regular_and_scheduled
          and work_is_necessary_service
          and someone_would_have_to_be_hired_if_not_performed_by_client_spouse_or_sponsors
          and donated_service_hours_per_week > donated_services_countable_weekly_hours_exclusive_threshold

  - name: countable_donated_services_weekly_value
    kind: derived
    entity: Person
    dtype: Money
    unit: USD
    period: Week
    source: 9 CCR 2503-5 § 3.520.784(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.784
              excerpt: "The going rate in the community for similar work; or, The current minimum wage standard, whichever is greater."
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          if donated_services_are_countable_earned_income:
            donated_service_hours_per_week * max(community_going_hourly_rate_for_similar_work, current_minimum_wage_hourly_rate)
          else: 0

  - name: community_volunteerism_is_not_income
    kind: derived
    entity: Person
    dtype: Judgment
    period: Week
    source: 9 CCR 2503-5 § 3.520.784(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.784
              excerpt: "Volunteerism for the betterment of the community less than an average of thirty (30) hours per week shall not be considered income."
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          services_are_volunteerism_for_betterment_of_community
          and average_community_volunteer_hours_per_week < community_volunteerism_weekly_hours_exclusive_threshold
