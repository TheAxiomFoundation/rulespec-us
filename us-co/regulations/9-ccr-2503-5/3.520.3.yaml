format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.3
  summary: |-
    Supervisory personnel and/or quality assurance staff shall ensure correction of any errors within ten (10) business days or the time frame specified within the approved review plan, and county departments must keep case file reviews for a minimum of three (3) years.
rules:
  - name: error_correction_deadline_business_days
    kind: parameter
    dtype: Count
    source: 9 C.C.R. 2503-5 § 3.520.3(F)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.3
              excerpt: "within ten (10) business days"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          10

  - name: case_file_review_retention_minimum_years
    kind: parameter
    dtype: Count
    source: 9 C.C.R. 2503-5 § 3.520.3(F)(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.3
              excerpt: "minimum of three (3) years"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          3

  - name: identified_error_correction_requirement_met
    kind: derived
    entity: CountyDepartment
    dtype: Judgment
    period: Month
    source: 9 C.C.R. 2503-5 § 3.520.3(F)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.3
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          not errors_identified_in_review
          or (
            all_identified_errors_corrected
            and (
              business_days_to_correct_errors <= error_correction_deadline_business_days
              or errors_corrected_within_approved_review_plan_timeframe
            )
          )

  - name: case_file_review_retention_requirement_met
    kind: derived
    entity: CountyDepartment
    dtype: Judgment
    period: Month
    source: 9 C.C.R. 2503-5 § 3.520.3(F)(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.3
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          case_file_review_record_retention_years >= case_file_review_retention_minimum_years
