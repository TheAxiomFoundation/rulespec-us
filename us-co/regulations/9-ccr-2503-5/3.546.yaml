format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.546
  summary: The AND-CS program provides a supplemental payment for clients age zero
    (0) to fifty-nine (59) who are receiving SSI due to disability or blindness, but
    are not receiving the full SSI benefit standard. The total AND-CS grant standard
    is $994 effective January 1, 2026. State Supplementary Payments bring an OAP,
    AND-CS, or HCA client's monthly benefit amount up to the payment floor standard
    when the Adult Financial grant is below that floor. Effective January 1, 2026,
    the maximum ISM amount for shelter costs is $351 and the AND-CS payment floor
    standard is $13.
rules:
- name: and_cs_minimum_age_years
  kind: parameter
  dtype: Integer
  source: 9 CCR 2503-5 3.546 Program
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.546
          excerpt: clients age zero (0) to fifty-nine (59)
  versions:
  - effective_from: '2026-01-01'
    formula: '0'
- name: and_cs_maximum_age_years
  kind: parameter
  dtype: Integer
  source: 9 CCR 2503-5 3.546 Program
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.546
          excerpt: clients age zero (0) to fifty-nine (59)
  versions:
  - effective_from: '2026-01-01'
    formula: '59'
- name: and_cs_total_grant_standard
  kind: parameter
  dtype: Money
  unit: USD
  source: 9 CCR 2503-5 3.546 A
  metadata:
    proof:
      atoms:
      - path: versions[0].effective_from
        kind: effective_period
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.546
          excerpt: The total AND-CS grant standard is $994, effective January 1, 2026.
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.546
          excerpt: The total AND-CS grant standard is $994
  versions:
  - effective_from: '2026-01-01'
    formula: '994'
- name: and_cs_maximum_ism_amount_for_shelter_costs
  kind: parameter
  dtype: Money
  unit: USD
  source: 9 CCR 2503-5 3.546 D
  metadata:
    proof:
      atoms:
      - path: versions[0].effective_from
        kind: effective_period
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.546
          excerpt: Effective January 1, 2026, the maximum ISM amount for shelter costs
            is $351.
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.546
          excerpt: the maximum ISM amount for shelter costs is $351
  versions:
  - effective_from: '2026-01-01'
    formula: '351'
- name: and_cs_payment_floor_standard
  kind: parameter
  dtype: Money
  unit: USD
  source: 9 CCR 2503-5 3.546 E
  metadata:
    proof:
      atoms:
      - path: versions[0].effective_from
        kind: effective_period
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.546
          excerpt: Effective January 1, 2026, the payment floor standard for AND-CS
            is $13.
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.546
          excerpt: the payment floor standard for AND-CS is $13
  versions:
  - effective_from: '2026-01-01'
    formula: '13'
- name: and_cs_age_requirement_met
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: 9 CCR 2503-5 3.546 Program
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: predicate
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.546
          excerpt: clients age zero (0) to fifty-nine (59)
  versions:
  - effective_from: '2026-01-01'
    formula: 'client_age_in_years >= and_cs_minimum_age_years

      and client_age_in_years <= and_cs_maximum_age_years'
- name: and_cs_client_qualifies_for_program
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: 9 CCR 2503-5 3.546 Program
  metadata:
    proof:
      atoms:
      - kind: import
        path: versions[0].formula
        import:
          target: us-co:regulations/9-ccr-2503-5/3.546#and_cs_age_requirement_met
          output: and_cs_age_requirement_met
          hash: sha256:local
      - path: versions[0].formula
        kind: predicate
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.546
          excerpt: receiving SSI due to a disability or blindness, but are not receiving
            the full SSI benefit standard
  versions:
  - effective_from: '2026-01-01'
    formula: 'and_cs_age_requirement_met

      and client_receives_ssi_due_to_disability_or_blindness

      and not client_receives_full_ssi_benefit_standard_under_section_3_510'
- name: and_cs_state_supplementary_payment_for_month
  kind: derived
  entity: Person
  dtype: Money
  period: Month
  unit: USD
  source: 9 CCR 2503-5 3.546 C.2, E
  metadata:
    proof:
      atoms:
      - kind: import
        path: versions[0].formula
        import:
          target: us-co:regulations/9-ccr-2503-5/3.546#and_cs_client_qualifies_for_program
          output: and_cs_client_qualifies_for_program
          hash: sha256:local
      - kind: import
        path: versions[0].formula
        import:
          target: us-co:regulations/9-ccr-2503-5/3.546#and_cs_payment_floor_standard
          output: and_cs_payment_floor_standard
          hash: sha256:local
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.546
          excerpt: when an OAP, AND-CS, or HCA client's Adult Financial grant is less
            than the payment floor standard
  versions:
  - effective_from: '2026-01-01'
    formula: 'if and_cs_client_qualifies_for_program: max(0, and_cs_payment_floor_standard
      - client_adult_financial_grant_amount) else: 0'
- name: and_cs_total_monthly_benefit_amount_with_state_supplement
  kind: derived
  entity: Person
  dtype: Money
  period: Month
  unit: USD
  source: 9 CCR 2503-5 3.546 C.2
  metadata:
    proof:
      atoms:
      - kind: import
        path: versions[0].formula
        import:
          target: us-co:regulations/9-ccr-2503-5/3.546#and_cs_state_supplementary_payment_for_month
          output: and_cs_state_supplementary_payment_for_month
          hash: sha256:local
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.546
          excerpt: The supplemental payment is in addition to the grant payment and
            brings the client's monthly benefit amount equal to the payment floor
            standard
  versions:
  - effective_from: '2026-01-01'
    formula: 'if and_cs_client_qualifies_for_program: client_adult_financial_grant_amount
      + and_cs_state_supplementary_payment_for_month else: 0'
