format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.587.1
  summary: |-
    “The OAC sets a hearing date at least ten (10) days from the date the appeal was requested.” Adult Financial initial decisions are due within twenty (20) calendar days after hearing, final agency decisions within ninety (90) calendar days after receipt of the hearing request, and specified post-dismissal and post-final-decision actions have ten (10)-day periods.
rules:
  - name: hearing_notice_minimum_lead_time_days
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5 §3.587.1.C
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.587.1
              excerpt: "at least ten (10) days from the date the appeal was requested"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          10

  - name: long_schedule_hearing_threshold_days
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5 §3.587.1.C.3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.587.1
              excerpt: "forty-five (45) days or more from the date of the notice of hearing"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          45

  - name: long_schedule_packet_preparation_deadline_days
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5 §3.587.1.C.3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.587.1
              excerpt: "within fifteen (15) days"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          15

  - name: long_schedule_packet_minimum_days_before_hearing
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5 §3.587.1.C.3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.587.1
              excerpt: "no later than thirty (30) days prior to the hearing"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          30

  - name: short_schedule_packet_preparation_deadline_days
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5 §3.587.1.C.3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.587.1
              excerpt: "within five (5) days"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          5

  - name: short_schedule_packet_minimum_days_before_hearing
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5 §3.587.1.C.3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.587.1
              excerpt: "no later than ten (10) days prior to the hearing"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          10

  - name: initial_decision_deadline_days
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5 §3.587.1.C.5
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.587.1
              excerpt: "twenty (20) calendar days from the hearing date"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          20

  - name: final_agency_decision_deadline_days
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5 §3.587.1.C.6
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.587.1
              excerpt: "within ninety (90) calendar days from the date the request for hearing is received"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          90

  - name: dismissal_good_cause_letter_deadline_days
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5 §3.587.1.F.8
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.587.1
              excerpt: "ten (10) calendar days from the date the order of dismissal was mailed"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          10

  - name: post_final_decision_action_deadline_days
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5 §3.587.1.F.8
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.587.1
              excerpt: "within ten (10) calendar days of the final agency decision becoming effective"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          10

  - name: hearing_notice_timing_compliant
    kind: derived
    entity: AdultFinancialAppeal
    dtype: Judgment
    period: Day
    source: 9 CCR 2503-5 §3.587.1.C
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.587.1
              excerpt: "sets a hearing date at least ten (10) days from the date the appeal was requested"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          hearing_date_days_after_appeal_request >= hearing_notice_minimum_lead_time_days

  - name: hearing_packet_timing_compliant
    kind: derived
    entity: AdultFinancialAppeal
    dtype: Judgment
    period: Day
    source: 9 CCR 2503-5 §3.587.1.C.3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.587.1
              excerpt: "If OAC sets the hearing forty-five (45) days or more ... within fifteen (15) days but no later than thirty (30) days prior ... If the hearing is set less than 45 days ... within five (5) days but no later than ten (10) days prior"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          (
            hearing_date_days_after_notice >= long_schedule_hearing_threshold_days
            and hearing_packet_days_after_notice <= long_schedule_packet_preparation_deadline_days
            and hearing_packet_days_before_hearing >= long_schedule_packet_minimum_days_before_hearing
          )
          or (
            hearing_date_days_after_notice < long_schedule_hearing_threshold_days
            and hearing_packet_days_after_notice <= short_schedule_packet_preparation_deadline_days
            and hearing_packet_days_before_hearing >= short_schedule_packet_minimum_days_before_hearing
          )

  - name: appeal_decision_timing_compliant
    kind: derived
    entity: AdultFinancialAppeal
    dtype: Judgment
    period: Day
    source: 9 CCR 2503-5 §3.587.1.C.5-C.6
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.587.1
              excerpt: "twenty (20) calendar days from the hearing date" 
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.587.1
              excerpt: "within ninety (90) calendar days from the date the request for hearing is received"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          initial_decision_days_after_hearing <= initial_decision_deadline_days
          and final_decision_days_after_hearing_request <= final_agency_decision_deadline_days

  - name: dismissal_good_cause_letter_timely
    kind: derived
    entity: AdultFinancialAppeal
    dtype: Judgment
    period: Day
    source: 9 CCR 2503-5 §3.587.1.F.8
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.587.1
              excerpt: "ten (10) calendar days from the date the order of dismissal was mailed"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          appellant_good_cause_letter_days_after_dismissal_mailed <= dismissal_good_cause_letter_deadline_days

  - name: post_final_decision_action_timing_compliant
    kind: derived
    entity: AdultFinancialAppeal
    dtype: Judgment
    period: Day
    source: 9 CCR 2503-5 §3.587.1.F.8
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.587.1
              excerpt: "shall carry out the necessary actions within ten (10) calendar days"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          county_action_days_after_final_decision_effective <= post_final_decision_action_deadline_days
