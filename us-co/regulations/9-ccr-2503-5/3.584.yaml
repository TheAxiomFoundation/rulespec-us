format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.584
  summary: |-
    “If suspected fraud is substantiated by the available evidence, the case shall be referred to the district attorney.” “All referrals to the district attorney shall be made in writing and shall include the amount of assistance fraudulently received by the client.” If prosecution is declined, the overpayment continues to be recovered by deduction from subsequent grant payments or another recovery method for a non-client.
rules:
  - name: fraudulent_grant_payment_determination_review_requirement_satisfied
    kind: derived
    entity: AdultFinancialFraudCase
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5, § 3.584(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.584
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          not grant_payment_determined_to_result_from_fraudulent_act
          or facts_reviewed_with_department_legal_counsel_or_district_attorney_representative
  - name: substantiated_fraud_referral_requirement_satisfied
    kind: derived
    entity: AdultFinancialFraudCase
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5, § 3.584(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.584
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          not suspected_fraud_substantiated_by_available_evidence
          or (
            case_referred_to_district_attorney
            and district_attorney_referral_made_in_writing
            and district_attorney_referral_includes_fraudulently_received_assistance_amount
          )
  - name: declined_prosecution_overpayment_recovery_requirement_satisfied
    kind: derived
    entity: AdultFinancialFraudCase
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5, § 3.584(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.584
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          not district_attorney_declines_to_prosecute
          or (
            (individual_is_adult_financial_grant_payment_client and overpayment_recovered_by_deduction_from_subsequent_grant_payments)
            or (
              not individual_is_adult_financial_grant_payment_client
              and overpayment_recovered_by_other_method
            )
          )
