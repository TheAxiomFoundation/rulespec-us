format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.570.12
  summary: |-
    “Medical leave” means absence from home for more than twenty-four (24) hours due to hospital or facility admittance upon physician's order with an expected return home. “Non-medical leave” means absence from home for more than twenty-four (24) hours for non-medical reasons not part of a client's care plan.
rules:
  - name: medical_leave_minimum_absence_hours
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5 § 3.570.12 (definition of “Medical leave”)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.570.12
              excerpt: "more than twenty-four (24) hours"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          24

  - name: non_medical_leave_minimum_absence_hours
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5 § 3.570.12 (definition of “Non-medical leave”)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.570.12
              excerpt: "more than twenty-four (24) hours"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          24

  - name: medical_leave
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: 9 CCR 2503-5 § 3.570.12 (definition of “Medical leave”)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.570.12
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          absence_from_home_hours > medical_leave_minimum_absence_hours
          and absence_is_due_to_hospital_or_facility_admittance
          and admission_is_upon_physician_order
          and physician_presumes_client_will_return_home

  - name: non_medical_leave
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: 9 CCR 2503-5 § 3.570.12 (definition of “Non-medical leave”)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.570.12
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          absence_from_home_hours > non_medical_leave_minimum_absence_hours
          and absence_is_for_non_medical_reasons
          and absence_is_not_part_of_client_care_plan
