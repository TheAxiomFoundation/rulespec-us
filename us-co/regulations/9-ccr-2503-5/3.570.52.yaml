format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.570.52
  summary: |-
    “In order to be eligible for disaster assistance, the client must” be approved for or receiving a grant payment during a declared disaster, have an emergent disaster-related need, and request assistance from the county department.
rules:
  - name: client_eligible_for_disaster_assistance
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5, § 3.570.52(A)-(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.570.52
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          client_is_approved_for_or_receiving_grant_payment_during_declared_disaster
          and client_has_emergent_need_related_to_disaster
          and client_requested_disaster_assistance_from_county_department
