    source: 9 CCR 2503-5 § 3.541.1(B)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.541.1
              excerpt: 80% State share
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          0.80

  - name: medical_examination_county_reimbursement_share
    kind: parameter
    dtype: Rate
    source: 9 CCR 2503-5 § 3.541.1(B)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.541.1
              excerpt: 20% county share reimbursement methodology
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          0.20

  - name: county_provided_medical_form_timely
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5 § 3.541.1(A)(1)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.541.1
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.541.1
              excerpt: within ten (10) calendar days of application
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          county_department_provided_medical_form
          and days_between_application_and_form_provision <= medical_form_provision_deadline_days

  - name: client_submitted_medical_examination_timely
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5 § 3.541.1(A)(1)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.541.1
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.541.1
              excerpt: within thirty (30) calendar days following the interview or with their redetermination
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          client_submitted_required_medical_examination
          and days_since_relevant_interview_or_redetermination <= medical_examination_submission_deadline_days

  - name: medical_certification_is_current_and_provider_completed
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5 § 3.541.1(A)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.541.1
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.541.1
              excerpt: dated no earlier than ninety (90) days before the application or recertification
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          medical_certification_completed_and_signed_by_medical_provider
          and days_certification_precedes_application_or_recertification <= medical_certification_maximum_age_days

  - name: client_may_choose_bordering_state_medical_provider
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5 § 3.541.1(A)(2)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.541.1
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.541.1
              excerpt: more than one hour from the client's home
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          nearest_colorado_provider_travel_time_hours > bordering_state_provider_travel_time_threshold_hours

  - name: county_established_reexamination_date_complies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5 § 3.541.1(A)(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.541.1
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.541.1
              excerpt: shall not exceed twelve (12) months
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          not client_determined_disabled_by_state_disability_review_contractor
          and medical_reexamination_date_is_based_on_application_or_redetermination
          and documented_disability_length_months <= medical_reexamination_maximum_months

  - name: medical_examination_reimbursement_shares_are_complete
    kind: derived
    entity: StateAgency
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5 § 3.541.1(B)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.541.1
              excerpt: 80% State share, 20% county share reimbursement methodology
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          medical_examination_state_reimbursement_share + medical_examination_county_reimbursement_share == 1
