format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.541.1
  summary: |-
    The county department shall provide the medical form within ten (10) calendar days of application. Required medical examination submission is due within thirty (30) calendar days following the interview or with redetermination. Certification must be dated no earlier than ninety (90) days before application or recertification. Re-examination shall not exceed twelve (12) months. A bordering-state provider may be chosen when the nearest Colorado provider is more than one hour from the client's home. Examination costs use an 80% State share and 20% county share methodology.
rules:
  - name: medical_form_provision_deadline_days
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5 § 3.541.1(A)(1)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.541.1
              excerpt: within ten (10) calendar days of application
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          10

  - name: medical_examination_submission_deadline_days
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5 § 3.541.1(A)(1)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.541.1
              excerpt: within thirty (30) calendar days following the interview
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          30

  - name: medical_certification_maximum_age_days
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5 § 3.541.1(A)(2)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.541.1
              excerpt: dated no earlier than ninety (90) days before the application or recertification
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          90

  - name: bordering_state_provider_travel_time_threshold_hours
    kind: parameter
    dtype: Decimal
    source: 9 CCR 2503-5 § 3.541.1(A)(2)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.541.1
              excerpt: more than one hour from the client's home
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          1

  - name: medical_reexamination_maximum_months
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5 § 3.541.1(A)(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.541.1
              excerpt: shall not exceed twelve (12) months
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          12

  - name: medical_examination_state_reimbursement_share
    kind: parameter
