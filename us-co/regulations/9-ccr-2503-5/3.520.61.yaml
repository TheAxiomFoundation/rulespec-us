format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.61
  summary: |-
    “To be eligible for Adult Financial programs, a client shall” meet the stated age, Colorado residency, disqualification, benefit-pursuit, and other eligibility requirements; AND applicants additionally require citizenship/immigration status, a valid SSN, and disability.
rules:
  - name: adult_financial_and_so_standard_minimum_age_years
    kind: parameter
    dtype: Integer
    source: 9 CCR 2503-5 § 3.520.61(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.61
              excerpt: "eighteen (18) through fifty-nine (59) years of age for AND-SO"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          18

  - name: adult_financial_and_so_standard_maximum_age_years
    kind: parameter
    dtype: Integer
    source: 9 CCR 2503-5 § 3.520.61(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.61
              excerpt: "eighteen (18) through fifty-nine (59) years of age for AND-SO"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          59

  - name: adult_financial_and_so_blindness_minimum_age_years
    kind: parameter
    dtype: Integer
    source: 9 CCR 2503-5 § 3.520.61(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.61
              excerpt: "unless diagnosed with blindness, then age zero (0) through 59 years"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          0

  - name: adult_financial_and_so_blindness_maximum_age_years
    kind: parameter
    dtype: Integer
    source: 9 CCR 2503-5 § 3.520.61(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.61
              excerpt: "unless diagnosed with blindness, then age zero (0) through 59 years"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          59

  - name: adult_financial_and_cs_minimum_age_years
    kind: parameter
    dtype: Integer
    source: 9 CCR 2503-5 § 3.520.61(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.61
              excerpt: "age 0 through 59 years of age for AND-CS"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          0

  - name: adult_financial_and_cs_maximum_age_years
    kind: parameter
    dtype: Integer
    source: 9 CCR 2503-5 § 3.520.61(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.61
              excerpt: "age 0 through 59 years of age for AND-CS"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          59

  - name: adult_financial_oap_minimum_age_years
    kind: parameter
    dtype: Integer
    source: 9 CCR 2503-5 § 3.520.61(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.61
              excerpt: "age sixty (60) years of age or older for OAP"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          60

  - name: client_eligible_for_adult_financial_program
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5 § 3.520.61(A)-(I)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.61
              excerpt: "Be a resident of Colorado, except that inmates ... and fleeing felons, shall not be eligible"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.61
              excerpt: "For AND only, be a citizen ... have a valid SSN ... have a disability"
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.61
              excerpt: "Not be currently receiving or eligible for financial assistance from Colorado Works"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.61
              excerpt: "Apply for and accept all retirement and public assistance benefits ... unless good cause is provided"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.61
              excerpt: "Pursue and accept all other potential income and resources ... Meet all other program eligibility requirements"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          (
            (
              client_requests_and_so
              and (
                (
                  client_is_diagnosed_with_blindness
                  and client_age_in_years >= adult_financial_and_so_blindness_minimum_age_years
                  and client_age_in_years <= adult_financial_and_so_blindness_maximum_age_years
                )
                or (
                  not client_is_diagnosed_with_blindness
                  and client_age_in_years >= adult_financial_and_so_standard_minimum_age_years
                  and client_age_in_years <= adult_financial_and_so_standard_maximum_age_years
                )
              )
            )
            or (
              client_requests_and_cs
              and client_age_in_years >= adult_financial_and_cs_minimum_age_years
              and client_age_in_years <= adult_financial_and_cs_maximum_age_years
            )
            or (
              client_requests_oap
              and client_age_in_years >= adult_financial_oap_minimum_age_years
            )
          )
          and client_is_colorado_resident
          and not client_is_inmate_in_correctional_institution
          and not client_is_fleeing_felon
          and (
            not (client_requests_and_so or client_requests_and_cs)
            or (
              client_is_us_citizen_or_qualified_non_citizen_or_legal_immigrant
              and client_has_valid_ssn
              and client_has_disability
            )
          )
          and not client_receives_or_is_eligible_for_colorado_works_financial_assistance
          and (
            client_applies_for_and_accepts_retirement_and_public_assistance_benefits
            or client_has_good_cause_for_not_applying_for_or_accepting_benefits
          )
          and client_pursues_and_accepts_other_potential_income_and_resources
          and client_meets_other_program_eligibility_requirements
