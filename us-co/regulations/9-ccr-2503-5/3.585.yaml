format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.585
  summary: |-
    “The county department shall not establish a claim unless the amount of the claim is greater than $200, except” when identified through a Federal or State quality control review or when pursued as and resulting in an IPV. The provision also specifies recovery deadlines, recovery deductions, repayment and write-off limits, EBT recovery timing, hearing timing, and equity-and-good-conscience standards.
rules:
  - name: overpayment_research_deadline_days
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5 3.585 A
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.585
              excerpt: "within ten (10) calendar days of discovering a client received an overpayment"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          10

  - name: minimum_monthly_recovery_deduction_amount
    kind: parameter
    dtype: Money
    unit: USD
    source: 9 CCR 2503-5 3.585 B.2.b
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.585
              excerpt: "The monthly rate of recovery shall be ten dollars or ten percent of the assistance payment, whichever is higher."
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          10

  - name: monthly_recovery_deduction_rate
    kind: parameter
    dtype: Rate
    source: 9 CCR 2503-5 3.585 B.2.b
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.585
              excerpt: "ten percent of the assistance payment"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          0.10

  - name: authorized_payment_no_deduction_threshold
    kind: parameter
    dtype: Money
    unit: USD
    source: 9 CCR 2503-5 3.585 B.2.b.3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.585
              excerpt: "When the authorized payment amount is less than ten dollars ($10), the case is considered a “no payment” case and no deduction shall be made."
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          10

  - name: claim_establishment_threshold_amount
    kind: parameter
    dtype: Money
    unit: USD
    source: 9 CCR 2503-5 3.585 B.2.c
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.585
              excerpt: "shall not establish a claim unless the amount of the claim is greater than $200"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          200

  - name: former_client_repayment_income_limit_rate
    kind: parameter
    dtype: Rate
    source: 9 CCR 2503-5 3.585 B.3.a
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.585
              excerpt: "shall not exceed twenty-five percent (25%) of available monthly income"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          0.25

  - name: administrative_error_writeoff_threshold_amount
    kind: parameter
    dtype: Money
    unit: USD
    source: 9 CCR 2503-5 3.585 B.3.c.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.585
              excerpt: "Valid administrative error claims less than one hundred twenty-five dollars ($125.00)"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          125

  - name: administrative_error_writeoff_waiting_days
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5 3.585 B.3.c.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.585
              excerpt: "can be written off ninety (90) days after the termination of all public assistance"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          90

  - name: client_error_fraud_ipv_writeoff_threshold_amount
    kind: parameter
    dtype: Money
    unit: USD
    source: 9 CCR 2503-5 3.585 B.3.c.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.585
              excerpt: "Valid claims for client error, fraud, and IPV less than three hundred dollars ($300.00)."
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          300

  - name: old_unpaid_claim_writeoff_age_years
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5 3.585 B.3.c.3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.585
              excerpt: "the overpayment was established six (6) or more years ago"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          6

  - name: erroneous_ebt_retrieval_period_hours
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5 3.585 D
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.585
              excerpt: "within twenty-four (24) hours of the issuance"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          24

  - name: pre_offset_hearing_request_period_days
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5 3.585 I
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.585
              excerpt: "within thirty (30) calendar days from the date that the State Department mails its pre-offset notice"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          30

  - name: income_remaining_deprivation_threshold_rate
    kind: parameter
    dtype: Rate
    source: 9 CCR 2503-5 3.585 L.3.a
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.585
              excerpt: "If a client has ten (10) percent or more of income remaining after necessary living expenses, he or she shall not be considered deprived of income."
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          0.10

  - name: claim_must_be_established
    kind: derived
    entity: OverpaymentClaim
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5 3.585 B.2.c
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.585
              excerpt: "shall not establish a claim unless the amount of the claim is greater than $200, except in the following circumstances"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.585
              excerpt: "The overpayment is identified through a Federal or State level quality control review; or, The claim is being pursued as and results in an IPV."
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          claim_amount > claim_establishment_threshold_amount
          or claim_identified_through_federal_or_state_quality_control_review
          or claim_is_pursued_as_and_results_in_ipv
