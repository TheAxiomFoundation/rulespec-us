format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.554
  summary: |-
    “Clients shall receive written timely notice, giving at least eleven (11) calendar days advance notice before any adverse action”; adequate notice applies in the listed circumstances, including verified probable fraud or intentional program violation, for which prior notice shall be mailed at least five (5) calendar days before the proposed effective date.
rules:
  - name: timely_notice_advance_calendar_days
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5 §3.554(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.554
              excerpt: "at least eleven (11) calendar days advance notice"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          11

  - name: probable_fraud_prior_notice_calendar_days
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5 §3.554(C)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.554
              excerpt: "prior notice shall be mailed at least five (5) calendar days"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          5

  - name: adequate_notice_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5 §3.554(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.554
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          verified_probable_fraud_or_intentional_program_violation_overpayment
          or state_prescribed_medical_certification_expired
          or client_stopped_receiving_hca_and_now_receives_hcbs
          or client_has_died
          or client_clearly_stated_no_longer_wishes_to_receive_assistance_or_services
          or client_begins_receiving_ssi_or_ssdi
          or application_or_redetermination_certification_period_not_yet_set

  - name: timely_notice_required_before_adverse_action
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5 §3.554(B)-(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.554
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.554
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          adverse_grant_payment_action_during_certification_period
          and not adequate_notice_required

  - name: timely_notice_timing_requirement_met
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5 §3.554(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.554
              excerpt: "giving at least eleven (11) calendar days advance notice before any adverse action"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          not timely_notice_required_before_adverse_action
          or calendar_days_from_notice_to_proposed_effective_date >= timely_notice_advance_calendar_days

  - name: probable_fraud_prior_notice_timing_requirement_met
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5 §3.554(C)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.554
              excerpt: "prior notice shall be mailed at least five (5) calendar days before the proposed effective date"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          not verified_probable_fraud_or_intentional_program_violation_overpayment
          or calendar_days_from_notice_to_proposed_effective_date >= probable_fraud_prior_notice_calendar_days
