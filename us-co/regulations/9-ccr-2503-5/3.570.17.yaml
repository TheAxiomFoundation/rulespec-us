format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.570.17
  summary: |-
    “Following the notice procedures outlined in Section 3.554, denial and/or discontinuation from the HCA program shall occur” for stated financial, functional, service, facility, safety, cost-effectiveness, living-arrangement, relocation, voluntary-withdrawal, and death reasons.
rules:
  - name: hca_denial_or_discontinuation_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5 § 3.570.17(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.570.17
              excerpt: "denial and/or discontinuation from the HCA program shall occur for the following reasons"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          not client_is_financially_eligible_for_hca
          or not client_is_functionally_eligible_for_hca
          or client_does_not_meet_hca_functional_capacity_score_minimum
          or client_does_not_meet_hca_paid_care_score_criteria
          or client_has_hca_receipt_of_services_disqualification
          or client_has_hca_facility_status_disqualification
          or client_cannot_be_safely_served_by_available_hca_services
          or client_has_more_cost_effective_available_alternative
          or client_has_hca_living_arrangement_disqualification
          or client_has_moved_out_of_state
          or client_has_requested_hca_program_withdrawal
          or client_has_died
