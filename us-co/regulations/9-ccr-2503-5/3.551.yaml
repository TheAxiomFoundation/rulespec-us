format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.551
  summary: |-
    A case is discontinued when the redetermination packet is not returned by the last day of the expiring eligibility period. A packet returned within 30 calendar days after discontinuation is reinstated without a payment break if the client has good cause; otherwise it is processed as a new application with a payment break. A packet returned 31 or more days after discontinuation requires a new application and a payment break.
rules:
  - name: timely_return_after_discontinuation_window_days
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5 §3.551(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.551
              excerpt: within thirty (30) calendar days after discontinuation
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          30

  - name: good_cause_redetermination_action_deadline_days
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5 §3.551(A)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.551
              excerpt: ten (10) days to act on such redeterminations
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          10

  - name: timely_returned_redetermination_decision_deadline_days
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5 §3.551(A)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.551
              excerpt: within thirty (30) days from receipt
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          30

  - name: late_return_after_discontinuation_threshold_days
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5 §3.551(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.551
              excerpt: thirty-one (31) or more days after the discontinuation
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          31

  - name: case_discontinued_for_unreturned_redetermination
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5 §3.551
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.551
              excerpt: fails to return his or her redetermination packet by the last day of the month of the expiring eligibility period
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          redetermination_packet_not_returned_by_expiring_eligibility_period_end

  - name: packet_returned_within_post_discontinuation_window
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5 §3.551(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.551
              excerpt: returns the redetermination packet within thirty (30) calendar days after discontinuation
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          redetermination_packet_not_returned_by_expiring_eligibility_period_end
          and redetermination_packet_returned_after_discontinuation
          and days_after_discontinuation <= timely_return_after_discontinuation_window_days

  - name: grant_payments_reinstated_without_break_for_good_cause
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5 §3.551(A)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.551
              excerpt: If the client has good cause, the client's grant payments shall be reinstated. There shall be no break in the client's grant payments.
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          packet_returned_within_post_discontinuation_window
          and client_has_good_cause

  - name: county_action_within_deadline_for_good_cause_redetermination
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5 §3.551(A)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.551
              excerpt: The county department will have ten (10) days to act on such redeterminations.
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          packet_returned_within_post_discontinuation_window
          and client_has_good_cause
          and county_action_days_after_redetermination_receipt <= good_cause_redetermination_action_deadline_days

  - name: county_decision_within_deadline_for_timely_returned_redetermination
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5 §3.551(A)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.551
              excerpt: must make an eligibility decision on redetermination forms received within thirty (30) calendar days after discontinuation within thirty (30) days from receipt
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          packet_returned_within_post_discontinuation_window
          and county_decision_days_after_redetermination_receipt <= timely_returned_redetermination_decision_deadline_days

  - name: timely_return_without_good_cause_processed_as_new_application
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5 §3.551(A)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.551
              excerpt: If the client does not have good cause, the county department shall use the redetermination packet as a new application.
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          packet_returned_within_post_discontinuation_window
          and not client_has_good_cause

  - name: interview_required_for_timely_return_without_good_cause
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5 §3.551(A)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.551
              excerpt: An interview is required.
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          timely_return_without_good_cause_processed_as_new_application

  - name: traditional_verification_required_for_timely_return_without_good_cause
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5 §3.551(A)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.551
              excerpt: traditional verification methods must be used
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          timely_return_without_good_cause_processed_as_new_application

  - name: grant_payment_break_required_for_timely_return_without_good_cause
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5 §3.551(A)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.551
              excerpt: There shall be a break in the client's grant payments.
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          timely_return_without_good_cause_processed_as_new_application

  - name: late_return_requires_new_application
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5 §3.551(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.551
              excerpt: returns the redetermination packet thirty-one (31) or more days after the discontinuation, the county department shall require the client to complete a new application
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          redetermination_packet_not_returned_by_expiring_eligibility_period_end
          and redetermination_packet_returned_after_discontinuation
          and days_after_discontinuation >= late_return_after_discontinuation_threshold_days

  - name: grant_payment_break_required_for_late_return
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5 §3.551(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.551
              excerpt: This will result in a break in the client's grant payments.
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          late_return_requires_new_application
