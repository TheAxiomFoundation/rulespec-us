format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.782
  summary: |-
    "Earned income is gross monetary wages received for services performed as an employee or as profit from self-employment." In-kind income received for services is earned income; its considered amount is the supplied value, or current market value if no value is provided.
rules:
  - name: gross_monetary_earned_income
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: USD
    source: 9 CCR 2503-5, § 3.520.782(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.782
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          gross_monetary_wages_received_for_employee_services + profit_from_self_employment

  - name: in_kind_income_is_earned_income
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5, § 3.520.782(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.782
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          in_kind_income_received_for_employee_services_or_self_employment

  - name: in_kind_income_amount_considered_as_earned_income
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: USD
    source: 9 CCR 2503-5, § 3.520.782(B)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.782
              excerpt: "value of the item supplied. The current market value ... is used if the value ... is not provided."
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          if in_kind_income_received_for_employee_services_or_self_employment:
            if value_of_in_kind_item_is_provided: value_of_in_kind_item_supplied else: current_market_value_of_in_kind_item
          else: 0

  - name: total_earned_income_including_in_kind_income
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: USD
    source: 9 CCR 2503-5, § 3.520.782(A)-(B)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.782
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          gross_monetary_earned_income + in_kind_income_amount_considered_as_earned_income
