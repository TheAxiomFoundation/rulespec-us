format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.553
  summary: |-
    “If a change is reported and verified by the tenth (10th) of the month following the date of the change, the change shall be considered timely reported by the client.” “The county department shall process the change within ten (10) calendar days from the date the change was verified.” For OAP, AND-CS, and HCA, no claim is generated where an overpaid client's system-determined benefit is below the program payment floor.
rules:
  - name: client_reporting_tenth_day_of_following_month
    kind: parameter
    dtype: Integer
    source: 9 CCR 2503-5 § 3.553(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.553
              excerpt: "by the tenth (10th) of the month following"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          10

  - name: county_change_processing_deadline_calendar_days
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5 § 3.553(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.553
              excerpt: "within ten (10) calendar days from the date the change was verified"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          10

  - name: client_change_timely_reported
    kind: derived
    entity: PublicAssistanceCase
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5 § 3.553(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.553
              excerpt: "If a change is reported and verified by the tenth (10th) of the month following the date of the change"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.553
              excerpt: "the tenth (10th)"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          change_was_reported_and_verified_in_month_following_change_or_earlier
          and day_of_month_change_was_verified <= client_reporting_tenth_day_of_following_month

  - name: county_change_timely_processed
    kind: derived
    entity: PublicAssistanceCase
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5 § 3.553(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.553
              excerpt: "process the change within ten (10) calendar days from the date the change was verified"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.553
              excerpt: "within ten (10) calendar days"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          change_was_verified
          and calendar_days_from_verification_to_processing <= county_change_processing_deadline_calendar_days

  - name: overpayment_claim_establishment_required
    kind: derived
    entity: PublicAssistanceCase
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5 § 3.553(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.553
              excerpt: "If grant payments are overpaid because a client fails to timely report and/or timely verify changes"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          client_is_overpaid
          and (
            client_failed_to_timely_report_change
            or client_failed_to_timely_verify_change
          )

  - name: payment_floor_claim_generation_barred
    kind: derived
    entity: PublicAssistanceCase
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5 § 3.553(E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.553
              excerpt: "For OAP, AND-CS, and HCA, if a client is overpaid and the system determined benefit is below the payment floor ... a claim will not be generated."
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          client_is_overpaid
          and client_program_is_oap_and_cs_or_hca
          and system_determined_benefit_is_below_program_payment_floor
