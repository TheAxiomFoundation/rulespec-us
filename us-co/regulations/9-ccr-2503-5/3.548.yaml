format: rulespec/v1
imports:
- us-co:regulations/9-ccr-2503-5/3.546#and_cs_total_grant_standard
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.548
  summary: AND-CS grants shall be calculated on an individual basis with just one
    client per case. The authorized AND-CS grant payment is determined by deducting
    the client's total countable income from the AND-CS grant standard, with first-month
    proration when eligibility is determined after the first day of the month. PNA
    eligibility requires program requirements and at least thirty (30) consecutive
    days in listed facilities; inmates and residents in unlicensed or uncertified
    facilities are not eligible for PNA or AND-CS grant payments. The AND-CS PNA maximum
    is seventy-nine dollars ($79) effective October 1, 2016, and SSI recovery for
    overpayment uses the gross SSI payment.
rules:
- name: and_cs_client_eligible_for_grant_payment
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: 9 CCR 2503-5 3.548 B, E
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: predicate
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.548
          excerpt: When a client has been found eligible
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.548
          excerpt: The following persons are not eligible for a PNA or AND-CS grant
            payments
  versions:
  - effective_from: '2016-10-01'
    formula: 'client_has_been_found_eligible_for_and_cs

      and not client_is_inmate_in_penal_institution

      and not client_is_resident_in_unlicensed_or_uncertified_facility'
- name: and_cs_counted_ssi_payment_for_grant_calculation
  kind: derived
  entity: Person
  dtype: Money
  period: Month
  unit: USD
  source: 9 CCR 2503-5 3.548 G
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.548
          excerpt: AND-CS shall be calculated based on the gross SSI payment and not
            the received amount.
  versions:
  - effective_from: '2016-10-01'
    formula: 'if ssa_is_recovering_ssi_payment_due_to_overpayment: gross_ssi_payment_amount
      else: ssi_payment_received_amount'
- name: and_cs_total_countable_income_for_grant_calculation
  kind: derived
  entity: Person
  dtype: Money
  period: Month
  unit: USD
  source: 9 CCR 2503-5 3.548 B, G
  metadata:
    proof:
      atoms:
      - kind: import
        path: versions[0].formula
        import:
          target: us-co:regulations/9-ccr-2503-5/3.548#and_cs_counted_ssi_payment_for_grant_calculation
          output: and_cs_counted_ssi_payment_for_grant_calculation
          hash: sha256:local
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.548
          excerpt: deducting the client's total countable income ... based on the
            gross SSI payment
  versions:
  - effective_from: '2016-10-01'
    formula: max(0, client_countable_income_other_than_ssi_for_and_cs) + max(0, and_cs_counted_ssi_payment_for_grant_calculation)
- name: and_cs_authorized_grant_payment
  kind: derived
  entity: Person
  dtype: Money
  period: Month
  unit: USD
  source: 9 CCR 2503-5 3.548 A, B, E
  metadata:
    proof:
      atoms:
      - kind: import
        path: versions[0].formula
        import:
          target: us-co:regulations/9-ccr-2503-5/3.546#and_cs_total_grant_standard
          output: and_cs_total_grant_standard
          hash: sha256:a3785d093a214f42b55cfaa9d4bd0e0129a5ccf131d32196a74d6c21deb7c462
      - kind: import
        path: versions[0].formula
        import:
          target: us-co:regulations/9-ccr-2503-5/3.548#and_cs_client_eligible_for_grant_payment
          output: and_cs_client_eligible_for_grant_payment
          hash: sha256:local
      - kind: import
        path: versions[0].formula
        import:
          target: us-co:regulations/9-ccr-2503-5/3.548#and_cs_total_countable_income_for_grant_calculation
          output: and_cs_total_countable_income_for_grant_calculation
          hash: sha256:local
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.548
          excerpt: determined by deducting the client's total countable income from
            the AND-CS grant standard
  versions:
  - effective_from: '2016-10-01'
    formula: 'if and_cs_client_eligible_for_grant_payment: max(0, and_cs_total_grant_standard
      - and_cs_total_countable_income_for_grant_calculation) else: 0'
- name: and_cs_first_month_grant_payment
  kind: derived
  entity: Person
  dtype: Money
  period: Month
  unit: USD
  source: 9 CCR 2503-5 3.548 B(1)-(2)
  metadata:
    proof:
      atoms:
      - kind: import
        path: versions[0].formula
        import:
          target: us-co:regulations/9-ccr-2503-5/3.548#and_cs_client_eligible_for_grant_payment
          output: and_cs_client_eligible_for_grant_payment
          hash: sha256:local
      - kind: import
        path: versions[0].formula
        import:
          target: us-co:regulations/9-ccr-2503-5/3.548#and_cs_authorized_grant_payment
          output: and_cs_authorized_grant_payment
          hash: sha256:local
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.548
          excerpt: If determined eligible on any other day of the month, the client's
            first month grant payment shall be prorated according to the number of
            days remaining in the month
  versions:
  - effective_from: '2016-10-01'
    formula: "if not and_cs_client_eligible_for_grant_payment:\n  0\nelse:\n  if client_eligibility_determined_on_first_day_of_month:\n\
      \    and_cs_authorized_grant_payment\n  else:\n    and_cs_authorized_grant_payment\
      \ * fraction_of_month_remaining_at_and_cs_eligibility_determination"
- name: and_cs_pna_minimum_consecutive_facility_residence_days
  kind: parameter
  dtype: Count
  source: 9 CCR 2503-5 3.548 D
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.548
          excerpt: at least thirty (30) consecutive days
  versions:
  - effective_from: '2016-10-01'
    formula: '30'
- name: and_cs_facility_residence_condition_met
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: 9 CCR 2503-5 3.548 D
  metadata:
    proof:
      atoms:
      - kind: import
        path: versions[0].formula
        import:
          target: us-co:regulations/9-ccr-2503-5/3.548#and_cs_pna_minimum_consecutive_facility_residence_days
          output: and_cs_pna_minimum_consecutive_facility_residence_days
          hash: sha256:local
      - path: versions[0].formula
        kind: predicate
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.548
          excerpt: resident of a facility for at least thirty (30) consecutive days
            ... In a general medical and surgical hospital ... In a nursing home ...
            or Adult Financial approved setting.
  versions:
  - effective_from: '2016-10-01'
    formula: "client_consecutive_days_resident_in_facility >= and_cs_pna_minimum_consecutive_facility_residence_days\n\
      and (\n  client_is_resident_in_general_medical_and_surgical_hospital\n  or client_is_resident_in_long_term_care_or_adult_financial_approved_setting\n\
      )"
- name: and_cs_pna_eligible_for_month
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: 9 CCR 2503-5 3.548 D, E
  metadata:
    proof:
      atoms:
      - kind: import
        path: versions[0].formula
        import:
          target: us-co:regulations/9-ccr-2503-5/3.548#and_cs_facility_residence_condition_met
          output: and_cs_facility_residence_condition_met
          hash: sha256:local
      - path: versions[0].formula
        kind: predicate
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.548
          excerpt: eligible for a monthly Personal Needs Allowance (PNA) when program
            requirements are met
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.548
          excerpt: Inmates in a penal institution; or, Residents in an unlicensed
            private or uncertified public facility.
  versions:
  - effective_from: '2016-10-01'
    formula: 'client_meets_program_requirements_for_pna

      and and_cs_facility_residence_condition_met

      and not client_is_inmate_in_penal_institution

      and not client_is_resident_in_unlicensed_or_uncertified_facility'
- name: and_cs_pna_maximum_monthly_amount
  kind: parameter
  dtype: Money
  unit: USD
  source: 9 CCR 2503-5 3.548 F
  metadata:
    proof:
      atoms:
      - path: versions[0].effective_from
        kind: effective_period
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.548
          excerpt: effective October 1, 2016
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.548
          excerpt: Personal Needs Allowance maximum shall be seventy-nine dollars
            ($79)
  versions:
  - effective_from: '2016-10-01'
    formula: '79'
- name: and_cs_grant_reduction_to_pna_applies
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: 9 CCR 2503-5 3.548 F
  metadata:
    proof:
      atoms:
      - kind: import
        path: versions[0].formula
        import:
          target: us-co:regulations/9-ccr-2503-5/3.548#and_cs_pna_eligible_for_month
          output: and_cs_pna_eligible_for_month
          hash: sha256:local
      - path: versions[0].formula
        kind: ordering
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.548
          excerpt: The AND-CS grant shall not be reduced until the month following
            the first full calendar month that the client is a resident in an approved
            facility.
  versions:
  - effective_from: '2016-10-01'
    formula: 'and_cs_pna_eligible_for_month

      and client_is_in_month_following_first_full_calendar_month_resident_in_approved_facility'
- name: and_cs_grant_payment_after_pna_reduction
  kind: derived
  entity: Person
  dtype: Money
  period: Month
  unit: USD
  source: 9 CCR 2503-5 3.548 F
  metadata:
    proof:
      atoms:
      - kind: import
        path: versions[0].formula
        import:
          target: us-co:regulations/9-ccr-2503-5/3.548#and_cs_grant_reduction_to_pna_applies
          output: and_cs_grant_reduction_to_pna_applies
          hash: sha256:local
      - kind: import
        path: versions[0].formula
        import:
          target: us-co:regulations/9-ccr-2503-5/3.548#and_cs_authorized_grant_payment
          output: and_cs_authorized_grant_payment
          hash: sha256:local
      - kind: import
        path: versions[0].formula
        import:
          target: us-co:regulations/9-ccr-2503-5/3.548#and_cs_pna_maximum_monthly_amount
          output: and_cs_pna_maximum_monthly_amount
          hash: sha256:local
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.548
          excerpt: Personal Needs Allowance maximum shall be seventy-nine dollars
            ($79) ... grant shall not be reduced until the month following the first
            full calendar month
  versions:
  - effective_from: '2016-10-01'
    formula: 'if and_cs_grant_reduction_to_pna_applies: min(and_cs_authorized_grant_payment,
      and_cs_pna_maximum_monthly_amount) else: and_cs_authorized_grant_payment'
