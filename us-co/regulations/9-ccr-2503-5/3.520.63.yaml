format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.63
  summary: |-
    If divorced, legally separated, or widowed status is questionable, the client shall provide specified verification. Clients not legally separated or divorced are considered married.
rules:
  - name: client_marital_status_verification_requirement_satisfied
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5, § 3.520.63(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.63
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          not marital_status_is_questionable
          or (
            (
              (client_is_divorced or client_is_legally_separated)
              and (
                legal_court_documents_substantiate_divorce_or_legal_separation
                or vital_statistic_source_substantiates_divorce_or_legal_separation
              )
            )
            or (
              client_is_widowed
              and (client_spouse_death_certificate_viewed or client_spouse_obituary_viewed)
            )
          )
  - name: client_is_considered_married
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5, § 3.520.63(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.63
              excerpt: Clients who are not legally separated or divorced are considered married.
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          not client_is_legally_separated
          and not client_is_divorced
