format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.570.42
  summary: |-
    “Legally responsible person(s)” means a decedent’s spouse, or parent of an unemancipated decedent under age eighteen, who bears legal responsibility for burial expenses. “Burial services” include storage of cremated remains for no more than one hundred twenty days when the remains are not buried and are not claimed by the client’s family or friends.
rules:
  - name: legal_responsibility_minor_age_limit
    kind: parameter
    dtype: Integer
    source: 9 CCR 2503-5 § 3.570.42, definition of “Legally responsible person(s)”
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.570.42
              excerpt: "unemancipated minor who is under the age of eighteen"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          18

  - name: maximum_storage_days_for_unclaimed_cremated_remains
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5 § 3.570.42, definition of “Burial services,” paragraph B
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.570.42
              excerpt: "for no more than one hundred twenty (120) days"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          120

  - name: person_is_legally_responsible_for_burial_expenses
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5 § 3.570.42, definition of “Legally responsible person(s)”
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.570.42
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          person_bears_legal_responsibility_for_burial_expenses
          and (
            person_is_decedents_spouse
            or (
              person_is_decedents_parent
              and decedent_is_unemancipated
              and decedent_age_in_years < legal_responsibility_minor_age_limit
            )
          )

  - name: storage_qualifies_as_burial_service
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5 § 3.570.42, definition of “Burial services,” paragraph B
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.570.42
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          body_is_stored_prior_to_final_disposition
          or (
            cremated_remains_are_stored
            and cremated_remains_storage_days <= maximum_storage_days_for_unclaimed_cremated_remains
            and cremated_remains_are_not_buried
            and cremated_remains_are_not_claimed_by_clients_family_or_friends
          )
