format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.4
  summary: |-
    "The county department shall process applications as expeditiously as possible but no later than forty-five (45) calendar days following the date the application was filed." Written interview notice is required at least four calendar days before the interview unless waived as stated. Verification requests generally allow eleven calendar days for return, and no more than one interview may be required per application.
rules:
  - name: application_processing_deadline_calendar_days
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5 § 3.520.4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.4
              excerpt: "no later than forty-five (45) calendar days"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          45

  - name: interview_written_notice_minimum_lead_time_calendar_days
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5 § 3.520.4.C.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.4
              excerpt: "at least four (4) calendar days"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          4

  - name: maximum_interviews_per_application
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5 § 3.520.4.C.5
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.4
              excerpt: "require no more than one interview per application"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          1

  - name: verification_return_deadline_calendar_days
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5 § 3.520.4.D.1.b
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.4
              excerpt: "eleven (11) calendar days from the date the verification was requested in writing"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          11

  - name: adult_financial_existing_application_reuse_window_calendar_days
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5 § 3.520.4.C.5.b
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.4
              excerpt: "received within sixty (60) calendar days of the request"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          60

  - name: missed_interview_continuation_window_calendar_days
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5 § 3.520.4.C.6.a
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.4
              excerpt: "within thirty (30) calendar days of the denial"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          30

  - name: changed_circumstances_reuse_window_calendar_days
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5 § 3.520.4.D.4.a.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.4
              excerpt: "occurred within thirty (30) calendar days of the denial"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          30

  - name: delayed_verification_reuse_window_calendar_days
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5 § 3.520.4.D.5
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.4
              excerpt: "within thirty (30) calendar days of the denial or discontinuation"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          30

  - name: incorrect_value_reevaluation_request_window_calendar_days
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5 § 3.520.4.D.6
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.4
              excerpt: "within thirty (30) calendar days of the denial"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          30

  - name: client_change_reporting_cutoff_day_of_month
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5 § 3.520.4.C.4.e.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.4
              excerpt: "by the 10th of the month following the month in which the change occurred"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          10

  - name: application_processing_deadline_requirement_met
    kind: derived
    entity: Application
    dtype: Judgment
    period: Day
    source: 9 CCR 2503-5 § 3.520.4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.4
              excerpt: "no later than forty-five (45) calendar days following the date the application was filed"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          calendar_days_following_filing_until_application_processed <= application_processing_deadline_calendar_days

  - name: interview_written_notice_requirement_met
    kind: derived
    entity: Application
    dtype: Judgment
    period: Day
    source: 9 CCR 2503-5 § 3.520.4.C.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.4
              excerpt: "The client may provide a written or verbal waiver"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          calendar_days_of_written_notice_before_scheduled_interview >= interview_written_notice_minimum_lead_time_calendar_days
          or (
            client_provided_written_or_verbal_interview_notice_waiver
            and county_can_conduct_interview_during_application_processing
          )

  - name: interview_count_requirement_met
    kind: derived
    entity: Application
    dtype: Judgment
    period: Day
    source: 9 CCR 2503-5 § 3.520.4.C.5
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.4
              excerpt: "County departments shall require no more than one interview per application."
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          number_of_interviews_required_for_application <= maximum_interviews_per_application

  - name: verification_request_return_deadline_requirement_met
    kind: derived
    entity: Application
    dtype: Judgment
    period: Day
    source: 9 CCR 2503-5 § 3.520.4.D.1.b
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.4
              excerpt: "The due date for when the verifications must be returned, which shall be eleven (11) calendar days"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          calendar_days_allowed_for_requested_verifications == verification_return_deadline_calendar_days
