format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.742
  summary: "\u201CTo determine the equity value of personal property, first determine\
    \ the actual value; then subtract encumbrances.\u201D A vehicle not found in recognized\
    \ guides is presumed to be worth $400 unless questionable. Personal property that\
    \ cannot be sold for two-thirds of actual value may be exempted while reasonable\
    \ sale efforts continue; a rejected offer of at least two-thirds requires counting\
    \ the entire equity value."
rules:
- name: vehicle_presumed_value_when_not_in_recognized_guides
  kind: parameter
  dtype: Money
  unit: USD
  source: 9 CCR 2503-5, 3.520.742(B)(1)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.742
          excerpt: presumed that the value of the vehicle is four hundred dollars
            ($400)
  versions:
  - effective_from: '2016-10-01'
    formula: '400'
- name: reasonable_personal_property_sale_price_numerator
  kind: parameter
  dtype: Integer
  source: 9 CCR 2503-5, 3.520.742(C)(1)-(3)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.742
          excerpt: two-thirds of the actual value
  versions:
  - effective_from: '2016-10-01'
    formula: '2'
- name: reasonable_personal_property_sale_price_denominator
  kind: parameter
  dtype: Integer
  source: 9 CCR 2503-5, 3.520.742(C)(1)-(3)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.742
          excerpt: two-thirds of the actual value
  versions:
  - effective_from: '2016-10-01'
    formula: '3'
- name: vehicle_actual_value_from_recognized_guide_or_presumption
  kind: derived
  entity: Asset
  dtype: Money
  period: Month
  unit: USD
  source: 9 CCR 2503-5, 3.520.742(B)(1)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: default
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.742
          excerpt: trade-in fair condition value ... Unless questionable ... four
            hundred dollars ($400)
  versions:
  - effective_from: '2016-10-01'
    formula: 'if vehicle_trade_in_value_found_in_recognized_guide: vehicle_trade_in_fair_condition_value
      else: vehicle_presumed_value_when_not_in_recognized_guides'
- name: personal_property_equity_value
  kind: derived
  entity: Asset
  dtype: Money
  period: Month
  unit: USD
  source: 9 CCR 2503-5, 3.520.742(A)(3)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.742
          excerpt: first determine the actual value; then subtract encumbrances
  versions:
  - effective_from: '2016-10-01'
    formula: max(0, personal_property_actual_value - documented_personal_property_encumbrances)
- name: reasonable_personal_property_sale_price
  kind: derived
  entity: Asset
  dtype: Money
  period: Month
  unit: USD
  source: 9 CCR 2503-5, 3.520.742(C)(1)-(3)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.742
          excerpt: two-thirds of the actual value
  versions:
  - effective_from: '2016-10-01'
    formula: personal_property_actual_value * reasonable_personal_property_sale_price_numerator
      / reasonable_personal_property_sale_price_denominator
- name: personal_property_rejected_qualifying_offer_requires_counting_equity
  kind: derived
  entity: Asset
  dtype: Judgment
  period: Month
  source: 9 CCR 2503-5, 3.520.742(C)(2)-(3)(c)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.742
          excerpt: receives an offer for at least two-thirds of the actual value and
            refuses to sell
  versions:
  - effective_from: '2016-10-01'
    formula: 'client_rejected_qualifying_sale_offer

      and offered_personal_property_sale_price >= reasonable_personal_property_sale_price'
- name: personal_property_countable_equity_after_rejected_qualifying_offer
  kind: derived
  entity: Asset
  dtype: Money
  period: Month
  unit: USD
  source: 9 CCR 2503-5, 3.520.742(C)(3)(c)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.742
          excerpt: the entire equity value of the property shall be considered a countable
            resource
  versions:
  - effective_from: '2016-10-01'
    formula: 'if personal_property_rejected_qualifying_offer_requires_counting_equity:
      personal_property_equity_value else: 0'
- name: personal_property_exempt_when_continuing_sale_efforts
  kind: derived
  entity: Asset
  dtype: Judgment
  period: Month
  source: 9 CCR 2503-5, 3.520.742(C)(3)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.742
          excerpt: cannot sell the property for two-thirds ... provided there continues
            to be reasonable efforts to sell
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.520.742
          excerpt: shall not be exempted if ... is not making a reasonable effort
            to sell
  versions:
  - effective_from: '2016-10-01'
    formula: 'unable_to_sell_personal_property_for_reasonable_sale_price

      and continuing_reasonable_efforts_to_sell_personal_property

      and county_determines_reasonable_sale_effort

      and not personal_property_rejected_qualifying_offer_requires_counting_equity'
