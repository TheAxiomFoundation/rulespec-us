format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.541.3
  summary: |-
    A client with alcoholism or controlled substance addiction is limited to twelve cumulative lifetime months when substance abuse is identified on the medical certification form. Treatment termination and two positive tests in any three-month period require discontinuance effective the following month.
rules:
  - name: maximum_cumulative_lifetime_and_so_assistance_months
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5, § 3.541.3(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.541.3
              excerpt: "twelve (12) cumulative months in a lifetime"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          12

  - name: treatment_center_termination_reporting_deadline_hours
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5, § 3.541.3(D)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.541.3
              excerpt: "within twenty-four (24) hours"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          24

  - name: repeated_positive_test_count_threshold
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5, § 3.541.3(F)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.541.3
              excerpt: "tests positive ... twice"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          2

  - name: repeated_positive_test_observation_period_months
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5, § 3.541.3(F)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.541.3
              excerpt: "in any three-month period"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          3

  - name: client_within_lifetime_and_so_assistance_limit
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5, § 3.541.3(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.541.3
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/9-ccr-2503-5/3.541.3#maximum_cumulative_lifetime_and_so_assistance_months
              output: maximum_cumulative_lifetime_and_so_assistance_months
              hash: sha256:local
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          client_has_primary_diagnosis_of_alcoholism_or_controlled_substance_addiction
          and substance_abuse_is_identified_on_medical_certification_form
          and client_cumulative_lifetime_and_so_assistance_months <= maximum_cumulative_lifetime_and_so_assistance_months

  - name: client_partial_month_counts_toward_lifetime_assistance_limit
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5, § 3.541.3(G)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.541.3
              excerpt: "initial partial month is not counted"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.541.3
              excerpt: "partial months after re-approval will count as a full month"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          not client_is_in_initial_partial_month
          or client_was_discontinued_and_subsequently_reapproved

  - name: treatment_center_complies_with_termination_reporting_deadline
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5, § 3.541.3(D)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.541.3
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/9-ccr-2503-5/3.541.3#treatment_center_termination_reporting_deadline_hours
              output: treatment_center_termination_reporting_deadline_hours
              hash: sha256:local
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          not client_has_primary_diagnosis_of_alcoholism_or_controlled_substance_addiction
          or not client_was_terminated_from_treatment
          or treatment_center_contact_hours_after_client_termination <= treatment_center_termination_reporting_deadline_hours

  - name: client_and_so_assistance_must_be_discontinued_after_treatment_termination
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5, § 3.541.3(D)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.541.3
              excerpt: "discontinue the client's AND-SO assistance immediately upon termination from treatment effective the following month"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          client_has_primary_diagnosis_of_alcoholism_or_controlled_substance_addiction
          and client_was_terminated_from_treatment
          and current_month_follows_client_treatment_termination

  - name: client_and_so_assistance_must_be_discontinued_for_repeated_positive_tests
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5, § 3.541.3(F)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.541.3
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/9-ccr-2503-5/3.541.3#repeated_positive_test_count_threshold
              output: repeated_positive_test_count_threshold
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/9-ccr-2503-5/3.541.3#repeated_positive_test_observation_period_months
              output: repeated_positive_test_observation_period_months
              hash: sha256:local
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          client_has_primary_diagnosis_of_alcoholism_or_controlled_substance_addiction
          and client_positive_alcohol_or_controlled_substance_test_count >= repeated_positive_test_count_threshold
          and client_positive_test_observation_period_in_months == repeated_positive_test_observation_period_months
          and current_month_follows_repeated_positive_test
