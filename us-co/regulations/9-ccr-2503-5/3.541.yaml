format: rulespec/v1
imports:
  - us-co:regulations/9-ccr-2503-5/3.540.1#client_has_total_disability
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.541
  summary: |-
    “To qualify for AND-SO, the client must meet both the non-financial and financial eligibility requirements and have a total disability.” The client must be certified by a medical professional, have an SSA-listed disabling impairment, and have a total disability expected to last “six (6) months or longer.” The county department shall review and document medical data and review collected documentation to determine eligibility.
rules:
  - name: and_so_total_disability_minimum_expected_duration_months
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-5 § 3.541(A)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.541
              excerpt: expected to last six (6) months or longer
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          6

  - name: client_meets_and_so_total_disability_requirement
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5 § 3.541(A)(1)-(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.541
              excerpt: certified by a medical professional
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.541
              excerpt: physical or mental impairment that is disabling as identified by the SSA in the Listing of Impairments
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/9-ccr-2503-5/3.540.1#client_has_total_disability
              output: client_has_total_disability
              hash: sha256:cca364ce53536dde280549013d4a331d5740a4dc0370f8980e93de873e0e8728
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          client_has_total_disability
          and client_is_certified_by_medical_professional
          and client_has_ssa_listed_disabling_physical_or_mental_impairment
          and total_disability_expected_duration_months >= and_so_total_disability_minimum_expected_duration_months

  - name: client_qualifies_for_and_so
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-5 § 3.541(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.541
              excerpt: must meet both the non-financial and financial eligibility requirements
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-5/3.541
              excerpt: and have a total disability
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          client_meets_nonfinancial_eligibility_requirements
          and client_meets_financial_eligibility_requirements
          and client_meets_and_so_total_disability_requirement
