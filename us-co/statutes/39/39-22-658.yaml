format: rulespec/v1
imports:
  - us-co:statutes/39/39-22-657#material_advisor_must_maintain_transaction_list
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-658
  summary: |-
    “The penalty for the failure of a material advisor to disclose a reportable or listed transaction ... shall be up to twenty thousand dollars.” A material advisor that fails to make a required list available within twenty days after a written request is subject to “ten thousand dollars for each day” after that period.
  deferred_outputs:
    - output: us-co:statutes/39/39-22-658#failure_to_disclose_reportable_or_listed_transaction_penalty
      reason: The required disclosure duty under section 39-22-656 is unavailable as an executable RuleSpec dependency.
      source_values:
        - us-co:statutes/39/39-22-658#failure_to_disclose_penalty_maximum
    - output: us-co:statutes/39/39-22-658#false_or_incomplete_disclosure_additional_penalty
      reason: The required disclosure duty under section 39-22-656 is unavailable as an executable RuleSpec dependency.
      source_values:
        - us-co:statutes/39/39-22-658#false_or_incomplete_information_additional_penalty_maximum
rules:
  - name: failure_to_disclose_penalty_maximum
    kind: parameter
    dtype: Money
    unit: USD
    source: C.R.S. 39-22-658(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-658
              excerpt: "up to twenty thousand dollars"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          20000

  - name: false_or_incomplete_information_additional_penalty_maximum
    kind: parameter
    dtype: Money
    unit: USD
    source: C.R.S. 39-22-658(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-658
              excerpt: "an additional penalty shall be\nimposed of up to twenty thousand dollars"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          20000

  - name: list_request_response_period_days
    kind: parameter
    dtype: Count
    period: Day
    source: C.R.S. 39-22-658(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-658
              excerpt: "within a twenty-day\nperiod"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          20

  - name: daily_list_unavailability_penalty
    kind: parameter
    dtype: Money
    period: Day
    unit: USD
    source: C.R.S. 39-22-658(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-658
              excerpt: "a penalty of ten thousand dollars for each\nday"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10000

  - name: penalty_for_unavailable_required_list
    kind: derived
    entity: MaterialAdvisor
    dtype: Money
    period: Day
    unit: USD
    source: C.R.S. 39-22-658(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-658
              excerpt: "fails to make that list available to the department within a twenty-day\nperiod after the day on which the department mails a written request for that list,\nthe material advisor shall be subject to a penalty of ten thousand dollars for each\nday that the material advisor fails to make that list available to the department\nafter the expiration of the twenty-day period"
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-658
              excerpt: "ten thousand dollars for each\nday"
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:statutes/39/39-22-657#material_advisor_must_maintain_transaction_list
              output: material_advisor_must_maintain_transaction_list
              hash: sha256:da4be26d1e9b01645642960248bbab7bfa1dd49d30d1c2d4ffb4d9b971ae97c3
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if material_advisor_must_maintain_transaction_list and required_list_is_not_available_to_department:
            daily_list_unavailability_penalty * max(0, days_since_department_mailed_written_list_request - list_request_response_period_days)
          else: 0
