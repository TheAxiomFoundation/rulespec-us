format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-13-104
  summary: |-
    “The documentary fee imposed in this article shall not apply to” listed deeds and instruments. A governmental grantor or grantee must state consideration by affidavit or an equivalent document imprint when offering a deed for recording. “Exemption ... must be claimed at the time” of offering for recording.
  deferred_outputs:
    - output: us-co:statutes/39/39-13-104/c#public_trustees_deed_documentary_fee_exemption_applies
      reason: Whether a public trustee's deed was executed pursuant to section 38-38-501 depends on an unavailable upstream source.
    - output: us-co:statutes/39/39-13-104/n#documentary_fee_exemption
      reason: Subparagraph (n) is repealed and provides no operative exemption.
rules:
  - name: governmental_deed_documentary_fee_exemption_applies
    kind: derived
    entity: Deed
    dtype: Judgment
    period: Year
    source: 39-13-104(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-13-104
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          united_states_or_colorado_governmental_entity_is_grantor_or_grantee

  - name: governmental_deed_consideration_filing_requirement_satisfied
    kind: derived
    entity: Deed
    dtype: Judgment
    period: Year
    source: 39-13-104(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-13-104
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (not united_states_or_colorado_governmental_entity_is_grantor_or_grantee)
          or (not deed_is_offered_for_recording)
          or consideration_affidavit_is_filed
          or consideration_is_imprinted_on_deed

