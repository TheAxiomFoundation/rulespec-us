format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-5602
  summary: |-
    For income tax years immediately following the specified written certification, the Colorado individual income tax return form must contain a line for individual taxpayers to designate an animal protection fund contribution.
rules:
  - name: animal_protection_fund_contribution_designation_line_required
    kind: derived
    entity: ColoradoIndividualIncomeTaxReturnForm
    dtype: Judgment
    period: Year
    source: C.R.S. 39-22-5602
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-22-5602
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          income_tax_year_immediately_follows_written_certification
          and certification_states_return_form_line_has_become_available
          and certification_states_animal_protection_fund_is_next_in_queue
