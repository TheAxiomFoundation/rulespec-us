format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-1-118
  summary: |-
    After repeal takes effect, delinquent taxes collected under a repealed general property-tax levy shall, when received by the state treasurer, be credited to the capital construction fund.
rules:
  - name: delinquent_tax_amount_credited_to_capital_construction_fund
    kind: derived
    entity: Payment
    dtype: Money
    period: Year
    unit: USD
    source: C.R.S. § 39-1-118
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-1-118
              excerpt: "After the repeal ... takes effect, delinquent taxes collected by county treasurers ... shall, when received by the state treasurer, be credited to the capital construction fund."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if general_property_tax_law_repeal_has_taken_effect
            and delinquent_tax_was_collected_by_county_treasurer_under_repealed_law_levy
            and delinquent_tax_payment_was_received_by_state_treasurer:
            delinquent_tax_amount
          else: 0
