format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-110.5
  summary: |-
    An individual stationed in another state while on active duty is presumed to have acquired legal residence there upon providing any listed evidence. The presumption may only be overcome by a preponderance of specific evidence clearly establishing that the individual did not intend to change residence and must be liberally construed in favor of changed residence.
rules:
  - name: other_state_legal_residence_presumption_arises
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 39-22-110.5(2)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-22-110.5
    versions:
      - effective_from: '2016-01-01'
        formula: |-
          individual_was_stationed_in_other_state_while_on_active_duty
          and (
            individual_provides_legal_residence_certificate_indicating_other_state
            or individual_provides_federal_w2_indicating_other_state_as_state_of_residence
            or individual_provides_proof_of_voter_registration_in_other_state
            or individual_provides_notification_to_colorado_of_intent_to_make_other_state_legal_residence
            or individual_provides_will_indicating_other_state_as_legal_residence
          )

  - name: other_state_legal_residence_presumption_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 39-22-110.5(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-22-110.5
    versions:
      - effective_from: '2016-01-01'
        formula: |-
          other_state_legal_residence_presumption_arises
          and not preponderance_of_specific_evidence_clearly_establishes_no_intent_to_change_residence_from_colorado
