format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-621
  summary: "\u201CTax means the net amount of tax required to be shown on the return\
    \ reduced by any amount paid on or before the date prescribed for payment of the\
    \ tax and by the amount of any credit against the tax which may be claimed on\
    \ the return.\u201D"
  deferred_outputs:
  - output: us-co:statutes/39/39-22-621/1#tax_underpayment_interest
    reason: The applicable interest rate is imposed under section 39-21-110.5, but
      no copied RuleSpec export for that rate is available.
  - output: us-co:statutes/39/39-22-621/2/a#late_filing_penalty
    reason: The penalty is imposed for a return-level failure; the supported entity
      model does not provide a return-level subject or relationship to identify the
      proper return and its continuing failure period.
    source_values:
    - us-co:statutes/39/39-22-621#late_filing_minimum_penalty
    - us-co:statutes/39/39-22-621#late_filing_initial_penalty_rate
    - us-co:statutes/39/39-22-621#late_filing_additional_monthly_penalty_rate
    - us-co:statutes/39/39-22-621#late_filing_penalty_rate_cap
  - output: us-co:statutes/39/39-22-621/2/b#late_payment_penalty
    reason: The penalty is imposed for a tax-payment failure and requires a tax-payment
      event and continuing failure period not represented by the supported structural
      entities.
    source_values:
    - us-co:statutes/39/39-22-621#late_payment_minimum_penalty
    - us-co:statutes/39/39-22-621#late_payment_initial_penalty_rate
    - us-co:statutes/39/39-22-621#late_payment_additional_monthly_penalty_rate
    - us-co:statutes/39/39-22-621#late_payment_penalty_rate_cap
  - output: us-co:statutes/39/39-22-621/2/d#fraudulent_or_willful_failure_to_file_penalty
    reason: The penalty is imposed on a return-level filing failure, but no return-level
      entity is available.
    source_values:
    - us-co:statutes/39/39-22-621#fraudulent_failure_to_file_minimum_penalty
    - us-co:statutes/39/39-22-621#fraudulent_failure_to_file_penalty_rate
  - output: us-co:statutes/39/39-22-621/2/e#fraudulent_frivolous_or_willfully_false_return_penalty
    reason: The penalty is imposed on a fraudulent, frivolous, or willfully false
      return, but no return-level entity is available.
    source_values:
    - us-co:statutes/39/39-22-621#false_return_minimum_penalty
    - us-co:statutes/39/39-22-621#false_return_penalty_rate
  - output: us-co:statutes/39/39-22-621/2/f#failure_to_pay_after_notice_penalty
    reason: The penalty depends on a notice-and-demand assessment process and demanded
      tax event not represented by the supported entity model.
    source_values:
    - us-co:statutes/39/39-22-621#failure_to_pay_after_notice_penalty_rate
  - output: us-co:statutes/39/39-22-621/2/g#fraudulent_failure_to_pay_penalty
    reason: The penalty depends on a fraudulent payment failure or willful evasion
      event not represented by the supported payment-event model.
    source_values:
    - us-co:statutes/39/39-22-621#fraudulent_failure_to_pay_penalty_rate
  - output: us-co:statutes/39/39-22-621/2/g.5#preparer_understatement_penalty
    reason: The provision assigns separate liability to preparers and, in specified
      circumstances, employers for each prepared return or refund claim; the required
      return-preparer relationship is unavailable.
    source_values:
    - us-co:statutes/39/39-22-621#preparer_understatement_penalty
  - output: us-co:statutes/39/39-22-621/2/h#negligence_deficiency_penalty
    reason: The penalty applies to a deficiency determination and requires an assessment-level
      deficiency subject not represented by the supported entity model.
    source_values:
    - us-co:statutes/39/39-22-621#negligence_deficiency_penalty_rate
  - output: us-co:statutes/39/39-22-621/2/i#cumulative_penalties
    reason: Cumulative assessment requires composition of penalty outputs deferred
      in this module.
  - output: us-co:statutes/39/39-22-621/2/j#penalty_or_interest_waiver_or_reduction
    reason: Waiver or reduction is discretionary upon the executive director's good-cause
      determination and recorded reasons.
  - output: us-co:statutes/39/39-22-621/2/k#estimated_tax_exception
    reason: The exception depends on whether estimated tax is required under sections
      39-22-605 and 39-22-606; copied context does not export that predicate.
  - output: us-co:statutes/39/39-22-621/3#criminal_penalties
    reason: Criminal punishment depends on offense-specific enforcement and conviction
      determinations under section 39-21-118.
  - output: us-co:statutes/39/39-22-621#late_payment_initial_penalty_rate
    reason: Generated rule used a local name that collides with a sibling RuleSpec
      export. This output is deferred until it can be encoded with a semantic branch-specific
      name without creating ambiguous sibling imports.
