format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-30-105.1
  summary: |-
    A taxpayer operating a business facility in an enterprise zone may receive employee credits; enhanced rural zones receive an additional credit. The section also establishes health-insurance, agricultural-processing, carryforward, employee-count, replacement-facility, and definitional rules.
  deferred_outputs:
    - output: us-co:statutes/39/39-30-105.1/a#enterprise_zone_business_facility_employee_credit
      reason: Employee-level eligibility, prior-year employment comparison, proration, and taxpayer credit aggregation require unsupported employee-to-business-facility relations and tax-liability mechanics.
      source_values:
        - us-co:statutes/39/39-30-105.1#enterprise_zone_employee_credit_amount
        - us-co:statutes/39/39-30-105.1#commercial_driver_outside_business_time_limit
        - us-co:statutes/39/39-30-105.1#employee_credit_maximum_consecutive_months
    - output: us-co:statutes/39/39-30-105.1/b#health_insurance_business_facility_employee_credit
      reason: The credit requires employee insurance-plan compliance, employer premium contributions, and the first two full income-tax-year location period.
      source_values:
        - us-co:statutes/39/39-30-105.1#health_insurance_employee_credit_amount
        - us-co:statutes/39/39-30-105.1#health_insurance_employer_contribution_minimum_rate
        - us-co:statutes/39/39-30-105.1#health_insurance_credit_initial_full_income_tax_years
    - output: us-co:statutes/39/39-30-105.1/b#business_facility_definition
      reason: The definition requires facility-use and leasing relationships not representable as a supported structural relation in this module.
    - output: us-co:statutes/39/39-30-105.1/c#business_facility_employee_definition
      reason: The definition requires employment-duration, seasonal-position, and weekly-hours relationships.
      source_values:
        - us-co:statutes/39/39-30-105.1#part_time_employee_weekly_hours_minimum
    - output: us-co:statutes/39/39-30-105.1/d#commencement_of_commercial_operations
      reason: The definition identifies the first taxable year in which a facility is available or capable of use and requires a temporal first-use relation.
    - output: us-co:statutes/39/39-30-105.1/e#facility_definition
      reason: The definition requires location, land, property, machinery, and facility-complex membership relations.
    - output: us-co:statutes/39/39-30-105.1/f#revenue_producing_enterprise_definition
      reason: The definition enumerates business activities whose classification requires an unsupported activity ontology.
    - output: us-co:statutes/39/39-30-105.1/4#unused_credit_carryforward
      reason: Carryforward and refund treatment depends on cited sections 24-46-104.3, 24-46-107, and 24-46-108, for which no executable RuleSpec targets are provided.
      source_values:
        - us-co:statutes/39/39-30-105.1#enterprise_zone_credit_carryforward_year_limit
        - us-co:statutes/39/39-30-105.1#enhanced_rural_zone_credit_carryforward_year_limit
rules:
  - name: enterprise_zone_employee_credit_amount
    kind: parameter
    dtype: Money
    unit: USD
    source: 39-30-105.1(1)(a)(I)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-30-105.1
              excerpt: "one thousand one hundred dollars per income tax year"
    versions:
      - effective_from: '2014-01-01'
        formula: |-
          1100
  - name: enhanced_rural_zone_additional_employee_credit_amount
    kind: parameter
    dtype: Money
    unit: USD
