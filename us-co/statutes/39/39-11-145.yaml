format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-11-145
  summary: |-
    The treasurer shall distribute proceeds to taxing jurisdictions in the proportion that each jurisdiction's preceding-calendar-year ad valorem taxes bear to total ad valorem taxes on the real estate.
rules:
  - name: real_estate_disposition_proceeds_for_taxing_jurisdiction
    kind: derived
    entity: TaxingJurisdiction
    dtype: Money
    period: Year
    unit: USD
    source: C.R.S. § 39-11-145
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-11-145
              excerpt: "in the same proportion that the ad valorem taxes levied by each taxing jurisdiction in the preceding calendar year bears to the total"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          net_proceeds_from_real_estate_disposition
          * ad_valorem_taxes_levied_by_taxing_jurisdiction_in_preceding_calendar_year
          / total_ad_valorem_taxes_levied_on_real_estate_in_preceding_calendar_year
