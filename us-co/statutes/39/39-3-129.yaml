format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-3-129
  summary: |-
    Except for household furnishings, a real property's valuation for assessment is prorated by the taxable portion of the taxable year when its tax-exempt status changes. For property partially used by a for-profit business, the administrator may determine the nonexempt actual value using square-foot area or, where more appropriate, hours of business use.
rules:
  - name: valuation_for_assessment_after_tax_status_change
    kind: derived
    entity: Asset
    dtype: Decimal
    period: Year
    source: C.R.S. 39-3-129(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-3-129
              excerpt: "the valuation for assessment of the real property shall be a proportion of the valuation for assessment of the real property for the entire taxable year based upon the ratio of the portion of the taxable year in which the property is taxable to the entire taxable year"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-3-129
              excerpt: "shall not be applicable to\nhousehold furnishings"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if property_tax_exempt_status_changed and not property_is_household_furnishing:
            valuation_for_assessment_for_entire_taxable_year * taxable_portion_of_taxable_year / entire_taxable_year_duration
          else: 0
  - name: nonexempt_actual_value_from_business_use
    kind: derived
    entity: Asset
    dtype: Decimal
    period: Year
    source: C.R.S. 39-3-129(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-3-129
              excerpt: "the administrator shall have the authority to determine the actual value of the nonexempt portion ... by using the ratio of the square foot area"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-3-129
              excerpt: "Where shown to be more appropriate, in order to determine the relationship between the actual value of the nonexempt portion of the property and the actual value of the total property, the administrator may employ the ratio of the portion as measured in hours"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if property_is_partially_used_by_for_profit_business:
            if administrator_uses_hours_ratio:
              actual_value_of_entire_property * business_use_hours_in_calendar_year / hours_in_calendar_year
            else:
              actual_value_of_entire_property * business_use_square_foot_area / total_property_square_foot_area
          else: 0
