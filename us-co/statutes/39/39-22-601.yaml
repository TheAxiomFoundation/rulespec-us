format: rulespec/v1
module:
  status: deferred
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-601
  summary: |-
    “With respect to each of its nonresident shareholders, an S corporation
    shall, for each taxable period, either timely file with the department of
    revenue an agreement ... or make a payment to this state.” A partnership
    has corresponding agreement-or-payment duties for nonresident partners.
    “For purposes of this subsection (6), final determination means only the
    first of the following to occur.” Returns filed under subsection (7) are
    subject to all procedures governing determination, assessment, collection,
    and refund.
  deferred_outputs:
    - output: us-co:statutes/39/39-22-601/e#nonresident_shareholder_agreement_or_payment_requirement
      reason: >-
        Encoding the subsection (2.5)(e) duty requires the filing-deadline
        process, shareholder relation, agreement persistence rules, and payment
        computation prescribed by the surrounding S-corporation provisions.
    - output: us-co:statutes/39/39-22-601/d#shareholder_payment_credit_treatment
      reason: >-
        The payment-credit treatment depends on composite payments and payments
        made under subsection (2.5)(h), including the unavailable highest
        marginal tax rate under section 39-22-104.
    - output: us-co:statutes/39/39-22-601/g#nonresident_partner_agreement_persistence
      reason: >-
        The agreement persistence and timeliness rule requires taxable-period
        ordering and annual-return due-date mechanics not represented by the
        available scalar RuleSpec schema.
    - output: us-co:statutes/39/39-22-601/h#nonresident_partner_payment
      reason: >-
        The payment amount depends on the highest marginal tax rate in effect
        under section 39-22-104; the copied context does not export that rate,
        and no exact executable upstream output is available.
    - output: us-co:statutes/39/39-22-601/b#federal_final_determination
      reason: >-
        Subsection (6)(b) defines the first event to occur among several federal
        administrative and judicial events. Faithful encoding requires an
        ordered event/date relation that is not available in the supported
        schema.
    - output: us-co:statutes/39/39-22-601/c#return_procedures_apply
      reason: >-
        Subsection (7)(c) incorporates all procedures of law concerning
        determination, assessment, collection, and refund rather than stating
        an independently computable condition or amount; those incorporated
        procedures are not supplied as executable dependencies.
