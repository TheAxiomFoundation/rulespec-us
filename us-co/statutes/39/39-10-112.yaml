format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-10-112
  summary: |-
    "The fees of the collection agency shall be paid by the treasurer from the moneys recovered by the collection agency, but in no event shall the fees paid to the collection agency exceed one-third of the amount recovered."
rules:
  - name: collection_agency_fee_cap
    kind: parameter
    dtype: Rate
    source: C.R.S. 39-10-112(1)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-10-112
              excerpt: "shall the fees paid to the collection agency exceed one-third of the amount recovered"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          1 / 3
  - name: maximum_collection_agency_fee
    kind: derived
    entity: CollectionAgency
    dtype: Money
    period: Year
    unit: USD
    source: C.R.S. 39-10-112(1)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-10-112
              excerpt: "fees paid to the collection agency exceed one-third of the amount recovered"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-10-112
              excerpt: "one-third of the amount recovered"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          amount_recovered_by_collection_agency * collection_agency_fee_cap
