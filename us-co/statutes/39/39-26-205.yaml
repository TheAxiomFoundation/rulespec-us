format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-26-205
  summary: |-
    “Any coin-operated vending machine or video or other game machine shall be exempt from the lien created in subsection (1) ... if” it is placed under a non-ownership lease or agreement, plainly marked to identify its owner, and listed in an owner-filed schedule.
rules:
  - name: vending_or_game_machine_exempt_from_lien
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. 39-26-205(3.5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-26-205
              excerpt: "Any coin-operated vending machine or video or other game machine shall be exempt from the lien"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-26-205
              excerpt: "placed on the retailer's premises under the terms of a lease or other agreement"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-26-205
              excerpt: "the retailer is given no right to become the owner"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-26-205
              excerpt: "plainly marked ... with information sufficient to permit identification of the owner"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-26-205
              excerpt: "owner of the machine has filed with the department of revenue a schedule listing the machine by serial number"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_coin_operated_vending_or_game_machine
          and machine_is_on_retailer_premises_under_lease_or_agreement
          and retailer_has_no_right_to_become_machine_owner
          and machine_is_plainly_marked_to_identify_owner
          and owner_has_filed_required_machine_schedule
