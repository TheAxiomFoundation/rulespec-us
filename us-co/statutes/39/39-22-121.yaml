format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-121
  summary: |-
    For income tax years commencing prior to January 1, 2028, a taxpayer making a monetary contribution to promote child care is allowed a credit equal to fifty percent of the contribution's value, subject to a $100,000 cap and the taxpayer's actual income tax liability.
  deferred_outputs:
    - output: us-co:statutes/39/39-22-121/e#information_dissemination_program_contribution_qualifies
      reason: Subparagraph (2)(e) defines a qualifying contribution category, but the source does not provide a computable relation identifying information dissemination programs receiving the contribution.
    - output: us-co:statutes/39/39-22-121/b#approved_facility_school_contribution_credit
      reason: Subsection (6.5)(b) depends on the unavailable definition of approved facility school in section 22-2-402 and includes a delayed-claim rule.
    - output: us-co:statutes/39/39-22-121/c#department_recommendations_for_credit_improvement
      reason: Subsection (6.8)(c) is an administrative consultation and reporting duty, not a computable taxpayer output.
    - output: us-co:statutes/39/39-22-121#qualifying_child_care_contribution
      reason: The enumerated contribution categories in subsection (2), the related-party prohibition in subsection (3), and the for-profit investment condition in subsection (4) require contribution-recipient classifications and transaction relationships not represented by this source slice.
    - output: us-co:statutes/39/39-22-121#child_care_contribution_credit_carryforward
      reason: Subsections (6) and (6.7) require prior-year credit balances, year ordering, revenue-estimate availability, and historical claim restrictions.
      source_values:
        - us-co:statutes/39/39-22-121#child_care_credit_carryforward_year_limit
rules:
  - name: child_care_contribution_credit_rate
    kind: parameter
    dtype: Rate
    source: 39-22-121(1.5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-121
              excerpt: "equal to fifty percent of the total value of the contribution"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.50

  - name: child_care_contribution_credit_cap
    kind: parameter
    dtype: Money
    unit: USD
    source: 39-22-121(5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-121
              excerpt: "shall not exceed one hundred thousand dollars"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          100000

  - name: child_care_credit_carryforward_year_limit
    kind: parameter
    dtype: Count
    source: 39-22-121(6)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-121
              excerpt: "for a period not to exceed five years"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          5

  - name: child_care_contribution_credit_before_temporary_constraints
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 39-22-121(1.5), (5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-121
              excerpt: "fifty percent of the total value of the contribution"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-22-121
              excerpt: "shall not exceed one hundred thousand dollars or the taxpayer's actual income tax liability"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          min(
            child_care_contribution_credit_cap,
            child_care_contribution_credit_rate * max(0, eligible_monetary_child_care_contribution_value),
            actual_income_tax_liability
          )
