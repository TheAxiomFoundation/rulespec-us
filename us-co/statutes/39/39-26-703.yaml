format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-26-703
  summary: |-
    “A refund shall be made or a credit allowed ... to any person entitled to an exemption where the person establishes: That a tax was paid by another on a purchase made on behalf of such person; that a refund has not been granted to the person making the purchase; and that the person entitled to exemption paid or reimbursed the purchaser for such tax. No such refund shall be made or credit allowed in an amount greater than the tax paid.”
rules:
  - name: exempt_person_entitled_to_refund_or_credit
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: C.R.S. 39-26-703(2)(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-26-703
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_entitled_to_exemption
          and tax_was_paid_by_another_on_purchase_made_on_behalf_of_person
          and refund_has_not_been_granted_to_person_making_purchase
          and person_paid_or_reimbursed_purchaser_for_tax

  - name: maximum_refund_or_credit_amount
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: USD
    source: C.R.S. 39-26-703(2)(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-26-703
              excerpt: "No such refund shall be made or credit allowed in an amount greater than the tax paid."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if exempt_person_entitled_to_refund_or_credit: max(0, tax_paid) else: 0
