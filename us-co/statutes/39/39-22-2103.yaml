format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-2103
  summary: If qualified basis decreases during the compliance period, state income
    tax liability is increased by the credit recapture amount. The accelerated portion
    is the difference between prior credits allowed and credits allowable if the compliance-period
    credit were allowable ratably over fifteen years.
rules:
- name: credit_ratable_period_years
  kind: parameter
  dtype: Integer
  source: C.R.S. 39-22-2103(3)(b)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-22-2103
          excerpt: allowable ratably over fifteen years
  versions:
  - effective_from: '0001-01-01'
    formula: '15'
- name: aggregate_credit_allowable_ratatably_for_prior_taxable_years
  kind: derived
  entity: TaxUnit
  dtype: Money
  period: Year
  unit: USD
  source: C.R.S. 39-22-2103(3)(b)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-22-2103
          excerpt: the aggregate credit ... for the entire compliance period were
            allowable ratably over fifteen years
  versions:
  - effective_from: '0001-01-01'
    formula: 'aggregate_credit_allowable_for_entire_compliance_period_with_respect_to_reduced_qualified_basis

      * min(max(0, number_of_prior_taxable_years), credit_ratable_period_years)

      / credit_ratable_period_years'
- name: accelerated_portion_of_credit_for_reduced_qualified_basis
  kind: derived
  entity: TaxUnit
  dtype: Money
  period: Year
  unit: USD
  source: C.R.S. 39-22-2103(3)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-22-2103
  versions:
  - effective_from: '0001-01-01'
    formula: "max(\n  0,\n  aggregate_credit_allowed_for_prior_taxable_years_with_respect_to_reduced_qualified_basis\n\
      \  - aggregate_credit_allowable_ratatably_for_prior_taxable_years\n)"
- name: credit_recapture_amount
  kind: derived
  entity: TaxUnit
  dtype: Money
  period: Year
  unit: USD
  source: C.R.S. 39-22-2103(1)-(3)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/statute/39/39-22-2103
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-22-2103
  versions:
  - effective_from: '0001-01-01'
    formula: 'if taxable_year_is_during_compliance_period and qualified_basis_as_of_last_day_of_taxable_year
      < qualified_basis_as_of_last_day_of_prior_taxable_year: accelerated_portion_of_credit_for_reduced_qualified_basis
      else: 0'
- name: state_income_tax_liability_after_credit_recapture
  kind: derived
  entity: TaxUnit
  dtype: Money
  period: Year
  unit: USD
  source: C.R.S. 39-22-2103(1)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-22-2103
  versions:
  - effective_from: '0001-01-01'
    formula: 'state_income_tax_liability_before_credit_recapture

      + credit_recapture_amount'
