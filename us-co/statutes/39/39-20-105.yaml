format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-20-105
  summary: |-
    The executive director may issue a certificate discharging part of property subject to a Colorado tax lien when an amount paid in part satisfaction is not less than the executive director's determined value of the state's interest in that part.
rules:
  - name: partial_property_lien_discharge_may_be_certified
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-20-105
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-20-105
              excerpt: "property ... is subject to a lien for the payment of any tax due the state of Colorado"
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-20-105
              excerpt: "an amount determined by the executive director, which shall not be less than the value ... of the interest of the state of Colorado"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          property_part_is_subject_to_colorado_tax_lien
          and payment_for_property_part_is_in_part_satisfaction_of_tax_liability
          and amount_paid_to_executive_director >= executive_director_determined_value_of_state_interest_in_property_part
