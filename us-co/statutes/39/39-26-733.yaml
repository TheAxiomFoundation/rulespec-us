format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-26-733
  summary: |-
    “Energy storage system” means a commercially available, customer-sited system capable of retaining, storing, and delivering energy. On and after January 1, 2023, sales, storage, and use of such systems used in a residential dwelling are exempt from taxation under parts 1 and 2 of article 26. This section is repealed effective January 1, 2033.
  deferred_outputs:
    - output: us-co:statutes/39/39-26-733/b#tax_exemption_effectiveness_measurement
      reason: Subsection (1)(b) directs legislative and audit measurement and information provision, but does not establish a computable RuleSpec output.
rules:
  - name: energy_storage_system
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: 39-26-733(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-26-733
    versions:
      - effective_from: '2023-01-01'
        formula: |-
          energy_storage_system_is_commercially_available
          and energy_storage_system_is_customer_sited
          and energy_storage_system_can_retain_store_and_deliver_energy
  - name: residential_energy_storage_system_sales_storage_and_use_exempt
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: 39-26-733(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: effective_period
            source:
              corpus_citation_path: us-co/statute/39/39-26-733
              excerpt: "On and after January 1, 2023"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-26-733
              excerpt: "energy storage systems that are used in a residential dwelling are exempt"
    versions:
      - effective_from: '2023-01-01'
        formula: |-
          energy_storage_system
          and energy_storage_system_is_used_in_residential_dwelling
