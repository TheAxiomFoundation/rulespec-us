format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-31-101
  summary: |-
    “Have income from all sources for the taxable year of less than the maximum eligible income amount.” For 2023, the maximum eligible income amount is $18,026 for an individual and $24,345 for spouses; the phase-out amounts are $9,692 and $15,668, respectively. The heat or fuel expenses flat grant amount is $92, and the property tax flat grant amount is $282. Each amount is adjusted for inflation for subsequent years.
  deferred_outputs:
    - output: us-co:statutes/39/39-31-101/1#grant_eligibility
      reason: Full eligibility depends on claimant age, residence, spouse, disability, dependency, income-composition, and expense-category facts across subsection (1) and subsection (3); this artifact retains the independently computable income limitation.
    - output: us-co:statutes/39/39-31-101/2#property_tax_grant
      reason: The final property-tax grant requires the applicable annually inflation-adjusted maximum and flat-grant amounts, together with claimant-specific qualifying taxes or tax-equivalent payments.
    - output: us-co:statutes/39/39-31-101/2.1#heat_or_fuel_expenses_grant
      reason: The final heat-or-fuel grant requires the applicable annually inflation-adjusted maximum and flat-grant amounts, together with claimant-specific qualifying expenses.
    - output: us-co:statutes/39/39-31-101/4#tax_equivalent_payments
      reason: Computing the complete tax-equivalent payment surface requires residence, tenancy, nursing-home, utility, food, mobile-home, and trailer-space payment classifications.
rules:
  - name: individual_maximum_eligible_income_amount
    kind: parameter
    dtype: Money
    unit: USD
    source: 39-31-101(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-31-101
              excerpt: “eighteen thousand twenty-six dollars for the 2023 calendar year”
    versions:
      - effective_from: '2023-01-01'
        formula: |-
          18026

  - name: spouses_maximum_eligible_income_amount
    kind: parameter
    dtype: Money
    unit: USD
    source: 39-31-101(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-31-101
              excerpt: “twenty-four thousand three hundred forty-five dollars for the 2023 calendar year”
    versions:
      - effective_from: '2023-01-01'
        formula: |-
          24345

  - name: maximum_eligible_income_amount
    kind: derived
    entity: TaxUnit
    dtype: Money
    unit: USD
    period: Year
    source: 39-31-101(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-31-101
    versions:
      - effective_from: '2023-01-01'
        formula: |-
          if claim_is_for_spouses: spouses_maximum_eligible_income_amount else: individual_maximum_eligible_income_amount

  - name: income_below_maximum_eligible_amount
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: 39-31-101(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-31-101
              excerpt: “income from all sources for the taxable year of less than the maximum eligible income amount”
    versions:
      - effective_from: '2023-01-01'
        formula: |-
          income_from_all_sources < maximum_eligible_income_amount

  - name: heat_or_fuel_expenses_flat_grant_amount
    kind: parameter
    dtype: Money
    unit: USD
    source: 39-31-101(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-31-101
              excerpt: “ninety-two dollars for the 2023 calendar year”
    versions:
      - effective_from: '2023-01-01'
        formula: |-
          92

  - name: inflation
    kind: derived
    entity: TaxUnit
    dtype: Rate
    period: Year
    source: 39-31-101(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-31-101
              excerpt: “annual percentage change in the ... consumer price index for Denver-Aurora-Lakewood”
    versions:
      - effective_from: '2023-01-01'
        formula: |-
          (current_denver_aurora_lakewood_consumer_price_index / prior_denver_aurora_lakewood_consumer_price_index) - 1

