format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-11-111
  summary: |-
    When a treasurer sells a tax lien on lands or lots for delinquent taxes, the treasurer may accept the purchase price in cash, negotiable paper, or electronic funds transfer, subject to the treasurer's bidding rules.
rules:
  - name: purchase_price_payment_form_may_be_accepted
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Day
    source: C.R.S. 39-11-111
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-11-111
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          treasurer_sells_tax_lien_on_lands_or_lots_for_delinquent_taxes
          and payment_is_purchase_price
          and payment_form_is_cash_negotiable_paper_or_electronic_funds_transfer
          and payment_form_is_permitted_under_treasurers_bidding_rules
