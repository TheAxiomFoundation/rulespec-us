format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-2005
  summary: |-
    “Remaining excess state revenues” are specified fiscal-year 2022-23 excess revenues after required refunds. Such revenues are to be refunded through identical payments to qualified individuals; the executive director must recalculate the payment within ten business days after enactment of Senate Bill 23B-003.
  deferred_outputs:
    - output: us-co:statutes/39/39-22-2005/b#remaining_excess_state_revenues
      reason: This definition requires the state constitutional spending limitation and refunds certified or estimated under sections 24-77-103.8, 24-77-106.5, 39-22-123.5, 39-3-209, and 39-3-210; the necessary executable RuleSpec dependencies are unavailable.
    - output: us-co:statutes/39/39-22-2005/2#identical_individual_refund_amount
      reason: The refund amount is remaining excess state revenues divided by the expected number of qualified individuals claiming a refund, and the required remaining-excess-revenues definition is deferred.
rules:
  - name: recalculation_deadline_business_days
    kind: parameter
    dtype: Count
    source: 39-22-2005(3)(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-2005
              excerpt: "No later than ten business days after enactment"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          10
