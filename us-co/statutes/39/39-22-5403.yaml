format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-5403
  summary: During calendar years 2025 through 2029, aggregate annual credit allocations
    are limited to $5,000,000 for 2025 and 2026 and $10,000,000 for 2027 through 2029.
    The credit period is five years, and excess credit may be carried forward for
    up to three tax years following that period.
  deferred_outputs:
  - output: us-co:statutes/39/39-22-5403#credit_period_years
    reason: Generated rule used a local name that collides with a sibling RuleSpec
      export. This output is deferred until it can be encoded with a semantic branch-specific
      name without creating ambiguous sibling imports.
rules:
- name: credit_carryforward_year_limit
  kind: parameter
  dtype: Count
  source: "C.R.S. \xA7 39-22-5403(5)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-22-5403
          excerpt: up to three tax years following the credit period
  versions:
  - effective_from: '2025-01-01'
    formula: '3'
- name: annual_credit_allocation_limit
  kind: parameter
  dtype: Money
  period: Year
  unit: USD
  source: "C.R.S. \xA7 39-22-5403(4)(b)(I)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-22-5403
          excerpt: "(A) For calendar year 2025, five million dollars;\n(B) For calendar year 2026, five million dollars;"
      - path: versions[1].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-22-5403
          excerpt: "(C) For calendar year 2027, ten million dollars;\n(D) For calendar year 2028, ten million dollars; and\n(E) For calendar year 2029, ten million dollars."
  versions:
  - effective_from: '2025-01-01'
    formula: '5000000'
  - effective_from: '2027-01-01'
    formula: '10000000'
- name: annual_credit_allocation_is_within_statutory_limit
  kind: derived
  entity: CreditAllocatingAuthority
  dtype: Judgment
  period: Year
  source: "C.R.S. \xA7 39-22-5403(4)(a)-(b)(I)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/statute/39/39-22-5403
          excerpt: "During each calendar year of the period beginning on January 1, 2025,\nand ending on December 31, 2029"
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-22-5403
          excerpt: "The aggregate amount of all credits allocated by the authority in each\ncalendar year must not exceed"
  versions:
  - effective_from: '2025-01-01'
    formula: 'calendar_year_is_credit_allocation_window

      and credits_allocated_against_annual_limit <= annual_credit_allocation_limit'
