format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-344
  summary: |-
    An electing pass-through entity is subject to entity-level tax at the section 39-22-301 rate on specified Colorado-attributable and resident-owner income. Credits attributable to entity activities pass through to and must be claimed by the owner. Specified return-information provisions do not apply, and an electing pass-through entity is a taxpayer for collection, administration, and enforcement.
  deferred_outputs:
    - output: us-co:statutes/39/39-22-344#electing_pass_through_entity_tax
      reason: The tax formula requires the applicable tax rate under section 39-22-301 and income determinations under sections 39-22-202, 39-22-203, 39-22-322, and 39-22-323; no executable RuleSpec context provides those concepts.
    - output: us-co:statutes/39/39-22-344#corporate_treatment_for_entity_tax
      reason: Corporate treatment and the estimated-payment exception depend on section 39-22-606, for which no executable RuleSpec context is available.
rules:
  - name: credit_claim_by_owner_required
    kind: derived
    entity: ElectingPassThroughEntityOwner
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-22-344(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-22-344
              excerpt: "Any credit allowed pursuant to this article 22"
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-22-344
              excerpt: "attributable to the\nactivities of an electing pass-through entity in the taxable year"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-344
              excerpt: "is passed through to\nand must be claimed by the electing pass-through entity owner"
    versions:
      - effective_from: '2023-09-01'
        formula: |-
          credit_is_allowed_pursuant_to_article_22
          and credit_is_attributable_to_electing_pass_through_entity_activities

  - name: specified_return_information_requirements_apply_to_electing_entity
    kind: derived
    entity: ElectingPassThroughEntity
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-22-344(5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-22-344
              excerpt: "The provisions of section 39-22-601 (2.7)(d) and (5.5)(d) are not\napplicable to an electing pass-through entity."
    versions:
      - effective_from: '2023-09-01'
        formula: |-
          false

  - name: electing_pass_through_entity_is_taxpayer
    kind: derived
    entity: ElectingPassThroughEntity
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-22-344(6)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-22-344
              excerpt: "an electing pass-through entity is a taxpayer"
    versions:
      - effective_from: '2023-09-01'
        formula: |-
          true
