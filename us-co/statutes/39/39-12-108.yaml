format: rulespec/v1
imports:
  - us-co:statutes/39/39-12-104#redemption_payment_required
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-12-108
  summary: |-
    All moneys received for redemption shall be paid over to the tax-lien purchaser, tax-deed recipient, or claimant on delivery of a duly executed and acknowledged quitclaim deed.
rules:
  - name: redemption_moneys_payable_over_to_lien_holder
    kind: derived
    entity: Asset
    dtype: Money
    unit: USD
    period: Year
    source: C.R.S. § 39-12-108
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-12-108
              excerpt: "shall be paid over to the person to whom the tax lien on such land was sold or a tax deed was issued, or those claiming under him"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-12-108
              excerpt: "on his deliverance to the treasurer, for the use of the person redeeming the same, a quitclaim deed"
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:statutes/39/39-12-104#redemption_payment_required
              output: redemption_payment_required
              hash: sha256:38d91bd80727494334499801fc8d0f3e25508cb72fdbcf87e14d0917940f2c9c
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if (
            recipient_is_tax_lien_purchaser
            or recipient_is_tax_deed_holder
            or recipient_claims_under_tax_lien_purchaser_or_tax_deed_holder
          ) and duly_executed_and_acknowledged_quitclaim_deed_delivered_to_treasurer_for_redeeming_person_use:
            redemption_payment_required
          else: 0
