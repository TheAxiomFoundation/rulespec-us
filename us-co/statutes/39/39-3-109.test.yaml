- name: care_or_treatment_resident_property_qualifies
  period:
    period_kind: custom
    name: calendar_year
    start: '2024-01-01'
    end: '2024-12-31'
  input:
    us-co:statutes/39/39-3-109#input.property_is_owned: true
    us-co:statutes/39/39-3-109#input.property_is_used_solely_and_exclusively_for_strictly_charitable_purposes: true
    us-co:statutes/39/39-3-109#input.property_is_not_used_for_private_gain_or_corporate_profit: true
    us-co:statutes/39/39-3-109#input.property_is_residential: true
    us-co:statutes/39/39-3-109#input.structure_and_land_are_integral_part_of_church: false
    us-co:statutes/39/39-3-109#input.structure_and_land_are_integral_part_of_eleemosynary_hospital: true
    us-co:statutes/39/39-3-109#input.structure_and_land_are_integral_part_of_eleemosynary_licensed_health_care_facility: false
    us-co:statutes/39/39-3-109#input.structure_and_land_are_integral_part_of_school: false
    us-co:statutes/39/39-3-109#input.structure_and_land_are_integral_part_of_other_tax_exempt_institution: false
    us-co:statutes/39/39-3-109#input.no_lessee_or_renter_is_outside_student_or_care_or_treatment_resident_categories: true
    us-co:statutes/39/39-3-109#input.property_has_care_or_treatment_resident_lessee_or_renter: true
    us-co:statutes/39/39-3-109#input.each_care_or_treatment_resident_is_actually_receiving_care_or_treatment: true
    us-co:statutes/39/39-3-109#input.each_care_or_treatment_resident_is_required_to_be_domiciled_to_receive_care_or_treatment: true
    ? us-co:statutes/39/39-3-109#input.each_care_or_treatment_resident_resides_in_hospital_facility_institution_or_affiliated_residential_unit
    : true
  output:
    us-co:statutes/39/39-3-109#care_or_treatment_resident_occupancy_is_permitted: holds
    us-co:statutes/39/39-3-109#residential_property_occupancy_is_permitted: holds
    us-co:statutes/39/39-3-109#residential_charitable_property_tax_exemption_applies: holds
