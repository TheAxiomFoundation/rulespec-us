format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-21-104.5
  summary: |-
    “frivolous submission means a request for a hearing” based on a position previously rejected in a published Colorado or federal court opinion. “The executive director may reject the request.” Unless an appeal is taken, the tax, interest, and penalties “shall be paid within thirty days after mailing of the notice and demand for payment.”
rules:
  - name: frivolous_submission
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: C.R.S. 39-21-104.5(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-21-104.5
              excerpt: "frivolous submission means a request for a hearing"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-21-104.5
              excerpt: "based on a position that was previously rejected in a published opinion by a Colorado or federal court"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          request_for_hearing_relates_to_tax_in_part_1_of_article_22
          and hearing_request_was_made_pursuant_to_tax_hearing_procedure
          and hearing_request_position_was_previously_rejected_in_published_colorado_or_federal_court_opinion

  - name: executive_director_may_reject_frivolous_hearing_request
    kind: derived
    entity: ExecutiveDirector
    dtype: Judgment
    period: Year
    source: C.R.S. 39-21-104.5(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-21-104.5
              excerpt: "If the executive director determines that a request for a hearing ... is a frivolous submission"
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-21-104.5
              excerpt: "the executive director may reject the request"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          executive_director_determines_request_is_frivolous_submission

  - name: executive_director_must_notify_taxpayer_of_hearing_request_rejection
    kind: derived
    entity: ExecutiveDirector
    dtype: Judgment
    period: Year
    source: C.R.S. 39-21-104.5(3)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-21-104.5
              excerpt: "If the executive director rejects a taxpayer's request for a hearing"
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-21-104.5
              excerpt: "shall notify the taxpayer in writing within a reasonable time"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          executive_director_rejects_taxpayer_hearing_request

  - name: executive_director_must_issue_final_determination_and_mail_demand
    kind: derived
    entity: ExecutiveDirector
    dtype: Judgment
    period: Year
    source: C.R.S. 39-21-104.5(3)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-21-104.5
              excerpt: "If the executive director rejects a taxpayer's request for a hearing"
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-21-104.5
              excerpt: "shall make a final determination ... and shall send the taxpayer a notice of final determination accompanied by a notice and demand for payment"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          executive_director_rejects_taxpayer_hearing_request

  - name: taxpayer_may_appeal_final_determination
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: C.R.S. 39-21-104.5(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-21-104.5
              excerpt: "A taxpayer may appeal the final determination of the executive director"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          executive_director_has_issued_final_determination

  - name: payment_deadline_days_after_notice_mailing
    kind: parameter
    dtype: Count
    source: C.R.S. 39-21-104.5(5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-21-104.5
              excerpt: "within thirty days after mailing of the notice and demand for payment"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: taxpayer_payment_deadline_days_after_notice_mailing
    kind: derived
    entity: TaxUnit
    dtype: Count
    period: Year
    source: C.R.S. 39-21-104.5(5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-21-104.5
              excerpt: "Unless an appeal is taken ... shall be paid within thirty days after mailing of the notice and demand for payment"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-21-104.5
              excerpt: "within thirty days"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if notice_and_demand_for_payment_was_mailed and not taxpayer_has_taken_appeal: payment_deadline_days_after_notice_mailing else: 0

  - name: taxpayer_must_pay_tax_interest_and_penalties_after_unappealed_demand
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: C.R.S. 39-21-104.5(5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-21-104.5
              excerpt: "Unless an appeal is taken"
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-21-104.5
              excerpt: "the tax, together with interest thereon and penalties, if any, shall be paid"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          notice_and_demand_for_payment_was_mailed
          and not taxpayer_has_taken_appeal
