format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-21-109
  summary: |-
    Interest applies to unpaid taxes or charges administered under article 21, except that this section does not apply to failure to pay estimated Colorado income tax. Payment or an agreement to pay within thirty days of notice requires waiver of the three points in excess of prime rate unless willful neglect or failure to pay is determined.
  deferred_outputs:
    - output: us-co:statutes/39/39-21-109#late_payment_interest_rate
      reason: The applicable interest rate and the subsection (1.5) waiver require the rate imposed under section 39-21-110.5, for which no executable RuleSpec export is available.
      source_values:
        - us-co:statutes/39/39-21-109#payment_or_agreement_notice_window_days
        - us-co:statutes/39/39-21-109#prime_rate_excess_waiver
rules:
  - name: payment_or_agreement_notice_window_days
    kind: parameter
    dtype: Count
    period: Day
    source: C.R.S. 39-21-109(1.5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-21-109
              excerpt: "within thirty days of notice"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30
  - name: prime_rate_excess_waiver
    kind: parameter
    dtype: Rate
    period: Year
    source: C.R.S. 39-21-109(1.5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-21-109
              excerpt: "the three points in excess of the prime rate"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.03
  - name: late_payment_interest_applies
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: C.R.S. 39-21-109(1), (5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-21-109
              excerpt: "If any tax or charge administered pursuant to this article 21 is not paid"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-21-109
              excerpt: "This section shall not apply to any failure to pay estimated Colorado income tax."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          tax_or_charge_is_administered_under_article_21
          and payment_not_made_on_or_before_last_date_prescribed
          and not failure_to_pay_is_estimated_colorado_income_tax
