format: rulespec/v1
imports:
  - us-co:statutes/39/39-29-112#annual_return_withholding_exemption_limit
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-29-115
  summary: |-
    A person failing to file or pay owes the greater of thirty percent of tax assessed or thirty dollars. Negligent-return errors add ten percent and one-half of one percent monthly penalty interest. The executive director may estimate tax for an unfiled report, subject to the withholding exception, and may waive penalties for good cause.
  deferred_outputs:
    - output: us-co:statutes/39/39-29-115#failure_to_withhold_and_pay_maximum_penalty
      reason: The statutory exception depends on whether income was from a well qualifying for the prior taxable year's exemption; the available exemption output is Well-scoped and no source-stated relation connects that well to this Person-scoped payment.
      blocked_by:
        - us-co:statutes/39/39-29-105#well_severance_tax_exemption_applies
      source_values:
        - us-co:statutes/39/39-29-115#failure_to_withhold_and_pay_maximum_penalty_rate
        - us-co:statutes/39/39-29-115#failure_to_withhold_and_pay_minimum_penalty
    - output: us-co:statutes/39/39-29-115#estimated_assessment_becomes_fixed
      reason: The source's ten-day response process requires modeling receipt of the estimate and timely filing and payment, which is not represented as a computable date-process surface in this module.
      source_values:
        - us-co:statutes/39/39-29-115#estimate_response_deadline_days
rules:
  - name: failure_to_file_or_pay_penalty_rate
    kind: parameter
    dtype: Rate
    source: C.R.S. 39-29-115(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-29-115
              excerpt: "a penalty of thirty percent of the tax assessed"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.30

  - name: failure_to_file_or_pay_minimum_penalty
    kind: parameter
    dtype: Money
    unit: USD
    source: C.R.S. 39-29-115(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-29-115
              excerpt: "or thirty dollars, whichever is greater"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: failure_to_withhold_and_pay_maximum_penalty_rate
    kind: parameter
    dtype: Rate
    source: C.R.S. 39-29-115(1.5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-29-115
              excerpt: "a penalty of up to thirty percent of the required payment"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.30

  - name: failure_to_withhold_and_pay_minimum_penalty
    kind: parameter
    dtype: Money
    unit: USD
    source: C.R.S. 39-29-115(1.5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-29-115
              excerpt: "or thirty dollars, whichever is the greater amount"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: annual_withholding_report_maximum_penalty_rate
    kind: parameter
    dtype: Rate
    source: C.R.S. 39-29-115(1.5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-29-115
              excerpt: "a penalty of up to fifteen percent"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.15

  - name: annual_withholding_report_penalty_cap
    kind: parameter
    dtype: Money
    unit: USD
    source: C.R.S. 39-29-115(1.5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-29-115
              excerpt: "or one thousand five hundred dollars, whichever is the lesser amount"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1500

  - name: negligent_error_penalty_rate
    kind: parameter
    dtype: Rate
    source: C.R.S. 39-29-115(2)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-29-115
              excerpt: "A penalty of ten percent of the tax assessed"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.10

  - name: negligent_error_penalty_interest_monthly_rate
    kind: parameter
    dtype: Rate
    source: C.R.S. 39-29-115(2)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-29-115
              excerpt: "one-half of one percent per month"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.005

  - name: estimate_response_deadline_days
    kind: parameter
    dtype: Count
    source: C.R.S. 39-29-115(3)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-29-115
              excerpt: "within ten days after receiving the estimate"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10

  - name: failure_to_file_or_pay_penalty
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: USD
    source: C.R.S. 39-29-115(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-29-115
              excerpt: "fails to file a report or to pay the tax due thereon shall pay a penalty of thirty percent of the tax assessed or thirty dollars, whichever is greater"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if person_failed_to_file_report_or_pay_tax:
            max(failure_to_file_or_pay_penalty_rate * tax_assessed_for_unfiled_or_unpaid_tax, failure_to_file_or_pay_minimum_penalty)
          else: 0

  - name: annual_withholding_report_maximum_penalty
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: USD
    source: C.R.S. 39-29-115(1.5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-29-115
              excerpt: "fails to file the annual report ... shall pay a penalty of up to fifteen percent ... or one thousand five hundred dollars, whichever is the lesser amount"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if person_withheld_income_and_failed_to_file_annual_withholding_report:
            min(annual_withholding_report_maximum_penalty_rate * withholding_that_should_have_been_reflected_in_annual_report, annual_withholding_report_penalty_cap)
          else: 0

  - name: negligent_error_penalty
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: USD
    source: C.R.S. 39-29-115(2)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-29-115
              excerpt: "Tax assessed ... due to negligence or disregard of the law shall have added thereto: A penalty of ten percent of the tax assessed"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if tax_assessment_resulted_from_negligent_or_disregarded_law_error:
            negligent_error_penalty_rate * tax_assessed_from_negligent_error
          else: 0

  - name: negligent_error_penalty_interest_per_month
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: USD
    source: C.R.S. 39-29-115(2)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-29-115
              excerpt: "Penalty interest of one-half of one percent per month ... on the tax assessed"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if tax_assessment_resulted_from_negligent_or_disregarded_law_error:
            negligent_error_penalty_interest_monthly_rate * tax_assessed_from_negligent_error
          else: 0

  - name: estimated_assessment_may_be_issued
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: C.R.S. 39-29-115(3)(a)-(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-29-115
              excerpt: "if any person fails, neglects, or refuses to file a report required by this article, the executive director may ... estimate the amount of tax due"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-29-115
              excerpt: "shall not send an estimate ... to a person who has less than two hundred fifty dollars withheld ... unless the executive director has good cause"
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:statutes/39/39-29-112#annual_return_withholding_exemption_limit
              output: annual_return_withholding_exemption_limit
              hash: sha256:23e0ab51dd98f84e37d5b4cefb425604177077020d82c1f2d0bff2d3cb559afa
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_failed_to_file_required_report
          and (
            total_withholding_by_all_unit_operators_or_first_purchasers >= annual_return_withholding_exemption_limit
            or executive_director_has_good_cause_to_believe_person_does_not_qualify_for_annual_return_exception
          )

  - name: penalty_waiver_may_be_granted
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: C.R.S. 39-29-115(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-29-115
              excerpt: "The executive director may waive, for good cause shown, any of the penalties authorized by this section."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          good_cause_shown_for_penalty_waiver
