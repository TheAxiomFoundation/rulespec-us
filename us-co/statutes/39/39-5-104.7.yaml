format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-5-104.7
  summary: |-
    “All real and personal property used to produce two megawatts or less of alternating current electricity from a renewable energy source” is subject to administrator-developed valuation procedures, except specified hydroelectric, geothermal, biomass, solar, and wind facilities. A taxpayer need not notify the county assessor when the installation has a local-government building permit.
  deferred_outputs:
    - output: us-co:statutes/39/39-5-104.7#renewable_energy_property_valuation_uses_renewable_facility_actual_value_procedures
      reason: The required procedures are specified by section 39-4-102 (1)(e), which is not available in copied RuleSpec context.
    - output: us-co:statutes/39/39-5-104.7#small_solar_facility_valuation_uses_solar_actual_value_procedures
      reason: The special solar-facility procedures are specified by section 39-4-102 (1.5), which is not available in copied RuleSpec context.
rules:
  - name: maximum_renewable_electricity_capacity_megawatts
    kind: parameter
    dtype: Decimal
    source: C.R.S. 39-5-104.7(1)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-5-104.7
              excerpt: "two megawatts or less of alternating current electricity"
    versions:
      - effective_from: '2008-01-01'
        formula: |-
          2
  - name: renewable_energy_property_requires_administrator_valuation_procedures
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. 39-5-104.7(1)(a)-(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-5-104.7
              excerpt: "Except as provided in paragraph (b) ... all real and personal property used to produce two megawatts or less"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-5-104.7
              excerpt: "shall not apply to small or low impact hydroelectric energy facilities, geothermal energy facilities, biomass energy facilities, solar energy facilities, or wind energy facilities"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-5-104.7
              excerpt: "two megawatts or less"
    versions:
      - effective_from: '2008-01-01'
        formula: |-
          property_is_used_to_produce_alternating_current_electricity_from_renewable_energy_source
          and alternating_current_electricity_capacity_megawatts <= maximum_renewable_electricity_capacity_megawatts
          and not property_is_small_or_low_impact_hydroelectric_energy_facility
          and not property_is_geothermal_energy_facility
          and not property_is_biomass_energy_facility
          and not property_is_solar_energy_facility
          and not property_is_wind_energy_facility
  - name: installation_requires_county_assessor_notification
    kind: derived
    entity: Taxpayer
    dtype: Judgment
    period: Year
    source: C.R.S. 39-5-104.7(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-5-104.7
              excerpt: "A taxpayer shall notify the taxpayer's county assessor when the taxpayer installs real and personal property used to produce two megawatts or less"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-5-104.7
              excerpt: "if the taxpayer obtains a building permit under the jurisdiction of a local government ... notification ... shall not be necessary"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-5-104.7
              excerpt: "two megawatts or less"
    versions:
      - effective_from: '2008-01-01'
        formula: |-
          taxpayer_installs_property_used_to_produce_alternating_current_electricity_from_renewable_energy_source
          and installed_property_alternating_current_electricity_capacity_megawatts <= maximum_renewable_electricity_capacity_megawatts
          and not installation_has_local_government_building_permit
