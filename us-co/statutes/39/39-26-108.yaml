format: rulespec/v1
module:
  summary: |-
    It is unlawful for a retailer to represent that tax imposed by part 1 will be assumed or absorbed, will not be added to the selling price, or will be refunded. A violation commits a class 2 misdemeanor.
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-26-108
rules:
  - name: retailer_tax_absorption_or_refund_representation_is_unlawful
    kind: derived
    entity: Business
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-26-108
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-26-108
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          retailer_directly_or_indirectly_represents_tax_assumed_or_absorbed
          or retailer_directly_or_indirectly_represents_tax_not_added_to_selling_price
          or retailer_directly_or_indirectly_represents_added_tax_will_be_refunded
  - name: retailer_tax_absorption_or_refund_violation_commits_class_2_misdemeanor
    kind: derived
    entity: Business
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-26-108
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-26-108
              excerpt: "Any person violating any of the provisions of sections 39-26-105 to 39-26-113 commits a class 2 misdemeanor."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          retailer_directly_or_indirectly_represents_tax_assumed_or_absorbed
          or retailer_directly_or_indirectly_represents_tax_not_added_to_selling_price
          or retailer_directly_or_indirectly_represents_added_tax_will_be_refunded
