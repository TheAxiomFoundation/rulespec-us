format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-26-113.5
  summary: |-
    A taxpayer may claim a refund of state sales and use taxes paid on a model year 2010 or newer truck tractor or semitrailer with a gross vehicle weight rating of fifty-four thousand pounds or greater, subject to subsection (3). Thirty-three percent of the total refund is claimed in each of three specified calendar years.
  deferred_outputs:
    - output: us-co:statutes/39/39-26-113.5#truck_tractor_or_semitrailer_sales_and_use_tax_refund
      reason: The total refund requires proration under section 42-3-107(4), and subsection (3) limits refunds by the amount allocated pursuant to section 42-1-225; neither cited source is available in copied context.
      source_values:
        - us-co:statutes/39/39-26-113.5#purchase_year_refund_percentage
        - us-co:statutes/39/39-26-113.5#first_following_year_refund_percentage
        - us-co:statutes/39/39-26-113.5#second_following_year_refund_percentage
rules:
  - name: minimum_vehicle_model_year
    kind: parameter
    dtype: Integer
    source: C.R.S. 39-26-113.5(1)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-26-113.5
              excerpt: "model year 2010 or newer"
    versions:
      - effective_from: '2011-01-01'
        formula: |-
          2010

  - name: minimum_gross_vehicle_weight_rating
    kind: parameter
    dtype: Integer
    source: C.R.S. 39-26-113.5(1)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-26-113.5
              excerpt: "fifty-four thousand pounds or greater"
    versions:
      - effective_from: '2011-01-01'
        formula: |-
          54000

  - name: purchase_year_refund_percentage
    kind: parameter
    dtype: Rate
    source: C.R.S. 39-26-113.5(1)(c)(I)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-26-113.5
              excerpt: "thirty-three percent of the total amount of the refund"
    versions:
      - effective_from: '2011-01-01'
        formula: |-
          0.33

  - name: first_following_year_refund_percentage
    kind: parameter
    dtype: Rate
    source: C.R.S. 39-26-113.5(1)(c)(II)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-26-113.5
              excerpt: "thirty-three percent of the total amount of the refund"
    versions:
      - effective_from: '2011-01-01'
        formula: |-
          0.33

  - name: second_following_year_refund_percentage
    kind: parameter
    dtype: Rate
    source: C.R.S. 39-26-113.5(1)(c)(III)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-26-113.5
              excerpt: "thirty-three percent of the total amount of the refund"
    versions:
      - effective_from: '2011-01-01'
        formula: |-
          0.33

  - name: vehicle_purchase_meets_sales_and_use_tax_refund_criteria
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: C.R.S. 39-26-113.5(1)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-26-113.5
              excerpt: "truck tractor or semitrailer"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-26-113.5
              excerpt: "model year 2010 or newer"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-26-113.5
              excerpt: "fifty-four thousand pounds or greater"
          - path: versions[0].formula
            kind: effective_period
            source:
              corpus_citation_path: us-co/statute/39/39-26-113.5
              excerpt: "purchased on or after July 1, 2011, but before July 1, 2025"
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-26-113.5
              excerpt: "state sales and use taxes paid by the taxpayer"
    versions:
      - effective_from: '2011-01-01'
        formula: |-
          vehicle_is_truck_tractor_or_semitrailer
          and vehicle_model_year >= minimum_vehicle_model_year
          and gross_vehicle_weight_rating >= minimum_gross_vehicle_weight_rating
          and vehicle_purchase_is_within_statutory_window
          and state_sales_and_use_taxes_paid_on_vehicle
