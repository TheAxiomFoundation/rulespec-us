format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-27-114
  summary: |-
    A person who makes a filing required under part 1 and willfully and falsely swears or affirms on a material matter is guilty of perjury in the second degree.
rules:
  - name: person_is_guilty_of_second_degree_perjury
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: C.R.S. 39-27-114
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-27-114
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_makes_oath_affirmation_affidavit_return_or_deposition_required_under_part_1
          and person_swears_or_affirms_upon_that_required_filing
          and person_swears_or_affirms_willfully_and_falsely
          and false_statement_is_material_to_issue_point_or_subject_matter_in_question
