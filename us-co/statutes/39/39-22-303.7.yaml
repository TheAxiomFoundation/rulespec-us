format: rulespec/v1
module:
  summary: |-
    “Mutual fund sales” means gross receipts derived from management, distribution, or administration services to a regulated investment company. A mutual fund service corporation is a corporation doing business in Colorado that derives specified gross income. A regulated investment company is one defined in section 851 of the Internal Revenue Code.
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-303.7
  deferred_outputs:
    - output: us-co:statutes/39/39-22-303.7/c#shareholder_domicile
      reason: Domicile requires representing and selecting shareholder address and residence/location values, which is not supported by the available scalar RuleSpec entity model.
    - output: us-co:statutes/39/39-22-303.7/a#administration_services
      reason: The enumerated service definition and affiliated-provider qualification require service and affiliation relations not supplied in this source slice.
    - output: us-co:statutes/39/39-22-303.7/b#distribution_services
      reason: The enumerated service definition includes provider-business, affiliation, company-type, and contract requirements not representable from this source slice without relationship inputs.
    - output: us-co:statutes/39/39-22-303.7/d#management_services
      reason: The enumerated service definition includes contract and affiliation requirements not representable from this source slice without relationship inputs.
    - output: us-co:statutes/39/39-22-303.7/2/a#colorado_mutual_fund_sales_for_regulated_investment_company
      reason: The calculation requires shareholder-share counts at specified beginning and ending dates for each regulated investment company and a relation for summing separate company computations.
rules:
  - name: mutual_fund_sales
    kind: derived
    entity: Corporation
    dtype: Money
    period: Year
    unit: USD
    source: 39-22-303.7(e)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-22-303.7
    versions:
      - effective_from: '2009-01-01'
        formula: |-
          if corporation_renders_management_distribution_or_administration_services_to_regulated_investment_company: gross_receipts_from_those_services else: 0

  - name: is_mutual_fund_service_corporation
    kind: derived
    entity: Corporation
    dtype: Judgment
    period: Year
    source: 39-22-303.7(f)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-22-303.7
    versions:
      - effective_from: '2009-01-01'
        formula: |-
          corporation_does_business_in_colorado
          and corporation_derives_gross_income_from_specified_mutual_fund_services

  - name: is_regulated_investment_company
    kind: derived
    entity: Business
    dtype: Judgment
    period: Year
    source: 39-22-303.7(g)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-22-303.7
    versions:
      - effective_from: '2009-01-01'
        formula: |-
          business_is_regulated_investment_company_under_internal_revenue_code_section_851
