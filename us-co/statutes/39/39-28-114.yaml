            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-28-114
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          wholesaler_willfully_makes_false_or_fraudulent_return
          or wholesaler_willfully_makes_false_statement_on_return
  - name: willful_cigarette_tax_evasion_is_unlawful
    kind: derived
    entity: Wholesaler
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-28-114
    metadata:
