format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-28-114
  summary: |-
    It is unlawful for a wholesaler to sell and distribute cigarettes without a license or without first affixing the required stamp, imprint, or impression; willful violators are punished under section 39-21-118.
rules:
  - name: cigarette_sale_or_distribution_without_license_or_required_stamp_is_unlawful
    kind: derived
    entity: Wholesaler
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-28-114
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-28-114
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          wholesaler_sells_and_distributes_cigarettes_in_state
          and
          (not wholesaler_has_license
          or not stamp_imprint_or_impression_is_affixed_to_each_cigarette_package_before_sale_and_distribution)
  - name: willful_false_or_fraudulent_return_or_statement_on_return_is_unlawful
    kind: derived
    entity: Wholesaler
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-28-114
    metadata:
      proof:
        atoms:
