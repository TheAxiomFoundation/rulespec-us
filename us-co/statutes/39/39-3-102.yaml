format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-3-102
  summary: |-
    Household furnishings not used for production of income are exempt from property tax; income use during any part of the taxable year makes them taxable for the entire year. A residential solar facility produces income only when it produces income for the owner of the residential real property. From 1990, otherwise exempt nondepreciable artwork remains exempt when stored or displayed away from a residence.
rules:
  - name: household_furnishing_property_tax_exemption_applies
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-3-102(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-3-102
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_household_furnishing
          and (
            (
              asset_is_independently_owned_residential_solar_electric_generation_facility
              and not solar_facility_produces_income_for_owner_of_residential_real_property
            )
            or (
              not asset_is_independently_owned_residential_solar_electric_generation_facility
              and not household_furnishing_used_for_production_of_income_during_taxable_year
            )
          )
  - name: work_of_art_exemption_continues_when_stored_or_displayed_away_from_residence
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-3-102(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-3-102
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          household_furnishing_property_tax_exemption_applies
          and asset_is_work_of_art
          and not work_of_art_is_subject_to_annual_depreciation
          and work_of_art_is_stored_or_displayed_on_premises_other_than_a_residence
