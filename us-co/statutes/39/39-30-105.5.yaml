format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-30-105.5
  summary: |-
    A taxpayer conducting qualifying research and experimental activities in an enterprise zone for a trade or business receives a credit equal to three percent of the excess over the prior two-year average. Any applicable carryforward amount is twenty-five percent of the original credit.
  deferred_outputs:
    - output: us-co:statutes/39/39-30-105.5/b#annual_credit_allowable_against_tax_liability
      reason: The annual credit allowable against tax liability is expressly subject to sections 24-46-104.3 and 24-46-108, whose operative rules are not available in copied context.
rules:
  - name: enterprise_zone_research_credit_rate
    kind: parameter
    dtype: Rate
    source: 39-30-105.5(1)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-30-105.5
              excerpt: "equal to three percent"
    versions:
      - effective_from: '1989-01-01'
        formula: |-
          0.03
  - name: enterprise_zone_research_credit_lookback_years
    kind: parameter
    dtype: Count
    source: 39-30-105.5(1)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-30-105.5
              excerpt: "next preceding two income tax years"
    versions:
      - effective_from: '1989-01-01'
        formula: |-
          2
  - name: enterprise_zone_research_credit_carryforward_rate
    kind: parameter
    dtype: Rate
    source: 39-30-105.5(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-30-105.5
              excerpt: "twenty-five\npercent of the original amount of such credit"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.25
  - name: enterprise_zone_research_credit_available
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: 39-30-105.5(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-30-105.5
              excerpt: "activities are conducted in an enterprise zone for the purpose of carrying out a trade or business"
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-30-105.5
              excerpt: "other than\nexpenditures of moneys made available to the taxpayer pursuant to federal or state\nlaw"
    versions:
      - effective_from: '1989-01-01'
        formula: |-
          research_and_experimental_activities_are_qualified_under_section_174
          and activities_are_conducted_in_enterprise_zone_for_trade_or_business
          and expenditures_are_not_moneys_made_available_under_federal_or_state_law
          and expenditures_are_paid_as_internal_revenue_code_expenses
  - name: enterprise_zone_research_credit
    kind: derived
    entity: TaxUnit
    dtype: Money
    unit: USD
    period: Year
    source: 39-30-105.5(1)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-30-105.5
              excerpt: "three percent of the amount by which the amount expended for research\nand experimental activities in the enterprise zone in the income tax year of the\ntaxpayer exceeds the taxpayer's average"
    versions:
      - effective_from: '1989-01-01'
        formula: |-
          if enterprise_zone_research_credit_available:
            enterprise_zone_research_credit_rate * max(0, enterprise_zone_research_and_experimental_expenditures - ((total_actual_enterprise_zone_research_expenditures_first_preceding_year + total_actual_enterprise_zone_research_expenditures_second_preceding_year) / enterprise_zone_research_credit_lookback_years))
          else: 0
  - name: annual_carryforward_credit_installment
    kind: derived
    entity: TaxUnit
    dtype: Money
    unit: USD
    period: Year
    source: 39-30-105.5(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-30-105.5
              excerpt: "Any applicable carryforward amount, which amount shall be twenty-five\npercent of the original amount of such credit."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          max(0, original_amount_of_enterprise_zone_research_credit) * enterprise_zone_research_credit_carryforward_rate
