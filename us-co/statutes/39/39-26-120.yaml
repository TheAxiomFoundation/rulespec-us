format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-26-120
  summary: |-
    "It is unlawful" to refuse required returns, make false or fraudulent returns or statements, fail or refuse tax payment, evade tax collection or payment, or aid attempted tax evasion. A person willfully violating the section commits a class 5 felony; a corporation willfully making a false return or return containing a false statement commits a class 5 felony. Knowingly and willfully swearing to or verifying a false statement commits a class 2 misdemeanor.
rules:
  - name: person_sales_tax_conduct_is_unlawful
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-26-120(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-26-120
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          retailer_or_vendor_refuses_required_return
          or retailer_or_vendor_makes_false_or_fraudulent_return
          or retailer_or_vendor_makes_false_statement_on_return
          or retailer_or_vendor_fails_or_refuses_payment_of_tax
          or retailer_or_vendor_evades_tax_collection_or_payment
          or person_or_purchaser_fails_or_refuses_payment_of_tax
          or person_or_purchaser_evades_tax_payment
          or person_aids_or_abets_attempted_tax_evasion
  - name: person_is_guilty_of_class_5_felony_for_willful_sales_tax_violation
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-26-120(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-26-120
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_sales_tax_conduct_is_unlawful
          and person_acts_willfully
  - name: person_is_guilty_of_class_2_misdemeanor_for_false_statement_verification
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-26-120(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-26-120
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_knowingly_and_willfully_swears_to_or_verifies_false_statement
  - name: corporation_is_guilty_of_class_5_felony_for_willful_false_return
    kind: derived
    entity: Corporation
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-26-120(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-26-120
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          corporation_willfully_makes_false_return
          or corporation_return_willfully_contains_false_statement
