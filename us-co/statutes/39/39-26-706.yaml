format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-26-706
  summary: |-
    Sales, purchases, storage, use, or consumption of specified refractory materials, carbon electrodes, and inorganic chemicals are exempt under parts 1 and 2. Beginning July 1, 2010, collection of the waste tire fee is exempt under part 1.
  deferred_outputs:
    - output: us-co:statutes/39/39-26-706#cigarette_transaction_exempt_from_qualifying_local_sales_and_use_tax
      reason: The clause (II) exception is an operative same-section carve-out, but no executable copied RuleSpec output is available for it.
    - output: us-co:statutes/39/39-26-706#internet_access_service_exempt_from_state_sales_and_use_tax
      reason: The exemption depends on the definition of internet access services in section 24-79-102, for which no copied executable RuleSpec source is available.
    - output: us-co:statutes/39/39-26-706#precious_metal_bullion_or_coin_transaction_exempt_from_state_sales_and_use_tax
      reason: The exemption depends on definitions in section 39-26-102, whose copied RuleSpec context is deferred and exports no executable definition.
rules:
  - name: specified_industrial_material_transaction_exempt_from_state_sales_and_use_tax
    kind: derived
    entity: TaxableTransaction
    dtype: Judgment
    period: Day
    source: C.R.S. 39-26-706(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-26-706
              excerpt: "refractory materials and carbon electrodes used by a person manufacturing iron and steel for sale or profit ... inorganic chemicals used in the processing of vanadium-uranium ores"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          transaction_is_refractory_material_used_to_manufacture_iron_and_steel_for_sale_or_profit
          or transaction_is_carbon_electrode_used_to_manufacture_iron_and_steel_for_sale_or_profit
          or transaction_is_inorganic_chemical_used_to_process_vanadium_uranium_ores
  - name: waste_tire_fee_collection_exempt_from_state_sales_tax
    kind: derived
    entity: TaxableTransaction
    dtype: Judgment
    period: Day
    source: C.R.S. 39-26-706(5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-26-706
              excerpt: "the collection of the waste tire fee ... is exempt from taxation under part 1"
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-co/statute/39/39-26-706
              excerpt: "On and after July 1, 2010"
    versions:
      - effective_from: '2010-07-01'
        formula: |-
          transaction_is_waste_tire_fee_collection
