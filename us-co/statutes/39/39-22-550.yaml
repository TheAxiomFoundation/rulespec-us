format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-550
  summary: |-
    “Lawn equipment means a lawn mower, leaf blower, trimmer, or snowblower.” For income tax years commencing on or after January 1, 2024, but before January 1, 2027, the credit equals thirty-three percent of qualifying aggregate purchase prices; purchasers receive a thirty-percent discount, and the retailer may retain an administrative fee not exceeding three percent. Excess credit must be refunded and may not be carried forward.
  deferred_outputs:
    - output: us-co:statutes/39/39-22-550/c#qualified_retailer
      reason: The qualified-retailer definition depends on the definitions of “retailer” in section 39-26-102(8), whose copied RuleSpec context is deferred and has no executable export.
    - output: us-co:statutes/39/39-22-550/3/a#electric_lawn_equipment_tax_credit
      reason: Computing the credit requires the unresolved qualified-retailer definition, the purchase-price definition in section 39-26-102(7), and the in-state sale rules of section 39-26-104(3)(a), none of which has a usable copied executable export.
      source_values:
        - us-co:statutes/39/39-22-550#electric_lawn_equipment_credit_rate
        - us-co:statutes/39/39-22-550#purchaser_discount_rate
        - us-co:statutes/39/39-22-550#maximum_administrative_fee_rate
        - us-co:statutes/39/39-22-550#minimum_timely_monthly_returns
rules:
  - name: lawn_equipment
    kind: derived
    entity: Asset
    dtype: Judgment
    source: 39-22-550(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-22-550
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          equipment_is_lawn_mower
          or equipment_is_leaf_blower
          or equipment_is_trimmer
          or equipment_is_snowblower

  - name: electric_lawn_equipment_credit_rate
    kind: parameter
    dtype: Rate
    source: 39-22-550(3)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-550
              excerpt: "thirty-three percent of the aggregate purchase price"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          0.33

  - name: purchaser_discount_rate
    kind: parameter
    dtype: Rate
    source: 39-22-550(3)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-550
              excerpt: "equal to thirty percent of the purchase price"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          0.30

  - name: maximum_administrative_fee_rate
    kind: parameter
    dtype: Rate
    source: 39-22-550(3)(d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-550
              excerpt: "not to exceed three percent of the purchase price"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          0.03

  - name: minimum_timely_monthly_returns
    kind: parameter
    dtype: Count
    source: 39-22-550(2)(c)(II)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-550
              excerpt: "for at\nleast twelve months"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          12

  - name: performance_measurement_period_years
    kind: parameter
    dtype: Count
    source: 39-22-550(5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-550
              excerpt: "within five years after the tax\ncredit becomes effective"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          5

  - name: excess_credit_refundable
    kind: derived
    entity: Business
    dtype: Judgment
    period: Year
    source: 39-22-550(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-22-550
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          true

  - name: excess_credit_carryforward_allowed
    kind: derived
    entity: Business
    dtype: Judgment
    period: Year
    source: 39-22-550(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-22-550
    versions:
