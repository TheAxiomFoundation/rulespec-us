format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-526
  summary: |-
    For income tax years commencing on or after January 1, 2014, but prior to January 1, 2030, credits and transferable expense amounts are allowed for approved environmental remediation of contaminated property. The ordinary percentages are forty percent of the first seven hundred fifty thousand dollars and thirty percent of the next seven hundred fifty thousand dollars; qualifying rural projects beginning in 2022 use fifty and forty percent. Expenditures exceeding one million five hundred thousand dollars on an individual project are not allowed. “Qualified entity” includes the governmental, educational, quasi-governmental, public-corporation, and exempt nonprofit entities enumerated in subsection (2)(d).
  deferred_outputs:
    - output: us-co:statutes/39/39-22-526/b#approved_environmental_remediation_tax_credit
      reason: The final credit depends on a certificate issued pursuant to section 25-16-306 (5)(b), whose required legal output is not available in copied RuleSpec context.
      source_values:
        - us-co:statutes/39/39-22-526#tax_credit_first_expenditure_band
        - us-co:statutes/39/39-22-526#tax_credit_second_expenditure_band
        - us-co:statutes/39/39-22-526#tax_credit_ordinary_first_band_rate
        - us-co:statutes/39/39-22-526#tax_credit_ordinary_second_band_rate
        - us-co:statutes/39/39-22-526#tax_credit_rural_first_band_rate
        - us-co:statutes/39/39-22-526#tax_credit_rural_second_band_rate
        - us-co:statutes/39/39-22-526#tax_credit_project_expenditure_limit
    - output: us-co:statutes/39/39-22-526/2/b#approved_environmental_remediation_transferable_expense_amount
      reason: The final transferable expense amount depends on a property certificate issued pursuant to section 25-16-306 (5)(b), whose required legal output is not available in copied RuleSpec context.
      source_values:
        - us-co:statutes/39/39-22-526#transferable_expense_first_expenditure_band
        - us-co:statutes/39/39-22-526#transferable_expense_second_expenditure_band
        - us-co:statutes/39/39-22-526#transferable_expense_ordinary_first_band_rate
        - us-co:statutes/39/39-22-526#transferable_expense_ordinary_second_band_rate
        - us-co:statutes/39/39-22-526#transferable_expense_rural_first_band_rate
        - us-co:statutes/39/39-22-526#transferable_expense_rural_second_band_rate
        - us-co:statutes/39/39-22-526#transferable_expense_project_expenditure_limit
    - output: us-co:statutes/39/39-22-526/3.5#tax_preference_legislative_findings
      reason: Subsection (3.5) states legislative purposes and performance-measure findings rather than an entity-scoped executable legal computation.
    - output: us-co:statutes/39/39-22-526/3.7#exempt_taxpayer_return_filing_requirement
      reason: The filing requirement depends on the exemptions in section 39-22-112 and the return mechanics in section 39-22-601 (7)(b), neither of which is available in copied RuleSpec context.
