format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-3-111
  summary: |-
    Property owned and used solely and exclusively for strictly charitable purposes, and not for private gain or corporate profit, is exempt if used by a fraternal or veterans' organization and net income is irrevocably dedicated to specified charitable purposes and maintaining and operating the organization.
rules:
  - name: fraternal_or_veterans_charitable_property_tax_exemption_applies
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-3-111
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-3-111
              excerpt: "owned and used solely and exclusively for strictly charitable purposes and not for private gain or corporate profit"
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-3-111
              excerpt: "used by any fraternal organization ... or by any veterans' organization"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-3-111
              excerpt: "net income derived from the use of such property is irrevocably dedicated"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          property_is_owned
          and property_is_used_solely_and_exclusively_for_strictly_charitable_purposes
          and not property_is_used_for_private_gain_or_corporate_profit
          and (property_is_used_by_fraternal_organization or property_is_used_by_veterans_organization)
          and net_income_is_irrevocably_dedicated_to_specified_purposes_and_organization_maintenance
