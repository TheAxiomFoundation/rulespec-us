format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-1001
  summary: |-
    A voluntary-contribution program created on or after June 2, 1985 generally requires a sunset clause of no more than three income tax years. Contributions generally must total at least fifty thousand dollars during January 1 through September 30, subject to listed exceptions and initial-year rules. No more than twenty voluntary contributions may appear on an income tax return.
rules:
  - name: maximum_sunset_income_tax_years
    kind: parameter
    dtype: Count
    source: 39-22-1001(1)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-1001
              excerpt: "shall apply to no more than three income tax years"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          3

  - name: minimum_annual_voluntary_contribution_amount
    kind: parameter
    dtype: Money
    unit: USD
    source: 39-22-1001(5)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-1001
              excerpt: "does not equal or exceed fifty thousand dollars"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          50000

  - name: maximum_voluntary_contributions_on_return
    kind: parameter
    dtype: Count
    source: 39-22-1001(7)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-1001
              excerpt: "No more than twenty voluntary contributions are permitted"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          20

  - name: sunset_clause_is_required
    kind: derived
    entity: VoluntaryContributionProgram
    dtype: Judgment
    period: Year
    source: 39-22-1001(1)(a)-(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-22-1001
              excerpt: "any program funded by voluntary contributions of income tax refunds that is created on or after June 2, 1985, shall have a sunset clause"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-22-1001
              excerpt: "there shall be no requirement for a sunset clause for"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          program_is_funded_by_voluntary_income_tax_refund_contributions
          and program_creation_is_on_or_after_june_2_1985
          and not program_is_listed_sunset_clause_exception

  - name: sunset_clause_duration_is_within_general_limit
    kind: derived
    entity: VoluntaryContributionProgram
    dtype: Judgment
    period: Year
    source: 39-22-1001(1)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-22-1001
              excerpt: "shall apply to no more than three income tax years"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-1001
              excerpt: "no more than three income tax years"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          sunset_clause_income_tax_year_count <= maximum_sunset_income_tax_years

  - name: annual_minimum_contribution_requirement_is_satisfied
    kind: derived
    entity: VoluntaryContributionProgram
    dtype: Judgment
    period: Year
    source: 39-22-1001(5)(a)-(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-22-1001
              excerpt: "must receive a minimum dollar amount of contributions in each income tax year"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-22-1001
              excerpt: "These voluntary contributions are not required to receive a minimum amount of contributions"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-22-1001
              excerpt: "shall not be required to collect fifty thousand dollars in either the first or the second year"
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-1001
              excerpt: "January 1 through September 30"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          contribution_is_exempt_from_minimum_requirement
          or contribution_is_in_first_or_second_appearance_year_under_subsection_5_b
          or designated_contributions_received_january_through_september >= minimum_annual_voluntary_contribution_amount
