format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-26-204.5
  summary: |-
    Section 39-26-105.2 harmless-collection provisions apply to qualifying retailers using GIS database data or verified current third-party database data. Subsection (1) is repealed ninety days after the specified notice; the department must notify the revisor no later than fifteen days after the system is operational.
  deferred_outputs:
    - output: us-co:statutes/39/39-26-204.5#retailer_certified_database_harmless_protection_applies
      reason: The subsection (1) protection is subject to a repeal triggered ninety days after a specified notice; RuleSpec has no date-event arithmetic to calculate that trigger from the stated notice event.
      source_values:
        - us-co:statutes/39/39-26-204.5#subsection_one_repeal_delay_days
    - output: us-co:statutes/39/39-26-204.5#department_revisor_notification_timely
      reason: The department's notice deadline is measured from an external operational-verification event and cannot be calculated with the available date-event operations.
      source_values:
        - us-co:statutes/39/39-26-204.5#department_notification_deadline_days
rules:
  - name: subsection_one_repeal_delay_days
    kind: parameter
    dtype: Count
    source: C.R.S. 39-26-204.5(1)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: effective_period
            source:
              corpus_citation_path: us-co/statute/39/39-26-204.5
              excerpt: "repealed, effective ninety days after"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          90
  - name: department_notification_deadline_days
    kind: parameter
    dtype: Count
    source: C.R.S. 39-26-204.5(1)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: effective_period
            source:
              corpus_citation_path: us-co/statute/39/39-26-204.5
              excerpt: "no later than fifteen days after"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          15
  - name: retailer_gis_data_harmless_protection_applies
    kind: derived
    entity: Retailer
    dtype: Judgment
    period: Year
    source: C.R.S. 39-26-204.5(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-26-204.5
              excerpt: "applies to any retailer doing business in this state"
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-26-204.5
              excerpt: "making sales of tangible personal property for storage, use, or consumption in the state"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-26-204.5
              excerpt: "collects and remits use tax to the department of revenue"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-26-204.5
              excerpt: "collecting the incorrect amount of tax due on a purchase"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-26-204.5
              excerpt: "using the data contained in the GIS database, or using data from a third-party database that is verified"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          retailer_does_business_in_state
          and retailer_makes_sales_of_tangible_personal_property_for_storage_use_or_consumption_in_state
          and retailer_collects_and_remits_use_tax_to_department_as_provided_by_law
          and retailer_collected_incorrect_tax_due_on_purchase
          and retailer_uses_gis_database_data_or_verified_current_third_party_database_data
