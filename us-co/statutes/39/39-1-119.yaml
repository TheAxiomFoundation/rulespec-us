format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-1-119
  summary: |-
    Escrow tax payments must be annually adjusted using preceding-year taxes, except a reasonable estimate may be used for unassessed substantial improvements. Increases require official notice of increased taxes and may not rest solely on increased assessed valuation. Willful refund failures of a whole month or more carry six-percent annual interest and an equal penalty.
  deferred_outputs:
    - output: us-co:statutes/39/39-1-119#excess_escrow_funds_refund_compliance
      reason: Subsection (1) is expressly subject to section 39-3.5-105 (2), which is not available in copied context, and incorporates federal refund timing and manner requirements not supplied as executable RuleSpec context.
    - output: us-co:statutes/39/39-1-119#willful_refund_failure_interest_amount
      reason: The source specifies an annual interest rate but does not provide the refund amount or accrued-interest calculation period needed to compute the monetary liability.
      source_values:
        - us-co:statutes/39/39-1-119#willful_refund_failure_annual_interest_rate
    - output: us-co:statutes/39/39-1-119#willful_refund_failure_equal_penalty_amount
      reason: The penalty equals the uncomputed interest amount.
rules:
  - name: willful_refund_failure_annual_interest_rate
    kind: parameter
    dtype: Rate
    source: C.R.S. 39-1-119(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-1-119
              excerpt: "interest at a rate of six percent per annum"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.06
  - name: escrow_tax_payment_adjustment_complies
    kind: derived
    entity: EscrowAccount
    dtype: Judgment
    period: Year
    source: C.R.S. 39-1-119(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-1-119
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          payments_adjusted_annually_based_on_preceding_year_taxes
          or (
            person_reasonably_believes_substantial_unassessed_improvements_were_made
            and reasonable_estimate_of_subsequent_year_taxes_used_for_escrow_payments
          )
  - name: escrow_tax_payment_increase_complies
    kind: derived
    entity: EscrowAccount
    dtype: Judgment
    period: Year
    source: C.R.S. 39-1-119(2.5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-1-119
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not escrow_tax_payment_amount_increased
          or (
            official_notification_of_property_tax_levy_increase_received
            and not escrow_tax_payment_increase_based_solely_on_assessed_valuation_increase
          )
