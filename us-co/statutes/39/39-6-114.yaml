format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-6-114
  summary: |-
    Whenever a mine or tunnel is situated partly in two lesser political subdivisions of the same county, the county assessor shall apportion its value between them.
rules:
  - name: county_assessor_must_apportion_multisubdivision_mine_or_tunnel_value
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. 39-6-114
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-6-114
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_mine_or_tunnel
          and asset_is_situated_partly_in_lesser_political_subdivisions_of_same_county
