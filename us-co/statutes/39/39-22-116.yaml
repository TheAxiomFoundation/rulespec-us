format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-116
  summary: |-
    A table-determined tax applies in lieu of the section 39-22-104 tax to qualifying individuals with federal taxable income not exceeding the executive-director-determined ceiling amount; that ceiling is not less than twenty thousand dollars. The executive director may extend table treatment to individuals who itemize deductions.
  deferred_outputs:
    - output: us-co:statutes/39/39-22-116#table_determined_income_tax
      reason: The source requires tax tables prescribed by the executive director and computed using the section 39-22-104 rate, but supplies neither table values nor an executable rate output.
rules:
  - name: minimum_ceiling_amount
    kind: parameter
    dtype: Money
    unit: USD
    source: Colo. Rev. Stat. § 39-22-116(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-116
              excerpt: "not less than twenty thousand dollars"
    versions:
      - effective_from: '1987-01-01'
        formula: |-
          20000
  - name: ceiling_amount_meets_statutory_minimum
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-22-116(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-22-116
              excerpt: "the amount, not less than twenty thousand dollars, determined by the executive director for the tax rate category"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-116
              excerpt: "not less than twenty thousand dollars"
    versions:
      - effective_from: '1987-01-01'
        formula: |-
          ceiling_amount >= minimum_ceiling_amount
  - name: table_tax_applies
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-22-116(1), (6)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-22-116
              excerpt: "does not itemize his deductions ... and whose federal taxable income ... does not exceed the ceiling amount"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-22-116
              excerpt: "may provide that this section shall apply ... to individuals who itemize their deductions"
    versions:
      - effective_from: '1987-01-01'
        formula: |-
          federal_taxable_income_for_colorado_income_tax_purposes <= ceiling_amount
          and (
            taxpayer_does_not_itemize_deductions
            or executive_director_provides_table_tax_for_itemizing_individuals
          )
