format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-3-133
  summary: |-
    Payment of prorated current-year property taxes, together with other unpaid property taxes, delinquent interest, and charges, extinguishes the property-tax lien. If only part of real property becomes exempt and no taxes are collected then, the lien attaches to the remaining real property.
imports:
  - us-co:statutes/39/39-3-131#property_tax_payment_acceptance_required
  - us-co:statutes/39/39-3-132#treasurer_may_collect_prorated_property_taxes
rules:
  - name: property_tax_lien_extinguished_by_required_payments
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-3-133
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-3-133
              excerpt: "Payment to the treasurer of prorated property taxes for the current taxable year, as provided for in sections 39-3-131 and 39-3-132, together with payment of any other unpaid property taxes, delinquent interest, or charges thereon, shall extinguish the lien"
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:statutes/39/39-3-131#property_tax_payment_acceptance_required
              output: property_tax_payment_acceptance_required
              hash: sha256:877ee772f8d5ac63797c22504188be54595a6b6fcdcff2036de69673d5e16c16
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:statutes/39/39-3-132#treasurer_may_collect_prorated_property_taxes
              output: treasurer_may_collect_prorated_property_taxes
              hash: sha256:79bff913bcee46b1d502a481c1ff0f263d1c22de8b2c4b403b4c9953e266c67d
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (property_tax_payment_acceptance_required or treasurer_may_collect_prorated_property_taxes)
          and prorated_property_taxes_paid_to_treasurer
          and all_other_unpaid_property_taxes_delinquent_interest_and_charges_paid

  - name: property_tax_lien_attaches_to_remaining_real_property
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-3-133
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-3-133
              excerpt: "if only a portion of any parcel, tract, or lot of real property becomes exempt from the levy and collection of property tax and no property taxes are collected at that time, the lien of property taxes levied or to be levied shall attach to the remaining portion"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          only_a_portion_of_real_property_becomes_exempt_from_property_tax
          and property_taxes_are_not_collected_at_that_time
