format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-37-111
  summary: |-
    It is unlawful for any vendor to willfully make any false or fraudulent return or false statement on any return or to willfully evade the payment of the tax.
  deferred_outputs:
    - output: us-co:statutes/39/39-37-111#vendor_punishment_as_provided_in_section_39_21_118
      reason: The source directs punishment as provided in section 39-21-118, whose penalty mechanics are not supplied in copied context.
rules:
  - name: vendor_false_return_or_tax_evasion_is_unlawful
    kind: derived
    entity: Vendor
    dtype: Judgment
    period: Year
    source: us-co/statute/39/39-37-111
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-37-111
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          vendor_willfully_makes_false_or_fraudulent_return
          or vendor_willfully_makes_false_statement_on_return
          or vendor_willfully_evades_payment_of_tax_levied_under_part_1
