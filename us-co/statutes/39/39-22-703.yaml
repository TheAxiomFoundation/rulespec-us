format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-703
  summary: |-
    “At the end of each fiscal year, the state treasurer shall transfer all designated moneys in the fund and all interest earned through the investment of fund moneys, after subtracting the appropriation to the department of revenue.”
rules:
  - name: year_end_transfer_amount
    kind: derived
    entity: ColoradoNongameConservationAndWildlifeRestorationCashFund
    dtype: Money
    unit: USD
    period: Year
    source: C.R.S. 39-22-703(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-703
              excerpt: “transfer all designated moneys in the fund and all interest earned ... after subtracting the appropriation to the department of revenue”
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          designated_moneys_in_fund
          + interest_earned_through_investment_of_fund_moneys
          - appropriation_to_department_of_revenue
