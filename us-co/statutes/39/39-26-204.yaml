format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-26-204
  summary: |-
    If a person neglects or refuses timely return, payment, or accounting, the executive director shall add a penalty equal to the greater of fifteen dollars or ten percent of the unpaid amount plus one-half percent per month from the due date, not exceeding eighteen percent in the aggregate.
  deferred_outputs:
    - output: us-co:statutes/39/39-26-204/2/a#retailer_use_tax_collection_obligation
      reason: The tax to be collected is imposed by unavailable section 39-26-202.
    - output: us-co:statutes/39/39-26-204/5/a#estimated_tax_interest
      reason: The applicable interest is determined under unavailable section 39-21-110.5.
rules:
  - name: estimated_tax_penalty_minimum_amount
    kind: parameter
    dtype: Money
    unit: USD
    source: Colo. Rev. Stat. § 39-26-204(5)(a)(I)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-26-204
              excerpt: "The sum of fifteen dollars"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          15
  - name: estimated_tax_penalty_base_rate
    kind: parameter
    dtype: Rate
    source: Colo. Rev. Stat. § 39-26-204(5)(a)(I)(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-26-204
              excerpt: "Ten percent of such unpaid, unaccounted, or incorrectly accounted amount"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.10
  - name: estimated_tax_penalty_monthly_rate
    kind: parameter
    dtype: Rate
    source: Colo. Rev. Stat. § 39-26-204(5)(a)(I)(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-26-204
              excerpt: "plus one-half percent per month from the date when due"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.005
  - name: estimated_tax_penalty_maximum_aggregate_rate
    kind: parameter
    dtype: Rate
    source: Colo. Rev. Stat. § 39-26-204(5)(a)(I)(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-26-204
              excerpt: "not exceeding eighteen percent in the aggregate"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.18
  - name: estimated_tax_penalty
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: USD
    source: Colo. Rev. Stat. § 39-26-204(5)(a)(I)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-26-204
              excerpt: "If a person neglects or refuses to make a timely return in payment of the tax or to pay or correctly account for any tax ... the executive director ... shall add ... a penalty equal to the greater of"
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-26-204
              excerpt: "The sum of fifteen dollars; or ... Ten percent ... plus one-half percent per month ... not exceeding eighteen percent in the aggregate."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if taxpayer_neglects_or_refuses_timely_return_payment_or_accounting:
            max(estimated_tax_penalty_minimum_amount, unpaid_unaccounted_or_incorrectly_accounted_tax_amount * min(estimated_tax_penalty_base_rate + (estimated_tax_penalty_monthly_rate * months_from_tax_due_date), estimated_tax_penalty_maximum_aggregate_rate))
          else: 0
