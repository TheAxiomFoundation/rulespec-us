format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-3-103
  summary: |-
    Personal effects not used for the production of income at any time are exempt from property tax.
rules:
  - name: personal_effect_exempt_from_property_tax
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-3-103
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-3-103
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_personal_effect
          and
          not personal_effect_is_used_for_production_of_income_at_any_time
