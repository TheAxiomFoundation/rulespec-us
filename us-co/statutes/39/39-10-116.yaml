format: rulespec/v1
module:
  summary: |-
    The treasurer shall assess a penalty against a person whose check for charges collectible by the treasurer is not paid upon presentment; the penalty is in addition to other penalties or interest.
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-10-116
  deferred_outputs:
    - output: us-co:statutes/39/39-10-116#dishonored_check_penalty_amount
      reason: The penalty ceiling is determined by section 13-21-109 (1)(b), which is not available in copied context.
rules:
  - name: treasurer_must_assess_dishonored_check_penalty
    kind: derived
    entity: StateTreasurer
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-10-116
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-10-116
              excerpt: "shall assess a penalty ... against any person who issues a check ... that is not paid upon its presentment"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_issued_check_to_treasurer_for_collectible_charge_not_paid_on_presentment
  - name: dishonored_check_penalty_is_additional_to_other_penalties_or_interest
    kind: derived
    entity: StateTreasurer
    dtype: Judgment
    period: Year
