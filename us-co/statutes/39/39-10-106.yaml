format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-10-106
  summary: "\u201Cthe owner of each fractional interest in such units shall be liable\
    \ for the same proportion of the tax levied against the total unit that his net\
    \ taxable revenues received therefrom bears to the total net taxable revenues\
    \ received from such unit.\u201D For an owner taking production in kind who does\
    \ not provide required information, liability uses net taxable revenues reported\
    \ by the operator."
  deferred_outputs:
  - output: us-co:statutes/39/39-10-106/b#first_purchaser_withholding_after_notice
    reason: The registered-mail notice, withholding, remittance, delinquency, and
      payment-in-full process in subsection (4)(b)(I) requires transaction-level purchaser
      and treasurer administration not representable as a scalar RuleSpec output.
  - output: us-co:statutes/39/39-10-106/b#unit_operator_withheld_tax_liability_satisfied
    reason: Subsection (4.5)(b) deems a unit operator's liability satisfied to the
      extent payments were withheld but not remitted; the required payment-ledger
      allocation is not representable by the available scalar schema.
  - output: us-co:statutes/39/39-10-106/c#first_purchaser_liability_for_unremitted_operator_tax
    reason: Subsection (4.5)(c) imposes first-purchaser liability and authorizes collection
      procedures based on collection and transfer events, which require transaction-level
      enforcement records not available in this schema.
rules:
- name: fractional_interest_owner_unit_tax_liability
  kind: derived
  entity: FractionalInterestOwner
  dtype: Money
  period: Year
  unit: USD
  source: 39-10-106(1)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-10-106
          excerpt: liable for the same proportion of the tax levied against the total
            unit that his net taxable revenues received therefrom bears to the total
            net taxable revenues received from such unit
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-co/statute/39/39-10-106
          excerpt: a fractional interest owner who takes production in kind does not
            provide the information to the operator
  versions:
  - effective_from: '0001-01-01'
    formula: 'if fractional_interest_owner_takes_production_in_kind and not fractional_interest_owner_provided_required_tax_reporting_information:
      total_unit_tax * operator_reported_owner_net_taxable_revenues / total_unit_net_taxable_revenues
      else: total_unit_tax * fractional_interest_owner_net_taxable_revenues / total_unit_net_taxable_revenues'
