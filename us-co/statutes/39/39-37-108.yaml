format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-37-108
  summary: |-
    “Every vendor shall keep complete and accurate records necessary for the determination of the correct tax liability,” including itemized invoices of covered retail sales. A vendor shall provide required and other necessary records to the executive director if requested.
rules:
  - name: vendor_recordkeeping_requirement_satisfied
    kind: derived
    entity: Vendor
    dtype: Judgment
    period: Year
    source: Colorado Revised Statutes § 39-37-108(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-37-108
              excerpt: "Every vendor shall keep complete and accurate records necessary for the determination of the correct tax liability, including itemized invoices of all retail sales of any firearms, firearm precursor parts, or ammunition in this state."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          vendor_keeps_complete_and_accurate_records_necessary_for_correct_tax_liability
          and vendor_keeps_itemized_invoices_of_all_covered_retail_sales_in_state
  - name: requested_records_provision_requirement_satisfied
    kind: derived
    entity: Vendor
    dtype: Judgment
    period: Year
    source: Colorado Revised Statutes § 39-37-108(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-37-108
              excerpt: "A vendor shall provide a copy of the records required to be kept pursuant\nto subsection (1) of this section, and any other records deemed necessary by the\nexecutive director for the determination of the correct tax liability to the executive\ndirector, if so requested."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not executive_director_requests_records
          or (
            vendor_provides_copy_of_required_records
            and vendor_provides_other_records_deemed_necessary_by_executive_director
          )
