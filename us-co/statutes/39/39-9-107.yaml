format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-9-107
  summary: |-
    Whenever the state board of equalization orders a valuation change for taxable property in a county, the county assessor shall adjust individual schedules so the assessment roll conforms with the certified statement of changes.
rules:
  - name: assessment_roll_adjustment_requirement_satisfied
    kind: derived
    entity: Assessor
    dtype: Judgment
    period: Year
    source: Colorado Revised Statutes 39-9-107
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-9-107
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not state_board_orders_valuation_change_for_taxable_property_class_or_subclass_in_county
          or (
            statement_of_ordered_changes_is_certified_by_state_board_chairman
            and assessor_makes_proper_individual_schedule_adjustment_conforming_assessment_roll
          )
