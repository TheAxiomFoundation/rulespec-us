format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-556
  summary: |-
    For tax years commencing on or after January 1, 2024, but before January 1, 2033, a qualified taxpayer is allowed a credit for actual eligible facility-construction costs. The applicable percentage is thirty, twenty-four, eighteen, or twelve percent based on when construction begins. The credit is claimed for the tax year in which the facility is placed in service, is refundable, and may not be carried forward. Aggregate certificate limits are one million dollars for 2024, two million dollars per year for 2025 and 2026, and three million dollars per year for 2027 through 2032. A credit is recaptured if sustainable aviation fuel production is less than sixty percent of total facility fuel production in any of the three immediately following taxable years.
  deferred_outputs:
    - output: us-co:statutes/39/39-22-556/a#colorado_energy_office
      reason: The institutional definition depends on section 24-38.5-101, for which no copied RuleSpec definition is available.
    - output: us-co:statutes/39/39-22-556/b#department
      reason: This institutional definition identifies the department of revenue but does not establish a computable policy output.
    - output: us-co:statutes/39/39-22-556/c#qualified_taxpayer
      reason: The source enumerates aviation businesses, sustainable aviation fuel producers, and airports, but does not define those classifications in this source unit.
    - output: us-co:statutes/39/39-22-556/d#sustainable_aviation_fuel
      reason: The definition incorporates section 40B(d) of the Internal Revenue Code, for which no copied RuleSpec definition is available.
    - output: us-co:statutes/39/39-22-556/e#sustainable_aviation_fuel_production_facility
      reason: Computing the complete definition requires the unavailable section 40B(d) sustainable-aviation-fuel definition and standards determined by the Colorado energy office.
    - output: us-co:statutes/39/39-22-556/1#tax_expenditure_purpose_and_effectiveness_measure
      reason: Legislative findings, purpose, and effectiveness-measure direction are documentary and do not define a taxpayer-level computation.
    - output: us-co:statutes/39/39-22-556/4#tax_credit_certificate_administration
      reason: Application review, certificate issuance, and interagency reporting are administrative processes requiring office-level application and certificate relations.
    - output: us-co:statutes/39/39-22-556/5#office_facility_approval_standards
      reason: The office must develop and publish standards; the standards themselves are not supplied in this source unit.
    - output: us-co:statutes/39/39-22-556/6/a#facility_production_reporting_duty
      reason: The annual facility-report submission duty is administrative and requires a report-event relation not supplied by this source unit.
    - output: us-co:statutes/39/39-22-556/7#annual_effectiveness_report
      reason: This is an administrative reporting duty, and its notwithstanding dependency on section 24-1-136(11)(a)(I) is unavailable.
rules:
  - name: initial_facility_credit_rate
    kind: parameter
    dtype: Rate
    source: 39-22-556(3)(a)(I)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-556
              excerpt: "Thirty percent for a facility for which construction begins on or after\nJanuary 1, 2024, but before January 1, 2027"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          0.30

  - name: first_reduced_facility_credit_rate
    kind: parameter
    dtype: Rate
    source: 39-22-556(3)(a)(II)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-556
              excerpt: "Twenty-four percent for a facility for which construction begins on or\nafter January 1, 2027, but before January 1, 2028"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          0.24

  - name: second_reduced_facility_credit_rate
    kind: parameter
    dtype: Rate
    source: 39-22-556(3)(a)(III)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-556
              excerpt: "Eighteen percent for a facility for which construction begins on or after\nJanuary 1, 2028, but before January 1, 2029"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          0.18

  - name: final_facility_credit_rate
    kind: parameter
    dtype: Rate
    source: 39-22-556(3)(a)(IV)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-556
              excerpt: "Twelve percent for a facility for which construction begins on or after\nJanuary 1, 2029, but before January 1, 2033"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          0.12

  - name: annual_certificate_cap
    kind: parameter
    dtype: Money
    unit: USD
    period: Year
    source: 39-22-556(4)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-556
              excerpt: "one million dollars for the 2024\nincome tax year"
          - path: versions[1].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-556
              excerpt: "two million dollars per year for the 2025 and 2026 income tax\nyears"
          - path: versions[2].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-556
              excerpt: "three million dollars per year for income tax years 2027 through 2032"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          1000000
      - effective_from: '2025-01-01'
        formula: |-
          2000000
      - effective_from: '2027-01-01'
        formula: |-
          3000000
      - effective_from: '2033-01-01'
        formula: |-
          0

  - name: minimum_sustainable_fuel_production_share
    kind: parameter
    dtype: Rate
    source: 39-22-556(6)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-556
              excerpt: "less than sixty\npercent of the total fuel production of the facility"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          0.60

  - name: credit_recapture_monitoring_years
    kind: parameter
    dtype: Count
    source: 39-22-556(6)(a)-(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-556
              excerpt: "annually submit a report for three\nyears thereafter"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          3

  - name: facility_credit_rate
    kind: derived
    entity: TaxUnit
    dtype: Rate
    period: Year
    source: 39-22-556(3)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-556
              excerpt: "equal to:\n(I) Thirty percent for a facility for which construction begins on or after\nJanuary 1, 2024, but before January 1, 2027;\n(II) Twenty-four percent for a facility for which construction begins on or\nafter January 1, 2027, but before January 1, 2028;\n(III) Eighteen percent for a facility for which construction begins on or after\nJanuary 1, 2028, but before January 1, 2029; and\n(IV) Twelve percent"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          if construction_began_in_initial_rate_window: initial_facility_credit_rate else: if construction_began_in_first_reduced_rate_window: first_reduced_facility_credit_rate else: if construction_began_in_second_reduced_rate_window: second_reduced_facility_credit_rate else: final_facility_credit_rate

  - name: sustainable_aviation_fuel_facility_credit
    kind: derived
    entity: TaxUnit
    dtype: Money
    unit: USD
    period: Year
    source: 39-22-556(f)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-556
              excerpt: "a qualified taxpayer is allowed a credit against the income tax\nimposed under this article 22 for an amount of the actual cost paid to construct,\nreconstruct, or erect a sustainable aviation fuel production facility in the state\nequal to"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          if qualified_taxpayer and facility_placed_in_service_in_tax_year and tax_credit_certificate_issued: max(0, eligible_actual_facility_cost) * facility_credit_rate else: 0

  - name: refundable_excess_facility_credit
    kind: derived
    entity: TaxUnit
    dtype: Money
    unit: USD
    period: Year
    source: 39-22-556(8)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-556
              excerpt: "If the credit authorized by this section exceeds the income tax due on the\nincome of the qualified taxpayer for the taxable year, the excess credit may not be\ncarried forward and must be refunded"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          max(0, sustainable_aviation_fuel_facility_credit - max(0, income_tax_due))

  - name: production_share_below_recapture_threshold
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: 39-22-556(6)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-22-556
              excerpt: "If the sustainable aviation fuel production of a facility for which a\nqualified taxpayer was allowed a credit under this section comprises less than sixty\npercent of the total fuel production of the facility"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          total_facility_fuel_production > 0
          and sustainable_aviation_fuel_production / total_facility_fuel_production < minimum_sustainable_fuel_production_share

  - name: recaptured_facility_credit
    kind: derived
    entity: TaxUnit
    dtype: Money
    unit: USD
    period: Year
    source: 39-22-556(6)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-556
              excerpt: "add the amount of the disallowed credit to its return as a recaptured credit for the\ntax year in which the credit is disallowed"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          if production_share_below_recapture_threshold: max(0, disallowed_facility_credit_amount) else: 0
