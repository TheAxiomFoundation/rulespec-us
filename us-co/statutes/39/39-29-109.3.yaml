format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-29-109.3
  summary: |-
    The general assembly may appropriate operational-fund money subject to specified percentage limits; additional appropriations are authorized when less than one hundred percent is appropriated for listed purposes. The section also directs specified transfers and requires an operational-fund reserve equal to two times current-fiscal-year appropriations.
