format: rulespec/v1
module:
  status: deferred
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-3-207
  summary: |-
    Each assessor and treasurer shall submit exemption reports; the administrator shall review reports, deny ineligible claims, decide protests, cross-check reimbursement reports, and notify local officials. The state treasurer shall reimburse properly allowed exemptions and adjust reimbursement errors. Reports are confidential.
  deferred_outputs:
    - output: us-co:statutes/39/39-3-207/1#county_exemption_report
      reason: The reporting duty requires structured county property, applicant, and exemption-report records that are not representable as a supported entity-scoped RuleSpec output.
    - output: us-co:statutes/39/39-3-207/c#separate_identification_of_section_39_3_203_1_5_exemptions
      reason: The required separate identification is a prescribed administrative report format and county-level record submission, not a computable RuleSpec output.
    - output: us-co:statutes/39/39-3-207/2#administrator_exemption_review_and_notice
      reason: Review, notice, protest, assessor-record verification, and administrative decision procedures require unsupported administrative-case and document-delivery workflows.
    - output: us-co:statutes/39/39-3-207/3#treasurer_exemption_reimbursement_report
      reason: The report is an administrative county record submission requiring property-level data and governmental revenue records not represented by the supported schema.
    - output: us-co:statutes/39/39-3-207/3_5#administrator_cross_check_and_reimbursement_adjustment
      reason: Cross-checking county reports and directing reimbursement corrections require administrative records, prior-year payment history, and intergovernmental workflow support.
    - output: us-co:statutes/39/39-3-207/3_7#deceased_exemption_recipient_notification
      reason: The annual vital-statistics data exchange and assessor notification require unsupported external registry and administrative list-delivery operations.
    - output: us-co:statutes/39/39-3-207/4#state_reimbursement_and_local_distribution
      reason: Issuance of county reimbursement warrants and distribution to local governmental entities require unsupported governmental-fund, county, treasurer, and entity-allocation relations.
    - output: us-co:statutes/39/39-3-207/4_5#erroneous_exemption_reimbursement_adjustment
      reason: The current-year reimbursement adjustment depends on administrator-directed corrections and prior reimbursement records unavailable in the supported schema.
    - output: us-co:statutes/39/39-3-207/5#exemption_report_confidentiality
      reason: Confidentiality and legally authorized report sharing are access-control obligations, not computable policy outputs.
rules: []
