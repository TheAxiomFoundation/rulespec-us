format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-343
  summary: |-
    For income tax years commencing on or after January 1, 2018, an S corporation or partnership may annually elect entity-level taxation, but only when section 164 limits deductions allowed to individuals. A special composite amended return filed for years beginning before January 1, 2022, triggers protections from late-filing penalties and interest. The department has one year to review that return, one year after final determination to assess, and six years after final determination to enforce.
  deferred_outputs:
    - output: us-co:statutes/39/39-22-343#entity_level_tax_election_allowed
      reason: Election availability depends on the limitation on deductions allowed to individuals under Internal Revenue Code section 164, for which no executable RuleSpec context is available.
    - output: us-co:statutes/39/39-22-343#entity_level_tax_election_filing_satisfies_return_requirements
      reason: The ordinary election-filing branch depends on the return requirements of section 39-22-601, for which no copied RuleSpec context is available; the special historical branch also remains subject to the unavailable section 164 limitation.
    - output: us-co:statutes/39/39-22-343#special_composite_amended_return_adjustment_deadline
      reason: Computing the date one year after filing requires date arithmetic, and the adjustment procedure in section 39-21-103 has no executable exports.
      source_values:
        - us-co:statutes/39/39-22-343#special_return_review_period_years
    - output: us-co:statutes/39/39-22-343#special_composite_amended_return_assessment_deadline
      reason: Computing the date one year after final determination requires date arithmetic, and final determination under section 39-21-103 has no executable RuleSpec export.
      source_values:
        - us-co:statutes/39/39-22-343#special_return_assessment_period_years
    - output: us-co:statutes/39/39-22-343#special_composite_amended_return_enforcement_deadline
      reason: Computing the date six years after final determination requires date arithmetic, and final determination under section 39-21-103 has no executable RuleSpec export.
      source_values:
        - us-co:statutes/39/39-22-343#special_return_enforcement_period_years
rules:
  - name: special_return_review_period_years
    kind: parameter
    dtype: Count
    source: Colo. Rev. Stat. § 39-22-343(1)(c)(III)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-343
              excerpt: "the department shall have one year from the date the composite amended tax\nreturn is filed to review the return"
    versions:
      - effective_from: '2023-09-01'
        formula: |-
          1

  - name: special_return_assessment_period_years
    kind: parameter
    dtype: Count
    source: Colo. Rev. Stat. § 39-22-343(1)(c)(III)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-343
              excerpt: "within one year after a final determination is made"
    versions:
      - effective_from: '2023-09-01'
        formula: |-
          1

  - name: special_return_enforcement_period_years
    kind: parameter
    dtype: Count
    source: Colo. Rev. Stat. § 39-22-343(1)(c)(III)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-343
              excerpt: "enforced at\nany time within six years from the date of the final determination"
    versions:
      - effective_from: '2023-09-01'
        formula: |-
          6

  - name: special_return_late_penalty_and_interest_prohibition_applies
    kind: derived
    entity: Business
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-22-343(1)(c)(II)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-22-343
              excerpt: "if an S corporation or\npartnership files a return specified in subsection (1)(c)(I)"
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-22-343
              excerpt: "shall incur\nany penalties for filing late nor owe interest"
    versions:
      - effective_from: '2023-09-01'
        formula: |-
          business_is_s_corporation_or_partnership
          and business_filed_special_composite_amended_return
