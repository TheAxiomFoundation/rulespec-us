format: rulespec/v1
module:
  status: entity_not_supported
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-8-104
  summary: |-
    Prior to July 1, the county clerk and recorder shall publish notice that the county board of equalization will review the assessment roll and hear assessor appeals. A county using the alternate protest and appeal procedure shall publish corresponding notice before its established date, no later than September 1. Notice of exemption-denial contests is required before each August 1. If no newspaper exists, notice shall be posted in specified county offices and at least two other public places.
  deferred_outputs:
    - output: us-co:statutes/39/39-8-104#standard_assessment_roll_hearing_notice_requirement
      reason: The provision imposes a temporally and content-specific administrative publication duty. The supported schema has no notice/publication record entity or date-valued compliance mechanism to represent the required publication, hearing date, location, and notice content faithfully.
    - output: us-co:statutes/39/39-8-104#alternate_procedure_assessment_roll_hearing_notice_requirement
      reason: The provision imposes a temporally and content-specific administrative publication duty, including a county-board-established hearing date capped by September 1, which cannot be represented faithfully with the supported schema.
    - output: us-co:statutes/39/39-8-104#property_tax_exemption_denial_contest_notice_requirement
      reason: The provision requires notice of county-board hearing dates for exemption-denial contests; the supported schema cannot represent the required notice content, publication event, and hearing-date compliance.
    - output: us-co:statutes/39/39-8-104#alternative_posting_notice_requirement
      reason: The provision specifies alternative physical posting locations when no newspaper exists. The supported schema cannot represent publication availability or location-specific posting compliance.
rules: []
