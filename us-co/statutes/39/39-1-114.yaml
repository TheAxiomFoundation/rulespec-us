format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-1-114
  summary: |-
    Any assessor, treasurer, county clerk and recorder, or deputy may administer an oath or affirmation required by articles 1 to 13; a deputy need not certify the oath in the principal's name.
rules:
  - name: authorized_officer_may_administer_required_oath_or_affirmation
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-1-114
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-1-114
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          oath_or_affirmation_is_required_by_articles_1_to_13_of_title_39
          and (
            person_is_assessor
            or person_is_treasurer
            or person_is_county_clerk_and_recorder
            or person_is_deputy_of_assessor_treasurer_or_county_clerk_and_recorder
          )
  - name: deputy_need_not_certify_oath_or_affirmation_in_principal_name
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-1-114
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-1-114
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_deputy_of_assessor_treasurer_or_county_clerk_and_recorder
