format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-10-115
  summary: |-
    “When signed by the treasurer, such certificate, showing payment of all taxes due and the redemption of all outstanding tax sales, shall be conclusive evidence”; “[a]ny loss ... from an error in a tax certificate ... shall be paid by the county”; and “[n]o person other than the treasurer or an authorized agent ... shall issue any property tax certificate.”
rules:
  - name: tax_certificate_conclusively_establishes_property_clear_except_expired_deeded_tax_sales
    kind: derived
    entity: TaxCertificate
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-10-115(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-10-115
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          certificate_is_signed_by_treasurer
          and certificate_shows_all_taxes_due_paid
          and certificate_shows_all_outstanding_tax_sales_redeemed

  - name: county_must_pay_loss_from_tax_certificate_error
    kind: derived
    entity: County
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-10-115(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-10-115
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          county_treasurer_issued_tax_certificate_with_error_causing_loss

  - name: person_may_issue_property_tax_certificate
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-10-115(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-10-115
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_county_treasurer
          or person_is_authorized_agent_of_county_treasurer
