format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-541
  summary: |-
    “Qualified individual” uses family income at or below one hundred fifty thousand dollars for 2019, adjusted for inflation thereafter. A retrofit must satisfy the five health, accessibility, illness or disability, and aging-in-place requirements. The credit is limited to the cost of the retrofit or five thousand dollars per applicable residence or individual, with a one-million-dollar annual certificate cap and an eight-year carryforward limit.
  deferred_outputs:
    - output: us-co:statutes/39/39-22-541/1#tax_credit_performance_statement
      reason: The legislative findings and purpose statement are non-operative and do not define a computational output.
    - output: us-co:statutes/39/39-22-541/a#dependent
      reason: Computing the dependent definition requires the qualifying-child and qualifying-relative definitions in Internal Revenue Code sections 152(c) and 152(d), for which no copied RuleSpec dependency is available.
    - output: us-co:statutes/39/39-22-541/b#division_of_housing
      reason: This institutional definition depends on the division created by section 24-32-704, for which no copied RuleSpec dependency is available.
    - output: us-co:statutes/39/39-22-541/c#qualified_individual
      reason: The applicable family-income limit after 2019 requires an inflation adjustment mechanism that is not stated in this source unit or supplied by copied RuleSpec context.
    - output: us-co:statutes/39/39-22-541/e#visitability
      reason: The provision supplies a qualitative definition of ease of access for persons with disabilities but no source-stated computational test beyond a preexisting factual classification.
    - output: us-co:statutes/39/39-22-541/3/a/I#residence_retrofit_income_tax_credit
      reason: The final credit requires the deferred qualified-individual and dependent definitions and administration of certificate issuance under the annual cap.
    - output: us-co:statutes/39/39-22-541/3/b/I#credit_certificate_issued
      reason: Certificate issuance is an administrative determination by the division of housing and depends on the deferred qualified-individual determination.
    - output: us-co:statutes/39/39-22-541/3/b/III#credit_certificate_request_priority
      reason: First-requested ordering and exhaustion of the annual aggregate cap require an ordered relation of certificate requests and issued certificate amounts not supplied by this source artifact.
    - output: us-co:statutes/39/39-22-541/4#unused_credit_carryforward
      reason: Computing the carryforward requires the deferred allowed-credit amount, current income-tax liability, and credit-use history across tax years.
    - output: us-co:statutes/39/39-22-541/5#annual_credit_certificate_report
      reason: The annual electronic report is an administrative data-reporting duty rather than a taxpayer-level computational policy output.
rules:
  - name: statutory_family_income_limit
    kind: parameter
    dtype: Money
    unit: USD
    period: Year
    source: 39-22-541(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-541
              excerpt: "family income at or\nbelow one hundred fifty thousand dollars for the income tax year commencing on or\nafter January 1, 2019"
    versions:
      - effective_from: '2019-01-01'
        formula: |-
          150000

  - name: residence_credit_limit
    kind: parameter
    dtype: Money
    unit: USD
    source: 39-22-541(3)(a)(I)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-541
              excerpt: "five thousand dollars per\nresidence"
    versions:
      - effective_from: '2019-01-01'
        formula: |-
          5000

  - name: individual_retrofit_credit_limit
    kind: parameter
    dtype: Money
    unit: USD
    source: 39-22-541(3)(a)(I)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-541
              excerpt: "five thousand dollars per\nindividual for whom the retrofit is required"
    versions:
      - effective_from: '2019-01-01'
        formula: |-
          5000

  - name: annual_credit_certificate_cap
    kind: parameter
    dtype: Money
    unit: USD
    period: Year
    source: 39-22-541(3)(b)(III)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-541
              excerpt: "one million dollars per income tax year"
    versions:
      - effective_from: '2019-01-01'
        formula: |-
          1000000

  - name: maximum_credit_carryforward_years
    kind: parameter
    dtype: Count
    source: 39-22-541(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-541
              excerpt: "for a period not\nto exceed eight years"
    versions:
      - effective_from: '2019-01-01'
        formula: |-
          8

  - name: retrofit
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: 39-22-541(d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-22-541
    versions:
      - effective_from: '2019-01-01'
        formula: |-
          residence_change_is_necessary_for_health_welfare_and_safety
          and residence_change_increases_visitability
          and residence_change_enables_greater_accessibility_and_independence
          and residence_change_is_required_due_to_illness_impairment_or_disability
          and residence_change_allows_aging_in_place
