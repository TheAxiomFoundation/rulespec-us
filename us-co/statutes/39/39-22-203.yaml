format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-203
  summary: |-
    “No effect shall be given to a provision in the partnership agreement” that characterizes payments as services or use of capital, or makes the specified disproportionate source allocations except as authorized in subsection (4).
  deferred_outputs:
    - output: us-co:statutes/39/39-22-203#colorado_nonresident_partnership_income_included
      reason: Subsection (1) depends on apportionment or allocation under sections 39-22-303.5, 39-22-303.6, and 39-22-303.7, for which no executable RuleSpec context is supplied.
    - output: us-co:statutes/39/39-22-203#nonresident_partner_distributive_share_determination
      reason: Subsection (5) incorporates section 39-22-202(1)-(3), but the supplied context does not export the referenced distributive-share, character, or special-provision determinations.
rules:
  - name: partnership_agreement_provision_given_no_effect
    kind: derived
    entity: PartnershipAgreementProvision
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-22-203(2)(a)-(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-22-203
              excerpt: "no effect shall be given to a provision in the partnership agreement which"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-22-203
              excerpt: "except as authorized in subsection (4) of this section"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          characterizes_partner_payment_as_services_or_use_of_capital
          or (
            allocates_disproportionate_outside_colorado_income_or_gain
            and not executive_director_authorizes_alternative_method
          )
          or (
            allocates_disproportionate_colorado_loss_or_deduction
            and not executive_director_authorizes_alternative_method
          )
