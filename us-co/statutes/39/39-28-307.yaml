format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-28-307
  summary: |-
    “No stamping agent for a license shall be issued a license or granted a renewal of a license unless the stamping agent has certified in writing, under penalty of perjury,” past and continuing compliance with part 3. “No applicant for a license shall be issued a license unless the applicant has certified in writing, under penalty of perjury,” that the stamping agent will fully comply with this section.
rules:
  - name: stamping_agent_license_certification_requirement_satisfied
    kind: derived
    entity: StampingAgent
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-28-307(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-28-307
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          stamping_agent_certified_in_writing_under_penalty_of_perjury
          and stamping_agent_certification_states_past_full_compliance_with_part_3
          and stamping_agent_certification_states_continuing_full_compliance_with_part_3
  - name: license_applicant_certification_requirement_satisfied
    kind: derived
    entity: LicenseApplicant
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-28-307(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-28-307
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          license_applicant_certified_in_writing_under_penalty_of_perjury
          and license_applicant_certification_states_stamping_agent_will_fully_comply_with_this_section
