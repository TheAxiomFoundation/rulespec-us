format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-6-110
  summary: |-
    A required filer who willfully and knowingly subscribes to a false statement contained in the statements is guilty of perjury in the second degree.
rules:
  - name: required_filer_commits_second_degree_perjury
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: C.R.S. 39-6-110
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-6-110
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_required_to_file_statements
          and person_willfully_and_knowingly_subscribes_to_false_statement_in_required_statements
