format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-21-116.5
  summary: |-
    “All officers of a corporation and all members of a partnership or a limited liability company required to collect, account for, and pay over” article 21 taxes who willfully fail or evade are subject to a penalty “equal to one hundred fifty percent” of the tax amount. This does not apply to the temporary sales tax deduction and retention allowed in section 39-26-105 (1.3); subsection (2) is repealed effective December 31, 2026.
rules:
  - name: willful_tax_collection_penalty_rate
    kind: parameter
    dtype: Rate
    source: C.R.S. § 39-21-116.5(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-21-116.5
              excerpt: "a penalty equal to one hundred fifty percent of the total amount"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1.5
  - name: person_subject_to_tax_collection_duties
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-21-116.5(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-21-116.5
              excerpt: "officers of a corporation and all members of a partnership or a limited liability company required to collect, account for, and pay over"
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-21-116.5
              excerpt: "shall be deemed to be subject to this section if the corporation, partnership, or limited liability company is subject to filing returns or paying taxes"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-21-116.5
              excerpt: "voluntarily or at the direction of their superiors assume the duties or responsibilities"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_officer_or_member_required_to_collect_account_for_and_pay_over_tax
          and organization_is_subject_to_filing_returns_or_paying_article_21_taxes
          and person_assumes_article_21_tax_compliance_duties
  - name: willful_tax_collection_penalty
    kind: derived
    entity: Person
    dtype: Money
    unit: USD
    period: Year
    source: C.R.S. § 39-21-116.5(1)-(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-21-116.5
              excerpt: "who willfully fail to collect, account for, or pay over such tax or who willfully attempt in any manner to evade or defeat any such tax"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-21-116.5
              excerpt: "This section does not apply to the temporary sales tax deduction and\nretention allowed in section 39-26-105 (1.3)."
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-21-116.5
              excerpt: "one hundred fifty percent of the total amount of the tax not collected, accounted for, paid over, or otherwise evaded"
          - path: versions[0].formula
            kind: effective_period
            source:
              corpus_citation_path: us-co/statute/39/39-21-116.5
              excerpt: "This subsection (2) is repealed, effective December 31, 2026."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if person_subject_to_tax_collection_duties
          and (person_willfully_fails_to_collect_account_for_or_pay_over_tax
          or person_willfully_attempts_to_evade_or_defeat_tax_or_payment)
          and not temporary_sales_tax_retention_exception_applies:
            willful_tax_collection_penalty_rate
            * max(0, total_tax_not_collected_accounted_for_paid_over_or_evaded)
          else: 0
