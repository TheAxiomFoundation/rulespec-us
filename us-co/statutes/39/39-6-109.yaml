format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-6-109
  summary: |-
    The assessor may examine records of a producing mine; a willfully false or misleading statement requires valuation as though no statement were filed; and an owner or operator must provide supporting documentation upon the assessor's request.
rules:
  - name: assessor_may_examine_producing_mine_records
    kind: derived
    entity: Assessor
    dtype: Judgment
    period: Year
    source: C.R.S. 39-6-109(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-6-109
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_owns_manages_or_operates_producing_mine

  - name: producing_mine_valued_as_if_no_statement_filed
    kind: derived
    entity: ProducingMine
    dtype: Judgment
    period: Year
    source: C.R.S. 39-6-109(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-6-109
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          assessor_examination_finds_statement_or_material_part_willfully_false_or_misleading

  - name: owner_or_operator_must_provide_supporting_documentation
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: C.R.S. 39-6-109(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-6-109
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_owner_or_operator_of_producing_mine
          and assessor_requested_supporting_documentation
