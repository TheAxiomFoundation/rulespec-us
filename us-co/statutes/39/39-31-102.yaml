format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-31-102
  summary: |-
    Payments must be made quarterly; claimants must use the executive director's form; grants for property taxes and heat or fuel expenses may not exceed amounts actually paid and require claims within twenty-four months after the relevant tax-year end.
  deferred_outputs:
    - output: us-co:statutes/39/39-31-102/1/a#quarterly_grant_payment_amount
      reason: Quarterly payment calculation depends on grant award amount, award quarter, and remaining calendar-year quarters, for which this source provides no supported date or award-payment schema.
    - output: us-co:statutes/39/39-31-102/b#eligible_claimant_database_updated
      reason: The department's periodic database-update duty is administrative and does not establish a computable individual or payment output.
    - output: us-co:statutes/39/39-31-102/2#grant_or_credit_receivable_on_executive_director_form
      reason: Receipt depends on prescribed forms and on the credit under section 39-31-104.5, whose executable RuleSpec source is unavailable.
    - output: us-co:statutes/39/39-31-102/3/a#shared_residence_grant_or_credit_allocation
      reason: Allocation among multiple claimants is committed to executive-director determination and has no source-stated allocation formula.
    - output: us-co:statutes/39/39-31-102/3/b#article_31_grant_or_credit_excluded_from_old_age_pension_income
      reason: The old-age-pension eligibility computation under title 26 is not available to receive this income-treatment rule.
    - output: us-co:statutes/39/39-31-102/4#property_tax_grant_after_actual_payment_cap
      reason: The source caps a grant authorized by section 39-31-101, but the copied section 39-31-101 context does not export the needed authorized property-tax grant amount.
    - output: us-co:statutes/39/39-31-102/4#property_tax_grant_claim_timely
      reason: Determining whether a claim is filed within twenty-four months after an income-tax-year end requires unsupported date arithmetic.
    - output: us-co:statutes/39/39-31-102/6#heat_or_fuel_grant_after_actual_expense_cap
      reason: The source caps the grant authorized by section 39-31-101, but the copied section 39-31-101 context does not export the needed authorized heat-or-fuel grant amount.
    - output: us-co:statutes/39/39-31-102/6#heat_or_fuel_grant_claim_timely
      reason: Determining whether a claim is filed within twenty-four months after a taxable-year end requires unsupported date arithmetic.
rules:
  - name: property_tax_claim_filing_deadline_months_after_income_tax_year_end
    kind: parameter
    dtype: Count
    source: 39-31-102(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-31-102
              excerpt: "expiration of twenty-four months after the end of the income tax year"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          24
  - name: heat_or_fuel_claim_filing_deadline_months_after_taxable_year_end
    kind: parameter
    dtype: Count
    source: 39-31-102(6)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-31-102
              excerpt: "expiration of twenty-four months after the end of the taxable year"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          24
