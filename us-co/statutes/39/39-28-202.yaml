format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-28-202
  summary: |-
    “Solely for purposes of this definition, the terms owns, is owned, and ownership mean ownership of an equity interest, or the equivalent thereof, of ten percent or more.” “0.09 ounces of roll-your-own tobacco shall constitute one individual cigarette.” A tobacco product manufacturer does not include an affiliate unless the affiliate itself satisfies paragraph (a)'s manufacturer conditions.
  deferred_outputs:
    - output: us-co:statutes/39/39-28-202/b#affiliate_tobacco_product_manufacturer_status
      reason: The affiliate exclusion depends on the complete tobacco-product-manufacturer definition, including master settlement agreement terms and payment responsibilities not available as executable RuleSpec dependencies.
rules:
  - name: affiliate_equity_interest_threshold
    kind: parameter
    dtype: Rate
    source: 39-28-202(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-28-202
              excerpt: "ownership of an equity interest, or the equivalent thereof, of ten percent or more"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.10

  - name: qualified_escrow_financial_institution_minimum_assets
    kind: parameter
    dtype: Money
    unit: USD
    source: 39-28-202(6)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-28-202
              excerpt: "having assets of at least one billion dollars"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1000000000

  - name: roll_your_own_tobacco_ounces_per_individual_cigarette
    kind: parameter
    dtype: Decimal
    source: 39-28-202(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: unit
            source:
              corpus_citation_path: us-co/statute/39/39-28-202
              excerpt: "0.09 ounces of roll-your-own tobacco shall constitute one individual cigarette"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.09

  - name: roll_your_own_tobacco_constitutes_individual_cigarette
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: 39-28-202(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-28-202
              excerpt: "0.09 ounces of roll-your-own tobacco shall constitute one individual cigarette"
          - path: versions[0].formula
            kind: parameter
            import:
              target: us-co:statutes/39/39-28-202#roll_your_own_tobacco_ounces_per_individual_cigarette
              output: roll_your_own_tobacco_ounces_per_individual_cigarette
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          roll_your_own_tobacco_ounces == roll_your_own_tobacco_ounces_per_individual_cigarette
