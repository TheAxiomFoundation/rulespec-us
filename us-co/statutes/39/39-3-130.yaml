format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-3-130
  summary: |-
    Previously taxable real property that becomes exempt relieves its conveyor on the title-conveyance date. Since January 1, 1996, personal-property status changes take effect on the following assessment date, while conveyance-year tax obligations remain with the conveyor or do not attach to the acquirer. Inventory becoming taxable through a lease or rental agreement does not impose that year's obligation on the lessor.
rules:
  - name: real_property_conveyor_relieved_from_further_tax_obligations
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. 39-3-130(1)(a)(I)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-3-130
              excerpt: "real property that was previously taxable becomes legally exempt"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-3-130
              excerpt: "person conveying the real property shall be relieved from all further tax obligations"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_real_property
          and asset_was_previously_taxable
          and asset_becomes_legally_exempt
          and title_conveyed_by_agreement_or_court_order

  - name: personal_property_exempt_status_effective_on_following_assessment_date
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. 39-3-130(1)(a)(II)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: effective_period
            source:
              corpus_citation_path: us-co/statute/39/39-3-130
              excerpt: "On and after January 1, 1996"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-3-130
              excerpt: "exempt status shall become effective on the assessment\ndate following the change in status"
    versions:
      - effective_from: '1996-01-01'
        formula: |-
          asset_is_personal_property
          and asset_was_previously_taxable
          and asset_becomes_legally_exempt
          and assessment_date_follows_status_change

  - name: personal_property_conveyor_liable_for_conveyance_year_tax
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. 39-3-130(1)(a)(II)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-3-130
              excerpt: "change in status occurred due to the\nconveyance of the personal property"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-3-130
              excerpt: "shall not be relieved of any tax obligation with respect to the personal property for\nthe property tax year in which the conveyance occurred"
    versions:
      - effective_from: '1996-01-01'
        formula: |-
          asset_is_personal_property
          and asset_was_previously_taxable
          and asset_becomes_legally_exempt
          and status_change_occurred_due_to_conveyance
          and current_property_tax_year_is_conveyance_year

  - name: real_property_acquirer_liable_for_subsequent_tax_obligations
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. 39-3-130(1)(b)(I)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-3-130
              excerpt: "real property that was previously exempt from the levy and\ncollection of property tax becomes taxable"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-3-130
              excerpt: "person acquiring title to the real\nproperty shall be liable for subsequent tax obligations"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_real_property
          and asset_was_previously_exempt
          and asset_becomes_taxable
          and title_acquired_by_person

  - name: personal_property_taxable_status_effective_on_following_assessment_date
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. 39-3-130(1)(b)(II)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: effective_period
            source:
              corpus_citation_path: us-co/statute/39/39-3-130
              excerpt: "On and after January 1, 1996"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-3-130
              excerpt: "taxable status\nshall become effective on the assessment date following the change in status"
    versions:
      - effective_from: '1996-01-01'
        formula: |-
          asset_is_personal_property
          and asset_was_previously_exempt
          and asset_becomes_taxable
          and assessment_date_follows_status_change

  - name: personal_property_acquirer_not_liable_for_conveyance_year_tax
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. 39-3-130(1)(b)(II)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-3-130
              excerpt: "If\nthe change in status occurred due to conveyance"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-3-130
              excerpt: "shall not be liable for any tax\nobligation with respect to the personal property for the property tax year in which\nthe conveyance occurred"
    versions:
      - effective_from: '1996-01-01'
        formula: |-
          asset_is_personal_property
          and asset_was_previously_exempt
          and asset_becomes_taxable
          and status_change_occurred_due_to_conveyance
          and title_acquired_by_person
          and current_property_tax_year_is_conveyance_year

  - name: inventory_lessor_not_liable_for_lease_year_tax
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. 39-3-130(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-3-130
              excerpt: "personal property consisting of inventory"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-3-130
              excerpt: "becomes taxable because the personal property has become\nsubject to a lease or rental agreement"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-3-130
              excerpt: "lessor shall not be responsible for any\ntax obligation on the property for the property tax year in which the agreement was\nexecuted"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_personal_property
          and asset_is_inventory
          and asset_becomes_taxable
          and taxable_status_change_due_to_lease_or_rental_agreement
          and current_property_tax_year_is_lease_or_rental_agreement_year
