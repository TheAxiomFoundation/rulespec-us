format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-326
  summary: |-
    A shareholder who is both a resident and nonresident during a taxable period has each pro rata S corporation income share further prorated by days of residence and nonresidence.
rules:
  - name: resident_period_income_attributable_to_state
    kind: derived
    entity: Shareholder
    dtype: Money
    period: Year
    unit: USD
    source: Colo. Rev. Stat. § 39-22-326
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-326
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if shareholder_is_resident_and_nonresident_during_taxable_period:
            s_corporation_income_attributable_to_state_pro_rata_share * days_in_residence_period / (days_in_residence_period + days_in_nonresidence_period)
          else: 0

