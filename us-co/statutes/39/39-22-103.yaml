format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-103
  summary: |-
    “Resident individual means a natural person who is domiciled in this state” or who maintains a permanent place of abode in this state and spends more than six months of the taxable year within this state. “A nonresident individual means an individual other than a resident individual.”
rules:
  - name: military_absence_minimum_days
    kind: parameter
    dtype: Count
    source: 39-22-103(8)(b)(I)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-103
              excerpt: "absent from the state for a period of at least three hundred five days"
    versions:
      - effective_from: '2001-01-01'
        formula: |-
          305

  - name: military_domiciliary_nonresident_election_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 39-22-103(8)(b)(I)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-22-103
    versions:
      - effective_from: '2001-01-01'
        formula: |-
          is_domiciled_in_colorado
          and days_absent_from_colorado >= military_absence_minimum_days
          and is_stationed_outside_united_states_for_active_military_duty
          and elects_not_to_file_colorado_return_as_resident

  - name: military_spouse_nonresident_election_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 39-22-103(8)(b)(II)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-22-103
    versions:
      - effective_from: '2001-01-01'
        formula: |-
          is_spouse_of_individual_stationed_outside_united_states_for_active_military_duty
          and accompanies_stationed_individual_for_period_of_absence
          and elects_not_to_file_colorado_return_as_resident

  - name: resident_individual
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 39-22-103(8)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-22-103
    versions:
      - effective_from: '2001-01-01'
        formula: |-
          (
            is_domiciled_in_colorado
            or (
              maintains_permanent_place_of_abode_in_colorado
              and spends_more_than_six_months_of_taxable_year_in_colorado
            )
          )
          and not military_domiciliary_nonresident_election_applies
          and not military_spouse_nonresident_election_applies

  - name: nonresident_individual
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 39-22-103(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-22-103
    versions:
      - effective_from: '2001-01-01'
        formula: |-
          not resident_individual
          or military_domiciliary_nonresident_election_applies
          or military_spouse_nonresident_election_applies
