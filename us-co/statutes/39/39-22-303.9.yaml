format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-303.9
  summary: |-
    Capital investment includes specified real-estate and depreciable-asset investments. An enterprise data center operation is a taxpayer-owned business substantially operated for the taxpayer's own use. A qualifying taxpayer making at least $150 million of capital investment within a consecutive five-year period and entering a memorandum of understanding may use the specified apportionment method when the investment is fully funded; failure to fund the investment or fulfill memorandum obligations ends that authorization.
  deferred_outputs:
    - output: us-co:statutes/39/39-22-303.9/c#office_of_economic_development
      reason: The definition incorporates section 24-48.5-101, for which no copied executable RuleSpec source is available.
    - output: us-co:statutes/39/39-22-303.9/e#taxpayer
      reason: The definition incorporates section 39-22-305 and the affiliated-group definition in section 39-22-303, whose required executable definitions are unavailable.
rules:
  - name: capital_investment_qualifies
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: 39-22-303.9(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-22-303.9
    versions:
      - effective_from: '2018-07-01'
        formula: |-
          capital_investment_is_purchase_or_construction_of_real_estate
          or capital_investment_is_purchase_or_deployment_of_depreciable_assets

  - name: enterprise_data_center_operation
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: 39-22-303.9(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-22-303.9
    versions:
      - effective_from: '2018-07-01'
        formula: |-
          business_physically_houses_information_technology_equipment
          and business_manages_and_processes_digital_data_for_data_processing_services
          and business_is_owned_by_taxpayer
          and business_is_operated_substantially_for_taxpayers_own_use

  - name: required_enterprise_data_center_capital_investment
    kind: parameter
    dtype: Money
    unit: USD
    source: 39-22-303.9(3)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-303.9
              excerpt: "at least one hundred fifty million dollars"
    versions:
      - effective_from: '2018-07-01'
        formula: |-
          150000000

  - name: enterprise_data_center_capital_investment_requirement_met
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: 39-22-303.9(3)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-22-303.9
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-303.9
    versions:
      - effective_from: '2018-07-01'
        formula: |-
          capital_investment_qualifies
          and enterprise_data_center_operation
          and capital_investment_made_in_state
          and capital_investment_made_within_qualifying_consecutive_five_year_period
          and capital_investment_amount >= required_enterprise_data_center_capital_investment

  - name: enterprise_data_center_apportionment_method_available
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: 39-22-303.9(3)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-22-303.9
    versions:
      - effective_from: '2018-07-01'
        formula: |-
          enterprise_data_center_capital_investment_requirement_met
          and taxpayer_entered_memorandum_of_understanding_with_office
          and capital_investment_is_fully_funded
          and memorandum_of_understanding_obligations_are_fulfilled
