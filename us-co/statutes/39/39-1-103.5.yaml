format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-1-103.5
  summary: |-
    The state board of equalization or administrator shall not require financial information concerning commercial or industrial property, except real-property rental value information; the section does not apply to public utilities.
rules:
  - name: financial_information_requirement_prohibition_applies
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-1-103.5
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-1-103.5
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          property_is_commercial_or_industrial
          and not property_is_public_utility
          and not requested_financial_information_concerns_real_property_rental_value_only
