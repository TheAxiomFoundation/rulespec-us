format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-26-105.4
  summary: |-
    A licensed motor vehicle dealer is held harmless from taxing-jurisdiction tax, charge, or fee liability when tax was not collected solely because the purchaser provided an address that does not meet section 42-6-139 requirements, if the dealer gives the required titling and registration information and obtains the purchaser's signed address affidavit.
rules:
  - name: motor_vehicle_dealer_held_harmless_from_taxing_jurisdiction_liability
    kind: derived
    entity: Business
    dtype: Judgment
    period: Year
    source: C.R.S. 39-26-105.4(1)(a)-(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-26-105.4
              excerpt: "Any licensed motor vehicle dealer that collects and remits tax"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-26-105.4
              excerpt: "not collected solely because an address that does not meet the requirements of section 42-6-139 was provided by the purchaser"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-26-105.4
              excerpt: "Informs the purchaser ... of the key requirements of motor vehicle titling and registration"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-26-105.4
              excerpt: "Obtains an affidavit signed by the purchaser stating that the purchaser's address is true and correct"
    versions:
