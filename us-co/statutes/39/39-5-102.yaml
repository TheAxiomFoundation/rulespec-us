format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-5-102
  summary: |-
    “Owners of real property shall not be required to file schedules”; a person with a specified real-property interest or lien may file a schedule; property whose ownership cannot be ascertained after due diligence may be listed “owner unknown.”
rules:
  - name: real_property_owner_must_file_schedule
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-5-102(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-5-102
              excerpt: "owners of real property shall not be required to file schedules"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          false

  - name: may_file_real_property_interest_schedule
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-5-102(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-5-102
              excerpt: "any person having or claiming to have an undivided interest ... or any ... interest ... or any other estate less than the fee, or any lien"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_has_undivided_interest_in_real_property
          or person_has_inchoate_interest_in_real_property
          or person_has_possessory_interest_in_real_property
          or person_has_equitable_interest_in_real_property
          or person_has_estate_less_than_fee_in_real_property
          or person_has_lien_on_real_property

  - name: property_may_be_listed_owner_unknown
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-5-102(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-5-102
              excerpt: "ownership ... cannot be ascertained by the assessor after due diligence"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          property_ownership_cannot_be_ascertained_after_due_diligence
