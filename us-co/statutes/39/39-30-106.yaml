format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-30-106
  summary: |-
    On or after July 1, 1995, qualifying machinery, machine-tool, part, and construction-or-repair-material purchases exceeding five hundred dollars are exempt when used solely and exclusively in an enterprise zone to manufacture tangible personal property for sale or profit. Manufacturing includes specified extractive activities.
rules:
  - name: enterprise_zone_manufacturing_purchase_minimum
    kind: parameter
    dtype: Money
    unit: USD
    source: 39-30-106(1)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-30-106
              excerpt: "in excess of five hundred dollars"
    versions:
      - effective_from: '1995-07-01'
        formula: |-
          500
  - name: listed_extractive_activity_is_manufacturing
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Year
    source: 39-30-106(1)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-30-106
              excerpt: "manufacturing shall include\nrefining, blasting, exploring, mining and mined land reclamation, quarrying for,\nprocessing and beneficiation, or otherwise extracting"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          purchase_use_is_refining_blasting_exploring_mining_or_mined_land_reclamation
          or purchase_use_is_quarrying_for_natural_resource
          or purchase_use_is_processing_or_beneficiation_of_natural_resource
          or purchase_use_is_otherwise_extracting_natural_resource
  - name: enterprise_zone_manufacturing_purchase_tax_exemption_applies
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Year
    source: 39-30-106(1)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-30-106
              excerpt: "purchases of machinery or machine tools, or parts thereof, and materials for the construction or repair"
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-30-106
              excerpt: "in excess of five hundred dollars"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-30-106
              excerpt: "used solely and exclusively in an enterprise zone in manufacturing tangible personal property, for sale or profit"
    versions:
      - effective_from: '1995-07-01'
        formula: |-
          purchase_is_machinery_machine_tool_part_or_construction_or_repair_material
          and purchase_amount > enterprise_zone_manufacturing_purchase_minimum
          and purchase_is_used_solely_and_exclusively_in_enterprise_zone
          and purchase_use_produces_tangible_personal_property_for_sale_or_profit
          and (
            purchase_use_is_manufacturing_other_than_listed_extractive_activity
            or listed_extractive_activity_is_manufacturing
          )
