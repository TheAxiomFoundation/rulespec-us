format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-37-107
  deferred_outputs:
    - output: us-co:statutes/39/39-37-107/3/a#unregistered_vendor_punishment
      reason: The required punishment is determined by section 18-1.3-503, for which no executable RuleSpec source is provided.
  summary: |-
    It is unlawful to engage in the business of an ammunition vendor, firearms dealer, or firearms manufacturer without registration. A vendor must renew registration on or before January 1 of each even-numbered year if the vendor remains in retail business or liable for the article 37 tax. An unregistered vendor making taxable retail sales commits a petty offense and may be subject to a civil penalty of fifty dollars per day, capped at one thousand dollars.
rules:
  - name: unregistered_vendor_daily_civil_penalty
    kind: parameter
    dtype: Money
    unit: USD
    source: C.R.S. 39-37-107(3)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-37-107
              excerpt: "fifty dollars per day"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          50

  - name: unregistered_vendor_civil_penalty_cap
    kind: parameter
    dtype: Money
    unit: USD
    source: C.R.S. 39-37-107(3)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-37-107
              excerpt: "maximum penalty of one thousand dollars"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1000

  - name: engaging_in_regulated_firearms_business_without_registration_is_unlawful
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: C.R.S. 39-37-107(1)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-37-107
              excerpt: "It is unlawful for any person to engage in the business of an ammunition vendor, a firearms dealer, or a firearms manufacturer ... without first having registered"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (person_engages_in_ammunition_vendor_business
          or person_engages_in_firearms_dealer_business
          or person_engages_in_firearms_manufacturer_business)
          and not person_is_registered_vendor

  - name: vendor_registration_renewal_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: C.R.S. 39-37-107(1)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-37-107
              excerpt: "on or before January 1 of each even-numbered year to renew ... if the vendor remains in retail business or liable to account for the tax"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          registration_renewal_deadline_has_arrived
          and (vendor_remains_in_retail_business
          or vendor_is_liable_to_account_for_article_37_tax)

  - name: unregistered_vendor_commits_petty_offense
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: C.R.S. 39-37-107(3)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-37-107
              excerpt: "Any vendor who makes retail sales subject to the excise tax without registering commits a petty offense"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          vendor_makes_retail_sales_subject_to_excise_tax
          and not person_is_registered_vendor

  - name: maximum_unregistered_vendor_civil_penalty_before_waiver
    kind: derived
    entity: Person
    dtype: Money
    period: Day
    unit: USD
    source: C.R.S. 39-37-107(3)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-37-107
              excerpt: "fifty dollars per day up to a maximum penalty of one thousand dollars"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-37-107
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if vendor_makes_retail_sales_subject_to_excise_tax and not person_is_registered_vendor:
            min(days_of_unregistered_taxable_retail_sales * unregistered_vendor_daily_civil_penalty, unregistered_vendor_civil_penalty_cap)
          else: 0
