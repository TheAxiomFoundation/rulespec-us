format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-5-113.5
  summary: |-
    Failure to file a statement results in forfeiture of a claim for exemption in
    that calendar year. The assessor shall determine the value of displayed works
    of art in proportion to the display period relative to the full calendar year.
rules:
  - name: work_of_art_exemption_claim_forfeited
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. 39-5-113.5(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-5-113.5
              excerpt: Failure to file a statement results in forfeiture of a claim for exemption in that calendar year.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          work_of_art_is_apt_to_be_displayed_in_county_during_calendar_year
          and not owner_files_required_artwork_display_statement
  - name: work_of_art_display_value_proration_applies
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. 39-5-113.5(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-5-113.5
              excerpt: The assessor of the county in which such works of art are displayed shall determine its value.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          work_of_art_is_displayed_in_county_during_calendar_year
  - name: work_of_art_value_for_display_period
    kind: derived
    entity: Asset
    dtype: Money
    unit: USD
    period: Year
    source: C.R.S. 39-5-113.5(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-5-113.5
              excerpt: "determine its value in the proportion that the periods of time during which such\nworks of art may be displayed bear to the full calendar year."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if work_of_art_display_value_proration_applies:
            work_of_art_full_calendar_year_value * work_of_art_display_period_fraction_of_calendar_year
          else: 0
