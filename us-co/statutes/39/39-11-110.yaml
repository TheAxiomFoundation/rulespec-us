  source_verification:
    corpus_citation_path: us-co/statute/39/39-11-110
  summary: |-
    If a real-property tax lien cannot be duly advertised and offered for public auction on or before the second Monday of December, the treasurer must hold the auction on a subsequent day when it can be held, allowing time for notice publication under section 39-11-102.
  deferred_outputs:
    - output: us-co:statutes/39/39-11-110#treasurer_must_hold_rescheduled_public_auction
      reason: The required notice-publication compliance determination under section 39-11-102 is not available as an executable imported output; the copied context defers the governing publication-and-posting requirement.
