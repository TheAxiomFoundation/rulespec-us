format: rulespec/v1
module:
  status: deferred
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-516.8
  summary: |-
    “Actual cost incurred” generally means actual cost paid minus eligible credits, grants, or rebates. The section defines qualifying truck and trailer categories and provides refundable income-tax credits, including specified category 7 credits for tax years beginning in 2024 through 2032. Several credit schedules are represented in the authoritative text only by inserted-PDF placeholders.
  deferred_outputs:
    - output: us-co:statutes/39/39-22-516.8/a#actual_cost_incurred
      reason: >-
        The definition requires transaction-level purchase and lease calculations,
        including allocation of listed lease-payment components and eligibility for
        credits, grants, and rebates. A canonical purchaser, lease, vehicle, and
        payment-component relation model is not available in the supplied context.
    - output: us-co:statutes/39/39-22-516.8/b#aerodynamic_technologies
      reason: >-
        Executable membership depends on the external United States environmental
        protection agency SmartWay verified technology list, which is not supplied.
    - output: us-co:statutes/39/39-22-516.8/d#battery_capacity
      reason: >-
        The source defines a technical battery measurement rather than a computable
        legal result, and no canonical battery entity or state-of-charge measurement
        interface is available in the supplied RuleSpec context.
    - output: us-co:statutes/39/39-22-516.8/e#bus
      reason: >-
        The definition requires classification of a motor vehicle by seating capacity,
        but no canonical vehicle entity is available in the supplied RuleSpec context.
    - output: us-co:statutes/39/39-22-516.8/f#category_4
      reason: >-
        Category 4 classification requires a canonical truck entity and facts about
        original-equipment manufacture, fuel configuration, and multi-fuel engine
        operation that are not represented in the supplied context.
    - output: us-co:statutes/39/39-22-516.8/g#category_4_a
      reason: >-
        Category 4 A classification requires a canonical truck-conversion entity,
        United States environmental protection agency certification, and fuel-system
        configuration facts that are not represented in the supplied context.
    - output: us-co:statutes/39/39-22-516.8/h#category_4_b
      reason: >-
        Category 4 B classification requires a canonical truck entity and facts about
        original-equipment manufacture, liquefied-natural-gas operation, and multi-fuel
        engine configuration that are not represented in the supplied context.
    - output: us-co:statutes/39/39-22-516.8/j#category_5
      reason: >-
        Category 5 is an installation-level classification involving a truck and
        idling-reduction technology; the required installation and vehicle relations
        are not available in the supplied RuleSpec context.
    - output: us-co:statutes/39/39-22-516.8/k#category_6
      reason: >-
        Category 6 is an installation-level classification involving a truck and
        aerodynamic technology; the required installation and vehicle relations are
        not available in the supplied RuleSpec context.
    - output: us-co:statutes/39/39-22-516.8/l#category_7
      reason: >-
        Category 7 classification requires a canonical truck entity together with
        original-equipment-manufacturer and electric or plug-in-hybrid classification
        facts that are not available in the supplied context.
    - output: us-co:statutes/39/39-22-516.8/m#category_7_a
      reason: >-
        Category 7 A classification requires a canonical truck-conversion entity and
        electric or plug-in-hybrid classification facts that are not available in the
        supplied context.
    - output: us-co:statutes/39/39-22-516.8/n#category_8
      reason: >-
        Category 8 depends on the clean-fuel-refrigerated-trailer definition and a
        canonical trailer entity, neither of which has an executable dependency model
        in the supplied context.
    - output: us-co:statutes/39/39-22-516.8/o#category_8_a
      reason: >-
        Category 8 A requires a canonical refrigerated-trailer conversion relation and
        executable clean-fuel-refrigerated-trailer classification, which are not
        available in the supplied context.
    - output: us-co:statutes/39/39-22-516.8/p#category_9
      reason: >-
        Category 9 depends on hydraulic-hybrid-truck classification and a canonical
        truck-conversion entity, which are not available in the supplied context.
    - output: us-co:statutes/39/39-22-516.8/q#clean_fuel_refrigerated_trailer
      reason: >-
        This classification requires canonical truck and trailer entities, gross
        vehicle weight rating, installation and certification relations, and power-unit
        fuel facts that are not represented in the supplied context.
    - output: us-co:statutes/39/39-22-516.8/r#electric_truck_or_plug_in_hybrid_electric_truck
      reason: >-
        This classification requires a canonical truck entity plus gross vehicle
        weight rating, speed, propulsion, battery, rechargeability, fuel-cell, and
        onboard-hydrogen facts that are not represented in the supplied context.
    - output: us-co:statutes/39/39-22-516.8/c#medium_or_heavy_duty_truck_credit_available_after_lifecycle_emissions_review
      reason: >-
        Subsection (14)(c) depends on determinations by the Colorado energy office,
        annual agency website designations, model-or-engine exceptions, comparative
        life-cycle emissions, and qualifying green-fuel contracts. Those official
        determinations and the required vehicle-model relations are not supplied.
