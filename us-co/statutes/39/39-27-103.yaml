format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-27-103
  summary: |-
    “This credit or refund is allowed only on gasoline or special fuel in quantities of one hundred gallons or more lost or destroyed at any one time.” “No person shall be entitled to a refund on purchases of gasoline or special fuel in quantities of less than twenty gallons.”
rules:
  - name: minimum_loss_or_destruction_quantity_gallons
    kind: parameter
    dtype: Decimal
    source: C.R.S. 39-27-103(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-27-103
              excerpt: quantities of one hundred gallons or more
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          100

  - name: loss_notification_and_proof_deadline_days
    kind: parameter
    dtype: Count
    period: Day
    source: C.R.S. 39-27-103(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-27-103
              excerpt: within thirty days of such loss or destruction
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: erroneous_tax_payment_refund_application_limit_years
    kind: parameter
    dtype: Count
    period: Year
    source: C.R.S. 39-27-103(1.5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-27-103
              excerpt: within three years from the date of payment
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          3

  - name: agricultural_applicator_aircraft_refund_rate
    kind: parameter
    dtype: Rate
    source: C.R.S. 39-27-103(2.7)(d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-27-103
              excerpt: to the extent of fifty percent of taxes payable
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.50

  - name: minimum_refund_purchase_quantity_gallons
    kind: parameter
    dtype: Decimal
    source: C.R.S. 39-27-103(3)(a)(II)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-27-103
              excerpt: quantities of less than twenty gallons
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          20

  - name: refund_application_filing_limit_months
    kind: parameter
    dtype: Count
    period: Month
    source: C.R.S. 39-27-103(3)(d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-27-103
              excerpt: within twelve months after the date of purchase
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          12

  - name: refund_permit_inactivity_cancellation_period_months
    kind: parameter
    dtype: Count
    period: Month
    source: C.R.S. 39-27-103(3)(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-27-103
              excerpt: for a period of twenty-four months
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          24

  - name: dealer_invoice_retention_period_months
    kind: parameter
    dtype: Count
    period: Month
    source: C.R.S. 39-27-103(3)(d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-27-103
              excerpt: retained by the dealer for a period of twenty-four months
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          24

  - name: loss_or_destruction_refund_or_credit_is_allowed
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: C.R.S. 39-27-103(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-27-103
              excerpt: lost or destroyed by fire, lightning, flood, windstorm, explosion, accident, or other cause beyond the control
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-27-103
              excerpt: quantities of one hundred gallons or more
          - path: versions[0].formula
            kind: effective_period
            source:
              corpus_citation_path: us-co/statute/39/39-27-103
              excerpt: within thirty days of such loss or destruction
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          fuel_was_lost_or_destroyed_by_cause_beyond_control
          and lost_or_destroyed_fuel_quantity_gallons >= minimum_loss_or_destruction_quantity_gallons
          and days_between_loss_and_executive_director_notification <= loss_notification_and_proof_deadline_days
          and days_between_loss_and_proof_filing <= loss_notification_and_proof_deadline_days

  - name: refund_purchase_quantity_meets_minimum
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: C.R.S. 39-27-103(3)(a)(II)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-27-103
              excerpt: no person shall be entitled to a refund on purchases of gasoline or special fuel in quantities of less than twenty gallons
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          refund_purchase_quantity_gallons >= minimum_refund_purchase_quantity_gallons
