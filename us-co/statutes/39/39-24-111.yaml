format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-24-111
  summary: |-
    Interest or penalties imposed for nonpayment of inheritance taxes during the specified interval “shall not exceed ten percent per annum.”
rules:
  - name: interest_and_penalty_maximum_annual_rate
    kind: parameter
    dtype: Rate
    source: Colo. Rev. Stat. § 39-24-111
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-24-111
              excerpt: shall not exceed ten percent per annum
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.10
  - name: interest_and_penalty_rate_cap_applies
    kind: derived
    entity: DecedentEstate
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-24-111
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-24-111
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          board_determines_decedent_died_domiciled_in_state
          and interest_or_penalty_is_otherwise_imposed_by_law_for_nonpayment_of_inheritance_taxes
          and interest_or_penalty_accrues_between_agreement_and_filing_of_board_domicile_determination
  - name: permitted_interest_or_penalty_annual_rate
    kind: derived
    entity: DecedentEstate
    dtype: Rate
    period: Year
    source: Colo. Rev. Stat. § 39-24-111
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-24-111
              excerpt: "interest or penalties, if otherwise imposed by law for nonpayment of inheritance taxes between the date of the agreement and of filing of the determination of the board as to domicile, shall not exceed ten percent per annum"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if interest_and_penalty_rate_cap_applies: min(otherwise_imposed_annual_interest_or_penalty_rate, interest_and_penalty_maximum_annual_rate) else: otherwise_imposed_annual_interest_or_penalty_rate
