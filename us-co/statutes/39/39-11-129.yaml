format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-11-129
  summary: |-
    “The words issue, issued, execute, and executed” concerning a treasurer’s deed mean signing by the treasurer; delayed acknowledgment or delivery does not affect validity. A notice prepared more than three years after tax-lien sale need not state the redemption-expiration time. The treasurer may sign after the notice-specified time if no redemption has occurred and signing is within five months after service.
rules:
  - name: tax_lien_sale_to_notice_preparation_years
    kind: parameter
    dtype: Count
    source: C.R.S. 39-11-129
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-11-129
              excerpt: "subsequent to three years after the date of sale of a tax lien"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          3

  - name: notice_service_to_deed_signing_months
    kind: parameter
    dtype: Count
    source: C.R.S. 39-11-129
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-11-129
              excerpt: "within five months from the service of said notice"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          5

  - name: delayed_acknowledgment_or_delivery_does_not_invalidate_signed_treasurers_deed
    kind: derived
    entity: TaxDeed
    dtype: Judgment
    period: Day
    source: C.R.S. 39-11-129
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-11-129
              excerpt: "signing of such a deed by the treasurer"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-11-129
              excerpt: "delay in the acknowledgment of such a deed or the delivery thereof shall not in any way affect the validity"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          treasurers_deed_is_signed_by_treasurer
          and treasurers_deed_acknowledgment_or_delivery_is_delayed

  - name: tax_deed_notice_need_not_state_redemption_expiration
    kind: derived
    entity: TaxDeed
    dtype: Judgment
    period: Day
    source: C.R.S. 39-11-129
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-11-129
              excerpt: "it shall not be necessary to make any statement in such notice concerning the time of expiration of the period of redemption"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-11-129
              excerpt: "prepared subsequent to three years after the date of sale of a tax lien"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          years_from_tax_lien_sale_to_notice_preparation > tax_lien_sale_to_notice_preparation_years

  - name: treasurer_may_sign_tax_deed
    kind: derived
    entity: TaxDeed
    dtype: Judgment
    period: Day
    source: C.R.S. 39-11-129
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-11-129
              excerpt: "at any time after the time specified therefor in such notice if no redemption has then been made"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-11-129
              excerpt: "within five months from the service of said notice"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          deed_signing_is_after_time_specified_in_notice
          and no_redemption_has_been_made
          and months_from_notice_service_to_deed_signing <= notice_service_to_deed_signing_months
