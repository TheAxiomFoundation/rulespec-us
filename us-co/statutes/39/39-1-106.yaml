format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-1-106
  summary: |-
    It shall make no difference that taxable property use, possession, or ownership is qualified, limited, nonalienable, or separately subject to levy or distraint. Severed mineral interests shall also be taxed.
rules:
  - name: stated_property_qualification_does_not_preclude_taxation
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-1-106
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-1-106
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          property_is_taxable
          and (
            property_use_is_qualified
            or property_possession_is_limited
            or property_ownership_is_not_subject_to_alienation
            or property_is_subject_to_separate_levy_or_distraint
          )
  - name: severed_mineral_interest_is_taxable
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-1-106
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-1-106
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_severed_mineral_interest
