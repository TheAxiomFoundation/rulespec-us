  source_verification:
    corpus_citation_path: us-co/statute/39/39-3-112
  summary: |-
    Defines area median income, family service facilities, and transitional housing facilities; provides a charitable property-tax exemption for qualifying residential property; and prescribes occupancy, efficient-operation, ownership, partial-exemption, application, and processing requirements.
  deferred_outputs:
    - output: us-co:statutes/39/39-3-112/a#area_median_income
      reason: The definition requires a county- and family-size-indexed annually published HUD income value, for which this source supplies no computable table or supported external data relation.
    - output: us-co:statutes/39/39-3-112/b#family_service_facility
      reason: The facility definition requires factual and licensing determinations, including compliance with section 26.5-5-309, which has no copied canonical RuleSpec dependency.
    - output: us-co:statutes/39/39-3-112/c#transitional_housing_facility
      reason: The facility definition incorporates income requirements from subsection (3)(a)(II)(A) and requires unsupported facility-purpose and counseling determinations.
    - output: us-co:statutes/39/39-3-112/3/c#residential_property_qualifying_ownership
      reason: The ownership condition depends on nonprofit organizational status, federal income-tax status, low-income housing credits, compliance periods, partnership distributions, transfers, and administrator determinations under unavailable cited federal and state provisions.
