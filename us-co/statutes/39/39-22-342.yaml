format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-342
  summary: |-
    Defines an electing pass-through entity, its owner, income attributable and not attributable to the state, a resident electing pass-through entity owner, and a taxable period.
  deferred_outputs:
    - output: us-co:statutes/39/39-22-342#electing_pass_through_entity
      reason: Requires the election mechanics under section 39-22-343, which are not available in copied context.
    - output: us-co:statutes/39/39-22-342#electing_pass_through_entity_owner
      reason: Requires the definition of an electing pass-through entity and the unitary C corporation exclusion, neither of which is available as an executable upstream source.
    - output: us-co:statutes/39/39-22-342#income_attributable_to_state
      reason: Requires the apportionment, allocation, and Colorado-source rules in sections 39-22-321 and 39-22-203, which are not available in copied context.
    - output: us-co:statutes/39/39-22-342#income_not_attributable_to_state
      reason: Requires the executable definition of income attributable to the state.
    - output: us-co:statutes/39/39-22-342#resident_electing_pass_through_entity_owner
      reason: Requires the definitions of electing pass-through entity owner and Colorado residency under section 39-22-103, which are not available in copied context.
rules:
  - name: taxable_period
    kind: derived
    entity: Business
    dtype: Judgment
    period: Year
    source: C.R.S. 39-22-342(6)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-22-342
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          business_is_s_corporation
          or business_is_noncorporate_partnership
