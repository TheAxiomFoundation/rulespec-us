format: rulespec/v1
imports:
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-36-106
  summary: |-
    For income tax years 2023 through 2035, a taxpayer claiming article 36 income-tax credits shall electronically file the state return with required certifications, refund materials, and carryforward schedule by the return due date, including extensions.
rules:
  - name: article_36_credit_claim_filing_requirements_satisfied
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: C.R.S. 39-36-106(1)-(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-36-106
              excerpt: "any taxpayer that claims one or more income tax credits pursuant to this article 36 shall file a state income tax return"
          - path: versions[0].formula
            kind: effective_period
            source:
              corpus_citation_path: us-co/statute/39/39-36-106
              excerpt: "For the 2023 income tax year and each income tax year thereafter through the 2035 income tax year"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-36-106
              excerpt: “in an electronic format” and “together with”
          - path: versions[0].formula
            kind: ordering
            source:
              corpus_citation_path: us-co/statute/39/39-36-106
              excerpt: "not later than the due date, including extensions"
    versions:
      - effective_from: '2023-01-01'
        formula: |-
          not (
            taxpayer_claims_article_36_income_tax_credit
            and income_tax_year_is_within_electronic_filing_period
          )
          or (
            electronic_state_income_tax_return_filed
            and return_filed_by_due_date_including_extensions
            and certification_form_for_each_claimed_credit_submitted
            and issued_qualified_investment_credit_limit_waiver_certificates_submitted
            and refund_election_statement_for_each_refunded_credit_submitted
            and refund_certificate_for_each_refunded_credit_submitted
            and carryforward_schedule_for_each_subsequent_year_credit_submitted
          )
