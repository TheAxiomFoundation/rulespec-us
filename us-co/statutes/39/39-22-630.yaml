format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-630
  summary: |-
    A taxpayer may claim a credit for a contribution to a qualified intermediary to the same extent as a direct contribution. “Qualified intermediary” and “recipient organization” are defined in subsection (2).
  deferred_outputs:
    - output: us-co:statutes/39/39-22-630#credit_for_contribution_to_qualified_intermediary
      reason: The source makes the credit available to the same extent as an underlying direct-contribution credit, but this slice does not supply the direct-credit calculation, contribution-to-organization relation, or recipient approval and certification process.
    - output: us-co:statutes/39/39-22-630/a#credit
      reason: The definition identifies the class of credits authorized by law against taxes under articles 22 and 30, but this slice provides no credit instrument entity or authorization relation through which to classify a specific credit.
rules:
  - name: qualified_intermediary
    kind: derived
    entity: Organization
    dtype: Judgment
    period: Year
    source: 39-22-630(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-22-630
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          organization_has_tax_exempt_status_under_section_501_c_3
          and (
            organization_is_obligated_to_disburse_taxpayer_contributions_to_recipient_organization_as_directed
            or organization_exercises_variance_power_as_required_or_authorized_by_law_or_federal_regulations
          )
  - name: recipient_organization
    kind: derived
    entity: Organization
    dtype: Judgment
    period: Year
    source: 39-22-630(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-22-630
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          organization_has_tax_exempt_status_under_section_501_c_3
          or organization_is_program_or_project_of_tax_exempt_organization_to_which_taxpayer_may_make_creditable_contribution
