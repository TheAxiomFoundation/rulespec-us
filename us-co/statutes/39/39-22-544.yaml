format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-544
  summary: A qualifying resident senior is allowed a refundable Colorado income tax
    credit for the income tax years commencing January 1, 2022, and January 1, 2024.
    Eligibility includes age and federal adjusted gross income limits and requires
    that the senior not have claimed the specified property tax exemption. The credit
    is reduced in stated increments above $25,000, subject to special rules for separate
    returns, article 31 grant recipients, and part-year residents.
  deferred_outputs:
  - output: us-co:statutes/39/39-22-544/a#credit
    reason: The definition identifies the credit created by the section but does not
      independently provide a computable output.
    source_values:
    - us-co:statutes/39/39-22-544#credit_reduction_per_income_increment_for_2022_separate_return
    - us-co:statutes/39/39-22-544#credit_reduction_per_income_increment_for_2022_single_or_joint_return
    - us-co:statutes/39/39-22-544#credit_reduction_per_income_increment_for_2024_joint_return
    - us-co:statutes/39/39-22-544#credit_reduction_per_income_increment_for_2024_separate_return
    - us-co:statutes/39/39-22-544#credit_reduction_per_income_increment_for_2024_single_return
  - output: us-co:statutes/39/39-22-544/b#qualifying_senior_for_income_tax_year_commencing_january_1_2022
    reason: Eligibility depends on whether a property tax exemption was claimed under
      section 39-3-203, for which no copied RuleSpec dependency is available.
    source_values:
    - us-co:statutes/39/39-22-544#credit_reduction_per_income_increment_for_2022_separate_return
    - us-co:statutes/39/39-22-544#credit_reduction_per_income_increment_for_2022_single_or_joint_return
    - us-co:statutes/39/39-22-544#credit_reduction_per_income_increment_for_2024_joint_return
