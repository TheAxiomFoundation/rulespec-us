  - output: us-co:statutes/39/39-22-544/b#qualifying_senior_for_income_tax_year_commencing_january_1_2024
    reason: Eligibility depends on whether a property tax exemption was claimed under
      section 39-3-203 on or before August 15, 2024, for which no copied RuleSpec
      dependency is available.
    source_values:
    - us-co:statutes/39/39-22-544#credit_reduction_per_income_increment_for_2022_separate_return
    - us-co:statutes/39/39-22-544#credit_reduction_per_income_increment_for_2022_single_or_joint_return
