format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-6-108
  summary: |-
    "fails or refuses to prepare and file the statement" and "the assessor shall list such property and shall value the same for assessment on the basis of the best information available."
rules:
  - name: assessor_must_list_producing_mine_property
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. 39-6-108
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-6-108
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          property_is_producing_mine
          and responsible_person_owns_operates_or_manages_producing_mine
          and responsible_person_fails_or_refuses_to_prepare_and_file_required_statement
  - name: assessor_must_value_producing_mine_property_using_best_available_information
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. 39-6-108
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-6-108
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          property_is_producing_mine
          and responsible_person_owns_operates_or_manages_producing_mine
          and responsible_person_fails_or_refuses_to_prepare_and_file_required_statement
