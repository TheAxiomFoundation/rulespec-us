format: rulespec/v1
module:
  summary: |-
    For tax years commencing on or after January 1, 2013, and prior to January 1, 2025, a person buying the right to use a registration number is allowed a credit of twenty percent of the purchase price paid to the Colorado disability funding committee. Excess credit may be carried forward for up to five years and claimed on the earliest possible subsequent return.
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-535
  proof_validation:
    required: true
  deferred_outputs:
    - output: us-co:statutes/39/39-22-535#registration_number_credit_carryforward
      reason: The source requires tracking credit vintage, subsequent returns, and earliest-possible claim ordering, which cannot be represented as a single annual scalar output.
      source_values:
        - us-co:statutes/39/39-22-535#registration_number_credit_carryforward_year_limit
rules:
  - name: registration_number_purchase_credit_rate
    kind: parameter
    dtype: Rate
    period: Year
    source: C.R.S. § 39-22-535(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-535
              excerpt: "twenty percent of the purchase price"
          - path: versions[1].formula
            kind: effective_period
            source:
              corpus_citation_path: us-co/statute/39/39-22-535
              excerpt: "prior to January 1, 2025"
    versions:
      - effective_from: '2013-01-01'
        formula: |-
          0.20
      - effective_from: '2025-01-01'
        formula: |-
          0

  - name: registration_number_credit_carryforward_year_limit
    kind: parameter
    dtype: Count
    period: Year
    source: C.R.S. § 39-22-535(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-535
              excerpt: "carry it forward for up to five years"
    versions:
      - effective_from: '2013-01-01'
        formula: |-
          5

  - name: registration_number_credit_is_allowed
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-22-535(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-22-535
              excerpt: "a person who buys the right to use a registration number"
          - path: versions[0].formula
            kind: effective_period
            source:
              corpus_citation_path: us-co/statute/39/39-22-535
              excerpt: "on or after January 1, 2013, and prior to January 1, 2025"
    versions:
      - effective_from: '2013-01-01'
        formula: |-
          taxpayer_buys_right_to_use_registration_number_under_section_8_88_206
          and registration_number_purchase_credit_rate > 0

  - name: registration_number_credit
    kind: derived
    entity: TaxUnit
    dtype: Money
    unit: USD
    period: Year
    source: C.R.S. § 39-22-535(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-535
              excerpt: "a credit ... for twenty percent of the purchase price ... paid to the Colorado disability funding committee"
    versions:
      - effective_from: '2013-01-01'
        formula: |-
          if registration_number_credit_is_allowed:
            registration_number_purchase_credit_rate * purchase_price_of_right_to_use_registration_number_paid_to_colorado_disability_funding_committee
          else: 0
