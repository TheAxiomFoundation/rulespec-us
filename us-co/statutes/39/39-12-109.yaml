format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-12-109
  summary: |-
    “On demand of any person entitled to redemption money in his hands, the treasurer shall pay the same” upon surrender of the tax certificate; if only a portion is redeemed, the treasurer shall endorse the certificate and take a receipt.
rules:
  - name: treasurer_must_pay_redemption_money
    kind: derived
    entity: Treasurer
    dtype: Judgment
    period: Day
    source: C.R.S. § 39-12-109
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-12-109
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          demanding_person_demands_redemption_money
          and demanding_person_is_entitled_to_redemption_money_in_treasurer_hands
          and demanding_person_surrenders_tax_certificate_for_redeemed_land_or_lot

  - name: treasurer_must_endorse_partial_redemption_certificate
    kind: derived
    entity: Treasurer
    dtype: Judgment
    period: Day
    source: C.R.S. § 39-12-109
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-12-109
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          only_portion_of_land_or_lots_described_in_tax_certificate_has_been_redeemed

  - name: treasurer_must_take_partial_redemption_receipt
    kind: derived
    entity: Treasurer
    dtype: Judgment
    period: Day
    source: C.R.S. § 39-12-109
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-12-109
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          only_portion_of_land_or_lots_described_in_tax_certificate_has_been_redeemed
