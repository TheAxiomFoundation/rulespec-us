format: rulespec/v1
module:
  summary: |-
    An irrigation or drainage district possessing or controlling qualifying tax-lien certificates may transfer them under a board resolution and must execute necessary instruments fully conveying its interest.
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-11-125
rules:
  - name: district_may_transfer_tax_lien_certificates
    kind: derived
    entity: IrrigationOrDrainageDistrict
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-11-125
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-11-125
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          district_has_possession_or_control_of_certificates
          and certificates_result_from_sale_of_tax_lien_on_land
          and tax_lien_sale_was_for_nonpayment_of_district_taxes_or_assessments
          and board_has_adopted_resolution_determining_transfer_manner_times_and_terms
  - name: district_must_execute_and_deliver_full_conveyance_instruments
    kind: derived
    entity: IrrigationOrDrainageDistrict
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-11-125
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-11-125
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          district_may_transfer_tax_lien_certificates
          and district_transfers_such_certificates
