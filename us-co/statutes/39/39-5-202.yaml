format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-5-202
  summary: |-
    Commencing January 1, 1978, mobile homes are taxed ad valorem as real property and collected as personal property.
rules:
  - name: mobile_home_ad_valorem_taxation_treated_as_real_property
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-5-202
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-5-202
              excerpt: "mobile homes shall be subject to ad valorem taxation under the provisions of articles 1 to 9 of this title as if they were real property"
    versions:
      - effective_from: '1978-01-01'
        formula: |-
          asset_is_mobile_home
  - name: mobile_home_tax_collection_treated_as_personal_property
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-5-202
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-5-202
              excerpt: "collection of taxes as if they were personal property"
    versions:
      - effective_from: '1978-01-01'
        formula: |-
          asset_is_mobile_home
