  summary: |-
    “Storage or storing means any keeping or retention of, or exercise of dominion or control over, tangible personal property in this state.”
rules:
  - name: storage_or_storing
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. 39-26-701(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-26-701
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          tangible_personal_property_is_kept_or_retained_in_state
          or tangible_personal_property_is_subject_to_dominion_or_control_in_state
