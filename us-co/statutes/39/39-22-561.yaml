format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-561
  summary: For income tax years commencing on or after January 1, 2026, but before
    January 1, 2031, qualified taxpayers may receive a refundable stewardship-practices
    credit. Per-acre amounts and taxpayer caps vary according to whether land is subject
    to one, two, or three or more qualified practices. Certificates are limited to
    three income tax years, annual certificate issuance is capped at three million
    dollars, and no more than two million dollars of claims may be wait-listed annually.
    The section is repealed effective December 31, 2034.
  deferred_outputs:
  - output: us-co:statutes/39/39-22-561/1/a#stewardship_credit_legislative_purpose
    reason: Subsection (1)(a) is a legislative purpose statement rather than an independently
      computable legal result.
  - output: us-co:statutes/39/39-22-561/a#credit_certificate
    reason: The definition requires an issued Department of Agriculture certificate
      and its taxpayer, amount, and income-tax-year relationships, which cannot be
      represented faithfully as a single scalar output.
  - output: us-co:statutes/39/39-22-561/b#qualified_stewardship_practice
    reason: The definition depends on practices specified by commissioner rules and
      practice-level agricultural effects not supplied by this source.
  - output: us-co:statutes/39/39-22-561/c#qualified_taxpayer
    reason: The definition requires person, farm-or-ranch, location, practice, and
      income-tax-year relationships not represented by the available structural entities.
  - output: us-co:statutes/39/39-22-561/b#tax_credit_certificate_may_be_issued
    reason: Subsection (3)(b) requires certificate-history and agricultural-land/practice-specific
      benefit coordination across income tax years and outside sources.
  - output: us-co:statutes/39/39-22-561/b#agriculture_department_credit_information_duties
    reason: Subsection (4)(b) imposes administrative database and inter-agency reporting
      duties and depends in part on the unavailable executable evaluation framework
      cited in section 39-21-305.
  - output: us-co:statutes/39/39-22-561/3/a#stewardship_income_tax_credit
    reason: The final credit requires commissioner-specified per-acre amounts, certification
      of acreage and practices, certificate issuance, annual program-cap ordering,
      and taxpayer tax liability; those relational and administrative determinations
      are not supplied as executable dependencies.
  - output: us-co:statutes/39/39-22-561/6#certificate_wait_list_priority
    reason: Certificate issuance and wait-list priority require ordered applications,
      prior-year certificate history, and program-wide calendar-year aggregates.
  - output: us-co:statutes/39/39-22-561/7#refundable_stewardship_credit
    reason: The refundable excess depends on the certified credit amount and the qualified
      taxpayer's income tax due, while certificate eligibility and issuance remain
      deferred.
  - output: us-co:statutes/39/39-22-561#annual_certificate_issuance_cap
    reason: Generated rule used a local name that collides with a sibling RuleSpec
      export. This output is deferred until it can be encoded with a semantic branch-specific
      name without creating ambiguous sibling imports.
