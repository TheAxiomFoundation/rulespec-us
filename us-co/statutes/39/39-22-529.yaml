format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-529
  summary: |-
    On or after January 1, 2008, wages or remuneration of six hundred dollars or more annually for labor services paid to an unauthorized alien may not be claimed as a deductible business expense when the hiring taxpayer knew the alien's unauthorized status, subject to listed exceptions.
  deferred_outputs:
    - output: us-co:statutes/39/39-22-529/a#labor_services
      reason: The definition equates labor services with a direct physical-performance fact; a standalone executable output would be an impermissible pure pass-through rule.
rules:
  - name: annual_unauthorized_alien_labor_remuneration_threshold
    kind: parameter
    dtype: Money
    unit: USD
    source: 39-22-529(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-529
              excerpt: "six hundred dollars or more in a year"
    versions:
      - effective_from: '2008-01-01'
        formula: |-
          600
  - name: unauthorized_alien_labor_expense_deduction_disallowed
    kind: derived
    entity: Employer
    dtype: Judgment
    period: Year
    source: 39-22-529(2)-(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-22-529
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-22-529
    versions:
      - effective_from: '2008-01-01'
        formula: |-
          individual_physically_performs_services_in_state
          and individual_is_unauthorized_alien
          and taxpayer_knew_individual_was_unauthorized_when_hired
          and annual_wages_or_remuneration_paid_to_individual >= annual_unauthorized_alien_labor_remuneration_threshold
          and not business_is_exempt_from_federal_employment_verification_procedures
          and not individual_was_hired_before_statutory_cutoff
          and not individual_is_not_directly_compensated_or_employed_by_taxpayer
          and not individual_holds_and_presents_valid_department_of_revenue_license_or_identification
