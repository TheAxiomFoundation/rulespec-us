format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-37-112
  summary: |-
    Revenue generated by the part 1 excise tax approved by voters at the November 2024 statewide election may be collected and spent as a voter-approved revenue change and requires no subsequent voter approval.
rules:
  - name: excise_tax_revenue_may_be_collected_and_spent_as_voter_approved_revenue_change
    kind: derived
    entity: ExciseTaxRevenue
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-37-112
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-37-112
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          revenue_is_generated_by_excise_tax_levied_pursuant_to_part_1
          and excise_tax_was_approved_by_voters_at_required_statewide_election
          and voter_approval_required_pursuant_to_part_2_was_obtained
  - name: subsequent_voter_approval_for_excise_tax_revenue_is_not_required
    kind: derived
    entity: ExciseTaxRevenue
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-37-112
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-37-112
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          revenue_is_generated_by_excise_tax_levied_pursuant_to_part_1
          and excise_tax_was_approved_by_voters_at_required_statewide_election
          and voter_approval_required_pursuant_to_part_2_was_obtained
