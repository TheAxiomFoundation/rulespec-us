format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-5-128
  summary: |-
    The assessor shall certify taxable-property valuation for political subdivisions and provide specified exempt-business-personal-property information. If valuation for assessment has been divided for an urban renewal area or county revitalization area and the division remains in effect, any certification must be based on the specified divided portion.
rules:
  - name: certification_uses_urban_renewal_valuation_portion_when_required
    kind: derived
    entity: Assessor
    dtype: Judgment
    period: Year
    source: C.R.S. 39-5-128(3)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-5-128
              excerpt: "If the valuation for assessment ... has been divided for an urban renewal area ... any certification ... must be based upon that portion ... so long as the division remains in effect."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not (valuation_for_assessment_has_urban_renewal_division and urban_renewal_valuation_division_remains_in_effect)
          or certification_is_based_on_urban_renewal_valuation_portion

  - name: certification_uses_county_revitalization_valuation_portion_when_required
    kind: derived
    entity: Assessor
    dtype: Judgment
    period: Year
    source: C.R.S. 39-5-128(3)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-5-128
              excerpt: "If the valuation for assessment ... has been divided for a county revitalization area ... any certification ... must be based upon that portion ... so long as the division remains in effect."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not (valuation_for_assessment_has_county_revitalization_division and county_revitalization_valuation_division_remains_in_effect)
          or certification_is_based_on_county_revitalization_valuation_portion
