format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-5-128
  summary: |-
    The assessor shall certify taxable-property valuation for political subdivisions and provide specified exempt-business-personal-property information. If valuation for assessment has been divided for an urban renewal area or county revitalization area and the division remains in effect, any certification must be based on the specified divided portion.
rules:
  - name: certification_uses_urban_renewal_valuation_portion_when_required
    kind: derived
    entity: Assessor
    dtype: Judgment
    period: Year
    source: C.R.S. 39-5-128(3)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-5-128
              excerpt: "If the valuation for assessment for all or part of any such political\nsubdivision has been divided for an urban renewal area, pursuant to section 31-25-107 (9)(a), any certification under this section must be based upon that portion of\nthe valuation for assessment under section 31-25-107 (9)(a)(I) so long as the division\nremains in effect."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not (valuation_for_assessment_has_urban_renewal_division and urban_renewal_valuation_division_remains_in_effect)
          or certification_is_based_on_urban_renewal_valuation_portion

  - name: certification_uses_county_revitalization_valuation_portion_when_required
    kind: derived
    entity: Assessor
    dtype: Judgment
    period: Year
    source: C.R.S. 39-5-128(3)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-5-128
              excerpt: "If the valuation for assessment for all or part of any such political\nsubdivision has been divided for an urban renewal area, pursuant to section 31-25-107 (9)(a), any certification under this section must be based upon that portion of\nthe valuation for assessment under section 31-25-107 (9)(a)(I) so long as the division\nremains in effect.\n(b) If the valuation for assessment for all or part of any such political\nsubdivision has been divided for a county revitalization area, pursuant to section 30-31-109 (13)(a), any certification under this section must be based upon that portion\nof the valuation for assessment under section 30-31-109 (13)(a)(I), so long as the\ndivision remains in effect."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not (valuation_for_assessment_has_county_revitalization_division and county_revitalization_valuation_division_remains_in_effect)
          or certification_is_based_on_county_revitalization_valuation_portion
