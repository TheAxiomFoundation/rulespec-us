format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-10-104.5
  summary: |-
    An administrative charge for delinquent taxes totaling less than fifty dollars may not exceed twenty-five dollars and must keep total charges at no more than fifty dollars. The treasurer may refrain from collecting penalty, delinquent interest, or costs of fifty dollars or less.
  deferred_outputs:
    - output: us-co:statutes/39/39-10-104.5/c#delinquent_interest_rate_schedule
      reason: The source table specifies interest by calendar payment-date ranges and installment election; supported formulas lack a date-range/table-selection representation sufficient to calculate the complete schedule faithfully.
rules:
  - name: administrative_charge_per_case_ceiling
    kind: parameter
    dtype: Money
    unit: USD
    source: 39-10-104.5(9)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-10-104.5
              excerpt: "Such charge shall not exceed twenty-five dollars in any case"
    versions:
      - effective_from: '1994-01-01'
        formula: |-
          25
  - name: total_delinquency_charges_ceiling
    kind: parameter
    dtype: Money
    unit: USD
    source: 39-10-104.5(9)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-10-104.5
              excerpt: "to no more than fifty dollars"
    versions:
      - effective_from: '1994-01-01'
        formula: |-
          50
  - name: discretionary_noncollection_ceiling
    kind: parameter
    dtype: Money
    unit: USD
    source: 39-10-104.5(10)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-10-104.5
              excerpt: "where the amount to be collected is fifty dollars or less"
    versions:
      - effective_from: '1994-01-01'
        formula: |-
          50
  - name: authorized_administrative_delinquency_charge
    kind: derived
    entity: Asset
    dtype: Money
    period: Year
    unit: USD
    source: 39-10-104.5(9)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-10-104.5
              excerpt: "shall be limited to\nsuch amount less than twenty-five dollars as may be necessary to limit the total\ncharges against such property, including taxes, delinquent interest, and the charge\nauthorized by this subsection (9), to no more than fifty dollars"
    versions:
      - effective_from: '1994-01-01'
        formula: |-
          min(
            county_determined_administrative_charge,
            administrative_charge_per_case_ceiling,
            max(0, total_delinquency_charges_ceiling - taxes_interest_and_other_charges)
          )
  - name: treasurer_may_refrain_from_small_amount_collection
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: 39-10-104.5(10)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-10-104.5
              excerpt: "The treasurer may refrain from collecting any penalty, delinquent\ninterest, or costs where the amount to be collected is fifty dollars or less."
    versions:
      - effective_from: '1994-01-01'
        formula: |-
          penalty_delinquent_interest_and_costs_to_collect
          <= discretionary_noncollection_ceiling
