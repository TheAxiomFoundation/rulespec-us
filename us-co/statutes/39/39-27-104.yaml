format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-27-104
  summary: |-
    “It is unlawful for any person to act as a distributor, supplier, terminal operator, importer, exporter, carrier, or blender of gasoline or special fuel in this state without being licensed as such.” “Each application must be accompanied by a ten-dollar filing fee.” “The executive director ... shall issue a duplicate license upon payment of a five-dollar fee.” Civil penalties include five-thousand-dollar, ten-thousand-dollar, and fifteen-thousand-dollar fines for specified violations.
rules:
  - name: gasoline_or_special_fuel_actor_must_be_licensed
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: C.R.S. § 39-27-104(1)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-27-104
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_acts_as_distributor
          or person_acts_as_supplier
          or person_acts_as_terminal_operator
          or person_acts_as_importer
          or person_acts_as_exporter
          or person_acts_as_carrier
          or person_acts_as_blender

