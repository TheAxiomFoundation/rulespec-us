format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-29-113
  summary: |-
    If a person likely liable for taxes transfers property to a person controlled by the transferor, the executive director may disallow the transferee's exemption unless the transferee establishes by a clear preponderance of the evidence that securing the exemption was not a major purpose of the transfer. Control includes ownership of more than fifty percent of a corporation's voting stock or, for another transferee, a greater economic interest than any other owner.
rules:
  - name: corporate_control_voting_stock_ownership_threshold
    kind: parameter
    dtype: Rate
    source: C.R.S. § 39-29-113(2)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-29-113
              excerpt: "more than fifty percent of the voting stock"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.50

  - name: transferor_controls_transferee
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-29-113(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-29-113
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-29-113
              excerpt: "more than fifty percent of the voting stock"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (transferee_is_corporation
          and transferor_direct_or_indirect_voting_stock_ownership_rate > corporate_control_voting_stock_ownership_threshold)
          or
          (not transferee_is_corporation
          and transferor_has_greater_economic_interest_than_any_other_owner_during_any_part_of_taxable_year)

  - name: executive_director_may_disallow_transferee_exemption
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-29-113(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-29-113
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-29-113
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          transferor_is_likely_to_be_liable_for_taxes_imposed_pursuant_to_this_article
          and transferor_transferred_all_or_part_of_property_to_transferee
          and transferor_controls_transferee
          and not transferee_established_by_clear_preponderance_of_evidence_that_securing_exemption_was_not_a_major_purpose_of_transfer
