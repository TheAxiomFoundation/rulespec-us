format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-21-114.5
  summary: A person shall, upon demand of the executive director, surrender property
    or rights to property subject to levy, except when the person has a valid right
    of setoff or an interest superior to the department's. A financial institution
    must surrender deposits within twenty-one days after service of the levy, and
    an employer must surrender wages within twenty-one days after the taxpayer's pay
    period ends. A wage levy is continuous until released and may not exceed twenty-five
    percent of disposable earnings. Failure or refusal to surrender creates liability
    limited to the lesser of the unsurrendered property's value and the levy liability.
    Surrender or payment of that liability discharges obligations arising from the
    surrender or payment.
  deferred_outputs:
  - output: us-co:statutes/39/39-21-114.5/1#maximum_wage_levy_for_pay_period
    reason: "The maximum requires \u201Cdisposable earnings\u201D to have the meaning\
      \ supplied by section 13-54-104 (1), but no copied RuleSpec source provides\
      \ that definition."
    source_values:
    - us-co:statutes/39/39-21-114.5#wage_levy_maximum_rate
rules:
- name: financial_institution_deposit_surrender_deadline_days
  kind: parameter
  dtype: Integer
  source: C.R.S. 39-21-114.5(1)(b)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-21-114.5
          excerpt: within twenty-one days after service of the levy
  versions:
  - effective_from: '0001-01-01'
    formula: '21'
- name: employer_wage_surrender_deadline_days
  kind: parameter
  dtype: Integer
  source: C.R.S. 39-21-114.5(1)(c)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-21-114.5
          excerpt: within twenty-one days after the end of the taxpayer's pay period
  versions:
  - effective_from: '0001-01-01'
    formula: '21'
- name: wage_levy_maximum_rate
  kind: parameter
  dtype: Rate
  source: C.R.S. 39-21-114.5(1)(c)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-21-114.5
          excerpt: may not exceed twenty-five percent of the taxpayer's disposable
            earnings
  versions:
  - effective_from: '0001-01-01'
    formula: '0.25'
- name: surrender_to_executive_director_required
  kind: derived
  entity: Person
  dtype: Judgment
  period: Day
  source: C.R.S. 39-21-114.5(1)(a)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/statute/39/39-21-114.5
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-co/statute/39/39-21-114.5
  versions:
  - effective_from: '0001-01-01'
    formula: 'executive_director_demands_surrender_of_taxpayer_property_or_rights_subject_to_levy_in_persons_possession

      and not person_has_valid_right_of_setoff_at_time_of_demand

      and not person_has_interest_superior_to_department_at_time_of_demand'
- name: wage_levy_continues
  kind: derived
  entity: Employer
  dtype: Judgment
  period: Day
  source: C.R.S. 39-21-114.5(1)(c)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: effective_period
        source:
          corpus_citation_path: us-co/statute/39/39-21-114.5
  versions:
  - effective_from: '0001-01-01'
    formula: 'wage_levy_has_been_made

      and not department_has_released_wage_levy'
- name: non_surrender_liability
  kind: derived
  entity: Person
  dtype: Money
  unit: USD
  period: Day
  source: C.R.S. 39-21-114.5(2)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-21-114.5
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/statute/39/39-21-114.5
  versions:
  - effective_from: '0001-01-01'
    formula: 'if executive_director_demands_surrender_of_taxpayer_property_or_rights_subject_to_levy_in_persons_possession
      and person_fails_or_refuses_to_surrender_property_or_rights: min(value_of_property_or_rights_not_surrendered,
      liability_for_which_levy_was_made) else: 0'
- name: obligations_arising_from_surrender_or_payment_discharged
  kind: derived
  entity: Person
  dtype: Judgment
  period: Day
  source: C.R.S. 39-21-114.5(3)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/statute/39/39-21-114.5
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-21-114.5
  versions:
  - effective_from: '0001-01-01'
    formula: 'executive_director_demands_surrender_of_taxpayer_property_or_rights_subject_to_levy_in_persons_possession

      and (person_surrenders_property_or_rights_to_executive_director

      or person_pays_liability_required_under_subsection_2)'
