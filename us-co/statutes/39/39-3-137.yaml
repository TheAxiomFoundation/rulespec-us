format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-3-137
  summary: |-
    An organization owing property taxes as of August 5, 2008, is not required to pay the remaining balance when it meets the specified exemption-report criteria and its tax-exempt status is reestablished. The state board may authorize that reestablishment for an organization that paid all or part of a bill for a denied-exemption year.
rules:
  - name: organization_meets_tax_balance_waiver_criteria
    kind: derived
    entity: Organization
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-3-137(1)(a)-(d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-3-137
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          organization_is_religious_charitable_or_educational_and_exempt_from_general_property_tax
          and exemption_application_was_filed_and_granted_before_statutory_cutoff
          and annual_exemption_report_was_incomplete_or_incorrect_when_filed_before_statutory_cutoff
          and organization_was_denied_tax_exempt_status_and_billed_for_affected_property_tax_year

  - name: organization_not_required_to_pay_remaining_property_tax_balance
    kind: derived
    entity: Organization
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-3-137(1)-(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-3-137
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          organization_owes_property_taxes_as_of_statutory_cutoff
          and organization_meets_tax_balance_waiver_criteria
          and property_tax_administrator_has_reestablished_organization_tax_exempt_status

  - name: state_board_may_authorize_tax_exempt_status_reestablishment
    kind: derived
    entity: Organization
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-3-137(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-3-137
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          organization_meets_tax_balance_waiver_criteria
          and organization_paid_all_or_part_of_property_tax_bill_for_denied_exemption_year
