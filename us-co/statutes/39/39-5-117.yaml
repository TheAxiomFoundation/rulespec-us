format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-5-117
  summary: |-
    Improvements destroyed or demolished subsequent to the assessment date shall receive proportionate valuation when the owner or owner's agent notifies the assessor before taxes are levied; failure to notify is a waiver.
rules:
  - name: proportionate_improvement_valuation_required
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. 39-5-117
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-5-117
              excerpt: "Whenever any improvements are destroyed or demolished subsequent to the assessment date"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-5-117
              excerpt: "Failure ... to so notify the assessor prior to the date taxes are levied shall be considered a waiver"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-5-117
              excerpt: "such improvements shall be valued ... at the proportion of its valuation for the full calendar year"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          improvement_destroyed_or_demolished_subsequent_to_assessment_date
          and owner_or_agent_notified_assessor_before_taxes_levied
