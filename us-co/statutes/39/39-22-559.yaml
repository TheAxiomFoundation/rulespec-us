format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-559
  summary: |-
    For income tax years commencing on or after January 1, 2024, but before January 1, 2032, a qualifying production company may receive a film incentive tax credit not exceeding twenty-two percent of actual qualified local expenditures. A production company shall not apply for, and the office shall not approve, the credit for expenditures for which the company applied for or received a performance-based incentive under section 24-48.5-116.
  deferred_outputs:
    - output: us-co:statutes/39/39-22-559/a#credit
      reason: The definition identifies the credit created by the entire section; its final amount and entitlement depend on the deferred qualification, reservation, certification, and discretionary-increase process.
    - output: us-co:statutes/39/39-22-559/e#office_of_economic_development
      reason: The institutional definition depends on the office created by section 24-48.5-101(1), for which no copied RuleSpec definition is available.
    - output: us-co:statutes/39/39-22-559/f#originates
      reason: Faithful evaluation requires production-company or special-purpose-business-entity status, registration and residency histories, project-level production-activity history, and manager decision-making authority across the stated twelve-month periods.
      source_values:
        - us-co:statutes/39/39-22-559#production_company_registration_or_residency_months
        - us-co:statutes/39/39-22-559#prior_project_production_activity_lookback_months
        - us-co:statutes/39/39-22-559#special_purpose_entity_manager_residency_months
    - output: us-co:statutes/39/39-22-559/g#production_activities
      reason: The defined activity relation is project- and film-scoped and depends on the unavailable meaning of film in section 24-48.5-114(1).
    - output: us-co:statutes/39/39-22-559/h#production_company
      reason: The definition depends on the unavailable meaning of film in section 24-48.5-114(1) and a relation tying a person or business entity to production activities for a particular film in Colorado.
    - output: us-co:statutes/39/39-22-559/2/i#qualified_local_expenditure
      reason: The complete expenditure base requires payment-level aggregation, per-employee and per-personal-service-corporation caps, Colorado withholding or information-return conditions, office determinations, and the unavailable personal-service-corporation definitions in section 24-48.5-114.
      source_values:
        - us-co:statutes/39/39-22-559#employee_or_contractor_payment_cap
        - us-co:statutes/39/39-22-559#personal_service_corporation_annual_payment_cap
    - output: us-co:statutes/39/39-22-559/3#film_incentive_tax_credit
      reason: The final credit requires the deferred qualified-local-expenditure base and the reservation, certification, and discretionary-increase process stated in subsections (4) and (6).
      source_values:
        - us-co:statutes/39/39-22-559#minimum_actual_qualified_local_expenditures
        - us-co:statutes/39/39-22-559#minimum_colorado_resident_workforce_rate
        - us-co:statutes/39/39-22-559#standard_credit_rate_limit
    - output: us-co:statutes/39/39-22-559/4#discretionarily_increased_credit
      reason: The director may approve an amount exceeding the otherwise applicable percentage, but the source supplies no formula or upper limit for the discretionary increase.
      source_values:
        - us-co:statutes/39/39-22-559#discretionary_increase_lower_baseline_rate
        - us-co:statutes/39/39-22-559#discretionary_increase_current_baseline_rate
    - output: us-co:statutes/39/39-22-559/5/a#annual_aggregate_credit_reservation_limit
      reason: Applying the aggregate limit requires a relation over all credit reservations made by the office during the calendar year.
      source_values:
        - us-co:statutes/39/39-22-559#annual_aggregate_credit_reservation_cap
    - output: us-co:statutes/39/39-22-559/6#tax_credit_reservation_and_certificate
      reason: Reservation and certificate issuance require project-level applications, office determinations, certified-public-accountant reports, documentary evidence, and additional requirements imposed by the office.
      source_values:
        - us-co:statutes/39/39-22-559#reservation_estimated_expenditure_rate_limit
    - output: us-co:statutes/39/39-22-559/7#refundable_film_incentive_tax_credit
      reason: The refundable final amount depends on the deferred certified credit amount and the production company's income taxes due for the certificate year.
rules:
  - name: production_company_registration_or_residency_months
    kind: parameter
    dtype: Integer
    source: 39-22-559(2)(f)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-559
              excerpt: "a resident of the\nstate or registered with the secretary of state for at least twelve consecutive\nmonths"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          12

  - name: prior_project_production_activity_lookback_months
    kind: parameter
    dtype: Integer
    source: 39-22-559(2)(f)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-559
              excerpt: "engaged in production activities in the state for other projects in\nthe past twelve consecutive months"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          12

  - name: special_purpose_entity_manager_residency_months
    kind: parameter
    dtype: Integer
    source: 39-22-559(2)(f)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-559
              excerpt: "the manager of the business entity must be a\nresident of the state for at least twelve consecutive months"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          12

  - name: employee_or_contractor_payment_cap
    kind: parameter
    dtype: Money
