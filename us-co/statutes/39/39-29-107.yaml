format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-29-107
  summary: |-
    On and after January 1, 2024, a tax upon severance of oil shale is levied on gross proceeds from each commercial oil shale facility at four percent. Before that date, application began 180 days after commercial production and included phase-in fractions and a daily-production exemption.
  deferred_outputs:
    - output: us-co:statutes/39/39-29-107#pre_revised_application_oil_shale_severance_tax
      reason: The pre-revised tax combines a gross-proceeds base with production-volume exemptions expressed in tons or barrels; this source does not supply a valuation or allocation method that converts exempt production into excluded gross proceeds.
      source_values:
        - us-co:statutes/39/39-29-107#commercial_production_waiting_period_days
        - us-co:statutes/39/39-29-107#first_year_tax_fraction
        - us-co:statutes/39/39-29-107#second_year_tax_fraction
        - us-co:statutes/39/39-29-107#third_year_tax_fraction
        - us-co:statutes/39/39-29-107#fourth_and_succeeding_year_tax_fraction
        - us-co:statutes/39/39-29-107#daily_oil_shale_exemption_tons
        - us-co:statutes/39/39-29-107#daily_shale_oil_exemption_barrels
rules:
  - name: oil_shale_severance_tax_rate
    kind: parameter
    dtype: Rate
    source: C.R.S. 39-29-107(1)(a)(I), (1)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-29-107
              excerpt: "at a rate of four percent of such gross proceeds"
    versions:
      - effective_from: '1978-01-01'
        formula: |-
          0.04

  - name: commercial_production_waiting_period_days
    kind: parameter
    dtype: Count
    source: C.R.S. 39-29-107(2)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-29-107
              excerpt: "one hundred eighty days after the facility commences commercial production"
    versions:
      - effective_from: '1978-01-01'
        formula: |-
          180

  - name: production_phase_in_full_rate_year
    kind: parameter
    dtype: Count
    source: C.R.S. 39-29-107(2)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-29-107
              excerpt: "Fourth and each succeeding year"
    versions:
      - effective_from: '1978-01-01'
        formula: |-
          4

  - name: first_year_tax_fraction
    kind: parameter
    dtype: Rate
    source: C.R.S. 39-29-107(2)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-29-107
              excerpt: "First year 1/4"
    versions:
      - effective_from: '1978-01-01'
        formula: |-
          1 / production_phase_in_full_rate_year

  - name: second_year_tax_fraction
    kind: parameter
    dtype: Rate
    source: C.R.S. 39-29-107(2)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-29-107
              excerpt: "Second year 1/2"
    versions:
      - effective_from: '1978-01-01'
        formula: |-
          2 / production_phase_in_full_rate_year

  - name: third_year_tax_fraction
    kind: parameter
    dtype: Rate
    source: C.R.S. 39-29-107(2)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-29-107
              excerpt: "Third year 3/4"
    versions:
      - effective_from: '1978-01-01'
        formula: |-
          3 / production_phase_in_full_rate_year

  - name: fourth_and_succeeding_year_tax_fraction
    kind: parameter
    dtype: Rate
    source: C.R.S. 39-29-107(2)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-29-107
              excerpt: "Fourth and each succeeding year Entire rate imposed by subsection (1)."
    versions:
      - effective_from: '1978-01-01'
        formula: |-
          1

  - name: daily_oil_shale_exemption_tons
    kind: parameter
    dtype: Decimal
    source: C.R.S. 39-29-107(3)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-29-107
              excerpt: "first fifteen thousand tons per day of oil shale"
    versions:
      - effective_from: '1978-01-01'
        formula: |-
          15000

  - name: daily_shale_oil_exemption_barrels
    kind: parameter
    dtype: Decimal
    source: C.R.S. 39-29-107(3)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-29-107
              excerpt: "ten thousand barrels per day of shale oil"
    versions:
      - effective_from: '1978-01-01'
        formula: |-
          10000

  - name: oil_shale_severance_tax_due
    kind: derived
    entity: CommercialOilShaleFacility
    dtype: Money
    period: Year
    unit: USD
    source: C.R.S. 39-29-107(1)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-29-107
              excerpt: "On and after January 1, 2024 ... tax shall be levied on the gross proceeds from each commercial oil shale facility at a rate of four percent"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          commercial_oil_shale_facility_gross_proceeds * oil_shale_severance_tax_rate
