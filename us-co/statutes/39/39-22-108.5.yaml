format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-108.5
  summary: |-
    For a trust formerly resident in another state that becomes a Colorado resident after May 25, 2006 and is taxed by both states because of dual residence, the credit equals Colorado tax on income taxed by both states multiplied by the other-state rate or combined rates divided by the combined Colorado and other-state rates. A state income tax rate is state income tax liability divided by taxable income.
rules:
  - name: colorado_state_income_tax_rate
    kind: derived
    entity: Trust
    dtype: Rate
    period: Year
    source: Colo. Rev. Stat. § 39-22-108.5(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-22-108.5
              excerpt: "state income tax rate means the trust's state income tax liability divided by the trust's taxable income used to compute the state income tax liability"
    versions:
      - effective_from: '2006-05-26'
        formula: |-
          colorado_state_income_tax_liability / colorado_taxable_income_used_to_compute_state_income_tax_liability

  - name: dual_resident_trust_credit_percentage
    kind: derived
    entity: Trust
    dtype: Rate
    period: Year
    source: Colo. Rev. Stat. § 39-22-108.5(2)-(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-108.5
              excerpt: "the combined total of all the other states' income tax rates for the income tax year divided by the combined income tax rates of Colorado and the other states"
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-22-108.5
              excerpt: "state income tax rate means the trust's state income tax liability divided by the trust's taxable income"
    versions:
      - effective_from: '2006-05-26'
        formula: |-
          combined_other_states_income_tax_rates / (colorado_state_income_tax_rate + combined_other_states_income_tax_rates)

  - name: dual_resident_trust_income_tax_credit
    kind: derived
    entity: Trust
    dtype: Money
    unit: USD
    period: Year
    source: Colo. Rev. Stat. § 39-22-108.5(1)-(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-22-108.5
              excerpt: "a trust that is a resident of another state and becomes a resident of Colorado after May 25, 2006"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-22-108.5
              excerpt: "subject to income taxes in the other state and in Colorado by virtue of the trust's dual residence"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-108.5
              excerpt: "Colorado income tax imposed on the portion of the trust's income that is subject to tax in Colorado and the other state, multiplied by a percentage"
    versions:
      - effective_from: '2006-05-26'
        formula: |-
          if trust_was_resident_of_another_state_before_becoming_colorado_resident_after_applicable_date and trust_is_subject_to_income_tax_in_colorado_and_other_states_by_virtue_of_dual_residence: colorado_income_tax_on_income_subject_to_tax_in_colorado_and_other_states * dual_resident_trust_credit_percentage else: 0
