format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-20-101
  summary: |-
    The provisions of this article shall not apply to liens for general taxes or inheritance taxes.
rules:
  - name: article_provisions_apply_to_lien
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: C.R.S. 39-20-101
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-20-101
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not lien_is_for_general_taxes
          and not lien_is_for_inheritance_taxes
