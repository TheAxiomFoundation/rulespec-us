format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-3-126
  summary: |-
    Tree-planting increases are excluded from actual value for thirty years from planting, unless the trees become economically useful and valuable earlier.
rules:
  - name: tree_planting_value_exclusion_period_years
    kind: parameter
    dtype: Count
    source: C.R.S. 39-3-126
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-3-126
              excerpt: "for a period of thirty years from the date of planting"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30
  - name: tree_planting_value_increase_excluded_from_actual_value
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. 39-3-126
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-3-126
              excerpt: "privately owned lands resulting from the planting of trees"
          - path: versions[0].formula
            kind: effective_period
            source:
              corpus_citation_path: us-co/statute/39/39-3-126
              excerpt: "for a period of thirty years from the date of planting"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-3-126
              excerpt: "trees become sufficiently mature as to be of economic use and value"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_privately_owned_land
          and trees_were_planted_on_land
          and years_since_tree_planting < tree_planting_value_exclusion_period_years
          and not trees_are_economically_useful_and_valuable
