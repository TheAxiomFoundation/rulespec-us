format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-37-104
  summary: |-
    On and after April 1, 2025, an excise tax is levied upon every vendor at six and one-half percent of net taxable sales from retail sales in this state of firearms, firearm precursor parts, or ammunition.
rules:
  - name: firearm_sales_excise_tax_rate
    kind: parameter
    dtype: Rate
    source: C.R.S. § 39-37-104(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-37-104
              excerpt: "at the rate of six and one-half percent"
    versions:
      - effective_from: '2025-04-01'
        formula: |-
          0.065
  - name: firearm_sales_excise_tax
    kind: derived
    entity: Vendor
    dtype: Money
    period: Year
    unit: USD
    source: C.R.S. § 39-37-104(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-37-104
              excerpt: "six and one-half percent of the net taxable sales from the retail sale in this state of any firearm, firearm precursor part, or ammunition"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-37-104
    versions:
      - effective_from: '2025-04-01'
        formula: |-
          firearm_sales_excise_tax_rate * net_taxable_sales_from_retail_sales_in_colorado_of_firearms_firearm_precursor_parts_or_ammunition
