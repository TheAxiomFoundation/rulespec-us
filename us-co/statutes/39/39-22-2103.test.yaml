    ? us-co:statutes/39/39-22-2103#input.aggregate_credit_allowed_for_prior_taxable_years_with_respect_to_reduced_qualified_basis
    : 6000
    ? us-co:statutes/39/39-22-2103#input.aggregate_credit_allowable_for_entire_compliance_period_with_respect_to_reduced_qualified_basis
    : 15000
    us-co:statutes/39/39-22-2103#input.number_of_prior_taxable_years: 3
    us-co:statutes/39/39-22-2103#input.state_income_tax_liability_before_credit_recapture: 1000
  output:
