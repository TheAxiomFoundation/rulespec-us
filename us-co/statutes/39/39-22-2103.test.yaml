- name: qualified basis decrease during compliance period triggers recapture
  period:
    period_kind: tax_year
    start: '2024-01-01'
    end: '2024-12-31'
  input:
    us-co:statutes/39/39-22-2103#input.taxable_year_is_during_compliance_period: true
    us-co:statutes/39/39-22-2103#input.qualified_basis_as_of_last_day_of_taxable_year: 80000
    us-co:statutes/39/39-22-2103#input.qualified_basis_as_of_last_day_of_prior_taxable_year: 100000
    ? us-co:statutes/39/39-22-2103#input.aggregate_credit_allowed_for_prior_taxable_years_with_respect_to_reduced_qualified_basis
    : 6000
    ? us-co:statutes/39/39-22-2103#input.aggregate_credit_allowable_for_entire_compliance_period_with_respect_to_reduced_qualified_basis
    : 15000
    us-co:statutes/39/39-22-2103#input.number_of_prior_taxable_years: 3
    us-co:statutes/39/39-22-2103#input.state_income_tax_liability_before_credit_recapture: 1000
  output:
    us-co:statutes/39/39-22-2103#aggregate_credit_allowable_ratatably_for_prior_taxable_years: 3000
    us-co:statutes/39/39-22-2103#accelerated_portion_of_credit_for_reduced_qualified_basis: 3000
    us-co:statutes/39/39-22-2103#credit_recapture_amount: 3000
    us-co:statutes/39/39-22-2103#state_income_tax_liability_after_credit_recapture: 4000
