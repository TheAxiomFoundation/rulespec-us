format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-11-133
  summary: |-
    Suit to quiet title or to try title may be maintained by the grantee or successors for parcels acquired under a qualifying tax deed; misjoinder is not a defense or objection; a partial-parcel claimant's defense or counterclaim is tried separately.
rules:
  - name: tax_deed_title_action_may_be_maintained
    kind: derived
    entity: QuietTitleAction
    dtype: Judgment
    period: Day
    source: C.R.S. § 39-11-133
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-11-133
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          action_is_brought_by_grantee_or_successor
          and action_is_to_quiet_or_try_title_for_parcels_acquired_under_qualifying_tax_deed

  - name: misjoinder_is_not_defense_or_objection
    kind: derived
