format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-10-114
  summary: |-
    “Any taxes levied on personal property ... determined to be uncollectible after a period of one year after the date of their becoming delinquent may be canceled by the board of county commissioners.” “When any real property has been stricken off to a county by virtue of a tax sale and there has been no transfer by the county of a certificate of purchase thereon, the taxes ... may be determined to be uncollectible after a period of six years from the date of becoming delinquent, and they may be canceled by the board of county commissioners.”
  deferred_outputs:
    - output: us-co:statutes/39/39-10-114#abatement_or_refund_of_erroneously_or_illegally_levied_taxes
      reason: The broader abatement and refund process includes operative exceptions and cross-referenced procedures whose necessary RuleSpec outputs are not supplied in copied context.
    - output: us-co:statutes/39/39-10-114#refund_interest
      reason: The applicable refund-interest rate is determined by section 39-10-104.5, for which no copied RuleSpec source provides the rate.
rules:
  - name: personal_property_uncollectibility_period_years
    kind: parameter
    dtype: Count
    period: Year
    source: C.R.S. 39-10-114(2)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-10-114
              excerpt: "after a period of one year after the date of their becoming delinquent"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1
  - name: real_property_uncollectibility_period_years
    kind: parameter
    dtype: Count
    period: Year
    source: C.R.S. 39-10-114(2)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-10-114
              excerpt: "after a period of six years from the date of becoming delinquent"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          6
  - name: personal_property_taxes_may_be_canceled
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. 39-10-114(2)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-10-114
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-10-114
              excerpt: "after a period of one year"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_personal_property
          and personal_property_taxes_are_determined_uncollectible
          and years_since_personal_property_taxes_became_delinquent >= personal_property_uncollectibility_period_years
  - name: county_stricken_real_property_taxes_may_be_canceled
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. 39-10-114(2)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-10-114
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-10-114
              excerpt: "after a period of six years"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          real_property_was_stricken_off_to_county_by_tax_sale
          and county_has_not_transferred_certificate_of_purchase
          and real_property_taxes_are_determined_uncollectible
          and years_since_real_property_taxes_became_delinquent >= real_property_uncollectibility_period_years
