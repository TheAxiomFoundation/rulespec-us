format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-602
  summary: |-
    “If any person fails or refuses to make any return required by this article, the executive director may make such return.” A qualifying assessment is sufficient as if filed by the liable person. For a nonresident whose name and address were furnished by a county assessor, the executive director shall mail first-class notice if the nonresident has not made the required return.
rules:
  - name: executive_director_may_make_return_for_nonfiling_person
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-22-602(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-22-602
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_fails_or_refuses_to_make_required_return

  - name: assessment_based_on_director_return_is_sufficient
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-22-602(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-602
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          executive_director_may_make_return_for_nonfiling_person
          and assessment_is_based_on_return_made_by_executive_director

  - name: executive_director_must_mail_notice_to_nonfiling_nonresident
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-22-602(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-22-602
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          nonresident_name_and_address_were_furnished_by_county_assessor_pursuant_to_section_39_5_102_3
          and nonresident_has_not_made_required_return
