format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-9-108
  summary: |-
    “In any case in which excess state equalization payments are made to school districts within the county during the time such review is pending, interest shall be paid to the state on the amount of such excess.”
  deferred_outputs:
    - output: us-co:statutes/39/39-9-108#interest_on_excess_state_equalization_payments
      reason: The source requires interest at the rate determined pursuant to section 39-21-110.5, but no executable RuleSpec export for that rate is supplied in context.
rules:
  - name: interest_payment_to_state_required
    kind: derived
    entity: JudicialReview
    dtype: Judgment
    period: Year
    source: C.R.S. 39-9-108
    metadata:
      proof:
        atoms:
