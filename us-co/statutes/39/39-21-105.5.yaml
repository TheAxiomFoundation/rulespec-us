format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-21-105.5
  summary: |-
    First-class mailed notice to a taxpayer's last-known address is sufficient, with specified records creating receipt presumptions and prima facie proof. A taxpayer may elect electronic notice; electronic notice sent under department procedures is sufficient, and a viewing record creates the same evidentiary effects. “Taxpayer” includes an agent or personal representative of the taxpayer's estate.
rules:
  - name: person_is_taxpayer_for_notice_purposes
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: Colo. Rev. Stat. § 39-21-105.5(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-21-105.5
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_taxpayer
          or person_is_agent_of_taxpayer
          or person_is_personal_representative_of_taxpayer_estate

  - name: first_class_notice_sufficient
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: Colo. Rev. Stat. § 39-21-105.5(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-21-105.5
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          notice_was_mailed_postpaid_by_first_class_mail
          and notice_was_mailed_to_taxpayer_last_known_address
          and not taxpayer_has_elected_electronic_notice

  - name: first_class_notice_receipt_presumed
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: Colo. Rev. Stat. § 39-21-105.5(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-21-105.5
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          first_class_notice_sufficient
          and department_maintains_notice_record
          and department_employee_certifies_notice_deposited_in_united_states_mail

  - name: first_class_notice_receipt_prima_facie_proven
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: Colo. Rev. Stat. § 39-21-105.5(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-21-105.5
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          first_class_notice_sufficient
          and department_maintains_notice_record
          and department_employee_certifies_notice_deposited_in_united_states_mail

  - name: electronic_notice_sufficient
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: Colo. Rev. Stat. § 39-21-105.5(2)
    metadata:
