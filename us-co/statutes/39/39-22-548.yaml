format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-548
  summary: For income tax years commencing on or after January 1, 2023, but before
    January 1, 2027, a taxpayer making an allowable contribution receives a credit
    of twenty-five percent, or thirty percent for an underserved, rural county, subject
    to a one-hundred-thousand-dollar per-taxpayer cap.
  deferred_outputs:
  - output: us-co:statutes/39/39-22-548/a#approved_nonprofit_organization_definition
    reason: The approval, qualifying-activity, service-history, and financial-viability
      determination is an administrative definition not representable as a computable
      taxpayer output in this module.
  - output: us-co:statutes/39/39-22-548/b#approved_project_definition
    reason: Project administration and division approval are administrative determinations
      requiring organization and project records not modeled by the available entity
      schema.
  - output: us-co:statutes/39/39-22-548/c#capital_campaign_definition
    reason: The enumerated capital-project purposes and commencement requirement define
      program administration rather than a computable tax-unit output.
  - output: us-co:statutes/39/39-22-548/d#division_definition
    reason: The statutory identification of the division of housing is institutional
      context, not an executable output.
  - output: us-co:statutes/39/39-22-548/e#in_kind_contribution_definition
    reason: Independent third-party valuation and contribution-property classification
      require contribution-level records not represented in this tax-unit calculation.
  - output: us-co:statutes/39/39-22-548/f#monetary_contribution_definition_and_approved_organization_review
    reason: Payment-form classification and division review of approved organizations
      and projects require administrative and transaction records outside this module.
  - output: us-co:statutes/39/39-22-548/g#nonprofit_organization_definition
    reason: Secretary of state standing and federal exempt-organization status are
      external organizational determinations.
  - output: us-co:statutes/39/39-22-548/h#operational_service_definition
    reason: The detailed service-category definition is used for division approval
      and cannot be evaluated from available tax-unit facts.
  - output: us-co:statutes/39/39-22-548/j#taxpayer_definition
    reason: The statutory taxpayer definition includes entity and pass-through ownership
      classifications not modeled as a single executable predicate.
  - output: us-co:statutes/39/39-22-548#credit_carryforward_limit_years
    reason: Generated rule used a local name that collides with a sibling RuleSpec
      export. This output is deferred until it can be encoded with a semantic branch-specific
      name without creating ambiguous sibling imports.
rules:
- name: capital_project_commencement_limit_years
  kind: parameter
  dtype: Count
  source: 39-22-548(c)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-22-548
          excerpt: "commences\nwithin three years"
  versions:
  - effective_from: '2023-01-01'
    formula: '3'
- name: in_kind_contribution_minimum_value
  kind: parameter
  dtype: Money
  unit: USD
  source: 39-22-548(e)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-22-548
          excerpt: valued over five thousand dollars
  versions:
  - effective_from: '2023-01-01'
    formula: '5000'
- name: standard_credit_rate
  kind: parameter
  dtype: Rate
  source: 39-22-548(3)(a)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-22-548
          excerpt: credit equal to twenty-five percent
  versions:
  - effective_from: '2023-01-01'
    formula: '0.25'
- name: underserved_rural_credit_rate
  kind: parameter
  dtype: Rate
  source: 39-22-548(3)(b)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-22-548
          excerpt: "credit equal to thirty\npercent"
  versions:
  - effective_from: '2023-01-01'
    formula: '0.30'
- name: nonprofit_annual_credit_certificate_limit
  kind: parameter
  dtype: Money
  unit: USD
  source: 39-22-548(3)(c)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-22-548
          excerpt: more than seven hundred fifty thousand dollars per income tax year
  versions:
  - effective_from: '2023-01-01'
    formula: '750000'
- name: approved_project_annual_credit_certificate_limit
  kind: parameter
  dtype: Money
  unit: USD
  source: 39-22-548(3)(c)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-22-548
          excerpt: "an additional seven hundred fifty thousand\ndollars per income tax year"
  versions:
  - effective_from: '2023-01-01'
    formula: '750000'
- name: taxpayer_annual_credit_limit
  kind: parameter
  dtype: Money
  unit: USD
  source: 39-22-548(d)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-22-548
          excerpt: shall not exceed one hundred thousand dollars per taxpayer per
            tax year
  versions:
  - effective_from: '2023-01-01'
    formula: '100000'
- name: cash_contribution_minimum_amount
  kind: parameter
  dtype: Money
  unit: USD
  source: 39-22-548(d)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-22-548
          excerpt: "equal to or greater\nthan one hundred dollars"
  versions:
  - effective_from: '2023-01-01'
    formula: '100'
- name: nonprofit_reapproval_period_years
  kind: parameter
  dtype: Count
  source: 39-22-548(5)(g)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-22-548
          excerpt: "apply for reapproval with the\ndivision every four years"
  versions:
  - effective_from: '2023-01-01'
    formula: '4'
- name: homelessness_contribution_tax_credit
  kind: derived
  entity: TaxUnit
  dtype: Money
  period: Year
  unit: USD
  source: 39-22-548(d)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-22-548
          excerpt: "The credit allowed in subsections (3)(a) and (3)(b) of this section\nshall not exceed one hundred thousand dollars per taxpayer per tax year."
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/statute/39/39-22-548
          excerpt: "For income tax years commencing on or after January 1, 2023, but\nbefore January 1, 2027"
  versions:
  - effective_from: '2023-01-01'
    formula: "if income_tax_year_is_within_credit_availability_period:\n  min(\n \
      \   taxpayer_annual_credit_limit,\n    (if contribution_is_in_underserved_rural_county:\n\
      \      underserved_rural_credit_rate * certified_allowable_contribution_value\n\
      \    else:\n      standard_credit_rate * certified_allowable_contribution_value)\n\
      \  )\nelse:\n  0"
