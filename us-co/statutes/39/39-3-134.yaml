format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-3-134
  summary: |-
    The treasurer shall be joined in eminent domain actions likely to exempt real property from property tax, shall assert property-tax claims after joinder and notice, subject to the partial-taking exception, and tax liens transfer to the taking award upon institution.
rules:
  - name: treasurer_must_be_joined_as_respondent
    kind: derived
    entity: EminentDomainAction
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-3-134
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-3-134
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          property_likely_to_become_tax_exempt_through_eminent_domain

  - name: partial_taking_claim_filing_exception_applies
    kind: derived
    entity: EminentDomainAction
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-3-134
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-3-134
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          acquisition_is_only_a_portion_of_real_property
          and treasurer_is_satisfied_remaining_taxable_property_is_sufficient_for_tax_lien

  - name: treasurer_must_assert_property_tax_claim
    kind: derived
    entity: EminentDomainAction
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-3-134
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-3-134
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          treasurer_must_be_joined_as_respondent
          and treasurer_is_joined_as_party_respondent
          and treasurer_has_notice_of_proceedings
          and not partial_taking_claim_filing_exception_applies

  - name: property_tax_lien_transferred_to_taking_award
    kind: derived
    entity: EminentDomainAction
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-3-134
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-3-134
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          eminent_domain_proceedings_instituted
