format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-26-402
  summary: |-
    Before January 1, 2027, each qualified biotechnology taxpayer may claim a refund of all state sales and use tax paid on tangible personal property used in Colorado directly and predominately in biotechnology research and development, if the taxpayer complies with the refund-application requirements.
rules:
  - name: biotechnology_sales_and_use_tax_refund_available
    kind: derived
    entity: Business
    dtype: Judgment
    period: Year
    source: C.R.S. 39-26-402(1)-(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-26-402
              excerpt: "each qualified biotechnology taxpayer shall be allowed to claim a refund"
          - path: versions[0].formula
            kind: effective_period
            source:
              corpus_citation_path: us-co/statute/39/39-26-402
              excerpt: "prior to January 1, 2027"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-26-402
              excerpt: "used in Colorado directly and predominately in research and development of biotechnology"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-26-402
              excerpt: "No refund shall be allowed if the qualified biotechnology taxpayer has not complied with this subsection (2)."
    versions:
      - effective_from: '1999-01-01'
        formula: |-
          taxpayer_is_qualified_biotechnology_taxpayer
          and calendar_year_is_before_refund_termination_date
          and tangible_personal_property_is_used_in_colorado_directly_and_predominately_in_biotechnology_research_and_development
          and taxpayer_complied_with_refund_application_requirements
  - name: biotechnology_sales_and_use_tax_refund
    kind: derived
    entity: Business
    dtype: Money
    unit: USD
    period: Year
    source: C.R.S. 39-26-402(1)-(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-26-402
              excerpt: "a refund of all state sales and use tax paid"
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-26-402
              excerpt: "No refund shall be allowed if the qualified biotechnology taxpayer has not complied with this subsection (2)."
    versions:
      - effective_from: '1999-01-01'
        formula: |-
          if biotechnology_sales_and_use_tax_refund_available: state_sales_and_use_tax_paid_on_qualifying_tangible_personal_property else: 0
