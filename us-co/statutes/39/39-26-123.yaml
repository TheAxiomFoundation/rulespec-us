module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-26-123
  summary: |-
    “Net revenue means the gross amount of sales and use tax receipts collected under this article 26, less a fee retained by vendors for the collection and remittance of the tax pursuant to section 39-26-105 (1) and less refunds and adjustments made by the department of revenue.”
  deferred_outputs:
    - output: us-co:statutes/39/39-26-123/a#repealed_definition
      reason: Subparagraph (a) is repealed and subparagraph (a.5) was deleted by amendment; neither supplies an operative output.
    - output: us-co:statutes/39/39-26-123/b#sales_and_use_taxes_attributable_to_vehicles_and_related_items
      reason: The definition requires transaction-level classification of vehicle sales, related items, and sellers' primary business activity; the necessary transaction and business-activity relation is not available in this source slice.
