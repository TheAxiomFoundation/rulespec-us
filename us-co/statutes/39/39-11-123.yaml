format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-11-123
  summary: |-
    Any county having possession or control of certificates resulting from a tax-lien sale for nonpayment of irrigation or drainage district taxes or assessments, by agreement with the district board, may assign, sell, or transfer the certificates as provided in section 39-11-122.
imports:
  - us-co:statutes/39/39-11-122#tax_certificate_sale_requires_administrator_approval
  - us-co:statutes/39/39-11-122#high_tax_certificate_sale_meets_additional_validity_conditions
rules:
