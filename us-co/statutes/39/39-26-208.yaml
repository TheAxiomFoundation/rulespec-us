            source:
              corpus_citation_path: us-co/statute/39/39-26-208
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          application_is_for_vehicle_registration_and_title_or_vehicle_or_mobile_home_title
          and applicant_fails_to_show_applicable_tax_payment_by_proper_receipts
