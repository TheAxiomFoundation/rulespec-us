format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-26-208
  summary: |-
    “No registration shall be made ... and no certificate of title shall be issued ... until any tax due ... has been paid.” If the applicant fails to show payment by proper receipts, the department of revenue or its authorized agent “shall collect all such applicable taxes” when the application is made. State and municipal revenues must be distributed as specified, and each taxing municipality must certify its current applicable tax ordinances and subsequent changes.
rules:
  - name: tax_payment_prerequisite_for_vehicle_registration_satisfied
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Day
    source: C.R.S. § 39-26-208(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-26-208
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_motor_or_other_vehicle_for_which_registration_is_required
          and all_applicable_storage_use_or_consumption_taxes_have_been_paid

  - name: tax_payment_prerequisite_for_vehicle_or_mobile_home_title_satisfied
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Day
    source: C.R.S. § 39-26-208(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-26-208
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_motor_or_other_vehicle_or_mobile_home
          and all_applicable_storage_use_or_consumption_taxes_have_been_paid

  - name: department_must_collect_applicable_taxes_at_application
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Day
    source: C.R.S. § 39-26-208(2)
    metadata:
      proof:
        atoms:
