format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-30-103.5
  summary: |-
    A qualifying monetary or in-kind enterprise-zone contribution is allowed an income-tax credit equal to twenty-five percent of its certified value. The credit may not exceed $100,000 or the taxpayer's income tax, whichever is less, and in-kind contributions may not exceed fifty percent of the credit claimed. Credits are prohibited for contributions directly benefiting the contributor or not directly related to the specified statutory purposes.
  deferred_outputs:
    - output: us-co:statutes/39/39-30-103.5/d#unused_credit_carryforward
      reason: Carryforward application requires year-indexed credit balances and ordering across as many as five subsequent income-tax years.
    - output: us-co:statutes/39/39-30-103.5/e#zone_administrator_program_list_compliance
      reason: The paragraph establishes administrative submission, review, approval, notification, and reconsideration procedures rather than a taxpayer-level computation.
    - output: us-co:statutes/39/39-30-103.5/c#subsection_3_and_community_development_project_treatment
      reason: Subsection (3)(c) supplies a repeal date, while subsection (3.5) establishes a purpose classification that requires project-status and enterprise-zone designation facts outside this taxpayer-credit computation.
    - output: us-co:statutes/39/39-30-103.5/5#certified_program_reporting_compliance
      reason: Annual reporting and program-certification administration require program-level records and reporting events.
    - output: us-co:statutes/39/39-30-103.5/6#administrator_certification_report_compliance
      reason: The ninety-day reporting duty requires certification and agency-report event records.
    - output: us-co:statutes/39/39-30-103.5/8#administrative_fee_policy_compliance
      reason: Fee reasonableness and commission approval require administrative policy records and discretionary determinations.

rules:
  - name: enterprise_zone_contribution_credit_rate
    kind: parameter
    dtype: Rate
    source: 39-30-103.5(1)(a)(I)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-30-103.5
              excerpt: "twenty-five percent of the total value of the contribution"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          0.25

  - name: enterprise_zone_contribution_credit_cap
    kind: parameter
    dtype: Money
    unit: USD
    source: 39-30-103.5(1)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-30-103.5
              excerpt: "shall not exceed\none hundred thousand dollars"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          100000

  - name: maximum_in_kind_share_of_credit
    kind: parameter
    dtype: Rate
    source: 39-30-103.5(1)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-30-103.5
              excerpt: "In-kind contributions shall not exceed fifty percent of\nthe total credit claimed."
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          0.50

  - name: credit_carryforward_limit_years
    kind: parameter
    dtype: Count
    source: 39-30-103.5(1)(d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-30-103.5
              excerpt: "for a\nperiod not exceeding five years"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          5

  - name: list_modification_reporting_deadline_days
    kind: parameter
    dtype: Count
    source: 39-30-103.5(e)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-30-103.5
              excerpt: "no later than thirty days after the\nmodification is made"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          30

  - name: commission_list_review_period_days
    kind: parameter
    dtype: Count
    source: 39-30-103.5(1)(e)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-30-103.5
              excerpt: "shall not be considered final until thirty days\nafter the commission has received such information"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          30

  - name: nonapproval_notification_deadline_days
    kind: parameter
    dtype: Count
    source: 39-30-103.5(1)(e)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-30-103.5
              excerpt: "not approved within thirty days of receipt\nof the list or modification"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          30

  - name: reconsideration_request_deadline_days
    kind: parameter
    dtype: Count
    source: 39-30-103.5(1)(e)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-30-103.5
              excerpt: "within thirty days after the date the notice"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          30

  - name: minimum_certified_program_reports_per_year
    kind: parameter
    dtype: Count
    source: 39-30-103.5(5)(a)(II)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-30-103.5
              excerpt: "submit a report at least once per\nyear"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          1

  - name: certification_reporting_deadline_days
    kind: parameter
    dtype: Count
    source: 39-30-103.5(6)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-30-103.5
              excerpt: "No later than ninety days after making a certification of value"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          90

  - name: enterprise_zone_contribution_credit_allowed
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 39-30-103.5(1)(a)(I)-(b), (4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-30-103.5
              excerpt: "a credit against the income tax imposed by article 22 of this title 39 in an amount equal to twenty-five percent of the total value of the contribution"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-30-103.5
              excerpt: "In no event shall credits be allowed pursuant to this section for\ncontributions that directly benefit the contributor or that are not directly related to\njob creation, job preservation, or other purposes specified in subsections (2), (3),\nand (3.5) of this section."
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-30-103.5
              excerpt: "not directly related to\njob creation, job preservation, or other purposes specified"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          if contribution_made_for_enterprise_zone_plan_to_designated_administrator
          and contribution_does_not_directly_benefit_contributor
          and contribution_is_directly_related_to_a_statutorily_specified_purpose:
            min(
              enterprise_zone_contribution_credit_cap,
              min(
                max(0, income_tax_imposed),
                enterprise_zone_contribution_credit_rate
                * (
                  max(0, certified_monetary_contribution_value)
                  + min(
                    max(0, certified_in_kind_contribution_value),
                    max(0, certified_monetary_contribution_value)
                  )
                )
              )
            )
          else: 0
