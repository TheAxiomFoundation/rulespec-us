format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-3-122
  summary: |-
    Agricultural equipment used on a farm or ranch to produce agricultural products is exempt from property tax. On and after January 1, 2023, agricultural equipment used in a CEA facility or greenhouse is exempt. From January 1, 2024 through January 1, 2029, qualifying agrivoltaic solar-system machinery or equipment is exempt.
rules:
  - name: agrivoltaic_panel_minimum_bottom_edge_height_feet
    kind: parameter
    dtype: Decimal
    source: Colo. Rev. Stat. § 39-3-122(3)(a)(I)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-3-122
              excerpt: "Elevating the bottom edge height of the panels at least six feet above the\nground"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          6
  - name: agrivoltaic_system_incorporates_qualifying_novel_design
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-3-122(3)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-3-122
              excerpt: "Incorporates novel designs, technologies, or configurations that\nsignificantly expand the potential for agricultural activities"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          solar_panel_bottom_edge_height_in_feet >= agrivoltaic_panel_minimum_bottom_edge_height_feet
          or solar_panels_have_agrivoltaics_supporting_geometry
          or solar_tracking_algorithm_optimizes_vegetative_growth
          or panel_spacing_enables_agricultural_activities
          or wire_management_system_supports_livestock
          or photovoltaic_racking_structure_supports_agrivoltaics
          or system_incorporates_typical_farm_or_ranch_infrastructure
          or system_incorporates_typical_agricultural_structures
  - name: agrivoltaic_system_meets_design_and_construction_requirements
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-3-122(3)(a)-(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-3-122
              excerpt: "Is constructed in a manner that minimizes soil compaction underneath\nand in between panels"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-3-122
              excerpt: "Is constructed to incorporate design strategies that are planned with the\nintent to minimize the negative environmental impact"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          agrivoltaic_system_incorporates_qualifying_novel_design
          and construction_minimizes_soil_compaction_underneath_and_between_panels
          and construction_uses_environmental_impact_minimizing_design_strategies
  - name: farm_or_ranch_agricultural_equipment_property_tax_exempt
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-3-122(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-3-122
              excerpt: "Agricultural equipment that is used on any farm or ranch in the production of agricultural products"
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-3-122
              excerpt: "is exempt from the levy and collection of property tax"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_agricultural_equipment
          and equipment_is_used_on_farm_or_ranch_to_produce_agricultural_products
  - name: cea_facility_or_greenhouse_agricultural_equipment_property_tax_exempt
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-3-122(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: effective_period
            source:
              corpus_citation_path: us-co/statute/39/39-3-122
              excerpt: "On and after January 1, 2023"
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-3-122
              excerpt: "agricultural equipment that is used in any\nCEA facility or greenhouse is exempt"
    versions:
      - effective_from: '2023-01-01'
        formula: |-
          asset_is_agricultural_equipment
          and equipment_is_used_in_cea_facility_or_greenhouse
  - name: agrivoltaic_solar_system_equipment_property_tax_exempt
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-3-122(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: effective_period
            source:
              corpus_citation_path: us-co/statute/39/39-3-122
              excerpt: "On and after January 1, 2024, but before January 2, 2029"
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-3-122
              excerpt: "personal\nproperty is exempted from the levy and collection of property tax if the property is\nmachinery or equipment that is part of a solar energy generating system that is\nused for agrivoltaics"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          taxable_year_is_within_agrivoltaics_exemption_window
          and property_is_machinery_or_equipment_that_is_part_of_solar_energy_generating_system
          and solar_energy_generating_system_is_used_for_agrivoltaics
          and agrivoltaic_system_meets_design_and_construction_requirements
