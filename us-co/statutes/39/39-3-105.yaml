format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-3-105
  summary: |-
    Property of public libraries and of the state and its political subdivisions, including school districts or cooperative associations thereof, is exempt from property tax.
rules:
  - name: property_exempt_from_property_tax
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. 39-3-105
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-3-105
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          property_is_of_public_library
          or property_is_of_state_or_political_subdivision
          or property_is_of_school_district
          or property_is_of_cooperative_association_of_school_district
