format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-520
  summary: For income tax years beginning on or after January 1, 1997, and prior to
    January 1, 2025, a person is allowed a credit equal to ten percent of total qualified
    investment in a qualified school-to-career program. Unused credit is nonrefundable
    and may be carried forward for no more than five years, earliest years first.
    The section is repealed effective December 31, 2034.
  deferred_outputs:
  - output: us-co:statutes/39/39-22-520/1#legislative_intent
    reason: Subsection (1) states legislative findings and intent rather than an executable
      legal calculation.
  - output: us-co:statutes/39/39-22-520/3#unused_credit_carryforward_applied
    reason: Applying unused credit first to the earliest possible income tax years
      requires longitudinal tax-liability and credit-usage history not represented
      by this source slice.
    source_values:
    - us-co:statutes/39/39-22-520#credit_carryforward_limit_years
  - output: us-co:statutes/39/39-22-520/3#unused_credit_refund
    reason: The source categorically prohibits a refund but does not provide a separate
      refundable-amount calculation.
  - output: us-co:statutes/39/39-22-520#credit_carryforward_limit_years
    reason: Generated rule used a local name that collides with a sibling RuleSpec
      export. This output is deferred until it can be encoded with a semantic branch-specific
      name without creating ambiguous sibling imports.
rules:
- name: school_to_career_credit_rate
  kind: parameter
  dtype: Rate
  source: 39-22-520(2)(a)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-22-520
          excerpt: an amount equal to ten percent of the total qualified investment
  versions:
  - effective_from: '1997-01-01'
    formula: '0.10'
- name: qualified_school_to_career_program
  kind: derived
  entity: TaxUnit
  dtype: Judgment
  period: Year
  source: 39-22-520(b)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: definition
        source:
          corpus_citation_path: us-co/statute/39/39-22-520
  versions:
  - effective_from: '1997-01-01'
    formula: 'program_integrates_school_curriculum_with_job_training

      and program_encourages_qualifying_student_job_or_internship_placement

      and program_is_approved_by_authorized_education_body'
- name: qualified_investment
  kind: derived
  entity: TaxUnit
  dtype: Money
  unit: USD
  period: Year
  source: 39-22-520(2)(b)(I)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: definition
        source:
          corpus_citation_path: us-co/statute/39/39-22-520
  versions:
  - effective_from: '1997-01-01'
    formula: "if qualified_school_to_career_program and expenditures_employ_or_provide_internship_to_student_through_program:\n\
      \  max(0, student_wages_expenditure)\n  + max(0, student_workers_compensation_insurance_expenditure)\n\
      \  + max(0, student_unemployment_insurance_expenditure)\n  + max(0, student_training_expenditure)\n\
      else: 0"
- name: school_to_career_credit
  kind: derived
  entity: TaxUnit
  dtype: Money
  unit: USD
  period: Year
  source: 39-22-520(2)(a)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-22-520
          excerpt: income tax years beginning on or after January 1, 1997, and prior
            to January 1, 2025
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-22-520
          excerpt: an amount equal to ten percent of the total qualified investment
  versions:
  - effective_from: '1997-01-01'
    formula: "if income_tax_year_is_in_credit_effective_window:\n  school_to_career_credit_rate\
      \ * qualified_investment\nelse: 0"
- name: school_to_career_credit_allowed_current_year
  kind: derived
  entity: TaxUnit
  dtype: Money
  unit: USD
  period: Year
  source: 39-22-520(3)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-22-520
  versions:
  - effective_from: '1997-01-01'
    formula: min(max(0, income_tax_due), school_to_career_credit)
- name: unused_school_to_career_credit
  kind: derived
  entity: TaxUnit
  dtype: Money
  unit: USD
  period: Year
  source: 39-22-520(3)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-22-520
  versions:
  - effective_from: '1997-01-01'
    formula: max(0, school_to_career_credit - school_to_career_credit_allowed_current_year)
