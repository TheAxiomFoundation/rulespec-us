format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-2-120
  summary: |-
    Any court having jurisdiction may, upon the property tax administrator's application, compel obedience when a person fails to comply with a subpoena or refuses lawful testimony.
rules:
  - name: court_may_compel_subpoena_obedience
    kind: derived
    entity: Court
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-2-120
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-2-120
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          court_has_jurisdiction_in_matter
          and property_tax_administrator_applies_to_court
          and (
            person_fails_to_comply_with_subpoena
            or person_refuses_to_testify_on_lawful_matter
          )
