format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-552
  summary: |-
    The credit equals the applicable amount of qualified expenditures; the applicable amount is generally not more than thirty percent and may be increased to not more than fifty percent. Credits are limited to five million dollars per approved geothermal energy project, aggregate reservations to thirty-five million dollars, and excess credit is refunded without carryforward.
  deferred_outputs:
    - output: us-co:statutes/39/39-22-552/b#approved_geothermal_energy_project
      reason: Approval is determined under office standards and requires an administrative project-review record not represented in this module.
    - output: us-co:statutes/39/39-22-552/c#colorado_energy_office
      reason: This institutional definition does not create a computable RuleSpec output.
    - output: us-co:statutes/39/39-22-552/d#department
      reason: This institutional definition does not create a computable RuleSpec output.
    - output: us-co:statutes/39/39-22-552/e#eligible_taxpayer
      reason: Eligibility depends in part on tax-exempt status under section 39-22-112, for which no executable context is supplied.
    - output: us-co:statutes/39/39-22-552/f#geothermal_electricity_project
      reason: The enumerated project definition requires project-specific administrative and technical facts outside the supported entity model.
    - output: us-co:statutes/39/39-22-552/g#qualified_expenditure
      reason: Qualified-expenditure status requires office approval of costs and an approved geothermal energy project.
    - output: us-co:statutes/39/39-22-552/h#thermal_energy_network_or_study
      reason: The thermal energy network definition incorporates section 39-22-554, for which no executable context is supplied.
    - output: us-co:statutes/39/39-22-552/j#tribal_government
      reason: This organizational definition does not create a computable RuleSpec output.
    - output: us-co:statutes/39/39-22-552/b#credit_per_approved_geothermal_energy_project
      reason: The five-million-dollar limitation applies across all tax years per approved geothermal energy project; no taxpayer-project relation or historical credit aggregate is available.
      source_values:
        - us-co:statutes/39/39-22-552#project_credit_cap
    - output: us-co:statutes/39/39-22-552/c#office_credit_reservation
      reason: Merit-based office evaluation, application-pool ranking, and reservation timing are administrative processes outside the supported runtime model.
      source_values:
        - us-co:statutes/39/39-22-552#aggregate_reserved_credit_cap
    - output: us-co:statutes/39/39-22-552/e#tax_credit_certificate_issuance
      reason: Certificate issuance requires office review of audited cost certification and comparison with the taxpayer application.
    - output: us-co:statutes/39/39-22-552/b#department_electronic_report
      reason: Department reporting is an administrative duty rather than a computable entity-scoped output.
    - output: us-co:statutes/39/39-22-552#exclusive_credit_claim
      reason: The prohibition on claiming section 39-30-104 for the same project depends on a cited source whose copied RuleSpec context is deferred.
rules:
  - name: standard_applicable_credit_rate
    kind: parameter
    dtype: Rate
    source: 39-22-552(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-552
              excerpt: "not to exceed thirty percent of a qualified\nexpenditure"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          0.30

  - name: enhanced_applicable_credit_rate
    kind: parameter
    dtype: Rate
    source: 39-22-552(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-552
              excerpt: "increased to an amount not to exceed fifty percent"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          0.50

  - name: project_credit_cap
    kind: parameter
    dtype: Money
    unit: USD
    source: 39-22-552(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-552
              excerpt: "more than five million dollars in tax credits"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          5000000

  - name: aggregate_reserved_credit_cap
    kind: parameter
    dtype: Money
    unit: USD
    source: 39-22-552(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-552
              excerpt: "must not exceed thirty-five million dollars"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          35000000

  - name: credit_amount_before_project_cap
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 39-22-552(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-552
              excerpt: "an amount of tax credit not to exceed thirty percent of a qualified\nexpenditure"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-22-552
              excerpt: "may be increased to an amount not to exceed fifty percent"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          (if office_determined_enhanced_rate:
            enhanced_applicable_credit_rate
          else:
            standard_applicable_credit_rate) * qualified_expenditure

  - name: refundable_geothermal_energy_credit_excess
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 39-22-552(9)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-552
              excerpt: "exceeds the income tax due on the\nincome of the eligible taxpayer for the taxable year, the excess credit may not be\ncarried forward and must be refunded"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          max(0, tax_credit_certificate_amount - income_tax_due)
