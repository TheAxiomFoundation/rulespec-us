format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-20-104
  summary: |-
    The executive director may issue a certificate discharging part of property from a state-tax lien when the fair market value remaining subject to the lien is at least double the remaining unsatisfied tax liability and all prior liens.
rules:
  - name: required_remaining_value_multiple
    kind: parameter
    dtype: Decimal
    source: Colo. Rev. Stat. § 39-20-104
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-20-104
              excerpt: "at least double"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          2
  - name: certificate_of_discharge_may_be_issued
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-20-104
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-20-104
              excerpt: "property, real or personal, under the law, is subject to a lien for the payment of any tax due the state of Colorado"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-20-104
              excerpt: "fair market value of that part of such property remaining subject to the lien is at least double"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          property_is_subject_to_lien_for_state_tax
          and fair_market_value_remaining_subject_to_lien >= required_remaining_value_multiple * (remaining_unsatisfied_state_tax_liability + amount_of_prior_liens_on_property)
