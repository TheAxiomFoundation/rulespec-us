format: rulespec/v1
module:
  status: deferred
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-1-104.6
  summary: |-
    “Local governmental entity means a governmental entity authorized by law to impose ad valorem taxes”; “Owner-occupier means an individual who” satisfies the stated ownership and primary-residence paths. For property tax years commencing on or after January 1, 2025, qualifying property may be classified as qualified-senior primary residence real property. The section also prescribes applications, penalties, confidentiality, notices, appeals, administrative reporting, reimbursement, and treatment of certain reimbursement as a refund of excess state revenues.
  deferred_outputs:
    - output: us-co:statutes/39/39-1-104.6/a#local_governmental_entity
      reason: The definition requires a governmental-entity and territorial taxing-authority ontology not supplied by the supported RuleSpec schema.
    - output: us-co:statutes/39/39-1-104.6/b#owner_occupier
      reason: The owner-occupier definition must be represented by the canonical owner-occupier concept, but this module cannot safely re-export that concept while also representing the section's property-specific classification and administrative processes.
    - output: us-co:statutes/39/39-1-104.6/c#owner_of_record
      reason: The owner-of-record definition belongs to the supplied canonical owner-of-record concept and must not be duplicated locally.
    - output: us-co:statutes/39/39-1-104.6/d#senior_homestead_exemption
      reason: The definition depends on the senior homestead exemption allowed by section 39-3-203 (1), while the copied context exports exemption parameters rather than the referenced qualifying exemption status.
    - output: us-co:statutes/39/39-1-104.6/e#surviving_spouse_or_partner
      reason: Faithful encoding requires civil-union, marriage-at-death, remarriage, and subsequent-civil-union status mechanics across persons that are not available as canonical executable dependencies.
    - output: us-co:statutes/39/39-1-104.6/f#total_property_tax_revenue_lost
      reason: The calculation depends on valuation-for-assessment rules in sections 39-2-104.2 (3)(s) and 39-1-104.2, including assessor calculation and administrator correction; those valuation dependencies are unavailable or non-executable.
    - output: us-co:statutes/39/39-1-104.6/b#administrator_classification_denial
      reason: Subsection (8)(b) requires entity-level application-report matching, spouse-linked multiple-claim detection, written notice, restricted protest grounds, and application-copy procedures that cannot be represented faithfully with the available scalar schema and dependencies.
    - output: us-co:statutes/39/39-1-104.6/c#administrator_notice_to_assessor
      reason: Subsection (8)(c) is an administrative notice and reporting obligation dependent on completed application examinations, denials, and protest decisions rather than an independently computable policy output.
    - output: us-co:statutes/39/39-1-104.6/c#revenue_lost_from_qualified_senior_classification
      reason: Subsection (10)(c) depends on alternative valuation-for-assessment computations under section 39-1-104.2 (3)(s), (3)(t), (3)(t.5), (3)(u), and (3)(v), whose copied RuleSpec context is deferred and has no executable exports.
