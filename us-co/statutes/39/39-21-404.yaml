format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-21-404
  summary: |-
    "There is hereby created a task force concerning tax policy." "The task force consists of twenty-one members." "Four nonvoting task force members" and "Seventeen voting members" are appointed as provided. The task force shall "Meet at least six times each year."
rules:
  - name: task_force_total_member_count
    kind: parameter
    dtype: Count
    source: C.R.S. 39-21-404(1)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-21-404
              excerpt: "The task force consists of twenty-one members"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          21
  - name: task_force_nonvoting_member_count
    kind: parameter
    dtype: Count
    source: C.R.S. 39-21-404(1)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-21-404
              excerpt: "Four nonvoting task force members"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          4
  - name: task_force_voting_member_count
    kind: parameter
    dtype: Count
    source: C.R.S. 39-21-404(1)(c)-(d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-21-404
              excerpt: "Seventeen voting members"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          17
  - name: task_force_minimum_annual_meeting_count
    kind: parameter
    dtype: Count
    source: C.R.S. 39-21-404(3)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-21-404
              excerpt: "Meet at least six times each year"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          6
