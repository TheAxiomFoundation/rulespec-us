format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-4703
  summary: |-
    “First-time home buyer” means an individual who has never owned or purchased under contract for deed a single-family, owner-occupied primary residence, or who, as a result of dissolution of marriage, has not been listed on a property title for at least three consecutive years.
  deferred_outputs:
    - output: us-co:statutes/39/39-22-4703#account_holder
      reason: Account-holder status depends on account designation in section 39-22-4704, which is not available in copied RuleSpec context.
    - output: us-co:statutes/39/39-22-4703#first_time_home_buyer_savings_account
      reason: Account designation in accordance with section 39-22-4704 is an unavailable upstream legal dependency.
    - output: us-co:statutes/39/39-22-4703#department
      reason: The definition identifies a governmental institution but supplies no computable entity-level legal condition.
    - output: us-co:statutes/39/39-22-4703#qualified_beneficiary
      reason: Qualified-beneficiary status depends on the unavailable account-holder and first-time-home-buyer-savings-account definitions under section 39-22-4704.
rules:
  - name: dissolution_title_absence_qualifies_as_first_time_home_buyer
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 39-22-4703(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-22-4703
              excerpt: "As a result of the individual's dissolution of marriage, has not been listed\non a property title for at least three consecutive years or more."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_has_not_been_listed_on_a_property_title_for_at_least_three_consecutive_years_as_result_of_dissolution_of_marriage
  - name: first_time_home_buyer
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 39-22-4703(5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-22-4703
              excerpt: "First-time home buyer means an individual who:"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_has_never_owned_or_purchased_under_contract_for_deed_a_single_family_owner_occupied_primary_residence
          or dissolution_title_absence_qualifies_as_first_time_home_buyer
  - name: eligible_expense
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Year
    source: 39-22-4703(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-22-4703
              excerpt: "Eligible expenses means a down payment and any closing costs included on a real estate settlement statement."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          payment_is_down_payment
          or payment_is_closing_cost_included_on_real_estate_settlement_statement
  - name: financial_institution
    kind: derived
    entity: Business
    dtype: Judgment
    period: Year
    source: 39-22-4703(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-22-4703
              excerpt: "Financial institution means any state bank, state trust company,\nsavings and loan association, federally chartered credit union doing business in\nColorado, credit union chartered by the state of Colorado, national bank, broker-dealer, mutual fund, insurance company, or other similar financial entity qualified to\ndo business in the state of Colorado."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          entity_is_state_bank
          or entity_is_state_trust_company
          or entity_is_savings_and_loan_association
          or entity_is_federally_chartered_credit_union_doing_business_in_colorado
          or entity_is_credit_union_chartered_by_colorado
          or entity_is_national_bank
          or entity_is_broker_dealer
          or entity_is_mutual_fund
          or entity_is_insurance_company
          or entity_is_other_similar_financial_entity_qualified_to_do_business_in_colorado
