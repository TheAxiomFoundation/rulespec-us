format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-26-727
  summary: |-
    Motor-vehicle sales to either Ute tribe, or to an enrolled member residing on a reservation, are exempt when the vehicle is registered to an address on a reservation. The stated purpose includes continuing the practice of not requiring delivery of a motor vehicle.
  deferred_outputs:
    - output: us-co:statutes/39/39-26-727/d#motor_vehicle_delivery_requirement
      reason: Subsection (1)(d) is a legislative purpose clause and does not itself establish an executable delivery condition or exemption formula.
rules:
  - name: motor_vehicle_sale_exempt_from_sales_tax
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Day
    source: 39-26-727(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-26-727
              excerpt: "All sales of motor vehicles to the Southern Ute Indian Tribe or Ute Mountain Ute Tribe, or to an enrolled member of either tribe who resides on a reservation, are exempt"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-26-727
              excerpt: "if the motor vehicle is to be registered to an address on a reservation"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          motor_vehicle_is_registered_to_an_address_on_a_reservation
          and (
            purchaser_is_southern_ute_indian_tribe
            or purchaser_is_ute_mountain_ute_tribe
            or (
              purchaser_is_enrolled_member_of_either_ute_tribe
              and purchaser_resides_on_a_reservation
            )
          )
