format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-543
  summary: "\u201CA landowner with a federal taxable income at or below one hundred\
    \ twenty thousand dollars ... as adjusted for inflation and rounded to the nearest\
    \ hundred dollars\u201D is allowed a wildfire-mitigation income-tax credit. For\
    \ 2023\u20132024, the credit is twenty-five percent of up to two thousand five\
    \ hundred dollars in costs, capped at six hundred twenty-five dollars. For 2025\u2013\
    2027, the credit equals costs up to one thousand dollars. Excess credit is neither\
    \ refundable nor carried forward."
  deferred_outputs:
  - output: us-co:statutes/39/39-22-543/1#tax_expenditure_reimbursement_purpose
    reason: The legislative purpose clause is non-operative and does not independently
      determine a credit amount or eligibility condition.
  - output: us-co:statutes/39/39-22-543/a#costs
    reason: Computing the statutory costs definition requires transaction-level classification
      of third-party payments, documentation, grants, tangible personal property,
      and excluded contributions or incentives; the credit therefore consumes costs
      already determined under subsection (2)(a).
  - output: us-co:statutes/39/39-22-543/b#inflation
    reason: The annual Denver-Aurora-Lakewood consumer-price-index percentage requires
      external Bureau of Labor Statistics index observations; the executable income
      limit consumes a cumulative inflation factor derived from those observations.
  - output: us-co:statutes/39/39-22-543/c#landowner
    reason: The complete definition requires property-title, land-interest, entity-form,
      dwelling, and residential-occupancy facts; the credit uses a boundary predicate
      that the claimant satisfies subsection (2)(c).
  - output: us-co:statutes/39/39-22-543/d#wildfire_mitigation_measures
    reason: Classification requires activity-specific facts and compliance with Colorado
      state forest service standards or other applicable state rules; qualifying costs
      are supplied only after that classification.
  - output: us-co:statutes/39/39-22-543#income_limit_rounding_increment
    reason: Generated rule used a local name that collides with a sibling RuleSpec
      export. This output is deferred until it can be encoded with a semantic branch-specific
      name without creating ambiguous sibling imports.
  - output: us-co:statutes/39/39-22-543#inflation_adjusted_federal_taxable_income_limit
    reason: Generated rule depends on an output that validation deferred because it
      flattened thresholded, capped, base-limited, or cross-referenced mechanics,
      or borrowed an unrelated same-named section term.
  - output: us-co:statutes/39/39-22-543#wildfire_mitigation_credit_allowed
    reason: Generated rule depends on an output that validation deferred because it
      flattened thresholded, capped, base-limited, or cross-referenced mechanics,
      or borrowed an unrelated same-named section term.
  - output: us-co:statutes/39/39-22-543#wildfire_mitigation_credit_before_tax_liability
    reason: Generated rule depends on an output that validation deferred because it
      flattened thresholded, capped, base-limited, or cross-referenced mechanics,
      or borrowed an unrelated same-named section term.
