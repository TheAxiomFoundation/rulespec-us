format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-108
  summary: |-
    Federal taxable income shall be deemed to be from sources in another state in the same ratio as the modified federal adjusted gross income is from sources in such state.
  deferred_outputs:
    - output: us-co:statutes/39/39-22-108#credit_against_colorado_income_tax
      reason: Computing the credit requires jurisdiction-indexed accrued taxes and separately limited credits across multiple other jurisdictions.
    - output: us-co:statutes/39/39-22-108/a#per_jurisdiction_credit_limitation
      reason: The limitation applies separately to federal taxable income and tax accrued in each other jurisdiction; no jurisdiction-indexed relation is available.
    - output: us-co:statutes/39/39-22-108/b#aggregate_credit_limitation
      reason: The aggregate limitation depends on the total credit computed across other jurisdictions.
    - output: us-co:statutes/39/39-22-108/3#redetermined_tax_after_other_jurisdiction_tax_change
      reason: Redetermination requires the affected credits and the refund or collection mechanics referenced in section 39-21-108, whose copied context is deferred.
    - output: us-co:statutes/39/39-22-108/4#credit_accrual_year
      reason: The source assigns the credit to an accrual year, but this RuleSpec slice has no date-valued output type for that assignment.
    - output: us-co:statutes/39/39-22-108/5#credit_allowed_after_required_information_furnished
      reason: This administrative furnishing condition gates the deferred credit computation.
rules:
  - name: federal_taxable_income_deemed_from_other_jurisdiction
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 39-22-108(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-108
              excerpt: Federal taxable income shall be deemed to be from sources in another state in the same ratio as the modified federal adjusted gross income.
    versions:
      - effective_from: '1987-01-01'
        formula: |-
          federal_taxable_income
          * modified_federal_adjusted_gross_income_from_other_jurisdiction
          / modified_federal_adjusted_gross_income
