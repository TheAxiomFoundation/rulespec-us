format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-21-304
  summary: |-
    On and after January 1, 2021, bills creating or extending tax expenditures must include a tax preference performance statement; new expenditures require a specified repeal period and extensions require a specified period, not an indefinite period.
rules:
  - name: tax_expenditure_bill_includes_performance_statement
    kind: derived
    entity: Bill
    dtype: Judgment
    period: Year
    source: C.R.S. 39-21-304(1)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-21-304
    versions:
      - effective_from: '2021-01-01'
        formula: |-
          (not bill_creates_new_tax_expenditure and not bill_extends_expiring_tax_expenditure)
          or bill_includes_tax_preference_performance_statement

  - name: expiring_tax_expenditure_extension_updates_performance_statement
    kind: derived
    entity: Bill
    dtype: Judgment
    period: Year
    source: C.R.S. 39-21-304(1)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-21-304
    versions:
      - effective_from: '2021-01-01'
        formula: |-
          not bill_extends_expiring_tax_expenditure
          or (
            (not tax_preference_performance_statement_was_earlier_included
            and bill_includes_tax_preference_performance_statement)
            or (
              tax_preference_performance_statement_was_earlier_included
              and bill_amends_earlier_performance_statement_with_updated_information
            )
          )

  - name: new_tax_expenditure_performance_statement_states_legislative_purpose
    kind: derived
    entity: Bill
    dtype: Judgment
    period: Year
    source: C.R.S. 39-21-304(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-21-304
    versions:
      - effective_from: '2021-01-01'
        formula: |-
          not bill_creates_new_tax_expenditure
          or (
            bill_includes_tax_preference_performance_statement
            and performance_statement_indicates_general_legislative_purpose_category
          )

  - name: tax_expenditure_performance_statement_includes_effectiveness_metrics
    kind: derived
    entity: Bill
    dtype: Judgment
    period: Year
    source: C.R.S. 39-21-304(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-21-304
    versions:
      - effective_from: '2021-01-01'
        formula: |-
          (not bill_creates_new_tax_expenditure and not bill_extends_expiring_tax_expenditure)
          or (
            bill_includes_tax_preference_performance_statement
            and performance_statement_includes_clear_relevant_ascertainable_metrics_and_data_requirements
          )

  - name: tax_expenditure_bill_has_specified_nonindefinite_duration
    kind: derived
    entity: Bill
    dtype: Judgment
    period: Year
    source: C.R.S. 39-21-304(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-21-304
    versions:
      - effective_from: '2021-01-01'
        formula: |-
          (
            not bill_creates_new_tax_expenditure
            and not bill_extends_expiring_tax_expenditure
          )
          or (
            (
              bill_creates_new_tax_expenditure
              and new_tax_expenditure_repealed_after_specified_tax_year_period
            )
            or (
              bill_extends_expiring_tax_expenditure
              and expiring_tax_expenditure_extended_for_specified_tax_year_period
            )
          )
          and not tax_expenditure_established_for_indefinite_period
