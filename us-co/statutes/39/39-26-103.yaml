format: rulespec/v1
module:
  status: deferred
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-26-103
  summary: |-
    “It is unlawful for any person to engage in the business of selling at retail without first having obtained a license therefor.” Each licensee remaining in retail business or liable to account for the tax must timely renew the license. The section also governs separate-place licenses, location-code relief, license contents and revocation, wholesalers, charitable organizations, singular and special sales events, occasional sales, fees, and fee adjustments.
  deferred_outputs:
    - output: us-co:statutes/39/39-26-103/b#retail_license_renewal_required
      reason: >-
        39-26-103(b) requires renewal based on license issuance or renewal timing,
        continued retail business, or liability to account for the tax provided in
        part 1. A faithful executable rule requires license-record and tax-liability
        entities and temporal relations not established by the available RuleSpec
        context.
    - output: us-co:statutes/39/39-26-103/b#location_code
      reason: >-
        39-26-103(b) of subsection (2.5) defines a location code through the
        department-assigned geographic region and the local sales taxes a retailer
        must collect and remit. The referenced collection-and-remittance mechanics
        in sections 39-26-105 and 39-26-118 are unavailable, and the schema context
        supplies no executable retailer-location-code relation.
    - output: us-co:statutes/39/39-26-103/b#singular_sales_event_retail_license_application_available
      reason: >-
        39-26-103(b) of subsection (9) authorizes a person conducting a singular
        sales event to apply for a temporary retail license, but the source does not
        define “singular sales event” or a computable entitlement determination,
        and the available context provides no sales-event application entity.
