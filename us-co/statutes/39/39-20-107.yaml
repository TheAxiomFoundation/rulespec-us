format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-20-107
  summary: |-
    A certificate of release or partial discharge issued under section 39-20-104 conclusively extinguishes the state's lien on the property released therein.
rules:
  - name: state_lien_on_released_property_is_extinguished
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-20-107
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-20-107
              excerpt: "A certificate of release or of partial discharge issued under section 39-20-104 shall be held conclusive that the lien of the state of Colorado upon the property released therein is extinguished."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          certificate_of_release_or_partial_discharge_has_been_issued
