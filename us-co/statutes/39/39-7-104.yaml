format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-7-104
  summary: |-
    If an owner or operator of producing or capable oil or gas property fails or refuses to file the required statement, the assessor shall list and value the property using the best available and obtainable information.
rules:
  - name: assessor_listing_and_valuation_duty_is_satisfied
    kind: derived
    entity: Assessor
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-7-104
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-7-104
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (not person_owns_or_operates_oil_or_gas_leaseholds_or_lands)
          or (not leaseholds_or_lands_are_producing_or_capable_of_producing_oil_or_gas_on_assessment_date)
          or (not person_fails_or_refuses_to_file_required_statement)
          or assessor_lists_and_values_property_using_best_available_and_obtainable_information
