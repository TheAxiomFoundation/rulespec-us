format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-3-138
  summary: |-
    An electric vehicle charging system is exempt from property tax for property tax years commencing on and after January 1, 2023, but before January 1, 2030.
rules:
  - name: electric_vehicle_charging_system_property_tax_exemption_applies
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. 39-3-138
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-3-138
              excerpt: "an electric vehicle charging system, as defined in section 38-12-601 (6)(a), is exempt"
          - path: versions[0].formula
            kind: effective_period
            source:
              corpus_citation_path: us-co/statute/39/39-3-138
              excerpt: "commencing on and after January 1, 2023, but before January 1, 2030"
    versions:
      - effective_from: '2023-01-01'
        formula: |-
          asset_is_electric_vehicle_charging_system
          and taxable_year_is_in_temporary_effective_window
