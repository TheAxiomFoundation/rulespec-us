format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-27-302
  summary: |-
    The department may enter a cooperative agreement with jurisdictions providing for administration, collection, and enforcement of motor fuel taxes and fees; the agreement shall not exempt compliance with this state's motor-vehicle laws, rules, and regulations.
rules:
  - name: department_may_enter_motor_fuel_tax_and_fee_cooperative_agreement
    kind: derived
    entity: Department
    dtype: Judgment
    period: Year
    source: C.R.S. 39-27-302
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-27-302
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          cooperative_agreement_is_with_another_jurisdiction
          and cooperative_agreement_provides_for_administration_collection_and_enforcement_of_motor_fuel_taxes_and_fees

  - name: cooperative_agreement_complies_with_motor_vehicle_law_nonexemption_requirement
    kind: derived
    entity: CooperativeAgreement
    dtype: Judgment
    period: Year
    source: C.R.S. 39-27-302
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-27-302
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not agreement_exempts_motor_vehicle_owner_or_operator_from_state_motor_vehicle_law_compliance
