format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-3-118.5
  summary: |-
    Business personal property is exempt until first used in the business after acquisition. For the 2021 property tax year, a county, municipality, or special district may exempt up to one hundred percent of business personal property.
rules:
  - name: business_personal_property_exempt_before_first_business_use
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-3-118.5(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: effective_period
            source:
              corpus_citation_path: us-co/statute/39/39-3-118.5
              excerpt: "property tax years commencing on and after January 1, 1996"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-3-118.5
              excerpt: "business personal property shall be exempt ... until such business personal property is first used in the business after acquisition"
    versions:
      - effective_from: '1996-01-01'
        formula: |-
          asset_is_business_personal_property
          and not business_personal_property_has_been_first_used_in_business_after_acquisition
  - name: local_government_business_personal_property_exemption_maximum_rate
    kind: parameter
    dtype: Rate
    source: Colo. Rev. Stat. § 39-3-118.5(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-3-118.5
              excerpt: "up to one hundred percent"
    versions:
      - effective_from: '2021-01-01'
        formula: |-
          1
  - name: local_government_business_personal_property_exemption_rate_cap
    kind: derived
    entity: LocalGovernment
    dtype: Rate
    period: Year
    source: Colo. Rev. Stat. § 39-3-118.5(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-3-118.5
              excerpt: "For the property tax year commencing on January 1, 2021, any county, municipality, or special district may exempt"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-3-118.5
              excerpt: "up to one hundred percent of any business personal property"
    versions:
      - effective_from: '2021-01-01'
        formula: |-
          if local_government_is_county_municipality_or_special_district and tax_year_is_authorized_exemption_year: local_government_business_personal_property_exemption_maximum_rate else: 0
