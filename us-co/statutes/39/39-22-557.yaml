format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-557
  summary: |-
    For income tax years commencing on or after January 1, 2024, but before January 1, 2033, the credit is one dollar per kilogram for tier one clean hydrogen qualified use and thirty-three cents per kilogram for tier two use. Certificates are subject to annual per-taxpayer limits.
  deferred_outputs:
    - output: us-co:statutes/39/39-22-557/1/a#tax_credit_legislative_purpose
      reason: Legislative declaration and purpose clause is non-operative.
    - output: us-co:statutes/39/39-22-557/b#department_definition
      reason: Institutional definition does not create a computable RuleSpec output.
    - output: us-co:statutes/39/39-22-557/d#lifecycle_greenhouse_gas_emissions_rate
      reason: The definition depends on federal law and public-utilities-commission rules not supplied as executable RuleSpec context.
    - output: us-co:statutes/39/39-22-557/e#office_definition
      reason: Institutional definition does not create a computable RuleSpec output.
    - output: us-co:statutes/39/39-22-557/g#taxpayer_definition
      reason: The definition depends on tax-exemption provisions not supplied as executable RuleSpec context.
    - output: us-co:statutes/39/39-22-557/h#tier_one_greenhouse_gas_emissions_rate
      reason: The tier-one range is defined by unavailable federal law.
    - output: us-co:statutes/39/39-22-557/b#office_reporting_and_database_duties
      reason: Administrative database, reporting, and standards duties are not computable taxpayer outputs.
    - output: us-co:statutes/39/39-22-557/3#clean_hydrogen_income_tax_credit
      reason: Computing the credit requires unavailable definitions of clean hydrogen, qualified use, and tier greenhouse-gas-emissions rates, plus an office-issued certificate.
      source_values:
        - us-co:statutes/39/39-22-557#tier_one_credit_rate
        - us-co:statutes/39/39-22-557#tier_two_credit_rate
        - us-co:statutes/39/39-22-557#initial_certificate_credit_cap
        - us-co:statutes/39/39-22-557#middle_certificate_credit_cap
        - us-co:statutes/39/39-22-557#final_certificate_credit_cap
    - output: us-co:statutes/39/39-22-557/4#tax_credit_certificate
      reason: Certificate eligibility and application processing require unavailable clean-hydrogen and qualified-use definitions.
    - output: us-co:statutes/39/39-22-557/5#claimable_clean_hydrogen_credit
      reason: Claimable amount is the amount on an office-issued tax credit certificate, whose eligibility is not executable from supplied context.
    - output: us-co:statutes/39/39-22-557/6#refundable_clean_hydrogen_credit_excess
      reason: Refundable excess depends on the unavailable certificate-based credit amount and income-tax-due computation.
    - output: us-co:statutes/39/39-22-557/7#clean_hydrogen_credit_repeal_effect
      reason: Repeal date is legal timing metadata rather than a runtime-computable output.
rules:
  - name: tier_one_credit_rate
    kind: parameter
    dtype: Money
    unit: USD
    source: 39-22-557(3)(a)(I)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-557
              excerpt: "One dollar per kilogram"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          1
  - name: tier_two_credit_rate
    kind: parameter
    dtype: Money
    unit: USD
    source: 39-22-557(3)(a)(II)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-557
              excerpt: "Thirty-three cents per kilogram"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          0.33
  - name: initial_certificate_credit_cap
    kind: parameter
    dtype: Money
    unit: USD
