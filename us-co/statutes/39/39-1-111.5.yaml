format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-1-111.5
  summary: |-
    “The net mill levy ... must be the gross mill levy less the temporary property tax credit or temporary mill levy rate reduction.” Upon receipt of a tax warrant reflecting such a credit or reduction, the treasurer collects taxes based on the local government's net adjusted mill levy.
rules:
  - name: net_adjusted_mill_levy
    kind: derived
    entity: LocalGovernment
    dtype: Rate
    period: Year
    source: C.R.S. 39-1-111.5(2), (5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-1-111.5
              excerpt: "the net mill levy, which must be the gross mill levy less the temporary property tax credit or temporary mill levy rate reduction"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          gross_mill_levy - temporary_property_tax_credit_or_mill_levy_rate_reduction_in_mill_equivalents
