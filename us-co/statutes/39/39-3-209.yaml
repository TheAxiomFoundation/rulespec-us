format: rulespec/v1
imports:
  - us-co:statutes/39/39-22-627#excess_state_revenues
  - us-co:statutes/39/39-22-627#reimbursement_for_property_tax_exemptions
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-3-209
  summary: |-
    For state fiscal years commencing on or after July 1, 2017, when state revenues exceed the excess state revenues cap and must be refunded, the lesser of property-tax-exemption reimbursement and required excess state revenues is a refund of excess state revenues.
rules:
  - name: property_tax_exemption_reimbursement_refund_condition
    kind: derived
    entity: StateFiscalYear
    dtype: Judgment
    period: Year
    source: 39-3-209(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-3-209
              excerpt: “state revenues ... exceed the excess state revenues cap ... and are required to be refunded”
    versions:
      - effective_from: '2017-07-01'
        formula: |-
          state_revenues_exceed_excess_state_revenues_cap
          and excess_state_revenues_are_required_to_be_refunded

  - name: property_tax_exemption_reimbursement_refunded_as_excess_state_revenues
    kind: derived
    entity: StateFiscalYear
    dtype: Money
    period: Year
    unit: USD
    source: 39-3-209(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-3-209
              excerpt: “the lesser of all reimbursement ... or an amount ... equal to the amount of excess state revenues”
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:statutes/39/39-22-627#excess_state_revenues
              output: excess_state_revenues
              hash: sha256:8097733ee3df4fee3c08bfbf732e03083864b97a089605906dffc3a64e9a2dc0
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:statutes/39/39-22-627#reimbursement_for_property_tax_exemptions
              output: reimbursement_for_property_tax_exemptions
              hash: sha256:8097733ee3df4fee3c08bfbf732e03083864b97a089605906dffc3a64e9a2dc0
    versions:
      - effective_from: '2017-07-01'
        formula: |-
          if property_tax_exemption_reimbursement_refund_condition:
            min(reimbursement_for_property_tax_exemptions, excess_state_revenues)
          else: 0
