format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-6-111.5
  summary: |-
    All producing and nonproducing mines valued pursuant to this article shall follow the personal-property schedule for notices and valuation appeals.
rules:
  - name: personal_property_valuation_notice_and_appeal_schedule_applies_to_mine
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. 39-6-111.5
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-6-111.5
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          mine_is_valued_pursuant_to_this_article
          and (mine_is_producing or mine_is_nonproducing)
