format: rulespec/v1
imports:
  - us-co:statutes/39/39-11-128#tax_deed_notice_procedure_applies
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-11-131
  summary: |-
    “Any number of tracts or parcels of land not exceeding twenty-five” may be included in one tax-deed notice. The taxed or specially assessed person's name must be prominently displayed when all certificates in the single notice or request are held by one person or jointly held by more than one person.
  deferred_outputs:
    - output: us-co:statutes/39/39-11-131#multiple_tract_tax_deed_request_permitted
      reason: The source conditions a single request on notice, service, and request conformity with section 39-11-128 in other respects; copied context does not export that complete conformity determination.
rules:
  - name: maximum_tracts_or_parcels_in_single_notice
    kind: parameter
    dtype: Count
    source: C.R.S. 39-11-131
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-11-131
              excerpt: "tracts or parcels of land not exceeding twenty-five"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          25

  - name: multiple_tract_tax_deed_notice_permitted
    kind: derived
    entity: TaxDeedRequest
    dtype: Judgment
    period: Day
    source: C.R.S. 39-11-131
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-11-131
              excerpt: "may be included and described in one notice of application for tax deed"
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-11-131
              excerpt: "not exceeding twenty-five"
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:statutes/39/39-11-128#tax_deed_notice_procedure_applies
              output: tax_deed_notice_procedure_applies
              hash: sha256:39592af8a7202110e4c1466dee25c7051257b67622041112058234649f061703
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          tax_deed_notice_procedure_applies
          and number_of_tracts_or_parcels_in_notice <= maximum_tracts_or_parcels_in_single_notice

  - name: single_notice_must_prominently_display_taxed_person_name
    kind: derived
    entity: TaxDeedRequest
    dtype: Judgment
    period: Day
    source: C.R.S. 39-11-131
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-11-131
              excerpt: "if all certificates so sought to be included in a single notice or request are held by but one person, or jointly held by more than one person"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-11-131
              excerpt: "shall be prominently displayed in said notice at or near the beginning thereof"
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:statutes/39/39-11-128#tax_deed_notice_procedure_applies
              output: tax_deed_notice_procedure_applies
              hash: sha256:39592af8a7202110e4c1466dee25c7051257b67622041112058234649f061703
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          tax_deed_notice_procedure_applies
          and number_of_tracts_or_parcels_in_notice <= maximum_tracts_or_parcels_in_single_notice
          and certificates_in_single_notice_are_held_by_one_person_or_jointly_held
