format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-5201
  summary: |-
    “Health-care coverage affordability program” means a medical assistance program, the Children's Basic Health Plan Act, or a qualifying exchange health benefit plan.
rules:
  - name: health_care_coverage_affordability_program
    kind: derived
    entity: HealthCareCoverageAffordabilityProgram
    dtype: Judgment
    period: Year
    source: C.R.S. 39-22-5201(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-22-5201
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          is_medical_assistance_program_under_colorado_medical_assistance_act
          or is_childrens_basic_health_plan_act_program
          or is_exchange_health_benefit_plan_with_premium_tax_credits_or_cost_sharing_reductions_available
