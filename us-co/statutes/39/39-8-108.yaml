      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/statute/39/39-8-108
          excerpt: Such appeal or submission to arbitration shall be taken no later
            than thirty days
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-8-108
