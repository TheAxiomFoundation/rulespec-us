format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-8-108
  summary: An appeal or submission to arbitration must be taken no later than thirty
    days after denial was mailed. Upon a properly supported request, the respondent
    shall provide supporting valuation data two working days before an appeal hearing.
    An arbitration decision is final and not subject to review, and no pending valuation
    has a presumption in an authorized appeal or arbitration.
  deferred_outputs:
  - output: us-co:statutes/39/39-8-108#valuation_adjustment_above_county_board_cap_complies
    reason: The five-percent valuation limitation contains an exception specifically
      permitted by section 39-5-125, whose operative exception mechanics are unavailable.
rules:
- name: appeal_or_arbitration_deadline_days
  kind: parameter
  dtype: Count
  period: Day
  source: "C.R.S. \xA7 39-8-108(1)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-8-108
          excerpt: no later than thirty days after the date such denial was mailed
  versions:
  - effective_from: '0001-01-01'
    formula: '30'
- name: respondent_data_disclosure_advance_working_days
