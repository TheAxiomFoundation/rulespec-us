        kind: condition
        source:
          corpus_citation_path: us-co/statute/39/39-8-108
          excerpt: Upon request, the respondent shall make available to the taxpayer
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-8-108
