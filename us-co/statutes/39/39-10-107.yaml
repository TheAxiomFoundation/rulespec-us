format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-10-107
  summary: |-
    A treasurer may distribute monthly collections quarterly when the amount is less than one hundred dollars, or annually when it is less than fifty dollars. Before distribution, taxes are reduced by treasurer and assessor costs and, except for a city and county, unreturned pro rata tax refunds.
rules:
  - name: quarterly_distribution_threshold
    kind: parameter
    dtype: Money
    unit: USD
    source: C.R.S. 39-10-107(1)(a)(I)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-10-107
              excerpt: "equals less than one hundred dollars"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          100

  - name: annual_distribution_threshold
    kind: parameter
    dtype: Money
    unit: USD
    source: C.R.S. 39-10-107(1)(a)(II)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-10-107
              excerpt: "equals less than fifty dollars"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          50

  - name: quarterly_distribution_may_be_elected
    kind: derived
    entity: CountyTaxRecipient
    dtype: Judgment
    period: Month
    source: C.R.S. 39-10-107(1)(a)(I)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-10-107
              excerpt: "If the amount of taxes collected for the month equals less than one hundred dollars"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-10-107
              excerpt: "one hundred dollars"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          taxes_collected_for_recipient < quarterly_distribution_threshold

  - name: annual_distribution_may_be_elected
    kind: derived
    entity: CountyTaxRecipient
    dtype: Judgment
    period: Month
    source: C.R.S. 39-10-107(1)(a)(II)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-10-107
              excerpt: "If the amount of taxes collected for the month equals less than fifty dollars"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-10-107
              excerpt: "fifty dollars"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          taxes_collected_for_recipient < annual_distribution_threshold

  - name: distributable_taxes_after_required_reductions
    kind: derived
    entity: CountyTaxRecipient
    dtype: Money
    unit: USD
    period: Month
    source: C.R.S. 39-10-107(1)(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-10-107
              excerpt: "all taxes collected by the treasurer shall be reduced by an amount equal to the costs incurred by the treasurer and the assessor"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-10-107
              excerpt: "this requirement to reduce taxes shall not apply to a city and county"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          max(0, taxes_collected_for_recipient - treasurer_and_assessor_costs - (if recipient_is_city_and_county: 0 else: unreturned_pro_rata_tax_refunds))
