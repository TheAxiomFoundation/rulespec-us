format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-2-123
  summary: |-
    The board consists of three members serving staggered four-year terms; up to six additional members may serve one-state-fiscal-year terms. Members receive one hundred fifty dollars per diem, limited to two hundred twenty days per calendar year and payable only for specified board sessions or hearings.
  deferred_outputs:
    - output: us-co:statutes/39/39-2-123#board_member_annual_per_diem_compensation
      reason: Calculation requires determining whether each compensated day is a board session day or a hearing conducted pursuant to section 39-2-127, for which no copied RuleSpec dependency is available.
      source_values:
        - us-co:statutes/39/39-2-123#board_member_per_diem_compensation
        - us-co:statutes/39/39-2-123#board_member_maximum_compensable_days_per_calendar_year
rules:
  - name: regular_board_member_count
    kind: parameter
    dtype: Count
    source: C.R.S. § 39-2-123(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-2-123
              excerpt: "The board consists of three members"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          3

  - name: regular_board_member_term_years
    kind: parameter
    dtype: Count
    source: C.R.S. § 39-2-123(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-2-123
              excerpt: "Appointments to the board shall be for\nterms of four years"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          4

  - name: maximum_additional_board_member_count
    kind: parameter
    dtype: Count
    source: C.R.S. § 39-2-123(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-2-123
              excerpt: "up to six additional members may be appointed"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          6

  - name: additional_board_member_term_state_fiscal_years
    kind: parameter
    dtype: Count
    source: C.R.S. § 39-2-123(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-2-123
              excerpt: "terms of one state fiscal year each"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1

  - name: agricultural_engagement_lookback_years
    kind: parameter
    dtype: Count
    source: C.R.S. § 39-2-123(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-2-123
              excerpt: "within the five years\nimmediately preceding the date of initial appointment"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          5

  - name: board_member_per_diem_compensation
    kind: parameter
    dtype: Money
    unit: USD
    period: Day
    source: C.R.S. § 39-2-123(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-2-123
              excerpt: "members of\nthe board shall be compensated one hundred fifty dollars per diem"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          150

  - name: board_member_maximum_compensable_days_per_calendar_year
    kind: parameter
    dtype: Count
    period: Year
    source: C.R.S. § 39-2-123(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-2-123
              excerpt: "Per diem compensation not to exceed two hundred twenty days in any\ncalendar year"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          220
