format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-28-304
  summary: |-
    A nonresident or foreign nonparticipating manufacturer not registered to do business in the state must appoint and continually engage a state process agent as a condition precedent to directory listing or retention. Required advance and post-termination notices apply, and sale without the required agent deems the secretary of state appointed without satisfying that directory condition.
rules:
  - name: unregistered_nonresident_or_foreign_manufacturer_meets_directory_process_agent_condition
    kind: derived
    entity: Business
    dtype: Judgment
    period: Month
    source: Colo. Rev. Stat. § 39-28-304(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-28-304
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          manufacturer_is_nonresident_or_foreign_nonparticipating
          and not manufacturer_is_registered_to_do_business_as_foreign_corporation_or_business_entity
          and state_process_agent_is_appointed_and_continuously_engaged_without_interruption
          and agent_name_address_phone_and_appointment_and_availability_proof_is_satisfactory_to_executive_director_and_attorney_general

  - name: planned_agent_termination_advance_notice_and_replacement_proof_requirements_met
    kind: derived
    entity: Business
    dtype: Judgment
    period: Month
    source: Colo. Rev. Stat. § 39-28-304(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-28-304
              excerpt: "at least thirty calendar days prior to termination"
          - path: versions[0].formula
            kind: ordering
            source:
              corpus_citation_path: us-co/statute/39/39-28-304
              excerpt: "at least five calendar days prior to the termination"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          agent_authority_is_planned_to_terminate
          and executive_director_and_attorney_general_receive_notice_at_least_thirty_calendar_days_before_termination
          and new_agent_appointment_proof_is_satisfactory_to_attorney_general_at_least_five_calendar_days_before_existing_appointment_termination

  - name: terminated_agent_notice_and_replacement_proof_requirements_met
    kind: derived
    entity: Business
    dtype: Judgment
    period: Month
    source: Colo. Rev. Stat. § 39-28-304(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-28-304
              excerpt: "notify the executive director and the attorney general of the termination within five calendar days"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-28-304
              excerpt: "shall include proof ... of the appointment of a new agent"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          agent_has_terminated_agency_appointment
          and executive_director_and_attorney_general_are_notified_of_agent_termination_within_five_calendar_days
          and new_agent_appointment_proof_is_satisfactory_to_attorney_general_after_agent_termination

  - name: secretary_of_state_is_deemed_process_agent_for_unappointed_manufacturer
    kind: derived
    entity: Business
    dtype: Judgment
    period: Month
    source: Colo. Rev. Stat. § 39-28-304(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-28-304
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          manufacturer_products_are_sold_in_state
          and manufacturer_has_not_appointed_or_designated_required_process_agent

  - name: secretary_of_state_appointment_does_not_satisfy_directory_process_agent_condition
    kind: derived
    entity: Business
    dtype: Judgment
    period: Month
    source: Colo. Rev. Stat. § 39-28-304(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-28-304
              excerpt: "shall not satisfy the condition precedent to having the nonparticipating manufacturer's brand families listed or retained in the directory"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          manufacturer_products_are_sold_in_state
          and manufacturer_has_not_appointed_or_designated_required_process_agent
