format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-6-101
  summary: |-
    “Mine means one or more mining claims or acres of other land” including specified excavations, improvements, and appurtenant rights; “Mining claims means lode, placer, millsite, and tunnelsite claims”; “Other land means any parcel of real property which is not a mining claim.” Ore excludes substances “specifically excluded under section 39-6-104.”
  deferred_outputs:
    - output: us-co:statutes/39/39-6-101#ore
      reason: The definition of ore depends on exclusions specifically identified under section 39-6-104, which is not available in copied RuleSpec context.
rules:
  - name: mining_claim
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-6-101(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-6-101
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_lode_claim
          or asset_is_placer_claim
          or asset_is_millsite_claim
          or asset_is_tunnelsite_claim
  - name: other_land
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-6-101(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-6-101
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_real_property
          and not mining_claim
  - name: mine
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-6-101(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-6-101
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (mining_claim or other_land)
          and asset_includes_excavations_from_which_ores_metals_or_mineral_substances_are_removed
          and asset_includes_mining_improvements_within_such_excavations
          and asset_includes_appurtenant_rights_and_privileges
          and not asset_is_drilled_well_producing_sulfur_oil_gas_or_other_liquid_or_gaseous_hydrocarbons
