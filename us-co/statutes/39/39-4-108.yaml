    corpus_citation_path: us-co/statute/39/39-4-108
  summary: |-
    Public utilities, assessors, and boards of county commissioners may petition the administrator by July 15 regarding valuation or apportionment errors. The administrator must provide notice, hear petitions, decide by August 1, correct granted petitions, charge hearing costs for denied petitions, and direct further proceedings to the board of assessment appeals or Denver district court.
  deferred_outputs:
    - output: us-co:statutes/39/39-4-108#public_utility_valuation_petition_process
      reason: The provision establishes an administrative petition, notice, hearing, decision, correction, cost-allocation, and review process involving multiple actors and petition-specific procedural events that cannot be represented faithfully with the supported scalar entity and period schema.
