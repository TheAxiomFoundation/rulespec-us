format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-11-150
  summary: |-
    Where surface estate ownership is coterminous with a severed mineral interest, the surface owner has a right of first refusal and may pay all delinquent taxes in lieu of tax-sale proceeds. Notice must be mailed at least ten days before sale, and the right may be exercised until two days before sale.
  deferred_outputs:
    - output: us-co:statutes/39/39-11-150#tax_deed_recovery_action_is_timely
      reason: The recovery-action limitation incorporates the time period in section 39-12-101, which is not available in copied RuleSpec context.
rules:
  - name: minimum_notice_days_before_tax_lien_sale
    kind: parameter
    dtype: Count
    period: Day
    source: C.R.S. § 39-11-150
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-11-150
              excerpt: "at least ten days prior to the sale"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10

  - name: first_refusal_exercise_deadline_days_before_sale
    kind: parameter
    dtype: Count
    period: Day
    source: C.R.S. § 39-11-150
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-11-150
              excerpt: "until two days prior to the sale"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          2

  - name: surface_owner_has_severed_mineral_interest_first_refusal_right
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Day
    source: C.R.S. § 39-11-150
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-11-150
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          surface_estate_ownership_is_coterminous_with_severed_mineral_interest

  - name: surface_owner_may_pay_delinquent_mineral_interest_taxes_in_lieu_of_sale_proceeds
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Day
    source: C.R.S. § 39-11-150
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-11-150
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          surface_estate_ownership_is_coterminous_with_severed_mineral_interest

  - name: treasurer_provides_timely_first_refusal_notice
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Day
    source: C.R.S. § 39-11-150
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: ordering
            source:
              corpus_citation_path: us-co/statute/39/39-11-150
              excerpt: "by mail, at his last-known address ... at least ten days prior"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-11-150
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          surface_estate_ownership_is_coterminous_with_severed_mineral_interest
          and notice_mailed_to_surface_owner_last_known_address
          and days_before_tax_lien_sale >= minimum_notice_days_before_tax_lien_sale

  - name: surface_owner_may_exercise_first_refusal_before_sale
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Day
    source: C.R.S. § 39-11-150
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: ordering
            source:
              corpus_citation_path: us-co/statute/39/39-11-150
              excerpt: "until two days prior to the sale"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-11-150
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          surface_estate_ownership_is_coterminous_with_severed_mineral_interest
          and days_before_tax_lien_sale >= first_refusal_exercise_deadline_days_before_sale

  - name: severed_mineral_interest_tax_lien_is_sold_after_first_refusal_not_exercised
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Day
    source: C.R.S. § 39-11-150
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-11-150
              excerpt: "If the surface owner does not exercise his right of first refusal, the tax lien ... shall be sold."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          surface_estate_ownership_is_coterminous_with_severed_mineral_interest
          and not surface_owner_exercises_first_refusal
