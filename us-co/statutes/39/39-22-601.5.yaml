format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-601.5
  summary: |-
    “A taxpayer shall report and pay any tax due ... no later than one hundred eighty days after the final determination date.” “No later than ninety days after the final determination date, the partnership shall” file a federal adjustments report and notify direct partners. This section applies to final determination dates occurring on and after January 1, 2024.
  deferred_outputs:
    - output: us-co:statutes/39/39-22-601.5/a#administrative_adjustment_request
      reason: The definition depends on the federal filing classification under internal revenue code section 6227, which is unavailable as RuleSpec context.
    - output: us-co:statutes/39/39-22-601.5/b#audited_partnership
      reason: The legal entity classification depends on partnership-level audit and federal-adjustment records not representable by the available entity schema.
    - output: us-co:statutes/39/39-22-601.5/c#corporate_partner
      reason: The definition depends on tax liability under section 39-22-301, for which no executable RuleSpec context is available.
    - output: us-co:statutes/39/39-22-601.5/d#direct_partner
      reason: The definition requires a partnership-interest ownership relation not supplied by the available schema context.
    - output: us-co:statutes/39/39-22-601.5/e#exempt_partner
      reason: The definition depends on the exemption mechanics in section 39-22-112, which is unavailable as RuleSpec context.
    - output: us-co:statutes/39/39-22-601.5/f#federal_adjustment
      reason: The definition requires federal return item changes and Colorado taxable-income effects not supplied by an executable upstream source.
    - output: us-co:statutes/39/39-22-601.5/h#federal_partnership_representative
      reason: The definition depends on federal representative designation and appointment records under internal revenue code section 6223.
    - output: us-co:statutes/39/39-22-601.5/j#final_federal_adjustment
      reason: The definition requires calculation of the final determination date across federal audit, agreement, appeal, and filing events.
    - output: us-co:statutes/39/39-22-601.5/k#indirect_partner
      reason: The definition requires recursive ownership relations among partnerships and pass-through entities.
    - output: us-co:statutes/39/39-22-601.5/l#nonresident_partner
      reason: The definition requires resident-status classifications for individuals, estates, and trusts not defined in this source.
    - output: us-co:statutes/39/39-22-601.5/m#partner
      reason: The definition requires direct and indirect ownership relations not supplied by the available schema context.
    - output: us-co:statutes/39/39-22-601.5/n#partnership_level_audit
      reason: The definition requires federal audit-procedure records and resulting federal adjustments.
    - output: us-co:statutes/39/39-22-601.5/o#pass_through_entity
      reason: The definition depends on tax treatment under section 39-22-301, for which no executable RuleSpec context is available.
    - output: us-co:statutes/39/39-22-601.5/p#resident_partner
      reason: The definition requires resident-status classifications for individuals, estates, and trusts not defined in this source.
    - output: us-co:statutes/39/39-22-601.5/q#reviewed_year
      reason: The definition requires a partnership-level-audit record and its associated taxable year.
    - output: us-co:statutes/39/39-22-601.5/r#taxpayer
      reason: The definition combines person tax liability with audited-partnership, administrative-adjustment-request, and tiered-partner classifications unavailable as executable context.
    - output: us-co:statutes/39/39-22-601.5/7/b#federal_adjustments_report_uses
      reason: Reporting of claims for refund, credits, net operating losses, and partner-level tax effects depends on unavailable sections 39-21-108 and 39-22-104.
    - output: us-co:statutes/39/39-22-601.5/3/e#audited_partnership_in_lieu_payment_amount
      reason: The calculation depends on unavailable apportionment, sourcing, tax-rate, penalty, and interest authorities.
    - output: us-co:statutes/39/39-22-601.5/5#federal_adjustment_assessment_deadline
      reason: The assessment deadline depends on limitations-period calculations under section 39-21-107 and taxpayer filing events.
    - output: us-co:statutes/39/39-22-601.5/6#estimated_payment_credit_or_refund
      reason: The outcome depends on final Colorado tax liability, statutory interest, and refund procedures unavailable in this source slice.
