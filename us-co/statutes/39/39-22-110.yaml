format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-110
  summary: |-
    “A taxpayer filing a part-year resident return shall also file as a nonresident on the same return” for the remaining taxable-year portion when income in that portion is derived from Colorado sources. The part-year resident tax apportionment depends on federal adjusted gross income modified under section 39-22-104, with S corporation income apportioned under section 39-22-326.
  deferred_outputs:
    - output: us-co:statutes/39/39-22-110#part_year_resident_apportioned_income_tax
      reason: Computing the apportioned tax requires the unavailable section 39-22-104 tax and adjusted-gross-income mechanics; subsection (4) also requires unavailable section 39-22-326 S corporation income apportionment mechanics.
rules:
  - name: nonresident_return_required_for_remaining_taxable_year_portion
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-22-110(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-22-110
              excerpt: "A taxpayer filing a part-year resident return"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-110
              excerpt: "shall also file as a\nnonresident on the same return as provided in section 39-22-109 for the remaining\nportion of his federal taxable year in the event the taxpayer has income within such\nremaining portion derived from sources within Colorado"
    versions:
      - effective_from: '1987-01-01'
        formula: |-
          tax_unit_files_part_year_resident_return
          and tax_unit_has_income_in_remaining_portion_derived_from_colorado_sources
