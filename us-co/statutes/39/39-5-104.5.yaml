format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-5-104.5
  summary: |-
    On and after January 1, 1996, personal property shall be valued as of the assessment date, and the tax shall apply for the full assessment year. The owner of taxable personal property on the assessment date shall be responsible for the full property tax year without proration.
rules:
  - name: personal_property_valuation_uses_assessment_date
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-5-104.5(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: effective_period
            source:
              corpus_citation_path: us-co/statute/39/39-5-104.5
              excerpt: "On and after January 1, 1996, personal property shall be valued as of the assessment date"
    versions:
      - effective_from: '1996-01-01'
        formula: |-
          true

  - name: personal_property_tax_applies_for_full_assessment_year
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-5-104.5(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-5-104.5
              excerpt: "the tax shall apply for the full assessment year without regard to any destruction, conveyance, relocation, or change in tax status occurring after the assessment date"
    versions:
      - effective_from: '1996-01-01'
        formula: |-
          true

  - name: assessment_date_owner_responsible_for_full_property_tax_year_without_proration
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-5-104.5(1)
    metadata:
      proof:
