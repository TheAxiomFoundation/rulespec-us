          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-5-104.5
              excerpt: "The owner of taxable personal property on the assessment date shall be responsible for the property tax assessed for the full property tax year without proration."
    versions:
      - effective_from: '1996-01-01'
        formula: |-
          person_owns_personal_property_on_assessment_date
          and owned_personal_property_is_taxable
