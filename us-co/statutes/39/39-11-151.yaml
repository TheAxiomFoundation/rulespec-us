format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-11-151
  summary: |-
    No tax lien may be sold to a county official, county employee, immediate family member, or agent during the related official's service or employee's employment. Conveyances and tax-lien purchases are exempt in the stated ownership, different-county, and severed-mineral-interest circumstances. Knowing violations are class 2 misdemeanors.
rules:
  - name: restricted_person_tax_lien_transaction_exemption_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: C.R.S. 39-11-151(2)(a)-(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-11-151
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          property_was_owned_by_actor_or_actor_immediate_family_immediately_before_tax_lien_sale
          or property_is_in_county_other_than_related_official_or_employee_county
          or (
            property_is_severed_mineral_interest
            and related_county_official_or_employee_owns_coterminous_surface_estate_at_conveyance
          )
  - name: tax_lien_purchase_by_restricted_person_is_prohibited
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: C.R.S. 39-11-151(1)(b), (2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-11-151
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-11-151
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          tax_lien_is_sold_for_delinquent_taxes_under_this_article
          and (
            actor_is_elected_or_appointed_county_official
            or actor_is_county_employee
            or actor_is_immediate_family_of_county_official_or_employee
            or actor_is_agent_of_county_official_or_employee
          )
          and related_county_official_holds_office_or_employee_is_employed_when_tax_lien_is_sold
          and not restricted_person_tax_lien_transaction_exemption_applies
  - name: property_conveyance_to_restricted_person_is_prohibited
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: C.R.S. 39-11-151(1)(a), (2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-11-151
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-11-151
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          tax_lien_is_sold_for_delinquent_taxes_under_this_article
          and (
            actor_is_elected_or_appointed_county_official
            or actor_is_county_employee
            or actor_is_immediate_family_of_county_official_or_employee
            or actor_is_agent_of_county_official_or_employee
          )
          and related_county_official_holds_office_or_employee_is_employed_when_tax_lien_is_sold
          and not restricted_person_tax_lien_transaction_exemption_applies
  - name: knowing_restricted_tax_lien_transaction_is_class_2_misdemeanor
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: C.R.S. 39-11-151(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-11-151
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (
            actor_knowingly_purchases_tax_lien
            and tax_lien_purchase_by_restricted_person_is_prohibited
          )
          or (
            actor_knowingly_receives_property_conveyance
            and property_conveyance_to_restricted_person_is_prohibited
          )
