  source_verification:
    corpus_citation_path: us-co/statute/39/39-30-107.5
  summary: |-
    Local governments in an enterprise zone may negotiate specified property-tax incentives or sales-tax refunds with taxpayers qualifying for a section 39-30-105.1 credit; a special district requires a concurrent municipality or county agreement. “Special district” has the meaning in section 32-1-103(20).
  deferred_outputs:
    - output: us-co:statutes/39/39-30-107.5/1/a#property_tax_incentive_negotiation_permitted
      reason: The authorization depends on taxpayer qualification for a credit pursuant to section 39-30-105.1, whose required RuleSpec source is unavailable.
    - output: us-co:statutes/39/39-30-107.5/1/b#special_district_incentive_agreement_permitted
      reason: The authorization depends on both the unavailable section 39-30-105.1 credit qualification and the definition of special district in unavailable section 32-1-103(20).
    - output: us-co:statutes/39/39-30-107.5/2#sales_tax_refund_negotiation_permitted
      reason: The authorization depends on taxpayer qualification for a credit pursuant to section 39-30-105.1, whose required RuleSpec source is unavailable.
    - output: us-co:statutes/39/39-30-107.5/c#special_district
      reason: This definition expressly incorporates section 32-1-103(20), whose required RuleSpec source is unavailable.
