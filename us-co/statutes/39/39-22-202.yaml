format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-202
  summary: Each resident partner is considered to have paid a tax in an amount equal
    to the resident partner's pro rata share of any net income tax paid by the partnership
    to a state that does not measure partner income by reference to partnership income.
  deferred_outputs:
  - output: us-co:statutes/39/39-22-202#partner_distributive_share_modification
    reason: Applying a Colorado modification to each partnership income item requires
      an item-level partner-allocation relation; the cited section 39-22-104 does
      not provide an executable general modification export.
  - output: us-co:statutes/39/39-22-202#partnership_item_character_for_partner
    reason: The same-character rule applies separately to each partnership income,
      gain, loss, deduction, or credit item, but no item-level entity or relation
      is available.
  - output: us-co:statutes/39/39-22-202#partner_distributive_share_without_tax_avoidance_special_provision
    reason: Recomputing a distributive share as if a partnership agreement made no
      special provision requires item-level partnership-agreement allocation mechanics
      not available in the supported schema.
rules:
- name: resident_partner_deemed_tax_paid_to_nonpass_through_state
  kind: derived
  entity: TaxUnit
  dtype: Money
  period: Year
  unit: USD
  source: "Colo. Rev. Stat. \xA7 39-22-202(4)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-22-202
          excerpt: "each resident partner is considered to\nhave paid a tax"
      - path: versions[0].formula
        kind: definition
        source:
          corpus_citation_path: us-co/statute/39/39-22-202
          excerpt: "net income tax means\nany tax imposed on, or measured by, a partnership's net income"
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/statute/39/39-22-202
          excerpt: "a state\nthat does not measure the income of partners of a partnership by reference to the\nincome of the partnership"
  versions:
  - effective_from: '1987-01-01'
    formula: 'if tax_unit_is_resident_partner and partnership_state_does_not_measure_partner_income_by_reference_to_partnership_income:
      partner_pro_rata_share_of_partnership_net_income_tax else: 0'
