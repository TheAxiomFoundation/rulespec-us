format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-26-707
  summary: |-
    “The storage, use, or consumption of all food purchased with funds provided by the special supplemental food program for women, infants, and children” is exempt from taxation under part 2. The section also addresses food, candy, soft drinks, food-service articles, retirement communities, and related sales and use tax exemptions.
  deferred_outputs:
    - output: us-co:statutes/39/39-26-707/b#candy_and_soft_drink_definitions
      reason: The subsection defines candy and soft drinks through detailed ingredient, form, refrigeration, and excluded-beverage classifications; this surface is deferred pending a canonical item-classification model.
    - output: us-co:statutes/39/39-26-707/d#food_storage_use_or_consumption_exempt
      reason: Computing the exemption requires the definition of food in section 39-26-102 (4.5), whose copied RuleSpec context is deferred and has no executable export.
    - output: us-co:statutes/39/39-26-707/c#nursing_care_facility_is_retirement_community
      reason: Computing this retirement-community category requires the licensing and care classifications supplied by section 25-1.5-103 (1)(a)(I)(A), for which no executable copied RuleSpec context is available.
    - output: us-co:statutes/39/39-26-707/1#part_1_sales_tax_exemptions
      reason: The sales-tax surface contains multiple distinct food, furnishing, packaging, retirement-community, and nonessential-item branches that require additional transaction and classification modeling.
    - output: us-co:statutes/39/39-26-707/2#part_2_use_tax_exemptions
      reason: The remaining use-tax surface contains multiple distinct food, furnishing, packaging, retirement-community, and nonessential-item branches requiring additional transaction and classification modeling.
    - output: us-co:statutes/39/39-26-707/3#candy_and_soft_drink_estimation_and_penalty_relief
      reason: This administrative rulemaking and historical return-penalty provision is outside the executable exemption surface encoded here.
    - output: us-co:statutes/39/39-26-707/4#nonessential_item_penalty_relief
      reason: This historical return-penalty provision requires return, error, interest, and penalty administration concepts not represented by the current executable surface.
rules:
  - name: wic_food_storage_use_or_consumption_exempt
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Day
    source: 39-26-707(g)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-26-707
              excerpt: The storage, use, or consumption of all food purchased with funds provided by the special supplemental food program for women, infants, and children.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_food_purchased_with_wic_funds
          and event_is_storage_use_or_consumption
