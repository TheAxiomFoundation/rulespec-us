format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-610
  summary: |-
    The declared-war service period through twelve months after termination, and combat-zone service through one hundred eighty days after service, shall be disregarded in determining the individual's income-tax liability timing; the declared-war rule does not revive a right or liability previously barred by law.
rules:
  - name: declared_war_post_termination_tolling_months
    kind: parameter
    dtype: Count
    source: C.R.S. 39-22-610(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-610
              excerpt: "ending twelve months after the termination"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          12

  - name: combat_zone_post_service_tolling_days
    kind: parameter
    dtype: Count
    source: C.R.S. 39-22-610(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-610
              excerpt: "a period of one hundred eighty days after such service"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          180

  - name: declared_war_income_tax_liability_timing_is_disregarded
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: C.R.S. 39-22-610(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-22-610
              excerpt: "during which an individual is a member of the armed forces of the United States"
          - path: versions[0].formula
            kind: effective_period
            source:
              corpus_citation_path: us-co/statute/39/39-22-610
              excerpt: "commencing with the declaration of war by congress and ending twelve months after the termination"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-22-610
              excerpt: "shall not revive any right or liability previously barred by law"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_is_member_of_us_armed_forces
          and income_tax_liability_timing_event_occurs_during_declared_war_tolling_period
          and not income_tax_right_or_liability_was_previously_barred_by_law

  - name: combat_zone_income_tax_liability_timing_is_disregarded
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: C.R.S. 39-22-610(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-22-610
              excerpt: "serving in the armed forces of the United States or in support thereof in an area designated by presidential order as a combat zone"
          - path: versions[0].formula
            kind: effective_period
            source:
              corpus_citation_path: us-co/statute/39/39-22-610
              excerpt: "and a period of one hundred eighty days after such service"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_serves_in_us_armed_forces_or_supports_them_in_presidentially_designated_combat_zone
          and income_tax_liability_timing_event_occurs_during_combat_zone_service_and_post_service_tolling_period
