format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-11-139
  summary: |-
    Each county treasurer shall deliver, no later than the fifteenth day of January, lists of county-held tax certificates and county tax-deed property; copies shall be conspicuously posted in the courthouse for not less than thirty days.
rules:
  - name: courthouse_posting_minimum_days
    kind: parameter
    dtype: Count
    period: Year
    source: C.R.S. § 39-11-139
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-11-139
              excerpt: "for not less than thirty days"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30
  - name: annual_county_tax_property_lists_delivered
    kind: derived
    entity: CountyTreasurer
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-11-139
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-11-139
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          lists_delivered_to_county_clerk_and_recorder
          and tax_certificate_list_shows_all_county_held_tax_certificates
          and tax_deed_property_list_shows_all_county_tax_deed_property
          and lists_delivered_no_later_than_january_fifteenth
  - name: county_tax_property_lists_conspicuously_posted
    kind: derived
    entity: CountyTreasurer
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-11-139
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-11-139
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-11-139
              excerpt: "for not less than thirty days"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          copy_of_lists_posted_in_conspicuous_courthouse_place
          and number_of_days_copy_of_lists_posted >= courthouse_posting_minimum_days
