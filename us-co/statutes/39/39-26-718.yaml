format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-26-718
  summary: |-
    “All sales made to charitable organizations, in the conduct of their regular charitable functions and activities” are exempt. Charitable-organization sales qualify subject to the preceding-year net-proceeds limit, retained-funds condition, and current-year limit. Parent-teacher charitable-organization sales qualify on or after September 1, 2008 when funds are used for stated school or association purposes.
rules:
  - name: charitable_organization_sales_net_proceeds_limit
    kind: parameter
    dtype: Money
    unit: USD
    source: Colo. Rev. Stat. § 39-26-718(1)(b)(I)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-26-718
              excerpt: "do not exceed forty-five thousand dollars"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          45000

  - name: charitable_organization_purchaser_sales_tax_exemption_applies
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Day
    source: Colo. Rev. Stat. § 39-26-718(1)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-26-718
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          purchaser_is_charitable_organization
          and sale_is_in_conduct_of_purchasers_regular_charitable_functions_and_activities

  - name: charitable_organization_seller_sales_tax_exemption_applies
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Day
    source: Colo. Rev. Stat. § 39-26-718(1)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-26-718
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          seller_is_charitable_organization
          and sale_is_taxable_tangible_personal_property_commodity_or_service
          and preceding_calendar_year_net_proceeds <= charitable_organization_sales_net_proceeds_limit
          and funds_raised_are_retained_for_organizations_charitable_service
          and current_calendar_year_net_proceeds <= charitable_organization_sales_net_proceeds_limit

  - name: parent_teacher_association_sales_tax_exemption_applies
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Day
    source: Colo. Rev. Stat. § 39-26-718(1)(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: effective_period
            source:
              corpus_citation_path: us-co/statute/39/39-26-718
              excerpt: "On or after September 1, 2008"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-26-718
    versions:
      - effective_from: '2008-09-01'
        formula: |-
          seller_is_parent_teacher_association_of_public_school_students
          and seller_is_charitable_organization
          and (
            funds_raised_are_used_for_benefit_of_public_school_or_organized_public_school_activity
            or funds_raised_pay_reasonable_association_expenses
          )

  - name: storage_use_tax_exemption_for_charitable_organization_sales_applies
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Day
    source: Colo. Rev. Stat. § 39-26-718(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-26-718
              excerpt: "any item that is exempt from sales tax by operation of subsection (1)(b)"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          item_is_exempt_from_sales_tax_by_charitable_organization_seller_sales

  - name: storage_use_tax_exemption_for_parent_teacher_association_sales_applies
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Day
    source: Colo. Rev. Stat. § 39-26-718(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-26-718
              excerpt: "any item that is exempt from sales tax by operation of subsection (1)(c)"
    versions:
      - effective_from: '2008-09-01'
        formula: |-
          item_is_exempt_from_sales_tax_by_parent_teacher_association_sales
