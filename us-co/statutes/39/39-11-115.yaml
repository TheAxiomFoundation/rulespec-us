format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-11-115
  summary: |-
    The treasurer may set a minimum total of taxes, delinquent interest, and costs below which competitive bids will not be accepted.
rules:
  - name: competitive_bid_satisfies_treasurer_minimum_total
    kind: derived
    entity: TaxLien
    dtype: Judgment
    period: Year
    source: 39-11-115(d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-11-115
              excerpt: "Setting a minimum total of taxes, delinquent interest, and costs below\nwhich competitive bids will not be accepted."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          competitive_bid_total >= treasurer_set_minimum_total
