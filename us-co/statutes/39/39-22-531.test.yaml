- name: calculates annual credit from actual job growth and employer FICA taxes
  period:
    period_kind: tax_year
    start: '2024-01-01'
    end: '2024-12-31'
  input:
    us-co:statutes/39/39-22-531#input.actual_net_job_growth: 10
    us-co:statutes/39/39-22-531#input.employer_fica_taxes_for_new_project_employees: 1000
  output:
    us-co:statutes/39/39-22-531#calculated_annual_job_growth_incentive_credit: 5000
- name: annual credit cannot be negative
  period:
    period_kind: tax_year
    start: '2024-01-01'
    end: '2024-12-31'
  input:
    us-co:statutes/39/39-22-531#input.actual_net_job_growth: -2
    us-co:statutes/39/39-22-531#input.employer_fica_taxes_for_new_project_employees: 1000
  output:
    us-co:statutes/39/39-22-531#calculated_annual_job_growth_incentive_credit: 0
