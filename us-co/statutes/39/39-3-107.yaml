format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-3-107
  summary: |-
    Property owned and used solely and exclusively for non-profit schools is exempt from property tax; Colorado-benefit use is not required, and claims must comply with section 39-2-117.
rules:
  - name: school_property_tax_exemption_applies
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-3-107
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-3-107
              excerpt: "Property, real and personal, which is owned and used solely and exclusively for schools which are not held or conducted for private or corporate profit shall be exempt"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          property_is_owned
          and property_is_used_solely_and_exclusively_for_schools
          and schools_are_not_held_or_conducted_for_private_or_corporate_profit
