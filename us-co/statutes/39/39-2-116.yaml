format: rulespec/v1
module:
  status: entity_not_supported
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-2-116
  summary: |-
    The administrator shall approve an application found entirely in proper form and recommended in conformity with law; if only a portion qualifies, the administrator shall approve that part and disapprove the remainder, which may be appealed.
  deferred_outputs:
    - output: us-co:statutes/39/39-2-116#application_approval_and_disapproval_determination
      reason: The provision requires administrative action on an application and, where applicable, separate approval and disapproval of its portions; the supported schema has no application-and-portion entity or action/result representation that can preserve those distinct outcomes.
