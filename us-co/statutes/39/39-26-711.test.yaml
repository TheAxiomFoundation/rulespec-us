- name: qualifying_aircraft_and_component_property_are_exempt
  period:
    period_kind: custom
    name: calendar_year
    start: '1984-07-01'
    end: '1985-06-30'
  input:
    us-co:statutes/39/39-26-711#input.aircraft_is_used_or_purchased_for_interstate_commerce_by_commercial_airline: true
    ? us-co:statutes/39/39-26-711#input.tangible_personal_property_is_permanently_affixed_or_attached_as_component_part_of_aircraft
    : true
  output:
    us-co:statutes/39/39-26-711#aircraft_sale_exempt_from_part_1_taxation: holds
    us-co:statutes/39/39-26-711#aircraft_component_property_sale_exempt_from_part_1_taxation: holds
    us-co:statutes/39/39-26-711#aircraft_storage_use_or_consumption_exempt_from_part_2_taxation: holds
    us-co:statutes/39/39-26-711#aircraft_component_property_storage_use_or_consumption_exempt_from_part_2_taxation: holds
