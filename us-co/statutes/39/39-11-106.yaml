format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-11-106
  summary: |-
    "To the amount of delinquent taxes there shall be added a fee to cover the cost of advertising"; an electronic public auction may carry a fee for its conducting cost; the county treasurer shall deliver the list at least ten days before first publication.
rules:
  - name: minimum_tax_lien_advertising_list_delivery_lead_time_days
    kind: parameter
    dtype: Count
    source: C.R.S. 39-11-106(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-11-106
              excerpt: "at\nleast ten days before the date of the first publication"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10

  - name: delinquent_taxes_including_advertising_fee
    kind: derived
    entity: TaxLien
    dtype: Money
    period: Year
    unit: USD
    source: C.R.S. 39-11-106(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-11-106
              excerpt: "To the amount of delinquent taxes there shall be added a fee to cover the cost of advertising"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          amount_of_delinquent_taxes + cost_of_advertising

  - name: electronic_public_auction_cost_fee_may_be_added
    kind: derived
    entity: CountyTreasurer
    dtype: Judgment
    period: Year
    source: C.R.S. 39-11-106(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-11-106
              excerpt: "If the public auction is conducted by means of the internet or other electronic medium, the treasurer may add a fee"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          public_auction_is_conducted_by_internet_or_other_electronic_medium

  - name: tax_lien_advertising_list_delivery_timing_requirement_met
    kind: derived
    entity: CountyTreasurer
    dtype: Judgment
    period: Year
    source: C.R.S. 39-11-106(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: ordering
            source:
              corpus_citation_path: us-co/statute/39/39-11-106
              excerpt: "at\nleast ten days before the date of the first publication"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          tax_lien_advertising_list_delivery_lead_time_days_before_first_publication >= minimum_tax_lien_advertising_list_delivery_lead_time_days
