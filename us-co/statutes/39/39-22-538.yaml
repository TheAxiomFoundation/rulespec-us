format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-538
  summary: |-
    For income tax years commencing on or after January 1, 2025, but prior to January 1, 2033, a taxpayer is allowed two thousand dollars for each preceptorship, for a maximum of three preceptorships and six thousand dollars per taxable year. The taxpayer must satisfy the preceptorship, rural-or-frontier practice, certification, and statewide claimant-limit requirements. Unused credit is nonrefundable and may be carried forward for five succeeding income tax years.
  deferred_outputs:
    - output: us-co:statutes/39/39-22-538/d#legislative_tax_preference_performance_statement
      reason: Subsection (1)(d) states legislative purposes and administrative measurement objectives rather than a taxpayer-level computable consequence.
    - output: us-co:statutes/39/39-22-538/a#ahec_definition
      reason: Subsection (2)(a) supplies a textual institutional definition that is preserved as documentary context and does not independently compute an output.
    - output: us-co:statutes/39/39-22-538/b#frontier_area
      reason: Subsection (2)(b) defines a geographic classification requiring county population-density data not supplied by this source.
    - output: us-co:statutes/39/39-22-538/c#health_professional_student
      reason: Subsection (2)(c) is repealed, while subsection (2)(c.5) defines a classification requiring external accreditation, matriculation, and field-of-study facts.
    - output: us-co:statutes/39/39-22-538/d#preceptor
      reason: Subsection (2)(d) defines a professional classification requiring external licensing, occupation, and outpatient-setting facts.
    - output: us-co:statutes/39/39-22-538/e#preceptorship
      reason: Subsection (2)(e) defines the complete mentoring relationship; its numeric duration requirements are retained as executable parameters and consumed by the credit-eligibility rule.
    - output: us-co:statutes/39/39-22-538/f#primary_health_care
      reason: Subsection (2)(f) supplies a qualitative clinical-services definition not reducible to a source-stated computable test.
    - output: us-co:statutes/39/39-22-538/g#rural_area
      reason: Subsection (2)(g) depends on the federal office of rural health policy's external list of areas eligible for rural health funding.
    - output: us-co:statutes/39/39-22-538/h#taxpayer
      reason: Subsection (2)(h) defines taxpayer by reference to preceptor status and filing under article 22; those source-stated facts are represented as boundaries in the executable eligibility rule.
    - output: us-co:statutes/39/39-22-538/b#statewide_credit_claimant_selection
      reason: Subsection (3)(b)(III) delegates the method for selecting no more than three hundred certified preceptors to department rulemaking; the statutory limit is retained as a parameter, but the selection method is not supplied.
    - output: us-co:statutes/39/39-22-538/6#unused_credit_carryforward
      reason: Subsection (6) requires vintage-specific application over five succeeding income tax years in earliest-year order, which cannot be represented faithfully as a single annual scalar without a credit-vintage relation.
    - output: us-co:statutes/39/39-22-538/7#public_employee_definition_unchanged
      reason: Subsection (7) preserves the definition in section 24-10-103, whose RuleSpec dependency is unavailable; it does not alter the independently executable tax-credit calculation.

rules:
  - name: credit_per_preceptorship
    kind: parameter
    dtype: Money
    unit: USD
    period: Year
    source: 39-22-538(h)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-538
              excerpt: "one thousand dollars for a preceptorship"
          - path: versions[1].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-538
              excerpt: "two thousand dollars for each preceptorship"
          - path: versions
            kind: effective_period
            source:
              corpus_citation_path: us-co/statute/39/39-22-538
              excerpt: "on or after January 1, 2025, but prior to\nJanuary 1, 2033"
    versions:
      - effective_from: '2017-01-01'
        formula: |-
          1000
      - effective_from: '2025-01-01'
        formula: |-
          2000

  - name: annual_preceptor_credit_cap
    kind: parameter
    dtype: Money
    unit: USD
    period: Year
    source: 39-22-538(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-538
              excerpt: "shall not exceed one thousand dollars for any one income tax year"
          - path: versions[1].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-538
              excerpt: "shall not exceed six thousand dollars for any one income tax year"
    versions:
      - effective_from: '2017-01-01'
        formula: |-
          1000
      - effective_from: '2025-01-01'
        formula: |-
          6000

  - name: maximum_creditable_preceptorships
    kind: parameter
    dtype: Count
    period: Year
    source: 39-22-538(h)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-538
              excerpt: "A credit is allowed for a maximum of three preceptorships per\napplicable income tax year."
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          3

  - name: minimum_preceptorship_working_weeks
    kind: parameter
    dtype: Count
    period: Year
    source: 39-22-538(e)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-538
              excerpt: "not less than four consecutive or nonconsecutive working\nweeks"
    versions:
      - effective_from: '2017-01-01'
        formula: |-
          4

  - name: minimum_preceptorship_business_days
    kind: parameter
    dtype: Count
    period: Year
    source: 39-22-538(e)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-538
              excerpt: "twenty consecutive or nonconsecutive business days per calendar year"
    versions:
      - effective_from: '2017-01-01'
        formula: |-
          20

  - name: statewide_preceptor_claimant_limit
    kind: parameter
    dtype: Count
    period: Year
    source: 39-22-538(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-538
              excerpt: "Not more than three hundred preceptors are entitled to claim the credit"
    versions:
      - effective_from: '2017-01-01'
        formula: |-
          300

  - name: preceptor_credit_eligibility
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: 39-22-538(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-22-538
              excerpt: "the preceptor is practicing in the preceptor's primary health-care field\nin a rural or frontier area"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-22-538
              excerpt: "the taxpayer shall\nsubmit a certification form with each income tax return"
          - path: versions[0].formula
            kind: effective_period
            source:
              corpus_citation_path: us-co/statute/39/39-22-538
              excerpt: "on or after January 1, 2025, but prior to\nJanuary 1, 2033"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-538
              excerpt: "not less than four consecutive or nonconsecutive working\nweeks or twenty consecutive or nonconsecutive business days"
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          income_tax_year_is_in_credit_period
          and taxpayer_is_preceptor_filing_income_tax_return
          and preceptorship_is_uncompensated
          and (working_weeks_in_preceptorship >= minimum_preceptorship_working_weeks or business_days_in_preceptorship >= minimum_preceptorship_business_days)
          and preceptor_practices_primary_health_care_field_in_rural_or_frontier_area
          and certification_form_submitted_with_return
          and certification_verifies_credit_requirements
          and taxpayer_is_selected_under_department_claimant_method

  - name: rural_health_care_preceptor_credit
    kind: derived
    entity: TaxUnit
    dtype: Money
    unit: USD
    period: Year
    source: 39-22-538(h)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-538
              excerpt: "two thousand dollars for each preceptorship"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-22-538
              excerpt: "A credit is allowed for a maximum of three preceptorships per\napplicable income tax year."
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-538
              excerpt: "The maximum total credit in a taxable year is six\nthousand dollars."
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if preceptor_credit_eligibility: min(annual_preceptor_credit_cap, credit_per_preceptorship * min(max(0, number_of_preceptorships_provided), maximum_creditable_preceptorships)) else: 0

  - name: preceptor_credit_used_against_current_year_tax
    kind: derived
    entity: TaxUnit
    dtype: Money
    unit: USD
    period: Year
    source: 39-22-538(6)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-538
              excerpt: "the amount of the credit not used as an\noffset against income taxes in the income tax year is not allowed as a refund"
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          min(rural_health_care_preceptor_credit, max(0, income_tax_otherwise_due))

  - name: preceptor_credit_recapture
    kind: derived
    entity: TaxUnit
    dtype: Money
    unit: USD
    period: Year
    source: 39-22-538(5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-538
              excerpt: "the taxpayer shall repay the entire amount of the total credit"
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if taxpayer_failed_credit_requirements_for_claim_year: max(0, total_credit_claimed_for_failed_year) else: 0
