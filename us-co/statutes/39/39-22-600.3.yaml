format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-600.3
  summary: |-
    “Frivolous return” means a purported article 22 tax return lacking information to judge substantial correctness or facially substantially incorrect, due to a frivolous position or an apparent desire to delay or impede administration of state income tax laws.
rules:
  - name: frivolous_return
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-22-600.3(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-22-600.3
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          purported_return_is_return_of_tax_imposed_by_article_22
          and (
            return_lacks_information_to_judge_substantial_correctness
            or return_is_facially_substantially_incorrect
          )
          and (
            return_conduct_is_due_to_frivolous_position
            or purported_return_appears_to_seek_delay_or_impediment_of_state_income_tax_administration
          )
