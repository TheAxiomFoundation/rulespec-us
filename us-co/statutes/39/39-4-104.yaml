format: rulespec/v1
module:
  summary: |-
    The division of property taxation may inspect public-utility books, accounts, and records to verify filed-statement information, examine specified persons under oath, and a person demanding inspection or examination for the administrator must exhibit authority.
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-4-104
rules:
  - name: property_taxation_division_may_inspect_public_utility_records
    kind: derived
    entity: PropertyTaxationDivision
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-4-104
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-4-104
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          public_utility_is_doing_business_in_state
          and inspection_is_for_verification_of_information_in_public_utility_filed_statement
  - name: property_taxation_division_may_examine_public_utility_representative_under_oath
    kind: derived
    entity: PropertyTaxationDivision
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-4-104
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-4-104
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          public_utility_is_doing_business_in_state
          and inspection_is_for_verification_of_information_in_public_utility_filed_statement
  - name: person_making_demand_for_administrator_complies_with_authority_exhibition_requirement
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-4-104
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-4-104
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (not person_makes_demand_on_public_utility_on_behalf_of_administrator)
          or person_exhibits_authority_to_make_inspection_or_examination
