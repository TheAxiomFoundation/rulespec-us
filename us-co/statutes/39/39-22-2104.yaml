format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-2104
  summary: |-
    An owner of a qualified development to which a credit has been allocated and each qualified taxpayer allocated a portion of that credit shall file specified allocation documents with their state income tax return.
rules:
  - name: credit_allocation_filing_requirement_satisfied
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: us-co/statute/39/39-22-2104
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-22-2104
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (taxpayer_is_owner_of_qualified_development_with_allocated_credit
          or taxpayer_is_qualified_taxpayer_allocated_portion_of_credit)
          and allocation_certificate_for_development_filed_with_state_income_tax_return
          and owner_credit_allocation_certification_filed_with_state_income_tax_return
