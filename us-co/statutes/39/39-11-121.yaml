format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-11-121
  summary: |-
    Sales of such certificates by a qualifying treasurer, antecedent to or without an ordinance prescribing sale terms, are ratified and validated as of their respective dates.
rules:
  - name: certificate_sale_validated
    kind: derived
    entity: CertificateSale
    dtype: Judgment
    period: Day
    source: C.R.S. § 39-11-121
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-11-121
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          sale_made_by_treasurer_or_ex_officio_treasurer_of_city_town_or_city_and_county
          and (
            sale_antecedent_to_ordinance_prescribing_sale_terms
            or no_ordinance_prescribing_sale_terms_has_passed
          )
