format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-1-105
  summary: |-
    All taxable real and personal property within the state on the official assessment date shall be listed, appraised, and valued for assessment in the county where located. Personal property shall be listed and valued separately from real property.
  deferred_outputs:
    - output: us-co:statutes/39/39-1-105#new_taxable_building_assessed_under_section_39_5_132
      reason: The required procedures under section 39-5-132 are not supplied in this source slice or copied context.
rules:
  - name: taxable_property_assessment_in_location_county_required
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: Colorado Revised Statutes § 39-1-105
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-1-105
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_taxable_property
          and asset_is_within_state_on_official_assessment_date
  - name: taxable_personal_property_separate_listing_and_valuation_required
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
