  summary: "\u201CPerson means an individual, corporation, limited liability company,\n\
    partnership, firm, joint venture, association, estate, trust, receiver, or group\
    \ acting\nas a unit and includes the plural as well as the singular number.\u201D\
    \n\u201CStorage or storing means any keeping or retention of, or exercise of\n\
    dominion or control over, tangible personal property in this state.\u201D"
