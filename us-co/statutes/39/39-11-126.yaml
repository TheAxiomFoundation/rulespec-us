format: rulespec/v1
module:
  summary: |-
    An irrigation or drainage district possessing or controlling certificates of purchase from tax-lien sales for nonpayment of general taxes may, by agreement with the county commissioners where the land is situated, assign, sell, or transfer the certificates.
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-11-126
rules:
  - name: district_may_transfer_general_tax_lien_certificates_by_county_agreement
    kind: derived
    entity: IrrigationOrDrainageDistrict
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-11-126
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-11-126
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          district_has_possession_or_control_of_certificates
          and certificates_are_purchase_certificates_from_land_tax_lien_sale_for_nonpayment_of_general_taxes
          and district_has_agreement_with_county_commissioners_of_county_where_land_is_situated
