format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-109
  summary: |-
    “Colorado nonresident federal adjusted gross income” includes federal adjusted gross income derived from specified Colorado sources, but excludes armed-forces compensation for an individual not domiciled in Colorado. Separate federal returns require separate Colorado taxable-income determinations; joint federal returns require joint Colorado nonresident federal taxable income.
  deferred_outputs:
    - output: us-co:statutes/39/39-22-109#colorado_nonresident_federal_adjusted_gross_income
      reason: Computing the defined amount requires unavailable federal adjusted-gross-income and partnership/trust computation dependencies cited by the source.
    - output: us-co:statutes/39/39-22-109#colorado_nonresident_income_apportionment_ratio
      reason: The ratio requires both federal adjusted gross income amounts as modified under section 39-22-104, whose needed adjusted-gross-income mechanics are unavailable.
    - output: us-co:statutes/39/39-22-109#colorado_nonresident_apportioned_income_tax
      reason: The tax imposed by section 39-22-104 is not available as an executable imported output.
    - output: us-co:statutes/39/39-22-109#alternative_nonresident_income_apportionment
      reason: The alternative apportionment methods in sections 39-22-303.5 and 39-22-303.6 are unavailable.
rules:
  - name: income_derived_from_colorado_sources
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-22-109(2)(a)-(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-22-109
              excerpt: "Federal\nadjusted gross income of an individual shall be considered derived from sources\nwithin Colorado when such income is attributable to"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-22-109
              excerpt: "Compensation paid by the United States for service in the armed forces\nof the United States performed by an individual not domiciled in Colorado shall not\nconstitute income derived from sources within Colorado."
    versions:
      - effective_from: '1987-01-01'
        formula: |-
          (
            income_attributable_to_colorado_real_or_tangible_personal_property
            or (
              income_attributable_to_business_trade_profession_or_occupation_carried_on_in_colorado
              and (
                not income_attributable_to_purchase_and_sale_of_property_for_own_account
                or individual_is_dealer_holding_property_primarily_for_sale_to_customers_in_ordinary_course_of_trade_or_business
              )
            )
            or income_attributable_to_colorado_partnership_or_limited_liability_company_share
            or income_attributable_to_colorado_estate_or_trust_share
            or income_attributable_to_intangible_property_employed_in_colorado_business
            or income_attributable_to_colorado_subchapter_s_corporation_share
          )
          and not united_states_armed_forces_compensation_paid_for_service_performed_by_individual_not_domiciled_in_colorado
  - name: separately_determined_colorado_taxable_income_applies
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-22-109(3)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-22-109
              excerpt: "If the federal taxable income of two taxpayers, both of whom are\nnonresidents, is determined on separate federal returns"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-109
              excerpt: "their Colorado taxable\nincomes shall be separately determined."
    versions:
      - effective_from: '1987-01-01'
        formula: |-
          both_taxpayers_are_nonresidents
          and federal_taxable_income_is_determined_on_separate_federal_returns
  - name: joint_colorado_nonresident_taxable_income_applies
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-22-109(3)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-22-109
              excerpt: "If the federal taxable income of two taxpayers, both of whom are\nnonresidents, is determined on a joint federal return"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-109
              excerpt: "their tax shall be determined\non their joint Colorado nonresident federal taxable income."
    versions:
      - effective_from: '1987-01-01'
        formula: |-
          both_taxpayers_are_nonresidents
          and federal_taxable_income_is_determined_on_joint_federal_return
