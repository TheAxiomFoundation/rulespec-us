    corpus_citation_path: us-co/statute/39/39-5-103
  summary: |-
    The assessor shall identify real-property tracts or parcels by section, township, and range, with another sufficient description for nonlegal subdivisions; town or city lots shall be described according to the municipality's numbering or description system.
  deferred_outputs:
    - output: us-co:statutes/39/39-5-103#real_property_listing_identification_complies
      reason: The source imposes a descriptive administrative duty, but the available schema has no property-description fields or mechanism to evaluate whether a description sufficiently identifies a parcel.
    - output: us-co:statutes/39/39-5-103#town_or_city_lot_listing_identification_complies
      reason: The source requires compliance with a municipality-specific lot numbering or description system, which cannot be evaluated without a structured municipal-description standard.
