format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-26-212
  summary: |-
    Local use-tax treatment is not affected by listed state use-tax-base changes, except beginning January 1, 2014, for the regional transportation district and scientific and cultural facilities district when they levy sales and use tax upon every transaction taxed by the state. This section does not create or expand local use-tax authority.
rules:
  - name: local_use_tax_treatment_remains_unaffected_by_listed_state_use_tax_base_changes
    kind: derived
    entity: LocalGovernment
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-26-212(1), (3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-26-212
              excerpt: "Beginning January 1, 2014, subsection (1) ... does not apply to the regional transportation district ... and the scientific and cultural facilities district ... which levy sales and use tax upon every transaction"
    versions:
      - effective_from: '2014-01-01'
        formula: |-
          not (
            local_government_levies_sales_and_use_tax_on_every_state_taxed_transaction
            and (
              local_government_is_regional_transportation_district
              or local_government_is_scientific_and_cultural_facilities_district
            )
          )
  - name: local_use_tax_authority_is_not_created_or_expanded_by_this_section
    kind: derived
    entity: LocalGovernment
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-26-212(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-26-212
              excerpt: "this section does not create or expand ... any authority ... to levy use tax"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          false
