format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-11-138
  summary: |-
    If a treasurer vacates office after selling tax liens on real estate for delinquent taxes and before executing the certificate or deed, the successor shall execute it in the same manner.
rules:
  - name: successor_must_execute_unissued_tax_lien_certificate_or_deed
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: C.R.S. 39-11-138
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-11-138
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_successor_to_treasurer_in_office
          and predecessor_treasurer_sold_tax_liens_on_real_estate_for_delinquent_taxes
          and predecessor_treasurer_vacated_office_after_tax_lien_sale_and_before_executing_certificate_or_deed
