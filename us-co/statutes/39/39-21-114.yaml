  - name: lower_recurring_warrant_penalty_rate
    kind: parameter
    dtype: Rate
    source: C.R.S. 39-21-114(7)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
