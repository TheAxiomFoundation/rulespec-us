    unit: USD
    source: C.R.S. 39-21-114(7)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-21-114
              excerpt: "the sum of twenty-five dollars"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          25

  - name: higher_recurring_warrant_penalty_rate
    kind: parameter
    dtype: Rate
    source: C.R.S. 39-21-114(7)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-21-114
              excerpt: "Thirty percent"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.30

  - name: higher_recurring_warrant_minimum_penalty
    kind: parameter
    dtype: Money
    unit: USD
    source: C.R.S. 39-21-114(7)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-21-114
              excerpt: "the sum of fifty dollars"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          50

  - name: nonresident_collection_overdue_period_months
    kind: parameter
    dtype: Count
    source: C.R.S. 39-21-114(8)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-21-114
              excerpt: "taxes more than six months overdue"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          6

  - name: resident_collection_overdue_period_months
    kind: parameter
    dtype: Count
    source: C.R.S. 39-21-114(8)(b.5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-21-114
              excerpt: "taxes more than twelve months overdue"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          12

  - name: minimum_debt_collection_agency_bond
    kind: parameter
    dtype: Money
    unit: USD
    source: C.R.S. 39-21-114(8)(b), (b.5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-21-114
              excerpt: "no less than one hundred thousand dollars"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          100000

  - name: maximum_resident_debt_collection_agency_bond
    kind: parameter
    dtype: Money
    unit: USD
    source: C.R.S. 39-21-114(8)(b.5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-21-114
              excerpt: "no more than five hundred thousand dollars"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          500000

  - name: maximum_collection_service_fee_rate
    kind: parameter
    dtype: Rate
    source: C.R.S. 39-21-114(8)(c)(I)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-21-114
              excerpt: "shall the fees for services rendered exceed twenty percent"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.20

  - name: collection_remittance_period_days
    kind: parameter
    dtype: Count
    source: C.R.S. 39-21-114(8)(d), (10)(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-21-114
              excerpt: "within thirty days"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: recurring_distraint_warrant_penalty
    kind: derived
    entity: Taxpayer
    dtype: Money
    period: Year
    unit: USD
    source: C.R.S. 39-21-114(7)(a)-(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-21-114
              excerpt: "additional penalties for recurring distraint warrants"
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-21-114
              excerpt: "Fifteen percent ... twenty-five dollars ... Thirty percent ... fifty dollars"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if taxpayer_repeatedly_failed_neglected_or_refused_to_pay_tax
            and department_issued_distraint_warrants_to_collect_tax_due:
            if consecutive_distraint_warrant_count >= higher_recurring_warrant_count:
              max(
                higher_recurring_warrant_penalty_rate * delinquent_taxes_interest_and_penalties,
                higher_recurring_warrant_minimum_penalty
              )
            else:
              if consecutive_distraint_warrant_count >= recurring_warrant_lower_count
                and consecutive_distraint_warrant_count <= recurring_warrant_upper_count:
                max(
                  lower_recurring_warrant_penalty_rate * delinquent_taxes_interest_and_penalties,
                  lower_recurring_warrant_minimum_penalty
                )
              else: 0
          else: 0

  - name: maximum_collection_service_fee
    kind: derived
    entity: Taxpayer
    dtype: Money
    period: Year
    unit: USD
    source: C.R.S. 39-21-114(8)(c)(I)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-21-114
              excerpt: "fees for services rendered shall be based on the total amount of delinquent taxes ... actually collected"
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-21-114
              excerpt: "under no circumstance shall the fees ... exceed twenty percent"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          maximum_collection_service_fee_rate * delinquent_taxes_penalties_and_interest_actually_collected
