format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-21-114
  summary: |-
    The executive director may issue distraint warrants for unpaid tax; recurring distraint warrants carry additional penalties of fifteen percent or $25 for three through five consecutive warrants, and thirty percent or $50 for six or more. Collection-agency fees may not exceed twenty percent of delinquent taxes actually collected.
rules:
  - name: deficiency_payment_grace_period_days
    kind: parameter
    dtype: Count
    source: C.R.S. 39-21-114(1)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-21-114
              excerpt: "not paid within thirty days"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: demand_payment_grace_period_days
    kind: parameter
    dtype: Count
    source: C.R.S. 39-21-114(1)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-21-114
              excerpt: "not paid within ten days"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10

  - name: minimum_sale_notice_period_days
    kind: parameter
    dtype: Count
    source: C.R.S. 39-21-114(2)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-21-114
              excerpt: "not be less than ten days"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10

  - name: maximum_sale_notice_period_days
    kind: parameter
    dtype: Count
    source: C.R.S. 39-21-114(2)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-21-114
              excerpt: "nor more than sixty days"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          60

  - name: maximum_sale_adjournment_period_days
    kind: parameter
    dtype: Count
    source: C.R.S. 39-21-114(2)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-21-114
              excerpt: "not for a time to exceed in all ninety days"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          90

  - name: judgment_lien_duration_years
    kind: parameter
    dtype: Count
    source: C.R.S. 39-21-114(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-21-114
              excerpt: "continue for six years from the entry of the judgment"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          6

  - name: recurring_warrant_lower_count
    kind: parameter
    dtype: Count
    source: C.R.S. 39-21-114(7)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-21-114
              excerpt: "Three, four, or five consecutive distraint warrants"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          3

  - name: recurring_warrant_upper_count
    kind: parameter
    dtype: Count
    source: C.R.S. 39-21-114(7)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-21-114
              excerpt: "Three, four, or five consecutive distraint warrants"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          5

  - name: higher_recurring_warrant_count
    kind: parameter
    dtype: Count
    source: C.R.S. 39-21-114(7)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-21-114
