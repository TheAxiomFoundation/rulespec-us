format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-27-102.5
  summary: |-
    "Compressed natural gas used to propel a motor vehicle on the highways of this
    state that is supplied to the user at a residential home is exempt from the
    special fuel tax." "Gasoline or special fuel removed from a terminal by a
    licensed exporter exclusively for delivery to another state is exempt."
rules:
  - name: residential_compressed_natural_gas_exempt_from_special_fuel_tax
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. 39-27-102.5(9)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-27-102.5
              excerpt: "Compressed natural gas used to propel a motor vehicle on the highways of this state that is supplied to the user at a residential home is exempt"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          compressed_natural_gas_is_used_to_propel_motor_vehicle_on_highways
          and compressed_natural_gas_is_supplied_to_user_at_residential_home
  - name: licensed_exporter_terminal_fuel_exempt_from_excise_tax
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. 39-27-102.5(10)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-27-102.5
              excerpt: "Gasoline or special fuel removed from a terminal by a licensed exporter exclusively for delivery to another state is exempt"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          fuel_is_removed_from_terminal_by_licensed_exporter
          and fuel_is_delivered_exclusively_to_another_state
