format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-7-107
  summary: |-
    Production value is assigned to the county of the wellhead; unit production is allocated to each wellhead as assigned by the unit agreement; and a statement copy is filed with each affected county assessor.
rules:
  - name: production_value_assignment_to_wellhead_county_complies
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-7-107(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-7-107
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (not leasehold_or_land_is_situated_in_more_than_one_county)
          or production_value_assigned_to_county_of_wellhead

  - name: unit_production_value_assignment_under_unit_agreement_complies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-7-107(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-7-107
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (not (
            leaseholds_or_lands_are_contiguous
            and leaseholds_or_lands_are_operated_as_unit
            and group_wellheads_are_situated_in_more_than_one_county
          ))
          or unit_production_value_portion_assigned_to_each_wellhead_by_unit_agreement

  - name: statement_copy_filed_with_each_affected_county_assessor_complies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-7-107(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-7-107
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (not (
            unit_production_occurs_from_wellheads_in_more_than_one_county
            and unit_production_wellheads_are_situated_in_more_than_one_county
          ))
          or statement_copy_filed_with_assessor_of_each_affected_county
