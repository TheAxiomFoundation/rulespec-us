format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-122
  summary: |-
    The credit equals twenty-five percent of qualifying long-term-care insurance expense. Federal taxable income must be less than fifty thousand dollars for a single return or a joint return claiming one policy, and less than one hundred thousand dollars for a joint return claiming two policies or a joint policy covering each individual separately. The credit shall not exceed one hundred fifty dollars for each policy. Unused credit is neither carried forward nor refunded.
  deferred_outputs:
    - output: us-co:statutes/39/39-22-122#long_term_care_insurance_credit
      reason: The credit depends on the meaning of “long-term care insurance” supplied by section 10-19-103 (5), for which no RuleSpec dependency is available.
      source_values:
        - us-co:statutes/39/39-22-122#long_term_care_insurance_credit_rate
        - us-co:statutes/39/39-22-122#single_return_federal_taxable_income_limit
        - us-co:statutes/39/39-22-122#joint_return_one_policy_federal_taxable_income_limit
        - us-co:statutes/39/39-22-122#joint_return_two_policies_federal_taxable_income_limit
        - us-co:statutes/39/39-22-122#credit_cap_per_policy
rules:
  - name: long_term_care_insurance_credit_rate
    kind: parameter
    dtype: Rate
    source: C.R.S. 39-22-122(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-122
              excerpt: "twenty-five percent of the amount expended for such insurance"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.25

  - name: single_return_federal_taxable_income_limit
    kind: parameter
    dtype: Money
    unit: USD
    period: Year
    source: C.R.S. 39-22-122(2)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-122
              excerpt: "filing a single return with a federal taxable income of less than fifty thousand dollars"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          50000

  - name: joint_return_one_policy_federal_taxable_income_limit
    kind: parameter
    dtype: Money
    unit: USD
    period: Year
    source: C.R.S. 39-22-122(2)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-122
              excerpt: "filing a joint return with a federal taxable income of less than fifty thousand dollars"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          50000

  - name: joint_return_two_policies_federal_taxable_income_limit
    kind: parameter
    dtype: Money
    unit: USD
    period: Year
    source: C.R.S. 39-22-122(2)(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-122
              excerpt: "filing a joint return with a federal taxable income of less than one hundred thousand dollars"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          100000

  - name: credit_cap_per_policy
    kind: parameter
    dtype: Money
    unit: USD
    period: Year
    source: C.R.S. 39-22-122(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-122
              excerpt: "shall not exceed one hundred fifty dollars for each policy"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          150

  - name: unused_long_term_care_insurance_credit_is_refundable
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: C.R.S. 39-22-122(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-22-122
              excerpt: "shall not be refunded to the individual"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          false

  - name: unused_long_term_care_insurance_credit_may_be_carried_forward
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: C.R.S. 39-22-122(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-22-122
              excerpt: "shall not be carried forward as tax credits against the resident individual's subsequent years' income tax liability"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          false
