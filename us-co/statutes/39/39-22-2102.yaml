format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-2102
  summary: |-
    A qualified taxpayer may claim an allocated credit during the credit period. Additional credits available under subsection (7)(a.7) must be accelerated: seventy percent in the first year and six percent in each of the second through sixth years.
  deferred_outputs:
    - output: us-co:statutes/39/39-22-2102#annual_credit_allocation_capacity
      reason: The annual allocation limit requires annual unallocated credits, recaptured or returned credits, qualified allocation plan determinations, and the combined allocation amount under section 39-22-2105, which is not available in copied RuleSpec context.
      source_values:
        - us-co:statutes/39/39-22-2102#annual_credit_allocation_base_cap
        - us-co:statutes/39/39-22-2102#annual_credit_allocation_additional_cap
    - output: us-co:statutes/39/39-22-2102#credit_carryforward_amount
      reason: Carryforward application requires tax liabilities and credit-use ordering across subsequent taxable years.
      source_values:
        - us-co:statutes/39/39-22-2102#credit_carryforward_tax_year_limit
    - output: us-co:statutes/39/39-22-2102#credit_allocation_prerequisites
      reason: Allocation prerequisites include authority determinations, qualified allocation plan compliance, recorded covenant compliance, public-hearing materials, and local-government commitments that cannot be represented as a complete allocation determination in this source slice.
      source_values:
        - us-co:statutes/39/39-22-2102#minimum_restrictive_covenant_maintenance_years
rules:
  - name: credit_period_years
    kind: parameter
    dtype: Count
    source: C.R.S. 39-22-2102(7)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-2102
              excerpt: "six-year credit period"
    versions:
      - effective_from: '2015-01-01'
        formula: |-
          6

  - name: accelerated_credit_first_year_rate
    kind: parameter
    dtype: Rate
    source: C.R.S. 39-22-2102(7.5)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-2102
              excerpt: "must equal seventy percent"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          0.70

  - name: accelerated_credit_later_year_rate
    kind: parameter
    dtype: Rate
    source: C.R.S. 39-22-2102(7.5)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-2102
              excerpt: "must each year equal six\npercent"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          0.06

  - name: credit_carryforward_tax_year_limit
    kind: parameter
    dtype: Count
    source: C.R.S. 39-22-2102(6)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-2102
              excerpt: "up to eleven tax years following the\ntax year"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          11

  - name: minimum_restrictive_covenant_maintenance_years
    kind: parameter
    dtype: Count
    source: C.R.S. 39-22-2102(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-2102
              excerpt: "for a period of fifteen taxable years"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          15

  - name: annual_credit_allocation_base_cap
    kind: parameter
    dtype: Money
    period: Year
    unit: USD
    source: C.R.S. 39-22-2102(7)(a), (a.5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-2102
              excerpt: "Five million dollars for credits allocated annually beginning on January 1,\n2015, and ending December 31, 2019"
          - path: versions[1].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-2102
              excerpt: "Ten million dollars for credits allocated annually beginning on January 1,\n2020, and ending on December 31, 2031"
    versions:
      - effective_from: '2015-01-01'
        effective_to: '2019-12-31'
        formula: |-
          5000000
      - effective_from: '2020-01-01'
        effective_to: '2031-12-31'
        formula: |-
          10000000

  - name: annual_credit_allocation_additional_cap
    kind: parameter
    dtype: Money
    period: Year
    unit: USD
    source: C.R.S. 39-22-2102(7)(a.7)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-2102
              excerpt: "Twenty million dollars for credits allocated in calendar year 2024"
          - path: versions[1].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-2102
              excerpt: "Sixteen million dollars for credits allocated in calendar year 2025"
          - path: versions[2].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-2102
              excerpt: "Twelve million dollars for credits allocated in calendar year 2026"
          - path: versions[3].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-2102
              excerpt: "Twelve million dollars for credits allocated in calendar year 2027"
          - path: versions[4].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-2102
              excerpt: "Sixteen million dollars for credits allocated in calendar year 2028"
          - path: versions[5].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-2102
              excerpt: "Twenty million dollars for credits allocated in calendar year 2029"
          - path: versions[6].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-2102
              excerpt: "Twenty million dollars for credits allocated in calendar year 2030"
          - path: versions[7].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-2102
              excerpt: "Twenty million dollars for credits allocated in calendar year 2031"
    versions:
      - effective_from: '2024-01-01'
        effective_to: '2024-12-31'
        formula: |-
          20000000
      - effective_from: '2025-01-01'
        effective_to: '2025-12-31'
        formula: |-
          16000000
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          12000000
      - effective_from: '2027-01-01'
        effective_to: '2027-12-31'
        formula: |-
          12000000
      - effective_from: '2028-01-01'
        effective_to: '2028-12-31'
        formula: |-
          16000000
      - effective_from: '2029-01-01'
        effective_to: '2029-12-31'
        formula: |-
          20000000
      - effective_from: '2030-01-01'
        effective_to: '2030-12-31'
        formula: |-
          20000000
      - effective_from: '2031-01-01'
        effective_to: '2031-12-31'
        formula: |-
          20000000

  - name: accelerated_credit_claim_amount
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: C.R.S. 39-22-2102(7.5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-2102
              excerpt: "such a credit must be accelerated and the full amount must\nbe claimed against the taxes imposed by this article 22 over the credit period"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-2102
              excerpt: "first year of the credit period"
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-2102
              excerpt: "seventy percent of the total amount"
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-2102
              excerpt: "second year through sixth year of the credit period must each year equal six\npercent"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          if credit_was_allocated_from_additional_annual_credit_capacity and credit_period_year == 1:
            total_allocated_credit * accelerated_credit_first_year_rate
          else:
            if credit_was_allocated_from_additional_annual_credit_capacity and credit_period_year <= credit_period_years:
              total_allocated_credit * accelerated_credit_later_year_rate
            else:
              0
