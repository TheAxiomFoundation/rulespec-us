  summary: |-
    Nothing in sections 39-11-143 to 39-11-145 affects the lien of any special assessment to which the real estate and its treasurer conveyance are subject under law.
rules:
  - name: special_assessment_lien_remains_unaffected
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
