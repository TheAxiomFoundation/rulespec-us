format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-305
  summary: |-
    “Such election may not be revoked in less than four years unless approved by the executive director.” An affiliated group of C corporations may elect a consolidated return; the executive director shall prescribe necessary regulations.
  deferred_outputs:
    - output: us-co:statutes/39/39-22-305#consolidated_return_election_available
      reason: Determining whether a group is an affiliated group of C corporations requires the missing definition in Internal Revenue Code section 1504.
rules:
  - name: consolidated_return_election_irrevocability_years
    kind: parameter
    dtype: Count
    period: Year
    source: CO Rev. Stat. § 39-22-305(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-305
              excerpt: “may not be revoked in less than four years”
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          4
  - name: consolidated_return_election_revocation_permitted
    kind: derived
    entity: AffiliatedGroup
    dtype: Judgment
    period: Year
    source: CO Rev. Stat. § 39-22-305(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-22-305
              excerpt: “may not be revoked in less than four years unless approved by the executive director”
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-305
              excerpt: “four years”
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          years_since_consolidated_return_election >= consolidated_return_election_irrevocability_years
          or executive_director_approved_election_revocation
