format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-304
  summary: For income tax years commencing on or after January 1, 2026, federal deductions
    for foreign-derived deduction eligible income are added back. Licensed marijuana
    businesses subtract federally disallowed otherwise deductible expenditures. A
    qualified worker-owned cooperative may subtract federal taxable income, not exceeding
    one million dollars, during the specified period.
  deferred_outputs:
  - output: us-co:statutes/39/39-22-304/b#separate_entity_foreign_corporation_federal_taxable_income
    reason: Separate-entity accounting, foreign-currency translation, and executive-director
      alternative procedures require audited accounting and administrative determinations
      not supplied by this source.
  - output: us-co:statutes/39/39-22-304/d#qualified_sale_gain_subtraction
    reason: The qualified-sale definition and treatment depend on unavailable Internal
      Revenue Code sections 267 and 1033.
  - output: us-co:statutes/39/39-22-304/p#cares_act_retroactive_adjustment_subtraction
    reason: The subtraction requires taxpayer-specific historical Colorado taxable-income
      calculations, CARES Act retroactive provisions, apportionment, and carryforward
      administration.
  - output: us-co:statutes/39/39-22-304/r#repealed_subtraction
    reason: Subsection (3)(r) is repealed.
rules:
- name: worker_owned_cooperative_subtraction_cap
  kind: parameter
  dtype: Money
  unit: USD
  source: 39-22-304(t)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-22-304
          excerpt: not to exceed one million dollars
  versions:
  - effective_from: '2027-01-01'
    formula: '1000000'
- name: foreign_derived_deduction_addback
  kind: derived
  entity: Corporation
  dtype: Money
  unit: USD
  period: Year
  source: 39-22-304(l)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-22-304
          excerpt: an amount equal to a federal deduction claimed
  versions:
  - effective_from: '2026-01-01'
    formula: federal_deduction_claimed_for_foreign_derived_deduction_eligible_income
- name: marijuana_business_federal_deduction_subtraction
  kind: derived
  entity: Corporation
  dtype: Money
  unit: USD
  period: Year
  source: 39-22-304(m)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/statute/39/39-22-304
          excerpt: if a taxpayer is licensed under the Colorado Marijuana Code
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-22-304
          excerpt: an amount equal to any expenditure that is eligible to be claimed
            as a federal income tax deduction but is disallowed
  versions:
  - effective_from: '2014-01-01'
    formula: 'if corporation_is_licensed_under_colorado_marijuana_code: federally_disallowed_marijuana_business_expenditures
      else: 0'
- name: worker_owned_cooperative_federal_taxable_income_subtraction
  kind: derived
  entity: Corporation
  dtype: Money
  unit: USD
  period: Year
  source: 39-22-304(t)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/statute/39/39-22-304
          excerpt: a qualified taxpayer's federal taxable income
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-22-304
          excerpt: not to exceed one million dollars
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-22-304
          excerpt: not to exceed one million dollars
  versions:
  - effective_from: '2027-01-01'
    formula: 'if corporation_is_worker_owned_cooperative and taxable_year_is_within_worker_owned_cooperative_subtraction_period:
      max(0, min(federal_taxable_income, worker_owned_cooperative_subtraction_cap))
      else: 0'
