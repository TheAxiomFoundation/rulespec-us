format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-28-109
  summary: |-
    “Each wholesaler shall keep and preserve complete and accurate records of all cigarettes purchased and sold”; records must be in the department-prescribed kind and form; monthly returns must state packages sold and tax due and be filed by the tenth day of the following month. Examination costs are “twenty-five dollars per diem” with a “minimum charge of seventy-five dollars.”
  deferred_outputs:
    - output: us-co:statutes/39/39-28-109#nonresident_record_examination_cost
      reason: The source limits this cost obligation to a nonresident wholesaler authorized under section 39-28-106, but copied section 39-28-106 exports no authorization predicate that can faithfully establish that condition.
      source_values:
        - us-co:statutes/39/39-28-109#record_examination_daily_charge
        - us-co:statutes/39/39-28-109#record_examination_minimum_charge
rules:
  - name: record_examination_daily_charge
    kind: parameter
    dtype: Money
    unit: USD
    source: Colo. Rev. Stat. § 39-28-109
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-28-109
              excerpt: "a charge of twenty-five dollars per diem"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          25

  - name: record_examination_minimum_charge
    kind: parameter
    dtype: Money
    unit: USD
    source: Colo. Rev. Stat. § 39-28-109
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-28-109
              excerpt: "a minimum charge of seventy-five dollars"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          75

  - name: wholesaler_recordkeeping_requirement_satisfied
    kind: derived
    entity: CigaretteWholesaler
    dtype: Judgment
    period: Month
    source: Colo. Rev. Stat. § 39-28-109
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-28-109
              excerpt: "shall keep and preserve complete and accurate records of all cigarettes purchased and sold"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-28-109
              excerpt: "in accordance with the provisions of section 39-21-113"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-28-109
              excerpt: "of such kind and in such form as the department prescribes"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          keeps_complete_and_accurate_cigarette_purchase_and_sale_records
          and recordkeeping_complies_with_section_39_21_113
          and records_are_in_department_prescribed_kind_and_form

  - name: monthly_cigarette_tax_return_filing_requirement_satisfied
    kind: derived
    entity: CigaretteWholesaler
    dtype: Judgment
    period: Month
    source: Colo. Rev. Stat. § 39-28-109
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-28-109
              excerpt: "Each wholesaler shall make a return to the department each month"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-28-109
              excerpt: "the total number of packages of cigarettes sold by him during the preceding month and the tax due thereon"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-28-109
              excerpt: "upon forms prescribed and furnished by the department"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-28-109
              excerpt: "filed by the tenth day of the month following the month reported"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          monthly_return_made_to_department
          and return_states_total_packages_sold_during_preceding_month
          and return_states_tax_due_on_cigarettes_sold
          and return_uses_department_prescribed_and_furnished_form
          and return_filed_by_tenth_day_of_following_month
