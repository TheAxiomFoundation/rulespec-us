format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-1-109
  summary: |-
    If the mortgagor fails or neglects to pay taxes on real property or permits a tax sale, the mortgagee may pay the taxes or redeem the property. Taxes so paid or redeemed are a lien until repaid; upon mortgage payment or enforcement, the mortgagee may demand them with interest at the mortgage rate, and they are included in a mortgage judgment. Mortgage includes a deed of trust, and mortgagee includes its beneficiary.
rules:
  - name: mortgagee_may_pay_property_taxes_or_redeem_property
    kind: derived
    entity: Mortgagee
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-1-109
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-1-109
              excerpt: "If the mortgagor of real property fails or neglects to pay the taxes levied on such property or permits such property to be sold for taxes"
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-1-109
              excerpt: "the mortgagee may pay said taxes or redeem such property if sold for taxes"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          mortgagor_fails_or_neglects_to_pay_taxes_levied_on_real_property
          or mortgagor_permits_real_property_to_be_sold_for_taxes_on_such_property
  - name: mortgagee_tax_payment_or_redemption_remains_lien_on_real_property
    kind: derived
    entity: Mortgagee
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-1-109
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-1-109
              excerpt: "any taxes so paid or redeemed shall become and be a lien upon such real property until the same have been repaid to the mortgagee"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          mortgagee_paid_property_taxes_or_redeemed_property_sold_for_taxes
          and mortgagee_tax_payment_or_redemption_has_not_been_repaid
  - name: mortgagee_may_demand_tax_payment_or_redemption_with_mortgage_rate_interest
    kind: derived
    entity: Mortgagee
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-1-109
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-1-109
              excerpt: "Upon payment of any such mortgage or in an action to enforce the same"
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-1-109
              excerpt: "such mortgagee may demand the taxes so paid or redeemed, with interest thereon at the same rate specified in the mortgage"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          mortgagee_paid_property_taxes_or_redeemed_property_sold_for_taxes
          and (mortgage_is_paid or mortgagee_is_in_action_to_enforce_mortgage)
  - name: mortgage_judgment_includes_tax_payment_or_redemption_with_mortgage_rate_interest
    kind: derived
    entity: Mortgagee
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-1-109
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-1-109
              excerpt: "the same shall be included in any judgment rendered on the mortgage"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          mortgagee_paid_property_taxes_or_redeemed_property_sold_for_taxes
          and judgment_is_rendered_on_mortgage
  - name: deed_of_trust_beneficiary_is_mortgagee_under_this_section
    kind: derived
    entity: Mortgagee
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-1-109
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-1-109
              excerpt: "the term mortgagee includes the beneficiary of a deed of trust"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          mortgagee_is_beneficiary_of_deed_of_trust
