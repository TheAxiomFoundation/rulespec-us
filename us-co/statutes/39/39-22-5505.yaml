format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-5505
  summary: |-
    An owner allocated a credit and each qualified taxpayer allocated a portion must file the allocation certificate and the owner's certification with the state income tax return.
rules:
  - name: credit_allocation_filing_documentation_requirement_satisfied
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-22-5505
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-22-5505
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (not tax_unit_is_owner_of_qualified_development_with_allocated_credit
          and not tax_unit_is_qualified_taxpayer_allocated_credit_portion)
          or
          (state_income_tax_return_includes_allocation_certificate
          and state_income_tax_return_includes_owner_credit_allocation_certification)
