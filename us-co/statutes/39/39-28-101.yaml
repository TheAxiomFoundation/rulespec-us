format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-28-101
  summary: |-
    “Consumer means any person ... who has title to or possession of cigarettes in storage for use or consumption in this state.” “Delivery sale means a sale of cigarettes to a consumer in this state” when the specified remote-order and delivery conditions are met. “Wholesaler” includes a delivery seller.
  deferred_outputs:
    - output: us-co:statutes/39/39-28-101#master_settlement_agreement
      reason: The definition incorporates the meaning in section 39-28-202 (5), which is not provided in copied RuleSpec context.
rules:
  - name: consumer
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: 39-28-101(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-28-101
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          has_title_to_cigarettes_in_storage_for_use_or_consumption_in_state
          or has_possession_of_cigarettes_in_storage_for_use_or_consumption_in_state

  - name: delivery_sale_order_method_satisfied
    kind: derived
    entity: CigaretteSale
    dtype: Judgment
    period: Day
    source: 39-28-101(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-28-101
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          consumer_submits_order_to_delivery_seller_by_non_over_counter_means

  - name: delivery_sale_delivery_method_satisfied
    kind: derived
    entity: CigaretteSale
    dtype: Judgment
    period: Day
    source: 39-28-101(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-28-101
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          seller_is_not_physically_present_when_consumer_obtains_cigarettes_by_delivery

  - name: delivery_sale
    kind: derived
    entity: CigaretteSale
    dtype: Judgment
    period: Day
    source: 39-28-101(1.3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-28-101
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          delivery_sale_order_method_satisfied
          and delivery_sale_delivery_method_satisfied

  - name: delivery_seller
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: 39-28-101(1.7)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-28-101
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_located_outside_state
          and person_makes_delivery_sales

  - name: modified_risk_tobacco_product
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Day
    source: 39-28-101(2.7)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-28-101
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          secretary_has_issued_modified_risk_commercial_marketing_order_for_tobacco_product

  - name: sale_or_resale
    kind: derived
    entity: CigaretteSale
    dtype: Judgment
    period: Day
    source: 39-28-101(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-28-101
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          exchange_barter_or_transfer_of_cigarette_title_or_possession_for_consideration_in_state
          or gift_by_person_engaged_in_business_of_selling_cigarettes
          or delivery_sale

  - name: wholesaler
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: 39-28-101(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-28-101
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_imports_cigarettes_into_state_for_sale_or_resale
          or delivery_seller

  - name: wholesale_subcontractor
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: 39-28-101(5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-28-101
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_purchases_cigarettes_from_wholesaler
          and cigarettes_are_purchased_for_resale_to_retailer_in_state
