format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-1-107
  summary: |-
    "The lien of general taxes for the current year ... shall attach to all taxable property, real and personal, at 12 noon on the assessment date." Taxes on real and personal property are a perpetual lien with priority until paid in full. Property tax on a possessory interest in otherwise exempt property is assessed to the holder, does not become a lien against the property, and when due is a debt of the holder.
  deferred_outputs:
    - output: us-co:statutes/39/39-1-107#lien_for_taxes_levied_under_section_39_5_132_attaches
      reason: The source includes taxes levied pursuant to section 39-5-132, but that cited source is not available to determine the referenced tax category.
rules:
  - name: current_year_general_tax_lien_attaches
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Day
    source: Colo. Rev. Stat. § 39-1-107(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-1-107
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_taxable_real_or_personal_property
          and current_time_is_noon_on_assessment_date

  - name: unpaid_property_tax_lien_is_perpetual
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Day
    source: Colo. Rev. Stat. § 39-1-107(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-1-107
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_real_or_personal_property
          and property_taxes_and_associated_charges_are_unpaid_in_full

  - name: unpaid_property_tax_lien_has_priority_over_other_liens
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Day
    source: Colo. Rev. Stat. § 39-1-107(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: ordering
            source:
              corpus_citation_path: us-co/statute/39/39-1-107
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_real_or_personal_property
          and property_taxes_and_associated_charges_are_unpaid_in_full

  - name: possessory_interest_property_tax_follows_owner_property_tax_assessment_and_collection
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Day
    source: Colo. Rev. Stat. § 39-1-107(4)
    metadata:
      proof:
        atoms:
