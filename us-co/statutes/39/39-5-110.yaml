format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-5-110
  summary: |-
    Taxable personal property brought from outside the state into a county after
    the assessment date shall be listed on the personal property schedule. An
    owner is not relieved of the year's tax obligation when taxable personal
    property is removed from the state before the next assessment date. Oil and
    gas drilling rigs shall be valued pursuant to section 39-5-113.3.
  deferred_outputs:
    - output: us-co:statutes/39/39-5-110#oil_and_gas_drilling_rig_valuation
      reason: Section 39-5-113.3 supplies the required valuation mechanics but is not available in copied RuleSpec context.
rules:
  - name: taxable_property_must_be_listed_on_personal_property_schedule
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. 39-5-110(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-5-110
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          property_is_taxable_personal_property
          and property_brought_from_outside_state_into_county_after_assessment_date
  - name: property_tax_obligation_remains_after_removal
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. 39-5-110(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-5-110
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          property_is_taxable_personal_property
          and (
            property_located_in_state_on_assessment_date
            or property_brought_into_state_after_assessment_date
          )
          and property_removed_from_state_before_next_assessment_date
