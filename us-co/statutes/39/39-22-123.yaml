format: rulespec/v1
module:
  status: deferred
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-123
  summary: A resident or part-year resident individual claiming a federal earned income
    tax credit may receive a Colorado credit equal to ten percent of the federal credit,
    subject to excess-revenue certification, the subsection (4) threshold, and the
    prohibition on a credit for a year covered by section 39-22-123.5.
  deferred_outputs:
  - output: us-co:statutes/39/39-22-123#earned_income_tax_credit
    reason: The final credit depends on controller certification under section 24-77-106.5,
      the constitutional excess-revenue limitation, subsection (4)'s approved adjusted
      threshold, and the section 39-22-123.5 coordination rule; the required executable
      upstream outputs are not available.
  - output: us-co:statutes/39/39-22-123/c#adjusted_excess_revenue_threshold
    reason: The annual adjustment and approval process depends on external Colorado
      personal-income estimates and executive-committee actions not represented by
      available RuleSpec dependencies.
  - output: us-co:statutes/39/39-22-123#refundable_earned_income_tax_credit_excess
    reason: Refundability depends on the uncomputed credit allowed under subsection
      (1).
  - output: us-co:statutes/39/39-22-123#earned_income_tax_credit_excluded_from_public_benefit_income_or_resources
    reason: The exclusion applies to a credit allowed under subsection (1), whose
      executable determination is deferred.
