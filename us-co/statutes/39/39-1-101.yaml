format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-1-101
  summary: |-
    When consideration of the three approaches to value fails to derive actual value, taxable property actual value shall be determined by comparison of surface use to similar surface-use property. Actual value of nonproducing oil, gas, and oil and gas mineral interests shall be determined by capitalizing annual net rental income at an appropriate market rate.
