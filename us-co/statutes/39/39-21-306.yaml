  summary: |-
    "Annually, the state auditor shall study and evaluate impacts" of using federal taxable income as the basis for Colorado taxable income; findings must be reported and delivered by June 30, 2025, and June 30 of each year thereafter. Work papers remain confidential unless specifically approved for disclosure by a majority of the legislative audit committee.
