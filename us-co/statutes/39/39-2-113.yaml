format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-2-113
  summary: |-
    The administrator is authorized to appear as a party in interest where an abatement or refund of property taxes is sought, or a question bearing on statewide assessment policy is raised.
rules:
  - name: administrator_may_appear_as_party_in_interest
    kind: derived
    entity: Administrator
    dtype: Judgment
    period: Year
    source: C.R.S. 39-2-113(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-2-113
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          property_tax_abatement_or_refund_is_sought
          or proceeding_raises_question_bearing_on_statewide_assessment_policy
