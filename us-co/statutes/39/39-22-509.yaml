format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-509
  summary: |-
    “Employer means an entity ... that employs three or more persons in this state.”
    For qualifying income tax years, the credit equals fifty percent of eligible spending, subject to employer and employee spending limits.
  deferred_outputs:
    - output: us-co:statutes/39/39-22-509/a#alternative_transportation_options
      reason: The definition includes prearranged rides defined in missing section 40-10.1-602 and cannot be fully computed from this source slice.
    - output: us-co:statutes/39/39-22-509/b#bikesharing_arrangement
      reason: The definition depends on bicycle, electrical-assisted bicycle, and electric-scooter definitions in missing section 42-1-102.
    - output: us-co:statutes/39/39-22-509/d#local_government
      reason: The source supplies a governmental classification definition but no supported structural entity or membership relation for local-government classifications.
    - output: us-co:statutes/39/39-22-509/e#ridesharing_arrangement
      reason: The source defines a transportation arrangement, but the available schema has no supported entity or relation for the arrangement and its passenger-trip characteristics.
    - output: us-co:statutes/39/39-22-509/3(a)#alternative_transportation_credit
      reason: Computing the credit requires allocating qualifying expenditures by employee and aggregating each employee-capped amount to the employer; no employee-to-employer expenditure relation is supplied.
      source_values:
        - us-co:statutes/39/39-22-509#alternative_transportation_credit_rate
        - us-co:statutes/39/39-22-509#maximum_creditable_employer_spending
        - us-co:statutes/39/39-22-509#maximum_creditable_employee_spending
    - output: us-co:statutes/39/39-22-509/3(b)#local_government_or_nonprofit_credit_return_requirement
      reason: The post-2023 filing requirement depends on missing section 39-22-601(7)(b), and the remaining filing requirement is administrative rather than a computable output.
    - output: us-co:statutes/39/39-22-509/3(c)#alternative_transportation_notification_plan_requirement
      reason: This is an administrative submission requirement with no computable compliance record or plan ontology in the supported schema.
    - output: us-co:statutes/39/39-22-509/3(d)#creditable_alternative_transportation_availability
      reason: This is an employer-wide furnishing requirement whose substantially-equivalent-option exception cannot be evaluated without employee and option relations.
    - output: us-co:statutes/39/39-22-509/4#excess_credit_refund
      reason: The refundable amount depends on the deferred credit calculation.
rules:
  - name: minimum_in_state_employee_count
    kind: parameter
    dtype: Count
    source: 39-22-509(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-509
              excerpt: "employs three or more persons in this state"
    versions:
      - effective_from: '2021-01-01'
        formula: |-
          3

  - name: statutory_employer
    kind: derived
    entity: Employer
    dtype: Judgment
    period: Year
    source: 39-22-509(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-22-509
              excerpt: "Employer means an entity ... that employs three or more persons in this state."
          - path: versions[0].formula
            kind: parameter
            import:
              target: us-co:statutes/39/39-22-509#minimum_in_state_employee_count
              output: minimum_in_state_employee_count
              hash: sha256:local
    versions:
      - effective_from: '2021-01-01'
        formula: |-
          number_of_persons_employed_in_colorado >= minimum_in_state_employee_count

  - name: alternative_transportation_credit_rate
    kind: parameter
    dtype: Rate
    source: 39-22-509(3)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-509
              excerpt: "an amount equal to fifty percent"
    versions:
      - effective_from: '2023-01-01'
        formula: |-
          0.50

  - name: maximum_creditable_employer_spending
    kind: parameter
    dtype: Money
    unit: USD
    source: 39-22-509(3)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-509
              excerpt: "maximum amount spent ... is two hundred fifty thousand dollars"
    versions:
      - effective_from: '2023-01-01'
        formula: |-
          250000

  - name: maximum_creditable_employee_spending
    kind: parameter
    dtype: Money
    unit: USD
    source: 39-22-509(3)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-509
              excerpt: "maximum amount spent ... for any one employee ... is two thousand dollars"
    versions:
      - effective_from: '2023-01-01'
        formula: |-
          2000
