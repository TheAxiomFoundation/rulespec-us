    us-co:statutes/39/39-22-5504#input.qualified_basis_at_end_of_taxable_year: 800
    us-co:statutes/39/39-22-5504#input.qualified_basis_at_end_of_prior_taxable_year: 1000
    ? us-co:statutes/39/39-22-5504#input.qualified_development_ceased_being_in_specified_transit_or_neighborhood_center_after_initial_award
    : false
    ? us-co:statutes/39/39-22-5504#input.credit_that_would_be_allowable_for_entire_compliance_period_with_respect_to_reduced_qualified_basis
    : 1500
  output:
    us-co:statutes/39/39-22-5504#credit_recapture_required: holds
    us-co:statutes/39/39-22-5504#recapture_return_disclosure_required: holds
