format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-26-715
  summary: |-
    “On and after June 10, 2016, the storage, use, or consumption of electricity, coal, wood, gas, fuel oil, or coke sold for residential use” is exempt from taxation.
rules:
  - name: residential_utility_use_exempt_from_use_tax
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: 39-26-715(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-26-715
              excerpt: "the storage, use, or consumption of electricity, coal, wood, gas, fuel oil, or coke sold for residential use"
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-26-715
              excerpt: "Residential use is presumed when a utility company charges a residential utility rate."
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-26-715
              excerpt: "Residential use means the use ... for domestic purposes"
    versions:
      - effective_from: '2016-06-10'
        formula: |-
          commodity_is_electricity_coal_wood_gas_fuel_oil_or_coke
          and (
            utility_company_charges_residential_utility_rate
            or commodity_is_used_for_domestic_purposes_in_a_residence
          )
