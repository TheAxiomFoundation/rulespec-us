format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-7-110
  summary: |-
    “Well or unit operator” means the operator of each wellsite or, if there is no operator, the owner who filed the statement with the assessor pursuant to section 39-7-101. Partial interests of oil and gas fractional interest owners are not subject to separate valuation and shall be represented by the well or unit operator.
rules:
  - name: well_or_unit_operator
    kind: derived
    entity: Wellsite
    dtype: Judgment
    period: Year
    source: C.R.S. 39-7-110(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-7-110
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          wellsite_has_operator
          or (
            not wellsite_has_operator
            and owner_filed_statement_with_assessor
          )
  - name: partial_oil_and_gas_fractional_interest_not_separately_valued
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. 39-7-110(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-7-110
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_partial_oil_and_gas_fractional_interest
  - name: partial_oil_and_gas_fractional_interest_represented_by_well_or_unit_operator
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. 39-7-110(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-7-110
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_partial_oil_and_gas_fractional_interest
  - name: well_or_unit_operator_is_sole_procedure_contact
    kind: derived
    entity: Wellsite
    dtype: Judgment
    period: Year
    source: C.R.S. 39-7-110(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-7-110
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          wellsite_has_partial_oil_and_gas_fractional_interest
