format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-7-109
  summary: Actual value of severed nonproducing oil or gas mineral interests is determined
    by capitalizing annual net rental income at an appropriate market rate; unleased
    interests use the county or area average per-acre annual rental of leased interests.
rules:
- name: annual_rental_income_for_actual_value
  kind: derived
  entity: Asset
  dtype: Money
  period: Year
  unit: USD
  source: "C.R.S. \xA7 39-7-109(1)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-7-109
          excerpt: "If such severed mineral interests are unleased, the assessor shall use the average per acre annual rental of all such mineral interests under lease in the county or in the area to determine the actual value thereof."
  versions:
  - effective_from: '0001-01-01'
    formula: 'if mineral_interest_is_unleased: average_per_acre_annual_rental_in_county_or_area
      * mineral_interest_acreage else: annual_net_rental_income'
- name: severed_nonproducing_mineral_interest_actual_value
  kind: derived
  entity: Asset
  dtype: Money
  period: Year
  unit: USD
  source: "C.R.S. \xA7 39-7-109(1)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-7-109
          excerpt: "determined by the income approach capitalizing the annual net rental income for such nonproducing mineral interests at an appropriate market rate."
  versions:
  - effective_from: '0001-01-01'
    formula: annual_rental_income_for_actual_value / appropriate_market_rate
