format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-11-120
  summary: |-
    Before July 1, 2024, after expiration of three years from a tax-lien sale, the treasurer shall make and deliver a deed upon demand by an eligible certificate holder, presentation of the certificate or authenticated board order, and proof of compliance with section 39-11-128.
rules:
  - name: tax_lien_deed_waiting_period_years
    kind: parameter
    dtype: Count
    period: Year
    source: C.R.S. 39-11-120(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-11-120
              excerpt: "expiration of the term of three years from the date of the sale"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          3
  - name: tax_lien_deed_issuance_required
    kind: derived
    entity: TaxLienCertificate
    dtype: Judgment
    period: Year
    source: C.R.S. 39-11-120(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-11-120
              excerpt: "Before July 1, 2024, any time after the expiration of the term of three years from the date of the sale of any tax lien on any land, or interest therein or improvements thereon, for delinquent taxes, on demand of the purchaser or lawful holder of the certificate of such tax lien, other than the county wherein such property is situated, and on presentation of such certificate of purchase or properly authenticated order of the board of county commissioners, where the certificate has been lost or wrongfully withheld from the owner, and upon proof of compliance with section 39-11-128, the treasurer shall make out a deed"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-11-120
              excerpt: "expiration of the term of three years"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          tax_lien_deed_provision_is_in_effect
          and years_since_tax_lien_sale >= tax_lien_deed_waiting_period_years
          and tax_lien_remains_unredeemed
          and purchaser_or_lawful_holder_demands_deed
          and certificate_holder_is_not_property_county
          and certificate_or_authenticated_board_order_presented
          and proof_of_compliance_with_section_39_11_128_presented
