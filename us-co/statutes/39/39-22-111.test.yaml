- name: state_taxable_year_and_accounting_method_match_federal
  period:
    period_kind: tax_year
    start: '2024-01-01'
    end: '2024-12-31'
  input:
    us-co:statutes/39/39-22-111#input.state_taxable_year: calendar_year
    us-co:statutes/39/39-22-111#input.federal_taxable_year: calendar_year
    us-co:statutes/39/39-22-111#input.state_accounting_method: cash
    us-co:statutes/39/39-22-111#input.federal_accounting_method: cash
  output:
    us-co:statutes/39/39-22-111#taxable_year_conforms_to_federal_taxable_year: holds
    us-co:statutes/39/39-22-111#accounting_method_conforms_to_federal_accounting_method: holds
- name: state_taxable_year_and_accounting_method_do_not_match_federal
  period:
    period_kind: tax_year
    start: '2024-01-01'
    end: '2024-12-31'
  input:
    us-co:statutes/39/39-22-111#input.state_taxable_year: fiscal_year
    us-co:statutes/39/39-22-111#input.federal_taxable_year: calendar_year
    us-co:statutes/39/39-22-111#input.state_accounting_method: accrual
    us-co:statutes/39/39-22-111#input.federal_accounting_method: cash
  output:
    us-co:statutes/39/39-22-111#taxable_year_conforms_to_federal_taxable_year: not_holds
    us-co:statutes/39/39-22-111#accounting_method_conforms_to_federal_accounting_method: not_holds
