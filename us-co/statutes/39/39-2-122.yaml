format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-2-122
  summary: |-
    No injunction suspending or staying a property tax administrator order shall issue except upon ten days' notice of the application and a hearing.
rules:
  - name: property_tax_administrator_injunction_notice_days
    kind: parameter
    dtype: Count
    source: C.R.S. 39-2-122
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-2-122
              excerpt: "except upon ten days' notice"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10
  - name: injunction_suspending_or_staying_property_tax_administrator_order_may_issue
    kind: derived
    entity: InjunctionApplication
    dtype: Judgment
    period: Day
    source: C.R.S. 39-2-122
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-2-122
              excerpt: "upon ten days' notice to the property tax administrator of the application for such injunction and a hearing thereon"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-2-122
              excerpt: "except upon ten days' notice"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          days_notice_given_to_property_tax_administrator >= property_tax_administrator_injunction_notice_days
          and hearing_on_injunction_application_held
