format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-28-112
  summary: |-
    "Each municipality in the state is authorized to levy, collect, enforce, and administer a municipal special sales tax" upon sales of cigarettes, tobacco products, or nicotine products. "A special sales tax shall not be levied" until approved by eligible municipal electors.
  deferred_outputs:
    - output: us-co:statutes/39/39-28-112/c#county_special_sales_tax_levy_authorization
      reason: County authorization depends on geographic levy circumstances, municipal voter approval, and potential intergovernmental agreements that require a representable county-municipality relationship.
    - output: us-co:statutes/39/39-28-112/b#retailer_special_sales_tax_retention_authorization
      reason: Retailer retention is discretionary to the imposing county or municipality and requires a retailer-to-imposing-jurisdiction authorization relationship not defined in this source slice.
    - output: us-co:statutes/39/39-28-112/b#special_sales_tax_definition
      reason: The definition depends on the meaning of general sales taxes imposed under sections 29-2-102 and 29-2-103, whose RuleSpec sources are unavailable.
rules:
  - name: municipality_may_levy_special_sales_tax
    kind: derived
    entity: Municipality
    dtype: Judgment
    period: Year
    source: 39-28-112(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-28-112
              excerpt: "A special sales tax shall not be levied pursuant to subsection (4)(a) of this\nsection until the proposal has been referred to and approved by the eligible\nelectors of the municipality in accordance with article 10 of title 31."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          municipal_special_sales_tax_proposal_approved_by_eligible_electors
