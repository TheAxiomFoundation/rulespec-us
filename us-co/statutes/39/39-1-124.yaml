format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-1-124
  summary: |-
    If a county assessor or treasurer has reasonable certainty that a required mailing or notice will not be delivered to a residential real property address, it is not required to be sent there, except notices required pursuant to sections 39-11-128 and 39-10-111.5 (6)(b).
rules:
  - name: residential_address_mailing_not_required
    kind: derived
    entity: CountyAssessorOrTreasurer
    dtype: Judgment
    period: Year
    source: C.R.S. 39-1-124
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-1-124
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          mailing_or_notice_is_required_pursuant_to_title_39
          and county_assessor_or_treasurer_has_reasonable_certainty_of_postal_nondelivery_to_residential_real_property_address
          and not notice_is_required_pursuant_to_section_39_11_128
          and not notice_is_required_pursuant_to_section_39_10_111_5_6_b
