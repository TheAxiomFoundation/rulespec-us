format: rulespec/v1
module:
  status: deferred
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-522.5
  summary: |-
    “Upon receipt of the notice of appeal by the court, the executive director
    shall be deemed to be a party to such appeal”; district courts have
    jurisdiction over the appeals; the executive director may admit affected
    persons to the administrative process and may request missing return or
    appraisal documents, with failure to provide them within sixty days
    constituting grounds for a final determination denying the credit.
  deferred_outputs:
    - output: us-co:statutes/39/39-22-522.5/e#district_court_appeal_docketing_and_service_requirements
      reason: >-
        Subsection (2)(e) prescribes party status, civil-action docketing,
        issuance and service of summons, and required contents of an agency
        answer. These court-procedure obligations cannot be represented
        faithfully as a scalar or entity-scoped RuleSpec computation.
    - output: us-co:statutes/39/39-22-522.5/h#district_court_appeal_jurisdiction_and_case_management_authority
      reason: >-
        Subsection (2)(h) confers judicial jurisdiction and discretionary
        authority over consolidation, settlement, intervention, and private
        claims. The supported schema does not represent court jurisdiction or
        discretionary civil-case management.
    - output: us-co:statutes/39/39-22-522.5/q#district_court_appeal_expeditious_administration_intent
      reason: >-
        Subsection (2)(q) is a legislative intent clause concerning expedition,
        efficiency, and fairness rather than an executable legal computation.
    - output: us-co:statutes/39/39-22-522.5/d#affected_person_administrative_participation
      reason: >-
        Subsection (5)(d) establishes a discretionary administrative
        intervention process requiring a written request and an agency decision
        about limited-purpose admission. Its party-admission procedure and
        discretionary scope cannot be represented faithfully by the supported
        scalar rule schema.
    - output: us-co:statutes/39/39-22-522.5/e#missing_required_document_final_determination
      reason: >-
        Subsection (5)(e) authorizes document requests and makes failure to
        provide requested documents within sixty days grounds for a final
        determination denying the credit. Encoding the consequence requires
        procedural-request, document, donation-date, and discretionary
        final-determination entities not supported by the available ontology.
rules: []
