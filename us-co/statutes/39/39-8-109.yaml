format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-8-109
  summary: |-
    "the treasurer shall be entitled to reimbursement for the refund of taxes and interest pro rata by all jurisdictions receiving payment thereof"; this subsection "shall not apply to a city and county."
rules:
  - name: treasurer_reimbursement_entitlement_applies
    kind: derived
    entity: Treasurer
    dtype: Judgment
    period: Year
    source: C.R.S. 39-8-109(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-8-109
              excerpt: "the treasurer refunds taxes and interest to the appellant\nbased on a modification of the valuation"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-8-109
              excerpt: "shall not apply to a city and county"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          treasurer_refunded_taxes_and_interest_based_on_modified_property_valuation
          and
          not jurisdiction_is_city_and_county
