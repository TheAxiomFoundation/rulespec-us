format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-11-142
  summary: |-
    “Before July 1, 2024,” the county may seek a tax deed after holding a struck-off certificate for three years; may consolidate requests for nonmunicipal property after five years; and shall seek a deed after eight years for property not used for a public benefit. Certificates held for thirty years without a deed may be declared void. An action concerning that declaration must begin within one year.
rules:
  - name: county_tax_deed_application_certificate_hold_period_years
    kind: parameter
    dtype: Count
    source: C.R.S. 39-11-142(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-11-142
              excerpt: "the county has held the certificate of sale for three years or more"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          3

  - name: consolidated_tax_deed_request_certificate_hold_period_years
    kind: parameter
    dtype: Count
    source: C.R.S. 39-11-142(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-11-142
              excerpt: "the county has held the tax certificate for five years or more"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          5

  - name: mandatory_tax_deed_application_certificate_hold_period_years
    kind: parameter
    dtype: Count
    source: C.R.S. 39-11-142(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-11-142
              excerpt: "the county has held the tax certificate for eight years"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          8

  - name: replacement_tax_deed_notice_certificate_hold_period_years
    kind: parameter
    dtype: Count
    source: C.R.S. 39-11-142(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-11-142
              excerpt: "tax certificates held by the counties for five years or more"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          5

  - name: replacement_tax_deed_notice_lead_time_days
    kind: parameter
    dtype: Count
    source: C.R.S. 39-11-142(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-11-142
              excerpt: "at least sixty days before the day said tax deed issues"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          60

  - name: void_certificate_hold_period_years
    kind: parameter
    dtype: Count
    source: C.R.S. 39-11-142(6)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-11-142
              excerpt: "the county has held the certificate of sale for thirty years or more"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: void_certificate_action_limit_years
    kind: parameter
    dtype: Count
    source: C.R.S. 39-11-142(6)(e)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-11-142
              excerpt: "within one year after the date of the board's order"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1

  - name: annual_tax_lien_list_certificate_hold_period_years
    kind: parameter
    dtype: Count
    source: C.R.S. 39-11-142(7)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-11-142
              excerpt: "certificates have been held by the county for three years or more"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          3

  - name: annual_tax_lien_list_interval_years
    kind: parameter
    dtype: Count
    source: C.R.S. 39-11-142(7)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-11-142
              excerpt: "at least once each year"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1

  - name: county_may_apply_for_tax_deed_after_three_years
    kind: derived
    entity: CountyTaxSaleCertificate
    dtype: Judgment
    period: Day
    source: C.R.S. 39-11-142(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: effective_period
            source:
              corpus_citation_path: us-co/statute/39/39-11-142
              excerpt: "Before July 1, 2024"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-11-142
              excerpt: "a tax lien on real estate has been struck off to the county at tax sales"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-11-142
              excerpt: "the board of county commissioners may apply for and receive a tax deed"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          tax_deed_application_is_before_statutory_transition_date
          and tax_lien_was_struck_off_to_county
          and county_held_certificate_years >= county_tax_deed_application_certificate_hold_period_years

  - name: county_may_consolidate_nonmunicipal_tax_deed_request_after_five_years
    kind: derived
    entity: CountyTaxSaleCertificate
    dtype: Judgment
    period: Day
    source: C.R.S. 39-11-142(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: effective_period
            source:
              corpus_citation_path: us-co/statute/39/39-11-142
              excerpt: "Before July 1, 2024"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-11-142
              excerpt: "such real estate is not located within the limits of any incorporated town or city"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-11-142
              excerpt: "the county may include in one request or demand any or all separate parcels"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          tax_deed_application_is_before_statutory_transition_date
          and real_estate_is_outside_incorporated_town_or_city
          and county_held_certificate_years >= consolidated_tax_deed_request_certificate_hold_period_years

  - name: board_must_apply_for_publicly_unused_real_estate_tax_deed_after_eight_years
    kind: derived
    entity: CountyTaxSaleCertificate
    dtype: Judgment
    period: Day
    source: C.R.S. 39-11-142(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: effective_period
            source:
              corpus_citation_path: us-co/statute/39/39-11-142
              excerpt: "Before July 1, 2024"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-11-142
              excerpt: "such real estate is not used, operated, or maintained wholly or in part in the interest or for the benefit of the public"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-11-142
              excerpt: "said board shall apply for and receive a tax deed therefor"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          tax_deed_application_is_before_statutory_transition_date
          and real_estate_is_not_used_for_public_interest_or_benefit
          and county_held_certificate_years >= mandatory_tax_deed_application_certificate_hold_period_years

  - name: certificate_eligible_for_void_declaration_after_thirty_years
    kind: derived
    entity: CountyTaxSaleCertificate
    dtype: Judgment
    period: Day
    source: C.R.S. 39-11-142(6)(a), (c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: effective_period
            source:
              corpus_citation_path: us-co/statute/39/39-11-142
              excerpt: "Before July 1, 2024"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-11-142
              excerpt: "without obtaining a tax deed"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-11-142
              excerpt: "such certificate may be declared void and of no effect"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          tax_deed_application_is_before_statutory_transition_date
          and tax_lien_was_struck_off_to_county
          and county_held_certificate_years >= void_certificate_hold_period_years
          and tax_deed_has_not_been_obtained_or_applied_for

  - name: action_concerning_void_certificate_declaration_is_timely
    kind: derived
    entity: CountyTaxSaleCertificate
    dtype: Judgment
    period: Day
    source: C.R.S. 39-11-142(6)(e)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-11-142
              excerpt: "Any action concerning a determination and declaration by a board of county commissioners"
          - path: versions[0].formula
            kind: ordering
            source:
              corpus_citation_path: us-co/statute/39/39-11-142
              excerpt: "shall be commenced within one year after the date of the board's order"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          years_since_board_void_certificate_order <= void_certificate_action_limit_years
