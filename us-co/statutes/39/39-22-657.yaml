format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-657
  summary: |-
    “For each reportable or listed transaction, a material advisor shall maintain a list” and “retain the information ... for seven years from the date that the information is included.”
  deferred_outputs:
    - output: us-co:statutes/39/39-22-657#required_list_information_under_26_cfr_301_6112_1
      reason: The required information incorporates 26 CFR 301.6112-1, which is not provided as RuleSpec context.
rules:
  - name: required_list_information_retention_years
    kind: parameter
    dtype: Count
    period: Year
    source: C.R.S. 39-22-657(4)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-657
              excerpt: "for seven\nyears from the date that the information is included"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          7

  - name: material_advisor_must_maintain_transaction_list
    kind: derived
    entity: MaterialAdvisor
    dtype: Judgment
    period: Year
    source: C.R.S. 39-22-657(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-22-657
              excerpt: "For each reportable or listed transaction"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-22-657
              excerpt: "provides material aid, assistance, or advice"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          transaction_is_reportable_or_listed
          and material_advisor_provides_material_aid_assistance_or_advice_for_transaction

  - name: material_advisor_complies_with_list_information_retention
    kind: derived
    entity: MaterialAdvisor
    dtype: Judgment
    period: Year
    source: C.R.S. 39-22-657(4)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-657
              excerpt: "Retain the information that is required to be included on the list for seven\nyears"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-657
              excerpt: "for seven\nyears"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          years_required_list_information_is_retained >= required_list_information_retention_years

  - name: person_must_be_in_material_advisor_list
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: C.R.S. 39-22-657(2)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-22-657
              excerpt: "The name of each person described in subsection (1)"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-22-657
              excerpt: "doing business in this state, a member of a Colorado combined group, or a member\nof an affiliated group"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          material_advisor_provides_material_aid_assistance_or_advice_to_person_for_reportable_or_listed_transaction
          and (
            person_does_business_in_colorado
            or person_is_member_of_colorado_combined_group
            or person_is_member_of_affiliated_group_including_colorado_taxpayer
          )
