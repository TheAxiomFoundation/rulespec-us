format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-27-305
  summary: |-
    A licensee purchasing more tax-paid and fee-paid motor fuel in this state than used during a reporting period is permitted a credit against future tax and fee liability for the excess fuel; upon request, the department may refund the credit in accordance with the agreement.
rules:
  - name: credit_against_future_tax_and_fee_liability
    kind: derived
    entity: Licensee
    dtype: Money
    period: Month
    unit: USD
    source: C.R.S. 39-27-305
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-27-305
              excerpt: "shall be permitted a credit against future tax and fee liability for the excess tax-paid and fee-paid fuel purchased"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if licensee_purchases_more_tax_paid_and_fee_paid_fuel_than_used_in_reporting_period: tax_and_fee_paid_amount_on_excess_fuel_purchased else: 0
  - name: credit_refund_is_permitted
    kind: derived
    entity: Licensee
    dtype: Judgment
    period: Month
    source: C.R.S. 39-27-305
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-27-305
              excerpt: "Upon request, this credit may be refunded to the licensee by the department in accordance with the agreement."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          licensee_purchases_more_tax_paid_and_fee_paid_fuel_than_used_in_reporting_period
          and licensee_requests_credit_refund
          and refund_is_in_accordance_with_agreement
