format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-516.7
  summary: |-
    “Category 1 means an electric motor vehicle and a plug-in hybrid electric motor vehicle.” A qualifying electric motor vehicle or plug-in hybrid must not exceed 8,500 pounds GVWR, must be capable of at least 55 miles per hour, and must meet the specified electric-battery or hydrogen-fuel-cell propulsion condition.
  deferred_outputs:
    - output: us-co:statutes/39/39-22-516.7/a#actual_cost_incurred
      reason: Actual-cost calculations for purchases and leases require transaction-specific payment, fee, credit, grant, rebate, and vehicle-value allocation inputs not defined as a computable output in this source slice.
    - output: us-co:statutes/39/39-22-516.7/c#battery_capacity
      reason: Battery capacity is defined as a measurement from full to zero charge; this source does not establish a computable measurement method or runtime battery data relation.
    - output: us-co:statutes/39/39-22-516.7/e#category_1_a_conversion
      reason: Category 1 A depends on conversion facts and the upstream electric-motor-vehicle definition; no conversion entity relation is supplied.
    - output: us-co:statutes/39/39-22-516.7/f#repealed_definitions_and_department_definition
      reason: This segment contains repealed text and an administrative department definition, not a computable legal output.
    - output: us-co:statutes/39/39-22-516.7/m#hybrid_motor_vehicle
      reason: The definition depends on alternative-fuel terminology incorporated from unavailable section 24-30-1104.
    - output: us-co:statutes/39/39-22-516.7/o#light_duty_passenger_motor_vehicle
      reason: The definition depends in part on the unavailable statutory definition of motor home in section 42-1-102.
    - output: us-co:statutes/39/39-22-516.7/p#light_duty_truck
      reason: The segment includes GVWR and manufacturer's-suggested-retail-price terms incorporated from unavailable upstream definitions.
    - output: us-co:statutes/39/39-22-516.7/q#medium_duty_truck
      reason: Medium-duty-truck classification requires a vehicle-type and GVWR data model beyond this source slice.
    - output: us-co:statutes/39/39-22-516.7/r#motor_vehicle
      reason: Motor-vehicle status depends on titling, registration, licensing, newness, and conversion facts across tax-year periods not modeled in this focused vehicle qualification output.
    - output: us-co:statutes/39/39-22-516.7/c#repealed_provisions_and_hybrid_conversion_credit
      reason: This checklist segment combines repealed text with the category 1 A conversion credit, which depends on conversion actual cost and historical tax-year branches not represented here.
rules:
  - name: maximum_category_1_gross_vehicle_weight_rating
    kind: parameter
    dtype: Integer
    source: 39-22-516.7(k)(I)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-516.7
              excerpt: "does not exceed eight thousand\nfive hundred pounds"
    versions:
      - effective_from: '2013-01-01'
        formula: |-
          8500
  - name: minimum_category_1_maximum_speed
    kind: parameter
    dtype: Integer
    source: 39-22-516.7(k)(II)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-516.7
              excerpt: "at least fifty-five miles per hour"
    versions:
      - effective_from: '2013-01-01'
        formula: |-
          55
  - name: minimum_category_1_battery_capacity
    kind: parameter
    dtype: Decimal
    source: 39-22-516.7(k)(III)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-516.7
              excerpt: "capacity of not less than four kilowatt hours"
    versions:
      - effective_from: '2013-01-01'
        formula: |-
          4
  - name: category_1_vehicle_qualifies
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: 39-22-516.7(d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-22-516.7
              excerpt: "Category 1 means an electric motor vehicle and a plug-in hybrid electric\nmotor vehicle."
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-22-516.7
              excerpt: "Has a gross vehicle weight rating that does not exceed eight thousand\nfive hundred pounds"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-22-516.7
              excerpt: "Has a maximum speed capability of at least fifty-five miles per hour"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-22-516.7
              excerpt: "propelled to a significant extent by"
    versions:
      - effective_from: '2013-01-01'
        formula: |-
          gross_vehicle_weight_rating <= maximum_category_1_gross_vehicle_weight_rating
          and maximum_speed_capability >= minimum_category_1_maximum_speed
          and (
            (
              vehicle_has_external_rechargeable_electric_motor
              and battery_capacity >= minimum_category_1_battery_capacity
            )
            or vehicle_has_onboard_hydrogen_fuel_cell_propulsion
          )
