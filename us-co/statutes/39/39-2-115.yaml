    corpus_citation_path: us-co/statute/39/39-2-115
  summary: |-
    “No later than August 25 of each year, each county assessor shall file with the property tax administrator two copies of an abstract of assessment of the county.” The administrator examines abstracts, may file a valuation-adjustment complaint with the state board, and shall transmit abstracts and recommendations by October 15.
