format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-1-115
  summary: |-
    Assessment rolls, tax warrants, specified treasurer records, and certified copies thereof “shall be prima facie evidence of all things appearing therein.”
rules:
  - name: tax_record_or_certified_copy_is_prima_facie_evidence
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-1-115
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-1-115
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_assessment_roll
          or asset_is_tax_warrant
          or asset_is_entry_made_in_treasurer_books
          or asset_is_list_of_lands_sold_for_taxes_recorded_by_treasurer_or_county_clerk_and_recorder
          or asset_is_certified_copy_of_such_record
