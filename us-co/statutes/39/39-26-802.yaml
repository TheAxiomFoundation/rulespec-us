format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-26-802
  summary: |-
    “Local lodging tax” includes a tax imposed by a local marketing district or county under the cited provisions, and any other tax or fee imposed on furnishing rooms or accommodations for consideration that is not such a specified tax.
rules:
  - name: other_lodging_tax_qualifies
    kind: derived
    entity: LocalTax
    dtype: Judgment
    period: Year
    source: C.R.S. 39-26-802(1)(a.5)(II)(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-26-802
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          tax_or_fee_is_imposed_on_transaction_furnishing_rooms_or_accommodations_for_consideration
          and not tax_is_imposed_by_local_marketing_district_pursuant_to_section_29_25_112_1_a
          and not tax_is_imposed_by_county_pursuant_to_section_30_11_107_5

  - name: local_lodging_tax
    kind: derived
    entity: LocalTax
    dtype: Judgment
    period: Year
    source: C.R.S. 39-26-802(1)(a.5)(II)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-26-802
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-26-802
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          tax_is_imposed_by_local_marketing_district_pursuant_to_section_29_25_112_1_a
          or tax_is_imposed_by_county_pursuant_to_section_30_11_107_5
          or other_lodging_tax_qualifies
