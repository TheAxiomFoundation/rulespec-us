format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-13-106
  summary: |-
    “It is unlawful” to fail or refuse required documentary-fee payment or to willfully and knowingly recite consideration greater or less than actual consideration in a covered real-property conveyance. Either act is an unclassified misdemeanor punishable upon conviction by a fine of not less than fifty dollars nor more than five hundred dollars.
rules:
  - name: failure_or_refusal_to_pay_required_documentary_fee_is_unlawful
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: C.R.S. 39-13-106(1)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-13-106
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          documentary_fee_payment_is_required
          and person_fails_or_refuses_to_pay_documentary_fee

  - name: false_consideration_recital_for_covered_real_property_conveyance_is_unlawful
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: C.R.S. 39-13-106(1)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-13-106
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_willfully_and_knowingly_recites_consideration_to_county_clerk_and_recorder
          and recited_consideration_differs_from_actual_consideration
          and recital_is_connected_to_grant_or_conveyance_of_real_property_title
          and documentary_fee_applies_to_instrument

  - name: documentary_fee_offense_is_unclassified_misdemeanor
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: C.R.S. 39-13-106(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-13-106
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          failure_or_refusal_to_pay_required_documentary_fee_is_unlawful
          or false_consideration_recital_for_covered_real_property_conveyance_is_unlawful

  - name: documentary_fee_offense_minimum_fine
    kind: parameter
    dtype: Money
    unit: USD
    source: C.R.S. 39-13-106(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-13-106
              excerpt: "not less than fifty dollars"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          50

  - name: documentary_fee_offense_maximum_fine
    kind: parameter
    dtype: Money
    unit: USD
    source: C.R.S. 39-13-106(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-13-106
              excerpt: "nor more than five hundred\ndollars"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          500

  - name: convicted_documentary_fee_offense_minimum_fine
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: USD
    source: C.R.S. 39-13-106(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-13-106
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-13-106
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if person_is_convicted_of_documentary_fee_offense and documentary_fee_offense_is_unclassified_misdemeanor: documentary_fee_offense_minimum_fine else: 0

  - name: convicted_documentary_fee_offense_maximum_fine
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: USD
    source: C.R.S. 39-13-106(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-13-106
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-13-106
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if person_is_convicted_of_documentary_fee_offense and documentary_fee_offense_is_unclassified_misdemeanor: documentary_fee_offense_maximum_fine else: 0
