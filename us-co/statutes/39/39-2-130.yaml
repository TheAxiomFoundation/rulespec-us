format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-2-130
  summary: |-
    The advisory committee comprises five gubernatorial appointees, no more than three from the same political party. Members receive thirty-five dollars per session day, limited to thirty days per calendar year. At least three members constitute a quorum.
rules:
  - name: advisory_committee_required_member_count
    kind: parameter
    dtype: Count
    source: C.R.S. § 39-2-130(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-2-130
              excerpt: "comprised of the following five members"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          5

  - name: advisory_committee_same_party_member_limit
    kind: parameter
    dtype: Count
    source: C.R.S. § 39-2-130(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-2-130
              excerpt: "no more than three of whom shall be affiliated with the same political party"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          3

  - name: county_population_classification_threshold
    kind: parameter
    dtype: Count
    source: C.R.S. § 39-2-130(1)(a)-(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-2-130
              excerpt: "seventy-five thousand or more population"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          75000

  - name: assessor_members_per_county_population_group
    kind: parameter
    dtype: Count
    source: C.R.S. § 39-2-130(1)(a)-(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-2-130
              excerpt: "One assessor and one nonassessor"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1

  - name: nonassessor_members_per_county_population_group
    kind: parameter
    dtype: Count
    source: C.R.S. § 39-2-130(1)(a)-(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-2-130
              excerpt: "One assessor and one nonassessor"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1

  - name: western_slope_nonassessor_member_count
    kind: parameter
    dtype: Count
    source: C.R.S. § 39-2-130(1)(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-2-130
              excerpt: "One nonassessor from the western slope"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1

  - name: advisory_committee_chairman_count
    kind: parameter
    dtype: Count
    source: C.R.S. § 39-2-130(2)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-2-130
              excerpt: "appoint one of the nonassessor members as\nchairman"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1

  - name: initial_short_term_member_count
    kind: parameter
    dtype: Count
    source: C.R.S. § 39-2-130(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-2-130
              excerpt: "two members shall be appointed to the advisory committee for\ntwo-year terms"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          2

  - name: initial_short_term_years
    kind: parameter
    dtype: Count
    source: C.R.S. § 39-2-130(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-2-130
              excerpt: "two-year terms"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          2

  - name: initial_long_term_member_count
    kind: parameter
    dtype: Count
    source: C.R.S. § 39-2-130(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-2-130
              excerpt: "three members for four-year terms"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          3

  - name: initial_long_term_years
    kind: parameter
    dtype: Count
    source: C.R.S. § 39-2-130(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-2-130
              excerpt: "four-year terms"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          4

  - name: subsequent_appointment_term_years
    kind: parameter
    dtype: Count
    source: C.R.S. § 39-2-130(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-2-130
              excerpt: "Thereafter, appointments\nto the advisory committee shall be for terms of four years each"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          4

  - name: advisory_committee_per_diem_rate
    kind: parameter
    dtype: Money
    unit: USD
    period: Day
    source: C.R.S. § 39-2-130(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-2-130
              excerpt: "thirty-five dollars per day"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          35

  - name: annual_compensable_session_day_limit
    kind: parameter
    dtype: Count
    source: C.R.S. § 39-2-130(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-2-130
              excerpt: "not to exceed thirty\ndays in any calendar year"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: advisory_committee_member_annual_per_diem_compensation
    kind: derived
    entity: Person
    dtype: Money
    unit: USD
    period: Year
    source: C.R.S. § 39-2-130(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-2-130
              excerpt: "Per diem compensation, not to exceed thirty\ndays in any calendar year, shall be paid only when the advisory committee is in\nsession."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          advisory_committee_per_diem_rate * min(days_attending_advisory_committee_sessions, annual_compensable_session_day_limit)

  - name: advisory_committee_quorum_member_count
    kind: parameter
    dtype: Count
    source: C.R.S. § 39-2-130(5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-2-130
              excerpt: "A quorum of at least three members"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          3

  - name: advisory_committee_may_conduct_official_business
    kind: derived
    entity: AdvisoryCommittee
    dtype: Judgment
    period: Day
    source: C.R.S. § 39-2-130(5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-2-130
              excerpt: "A quorum of at least three members shall be required to conduct official business."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          members_present >= advisory_committee_quorum_member_count
