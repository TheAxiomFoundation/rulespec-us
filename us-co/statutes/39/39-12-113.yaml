format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-12-113
  summary: |-
    A person with or claiming an interest in or lien upon an undivided or divided
    interest in land or a lot for which a tax lien was sold may redeem that
    interest by paying a proportionate part of the whole redemption amount. If
    the treasurer cannot ascertain the portion amount, it is determined from the
    portion's assessment valuation relative to the whole parcel's original
    assessment valuation.
rules:
  - name: partial_interest_redemption_is_available
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-12-113(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-12-113
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_has_or_claims_interest_or_lien_on_partial_land_interest
          and tax_lien_on_land_or_lot_was_sold_pursuant_to_article_11

  - name: assessor_valuation_method_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-12-113(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-12-113
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          treasurer_cannot_definitely_ascertain_partial_interest_redemption_amount

  - name: proportionate_redemption_amount_using_assessor_valuation
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: C.R.S. § 39-12-113(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-12-113
              excerpt: "bears the same proportion to the amount\nrequired to redeem the entire piece"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if treasurer_cannot_definitely_ascertain_partial_interest_redemption_amount:
            amount_required_to_redeem_entire_land_or_lot
            * valuation_for_assessment_of_partial_interest
            / original_valuation_for_assessment_of_entire_land_or_lot
          else: 0
