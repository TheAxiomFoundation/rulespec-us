format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-606
  summary: "\u201CTax or tax liability\u201D means tax imposed under article 22 minus\
    \ credits against tax. Required annual payment and additions to tax are subject\
    \ to additional statutory rules and exceptions."
  deferred_outputs:
  - output: us-co:statutes/39/39-22-606/2/a#return_for_estimated_tax_purposes
    reason: The referenced return requirements in section 39-22-601 are unavailable
      as executable RuleSpec context.
  - output: us-co:statutes/39/39-22-606/5/b#required_annual_payment
    reason: The preceding-year alternative is modified for large corporations defined
      by missing Internal Revenue Code section 6655.
    source_values:
    - us-co:statutes/39/39-22-606#actual_liability_required_annual_payment_rate
    - us-co:statutes/39/39-22-606#preceding_year_liability_required_annual_payment_rate
  - output: us-co:statutes/39/39-22-606/6/b#addition_to_tax_good_cause_waiver
    reason: The executive director's good-cause determination is discretionary and
      cannot be computed from the source text.
  - output: us-co:statutes/39/39-22-606/7/b#withholding_credit_payment_dates
    reason: Actual withholding dates and amounts require transaction-level payment
      records not represented by this annual Corporation surface.
  - output: us-co:statutes/39/39-22-606/3#addition_to_tax_for_underpayment
    reason: The interest rate under section 39-21-110.5 is not available as executable
      RuleSpec context.
  - output: us-co:statutes/39/39-22-606/a#return
    reason: Generated module encodes the supported rules from this source, but this
      source subparagraph depends on policy surfaces or entities that are not available
      in the current RuleSpec context. It is deferred instead of being modeled as
      a caller-supplied input or an unsupported local entity.
rules:
- name: actual_liability_required_annual_payment_rate
  kind: parameter
  dtype: Rate
  source: 39-22-606(b)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-22-606
          excerpt: "\u201CSeventy percent of the taxpayer's actual Colorado tax liability\u201D"
  versions:
  - effective_from: '0001-01-01'
    formula: '0.70'
- name: preceding_year_liability_required_annual_payment_rate
  kind: parameter
  dtype: Rate
  source: 39-22-606(b)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-22-606
          excerpt: "\u201COne hundred percent of the taxpayer's actual Colorado tax\
            \ liability\u201D"
  versions:
  - effective_from: '0001-01-01'
    formula: '1'
- name: colorado_article_22_tax_liability
  kind: derived
  entity: Corporation
  dtype: Money
  period: Year
  unit: USD
  source: 39-22-606(b)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-22-606
          excerpt: "\u201CThe tax imposed under this article; minus ... The credits\
            \ against tax\u201D"
  versions:
  - effective_from: '0001-01-01'
    formula: tax_imposed_under_article_22 - credits_against_article_22_tax
- name: seventy_percent_of_actual_colorado_tax_liability
  kind: derived
  entity: Corporation
  dtype: Money
  period: Year
  unit: USD
  source: 39-22-606(b)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-22-606
          excerpt: "\u201CSeventy percent of the taxpayer's actual Colorado tax liability\u201D"
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-22-606
  versions:
  - effective_from: '0001-01-01'
    formula: actual_liability_required_annual_payment_rate * colorado_article_22_tax_liability
