format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-26-116
  summary: |-
    Every person engaging or continuing in licensed business in this state must preserve suitable sales records and necessary books or accounts; invoices of goods and merchandise purchased for resale must be preserved for three years and records must be open for examination by the executive director or an authorized agent.
rules:
  - name: resale_invoice_retention_period_years
    kind: parameter
    dtype: Count
    period: Year
    source: C.R.S. 39-26-116
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-26-116
              excerpt: "for a period of three years all invoices"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          3
  - name: recordkeeping_duties_satisfied
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: C.R.S. 39-26-116
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-26-116
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-26-116
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-26-116
              excerpt: "for a period of three years"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not person_engages_or_continues_business_in_state
          or not business_transaction_requires_license_under_part_1
          or (
            preserves_suitable_sales_records_and_necessary_books_or_accounts
            and preserves_all_resale_purchase_invoices
            and years_resale_purchase_invoices_preserved >= resale_invoice_retention_period_years
            and books_invoices_and_other_records_open_for_examination_by_director_or_authorized_agent
          )
