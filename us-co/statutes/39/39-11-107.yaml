format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-11-107
  summary: |-
    Before selling tax liens for unpaid taxes, the county treasurer must examine and compare the delinquent list with office records, omit ascertainable doubly or erroneously assessed lots and lands, and report them; on receipt, the board shall abate the levied taxes by recorded resolution.
rules:
  - name: pre_sale_tax_lien_review_duty_satisfied
    kind: derived
    entity: CountyTreasurer
    dtype: Judgment
    period: Year
    source: C.R.S. 39-11-107
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-11-107
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not treasurer_is_before_sale_of_tax_liens_for_unpaid_taxes
          or (
            treasurer_carefully_examined_and_compared_delinquent_list_with_assessment_roll_and_block_books
            and treasurer_omitted_ascertainable_doubly_or_erroneously_assessed_lots_and_lands
            and treasurer_made_itemized_report_of_double_or_erroneous_assessments
          )
  - name: reported_assessment_tax_abatement_duty_satisfied
    kind: derived
    entity: BoardOfCountyCommissioners
    dtype: Judgment
    period: Year
    source: C.R.S. 39-11-107
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-11-107
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not board_received_itemized_report_of_double_or_erroneous_assessments
          or board_entered_resolution_abating_taxes_levied_on_reported_assessments
