format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-11-144
  summary: |-
    Sales of real estate made by a board of county commissioners are deemed valid and confirmed, whether made at public or private sale by a treasurer's deed or a duly appointed commissioner's deed upon board direction.
rules:
  - name: county_commissioner_real_estate_sale_confirmed_valid
    kind: derived
    entity: RealEstateSale
    dtype: Judgment
    period: Year
    source: C.R.S. 39-11-144
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-11-144
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          sale_made_by_board_of_county_commissioners
          and sale_is_public_or_private
          and (
            deed_issued_by_treasurer_upon_board_direction
            or deed_issued_by_duly_appointed_commissioner_to_convey_upon_board_direction
          )
