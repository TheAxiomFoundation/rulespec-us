format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-11-116
  summary: |-
    If a bidder fails to pay, the treasurer may reoffer, readvertise, pursue civil recovery, or—in an electronic auction—offer the lien to another bidder; the treasurer may prohibit the person from bidding for up to five years.
rules:
  - name: minimum_special_advertisement_weeks
    kind: parameter
    dtype: Count
    source: Colo. Rev. Stat. § 39-11-116
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-11-116
              excerpt: "for not less than one week"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1

  - name: maximum_bidding_prohibition_years
    kind: parameter
    dtype: Count
    source: Colo. Rev. Stat. § 39-11-116
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-11-116
              excerpt: "for up to five years"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          5

  - name: treasurer_may_reoffer_lien_before_auction_closes
    kind: derived
    entity: Treasurer
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-11-116
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-11-116
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          bidder_fails_to_pay_amount_due
          and not public_auction_has_closed

  - name: treasurer_may_specially_readvertise_lien
    kind: derived
    entity: Treasurer
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-11-116
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-11-116
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          bidder_fails_to_pay_amount_due
          and public_auction_has_closed

  - name: treasurer_may_reoffer_lien_after_special_advertisement
    kind: derived
    entity: Treasurer
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-11-116
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-11-116
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-11-116
              excerpt: "for not less than one week"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          bidder_fails_to_pay_amount_due
          and public_auction_has_closed
          and tax_lien_specially_advertised_in_original_manner
          and special_advertisement_duration_weeks >= minimum_special_advertisement_weeks

  - name: treasurer_may_offer_electronic_auction_lien_to_another_bidder
    kind: derived
    entity: Treasurer
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-11-116
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-11-116
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          bidder_fails_to_pay_amount_due
          and auction_is_conducted_by_internet_or_other_electronic_medium
          and another_bidder_is_available

  - name: treasurer_may_recover_unpaid_bid_by_civil_action
    kind: derived
    entity: Treasurer
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-11-116
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-11-116
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          bidder_fails_to_pay_amount_due

  - name: treasurer_may_prohibit_defaulting_bidder_from_bidding
    kind: derived
    entity: Treasurer
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-11-116
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-11-116
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-11-116
              excerpt: "for up to five years"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          bidder_fails_to_pay_amount_due
          and proposed_bidding_prohibition_years <= maximum_bidding_prohibition_years
