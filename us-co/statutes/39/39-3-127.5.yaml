format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-3-127.5
  summary: |-
    “Qualified business entity” means a limited partnership or limited liability company formed to obtain and obtaining federal tax credits, whose general partner or managing member would qualify for the referenced property-tax exemption.
  deferred_outputs:
    - output: us-co:statutes/39/39-3-127.5#property_tax_exemption_applies
      reason: The exemption also must comply with section 39-2-117, whose RuleSpec source is unavailable.
rules:
  - name: qualified_business_entity
    kind: derived
    entity: Business
    dtype: Judgment
    period: Year
    source: 39-3-127.5(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-3-127.5
    versions:
      - effective_from: '2014-01-01'
        formula: |-
          (business_is_limited_partnership or business_is_limited_liability_company)
          and business_was_formed_for_purpose_of_obtaining_federal_tax_credits
          and business_obtains_federal_tax_credits
          and general_partner_or_managing_member_would_qualify_for_property_tax_exemption
