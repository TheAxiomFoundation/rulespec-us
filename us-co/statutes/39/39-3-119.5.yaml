format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-3-119.5
  summary: Personal property on a single schedule is exempt when its actual value
    does not exceed the applicable exemption amount. Beginning in 2023, that amount
    is adjusted biennially for inflation and rounded upward to the nearest one hundred
    dollars. For 2022 and later years, assessors estimate exempt business personal
    property using the applicable baseline exemption total adjusted by the published
    growth factor.
  deferred_outputs:
  - output: us-co:statutes/39/39-3-119.5/b#biennially_adjusted_personal_property_exemption_amount
    reason: The inflation-adjusted exemption requires successive biennial calculations
      using the applicable prior-cycle amount and official CPI observations that are
      not supplied by this source unit.
  - output: us-co:statutes/39/39-3-119.5/b#alternative_exemption_amount_after_reimbursement_failure
    reason: The operative alternative amount depends on a state-treasurer notification
      and successive biennial inflation calculations whose event history and official
      CPI observations are not supplied by this source unit.
  - output: us-co:statutes/39/39-3-119.5/c#local_governmental_entity_exempt_business_personal_property_estimate
    reason: Encoding estimates for every local governmental entity requires a structural
      relation between counties and the local governmental entities located within
      them.
  - output: us-co:statutes/39/39-3-119.5/3#lost_property_tax_revenue
    reason: The source requires lost-revenue calculations based on exempt property
      value but does not state the applicable local property-tax rates or assessment
      mechanics.
  - output: us-co:statutes/39/39-3-119.5#inflation_adjustment_rounding_increment
    reason: Generated rule used a local name that collides with a sibling RuleSpec
      export. This output is deferred until it can be encoded with a semantic branch-specific
      name without creating ambiguous sibling imports.
rules:
- name: scheduled_exemption_amount_through_2022
  kind: parameter
  dtype: Money
  unit: USD
  source: 39-3-119.5(2)(a)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-3-119.5
          excerpt: Two thousand five hundred dollars for property tax years commencing
            prior to January 1, 2009
      - path: versions[1].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-3-119.5
          excerpt: Four thousand dollars for property tax years commencing on January
            1, 2009, and January 1, 2010
      - path: versions[2].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-3-119.5
          excerpt: Five thousand five hundred dollars for property tax years commencing
            on January 1, 2011, and January 1, 2012
      - path: versions[3].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-3-119.5
          excerpt: Seven thousand dollars for property tax years commencing on January
            1, 2013, and January 1, 2014
      - path: versions[4].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-3-119.5
          excerpt: Seven thousand three hundred dollars for property tax years commencing
            on January 1, 2015, and January 1, 2016
      - path: versions[5].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-3-119.5
          excerpt: Seven thousand four hundred dollars for property tax years commencing
            on January 1, 2017, and January 1, 2018
      - path: versions[6].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-3-119.5
          excerpt: Seven thousand seven hundred dollars for property tax years commencing
            on January 1, 2019, and January 1, 2020
      - path: versions[7].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-3-119.5
          excerpt: Fifty thousand dollars for property tax years commencing on January
            1, 2021, and January 1, 2022
  versions:
  - effective_from: '1997-01-01'
    formula: '2500'
  - effective_from: '2009-01-01'
    formula: '4000'
  - effective_from: '2011-01-01'
    formula: '5500'
  - effective_from: '2013-01-01'
    formula: '7000'
  - effective_from: '2015-01-01'
    formula: '7300'
  - effective_from: '2017-01-01'
    formula: '7400'
  - effective_from: '2019-01-01'
    formula: '7700'
  - effective_from: '2021-01-01'
    formula: '50000'
- name: alternative_exemption_initial_base
  kind: parameter
  dtype: Money
  unit: USD
  source: 39-3-119.5(b)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-3-119.5
          excerpt: starting from seven thousand nine hundred dollars instead of fifty
            thousand dollars
  versions:
  - effective_from: '2023-01-01'
    formula: '7900'
- name: baseline_schedule_value_lower_bound
  kind: parameter
  dtype: Money
  unit: USD
  source: 39-3-119.5(3)(a)(I)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-3-119.5
          excerpt: a total value that is more than seven thousand nine hundred dollars
  versions:
  - effective_from: '2021-01-01'
    formula: '7900'
- name: baseline_schedule_value_upper_bound
  kind: parameter
  dtype: Money
  unit: USD
  source: 39-3-119.5(3)(a)(I)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-3-119.5
          excerpt: less than or equal to fifty thousand dollars
  versions:
  - effective_from: '2021-01-01'
    formula: '50000'
- name: county_exempt_business_personal_property_estimate
  kind: derived
  entity: County
  dtype: Money
  period: Year
  unit: USD
  source: 39-3-119.5(c)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-3-119.5
          excerpt: equal to the applicable baseline exemption total adjusted by the
            growth factor
  versions:
  - effective_from: '2022-01-01'
    formula: max(0, applicable_baseline_exemption_total * (1 + growth_factor))
