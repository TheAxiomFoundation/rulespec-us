format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-9-101
  summary: |-
    Each appointed member serves at the governor's pleasure but shall not serve more than four consecutive years unless reappointed by the governor and reconfirmed by the senate. Each member is entitled to a fifty-dollar per diem, except as otherwise provided in section 2-2-326.
  deferred_outputs:
    - output: us-co:statutes/39/39-9-101#board_member_per_diem_entitlement
      reason: The per diem entitlement is expressly subject to section 2-2-326, whose operative exception is unavailable.
      source_values:
        - us-co:statutes/39/39-9-101#board_member_per_diem_allowance
    - output: us-co:statutes/39/39-9-101#board_member_expense_reimbursement_entitlement
      reason: The expense reimbursement entitlement is expressly subject to section 2-2-326, whose operative exception is unavailable.
rules:
  - name: board_member_per_diem_allowance
    kind: parameter
    dtype: Money
    period: Day
    unit: USD
    source: C.R.S. 39-9-101(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-9-101
              excerpt: "a per diem allowance of fifty dollars for each day"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          50
  - name: appointed_member_maximum_consecutive_service_years
    kind: parameter
    dtype: Count
    period: Year
    source: C.R.S. 39-9-101(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-9-101
              excerpt: "shall not serve for more than four consecutive years"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          4
  - name: appointed_member_service_is_permitted
    kind: derived
    entity: StateBoardOfEqualizationMember
    dtype: Judgment
    period: Year
    source: C.R.S. 39-9-101(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-9-101
              excerpt: "unless reappointed by the governor and reconfirmed by the senate at the conclusion of the four years"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-9-101
              excerpt: "shall not serve for more than four consecutive years"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          consecutive_years_served_as_governor_appointee <= appointed_member_maximum_consecutive_service_years
          or (governor_reappointed_member and senate_reconfirmed_member)
