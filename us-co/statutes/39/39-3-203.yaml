format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-3-203
  summary: |-
    Fifty percent of specified actual value of qualifying owner-occupied primary residences is exempt; senior and qualifying-veteran paths have application, continuity, timing, ownership, and dwelling-unit limitations.
  deferred_outputs:
    - output: us-co:statutes/39/39-3-203/1#senior_owner_exemption
      reason: The exemption requires filing in the manner required by section 39-3-205, which is not available as copied RuleSpec context.
    - output: us-co:statutes/39/39-3-203/1-5#qualifying_veteran_exemption
      reason: The exemption requires filing in the manner required by section 39-3-205, which is not available as copied RuleSpec context.
    - output: us-co:statutes/39/39-3-203/2#post_assessment_ownership_change_exemption
      reason: The filing deadline is specified by section 39-3-205(1), which is not available as copied RuleSpec context.
    - output: us-co:statutes/39/39-3-203/3#primary_residence_dwelling_unit_exemption
      reason: Applying the exemption to one dwelling unit within a common-interest community or multiple-dwelling property requires unavailable property-to-dwelling-unit relations and the cited definition in section 38-33.3-103.
    - output: us-co:statutes/39/39-3-203/4#single_dwelling_unit_exemption
      reason: The one-exemption limitation requires unavailable relations among dwelling units, owner-occupiers, and exemption claims.
    - output: us-co:statutes/39/39-3-203/5#married_couple_primary_residence_exemption
      reason: The limitation requires unavailable relations among legally married individuals, their residences, and claimed exemptions.
    - output: us-co:statutes/39/39-3-203/6#condemnation_or_disaster_ten_year_exception
      reason: The exception requires unavailable chronological ownership, occupancy, condemnation, disaster, and intervening-residence relations.
    - output: us-co:statutes/39/39-3-203/b#prior_year_exemption_prohibited
      reason: Applying the prohibition requires the exemption application's filing year under section 39-3-205, which is not available as copied RuleSpec context.
rules:
  - name: exemption_percentage
    kind: parameter
    dtype: Rate
    source: 39-3-203(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-3-203
              excerpt: "fifty percent"
    versions:
      - effective_from: '2002-01-01'
        formula: |-
          0.5

  - name: senior_owner_exemption_actual_value_limit
    kind: parameter
    dtype: Money
    unit: USD
    source: 39-3-203(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-3-203
              excerpt: "first two hundred thousand dollars of actual value"
          - path: versions[1].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-3-203
              excerpt: "fifty percent of zero dollars of actual value"
    versions:
      - effective_from: '2002-01-01'
        formula: |-
          200000
      - effective_from: '2003-01-01'
        formula: |-
          0
      - effective_from: '2006-01-01'
        formula: |-
          200000
      - effective_from: '2009-01-01'
        formula: |-
          0
      - effective_from: '2012-01-01'
        formula: |-
          200000

  - name: qualifying_veteran_exemption_actual_value_limit
    kind: parameter
    dtype: Money
    unit: USD
    source: 39-3-203(1.5)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-3-203
              excerpt: "first two hundred thousand dollars of actual value"
    versions:
      - effective_from: '2007-01-01'
        formula: |-
          200000

  - name: surviving_spouse_veteran_exemption_actual_value_limit
    kind: parameter
    dtype: Money
    unit: USD
    source: 39-3-203(1.5)(a.5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-3-203
              excerpt: "first two hundred thousand dollars of actual value"
    versions:
      - effective_from: '2015-01-01'
        formula: |-
          200000

  - name: qualifying_owner_age
    kind: parameter
    dtype: Integer
    source: 39-3-203(1)(a)(I)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-3-203
              excerpt: "sixty-five years of age or older"
    versions:
      - effective_from: '2002-01-01'
        formula: |-
          65

  - name: required_primary_residence_ownership_years
    kind: parameter
    dtype: Count
    source: 39-3-203(1)(a)(I)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-3-203
              excerpt: "for the ten years preceding the assessment date"
    versions:
      - effective_from: '2002-01-01'
        formula: |-
          10

  - name: maximum_exemptions_per_dwelling_unit
    kind: parameter
    dtype: Count
    source: 39-3-203(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-3-203
              excerpt: "No more than one exemption per property tax year"
    versions:
      - effective_from: '2002-01-01'
        formula: |-
          1
