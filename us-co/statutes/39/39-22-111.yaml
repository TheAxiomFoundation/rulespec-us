format: rulespec/v1
module:
  summary: |-
    "The taxpayer's taxable year under this article shall be the same as his taxable year for federal income tax purposes." "The taxpayer's method of accounting under this article shall be the same as his method of accounting for federal income tax purposes."
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-111
rules:
  - name: taxable_year_conforms_to_federal_taxable_year
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-22-111(1)-(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-111
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          state_taxable_year == federal_taxable_year
  - name: accounting_method_conforms_to_federal_accounting_method
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-22-111(3)-(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-111
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          state_accounting_method == federal_accounting_method
