format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-21-115
  summary: |-
    Another state or its political subdivision may sue in Colorado to recover lawfully imposed taxes owing when it accords like rights to Colorado; appropriate officials may bring such actions, and the other state's secretary-of-state certificate is conclusive proof of authority. Colorado's attorney general or an appropriate political-subdivision official may sue in other states for legally due taxes. “Taxes” includes lawful assessments, penalties, and interest charges.
rules:
  - name: other_state_or_subdivision_may_sue_in_colorado
    kind: derived
    entity: TaxCollectionAction
    dtype: Judgment
    period: Year
    source: C.R.S. 39-21-115(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-21-115
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          claimant_is_other_state_or_its_political_subdivision
          and other_state_accords_like_right_to_colorado_and_its_political_subdivisions
          and taxes_are_lawfully_imposed_and_owing

  - name: other_state_appropriate_official_may_bring_collection_action
    kind: derived
    entity: TaxCollectionAction
    dtype: Judgment
    period: Year
    source: C.R.S. 39-21-115(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-21-115
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          other_state_or_subdivision_may_sue_in_colorado
          and action_is_brought_by_appropriate_official_of_other_state

  - name: other_state_secretary_certificate_conclusively_proves_official_authority
    kind: derived
    entity: TaxCollectionAction
    dtype: Judgment
    period: Year
    source: C.R.S. 39-21-115(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-21-115
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          certificate_of_other_state_secretary_states_official_has_collection_authority

  - name: colorado_official_may_sue_in_other_state_for_tax_collection
    kind: derived
    entity: TaxCollectionAction
    dtype: Judgment
    period: Year
    source: C.R.S. 39-21-115(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-21-115
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          action_is_brought_by_colorado_attorney_general_or_appropriate_political_subdivision_official
          and taxes_are_legally_due_to_colorado_or_its_political_subdivision

  - name: amount_is_tax_for_collection_action
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Year
    source: C.R.S. 39-21-115(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-21-115
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          amount_is_lawfully_made_tax_assessment
          or amount_is_lawfully_imposed_tax_penalty
          or amount_is_lawfully_added_interest_charge
