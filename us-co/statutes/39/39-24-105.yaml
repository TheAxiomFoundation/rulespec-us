format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-24-105
  summary: |-
    When the executive director claims Colorado domicile and another state's taxing authorities make a like claim, the executive director may make a written agreement to submit the controversy to a board; the executor or administrator is authorized to make the agreement; the parties shall select the arbitrator or arbitrators.
rules:
  - name: executive_director_may_make_board_submission_agreement
    kind: derived
    entity: RevenueExecutiveDirector
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-24-105
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-24-105
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          executive_director_claims_decedent_was_domiciled_in_this_state_at_death
          and other_state_taxing_authorities_make_like_domicile_claim

  - name: personal_representative_may_make_board_submission_agreement
