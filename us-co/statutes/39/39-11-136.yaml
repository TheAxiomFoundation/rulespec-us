format: rulespec/v1
module:
  status: entity_not_supported
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-11-136
  summary: |-
    “The deed shall be signed by the treasurer in his official capacity and when so signed shall vest in the purchaser all the right, title, interest, and estate of the former owner”; an acknowledged and properly recorded deed is prima facie evidence of the enumerated facts. Execution does not affect preexisting roads, rights-of-way, easements, or equitable servitudes described in subsection (3).
  deferred_outputs:
    - output: us-co:statutes/39/39-11-136#deed_vests_enumerated_property_interests
      reason: The conveyance changes title to land and requires deed-, purchaser-, former-owner-, state-, county-, and real-property-specific relations that the supported RuleSpec entity model cannot faithfully represent.
    - output: us-co:statutes/39/39-11-136/j#tax_deed_is_prima_facie_evidence_of_enumerated_facts
      reason: The evidentiary consequence, including subsection (1)(j), requires a deed-specific evidence relation covering acknowledgment, recording, delivery, taxation, assessment, lien sale, redemption, and grantee status that the supported schema cannot faithfully represent.
    - output: us-co:statutes/39/39-11-136/2#pre_august_1964_deed_interests_vested_when_signed
      reason: The historical vesting rule requires date-sensitive deed execution and property-title relations unsupported by the available entity ontology.
    - output: us-co:statutes/39/39-11-136/3#preexisting_land_burdens_unaffected_by_deed
      reason: Preserving roads, rights-of-way, conservation easements, other easements, and equitable servitudes requires parcel-to-encumbrance relations and temporal priority that the supported schema cannot faithfully represent.
