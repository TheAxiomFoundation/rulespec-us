format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-3-206
  summary: |-
    An assessor grants the senior or qualifying-veteran exemption only on the stated timely application and entitlement conditions. A senior may file a late application by the immediately following August 15; a qualifying veteran with a disability may seek a discretionary waiver by the immediately following August 1 for good cause. Decisions on late filing and late applications are final and may not be contested.
imports:
  - us-co:statutes/39/39-3-205#senior_exemption_application_filing_requirement_satisfied
  - us-co:statutes/39/39-3-205#qualifying_veteran_exemption_application_filing_requirement_satisfied
rules:
  - name: senior_late_application_must_be_accepted
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: C.R.S. 39-3-206(2)(a.5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-3-206
              excerpt: "has not timely filed an exemption application ... may file a late exemption application no later than the August 15"
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:statutes/39/39-3-205#senior_exemption_application_filing_requirement_satisfied
              output: senior_exemption_application_filing_requirement_satisfied
              hash: sha256:ff0686da1424b781950405f2c30f3a975239075cbcd287c0f73d8551f53f6c73
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not senior_exemption_application_filing_requirement_satisfied
          and senior_late_application_filed_within_statutory_period

  - name: senior_exemption_must_be_granted
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: C.R.S. 39-3-206(1)(a), (2)(a.5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-3-206
              excerpt: "shall only grant the exemption ... to an applicant who has timely returned an exemption application"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-3-206
              excerpt: "The assessor shall grant an exemption if an accepted late application establishes that the applicant is entitled"
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:statutes/39/39-3-205#senior_exemption_application_filing_requirement_satisfied
              output: senior_exemption_application_filing_requirement_satisfied
              hash: sha256:ff0686da1424b781950405f2c30f3a975239075cbcd287c0f73d8551f53f6c73
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          senior_exemption_application_establishes_entitlement
          and (senior_exemption_application_filing_requirement_satisfied or senior_late_application_must_be_accepted)

  - name: qualifying_veteran_late_application_may_be_accepted
    kind: derived
    entity: Person
