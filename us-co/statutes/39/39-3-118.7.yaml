format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-3-118.7
  summary: |-
    For property tax years commencing on and after January 1, 2015, but before January 1, 2021, the percentage of alternating current electricity capacity of a community solar garden attributed to residential or governmental subscribers, or to organizations granted property tax exemptions pursuant to sections 39-3-106 to 39-3-113.5, is exempt from property tax.
  deferred_outputs:
    - output: us-co:statutes/39/39-3-118.7#community_solar_garden
      reason: The incorporated definition in section 40-2-127 (2)(b)(I)(A) is not available as copied RuleSpec context.
    - output: us-co:statutes/39/39-3-118.7#subscriber
      reason: The incorporated definition in section 40-2-127 (2)(b)(II) is not available as copied RuleSpec context.
rules:
  - name: community_solar_garden_capacity_property_tax_exempt_percentage
    kind: derived
    entity: Asset
    dtype: Rate
    period: Year
    source: C.R.S. 39-3-118.7(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: effective_period
            source:
              corpus_citation_path: us-co/statute/39/39-3-118.7
              excerpt: "property tax years commencing on and after January 1, 2015, but before January 1, 2021"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-3-118.7
              excerpt: "the percentage of alternating current electricity capacity of a community solar garden that is attributed to residential or governmental subscribers, or to subscribers that are organizations that have been granted property tax exemptions"
    versions:
      - effective_from: '2015-01-01'
        formula: |-
          if property_tax_year_is_in_exemption_window: percentage_of_alternating_current_capacity_attributed_to_residential_governmental_or_property_tax_exempt_organization_subscribers else: 0
