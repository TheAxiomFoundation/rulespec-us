format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-3-132
  summary: |-
    When only a previously taxable portion of real property becomes exempt, the treasurer may collect prorated current-year taxes based on the preceding year's levy, or may defer collection if sufficient taxable real property remains to satisfy the tax lien. Collected taxes credit the owner of the remainder when the current levy is fixed.
rules:
  - name: prorated_property_taxes_on_exempt_portion
    kind: derived
    entity: Asset
    dtype: Money
    unit: USD
    period: Year
    source: C.R.S. 39-3-132
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-3-132
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if portion_of_real_property_previously_taxable_becomes_exempt
            and assessor_has_appraised_and_computed_assessment_valuation:
            property_taxes_on_portion_during_preceding_taxable_year * portion_tax_proration_fraction_to_title_conveyance_date
          else: 0

  - name: treasurer_may_collect_prorated_property_taxes
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. 39-3-132
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-3-132
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          portion_of_real_property_previously_taxable_becomes_exempt
          and assessor_has_appraised_and_computed_assessment_valuation

  - name: treasurer_may_defer_property_tax_collection
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. 39-3-132
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-3-132
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          portion_of_real_property_previously_taxable_becomes_exempt
          and assessor_has_appraised_and_computed_assessment_valuation
          and treasurer_is_satisfied_remaining_taxable_real_property_satisfies_property_tax_lien

  - name: remainder_owner_property_tax_credit
    kind: derived
    entity: Asset
    dtype: Money
    unit: USD
    period: Year
    source: C.R.S. 39-3-132
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-3-132
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if treasurer_may_collect_prorated_property_taxes
            and treasurer_collects_prorated_property_taxes
            and current_property_tax_levy_has_been_fixed_and_correct_property_taxes_determined:
            prorated_property_taxes_on_exempt_portion
          else: 0
