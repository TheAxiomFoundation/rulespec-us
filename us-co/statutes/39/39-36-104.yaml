    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-36-104
  summary: |-
    “A taxpayer may not claim an income tax credit pursuant to this article 36 for performing an act in an enterprise zone for which the taxpayer is allowed to claim an income tax credit pursuant to article 30 of this title 39.”
  deferred_outputs:
    - output: us-co:statutes/39/39-36-104/4/a#chips_zone_credit_amount
      reason: The corresponding credit amounts and qualification mechanics depend on sections 39-30-104 and 39-30-105.1, for which no executable RuleSpec context is provided.
