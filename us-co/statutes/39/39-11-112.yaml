format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-11-112
  summary: |-
    “It shall not be necessary to sell the same as the property of any person.”
    A sale is not invalid because the land was charged in another name or as unknown when the roll sufficiently identifies it and taxes are due and unpaid. A county that erroneously taxes and sells a lien on land lying in another county is liable for resulting owner expense or damage.
rules:
  - name: tax_lien_sale_may_proceed_without_owner_identification
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-11-112(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-11-112
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          tax_lien_is_offered_for_sale_for_delinquent_taxes

  - name: tax_lien_sale_not_invalid_due_to_tax_roll_name
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-11-112(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-11-112
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          tax_lien_is_offered_for_sale_for_delinquent_taxes
          and tax_roll_charges_land_or_lot_in_other_name_or_as_unknown
          and tax_roll_sufficiently_describes_land_or_lot_to_identify_it
          and taxes_are_due_and_unpaid_at_time_of_sale

  - name: county_liable_for_owner_expense_or_damage_from_erroneous_sale
    kind: derived
    entity: County
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-11-112(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-11-112
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          land_lies_in_another_county
          and county_erroneously_taxed_land
          and county_sold_tax_lien_on_land_for_delinquent_taxes
          and owner_incurred_expense_or_damage_from_erroneous_sale
