format: rulespec/v1
module:
  status: deferred
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-1-103
  summary: |-
    “The actual value of residential real property shall be determined solely by consideration of the market approach to appraisal.”
    “The commercial lodging area of a bed and breakfast shall be assessed at the rate for lodging property. Any part of the bed and breakfast that is not a commercial lodging area shall be considered a residential improvement and assessed accordingly.”
    “For the purposes of this subsection (12), annual rental means annual rental payments, or other compensatory payments payable for the right to hold a mineral interest.”
    “The assessing officers shall give appropriate consideration to the cost approach, market approach, and income approach to appraisal ... in determining the actual value of vacant land.”
    “For purposes of this subsection (16), superfund water treatment facilities means real and personal property” meeting the stated installation, construction, and pollution-control requirements.
  deferred_outputs:
    - output: us-co:statutes/39/39-1-103/b#bed_and_breakfast_assessment
      reason: >-
        Subsection (10.5)(b) requires valuation under subsection (5), assessment
        ratios for lodging and residential property, and procedures under
        subsection (9); the supplied context does not provide the numeric
        assessment ratios or a supported entity model for allocating a mixed-use
        improvement and its land.
    - output: us-co:statutes/39/39-1-103/b#nonproducing_oil_shale_annual_rental
      reason: >-
        Subsection (12)(b) defines annual rental through representative county-
        or area-level mineral-interest lease payments and multiple payment-type
        exclusions, but no relation containing leases, payment amounts, payment
        types, and fixed-period attributes is available to compute that
        representative rental faithfully.
    - output: us-co:statutes/39/39-1-103/b#vacant_land_actual_value
      reason: >-
        Subsection (14)(b) requires appropriate consideration of three appraisal
        approaches and, when present-worth discounting applies, development
        costs, absorption rates, discount factors, and the approved-plat
        inventory. The source does not prescribe a complete computable appraisal
        formula, and section 39-1-104, which supplies relevant assessment-period
        mechanics, is unavailable as RuleSpec context.
    - output: us-co:statutes/39/39-1-103/c#vacant_land_classification
      reason: >-
        Subsection (14)(c) defines vacant land through parcel-level structures,
        fixtures, site improvements, development-tract status, and exclusions
        for several property classes. Faithful execution requires property and
        improvement relations and upstream classifications not supplied in the
        available RuleSpec context.
    - output: us-co:statutes/39/39-1-103/e#vacant_land_best_information_valuation
      reason: >-
        Subsection (14)(e) authorizes the assessor to determine actual value from
        the best available and obtainable information after a subdivision
        developer fails to file questionnaires by March 20. The provision grants
        appraisal discretion but supplies no formula for deriving actual value
        from that information.
    - output: us-co:statutes/39/39-1-103/b#superfund_water_treatment_facility
      reason: >-
        Subsection (16)(b) depends on whether property was installed and
        constructed under a qualifying governmental agreement or order to
        satisfy CERCLA and whether it treats pollutants as defined in section
        25-8-103 (15). That cited definition is unavailable, and the required
        real-and-personal-property facility relation is not represented by the
        supplied context.
