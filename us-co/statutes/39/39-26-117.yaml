format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-26-117
  summary: |-
    “the tax imposed by this part 1 shall be a first and prior lien upon the goods and business fixtures of or used by any retailer or qualified purchaser”, excepting stock sold or for sale in the ordinary course of business; bona fide leased property may be exempt. Subsection (2) establishes priority subject to preexisting claims whose rights attached before notice filing under section 39-26-118.
  deferred_outputs:
    - output: us-co:statutes/39/39-26-117/2#tax_claim_priority_against_property
      reason: The priority exception depends on notice filing under section 39-26-118, for which no executable RuleSpec source is available.
rules:
  - name: tax_lien_attaches_to_retailer_asset
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-26-117(1)(a)-(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-26-117
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          retailer_or_qualified_purchaser_owes_tax_under_part_1
          and asset_is_goods_or_business_fixture_of_or_used_by_retailer_or_qualified_purchaser
          and not asset_is_stock_of_goods_sold_or_for_sale_in_ordinary_course
          and not asset_is_exempt_from_lien_under_bona_fide_lease_rules
