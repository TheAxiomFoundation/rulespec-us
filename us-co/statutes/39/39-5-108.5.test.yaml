    us-co:statutes/39/39-5-108.5#advertiser_is_agent: not_holds
    us-co:statutes/39/39-5-108.5#owner_address_list_disclosure_complied: holds
    us-co:statutes/39/39-5-108.5#agent_owner_and_address_list_disclosure_complied: holds
    us-co:statutes/39/39-5-108.5#annual_disclosure_agreement_complied: holds
