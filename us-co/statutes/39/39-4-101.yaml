format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-4-101
  summary: "\u201CAircraft means any contrivance now known or hereafter invented,\
    \ used, or designed for navigation or flight through the air and designed to carry\
    \ at least one person.\u201D\n\u201CClean energy resource, for purposes of property\
    \ taxation under this section, does not include nuclear energy.\u201D\n\u201C\
    Public utility does not include any affiliate or subsidiary ... that is not doing\
    \ business in the state primarily as\u201D a listed utility.\n\u201CNew facility\
    \ includes a combined facility\u201D satisfying the stated production and capacity-increase\
    \ conditions.\n\u201CSolar energy facility includes facilities for agrivoltaics\
    \ ... and for floatovoltaics.\u201D"
  deferred_outputs:
  - output: us-co:statutes/39/39-4-101/2.4/b#clean_energy_resource_for_property_taxation
    reason: The purpose-specific definition depends on the meaning of clean energy
      resource in section 40-2-125.5 (2)(b), for which no copied RuleSpec dependency
      is available.
  - output: us-co:statutes/39/39-4-101/3/b#affiliate_or_subsidiary_excluded_from_public_utility
    reason: Faithful evaluation requires the entity's affiliate or subsidiary relationship
      and its primary in-state business classification across the enumerated utility
      categories; no compatible structural relation or upstream classifications are
      supplied.
  - output: us-co:statutes/39/39-4-101/3.3/b#combined_hydroelectric_facility_is_new_facility
    reason: Faithful evaluation requires a relation between the preexisting facility
      and its later addition or efficiency improvement, together with their respective
      energy-producing capacities; the supplied schema context does not provide that
      facility-component relation.
  - output: us-co:statutes/39/39-4-101/3.5/b#solar_energy_facility_includes_agrivoltaics_and_floatovoltaics
    reason: The inclusion depends on the definitions of agrivoltaics in section 35-1-114
      (4)(a) and floatovoltaics in section 37-60-115 (12)(c)(III), for which no copied
      RuleSpec dependencies are available.
  - output: us-co:statutes/39/39-4-101/b#deferred_b
    reason: Generated module encodes the supported rules from this source, but this
      source subparagraph depends on policy surfaces or entities that are not available
      in the current RuleSpec context. It is deferred instead of being modeled as
      a caller-supplied input or an unsupported local entity.
rules:
- name: aircraft_minimum_person_capacity
  kind: parameter
  dtype: Count
  source: 39-4-101(1)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-4-101
          excerpt: designed to carry at least one person
  versions:
  - effective_from: '0001-01-01'
    formula: '1'
- name: aircraft
  kind: derived
  entity: Asset
  dtype: Judgment
  source: 39-4-101(1)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: definition
        source:
          corpus_citation_path: us-co/statute/39/39-4-101
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-co/statute/39/39-4-101
          excerpt: unless the context otherwise requires
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-4-101
          excerpt: designed to carry at least one person
  versions:
  - effective_from: '0001-01-01'
    formula: 'asset_is_contrivance

      and asset_is_used_or_designed_for_navigation_or_flight_through_air

      and asset_designed_person_capacity >= aircraft_minimum_person_capacity

      and not context_requires_different_meaning'
