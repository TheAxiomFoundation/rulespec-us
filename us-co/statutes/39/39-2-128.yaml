format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-2-128
  summary: |-
    An order of the board of assessment appeals directed to a county assessor or county board of equalization is enforceable in that county's district court.
rules:
  - name: board_order_enforceable_in_county_district_court
    kind: derived
    entity: BoardAssessmentAppealsOrder
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-2-128
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-2-128
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          board_order_is_issued_to_ascertain_facts_or_carry_out_decision
          and (
            order_is_directed_to_county_assessor
            or order_is_directed_to_county_board_of_equalization
          )
