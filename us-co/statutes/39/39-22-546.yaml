format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-546
  summary: |-
    A purchaser installing an energy storage system in a residential dwelling may claim, for income tax years commencing on or after January 1, 2023, but before January 1, 2027, a credit equal to ten percent of the purchase price.
  deferred_outputs:
    - output: us-co:statutes/39/39-22-546/1#tax_credit_performance_statement
      reason: Legislative findings, purposes, and auditor reporting duties are non-computational.
    - output: us-co:statutes/39/39-22-546/a#energy_storage_system
      reason: This definition is represented by the supplied canonical energy-storage-system concept and is not duplicated as a source-specific executable definition.
    - output: us-co:statutes/39/39-22-546/c#purchaser
      reason: Purchaser status is a factual transaction-role boundary needed by the credit calculation, not a separately computable legal output.
    - output: us-co:statutes/39/39-22-546/d#seller
      reason: Seller status and the seller-assignment process require a purchaser-seller transaction relation not supplied by this source slice.
    - output: us-co:statutes/39/39-22-546/4#assigned_tax_credit
      reason: Assignment requires a purchaser-seller agreement, compensation, filing, and transaction relationship not representable by the available inputs.
    - output: us-co:statutes/39/39-22-546/5#seller_refundable_credit
      reason: Refundability depends on the unencoded assigned seller credit and seller income-tax liability.
    - output: us-co:statutes/39/39-22-546/6#unauthorized_tax_advice_not_provided
      reason: This is a conduct characterization rather than a computable tax result.
    - output: us-co:statutes/39/39-22-546/7#section_repeal
      reason: Repeal timing is documentary statutory lifecycle information.
imports:
  - us-co:statutes/39/39-26-733#residential_energy_storage_system_sales_storage_and_use_exempt
rules:
  - name: residential_energy_storage_credit_rate
    kind: parameter
    dtype: Rate
    source: 39-22-546(3)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-546
              excerpt: "equal to ten percent of the purchase price"
    versions:
      - effective_from: '2023-01-01'
        formula: |-
          0.10

  - name: energy_storage_system_purchase_price
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 39-22-546(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-546
              excerpt: "including charges for sales tax and freight,\nbut not including any charges for assembly, installation, or other construction\nservices, or permit fees"
    versions:
      - effective_from: '2023-01-01'
        formula: |-
          amount_paid_for_energy_storage_tangible_personal_property
          + sales_tax_charged_for_energy_storage_system
          + freight_charged_for_energy_storage_system

  - name: residential_energy_storage_income_tax_credit
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 39-22-546(3)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-546
              excerpt: "any purchaser that installs an energy storage system in a\nresidential dwelling in this state is allowed a credit"
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:statutes/39/39-26-733#residential_energy_storage_system_sales_storage_and_use_exempt
              output: residential_energy_storage_system_sales_storage_and_use_exempt
              hash: sha256:111ea8e36958bb2473f2772c4ba5daf310af662162503d04e9cd167148f61253
    versions:
      - effective_from: '2023-01-01'
        formula: |-
          if income_tax_year_is_credit_eligible
          and taxpayer_is_buyer_of_energy_storage_system
          and purchaser_installs_energy_storage_system_in_residential_dwelling
          and residential_energy_storage_system_sales_storage_and_use_exempt:
            residential_energy_storage_credit_rate * energy_storage_system_purchase_price
          else: 0
