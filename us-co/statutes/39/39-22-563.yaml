format: rulespec/v1
module:
  status: deferred
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-563
  summary: |-
    Defines certified freight rail use, qualified applicants, and qualified expenditures; authorizes reservations and refundable income-tax credits tied to certified freight rail expenditures, subject to office approval, certification, annual limits, and repeal effective December 31, 2045.
  deferred_outputs:
    - output: us-co:statutes/39/39-22-563/a#certified_freight_rail_use
      reason: The definition depends on the unavailable statutory meaning of “coal transition community” in section 8-83-502 and on a transportation-department determination concerning rail-line risk.
    - output: us-co:statutes/39/39-22-563/c#department
      reason: This institutional definition is documentary and does not establish a computable taxpayer-facing output.
    - output: us-co:statutes/39/39-22-563/d#freight_rail_use_plan
      reason: A freight rail use plan is an office-submitted administrative instrument with no supported RuleSpec entity or document representation.
    - output: us-co:statutes/39/39-22-563/e#office
      reason: This institutional definition depends on the unavailable creating statute, section 24-48.5-101, and does not establish a computable output.
    - output: us-co:statutes/39/39-22-563/f#qualified_applicant
      reason: Qualification depends on administrative determinations, substantial new or expanded rail demand, and certified freight rail use requiring unavailable upstream definitions and agency findings.
    - output: us-co:statutes/39/39-22-563/g#qualified_expenditure
      reason: Qualified expenditure depends on certified freight rail use, whose statutory and agency-determination dependencies are unavailable.
    - output: us-co:statutes/39/39-22-563/f#department_credit_certificate_report
      reason: The reporting duty is an administrative timing and disclosure requirement, not a supported taxpayer-facing computational output.
