  summary: |-
    “It is the duty of the executive director of the department of revenue to see that all of the provisions of this part 1 are enforced and obeyed”; officers must aid enforcement, designated persons may inspect and detain violating vehicles, and the executive director must notify the county treasurer when a new refiner or distributor license is issued.
