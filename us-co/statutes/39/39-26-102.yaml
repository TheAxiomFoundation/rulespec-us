format: rulespec/v1
module:
  status: deferred
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-26-102
  summary: |-
    “As used in this article 26, unless the context otherwise requires:” The section defines sales-and-use-tax terms, inclusions, exclusions, thresholds, wholesale treatment, disputed-exemption procedures, and certain leases treated as sales.
  deferred_outputs:
    - output: us-co:statutes/39/39-26-102/b#solicitation_constitutes_doing_business_in_state
      reason: >-
        Subsection (3)(b) is one component of the broader definition of doing
        business in this state; faithfully exposing the final defined status
        requires the taxable retail-sale concepts of section 39-26-104, for
        which no copied RuleSpec dependency is available.
    - output: us-co:statutes/39/39-26-102/c#economic_nexus_constitutes_doing_business_in_state
      reason: >-
        Subsection (3)(c) depends on sales specified in section 39-26-104 (3)
        and contains marketplace-sale attribution and physical-presence
        exceptions; the cited RuleSpec dependency is unavailable.
    - output: us-co:statutes/39/39-26-102/b#food_product_for_domestic_home_consumption
      reason: >-
        Subsection (4.5)(b) modifies the federally defined domestic-home-
        consumption classification and contains an exception for vendors
        described in section 39-26-104 (1)(e); those cited definitions are not
        available as copied RuleSpec dependencies.
    - output: us-co:statutes/39/39-26-102/b#marketplace_facilitator
      reason: >-
        Subsection (5.9)(b) is an exclusion within the complete marketplace-
        facilitator definition, whose faithful representation requires a
        transaction-level marketplace agreement, communication, collection,
        and transmission relation not supplied by the available context.
    - output: us-co:statutes/39/39-26-102/b#wireless_equipment_purchase_price
      reason: >-
        Subsection (7)(b) defines a transaction-specific purchase price and a
        separate default-or-termination boundary; the available RuleSpec
        context supplies neither the telecommunication transaction relation nor
        the taxable-service dependency.
    - output: us-co:statutes/39/39-26-102/c#heavy_truck_trailer_or_tractor_purchase_price
      reason: >-
        Subsection (7)(c) excludes a federal excise tax for which the retailer
        is liable from a transaction-specific purchase price, but the required
        transaction and federal-excise-tax legal bases are not supplied.
    - output: us-co:statutes/39/39-26-102/k#qualifying_affiliated_corporation_asset_transfer_excluded_from_sale
      reason: >-
        Subsection (10)(k) requires share-by-share ownership relations,
        transferor acquisition-tax history, and the subsection (12) value-
        increase exception; the supported schema context does not provide those
        corporation-transfer relations.
    - output: us-co:statutes/39/39-26-102/b#tangible_personal_property
      reason: >-
        Subsection (15)(b) is deleted, while subsection (15)(b.5) contributes
        digital-goods rules to a composite definition that also depends on the
        newspaper definition in section 24-70-102; that cited definition is not
        available.
    - output: us-co:statutes/39/39-26-102/c#computer_software_is_tangible_personal_property
      reason: >-
        Subsection (15)(c) defines software classifications and tax treatment
        tied to section 39-26-104 (1)(a); the cited taxable-property RuleSpec
        dependency is unavailable.
    - output: us-co:statutes/39/39-26-102/c#livestock_agricultural_compound_or_spray_adjuvant_sale_is_wholesale
      reason: >-
        Subsection (19)(c) requires livestock status, including definitions
        from sections 35-41.5-102 and 35-80-102, neither of which is available
        as copied RuleSpec context.
    - output: us-co:statutes/39/39-26-102/e#fertilizer_sale_for_agricultural_commodity_production_is_wholesale
      reason: >-
        Subsection (19)(e) incorporates the fertilizer and specialty-fertilizer
        definitions in section 35-12-103; the cited RuleSpec dependency is
        unavailable.
    - output: us-co:statutes/39/39-26-102/f#spray_adjuvant_sale_for_agricultural_commodity_production_is_wholesale
      reason: >-
        Subsection (19)(f) depends on the article-wide agricultural-commodity
        definition, which incorporates section 35-28-104 (1); that cited
        RuleSpec definition is unavailable.
    - output: us-co:statutes/39/39-26-102/g#regulated_products_count_as_agricultural_commodities_for_wholesale_sale
      reason: >-
        Subsection (19)(g) contains date-dependent inclusion and exclusion of
        products regulated under article 10 of title 44, but the regulated-
        product classification and complete agricultural-commodity definition
        are unavailable as copied RuleSpec dependencies.
    - output: us-co:statutes/39/39-26-102/b#food_processing_property_enters_processing
      reason: >-
        Subsection (20)(b) defines transaction- and consumption-dependent
        membership for tangible personal property used in processing food;
        faithful encoding requires item-to-product processing relations not
        supplied by the available context.
    - output: us-co:statutes/39/39-26-102/h#disputed_exemption_noncollection_offense_and_long_term_lease_sale_treatment
      reason: >-
        Subsection (22)(h) is the final tier of a complete offense scale tied
        to disputed exemptions and judicial review under section 39-21-105,
        while subsection (23) depends on the exception in section 39-26-713
        (1)(a); neither cited RuleSpec dependency is available.
