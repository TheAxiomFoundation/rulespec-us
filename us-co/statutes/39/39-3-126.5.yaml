format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-3-126.5
  summary: For property tax years commencing on or after January 1, 2022, a mobile
    home with an actual value less than or equal to twenty-eight thousand dollars
    is exempt from property tax.
  deferred_outputs:
  - output: us-co:statutes/39/39-3-126.5/e#deferred_e
    reason: Generated module encodes the supported rules from this source, but this
      source subparagraph depends on policy surfaces or entities that are not available
      in the current RuleSpec context. It is deferred instead of being modeled as
      a caller-supplied input or an unsupported local entity.
rules:
- name: mobile_home_actual_value_exemption_threshold
  kind: parameter
  dtype: Money
  unit: USD
  source: 39-3-126.5(3)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-3-126.5
          excerpt: less than or equal to twenty-eight thousand dollars
  versions:
  - effective_from: '2022-01-01'
    formula: '28000'
- name: mobile_home_for_property_tax_exemption
  kind: derived
  entity: Asset
  dtype: Judgment
  period: Year
  source: 39-3-126.5(2)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: definition
        source:
          corpus_citation_path: us-co/statute/39/39-3-126.5
  versions:
  - effective_from: '2022-01-01'
    formula: 'asset_is_mobile_or_manufactured_home

      and certificate_of_title_has_been_issued

      and not certificate_of_permanent_location_has_been_issued'
- name: mobile_home_property_tax_exemption_applies
  kind: derived
  entity: Asset
  dtype: Judgment
  period: Year
  source: 39-3-126.5(3)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/statute/39/39-3-126.5
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-3-126.5
          excerpt: actual value that is less than or equal to twenty-eight thousand
            dollars
  versions:
  - effective_from: '2022-01-01'
    formula: 'mobile_home_for_property_tax_exemption

      and actual_value <= mobile_home_actual_value_exemption_threshold'
