format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-540
  summary: |-
    “Leave of absence period” does not exceed ten working days; the credit equals thirty-five percent of specified expenses, is unavailable for an employee paid wages of eighty thousand dollars or more, and unused credit may be carried forward for five succeeding income tax years.
  deferred_outputs:
    - output: us-co:statutes/39/39-22-540/b#leave_of_absence_period
      reason: The statutory definition depends on the unavailable employee definition in section 39-22-604.
    - output: us-co:statutes/39/39-22-540/c#taxpayer
      reason: The statutory taxpayer definition depends on the unavailable withholding and qualified-employee mechanics in section 39-22-604.
    - output: us-co:statutes/39/39-22-540/3/b#temporary_replacement_help_credit
      reason: Computing the credit requires the unavailable taxpayer and employee definitions in section 39-22-604.
    - output: us-co:statutes/39/39-22-540/3#living_organ_donor_paid_leave_credit
      reason: Computing the credit requires the unavailable taxpayer and employee definitions in section 39-22-604.
    - output: us-co:statutes/39/39-22-540/4#employee_wage_disqualification
      reason: The wage definition depends on unavailable Internal Revenue Code section 3401(a).
    - output: us-co:statutes/39/39-22-540/5#unused_credit_carryforward
      reason: Carryforward application depends on the uncomputed credit and income-tax liability.
rules:
  - name: maximum_leave_of_absence_working_days
    kind: parameter
    dtype: Count
    period: Year
    source: 39-22-540(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-540
              excerpt: "not exceeding ten working\ndays"
    versions:
      - effective_from: '2020-01-01'
        formula: |-
          10
  - name: living_organ_donor_credit_rate
    kind: parameter
    dtype: Rate
    period: Year
    source: 39-22-540(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-540
              excerpt: "equal to thirty-five percent"
    versions:
      - effective_from: '2020-01-01'
        formula: |-
          0.35
  - name: employee_wage_credit_disqualification_threshold
    kind: parameter
    dtype: Money
    unit: USD
    period: Year
    source: 39-22-540(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-540
              excerpt: "wages of eighty\nthousand dollars or more"
    versions:
      - effective_from: '2020-01-01'
        formula: |-
          80000
  - name: unused_credit_carryforward_years
    kind: parameter
    dtype: Count
    period: Year
    source: 39-22-540(5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-540
              excerpt: "each of the five succeeding income tax years"
    versions:
      - effective_from: '2020-01-01'
        formula: |-
          5
