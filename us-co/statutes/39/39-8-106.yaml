format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-8-106
  summary: |-
    “A board of county commissioners may authorize by resolution a petitioner or a petitioner's agent to elect to receive the notice ... by fax or electronic mail.” “If no election is made ... the county board of equalization shall mail the required notice.” An assessor's failure or refusal to comply with form provisions does not deprive the objecting person of appeal or “a full, fair, and complete hearing.”
rules:
  - name: petitioner_may_elect_electronic_hearing_notice
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: C.R.S. 39-8-106(2)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-8-106
              excerpt: "may authorize by resolution a petitioner\nor a petitioner's agent to elect"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          county_commissioners_authorized_electronic_notice_election

  - name: hearing_notice_must_be_mailed
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: C.R.S. 39-8-106(2)(a)-(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: default
            source:
              corpus_citation_path: us-co/statute/39/39-8-106
              excerpt: "(2) (a) Upon receiving a petition in the form described in subsection (1) of this\nsection, the county board of equalization or its authorized agent shall note the filing\nof the petition, set a time for hearing of said petition, and, except as provided in\nparagraph (b) of this subsection (2), notify the petitioner by mail of such time for\nhearing.\n(b) A board of county commissioners may authorize by resolution a petitioner\nor a petitioner's agent to elect to receive the notice required in paragraph (a) of this\nsubsection (2) by fax or electronic mail at a phone number or electronic mail\naddress supplied by the petitioner or the petitioner's agent. If no election is made\nby the petitioner or the petitioner's agent, the county board of equalization shall\nmail the required notice."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not county_commissioners_authorized_electronic_notice_election
          or not petitioner_or_agent_elected_electronic_notice

  - name: objecting_person_retains_appeal_right_despite_assessor_noncompliance
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: C.R.S. 39-8-106(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-8-106
              excerpt: "the objecting person shall not\nbe deprived of his right of appeal"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_objecting_person
          and assessor_failed_or_refused_to_comply_with_required_form_provisions

  - name: objecting_person_is_entitled_to_full_fair_complete_hearing_despite_assessor_noncompliance
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: C.R.S. 39-8-106(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-8-106
              excerpt: "shall not, in any manner, deprive the objecting person of his right to\na full, fair, and complete hearing"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_objecting_person
          and assessor_failed_or_refused_to_comply_with_required_form_provisions
