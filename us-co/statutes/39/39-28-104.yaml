format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-28-104
  summary: |-
    In any month that a wholesaler purchases stamps greater than its anticipated total monthly purchase, the wholesaler must pay for the excess stamps upon delivery; this does not apply to a wholesaler exempt from the surety-bond requirement. “Bad debt” is defined for subsection (4).
  deferred_outputs:
    - output: us-co:statutes/39/39-28-104/d#bad_debt
      reason: The bad-debt definition and related credit depend on tax amounts paid under section 39-28-105 and federal Internal Revenue Code section 166, neither of which is available as executable RuleSpec context.
rules:
  - name: excess_stamp_purchase_requires_payment_on_delivery
    kind: derived
    entity: Wholesaler
    dtype: Judgment
    period: Month
    source: 39-28-104(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-28-104
              excerpt: "stamps that is greater than the wholesaler's anticipated total monthly purchase of stamps"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-28-104
              excerpt: "shall not apply if the wholesaler is exempt from the surety bond requirement"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          monthly_stamp_purchase_exceeds_anticipated_total_monthly_purchase
          and not wholesaler_is_exempt_from_surety_bond_requirement
