- name: qualifying capacity is exempt during the statutory window
  period:
    period_kind: tax_year
    start: '2015-01-01'
    end: '2015-12-31'
  input:
    us-co:statutes/39/39-3-118.7#input.property_tax_year_is_in_exemption_window: true
    ? us-co:statutes/39/39-3-118.7#input.percentage_of_alternating_current_capacity_attributed_to_residential_governmental_or_property_tax_exempt_organization_subscribers
    : 0.6
  output:
    us-co:statutes/39/39-3-118.7#community_solar_garden_capacity_property_tax_exempt_percentage: 0.6
- name: exemption ends for property tax years commencing in 2021
  period:
    period_kind: tax_year
    start: '2021-01-01'
    end: '2021-12-31'
  input:
    us-co:statutes/39/39-3-118.7#input.property_tax_year_is_in_exemption_window: false
    ? us-co:statutes/39/39-3-118.7#input.percentage_of_alternating_current_capacity_attributed_to_residential_governmental_or_property_tax_exempt_organization_subscribers
    : 0.6
  output:
    us-co:statutes/39/39-3-118.7#community_solar_garden_capacity_property_tax_exempt_percentage: 0
