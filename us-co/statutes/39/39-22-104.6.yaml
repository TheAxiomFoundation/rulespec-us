format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-104.6
  summary: Prior to January 1, 2025, qualifying wage amounts contributed to an individual's
    medical savings account are excluded from federal taxable income for state income
    tax purposes to the extent the taxpayer does not otherwise claim federal deductions
    for those contributions. This section is repealed effective December 31, 2028.
rules:
- name: medical_savings_account_contribution_excluded_from_federal_taxable_income_for_state_income_tax
  kind: derived
  entity: Person
  dtype: Money
  period: Year
  unit: USD
  source: "Colo. Rev. Stat. \xA7 39-22-104.6(1)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-22-104.6
          excerpt: to the extent a taxpayer is not otherwise claiming deductions on
            federal income tax returns for contributions to medical savings accounts
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/statute/39/39-22-104.6
          excerpt: amounts withheld from an individual's wages which are contributed
            to such individual's medical savings account
      - path: versions[0].formula
        kind: effective_period
        source:
          corpus_citation_path: us-co/statute/39/39-22-104.6
          excerpt: Prior to January 1, 2025
