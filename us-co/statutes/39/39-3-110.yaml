format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-3-110
  summary: |-
    Property used solely and exclusively for strictly charitable purposes is exempt if used as an integral part of a child care center meeting the listed licensing, child-care, nonprofit, reasonable-cost, service-access, private-gain, and reasonable-property-necessity conditions. The exemption does not apply to a religious child care center exempt under sections 39-3-106 or 39-3-106.5. Real property taxes otherwise due are deemed paid by the owner or landlord when qualifying property is leased in part to the child care center and shared by other tenants.
  deferred_outputs:
    - output: us-co:statutes/39/39-3-110#child_care_center_property_tax_exemption_applies
      reason: The final exemption is subject to the section 39-3-106.5 religious-property exemption, but no copied RuleSpec source provides that operative exception.
    - output: us-co:statutes/39/39-3-110#exemption_claim_complies_with_section_39_2_117
      reason: Subsection (2) requires compliance with section 39-2-117, for which no copied RuleSpec source is available.
rules:
  - name: minimum_children_cared_for
    kind: parameter
    dtype: Count
    source: C.R.S. 39-3-110(1)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-3-110
              excerpt: "care of five or\nmore children"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          5

  - name: reduced_rate_services_gross_revenue_percentage
    kind: parameter
    dtype: Rate
    source: C.R.S. 39-3-110(1)(e)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-3-110
              excerpt: "equal to five percent of the gross revenues"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.05

  - name: financially_needy_tuition_percentage
    kind: parameter
    dtype: Rate
    source: C.R.S. 39-3-110(1)(e)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-3-110
              excerpt: "equal to ten percent of the amount of tuition charged"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.10

  - name: child_care_center_has_required_child_capacity
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. 39-3-110(1)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-3-110
              excerpt: "care of five or\nmore children who are not sixteen years of age or older"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-3-110
              excerpt: "five or\nmore children"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          number_of_children_cared_for >= minimum_children_cared_for
          and children_cared_for_are_under_sixteen_years_of_age

  - name: child_care_center_satisfies_service_access_requirement
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. 39-3-110(1)(e)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-3-110
              excerpt: "provides its services to an indefinite number of persons free of\ncharge"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-3-110
              excerpt: "at reduced rates equal to five percent of the gross revenues of such child\ncare center or equal to ten percent of the amount of tuition charged by such child\ncare center to the financially needy or charges on the basis of ability to pay"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          services_are_provided_free_of_charge
          or value_of_services_provided_at_reduced_rates == gross_revenues * reduced_rate_services_gross_revenue_percentage
          or value_of_services_provided_at_reduced_rates == tuition_charged_to_financially_needy * financially_needy_tuition_percentage
          or services_are_charged_on_the_basis_of_ability_to_pay

  - name: child_care_center_satisfies_exemption_requirements
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. 39-3-110(1)(a)-(e)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-3-110
              excerpt: "licensed pursuant to part 3 of article 5 of title 26.5"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-3-110
              excerpt: "not owned or operated for private gain or corporate profit"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-3-110
              excerpt: "costs of operation of which, including salaries, are reasonable"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          child_care_center_is_licensed
          and child_care_center_has_required_child_capacity
          and child_care_center_is_not_owned_or_operated_for_private_gain_or_corporate_profit
          and child_care_center_operating_costs_are_reasonable
          and child_care_center_satisfies_service_access_requirement

  - name: real_property_taxes_deemed_paid_by_property_owner_or_landlord
    kind: derived
    entity: PropertyOwnerOrLandlord
    dtype: Money
    period: Year
    unit: USD
    source: C.R.S. 39-3-110(1.5)(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-3-110
              excerpt: "real\nproperty taxes otherwise due but for the application of this section are deemed\ntaxes paid by the property owner or the landlord"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if property_is_leased_in_part_to_child_care_center and real_property_taxes_are_shared_and_payable_by_tenants_not_child_care_center: real_property_taxes_otherwise_due_but_for_exemption else: 0
