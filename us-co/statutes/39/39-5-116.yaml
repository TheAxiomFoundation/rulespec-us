format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-5-116
  summary: "\u201CThe assessor shall impose a late filing penalty in the amount of\
    \ fifty dollars or, if a lesser amount, fifteen percent of the amount of tax due.\u201D\
    \ A written extension may be for \u201Ceither ten or twenty days\u201D with \u201C\
    an extension fee in the amount of two dollars per day.\u201D After notice and\
    \ ten days to comply with complete-disclosure requirements, the assessor shall\
    \ impose a penalty of \u201Cup to twenty-five percent\u201D of omitted-property\
    \ valuation."
  deferred_outputs:
  - output: us-co:statutes/39/39-5-116#late_filing_penalty
    reason: Generated rule used a local name that collides with a sibling RuleSpec
      export. This output is deferred until it can be encoded with a semantic branch-specific
      name without creating ambiguous sibling imports.
rules:
- name: late_filing_penalty_fixed_amount
  kind: parameter
  dtype: Money
  unit: USD
  source: C.R.S. 39-5-116(1)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-5-116
          excerpt: late filing penalty in the amount of fifty dollars
  versions:
  - effective_from: '0001-01-01'
    formula: '50'
- name: late_filing_penalty_rate
  kind: parameter
  dtype: Rate
  source: C.R.S. 39-5-116(1)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-5-116
          excerpt: fifteen percent of the amount of tax due
  versions:
  - effective_from: '0001-01-01'
    formula: '0.15'
- name: short_extension_days
  kind: parameter
  dtype: Count
  source: C.R.S. 39-5-116(1)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-5-116
          excerpt: a period of either ten or twenty days
  versions:
  - effective_from: '0001-01-01'
    formula: '10'
- name: long_extension_days
  kind: parameter
  dtype: Count
  source: C.R.S. 39-5-116(1)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-5-116
          excerpt: a period of either ten or twenty days
  versions:
  - effective_from: '0001-01-01'
    formula: '20'
- name: extension_fee_per_day
  kind: parameter
  dtype: Money
  unit: USD
  source: C.R.S. 39-5-116(1)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-5-116
          excerpt: an extension fee in the amount of two dollars per day
  versions:
  - effective_from: '0001-01-01'
    formula: '2'
- name: disclosure_cure_period_days
  kind: parameter
  dtype: Count
  source: C.R.S. 39-5-116(2)(a)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-5-116
          excerpt: allowing such person ten days from the date of notification to
            comply
  versions:
  - effective_from: '0001-01-01'
    formula: '10'
- name: omitted_property_penalty_maximum_rate
  kind: parameter
  dtype: Rate
  source: C.R.S. 39-5-116(2)(a)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-5-116
          excerpt: a penalty in an amount of up to twenty-five percent
  versions:
  - effective_from: '0001-01-01'
    formula: '0.25'
- name: extension_request_is_permitted
  kind: derived
  entity: Person
  dtype: Judgment
  period: Year
  source: C.R.S. 39-5-116(1)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/statute/39/39-5-116
          excerpt: Any person who is unable to properly complete and file ... by April
            15 may request an extension ... for a period of either ten or twenty days
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-5-116
          excerpt: which request shall be in writing
  versions:
  - effective_from: '0001-01-01'
    formula: 'person_is_unable_to_complete_and_file_by_april_15

      and written_extension_was_requested

      and (requested_extension_days == short_extension_days or requested_extension_days
      == long_extension_days)'
- name: extension_fee_due
  kind: derived
  entity: Person
  dtype: Money
  period: Year
  unit: USD
  source: C.R.S. 39-5-116(1)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-5-116
          excerpt: payment of an extension fee in the amount of two dollars per day
            of extension requested
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-5-116
          excerpt: two dollars per day of extension requested
  versions:
  - effective_from: '0001-01-01'
    formula: 'if extension_request_is_permitted: extension_fee_per_day * requested_extension_days
      else: 0'
- name: late_filing_penalty_applies
  kind: derived
  entity: Person
  dtype: Judgment
  period: Year
  source: C.R.S. 39-5-116(1)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/statute/39/39-5-116
          excerpt: If any person owning taxable personal property to whom one or more
            personal property schedules have been mailed, or upon whom the assessor
            or his deputy has called and left one or more schedules, fails to complete
            and return the same
  versions:
  - effective_from: '0001-01-01'
    formula: 'personal_property_schedule_was_mailed_or_left

      and schedule_was_not_filed_by_applicable_deadline'
- name: disclosure_is_incomplete_or_misleading
  kind: derived
  entity: Person
  dtype: Judgment
  period: Year
  source: C.R.S. 39-5-116(2)(a)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: definition
        source:
          corpus_citation_path: us-co/statute/39/39-5-116
          excerpt: includes in a filed schedule any information concerning his property
            which is false, erroneous, or misleading or fails to include in a schedule
            any taxable property owned by him
  versions:
  - effective_from: '0001-01-01'
    formula: 'filed_schedule_contains_false_erroneous_or_misleading_information

      or schedule_omits_taxable_property_owned_by_person'
- name: omitted_property_penalty_applies
  kind: derived
  entity: Person
  dtype: Judgment
  period: Year
  source: C.R.S. 39-5-116(2)(a)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/statute/39/39-5-116
          excerpt: to whom two successive personal property schedules have been mailed
            or upon whom the assessor or his deputy has called and left one or more
            schedules
      - path: versions[0].formula
        kind: ordering
        source:
          corpus_citation_path: us-co/statute/39/39-5-116
          excerpt: after notifying the person ... and allowing such person ten days
            from the date of notification to comply
  versions:
  - effective_from: '0001-01-01'
    formula: '(two_successive_personal_property_schedules_were_mailed or personal_property_schedule_was_left_by_assessor)

      and disclosure_is_incomplete_or_misleading

      and person_was_notified_of_disclosure_failure

      and days_since_disclosure_failure_notification >= disclosure_cure_period_days

      and person_has_not_complied_with_disclosure_requirement'
- name: maximum_omitted_property_penalty
  kind: derived
  entity: Person
  dtype: Money
  period: Year
  unit: USD
  source: C.R.S. 39-5-116(2)(a)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-5-116
          excerpt: a penalty in an amount of up to twenty-five percent of the valuation
            for assessment determined for the omitted personal property
  versions:
  - effective_from: '0001-01-01'
    formula: 'if omitted_property_penalty_applies: omitted_property_penalty_maximum_rate
      * omitted_personal_property_valuation_for_assessment else: 0'
