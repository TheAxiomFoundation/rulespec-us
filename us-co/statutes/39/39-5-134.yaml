format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-5-134
  summary: |-
    A CEA facility whose sole use is not growing crops for human or livestock consumption is classified and valued based on actual use. A CEA facility must not violate an applicable water court decree or materially injure water rights or conditional water rights.
rules:
  - name: cea_facility_actual_use_classification_required
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-5-134(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-5-134
              excerpt: "If the sole use of the CEA facility is not the growing of crops for human or\nlivestock consumption, then the property is classified and valued for assessment\npurposes based on actual use."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_cea_facility
          and sole_use_is_not_growing_crops_for_human_or_livestock_consumption
  - name: cea_facility_water_rights_protection_satisfied
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-5-134(5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-5-134
              excerpt: "a CEA facility shall not\nviolate the terms and conditions of any applicable water court decree issued\npursuant to article 92 of title 37 and shall not materially injure water rights or\nconditional water rights granted under article 92 of title 37."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not asset_is_cea_facility
          or (
            facility_does_not_violate_applicable_water_court_decree
            and facility_does_not_materially_injure_water_rights_or_conditional_water_rights
          )
