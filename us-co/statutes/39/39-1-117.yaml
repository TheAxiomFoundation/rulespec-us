format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-1-117
  summary: |-
    Nothing in articles 1 to 13 of this title shall apply to ... proceeding arising under or pursuant to the laws in effect immediately prior to August 1, 1964, but the same shall be governed by and conducted pursuant to the provisions of law in effect immediately prior to August 1, 1964.
