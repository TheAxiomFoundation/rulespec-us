format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-20-103
  summary: |-
    A prior recorded lienholder or purchaser may file an action for final determination of Colorado claims and liens if no action has commenced within two months after the executive director receives a written request. A priority lien foreclosure under article 38 does not require those procedures. Tax-lien divestiture excludes liens with priority under section 39-22-604.
  deferred_outputs:
    - output: us-co:statutes/39/39-20-103#state_tax_lien_may_be_divested_by_article_38_foreclosure
      reason: The divestiture rule expressly excludes liens with priority pursuant to section 39-22-604, whose required priority mechanics are not available in copied RuleSpec context.
    - output: us-co:statutes/39/39-20-103#state_has_same_redemption_rights_as_other_lienors_in_article_38_foreclosure
      reason: The source grants the state the same redemption rights as other lienors, but the available schema does not represent the referenced comparative bundle of foreclosure redemption rights.
rules:
  - name: executive_director_request_response_period_months
    kind: parameter
    dtype: Count
    period: Month
    source: Colo. Rev. Stat. § 39-20-103(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-20-103
              excerpt: "within two months after receipt by the executive director"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          2
  - name: prior_lienholder_or_purchaser_may_file_tax_lien_claim_determination_action
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-20-103(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-20-103
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-20-103
              excerpt: "within two months after receipt by the executive director"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (person_has_recorded_prior_lien_or_interest_on_subject_real_estate
          or person_purchased_subject_real_estate_at_sale_to_satisfy_prior_lien_or_interest)
          and executive_director_received_written_request
          and no_civil_action_has_commenced_since_written_request
          and months_since_written_request_received >= executive_director_request_response_period_months
  - name: priority_lien_foreclosure_is_exempt_from_tax_lien_claim_action_procedures
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-20-103(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-20-103
              excerpt: "shall not be required to make a\nwritten request or to commence a civil action"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          foreclosure_is_under_article_38_of_title_38
          and person_is_foreclosing_deed_of_trust_or_other_lien
          and foreclosed_lien_has_priority_over_state_tax_lien
