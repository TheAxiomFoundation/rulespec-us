format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-21-118
  summary: |-
    Willful tax evasion, collection/payment failures, false refund statements, filing failures, false sworn documents, and aiding fraud are criminal offenses with stated fine and imprisonment limits. Subsection (2)(a) does not apply to the temporary sales tax deduction and retention allowed in section 39-26-105(1.3).
