  - name: maximum_tax_evasion_fine
    kind: derived
    entity: TaxOffenseDefendant
    dtype: Money
    period: Year
    unit: USD
    source: C.R.S. § 39-21-118(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-21-118
              excerpt: "upon conviction thereof ... a fine of not more than one hundred thousand dollars, or five hundred thousand dollars in the case of a corporation"
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:statutes/39/39-21-118#tax_evasion_standard_fine_cap
              output: tax_evasion_standard_fine_cap
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:statutes/39/39-21-118#tax_evasion_corporate_fine_cap
              output: tax_evasion_corporate_fine_cap
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if convicted_of_willful_tax_evasion:
            if defendant_is_corporation: tax_evasion_corporate_fine_cap else: tax_evasion_standard_fine_cap
          else: 0

