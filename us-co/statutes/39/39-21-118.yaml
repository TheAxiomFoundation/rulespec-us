    kind: parameter
    dtype: Money
    unit: USD
    source: C.R.S. § 39-21-118(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-21-118
              excerpt: "a fine of not more than one hundred thousand dollars"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
