format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-5404
  summary: |-
    “The authority may allocate credits to any governmental or quasi-governmental entity ... with respect to a qualified development that is owned by such entity.” A governmental or quasi-governmental entity may transfer allocated credits to a qualified taxpayer, who is entitled to claim the credit as an owner.
  deferred_outputs:
    - output: us-co:statutes/39/39-22-5404#recapture_and_transferee_notice_requirements
      reason: Recapture and the related notice requirement depend on the unprovided mechanics of section 39-22-5405.
rules:
  - name: credit_allocation_for_owned_qualified_development_is_permitted
    kind: derived
    entity: GovernmentalOrQuasiGovernmentalEntity
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-22-5404(1)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-22-5404
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          entity_owns_qualified_development

  - name: credit_transfer_to_qualified_taxpayer_is_permitted
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-22-5404(1)(b)(I)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-22-5404
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          credit_is_allocated_to_governmental_or_quasi_governmental_entity
          and taxpayer_is_qualified

  - name: transferred_credit_is_claimable_as_owner_credit
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-22-5404(1)(b)(III)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-22-5404
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          credit_was_transferred_pursuant_to_subsection_1_b
