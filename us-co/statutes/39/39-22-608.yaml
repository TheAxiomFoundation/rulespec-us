format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-608
  summary: |-
    Returns are due on the fifteenth day of the fourth month after the taxable year; qualifying C corporations beginning taxable years on or after January 1, 2024, are due in the fifth month, and residents outside the United States receive an automatic extension through the fifteenth day of the sixth month.
rules:
  - name: standard_return_filing_months_after_taxable_year_close
    kind: parameter
    dtype: Integer
    source: C.R.S. 39-22-608(2)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-608
              excerpt: "fourth month following the close of the taxable\nyear"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          4
  - name: c_corporation_return_filing_months_after_taxable_year_close
    kind: parameter
    dtype: Integer
    source: C.R.S. 39-22-608(2)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-608
              excerpt: "fifteenth day of the fifth month following the close of the taxable year"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          5
  - name: overseas_resident_return_filing_months_after_taxable_year_close
    kind: parameter
    dtype: Integer
    source: C.R.S. 39-22-608(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-608
              excerpt: "fifteenth day of the sixth month following\nthe close of the taxable year"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          6
  - name: return_filing_due_day_of_month
    kind: parameter
    dtype: Integer
    source: C.R.S. 39-22-608(2)-(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-608
              excerpt: "fifteenth day"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          15
  - name: return_filing_month_after_taxable_year_close
    kind: derived
    entity: IncomeTaxReturn
    dtype: Integer
    period: Year
    source: C.R.S. 39-22-608(2)-(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-608
              excerpt: "Except as provided in subsection (2)(b) ... fourth month ... C corporation ... fifth month ... residents ... outside the United States ... sixth month"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if return_filer_is_traveling_or_temporarily_residing_outside_the_united_states_at_standard_due_time: overseas_resident_return_filing_months_after_taxable_year_close else: if return_is_for_c_corporation_subject_to_article_22_taxation and taxable_year_is_on_or_after_c_corporation_filing_deadline_effective_date: c_corporation_return_filing_months_after_taxable_year_close else: standard_return_filing_months_after_taxable_year_close
  - name: electronic_filing_deadline_alignment_may_be_adopted
    kind: derived
    entity: IncomeTaxReturn
    dtype: Judgment
    period: Year
    source: C.R.S. 39-22-608(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-22-608
              excerpt: "if the time for electronic\nfiling of a federal income tax return pursuant to the internal revenue code is\nchanged to a date later"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          federal_electronic_filing_deadline_is_later_than_statutory_deadline
