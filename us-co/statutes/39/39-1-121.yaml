format: rulespec/v1
module:
  status: deferred
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-1-121
  summary: |-
    “Communication” means a tax statement pursuant to section 39-10-103; “mill” means the amount of dollars per one thousand dollars of valuation for assessment; and “valuation for assessment” means actual value multiplied by assessment percentages specified in law. Mill levy amounts stated in a communication must be converted to dollars per one thousand dollars of valuation for assessment.
  deferred_outputs:
    - output: us-co:statutes/39/39-1-121/a#communication
      reason: The definition depends on section 39-10-103, which is not available as copied RuleSpec context.
    - output: us-co:statutes/39/39-1-121/b#mill
      reason: The provision defines a rate expression but does not provide a supported schema surface for a communication-level mill-levy representation.
    - output: us-co:statutes/39/39-1-121/c#valuation_for_assessment
      reason: The definition depends on assessment percentages specified elsewhere in law, with no copied RuleSpec context for those percentages.
    - output: us-co:statutes/39/39-1-121/3#mill_levy_amounts_converted_in_communication
      reason: The operative communication-level conversion duty requires a supported communication and stated-mill-levy data model not provided by this source or copied context.
