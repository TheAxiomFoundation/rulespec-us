format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-11-143
  summary: |-
    “The board of county commissioners may lease such real property to an affiliated entity, but no lease shall be for a period exceeding five years.” An affiliated entity is a nonprofit entity with which the county contracts for delivery of goods or services. The foregoing provisions do not apply to a city and county having a population of more than three hundred thousand.
rules:
  - name: affiliated_entity_lease_maximum_years
    kind: parameter
    dtype: Count
    period: Year
    source: C.R.S. 39-11-143(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-11-143
              excerpt: "no lease shall be for a period exceeding five years"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          5

  - name: city_and_county_population_exemption_threshold
    kind: parameter
    dtype: Count
    period: Year
    source: C.R.S. 39-11-143(6)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-11-143
              excerpt: "city and county having a population of more than three hundred thousand"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          300000

  - name: lessee_is_affiliated_entity
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. 39-11-143(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-11-143
              excerpt: "affiliated entity means a nonprofit entity with which the county enters into a contract for the delivery of goods or services"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          proposed_lessee_is_nonprofit_entity
          and county_has_contract_with_proposed_lessee_for_goods_or_services

  - name: county_may_lease_tax_deed_property_to_affiliated_entity
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. 39-11-143(3), (6)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-11-143
              excerpt: "The board of county commissioners may lease such real property to an affiliated entity"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-11-143
              excerpt: "shall not apply to any city and county having a population of more than three hundred thousand"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-11-143
              excerpt: "no lease shall be for a period exceeding five years"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          property_was_conveyed_to_county_by_tax_deed
          and lessee_is_affiliated_entity
          and proposed_lease_term_years <= affiliated_entity_lease_maximum_years
          and not (county_is_city_and_county and county_population > city_and_county_population_exemption_threshold)
