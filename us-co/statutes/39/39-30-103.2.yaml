format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-30-103.2
  summary: |-
    “The county has a population of five thousand or less as estimated by the department of local affairs.”
rules:
  - name: enhanced_rural_zone_population_limit
    kind: parameter
    dtype: Count
    period: Year
    source: 39-30-103.2(e)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-30-103.2
              excerpt: "The county has a population of five thousand or less"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          5000
  - name: county_meets_population_criterion
    kind: derived
    entity: County
    dtype: Judgment
    period: Year
    source: 39-30-103.2(e)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-30-103.2
              excerpt: "population of five thousand or less as estimated by the department of local affairs"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          county_population_estimated_by_department_of_local_affairs <= enhanced_rural_zone_population_limit
