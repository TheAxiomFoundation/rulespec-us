format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-564
  summary: For income tax years commencing on or after January 1, 2027, but before
    January 1, 2038, a qualified taxpayer is allowed a credit equal to the amount
    stated on the tax credit certificate. The certificate amount may not exceed seventy-five
    percent of qualified expenditures. The annual aggregate certificate limit is five
    million dollars, subject to statutory adjustments. An unused credit is refundable,
    and disallowed credits are recaptured.
  deferred_outputs:
  - output: us-co:statutes/39/39-22-564/a#coal_transition_community
    reason: The definition depends on the tier-one-transition-community definition
      in section 8-83-502 (10), for which no executable RuleSpec dependency was supplied.
  - output: us-co:statutes/39/39-22-564/b#department
    reason: This institutional definition identifies the department of revenue but
      does not establish a computable entity-scoped output.
  - output: us-co:statutes/39/39-22-564/4/d#transportation_department_electronic_certificate_report
    reason: The provision requires an administrative electronic report containing
      taxpayer identifiers and certificate data; that reporting payload is outside
      the supported scalar RuleSpec surface.
  - output: us-co:statutes/39/39-22-564/5#aggregate_tax_credit_certificates_available
    reason: The final annual aggregate limit requires certificate-level allocation,
      rescission and utilization records, prior-year carryforward, and a determination
      under deferred section 39-22-563.
    source_values:
    - us-co:statutes/39/39-22-564#annual_certificate_base_limit
    - us-co:statutes/39/39-22-564#insufficient_interest_annual_limit_increase
  - output: us-co:statutes/39/39-22-564/8/c#compliance_period
    reason: The three-year duration is retained as a scalar, but computing the rolling
      period following each claim year requires claim-year event relations not represented
      by this module.
    source_values:
    - us-co:statutes/39/39-22-564#compliance_period_years
  - output: us-co:statutes/39/39-22-564#compliance_period_years
    reason: Generated rule used a local name that collides with a sibling RuleSpec
      export. This output is deferred until it can be encoded with a semantic branch-specific
      name without creating ambiguous sibling imports.
rules:
- name: maximum_qualified_expenditure_credit_rate
  kind: parameter
  dtype: Rate
  source: 39-22-564(4)(b)(IV)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-22-564
          excerpt: "must not exceed seventy-five percent of the\namount of qualified expenditures"
  versions:
  - effective_from: '2027-01-01'
    formula: '0.75'
- name: annual_certificate_base_limit
  kind: parameter
  dtype: Money
  unit: USD
  period: Year
  source: 39-22-564(5)(a)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-22-564
          excerpt: "must not\nexceed five million dollars in any calendar year"
  versions:
  - effective_from: '2027-01-01'
    formula: '5000000'
- name: insufficient_interest_annual_limit_increase
  kind: parameter
  dtype: Money
  unit: USD
  period: Year
  source: 39-22-564(5)(d)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-22-564
          excerpt: "is increased by five million dollars\nfor each of the following calendar years through calendar year 2037"
  versions:
  - effective_from: '2027-01-01'
    formula: '5000000'
- name: qualified_expenditure
  kind: derived
  entity: Payment
  dtype: Judgment
  period: Year
  source: 39-22-564(c)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: definition
        source:
          corpus_citation_path: us-co/statute/39/39-22-564
  versions:
  - effective_from: '2027-01-01'
    formula: 'expenditure_is_direct_operating_or_capital_improvement_expenditure

      and expenditure_is_necessary_to_maintain_or_improve_a_qualified_rail_line'
- name: qualified_rail_line
  kind: derived
  entity: Asset
  dtype: Judgment
  period: Year
  source: 39-22-564(d)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: definition
        source:
          corpus_citation_path: us-co/statute/39/39-22-564
  versions:
  - effective_from: '2027-01-01'
    formula: 'rail_line_is_in_this_state

      and transportation_department_determined_line_at_risk_of_inactivity_or_abandonment_due_to_lack_of_demand

      and line_is_covered_by_passenger_access_agreement_through_required_date'
- name: qualified_taxpayer
  kind: derived
  entity: Business
  dtype: Judgment
  period: Year
  source: 39-22-564(e)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: definition
        source:
          corpus_citation_path: us-co/statute/39/39-22-564
  versions:
  - effective_from: '2027-01-01'
    formula: 'taxpayer_is_common_carrier

      and taxpayer_transports_freight_on_a_qualified_rail_line'
- name: maximum_credit_based_on_qualified_expenditures
  kind: derived
  entity: Business
  dtype: Money
  unit: USD
  period: Year
  source: 39-22-564(4)(b)(IV)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-22-564
          excerpt: "must not exceed seventy-five percent of the\namount of qualified expenditures incurred by the taxpayer"
  versions:
  - effective_from: '2027-01-01'
    formula: maximum_qualified_expenditure_credit_rate * max(0, qualified_expenditures_incurred)
- name: tax_credit_allowed
  kind: derived
  entity: Business
  dtype: Money
  unit: USD
  period: Year
  source: 39-22-564(3)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-22-564
          excerpt: "in an amount equal to the amount\nstated on the tax credit certificate"
  versions:
  - effective_from: '2027-01-01'
    formula: 'if qualified_taxpayer and tax_credit_certificate_is_filed_with_state_income_tax_return
      and income_tax_year_begins_before_credit_termination_date: max(0, tax_credit_certificate_amount)
      else: 0'
- name: refundable_credit_amount
  kind: derived
  entity: Business
  dtype: Money
  unit: USD
  period: Year
  source: 39-22-564(6)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-22-564
  versions:
  - effective_from: '2027-01-01'
    formula: max(0, tax_credit_allowed - max(0, income_taxes_otherwise_due))
- name: recaptured_tax_credit
  kind: derived
  entity: Business
  dtype: Money
  unit: USD
  period: Year
  source: 39-22-564(8)(a)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-22-564
  versions:
  - effective_from: '2027-01-01'
    formula: 'if transportation_department_disallowed_credit_during_compliance_period:
      max(0, disallowed_tax_credit_amount) else: 0'
- name: passenger_rail_charge_credit_required_amount
  kind: derived
  entity: Business
  dtype: Money
  unit: USD
  period: Year
  source: 39-22-564(9)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-22-564
  versions:
  - effective_from: '2027-01-01'
    formula: 'if passenger_rail_access_agreement_applies: tax_credit_allowed else:
      0'
