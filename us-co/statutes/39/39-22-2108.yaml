format: rulespec/v1
module:
  summary: |-
    For each allocation year, the authority shall by December 31 provide a written report to the general assembly and make it available to the public. The report must specify allocated qualified developments and supported units, describe each development, and provide housing-market and demographic information addressing affordable-housing needs and disparities.
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-2108
rules:
  - name: annual_affordable_housing_tax_credit_report_requirements_satisfied
    kind: derived
    entity: AffordableHousingTaxCreditAuthority
    dtype: Judgment
    period: Year
    source: C.R.S. 39-22-2108(1)(a)-(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-22-2108
              excerpt: "by December 31 of that year, provide a written report to the general assembly and shall further make the report available to the public"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-22-2108
              excerpt: "Specify the number of qualified developments ... and the total number of units supported by each development"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-22-2108
              excerpt: "Describe each qualified development"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-22-2108
              excerpt: "Provide housing market and demographic information"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          written_report_provided_by_allocation_year_end
          and report_made_available_to_public
          and report_specifies_allocated_developments_and_supported_units
          and report_describes_each_allocated_qualified_development
          and report_provides_housing_market_and_demographic_information
