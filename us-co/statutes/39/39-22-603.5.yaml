format: rulespec/v1
imports:
  - us-co:statutes/39/39-22-600.3#frivolous_return
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-603.5
  summary: |-
    If a person files a frivolous return, the executive director may calculate the person's Colorado taxable income and assess based on available information. If the calculated tax exceeds the amount previously assessed or paid, a deficiency notice shall be mailed by first-class mail.
rules:
  - name: executive_director_may_calculate_taxable_income_and_assess
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: C.R.S. 39-22-603.5(2)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-22-603.5
              excerpt: "If any person files a frivolous return"
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:statutes/39/39-22-600.3#frivolous_return
              output: frivolous_return
              hash: sha256:e40f89bdd2218db6ff3c2a064482b5eaf874ae6d8568082859f68c86c2587a32
