format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-26-711.5
  summary: |-
    A new or used aircraft is exempt if sold to a nonresident, removed within the longer stated period, and not in the state more than seventy-three days in any of the three following calendar years. Overnight hangaring or parking counts as being in the state.
  deferred_outputs:
    - output: us-co:statutes/39/39-26-711.5/2#purchaser_affidavit_required
      reason: The affidavit requirement is qualified by a department determination under section 39-26-730(2), whose operative RuleSpec source is unavailable.
rules:
  - name: removal_deadline_after_sale
    kind: parameter
    dtype: Count
    period: Day
    source: 39-26-711.5(1)(b)(I)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-26-711.5
              excerpt: One hundred twenty days after the date of the sale.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          120
  - name: removal_deadline_after_sale_associated_work
    kind: parameter
    dtype: Count
    period: Day
    source: 39-26-711.5(1)(b)(II)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-26-711.5
              excerpt: Thirty days after the completion of maintenance, interior refurbishment, paint, or engine work.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30
  - name: aircraft_presence_limit
    kind: parameter
    dtype: Count
    period: Day
    source: 39-26-711.5(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-26-711.5
              excerpt: not be in the state more than seventy-three days
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          73
  - name: following_calendar_years_subject_to_presence_limit
    kind: parameter
    dtype: Count
    period: Year
    source: 39-26-711.5(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-26-711.5
              excerpt: in any of the three calendar years following the calendar year in which the aircraft is removed
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          3
  - name: aircraft_removal_timing_requirement_met
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Day
    source: 39-26-711.5(1)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-26-711.5
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-26-711.5
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          days_after_sale_until_aircraft_removal <= removal_deadline_after_sale
          or days_after_completion_of_sale_associated_work_until_aircraft_removal <= removal_deadline_after_sale_associated_work
  - name: aircraft_presence_requirement_met
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: 39-26-711.5(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-26-711.5
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-26-711.5
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          number_of_calendar_years_following_removal_reviewed == following_calendar_years_subject_to_presence_limit
          and maximum_aircraft_days_in_state_during_following_calendar_years <= aircraft_presence_limit
  - name: aircraft_is_in_state_for_exemption
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Day
    source: 39-26-711.5(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-26-711.5
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          aircraft_is_physically_in_state
          or aircraft_is_hangared_or_parked_overnight
  - name: aircraft_sales_tax_exemption_applies
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Day
    source: 39-26-711.5(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-26-711.5
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-26-711.5
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          purchaser_is_not_state_resident
          and aircraft_removal_timing_requirement_met
          and aircraft_presence_requirement_met
