format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-21-106
  summary: |-
    “The executive director or the executive director's delegate may compromise” a covered case before reference to the department of law; after reference, the attorney general shall compromise upon written direction. An opinion and stated amounts must be filed for compromises of $2,500 or more, except civil cases with an unpaid assessed amount below $2,500.
rules:
  - name: compromise_record_filing_amount_threshold
    kind: parameter
    dtype: Money
    unit: USD
    source: C.R.S. 39-21-106(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-21-106
              excerpt: "a compromise of two thousand five hundred dollars or more"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          2500

  - name: civil_case_opinion_exception_unpaid_amount_threshold
    kind: parameter
    dtype: Money
    unit: USD
    source: C.R.S. 39-21-106(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-21-106
              excerpt: "unpaid amount of tax assessed, including any interest, additional amount,\naddition to the tax, or assessable penalty, is less than two thousand five hundred\ndollars"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          2500

  - name: executive_director_may_compromise_before_department_of_law_reference
    kind: derived
    entity: TaxCompromiseCase
    dtype: Judgment
    period: Year
    source: C.R.S. 39-21-106(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-21-106
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          case_arises_under_tax_or_charge_administered_pursuant_to_article_21
          and not case_has_been_referred_to_department_of_law_for_prosecution_or_defense

  - name: attorney_general_must_compromise_after_department_of_law_reference
    kind: derived
    entity: TaxCompromiseCase
    dtype: Judgment
    period: Year
    source: C.R.S. 39-21-106(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-21-106
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          case_arises_under_tax_or_charge_administered_pursuant_to_article_21
          and case_has_been_referred_to_department_of_law_for_prosecution_or_defense
          and executive_director_has_given_written_direction

  - name: civil_case_opinion_exception_applies
    kind: derived
    entity: TaxCompromiseCase
    dtype: Judgment
    period: Year
    source: C.R.S. 39-21-106(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-21-106
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          case_is_civil
          and unpaid_tax_assessment_including_interest_additions_and_penalties < civil_case_opinion_exception_unpaid_amount_threshold

  - name: compromise_opinion_and_required_amount_statement_must_be_filed
    kind: derived
    entity: TaxCompromiseCase
    dtype: Judgment
    period: Year
    source: C.R.S. 39-21-106(2)-(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-21-106
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-21-106
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          compromise_made_by_executive_director_or_delegate
          and compromise_amount >= compromise_record_filing_amount_threshold
          and not civil_case_opinion_exception_applies
