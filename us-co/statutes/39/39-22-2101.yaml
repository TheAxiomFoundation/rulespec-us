format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-2101
  summary: |-
    “Compliance period means the period of fifteen years”; “Credit period means
    the period of six taxable years” beginning with the taxable year in which a
    qualified development is placed in service.
  deferred_outputs:
    - output: us-co:statutes/39/39-22-2101#allocation_certificate
      reason: The source defines a certificate instrument, which has no supported executable entity or value shape.
    - output: us-co:statutes/39/39-22-2101#authority
      reason: The source defines the authority by reference to section 29-4-704, whose RuleSpec source is unavailable.
    - output: us-co:statutes/39/39-22-2101#compliance_period
      reason: The source defines a fifteen-year period beginning with a tax-year event; RuleSpec has no date or period-span output type.
      source_values:
        - us-co:statutes/39/39-22-2101#compliance_period_years
    - output: us-co:statutes/39/39-22-2101#credit
      reason: The source defines the credit by reference to section 39-22-2102, whose RuleSpec source is unavailable.
    - output: us-co:statutes/39/39-22-2101#credit_period
      reason: The source defines a six-taxable-year period based on qualified-development placement in service, including a multiple-building rule; the necessary qualified-development definition is unavailable and RuleSpec has no period-span output type.
      source_values:
        - us-co:statutes/39/39-22-2101#credit_period_taxable_years
    - output: us-co:statutes/39/39-22-2101#department
      reason: The source defines an institutional entity, which has no supported executable entity or value shape.
    - output: us-co:statutes/39/39-22-2101#federal_tax_credit
      reason: The source defines the federal tax credit by reference to section 42 of the internal revenue code, whose RuleSpec source is unavailable.
    - output: us-co:statutes/39/39-22-2101#qualified_allocation_plan
      reason: The source defines the plan by reference to section 42(m) of the internal revenue code, whose RuleSpec source is unavailable.
    - output: us-co:statutes/39/39-22-2101#qualified_basis
      reason: The source defines qualified basis by reference to section 42 of the internal revenue code, whose RuleSpec source is unavailable.
    - output: us-co:statutes/39/39-22-2101#qualified_development
      reason: The source incorporates the section 42 definition of a qualified low-income housing project, whose RuleSpec source is unavailable.
    - output: us-co:statutes/39/39-22-2101#qualified_taxpayer
      reason: The definition spans individuals and entities and depends on tax liability under this article; no single supported entity scope faithfully represents it.
rules:
  - name: compliance_period_years
    kind: parameter
    dtype: Count
    source: C.R.S. 39-22-2101(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-2101
              excerpt: “period of fifteen years”
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          15
  - name: credit_period_taxable_years
    kind: parameter
    dtype: Count
    source: C.R.S. 39-22-2101(5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-2101
              excerpt: “period of six taxable years”
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          6
