format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-26-724
  summary: |-
    For fiscal years commencing on or after July 1, 2006, sales, storage, and use of components used to produce alternating current electricity from a renewable energy source are exempt; excluded items include components beyond generator step-up transformers at the production site, labor, energy storage devices, and remote monitoring systems.
rules:
  - name: renewable_electricity_component_tax_exemption_applies
    kind: derived
    entity: TaxableTransaction
    dtype: Judgment
    period: Year
    source: C.R.S. 39-26-724(1)(a), (2)(b)(I)-(II)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-26-724
              excerpt: "components used in the production of alternating current electricity from a renewable energy source"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-26-724
              excerpt: "shall not include any components beyond the point of generator step-up transformers located at the production site, labor, energy storage devices, or remote monitoring systems"
    versions:
      - effective_from: '2006-07-01'
        formula: |-
          item_is_component_used_to_produce_alternating_current_electricity_from_renewable_energy_source
          and not item_is_component_beyond_generator_step_up_transformers_at_production_site
          and not item_is_labor
          and not item_is_energy_storage_device
          and not item_is_remote_monitoring_system
