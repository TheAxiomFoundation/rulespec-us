format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-504.6
  summary: |-
    “Dependent child means any person who is: (a) Under the age of twenty-one years; ... or (c) So mentally or physically incapacitated that he or she cannot provide for himself or herself.” “Qualified higher deductible health plan means a health coverage policy ...” with stated individual and family deductible ranges.
  deferred_outputs:
    - output: us-co:statutes/39/39-22-504.6#eligible_medical_expense
      reason: The definition depends on the deductible-medical-expense mechanics of Internal Revenue Code section 213(d), which is not available in copied RuleSpec context.
    - output: us-co:statutes/39/39-22-504.6#medical_savings_account
      reason: The definition requires account-specific relationships among an account holder, spouse, dependent children, and eligible medical expenses that are not represented by an available structural relation.
rules:
  - name: dependent_child_age_limit
    kind: parameter
    dtype: Integer
    period: Year
    source: 39-22-504.6(2)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-504.6
              excerpt: "Under the age of twenty-one years"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          21

  - name: individual_coverage_minimum_deductible
    kind: parameter
    dtype: Money
    unit: USD
    period: Year
    source: 39-22-504.6(3.5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-504.6
              excerpt: "at least one thousand five hundred dollars"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1500

  - name: individual_coverage_maximum_deductible
    kind: parameter
    dtype: Money
    unit: USD
    period: Year
    source: 39-22-504.6(3.5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-504.6
              excerpt: "no more than two thousand two hundred fifty dollars for individual coverage"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          2250

  - name: family_coverage_minimum_deductible
    kind: parameter
    dtype: Money
    unit: USD
    period: Year
    source: 39-22-504.6(3.5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-504.6
              excerpt: "at least three thousand dollars"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          3000

  - name: family_coverage_maximum_deductible
    kind: parameter
    dtype: Money
    unit: USD
    period: Year
    source: 39-22-504.6(3.5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-504.6
              excerpt: "no more than four thousand five hundred dollars for family coverage"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          4500

  - name: employee
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 39-22-504.6(2.5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-22-504.6
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          medical_savings_account_is_established_for_person

  - name: employer
    kind: derived
    entity: Employer
    dtype: Judgment
    period: Year
    source: 39-22-504.6(2.6)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-22-504.6
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          employs_one_or_more_persons_in_colorado
          and not employer_is_federal_government

  - name: employer_account_administrator
    kind: derived
    entity: Employer
    dtype: Judgment
    period: Year
    source: 39-22-504.6(d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-22-504.6
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          employer
          and employer_maintains_self_insured_health_plan_meeting_erisa_requirements

  - name: dependent_child
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 39-22-504.6(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-22-504.6
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_age < dependent_child_age_limit
          or (
            person_is_legally_entitled_to_or_subject_to_court_order_for_necessary_care
            and not person_is_emancipated
            and not person_is_self_supporting
            and not person_is_married
            and not person_is_member_of_united_states_armed_forces
          )
          or person_is_mentally_or_physically_incapacitated_and_cannot_provide_for_self

  - name: qualified_higher_deductible_health_plan
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: 39-22-504.6(3.5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-22-504.6
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          health_coverage_pays_covered_benefits_exceeding_deductible
          and (
            (
              health_coverage_is_individual_coverage
              and health_coverage_deductible >= individual_coverage_minimum_deductible
              and health_coverage_deductible <= individual_coverage_maximum_deductible
            )
            or (
              health_coverage_is_family_coverage
              and health_coverage_deductible >= family_coverage_minimum_deductible
              and health_coverage_deductible <= family_coverage_maximum_deductible
            )
          )
          and health_coverage_is_purchased_by_employer_for_employee_who_makes_medical_savings_account_deposits
