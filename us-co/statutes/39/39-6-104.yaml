format: rulespec/v1
module:
  summary: |-
    Mines not worked or operated primarily for the listed excluded products shall be divided for valuation for assessment into producing and nonproducing classes.
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-6-104
rules:
  - name: mine_subject_to_producing_nonproducing_classification
    kind: derived
    entity: Mine
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-6-104
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-6-104
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not mine_is_worked_or_operated_primarily_for_coal
          and not mine_is_worked_or_operated_primarily_for_asphaltum
          and not mine_is_worked_or_operated_primarily_for_rock
          and not mine_is_worked_or_operated_primarily_for_limestone
          and not mine_is_worked_or_operated_primarily_for_dolomite
          and not mine_is_worked_or_operated_primarily_for_other_stone_products
          and not mine_is_worked_or_operated_primarily_for_sand
          and not mine_is_worked_or_operated_primarily_for_gravel
          and not mine_is_worked_oroperated_primarily_for_clay
          and not mine_is_worked_or_operated_primarily_for_earths

  - name: mine_is_in_producing_assessment_class
    kind: derived
    entity: Mine
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-6-104
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-6-104
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          mine_subject_to_producing_nonproducing_classification
          and mine_is_producing

  - name: mine_is_in_nonproducing_assessment_class
    kind: derived
    entity: Mine
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-6-104
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-6-104
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          mine_subject_to_producing_nonproducing_classification
          and not mine_is_producing
