    corpus_citation_path: us-co/statute/39/39-3-139
  summary: |-
    “County means a county or a city and county.” “Qualified communication services facility means any facility, infrastructure, equipment, or other real or personal property used in the provision of fixed broadband or mobile broadband internet access service.” A county may negotiate qualifying incentive payments or credits, subject to stated limits and administrative duties.
  deferred_outputs:
    - output: us-co:statutes/39/39-3-139/a#county
      reason: The definition identifies an institutional legal actor but does not provide a computable entity-classification interface in the supported schema.
    - output: us-co:statutes/39/39-3-139/b#qualified_communication_services_facility
      reason: The definition covers open-ended facilities, infrastructure, equipment, and property categories; determining whether an asset is used to provide FCC-defined broadband service requires external classification data not defined by this source.
    - output: us-co:statutes/39/39-3-139/c#underserved_area
      reason: The definition requires January 1 FCC broadband coverage maps and provider availability at FCC minimum benchmarks, which are external data dependencies not supplied in this source or context.
    - output: us-co:statutes/39/39-3-139/d#unserved_area
      reason: The definition requires January 1 FCC broadband coverage maps and provider availability at FCC minimum benchmarks, which are external data dependencies not supplied in this source or context.
    - output: us-co:statutes/39/39-3-139/3/a#county_may_negotiate_communication_services_incentive
      reason: The discretionary county negotiation authority depends on determinations of qualified facilities and unserved or underserved areas that cannot be computed from the supplied source alone.
    - output: us-co:statutes/39/39-3-139/3/c#maximum_communication_services_incentive_payment_or_credit
      reason: The cap depends on county taxes levied on taxable property at or within a qualified facility for the current property tax year, requiring external tax-roll and facility-location data.
    - output: us-co:statutes/39/39-3-139/4#subsequent_incentive_award_terms
      reason: The nondiscrimination, competitive-neutrality, similar-terms, and proportionate-investment duties are administrative comparison standards without a supported computable agreement or investment relation.
    - output: us-co:statutes/39/39-3-139/5#required_notice_of_incentive_negotiations
      reason: The notice duty depends on identifying affected municipalities, special districts defined by unavailable section 32-1-103, and school districts.
    - output: us-co:statutes/39/39-3-139/6#additional_tax_levy_adjustment
      reason: The levy-adjustment authority depends on unavailable section 29-1-301 or a county home-rule charter and on annual incentive-payment or credit totals.
