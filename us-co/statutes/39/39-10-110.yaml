format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-10-110
  summary: |-
    If delinquent personal-property taxes, interest, and the prescribed fee are not paid by the last day of September, the personal property upon which the taxes were levied is subject to distraint, seizure, and sale.
rules:
  - name: personal_property_subject_to_distraint_seizure_and_sale
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: C.R.S. 39-10-110
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-10-110
              excerpt: "if the amount of such delinquent taxes, delinquent interest, and fee is not paid by the last day of September, the personal property upon which such taxes were levied shall be subject to distraint, seizure, and sale"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          personal_property_has_taxes_levied
          and delinquent_taxes_interest_and_fee_not_paid_by_last_day_of_september
