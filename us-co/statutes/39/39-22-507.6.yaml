format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-507.6
  summary: |-
    For income tax years commencing on or after January 1, 1988, but prior to January 1, 2023, the credit includes ten percent of the specified federal credit; the annual limitation includes one thousand dollars; excess paragraph (1)(b) credit carries to each of the three following income tax years.
  deferred_outputs:
    - output: us-co:statutes/39/39-22-507.6#investment_tax_credit_allowed
      reason: Computation requires unavailable federal sections 38, 46, and 49 mechanics and the unavailable section 39-22-507.5 credit.
      source_values:
        - us-co:statutes/39/39-22-507.6#federal_credit_percentage
        - us-co:statutes/39/39-22-507.6#annual_credit_liability_limit
    - output: us-co:statutes/39/39-22-507.6#investment_tax_credit_carryover
      reason: Computation requires the unavailable paragraph (1)(a) and (1)(b) credit amounts and the unavailable section 39-22-507.5 credit.
      source_values:
        - us-co:statutes/39/39-22-507.6#carryover_years
rules:
  - name: federal_credit_percentage
    kind: parameter
    dtype: Rate
    source: Colo. Rev. Stat. § 39-22-507.6(1)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-507.6
              excerpt: "Ten percent of that part of the credit"
    versions:
      - effective_from: '1988-01-01'
        formula: |-
          0.10
  - name: annual_credit_liability_limit
    kind: parameter
    dtype: Money
    unit: USD
    source: Colo. Rev. Stat. § 39-22-507.6(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-507.6
              excerpt: "does not exceed one thousand dollars"
    versions:
      - effective_from: '1988-01-01'
        formula: |-
          1000
  - name: carryover_years
    kind: parameter
    dtype: Count
    source: Colo. Rev. Stat. § 39-22-507.6(5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-507.6
              excerpt: "each of the\nthree income tax years following"
    versions:
      - effective_from: '1988-01-01'
        formula: |-
          3
