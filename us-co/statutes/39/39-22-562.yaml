format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-562
  summary: |-
    For income tax years commencing on or after January 1, 2025, but before January 1,
    2035, a qualified taxpayer in a new and emerging industry may receive an
    apprenticeship credit for eligible apprentices. The maximum is up to $6,300 for
    six months of employment plus up to $1,050 for each additional month, capped at
    $12,600 per apprentice per income tax year. Excess credit is refunded and may not
    be carried forward. The section is repealed effective December 31, 2037.
  deferred_outputs:
    - output: us-co:statutes/39/39-22-562/c#credit_definition
      reason: The definition identifies the credit created by this section but does not establish a separately computable value.
    - output: us-co:statutes/39/39-22-562/d#department_definition
      reason: The institutional definition of department is documentary and has no computable RuleSpec output.
    - output: us-co:statutes/39/39-22-562/g#qualified_taxpayer_definition
      reason: The definition depends on the upstream legal meaning of apprentice, which is unavailable in copied RuleSpec context.
    - output: us-co:statutes/39/39-22-562/h#registered_apprenticeship_program_definition
      reason: The definition incorporates section 8-15.7-101(13), for which no RuleSpec context is available.
    - output: us-co:statutes/39/39-22-562/4/c/i#credit_reservation_decision
      reason: The SAA's discretionary reservation decision depends on prospective applications, available annual allocations, and administrative review data not represented by this source.
    - output: us-co:statutes/39/39-22-562/5/c/i#credit_effectiveness_database
      reason: The SAA database and state-auditor reporting duty are administrative requirements, not a computable taxpayer output.
rules:
  - name: employee_minimum_annual_service_hours
    kind: parameter
    dtype: Count
    period: Year
    source: 39-22-562(2)(e)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-562
              excerpt: "at least one thousand forty hours per income tax year"
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          1040

  - name: minimum_creditable_employment_months
    kind: parameter
    dtype: Count
    period: Year
    source: 39-22-562(3)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-562
              excerpt: "no less than six\nmonths"
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          6

  - name: credit_for_initial_employment_period
    kind: parameter
    dtype: Money
    unit: USD
    period: Year
    source: 39-22-562(3)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-562
              excerpt: "up to six\nthousand three hundred dollars for six months of employment"
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          6300

  - name: credit_for_each_additional_employment_month
    kind: parameter
    dtype: Money
    unit: USD
    period: Year
    source: 39-22-562(3)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-562
              excerpt: "up to one\nthousand fifty dollars for each additional month"
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          1050

  - name: maximum_credit_per_apprentice
    kind: parameter
    dtype: Money
    unit: USD
    period: Year
    source: 39-22-562(3)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-562
              excerpt: "maximum of\ntwelve thousand six hundred dollars per apprentice per income tax year"
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          12600

  - name: maximum_apprentices_per_income_tax_year
    kind: parameter
    dtype: Count
    period: Year
    source: 39-22-562(3)(a)(I)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-562
              excerpt: "More than ten apprentices per income tax year"
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          10

  - name: maximum_consecutive_credit_years_per_apprentice
    kind: parameter
    dtype: Count
    period: Year
    source: 39-22-562(3)(a)(II)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-562
              excerpt: "more than two consecutive income tax years"
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          2

  - name: annual_credit_reservation_cap
    kind: parameter
    dtype: Money
    unit: USD
    period: Year
    source: 39-22-562(4)(c)(II)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-562
              excerpt: "must not exceed fifteen million dollars per calendar year"
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          15000000

  - name: pending_application_retention_limit_years
    kind: parameter
    dtype: Count
    period: Year
    source: 39-22-562(4)(c)(III)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-562
              excerpt: "for up to two years"
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          2

  - name: maximum_credit_certificates_per_income_tax_year
    kind: parameter
    dtype: Count
    period: Year
    source: 39-22-562(5)(a)(II)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-562
              excerpt: "May issue one income tax credit certificate per income tax year"
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          1

  - name: maximum_credit_for_eligible_apprentice
    kind: derived
    entity: Person
    dtype: Money
    unit: USD
    period: Year
    source: 39-22-562(3)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-562
              excerpt: "equal to up to six\nthousand three hundred dollars for six months of employment plus up to one\nthousand fifty dollars for each additional month of employment, for a maximum of\ntwelve thousand six hundred dollars per apprentice"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-22-562
              excerpt: "a qualified taxpayer in a new and emerging industry"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-22-562
              excerpt: "shall not claim a credit for more than ten apprentices per income tax year"
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if taxable_year_is_in_credit_availability_window
            and provision_has_not_been_repealed
            and taxpayer_is_subject_to_article_22_tax
            and taxpayer_does_business_in_colorado
            and taxpayer_employs_this_apprentice
            and taxpayer_is_in_new_and_emerging_industry
            and taxpayer_has_registered_apprenticeship_program_in_good_standing_with_certificate
            and taxpayer_claims_no_more_than_ten_apprentices
            and apprentice_performs_services_for_taxpayer_hours >= employee_minimum_annual_service_hours
            and creditable_months_of_wage_paid_apprenticeship_employment >= minimum_creditable_employment_months
            and apprentice_has_not_been_claimed_for_more_than_two_consecutive_income_tax_years
          : min(
              maximum_credit_per_apprentice,
              credit_for_initial_employment_period
              + credit_for_each_additional_employment_month
                * max(0, creditable_months_of_wage_paid_apprenticeship_employment - minimum_creditable_employment_months)
            )
          else: 0

  - name: refundable_excess_apprenticeship_credit
    kind: derived
    entity: Employer
    dtype: Money
    unit: USD
    period: Year
    source: 39-22-562(8)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-562
              excerpt: "the excess credit shall not\nbe carried forward and must be refunded to the taxpayer"
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if provision_has_not_been_repealed:
            max(0, apprenticeship_credit_certificate_amount - income_tax_due)
          else: 0
