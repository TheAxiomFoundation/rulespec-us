format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-24-104
  summary: |-
    Unless the tax agreed upon is paid within sixty days after signing, interest or penalties thereafter accrue. If aggregate payments under the agreement are less than the maximum federal estate-tax credit, personal representatives shall pay the department its proportional share of the difference.
rules:
  - name: agreement_payment_deadline_days
    kind: parameter
    dtype: Integer
    source: C.R.S. 39-24-104(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-24-104
              excerpt: "paid within sixty days after the signing"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          60

  - name: interest_or_penalties_accrue_after_agreement
    kind: derived
    entity: InheritanceTaxCompromiseAgreement
    dtype: Judgment
    period: Day
    source: C.R.S. 39-24-104(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-24-104
              excerpt: "Unless the tax so agreed upon is paid within sixty days"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-24-104
              excerpt: "sixty days after the signing"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          tax_agreed_upon_is_unpaid
          and days_after_agreement_signing > agreement_payment_deadline_days

  - name: additional_department_payment_under_agreement
    kind: derived
    entity: Estate
    dtype: Money
    unit: USD
    period: Year
    source: C.R.S. 39-24-104(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-24-104
              excerpt: "pay to the department of revenue so much of the difference between such aggregate amount and the amount of such credit as the amount payable to the department under the agreement bears to such aggregate amount"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if aggregate_amount_payable_to_states_under_agreement < maximum_federal_estate_tax_credit:
            (maximum_federal_estate_tax_credit - aggregate_amount_payable_to_states_under_agreement) * department_amount_payable_under_agreement / aggregate_amount_payable_to_states_under_agreement
          else: 0

  - name: appraisement_must_be_directed_after_agreement
    kind: derived
    entity: Estate
    dtype: Judgment
    period: Year
    source: C.R.S. 39-24-104(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-24-104
              excerpt: "no appraisement has been made and filed prior to said agreement"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          no_appraisement_was_made_and_filed_before_agreement
