format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-1-119.5
  summary: |-
    Contract payments for personal property tax due on or after January 1, 2007, shall be accounted for upon lease termination; a refund due for overpayment shall be made by August 31. Accounting and refund are based on actual property-tax liability. Willful failure creates treble-damages liability and successful-action costs and reasonable attorney fees. An action has a three-year limitation period, extendable one year for inducement to delay.
  deferred_outputs:
    - output: us-co:statutes/39/39-1-119.5#action_timely_commenced
      reason: The source's alternative failure-date and discovery-date limitation periods require date arithmetic and date comparison not supported by the available scalar RuleSpec schema.
rules:
  - name: limitations_period_years
    kind: parameter
    dtype: Integer
    source: C.R.S. § 39-1-119.5(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-1-119.5
              excerpt: "within three years"
    versions:
      - effective_from: '2007-01-01'
        formula: |-
          3

  - name: inducement_extension_period_years
    kind: parameter
    dtype: Integer
    source: C.R.S. § 39-1-119.5(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-1-119.5
              excerpt: "extended for a period of one year"
    versions:
      - effective_from: '2007-01-01'
        formula: |-
          1

  - name: lease_accounting_required
    kind: derived
    entity: PersonalPropertyLease
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-1-119.5(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-1-119.5
              excerpt: "If a personal property lessee is required to make payment"
          - path: versions[0].formula
            kind: effective_period
            source:
              corpus_citation_path: us-co/statute/39/39-1-119.5
              excerpt: "tax due on or after January 1, 2007"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-1-119.5
              excerpt: "upon the termination of the lease"
    versions:
      - effective_from: '2007-01-01'
        formula: |-
          lessee_is_required_to_make_personal_property_tax_payment_under_lease_agreement
          and personal_property_tax_is_due_on_or_after_statutory_start_date
          and lease_has_terminated

  - name: refund_due_to_lessee
    kind: derived
    entity: PersonalPropertyLease
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-1-119.5(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-1-119.5
              excerpt: "If it is determined upon this accounting that a refund is due to the lessee"
    versions:
      - effective_from: '2007-01-01'
        formula: |-
          lease_accounting_required
          and accounting_determines_refund_is_due_to_lessee

  - name: actual_property_tax_liability_accounting_requirement_satisfied
    kind: derived
    entity: PersonalPropertyLease
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-1-119.5(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-1-119.5
              excerpt: "The lessor shall base the accounting and refund on the actual property tax liability due in each year of the lease period."
    versions:
      - effective_from: '2007-01-01'
        formula: |-
          (not lease_accounting_required)
          or lessor_bases_accounting_and_refund_on_actual_property_tax_liability

  - name: refund_obligation_satisfied
    kind: derived
    entity: PersonalPropertyLease
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-1-119.5(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: ordering
            source:
              corpus_citation_path: us-co/statute/39/39-1-119.5
              excerpt: "shall make such refund to the lessee on or before August 31"
    versions:
      - effective_from: '2007-01-01'
        formula: |-
          (not refund_due_to_lessee)
          or lessor_made_refund_to_lessee_by_august_31

  - name: willful_refund_failure_damages
    kind: derived
    entity: PersonalPropertyLease
    dtype: Money
    unit: USD
    period: Year
    source: C.R.S. § 39-1-119.5(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-1-119.5
              excerpt: "three times the amount of actual damages sustained"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-1-119.5
              excerpt: "willfully fails to make a refund in violation of subsection (1)"
    versions:
      - effective_from: '2007-01-01'
        formula: |-
          if lessor_willfully_failed_to_make_required_refund: 3 * actual_damages_sustained else: 0

  - name: successful_civil_action_recovery
    kind: derived
    entity: PersonalPropertyLease
    dtype: Money
    unit: USD
    period: Year
    source: C.R.S. § 39-1-119.5(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-1-119.5
              excerpt: "the costs of the action together with reasonable attorney fees as determined by the court"
    versions:
      - effective_from: '2007-01-01'
        formula: |-
          if lessor_willfully_failed_to_make_required_refund and civil_action_is_successful:
            willful_refund_failure_damages + costs_of_action + reasonable_attorney_fees_determined_by_court
          else: 0
