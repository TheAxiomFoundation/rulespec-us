format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-11-114
  summary: |-
    The treasurer shall record tax-lien sales and note each sale in the tax list. Upon recordation of a tax sale, the treasurer shall file a separate mobile-home list with the department of revenue; the executive director may impose a fee of five dollars, which becomes part of the mobile home tax sale redemption cost.
  deferred_outputs:
    - output: us-co:statutes/39/39-11-114#mobile_home_tax_sale_recording_fee_after_reserve_adjustment
      reason: The executive director's authority to reduce or increase the fee depends on section 24-75-402, which is not available in copied RuleSpec context.
      source_values:
        - us-co:statutes/39/39-11-114#mobile_home_tax_sale_recording_fee_specified
rules:
  - name: mobile_home_tax_sale_recording_fee_specified
    kind: parameter
    dtype: Money
    unit: USD
    source: C.R.S. 39-11-114(3)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-11-114
              excerpt: "may impose a fee of five dollars"
    versions:
