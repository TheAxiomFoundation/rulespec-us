format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-11-100.3
  summary: |-
    “Electronic funds transfer” excludes a transaction originated by check, draft, or similar paper instrument. “Negotiable paper” includes specified checks, drafts, money orders, and treasurer-approved cashier's checks. “Public auction” is a sale of lands or town lots through a venue or medium allowing public bidding and purchase.
  deferred_outputs:
    - output: us-co:statutes/39/39-11-100.3#date_of_sale
      reason: The source defines a date-valued concept, but RuleSpec has no supported date dtype or date-valued formula output.
rules:
  - name: electronic_funds_transfer
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Day
    source: Colo. Rev. Stat. § 39-11-100.3(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-11-100.3
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          transfer_is_initiated_using_specified_electronic_means
          and transfer_orders_or_authorizes_financial_institution_account_credit_or_debit
          and not transaction_is_originated_by_check_draft_or_similar_paper_instrument

  - name: negotiable_paper
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Day
    source: Colo. Rev. Stat. § 39-11-100.3(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-11-100.3
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          payment_is_bank_check
          or payment_is_draft
          or payment_is_express_or_post_office_money_order
          or payment_is_cashiers_check_approved_by_treasurer

  - name: public_auction
    kind: derived
    entity: PublicAuction
    dtype: Judgment
    period: Day
    source: Colo. Rev. Stat. § 39-11-100.3(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-11-100.3
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          sale_is_of_lands_or_town_lots_under_this_article
          and sale_venue_or_medium_allows_public_bidding_and_purchase
