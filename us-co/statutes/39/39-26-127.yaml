format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-26-127
  summary: |-
    Beginning January 1, 2014, subsection (1) does not apply to the regional transportation district and the scientific and cultural facilities district that levy sales and use tax on every transaction or incident taxed by the state.
rules:
  - name: district_exception_to_local_sales_tax_base_preservation_applies
    kind: derived
    entity: LocalTaxingJurisdiction
    dtype: Judgment
    period: Year
    source: C.R.S. 39-26-127(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-26-127
              excerpt: "Beginning January 1, 2014, subsection (1) ... does not apply to the regional transportation district ... and the scientific and cultural facilities district ... which levy sales and use tax upon every transaction"
    versions:
      - effective_from: '2014-01-01'
        formula: |-
          (jurisdiction_is_regional_transportation_district
          or jurisdiction_is_scientific_and_cultural_facilities_district)
          and jurisdiction_levies_sales_and_use_tax_on_every_state_taxed_transaction
