    corpus_citation_path: us-co/statute/39/39-22-323
  summary: |-
    An S corporation's state-attributable income is subject to section 39-22-304 modifications; resident shareholders' pro rata shares of non-state-attributable income are subject to section 39-22-104 modifications; item character is determined as if received or incurred by the S corporation.
  deferred_outputs:
    - output: us-co:statutes/39/39-22-323#s_corporation_state_attributable_income_after_modifications
      reason: Section 39-22-304 context does not export a complete S-corporation modification result required to compute the source-stated modified income.
    - output: us-co:statutes/39/39-22-323#resident_shareholder_nonstate_income_after_modifications
      reason: Section 39-22-104 is unavailable as an executable dependency and cannot supply the required modifications.
    - output: us-co:statutes/39/39-22-323#s_corporation_item_character
      reason: The source requires character determination as if an item were received or incurred by the S corporation, but the available schema context provides no item-character representation or executable dependency.
