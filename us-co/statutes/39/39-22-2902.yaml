format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-2902
  summary: |-
    All moneys remaining in the fund at the end of a fiscal year, after subtracting the appropriation to the department, shall be transferred to the Alzheimer's Association Colorado chapter.
rules:
  - name: annual_transfer_to_alzheimers_association_colorado_chapter
    kind: derived
    entity: AlzheimersAssociationFund
    dtype: Money
    unit: USD
    period: Year
    source: C.R.S. 39-22-2902(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-2902
              excerpt: "All moneys remaining in the fund at the end of a fiscal year, after subtracting the appropriation to the department, shall be transferred"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          max(0, fund_moneys_at_fiscal_year_end - annual_appropriation_to_department)
