format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-5-121.5
  summary: |-
    “At the written request of any taxpayer or any agent of such taxpayer” the assessor shall make valuation data available “within seven working days”; estimated-cost payment “shall be made prior to providing such information.”
rules:
  - name: valuation_data_response_deadline_working_days
    kind: parameter
    dtype: Count
    source: Colorado Rev. Stat. § 39-5-121.5 (first sentence)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-5-121.5
              excerpt: within seven working days after receipt of said request
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          7

  - name: assessor_must_make_valuation_data_available
    kind: derived
    entity: Assessor
    dtype: Judgment
    period: Day
    source: Colorado Rev. Stat. § 39-5-121.5 (first sentence)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-5-121.5
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          written_request_received_from_taxpayer_or_agent
          and requested_property_is_owned_by_taxpayer
          and confidentiality_requirements_are_satisfied

  - name: assessor_must_notify_requester_of_estimated_cost
    kind: derived
    entity: Assessor
    dtype: Judgment
    period: Day
    source: Colorado Rev. Stat. § 39-5-121.5 (fourth sentence)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-5-121.5
              excerpt: Upon receipt of such request, the assessor shall notify the taxpayer or agent of the estimated cost.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          written_request_received_from_taxpayer_or_agent
          and requested_property_is_owned_by_taxpayer

  - name: estimated_cost_payment_is_required_before_information_provision
    kind: derived
    entity: Assessor
    dtype: Judgment
    period: Day
    source: Colorado Rev. Stat. § 39-5-121.5 (fourth sentence)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: ordering
            source:
              corpus_citation_path: us-co/statute/39/39-5-121.5
              excerpt: payment of which shall be made prior to providing such information
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          written_request_received_from_taxpayer_or_agent
          and requested_property_is_owned_by_taxpayer
