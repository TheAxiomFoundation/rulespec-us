format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-11-130
  summary: |-
    Where the treasurer is compelled to serve or publish notice under section 39-11-128, redemption requires payment of notice, abstract and search, publication, and specified computer-software costs. A timely redemption permits the purchaser or assigns to recover publication and abstract-and-search costs.
rules:
  - name: redemption_requires_notice_cost_reimbursement
    kind: derived
    entity: TaxSaleRedemption
    dtype: Judgment
    period: Day
    source: C.R.S. 39-11-130
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-11-130
              excerpt: "In case the treasurer is compelled to serve or to publish a notice in a newspaper pursuant to section 39-11-128"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-11-130
              excerpt: "before any person who may have a right to redeem the land, lot, or claim from the tax sale is permitted to redeem"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          treasurer_is_compelled_to_serve_or_publish_tax_deed_notice
          and person_may_redeem_property_from_tax_sale

  - name: notice_cost_reimbursement_required_before_redemption
    kind: derived
    entity: TaxSaleRedemption
    dtype: Money
    unit: USD
    period: Day
    source: C.R.S. 39-11-130
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-11-130
              excerpt: "the person shall pay ... the entire amount paid by the applicant for a tax deed for such notices, for abstract and search fees, for the cost of publishing such notices ... and for amounts paid to third parties for computer software costs incurred in connection with processing the redemption"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if redemption_requires_notice_cost_reimbursement:
            amount_paid_by_tax_deed_applicant_for_notices
            + abstract_and_search_fees_paid
            + publication_costs_paid
            + third_party_computer_software_costs_paid_for_redemption_processing
          else: 0

  - name: purchaser_or_assignee_recoverable_publication_and_search_costs
    kind: derived
    entity: TaxSaleRedemption
    dtype: Money
    unit: USD
    period: Day
    source: C.R.S. 39-11-130
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-11-130
              excerpt: "If the property therein described is redeemed before the expiration of the period of redemption named in such notice, the purchaser or the purchaser's assigns shall recover ... the cost of such publication and the abstract and search fee"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if property_is_redeemed_before_notice_redemption_period_expires:
            publication_costs_paid + abstract_and_search_fees_paid
          else: 0
