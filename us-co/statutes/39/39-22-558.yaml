  summary: Defines employer home-purchase contribution terms; allows a credit equal
    to five percent of employer contributions for income tax years commencing on or
    after January 1, 2024, but before January 1, 2027, subject to per-employee and
    annual caps, recapture, recordkeeping, and carryforward rules.
