- name: three qualifying preceptorships produce maximum current-year credit
  period:
    period_kind: tax_year
    start: '2025-01-01'
    end: '2025-12-31'
  input:
    us-co:statutes/39/39-22-538#input.income_tax_year_is_in_credit_period: true
    us-co:statutes/39/39-22-538#input.taxpayer_is_preceptor_filing_income_tax_return: true
    us-co:statutes/39/39-22-538#input.preceptorship_is_uncompensated: true
    us-co:statutes/39/39-22-538#input.working_weeks_in_preceptorship: 4
    us-co:statutes/39/39-22-538#input.business_days_in_preceptorship: 0
    us-co:statutes/39/39-22-538#input.preceptor_practices_primary_health_care_field_in_rural_or_frontier_area: true
    us-co:statutes/39/39-22-538#input.certification_form_submitted_with_return: true
    us-co:statutes/39/39-22-538#input.certification_verifies_credit_requirements: true
    us-co:statutes/39/39-22-538#input.taxpayer_is_selected_under_department_claimant_method: true
    us-co:statutes/39/39-22-538#input.number_of_preceptorships_provided: 3
    us-co:statutes/39/39-22-538#input.income_tax_otherwise_due: 7000
  output:
    us-co:statutes/39/39-22-538#preceptor_credit_eligibility: holds
    us-co:statutes/39/39-22-538#rural_health_care_preceptor_credit: 6000
    us-co:statutes/39/39-22-538#preceptor_credit_used_against_current_year_tax: 6000
