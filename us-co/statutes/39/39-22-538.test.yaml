    us-co:statutes/39/39-22-538#input.taxpayer_failed_credit_requirements_for_claim_year: true
    us-co:statutes/39/39-22-538#input.total_credit_claimed_for_failed_year: 4000
  output:
    us-co:statutes/39/39-22-538#preceptor_credit_recapture: 4000
