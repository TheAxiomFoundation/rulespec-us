format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-5-204
  summary: |-
    For property tax years commencing on or after January 1, 1999, a mobile home brought from another Colorado county after the assessment date is listed and valued as of the following year's assessment date; a mobile home brought from outside Colorado is valued for the remaining calendar months, with the entry month counted only when entry occurs before the sixteenth day.
rules:
  - name: calendar_months_in_year
    kind: parameter
    dtype: Count
    source: 39-5-204(1)(c)(II)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-5-204
              excerpt: "bears to twelve"
    versions:
      - effective_from: '1999-01-01'
        formula: |-
          12

  - name: mobile_home_location_notification_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 39-5-204(1)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-5-204
    versions:
      - effective_from: '1999-01-01'
        formula: |-
          person_brought_mobile_home_into_county_after_assessment_date

  - name: in_state_mobile_home_listing_and_valuation_at_following_assessment_date_required
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: 39-5-204(1)(c)(I)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-5-204
    versions:
      - effective_from: '1999-01-01'
        formula: |-
          mobile_home_brought_into_county_from_another_state_county_after_assessment_date

  - name: out_of_state_mobile_home_prorated_value
    kind: derived
    entity: Asset
    dtype: Money
    period: Year
    unit: USD
    source: 39-5-204(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-5-204
              excerpt: "such proportion of its value for\nthe full calendar year as the number of calendar months remaining in such year\nbears to twelve"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-5-204
              excerpt: "before the sixteenth day of any calendar month, such month shall be\nconsidered as a full calendar month"
    versions:
      - effective_from: '1999-01-01'
        formula: |-
          if mobile_home_brought_into_county_from_outside_state_after_assessment_date:
            full_calendar_year_value * (number_of_calendar_months_remaining_in_year + (if entry_month_is_counted_as_full_calendar_month: 1 else: 0)) / calendar_months_in_year
          else: 0
