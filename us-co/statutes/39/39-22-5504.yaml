format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-5504
  summary: If qualified basis decreases during the compliance period, state income
    tax liability is increased by the credit recapture amount. Credits are not recaptured
    when the qualified development ceases being located in the specified transit-oriented
    or neighborhood center after the initial award.
  deferred_outputs:
  - output: us-co:statutes/39/39-22-5504#credit_recapture_amount
    reason: Generated rule used a local name that collides with a sibling RuleSpec
      export. This output is deferred until it can be encoded with a semantic branch-specific
      name without creating ambiguous sibling imports.
  - output: us-co:statutes/39/39-22-5504#state_income_tax_liability_increase_for_credit_recapture
    reason: Generated rule depends on an output that validation deferred because it
      flattened thresholded, capped, base-limited, or cross-referenced mechanics,
      or borrowed an unrelated same-named section term.
rules:
- name: credit_ratable_compliance_period_years
  kind: parameter
  dtype: Count
  source: C.R.S. 39-22-5504(3)(b)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-22-5504
          excerpt: allowable ratably over fifteen years
  versions:
  - effective_from: '0001-01-01'
    formula: '15'
- name: annual_ratable_credit_for_reduced_qualified_basis
  kind: derived
  entity: TaxUnit
  dtype: Money
  period: Year
  unit: USD
  source: C.R.S. 39-22-5504(3)(b)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-22-5504
          excerpt: aggregate credit ... for the entire compliance period were allowable
            ratably over fifteen years
      - path: versions[0].formula
        kind: parameter
        import:
          target: us-co:statutes/39/39-22-5504#credit_ratable_compliance_period_years
          output: credit_ratable_compliance_period_years
          hash: sha256:local
  versions:
  - effective_from: '0001-01-01'
    formula: credit_that_would_be_allowable_for_entire_compliance_period_with_respect_to_reduced_qualified_basis
      / credit_ratable_compliance_period_years
- name: credit_recapture_required
  kind: derived
  entity: TaxUnit
  dtype: Judgment
  period: Year
  source: C.R.S. 39-22-5504(1), (5)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/statute/39/39-22-5504
          excerpt: if the amount of the qualified basis ... is less than the amount
            of the qualified basis as of the last day of the prior taxable year
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-co/statute/39/39-22-5504
          excerpt: credits issued pursuant to this part 55 must not be recaptured
  versions:
  - effective_from: '0001-01-01'
    formula: 'taxable_year_is_within_compliance_period

      and qualified_basis_at_end_of_taxable_year < qualified_basis_at_end_of_prior_taxable_year

      and not qualified_development_ceased_being_in_specified_transit_or_neighborhood_center_after_initial_award'
- name: recapture_return_disclosure_required
  kind: derived
  entity: TaxUnit
  dtype: Judgment
  period: Year
  source: C.R.S. 39-22-5504(4)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/statute/39/39-22-5504
          excerpt: In the event that recapture of any credit is required in any tax
            year
      - path: versions[0].formula
        kind: import
        import:
          target: us-co:statutes/39/39-22-5504#credit_recapture_required
          output: credit_recapture_required
          hash: sha256:local
  versions:
  - effective_from: '0001-01-01'
    formula: credit_recapture_required
