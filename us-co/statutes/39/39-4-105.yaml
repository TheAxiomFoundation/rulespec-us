format: rulespec/v1
module:
  summary: |-
    A public utility that fails or refuses to comply with an administrator order or subpoena forfeits and pays the state one hundred dollars for each day of noncompliance.
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-4-105
rules:
  - name: daily_noncompliance_forfeiture
    kind: parameter
    dtype: Money
    unit: USD
    source: Colo. Rev. Stat. § 39-4-105
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-4-105
              excerpt: "the sum of one hundred dollars for each day"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          100
  - name: public_utility_daily_forfeiture
    kind: derived
    entity: Business
    dtype: Money
    period: Day
    unit: USD
    source: Colo. Rev. Stat. § 39-4-105
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-4-105
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-4-105
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if public_utility_fails_or_refuses_to_comply_with_administrator_order_or_subpoena: daily_noncompliance_forfeiture else: 0
