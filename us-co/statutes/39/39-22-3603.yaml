format: rulespec/v1
module:
  summary: |-
    Interest derived from fund deposits and investments is credited to the fund. Moneys remaining at fiscal-year end after the department's appropriation are transferred to the Make-A-Wish Foundation of Colorado.
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-3603
  deferred_outputs:
    - output: us-co:statutes/39/39-22-3603#annual_designated_contributions_credit
      reason: The amount designated pursuant to section 39-22-3602 cannot be computed because the cited context is deferred and has no executable export.
rules:
  - name: fund_interest_credit
    kind: derived
    entity: MakeAWishFoundationColoradoFund
    dtype: Money
    unit: USD
    period: Year
    source: Colo. Rev. Stat. § 39-22-3603(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-3603
              excerpt: All interest derived from the deposit and investment of moneys in the fund shall be credited to the fund.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          interest_derived_from_fund_deposits_and_investments
  - name: fiscal_year_end_transfer_to_foundation
    kind: derived
    entity: MakeAWishFoundationColoradoFund
    dtype: Money
    unit: USD
    period: Year
    source: Colo. Rev. Stat. § 39-22-3603(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-3603
              excerpt: All moneys remaining in the fund at the end of a fiscal year, after subtracting the appropriation to the department, shall be transferred.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          max(0, fund_moneys_at_fiscal_year_end - department_administration_appropriation)
