format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-21-112
  summary: |-
    A retailer that does not collect Colorado sales tax is subject to a five-dollar penalty for each failure to provide the purchaser notice, and a ten-dollar penalty for each failure to send the annual purchaser notification or include a purchaser in the annual statement, unless the retailer shows reasonable cause.
  deferred_outputs:
    - output: us-co:statutes/39/39-21-112/a#officer_employee_felony_consequence
      reason: The felony punishment, informer award, and damages judgment require criminal sentencing, court, and injured-party process representations not supported by this RuleSpec surface.
    - output: us-co:statutes/39/39-21-112/b#reciprocal_offset_agreement
      reason: Reciprocal offset agreements require government claims, certified debts, and intergovernmental offset process representations not supported by this RuleSpec surface.
rules:
  - name: purchaser_notice_failure_penalty_amount
    kind: parameter
    dtype: Money
    unit: USD
    source: 39-21-112(3.5)(c)(II)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-21-112
              excerpt: "a penalty of five dollars for each such failure"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          5
  - name: annual_reporting_failure_penalty_amount
    kind: parameter
    dtype: Money
    unit: USD
    source: 39-21-112(3.5)(d)(III)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-21-112
              excerpt: "a penalty of ten dollars for each such failure"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10
  - name: purchaser_notice_failure_penalty
    kind: derived
    entity: Retailer
    dtype: Money
    period: Year
    unit: USD
    source: 39-21-112(3.5)(c)(II)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-21-112
              excerpt: "penalty of five dollars for each such failure, unless the retailer shows reasonable cause"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if retailer_shows_reasonable_cause_for_purchaser_notice_failure: 0 else: purchaser_notice_failure_penalty_amount * number_of_purchaser_notice_failures
  - name: annual_purchaser_notification_failure_penalty
    kind: derived
    entity: Retailer
    dtype: Money
    period: Year
    unit: USD
    source: 39-21-112(3.5)(d)(III)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-21-112
              excerpt: "penalty of ten dollars for each such failure, unless the retailer shows reasonable cause"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if retailer_shows_reasonable_cause_for_annual_purchaser_notification_failure: 0 else: annual_reporting_failure_penalty_amount * number_of_annual_purchaser_notification_failures
  - name: annual_statement_omission_penalty
    kind: derived
    entity: Retailer
    dtype: Money
    period: Year
    unit: USD
    source: 39-21-112(3.5)(d)(III)(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-21-112
              excerpt: "penalty of ten dollars for each purchaser that should have been included"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if retailer_shows_reasonable_cause_for_annual_statement_omission: 0 else: annual_reporting_failure_penalty_amount * number_of_purchasers_omitted_from_annual_statement
