format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-10-103
  summary: |-
    “For property tax years commencing on or after January 1, 2025, the treasurer shall not include the amount of valuation for assessment upon which taxes are levied upon the taxpayer.”
rules:
  - name: valuation_for_assessment_is_omitted_from_statement
    kind: derived
    entity: PropertyTaxStatement
    dtype: Judgment
    period: Year
    source: C.R.S. 39-10-103(1)(d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-10-103
              excerpt: "For property tax years commencing on or after January 1, 2025, the treasurer shall not include the amount of valuation for assessment"
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          property_tax_year_is_within_valuation_omission_period
          and not statement_includes_valuation_for_assessment
