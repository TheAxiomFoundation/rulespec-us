format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-1-104.5
  summary: |-
    Any owner of a surface estate from which a mineral interest has been severed may require the county assessor to place the severed mineral interest, without regard to value, on the county tax roll if ownership proof and the recorded creation of the severed interest are provided by a qualifying certificate.
rules:
  - name: surface_estate_owner_may_require_severed_mineral_interest_tax_roll_placement
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-1-104.5
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-1-104.5
              excerpt: "may require the assessor ... to place such severed mineral interest ... on the tax roll"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-1-104.5
              excerpt: "if the owner of the surface estate provides proof of ownership ... and a record of the creation"
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-1-104.5
              excerpt: "provided in the form of a certificate prepared by an attorney, a title insurance company, or a title insurance agent authorized to do business in this state"
