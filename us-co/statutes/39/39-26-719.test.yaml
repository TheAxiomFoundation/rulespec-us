    us-co:statutes/39/39-26-719#motor_vehicle_as_defined: holds
    us-co:statutes/39/39-26-719#low_emitting_heavy_item_sale_tax_exempt: holds
    us-co:statutes/39/39-26-719#low_emitting_heavy_item_use_tax_exempt: holds
    us-co:statutes/39/39-26-719#nonresident_vehicle_use_tax_exempt: holds
