format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-11-141
  summary: |-
    The board of county commissioners may institute an action to determine whether tax sale certificates believed void are void. If a decree finds a certificate void because of an assessment irregularity, the board shall direct reassessment.
rules:
  - name: certificate_validity_action_may_be_instituted
    kind: derived
    entity: CountyGovernment
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-11-141
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-11-141
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          county_holds_tax_sale_certificates
          and board_believes_certificates_void_for_irregularity
  - name: board_must_direct_property_reassessment
    kind: derived
    entity: CountyGovernment
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-11-141
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-11-141
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          court_decree_finds_same_certificate_void
          and irregularity_is_in_property_assessment
