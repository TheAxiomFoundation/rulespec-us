  source_verification:
    corpus_citation_path: us-co/statute/39/39-4-102
  summary: |-
    The administrator determines actual value of public-utility property and plant. Renewable-energy-facility valuation and tax-factor valuation rules depend on administrator determinations, external definitions, power-purchase agreements, and cross-referenced valuation methods.
  deferred_outputs:
    - output: us-co:statutes/39/39-4-102/e#renewable_energy_facility_actual_value
      reason: Renewable-energy-facility valuation requires unavailable external definitions and administrator valuation judgments, including the comparable nonrenewable facility cost and applicable renewable-energy classification.
    - output: us-co:statutes/39/39-4-102/b#tax_factor_facility_actual_value
      reason: Tax-factor valuation requires an annually established administrator tax factor and cross-referenced cost-basis valuation method; no executable upstream RuleSpec outputs provide those determinations.
