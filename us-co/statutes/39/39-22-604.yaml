format: rulespec/v1
module:
  status: deferred
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-604
  summary: |-
    “Employee means and includes every individual who is a resident or domiciled in the state of Colorado performing services for an employer”; “Employer means a person transacting business in or deriving any income from sources within the state of Colorado”; rules should not impose more frequent or stringent requirements than corresponding federal requirements where practicable; validated taxpayer identification number is defined by reference to federal identifiers and approved third-party verification; subsection (18) must be enforced without regard to specified protected characteristics; subsection (19) is repealed effective December 31, 2028, while subsection (20) provides a withholding exception for compensation eligible for the referenced subtraction.
  deferred_outputs:
    - output: us-co:statutes/39/39-22-604/a#employee
      reason: >-
        The employee definition depends on the employer-employee relationship and
        service-location, residence, domicile, governmental-office, and corporate-office
        classifications; the source does not provide a supported relation shape for one
        executable definition covering these alternatives.
    - output: us-co:statutes/39/39-22-604/b#employer
      reason: >-
        The employer definition depends on person, business-source, service-performance,
        wage-payment-control, officer, agent, and employee relationships that cannot be
        faithfully represented as a scalar executable output with the available context.
    - output: us-co:statutes/39/39-22-604/b#administrative_requirements_not_more_frequent_or_stringent
      reason: >-
        The rule requires comparison with corresponding federal information-report,
        filing, payment, and withholding requirements and permits different requirements
        when necessary to administer differences between the Internal Revenue Code and
        article 22; those federal requirements and administrative determinations are not
        available as executable dependencies.
    - output: us-co:statutes/39/39-22-604/b#additional_withholding_fund_interest_credited_to_general_fund
      reason: >-
        Determining the covered additional interest requires identifying interest derived
        as a result of House Bill 91S2-1027, an administrative fund-accounting provenance
        relation not represented by the available schema or context.
    - output: us-co:statutes/39/39-22-604/f#validated_taxpayer_identification_number
      reason: >-
        The definition depends on Social Security Administration or Internal Revenue
        Service assignment confirmation, department-approved third-party verification,
        and the federal classification of taxpayer identification numbers issued for
        nonresident aliens; the required federal and verification definitions are not
        available as executable RuleSpec dependencies.
    - output: us-co:statutes/39/39-22-604/g#subsection_18_nondiscriminatory_enforcement_required
      reason: >-
        The provision imposes an administrative enforcement duty without defining a
        computable policy condition or supported enforcement-event relation on which to
        evaluate compliance.
    - output: us-co:statutes/39/39-22-604/b#subsection_19_repeal_and_subsection_20_withholding_exception
      reason: >-
        The repeal can be represented only through effective-version metadata, while the
        operative withholding exception depends on eligibility for the subtraction in
        section 39-22-104(4)(u); the copied context for section 39-22-104(4) is
        non-executable and supplies no usable subtraction-eligibility output.
