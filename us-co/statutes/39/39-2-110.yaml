format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-2-110
  summary: |-
    "The division of property taxation shall conduct annual instruction and discussion sessions ... for periods not exceeding fifteen days in length."
rules:
  - name: assessor_school_maximum_duration_days
    kind: parameter
    dtype: Integer
    source: Colo. Rev. Stat. § 39-2-110
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-2-110
              excerpt: "periods not exceeding fifteen days in length"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          15
  - name: annual_assessor_school_duration_requirement_satisfied
    kind: derived
    entity: PropertyTaxationDivision
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-2-110
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-2-110
              excerpt: "shall conduct annual instruction and discussion sessions"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-2-110
              excerpt: "periods not exceeding fifteen days in length"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          division_conducts_annual_instruction_and_discussion_sessions
          and school_session_duration_in_days <= assessor_school_maximum_duration_days
