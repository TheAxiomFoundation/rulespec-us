format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-627
  summary: |-
    “Excess state revenues” means state revenues exceeding the state fiscal year spending limit that voters have not authorized the state to retain and spend, including specified adjustments. “Reimbursement for property tax exemptions” means state reimbursement to county treasurers for lost revenues from the listed exemptions and qualified-senior valuation reductions.
  deferred_outputs:
    - output: us-co:statutes/39/39-22-627/1/a#temporary_state_income_tax_rate
      reason: The temporary rate requires annual certified excess-revenue determinations, annually adjusted bracket amounts, executive-director revenue-loss estimates, and statutory refund-method coordination not supplied as executable dependencies.
    - output: us-co:statutes/39/39-22-627/2#estimated_state_revenue_decrease_from_rate_reduction
      reason: The estimate depends on the most recent Legislative Council revenue data and executive-director estimation process.
    - output: us-co:statutes/39/39-22-627/5#approved_state_revenue_decrease_estimate
      reason: The approval process depends on executive-committee notices, hearings, and determinations not representable as a taxpayer or fiscal-year calculation.
rules:
  - name: excess_state_revenues
    kind: derived
    entity: StateFiscalYear
    dtype: Money
    period: Year
    unit: USD
    source: 39-22-627(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-22-627
              excerpt: “Excess state revenues means the total amount of the state revenues ... in excess of the limitation ... that voters statewide have not authorized the state to retain and spend ... including any adjustment.”
    versions:
      - effective_from: '2024-07-01'
        formula: |-
          max(0, state_revenues - state_fiscal_year_spending_limit - state_revenues_authorized_for_retention_by_voters)
          + statutory_excess_state_revenue_adjustment
  - name: reimbursement_for_property_tax_exemptions
    kind: derived
    entity: StateFiscalYear
    dtype: Money
    period: Year
    unit: USD
    source: 39-22-627(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-22-627
              excerpt: “Reimbursement for property tax exemptions means the amount of reimbursement for property tax revenues lost as a result of both the property tax exemptions ... and the reduced valuation ... of qualified-senior primary residence real property.”
    versions:
      - effective_from: '2024-07-01'
        formula: |-
          reimbursement_for_property_tax_exemptions_under_article_3_part_2
          + reimbursement_for_qualified_senior_primary_residence_valuation_reduction
