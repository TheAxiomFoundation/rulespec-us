format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-206
  summary: |-
    An export taxpayer partnership is subject to this article and sells fifty percent or more of Colorado-produced products outside Colorado or performs services in Colorado with fifty percent or more sold or provided outside Colorado. Its partners may exclude foreign-source distributive-share income.
rules:
  - name: export_sales_threshold
    kind: parameter
    dtype: Rate
    source: C.R.S. § 39-22-206
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-206
              excerpt: "fifty percent or more"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.50

  - name: partnership_is_export_taxpayer
    kind: derived
    entity: Business
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-22-206
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-22-206
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-206
              excerpt: "fifty percent or more"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          partnership_is_subject_to_this_article
          and (
            (
              partnership_products_are_produced_in_colorado
              and share_of_product_sales_outside_colorado_or_in_foreign_countries >= export_sales_threshold
            )
            or (
              partnership_gross_receipts_are_derived_from_services
              and services_are_performed_in_colorado_by_partner_or_employee
              and share_of_services_sold_or_provided_outside_colorado >= export_sales_threshold
            )
          )

  - name: foreign_source_partnership_income_excludable
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: USD
    source: C.R.S. § 39-22-206
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-206
              excerpt: "partners may exclude from gross income for Colorado income tax purposes such partners' distributive share of any such partnership income or gain which constitutes foreign source income"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if partner_is_of_export_taxpayer: foreign_source_partnership_income_distributive_share else: 0
