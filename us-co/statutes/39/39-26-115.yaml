format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-26-115
  summary: '"... added ten percent of the total amount of the deficiency ..."; "...
    added one hundred percent of the total amount of the deficiency ..."; "an additional
    three percent per month on said amount shall be added from the date the return
    was due until paid."'
  deferred_outputs:
  - output: us-co:statutes/39/39-26-115#negligence_interest_accrued
    reason: The negligence interest rate is imposed under section 39-21-110.5, and
      the otherwise applicable interest is provided by section 39-21-109; neither
      cited rate is available in copied RuleSpec context.
rules:
- name: negligence_deficiency_addition_rate
  kind: parameter
  dtype: Rate
  source: "C.R.S. \xA7 39-26-115 (negligence addition)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-26-115
          excerpt: added ten percent of the total amount of the deficiency
  versions:
  - effective_from: '0001-01-01'
    formula: '0.10'
- name: fraud_deficiency_addition_rate
  kind: parameter
  dtype: Rate
  source: "C.R.S. \xA7 39-26-115 (fraud addition)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-26-115
          excerpt: added one hundred percent of the total amount of the deficiency
  versions:
  - effective_from: '0001-01-01'
    formula: '1.0'
- name: fraud_additional_interest_rate_per_month
  kind: parameter
  dtype: Rate
  source: "C.R.S. \xA7 39-26-115 (fraud additional interest)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-26-115
          excerpt: an additional three percent per month
  versions:
  - effective_from: '0001-01-01'
    formula: '0.03'
- name: payment_due_after_written_notice_days
  kind: parameter
  dtype: Count
  source: "C.R.S. \xA7 39-26-115 (notice and demand)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-26-115
          excerpt: due and payable ten days after written notice and demand
  versions:
  - effective_from: '0001-01-01'
    formula: '10'
- name: negligence_deficiency_addition
  kind: derived
  entity: Person
  dtype: Money
  unit: USD
  period: Month
  source: "C.R.S. \xA7 39-26-115 (negligence addition)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-26-115
          excerpt: If any part of the deficiency is due to negligence or intentional
            disregard ... there shall be added ten percent
  versions:
  - effective_from: '0001-01-01'
    formula: 'if deficiency_is_due_to_negligence_or_intentional_disregard_with_knowledge_without_intent_to_defraud:
      deficiency_amount * negligence_deficiency_addition_rate else: 0'
- name: fraud_deficiency_addition
  kind: derived
  entity: Person
  dtype: Money
  unit: USD
  period: Month
  source: "C.R.S. \xA7 39-26-115 (fraud addition)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-26-115
          excerpt: If any part of the deficiency is due to fraud with the intent to
            evade the tax, then there shall be added one hundred percent
  versions:
  - effective_from: '0001-01-01'
    formula: 'if deficiency_is_due_to_fraud_with_intent_to_evade_tax: deficiency_amount
      * fraud_deficiency_addition_rate else: 0'
- name: fraud_case_unpaid_tax_including_addition
  kind: derived
  entity: Person
  dtype: Money
  unit: USD
  period: Month
  source: "C.R.S. \xA7 39-26-115 (fraud unpaid tax)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-26-115
          excerpt: the whole amount of the tax unpaid, including the additions
  versions:
  - effective_from: '0001-01-01'
    formula: 'if deficiency_is_due_to_fraud_with_intent_to_evade_tax: deficiency_amount
      + fraud_deficiency_addition else: 0'
- name: fraud_additional_interest_accrued
  kind: derived
  entity: Person
  dtype: Money
  unit: USD
  period: Month
  source: "C.R.S. \xA7 39-26-115 (fraud additional interest)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-26-115
          excerpt: an additional three percent per month on said amount shall be added
            from the date the return was due until paid
  versions:
  - effective_from: '0001-01-01'
    formula: fraud_case_unpaid_tax_including_addition * fraud_additional_interest_rate_per_month
      * months_from_return_due_until_paid
- name: negligence_addition_and_interest_due_and_payable
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: "C.R.S. \xA7 39-26-115 (negligence notice and demand)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/statute/39/39-26-115
          excerpt: which interest and addition shall become due and payable ten days
            after written notice and demand
  versions:
  - effective_from: '0001-01-01'
    formula: 'deficiency_is_due_to_negligence_or_intentional_disregard_with_knowledge_without_intent_to_defraud

      and days_since_written_notice_and_demand >= payment_due_after_written_notice_days'
- name: fraud_tax_unpaid_due_and_payable
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: "C.R.S. \xA7 39-26-115 (fraud notice and demand)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/statute/39/39-26-115
          excerpt: the whole amount of the tax unpaid, including the additions, shall
            become due and payable ten days after written notice and demand
  versions:
  - effective_from: '0001-01-01'
    formula: 'deficiency_is_due_to_fraud_with_intent_to_evade_tax

      and days_since_written_notice_and_demand >= payment_due_after_written_notice_days'
