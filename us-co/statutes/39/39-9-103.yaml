format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-9-103
  summary: |-
    The state board of equalization shall perform the duties and hearings specified in this section. Manuals, appraisal procedures, instructions, guidelines, forms, notices, and records not approved or disapproved within thirty days are automatically approved, subject to a timely scheduled hearing and a further thirty-day period after its conclusion.
rules:
  - name: review_period_days
    kind: parameter
    dtype: Count
    source: C.R.S. 39-9-103(10)(a)-(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-9-103
              excerpt: "within thirty days after receipt"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30
  - name: materials_automatically_approved
    kind: derived
    entity: StateBoardOfEqualization
    dtype: Judgment
    period: Day
    source: C.R.S. 39-9-103(10)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-9-103
              excerpt: "not approved or disapproved ... within said thirty days shall be automatically approved"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-9-103
              excerpt: "if within said thirty days the state board ... schedules a hearing"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-9-103
              excerpt: "within thirty days after the conclusion of such hearing"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (
            not board_scheduled_hearing_within_initial_review_period
            and days_since_material_receipt >= review_period_days
            and not board_approved_or_disapproved_material
          )
          or (
            board_scheduled_hearing_within_initial_review_period
            and days_since_hearing_conclusion >= review_period_days
            and not board_approved_or_disapproved_material
          )
