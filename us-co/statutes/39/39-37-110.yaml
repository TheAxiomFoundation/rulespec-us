format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-37-110
  summary: |-
    Each month, the state treasurer shall credit money collected for payment of the part 1 tax to the old age pension fund, transfer an equal amount to the general fund, and transfer an equal amount from the general fund to the fund for distribution.
rules:
  - name: monthly_credit_to_old_age_pension_fund
    kind: derived
    entity: StateTreasurer
    dtype: Money
    period: Month
    unit: USD
    source: C.R.S. 39-37-110(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-37-110
              excerpt: "credit the money collected for payment of the tax levied pursuant to this part 1 to the old age pension fund"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          tax_collected_for_payment_under_part_1

  - name: monthly_transfer_from_old_age_pension_fund_to_general_fund
    kind: derived
    entity: StateTreasurer
    dtype: Money
    period: Month
    unit: USD
    source: C.R.S. 39-37-110(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-37-110
              excerpt: "shall further transfer an amount equal to this amount from the old age pension fund to the general fund"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          tax_collected_for_payment_under_part_1

  - name: monthly_transfer_from_general_fund_to_fund_for_distribution
    kind: derived
    entity: StateTreasurer
    dtype: Money
    period: Month
    unit: USD
    source: C.R.S. 39-37-110(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-37-110
              excerpt: "transfer an amount equal to the\namount of money collected for payment of the tax levied pursuant to this part 1\nfrom the general fund to the fund for distribution"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          tax_collected_for_payment_under_part_1
