format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-5405
  summary: If qualified basis decreases during the compliance period, the relevant
    taxpayer's state income tax liability is increased by the credit recapture amount.
    The accelerated portion is measured against credit ratably allowable over fifteen
    years.
rules:
- name: credit_acceleration_compliance_period_years
  kind: parameter
  dtype: Count
  source: C.R.S. 39-22-5405(3)(b)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-22-5405
          excerpt: allowable ratably over fifteen years
  versions:
  - effective_from: '0001-01-01'
    formula: '15'
- name: local_credit_recapture_amount
  kind: derived
  entity: TaxUnit
  dtype: Money
  period: Year
  unit: USD
  source: C.R.S. 39-22-5405(1)-(3)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-22-5405
          excerpt: "the credit recapture amount\nis an amount equal to the aggregate decrease in the credit allowed"
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-22-5405
          excerpt: allowable ratably over fifteen years
  versions:
  - effective_from: '0001-01-01'
    formula: "if qualified_basis_is_in_compliance_period and qualified_basis_at_end_of_taxable_year\
      \ < qualified_basis_at_end_of_prior_taxable_year:\n  max(0, aggregate_credit_allowed_for_reduced_qualified_basis\
      \ - (aggregate_credit_allowable_for_entire_compliance_period_for_reduced_qualified_basis\
      \ * prior_taxable_years_elapsed / credit_acceleration_compliance_period_years))\n\
      else: 0"
imports:
