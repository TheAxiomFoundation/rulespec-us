format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-11-147
  summary: |-
    A complete report of payments made to and accepted by the treasurer under sections 39-11-142, 39-11-143, and 39-11-145 shall be made, with a copy sent to the county board, administrator, and controller at the end of each month.
rules:
  - name: monthly_payment_report_requirement_satisfied
    kind: derived
    entity: CountyTreasurer
    dtype: Judgment
    period: Month
    source: C.R.S. 39-11-147
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-11-147
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not reporting_month_has_ended
          or (
            treasurer_prepared_complete_report_of_payments_under_cited_sections
            and report_copy_sent_to_county_board_of_commissioners
            and report_copy_sent_to_administrator
            and report_copy_sent_to_controller
          )
