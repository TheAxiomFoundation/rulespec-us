format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-114.5
  summary: "\u201CFor income tax years commencing prior to January 1, 2023,\u201D\
    \ each resident individual is allowed \u201Ca plastic recycling credit equal to\
    \ twenty percent of net expenditures to third parties\u201D for specified new\
    \ plastic recycling technology expenditures in Colorado, \u201Cup to ten thousand\
    \ dollars,\u201D with \u201Ca maximum credit of two thousand dollars.\u201D Unused\
    \ credit may be carried forward for no more than five years and applied to the\
    \ earliest years possible. Claim forms must include documentation of qualified\
    \ expenditures. \u201CThis section is repealed, effective July 1, 2029.\u201D"
  deferred_outputs:
  - output: us-co:statutes/39/39-22-114.5#carried_forward_plastic_recycling_credit_applied
    reason: Applying unused credits to subsequent liabilities in earliest-year order
      requires a relation of credit vintages and annual tax liabilities that the supported
      schema and supplied context do not provide.
    source_values:
    - us-co:statutes/39/39-22-114.5#plastic_recycling_credit_carryforward_limit_years
rules:
- name: plastic_recycling_credit_rate
  kind: parameter
  dtype: Rate
  source: "C.R.S. \xA7 39-22-114.5(1)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-22-114.5
          excerpt: "a plastic recycling credit equal to twenty percent"
  versions:
  - effective_from: '0001-01-01'
    formula: '0.20'
- name: plastic_recycling_credit_expenditure_limit
  kind: parameter
  dtype: Money
  unit: USD
  period: Year
  source: "C.R.S. \xA7 39-22-114.5(1)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-22-114.5
          excerpt: "up to ten thousand dollars"
  versions:
  - effective_from: '0001-01-01'
    formula: '10000'
- name: plastic_recycling_credit_maximum
  kind: parameter
  dtype: Money
  unit: USD
  period: Year
  source: "C.R.S. \xA7 39-22-114.5(1)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-22-114.5
          excerpt: "with a maximum credit of two thousand dollars"
  versions:
  - effective_from: '0001-01-01'
    formula: '2000'
- name: plastic_recycling_credit_carryforward_limit_years
  kind: parameter
  dtype: Integer
  source: "C.R.S. \xA7 39-22-114.5(2)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-22-114.5
          excerpt: "for a period not exceeding five years"
  versions:
  - effective_from: '0001-01-01'
    formula: '5'
- name: plastic_recycling_credit
  kind: derived
  entity: TaxUnit
  dtype: Money
  unit: USD
  period: Year
  source: "C.R.S. \xA7 39-22-114.5(1)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-22-114.5
          excerpt: "equal to twenty percent of net expenditures to third parties"
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/statute/39/39-22-114.5
          excerpt: "allowed to each resident individual"
      - path: versions[0].formula
        kind: effective_period
        source:
          corpus_citation_path: us-co/statute/39/39-22-114.5
          excerpt: "income tax years commencing prior to January 1, 2023"
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/statute/39/39-22-114.5
          excerpt: "applicable only to income related to the expenditures"
  versions:
  - effective_from: '0001-01-01'
    formula: 'if taxpayer_is_resident_individual and income_tax_year_commences_prior_to_credit_termination_date
      and income_is_related_to_qualified_plastic_recycling_expenditures: min( plastic_recycling_credit_maximum,
      plastic_recycling_credit_rate * min( max(0, net_expenditures_to_third_parties_for_new_plastic_recycling_technology_in_colorado),
      plastic_recycling_credit_expenditure_limit ) ) else: 0'
- name: plastic_recycling_credit_used_as_offset
  kind: derived
  entity: TaxUnit
  dtype: Money
  unit: USD
  period: Year
  source: "C.R.S. \xA7 39-22-114.5(2)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-22-114.5
          excerpt: "used as an\noffset against income taxes"
      - path: versions[0].formula
        kind: import
        import:
          target: us-co:statutes/39/39-22-114.5#plastic_recycling_credit
          output: plastic_recycling_credit
          hash: sha256:local
  versions:
  - effective_from: '0001-01-01'
    formula: "min(\n  plastic_recycling_credit,\n  max(0, income_taxes_otherwise_due_on_related_income)\n\
      )"
- name: unused_plastic_recycling_credit
  kind: derived
  entity: TaxUnit
  dtype: Money
  unit: USD
  period: Year
  source: "C.R.S. \xA7 39-22-114.5(2)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-22-114.5
          excerpt: "the amount of the credit not used as an\noffset against income taxes"
      - path: versions[0].formula
        kind: import
        import:
          target: us-co:statutes/39/39-22-114.5#plastic_recycling_credit
          output: plastic_recycling_credit
          hash: sha256:local
      - path: versions[0].formula
        kind: import
        import:
          target: us-co:statutes/39/39-22-114.5#plastic_recycling_credit_used_as_offset
          output: plastic_recycling_credit_used_as_offset
          hash: sha256:local
  versions:
  - effective_from: '0001-01-01'
    formula: "max(\n  0,\n  plastic_recycling_credit\n  - plastic_recycling_credit_used_as_offset\n\
      )"
