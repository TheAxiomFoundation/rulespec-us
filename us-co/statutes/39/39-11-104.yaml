format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-11-104
  summary: |-
    Every publisher or printer who publishes such list and notice shall transmit an affidavit of publication to the proper county treasurer immediately after the last publication. No publisher or printer shall be paid for that publication if the affidavit is not transmitted within fourteen days after the last publication.
rules:
  - name: affidavit_transmission_duty_is_satisfied
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: C.R.S. 39-11-104(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-11-104
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          publisher_or_printer_published_list_and_notice
          and affidavit_of_publication_was_transmitted_immediately_to_proper_county_treasurer

  - name: publisher_or_printer_is_barred_from_payment_for_publication
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: C.R.S. 39-11-104(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-11-104
              excerpt: "no publisher or printer shall be paid for such publication if he fails to transmit such affidavit within fourteen days after the last publication"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          publisher_or_printer_published_list_and_notice
          and not affidavit_of_publication_was_transmitted_within_fourteen_days_after_last_publication
