format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-10-102
  summary: |-
    All property taxes become due and payable on January 1 of the year following levy and delinquent on June 16; the treasurer shall accept tendered tax payments and issue a receipt upon request after receiving the tax list and warrant.
rules:
  - name: property_tax_is_due_and_payable
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Day
    source: C.R.S. 39-10-102(1)(b)(I)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: effective_period
            source:
              corpus_citation_path: us-co/statute/39/39-10-102
              excerpt: "due and payable on January 1 of the year following that in which\nthey are levied"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-10-102
              excerpt: "Except as otherwise provided in article 1.5 of this title"
    versions:
      - effective_from: '1992-01-01'
        formula: |-
          day_is_january_1_of_year_following_property_tax_levy
          and article_1_5_does_not_provide_otherwise

  - name: property_tax_is_delinquent
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Day
    source: C.R.S. 39-10-102(1)(b)(I)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: effective_period
            source:
              corpus_citation_path: us-co/statute/39/39-10-102
              excerpt: "shall become delinquent on June 16 of said year"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-10-102
              excerpt: "Except as otherwise provided in article 1.5 of this title"
    versions:
      - effective_from: '1992-01-01'
        formula: |-
          day_is_june_16_of_year_following_property_tax_levy
          and article_1_5_does_not_provide_otherwise

  - name: tax_payment_must_be_accepted
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Day
    source: C.R.S. 39-10-102(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-10-102
              excerpt: "the treasurer\nshall accept payment of taxes tendered by any person"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-10-102
              excerpt: "Except as otherwise provided in article 1.5 of this title 39"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          payment_is_tendered_for_taxes
          and article_1_5_does_not_provide_otherwise

  - name: tax_payment_receipt_must_be_issued
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Day
    source: C.R.S. 39-10-102(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-10-102
              excerpt: "upon request of the\nperson who tendered the payment of taxes or the person's agent, issue a receipt"
          - path: versions[0].formula
            kind: ordering
            source:
              corpus_citation_path: us-co/statute/39/39-10-102
              excerpt: "at any time after the tax list and warrant have been received by the\ntreasurer"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-10-102
              excerpt: "Except as otherwise provided in article 1.5 of this title 39"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          payment_is_tendered_for_taxes
          and tenderer_or_agent_requests_receipt
          and treasurer_has_received_tax_list_and_warrant
          and article_1_5_does_not_provide_otherwise
