format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-3-211
  summary: |-
    “Local governmental entity means a governmental entity authorized by law to impose ad valorem taxes on taxable property located within its territorial limits; except that the term excludes school districts.” Reimbursement equals the assessed-value decrease multiplied by the applicable excluded-debt mill levy, subject to proportional reduction if the fund is insufficient.
  deferred_outputs:
    - output: us-co:statutes/39/39-3-211/b#fund_definition
      reason: The fund is a state-treasury account whose identity and accounting state cannot be represented as an executable scalar or supported entity output in this module.
rules:
  - name: local_governmental_entity
    kind: derived
    entity: LocalGovernmentalEntity
    dtype: Judgment
    period: Year
    source: 39-3-211(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-3-211
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          entity_is_authorized_to_impose_ad_valorem_taxes_on_taxable_property_within_its_territorial_limits
          and not entity_is_school_district

  - name: local_governmental_entity_backfill_fund_transfer
    kind: parameter
    dtype: Money
    unit: USD
    source: 39-3-211(7)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-3-211
              excerpt: "ten million three hundred eleven thousand two hundred thirty-three dollars"
    versions:
      - effective_from: '2025-04-01'
        formula: |-
          10311233

  - name: assessed_value_reduction_reimbursement_before_fund_reduction
    kind: derived
    entity: LocalGovernmentalEntity
    dtype: Money
    period: Year
    unit: USD
    source: 39-3-211(6)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-3-211
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          assessed_value_decrease_from_property_tax_reduction * eligible_mill_levy_for_assessed_value_reduction

  - name: assessed_value_reduction_reimbursement
    kind: derived
    entity: LocalGovernmentalEntity
    dtype: Money
    period: Year
    unit: USD
    source: 39-3-211(6)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-3-211
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if fund_money_is_insufficient_for_assessed_value_reduction_warrants: assessed_value_reduction_reimbursement_before_fund_reduction * assessed_value_reduction_proportional_reduction_factor else: assessed_value_reduction_reimbursement_before_fund_reduction

  - name: house_bill_assessed_value_reduction_reimbursement_before_fund_reduction
    kind: derived
    entity: LocalGovernmentalEntity
    dtype: Money
    period: Year
    unit: USD
    source: 39-3-211(6.5)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-3-211
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          house_bill_assessed_value_decrease * eligible_mill_levy_for_house_bill_assessed_value_reduction

  - name: house_bill_assessed_value_reduction_reimbursement
    kind: derived
    entity: LocalGovernmentalEntity
    dtype: Money
    period: Year
    unit: USD
    source: 39-3-211(6.5)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-3-211
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          if fund_money_is_insufficient_for_house_bill_assessed_value_reduction_warrants: house_bill_assessed_value_reduction_reimbursement_before_fund_reduction * house_bill_assessed_value_reduction_proportional_reduction_factor else: house_bill_assessed_value_reduction_reimbursement_before_fund_reduction
