format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-3-112.5
  summary: |-
    Property used solely and exclusively for strictly charitable purposes, without private gain or corporate profit, is exempt when it is residential property owned by the United States and leased to a nonprofit to house homeless individuals or families. The exemption requires delivery of lease and rental-agreement copies, actual use for that purpose, and compliance with section 39-2-117.
rules:
  - name: homeless_housing_property_tax_exemption_applies
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-3-112.5(1)-(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-3-112.5
              excerpt: "used solely and exclusively for strictly charitable purposes and not for private gain or corporate profit"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-3-112.5
              excerpt: "such property is residential, is owned by the United States, and is leased"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-3-112.5
              excerpt: "for the purpose of housing single individuals or families, or both, who are homeless"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-3-112.5
              excerpt: "only upon the delivery to the administrator of a copy of such lease ... and a copy of the rental agreement"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-3-112.5
              excerpt: "only for the period of time that such residential property is actually used for said purpose"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-3-112.5
              excerpt: "Any exemption claimed pursuant to the provisions of this section shall comply with the provisions of section 39-2-117."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          property_is_real_or_personal
          and property_is_used_solely_and_exclusively_for_strictly_charitable_purposes
          and not property_is_used_for_private_gain_or_corporate_profit
          and property_is_residential
          and property_is_owned_by_united_states
          and us_agency_lease_to_nonprofit_is_for_housing_homeless_individuals_or_families
          and lease_copy_delivered_to_administrator
          and rental_agreement_copy_delivered_to_administrator
          and property_is_actually_used_to_house_homeless_individuals_or_families
          and exemption_claim_complies_with_section_39_2_117
