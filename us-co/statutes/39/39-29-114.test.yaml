- name: common ownership allocates exemptions in proportion to production
  period:
    period_kind: tax_year
    start: '2024-01-01'
    end: '2024-12-31'
  input:
    us-co:statutes/39/39-29-114#input.common_beneficial_interest_owned_by_same_or_related_persons: 0.6
    us-co:statutes/39/39-29-114#input.each_owner_taken_into_account_owns_at_least_counted_beneficial_owner_minimum_interest: true
    us-co:statutes/39/39-29-114#input.total_exemptions_allowed_under_article_for_common_ownership_entities: 1000
    us-co:statutes/39/39-29-114#input.entity_production_quantity: 20
    us-co:statutes/39/39-29-114#input.total_production_quantity_of_common_ownership_entities: 100
  output:
    us-co:statutes/39/39-29-114#exemption_allocated_under_common_beneficial_ownership: 200
- name: common ownership below fifty percent does not trigger allocation
  period:
    period_kind: tax_year
    start: '2024-01-01'
    end: '2024-12-31'
  input:
    us-co:statutes/39/39-29-114#input.common_beneficial_interest_owned_by_same_or_related_persons: 0.4
    us-co:statutes/39/39-29-114#input.each_owner_taken_into_account_owns_at_least_counted_beneficial_owner_minimum_interest: true
    us-co:statutes/39/39-29-114#input.total_exemptions_allowed_under_article_for_common_ownership_entities: 1000
    us-co:statutes/39/39-29-114#input.entity_production_quantity: 20
    us-co:statutes/39/39-29-114#input.total_production_quantity_of_common_ownership_entities: 100
  output:
    us-co:statutes/39/39-29-114#exemption_allocated_under_common_beneficial_ownership: 0
- name: spouse receives proportional family exemption allocation
  period:
    period_kind: tax_year
    start: '2024-01-01'
    end: '2024-12-31'
  input:
    us-co:statutes/39/39-29-114#input.person_is_the_individual: false
    us-co:statutes/39/39-29-114#input.person_is_spouse_of_the_individual: true
    us-co:statutes/39/39-29-114#input.person_is_child_of_the_individual: false
    us-co:statutes/39/39-29-114#input.total_exemptions_allowed_under_article_for_family_individuals: 1200
    us-co:statutes/39/39-29-114#input.individual_production_quantity: 30
    us-co:statutes/39/39-29-114#input.total_production_quantity_of_family_individuals: 120
  output:
    us-co:statutes/39/39-29-114#person_is_within_family_of_individual: holds
    us-co:statutes/39/39-29-114#exemption_allocated_among_family_individuals: 300
- name: person outside spouse and child family definition receives no allocation
  period:
    period_kind: tax_year
    start: '2024-01-01'
    end: '2024-12-31'
  input:
    us-co:statutes/39/39-29-114#input.person_is_the_individual: false
    us-co:statutes/39/39-29-114#input.person_is_spouse_of_the_individual: false
    us-co:statutes/39/39-29-114#input.person_is_child_of_the_individual: false
    us-co:statutes/39/39-29-114#input.total_exemptions_allowed_under_article_for_family_individuals: 1200
    us-co:statutes/39/39-29-114#input.individual_production_quantity: 30
    us-co:statutes/39/39-29-114#input.total_production_quantity_of_family_individuals: 120
  output:
    us-co:statutes/39/39-29-114#person_is_within_family_of_individual: not_holds
    us-co:statutes/39/39-29-114#exemption_allocated_among_family_individuals: 0
