    corpus_citation_path: us-co/statute/39/39-22-514
  summary: |-
    “The credit ... shall not exceed an aggregate of fifty thousand dollars per qualified property or an amount equal to twenty percent of the aggregate qualified costs incurred per qualified property, whichever is less.” Eligibility includes alternative federal-section-38 treatment and excludes taxpayers allowed a credit under section 39-30-105.6. The section also prescribes approval, allocation, carryforward, recapture, fees, revenue-trigger, and defined-term rules.
  deferred_outputs:
    - output: us-co:statutes/39/39-22-514/b#deleted_subsection_has_no_operative_output
      reason: The checklist segment is deleted by amendment and therefore supplies no operative legal formula to encode.
    - output: us-co:statutes/39/39-22-514/b#federal_rehabilitation_credit_procedure_exception
      reason: Encoding the subsection (3)(b) exception requires the uncopied section 38 federal rehabilitation-credit eligibility determination.
    - output: us-co:statutes/39/39-22-514/b#carryforward_eligibility_after_refund
      reason: Faithful encoding requires taxpayer-level credit-use, refund-date, and remaining-carryforward state across multiple tax years.
    - output: us-co:statutes/39/39-22-514/b#reviewing_entity_fee_fund_disposition
      reason: This administrative fund and fee-disposition obligation is outside the supported taxpayer computation surface.
    - output: us-co:statutes/39/39-22-514/a#certified_local_government
      reason: The definition depends on certification pursuant to 54 U.S.C. sec. 302502 and requires an upstream governmental-status classification.
    - output: us-co:statutes/39/39-22-514/b#contributing_property
      reason: The qualitative historic-district contribution definition requires property-assessment facts and a property-to-district relation not supplied by this source.
    - output: us-co:statutes/39/39-22-514/c#designated
      reason: The definition requires an upstream determination that status was established by local preservation ordinance.
    - output: us-co:statutes/39/39-22-514/d#property
      reason: Faithful classification requires a property or individually owned multiunit-unit ontology not established in the available RuleSpec context.
    - output: us-co:statutes/39/39-22-514/e#qualified_costs
      reason: Computing qualified costs requires an itemized cost relation capable of applying the source's extensive inclusions and exclusions.
    - output: us-co:statutes/39/39-22-514/f#qualified_property
      reason: Classification requires property age, Colorado location, historic-register status, local landmark designation, and contributing-property relations not supplied in the available context.
    - output: us-co:statutes/39/39-22-514/g#qualified_rehabilitation
      reason: Classification requires project-improvement relations, historic-character findings, rehabilitation-standard compliance, and normal-wear exclusions not supplied in the available context.
    - output: us-co:statutes/39/39-22-514/h#qualified_tenant
      reason: Classification requires a taxpayer-to-qualified-property lease relation with its duration, which is not established in the available context.
    - output: us-co:statutes/39/39-22-514/j#state_historic_preservation_officer
      reason: The definition depends on designation and appointment pursuant to 54 U.S.C. sec. 302301 and requires an upstream officer-status classification.
    - output: us-co:statutes/39/39-22-514/k#taxpayer
      reason: The definition requires resident-individual status or corporation status under part 3 of article 22, neither of which is supplied by an executable upstream RuleSpec.
