format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-2-131
  summary: |-
    At least two weeks prior to the advisory committee reviewing a proposed change to the property tax materials, the property tax administrator shall publish notice including the hearing date, time, place, and proposed changes.
rules:
  - name: minimum_notice_lead_time_weeks
    kind: parameter
    dtype: Count
    source: Colo. Rev. Stat. § 39-2-131(3)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-2-131
              excerpt: "At least two weeks prior"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          2
  - name: proposed_property_tax_materials_review_notice_complies
    kind: derived
    entity: PropertyTaxAdministrator
    dtype: Judgment
    period: Day
    source: Colo. Rev. Stat. § 39-2-131(3)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-2-131
              excerpt: "At least two weeks prior to the advisory committee ... reviewing a proposed change"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-2-131
              excerpt: "The date, time, and place of the hearing"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-2-131
              excerpt: "The proposed changes to the property tax materials"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          notice_lead_time_before_advisory_committee_review_in_weeks >= minimum_notice_lead_time_weeks
          and notice_includes_hearing_date
          and notice_includes_hearing_time
          and notice_includes_hearing_place
          and notice_includes_proposed_property_tax_materials_changes
