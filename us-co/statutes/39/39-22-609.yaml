format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-609
  summary: |-
    The executive director may grant a taxpayer an extension to pay tax upon application, but no extension is authorized for deficiency assessments or amended or delinquent returns.
  deferred_outputs:
    - output: us-co:statutes/39/39-22-609#income_tax_payment_due_date
      reason: The source fixes a calendar due date, but the supported schema has no date-valued output type.
    - output: us-co:statutes/39/39-22-609#interest_rate_for_payment_extension
      reason: The source incorporates the interest rate imposed under section 39-21-110.5, but copied context does not provide that cited section's rate output.
rules:
  - name: payment_extension_may_be_granted
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: C.R.S. 39-22-609(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-22-609
              excerpt: "may grant any taxpayer, upon application therefor, an extension"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-22-609
              excerpt: "No extension of time shall be authorized for payment of amounts of tax due upon deficiency assessments, or on amended or delinquent returns."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          taxpayer_applied_for_payment_extension
          and not payment_concerns_deficiency_assessment
          and not payment_is_on_amended_return
          and not payment_is_on_delinquent_return
