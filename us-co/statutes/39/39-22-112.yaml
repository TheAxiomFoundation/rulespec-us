format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-112
  summary: |-
    A person or organization exempt from federal income taxation is exempt from article 22 tax; qualifying gross-premiums insurance companies are also exempt, but disqualified insurance companies are not. Unrelated business taxable income of an otherwise exempt person or organization remains subject to article 22 tax.
rules:
  - name: person_or_organization_exempt_from_article_22_tax
    kind: derived
    entity: ColoradoIncomeTaxpayer
    dtype: Judgment
    period: Year
    source: C.R.S. 39-22-112(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-22-112
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (qualifies_for_federal_income_tax_exemption
          or insurance_company_subject_to_gross_premiums_tax)
          and not is_disqualified_insurance_company
  - name: unrelated_business_taxable_income_subject_to_article_22_tax
    kind: derived
    entity: ColoradoIncomeTaxpayer
    dtype: Judgment
    period: Year
    source: C.R.S. 39-22-112(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-22-112
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          otherwise_exempt_from_article_22_tax
          and subject_to_federal_tax_on_unrelated_business_income
