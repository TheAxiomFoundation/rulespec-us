format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-301
  summary: |-
    A tax is imposed upon each domestic C corporation, foreign C corporation, and combined group doing business in Colorado. The stated rates are four and fifty-five one-hundredths percent for income tax years commencing on or after January 1, 2020, but before January 1, 2022, and four and forty one-hundredths percent for income tax years commencing on or after January 1, 2022, except as otherwise provided in section 39-22-627. For income tax years commencing prior to January 1, 2023, the crop or livestock contribution credit is twenty-five percent of the applicable price, may not exceed one thousand dollars per tax year, and may be carried forward for five years.
  deferred_outputs:
    - output: us-co:statutes/39/39-22-301/d#corporate_income_tax
      reason: The final corporate tax depends on the unavailable combined-group definition in section 39-22-303 (12)(a.3), controlled-group mechanics under Internal Revenue Code section 1563(a), and the exact rate-displacement rule in section 39-22-627, which is not exported by the copied context.
      source_values:
        - us-co:statutes/39/39-22-301#temporary_corporate_income_tax_rate
        - us-co:statutes/39/39-22-301#corporate_income_tax_rate
    - output: us-co:statutes/39/39-22-301/3/b#crop_and_livestock_contribution_credit
      reason: The final credit requires contribution-level facts, the applicable wholesale-market-price or most-recent-sale-price valuation basis, and satisfaction of the disposition and written-statement conditions in subsection (3)(d).
      source_values:
        - us-co:statutes/39/39-22-301#wholesale_market_price_credit_rate
        - us-co:statutes/39/39-22-301#most_recent_sale_price_credit_rate
        - us-co:statutes/39/39-22-301#crop_and_livestock_contribution_credit_cap
    - output: us-co:statutes/39/39-22-301/3/c#unused_contribution_credit_carryforward
      reason: Computing the usable carryforward requires the deferred contribution credit, prior-year utilization, and tax-year attribution.
      source_values:
        - us-co:statutes/39/39-22-301#contribution_credit_carryforward_limit
    - output: us-co:statutes/39/39-22-301/3/d/V#food_donor_civil_and_criminal_immunity
      reason: The immunity provision concerns civil damages and criminal prosecution, including a willful, wanton, or reckless-conduct exception, rather than a supported tax-computation output.
