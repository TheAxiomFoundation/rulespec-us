format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-3-123
  summary: |-
    Works of art, literary materials, and artifacts loaned to and in the custody and control of the state or a political subdivision are exempt from property tax while actually on loan. “Artifacts” and “literary materials” are defined; charitable organization and works of art incorporate external definitions.
  deferred_outputs:
    - output: us-co:statutes/39/39-3-123/b#charitable_organization
      reason: The incorporated definition in section 39-26-102 (2.5) is present only as deferred context and has no executable export.
    - output: us-co:statutes/39/39-3-123/e#works_of_art
      reason: The incorporated definition in section 39-1-102 (18) is not available as an executable RuleSpec export.
    - output: us-co:statutes/39/39-3-123/1/b#loaned_artwork_literary_material_or_artifact_charitable_institution_exemption_applies
      reason: This branch depends on the unavailable incorporated definition of charitable organization in section 39-26-102 (2.5).
rules:
  - name: asset_is_artifact
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: 39-3-123(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-3-123
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_personal_property
          and asset_is_object_of_human_workmanship
          and asset_has_archaeological_or_historical_significance

  - name: asset_is_enumerated_literary_material
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: 39-3-123(d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-3-123
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_personal_property
          and (
            asset_is_book
            or asset_is_letter
            or asset_is_diary
            or asset_is_record
            or asset_is_document
            or asset_is_memorandum
            or asset_is_journal
            or asset_is_magazine
            or asset_is_note
          )

  - name: asset_use_is_charitable_purpose
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: 39-3-123(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-3-123
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_used_for_public_display
          or asset_is_used_for_research
          or asset_is_used_for_educational_study
          or asset_is_used_for_maintenance_of_property
          or asset_is_used_for_preparation_for_display

  - name: loaned_artifact_or_enumerated_literary_material_state_custody_exemption_applies
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: 39-3-123(1)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-3-123
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:statutes/39/39-3-123#asset_is_artifact
              output: asset_is_artifact
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:statutes/39/39-3-123#asset_is_enumerated_literary_material
              output: asset_is_enumerated_literary_material
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (asset_is_artifact or asset_is_enumerated_literary_material)
          and asset_is_loaned_to_state_or_political_subdivision
          and asset_is_in_custody_and_control_of_state_or_political_subdivision
          and asset_is_actually_on_loan
