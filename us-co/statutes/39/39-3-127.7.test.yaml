- name: qualifying_real_property_and_definitions
  period:
    period_kind: custom
    name: calendar_year
    start: '2024-01-01'
    end: '2024-12-31'
  input:
    us-co:statutes/39/39-3-127.7#input.asset_is_dwelling: true
    us-co:statutes/39/39-3-127.7#input.dwelling_has_affordability_restriction: true
    us-co:statutes/39/39-3-127.7#input.purchaser_household_income_as_area_median_income_ratio: 0.8
    us-co:statutes/39/39-3-127.7#input.purchaser_will_use_dwelling_as_primary_residence: true
    us-co:statutes/39/39-3-127.7#input.asset_is_permanent_change_to_real_property: true
    us-co:statutes/39/39-3-127.7#input.asset_change_augments_real_property_value: true
    us-co:statutes/39/39-3-127.7#input.asset_is_long_term_lease: true
    us-co:statutes/39/39-3-127.7#input.lease_is_used_for_affordable_homeownership_property: true
    us-co:statutes/39/39-3-127.7#input.leased_real_property_is_owned_by_community_land_trust_or_nonprofit_developer: true
    us-co:statutes/39/39-3-127.7#input.lease_is_to_owner_of_improvements: true
    us-co:statutes/39/39-3-127.7#input.lease_preserves_improvements_as_affordable_homeownership_property: true
    us-co:statutes/39/39-3-127.7#input.real_property_is_held_by_community_land_trust_or_nonprofit_developer: true
    us-co:statutes/39/39-3-127.7#input.real_property_is_separate_taxable_parcel_from_improvements: true
    us-co:statutes/39/39-3-127.7#input.real_property_is_leased_to_owner_of_improvements_as_affordable_homeownership_property: true
  output:
    us-co:statutes/39/39-3-127.7#affordable_homeownership_property: holds
    us-co:statutes/39/39-3-127.7#improvement: holds
    us-co:statutes/39/39-3-127.7#land_lease: holds
    us-co:statutes/39/39-3-127.7#real_property_exempt_from_property_tax: holds
    us-co:statutes/39/39-3-127.7#improvement_exempt_under_this_section: not_holds
- name: qualifying_organizations
  period:
    period_kind: custom
    name: calendar_year
    start: '2024-01-01'
    end: '2024-12-31'
  input:
    us-co:statutes/39/39-3-127.7#input.organization_is_federally_tax_exempt_501_c_3: true
    us-co:statutes/39/39-3-127.7#input.organization_uses_shared_equity_model_for_long_term_housing_affordability: true
    ? us-co:statutes/39/39-3-127.7#input.organization_acquires_and_maintains_real_property_while_selling_improvements_to_low_to_middle_income_primary_residence_households
    : true
    ? us-co:statutes/39/39-3-127.7#input.organization_primary_mission_is_providing_for_sale_affordable_housing_to_low_to_middle_income_primary_residence_households
    : true
  output:
    us-co:statutes/39/39-3-127.7#community_land_trust: holds
    us-co:statutes/39/39-3-127.7#nonprofit_affordable_homeownership_developer: holds
