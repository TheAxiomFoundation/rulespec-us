format: rulespec/v1
module:
  status: entity_not_supported
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-21-303
  summary: |-
    "On or before January 1, 2013, and January 1 of every odd-numbered year thereafter, the department shall prepare a tax profile and expenditure report"; the report must contain specified tax-expenditure and tax-profile information, be provided to the general assembly, be publicly available and published on the department website, and use specified income-class coverage.
  deferred_outputs:
    - output: us-co:statutes/39/39-21-303#tax_profile_and_expenditure_report_requirements
      reason: The source establishes administrative report-preparation, report-content, distribution, publication, and inspection duties, but the supported schema has no report/document entity or executable representation for required report contents and dissemination.
    - output: us-co:statutes/39/39-21-303#tax_expenditure_intended_purpose_statement_requirement
      reason: This report-content branch depends on identifying tax expenditures subject to section 39-21-304, whose RuleSpec source is not available in copied context.
rules: []
