format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-28-115
  summary: |-
    The licensed-wholesaler list shall be updated within seven days of any changes.
rules:
  - name: licensed_wholesaler_list_update_deadline_days
    kind: parameter
    dtype: Count
    period: Day
    source: C.R.S. 39-28-115
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-28-115
              excerpt: "updated within seven days"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          7
  - name: licensed_wholesaler_list_update_requirement_satisfied
    kind: derived
    entity: Department
    dtype: Judgment
    period: Day
    source: C.R.S. 39-28-115
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-28-115
              excerpt: "updated within seven days of any changes to the list"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-28-115
              excerpt: "updated within seven days"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not licensed_wholesaler_list_has_changed
          or days_since_licensed_wholesaler_list_change <= licensed_wholesaler_list_update_deadline_days
