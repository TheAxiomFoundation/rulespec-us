  source_verification:
    corpus_citation_path: us-co/statute/39/39-26-731
  summary: |-
    “On and after July 1, 2024, all sales, storage, and use of eligible decarbonizing building materials that are on the list of eligible materials maintained by the office of the state architect pursuant to section 24-92-117 (7), are exempt from taxation under parts 1 and 2 of this article 26.” This section is repealed effective July 1, 2034.
  deferred_outputs:
    - output: us-co:statutes/39/39-26-731/b#tax_expenditure_purposes
      reason: Subsection (1)(b) is a non-operative tax-preference performance statement describing legislative purposes rather than a computable legal consequence.
    - output: us-co:statutes/39/39-26-731/c#exemption_effectiveness_measurement
      reason: Subsection (1)(c) assigns administrative measurement and information-sharing duties and does not provide a computable formula or legal eligibility condition.
    - output: us-co:statutes/39/39-26-731/g#eligible_decarbonizing_building_material_sales_and_use_tax_exemption
      reason: The exemption in subsection (3), following the final listed material in subsection (2)(g), depends on the maximum acceptable global warming potential determination and eligible-materials list maintained pursuant to section 24-92-117; no executable RuleSpec dependency for that cited section is supplied.
    - output: us-co:statutes/39/39-26-731/2#eligible_decarbonizing_building_materials
      reason: The statutory definition incorporates the maximum acceptable global warming potential determined pursuant to section 24-92-117, for which no executable RuleSpec dependency is supplied.
    - output: us-co:statutes/39/39-26-731/4#eligible_exemption_products_database
      reason: Subsection (4) imposes administrative list-delivery and database-maintenance duties rather than defining a computable taxpayer-level result.
    - output: us-co:statutes/39/39-26-731/5#section_repeal
      reason: The July 1, 2034 repeal terminates the provision, but the exemption surface is already blocked by the unavailable section 24-92-117 eligibility determination and official list.
