format: rulespec/v1
module:
  summary: |-
    Property owned and used solely and exclusively for strictly charitable purposes, without private gain or corporate profit, is exempt from property tax when owned and used by a nonprofit community corrections agency for a community correctional facility or program. Applies to property tax years beginning on or after January 1, 1993.
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-3-108.5
rules:
  - name: owner_is_nonprofit_community_corrections_agency
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: 39-3-108.5(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-3-108.5
    versions:
      - effective_from: '1993-01-01'
        formula: |-
          owner_is_exempt_from_federal_income_tax_under_internal_revenue_code
          and owner_operates_community_correctional_facility_or_program

  - name: property_tax_exemption_for_nonprofit_community_corrections_applies
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: 39-3-108.5(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-3-108.5
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-3-108.5
    versions:
      - effective_from: '1993-01-01'
        formula: |-
          property_is_owned_and_used_solely_and_exclusively_for_strictly_charitable_purposes_without_private_gain_or_corporate_profit
          and property_is_owned_and_used_by_owner_for_community_correctional_facility_or_program
          and owner_is_nonprofit_community_corrections_agency
