format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-26-709
  summary: |-
    Purchases of qualifying manufacturing machinery or machine tools, or parts thereof, in excess of five hundred dollars are exempt subject to stated conditions and exceptions. A parent corporation and closely held subsidiaries are one person. Definitions include a long-term power purchase agreement with a term of no less than ten years.
  deferred_outputs:
    - output: us-co:statutes/39/39-26-709/a#manufacturing_machinery_purchase_exemption
      reason: The exemption depends on the unavailable exception in section 39-30-106 and on federal investment-tax-credit qualification mechanics.
      source_values:
        - us-co:statutes/39/39-26-709#manufacturing_machinery_purchase_minimum
    - output: us-co:statutes/39/39-26-709/b#corporate_group_person_treatment
      reason: Determining closely held subsidiary status depends on the unavailable definition in section 39-26-102.
    - output: us-co:statutes/39/39-26-709/c#defined_terms
      reason: The subsection contains legal definitions and equipment classifications that cannot be represented as executable outputs in the supported schema; closely held subsidiary status also depends on section 39-26-102.
      source_values:
        - us-co:statutes/39/39-26-709#long_term_power_purchase_agreement_minimum_term
    - output: us-co:statutes/39/39-26-709/d#direct_use_in_manufacturing_scope
      reason: The provision defines fact-intensive manufacturing-process boundaries rather than a computable output.
    - output: us-co:statutes/39/39-26-709/e#investment_tax_credit_qualification_requirement
      reason: Qualification depends on federal Internal Revenue Code section 38 mechanics not supplied in this source.
    - output: us-co:statutes/39/39-26-709/f#out_of_state_sales_tax_credit_exclusion
      reason: The exclusion requires transaction-specific tax-credit facts and the final exemption computation is otherwise deferred.
    - output: us-co:statutes/39/39-26-709/g#exemption_declaration_filing_requirement
      reason: The filing procedure depends in part on the unavailable consolidation-or-elimination determination under section 39-26-730.
    - output: us-co:statutes/39/39-26-709/2#use_tax_exemption_for_exempt_machinery
      reason: The use-tax exemption incorporates machinery exempt under subsection (1), whose final exemption determination is deferred.
rules:
  - name: manufacturing_machinery_purchase_minimum
    kind: parameter
    dtype: Money
    unit: USD
    source: 39-26-709(1)(a)(II)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-26-709
              excerpt: "in excess of five hundred dollars"
    versions:
      - effective_from: '1996-07-01'
        formula: |-
          500
  - name: long_term_power_purchase_agreement_minimum_term
    kind: parameter
    dtype: Count
    source: 39-26-709(1)(c)(I)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-26-709
              excerpt: "for a term of no less than ten years"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10
