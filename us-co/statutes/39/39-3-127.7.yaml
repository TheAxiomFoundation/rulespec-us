format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-3-127.7
  summary: |-
    Defines affordable homeownership property, community land trusts, improvements,
    land leases, and nonprofit affordable homeownership developers. Beginning with
    property tax years commencing January 1, 2024, qualifying separately parceled
    real property held and leased as affordable homeownership property is exempt;
    improvements are not exempt. A land lease must be submitted within twenty-five
    days of initial execution.
  deferred_outputs:
    - output: us-co:statutes/39/39-3-127.7/1/a#legislative_findings
      reason: Legislative findings are non-operative.
    - output: us-co:statutes/39/39-3-127.7/1/b#legislative_intent
      reason: Legislative intent is non-operative.
    - output: us-co:statutes/39/39-3-127.7/4#retroactive_property_tax_liability
      reason: Computing liability requires historical qualification, unpaid property-tax, and transaction data not stated in this source.
    - output: us-co:statutes/39/39-3-127.7/6#land_lease_submission_timeliness
      reason: Compliance requires execution and submission dates; RuleSpec has no date-arithmetic surface for the twenty-five-day deadline.
      source_values:
        - us-co:statutes/39/39-3-127.7#land_lease_submission_deadline_days
    - output: us-co:statutes/39/39-3-127.7/7/a#subdivision_exemption_application_and_report_requirements
      reason: The filing and payment requirements depend on section 39-2-117, which is not available in copied context.
    - output: us-co:statutes/39/39-3-127.7/7/b#separate_parcel_individual_annual_report_requirement
      reason: The individual annual-report requirement depends on section 39-2-117, which is not available in copied context.
rules:
  - name: affordable_homeownership_income_limit
    kind: parameter
    dtype: Rate
    source: 39-3-127.7(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-3-127.7
              excerpt: "at or below one\nhundred percent of the area median income"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          1.0

  - name: affordable_homeownership_property
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: 39-3-127.7(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-3-127.7
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          asset_is_dwelling
          and dwelling_has_affordability_restriction
          and purchaser_household_income_as_area_median_income_ratio <= affordable_homeownership_income_limit
          and purchaser_will_use_dwelling_as_primary_residence

  - name: community_land_trust
    kind: derived
    entity: Corporation
    dtype: Judgment
    period: Year
    source: 39-3-127.7(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-3-127.7
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          organization_is_federally_tax_exempt_501_c_3
          and organization_uses_shared_equity_model_for_long_term_housing_affordability
          and organization_acquires_and_maintains_real_property_while_selling_improvements_to_low_to_middle_income_primary_residence_households

  - name: improvement
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: 39-3-127.7(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-3-127.7
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          asset_is_permanent_change_to_real_property
          and asset_change_augments_real_property_value

  - name: land_lease
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: 39-3-127.7(d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-3-127.7
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          asset_is_long_term_lease
          and lease_is_used_for_affordable_homeownership_property
          and leased_real_property_is_owned_by_community_land_trust_or_nonprofit_developer
          and lease_is_to_owner_of_improvements
          and lease_preserves_improvements_as_affordable_homeownership_property

  - name: nonprofit_affordable_homeownership_developer
    kind: derived
    entity: Corporation
    dtype: Judgment
    period: Year
    source: 39-3-127.7(e)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-3-127.7
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          organization_is_federally_tax_exempt_501_c_3
          and organization_primary_mission_is_providing_for_sale_affordable_housing_to_low_to_middle_income_primary_residence_households

  - name: real_property_exempt_from_property_tax
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: 39-3-127.7(3)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-3-127.7
              excerpt: "Is held by either a community land trust or a nonprofit affordable\nhomeownership developer"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-3-127.7
              excerpt: "Has been split into a separate taxable parcel from the improvements"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-3-127.7
              excerpt: "Is leased to the owner of the improvements as an affordable\nhomeownership property"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          real_property_is_held_by_community_land_trust_or_nonprofit_developer
          and real_property_is_separate_taxable_parcel_from_improvements
          and real_property_is_leased_to_owner_of_improvements_as_affordable_homeownership_property
          and affordable_homeownership_property

  - name: improvement_exempt_under_this_section
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: 39-3-127.7(5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-3-127.7
              excerpt: "Improvements on real property that qualifies for the property tax\nexemption described in this section are not exempt"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          false

  - name: land_lease_submission_deadline_days
    kind: parameter
    dtype: Count
    source: 39-3-127.7(6)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-3-127.7
              excerpt: "within twenty-five days of the initial execution of the land lease"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          25
