format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-29-102
  summary: |-
    “Commercial production, for a commercial oil shale facility, means production from such facility in excess of the first fifteen thousand tons per day of oil shale or ten thousand barrels per day of shale oil.” “For metallic minerals, [gross income means] the value of ore immediately after its removal from the mine.” “Gross proceeds, for oil shale, means the value of the oil shale at the point of severance.”
  deferred_outputs:
    - output: us-co:statutes/39/39-29-102/4.5#locally_impacted_local_units_of_government
      reason: The geographic area depends on residence reported under section 39-29-110(1)(d), for which no executable RuleSpec source is available.
rules:
  - name: commercial_oil_shale_daily_tonnage_threshold
    kind: parameter
    dtype: Count
    period: Day
    source: 39-29-102(1.5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-29-102
              excerpt: "fifteen thousand tons per day of oil shale"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          15000
  - name: commercial_oil_shale_daily_barrel_threshold
    kind: parameter
    dtype: Count
    period: Day
    source: 39-29-102(1.5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-29-102
              excerpt: "ten thousand barrels per day of shale oil"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10000
  - name: commercial_oil_shale_production
    kind: derived
    entity: Business
    dtype: Judgment
    period: Month
    source: 39-29-102(1.5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-29-102
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-29-102
              excerpt: "determined by dividing the total production of a calendar month by the total number of days in such month"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          commercial_oil_shale_facility
          and (
            calendar_month_total_oil_shale_tons / calendar_month_day_count > commercial_oil_shale_daily_tonnage_threshold
            or calendar_month_total_shale_oil_barrels / calendar_month_day_count > commercial_oil_shale_daily_barrel_threshold
          )
  - name: metallic_mineral
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: 39-29-102(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-29-102
              excerpt: "Metallic minerals means all minerals except molybdenum, oil and gas, carbon dioxide, coal, oil shale, rock, sand, gravel, stone products, earths, limestone, and dolomite."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not mineral_is_molybdenum
          and not mineral_is_oil_or_gas
          and not mineral_is_carbon_dioxide
          and not mineral_is_coal
          and not mineral_is_oil_shale
          and not mineral_is_rock
          and not mineral_is_sand
          and not mineral_is_gravel
          and not mineral_is_stone_product
          and not mineral_is_earth
          and not mineral_is_limestone
          and not mineral_is_dolomite
  - name: oil_shale_gross_proceeds
    kind: derived
    entity: Business
    dtype: Money
    unit: USD
    period: Year
    source: 39-29-102(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-29-102
              excerpt: "Such value shall be determined by deducting from the first sales price of the shale oil all costs, including direct and indirect expenditures, for: (a) Equipment and machinery; (b) Fragmenting, crushing, conveying, beneficiating, pyrolysis, retorting, refining, and transporting; and (c) Royalty payments."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          first_sales_price_of_shale_oil
          - equipment_and_machinery_costs
          - shale_fragmenting_crushing_conveying_and_beneficiating_costs
          - shale_pyrolysis_retorting_and_refining_costs
          - shale_transporting_costs
          - royalty_payments
