format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-3-108
  summary: |-
    Property owned and used solely and exclusively for strictly charitable purposes and not for private gain or corporate profit is exempt if nonresidential, state-licensed as a health-care facility, or used as an integral part of a nonprofit domestic water company. A health-care facility's other use remains exempt when unrelated-trade-or-business gross income does not exceed fifteen percent of total gross revenues.
  deferred_outputs:
    - output: us-co:statutes/39/39-3-108/2#exemption_claim_complies_with_section_39_2_117
      reason: Compliance mechanics under section 39-2-117 are not available in copied RuleSpec context.
    - output: us-co:statutes/39/39-3-108/3/b#nonexempt_property_portion_value
      reason: The source requires the administrator to determine value but supplies no valuation formula for the nonexempt portion.
rules:
  - name: maximum_unrelated_trade_income_share
    kind: parameter
    dtype: Rate
    source: 39-3-108(3)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-3-108
              excerpt: "in excess of fifteen percent of the total gross revenues"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.15

  - name: qualified_amateur_sports_organization
    kind: derived
    entity: Corporation
    dtype: Judgment
    period: Year
    source: 39-3-108(1.3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-3-108
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          organization_is_organized_and_operated_exclusively_to_foster_amateur_sports_competition
          and organization_is_organized_and_operated_primarily_to_support_and_develop_amateur_athletes_for_national_or_international_competition
          and not organization_net_earnings_inure_to_private_shareholder_or_individual

  - name: qualified_amateur_sports_organization_presumed_to_provide_public_benefits
    kind: derived
    entity: Corporation
    dtype: Judgment
    period: Year
    source: 39-3-108(1.3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-3-108
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          qualified_amateur_sports_organization
          and (
            membership_is_open_to_amateur_athletes_coaches_trainers_managers_administrators_or_officials_active_in_the_sport
            or membership_is_open_to_amateur_sports_organizations_that_conduct_programs_in_the_sport
          )

  - name: charitable_property_nonresidential_exemption_applies
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: 39-3-108(1)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-3-108
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          property_meets_strictly_charitable_ownership_and_use_conditions
          and property_is_nonresidential

  - name: charitable_property_nonprofit_water_company_exemption_applies
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: 39-3-108(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-3-108
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          property_meets_strictly_charitable_ownership_and_use_conditions
          and property_is_used_as_an_integral_part_of_a_nonprofit_domestic_water_company

  - name: health_care_property_exemption_continues_for_limited_unrelated_income
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: 39-3-108(3)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-3-108
              excerpt: "does not result in gross income derived from any unrelated trade or business ... in excess of fifteen percent of the total gross revenues"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          property_meets_strictly_charitable_ownership_and_use_conditions
          and property_is_licensed_by_colorado_as_a_health_care_facility
          and health_care_property_has_other_use
          and unrelated_trade_or_business_gross_income
            <= maximum_unrelated_trade_income_share * total_gross_revenues_from_property_operation

  - name: qualified_amateur_sports_property_presumed_charitable
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: 39-3-108(1.3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-3-108
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          property_is_nonresidential
          and property_is_owned_and_used_solely_and_exclusively_by_qualified_amateur_sports_organization

  - name: charitable_property_tax_exemption_applies
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: 39-3-108(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-3-108
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:statutes/39/39-3-108#health_care_property_exemption_continues_for_limited_unrelated_income
              output: health_care_property_exemption_continues_for_limited_unrelated_income
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          qualified_amateur_sports_property_presumed_charitable
          or (
            property_meets_strictly_charitable_ownership_and_use_conditions
            and (
              property_is_nonresidential
              or property_is_used_as_an_integral_part_of_a_nonprofit_domestic_water_company
              or (
                property_is_licensed_by_colorado_as_a_health_care_facility
                and (
                  not health_care_property_has_other_use
                  or health_care_property_exemption_continues_for_limited_unrelated_income
                )
              )
            )
          )
