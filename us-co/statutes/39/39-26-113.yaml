format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-26-113
  summary: |-
    “Seller-financed sale means a retail sale of a motor or off-highway vehicle”
    in which the licensed seller or wholly-owned affiliate collects periodic
    payments and retains a lien until all payments are received; it excludes a
    sale financed by another person who retains the lien.
  deferred_outputs:
    - output: us-co:statutes/39/39-26-113#vehicle_registration_tax_payment_requirement
      reason: Registration and title issuance requirements depend on tax liabilities under uncopied sections 29-2-211 and 39-26-106 and on referenced vehicle definitions.
    - output: us-co:statutes/39/39-26-113#tax_collection_at_registration_application
      reason: Collection of applicable sales taxes depends on uncopied tax-law mechanics.
    - output: us-co:statutes/39/39-26-113#state_revenue_distribution
      reason: Distribution is governed by other revenues under part 1, whose mechanics are not supplied.
    - output: us-co:statutes/39/39-26-113#nonresident_automobile_sale_exemption
      reason: The exemption applies to sales-tax collection provided by this section and requires unavailable collection and tax-liability mechanics.
    - output: us-co:statutes/39/39-26-113#special_district_personal_property_sale_exemption
      reason: The special-district sales-tax exemption requires external district registration and tax-law mechanics.
    - output: us-co:statutes/39/39-26-113#seller_financed_sales_tax_deduction
      reason: The deduction from sales-tax returns requires unavailable tax-return and remittance mechanics.
    - output: us-co:statutes/39/39-26-113#auction_sale_tax_collection_method
      reason: Auction-sale tax collection and dealer exception require unavailable tax collection mechanics.
    - output: us-co:statutes/39/39-26-113#off_highway_vehicle_tax_verification_exception
      reason: The title and tax-verification consequence depends on unavailable vehicle-title and tax-payment mechanics.
rules:
  - name: seller_financed_sale
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Day
    source: 39-26-113(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-26-113
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          vehicle_sale_is_retail_sale_of_motor_or_off_highway_vehicle
          and seller_is_licensed_under_article_20_of_title_44
          and seller_or_wholly_owned_affiliate_collects_consideration_in_periodic_payments
          and seller_or_wholly_owned_affiliate_retains_lien_until_all_payments_received
          and not other_person_provides_consideration_and_retains_lien
