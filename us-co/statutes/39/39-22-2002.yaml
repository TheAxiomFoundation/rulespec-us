format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-2002
  summary: |-
    “If the amount of the identical individual refund calculated pursuant to subsection (2)(a) of this section is less than or equal to the identical refund threshold, the executive director shall allow each qualified individual an identical refund.” The threshold is generally one-half of the specified federal-table amount, with a fifteen-dollar fallback. Written notice is due within five working days; review and hearing limits are twenty and twenty-five days.
  deferred_outputs:
    - output: us-co:statutes/39/39-22-2002/b#identical_refund_allowed
      reason: The refund must be allowed in the manner set forth in section 39-22-2003 (3)(a) and (3)(b), but the copied RuleSpec context does not export the referenced refund amount or classification mechanics; the applicable identical refund threshold is also unresolved.
    - output: us-co:statutes/39/39-22-2002/a#identical_refund_threshold
      reason: Computing the threshold requires the most recent table prescribed under Internal Revenue Code section 164(b)(5)(H)(ii), which is not available as copied RuleSpec context, and an Internal Revenue Service advice determination.
    - output: us-co:statutes/39/39-22-2002#temporary_state_sales_tax_refund
      reason: Computing the refund requires unresolved constitutional spending-limit mechanics, voter-retention authorization, statutory adjustments, and amounts refunded by other methods established by law.
    - output: us-co:statutes/39/39-22-2002#income_classification_refund_amounts
      reason: Computing the income classifications and refund amounts requires section 39-22-2003 (3) mechanics that are not exported by the copied RuleSpec context, as well as unresolved excess-revenue dependencies.
rules:
  - name: identical_refund_threshold_fraction
    kind: parameter
    dtype: Rate
    source: 39-22-2002(3.5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-2002
              excerpt: "identical refund threshold means an amount equal to one-half of the lowest amount listed for married, filing jointly"
    versions:
      - effective_from: '1999-01-01'
        formula: |-
          1 / 2

  - name: identical_refund_threshold_fallback
    kind: parameter
    dtype: Money
    unit: USD
    source: 39-22-2002(3.5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-2002
              excerpt: "the identical refund threshold is fifteen dollars"
    versions:
      - effective_from: '1999-01-01'
        formula: |-
          15

  - name: calculation_notice_working_day_limit
    kind: parameter
    dtype: Count
    unit: day
    source: 39-22-2002(6)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-2002
              excerpt: "within five working days after such calculations are completed"
    versions:
      - effective_from: '1999-01-01'
        formula: |-
          5

  - name: executive_committee_review_day_limit
    kind: parameter
    dtype: Count
    unit: day
    source: 39-22-2002(6)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-2002
              excerpt: "within twenty days after receipt of such written notification"
    versions:
      - effective_from: '1999-01-01'
        formula: |-
          20

  - name: executive_committee_hearing_conclusion_day_limit
    kind: parameter
    dtype: Count
    unit: day
    source: 39-22-2002(6)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-2002
              excerpt: "concluded no later than twenty-five days after receipt of such written notification"
    versions:
      - effective_from: '1999-01-01'
        formula: |-
          25
