format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-29-114
  summary: |-
    Persons in the same controlled group of corporations are treated as one taxpayer. Common ownership of fifty percent or more, counting owners with at least five percent, triggers proportional allocation of exemptions according to production. Family exemptions are similarly allocated, and family includes only an individual's spouse and children.
  deferred_outputs:
    - output: us-co:statutes/39/39-29-114#controlled_group_members_treated_as_one_taxpayer
      reason: The operative controlled-group classification depends on the meaning given by Internal Revenue Code section 613A as of January 1, 1987, but no RuleSpec export for that definition is supplied.
rules:
  - name: common_beneficial_interest_threshold
    kind: parameter
    dtype: Rate
    source: C.R.S. 39-29-114(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-29-114
              excerpt: "fifty percent or more of the beneficial interest"
    versions:
      - effective_from: '1987-01-01'
        formula: |-
          0.50

  - name: counted_beneficial_owner_minimum_interest
    kind: parameter
    dtype: Rate
    source: C.R.S. 39-29-114(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-29-114
              excerpt: "persons who own at least five percent of such beneficial interest"
    versions:
      - effective_from: '1987-01-01'
        formula: |-
          0.05

  - name: exemption_allocated_under_common_beneficial_ownership
    kind: derived
    entity: BeneficialInterestEntity
    dtype: Money
    unit: USD
    period: Year
    source: C.R.S. 39-29-114(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-29-114
    versions:
      - effective_from: '1987-01-01'
        formula: |-
          if common_beneficial_interest_owned_by_same_or_related_persons >= common_beneficial_interest_threshold
          and each_owner_taken_into_account_owns_at_least_counted_beneficial_owner_minimum_interest
          and total_production_quantity_of_common_ownership_entities > 0:
            total_exemptions_allowed_under_article_for_common_ownership_entities
            * entity_production_quantity
            / total_production_quantity_of_common_ownership_entities
          else: 0

  - name: person_is_within_family_of_individual
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: C.R.S. 39-29-114(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-29-114
    versions:
      - effective_from: '1987-01-01'
        formula: |-
          person_is_the_individual
          or person_is_spouse_of_the_individual
          or person_is_child_of_the_individual

  - name: exemption_allocated_among_family_individuals
    kind: derived
    entity: Person
    dtype: Money
    unit: USD
    period: Year
    source: C.R.S. 39-29-114(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-29-114
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:statutes/39/39-29-114#person_is_within_family_of_individual
              output: person_is_within_family_of_individual
              hash: sha256:local
    versions:
      - effective_from: '1987-01-01'
        formula: |-
          if person_is_within_family_of_individual
          and total_production_quantity_of_family_individuals > 0:
            total_exemptions_allowed_under_article_for_family_individuals
            * individual_production_quantity
            / total_production_quantity_of_family_individuals
          else: 0
