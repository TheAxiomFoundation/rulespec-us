- name: vehicle registration and title tax prerequisites are satisfied
  period:
    period_kind: custom
    name: day
    start: '2024-01-15'
    end: '2024-01-15'
  input:
    us-co:statutes/39/39-26-208#input.asset_is_motor_or_other_vehicle_for_which_registration_is_required: true
    us-co:statutes/39/39-26-208#input.asset_is_motor_or_other_vehicle_or_mobile_home: true
    us-co:statutes/39/39-26-208#input.all_applicable_storage_use_or_consumption_taxes_have_been_paid: true
    us-co:statutes/39/39-26-208#input.application_is_for_vehicle_registration_and_title_or_vehicle_or_mobile_home_title: true
    us-co:statutes/39/39-26-208#input.applicant_fails_to_show_applicable_tax_payment_by_proper_receipts: false
  output:
    us-co:statutes/39/39-26-208#tax_payment_prerequisite_for_vehicle_registration_satisfied: holds
    us-co:statutes/39/39-26-208#tax_payment_prerequisite_for_vehicle_or_mobile_home_title_satisfied: holds
    us-co:statutes/39/39-26-208#department_must_collect_applicable_taxes_at_application: not_holds
