format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-21-111
  summary: |-
    If collection of the tax will be jeopardized by delay, the executive director may terminate the taxable period immediately; upon determination and notice and demand, the tax is due and payable forthwith. In other revenue-jeopardy cases, immediate demand makes the tax due and payable forthwith. Collection may be stayed upon satisfactory security.
rules:
  - name: taxable_period_may_be_immediately_terminated
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-21-111(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-21-111
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          collection_of_tax_will_be_jeopardized_by_delay

  - name: tax_is_due_and_payable_forthwith
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-21-111(1)-(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-21-111
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (collection_of_tax_will_be_jeopardized_by_delay
          and executive_director_has_declared_taxable_period_immediately_terminated
          and executive_director_has_determined_tax
          and executive_director_has_issued_notice_and_demand_for_payment)
          or (revenue_is_in_jeopardy
          and executive_director_has_issued_immediate_demand_for_payment)

  - name: immediate_collection_may_proceed
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-21-111(1)-(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-21-111
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          tax_is_due_and_payable_forthwith

  - name: collection_may_be_stayed
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-21-111(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-21-111
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          taxpayer_has_given_security_satisfactory_to_executive_director
