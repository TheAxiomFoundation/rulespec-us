    corpus_citation_path: us-co/statute/39/39-8-105
  summary: |-
    The assessor shall report taxable real-property valuations and protest actions to the county board of equalization by September 15 in counties using the alternate procedure, or July 15 in other counties; the assessor shall also report taxable personal-property valuations, apportioned portable-equipment valuations, unreturned schedules, and objections or protests.
