format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-537.5
  summary: |-
    “Property tax” means the specified ad valorem tax, excluding public utilities and graduated annual specific ownership tax. For eligible income tax years, the credit is property tax paid on up to eighteen thousand dollars of personal-property actual value.
  deferred_outputs:
    - output: us-co:statutes/39/39-22-537.5/1#tax_expenditure_purpose
      reason: Legislative purpose clause is non-operative.
    - output: us-co:statutes/39/39-22-537.5/2(b)#taxpayer_inclusion_for_federally_exempt_organizations
      reason: The taxpayer inclusion depends on federal tax-exemption status under Internal Revenue Code section 501(c), for which no executable upstream definition is available.
    - output: us-co:statutes/39/39-22-537.5/3(a)#business_personal_property_tax_credit
      reason: Computing property tax paid on the capped actual-value portion requires property-level tax-payment allocation from the property tax statement.
      source_values:
        - us-co:statutes/39/39-22-537.5#personal_property_actual_value_credit_limit
    - output: us-co:statutes/39/39-22-537.5/3(b)#delinquent_property_tax_payment_credit_exclusion
      reason: This limitation applies to the deferred final credit calculation.
    - output: us-co:statutes/39/39-22-537.5/3(c)#excess_credit_refund
      reason: Refundability applies to the deferred final credit calculation.
    - output: us-co:statutes/39/39-22-537.5/4#property_tax_statement_submission_requirement
      reason: Administrative claim-document requirement does not define a computable amount or eligibility output in this source slice.
    - output: us-co:statutes/39/39-22-537.5/5#section_repeal
      reason: Repeal date is temporal legal metadata rather than a supported runtime date-valued output.
rules:
  - name: personal_property_actual_value_credit_limit
    kind: parameter
    dtype: Money
    unit: USD
    source: 39-22-537.5(3)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-537.5
              excerpt: "up to eighteen thousand dollars of the total actual value"
    versions:
      - effective_from: '2019-01-01'
        formula: |-
          18000
  - name: property_tax_for_credit
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: 39-22-537.5(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-22-537.5
    versions:
      - effective_from: '2019-01-01'
        formula: |-
          property_tax_is_ad_valorem_imposed_pursuant_to_article_x_section_3
          and not property_tax_is_on_public_utility_assessed_property
          and not property_tax_is_graduated_annual_specific_ownership_tax
  - name: personal_property_actual_value_covered_by_credit
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 39-22-537.5(3)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-537.5
              excerpt: "on up to eighteen thousand dollars of the total actual value"
    versions:
      - effective_from: '2019-01-01'
        formula: |-
          min(total_actual_value_of_taxpayer_personal_property, personal_property_actual_value_credit_limit)
