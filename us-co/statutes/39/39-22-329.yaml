format: rulespec/v1
module:
  summary: |-
    Each resident shareholder is considered to have paid a pro rata share of net income tax paid by an S corporation to a qualifying state.
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-329
  deferred_outputs:
    - output: us-co:statutes/39/39-22-329#shareholder_enterprise_zone_credit
      reason: The source incorporates S corporation credits described in sections 39-30-103.5 to 39-30-105.6, but no executable RuleSpec exports for those credits are supplied.
rules:
  - name: resident_shareholder_tax_deemed_paid
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: USD
    source: C.R.S. 39-22-329(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-329
              excerpt: "each resident shareholder shall be considered to have paid a tax imposed on each resident shareholder in an amount equal to each resident shareholder's pro rata share of any net income tax paid by the S corporation"
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-22-329
              excerpt: "net income tax means any tax imposed on, or measured by, an S corporation's net income"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if resident_shareholder
          and s_corporation_paid_net_income_tax_to_qualifying_state:
            shareholder_pro_rata_share_of_s_corporation_net_income_tax_paid
          else: 0
