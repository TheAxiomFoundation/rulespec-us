format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-5302
  summary: |-
    “For the five consecutive income tax years immediately following” the required written certification, the income tax return form must contain a line for voluntary contributions to the Feeding Colorado fund.
rules:
  - name: income_tax_return_must_contain_feeding_colorado_contribution_line
    kind: derived
    entity: StateAgency
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-22-5302
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-22-5302
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          executive_director_has_filed_required_written_certification
          and feeding_colorado_fund_is_next_in_queue
          and tax_year_is_within_required_consecutive_period_after_certification
