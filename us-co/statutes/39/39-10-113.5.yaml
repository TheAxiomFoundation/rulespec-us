format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-10-113.5
  summary: |-
    If taxes become delinquent upon improvements valued and taxed separately from land, the county treasurer may collect them as if the improvements were personal property; this section does not apply to specified property, and commercial property requires stated findings, determination, and written notice.
rules:
  - name: county_treasurer_may_collect_separately_taxed_improvement_taxes_as_personal_property
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. 39-10-113.5(1)-(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-10-113.5
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          taxes_on_improvement_are_delinquent
          and improvement_is_valued_and_taxed_separately_from_land
          and not improvement_is_mobile_home
          and not improvement_is_nonbuilding_on_land_used_solely_and_exclusively_for_agricultural_purposes
          and not improvement_is_water_right_or_associated_structure_supporting_specified_real_property_use
          and (
            not assessor_classifies_improvement_as_commercial_property
            or (
              treasurer_finds_improvement_may_be_moved_dissipated_or_distributed
              and treasurer_determines_taxes_may_be_uncollectible
              and treasurer_serves_or_posts_written_reasons_for_finding_and_determination
            )
          )
