format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-26-125
  summary: |-
    Taxes shall not be assessed and collection actions shall not be commenced more than three years after the tax is payable, subject to cited exceptions. A false or fraudulent return with intent to evade tax permits assessment or collection proceedings at any time.
  deferred_outputs:
    - output: us-co:statutes/39/39-26-125#general_assessment_collection_and_lien_limitation
      reason: The general limitation and lien-continuation rules are expressly subject to sections 29-2-208 (2)(a)(III) and 29-2-302 (5)(b), whose operative exceptions are not available in copied RuleSpec context.
      source_values:
        - us-co:statutes/39/39-26-125#general_assessment_and_collection_limitation_years
        - us-co:statutes/39/39-26-125#lien_continuation_after_notice_filing_years
rules:
  - name: general_assessment_and_collection_limitation_years
    kind: parameter
    dtype: Integer
    source: C.R.S. § 39-26-125
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-26-125
              excerpt: "more than three years after the date on which the tax was or is payable"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          3
  - name: lien_continuation_after_notice_filing_years
    kind: parameter
