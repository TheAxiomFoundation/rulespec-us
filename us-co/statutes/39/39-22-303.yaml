format: rulespec/v1
module:
  status: deferred
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-303
  summary: |-
    “For tax years beginning on and after January 1, 2026,” members of an affiliated group that are members of a unitary business must file a combined report. The section also governs foreign corporations, foreign-source income, pre-2026 combined reporting, and definitions including affiliated group, listed jurisdiction, taxpayer, and unitary business.
  deferred_outputs:
    - output: us-co:statutes/39/39-22-303/b#foreign_tax_avoidance_corporation_included_in_combined_group
      reason: >-
        Subsection (8)(b) depends on the economic substance doctrine described
        in Internal Revenue Code section 7701(o), for which no copied executable
        RuleSpec dependency is available.
    - output: us-co:statutes/39/39-22-303/a#foreign_source_income_after_foreign_tax_deduction
      reason: >-
        Subsection (10)(a) requires the foreign-source-income definition from
        Internal Revenue Code section 862 and the federally determined foreign
        tax deduction; the necessary executable dependencies are unavailable.
    - output: us-co:statutes/39/39-22-303/b#foreign_source_income_after_foreign_tax_credit_exclusion
      reason: >-
        Subsection (10)(b) requires computations under Internal Revenue Code
        sections 11, 901, 904, and 960, none of which has a copied executable
        RuleSpec dependency.
    - output: us-co:statutes/39/39-22-303/a#pre_2026_affiliated_corporations_in_combined_report
      reason: >-
        Subsection (11)(a) requires corporation-to-corporation relations and
        measurements across the tax year and two preceding tax years; the
        supported schema and supplied context do not provide those entity
        relations or historical measurements.
    - output: us-co:statutes/39/39-22-303/f#domestic_minimal_property_and_payroll_corporation_satisfies_combined_report_tests
      reason: >-
        Subsection (11)(f) depends on property-and-payroll factoring pursuant
        to section 24-60-1301, for which no copied executable RuleSpec dependency
        is available.
    - output: us-co:statutes/39/39-22-303/a#affiliated_group
      reason: >-
        Subsection (12)(a) defines affiliated-group membership through direct
        and indirect stock ownership, voting power, nonvoting-stock classes,
        and exclusions dependent on Internal Revenue Code sections 409 and
        4975; the required ownership graph and cited executable definitions are
        unavailable.
    - output: us-co:statutes/39/39-22-303/b#listed_jurisdiction
      reason: >-
        Subsection (12)(b) defines a date-sensitive classification over a long
        jurisdiction-name list. A faithful entity-scoped jurisdiction
        classification interface is not supplied by the supported schema or
        copied context.
    - output: us-co:statutes/39/39-22-303/d#taxpayer
      reason: >-
        Subsection (12)(d) depends on whether a C corporation or combined group
        is subject to the tax imposed by section 39-22-301, but the copied
        section 39-22-301 context exports tax parameters rather than the needed
        subject-to-tax classification.
    - output: us-co:statutes/39/39-22-303/e#unitary_business
      reason: >-
        Subsection (12)(e) requires a relation-backed classification of
        corporations, affiliated groups, partnerships, and indirectly held
        pass-through interests based on interdependence, integration, synergy,
        mutual benefit, and significant value flows; the necessary business
        ownership and activity relations are unavailable.
