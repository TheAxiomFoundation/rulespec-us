format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-5303
  summary: |-
    After subtracting the appropriation to the department, the state treasurer shall transfer all money remaining in the fund at the end of the fiscal year to Feeding Colorado.
rules:
  - name: feeding_colorado_fund_fiscal_year_end_transfer
    kind: derived
    entity: FeedingColoradoFund
    dtype: Money
    period: Year
    unit: USD
    source: Colo. Rev. Stat. § 39-22-5303(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-5303
              excerpt: "After subtracting the appropriation to the\ndepartment, the state treasurer shall transfer all money remaining in the fund at\nthe end of the fiscal year to Feeding Colorado."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          max(0, feeding_colorado_fund_balance_at_fiscal_year_end - department_revenue_administration_appropriation)
