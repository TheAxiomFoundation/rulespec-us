format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-8-102
  summary: |-
    “No person shall be appointed as an independent referee” during a property tax year in which the person represents or has represented a taxpayer in the county in a valuation protest, appeal, abatement, or refund matter. An appointed referee shall not subsequently represent a taxpayer who appeared before that referee in such a hearing.
rules:
  - name: person_may_be_appointed_independent_referee
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: C.R.S. 39-8-102(2)(i)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-8-102
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not person_represents_or_has_represented_taxpayer_in_county_valuation_protest_appeal_abatement_or_refund_matter_during_property_tax_year
  - name: independent_referee_may_subsequently_represent_taxpayer_from_hearing
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
