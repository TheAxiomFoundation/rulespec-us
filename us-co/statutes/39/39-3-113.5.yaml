format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-3-113.5
  summary: |-
    “Low-income applicant” includes, before January 1, 2024, an individual or family whose total income is no greater than eighty percent of area median income and who applies to a nonprofit housing provider for construction and purchase assistance. The section also defines area median income, indicators of intent, and nonprofit housing provider, and establishes property-tax exemption rules and limitations.
  deferred_outputs:
    - output: us-co:statutes/39/39-3-113.5/a#area_median_income
      reason: The definition relies on annually published county-and-family-size income data from the United States department of housing and urban development; this source does not supply the published values or a canonical RuleSpec dependency.
    - output: us-co:statutes/39/39-3-113.5/b#indicators_of_intent
      reason: This is a nonexhaustive discretionary list of off-site activities the administrator may consider, not a computable determination standard.
    - output: us-co:statutes/39/39-3-113.5/d#nonprofit_housing_provider
      reason: The definition depends on federal tax-exempt status under section 501(c)(3), for which no copied canonical RuleSpec source is available.
    - output: us-co:statutes/39/39-3-113.5/2#property_tax_exemption
      reason: The exemption depends on the deferred nonprofit-housing-provider definition and, for post-transition branches, the unavailable rural-resort classification and community-land-trust definition.
    - output: us-co:statutes/39/39-3-113.5/3#property_tax_exemption_limitations
      reason: The limitations apply to the deferred property-tax exemption and depend on the deferred nonprofit-housing-provider, low-income-applicant post-transition, and community-land-trust concepts.
rules:
  - name: pre_transition_low_income_income_limit_rate
    kind: parameter
    dtype: Rate
    source: 39-3-113.5(c)(I)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-3-113.5
              excerpt: "total income is no greater than eighty percent of the area median income"
    versions:
      - effective_from: '2011-01-01'
        formula: |-
          0.80
  - name: family_is_low_income_applicant_before_transition_date
    kind: derived
    entity: Family
    dtype: Judgment
    period: Year
    source: 39-3-113.5(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-3-113.5
              excerpt: "For property tax years commencing before January 1, 2024, an individual or family whose total income is no greater than eighty percent of the area median income"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-3-113.5
              excerpt: "applies to a nonprofit housing provider to assist in the construction and purchase of housing"
    versions:
      - effective_from: '2011-01-01'
        formula: |-
          property_tax_year_commences_before_transition_date
          and family_total_income <= area_median_income_for_family_size_in_property_county * pre_transition_low_income_income_limit_rate
          and family_applies_to_nonprofit_housing_provider_for_construction_and_purchase_assistance
