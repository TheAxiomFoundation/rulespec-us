format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-3-109
  summary: |-
    Residential property owned and used solely and exclusively for strictly charitable purposes, not for private gain or corporate profit, is exempt when its structure and land are an integral part of a listed institution and it is not leased or rented to persons outside the listed student and care-or-treatment resident categories.
  deferred_outputs:
    - output: us-co:statutes/39/39-3-109/2#qualified_occupant_residential_property_exempt_portion
      reason: The administrator's annual assessment-date determination of a property-value ratio and qualified occupied-unit ratio requires property-unit, occupant, valuation, and administrator-decision relations not represented in this source slice.
    - output: us-co:statutes/39/39-3-109/2.5#colorado_benefit_requirement_for_exemption_prohibited
      reason: This administrative prohibition does not state a computable entity-scoped consequence.
    - output: us-co:statutes/39/39-3-109/3#claimed_exemption_complies_with_section_39_2_117
      reason: Compliance depends on section 39-2-117, for which no executable RuleSpec dependency is supplied.
rules:
  - name: care_or_treatment_resident_occupancy_is_permitted
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: 39-3-109(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-3-109
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          property_has_care_or_treatment_resident_lessee_or_renter
          and each_care_or_treatment_resident_is_actually_receiving_care_or_treatment
          and each_care_or_treatment_resident_is_required_to_be_domiciled_to_receive_care_or_treatment
          and each_care_or_treatment_resident_resides_in_hospital_facility_institution_or_affiliated_residential_unit
  - name: residential_property_occupancy_is_permitted
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: 39-3-109(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-3-109
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          no_lessee_or_renter_is_outside_student_or_care_or_treatment_resident_categories
          and (
            not property_has_care_or_treatment_resident_lessee_or_renter
            or care_or_treatment_resident_occupancy_is_permitted
          )
  - name: residential_charitable_property_tax_exemption_applies
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: 39-3-109(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-3-109
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          property_is_owned
          and property_is_used_solely_and_exclusively_for_strictly_charitable_purposes
          and property_is_not_used_for_private_gain_or_corporate_profit
          and property_is_residential
          and (
            structure_and_land_are_integral_part_of_church
            or structure_and_land_are_integral_part_of_eleemosynary_hospital
            or structure_and_land_are_integral_part_of_eleemosynary_licensed_health_care_facility
            or structure_and_land_are_integral_part_of_school
            or structure_and_land_are_integral_part_of_other_tax_exempt_institution
          )
          and residential_property_occupancy_is_permitted
