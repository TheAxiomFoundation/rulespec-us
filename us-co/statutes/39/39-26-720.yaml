format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-26-720
  summary: |-
    Sales of equipment to a bingo-raffle licensee are exempt from taxation; storage, use, or consumption of equipment by a bingo-raffle licensee is exempt from taxation.
rules:
  - name: sale_of_equipment_to_bingo_raffle_licensee_is_sales_tax_exempt
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-26-720(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-26-720
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          sale_is_of_equipment
          and sale_is_to_bingo_raffle_licensee
  - name: bingo_raffle_licensee_equipment_use_is_use_tax_exempt
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-26-720(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-26-720
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_equipment
          and asset_is_stored_used_or_consumed_by_bingo_raffle_licensee
