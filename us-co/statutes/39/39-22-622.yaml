format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-622
  summary: Refunds for returns filed by January 31, by the last day of February, by
    March 31, or after March 31 shall be made within fourteen, twenty-one, twenty-eight,
    or forty-five calendar days, respectively. A late refund receives interest and
    a penalty equal to five percent of the tax refunded. Subsection (2) does not apply
    to the exceptions listed in subsection (4).
  deferred_outputs:
  - output: us-co:statutes/39/39-22-622/2#refund_payment_deadline_applies
    reason: The final applicability of subsection (2) depends in part on the exception
      for a tax credit allowed in section 39-22-531, for which no copied RuleSpec
      dependency is available.
  - output: us-co:statutes/39/39-22-622/3#refund_interest
    reason: The applicable interest rate is imposed under section 39-21-110.5, but
      no copied RuleSpec export supplies that rate.
rules:
- name: january_filing_refund_period_calendar_days
  kind: parameter
  dtype: Count
  source: 39-22-622(b)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-22-622
          excerpt: within fourteen calendar days of the date of filing
  versions:
  - effective_from: '0001-01-01'
    formula: '14'
- name: february_filing_refund_period_calendar_days
  kind: parameter
  dtype: Count
  source: 39-22-622(2)(b)(II)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-22-622
          excerpt: within twenty-one calendar days of the date of filing
  versions:
  - effective_from: '0001-01-01'
    formula: '21'
- name: march_filing_refund_period_calendar_days
  kind: parameter
  dtype: Count
  source: 39-22-622(2)(b)(III)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-22-622
          excerpt: within twenty-eight calendar days of the date of filing
  versions:
  - effective_from: '0001-01-01'
    formula: '28'
- name: post_march_filing_refund_period_calendar_days
  kind: parameter
  dtype: Count
  source: 39-22-622(2)(b)(IV)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-22-622
          excerpt: within forty-five calendar days of the date of filing
  versions:
  - effective_from: '0001-01-01'
    formula: '45'
- name: paragraph_b_refund_time_period_calendar_days
  kind: derived
  entity: TaxReturn
  dtype: Count
  period: Year
  source: 39-22-622(2)(b)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-22-622
          excerpt: Refunds for income tax returns filed by January 31 ... after March
            31
  versions:
  - effective_from: '0001-01-01'
    formula: "if return_was_received_by_january_31:\n  january_filing_refund_period_calendar_days\n\
      else:\n  if return_was_received_after_january_31_and_by_last_day_of_february:\n\
      \    february_filing_refund_period_calendar_days\n  else:\n    if return_was_received_after_last_day_of_february_and_by_march_31:\n\
      \      march_filing_refund_period_calendar_days\n    else:\n      post_march_filing_refund_period_calendar_days"
- name: late_refund_penalty_rate
  kind: parameter
  dtype: Rate
  source: 39-22-622(3)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-22-622
          excerpt: a penalty equal to five percent of the amount of tax to be refunded
  versions:
  - effective_from: '0001-01-01'
    formula: '0.05'
- name: late_refund_penalty
  kind: derived
  entity: TaxReturn
  dtype: Money
  unit: USD
  period: Year
  source: 39-22-622(3)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-22-622
          excerpt: If any refund due under this article is not paid when due ... a
            penalty equal to five percent
  versions:
  - effective_from: '0001-01-01'
    formula: 'if refund_was_not_paid_when_due: late_refund_penalty_rate * max(0, amount_of_tax_to_be_refunded)
      else: 0'
