- name: minimum_penalty_applies_to_small_unpaid_tax_amount
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    us-co:statutes/39/39-26-118#input.unpaid_unaccounted_or_incorrectly_accounted_tax_amount: 100
    us-co:statutes/39/39-26-118#input.months_since_tax_due: 0
  output:
    us-co:statutes/39/39-26-118#delinquency_penalty: 15
- name: monthly_penalty_component_is_capped
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    us-co:statutes/39/39-26-118#input.unpaid_unaccounted_or_incorrectly_accounted_tax_amount: 1000
    us-co:statutes/39/39-26-118#input.months_since_tax_due: 40
  output:
    us-co:statutes/39/39-26-118#delinquency_penalty: 280
