format: rulespec/v1
imports:
  - us-co:statutes/39/39-13-103#documentary_fee_payment_evidence_complies
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-13-105
  summary: |-
    No document subject to a documentary fee shall be recorded until the fee is paid and evidence of payment complies with section 39-13-103. A county clerk and recorder who willfully and knowingly records such a document without first collecting the fee and evidencing payment is guilty of a misdemeanor and, upon conviction, shall be fined fifty dollars.
rules:
  - name: documentary_fee_recording_misdemeanor_fine
    kind: parameter
    dtype: Money
    unit: USD
    source: C.R.S. 39-13-105
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-13-105
              excerpt: "shall be punished by a fine of fifty dollars"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          50

  - name: documentary_fee_recording_prerequisites_satisfied
    kind: derived
    entity: Document
    dtype: Judgment
    period: Day
    source: C.R.S. 39-13-105
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-13-105
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:statutes/39/39-13-103#documentary_fee_payment_evidence_complies
              output: documentary_fee_payment_evidence_complies
              hash: sha256:eef7e1a36b67fb8a377ade149191ad8e73427fefb41327258cc6524c28630824
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          documentary_fee_has_been_paid
          and documentary_fee_payment_evidence_complies

  - name: county_clerk_recording_documentary_fee_misdemeanor
    kind: derived
    entity: CountyClerkRecorder
    dtype: Judgment
    period: Day
    source: C.R.S. 39-13-105
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-13-105
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          county_clerk_and_recorder_willfully_and_knowingly_records_document_subject_to_documentary_fee
          and (
            not county_clerk_and_recorder_collected_documentary_fee_before_recording
            or not county_clerk_and_recorder_evidenced_documentary_fee_payment_before_recording
          )

  - name: county_clerk_recording_documentary_fee_fine
    kind: derived
    entity: CountyClerkRecorder
    dtype: Money
    unit: USD
    period: Day
    source: C.R.S. 39-13-105
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-13-105
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-13-105
              excerpt: "upon conviction thereof, shall be punished by a fine of fifty dollars"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if county_clerk_and_recorder_is_convicted_of_documentary_fee_recording_misdemeanor
          and county_clerk_recording_documentary_fee_misdemeanor:
            documentary_fee_recording_misdemeanor_fine
          else: 0
