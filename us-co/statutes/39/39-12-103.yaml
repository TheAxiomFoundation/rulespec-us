format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-12-103
  summary: |-
    “The redemption may be made at any time before the execution of a treasurer's deed” upon payment of the tax-sale amount and redemption interest, together with endorsed subsequent taxes and redemption interest. “The annual rate of redemption interest shall be nine percentage points above the discount rate” and “shall be rounded to the nearest full percent.” Portions of months are counted as whole months.
rules:
  - name: redemption_interest_discount_rate_spread
    kind: parameter
    dtype: Rate
    source: Colo. Rev. Stat. § 39-12-103(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-12-103
              excerpt: "The\nannual rate of redemption interest shall be nine percentage points above the\ndiscount rate"
    versions:
      - effective_from: '1981-10-01'
        formula: |-
          0.09

  - name: full_percent_rate_increment
    kind: parameter
    dtype: Rate
    source: Colo. Rev. Stat. § 39-12-103(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: unit
            source:
              corpus_citation_path: us-co/statute/39/39-12-103
              excerpt: "shall be rounded to the nearest full percent"
    versions:
      - effective_from: '1981-10-01'
        formula: |-
          0.01

  - name: annual_redemption_interest_rate
    kind: derived
    entity: Asset
    dtype: Rate
    period: Year
    source: Colo. Rev. Stat. § 39-12-103(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-12-103
              excerpt: "The\nannual rate of redemption interest shall be nine percentage points above the\ndiscount rate, which discount rate shall be the rate of interest a commercial bank\npays to the federal reserve bank of Kansas City using a government bond or other\neligible paper as security, and shall be rounded to the nearest full percent."
    versions:
      - effective_from: '1981-10-01'
        formula: |-
          floor(
            (
              discount_rate_paid_by_commercial_bank_to_federal_reserve_bank_of_kansas_city_using_eligible_security
              + redemption_interest_discount_rate_spread
              + (full_percent_rate_increment / 2)
            )
            / full_percent_rate_increment
          )
          * full_percent_rate_increment

  - name: redemption_payment_under_subsection_3
    kind: derived
    entity: Asset
    dtype: Money
    unit: USD
    period: Year
    source: Colo. Rev. Stat. § 39-12-103(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-12-103
              excerpt: "upon payment of a ratable share\nof the sum required to redeem the whole even though a tax lien for the whole has\nbeen sold. In case a tax lien on any tract of land sold for delinquent taxes under the\nprovisions of article 11 of this title belongs to two or more separate and distinct\nparties in severalty, the treasurer, when satisfied of the fact and upon application of\nany one of the parties or his agent, assignee, or attorney and upon payment of the\nproper proportional amount, shall issue a certificate of redemption for such party's\ninterest in said land.\n(3) The redemption may be made at any time before the execution of a\ntreasurer's deed to the purchaser or his heirs or assigns upon payment to the\ntreasurer, to be held by him subject to the order of the purchaser, of the amount of\ntaxes, delinquent interest, and costs for which the tax lien on the property was sold,\nwith redemption interest thereon from the date of sale at the rate which is\ndetermined as provided in this subsection (3), together with the amount of all taxes\naccruing on such real property after the sale, paid by the purchaser and endorsed\non his certificate of purchase, with redemption interest"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          tax_sale_taxes_delinquent_interest_and_costs
          + redemption_interest_on_tax_sale_amount
          + subsequent_taxes_paid_by_purchaser_and_endorsed_on_certificate
          + redemption_interest_on_endorsed_subsequent_taxes
