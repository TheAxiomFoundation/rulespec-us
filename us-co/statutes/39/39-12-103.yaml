format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-12-103
  summary: |-
    “The redemption may be made at any time before the execution of a treasurer's deed” upon payment of the tax-sale amount and redemption interest, together with endorsed subsequent taxes and redemption interest. “The annual rate of redemption interest shall be nine percentage points above the discount rate” and “shall be rounded to the nearest full percent.” Portions of months are counted as whole months.
rules:
  - name: redemption_interest_discount_rate_spread
    kind: parameter
    dtype: Rate
    source: Colo. Rev. Stat. § 39-12-103(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-12-103
              excerpt: "The annual rate of redemption interest shall be nine percentage points above the discount rate."
    versions:
      - effective_from: '1981-10-01'
        formula: |-
          0.09

  - name: full_percent_rate_increment
    kind: parameter
    dtype: Rate
    source: Colo. Rev. Stat. § 39-12-103(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: unit
            source:
              corpus_citation_path: us-co/statute/39/39-12-103
              excerpt: "shall be rounded to the nearest full percent"
    versions:
      - effective_from: '1981-10-01'
        formula: |-
          0.01

  - name: annual_redemption_interest_rate
    kind: derived
    entity: Asset
    dtype: Rate
    period: Year
    source: Colo. Rev. Stat. § 39-12-103(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-12-103
              excerpt: "The annual rate of redemption interest shall be nine percentage points above the discount rate ... and shall be rounded to the nearest full percent."
    versions:
      - effective_from: '1981-10-01'
        formula: |-
          floor(
            (
              discount_rate_paid_by_commercial_bank_to_federal_reserve_bank_of_kansas_city_using_eligible_security
              + redemption_interest_discount_rate_spread
              + (full_percent_rate_increment / 2)
            )
            / full_percent_rate_increment
          )
          * full_percent_rate_increment

  - name: redemption_payment_under_subsection_3
    kind: derived
    entity: Asset
    dtype: Money
    unit: USD
    period: Year
    source: Colo. Rev. Stat. § 39-12-103(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-12-103
              excerpt: "upon payment ... of the amount of taxes, delinquent interest, and costs ... with redemption interest ... together with ... all taxes accruing ... paid by the purchaser and endorsed ... with redemption interest"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          tax_sale_taxes_delinquent_interest_and_costs
          + redemption_interest_on_tax_sale_amount
          + subsequent_taxes_paid_by_purchaser_and_endorsed_on_certificate
          + redemption_interest_on_endorsed_subsequent_taxes
