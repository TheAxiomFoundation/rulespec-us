format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-1-113
  summary: The assessor may settle by written mutual agreement a board-authorized
    petition of ten thousand dollars or less per property unit. Recommended lower-dollar
    abatements or refunds require pro rata action; excess recommendations require
    submission of two application copies. Required hearings require at least seven
    days' notice.
  deferred_outputs:
  - output: us-co:statutes/39/39-1-113#petition_action_deadline
    reason: The six-month action deadline applies to petitions filed pursuant to section
      39-10-114, whose executable petition scope is not available in copied context.
rules:
- name: assessor_settlement_limit_per_property_unit
  kind: parameter
  dtype: Money
  unit: USD
  source: C.R.S. 39-1-113(1.5)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-1-113
          excerpt: in an amount of ten thousand dollars or less per tract, parcel,
            or lot of land or per schedule of personal property
  versions:
  - effective_from: '0001-01-01'
    formula: '10000'
- name: administrator_review_application_copy_count
  kind: parameter
  dtype: Count
  source: C.R.S. 39-1-113(3)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-1-113
          excerpt: two copies of an application therefor
  versions:
  - effective_from: '0001-01-01'
    formula: '2'
- name: required_hearing_notice_days
  kind: parameter
  dtype: Count
  source: C.R.S. 39-1-113(5)(a)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-1-113
          excerpt: at least seven days' notice
  versions:
  - effective_from: '0001-01-01'
    formula: '7'
- name: assessor_may_settle_petition
  kind: derived
  entity: Petition
  dtype: Judgment
  period: Year
  source: C.R.S. 39-1-113(1.5)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/statute/39/39-1-113
          excerpt: Upon authorization by the board of county commissioners, the assessor
            may review petitions
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-co/statute/39/39-1-113
          excerpt: settle by written mutual agreement
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-1-113
  versions:
  - effective_from: '0001-01-01'
    formula: 'board_authorizes_assessor_review

      and written_mutual_settlement_agreement

      and settlement_amount_per_property_unit <= assessor_settlement_limit_per_property_unit'
- name: board_must_order_pro_rata_lower_amount_action
  kind: derived
  entity: Petition
  dtype: Judgment
  period: Year
  source: C.R.S. 39-1-113(2)(a)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/statute/39/39-1-113
          excerpt: Whenever any abatement or refund in an amount of ten thousand dollars
            or less is recommended by the board
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-1-113
  versions:
  - effective_from: '0001-01-01'
    formula: 'board_recommends_abatement_or_refund

      and recommended_abatement_or_refund_amount <= assessor_settlement_limit_per_property_unit'
- name: administrator_review_application_copies_required
  kind: derived
  entity: Petition
  dtype: Count
  period: Year
  source: C.R.S. 39-1-113(3)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/statute/39/39-1-113
          excerpt: Whenever any abatement or refund in an amount in excess of ten
            thousand dollars is recommended by the board
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-1-113
  versions:
  - effective_from: '0001-01-01'
    formula: 'if board_recommends_abatement_or_refund and recommended_abatement_or_refund_amount
      > assessor_settlement_limit_per_property_unit: administrator_review_application_copy_count
      else: 0'
- name: board_satisfies_required_hearing_notice_duty
  kind: derived
  entity: Petition
  dtype: Judgment
  period: Year
  source: C.R.S. 39-1-113(5)(a)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/statute/39/39-1-113
          excerpt: If a hearing is required ... the board ... shall provide at least
            seven days' notice
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-1-113
  versions:
  - effective_from: '0001-01-01'
    formula: 'not hearing_is_required

      or hearing_notice_days_before_scheduled_hearing >= required_hearing_notice_days'
