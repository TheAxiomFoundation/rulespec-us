- name: direct necessary rail expenditure qualifies
  period:
    period_kind: custom
    name: calendar_year
    start: '2027-01-01'
    end: '2027-12-31'
  input:
    us-co:statutes/39/39-22-564#input.expenditure_is_direct_operating_or_capital_improvement_expenditure: true
    us-co:statutes/39/39-22-564#input.expenditure_is_necessary_to_maintain_or_improve_a_qualified_rail_line: true
  output:
    us-co:statutes/39/39-22-564#qualified_expenditure: holds
- name: designated rail line satisfies both transportation determinations
  period:
    period_kind: custom
    name: calendar_year
    start: '2027-01-01'
    end: '2027-12-31'
  input:
    us-co:statutes/39/39-22-564#input.rail_line_is_in_this_state: true
    ? us-co:statutes/39/39-22-564#input.transportation_department_determined_line_at_risk_of_inactivity_or_abandonment_due_to_lack_of_demand
    : true
    us-co:statutes/39/39-22-564#input.line_is_covered_by_passenger_access_agreement_through_required_date: true
  output:
    us-co:statutes/39/39-22-564#qualified_rail_line: holds
