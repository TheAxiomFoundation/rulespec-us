format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-6-107
  summary: |-
    All machinery, equipment, and personal property shall be listed on a personal property schedule and valued for assessment; improvements shall be listed separately and valued, except mining improvements within a mine excavation.
  deferred_outputs:
    - output: us-co:statutes/39/39-6-107#personal_property_schedule_submission_requirement
      reason: The required submission procedure is specified by section 39-5-107, which is not available in copied RuleSpec context.
rules:
  - name: personal_property_schedule_listing_required
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-6-107
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-6-107
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_machinery
          or asset_is_equipment
          or asset_is_personal_property

  - name: improvement_separate_listing_required
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-6-107
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-6-107
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_improvement
          and not improvement_is_within_mine_excavation
