format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-3-205
  summary: |-
    An individual claiming the senior or qualifying-veteran exemption must file a completed application by the stated deadline; a qualifying-veteran application includes proof of status. Knowingly false information, multiple applications, or failure to report a disqualifying ownership or occupancy change prevents the exemption.
  deferred_outputs:
    - output: us-co:statutes/39/39-3-205/c#treasurer_payment_lien_priority
      reason: The lien priority depends on section 39-1-107 (2), for which no executable RuleSpec target is available.
    - output: us-co:statutes/39/39-3-205/3/a/III#perjury_conviction_additional_payment
      reason: Interest must be calculated under section 39-21-110.5 (2) and (3), for which no executable RuleSpec target is available.
    - output: us-co:statutes/39/39-3-205/3/b/II#unreported_change_repayment_with_interest
      reason: Interest must be calculated under section 39-21-110.5 (2) and (3), for which no executable RuleSpec target is available.
rules:
  - name: ownership_or_occupancy_change_notification_deadline_days
    kind: parameter
    dtype: Integer
    source: 39-3-205(2)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-3-205
              excerpt: "within sixty days of any change in the ownership or occupancy"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          60

  - name: senior_exemption_application_filing_requirement_satisfied
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 39-3-205(1)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-3-205
              excerpt: "file with the assessor a completed exemption application no later than July 15"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          senior_exemption_application_is_completed
          and senior_exemption_application_is_filed_by_deadline

  - name: qualifying_veteran_exemption_application_filing_requirement_satisfied
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 39-3-205(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-3-205
              excerpt: "file with the assessor a completed exemption application and proof of qualifying veteran with a disability status no later than July 1"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          qualifying_veteran_exemption_application_is_completed
          and qualifying_veteran_exemption_application_is_filed_by_deadline
          and application_includes_proof_of_qualifying_veteran_with_disability_status

  - name: applicant_is_disqualified_for_false_information_or_multiple_applications
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 39-3-205(3)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-3-205
              excerpt: "knowingly provides false information on an exemption application or files more than one exemption application"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          applicant_knowingly_provided_false_information_on_exemption_application
          or applicant_filed_more_than_one_exemption_application_in_property_tax_year

  - name: applicant_is_disqualified_for_unreported_disqualifying_change
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 39-3-205(3)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-3-205
              excerpt: "fails to inform the assessor within sixty days of any change in the ownership or occupancy"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-3-205
              excerpt: "within sixty days"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          ownership_or_occupancy_change_prevents_exemption
          and days_between_disqualifying_change_and_assessor_notification > ownership_or_occupancy_change_notification_deadline_days
