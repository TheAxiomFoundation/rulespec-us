    source: 39-22-604.5(3)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-604.5
              excerpt: "not to exceed two thousand five hundred dollars"
    versions:
