  - name: percentage_failure_to_withhold_liability_rate
    kind: parameter
    dtype: Rate
    source: 39-22-604.5(3)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-604.5
