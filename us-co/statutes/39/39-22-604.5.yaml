  - name: minimum_failure_to_withhold_liability
    kind: parameter
    dtype: Money
    unit: USD
    source: 39-22-604.5(3)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-604.5
              excerpt: "Five hundred dollars"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
