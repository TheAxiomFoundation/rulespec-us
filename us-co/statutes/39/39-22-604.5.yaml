format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-604.5
  summary: |-
    Withholding is the lesser of two percent of the sales price or net proceeds, subject to stated exceptions including a sales price not exceeding one hundred thousand dollars. A title insurance company or authorized agent that fails to withhold is liable for the greater of five hundred dollars or ten percent of the required withholding, capped at two thousand five hundred dollars.
  deferred_outputs:
    - output: us-co:statutes/39/39-22-604.5/a#authorized_agent
      reason: The definition depends on the meaning of title insurance agent in section 10-11-102 (9), for which no copied RuleSpec dependency is available.
    - output: us-co:statutes/39/39-22-604.5/b#closing_and_settlement_services
      reason: The definition incorporates closing and settlement services defined in sections 10-11-102 (3.5) and 38-35-125, for which no copied RuleSpec dependencies are available.
    - output: us-co:statutes/39/39-22-604.5/c#colorado_real_property_interest
      reason: The definition incorporates the real-property-interest definition in Internal Revenue Code section 897 (c)(1)(A)(i), for which no copied RuleSpec dependency is available.
    - output: us-co:statutes/39/39-22-604.5/d#escrow_agent
      reason: This entity-role definition cannot be exposed as an executable scalar without a supported agent-to-principal relation; a pass-through factual output would not faithfully encode the relationship.
    - output: us-co:statutes/39/39-22-604.5/e#person
      reason: The definition requires legal classification of individuals, estates, and trusts that may be subject to taxation under part 1 of article 22; no copied RuleSpec dependency supplies that classification.
    - output: us-co:statutes/39/39-22-604.5/f#sales_price
      reason: The sales-price formula depends on interest and original-issue-discount determinations under Internal Revenue Code sections 1271 through 1275, for which no copied RuleSpec dependencies are available.
    - output: us-co:statutes/39/39-22-604.5/g#title_insurance_company
      reason: The definition incorporates the title insurance company definition in section 10-11-102 (10), for which no copied RuleSpec dependency is available.
    - output: us-co:statutes/39/39-22-604.5/1#amount_required_to_be_withheld
      reason: The final withholding amount depends on the deferred definitions of authorized agent, closing and settlement services, Colorado real property interest, person, sales price, and title insurance company.
    - output: us-co:statutes/39/39-22-604.5/3#failure_to_withhold_liability
      reason: Liability applies to a title insurance company or authorized agent required to withhold; those actor definitions and the required withholding amount remain deferred.
rules:
  - name: real_property_conveyance_withholding_rate
    kind: parameter
    dtype: Rate
    source: 39-22-604.5(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-604.5
              excerpt: "two percent of the sales price"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.02
  - name: sales_price_withholding_exception_threshold
    kind: parameter
    dtype: Money
    unit: USD
    source: 39-22-604.5(2)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-604.5
              excerpt: "does not exceed one hundred thousand dollars"
    versions:
