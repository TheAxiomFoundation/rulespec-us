format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-1-108
  summary: |-
    When property is not described in section 39-5-104.5 and the conveyance instrument lacks an express tax-payment agreement, the grantee pays taxes for conveyances after December 31 and before July 1; the grantor pays for conveyances after June 30 and before January 1.
rules:
  - name: grantee_pays_conveyed_property_taxes
    kind: derived
    entity: PropertyConveyance
    dtype: Judgment
    period: Day
    source: C.R.S. 39-1-108
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-1-108
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not property_is_described_in_section_39_5_104_5
          and instrument_has_no_express_agreement_as_to_tax_payment
          and conveyance_is_after_december_31_and_before_following_july_1
  - name: grantor_pays_conveyed_property_taxes
    kind: derived
    entity: PropertyConveyance
    dtype: Judgment
    period: Day
    source: C.R.S. 39-1-108
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-1-108
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not property_is_described_in_section_39_5_104_5
          and instrument_has_no_express_agreement_as_to_tax_payment
          and conveyance_is_after_june_30_and_before_following_january_1
