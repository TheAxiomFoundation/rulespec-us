format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-10-111
  summary: |-
    “No later than one hundred eighty days after the seizure” notice shall be published; sale shall be “not more than ten days” after first publication and not postponed more than thirty days. County-purchased property shall thereafter be sold within one hundred fifty days. The minimum auction price includes taxes, delinquent interest, seizure costs, and advertising costs. For qualifying public-utility taxes of one hundred mills or more, only taxed property located in the special district at assessment is subject to levy or distraint.
rules:
  - name: seizure_to_notice_publication_deadline_days
    kind: parameter
    dtype: Count
    source: C.R.S. 39-10-111(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-10-111
              excerpt: "No later than one hundred eighty days after the seizure"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          180

  - name: sale_after_notice_publication_deadline_days
    kind: parameter
    dtype: Count
    source: C.R.S. 39-10-111(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-10-111
              excerpt: "not more than ten days from the date\nthe notice is first published"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10

  - name: sale_postponement_deadline_days
    kind: parameter
    dtype: Count
    source: C.R.S. 39-10-111(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-10-111
              excerpt: "shall the sale be postponed for more than thirty days"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: county_purchased_property_resale_deadline_days
    kind: parameter
    dtype: Count
    source: C.R.S. 39-10-111(5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-10-111
              excerpt: "thereafter be sold\nwithin one hundred fifty days"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          150

  - name: public_utility_special_district_millage_threshold
    kind: parameter
    dtype: Decimal
    source: C.R.S. 39-10-111(11)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-10-111
              excerpt: "equal or exceed one\nhundred mills in any one year"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          100

  - name: notice_publication_is_timely_after_seizure
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Day
    source: C.R.S. 39-10-111(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-10-111
              excerpt: "No later than one hundred eighty days after the seizure"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          days_after_seizure_when_notice_is_first_published <= seizure_to_notice_publication_deadline_days

  - name: sale_is_scheduled_timely_after_notice_publication
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Day
    source: C.R.S. 39-10-111(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-10-111
              excerpt: "not more than ten days from the date\nthe notice is first published"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          days_after_notice_first_published_when_sale_is_scheduled <= sale_after_notice_publication_deadline_days

  - name: sale_postponement_is_timely
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Day
    source: C.R.S. 39-10-111(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-10-111
              excerpt: "in no event shall the sale be postponed for more than thirty days"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          days_after_notice_first_published_when_sale_occurs <= sale_postponement_deadline_days

  - name: county_purchased_property_is_resold_timely
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Day
    source: C.R.S. 39-10-111(5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-10-111
              excerpt: "shall thereafter be sold\nwithin one hundred fifty days"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          days_after_county_purchase_when_property_is_resold <= county_purchased_property_resale_deadline_days

  - name: distraint_sale_minimum_price
    kind: derived
    entity: Asset
    dtype: Money
    unit: USD
    period: Day
    source: C.R.S. 39-10-111(5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-10-111
              excerpt: "minimum price,\nwhich shall include the taxes, delinquent interest, and costs of making the seizure\nand advertising the sale"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          delinquent_taxes
          + delinquent_interest
          + seizure_costs
          + sale_advertising_costs

  - name: sale_proceeds_surplus_payable_to_owner
    kind: derived
    entity: Asset
    dtype: Money
    unit: USD
    period: Day
    source: C.R.S. 39-10-111(8)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-10-111
              excerpt: "Any surplus of the sale proceeds remaining over and above the taxes,\ndelinquent interest, and costs of making the seizure and advertising the sale shall\nbe paid over to the owner"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          max(0, sale_proceeds - distraint_sale_minimum_price)

  - name: public_utility_property_is_subject_to_high_millage_special_district_levy_or_distraint
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. 39-10-111(11)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-10-111
              excerpt: "only the personal property that is the subject of the\ntaxes and located within the special district at the time of assessment of the taxes\nshall be subject to levy or distraint"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          public_utility_taxes_are_delinquent
          and taxes_are_imposed_pursuant_to_title_32_article_1
          and annual_tax_millage >= public_utility_special_district_millage_threshold
          and property_is_subject_of_taxes
          and property_was_located_within_special_district_at_assessment
