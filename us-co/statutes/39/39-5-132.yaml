format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-5-132
  summary: A severe-growth-impact finding requires residential units to increase by
    over two percent. A school district meets the growth criteria when enrollment
    has increased over each of the past three years by at least three percent for
    districts with at least one thousand pupils, or by at least twenty-five pupils
    for districts with fewer than one thousand pupils. New taxable buildings are valued
    on July 1; completed buildings are prorated, while otherwise one-half of the difference
    between the January 1 and July 1 valuations is added.
  deferred_outputs:
  - output: us-co:statutes/39/39-5-132#new_building_valuation_added_to_abstract
    reason: Generated rule ignored a source-stated substitution, modification, or
      limitation parameter. This output is deferred until the upstream cross-referenced
      mechanics can be imported or composed without stranding the modifier.
    source_values:
    - us-co:statutes/39/39-5-132#large_school_district_annual_growth_rate
    - us-co:statutes/39/39-5-132#minimum_residential_unit_growth_rate
rules:
- name: minimum_residential_unit_growth_rate
  kind: parameter
  dtype: Rate
  source: "Colo. Rev. Stat. \xA7 39-5-132(2)(a)(I)(A)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-5-132
          excerpt: "the number of residential units in the county will increase by\nover two percent during the county's current fiscal year"
  versions:
  - effective_from: '0001-01-01'
    formula: '0.02'
- name: residential_unit_growth_exceeds_severe_growth_minimum
  kind: derived
  entity: County
  dtype: Judgment
  period: Year
  source: "Colo. Rev. Stat. \xA7 39-5-132(2)(a)(I)(A)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/statute/39/39-5-132
          excerpt: "shall not make a finding of severe\ngrowth impact unless the number of residential units in the county will increase by\nover two percent"
  versions:
  - effective_from: '0001-01-01'
    formula: residential_unit_growth_rate > minimum_residential_unit_growth_rate
- name: large_school_district_enrollment_threshold
  kind: parameter
  dtype: Count
  source: "Colo. Rev. Stat. \xA7 39-5-132(2)(a)(I)(E)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-5-132
          excerpt: "districts with pupil enrollments\nof at least one thousand pupils"
  versions:
  - effective_from: '0001-01-01'
    formula: '1000'
- name: large_school_district_annual_growth_rate
  kind: parameter
  dtype: Rate
  source: "Colo. Rev. Stat. \xA7 39-5-132(2)(a)(I)(E)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-5-132
          excerpt: "has increased by three\npercent or more over each preceding year"
  versions:
  - effective_from: '0001-01-01'
    formula: '0.03'
- name: small_school_district_annual_pupil_growth
  kind: parameter
  dtype: Count
  source: "Colo. Rev. Stat. \xA7 39-5-132(2)(a)(I)(E)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-5-132
          excerpt: "by twenty-five or more pupils each year for those\ndistricts with pupil enrollments of less than one thousand pupils"
  versions:
  - effective_from: '0001-01-01'
    formula: '25'
- name: school_district_meets_growth_criteria
  kind: derived
  entity: SchoolDistrict
  dtype: Judgment
  period: Year
  source: "Colo. Rev. Stat. \xA7 39-5-132(2)(a)(I)(E)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-5-132
          excerpt: "has increased by three\npercent or more over each preceding year for those districts with pupil enrollments\nof at least one thousand pupils or by twenty-five or more pupils each year"
  versions:
  - effective_from: '0001-01-01'
    formula: "(\n  pupil_enrollment >= large_school_district_enrollment_threshold\n\
      \  and first_annual_enrollment_increase_rate >= large_school_district_annual_growth_rate\n\
      \  and second_annual_enrollment_increase_rate >= large_school_district_annual_growth_rate\n\
      \  and third_annual_enrollment_increase_rate >= large_school_district_annual_growth_rate\n\
      )\nor\n(\n  pupil_enrollment < large_school_district_enrollment_threshold\n\
      \  and first_annual_pupil_increase >= small_school_district_annual_pupil_growth\n\
      \  and second_annual_pupil_increase >= small_school_district_annual_pupil_growth\n\
      \  and third_annual_pupil_increase >= small_school_district_annual_pupil_growth\n\
      )"
- name: incomplete_building_valuation_fraction
  kind: parameter
  dtype: Rate
  source: "Colo. Rev. Stat. \xA7 39-5-132(2)(a)(I)(B)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-5-132
          excerpt: "the valuation added to the abstract shall be one-half of\nthe difference between the valuation for assessment on January 1 and the valuation\nfor assessment on July 1"
  versions:
  - effective_from: '0001-01-01'
    formula: '0.5'
