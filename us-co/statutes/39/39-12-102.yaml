format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-12-102
  summary: |-
    No action for recovery of mining or placer claims shall be maintained unless brought within two years from commencement of actual possession obtained under tax deed.
rules:
  - name: tax_deed_possession_recovery_action_limitation_years
    kind: parameter
    dtype: Count
    period: Year
    source: C.R.S. 39-12-102
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-12-102
              excerpt: "within a period of two years"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          2
  - name: mining_or_placer_claim_recovery_action_is_timely
    kind: derived
    entity: Action
    dtype: Judgment
    period: Day
    source: C.R.S. 39-12-102
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-12-102
              excerpt: "No action shall be maintained for the recovery of mining or placer claims"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-12-102
              excerpt: "unless such action is brought within a period of two years from the commencement of actual possession obtained under tax deed"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          action_seeks_recovery_of_mining_or_placer_claims
          and actual_possession_was_obtained_under_tax_deed
          and years_since_commencement_of_actual_possession
            <= tax_deed_possession_recovery_action_limitation_years
