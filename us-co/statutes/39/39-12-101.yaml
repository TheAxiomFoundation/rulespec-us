format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-12-101
  summary: |-
    No recovery action for land covered by an article 11 delinquent-tax deed lies after five years, subject to the legal-disability redemption-period exception. Recovery requires payment of specified sums with twelve percent annual interest. A recorded qualifying treasurer's deed is color of title, and good-faith mineral and oil search expenditures are improvements.
rules:
  - name: tax_deed_recovery_action_limit_years
    kind: parameter
    dtype: Integer
    source: C.R.S. 39-12-101
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-12-101
              excerpt: "within five years after the execution and delivery of the deed"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          5

  - name: recovery_reimbursement_interest_rate
    kind: parameter
    dtype: Rate
    period: Year
    source: C.R.S. 39-12-101
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-12-101
              excerpt: "interest thereon at the rate of twelve percent per annum"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.12

  - name: tax_deed_recovery_action_is_timely
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. 39-12-101
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-12-101
              excerpt: "No action for the recovery of land for which a tax deed was issued"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-12-101
              excerpt: "when any owner of such land, for which a tax deed has been issued, at the time of the execution and delivery of the deed by the treasurer is under legal disability"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-12-101
              excerpt: "within five years after the execution and delivery of the deed"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          action_seeks_recovery_of_land
          and tax_deed_was_issued_under_article_11_for_delinquent_taxes
          and (
            years_since_tax_deed_execution_and_delivery <= tax_deed_recovery_action_limit_years
            or (
              land_owner_was_under_legal_disability_when_deed_was_executed_and_delivered
              and action_is_brought_within_tax_sale_redemption_period
            )
          )

  - name: treasurers_deed_is_color_of_title
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. 39-12-101
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-12-101
              excerpt: "purporting to convey lands and improvements thereon for all purposes"
          - path: versions[0].formula
            kind: effective_period
            source:
              corpus_citation_path: us-co/statute/39/39-12-101
              excerpt: "from and after the time the same is recorded"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          treasurers_deed_purports_to_convey_land_and_improvements_for_all_purposes
          and treasurers_deed_is_recorded_in_county_clerk_and_recorder_office

  - name: good_faith_mineral_and_oil_search_expenditures_are_improvements
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. 39-12-101
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-12-101
              excerpt: "improvements includes sums and amounts of money expended thereon in good faith by the grantee and his successors and assigns in search of minerals and oil"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          money_was_expended_on_land_in_search_of_minerals_or_oil
          and expenditure_was_made_in_good_faith
