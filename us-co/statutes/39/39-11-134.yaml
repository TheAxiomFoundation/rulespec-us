format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-11-134
  summary: |-
    Invalidities or defects in tax deeds, titles, or certificates have no effect on other such instruments; redemption from sales has no effect on other sales, titles, or certificates; on redemption, the treasurer shall compute and collect a fair proportion of redemption costs, fees, and charges.
rules:
  - name: tax_instrument_unaffected_by_other_instrument_defect
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-11-134
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-11-134
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          another_tax_instrument_has_invalidity_or_defect

  - name: tax_instrument_unaffected_by_other_sale_redemption
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-11-134
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-11-134
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          another_tax_sale_has_been_redeemed

  - name: treasurer_must_compute_and_collect_fair_redemption_proportion
    kind: derived
    entity: CountyTreasurer
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-11-134
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-11-134
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          redemption_from_one_or_more_tax_sales_occurs
