format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-2-127
  summary: |-
    “The written request must be received by the board within ten working days after the date on which the summary decision was mailed.” Upon timely request, the board shall issue a full decision.
rules:
  - name: full_decision_request_deadline_working_days
    kind: parameter
    dtype: Count
    source: C.R.S. 39-2-127(6)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-2-127
              excerpt: "within ten working days after the date on which the summary decision was mailed"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10

  - name: full_decision_request_is_timely
    kind: derived
    entity: BoardAppeal
    dtype: Judgment
    period: Day
    source: C.R.S. 39-2-127(6)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-2-127
          - path: versions[0].formula
            kind: ordering
            source:
              corpus_citation_path: us-co/statute/39/39-2-127
              excerpt: "must be received by the board within ten working days"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          summary_decision_was_issued
          and party_requested_full_decision_in_writing
          and working_days_since_summary_decision_was_mailed <= full_decision_request_deadline_working_days

  - name: board_must_issue_full_decision_after_timely_request
    kind: derived
    entity: BoardAppeal
    dtype: Judgment
    period: Day
    source: C.R.S. 39-2-127(6)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-2-127
              excerpt: "Upon timely request for a full decision, the board shall issue a full decision"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          full_decision_request_is_timely
