format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-3-119
  summary: |-
    Inventories of merchandise and materials and supplies held for business consumption or primarily for sale are exempt from property tax.
rules:
  - name: inventory_property_tax_exemption_applies
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-3-119
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-3-119
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (asset_is_inventory_of_merchandise or asset_is_inventory_of_materials_or_supplies)
          and (inventory_is_held_for_business_consumption or inventory_is_held_primarily_for_sale)
