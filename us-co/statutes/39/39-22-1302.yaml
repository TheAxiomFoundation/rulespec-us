format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-1302
  summary: |-
    Administrative and indirect costs assessed shall be based on allocated FTE as a percentage of the department's total FTE and shall not exceed that percentage. The division of housing may spend up to five percent of voluntary contributions to the fund or fifteen thousand dollars, whichever is greater, for program administration.
rules:
  - name: administrative_and_indirect_cost_assessment_percentage
    kind: derived
    entity: Department
    dtype: Rate
    period: Year
    source: 39-22-1302(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-1302
              excerpt: "based on the number of FTE allocated by each department ... expressed as a percentage of the total FTE of that department"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          fte_allocated_for_administration_of_part_13 / total_department_fte
  - name: voluntary_contribution_administrative_spending_percentage_cap
    kind: parameter
    dtype: Rate
    source: 39-22-1302(5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-1302
              excerpt: "up to five percent of all voluntary contributions"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.05
  - name: administrative_spending_dollar_cap
    kind: parameter
    dtype: Money
    unit: USD
    source: 39-22-1302(5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-1302
              excerpt: "fifteen thousand dollars"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          15000
  - name: maximum_program_administration_spending
    kind: derived
    entity: DivisionOfHousing
    dtype: Money
    unit: USD
    period: Year
    source: 39-22-1302(5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-1302
              excerpt: "up to five percent of all voluntary contributions ... or fifteen thousand dollars, whichever is greater"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          max(
            voluntary_contribution_administrative_spending_percentage_cap * total_voluntary_contributions_to_homeless_prevention_activities_program_fund,
            administrative_spending_dollar_cap
          )
