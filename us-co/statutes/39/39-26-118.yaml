format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-26-118
  summary: |-
    The executive director shall add a penalty equal to the greater of fifteen dollars or ten percent of the unpaid, unaccounted, or incorrectly accounted amount, plus one-half percent per month from the date when due, not exceeding eighteen percent in the aggregate.
  deferred_outputs:
    - output: us-co:statutes/39/39-26-118/1/b#retailer_trust_obligation_exception
      reason: The exception depends on whether the retailer qualifies to retain state sales tax under section 39-26-105 (1.3); copied context exports a retention amount but not the needed qualifying-retailer status.
    - output: us-co:statutes/39/39-26-118/2#estimated_tax_interest_and_deficiency_process
      reason: Interest applicability and deficiency procedures depend on unavailable sections 39-21-110.5, 39-21-105.5, 39-21-103, and 39-21-105.
    - output: us-co:statutes/39/39-26-118/3#tax_lien_and_warrant_enforcement
      reason: The lien, filing, warrant, levy, and sale provisions establish administrative enforcement procedures not representable as a scalar RuleSpec calculation.
      source_values:
        - us-co:statutes/39/39-26-118#payment_grace_period_days
    - output: us-co:statutes/39/39-26-118/4#levy_sale_and_garnishment_procedures
      reason: The levy, sale, garnishment, and sheriff-fee provisions establish enforcement procedures not representable as a scalar RuleSpec calculation.
    - output: us-co:statutes/39/39-26-118/5#tax_lien_release_procedure
      reason: The lien-release provision establishes an administrative procedure, not a computable individual output.
    - output: us-co:statutes/39/39-26-118/6#clerk_and_recorder_filing_duty
      reason: The clerk-and-recorder filing duty is an administrative procedure, not a computable individual output.
    - output: us-co:statutes/39/39-26-118/a#state_debt_collection_action
      reason: The debt-collection action and evidentiary provisions establish judicial enforcement procedures not representable as a scalar RuleSpec calculation.
    - output: us-co:statutes/39/39-26-118/b#attachment_and_enforcement_remedies
      reason: Attachment, bond, appeal, and attorney-general enforcement provisions establish judicial procedures not representable as a scalar RuleSpec calculation.
    - output: us-co:statutes/39/39-26-118/8#state_lien_adjudication_procedure
      reason: The state-party and summons-service provisions establish litigation procedures not representable as a scalar RuleSpec calculation.
    - output: us-co:statutes/39/39-26-118/9#penalty_or_interest_waiver
      reason: Good-cause waiver authority requires discretionary administrative findings not specified by this source.
rules:
  - name: minimum_delinquency_penalty
    kind: parameter
    dtype: Money
    unit: USD
    source: 39-26-118(2)(a)(I)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-26-118
              excerpt: "The sum of fifteen dollars"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          15
  - name: base_delinquency_penalty_rate
    kind: parameter
    dtype: Rate
    source: 39-26-118(2)(a)(I)(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-26-118
              excerpt: "Ten percent"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.10
  - name: monthly_delinquency_penalty_rate
    kind: parameter
    dtype: Rate
    source: 39-26-118(2)(a)(I)(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-26-118
              excerpt: "one-half percent per month"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.005
  - name: aggregate_monthly_delinquency_penalty_rate_cap
    kind: parameter
    dtype: Rate
    source: 39-26-118(2)(a)(I)(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-26-118
              excerpt: "not exceeding eighteen percent in the aggregate"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.18
  - name: payment_grace_period_days
    kind: parameter
    dtype: Count
    source: 39-26-118(3)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-26-118
              excerpt: "not paid within five days after the same are due"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          5
  - name: delinquency_penalty
    kind: derived
    entity: TaxUnit
    dtype: Money
    unit: USD
    period: Year
    source: 39-26-118(2)(a)(I)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-26-118
              excerpt: "a penalty equal to the greater of"
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:statutes/39/39-26-118#minimum_delinquency_penalty
              output: minimum_delinquency_penalty
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:statutes/39/39-26-118#base_delinquency_penalty_rate
              output: base_delinquency_penalty_rate
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:statutes/39/39-26-118#monthly_delinquency_penalty_rate
              output: monthly_delinquency_penalty_rate
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:statutes/39/39-26-118#aggregate_monthly_delinquency_penalty_rate_cap
              output: aggregate_monthly_delinquency_penalty_rate_cap
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          max(
            minimum_delinquency_penalty,
            unpaid_unaccounted_or_incorrectly_accounted_tax_amount
            * (
              base_delinquency_penalty_rate
              + min(
                aggregate_monthly_delinquency_penalty_rate_cap,
                months_since_tax_due * monthly_delinquency_penalty_rate
              )
            )
          )
