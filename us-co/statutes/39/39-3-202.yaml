format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-3-202
  summary: |-
    “Owner-occupier means an individual who” meets one of the stated ownership and primary-residence paths; it also includes an individual confined to a hospital, nursing home, or assisted living facility under the stated occupancy conditions. “Owner of record” means an individual named as an owner on a valid recorded deed. “Surviving spouse” means an individual married at the other individual's death who has not remarried.
  deferred_outputs:
    - output: us-co:statutes/39/39-3-202/1#division
      reason: The definition identifies an institutional division rather than a supported executable entity-scoped legal status.
    - output: us-co:statutes/39/39-3-202/1.5#exemption
      reason: The definition depends on the property-tax exemptions allowed by section 39-3-203, which is not available as RuleSpec context.
rules:
  - name: owner_of_record
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 39-3-202(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-3-202
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          name_appears_as_owner_on_valid_recorded_deed_to_residential_real_property

  - name: surviving_spouse
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 39-3-202(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-3-202
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          legally_married_to_other_individual_at_other_individuals_death
          and not remarried

  - name: qualifying_veteran_with_disability
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 39-3-202(3.5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-3-202
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          served_on_active_duty_in_united_states_armed_forces_or_ordered_colorado_national_guard_service
          and separated_under_honorable_conditions
          and (has_department_of_veterans_affairs_rated_one_hundred_percent_permanent_service_connected_disability
            or has_department_of_veterans_affairs_individual_unemployability_status)

  - name: proof_of_qualifying_veteran_with_disability_status
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 39-3-202(3.3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-3-202
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          has_united_states_department_of_veterans_affairs_documentary_evidence_meeting_division_guidelines

  - name: owner_occupier_ownership_criteria
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 39-3-202(2)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-3-202
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (owner_of_record and occupies_residential_real_property_as_primary_residence)
          or (is_spouse_of_owner_of_record_who_occupies_property_as_primary_residence
            and occupies_residential_real_property_as_primary_residence)
          or (surviving_spouse
            and deceased_spouse_was_owner_of_record
            and deceased_spouse_occupied_property_with_surviving_spouse_as_primary_residence_until_death
            and occupies_residential_real_property_as_primary_residence)
          or (property_transferred_to_estate_planning_entity_only
            and is_maker_of_trust_or_principal_of_estate_planning_entity
            and occupies_residential_real_property_as_primary_residence)
          or (occupies_residential_real_property_as_primary_residence
            and spouse_is_maker_of_trust_or_principal_of_estate_planning_entity
            and spouse_not_owner_of_record_only_due_to_estate_planning_entity)
          or (surviving_spouse
            and occupies_residential_real_property_as_primary_residence
            and deceased_spouse_occupied_property_with_surviving_spouse_until_death
            and deceased_spouse_was_not_owner_of_record_only_due_to_estate_planning_entity
            and deceased_spouse_was_maker_of_trust_or_principal_of_estate_planning_entity)

  - name: owner_occupier
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 39-3-202(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-3-202
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          owner_occupier_ownership_criteria
          or (confined_to_hospital_nursing_home_or_assisted_living_facility
            and would_occupy_residential_real_property_as_primary_residence_but_for_confinement
            and owner_occupier_ownership_criteria
            and (residential_real_property_temporarily_unoccupied
              or residential_real_property_occupied_by_spouse_or_financial_dependent))
