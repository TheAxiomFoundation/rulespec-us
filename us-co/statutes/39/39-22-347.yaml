format: rulespec/v1
imports:
  - us-co:statutes/39/39-22-344#credit_claim_by_owner_required
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-347
  summary: |-
    For income tax years commencing on or after January 1, 2018, an electing pass-through entity owner is allowed a credit equal to the owner's share of tax imposed on the entity, subject to payment and identifying-information limitations; excess credit is refunded.
  deferred_outputs:
    - output: us-co:statutes/39/39-22-347#electing_pass_through_entity_owner_credit
      reason: The credit amount equals the owner's share of tax imposed under section 39-22-344, but copied context exports only a Judgment requirement and no executable tax amount or owner share.
rules:
  - name: electing_pass_through_entity_owner_credit_allowed
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: C.R.S. 39-22-347(2)-(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-22-347
              excerpt: "an electing pass-through entity owner is allowed a credit"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-22-347
              excerpt: "No credit is allowed ... unless the electing pass-through entity paid the tax"
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:statutes/39/39-22-344#credit_claim_by_owner_required
              output: credit_claim_by_owner_required
              hash: sha256:77fd756abf8ca44f6608b40ea51a026ed6d3f628f459649fc62d5f71a1a8508f
    versions:
      - effective_from: '2021-01-01'
        formula: |-
          electing_pass_through_entity_owner
          and electing_pass_through_entity_paid_article_22_tax
          and electing_pass_through_entity_provided_owner_identifying_information
          and credit_claim_by_owner_required
