format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-5-125
  summary: |-
    “whenever it is discovered that any taxable property has been omitted from the assessment roll,” the assessor shall determine its value and list it. Omitted personal property discovered through the specified furnished-residential-rental information does not require prior-year tax notification and creates no prior-year liability. Assessment-roll errors may be corrected before or after tax-warrant delivery by the stated official. A petition may be filed after levy and an amended bill, but before the stated deadline.
rules:
  - name: assessor_omitted_property_listing_requirement_is_satisfied
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-5-125(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-5-125
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not (property_is_taxable and property_was_omitted_from_assessment_roll and omitted_property_was_discovered)
          or (assessor_immediately_determined_omitted_property_value and omitted_property_was_listed_on_discovery_year_assessment_roll)

  - name: furnished_residential_rental_information_discovery_exception_applies
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-5-125(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-5-125
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          property_is_taxable_personal_property
          and property_was_omitted_from_assessment_roll
          and omitted_property_was_discovered_due_to_furnished_residential_rental_information

  - name: prior_year_tax_notification_is_prohibited
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-5-125(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-5-125
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          furnished_residential_rental_information_discovery_exception_applies

  - name: assessor_prior_year_tax_notification_requirement_is_satisfied
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-5-125(1), (3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-5-125
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:statutes/39/39-5-125#furnished_residential_rental_information_discovery_exception_applies
              output: furnished_residential_rental_information_discovery_exception_applies
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not (property_is_taxable and property_was_omitted_from_assessment_roll and omitted_property_was_discovered)
          or furnished_residential_rental_information_discovery_exception_applies
          or assessor_notified_treasurer_of_prior_year_unpaid_taxes

  - name: assessment_roll_correction_is_permitted
    kind: derived
    entity: AssessmentRoll
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-5-125(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-5-125
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          assessment_roll_omission_or_error_intent_can_be_ascertained
          and ((correction_is_by_assessor and not tax_warrant_has_been_delivered_to_treasurer)
          or (correction_is_by_treasurer and tax_warrant_has_been_delivered_to_treasurer))

  - name: property_owner_or_agent_has_no_prior_year_tax_liability
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-5-125(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-5-125
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_property_is_taxable_personal_property
          and person_property_was_omitted_from_assessment_roll
          and person_property_was_discovered_due_to_furnished_residential_rental_information

  - name: petition_for_abatement_or_refund_may_be_filed
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-5-125(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-5-125
          - path: versions[0].formula
            kind: effective_period
            source:
              corpus_citation_path: us-co/statute/39/39-5-125
              excerpt: "before two years after January 1"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          omitted_property_was_added_for_prior_assessment_year
          and taxes_were_levied
          and amended_tax_bill_was_generated
          and petition_is_before_two_year_deadline_after_following_january_first
