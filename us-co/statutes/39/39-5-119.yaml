format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-5-119
  summary: |-
    Upon an assessor's or deputy's affidavit showing refusal, and in the district court's discretion, a person refusing an interview or pertinent taxable-property questions shall be cited and required to submit and answer.
rules:
  - name: person_required_to_submit_to_assessor_interview_and_answer_questions
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-5-119
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-5-119
              excerpt: "refuses to be interviewed ... or refuses to answer any pertinent questions"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-5-119
              excerpt: "upon affidavit of the assessor or his deputy showing such refusal"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-5-119
              excerpt: "in the discretion of the district court"
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-5-119
              excerpt: "shall be required ... to submit to such interview and to answer such questions"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          district_court_exercises_discretion_to_cite_person
          and assessor_or_deputy_affidavit_shows_refusal
          and (
            person_refuses_assessor_interview
            or person_refuses_pertinent_questions_about_taxable_property_owned_possessed_or_controlled
          )
