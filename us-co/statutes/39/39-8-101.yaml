format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-8-101
  summary: |-
    County commissioners comprise each county board of equalization except in Denver and Broomfield; Denver uses charter-provided officers, Broomfield uses its city council or a council-appointed board or commission. A majority is a quorum, and official action requires a quorum.
rules:
  - name: board_of_equalization_is_properly_constituted
    kind: derived
    entity: BoardOfEqualization
    dtype: Judgment
    period: Year
    source: CO Rev. Stat. § 39-8-101
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-8-101
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (county_is_neither_denver_nor_broomfield and board_comprises_county_commissioners)
          or (county_is_denver and board_comprises_charter_provided_officers)
          or (county_is_broomfield and (board_is_city_council or board_is_appointed_by_city_council))
  - name: official_action_may_be_taken
    kind: derived
    entity: BoardOfEqualization
    dtype: Judgment
    period: Year
    source: CO Rev. Stat. § 39-8-101
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-8-101
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          quorum_is_present
