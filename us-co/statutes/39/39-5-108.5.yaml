format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-5-108.5
  summary: |-
    “Upon the request of the assessor ... made no more than twice during any year,” a property owner or agent advertising furnished residential real property for rent shall provide the specified identifying list. An assessor and owner or agent may mutually agree to annual provision by a specified date.
  deferred_outputs:
    - output: us-co:statutes/39/39-5-108.5/1#legislative_findings
      reason: Subsection (1) consists of legislative findings and declarations rather than a computable legal output.
rules:
  - name: advertiser_is_agent
    kind: derived
    entity: PropertyAdvertiser
    dtype: Judgment
    period: Year
    source: 39-5-108.5(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-5-108.5
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          advertiser_is_real_estate_broker
          or advertiser_is_property_management_company
          or advertiser_is_lodging_company
          or advertiser_is_internet_website_listing_service
          or advertiser_is_print_based_listing_service
          or advertiser_otherwise_advertises_furnished_residential_property_for_rent_for_compensation

  - name: owner_address_list_disclosure_complied
    kind: derived
    entity: PropertyAdvertiser
    dtype: Judgment
    period: Year
    source: 39-5-108.5(2)(a)(I)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-5-108.5
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          not (
            advertiser_is_property_owner
            and advertiser_advertises_furnished_residential_property_for_rent
            and advertised_property_is_located_in_assessor_county
            and assessor_requested_information_no_more_than_twice_this_year
          )
          or owner_provided_advertised_property_address_list

  - name: agent_owner_and_address_list_disclosure_complied
    kind: derived
    entity: PropertyAdvertiser
    dtype: Judgment
    period: Year
    source: 39-5-108.5(2)(a)(II)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-5-108.5
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          not (
            advertiser_is_agent
            and advertiser_advertises_furnished_residential_property_for_rent
            and advertised_property_is_located_in_assessor_county
            and assessor_requested_information_no_more_than_twice_this_year
          )
          or agent_provided_advertised_property_owner_and_address_list

  - name: annual_disclosure_agreement_complied
    kind: derived
    entity: PropertyAdvertiser
    dtype: Judgment
    period: Year
    source: 39-5-108.5(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-5-108.5
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          not assessor_and_advertiser_mutually_agreed_to_annual_information_provision
          or advertiser_provided_agreed_information_by_specified_date
