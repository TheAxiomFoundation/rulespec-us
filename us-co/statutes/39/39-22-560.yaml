    corpus_citation_path: us-co/statute/39/39-22-560
  summary: The credit is intended to induce modification of aircraft from leaded to
    unleaded aviation gasoline. For income tax years commencing on or after January
    1, 2025, but before January 1, 2030, the credit equals fifty percent of qualifying
    expenses, capped at five hundred dollars per aircraft; unused credit is refunded
    and not carried forward.
