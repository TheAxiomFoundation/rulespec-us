format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-21-104
  summary: |-
    Within thirty days from mailing a rejection notice, a taxpayer may request a hearing or file a brief, subject to the stated exception. A taxpayer is not entitled to a hearing when a hearing request related to the tax in part 1 of article 22 is determined frivolous and rejected.
  deferred_outputs:
    - output: us-co:statutes/39/39-21-104#taxpayer_may_request_hearing_or_file_brief_after_refund_claim_rejection
      reason: The hearing-or-brief option is subject to an exception for deficiency-tax refund claims assessed after procedures under section 39-21-103, whose operative RuleSpec definition is unavailable.
      source_values:
        - us-co:statutes/39/39-21-104#refund_response_deadline_days
rules:
  - name: refund_response_deadline_days
    kind: parameter
    dtype: Count
    source: C.R.S. 39-21-104(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-21-104
              excerpt: "within thirty days from the mailing thereof"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30
  - name: taxpayer_not_entitled_to_hearing_after_frivolous_rejection
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: C.R.S. 39-21-104(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-21-104
              excerpt: "If the executive director determines that a request for a hearing related to the tax set forth in part 1 of article 22 of this title is a frivolous submission and rejects the request"
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-21-104
              excerpt: "the taxpayer shall not be entitled to a hearing before the executive director"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          request_for_hearing_relates_to_tax_in_part_1_of_article_22
          and executive_director_determines_request_is_frivolous_submission
          and executive_director_rejects_request_as_frivolous
