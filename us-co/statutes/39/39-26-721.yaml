format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-26-721
  summary: |-
    "Forty-eight percent of the purchase price of a manufactured home ... is exempt"; prior to January 1, 2025, manufactured homes and tiny homes are exempt, and on and after that date modular homes and closed panel systems are also exempt.
  deferred_outputs:
    - output: us-co:statutes/39/39-26-721#manufactured_home_purchase_price_exempt_from_sales_tax
      reason: The subsequent-sale exception depends on whether the home was once subject to sales tax under section 39-26-113; copied context does not export that referenced legal condition.
      source_values:
        - us-co:statutes/39/39-26-721#manufactured_home_purchase_price_exemption_rate
    - output: us-co:statutes/39/39-26-721#manufactured_home_use_tax_exemption_applies
      reason: The use-tax exemption depends on whether the home was once subject to use tax under section 39-26-208, for which no executable RuleSpec context is available.
rules:
  - name: manufactured_home_purchase_price_exemption_rate
    kind: parameter
    dtype: Rate
    source: C.R.S. 39-26-721(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-26-721
              excerpt: "Forty-eight percent of the purchase price"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.48
  - name: manufactured_tiny_modular_or_closed_panel_system_tax_exemption_applies
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. 39-26-721(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: effective_period
            source:
              corpus_citation_path: us-co/statute/39/39-26-721
              excerpt: "Prior to January 1, 2025"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-26-721
              excerpt: "manufactured home ... or a tiny home ... is exempt"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-26-721
              excerpt: "a modular home ... or any closed panel system ... is exempt"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (asset_is_manufactured_home or asset_is_tiny_home)
          or
          (
            not taxable_event_occurs_before_expanded_exemption_effective_date
            and (asset_is_modular_home or asset_is_closed_panel_system)
          )
