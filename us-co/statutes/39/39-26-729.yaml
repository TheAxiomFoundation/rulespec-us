format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-26-729
  summary: |-
    A special district or limited purpose governmental entity that levied sales tax on retail sales of marijuana before July 1, 2017 retains authority to continue levying that tax. If additional voter approval is required, it shall not resume levying until voter approval is obtained.
  deferred_outputs:
    - output: us-co:statutes/39/39-26-729#part_1_retail_marijuana_sales_tax_exemption_applies
      reason: The exemption depends on whether retail marijuana sales tax is imposed pursuant to section 39-28.8-202, whose executable RuleSpec source is unavailable.
    - output: us-co:statutes/39/39-26-729#general_uniform_sales_tax_on_taxed_retail_marijuana_sales_may_be_levied
      reason: The authorization depends on sections 32-1-1106(1) and 32-19-112(1), whose executable RuleSpec sources are unavailable.
    - output: us-co:statutes/39/39-26-729#part_2_retail_marijuana_storage_use_consumption_tax_exemption_applies
      reason: The exemption depends on the subsection (1) sales-tax exemption, including the unavailable section 39-28.8-202 dependency.
rules:
  - name: preexisting_retail_marijuana_sales_tax_levy_authority_continues
    kind: derived
    entity: LocalTaxingEntity
    dtype: Judgment
    period: Year
    source: C.R.S. 39-26-729(1)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-26-729
              excerpt: "was levying sales tax on retail sales of marijuana under part 1 of this article 26 before July 1, 2017, retains its authority to continue levying sales tax"
    versions:
      - effective_from: '2017-07-01'
        formula: |-
          local_taxing_entity_levied_sales_tax_on_retail_marijuana_sales_before_effective_date
  - name: preexisting_retail_marijuana_sales_tax_levy_may_resume
    kind: derived
    entity: LocalTaxingEntity
    dtype: Judgment
    period: Year
    source: C.R.S. 39-26-729(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-26-729
              excerpt: "shall not resume levying sales tax upon such sales until voter approval is obtained"
    versions:
      - effective_from: '2017-07-01'
        formula: |-
          local_taxing_entity_levied_sales_tax_on_retail_marijuana_sales_before_effective_date
          and (not governing_body_determines_additional_voter_approval_required or voter_approval_to_levy_sales_tax_on_retail_marijuana_sales_is_obtained)
