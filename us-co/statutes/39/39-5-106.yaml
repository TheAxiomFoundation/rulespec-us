format: rulespec/v1
module:
  summary: |-
    Equity in land purchased from the state under contract shall, during the contract term, be appraised and valued as though held in fee by the purchaser; improvements on such land shall be appraised and valued as other improvements.
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-5-106
rules:
  - name: state_contract_land_equity_uses_fee_holder_appraisal_and_valuation
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-5-106
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-5-106
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_equity_in_land_purchased_from_state_under_contract
          and state_land_purchase_contract_term_is_active
  - name: improvement_on_state_contract_land_uses_other_improvements_appraisal_and_valuation
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-5-106
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-5-106
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_improvement_on_land_purchased_from_state_under_contract
          and state_land_purchase_contract_term_is_active
