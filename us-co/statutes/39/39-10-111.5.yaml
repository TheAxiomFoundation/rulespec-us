format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-10-111.5
  summary: |-
    A mobile home on leased or other non-owner-owned land may be redeemed within
    one year; a mobile home on land owned by its owner may be redeemed within
    three years. County-purchased or county-held mobile homes valued below one
    thousand dollars have a sixty-day redemption period. Any sale-proceeds
    surplus over taxes, delinquent interest, and seizure and advertising costs
    is credited to the county general fund.
rules:
  - name: leased_land_redemption_period_years
    kind: parameter
    dtype: Count
    period: Year
    source: 39-10-111.5(6)(a)(I)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-10-111.5
              excerpt: "within one year after the date of the sale"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          1

  - name: owner_owned_land_redemption_period_years
    kind: parameter
    dtype: Count
    period: Year
    source: 39-10-111.5(6)(a)(II)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-10-111.5
              excerpt: "within three years after the date of the sale"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          3

  - name: standard_redemption_certificate_notice_lead_time_days
    kind: parameter
    dtype: Count
    period: Day
    source: 39-10-111.5(6)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-10-111.5
              excerpt: "thirty days prior to the close of the redemption period"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          30

  - name: low_value_mobile_home_actual_value_threshold
    kind: parameter
    dtype: Money
    unit: USD
    source: 39-10-111.5(7)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-10-111.5
              excerpt: "less than one thousand dollars"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          1000

  - name: low_value_county_tax_sale_redemption_period_days
    kind: parameter
    dtype: Count
    period: Day
    source: 39-10-111.5(7)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-10-111.5
              excerpt: "the redemption period for such mobile home shall be sixty days"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          60

  - name: low_value_county_tax_sale_condemnation_notice_lead_time_days
    kind: parameter
    dtype: Count
    period: Day
    source: 39-10-111.5(7)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-10-111.5
              excerpt: "ten days prior to the close of the redemption period"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          10

  - name: low_value_county_tax_sale_redemption_period
    kind: derived
    entity: Asset
    dtype: Count
    period: Day
    source: 39-10-111.5(7)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-10-111.5
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-10-111.5
              excerpt: "less than one thousand dollars"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          if mobile_home_was_purchased_by_or_stricken_off_to_county_at_tax_sale and mobile_home_actual_value < low_value_mobile_home_actual_value_threshold: low_value_county_tax_sale_redemption_period_days else: 0

  - name: mobile_home_sale_proceeds_surplus_credited_to_county_general_fund
    kind: derived
    entity: Asset
    dtype: Money
    unit: USD
    period: Year
    source: 39-10-111.5(d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-10-111.5
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          max(0, mobile_home_sale_proceeds - mobile_home_taxes - mobile_home_delinquent_interest - mobile_home_seizure_and_sale_advertising_costs)
