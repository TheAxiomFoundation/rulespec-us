format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-4-103
  summary: A public utility that fails to complete and legally postmark its property
    statement by April 1 incurs a late filing penalty of one hundred dollars for each
    calendar day delinquent, capped at three thousand dollars.
  deferred_outputs:
  - output: us-co:statutes/39/39-4-103/1/a#property_statement_filing_requirement
    reason: The administrative filing duty, extension discretion, required statement
      contents, and signature/form requirements are not representable as a computable
      scalar or judgment without an administrative-process ontology.
  - output: us-co:statutes/39/39-4-103/1.5/a#actual_value_determined_from_best_available_information
    reason: Determining actual value from the best information available requires
      valuation methodology and property information not supplied by this source.
  - output: us-co:statutes/39/39-4-103/1.5/a#late_filing_penalties_credited_to_general_fund
    reason: Crediting penalties to the general fund is an administrative accounting
      direction outside the available entity and ledger ontology.
  - output: us-co:statutes/39/39-4-103/1.5/b#actual_value_determined_from_best_available_information
    reason: The discretionary actual-value determination requires valuation methodology
      and property information not supplied by this source.
  - output: us-co:statutes/39/39-4-103/1.5/c#abatement_or_refund_right_waived
    reason: This waiver depends on petition or complaint procedures under section
      39-4-108 and abatement or refund procedures under section 39-10-114, neither
      of which is available in copied context.
  - output: us-co:statutes/39/39-4-103/2#property_statement_access_restriction
    reason: The confidentiality and authorized-access restriction requires a document-access-control
      ontology not available in RuleSpec.
  - output: us-co:statutes/39/39-4-103/c#deferred_c
    reason: Generated module encodes the supported rules from this source, but this
      source subparagraph depends on policy surfaces or entities that are not available
      in the current RuleSpec context. It is deferred instead of being modeled as
      a caller-supplied input or an unsupported local entity.
rules:
- name: daily_late_filing_penalty
  kind: parameter
  dtype: Money
  unit: USD
  source: 39-4-103(1.5)(a)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-4-103
          excerpt: one hundred dollars for each calendar day
  versions:
  - effective_from: '0001-01-01'
    formula: '100'
- name: late_filing_penalty_cap
  kind: parameter
  dtype: Money
  unit: USD
  source: 39-4-103(1.5)(a)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-4-103
          excerpt: shall not exceed three thousand dollars
  versions:
  - effective_from: '0001-01-01'
    formula: '3000'
- name: late_filing_penalty
  kind: derived
  entity: PublicUtility
  dtype: Money
  period: Year
  unit: USD
  source: 39-4-103(1.5)(a)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-4-103
          excerpt: a late filing penalty in the amount of one hundred dollars for
            each calendar day
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-4-103
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/statute/39/39-4-103
          excerpt: fails to complete a statement of property and legally postmark
            it for return by April 1
  versions:
  - effective_from: '0001-01-01'
    formula: "if public_utility_failed_to_complete_and_legally_postmark_statement_by_april_1:\n\
      \  min(daily_late_filing_penalty * calendar_days_statement_remains_delinquent,\
      \ late_filing_penalty_cap)\nelse: 0"
