format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-26-711.9
  summary: |-
    On and after August 9, 2017, a historic aircraft on qualifying loan to a qualifying museum is exempt from taxation when its in-state off-museum use is limited to the stated purposes and the museum is open to the public at least twenty hours each week. Historic aircraft means an original, restored, or replica heavier-than-air aircraft at least thirty-five years old.
rules:
  - name: historic_aircraft_minimum_age_years
    kind: parameter
    dtype: Count
    source: 39-26-711.9(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-26-711.9
              excerpt: "at least thirty-five years old"
    versions:
      - effective_from: '2017-08-09'
        formula: |-
          35
  - name: museum_minimum_weekly_public_hours
    kind: parameter
    dtype: Count
    source: 39-26-711.9(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-26-711.9
              excerpt: "at least twenty hours every week"
    versions:
      - effective_from: '2017-08-09'
        formula: |-
          20
  - name: historic_aircraft_loan_tax_exemption_applies
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: 39-26-711.9(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-26-711.9
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-26-711.9
          - path: versions[0].formula
            kind: effective_period
            source:
              corpus_citation_path: us-co/statute/39/39-26-711.9
    versions:
      - effective_from: '2017-08-09'
        formula: |-
          aircraft_is_original_restored_or_replica
          and aircraft_is_heavier_than_air
          and aircraft_age_years >= historic_aircraft_minimum_age_years
          and aircraft_is_on_loan_to_publicly_owned_or_501c3_nonprofit_museum_in_state
          and aircraft_loan_is_for_public_display_demonstration_educational_or_museum_promotional_purposes
          and aircraft_off_museum_in_state_use_is_only_for_loan_purposes
          and museum_is_open_to_public
          and museum_weekly_public_hours >= museum_minimum_weekly_public_hours
