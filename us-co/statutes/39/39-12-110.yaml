format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-12-110
  summary: |-
    Upon satisfactory evidence of a lost or wrongfully detained certificate, redemption of the described land, and execution of a sufficient-refund bond, the treasurer shall pay redemption money to the bond-executing person.
rules:
  - name: bond_refund_interest_rate
    kind: parameter
    dtype: Rate
    period: Year
    source: us-co/statute/39/39-12-110
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-12-110
              excerpt: "twenty-five percent per annum interest"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.25

  - name: bond_satisfies_refund_condition
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: us-co/statute/39/39-12-110
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-12-110
              excerpt: "executing a bond with sufficient surety that he will refund such redemption money"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-12-110
              excerpt: "with twenty-five percent per annum interest thereon, if any person thereafter shows his right thereto"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          bond_has_sufficient_surety
          and bond_requires_refund_of_redemption_money_if_later_right_shown
          and bond_interest_rate == bond_refund_interest_rate

  - name: owner_is_entitled_to_redemption_money_payment
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: us-co/statute/39/39-12-110
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-12-110
              excerpt: "If there is a loss or wrongful detention of such certificate and the land therein described has been redeemed"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-12-110
              excerpt: "the owner thereof may exhibit to the treasurer evidence of such loss or detention"
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-12-110
              excerpt: "upon his making the same to appear satisfactory to the treasurer"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-12-110
              excerpt: "the treasurer shall pay such redemption money to the person so executing such bond"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          certificate_is_lost_or_wrongfully_detained
          and land_described_in_certificate_has_been_redeemed
          and owner_exhibited_loss_or_detention_evidence_to_treasurer
          and evidence_is_satisfactory_to_treasurer
          and bond_satisfies_refund_condition
