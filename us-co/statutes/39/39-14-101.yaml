    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-14-101
  summary: |-
    “Conveyance means any transfer of a real property interest or manufactured home for some consideration in money or money's worth.”
  deferred_outputs:
    - output: us-co:statutes/39/39-14-101#authorized_agent
      reason: Definition incorporates section 38-29-102 (1), which is not available as RuleSpec context.
    - output: us-co:statutes/39/39-14-101#conveyance_document
      reason: Definition depends on the documentary-fee determination for the document; no compatible document-scoped upstream output is available.
    - output: us-co:statutes/39/39-14-101#declaration
      reason: Definition depends on prescribed-form and approval mechanics under section 39-9-103 and furnishing requirements under sections 39-14-102 and 39-14-103, which are unavailable.
    - output: us-co:statutes/39/39-14-101#manufactured_home
      reason: Definition incorporates section 39-1-102 (7.8), whose required definition is not exported by available context.
    - output: us-co:statutes/39/39-14-101#manufactured_home_title_application
      reason: Definition depends on sale-or-transfer categories under sections 38-29-112 and 38-29-114, which are unavailable.
    - output: us-co:statutes/39/39-14-101#verification_of_application_form
      reason: Definition incorporates section 38-29-102 (13), which is not available as RuleSpec context.
