format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-11-148
  summary: |-
    “No lien upon real property created by a tax certificate or a certificate of purchase ... shall remain a lien thereon for a period longer than fifteen years after the original issuance thereof,” subject to the governmental-holder and assigned-certificate provisions. No treasurer's deed shall issue after the lien has ceased where no application was pending. Upon expiration, the treasurer shall immediately issue a certificate of cancellation.
rules:
  - name: maximum_certificate_lien_duration_years
    kind: parameter
    dtype: Count
    source: C.R.S. § 39-11-148(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-11-148
              excerpt: "longer than fifteen years after the original issuance"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          15

  - name: certificate_lien_ceases_under_general_limitation
    kind: derived
    entity: TaxCertificate
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-11-148(1), (3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-11-148
              excerpt: "No lien upon real property created by a tax certificate or a certificate of purchase"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-11-148
              excerpt: "longer than fifteen years after the original issuance"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-11-148
              excerpt: "shall not apply to any tax certificate or certificate of purchase issued to and held by the county, city, city and county, or district"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-11-148
              excerpt: "the assignee thereof shall be entitled to a tax deed ... within one year from the date of such assignment"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-11-148
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          certificate_is_tax_certificate_or_certificate_of_purchase
          and years_since_original_issuance >= maximum_certificate_lien_duration_years
          and not certificate_is_held_by_taxing_government
          and not (
            certificate_was_assigned_by_taxing_government
            and assigned_certificate_is_fifteen_years_old_at_assignment_or_within_one_year
            and proceedings_for_tax_deed_started_within_one_year_of_assignment
          )

  - name: assignee_is_entitled_to_tax_deed
    kind: derived
    entity: TaxCertificate
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-11-148(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-11-148
              excerpt: "In the event of an assignment of a tax certificate or certificate of purchase held by a county, city, city and county, or district"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-11-148
              excerpt: "such certificate is fifteen years old at the time of assignment or will become fifteen years old within one year"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-11-148
              excerpt: "within one year from the date of such assignment"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          certificate_was_assigned_by_taxing_government
          and assigned_certificate_is_fifteen_years_old_at_assignment_or_within_one_year
          and proceedings_for_tax_deed_started_within_one_year_of_assignment

  - name: treasurers_deed_is_prohibited_after_lien_expiration
    kind: derived
    entity: TaxCertificate
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-11-148(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-11-148
              excerpt: "No treasurer's deed shall issue"
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-11-148
              excerpt: "application for such treasurer's deed is not pending at the time of the expiration"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-11-148
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          certificate_lien_ceases_under_general_limitation
          and treasurers_deed_application_was_not_pending_at_limitation_expiration

  - name: certificate_cancellation_must_be_issued_after_lien_expiration
    kind: derived
    entity: TaxCertificate
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-11-148(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-11-148
              excerpt: "Whenever a lien created by a tax certificate has expired"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-11-148
              excerpt: "the treasurer shall immediately issue a certificate of cancellation"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          certificate_lien_ceases_under_general_limitation
