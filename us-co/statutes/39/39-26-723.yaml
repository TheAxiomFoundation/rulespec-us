format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-26-723
  summary: |-
    “All sales, storage, and use of wood from salvaged trees killed or infested in Colorado by mountain pine beetles or spruce beetles ... are exempt from taxation” for the specified fiscal-year periods.
  deferred_outputs:
    - output: us-co:statutes/39/39-26-723#wholesaler_must_certify_salvaged_beetle_wood_product
      reason: The certification duty is subject to the department's determination pursuant to section 39-26-730(2), whose operative RuleSpec source is unavailable.
rules:
  - name: salvaged_beetle_wood_transaction_exempt_from_parts_1_and_2_taxation
    kind: derived
    entity: WoodTransaction
    dtype: Judgment
    period: Year
    source: C.R.S. 39-26-723(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-26-723
              excerpt: "all sales, storage, and use of wood from salvaged trees killed or infested in Colorado by mountain pine beetles or spruce beetles"
          - path: versions[0].formula
            kind: effective_period
            source:
              corpus_citation_path: us-co/statute/39/39-26-723
              excerpt: "commencing on or after July 1, 2008 ... prior to ... July 1, 2020 ... and ... on or after July 1, 2021 ... prior to ... July 1, 2026"
    versions:
      - effective_from: '2008-07-01'
        formula: |-
          transaction_is_sale_storage_or_use_of_wood_from_salvaged_colorado_tree_killed_or_infested_by_mountain_pine_beetles_or_spruce_beetles
          and fiscal_year_is_within_salvaged_beetle_wood_exemption_period
