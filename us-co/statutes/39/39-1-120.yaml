format: rulespec/v1
module:
  status: deferred
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-1-120
  summary: Mailed documents are deemed filed by postmark or proven mailing date; a
    duplicate is due within thirty days after notice of nonreceipt. Registered, certified,
    and certificate-of-mailing records are competent evidence. Weekend and holiday
    filing dates move to the next business day.
  deferred_outputs:
  - output: us-co:statutes/39/39-1-120/1/a#document_filed_date
    reason: The provision deems a document filed on a postal cancellation-mark date,
      but RuleSpec has no date-valued output type or postal-date extraction operation.
  - output: us-co:statutes/39/39-1-120/b#proven_mailing_filed_date
    reason: The provision requires determining the filing date from competent evidence
      of mailing and requires a duplicate filing within thirty days after written
      notice; RuleSpec cannot represent the required date-valued filing and notice-deadline
      calculations.
  - output: us-co:statutes/39/39-1-120/2#postal_record_postmark_date
    reason: The provision treats the date of postal registration, certification, or
      certificate as a postmark date, which requires a date-valued output unsupported
      by RuleSpec.
  - output: us-co:statutes/39/39-1-120/3#next_business_day_timely_filing_date
    reason: The provision requires calculating the next business day after a Saturday,
      Sunday, or legal holiday filing date; RuleSpec lacks date and business-calendar
      operations.
rules: []
