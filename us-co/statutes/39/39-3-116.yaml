format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-3-116
  summary: |-
    A nonowner's use of exempt property is subject to stated owner, use, and payment conditions. The payment limit is one dollar per year plus an equitable portion of reasonable operation and maintenance expenses, subject to the stated related-party exception. Those conditions do not apply to property used as an integral part of a child care center operated by someone other than the owner when the center qualifies under section 39-3-110.
  deferred_outputs:
    - output: us-co:statutes/39/39-3-116#property_tax_exemption_applies
      reason: The final exemption is subject to compliance with section 39-2-117, for which no copied RuleSpec source provides the required exemption-claim mechanics.
    - output: us-co:statutes/39/39-3-116#nonowner_property_use_requirements_apply
      reason: The complete nonowner-use requirements include owner qualification for an exemption pursuant to section 39-2-117, for which no copied RuleSpec source provides the required mechanics.
imports:
  - us-co:statutes/39/39-3-110#child_care_center_satisfies_exemption_requirements
rules:
  - name: nominal_annual_property_use_payment
    kind: parameter
    dtype: Money
    period: Year
    unit: USD
    source: C.R.S. 39-3-116(2)(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-3-116
              excerpt: "must not exceed one dollar per year"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1

  - name: nonowner_property_use_charge_satisfies_limit
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. 39-3-116(2)(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-3-116
              excerpt: "other than from any shareholder or member of the owner or from any person or organization controlled by an organization which also controls such shareholder or member"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-3-116
              excerpt: "must not exceed one dollar per year plus an equitable portion of the reasonable expenses incurred in the operation and maintenance of the property so used"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-3-116
              excerpt: "one dollar per year"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          amount_received_for_property_use_is_from_excluded_owner_relationship
          or amount_received_for_property_use <= nominal_annual_property_use_payment + equitable_portion_of_reasonable_operation_and_maintenance_expenses

  - name: nonowner_child_care_center_use_is_exempt_from_subsection_2_conditions
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. 39-3-116(2.5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-3-116
              excerpt: "property that is used as an integral part of a child care center operated by a person or organization other than the owner of the property"
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:statutes/39/39-3-110#child_care_center_satisfies_exemption_requirements
              output: child_care_center_satisfies_exemption_requirements
              hash: sha256:2797c30cab111b3f5dcaa3a8ae7203f96761badf7ddebe2b837d254b365ae597
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          property_is_used_as_an_integral_part_of_child_care_center
          and child_care_center_is_operated_by_person_or_organization_other_than_property_owner
          and child_care_center_satisfies_exemption_requirements
