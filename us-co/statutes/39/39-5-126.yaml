format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-5-126
  summary: |-
    An assessor who willfully and knowingly omits taxable property or unlawfully values taxable property, and swears to a corresponding abstract of assessment, is guilty of perjury in the second degree.
  deferred_outputs:
    - output: us-co:statutes/39/39-5-126#punishment_after_second_degree_perjury
      reason: The source directs punishment according to law but does not state a computable punishment.
rules:
  - name: assessor_guilty_of_second_degree_perjury
    kind: derived
    entity: Assessor
    dtype: Judgment
    period: Year
    source: us-co/statute/39/39-5-126
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-5-126
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (
            assessor_willfully_and_knowingly_omits_taxable_property_in_county
            and assessor_willfully_and_knowingly_subscribes_and_swears_to_abstract
            and abstract_reflects_such_omissions
          )
          or (
            assessor_willfully_and_knowingly_values_taxable_property_contrary_to_law
            and assessor_willfully_and_knowingly_subscribes_and_swears_to_abstract
            and abstract_contains_such_unlawful_valuations
