  source_verification:
    corpus_citation_path: us-co/statute/39/39-1-104.2
  summary: |-
    “Inflation means the annual percentage change” in the Denver-Aurora-Lakewood CPI; “Multi-family residential real property” is a defined residential subclass; qualified-senior primary residence property is classified under section 39-1-104.6; and “Target percentage” is the prior-year residential share of aggregate statewide valuation for assessment.
  deferred_outputs:
    - output: us-co:statutes/39/39-1-104.2/a#inflation
      reason: The definition depends on an externally published CPI series and successor-index determination not supplied as executable RuleSpec context.
    - output: us-co:statutes/39/39-1-104.2/b#multi_family_residential_real_property
      reason: The definition depends on administrator-published class codes and property classification facts not supplied as executable RuleSpec context.
    - output: us-co:statutes/39/39-1-104.2/c#qualified_senior_primary_residence_real_property
      reason: Classification is determined under section 39-1-104.6, for which no executable RuleSpec dependency is supplied.
    - output: us-co:statutes/39/39-1-104.2/d#target_percentage
      reason: The definition requires statewide aggregate valuation-for-assessment data and the statutory level-of-value determination, neither of which is supplied as executable RuleSpec context.
