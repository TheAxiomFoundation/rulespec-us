format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-5-133
  summary: |-
    “the provisions of subsection (1) of this section shall not apply to any district ... that has determined ... implementation ... will not cause a net property tax revenue gain to the district.”
  deferred_outputs:
    - output: us-co:statutes/39/39-5-133#district_may_submit_revenue_retention_ballot_issue
      reason: The authorization depends on the district definition and revenue limits in section 20 of article X, for which no RuleSpec source is available.
    - output: us-co:statutes/39/39-5-133#district_must_adjust_mill_levy_to_eliminate_net_gain
      reason: The levy-adjustment duty depends on subsection (1)'s applicability requirements, including the unavailable section 20 of article X definition and limits.
rules:
  - name: subsection_1_no_net_gain_exception_applies
    kind: derived
    entity: District
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-5-133(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-5-133
              excerpt: "shall not apply to any district, regardless of whether or not it\nsatisfies the requirements of paragraph (a) of subsection (1) of this section, that has\ndetermined, on the basis of the best available information, that implementation of\nthe modification of the definition of agricultural land required by House Bill 11-1146, enacted in 2011, will not cause a net property tax revenue gain"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          district_determines_agricultural_land_modification_will_not_cause_net_property_tax_revenue_gain
