format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-26-210
  summary: |-
    Taxes generally may not be assessed or collected more than three years after payable; a false or fraudulent return with intent to evade tax permits assessment or collection proceedings at any time; before expiration, the taxpayer and executive director may agree in writing to extend the period.
  deferred_outputs:
    - output: us-co:statutes/39/39-26-210#ordinary_tax_collection_actions_within_limitation_period
      reason: The ordinary limitation rule is expressly subject to exceptions in sections 29-2-208 (2)(a)(III) and 29-2-302 (5)(b), whose executable RuleSpec outputs are not available in copied context.
rules:
  - name: ordinary_limitation_period_years
    kind: parameter
    dtype: Count
    source: C.R.S. § 39-26-210
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-26-210
              excerpt: "more than three years after the date on which the tax was or is payable"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          3

  - name: post_notice_lien_continuation_period_years
    kind: parameter
    dtype: Count
    source: C.R.S. § 39-26-210
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-26-210
              excerpt: "such lien shall continue only for one year after the filing of notice thereof"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1

  - name: tax_assessment_or_collection_may_be_begun_at_any_time_due_to_false_or_fraudulent_return
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-26-210
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-26-210
              excerpt: "In the case of a false or fraudulent return with intent to evade tax"
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-26-210
              excerpt: "may be assessed, or proceedings for the collection of such taxes may be begun at any time"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          return_is_false_or_fraudulent_with_intent_to_evade_tax

  - name: initial_limitation_period_extension_may_be_agreed
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-26-210
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-26-210
              excerpt: "Before the expiration of such period of limitation"
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-26-210
              excerpt: "the taxpayer and the executive director of the department of revenue may agree in writing to an extension thereof"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          written_agreement_to_extend_limitation_period
          and agreement_made_before_general_limitation_period_expires
