format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-10-110.5
  summary: |-
    The treasurer may accept partial payments for delinquent personal property taxes when the owner has entered a written payment plan. The plan shall specify the total due, each payment amount, and due dates, and shall be paid in full no later than twenty-four months after entry. The treasurer shall retain a copy until payment in full, mark it paid in full then, and may terminate it for noncompliance.
rules:
  - name: payment_plan_maximum_duration_months
    kind: parameter
    dtype: Count
    source: C.R.S. 39-10-110.5(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-10-110.5
              excerpt: "no later than twenty-four months"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          24

  - name: partial_payment_may_be_accepted
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Day
    source: C.R.S. 39-10-110.5(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-10-110.5
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          payment_is_partial
          and payment_is_for_delinquent_personal_property_taxes
          and personal_property_owner_has_entered_written_payment_plan_with_treasurer

  - name: payment_plan_meets_content_and_duration_requirements
    kind: derived
    entity: PaymentPlan
    dtype: Judgment
    period: Day
    source: C.R.S. 39-10-110.5(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-10-110.5
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-10-110.5
              excerpt: "no later than twenty-four months"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          payment_plan_specifies_total_amount_due_including_tax_interest_penalties_and_fees
          and payment_plan_specifies_amount_of_each_payment
          and payment_plan_specifies_payment_due_dates
          and months_from_payment_plan_entry_to_full_payment <= payment_plan_maximum_duration_months

  - name: payment_plan_copy_retention_required
    kind: derived
    entity: PaymentPlan
    dtype: Judgment
    period: Day
    source: C.R.S. 39-10-110.5(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-10-110.5
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not personal_property_owner_has_paid_total_amount_identified_in_payment_plan

  - name: payment_plan_must_be_marked_paid_in_full
    kind: derived
    entity: PaymentPlan
    dtype: Judgment
    period: Day
    source: C.R.S. 39-10-110.5(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-10-110.5
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          personal_property_owner_has_paid_total_amount_identified_in_payment_plan

  - name: treasurer_may_terminate_payment_plan
    kind: derived
    entity: Treasurer
    dtype: Judgment
    period: Day
    source: C.R.S. 39-10-110.5(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-10-110.5
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          personal_property_owner_fails_to_abide_by_payment_plan_terms_and_conditions
