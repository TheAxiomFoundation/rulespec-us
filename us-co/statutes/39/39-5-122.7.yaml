format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-5-122.7
  summary: |-
    A county governing body may elect an alternate protest and appeal procedure at the assessor's request. Beginning January 1, 2024, a county with a population greater than three hundred thousand must use that procedure in a general reassessment year for real property valued biennially.
rules:
  - name: mandatory_alternative_procedure_population_threshold
    kind: parameter
    dtype: Count
    source: C.R.S. 39-5-122.7(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-5-122.7
              excerpt: "population greater than three hundred thousand"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          300000
  - name: elected_alternative_procedure_applies
    kind: derived
    entity: County
    dtype: Judgment
    period: Year
    source: C.R.S. 39-5-122.7(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-5-122.7
              excerpt: "at the request of the assessor, elect to use an alternate protest and appeal procedure"
          - path: versions[0].formula
            kind: effective_period
            source:
              corpus_citation_path: us-co/statute/39/39-5-122.7
              excerpt: "The election shall be made on or before May 1 of each year"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          assessor_requested_alternative_procedure
          and governing_body_elected_alternative_procedure_by_may_1
  - name: alternative_procedure_required_for_general_reassessment
    kind: derived
    entity: County
    dtype: Judgment
    period: Year
    source: C.R.S. 39-5-122.7(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: effective_period
            source:
              corpus_citation_path: us-co/statute/39/39-5-122.7
              excerpt: "beginning January 1, 2024"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-5-122.7
              excerpt: "shall in any year of general reassessment of real property that is valued biennially"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-5-122.7
              excerpt: "population greater than three hundred thousand"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          county_population_from_most_recent_state_demographer_estimate > mandatory_alternative_procedure_population_threshold
          and year_is_general_reassessment_of_biennially_valued_real_property
