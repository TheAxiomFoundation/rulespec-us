format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-37-106
  summary: |-
    The executive director shall refund or credit a vendor that establishes a tax overpayment, but not more than the tax paid. The vendor must claim the refund or credit within three years after the return's due date, using prescribed forms and required supporting material.
rules:
  - name: refund_claim_filing_deadline_years
    kind: parameter
    dtype: Count
    source: C.R.S. 39-37-106(3)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-37-106
              excerpt: "within three years after the due date of the return showing the overpayment"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          3

  - name: vendor_refund_or_credit_amount
    kind: derived
    entity: Vendor
    dtype: Money
    unit: USD
    period: Year
    source: C.R.S. 39-37-106(3)(a)-(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-37-106
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-37-106
              excerpt: "No such refund shall be made or credit allowed in an amount greater\nthan the tax paid."
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-37-106
              excerpt: "The\nclaim must be made on forms prescribed by the executive director and must include\nsuch pertinent data, information, or documentation as the executive director may\nrequire."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if years_after_return_due_date_when_claim_filed <= refund_claim_filing_deadline_years
          and claim_made_on_form_prescribed_by_executive_director
          and claim_includes_required_data_information_or_documentation:
            min(max(0, established_tax_overpayment), max(0, tax_paid))
          else: 0
