        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-3-106.5
              excerpt: "shall not apply to property ... pursuant to the provisions of section 39-3-111"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          property_has_section_39_3_111_exemption
          and property_is_used_for_other_than_exempt_purposes
