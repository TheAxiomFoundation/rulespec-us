  - name: religious_property_exemption_with_alternative_income_test_applies
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. 39-3-106.5(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-3-106.5
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:statutes/39/39-3-106#religious_use_property_tax_exemption_applies
              output: religious_use_property_tax_exemption_applies
              hash: sha256:c30565027fc1cbac3f4951df9c59c0c8246b75caf0dbf94249dd222567226ffe
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          religious_use_property_tax_exemption_applies
          and property_tax_year_precedes_conjunctive_income_test_effective_period
          and (
            other_purpose_adjusted_annual_hours < alternative_income_test_hour_limit
            or (
              unrelated_business_gross_income < alternative_income_test_unrelated_business_income_limit
              or gross_rental_income < alternative_income_test_rental_income_limit
            )
          )
