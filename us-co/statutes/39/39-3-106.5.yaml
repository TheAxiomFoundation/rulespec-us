format: rulespec/v1
imports:
  - us-co:statutes/39/39-3-106#religious_use_property_tax_exemption_applies
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-3-106.5
  summary: |-
    Property otherwise exempt under section 39-3-106 remains exempt for limited other use under the stated hours or income tests; beginning with property tax years on or after January 1, 1994, both income tests are required. Section 39-3-111 property is exempt from the occasional-use requirement in subsection (2).
  deferred_outputs:
    - output: us-co:statutes/39/39-3-106.5#occasional_noncontinuous_use_property_tax_exemption_applies
      reason: Subsection (2) is subject to the operative exception in section 39-3-108(3), whose required RuleSpec output is not available in copied context.
      source_values:
        - us-co:statutes/39/39-3-106.5#occasional_use_rental_income_limit
