  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-570
  summary: |-
    The tax incentive provides a yearly refundable credit against tuition and fee costs for eligible students in their first two years of higher education. The credit equals tuition and fees paid minus scholarships or grants and is refundable to the extent it exceeds income taxes due.
  deferred_outputs:
