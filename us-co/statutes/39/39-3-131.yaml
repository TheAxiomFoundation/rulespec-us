format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-3-131
  summary: |-
    Property previously taxable that becomes exempt remains subject to payment of current-year property taxes, prorated to the title-conveyance date using the preceding taxable year's property-tax levy.
rules:
  - name: property_tax_payment_acceptance_required
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-3-131
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-3-131
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          property_was_previously_taxable
          and property_becomes_exempt_from_property_tax

  - name: property_tax_amount_for_current_taxable_year
    kind: derived
    entity: Asset
    dtype: Money
    unit: USD
    period: Year
    source: Colo. Rev. Stat. § 39-3-131
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-3-131
              excerpt: "calculated on the basis of the property tax levy on such property in the preceding taxable year and prorated to the date"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if property_was_previously_taxable and property_becomes_exempt_from_property_tax:
            preceding_taxable_year_property_tax_levy_on_such_property * taxable_year_portion_before_title_conveyance
          else: 0
