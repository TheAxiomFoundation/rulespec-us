        formula: |-
          15
  - name: tax_lien_sale_not_void_due_to_late_list
    kind: derived
    entity: TaxLienSale
    dtype: Judgment
    period: Day
    source: C.R.S. § 39-11-101
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-11-101
              excerpt: "If such list is not made until after September 1, the sale held thereunder shall not be void by reason thereof."
    versions:
