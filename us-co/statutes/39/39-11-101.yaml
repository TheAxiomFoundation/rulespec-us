format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-11-101
  summary: |-
    The treasurer shall make a list of lands and town lots subject to tax-lien sale. If the list is made after September 1, a sale held under it is not void for that reason. Notice timing and content are subject to the section 39-2-117 exception.
  deferred_outputs:
    - output: us-co:statutes/39/39-11-101#delinquency_notice_timing_and_sale_warning_requirements
      reason: The notice requirement is expressly subject to the unavailable exception in section 39-2-117 (1)(a).
rules:
  - name: delinquency_notice_minimum_payment_period_days
    kind: parameter
    dtype: Count
    source: C.R.S. § 39-11-101
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-11-101
              excerpt: "shall not be less than fifteen days from the date of mailing"
    versions:
