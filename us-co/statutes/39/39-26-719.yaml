format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-26-719
  summary: |-
    “The sale of any motor vehicle, power source for any motor vehicle, or parts used for converting the power source” is exempt during the stated effective periods when the applicable heavy-vehicle emissions condition is met. Storage, use, or consumption has corresponding exemptions. A separately stated nonresident-owner vehicle use exemption applies when the vehicle was purchased and substantially used outside Colorado and registered, titled, and licensed outside Colorado.
  deferred_outputs:
    - output: us-co:statutes/39/39-26-719/1.5#tax_preference_purposes
      reason: Subsection (1.5) is a legislative tax-preference performance statement and does not establish an executable tax consequence.
rules:
  - name: heavy_vehicle_weight_rating_threshold
    kind: parameter
    dtype: Integer
    source: 39-26-719(1)(a)(II)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-26-719
              excerpt: "greater than twenty-six thousand pounds"
    versions:
      - effective_from: '2014-07-01'
        formula: |-
          26000

  - name: designated_truck_weight_rating_threshold
    kind: parameter
    dtype: Integer
    source: 39-26-719(1)(a)(II)(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-26-719
              excerpt: "greater than ten thousand pounds"
    versions:
      - effective_from: '2014-07-01'
        formula: |-
          10000

  - name: motor_vehicle_as_defined
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: 39-26-719(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-26-719
              excerpt: "Motor vehicle means any self-propelled vehicle required to be licensed or subject to licensing for operation upon the highways of this state"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          vehicle_is_self_propelled_and_required_or_subject_to_colorado_highway_licensing

  - name: low_emitting_heavy_item_sale_tax_exempt
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: 39-26-719(1)(a)(II)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: effective_period
            source:
              corpus_citation_path: us-co/statute/39/39-26-719
              excerpt: "Prior to January 1, 2025, and on and after August 1, 2025, but prior to January 1, 2029"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-26-719
              excerpt: "the gross vehicle weight rating of the motor vehicle is greater than twenty-six thousand pounds"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-26-719
              excerpt: "greater than ten thousand pounds and if the motor vehicle, power source, or parts ... meets the definition of a category 4, 4 A, 4 B, 4 C, 7, or 7 A truck"
    versions:
      - effective_from: '2014-07-01'
        formula: |-
          sale_occurs_during_statutory_exemption_period
          and (
            (item_is_motor_vehicle and motor_vehicle_as_defined)
            or item_is_power_source_for_motor_vehicle
            or item_is_parts_used_for_converting_motor_vehicle_power_source
          )
          and (
            (
              associated_motor_vehicle_gross_weight_rating > heavy_vehicle_weight_rating_threshold
              and power_source_or_conversion_parts_are_epa_certified_under_federal_heavy_duty_national_program
            )
            or (
              associated_motor_vehicle_gross_weight_rating > designated_truck_weight_rating_threshold
              and item_or_associated_motor_vehicle_is_designated_category_truck
            )
          )

  - name: nonresident_vehicle_use_tax_exempt
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: 39-26-719(2)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-26-719
              excerpt: "the owner is or was, at the time of purchase, a nonresident of Colorado"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-26-719
              excerpt: "purchased the vehicle outside of this state for use outside this state"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-26-719
              excerpt: "actually so used it for a substantial and primary purpose"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-26-719
              excerpt: "registered, titled, and licensed said motor vehicle outside of Colorado"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          motor_vehicle_as_defined
          and owner_was_nonresident_of_colorado_at_vehicle_purchase
          and vehicle_was_purchased_outside_colorado_for_use_outside_colorado
          and vehicle_was_actually_used_outside_colorado_for_substantial_and_primary_acquired_purpose
          and vehicle_was_registered_titled_and_licensed_outside_colorado

  - name: low_emitting_heavy_item_use_tax_exempt
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: 39-26-719(2)(b)(I)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: effective_period
            source:
              corpus_citation_path: us-co/statute/39/39-26-719
              excerpt: "Prior to January 1, 2025, and on and after August 1, 2025, but prior to January 1, 2029"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-26-719
              excerpt: "the gross vehicle weight rating of the motor vehicle is greater than twenty-six thousand pounds"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-26-719
              excerpt: "meets the definition of a category 4, 4 A, 4 B, 4 C, 7, or 7 A truck"
    versions:
      - effective_from: '2014-07-01'
        formula: |-
          sale_occurs_during_statutory_exemption_period
          and (
            (item_is_motor_vehicle and motor_vehicle_as_defined)
            or item_is_power_source_for_motor_vehicle
            or item_is_parts_used_for_converting_motor_vehicle_power_source
          )
          and (
            (
              associated_motor_vehicle_gross_weight_rating > heavy_vehicle_weight_rating_threshold
              and power_source_or_conversion_parts_are_epa_certified_under_federal_heavy_duty_national_program
            )
            or (
              associated_motor_vehicle_gross_weight_rating > designated_truck_weight_rating_threshold
              and item_or_associated_motor_vehicle_is_designated_category_truck
            )
          )
