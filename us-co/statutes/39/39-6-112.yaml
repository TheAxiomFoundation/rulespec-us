format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-6-112
  summary: |-
    A public-domain exploration tunnel is real property unless it becomes part of a producing mine; tunnels serving excavators' mines are appurtenant, while tunnels serving others' mines are real property. A non-appurtenant, non-parcel tunnel spanning jurisdictions is valued in proportion to center-line length.
rules:
  - name: exploration_tunnel_is_real_property
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-6-112(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-6-112
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          tunnel_excavated_solely_for_exploration_and_discovery_of_mines
          and tunnel_is_on_public_domain
          and not tunnel_has_become_part_of_producing_mine

  - name: exploration_tunnel_is_parcel_of_producing_mine
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-6-112(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-6-112
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          tunnel_excavated_solely_for_exploration_and_discovery_of_mines
          and tunnel_is_on_public_domain
          and tunnel_has_become_part_of_producing_mine

  - name: tunnel_is_appurtenance_to_excavators_mines
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-6-112(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-6-112
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          tunnel_excavated_for_drainage_exploration_or_access
          and tunnel_serves_mines_of_excavators

  - name: tunnel_serving_others_mines_is_real_property
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-6-112(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-6-112
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          tunnel_excavated_for_drainage_exploration_or_access
          and tunnel_serves_mines_of_persons_other_than_excavators

  - name: tunnel_valuation_apportionment_applies
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-6-112(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-6-112
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          tunnel_is_not_appurtenant_to_or_parcel_of_mine
          and tunnel_is_partly_in_multiple_counties_or_lesser_political_subdivisions

  - name: tunnel_valuation_allocated_to_current_jurisdiction
    kind: derived
    entity: Asset
    dtype: Money
    unit: USD
    period: Year
    source: C.R.S. § 39-6-112(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-6-112
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if tunnel_valuation_apportionment_applies:
            total_tunnel_value * length_of_tunnel_center_line_within_current_jurisdiction / total_tunnel_center_line_length
          else: 0
