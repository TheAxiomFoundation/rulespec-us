format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-4704
  summary: Maximum annual contributions are $14,000 for an individual and $28,000
    for joint-return account holders; maximum cumulative contributions are $50,000
    and maximum account amount is $150,000. Money may remain in an account for unlimited
    duration without interest or income being subject to recapture or penalty.
rules:
- name: individual_annual_contribution_limit
  kind: parameter
  dtype: Money
  unit: USD
  source: 39-22-4704(3)(a)(I)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-22-4704
          excerpt: fourteen thousand dollars for an individual
  versions:
  - effective_from: '2017-01-01'
    formula: '14000'
- name: joint_return_annual_contribution_limit
  kind: parameter
  dtype: Money
  unit: USD
  source: 39-22-4704(3)(a)(I)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-22-4704
          excerpt: twenty-eight thousand dollars for account holders who file a joint
            return
  versions:
  - effective_from: '2017-01-01'
    formula: '28000'
- name: cumulative_contribution_limit
  kind: parameter
  dtype: Money
  unit: USD
  source: 39-22-4704(3)(a)(II)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-22-4704
          excerpt: fifty thousand dollars
  versions:
  - effective_from: '2017-01-01'
    formula: '50000'
- name: account_total_amount_limit
  kind: parameter
  dtype: Money
  unit: USD
  source: 39-22-4704(3)(a)(III)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-22-4704
          excerpt: one hundred fifty thousand dollars
  versions:
  - effective_from: '2017-01-01'
    formula: '150000'
- name: account_complies_with_contribution_and_amount_limits
  kind: derived
  entity: Asset
  dtype: Judgment
  period: Year
  source: 39-22-4704(3)(a)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/statute/39/39-22-4704
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-22-4704
  versions:
  - effective_from: '2017-01-01'
    formula: "((((account_holder_files_joint_income_tax_return) and account_contributions_for_taxable_year\
      \ <= joint_return_annual_contribution_limit)\n  or (not (account_holder_files_joint_income_tax_return)\
      \ and account_contributions_for_taxable_year <= individual_annual_contribution_limit)))\
      \ and account_total_contributions <= cumulative_contribution_limit and account_total_amount\
      \ <= account_total_amount_limit"
- name: account_income_not_subject_to_recapture_or_penalty_while_money_remains
  kind: derived
  entity: Asset
  dtype: Judgment
  period: Year
  source: 39-22-4704(c)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/statute/39/39-22-4704
          excerpt: Money may remain in a first-time home buyer savings account for
            unlimited duration
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-co/statute/39/39-22-4704
          excerpt: without the interest or income being subject to recapture or penalty
  versions:
  - effective_from: '2017-01-01'
    formula: money_remains_in_first_time_home_buyer_savings_account
