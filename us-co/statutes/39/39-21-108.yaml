format: rulespec/v1
module:
  status: deferred
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-21-108
  summary: |-
    “In the event there are debts for overpayments of unemployment insurance
    pursuant to section 8-81-101 (4), debts for unpaid child support, as set
    forth in section 26-13-111, debts for overpayment of public assistance or
    medical assistance benefits, as set forth in section 26-2-133, debts for
    overpayment of child care assistance, as set forth in section 26.5-4-119,
    debts for any unpaid loan or other obligation due to a state-supported
    institution of higher education, as set forth in section 23-5-115, debts
    for any unpaid loan due to the student loan division of the department of
    higher education, as set forth in section 23-3.1-104 (1)(p), any amounts
    owed for judicial fines, fees, costs, or surcharges, as set forth in
    section 16-11-101.8, any amounts owed for judicial restitution, as set
    forth in section 16-18.5-106.8, and other unpaid debts owing to the state
    or any agency thereof, as set forth in this subsection (3), then credit to
    the unpaid debts shall be prorated on the basis of the ratio of the amount
    of each such unpaid debt as compared to the total amount of unpaid debts.”
  deferred_outputs:
    - output: us-co:statutes/39/39-21-108/b#credit_to_each_unpaid_debt
      reason: >-
        The required per-debt proration cannot be represented faithfully without
        a supported relation for the enumerated unpaid debts and executable
        category and certification dependencies from sections 8-81-101 (4),
        26-13-111, 26-2-133, 26.5-4-119, 23-5-115, 23-3.1-104 (1)(p),
        16-11-101.8, and 16-18.5-106.8. Those cited RuleSpec sources are not
        available in the supplied context.
