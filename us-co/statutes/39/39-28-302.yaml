format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-28-302
  summary: |-
    “Brand family means all styles of cigarettes sold under the same trade mark and differentiated from one another by means of additional modifiers or descriptors ... and includes any brand name ... identifiable with, a previously known brand of cigarettes.”
rules:
  - name: brand_family
    kind: derived
    entity: CigaretteBrand
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-28-302(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-28-302
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (styles_of_cigarettes_share_trade_mark
          and styles_are_differentiated_by_additional_modifiers_or_descriptors)
          or brand_indicia_is_identical_or_similar_to_or_identifiable_with_previously_known_cigarette_brand
