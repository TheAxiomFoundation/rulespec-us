format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-5103
  summary: |-
    To be eligible, a charitable organization must have been registered for at least five years, be in good standing, be a nonprofit organization, and be exempt under section 501(c)(3).
  deferred_outputs:
    - output: us-co:statutes/39/39-22-5103/b#charitable_organization_included_on_department_list
      reason: The exclusion-request effect operates on an administrative list and is not representable as an entity-level computation in this source slice.
    - output: us-co:statutes/39/39-22-5103/c#eligible_charitable_organizations_list_provided_in_digital_format
      reason: The digital-format furnishing duty is an administrative publication requirement, not a computable RuleSpec output.
    - output: us-co:statutes/39/39-22-5103/2#eligible_charitable_organizations_list_made_available_to_public
      reason: The public-list availability and identifying-information requirements are administrative publication duties.
    - output: us-co:statutes/39/39-22-5103/3#taxpayer_charity_designation_valid
      reason: Validity of a taxpayer designation depends on the externally maintained eligible-charity list and the department's ability to identify the designated organization.
rules:
  - name: minimum_registration_years
    kind: parameter
    dtype: Integer
    source: 39-22-5103(1)(a)(I)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-5103
              excerpt: "for at least five years"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          5

  - name: charitable_organization_is_eligible
    kind: derived
    entity: CharitableOrganization
    dtype: Judgment
    period: Year
    source: 39-22-5103(1)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-22-5103
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          years_registered_with_secretary_of_state >= minimum_registration_years
          and organization_is_in_good_standing_with_secretary_of_state
          and organization_is_nonprofit
          and organization_is_exempt_under_section_501_c_3
