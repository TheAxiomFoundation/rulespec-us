format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-2-111
  summary: |-
    Complaints shall be in writing and may be filed only by a county taxing authority or taxpayer, concerning property located in the relevant county. If justified, findings may support a petition for reappraisal.
rules:
  - name: complaint_may_be_filed
    kind: derived
    entity: Complaint
    dtype: Judgment
    period: Year
    source: C.R.S. 39-2-111
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-2-111
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          complaint_is_in_writing
          and complaint_property_is_located_in_relevant_county
          and (
            complaint_is_filed_by_taxing_authority_in_relevant_county
            or complainant_taxpayer_owns_taxable_property_in_relevant_county
          )
  - name: findings_may_support_reappraisal_petition
    kind: derived
    entity: Complaint
    dtype: Judgment
    period: Year
    source: C.R.S. 39-2-111
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-2-111
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          administrator_finds_complaint_justified
