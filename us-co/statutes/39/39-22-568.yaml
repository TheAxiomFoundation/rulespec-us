format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-568
  summary: |-
    “for income tax years commencing on or after January 1, 2026, but prior to January 1, 2046,” a qualified applicant may claim a credit for registered loan losses. Certificates may be issued up to fifteen cents for every dollar of an eligible loan, subject to a thirty million dollar aggregate limit.
  deferred_outputs:
    - output: us-co:statutes/39/39-22-568/a#administrator_definition
      reason: Definition identifies alternative administrative actors and is not a computable policy output.
    - output: us-co:statutes/39/39-22-568/b#borrower_definition
      reason: Definition requires externally determined business-stage, revenue, and quantum-company facts.
    - output: us-co:statutes/39/39-22-568/c#department_definition
      reason: Institutional definition is non-computational.
    - output: us-co:statutes/39/39-22-568/d#eligible_loan_definition
      reason: Definition depends on a loan relationship between a qualified applicant and borrower not represented by a supported relation.
    - output: us-co:statutes/39/39-22-568/e#office_definition
      reason: Institutional definition incorporates an unavailable cited source.
    - output: us-co:statutes/39/39-22-568/f#qualified_applicant_definition
      reason: Entity-classification definition is not a computable output.
    - output: us-co:statutes/39/39-22-568/g#quantum_company_definition
      reason: Business-model definition requires external classification facts.
    - output: us-co:statutes/39/39-22-568/h#registered_loan_definition
      reason: Definition depends on administrator registration records not represented in the schema.
    - output: us-co:statutes/39/39-22-568/3/b#credit_claim_requirements
      reason: Claim requires administrative applications, certificates, registration, loss occurrence, and tax-return filing records.
    - output: us-co:statutes/39/39-22-568/3/c#certificate_distribution_method
      reason: Administrator-selected distribution method is discretionary and non-computational.
    - output: us-co:statutes/39/39-22-568/5/b#application_review_determinations
      reason: Administrative review determinations require agency records and discretionary evaluation.
    - output: us-co:statutes/39/39-22-568/5/c#loan_registration_eligibility
      reason: Registration requires affidavits, borrower certifications, fees, and administrator determinations.
    - output: us-co:statutes/39/39-22-568/5/e#prospective_loan_advice_process
      reason: Optional administrator advisory process is administrative and non-computational.
    - output: us-co:statutes/39/39-22-568/7/b#tax_credit_certificate_issuance
      reason: Certificate issuance depends on administrator determinations, policies, and registration records.
    - output: us-co:statutes/39/39-22-568/7/d#tax_credit_certificate_amount
      reason: Final certificate amount is subject to administrator-selected rates and caps for individual applicants and loans.
    - output: us-co:statutes/39/39-22-568/7/g#registered_loan_loss_reserve_use
      reason: Pooled reserve use requires applicant-level certificate and claimed-credit accounting not represented by the schema.
    - output: us-co:statutes/39/39-22-568/8/c#certified_registered_loan_loss
      reason: Certified loss requires administrator review of loan balances, recoveries, expenses, and excluded damages.
    - output: us-co:statutes/39/39-22-568/9/d#registered_loan_loss_certificate_pass_through
      reason: Pass-through allocation requires partnership, LLC, or property-owner ownership relations and agreements.
    - output: us-co:statutes/39/39-22-568/11/b#department_certificate_report
      reason: Electronic reporting duty is administrative and does not establish a computable recipient output.
    - output: us-co:statutes/39/39-22-568/12/b#administrator_loan_standards
      reason: Required standards are administrator-developed and not stated as fixed computable criteria.
rules:
  - name: borrower_annual_revenue_limit
    kind: parameter
    dtype: Money
    unit: USD
    source: 39-22-568(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-568
              excerpt: "annual revenue of less than one hundred million dollars"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          100000000
  - name: registration_and_issuance_fee_maximum_rate
    kind: parameter
    dtype: Rate
    source: 39-22-568(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-568
              excerpt: "up to eight percent"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          0.08
  - name: tax_credit_certificate_maximum_rate
    kind: parameter
    dtype: Rate
    source: 39-22-568(d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-568
              excerpt: "up to fifteen cents for every dollar"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          0.15
  - name: aggregate_tax_credit_certificate_limit
    kind: parameter
    dtype: Money
    unit: USD
    source: 39-22-568(d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-568
              excerpt: "must not exceed thirty million dollars"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          30000000
