format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-6-106
  summary: "\u201CThe assessor shall value such mine for assessment at an amount equal\
    \ to twenty-five percent of the gross proceeds, but if the net proceeds exceed\
    \ twenty-five percent of the gross proceeds, then such mine shall be valued for\
    \ assessment at the amount of such net proceeds.\u201D The section also prescribes\
    \ annual reporting, reporting-method elections, cost and proceeds definitions,\
    \ treatment of related mining property and possessory interests, and a local-growth\
    \ classification."
  deferred_outputs:
  - output: us-co:statutes/39/39-6-106/e#gross_value_from_production
    reason: Paragraph (e) defines gross value using transaction-specific actual gross
      selling prices. A faithful executable amount requires ore or first-salable-product
      transaction data not represented by the available structural schema.
  - output: us-co:statutes/39/39-6-106/h#gross_proceeds_from_production
    reason: Paragraph (h) requires gross value and itemized treatment, reduction,
      transportation, and sale costs. The necessary transaction and cost-allocation
      relations are not represented by the available structural schema.
  - output: us-co:statutes/39/39-6-106/b#producing_mine_average_reporting_method_request
    reason: Subsection (1.4)(b) governs filings and county-board approval across every
      county in which a mine is located. The available schema cannot faithfully represent
      the mine-to-county filing and authorization process.
  - output: us-co:statutes/39/39-6-106/a#producing_mine_includable_costs
    reason: Subsection (1.7)(a) requires classification and allocation of capital
      assets, amortized development costs, and attributable off-site costs, including
      county-board approval of allocation-method changes. The required cost-item and
      county-approval relations are unavailable.
  - output: us-co:statutes/39/39-6-106/b#producing_mine_excluded_costs
    reason: Subsection (1.7)(b) excludes profit or margin and amounts previously deducted.
      A faithful amount requires cost-item history and classification relations that
      are not represented by the available schema.
  - output: us-co:statutes/39/39-6-106/1#producing_mine_annual_statement_compliance
    reason: Subsection (1) imposes a signed, perjury-backed annual filing duty containing
      multiple property, production, product, value, and cost schedules. The filing
      document and its repeating claim, parcel, product, and county rows are not represented
      by the available schema.
  - output: us-co:statutes/39/39-6-106/1.4#producing_mine_average_reporting_method
    reason: Subsection (1.4) requires a persistent election, uniform reporting within
      a year, and authorization by every affected county. The necessary longitudinal
      election and mine-to-county authorization state is unavailable.
  - output: us-co:statutes/39/39-6-106/3#land_assessed_with_producing_mine
    reason: Subsection (3) requires a relation among ownership, contiguity, extraction,
      transportation through a particular claim or land, and mine operations on that
      same property. The required property-membership relation is unavailable.
  - output: us-co:statutes/39/39-6-106/4#unpatented_mining_claim_possessory_interest_taxable
    reason: Subsection (4) applies to the possessory interest in a particular unpatented
      or not-entered-for-patent mining claim. The required claim-to-possessory-interest
      relation is unavailable.
  - output: us-co:statutes/39/39-6-106/5#producing_mine_valuation_increase_is_local_growth_addition
    reason: Subsection (5) depends on the definition of local growth in section 20(2)(g)
      of article X of the Colorado constitution, for which no copied RuleSpec source
      or exact executable output is available.
rules:
- name: producing_mine_gross_proceeds_assessment_rate
  kind: parameter
  dtype: Rate
  source: 39-6-106(2)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-6-106
          excerpt: "\u201Ctwenty-five percent of the gross proceeds\u201D"
  versions:
  - effective_from: '0001-01-01'
    formula: '0.25'
- name: producing_mine_assessed_value
  kind: derived
  entity: ProducingMine
  dtype: Money
  unit: USD
  period: Year
  source: 39-6-106(2)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-6-106
          excerpt: "\u201Cif the net proceeds exceed twenty-five percent of the gross\
            \ proceeds\u201D"
  versions:
  - effective_from: '0001-01-01'
    formula: 'if net_proceeds_from_production > producing_mine_gross_proceeds_assessment_rate
      * gross_proceeds_from_production: net_proceeds_from_production else: producing_mine_gross_proceeds_assessment_rate
      * gross_proceeds_from_production'
