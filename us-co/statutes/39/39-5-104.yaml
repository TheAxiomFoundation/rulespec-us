format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-5-104
  summary: |-
    Each tract, parcel, and town or city lot shall be separately appraised and valued, subject to adjoining common ownership; land supporting one single-purpose structure across multiple town or city lots shall be appraised as a single property.
rules:
  - name: separate_appraisal_and_valuation_required
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-5-104
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-5-104
              excerpt: "Each tract or parcel of land and each town or city lot shall be separately appraised and valued"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-5-104
              excerpt: "except when two or more adjoining tracts, parcels, or lots are owned by the same person"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-5-104
              excerpt: "the entire land area shall be appraised and valued as a single property"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          land_or_lot_is_subject_to_appraisal
          and not (adjoining_tracts_parcels_or_lots_are_owned_by_same_person)
          and not (single_structure_is_used_for_single_purpose_and_located_on_more_than_one_town_or_city_lot)
  - name: collective_appraisal_and_valuation_permitted
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-5-104
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-5-104
              excerpt: "two or more adjoining tracts, parcels, or lots are owned by the same person"
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-5-104
              excerpt: "the same may be appraised and valued either separately or collectively"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          land_or_lot_is_subject_to_appraisal
          and adjoining_tracts_parcels_or_lots_are_owned_by_same_person
  - name: single_property_appraisal_and_valuation_required
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-5-104
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-5-104
              excerpt: "When a single structure, used for a single purpose, is located on more than one town or city lot"
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-5-104
              excerpt: "the entire land area shall be appraised and valued as a single property"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          single_structure_is_used_for_single_purpose_and_located_on_more_than_one_town_or_city_lot
