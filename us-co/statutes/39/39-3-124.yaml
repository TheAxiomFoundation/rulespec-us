format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-3-124
  summary: |-
    Property used by the state or a political subdivision under an agreement entitling it to acquire title at the end without cost or for nominal consideration is exempt from property tax. A private lessor under a leveraged leasing agreement incurs no tort liability solely by reason of lessor status.
  deferred_outputs:
    - output: us-co:statutes/39/39-3-124/b#real_property_lease_property_tax_exemption
      reason: The lease exemption is subject to rent-tax offset requirements, metropolitan-district disclosure and public-purpose review procedures, and exemptions preserved by uncopied cited sections.
    - output: us-co:statutes/39/39-3-124/b/I/E#lease_tax_and_rent_reduction_cost_neutrality
      reason: This is a legislative intent clause rather than an executable legal formula.
rules:
  - name: property_tax_exempt_under_title_acquisition_agreement
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: 39-3-124(1)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-3-124
              excerpt: "Property, real and personal, that is used by the state or any of its political subdivisions"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-3-124
              excerpt: "entitled to acquire title to such property at the end of the agreement term without cost or for only nominal consideration"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          property_is_used_by_state_or_political_subdivision
          and agreement_entitles_public_user_to_title_without_cost_or_for_nominal_consideration
  - name: leasehold_interest_exempt_during_public_use
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: 39-3-124(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-3-124
              excerpt: "owned by the\nstate or by a political subdivision of the state and that has been leased to a private\nperson"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-3-124
              excerpt: "use and possession of which has been leased back to the state or a\npolitical subdivision"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          property_is_owned_by_state_or_political_subdivision
          and property_is_leased_to_private_person
          and use_and_possession_are_leased_back_to_state_or_political_subdivision
  - name: leasehold_interest_taxable_to_private_owner
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: 39-3-124(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-3-124
              excerpt: "owned by a\nprivate person and that has been leased to the state or a political subdivision"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-3-124
              excerpt: "use and possession of which has been leased back to a private person for\nprivate purposes"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          property_is_owned_by_private_person
          and property_is_leased_to_state_or_political_subdivision
          and use_and_possession_are_leased_back_to_private_person_for_private_purposes
  - name: private_lessor_tort_liability_from_leveraged_lease_status
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 39-3-124(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-3-124
              excerpt: "shall not cause the private person\nto whom the property has been leased to incur any liability in tort by virtue of the\nprivate person's status as a lessor"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          false
