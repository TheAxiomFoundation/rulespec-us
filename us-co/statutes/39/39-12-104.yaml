format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-12-104
  summary: |-
    An owner under legal disability when a delinquent-tax deed is executed and delivered may redeem within nine years after recording; if disability ceases within that period, redemption must occur within two years after cessation. Redemption requires the specified sale, cost, tax, interest, and improvement payments.
rules:
  - name: redemption_period_after_tax_deed_recording_years
    kind: parameter
    dtype: Count
    source: C.R.S. § 39-12-104(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-12-104
              excerpt: "within nine years from the date of the recording"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          9

  - name: redemption_period_after_disability_ceases_years
    kind: parameter
    dtype: Count
    source: C.R.S. § 39-12-104(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-12-104
              excerpt: "not more than two years after the removal or cessation"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          2

  - name: tax_lien_sale_interest_rate
    kind: parameter
    dtype: Rate
    source: C.R.S. § 39-12-104(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-12-104
              excerpt: "interest thereon from the date of such sale at the rate of fifteen percent per annum"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.15

  - name: reimbursable_subsequent_tax_payment_interest_rate
    kind: parameter
    dtype: Rate
    source: C.R.S. § 39-12-104(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-12-104
              excerpt: "with interest thereon at the rate of fifteen percent per annum from the\ndate of such payment"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.15

  - name: owner_with_legal_disability_may_redeem_tax_deeded_property
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-12-104(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-12-104
              excerpt: "When the owner of real property for which a tax deed was issued"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-12-104
              excerpt: "if the disability ... is removed or ceases within such nine-year period"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          tax_deed_issued_under_article_11_for_delinquent_taxes
          and owner_under_legal_disability_at_tax_deed_execution_and_delivery
          and redemption_takes_place_within_nine_years_of_tax_deed_recording
          and (
            not legal_disability_ceased_within_nine_year_period
            or redemption_takes_place_within_two_years_after_legal_disability_ceased
          )

  - name: redemption_payment_required
    kind: derived
    entity: Asset
    dtype: Money
    unit: USD
    period: Year
    source: C.R.S. § 39-12-104(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-12-104
              excerpt: "shall pay to the treasurer the sum for which the tax lien ... was sold ... and the then present value of such improvements"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if owner_with_legal_disability_may_redeem_tax_deeded_property:
            tax_lien_sale_amount
            + tax_deed_and_recording_cost
            + interest_on_tax_lien_sale_amount
            + unpaid_subsequent_taxes_costs_and_charges
            + reimbursable_subsequent_tax_payments
            + interest_on_reimbursable_subsequent_tax_payments
            + present_value_of_improvements
          else: 0
