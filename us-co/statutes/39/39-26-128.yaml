format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-26-128
  summary: |-
    “A local taxing jurisdiction means a city, town, municipality, county, special district, or authority authorized to levy a sales tax pursuant to title 24, 25, 29, 30, 31, 32, 37, or 42, C.R.S., and cities, cities and counties, or towns governed by a home rule charter that impose a sales or use tax in the state.”
  deferred_outputs:
    - output: us-co:statutes/39/39-26-128/1#department_revenue_recommendations
      reason: The recommendations, consultation, and revenue-neutrality estimation duties are administrative actions rather than supported executable policy outputs.
    - output: us-co:statutes/39/39-26-128/2#general_assembly_report
      reason: The reporting, submission, and publication duties are administrative actions rather than supported executable policy outputs.
    - output: us-co:statutes/39/39-26-128/3#legislative_consideration_of_recommendations
      reason: The encouragement to consider recommendations and introduce legislation is nonbinding legislative guidance rather than an executable policy output.
rules:
  - name: local_taxing_jurisdiction
    kind: derived
    entity: LocalTaxingJurisdiction
    dtype: Judgment
    period: Year
    source: 39-26-128(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-26-128
    versions:
