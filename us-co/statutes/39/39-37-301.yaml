format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-37-301
  summary: The first thirty million dollars paid into the fund in its first fiscal
    year must be transferred for crime victim services; thereafter that amount is
    annually inflation-adjusted and rounded to the nearest one thousand dollars. The
    next eight million dollars and next one million dollars are transferred to the
    specified funds. Subject to annual appropriation, the department may expend money
    for administration, and specified general-fund administrative costs are reimbursed
    on June 30, 2025 and June 30, 2026.
rules:
- name: initial_crime_victim_services_transfer_requirement
  kind: parameter
  dtype: Money
  unit: USD
  source: C.R.S. 39-37-301(2)(a)(I)(A)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-37-301
          excerpt: The first thirty million dollars
  versions:
  - effective_from: '2024-01-01'
    formula: '30000000'
- name: behavioral_and_mental_health_transfer_requirement
  kind: parameter
  dtype: Money
  unit: USD
  source: C.R.S. 39-37-301(2)(a)(II)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-37-301
          excerpt: the next eight million dollars
  versions:
  - effective_from: '2024-01-01'
    formula: '8000000'
- name: school_security_transfer_requirement
  kind: parameter
  dtype: Money
  unit: USD
  source: C.R.S. 39-37-301(2)(a)(III)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-37-301
          excerpt: the next one million dollars
  versions:
  - effective_from: '2024-01-01'
    formula: '1000000'
- name: inflation_adjustment_rounding_increment
  kind: parameter
  dtype: Money
  unit: USD
  source: C.R.S. 39-37-301(2)(a)(I)(B)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-37-301
          excerpt: nearest one thousand dollars
  versions:
  - effective_from: '2024-01-01'
    formula: '1000'
- name: crime_victim_services_transfer
  kind: derived
  entity: FirearmsAndAmmunitionExciseTaxCashFund
  dtype: Money
  period: Year
  unit: USD
  source: C.R.S. 39-37-301(2)(a)(I)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: ordering
        source:
          corpus_citation_path: us-co/statute/39/39-37-301
          excerpt: The first thirty million dollars paid into the fund
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-37-301
          excerpt: annually calculate and adjust the amount required ... for inflation
            or deflation and ... round
  versions:
  - effective_from: '2024-07-01'
    formula: 'if is_first_fiscal_year_money_is_transferred_to_fund: min(eligible_money_paid_or_credited_to_fund_after_annual_appropriation,
      initial_crime_victim_services_transfer_requirement) else: min( eligible_money_paid_or_credited_to_fund_after_annual_appropriation,
      floor( ( (prior_fiscal_year_crime_victim_services_transfer_requirement * (1
      + annual_denver_consumer_price_index_change)) + (inflation_adjustment_rounding_increment
      / 2) ) / inflation_adjustment_rounding_increment ) * inflation_adjustment_rounding_increment
      )'
- name: behavioral_and_mental_health_transfer
  kind: derived
  entity: FirearmsAndAmmunitionExciseTaxCashFund
  dtype: Money
  period: Year
  unit: USD
  source: C.R.S. 39-37-301(2)(a)(II)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: ordering
        source:
          corpus_citation_path: us-co/statute/39/39-37-301
          excerpt: After the requirement in subsection (2)(a)(I) ... the next eight
            million dollars
  versions:
  - effective_from: '2024-07-01'
    formula: "min(\n  max(0, eligible_money_paid_or_credited_to_fund_after_annual_appropriation\
      \ - crime_victim_services_transfer),\n  behavioral_and_mental_health_transfer_requirement\n\
      )"
- name: school_security_transfer
  kind: derived
  entity: FirearmsAndAmmunitionExciseTaxCashFund
  dtype: Money
  period: Year
  unit: USD
  source: C.R.S. 39-37-301(2)(a)(III)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: ordering
        source:
          corpus_citation_path: us-co/statute/39/39-37-301
          excerpt: After the requirement in subsection (2)(a)(II) ... the next one
            million dollars
  versions:
  - effective_from: '2024-07-01'
    formula: "min(\n  max(0, eligible_money_paid_or_credited_to_fund_after_annual_appropriation\
      \ - crime_victim_services_transfer - behavioral_and_mental_health_transfer),\n\
      \  school_security_transfer_requirement\n)"
- name: department_may_expend_fund_money_for_administration
  kind: derived
  entity: StateAgency
  dtype: Judgment
  period: Year
  source: C.R.S. 39-37-301(2)(b)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/statute/39/39-37-301
          excerpt: Subject to annual appropriation ... the department of revenue may
            expend money
  versions:
  - effective_from: '2024-07-01'
    formula: fund_money_is_annually_appropriated_by_general_assembly
- name: general_fund_administration_cost_reimbursement
  kind: derived
  entity: FirearmsAndAmmunitionExciseTaxCashFund
  dtype: Money
  period: Day
  unit: USD
  source: C.R.S. 39-37-301(3)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-37-301
          excerpt: shall transfer from the fund to the general fund an amount of money
            equal to the amount of money used
  versions:
  - effective_from: '2025-06-30'
    formula: 'if day_is_required_general_fund_reimbursement_date: general_fund_money_used_for_article_administration_in_preceding_state_fiscal_year
      else: 0'
