format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-517
  summary: A taxpayer operating a specified licensed child care or foster care facility
    receives a credit of twenty percent of qualifying annual tangible-personal-property
    investment; an employer providing licensed employee child care facilities receives
    ten percent. The credit is limited to actual tax liability, with excess carried
    forward for three income tax years.
  deferred_outputs:
  - output: us-co:statutes/39/39-22-517#investment_tax_credit_carryover_available
    reason: Generated rule depends on an output that validation deferred because it
      flattened thresholded, capped, base-limited, or cross-referenced mechanics,
      or borrowed an unrelated same-named section term.
  - output: us-co:statutes/39/39-22-517#investment_tax_credit_carryover_year_limit
    reason: Generated rule used a local name that collides with a sibling RuleSpec
      export. This output is deferred until it can be encoded with a semantic branch-specific
      name without creating ambiguous sibling imports.
rules:
- name: qualifying_child_care_center_investment_credit_rate
  kind: parameter
  dtype: Rate
  source: "Colo. Rev. Stat. \xA7 39-22-517(1)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-22-517
          excerpt: twenty percent
  versions:
  - effective_from: '1992-01-01'
    formula: '0.20'
- name: employee_child_care_facility_investment_credit_rate
  kind: parameter
  dtype: Rate
  source: "Colo. Rev. Stat. \xA7 39-22-517(2)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-22-517
          excerpt: ten percent
  versions:
  - effective_from: '1992-07-01'
    formula: '0.10'
- name: child_care_center_investment_credit
  kind: derived
  entity: TaxUnit
  dtype: Money
  unit: USD
  period: Year
  source: "Colo. Rev. Stat. \xA7 39-22-517(1)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-22-517
          excerpt: "credit against the tax imposed by this article 22 in the amount of twenty percent of the taxpayer's annual investment in tangible personal property"
  versions:
  - effective_from: '1992-01-01'
    formula: "if taxable_year_is_within_child_care_center_credit_effective_window\
      \ and taxpayer_operates_specified_licensed_child_care_or_foster_care_facility:\n\
      \  qualifying_child_care_center_investment_credit_rate * max(0, annual_investment_in_tangible_personal_property_for_specified_child_care_or_foster_care_facility)\n\
      else: 0"
- name: employee_child_care_facility_investment_credit
  kind: derived
  entity: TaxUnit
  dtype: Money
  unit: USD
  period: Year
  source: "Colo. Rev. Stat. \xA7 39-22-517(2)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-22-517
          excerpt: credit ... in the amount of ten percent of the taxpayer's annual
            investment in tangible personal property
  versions:
  - effective_from: '1992-07-01'
    formula: "if taxable_year_is_within_employee_child_care_facility_credit_effective_window\
      \ and taxpayer_provides_specified_licensed_employee_child_care_facilities:\n\
      \  employee_child_care_facility_investment_credit_rate * max(0, annual_investment_in_tangible_personal_property_for_employee_child_care_facilities)\n\
      else: 0"
- name: child_care_investment_credit_before_tax_liability_limit
  kind: derived
  entity: TaxUnit
  dtype: Money
  unit: USD
  period: Year
  source: "Colo. Rev. Stat. \xA7 39-22-517(1)-(3)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-22-517
          excerpt: The credit allowed by this section
  versions:
  - effective_from: '1992-01-01'
    formula: child_care_center_investment_credit + employee_child_care_facility_investment_credit
- name: child_care_investment_credit_allowed
  kind: derived
  entity: TaxUnit
  dtype: Money
  unit: USD
  period: Year
  source: "Colo. Rev. Stat. \xA7 39-22-517(3)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-22-517
          excerpt: "shall not\nexceed the taxpayer's actual tax liability"
  versions:
  - effective_from: '1992-01-01'
    formula: min(max(0, actual_tax_liability), child_care_investment_credit_before_tax_liability_limit)
- name: unused_child_care_investment_credit
  kind: derived
  entity: TaxUnit
  dtype: Money
  unit: USD
  period: Year
  source: "Colo. Rev. Stat. \xA7 39-22-517(3)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-22-517
          excerpt: "such excess shall be an\ninvestment tax credit carryover"
  versions:
  - effective_from: '1992-01-01'
    formula: max(0, child_care_investment_credit_before_tax_liability_limit - max(0,
      actual_tax_liability))
