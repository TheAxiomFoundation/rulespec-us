format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-21-119.5
  summary: A person who fails to file electronically or pay by electronic funds transfer
    is subject to a penalty of fifty dollars or five percent of the proper amount
    of tax, whichever is greater. Tax means net tax shown due reduced by credits.
    The executive director may waive penalties for good cause.
  deferred_outputs:
  - output: us-co:statutes/39/39-21-119.5/6/c#electronic_remittance_deadline_requirement
    reason: The provision regulates administrative remittance timing but supplies
      no computable taxpayer-specific deadline.
  - output: us-co:statutes/39/39-21-119.5/7/d#processing_cost_definitions
    reason: The definitions of convenience fee and processing costs depend on external
      statutory authorization and transaction-specific actual costs.
  - output: us-co:statutes/39/39-21-119.5/d#convenience_fee
    reason: Generated module encodes the supported rules from this source, but this
      source subparagraph depends on policy surfaces or entities that are not available
      in the current RuleSpec context. It is deferred instead of being modeled as
      a caller-supplied input or an unsupported local entity.
rules:
- name: electronic_filing_penalty_minimum
  kind: parameter
  dtype: Money
  unit: USD
  source: 39-21-119.5(5)(a)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-21-119.5
          excerpt: a penalty of fifty dollars
  versions:
  - effective_from: '2020-01-01'
    formula: '50'
- name: electronic_filing_penalty_rate
  kind: parameter
  dtype: Rate
  source: 39-21-119.5(5)(a)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-21-119.5
          excerpt: five percent of the proper amount of tax
  versions:
  - effective_from: '2020-01-01'
    formula: '0.05'
- name: net_tax_due
  kind: derived
  entity: TaxUnit
  dtype: Money
  period: Year
  source: 39-21-119.5(c)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: definition
        source:
          corpus_citation_path: us-co/statute/39/39-21-119.5
          excerpt: net amount of tax shown to be due on the return ... reduced by
            ... any credit
  versions:
  - effective_from: '2020-01-01'
    formula: max(0, tax_shown_due_on_return - credits_claimed_on_return)
- name: electronic_filing_or_payment_penalty
  kind: derived
  entity: TaxUnit
  dtype: Money
  period: Year
  source: 39-21-119.5(5)(a)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-21-119.5
          excerpt: fifty dollars ... or five percent ... whichever is greater
  versions:
  - effective_from: '2020-01-01'
    formula: 'if required_electronic_filing_or_payment_failed: max(electronic_filing_penalty_minimum,
      electronic_filing_penalty_rate * net_tax_due) else: 0'
