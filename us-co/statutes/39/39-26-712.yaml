    dtype: Judgment
    period: Year
    source: C.R.S. 39-26-712(2)(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-26-712
              excerpt: "if the vehicle has been relocated within this state, was used in interstate commerce"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-26-712
              excerpt: "the owner can provide evidence of the vehicle being previously registered in another state for at least six months"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-26-712
              excerpt: "at least six months"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          vehicle_relocated_within_state
          and vehicle_used_in_interstate_commerce
          and owner_can_provide_evidence_of_prior_out_of_state_registration
          and vehicle_prior_out_of_state_registration_months >= prior_out_of_state_registration_minimum_months
