format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-26-712
  summary: |-
    “The storage or use of a new or used trailer, semitrailer, truck, truck tractor, or truck body” is exempt if relocated within this state, used in interstate commerce, and previously registered in another state for at least six months.
  deferred_outputs:
    - output: us-co:statutes/39/39-26-712/1/a#manufacturer_sale_tax_exemption
      reason: The affidavit-consolidation-or-elimination exception depends on section 39-26-730 (2), for which no copied RuleSpec source is available.
    - output: us-co:statutes/39/39-26-712/1/b#out_of_state_use_vehicle_sale_tax_exemption
      reason: The affidavit-consolidation-or-elimination exception depends on section 39-26-730 (2), for which no copied RuleSpec source is available.
    - output: us-co:statutes/39/39-26-712/2/a#manufacturer_vehicle_storage_or_use_tax_exemption
      reason: The affidavit-consolidation-or-elimination exception depends on section 39-26-730 (2), for which no copied RuleSpec source is available.
    - output: us-co:statutes/39/39-26-712/2/b#out_of_state_use_vehicle_storage_or_use_tax_exemption
      reason: The affidavit-consolidation-or-elimination exception depends on section 39-26-730 (2), for which no copied RuleSpec source is available.
