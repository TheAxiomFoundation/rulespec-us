format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-37-302
  summary: |-
    “The first five million dollars” of specified transfers must continue and expand the veterans mental health services program. “After the requirement in subsection (2) ... is met, the next three million dollars” must continue and expand children and youth behavioral health crisis response services.
  deferred_outputs:
    - output: us-co:statutes/39/39-37-302#veterans_mental_health_services_appropriation
      reason: Computing the required appropriation depends on money transferred under section 24-75-230, for which no RuleSpec source is available.
      source_values:
        - us-co:statutes/39/39-37-302#veterans_mental_health_services_priority_amount
    - output: us-co:statutes/39/39-37-302#children_and_youth_crisis_response_appropriation
      reason: Computing the required appropriation depends on money transferred under section 24-75-230 and on completion of the prior priority, for which no RuleSpec source is available.
      source_values:
        - us-co:statutes/39/39-37-302#children_and_youth_crisis_response_priority_amount
rules:
  - name: veterans_mental_health_services_priority_amount
    kind: parameter
    dtype: Money
    unit: USD
    source: C.R.S. 39-37-302(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-37-302
              excerpt: The first five million dollars of the money transferred to the fund
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          5000000
  - name: children_and_youth_crisis_response_priority_amount
    kind: parameter
    dtype: Money
    unit: USD
    source: C.R.S. 39-37-302(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-37-302
              excerpt: "After the requirement in subsection (2) of this section is met, the next\nthree million dollars"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          3000000
