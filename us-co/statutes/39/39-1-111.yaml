format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-1-111
  summary: |-
    “If the board of county commissioners, or other body authorized by law to levy taxes, or either group's authorized party fails to certify such levies to the assessor, it is the duty of the assessor, upon direction of the division of local government, to extend the levies of the previous year.”
rules:
  - name: assessor_must_extend_previous_year_levies
    kind: derived
    entity: Assessor
    dtype: Judgment
    period: Year
    source: C.R.S. 39-1-111(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-1-111
              excerpt: "fails to certify such levies to the assessor ... upon direction of the division of local government"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          authorized_levying_body_failed_to_certify_levies
          and division_of_local_government_directs_assessor_to_extend_levies
