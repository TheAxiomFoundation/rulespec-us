format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-13-103
  summary: |-
    Each county clerk and recorder shall evidence payment of the documentary fee ... before it is recorded.
rules:
  - name: documentary_fee_payment_evidence_complies
    kind: derived
    entity: Document
    dtype: Judgment
    period: Day
    source: C.R.S. 39-13-103
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-13-103
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          document_is_subject_to_documentary_fee
          and documentary_fee_evidence_made_before_document_recording
          and (
            recording_annotation_evidences_documentary_fee_payment
            or (
              documentary_fee_evidence_is_imprinted_typed_stamped_or_ink_written
              and document_notation_includes_words_state_documentary_fee
              and document_notation_includes_documentary_fee_amount_paid
              and document_notation_includes_documentary_fee_payment_date
            )
          )
