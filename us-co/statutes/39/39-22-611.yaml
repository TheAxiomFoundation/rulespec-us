format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-611
  summary: |-
    "All intangible personal property ... shall be exempt from ad valorem tax"; its use or inclusion in public-utility valuation remains unaffected, other than FCC licenses granted to a wireless carrier.
rules:
  - name: intangible_personal_property_exempt_from_ad_valorem_tax
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-22-611
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-22-611
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_intangible_personal_property
  - name: intangible_property_use_in_public_utility_valuation_unaffected
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-22-611
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-22-611
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_intangible_personal_property
          and asset_is_used_or_included_in_public_utility_property_valuation
          and not asset_is_fcc_license_granted_to_wireless_carrier
