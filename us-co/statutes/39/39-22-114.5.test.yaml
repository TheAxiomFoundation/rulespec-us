- name: qualified credit is capped and excess over tax due remains unused
  period:
    period_kind: tax_year
    start: '2022-01-01'
    end: '2022-12-31'
  input:
    us-co:statutes/39/39-22-114.5#input.taxpayer_is_resident_individual: true
    us-co:statutes/39/39-22-114.5#input.income_tax_year_commences_prior_to_credit_termination_date: true
    us-co:statutes/39/39-22-114.5#input.income_is_related_to_qualified_plastic_recycling_expenditures: true
    us-co:statutes/39/39-22-114.5#input.net_expenditures_to_third_parties_for_new_plastic_recycling_technology_in_colorado: 15000
    us-co:statutes/39/39-22-114.5#input.income_taxes_otherwise_due_on_related_income: 1500
  output:
    us-co:statutes/39/39-22-114.5#plastic_recycling_credit: 2000
