format: rulespec/v1
module:
  summary: |-
    Mines with preceding-calendar-year gross proceeds exceeding five thousand dollars are producing mines; all others are nonproducing mines, regardless of processing method, ultimate use, or consumption.
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-6-105
rules:
  - name: producing_mine_gross_proceeds_threshold
    kind: parameter
    dtype: Money
    period: Year
    unit: USD
    source: Colo. Rev. Stat. § 39-6-105
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-6-105
              excerpt: "exceeded the amount of five thousand dollars"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          5000
  - name: mine_is_producing
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-6-105
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-6-105
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          gross_proceeds_during_preceding_calendar_year > producing_mine_gross_proceeds_threshold
  - name: mine_is_nonproducing
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-6-105
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-6-105
              excerpt: "all others shall be classified as nonproducing mines"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          gross_proceeds_during_preceding_calendar_year <= producing_mine_gross_proceeds_threshold
