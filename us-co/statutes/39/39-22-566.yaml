format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-566
  summary: |-
    For income tax years commencing on or after January 1, 2025, but before January 1, 2029, each child care worker and qualified direct care worker is allowed a $1,200 credit; qualifying spouses filing jointly may receive $2,400, subject to adjusted-gross-income limits of $75,000 for a single return and $100,000 for a joint return. A long-term care employer's failure to file the required information return by January 31, absent reasonable cause, or willful filing of a false or fraudulent return incurs a $500 penalty.
  deferred_outputs:
    - output: us-co:statutes/39/39-22-566/b#certified_nurse_aide
      reason: The definition depends on certification pursuant to part 2 of article 255 of title 12, for which no copied RuleSpec definition is available.
    - output: us-co:statutes/39/39-22-566/c#child_care_worker
      reason: The definition requires registered status, at least 720 hours of care, and qualifying program or informal-care classifications whose complete legal dependencies are unavailable.
      source_values:
        - us-co:statutes/39/39-22-566#child_care_worker_minimum_annual_care_hours
    - output: us-co:statutes/39/39-22-566/d#consumer_directed_care_employer
      reason: The definition depends on receipt of care pursuant to parts 11 and 19 of article 6 of title 25.5, for which no copied RuleSpec outputs are available.
    - output: us-co:statutes/39/39-22-566/e#direct_care_worker
      reason: The definition depends on the unresolved certified-nurse-aide exclusion and source-stated long-term-care classifications.
    - output: us-co:statutes/39/39-22-566/f#eligible_program
      reason: The definition depends on licensing classifications and the quality-rating system created in section 26.5-5-101, for which no copied RuleSpec output is available.
    - output: us-co:statutes/39/39-22-566/h#employer_and_home_and_community_based_services
      reason: Employer incorporates the unavailable definition in section 39-22-604(2)(b), and home- and community-based services depends on the cited title 25.5 service programs.
    - output: us-co:statutes/39/39-22-566/j#informal_family_friend_or_neighbor_child_care_worker
      reason: The definition depends on the person classification described in section 26.5-5-304(1)(f), for which no copied RuleSpec output is available.
    - output: us-co:statutes/39/39-22-566/k#licensed_early_childhood_education_program
      reason: The definition depends on the early-childhood-program definition and licensing rules in title 26.5, for which no copied RuleSpec outputs are available.
    - output: us-co:statutes/39/39-22-566/l#licensed_family_child_care_home
      reason: The definition depends on the family-child-care-home definition and licensing rules in title 26.5, for which no copied RuleSpec outputs are available.
    - output: us-co:statutes/39/39-22-566/m#long_term_care
      reason: The definition depends on unresolved home- and community-based services, nursing-facility, and certified-home-care-agency definitions.
    - output: us-co:statutes/39/39-22-566/n#long_term_care_employer
      reason: The definition depends on unresolved employer, direct-care-worker, long-term-care, and consumer-directed-care-employer classifications.
    - output: us-co:statutes/39/39-22-566/p#qualified_direct_care_worker
      reason: The definition depends on unresolved direct-care-worker and long-term-care-employer classifications.
      source_values:
        - us-co:statutes/39/39-22-566#qualified_direct_care_worker_minimum_annual_work_hours
    - output: us-co:statutes/39/39-22-566/b#eligible_child_care_worker_report
      reason: This is an administrative electronic-reporting duty of the department of early childhood rather than an entity-level tax computation supported by the current RuleSpec ontology.
    - output: us-co:statutes/39/39-22-566/3#a_care_workforce_credit
      reason: The final credit depends on the deferred child-care-worker and qualified-direct-care-worker definitions and, for part-year residents, the unavailable apportionment ratio from section 39-22-110(1).
      source_values:
        - us-co:statutes/39/39-22-566#care_workforce_credit_per_qualifying_individual
        - us-co:statutes/39/39-22-566#care_workforce_credit_for_two_qualifying_joint_filers
        - us-co:statutes/39/39-22-566#single_return_adjusted_gross_income_limit
        - us-co:statutes/39/39-22-566#joint_return_adjusted_gross_income_limit
    - output: us-co:statutes/39/39-22-566/6#refundable_excess_care_workforce_credit
      reason: The refundable excess cannot be computed until the final credit under subsection (3), including part-year apportionment, is executable.
rules:
  - name: child_care_worker_minimum_annual_care_hours
    kind: parameter
    dtype: Count
    period: Year
    source: 39-22-566(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-566
              excerpt: "provides care for at least seven hundred twenty hours during the income tax year"
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          720

  - name: qualified_direct_care_worker_minimum_annual_work_hours
    kind: parameter
    dtype: Count
    period: Year
    source: 39-22-566(p)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-566
              excerpt: "for at least seven hundred twenty hours in total during the tax year"
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          720

  - name: care_workforce_credit_per_qualifying_individual
    kind: parameter
    dtype: Money
    unit: USD
    period: Year
    source: 39-22-566(3)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-566
              excerpt: "in the amount of one thousand two hundred dollars"
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          1200

  - name: care_workforce_credit_for_two_qualifying_joint_filers
    kind: parameter
    dtype: Money
    unit: USD
    period: Year
    source: 39-22-566(3)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-566
              excerpt: "the credit allowed by this subsection (3)(a) is two thousand four hundred dollars"
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          2400

  - name: single_return_adjusted_gross_income_limit
    kind: parameter
    dtype: Money
    unit: USD
    period: Year
    source: 39-22-566(3)(b)(I)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-566
              excerpt: "files a single return, seventy-five thousand dollars"
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          75000

  - name: joint_return_adjusted_gross_income_limit
    kind: parameter
    dtype: Money
    unit: USD
    period: Year
    source: 39-22-566(3)(b)(I)(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-566
              excerpt: "file a joint return, one hundred thousand dollars"
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          100000

  - name: long_term_care_employer_information_return_penalty
    kind: parameter
    dtype: Money
    unit: USD
    period: Year
    source: 39-22-566(5)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-566
              excerpt: "The executive director shall impose a penalty of five hundred dollars"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          500

  - name: long_term_care_employer_information_return_penalty_imposed
    kind: derived
    entity: Employer
    dtype: Money
    unit: USD
    period: Year
    source: 39-22-566(5)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-22-566
              excerpt: "fails to file the return required by this subsection (5) on or before January 31, unless shown to have been due to reasonable cause, or willfully files a false or fraudulent return"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-566
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:statutes/39/39-22-566#long_term_care_employer_information_return_penalty
              output: long_term_care_employer_information_return_penalty
              hash: sha256:local
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          if (required_information_return_not_filed_by_january_31 and not failure_was_due_to_reasonable_cause) or information_return_was_willfully_false_or_fraudulent: long_term_care_employer_information_return_penalty else: 0
