- name: previous_year_levy_determines_tax_when_current_levy_is_unfixed
  period:
    period_kind: custom
    name: calendar_year
    start: '2024-01-01'
    end: '2024-12-31'
  input:
    us-co:statutes/39/39-10-113#input.current_year_levy_has_not_been_fixed_and_made: true
    us-co:statutes/39/39-10-113#input.valuation_for_assessment: 10000
    us-co:statutes/39/39-10-113#input.previous_year_levy: 0.075
  output:
    us-co:statutes/39/39-10-113#taxes_due_using_previous_year_levy: 750
- name: previous_year_levy_rule_is_inoperative_when_current_levy_is_fixed
  period:
    period_kind: custom
    name: calendar_year
    start: '2024-01-01'
    end: '2024-12-31'
  input:
    us-co:statutes/39/39-10-113#input.current_year_levy_has_not_been_fixed_and_made: false
    us-co:statutes/39/39-10-113#input.valuation_for_assessment: 10000
    us-co:statutes/39/39-10-113#input.previous_year_levy: 0.075
  output:
    us-co:statutes/39/39-10-113#taxes_due_using_previous_year_levy: 0
