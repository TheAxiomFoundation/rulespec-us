format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-532
  summary: |-
    An advanced industry investment tax credit is allowed for a qualified investment in a qualified small business; a copy of the tax credit certificate must be attached to the taxpayer's return.
  deferred_outputs:
    - output: us-co:statutes/39/39-22-532/a#advanced_industry_investment_tax_credit_definition
      reason: The definitional clause names the credit created by this section but does not establish a separate computable output.
    - output: us-co:statutes/39/39-22-532/e#tax_credit_certificate_definition
      reason: The definition depends on a tax credit certificate issued under section 24-48.5-112, whose RuleSpec source is unavailable.
    - output: us-co:statutes/39/39-22-532#advanced_industry_investment_tax_credit_amount
      reason: The credit amount is determined and authorized under section 24-48.5-112, whose RuleSpec source is unavailable.
    - output: us-co:statutes/39/39-22-532#unused_advanced_industry_investment_tax_credit_carryforward
      reason: Computing unused credit and its carryforward requires the credit amount authorized under section 24-48.5-112.
    - output: us-co:statutes/39/39-22-532#advanced_industry_investment_tax_credit_after_misrepresentation_review
      reason: Applying the denial rule requires the certification and applicant-status mechanics under section 24-48.5-112.
    - output: us-co:statutes/39/39-22-532#allocated_advanced_industry_investment_tax_credit
      reason: Allocation and issuance of certificates depend on Colorado office of economic development certification mechanics under section 24-48.5-112.
rules:
  - name: advanced_industry_investment_tax_credit_may_be_claimed
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: 39-22-532(2)-(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-22-532
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          taxpayer_made_qualified_investment
          and investment_was_made_in_qualified_small_business
          and copy_of_tax_credit_certificate_attached_to_tax_return
