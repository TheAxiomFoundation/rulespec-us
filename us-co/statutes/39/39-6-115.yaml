format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-6-115
  summary: |-
    Beginning January 1, 1980, when taxes on mines and mining claims are due,
    the taxes are a debt due from the owner or user and are recoverable by the
    treasurer by direct action in debt; the treasurer may also collect the debt
    as if the property were personal property.
rules:
  - name: mining_claim_tax_is_debt_due_from_owner_or_user
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-6-115
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-6-115
              excerpt: "when taxes on mines and mining claims are due, such taxes shall be a debt due from the owner or user"
    versions:
      - effective_from: '1980-01-01'
        formula: |-
          taxes_on_mine_or_mining_claim_are_due

