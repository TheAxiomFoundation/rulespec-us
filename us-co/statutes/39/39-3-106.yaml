format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-3-106
  summary: |-
    Property owned and used solely and exclusively for religious purposes and not for private gain or corporate profit is exempt from property tax. Property owned and used by a charitable trust exempt under Internal Revenue Code section 501(c)(3) is treated the same as property owned and used by another nonprofit organization for claiming this exemption.
rules:
  - name: religious_use_property_tax_exemption_applies
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. 39-3-106(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-3-106
              excerpt: "owned and used solely and exclusively for religious purposes and not for private gain or corporate profit shall be exempt"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          property_is_owned
          and property_is_used_solely_and_exclusively_for_religious_purposes
          and not property_is_used_for_private_gain_or_corporate_profit

  - name: charitable_trust_property_is_treated_as_nonprofit_property_for_exemption_claim
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. 39-3-106(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-3-106
              excerpt: "property that is owned and used by a charitable trust that is exempt from taxation under section 501(c)(3) ... shall be treated the same"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          property_is_owned_and_used_by_charitable_trust
          and charitable_trust_is_exempt_under_internal_revenue_code_section_501_c_3
