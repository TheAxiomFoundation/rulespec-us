format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-26-711.8
  summary: From July 1, 2014 through June 30, 2019, a new or used aircraft sale for
    use by an on-demand air carrier is exempt when the aircraft remains only for specified
    work, is timely removed, and meets the post-removal in-state presence limit.
  deferred_outputs:
  - output: us-co:statutes/39/39-26-711.8/2#aircraft_purchase_affidavit_required
    reason: The affidavit requirement is subject to the department's determination
      under section 39-26-730 (2), for which no RuleSpec source is available.
rules:
- name: removal_after_sale_limit
  kind: parameter
  dtype: Count
  source: 39-26-711.8(1)(c)(I)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-26-711.8
          excerpt: One hundred twenty days after the date of the sale.
  versions:
  - effective_from: '2014-07-01'
    formula: '120'
- name: removal_after_work_completion_limit
  kind: parameter
  dtype: Count
  source: 39-26-711.8(1)(c)(II)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-26-711.8
          excerpt: Thirty days after the completion of maintenance, interior refurbishment,
            paint, or engine work.
  versions:
  - effective_from: '2014-07-01'
    formula: '30'
- name: maximum_aircraft_days_in_state_per_post_removal_calendar_year
  kind: parameter
  dtype: Count
  source: 39-26-711.8(d)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-26-711.8
          excerpt: The aircraft will not be in the state more than seventy-three days.
  versions:
  - effective_from: '2014-07-01'
    formula: '73'
- name: post_removal_calendar_year_presence_limit
  kind: parameter
  dtype: Count
  source: 39-26-711.8(d)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-26-711.8
          excerpt: In any of the three calendar years following the calendar year
            in which the aircraft is removed.
  versions:
  - effective_from: '2014-07-01'
    formula: '3'
- name: aircraft_removal_is_timely
  kind: derived
  entity: Asset
  dtype: Judgment
  period: Year
  source: 39-26-711.8(1)(c)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/statute/39/39-26-711.8
  versions:
  - effective_from: '2014-07-01'
    formula: 'aircraft_days_after_sale_before_removal <= removal_after_sale_limit

      or aircraft_days_after_work_completion_before_removal <= removal_after_work_completion_limit'
- name: aircraft_complies_with_post_removal_presence_limit
  kind: derived
  entity: Asset
  dtype: Judgment
  period: Year
  source: 39-26-711.8(d)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/statute/39/39-26-711.8
  versions:
  - effective_from: '2014-07-01'
    formula: 'aircraft_days_in_state_in_first_calendar_year_following_removal <= maximum_aircraft_days_in_state_per_post_removal_calendar_year

      and aircraft_days_in_state_in_second_calendar_year_following_removal <= maximum_aircraft_days_in_state_per_post_removal_calendar_year

      and aircraft_days_in_state_in_third_calendar_year_following_removal <= maximum_aircraft_days_in_state_per_post_removal_calendar_year'
- name: aircraft_presence_is_in_state_for_exemption
  kind: derived
  entity: Asset
  dtype: Judgment
  period: Day
  source: 39-26-711.8(3)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: definition
        source:
          corpus_citation_path: us-co/statute/39/39-26-711.8
          excerpt: An aircraft that is hangared or parked overnight shall be considered
            to be in the state.
  versions:
  - effective_from: '2014-07-01'
    formula: 'aircraft_is_hangared_or_parked_overnight

      or aircraft_is_otherwise_in_state'
- name: on_demand_air_carrier_aircraft_sale_exempt_from_part_1_and_part_2_taxation
  kind: derived
  entity: Asset
  dtype: Judgment
  period: Year
  source: 39-26-711.8(1)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/statute/39/39-26-711.8
  versions:
  - effective_from: '2014-07-01'
    formula: 'sale_occurs_during_temporary_exemption_period

      and aircraft_is_purchased_for_use_by_on_demand_air_carrier

      and aircraft_remains_in_state_only_for_final_assembly_maintenance_modification_or_completion

      and aircraft_removal_is_timely

      and aircraft_complies_with_post_removal_presence_limit'
