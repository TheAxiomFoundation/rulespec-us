format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-603
  summary: |-
    Signing by the person required to make oath satisfies an oath-required return when it contains or is verified by a written declaration made under penalties of perjury in the second degree. An individual who willfully makes and signs a materially untruthful return is guilty of perjury in the second degree.
rules:
  - name: return_signing_satisfies_oath_requirement
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-22-603
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-22-603
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          return_is_required_to_be_made_under_oath_by_person
          and person_signs_return
          and return_contains_or_is_verified_by_written_declaration_made_under_penalties_of_second_degree_perjury
  - name: individual_is_guilty_of_second_degree_perjury_for_return
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-22-603
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-22-603
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_willfully_makes_and_signs_return
          and person_does_not_believe_return_true_and_correct_as_to_every_material_matter
