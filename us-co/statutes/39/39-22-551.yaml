format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-551
  summary: |-
    “Applicable percentage means thirty percent, except as provided in subsection (3)(b)(II).” The section also defines program terms and establishes an industrial-facility income-tax credit.
  deferred_outputs:
    - output: us-co:statutes/39/39-22-551/b#certified_greenhouse_gas_emissions_reduction_improvements
      reason: Certification depends on standards established and applied by the Colorado energy office.
    - output: us-co:statutes/39/39-22-551/c#colorado_energy_office
      reason: Institutional definition is documentary and does not create a computable policy output.
    - output: us-co:statutes/39/39-22-551/d#department
      reason: Institutional definition is documentary and does not create a computable policy output.
    - output: us-co:statutes/39/39-22-551/e#greenhouse_gas_emissions_reduction_improvements
      reason: Qualification depends on measurable emissions reductions, enumerated equipment categories, and office standards not represented by an executable relation.
    - output: us-co:statutes/39/39-22-551/f#greenhouse_gas_emissions_reduction_plan
      reason: Plan sufficiency and compliance depend on office standards and project documentation.
    - output: us-co:statutes/39/39-22-551/g#industrial_facility
      reason: The definition requires classification of principal trade or business activity and exclusions not represented by available canonical concepts.
    - output: us-co:statutes/39/39-22-551/h#industrial_process_greenhouse_gas_emissions
      reason: The definition is a technical emissions classification without an available executable emissions relation.
    - output: us-co:statutes/39/39-22-551/j#owner
      reason: Owner status depends on project ownership or development, implementation at a qualified industrial facility, and tax status under article 22.
rules:
  - name: applicable_percentage
    kind: parameter
    dtype: Rate
    source: 39-22-551(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-551
              excerpt: "Applicable percentage means thirty percent"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          0.30
