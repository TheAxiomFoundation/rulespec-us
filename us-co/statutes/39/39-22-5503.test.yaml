- name: annual_allocation_ceiling_includes_unallocated_and_recaptured_credits
  period:
    period_kind: custom
    name: calendar_year
    start: '2028-01-01'
    end: '2028-12-31'
  input:
    us-co:statutes/39/39-22-5503#input.credit_allocation_calendar_year: 2028
    us-co:statutes/39/39-22-5503#input.unallocated_credits_from_immediately_preceding_calendar_year: 1000000
    us-co:statutes/39/39-22-5503#input.credits_recaptured_or_returned_in_calendar_year: 500000
  output:
    us-co:statutes/39/39-22-5503#annual_credit_allocation_ceiling: 12500000
    us-co:statutes/39/39-22-5503#aggregate_credit_allocation_period_cap: 30000000
- name: qualified_allocated_credit_uses_first_year_accelerated_percentage
  period:
    period_kind: tax_year
    start: '2025-01-01'
    end: '2025-12-31'
  input:
    us-co:statutes/39/39-22-5503#input.taxpayer_is_qualified: true
    us-co:statutes/39/39-22-5503#input.credit_is_allocated_by_authority: true
    us-co:statutes/39/39-22-5503#input.allocated_credit_amount: 100000
    us-co:statutes/39/39-22-5503#input.credit_period_year_number: 1
  output:
    us-co:statutes/39/39-22-5503#allocated_credit_claim_amount: 70000
- name: unqualified_taxpayer_cannot_claim_allocated_credit
  period:
    period_kind: tax_year
    start: '2025-01-01'
    end: '2025-12-31'
  input:
    us-co:statutes/39/39-22-5503#input.taxpayer_is_qualified: false
    us-co:statutes/39/39-22-5503#input.credit_is_allocated_by_authority: true
    us-co:statutes/39/39-22-5503#input.allocated_credit_amount: 100000
    us-co:statutes/39/39-22-5503#input.credit_period_year_number: 1
  output:
    us-co:statutes/39/39-22-5503#allocated_credit_claim_amount: 0
- name: credit_must_be_allocated_before_it_can_be_claimed
  period:
    period_kind: tax_year
    start: '2025-01-01'
    end: '2025-12-31'
  input:
    us-co:statutes/39/39-22-5503#input.taxpayer_is_qualified: true
    us-co:statutes/39/39-22-5503#input.credit_is_allocated_by_authority: false
    us-co:statutes/39/39-22-5503#input.allocated_credit_amount: 100000
    us-co:statutes/39/39-22-5503#input.credit_period_year_number: 1
  output:
    us-co:statutes/39/39-22-5503#allocated_credit_claim_amount: 0
