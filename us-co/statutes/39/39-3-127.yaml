format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-3-127
  summary: |-
    Property of a qualifying county-fair association is exempt from property tax while actually and exclusively used for that purpose and not for pecuniary profit.
rules:
  - name: county_fair_association_property_exempt_from_property_tax
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-3-127
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-3-127
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          property_is_owned_by_association_duly_organized_under_state_law_to_hold_county_fairs_promoting_agriculture_horticulture_animal_husbandry_home_economics_and_mechanical_attributes
          and property_is_actually_and_exclusively_used_for_county_fair_purpose
          and property_is_not_used_for_pecuniary_profit
