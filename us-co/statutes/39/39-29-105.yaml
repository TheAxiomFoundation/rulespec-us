format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-29-105
  summary: |-
    For taxable years commencing on or after January 1, 2000, a tax is imposed on gross income attributable to oil and gas severed in Colorado at rates of 2%, 3%, 4%, and 5%. Oil wells producing fifteen barrels per day or less and gas wells producing ninety thousand cubic feet per day or less are exempt. The ad valorem tax credit is 87.5% before 2024, 75% from 2024 through 2026, 87.5% in 2027, and, beginning in 2028, is calculated for each nonexempt well as C = 0.7656 x GI x ML. Before 2000, oil wells producing ten barrels per day or less were exempt.
rules:
  - name: first_gross_income_band_upper_bound
    kind: parameter
    dtype: Money
    unit: USD
    source: C.R.S. 39-29-105(1)(a)-(b), gross-income rate tables
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-29-105
              excerpt: "Under $25,000 2%"
    versions:
      - effective_from: '1987-01-01'
        formula: |-
          25000

  - name: second_gross_income_band_lower_bound
    kind: parameter
    dtype: Money
    unit: USD
    source: C.R.S. 39-29-105(1)(a)-(b), gross-income rate tables
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-29-105
              excerpt: "$25,000 and under $100,000 3%"
    versions:
      - effective_from: '1987-01-01'
        formula: |-
          25000

  - name: second_gross_income_band_upper_bound
    kind: parameter
    dtype: Money
    unit: USD
    source: C.R.S. 39-29-105(1)(a)-(b), gross-income rate tables
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-29-105
              excerpt: "$25,000 and under $100,000 3%"
    versions:
      - effective_from: '1987-01-01'
        formula: |-
          100000

  - name: third_gross_income_band_lower_bound
    kind: parameter
    dtype: Money
    unit: USD
    source: C.R.S. 39-29-105(1)(a)-(b), gross-income rate tables
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-29-105
              excerpt: "$100,000 and under $300,000 4%"
    versions:
      - effective_from: '1987-01-01'
        formula: |-
          100000

  - name: third_gross_income_band_upper_bound
    kind: parameter
    dtype: Money
    unit: USD
    source: C.R.S. 39-29-105(1)(a)-(b), gross-income rate tables
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-29-105
              excerpt: "$100,000 and under $300,000 4%"
    versions:
      - effective_from: '1987-01-01'
        formula: |-
          300000

  - name: fourth_gross_income_band_lower_bound
    kind: parameter
    dtype: Money
    unit: USD
    source: C.R.S. 39-29-105(1)(a)-(b), gross-income rate tables
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-29-105
              excerpt: "$300,000 and over 5%"
    versions:
      - effective_from: '1987-01-01'
        formula: |-
          300000

  - name: severance_tax_rate_by_gross_income_band
    kind: parameter
    dtype: Rate
    indexed_by: gross_income_band
    source: C.R.S. 39-29-105(1)(a)-(b), gross-income rate tables
    metadata:
      proof:
        atoms:
          - path: versions[0].values
            kind: parameter_table
            source:
              corpus_citation_path: us-co/statute/39/39-29-105
              table:
                header: "gross-income severance tax rates"
                row_key: "gross-income band"
                column_key: "tax rate"
              excerpt: "Under $25,000 2%; $25,000 and under $100,000 3%; $100,000 and under $300,000 4%; $300,000 and over 5%"
    versions:
      - effective_from: '1987-01-01'
        values:
          0: 0.02
          1: 0.03
          2: 0.04
          3: 0.05

  - name: historical_oil_well_daily_production_exemption_limit
    kind: parameter
    dtype: Decimal
    source: C.R.S. 39-29-105(1)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-29-105
              excerpt: "ten barrels per day or less of crude oil"
    versions:
      - effective_from: '1987-01-01'
        formula: |-
          10

  - name: oil_well_daily_production_exemption_limit
    kind: parameter
    dtype: Decimal
    source: C.R.S. 39-29-105(1)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-29-105
              excerpt: "fifteen barrels per day or less"
    versions:
      - effective_from: '2000-01-01'
        formula: |-
          15

  - name: gas_well_daily_production_exemption_limit
    kind: parameter
    dtype: Decimal
    source: C.R.S. 39-29-105(1)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-29-105
              excerpt: "ninety thousand cubic feet or less of gas per day"
    versions:
      - effective_from: '2000-01-01'
        formula: |-
          90000

  - name: ad_valorem_tax_credit_percentage
    kind: parameter
    dtype: Rate
    source: C.R.S. 39-29-105(2)(a), (2)(b)(I), and (2)(b)(II)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: effective_period
            source:
              corpus_citation_path: us-co/statute/39/39-29-105
              excerpt: "eighty-seven and one-half percent"
          - path: versions[1].formula
            kind: effective_period
            source:
              corpus_citation_path: us-co/statute/39/39-29-105
              excerpt: "on or after January 1, 2024, but prior to January 1, 2027 ... seventy-five percent"
          - path: versions[2].formula
            kind: effective_period
            source:
              corpus_citation_path: us-co/statute/39/39-29-105
              excerpt: "on or after January 1, 2027, but prior to January 1, 2028 ... eighty-seven and five-tenths percent"
    versions:
      - effective_from: '1987-01-01'
        formula: |-
          0.875
      - effective_from: '2024-01-01'
        formula: |-
          0.75
      - effective_from: '2027-01-01'
        formula: |-
          0.875

  - name: well_mill_levy_credit_factor
    kind: parameter
    dtype: Rate
    source: C.R.S. 39-29-105(2)(d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-29-105
              excerpt: "C = 0.7656 x GI x ML"
    versions:
      - effective_from: '2028-01-01'
        formula: |-
          0.7656

  - name: historical_oil_well_severance_tax_exemption_applies
    kind: derived
    entity: Well
    dtype: Judgment
    period: Year
    source: C.R.S. 39-29-105(1)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-29-105
              excerpt: "wells that produce ten barrels per day or less of crude oil for the average of all producing days"
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:statutes/39/39-29-105#historical_oil_well_daily_production_exemption_limit
              output: historical_oil_well_daily_production_exemption_limit
              hash: sha256:local
    versions:
      - effective_from: '1987-01-01'
        formula: |-
          well_produces_crude_oil
          and average_crude_oil_barrels_per_producing_day <= historical_oil_well_daily_production_exemption_limit

  - name: oil_well_severance_tax_exemption_applies
    kind: derived
    entity: Well
    dtype: Judgment
    period: Year
    source: C.R.S. 39-29-105(1)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-29-105
              excerpt: "oil produced from any wells that produce fifteen barrels per day or less"
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:statutes/39/39-29-105#oil_well_daily_production_exemption_limit
              output: oil_well_daily_production_exemption_limit
              hash: sha256:local
    versions:
      - effective_from: '2000-01-01'
        formula: |-
          well_produces_oil
          and average_oil_barrels_per_producing_day <= oil_well_daily_production_exemption_limit

  - name: gas_well_severance_tax_exemption_applies
    kind: derived
    entity: Well
    dtype: Judgment
    period: Year
    source: C.R.S. 39-29-105(1)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-29-105
              excerpt: "wells that produce ninety thousand cubic feet or less of gas per day"
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:statutes/39/39-29-105#gas_well_daily_production_exemption_limit
              output: gas_well_daily_production_exemption_limit
              hash: sha256:local
    versions:
      - effective_from: '2000-01-01'
        formula: |-
          well_produces_gas
          and average_gas_cubic_feet_per_producing_day <= gas_well_daily_production_exemption_limit

  - name: well_severance_tax_exemption_applies
    kind: derived
    entity: Well
    dtype: Judgment
    period: Year
    source: C.R.S. 39-29-105(1)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-29-105
              excerpt: "oil produced from any wells ... and gas produced from wells ... shall be exempt from the tax"
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:statutes/39/39-29-105#oil_well_severance_tax_exemption_applies
              output: oil_well_severance_tax_exemption_applies
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:statutes/39/39-29-105#gas_well_severance_tax_exemption_applies
              output: gas_well_severance_tax_exemption_applies
              hash: sha256:local
    versions:
      - effective_from: '2000-01-01'
        formula: |-
          oil_well_severance_tax_exemption_applies
          or gas_well_severance_tax_exemption_applies

  - name: taxable_gross_income_from_oil_and_gas
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: C.R.S. 39-29-105(1)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-29-105
              excerpt: "tax upon the gross income attributable to the sale of oil and gas ... except that oil produced ... and gas produced ... shall be exempt"
    versions:
      - effective_from: '2000-01-01'
        formula: |-
          max(0, gross_income_attributable_to_sale_of_oil_and_gas - gross_income_attributable_to_exempt_oil_and_gas_production)

  - name: gross_income_band
    kind: derived
    entity: TaxUnit
    dtype: Integer
    period: Year
    source: C.R.S. 39-29-105(1)(a)-(b), gross-income rate tables
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: ordering
            source:
              corpus_citation_path: us-co/statute/39/39-29-105
              excerpt: "Under $25,000; $25,000 and under $100,000; $100,000 and under $300,000; $300,000 and over"
    versions:
      - effective_from: '2000-01-01'
        formula: |-
          if taxable_gross_income_from_oil_and_gas < first_gross_income_band_upper_bound: 0 else: if taxable_gross_income_from_oil_and_gas >= second_gross_income_band_lower_bound and taxable_gross_income_from_oil_and_gas < second_gross_income_band_upper_bound: 1 else: if taxable_gross_income_from_oil_and_gas >= third_gross_income_band_lower_bound and taxable_gross_income_from_oil_and_gas < third_gross_income_band_upper_bound: 2 else: 3

  - name: applicable_severance_tax_rate
    kind: derived
    entity: TaxUnit
    dtype: Rate
    period: Year
    source: C.R.S. 39-29-105(1)(b), gross-income rate table
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-29-105
              excerpt: "The tax for oil and gas shall be at the following rates of the gross income"
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:statutes/39/39-29-105#severance_tax_rate_by_gross_income_band
              output: severance_tax_rate_by_gross_income_band
              hash: sha256:local
    versions:
      - effective_from: '2000-01-01'
        formula: |-
          severance_tax_rate_by_gross_income_band[gross_income_band]

  - name: oil_and_gas_severance_tax_before_credit
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: C.R.S. 39-29-105(1)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-29-105
              excerpt: "tax upon the gross income attributable to the sale of oil and gas"
    versions:
      - effective_from: '2000-01-01'
        formula: |-
          taxable_gross_income_from_oil_and_gas * applicable_severance_tax_rate

  - name: ad_valorem_tax_credit
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: C.R.S. 39-29-105(2)(a)-(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-29-105
              excerpt: "an amount equal to ... percent of all ad valorem taxes assessed ... or paid"
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:statutes/39/39-29-105#ad_valorem_tax_credit_percentage
              output: ad_valorem_tax_credit_percentage
              hash: sha256:local
    versions:
      - effective_from: '1987-01-01'
        formula: |-
          max(0, eligible_ad_valorem_taxes_assessed_or_paid) * ad_valorem_tax_credit_percentage

  - name: oil_and_gas_severance_tax_after_ad_valorem_credit
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: C.R.S. 39-29-105(1)(b) and (2)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-29-105
              excerpt: "allowed, as a credit against the tax computed in accordance with subsection (1)(b)"
    versions:
      - effective_from: '2000-01-01'
        formula: |-
          max(0, oil_and_gas_severance_tax_before_credit - ad_valorem_tax_credit)

  - name: well_mill_levy_credit
    kind: derived
    entity: Well
    dtype: Money
    period: Year
    unit: USD
    source: C.R.S. 39-29-105(2)(d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-29-105
              excerpt: "for each well that is not exempt ... C = 0.7656 x GI x ML"
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:statutes/39/39-29-105#well_mill_levy_credit_factor
              output: well_mill_levy_credit_factor
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:statutes/39/39-29-105#well_severance_tax_exemption_applies
              output: well_severance_tax_exemption_applies
              hash: sha256:local
    versions:
      - effective_from: '2028-01-01'
        formula: |-
          if well_severance_tax_exemption_applies: 0 else: well_mill_levy_credit_factor * gross_income_attributable_to_well * total_mill_levies_at_well_location
