format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-26-717
  summary: |-
    Sales of specified medical items, glucose, testing supplies, prosthetic devices, corrective eyewear, period products, and incontinence products are exempt from sales tax. Storage, use, or consumption of an item exempt under subsection (2) is exempt from use tax.
  deferred_outputs:
    - output: us-co:statutes/39/39-26-717/a#durable_medical_equipment_definition
      reason: Durable medical equipment requires a prescription order, whose operative practitioner and prescription definitions depend on unavailable section 12-280-103.
    - output: us-co:statutes/39/39-26-717/b#mobility_enhancing_equipment_definition
      reason: Mobility enhancing equipment requires a prescription order, whose operative practitioner and prescription definitions depend on unavailable section 12-280-103.
    - output: us-co:statutes/39/39-26-717/e#prescription_order_definition
      reason: Prescription-order requirements depend on the unavailable statutory meanings of practitioner and prescription in section 12-280-103.
rules:
  - name: glucose_sale_is_sales_tax_exempt
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: 39-26-717(2)(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-26-717
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          payment_is_glucose_usable_for_treatment_of_insulin_reactions

