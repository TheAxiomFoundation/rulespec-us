format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-21-105
  summary: |-
    A taxpayer may appeal within thirty days after mailing of a final determination. A disputed amount may be deposited within fifteen days after filing an appeal, stopping further interest during the action. Trial notice must be mailed at least twenty days before trial. Security requirements include filing within fifteen days and an amount equal to twice the contested taxes, interest, and other charges.
  deferred_outputs:
    - output: us-co:statutes/39/39-21-105#district_court_appeal_entitlement
      reason: Determining whether a final determination was issued pursuant to sections 39-21-103, 39-21-104, or 39-21-104.5 requires unavailable or non-exported upstream legal concepts.
    - output: us-co:statutes/39/39-21-105#decision_104_5_appeal_security_requirement
      reason: The qualifying alternative deposit or certificate requirement depends on section 11-35-101(1), for which no RuleSpec context is supplied.
      source_values:
        - us-co:statutes/39/39-21-105#decision_104_5_appeal_security_filing_deadline_days
        - us-co:statutes/39/39-21-105#decision_104_5_appeal_security_multiplier
    - output: us-co:statutes/39/39-21-105#higher_court_review_security_requirement
      reason: The qualifying alternative deposit or certificate requirement depends on section 11-35-101(1), for which no RuleSpec context is supplied.
      source_values:
        - us-co:statutes/39/39-21-105#higher_court_review_security_filing_deadline_days
        - us-co:statutes/39/39-21-105#higher_court_review_security_multiplier
rules:
  - name: final_determination_appeal_filing_deadline_days
    kind: parameter
    dtype: Count
    source: C.R.S. 39-21-105(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-21-105
              excerpt: "within thirty days after the mailing"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: decision_104_5_appeal_security_filing_deadline_days
    kind: parameter
    dtype: Count
    source: C.R.S. 39-21-105(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-21-105
              excerpt: "Within fifteen days after filing an appeal"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          15

  - name: decision_104_5_appeal_security_multiplier
    kind: parameter
    dtype: Decimal
    source: C.R.S. 39-21-105(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-21-105
              excerpt: "in twice the amount of the taxes, interest, and other charges"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          2

  - name: disputed_amount_deposit_deadline_days
    kind: parameter
    dtype: Count
    source: C.R.S. 39-21-105(5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-21-105
              excerpt: "within fifteen days after filing an appeal"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          15

  - name: trial_notice_minimum_days_before_trial
    kind: parameter
    dtype: Count
    source: C.R.S. 39-21-105(6)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-21-105
              excerpt: "at least twenty days before the date of the trial"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          20

  - name: higher_court_review_security_filing_deadline_days
    kind: parameter
    dtype: Count
    source: C.R.S. 39-21-105(8)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-21-105
              excerpt: "no later than fifteen days after the ruling"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          15

  - name: higher_court_review_security_multiplier
    kind: parameter
    dtype: Decimal
    source: C.R.S. 39-21-105(8)(a)(I)-(II)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-21-105
              excerpt: "twice the amount of the taxes, interest, and other charges"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          2

  - name: appeal_filing_is_timely
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Day
    source: C.R.S. 39-21-105(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-21-105
              excerpt: "may appeal ... within thirty days after the mailing"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-21-105
              excerpt: "within thirty days after the mailing"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          final_determination_has_been_mailed
          and days_after_mailing_of_final_determination <= final_determination_appeal_filing_deadline_days

  - name: deposited_disputed_amount_stops_interest_accrual
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Day
    source: C.R.S. 39-21-105(5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-21-105
              excerpt: "If such amount is so deposited, no further interest accrues"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-21-105
              excerpt: "within fifteen days after filing an appeal"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          district_court_appeal_is_pending
          and disputed_amount_is_deposited_with_executive_director
          and days_after_filing_of_appeal <= disputed_amount_deposit_deadline_days

  - name: trial_notice_is_timely_and_complete
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Day
    source: C.R.S. 39-21-105(6)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-21-105
              excerpt: "Notice of the date of trial must be mailed to the taxpayer and to the executive director"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-21-105
              excerpt: "at least twenty days before the date of the trial"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          trial_notice_is_mailed_to_taxpayer
          and trial_notice_is_mailed_to_executive_director
          and days_before_trial_when_notice_is_mailed >= trial_notice_minimum_days_before_trial
