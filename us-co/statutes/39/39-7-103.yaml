format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-7-103
  summary: |-
    Surface oil and gas well equipment, submersible pumps, and sucker rods on oil and gas leaseholds or lands shall be separately valued as personal property. Other subsurface equipment, including casing and tubing, shall be valued as part of the leasehold or land.
rules:
  - name: surface_equipment_requires_separate_personal_property_valuation
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. 39-7-103
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-7-103
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (asset_is_surface_oil_and_gas_well_equipment
          or asset_is_submersible_pump_or_sucker_rod)
          and asset_is_located_on_oil_and_gas_leasehold_or_land
  - name: other_subsurface_equipment_valued_as_part_of_leasehold_or_land
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. 39-7-103
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-7-103
              excerpt: "All other subsurface oil and gas well equipment, including casing and tubing, shall be valued as part of the leasehold or land"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_other_subsurface_oil_and_gas_well_equipment
