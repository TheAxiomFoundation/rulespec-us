format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-11-102
  summary: |-
    Notice publication and posting requirements include specified lead times and publication frequencies. A mobile or manufactured home is exempt from newspaper publication when the distraint warrant was delivered and the treasurer publishes the sale notice on the treasurer's website.
  deferred_outputs:
    - output: us-co:statutes/39/39-11-102/1#tax_lien_sale_notice_publication_and_posting_required
      reason: The required newspaper is selected pursuant to section 39-11-105, which is not available as copied RuleSpec context.
      source_values:
        - us-co:statutes/39/39-11-102#first_publication_minimum_lead_time_weeks
        - us-co:statutes/39/39-11-102#posted_notice_minimum_lead_time_weeks
        - us-co:statutes/39/39-11-102#weekly_newspaper_successive_issues_required
        - us-co:statutes/39/39-11-102#daily_newspaper_publications_required
    - output: us-co:statutes/39/39-11-102/b#sale_notice_includes_sale_date_time_place_and_electronic_address
      reason: The notice-content requirement is an administrative furnishing duty whose required date, time, place, and conditional electronic address are not representable as a scalar RuleSpec output.
    - output: us-co:statutes/39/39-11-102/c#sale_notice_includes_public_computer_workstation_and_access_information
      reason: The notice-content requirement is an administrative furnishing duty whose required location and access instructions are not representable as a scalar RuleSpec output.
    - output: us-co:statutes/39/39-11-102/d#sale_notice_includes_electronic_bidding_rules_posting_statement
      reason: The notice-content requirement is an administrative furnishing duty whose required conditional statement is not representable as a scalar RuleSpec output.
      source_values:
        - us-co:statutes/39/39-11-102#electronic_bidding_rules_posting_lead_time_weeks
rules:
  - name: first_publication_minimum_lead_time_weeks
    kind: parameter
    dtype: Count
    source: 39-11-102(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-11-102
              excerpt: "the first publication being at least four weeks before the date of sale"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          4

  - name: posted_notice_minimum_lead_time_weeks
    kind: parameter
    dtype: Count
    source: 39-11-102(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-11-102
              excerpt: "for not less than four weeks before the date of sale"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          4

  - name: weekly_newspaper_successive_issues_required
    kind: parameter
    dtype: Count
    source: 39-11-102(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-11-102
              excerpt: "published in three successive weekly issues"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          3

  - name: daily_newspaper_publications_required
    kind: parameter
    dtype: Count
    source: 39-11-102(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-11-102
              excerpt: "published only three times, once each week"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          3

  - name: electronic_bidding_rules_posting_lead_time_weeks
    kind: parameter
    dtype: Count
    source: 39-11-102(d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-11-102
              excerpt: "at least two weeks before the date of sale"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          2

  - name: property_is_mobile_or_manufactured_home
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: 39-11-102(3)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-11-102
              excerpt: "mobile home includes a manufactured\nhome"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          property_is_mobile_home or property_is_manufactured_home

  - name: mobile_home_newspaper_publication_not_required
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: 39-11-102(3)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-11-102
              excerpt: "Publication in a newspaper under subsection (1) of this section is not\nrequired for a mobile home if"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          property_is_mobile_or_manufactured_home
          and mobile_home_distraint_warrant_delivered_to_owner_or_agent
          and treasurer_publishes_sale_notice_on_website
