format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-7-101
  summary: |-
    “Selling price at the wellhead means the net taxable revenues realized by the taxpayer”; net taxable revenues equal gross lease revenues minus taxpayer-borne gathering, transportation, manufacturing, and processing costs. A late statement may incur $100 per delinquent day, capped at $3,000 annually. A willful failure or refusal to provide requested documentation may incur $100 per day, capped at $3,000 annually.
rules:
  - name: net_taxable_revenues_at_wellhead
    kind: derived
    entity: Asset
    dtype: Money
    period: Year
    unit: USD
    source: 39-7-101(d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-7-101
              excerpt: "The net taxable revenues shall be equal to the gross lease revenues, minus deductions for gathering, transportation, manufacturing, and processing costs."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          gross_lease_revenues
          - gathering_transportation_manufacturing_and_processing_costs_borne_by_taxpayer

  - name: late_filing_penalty_per_delinquent_day
    kind: parameter
    dtype: Money
    unit: USD
    source: 39-7-101(2)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-7-101
              excerpt: "one hundred dollars for each calendar day the statement is delinquent"
    versions:
      - effective_from: '1997-01-01'
        formula: |-
          100

  - name: annual_late_filing_penalty_cap
    kind: parameter
    dtype: Money
    unit: USD
    source: 39-7-101(2)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-7-101
              excerpt: "such late filing penalty shall not exceed three thousand dollars in any calendar year"
    versions:
      - effective_from: '1997-01-01'
        formula: |-
          3000

  - name: maximum_late_filing_penalty
    kind: derived
    entity: Asset
    dtype: Money
    period: Year
    unit: USD
    source: 39-7-101(2)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-7-101
              excerpt: "the assessor may impose ... a late filing penalty in the amount of one hundred dollars for each calendar day the statement is delinquent; except that such late filing penalty shall not exceed three thousand dollars"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-7-101
    versions:
      - effective_from: '1997-01-01'
        formula: |-
          min(
            late_filing_penalty_per_delinquent_day * statement_delinquent_days,
            annual_late_filing_penalty_cap
          )

  - name: documentation_noncompliance_fine_per_day
    kind: parameter
    dtype: Money
    unit: USD
    source: 39-7-101(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-7-101
              excerpt: "may be assessed a fine of one hundred dollars for each day of such willful failure or refusal"
    versions:
      - effective_from: '1997-01-01'
        formula: |-
          100

  - name: annual_documentation_noncompliance_fine_cap
    kind: parameter
    dtype: Money
    unit: USD
    source: 39-7-101(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-7-101
              excerpt: "shall not exceed three thousand dollars"
    versions:
      - effective_from: '1997-01-01'
        formula: |-
          3000

  - name: maximum_documentation_noncompliance_fine
    kind: derived
    entity: Asset
    dtype: Money
    period: Year
    unit: USD
    source: 39-7-101(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-7-101
              excerpt: "Any owner or operator who willfully fails or refuses to comply ... may be assessed a fine of one hundred dollars for each day ... The total amount of all fines ... in any calendar year shall not exceed three thousand dollars."
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-7-101
    versions:
      - effective_from: '1997-01-01'
        formula: |-
          min(
            documentation_noncompliance_fine_per_day
            * willful_documentation_noncompliance_days,
            annual_documentation_noncompliance_fine_cap
          )
