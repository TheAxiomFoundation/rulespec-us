- name: colorado_source_income_includes_colorado_property_income
  period:
    period_kind: tax_year
    start: '2024-01-01'
    end: '2024-12-31'
  input:
    us-co:statutes/39/39-22-109#input.income_attributable_to_colorado_real_or_tangible_personal_property: true
    us-co:statutes/39/39-22-109#input.income_attributable_to_business_trade_profession_or_occupation_carried_on_in_colorado: false
    us-co:statutes/39/39-22-109#input.income_attributable_to_purchase_and_sale_of_property_for_own_account: false
    ? us-co:statutes/39/39-22-109#input.individual_is_dealer_holding_property_primarily_for_sale_to_customers_in_ordinary_course_of_trade_or_business
    : false
    us-co:statutes/39/39-22-109#input.income_attributable_to_colorado_partnership_or_limited_liability_company_share: false
    us-co:statutes/39/39-22-109#input.income_attributable_to_colorado_estate_or_trust_share: false
    us-co:statutes/39/39-22-109#input.income_attributable_to_intangible_property_employed_in_colorado_business: false
    us-co:statutes/39/39-22-109#input.income_attributable_to_colorado_subchapter_s_corporation_share: false
    ? us-co:statutes/39/39-22-109#input.united_states_armed_forces_compensation_paid_for_service_performed_by_individual_not_domiciled_in_colorado
    : false
  output:
    us-co:statutes/39/39-22-109#income_derived_from_colorado_sources: holds
- name: armed_forces_compensation_is_excluded_from_colorado_source_income
  period:
    period_kind: tax_year
    start: '2024-01-01'
    end: '2024-12-31'
  input:
    us-co:statutes/39/39-22-109#input.income_attributable_to_colorado_real_or_tangible_personal_property: true
    us-co:statutes/39/39-22-109#input.income_attributable_to_business_trade_profession_or_occupation_carried_on_in_colorado: false
    us-co:statutes/39/39-22-109#input.income_attributable_to_purchase_and_sale_of_property_for_own_account: false
    ? us-co:statutes/39/39-22-109#input.individual_is_dealer_holding_property_primarily_for_sale_to_customers_in_ordinary_course_of_trade_or_business
    : false
    us-co:statutes/39/39-22-109#input.income_attributable_to_colorado_partnership_or_limited_liability_company_share: false
    us-co:statutes/39/39-22-109#input.income_attributable_to_colorado_estate_or_trust_share: false
    us-co:statutes/39/39-22-109#input.income_attributable_to_intangible_property_employed_in_colorado_business: false
    us-co:statutes/39/39-22-109#input.income_attributable_to_colorado_subchapter_s_corporation_share: false
    ? us-co:statutes/39/39-22-109#input.united_states_armed_forces_compensation_paid_for_service_performed_by_individual_not_domiciled_in_colorado
    : true
  output:
    us-co:statutes/39/39-22-109#income_derived_from_colorado_sources: not_holds
- name: separate_federal_returns_require_separate_colorado_taxable_income
  period:
    period_kind: tax_year
    start: '2024-01-01'
    end: '2024-12-31'
  input:
    us-co:statutes/39/39-22-109#input.both_taxpayers_are_nonresidents: true
    us-co:statutes/39/39-22-109#input.federal_taxable_income_is_determined_on_separate_federal_returns: true
    us-co:statutes/39/39-22-109#input.federal_taxable_income_is_determined_on_joint_federal_return: false
  output:
    us-co:statutes/39/39-22-109#separately_determined_colorado_taxable_income_applies: holds
    us-co:statutes/39/39-22-109#joint_colorado_nonresident_taxable_income_applies: not_holds
- name: joint_federal_return_requires_joint_colorado_nonresident_taxable_income
  period:
    period_kind: tax_year
    start: '2024-01-01'
    end: '2024-12-31'
  input:
    us-co:statutes/39/39-22-109#input.both_taxpayers_are_nonresidents: true
    us-co:statutes/39/39-22-109#input.federal_taxable_income_is_determined_on_separate_federal_returns: false
    us-co:statutes/39/39-22-109#input.federal_taxable_income_is_determined_on_joint_federal_return: true
  output:
    us-co:statutes/39/39-22-109#separately_determined_colorado_taxable_income_applies: not_holds
    us-co:statutes/39/39-22-109#joint_colorado_nonresident_taxable_income_applies: holds
