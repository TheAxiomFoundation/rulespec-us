format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-31-104.5
  summary: "\u201CQualified individual\u201D means a resident individual with a disability\
    \ during the entire income tax year who qualifies for full disability benefits.\
    \ For income tax years commencing on or after January 1, 2025, the section provides\
    \ a refundable income tax credit with income-based amount bands."
  deferred_outputs:
  - output: us-co:statutes/39/39-31-104.5/a#credit_definition
    reason: The definition identifies the credit created by this section but supplies
      no distinct computable output.
    source_values:
    - us-co:statutes/39/39-31-104.5#disability_credit_amount_adjustment_minimum_increase
    - us-co:statutes/39/39-31-104.5#disability_credit_income_adjustment_minimum_increase
  - output: us-co:statutes/39/39-31-104.5/b#inflation_definition
    reason: Inflation is defined by reference to the Denver-Aurora-Lakewood CPI or
      successor index; the required index series is not supplied in this source slice.
    source_values:
    - us-co:statutes/39/39-31-104.5#disability_credit_amount_adjustment_minimum_increase
    - us-co:statutes/39/39-31-104.5#disability_credit_income_adjustment_minimum_increase
  - output: us-co:statutes/39/39-31-104.5/4#disability_income_tax_credit
    reason: The final credit is barred when the qualified individual also claims the
      grant under section 39-31-101, but copied context does not export the required
      claimant-level grant-claim predicate.
    source_values:
    - us-co:statutes/39/39-31-104.5#disability_credit_amount_adjustment_minimum_increase
    - us-co:statutes/39/39-31-104.5#disability_credit_income_adjustment_minimum_increase
  - output: us-co:statutes/39/39-31-104.5/5#refundable_credit_excess
    reason: The final credit amount is deferred because the coordination prohibition
      in subsection (6) cannot be evaluated from available context.
    source_values:
    - us-co:statutes/39/39-31-104.5#disability_credit_amount_adjustment_minimum_increase
    - us-co:statutes/39/39-31-104.5#disability_credit_income_adjustment_minimum_increase
  - output: us-co:statutes/39/39-31-104.5/6#credit_claim_permitted
    reason: The required claimant-level predicate for a grant claimed under section
      39-31-101 is not exported by copied context.
    source_values:
    - us-co:statutes/39/39-31-104.5#disability_credit_amount_adjustment_minimum_increase
    - us-co:statutes/39/39-31-104.5#disability_credit_income_adjustment_minimum_increase
