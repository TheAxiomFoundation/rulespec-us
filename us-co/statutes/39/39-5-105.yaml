format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-5-105
  summary: |-
    Improvements are appraised separately from land, except that agricultural land, water rights, and nonbuilding improvements are appraised as a unit. Qualifying nonagricultural water rights and associated structures are appraised with the real property served as a unit.
rules:
  - name: improvement_appraised_separately_from_land
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. 39-5-105(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-5-105
              excerpt: "Improvements shall be appraised and valued separately from land, except improvements other than buildings on land which is used solely and exclusively for agricultural purposes."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_improvement
          and (
            asset_is_building
            or not land_used_solely_and_exclusively_for_agricultural_purposes
          )
  - name: agricultural_property_component_appraised_as_unit
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. 39-5-105(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-5-105
              excerpt: "the land, water rights, and improvements other than buildings shall be appraised and valued as a unit."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          land_used_solely_and_exclusively_for_agricultural_purposes
          and (
            asset_is_land
            or asset_is_water_right
            or asset_is_nonbuilding_improvement
          )
  - name: water_right_or_associated_structure_appraised_with_served_property
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. 39-5-105(1.1)(a)(I)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-5-105
              excerpt: "shall not be appraised\nand valued separately but shall be appraised and valued with the item of real\nproperty served as a unit."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_water_right_or_associated_water_structure
          and water_is_used_or_held_to_produce_or_exchange_water
          and water_supports_nonagricultural_qualifying_real_property
  - name: water_enabled_value_included_in_served_property_valuation
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. 39-5-105(1.1)(a)(II)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-5-105
              excerpt: "any increase in value of\nthe property served with water made available directly, or by exchange, by the use\nof any dam, ditch, pipeline, canal, flume, reservoir, bypass, conduit, well, pump, or\nother associated structure or device, as defined in article 92 of title 37, C.R.S., shall\nbe included in the valuation of the real property served by the water rights."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          water_right_or_associated_structure_appraised_with_served_property
          and served_property_value_increased_by_water
