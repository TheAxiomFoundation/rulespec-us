format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-28-306
  summary: |-
    “For each violation, the executive director may also impose a civil penalty in an amount not to exceed the greater of five hundred percent of the retail value of the cigarettes sold or five thousand dollars.” A person’s listed cigarette activity is unlawful when the person knows or should know the cigarettes are intended for distribution or sale in the state in violation of section 39-28-303 (3), and a violation is a class 2 misdemeanor. Cigarettes sold, offered for sale, or possessed for sale under the stated violation are contraband and subject to seizure, forfeiture, and destruction. A court determining a violation of part 3 must order resulting profits or benefits disgorged.
rules:
  - name: civil_penalty_retail_value_percentage_cap
    kind: parameter
    dtype: Rate
    source: C.R.S. § 39-28-306(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-28-306
              excerpt: "five hundred percent of the retail value of the cigarettes sold"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          5.00

  - name: civil_penalty_fixed_amount_alternative
    kind: parameter
    dtype: Money
    unit: USD
    source: C.R.S. § 39-28-306(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-28-306
              excerpt: "or five thousand dollars"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          5000

  - name: maximum_civil_penalty_per_violation
    kind: derived
    entity: StampingAgentViolation
    dtype: Money
    period: Year
    unit: USD
    source: C.R.S. § 39-28-306(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-28-306
              excerpt: "For each violation, the executive director may also impose a civil penalty in an amount not to exceed the greater of five hundred percent of the retail value of the cigarettes sold or five thousand dollars"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          max(
            civil_penalty_retail_value_percentage_cap * retail_value_of_cigarettes_sold,
            civil_penalty_fixed_amount_alternative
          )

  - name: unlawful_cigarette_activity_is_class_2_misdemeanor
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-28-306(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-28-306
              excerpt: "It is unlawful for a person to sell,\ndistribute, acquire, hold, own, possess, transport, import, or cause to be imported\ncigarettes that the person knows or should know are intended for distribution or\nsale in the state"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-28-306
              excerpt: "A violation of this section is a\nclass 2 misdemeanor."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_sells_distributes_acquires_holds_owns_possesses_transports_or_imports_cigarettes
          and person_knows_or_should_know_cigarettes_are_intended_for_distribution_or_sale_in_state_in_violation_of_stamping_requirement
