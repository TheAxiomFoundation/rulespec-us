format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-11-122
  summary: |-
    No sale of a certificate issued upon real estate with taxes in excess of ten thousand dollars due is valid unless the administrator approves the sale and its terms after required newspaper notice or, where no county newspaper is published, required posting.
rules:
  - name: unpaid_general_taxes_threshold_for_certificate_sale_approval
    kind: parameter
    dtype: Money
    unit: USD
    source: C.R.S. § 39-11-122
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-11-122
              excerpt: "taxes in excess of ten thousand dollars"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10000
  - name: tax_certificate_sale_requires_administrator_approval
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Day
    source: C.R.S. § 39-11-122
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-11-122
              excerpt: "no sale of any certificate of purchase issued upon any real estate upon which taxes in excess of ten thousand dollars are then due"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          unpaid_general_taxes_due_on_certificate_real_estate > unpaid_general_taxes_threshold_for_certificate_sale_approval
  - name: high_tax_certificate_sale_meets_additional_validity_conditions
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Day
    source: C.R.S. § 39-11-122
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-11-122
              excerpt: "no sale of any certificate of purchase issued upon any real estate upon which taxes in excess of ten thousand dollars are then due shall be valid unless and until the sale of said certificate and the terms of said sale are approved by the administrator"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-11-122
              excerpt: "after notice of said proposed sale and the terms thereof have been published in at least one issue of a newspaper published regularly in the county where said real estate is located, or if no newspaper is published in said county, then by posting notice"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          tax_certificate_sale_requires_administrator_approval
          and administrator_approved_proposed_sale_and_terms
          and (
            (newspaper_published_regularly_in_county
            and proposed_sale_and_terms_published_in_county_newspaper)
            or (
              not newspaper_published_regularly_in_county
              and proposed_sale_and_terms_posted_at_county_courthouse_and_two_other_public_places
            )
          )
