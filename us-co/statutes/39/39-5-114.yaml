format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-5-114
  summary: |-
    Taxable personal property not specifically classified on the personal property schedule shall be noted thereon; the notation is a sufficient description for valuation, unless the assessor requests detailed disclosure of its composition and uses.
rules:
  - name: schedule_notation_is_sufficient_property_description
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-5-114
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-5-114
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_owns_holds_or_controls_asset
          and asset_is_taxable_personal_property
          and not asset_is_specifically_classified_on_personal_property_schedule
          and asset_is_noted_on_personal_property_schedule
  - name: asset_composition_and_uses_must_be_disclosed_on_assessor_request
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-5-114
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-5-114
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_owns_holds_or_controls_asset
          and asset_is_taxable_personal_property
          and not asset_is_specifically_classified_on_personal_property_schedule
          and assessor_requests_asset_composition_and_uses_in_detail
