format: rulespec/v1
imports:
  - us-co:statutes/39/39-6-104#mine_subject_to_producing_nonproducing_classification
  - us-co:statutes/39/39-6-104#mine_is_in_nonproducing_assessment_class
module:
  summary: |-
    Mines excepted from section 39-6-104 and nonproducing mines shall be valued as other real property; such valuation requires the assessing officer's preponderant evidence that the cost, market, and income approaches result in uniform, just, and equal valuation.
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-6-111
rules:
  - name: mine_is_valued_as_other_real_property
    kind: derived
    entity: Mine
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-6-111(1)-(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-6-111
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:statutes/39/39-6-104#mine_subject_to_producing_nonproducing_classification
              output: mine_subject_to_producing_nonproducing_classification
              hash: sha256:22ec6b43af7ea0c8786fb9c3bc0d42c140bec0e216352efb777f00167c145512
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:statutes/39/39-6-104#mine_is_in_nonproducing_assessment_class
              output: mine_is_in_nonproducing_assessment_class
              hash: sha256:22ec6b43af7ea0c8786fb9c3bc0d42c140bec0e216352efb777f00167c145512
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (
            not mine_subject_to_producing_nonproducing_classification
            or mine_is_in_nonproducing_assessment_class
          )
          and assessing_officer_has_preponderant_evidence
          and cost_approach_results_in_uniform_just_and_equal_valuation
          and market_approach_results_in_uniform_just_and_equal_valuation
          and income_approach_results_in_uniform_just_and_equal_valuation
