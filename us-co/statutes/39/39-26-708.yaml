format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-26-708
  summary: |-
    “Public school means a school that serves any of grades kindergarten through twelve and that derives its support, in whole or in part, from revenue raised by a general state or school district tax. Public school includes a charter school” authorized by the listed authorities.
rules:
  - name: public_school
    kind: derived
    entity: School
    dtype: Judgment
    period: Year
    source: 39-26-708(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-26-708
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (school_serves_any_grades_kindergarten_through_twelve
          and school_derives_support_in_whole_or_part_from_general_state_or_school_district_tax)
          or charter_school_authorized_by_school_district_pursuant_to_title_22_article_30_5_part_1
          or charter_school_authorized_by_state_charter_school_institute_pursuant_to_title_22_article_30_5_part_5
          or charter_school_authorized_by_colorado_school_for_deaf_and_blind_pursuant_to_section_22_80_102_4
