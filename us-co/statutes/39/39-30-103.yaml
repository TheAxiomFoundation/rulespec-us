format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-30-103
  summary: |-
    “For tax years commencing on or after January 1, 2025, a business that holds a valid license pursuant to article 10 of title 44 is eligible to claim a credit pursuant to this article 30.”
  deferred_outputs:
    - output: us-co:statutes/39/39-30-103/b#temporary_tier_one_transition_community_zone_proposal_allowed
      reason: The temporary rural tier one transition community designation pathway depends on the external statutory definition in section 8-83-502 (10), which is not available in copied RuleSpec context.
    - output: us-co:statutes/39/39-30-103/c#enterprise_zone_designation_review_modification_requirements
      reason: Administrative review, modification, and reporting duties are not a computable entity-scoped output in the supported schema.
    - output: us-co:statutes/39/39-30-103/c#state_auditor_enterprise_zone_program_evaluation_report
      reason: The state auditor's discretionary evaluation and report duty is an administrative process, not a computable entity-scoped output.
    - output: us-co:statutes/39/39-30-103/b#department_of_revenue_certification_form_amendment_requirement
      reason: The department's duty to amend certification forms is an administrative process, not a computable entity-scoped output.
rules:
  - name: business_eligible_for_enterprise_zone_credit
    kind: derived
    entity: Business
    dtype: Judgment
    period: Year
    source: 39-30-103(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-30-103
              excerpt: "For tax years commencing on or after January 1, 2025, a business that holds a valid license pursuant to article 10 of title 44 is eligible to claim a credit."
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-30-103
              excerpt: "only a taxpayer that is engaged in a\nbusiness that is legal under both state and federal law is eligible to claim a credit"
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          business_is_legal_under_state_and_federal_law
          or business_holds_valid_license_under_article_10_title_44
