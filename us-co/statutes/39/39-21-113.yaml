format: rulespec/v1
module:
  status: deferred
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-21-113
  summary: |-
    Any information provided to the listed departments pursuant to subsection (36) remains confidential, and specified agents, clerks, and employees are subject to subsection (4)'s disclosure limitations and subsection (6)'s penalties.
  deferred_outputs:
    - output: us-co:statutes/39/39-21-113/c#recipient_confidentiality_and_disclosure_restrictions
      reason: >-
        39-21-113(c) states administrative confidentiality duties and incorporates
        subsection (4) disclosure limitations and subsection (6) penalties; it does
        not define a computable condition or amount, and the supported RuleSpec
        schema cannot faithfully represent institutional information-custody duties
        and criminal penalties as an executable entity-scoped output.
rules: []
