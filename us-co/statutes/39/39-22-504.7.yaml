format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-504.7
  summary: |-
    Each year an employer may contribute to an employee's medical savings account an amount that does not exceed three thousand dollars. An employee's contributions are subject to the same limitation. Account distributions are restricted to specified purposes, and nonmedical withdrawals are taxable as Colorado adjusted gross income.
  deferred_outputs:
    - output: us-co:statutes/39/39-22-504.7/e#employer_medical_savings_account_contribution_federal_tax_deduction
      reason: The deduction depends on federal taxable income treatment pursuant to sections 39-22-104(4)(h) and 39-22-304(3)(k), for which no executable copied RuleSpec output supplies the referenced deduction mechanics.
    - output: us-co:statutes/39/39-22-504.7/3/b#medical_savings_account_distribution_permitted
      reason: Faithful encoding requires payment-, account-, and beneficiary-scoped facts distinguishing eligible medical-expense reimbursement, a deceased holder's account balance, and a prior-years balance; the available schema context does not supply those account relationships.
    - output: us-co:statutes/39/39-22-504.7/6/b#nonmedical_withdrawal_colorado_adjusted_gross_income
      reason: The source establishes taxability of nonmedical withdrawals but does not provide the broader Colorado adjusted gross income computation needed to produce the final income amount.
rules:
  - name: annual_medical_savings_account_contribution_limit
    kind: parameter
    dtype: Money
    period: Year
    unit: USD
    source: 39-22-504.7(2)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-504.7
              excerpt: "an amount that does not exceed three thousand dollars"
    versions:
      - effective_from: '1995-01-01'
        formula: |-
          3000

  - name: employer_medical_savings_account_contribution
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: USD
    source: 39-22-504.7(2)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-504.7
              excerpt: "Each year an employer may contribute to an employee's medical\nsavings account an amount that does not exceed three thousand dollars."
    versions:
      - effective_from: '1995-01-01'
        formula: |-
          min(max(0, employer_contribution_to_employee_medical_savings_account), annual_medical_savings_account_contribution_limit)

  - name: employee_medical_savings_account_contribution
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: USD
    source: 39-22-504.7(2)(d)(I)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-504.7
              excerpt: "Such contributions are subject to the same limitations as employer\ncontributions."
    versions:
      - effective_from: '1995-01-01'
        formula: |-
          min(max(0, employee_contribution_to_medical_savings_account), annual_medical_savings_account_contribution_limit)

  - name: employer_contribution_federal_tax_deduction_deferred_coverage
    kind: source_relation
    source: 39-22-504.7(e)
    source_relation:
      type: restates
      target: us-co:statutes/39/39-22-504.7/e#employer_medical_savings_account_contribution_federal_tax_deduction

  - name: permitted_distribution_purposes_deferred_coverage
    kind: source_relation
    source: 39-22-504.7(b)
    source_relation:
      type: restates
      target: us-co:statutes/39/39-22-504.7/3/b#medical_savings_account_distribution_permitted

  - name: nonmedical_withdrawal_taxation_deferred_coverage
    kind: source_relation
    source: 39-22-504.7(b)
    source_relation:
      type: restates
      target: us-co:statutes/39/39-22-504.7/6/b#nonmedical_withdrawal_colorado_adjusted_gross_income
