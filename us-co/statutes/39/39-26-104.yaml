format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-26-104
  summary: |-
    On or after August 1, 2002, mobile telecommunications service is taxable only when provided to a customer whose place of primary use is within Colorado and the service originates and terminates within the same state. Beginning July 1, 2025, interstate telephone and telegraph service is taxable if it originates or terminates in Colorado and is charged to a Colorado address; mobile service for a customer whose place of primary use outside Colorado is exempt.
  deferred_outputs:
    - output: us-co:statutes/39/39-26-104/1#a_retail_tangible_personal_property_tax
      reason: The applicable tax amount is stated in unavailable section 39-26-106.
    - output: us-co:statutes/39/39-26-104/c#customer_mobile_telecommunications_error_resolution
      reason: The notice, review, refund, and district-court process depends on federally defined customer and home-service-provider terms that are unavailable.
    - output: us-co:statutes/39/39-26-104/d#sale_sourcing_definitions
      reason: The purchaser, receipt, and transportation-equipment definitions support sale-sourcing rules but do not independently establish a scalar or predicate output in the supported schema.
rules:
  - name: mobile_telecommunications_service_taxable
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: 39-26-104(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-26-104
              excerpt: "mobile telecommunications service shall be subject to the tax ... only if the service is provided to a customer whose place of primary use is within Colorado and the service originates and terminates within the same state."
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-co/statute/39/39-26-104
              excerpt: "On or after August 1, 2002"
    versions:
      - effective_from: '2002-08-01'
        formula: |-
          service_is_mobile_telecommunications_service
          and customer_place_of_primary_use_is_in_colorado
          and service_originates_and_terminates_within_same_state
  - name: interstate_telephone_or_telegraph_service_taxable
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: 39-26-104(c.5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-26-104
              excerpt: "interstate telephone and telegraph service, if the telephone and telegraph service originates or terminates in the state and is charged to a Colorado address."
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-co/statute/39/39-26-104
              excerpt: "Beginning July 1, 2025"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-26-104
              excerpt: "mobile telecommunication service provided to a customer whose place of primary use is outside of the borders of the state of Colorado is exempt."
    versions:
      - effective_from: '2025-07-01'
        formula: |-
          telephone_or_telegraph_service_is_interstate
          and (service_originates_in_colorado or service_terminates_in_colorado)
          and service_is_charged_to_colorado_address
          and not (service_is_mobile_telecommunications_service and customer_place_of_primary_use_is_outside_colorado)
