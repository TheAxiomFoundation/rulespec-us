module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-518
  summary: "\u201CQualified taxpayer means, for income tax years commencing on or\
    \ after January 1, 2022, any taxpayer that has no overdue state tax liabilities;\
    \ that is not in default on any contractual obligations owed to the state or to\
    \ any local government within Colorado ...; and that is required to file a schedule\
    \ F.\u201D"
  deferred_outputs:
  - output: us-co:statutes/39/39-22-518#colorado_taxable_income_reduction_for_qualifying_capital_gains
    reason: The reduction amount depends on qualifying gains receiving capital treatment,
      whose net-capital-gains definition incorporates unavailable Internal Revenue
      Code section 1222(11).
  - output: us-co:statutes/39/39-22-518/b#qualifying_gains_receiving_capital_treatment
    reason: The definition depends on net capital gains as defined in unavailable
      Internal Revenue Code section 1222(11).
