format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-11-152
  summary: |-
    A tax-lien sale includes certified delinquent special-assessment liens; separate sales of delinquent general-tax and special-assessment liens are prohibited.
rules:
  - name: certified_delinquent_special_assessment_lien_must_be_included_in_tax_lien_sale
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. 39-11-152
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-11-152
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          sale_of_tax_lien_on_property_is_provided
          and delinquent_special_assessment_lien_is_certified_to_county_treasurer_for_collection
  - name: separate_sale_of_delinquent_general_tax_and_special_assessment_liens_is_permitted
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. 39-11-152
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-11-152
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          false
