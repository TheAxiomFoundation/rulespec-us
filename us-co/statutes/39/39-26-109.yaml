format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-26-109
  summary: |-
    The executive director may permit returns and tax payments at intervals not greater than every three months for qualifying vendors whose monthly tax collected is less than $300 before January 1, 2025, and less than $600 on or after January 1, 2025.
rules:
  - name: monthly_tax_collected_limit_for_quarterly_returns
    kind: parameter
    dtype: Money
    period: Month
    unit: USD
    source: C.R.S. 39-26-109(1)(a)-(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-26-109
              excerpt: "monthly tax collected is less than three hundred dollars"
          - path: versions[1].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-26-109
              excerpt: "monthly tax collected is less than six hundred dollars"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          300
      - effective_from: '2025-01-01'
        formula: |-
          600
  - name: quarterly_return_permission_may_be_granted
    kind: derived
    entity: Business
    dtype: Judgment
    period: Month
    source: C.R.S. 39-26-109(1)(a)-(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-26-109
              excerpt: "upon written request of the vendor"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-26-109
              excerpt: "will impose unnecessary hardship"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-26-109
              excerpt: "will not jeopardize the collection of the tax"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-26-109
              excerpt: "may by rule permit taxpayers whose monthly tax collected is less than"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          vendor_submitted_written_request
          and calendar_month_reporting_imposes_unnecessary_hardship
          and executive_director_finds_interval_better_suits_taxpayer_convenience
          and executive_director_finds_interval_will_not_jeopardize_tax_collection
          and executive_director_rule_permits_quarterly_returns
          and monthly_tax_collected < monthly_tax_collected_limit_for_quarterly_returns
