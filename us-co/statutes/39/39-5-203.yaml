  source_verification:
    corpus_citation_path: us-co/statute/39/39-5-203
  summary: |-
    Mobile homes are exempt from property taxation while located on sales display lots of mobile home dealers and listed as inventories of merchandise by such dealers.
  deferred_outputs:
    - output: us-co:statutes/39/39-5-203#mobile_home_actual_value_determination
      reason: Actual-value determination is expressly governed by sections 39-1-103 (5) and 39-1-104 (10.2), whose RuleSpec sources are not available in copied context.
