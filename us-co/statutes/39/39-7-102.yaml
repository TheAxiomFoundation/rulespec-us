format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-7-102
  summary: |-
    The assessor shall value oil and gas leaseholds and lands for assessment as real property at eighty-seven and one-half percent of specified preceding-calendar-year selling prices; projects employing secondary recovery, tertiary recovery, or recycling that conserve and avoid waste are valued at seventy-five percent.
rules:
  - name: standard_assessment_valuation_rate
    kind: parameter
    dtype: Rate
    source: Colo. Rev. Stat. § 39-7-102(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-7-102
              excerpt: "eighty-seven and one-half percent"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.875

  - name: recovery_or_recycling_project_assessment_valuation_rate
    kind: parameter
    dtype: Rate
    source: Colo. Rev. Stat. § 39-7-102(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-7-102
              excerpt: "seventy-five percent"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.75

  - name: oil_and_gas_leasehold_or_land_assessed_value
    kind: derived
    entity: Asset
    dtype: Money
    unit: USD
    period: Year
    source: Colo. Rev. Stat. § 39-7-102(1)-(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-7-102
              excerpt: "shall value such oil and gas leaseholds and lands for assessment, as real property"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (if leasehold_or_land_employs_conserving_secondary_tertiary_recovery_or_recycling_project:
            recovery_or_recycling_project_assessment_valuation_rate
          else:
            standard_assessment_valuation_rate)
          * (preceding_calendar_year_wellhead_sales_price_excluding_governmental_royalties
          + preceding_calendar_year_same_field_sales_price_for_transported_unsold_oil_or_gas_excluding_governmental_royalties)
