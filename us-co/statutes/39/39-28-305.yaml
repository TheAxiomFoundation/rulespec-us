format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-28-305
  summary: |-
    “Not later than twenty days after the end of each month, each stamping agent shall submit to the department such information as the department requires”; the stamping agent “shall maintain and make available” specified records “for a period of five years.” The department and attorney general may exchange and disclose enforcement information, may request additional information, and the department may require quarterly escrow installments by rule.
rules:
  - name: monthly_reporting_deadline_days
    kind: parameter
    dtype: Integer
    source: C.R.S. 39-28-305(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-28-305
              excerpt: "Not later than twenty days after the end of each month"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          20

  - name: sales_record_retention_years
    kind: parameter
    dtype: Integer
    source: C.R.S. 39-28-305(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-28-305
              excerpt: "for a period of five years"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          5

  - name: stamping_agent_reporting_and_recordkeeping_requirements_satisfied
    kind: derived
    entity: StampingAgent
    dtype: Judgment
    period: Month
    source: C.R.S. 39-28-305(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-28-305
              excerpt: "each stamping agent shall submit to the department such information as the department requires"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-28-305
              excerpt: "Not later than twenty days after the end of each month"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-28-305
              excerpt: "shall maintain and make available to the department all invoices and documentation of sales"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-28-305
              excerpt: "for a period of five years"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          report_includes_information_required_by_department
          and days_after_month_end_when_report_submitted <= monthly_reporting_deadline_days
          and nonparticipating_manufacturer_sales_records_maintained_and_available
          and years_records_maintained_available >= sales_record_retention_years
