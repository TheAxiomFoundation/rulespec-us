- name: product_partnership_qualifies_as_export_taxpayer
  period:
    period_kind: tax_year
    start: '2024-01-01'
    end: '2024-12-31'
  input:
    us-co:statutes/39/39-22-206#input.partnership_is_subject_to_this_article: true
    us-co:statutes/39/39-22-206#input.partnership_products_are_produced_in_colorado: true
