  source_verification:
    corpus_citation_path: us-co/statute/39/39-4-109
  summary: |-
    “Any petitioner or any other public utility, assessor, or board of county commissioners adversely affected or the administrator may appeal” to the court of appeals. A public utility owning the property must pay all levied taxes before appealing; a sustained petitioner receives the appropriate tax refund, refund interest, and applicable costs.
  deferred_outputs:
    - output: us-co:statutes/39/39-4-109#court_of_appeals_appeal_available
      reason: The source establishes court-specific procedural rights and review mechanics, but the supported schema has no faithful entity or procedural-case ontology for appeals, appellate records, evidence, remand, or judicial discretion.
    - output: us-co:statutes/39/39-4-109#tax_refund_after_successful_appeal
      reason: The refund depends on court orders, tax payments, county-treasurer administration, costs decreed by the court, and an externally specified delinquent-interest rate; the supported schema cannot faithfully represent this judicial and administrative procedure.
