    corpus_citation_path: us-co/statute/39/39-22-402
  summary: |-
    “The Colorado fiduciary adjustment shall be the net amount of the modifications described in section 39-22-104, except to the extent such items are excluded from federal distributable net income of the estate or trust.”
  deferred_outputs:
    - output: us-co:statutes/39/39-22-402#colorado_fiduciary_adjustment
      reason: Computing the adjustment requires the modifications described in section 39-22-104(3) and (4), whose copied RuleSpec targets have no executable exports.
    - output: us-co:statutes/39/39-22-402#estate_or_trust_share_of_colorado_fiduciary_adjustment
      reason: Allocation depends on the uncomputable Colorado fiduciary adjustment and beneficiary-specific distributable-net-income or distributable-income shares.
    - output: us-co:statutes/39/39-22-402#beneficiary_share_of_colorado_fiduciary_adjustment
      reason: Allocation depends on the uncomputable Colorado fiduciary adjustment and beneficiary-specific distributable-net-income or distributable-income shares.
