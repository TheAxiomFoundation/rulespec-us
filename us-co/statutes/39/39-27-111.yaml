format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-27-111
  summary: |-
    The part 1 tax is in lieu of other state or political-subdivision taxes on gasoline or special fuel, except specified aviation-fuel taxes.
rules:
  - name: other_state_or_local_fuel_tax_is_displaced_by_part_1_tax
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-27-111
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-27-111
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          part_1_tax_is_imposed
          and other_tax_is_imposed_by_state_or_political_subdivision_on_gasoline_or_special_fuel
          and not tax_is_on_aviation_fuel_used_in_turbopropeller_or_jet_engine_aircraft
