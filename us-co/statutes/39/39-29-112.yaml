format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-29-112
  summary: |-
    Every corporation subject to taxation shall make a declaration and payment of estimated tax if the tax for the taxable year can reasonably be expected to exceed five thousand dollars. A person need not make a separate annual return if withholding is less than two hundred fifty dollars and is at least the tax owed.
rules:
  - name: estimated_tax_declaration_threshold
    kind: parameter
    dtype: Money
    unit: USD
    source: C.R.S. § 39-29-112(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-29-112
              excerpt: "can reasonably be expected to exceed five thousand dollars"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          5000

  - name: corporation_estimated_tax_declaration_and_payment_required
    kind: derived
    entity: Corporation
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-29-112(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-29-112
              excerpt: "Every corporation subject to taxation under this article 29 shall make a declaration and payment of estimated tax if the tax ... can reasonably be expected to exceed five thousand dollars."
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-29-112
              excerpt: "exceed five thousand dollars"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          tax_imposed_for_taxable_year_reasonably_expected
          > estimated_tax_declaration_threshold

  - name: annual_return_withholding_exemption_limit
    kind: parameter
    dtype: Money
    unit: USD
    source: C.R.S. § 39-29-112(7)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-29-112
              excerpt: "less than two hundred fifty dollars withheld"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          250

  - name: separate_annual_return_not_required_based_on_withholding
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-29-112(7)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-29-112
              excerpt: "A person is not required to make a separate, annual return ... if"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-29-112
              excerpt: "less than two hundred fifty dollars withheld ... and ... withholding is greater than or equal to the amount of tax ... owed"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-29-112
              excerpt: "less than two hundred fifty dollars withheld"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          total_withholding_by_all_unit_operators_or_first_purchasers
          < annual_return_withholding_exemption_limit
          and total_withholding_by_all_unit_operators_or_first_purchasers
          >= severance_tax_owed_for_taxable_year
