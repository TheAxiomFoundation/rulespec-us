format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-27-105
  summary: |-
    “Any person whose use of special fuel is for the propulsion of a privately operated automobile shall be exempt from the provisions of this subsection (5).” A privately operated passenger automobile excludes vehicles used to transport persons for hire or compensation and vehicles primarily used for transporting property; a vehicle exempt from article 3 mileage taxes is deemed privately operated.
  deferred_outputs:
    - output: us-co:statutes/39/39-27-105#single_trip_permit_tax_due
      reason: The tax must use the special-fuel tax rate established by section 39-27-102(1)(a)(II)(B), for which no executable RuleSpec context is supplied.
rules:
  - name: motor_vehicle_qualifies_as_privately_operated_passenger_automobile
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: Colorado Revised Statutes § 39-27-105(5)(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-27-105
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          motor_vehicle_is_exempt_from_mileage_taxes_article_3_title_42
          or (
            motor_vehicle_is_otherwise_privately_operated_passenger_automobile
            and not motor_vehicle_is_used_for_transportation_of_persons_for_hire_or_compensation
            and not motor_vehicle_is_designed_used_or_maintained_primarily_for_transportation_of_property
          )
  - name: person_is_exempt_from_single_trip_permit_requirement
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: Colorado Revised Statutes § 39-27-105(5)(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-27-105
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          special_fuel_is_used_for_propulsion_of_motor_vehicle
          and motor_vehicle_qualifies_as_privately_operated_passenger_automobile
