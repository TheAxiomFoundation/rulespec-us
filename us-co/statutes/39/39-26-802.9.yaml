format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-26-802.9
  summary: |-
    “On and after July 1, 2022, a local taxing jurisdiction shall not charge a fee for a general business license” to a retailer meeting the stated license, retail-sales, and physical-presence conditions. “On and after July 1, 2023,” such a jurisdiction shall not require that retailer to apply separately for a general business license.
  deferred_outputs:
    - output: us-co:statutes/39/39-26-802.9/a#department
      reason: The definition identifies a government institution, but the supported executable schema does not provide an institutional reference dtype.
    - output: us-co:statutes/39/39-26-802.9/b#general_business_license
      reason: The definition classifies licenses by their issuing jurisdiction, required retail-sales authorization, and occupational-license exclusion; faithfully representing license objects and their issuing relationships requires unsupported ontology.
    - output: us-co:statutes/39/39-26-802.9/c#incidental_physical_presence
      reason: The definition depends on the enumerated physical-presence activities and on their frequency and scheduling across a retailer's ordinary business activities; the required activity relation and temporal scheduling structure are unavailable.
    - output: us-co:statutes/39/39-26-802.9/e#physical_presence
      reason: The definition requires a relation over services, property transactions, employees, agents, places of business, regulated activities, and taxable privileges within each local taxing jurisdiction; that relational jurisdiction-specific ontology is unavailable.
    - output: us-co:statutes/39/39-26-802.9/f#state_standard_retail_license
      reason: The definition depends on licensing under section 39-26-103, whose copied RuleSpec context is deferred and has no executable export for the required license status.
    - output: us-co:statutes/39/39-26-802.9/g#suts
      reason: The definition identifies a particular electronic administration system, but the supported executable schema does not provide an institutional system-reference dtype.
rules:
  - name: general_business_license_fee_prohibition_applies
    kind: derived
    entity: Business
    dtype: Judgment
    period: Day
    source: 39-26-802.9(4)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-26-802.9
              excerpt: "a retailer that has a state standard retail license, makes retail sales within the local taxing jurisdiction, and either does not have physical presence in the local taxing jurisdiction or has only incidental physical presence"
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-co/statute/39/39-26-802.9
              excerpt: "On and after July 1, 2022"
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          retailer_has_state_standard_retail_license
          and retailer_makes_retail_sales_within_local_taxing_jurisdiction
          and (
            retailer_has_no_physical_presence_in_local_taxing_jurisdiction
            or retailer_has_only_incidental_physical_presence_in_local_taxing_jurisdiction
          )

  - name: separate_general_business_license_application_prohibition_applies
    kind: derived
    entity: Business
    dtype: Judgment
    period: Day
    source: 39-26-802.9(4)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-26-802.9
              excerpt: "a retailer that has a state standard retail license, makes retail sales within the local taxing jurisdiction, and either does not have physical presence in the local taxing jurisdiction or has only incidental physical presence"
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-co/statute/39/39-26-802.9
              excerpt: "On and after July 1, 2023"
    versions:
      - effective_from: '2023-07-01'
        formula: |-
          retailer_has_state_standard_retail_license
          and retailer_makes_retail_sales_within_local_taxing_jurisdiction
          and (
            retailer_has_no_physical_presence_in_local_taxing_jurisdiction
            or retailer_has_only_incidental_physical_presence_in_local_taxing_jurisdiction
          )
