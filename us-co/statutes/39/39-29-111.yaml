format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-29-111
  summary: |-
    Producer or purchaser shall withhold one percent of gross income from qualifying oil and gas interests; records of annual withholding statements shall be retained for three years.
  deferred_outputs:
    - output: us-co:statutes/39/39-29-111/1/a#oil_and_gas_interest_payment_withholding
      reason: The withholding calculation depends on the section 39-29-105(1) exemption and registration condition; copied context does not export that applicable exemption predicate.
      source_values:
        - us-co:statutes/39/39-29-111#oil_and_gas_interest_withholding_rate
    - output: us-co:statutes/39/39-29-111/1/a#monthly_withholding_remittance
      reason: The remittance obligation depends on the payment procedure in section 39-21-119.5(4)(b), for which no copied RuleSpec source is available.
    - output: us-co:statutes/39/39-29-111/2#withheld_amount_credit_against_return_tax
      reason: Eligibility for the credit is conditioned on making the return required by section 39-29-112, for which no copied RuleSpec source is available.
    - output: us-co:statutes/39/39-29-111/4#annual_withholding_statement
      reason: This is an administrative furnishing and records-availability duty without a computable RuleSpec consequence.
      source_values:
        - us-co:statutes/39/39-29-111#withholding_statement_record_retention_years
    - output: us-co:statutes/39/39-29-111/b#repealed_subparagraph
      reason: Subparagraph (b) is repealed and has no operative output.
rules:
  - name: oil_and_gas_interest_withholding_rate
    kind: parameter
    dtype: Rate
    source: 39-29-111(1)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-29-111
              excerpt: "an amount equal to one percent of the gross income"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.01
  - name: withholding_statement_record_retention_years
    kind: parameter
    dtype: Count
    source: 39-29-111(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-29-111
              excerpt: "retained in the records ... for a period of three years"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          3
