format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-531
  summary: |-
    “For the annual amount of the credit allowed in this section available to the taxpayer, the commission shall multiply the actual net job growth for that year by fifty percent of the taxpayer's taxes imposed on the employer for the new employees of the project under the Federal Insurance Contributions Act.”
  deferred_outputs:
    - output: us-co:statutes/39/39-22-531/a#affiliated_group
      reason: The affiliated-group definition requires ownership-chain relations, class-specific voting and nonvoting interests, and exclusions dependent on federal Internal Revenue Code sections 409 and 4975, for which no executable RuleSpec context is available.
    - output: us-co:statutes/39/39-22-531/b#commission
      reason: This institutional definition depends on the entity created by section 24-46-102, for which no RuleSpec context is available, and does not independently produce a computational result.
    - output: us-co:statutes/39/39-22-531/c#credit_certificate
      reason: The definition describes an administrative instrument issued by the commission and requires representing certification, project qualification, and the certified credit amount as a document-scoped entity.
    - output: us-co:statutes/39/39-22-531/d#credit_period
      reason: The credit-period definition requires a consecutive-month interval beginning with the first month of the initial claim year; the available scalar-period schema cannot faithfully return that interval.
    - output: us-co:statutes/39/39-22-531/e#department
      reason: This is an institutional definition identifying the department of revenue and does not independently produce a computational result.
    - output: us-co:statutes/39/39-22-531/f#net_job_growth
      reason: Net job growth requires project-scoped full-time-equivalent employee populations at two distinct measurement times and cannot be represented faithfully by the available entity relations in this artifact.
    - output: us-co:statutes/39/39-22-531/h#project
      reason: Project status depends on discretionary commission approval under subsection (3) and sector and economic-development classifications not supplied as executable upstream outputs.
    - output: us-co:statutes/39/39-22-531/c#commission_credit_discretion_factors
      reason: Subsection (3)(c) restricts an administrative decision process to four considerations but does not specify a computable weighting or decision formula.
    - output: us-co:statutes/39/39-22-531/2#annual_job_growth_incentive_tax_credit_allowed
      reason: Final allowance is discretionary, depends on project approval and the credit period, and is limited to qualifying income tax years and the commission-determined amount.
    - output: us-co:statutes/39/39-22-531/3#project_qualifies_for_job_growth_incentive_tax_credit
      reason: Qualification combines historical and temporary date branches, rural-zone and qualified-partnership alternatives, advanced-manufacturing classifications, employee retention, commission findings, and application documentation requirements; several cited classifications lack executable context.
    - output: us-co:statutes/39/39-22-531/4#credit_certificate_issued
      reason: Issuance depends on the commission's administrative review, conditional approval, project commencement, annual documentation, and satisfaction of the deferred subsection (3) qualification surface.
    - output: us-co:statutes/39/39-22-531/5/a#maximum_credit_for_credit_period
      reason: The maximum requires a credit-period sequence of estimated annual job growth and employer FICA taxes together with a discretionary lesser amount selected under subsection (3)(c).
    - output: us-co:statutes/39/39-22-531/5/b#credit_certificate_available
      reason: Certificate availability requires aggregating all credits claimed or to be claimed across the credit period and comparing that aggregate, including the current certificate, with the deferred maximum-credit computation.
    - output: us-co:statutes/39/39-22-531/6#unused_credit_carryforward
      reason: The carryforward computation is subject to exceptions and refund coordination under sections 24-46-104.3, 24-46-107, and 24-46-108, none of which has executable RuleSpec context.
    - output: us-co:statutes/39/39-22-531/9#pass_through_credit_allocation
      reason: Allocation requires relations among a pass-through taxpayer and its partners, shareholders, members, or other constituent taxpayers, plus taxpayer-selected allocation amounts and separately issued certificates.
rules:
  - name: annual_credit_calculation_rate
    kind: parameter
    dtype: Rate
    source: 39-22-531(5)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-531
              excerpt: “fifty percent”
    versions:
      - effective_from: '2009-01-01'
        formula: |-
          0.50

  - name: calculated_annual_job_growth_incentive_credit
    kind: derived
    entity: Employer
    dtype: Money
    unit: USD
    period: Year
    source: 39-22-531(5)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-531
              excerpt: “multiply the actual net job growth for that year by fifty percent of the taxpayer's taxes imposed on the employer for the new employees of the project”
    versions:
      - effective_from: '2009-01-01'
        formula: |-
          max(0, actual_net_job_growth * annual_credit_calculation_rate * employer_fica_taxes_for_new_project_employees)
