format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-521
  summary: |-
    For taxable years commencing on or after January 1, 1998, and prior to January 1, 2025, an employer of a Colorado works public-assistance recipient may claim a credit equal to twenty percent of annual investment in specified incidental services, for not more than two years. The credit is limited to actual tax liability, with unused credit carried forward for three income tax years.
  deferred_outputs:
    - output: us-co:statutes/39/39-22-521#carryover_application_order
      reason: Applying carryovers first to the earliest income tax years possible requires a cross-tax-year carryover balance and ordering relation not representable by the available scalar inputs.
imports:
rules:
  - name: employer_credit_rate
    kind: parameter
    dtype: Rate
    source: 39-22-521(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-521
              excerpt: "in the amount of twenty percent"
    versions:
      - effective_from: '1998-01-01'
        formula: |-
          0.20

  - name: credit_duration_limit_years
    kind: parameter
    dtype: Count
    source: 39-22-521(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-521
              excerpt: "for not more than two years"
    versions:
      - effective_from: '1998-01-01'
        formula: |-
          2

  - name: credit_carryover_period_years
    kind: parameter
    dtype: Count
    source: 39-22-521(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-521
              excerpt: "each of the three income tax years\nfollowing"
    versions:
      - effective_from: '1998-01-01'
        formula: |-
          3

  - name: annual_investment_in_qualifying_child_care_services
    kind: derived
    entity: Employer
    dtype: Money
    period: Year
    unit: USD
    source: 39-22-521(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-521
              excerpt: "The provision of child care services or the payment of the costs\nassociated with child care services"
    versions:
      - effective_from: '1998-01-01'
        formula: |-
          if child_care_services_are_for_children_of_public_assistance_employees: annual_investment_in_child_care_services else: 0

  - name: annual_investment_in_qualifying_health_or_dental_insurance
    kind: derived
    entity: Employer
    dtype: Money
    period: Year
    unit: USD
    source: 39-22-521(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-521
              excerpt: "The provision of health or dental insurance for employees receiving\npublic assistance"
    versions:
      - effective_from: '1998-01-01'
        formula: |-
          if health_or_dental_insurance_for_public_assistance_employees_provides_full_medicaid_benefits: annual_investment_in_health_or_dental_insurance else: 0

  - name: annual_investment_in_qualifying_job_training_or_basic_education
    kind: derived
    entity: Employer
    dtype: Money
    period: Year
    unit: USD
    source: 39-22-521(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-521
              excerpt: "The provision of job training or basic education of employees receiving\npublic assistance"
    versions:
      - effective_from: '1998-01-01'
        formula: |-
          if job_training_or_basic_education_is_for_public_assistance_employees: annual_investment_in_job_training_or_basic_education else: 0

  - name: annual_investment_in_qualifying_transportation_programs
    kind: derived
    entity: Employer
    dtype: Money
    period: Year
    unit: USD
    source: 39-22-521(d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-521
              excerpt: "The provision of programs for the transportation of public assistance\nemployees to and from work."
    versions:
      - effective_from: '1998-01-01'
        formula: |-
          if transportation_programs_are_for_public_assistance_employees_to_and_from_work: annual_investment_in_transportation_programs else: 0

  - name: annual_investment_in_qualifying_incidental_services
    kind: derived
    entity: Employer
    dtype: Money
    period: Year
    unit: USD
    source: 39-22-521(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-521
              excerpt: "employer's annual investment in any one or more of the following services that are incidental to the employer's business"
    versions:
      - effective_from: '1998-01-01'
        formula: |-
          annual_investment_in_qualifying_child_care_services
          + annual_investment_in_qualifying_health_or_dental_insurance
          + annual_investment_in_qualifying_job_training_or_basic_education
          + annual_investment_in_qualifying_transportation_programs

  - name: colorado_works_employer_credit_before_liability_limit
    kind: derived
    entity: Employer
    dtype: Money
    period: Year
    unit: USD
    source: 39-22-521(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-521
              excerpt: "there shall be allowed to an employer of any person receiving public assistance pursuant to the Colorado works program"
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-521
              excerpt: "in the amount of twenty percent"
    versions:
      - effective_from: '1998-01-01'
        formula: |-
          if employer_employs_person_receiving_colorado_works_public_assistance and taxable_year_is_within_credit_effective_window and number_of_credit_years_claimed_including_current_year <= credit_duration_limit_years: employer_credit_rate * annual_investment_in_qualifying_incidental_services else: 0

  - name: colorado_works_employer_credit_allowed
    kind: derived
    entity: Employer
    dtype: Money
    period: Year
    unit: USD
    source: 39-22-521(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-521
              excerpt: "shall not\nexceed the employer's actual tax liability for such taxable year"
    versions:
      - effective_from: '1998-01-01'
        formula: |-
          min(colorado_works_employer_credit_before_liability_limit, employer_actual_tax_liability)

  - name: unused_colorado_works_employer_credit
    kind: derived
    entity: Employer
    dtype: Money
    period: Year
    unit: USD
    source: 39-22-521(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-521
              excerpt: "such\nexcess shall be a tax credit carryover"
    versions:
      - effective_from: '1998-01-01'
        formula: |-
          max(0, colorado_works_employer_credit_before_liability_limit - employer_actual_tax_liability)

  - name: colorado_works_credit_carryover_remains_available
    kind: derived
    entity: Employer
    dtype: Judgment
    period: Year
    source: 39-22-521(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: effective_period
            source:
              corpus_citation_path: us-co/statute/39/39-22-521
              excerpt: "to each of the three income tax years\nfollowing the unused credit year"
    versions:
      - effective_from: '1998-01-01'
        formula: |-
          unused_colorado_works_employer_credit > 0
          and carryover_years_since_unused_credit_year >= 1
          and carryover_years_since_unused_credit_year <= credit_carryover_period_years
