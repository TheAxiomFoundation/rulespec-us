format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-3-104
  summary: |-
    Ditches, canals, and flumes owned and used exclusively to irrigate land owned by the same person are exempt from property tax.
rules:
  - name: person_owned_irrigation_conduit_property_tax_exemption_applies
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-3-104
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-3-104
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_ditch_canal_or_flume
          and irrigation_conduit_is_owned_by_person
          and irrigation_conduit_is_used_exclusively_to_irrigate_land
          and irrigated_land_is_owned_by_same_person
