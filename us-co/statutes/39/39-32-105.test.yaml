- name: qualifying investment credit and carryforward apply
  period:
    period_kind: tax_year
    start: '2000-01-01'
    end: '2000-12-31'
  input:
    us-co:statutes/39/39-32-105#input.tax_year_is_within_credit_effective_window: true
    ? us-co:statutes/39/39-32-105#input.investment_is_specific_capital_investment_in_qualifying_rural_technology_enterprise_zone_infrastructure
    : true
    us-co:statutes/39/39-32-105#input.total_qualifying_technology_infrastructure_investment: 500000
  output:
    us-co:statutes/39/39-32-105#qualifying_investment_credit: 50000
- name: annual cap applies while carryforward period has expired
  period:
    period_kind: tax_year
    start: '2000-01-01'
    end: '2000-12-31'
  input:
    us-co:statutes/39/39-32-105#input.tax_year_is_within_credit_effective_window: true
    ? us-co:statutes/39/39-32-105#input.investment_is_specific_capital_investment_in_qualifying_rural_technology_enterprise_zone_infrastructure
    : true
    us-co:statutes/39/39-32-105#input.total_qualifying_technology_infrastructure_investment: 2000000
  output:
    us-co:statutes/39/39-32-105#qualifying_investment_credit: 100000
- name: credit is unavailable outside the effective tax-year window
  period:
    period_kind: tax_year
    start: '2005-01-01'
    end: '2005-12-31'
  input:
    us-co:statutes/39/39-32-105#input.tax_year_is_within_credit_effective_window: false
    ? us-co:statutes/39/39-32-105#input.investment_is_specific_capital_investment_in_qualifying_rural_technology_enterprise_zone_infrastructure
    : true
    us-co:statutes/39/39-32-105#input.total_qualifying_technology_infrastructure_investment: 500000
  output:
    us-co:statutes/39/39-32-105#qualifying_investment_credit: 0
- name: nonqualifying investment does not receive credit
  period:
    period_kind: tax_year
    start: '2000-01-01'
    end: '2000-12-31'
  input:
    us-co:statutes/39/39-32-105#input.tax_year_is_within_credit_effective_window: true
    ? us-co:statutes/39/39-32-105#input.investment_is_specific_capital_investment_in_qualifying_rural_technology_enterprise_zone_infrastructure
    : false
    us-co:statutes/39/39-32-105#input.total_qualifying_technology_infrastructure_investment: 500000
  output:
    us-co:statutes/39/39-32-105#qualifying_investment_credit: 0
- name: carryforward must be applied to the earliest available year
  period:
    period_kind: tax_year
    start: '2000-01-01'
    end: '2000-12-31'
  input:
    us-co:statutes/39/39-32-105#input.tax_year_is_within_credit_effective_window: true
    ? us-co:statutes/39/39-32-105#input.investment_is_specific_capital_investment_in_qualifying_rural_technology_enterprise_zone_infrastructure
    : true
    us-co:statutes/39/39-32-105#input.total_qualifying_technology_infrastructure_investment: 500000
  output:
    us-co:statutes/39/39-32-105#qualifying_investment_credit: 50000
