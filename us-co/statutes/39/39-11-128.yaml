format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-11-128
  summary: |-
    “Before July 1, 2024,” a purchaser or assignee seeking a tax deed must request notice from the treasurer. Where assessed valuation is “five hundred dollars or more,” the treasurer shall publish notice. For qualifying unoccupied irrigation-district lands with no taxes paid for five consecutive years, only publication notice is required.
rules:
  - name: publication_notice_assessment_threshold
    kind: parameter
    dtype: Money
    unit: USD
    source: C.R.S. 39-11-128(1)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-11-128
              excerpt: "the valuation for assessment of the\nproperty is five hundred dollars or more"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          500

  - name: tax_deed_notice_procedure_applies
    kind: derived
    entity: TaxDeedRequest
    dtype: Judgment
    period: Day
    source: C.R.S. 39-11-128(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: effective_period
            source:
              corpus_citation_path: us-co/statute/39/39-11-128
              excerpt: "Before July 1, 2024"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-11-128
              excerpt: "before any purchaser, or assignee of such purchaser, of a tax lien on any land, town or city lot, or mining claim sold for taxes or special assessments due either to the state or any county or incorporated town or city within the same at any sale of tax liens for delinquent taxes levied or assessments authorized by law is entitled to a deed"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          tax_lien_purchaser_or_assignee_requests_tax_deed
          and tax_deed_notice_request_is_before_statutory_transition_date

  - name: publication_notice_required_for_high_valuation_property
    kind: derived
    entity: TaxDeedRequest
    dtype: Judgment
    period: Day
    source: C.R.S. 39-11-128(1)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-11-128
              excerpt: "the treasurer shall publish such notice"
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-11-128
              excerpt: "the valuation for assessment of the\nproperty is five hundred dollars or more"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          tax_deed_notice_procedure_applies
          and property_assessed_valuation >= publication_notice_assessment_threshold

  - name: only_publication_notice_required_for_unoccupied_irrigation_lands
    kind: derived
    entity: TaxDeedRequest
    dtype: Judgment
    period: Day
    source: C.R.S. 39-11-128(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-11-128
              excerpt: "lands situated wholly within the\nexterior boundary lines of an irrigation district"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-11-128
              excerpt: "all of such\nlands for which a tax deed is so requested or demanded are unoccupied and no\ntaxes have been paid thereon, or upon any parcel of such lands embraced in such\nrequest or demand, for five consecutive years"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-11-128
              excerpt: "the only notice which the treasurer shall be required to give of the fact\nthat a request or demand for tax deed has been made upon him shall be a notice of\npublication"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          tax_deed_notice_procedure_applies
          and requested_lands_are_wholly_within_irrigation_district
          and all_requested_lands_are_unoccupied
          and no_taxes_paid_on_requested_lands_for_five_consecutive_years
