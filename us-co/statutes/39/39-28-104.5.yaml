format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-28-104.5
  summary: |-
    No person shall import, sell, offer to sell, stamp, or conceal information on noncompliant cigarette packages. Violations are class 2 misdemeanors. Marked outside-United-States packages found for sale are contraband and may be seized; confiscation is not required for fewer than ten cartons held for personal consumption and not resale.
rules:
  - name: importing_federally_noncompliant_cigarette_package_is_prohibited
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: C.R.S. 39-28-104.5(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-28-104.5
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_imports_cigarette_package_into_state
          and package_violates_federal_container_information_requirements

  - name: selling_or_stamping_federally_noncompliant_cigarette_package_is_prohibited
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: C.R.S. 39-28-104.5(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-28-104.5
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_sells_offers_to_sell_or_affixes_required_stamp_or_imprint
          and not package_complies_with_federal_tax_trademark_copyright_and_information_laws

  - name: selling_or_stamping_outside_use_package_is_prohibited
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: C.R.S. 39-28-104.5(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-28-104.5
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_sells_offers_to_sell_or_affixes_required_stamp_or_imprint
          and (
            package_is_marked_as_manufactured_for_use_outside_united_states
            or package_label_or_language_was_altered_to_conceal_outside_use_manufacture
          )

  - name: affixing_concealing_stamp_label_or_decal_is_prohibited
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: C.R.S. 39-28-104.5(4)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-28-104.5
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_affixes_stamp_label_or_decal
          and stamp_label_or_decal_conceals_outside_use_manufacture

  - name: selling_concealingly_labeled_cigarette_package_is_prohibited
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: C.R.S. 39-28-104.5(4)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-28-104.5
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_sells_or_offers_to_sell_cigarette_package
          and stamp_label_or_decal_conceals_outside_use_manufacture

  - name: section_violation_is_class_2_misdemeanor
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: C.R.S. 39-28-104.5(5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-28-104.5
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          importing_federally_noncompliant_cigarette_package_is_prohibited
          or selling_or_stamping_federally_noncompliant_cigarette_package_is_prohibited
          or selling_or_stamping_outside_use_package_is_prohibited
          or affixing_concealing_stamp_label_or_decal_is_prohibited
          or selling_concealingly_labeled_cigarette_package_is_prohibited

  - name: personal_consumption_carton_quantity_below_which_confiscation_not_required
    kind: parameter
    dtype: Count
    source: C.R.S. 39-28-104.5(6)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-28-104.5
              excerpt: "quantities less than ten cartons"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10

  - name: marked_outside_use_package_is_contraband_goods
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Day
    source: C.R.S. 39-28-104.5(6)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-28-104.5
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          package_is_marked_as_manufactured_for_use_outside_united_states
          and package_is_found_for_sale_at_retail_or_wholesale_in_state

  - name: marked_outside_use_package_may_be_seized_without_warrant
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Day
    source: C.R.S. 39-28-104.5(6)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-28-104.5
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          package_is_marked_as_manufactured_for_use_outside_united_states
          and package_is_found_for_sale_at_retail_or_wholesale_in_state

  - name: department_not_required_to_confiscate_personal_consumption_package
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Day
    source: C.R.S. 39-28-104.5(6)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-28-104.5
              excerpt: "less than ten cartons when the packages are held for personal consumption and not for resale"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          package_is_marked_as_manufactured_for_use_outside_united_states
          and number_of_cartons_held < personal_consumption_carton_quantity_below_which_confiscation_not_required
          and packages_are_held_for_personal_consumption
          and packages_are_not_held_for_resale

  - name: seized_cigarettes_must_be_confiscated_and_destroyed
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Day
    source: C.R.S. 39-28-104.5(6)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-28-104.5
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          cigarettes_were_seized_under_subsection_6
