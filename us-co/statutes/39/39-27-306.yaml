format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-27-306
  summary: |-
    "The agreement shall not preclude the department from auditing the records of any person who has used motor fuels in this state." "If the place of business is located outside this state, the department may require the licensee or such other person to reimburse the department for authorized per diem and travel expenses."
rules:
  - name: department_may_audit_motor_fuel_user_records
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: C.R.S. 39-27-306(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-27-306
              excerpt: "shall not preclude the department from auditing the records of any person who has used motor fuels in this state"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_has_used_motor_fuels_in_this_state

  - name: person_may_be_required_to_reimburse_department_travel_expenses
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: C.R.S. 39-27-306(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-27-306
              excerpt: "If the place of business is located outside this state, the department may require the licensee or such other person to reimburse the department"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_licensee_or_required_to_be_licensed
          and person_place_of_business_is_outside_this_state
          and department_requires_travel_expense_reimbursement
