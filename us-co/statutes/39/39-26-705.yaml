format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-26-705
  summary: |-
    “The storage, use, or consumption of printers ink and newsprint shall be exempt from taxation.” Manufactured goods donated by their manufacturer to listed governmental or section 501(c)(3) recipients are exempt when the single-donation aggregate value exceeds one thousand dollars.
rules:
  - name: single_donation_aggregate_value_exemption_threshold
    kind: parameter
    dtype: Money
    unit: USD
    source: Colo. Rev. Stat. § 39-26-705(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-26-705
              excerpt: "aggregate value of all such goods included in a single donation exceeds one thousand dollars"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1000
  - name: printers_ink_and_newsprint_tax_exemption_applies
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-26-705(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-26-705
              excerpt: "storage, use, or consumption of printers ink and newsprint shall be exempt"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          stored_used_or_consumed_asset_is_printers_ink_or_newsprint
  - name: manufacturer_donated_goods_tax_exemption_applies
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-26-705(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-26-705
              excerpt: "manufactured goods ... donated by the manufacturer"
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-26-705
              excerpt: "United States government; the state of Colorado ...; or any organization exempt from federal income taxes pursuant to section 501(c)(3)"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-26-705
              excerpt: "aggregate value of all such goods included in a single donation exceeds one thousand dollars"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_manufactured_good
          and asset_was_donated_by_its_manufacturer
          and (
            donation_recipient_is_united_states_government
            or donation_recipient_is_colorado_government_or_political_subdivision
            or donation_recipient_is_section_501_c_3_organization
          )
          and aggregate_value_of_manufactured_goods_in_single_donation > single_donation_aggregate_value_exemption_threshold
