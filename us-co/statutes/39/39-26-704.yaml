format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-26-704
  summary: |-
    “All sales to the United States government and to the state of Colorado, its departments and institutions, and the political subdivisions thereof in their governmental capacities only shall be exempt”; sales prohibited from taxation by federal or state constitutional or legal authority and sales to nonprofit schools are also exempt under part 1.
  deferred_outputs:
    - output: us-co:statutes/39/39-26-704#transactions_specified_in_section_29_4_227_exempt_from_tax
      reason: The exemption depends on transactions specified in section 29-4-227 (1), for which no executable RuleSpec context is available.
    - output: us-co:statutes/39/39-26-704#permanent_lodging_sales_exempt_from_part_1_tax
      reason: The exemption depends on commodities and services defined under section 39-26-102 (11), whose copied RuleSpec context is deferred.
      source_values:
        - us-co:statutes/39/39-26-704#permanent_resident_occupancy_minimum_consecutive_days
    - output: us-co:statutes/39/39-26-704#permanent_lodging_sales_exempt_from_local_tax
      reason: The local-tax exemption depends on commodities and services defined under section 39-26-102 (11), whose copied RuleSpec context is deferred.
      source_values:
        - us-co:statutes/39/39-26-704#permanent_resident_occupancy_minimum_consecutive_days
    - output: us-co:statutes/39/39-26-704#qualifying_exchange_sales_exempt_from_part_1_tax
      reason: The exemption depends on classifications and purchase-price mechanics in sections 39-26-102 (7) and 39-26-104 (1)(b)(I), which are not available as executable imports for this result.
rules:
  - name: permanent_resident_occupancy_minimum_consecutive_days
    kind: parameter
    dtype: Count
    source: C.R.S. 39-26-704(3)(a)-(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-26-704
              excerpt: "a period of at least thirty consecutive days"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: government_sale_exempt_from_part_1_tax
    kind: derived
    entity: Transaction
    dtype: Judgment
    period: Year
    source: C.R.S. 39-26-704(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-26-704
              excerpt: "All sales to the United States government and to the state of Colorado ... and the political subdivisions thereof in their governmental capacities only shall be exempt"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          sale_is_to_united_states_government
          or (
            sale_is_to_colorado_state_department_institution_or_political_subdivision
            and purchaser_acts_in_governmental_capacity
          )

  - name: constitutionally_or_legally_prohibited_sale_exempt_from_part_1_tax
    kind: derived
    entity: Transaction
    dtype: Judgment
    period: Year
    source: C.R.S. 39-26-704(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-26-704
              excerpt: "all sales that the state of Colorado is prohibited from taxing under the constitution or laws of the United States or the state of Colorado"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          sale_is_prohibited_from_colorado_taxation_by_federal_or_state_constitution_or_law

  - name: nonprofit_school_sale_exempt_from_part_1_tax
    kind: derived
    entity: Transaction
    dtype: Judgment
    period: Year
    source: C.R.S. 39-26-704(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-26-704
              excerpt: "All sales made to schools, other than schools held or conducted for private or corporate profit, shall be exempt"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          sale_is_to_school
          and not school_is_held_or_conducted_for_private_or_corporate_profit
