format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-10-114.5
  summary: |-
    “If the board of county commissioners ... or the property tax administrator ... denies the petition for refund or abatement of taxes in whole or in part, the petitioner may appeal to the board of assessment appeals ... within thirty days of the entry of any such decision.” A petitioner or respondent may petition the court of appeals for the specified judicial review following an adverse board of assessment appeals decision.
rules:
  - name: appeal_to_board_of_assessment_appeals_deadline_days
    kind: parameter
    dtype: Count
    period: Day
    source: C.R.S. 39-10-114.5(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-10-114.5
              excerpt: "within thirty days of the entry of any such decision"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30
  - name: petitioner_may_appeal_denial_to_board_of_assessment_appeals
    kind: derived
    entity: Petitioner
    dtype: Judgment
    period: Day
    source: C.R.S. 39-10-114.5(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-10-114.5
              excerpt: "denies the petition for refund or abatement of taxes in whole or in part"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-10-114.5
              excerpt: "within thirty days of the entry of any such decision"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (board_of_county_commissioners_denied_tax_refund_or_abatement_petition
          or property_tax_administrator_denied_tax_refund_or_abatement_petition)
          and days_since_denial_decision_entry <= appeal_to_board_of_assessment_appeals_deadline_days
  - name: petitioner_may_seek_court_of_appeals_judicial_review
    kind: derived
    entity: Petitioner
    dtype: Judgment
    period: Day
    source: C.R.S. 39-10-114.5(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-10-114.5
              excerpt: "the decision of the board of assessment appeals is against the petitioner"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          board_of_assessment_appeals_decision_is_against_petitioner
  - name: respondent_may_seek_judicial_review_based_on_board_recommendation
    kind: derived
    entity: Respondent
    dtype: Judgment
    period: Day
    source: C.R.S. 39-10-114.5(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-10-114.5
              excerpt: "upon the recommendation of the board that it either is a matter of statewide concern or has resulted in a significant decrease in the total valuation for assessment of the county"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          board_of_assessment_appeals_decision_is_against_respondent
          and (board_recommends_decision_is_matter_of_statewide_concern
          or board_recommends_decision_resulted_in_significant_county_valuation_decrease)
  - name: respondent_may_seek_judicial_review_of_procedural_or_legal_errors
    kind: derived
    entity: Respondent
    dtype: Judgment
    period: Day
    source: C.R.S. 39-10-114.5(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-10-114.5
              excerpt: "the respondent may petition the court of appeals for judicial review of alleged procedural errors or errors of law"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          board_of_assessment_appeals_decision_is_against_respondent
          and respondent_alleges_board_procedural_errors_or_errors_of_law
