format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-26-711
  summary: |-
    Effective July 1, 1984, sales of aircraft used or purchased for interstate commerce by a commercial airline are exempt under part 1; permanently affixed aircraft component property is also exempt. The corresponding storage, use, or consumption is exempt under part 2.
rules:
  - name: aircraft_sale_exempt_from_part_1_taxation
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-26-711(1)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-26-711
              excerpt: "sale of aircraft used or purchased for use in interstate commerce by a commercial airline"
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-co/statute/39/39-26-711
              excerpt: "Effective July 1, 1984"
    versions:
      - effective_from: '1984-07-01'
        formula: |-
          aircraft_is_used_or_purchased_for_interstate_commerce_by_commercial_airline
  - name: aircraft_component_property_sale_exempt_from_part_1_taxation
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-26-711(1)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-26-711
              excerpt: "tangible personal property that is to be permanently affixed or attached as a component part of an aircraft"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          tangible_personal_property_is_permanently_affixed_or_attached_as_component_part_of_aircraft
