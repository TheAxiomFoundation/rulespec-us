format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-2004
  summary: "\u201CQualified individual\u201D means a natural person at least eighteen\
    \ years old on December 31, 2021, resident for the entire 2021 income tax year,\
    \ who timely filed a return or grant application, including the stated extension-filer\
    \ path. The temporary refund is four hundred dollars for one qualified individual\
    \ and eight hundred dollars for a qualified joint pair, subject to adjustment\
    \ to the nearest fifty-dollar increment. A refund is allowed only if there are\
    \ additional excess state revenues."
  deferred_outputs:
  - output: us-co:statutes/39/39-22-2004/a#additional_excess_state_revenues
    reason: The definition depends on the constitutional state fiscal-year spending
      limitation and required-refund calculation under article X, section 20, and
      on the amount specified in section 24-77-103.8; executable RuleSpec targets
      for those dependencies are unavailable.
  - output: us-co:statutes/39/39-22-2004/d#total_excess_state_revenues
    reason: The definition depends on the constitutional state fiscal-year spending
      limitation and required-refund calculation under article X, section 20, and
      on the amount specified in section 24-77-103.8; executable RuleSpec targets
      for those dependencies are unavailable.
  - output: us-co:statutes/39/39-22-2004/2#temporary_refund_amount
    reason: The final temporary refund amount may be adjusted using total excess state
      revenues and projected refunds under sections 39-3-209 and 39-22-627. The available
      copied exports do not provide the projected refund amounts required by subsection
      (2)(d), and the total-excess-state-revenues dependency is unavailable.
    source_values:
    - us-co:statutes/39/39-22-2004#single_individual_base_refund
    - us-co:statutes/39/39-22-2004#joint_pair_base_refund
    - us-co:statutes/39/39-22-2004#refund_adjustment_increment
    - us-co:statutes/39/39-22-2004#refund_increase_trigger_fraction
    - us-co:statutes/39/39-22-2004#refund_decrease_trigger_fraction
  - output: us-co:statutes/39/39-22-2004/2#refund_allowed
    reason: Refund entitlement depends on the deferred definition and determination
      of additional excess state revenues.
  - output: us-co:statutes/39/39-22-2004/3#extension_filer_refund_reserve
    reason: The reserve requires an aggregate estimate across qualified extension
      filers and a final adjusted temporary refund amount; that administrative aggregate
      cannot be computed from the available executable dependencies.
  - output: us-co:statutes/39/39-22-2004/5/b#refund_after_unpaid_balance_or_debt_offset
    reason: The offset depends on the unavailable executable provisions of section
      39-21-108.
  - output: us-co:statutes/39/39-22-2004#qualified_individual
    reason: Generated rule used a local name that collides with a sibling RuleSpec
      export. This output is deferred until it can be encoded with a semantic branch-specific
      name without creating ambiguous sibling imports.
rules:
- name: qualified_individual_minimum_age
  kind: parameter
  dtype: Integer
  source: 39-22-2004(b)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-22-2004
          excerpt: at least eighteen years of age as of December 31, 2021
  versions:
  - effective_from: '2021-01-01'
    formula: '18'
- name: single_individual_base_refund
  kind: parameter
  dtype: Money
  unit: USD
  source: 39-22-2004(c)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-22-2004
          excerpt: Four hundred dollars for a qualified individual filing a single
            state income tax return or who applies for a grant
  versions:
  - effective_from: '2021-01-01'
    formula: '400'
- name: joint_pair_base_refund
  kind: parameter
  dtype: Money
  unit: USD
  source: 39-22-2004(c)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-22-2004
          excerpt: eight hundred dollars for two qualified individuals filing a joint
            state income tax return or who apply for a grant
  versions:
  - effective_from: '2021-01-01'
    formula: '800'
- name: refund_increase_trigger_fraction
  kind: parameter
  dtype: Rate
  source: 39-22-2004(2)(d)(I)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-22-2004
          excerpt: less than eighty-five percent of the total excess state revenues
  versions:
  - effective_from: '2021-01-01'
    formula: '0.85'
- name: refund_decrease_trigger_fraction
  kind: parameter
  dtype: Rate
  source: 39-22-2004(2)(d)(II)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-22-2004
          excerpt: more than eighty-seven percent of the total excess state revenues
  versions:
  - effective_from: '2021-01-01'
    formula: '0.87'
- name: refund_adjustment_increment
  kind: parameter
  dtype: Money
  unit: USD
  source: 39-22-2004(2)(d)(III)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-22-2004
          excerpt: adjust the temporary refund amount under this subsection (2)(d)
            to the nearest fifty dollar increment
  versions:
  - effective_from: '2021-01-01'
    formula: '50'
