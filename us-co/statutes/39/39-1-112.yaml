format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-1-112
  summary: |-
    Taxes levied under articles 1 to 13 are available for expenditure by the levying political subdivision during its fiscal year as collected, except as otherwise provided in article 1.5.
rules:
  - name: tax_collections_available_for_fiscal_year_expenditure
    kind: derived
    entity: PoliticalSubdivision
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-1-112
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-1-112
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-1-112
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          tax_is_levied_pursuant_to_articles_1_to_13
          and tax_is_collected_during_political_subdivision_fiscal_year
          and article_1_5_does_not_displace_this_section
