format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-11-149
  summary: |-
    After seven years from an en masse tax-lien sale involving two or more noncontiguous parcels, the assessment, sale, tax sale certificate, and treasurer's deed are deemed valid and legal. This does not apply to an action, suit, or proceeding pending on August 1, 1964, in which a party has or may assert invalidity, and does not alter section 39-11-148.
rules:
  - name: years_after_tax_sale_before_validity
    kind: parameter
    dtype: Count
    source: C.R.S. § 39-11-149
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-11-149
              excerpt: "after seven years from the date of any such sale"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          7

  - name: en_masse_tax_sale_records_deemed_valid
    kind: derived
    entity: TaxSale
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-11-149
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-11-149
              excerpt: "two or more noncontiguous lots, tracts of land, or mining claims"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-11-149
              excerpt: "have not been separately valued and assessed"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-11-149
              excerpt: "having been separately valued and assessed, whether having a common ownership or not, have had tax liens thereof sold en masse for a gross sum"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-11-149
              excerpt: "after seven years from the date of any such sale"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-11-149
              excerpt: "any such action, suit, or proceeding pending on August 1, 1964, wherein any party thereto has or may assert the invalidity"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-11-149
              excerpt: "such assessment and sale and any tax sale certificate issued thereon shall be deemed valid and legal"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (
            noncontiguous_parcels_not_separately_valued_and_assessed_with_tax_liens_sold_en_masse
            or separately_valued_and_assessed_noncontiguous_parcels_with_tax_liens_sold_en_masse
          )
          and years_since_tax_sale > years_after_tax_sale_before_validity
          and not action_pending_under_statutory_exception_and_party_may_assert_invalidity
