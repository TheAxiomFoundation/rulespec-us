    corpus_citation_path: us-co/statute/39/39-22-5408
  summary: |-
    The authority shall annually report to the general assembly and public on the middle-income housing tax credit pilot program, with a final-year program summary, and shall provide the state auditor information necessary to evaluate the credit's effectiveness.
  deferred_outputs:
    - output: us-co:statutes/39/39-22-5408#annual_pilot_program_report_compliance
      reason: The provision imposes narrative reporting and public-disclosure duties requiring qualitative housing-market, demographic, development, application, impact, challenge, and opportunity information; these cannot be represented as a computable RuleSpec output.
    - output: us-co:statutes/39/39-22-5408#state_auditor_evaluation_information_compliance
      reason: The provision requires provision of whatever information is determined necessary for a state-auditor evaluation, without a computable definition of the necessary information.
