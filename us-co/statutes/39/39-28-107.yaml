format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-28-107
  summary: |-
    Unstamped cigarette packages found in this state are contraband unless protected for a licensed wholesaler; this section does not apply to cigarettes purchased from a United States military exchange or commissary when not for resale in this state. The civil-penalty ceiling is twenty-five cents per cigarette.
  deferred_outputs:
    - output: us-co:statutes/39/39-28-107/a#civil_penalty_imposed
      reason: The executive director has discretionary authority to impose a civil penalty up to the statutory ceiling; the source does not establish a deterministic imposed amount.
    - output: us-co:statutes/39/39-28-107/b#tobacco_tax_enforcement_cash_fund_balance
      reason: Fund balance and deposits depend on amounts under sections 39-28-116, 39-28.5-106, and 39-28.6-107, which are not available in copied context.
    - output: us-co:statutes/39/39-28-107/2#confiscated_cigarettes_sale_proceeds_distribution
      reason: Distribution is governed by section 39-28-110(1), which is not available in copied context.
rules:
  - name: unstamped_cigarette_civil_penalty_cap_per_cigarette
    kind: parameter
    dtype: Money
    unit: USD
    source: 39-28-107(1)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-28-107
              excerpt: "does not exceed twenty-five cents per cigarette purchased or possessed"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.25

  - name: licensed_wholesaler_shipping_protection_applies
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: 39-28-107(1)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-28-107
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          package_is_in_possession_of_licensed_wholesaler_in_original_unopened_shipping_package
          or package_is_in_transit_to_licensed_wholesaler

  - name: military_exchange_or_commissary_exemption_applies
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: 39-28-107(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-28-107
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          cigarettes_purchased_from_united_states_military_exchange_or_commissary
          and not cigarettes_are_for_resale_in_state

  - name: unstamped_cigarette_package_is_contraband
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: 39-28-107(1)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-28-107
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-28-107
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          package_contains_cigarettes
          and package_found_in_state
          and package_has_no_stamp_or_imprint
          and not licensed_wholesaler_shipping_protection_applies
          and not military_exchange_or_commissary_exemption_applies
