format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-28-203
  summary: |-
    A tobacco product manufacturer electing escrow shall place funds into a qualified escrow fund by April 15 of the following year at source-stated per-unit amounts adjusted for inflation. Escrow funds may be released only under specified judgment, excess-payment, and twenty-five-year circumstances; failures may result in escrow obligations, civil penalties, and sales prohibitions.
  deferred_outputs:
    - output: us-co:statutes/39/39-28-203/b#escrow_release_and_enforcement
      reason: The escrow-release sequence, master-settlement comparison, inflation adjustment, court determinations, penalties, and sales prohibition require transaction, judgment, settlement, escrow-account, and legal-determination state not representable as a single supported entity-scoped output.
      source_values:
        - us-co:statutes/39/39-28-203#escrow_fund_release_after_years
        - us-co:statutes/39/39-28-203#nonknowing_daily_penalty_rate_cap
        - us-co:statutes/39/39-28-203#nonknowing_total_penalty_rate_cap
        - us-co:statutes/39/39-28-203#knowing_daily_penalty_rate_cap
        - us-co:statutes/39/39-28-203#knowing_total_penalty_rate_cap
        - us-co:statutes/39/39-28-203#sales_prohibition_years_cap
rules:
  - name: escrow_base_amount_per_unit
    kind: parameter
    dtype: Money
    unit: USD
    source: 39-28-203(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-28-203
              excerpt: "2000: $.0104712 per unit sold"
          - path: versions[1].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-28-203
              excerpt: "For each of 2001 and 2002: $.0136125 per unit sold"
          - path: versions[2].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-28-203
              excerpt: "For each of 2003 through 2006: $.0167539 per unit sold"
          - path: versions[3].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-28-203
              excerpt: "For each of 2007 and each year thereafter: $.0188482 per unit sold"
    versions:
      - effective_from: '1999-07-02'
        formula: |-
          0.0094241
      - effective_from: '2000-01-01'
        formula: |-
          0.0104712
      - effective_from: '2001-01-01'
        formula: |-
          0.0136125
      - effective_from: '2003-01-01'
        formula: |-
          0.0167539
      - effective_from: '2007-01-01'
        formula: |-
          0.0188482
  - name: statutory_base_escrow_amount
    kind: derived
    entity: TobaccoProductManufacturer
    dtype: Money
    period: Year
    unit: USD
    source: 39-28-203(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-28-203
              excerpt: "Place into a qualified escrow fund ... the following amounts ... per unit sold"
    versions:
      - effective_from: '1999-07-02'
        formula: |-
          units_sold_to_consumers_in_state * escrow_base_amount_per_unit
  - name: escrow_fund_release_after_years
    kind: parameter
    dtype: Count
    source: 39-28-203(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-28-203
              excerpt: "twenty-five years after the date on which the funds were placed into escrow"
    versions:
      - effective_from: '1999-07-02'
        formula: |-
          25
  - name: escrow_cure_period_days
    kind: parameter
    dtype: Count
    source: 39-28-203(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-28-203
              excerpt: "within fifteen days to place such funds into escrow"
    versions:
      - effective_from: '1999-07-02'
        formula: |-
          15
  - name: nonknowing_daily_penalty_rate_cap
    kind: parameter
    dtype: Rate
    source: 39-28-203(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-28-203
              excerpt: "not to exceed five percent ... per day"
    versions:
      - effective_from: '1999-07-02'
        formula: |-
          0.05
  - name: nonknowing_total_penalty_rate_cap
    kind: parameter
    dtype: Rate
    source: 39-28-203(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-28-203
              excerpt: "not to exceed one hundred percent"
    versions:
      - effective_from: '1999-07-02'
        formula: |-
          1
  - name: knowing_daily_penalty_rate_cap
    kind: parameter
    dtype: Rate
    source: 39-28-203(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-28-203
              excerpt: "not to exceed fifteen percent ... per day"
    versions:
      - effective_from: '1999-07-02'
        formula: |-
          0.15
  - name: knowing_total_penalty_rate_cap
    kind: parameter
    dtype: Rate
    source: 39-28-203(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-28-203
              excerpt: "not to exceed three hundred percent"
    versions:
      - effective_from: '1999-07-02'
        formula: |-
          3
  - name: sales_prohibition_years_cap
    kind: parameter
    dtype: Count
    source: 39-28-203(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-28-203
              excerpt: "for a period not to exceed two years"
    versions:
      - effective_from: '1999-07-02'
        formula: |-
          2
