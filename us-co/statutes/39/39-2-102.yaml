format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-2-102
  summary: |-
    The person appointed as property tax administrator shall possess knowledge of the subject of property taxation and of the laws of this state relating thereto and shall have demonstrated ability and experience in the field of property taxation. He shall devote his full time to the performance of his duties as administrator and shall hold no other office under the United States, the state, or any political subdivision thereof.
rules:
  - name: property_tax_administrator_meets_appointment_qualifications
    kind: derived
    entity: PropertyTaxAdministrator
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-2-102, first sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-2-102
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          possesses_knowledge_of_property_taxation
          and possesses_knowledge_of_state_property_tax_laws
          and has_demonstrated_ability_and_experience_in_property_taxation

  - name: property_tax_administrator_satisfies_full_time_requirement
    kind: derived
    entity: PropertyTaxAdministrator
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-2-102, second sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-2-102
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          devotes_full_time_to_administrator_duties

  - name: property_tax_administrator_satisfies_other_office_prohibition
    kind: derived
    entity: PropertyTaxAdministrator
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-2-102, second sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-2-102
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not holds_other_office_under_united_states
          and not holds_other_office_under_state
          and not holds_other_office_under_political_subdivision
