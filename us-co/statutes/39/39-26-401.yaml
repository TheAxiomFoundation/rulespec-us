format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-26-401
  summary: |-
    “Biotechnology means” specified technological applications with health-care endpoints; “clean technology means” specified energy technologies; “medical technology means” a therapeutic or diagnostic machine or tool used to improve health; tangible personal property includes specified laboratory property.
  deferred_outputs:
    - output: us-co:statutes/39/39-26-401/4#qualified_biotechnology_taxpayer
      reason: Qualification depends on entity-form definitions in section 39-22-103, which is not available in copied context.
    - output: us-co:statutes/39/39-26-401/5#qualified_medical_or_clean_technology_taxpayer
      reason: Qualification depends on entity-form definitions in section 39-22-103, which is not available in copied context.
    - output: us-co:statutes/39/39-26-401/6#research_and_development
      reason: Research and development is defined exclusively by 26 U.S.C. sec. 41(d)(1), which is not available in copied context.
rules:
  - name: biotechnology
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: 39-26-401(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-26-401
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          technology_produces_or_modifies_products_or_develops_microorganisms_or_identifies_pharmaceutical_targets_or_transforms_biological_systems
          and resulting_endpoint_improves_human_or_animal_health_care_outcomes
  - name: clean_technology
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: 39-26-401(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-26-401
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_renewable_energy_generation_technology
          or asset_is_used_in_commercial_scale_renewable_energy_development_or_generation
          or asset_enhances_energy_extraction_collection_storage_distribution_production_or_consumption
  - name: medical_technology
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: 39-26-401(d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-26-401
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_therapeutic_or_diagnostic_machine_or_tool
          and asset_improves_human_or_animal_health
  - name: laboratory_property_is_included_tangible_personal_property
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: 39-26-401(d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-26-401
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_laboratory_capital_equipment_instrument_apparatus_or_supply
