format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-26-710
  summary: |-
    Sales of specified railroad track materials and rolling stock are exempt under part 1; specified rolling-stock property storage, use, or consumption is exempt under part 2. Actual use of exempted railroad-track materials is subject to part 2 and applicable use tax.
rules:
  - name: railroad_track_material_sale_exempt_from_part_1_taxation
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Day
    source: C.R.S. 39-26-710(1)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-26-710
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          sale_is_construction_or_building_materials
          and purchaser_is_common_carrier_by_rail_operating_in_interstate_or_foreign_commerce
          and materials_are_for_construction_or_maintenance_of_purchaser_railroad_tracks

  - name: railroad_rolling_stock_component_sale_exempt_from_part_1_taxation
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Day
    source: C.R.S. 39-26-710(1)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-26-710
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          sale_is_tangible_personal_property
          and property_is_to_be_affixed_or_attached_as_component_of_railroad_rolling_stock

  - name: interstate_railroad_rolling_stock_sale_exempt_from_part_1_taxation
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Day
    source: C.R.S. 39-26-710(1)(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-26-710
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          sale_is_locomotive_freight_car_railroad_work_equipment_or_other_rolling_stock
          and rolling_stock_is_used_or_purchased_for_use_in_interstate_commerce_by_railroad_company

  - name: railroad_rolling_stock_component_activity_exempt_from_part_2_taxation
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Day
    source: C.R.S. 39-26-710(2)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-26-710
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          activity_is_storage_use_or_consumption_of_tangible_personal_property
          and property_is_to_be_affixed_or_attached_as_component_of_railroad_rolling_stock

  - name: interstate_railroad_rolling_stock_activity_exempt_from_part_2_taxation
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Day
    source: C.R.S. 39-26-710(2)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-26-710
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          activity_is_storage_use_or_consumption_of_railroad_rolling_stock
          and rolling_stock_is_used_or_purchased_for_use_in_interstate_commerce_by_railroad_company

  - name: actual_use_of_railroad_track_materials_subject_to_taxation
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Day
    source: C.R.S. 39-26-710(1)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-26-710
              excerpt: "any actual use of such construction and building materials shall ... be subject to the tax"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          actual_use_is_of_materials_sold_to_common_carrier_by_rail
          and actual_use_is_for_construction_or_maintenance_of_railroad_tracks
