format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-10-113
  summary: |-
    If the current-year levy has not been fixed and made, the previous year's levy shall be used to determine taxes due on taxable personal property.
  deferred_outputs:
    - output: us-co:statutes/39/39-10-113/1/a#immediate_personal_property_tax_collection_authority
      reason: The discretionary collection, distraint, seizure, and sale authorities require modeling actions by the treasurer and enforcement procedures.
    - output: us-co:statutes/39/39-10-113/3#personal_property_tax_overcollection_refund_and_undercollection_reporting
      reason: The refund and erroneous-assessment reporting duties require transactional collection and payment records not represented by this scalar tax-determination rule.
rules:
  - name: taxes_due_using_previous_year_levy
    kind: derived
    entity: Asset
    dtype: Money
    unit: USD
    period: Year
    source: 39-10-113(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-10-113
              excerpt: "If the levy for the current year has not then been fixed and made, the levy for the previous year shall be used to determine the amount of taxes due."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if current_year_levy_has_not_been_fixed_and_made:
            valuation_for_assessment * previous_year_levy
          else: 0
