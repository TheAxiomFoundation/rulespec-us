format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-3-111.5
  summary: |-
    Property owned and used solely and exclusively for strictly charitable purposes and not for private gain or corporate profit is exempt from property tax if owned by a nonprofit corporation, used by licensed physicians or dentists to practice, available upon request with ability-to-pay charges for financially needy patients, and county-certified as needed.
  deferred_outputs:
    - output: us-co:statutes/39/39-3-111.5#section_39_3_116_limitations_do_not_apply
      reason: The effect of the referenced limitations cannot be represented without the missing RuleSpec source for section 39-3-116.
    - output: us-co:statutes/39/39-3-111.5#exemption_claim_complies_with_section_39_2_117
      reason: Required exemption-claim compliance depends on the missing RuleSpec source for section 39-2-117.
rules:
  - name: charitable_healthcare_property_tax_exemption_applies
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. 39-3-111.5(1)(a)-(d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-3-111.5
              excerpt: "shall be exempt from the levy and collection of property tax if"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          property_owned_and_used_solely_and_exclusively_for_strictly_charitable_purposes
          and property_not_used_for_private_gain_or_corporate_profit
          and property_owned_by_nonprofit_corporation
          and property_occupied_or_used_by_physician_or_dentist_licensed_in_this_state_for_practice
          and health_care_services_provided_to_patients_who_request_services
          and financially_needy_patients_charged_based_on_ability_to_pay
          and county_board_certifies_need_for_health_care_services
