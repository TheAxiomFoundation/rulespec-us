format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-26-105.5
  summary: |-
    A vendor whose previous-calendar-year state-sales-tax-only liability was more than seventy-five thousand dollars shall use electronic funds transfers to remit all required state and local sales taxes.
rules:
  - name: electronic_funds_transfer_liability_threshold
    kind: parameter
    dtype: Money
    unit: USD
    source: Colo. Rev. Stat. § 39-26-105.5
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-26-105.5
              excerpt: "more than seventy-five thousand dollars"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          75000
  - name: vendor_must_use_electronic_funds_transfers_for_sales_tax_remittance
    kind: derived
    entity: Vendor
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-26-105.5
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-26-105.5
              excerpt: "a vendor whose liability for state sales tax only for the previous calendar year was more than seventy-five thousand dollars shall use electronic funds transfers"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-26-105.5
              excerpt: "more than seventy-five thousand dollars"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          vendor_liability_for_state_sales_tax_only_previous_calendar_year > electronic_funds_transfer_liability_threshold
