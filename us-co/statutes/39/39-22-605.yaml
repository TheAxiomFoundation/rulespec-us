format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-605
  summary: |-
    An individual is a farmer or fisherman if farming or fishing gross income is at least two-thirds of total gross income for the taxable year or preceding taxable year return. Estimated-tax additions, required annual payment, and tax-liability definitions depend in part on unavailable cited authorities and administrative determinations.
  deferred_outputs:
    - output: us-co:statutes/39/39-22-605/b#colorado_return
      reason: The definition depends on the Colorado return required under section 39-22-601, whose copied RuleSpec context is deferred and has no executable export.
    - output: us-co:statutes/39/39-22-605/c#tax_liability
      reason: The definition subtracts the refund of excess state revenues under section 39-22-2004, for which no copied RuleSpec context is available.
    - output: us-co:statutes/39/39-22-605/b#required_annual_payment
      reason: The required annual payment requires tax-liability mechanics and prior-return conditions that cannot be completed faithfully while the section 39-22-601 return dependency is unavailable.
    - output: us-co:statutes/39/39-22-605/d#underpayment_addition_exception
      reason: The executive director's determinations of good cause, reasonable cause, and willful neglect are discretionary administrative determinations not computable from this source slice.
    - output: us-co:statutes/39/39-22-605/3#estimated_tax_underpayment_addition
      reason: The amount requires the interest rate established under section 39-21-110.5, for which no executable copied RuleSpec export is available.
rules:
  - name: farming_or_fishing_income_fraction_numerator
    kind: parameter
    dtype: Integer
    source: 39-22-605(2)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-605
              excerpt: "at least two-thirds"
    versions:
      - effective_from: '1999-01-01'
        formula: |-
          2
  - name: farming_or_fishing_income_fraction_denominator
    kind: parameter
    dtype: Integer
    source: 39-22-605(2)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-605
              excerpt: "at least two-thirds"
    versions:
      - effective_from: '1999-01-01'
        formula: |-
          3
  - name: farmer_or_fisherman
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 39-22-605(2)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-22-605
              excerpt: "An individual is a farmer or fisherman for any taxable year if"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-605
              excerpt: "gross income from farming or fishing ... is at least two-thirds of the total gross income"
    versions:
      - effective_from: '1999-01-01'
        formula: |-
          (taxable_year_gross_income_from_farming_or_fishing * farming_or_fishing_income_fraction_denominator
          >= taxable_year_total_gross_income * farming_or_fishing_income_fraction_numerator)
          or
          (preceding_taxable_year_return_gross_income_from_farming_or_fishing * farming_or_fishing_income_fraction_denominator
          >= preceding_taxable_year_return_total_gross_income * farming_or_fishing_income_fraction_numerator)
