format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-5503
  summary: "\u201CFor the 2025 calendar year, two million dollars\u201D through \u201C\
    for the 2029 calendar year, thirteen million dollars\u201D; credits are claimed\
    \ at seventy, eight, eight, seven, and seven percent over the credit period and\
    \ unused credit may be carried forward for three subsequent tax years."
  deferred_outputs:
  - output: us-co:statutes/39/39-22-5503#credit_carryforward_available_amount
    reason: Generated rule depends on an output that validation deferred because it
      flattened thresholded, capped, base-limited, or cross-referenced mechanics,
      or borrowed an unrelated same-named section term.
  - output: us-co:statutes/39/39-22-5503#credit_carryforward_year_limit
    reason: Generated rule used a local name that collides with a sibling RuleSpec
      export. This output is deferred until it can be encoded with a semantic branch-specific
      name without creating ambiguous sibling imports.
rules:
- name: annual_credit_authorization
  kind: parameter
  dtype: Money
  unit: USD
  indexed_by: credit_allocation_calendar_year
  source: C.R.S. 39-22-5503(2)(a)
  metadata:
    proof:
      atoms:
      - path: versions[0].values
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-22-5503
          excerpt: For the 2025 calendar year, two million dollars ... for the 2029
            calendar year, thirteen million dollars.
  versions:
  - effective_from: '2025-01-01'
    values:
      2025: 2000000
      2026: 2000000
      2027: 2000000
      2028: 11000000
      2029: 13000000
- name: aggregate_credit_allocation_period_cap
  kind: parameter
  dtype: Money
  unit: USD
  source: C.R.S. 39-22-5503(4)(a)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-22-5503
          excerpt: a total amount of thirty million dollars in credits
  versions:
  - effective_from: '2025-01-01'
    formula: '30000000'
- name: accelerated_credit_claim_percentage
  kind: parameter
  dtype: Rate
  indexed_by: credit_period_year_number
  source: C.R.S. 39-22-5503(4)(b)
  metadata:
    proof:
      atoms:
      - path: versions[0].values
        kind: parameter_table
        source:
          corpus_citation_path: us-co/statute/39/39-22-5503
          excerpt: seventy percent ... eight percent ... seven percent
  versions:
  - effective_from: '2025-01-01'
    values:
      1: 0.7
      2: 0.08
      3: 0.08
      4: 0.07
      5: 0.07
- name: credit_period_claim_years
  kind: parameter
  dtype: Count
  source: C.R.S. 39-22-5503(4)(b)(V)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-22-5503
          excerpt: fifth year of the credit period
  versions:
  - effective_from: '2025-01-01'
    formula: '5'
- name: restrictive_covenant_minimum_term
  kind: parameter
  dtype: Count
  source: C.R.S. 39-22-5503(6)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-22-5503
          excerpt: for a period of fifteen income tax years
  versions:
  - effective_from: '2025-01-01'
    formula: '15'
- name: annual_credit_allocation_ceiling
  kind: derived
  entity: StateAgency
  dtype: Money
  period: Year
  unit: USD
  source: C.R.S. 39-22-5503(2)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-22-5503
          excerpt: Credits authorized ... plus unallocated credits ... and any credit
            recaptured or otherwise returned.
  versions:
  - effective_from: '2025-01-01'
    formula: 'annual_credit_authorization[credit_allocation_calendar_year]

      + unallocated_credits_from_immediately_preceding_calendar_year

      + credits_recaptured_or_returned_in_calendar_year'
- name: allocated_credit_claim_amount
  kind: derived
  entity: TaxUnit
  dtype: Money
  period: Year
  unit: USD
  source: C.R.S. 39-22-5503(1), (4)(b), (7)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-22-5503
          excerpt: The full amount must be claimed ... according to the following
            schedule.
  versions:
  - effective_from: '2025-01-01'
    formula: 'if taxpayer_is_qualified and credit_is_allocated_by_authority: accelerated_credit_claim_percentage[credit_period_year_number]
      * max(0, allocated_credit_amount) else: 0'
