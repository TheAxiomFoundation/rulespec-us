rules:
- name: annual_credit_authorization
  kind: parameter
  dtype: Money
  unit: USD
  indexed_by: credit_allocation_calendar_year
  source: C.R.S. 39-22-5503(2)(a)
  metadata:
    proof:
      atoms:
      - path: versions[0].values
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-22-5503
          excerpt: "Credits authorized as follows:\n(I) For the 2025 calendar year, two million dollars;\n(II) For the 2026 calendar year, two million dollars;\n(III) For the 2027 calendar year, two million dollars;\n(IV) For the 2028 calendar year, eleven million dollars; and\n(V) For the 2029 calendar year, thirteen million dollars"
  versions:
  - effective_from: '2025-01-01'
    values:
      2025: 2000000
      2026: 2000000
      2027: 2000000
      2028: 11000000
      2029: 13000000
- name: aggregate_credit_allocation_period_cap
  kind: parameter
  dtype: Money
  unit: USD
  source: C.R.S. 39-22-5503(4)(a)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-22-5503
          excerpt: a total amount of thirty million dollars in credits
  versions:
  - effective_from: '2025-01-01'
    formula: '30000000'
- name: accelerated_credit_claim_percentage
  kind: parameter
  dtype: Rate
  indexed_by: credit_period_year_number
  source: C.R.S. 39-22-5503(4)(b)
  metadata:
    proof:
      atoms:
      - path: versions[0].values
        kind: parameter_table
        source:
          corpus_citation_path: us-co/statute/39/39-22-5503
          excerpt: "seventy percent of the total amount of the credit the\nauthority allocates to the taxpayer;\n(II) The amount of the credit that a taxpayer claims in the second year of the\ncredit period must equal eight percent of the total amount of the credit the\nauthority allocates to the taxpayer;\n(III) The amount of the credit that a taxpayer claims in the third year of the\ncredit period must equal eight percent of the total amount of the credit the\nauthority allocates to the taxpayer;\n(IV) The amount of the credit that a taxpayer claims in the fourth year of the\ncredit period must equal seven percent"
  versions:
  - effective_from: '2025-01-01'
    values:
      1: 0.7
      2: 0.08
      3: 0.08
      4: 0.07
      5: 0.07
- name: credit_period_claim_years
  kind: parameter
  dtype: Count
  source: C.R.S. 39-22-5503(4)(b)(V)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-22-5503
          excerpt: "fifth year of the\ncredit period"
  versions:
  - effective_from: '2025-01-01'
    formula: '5'
- name: restrictive_covenant_minimum_term
  kind: parameter
  dtype: Count
  source: C.R.S. 39-22-5503(6)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-22-5503
          excerpt: for a period of fifteen income tax years
  versions:
  - effective_from: '2025-01-01'
    formula: '15'
- name: annual_credit_allocation_ceiling
  kind: derived
  entity: StateAgency
  dtype: Money
  period: Year
  unit: USD
  source: C.R.S. 39-22-5503(2)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-22-5503
          excerpt: "(2) The aggregate amount of credits allocated by the authority in each of the\n2025 through 2029 calendar years must not exceed the aggregate amount of:\n(a) Credits authorized as follows:\n(I) For the 2025 calendar year, two million dollars;\n(II) For the 2026 calendar year, two million dollars;\n(III) For the 2027 calendar year, two million dollars;\n(IV) For the 2028 calendar year, eleven million dollars; and\n(V) For the 2029 calendar year, thirteen million dollars; plus\n(b) Unallocated credits, if any, for the immediately preceding calendar year;\nand\n(c) Any credit recaptured or otherwise returned to the authority in the\ncalendar year."
  versions:
  - effective_from: '2025-01-01'
    formula: 'annual_credit_authorization[credit_allocation_calendar_year]

      + unallocated_credits_from_immediately_preceding_calendar_year

      + credits_recaptured_or_returned_in_calendar_year'
- name: allocated_credit_claim_amount
  kind: derived
  entity: TaxUnit
  dtype: Money
  period: Year
  unit: USD
  source: C.R.S. 39-22-5503(1), (4)(b), (7)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-22-5503
          excerpt: "(1) For income tax years during the credit period, there is allowed to any qualified taxpayer a credit with respect to the income taxes imposed by this article 22 in the amount determined by the authority pursuant to this part 55.\n(2) The aggregate amount of credits allocated by the authority in each of the\n2025 through 2029 calendar years must not exceed the aggregate amount of:\n(a) Credits authorized as follows:\n(I) For the 2025 calendar year, two million dollars;\n(II) For the 2026 calendar year, two million dollars;\n(III) For the 2027 calendar year, two million dollars;\n(IV) For the 2028 calendar year, eleven million dollars; and\n(V) For the 2029 calendar year, thirteen million dollars; plus\n(b) Unallocated credits, if any, for the immediately preceding calendar year;\nand\n(c) Any credit recaptured or otherwise returned to the authority in the\ncalendar year.\n(3) The authority may allocate a credit to an owner of a qualified\ndevelopment by issuing to the owner an allocation certificate. The authority may\ndetermine the time at which such allocation certificate is issued. The credit must be\nin an amount determined by the authority, subject to the following guidelines:\n(a) The credit must be necessary for the financial feasibility of such\ndevelopment;\n(b) All allocations must be made pursuant to the allocation plan; and\n(c) The aggregate sum of credits allocated annually must not exceed the\nlimits set forth in subsection (2) of this section.\n(4) (a) On or after January 1, 2025, but prior to December 31, 2029, the\nauthority may allocate a total amount of thirty million dollars in credits.\n(b) The taxpayer shall not claim the credit ratably over the credit period.\nInstead, the credit must be accelerated and the full amount must be claimed\nagainst the taxes imposed by this article 22 over the credit period according to the\nfollowing schedule:\n(I) The amount of the credit that a taxpayer claims in the first year of the\ncredit period must equal seventy percent of the total amount of the credit the\nauthority allocates to the taxpayer;\n(II) The amount of the credit that a taxpayer claims in the second year of the\ncredit period must equal eight percent of the total amount of the credit the\nauthority allocates to the taxpayer;\n(III) The amount of the credit that a taxpayer claims in the third year of the\ncredit period must equal eight percent of the total amount of the credit the\nauthority allocates to the taxpayer;\n(IV) The amount of the credit that a taxpayer claims in the fourth year of the\ncredit period must equal seven percent of the total amount of the credit the\nauthority allocates to the taxpayer; and\n(V) The amount of the credit that a taxpayer claims in the fifth year of the\ncredit period must equal seven percent of the total amount of the credit the\nauthority allocates to the taxpayer."
  versions:
  - effective_from: '2025-01-01'
    formula: 'if taxpayer_is_qualified and credit_is_allocated_by_authority: accelerated_credit_claim_percentage[credit_period_year_number]
      * max(0, allocated_credit_amount) else: 0'
