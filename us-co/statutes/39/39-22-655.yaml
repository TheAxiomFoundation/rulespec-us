format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-655
  summary: |-
    A taxpayer failing to disclose a reportable transaction is subject to a penalty of up to fifteen thousand dollars; failure to disclose a listed transaction is subject to a penalty of up to fifty thousand dollars. The penalty is imposed once on a combined report or consolidated return.
rules:
  - name: reportable_transaction_nondisclosure_maximum_penalty
    kind: parameter
    dtype: Money
    unit: USD
    source: CO Rev. Stat. § 39-22-655(1)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-655
              excerpt: "a penalty of up to fifteen thousand dollars"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          15000

  - name: listed_transaction_nondisclosure_maximum_penalty
    kind: parameter
    dtype: Money
    unit: USD
    source: CO Rev. Stat. § 39-22-655(1)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-655
              excerpt: "a penalty of up to fifty thousand dollars"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          50000

  - name: transaction_nondisclosure_maximum_penalty
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: CO Rev. Stat. § 39-22-655(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-655
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:statutes/39/39-22-655#reportable_transaction_nondisclosure_maximum_penalty
              output: reportable_transaction_nondisclosure_maximum_penalty
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:statutes/39/39-22-655#listed_transaction_nondisclosure_maximum_penalty
              output: listed_transaction_nondisclosure_maximum_penalty
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if taxpayer_fails_to_disclose_listed_transaction:
            listed_transaction_nondisclosure_maximum_penalty
          else:
            if taxpayer_fails_to_disclose_reportable_transaction:
              reportable_transaction_nondisclosure_maximum_penalty
            else:
              0

  - name: combined_report_or_consolidated_return_transaction_nondisclosure_maximum_penalty
    kind: derived
    entity: CombinedReport
    dtype: Money
    period: Year
    unit: USD
    source: CO Rev. Stat. § 39-22-655(1), (3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-655
              excerpt: "shall only be imposed once on the combined report or consolidated return"
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:statutes/39/39-22-655#reportable_transaction_nondisclosure_maximum_penalty
              output: reportable_transaction_nondisclosure_maximum_penalty
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:statutes/39/39-22-655#listed_transaction_nondisclosure_maximum_penalty
              output: listed_transaction_nondisclosure_maximum_penalty
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if combined_report_or_consolidated_return_has_member_failing_to_disclose_listed_transaction:
            listed_transaction_nondisclosure_maximum_penalty
          else:
            if combined_report_or_consolidated_return_has_member_failing_to_disclose_reportable_transaction:
              reportable_transaction_nondisclosure_maximum_penalty
            else:
              0
