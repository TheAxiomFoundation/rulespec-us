format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-623
  summary: |-
    “Effective July 1, 1987, an amount equal to twenty-seven percent of the gross state cigarette tax shall be apportioned” to qualifying incorporated cities, towns, and counties.
  deferred_outputs:
    - output: us-co:statutes/39/39-22-623/a#local_government_cigarette_tax_apportionment
      reason: Allocation requires jurisdiction-specific state-sales-tax collection percentages and the statutory gross-cigarette-tax definition, including the transfer required by section 24-22-118, which is not available as RuleSpec context.
    - output: us-co:statutes/39/39-22-623/b#remaining_cigarette_tax_proceeds_credited_to_general_fund
      reason: The remaining-funds calculation depends on apportionments under section 29-21-101 and the reserve created by section 39-29-107.8, neither of which is available as executable RuleSpec context.
    - output: us-co:statutes/39/39-22-623/c#local_government_cigarette_tax_distribution_timing
      reason: The administrative distribution deadline cannot be represented as a computable output with the supported entity and temporal schema.
    - output: us-co:statutes/39/39-22-623/d#local_government_right_to_verify_cigarette_tax_proceeds
      reason: The verification entitlement is an administrative access right, not a computable RuleSpec output.
    - output: us-co:statutes/39/39-22-623/e#pre_1973_local_cigarette_tax_bond_pledge_requirement
      reason: The obligation depends on historical local bond pledges and trust arrangements that are not representable as a supported computational output.
