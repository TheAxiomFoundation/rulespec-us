  source_verification:
    corpus_citation_path: us-co/statute/39/39-6-116
  summary: |-
    “Unpatented mining claims” includes federally located mining claims for which a patent has not issued and leasehold interests in real property obtained under the federal Mineral Lands Leasing Act of 1920.
