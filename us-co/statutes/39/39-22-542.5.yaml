format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-542.5
  summary: A qualified business may claim a certified credit for income tax years
    commencing on or after January 1, 2025, but before January 1, 2030, equal to fifty
    percent of eligible costs and not exceeding fifty thousand dollars. Unused credit
    is refundable.
  deferred_outputs:
  - output: us-co:statutes/39/39-22-542.5/a#alternate_equity_structure
    reason: Qualification depends on office guidelines and detailed employee-ownership
      rights and participation facts not represented as a complete executable relation.
    source_values:
    - us:statutes/39/39-22-542.5#alternate_equity_structure_minimum_worker_percentage
  - output: us-co:statutes/39/39-22-542.5/b#department
    reason: Institutional definition is documentary and has no computational consequence
      in this source slice.
  - output: us-co:statutes/39/39-22-542.5/c#eligible_costs
    reason: Eligible-cost categories are detailed in office guidelines not supplied
      as RuleSpec context.
  - output: us-co:statutes/39/39-22-542.5/d#employee_owned_business
    reason: The definition depends in part on employee stock ownership plan and worker-owned-cooperative
      definitions from unavailable cited federal sources.
  - output: us-co:statutes/39/39-22-542.5/e#employee_ownership_office
    reason: The office creation statute is an unavailable cited legal dependency.
  - output: us-co:statutes/39/39-22-542.5/f#employee_ownership_trust
    reason: The definition incorporates alternate-equity-structure requirements whose
      complete qualification mechanics are deferred.
    source_values:
    - us:statutes/39/39-22-542.5#employee_ownership_trust_minimum_security_percentage
  - output: us-co:statutes/39/39-22-542.5/h#new_employee_owned_business
    reason: The definition depends on the deferred employee-owned-business classification.
    source_values:
    - us:statutes/39/39-22-542.5#new_employee_owned_business_maximum_years
  - output: us-co:statutes/39/39-22-542.5/k#tax_credit
    reason: The definition is documentary; the operative certified-credit amount is
      encoded separately.
  - output: us-co:statutes/39/39-22-542.5/l#taxpayer
    reason: General taxpayer definition is documentary and has no separate computational
      consequence.
  - output: us-co:statutes/39/39-22-542.5/m#worker_owned_cooperative
    reason: Definition has the same meaning as an unavailable cited federal source.
  - output: us-co:statutes/39/39-22-542.5/b#single_credit_claim_for_eligible_costs
    reason: Application and claiming process limitation requires office certification
      and claim-processing records outside this computational surface.
  - output: us-co:statutes/39/39-22-542.5/e#aggregate_tax_credit_certificate_limit
    reason: Aggregate certificate issuance requires office-wide annual certificate
      records and ordering administration.
    source_values:
    - us:statutes/39/39-22-542.5#maximum_aggregate_tax_credit_certificates
rules:
- name: alternate_equity_structure_minimum_worker_percentage
  kind: parameter
  dtype: Rate
  source: 39-22-542.5(a)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-22-542.5
          excerpt: at least twenty percent
  versions:
  - effective_from: '2025-01-01'
    formula: '0.20'
- name: employee_ownership_trust_minimum_security_percentage
  kind: parameter
  dtype: Rate
  source: 39-22-542.5(f)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-22-542.5
          excerpt: at least twenty percent of the fully diluted securities
  versions:
  - effective_from: '2025-01-01'
    formula: '0.20'
- name: new_employee_owned_business_maximum_years
  kind: parameter
  dtype: Count
  source: 39-22-542.5(h)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-22-542.5
          excerpt: for seven years or fewer
  versions:
  - effective_from: '2025-01-01'
    formula: '7'
- name: new_employee_owned_business_credit_rate
  kind: parameter
  dtype: Rate
  source: 39-22-542.5(3)(a)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-22-542.5
          excerpt: equal to fifty percent of the eligible costs
  versions:
  - effective_from: '2025-01-01'
    formula: '0.50'
- name: new_employee_owned_business_credit_cap
  kind: parameter
  dtype: Money
  unit: USD
  source: 39-22-542.5(3)(a)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-22-542.5
          excerpt: not to exceed fifty thousand dollars
  versions:
  - effective_from: '2025-01-01'
    formula: '50000'
- name: maximum_application_fee
  kind: parameter
  dtype: Money
  unit: USD
  source: 39-22-542.5(4)(a)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-22-542.5
          excerpt: not to exceed two hundred fifty dollars
  versions:
  - effective_from: '2025-01-01'
    formula: '250'
- name: maximum_aggregate_tax_credit_certificates
  kind: parameter
  dtype: Money
  unit: USD
  source: 39-22-542.5(e)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-22-542.5
          excerpt: one million five hundred thousand dollars
  versions:
  - effective_from: '2025-01-01'
    formula: '1500000'
- name: new_employee_owned_business_tax_credit
  kind: derived
  entity: Business
  dtype: Money
  period: Year
  unit: USD
  source: 39-22-542.5(3)(a)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-22-542.5
          excerpt: Subject to certification by the office ... a qualified business
            is allowed a credit
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-22-542.5
          excerpt: equal to fifty percent of the eligible costs, not to exceed fifty
            thousand dollars
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/statute/39/39-22-542.5
          excerpt: The amount ... may claim ... is the amount stated on the tax credit
            certificate
  versions:
  - effective_from: '2025-01-01'
    formula: "if business_is_qualified\nand taxable_year_is_credit_period\nand business_received_tax_credit_certificate:\n\
      \  min(\n    min(\n      new_employee_owned_business_credit_rate * eligible_costs,\n\
      \      new_employee_owned_business_credit_cap\n    ),\n    tax_credit_certificate_amount\n\
      \  )\nelse: 0"
- name: unused_tax_credit_refund
  kind: derived
  entity: Business
  dtype: Money
  period: Year
  unit: USD
  source: 39-22-542.5(6)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-22-542.5
          excerpt: the amount of the tax credit not used to offset income taxes must
            be refunded
  versions:
  - effective_from: '2025-01-01'
    formula: max(0, new_employee_owned_business_tax_credit - income_taxes_due)
