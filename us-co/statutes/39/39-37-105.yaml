format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-37-105
  summary: |-
    Purchase price paid in a retail sale of a firearm, firearm precursor part, or ammunition to specified peace officers, employing law enforcement agencies, or active-duty United States armed-forces members is exempt from taxation.
rules:
  - name: purchase_price_exempt_from_article_37_taxation
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Year
    source: C.R.S. 39-37-105
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-37-105
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          payment_is_purchase_price_paid_in_consumation_of_retail_sale
          and retail_sale_is_of_firearm_firearm_precursor_part_or_ammunition
          and (
            purchaser_is_peace_officer
            or purchaser_is_law_enforcement_agency_employing_peace_officer
            or purchaser_is_active_duty_member_of_united_states_armed_forces
          )
