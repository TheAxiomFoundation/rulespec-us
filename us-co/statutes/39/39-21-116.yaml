format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-21-116
  summary: |-
    Upon expiration of the eighteen-month period, without determination and notice and demand, the personal representative, corporate directors and officers, or limited liability company or partnership members no longer will be liable under subsection (2).
  deferred_outputs:
    - output: us-co:statutes/39/39-21-116#fiduciary_distribution_personal_liability
      reason: The section 39-21-107 assessment limitation is cited, but copied context does not export a liability-timeliness predicate applicable to distributed property.
    - output: us-co:statutes/39/39-21-116#distributee_unpaid_income_tax_liability
      reason: The section 39-21-107 assessment limitation is cited, but copied context does not export a liability-timeliness predicate applicable to property received by a distributee.
rules:
  - name: requested_determination_period_months
    kind: parameter
    dtype: Integer
    source: C.R.S. 39-21-116(4)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-21-116
              excerpt: "within eighteen months after written request"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          18
  - name: personal_liability_terminates_after_requested_determination_period
    kind: derived
    entity: TaxLiabilityRepresentative
    dtype: Judgment
    period: Day
    source: C.R.S. 39-21-116(4)(a)-(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-21-116
              excerpt: "written request for such determination, filed\nafter the filing of the decedent's final return or filed after the filing of the return"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-21-116
              excerpt: "contemplates\ndissolution at or before the expiration of such eighteen-month period;\n(II) The dissolution is begun in good faith before the expiration of such\neighteen-month period; and\n(III) The dissolution is completed"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-21-116
              excerpt: "Upon the expiration of said eighteen-month period, without determination\nbeing made and notice and demand being issued"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          written_request_for_determination_filed_after_applicable_return
          and (
            not requester_is_corporation_limited_liability_company_or_partnership
            or (
              request_notifies_executive_director_of_contemplated_dissolution
              and dissolution_begun_in_good_faith_within_requested_determination_period
              and dissolution_completed
            )
          )
          and requested_determination_period_expired_without_determination_and_notice_and_demand
