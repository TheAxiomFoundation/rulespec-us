format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-26-206
  summary: |-
    Any person who willfully fails or refuses to make the required return, makes a false or fraudulent return, willfully fails to pay tax owing, or aids or abets tax evasion shall be punished as provided by section 39-21-118.
rules:
  - name: person_is_subject_to_statutory_tax_evasion_punishment
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: C.R.S. 39-26-206
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-26-206
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_willfully_fails_or_refuses_required_return
          or person_makes_false_or_fraudulent_return
          or person_willfully_fails_to_pay_tax_owing
          or person_aids_or_abets_another_tax_evasion_attempt
