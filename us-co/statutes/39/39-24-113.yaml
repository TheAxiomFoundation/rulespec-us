format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-24-113
  summary: |-
    Amounts agreed upon or fixed for board-member and employee compensation and expenses are administration expenses and shall be paid by the executor or administrator.
rules:
  - name: compensation_and_expenses_are_administration_expense
    kind: derived
    entity: EstateAdministration
    dtype: Judgment
    period: Year
    source: C.R.S. 39-24-113
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-24-113
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          compensation_and_expenses_agreed_upon
          or compensation_and_expenses_fixed_by_probate_court
  - name: executor_or_administrator_must_pay_board_compensation_and_expenses
    kind: derived
    entity: EstateAdministration
    dtype: Judgment
    period: Year
    source: C.R.S. 39-24-113
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-24-113
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          compensation_and_expenses_agreed_upon
          or compensation_and_expenses_fixed_by_probate_court
