format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-27-110
  summary: |-
    “The records required by this section shall be retained for a period of at least three years.” “Each sale or transfer of special fuel by a vendor into the tank of a motor vehicle weighing more than ten thousand pounds shall be recorded upon a preprinted, serially numbered invoice.”
rules:
  - name: records_retention_minimum_years
    kind: parameter
    dtype: Count
    period: Year
    source: C.R.S. 39-27-110(5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-27-110
              excerpt: "retained for a period of at least three years"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          3

  - name: special_fuel_vendor_invoice_vehicle_weight_threshold
    kind: parameter
    dtype: Decimal
    source: C.R.S. 39-27-110(3)(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-27-110
              excerpt: "motor vehicle weighing more than ten thousand pounds"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10000

  - name: required_records_retained_for_minimum_period
    kind: derived
    entity: FuelRecordsCustodian
    dtype: Judgment
    period: Year
    source: C.R.S. 39-27-110(5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-27-110
              excerpt: "The records required by this section shall be retained for a period of at least three years."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          records_required_by_this_section_retention_years >= records_retention_minimum_years

  - name: heavy_motor_vehicle_special_fuel_invoice_required
    kind: derived
    entity: FuelSale
    dtype: Judgment
    period: Day
    source: C.R.S. 39-27-110(3)(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-27-110
              excerpt: "Each sale or transfer of special fuel by a vendor into the tank of a motor vehicle weighing more than ten thousand pounds shall be recorded upon a preprinted, serially numbered invoice."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          vendor_delivers_special_fuel_into_motor_vehicle_tank
          and motor_vehicle_weight_pounds > special_fuel_vendor_invoice_vehicle_weight_threshold
