format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-29-110
  summary: "\u201COn July 1, 2025, and on July 1 of each year thereafter through July\
    \ 1, 2034, the state treasurer shall transfer fifteen million dollars from the\
    \ local government severance tax fund to the public safety communications trust\
    \ fund.\u201D"
  deferred_outputs:
  - output: us-co:statutes/39/39-29-110/b#local_government_severance_tax_fund_distributions
    reason: Distribution eligibility, prioritization, loan terms, recipient-level
      allocations, and referenced uranium-tailings requirements require fund balances,
      recipient relations, administrative guidelines, and unavailable cited legal
      dependencies not representable in this source slice.
  - output: us-co:statutes/39/39-29-110/d#producer_and_party_employee_residence_reports_and_penalties
    reason: Reporting, notice, and daily-penalty administration requires producer
      and party entities, fiscal-year timing, receipt-of-notice dates, and the unavailable
      notice procedures cited in section 39-21-105.5.
  - output: us-co:statutes/39/39-29-110/c#county_and_municipality_allocation_and_distribution
    reason: County and municipality allocation requires employee-residence, permit,
      production, population, road-mile, memorandum-of-understanding, and guideline-weight
      data relations not defined by this source slice.
rules:
- name: annual_public_safety_communications_trust_fund_transfer_amount
  kind: parameter
  dtype: Money
  unit: USD
  source: 39-29-110(10)(a)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-29-110
          excerpt: "\u201Ctransfer fifteen million dollars\u201D"
  versions:
  - effective_from: '2025-07-01'
    formula: '15000000'
- name: annual_public_safety_communications_trust_fund_transfer
  kind: derived
  entity: StateTreasurer
  dtype: Money
  period: Year
  unit: USD
  source: 39-29-110(10)(a)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/statute/39/39-29-110
          excerpt: "\u201Con July 1 of each year thereafter through July 1, 2034\u201D"
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-29-110
          excerpt: "\u201Ctransfer fifteen million dollars\u201D"
  versions:
  - effective_from: '2025-07-01'
    formula: 'if fiscal_year_is_within_public_safety_transfer_window: annual_public_safety_communications_trust_fund_transfer_amount
      else: 0'
