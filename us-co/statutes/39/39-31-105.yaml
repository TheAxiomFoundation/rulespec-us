format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-31-105
  summary: |-
    The executive director may promulgate rules necessary for administration of article 31. If the department incorrectly pays a grant because of departmental error, the executive director may waive reimbursement and related interest or penalties.
rules:
  - name: reimbursement_and_related_charges_may_be_waived
    kind: derived
    entity: StateAgency
    dtype: Judgment
    period: Year
    source: C.R.S. 39-31-105(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-31-105
              excerpt: "If the department of revenue incorrectly pays a grant under section 39-31-101 as a result of a departmental error"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-31-105
              excerpt: "may waive the reimbursement of the grant and any related interest or penalties"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          department_incorrectly_paid_article_31_grant
          and incorrect_payment_resulted_from_departmental_error
