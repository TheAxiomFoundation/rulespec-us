format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-26-728
  summary: |-
    Sales, storage, and use of qualified property for use in space flight are exempt for state fiscal years commencing on or after July 1, 2014. Qualified property includes space vehicles and components, property placed or used aboard a space vehicle, and exclusively space-flight fuel meeting the stated quality restriction.
  deferred_outputs:
    - output: us-co:statutes/39/39-26-728/b#space_flight
      reason: The definition concerns a flight event and its travel design; no flight-event entity or relation is available in this source slice.
    - output: us-co:statutes/39/39-26-728/4#annual_exemption_claim_reporting
      reason: The annual reporting duty is administrative and does not establish a computable policy output.
rules:
  - name: space_vehicle
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: 39-26-728(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-26-728
    versions:
      - effective_from: '2014-07-01'
        formula: |-
          asset_has_space_flight_capability
          and asset_is_intended_for_space_flight

  - name: qualified_property_for_use_in_space_flight
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: 39-26-728(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-26-728
    versions:
      - effective_from: '2014-07-01'
        formula: |-
          space_vehicle
          or asset_is_component_of_space_vehicle
          or tangible_personal_property_is_placed_or_used_aboard_space_vehicle
          or (
            fuel_is_not_adaptable_for_ordinary_motor_vehicle_use
            and fuel_is_produced_sold_and_used_exclusively_for_space_flight
          )

  - name: qualified_space_flight_property_exemption_applies
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: 39-26-728(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: effective_period
            source:
              corpus_citation_path: us-co/statute/39/39-26-728
              excerpt: "For the state fiscal years commencing on or after July 1, 2014"
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-26-728
    versions:
      - effective_from: '2014-07-01'
        formula: |-
          qualified_property_for_use_in_space_flight

  - name: launch_outcome_does_not_preclude_space_flight_property_exemption
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: 39-26-728(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-26-728
    versions:
      - effective_from: '2014-07-01'
        formula: |-
          qualified_property_for_use_in_space_flight
