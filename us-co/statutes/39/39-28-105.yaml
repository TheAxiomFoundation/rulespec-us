format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-28-105
  summary: |-
    Any wholesaler authorized to use a metering machine shall file with the department evidence of a savings account, deposit, or certificate of deposit meeting the requirements of section 11-35-101, C.R.S., or a bond issued by a surety company authorized to do business in this state in the amount of one thousand dollars, conditioned upon the payment of the tax upon cigarettes so imprinted.
    The tax for each unit placed on the machine at the time of setting ... shall be due and payable to the department on or before the tenth day of the month following the month in which the meter is set.
    If any licensed wholesaler is delinquent in remitting such payment, other than in unusual circumstances shown to the satisfaction of the executive director, the licensed wholesaler shall not be allowed to retain any amounts to cover his or her expense in collecting and remitting said tax, and, in addition, the penalty imposed under section 39-28-108 (2) shall apply.
  deferred_outputs:
    - output: us-co:statutes/39/39-28-105#metering_machine_tax_due
      reason: The tax due requires the tax imposed under sections 39-28-103.5 and article X, section 21 of the state constitution, the machine-unit count, and the section 39-28-104 discount. No copied RuleSpec context exports those required computational concepts.
