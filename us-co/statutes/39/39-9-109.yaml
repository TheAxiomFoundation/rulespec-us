format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-9-109
  summary: |-
    Acting by majority vote, the state board may waive the filing deadline for a required annual report when justice and equity would be served and the report is late, incomplete, or incorrect; a waiver deadline must not be sooner than thirty days after authorization.
  deferred_outputs:
    - output: us-co:statutes/39/39-9-109#property_tax_administrator_may_make_omitted_property_exemption_effective
      reason: The maximum period for an effective exemption is determined by section 39-10-101 (2)(b)(II), whose executable RuleSpec output is not available in copied context.
rules:
  - name: minimum_waiver_filing_deadline_days_after_authorization
    kind: parameter
    dtype: Integer
    source: C.R.S. 39-9-109(5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-9-109
              excerpt: "must not be sooner than thirty days after the date that the state board authorizes the waiver"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: state_board_may_authorize_annual_report_filing_deadline_waiver
    kind: derived
    entity: StateBoard
    dtype: Judgment
    period: Year
    source: C.R.S. 39-9-109(5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-9-109
              excerpt: "Acting by majority vote and when the state board of equalization determines that the interests of justice and equity would be served"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-9-109
              excerpt: "if the report is not filed by the filing deadline or if the report is filed by the filing deadline but is incomplete or otherwise incorrect"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          state_board_acts_by_majority_vote
          and interests_of_justice_and_equity_would_be_served
          and report_is_annual_report_required_to_be_filed_pursuant_to_section_39_2_117
          and (
            report_not_filed_by_filing_deadline
            or report_filed_by_filing_deadline_is_incomplete_or_incorrect
          )

  - name: waiver_filing_deadline_meets_minimum_notice_requirement
    kind: derived
    entity: StateBoard
    dtype: Judgment
    period: Year
    source: C.R.S. 39-9-109(5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-9-109
              excerpt: "When authorizing a waiver, the state board may determine a deadline for filing the report"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-9-109
              excerpt: "The deadline for filing the report must not be sooner than thirty days after the date that the state board authorizes the waiver."
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-9-109
              excerpt: "thirty days after the date that the state board authorizes the waiver"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          state_board_has_authorized_waiver
          and days_between_waiver_authorization_and_filing_deadline >= minimum_waiver_filing_deadline_days_after_authorization
