format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-10-101
  summary: The treasurer shall make an additional assessment for omitted taxable property;
    collection generally may not begin more than six years after tax is payable, or
    two years after governmental error or omission effective January 1, 1996. Fraudulent
    tax evasion may be assessed at any time. Delinquent interest on specified omitted
    mine and oil-and-gas property accrues from when taxes were due. A taxpayer-name
    error may be corrected and taxes collected from the intended person.
rules:
- name: general_collection_limitation_years
  kind: parameter
  dtype: Count
  source: "Colorado Revised Statutes \xA7 39-10-101(2)(b)(I)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-10-101
          excerpt: more than six years after the date on which the tax was or is payable
  versions:
  - effective_from: '0001-01-01'
    formula: '6'
- name: governmental_error_collection_limitation_years
  kind: parameter
  dtype: Count
  source: "Colorado Revised Statutes \xA7 39-10-101(2)(b)(II)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-10-101
          excerpt: more than six years after the date on which the tax was or is payable
      - path: versions[1].formula
        kind: effective_period
        source:
          corpus_citation_path: us-co/statute/39/39-10-101
          excerpt: Effective January 1, 1996
      - path: versions[1].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-10-101
          excerpt: more than two years after the date on which the tax was or is payable
  versions:
  - effective_from: '0001-01-01'
    formula: general_collection_limitation_years
  - effective_from: '1996-01-01'
    formula: '2'
- name: omitted_taxable_property_requires_additional_assessment
  kind: derived
  entity: Asset
  dtype: Judgment
  period: Year
  source: "Colorado Revised Statutes \xA7 39-10-101(2)(a)(I)-(II)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: predicate
        source:
          corpus_citation_path: us-co/statute/39/39-10-101
          excerpt: taxable property then located in the treasurer's county has been
            omitted
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-co/statute/39/39-10-101
          excerpt: neither the assessor nor the treasurer shall treat any possessory
            interest in exempt property as taxable property omitted
  versions:
  - effective_from: '0001-01-01'
    formula: 'treasurer_has_received_tax_list_and_warrant

      and asset_is_taxable_property

      and asset_is_located_in_treasurer_county

      and asset_is_omitted_from_tax_list_and_warrant

      and asset_has_not_been_valued_for_assessment

      and not possessory_interest_in_exempt_property_is_for_historical_excluded_tax_year'
- name: additional_assessment_or_collection_action_is_timely
  kind: derived
  entity: Asset
  dtype: Judgment
  period: Year
  source: "Colorado Revised Statutes \xA7 39-10-101(2)(b)-(c)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/statute/39/39-10-101
          excerpt: more than six years after the date on which the tax was or is payable
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-co/statute/39/39-10-101
          excerpt: more than two years after the date on which the tax was or is payable
            when the failure to collect the tax is due to an error or omission of
            a governmental entity
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-co/statute/39/39-10-101
          excerpt: shall not apply to taxes imposed on oil and gas leaseholds and
            lands
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-co/statute/39/39-10-101
          excerpt: fraudulent action with intent to evade tax ... may be assessed
            ... at any time
  versions:
  - effective_from: '0001-01-01'
    formula: "fraudulent_action_with_intent_to_evade_tax or ((((failure_to_collect_tax_is_due_to_governmental_entity_error_or_omission\
      \ and not asset_is_oil_and_gas_leasehold_or_land) and years_since_tax_became_payable\
      \ <= governmental_error_collection_limitation_years)\n  or (not (failure_to_collect_tax_is_due_to_governmental_entity_error_or_omission\
      \ and not asset_is_oil_and_gas_leasehold_or_land) and years_since_tax_became_payable\
      \ <= general_collection_limitation_years)))"
- name: additional_assessment_delinquent_interest_accrues_from_tax_due_date
  kind: derived
  entity: Asset
  dtype: Judgment
  period: Year
  source: "Colorado Revised Statutes \xA7 39-10-101(2)(d)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: predicate
        source:
          corpus_citation_path: us-co/statute/39/39-10-101
          excerpt: additional assessments on mines and on oil and gas leaseholds and
            lands
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-co/statute/39/39-10-101
          excerpt: shall not apply to valuation disputes, protests, or appeals therefrom
      - path: versions[0].formula
        kind: ordering
        source:
          corpus_citation_path: us-co/statute/39/39-10-101
          excerpt: Delinquent interest shall be calculated to accrue from the date
            the taxes were due
  versions:
  - effective_from: '0001-01-01'
    formula: 'mine_or_oil_and_gas_property_was_omitted_due_to_owner_or_operator_reporting_noncompliance

      and not additional_assessment_is_subject_to_valuation_dispute_protest_or_appeal'
- name: taxpayer_name_error_does_not_preclude_collection_from_intended_person
  kind: derived
  entity: TaxAssessment
  dtype: Judgment
  period: Year
  source: "Colorado Revised Statutes \xA7 39-10-101(3)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: predicate
        source:
          corpus_citation_path: us-co/statute/39/39-10-101
          excerpt: any error in the name of a person owing taxes
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/statute/39/39-10-101
          excerpt: the treasurer may correct such error and collect the taxes from
            the person intended
  versions:
  - effective_from: '0001-01-01'
    formula: tax_list_and_warrant_has_error_in_name_of_taxpayer
