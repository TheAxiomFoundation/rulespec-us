format: rulespec/v1
module:
  status: deferred
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-1-104
  summary: |-
    “Nonresidential property means all taxable real and personal property in the state other than residential real property, producing mines, or lands or leaseholds producing oil or gas.”
    “The actual value of real and personal property specified in this subsection (1.9) is determined by the assessor and the administrator in the manner prescribed by law.”
    “Level of value means the actual value of taxable real property as ascertained by the applicable factors enumerated in section 39-1-103 (5).”
    “The actual value of personal property is determined by appropriate consideration of such of the three approaches specified in section 39-1-103 (5)(a) as are applicable.”
  deferred_outputs:
    - output: us-co:statutes/39/39-1-104/d#nonresidential_property
      reason: >-
        The subsection (1.8)(d) definition has context-dependent scope and exclusions
        for residential real property, producing mines, and oil- or gas-producing
        lands or leaseholds. The necessary canonical classifications and entity
        relationships are not supplied as executable RuleSpec dependencies.
    - output: us-co:statutes/39/39-1-104/d#subsection_1_9_assessment_administration
      reason: >-
        Subsection (1.9)(d) prescribes assessor and administrator valuation,
        uniform application, territorial aggregation, and tax-levy administration.
        The source does not provide a supported entity model or locally computable
        inputs for that administrative aggregate.
    - output: us-co:statutes/39/39-1-104/d#level_of_value
      reason: >-
        Subsection (10.2)(d) determines level of value through appraisal factors
        in section 39-1-103 (5), administrator manuals and associated data, and
        potentially multiple data-gathering periods. Section 39-1-103 is present
        only as deferred context, and section 39-2-109 is unavailable.
    - output: us-co:statutes/39/39-1-104/b#personal_property_actual_value
      reason: >-
        Subsections (12.2)(b) and (12.3)(a)(I) depend on the three appraisal
        approaches specified in section 39-1-103 (5)(a), administrator review and
        approval under section 39-2-109 (1)(e), value-in-use procedures, and an
        adjustment to the level of value applicable to real property. Those
        required computations are deferred or unavailable.
