format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-1-102
  summary: |-
    "Bed and breakfast" requires that there are not more than thirteen sleeping rooms available for transient guests. The section also defines property-tax terms and classifications, including agricultural land, fixtures, hotels and motels, residential land, and schools.
  deferred_outputs:
    - output: us-co:statutes/39/39-1-102/a#agricultural_equipment_definition
      reason: The agricultural-equipment definition requires several contextual property classifications and facts that are not represented as a single supported legal entity.
    - output: us-co:statutes/39/39-1-102/b#agricultural_equipment_inclusions
      reason: The inclusion list describes multiple equipment categories and facility-specific factual classifications that require a broader property ontology.
    - output: us-co:statutes/39/39-1-102/d#medical_marijuana_agricultural_land_exclusion
      reason: The exclusion depends on the legal classification of medical marijuana and agricultural land, including unavailable upstream definitions.
    - output: us-co:statutes/39/39-1-102/c#commercial_lodging_area_definition
      reason: The commercial-lodging-area definition requires room-level ownership, offering, and occupancy-use relationships not represented in this module.
    - output: us-co:statutes/39/39-1-102/b#conservation_purpose_open_space_definition
      reason: The definition incorporates federal Internal Revenue Code section 170(h), for which no executable upstream RuleSpec source is available.
    - output: us-co:statutes/39/39-1-102/c#hotel_unit_terms_definition
      reason: The hotel-unit definitions require condominium, time-share, ownership, and related-person legal concepts supplied by unavailable cited sources.
    - output: us-co:statutes/39/39-1-102/e#independently_owned_residential_solar_generation_facility_definition
      reason: The definition requires property, ownership, meter-location, and generation-facility relationships not represented by a supported single entity.
    - output: us-co:statutes/39/39-1-102/b#inventory_manufacturer_exception
      reason: The inventory exception requires manufacturer possession, lease history, and customary reconditioning-designation facts across a business asset relationship.
    - output: us-co:statutes/39/39-1-102/f#manufactured_home_certificate_of_title_requirement
      reason: The manufactured-home definition incorporates certificate-of-title eligibility under an unavailable cited source.
    - output: us-co:statutes/39/39-1-102/a#modular_home_certificate_of_title_requirement
      reason: The modular-home definition incorporates certificate-of-title ineligibility under an unavailable cited source.
    - output: us-co:statutes/39/39-1-102/c#modular_home_building_code_requirement
      reason: The modular-home definition depends on compliance with building codes adopted by an external agency.
    - output: us-co:statutes/39/39-1-102/b#nursing_care_facility_definition
      reason: The nursing-home definition incorporates licensing and regulatory definitions from an unavailable cited source.
    - output: us-co:statutes/39/39-1-102/c#real_property_improvements_component
      reason: The real-property definition includes improvements, whose detailed legal classification is not represented as a computable output here.
    - output: us-co:statutes/39/39-1-102/c#residential_land_post_2018_natural_cause_classification
      reason: The residential-land classification depends on assessment, land-use, and reconstruction evidence processes not representable as a supported executable determination.
    - output: us-co:statutes/39/39-1-102/b#school_extended_hours_inclusion
      reason: The school definition incorporates statutory educational and child-care licensing requirements from unavailable cited sources.
rules:
