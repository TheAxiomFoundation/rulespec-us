format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-29-106
  summary: A tax is levied on coal severance at thirty-six cents per ton, subject
    to stated quarterly exemptions and credits. Underground-mined and lignitic coal
    receive credits equal to the applicable percentage of the tax for taxable years
    before 2026. The tax rate changes one percent for each full one-and-one-half percent
    producer-price-index change.
  deferred_outputs:
  - output: us-co:statutes/39/39-29-106#coal_tons_subject_to_tax_after_quarterly_exemption
    reason: The exemption applies separately to coal produced in each quarter, but
      this annual RuleSpec surface has no quarterly production relation or quarter
      period.
    source_values:
    - us-co:statutes/39/39-29-106#quarterly_coal_tax_exemption_tons
rules:
- name: statutory_coal_severance_tax_rate
  kind: parameter
  dtype: Money
  unit: USD
  source: C.R.S. 39-29-106(1)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-29-106
          excerpt: thirty-six cents per ton of coal
  versions:
  - effective_from: '0001-01-01'
    formula: '0.36'
- name: producer_price_index_change_interval
  kind: parameter
  dtype: Rate
  source: C.R.S. 39-29-106(5)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-29-106
          excerpt: every full one and one-half percent change
  versions:
  - effective_from: '0001-01-01'
    formula: '0.015'
- name: tax_rate_adjustment_per_producer_price_index_interval
  kind: parameter
  dtype: Rate
  source: C.R.S. 39-29-106(5)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-29-106
          excerpt: increased or decreased one percent
  versions:
  - effective_from: '0001-01-01'
    formula: '0.01'
- name: quarterly_coal_tax_exemption_tons
  kind: parameter
  dtype: Count
  source: C.R.S. 39-29-106(2)(b)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-29-106
          excerpt: Three hundred thousand tons of coal produced in each quarter of
            the 2021 taxable year
      - path: versions[1].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-29-106
          excerpt: Two hundred forty thousand tons of coal produced in each quarter
            of the 2022 taxable year
      - path: versions[2].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-29-106
          excerpt: One hundred eighty thousand tons of coal produced in each quarter
            of the 2023 taxable year
      - path: versions[3].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-29-106
          excerpt: One hundred twenty thousand tons of coal produced in each quarter
            of the 2024 taxable year
      - path: versions[4].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-29-106
          excerpt: Sixty thousand tons of coal produced in each quarter of the 2025
            taxable year
  versions:
  - effective_from: '2021-01-01'
    formula: '300000'
  - effective_from: '2022-01-01'
    formula: '240000'
  - effective_from: '2023-01-01'
    formula: '180000'
  - effective_from: '2024-01-01'
    formula: '120000'
  - effective_from: '2025-01-01'
    formula: '60000'
  - effective_from: '2026-01-01'
    formula: '0'
- name: coal_tax_credit_percentage
  kind: parameter
  dtype: Rate
  source: C.R.S. 39-29-106(3.5)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-29-106
          excerpt: Fifty percent for the 2021 taxable year
      - path: versions[1].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-29-106
          excerpt: Forty percent for the 2022 taxable year
      - path: versions[2].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-29-106
          excerpt: Thirty percent for the 2023 taxable year
      - path: versions[3].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-29-106
          excerpt: Twenty percent for the 2024 taxable year
      - path: versions[4].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-29-106
          excerpt: Ten percent for the 2025 taxable year
  versions:
  - effective_from: '2021-01-01'
    formula: '0.50'
  - effective_from: '2022-01-01'
    formula: '0.40'
  - effective_from: '2023-01-01'
    formula: '0.30'
  - effective_from: '2024-01-01'
    formula: '0.20'
  - effective_from: '2025-01-01'
    formula: '0.10'
  - effective_from: '2026-01-01'
    formula: '0'
- name: coal_severance_tax_rate
  kind: derived
  entity: Person
  dtype: Money
  period: Year
  unit: USD
  source: C.R.S. 39-29-106(1), (5)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-29-106
          excerpt: the tax rate ... shall be increased or decreased one percent
  versions:
  - effective_from: '0001-01-01'
    formula: 'if producer_price_index_increased_since_january_1978: statutory_coal_severance_tax_rate
      * (1 + (full_producer_price_index_change_intervals * tax_rate_adjustment_per_producer_price_index_interval))
      else: statutory_coal_severance_tax_rate * (1 - (full_producer_price_index_change_intervals
      * tax_rate_adjustment_per_producer_price_index_interval))'
- name: coal_severance_tax_before_credits
  kind: derived
  entity: Person
  dtype: Money
  period: Year
  unit: USD
  source: C.R.S. 39-29-106(1)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-29-106
          excerpt: a tax upon the severance of all coal in this state
  versions:
  - effective_from: '0001-01-01'
    formula: coal_tons_subject_to_tax_after_quarterly_exemption * coal_severance_tax_rate
- name: underground_coal_severance_tax_credit
  kind: derived
  entity: Person
  dtype: Money
  period: Year
  unit: USD
  source: C.R.S. 39-29-106(3), (3.5)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-29-106
          excerpt: a credit ... equal to the percentage ... of such tax for coal produced
            from underground mines
  versions:
  - effective_from: '2021-01-01'
    formula: underground_coal_tons_subject_to_tax * coal_severance_tax_rate * coal_tax_credit_percentage
- name: lignitic_coal_severance_tax_credit
  kind: derived
  entity: Person
  dtype: Money
  period: Year
  unit: USD
  source: C.R.S. 39-29-106(4), (3.5)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-29-106
          excerpt: an additional credit ... equal to the percentage ... of such tax
            for the production of lignitic coal
  versions:
  - effective_from: '2021-01-01'
    formula: lignitic_coal_tons_subject_to_tax * coal_severance_tax_rate * coal_tax_credit_percentage
- name: coal_severance_tax_after_credits
  kind: derived
  entity: Person
  dtype: Money
  period: Year
  unit: USD
  source: C.R.S. 39-29-106(1), (3), (4)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-29-106
          excerpt: Subject to the exemption and credits authorized in subsections
            (2), (3), and (4)
  versions:
  - effective_from: '2021-01-01'
    formula: max(0, coal_severance_tax_before_credits - underground_coal_severance_tax_credit
      - lignitic_coal_severance_tax_credit)
