format: rulespec/v1
module:
  status: deferred
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-539
  summary: |-
    “For income tax years commencing on or after January 1, 2019, but prior to January 1, 2032,” an employer contribution to an employee-owned 529 qualified state tuition program account earns a credit equal to “twenty percent of the contribution,” capped at “five hundred dollars” per employee per taxable year. Unused credit may be carried forward for up to three years.
  deferred_outputs:
    - output: us-co:statutes/39/39-22-539/a#qualified_state_tuition_program_account
      reason: The definition incorporates account establishment under section 23-3.1-203, whose RuleSpec source is unavailable.
    - output: us-co:statutes/39/39-22-539/b#employee
      reason: This definitional provision does not independently establish a computable legal output in the available entity model.
    - output: us-co:statutes/39/39-22-539/c#employer_529_contribution_credit
      reason: Computing the credit requires the unavailable section 23-3.1-203 account definition and a representable per-employee contribution relation.
      source_values:
        - us-co:statutes/39/39-22-539#employer_529_contribution_credit_rate
        - us-co:statutes/39/39-22-539#employer_529_contribution_credit_per_employee_cap
    - output: us-co:statutes/39/39-22-539/4#unused_employer_529_contribution_credit_carryforward
      reason: Applying unused credit to the earliest subsequent income-tax years requires tax-liability and credit-ordering mechanics outside this source slice.
      source_values:
        - us-co:statutes/39/39-22-539#unused_credit_carryforward_limit_years
rules:
  - name: employer_529_contribution_credit_rate
    kind: parameter
    dtype: Rate
    source: 39-22-539(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-539
              excerpt: "equal to twenty percent of the contribution"
    versions:
      - effective_from: '2019-01-01'
        formula: |-
          0.20
  - name: employer_529_contribution_credit_per_employee_cap
    kind: parameter
    dtype: Money
    unit: USD
    source: 39-22-539(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-539
              excerpt: "for each employee in a taxable year is five hundred dollars"
    versions:
      - effective_from: '2019-01-01'
        formula: |-
          500
  - name: unused_credit_carryforward_limit_years
    kind: parameter
    dtype: Count
    source: 39-22-539(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-539
              excerpt: "for a period not to exceed three years"
    versions:
      - effective_from: '2019-01-01'
        formula: |-
          3
