format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-26-734
  summary: Construction and building materials used directly to rebuild or repair
    a qualified residential structure are exempt solely through a qualified homeowner
    refund. The refund equals four percent of estimated construction and building
    materials cost and must be claimed by June 30, 2028.
  deferred_outputs:
  - output: us-co:statutes/39/39-26-734/1#tax_preference_performance_statement
    reason: Legislative findings and performance-measurement provisions are non-operative
      and do not define a computable individual output.
  - output: us-co:statutes/39/39-26-734/a#building_permit_definition
    reason: The definition concerns local-government-issued documents and their identified
      estimated use tax; the supported schema has no document-record representation.
  - output: us-co:statutes/39/39-26-734/c#department_definition
    reason: Institutional definition of the department of revenue is non-computational.
  - output: us-co:statutes/39/39-26-734/e#executive_director_definition
    reason: Institutional definition of the executive director is non-computational.
  - output: us-co:statutes/39/39-26-734/f#local_government_definition
    reason: Governmental-unit classification is not represented by a supported executable
      entity relation.
  - output: us-co:statutes/39/39-26-734/h#qualified_residential_structure_definition
    reason: The definition requires a residential-structure-level wildfire-damage
      relation that is not available in the supported schema.
  - output: us-co:statutes/39/39-26-734/3#state_sales_and_use_tax_exemption
    reason: The sale, storage, use, or consumption exemption requires transaction-level
      tax and local-tax jurisdiction mechanics not represented by this refund calculation.
  - output: us-co:statutes/39/39-26-734/5#wildfire_rebuild_exemption_certificate_issuance
    reason: Local-government certificate issuance, homeowner certification, and annual
      reporting are administrative document processes outside the supported schema.
  - output: us-co:statutes/39/39-26-734/6#executive_director_administration
    reason: Form provision, rulemaking, and administrative duties are non-computational.
  - output: us-co:statutes/39/39-26-734/7#refund_application_priority
    reason: Departmental prioritization of refund applications is an administrative
      ordering process not represented by the supported schema.
  - output: us-co:statutes/39/39-26-734/8#section_repeal
    reason: Repeal timing is documentary legal status rather than a supported runtime
      output.
  - output: us-co:statutes/39/39-26-734/b#declared_wildfire_disaster
    reason: Generated module encodes the supported rules from this source, but this
      source subparagraph depends on policy surfaces or entities that are not available
      in the current RuleSpec context. It is deferred instead of being modeled as
      a caller-supplied input or an unsupported local entity.
rules:
- name: estimated_construction_cost_fallback_divisor
  kind: parameter
  dtype: Integer
  source: 39-26-734(d)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-26-734
          excerpt: half of the total contract price or total cost
  versions:
  - effective_from: '0001-01-01'
    formula: '2'
- name: wildfire_rebuild_refund_rate
  kind: parameter
  dtype: Rate
  source: 39-26-734(4)(b)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-26-734
          excerpt: equal to four percent
  versions:
  - effective_from: '0001-01-01'
    formula: '0.04'
- name: qualified_homeowner
  kind: derived
  entity: Person
  dtype: Judgment
  period: Year
  source: 39-26-734(g)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: definition
        source:
          corpus_citation_path: us-co/statute/39/39-26-734
  versions:
  - effective_from: '0001-01-01'
    formula: "homeowner_owned_qualified_residential_structure_at_declared_wildfire_disaster\n\
      and (\n  homeowner_is_rebuilding_or_repairing_qualified_residential_structure\n\
      \  or homeowner_employed_contractor_to_rebuild_or_repair_qualified_residential_structure\n\
      )"
- name: estimated_construction_and_building_materials_cost
  kind: derived
  entity: BuildingPermit
  dtype: Money
  unit: USD
  period: Year
  source: 39-26-734(d)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-26-734
          excerpt: If no estimated use tax has been collected, estimated construction
            and building materials cost means half of the total contract price or
            total cost.
  versions:
  - effective_from: '0001-01-01'
    formula: 'if estimated_use_tax_was_collected_for_building_permit: local_government_estimated_construction_and_building_materials_cost
      else: total_contract_or_repair_cost / estimated_construction_cost_fallback_divisor'
- name: wildfire_rebuild_refund_amount
  kind: derived
  entity: BuildingPermit
  dtype: Money
  unit: USD
  period: Year
  source: 39-26-734(4)(a)-(b)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-26-734
          excerpt: A qualified homeowner may claim a refund ... equal to four percent
            of the estimated construction and building materials cost.
  versions:
  - effective_from: '0001-01-01'
    formula: 'if building_permit_was_issued_to_qualified_homeowner and wildfire_rebuild_exemption_certificate_identifies_building_permit:
      wildfire_rebuild_refund_rate * max(0, estimated_construction_and_building_materials_cost)
      else: 0'
- name: wildfire_rebuild_refund_claim_is_timely
  kind: derived
  entity: BuildingPermit
  dtype: Judgment
  period: Year
  source: 39-26-734(4)(d)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: effective_period
        source:
          corpus_citation_path: us-co/statute/39/39-26-734
          excerpt: must be filed on or before June 30, 2028
  versions:
  - effective_from: '0001-01-01'
    formula: refund_claim_is_filed_by_statutory_deadline
