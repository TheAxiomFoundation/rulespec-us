format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-30-107.6
  summary: |-
    A taxpayer subject to the specified insurance-premium taxes, exempt from income tax, and otherwise eligible under this article may claim the credit or refund against insurance-premium tax to the same extent. “Income tax year” means the calendar year.
rules:
  - name: insurance_premium_tax_credit_or_refund_may_be_claimed
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-30-107.6(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-30-107.6
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          taxpayer_is_subject_to_specified_insurance_premium_tax
          and taxpayer_is_otherwise_eligible_for_credit_or_refund_under_this_article
