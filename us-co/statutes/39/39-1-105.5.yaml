format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-1-105.5
  summary: |-
    “If the valuation for assessment of a county as reflected in its abstract for assessment ... is more than five percent below the valuation for assessment ... determined by the study,” the state board shall cause a reappraisal of property classes shown not to have been appraised consistently with constitutional or statutory property-tax provisions.
rules:
  - name: county_valuation_shortfall_tolerance
    kind: parameter
    dtype: Rate
    source: C.R.S. 39-1-105.5(1)(b)(II)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-1-105.5
              excerpt: "is more than five percent below"
    versions:
      - effective_from: '1985-01-01'
        formula: |-
          0.05

  - name: county_valuation_shortfall_exceeds_study_tolerance
    kind: derived
    entity: County
    dtype: Judgment
    period: Year
    source: C.R.S. 39-1-105.5(1)(b)(II)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-1-105.5
              excerpt: "is more than five percent below the valuation for assessment ... determined by the study"
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:statutes/39/39-1-105.5#county_valuation_shortfall_tolerance
              output: county_valuation_shortfall_tolerance
              hash: sha256:local
    versions:
      - effective_from: '1985-01-01'
        formula: |-
          county_abstract_valuation_for_assessment
          < study_determined_county_valuation_for_assessment
          * (1 - county_valuation_shortfall_tolerance)

  - name: reappraisal_of_improperly_appraised_property_classes_required
    kind: derived
    entity: County
    dtype: Judgment
    period: Year
    source: C.R.S. 39-1-105.5(1)(b)(II)(A)-(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-1-105.5
              excerpt: "the state board of equalization shall cause to be performed a reappraisal of any class or classes of property that the study shows were not appraised consistent"
    versions:
      - effective_from: '1985-01-01'
        formula: |-
          study_shows_property_classes_not_appraised_consistent_with_constitution_or_statutes
