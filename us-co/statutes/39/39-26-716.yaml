format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-26-716
  summary: "\u201CAttachments means any equipment or machinery added to an exempt\
    \ farm tractor or implement of husbandry that aids or enhances the performance\
    \ of such tractor or implement.\u201D \u201CDairy equipment means any item that\
    \ is used at a farm dairy in connection with the production of raw milk.\u201D\
    \ \u201CFarm operation means the production\u201D of listed products \u201Cfor\
    \ profit.\u201D"
  deferred_outputs:
  - output: us-co:statutes/39/39-26-716/d#farm_equipment
    reason: Farm-equipment status incorporates farm tractors and implements of husbandry
      as defined in unavailable section 42-1-102, and exclusions tied to unavailable
      section 42-3-103.
  - output: us-co:statutes/39/39-26-716/4#farm_property_tax_exemption
    reason: The sales, purchases, storage, use, and consumption exemptions require
      transaction and property classifications, including special fuel defined in
      unavailable section 39-27-101 and lease affidavit procedures under unavailable
      section 39-26-730.
rules:
- name: attachments
  kind: derived
  entity: Asset
  dtype: Judgment
  period: Year
  source: 39-26-716(b)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: definition
        source:
          corpus_citation_path: us-co/statute/39/39-26-716
  versions:
  - effective_from: '0001-01-01'
    formula: 'asset_is_equipment_or_machinery_added_to_exempt_farm_tractor_or_implement_of_husbandry

      and asset_aids_or_enhances_tractor_or_implement_performance'
- name: dairy_equipment
  kind: derived
  entity: Asset
  dtype: Judgment
  period: Year
  source: 39-26-716(c)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: definition
        source:
          corpus_citation_path: us-co/statute/39/39-26-716
  versions:
  - effective_from: '0001-01-01'
    formula: "asset_is_used_at_farm_dairy\nand asset_is_used_in_connection_with_raw_milk_production\n\
      and not asset_is_used_at_commercial_dairy_for_pasteurized_separated_milk_products_for_retail_sale\n\
      and (\n  not farm_dairy_also_produces_pasteurized_separated_milk_products_for_retail_sale\n\
      \  or asset_is_used_exclusively_in_raw_milk_production\n)"
- name: farm_operation
  kind: derived
  entity: Business
  dtype: Judgment
  period: Year
  source: 39-26-716(e)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: definition
        source:
          corpus_citation_path: us-co/statute/39/39-26-716
  versions:
  - effective_from: '0001-01-01'
    formula: "operation_produces_qualifying_products_for_profit\nand (\n  operation_produces_agricultural_viticultural_fruit_or_vegetable_products\n\
      \  or operation_produces_livestock\n  or operation_produces_milk\n  or operation_produces_honey\n\
      \  or operation_produces_poultry_or_eggs\n)"
