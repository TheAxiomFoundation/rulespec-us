format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-1803
  summary: |-
    “Special Olympics Colorado shall use moneys received pursuant to subsection (1) of this section only for equipment, training, competitions, and awards for participants in the Special Olympics Colorado program.”
  deferred_outputs:
    - output: us-co:statutes/39/39-22-1803#special_olympics_colorado_fund_annual_transfer_amount
      reason: The annual transfer includes the total amount designated pursuant to section 39-22-1802, whose copied RuleSpec context is deferred and provides no executable amount export.
rules:
  - name: special_olympics_colorado_fund_expenditure_permitted
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-22-1803(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-22-1803
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          payment_is_for_participant_equipment
          or payment_is_for_participant_training
          or payment_is_for_participant_competitions
          or payment_is_for_participant_awards
