  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-503
  summary: |-
    “The net income of a real estate investment trust” is federally computed REIT taxable income adjusted under section 39-22-304. The section also defines captive real estate investment trusts, Australian property trusts, qualified foreign entities, and qualified REIT subsidiaries through Internal Revenue Code definitions and constructive-ownership rules.
  deferred_outputs:
    - output: us-co:statutes/39/39-22-503/a#real_estate_investment_trust
      reason: The definition incorporates Internal Revenue Code section 856, whose corresponding RuleSpec definition is unavailable.
    - output: us-co:statutes/39/39-22-503/b#real_estate_investment_trust_net_income
      reason: Computing net income requires REIT taxable income under Internal Revenue Code section 856 and adjustments under section 39-22-304 (2) and (3), neither of which has a copied executable RuleSpec dependency.
    - output: us-co:statutes/39/39-22-503/a#captive_real_estate_investment_trust
      reason: The definition depends on federal classifications under Internal Revenue Code sections 501 and 856 and constructive ownership mechanics under sections 318 and 856, whose RuleSpec outputs are unavailable.
    - output: us-co:statutes/39/39-22-503/b#captive_real_estate_investment_trust_exclusion
      reason: The exclusion and its one-year failure condition depend on the requirements and treatment supplied by Internal Revenue Code section 856, whose RuleSpec outputs are unavailable.
    - output: us-co:statutes/39/39-22-503/3#constructive_ownership
      reason: Determining constructive ownership requires the rules of Internal Revenue Code section 318 (a) as modified by section 856 (d)(5), whose RuleSpec outputs are unavailable.
    - output: us-co:statutes/39/39-22-503/4/a#association_taxable_as_corporation
      reason: The exclusions depend on unresolved definitions of real estate investment trusts, captive real estate investment trusts, qualified REIT subsidiaries, Australian property trusts, and qualified foreign entities.
    - output: us-co:statutes/39/39-22-503/b#australian_property_trust
      reason: The definition requires entity and ownership relationships, including the unresolved captive-REIT constructive-ownership framework, that cannot be represented faithfully without the missing federal dependencies.
    - output: us-co:statutes/39/39-22-503/c#qualified_foreign_entity
      reason: The definition depends on real-estate-asset classification under Internal Revenue Code section 856 (c)(5)(B) and constructive ownership under sections 318 and 856, whose RuleSpec outputs are unavailable.
    - output: us-co:statutes/39/39-22-503/d#qualified_real_estate_investment_trust_subsidiary
      reason: The definition expressly adopts the meaning in Internal Revenue Code section 856 (i), whose RuleSpec definition is unavailable.
