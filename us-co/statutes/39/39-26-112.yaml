format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-26-112
  summary: |-
    A vendor collecting tax in excess of the tax imposed must remit the imposed tax and excess; retaining excess collections or intentionally failing to remit punctually is unlawful and a misdemeanor. These requirements and penalty do not apply to a qualifying retailer retaining state sales tax, until repeal effective December 31, 2026.
  deferred_outputs:
    - output: us-co:statutes/39/39-26-112#required_remittance_of_collected_tax_and_excess
      reason: The required remittance amount depends on tax imposed by section 39-26-106(1), whose executable RuleSpec output is not available.
rules:
  - name: vendor_remittance_requirements_and_penalty_apply
    kind: derived
    entity: Vendor
    dtype: Judgment
    period: Year
    source: C.R.S. 39-26-112(2)(a)-(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-26-112
              excerpt: "The requirements and penalty in this section do not apply to a qualifying retailer retaining state sales tax"
          - path: versions[0].formula
            kind: effective_period
            source:
              corpus_citation_path: us-co/statute/39/39-26-112
              excerpt: "repealed, effective December 31, 2026"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not (subsection_2_remains_in_effect
          and qualifying_retailer_retains_state_sales_tax)
  - name: excess_tax_retention_or_late_remittance_is_unlawful
    kind: derived
    entity: Vendor
    dtype: Judgment
    period: Year
    source: C.R.S. 39-26-112(1)-(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-26-112
              excerpt: "retention ... of any excess of tax collections ... or the intentional failure to remit punctually"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-26-112
              excerpt: "is declared to be unlawful and constitutes a misdemeanor"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          vendor_remittance_requirements_and_penalty_apply
          and (vendor_retains_excess_tax_collections
          or vendor_intentionally_fails_to_remit_punctually)
