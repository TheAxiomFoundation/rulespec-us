- name: computes_excess_revenues_and_property_tax_reimbursement
  period:
    period_kind: custom
    name: state_fiscal_year
    start: '2024-07-01'
    end: '2025-06-30'
  input:
    us-co:statutes/39/39-22-627#input.state_revenues: 1200000000
    us-co:statutes/39/39-22-627#input.state_fiscal_year_spending_limit: 1000000000
    us-co:statutes/39/39-22-627#input.state_revenues_authorized_for_retention_by_voters: 100000000
    us-co:statutes/39/39-22-627#input.statutory_excess_state_revenue_adjustment: 10000000
    us-co:statutes/39/39-22-627#input.reimbursement_for_property_tax_exemptions_under_article_3_part_2: 30000000
    us-co:statutes/39/39-22-627#input.reimbursement_for_qualified_senior_primary_residence_valuation_reduction: 20000000
  output:
    us-co:statutes/39/39-22-627#excess_state_revenues: 110000000
    us-co:statutes/39/39-22-627#reimbursement_for_property_tax_exemptions: 50000000
- name: floors_nonexcess_revenues_at_zero
  period:
    period_kind: custom
    name: state_fiscal_year
    start: '2024-07-01'
    end: '2025-06-30'
  input:
    us-co:statutes/39/39-22-627#input.state_revenues: 900000000
    us-co:statutes/39/39-22-627#input.state_fiscal_year_spending_limit: 1000000000
    us-co:statutes/39/39-22-627#input.state_revenues_authorized_for_retention_by_voters: 0
    us-co:statutes/39/39-22-627#input.statutory_excess_state_revenue_adjustment: 0
    us-co:statutes/39/39-22-627#input.reimbursement_for_property_tax_exemptions_under_article_3_part_2: 0
    us-co:statutes/39/39-22-627#input.reimbursement_for_qualified_senior_primary_residence_valuation_reduction: 0
  output:
    us-co:statutes/39/39-22-627#excess_state_revenues: 0
    us-co:statutes/39/39-22-627#reimbursement_for_property_tax_exemptions: 0
