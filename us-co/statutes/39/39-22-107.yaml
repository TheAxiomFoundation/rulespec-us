format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-107
  summary: |-
    If federal taxable income could legally be determined on a joint federal return but is actually determined separately, Colorado income tax income is separately determined. If federal taxable income is determined on a joint federal return, tax is determined on joint federal taxable income.
rules:
  - name: separate_colorado_income_tax_determination_applies
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-22-107(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-22-107
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          taxpayers_may_legally_determine_federal_taxable_income_on_joint_federal_return
          and federal_taxable_income_is_actually_determined_on_separate_federal_returns
  - name: joint_colorado_income_tax_determination_applies
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: C.R.S. § 39-22-107(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-22-107
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          federal_taxable_income_is_determined_on_joint_federal_return
