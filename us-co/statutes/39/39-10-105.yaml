format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-10-105
  summary: |-
    Upon request, the treasurer shall issue a receipt for each tax payment received and shall mail it if additionally requested. In lieu of individual receipts, the treasurer may issue and mail a certified listing for combined tax payments on ten or more assessed parcels.
rules:
  - name: combined_tax_payment_minimum_assessed_parcels
    kind: parameter
    dtype: Count
    source: C.R.S. 39-10-105(1.5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-10-105
              excerpt: "combined tax payments on ten or more assessed parcels"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10

  - name: tax_receipt_must_be_issued
    kind: derived
    entity: Treasurer
    dtype: Judgment
    period: Year
    source: C.R.S. 39-10-105(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-10-105
              excerpt: "Upon request of an individual taxpayer or the taxpayer's agent, the treasurer shall issue ... a receipt for each payment of taxes received"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_taxpayer_or_agent_requests_tax_receipt
          and tax_payment_is_received

  - name: tax_receipt_must_be_mailed
    kind: derived
    entity: Treasurer
    dtype: Judgment
    period: Year
    source: C.R.S. 39-10-105(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-10-105
              excerpt: "shall mail, if additionally requested, a receipt for each payment of taxes received"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_taxpayer_or_agent_requests_tax_receipt
          and tax_payment_is_received
          and taxpayer_or_agent_additionally_requests_receipt_mailed

  - name: certified_tax_payment_listing_may_be_issued
    kind: derived
    entity: Treasurer
    dtype: Judgment
    period: Year
    source: C.R.S. 39-10-105(1.5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-10-105
              excerpt: "the treasurer may issue and mail a certified listing ... for combined tax payments on ten or more assessed parcels"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-10-105
              excerpt: "ten or more assessed parcels"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          combined_tax_payment_is_received
          and combined_tax_payment_assessed_parcel_count >= combined_tax_payment_minimum_assessed_parcels
