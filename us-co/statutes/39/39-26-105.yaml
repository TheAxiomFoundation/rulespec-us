format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-26-105
  summary: "\u201CFor sales made on or after January 1, 2020, but before January 1,\
    \ 2026, the amount retained by a retailer ... is four percent of the tax reported;\
    \ except that a retailer shall not retain more than one thousand dollars in any\
    \ filing period.\u201D Beginning January 1, 2022, no retention is permitted for\
    \ a filing period with total taxable sales greater than one million dollars, and\
    \ beginning January 1, 2026, no state-tax collection-expense retention is permitted.\
    \ A marketplace facilitator\u2019s subsection (1.5)(a) liabilities, obligations,\
    \ and rights are additional to its subsection (1) requirements when it also offers\
    \ sales through other means."
  deferred_outputs:
  - output: us-co:statutes/39/39-26-105/b#marketplace_facilitator_additional_direct_sales_requirements
    reason: "Subsection (1.5)(b) adds the marketplace facilitator\u2019s subsection\
      \ (1.5)(a) liabilities, obligations, and rights to requirements imposed under\
      \ subsection (1), but those underlying article 26 liabilities and the tax imposed\
      \ by section 39-26-106 are not available as executable RuleSpec dependencies."
rules:
- name: retailer_collection_expense_retention_rate
  kind: parameter
  dtype: Rate
  source: 39-26-105(d)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-26-105
          excerpt: "\u201Cthe amount retained by a retailer ... is four percent of\
            \ the tax reported\u201D"
  versions:
  - effective_from: '2020-01-01'
    formula: '0.04'
- name: retailer_collection_expense_retention_cap
  kind: parameter
  dtype: Money
  unit: USD
  period: Month
  source: 39-26-105(d)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-26-105
          excerpt: "\u201Ca retailer shall not retain more than one thousand dollars\
            \ in any filing period\u201D"
  versions:
  - effective_from: '2020-01-01'
    formula: '1000'
- name: taxable_sales_retention_bar_threshold
  kind: parameter
  dtype: Money
  unit: USD
  period: Month
  source: 39-26-105(d)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-26-105
          excerpt: "\u201Ctotal taxable sales were greater than one million dollars\u201D"
      - path: versions[0].effective_from
        kind: effective_period
        source:
          corpus_citation_path: us-co/statute/39/39-26-105
          excerpt: "\u201CBeginning January 1, 2022\u201D"
  versions:
  - effective_from: '2022-01-01'
    formula: '1000000'
- name: retailer_collection_expense_retention
  kind: derived
  entity: Retailer
  dtype: Money
  unit: USD
  period: Month
  source: 39-26-105(d)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-26-105
          excerpt: "\u201Cfour percent of the tax reported; except that a retailer\
            \ shall not retain more than one thousand dollars\u201D"
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/statute/39/39-26-105
          excerpt: "\u201Cnot permitted to retain any money ... for any filing period\
            \ that the retailer's total taxable sales were greater than one million\
            \ dollars\u201D"
      - path: versions[0].formula
        kind: effective_period
        source:
          corpus_citation_path: us-co/statute/39/39-26-105
          excerpt: "\u201CBeginning January 1, 2026, a retailer is not permitted to\
            \ retain any money\u201D"
  versions:
  - effective_from: '2022-01-01'
    formula: 'if filing_period_is_before_state_retention_termination and retailer_total_taxable_sales_all_locations
      <= taxable_sales_retention_bar_threshold: min( retailer_collection_expense_retention_rate
      * max(0, state_tax_reported), retailer_collection_expense_retention_cap ) else:
      0'
