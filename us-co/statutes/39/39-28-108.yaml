format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-28-108
  summary: |-
    A person who neglects or refuses to make a required return is subject to a one-hundred-dollar penalty. Late tax payment carries a ten-percent penalty plus one-half of one percent per month, capped at eighteen percent, together with interest under section 39-21-110.5.
  deferred_outputs:
    - output: us-co:statutes/39/39-28-108#cigarette_stamp_violation_punishment
      reason: The punishment is determined by section 39-21-118, which is not available as an executable RuleSpec dependency.
    - output: us-co:statutes/39/39-28-108#delinquent_tax_payment_penalty_and_interest
      reason: The source incorporates the discount periods under sections 39-28-104(1) and 39-28-103.3 and the interest rate under section 39-21-110.5; the available context does not export those required concepts.
      source_values:
        - us-co:statutes/39/39-28-108#late_payment_initial_penalty_rate
        - us-co:statutes/39/39-28-108#late_payment_monthly_penalty_rate
        - us-co:statutes/39/39-28-108#late_payment_aggregate_penalty_rate_cap
rules:
  - name: failure_to_file_return_penalty_amount
    kind: parameter
    dtype: Money
    unit: USD
    source: C.R.S. 39-28-108(2)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-28-108
              excerpt: "a penalty of one hundred dollars"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          100
  - name: late_payment_initial_penalty_rate
    kind: parameter
    dtype: Rate
    source: C.R.S. 39-28-108(2)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-28-108
              excerpt: "a penalty equal to ten percent thereof"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.10
  - name: late_payment_monthly_penalty_rate
    kind: parameter
    dtype: Rate
    source: C.R.S. 39-28-108(2)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-28-108
              excerpt: "one-half of one percent per month"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.005
  - name: late_payment_aggregate_penalty_rate_cap
    kind: parameter
    dtype: Rate
    source: C.R.S. 39-28-108(2)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-28-108
              excerpt: "not to exceed eighteen percent in the aggregate"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.18
  - name: failure_to_file_return_penalty
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: USD
    source: C.R.S. 39-28-108(2)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-28-108
              excerpt: "neglects or refuses to make a return as required"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-28-108
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if person_neglects_or_refuses_to_make_required_return: failure_to_file_return_penalty_amount else: 0
