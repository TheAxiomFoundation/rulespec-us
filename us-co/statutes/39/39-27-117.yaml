format: rulespec/v1
module:
  status: entity_not_supported
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-27-117
  summary: Mailed documents are deemed filed on the cancellation-mark date; certain
    missing or illegible-postmark documents may be deemed filed on the mailing date
    upon competent evidence and require a duplicate within thirty days after notice.
    Registered, certified, and certificate-of-mailing records are competent evidence.
    Weekend and holiday deadlines move to the next business day; electronic filings
    receive the treatment specified by section 39-21-120.
  deferred_outputs:
  - output: us-co:statutes/39/39-27-117/a#mailed_document_deemed_filing_date
    reason: The source establishes a document-specific deemed filing and receipt date,
      but RuleSpec has no date-valued output or document entity that can preserve
      the required mailing-envelope relationship.
  - output: us-co:statutes/39/39-27-117/b#mailing_date_deemed_filing_date_and_duplicate_deadline
    reason: The source requires competent-evidence evaluation, document-specific mailing-date
      deeming, written-notice tracking, and a thirty-day duplicate-filing deadline;
      these procedural date and document relationships are not representable in the
      supported schema.
  - output: us-co:statutes/39/39-27-117/2#postal_record_is_competent_evidence_and_deemed_postmark_date
    reason: The source establishes evidentiary treatment and a document-specific deemed
      postmark date, neither of which is representable as an executable RuleSpec output.
  - output: us-co:statutes/39/39-27-117/3#weekend_or_holiday_deadline_deemed_timely_on_next_business_day
    reason: The source requires calendar and legal-holiday date computation and produces
      a filing-date determination, which the supported schema cannot represent.
  - output: us-co:statutes/39/39-27-117/4#electronic_filing_treatment
    reason: The source incorporates the treatment provided by section 39-21-120, whose
      operative electronic-filing rules are not supplied as an importable dependency.
