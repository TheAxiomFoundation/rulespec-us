format: rulespec/v1
module:
  summary: Credit equals ten percent of qualifying technology-infrastructure investment
    in rural technology enterprise zones for tax years commencing on or after January
    1, 1999, but prior to January 1, 2005; the credit may not exceed one hundred thousand
    dollars per tax year. Unused credit may carry forward for no more than ten years
    and is applied first to the earliest years possible.
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-32-105
  deferred_outputs:
  - output: us-co:statutes/39/39-32-105#credit_carryforward_limit_years
    reason: Generated rule used a local name that collides with a sibling RuleSpec
      export. This output is deferred until it can be encoded with a semantic branch-specific
      name without creating ambiguous sibling imports.
  - output: us-co:statutes/39/39-32-105#unused_credit_applied_as_carryforward
    reason: Generated rule depends on an output that validation deferred because it
      flattened thresholded, capped, base-limited, or cross-referenced mechanics,
      or borrowed an unrelated same-named section term.
rules:
- name: qualifying_investment_credit_rate
  kind: parameter
  dtype: Rate
  source: C.R.S. 39-32-105(1)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-32-105
          excerpt: an amount equal to ten percent of the amount of the total investment
  versions:
  - effective_from: '1999-01-01'
    formula: '0.10'
- name: qualifying_investment_credit_annual_cap
  kind: parameter
  dtype: Money
  unit: USD
  source: C.R.S. 39-32-105(1)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-32-105
          excerpt: shall not exceed one hundred thousand dollars in any one tax year
  versions:
  - effective_from: '1999-01-01'
    formula: '100000'
- name: qualifying_investment_credit
  kind: derived
  entity: Person
  dtype: Money
  period: Year
  unit: USD
  source: C.R.S. 39-32-105(1)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-32-105
          excerpt: an amount equal to ten percent of the amount of the total investment
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/statute/39/39-32-105
          excerpt: for income tax years commencing on or after January 1, 1999, but
            prior to January 1, 2005
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/statute/39/39-32-105
          excerpt: only for specific capital investments in technology infrastructure
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-32-105
          excerpt: shall not exceed one hundred thousand dollars in any one tax year
  versions:
  - effective_from: '1999-01-01'
    formula: "if tax_year_is_within_credit_effective_window\n  and investment_is_specific_capital_investment_in_qualifying_rural_technology_enterprise_zone_infrastructure:\n\
      \  min(\n    qualifying_investment_credit_rate * total_qualifying_technology_infrastructure_investment,\n\
      \    qualifying_investment_credit_annual_cap\n  )\nelse: 0"
