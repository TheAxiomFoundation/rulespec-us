format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-21-107
  summary: |-
    Any limitations within article 21 are suspended while collection is prohibited by a title 11 case, and for six months thereafter. A tax may be assessed and collected at any time after failure to file or a false or fraudulent return intended to evade tax.
  deferred_outputs:
    - output: us-co:statutes/39/39-21-107#ordinary_tax_assessment_and_collection_deadline
      reason: The ordinary assessment, lien, collection, and proposed-adjustment deadlines require date arithmetic and unavailable cited exceptions in sections 29-2-208 and 29-2-302.
      source_values:
        - us-co:statutes/39/39-21-107#ordinary_assessment_limitation_years
        - us-co:statutes/39/39-21-107#proposed_adjustment_extension_years
        - us-co:statutes/39/39-21-107#lien_continuation_extension_years
    - output: us-co:statutes/39/39-21-107#income_tax_assessment_and_collection_deadline
      reason: The income-tax deadline depends on the federal deficiency-assessment period and unavailable cited provisions.
      source_values:
        - us-co:statutes/39/39-21-107#income_tax_assessment_extension_years
        - us-co:statutes/39/39-21-107#income_tax_collection_limitation_years
    - output: us-co:statutes/39/39-21-107#early_return_filing_date
      reason: RuleSpec has no date-valued output type to represent the deemed filing date.
    - output: us-co:statutes/39/39-21-107#consented_assessment_deadline
      reason: The agreed assessment period and subsequent written extensions require date arithmetic over agreement dates.
    - output: us-co:statutes/39/39-21-107#pre_1965_accrued_rights_construction
      reason: The historical construction clause does not define a computable legal output.
rules:
  - name: ordinary_assessment_limitation_years
    kind: parameter
    dtype: Count
    source: 39-21-107(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-21-107
              excerpt: "within three years after the return was filed"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          3
  - name: proposed_adjustment_extension_years
    kind: parameter
    dtype: Count
    source: 39-21-107(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-21-107
              excerpt: "extend the limitation ... for one year"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1
  - name: lien_continuation_extension_years
    kind: parameter
    dtype: Count
    source: 39-21-107(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-21-107
              excerpt: "the lien shall continue for one year only"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1
  - name: income_tax_assessment_extension_years
    kind: parameter
    dtype: Count
    source: 39-21-107(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-21-107
              excerpt: "within one year after the expiration"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1
  - name: income_tax_collection_limitation_years
    kind: parameter
    dtype: Count
    source: 39-21-107(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-21-107
              excerpt: "within six years from the date of said assessment"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          6
  - name: post_prohibition_suspension_months
    kind: parameter
    dtype: Count
    source: 39-21-107(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-21-107
              excerpt: "for six months thereafter"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          6
  - name: limitations_suspended_for_title_11_collection_prohibition
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: 39-21-107(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-21-107
              excerpt: "department is prohibited from collecting by reason of a case under title 11"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-21-107
              excerpt: "and for six months thereafter"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          department_collection_is_prohibited_by_title_11_case
          or title_11_collection_prohibition_ended_within_post_prohibition_suspension_months
  - name: tax_may_be_assessed_and_collected_without_limitation
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: 39-21-107(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-21-107
              excerpt: "failure to file a return or the filing of a false or fraudulent return with intent to evade tax"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          taxpayer_failed_to_file_return
          or taxpayer_filed_false_or_fraudulent_return_with_intent_to_evade_tax
