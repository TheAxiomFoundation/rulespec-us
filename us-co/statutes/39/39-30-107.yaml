format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-30-107
  summary: |-
    Nothing in this article shall affect zoning measures or labor-management agreements in effect when an enterprise zone is established, or adopted or entered into after establishment.
rules:
  - name: zoning_measure_remains_unaffected
    kind: derived
    entity: EnterpriseZone
    dtype: Judgment
    period: Year
    source: C.R.S. 39-30-107
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-30-107
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          zoning_measure_is_in_effect_when_enterprise_zone_is_established
          or zoning_measure_is_adopted_after_enterprise_zone_establishment
  - name: labor_management_agreement_remains_unaffected
    kind: derived
    entity: EnterpriseZone
    dtype: Judgment
    period: Year
    source: C.R.S. 39-30-107
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-30-107
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          labor_management_agreement_is_in_effect_when_enterprise_zone_is_established
          or labor_management_agreement_is_entered_into_after_enterprise_zone_establishment
