format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-5-121
  summary: |-
    “For property tax years commencing on or after January 1, 2025, the assessor shall not include the appropriate ratio of valuation for assessment in the notice.” An operator that fails to timely submit a requested ownership-interest statement pays the lesser of one hundred dollars or the tax due.
rules:
  - name: assessment_ratio_omission_requirement_satisfied
    kind: derived
    entity: AssessmentNotice
    dtype: Judgment
    period: Year
    source: 39-5-121(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-5-121
              excerpt: "the assessor shall not include the appropriate ratio of valuation for assessment in the notice"
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          not notice_includes_ratio_of_valuation_for_assessment

  - name: operator_ownership_statement_noncompliance_penalty_cap
    kind: parameter
    dtype: Money
    unit: USD
    source: 39-5-121(1.5)(b)(I)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-5-121
              excerpt: "a penalty to the treasurer in the amount of one hundred dollars"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          100

  - name: operator_ownership_statement_noncompliance_penalty
    kind: derived
    entity: WellUnitOperator
    dtype: Money
    period: Year
    unit: USD
    source: 39-5-121(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-5-121
              excerpt: "the operator shall pay a penalty to the treasurer in the amount of one hundred dollars or the amount of tax due on the property, whichever is less"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-5-121
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if operator_failed_to_timely_submit_requested_ownership_interest_statement:
            min(property_tax_due_on_property, operator_ownership_statement_noncompliance_penalty_cap)
          else: 0
