format: rulespec/v1
module:
  summary: |-
    A certificate of purchase is assignable by endorsement; an assignment entered on the record of sales in both specified offices vests the assignee with the original purchaser's right and title.
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-11-118
rules:
  - name: certificate_of_purchase_assignable_by_endorsement
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. 39-11-118
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-11-118
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          true
  - name: assignment_vests_assignee_with_original_purchaser_right_and_title
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: C.R.S. 39-11-118
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-11-118
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          assignment_entered_on_record_of_sales_in_county_clerk_and_recorder_office
          and assignment_entered_on_record_of_sales_in_treasurer_office
