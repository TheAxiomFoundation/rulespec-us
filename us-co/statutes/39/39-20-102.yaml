format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-20-102
  summary: |-
    Where payment of Colorado tax has been refused or neglected and a filed statement or notice creates a lien on real property, the executive director may file a civil action to enforce the lien; in such an action, the court may appoint a receiver if equity requires.
rules:
  - name: tax_lien_enforcement_action_may_be_filed
    kind: derived
    entity: TaxLienEnforcementAction
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-20-102
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-20-102
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          tax_payment_has_been_refused_or_neglected
          and filed_statement_or_notice_creates_lien_on_real_property
          and real_property_is_subject_to_tax_lien
  - name: court_may_appoint_receiver_for_tax_lien_enforcement_action
    kind: derived
