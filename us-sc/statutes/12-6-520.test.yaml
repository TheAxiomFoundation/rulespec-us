- name: cpi_adjustment_below_four_percent_rounded_to_nearest_ten
  period:
    period_kind: tax_year
    start: '2019-01-01'
    end: '2019-12-31'
  input:
    us-sc:statutes/12-6-520#input.prior_cumulative_income_tax_bracket_amount: 1000
    us-sc:statutes/12-6-520#input.chained_consumer_price_index_inflation_rate: 0.03
  output:
    us-sc:statutes/12-6-520#inflation_adjusted_income_tax_bracket_amount: 1030
- name: annual_cpi_adjustment_capped_at_four_percent
