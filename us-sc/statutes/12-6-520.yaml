format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/statute/12-6-520
  summary: |-
    Beginning on December 15, 2018, and each December fifteenth thereafter, the department shall cumulatively adjust the brackets in Section 12-6-510 using the Chained Consumer Price Index for All Consumers. However, the adjustment may not exceed four percent a year, and the rounding amount is ten dollars. The adjusted brackets apply for taxable years beginning in the succeeding calendar year.
rules:
  - name: annual_bracket_inflation_adjustment_cap
    kind: parameter
    dtype: Rate
    source: S.C. Code § 12-6-520
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/statute/12-6-520
              excerpt: "the adjustment may not exceed four percent a year"
    versions:
      - effective_from: '2018-12-15'
        formula: |-
          0.04

  - name: bracket_rounding_amount
    kind: parameter
    dtype: Money
    unit: USD
    source: S.C. Code § 12-6-520
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/statute/12-6-520
              excerpt: "the rounding amount is ten dollars"
    versions:
      - effective_from: '2018-12-15'
        formula: |-
          10

  - name: inflation_adjusted_income_tax_bracket_amount
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: S.C. Code § 12-6-520
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/statute/12-6-520
              excerpt: "shall cumulatively adjust the brackets ... using the Chained Consumer Price Index for All Consumers"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/statute/12-6-520
              excerpt: "the adjustment may not exceed four percent a year"
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/statute/12-6-520
              excerpt: "the rounding amount is ten dollars"
          - path: versions[0].formula
            kind: effective_period
            source:
              corpus_citation_path: us-sc/statute/12-6-520
              excerpt: "The brackets, as adjusted, apply ... for taxable years beginning in the succeeding calendar year."
    versions:
      - effective_from: '2019-01-01'
        formula: |-
          floor(((prior_cumulative_income_tax_bracket_amount * (1 + min(chained_consumer_price_index_inflation_rate, annual_bracket_inflation_adjustment_cap))) / bracket_rounding_amount) + 0.5) * bracket_rounding_amount
