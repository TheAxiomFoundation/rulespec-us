# Fixtures are independently hand-computed from Act 110's 2026 section
# 12-6-510(C)(1) schedule. Liability before nonrefundable credits is 1.99 per
# cent through $30,000 and 5.21 per cent of taxable income less $966 at or above
# $30,000.
- name: negative taxable income is floored
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    us-sc:policies/income_tax/pilot_liability_pipeline#input.sc_pit_pilot_state_taxable_income: -100
  output:
    us-sc:policies/income_tax/pilot_liability_pipeline#sc_pit_pilot_taxable_income: '0'
    us-sc:policies/income_tax/pilot_liability_pipeline#sc_pit_pilot_schedule_tax: '0'
