format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/statute/12-6-510
    upstream_source_check:
      status: composed_from_supplied_current_authority
      checked_paths:
        - us-sc/statute/12-6-510
      rationale: |-
        South Carolina Act 110 of 2026 amended section 12-6-510(C) for taxable
        years beginning after 2025. It imposes 1.99 percent through $30,000 and
        5.21 percent of taxable income minus $966 above $30,000. This narrow
        composition accepts completed-return South Carolina taxable income and
        the active bracket's cumulative base tax, floor, and marginal rate as
        caller-supplied current-authority inputs. The upper-bracket inputs use
        a $597 cumulative base at $30,000, exactly equivalent to the statutory
        5.21-percent-minus-$966 expression. Deductions, exemptions, special
        income classes, and credits remain outside this rate-section module.
  summary: |-
    Composed South Carolina individual-income-tax schedule for the 2026
    ordinary full-year resident wage-earner slice. It normalizes supplied South
    Carolina taxable income and applies the supplied active section 12-6-510(C)
    bracket in cumulative-base-plus-marginal form before nonrefundable credits.
    Its exact PolicyEngine 4.18.9 analog is
    `sc_income_tax_before_non_refundable_credits` on the six-case childless
    age-40 grid: single at $30,000/$60,000/$150,000 of wages and one-earner
    joint at $60,000/$120,000/$300,000. PolicyEngine supplies completed taxable
    income; expected outputs are independently hand-computed from Act 110.
rules:
  - name: sc_pit_pilot_taxable_income
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: S.C. Code section 12-6-510(C), supplied South Carolina taxable income
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/statute/12-6-510
              excerpt: "a tax is imposed on the South Carolina taxable income of individuals"
    versions:
      - effective_from: '2026-01-01'
        formula: max(0, sc_pit_pilot_supplied_taxable_income)

  - name: sc_pit_pilot_schedule_tax
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: S.C. Code section 12-6-510(C)(1), two-bracket 2026 schedule
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/statute/12-6-510
              excerpt: "$0 $30,000 1.99% times the amount"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/statute/12-6-510
              excerpt: "$30,000 or more 5.21% times the amount minus $966"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          sc_pit_pilot_supplied_bracket_base
          + sc_pit_pilot_supplied_marginal_rate * max(0, sc_pit_pilot_taxable_income - sc_pit_pilot_supplied_bracket_floor)

  - name: sc_pit_pilot_income_tax_liability
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: S.C. Code section 12-6-510(C), tax before nonrefundable credits
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/statute/12-6-510
              excerpt: "for taxable years beginning after 2025, a tax is imposed"
    versions:
      - effective_from: '2026-01-01'
        formula: max(0, sc_pit_pilot_schedule_tax)
