  - {name: sc_pit_2026_trust_excess_distribution_in_federal_taxable_income, entity: TaxUnit, dtype: Money, period: Year, unit: USD, description: Trust excess distribution included in federal taxable income and excluded by section 12-6-1120(6).}
  - {name: sc_pit_2026_qualifying_guard_or_reserve_pay_in_federal_taxable_income, entity: TaxUnit, dtype: Money, period: Year, unit: USD, description: Qualifying National Guard or reserve pay included federally and excluded by section 12-6-1120(7).}
  - {name: sc_pit_2026_federal_itemized_deductions, entity: TaxUnit, dtype: Money, period: Year, unit: USD, description: "Federal itemized deduction used to compute the federal taxable-income starting amount, zero when the federal standard deduction was used."}
  - {name: sc_pit_2026_federal_standard_deduction, entity: TaxUnit, dtype: Money, period: Year, unit: USD, description: "Federal standard deduction used to compute the federal taxable-income starting amount, zero when federal itemized deductions were used."}
