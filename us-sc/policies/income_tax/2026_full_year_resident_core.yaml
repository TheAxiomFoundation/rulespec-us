format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_paths:
      - us-sc/statute/12-6-30
      - us-sc/statute/12-6-40
      - us-sc/statute/12-6-50
      - us-sc/statute/12-6-510
      - us-sc/statute/12-6-545
      - us-sc/statute/12-6-1110
      - us-sc/statute/12-6-1120
      - us-sc/statute/12-6-1130
      - us-sc/statute/12-6-1140
      - us-sc/statute/12-6-1150
      - us-sc/statute/12-6-1160
      - us-sc/statute/12-6-1170
      - us-sc/statute/12-6-1171
      - us-sc/statute/12-6-1620
      - us-sc/statute/12-6-1630
      - us-sc/statute/12-6-3330
      - us-sc/statute/12-6-3380
      - us-sc/statute/12-6-3381
      - us-sc/statute/12-6-3385
      - us-sc/statute/12-6-3390
      - us-sc/statute/12-6-3400
      - us-sc/statute/12-6-3500
      - us-sc/statute/12-6-3575
      - us-sc/statute/12-6-3632
      - us-sc/statute/12-6-3660
      - us-sc/statute/12-6-3665
      - us-sc/statute/12-6-3670
      - us-sc/statute/12-6-3790
      - us-sc/statute/12-6-3800
      - us-sc/statute/12-6-3810
    upstream_source_check:
      status: checked_higher_authority
      checked_paths:
        - us-sc/statute/title-12/chapter-6
        - us-sc/statute/12-6-40
        - us-sc/statute/12-6-510
        - us-sc/statute/12-6-1110
        - us-sc/statute/12-6-1120
        - us-sc/statute/12-6-1130
        - us-sc/statute/12-6-1140
        - us-sc/statute/12-6-1150
        - us-sc/statute/12-6-1170
        - us-sc/statute/12-6-1171
        - us-sc/statute/12-6-3330
        - us-sc/statute/12-6-3390
        - us-sc/statute/12-6-3632
      rationale: |-
        The pinned official South Carolina Code provides the resident
        definition, the federal-code conformity date, the Article 9
        modification inventory, and Act 110 of 2026's federal Section 63
        deduction reversal, South Carolina Income Adjusted Deduction (SCIAD),
        fixed tax-year-2026 rate schedule, and capped earned-income credit,
        together with several other directly executable deductions and
        nonrefundable credits.

        The pinned corpus does not contain the tax-year-2026 SC1040 annual
        return, instructions, schedules, or the Revenue and Fiscal Affairs
        Office certifications for indexed dependent and volunteer deductions
        and tuition-credit limits. It also lacks the cross-title law and
        agency determinations needed for several deductions and credits.
        Those branches are typed holds. This module never accepts completed
        South Carolina income, taxable income, deduction, credit, rate, or
        tax from the caller.
  summary: |-
    Tax-year-2026 South Carolina full-year-resident individual-income-tax
    core. It starts with federal taxable income and raw return facts, reverses
    the federal standard or itemized deduction that Act 110 no longer adopts,
    applies directly supported Article 9 items and the filing-status/AGI-based
    SCIAD, computes the forty-four-percent net-capital-gain deduction,
    supported retirement and military deductions for taxpayers under age
    sixty-five, the sixteen-dollar public-safety subsistence deduction, and
    the Act 110 two-bracket tax. It then applies the directly supported
    two-wage-earner, nursing-care, and capped South Carolina earned-income
    credits as nonrefundable credits.

    Every candidate Money amount is private. Public stage amounts are
    transitively gated by the supported-profile Judgment and therefore return
    zero rather than exposing an amount for an invalid or held profile. The
    bounded final amount is nonnegative because both refundable Chapter 6
    credit families are held until their tax-year-2026 annual limits,
    eligibility sources, and return ordering are pinned. This is a
    source-grounded common-profile core, not a claim of complete South
    Carolina liability for held branches.
  deferred_outputs:
    - output: us-sc:policies/income_tax/2026_full_year_resident_core#sc_pit_2026_complete_state_income
      reason: |-
        Complete Article 9 income requires a current federal-conformity
        bridge, pre-1985 transition items, pass-through elections, and
        cross-title exclusions that cannot be derived from the pinned source
        chain for every taxpayer.
      source_values:
        - us-sc:policies/income_tax/2026_full_year_resident_core#sc_pit_2026_supported_state_income
    - output: us-sc:policies/income_tax/2026_full_year_resident_core#sc_pit_2026_complete_taxable_income
      reason: |-
        The tax-year-2026 indexed dependent and volunteer deduction amounts,
        age-sixty-five person-level income allocation, disability and
        special-needs eligibility sources, and education-account rules are
        not complete in the pinned corpus.
      source_values:
        - us-sc:policies/income_tax/2026_full_year_resident_core#sc_pit_2026_supported_taxable_income
    - output: us-sc:policies/income_tax/2026_full_year_resident_core#sc_pit_2026_complete_tax_after_nonrefundable_credits
      reason: |-
        The 2026 SC1040 credit schedules and ordering are absent. Other-state,
        child-care, tuition, premarital, insurance, property, donation,
        business, carryforward, transferred, and agency-approved credit
        branches remain held.
      source_values:
        - us-sc:policies/income_tax/2026_full_year_resident_core#sc_pit_2026_supported_tax_after_nonrefundable_credits
    - output: us-sc:policies/income_tax/2026_full_year_resident_core#sc_pit_2026_net_income_tax_liability
      reason: |-
        The refundable tuition credit and refundable exceptional-needs
        tuition credit require missing annual certifications, global-cap
        disposition, cross-title eligibility law, and the 2026 return order.
        Their applicability is held instead of accepting a caller-completed
        credit.
      source_values:
        - us-sc:policies/income_tax/2026_full_year_resident_core#sc_pit_2026_supported_net_income_tax_liability

rules:
  - name: sc_pit_2026_input_domain_is_valid
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: Fail-closed domain for full-year-resident raw facts
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source: {corpus_citation_path: us-sc/statute/12-6-30, excerpt: '"Resident individual" means an individual domiciled in this State'}
          - path: versions[0].formula
            kind: condition
            source: {corpus_citation_path: us-sc/statute/12-6-1110, excerpt: "gross income, adjusted gross income, and taxable income as calculated under the Internal Revenue Code are modified"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          (
            sc_pit_2026_filing_status_single
            or sc_pit_2026_filing_status_joint
            or sc_pit_2026_filing_status_married_separate
            or sc_pit_2026_filing_status_head_of_household
            or sc_pit_2026_filing_status_surviving_spouse
          )
          and not (
            sc_pit_2026_filing_status_single
            and (
              sc_pit_2026_filing_status_joint
              or sc_pit_2026_filing_status_married_separate
              or sc_pit_2026_filing_status_head_of_household
              or sc_pit_2026_filing_status_surviving_spouse
            )
          )
          and not (
            sc_pit_2026_filing_status_joint
            and (
              sc_pit_2026_filing_status_married_separate
              or sc_pit_2026_filing_status_head_of_household
              or sc_pit_2026_filing_status_surviving_spouse
            )
          )
          and not (
            sc_pit_2026_filing_status_married_separate
            and (
              sc_pit_2026_filing_status_head_of_household
              or sc_pit_2026_filing_status_surviving_spouse
            )
          )
          and not (
            sc_pit_2026_filing_status_head_of_household
            and sc_pit_2026_filing_status_surviving_spouse
          )
          and sc_pit_2026_primary_age_years >= 0
          and floor(sc_pit_2026_primary_age_years) == sc_pit_2026_primary_age_years
          and sc_pit_2026_spouse_age_years >= 0
          and floor(sc_pit_2026_spouse_age_years) == sc_pit_2026_spouse_age_years
          and (
            sc_pit_2026_filing_status_joint
            or (
              sc_pit_2026_spouse_age_years == 0
              and sc_pit_2026_spouse_retirement_income == 0
              and sc_pit_2026_spouse_military_retirement_income == 0
              and sc_pit_2026_spouse_sc_earned_income == 0
              and sc_pit_2026_spouse_earned_income_deductions == 0
            )
          )
          and sc_pit_2026_other_state_local_bond_interest >= 0
          and sc_pit_2026_us_obligation_interest >= 0
          and sc_pit_2026_state_income_tax_refund_in_federal_income >= 0
          and sc_pit_2026_social_security_and_tier_one_benefits_in_federal_taxable_income >= 0
          and sc_pit_2026_foreign_income_exclusions_disallowed_by_sc >= 0
          and sc_pit_2026_trust_excess_distribution_in_federal_taxable_income >= 0
          and sc_pit_2026_qualifying_guard_or_reserve_pay_in_federal_taxable_income >= 0
          and sc_pit_2026_federal_itemized_deductions >= 0
          and sc_pit_2026_federal_standard_deduction >= 0
          and (
            (
              sc_pit_2026_federal_return_used_itemized_deductions
              and sc_pit_2026_federal_standard_deduction == 0
            )
            or (
              not sc_pit_2026_federal_return_used_itemized_deductions
              and sc_pit_2026_federal_itemized_deductions == 0
            )
          )
          and sc_pit_2026_sc_net_capital_gain >= 0
          and sc_pit_2026_primary_retirement_income >= 0
          and sc_pit_2026_primary_military_retirement_income >= 0
          and sc_pit_2026_primary_military_retirement_income <= sc_pit_2026_primary_retirement_income
          and sc_pit_2026_spouse_retirement_income >= 0
          and sc_pit_2026_spouse_military_retirement_income >= 0
          and sc_pit_2026_spouse_military_retirement_income <= sc_pit_2026_spouse_retirement_income
          and sc_pit_2026_primary_eligible_public_safety_regular_workdays >= 0
          and sc_pit_2026_primary_eligible_public_safety_regular_workdays <= sc_pit_2026_regular_workday_count_ceiling
          and floor(sc_pit_2026_primary_eligible_public_safety_regular_workdays) == sc_pit_2026_primary_eligible_public_safety_regular_workdays
          and sc_pit_2026_spouse_eligible_public_safety_regular_workdays >= 0
          and sc_pit_2026_spouse_eligible_public_safety_regular_workdays <= sc_pit_2026_regular_workday_count_ceiling
          and floor(sc_pit_2026_spouse_eligible_public_safety_regular_workdays) == sc_pit_2026_spouse_eligible_public_safety_regular_workdays
          and (
            sc_pit_2026_filing_status_joint
            or sc_pit_2026_spouse_eligible_public_safety_regular_workdays == 0
          )
          and sc_pit_2026_primary_sc_earned_income >= 0
          and sc_pit_2026_primary_earned_income_deductions >= 0
          and sc_pit_2026_primary_earned_income_deductions <= sc_pit_2026_primary_sc_earned_income
          and sc_pit_2026_spouse_sc_earned_income >= 0
          and sc_pit_2026_spouse_earned_income_deductions >= 0
          and sc_pit_2026_spouse_earned_income_deductions <= sc_pit_2026_spouse_sc_earned_income
          and sc_pit_2026_private_nursing_care_expenses >= 0
          and sc_pit_2026_federal_earned_income_credit_allowed >= 0

  - name: sc_pit_2026_base_profile_applies
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: Source-readiness gate for the bounded Article 9 and deduction core
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source: {corpus_citation_path: us-sc/statute/12-6-40, excerpt: '"Internal Revenue Code" means the Internal Revenue Code of 1986, as amended through December 31, 2024'}
          - path: versions[0].formula
            kind: exception
            source: {corpus_citation_path: us-sc/statute/12-6-1140, excerpt: "Notwithstanding the deduction amount set forth in this item, each December fifteenth, the department shall cumulatively adjust the deduction amount"}
          - path: versions[0].formula
            kind: exception
            source: {corpus_citation_path: us-sc/statute/12-6-1170, excerpt: "Beginning for the taxable year during which a resident individual taxpayer attains the age of sixty-five years"}
          - path: versions[0].formula
            kind: exception
            source: {corpus_citation_path: us-sc/statute/12-6-545, excerpt: "a taxpayer may elect annually"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          sc_pit_2026_input_domain_is_valid
          and sc_pit_2026_is_full_year_resident_individual_return
          and not sc_pit_2026_has_post_2024_federal_conformity_difference
          and not sc_pit_2026_has_other_article_9_or_transition_modification
          and not sc_pit_2026_has_pass_through_business_tax_election_or_entity_exclusion
          and not sc_pit_2026_has_dependent_or_under_age_six_deduction
          and not sc_pit_2026_has_disability_or_special_needs_child_deduction
          and not sc_pit_2026_has_irc_162h_or_education_account_deduction
          and not sc_pit_2026_has_volunteer_or_preceptor_deduction
          and not sc_pit_2026_has_surviving_spouse_attributable_retirement_income
          and not sc_pit_2026_has_catastrophe_savings_account_activity
          and sc_pit_2026_primary_age_years < sc_pit_2026_age_65_threshold
          and (
            not sc_pit_2026_filing_status_joint
            or sc_pit_2026_spouse_age_years < sc_pit_2026_age_65_threshold
          )

  - name: sc_pit_2026_supported_profile_applies
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: Transitive source-readiness gate through final liability before payments
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source: {corpus_citation_path: us-sc/statute/12-6-510, excerpt: "for taxable years beginning after 2025, a tax is imposed"}
          - path: versions[0].formula
            kind: exception
            source: {corpus_citation_path: us-sc/statute/12-6-3385, excerpt: "A student is allowed a refundable individual income tax credit"}
          - path: versions[0].formula
            kind: exception
            source: {corpus_citation_path: us-sc/statute/12-6-3790, excerpt: "A taxpayer is entitled to a refundable tax credit"}
          - path: versions[0].formula
            kind: exception
            source: {corpus_citation_path: us-sc/statute/12-6-3400, excerpt: "Resident individuals are allowed a credit"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          sc_pit_2026_base_profile_applies
          and not sc_pit_2026_has_child_or_dependent_care_credit
          and not sc_pit_2026_has_premarital_course_credit
          and not sc_pit_2026_has_other_state_income_tax_credit
          and not sc_pit_2026_has_retirement_plan_lifetime_credit
          and not sc_pit_2026_has_health_insurance_or_residence_property_credit
          and not sc_pit_2026_has_tuition_refundable_credit
          and not sc_pit_2026_has_exceptional_needs_refundable_credit
          and not sc_pit_2026_has_other_specialty_credit_or_carryforward

  - name: sc_pit_2026_lower_rate
    kind: parameter
    dtype: Rate
    period: Year
    source: S.C. Code section 12-6-510(C)(1)
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source: {corpus_citation_path: us-sc/statute/12-6-510, excerpt: "$0 $30,000 1.99% times the amount"}
    versions:
      - {effective_from: '2026-01-01', effective_to: '2026-12-31', formula: '0.0199'}

  - name: sc_pit_2026_upper_rate
    kind: parameter
    dtype: Rate
    period: Year
    source: S.C. Code section 12-6-510(C)(1)
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source: {corpus_citation_path: us-sc/statute/12-6-510, excerpt: "$30,000 or more 5.21% times the amount minus $966"}
    versions:
      - {effective_from: '2026-01-01', effective_to: '2026-12-31', formula: '0.0521'}

  - name: sc_pit_2026_upper_bracket_floor
    kind: parameter
