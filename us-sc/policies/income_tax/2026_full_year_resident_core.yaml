    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: S.C. Code section 12-6-3330(C)
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-sc/statute/12-6-3330, excerpt: "South Carolina qualified earned income"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: sc_pit_2026_spouse_sc_earned_income - sc_pit_2026_spouse_earned_income_deductions

  - name: sc_pit_2026_candidate_two_wage_earner_credit
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: S.C. Code section 12-6-3330
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-sc/statute/12-6-3330, excerpt: "if both spouses have South Carolina earned income and a joint return is filed"}
          - path: versions[0].formula
            kind: exception
            source: {corpus_citation_path: us-sc/statute/12-6-3330, excerpt: "No credit is allowed under this section for a taxable year if either spouse claims the benefits"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if (
            sc_pit_2026_filing_status_joint
            and sc_pit_2026_primary_sc_earned_income > 0
            and sc_pit_2026_spouse_sc_earned_income > 0
            and not sc_pit_2026_either_spouse_claims_irc_911_or_931_benefit
          ):
            sc_pit_2026_two_wage_earner_rate
            * (
              if sc_pit_2026_candidate_primary_qualified_earned_income
                < sc_pit_2026_candidate_spouse_qualified_earned_income:
                max(
                  0,
                  if sc_pit_2026_candidate_primary_qualified_earned_income
                    < sc_pit_2026_two_wage_earner_income_cap:
                    sc_pit_2026_candidate_primary_qualified_earned_income
                  else:
                    sc_pit_2026_two_wage_earner_income_cap
                )
              else:
                max(
                  0,
                  if sc_pit_2026_candidate_spouse_qualified_earned_income
                    < sc_pit_2026_two_wage_earner_income_cap:
                    sc_pit_2026_candidate_spouse_qualified_earned_income
                  else:
                    sc_pit_2026_two_wage_earner_income_cap
                )
            )
          else:
            0

  - name: sc_pit_2026_candidate_nursing_care_credit
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: S.C. Code section 12-6-3390
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-sc/statute/12-6-3390, excerpt: "twenty percent of the expenses paid by the taxpayer"}
          - path: versions[0].formula
            kind: exception
            source: {corpus_citation_path: us-sc/statute/12-6-3390, excerpt: "no credit is allowed for expenses paid from public source funds"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if sc_pit_2026_nursing_care_level_is_physician_certified:
            min(
              sc_pit_2026_nursing_care_credit_cap,
              sc_pit_2026_nursing_care_credit_rate * sc_pit_2026_private_nursing_care_expenses
            )
          else:
            0

  - name: sc_pit_2026_candidate_earned_income_credit
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: S.C. Code section 12-6-3632
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-sc/statute/12-6-3632, excerpt: "allowed as a nonrefundable credit"}
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-sc/statute/12-6-3632, excerpt: "one hundred twenty-five percent of the federal earned income tax credit"}
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-sc/statute/12-6-3632, excerpt: "not to exceed two hundred dollars"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          min(
            sc_pit_2026_eitc_credit_cap,
            sc_pit_2026_eitc_match_rate
            * max(0, sc_pit_2026_federal_earned_income_credit_allowed)
          )

  - name: sc_pit_2026_candidate_nonrefundable_credits
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Directly supported nonrefundable Chapter 6 credits
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-sc/statute/12-6-3330, excerpt: "credit against South Carolina income tax"}
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-sc/statute/12-6-3390, excerpt: "may claim an income tax credit"}
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-sc/statute/12-6-3632, excerpt: "allowed as a nonrefundable credit"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          sc_pit_2026_candidate_two_wage_earner_credit
          + sc_pit_2026_candidate_nursing_care_credit
          + sc_pit_2026_candidate_earned_income_credit

  - name: sc_pit_2026_candidate_tax_after_nonrefundable_credits
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Nonrefundable Chapter 6 credits cannot reduce tax below zero
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-sc/statute/12-6-3632, excerpt: "nonrefundable credit against the tax imposed"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: max(0, sc_pit_2026_candidate_tax_before_credits - sc_pit_2026_candidate_nonrefundable_credits)

  - name: sc_pit_2026_candidate_net_income_tax_liability
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Bounded before-payments liability with refundable branches held absent
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-sc/statute/12-6-510, excerpt: "a tax is imposed on the South Carolina taxable income of individuals"}
          - path: versions[0].formula
            kind: exception
            source: {corpus_citation_path: us-sc/statute/12-6-3385, excerpt: "refundable individual income tax credit"}
          - path: versions[0].formula
            kind: exception
            source: {corpus_citation_path: us-sc/statute/12-6-3790, excerpt: "refundable tax credit against income taxes"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: sc_pit_2026_candidate_tax_after_nonrefundable_credits

  - name: sc_pit_2026_supported_state_income
