  - {name: sc_pit_2026_sc_net_capital_gain, entity: TaxUnit, dtype: Money, period: Year, unit: USD, description: Net capital gain recognized in South Carolina under IRC section 1222 and related sections.}
  - {name: sc_pit_2026_primary_retirement_income, entity: TaxUnit, dtype: Money, period: Year, unit: USD, description: "Primary taxpayer otherwise taxable qualified retirement income, including military retirement."}
  - {name: sc_pit_2026_primary_military_retirement_income, entity: TaxUnit, dtype: Money, period: Year, unit: USD, description: Primary taxpayer military retirement income included in the retirement-income amount.}
