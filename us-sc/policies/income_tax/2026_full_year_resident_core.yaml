  - {name: sc_pit_2026_primary_eligible_public_safety_regular_workdays, entity: TaxUnit, dtype: Count, period: Year, description: "Primary taxpayer whole regular workdays as an eligible law-enforcement officer, firefighter, or emergency medical worker."}
