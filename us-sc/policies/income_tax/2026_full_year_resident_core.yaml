  - {name: sc_pit_2026_either_spouse_claims_irc_911_or_931_benefit, entity: TaxUnit, dtype: Judgment, period: Year, description: "Whether either spouse claims a federal section 911 or 931 benefit, which disallows the two-wage-earner credit."}
  - {name: sc_pit_2026_private_nursing_care_expenses, entity: TaxUnit, dtype: Money, period: Year, unit: USD, description: "Taxpayer-paid nursing-facility-level, in-home, or community-care expense not paid from public-source funds."}
  - {name: sc_pit_2026_nursing_care_level_is_physician_certified, entity: TaxUnit, dtype: Judgment, period: Year, description: Whether a licensed physician certified that the supported person meets nursing-facility level-of-care criteria.}
