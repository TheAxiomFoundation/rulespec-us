        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-72
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          agency_fault_delayed_processing_in_initial_processing_period
          and household_found_eligible_during_second_processing_period
          and day_is_date_application_was_filed

  - name: agency_must_take_immediate_corrective_action
    kind: derived
    entity: Household
    dtype: Judgment
