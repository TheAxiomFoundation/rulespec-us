format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-454
  summary: |-
    Property for sale: real property the household is making a good faith effort to sell at a reasonable price and which has not been sold. Retirement accounts: funds in qualifying plans, contracts, or accounts such as IRA, 401(k), profit-sharing, and SEP plans. SSI/TANF recipients: resources of a household member who receives those benefits, including authorized but unpaid, suspended or recouped, or below-minimum unpaid benefits; Medicaid-only individuals are not considered SSI or TANF recipients.
rules:
  - name: real_property_for_sale_resource_exclusion_applies
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: SNAP Manual 454(U)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-454
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_real_property
          and household_making_good_faith_effort_to_sell_asset_at_reasonable_price
          and asset_has_not_been_sold
  - name: retirement_account_resource_exclusion_applies
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: SNAP Manual 454(V)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-454
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_fund_in_plan_contract_or_account_meeting_internal_revenue_code_requirements
  - name: household_member_is_ssi_recipient_for_resource_exclusion
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual 454(W)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-454
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (household_member_receives_ssi_benefits
          or ssi_benefits_authorized_but_not_received
          or ssi_benefits_suspended_or_recouped
          or ssi_benefits_not_paid_because_less_than_minimum_amount)
          and not individual_entitled_to_medicaid_benefits_only
  - name: ssi_recipient_resources_excluded
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual 454(W)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-454
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_member_is_ssi_recipient_for_resource_exclusion
  - name: household_member_is_tanf_recipient_for_resource_exclusion
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual 454(X)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-454
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (household_member_receives_tanf_benefits
          or tanf_benefits_authorized_but_not_received
          or tanf_benefits_suspended_or_recouped
          or tanf_benefits_not_paid_because_less_than_minimum_amount)
          and not individual_entitled_to_medicaid_benefits_only
  - name: tanf_recipient_resources_excluded
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual 454(X)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-454
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_member_is_tanf_recipient_for_resource_exclusion
