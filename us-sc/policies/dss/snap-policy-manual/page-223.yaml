format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-223
  summary: |-
    If an eligible household files recertification before the end of the certification period, provides all necessary information, and agency fault causes processing to exceed 30 days, the household is entitled to a full month's allotment without proration from approval date. Applications in the month after expiration receive prorated benefits if approved; later recertification applications are too late, except DSS Form 3800 or online applications are treated as initial certifications. Expedited service is not required for timely recertification applications.
rules:
  - name: recertification_processing_deadline_days
    kind: parameter
    dtype: Integer
    source: SNAP Manual page 223
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-223
              excerpt: "not processed within 30 days"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: recertification_processing_exceeds_deadline
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 223
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-223
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          days_after_recertification_application_filed_without_processing > recertification_processing_deadline_days

  - name: full_month_allotment_without_approval_date_proration_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 223
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-223
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_is_eligible
          and recertification_application_filed_before_end_of_certification_period
          and all_information_necessary_to_determine_eligibility_provided
          and recertification_delay_due_to_agency_fault
          and recertification_processing_exceeds_deadline

  - name: following_month_application_considered_recertification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 17.5, page 223
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-223
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          recertification_application_filed_in_month_after_certification_expires

  - name: following_month_recertification_benefits_prorated_from_application_date
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 17.5, page 223
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-223
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          recertification_application_filed_in_month_after_certification_expires
          and application_approved

  - name: late_recertification_application_received_too_late
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 17.5, page 223
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-223
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          recertification_application_filed_later_than_month_after_certification_expires
          and not dss_form_3800_filed
          and not online_application_filed

  - name: new_application_required_after_late_recertification_application
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 17.5, page 223
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-223
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          recertification_application_filed_later_than_month_after_certification_expires
          and not dss_form_3800_filed
          and not online_application_filed

  - name: late_form_3800_or_online_application_treated_as_initial_certification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 17.5, page 223
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-223
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          recertification_application_filed_later_than_month_after_certification_expires
          and (dss_form_3800_filed or online_application_filed)

  - name: late_initial_certification_benefits_prorated_from_application_date
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 17.5, page 223
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-223
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          recertification_application_filed_later_than_month_after_certification_expires
          and (dss_form_3800_filed or online_application_filed)
          and application_approved

  - name: expedited_service_not_required_for_timely_recertification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 17.6, page 223
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-223
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          recertification_application_filed_before_end_of_certification_period
