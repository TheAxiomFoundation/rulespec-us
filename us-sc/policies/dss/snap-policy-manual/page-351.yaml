format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-351
  summary: |-
    Earned Income means money earned by a household member through wages, salary, tips, or commissions as an employee. Elderly Member/Person means a SNAP household member age 60 or older. Eligible means ability to receive SNAP benefits due to meeting eligibility requirements.
rules:
  - name: elderly_member_minimum_age
    kind: parameter
    dtype: Integer
    source: SNAP Manual 351, Elderly Member/Person
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-351
              excerpt: "age 60 or older"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          60

  - name: earned_income
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: USD
    source: SNAP Manual 351, Earned Income
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-351
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          wages_received_as_employee + salary_received_as_employee + tips_received_as_employee + commissions_received_as_employee

  - name: elderly_member
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual 351, Elderly Member/Person
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-351
          - path: versions[0].formula
            kind: import
            import:
              target: us-sc:policies/dss/snap-policy-manual/page-351#elderly_member_minimum_age
              output: elderly_member_minimum_age
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          snap_household_member
          and person_age >= elderly_member_minimum_age
