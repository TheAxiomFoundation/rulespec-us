format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-256
  summary: |-
    The application registration clerk is responsible for identifying the Primary Information (PI) person at application registration, and PI designation at the time of SNAP application is mandatory. If the first name on DSS Form 3800 and the signature of the person signing the form are the same, that person is designated PI; if the name and signature do not match, the signer, if not the authorized representative, is designated PI. Same day registration of applications and reapplications is mandatory. The Economic Services worker is responsible for explaining EBT topics during the interview.
rules:
  - name: primary_information_person_designated_at_application_registration
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: SNAP Manual 22.3(1), Application registration clerk responsibilities
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-256
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (person_is_named_first_on_dss_form_3800
          and person_signs_dss_form_3800
          and first_name_on_dss_form_3800_matches_signature)
          or (person_signs_snap_application
          and name_and_signature_on_snap_application_do_not_match
          and not person_is_authorized_representative)
  - name: same_day_application_registration_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: SNAP Manual 22.3(1), Application registration clerk responsibilities
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-256
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_has_snap_application_or_reapplication_for_registration
  - name: economic_services_worker_ebt_explanation_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: SNAP Manual 22.3(2)(A), Economic Services worker responsibilities
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-256
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_has_snap_applicant_or_recipient_interview
