format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-321
  summary: '"If the household does not provide the verification by the 30th day from
    the date the form was submitted, the recertification will auto-deny for failure
    to provide information (FP)." "If the household provides the verification after
    the auto-denial date (30th day) and by the end of the month following the month
    the form was received, benefits will be prorated from the date the verification
    was received."'
  deferred_outputs:
  - output: us-sc:policies/dss/snap-policy-manual/page-321#benefits_prorated_from_verification_received_date
    reason: Generated rule used a local name that collides with a sibling RuleSpec
      export. This output is deferred until it can be encoded with a semantic branch-specific
      name without creating ambiguous sibling imports.
rules:
- name: verification_auto_denial_day_count
  kind: parameter
  dtype: Count
  source: SNAP Manual page 321, verification deadline
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-321
          excerpt: by the 30th day from the date the form was submitted
  versions:
  - effective_from: '0001-01-01'
    formula: '30'
- name: recertification_auto_denies_for_failure_to_provide_information
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: SNAP Manual page 321, auto-denial for missing verification
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-321
          excerpt: does not provide the verification by the 30th day
  versions:
  - effective_from: '0001-01-01'
    formula: not household_provided_verification_by_auto_denial_day
