format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-162
  summary: |-
    Shelter costs may include costs for a temporarily unoccupied home due to employment or training away from home, illness, or abandonment caused by natural disaster or casualty loss, if the household intends to return, occupants do not claim the costs, and the home is not leased or rented. Only actual utility costs may be chosen for an unoccupied home. Shelter costs may include unreimbursed repair charges for a home substantially damaged or destroyed by natural disaster, but exclude specified costs including deposits, penalties, weatherization, non-ownership regime fees, identifiable belongings insurance, wear-related appliance or well repairs, unrelated unoccupied housing, purchase incidentals, mobile-home site preparation, HUD subsidy recoupment, past-due mortgage portions, and excluded vendor payments.
  deferred_outputs:
    - output: us-sc:policies/dss/snap-policy-manual/page-162#housing_not_occupied_disallowed_unless_temporarily_unoccupied_under_section_12_4
      reason: The disallowed shelter-cost branch for housing not actually occupied depends on the cross-referenced Section 12.4 temporarily-unoccupied-home standard, and no copied context provides the exact upstream RuleSpec output for that Section 12.4 standard.
rules:
  - name: temporarily_unoccupied_home_shelter_cost_allowed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual p.162, Section 12.4 Shelter Deduction, allowed shelter expenses (E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-162
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          home_temporarily_not_occupied_by_household
          and (absence_due_to_employment_or_training_away_from_home or absence_due_to_illness or home_abandoned_because_of_natural_disaster_or_casualty_loss)
          and household_intends_to_return_to_home
          and current_occupants_do_not_claim_shelter_costs_for_snap
          and not home_leased_or_rented_during_absence
  - name: unoccupied_home_actual_utility_cost_allowed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual p.162, Section 12.4 Shelter Deduction, allowed shelter expenses (E) note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-162
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          temporarily_unoccupied_home_shelter_cost_allowed
          and unoccupied_home_utility_costs_are_actual
          and not unoccupied_home_utility_costs_are_mua_or_bua
  - name: unoccupied_home_shelter_cost_included
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: SNAP Manual p.162, Section 12.4 Shelter Deduction, allowed shelter expenses (E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-162
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if temporarily_unoccupied_home_shelter_cost_allowed: max(0, temporarily_unoccupied_home_shelter_cost) else: 0
  - name: unoccupied_home_actual_utility_cost_included
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: SNAP Manual p.162, Section 12.4 Shelter Deduction, allowed shelter expenses (E) note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-162
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if unoccupied_home_actual_utility_cost_allowed: max(0, unoccupied_home_actual_utility_cost) else: 0
  - name: natural_disaster_home_repair_charge_allowed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual p.162, Section 12.4 Shelter Deduction, allowed shelter expenses (F)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-162
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          home_substantially_damaged_or_destroyed_due_to_natural_disaster
          and repair_charge_is_for_that_home
          and not repair_charge_has_been_or_will_be_reimbursed
          and not repair_expense_paid_as_excluded_vendor_payment
  - name: natural_disaster_home_repair_charge_included
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: SNAP Manual p.162, Section 12.4 Shelter Deduction, allowed shelter expenses (F)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-162
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if natural_disaster_home_repair_charge_allowed: max(0, natural_disaster_home_repair_charge) else: 0
  - name: disallowed_shelter_cost
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual p.162, Section 12.4 Shelter Deduction, disallowed shelter costs (5)(A)-(L)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-162
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          mortgage_payment_under_fmha_moratorium
          or one_time_utility_deposit_fee
          or utility_late_payment_penalty_fee
          or weatherization_expense
          or regime_fee_does_not_lead_to_ownership
          or separate_identifiable_belongings_insurance_premium
          or appliance_or_water_well_repair_or_replacement_due_to_wear_or_mechanical_problem
          or home_purchase_down_payment_or_closing_cost
          or mobile_home_site_preparation_cost
          or hud_rental_subsidy_recoupment_portion
          or mortgage_payment_portion_for_past_due_amount
          or expense_paid_as_excluded_vendor_payment
