- name: household_with_allowable_costs_receives_standard_expense_deduction
  period: 2026-05
  input:
    us-sc:policies/dss/snap-policy-manual/page-140#input.household_incurs_allowable_self_employment_costs: true
    us-sc:policies/dss/snap-policy-manual/page-140#input.total_self_employment_income_before_expense_deduction: 1200
    us-sc:policies/dss/snap-policy-manual/page-140#input.self_employment_averaging_month_count: 6
  output:
    us-sc:policies/dss/snap-policy-manual/page-140#standard_self_employment_expense_deduction_rate: 0.4
