format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-94
  summary: |-
    The Agency will continue to process the application while awaiting verification of fleeing felon or probation or parole violator status. If required to act without being able to determine that status to meet normal or expedited processing time standards, the Agency will process the application without consideration of the individual's status. When a household member is verified as being a fleeing felon or probation or parole violator during the certification period, the Agency must take action on the change whether it increases or decreases the SNAP allotment.
rules:
  - name: application_processing_continues_while_status_verification_pending
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 94, Application processing
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-94
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          fleeing_felon_or_probation_parole_violator_status_verification_pending
  - name: application_processed_without_status_consideration_to_meet_time_standards
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 94, Application processing
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-94
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          agency_must_act_to_meet_normal_or_expedited_processing_time_standards
          and unable_to_determine_fleeing_felon_or_probation_parole_violator_status
  - name: certification_period_change_action_required_for_verified_status
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 94, Note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-94
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_member_verified_as_fleeing_felon_or_probation_parole_violator_during_certification_period
