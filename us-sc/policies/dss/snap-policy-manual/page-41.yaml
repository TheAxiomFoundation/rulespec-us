format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-41
  summary: |-
    For households that miss a scheduled interview, the Agency must notify the household and schedule a second interview if the household contacts the Agency within the 30-day processing period. DSS must grant a face-to-face interview on request, non-face-to-face interviews do not exempt verification or affect certification-period length, LEP households must receive bilingual personnel, and households refusing SNAP QC review cooperation are ineligible subject to the stated State/Federal QC reapplication timing rules.
rules:
  - name: processing_period_for_second_interview_contact_days
    kind: parameter
    dtype: Count
    source: SNAP Manual, page 41, missed interview rescheduling
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-41
              excerpt: "within the 30-day processing period"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: state_qc_reapplication_refusal_bar_days
    kind: parameter
    dtype: Count
    source: SNAP Manual, page 41, State QC refusal reapplication timing
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-41
              excerpt: "after 125 days from the end of the annual review period"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          125

  - name: federal_qc_reapplication_refusal_bar_months
    kind: parameter
    dtype: Count
    source: SNAP Manual, page 41, Federal QC refusal reapplication timing
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-41
              excerpt: "after nine months from the end of the annual review period"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          9

  - name: missed_interview_notice_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual, page 41, missed interview notice
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-41
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_failed_to_keep_scheduled_interview_appointment

  - name: second_interview_must_be_scheduled
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual, page 41, second interview scheduling
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-41
              excerpt: "If the household contacts the Agency within the 30-day processing period"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_failed_to_keep_scheduled_interview_appointment
          and household_contacted_agency_within_processing_period_for_second_interview

  - name: face_to_face_interview_must_be_granted
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual, page 41, face-to-face interview request
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-41
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_requests_face_to_face_interview

  - name: non_face_to_face_interview_does_not_exempt_verification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual, page 41, verification after non-face-to-face interview
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-41
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_interviewed_by_means_other_than_face_to_face

  - name: non_face_to_face_interview_may_not_affect_certification_period_length
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual, page 41, certification period length
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-41
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_interviewed_by_means_other_than_face_to_face

  - name: bilingual_personnel_required_for_lep_interview
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual, page 41, LEP household interview
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-41
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_is_limited_english_proficient
          and household_interview_is_conducted

  - name: ineligible_for_refusal_to_cooperate_with_snap_qc_review
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual, page 41, household cooperation with SNAP QC review
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-41
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_refuses_to_cooperate_in_snap_qc_review

  - name: eligible_after_qc_refusal_termination_requires_cooperation
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual, page 41, reapplication after QC refusal termination
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-41
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_was_terminated_for_refusal_to_cooperate_with_qc_reviewer
          and household_reapplies
          and household_cooperates_with_qc_reviewer

  - name: state_qc_completed_review_refusal_no_longer_bars_eligibility
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual, page 41, State QC completed review period
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-41
              excerpt: "State QC reviewer reapplies after 125 days"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_was_terminated_for_refusal_to_cooperate_with_state_qc_reviewer
          and household_reapplies_after_state_qc_refusal_bar_period
          and household_provides_refusal_to_cooperate_qc_verification_prior_to_certification

  - name: federal_qc_completed_review_refusal_no_longer_bars_eligibility
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual, page 41, Federal QC completed review period
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-41
              excerpt: "Federal QC reviewer reapplies after nine months"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_was_terminated_for_refusal_to_cooperate_with_federal_qc_reviewer
          and household_reapplies_after_federal_qc_refusal_bar_period
          and household_provides_refusal_to_cooperate_qc_verification_prior_to_certification

  - name: qc_refusal_penalty_attaches_to_household_of_refusing_persons
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual, page 41, QC refusal penalty attachment
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-41
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          one_or_more_members_no_longer_reside_with_household_terminated_for_qc_refusal
          and household_is_household_of_persons_who_refused_to_cooperate
