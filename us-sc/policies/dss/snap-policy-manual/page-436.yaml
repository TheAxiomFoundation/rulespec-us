  summary: |-
    436 11.5 (BBB) Unearned Income (Victim’s compensation payments): This section has been updated to provide a description for Victim’s compensation payments and to add verbiage for clarity.
    15.7 Unclear Information: This section has been updated to add verbiage that the Agency has an established system to monitor and prevent individuals who are being held in prison for more than 30 days from being included in a SNAP household.
    17.6 Expedited Service: This section has been added to clarify that the Agency is not required to apply the expedited service provisions at recertification if the household applies for recertification before the end of its current certification period.
