format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-244
  summary: |-
    Failure to return a completed DSS Form 3808 or DSS Form 3809 will result in a system generated case closure. ESAP households are subject to simplified reporting requirements as defined in Section 15.3; interim changes will be handled according to Section 15.4. Where ESAP household composition changes so all members are no longer elderly or a member now has earned income, the SNAP case must not be closed during the certification period to remove it from ESAP, but must be reevaluated under simplified reporting rules.
  deferred_outputs:
    - output: us-sc:policies/dss/snap-policy-manual/page-244#esap_case_reevaluation_under_simplified_reporting_rules
      reason: Section 19.14 requires reevaluation under simplified reporting rules and cites Sections 15.3, 15.4, and 15.5 for the operative simplified-reporting and action-on-change mechanics, but those cited sources are not provided in this context.
rules:
  - name: case_closure_for_failure_to_return_completed_review_form
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 244, pre-section 19.14 paragraph
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-244
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          failed_to_return_completed_dss_form_3808
          or failed_to_return_completed_dss_form_3809
  - name: esap_case_closure_to_remove_from_esap_prohibited
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 244, section 19.14
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-244
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_is_esap_household
          and certification_period_is_current
          and (household_composition_changed_so_all_members_no_longer_elderly or household_member_now_has_earned_income)
