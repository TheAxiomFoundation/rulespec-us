format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-185
  summary: |-
    A migrant or seasonal farmworker household member who changes jobs but continues to work for the same employer will be considered as still receiving income from the same source. A migrant farmworker's source of income will be considered to be the grower for whom the migrant is working at a particular point in time, and not the crew chief. At recertification, income from a new source will be disregarded in the first month of the new certification period if income of more than $25 will not be received from this new source by the 10th calendar day after the date of the household's normal issuance cycle. Households should be assigned certification periods of 6 months unless unstable or containing an ABAWD, generally no less than 3 months for unstable or ABAWD households, up to 24 months with contact every 12 months for households in which all adult members are elderly or disabled with no earned income, and 1- or 2-month periods when likely to become ineligible. The Agency may not end a household's certification period earlier than its assigned termination date, unless the Agency receives information that the household has become ineligible, the household has not complied with requirements of Section 15.1 Household Responsibility to Report or the Agency must shorten the household's certification period to comply with the
  deferred_outputs:
    - output: us-sc:policies/dss/snap-policy-manual/page-185#certification_period_may_end_before_assigned_termination_date
      reason: The early-ending rule depends on missing Section 15.1 reporting requirements and the source sentence is truncated after "comply with the", so the complete exceptions cannot be encoded faithfully from this source unit alone.
rules:
  - name: new_source_income_disregard_threshold
    kind: parameter
    dtype: Money
    unit: USD
    source: SNAP Manual page 185, migrant income-source procedures
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-185
              excerpt: "income of more than $25"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          25

  - name: new_source_income_receipt_deadline_calendar_day_after_normal_issuance
    kind: parameter
    dtype: Count
    source: SNAP Manual page 185, migrant income-source procedures
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-185
              excerpt: "10th calendar day after the date of the household's normal issuance cycle"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10

  - name: standard_certification_period_months
    kind: parameter
    dtype: Count
    source: SNAP Manual §13.8(1)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-185
              excerpt: "6 months, unless"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          6

  - name: generally_minimum_unstable_or_abawd_certification_period_months
    kind: parameter
    dtype: Count
    source: SNAP Manual §13.8(1)(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-185
              excerpt: "generally no less than 3 months"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          3

  - name: elderly_disabled_no_earned_income_max_certification_period_months
    kind: parameter
    dtype: Count
    source: SNAP Manual §13.8(1)(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-185
              excerpt: "certify for up to 24 months"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          24

  - name: elderly_disabled_no_earned_income_contact_interval_months
    kind: parameter
    dtype: Count
    source: SNAP Manual §13.8(1)(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-185
              excerpt: "at least one contact with each household every 12 months"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          12

  - name: short_certification_period_min_months
    kind: parameter
    dtype: Count
    source: SNAP Manual §13.8(1)(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-185
              excerpt: "1- or 2-month certification periods"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1

  - name: short_certification_period_max_months
    kind: parameter
    dtype: Count
    source: SNAP Manual §13.8(1)(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-185
              excerpt: "1- or 2-month certification periods"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          2

  - name: farmworker_member_still_receiving_income_from_same_source
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 185, migrant income-source procedures
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-185
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          migrant_or_seasonal_farmworker_household_member
          and changed_jobs
          and continues_to_work_for_same_employer

  - name: migrant_income_source_is_current_grower
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 185, migrant income-source procedures
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-185
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          migrant_farmworker
          and working_for_grower_at_particular_point_in_time

  - name: migrant_moved_from_terminated_income_source_to_new_source
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 185, migrant income-source procedures
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-185
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          migrant_farmworker
          and travels_with_same_crew_chief
          and moved_from_one_grower_to_another

  - name: new_source_income_disregarded_in_first_month_at_recertification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 185, migrant income-source procedures
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-185
              excerpt: "At recertification, income from a new source will be disregarded in the first month ... if income of more than $25 will not be received ... by the 10th calendar day"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          recertification_first_month_of_new_certification_period
          and income_from_new_source
          and new_source_income_expected_by_receipt_deadline <= new_source_income_disregard_threshold

  - name: new_source_income_receipt_deadline_day_after_normal_issuance_cycle
    kind: derived
    entity: Household
    dtype: Count
    period: Month
    source: SNAP Manual page 185, migrant income-source procedures
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-185
              excerpt: "10th calendar day after the date of the household's normal issuance cycle"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if recertification_first_month_of_new_certification_period: new_source_income_receipt_deadline_calendar_day_after_normal_issuance else: 0

  - name: standard_certification_period_months_for_household
    kind: derived
    entity: Household
    dtype: Count
    period: Month
    source: SNAP Manual §13.8(1)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-185
              excerpt: "6 months, unless the household's circumstances are unstable or the household contains an ABAWD"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if not household_circumstances_unstable and not household_contains_abawd_member: standard_certification_period_months else: 0

  - name: general_minimum_certification_period_months_for_unstable_or_abawd
    kind: derived
    entity: Household
    dtype: Count
    period: Month
    source: SNAP Manual §13.8(1)(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-185
              excerpt: "households with an ABAWD member should be assigned certification periods consistent with their circumstances, but generally no less than 3 months"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if household_circumstances_unstable or household_contains_abawd_member: generally_minimum_unstable_or_abawd_certification_period_months else: 0

  - name: maximum_certification_period_months_for_all_adult_elderly_or_disabled_no_earned_income
    kind: derived
    entity: Household
    dtype: Count
    period: Month
    source: SNAP Manual §13.8(1)(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-185
              excerpt: "up to 24 months households in which all adult members are elderly or disabled with no earned income"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if all_adult_members_elderly_or_disabled and not household_has_earned_income: elderly_disabled_no_earned_income_max_certification_period_months else: 0

  - name: required_contact_interval_months_for_all_adult_elderly_or_disabled_no_earned_income
    kind: derived
    entity: Household
    dtype: Count
    period: Month
    source: SNAP Manual §13.8(1)(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-185
              excerpt: "at least one contact with each household every 12 months"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if all_adult_members_elderly_or_disabled and not household_has_earned_income: elderly_disabled_no_earned_income_contact_interval_months else: 0

  - name: short_certification_period_min_months_if_likely_ineligible
    kind: derived
    entity: Household
    dtype: Count
    period: Month
    source: SNAP Manual §13.8(1)(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-185
              excerpt: "1- or 2-month certification periods when it appears likely that the household will become ineligible"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if household_likely_to_become_ineligible_for_snap_in_near_future: short_certification_period_min_months else: 0

  - name: short_certification_period_max_months_if_likely_ineligible
    kind: derived
    entity: Household
    dtype: Count
    period: Month
    source: SNAP Manual §13.8(1)(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-185
              excerpt: "1- or 2-month certification periods when it appears likely that the household will become ineligible"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if household_likely_to_become_ineligible_for_snap_in_near_future: short_certification_period_max_months else: 0
