format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-452
  summary: |-
    SNAP Manual page 452 lists resource exclusions for educational savings account money in qualified tuition programs, energy assistance payments or allowances excluded as income, resources excluded by Federal statute, prepaid bona fide funeral agreements, disaster-home restoration payments, home and surrounding property, household goods and personal effects, income-producing property, resources prorated as income, and Indian lands.
rules:
  - name: snap_resource_excluded_on_page_452
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: SNAP Manual 452(E)-(N)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-452
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-452
              excerpt: Count money deposited into non-tax exempt accounts.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (asset_is_money_in_qualified_tuition_program_under_irc_529_or_530
            and not asset_is_money_deposited_into_non_tax_exempt_account)
          or asset_is_energy_assistance_payment_or_allowance_excluded_as_income
          or asset_is_resource_excluded_for_snap_by_express_federal_statute
          or asset_is_value_of_one_bona_fide_prepaid_funeral_agreement_for_household_member
          or (asset_is_governmental_payment_designated_for_restoration_of_home_damaged_in_disaster
            and household_is_subject_to_legal_sanction_if_funds_not_used_as_intended)
          or (asset_is_home_and_surrounding_property_not_separated_by_intervening_property_owned_by_others
            and (home_is_currently_occupied
              or (home_is_temporarily_unoccupied_for_employment_training_illness_casualty_or_natural_disaster
                and household_intends_to_return)))
          or asset_is_lot_or_partially_completed_permanent_home_household_intends_to_build_or_is_building
          or asset_is_household_goods_or_personal_effects
          or asset_is_property_annually_producing_income_consistent_with_fair_market_value
          or asset_is_resource_prorated_as_income
          or asset_is_indian_land_held_jointly_with_tribe_or_sale_requires_bia_approval
  - name: snap_resource_counted_on_page_452
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: SNAP Manual 452(E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-452
              excerpt: Count money deposited into non-tax exempt accounts.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_money_deposited_into_non_tax_exempt_account
