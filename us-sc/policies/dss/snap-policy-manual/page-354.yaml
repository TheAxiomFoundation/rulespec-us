  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-354
  summary: Fair Hearing Process allows a client to contest an adverse Agency action
    before an impartial hearing officer or committee. Federal Fiscal Year runs from
    October 1 through September 30. The page also defines Federal Poverty Level, Filing
    an Application, Fleeing Felon, Food and Nutrition Service, Foster Care Individual,
    Fraud, General Assistance, Gross Income, and Group Living Arrangement; a group
    living arrangement serves no more than sixteen residents, and a resident must
    be blind or disabled to be eligible for SNAP benefits.
