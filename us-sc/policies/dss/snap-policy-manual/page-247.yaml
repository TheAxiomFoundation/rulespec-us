format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-247
  summary: An individual, not a household, who intentionally violates SNAP regulations,
    must be disqualified from participation. When determined to have committed an
    IPV, that individual will be disqualified the month following the date of decision,
    whether participating or not. A disqualified individual cannot act as authorized
    representative or primary informant during the disqualification period, except
    that the person may serve as primary informant if there is no other adult member
    and no authorized representative can be named.
