format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-103
  summary: |-
    Employment is not suitable when piece-rate average hourly yield is below the applicable hourly wage, employment requires joining/resigning/refraining from a legitimate labor organization, a strike or lockout site is not covered by the stated injunction exceptions, risk to health and safety is unreasonable, the member is unfit, first-30-days employment is outside the member's major field, commuting distance/time is unreasonable, or work interferes with religious observances. Good cause for SNAP work-requirement noncompliance includes circumstances beyond the member's control, including illness, household emergency, unavailable transportation, or inadequate child care for children age six but under age 12.
rules:
  - name: first_registration_period_days
    kind: parameter
    dtype: Count
    source: SNAP Manual 8.9, suitable employment, item (G)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-103
              excerpt: "within the first 30 days of registration"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: unsuitable_commuting_time_hours_per_day
    kind: parameter
    dtype: Count
    source: SNAP Manual 8.9, suitable employment, item (H)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-103
              excerpt: "daily commuting time exceeds 2 hours per day"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          2

  - name: inadequate_child_care_lower_age
    kind: parameter
    dtype: Count
    source: SNAP Manual 8.10, good cause
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-103
              excerpt: "children who have reached age six but are under age 12"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          6

  - name: inadequate_child_care_upper_age
    kind: parameter
    dtype: Count
    source: SNAP Manual 8.10, good cause
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-103
              excerpt: "children who have reached age six but are under age 12"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          12

  - name: strike_or_lockout_site_exception_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual 8.9, suitable employment, item (D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-103
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          strike_enjoined_under_labor_management_relations_act_section_208
          or injunction_issued_under_railway_labor_act_section_10

  - name: employment_offer_unsuitable_for_snap_work_requirement
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual 8.9, suitable employment, items (B)-(I)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-103
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          piece_rate_average_hourly_yield_less_than_applicable_hourly_wage_under_a
          or employment_requires_joining_resigning_or_refraining_from_legitimate_labor_organization
          or (work_site_subject_to_strike_or_lockout_at_time_of_offer and not strike_or_lockout_site_exception_applies)
          or risk_to_health_and_safety_is_unreasonable
          or member_physically_or_mentally_unfit_for_employment_with_medical_or_reliable_documentation
          or (employment_offered_within_first_registration_period and employment_not_in_members_major_field_of_experience)
          or distance_to_employment_unreasonable_considering_wage_time_and_commuting_cost
          or daily_commuting_time_exceeds_unsuitable_limit_excluding_child_care_transport
          or (distance_to_employment_prohibits_walking and not public_or_private_transportation_available_to_jobsite)
          or working_hours_or_nature_interferes_with_religious_observances_convictions_or_beliefs

  - name: employment_offer_suitable_for_snap_work_requirement
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual 8.9, suitable employment, items (B)-(I)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-103
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not employment_offer_unsuitable_for_snap_work_requirement

  - name: good_cause_for_failure_to_comply_with_snap_work_requirements
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual 8.10, good cause for failure to comply with SNAP work requirements
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-103
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          circumstances_beyond_members_control
          or member_illness
          or illness_of_another_household_member_requires_members_presence
          or household_emergency
          or transportation_unavailable
          or lack_of_adequate_child_care_for_child_reached_age_six_but_under_age_twelve
