format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-349
  summary: |-
    "Date of Application" is the filing date for an application with the applicant's name, address, and required signature. "Delinquent Claim" describes unpaid claims after the initial demand due date or missed scheduled repayment. "Difficulty of Care Board Rate (DCBR) payment" is a supplemental foster-parent payment for additional projected care and supervision. "Disabled Member/Person" is a SNAP household member meeting one of the listed SSI, supplemental-benefit, disability-retirement, veteran, surviving-spouse, or surviving-child disability categories.
rules:
  - name: difficulty_of_care_board_rate_payment
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: SNAP Manual page 349, "Difficulty of Care Board Rate (DCBR) payment"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-349
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          payment_received_by_foster_parent
          and payment_supplements_eligible_foster_child_board_rate
          and payment_due_to_additional_care_and_supervision_projected_necessary_for_child
          and additional_care_and_supervision_due_to_child_physical_mental_or_emotional_difficulties

  - name: disabled_member_or_person
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 349, "Disabled Member/Person"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-349
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_snap_household_member
          and (
            receives_ssi_benefits_under_title_xvi_of_social_security_act
            or receives_disability_or_blindness_payments_under_titles_i_ii_x_xiv_or_xvi_of_social_security_act
            or receives_federally_or_state_administered_supplemental_benefits_based_on_title_xvi_disability_or_blindness_criteria
            or receives_federally_or_state_administered_supplemental_benefits
            or receives_governmental_disability_retirement_benefits_for_permanent_disability
            or veteran_has_service_connected_or_non_service_connected_disability_rated_total_or_paid_as_total_by_va
            or veteran_considered_by_va_to_need_regular_aid_and_attendance_or_be_permanently_housebound
            or surviving_spouse_of_veteran_considered_by_va_to_need_regular_aid_and_attendance_or_be_permanently_housebound
            or surviving_child_of_veteran_considered_by_va_to_be_permanently_incapable_of_self_support
          )
