format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-329
  summary: |-
    If the 30th day falls on a weekend or holiday, the household will have until the next business day to provide the information. If the 30th day falls on a weekend or holiday, the worker has until the last business day prior to the 30th day to process the case and still be timely. The household must be given at least 10 days to submit verification.
rules:
  - name: minimum_verification_response_days
    kind: parameter
    dtype: Count
    source: SNAP Manual p. 329, recertification verification examples
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-329
              excerpt: "at least 10 days to submit verification"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10

  - name: standard_processing_day_count
    kind: parameter
    dtype: Count
    source: SNAP Manual p. 329, weekend-or-holiday 30th-day rule
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-329
              excerpt: "If the 30th day falls on a weekend or holiday"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: verification_submission_period_meets_minimum
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 329, household verification response period
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-329
              excerpt: "The household must be given at least 10 days to submit verification."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          verification_response_period_days >= minimum_verification_response_days

  - name: household_information_provided_with_weekend_holiday_extension
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 329, household next-business-day information deadline
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-329
              excerpt: "the household will have until the next business day to provide the information"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          deadline_day_number == standard_processing_day_count
          and deadline_day_falls_on_weekend_or_holiday
          and information_provided_by_next_business_day_after_deadline

  - name: worker_processing_timely_before_weekend_holiday_deadline
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 329, worker last-business-day processing rule
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-329
              excerpt: "the worker has until the last business day prior to the 30th day to process the case"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          deadline_day_number == standard_processing_day_count
          and deadline_day_falls_on_weekend_or_holiday
          and worker_processed_case_by_last_business_day_prior_to_deadline
