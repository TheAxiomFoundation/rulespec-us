format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-326
  summary: |-
    The household is given 10 days to provide requested information, but has 30 days from the date the "A" Form was filed to provide requested verification and still be entitled to benefits from the date the "A" Form was received. If the 30th day falls on a weekend or holiday, the household has until the next business day. If postponed verification is not received, close the case.
rules:
  - name: requested_verification_response_period_days
    kind: parameter
    dtype: Count
    period: Day
    source: SNAP Manual page 326, verification request period
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-326
              excerpt: "The household is given 10 days to provide requested information."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10

  - name: filing_date_benefit_entitlement_verification_period_days
    kind: parameter
    dtype: Count
    period: Day
    source: SNAP Manual page 326, 30-day verification period from A Form filing
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-326
              excerpt: "the household has 30 days from the date the \"A\" Form was filed"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: postponed_verification_alert_period_days
    kind: parameter
    dtype: Count
    period: Day
    source: SNAP Manual page 326, postponed verification alert
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-326
              excerpt: "set a postponed verification alert in CHIP to be generated 30 days from the date of recertification"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: written_verification_request_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 326, post-interview additional verification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-326
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_completed_interview_after_expedited_processing_standard
          and additional_verification_needed

  - name: timely_verification_period_preserves_filing_date_benefits
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 326, timely verification preserves entitlement from A Form receipt date
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-326
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          requested_verification_provided_within_filing_date_benefit_entitlement_period
          or (thirtieth_day_after_a_form_filing_falls_on_weekend_or_holiday and requested_verification_provided_by_next_business_day)

  - name: expedited_household_requires_postponed_verification_alert
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 326, expedited service postponed verification alert
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-326
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_approved_for_expedited_service

  - name: case_closure_required_for_missing_postponed_verification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 326, missing postponed verification closure
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-326
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          postponed_verification_not_received
