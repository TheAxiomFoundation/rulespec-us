format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-427
  summary: |-
    8.18 Tracking the 36 Month Period: This section has been updated to reflect the new 36-month time period for ABAWDs effective April 1, 2022.
    13.6 (3) Calculating Net income and Benefit Levels (Benefits): This section has been updated to list the minimum benefit allotment as $20.
rules:
  - name: abawd_tracking_period_months
    kind: parameter
    dtype: Count
    source: SNAP Manual, page 427, Volume 53 April 2022, section 8.18 update
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-427
              excerpt: "new 36-month time period for ABAWDs effective April 1, 2022"
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-427
              excerpt: "effective April 1, 2022"
    versions:
      - effective_from: '2022-04-01'
        formula: |-
          36
  - name: minimum_benefit_allotment
    kind: parameter
    dtype: Money
    unit: USD
    period: Month
    source: SNAP Manual, page 427, Volume 53 April 2022, section 13.6(3) update
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-427
              excerpt: "minimum benefit allotment as $20"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          20
