format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-325
  summary: |-
    Annual recertification form is due June 15th. The household submits form July 5th. Case is re-opened and registered with a date of July 5th. The household loses its right to uninterrupted benefits. Form will be screened for expedited service. A CHIP system generated Interview Notice (X096) is sent. If the household fails to call for interview by July 15th, or by the 11th if entitled to expedited service, a CHIP system generated (X035), Notice of Missed Interview (NOMI), is sent.
rules:
  - name: late_recertification_loses_uninterrupted_benefits
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 325, late annual recertification submitted in following month
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-325
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          annual_recertification_form_submitted_in_following_month_after_due_date
          and case_reopened_and_registered_with_submission_date

