  summary: |-
    The Agency will conduct a review: (A) Once every year for large local SNAP offices; (B) Once every two years for medium local SNAP office areas, and (C) Once every three years for small local SNAP offices. FNS may require the Agency to conduct additional on-site reviews when a serious problem is detected in a local SNAP office which could result in a substantial dollar or service loss.
