format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-407
  summary: |-
    3.8 Household Cooperation with SNAP Quality Control (QC) Reviewer: This section has been updated to reflect a change from 95 to 125 days from the end of the annual review period that a household may reapply for SNAP benefits after being terminated for refusal to cooperate with a State QC reviewer and not be determined ineligible.
rules:
  - name: qc_refusal_reapplication_day_limit
    kind: parameter
    dtype: Count
    source: SNAP Manual p. 407, section 3.8 update note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-407
              excerpt: "change from 95 to 125 days from the end of the annual review period"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          125

  - name: qc_refusal_reapplication_without_ineligibility
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: SNAP Manual p. 407, section 3.8 update note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-407
              excerpt: "a household may reapply for SNAP benefits after being terminated for refusal to cooperate with a State QC reviewer and not be determined ineligible"
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-407
              excerpt: "125 days from the end of the annual review period"
          - path: versions[0].formula
            kind: import
            import:
              target: us-sc:policies/dss/snap-policy-manual/page-407#qc_refusal_reapplication_day_limit
              output: qc_refusal_reapplication_day_limit
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_reapplies_for_snap_benefits_after_termination_for_refusal_to_cooperate_with_state_qc_reviewer
          and days_from_end_of_annual_review_period_to_reapplication <= qc_refusal_reapplication_day_limit
