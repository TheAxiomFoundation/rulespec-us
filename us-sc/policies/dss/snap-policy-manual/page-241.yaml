format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-241
  summary: |-
    If a SCCAP household reports a change in circumstances which would cause exclusion from SCCAP, the local county DSS office must request verification and allow the household 10 days to provide it. Upon receipt, DSS determines regular SNAP eligibility; households not eligible for listed deductions are notified and left open as SCCAP "Y" cases, while individuals eligible for regular SNAP and excluded from SCCAP must sign a new application, have it registered, complete an interview, receive authorized benefits for the appropriate month, and be notified of the new benefit amount. Possible recipient claims in SCCAP cases are referred on DSS Form 1680 to the appropriate Benefit Integrity Claims Supervisor and processed under standard SNAP recipient claims policy.
rules:
  - name: sccap_exclusion_change_verification_days
    kind: parameter
    dtype: Count
    source: SNAP Manual p. 241, section (2)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-241
              excerpt: "Allow the household 10 days"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10

  - name: sccap_exclusion_change_requires_verification_request
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 241, section (2)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-241
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_reports_change_causing_sccap_exclusion

  - name: sccap_exclusion_change_verification_response_days_allowed
    kind: derived
    entity: Household
    dtype: Count
    period: Month
    source: SNAP Manual p. 241, section (2)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-241
              excerpt: "Allow the household 10 days"
          - path: versions[0].formula
            kind: import
            import:
              target: us-sc:policies/dss/snap-policy-manual/page-241#sccap_exclusion_change_verification_days
              output: sccap_exclusion_change_verification_days
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if household_reports_change_causing_sccap_exclusion: sccap_exclusion_change_verification_days else: 0

  - name: regular_snap_eligibility_determination_required_after_requested_information_received
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 241, section (2)(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-241
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_reports_change_causing_sccap_exclusion
          and requested_information_received

  - name: sccap_y_case_remains_open_after_deduction_ineligibility
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 241, section (2)(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-241
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          requested_information_received
          and household_not_eligible_for_excess_shelter_utility_child_support_or_medical_expense_deductions

  - name: regular_snap_transition_required_after_sccap_exclusion
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 241, section (2)(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-241
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_determined_eligible_for_regular_snap
          and individual_excluded_from_sccap

  - name: sccap_possible_recipient_claim_referral_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 241, section 19.9
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-241
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          possible_recipient_claim_detected_in_sccap_case
