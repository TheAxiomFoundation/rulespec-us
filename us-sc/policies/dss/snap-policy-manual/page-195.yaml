format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-195
  summary: |-
    A Group Living Arrangement is a public or private nonprofit residential setting that serves no more than 16 residents and is certified by the appropriate State agency. Prior to certifying any residents, the Agency must verify that the GLA is either authorized by FNS or certified by the appropriate State agency including the agency's determination that the center is nonprofit. To be eligible for SNAP, residents of GLAs must be blind or disabled.
rules:
  - name: group_living_arrangement_resident_limit
    kind: parameter
    dtype: Count
    period: Month
    source: SNAP Manual 14.4, Group Living Arrangement definition
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-195
              excerpt: "serves no more than 16 residents"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          16

  - name: person_resides_in_group_living_arrangement
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual 14.4, Group Living Arrangement definition
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-195
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_resides_in_public_or_private_nonprofit_residential_setting
          and residential_setting_resident_count <= group_living_arrangement_resident_limit
          and residential_setting_certified_by_appropriate_state_agency

  - name: gla_certification_verification_satisfied
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual 14.4, Agency verification before certifying residents
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-195
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          gla_authorized_by_fns
          or (gla_certified_by_appropriate_state_agency and state_agency_determined_gla_is_nonprofit)

  - name: gla_resident_snap_eligibility_condition_satisfied
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual 14.4, GLA resident SNAP eligibility condition
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-195
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_resides_in_group_living_arrangement
          and (person_is_blind or person_is_disabled)
