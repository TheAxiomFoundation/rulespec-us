format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-318
  summary: |-
    CHIP automatically denies the case on June 30th because the household failed to complete the interview (FC). NOTE: If the household does not complete the interview by July 31st, the household must reapply in order for an eligibility determination to be made. The household has until the last day of the month or 10 days from the date information was requested ... to provide verification and receive a full allotment.
rules:
  - name: recertification_auto_denied_for_failure_to_complete_interview
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 318, timely recertification interview not completed process
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-318
              excerpt: "CHIP automatically denies the case on June 30th because the household failed to complete the interview (FC)."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          annual_recertification_a_form_registered_timely
          and interview_not_completed
          and household_did_not_call_by_end_of_recertification_month
  - name: household_must_reapply_after_interview_not_completed_by_final_reapplication_deadline
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 318, note following failure-to-complete-interview denial
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-318
              excerpt: "If the household does not complete the interview by July 31st, the household must reapply"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          annual_recertification_a_form_registered_timely
          and household_did_not_complete_interview_by_final_reapplication_deadline
  - name: verification_deadline_extends_to_ten_days_from_request
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 318, additional verification needed after timely interview
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-318
              excerpt: "10 days from the date information was requested"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          interview_completed_timely
          and additional_verification_needed_as_result_of_interview
          and less_than_ten_days_between_information_request_and_last_day_of_month
  - name: household_can_receive_full_allotment_when_verification_provided_by_applicable_deadline
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 318, verification deadline for full allotment
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-318
              excerpt: "has until the last day of the month or 10 days from the date information was requested ... to provide verification and receive a full allotment"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          interview_completed_timely
          and additional_verification_needed_as_result_of_interview
          and household_provided_verification_by_applicable_verification_deadline
  - name: recertification_auto_denied_for_failure_to_provide_verification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 318, failure to submit verification after pending notice
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-318
              excerpt: "If the household does not submit verification, the recertification will auto-deny for “failure to provide verification” (FP)"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          interview_completed_timely
          and additional_verification_needed_as_result_of_interview
          and household_did_not_submit_verification
