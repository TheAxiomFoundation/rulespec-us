format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-53
  summary: |-
    Verification is the use of documentation or a contact with a third party to confirm the accuracy of statements or information. The Agency must give households at least 10 days to provide required verification. The Agency will verify identity and residency prior to certification for households initially applying, with specified identity subjects when an authorized representative applies and an unusual-case residency exception where verification cannot reasonably be accomplished.
rules:
  - name: required_verification_response_period_days
    kind: parameter
    dtype: Integer
    source: SNAP Manual Chapter 5 §5.1, verification prior to certification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-53
              excerpt: "at least 10 days"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10

  - name: household_given_at_least_required_verification_response_period
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: SNAP Manual Chapter 5 §5.1, verification prior to certification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-53
          - path: versions[0].formula
            kind: import
            import:
              target: us-sc:policies/dss/snap-policy-manual/page-53#required_verification_response_period_days
              output: required_verification_response_period_days
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          days_given_to_provide_required_verification >= required_verification_response_period_days

  - name: applicant_identity_verification_required_prior_to_certification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: SNAP Manual Chapter 5 §5.1(1), Identity
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-53
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_initially_applying_for_snap

  - name: authorized_representative_identity_verification_required_prior_to_certification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: SNAP Manual Chapter 5 §5.1(1), Identity
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-53
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_initially_applying_for_snap
          and authorized_representative_applies_on_behalf_of_household

  - name: primary_informant_identity_verification_required_prior_to_certification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: SNAP Manual Chapter 5 §5.1(1), Identity
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-53
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_initially_applying_for_snap
          and authorized_representative_applies_on_behalf_of_household

  - name: identity_document_must_be_accepted
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: SNAP Manual Chapter 5 §5.1(1), Identity
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-53
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          document_reasonably_establishes_applicant_identity

  - name: residency_verification_required_prior_to_certification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: SNAP Manual Chapter 5 §5.1(2), Residency
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-53
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-53
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_initially_applying_for_snap
          and not unusual_case_where_residency_verification_cannot_reasonably_be_accomplished
