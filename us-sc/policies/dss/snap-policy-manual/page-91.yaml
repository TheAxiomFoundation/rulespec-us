format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-91
  summary: |-
    Student Exemptions: To be eligible for the program, a student as defined in Section 7.4 Students, (1) Applicability must meet at least one student eligibility exemption criterion, including age 17 or younger or age 50 or older; physical or mental unfitness for work; TANF receipt; JOBS participation; paid work averaging 20 hours per week or qualifying self-employment earnings; qualifying work study; on-the-job training; care of a dependent household member under age 6; care of a dependent household member age 6 but under 12 when adequate child care is unavailable for class and work requirements; and a single-parent full-time higher-education branch whose explanatory sentence continues beyond this source unit.
  deferred_outputs:
    - output: us-sc:policies/dss/snap-policy-manual/page-91#student_eligibility_exemption_applies
      reason: The complete combined student exemption surface depends on the student definition in Section 7.4 and on the single-parent branch whose limiting sentence is truncated at the end of this source unit.
rules:
  - name: student_age_exemption_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 91, Student Exemptions (A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-91
              excerpt: "Be age 17 or younger or age 50 or older"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          student_is_age_17_or_younger
          or student_is_age_50_or_older
  - name: student_unfitness_exemption_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 91, Student Exemptions (B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-91
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          student_is_physically_or_mentally_unfit_for_work
  - name: student_tanf_exemption_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 91, Student Exemptions (C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-91
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          student_receives_tanf_under_title_iv
  - name: student_jobs_program_exemption_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 91, Student Exemptions (D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-91
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          student_enrolled_due_to_jobs_program_or_successor
  - name: student_paid_work_exemption_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Week
    source: SNAP Manual p. 91, Student Exemptions (E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-91
              excerpt: "average of 20 hours per week"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          student_is_paid_employee_averaging_20_hours_per_week
          or student_is_self_employed_averaging_20_hours_per_week_with_earnings_at_least_federal_minimum_wage_times_20
  - name: student_work_study_exemption_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 91, Student Exemptions (F)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-91
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          student_participates_in_state_or_federally_financed_work_study
          and student_was_approved_for_work_study_at_snap_application
          and work_study_was_approved_for_school_term
          and student_anticipates_actually_working_during_work_study_time
          and work_study_exemption_period_has_begun
          and work_study_exemption_period_has_not_ended
          and not student_refused_work_study_assignment
          and not full_month_or_longer_break_between_terms_without_work_study
  - name: student_on_the_job_training_exemption_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 91, Student Exemptions (G)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-91
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          student_is_being_trained_by_employer_in_on_the_job_training_program
  - name: student_care_for_dependent_under_6_exemption_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 91, Student Exemptions (H)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-91
              excerpt: "under the age of 6"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          student_responsible_for_care_of_dependent_household_member_under_age_6
  - name: student_care_for_dependent_age_6_to_under_12_exemption_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 91, Student Exemptions (I)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-91
              excerpt: "reached the age of 6 but is under age 12"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          student_responsible_for_care_of_dependent_household_member_age_6_to_under_12
          and agency_determined_adequate_child_care_not_available_for_class_and_student_work_requirements
