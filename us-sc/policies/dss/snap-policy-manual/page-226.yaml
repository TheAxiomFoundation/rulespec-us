format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-226
  summary: |-
    The household is entitled to request a fair hearing when aggrieved by a mass change. Continued benefits at the previous level require no waiver, a timely request within the 10 day adequate notice period, and a hearing based on improper computation or misapplication/misinterpretation of Federal law or regulation. The household is not entitled to a fair hearing when benefits are reduced or terminated due to an FNS order, subject to the stated contested-issue limitation.
rules:
  - name: adequate_notice_period_days_for_mass_change_continued_benefits
    kind: parameter
    dtype: Count
    source: SNAP Manual 18.4 Mass Changes
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-226
              excerpt: "within the10 day adequate notice period"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10

  - name: reinstatement_request_period_days_after_withdrawal
    kind: parameter
    dtype: Count
    source: SNAP Manual 226(E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-226
              excerpt: "within 10 days"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10

  - name: household_mass_change_fair_hearing_entitled
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 18.4 Mass Changes
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-226
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-226
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_aggrieved_by_mass_change
          and not benefits_reduced_or_terminated_due_to_fns_order

  - name: household_mass_change_continued_previous_benefits_entitled
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 18.4 Mass Changes
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-226
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-226
              excerpt: "within the10 day adequate notice period"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_aggrieved_by_mass_change
          and not household_specifically_waived_continuation_of_benefits
          and fair_hearing_request_days_after_notice <= adequate_notice_period_days_for_mass_change_continued_benefits
          and (fair_hearing_based_on_improper_snap_eligibility_or_benefit_computation or fair_hearing_based_on_misapplication_or_misinterpretation_of_federal_law_or_regulation)

  - name: participation_on_prior_basis_must_be_reinstated_after_fns_order
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 18.4 Mass Changes, Exception
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-226
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          benefits_reduced_or_terminated_due_to_fns_order
          and (issue_contested_is_improper_computation_of_eligibility_or_benefits or issue_contested_is_agency_misapplication_or_misinterpretation_of_federal_law_or_regulation)

  - name: withdrawn_fair_hearing_request_not_reinstated
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 226(E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-226
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-226
              excerpt: "within 10 days"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_or_representative_withdrew_fair_hearing_request_orally_or_in_writing
          and days_until_household_advised_agency_of_desire_to_reinstate_fair_hearing > reinstatement_request_period_days_after_withdrawal
