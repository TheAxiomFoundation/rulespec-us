format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-215
  summary: |-
    Prior to any action to reduce or terminate a household's benefits within the certification period, the Agency will, except as provided in Section 16.2 Exemptions from Notice, provide the household timely and adequate advance notice before the adverse action is taken. The notice of adverse action will be considered timely if the advance notice period includes at least 10 days from the date the notice is mailed to the date upon which the action becomes effective. The notice is adequate if it explains the proposed action, reason, fair hearing right, SNAP office telephone/contact information, continued benefits availability, over-issuance liability if the hearing decision is adverse, and free legal representation if available.
  deferred_outputs:
    - output: us-sc:policies/dss/snap-policy-manual/page-215#adverse_action_advance_notice_required
      reason: Section 16.1 makes the notice duty subject to exemptions in Section 16.2, but Section 16.2 is not available in copied context.
rules:
  - name: adverse_action_notice_timely
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: SNAP Manual Chapter 16.1, timely notice standard
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-215
          - path: versions[0].formula
            kind: import
            import:
              target: us-ma:regulations/106-cmr/366/200/block-1#minimum_advance_notice_days
              output: minimum_advance_notice_days
              hash: sha256:06d3edd364dbf98d59c4fe6f873a0b37566c3aebb5991d8ec01fc8f2d2e2582f
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          adverse_action_notice_days_from_mail_to_effective >= minimum_advance_notice_days

  - name: fair_hearing_and_continued_benefits_request_timely_after_weekend_or_holiday
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: SNAP Manual Chapter 16.1, weekend or holiday adverse notice period rule
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-215
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          adverse_notice_period_ends_on_weekend_or_holiday
          and fair_hearing_and_continued_benefits_request_received_day_after_weekend_or_holiday

  - name: adverse_action_notice_adequate
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: SNAP Manual Chapter 16.1, adequate notice contents
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-215
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          notice_explains_proposed_action
          and notice_explains_reason_for_proposed_action
          and notice_explains_right_to_request_fair_hearing
          and notice_provides_snap_office_telephone_number_and_contact_information
          and notice_explains_availability_of_continued_benefits
          and notice_explains_household_liability_for_overissuances_if_hearing_decision_adverse
          and (not free_legal_representation_available or notice_advises_availability_of_free_legal_representation)

imports:
  - us-ma:regulations/106-cmr/366/200/block-1#minimum_advance_notice_days
