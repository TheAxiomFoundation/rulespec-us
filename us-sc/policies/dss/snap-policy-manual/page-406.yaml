format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-406
  summary: |-
    "a Notice of Missed Interview (NOMI) must be sent to households if they missed an interview (face-to-face or telephone)." The page also notes updates concerning TANF interviews, workfare verification and ABAWD work requirements, service animal verification, simplified reporting, fair hearing implementation, and the 165 percent of poverty gross monthly income standard for separate household eligibility.
rules:
  - name: notice_of_missed_interview_sent_requirement_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 406, Volume 39 July 2018, section 3.7 update
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-406
              excerpt: "NOMI must be sent to households if they missed an interview (face-to-face or telephone)"
    versions:
      - effective_from: '2018-07-01'
        formula: |-
          notice_of_missed_interview_sent
          or (
            not household_missed_face_to_face_interview
            and not household_missed_telephone_interview
          )
