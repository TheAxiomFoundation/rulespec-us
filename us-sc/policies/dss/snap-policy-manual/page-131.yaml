format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-131
  summary: |-
    Vendor payments to a third party when expenses are incurred must be counted as earned income. Capital gains are considered self-employment income. 2020 Census temporary employee income is excluded effective September 16, 2019 through October 31, 2020. CCDBG child-care provider payments are self-employment income, while vouchers are excluded to the household containing the child. Children's earnings are excluded for a child age 17 or younger who lives with a parent or under parental control and attends qualifying school, including during a temporary interruption if the student intends to return.
rules:
  - name: vendor_payment_for_incurred_expenses_counted_as_earned_income
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Day
    source: SNAP Manual page 131, vendor payment
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-131
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          payment_is_vendor_payment_to_third_party
          and expenses_are_incurred
          and payment_is_legally_obligated_and_otherwise_payable_to_employee
  - name: capital_gains_considered_self_employment_income
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Day
    source: SNAP Manual page 131, item J
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-131
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          payment_is_proceeds_from_sale_of_capital_goods_or_equipment
  - name: census_temporary_employee_income_excluded
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Day
    source: SNAP Manual page 131, item K
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: effective_period
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-131
              excerpt: "excluded effective September 16, 2019 through October 31, 2020"
    versions:
      - effective_from: '2019-09-16'
        formula: |-
          payment_is_income_for_temporary_employee_connected_with_census
          and payment_date_is_in_census_temporary_exclusion_window
  - name: ccdbg_provider_payment_counted_as_self_employment_income
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Day
    source: SNAP Manual page 131, item L note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-131
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          payment_is_ccdbg_payment
          and payment_is_to_individual_providing_child_care
          and not payment_is_provided_as_voucher
  - name: ccdbg_voucher_excluded_to_household_containing_child
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Day
    source: SNAP Manual page 131, item L exception
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-131
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          payment_is_ccdbg_payment
          and payment_is_provided_as_voucher
          and household_contains_child_for_whom_voucher_is_provided
  - name: child_earnings_excluded
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Day
    source: SNAP Manual page 131, item M
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-131
              excerpt: "age 17 or younger"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          payment_is_earned_income_of_household_member_age_seventeen_or_younger
          and (child_lives_with_natural_adoptive_or_step_parent or child_lives_under_parental_control_of_household_member)
          and (child_attends_qualifying_school_or_ged_classes or child_attends_qualifying_home_school_program or (school_attendance_temporarily_interrupted and student_intends_to_return))
