format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-202
  summary: |-
    "the amount by which the TANF benefit is reduced is still removed from the SNAP budget at the end of the one-year time period."
    "Any household that applies for SNAP and is receiving a reduced TANF benefit because a person in the household has committed a failure to comply will not receive an increased SNAP benefit because of this sanction for the remainder of the TANF sanction period."
    "The Agency must lift the prohibition on the increased benefits when the Agency is notified or becomes aware of a cure, exemption or deferral."
    "SNAP must ensure that benefits are not issued to any individual who is deceased."
rules:
  - name: tanf_reduction_amount_removed_from_snap_budget_after_one_year
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    source: SNAP Manual 202, TANF sanction budget treatment
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-202
              excerpt: "the amount by which the TANF benefit is reduced is still removed from the SNAP budget at the end of the one-year time period"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if tanf_sanction_one_year_time_period_has_ended: tanf_benefit_reduction_amount else: 0

  - name: increased_snap_benefit_prohibition_for_tanf_failure_to_comply
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 202, TANF sanction increased-benefit prohibition
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-202
              excerpt: "applies for SNAP and is receiving a reduced TANF benefit because a person in the household has committed a failure to comply"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-202
              excerpt: "lift the prohibition on the increased benefits when the Agency is notified or becomes aware of a cure, exemption or deferral"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_applies_for_snap
          and household_receiving_reduced_tanf_benefit_because_member_failed_to_comply
          and tanf_sanction_period_remaining
          and not agency_notified_or_aware_of_tanf_sanction_cure_exemption_or_deferral

  - name: snap_benefits_may_be_issued_to_individual
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual 14.9, participation of deceased individuals
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-202
              excerpt: "benefits are not issued to any individual who is deceased"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not individual_is_deceased
