format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-92
  deferred_outputs:
    - output: us-sc:policies/dss/snap-policy-manual/page-92#student_placed_through_low_income_government_training_program_exemption_applies
      reason: Section 9.4 is cited to identify acceptable SNAP Employment and Training Program components for the state or local low-income household employment and training program branch, but that upstream source is not available in copied context.
  summary: |-
    "If no natural, adoptive or step-parent is in the same SNAP household as the child, another full-time student in the same SNAP household as the child may qualify for eligible student status under this provision if he or she has parental control over the child and is not living with his or her spouse." A student may also qualify by being assigned to or placed in higher education through or in compliance with WIOA, qualifying State SNAP E&T, Trade Act section 236, or specified low-income household employment and training programs. Enrollment begins on the first day of the school term and continues through normal attendance, vacation, and recess unless the student graduates, is suspended or expelled, drops out, or does not intend to register for the next normal school term.
rules:
  - name: student_has_parental_control_child_status
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 92, paragraph (J) continuation
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-92
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          student_is_full_time
          and child_is_in_same_snap_household_as_student
          and no_natural_adoptive_or_step_parent_of_child_in_same_snap_household
          and student_has_parental_control_over_child
          and not student_living_with_spouse

  - name: student_placed_through_wioa_exemption_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 92, paragraph (K), WIOA program branch
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-92
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          student_assigned_or_placed_in_higher_education_through_or_in_compliance_with_program
          and placement_program_is_wioa_title_i_program

  - name: student_placed_through_state_snap_et_career_technical_exemption_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 92, paragraph (K), State SNAP E&T career and technical education branch
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-92
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          student_assigned_or_placed_in_higher_education_through_or_in_compliance_with_program
          and placement_program_is_state_snap_employment_and_training_program
          and course_or_program_is_career_and_technical_education

  - name: student_placed_through_state_snap_et_basic_education_exemption_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 92, paragraph (K), State SNAP E&T remedial/basic adult education/literacy/ESL branch
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-92
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          student_assigned_or_placed_in_higher_education_through_or_in_compliance_with_program
          and placement_program_is_state_snap_employment_and_training_program
          and course_or_program_is_remedial_basic_adult_education_literacy_or_english_as_second_language

  - name: student_placed_through_trade_act_exemption_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 92, paragraph (K), Trade Act section 236 branch
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-92
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          student_assigned_or_placed_in_higher_education_through_or_in_compliance_with_program
          and placement_program_is_trade_act_section_236_program

  - name: voluntary_training_program_higher_education_placement_exemption_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 92, paragraph (K), voluntary participation sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-92
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          student_voluntarily_participates_in_employment_and_training_program
          and student_placed_in_higher_education_through_or_in_compliance_with_program_requirements

  - name: self_initiated_higher_education_placement_in_compliance_with_training_program
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 92, paragraph (K), self-initiated placement sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-92
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          self_initiated_higher_education_placement_during_employment_and_training_program_enrollment
          and employment_and_training_program_has_higher_education_component
          and employment_and_training_program_accepts_the_placement

  - name: student_enrollment_status_continues
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 92, paragraph (3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-92
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          school_term_has_begun_for_institution_of_higher_education
          and student_is_in_normal_class_attendance_vacation_or_recess_period
          and not student_has_graduated
          and not student_is_suspended_or_expelled
          and not student_has_dropped_out
          and not student_does_not_intend_to_register_for_next_normal_school_term
