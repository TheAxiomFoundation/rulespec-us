format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-207
  summary: SNAP households in which all adult members are elderly or disabled with
    no earned income are assigned a twenty-four month certification period. ESAP households
    are assigned a 36-month certification. Under simplified reporting, these households
    report changes only at stated interim contact or recertification points unless
    gross income exceeds 130% of poverty or a household member wins substantial lottery
    or gambling winnings. Regular SNAP households assigned a 12-month certification
    period report only at recertification unless gross income exceeds 130% of poverty,
    an ABAWD's work hours fall below 20 hours per week, or a member wins substantial
    lottery or gambling winnings ($4500 or more). Changes must be reported by the
    stated 10-day deadline; DSS Forms 3808 and 3809 must be returned by the 15th of
    the month due, and incomplete signed/name/address forms or authorized-representative
    forms must be accepted.
  deferred_outputs:
  - output: us-sc:policies/dss/snap-policy-manual/page-207#elderly_or_disabled_simplified_reporting_change_must_be_reported_now
    reason: Generated rule depends on an output that validation deferred because it
      flattened thresholded, capped, base-limited, or cross-referenced mechanics,
      or borrowed an unrelated same-named section term.
  - output: us-sc:policies/dss/snap-policy-manual/page-207#esap_simplified_reporting_change_must_be_reported_now
    reason: Generated rule depends on an output that validation deferred because it
      flattened thresholded, capped, base-limited, or cross-referenced mechanics,
      or borrowed an unrelated same-named section term.
  - output: us-sc:policies/dss/snap-policy-manual/page-207#household_has_substantial_lottery_or_gambling_winnings
    reason: Generated rule used a local name that collides with a sibling RuleSpec
      export. This output is deferred until it can be encoded with a semantic branch-specific
      name without creating ambiguous sibling imports.
  - output: us-sc:policies/dss/snap-policy-manual/page-207#regular_snap_simplified_reporting_change_must_be_reported_now
    reason: Generated rule depends on an output that validation deferred because it
      flattened thresholded, capped, base-limited, or cross-referenced mechanics,
      or borrowed an unrelated same-named section term.
rules:
- name: elderly_or_disabled_no_earned_income_certification_period_months
  kind: parameter
  dtype: Count
  period: Month
  source: SNAP Manual page 207
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-207
          excerpt: twenty-four month certification period
  versions:
  - effective_from: '0001-01-01'
    formula: '24'
- name: esap_certification_period_months
  kind: parameter
  dtype: Count
  period: Month
  source: SNAP Manual page 207
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-207
          excerpt: 36-month certification
  versions:
  - effective_from: '0001-01-01'
    formula: '36'
- name: regular_snap_certification_period_months
  kind: parameter
  dtype: Count
  period: Month
  source: SNAP Manual page 207
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-207
          excerpt: 12-month certification period
  versions:
  - effective_from: '0001-01-01'
    formula: '12'
- name: gross_income_poverty_reporting_threshold_rate
  kind: parameter
  dtype: Rate
  source: SNAP Manual page 207
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-207
          excerpt: gross income exceeds 130% of poverty
  versions:
  - effective_from: '0001-01-01'
    formula: '1.30'
- name: abawd_work_hours_reporting_threshold
  kind: parameter
  dtype: Count
  period: Week
  source: SNAP Manual page 207
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-207
          excerpt: work hours fall below 20 hours per week
  versions:
  - effective_from: '0001-01-01'
    formula: '20'
- name: substantial_lottery_or_gambling_winnings_threshold
  kind: parameter
  dtype: Money
  unit: USD
  source: SNAP Manual page 207
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-207
          excerpt: substantial lottery or gambling winnings ($4500 or more)
  versions:
  - effective_from: '0001-01-01'
    formula: '4500'
- name: change_report_deadline_day_count
  kind: parameter
  dtype: Count
  period: Day
  source: SNAP Manual page 207
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-207
          excerpt: within the first 10 days of the month after occurrence
  versions:
  - effective_from: '0001-01-01'
    formula: '10'
- name: periodic_report_return_due_day_of_month
  kind: parameter
  dtype: Count
  period: Day
  source: SNAP Manual page 207
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-207
          excerpt: returned to the Agency by the 15th of the month
  versions:
  - effective_from: '0001-01-01'
    formula: '15'
- name: elderly_or_disabled_no_earned_income_certification_period
  kind: derived
  entity: Household
  dtype: Count
  period: Month
  source: SNAP Manual page 207
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-207
  versions:
  - effective_from: '0001-01-01'
    formula: 'if all_adult_members_are_elderly_or_disabled and household_has_no_earned_income:
      elderly_or_disabled_no_earned_income_certification_period_months else: 0'
- name: esap_certification_period
  kind: derived
  entity: Household
  dtype: Count
  period: Month
  source: SNAP Manual page 207
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-207
  versions:
  - effective_from: '0001-01-01'
    formula: 'if all_members_are_elderly and household_has_no_earned_income: esap_certification_period_months
      else: 0'
- name: regular_snap_certification_period
  kind: derived
  entity: Household
  dtype: Count
  period: Month
  source: SNAP Manual page 207
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-207
  versions:
  - effective_from: '0001-01-01'
    formula: 'if regular_snap_household: regular_snap_certification_period_months
      else: 0'
- name: household_gross_income_exceeds_reporting_threshold
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: SNAP Manual page 207
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-207
          excerpt: gross income exceeds 130% of poverty
  versions:
  - effective_from: '0001-01-01'
    formula: household_gross_income > gross_income_poverty_reporting_threshold_rate
      * poverty_guideline_amount
- name: abawd_work_hours_fall_below_reporting_threshold
  kind: derived
  entity: Person
  dtype: Judgment
  period: Week
  source: SNAP Manual page 207
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-207
          excerpt: "an ABAWD\u2019s work hours fall below 20 hours per week"
  versions:
  - effective_from: '0001-01-01'
    formula: person_is_abawd and person_work_hours_per_week < abawd_work_hours_reporting_threshold
- name: periodic_report_form_must_be_accepted
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: SNAP Manual page 207
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-207
  versions:
  - effective_from: '0001-01-01'
    formula: 'form_filed_by_authorized_representative

      or (form_is_incomplete and form_contains_household_signature and form_contains_household_name
      and form_contains_household_address)'
- name: six_or_tri_annual_recertification_interview_required
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: SNAP Manual page 207
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-207
  versions:
  - effective_from: '0001-01-01'
    formula: '(six_month_recertification_due or tri_annual_recertification_due)

      and (household_requested_interview or authorized_representative_requested_interview)'
