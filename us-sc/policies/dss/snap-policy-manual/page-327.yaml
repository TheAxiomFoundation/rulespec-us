format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-327
  summary: '"The household must be given at least 10 days to submit verification."
    In Example #5, verification received "more than 30 days from the date the ''A''
    form was filed" requires the household to re-apply and a CHIP Notice C600 is sent.'
rules:
- name: a_form_filing_reapplication_day_limit
  kind: parameter
  dtype: Count
  source: SNAP Manual p. 327, Example
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-327
          excerpt: more than 30 days from the date the 'A' form was filed
  versions:
  - effective_from: '0001-01-01'
    formula: '30'
- name: verification_submission_time_requirement_satisfied
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: SNAP Manual p. 327, Examples
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-327
      - path: versions[0].formula
        kind: import
        import:
          target: us-sc:policies/dss/snap-policy-manual/page-324#minimum_verification_submission_days
          output: minimum_verification_submission_days
          hash: sha256:8983b75783805fed2042cbd76d8871dae327d3c560022783b9223cf3a5721d66
  versions:
  - effective_from: '0001-01-01'
    formula: 'not additional_verification_requested

      or verification_submission_days_given >= minimum_verification_submission_days'
- name: household_must_reapply_with_new_application
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: SNAP Manual p. 327, Example
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-327
          excerpt: verification was received more than 30 days from the date the 'A'
            form was filed
      - path: versions[0].formula
        kind: import
        import:
          target: us-sc:policies/dss/snap-policy-manual/page-327#a_form_filing_reapplication_day_limit
          output: a_form_filing_reapplication_day_limit
          hash: sha256:local
  versions:
  - effective_from: '0001-01-01'
    formula: 'additional_verification_requested

      and verification_received_after_a_form_filing_days > a_form_filing_reapplication_day_limit'
- name: chip_notice_c600_sent_required
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: SNAP Manual p. 327, Example
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-327
          excerpt: A CHIP Notice C600 is sent.
      - path: versions[0].formula
        kind: import
        import:
          target: us-sc:policies/dss/snap-policy-manual/page-327#household_must_reapply_with_new_application
          output: household_must_reapply_with_new_application
          hash: sha256:local
  versions:
  - effective_from: '0001-01-01'
    formula: household_must_reapply_with_new_application
imports:
- us-sc:policies/dss/snap-policy-manual/page-324#minimum_verification_submission_days
