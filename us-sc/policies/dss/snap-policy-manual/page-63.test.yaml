- name: homeless shelter verification and client statement paths
  period: 2026-05
  input:
    us-sc:policies/dss/snap-policy-manual/page-63#input.household_is_homeless: true
    us-sc:policies/dss/snap-policy-manual/page-63#input.household_claims_actual_shelter_expenses: true
    us-sc:policies/dss/snap-policy-manual/page-63#input.household_has_extremely_low_shelter_costs: false
    ? us-sc:policies/dss/snap-policy-manual/page-63#input.household_has_difficulty_obtaining_traditional_shelter_cost_verification
    : true
    us-sc:policies/dss/snap-policy-manual/page-63#input.client_statement_is_used_as_last_resort: true
  output:
    us-sc:policies/dss/snap-policy-manual/page-63#homeless_household_may_provide_shelter_expense_verification: holds
    us-sc:policies/dss/snap-policy-manual/page-63#client_statement_acceptable_for_homeless_shelter_cost_verification: holds
- name: household and agency documentary verification duties
  period: 2026-05
  input:
    ? us-sc:policies/dss/snap-policy-manual/page-63#input.documentary_evidence_supports_application_statements_or_resolves_questionable_information
    : true
    us-sc:policies/dss/snap-policy-manual/page-63#input.household_needs_verification_obtained: true
    us-sc:policies/dss/snap-policy-manual/page-63#input.household_is_cooperating_with_agency: true
    us-sc:policies/dss/snap-policy-manual/page-63#input.household_is_supplying_documentary_evidence: true
    us-sc:policies/dss/snap-policy-manual/page-63#input.household_provides_reasonable_documentary_evidence: true
  output:
    us-sc:policies/dss/snap-policy-manual/page-63#household_has_primary_responsibility_to_provide_documentary_evidence: holds
    us-sc:policies/dss/snap-policy-manual/page-63#agency_must_assist_household_obtaining_verification: holds
    us-sc:policies/dss/snap-policy-manual/page-63#agency_must_not_require_in_person_verification_at_snap_office: holds
    us-sc:policies/dss/snap-policy-manual/page-63#agency_must_accept_reasonable_documentary_evidence: holds
- name: person status verification responsibilities
  period: 2026-05
  input:
    us-sc:policies/dss/snap-policy-manual/page-63#input.person_has_fleeing_felon_status_at_issue: false
    us-sc:policies/dss/snap-policy-manual/page-63#input.person_has_parole_or_probation_violator_status_at_issue: true
    ? us-sc:policies/dss/snap-policy-manual/page-63#input.snap_applicant_attestation_regarding_disqualified_felon_status_is_questionable
    : true
    ? us-sc:policies/dss/snap-policy-manual/page-63#input.attestation_element_concerns_conviction_of_listed_crime_or_noncompliance_with_sentence_terms
    : true
  output:
    ? us-sc:policies/dss/snap-policy-manual/page-63#agency_has_primary_responsibility_for_fleeing_felon_or_parole_probation_status_verification
    : holds
    us-sc:policies/dss/snap-policy-manual/page-63#agency_will_verify_questionable_disqualified_felon_attestation: holds
    ? us-sc:policies/dss/snap-policy-manual/page-63#agency_will_verify_each_element_of_questionable_disqualified_felon_attestation
    : holds
- name: incomplete verification statement assistance and ten day period
  period: 2026-05
  input:
    us-sc:policies/dss/snap-policy-manual/page-63#input.verification_is_incomplete: true
    us-sc:policies/dss/snap-policy-manual/page-63#input.household_indicates_assistance_needed_to_obtain_required_verification: true
    us-sc:policies/dss/snap-policy-manual/page-63#input.days_allowed_from_initial_request_for_missing_verification: 10
  output:
    us-sc:policies/dss/snap-policy-manual/page-63#minimum_days_to_provide_missing_verification: 10
    ? us-sc:policies/dss/snap-policy-manual/page-63#agency_must_provide_required_verification_statement_when_verification_incomplete
    : holds
    us-sc:policies/dss/snap-policy-manual/page-63#agency_must_offer_assistance_for_missing_verification: holds
    us-sc:policies/dss/snap-policy-manual/page-63#household_allowed_sufficient_time_to_provide_missing_verification: holds
