format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-17
  summary: |-
    General terms and condition of SNAP are: (1) SNAP benefits do not count as income to reduce benefits ... The SNAP benefit allotment provided to any eligible household will not be considered income or resources for any purpose under any Federal, State, or local laws ... (2) No sales taxes on SNAP purchases ... only the dollar amount represented by SNAP benefits needs to be exempt from taxation. (3) Disclosure Use or disclosure of information obtained from SNAP applicant or recipient households will be restricted to: A. Persons directly connected with the administration or enforcement of the provisions of the Food and Nutrition Act of 2008 (as amended), or regulations, other Federal assistance programs, federally-assisted State programs providing assistance on a means-tested basis
rules:
  - name: snap_benefit_allotment_excluded_from_income_and_resources
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 1.3(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-17
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_is_eligible_for_snap
          and household_receives_snap_benefit_allotment
  - name: snap_purchase_tax_exempt_amount
    kind: derived
    entity: Payment
    dtype: Money
    period: Day
    unit: USD
    source: SNAP Manual 1.3(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-17
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if purchase_is_for_eligible_foods_and_made_with_snap_benefits: min(eligible_food_purchase_value, snap_benefits_presented_for_purchase) else: 0
  - name: disclosure_restricted_to_direct_program_administration_or_enforcement
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 1.3(3)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-17
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          information_obtained_from_snap_applicant_or_recipient_household
          and disclosure_person_directly_connected_with_food_and_nutrition_act_or_federal_or_means_tested_program_administration_or_enforcement
