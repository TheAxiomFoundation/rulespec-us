- name: timely_initial_application_notice
  period: 2026-05
  input:
    us-sc:policies/dss/snap-policy-manual/page-186#input.initial_application_determination_made: true
    us-sc:policies/dss/snap-policy-manual/page-186#input.initial_application_written_notice_provided: true
    us-sc:policies/dss/snap-policy-manual/page-186#input.days_after_initial_application_when_notice_provided: 30
  output:
    us-sc:policies/dss/snap-policy-manual/page-186#initial_application_notice_deadline_days: 30
    us-sc:policies/dss/snap-policy-manual/page-186#initial_application_notice_timely: holds
- name: late_initial_application_notice
  period: 2026-05
  input:
    us-sc:policies/dss/snap-policy-manual/page-186#input.initial_application_determination_made: true
    us-sc:policies/dss/snap-policy-manual/page-186#input.initial_application_written_notice_provided: true
    us-sc:policies/dss/snap-policy-manual/page-186#input.days_after_initial_application_when_notice_provided: 31
  output:
    us-sc:policies/dss/snap-policy-manual/page-186#initial_application_notice_timely: not_holds
- name: approved_application_notice_contents
  period: 2026-05
  input:
    us-sc:policies/dss/snap-policy-manual/page-186#input.application_approved: true
    us-sc:policies/dss/snap-policy-manual/page-186#input.notice_states_allotment_amount: true
    us-sc:policies/dss/snap-policy-manual/page-186#input.notice_states_certification_beginning_date: true
    us-sc:policies/dss/snap-policy-manual/page-186#input.notice_states_certification_ending_date: true
    us-sc:policies/dss/snap-policy-manual/page-186#input.notice_advises_anticipated_benefit_variations: true
    us-sc:policies/dss/snap-policy-manual/page-186#input.notice_advises_fair_hearing_right: true
    us-sc:policies/dss/snap-policy-manual/page-186#input.notice_provides_snap_office_telephone_number: true
  output:
    us-sc:policies/dss/snap-policy-manual/page-186#approved_application_notice_complete: holds
- name: special_notice_branches_and_denial_contents
  period: 2026-05
  input:
    ? us-sc:policies/dss/snap-policy-manual/page-186#input.initial_allotment_contains_application_month_and_current_month_benefits
    : true
    ? us-sc:policies/dss/snap-policy-manual/page-186#input.notice_explains_initial_allotment_includes_more_than_one_month_benefits
    : true
    ? us-sc:policies/dss/snap-policy-manual/page-186#input.notice_indicates_monthly_allotment_for_remainder_of_certification_period
    : true
    us-sc:policies/dss/snap-policy-manual/page-186#input.application_approved_on_expedited_basis_without_verification: true
    us-sc:policies/dss/snap-policy-manual/page-186#input.notice_explains_household_must_provide_waived_verification: true
    ? us-sc:policies/dss/snap-policy-manual/page-186#input.notice_explains_consequences_of_failure_to_provide_postponed_verification
    : true
    us-sc:policies/dss/snap-policy-manual/page-186#input.household_provided_notice_of_expiration_at_certification: true
    us-sc:policies/dss/snap-policy-manual/page-186#input.eligibility_notice_combined_with_notice_of_expiration: true
    us-sc:policies/dss/snap-policy-manual/page-186#input.separate_eligibility_and_expiration_notices_sent: false
    us-sc:policies/dss/snap-policy-manual/page-186#input.application_denied: true
    us-sc:policies/dss/snap-policy-manual/page-186#input.denial_notice_explains_basis_for_denial: true
    us-sc:policies/dss/snap-policy-manual/page-186#input.denial_notice_advises_fair_hearing_right: true
    us-sc:policies/dss/snap-policy-manual/page-186#input.denial_notice_provides_snap_office_telephone_number: true
  output:
    us-sc:policies/dss/snap-policy-manual/page-186#initial_allotment_multiple_month_notice_complete: holds
    us-sc:policies/dss/snap-policy-manual/page-186#expedited_without_verification_notice_complete: holds
    us-sc:policies/dss/snap-policy-manual/page-186#notice_of_eligibility_may_be_combined_with_expiration_notice: holds
    us-sc:policies/dss/snap-policy-manual/page-186#denied_application_notice_complete: holds
