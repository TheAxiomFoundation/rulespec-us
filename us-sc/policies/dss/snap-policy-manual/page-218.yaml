format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-218
  summary: |-
    No household may participate beyond the expiration of the certification period without a determination of eligibility for a new certification period. The Agency must notify households of expiration dates, provide an application form for recertification, complete an interview, and recertify eligible households prior to expiration. Households must apply for recertification and comply with interview and verification requirements. The NOE timing and required contents are specified.
rules:
  - name: household_may_participate_beyond_certification_expiration
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual ch. 17, sec. 17.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-218
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_has_eligibility_determination_for_new_certification_period

  - name: household_recertification_compliance_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual ch. 17, sec. 17.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-218
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_applied_for_recertification
          and household_complied_with_interview_requirement
          and household_complied_with_verification_requirement

  - name: notice_of_expiration_provided_at_certification_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual ch. 17, sec. 17.1(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-218
              excerpt: "certified for one month or certified in the second month of a two-month certification period"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_certified_for_one_month
          or household_certified_in_second_month_of_two_month_certification_period

  - name: notice_of_expiration_standard_timing_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual ch. 17, sec. 17.1(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-218
              excerpt: "before the first day of the last month of the certification period, but not before the first day of the next-to-the-last month"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not household_certified_for_one_month
          and not household_certified_in_second_month_of_two_month_certification_period

  - name: notice_of_expiration_content_complete
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual ch. 17, sec. 17.1(1)(A)-(H)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-218
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          notice_states_certification_period_expiration_date
          and notice_states_timely_recertification_application_date_for_uninterrupted_benefits
          and notice_states_consequences_of_failure_to_apply_timely
          and notice_states_right_to_receive_application_and_acceptance_with_signature_legible_name_and_address
          and notice_states_alternative_submission_methods_and_how_to_use_them
          and notice_states_office_address_where_application_must_be_filed
          and notice_states_fair_hearing_right_for_denial_or_benefit_objection
          and notice_states_ssi_only_household_may_apply_at_social_security_administration_office
