format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-221
  summary: |-
    "An application for recertification received after the 15th of the month of the current certification, but before the current certification ends is considered untimely." If the household takes required action before the end of the certification period, or after the end but within 30 days of the recertification application, the Agency processes the application and provides a full month's benefits for the initial month of the new certification period. If the household does not take required action within 30 days, the application must be denied; however, if action is taken after denial but within the calendar month after the end of the certification period, the Agency reopens the case and prorates benefits from the action date.
rules:
  - name: untimely_recertification_filing_day_threshold
    kind: parameter
    dtype: Integer
    source: SNAP Manual page 221, Untimely recertification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-221
              excerpt: "after the 15th of the month"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          15

  - name: recertification_completion_window_days
    kind: parameter
    dtype: Integer
    source: SNAP Manual page 221, Untimely recertification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-221
              excerpt: "The household has 30 days after the end of the certification period"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: recertification_application_untimely
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 221, Untimely recertification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-221
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          recertification_application_received_day_of_month > untimely_recertification_filing_day_threshold
          and recertification_application_received_before_current_certification_ends

  - name: household_loses_right_to_uninterrupted_benefits
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 221, Untimely recertification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-221
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          recertification_application_untimely

  - name: full_initial_month_benefits_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 221, Untimely recertification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-221
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          recertification_application_untimely
          and (household_takes_required_action_before_end_of_certification_period
          or household_takes_required_action_after_end_but_within_30_days_of_recertification_application)

  - name: untimely_recertification_application_must_be_denied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 221, Untimely recertification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-221
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          recertification_application_untimely
          and not household_takes_required_action_within_30_days

  - name: agency_reopens_case_and_prorates_from_action_date
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 221, Untimely recertification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-221
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          untimely_recertification_application_must_be_denied
          and household_takes_required_action_after_denial
          and household_takes_required_action_within_calendar_month_after_end_of_certification_period
