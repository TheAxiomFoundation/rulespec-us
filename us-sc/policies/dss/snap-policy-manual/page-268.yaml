format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-268
  summary: |-
    "An individual, not a household, who intentionally violates SNAP regulations must be disqualified from SNAP participation." Fraud includes false representation, false misleading allegations, or concealment intended to deceive, and SC courts require misrepresentation with intent to deceive, knowledge of falsity, materiality, and reliance.
rules:
  - name: person_disqualified_for_intentional_program_violation
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 268, Intentional Program Violation disqualification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-268
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_intentionally_violates_snap_regulations
  - name: misrepresentation_with_intent_to_deceive
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 268, Fraud elements i
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-268
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          positive_assertion_of_falsehood_with_intent_to_deceive
          or concealment_of_truth_with_intent_to_deceive
          or suppression_of_truth_with_intent_to_deceive
          or false_impression_by_words_actions_or_trickery_with_intent_to_deceive
  - name: fraud
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 268, Fraud definition and elements
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-268
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          misrepresentation_with_intent_to_deceive
          and maker_knows_representation_is_false
          and fact_misrepresented_is_material
          and person_deceived_relies_on_misrepresentation
