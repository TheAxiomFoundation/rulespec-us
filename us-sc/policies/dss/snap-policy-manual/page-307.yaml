format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-307
  summary: |-
    Lawful Permanent Residents are eligible after a 5-year waiting period, with no waiting period if under 18, have 40 qualifying work quarters, are blind or disabled, were lawfully residing in the U.S. and 65 or older on August 22, 1996, have a U.S. military connection, are admitted as Amerasian immigrants, are certain American Indians born abroad, or are certain Hmong or Highland Laotian tribal members. Cuban and Haitian Entrants are eligible immediately.
rules:
  - name: lpr_five_year_waiting_period_years
    kind: parameter
    dtype: Count
    source: SNAP Manual page 307, Lawful Permanent Residents
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-307
              excerpt: "Eligible after a 5-year waiting period"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          5

  - name: lpr_qualifying_work_quarters_threshold
    kind: parameter
    dtype: Count
    source: SNAP Manual page 307, Lawful Permanent Residents
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-307
              excerpt: "Have 40 qualifying work quarters"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          40

  - name: lpr_snap_status_eligible_without_waiting_period
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 307, Lawful Permanent Residents
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-307
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-307
              excerpt: "Have 40 qualifying work quarters"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_lawful_permanent_resident
          and (
            person_is_under_18_years_old
            or person_qualifying_work_quarters >= lpr_qualifying_work_quarters_threshold
            or person_is_blind_or_disabled
            or person_was_lawfully_residing_in_us_and_65_or_older_on_august_22_1996
            or person_has_us_military_connection
            or person_admitted_to_us_as_amerasian_immigrant
            or person_is_certain_american_indian_born_abroad
            or person_is_certain_hmong_or_highland_laotian_tribal_member
          )

  - name: lpr_snap_status_eligible
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 307, Lawful Permanent Residents
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-307
          - path: versions[0].formula
            kind: import
            import:
              target: us-sc:policies/dss/snap-policy-manual/page-307#lpr_snap_status_eligible_without_waiting_period
              output: lpr_snap_status_eligible_without_waiting_period
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_lawful_permanent_resident
          and (
            person_has_completed_lpr_five_year_waiting_period
            or lpr_snap_status_eligible_without_waiting_period
          )

  - name: cuban_haitian_entrant_snap_status_eligible
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 307, Cuban and Haitian Entrants
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-307
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_cuban_or_haitian_entrant_granted_entry_as_defined_in_section_501_e_of_the_refugee_education_assistance_act_of_1980
