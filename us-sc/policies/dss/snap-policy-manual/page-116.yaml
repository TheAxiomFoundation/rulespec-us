format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-116
  summary: |-
    The discretionary exemptions can be used under the following circumstances: when the only or last child in the household turns 18 and the household is between certification periods, for up to 1 month within each 36-month period; when an Agency error causes an ABAWD to have months of non-compliance, up to three months per ABAWD within each 36-month period. Eligibility staff cannot use the discretionary exemptions without prior authorization from the State Office Designee. If an ABAWD receives SNAP benefits erroneously, the Agency will consider the benefits received for the ABAWD time limit unless or until the individual pays it back in full.
rules:
  - name: discretionary_exemption_accounting_period_months
    kind: parameter
    dtype: Count
    source: SNAP Manual p.116, discretionary exemptions
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-116
              excerpt: "within each 36-month period"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          36

  - name: child_turning_18_discretionary_exemption_month_limit
    kind: parameter
    dtype: Count
    source: SNAP Manual p.116, discretionary exemptions (1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-116
              excerpt: "up to 1 month within each 36-month period"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1

  - name: agency_error_discretionary_exemption_month_limit_per_abawd
    kind: parameter
    dtype: Count
    source: SNAP Manual p.116, discretionary exemptions (1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-116
              excerpt: "up to three months per ABAWD, within each 36-month period"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          3

  - name: child_turning_18_discretionary_exemption_months_available
    kind: derived
    entity: Person
    dtype: Count
    period: Month
    source: SNAP Manual p.116, discretionary exemptions (1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-116
              excerpt: "only or last child in the household turns 18 and the household is between certification periods"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-116
              excerpt: "without prior authorization from the State Office Designee"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if state_office_designee_prior_authorization and current_discretionary_exemption_accounting_period_months == discretionary_exemption_accounting_period_months and person_is_child_or_household_member_in_household_whose_only_or_last_child_turns_18 and household_is_between_certification_periods:
            max(0, child_turning_18_discretionary_exemption_month_limit - child_turning_18_discretionary_exemption_months_used_in_current_discretionary_exemption_period)
          else: 0

  - name: child_turning_18_apr_exemption_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p.116, discretionary exemptions (1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-116
              excerpt: "the child and all household members would be exempt from meeting the APR"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          child_turning_18_discretionary_exemption_months_available > 0

  - name: agency_error_discretionary_exemption_months_available
    kind: derived
    entity: Person
    dtype: Count
    period: Month
    source: SNAP Manual p.116, discretionary exemptions (1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-116
              excerpt: "Agency error causes an ABAWD to have months of non-compliance"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-116
              excerpt: "without prior authorization from the State Office Designee"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if state_office_designee_prior_authorization and current_discretionary_exemption_accounting_period_months == discretionary_exemption_accounting_period_months and person_is_abawd and agency_error_caused_person_abawd_noncompliance_with_federal_work_requirements:
            max(0, agency_error_discretionary_exemption_month_limit_per_abawd - agency_error_discretionary_exemption_months_used_in_current_discretionary_exemption_period)
          else: 0

  - name: agency_error_discretionary_exemption_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p.116, discretionary exemptions (1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-116
              excerpt: "the ABAWD may be placed under the discretionary exemption"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          agency_error_discretionary_exemption_months_available > 0

  - name: erroneous_snap_benefits_count_for_abawd_time_limit
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual 8.23
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-116
              excerpt: "If an ABAWD receives SNAP benefits erroneously"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-116
              excerpt: "unless or until the individual pays it back in full"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_abawd
          and abawd_received_snap_benefits_erroneously
          and not individual_paid_erroneous_benefits_back_in_full
