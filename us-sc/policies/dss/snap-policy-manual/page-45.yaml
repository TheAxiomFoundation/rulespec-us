format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-45
  summary: |-
    "authorized to receive" means determined eligible for benefits and notified of this determination, even if benefits have been authorized but not received, authorized but not accessed, suspended or recouped, or not paid because less than a minimum amount. Categorical eligibility cannot be extended to households not eligible to participate in SNAP because the entire household is institutionalized or disqualified for any reason. Under no circumstances will a household be considered categorically eligible if specified household/member disqualifications apply. No person will be included as a member in an otherwise categorically eligible household if the person is an ineligible non-citizen or ineligible under student provisions.
rules:
  - name: authorized_to_receive
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p.45, authorized to receive definition
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-45
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_determined_eligible_for_benefits
          and individual_notified_of_eligibility_determination

  - name: household_prohibited_from_categorical_eligibility
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual p.45, Sections 4.2 and categorical eligibility limitation
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-45
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          entire_household_institutionalized
          or entire_household_disqualified_from_receiving_snap_benefits
          or any_household_member_disqualified_for_intentional_snap_violation
          or primary_informant_disqualified_for_failure_to_comply_with_work_requirements
          or any_household_member_ineligible_by_drug_related_felony_conviction
          or any_household_member_is_fleeing_felon
          or any_household_member_is_probation_or_parole_violator
          or any_household_member_has_certain_conviction_and_is_not_in_compliance_with_sentence

  - name: household_categorically_eligible
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual p.45, categorical eligibility prohibition
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-45
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_otherwise_categorically_eligible
          and not household_prohibited_from_categorical_eligibility

  - name: family_independence_information_and_referral_services_available
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual p.45, Section 4.2 exception
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-45
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_eligible_for_family_independence_information_and_referral_services

  - name: resources_excluded_and_not_deemed_for_family_independence_information_and_referral_services
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual p.45, Section 4.2 exception for sanctioned member households
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-45
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_contains_sanctioned_snap_member

  - name: sanctioned_snap_member_income_deemed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual p.45, Section 4.2 exception for sanctioned member income
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-45
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_contains_sanctioned_snap_member

  - name: person_prohibited_from_categorical_eligibility_membership
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p.45, Section 4.3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-45
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_ineligible_non_citizen
          or person_ineligible_under_student_provisions
