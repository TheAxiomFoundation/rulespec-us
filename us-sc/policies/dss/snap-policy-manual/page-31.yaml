  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-31
  summary: |-
    The Agency must notify all applicants on the application form that the non-citizen status of applicant household members may be subject to verification by USCIS. The Agency must notify all applicants for SNAP benefits at the time of application and at each recertification through a written statement on, or provided with, the application form that information available through IEVS will be requested, used and may be verified through collateral contact when discrepancies are found by the Agency.
