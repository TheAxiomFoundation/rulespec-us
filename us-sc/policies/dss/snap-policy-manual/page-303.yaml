format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-303
  summary: |-
    "Letter or other tribal document certifying at least 50 per centum American Indian blood ... combined with a birth certificate or other satisfactory evidence of birth in Canada." "An individual who is lawfully residing in the U.S. and was a member of a Hmong or Highland Laotian tribe ... during the Vietnam era (beginning August 5, 1964, and ending May 7, 1975)." Listed LPR evidence includes I-94/passport I-551 endorsements, unexpired I-551 cards, an unexpired I-327, and a private bill indicating permanent resident status.
  deferred_outputs:
    - output: us-sc:policies/dss/snap-policy-manual/page-303#hmong_or_highland_laotian_disabled_child_status
      reason: The supplied source fragment ends the disabled-child clause after "if the child was disabled and" without the remaining condition needed to encode that branch faithfully.
rules:
  - name: american_indian_blood_minimum
    kind: parameter
    dtype: Rate
    source: SC DSS SNAP Manual p. 303, American Indian born-in-Canada documentation clause
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-303
              excerpt: "at least 50 per centum American Indian blood"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.50

  - name: child_age_under_threshold
    kind: parameter
    dtype: Integer
    source: SC DSS SNAP Manual p. 303, Hmong or Highland Laotian child clauses
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-303
              excerpt: "under the age of 18"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          18

  - name: student_child_age_under_threshold
    kind: parameter
    dtype: Integer
    source: SC DSS SNAP Manual p. 303, Hmong or Highland Laotian student-child clauses
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-303
              excerpt: "if a full-time student under the age of 22"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          22

  - name: american_indian_born_in_canada_documentation_sufficient
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SC DSS SNAP Manual p. 303, American Indian born-in-Canada documentation clause
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-303
              excerpt: "at least 50 per centum American Indian blood ... birth in Canada"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          certified_american_indian_blood_fraction >= american_indian_blood_minimum
          and has_birth_certificate_or_other_satisfactory_evidence_of_birth_in_canada

  - name: hmong_or_highland_laotian_primary_status
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SC DSS SNAP Manual p. 303, Hmong or Highland Laotian individual clause
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-303
              excerpt: "lawfully residing in the U.S. ... during the Vietnam era (beginning August 5, 1964, and ending May 7, 1975)"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          lawfully_residing_in_us
          and member_of_hmong_or_highland_laotian_tribe_when_tribe_assisted_us_personnel
          and tribe_rendered_assistance_to_us_personnel_by_military_or_rescue_operation_during_vietnam_era

  - name: hmong_or_highland_laotian_family_member_status
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SC DSS SNAP Manual p. 303, Hmong or Highland Laotian spouse and child clauses
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-303
              excerpt: "The spouse; or surviving spouse ... unmarried dependent child ... under the age of 18 or if a full-time student under the age of 22"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          spouse_or_surviving_spouse_of_such_hmong_or_highland_laotian
          or (
            unmarried_dependent_child_of_such_hmong_or_highland_laotian
            and (
              age < child_age_under_threshold
              or (full_time_student and age < student_child_age_under_threshold)
            )
          )
          or (
            unmarried_child_of_deceased_such_hmong_or_highland_laotian
            and dependent_upon_deceased_hmong_or_highland_laotian_at_death
            and (
              age < child_age_under_threshold
              or (full_time_student and age < student_child_age_under_threshold)
            )
          )

  - name: lawful_permanent_resident_documentation_sufficient
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SC DSS SNAP Manual p. 303, lawful permanent resident document list
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-303
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          has_i_94_or_foreign_passport_endorsed_temporary_i_551_or_resident_alien
          or has_unexpired_permanent_resident_card_i_551
          or has_unexpired_conditional_resident_alien_card_i_551
          or has_unexpired_re_entry_permit_i_327
          or has_private_bill_indicating_permanent_resident_status
