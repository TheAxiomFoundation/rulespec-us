format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-204
  summary: |-
    "This requirement only applies to the first time a household is certified following the loss of eligibility for substantial lottery and gambling winnings." If household composition changes, the new or distinct household "would not have to meet the regaining eligibility requirement." "Substantial lottery or gambling winnings are defined as a cash prize equal to or greater than the maximum allowable financial resource limit ... won in a single game before taxes or other withholdings." "An individual will not be eligible for SNAP benefits" if convicted as an adult of listed offenses and not in compliance with sentence terms or Section 7.5 restrictions.
rules:
  - name: household_has_substantial_lottery_or_gambling_winnings
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 204, Substantial Winnings
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-204
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_lottery_or_gambling_cash_prize_allocated_to_snap_household_from_single_game_before_taxes >= maximum_allowable_financial_resource_limit_for_elderly_or_disabled_households

  - name: regaining_eligibility_requirement_applies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 204
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-204
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-204
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_has_substantial_lottery_or_gambling_winnings
          and household_is_first_time_certified_following_loss_of_eligibility_for_substantial_lottery_or_gambling_winnings
          and not household_composition_changed_after_loss_of_eligibility_for_substantial_lottery_or_gambling_winnings

  - name: individual_ineligible_for_snap_due_to_certain_convicted_felon_rule
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual 14.12
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-204
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (
            individual_convicted_as_adult_of_aggravated_sexual_abuse_under_18_usc_2241
            or individual_convicted_as_adult_of_murder_under_18_usc_1111
            or individual_convicted_as_adult_of_offense_under_18_usc_chapter_110
            or individual_convicted_as_adult_of_federal_or_state_offense_involving_sexual_assault_as_defined_in_vawa
            or individual_convicted_as_adult_of_state_law_offense_attorney_general_determined_substantially_similar
          )
          and individual_is_not_in_compliance_with_sentence_terms_or_section_7_5_restrictions
