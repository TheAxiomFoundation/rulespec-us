- name: eligible_household_snap_allotment_excluded
  period: 2026-05
  input:
    us-sc:policies/dss/snap-policy-manual/page-17#input.household_is_eligible_for_snap: true
    us-sc:policies/dss/snap-policy-manual/page-17#input.household_receives_snap_benefit_allotment: true
  output:
    us-sc:policies/dss/snap-policy-manual/page-17#snap_benefit_allotment_excluded_from_income_and_resources: holds
- name: household_without_snap_allotment_not_excluded
  period: 2026-05
  input:
    us-sc:policies/dss/snap-policy-manual/page-17#input.household_is_eligible_for_snap: true
    us-sc:policies/dss/snap-policy-manual/page-17#input.household_receives_snap_benefit_allotment: false
  output:
    us-sc:policies/dss/snap-policy-manual/page-17#snap_benefit_allotment_excluded_from_income_and_resources: not_holds
- name: snap_purchase_exempts_snap_portion_only
  period:
    period_kind: custom
    name: day
    start: '2026-05-30'
    end: '2026-05-30'
  input:
    us-sc:policies/dss/snap-policy-manual/page-17#input.purchase_is_for_eligible_foods_and_made_with_snap_benefits: true
    us-sc:policies/dss/snap-policy-manual/page-17#input.eligible_food_purchase_value: 80
    us-sc:policies/dss/snap-policy-manual/page-17#input.snap_benefits_presented_for_purchase: 50
  output:
    us-sc:policies/dss/snap-policy-manual/page-17#snap_purchase_tax_exempt_amount: 50
- name: disclosure_to_directly_connected_person_is_restricted_category
  period: 2026-05
  input:
    us-sc:policies/dss/snap-policy-manual/page-17#input.information_obtained_from_snap_applicant_or_recipient_household: true
    ? us-sc:policies/dss/snap-policy-manual/page-17#input.disclosure_person_directly_connected_with_food_and_nutrition_act_or_federal_or_means_tested_program_administration_or_enforcement
    : true
  output:
    us-sc:policies/dss/snap-policy-manual/page-17#disclosure_restricted_to_direct_program_administration_or_enforcement: holds
- name: auto_zero_snap_purchase_tax_exempt_amount
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    ? us-sc:policies/dss/snap-policy-manual/page-17#input.disclosure_person_directly_connected_with_food_and_nutrition_act_or_federal_or_means_tested_program_administration_or_enforcement
    : false
    us-sc:policies/dss/snap-policy-manual/page-17#input.eligible_food_purchase_value: 0
    us-sc:policies/dss/snap-policy-manual/page-17#input.household_is_eligible_for_snap: false
    us-sc:policies/dss/snap-policy-manual/page-17#input.household_receives_snap_benefit_allotment: false
    us-sc:policies/dss/snap-policy-manual/page-17#input.information_obtained_from_snap_applicant_or_recipient_household: false
    us-sc:policies/dss/snap-policy-manual/page-17#input.purchase_is_for_eligible_foods_and_made_with_snap_benefits: false
    us-sc:policies/dss/snap-policy-manual/page-17#input.snap_benefits_presented_for_purchase: false
  output:
    us-sc:policies/dss/snap-policy-manual/page-17#snap_purchase_tax_exempt_amount: 0
