format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-164
  summary: |-
    "LIHEAP payments in South Carolina are greater than $20. Therefore, it will only be necessary to establish that the client received LIHEAP within the previous 12 months when establishing eligibility for MUA based on receipt of LIHEAP." The MUA may be given to specified households, including private rental households billed separately, certain households receiving energy assistance, and public housing households charged only excess heating or cooling costs. Households with HUD or FmHA utility payments receive a utility deduction only if heating or cooling costs exceed the utility payment; in that situation, the household must receive the MUA. A household with both an occupied and unoccupied home is entitled to only one utility allowance. The MUA must not be given to specified households unless the household receives LIHEAP. Households billed for some utilities but not incurring heating or cooling costs may receive the BUA.
rules:
  - name: sc_liheap_payment_reference_amount
    kind: parameter
    dtype: Money
    unit: USD
    period: Month
    source: SNAP Manual p.164, LIHEAP note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-164
              excerpt: "LIHEAP payments in South Carolina are greater than $20"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          20

  - name: liheap_receipt_within_previous_12_months_establishes_mua_basis
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual p.164, LIHEAP note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-164
              excerpt: "received LIHEAP within the previous 12 months"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_received_liheap_within_previous_12_months

  - name: hud_or_fmha_utility_payment_household_must_receive_mua
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual p.164, HUD/FmHA utility payment rule
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-164
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_receives_hud_utility_payment_or_fmha_utility_payment
          and household_incurs_heating_or_cooling_costs_exceeding_utility_payment

  - name: private_rental_household_may_receive_mua
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual p.164, MUA may be given item A
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-164
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_in_private_rental_housing
          and (
            household_billed_by_landlord_based_on_individual_usage
            or household_charged_flat_utility_rate_separately_from_rent
          )

  - name: excluded_energy_assistance_household_may_receive_mua
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual p.164, MUA may be given item B
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-164
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_receives_energy_assistance_other_than_liheap_excluded_as_income
          and household_expense_exceeds_energy_assistance_amount

  - name: counted_energy_assistance_household_may_receive_mua
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual p.164, MUA may be given item C
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-164
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_receives_energy_assistance_counted_as_income

  - name: public_housing_excess_heating_or_cooling_household_may_receive_mua
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual p.164, MUA may be given item D
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-164
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_resides_in_public_housing_unit_with_central_utility_meters
          and household_charged_only_for_excess_heating_or_cooling_costs

  - name: household_limited_to_one_utility_allowance_for_occupied_and_unoccupied_homes
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual p.164, one utility allowance note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-164
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_has_occupied_home_and_unoccupied_home

  - name: household_barred_from_mua_unless_liheap
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual p.164, MUA must not be given list
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-164
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not household_received_liheap_within_previous_12_months
          and (
            household_has_no_utility_expenses
            or household_billed_for_some_utilities_but_not_incurring_heating_or_cooling_cost
            or household_primary_heating_or_cooling_cost_included_in_rent_or_mortgage
            or household_uses_only_supplemental_heating_source_for_utility_cost
          )

  - name: household_may_receive_mua
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual p.164, MUA eligibility and exclusions
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-164
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (
            liheap_receipt_within_previous_12_months_establishes_mua_basis
            or hud_or_fmha_utility_payment_household_must_receive_mua
            or private_rental_household_may_receive_mua
            or excluded_energy_assistance_household_may_receive_mua
            or counted_energy_assistance_household_may_receive_mua
            or public_housing_excess_heating_or_cooling_household_may_receive_mua
          )
          and not household_barred_from_mua_unless_liheap

  - name: household_may_receive_bua
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual p.164, Basic Utility Allowance intro
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-164
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_billed_for_some_utilities_but_not_incurring_heating_or_cooling_cost
          and household_incurred_and_billed_for_at_least_two_bua_utilities
