format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-449
  summary: |-
    "Lifetime rights to property Count only if rights can be sold or leased." "Non-homestead property Count equity value unless there is a good faith effort to sell." Licensed vehicles: "Count fair market value over $4650" for one licensed vehicle and for a vehicle driven by a household member under age 18 to work, school, training, or to look for work; for all other licensed vehicles, "Count the higher of either fair market value over $4650 or equity value." Unlicensed vehicles: "Count equity value." These vehicle rules apply unless specifically excluded under Section 10.7 or unless the household is categorically eligible under Section 4.1.
  deferred_outputs:
    - output: us-sc:policies/dss/snap-policy-manual/page-449#vehicle_countable_resource_value_after_exclusions
      reason: Vehicle treatment is subject to exclusions under Section 10.7 and categorical eligibility under Section 4.1, but those cited sources are not available in the supplied context.
    - output: us-sc:policies/dss/snap-policy-manual/page-449#non_vehicle_countable_resource_value_after_exclusions
      reason: Land, personal property, recreational property, and other listed non-liquid resources are countable only if not specifically excluded under Section 10.7, but that cited source is not available in the supplied context.
rules:
  - name: licensed_vehicle_fair_market_value_disregard
    kind: parameter
    dtype: Money
    unit: USD
    period: Month
    source: SNAP Manual page 449, non-liquid resources, vehicles (licensed)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-449
              excerpt: "Count fair market value over $4650."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          4650

  - name: lifetime_rights_to_property_countable
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: SNAP Manual page 449, non-liquid resources, item (iii)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-449
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_lifetime_rights_to_property
          and lifetime_rights_can_be_sold_or_leased

  - name: non_homestead_property_countable
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: SNAP Manual page 449, non-liquid resources, item (iv)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-449
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_non_homestead_property
          and not good_faith_effort_to_sell_non_homestead_property

  - name: non_homestead_property_countable_equity_value
    kind: derived
    entity: Asset
    dtype: Money
    unit: USD
    period: Month
    source: SNAP Manual page 449, non-liquid resources, item (iv)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-449
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if non_homestead_property_countable: asset_equity_value else: 0

  - name: one_licensed_vehicle_countable_value_before_exclusions
    kind: derived
    entity: Asset
    dtype: Money
    unit: USD
    period: Month
    source: SNAP Manual page 449, non-liquid resources, vehicles (licensed), item (a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-449
              excerpt: "a. Count fair market value over $4650."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if asset_is_one_licensed_vehicle: max(0, asset_fair_market_value - licensed_vehicle_fair_market_value_disregard) else: 0

  - name: youth_work_school_training_vehicle_countable_value_before_exclusions
    kind: derived
    entity: Asset
    dtype: Money
    unit: USD
    period: Month
    source: SNAP Manual page 449, non-liquid resources, vehicles (licensed), item (b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-449
              excerpt: "b. Count fair market value over $4650."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if asset_is_licensed_vehicle_driven_by_member_under_age_18_to_work_school_training_or_look_for_work: max(0, asset_fair_market_value - licensed_vehicle_fair_market_value_disregard) else: 0

  - name: other_licensed_vehicle_countable_value_before_exclusions
    kind: derived
    entity: Asset
    dtype: Money
    unit: USD
    period: Month
    source: SNAP Manual page 449, non-liquid resources, vehicles (licensed), item (c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-449
              excerpt: "c. Count the higher of either fair market value over $4650 or equity value."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if asset_is_other_licensed_vehicle: max(max(0, asset_fair_market_value - licensed_vehicle_fair_market_value_disregard), asset_equity_value) else: 0

  - name: unlicensed_vehicle_countable_value_before_exclusions
    kind: derived
    entity: Asset
    dtype: Money
    unit: USD
    period: Month
    source: SNAP Manual page 449, non-liquid resources, vehicles (unlicensed), item (viii)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-449
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if asset_is_unlicensed_vehicle: asset_equity_value else: 0
