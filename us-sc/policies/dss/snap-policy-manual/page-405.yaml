format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-405
  summary: SCCAP "Y" households require an interview and are assigned a 48-month certification
    period. DSS Form 1205 may be registered as a regular SNAP or ESAP application
    when applicable. ESAP households must complete an interview at initial application
    and reapplication, and need not verify additional information to determine eligibility
    unless questionable.
  deferred_outputs:
  - output: us-sc:policies/dss/snap-policy-manual/page-405#sccap_y_certification_period_months
    reason: Generated rule used a local name that collides with a sibling RuleSpec
      export. This output is deferred until it can be encoded with a semantic branch-specific
      name without creating ambiguous sibling imports.
  - output: us-sc:policies/dss/snap-policy-manual/page-405#sccap_y_household_certification_period_months
    reason: Generated rule depends on an output that validation deferred because it
      flattened thresholded, capped, base-limited, or cross-referenced mechanics,
      or borrowed an unrelated same-named section term.
