format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-348
  summary: |-
    “Continuation of Benefits” is continuing a SNAP household’s participation at the level authorized immediately before notice of adverse action if the household requests a fair hearing within the notice period and the certification period has not expired, unless declined. “Countable Months” are months in which an ABAWD received SNAP benefits for the full benefit month while not exempt from the three-month time limit, not fulfilling the ABAWD work requirement, not covered by a waiver, and not meeting an 8% exemption.
rules:
  - name: continuation_of_benefits
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 348, "Continuation of Benefits"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-348
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_requests_fair_hearing_within_notice_of_adverse_action_period
          and household_certification_period_has_not_expired
          and not household_specifically_declines_continued_benefits
  - name: countable_month
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 348, "Countable Months"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-348
              excerpt: "received SNAP benefits for the full benefit month while not: (1) exempt ... (2) fulfilling ... (3) Covered by a waiver ... or (4) meeting an 8% exemption"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_abawd
          and person_received_snap_benefits_for_full_benefit_month
          and not person_exempt_from_three_month_time_limit
          and not person_fulfilling_abawd_work_requirement
          and not person_covered_by_waiver_of_abawd_time_limit
          and not person_meeting_eight_percent_exemption
