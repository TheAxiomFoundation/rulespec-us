format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-203
  summary: |-
    "An elderly or disabled member is a member of a household who: 1) Is age 60 or older OR 2) Meets the definition of disabled under Section 5.1..." "Any household certified to receive SNAP benefits will lose eligibility immediately upon receipt by any individual in the household of substantial lottery or gambling winnings." "Households with substantial lottery or gambling winnings will remain ineligible until they meet the allowable resource limit (less than $4500) ... and income eligibility requirements..."
rules:
  - name: elderly_age_minimum
    kind: parameter
    dtype: Integer
    source: SNAP Manual 14.10, Definition of Elderly or Disabled
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-203
              excerpt: "Is age 60 or older"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          60

  - name: elderly_or_disabled_member
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual 14.10, Definition of Elderly or Disabled
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-203
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_age_in_years >= elderly_age_minimum
          or disabled_under_section_5_1_verification_prior_to_certification

  - name: substantial_winnings_reporting_deadline_day_after_change_month
    kind: parameter
    dtype: Integer
    source: SNAP Manual 14.11, Disqualification for Substantial Lottery or Gambling Winnings
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-203
              excerpt: "by the 10th day following the month the change occurred"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10

  - name: allowable_resource_limit_for_regaining_eligibility
    kind: parameter
    dtype: Money
    unit: USD
    source: SNAP Manual 14.11(1), Regaining Eligibility
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-203
              excerpt: "less than $4500"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          4500

  - name: household_loses_snap_eligibility_due_to_substantial_winnings
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 14.11, Disqualification for Substantial Lottery or Gambling Winnings
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-203
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_certified_to_receive_snap_benefits
          and any_individual_in_household_received_substantial_lottery_or_gambling_winnings

  - name: household_regains_eligibility_after_substantial_winnings
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 14.11(1), Regaining Eligibility
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-203
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-203
              excerpt: "less than $4500"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_had_substantial_lottery_or_gambling_winnings
          and household_resources < allowable_resource_limit_for_regaining_eligibility
          and household_meets_income_eligibility_requirements

  - name: household_remains_ineligible_after_substantial_winnings
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 14.11(1), Regaining Eligibility
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-203
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-203
              excerpt: "less than $4500"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_had_substantial_lottery_or_gambling_winnings
          and (household_resources >= allowable_resource_limit_for_regaining_eligibility
          or not household_meets_income_eligibility_requirements)
