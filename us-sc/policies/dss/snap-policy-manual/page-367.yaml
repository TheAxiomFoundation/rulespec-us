    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Policy Manual Appendix 1, Volume 2 April 2009, Section 2.3 (7)
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-367
              excerpt: "These changes are effective May 1, 2009"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-367
              excerpt: "limited to convictions based on behavior which occurred after August 22, 1996"
    versions:
      - effective_from: '2009-05-01'
        formula: |-
          person_has_conviction_under_section_2_3_7
          and conviction_behavior_occurred_after_disqualification_effective_date
