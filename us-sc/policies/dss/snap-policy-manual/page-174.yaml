format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-174
  summary: |-
    A SNAP household's eligibility for the month of application is determined by considering circumstances for the entire calendar month. Initial certification benefits are prorated from the application date, with no issuance if the computed allotment is less than $10; for residents of a public institution who applied for SSI before release, the initial benefit level is based on the release date.
rules:
  - name: proration_inclusive_day_offset
    kind: parameter
    dtype: Count
    source: SNAP Manual 13.2, prorated benefit formula
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-174
              excerpt: "# of days in month + 1 - application date"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1

  - name: initial_month_minimum_issuance_amount
    kind: parameter
    dtype: Money
    unit: USD
    period: Month
    source: SNAP Manual 13.2, initial month allotment minimum
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-174
              excerpt: "less than $10"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10

  - name: initial_month_of_snap_certification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 13.2, definition of initial month
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-174
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_certified_for_snap_participation_this_month
          and household_was_not_certified_for_snap_participation_during_prior_period

  - name: initial_month_proration_start_day
    kind: derived
    entity: Household
    dtype: Count
    period: Month
    source: SNAP Manual 13.2, initial month proration date and public institution exception
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-174
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if household_consists_of_public_institution_residents_and_applied_for_ssi_prior_to_release: day_of_month_household_released_from_institution else: day_of_month_household_applies_for_benefits

  - name: prorated_initial_month_benefit_before_minimum
    kind: derived
    entity: Household
    dtype: Money
    unit: USD
    period: Month
    source: SNAP Manual 13.2, prorated benefit formula
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-174
              excerpt: "[# of days in month + 1 - application date] x full benefit / # of days in month"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          ((days_in_month + proration_inclusive_day_offset - initial_month_proration_start_day) * full_month_snap_benefit_amount) / days_in_month

  - name: initial_month_snap_issuance_amount
    kind: derived
    entity: Household
    dtype: Money
    unit: USD
    period: Month
    source: SNAP Manual 13.2, prorated initial month benefit and less-than-$10 nonissuance rule
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-174
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-174
              excerpt: "less than $10"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if prorated_initial_month_benefit_before_minimum < initial_month_minimum_issuance_amount: 0 else: prorated_initial_month_benefit_before_minimum
