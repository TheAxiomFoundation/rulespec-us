format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-172
  summary: |-
    "Prospective eligibility is the use of anticipated and/or actual income and circumstances to determine eligibility for the benefit month." To determine representative income, the Agency verifies income received in the past 30 days / four current consecutive weeks before the file date, uses income receipt date, and disregards any non-representative week(s) income with documentation.
rules:
  - name: representative_income_payment_in_sample
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: SNAP Manual ch. 13.1(A)-(B), page 172
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-172
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-172
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          payment_is_income
          and payment_received_in_four_current_consecutive_weeks_prior_to_file_date
          and payment_received_date_used_not_pay_period_ending_date
          and payment_week_income_is_representative

  - name: nonrepresentative_week_income_disregarded
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: SNAP Manual ch. 13.1(B), page 172
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-172
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          payment_is_income
          and payment_received_in_four_current_consecutive_weeks_prior_to_file_date
          and not payment_week_income_is_representative

  - name: prospective_ineligibility_requires_case_closure
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual ch. 13.1, page 172
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-172
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          prospective_ineligibility_is_determined
