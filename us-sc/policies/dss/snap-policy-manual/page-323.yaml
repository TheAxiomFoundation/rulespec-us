format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-323
  summary: |-
    "If the 30th day falls on a weekend or holiday, the household will have until the next business day to provide the information." "If the 30th day falls on a weekend or holiday, the worker has until the last business day prior to the 30th day to process the case and still be timely." "The household must be given at least 10 days to submit verification."
rules:
  - name: verification_minimum_submission_days
    kind: parameter
    dtype: Count
    period: Day
    source: SNAP Manual page 323
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-323
              excerpt: "at least 10 days to submit verification"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10

  - name: thirtieth_day_weekend_or_holiday_information_extension_applies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: SNAP Manual page 323
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-323
              excerpt: "If the 30th day falls on a weekend or holiday"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-323
              excerpt: "until the next business day to provide the information"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          thirtieth_day_falls_on_weekend_or_holiday
          and day_is_next_business_day_after_thirtieth_day

  - name: timely_case_processing_on_prior_business_day_applies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: SNAP Manual page 323
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-323
              excerpt: "If the 30th day falls on a weekend or holiday"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-323
              excerpt: "until the last business day prior to the 30th day to process the case and still be timely"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          thirtieth_day_falls_on_weekend_or_holiday
          and day_is_last_business_day_prior_to_thirtieth_day

  - name: verification_submission_period_satisfies_minimum
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: SNAP Manual page 323
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-323
              excerpt: "The household must be given at least 10 days to submit verification."
          - path: versions[0].formula
            kind: import
            import:
              target: us-sc:policies/dss/snap-policy-manual/page-323#verification_minimum_submission_days
              output: verification_minimum_submission_days
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          verification_submission_days_allowed >= verification_minimum_submission_days
