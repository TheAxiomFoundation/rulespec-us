format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-378
  summary: |-
    SNAP Tool Kit Attachment 5: Annual Recertification Chart: A correction was made ... to indicate that if the client provides verification within 30 days from the date the form was received or 10 days from the date the verification was requested, he/she is entitled to a full allotment.
rules:
  - name: client_entitled_to_full_allotment_after_untimely_annual_recertification
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Tool Kit Attachment 5, Annual Recertification Chart correction
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-378
              excerpt: "if the client provides verification within 30 days from the date the form was received or 10 days from the date the verification was requested, he/she is entitled to a full allotment"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          untimely_annual_recertification_interview_reached_client_but_incomplete
          and (
            verification_provided_within_30_days_from_form_received
            or verification_provided_within_10_days_from_verification_requested
          )
