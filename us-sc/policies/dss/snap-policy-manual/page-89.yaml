format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-89
  summary: |-
    After 12 months, the Agency must not deem the batterer's income and resources if the battery is recognized by a court or the USCIS and has a substantial connection to the need for benefits, and the non-citizen does not live with the batterer. A sponsored non-citizen child under 18 years of age of a sponsored non-citizen and a citizen child under age 18 of a sponsored non-citizen are listed. During deeming, the eligible sponsored non-citizen must obtain sponsor cooperation and provide information needed to calculate deemed income and resources. Until required information or verification is provided, the sponsored non-citizen is ineligible.
  deferred_outputs:
    - output: us-sc:policies/dss/snap-policy-manual/page-89#remaining_household_members_income_and_resources_determined_with_ineligible_non_citizen
      reason: The source directs the Agency to determine eligibility and benefit level for remaining household members in accordance with Section 14.2, but that cited source was not provided.
    - output: us-sc:policies/dss/snap-policy-manual/page-89#other_adult_household_members_responsible_for_refused_sponsor_verification
      reason: The source assigns responsibility to other adult household members in accordance with Section 3.5 when the sponsored non-citizen refuses to cooperate, but that cited source was not provided.
rules:
  - name: battery_exception_after_months
    kind: parameter
    dtype: Count
    source: SNAP Manual page 89, battered individual deeming exception
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-89
              excerpt: "After 12 months"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          12

  - name: agency_must_not_deem_batterer_income_and_resources_after_battery_exception
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 89, battered individual deeming exception after 12 months
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-89
          - path: versions[0].formula
            kind: import
            import:
              target: us-sc:policies/dss/snap-policy-manual/page-89#battery_exception_after_months
              output: battery_exception_after_months
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          months_since_battered_individual_exception_began >= battery_exception_after_months
          and battery_recognized_by_court_or_uscis
          and battery_has_substantial_connection_to_need_for_benefits
          and not non_citizen_lives_with_batterer

  - name: sponsored_non_citizen_child_under_age_of_sponsored_non_citizen
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 89, item (F)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-89
              excerpt: "A sponsored non-citizen child under 18 years of age of a sponsored non-citizen."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_sponsored_non_citizen_child_under_age_18
          and person_is_child_of_sponsored_non_citizen

  - name: citizen_child_under_age_of_sponsored_non_citizen
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 89, item (G)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-89
              excerpt: "A citizen child under age 18 of a sponsored non-citizen."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_citizen_child_under_age_18
          and person_is_child_of_sponsored_non_citizen

  - name: sponsored_non_citizen_ineligible_while_deeming_verification_missing
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 89, Awaiting verification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-89
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_sponsored_non_citizen
          and information_or_verification_required_to_calculate_deemed_income_and_resources_is_missing
