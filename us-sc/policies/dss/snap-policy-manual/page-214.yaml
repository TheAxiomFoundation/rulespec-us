format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-214
  summary: |-
    "Follow Advance Notice (Notice of Adverse Action) requirements if benefits decrease." "Children remain in the home and all adults are deceased: Close the case and send CHIP Notice C320..." If a household failed to report a required change and received benefits to which it was not entitled, the Agency will file a claim; no claim lies for a change not required to be reported, and individuals are not disqualified unless disqualified under IPV procedures.
rules:
  - name: advance_notice_requirements_apply_if_benefits_decrease
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 214
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-214
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          benefits_decrease
  - name: case_closure_required_when_children_remain_and_all_adults_deceased
