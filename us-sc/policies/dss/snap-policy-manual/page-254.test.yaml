- name: reasonable_monthly_installment_request_must_be_honored
  period: 2026-05
  input:
    ? us-sc:policies/dss/snap-policy-manual/page-254#input.household_makes_reasonable_request_to_restore_lost_benefits_in_monthly_installments
    : true
  output:
    us-sc:policies/dss/snap-policy-manual/page-254#monthly_installment_restoration_request_must_be_honored: holds
- name: changed_household_with_majority_members_receives_restoration
  period: 2026-05
