format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-301
  summary: |-
    "Verification of U.S. citizenship is not required unless U.S. citizenship is questionable." If questionable, listed documents may verify U.S. citizenship, including birth certificates for stated U.S. places and dates, non-limited U.S. passports, reports or certifications of birth abroad, and certificates of naturalization or citizenship. "Citizens of the Marshall Islands, Micronesia, and Palau are not eligible for federal public assistance."
rules:
  - name: us_citizenship_verification_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 301, Acceptable Verification of U.S. Citizenship
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-301
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          us_citizenship_is_questionable

  - name: birth_certificate_acceptable_us_citizenship_verification
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 301, Acceptable Verification of U.S. Citizenship, birth certificate item
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-301
              excerpt: "Birth certificate showing birth in one of the 50 States, the District of Columbia, Puerto Rico (on or after 01/13/1941), Guam, the U.S. Virgin Islands (on or after 01/17/1917), American Samoa, Swain's Island, or the Northern Mariana Islands, unless the person was born to foreign diplomats residing in the U.S."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          has_birth_certificate_showing_qualifying_us_birthplace
          and not born_to_foreign_diplomats_residing_in_us

  - name: passport_acceptable_us_citizenship_verification
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 301, Acceptable Verification of U.S. Citizenship, United States passport item
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-301
              excerpt: "United States passport (except limited passports, which are issued for periods of less than five years)"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          has_united_states_passport
          and not passport_is_limited

  - name: birth_abroad_document_acceptable_us_citizenship_verification
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 301, Acceptable Verification of U.S. Citizenship, birth abroad document items
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-301
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          has_report_of_birth_abroad_of_us_citizen_fs_240
          or has_certification_of_birth_fs_545
          or has_certification_of_report_of_birth_ds_1350

  - name: naturalization_or_citizenship_certificate_acceptable_us_citizenship_verification
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 301, Acceptable Verification of U.S. Citizenship, naturalization and citizenship certificate items
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-301
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          has_certificate_of_naturalization_n_550_or_n_570
          or has_certificate_of_citizenship_n_560_or_n_561

  - name: acceptable_us_citizenship_verification_document
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 301, Acceptable Verification of U.S. Citizenship
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-301
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          birth_certificate_acceptable_us_citizenship_verification
          or passport_acceptable_us_citizenship_verification
          or birth_abroad_document_acceptable_us_citizenship_verification
          or naturalization_or_citizenship_certificate_acceptable_us_citizenship_verification

  - name: federal_public_assistance_bar_due_to_island_citizenship
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 301, note under Acceptable Verification of U.S. Citizenship and U.S. Non-Citizen Nationals
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-301
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          citizen_of_marshall_islands
          or citizen_of_micronesia
          or citizen_of_palau
