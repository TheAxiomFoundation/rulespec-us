format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-105
  summary: |-
    "An individual is ineligible to participate in SNAP if 60 days before applying for SNAP benefits or at any time thereafter" the individual voluntarily and without good cause quits a job of 30 hours a week or more, or voluntarily and without good cause reduces work effort and after the reduction is working less than 30 hours per week. The voluntary quit provision also covers employment with weekly earnings at least equivalent to the Federal minimum wage multiplied by 30 hours, excludes termination of self-employment or resignation at employer demand, treats dismissal for a government strike as voluntary quit without good cause, and does not disqualify an earlier quit followed by comparable new employment that is later lost through no fault. A reduction does not apply if post-reduction weekly wages exceed Federal minimum wage multiplied by 30 hours.
rules:
  - name: voluntary_quit_lookback_days
    kind: parameter
    dtype: Integer
    period: Day
    source: SNAP Manual 8.11(1)-(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-105
              excerpt: "60 days before applying for SNAP benefits or at any time thereafter"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          60

  - name: snap_work_hours_threshold_per_week
    kind: parameter
    dtype: Integer
    period: Week
    source: SNAP Manual 8.11(1)-(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-105
              excerpt: "30 hours a week or more"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: quit_occurred_in_voluntary_quit_period
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual 8.11(1)-(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-105
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-105
              excerpt: "60 days before applying for SNAP benefits or at any time thereafter"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          quit_occurred_after_application
          or days_between_quit_and_application <= voluntary_quit_lookback_days

  - name: employment_covered_by_voluntary_quit_provision
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual 8.11(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-105
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-105
              excerpt: "30 hours or more per week or provided weekly earnings at least equivalent to the Federal minimum wage multiplied by 30 hours"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          quit_job_hours_per_week >= snap_work_hours_threshold_per_week
          or quit_job_weekly_earnings_at_least_federal_minimum_wage_times_30_hours

  - name: voluntary_quit_without_good_cause
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual 8.11(1)-(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-105
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-105
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_voluntarily_quit_job
          and quit_without_good_cause
          and quit_occurred_in_voluntary_quit_period
          and employment_covered_by_voluntary_quit_provision
          and not quit_was_self_employment_termination
          and not resignation_was_at_employer_demand
          and not quit_followed_by_comparable_employment_later_lost_through_no_fault

  - name: government_strike_dismissal_treated_as_voluntary_quit_without_good_cause
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual 8.11(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-105
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          government_employee_participated_in_strike_against_government
          and dismissed_from_job_because_of_strike_participation

  - name: reduction_occurred_in_voluntary_quit_period
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual 8.11(1), 8.11(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-105
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-105
              excerpt: "60 days prior to the date of application or anytime thereafter"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          reduction_occurred_after_application
          or days_between_reduction_and_application <= voluntary_quit_lookback_days

  - name: reduction_of_work_effort_without_good_cause
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual 8.11(1), 8.11(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-105
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-105
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-105
              excerpt: "less than 30 hours per week"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_voluntarily_reduced_work_effort
          and reduction_without_good_cause
          and reduction_occurred_in_voluntary_quit_period
          and pre_reduction_hours_per_week >= snap_work_hours_threshold_per_week
          and post_reduction_hours_per_week < snap_work_hours_threshold_per_week
          and not post_reduction_weekly_wages_exceed_federal_minimum_wage_times_30_hours

  - name: individual_ineligible_for_snap_due_to_voluntary_quit_or_reduction
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual 8.11(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-105
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_is_subject_to_snap_work_requirements
          and not individual_exempt_from_snap_work_requirements
          and (
            voluntary_quit_without_good_cause
            or government_strike_dismissal_treated_as_voluntary_quit_without_good_cause
            or reduction_of_work_effort_without_good_cause
          )
