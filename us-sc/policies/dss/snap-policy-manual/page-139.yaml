format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-139
  summary: |-
    "If no income is listed on Line 3 of Schedule 1 of Form 1040, use the income from Line 3 of Schedule SE." For legally incorporated businesses that are "S Corporations", income is treated as self-employment income and annualized, computed from Form 1120-S line 1c, adding line 5 if listed, and applying the client's ownership percentage.
rules:
  - name: contracted_employment_self_employment_income
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: USD
    source: SNAP Manual p.139, Contracted Employment (Sub-contract)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-139
              excerpt: "If no income is listed on Line 3 of Schedule 1 of Form 1040, use the income from Line 3 of Schedule SE."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if schedule_1_form_1040_line_3_income_listed: schedule_1_form_1040_line_3_income else: schedule_se_line_3_income

  - name: s_corporation_annualized_self_employment_income
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: USD
    source: SNAP Manual p.139, incorporated S Corporation self-employment income
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-139
              excerpt: "income from the \"S Corporation\" will be treated as self-employment income and annualized"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-139
              excerpt: "Form 1120-S ... line 1c (add line 5 if an amount is listed) and ... percentage the client owns"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if business_is_legally_incorporated and business_is_s_corporation: (form_1120_s_line_1c_income + (if form_1120_s_line_5_amount_listed: form_1120_s_line_5_income else: 0)) * client_ownership_percentage else: 0
