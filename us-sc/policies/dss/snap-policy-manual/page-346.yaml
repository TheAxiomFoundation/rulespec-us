format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-346
  summary: |-
    Adoptive Parent means an individual who becomes a parent to a child through adoption and legally takes on all responsibilities and rights of being a parent to a child who is not biologically related to the individual. Applicant means a household member who filed an application for SNAP benefits and whose application has not been disposed of by an Agency eligibility or ineligibility finding. Approval is case action taken to authorize SNAP benefits when all eligibility criteria are met.
rules:
  - name: adoptive_parent
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 346, "Adoptive Parent"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-346
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_became_parent_to_child_through_adoption
          and person_legally_takes_parental_responsibilities_and_rights_for_child
          and child_not_biologically_related_to_person

  - name: applicant
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 346, "Applicant"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-346
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_household_member
          and application_form_for_snap_benefits_has_been_filed_by_member_or_authorized_representative
          and not agency_has_disposed_of_application_by_eligible_or_ineligible_finding

  - name: approval
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 346, "Approval"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-346
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          agency_case_action_authorizes_snap_benefits
          and all_snap_eligibility_criteria_are_met
