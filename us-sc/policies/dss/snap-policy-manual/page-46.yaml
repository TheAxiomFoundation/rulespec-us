format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-46
  summary: |-
    "These individuals are subject to all SNAP eligibility and benefits provisions and cannot be reinstated in SNAP on the basis of categorical eligibility provisions." "Any such individual who is not exempt from work registration is subject to the other work requirements in Section 8.1 Work Requirements." "Individuals authorized to receive TANF or SSI benefits but who have not yet received payment are considered recipients of benefits from those programs."
rules:
  - name: person_barred_from_categorical_eligibility_reinstatement
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 46, Section 4.3(C)-(H)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-46
              excerpt: "cannot be reinstated in SNAP on the basis of categorical eligibility provisions"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_disqualified_for_failure_to_provide_or_apply_for_ssn_under_section_7_2
          or person_institutionalized_in_nonexempt_facility
          or person_ineligible_for_failure_to_comply_with_work_requirement_under_section_8_1
          or person_disqualified_for_intentional_program_violation
          or person_refuses_to_cooperate_in_providing_eligibility_information_to_agency
          or person_household_ineligible_under_striker_provisions

  - name: categorically_eligible_household_member_subject_to_other_work_requirements
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 46, Section 4.3 note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-46
              excerpt: "not exempt from work registration is subject to the other work requirements"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_in_categorically_eligible_household
          and not person_exempt_from_work_registration_under_section_8_2

  - name: person_considered_tanf_or_ssi_recipient_despite_nonpayment
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 46, Section 4.4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-46
              excerpt: "authorized to receive TANF or SSI benefits but who have not yet received payment"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-46
              excerpt: "will not consider as recipients ... Medicaid only"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (
            person_authorized_to_receive_tanf_or_ssi_benefits_but_payment_not_yet_received
            or person_tanf_or_ssi_benefits_suspended_or_recouped
            or person_entitled_to_tanf_or_ssi_benefits_but_not_paid_because_grant_less_than_minimum_benefit
          )
          and not person_entitled_to_medicaid_only_without_receiving_tanf_or_ssi_benefits
