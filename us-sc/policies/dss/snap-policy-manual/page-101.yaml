format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-101
  summary: |-
    If loss or denial of TANF or unemployment compensation benefits resulted from an individual's refusal or failure without good cause to comply with a work requirement, the individual must be disqualified, except where the non-complying individual meets a work registration exemption other than exemptions (E) or (H). For SNAP work requirement noncompliance, disqualification periods are one month for the first occurrence, three months for the second occurrence, and six months for the third or subsequent occurrence, each lasting until the individual agrees to comply.
rules:
  - name: first_occurrence_snap_work_noncompliance_disqualification_months
    kind: parameter
    dtype: Count
    period: Month
    source: SNAP Manual section 8.6(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-101
              excerpt: "first occurrence ... One Month"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1

  - name: second_occurrence_snap_work_noncompliance_disqualification_months
    kind: parameter
    dtype: Count
    period: Month
    source: SNAP Manual section 8.6(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-101
              excerpt: "second occurrence ... Three Months"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          3

  - name: third_or_subsequent_occurrence_snap_work_noncompliance_disqualification_months
    kind: parameter
    dtype: Count
    period: Month
    source: SNAP Manual section 8.6(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-101
              excerpt: "third or subsequent occurrence ... Six Months"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          6

  - name: snap_work_noncompliance_disqualification_months
    kind: derived
    entity: Person
    dtype: Count
    period: Month
    source: SNAP Manual section 8.6
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-101
          - path: versions[0].formula
            kind: import
            import:
              target: us-sc:policies/dss/snap-policy-manual/page-101#first_occurrence_snap_work_noncompliance_disqualification_months
              output: first_occurrence_snap_work_noncompliance_disqualification_months
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-sc:policies/dss/snap-policy-manual/page-101#second_occurrence_snap_work_noncompliance_disqualification_months
              output: second_occurrence_snap_work_noncompliance_disqualification_months
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-sc:policies/dss/snap-policy-manual/page-101#third_or_subsequent_occurrence_snap_work_noncompliance_disqualification_months
              output: third_or_subsequent_occurrence_snap_work_noncompliance_disqualification_months
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if snap_work_noncompliance_occurrence_count == 1: first_occurrence_snap_work_noncompliance_disqualification_months else: if snap_work_noncompliance_occurrence_count == 2: second_occurrence_snap_work_noncompliance_disqualification_months else: third_or_subsequent_occurrence_snap_work_noncompliance_disqualification_months

  - name: disqualified_for_snap_work_noncompliance
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual section 8.6
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-101
              excerpt: "disqualified for ... and until ... agrees to comply"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          failed_to_comply_with_snap_work_requirement
          and disqualification_period_has_not_expired_or_individual_has_not_agreed_to_comply

  - name: disqualified_for_unemployment_compensation_work_requirement_noncompliance
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 101, paragraph before section 8.6
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-101
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          loss_or_denial_of_unemployment_compensation_benefits_resulted_from_refusal_or_failure_without_good_cause_to_comply_with_unemployment_compensation_work_requirement
          and not individual_meets_work_registration_exemption_other_than_e_or_h

  - name: disqualified_for_tanf_work_requirement_noncompliance
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 101, paragraph before section 8.6
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-101
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          loss_or_denial_of_tanf_benefits_resulted_from_refusal_or_failure_without_good_cause_to_comply_with_tanf_work_requirement
          and not individual_meets_work_registration_exemption_other_than_e_or_h

  - name: snap_recipient_regains_snap_eligibility_after_tanf_noncompliance
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 101, paragraph before section 8.6
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-101
              excerpt: "must comply with TANF work requirements or become exempt from TANF to become eligible for SNAP"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          snap_recipient_failed_to_comply_with_tanf_work_requirements
          and (individual_complies_with_tanf_work_requirements or individual_becomes_exempt_from_tanf)

  - name: fair_hearing_right_for_work_requirement_noncompliance_snap_denial_or_termination
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 101, paragraph before section 8.6
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-101
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          agency_determination_of_tanf_or_unemployment_compensation_work_requirement_noncompliance_leads_to_denial_or_termination_of_individual_snap_benefits
