format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-84
  summary: |-
    Individuals have “adjusted status to LPR” when they have received an approval notice and Permanent Resident Card from USCIS. SNAP-eligible Categories are Lawful Permanent Resident (LPR), Cuban and Haitian entrant (CHE), or Compacts of Free Association (COFA) citizen. These non-citizens are exempt from the five-year U.S. residency and are eligible immediately without a waiting period.
rules:
  - name: adjusted_status_to_lpr
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 84, adjusted status to LPR
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-84
              excerpt: received an approval notice and Permanent Resident Card (Green Card) from USCIS
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          received_uscis_approval_notice
          and received_uscis_permanent_resident_card

  - name: pending_adjustment_not_lpr
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 84, pending adjustment status
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-84
              excerpt: applied to adjust status and have not yet received a decision
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          applied_to_adjust_status
          and not received_adjustment_decision

  - name: in_snap_eligible_non_citizen_category
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 84, SNAP-eligible categories
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-84
              excerpt: Lawful Permanent Resident (LPR), Cuban and Haitian entrant (CHE), or Compacts of Free Association (COFA) citizen
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          is_lawful_permanent_resident
          or is_cuban_haitian_entrant
          or is_compacts_of_free_association_citizen

  - name: exempt_from_five_year_residency_and_immediately_snap_eligible
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 84, five-year residency exemption
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-84
              excerpt: exempt from the five-year U.S. residency and are eligible immediately without a waiting period
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          in_snap_eligible_non_citizen_category
          and (receives_blindness_or_disability_benefits_or_assistance
          or is_under_age_eighteen_and_lawfully_resides_in_us_as_qualified_non_citizen
          or lawfully_resided_in_us_on_august_22_1996_as_qualified_non_citizen_and_born_on_or_before_august_22_1931
          or is_lpr_age_eighteen_or_older_with_forty_qualifying_work_quarters
          or has_qualifying_military_connection)

  - name: qualifying_military_connection
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 84, military connection
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-84
              excerpt: Veteran who was honorably discharged ... or An individual on active duty in the Armed Forces
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (veteran_honorably_discharged_for_reasons_other_than_non_citizen_status
          and fulfills_minimum_active_duty_service_requirements)
          or died_in_active_military_naval_or_air_service
          or active_duty_in_us_armed_forces_other_than_training
