format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-267
  summary: |-
    Inadvertent household error claims result from a misunderstanding or unintentional error by a household that otherwise complies with SNAP requirements. These claims occur when a household fails to report a required change due to lack of understanding or inadvertent error, or unintentionally fails to report circumstances correctly. An IPV claim is for an overpayment or trafficking resulting from a person intentionally misrepresenting, concealing, withholding facts, making a false or misleading statement, or committing an act violating the Food and Nutrition Act, SNAP regulations, or state statutes relating to SNAP benefits. A claim cannot be assigned as IPV unless an ADH determined that a household member committed an IPV.
rules:
  - name: inadvertent_household_error_claim
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual p.267, Inadvertent household error (CL) claims
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-267
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_otherwise_complies_with_snap_requirements
          and (
            household_failed_to_report_required_change_due_to_lack_of_understanding_or_inadvertent_error
            or household_unintentionally_failed_to_report_circumstances_correctly
          )

  - name: person_intentionally_committed_snap_violation
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p.267, Intentional Program Violation
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-267
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_intentionally_misrepresented_concealed_withheld_facts_or_made_false_or_misleading_statement
          or person_intentionally_committed_act_violating_food_and_nutrition_act_snap_regulations_or_state_snap_benefit_statute

  - name: intentional_program_violation_claim_assignable
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p.267, IPV claim assignment condition
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-267
          - path: versions[0].formula
            kind: import
            import:
              target: us-sc:policies/dss/snap-policy-manual/page-267#person_intentionally_committed_snap_violation
              output: person_intentionally_committed_snap_violation
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_intentionally_committed_snap_violation
          and administration_disqualification_hearing_determined_household_member_committed_ipv
