format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-20
  summary: |-
    SCDSS will inform participant and applicant households of their SNAP rights and responsibilities. SNAP informational material will be available in languages other than English as required and will state that SNAP is available without regard to listed protected grounds. The Agency will not discriminate against any applicant or participant in any aspect of SNAP administration for those grounds. Individuals who believe they have been subject to discrimination may file a written or oral complaint; verbal complaints by individuals unable or reluctant to write are documented in writing by the Agency employee.
rules:
  - name: applicant_or_participant_nondiscrimination_protection
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual 1.5 SNAP Nondiscrimination Compliance
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-20
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_snap_applicant_or_participant
          and snap_administration_action_is_at_issue
          and action_is_for_age_race_color_sex_disability_religious_creed_national_origin_or_political_beliefs
  - name: discrimination_complaint_may_be_filed
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual 1.5 SNAP Nondiscrimination Compliance
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-20
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_believes_subject_to_snap_discrimination
          and (complaint_is_written or complaint_is_oral)
  - name: verbal_discrimination_complaint_must_be_documented
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual 1.5 SNAP Nondiscrimination Compliance
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-20
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          complainant_makes_discrimination_allegations_verbally
          and complainant_is_unable_or_reluctant_to_put_allegations_in_writing
          and agency_employee_documents_complaint_in_writing
  - name: household_rights_and_responsibilities_information_requirement_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 1.4(2) Rights and responsibilities
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-20
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_is_snap_applicant_or_participant
          and household_is_informed_of_snap_rights_and_responsibilities
