format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-37
  summary: |-
    "In the instance of a limited English proficiency (LEP) household or special needs ... the authorized representative may not be used in lieu of a qualified interpreter." "An authorized representative may be designated to obtain benefits ... The name of the authorized representative must be recorded in the household's case file." "A household may allow any household member or authorized representative to use its SNAP benefits to purchase food or meals for the household." "Agency employees who are involved in the certification or issuance processes and retailers who are authorized to accept SNAP benefits may not act as authorized representatives without the specific written approval of the respective County Director ... and only if that County Director determines that no one else is available to serve as an authorized representative."
  deferred_outputs:
    - output: us-sc:policies/dss/snap-policy-manual/page-37#daa_or_gla_authorized_representative_benefit_use_requirement_satisfied
      reason: The operative subject is a Drug Addiction or Alcoholic treatment center or Group Living Arrangement acting as an authorized representative, but the supported RuleSpec entities do not include a facility or organization entity; Sections 14.3 and 14.4 are also not provided for the cross-referenced facility rules.
rules:
  - name: authorized_representative_interpreter_substitution_requirement_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 37, NOTE on LEP or special needs households
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-37
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (
            not household_has_limited_english_proficiency
            and not household_has_special_needs
          )
          or not authorized_representative_used_in_lieu_of_qualified_interpreter

  - name: benefit_obtaining_representative_name_recording_requirement_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 37, paragraph (2) Obtaining SNAP benefits
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-37
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not authorized_representative_designated_to_obtain_snap_benefits
          or authorized_representative_name_recorded_in_case_file

  - name: person_may_use_snap_benefits_for_household_food_or_meals
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 37, paragraph (3) Using SNAP benefits
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-37
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (
            person_is_household_member
            or person_is_authorized_representative
          )
          and snap_benefits_used_to_purchase_food_or_meals_for_household

  - name: authorized_representative_designation_restriction_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 37, paragraph (4)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-37
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_agency_employee_involved_in_certification_or_issuance_processes
          or person_is_retailer_authorized_to_accept_snap_benefits

  - name: person_may_act_as_authorized_representative_for_application_processing_or_obtaining_benefits
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 37, paragraph (4)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-37
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not authorized_representative_designation_restriction_applies
          or (
            county_director_specific_written_approval_for_household_county
            and county_director_determines_no_one_else_available_to_serve
          )
