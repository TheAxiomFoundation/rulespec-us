format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-175
  summary: |-
    "In the case of migrant and seasonal farmworker households, the term 'initial month' means the first month for which the household is certified for participation in SNAP following any period of more than 1 month during which the household was not certified for participation." Recertification is based on anticipated circumstances; timely eligible recertification is not an initial month and benefits are not prorated. Certain late or ineligible recertification paths are initial months, and anticipated changes may make a household eligible in one month and ineligible in the next.
rules:
  - name: migrant_or_seasonal_farmworker_initial_month
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 175, initial month exception
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-175
              excerpt: "following any period of more than 1 month during which the household was not certified"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_is_migrant_or_seasonal_farmworker
          and first_month_certified_for_snap_after_period_of_more_than_one_month_not_certified

  - name: timely_recertification_month_not_initial
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 175, recertification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-175
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_submits_recertification_application_prior_to_end_of_certification_period
          and household_found_eligible_for_first_month_following_end_of_certification_period

  - name: timely_recertification_benefits_not_prorated
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 175, recertification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-175
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          timely_recertification_month_not_initial

  - name: expired_certification_reapplication_initial_application
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 175, recertification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-175
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          application_submitted_after_certification_period_expired
          and not household_is_migrant_or_seasonal_farmworker

  - name: expired_certification_reapplication_benefits_prorated
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 175, recertification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-175
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          expired_certification_reapplication_initial_application

  - name: subsequent_participation_initial_month_after_ineligible_recertification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 175, recertification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-175
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_submits_recertification_application_prior_to_end_of_certification_period
          and household_found_ineligible_for_first_month_following_end_of_certification_period
          and month_is_first_month_of_subsequent_participation

  - name: entitled_to_application_month_benefits_despite_subsequent_ineligibility
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 175, anticipated changes
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-175
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_eligible_for_month_of_application
          and household_ineligible_in_subsequent_month_because_of_anticipated_changes

  - name: same_application_used_for_subsequent_month_eligibility_determination
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 175, anticipated changes
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-175
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_ineligible_for_month_of_application
          and household_eligible_in_subsequent_month_because_of_anticipated_changes

  - name: allotment_may_differ_due_to_anticipated_changes
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 175, changes in allotment levels
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-175
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          anticipated_changes_affect_household_allotment_between_application_month_and_subsequent_months
