format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-86
  summary: |-
    Non-citizens who are no longer eligible to receive SNAP by virtue of listed statuses may be eligible if their status adjusts to LPR. When certification or recertification personnel know a household member is present in the U.S. in violation of the INA and ineligible for SNAP on that basis, the Agency must inform USCIS. Inability or unwillingness to provide non-citizen status documentation requires classification as an ineligible non-citizen and stops further documentation efforts. A sponsored non-citizen is one for whom a sponsor executed USCIS Form I-864 or I-864A.
rules:
  - name: listed_status_no_longer_confers_snap_eligibility_without_lpr_adjustment
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 86, listed non-citizen statuses
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-86
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_granted_parole_under_afghanistan_supplemental_appropriations_act
          or person_granted_asylum_under_ina_208_b
          or person_deportation_or_removal_withheld_under_ina
          or person_paroled_under_ina_212_d_5_for_at_least_one_year
          or person_admitted_as_refugee_under_ina_207
          or person_granted_parole_under_additional_ukraine_supplemental_appropriations_act

  - name: may_be_eligible_if_status_adjusts_to_lpr
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 86, status adjustment to LPR
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-86
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          listed_status_no_longer_confers_snap_eligibility_without_lpr_adjustment
          and person_status_adjusted_to_lpr

  - name: known_unlawful_presence_for_reporting
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 86, “Knowing” unlawful presence standard
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-86
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          unlawful_presence_finding_made_as_part_of_formal_determination_subject_to_administrative_review
          and unlawful_presence_finding_supported_by_uscis_or_eoir_determination

  - name: agency_must_inform_uscis
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 86, reporting illegal non-citizens
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-86
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          certification_or_recertification_personnel_determined_member_ineligible_for_snap_because_present_in_us_in_violation_of_ina
          and known_unlawful_presence_for_reporting

  - name: ineligible_non_citizen_due_to_missing_status_documentation
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 86, inability or unwillingness to provide non-citizen status documentation
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-86
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_indicates_inability_or_unwillingness_to_provide_non_citizen_status_documentation

  - name: agency_must_not_continue_documentation_efforts
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 86, documentation efforts after inability or unwillingness
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-86
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_indicates_inability_or_unwillingness_to_provide_non_citizen_status_documentation

  - name: sponsored_non_citizen
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 86, households containing sponsored non-citizen members
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-86
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          sponsor_executed_affidavit_of_support_under_ina_213a_form_i_864_for_person
          or sponsor_executed_contract_between_sponsor_and_household_member_form_i_864a_for_person
