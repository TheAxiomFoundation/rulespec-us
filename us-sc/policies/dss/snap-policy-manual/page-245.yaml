format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-245
  summary: |-
    The Agency is responsible for investigating alleged IPV cases and initiating administrative disqualification hearings or court referrals when it has sufficient documentary evidence of IPV. The Agency conducts ADHs when prosecution is not warranted, declined, or withdrawn after no timely action. The Agency will not initiate an ADH while the case is currently being referred for prosecution or after prosecutor/court action on the same or related facts. If it neither initiates disqualification procedures nor refers a suspected IPV over-issuance for prosecution, it collects the over-issuance as an inadvertent household error claim. Collection and IPV disqualification are separate issues.
  deferred_outputs:
    - output: us-sc:policies/dss/snap-policy-manual/page-245#administrative_disqualification_or_prosecution_initiation_supported
      reason: Requires determining whether the individual intentionally made one or more acts of IPV as defined in Section 20.2, which is cited but not available as RuleSpec context.
    - output: us-sc:policies/dss/snap-policy-manual/page-245#overissuance_collected_as_inadvertent_household_error_claim
      reason: Requires applying recipient-claim classification under Section 23.3 for inadvertent household error, which is cited but not available as RuleSpec context.
rules:
  - name: administrative_disqualification_hearing_initiation_prohibited
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual Chapter 20.1 Administrative Responsibility
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-245
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          same_or_related_factual_issues
          and (case_currently_referred_for_prosecution or prosecutor_or_court_action_taken_against_accused_individual)
  - name: administrative_disqualification_procedures_or_prosecution_referral_permitted_regardless_current_eligibility
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual Chapter 20.1 Administrative Responsibility
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-245
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          administrative_disqualification_or_prosecution_case_exists
