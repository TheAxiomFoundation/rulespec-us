format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-62
  summary: |-
    A collateral contact is oral confirmation of household circumstances by a person outside the household. The Agency may select a collateral contact if the household fails to designate one or designates one unacceptable to the Agency. Where unverified information from a source other than the household contradicts household statements, the household will be afforded a reasonable opportunity to resolve the discrepancy before an eligibility or benefit determination.
rules:
  - name: agency_may_select_collateral_contact
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 62, collateral contacts
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-62
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_fails_to_designate_collateral_contact
          or household_designated_collateral_contact_unacceptable
  - name: agency_responsible_for_obtaining_verification_from_acceptable_collateral_contact
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 62, collateral contacts
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-62
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          collateral_contact_is_acceptable
  - name: collateral_contact_disclosure_limited_to_absolutely_necessary_information
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 62, collateral contacts note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-62
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          agency_is_talking_with_collateral_contact
          and information_disclosed_is_absolutely_necessary_to_get_information_sought
  - name: household_must_be_afforded_reasonable_opportunity_to_resolve_discrepancy
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 62, Section 5.3 Discrepancies in Verification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-62
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          unverified_information_from_source_other_than_household
          and unverified_information_contradicts_household_statements
  - name: agency_may_contact_household_after_direct_verification_efforts_unsuccessful
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 62, Section 5.3 Discrepancies in Verification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-62
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          unverified_information_from_source_other_than_household
          and unverified_information_contradicts_household_statements
          and direct_verification_efforts_unsuccessful
  - name: agency_may_obtain_third_party_verification_for_ievs_sves_information
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 62, Section 5.3 Discrepancies in Verification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-62
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          unverified_information_received_through_ievs_sves
