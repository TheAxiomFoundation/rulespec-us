format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-445
  summary: |-
    12.6 Dependent Care Deduction: ... a dependent care deduction can be allowed for the care of an individual for whom the household provides dependent care, even if the child or dependent adult is not a SNAP household member or lives outside of the home. 15.9 Failure To Report: ... the Agency will file a claim against a SNAP household for failure to report a change as required which results in the household receiving SNAP benefits to which it was not entitled. 12.1 Income Deductions/General: ... the maximum homeless shelter deduction increased to $198.99 effective October 1, 2025.
rules:
  - name: maximum_homeless_shelter_deduction
    kind: parameter
    dtype: Money
    period: Month
    unit: USD
    source: SNAP Manual page 445, Volume 66 October 2025, section 12.1 update
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-445
              excerpt: "maximum homeless shelter deduction increased to $198.99 effective October 1, 2025"
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-445
              excerpt: "effective October 1, 2025"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          198.99

  - name: allowed_homeless_shelter_deduction
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: SNAP Manual page 445, Volume 66 October 2025, section 12.1 update
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-445
              excerpt: "maximum homeless shelter deduction increased to $198.99 effective October 1, 2025"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          min(max(0, household_homeless_shelter_deduction_amount), maximum_homeless_shelter_deduction)

  - name: dependent_care_deduction_allowed_for_nonmember_or_out_of_home_care
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 445, section 12.6 update
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-445
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_provides_dependent_care_for_individual

  - name: agency_claim_for_failure_to_report_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 445, section 15.9 update
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-445
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_failed_to_report_required_change
          and household_received_snap_benefits_not_entitled_due_to_failure_to_report
