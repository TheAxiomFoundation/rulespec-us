  summary: |-
    Section 8.18 Tracking the 36-month Period: This section has been created to explain how the ABAWD’s time limit will be tracked.
    Section 8.19 Regaining Eligibility: This section has been created to explain how ABAWDs may be eligible for an additional 3 months.
    Section 15.3 Simplified Reporting Households: This section has been updated to include the verbiage “an ABAWD’s participation hours fall below 20 hours per week” as a Simplified Reporting requirement.
    Volume 30 June 2016 Section 2.2(1) Required Household Combinations: This section has been updated to clarify that individuals under 18 years of age who are included in the FI budget of an adult relative must also be included in the same SNAP household as the adult relative.
