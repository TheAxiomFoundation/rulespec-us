format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-255
  summary: |-
    South Carolina issues SNAP benefits to eligible households through Electronic Benefit Transfer (EBT). An eligible household may allow any household member, any authorized representative, or any non-household member to purchase food for the household. Types of SNAP issuance are limited to regular monthly benefits, supplemental benefits, restoration of lost benefits, and replacement of food purchased with SNAP benefits destroyed in a household misfortune.
rules:
  - name: snap_issuance_type_allowed
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: SNAP Manual Chapter 22, Sections 22.1 and 22.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-255
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          payment_is_regular_monthly_snap_benefit
          or payment_is_supplemental_snap_benefit
          or payment_is_restoration_of_lost_snap_benefits
          or payment_is_replacement_of_food_destroyed_in_household_misfortune
  - name: household_may_allow_person_to_purchase_food
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual Chapter 22, Section 22.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-255
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_is_eligible_for_snap
          and (person_is_household_member or person_is_authorized_representative or person_is_non_household_member)
  - name: household_responsible_for_non_household_member_ebt_card_use
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual Chapter 22, Section 22.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-255
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_provided_pin_to_non_household_member
