format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-138
  summary: |-
    "Add all gross self-employment income (either actual or anticipated) and capital gains." The chart identifies the IRS form lines used as income for sole proprietorships, partnerships, corporations, and single-member individual LLCs.
rules:
  - name: sole_proprietorship_income_used
    kind: derived
    entity: Business
    dtype: Money
    period: Year
    unit: USD
    source: SNAP Manual p. 138, sole proprietorship chart row
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-138
              excerpt: "Schedule C Form 1040, Profit or Loss from Business, Line 3, or subtract Line 2 from Line 1 (if no amount is listed on Line 3)."
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-138
              excerpt: "When there is other income on Line 6, add this income to the income on Line 3."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (if schedule_c_line_3_amount_is_listed: schedule_c_line_3_profit_or_loss_from_business else: schedule_c_line_1_gross_receipts_or_sales - schedule_c_line_2_returns_and_allowances) + schedule_c_line_6_other_income

  - name: partnership_income_used
    kind: derived
    entity: Business
    dtype: Money
    period: Year
    unit: USD
    source: SNAP Manual p. 138, partnership chart row
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-138
              excerpt: "Form 1065 ... Line 1c (add Line 7 if an amount is listed)"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-138
              excerpt: "prorate using the percentage the client(s) owns in the business"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (form_1065_line_1c_gross_receipts_or_sales + form_1065_line_7_other_income) * client_ownership_percentage

  - name: corporation_income_used
    kind: derived
    entity: Business
    dtype: Money
    period: Year
    unit: USD
    source: SNAP Manual p. 138, corporations chart row
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-138
              excerpt: "Form 1120, U.S. Corporation Income Tax Return, Line 11"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-138
              excerpt: "Schedule K-1(Form 1120-S) Part II, Line G (if applicable to determine the percentage of the business the client owns)"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          form_1120_line_11_total_income * client_ownership_percentage

  - name: single_member_llc_income_used
    kind: derived
    entity: Business
    dtype: Money
    period: Year
    unit: USD
    source: SNAP Manual p. 138, limited liability company chart row
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-138
              excerpt: "If the only member of the LLC is an individual"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-138
              excerpt: "reported on Form 1040, Schedule C ... Line 3, or subtract Line 2 from Line 1"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-138
              excerpt: "When there is other income on Line 6, add this income to the income on Line 3."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if llc_only_member_is_an_individual: (if schedule_c_line_3_amount_is_listed: schedule_c_line_3_profit_or_loss_from_business else: schedule_c_line_1_gross_receipts_or_sales - schedule_c_line_2_returns_and_allowances) + schedule_c_line_6_other_income else: 0

  - name: self_employment_income_and_capital_gains_used
    kind: derived
    entity: Business
    dtype: Money
    period: Year
    unit: USD
    source: SNAP Manual p. 138, self-employment income determination
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-138
              excerpt: "Add all gross self-employment income (either actual or anticipated) and capital gains"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          gross_self_employment_income + capital_gains
