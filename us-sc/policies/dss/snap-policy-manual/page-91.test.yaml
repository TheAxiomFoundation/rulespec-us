- name: age_exemption_younger_student
  period: 2026-05
  input:
    us-sc:policies/dss/snap-policy-manual/page-91#input.student_is_age_17_or_younger: true
    us-sc:policies/dss/snap-policy-manual/page-91#input.student_is_age_50_or_older: false
  output:
    us-sc:policies/dss/snap-policy-manual/page-91#student_age_exemption_applies: holds
- name: employment_and_program_exemptions_apply
  period: 2026-05
  input:
    us-sc:policies/dss/snap-policy-manual/page-91#input.student_is_physically_or_mentally_unfit_for_work: true
    us-sc:policies/dss/snap-policy-manual/page-91#input.student_receives_tanf_under_title_iv: true
    us-sc:policies/dss/snap-policy-manual/page-91#input.student_enrolled_due_to_jobs_program_or_successor: true
    us-sc:policies/dss/snap-policy-manual/page-91#input.student_is_being_trained_by_employer_in_on_the_job_training_program: true
  output:
    us-sc:policies/dss/snap-policy-manual/page-91#student_unfitness_exemption_applies: holds
    us-sc:policies/dss/snap-policy-manual/page-91#student_tanf_exemption_applies: holds
    us-sc:policies/dss/snap-policy-manual/page-91#student_jobs_program_exemption_applies: holds
    us-sc:policies/dss/snap-policy-manual/page-91#student_on_the_job_training_exemption_applies: holds
- name: paid_work_and_work_study_exemptions_apply
  period: 2026-05
  input:
    us-sc:policies/dss/snap-policy-manual/page-91#input.student_is_paid_employee_averaging_20_hours_per_week: true
    ? us-sc:policies/dss/snap-policy-manual/page-91#input.student_is_self_employed_averaging_20_hours_per_week_with_earnings_at_least_federal_minimum_wage_times_20
    : false
    us-sc:policies/dss/snap-policy-manual/page-91#input.student_participates_in_state_or_federally_financed_work_study: true
    us-sc:policies/dss/snap-policy-manual/page-91#input.student_was_approved_for_work_study_at_snap_application: true
    us-sc:policies/dss/snap-policy-manual/page-91#input.work_study_was_approved_for_school_term: true
    us-sc:policies/dss/snap-policy-manual/page-91#input.student_anticipates_actually_working_during_work_study_time: true
    us-sc:policies/dss/snap-policy-manual/page-91#input.work_study_exemption_period_has_begun: true
    us-sc:policies/dss/snap-policy-manual/page-91#input.work_study_exemption_period_has_not_ended: true
    us-sc:policies/dss/snap-policy-manual/page-91#input.student_refused_work_study_assignment: false
    us-sc:policies/dss/snap-policy-manual/page-91#input.full_month_or_longer_break_between_terms_without_work_study: false
  output:
    us-sc:policies/dss/snap-policy-manual/page-91#student_paid_work_exemption_applies: holds
    us-sc:policies/dss/snap-policy-manual/page-91#student_work_study_exemption_applies: holds
- name: dependent_care_exemptions_apply
  period: 2026-05
  input:
    us-sc:policies/dss/snap-policy-manual/page-91#input.student_responsible_for_care_of_dependent_household_member_under_age_6: true
    ? us-sc:policies/dss/snap-policy-manual/page-91#input.student_responsible_for_care_of_dependent_household_member_age_6_to_under_12
    : true
    ? us-sc:policies/dss/snap-policy-manual/page-91#input.agency_determined_adequate_child_care_not_available_for_class_and_student_work_requirements
    : true
  output:
    us-sc:policies/dss/snap-policy-manual/page-91#student_care_for_dependent_under_6_exemption_applies: holds
    us-sc:policies/dss/snap-policy-manual/page-91#student_care_for_dependent_age_6_to_under_12_exemption_applies: holds
