format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-169
  summary: |-
    "Effective November 2015, when a household’s monthly medical expenses total more than $35.00 but do not exceed $210.00, the Standard Medical (SM) deduction of $175.00 ($210.00-$35.00) may be allowed. To be eligible for the SM deduction, a household must incur and verify greater than $35.00 a month in qualifying medical expenses."
rules:
  - name: standard_medical_deduction_expense_threshold
    kind: parameter
    dtype: Money
    period: Month
    unit: USD
    source: SNAP Manual page 169, Standard Medical deduction threshold
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-169
              excerpt: "more than $35.00"
    versions:
      - effective_from: '2015-11-01'
        formula: |-
          35

  - name: standard_medical_deduction_expense_ceiling
    kind: parameter
    dtype: Money
    period: Month
    unit: USD
    source: SNAP Manual page 169, Standard Medical deduction ceiling
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-169
              excerpt: "do not exceed $210.00"
    versions:
      - effective_from: '2015-11-01'
        formula: |-
          210

  - name: standard_medical_deduction_amount
    kind: parameter
    dtype: Money
    period: Month
    unit: USD
    source: SNAP Manual page 169, Standard Medical deduction amount
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-169
              excerpt: "Standard Medical (SM) deduction of $175.00"
    versions:
      - effective_from: '2015-11-01'
        formula: |-
          175

  - name: standard_medical_deduction_eligible
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 169, eligibility for Standard Medical deduction
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-169
              excerpt: "must incur and verify greater than $35.00 a month in qualifying medical expenses"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-169
              excerpt: "do not exceed $210.00"
          - path: versions[0].formula
            kind: import
            import:
              target: us-sc:policies/dss/snap-policy-manual/page-169#standard_medical_deduction_expense_threshold
              output: standard_medical_deduction_expense_threshold
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-sc:policies/dss/snap-policy-manual/page-169#standard_medical_deduction_expense_ceiling
              output: standard_medical_deduction_expense_ceiling
              hash: sha256:local
    versions:
      - effective_from: '2015-11-01'
        formula: |-
          verified_qualifying_monthly_medical_expenses > standard_medical_deduction_expense_threshold
          and verified_qualifying_monthly_medical_expenses <= standard_medical_deduction_expense_ceiling

  - name: standard_medical_deduction
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: SNAP Manual page 169, Standard Medical deduction
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-169
              excerpt: "the Standard Medical (SM) deduction of $175.00"
          - path: versions[0].formula
            kind: import
            import:
              target: us-sc:policies/dss/snap-policy-manual/page-169#standard_medical_deduction_amount
              output: standard_medical_deduction_amount
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-sc:policies/dss/snap-policy-manual/page-169#standard_medical_deduction_eligible
              output: standard_medical_deduction_eligible
              hash: sha256:local
    versions:
      - effective_from: '2015-11-01'
        formula: |-
          if standard_medical_deduction_eligible: standard_medical_deduction_amount else: 0

  - name: excess_medical_deduction_option_available
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 169, option for households reporting medical expenses greater than $210
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-169
              excerpt: "report incurring medical expenses greater than $210.00 per month"
          - path: versions[0].formula
            kind: import
            import:
              target: us-sc:policies/dss/snap-policy-manual/page-169#standard_medical_deduction_expense_ceiling
              output: standard_medical_deduction_expense_ceiling
              hash: sha256:local
    versions:
      - effective_from: '2015-11-01'
        formula: |-
          reported_monthly_medical_expenses > standard_medical_deduction_expense_ceiling

  - name: out_of_pocket_medical_expense_paid_by_another_member_allowed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 169, out-of-pocket medical expense paid by another household member
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-169
              excerpt: "can be paid by another household member as long as an eligible member incurred the expense"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-169
              excerpt: "must have been a member of the household at the time the expense was incurred"
    versions:
      - effective_from: '2015-11-01'
        formula: |-
          out_of_pocket_medical_expense_paid_by_another_household_member
          and eligible_member_incurred_medical_expense
          and eligible_member_was_household_member_when_expense_incurred

  - name: credit_card_or_loan_medical_expense_allowed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 169, credit card charges and loans for out-of-pocket medical expenses
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-169
              excerpt: "allowed as deductions when the statement is received and the amount of reimbursement is known"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-169
              excerpt: "verify the portion of the credit card statement or the loan (excluding interest)"
    versions:
      - effective_from: '2015-11-01'
        formula: |-
          medical_expense_charged_to_credit_card_or_loan
          and statement_received
          and reimbursement_amount_known
          and claimed_portion_excluding_interest_verified

  - name: non_recurring_medical_expense_proration_months
    kind: parameter
    dtype: Count
    period: Month
    source: SNAP Manual page 169, non-recurring medical expense proration period
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-169
              excerpt: "prorated over a 12-month period"
    versions:
      - effective_from: '2015-11-01'
        formula: |-
          12

  - name: non_recurring_medical_expense_proration_option_available
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 169, non-recurring medical expense option
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-169
              excerpt: "For households subject to six-month or tri-annual recertification"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-169
              excerpt: "all adult members are elderly or disabled with no earned income"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-169
              excerpt: "allowable non-recurring medical expenses may be given, at the individual's option"
    versions:
      - effective_from: '2015-11-01'
        formula: |-
          allowable_non_recurring_medical_expense
          and (household_subject_to_six_month_or_tri_annual_recertification or all_adult_members_elderly_or_disabled_with_no_earned_income)

  - name: recurring_medical_expense_averaging_option_available
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 169, recurring medical expenses billed less often than monthly
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-169
              excerpt: "If the expense is billed less often than monthly, the household may elect to have the expense averaged over the certification period"
    versions:
      - effective_from: '2015-11-01'
        formula: |-
          recurring_medical_expense
          and medical_expense_billed_less_often_than_monthly
