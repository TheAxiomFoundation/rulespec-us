format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-56
  summary: |-
    For an individual to be considered disabled, the source lists Railroad Retirement disability annuity paths and interim assistance, title XIX medical assistance, or disability-based State general assistance paths. For special household disability determinations, the Agency uses SSA's current disability list initially, but a person is considered disabled only if unable to purchase and prepare meals because of the disability; obvious severe physical or mental disability may also qualify, and non-obvious disability is verified by a physician or licensed/certified psychologist statement.
rules:
  - name: railroad_retirement_annuity_disability_path
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 56, paragraph E
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-56
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (receives_railroad_retirement_annuity_under_section_2a1iv
          and railroad_retirement_board_determined_medicare_eligible
          and household_provides_proof_of_railroad_retirement_disability_annuity_and_medicare_qualification)
          or (receives_railroad_retirement_annuity_under_section_2a1v
          and railroad_retirement_board_determined_disabled_using_title_xvi_criteria)

  - name: interim_or_disability_assistance_disability_path
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 56, paragraph F
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-56
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          ((receives_interim_assistance_pending_ssi
          and household_provides_proof_receives_interim_assistance_pending_ssi)
          or (receives_disability_related_medical_assistance_under_title_xix
          and household_provides_proof_receives_title_xix_disability_related_medical_assistance)
          or receives_disability_based_state_general_assistance)
          and agency_verifies_benefit_eligibility_based_on_disability_or_blindness_criteria_at_least_as_stringent_as_title_xvi

  - name: unable_to_purchase_and_prepare_meals_disability_path
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 56, section II
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-56
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (has_disability_on_current_ssa_list
          and unable_to_purchase_and_prepare_meals_because_of_disability)
          or (disability_obvious_to_es_worker
          and unable_to_purchase_and_prepare_meals_because_of_severe_physical_or_mental_disability)
          or ((not disability_obvious_to_es_worker)
          and physician_or_licensed_or_certified_psychologist_certifies_unable_to_purchase_and_prepare_meals_because_of_non_obvious_ssa_list_disability)

  - name: disabled_for_elderly_and_disabled_persons_special_household_requirements
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 56, paragraphs E-F and section II
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-56
          - path: versions[0].formula
            kind: import
            import:
              target: us-sc:policies/dss/snap-policy-manual/page-56#railroad_retirement_annuity_disability_path
              output: railroad_retirement_annuity_disability_path
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-sc:policies/dss/snap-policy-manual/page-56#interim_or_disability_assistance_disability_path
              output: interim_or_disability_assistance_disability_path
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-sc:policies/dss/snap-policy-manual/page-56#unable_to_purchase_and_prepare_meals_disability_path
              output: unable_to_purchase_and_prepare_meals_disability_path
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          railroad_retirement_annuity_disability_path
          or interim_or_disability_assistance_disability_path
          or unable_to_purchase_and_prepare_meals_disability_path
