  summary: |-
    Section 2.2 Special household Requirements (3) Boarders: Wording was added to this paragraph to clarify that it pertained to individuals paying a reasonable amount for meals or meals and lodging who were not living in a commercial boarding house. Section 11.3 Earned Income (Q), (W), and (Y): Foster Grandparent, Retired and Senior Volunteer, and Senior Companion Programs were added to indicate that these programs are exempt if approved by the Corporation for National and Community Service. Section 17.3(3): Late recertifications were created to define a recertification form received after the current certification period ends but within the calendar month after the end of the certification period as “late”.
  deferred_reason: |-
    The source unit is an audit/change-log page describing amendments to other SNAP Manual sections, not the operative text of those sections. It does not itself state a complete executable rule surface for benefits, eligibility, income treatment, verification, notices, or recertification processing.
