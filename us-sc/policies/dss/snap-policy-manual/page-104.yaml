format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-104
  summary: |-
    Good cause for leaving employment includes resigning from unsuitable employment, discrimination, unreasonable work demands or conditions, leaving for employment or at least half-time enrollment, household relocation for another member's employment or enrollment, employer-recognized retirement for persons under age 60, employment becoming unsuitable, failed or reduced bona fide offers of employment over 30 hours per week or equivalent earnings, and job changes consistent with migrant farm labor, construction work, or similar employment patterns. If household good-cause information is questionable, the Agency must request verification, and the household has primary responsibility for providing it.
rules:
  - name: employer_recognized_retirement_age_limit
    kind: parameter
    dtype: Integer
    source: SNAP Manual page 104, paragraph (E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-104
              excerpt: "under the age of 60"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          60

  - name: bona_fide_offer_hours_threshold
    kind: parameter
    dtype: Decimal
    period: Week
    source: SNAP Manual page 104, paragraph (G)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-104
              excerpt: "more than 30 hours a week"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: weekly_earnings_minimum_wage_hour_multiplier
    kind: parameter
    dtype: Decimal
    period: Week
    source: SNAP Manual page 104, paragraph (G)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-104
              excerpt: "Federal minimum wage multiplied by 30 hours"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: good_cause_for_leaving_employment
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 104, good cause for leaving employment
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-104
          - path: versions[0].formula
            kind: import
            import:
              target: us-sc:policies/dss/snap-policy-manual/page-104#employer_recognized_retirement_age_limit
              output: employer_recognized_retirement_age_limit
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-sc:policies/dss/snap-policy-manual/page-104#bona_fide_offer_hours_threshold
              output: bona_fide_offer_hours_threshold
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-sc:policies/dss/snap-policy-manual/page-104#weekly_earnings_minimum_wage_hour_multiplier
              output: weekly_earnings_minimum_wage_hour_multiplier
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          left_employment_because_job_was_unsuitable_under_section_8_9
          or employer_discriminated_based_on_age_race_sex_color_disability_religion_national_origin_or_political_beliefs
          or work_demands_or_conditions_rendered_continued_employment_unreasonable
          or individual_accepted_employment_requiring_leaving_current_employment
          or individual_enrolled_at_least_half_time_requiring_leaving_current_employment
          or other_household_member_accepted_employment_in_another_county_requiring_household_move_and_individual_to_leave_employment
          or other_household_member_enrolled_at_least_half_time_in_another_county_requiring_household_move_and_individual_to_leave_employment
          or (person_age < employer_recognized_retirement_age_limit and resignation_recognized_by_employer_as_retirement)
          or employment_became_unsuitable_under_section_8_9_after_acceptance
          or ((accepted_bona_fide_offer_of_employment_hours_per_week > bona_fide_offer_hours_threshold or accepted_bona_fide_offer_weekly_earnings >= federal_minimum_wage * weekly_earnings_minimum_wage_hour_multiplier) and circumstances_beyond_individual_control_caused_offer_not_to_materialize_or_result_in_reduced_work and (offer_did_not_materialize or resulting_employment_hours_per_week < bona_fide_offer_hours_threshold or resulting_weekly_earnings < federal_minimum_wage * weekly_earnings_minimum_wage_hour_multiplier))
          or leaving_job_was_part_of_employment_pattern_where_workers_frequently_move_between_employers

  - name: agency_must_request_good_cause_verification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 104, Verification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-104
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_good_cause_information_is_questionable

  - name: household_has_primary_responsibility_for_good_cause_verification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 104, Verification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-104
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_good_cause_verification_requested
