format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-333
  summary: '"The household must be given at least 10 days to submit verification."
    If verification is received by the due date the household is entitled to a full
    month''s allotment; if received January 31 the case must be reopened and benefits
    prorated from January 31; if received February 1 the household must reapply. For
    a late complete six-month or tri-annual recertification with no additional verification
    needed: screen for expedited processing; if expedited, process by the 6th calendar
    day after receipt; if not expedited, process within 30 days; benefits are prorated
    from the date the form is received.'
  deferred_outputs:
  - output: us-sc:policies/dss/snap-policy-manual/page-333#case_must_be_reopened_and_benefits_prorated_from_verification_receipt
    reason: Generated rule depends on an output that validation deferred because it
      flattened thresholded, capped, base-limited, or cross-referenced mechanics,
      or borrowed an unrelated same-named section term.
  - output: us-sc:policies/dss/snap-policy-manual/page-333#full_month_allotment_entitlement
    reason: Generated rule depends on an output that validation deferred because it
      flattened thresholded, capped, base-limited, or cross-referenced mechanics,
      or borrowed an unrelated same-named section term.
  - output: us-sc:policies/dss/snap-policy-manual/page-333#household_must_reapply_after_late_verification
    reason: Generated rule depends on an output that validation deferred because it
      flattened thresholded, capped, base-limited, or cross-referenced mechanics,
      or borrowed an unrelated same-named section term.
  - output: us-sc:policies/dss/snap-policy-manual/page-333#minimum_verification_response_days
    reason: Generated rule used a local name that collides with a sibling RuleSpec
      export. This output is deferred until it can be encoded with a semantic branch-specific
      name without creating ambiguous sibling imports.
  - output: us-sc:policies/dss/snap-policy-manual/page-333#verification_response_period_satisfies_minimum
    reason: Generated rule depends on an output that validation deferred because it
      flattened thresholded, capped, base-limited, or cross-referenced mechanics,
