format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-312
  summary: |-
    Conditional Entrants: Granted conditional entry under §203(a)(7) of the INA as in effect before 04/01/1980. Eligible immediately. Not eligible unless an LPR, then eligible after a five-year waiting period. An individual is not subject to the 5-year waiting period if under 18 years old or has 40 qualifying work quarters.
rules:
  - name: qualifying_work_quarters_waiting_period_exception_threshold
    kind: parameter
    dtype: Count
    source: SNAP Manual p. 312, Conditional Entrants
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-312
              excerpt: "Has 40 qualifying work quarters"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          40

  - name: conditional_entrant_eligible_immediately
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 312, Conditional Entrants
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-312
              excerpt: "Granted conditional entry under §203(a)(7) of the INA as in effect before 04/01/1980 Eligible immediately"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          granted_conditional_entry_under_ina_203_a_7_as_in_effect_before_april_1980

  - name: conditional_entrant_exempt_from_five_year_waiting_period
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 312, Conditional Entrants
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-312
              excerpt: "not subject to the 5-year waiting period if he/she: • Is under 18 years old; • Has 40 qualifying work quarters"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_under_18_years_old
          or qualifying_work_quarters >= qualifying_work_quarters_waiting_period_exception_threshold

  - name: conditional_entrant_lpr_eligible_after_waiting_period
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 312, Conditional Entrants
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-312
              excerpt: "Not eligible unless an LPR, then eligible after a five-year waiting period"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_lawful_permanent_resident
          and person_has_satisfied_five_year_waiting_period

  - name: conditional_entrant_snap_eligibility_path
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 312, Conditional Entrants
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-312
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          conditional_entrant_eligible_immediately
          or conditional_entrant_exempt_from_five_year_waiting_period
          or conditional_entrant_lpr_eligible_after_waiting_period
