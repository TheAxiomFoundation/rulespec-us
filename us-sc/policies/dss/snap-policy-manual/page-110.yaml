format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-110
  summary: |-
    Working in exchange for goods or services is considered “in-kind” work. In-kind work occurs when compensation is in a form other than money or wages.
    Unpaid work means work performed without compensation; volunteer sites must have policies and procedures, a timesheet or hour-tracking mechanism, and a screening process.
    ABAWD work requirement paths include participating in and complying with a work program for 20 hours a week; any combination of working and participating in a work program for a total of 20 hours per week, average 80 hours monthly; and participating in and complying with a workfare program.
    An ABAWD who does not comply with the work requirement is not eligible to receive SNAP benefits for more than three countable months during the current three-year time period, unless meeting an exception or otherwise exempt; the source also cites Section 8.19 for regaining eligibility.
    Exceptions listed on this page include being under age 18, age 65 or older, or being medically certified as physically or mentally unfit for employment because the individual receives temporary or permanent disability benefits.
  deferred_outputs:
    - output: us-sc:policies/dss/snap-policy-manual/page-110#abawd_snap_benefit_ineligibility_after_time_limit
      reason: The source states that an ABAWD may regain eligibility during the current three-year time period under Section 8.19, but the cited Section 8.19 source is not available in the copied context.
      source_values:
        - us-sc:policies/dss/snap-policy-manual/page-110#abawd_countable_month_limit
rules:
  - name: work_program_weekly_hours_required
    kind: parameter
    dtype: Count
    source: SNAP Manual page 110, ABAWD work requirement item 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-110
              excerpt: "20 hours a week"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          20

  - name: combined_work_program_monthly_average_hours_required
    kind: parameter
    dtype: Count
    source: SNAP Manual page 110, ABAWD work requirement item 3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-110
              excerpt: "average 80 hours monthly"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          80

  - name: abawd_countable_month_limit
    kind: parameter
    dtype: Count
    source: SNAP Manual page 110, ABAWD three-month time limit
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-110
              excerpt: "more than three countable months during the current three-year time period"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          3

  - name: abawd_minimum_age_for_time_limit
    kind: parameter
    dtype: Count
    source: SNAP Manual §8.15, exception 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-110
              excerpt: "Under age 18"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          18

  - name: abawd_upper_age_exception_age
    kind: parameter
    dtype: Count
    source: SNAP Manual §8.15, exception 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-110
              excerpt: "age 65 or older"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          65

  - name: work_is_in_kind
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 110, in-kind work definition
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-110
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          work_is_performed_in_exchange_for_goods_or_services
          or work_compensation_is_in_form_other_than_money_or_wages

  - name: unpaid_work_at_established_volunteer_site
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 110, unpaid work and established volunteer site criteria
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-110
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          work_performed_without_compensation
          and volunteer_site_has_policies_and_procedures_for_volunteers
          and volunteer_site_has_timesheet_or_hour_tracking_mechanism
          and volunteer_site_has_screening_process

  - name: work_program_participation_requirement_met
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 110, ABAWD work requirement item 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-110
              excerpt: "Participating in and complying with the requirements of a work program for 20 hours a week."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          participates_in_work_program
          and complies_with_work_program_requirements
          and work_program_hours_per_week >= work_program_weekly_hours_required

  - name: combined_work_and_work_program_requirement_met
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 110, ABAWD work requirement item 3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-110
              excerpt: "a total of 20 hours per week, average 80 hours monthly"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          combined_work_and_work_program_hours_per_week >= work_program_weekly_hours_required
          and combined_work_and_work_program_monthly_average_hours >= combined_work_program_monthly_average_hours_required

  - name: workfare_program_requirement_met
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 110, ABAWD work requirement item 4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-110
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          participates_in_workfare_program
          and complies_with_workfare_program

  - name: age_exception_to_abawd_work_requirement
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual §8.15, exception 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-110
              excerpt: "Under age 18, or age 65 or older"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          age_years < abawd_minimum_age_for_time_limit
          or age_years >= abawd_upper_age_exception_age

  - name: disability_benefits_medical_unfitness_exception
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual §8.15, exception 2(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-110
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          receives_temporary_disability_benefits
          or receives_permanent_disability_benefits

  - name: listed_exception_to_abawd_work_requirement
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual §8.15, listed exceptions on page 110
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-110
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          age_exception_to_abawd_work_requirement
          or disability_benefits_medical_unfitness_exception

  - name: countable_months_exceed_abawd_limit
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 110, ABAWD three-month time limit
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-110
              excerpt: "more than three countable months during the current three-year time period"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          countable_months_in_current_three_year_time_period > abawd_countable_month_limit
