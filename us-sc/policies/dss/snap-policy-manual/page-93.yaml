format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-93
  summary: |-
    "The income and resources, where applicable, of an ineligible student will not be considered." Fleeing felon and probation/parole violators are individuals fleeing to avoid prosecution or custody for a felony, or violating probation or parole, and "will not be considered eligible household members."
rules:
  - name: ineligible_student_income_and_resources_not_considered
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 93, ineligible students
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-93
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_ineligible_student

  - name: warrant_has_fleeing_felon_ncic_offense_code
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual 7.5(1)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-93
              excerpt: "Escape (4901); Flight to Avoid ... (4902); or Flight-Escape (4999)"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          outstanding_felony_arrest_warrant_contains_ncic_escape_code
          or outstanding_felony_arrest_warrant_contains_ncic_flight_to_avoid_code
          or outstanding_felony_arrest_warrant_contains_ncic_flight_escape_code

  - name: fleeing_felon
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual 7.5(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-93
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (
            law_enforcement_officer_presented_outstanding_felony_arrest_warrant_to_obtain_location_or_information
            and warrant_has_fleeing_felon_ncic_offense_code
          )
          or application_or_recertification_or_interview_response_says_fleeing_felon

  - name: probation_or_parole_violator
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual 7.5(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-93
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          impartial_agency_designated_party_determined_probation_or_parole_condition_violation

  - name: ineligible_household_member_due_to_fleeing_felon_or_probation_parole_violation
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual 7.5
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-93
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          fleeing_felon
          or probation_or_parole_violator
