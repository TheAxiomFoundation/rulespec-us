format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-133
  summary: 'Credits are not counted as income because they are not legally obligated
    and otherwise payable as earnings; employer-paid amounts above credits must be
    counted and added to gross taxable income. Food assistance under the National
    School Lunch Act: count amounts provided to day care providers for children other
    than their own as self-employment income; exclude assistance provided to children.
    Foster Grandparent Program payments: exclude the living allowance if the program
    is approved by CNCS; otherwise count as earned income. Garnished income is income
    required by court order to be withheld and diverted to a third party as payment
    on a debt. Job Corps: count salary and performance bonuses as earned income for
    participants and former participants still receiving Job Corps payments, with
    an eligibility caveat for most participants in ineligible institutions. Jury duty
    payments: if dispersed over days or weeks in a specific amount, treat as earned
    income; an exception may exclude payments not exceeding $30 in a quarter if not
    reasonably anticipated, or reimbursements.'
  deferred_outputs:
  - output: us-sc:policies/dss/snap-policy-manual/page-133#jury_duty_payment_earned_income
    reason: The jury duty payment rule includes an exception tied to Section 11.6
      Income Exclusions (E) and reimbursement text that is cut off in the supplied
      source unit, so the final included amount cannot be encoded faithfully from
      this page alone.
  - output: us-sc:policies/dss/snap-policy-manual/page-133#foster_grandparent_payment_earned_income
    reason: Generated rule exported a broad amount, base, inclusion, or exclusion
      while a source-stated purpose-specific limitation was deferred. This generic
      surface is deferred until the affected purpose-specific outputs can be encoded
      or split without applying the non-excepted rule too broadly.
  - output: us-sc:policies/dss/snap-policy-manual/page-133#foster_grandparent_living_allowance_excluded_income
    reason: Generated rule exported a broad amount, base, inclusion, or exclusion
      while a source-stated purpose-specific limitation was deferred. This generic
      surface is deferred until the affected purpose-specific outputs can be encoded
      or split without applying the non-excepted rule too broadly.
