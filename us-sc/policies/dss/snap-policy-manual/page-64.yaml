format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-64
  summary: |-
    The Agency may verify SSI benefits through SDX and Social Security benefit information through BENDEX or household verification. The Agency may use SDX and BENDEX data to verify other SNAP eligibility criteria. The household will be given an opportunity to verify from another source if SDX or BENDEX information is contradictory to household-provided information or is unavailable. Eligibility and benefit-level determinations will not be delayed past normal application processing standards if SDX or BENDEX data is unavailable. The Agency must obtain information through IEVS and SVES and use it to verify eligibility and benefit level of applicants and participating households. IEVS and SVES must be matched at each application/reapplication, recertification action, and when adding new individuals to a SNAP household.
rules:
  - name: sdx_or_bendex_verification_may_be_used
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 5.6, Income and Eligibility Verification System / State Verification and Exchange System
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-64
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_has_ssi_benefit_information_from_sdx
          or household_has_social_security_benefit_information_from_bendex
          or household_has_household_provided_ssi_or_social_security_verification

  - name: sdx_or_bendex_may_verify_other_snap_criteria
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 5.6, Income and Eligibility Verification System / State Verification and Exchange System
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-64
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_has_sdx_or_bendex_data
          and household_has_snap_eligibility_criterion_to_verify

  - name: opportunity_to_verify_from_another_source_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 5.6, Income and Eligibility Verification System / State Verification and Exchange System
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-64
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          sdx_or_bendex_information_contradicts_household_information
          or sdx_or_bendex_information_is_unavailable

  - name: application_determination_not_delayed_due_to_unavailable_sdx_or_bendex
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 5.6, Income and Eligibility Verification System / State Verification and Exchange System
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-64
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_application_is_within_normal_processing_standards
          and sdx_or_bendex_information_is_unavailable

  - name: ievs_sves_information_must_be_obtained_and_used
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 5.6, Income and Eligibility Verification System / State Verification and Exchange System
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-64
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_is_snap_applicant
          or household_is_participating_snap_household

  - name: ievs_sves_match_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 5.6, Income and Eligibility Verification System / State Verification and Exchange System
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-64
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_has_snap_application_or_reapplication
          or household_has_snap_recertification_action
          or household_is_adding_new_individual_to_snap_household
          or household_is_adding_previously_sanctioned_individual_to_snap_household

  - name: ievs_verified_upon_receipt_action_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 5.6, Income and Eligibility Verification System / State Verification and Exchange System
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-64
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_has_information_obtained_through_ievs_considered_verified_upon_receipt
          and household_received_proper_notice
          and (household_benefits_should_be_terminated or household_application_should_be_denied or household_benefits_should_be_reduced)

  - name: program_income_information_verified_upon_receipt
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 5.6, Income and Eligibility Verification System / State Verification and Exchange System
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-64
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_has_ssa_or_ssi_benefit_information_obtained_from_ssa
          or household_has_sc_state_retirement_income_information_obtained_from_administering_agency
          or household_has_ucb_information_obtained_from_administering_agency
          or household_has_tanf_information_obtained_from_administering_agency
