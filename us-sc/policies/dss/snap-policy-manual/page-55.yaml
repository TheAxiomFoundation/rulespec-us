format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-55
  summary: |-
    For an individual to be considered disabled: receives federally or State-administered supplemental benefits under section 212(a) of Pub. L. 93-66; is a veteran with a VA-rated total or total-paid service-connected or non-service-connected disability; is a surviving spouse or surviving child of a veteran entitled to VA compensation or pension for service-connected or non-service-connected death and has a disability considered permanent under section 221(i) of the Social Security Act; is a veteran, surviving spouse, or surviving child meeting VA aid-and-attendance, housebound, or self-support criteria; or receives disability retirement benefits from a governmental agency because of a disability considered permanent under section 221(i).
rules:
  - name: disabled_due_to_section_212_supplemental_benefits
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 55, supplemental benefits disability criterion
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-55
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          receives_federally_administered_supplemental_benefits_under_section_212_a
          or receives_state_administered_supplemental_benefits_under_section_212_a

  - name: disabled_veteran_with_total_va_disability
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 55, paragraph B veteran total VA disability criterion
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-55
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_veteran
          and receives_va_disability_benefits_for_service_connected_or_non_service_connected_disability
          and va_disability_is_rated_total_or_paid_at_total_rate

  - name: disabled_surviving_spouse_or_child_with_va_death_benefit_and_permanent_disability
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 55, paragraph B surviving spouse or child criterion
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-55
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (person_is_surviving_spouse_of_veteran or person_is_surviving_child_of_veteran)
          and (entitled_to_va_compensation_for_service_connected_death or entitled_to_va_pension_for_non_service_connected_death)
          and disability_considered_permanent_under_social_security_act_221_i

  - name: disabled_veteran_due_to_regular_aid_and_attendance_or_housebound_status
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 55, paragraph C veteran aid-and-attendance or housebound criterion
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-55
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_veteran
          and (va_considers_person_in_need_of_regular_aid_and_attendance or va_considers_person_permanently_housebound)

  - name: disabled_surviving_spouse_due_to_regular_aid_and_attendance_or_housebound_status
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 55, paragraph C surviving spouse aid-and-attendance or housebound criterion
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-55
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_surviving_spouse_of_veteran
          and (va_considers_person_in_need_of_regular_aid_and_attendance or va_considers_person_permanently_housebound)

  - name: disabled_surviving_child_due_to_permanent_incapacity_for_self_support
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 55, paragraph C surviving child self-support incapacity criterion
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-55
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_surviving_child_of_veteran
          and va_considers_person_permanently_incapable_of_self_support

  - name: disabled_due_to_governmental_disability_retirement
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 55, paragraph D governmental disability retirement criterion
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-55
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          receives_disability_retirement_benefits_from_governmental_agency
          and disability_considered_permanent_under_social_security_act_221_i

  - name: snap_disabled_individual
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 55, disability criteria on this page
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-55
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          disabled_due_to_section_212_supplemental_benefits
          or disabled_veteran_with_total_va_disability
          or disabled_surviving_spouse_or_child_with_va_death_benefit_and_permanent_disability
          or disabled_veteran_due_to_regular_aid_and_attendance_or_housebound_status
          or disabled_surviving_spouse_due_to_regular_aid_and_attendance_or_housebound_status
          or disabled_surviving_child_due_to_permanent_incapacity_for_self_support
          or disabled_due_to_governmental_disability_retirement
