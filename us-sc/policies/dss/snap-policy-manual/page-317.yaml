format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-317
  summary: |-
    "Due to Agency caused delay, July benefits should not be prorated. The household is entitled to a full month allotment for July." "Interview delayed- household... July benefits will be prorated from July 3rd."
rules:
  - name: july_benefits_not_prorated_due_to_agency_delay
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual p.317, agency-caused delayed interview example
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-317
              excerpt: "Due to Agency caused delay, July benefits should not be prorated."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_reported_inability_to_get_through_to_interview_center
          and agency_office_closed_due_to_inclement_weather
          and interview_completed_after_automatic_denial
          and all_verification_submitted_with_a_form

  - name: household_delay_proration_from_completed_interview_date_applies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual p.317, household-delayed interview example
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-317
              excerpt: "Interview delayed- household... July benefits will be prorated from July 3rd."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          interview_delayed_by_household
          and interview_completed_after_automatic_denial
          and all_verification_submitted_with_a_form
