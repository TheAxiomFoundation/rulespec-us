format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-155
  summary: |-
    To be excluded, educational assistance must be received under Title IV of the Higher Education Act or Bureau of Indian Affairs student assistance programs, awarded to a household member enrolled at a listed school/institution/program, and used for or earmarked for listed allowable education expenses.
rules:
  - name: educational_assistance_excluded_from_snap_income
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: SNAP Manual page 155
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-155
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          payment_is_educational_assistance
          and (received_under_title_iv_higher_education_act or received_under_bureau_of_indian_affairs_student_assistance_program)
          and awarded_to_household_member
          and (household_member_enrolled_at_recognized_postsecondary_institution or household_member_enrolled_at_school_for_handicapped or household_member_enrolled_in_vocational_education_program or household_member_enrolled_at_vocational_or_technical_school or household_member_enrolled_in_secondary_diploma_or_equivalent_program)
          and (used_or_earmarked_for_tuition or used_or_earmarked_for_mandatory_school_fees_or_related_equipment_materials_and_supplies or used_or_earmarked_for_books or used_or_earmarked_for_supplies or used_or_earmarked_for_transportation or used_or_earmarked_for_miscellaneous_personal_expenses_incidental_to_attending_school_other_than_normal_living_expenses)
