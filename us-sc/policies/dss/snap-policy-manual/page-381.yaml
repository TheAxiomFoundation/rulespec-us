format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-381
  summary: |-
    Certification workers must set an alert in CHIP instructing workers to close the case if verification is not received within 30 days from the file date. Simplified reporters are only required to report when their income exceeds 130% of poverty.
rules:
  - name: verification_deadline_from_file_date_days
    kind: parameter
    dtype: Count
    source: SNAP Manual page 381, Section 6.8 revision note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-381
              excerpt: "within 30 days from the file date"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: poverty_income_reporting_threshold
    kind: parameter
    dtype: Rate
    source: SNAP Manual page 381, Chapter 15 revision note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-381
              excerpt: "income exceeds 130% of poverty"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1.30

  - name: chip_closure_alert_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: SNAP Manual page 381, Section 6.8 revision note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-381
          - path: versions[0].formula
            kind: import
            import:
              target: us-sc:policies/dss/snap-policy-manual/page-381#verification_deadline_from_file_date_days
              output: verification_deadline_from_file_date_days
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          verification_requested
          and days_since_file_date >= verification_deadline_from_file_date_days
          and not verification_received

  - name: simplified_reporter_income_change_report_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 381, Chapter 15 revision note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-381
          - path: versions[0].formula
            kind: import
            import:
              target: us-sc:policies/dss/snap-policy-manual/page-381#poverty_income_reporting_threshold
              output: poverty_income_reporting_threshold
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_is_simplified_reporter
          and household_income_to_poverty_ratio > poverty_income_reporting_threshold
