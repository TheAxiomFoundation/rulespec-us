format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-82
  summary: '"The 5-year waiting period begins on the date the non-citizen obtains
    status as a qualified non-citizen or enters the U.S. in a qualifying status under
    8 USC 1613. The 5 years in qualified status may be either consecutive or nonconsecutive.
    Temporary absences of less than 6 months ... do not terminate or interrupt ...
    Qualified Non-citizens in the chart directly below are exempt from the five-year
    U.S. residency requirement and are eligible immediately without a waiting period."'
  deferred_outputs:
  - output: us-sc:policies/dss/snap-policy-manual/page-82#qualified_status_waiting_period_completed
    reason: Generated rule depends on an output that validation deferred because it
      flattened thresholded, capped, base-limited, or cross-referenced mechanics,
      or borrowed an unrelated same-named section term.
  - output: us-sc:policies/dss/snap-policy-manual/page-82#qualified_status_waiting_period_years
    reason: Generated rule used a local name that collides with a sibling RuleSpec
      export. This output is deferred until it can be encoded with a semantic branch-specific
      name without creating ambiguous sibling imports.
rules:
- name: temporary_absence_interruption_threshold_months
  kind: parameter
  dtype: Count
  source: SNAP Manual p. 82, temporary absence threshold
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-82
          excerpt: Temporary absences of less than 6 months
  versions:
  - effective_from: '0001-01-01'
    formula: '6'
- name: temporary_absence_does_not_interrupt_us_residency
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: SNAP Manual p. 82, temporary absences under six months
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-82
      - path: versions[0].formula
        kind: import
        import:
          target: us-sc:policies/dss/snap-policy-manual/page-82#temporary_absence_interruption_threshold_months
          output: temporary_absence_interruption_threshold_months
          hash: sha256:local
  versions:
  - effective_from: '0001-01-01'
    formula: 'temporary_absence_from_united_states_months < temporary_absence_interruption_threshold_months

      and no_intention_of_abandoning_us_residency'
- name: absence_over_threshold_presumed_to_interrupt_us_residency
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: SNAP Manual p. 82, absences over six months
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-82
      - path: versions[0].formula
        kind: import
        import:
          target: us-sc:policies/dss/snap-policy-manual/page-82#temporary_absence_interruption_threshold_months
          output: temporary_absence_interruption_threshold_months
          hash: sha256:local
  versions:
  - effective_from: '0001-01-01'
    formula: 'absence_from_united_states_months > temporary_absence_interruption_threshold_months

      and not non_citizen_presents_evidence_of_intent_to_resume_us_residency'
- name: exempt_from_five_year_residency_requirement
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: SNAP Manual p. 82, exempt qualified non-citizen categories
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-82
  versions:
  - effective_from: '0001-01-01'
    formula: 'admitted_as_amerasian_under_public_law_100_202_as_amended

      or lawfully_resides_in_us_under_compacts_of_free_association

      or cuban_or_haitian_entrant_under_refugee_education_assistance_act_501_e'
- name: immediately_eligible_without_waiting_period
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: SNAP Manual p. 82, immediate eligibility without waiting period
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-82
  versions:
  - effective_from: '0001-01-01'
    formula: 'exempt_from_five_year_residency_requirement

      or (status_adjusted_to_lawful_permanent_resident and (afghan_granted_parole_under_afghanistan_supplemental_appropriations_act_2022
      or granted_asylum_under_ina_208_b or deportation_or_removal_withheld_under_ina))'
