format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-260
  summary: |-
    "Sufficient time has elapsed for the card to reach the household. A rule of thumb in this instance is three to five days following the date of mailing." "Unauthorized use of an EBT card is defined as an individual, not authorized by any member of the household, using the card to make transactions that reduce or increase the balance in the EBT account." "An individual is authorized to make transactions if he/she has received the EBT card and has PIN access." "It is the responsibility of the household to secure the EBT card and PIN."
rules:
  - name: mailed_card_delivery_rule_of_thumb_min_days
    kind: parameter
    dtype: Count
    source: SNAP Manual p.260, non-receipt of mailed EBT card
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-260
              excerpt: "three to five days following the date of mailing"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          3

  - name: mailed_card_delivery_rule_of_thumb_max_days
    kind: parameter
    dtype: Count
    source: SNAP Manual p.260, non-receipt of mailed EBT card
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-260
              excerpt: "three to five days following the date of mailing"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          5

  - name: individual_authorized_to_make_ebt_transactions
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p.260, unauthorized use of EBT card
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-260
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_received_ebt_card
          and individual_has_pin_access

  - name: unauthorized_ebt_card_use
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p.260, unauthorized use of EBT card
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-260
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_used_ebt_card_to_make_transaction_reducing_or_increasing_account_balance
          and not individual_authorized_by_any_household_member

  - name: benefits_considered_in_household_possession
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual p.260, unauthorized use of EBT card
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-260
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          benefits_posted_to_ebt_account
          and client_has_ebt_card

  - name: household_responsible_for_transactions_after_negligent_pin_or_card_access
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual p.260, unauthorized use of EBT card
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-260
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_negligently_failed_to_secure_ebt_card_and_pin
          and household_failure_allowed_others_access_to_card_or_pin
          and subsequent_transactions_occurred

  - name: economic_services_staff_evaluates_unauthorized_debit_claim
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual p.260, unauthorized use of EBT card
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-260
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_contends_unauthorized_person_made_ebt_account_debits

  - name: scebt_handles_non_received_card_unauthorized_use_claim
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual p.260, non-receipt of mailed EBT card
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-260
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_reports_mailed_ebt_card_not_received
          and household_claims_unauthorized_use_of_ebt_card
