  summary: |-
    "The Economic Services worker or Economic Services supervisor must forward a copy of the same fair hearing summary and evidence to the household and Hearing Officer prior to the scheduled hearing." "If the summary and evidence is sent by first class mail, the evidentiary packet should be sent at least five days prior to the hearing." "Upon receipt of an appeal request the Office of Administrative Hearings (OAH) will" notify agency staff, schedule the hearing using Microsoft Teams, and notify the household in writing of the hearing details.
