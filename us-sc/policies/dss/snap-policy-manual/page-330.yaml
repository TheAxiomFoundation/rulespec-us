format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-330
  summary: '"The household must be given at least 10 days to submit verification."
    If there was not 10 days from the verification request to the end of December,
    verification is due by January 2 and the household may receive a full January
    allotment if verification is returned by that date. If verification is returned
    after case closure but by the end of the following month, benefits are prorated
    from the date verification is received; if received on February 1, the household
    must reapply.'
rules:
- name: verification_request_meets_minimum_response_period
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: SNAP Manual p.330, recertification verification examples
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-330
          excerpt: at least 10 days to submit verification
      - path: versions[0].formula
        kind: import
        import:
          target: us-sc:policies/dss/snap-policy-manual/page-329#minimum_verification_response_days
          output: minimum_verification_response_days
          hash: sha256:55b9ef1e4e4fb0596b15b3a3e8579af397b6416b9c9dc1c2788fd0b49a135c8a
  versions:
  - effective_from: '0001-01-01'
    formula: verification_response_days_available >= minimum_verification_response_days
- name: full_allotment_available_for_january_recertification
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: SNAP Manual p.330, Examples
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-330
          excerpt: has until January 2nd to return verification and receive a full
            allotment for January
  versions:
  - effective_from: '0001-01-01'
    formula: 'recertification_filed_in_december

      and incomplete_notice_or_verification_request_sent

      and verification_received_by_full_allotment_deadline'
- name: case_closes_if_verification_not_received_by_due_date
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: SNAP Manual p.330, Examples
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-330
          excerpt: case will close if verification is not received by January 2nd
  versions:
  - effective_from: '0001-01-01'
    formula: 'incomplete_notice_or_verification_request_sent

      and verification_not_received_by_due_date'
- name: prorated_benefits_available_from_verification_received_date
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: SNAP Manual p.330, recertification verification examples
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-330
          excerpt: until the end of the following month to return the verification
            and receive prorated benefits
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-330
          excerpt: Benefits would be prorated from the date verification is received
  versions:
  - effective_from: '0001-01-01'
    formula: 'verification_received_after_due_date

      and verification_received_by_end_of_following_month'
- name: new_application_required_after_late_verification
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: SNAP Manual p.330, Examples
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-330
          excerpt: must reapply with a new application because verification was received
            too late
  versions:
  - effective_from: '0001-01-01'
    formula: verification_received_after_end_of_following_month
imports:
- us-sc:policies/dss/snap-policy-manual/page-329#minimum_verification_response_days
