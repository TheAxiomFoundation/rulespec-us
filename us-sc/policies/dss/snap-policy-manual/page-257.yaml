format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-257
  summary: |-
    An inactive EBT account is an account with a balance in which there has been no withdrawal activity within a 60-day time period. Once a benefit has been posted to the account, even if the recipient is not eligible for the benefit, the Agency cannot debit the account except through authorized claims payment, expungement after 274 days of account inactivity, or EBT System adjustment.
rules:
  - name: ebt_account_inactivity_period_days
    kind: parameter
    dtype: Integer
    period: Day
    source: SNAP Manual page 257, Resolving an EBT account
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-257
              excerpt: "no withdrawal activity within a 60-day time period"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          60

  - name: ebt_account_expungement_inactivity_days
    kind: parameter
    dtype: Integer
    period: Day
    source: SNAP Manual page 257, Resolving an EBT account
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-257
              excerpt: "Expungement after 274 days of account inactivity"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          274

  - name: ebt_account_inactive
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Day
    source: SNAP Manual page 257, Resolving an EBT account
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-257
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          ebt_account_has_balance
          and days_since_withdrawal_activity >= ebt_account_inactivity_period_days

  - name: agency_may_debit_posted_ebt_account
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Day
    source: SNAP Manual page 257, Resolving an EBT account
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-257
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          benefit_has_been_posted_to_ebt_account
          and (
            debit_is_through_authorized_claims_payment
            or days_since_account_inactivity >= ebt_account_expungement_inactivity_days
            or debit_is_through_ebt_system_adjustment
          )
