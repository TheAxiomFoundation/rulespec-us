format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-404
  summary: '19.11 Eligibility for the Elderly Simplified Application Project (ESAP):
    This section has been updated to reflect that eligible ESAP households are assigned
    a 36-month certification period. 19.13 ... DSS Form 3808 Interim Contact is required
    to be completed by ESAP households at the 12th month & 24th month of the 36-month
    certification period and the DSS Form 3809 is required to be completed in the
    36th month.'
  deferred_outputs:
  - output: us-sc:policies/dss/snap-policy-manual/page-404#esap_certification_period_months
    reason: Generated rule used a local name that collides with a sibling RuleSpec
      export. This output is deferred until it can be encoded with a semantic branch-specific
      name without creating ambiguous sibling imports.
  - output: us-sc:policies/dss/snap-policy-manual/page-404#esap_household_assigned_certification_period_months
    reason: Generated rule depends on an output that validation deferred because it
      flattened thresholded, capped, base-limited, or cross-referenced mechanics,
      or borrowed an unrelated same-named section term.
rules:
- name: esap_first_interim_contact_month
  kind: parameter
  dtype: Count
  source: SNAP Manual page 404, section 19.13 update
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-404
          excerpt: at the 12th month & 24th month
  versions:
  - effective_from: '2018-04-01'
    formula: '12'
- name: esap_second_interim_contact_month
  kind: parameter
  dtype: Count
  source: SNAP Manual page 404, section 19.13 update
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-404
          excerpt: at the 12th month & 24th month
  versions:
  - effective_from: '2018-04-01'
    formula: '24'
- name: esap_renewal_contact_month
  kind: parameter
  dtype: Count
  source: SNAP Manual page 404, section 19.13 update
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-404
          excerpt: DSS Form 3809 is required to be completed in the 36th month
  versions:
  - effective_from: '2018-04-01'
    formula: '36'
- name: esap_form_3808_interim_contact_required
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: SNAP Manual page 404, section 19.13 update
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-404
          excerpt: DSS Form 3808 Interim Contact is required to be completed by ESAP
            households at the 12th month & 24th month
  versions:
  - effective_from: '2018-04-01'
    formula: 'household_is_esap_household

      and (certification_month_number == esap_first_interim_contact_month or certification_month_number
      == esap_second_interim_contact_month)'
- name: esap_form_3809_required
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: SNAP Manual page 404, section 19.13 update
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-404
          excerpt: DSS Form 3809 is required to be completed in the 36th month
  versions:
  - effective_from: '2018-04-01'
    formula: 'household_is_esap_household

      and certification_month_number == esap_renewal_contact_month'
