format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-262
  summary: |-
    Recommend a replacement of benefits and/or food in the actual amount of the loss but not to exceed the last issued amount of the household monthly benefits. Economic Services staff must approve a replacement within 10 calendar days of the reported loss. Households have up to 90 calendar days to initiate an EBT correction request; client initiated credit adjustments must be adjudicated and processed within 10 business days from the report. A fair hearing requested within 10 days of notice prevents EBT account adjustment pending the fair hearing decision.
rules:
  - name: replacement_approval_deadline_calendar_days
    kind: parameter
    dtype: Integer
    source: SNAP Manual p.262, replacement approval deadline
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-262
              excerpt: "within 10 calendar days of the reported loss"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10

  - name: ebt_correction_request_deadline_calendar_days
    kind: parameter
    dtype: Integer
    source: SNAP Manual p.262, EBT adjustment request deadline
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-262
              excerpt: "up to 90 calendar days to initiate a correction request"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          90

  - name: client_credit_adjustment_processing_deadline_business_days
    kind: parameter
    dtype: Integer
    source: SNAP Manual p.262, client initiated credit adjustment processing deadline
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-262
              excerpt: "within 10 business days from the date the client reports the error"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10

  - name: fair_hearing_hold_request_deadline_days
    kind: parameter
    dtype: Integer
    source: SNAP Manual p.262, fair hearing hold deadline
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-262
              excerpt: "within 10 days of the notice date"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10

  - name: fair_hearing_request_deadline_days
    kind: parameter
    dtype: Integer
    source: SNAP Manual p.262, fair hearing request deadline
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-262
              excerpt: "request a fair hearing within 90 days from the notice date"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          90

  - name: replacement_benefits_or_food_amount
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: SNAP Manual p.262, replacement amount
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-262
              excerpt: "actual amount of the loss but not to exceed the last issued amount"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          min(actual_amount_of_loss, last_issued_household_monthly_benefits)

  - name: restored_benefits_replacement_amount
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: SNAP Manual p.262, restored benefits replacement
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-262
              excerpt: "restored benefits, they must be replaced up to their full value"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if monthly_benefits_include_restored_benefits: restored_benefits_full_value else: 0

  - name: replacement_approval_timely
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: SNAP Manual p.262, replacement approval timing
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-262
              excerpt: "approve a replacement within 10 calendar days of the reported loss"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          calendar_days_from_reported_loss_to_replacement_approval <= replacement_approval_deadline_calendar_days

  - name: ebt_correction_request_timely_initiated
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: SNAP Manual p.262, EBT correction request initiation
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-262
              excerpt: "Households have up to 90 calendar days to initiate a correction request"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_called_ebt_helpline_to_initiate_request
          and calendar_days_from_error_to_correction_request <= ebt_correction_request_deadline_calendar_days

  - name: client_credit_adjustment_timely_processed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: SNAP Manual p.262, client initiated credit adjustment processing
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-262
              excerpt: "adjudicated and processed within 10 business days"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          business_days_from_client_report_to_credit_adjustment_processing <= client_credit_adjustment_processing_deadline_business_days

  - name: fair_hearing_request_timely
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: SNAP Manual p.262, fair hearing request timing
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-262
              excerpt: "request a fair hearing within 90 days from the notice date"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          client_requested_fair_hearing
          and days_from_notice_date_to_fair_hearing_request <= fair_hearing_request_deadline_days

  - name: ebt_account_adjustment_held_pending_fair_hearing
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: SNAP Manual p.262, fair hearing hold on EBT adjustment
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-262
              excerpt: "within 10 days of the notice date, no adjustment will be made"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          client_requested_fair_hearing
          and days_from_notice_date_to_fair_hearing_request <= fair_hearing_hold_request_deadline_days
