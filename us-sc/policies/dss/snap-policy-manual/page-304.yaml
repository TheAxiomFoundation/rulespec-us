format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-304
  summary: |-
    Acceptable Verification of Non-Citizen Eligibility ... Non-Citizens continue to be subject to a 5-year waiting period, unless exempted by Personal Responsibility Work Opportunity Act of 1996 (PRWORA). The OBBB limits eligibility for SNAP to the following groups: U.S. citizens, U.S. nationals, Lawful Permanent Residents (LPRs), Cuban and Haitian entrants, and Compacts of Free Association (COFA) citizens.
rules:
  - name: non_citizen_waiting_period_years
    kind: parameter
    dtype: Integer
    source: SNAP Manual page 304, Acceptable Verification of Non-Citizen Eligibility
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-304
              excerpt: 5-year waiting period
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          5

  - name: person_in_obbb_snap_citizenship_eligibility_group
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 304, OBBB eligibility limitation
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-304
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          person_is_us_citizen
          or person_is_us_national
          or person_is_lawful_permanent_resident
          or person_is_cuban_or_haitian_entrant
          or person_is_cofa_citizen

  - name: non_citizen_waiting_period_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 304, non-citizen waiting period
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-304
              excerpt: Non-Citizens continue to be subject to a 5-year waiting period, unless exempted by PRWORA.
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          person_is_non_citizen
          and not person_exempted_by_prwora

  - name: federally_recognized_indian_tribe_membership_verification_acceptable
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 304, Indian tribe membership verification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-304
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_has_membership_card_or_other_tribal_document_demonstrating_membership_in_federally_recognized_indian_tribe
          or tribal_government_contact_confirms_person_membership

  - name: fas_citizen_verification_acceptable
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 304, FAS citizen verification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-304
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_fas_citizen_residing_in_united_states
          and person_has_form_i_766_employment_authorization_document_for_fas
