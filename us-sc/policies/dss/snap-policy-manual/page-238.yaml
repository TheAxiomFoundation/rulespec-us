format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-238
  summary: |-
    SCCAP “Y” households are assigned a 36-month (3-year) certification period and mailed DSS Form 1602 once every three years. Failure to return a completed DSS Form 1602 will result in system generated case closure. Households may be excluded from SCCAP “Y” if out-of-pocket medical expenses exceed the monthly average of $50, combined monthly actual shelter and utility expenses exceed the higher SCCAP standard shelter/utility deduction, or the household pays legally obligated child support outside the home and is eligible for this deduction.
rules:
  - name: sccap_y_certification_period_months
    kind: parameter
    dtype: Count
    source: SNAP Manual 19.3, page 238
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-238
              excerpt: SCCAP “Y” households are assigned a 36-month (3-year) certification period.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          36

  - name: sccap_y_recertification_interval_years
    kind: parameter
    dtype: Count
    source: SNAP Manual 19.3, page 238
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-238
              excerpt: once every three years
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          3

  - name: sccap_y_medical_expense_monthly_average_threshold
    kind: parameter
    dtype: Money
    period: Month
    unit: USD
    source: SNAP Manual 19.4, page 238
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-238
              excerpt: monthly average of $50
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          50

  - name: sccap_y_household_certification_period_months
    kind: derived
    entity: Household
    dtype: Count
    period: Month
    source: SNAP Manual 19.3, page 238
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-238
          - path: versions[0].formula
            kind: import
            import:
              target: us-sc:policies/dss/snap-policy-manual/page-238#sccap_y_certification_period_months
              output: sccap_y_certification_period_months
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if household_meets_sccap_y_definition: sccap_y_certification_period_months else: 0

  - name: sccap_y_household_recertification_interval_years
    kind: derived
    entity: Household
    dtype: Count
    period: Month
    source: SNAP Manual 19.3, page 238
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-238
          - path: versions[0].formula
            kind: import
            import:
              target: us-sc:policies/dss/snap-policy-manual/page-238#sccap_y_recertification_interval_years
              output: sccap_y_recertification_interval_years
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if household_meets_sccap_y_definition: sccap_y_recertification_interval_years else: 0

  - name: sccap_y_medical_expense_exception_applies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 19.4, page 238
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-238
              excerpt: Out-of-pocket medical expenses incurred exceed the monthly average of $50.
          - path: versions[0].formula
            kind: import
            import:
              target: us-sc:policies/dss/snap-policy-manual/page-238#sccap_y_medical_expense_monthly_average_threshold
              output: sccap_y_medical_expense_monthly_average_threshold
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          out_of_pocket_medical_expenses_incurred_monthly_average > sccap_y_medical_expense_monthly_average_threshold

  - name: sccap_y_shelter_utility_expense_exception_applies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 19.4, page 238
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-238
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          combined_monthly_actual_shelter_and_utility_expenses_incurred > higher_sccap_standard_shelter_utility_deduction

  - name: sccap_y_child_support_exception_applies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 19.4, page 238
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-238
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_pays_legally_obligated_child_support_to_someone_outside_home
          and household_is_eligible_for_child_support_deduction

  - name: sccap_y_exception_applies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 19.4, page 238
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-238
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          sccap_y_medical_expense_exception_applies
          or sccap_y_shelter_utility_expense_exception_applies
          or sccap_y_child_support_exception_applies

  - name: household_may_receive_sccap_e_benefits
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 19.4, page 238
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-238
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          sccap_y_exception_applies

  - name: sccap_form_1602_nonreturn_closes_case
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 19.3, page 238
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-238
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_was_mailed_dss_form_1602
          and not household_returned_completed_dss_form_1602
