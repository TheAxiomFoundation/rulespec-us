format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-100
  summary: |-
    SNAP recipients who volunteer for participation with the SNAP E&T will be referred to the program. Participation in SNAP E&T is voluntary. Volunteers are not subject to sanctions for noncompliance; however, continuous refusal to participate in an assigned component may result in termination of services made available by the provider.
    A nonexempt individual who refuses or fails without good cause ... to comply with the SNAP work requirements ... is ineligible to participate in SNAP. Within 10 days of establishing that the noncompliance was without good cause, the Agency must provide the individual with a notice of adverse action. The disqualification period must begin with the first month following the expiration of the 10-day adverse notice period, unless a fair hearing is requested. If the individual complies before the end of the advance notice period, the Agency will cancel the adverse action.
rules:
  - name: adverse_action_notice_deadline_days
    kind: parameter
    dtype: Integer
    source: SNAP Manual § 8.5(1), adverse action notice deadline
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-100
              excerpt: "Within 10 days of establishing that the noncompliance was without good cause"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10

  - name: adverse_notice_period_days
    kind: parameter
    dtype: Integer
    source: SNAP Manual § 8.5(1), adverse notice period
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-100
              excerpt: "expiration of the 10-day adverse notice period"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10

  - name: snap_et_referral_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 100, SNAP E&T volunteer paragraph
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-100
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          snap_recipient_volunteered_for_snap_et

  - name: snap_et_provider_services_termination_may_apply
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 100, SNAP E&T volunteer paragraph
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-100
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          snap_recipient_volunteered_for_snap_et
          and snap_et_component_assigned
          and continuously_refuses_to_participate_in_assigned_component

  - name: person_ineligible_to_participate_in_snap_due_to_work_requirement_noncompliance
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual § 8.5(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-100
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_nonexempt_from_snap_work_requirements
          and refuses_or_fails_to_comply_with_snap_work_requirements
          and not good_cause_for_work_requirement_noncompliance_exists

  - name: adverse_action_notice_requirement_satisfied
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual § 8.5(1), notice of adverse action
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-100
              excerpt: "Within 10 days of establishing that the noncompliance was without good cause"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not agency_established_noncompliance_without_good_cause
          or days_between_establishing_noncompliance_and_adverse_action_notice <= adverse_action_notice_deadline_days

  - name: disqualification_period_must_begin
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual § 8.5(1), disqualification period start
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-100
              excerpt: "first month following the expiration of the 10-day adverse notice period, unless a fair hearing is requested"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          agency_established_noncompliance_without_good_cause
          and days_elapsed_since_adverse_notice_period_began >= adverse_notice_period_days
          and period_is_first_month_following_expiration_of_adverse_notice_period
          and not fair_hearing_requested_before_disqualification_period_begins

  - name: agency_must_cancel_adverse_action
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual § 8.5(1), compliance before advance notice period ends
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-100
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          adverse_action_pending_for_work_noncompliance
          and individual_complied_before_end_of_advance_notice_period
