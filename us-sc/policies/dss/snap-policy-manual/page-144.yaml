format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-144
  summary: |-
    "(O) Garnished income from unearned income Income that is required by court order to be withheld and diverted to a third party as payment on a debt." "(P) Government sponsored programs payments Payments from Government-sponsored programs" "(Q) Governmental rent, housing subsidies" "(R) Home Energy Assistance Payments Payments or allowances made to provide energy assistance. NOTE: Exclude the following: ..."

rules:
  - name: garnished_unearned_income_payment
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: SNAP Manual page 144 (O)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-144
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          payment_is_unearned_income
          and payment_required_by_court_order_to_be_withheld_and_diverted_to_third_party_as_payment_on_debt

  - name: government_sponsored_program_payment
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: SNAP Manual page 144 (P)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-144
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          payment_from_government_sponsored_program

  - name: governmental_rent_or_housing_subsidy
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: SNAP Manual page 144 (Q)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-144
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          payment_is_governmental_rent_subsidy
          or payment_is_governmental_housing_subsidy

  - name: home_energy_assistance_payment
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: SNAP Manual page 144 (R)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-144
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          payment_or_allowance_made_to_provide_energy_assistance

  - name: energy_assistance_payment_under_federal_law_other_than_part_a_title_iv
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: SNAP Manual page 144 (R) note, first excluded category
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-144
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          payment_or_allowance_made_for_purpose_of_providing_energy_assistance
          and payment_made_under_federal_law
          and not payment_made_under_part_a_of_title_iv_of_social_security_act

  - name: one_time_weatherization_or_emergency_heating_cooling_payment
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: SNAP Manual page 144 (R) note, second excluded category
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-144
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          payment_or_allowance_is_one_time_and_applied_for_on_as_needed_basis
          and payment_made_under_federal_or_state_law
          and payment_for_weatherization_or_emergency_repair_or_replacement_of_heating_or_cooling_devices

  - name: energy_assistance_payment_through_hhs_or_csa_crisis_program
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: SNAP Manual page 144 (R) note, third excluded category
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-144
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          payment_provided_through_hhs_low_income_home_energy_assistance_program
          or payment_provided_through_community_services_administration_energy_crisis_assistance
          or payment_provided_through_community_services_administration_crisis_intervention_program

  - name: hud_utility_payment
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: SNAP Manual page 144 (R) note, fourth excluded category
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-144
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          payment_is_hud_payment
          and payment_paid_for_utilities
