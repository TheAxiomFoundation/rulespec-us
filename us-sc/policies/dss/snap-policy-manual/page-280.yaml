  summary: |-
    As part of the review the Agency will contact local migrant councils, advocate groups, or other organizations in the project area/county to ensure that migrants are receiving the required services. During each review period, the Agency will review the national target areas of program operation specified by FNS. FNS will notify the Agency of the minimum program areas to be reviewed at least 90 days before the beginning of each annual review period. The Agency has 60 days in which to establish a plan schedule for such reviews. The Agency will develop a review plan prior to each ME review.
