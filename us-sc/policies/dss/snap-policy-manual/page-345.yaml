format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-345
  summary: |-
    ABAWD means a SNAP household member who is an able-bodied adult at least 18 but under 65, and without dependents under 14 in the household. Adequate notice includes stated elements and allows participants ten days from mailing to contest agency action.
rules:
  - name: abawd_maximum_age_exclusive
    kind: parameter
    dtype: Integer
    source: SNAP Manual 345, Glossary, "Able-bodied Adult Without Dependents (ABAWD)"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-345
              excerpt: "under 65"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          65

  - name: abawd_dependent_age_limit_exclusive
    kind: parameter
    dtype: Integer
    source: SNAP Manual 345, Glossary, "Able-bodied Adult Without Dependents (ABAWD)"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-345
              excerpt: "dependents under 14 years of age"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          14

  - name: adequate_notice_contest_period_days
    kind: parameter
    dtype: Count
    source: SNAP Manual 345, Glossary, "Adequate Notice"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-345
              excerpt: "allowed ten days from the mailing date"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10

  - name: able_bodied_adult_without_dependents
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual 345, Glossary, "Able-bodied Adult Without Dependents (ABAWD)"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-345
          - path: versions[0].formula
            kind: import
            import:
              target: us-ma:regulations/106-cmr/362/300/block-1#abawd_minimum_age
              output: abawd_minimum_age
              hash: sha256:165a85d01c0d43f0b77cb46d023ce6a1023956e842f56766a2d8c9eea7991321
          - path: versions[0].formula
            kind: import
            import:
              target: us-sc:policies/dss/snap-policy-manual/page-345#abawd_maximum_age_exclusive
              output: abawd_maximum_age_exclusive
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_snap_household_member
          and person_is_able_bodied_adult
          and person_age_years >= abawd_minimum_age
          and person_age_years < abawd_maximum_age_exclusive
          and not household_has_dependent_under_abawd_dependent_age_limit_exclusive

  - name: adequate_notice
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: SNAP Manual 345, Glossary, "Adequate Notice"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-345
          - path: versions[0].formula
            kind: import
            import:
              target: us-sc:policies/dss/snap-policy-manual/page-345#adequate_notice_contest_period_days
              output: adequate_notice_contest_period_days
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          notice_is_written
          and notice_states_action_taken_or_intended
          and notice_states_reason_for_intended_action
          and notice_states_snap_household_right_to_request_fair_hearing
          and notice_includes_contact_information
          and notice_states_availability_of_continued_snap_benefits
          and notice_states_household_liability_for_overissuances_if_adverse_hearing_decision
          and contest_period_days_allowed_from_mailing_date >= adequate_notice_contest_period_days

imports:
  - us-ma:regulations/106-cmr/362/300/block-1#abawd_minimum_age
