format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-254
  summary: |-
    Regardless of current eligibility, the Agency restores lost benefits by issuing an allotment equal to the benefits lost, in addition to any current allotment. The Agency honors reasonable monthly-installment requests. If household membership changed, restoration goes to the household with a majority of members from the time of loss, or if that cannot be located or determined, to the household containing the head at the time of loss. The Agency maintains accounting documentation of restoration entitlement, calculation, reason, and remaining balance.
rules:
  - name: restored_lost_benefits_allotment
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: SNAP Manual 21.6 Method of Restoration
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-254
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          max(0, lost_benefits_amount)

  - name: total_allotment_with_restoration
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: SNAP Manual 21.6 Method of Restoration
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-254
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          max(0, current_allotment_entitled_amount) + restored_lost_benefits_allotment

  - name: monthly_installment_restoration_request_must_be_honored
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 21.6 Method of Restoration
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-254
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_makes_reasonable_request_to_restore_lost_benefits_in_monthly_installments

  - name: restoration_recipient_after_household_composition_change
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 21.7 Changes in Household Composition
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-254
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          lost_benefits_are_due_to_household
          and household_membership_has_changed
          and (
            household_contains_majority_of_individuals_who_were_members_at_time_loss_occurred
            or (
              agency_cannot_locate_or_determine_household_containing_majority_of_members
              and household_contains_head_of_household_at_time_loss_occurred
            )
          )

  - name: restoration_accounting_record_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 21.8 Accounting Procedures
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-254
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_has_entitlement_to_restoration_of_lost_benefits

  - name: restoration_accounting_record_minimum_contents_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 21.8 Accounting Procedures
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-254
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          restoration_accounting_documents_how_amount_was_calculated
          and restoration_accounting_documents_reason_lost_benefits_must_be_restored
