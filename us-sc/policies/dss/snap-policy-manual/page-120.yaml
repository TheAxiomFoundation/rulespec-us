format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-120
  summary: |-
    PSP scholarships cover tuition and books for SNAP recipients in short term vocational training and certification programs of less than one year, subject to application, approval, and available funds. SNAP E&T OJT is full-time paid training; employers may not participate if they violate labor laws, face strike/lockout/unusual labor conditions, or are/imploy an immediate family member of the employee/trainee. OJT trainees must receive regular supervision, comparable pay, benefits, and periodic increases, at least $12.00 per hour, UI coverage, legally required benefits, and tips, commissions, or overtime do not count as wages.
rules:
  - name: psp_training_duration_limit_years
    kind: parameter
    dtype: Count
    source: SNAP Manual p. 120, PSP short term training duration
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-120
              excerpt: "less than one year"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1

  - name: ojt_minimum_hourly_compensation
    kind: parameter
    dtype: Money
    unit: USD
    period: Hour
    source: SNAP Manual p. 120, OJT compensation standard
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-120
              excerpt: "at least $12.00 per hour"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          12.00

  - name: psp_scholarship_available
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 120, PSP scholarship availability
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-120
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_snap_recipient
          and person_applies_for_psp_scholarship
          and person_approved_by_snap_et_state_office
          and psp_funds_are_available
          and training_is_vocational
          and training_is_short_term_certification_program
          and training_duration_years < psp_training_duration_limit_years

  - name: psp_scholarship_covers_tuition_and_books
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 120, PSP covered costs
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-120
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          psp_scholarship_available

  - name: employer_category_eligible_for_snap_et_ojt
    kind: derived
    entity: Employer
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 120, employers eligible to participate in SNAP E&T OJT
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-120
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          employer_is_private_employer
          or employer_is_public_employer
          or employer_is_public_agency
          or employer_is_private_company_or_corporation
          or employer_is_nonprofit_company_or_corporation

  - name: employer_disqualified_from_snap_et_ojt
    kind: derived
    entity: Employer
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 120, employers not eligible to participate in SNAP E&T OJT
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-120
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          employer_is_in_violation_of_labor_laws
          or employer_is_involved_in_strike_lockout_or_unusual_labor_condition
          or employer_is_or_employs_immediate_family_member_of_employee_trainee

  - name: employer_may_participate_in_snap_et_ojt
    kind: derived
    entity: Employer
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 120, OJT employer participation eligibility
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-120
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          employer_category_eligible_for_snap_et_ojt
          and not employer_disqualified_from_snap_et_ojt

  - name: ojt_employee_trainee_compensation_standard_met
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 120, OJT employee/trainee compensation standard
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-120
              excerpt: "at least $12.00 per hour"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          ojt_hourly_compensation_excluding_tips_commissions_and_overtime >= ojt_minimum_hourly_compensation
          and trainee_receives_same_rate_of_pay_as_same_job_function_employees
          and trainee_receives_same_benefits_as_same_job_function_employees
          and trainee_receives_same_periodic_increases_as_same_job_function_employees
          and trainee_has_unemployment_insurance_coverage
          and trainee_receives_other_benefits_required_by_law
          and trainee_receives_benefits_same_level_and_extent_as_similarly_employed_persons

  - name: ojt_employee_trainee_placement_standard_met
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 120, OJT placement standards
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-120
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          employee_trainee_is_snap_et_ojt_participant
          and ojt_is_full_time_training_activity
          and employee_trainee_is_paid_employee_engaged_in_productive_work
          and ojt_provides_knowledge_and_skills_essential_to_job_performance
          and employee_trainee_regularly_supervised_by_participating_employer
          and ojt_employee_trainee_compensation_standard_met
