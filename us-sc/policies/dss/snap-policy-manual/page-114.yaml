format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-114
  summary: 'An ABAWD who has used his or her three countable months may regain eligibility
    to participate in SNAP in one of three ways: by fulfilling the ABAWD work requirement
    for 80 hours during a "30 consecutive day period"; by meeting an exception to
    the ABAWD work requirement or otherwise being exempt; or when the 3-year period
    expires. NOTE: The client must reapply or ask to be added to the household''s
    SNAP budget.'
  deferred_outputs:
  - output: us-sc:policies/dss/snap-policy-manual/page-114#abawd_countable_month_limit
    reason: Generated rule used a local name that collides with a sibling RuleSpec
      export. This output is deferred until it can be encoded with a semantic branch-specific
      name without creating ambiguous sibling imports.
  - output: us-sc:policies/dss/snap-policy-manual/page-114#abawd_has_used_countable_month_limit
    reason: Generated rule depends on an output that validation deferred because it
      flattened thresholded, capped, base-limited, or cross-referenced mechanics,
      or borrowed an unrelated same-named section term.
  - output: us-sc:policies/dss/snap-policy-manual/page-114#abawd_regains_snap_eligibility
    reason: Generated rule depends on an output that validation deferred because it
      flattened thresholded, capped, base-limited, or cross-referenced mechanics,
      or borrowed an unrelated same-named section term.
  - output: us-sc:policies/dss/snap-policy-manual/page-114#regained_abawd_benefits_calculated_from_application_date
    reason: Generated rule depends on an output that validation deferred because it
      flattened thresholded, capped, base-limited, or cross-referenced mechanics,
      or borrowed an unrelated same-named section term.
  - output: us-sc:policies/dss/snap-policy-manual/page-114#regained_abawd_benefits_effective_month_after_add_request
    reason: Generated rule depends on an output that validation deferred because it
      flattened thresholded, capped, base-limited, or cross-referenced mechanics,
      or borrowed an unrelated same-named section term.
  - output: us-sc:policies/dss/snap-policy-manual/page-114#workfare_regained_allotment_prorated_back_to_application_date
    reason: Generated rule depends on an output that validation deferred because it
      flattened thresholded, capped, base-limited, or cross-referenced mechanics,
      or borrowed an unrelated same-named section term.
rules:
- name: abawd_regain_work_requirement_hours
  kind: parameter
  dtype: Count
  source: "SNAP Manual \xA78.19"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-114
          excerpt: 80 hours
  versions:
  - effective_from: '0001-01-01'
    formula: '80'
- name: abawd_regain_work_requirement_consecutive_days
  kind: parameter
  dtype: Count
  source: "SNAP Manual \xA78.19"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-114
          excerpt: 30 consecutive day period
  versions:
  - effective_from: '0001-01-01'
    formula: '30'
- name: abawd_time_tracking_period_years
  kind: parameter
  dtype: Count
  source: "SNAP Manual \xA78.19"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-114
          excerpt: 3-year period expires
  versions:
  - effective_from: '0001-01-01'
    formula: '3'
- name: abawd_current_or_prospective_work_requirement_verified
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: "SNAP Manual \xA78.19(1)(a)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-114
          excerpt: has met or will meet the work requirement for 30 consecutive days
  versions:
  - effective_from: '0001-01-01'
    formula: 'verified_current_or_prospective_work_hours_during_consecutive_day_period
      >= abawd_regain_work_requirement_hours

      and verified_current_or_prospective_consecutive_work_period_days == abawd_regain_work_requirement_consecutive_days'
- name: abawd_prior_work_requirement_verified
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: "SNAP Manual \xA78.19(1)(b)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-114
          excerpt: met the work requirement for 30 consecutive days prior to application
  versions:
  - effective_from: '0001-01-01'
    formula: 'verified_prior_work_hours_during_consecutive_day_period >= abawd_regain_work_requirement_hours

      and verified_prior_consecutive_work_period_days == abawd_regain_work_requirement_consecutive_days'
- name: abawd_regains_snap_eligibility_by_work_requirement
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: "SNAP Manual \xA78.19(1)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-114
  versions:
  - effective_from: '0001-01-01'
    formula: "(\n  abawd_fulfilling_work_requirement_at_application_or_add_request\n\
      \  and abawd_current_or_prospective_work_requirement_verified\n)\nor (\n  not\
      \ abawd_fulfilling_work_requirement_at_application_or_add_request\n  and abawd_prior_work_requirement_verified\n\
      )"
- name: abawd_regains_snap_eligibility_by_exception_or_exemption
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: "SNAP Manual \xA78.19(2)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-114
  versions:
  - effective_from: '0001-01-01'
    formula: 'abawd_meets_exception_to_work_requirement

      or abawd_is_otherwise_exempt_from_work_requirement'
- name: abawd_regains_snap_eligibility_by_three_year_period_expiration
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: "SNAP Manual \xA78.19(3)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-114
          excerpt: When the 3-year period expires
  versions:
  - effective_from: '0001-01-01'
    formula: abawd_time_tracking_period_years_elapsed >= abawd_time_tracking_period_years
