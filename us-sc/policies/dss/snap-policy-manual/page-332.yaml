format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-332
  summary: |-
    The household has 30 days from the date recertification was received to provide requested verification and receive a full month's allotment; if the 30th day falls on a weekend or holiday, the household has until the next business day. If the 30th day falls on a weekend or holiday, the worker has until the last business day prior to the 30th day to process the case and still be timely.
rules:
  - name: recertification_verification_deadline_days
    kind: parameter
    dtype: Count
    source: SNAP Manual page 332, recertification verification deadline
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-332
              excerpt: "30 days from the date the recertification was received"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: verification_timely_for_full_month_allotment
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 332, household verification timing for full month's allotment
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-332
              excerpt: "provide the requested verification ... receive a full month's allotment"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-332
              excerpt: "If the 30th day falls on a weekend or holiday, the household will have until the next business day"
          - path: versions[0].formula
            kind: import
            import:
              target: us-sc:policies/dss/snap-policy-manual/page-332#recertification_verification_deadline_days
              output: recertification_verification_deadline_days
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          verification_days_after_recetification_received <= recertification_verification_deadline_days
          or (thirtieth_day_falls_on_weekend_or_holiday and verification_received_by_next_business_day)

  - name: worker_processing_timely_when_thirtieth_day_nonbusiness
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 332, worker processing timeliness when 30th day is weekend or holiday
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-332
              excerpt: "If the 30th day falls on a weekend or holiday, the worker has until the last business day prior to the 30th day"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          thirtieth_day_falls_on_weekend_or_holiday
          and worker_processed_case_by_last_business_day_prior_to_verification_deadline
