format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-322
  summary: 'Untimely 16th - 30th (31st): Annual recertification form due June 15th,
    household submits form June 20th. Interview delayed by household. When the "A"
    Form is registered, interview date is populated 10 days from registration. If
    no additional verification is needed and the household completes the interview,
    processing by July 20 prevents denial and the household is entitled to a full
    month''s allotment for July. If additional verification is needed, the household
    is given 10 days to provide information; however, the household has 30 days from
    the date the "A" Form was received to provide requested verification and still
    be entitled to a full month allotment.'
rules:
- name: interview_scheduling_offset_days
  kind: parameter
  dtype: Integer
  source: SNAP Manual 322, Untimely 16th-30th (31st), process
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-322
          excerpt: June 30th (10 days from the registration date)
  versions:
  - effective_from: '0001-01-01'
    formula: '10'
- name: full_allotment_verification_window_days_from_a_form_received
  kind: parameter
  dtype: Integer
  source: SNAP Manual 322, Untimely 16th-30th (31st), additional verification process
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-322
          excerpt: 30 days from the date the "A" Form was received
  versions:
  - effective_from: '0001-01-01'
    formula: '30'
- name: untimely_recipient_entitled_to_full_initial_month_allotment
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: SNAP Manual 322, Untimely 16th-30th (31st), household-delayed interview
    examples
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-322
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-322
          excerpt: entitled to a full month's allotment
  versions:
  - effective_from: '0001-01-01'
    formula: "recertification_form_submitted_untimely_16th_through_30th_or_31st\n\
      and interview_delayed_by_household\nand household_completed_interview\nand recertification_form_processed_within_full_allotment_window\n\
      and (\n  no_additional_verification_needed_after_interview\n  or requested_verification_provided_within_a_form_30_day_window\n\
      )"
- name: requested_verification_still_within_full_allotment_window
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: SNAP Manual 322, Untimely 16th-30th (31st), additional verification process
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-322
          excerpt: 30 days from the date the "A" Form was received to provide requested
            verification
  versions:
  - effective_from: '0001-01-01'
    formula: 'additional_verification_needed_after_interview

      and requested_verification_provided_within_a_form_30_day_window'
imports:
