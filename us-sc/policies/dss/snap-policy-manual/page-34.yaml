format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-34
  summary: |-
    If a household contacting the Agency by telephone does not wish to come to the office to file the application that same day and instead prefers receiving an application through the mail, the Agency will mail an application form to the household on the same day the telephone request is received. An application will also be mailed on the same day a written request for food assistance is received. Applications can be registered by any county office regardless of the applicant's county of residence. If completed by telephone, Outreach Partners record the applicants' agreements; the recording is kept on-file for 4 years; hard copies are sent with instructions to report any inaccuracies within 10 days.
rules:
  - name: outreach_partner_telephone_signature_recording_retention_years
    kind: parameter
    dtype: Count
    source: SNAP Manual p. 34, Outreach Partners telephone applications
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-34
              excerpt: The recording is kept on-file for 4 years.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          4

  - name: outreach_partner_inaccuracy_report_deadline_days
    kind: parameter
    dtype: Count
    source: SNAP Manual p. 34, Outreach Partners hard-copy application forms
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-34
              excerpt: report any inaccuracies within 10 days.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10

  - name: same_day_application_mailing_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: SNAP Manual p. 34, application requests by telephone or in writing
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-34
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (
            household_contacts_agency_by_telephone
            and not household_wishes_to_come_to_office_to_file_application_that_same_day
            and household_prefers_receiving_application_through_mail
          )
          or written_request_for_food_assistance_received

  - name: nonresident_county_office_must_accept_scan_and_assign_application
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: SNAP Manual p. 34, applications received outside county of residence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-34
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          application_received_in_county_other_than_household_resides
          and (
            application_received_in_person
            or application_received_by_mail
            or application_received_by_fax
            or application_received_online
          )

  - name: benefits_and_processing_standards_begin_on_application_receipt_day
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: SNAP Manual p. 34, nonresident county application receipt
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-34
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          application_received_in_county_other_than_household_resides
          and (
            application_received_in_person
            or application_received_by_mail
            or application_received_by_fax
            or application_received_online
          )

  - name: outreach_partner_telephonic_signature_allowed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: SNAP Manual p. 34, Outreach Partner telephonic signatures
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-34
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          application_submitted_through_outreach_partner
          and application_completed_by_telephone_with_outreach_partner
          and outreach_partner_approved_to_accept_telephonic_signatures

  - name: outreach_partner_recording_retention_years_required
    kind: derived
    entity: Household
    dtype: Count
    period: Day
    source: SNAP Manual p. 34, Outreach Partner telephonic signature recording
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-34
              excerpt: The recording is kept on-file for 4 years.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if application_completed_by_telephone_with_outreach_partner and outreach_partner_approved_to_accept_telephonic_signatures: outreach_partner_telephone_signature_recording_retention_years else: 0

  - name: outreach_partner_inaccuracy_report_window_days
    kind: derived
    entity: Household
    dtype: Count
    period: Day
    source: SNAP Manual p. 34, Outreach Partner hard-copy application forms
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-34
              excerpt: report any inaccuracies within 10 days.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if application_filed_through_outreach_partner: outreach_partner_inaccuracy_report_deadline_days else: 0
