format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-424
  summary: SNAP Manual page 424 states that a SNAP household is entitled to a notice
    of adverse action before any case action if the household contains an individual
    disqualified in another State and still within the disqualification period; SCCAP
    "Y" households are assigned a 36-month certification period; and effective October
    1, 2021, the elderly/disabled separate-household gross monthly income standard
    is 165 percent of poverty.
rules:
- name: elderly_disabled_separate_household_gross_income_poverty_rate
  kind: parameter
  dtype: Rate
  source: 2.2(2) Special Household Requirements (Elderly and disabled persons)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-424
          excerpt: effective October 1, 2021 to reflect the increase in the gross
            monthly income (165 percent of poverty)
  versions:
  - effective_from: '2021-10-01'
    formula: '1.65'
- name: adverse_action_notice_required_for_other_state_disqualification
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: 14.1(4) Treatment of Income and Resources of Certain Non-Household Members
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-424
  versions:
  - effective_from: '0001-01-01'
    formula: 'household_contains_individual_disqualified_in_another_state

      and individual_is_still_within_disqualification_period'
- name: sccap_y_household_certification_period
  kind: derived
  entity: Household
  dtype: Count
  period: Month
  source: 19.3 Processing Households Eligible for the South Carolina Combined Application
    Project (SCCAP)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-424
          excerpt: SCCAP "Y" households are now assigned a 36-month (3-year) certification
            period.
      - path: versions[0].formula
        kind: import
        import:
          target: us-sc:policies/dss/snap-policy-manual/page-238#sccap_y_certification_period_months
          output: sccap_y_certification_period_months
          hash: sha256:da101c2b6537344c0f6e81e934c3adcccf7da5bfadd4148397f7e4658ab7f6bd
  versions:
  - effective_from: '0001-01-01'
    formula: 'if household_is_sccap_y: sccap_y_certification_period_months else: 0'
- name: elderly_disabled_separate_household_gross_income_limit
  kind: derived
  entity: Household
  dtype: Money
  period: Month
  unit: USD
  source: 2.2(2) Special Household Requirements (Elderly and disabled persons)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-424
          excerpt: gross monthly income (165 percent of poverty) that is used in determining
            separate household eligibility
      - path: versions[0].formula
        kind: import
        import:
          target: us-sc:policies/dss/snap-policy-manual/page-424#elderly_disabled_separate_household_gross_income_poverty_rate
          output: elderly_disabled_separate_household_gross_income_poverty_rate
          hash: sha256:local
  versions:
  - effective_from: '2021-10-01'
    formula: elderly_disabled_separate_household_gross_income_poverty_rate * poverty_guideline_amount
imports:
- us-sc:policies/dss/snap-policy-manual/page-238#sccap_y_certification_period_months
