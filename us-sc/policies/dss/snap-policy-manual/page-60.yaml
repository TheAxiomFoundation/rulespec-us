format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-60
  summary: |-
    If a medical expense cannot be verified within 30 days of application, the Agency determines eligibility and benefits without deducting the unverified expense. If missing verification is later provided, the Agency re-determines benefits and prorates nonrecurring medical expense amounts over the months remaining in the certification period. The Agency verifies child support legal obligation, obligation amount, actual monthly payments, ABAWD work hours, and countable months used in another State when indicated.
  deferred_outputs:
    - output: us-sc:policies/dss/snap-policy-manual/page-60#benefits_restored_retroactive_to_application_month
      reason: The source conditions retroactive restoration on whether the Agency failed to allow sufficient time as defined by Section 6.4 Delays in Processing, but that cited source is not available in copied context.
    - output: us-sc:policies/dss/snap-policy-manual/page-60#application_handled_under_delays_in_processing
      reason: The source directs applications that would be ineligible unless the expense is allowed to be handled as provided in Section 6.4 Delays in Processing, but that cited source is not available in copied context.
rules:
  - name: medical_expense_verification_processing_days
    kind: parameter
    dtype: Count
    source: SNAP Manual page 60, medical expense verification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-60
              excerpt: "within 30 days of the date of application"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30
  - name: unverified_medical_expense_deduction_allowed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 60, unverified medical expenses
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-60
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not medical_expense_cannot_be_verified_within_processing_days
  - name: benefits_redetermined_after_missing_medical_verification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 60, subsequent medical expense verification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-60
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_subsequently_provides_missing_medical_expense_verification
  - name: prorated_nonrecurring_medical_expense_amount
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: SNAP Manual page 60, nonrecurring medical expense proration note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-60
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if household_provides_previously_requested_medical_expense_verification and certification_period_months_remaining > 0: nonrecurring_medical_expense_amount / certification_period_months_remaining else: 0
  - name: child_support_legal_obligation_verification_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 60, child support verification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-60
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_has_legal_obligation_to_pay_child_support
  - name: child_support_obligation_amount_verification_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 60, child support verification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-60
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_has_legal_obligation_to_pay_child_support
  - name: actual_monthly_child_support_payment_verification_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 60, child support verification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-60
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_actually_pays_child_support
  - name: legal_obligation_documents_verify_actual_monthly_child_support_payments
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 60, child support verification note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-60
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          document_is_not_accepted_as_verification_of_legal_obligation
  - name: abawd_work_hours_verification_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 60, ABAWD work hours verification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-60
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_subject_to_abawd_time_limit
          and (individual_satisfies_work_requirement_by_working or individual_satisfies_work_requirement_by_combining_work_and_work_program or individual_satisfies_work_requirement_by_work_program or individual_satisfies_work_requirement_by_workfare_program)
  - name: abawd_other_state_countable_months_verification_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 60, ABAWD countable months in another State
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-60
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_subject_to_abawd_time_limit
          and indication_individual_participated_in_another_state_during_current_three_year_time_period
