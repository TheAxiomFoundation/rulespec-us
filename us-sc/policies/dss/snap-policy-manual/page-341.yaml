format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-341
  summary: |-
    "Commonly used Non-Immigrant Classes of Admission (COA) Codes" include B-1, B-2, CP, F-1, F-2, F-3, J-1, J-2, T-1 through T-5, TW3, and U-1 through U-5. "A non-immigrant is a non-citizen temporarily admitted to the United States for a specific purpose other than permanent residence."
rules:
  - name: commonly_used_non_immigrant_coa_code
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual 341, Commonly used Non-Immigrant Classes of Admission (COA) Codes
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-341
              excerpt: "COA Code Description B-1 ... U-5"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          coa_code_is_b_1
          or coa_code_is_b_2
          or coa_code_is_cp
          or coa_code_is_f_1
          or coa_code_is_f_2
          or coa_code_is_f_3
          or coa_code_is_j_1
          or coa_code_is_j_2
          or coa_code_is_t_1
          or coa_code_is_t_2
          or coa_code_is_t_3
          or coa_code_is_t_4
          or coa_code_is_t_5
          or coa_code_is_tw3
          or coa_code_is_u_1
          or coa_code_is_u_2
          or coa_code_is_u_3
          or coa_code_is_u_4
          or coa_code_is_u_5
  - name: non_immigrant
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual 341, Non-Immigrant Classes of Admission
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-341
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_non_citizen
          and person_temporarily_admitted_to_united_states
          and person_admitted_for_specific_purpose_other_than_permanent_residence
