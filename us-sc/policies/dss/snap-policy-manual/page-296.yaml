format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-296
  summary: |-
    Respiratory System: Asthma, Cystic Fibrosis, Bronchiectasis, Chronic pulmonary hypertension due to any cause, Lung transplant, Respiratory Failure. Cardiovascular System: Chronic heart failure, Ischemic heart disease, Recurrent Arrhythmias, Symptomatic congenital heart disease, Heart transplant, Aneurysm of aorta or major branches, Chronic venous insufficiency, Peripheral Arterial Disease. Digestive System: Gastrointestinal Hemorrhaging from any cause, requiring blood transfusion, Chronic liver disease, Inflammatory Bowel Disease (IBD), Short Bowel Syndrome (SBS), Weight Loss due to any digestive disorder, Liver transplant.
rules:
  - name: listed_respiratory_system_condition
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 296, Respiratory System list
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-296
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_has_asthma
          or person_has_cystic_fibrosis
          or person_has_bronchiectasis
          or person_has_chronic_pulmonary_hypertension_due_to_any_cause
          or person_has_lung_transplant
          or person_has_respiratory_failure
  - name: listed_cardiovascular_system_condition
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 296, Cardiovascular System list
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-296
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_has_chronic_heart_failure
          or person_has_ischemic_heart_disease
          or person_has_recurrent_arrhythmias
          or person_has_symptomatic_congenital_heart_disease
          or person_has_heart_transplant
          or person_has_aneurysm_of_aorta_or_major_branches
          or person_has_chronic_venous_insufficiency
          or person_has_peripheral_arterial_disease
  - name: listed_digestive_system_condition
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 296, Digestive System list
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-296
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_has_gastrointestinal_hemorrhaging_requiring_blood_transfusion
          or person_has_chronic_liver_disease
          or person_has_inflammatory_bowel_disease
          or person_has_short_bowel_syndrome
          or person_has_weight_loss_due_to_any_digestive_disorder
          or person_has_liver_transplant
  - name: listed_condition
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 296, listed Respiratory, Cardiovascular, and Digestive System conditions
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-296
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          listed_respiratory_system_condition
          or listed_cardiovascular_system_condition
          or listed_digestive_system_condition
