format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-229
  summary: |-
    The Office of Administrative Hearings must send a written notice (order to dismiss) within 10 days of a withdrawal request. The notice must advise the household that it has 10 days from receipt to inform OAH, the Economic Services worker, or supervisor that it wishes to reinstate/reschedule the hearing. If timely informed, the fair hearing must be held. The 60-day fair hearing decision time frame begins when the household notifies the worker or supervisor that it wishes to continue, and a fair hearing must be reinstated as requested at least once.
rules:
  - name: order_to_dismiss_notice_deadline_days
    kind: parameter
    dtype: Count
    source: SNAP Manual page 229, withdrawal notice deadline
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-229
              excerpt: "within 10 days of the withdrawal request"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10

  - name: reinstatement_request_deadline_days
    kind: parameter
    dtype: Count
    source: SNAP Manual page 229, reinstatement request deadline
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-229
              excerpt: "10 days from the date it receives the order to dismiss"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10

  - name: fair_hearing_decision_timeframe_days
    kind: parameter
    dtype: Count
    source: SNAP Manual page 229, fair hearing decision time frame
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-229
              excerpt: "The 60-day time frame in Section 18.11"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          60

  - name: minimum_required_reinstatements_count
    kind: parameter
    dtype: Count
    source: SNAP Manual page 229, minimum reinstatement obligation
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-229
              excerpt: "must reinstate a fair hearing as requested by the household at least once"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1

  - name: order_to_dismiss_notice_timely
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: SNAP Manual page 229, withdrawal confirmation notice
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-229
              excerpt: "within 10 days of the withdrawal request"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-229
              excerpt: "within 10 days of the withdrawal request"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          days_after_withdrawal_request_order_to_dismiss_notice_sent <= order_to_dismiss_notice_deadline_days

  - name: reinstatement_request_timely
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: SNAP Manual page 229, request to reinstate or reschedule hearing
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-229
              excerpt: "10 days from the date it receives the order to dismiss"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-229
              excerpt: "10 days from the date it receives the order to dismiss"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          days_after_household_receives_order_to_dismiss_reinstatement_request_made <= reinstatement_request_deadline_days

  - name: fair_hearing_must_be_held_after_timely_reinstatement_request
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: SNAP Manual page 229, timely reinstatement consequence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-229
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          reinstatement_request_timely

  - name: fair_hearing_reinstatement_request_must_be_granted_at_least_once
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: SNAP Manual page 229, at least one reinstatement
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-229
              excerpt: "must reinstate a fair hearing as requested by the household at least once"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-229
              excerpt: "at least once"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_requests_reinstatement
          and prior_reinstatements_granted_count < minimum_required_reinstatements_count

  - name: reinstated_fair_hearing_request_must_not_be_denied_for_different_aggrieved_action
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: SNAP Manual page 229, different aggrieved action
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-229
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_is_aggrieved_by_action_that_differs_from_reinstated_action

  - name: fair_hearing_summary_basic_information_complete
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: SNAP Manual page 229, Fair Hearing Summary basic information
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-229
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          summary_includes_case_name_case_number_and_worker_name
          and summary_includes_benefit_type_application_date_and_over_or_under_issuance_amount
          and summary_includes_adverse_action_notice_date_and_questioned_eligibility_period_dates
          and summary_includes_logical_concise_explanation_of_county_action
