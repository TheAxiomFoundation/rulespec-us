format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-224
  summary: The fair hearing is the administrative process protecting an applicant
    or recipient household's due-process rights when an adverse action is proposed
    or the household is aggrieved by an Agency action affecting SNAP participation.
    The household may be granted a fair hearing for Agency actions taken or not taken,
    or losses of benefits, within the previous 90 days, and for the current level
    of benefits, including allotments over the last 12 months or 24 months for households
    that can contain a disabled member or ESAP households.
rules:
- name: fair_hearing_prior_action_day_limit
  kind: parameter
  dtype: Count
  source: SNAP Manual Chapter 18.2 Time Frames
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-224
          excerpt: within the previous 90 days
  versions:
  - effective_from: '0001-01-01'
    formula: '90'
- name: standard_current_benefit_level_review_month_limit
  kind: parameter
  dtype: Count
  source: SNAP Manual Chapter 18.2 Time Frames
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-224
          excerpt: over the last 12 months
  versions:
  - effective_from: '0001-01-01'
    formula: '12'
- name: extended_current_benefit_level_review_month_limit
  kind: parameter
  dtype: Count
  source: SNAP Manual Chapter 18.2 Time Frames
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-224
          excerpt: 24 months for household that can contain a disabled household member
            or ESAP households
  versions:
  - effective_from: '0001-01-01'
    formula: '24'
- name: current_benefit_level_review_month_limit
  kind: derived
  entity: Household
  dtype: Count
  period: Month
  source: SNAP Manual Chapter 18.2 Time Frames
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-224
          excerpt: 12 months ... or 24 months for household that can contain a disabled
            household member or ESAP households
  versions:
  - effective_from: '0001-01-01'
    formula: 'if household_can_contain_disabled_household_member or household_is_esap_household:
      extended_current_benefit_level_review_month_limit else: standard_current_benefit_level_review_month_limit'
- name: fair_hearing_may_be_granted
  kind: derived
  entity: Household
  dtype: Judgment
  period: Day
  source: SNAP Manual Chapter 18.2 Time Frames
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-224
          excerpt: Actions taken/not taken by the Agency which have occurred within
            the previous 90 days
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-224
          excerpt: Loss of benefits which have occurred within the previous 90 days
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-224
          excerpt: Current level of benefits
  versions:
  - effective_from: '0001-01-01'
    formula: '(agency_action_or_inaction_at_issue and days_since_agency_action_or_inaction
      <= fair_hearing_prior_action_day_limit)

      or (loss_of_benefits_at_issue and days_since_loss_of_benefits <= fair_hearing_prior_action_day_limit)

      or (current_level_of_benefits_at_issue and months_since_current_allotment_occurred
      <= current_benefit_level_review_month_limit)'
- name: ebt_transaction_hearing_referred_to_scebt
  kind: derived
  entity: Person
  dtype: Judgment
  period: Day
  source: SNAP Manual Chapter 18.1 Fair Hearing Definition
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-224
  versions:
  - effective_from: '0001-01-01'
    formula: fair_hearing_request_involves_ebt_transaction
