format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-290
  summary: |-
    29.4 RESOLUTION OF LIABILITIES. FNS may waive all or a portion of the liability, require reinvestment up to 50 percent of the liability, designate up to 50 percent as at-risk, or assert any combination. At-risk amounts are not subject to settlement negotiation and may not be reduced unless an appeal revises the total dollar liability. If appeal reduces liability to $0 after required reinvestment activities began, FNS will pay 50 percent of the new investment amount included in the appealed liability.
rules:
  - name: maximum_reinvestment_share_of_liability
    kind: parameter
    dtype: Rate
    source: SNAP Manual 29.4(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-290
              excerpt: "reinvest up to 50 percent of the liability"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.50
  - name: maximum_at_risk_share_of_liability
    kind: parameter
    dtype: Rate
    source: SNAP Manual 29.4(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-290
              excerpt: "Designate up to 50 percent of the liability as “at-risk”"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.50
  - name: state_reimbursement_share_after_zero_liability_appeal
    kind: parameter
    dtype: Rate
    source: SNAP Manual 29.4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-290
              excerpt: "liability amount is reduced to $0 through the appeal, FNS will pay ... 50 percent"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.50
  - name: zero_liability_after_appeal
    kind: parameter
    dtype: Money
    unit: USD
    source: SNAP Manual 29.4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-290
              excerpt: "liability amount is reduced to $0 through the appeal"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0
