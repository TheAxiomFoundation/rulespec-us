    name: calendar_year
    start: '2025-01-01'
    end: '2025-12-31'
  input:
    ? us-sc:policies/dss/snap-policy-manual/page-145#input.native_american_income_derived_from_interests_in_trust_excluding_casino_profit_amount
    : 1500
