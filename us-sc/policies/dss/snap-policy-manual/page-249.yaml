format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-249
  summary: |-
    An Agency Error claim must be established if benefits are over-issued due to failure to impose a disqualification period correctly or timely. The eDRS is a nationwide database of persons disqualified for an IPV. If a person has disqualification imposed for an IPV in one State and moves to another, the remainder of the disqualification must be served in the new State. Economic Services workers are required to check NDQ at each SNAP application/reapplication and recertification for all SNAP household members. A disqualification period stands as entered in NDQ, and the household remains disqualified if showing on NDQ until verified otherwise.
rules:
  - name: agency_error_claim_required_for_disqualification_overissuance
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 249, Agency Error claim
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-249
              excerpt: benefits are over-issued due to failure to impose a disqualification period correctly or timely
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          benefits_over_issued_due_to_failure_to_impose_disqualification_period_correctly_or_timely

  - name: remaining_ipv_disqualification_served_in_new_state
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 249, eDRS interstate IPV disqualification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-249
              excerpt: disqualification imposed for an IPV in one State and moves to another
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_has_ipv_disqualification_imposed_in_another_state
          and person_moved_to_this_state
          and disqualification_period_has_remainder

  - name: ndq_check_required_for_snap_household_member
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 249, Economic Services worker responsibilities in eDRS/NDQ
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-249
              excerpt: check NDQ at each SNAP application/reapplication and recertification
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_snap_household_member
          and snap_application_reapplication_or_recertification_occurs

  - name: ndq_disqualification_remains_until_verified_otherwise
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 249, Benefit Integrity Claims staff responsibilities in eDRS/NDQ
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-249
              excerpt: remain disqualified if it is showing on NDQ, until verified otherwise
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_disqualification_showing_on_ndq
          and not disqualification_verified_otherwise
