format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-265
  summary: |-
    In the event of trafficking or misuse of benefits, the total amount of benefits trafficked or misused is the amount of the claim. The difference between the amount actually received and the amount that should have been received is the amount of the claim. All situations involving potential overpayment/trafficking are referred to as possible claims. Local county DSS offices are required to submit possible claims referrals in all Quality Control error cases that cite an overpayment. Any referral made to the Benefit Integrity Unit must be made on a DSS Form 1680.
rules:
  - name: recipient_claim_amount
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: SNAP Manual page 265, claim amount calculation
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-265
              excerpt: "In the event of trafficking or misuse of benefits, the total amount of benefits trafficked or misused is the amount of the claim."
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-265
              excerpt: "The difference between the amount actually received and the amount that should have been received is the amount of the claim."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if benefits_were_trafficked_or_misused: max(0, amount_of_benefits_trafficked_or_misused) else: max(0, amount_actually_received - amount_that_should_have_been_received)

  - name: possible_recipient_claim
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 265, Section 23.2 Possible Recipient Claims
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-265
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          situation_involves_potential_overpayment
          or situation_involves_potential_trafficking

  - name: quality_control_overpayment_referral_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 265, Section 23.2 Possible Recipient Claims
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-265
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          quality_control_error_case_cites_overpayment

  - name: benefit_integrity_referral_must_use_form_1680
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 265, Section 23.2 Possible Recipient Claims
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-265
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          referral_made_to_benefit_integrity_unit

  - name: economic_services_possible_claim_referral_complete
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 265, Section 23.2(1)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-265
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          dss_form_1680_completed_in_duplicate
          and referral_contains_complete_information
          and referral_contains_potential_claim_classification_based_on_reason_for_overpayment
          and appropriate_documentation_attached
