format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-33
  summary: |-
    Households must file SNAP applications by submitting forms in person, through an authorized representative, by fax or other electronic transmission, by mail, by completing an on-line electronic application, or by completing a telephonic application. Each household has the right to file an application form on the same day it contacts the SNAP office during office hours and may file an incomplete application form as long as it contains the applicant's name and address and is signed by a responsible household member or authorized representative.
rules:
  - name: snap_application_submission_method_acceptable
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: SNAP Manual 3.4(1), Household's right to file
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-33
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          application_submitted_in_person
          or application_submitted_through_authorized_representative
          or application_submitted_by_fax_or_other_electronic_transmission
          or application_submitted_by_mail
          or application_submitted_by_online_electronic_application
          or application_submitted_by_telephonic_application
  - name: snap_application_signature_acceptable
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: SNAP Manual 3.4(1), Household's right to file
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-33
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          application_signed_using_electronic_signature_technique
          or application_contains_handwritten_signature_and_transmitted_by_fax_or_other_electronic_transmission
          or application_signed_by_responsible_household_member
          or application_signed_by_households_authorized_representative
  - name: incomplete_snap_application_filing_right_applies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: SNAP Manual 3.4(1), Household's right to file
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-33
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_contacted_snap_office_during_office_hours
          and application_contains_applicants_name
          and application_contains_applicants_address
          and (application_signed_by_responsible_household_member or application_signed_by_households_authorized_representative)
  - name: agency_encourages_same_day_snap_application_after_contact
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: SNAP Manual 3.4(2), Contacting the SNAP office
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-33
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_or_representative_contacts_snap_office_in_person_or_by_telephone
          and (household_expresses_interest_in_obtaining_snap_assistance or household_expresses_food_insecurity_concern)
