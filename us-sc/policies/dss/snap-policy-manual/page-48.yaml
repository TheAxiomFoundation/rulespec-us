format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-48
  summary: |-
    SCDSS must notify households applying for TANF of their right to apply for SNAP benefits at the same time and must allow them to apply at the same time they apply for TANF benefits. SCDSS must notify such households that TANF time limits or other TANF requirements do not apply to SNAP, that households ceasing TANF may still qualify for SNAP, and that receiving SNAP has no bearing on other program time limits. SCDSS will base benefit levels of all households solely on SNAP criteria.
  deferred_outputs:
    - output: us-sc:policies/dss/snap-policy-manual/page-48#snap_eligibility_determined_for_tanf_applicant_household
      reason: The source makes the eligibility-determination rule depend on categorical eligibility as provided in Section 4.1, but that cited source is not available in copied context.
    - output: us-sc:policies/dss/snap-policy-manual/page-48#jointly_processed_categorically_eligible_household_certification_complies_with_snap_requirements
      reason: The source requires certification according to SNAP procedural, timeliness, and notice requirements including Section 6.5 expedited service and Section 6.1 normal processing standards, but the cited source context is not available.
    - output: us-sc:policies/dss/snap-policy-manual/page-48#single_interview_conducted_for_tanf_and_snap
      reason: The source points to Section 3.8 Interviews for the interview requirement, but that cited source is not available in copied context.
rules:
  - name: tanf_applicant_household_may_apply_for_snap_at_same_time
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual § 4.5, TANF applicant households
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-48
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_is_applying_for_tanf
  - name: tanf_time_limits_and_requirements_do_not_apply_to_snap
