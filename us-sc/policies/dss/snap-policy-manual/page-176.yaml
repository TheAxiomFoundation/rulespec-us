format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-176
  summary: |-
    13.3 Determining Resources: Available resources for households that do not qualify for categorical eligibility defined in Section 4.1 at interview will be used to determine eligibility. 13.4 Determining Income: the Agency takes into account income already received during the certification period and anticipated income the household and Agency are reasonably certain will be received during the remainder; uncertain income or uncertain timing is not counted, while reasonably certain portions are considered. Past 30 days are used as an indicator unless changes have occurred or can be anticipated; longer past periods or comparable recent seasons may be used for fluctuating income when more accurate.
  deferred_outputs:
    - output: us-sc:policies/dss/snap-policy-manual/page-176#resources_used_to_determine_household_eligibility
      reason: Section 13.3 depends on categorical eligibility as defined in missing Section 4.1, which is not available as RuleSpec context.
rules:
  - name: income_used_to_determine_eligibility_and_benefits
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: SNAP Manual 13.4(1), Anticipating income
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-176
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          income_already_received_during_certification_period + income_reasonably_certain_to_be_received_during_remainder_of_certification_period + portion_of_uncertain_exact_income_anticipated_with_reasonable_certainty
  - name: uncertain_income_not_counted_by_agency
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: SNAP Manual 13.4(1), Anticipating income
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-176
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if income_amount_or_timing_is_uncertain: 0 else: income_amount_for_uncertainty_review
  - name: new_source_initial_payment_anticipated_by_agency
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 13.4(1), Anticipating income
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-176
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_anticipates_income_from_new_source
          and reasonable_certainty_concerning_month_initial_payment_will_be_received
          and reasonable_certainty_concerning_amount_initial_payment_will_be_received
  - name: household_may_elect_to_average_income
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 13.4(1), Anticipating income
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-176
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          receipt_of_income_is_reasonably_certain
          and monthly_amount_may_fluctuate
  - name: past_thirty_days_income_indicator_applies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 13.4(1), Anticipating income
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-176
              excerpt: "Income received during the past 30 days will be used as an indicator"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not income_changes_have_occurred
          and not income_changes_can_be_anticipated
  - name: longer_past_period_indicator_may_be_used
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 13.4(1), Anticipating income
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-176
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          income_fluctuates_so_thirty_day_period_alone_is_not_accurate
          and longer_past_period_provides_more_accurate_indication_of_future_fluctuations
  - name: comparable_recent_season_indicator_may_be_used
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 13.4(1), Anticipating income
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-176
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_income_fluctuates_seasonally
          and most_recent_season_is_comparable_to_certification_period
