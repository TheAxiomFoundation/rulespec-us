format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-389
  summary: |-
    Section 17.2 Recertification Interview: households receive a 24-month certification period when all adult members are elderly or disabled with no earned income. Section 22.4 Authorizing EBT Issuance: benefits must be authorized no later than the sixth day after the application date so eligible households can participate by the seventh day.
rules:
  - name: certification_period_months_for_all_adult_members_elderly_or_disabled_no_earned_income
    kind: parameter
    dtype: Count
    source: Section 17.2 Recertification Interview
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-389
              excerpt: households receive a 24-month certification period when all adult members are elderly or disabled with no earned income
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          24
  - name: household_receives_twenty_four_month_certification_period
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Section 17.2 Recertification Interview
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-389
              excerpt: all adult members are elderly or disabled with no earned income
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          all_adult_members_are_elderly_or_disabled
          and household_has_no_earned_income
  - name: expedited_authorization_deadline_days_after_application
    kind: parameter
    dtype: Count
    source: Section 22.4 Authorizing EBT Issuance
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-389
              excerpt: benefits must be authorized no later than the sixth day after the application date
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          6
  - name: expedited_participation_deadline_days_after_application
    kind: parameter
    dtype: Count
    source: Section 22.4 Authorizing EBT Issuance
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-389
              excerpt: eligible households can participate by the seventh day
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          7
  - name: expedited_benefits_authorized_by_required_deadline
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: Section 22.4 Authorizing EBT Issuance
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-389
              excerpt: benefits must be authorized no later than the sixth day after the application date
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_is_eligible
          and benefits_authorized_no_later_than_sixth_day_after_application_date
  - name: expedited_household_can_participate_by_required_deadline
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: Section 22.4 Authorizing EBT Issuance
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-389
              excerpt: so that eligible households can participate by the seventh day
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_is_eligible
          and household_can_participate_by_seventh_day_after_application_date
