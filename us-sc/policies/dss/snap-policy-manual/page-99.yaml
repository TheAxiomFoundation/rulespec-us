format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-99
  summary: |-
    The Agency must register for work each household member not exempted by Section 8.2. Household members are considered to have registered when the application or annual recertification form is signed and filed and the registration is recorded on the CHIP EMPR screen. During certification, and when a previously exempt or new household member becomes subject to work requirements and at recertification, the Agency must provide written notice and oral explanation of applicable work requirements. Verification of an exemption is required only when provided information is inconsistent, questionable, or specifically required. Eligibility and case management staff will notify SNAP clients of the opportunity to participate in SNAP E&T.
rules:
  - name: member_must_be_registered_for_work
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual 8.3, The Agency's Responsibilities for Work Registration
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-99
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_household_member
          and not person_exempted_by_section_8_2

  - name: member_considered_registered_for_work
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual 8.3, The Agency's Responsibilities for Work Registration
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-99
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          application_or_annual_recertification_form_signed_and_filed
          and registration_recorded_on_chip_empr_screen

  - name: exemption_verification_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual 8.3, exemption-status verification note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-99
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          determination_made_to_exempt_member_from_work_requirements
          and (
            information_provided_is_inconsistent_with_available_information
            or information_provided_is_questionable
            or verification_is_specifically_required
          )

  - name: work_requirements_notice_and_oral_explanation_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 8.3, certification notice duties
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-99
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_is_in_certification_process
          or previously_exempt_or_new_household_member_becomes_subject_to_work_requirements
          or household_is_at_recertification

  - name: consolidated_written_notice_complete
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 8.3, consolidated written notice contents
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-99
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          notice_explains_each_applicable_work_requirement
          and notice_identifies_individuals_subject_to_each_work_requirement
          and notice_explains_exemptions_from_each_applicable_work_requirement
          and notice_explains_process_to_request_exemption_with_contact_information
          and notice_explains_rights_and_responsibilities_of_each_applicable_work_requirement
          and notice_explains_what_is_required_to_maintain_eligibility
          and notice_includes_pertinent_compliance_dates
          and notice_explains_consequences_for_failure_to_comply
          and notice_explains_good_cause_request_process_with_examples_and_contact_information
          and notice_includes_other_state_agency_compliance_assistance_information

  - name: snap_et_opportunity_notification_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual 8.4, SNAP E&T Program Referrals
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-99
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_snap_client
