format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-300
  summary: |-
    Page 300 lists cancer-related conditions including digestive, urinary, genital, prostate, testicular, penile, unknown-primary, transplant-treated cancer, and malignant melanoma, and immune system disorders including systemic lupus erythematosus, systemic vasculitis, systemic sclerosis, polymyositis and dermatomyositis, connective tissue disease, immune deficiency disorders excluding HIV infection, inflammatory arthritis, Sjogren's Syndrome, and HIV infection.
rules:
  - name: person_has_page_300_listed_medical_condition
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 300
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-300
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          cancer_of_pleura_or_mediastinum
          or cancer_of_esophagus_or_stomach
          or cancer_of_small_intestine
          or cancer_of_large_intestine
          or cancer_of_liver_or_gallbladder
          or cancer_of_pancreas
          or carcinoma_of_kidneys_adrenal_glands_or_ureters
          or carcinoma_of_urinary_bladder
          or carcinoma_or_sarcoma_of_female_genital_tract
          or carcinoma_of_prostate_gland
          or cancer_of_testicles
          or cancer_of_penis
          or cancer_primary_site_unknown
          or cancer_treated_by_bone_marrow_or_stem_cell_transplantation
          or malignant_melanoma
          or systemic_lupus_erythematosus
          or systemic_vasculitis
          or systemic_sclerosis_scleroderma
          or polymyositis_and_dermatomyositis
          or undifferentiated_and_mixed_connective_tissue_disease
          or immune_deficiency_disorder_excluding_hiv_infection
          or inflammatory_arthritis
          or sjogrens_syndrome
          or human_immunodeficiency_virus_hiv_infection
