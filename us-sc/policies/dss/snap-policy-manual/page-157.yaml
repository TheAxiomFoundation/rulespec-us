format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-157
  summary: |-
    "(D) Crime victim compensation received under the Crime Act of 1984 ... (E) Robert T. Stafford Disaster Relief and Emergency Assistance Act ... (F) Disaster relief employment income from National Emergency Grants ... (G) Family Investment Center Program services through ... HUD ... (H) Filipino Veterans Equity Compensation Fund ... (I) Income funded under Older American Act ... (J) Indian payments as follows ..."
rules:
  - name: payment_matches_page_157_listed_category
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: SNAP Manual p.157, items D-J
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-157
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          payment_is_crime_victim_compensation_received_under_crime_act_of_1984
          or payment_is_under_robert_t_stafford_disaster_relief_and_emergency_assistance_act
          or payment_is_disaster_relief_employment_income_from_wioa_national_emergency_grant
          or payment_is_family_investment_center_program_service_through_hud
          or payment_is_filipino_veterans_equity_compensation_fund_payment
          or payment_is_income_funded_under_older_american_act
          or payment_is_listed_indian_payment

  - name: family_investment_center_program_service_through_hud
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: SNAP Manual p.157, item G
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-157
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          payment_is_family_investment_center_program_service_through_hud
          and (
            payment_is_child_care_service
            or payment_is_employment_training_and_counseling_service
            or payment_is_literacy_training_service
            or payment_is_computer_skills_training_service
            or payment_is_other_family_investment_center_program_service
          )

  - name: listed_indian_payment
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: SNAP Manual p.157, item J
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-157
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          payment_is_income_from_certain_submarginal_land_held_in_trust_for_certain_indian_tribes
          or payment_is_income_from_disposition_of_funds_to_grand_river_band_of_ottawa_indians
          or payment_is_indian_claims_commission_payment_to_yakima_or_mescalero_apache
          or payment_is_payment_to_passamaquoddy_tribe_penobscot_nation_or_member_under_maine_indian_settlement_act
          or payment_is_relocation_assistance_payment_to_member_of_navajo_or_hopi_tribes
          or payment_is_payment_under_alaska_native_claims_settlement_act
