format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-32
  summary: |-
    "The Agency will notify applicants that they may file a joint application for more than one program or they may file a separate application for SNAP benefits independent of their application for benefits from any other program." "No household will have its SNAP benefits denied solely on the basis that its application to participate in another program has been denied or its benefits under another program have been terminated without a separate determination that the household failed to satisfy a SNAP eligibility requirement." "The Agency must notify all households applying and being recertified for SNAP benefits" of the Privacy Act statement.
rules:
  - name: snap_denial_after_other_program_action_has_required_separate_determination
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 32, Section C, Jointly processed cases
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-32
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not household_snap_benefits_denied_after_other_program_denial_or_termination
          or household_has_separate_determination_failed_snap_eligibility_requirement

  - name: jointly_filed_snap_application_continues_without_resubmission_after_other_program_denial
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 32, Section C, Jointly processed cases
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-32
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_filed_joint_snap_and_other_program_application
          and household_denied_benefits_for_other_program
          and household_not_required_to_resubmit_or_file_another_snap_application
          and household_snap_eligibility_determined_from_initial_joint_application_acceptance_date

  - name: privacy_act_statement_notice_required_for_snap_household
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 32, Section D, Privacy Act statement
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-32
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_applying_for_snap_benefits
          or household_being_recertified_for_snap_benefits
