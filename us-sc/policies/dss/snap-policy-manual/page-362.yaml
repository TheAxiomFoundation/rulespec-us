format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-362
  summary: |-
    "SNAP Household" means an individual or group who customarily purchase food and prepare meals together for home consumption. "SNAP Household Member" means an individual included in the SNAP household. "SNAP Work Requirements" include work registration, employment-status information, reporting to a referred suitable employer, accepting bona fide suitable employment, and not voluntarily without good cause quitting or reducing work below 30 hours a week.
rules:
  - name: full_time_work_hours_threshold
    kind: parameter
    dtype: Integer
    source: SNAP Manual p. 362, SNAP Work Requirements item (5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-362
              excerpt: "30 or more hours a week"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: snap_household
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 362, SNAP Household definition
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-362
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_members_customarily_purchase_food_together
          and household_members_customarily_prepare_meals_together_for_home_consumption

  - name: snap_household_member
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 362, SNAP Household Member definition
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-362
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_included_in_snap_household

  - name: snap_work_requirements
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 362, SNAP Work Requirements definition
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-362
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-362
              excerpt: "less than 30 hours a week"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_registered_for_work_or_registered_by_agency_when_required
          and person_provides_sufficient_employment_status_or_work_availability_information
          and person_reports_to_referred_suitable_employer
          and person_accepts_bona_fide_offer_of_suitable_employment
          and not person_voluntarily_without_good_cause_quit_job_of_at_least_full_time_work_hours_threshold_per_week
          and not person_voluntarily_without_good_cause_reduced_work_effort_below_full_time_work_hours_threshold_per_week
