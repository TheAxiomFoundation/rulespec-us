format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-308
  summary: |-
    COFA Citizens lawfully residing in the U.S. in accordance with section 141 of the Compacts of Free Association ... Eligible immediately. Children Under Age 18 in any SNAP-eligible Non-Citizen Category Eligible immediately. LPRs with 40 Qualifying Work Quarters ... age 18 or older lawfully admitted for permanent residence under the INA who have 40 qualifying quarters ... Eligible immediately.
rules:
  - name: qualifying_work_quarters_threshold
    kind: parameter
    dtype: Count
    period: Month
    source: SNAP Manual p. 308, LPRs with 40 Qualifying Work Quarters
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-308
              excerpt: "40 qualifying quarters"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          40

  - name: cofa_citizen_eligible_immediately
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 308, Compacts of Free Association Citizens
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-308
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_cofa_citizen
          and person_lawfully_residing_in_us_under_section_141_cofa

  - name: child_under_age_18_in_snap_eligible_non_citizen_category_eligible_immediately
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 308, Children Under Age 18 in any SNAP-eligible Non-Citizen Category
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-308
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_under_age_18
          and person_is_in_snap_eligible_non_citizen_category

  - name: lpr_with_qualifying_work_quarters_eligible_immediately
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 308, LPRs with 40 Qualifying Work Quarters
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-308
              excerpt: "age 18 or older lawfully admitted for permanent residence under the INA who have 40 qualifying quarters"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-308
              excerpt: "40 qualifying quarters"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_age_18_or_older
          and person_lawfully_admitted_for_permanent_residence_under_ina
          and qualifying_work_quarters >= qualifying_work_quarters_threshold
