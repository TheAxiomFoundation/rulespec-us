  summary: |-
    Corrective action planning is the process by which the Agency will determine appropriate actions to reduce substantially or eliminate deficiencies in SNAP operations. The Agency, including local SNAP offices, will implement corrective action on all identified deficiencies, including deficiencies tied to payment error rates of 6 percent or greater, enhanced-funding non-entitlement, QC errors including negative-case error rates of 1 percent or more, FNS/GAO/contract/USDA reviews or audits, QC samples coded "not complete" at 5 percent or more, and underissuances, improper denials, or improper terminations caused by Agency rules, practices, or procedures.
