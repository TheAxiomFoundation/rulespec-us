format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-135
  summary: |-
    Repayment monies withheld from or received from earned income and returned to repay a prior overpayment from that source are excluded. RSVP and Senior Companion living allowances are excluded if CNCS-approved, otherwise counted as earned income. Roomer payments and self-employment enterprise income are treated under self-employment rules. Sick pay paid by an employer is earned income if the employee will return to work, but unearned income if the employee will not return or if paid by another source. Third party/vendor payments are monies legally obligated and otherwise payable to the household but diverted to a third party for a household expense.
rules:
  - name: prior_overpayment_repayment_income_excluded
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: SNAP Manual 135(Z)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-135
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          payment_is_withheld_from_or_received_from_earned_income
          and payment_is_voluntarily_or_involuntarily_returned
          and payment_repays_prior_overpayment_from_same_source

  - name: rsvp_living_allowance_excluded
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: SNAP Manual 135(AA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-135
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          payment_is_rsvp_living_allowance
          and program_is_approved_by_cncs

  - name: rsvp_living_allowance_counted_as_earned_income
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: SNAP Manual 135(AA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-135
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          payment_is_rsvp_living_allowance
          and not program_is_approved_by_cncs

  - name: roomer_payment_self_employment_income
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: SNAP Manual 135(BB)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-135
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          payment_is_from_roomer

  - name: self_employment_enterprise_income_included
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: SNAP Manual 135(CC)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-135
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          payment_is_income_from_self_employment_enterprise

  - name: senior_companion_living_allowance_excluded
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: SNAP Manual 135(DD)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-135
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          payment_is_senior_companion_living_allowance
          and program_is_approved_by_cncs

  - name: senior_companion_living_allowance_counted_as_earned_income
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: SNAP Manual 135(DD)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-135
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          payment_is_senior_companion_living_allowance
          and not program_is_approved_by_cncs

  - name: sick_pay_benefits_counted_as_earned_income
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: SNAP Manual 135(EE)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-135
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          payment_is_sick_pay_benefit
          and payment_is_paid_by_employer
          and employee_will_return_to_work

  - name: sick_pay_benefits_counted_as_unearned_income
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: SNAP Manual 135(EE)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-135
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          payment_is_sick_pay_benefit
          and (
            (payment_is_paid_by_employer and not employee_will_return_to_work)
            or payment_is_paid_from_source_other_than_employer
          )

  - name: third_party_vendor_payment
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: SNAP Manual 135(GG)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-135
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          payment_is_legally_obligated_and_otherwise_payable_to_household
          and payment_is_diverted_by_provider_to_third_party
          and payment_is_for_household_expense
