format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-309
  summary: |-
    Individuals in any SNAP-eligible Non-Citizen Category who are blind or disabled and receiving specified blindness or disability benefits are eligible immediately. Individuals in any SNAP-eligible Non-Citizen Category lawfully residing in the U.S. and 65 or older on August 22, 1996, described as born on or before 08/22/1931 and lawfully residing in the U.S. on 08/22/1996, are eligible immediately.
rules:
  - name: blind_or_disabled_non_citizen_immediate_snap_eligibility
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 309, non-citizen category table
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-309
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-309
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_in_snap_eligible_non_citizen_category
          and receiving_benefits_or_assistance_for_blindness_or_disability_as_specified_in_section_5_1
  - name: elderly_lawfully_residing_non_citizen_immediate_snap_eligibility
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 309, non-citizen category table
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-309
              excerpt: "Was 65 or Older on August 22, 1996"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-309
              excerpt: "lawfully resided in the U.S. on 08/22/1996"
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-309
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_in_snap_eligible_non_citizen_category
          and person_was_at_least_65_on_welfare_reform_enactment_date
          and person_lawfully_resided_in_us_on_welfare_reform_enactment_date
