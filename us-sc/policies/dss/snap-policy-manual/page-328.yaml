format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-328
  summary: |-
    Timely 1st-15th recertification forms are registered with the receipt date. Complete forms with all required verification should be processed by the end of the month and allow uninterrupted benefits/full allotment. Incomplete forms require notice and 10 days for verification; the household has 10 days from request or until the end of the month, whichever is greater, to return verification and receive a full month's allotment.
rules:
  - name: verification_response_days_allowed
    kind: parameter
    dtype: Count
    period: Day
    source: SNAP Manual page 328, incomplete timely recertification verification period
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-328
              excerpt: "allow the household 10 days to provide the requested verification"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10
  - name: complete_timely_recertification_full_allotment
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 328, timely complete six-month or tri-annual recertification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-328
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          recertification_form_submitted_timely_1st_through_15th
          and form_is_six_month_or_tri_annual_recertification
          and recertification_form_complete
          and all_required_verification_provided
          and recertification_processed_by_end_of_month
  - name: incomplete_timely_recertification_notice_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 328, timely incomplete recertification notice
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-328
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          recertification_form_submitted_timely_1st_through_15th
          and form_is_six_month_or_tri_annual_recertification
          and not recertification_form_complete
          and additional_verification_needed
  - name: incomplete_timely_recertification_full_month_allotment
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 328, incomplete timely recertification full-month allotment verification deadline
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-328
              excerpt: "10 days from the date of request for verification or until the end of the month (whichever is greater)"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          incomplete_timely_recertification_notice_required
          and verification_returned_by_later_of_request_deadline_or_end_of_month
  - name: incomplete_timely_recertification_case_closes
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 328, incomplete timely recertification closure after missing verification deadline
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-328
              excerpt: "If verification is not received within 10 days, CHIP will automatically close the case."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          incomplete_timely_recertification_notice_required
          and not verification_received_within_response_days_allowed
