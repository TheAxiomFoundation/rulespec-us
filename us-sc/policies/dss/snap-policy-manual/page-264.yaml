format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-264
  summary: |-
    "A recipient claim is an amount owed to the Agency because of: (A) SNAP benefits are overpaid (B) SNAP benefits are trafficked. Trafficking means: (1) The buying, selling, stealing, or otherwise effecting an exchange of SNAP benefits..."
rules:
  - name: snap_benefits_trafficked
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 23.1(B), page 264
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-264
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          snap_benefits_exchanged_for_cash_or_nonfood_consideration
          or snap_benefits_exchanged_for_firearms_ammunition_explosives_or_controlled_substances
          or product_with_return_deposit_purchased_with_snap_benefits_to_obtain_cash
          or product_purchased_with_snap_benefits_to_obtain_cash_or_nonfood_consideration_by_resale
  - name: recipient_claim
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 23.1, page 264
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-264
          - path: versions[0].formula
            kind: import
            import:
              target: us-sc:policies/dss/snap-policy-manual/page-264#snap_benefits_trafficked
              output: snap_benefits_trafficked
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          snap_benefits_are_overpaid
          or snap_benefits_trafficked
