- name: overpaid_snap_benefits_create_recipient_claim
  period: 2026-05
  input:
    us-sc:policies/dss/snap-policy-manual/page-264#input.snap_benefits_are_overpaid: true
    us-sc:policies/dss/snap-policy-manual/page-264#input.snap_benefits_exchanged_for_cash_or_nonfood_consideration: false
    ? us-sc:policies/dss/snap-policy-manual/page-264#input.snap_benefits_exchanged_for_firearms_ammunition_explosives_or_controlled_substances
    : false
    ? us-sc:policies/dss/snap-policy-manual/page-264#input.product_with_return_deposit_purchased_with_snap_benefits_to_obtain_cash
    : false
    ? us-sc:policies/dss/snap-policy-manual/page-264#input.product_purchased_with_snap_benefits_to_obtain_cash_or_nonfood_consideration_by_resale
    : false
  output:
    us-sc:policies/dss/snap-policy-manual/page-264#snap_benefits_trafficked: not_holds
    us-sc:policies/dss/snap-policy-manual/page-264#recipient_claim: holds
- name: trafficked_snap_benefits_create_recipient_claim
  period: 2026-05
  input:
    us-sc:policies/dss/snap-policy-manual/page-264#input.snap_benefits_are_overpaid: false
    us-sc:policies/dss/snap-policy-manual/page-264#input.snap_benefits_exchanged_for_cash_or_nonfood_consideration: true
    ? us-sc:policies/dss/snap-policy-manual/page-264#input.snap_benefits_exchanged_for_firearms_ammunition_explosives_or_controlled_substances
    : false
    ? us-sc:policies/dss/snap-policy-manual/page-264#input.product_with_return_deposit_purchased_with_snap_benefits_to_obtain_cash
    : false
    ? us-sc:policies/dss/snap-policy-manual/page-264#input.product_purchased_with_snap_benefits_to_obtain_cash_or_nonfood_consideration_by_resale
    : false
  output:
    us-sc:policies/dss/snap-policy-manual/page-264#snap_benefits_trafficked: holds
    us-sc:policies/dss/snap-policy-manual/page-264#recipient_claim: holds
- name: no_overpayment_or_trafficking_no_recipient_claim
  period: 2026-05
  input:
    us-sc:policies/dss/snap-policy-manual/page-264#input.snap_benefits_are_overpaid: false
    us-sc:policies/dss/snap-policy-manual/page-264#input.snap_benefits_exchanged_for_cash_or_nonfood_consideration: false
    ? us-sc:policies/dss/snap-policy-manual/page-264#input.snap_benefits_exchanged_for_firearms_ammunition_explosives_or_controlled_substances
    : false
    ? us-sc:policies/dss/snap-policy-manual/page-264#input.product_with_return_deposit_purchased_with_snap_benefits_to_obtain_cash
    : false
    ? us-sc:policies/dss/snap-policy-manual/page-264#input.product_purchased_with_snap_benefits_to_obtain_cash_or_nonfood_consideration_by_resale
    : false
  output:
    us-sc:policies/dss/snap-policy-manual/page-264#snap_benefits_trafficked: not_holds
