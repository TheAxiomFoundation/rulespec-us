format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-63
  summary: |-
    Homeless households claiming actual shelter expenses or those with extremely low shelter costs may provide verification of shelter expenses to qualify for the homeless shelter deduction; if traditional verification is difficult, a client's statement is acceptable verification as a last resort. The household has primary responsibility for providing documentary evidence, the Agency must assist cooperating households, may not require in-person verification at the SNAP office, and must accept reasonable documentary evidence. The Agency has primary responsibility for verifying fleeing felon and parole/probation violator status and questionable disqualified-felon attestations. If verification is incomplete, the Agency must state required verification, offer assistance if needed, and allow at least 10 days from the initial request for the missing verification.
rules:
  - name: minimum_days_to_provide_missing_verification
    kind: parameter
    dtype: Count
    source: SNAP Manual 5.5, page 63
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-63
              excerpt: "Sufficient time will be at least 10 days"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10

  - name: homeless_household_may_provide_shelter_expense_verification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 5.4, page 63
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-63
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_is_homeless
          and (household_claims_actual_shelter_expenses or household_has_extremely_low_shelter_costs)

  - name: client_statement_acceptable_for_homeless_shelter_cost_verification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 5.4, page 63
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-63
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_is_homeless
          and household_has_difficulty_obtaining_traditional_shelter_cost_verification
          and client_statement_is_used_as_last_resort

  - name: household_has_primary_responsibility_to_provide_documentary_evidence
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 5.5, page 63
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-63
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          documentary_evidence_supports_application_statements_or_resolves_questionable_information

  - name: agency_must_assist_household_obtaining_verification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 5.5, page 63
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-63
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_needs_verification_obtained
          and household_is_cooperating_with_agency

  - name: agency_must_not_require_in_person_verification_at_snap_office
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 5.5, page 63
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-63
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_is_supplying_documentary_evidence

  - name: agency_must_accept_reasonable_documentary_evidence
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 5.5, page 63
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-63
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_provides_reasonable_documentary_evidence

  - name: agency_has_primary_responsibility_for_fleeing_felon_or_parole_probation_status_verification
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual 5.5, page 63
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-63
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_has_fleeing_felon_status_at_issue
          or person_has_parole_or_probation_violator_status_at_issue

  - name: agency_will_verify_questionable_disqualified_felon_attestation
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual 5.5, page 63
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-63
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          snap_applicant_attestation_regarding_disqualified_felon_status_is_questionable

  - name: agency_will_verify_each_element_of_questionable_disqualified_felon_attestation
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual 5.5, page 63
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-63
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          snap_applicant_attestation_regarding_disqualified_felon_status_is_questionable
          and attestation_element_concerns_conviction_of_listed_crime_or_noncompliance_with_sentence_terms

  - name: agency_must_provide_required_verification_statement_when_verification_incomplete
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 5.5, page 63
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-63
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          verification_is_incomplete

  - name: agency_must_offer_assistance_for_missing_verification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 5.5, page 63
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-63
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          verification_is_incomplete
          and household_indicates_assistance_needed_to_obtain_required_verification

  - name: household_allowed_sufficient_time_to_provide_missing_verification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 5.5, page 63
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-63
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-63
              excerpt: "at least 10 days from the date of the Agency's initial request"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          verification_is_incomplete
          and days_allowed_from_initial_request_for_missing_verification >= minimum_days_to_provide_missing_verification
