format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-113
  summary: |-
    Non-reportable change, reported: countable months begin accruing the month following the month that the change was reported, unless the ABAWD also meets the work requirement or is otherwise exempt. Non-reportable change, not reported: the Agency cannot retrospectively apply the change and no claim can be established; when aware during certification process, the Agency will begin tracking the three countable months effective the month following the month of the change, unless the ABAWD met the ABAWD work requirement or was otherwise exempt during the previous certification period. ABAWD 36-month period is tracked with a Fixed Clock; current 36-month period started on April 1, 2025 and will end on March 31, 2028. The Agency tracks three countable months, the 36-month time period, and the additional three months of eligibility.
  deferred_outputs:
    - output: us-sc:policies/dss/snap-policy-manual/page-113#abawd_countable_months_begin_after_reported_non_reportable_change
      reason: The source's operative exception depends on ABAWD work requirement and exemption concepts cited to Section 8.13, which is not available in copied RuleSpec context.
    - output: us-sc:policies/dss/snap-policy-manual/page-113#abawd_countable_months_begin_after_unreported_non_reportable_change
      reason: The source's operative exception depends on whether the ABAWD met the ABAWD work requirement or was otherwise exempt during the previous certification period under Section 8.13, which is not available in copied RuleSpec context.
rules:
  - name: abawd_fixed_clock_period_months
    kind: parameter
    dtype: Count
    source: SNAP Manual page 113, Section 8.18, fixed clock period
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-113
              excerpt: "An ABAWD's 36-month period is being tracked with a \"Fixed Clock.\""
    versions:
      - effective_from: '2025-04-01'
        formula: |-
          36
  - name: abawd_countable_month_limit_within_fixed_clock
    kind: parameter
    dtype: Count
    source: SNAP Manual page 113, Section 8.18(2)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-113
              excerpt: "The three countable months of SNAP participation"
    versions:
      - effective_from: '2025-04-01'
        formula: |-
          3
  - name: abawd_additional_months_after_regaining_eligibility
    kind: parameter
    dtype: Count
    source: SNAP Manual page 113, Section 8.18(2)(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-113
              excerpt: "the additional three months of eligibility (regaining eligibility)"
    versions:
      - effective_from: '2025-04-01'
        formula: |-
          3
  - name: agency_cannot_retroactively_apply_unreported_non_reportable_change
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 113, Non-Reportable Change, Not Reported
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-113
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_did_not_report_non_reportable_change_during_certification_period
          and non_reportable_change_would_have_caused_member_to_be_subject_to_abawd_time_limit
  - name: no_claim_established_for_unreported_non_reportable_change
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 113, Non-Reportable Change, Not Reported
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-113
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_did_not_report_non_reportable_change_during_certification_period
          and non_reportable_change_would_have_caused_member_to_be_subject_to_abawd_time_limit
