  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-273
  summary: FNS may pay the Agency 50 percent of SNAP administrative costs and may
    increase the share if the Agency's payment error rate is less than or equal to
    5.90 percent and its negative case error rate is less than the prior fiscal year's
    national weighted mean negative case error rate. The increase is one percentage
    point for each full tenth of a percentage point by which the payment error rate
    is less than six percent, up to 60 percent of administrative costs. Agencies not
    receiving the increased share must develop and implement corrective action plans
    to reduce payment errors.
  deferred_outputs:
  - output: us-sc:policies/dss/snap-policy-manual/page-273#snap_administrative_cost_federal_share
    reason: The operative subject is the State Agency, but RuleSpec's supported entities
      do not include a state agency or administrative grantee entity. Encoding this
      on Household, Person, Business, or another allowed entity would mis-scope the
      source.
