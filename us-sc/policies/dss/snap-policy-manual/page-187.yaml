format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-187
  summary: |-
    If free legal representation is available, the notice advises the household. Pending-status notices explain needed household action, denial if action is not taken within 30 days of filing, and the missing-verification date; translated notices allow at least ten days after mailing. Recertification applicants filing by the 15th receive eligibility or denial notices by stated deadlines.
rules:
  - name: pending_application_required_action_deadline_days
    kind: parameter
    dtype: Count
    source: SNAP Manual page 187, notice of pending status
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-187
              excerpt: "within 30 days of the date the application was filed"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: translated_notice_minimum_verification_response_days
    kind: parameter
    dtype: Count
    source: SNAP Manual page 187, translated pending notices
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-187
              excerpt: "at least ten days from the time the translated notice is mailed"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10

  - name: timely_recertification_application_day_of_last_month
    kind: parameter
    dtype: Count
    source: SNAP Manual page 187, applications for recertification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-187
              excerpt: "by the 15th of the last month of their certification period"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          15

  - name: recertification_notice_deadline_days_after_initial_last_allotment_opportunity
    kind: parameter
    dtype: Count
    source: SNAP Manual page 187, applications for recertification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-187
              excerpt: "not later than 30 days after the date of the household's initial opportunity to obtain its last allotment"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: free_legal_representation_notice_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 187, free legal representation notice
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-187
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not free_legal_representation_provider_available
          or notice_advises_household_of_free_legal_representation_service

  - name: pending_status_notice_required_content_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 187, notice of pending status
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-187
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not application_held_pending_because_household_action_needed
          or (
            notice_explains_action_household_must_take
            and notice_explains_denial_if_required_action_not_taken_within_pending_application_required_action_deadline_days
            and notice_includes_missing_verification_due_date
            and (
              not notice_must_be_translated
              or client_allowed_at_least_translated_notice_minimum_verification_response_days_after_translated_notice_mailed
            )
          )

  - name: recertification_notice_by_end_of_current_certification_period_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 187, applications for recertification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-187
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not household_filed_recertification_application_by_timely_recertification_application_day_of_last_month
          or not household_complied_with_all_recertification_requirements
          or agency_provided_eligibility_or_denial_notice_by_end_of_current_certification_period

  - name: recertification_notice_after_initial_last_allotment_opportunity_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 187, applications for recertification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-187
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not household_received_notice_of_expiration_at_time_of_certification
          or not household_timely_reapplied
          or agency_provided_eligibility_or_denial_notice_within_recertification_notice_deadline_days_after_initial_last_allotment_opportunity
