format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-153
  summary: |-
    "(G) Infrequent or irregular income Any income in the certification period which is received too infrequently or irregularly to be reasonably anticipated, but not in excess of $30 in a quarter. ... (I) Loans Money that is borrowed and is expected to be paid back. All loans ... are excluded. ... (J) Lump Sums Money received in the form of a non-recurring lump-sum payment ... These payments are treated as a resource in the month received. NOTE: Federal/State income tax refunds are no longer considered a resource effective May 1, 2013."
rules:
  - name: infrequent_or_irregular_income_quarterly_limit
    kind: parameter
    dtype: Money
    unit: USD
    source: SNAP Manual page 153, subsection G
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-153
              excerpt: "not in excess of $30 in a quarter"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: hud_vendor_payment
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: SNAP Manual page 153, subsection F
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-153
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          payment_is_rent_or_mortgage_payment
          and payment_made_to_landlord_or_mortgagee
          and payment_made_by_hud

  - name: infrequent_or_irregular_income
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: SNAP Manual page 153, subsection G
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-153
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-153
              excerpt: "not in excess of $30 in a quarter"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          payment_is_income_in_certification_period
          and payment_received_too_infrequently_or_irregularly_to_be_reasonably_anticipated
          and quarterly_amount_of_such_income <= infrequent_or_irregular_income_quarterly_limit

  - name: in_kind_benefit
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: SNAP Manual page 153, subsection H
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-153
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          benefit_has_no_monetary_payment_made_on_behalf_of_household
          or benefit_is_gain_or_benefit_not_in_form_of_money_payable_directly_to_household

  - name: loan_excluded
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: SNAP Manual page 153, subsection I
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-153
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-153
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          money_is_borrowed
          and money_expected_to_be_paid_back
          and not educational_loan_with_repayment_deferred

  - name: lump_sum_resource_in_month_received
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: SNAP Manual page 153, subsection J
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-153
          - path: versions[0].formula
            kind: effective_period
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-153
              excerpt: "effective May 1, 2013"
    versions:
      - effective_from: '2013-05-01'
        formula: |-
          payment_is_non_recurring_lump_sum
          and payment_received_in_month
          and not payment_is_federal_or_state_income_tax_refund
