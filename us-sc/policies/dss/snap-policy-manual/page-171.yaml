format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-171
  summary: |-
    Cost-sharing or spend down expenses incurred by Medicaid recipients; dentures, hearing aids and prosthetics; eyeglasses or contact lenses prescribed by a physician skilled in eye diseases or an optometrist; service-animal costs with prescribed service animal, client confirmation, and verified costs; reasonable transportation and lodging necessary to obtain medical treatment; attendant, homemaker, home health aide, childcare service, or housekeeper costs necessary due to age, infirmity, or illness; telephonic equipment costs. Expenses incurred because of special diets are not an allowable medical deduction.
rules:
  - name: medicaid_cost_sharing_or_spend_down_expense_allowable
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: SNAP Manual page 171(F)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-171
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          expense_is_cost_sharing_or_spend_down
          and expense_incurred_by_medicaid_recipient
          and expense_is_mandatory_incurred_medical_expense_required_prior_to_medicaid_program_eligibility
  - name: medical_device_expense_allowable
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: SNAP Manual page 171(G)-(H)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-171
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          expense_is_denture_or_hearing_aid_or_prosthetic
          or (
            expense_is_eyeglasses_or_contact_lenses
            and prescribed_by_eye_disease_physician_or_optometrist
          )
  - name: service_animal_expense_allowable
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: SNAP Manual page 171(I)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-171
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          cost_is_for_food_veterinarian_bills_or_other_service_animal_related_expense
          and animal_is_specially_trained_to_serve_elderly_or_disabled_program_participant
          and service_animal_prescribed_by_state_authorized_licensed_practitioner
          and individual_confirms_need_for_service_animal
          and service_animal_cost_verified_by_bills_receipts_or_equivalent
  - name: transportation_or_lodging_medical_expense_allowable
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: SNAP Manual page 171(J)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-171
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          expense_is_reasonable_transportation_or_lodging_cost
          and expense_is_necessary_to_obtain_medical_treatment_or_services
  - name: attendant_care_expense_allowable
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: SNAP Manual page 171(K)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-171
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          expense_is_for_attendant_homemaker_home_health_aide_childcare_service_or_housekeeper
          and expense_is_necessary_due_to_age_infirmity_or_illness
  - name: telephonic_equipment_expense_allowable
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: SNAP Manual page 171(L)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-171
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          expense_is_for_monthly_telephonic_fees_for_amplifiers_or_warning_signals
          or expense_is_for_typewriter_equipment_for_deaf_or_hard_of_hearing_pluggable_into_telephone_system
  - name: special_diet_expense_not_allowable
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: SNAP Manual page 171, final sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-171
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          expense_incurred_because_of_special_diet
  - name: medical_deduction_expense_allowable
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: SNAP Manual page 171(F)-(L), final sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-171
          - path: versions[0].formula
            kind: import
            import:
              target: us-sc:policies/dss/snap-policy-manual/page-171#medicaid_cost_sharing_or_spend_down_expense_allowable
              output: medicaid_cost_sharing_or_spend_down_expense_allowable
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-sc:policies/dss/snap-policy-manual/page-171#medical_device_expense_allowable
              output: medical_device_expense_allowable
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-sc:policies/dss/snap-policy-manual/page-171#service_animal_expense_allowable
              output: service_animal_expense_allowable
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-sc:policies/dss/snap-policy-manual/page-171#transportation_or_lodging_medical_expense_allowable
              output: transportation_or_lodging_medical_expense_allowable
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-sc:policies/dss/snap-policy-manual/page-171#attendant_care_expense_allowable
              output: attendant_care_expense_allowable
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-sc:policies/dss/snap-policy-manual/page-171#telephonic_equipment_expense_allowable
              output: telephonic_equipment_expense_allowable
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-sc:policies/dss/snap-policy-manual/page-171#special_diet_expense_not_allowable
              output: special_diet_expense_not_allowable
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (
            medicaid_cost_sharing_or_spend_down_expense_allowable
            or medical_device_expense_allowable
            or service_animal_expense_allowable
            or transportation_or_lodging_medical_expense_allowable
            or attendant_care_expense_allowable
            or telephonic_equipment_expense_allowable
          )
          and not special_diet_expense_not_allowable
