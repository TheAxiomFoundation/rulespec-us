format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-335
  summary: '"The household must be given at least 10 days to submit verification."
    If verification is timely in the recertification examples, the household is "entitled
    to benefits prorated from January 20th"; if late, "the household must re-apply/reapply."
    For expedited service, "Case must be processed no later than January 26th for
    January and February."'
  deferred_outputs:
  - output: us-sc:policies/dss/snap-policy-manual/page-335#minimum_verification_response_days
    reason: Generated rule used a local name that collides with a sibling RuleSpec
      export. This output is deferred until it can be encoded with a semantic branch-specific
      name without creating ambiguous sibling imports.
rules:
- name: recertification_benefits_prorated_from_filing_date
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: SNAP Manual page 335, Examples
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-335
          excerpt: The household submits verification on February 17th. The household
            is entitled to benefits prorated from January 20th.
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-335
          excerpt: The household submits verification on February 23rd. The household
            is entitled to benefits prorated from January 20th.
  versions:
  - effective_from: '0001-01-01'
    formula: 'recertification_filed

      and screening_indicates_not_entitled_to_expedited_service

      and incomplete_notice_or_request_for_verification_sent

      and household_given_at_least_minimum_verification_response_days

      and verification_submitted_by_applicable_deadline'
- name: recertification_requires_reapplication_after_late_verification
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: SNAP Manual page 335, Examples
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-335
          excerpt: Verification is late; therefore, the household must re-apply.
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-335
          excerpt: Verification is late; therefore, the household must reapply.
  versions:
  - effective_from: '0001-01-01'
    formula: 'recertification_filed

      and screening_indicates_not_entitled_to_expedited_service

      and incomplete_notice_or_request_for_verification_sent

      and household_given_at_least_minimum_verification_response_days

      and verification_is_late'
- name: expedited_recertification_processed_no_later_than_expedited_deadline
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: SNAP Manual page 335, Example
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-335
          excerpt: screening indicates the household is entitled to expedited service.
            Case must be processed no later than January 26th for January and February
  versions:
  - effective_from: '0001-01-01'
    formula: 'recertification_filed

      and screening_indicates_entitled_to_expedited_service

      and case_processed_no_later_than_expedited_service_deadline'
