format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-121
  summary: |-
    The SNAP E&T OJT Program reimburses employers 50% of gross wages during the contracted training period; overtime work or training is not reimbursed, and the employer is responsible for the remaining 50%. Full-time OJT work and training is 30 to 40 hours per week, placement may last up to six months, work or training cannot start until DSS Forms 5001 and 5002 are signed, and OJT trainees receive the same working conditions, benefits, and rights as similarly employed workers.
rules:
  - name: ojt_reimbursement_rate
    kind: parameter
    dtype: Rate
    period: Week
    source: SNAP Manual page 121, Compensation to the Participating Employer
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-121
              excerpt: "reimbursement of 50% of the gross wages"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.50

  - name: employer_remaining_wage_share
    kind: parameter
    dtype: Rate
    period: Week
    source: SNAP Manual page 121, Compensation to the Participating Employer
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-121
              excerpt: "remaining 50% of the employee/trainee's wages"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.50

  - name: full_time_training_minimum_hours_per_week
    kind: parameter
    dtype: Decimal
    period: Week
    source: SNAP Manual page 121, Working Hours
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-121
              excerpt: "30 to 40 hours per week"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: full_time_training_maximum_hours_per_week
    kind: parameter
    dtype: Decimal
    period: Week
    source: SNAP Manual page 121, Working Hours
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-121
              excerpt: "30 to 40 hours per week"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          40

  - name: maximum_ojt_placement_duration_months
    kind: parameter
    dtype: Count
    period: Month
    source: SNAP Manual page 121, OJT Placement Duration
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-121
              excerpt: "may last up to six months"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          6

  - name: employer_weekly_ojt_wage_reimbursement
    kind: derived
    entity: Employer
    dtype: Money
    period: Week
    unit: USD
    source: SNAP Manual page 121, Compensation to the Participating Employer
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-121
              excerpt: "reimbursement of 50% of the gross wages"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if wages_are_during_established_contracted_training_period: ojt_reimbursement_rate * max(0, gross_wages_excluding_overtime) else: 0

  - name: employer_weekly_ojt_remaining_wage_responsibility
    kind: derived
    entity: Employer
    dtype: Money
    period: Week
    unit: USD
    source: SNAP Manual page 121, Compensation to the Participating Employer
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-121
              excerpt: "remaining 50% of the employee/trainee's wages"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if wages_are_during_established_contracted_training_period: employer_remaining_wage_share * max(0, gross_wages_excluding_overtime) else: 0

  - name: ojt_weekly_hours_are_full_time
    kind: derived
    entity: Person
    dtype: Judgment
    period: Week
    source: SNAP Manual page 121, Working Hours
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-121
              excerpt: "full-time defined as 30 to 40 hours per week"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          weekly_ojt_work_and_training_hours >= full_time_training_minimum_hours_per_week
          and weekly_ojt_work_and_training_hours <= full_time_training_maximum_hours_per_week

  - name: ojt_placement_duration_within_maximum
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 121, OJT Placement Duration
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-121
              excerpt: "may last up to six months"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          ojt_placement_duration_months <= maximum_ojt_placement_duration_months

  - name: ojt_work_or_training_may_start
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: SNAP Manual page 121, SNAP E&T OJT Effective Date
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-121
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          all_parties_signed_dss_form_5001
          and all_parties_signed_dss_form_5002
          and day_is_future_hire_date

  - name: employer_reimbursement_documentation_complete
    kind: derived
    entity: Employer
    dtype: Judgment
    period: Week
    source: SNAP Manual page 121, Compensation to the Participating Employer
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-121
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          reimbursement_supported_by_business_receipts
          and reimbursement_supported_by_time_and_payroll_records
          and reimbursement_supported_by_other_records_normally_retained_by_employer
          and reimbursement_invoice_and_timesheet_signed_by_employer
          and reimbursement_invoice_and_timesheet_signed_by_employee_trainee
          and payroll_records_or_paystubs_attached_to_dss_form_5003

  - name: ojt_trainee_has_same_working_conditions_as_similarly_employed_workers
    kind: derived
    entity: Person
    dtype: Judgment
    period: Week
    source: SNAP Manual page 121, Working Conditions
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-121
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          trainee_receives_same_working_conditions_as_similarly_employed_workers
          and trainee_receives_same_benefits_as_similarly_employed_workers
          and trainee_receives_same_rights_as_similarly_employed_workers
