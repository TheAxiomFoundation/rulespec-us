  summary: |-
    FNS will review the Agency's management evaluation system on a biennial basis and may review it more frequently if a regular review reveals serious deficiencies. FNS will validate the Agency's payment error rate and under-issuance error rate during each annual quality control review period, and must validate the Agency's negative case error rate when the payment error rate appears to entitle the Agency to increased Federal administrative funding and the reported negative case error rate is less than two percentage points above the prior fiscal year's national weighted mean. Deficiencies detected in the Agency's QC system will be included in the State Corrective Action Plan. FNS will conduct a comprehensive annual assessment of the Agency's corrective action process and on-site reviews as necessary.
