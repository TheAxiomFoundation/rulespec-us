  summary: |-
    Economic Services worker duties include assisting the household with the appeal, informing the household of free legal services, explaining continued benefits, forwarding DSS Form 2633 to OAH within two working days when a fair hearing is requested, making the case file available subject to confidentiality protections, requesting subpoenas at least 14 days before the hearing, representing the Agency, and implementing the hearing decision within 10 days. The Economic Services supervisor must review proposed case action, ensure and participate in the pre-hearing conference, attend the fair hearing, and ensure timely implementation of the decision.
