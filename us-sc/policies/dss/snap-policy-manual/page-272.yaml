format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-272
  summary: |-
    Recipient claims that are 90 days delinquent may be referred to CCU; CCU initiates SC Department of Revenue Debt Offset for claims at least 90 days delinquent and federal Treasury Offset for claims at least 180 days delinquent. Disqualification from SNAP may occur if EBT card or account benefit misuse is determined and adjudication supports the determination.
rules:
  - name: ccu_referral_delinquency_days
    kind: parameter
    dtype: Count
    source: SNAP Manual page 272, recipient claims referred to CCU
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-272
              excerpt: "Recipient claims that are 90 days delinquent may be referred"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          90

  - name: state_revenue_offset_delinquency_days
    kind: parameter
    dtype: Count
    source: SNAP Manual page 272, SC Department of Revenue Debt Offset Program
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-272
              excerpt: "claims at least 90 days delinquent"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          90

  - name: federal_treasury_offset_delinquency_days
    kind: parameter
    dtype: Count
    source: SNAP Manual page 272, federal Treasury Offset Program
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-272
              excerpt: "claims at least 180 days delinquent"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          180

  - name: snap_disqualification_may_occur_for_ebt_misuse
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 272, EBT Client Integrity Project
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-272
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          recipient_has_misused_ebt_card_or_benefits
          and adjudication_supports_ebt_misuse_determination
