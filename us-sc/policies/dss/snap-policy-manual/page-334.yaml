format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-334
  summary: |-
    "When an 'S' or 'T' Form is received, the form is registered in SCWINS with the receipt date. Screen for entitlement to expedited processing. If expedited, process case by the 6th calendar day following the date form was received. If not expedited, register as incomplete. Send incomplete notice (C016). The household is given 10 days to provide requested information. However, the household has 30 days from the date the 'S' or 'T' form was filed to provide the requested verification and still be entitled to benefits from the date the form was received."
rules:
  - name: expedited_processing_deadline_days_after_form_received
    kind: parameter
    dtype: Count
    source: SNAP Manual page 334, Late Incomplete Additional verification needed Process
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-334
              excerpt: "process case by the 6th calendar day following the date form was received"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          6

  - name: requested_information_response_period_days
    kind: parameter
    dtype: Count
    source: SNAP Manual page 334, Late Incomplete Additional verification needed Process
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-334
              excerpt: "The household is given 10 days to provide requested information"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10

  - name: verification_period_for_benefits_from_receipt_days
    kind: parameter
    dtype: Count
    source: SNAP Manual page 334, Late Incomplete Additional verification needed Process
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-334
              excerpt: "30 days from the date the 'S' or 'T' form was filed"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: expedited_case_processing_required_by_deadline
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 334, Late Incomplete Additional verification needed Process
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-334
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          s_or_t_form_received
          and screening_indicates_case_is_expedited
          and case_processed_by_expedited_processing_deadline_days_after_form_received

  - name: non_expedited_case_registered_incomplete_notice_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 334, Late Incomplete Additional verification needed Process
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-334
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          s_or_t_form_received
          and not screening_indicates_case_is_expedited
          and case_registered_as_incomplete
          and incomplete_notice_c016_sent

  - name: benefits_from_form_receipt_date_preserved_by_timely_verification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 334, Late Incomplete Additional verification needed Process
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-334
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          s_or_t_form_received
          and additional_verification_needed
          and requested_verification_provided_within_verification_period_for_benefits_from_receipt_days
