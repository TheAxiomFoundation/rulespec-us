format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-211
  summary: |-
    "by the 15th of the month in which it is due" for timely filing; completed timely reports entitle the household to uninterrupted benefits. Incomplete forms require notice. Forms filed "between the 16th and the last day" lose uninterrupted benefits but require a benefit determination "within 30 days"; missing required verification can terminate certification. Unclear information must be pursued when it meets the stated recency/reporting or significant-conflict conditions.
rules:
  - name: timely_interim_report_deadline_day_of_due_month
    kind: parameter
    dtype: Integer
    source: SC DSS SNAP Manual p. 211, interim reporting deadline
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-211
              excerpt: "by the 15th of the month"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          15

  - name: late_same_month_interim_report_start_day_of_month
    kind: parameter
    dtype: Integer
    source: SC DSS SNAP Manual p. 211, late same-month filing period
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-211
              excerpt: "between the 16th and the last day of the month"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          16

  - name: benefit_determination_deadline_days_from_report_receipt
    kind: parameter
    dtype: Count
    source: SC DSS SNAP Manual p. 211, determination deadline
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-211
              excerpt: "within 30 days from the date the interim reporting form was received"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: verification_deadline_days_from_late_report_receipt
    kind: parameter
    dtype: Count
    source: SC DSS SNAP Manual p. 211, late-report verification deadline
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-211
              excerpt: "does not provide required verification within 30 days"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: unclear_information_recency_limit_days
    kind: parameter
    dtype: Count
    source: SC DSS SNAP Manual § 15.7, p. 211, unclear information recency
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-211
              excerpt: "fewer than 60 days old relative to the current month"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          60

  - name: household_entitled_to_uninterrupted_benefits_from_timely_completed_interim_report
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SC DSS SNAP Manual p. 211, timely completed interim report
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-211
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          completed_interim_report_form_filed_by_fifteenth_day_of_due_month

  - name: agency_must_notify_household_of_incomplete_interim_report
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SC DSS SNAP Manual p. 211, incomplete interim reporting form notice
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-211
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          interim_reporting_form_received_incomplete

  - name: certification_terminates_end_of_due_month_for_timely_incomplete_report
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SC DSS SNAP Manual p. 211, timely incomplete report missing verification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-211
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          timely_incomplete_interim_report_filed
          and not required_verification_provided_by_end_of_due_month

  - name: household_loses_uninterrupted_benefits_for_late_same_month_interim_report
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SC DSS SNAP Manual p. 211, form filed between sixteenth and last day
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-211
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          interim_report_form_filed_between_sixteenth_and_last_day_of_due_month

  - name: benefit_determination_deadline_days_for_late_same_month_report
    kind: derived
    entity: Household
    dtype: Count
    period: Month
    source: SC DSS SNAP Manual p. 211, late same-month determination deadline
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-211
              excerpt: "entitled to a determination of benefits within 30 days"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if interim_report_form_filed_between_sixteenth_and_last_day_of_due_month: benefit_determination_deadline_days_from_report_receipt else: 0

  - name: verification_deadline_days_for_late_same_month_report
    kind: derived
    entity: Household
    dtype: Count
    period: Month
    source: SC DSS SNAP Manual p. 211, late same-month verification deadline
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-211
              excerpt: "required verification within 30 days from the date the form was received"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if interim_report_form_filed_between_sixteenth_and_last_day_of_due_month: verification_deadline_days_from_late_report_receipt else: 0

  - name: certification_terminates_for_late_same_month_report_missing_verification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SC DSS SNAP Manual p. 211, late same-month report missing verification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-211
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          interim_report_form_filed_between_sixteenth_and_last_day_of_due_month
          and not required_verification_provided_within_thirty_days_from_late_report_receipt

  - name: agency_must_revert_case_to_open_on_chip
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SC DSS SNAP Manual p. 211, CHIP receipt acknowledgement
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-211
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          interim_reporting_form_received_by_last_working_day_of_due_month
          and agency_failed_to_acknowledge_interim_report_receipt_on_chip

  - name: reported_expense_deduction_may_be_excluded_for_missing_verification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SC DSS SNAP Manual p. 211, reported expense verification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-211
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          verification_of_reported_expense_not_provided

  - name: information_is_unclear
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SC DSS SNAP Manual § 15.7, p. 211, unclear information definition
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-211
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          information_not_verified
          or (information_verified and agency_needs_additional_information_to_act_on_change)

  - name: agency_must_pursue_clarification_and_verification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SC DSS SNAP Manual § 15.7, p. 211, unclear information pursuit
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-211
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          agency_received_information_during_certification_period
          and information_is_unclear
          and (
            (
              unclear_information_received_outside_recertification_review
              and unclear_information_is_fewer_than_sixty_days_old_relative_to_current_month
              and unclear_information_would_have_been_required_to_be_reported_under_simplified_reporting
            )
            or unclear_information_significantly_conflicts_with_certification_information
          )
