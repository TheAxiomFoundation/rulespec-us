format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-446
  summary: '13.6 (1) Net Monthly Income: ... maximum homeless shelter deduction increased
    to $198.99 effective October 1, 2025. 13.6 (3) ... minimum benefit allotment as
    $24. 8.12 Definition of ABAWD: ... ages 18 to 64 ... without dependents under
    14 years of age in the household. 8.15 Exceptions ... under age 18 or age 65 or
    older ... new exceptions for Indians ...'
  deferred_outputs:
  - output: us-sc:policies/dss/snap-policy-manual/page-446#minimum_benefit_allotment
    reason: Generated rule used a local name that collides with a sibling RuleSpec
      export. This output is deferred until it can be encoded with a semantic branch-specific
      name without creating ambiguous sibling imports.
  - output: us-sc:policies/dss/snap-policy-manual/page-446#snap_benefit_after_minimum_allotment
    reason: Generated rule depends on an output that validation deferred because it
      flattened thresholded, capped, base-limited, or cross-referenced mechanics,
      or borrowed an unrelated same-named section term.
rules:
- name: homeless_shelter_deduction_limited_amount
  kind: derived
  entity: Household
  dtype: Money
  period: Month
  unit: USD
  source: SNAP Manual page 446, section 13.6 (1) update
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-446
          excerpt: maximum homeless shelter deduction increased to $198.99 effective
            October 1, 2025
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-446
          excerpt: $198.99
  versions:
  - effective_from: '2025-10-01'
    formula: min(max(0, homeless_shelter_deduction_before_cap), maximum_homeless_shelter_deduction)
- name: abawd
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: SNAP Manual page 446, section 8.12 update
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: definition
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-446
          excerpt: ABAWD as SNAP household members ages 18 to 64 who are able-bodied
            adults without dependents under 14 years of age in the household
  versions:
  - effective_from: '2025-11-01'
    formula: 'snap_household_member_is_age_18_to_64

      and member_is_able_bodied_adult

      and household_has_no_dependents_under_age_14'
- name: age_based_abawd_work_requirement_exception
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: SNAP Manual page 446, section 8.15 update
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-446
          excerpt: age-based exception for ABAWDS to under age 18 or age 65 or older
  versions:
  - effective_from: '2025-11-01'
    formula: 'person_is_under_age_18

      or person_is_age_65_or_older'
- name: indian_abawd_work_requirement_exception
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: SNAP Manual page 446, section 8.15 update
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-446
          excerpt: new exceptions for Indians have been added
  versions:
  - effective_from: '2025-11-01'
    formula: person_is_indian
- name: person_with_dependent_age_14_to_17_subject_to_abawd_time_limit
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: SNAP Manual page 446, section 8.15 update
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-446
          excerpt: adults in the SNAP household with a dependent child(ren) between
            the ages of 14 and 17 are now subject to the ABAWD time limit, unless
            they meet an exception
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-446
          excerpt: under age 18 or age 65 or older
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-446
          excerpt: new exceptions for Indians have been added
  versions:
  - effective_from: '2025-11-01'
    formula: 'adult_in_snap_household_with_dependent_child_age_14_to_17

      and not age_based_abawd_work_requirement_exception

      and not indian_abawd_work_requirement_exception'
imports:
- us-sc:policies/dss/snap-policy-manual/page-445#maximum_homeless_shelter_deduction
