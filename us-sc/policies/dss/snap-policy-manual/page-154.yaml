format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-154
  summary: |-
    PA vendor payments are counted as income unless made for medical assistance, child care assistance, energy assistance as defined in Section 11.5(R), emergency assistance for migrant or seasonal farmworker households while in the job stream, housing assistance through a State or local housing authority, or emergency and special assistance. Vendor payments are money payments made on behalf of a household by a person or organization outside the household directly to creditors or service providers, or any non-money gain or benefit not payable directly to the household. Veteran's educational benefits used for purposes other than tuition and mandatory fees are countable unearned income. Income diverted to an ex-spouse under the Uniformed Services Former Spouse Protection Act is excluded from the military retiree's budget; income received by the ex-spouse is counted as income to the ex-spouse. Educational assistance is financial support provided to learn new skills or pursue an additional degree(s) and/or certification(s).
  deferred_outputs:
    - output: us-sc:policies/dss/snap-policy-manual/page-154#pa_vendor_payment_counted_as_income
      reason: Payment exclusion depends on the missing Section 11.5(R) definition of home energy assistance payments, which is one of the source-stated exceptions to counting PA vendor payments as income.
    - output: us-sc:policies/dss/snap-policy-manual/page-154#vendor_payment_reimbursement_excluded
      reason: The reimbursement exclusion is determined on the same basis as reimbursements under Section 11.5(CC), which is not available in copied context.
    - output: us-sc:policies/dss/snap-policy-manual/page-154#veterans_educational_benefits_countable_unearned_income
      reason: The operative veteran educational benefits rule cross-references Section 11.5(ZZ), which is not available in copied context.
rules:
  - name: vendor_payment
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: SNAP Manual page 154 (L)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-154
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          payment_made_on_behalf_of_household_by_person_or_organization_outside_household_directly_to_household_creditor
          or payment_made_on_behalf_of_household_by_person_or_organization_outside_household_directly_to_service_provider
          or gain_or_benefit_not_in_money_payable_directly_to_household
  - name: uniformed_services_former_spouse_protection_act_diverted_income_excluded_from_military_retiree_budget
    kind: derived
