- name: no_medical_deduction_allowed_for_verified_expenses
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: SNAP Manual p. 67(H)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-67
      - path: versions[0].formula
        kind: import
        import:
          target: us-sc:policies/dss/snap-policy-manual/page-67#no_medical_deduction_monthly_limit
          output: no_medical_deduction_monthly_limit
          hash: sha256:local
  versions:
  - effective_from: '0001-01-01'
    formula: 'household_not_receiving_medical_deduction

      and household_reports_medical_expenses_are_incurred

      and medical_expenses_verified

      and verified_monthly_medical_expenses <= no_medical_deduction_monthly_limit'
