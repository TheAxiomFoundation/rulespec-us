        kind: condition
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-67
      - path: versions[0].formula
        kind: import
        import:
          target: us-sc:policies/dss/snap-policy-manual/page-67#ongoing_income_change_verification_threshold
          output: ongoing_income_change_verification_threshold
          hash: sha256:local
  versions:
