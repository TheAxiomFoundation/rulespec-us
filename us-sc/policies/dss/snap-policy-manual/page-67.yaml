format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-67
  summary: A change in income must be verified if the source has changed or ongoing
    income changed by more than $50; rent/mortgage and utility expenses must be verified
    if changed by more than $25. When a household reports a change in medical expenses,
    verification must be obtained to determine medical deduction qualification or
    change. If verified incurred medical expenses are $35.00 or less per month, no
    medical deduction is allowed; more than $35.00 but not more than $210.00 allows
    the Standard Medical deduction; more than $210.00 monthly allows the Excess Medical
    deduction.
  deferred_outputs:
  - output: us-sc:policies/dss/snap-policy-manual/page-67#excess_medical_deduction_must_be_allowed
    reason: Generated rule used a local name that collides with a sibling RuleSpec
      export. This output is deferred until it can be encoded with a semantic branch-specific
      name without creating ambiguous sibling imports.
  - output: us-sc:policies/dss/snap-policy-manual/page-67#standard_medical_deduction_must_be_allowed
    reason: Generated rule used a local name that collides with a sibling RuleSpec
      export. This output is deferred until it can be encoded with a semantic branch-specific
      name without creating ambiguous sibling imports.
rules:
- name: ongoing_income_change_verification_threshold
  kind: parameter
  dtype: Money
  period: Month
  unit: USD
  source: SNAP Manual p. 67(B)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-67
          excerpt: amount has changed by more than $50
  versions:
  - effective_from: '0001-01-01'
    formula: '50'
- name: rent_mortgage_change_verification_threshold
  kind: parameter
  dtype: Money
  period: Month
  unit: USD
  source: SNAP Manual p. 67(C)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-67
          excerpt: rent/mortgage expense that changed by more than $25
  versions:
  - effective_from: '0001-01-01'
    formula: '25'
- name: utility_change_verification_threshold
  kind: parameter
  dtype: Money
  period: Month
  unit: USD
  source: SNAP Manual p. 67(D)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-67
          excerpt: utility expenses which have changed by more than $25
  versions:
  - effective_from: '0001-01-01'
    formula: '25'
- name: no_medical_deduction_monthly_limit
  kind: parameter
  dtype: Money
  period: Month
  unit: USD
  source: SNAP Manual p. 67(H)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-67
          excerpt: $35.00 or less per month, no medical deduction
  versions:
  - effective_from: '0001-01-01'
    formula: '35'
- name: standard_medical_deduction_monthly_ceiling
  kind: parameter
  dtype: Money
  period: Month
  unit: USD
  source: SNAP Manual p. 67(H)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-67
          excerpt: does not exceed $210.00 per month
  versions:
  - effective_from: '0001-01-01'
    formula: '210'
- name: new_income_change_requires_verification
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: SNAP Manual p. 67(B)
  metadata:
