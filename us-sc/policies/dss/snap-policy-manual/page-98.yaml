format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-98
  summary: |-
    A student will remain exempt during normal periods of class attendance, vacation, and recess. If the student graduates, enrolls less than half-time, is suspended or expelled, drops out, or does not intend to register for the next normal school term (excluding summer), the Agency must work register the individual, unless the individual qualifies for another exemption. A home-schooled high school student, who is at least 18 years of age or older, will qualify for this exemption if the state's secondary education officials recognize the home school as an acceptable secondary education provider. A person receiving unemployment compensation, or who has applied and is complying with UI application work requirements, is exempt. Persons losing exemption status due to reportable changes must register when the change is reported; non-reportable losses are registered at the household's next recertification.
rules:
  - name: student_exemption_continues_during_school_period
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 98, student exemption continuity
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-98
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          student_is_exempt_from_work_registration
          and (normal_period_of_class_attendance or school_vacation_or_recess)

  - name: student_exemption_loss_requires_work_registration
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 98, student status loss
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-98
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (student_graduates
          or student_enrolls_less_than_half_time
          or student_is_suspended_or_expelled
          or student_drops_out
          or student_does_not_intend_to_register_for_next_normal_school_term_excluding_summer)
          and not individual_qualifies_for_another_work_registration_exemption

  - name: home_schooled_high_school_student_exemption_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 98, home-schooled high school student footnote
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-98
              excerpt: "at least 18 years of age or older"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_home_schooled_high_school_student
          and person_is_at_least_18_years_old
          and state_secondary_education_officials_recognize_home_school_as_acceptable_secondary_provider

  - name: unemployment_compensation_exemption_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 98, Unemployment Compensation
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-98
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_receives_unemployment_compensation
          or (person_has_applied_for_unemployment_compensation
          and person_complies_with_unemployment_compensation_application_work_requirements)

  - name: employment_registration_required_when_reportable_exemption_loss_reported
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 98, reportable change in exemption status
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-98
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_loses_exemption_due_to_change_subject_to_chapter_15_reporting_requirements
          and exemption_status_change_is_reported

  - name: employment_registration_required_at_next_recertification_after_nonreportable_exemption_loss
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 98, non-reportable change in exemption status
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-98
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_loses_exemption_due_to_change_not_subject_to_chapter_15_reporting_requirements
          and household_is_at_next_recertification

  - name: simplified_reporting_household_member_work_registered_at_next_recertification
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 98, simplified reporting households
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-98
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_subject_to_simplified_reporting_requirements
          and person_loses_exemption_due_to_change_not_required_to_be_reported
          and household_is_at_next_recertification
