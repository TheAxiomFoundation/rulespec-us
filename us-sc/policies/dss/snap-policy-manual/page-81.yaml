format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-81
  summary: |-
    SIVs are eligible for all benefits to the same extent and the same period of time as refugees; trafficking victims and listed derivative T visa relatives are treated to the same extent as refugees. These individuals must meet all other SNAP eligibility requirements. Qualified Non-citizens listed in the chart directly below must be in qualified status for 5 years in the U.S. before being eligible; LPRs age 18 or older are admitted lawfully for permanent residence under the INA.
rules:
  - name: refugee_equivalent_non_citizen_status
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 81, enumerated categories 5-9
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-81
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          iraqi_or_afghan_national_granted_siv_status_for_us_government_work
          or trafficking_victim_certified_by_hhs
          or trafficking_victim_under_age_eighteen
          or derivative_t_visa_relative_of_trafficking_victim_under_age_twenty_one
          or derivative_t_visa_spouse_or_child_of_trafficking_victim_age_twenty_one_or_older
  - name: refugee_equivalent_non_citizen_snap_eligible
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 81, note following enumerated categories 5-9
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-81
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          refugee_equivalent_non_citizen_status
          and person_meets_all_other_snap_eligibility_requirements
  - name: qualified_status_waiting_period_years
    kind: parameter
    dtype: Integer
    period: Month
    source: SNAP Manual page 81, Qualified Non-citizens note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-81
              excerpt: "must be in the qualified status for 5 years in the U.S."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          5
  - name: lpr_age_eighteen_or_older_waiting_period_satisfied
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 81, Qualified Non-citizens chart row for LPR age 18 or older
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-81
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          lawfully_admitted_for_permanent_residence_age_eighteen_or_older
          and person_has_been_in_qualified_status_in_us_for_qualified_status_waiting_period_years
  - name: lpr_age_eighteen_or_older_snap_eligible
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 81, Qualified Non-citizens note and LPR chart row
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-81
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          lpr_age_eighteen_or_older_waiting_period_satisfied
          and person_meets_all_other_snap_eligibility_requirements
