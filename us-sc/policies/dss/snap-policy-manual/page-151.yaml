format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-151
  summary: |-
    Unemployment compensation benefits include amounts deducted to repay IPV claims; exclude UCB withheld to repay a prior overpayment not due to IPV. USDA Pigford settlement is counted as a lump sum. VA benefits include aid and attendance or housebound allowance. Agent Orange VA payments are countable except Aetna payments. Veterans educational benefits used for purposes other than tuition and mandatory fees are countable unearned income. Recurring victim's compensation payments count as unearned income; non-recurring lump sums are excluded as income and considered a resource. Withdrawals from resources for categorically eligible households are no longer income effective May 1, 2013.
rules:
  - name: unemployment_compensation_benefit_countable_unearned_income
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: SNAP Manual page 151, item VV
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-151
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-151
              excerpt: "Exclude UCB withheld to repay a prior overpayment that is not due to an IPV."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          payment_is_unemployment_compensation_benefit
          and not payment_is_ucb_withheld_to_repay_prior_overpayment_not_due_to_ipv

  - name: usda_pigford_settlement_countable_lump_sum
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: SNAP Manual page 151, item WW
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-151
              excerpt: "Count as lump sum payment."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          payment_is_usda_pigford_settlement_to_african_american_farmer

  - name: veterans_administration_benefit_countable_unearned_income
    kind: derived
