        formula: |-
          payment_is_veterans_administration_benefit

  - name: agent_orange_veterans_benefit_countable_unearned_income
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: SNAP Manual page 151, item YY
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
