format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-231
  summary: |-
    “The fair hearing will be held by telephone, unless the household asks that it be held face-to-face. The household will always be given the option for a face-to-face hearing through Microsoft Teams video conferencing.” If the worker who took the action is unavailable, “the supervisor or designee must represent the Agency.”
rules:
  - name: rsw_fair_hearing_held_by_telephone
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 18.9(1), Fair Hearing Procedures for Regionalized Specialized Workload
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-231
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_has_rsw_fair_hearing
          and not household_asks_face_to_face_hearing
  - name: household_offered_face_to_face_hearing_through_teams
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 18.9(1), Fair Hearing Procedures for Regionalized Specialized Workload
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-231
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_has_rsw_fair_hearing
  - name: agency_represented_by_supervisor_or_designee
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual 18.9(1), Fair Hearing Procedures for Regionalized Specialized Workload
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-231
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_has_rsw_fair_hearing
          and worker_who_took_action_is_not_at_work_or_not_available_for_hearing
