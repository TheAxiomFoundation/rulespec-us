    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-159
    upstream_source_check:
      status: delegated_parameter_source
      checked_paths:
      - us:regulations/7-cfr/273/9#snap_state_standard_utility_allowance_delegation
      - us:regulations/7-cfr/273/9#snap_standard_utility_allowance_state_option
      - us:regulations/7-cfr/273/9#snap_limited_utility_allowance_state_option
      rationale: Federal SNAP regulations delegate state utility allowance standards
        and options to state agencies. This South Carolina DSS SNAP Manual page supplies
        the state-specific monthly utility allowance dollar amounts, so it is used
        as the delegated parameter source for these values.
  summary: 'The page lists SNAP income deductions and states: "$388 Mandatory utility
    allowance (MUA)," "$265 Basic utility allowance (BUA)," and "$27 Telephone allowance."
    Eligibility is resolved through the detailed Chapter 12 utility rules on pages
    163 through 165. MUA, BUA, and telephone values are mutually exclusive, and BUA
    requires utility verification.'
