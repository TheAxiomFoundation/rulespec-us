format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-246
  summary: |-
    Intentional Program violations consist of intentionally making a false or misleading statement, misrepresenting, concealing, or withholding facts, or committing an act violating the Food and Nutrition Act, SNAP Regulations, or State statute for the purpose of using, presenting, transferring, acquiring, receiving, possessing, or trafficking SNAP benefits or access devices. IPV determinations may be made by ADH, ACA waiver, or DCA/court process, and the Agency bases administrative disqualifications on those determinations or agreements.
rules:
  - name: intentional_program_violation
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 246, Section 20.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-246
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_intentionally_made_false_or_misleading_statement_or_misrepresented_concealed_or_withheld_facts
          or individual_intentionally_committed_program_violation_act_for_snap_benefit_or_access_device_purpose

  - name: intentional_program_violation_determined
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 246, Section 20.3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-246
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          office_of_administrative_hearings_conducted_administrative_disqualification_hearing_and_determined_ipv
          or individual_waived_right_to_administrative_disqualification_hearing_by_administrative_consent_agreement
          or individual_signed_deferred_adjudication_disqualification_consent_agreement_dss_form_2659_with_court_determination_or_prosecution

  - name: administrative_disqualification_for_intentional_program_violation_basis
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 246, introductory paragraph and Section 20.3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-246
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          hearing_authority_determined_ipv_through_administrative_disqualification_hearing
          or court_of_appropriate_jurisdiction_determined_ipv
          or individual_waived_right_to_administrative_disqualification_hearing
          or individual_signed_deferred_adjudication_disqualification_consent_agreement_in_deferred_adjudication_case

  - name: pending_administrative_disqualification_hearing_does_not_affect_snap_certification_and_participation_right
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 246, Section 20.3(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-246
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          administrative_disqualification_hearing_is_pending
