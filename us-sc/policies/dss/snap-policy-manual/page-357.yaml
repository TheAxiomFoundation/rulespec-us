format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-357
  summary: |-
    Mandatory Utility Allowance (MUA) is a utility deduction allowed for households that incur and are billed for a heating and cooling cost. Medical Deduction is the portion of out-of-pocket medical expenses in excess of $35 per month per household, excluding special diets, incurred by at least one eligible household member who is elderly or disabled. Minimum Benefit is the minimum monthly amount of SNAP benefits that eligible one- and two-person households receive.
rules:
  - name: medical_deduction_monthly_disregard
    kind: parameter
    dtype: Money
    unit: USD
    period: Month
    source: SNAP Manual p. 357, "Medical Deduction"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-357
              excerpt: "in excess of $35 per month per household"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          35

  - name: mandatory_utility_allowance
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 357, "Mandatory Utility Allowance (MUA)"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-357
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_incurs_and_is_billed_for_heating_and_cooling_cost

  - name: medical_deduction
    kind: derived
    entity: Household
    dtype: Money
    unit: USD
    period: Month
    source: SNAP Manual p. 357, "Medical Deduction"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-357
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-357
              excerpt: "in excess of $35 per month per household"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if household_has_eligible_elderly_or_disabled_member_with_medical_expenses: max(0, out_of_pocket_medical_expenses_excluding_special_diets - medical_deduction_monthly_disregard) else: 0

  - name: minimum_benefit_household
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 357, "Minimum Benefit"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-357
              excerpt: "eligible one- and two-person households receive"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_is_eligible_for_snap
          and household_person_count >= 1
          and household_person_count <= 2
