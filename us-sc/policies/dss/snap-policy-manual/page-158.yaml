format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-158
  summary: |-
    "(N) Old Age Assistance Claims Settlement Act payments of $2,000 or less"; "(S) Weekly $25 supplemental weekly Unemployment Compensation payment"; "(U) ... FPUC ... should not be regarded as income or resources in the initial month of receipt or any of the following 9 months"; "(V) Rebate payments ... excluded ... as income in the month of receipt and as a resource for 12 months following receipt date."
rules:
  - name: old_age_assistance_claims_settlement_act_payment_limit
    kind: parameter
    dtype: Money
    unit: USD
    period: Month
    source: SNAP Manual p.158 item (N)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-158
              excerpt: "payments of $2,000 or less"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          2000

  - name: arra_supplemental_unemployment_compensation_weekly_amount
    kind: parameter
    dtype: Money
    unit: USD
    period: Week
    source: SNAP Manual p.158 item (S)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-158
              excerpt: "Weekly $25 supplemental weekly Unemployment Compensation payment"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          25

  - name: fpuc_following_months_exclusion_limit
    kind: parameter
    dtype: Count
    period: Month
    source: SNAP Manual p.158 item (U)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-158
              excerpt: "any of the following 9 months"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          9

  - name: rebate_resource_exclusion_months_following_receipt
    kind: parameter
    dtype: Count
    period: Month
    source: SNAP Manual p.158 item (V)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-158
              excerpt: "as a resource for 12 months following receipt date"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          12

  - name: payment_excluded_from_snap_income
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: SNAP Manual p.158 items (K)-(V)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-158
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          payment_is_medicare_approved_prescription_drug_card_discount_or_credit
          or payment_is_nfip_payment_under_national_flood_insurance_act
          or payment_made_to_victim_of_nazi_persecution
          or (payment_is_old_age_assistance_claims_settlement_act_payment and payment_amount <= old_age_assistance_claims_settlement_act_payment_limit)
          or payment_is_ssi_recipient_income_necessary_for_approved_pass
          or payment_is_radiation_exposure_compensation_act_payment
          or payment_is_uniform_relocation_assistance_and_real_property_acquisition_policy_act_payment
          or payment_is_va_benefit_to_child_of_vietnam_veteran_born_with_spina_bifida_or_certain_birth_defect
          or (payment_is_arra_supplemental_weekly_unemployment_compensation and payment_weekly_amount == arra_supplemental_unemployment_compensation_weekly_amount)
          or payment_is_earned_income_tax_credit_payment
          or (payment_is_fpuc_under_cares_act_section_2104_through_2021_acts and months_since_initial_receipt >= 0 and months_since_initial_receipt <= fpuc_following_months_exclusion_limit)
          or (payment_is_rebate_to_eligible_individual_through_2021_acts and payment_received_in_current_month)

  - name: payment_excluded_from_snap_resources
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: SNAP Manual p.158 items (U)-(V)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-158
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (payment_is_fpuc_under_cares_act_section_2104_through_2021_acts and months_since_initial_receipt >= 0 and months_since_initial_receipt <= fpuc_following_months_exclusion_limit)
          or (payment_is_rebate_to_eligible_individual_through_2021_acts and months_since_receipt_date >= 0 and months_since_receipt_date <= rebate_resource_exclusion_months_following_receipt)
