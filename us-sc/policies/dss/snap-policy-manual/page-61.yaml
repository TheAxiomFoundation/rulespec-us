format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-61
  summary: |-
    Students: verification may be required when an individual claims physical or mental unfitness for the student exemption and the unfitness is not evident to the Agency; appropriate verification may consist of temporary or permanent disability benefits or a physician/licensed/certified psychologist statement. QC refusal: the Agency will verify all eligibility factors for households terminated for refusal to cooperate with State QC and reapplying after 95 days, or Federal QC and reapplying after seven months, from the end of the annual review period. Other questionable factors affecting eligibility and benefit level must be verified before certification; verification cannot be prescribed based on race, religion, ethnic background, or national origin. Documentary evidence is the primary verification source except residency and household size, which may also be verified through collateral contact.
rules:
  - name: state_quality_control_reapplication_waiting_period_days
    kind: parameter
    dtype: Count
    source: SNAP Manual page 61, item (14)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-61
              excerpt: "reapply after 95 days from the end of the annual review period"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          95

  - name: federal_quality_control_reapplication_waiting_period_months
    kind: parameter
    dtype: Count
    source: SNAP Manual page 61, item (14)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-61
              excerpt: "reapply after seven months from the end of the annual review period"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          7

  - name: student_unfitness_verification_may_be_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 61, item (13)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-61
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_claims_physically_or_mentally_unfit_for_student_exemption
          and not unfitness_is_evident_to_agency

  - name: student_unfitness_appropriate_verification_provided
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 61, item (13)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-61
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          temporary_or_permanent_disability_benefits_from_governmental_or_private_source
          or statement_from_physician_or_licensed_or_certified_psychologist

  - name: state_quality_control_refusal_all_factors_verification_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 61, item (14)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-61
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-61
              excerpt: "after 95 days"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_terminated_for_refusal_to_cooperate_with_state_quality_control_reviewer
          and days_after_end_of_annual_review_period_at_reapplication > state_quality_control_reapplication_waiting_period_days

  - name: federal_quality_control_refusal_all_factors_verification_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 61, item (14)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-61
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-61
              excerpt: "after seven months"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_terminated_for_refusal_to_cooperate_with_federal_quality_control_reviewer
          and months_after_end_of_annual_review_period_at_reapplication > federal_quality_control_reapplication_waiting_period_months

  - name: questionable_factor_verification_required_before_certification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 61, item (15)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-61
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          agency_determines_factor_is_questionable
          and factor_affects_household_eligibility_and_benefit_level

  - name: verification_prescription_based_on_protected_class_prohibited
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 61, item (15)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-61
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          verification_prescribed_based_on_race
          or verification_prescribed_based_on_religion
          or verification_prescribed_based_on_ethnic_background
          or verification_prescribed_based_on_national_origin

  - name: documentary_evidence_primary_verification_source_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 61, section 5.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-61
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          verification_item_is_not_residency
          and verification_item_is_not_household_size

  - name: residency_or_household_size_may_use_documentary_or_collateral_contact
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 61, section 5.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-61
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          verification_item_is_residency
          or verification_item_is_household_size

  - name: collateral_contact_may_be_required_when_documentary_evidence_insufficient
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 61, section 5.2(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-61
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          documentary_evidence_cannot_be_obtained
          or documentary_evidence_insufficient_to_determine_eligibility_or_benefit_level
