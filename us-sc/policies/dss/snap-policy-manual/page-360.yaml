format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-360
  summary: |-
    Project Area is the county or similar political subdivision designated by the State as the administrative unit for program operations. Prospective Eligibility uses anticipated and/or actual income and circumstances for the benefit month. Public Assistance includes listed Social Security Act programs. QC Review Date and QC Review Period are defined. Qualified Non-Citizen includes LPRs, certain conditional entrants, Cuban/Haitian entrants, abused or trafficking-victim non-citizens, and specified abused-child or abused-parent categories.
rules:
  - name: qualified_non_citizen
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 360, Qualified Non-Citizen definition
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-360
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_legal_permanent_resident
          or person_is_non_citizen_granted_conditional_entry_under_law_in_effect_prior_to_april_1_1980
          or person_is_cuban_haitian_entrant
          or person_is_non_citizen_abused_or_trafficking_victim_meeting_criteria
          or person_is_non_citizen_with_abused_child_meeting_criteria
          or person_is_non_citizen_child_whose_parent_was_abused_meeting_criteria
