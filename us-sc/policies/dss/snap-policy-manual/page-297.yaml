format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-297
  summary: |-
    "Genitourinary Disorders" include chronic kidney disease variants, nephrotic syndrome, and complications; "Hematological Disorders" include hemolytic anemias, thrombosis and hemostasis disorders, bone marrow failure, transplantation treatment, and repeated complications; "Skin Disorders" include ichthyosis, bullous disease, chronic infections, dermatitis, hidradenitis suppurativa, genetic photosensitivity disorders, and burns; "Endocrine Disorders" include pituitary gland disorders.
rules:
  - name: listed_genitourinary_disorder
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 297, Genitourinary Disorders
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-297
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          chronic_kidney_disease_with_chronic_hemodialysis_or_peritoneal_dialysis
          or chronic_kidney_disease_with_kidney_transplant
          or chronic_kidney_disease_with_impairment_of_kidney_function
          or nephrotic_syndrome
          or complications_of_chronic_kidney_disease
  - name: listed_hematological_disorder
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 297, Hematological Disorders
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-297
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          hemolytic_anemia_including_sickle_cell_disease_thalassemia_or_variant
          or disorder_of_thrombosis_and_hemostasis
          or disorder_of_bone_marrow_failure
          or hematological_disorder_treated_by_bone_marrow_or_stem_cell_transplantation
          or repeated_complications_of_hematological_disorder
  - name: listed_skin_disorder
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 297, Skin Disorders
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-297
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          ichthyosis
          or bullous_disease
          or chronic_infection_of_skin_or_mucous_membranes
          or dermatitis
          or hidradenitis_suppurativa
          or genetic_photosensitivity_disorder
          or burns
  - name: listed_endocrine_disorder
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 297, Endocrine Disorders
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-297
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          pituitary_gland_disorder
