format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-311
  summary: |-
    "Certain American Indians Born Abroad ... Eligible immediately Not eligible unless an LPR, then eligible immediately"; "Hmong or Highland Laotian Tribal Members ... Vietnam era (Aug. 5, 1964 - May 7, 1975) ... Eligible immediately"; "Iraqi and Afghan Special Immigrants (SIV) ... Eligible immediately".
rules:
  - name: person_eligible_immediately_in_listed_non_citizen_categories
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual 311, listed non-citizen categories marked eligible immediately
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-311
              excerpt: Certain American Indians Born Abroad ... Eligible immediately
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-311
              excerpt: Hmong or Highland Laotian Tribal Members ... Eligible immediately
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-311
              excerpt: Iraqi and Afghan Special Immigrants (SIV) ... Eligible immediately
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          certain_american_indian_born_abroad_under_ina_289_or_federally_recognized_tribe_member_under_isdeaa_4e
          or hmong_or_highland_laotian_tribal_member_or_included_family_member_lawfully_residing_and_tribe_assisted_us_personnel_during_vietnam_era
          or iraqi_or_afghan_special_immigrant_status_under_ina_101_a_27

  - name: person_eligible_immediately_in_listed_non_citizen_categories_when_lpr_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual 311, listed categories marked not eligible unless LPR then eligible immediately
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-311
              excerpt: Not eligible unless an LPR, then eligible immediately
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-311
              excerpt: Certain American Indians Born Abroad
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-311
              excerpt: Hmong or Highland Laotian Tribal Members
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-311
              excerpt: Iraqi and Afghan Special Immigrants (SIV)
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_lawful_permanent_resident
          and (
            certain_american_indian_born_abroad_under_ina_289_or_federally_recognized_tribe_member_under_isdeaa_4e
            or hmong_or_highland_laotian_tribal_member_or_included_family_member_lawfully_residing_and_tribe_assisted_us_personnel_during_vietnam_era
            or iraqi_or_afghan_special_immigrant_status_under_ina_101_a_27
          )
