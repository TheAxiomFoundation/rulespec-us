format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-73
  summary: |-
    Expedited service is for households in immediate need: less than $150 monthly gross income with liquid resources not over $100; destitute migrant or seasonal farmworker households with liquid resources not over $100; or households whose gross income plus liquid resources are less than rent or mortgage and utilities. Benefits must be available not later than the seventh calendar day after filing.
rules:
  - name: expedited_service_low_income_monthly_gross_income_threshold
    kind: parameter
    dtype: Money
    period: Month
    unit: USD
    source: SNAP Manual § 6.5(1)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-73
              excerpt: "$150"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          150

  - name: expedited_service_low_income_liquid_resources_limit
    kind: parameter
    dtype: Money
    unit: USD
    source: SNAP Manual § 6.5(1)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-73
              excerpt: "$100"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          100

  - name: expedited_service_destitute_farmworker_liquid_resources_limit
    kind: parameter
    dtype: Money
    unit: USD
    source: SNAP Manual § 6.5(1)(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-73
              excerpt: "$100"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          100

  - name: expedited_service_deadline_calendar_days_following_application_filing
    kind: parameter
    dtype: Count
    source: SNAP Manual § 6.6
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-73
              excerpt: "seventh calendar day"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          7

  - name: utility_expense_for_expedited_service_test
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: SNAP Manual § 6.5(1)(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-73
              excerpt: "MUA or BUA"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if household_entitled_to_mua_or_bua: appropriate_mua_or_bua_standard_utility_expense else: actual_utility_expenses

  - name: household_entitled_to_expedited_service
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual § 6.5(1)(A)-(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-73
              excerpt: "The following households are entitled"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (monthly_gross_income < expedited_service_low_income_monthly_gross_income_threshold
          and liquid_resources <= expedited_service_low_income_liquid_resources_limit)
          or (household_is_migrant_or_seasonal_farmworker
          and household_is_destitute_under_section_13_7
          and liquid_resources <= expedited_service_destitute_farmworker_liquid_resources_limit)
          or (monthly_gross_income + liquid_resources < monthly_rent_or_mortgage + utility_expense_for_expedited_service_test)

  - name: expedited_service_benefit_availability_deadline_days
    kind: derived
    entity: Household
    dtype: Count
    period: Month
    source: SNAP Manual § 6.6
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-73
              excerpt: "not later than the seventh calendar day"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if household_entitled_to_expedited_service: expedited_service_deadline_calendar_days_following_application_filing else: 0
