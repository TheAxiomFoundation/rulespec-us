format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-111
  summary: |-
    "The Agency must accept receipt of Veterans disability benefits... for the purpose of an exception to the ABAWD work requirement"; exceptions also include being obviously unfit, providing a medical statement of unfitness, having primary care responsibility for a dependent child in the SNAP household under 14, pregnancy, Indian/Urban Indian/California Indian status, or exemption from SNAP work requirements for a reason other than being 60 years of age or older.
rules:
  - name: employment_unfitness_abawd_exception_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p.111, ABAWD work requirement exceptions, item 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-111
              excerpt: "accept receipt of Veterans disability benefits, regardless of the individual’s disability percentage rating"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-111
              excerpt: "obviously mentally or physically unfit for employment"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-111
              excerpt: "physically or mentally unfit for employment"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_receives_veterans_disability_benefits
          or agency_determines_person_is_obviously_mentally_or_physically_unfit_for_employment
          or person_provides_acceptable_medical_statement_of_physical_or_mental_unfitness_for_employment

  - name: abawd_work_requirement_exception_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p.111, ABAWD work requirement exceptions, items 2-6
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-111
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-111
              excerpt: "responsibility of caring for a dependent child(ren) in the household under 14 years of age"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-111
              excerpt: "Pregnant"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-111
              excerpt: "An Indian, Urban Indian, or California Indian"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-111
              excerpt: "Exempt from SNAP work requirements"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          employment_unfitness_abawd_exception_applies
          or person_is_parent_or_other_household_member_with_primary_care_responsibility_for_dependent_child_under_fourteen_in_same_snap_household
          or person_is_pregnant
          or person_is_indian_urban_indian_or_california_indian
          or person_is_exempt_from_snap_work_requirements_for_reason_other_than_age_sixty_or_older
