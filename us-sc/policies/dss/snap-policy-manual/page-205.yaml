format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-205
  summary: |-
    The disqualification does not apply to a conviction if the conviction is for conduct occurring on or before February 7, 2014. If a written or verbal response to the listed-conviction and sentence-noncompliance question is "yes", the household member will be disqualified and remains disqualified until verification of compliance with the sentence is received.
rules:
  - name: listed_conviction_disqualification_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual 205
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-205
              excerpt: 'response to the question ... is "yes", the household member will be disqualified'
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-205
              excerpt: 'will not apply to a conviction if the conviction is for conduct occurring on or before February 7, 2014'
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-205
              excerpt: 'will remain disqualified until verification of compliance with his/her sentence is received'
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          response_to_listed_conviction_noncompliance_question_is_yes
          and conviction_conduct_occurred_after_cutoff_date
          and not sentence_compliance_verification_received
  - name: chip_sepa_disqualification_code_di_cf_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual 205
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-205
              excerpt: 'If a SNAP household member is disqualified due to a conviction listed above in this section, that household member should be coded "DI CF"'
          - path: versions[0].formula
            kind: import
            import:
              target: us-sc:policies/dss/snap-policy-manual/page-205#listed_conviction_disqualification_applies
              output: listed_conviction_disqualification_applies
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          listed_conviction_disqualification_applies
