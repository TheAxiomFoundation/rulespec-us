format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-85
  summary: |-
    An individual lawfully residing in a state is covered when on active duty in the military, excluding National Guard, or is an honorably discharged veteran whose discharge is not because of immigration status; this includes a spouse, surviving spouse if not remarried, and unmarried dependent children. “Under Honorable Conditions” is not an honorable discharge. Unmarried dependent child means a legally adopted or biological child of the veteran meeting the stated age, student, deceased-veteran dependency, or disabled-adult dependency conditions. These categories do not include individuals in a non SNAP-eligible category.
rules:
  - name: unmarried_dependent_child_minor_age_limit
    kind: parameter
    dtype: Integer
    source: SNAP Manual p. 85, unmarried dependent child definition
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-85
              excerpt: "under the age of 18"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          18

  - name: unmarried_dependent_child_student_age_limit
    kind: parameter
    dtype: Integer
    source: SNAP Manual p. 85, unmarried dependent child definition
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-85
              excerpt: "if a full-time student, under the age of 22"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          22

  - name: unmarried_disabled_child_minimum_age
    kind: parameter
    dtype: Integer
    source: SNAP Manual p. 85, unmarried dependent child definition
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-85
              excerpt: "an unmarried disabled child age 18 or older"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          18

  - name: active_duty_military_category_conditions_met
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 85, military active-duty category
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-85
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          lawfully_residing_in_state
          and person_on_active_duty_in_military
          and not person_serves_in_national_guard

  - name: honorably_discharged_veteran_category_conditions_met
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 85, honorably discharged veteran category
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-85
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          lawfully_residing_in_state
          and honorably_discharged_veteran
          and discharge_not_because_of_immigration_status
          and not discharge_was_under_honorable_conditions

  - name: spouse_category_conditions_met
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 85, spouse of qualifying military or veteran person
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-85
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          lawfully_residing_in_state
          and spouse_of_person_described_above_in_a_or_b

  - name: surviving_spouse_category_conditions_met
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 85, surviving spouse of deceased veteran
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-85
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          lawfully_residing_in_state
          and surviving_spouse_of_deceased_veteran
          and marriage_fulfilled_requirements_of_38_u_s_c_1304
          and surviving_spouse_has_not_remarried

  - name: unmarried_dependent_child_of_veteran
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 85, unmarried dependent child definition
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-85
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          legally_adopted_or_biological_child_of_veteran
          and unmarried
          and (
            age_years < unmarried_dependent_child_minor_age_limit
            or (full_time_student and age_years < unmarried_dependent_child_student_age_limit)
            or (child_of_deceased_veteran and dependent_upon_veteran_at_time_of_veterans_death)
            or (age_years >= unmarried_disabled_child_minimum_age and disabled_and_dependent_on_veteran_prior_to_childs_eighteenth_birthday)
          )

  - name: unmarried_dependent_child_category_conditions_met
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 85, unmarried dependent children included in military/veteran category
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-85
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          lawfully_residing_in_state
          and unmarried_dependent_child_of_veteran

  - name: military_or_veteran_related_eligible_non_citizen_status
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p. 85, military/veteran related eligible non-citizen categories and non-SNAP-eligible category exclusion
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-85
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not individual_in_non_snap_eligible_category
          and (
            active_duty_military_category_conditions_met
            or honorably_discharged_veteran_category_conditions_met
            or spouse_category_conditions_met
            or surviving_spouse_category_conditions_met
            or unmarried_dependent_child_category_conditions_met
          )
