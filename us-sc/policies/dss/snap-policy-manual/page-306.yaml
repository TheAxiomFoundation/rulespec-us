format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-306
  summary: |-
    The Agency must verify the eligible status of applicant non-citizens. The validity of these documents must also be verified in the SAVE program. Common USCIS documents used as acceptable forms of verification include I-94, I-130, I-551, I-571, I-688B, I-766, and I-797. Non-Citizen U.S. Nationals born in an outlying possession of the U.S. on or after acquisition, or whose parents are U.S. non-citizen nationals, are eligible immediately pre- and post-OBBB.
rules:
  - name: applicant_non_citizen_eligible_status_verification_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 306, applicant non-citizen verification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-306
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          applicant_is_non_citizen

  - name: common_uscis_document_acceptable_verification_form
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 306, common USCIS documents acceptable as verification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-306
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          presents_i_94_arrival_departure_record
          or presents_i_130_petition_for_alien_relative
          or presents_i_551_permanent_resident_card_or_alien_registration_receipt_card
          or presents_i_571_refugee_travel_document
          or presents_i_688b_employment_authorization_card
          or presents_i_766_employment_authorization_document
          or presents_i_797_notice_of_action

  - name: listed_uscis_document_validity_save_verification_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 306, SAVE verification for validity of these documents
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-306
          - path: versions[0].formula
            kind: import
            import:
              target: us-sc:policies/dss/snap-policy-manual/page-306#common_uscis_document_acceptable_verification_form
              output: common_uscis_document_acceptable_verification_form
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          common_uscis_document_acceptable_verification_form

  - name: non_citizen_us_national_immediately_snap_eligible
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 306, Non-Citizen U.S. Nationals eligibility row
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-306
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_born_in_outlying_possession_of_us_on_or_after_us_acquired_possession
          or person_whose_parents_are_us_non_citizen_nationals
