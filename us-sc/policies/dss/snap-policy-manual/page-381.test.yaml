- name: chip_alert_required_when_verification_missing_after_deadline
  period:
    period_kind: custom
    name: day
    start: '2024-01-31'
    end: '2024-01-31'
  input:
    us-sc:policies/dss/snap-policy-manual/page-381#input.verification_requested: true
    us-sc:policies/dss/snap-policy-manual/page-381#input.days_since_file_date: 30
    us-sc:policies/dss/snap-policy-manual/page-381#input.verification_received: false
  output:
    us-sc:policies/dss/snap-policy-manual/page-381#verification_deadline_from_file_date_days: 30
    us-sc:policies/dss/snap-policy-manual/page-381#chip_closure_alert_required: holds
- name: chip_alert_not_required_when_verification_received
  period:
    period_kind: custom
    name: day
    start: '2024-01-31'
    end: '2024-01-31'
  input:
    us-sc:policies/dss/snap-policy-manual/page-381#input.verification_requested: true
    us-sc:policies/dss/snap-policy-manual/page-381#input.days_since_file_date: 30
    us-sc:policies/dss/snap-policy-manual/page-381#input.verification_received: true
  output:
    us-sc:policies/dss/snap-policy-manual/page-381#chip_closure_alert_required: not_holds
- name: simplified_reporter_must_report_income_above_threshold
  period: 2024-01
  input:
    us-sc:policies/dss/snap-policy-manual/page-381#input.household_is_simplified_reporter: true
    us-sc:policies/dss/snap-policy-manual/page-381#input.household_income_to_poverty_ratio: 1.4
  output:
    us-sc:policies/dss/snap-policy-manual/page-381#poverty_income_reporting_threshold: 1.3
    us-sc:policies/dss/snap-policy-manual/page-381#simplified_reporter_income_change_report_required: holds
- name: simplified_reporter_does_not_report_income_at_threshold
  period: 2024-01
  input:
    us-sc:policies/dss/snap-policy-manual/page-381#input.household_is_simplified_reporter: true
    us-sc:policies/dss/snap-policy-manual/page-381#input.household_income_to_poverty_ratio: 1.3
  output:
    us-sc:policies/dss/snap-policy-manual/page-381#simplified_reporter_income_change_report_required: not_holds
