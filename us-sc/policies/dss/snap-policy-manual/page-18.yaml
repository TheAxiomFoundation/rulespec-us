format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-18
  summary: |-
    Persons directly connected with IEVS/SVES programs, SAVE verification, child support administration, Social Security eligibility verification, Comptroller General audits, law enforcement investigations or fugitive/probation/parole requests, and local educational agencies administering school meal programs may receive specified SNAP information only for the stated purposes and, where applicable, upon written request.
rules:
  - name: disclosure_allowed_for_ievs_sves_program_administration
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p.18, item B
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-18
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_directly_connected_with_administration_or_enforcement_of_ievs_sves_participating_program
          and snap_information_useful_to_establish_or_verify_eligibility_or_benefit_amounts_under_that_program

  - name: disclosure_allowed_for_save_immigration_status_verification
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p.18, item C
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-18
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_directly_connected_with_verification_of_immigration_status_of_noncitizen_snap_applicant_through_save
          and information_necessary_to_identify_individual_for_verification_purposes

  - name: disclosure_allowed_for_child_support_or_social_security_administration
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p.18, item D
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-18
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (person_directly_connected_with_administration_of_child_support_program_under_part_d_title_iv
          and disclosure_assists_in_administration_of_child_support_program)
          or (person_is_employee_of_secretary_of_health_and_human_services
          and information_necessary_to_assist_in_establishing_or_verifying_eligibility_or_benefits_under_titles_ii_and_xvi)

  - name: disclosure_allowed_for_comptroller_general_audit
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p.18, item E
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-18
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_employee_of_comptroller_general_office_of_united_states
          and audit_examination_authorized_by_law

  - name: disclosure_allowed_for_food_and_nutrition_act_violation_investigation
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p.18, item F
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-18
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_local_state_or_federal_law_enforcement_official
          and written_request_made_for_investigating_alleged_food_and_nutrition_act_or_regulation_violation
          and written_request_includes_requester_identity_and_authority
          and written_request_includes_violation_being_investigated
          and written_request_includes_identity_of_person_on_whom_information_requested

  - name: disclosure_allowed_for_fugitive_probation_or_parole_law_enforcement_request
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p.18, item G
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-18
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_local_state_or_federal_law_enforcement_officer_acting_in_official_capacity
          and written_request_made_to_obtain_address_social_security_number_and_available_photograph_of_household_member
          and (household_member_is_fleeing_to_avoid_prosecution_or_custody_for_felony_or_attempted_felony
          or household_member_is_violating_condition_of_probation_or_parole_under_federal_or_state_law)

  - name: disclosure_limited_to_information_necessary_for_specific_law_enforcement_request
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p.18, item G note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-18
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          disclosure_information_is_necessary_to_comply_with_specific_written_law_enforcement_request_authorized_by_item_g

  - name: disclosure_allowed_for_apprehension_or_investigation_assistance_request
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p.18, item G note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-18
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          law_enforcement_officer_acting_in_official_capacity_makes_written_request
          and household_member_has_information_necessary_for_apprehension_or_investigation_of_another_member
          and (another_member_is_fleeing_to_avoid_prosecution_or_custody_for_felony
          or another_member_has_violated_condition_of_probation_or_parole)

  - name: photographic_identification_not_required_as_condition_of_snap_eligibility
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual p.18, item G note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-18
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          true

  - name: disclosure_allowed_for_school_meal_direct_certification
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual p.18, item H
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-18
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_local_educational_agency_administering_national_school_lunch_or_school_breakfast_program
          and disclosure_purpose_is_directly_certifying_school_aged_children_for_free_meals
