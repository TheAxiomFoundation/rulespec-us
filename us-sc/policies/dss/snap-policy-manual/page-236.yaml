    source: SNAP Manual, Chapter 19, Section 19.1, page 236
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-236
              excerpt: "shelter low ... actual expenses are $0 - $497"
          - path: versions[0].formula
            kind: import
            import:
              target: us-sc:policies/dss/snap-policy-manual/page-236#shelter_low_actual_expense_minimum
              output: shelter_low_actual_expense_minimum
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-sc:policies/dss/snap-policy-manual/page-236#shelter_low_actual_expense_maximum
              output: shelter_low_actual_expense_maximum
              hash: sha256:local
    versions:
