    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if sccap_y_household:
            if representative_income == sccap_representative_income_ssi_only:
              if sccap_shelter_low_deduction_applies: sccap_benefit_ssi_only_shelter_low else: if sccap_shelter_high_deduction_applies: sccap_benefit_ssi_only_shelter_high else: 0
            else:
              if representative_income == sccap_representative_income_ssi_and_other_unearned_income:
                if sccap_shelter_low_deduction_applies: sccap_benefit_ssi_and_other_unearned_income_shelter_low else: if sccap_shelter_high_deduction_applies: sccap_benefit_ssi_and_other_unearned_income_shelter_high else: 0
              else: 0
          else: 0
