format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-236
  summary: |-
    "To be defined as a SCCAP 'Y' household, the SSI applicant must" be SSI eligible, have no earned income, and live alone or purchase and prepare meals separately if living with others, except required household combinations under Section 2.2(1). SCCAP benefit amounts are $93, $155, $84, and $146 for the stated income and shelter-low/high combinations.
rules:
  - name: sccap_y_household
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual, Chapter 19, Section 19.1, page 236
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-236
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-236
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          ssi_applicant_is_ssi_eligible_individual
          and ssi_applicant_has_no_earned_income
          and (ssi_applicant_lives_alone or ssi_applicant_purchases_and_prepares_meals_separately_if_living_with_others)
          and not ssi_applicant_must_be_in_required_household_combination_under_section_2_2_1

  - name: sccap_representative_income_ssi_only
    kind: parameter
    dtype: Money
    period: Month
    unit: USD
    source: SNAP Manual, Chapter 19, Section 19.1, page 236
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-236
              excerpt: "SSI only ($994)"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          994

