format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-196
  summary: |-
    Disabled or blind residents of a GLA may apply through a GLA-employed and designated authorized representative, through an authorized representative of their choice, or on their own behalf. The GLA must determine whether any resident can apply on his/her own behalf based on physical and mental ability to handle his/her own affairs. Residents applying through the GLA's authorized representative must have eligibility determined as a one-person household. The GLA must provide a monthly certified list of SNAP participants and a responsible official's signed attestation to the local county DSS office.
  deferred_outputs:
    - output: us-sc:policies/dss/snap-policy-manual/page-196#household_size_for_resident_applying_on_own_or_through_chosen_representative
      reason: The source directs household size to be handled in accordance with Section 2.1 General Household Definitions, but that cited source is not available in copied context.
rules:
  - name: gla_representative_household_size
    kind: parameter
    dtype: Count
    source: SNAP Manual page 196, processing provisions for GLAs
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-196
              excerpt: "one-person household"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1

  - name: disabled_or_blind_gla_resident_may_apply_through_gla_representative
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 196(1)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-196
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          resident_is_disabled_or_blind
          and resident_resides_in_gla
          and authorized_representative_is_employed_and_designated_by_gla

  - name: disabled_or_blind_gla_resident_may_apply_through_chosen_representative
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 196(1)(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-196
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          resident_is_disabled_or_blind
          and resident_resides_in_gla
          and authorized_representative_is_of_residents_choice

  - name: disabled_or_blind_gla_resident_can_apply_on_own_behalf
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 196(1)(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-196
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          resident_is_disabled_or_blind
          and resident_resides_in_gla
          and resident_has_physical_and_mental_ability_to_handle_own_affairs

  - name: eligibility_household_size_for_gla_representative_applicant
    kind: derived
    entity: Person
    dtype: Count
    period: Month
    source: SNAP Manual page 196(3), residents applying through GLA authorized representative
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-196
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-196
              excerpt: "one-person household"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if resident_applies_through_gla_authorized_representative: gla_representative_household_size else: 0

  - name: gla_monthly_certified_list_provided
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 196(3)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-196
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          gla_provides_local_county_dss_monthly_certified_list_of_current_snap_participants

  - name: gla_responsible_official_attestation_provided
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 196(3)(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-196
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          gla_provides_statement_signed_by_responsible_official_attesting_to_list_validity
