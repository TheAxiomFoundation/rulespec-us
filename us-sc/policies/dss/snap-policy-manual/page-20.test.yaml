- name: applicant participant protected in SNAP administration
  period: 2026-05
  input:
    us-sc:policies/dss/snap-policy-manual/page-20#input.person_is_snap_applicant_or_participant: true
    us-sc:policies/dss/snap-policy-manual/page-20#input.snap_administration_action_is_at_issue: true
    ? us-sc:policies/dss/snap-policy-manual/page-20#input.action_is_for_age_race_color_sex_disability_religious_creed_national_origin_or_political_beliefs
    : true
  output:
    us-sc:policies/dss/snap-policy-manual/page-20#applicant_or_participant_nondiscrimination_protection: holds
- name: no protection output when person is not applicant or participant
  period: 2026-05
  input:
    us-sc:policies/dss/snap-policy-manual/page-20#input.person_is_snap_applicant_or_participant: false
    us-sc:policies/dss/snap-policy-manual/page-20#input.snap_administration_action_is_at_issue: true
    ? us-sc:policies/dss/snap-policy-manual/page-20#input.action_is_for_age_race_color_sex_disability_religious_creed_national_origin_or_political_beliefs
    : true
  output:
    us-sc:policies/dss/snap-policy-manual/page-20#applicant_or_participant_nondiscrimination_protection: not_holds
- name: oral discrimination complaint may be filed and documented
  period: 2026-05
  input:
    us-sc:policies/dss/snap-policy-manual/page-20#input.individual_believes_subject_to_snap_discrimination: true
    us-sc:policies/dss/snap-policy-manual/page-20#input.complaint_is_written: false
    us-sc:policies/dss/snap-policy-manual/page-20#input.complaint_is_oral: true
    us-sc:policies/dss/snap-policy-manual/page-20#input.complainant_makes_discrimination_allegations_verbally: true
    us-sc:policies/dss/snap-policy-manual/page-20#input.complainant_is_unable_or_reluctant_to_put_allegations_in_writing: true
    us-sc:policies/dss/snap-policy-manual/page-20#input.agency_employee_documents_complaint_in_writing: true
  output:
    us-sc:policies/dss/snap-policy-manual/page-20#discrimination_complaint_may_be_filed: holds
    us-sc:policies/dss/snap-policy-manual/page-20#verbal_discrimination_complaint_must_be_documented: holds
- name: applicant household informed of rights and responsibilities
  period: 2026-05
  input:
    us-sc:policies/dss/snap-policy-manual/page-20#input.household_is_snap_applicant_or_participant: true
    us-sc:policies/dss/snap-policy-manual/page-20#input.household_is_informed_of_snap_rights_and_responsibilities: true
  output:
    us-sc:policies/dss/snap-policy-manual/page-20#household_rights_and_responsibilities_information_requirement_satisfied: holds
