format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-75
  summary: Households certified on an expedited basis with all necessary verification
    before certification "will be assigned normal certification periods." If verification
    was postponed, households applying "on or before the 15th of the month" receive
    "a one-month certification period"; households applying "after the 15th of the
    month" receive "a two-month certification period or a normal certification period
    of no more than 12 months." SSN-related continued participation depends on good
    cause requirements specified in Section 7.2, with a newborn exception of "up to
    6 months."
  deferred_outputs:
  - output: us-sc:policies/dss/snap-policy-manual/page-75#continued_participation_when_required_ssn_unavailable
    reason: Continued participation for members unable to provide required SSNs before
      the second full month depends on good cause requirements specified in Section
      7.2, which is not available in the copied context.
rules:
- name: expedited_midmonth_application_day_cutoff
  kind: parameter
  dtype: Integer
  source: "SNAP Manual \xA7 6.8, application timing threshold"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-75
          excerpt: on or before the 15th of the month
  versions:
  - effective_from: '0001-01-01'
    formula: '15'
- name: postponed_verification_one_month_certification_period
  kind: parameter
  dtype: Count
  source: "SNAP Manual \xA7 6.8, postponed verification before or on cutoff"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-75
          excerpt: assign a one-month certification period
  versions:
  - effective_from: '0001-01-01'
    formula: '1'
- name: postponed_verification_two_month_certification_period
  kind: parameter
  dtype: Count
  source: "SNAP Manual \xA7 6.8, postponed verification after cutoff"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-75
          excerpt: assign a two-month certification period
  versions:
  - effective_from: '0001-01-01'
    formula: '2'
- name: postponed_verification_normal_period_maximum
  kind: parameter
  dtype: Count
  source: "SNAP Manual \xA7 6.8, maximum normal certification period after cutoff\
    \ with postponed verification"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-75
          excerpt: normal certification period of no more than 12 months
  versions:
  - effective_from: '0001-01-01'
    formula: '12'
- name: expedited_certification_period_months
  kind: derived
  entity: Household
  dtype: Count
  period: Month
  source: "SNAP Manual \xA7 6.8, certification periods for expedited households"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-75
  versions:
  - effective_from: '0001-01-01'
    formula: 'if not household_certified_on_expedited_basis: 0 else: if all_necessary_verification_provided_prior_to_certification:
      normal_certification_period_months else: if verification_was_postponed and application_day_of_month
      <= expedited_midmonth_application_day_cutoff: postponed_verification_one_month_certification_period
      else: if verification_was_postponed and application_day_of_month > expedited_midmonth_application_day_cutoff
      and agency_assigns_two_month_certification_period: postponed_verification_two_month_certification_period
      else: if verification_was_postponed and application_day_of_month > expedited_midmonth_application_day_cutoff:
      min(normal_certification_period_months, postponed_verification_normal_period_maximum)
      else: 0'
