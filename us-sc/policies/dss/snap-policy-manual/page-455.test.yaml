- name: resource unable to sell for significant return when expected return is not
    more than threshold
  period: 2026-05
  input:
    ? us-sc:policies/dss/snap-policy-manual/page-455#input.resource_is_financial_instrument_stock_bond_or_negotiable_financial_instrument
    : false
    us-sc:policies/dss/snap-policy-manual/page-455#input.household_interest_in_resource_is_relatively_slight: true
    us-sc:policies/dss/snap-policy-manual/page-455#input.costs_of_selling_household_interest_are_relatively_great: false
    ? us-sc:policies/dss/snap-policy-manual/page-455#input.sale_or_disposition_unlikely_to_produce_significant_amount_for_household_support
    : false
    us-sc:policies/dss/snap-policy-manual/page-455#input.cost_of_selling_resource_would_be_relatively_great: false
    us-sc:policies/dss/snap-policy-manual/page-455#input.estimated_return_after_sale_costs_and_household_ownership_interest: 1500
  output:
    us-sc:policies/dss/snap-policy-manual/page-455#unable_to_sell_resource_for_significant_return: holds
- name: financial instruments are not covered by unable to sell provision
  period: 2026-05
  input:
    ? us-sc:policies/dss/snap-policy-manual/page-455#input.resource_is_financial_instrument_stock_bond_or_negotiable_financial_instrument
    : true
    us-sc:policies/dss/snap-policy-manual/page-455#input.household_interest_in_resource_is_relatively_slight: true
    us-sc:policies/dss/snap-policy-manual/page-455#input.costs_of_selling_household_interest_are_relatively_great: false
    ? us-sc:policies/dss/snap-policy-manual/page-455#input.sale_or_disposition_unlikely_to_produce_significant_amount_for_household_support
    : false
    us-sc:policies/dss/snap-policy-manual/page-455#input.cost_of_selling_resource_would_be_relatively_great: false
    us-sc:policies/dss/snap-policy-manual/page-455#input.estimated_return_after_sale_costs_and_household_ownership_interest: 1000
  output:
    us-sc:policies/dss/snap-policy-manual/page-455#unable_to_sell_resource_for_significant_return: not_holds
