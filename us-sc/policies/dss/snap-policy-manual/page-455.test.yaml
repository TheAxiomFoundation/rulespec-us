- name: irrevocable trust funds inaccessible when all paragraph Y conditions hold
  period: 2026-05
  input:
    us-sc:policies/dss/snap-policy-manual/page-455#input.asset_is_funds_in_or_transferred_to_trust_or_unavailable_trust_income: true
    us-sc:policies/dss/snap-policy-manual/page-455#input.trust_arrangement_not_likely_to_cease_during_certification_period: true
    ? us-sc:policies/dss/snap-policy-manual/page-455#input.no_household_member_has_power_to_revoke_trust_arrangement_during_certification_period
    : true
    ? us-sc:policies/dss/snap-policy-manual/page-455#input.no_household_member_has_power_to_change_trust_beneficiary_during_certification_period
    : true
    ? us-sc:policies/dss/snap-policy-manual/page-455#input.trustee_is_court_or_independent_institution_corporation_or_organization
    : true
    ? us-sc:policies/dss/snap-policy-manual/page-455#input.trustee_is_court_appointed_individual_with_court_imposed_limitations_meeting_paragraph
    : false
    ? us-sc:policies/dss/snap-policy-manual/page-455#input.trust_investments_do_not_directly_involve_or_assist_household_member_controlled_business_or_corporation
    : true
    us-sc:policies/dss/snap-policy-manual/page-455#input.trust_established_from_household_own_funds: true
    ? us-sc:policies/dss/snap-policy-manual/page-455#input.trustee_uses_funds_solely_for_trust_investments_or_named_person_education_or_medical_expenses
    : true
    us-sc:policies/dss/snap-policy-manual/page-455#input.trust_established_from_non_household_funds_by_non_household_member: false
  output:
    us-sc:policies/dss/snap-policy-manual/page-455#irrevocable_trust_funds_inaccessible_to_household: holds
