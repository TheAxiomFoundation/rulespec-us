  summary: |-
    The Fair Hearing Committee has final decision making power in fair hearings; decisions must comply with federal law and regulations, be based on the hearing record, bind the county office, and be retained in the case file for three years. The household, Economic Services worker, and Economic Services supervisor must be notified in writing of the decision and reasons. The page also defines direct, indirect/circumstantial, hearsay, and irrelevant evidence, including limited hearsay exceptions.
