  summary: |-
    Section 12.1 Income Deductions/General: This section has been updated to reflect changes in income deductions for maximum excessive shelter, MUA, BUA, and the telephone allowance, effective October 1, 2016.
    Section 12.5 (2) (B) Utility Allowances: This section has been updated to clarify that a change in the household’s residence or address would not affect the household entitlement to the MUA if the household received a LIHEAP payment over $20 in the current or preceding 12 months.
    Volume 32 March 2017 ... 8.14 ABAWD Work Requirement: This section has been updated to clarify the meaning of work and to define an established volunteer work site.
