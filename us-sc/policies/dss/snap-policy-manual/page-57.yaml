format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-57
  summary: |-
    Households are required to submit USCIS documentation for each non-citizen applying for SNAP benefits as a condition of eligibility. The Agency must verify the eligible immigration status of applicant non-citizens through SAVE. If a non-citizen does not wish the Agency to contact USCIS, the Agency must give the household the option of withdrawing its application or participating without that member. The Agency must accept participation in another program as acceptable verification if verification of citizenship or non-citizen national status was obtained for that program. A non-citizen is ineligible until acceptable documentation is provided unless the Agency has submitted a copy of a document provided by the household to USCIS for verification; pending such verification, the Agency cannot delay, deny, reduce or terminate the individual's eligibility for benefits on the basis of immigration status.
rules:
  - name: other_program_participation_is_acceptable_status_verification
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 57, Non-citizen eligibility
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-57
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_participates_in_another_program
          and citizenship_or_noncitizen_national_status_verification_was_obtained_for_that_program

  - name: applicant_noncitizen_required_documentation_condition_met
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 57, Non-citizen eligibility
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-57
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_not_applicant_noncitizen
          or household_submitted_uscis_documentation_for_person
          or other_program_participation_is_acceptable_status_verification

  - name: agency_may_contact_uscis_for_person
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 57, Non-citizen eligibility
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-57
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_not_applicant_noncitizen
          or noncitizen_does_not_object_to_agency_contacting_uscis

  - name: applicant_noncitizen_immigration_status_pending_verification
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 57, Non-citizen eligibility
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-57
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_applicant_noncitizen
          and agency_submitted_household_document_copy_to_uscis_for_verification
          and uscis_verification_is_pending

  - name: applicant_noncitizen_immigration_status_documentation_sufficient
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 57, Non-citizen eligibility
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-57
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          acceptable_immigration_status_documentation_provided
          or applicant_noncitizen_immigration_status_pending_verification

  - name: applicant_noncitizen_not_ineligible_on_immigration_documentation_basis
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 57, Non-citizen eligibility
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-57
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_not_applicant_noncitizen
          or applicant_noncitizen_immigration_status_documentation_sufficient
