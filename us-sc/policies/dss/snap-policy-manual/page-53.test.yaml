    : holds
    us-sc:policies/dss/snap-policy-manual/page-53#primary_informant_identity_verification_required_prior_to_certification: holds
    us-sc:policies/dss/snap-policy-manual/page-53#residency_verification_required_prior_to_certification: holds
- name: unusual_case_blocks_residency_verification_requirement
  period:
    period_kind: custom
    name: day
    start: '2026-05-30'
    end: '2026-05-30'
  input:
    us-sc:policies/dss/snap-policy-manual/page-53#input.household_initially_applying_for_snap: true
    us-sc:policies/dss/snap-policy-manual/page-53#input.authorized_representative_applies_on_behalf_of_household: false
    ? us-sc:policies/dss/snap-policy-manual/page-53#input.unusual_case_where_residency_verification_cannot_reasonably_be_accomplished
    : true
    us-sc:policies/dss/snap-policy-manual/page-53#input.document_reasonably_establishes_applicant_identity: true
  output:
    ? us-sc:policies/dss/snap-policy-manual/page-53#authorized_representative_identity_verification_required_prior_to_certification
    : not_holds
    us-sc:policies/dss/snap-policy-manual/page-53#primary_informant_identity_verification_required_prior_to_certification: not_holds
    us-sc:policies/dss/snap-policy-manual/page-53#residency_verification_required_prior_to_certification: not_holds
