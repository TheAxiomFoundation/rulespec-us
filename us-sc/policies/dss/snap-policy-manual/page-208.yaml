format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-208
  summary: '"An individual who works a minimum of 30 hours per week or earns the weekly
    wages at least equal to the Federal minimum wage multiplied by 30 hours is required
    to report if his or her work hours falls below 20 hours per week." "The household
    must report the reduction in work hours by the tenth day of the month following
    the month of the change." Simplified reporting households are not required to
    report interim changes unless gross income exceeds 130% of poverty, an ABAWD''s
    work hours fall below 20 hours per week, or a household member wins substantial
    lottery or gambling winnings ($4500 or more). The Agency must act on specified
    verified-upon-receipt changes and specified household-reported interim changes.'
  deferred_outputs:
  - output: us-sc:policies/dss/snap-policy-manual/page-208#household_reported_voluntary_case_closure_requires_action
    reason: The source requires action when the household voluntarily requests case
      closure "in accordance with Section 16.2 Exemptions from Notice (K)," but that
      cited Section 16.2 source is not available in the copied context.
rules:
- name: full_time_weekly_hours_reporting_threshold
  kind: parameter
  dtype: Integer
  source: SNAP Manual page 208 note
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-208
          excerpt: minimum of 30 hours per week
  versions:
  - effective_from: '0001-01-01'
    formula: '30'
- name: abawd_reduced_work_hours_reporting_threshold
  kind: parameter
  dtype: Integer
  source: SNAP Manual page 208 note and Section 15.4(2)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-208
          excerpt: work hours falls below 20 hours per week
  versions:
  - effective_from: '0001-01-01'
    formula: '20'
- name: report_due_day_of_following_month
  kind: parameter
  dtype: Integer
  source: SNAP Manual page 208 note
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-208
          excerpt: by the tenth day of the month following the month of the change
  versions:
  - effective_from: '0001-01-01'
    formula: '10'
- name: work_hours_reduction_must_be_reported
  kind: derived
  entity: Person
  dtype: Judgment
  period: Week
  source: SNAP Manual page 208 note
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-208
      - path: versions[0].formula
        kind: import
        import:
          target: us-sc:policies/dss/snap-policy-manual/page-208#full_time_weekly_hours_reporting_threshold
          output: full_time_weekly_hours_reporting_threshold
          hash: sha256:local
      - path: versions[0].formula
        kind: import
        import:
          target: us-sc:policies/dss/snap-policy-manual/page-208#abawd_reduced_work_hours_reporting_threshold
          output: abawd_reduced_work_hours_reporting_threshold
          hash: sha256:local
  versions:
  - effective_from: '0001-01-01'
    formula: "(\n  usual_weekly_work_hours >= full_time_weekly_hours_reporting_threshold\n\
      \  or weekly_wages >= federal_minimum_wage * full_time_weekly_hours_reporting_threshold\n\
      )\nand current_weekly_work_hours < abawd_reduced_work_hours_reporting_threshold"
- name: abawd_work_hour_reduction_reported_by_required_deadline
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: SNAP Manual page 208 note
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-208
      - path: versions[0].formula
        kind: import
        import:
          target: us-sc:policies/dss/snap-policy-manual/page-208#work_hours_reduction_must_be_reported
          output: work_hours_reduction_must_be_reported
          hash: sha256:local
      - path: versions[0].formula
        kind: import
        import:
          target: us-sc:policies/dss/snap-policy-manual/page-208#report_due_day_of_following_month
          output: report_due_day_of_following_month
          hash: sha256:local
  versions:
  - effective_from: '0001-01-01'
    formula: 'not work_hours_reduction_must_be_reported

      or report_day_of_month_following_change <= report_due_day_of_following_month'
- name: abawd_month_is_countable
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: SNAP Manual page 208 note
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-208
  versions:
  - effective_from: '0001-01-01'
    formula: 'received_full_month_of_benefits

      and not fulfilling_abawd_work_requirement

      and not otherwise_exempt_from_abawd_work_requirement'
- name: simplified_reporting_household_must_report_interim_change
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: SNAP Manual Section 15.4(2)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-208
      - path: versions[0].formula
        kind: import
        import:
          target: us-sc:policies/dss/snap-policy-manual/page-207#gross_income_poverty_reporting_threshold_rate
          output: gross_income_poverty_reporting_threshold_rate
          hash: sha256:4e346b27edfa0e066d513abf4b480c76ac57a3b1b9c3856ac75ca3e139078837
      - path: versions[0].formula
        kind: import
        import:
          target: us-sc:policies/dss/snap-policy-manual/page-208#abawd_reduced_work_hours_reporting_threshold
          output: abawd_reduced_work_hours_reporting_threshold
          hash: sha256:local
      - path: versions[0].formula
        kind: import
        import:
          target: us-sc:policies/dss/snap-policy-manual/page-207#substantial_lottery_or_gambling_winnings_threshold
          output: substantial_lottery_or_gambling_winnings_threshold
          hash: sha256:4e346b27edfa0e066d513abf4b480c76ac57a3b1b9c3856ac75ca3e139078837
  versions:
  - effective_from: '0001-01-01'
    formula: "household_gross_income > gross_income_poverty_reporting_threshold_rate\
      \ * poverty_guideline\nor (\n  household_has_abawd_member\n  and abawd_member_weekly_work_hours\
      \ < abawd_reduced_work_hours_reporting_threshold\n)\nor lottery_or_gambling_winnings\
      \ >= substantial_lottery_or_gambling_winnings_threshold"
- name: verified_upon_receipt_interim_change_requires_action
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: SNAP Manual Section 15.4(1)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-208
  versions:
  - effective_from: '0001-01-01'
    formula: "bendex_information_on_ievs_received\nor sdx_information_on_ievs_received\n\
      or child_support_income_change_received_through_pacss_chip_interface\nor (\n\
      \  tanf_change_reported\n  and tanf_change_results_in_tanf_benefit_amount_change\n\
      )\nor employment_verification_received_from_et"
- name: household_reported_interim_change_requires_action
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: SNAP Manual Section 15.4(2)(A)-(C), (E)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-208
  versions:
  - effective_from: '0001-01-01'
    formula: 'reported_member_moved_from_one_snap_household_to_another

      or reported_death_of_household_member

      or reported_member_relocated_out_of_state

      or reported_member_removed_by_scdss_cws_or_aps'
imports:
- us-sc:policies/dss/snap-policy-manual/page-207#gross_income_poverty_reporting_threshold_rate
- us-sc:policies/dss/snap-policy-manual/page-207#substantial_lottery_or_gambling_winnings_threshold
