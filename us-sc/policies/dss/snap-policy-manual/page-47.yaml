format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-47
  summary: |-
    SCDSS will verify that each member receives TANF or SSI benefits and that the household includes no individuals disqualified under Section 4.2 or 4.3. SCDSS may temporarily postpone SNAP eligibility determination within the 30-day processing standard for non-expedited households that appear categorically eligible, and will postpone denial of a potentially categorically eligible household until the 30th day. For a joint SNAP and TANF or SSI application denied for SNAP but later determined eligible for TANF or SSI and otherwise categorically eligible, SCDSS will provide SNAP benefits using the original application and pay benefits from the later of the TANF or SSI benefit period beginning or the original SNAP application date.
rules:
  - name: recipient_tanf_or_ssi_categorical_status
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 47, categorical eligibility verification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-47
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          each_member_receives_tanf_or_ssi_benefits
          and not household_includes_individual_disqualified_under_section_4_2
          and not household_includes_individual_disqualified_under_section_4_3

  - name: household_composition_verification_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 47, household composition verification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-47
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_composition_is_questionable

  - name: categorical_eligibility_determination_may_be_temporarily_postponed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 47, temporary postponement of determination
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-47
              excerpt: "within the 30-day processing standard"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_not_entitled_to_expedited_service
          and household_appears_categorically_eligible
          and eligibility_determination_is_within_processing_standard

  - name: potentially_categorically_eligible_denial_postponed_until_processing_deadline
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 47, postponing denial
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-47
              excerpt: "until the 30th day"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_potentially_categorically_eligible
          and processing_standard_deadline_has_not_passed

  - name: original_application_used_for_later_snap_benefits
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 47, later TANF or SSI eligibility after SNAP denial
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-47
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_filed_joint_snap_and_tanf_or_ssi_application_or_has_pending_tanf_or_ssi_application
          and household_was_denied_snap_benefits
          and household_later_determined_eligible_to_receive_tanf_or_ssi_benefits
          and household_otherwise_categorically_eligible

  - name: snap_benefit_start_is_original_application_date
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: SNAP Manual page 47, benefit start date rule
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: ordering
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-47
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_qualifies_for_later_snap_benefits_using_original_application
          and day_is_original_snap_application_date
          and original_snap_application_date_is_later_than_tanf_or_ssi_benefit_period_beginning

  - name: snap_benefit_start_is_tanf_or_ssi_benefit_period_beginning
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: SNAP Manual page 47, benefit start date rule
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: ordering
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-47
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_qualifies_for_later_snap_benefits_using_original_application
          and day_is_beginning_of_tanf_or_ssi_benefit_period
          and not original_snap_application_date_is_later_than_tanf_or_ssi_benefit_period_beginning

  - name: public_institution_resident_may_apply_jointly_before_release
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Manual page 47, public institution exception
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-47
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_resident_of_public_institution
          and person_applies_jointly_for_ssi_and_snap_prior_to_release

  - name: denied_joint_tanf_or_ssi_snap_application_no_new_snap_application_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Manual page 47, no new SNAP application after TANF or SSI denial
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-sc/manual/dss/snap-policy-manual/page-47
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_filed_joint_snap_and_tanf_or_ssi_application
          and household_tanf_or_ssi_application_denied
