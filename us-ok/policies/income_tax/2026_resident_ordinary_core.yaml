              excerpt: "in the case of individuals who use the standard deduction"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if ok_2026_itemizes:
            ok_2026_resident_itemized_deduction
          else:
