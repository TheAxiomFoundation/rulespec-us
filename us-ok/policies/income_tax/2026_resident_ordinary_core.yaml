            else:
              if filing_status == 4:
                ok_2026_individual_contribution_deduction_cap
              else:
                ok_2026_individual_contribution_deduction_cap,
            max(0, ok_2026_oklahoma_college_savings_contributions_made_during_tax_year)
            + max(0, ok_2026_oklahoma_college_savings_contributions_made_by_statutory_succeeding_year_deadline_for_tax_year)
          )

