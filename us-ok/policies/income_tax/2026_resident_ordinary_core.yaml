format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_paths:
      - us-ok/statute/68-2353
      - us-ok/statute/68-2355
      - us-ok/statute/68-2357
      - us-ok/statute/68-2357-43
      - us-ok/statute/68-2358
      - us-ok/statute/68-2358v3
      - us-ok/statute/68-2358-5
      - us-ok/statute/68-2358-5-1
      - us-ok/statute/68-2361
    upstream_source_check:
      status: checked_higher_authority
      checked_paths:
        - us-ok/statute/68-2353
        - us-ok/statute/68-2355
        - us-ok/statute/68-2357
        - us-ok/statute/68-2357-43
        - us-ok/statute/68-2358
        - us-ok/statute/68-2358v3
        - us-ok/statute/68-2358-5
        - us-ok/statute/68-2358-5-1
        - us-ok/statute/68-2361
      rationale: |-
        The pinned official Title 68 corpus contains the enacted tax-year-2026
        filing-status schedules and the resident base, deduction, exemption,
        other-state-credit, and refundable earned-income-credit statutes. The
        section 2358 parent lists three 2024 session-law versions. The official
        codification identifies section 2358v3 as the latest version, enacted
        by SB 2038 with an emergency effective date of June 14, 2024, and the
        pinned source contains no later amendment displacing it for tax year
        2026. The pinned corpus classifies sections 2358v1 and 2358v2 as
        superseded and section 2358v3 as operative after a narrow,
        source-reviewed Oklahoma version-status correction. This module
        therefore uses v3 as the operative text without an extraction-status
        exception.
        The corpus contains no tax-year-2026 Form 511 or annual instructions,
        so the module does not claim the unpinned final-return ordering or a
        complete section 2358 adjustment inventory.

        The supported boundary is a full-year resident individual who is not
        claimable as another taxpayer's dependent; has no married-separate
        spouse exemption; has no negative federal adjusted gross income; and
        has none of the deferred pass-through, net-operating-loss, capital-gain,
        depreciation, carryforward, recapture, agricultural, business, or
        specialty-credit facts. Every accepted monetary input is a named
        federal output or an income, tax-payment, contribution, expense, age,
        disability, dependent, or service fact. No completed Oklahoma adjusted
        gross income, taxable income, deduction, exemption, credit, schedule
        parameter, or tax amount is accepted.
  summary: |-
    Source-certified Oklahoma tax-year-2026 ordinary full-year resident core.
    It constructs a partial Oklahoma adjusted-gross-income stage from federal
    adjusted gross income and ordinary governmental-obligation interest facts;
    computes fixed standard or capped itemized deductions, personal, blind,
    and age exemptions, and selected per-individual retirement, military,
    Social Security, federal-civil-service-in-lieu-of-Social-Security,
    organ-donor, foster-care, college-savings, and ABLE deductions from raw
    facts; applies both enacted 2026 filing-status schedules; applies the
    section 2357 other-state personal-services credit; and applies the
    refundable five-percent earned-income credit using the federal EITC output
    computed under the statute's frozen 2020 federal requirements.

    The taxable-income output is explicitly before any unpinned annual-return
    zero-floor convention. The terminal output is liability after only the two
    encoded credits and is not final Oklahoma income-tax liability.
  deferred_outputs:
    - output: us-ok:policies/income_tax/2026_resident_ordinary_core#ok_2026_resident_adjusted_gross_income
      reason: |-
        Complete Oklahoma adjusted gross income requires current application
        of section 2358 net-operating-loss, pass-through-entity, depreciation,
        agricultural, recapture, and other specialty adjustments not encoded
        from raw facts in this ordinary core.
    - output: us-ok:policies/income_tax/2026_resident_ordinary_core#ok_2026_resident_taxable_income
      reason: |-
        Complete taxable income additionally requires the unpinned 2026 annual
        return's zero-floor and ordering conventions, surviving-spouse age
        exemption treatment, carryforward and withdrawal adjustments, capital
        gain qualification, and all specialty deductions.
    - output: us-ok:policies/income_tax/2026_resident_ordinary_core#ok_2026_resident_income_tax_after_all_nonrefundable_credits
      reason: |-
        The pinned statutes contain child/dependent, adoption, caregiver,
        firefighter, volunteer, rehabilitation, education, business, and many
        other nonrefundable credits whose complete applicability and Form 511
        ordering are outside this ordinary core.
    - output: us-ok:policies/income_tax/2026_resident_ordinary_core#ok_2026_resident_net_income_tax_liability
      reason: |-
        Final liability requires every applicable refundable and
        nonrefundable credit plus the official 2026 annual-return ordering.
        This module encodes only the other-state credit and refundable EITC.
