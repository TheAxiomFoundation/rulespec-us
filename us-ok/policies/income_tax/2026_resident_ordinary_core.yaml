        effective_to: '2026-12-31'
        formula: |-
          if ok_2026_total_qualifying_foster_care_months < ok_2026_foster_care_minimum_qualifying_months:
            0
          else:
            (
              if ok_2026_current_tax_year_foster_care_months < ok_2026_foster_care_minimum_qualifying_months:
                ok_2026_foster_care_annual_deduction
                * max(0, ok_2026_current_tax_year_foster_care_months)
                / ok_2026_months_per_year
              else:
                ok_2026_foster_care_annual_deduction
            )
            * (if filing_status == 2: ok_2026_married_filing_separately_foster_care_share else: 1)

  - name: ok_2026_resident_college_savings_deduction
    kind: derived
    entity: TaxUnit
    dtype: Money
    unit: USD
    period: Year
    source: 68 O.S. § 2358(E)(16), tax-year-attributable contributions through the succeeding-year deadline under the no-carryforward/no-withdrawal scope
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ok/statute/68-2358v3
              excerpt: "each taxpayer shall be allowed a deduction for contributions to accounts established pursuant to the Oklahoma College Savings Plan Act"
          - path: versions[0].formula
            kind: effective_period
            source:
              corpus_citation_path: us-ok/statute/68-2358v3
              excerpt: "deductions may be taken for contributions and rollovers made during a taxable year and up to April 15 of the succeeding year"
