  - name: ok_2026_resident_itemized_deduction
    kind: derived
    entity: TaxUnit
    dtype: Money
    unit: USD
    period: Year
    source: 68 O.S. § 2358(E)(3)(b) and (E)(23), federal itemized deductions excluding SALT with charity and medical outside the cap
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ok/statute/68-2358v3
              excerpt: "charitable contributions and medical expenses deductible for federal income tax purposes shall be excluded from the amount of Seventeen Thousand Dollars"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ok/statute/68-2358v3
              excerpt: "taxable income shall be increased by any amount of state and local sales or income taxes deducted"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          max(0, ok_2026_federal_charitable_contributions_in_itemized_deductions)
          + max(0, ok_2026_federal_medical_expenses_in_itemized_deductions)
          + min(
              ok_2026_capped_itemized_deduction_amount,
              max(
                0,
                ok_2026_federal_itemized_deductions
                - max(0, ok_2026_federal_charitable_contributions_in_itemized_deductions)
                - max(0, ok_2026_federal_medical_expenses_in_itemized_deductions)
                - max(0, ok_2026_state_and_local_sales_or_income_taxes_in_federal_itemized_deductions)
              )
            )

