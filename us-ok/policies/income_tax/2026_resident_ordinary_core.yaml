  - name: ok_2026_resident_schedule_taxable_income_core
    kind: derived
    entity: TaxUnit
    dtype: Money
    unit: USD
    period: Year
    source: 68 O.S. § 2355(D), nonnegative amount to which the zero-first-band schedule is applied
    metadata:
