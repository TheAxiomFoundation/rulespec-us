              corpus_citation_path: us-ok/statute/68-2357
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: max(0, ok_2026_resident_income_tax_before_credits_core - ok_2026_resident_other_state_personal_services_credit)

  - name: ok_2026_resident_credit_proration_ratio_core
    kind: derived
    entity: TaxUnit
    dtype: Rate
    period: Year
    source: 68 O.S. § 2357.43, Oklahoma-AGI to federal-AGI ratio for maximum EITC
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ok/statute/68-2357-43
              excerpt: "prorated on the ratio that Oklahoma adjusted gross income bears to the federal adjusted gross income"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
