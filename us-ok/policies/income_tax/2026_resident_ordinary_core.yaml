          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ok/statute/68-2353
              excerpt: "\"Oklahoma adjusted gross income\" means \"adjusted gross income\" as reported to the federal government"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ok/statute/68-2358v3
              excerpt: "There shall be added interest income on obligations of any state or political subdivision"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ok/statute/68-2358-5
              excerpt: "shall be exempt from Oklahoma income taxation"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          ok_2026_federal_adjusted_gross_income
          + max(0, ok_2026_non_oklahoma_state_obligation_interest_excluded_federally)
          - max(0, ok_2026_us_obligation_interest_in_federal_agi)
          - max(0, ok_2026_oklahoma_government_obligation_interest_in_federal_agi)

