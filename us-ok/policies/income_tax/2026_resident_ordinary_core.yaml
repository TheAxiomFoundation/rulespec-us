  - name: ok_2026_resident_age_exemptions
    kind: derived
    entity: TaxUnit
    dtype: Money
    unit: USD
    period: Year
    source: 68 O.S. § 2358(E)(1)(c), age-65 exemptions subject to filing-status federal-AGI limits
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ok/statute/68-2358v3
              excerpt: "sixty-five (65) years of age or older at the close of the tax year based upon the filing status and federal adjusted gross income"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ok/statute/68-2358v3
              excerpt: "conversion of a traditional individual retirement account to a Roth individual retirement account shall be excluded"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if filing_status <= 3
             and ok_2026_federal_adjusted_gross_income - max(0, ok_2026_roth_conversion_income_in_federal_agi)
                 <= ok_2026_age_exemption_income_threshold[filing_status]:
            ok_2026_additional_exemption_amount * max(0, ok_2026_age_65_taxpayer_and_spouse_count)
          else:
            0

  - name: ok_2026_resident_retirement_deduction
    kind: derived
    entity: TaxUnit
    dtype: Money
    unit: USD
    period: Year
    source: 68 O.S. § 2358(E)(8), (13), and (17), per-individual capped public/other retirement plus full military retirement
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ok/statute/68-2358v3
              excerpt: "combined total exemption pursuant to this paragraph and paragraph 8 of this subsection"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ok/statute/68-2358v3
              excerpt: "For tax year 2022 and subsequent tax years, retirement benefits received by an individual from any component of the Armed Forces of the United States shall be exempt"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          min(
            ok_2026_retirement_exemption_cap,
            max(0, ok_2026_taxpayer_enumerated_public_retirement_benefits_in_federal_agi)
            + max(0, ok_2026_taxpayer_other_qualifying_retirement_benefits_in_federal_agi)
          )
          + ok_2026_spouse_retirement_exemption_eligibility[filing_status]
            * min(
                ok_2026_retirement_exemption_cap,
                max(0, ok_2026_spouse_enumerated_public_retirement_benefits_in_federal_agi)
                + max(0, ok_2026_spouse_other_qualifying_retirement_benefits_in_federal_agi)
            )
          + max(0, ok_2026_military_retirement_benefits_in_federal_agi)

  - name: ok_2026_resident_federal_civil_service_in_lieu_social_security_deduction
