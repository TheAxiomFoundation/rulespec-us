              / ok_2026_federal_adjusted_gross_income
            )
          else:
            ok_2026_full_credit_proration_ratio

  - name: ok_2026_resident_refundable_earned_income_credit_core
    kind: derived
    entity: TaxUnit
    dtype: Money
    unit: USD
    period: Year
    source: 68 O.S. § 2357.43, five percent of federal EITC under frozen 2020 requirements, prorated and refundable
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ok/statute/68-2357-43
