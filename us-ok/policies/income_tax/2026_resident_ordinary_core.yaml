  - name: ok_2026_resident_adjusted_gross_income_core
    kind: derived
    entity: TaxUnit
    dtype: Money
    unit: USD
    period: Year
    source: 68 O.S. §§ 2353(13), 2358(A)(1)-(2), and 2358.5, encoded ordinary interest modifications
    metadata:
      proof:
