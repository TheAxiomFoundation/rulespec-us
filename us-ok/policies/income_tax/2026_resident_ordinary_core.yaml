  - name: ok_2026_resident_foster_care_deduction
    kind: derived
    entity: TaxUnit
    dtype: Money
    unit: USD
    period: Year
    source: 68 O.S. § 2358.5-1, annual or monthly-prorated foster-care deduction with MFS half
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ok/statute/68-2358-5-1
              excerpt: "monthly pro rata share of the annual Five Thousand Dollars ($5,000.00) deduction"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ok/statute/68-2358-5-1
              excerpt: "married persons filing separately"
    versions:
