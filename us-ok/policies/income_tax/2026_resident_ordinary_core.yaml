  - name: ok_2026_resident_income_tax_before_credits_core
    kind: derived
    entity: TaxUnit
    dtype: Money
    unit: USD
    period: Year
    source: 68 O.S. § 2355(D), enacted 2026 schedule before credits
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ok/statute/68-2355
              excerpt: "For tax year 2026"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ok/statute/68-2355
              excerpt: "heads of households as defined in the Internal Revenue Code of 1986, as amended"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if filing_status == 1 or filing_status == 3 or filing_status == 4:
            ok_2026_second_bracket_rate
            * min(
                max(0, ok_2026_resident_schedule_taxable_income_core - ok_2026_wide_zero_bracket_ceiling),
                ok_2026_wide_second_bracket_width
              )
            + ok_2026_third_bracket_rate
            * min(
                max(
                  0,
                  ok_2026_resident_schedule_taxable_income_core
                  - ok_2026_wide_zero_bracket_ceiling
                  - ok_2026_wide_second_bracket_width
                ),
                ok_2026_wide_third_bracket_width
              )
            + ok_2026_top_bracket_rate
            * max(
                0,
                ok_2026_resident_schedule_taxable_income_core
                - ok_2026_wide_zero_bracket_ceiling
                - ok_2026_wide_second_bracket_width
                - ok_2026_wide_third_bracket_width
              )
          else:
            ok_2026_second_bracket_rate
            * min(
                max(0, ok_2026_resident_schedule_taxable_income_core - ok_2026_other_zero_bracket_ceiling),
                ok_2026_other_second_bracket_width
              )
            + ok_2026_third_bracket_rate
            * min(
                max(
                  0,
                  ok_2026_resident_schedule_taxable_income_core
                  - ok_2026_other_zero_bracket_ceiling
                  - ok_2026_other_second_bracket_width
                ),
                ok_2026_other_third_bracket_width
              )
            + ok_2026_top_bracket_rate
            * max(
                0,
                ok_2026_resident_schedule_taxable_income_core
                - ok_2026_other_zero_bracket_ceiling
                - ok_2026_other_second_bracket_width
                - ok_2026_other_third_bracket_width
              )

  - name: ok_2026_resident_other_state_personal_services_credit
    kind: derived
    entity: TaxUnit
    dtype: Money
    unit: USD
    period: Year
    source: 68 O.S. § 2357(B)(1), resident credit for another state's tax on personal-services compensation
    metadata:
      proof:
        atoms:
