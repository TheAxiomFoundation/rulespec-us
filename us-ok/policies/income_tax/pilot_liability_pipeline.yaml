        effective_to: '2026-12-31'
        formula: '0.045'

  - name: ok_pit_pilot_other_zero_bracket_ceiling
    kind: parameter
    dtype: Money
    period: Year
    unit: USD
    source: 68 O.S. section 2355(D)(1)(a), single/separate zero-bracket ceiling
    metadata:
