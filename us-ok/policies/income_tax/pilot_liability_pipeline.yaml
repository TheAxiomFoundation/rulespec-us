        effective_to: '2026-12-31'
        formula: '0.035'

  - name: ok_pit_pilot_top_bracket_rate
    kind: parameter
    dtype: Rate
    period: Year
    source: 68 O.S. section 2355(D)(1)(d) and (2)(d), 2026 top-bracket rate
    metadata:
