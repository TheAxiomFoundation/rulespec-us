format: rulespec/v1
imports:
  - us-ok:policies/cms/oklahoma-medicaid-chip-bhp-eligibility-levels#oklahoma_children_separate_chip_available
  - us-ok:policies/cms/oklahoma-medicaid-chip-bhp-eligibility-levels#oklahoma_pregnant_women_chip_available
  - us:policies/cms/medicaid-chip-bhp-eligibility-levels#magi_fpl_disregard_rate
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/form/cms/medicaid-chip-bhp-eligibility-levels
  summary: |-
    Oklahoma CHIP eligibility composition applies the federal CHIP child and standard-pregnant eligibility framework to the CMS state eligibility-level outputs. It also applies the CMS CHIP FCEP SPA source for state-set coverage from conception to birth income eligibility.
rules:
  - name: oklahoma_separate_chip_child_eligibility_available
    kind: derived
    dtype: Boolean
    period: Year
    source: CMS Medicaid, CHIP and BHP Eligibility Levels table, Oklahoma row
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: custom
            source:
              corpus_citation_path: us/statute/42/1397jj/b/1
          - path: versions[0].formula
            kind: custom
            source:
              corpus_citation_path: us/statute/42/1397ll/d/2
          - path: versions[0].formula
            kind: custom
            source:
              corpus_citation_path: us/regulation/42/457/10
          - path: versions[0].formula
            kind: import
            import:
              target: us-ok:policies/cms/oklahoma-medicaid-chip-bhp-eligibility-levels#oklahoma_children_separate_chip_available
              output: oklahoma_children_separate_chip_available
              hash: sha256:785f2f4c6db4d22b107b94cedc168d274db539314fea2360780c707c0ea0f43e
    versions:
      - effective_from: '2023-12-01'
        formula: |-
          oklahoma_children_separate_chip_available
  - name: is_chip_eligible_child
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 42 USC 1397jj(b)(1), 42 USC 1397jj(c)(1), and CMS state CHIP eligibility levels
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/form/cms/medicaid-chip-bhp-eligibility-levels
              excerpt: "Children Separate CHIP"
    versions:
      - effective_from: '2023-12-01'
        formula: |-
          false
  - name: oklahoma_standard_pregnant_chip_eligibility_available
    kind: derived
    dtype: Boolean
    period: Year
    source: CMS Medicaid, CHIP and BHP Eligibility Levels table, Oklahoma row
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: import
            import:
              target: us-ok:policies/cms/oklahoma-medicaid-chip-bhp-eligibility-levels#oklahoma_pregnant_women_chip_available
              output: oklahoma_pregnant_women_chip_available
              hash: sha256:785f2f4c6db4d22b107b94cedc168d274db539314fea2360780c707c0ea0f43e
    versions:
      - effective_from: '2023-12-01'
        formula: |-
          oklahoma_pregnant_women_chip_available
  - name: is_chip_eligible_standard_pregnant_person
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 42 USC 1397ll(d)(2) and CMS state CHIP eligibility levels
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/form/cms/medicaid-chip-bhp-eligibility-levels
              excerpt: "Pregnant Women CHIP"
    versions:
      - effective_from: '2023-12-01'
        formula: |-
          false
  - name: oklahoma_fcep_eligibility_available
    kind: derived
    dtype: Boolean
    period: Year
    source: CMS CHIP FCEP SPA source, Oklahoma
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/policy/cms/chip-spa/ok/ok-cspa-05/pdf/page-3
              excerpt: "Oklahoma elects to create a standalone SCHIP program (namely Soon-To-Be-Sooners, acronym STBS) for which unborn children of families earning up to and including 185 percent of the federal poverty level."
    versions:
      - effective_from: '2003-06-01'
        formula: |-
          true
  - name: oklahoma_fcep_fpl_limit
    kind: parameter
    dtype: Rate
    period: Year
    source: CMS CHIP FCEP SPA source, Oklahoma
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/policy/cms/chip-spa/ok/ok-cspa-05/pdf/page-3
              excerpt: "Oklahoma elects to create a standalone SCHIP program (namely Soon-To-Be-Sooners, acronym STBS) for which unborn children of families earning up to and including 185 percent of the federal poverty level."
    versions:
      - effective_from: '2003-06-01'
        formula: |-
          1.85
  - name: oklahoma_fcep_effective_fpl_limit
    kind: derived
    dtype: Rate
    period: Year
    source: CMS CHIP FCEP SPA source, Oklahoma, including the MAGI 5% FPL disregard
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: import
            import:
              target: us:policies/cms/medicaid-chip-bhp-eligibility-levels#magi_fpl_disregard_rate
              output: magi_fpl_disregard_rate
              hash: sha256:ea0071602a4a4441e584a16bdbab3d8a3c36b40b7cea1151165533669423f5f5
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/regulation/42/435/603/d
              excerpt: "5 percentage points of the Federal poverty level"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/policy/cms/chip-spa/ok/ok-cspa-05/pdf/page-3
              excerpt: "Oklahoma elects to create a standalone SCHIP program (namely Soon-To-Be-Sooners, acronym STBS) for which unborn children of families earning up to and including 185 percent of the federal poverty level."
    versions:
      - effective_from: '2003-06-01'
        formula: |-
          oklahoma_fcep_fpl_limit + magi_fpl_disregard_rate
  - name: is_chip_fcep_eligible_person
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 42 USC 1397ll(f)(1), 42 CFR 457.10, and CMS CHIP FCEP SPA source for Oklahoma
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/policy/cms/chip-spa/ok/ok-cspa-05/pdf/page-3
              excerpt: "Oklahoma elects to create a standalone SCHIP program (namely Soon-To-Be-Sooners, acronym STBS) for which unborn children of families earning up to and including 185 percent of the federal poverty level."
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/1397ll/f/1
              excerpt: "through the application of sections 457.10"
    versions:
      - effective_from: '2003-06-01'
        formula: |-
          person_is_pregnant
          and not found_eligible_for_medical_assistance_under_subchapter_xix
          and medicaid_income_level <= oklahoma_fcep_effective_fpl_limit
