        kind: definition
        source:
          corpus_citation_path: us-nh/regulation/he-w-700/He-W 742.02
          excerpt: ownership and use of a well or septic system by the household shall
            be considered a verified utility expense
  versions:
  - effective_from: '2025-10-01'
    formula: 'household_non_heating_cooling_utility_expense_count

      + (if household_owns_and_uses_well: 1 else: 0)

      + (if household_owns_and_uses_septic_system: 1 else: 0)'
- name: snap_utilities_only_standard_utility_allowance_applies
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: us-nh/regulation/he-w-700/He-W 742.02(d)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-nh/regulation/he-w-700/He-W 742.02
          excerpt: incur a minimum of 2 utility expenses and do not incur heating
            or cooling expenses
      - path: versions[0].formula
        kind: import
        import:
          target: us:regulations/7-cfr/273/9/d/6/iii#limited_utility_allowance_required_minimum_utility_count
          output: limited_utility_allowance_required_minimum_utility_count
          hash: sha256:80e41b5400958b9133f1702fd5250c6982264a1680997eddd469264d36e3cf62
  versions:
  - effective_from: '2025-10-01'
    formula: 'snap_limited_utility_allowance_utility_count_including_well_or_septic
      >= limited_utility_allowance_required_minimum_utility_count

      and not household_incurs_heating_or_cooling_expenses_separately_from_rent_or_mortgage'
- name: snap_telephone_only_standard_utility_allowance_applies
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: us-nh/regulation/he-w-700/He-W 742.02(g)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-nh/regulation/he-w-700/He-W 742.02
          excerpt: only costs incurred ... are for regular household telephone or
            cell phone services
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-nh/regulation/he-w-700/He-W 742.02
          excerpt: does not have regular household telephone or cell phone service
            but incurs costs ... for phone expenses
  versions:
  - effective_from: '2025-10-01'
    formula: 'household_only_separate_shelter_cost_is_regular_telephone_or_cell_phone_service

      or household_without_regular_phone_service_incurs_separate_phone_expenses'
- name: local_snap_utility_allowance_for_shelter_costs
  kind: derived
  entity: Household
  dtype: Money
  period: Month
  unit: USD
  source: us-nh/regulation/he-w-700/He-W 742.02(a)-(g)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-nh/regulation/he-w-700/He-W 742.02
          excerpt: Heating or cooling
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-nh/regulation/he-w-700/He-W 742.02
          excerpt: Utilities only
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-nh/regulation/he-w-700/He-W 742.02
          excerpt: Electric only
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-nh/regulation/he-w-700/He-W 742.02
          excerpt: Telephone only
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-nh/regulation/he-w-700/He-W 742.02
          excerpt: Internet only
  versions:
  - effective_from: '2025-10-01'
    formula: 'if household_incurs_heating_or_cooling_expenses_separately_from_rent_or_mortgage:
      heating_or_cooling_standard_utility_allowance else: if snap_utilities_only_standard_utility_allowance_applies:
      utilities_only_standard_utility_allowance else: if household_only_separate_shelter_cost_is_electric_not_used_to_heat_or_cool:
      electric_only_standard_utility_allowance else: if household_only_separate_shelter_cost_is_internet_service:
      internet_only_standard_utility_allowance else: if snap_telephone_only_standard_utility_allowance_applies:
      telephone_only_standard_utility_allowance else: 0'
