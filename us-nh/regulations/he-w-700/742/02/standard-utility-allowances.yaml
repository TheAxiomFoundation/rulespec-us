      electric_only_standard_utility_allowance else: if household_only_separate_shelter_cost_is_internet_service:
      internet_only_standard_utility_allowance else: if snap_telephone_only_standard_utility_allowance_applies:
      telephone_only_standard_utility_allowance else: 0'
