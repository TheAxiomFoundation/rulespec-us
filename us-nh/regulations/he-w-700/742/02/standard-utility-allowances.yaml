format: rulespec/v1
imports:
- us:regulations/7-cfr/273/9/d/6/iii#limited_utility_allowance_required_minimum_utility_count
- us:regulations/7-cfr/273/9
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nh/regulation/he-w-700/He-W 742.02
  summary: 'He-W 742.02 establishes monthly SNAP standard utility allowances separate
    from rent or mortgage: heating or cooling $965, utilities only $353, electric
    only $206, telephone only $37, and internet only $50. Utilities-only applies to
    households incurring at least 2 utility expenses and no separate heating or cooling
    expense. Cellular-phone purchase costs are excluded from the telephone-only standard;
    shared-cost households receive the full appropriate standard; and well or septic
    systems count toward the 2-utility criterion. All standards except internet-only
    are updated each October 1 using the specified Northeast CPI-U change and nearest-dollar
    rounding.'
