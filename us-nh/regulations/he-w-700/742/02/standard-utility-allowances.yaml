      atoms:
      - path: versions[0].formula
        kind: definition
        source:
          corpus_citation_path: us-nh/regulation/he-w-700/He-W 742.02
          excerpt: ownership and use of a well or septic system by the household shall
            be considered a verified utility expense
  versions:
  - effective_from: '2025-10-01'
    formula: 'household_non_heating_cooling_utility_expense_count

      + (if household_owns_and_uses_well: 1 else: 0)

      + (if household_owns_and_uses_septic_system: 1 else: 0)'
