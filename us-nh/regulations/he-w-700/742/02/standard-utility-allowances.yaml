            (CPI-U) for the Northeast region, not seasonally adjusted
  versions:
  - effective_from: '2025-10-01'
    formula: '"New England CPI-U, Northeast region, not seasonally adjusted"'
- name: snap_standard_utility_allowance_october_1_updated_amount
  kind: derived
  entity: Household
  dtype: Money
  period: Month
  unit: USD
  source: us-nh/regulation/he-w-700/He-W 742.02(k)-(m)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-nh/regulation/he-w-700/He-W 742.02
          excerpt: every SUA except for the internet only SUA shall be updated for
            October 1 of each year
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-nh/regulation/he-w-700/He-W 742.02
          excerpt: average CPI percent of change in the cost of fuel and utilities
            from the previous year to the current year, using the most recent 12-month
            period available
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-nh/regulation/he-w-700/He-W 742.02
          excerpt: Rounding the SUA amount ... to the nearest whole dollar
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-nh/regulation/he-w-700/He-W 742.02
          excerpt: If the most recent CPI average percent change ... is zero, there
            shall be no change to the SUA amounts
      - path: versions[0].formula
        kind: import
        import:
          target: us-nh:regulations/he-w-700/742/02/standard-utility-allowances#snap_sua_nearest_whole_dollar_rounding_midpoint
          output: snap_sua_nearest_whole_dollar_rounding_midpoint
          hash: sha256:local
  versions:
  - effective_from: '2025-10-01'
    formula: 'if standard_utility_allowance_is_internet_only

      or most_recent_available_12_month_standard_utility_allowance_cpi_average_percent_change
      == 0:

      current_standard_utility_allowance_amount else:

      floor((current_standard_utility_allowance_amount

      * (1 + most_recent_available_12_month_standard_utility_allowance_cpi_average_percent_change))

      + snap_sua_nearest_whole_dollar_rounding_midpoint)'
