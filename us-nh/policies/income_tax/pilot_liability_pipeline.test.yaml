  input: {}
  output:
    us-nh:policies/income_tax/pilot_liability_pipeline#nh_pit_pilot_chapter_77_repealed: true
    us-nh:policies/income_tax/pilot_liability_pipeline#nh_pit_pilot_tax_imposed: false
