format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tx/manual/hhs/texas-works-handbook/c-120-supplemental-nutrition-assistance-program/block-4
  summary: |-
    Texas Works Handbook C-121.1 (Deduction Amounts, Revision 25-4), SNAP
    utility standards effective October 1, 2025: the standard utility
    allowance (SUA) is 445 dollars, the basic utility allowance (BUA) is
    400 dollars, and the telephone standard deduction is 62 dollars,
    statewide with no household-size or regional variation. The
    qualification rules live in Texas Works Handbook A-1429.3.1 (SUA),
    A-1429.3.2 (BUA), and A-1429.4 (telephone standard).
