  - name: wi_pit_2026_input_domain_is_valid
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: Fail-closed domain for raw Wisconsin resident-return facts
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source: {corpus_citation_path: us-wi/statute/71.02, excerpt: "taxable income of a natural person"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          wi_pit_2026_dependent_count >= 0
          and wi_pit_2026_qualifying_child_count_for_eitc >= 0
          and wi_pit_2026_stillbirth_count >= 0
          and wi_pit_2026_federal_taxable_social_security_benefits >= 0
          and wi_pit_2026_us_obligation_interest_in_federal_agi >= 0
          and wi_pit_2026_non_wisconsin_obligation_interest_excluded_federally >= 0
          and wi_pit_2026_tax_exempt_interest_related_expenses >= 0
          and wi_pit_2026_statutorily_exempt_wisconsin_obligation_interest >= 0
          and (
            wi_pit_2026_tax_exempt_interest_related_expenses
            + wi_pit_2026_statutorily_exempt_wisconsin_obligation_interest
            <= wi_pit_2026_non_wisconsin_obligation_interest_excluded_federally
          )
          and wi_pit_2026_qualifying_military_retirement_in_federal_agi >= 0
          and wi_pit_2026_qualifying_uniformed_services_retirement_in_federal_agi >= 0
          and wi_pit_2026_self_employed_medical_insurance_paid >= 0
          and wi_pit_2026_self_employed_medical_insurance_federal_agi_deduction >= 0
          and wi_pit_2026_aggregate_wages_unearned_and_net_business_income >= 0
          and wi_pit_2026_long_term_care_insurance_paid >= 0
          and wi_pit_2026_long_term_care_insurance_federal_agi_deduction >= 0
          and wi_pit_2026_taxpayer_earned_income >= 0
          and wi_pit_2026_taxpayer_earned_income_allocable_deductions >= 0
          and wi_pit_2026_taxpayer_disability_and_other_nontaxable_earned_income >= 0
          and wi_pit_2026_spouse_earned_income >= 0
          and wi_pit_2026_spouse_earned_income_allocable_deductions >= 0
          and wi_pit_2026_spouse_disability_and_other_nontaxable_earned_income >= 0
          and wi_pit_2026_principal_dwelling_property_tax_paid >= 0
          and wi_pit_2026_principal_dwelling_rent_paid >= 0
          and wi_pit_2026_federal_basic_earned_income_credit >= 0
          and wi_pit_2026_qualifying_transportation_expenses_paid >= 0
          and wi_pit_2026_transportation_reimbursement >= 0
          and wi_pit_2026_transportation_paid_from_able_account >= 0

  - name: wi_pit_2026_filing_status_is_valid
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: Wis. Stat. 71.06, mutually exclusive resident schedules
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source: {corpus_citation_path: us-wi/statute/71.06, excerpt: "single individuals and heads of households"}
          - path: versions[0].formula
            kind: condition
            source: {corpus_citation_path: us-wi/statute/71.06, excerpt: "For joint returns"}
          - path: versions[0].formula
            kind: condition
            source: {corpus_citation_path: us-wi/statute/71.06, excerpt: "married persons filing separately"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          (
            wi_pit_2026_filing_status_single
            or wi_pit_2026_filing_status_head_of_household
            or wi_pit_2026_filing_status_married_joint
            or wi_pit_2026_filing_status_married_separate
          )
          and not (
            wi_pit_2026_filing_status_single
            and wi_pit_2026_filing_status_head_of_household
          )
          and not (
            wi_pit_2026_filing_status_single
            and wi_pit_2026_filing_status_married_joint
          )
          and not (
            wi_pit_2026_filing_status_single
            and wi_pit_2026_filing_status_married_separate
          )
          and not (
            wi_pit_2026_filing_status_head_of_household
            and wi_pit_2026_filing_status_married_joint
          )
          and not (
            wi_pit_2026_filing_status_head_of_household
            and wi_pit_2026_filing_status_married_separate
          )
          and not (
            wi_pit_2026_filing_status_married_joint
            and wi_pit_2026_filing_status_married_separate
          )

  - name: wi_pit_2026_supported_adjusted_gross_income_profile_applies
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: Bounded full-year-resident Wisconsin adjusted-gross-income profile
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source: {corpus_citation_path: us-wi/statute/71.02, excerpt: "every natural person residing within the state"}
          - path: versions[0].formula
            kind: exception
            source: {corpus_citation_path: us-wi/statute/71.05, excerpt: "Modifications and transitional adjustments"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          wi_pit_2026_input_domain_is_valid
          and wi_pit_2026_filing_status_is_valid
          and wi_pit_2026_is_full_year_wisconsin_resident_return
          and wi_pit_2026_federal_and_wisconsin_filing_units_are_aligned
          and not wi_pit_2026_has_other_section_7105_addition_or_subtraction
          and not wi_pit_2026_has_capital_gain_or_farm_modification
          and not wi_pit_2026_has_disability_income_subtraction
          and not wi_pit_2026_has_adoption_or_education_subtraction
          and not wi_pit_2026_has_529_able_or_homebuyer_adjustment
          and not wi_pit_2026_has_business_pass_through_or_fiduciary_adjustment
          and not wi_pit_2026_has_retirement_subtraction_other_than_encoded_military
          and not wi_pit_2026_has_prior_year_loss_or_recovery_adjustment
          and not wi_pit_2026_has_cross_title_income_exemption

  - name: wi_pit_2026_supported_liability_profile_applies
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: Bounded profile excluding unencoded Chapter 71 credit and recapture surfaces
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source: {corpus_citation_path: us-wi/statute/71.10, excerpt: "make computations in the following order"}
          - path: versions[0].formula
            kind: exception
            source: {corpus_citation_path: us-wi/statute/71.07, excerpt: "Credits"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          wi_pit_2026_supported_adjusted_gross_income_profile_applies
