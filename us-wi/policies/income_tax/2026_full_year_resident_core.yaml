        effective_to: '2026-12-31'
        formula: |-
          if wi_pit_2026_is_full_year_wisconsin_resident_return
          and (
            not wi_pit_2026_filing_status_married_separate
            or wi_pit_2026_married_living_apart_treated_as_single
          ):
            wi_pit_2026_eitc_rate[wi_pit_2026_eitc_child_selector]
            * wi_pit_2026_federal_basic_earned_income_credit
          else:
            0

