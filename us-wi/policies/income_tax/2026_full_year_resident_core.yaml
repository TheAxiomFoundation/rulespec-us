format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_paths:
      - us-wi/statute/71.01
      - us-wi/statute/71.02
      - us-wi/statute/71.05
      - us-wi/statute/71.06
      - us-wi/statute/71.07
      - us-wi/statute/71.10
      - us-wi/form/individual-income-tax/2026/1-es/document-1
    upstream_source_check:
      status: checked_higher_authority
      checked_paths:
        - us-wi/statute/chapter-71
        - us-wi/statute/71.01
        - us-wi/statute/71.02
        - us-wi/statute/71.05
        - us-wi/statute/71.06
        - us-wi/statute/71.07
        - us-wi/statute/71.10
        - us-wi/form/individual-income-tax/2026/1-es/document-1
      rationale: |-
        The pinned official corpus contains Wisconsin Statutes chapter 71 as
        expressed on April 3, 2026 and the Department of Revenue's official
        2026 Form 1-ES. Chapter 71 supplies the federal-adjusted-gross-income
        starting point, directly stated additions and subtractions, personal
        exemptions, standard-deduction formula, ordinary tax rules, credits,
        refundable-credit treatment, and statutory computation order. Form
        1-ES supplies the operative 2026 resident bracket floors, cumulative
        bases, and rates.

        The pinned corpus does not contain the Department-prescribed TY2026
        annual-return Form 1 package or its indexed standard-deduction table.
        Section 71.05(22)(dt) requires annual CPI adjustment and incorporation
        into the forms and instructions. The corpus also lacks the operative
        indexed 2026 limits for education, Wisconsin 529/ABLE, and employee
        college-savings provisions and the cross-title law needed to resolve
        every specialty subtraction, credit, recapture, and carryforward.
        Those are typed source holds. No CPI projection, prior-year table,
        caller-completed Wisconsin deduction, credit, tax, or liability is
        accepted.

        This module therefore computes the maximum source-grounded bounded
        resident core: Wisconsin adjusted gross income for a disclosed simple
        profile, fixed personal exemptions, taxable income before the
        unavailable standard deduction, all operative 2026 schedule
        parameters, and directly supported married-persons, school-property,
        stillbirth, transportation, and refundable earned-income credit
        candidates from raw facts. Public taxable-income and liability stages
        remain deferred and cannot execute while the standard-deduction source
        hold applies.
  summary: |-
    Wisconsin TY2026 full-year-resident individual-income-tax bounded core.
    The module starts with federal adjusted gross income and raw transaction
    facts, applies directly supported additions and subtractions, and computes
    fixed personal exemptions. It also pins the complete official 2026
    resident gross-tax schedules and reconstructs several common credits from
    raw inputs.

    The annual Wisconsin standard deduction is mandatory to reach taxable
    income and is indexed each year. Because the official TY2026 table is not
    in the pinned corpus, the public source-readiness Judgment fails closed.
    All Money candidates are private except Wisconsin adjusted gross income
    and independently source-complete credit diagnostics. The module does not
    publish zero as completed taxable income, tax, or final liability.
  deferred_outputs:
    - output: us-wi:policies/income_tax/2026_full_year_resident_core#wi_pit_2026_complete_wisconsin_taxable_income
      reason: |-
        Wis. Stat. 71.05(22)(dt) requires the Department to annually index and
        publish the standard-deduction amounts. The official TY2026 annual
        table is absent from the pinned corpus.
      source_values:
        - us-wi:policies/income_tax/2026_full_year_resident_core#wi_pit_2026_standard_deduction_source_hold_applies
    - output: us-wi:policies/income_tax/2026_full_year_resident_core#wi_pit_2026_complete_tax_after_nonrefundable_credits
      reason: |-
        Complete tax requires taxable income plus every applicable Chapter 71
        credit, carryforward, recapture, cross-title eligibility rule, and the
        final TY2026 annual-return package.
      source_values:
        - us-wi:policies/income_tax/2026_full_year_resident_core#wi_pit_2026_complete_liability_source_hold_applies
    - output: us-wi:policies/income_tax/2026_full_year_resident_core#wi_pit_2026_net_income_tax_liability_before_payments
      reason: |-
        Final signed liability cannot be completed until the TY2026 standard
        deduction and all applicable nonrefundable/refundable credit surfaces
        and recaptures are source-complete.
      source_values:
        - us-wi:policies/income_tax/2026_full_year_resident_core#wi_pit_2026_complete_liability_source_hold_applies
