  - name: wi_pit_2026_personal_exemptions
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Wis. Stat. 71.05(23)(b)
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-wi/statute/71.05, excerpt: "$700 for the taxpayer's spouse"}
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-wi/statute/71.05, excerpt: "$700 for each dependent"}
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-wi/statute/71.05, excerpt: "reached the age of 65 before the close"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if wi_pit_2026_filing_status_is_valid:
            wi_pit_2026_personal_exemption_amount
            + (
              if wi_pit_2026_filing_status_married_joint:
                wi_pit_2026_personal_exemption_amount
              else:
                0
            )
            + wi_pit_2026_personal_exemption_amount * wi_pit_2026_dependent_count
            + (
              if wi_pit_2026_taxpayer_reached_age_65_before_year_end:
                wi_pit_2026_age_65_exemption_amount
              else:
                0
            )
            + (
              if wi_pit_2026_filing_status_married_joint
              and wi_pit_2026_spouse_reached_age_65_before_year_end:
                wi_pit_2026_age_65_exemption_amount
              else:
                0
            )
          else:
            0

