  source_verification:
    corpus_citation_path: us/form/cms/medicaid-chip-bhp-eligibility-levels
  summary: |-
    The table provides MAGI eligibility levels as percentages of FPL, based on state decisions as of December 1, 2023. Alabama row: Children Medicaid Ages 0-1 141%; Children Medicaid Ages 1-5 141%; Children Medicaid Ages 6-18 141%; Children Separate CHIP 312%; Pregnant Women Medicaid 141%; Pregnant Women CHIP N/A; Adults (Medicaid) Parent/Caretaker 13%; Adults (Medicaid) Expansion to Adults No. The MAGI-based rules generally include a 5% FPL disregard.
