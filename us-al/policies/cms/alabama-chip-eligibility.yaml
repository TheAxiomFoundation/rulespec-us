format: rulespec/v1
imports:
  - us:statutes/42/1397jj/c/1#child
  - us-al:policies/cms/alabama-medicaid-chip-bhp-eligibility-levels#alabama_children_separate_chip_effective_fpl_limit
  - us-al:policies/cms/alabama-medicaid-chip-bhp-eligibility-levels#alabama_pregnant_women_chip_available
  - us:policies/cms/medicaid-chip-bhp-eligibility-levels#magi_fpl_disregard_rate
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/form/cms/medicaid-chip-bhp-eligibility-levels
  summary: |-
    Alabama CHIP eligibility composition applies the federal CHIP child and standard-pregnant eligibility framework to the CMS state eligibility-level outputs. It also applies the CMS CHIP FCEP SPA source for state-set coverage from conception to birth income eligibility.
rules:
  - name: alabama_separate_chip_child_eligibility_available
    kind: derived
    dtype: Boolean
    period: Year
    source: CMS Medicaid, CHIP and BHP Eligibility Levels table, Alabama row
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/1397ll/d/2
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/regulation/42/457/10
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/form/cms/medicaid-chip-bhp-eligibility-levels
              excerpt: "Children Separate CHIP"
    versions:
      - effective_from: '2023-12-01'
        formula: |-
          true
  - name: is_chip_eligible_child
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 42 USC 1397jj(b)(1), 42 USC 1397jj(c)(1), and CMS state CHIP eligibility levels
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/42/1397jj/c/1#child
              output: child
              hash: sha256:5983f9bd1c30a824da826ee4bc8fc3351cd2c631d4a0ce198b156446493ef9e0
          - path: versions[0].formula
            kind: import
            import:
              target: us-al:policies/cms/alabama-medicaid-chip-bhp-eligibility-levels#alabama_children_separate_chip_effective_fpl_limit
              output: alabama_children_separate_chip_effective_fpl_limit
              hash: sha256:d28ec0f850b96eda23c3a85bba39ba5f9b4eaf461bd7777c70c1987bbcdebd2f
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/1397jj/b/1
              excerpt: "not found eligible for medical assistance under subchapter XIX"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/form/cms/medicaid-chip-bhp-eligibility-levels
              excerpt: "Children Separate CHIP"
    versions:
      - effective_from: '2023-12-01'
        formula: |-
          child
          and person_meets_chip_immigration_requirement
          and not found_eligible_for_medical_assistance_under_subchapter_xix
          and medicaid_income_level <= alabama_children_separate_chip_effective_fpl_limit
  - name: alabama_standard_pregnant_chip_eligibility_available
    kind: derived
    dtype: Boolean
    period: Year
    source: CMS Medicaid, CHIP and BHP Eligibility Levels table, Alabama row
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: import
            import:
              target: us-al:policies/cms/alabama-medicaid-chip-bhp-eligibility-levels#alabama_pregnant_women_chip_available
              output: alabama_pregnant_women_chip_available
              hash: sha256:d28ec0f850b96eda23c3a85bba39ba5f9b4eaf461bd7777c70c1987bbcdebd2f
    versions:
      - effective_from: '2023-12-01'
        formula: |-
          alabama_pregnant_women_chip_available
  - name: is_chip_eligible_standard_pregnant_person
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 42 USC 1397ll(d)(2) and CMS state CHIP eligibility levels
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/form/cms/medicaid-chip-bhp-eligibility-levels
              excerpt: "Pregnant Women CHIP"
    versions:
      - effective_from: '2023-12-01'
        formula: |-
          false
  - name: alabama_fcep_eligibility_available
    kind: derived
    dtype: Boolean
    period: Year
    source: CMS CHIP FCEP SPA source, Alabama
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/policy/cms/chip-spa/al/al-24-0031-fcep-and-al-24-0031-absc/pdf/page-2
              excerpt: "Through AL-24-0031-FCEP, Alabama expands CHIP eligibility from 36 counties to statewide for the from-conception-to-end-of-pregnancy (FCEP) coverage group with family incomes up to and including 312 percent of the federal poverty level (FPL) whose birth parent is not otherwise eligible for Medicaid or CHIP."
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          true
  - name: alabama_fcep_fpl_limit
    kind: parameter
    dtype: Rate
    period: Year
    source: CMS CHIP FCEP SPA source, Alabama
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/policy/cms/chip-spa/al/al-24-0031-fcep-and-al-24-0031-absc/pdf/page-2
              excerpt: "Through AL-24-0031-FCEP, Alabama expands CHIP eligibility from 36 counties to statewide for the from-conception-to-end-of-pregnancy (FCEP) coverage group with family incomes up to and including 312 percent of the federal poverty level (FPL) whose birth parent is not otherwise eligible for Medicaid or CHIP."
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          3.12
  - name: alabama_fcep_effective_fpl_limit
    kind: derived
    dtype: Rate
    period: Year
    source: CMS CHIP FCEP SPA source, Alabama, including the MAGI 5% FPL disregard
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: import
            import:
              target: us:policies/cms/medicaid-chip-bhp-eligibility-levels#magi_fpl_disregard_rate
              output: magi_fpl_disregard_rate
              hash: sha256:ea0071602a4a4441e584a16bdbab3d8a3c36b40b7cea1151165533669423f5f5
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/regulation/42/435/603/d
              excerpt: "5 percentage points of the Federal poverty level"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/policy/cms/chip-spa/al/al-24-0031-fcep-and-al-24-0031-absc/pdf/page-2
              excerpt: "Through AL-24-0031-FCEP, Alabama expands CHIP eligibility from 36 counties to statewide for the from-conception-to-end-of-pregnancy (FCEP) coverage group with family incomes up to and including 312 percent of the federal poverty level (FPL) whose birth parent is not otherwise eligible for Medicaid or CHIP."
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          alabama_fcep_fpl_limit + magi_fpl_disregard_rate
  - name: is_chip_fcep_eligible_person
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 42 USC 1397ll(f)(1), 42 CFR 457.10, and CMS CHIP FCEP SPA source for Alabama
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/policy/cms/chip-spa/al/al-24-0031-fcep-and-al-24-0031-absc/pdf/page-2
              excerpt: "Through AL-24-0031-FCEP, Alabama expands CHIP eligibility from 36 counties to statewide for the from-conception-to-end-of-pregnancy (FCEP) coverage group with family incomes up to and including 312 percent of the federal poverty level (FPL) whose birth parent is not otherwise eligible for Medicaid or CHIP."
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/1397ll/f/1
              excerpt: "through the application of sections 457.10"
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          person_is_pregnant
          and not found_eligible_for_medical_assistance_under_subchapter_xix
          and medicaid_income_level <= alabama_fcep_effective_fpl_limit
