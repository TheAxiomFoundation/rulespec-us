format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-al/manual/dhr/poe/chapter-04-citizenship-and-alien-status/401
  summary: |-
    Only the qualified aliens listed in Section 400 are eligible to participate. All other aliens are ineligible. Alien visitors, tourists, diplomats and students who enter the United States temporarily with no intention of abandoning their residence in a foreign country are ineligible. Undocumented non-citizens and those who are unable or unwilling to provide documentation of their immigration status are ineligible for food assistance benefits.
rules:
  - name: person_is_eligible_alien
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: AL DHR POE Manual 401
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-04-citizenship-and-alien-status/401
              excerpt: "Only the qualified aliens listed in Section 400 are eligible to participate. All other aliens are ineligible to participate."
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-04-citizenship-and-alien-status/401
              excerpt: "Alien visitors, tourists, diplomats and students who enter the United States temporarily with no intention of abandoning their residence in a foreign country are also included as ineligible aliens."
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-04-citizenship-and-alien-status/401
              excerpt: "Undocumented non-citizens and those who are unable or unwilling to provide documentation of their immigration status are ineligible for food assistance benefits."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_qualified_alien_listed_in_section_400
          and not person_entered_us_temporarily_without_intent_to_abandon_foreign_residence
          and not person_is_undocumented_non_citizen
          and not person_unable_or_unwilling_to_provide_documentation_of_immigration_status
