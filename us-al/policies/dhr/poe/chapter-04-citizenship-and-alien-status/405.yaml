format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-al/manual/dhr/poe/chapter-04-citizenship-and-alien-status/405
  summary: |-
    For a battered alien, there must be a substantial connection between the battery and the need for benefits, and the battered individual must establish that s/he no longer lives in the same household with the batterer.
rules:
  - name: substantial_connection_between_battery_and_need_for_benefits
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Alabama DHR POE Manual chapter 04 section 405
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-04-citizenship-and-alien-status/405
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_needs_to_set_up_new_living_arrangement
          or individual_has_never_worked_or_is_now_unemployed
          or individual_unable_to_work_due_to_physical_injury_from_battery
          or heightened_visibility_in_community_poses_continued_threat
          or other_circumstances_establish_substantial_connection_as_determined_by_worker
  - name: reasonable_evidence_of_battery_provided
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Alabama DHR POE Manual chapter 04 section 405
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-04-citizenship-and-alien-status/405
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_provided_police_report_of_battery
          or individual_provided_information_from_medical_personnel
          or individual_provided_information_from_school_personnel
          or individual_provided_social_service_records
          or individual_provided_photographs_of_battery
          or individual_provided_other_reasonable_evidence_of_battery
  - name: battered_alien_meets_substantial_connection_and_separation_requirements
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Alabama DHR POE Manual chapter 04 section 405
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-04-citizenship-and-alien-status/405
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          substantial_connection_between_battery_and_need_for_benefits
          and reasonable_evidence_of_battery_provided
          and battered_individual_no_longer_lives_in_same_household_with_batterer
