format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-al/manual/dhr/poe/chapter-16-restoration-of-lost-benefits/1602
  summary: |-
    Household may request a fair hearing within 90 days of notification of
    entitlement to restoration of lost benefits if it disagrees with the amount
    or other action. Pending the hearing, the household receives lost benefits
    as determined by the county department. If a fair hearing decision is
    favorable, the county department restores benefits per that decision. For
    county department denial of restoration, the household has 90 days from the
    date of the determination to request a fair hearing; benefits are restored
    only if the hearing decision is favorable. Benefits lost more than 12 months
    prior to the date the county department was initially informed of the
    household's possible entitlement to lost benefits shall not be restored.
rules:
  - name: fair_hearing_request_days
    kind: parameter
    dtype: Integer
    source: AL DHR POE 1602 - within 90 days of the date the household is notified
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-16-restoration-of-lost-benefits/1602
              excerpt: "request a fair hearing within 90 days of the date the household is notified"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          90
  - name: lost_benefits_lookback_months
    kind: parameter
    dtype: Integer
    source: AL DHR POE 1602 - Benefits lost more than 12 months prior shall not be restored
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-16-restoration-of-lost-benefits/1602
              excerpt: "Benefits lost more than 12 months prior to the date the county department was initially informed"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          12
  - name: fair_hearing_request_timely
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: AL DHR POE 1602 - within 90 days of notification or determination date
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-16-restoration-of-lost-benefits/1602
              excerpt: "within 90 days of the date the household is notified"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          days_since_restoration_notification_or_denial <= fair_hearing_request_days
  - name: lost_benefits_eligible_for_restoration
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: AL DHR POE 1602 - Benefits lost more than 12 months prior shall not be restored
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-16-restoration-of-lost-benefits/1602
              excerpt: "Benefits lost more than 12 months prior to the date the county department was initially informed of the household's possible entitlement to lost benefits shall not be restored"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          months_between_benefit_loss_and_county_informed <= lost_benefits_lookback_months
  - name: lost_benefits_restored_pending_hearing
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: AL DHR POE 1602 - household shall receive the lost benefits pending the results of the fair hearing
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-16-restoration-of-lost-benefits/1602
              excerpt: "If a fair hearing is requested prior to or during the time lost benefits are being restored, the household shall receive the lost benefits as determined by the county department pending the results of the fair hearing"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          county_determined_entitlement_to_restoration
          and fair_hearing_requested_before_or_during_restoration
  - name: lost_benefits_restored_after_denial
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: AL DHR POE 1602 - county department shall restore lost benefits only if the fair hearing decision is favorable
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-16-restoration-of-lost-benefits/1602
              excerpt: "The county department shall restore lost benefits to the household only if the fair hearing decision is favorable to the household"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          county_department_denied_restoration
          and fair_hearing_decision_favorable_to_household
          and lost_benefits_eligible_for_restoration
