format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-al/manual/dhr/poe/chapter-16-restoration-of-lost-benefits/1600
  summary: |-
    The county department shall restore to households benefits which were lost
    whenever the loss was caused by: (1) an error by the county department or
    state agency; (2) an administrative disqualification for Intentional
    Program Violation subsequently reversed as specified in Section 1604; or
    (3) a statement elsewhere in the handbook or notification by the Food
    Assistance Division specifically stating entitlement to restoration.
    Benefits shall be restored for not more than 12 months prior to the date
    the county department receives a request, is notified, or discovers the
    loss, whichever occurs first. Judicial Action: benefits wrongfully
    withheld by judicial action are restored; if judicial action is the first
    action, benefits restored for not more than 12 months from the date the
    court action was initiated; if judicial review of a county/state agency
    action, restored for not more than 12 months from earliest of (1) date
    request received, (2) if no request, date fair hearing initiated, or
    (3) never more than one year from when the agency is notified of or
    discovers the loss. Benefits shall be restored even if the household is
    currently ineligible.
rules:
  - name: maximum_restoration_months
    kind: parameter
    dtype: Integer
    source: Chapter 16, Section 1600 (12 months)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-16-restoration-of-lost-benefits/1600
              excerpt: "not more than 12 months"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          12
  - name: household_entitled_to_restoration
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Chapter 16, Section 1600 (causes of loss triggering restoration)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-16-restoration-of-lost-benefits/1600
              excerpt: "shall restore to households benefits which were lost whenever the loss was caused by"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          loss_caused_by_county_or_state_agency_error
          or loss_caused_by_reversed_intentional_program_violation_disqualification
          or handbook_or_food_assistance_division_states_entitlement_to_restoration
          or benefits_wrongfully_withheld_by_judicial_action
  - name: restoration_available_despite_current_ineligibility
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Chapter 16, Section 1600 ("Benefits to Ineligible Households")
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-16-restoration-of-lost-benefits/1600
              excerpt: "Benefits shall be restored even if the household is currently ineligible."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_entitled_to_restoration
