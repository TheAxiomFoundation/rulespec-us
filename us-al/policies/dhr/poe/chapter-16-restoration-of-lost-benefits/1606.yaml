format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-al/manual/dhr/poe/chapter-16-restoration-of-lost-benefits/1606
  summary: |-
    Whenever lost benefits are due a household and the household's membership has changed, the county department shall restore the lost benefits to the household containing a majority of the individuals who were household members at the time the loss occurred. If the county department cannot locate or determine the household which contains a majority of household members, the county department shall restore the lost benefits to the household containing the head of the household at the time the loss occurred.
rules:
  - name: restore_lost_benefits_to_household
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: AL DHR POE chapter 16, 1606
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-16-restoration-of-lost-benefits/1606
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          lost_benefits_are_due
          and household_membership_has_changed
          and (
            household_contains_majority_of_original_members
            or (
              county_cannot_locate_or_determine_majority_household
              and household_contains_original_head_of_household
            )
          )
