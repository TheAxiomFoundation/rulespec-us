format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-al/manual/dhr/poe/chapter-15-fair-hearings/1509
  summary: |-
    The agency shall not deny or dismiss a request for a hearing unless: (1) the
    request is not received within the time specified in Section 1506; (2) the
    household or its representative withdraws the request in writing; (3) the
    household or its representative orally withdraws and the hearing officer
    confirms in writing (with a 10-day reinstatement window from receipt of the
    written notification of verbal withdrawal); (4) subsequent mail to the
    household is returned undeliverable; (5) the agency action cited is
    specifically excluded from the hearing process (FNS-ordered
    reduce/suspend/cancel; sole non-compliance with another program); or (6)
    the household or representative fails without good cause to appear at the
    scheduled hearing or to arrange a postponement.
rules:
  - name: verbal_withdrawal_reinstatement_days
    kind: parameter
    dtype: Integer
    source: Section 1509(3)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-15-fair-hearings/1509
              excerpt: "10 days from the date it receives written notification of the verbal withdrawals"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10
  - name: subsequent_hearing_request_days
    kind: parameter
    dtype: Integer
    source: Section 1509(3)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-15-fair-hearings/1509
              excerpt: "request a hearing on the same issue within 90 days of the original action"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          90
  - name: hearing_request_denial_or_dismissal_permitted
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: Section 1509
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-15-fair-hearings/1509
              excerpt: "The agency shall not deny or dismiss a request for a hearing unless"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          hearing_request_not_received_within_section_1506_time
          or household_withdrew_request_in_writing
          or (household_orally_withdrew_request and hearing_officer_confirmed_withdrawal_in_writing)
          or agency_mail_returned_undeliverable_after_hearing_request
          or agency_action_excluded_from_hearing_process
          or household_failed_without_good_cause_to_appear_or_postpone
  - name: agency_action_excluded_from_hearing_process
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: Section 1509(5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-15-fair-hearings/1509
              excerpt: "The agency action cited is specifically excluded from the hearing process"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          request_disputes_fns_order_to_reduce_suspend_or_cancel_benefits
          or request_based_solely_on_non_compliance_with_another_program
  - name: household_eligible_to_reinstate_after_verbal_withdrawal
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: Section 1509(3)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-15-fair-hearings/1509
              excerpt: "10 days from the date it receives written notification of the verbal withdrawals to advise the county department or Food Assistance Partnership of its desire to request reinstatement of the hearing"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_orally_withdrew_request
          and hearing_officer_confirmed_withdrawal_in_writing
          and days_since_household_received_written_notification_of_verbal_withdrawal <= verbal_withdrawal_reinstatement_days
          and not household_previously_reinstated_after_verbal_withdrawal
