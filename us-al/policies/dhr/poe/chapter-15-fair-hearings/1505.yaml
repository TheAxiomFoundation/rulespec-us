    corpus_citation_path: us-al/manual/dhr/poe/chapter-15-fair-hearings/1505
  summary: |-
    At the time of application each household shall be informed in writing of its right to a hearing, of the method by which a hearing may be requested, and that its case may be presented by a household member or a representative. Any time the household expresses disagreement with agency action, the household shall be reminded of the right to request a hearing. If there is an individual or organization that provides free legal representation, the household shall be informed of the availability of that service.
