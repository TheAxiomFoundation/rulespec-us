format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-al/manual/dhr/poe/chapter-15-fair-hearings/1519
  summary: |-
    Recipient may request a fair hearing on an EBT adjustment by contacting the food assistance office or Food Assistance Partnership within 90 days from the date of the EBT Notice. If the request is within 10 days of the date of the EBT Notice, the benefits on hold will be placed back into the household's account.
rules:
  - name: ebt_adjustment_hearing_request_period_days
    kind: parameter
    dtype: Integer
    source: Alabama POE Manual 1519 ("within 90 days from the date of the EBT Notice")
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-15-fair-hearings/1519
              excerpt: "within 90 days from the date of the EBT Notice"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          90
  - name: ebt_adjustment_benefits_on_hold_restoration_period_days
    kind: parameter
    dtype: Integer
    source: Alabama POE Manual 1519 ("within 10 days of the date of the EBT Notice")
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-15-fair-hearings/1519
              excerpt: "within 10 days of the date of the EBT Notice, the benefits on hold will be placed back into the household's account"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10
  - name: ebt_adjustment_hearing_request_timely
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: Alabama POE Manual 1519 ("The recipient may request a fair hearing ... within 90 days from the date of the EBT Notice")
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-15-fair-hearings/1519
              excerpt: "within 90 days from the date of the EBT Notice"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          hearing_request_made
          and days_since_ebt_notice <= ebt_adjustment_hearing_request_period_days
  - name: ebt_adjustment_benefits_on_hold_restored
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: Alabama POE Manual 1519 ("If the request is within 10 days of the date of the EBT Notice, the benefits on hold will be placed back into the household's account")
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-15-fair-hearings/1519
              excerpt: "If the request is within 10 days of the date of the EBT Notice, the benefits on hold will be placed back into the household's account"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          hearing_request_made
          and days_since_ebt_notice <= ebt_adjustment_benefits_on_hold_restoration_period_days
