format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-al/manual/dhr/poe/chapter-15-fair-hearings/1510
  summary: |-
    If a household requests a fair hearing within the period provided by the
    Notice of Adverse Action and its certification period has not expired, the
    household's participation in the program will continue on the basis
    authorized immediately prior to the Notice of Adverse Action. The household
    must specifically waive the continuation of benefits for the proposed
    action to be implemented. Benefits must be continued through the period
    allowed for reinstatement of a hearing that was orally withdrawn (see
    Section 1509). If a hearing request is not within the notice period,
    benefits shall be reduced or terminated; however, good cause for late
    request causes reinstatement. For Semi-Annual Reporting households,
    benefits continue if the hearing request follows a decrease or termination
    based on the six-month report and is made within 10 days of the Notice of
    Action; benefits will not be continued if the case is terminated for
    failure to submit the Six-Month Report or required information. For mass
    changes, prior basis is reinstated only if the contested issue is improper
    computation or misapplication of Federal law/regulation. Once continued or
    reinstated, benefits shall not be reduced or terminated prior to the
    official hearing decision unless: (1) the certification period expires;
    (2) a change affecting eligibility occurs and the household fails to
    request a hearing after a subsequent Notice of Adverse Action; (3) a mass
    change affecting eligibility occurs while the decision is pending; or
    (4) the household or representative orally withdrew its hearing request and
    did not advise the county/State of its desire to reinstate within the
    Section 1509 timeframe.
rules:
  - name: semi_annual_report_hearing_request_window_days
    kind: parameter
    dtype: Count
    source: Alabama DHR POE Manual Section 1510 (Semi-Annual Reporting 10-day window)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-15-fair-hearings/1510
              excerpt: "the request for a hearing is made within 10 days of the date of the Notice of Action"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10

  - name: timely_hearing_request_continuation_applies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Alabama DHR POE Manual Section 1510 (timely request within Notice of Adverse Action period)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-15-fair-hearings/1510
              excerpt: "If a household requests a fair hearing within the period provided by the Notice of Adverse Action and its certification period has not expired, the household's participation in the program will continue"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          hearing_requested_within_notice_of_adverse_action_period
          and not certification_period_has_expired
          and not household_specifically_waived_continuation_of_benefits

  - name: semi_annual_report_continuation_applies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Alabama DHR POE Manual Section 1510 (Semi-Annual Reporting continuation)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-15-fair-hearings/1510
              excerpt: "For Semi-Annual Reporting households, benefits will be continued on the previously authorized basis if the request for a hearing is due to a decrease or termination of benefits based on information on the six-month report and the request for a hearing is made within 10 days of the date of the Notice of Action. However, benefits will not be continued if the case is terminated for failure to submit the Six-Month Report or failure to submit necessary information"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_is_semi_annual_reporting
          and hearing_request_due_to_decrease_or_termination_based_on_six_month_report
          and days_since_notice_of_action <= semi_annual_report_hearing_request_window_days
          and not case_terminated_for_failure_to_submit_six_month_report
          and not case_terminated_for_failure_to_submit_semi_annual_reporting_information
          and not household_specifically_waived_continuation_of_benefits

  - name: mass_change_reinstatement_applies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Alabama DHR POE Manual Section 1510 (mass change reinstatement)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-15-fair-hearings/1510
              excerpt: "When benefits are reduced or terminated due to a mass change, participation of the prior basis shall be reinstated only if the issue being contested is that food assistance eligibility or benefits were improperly computed or that Federal law or regulation is being misapplied or misinterpreted"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          benefits_reduced_or_terminated_due_to_mass_change
          and (
            contested_issue_is_improper_computation
            or contested_issue_is_misapplication_of_federal_law_or_regulation
          )
          and not household_specifically_waived_continuation_of_benefits

  - name: good_cause_late_request_reinstatement_applies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Alabama DHR POE Manual Section 1510 (good cause for late request)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-15-fair-hearings/1510
              excerpt: "if the household establishes good cause for its failure to make the request within the advance notice period, the agency shall reinstate the benefits to the prior basis"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not hearing_requested_within_notice_of_adverse_action_period
          and household_established_good_cause_for_late_hearing_request

  - name: benefits_continued_during_hearing
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Alabama DHR POE Manual Section 1510 (continuation of benefits pending fair hearing)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-15-fair-hearings/1510
              excerpt: "the household's participation in the program will continue on the basis authorized immediately prior to the Notice of Adverse Action"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (
            timely_hearing_request_continuation_applies
            or semi_annual_report_continuation_applies
            or mass_change_reinstatement_applies
            or good_cause_late_request_reinstatement_applies
            or orally_withdrew_hearing_within_reinstatement_period_under_section_1509
          )
          and not certification_period_has_expired
          and not change_affecting_eligibility_occurred_and_no_hearing_requested_after_subsequent_notice
          and not mass_change_affecting_eligibility_occurred_while_decision_pending
          and not orally_withdrew_hearing_and_did_not_reinstate_within_section_1509_timeframe

  - name: claim_against_household_for_overissuances_established
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Alabama DHR POE Manual Section 1510 (claim for over-issuances)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-15-fair-hearings/1510
              excerpt: "If there is no request for reinstatement of the hearing or the agency's action is upheld by a hearing decision, a claim against the household must be established for all over-issuances, including ABAWD ineligibility, except for work registration sanctions for which a disqualification will be applied as a result of the hearing decision"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (
            no_request_for_reinstatement_of_orally_withdrawn_hearing
            or agency_action_upheld_by_hearing_decision
          )
          and not overissuance_is_work_registration_sanction
