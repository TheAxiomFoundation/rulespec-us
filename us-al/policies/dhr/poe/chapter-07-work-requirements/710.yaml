format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-al/manual/dhr/poe/chapter-07-work-requirements/710
  summary: |-
    ABAWD work requirements: a household member is ineligible to receive food
    assistance for more than 3 months (consecutive or otherwise) out of 36
    months during which the member did not work at least 20 hours a week
    averaged monthly (80 hours a month), participate in a qualifying work
    program for at least 20 hours a week, or a combination totaling 20 hours
    a week. Exemptions include under age 18 or at least age 50, medically
    unfit, parent or other adult living with a member under 18, pregnant,
    or exempt from work registration under Section 701. Regaining
    eligibility requires 80 hours of work or qualifying participation in a
    consecutive 30-day period; one additional 3 consecutive month period of
    eligibility is allowed after subsequent loss.
rules:
  - name: abawd_work_hours_per_week_threshold
    kind: parameter
    dtype: Count
    source: 710 A
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-07-work-requirements/710
              excerpt: "work at least 20 hours a week (averaged monthly)"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          20
  - name: abawd_work_hours_per_month_threshold
    kind: parameter
    dtype: Count
    source: 710 A
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-07-work-requirements/710
              excerpt: "20 hrs. per week averaged monthly means 80 hours a month"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          80
  - name: abawd_month_limit_in_period
    kind: parameter
    dtype: Count
    source: 710 A
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-07-work-requirements/710
              excerpt: "ineligible to continue to receive food assistance for more than 3 months (consecutive or otherwise)"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          3
  - name: abawd_lookback_period_months
    kind: parameter
    dtype: Count
    source: 710 A
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-07-work-requirements/710
              excerpt: "3 months (consecutive or otherwise) out of 36 months"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          36
  - name: abawd_regain_hours_threshold
    kind: parameter
    dtype: Count
    source: 710 C
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-07-work-requirements/710
              excerpt: "he works either 80 hours or more, or participates in and complies with a WIA, TAA program, or allowable employment and training program for at least 80 hours"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          80
  - name: abawd_regain_period_days
    kind: parameter
    dtype: Count
    source: 710 C
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-07-work-requirements/710
              excerpt: "during a 30 day period"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30
  - name: abawd_subsequent_eligibility_months
    kind: parameter
    dtype: Count
    source: 710 D
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-07-work-requirements/710
              excerpt: "one additional 3 consecutive month period"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          3
  - name: abawd_minimum_age
    kind: parameter
    dtype: Count
    source: 710 B
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-07-work-requirements/710
              excerpt: "Under age 18 or at least age 50"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          18
  - name: abawd_maximum_age
    kind: parameter
    dtype: Count
    source: 710 B
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-07-work-requirements/710
              excerpt: "Under age 18 or at least age 50"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          50
  - name: provider_determination_notification_days
    kind: parameter
    dtype: Count
    source: 710 A-RESET
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-07-work-requirements/710
              excerpt: "notify the A-RESET case manager of the provider determination within 10 days"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10
  - name: noaa_after_provider_determination_days
    kind: parameter
    dtype: Count
    source: 710 A-RESET
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-07-work-requirements/710
              excerpt: "send the household a Notice of Adverse Action (NOAA) within 10 days of the notification"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10
  - name: person_meets_abawd_work_hours
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 710 A
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-07-work-requirements/710
              excerpt: "work at least 20 hours a week (averaged monthly)"
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-07-work-requirements/710
              excerpt: "20 hrs. per week averaged monthly means 80 hours a month"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (person_paid_work_hours_monthly
            + person_in_kind_work_hours_monthly
            + person_unpaid_volunteer_work_hours_monthly)
          >= abawd_work_hours_per_month_threshold
  - name: person_meets_abawd_qualifying_program_hours
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 710 A
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-07-work-requirements/710
              excerpt: "for at least 20 hours a week, participate in and comply with a Workforce Innovation and Opportunity Act (WIOA) program, Trade Adjustment Assistance Act (TAA) program or an employment and training program (other than Job Search or Job Search training)"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_qualifying_program_hours_monthly
          >= abawd_work_hours_per_month_threshold
  - name: person_meets_abawd_combined_work_and_program_hours
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 710 A
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-07-work-requirements/710
              excerpt: "a combination of the two activities above for a total of at least 20 hours a week"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (person_paid_work_hours_monthly
            + person_in_kind_work_hours_monthly
            + person_unpaid_volunteer_work_hours_monthly
            + person_qualifying_program_hours_monthly)
          >= abawd_work_hours_per_month_threshold
  - name: person_meets_abawd_work_requirement
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 710 A
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-07-work-requirements/710
              excerpt: "(a) work at least 20 hours a week (averaged monthly), (b) ... participate in and comply with a ... program ... or (c) a combination of the two activities above for a total of at least 20 hours a week"
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-07-work-requirements/710
              excerpt: "if it is determined that the member would have worked an average of 20 hours per week but missed some work for a good cause"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_meets_abawd_work_hours
          or person_meets_abawd_qualifying_program_hours
          or person_meets_abawd_combined_work_and_program_hours
          or person_missed_work_for_good_cause_and_retains_job
  - name: person_age_exempt_from_abawd
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 710 B
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-07-work-requirements/710
              excerpt: "Under age 18 or at least age 50"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_age < abawd_minimum_age
          or person_age >= abawd_maximum_age
  - name: person_medically_unfit_exempt_from_abawd
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 710 B
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-07-work-requirements/710
              excerpt: "Medically certified as physically or mentally unfit for employment"
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-07-work-requirements/710
              excerpt: "Receipt of any type of disability payment qualifies a household member for this exemption"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_medically_certified_unfit_for_employment
          or person_receives_disability_payment
  - name: person_caretaker_exempt_from_abawd
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 710 B
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-07-work-requirements/710
              excerpt: "Parents (natural, adopted or step) and other adult household members (regardless of the relationship) living in the household with a member under the age of 18"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_lives_in_household_with_member_under_18
  - name: person_pregnant_exempt_from_abawd
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 710 B
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-07-work-requirements/710
              excerpt: "Pregnant"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_pregnant
  - name: person_exempt_from_abawd
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 710 B
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-07-work-requirements/710
              excerpt: "Individuals are exempt from this provision during the time they are: Under age 18 or at least age 50. ... Medically certified ... Parents ... Pregnant ... Meets one of the exemptions from the work registration requirements as stated in Section 701."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_age_exempt_from_abawd
          or person_medically_unfit_exempt_from_abawd
          or person_caretaker_exempt_from_abawd
          or person_pregnant_exempt_from_abawd
          or person_exempt_from_work_registration_under_section_701
  - name: person_subject_to_abawd_provision
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 710 A, B
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-07-work-requirements/710
              excerpt: "Unless exempt from this provision, any household member is ineligible to continue to receive food assistance"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not person_exempt_from_abawd
          and not person_resides_in_waived_county
  - name: person_regained_abawd_eligibility
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 710 C
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-07-work-requirements/710
              excerpt: "during a 30 day period he works either 80 hours or more, or participates in and complies with a WIA, TAA program, or allowable employment and training program for at least 80 hours"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_work_or_program_hours_in_consecutive_30_day_period
          >= abawd_regain_hours_threshold
  - name: person_eligible_under_abawd_provision
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 710 A
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-07-work-requirements/710
              excerpt: "any household member is ineligible to continue to receive food assistance for more than 3 months (consecutive or otherwise) out of 36 months"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_exempt_from_abawd
          or person_meets_abawd_work_requirement
          or person_countable_abawd_months_in_lookback < abawd_month_limit_in_period
