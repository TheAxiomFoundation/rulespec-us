format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-al/manual/dhr/poe/chapter-07-work-requirements/708
  summary: |-
    Good cause shall include circumstances beyond the individual's control, such as, but not limited to: 1. Illness 2. Illness of another household member requiring the presence of the individual. 3. A household emergency. 4. The unavailability of transportation.
rules:
  - name: good_cause_for_work_requirement_noncompliance
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: AL DHR POE 708 Good Cause
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-07-work-requirements/708
              excerpt: "Good cause shall include circumstances beyond the individual's control, such as, but not limited to: 1. Illness 2. Illness of another household member requiring the presence of the individual. 3. A household emergency. 4. The unavailability of transportation."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          circumstance_is_beyond_individuals_control
          and (individual_is_ill
          or another_household_member_is_ill_requiring_individuals_presence
          or household_emergency_exists
          or transportation_is_unavailable
          or other_circumstance_beyond_individuals_control_exists)
