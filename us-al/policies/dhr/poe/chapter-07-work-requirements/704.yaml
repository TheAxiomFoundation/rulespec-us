format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-al/manual/dhr/poe/chapter-07-work-requirements/704
  summary: |-
    Disqualification periods for failure to comply with food assistance work
    requirements: first violation - one month or until compliance, whichever
    is later; second violation - three months or until compliance, whichever
    is later; third or subsequent violation - six months or until compliance,
    whichever is later. Notice of adverse action must be issued within 10
    days of learning of noncompliance under UCB or JOBS programs.
rules:
  - name: first_violation_disqualification_months
    kind: parameter
    dtype: Integer
    source: Section 704(D) - first violation
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-07-work-requirements/704
              excerpt: "For the first violation or failure without good cause, the noncompliant individual shall be disqualified for one month or until compliance, whichever is later"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1
  - name: second_violation_disqualification_months
    kind: parameter
    dtype: Integer
    source: Section 704(D) - second violation
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-07-work-requirements/704
              excerpt: "The second violation or failure without good cause, the noncompliant individual shall be disqualified for three months or until compliance, whichever is later"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          3
  - name: third_or_subsequent_violation_disqualification_months
    kind: parameter
    dtype: Integer
    source: Section 704(D) - third or subsequent violation
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-07-work-requirements/704
              excerpt: "For the third or subsequent violation or failure without good cause, the noncompliant individual shall be disqualified for six months or until compliance, whichever is later"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          6
  - name: notice_of_noncompliance_days
    kind: parameter
    dtype: Integer
    source: Section 704(B) and 704(C) - 10 day notice
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-07-work-requirements/704
              excerpt: "Within 10 days of learning of such a noncompliance, the policies in Section 704(D) shall be followed to disqualify the individual"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10
  - name: minimum_disqualification_months
    kind: derived
    entity: Person
    dtype: Integer
    period: Month
    source: Section 704(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-07-work-requirements/704
              excerpt: "For the first violation ... one month ... The second violation ... three months ... For the third or subsequent violation ... six months"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if prior_work_requirement_violation_count == 0: first_violation_disqualification_months
          else: if prior_work_requirement_violation_count == 1: second_violation_disqualification_months
          else: third_or_subsequent_violation_disqualification_months
