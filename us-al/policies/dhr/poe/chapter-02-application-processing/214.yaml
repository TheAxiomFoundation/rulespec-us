  summary: |-
    Every household which has at any time applied or been certified for food assistance is guaranteed confidentiality of the information in their case record. Use or disclosure of information shall be handled as explained in this Section: (A) use or disclosure without the household's permission to specified administrative, enforcement, IEVS, SAVE, child support, audit, law enforcement, public information/nutrition education, DHR employee, and Medicaid recipients; (B) use or disclosure with the household's permission to household members, authorized representatives, and non-household members acting on the household's behalf with a written request; and (C) procedures for making records available during normal business hours and verifying credentials.
