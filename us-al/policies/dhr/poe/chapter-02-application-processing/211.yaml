module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-al/manual/dhr/poe/chapter-02-application-processing/211
  status: deferred
  summary: |-
    Joint processing of SSI and food assistance applications at SSA offices: pure SSI households may apply for food assistance at SSA; SSA forwards applications within one working day; county department makes eligibility determination within 30 days of SSA receipt; expedited processing time begins when county receives the application; households are not required to appear for a second interview; denial-of-SSI notice procedures; recertification procedures; restoration of lost benefits due to SSA or county error.
  deferred_outputs:
    - output: us-al:policies/dhr/poe/chapter-02-application-processing/211#joint_ssi_food_assistance_application_procedures
      reason: |-
        Source describes administrative procedures for joint SSI/food assistance application processing at SSA offices (intake, forwarding, interview waiver, recertification, restoration of lost benefits) without stating computable eligibility conditions, benefit amounts, or thresholds. The substantive eligibility and benefit determinations are governed by other chapters (categorical eligibility, expedited service criteria, certification periods, recertification under Chapter 14, restoration under Chapter 16). This provision is purely procedural/administrative and is preserved documentary in module.summary.
