format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-al/manual/dhr/poe/chapter-01-household-concept/103
  summary: |-
    The head of the household for the purposes of applying for food assistance
    and assignment of case name may be designated by the applicant, or the
    certification worker may assist in this determination. There are no
    requirements for an individual household member to meet in order to be the
    head of the household other than that he/she is a responsible household
    member. If the only responsible person living with the household is an
    ineligible member or a disqualified member, this individual shall be
    designated as head of the household. A responsible household member is any
    member capable of representing the household by providing the county
    department with not only sufficient but accurate information concerning
    household circumstances. The county department has the final authority in
    the determination of whether or not an individual is a responsible
    household member. There are no restrictions to the effect that the
    responsible household member be an adult; therefore a minor can sign the
    food assistance application and represent the household in the
    certification process.
rules:
  - name: person_is_responsible_household_member
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: AL DHR POE Manual Ch. 1 Section 103 (responsible household member definition; county department final authority)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-01-household-concept/103
              excerpt: |-
                A responsible household member is any member capable of
                representing the household by providing the county department
                with not only sufficient but accurate information concerning
                household circumstances.
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-01-household-concept/103
              excerpt: |-
                The county department has the final authority in the
                determination of whether or not an individual is a responsible
                household member.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_household_member
          and person_capable_of_representing_household_with_sufficient_and_accurate_information
          and county_department_determines_person_is_responsible_household_member
