format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-al/manual/dhr/poe/chapter-05-students/502
  summary: |-
    Enrollment status begins on the first day of the school term and continues through normal periods of class attendance, vacation, and recess, unless the student graduates, is suspended or expelled, drops out, or does not intend to register for the next normal school term (excluding summer school). During vacation and recess, the student must meet student eligibility criteria to qualify for food assistance.
rules:
  - name: student_enrollment_status_continues
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: AL DHR POE Chapter 5, Section 502
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-05-students/502
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          school_term_has_begun
          and not student_has_graduated
          and not student_is_suspended_or_expelled
          and not student_has_dropped_out
          and student_intends_to_register_for_next_normal_term
  - name: student_qualifies_for_food_assistance_during_vacation_or_recess
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: AL DHR POE Chapter 5, Section 502 (final sentence)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-05-students/502
              excerpt: "the student must meet student eligibility criteria during these periods in order to qualify for food assistance"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          student_enrollment_status_continues
          and (
            not period_is_vacation_or_recess
            or student_meets_student_eligibility_criteria
          )
