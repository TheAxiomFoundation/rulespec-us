format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-al/manual/dhr/poe/chapter-13-notice-of-adverse-action/1301
  summary: |-
    Form PSD-BFA-657 (Individual Notice of Timely and Adequate Adverse Action) shall not be provided when any of eleven enumerated situations applies, including: state-initiated mass change (Section 1201); county determines all household members have died; household has moved from project area; restoration of lost benefits is complete with prior written notice; allotment varies month-to-month within certification period with prior notice; household member disqualified for Intentional Program Violation; longer certification period assigned on expedited basis with postponed verification and prior written notice; conversion from cash/coupon repayment to benefit reduction after failure to repay; eligibility termination of drug/alcohol treatment center or group living arrangement resident when facility loses certification or authorized representative status; household voluntarily requests termination in writing or in presence of caseworker; or county determines household will not reside in project area and cannot obtain next allotment.
rules:
  - name: notice_of_adverse_action_not_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: AL DHR POE 1301 (Form PSD-BFA-657 shall not be provided when ...)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-13-notice-of-adverse-action/1301
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          state_initiates_mass_change
          or all_household_members_have_died
          or household_has_moved_from_project_area
          or restoration_of_lost_benefits_complete_with_prior_notice
          or allotment_varies_within_certification_period_with_prior_notice
          or household_member_disqualified_for_intentional_program_violation
          or longer_certification_period_assigned_on_expedited_basis_with_postponed_verification_and_prior_notice
          or converting_from_repayment_to_benefit_reduction_after_failure_to_repay
          or treatment_center_or_group_living_arrangement_loses_certification_or_authorized_representative_status
          or household_voluntarily_requests_termination
          or household_will_not_reside_in_project_area_and_cannot_obtain_next_allotment
