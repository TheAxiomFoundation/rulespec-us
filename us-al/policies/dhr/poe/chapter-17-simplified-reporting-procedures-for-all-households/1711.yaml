    corpus_citation_path: us-al/manual/dhr/poe/chapter-17-simplified-reporting-procedures-for-all-households/1711
  summary: |-
    The case record shall be documented sufficiently to substantiate the actions taken by the eligibility worker to anticipate and budget the income and resources known for the eligibility and allotment determination for each six months of the certification period. A statement shall be included to indicate that the income used is representative of income the household receives. The case record for those households that are only required to report once every 12 months shall be documented sufficiently for the 12-month certification period. The case record must also be documented when changes are reported or received in another manner, as outlined in Section 1706.
