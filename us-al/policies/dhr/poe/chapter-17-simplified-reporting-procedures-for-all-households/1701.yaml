  summary: |-
    A household will be placed on six-month reporting at application, recertification, and when changes occur. The caseworker must explain the six-month reporting requirements and provide information including: certification for 12 months with a six-month report form due in the sixth month; the form is mailed in the fifth month; a copy of the form and handout is provided; explanations about completing, returning, reporting requirements, verification, available assistance, and a telephone number; and that failure to return the completed form and required verification results in case closure. A currently certified household that becomes subject to six-month reporting must be notified and given an opportunity for an oral explanation; failure to come into the office does not relieve the household of six-month reporting requirements.
