format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-al/manual/dhr/poe/chapter-08-resource-eligibility-standards/802
  summary: |-
    Section 802 lists resources excluded from the SNAP resource determination
    in Alabama: all non-liquid resources (personal property, buildings, land);
    all vehicles (under PL 106-387 by adoption of Alabama's Family Assistance
    vehicle policy); and certain liquid resources, including: (1) resources
    jointly owned by a categorically eligible household member and a
    non-categorically eligible participating household member; (2) resources
    determined inaccessible to the household; (3) resources that are actually
    prorated income; (4) equity value of a bona fide funeral agreement; and
    (5) resources excluded by express federal statute, including tax-preferred
    education and retirement accounts.
rules:
  - name: nonliquid_resources_value
    kind: parameter
    dtype: Money
    unit: USD
    source: POE 802 ("The value of all non-liquid resources, including personal property, buildings, and land, will be excluded")
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-08-resource-eligibility-standards/802
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_nonliquid_resources_value

  - name: vehicles_value
    kind: parameter
    dtype: Money
    unit: USD
    source: POE 802 ("The value of all vehicles will be excluded ... as allowed under PL 106-387 by adoption of Alabama's Family Assistance vehicle policy")
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-08-resource-eligibility-standards/802
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_vehicles_value

  - name: jointly_owned_with_categorically_eligible_value
    kind: parameter
    dtype: Money
    unit: USD
    source: POE 802(1) ("Resources jointly-owned by a categorically eligible household member and another member of a participating household that is not categorically eligible")
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-08-resource-eligibility-standards/802
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          jointly_owned_resources_with_categorically_eligible_member_value

  - name: inaccessible_resources_value
    kind: parameter
    dtype: Money
    unit: USD
    source: POE 802(2) ("Resources owned individually or jointly, that are determined to be inaccessible to the household")
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-08-resource-eligibility-standards/802
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          resources_determined_inaccessible_to_household_value

  - name: prorated_income_resources_value
    kind: parameter
    dtype: Money
    unit: USD
    source: POE 802(3) ("Resources, such as a checking or savings account, which are actually income which has been prorated over a period of time")
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-08-resource-eligibility-standards/802
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          resources_that_are_prorated_income_value

  - name: funeral_agreement_equity_value
    kind: parameter
    dtype: Money
    unit: USD
    source: POE 802(4) ("Equity value of a bona fide funeral agreement")
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-08-resource-eligibility-standards/802
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          bona_fide_funeral_agreement_equity_value

  - name: federally_excluded_resources_value
    kind: parameter
    dtype: Money
    unit: USD
    source: POE 802(5) ("Resources excluded by express provision of federal statute")
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-08-resource-eligibility-standards/802
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          resources_excluded_by_federal_statute_value

  - name: tax_preferred_education_and_retirement_accounts_value
    kind: parameter
    dtype: Money
    unit: USD
    source: POE 802(5)(ag) ("All tax-preferred education accounts and retirement accounts")
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-08-resource-eligibility-standards/802
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          tax_preferred_education_and_retirement_account_balances

  - name: total_excluded_resources
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: POE 802 (resources excluded from the resource determination)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-08-resource-eligibility-standards/802
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          nonliquid_resources_value
          + vehicles_value
          + jointly_owned_with_categorically_eligible_value
          + inaccessible_resources_value
          + prorated_income_resources_value
          + funeral_agreement_equity_value
          + federally_excluded_resources_value
          + tax_preferred_education_and_retirement_accounts_value
