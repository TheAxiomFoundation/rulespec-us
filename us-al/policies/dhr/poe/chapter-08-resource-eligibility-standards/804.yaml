format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-al/manual/dhr/poe/chapter-08-resource-eligibility-standards/804
  summary: |-
    Households which have transferred liquid resources knowingly for the purpose of qualifying or attempting to qualify for food assistance benefits shall be disqualified from participation in the program for up to 1 year from the date of the discovery of the transfer. This disqualification period shall be applied if the resources are transferred knowingly in the 3-month period prior to application. For households previously determined ineligible because of lottery and gambling winnings in the amount of $4500 or more, the transfer of resources to become eligible must be discussed. The disqualification chart: $0 to $249 = 1 month; $250 to $999 = 3 months; $1,000 to $2,999 = 6 months; $3,000 to $4,999 = 9 months; $5,000 and up = 12 months. Transfer of resources disqualification does not apply for resources that would not otherwise affect eligibility, resources sold/traded at or near fair market value, resources transferred between members of the same household, or resources transferred for reasons other than qualifying for food assistance.
rules:
  - name: transfer_lookback_period_months
    kind: parameter
    dtype: Integer
    source: AL DHR POE 804 - "transferred within the 3-month period immediately preceding the date of application"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-08-resource-eligibility-standards/804
              excerpt: "3-month period immediately preceding the date of application"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          3
  - name: lottery_gambling_winnings_threshold
    kind: parameter
    dtype: Money
    unit: USD
    source: AL DHR POE 804 - "lottery and gambling winnings in the amount of $4500 or more"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-08-resource-eligibility-standards/804
              excerpt: "lottery and gambling winnings in the amount of $4500 or more"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          4500
  - name: disqualification_band_lower_threshold_1
    kind: parameter
    dtype: Money
    unit: USD
    source: AL DHR POE 804 disqualification chart - "$250 to $999"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-08-resource-eligibility-standards/804
              excerpt: "$250 to $999 3 months"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          250
  - name: disqualification_band_lower_threshold_2
    kind: parameter
    dtype: Money
    unit: USD
    source: AL DHR POE 804 disqualification chart - "$1,000 to $2,999"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-08-resource-eligibility-standards/804
              excerpt: "$1,000 to $2,999 6 months"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1000
  - name: disqualification_band_lower_threshold_3
    kind: parameter
    dtype: Money
    unit: USD
    source: AL DHR POE 804 disqualification chart - "$3,000 to $4,999"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-08-resource-eligibility-standards/804
              excerpt: "$3,000 to $4,999 9 months"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          3000
  - name: disqualification_band_lower_threshold_4
    kind: parameter
    dtype: Money
    unit: USD
    source: AL DHR POE 804 disqualification chart - "$5,000 and up"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-08-resource-eligibility-standards/804
              excerpt: "$5,000 and up 12 months"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          5000
  - name: disqualification_months_band_0
    kind: parameter
    dtype: Integer
    source: AL DHR POE 804 disqualification chart - "0 to $249 1 month"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-08-resource-eligibility-standards/804
              excerpt: "0 to $249 1 month"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1
  - name: disqualification_months_band_1
    kind: parameter
    dtype: Integer
    source: AL DHR POE 804 disqualification chart - "$250 to $999 3 months"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-08-resource-eligibility-standards/804
              excerpt: "$250 to $999 3 months"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          3
  - name: disqualification_months_band_2
    kind: parameter
    dtype: Integer
    source: AL DHR POE 804 disqualification chart - "$1,000 to $2,999 6 months"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-08-resource-eligibility-standards/804
              excerpt: "$1,000 to $2,999 6 months"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          6
  - name: disqualification_months_band_3
    kind: parameter
    dtype: Integer
    source: AL DHR POE 804 disqualification chart - "$3,000 to $4,999 9 months"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-08-resource-eligibility-standards/804
              excerpt: "$3,000 to $4,999 9 months"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          9
  - name: disqualification_months_band_4
    kind: parameter
    dtype: Integer
    source: AL DHR POE 804 disqualification chart - "$5,000 and up 12 months"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-08-resource-eligibility-standards/804
              excerpt: "$5,000 and up 12 months"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          12
  - name: amount_in_excess_of_resource_limit
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: AL DHR POE 804 - "amount by which non-exempt transferred resources, when added to other countable resources, exceeds the allowable resource limits"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-08-resource-eligibility-standards/804
              excerpt: "The length of the disqualification period shall be based on the amount by which non-exempt transferred resources, when added to other countable resources, exceeds the allowable resource limits"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          max(0, non_exempt_transferred_resources_amount + other_countable_resources_amount - allowable_resource_limit)
  - name: transfer_resource_exception_applies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: AL DHR POE 804 - "TRANSFER OF RESOURCES NOT AFFECTING ELIGIBILITY"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-08-resource-eligibility-standards/804
              excerpt: "Resources which would not otherwise affect eligibility ... Resources which are sold or traded at, or near, fair market value ... Resources which are transferred between members of the same household ... Resources which are transferred for reasons other than qualifying or attempting to qualify for food assistance benefits"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          transferred_resources_would_not_otherwise_affect_eligibility
          or resources_sold_or_traded_at_or_near_fair_market_value
          or resources_transferred_between_members_of_same_household
          or resources_transferred_for_reasons_other_than_qualifying_for_food_assistance
  - name: household_knowingly_transferred_resources_to_qualify
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: AL DHR POE 804 - "Households which have transferred liquid resources knowingly for the purpose of qualifying or attempting to qualify for food assistance benefits"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-08-resource-eligibility-standards/804
              excerpt: "Households which have transferred liquid resources knowingly for the purpose of qualifying or attempting to qualify for food assistance benefits shall be disqualified"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (resources_knowingly_transferred_in_3_month_period_prior_to_application
            or resources_knowingly_transferred_after_household_certified)
          and not transfer_resource_exception_applies
  - name: transfer_of_resources_disqualification_applies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: AL DHR POE 804 - "shall be disqualified from participation in the program"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-08-resource-eligibility-standards/804
              excerpt: "shall be disqualified from participation in the program for up to 1 year from the date of the discovery of the transfer"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_knowingly_transferred_resources_to_qualify
  - name: transfer_of_resources_disqualification_period_months
    kind: derived
    entity: Household
    dtype: Integer
    period: Month
    source: AL DHR POE 804 - disqualification chart based on amount in excess of resource limit
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-08-resource-eligibility-standards/804
              excerpt: "Amount in Excess of the Resource Limit Period of Disqualification 0 to $249 1 month $250 to $999 3 months $1,000 to $2,999 6 months $3,000 to $4,999 9 months $5,000 and up 12 months"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if not transfer_of_resources_disqualification_applies: 0 else: if amount_in_excess_of_resource_limit >= disqualification_band_lower_threshold_4: disqualification_months_band_4 else: if amount_in_excess_of_resource_limit >= disqualification_band_lower_threshold_3: disqualification_months_band_3 else: if amount_in_excess_of_resource_limit >= disqualification_band_lower_threshold_2: disqualification_months_band_2 else: if amount_in_excess_of_resource_limit >= disqualification_band_lower_threshold_1: disqualification_months_band_1 else: disqualification_months_band_0
