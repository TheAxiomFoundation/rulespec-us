format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-al/manual/dhr/poe/chapter-14-recertification/1403
  summary: |-
    The county department shall act to provide uninterrupted benefits to any household
    determined eligible when the household timely filed an application, attended an
    interview in accordance with Section 1402 B, and submitted all necessary verification
    within 10 days from the county department's request for the verification. Time
    standards include 30 calendar days after the last allotment opportunity for
    one-month/second-month-of-two-month certifications, action by end of current
    certification period for other households, and 5 working days after missing
    verification is supplied for late-determined households. Reopening is allowed if
    verification is received by end of calendar month following the end of the
    certification period, provided the household was interviewed during the last month
    of the current certification period.
rules:
  - name: verification_submission_days
    kind: parameter
    dtype: Integer
    source: Section 1403 ("within 10 days from the county department's request for the verification")
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-14-recertification/1403
              excerpt: "within 10 days from the county department's request for the verification"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10
  - name: notification_calendar_days_after_last_allotment
    kind: parameter
    dtype: Integer
    source: Section 1403(1) ("no later than 30 calendar days after the date the household had an opportunity to obtain its last allotment")
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-14-recertification/1403
              excerpt: "no later than 30 calendar days after the date the household had an opportunity to obtain its last allotment"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30
  - name: opportunity_to_participate_working_days_after_verification
    kind: parameter
    dtype: Integer
    source: Section 1403(3) ("within 5 working days after the household supplies the missing verification")
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-14-recertification/1403
              excerpt: "within 5 working days after the household supplies the missing verification"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          5
  - name: household_entitled_to_uninterrupted_benefits
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Section 1403 (county department shall act to provide uninterrupted benefits when household timely filed application, attended interview per Section 1402 B, and submitted verification within 10 days)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-14-recertification/1403
              excerpt: "shall act to provide uninterrupted benefits to any household determined eligible when the household timely filed an application, attended an interview in accordance with Section 1402 B, and submitted all necessary verification within 10 days"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_determined_eligible_for_recertification
          and household_timely_filed_application
          and household_attended_interview_under_section_1402_b
          and household_submitted_verification_within_required_days
  - name: household_application_may_be_reopened
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Section 1403(5) (timely applications may be reopened if verification is received by end of calendar month following the end of the certification period, provided the household was interviewed during the last month of the current certification period; application will not be reopened if the household failed to keep an interview appointment scheduled before the end of the current certification period)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-14-recertification/1403
              excerpt: "Timely applications may be reopened if the requested verification is received by the end of the calendar month following the end of the certification period, provided the household was interviewed during the last month of the current certification period."
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-14-recertification/1403
              excerpt: "The application will not be reopened if the household failed to keep an interview appointment scheduled before the end of the current certification period."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_timely_filed_application
          and household_interviewed_during_last_month_of_certification_period
          and household_provided_verification_within_month_following_certification_period
          and not household_failed_to_keep_interview_before_end_of_certification_period
