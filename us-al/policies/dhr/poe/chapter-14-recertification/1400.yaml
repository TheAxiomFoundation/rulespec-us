  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-al/manual/dhr/poe/chapter-14-recertification/1400
  summary: |-
    The county department shall complete the application process if the household meets all requirements and approve or deny timely applications for recertification prior to the end of the household's current certification period. Eligible households shall be provided an opportunity to participate by their normal issuance cycle in the month following the end of their current certification period. The household loses its right to uninterrupted benefits when it fails to: (1) attend any interview scheduled on or after the deadline for timely filing as given in Section 1403; or (2) submit all necessary verification within the time frame established in Section 1402 C as long as the time frame elapses after the deadline for filing a timely application. The household shall not be denied at that time unless it refuses to cooperate. If otherwise eligible after correcting failures, benefits shall be provided within 30 days after the date the application was filed. Denials shall be completed by the end of the current certification period or within 30 days after the date the application was filed. The county department shall not continue benefits beyond the end of the certification period unless the household has been recertified. The joint processing requirements in Section 209 A for PA households shall continue to apply.
  deferred_outputs:
    - output: us-al:policies/dhr/poe/chapter-14-recertification/1400#recertification_processing_requirements
      reason: |-
        Source is an administrative processing/duty clause that directs the county department to complete application processing, approve or deny timely, provide opportunity to participate, and apply joint processing requirements. The operative computational conditions depend on Section 1403 (deadline for timely filing of recertification application), Section 1402 C (verification time frame), and Section 209 A (joint processing requirements for PA households), none of which are available as imported RuleSpec sources. Encoding numeric thresholds or eligibility conditions locally would require inventing the cited mechanics.
