format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-al/manual/dhr/poe/chapter-14-recertification/1402
  summary: 'Timely recertification applications: 15 days from Notice of Expiration
    for one-month or second-month-of-two certifications; otherwise filed between the
    first and 15th day of the last month. Households must be allowed a minimum of
    10 days to provide required verification. Eligible households not determined by
    end of certification period due to verification time receive opportunity to participate
    within 5 working days after submitting missing verification, with no proration.
    After a missed appointment, household has until the 30th day after the certification
    period ends to complete required actions for recertification without a new application.'
  deferred_outputs:
  - output: us-al:policies/dhr/poe/chapter-14-recertification/1402#household_entitled_to_uninterrupted_benefits
    reason: Generated rule used a local name that collides with a sibling RuleSpec
      export. This output is deferred until it can be encoded with a semantic branch-specific
      name without creating ambiguous sibling imports.
rules:
- name: days_to_file_timely_after_notice_of_expiration
  kind: parameter
  dtype: Integer
  source: Section 1402.A
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-al/manual/dhr/poe/chapter-14-recertification/1402
          excerpt: shall have 15 days from the date the Notice of Expiration is received
            to file a timely application for recertification
  versions:
  - effective_from: '0001-01-01'
    formula: '15'
- name: last_day_of_last_month_for_timely_filing
  kind: parameter
  dtype: Integer
  source: Section 1402.A
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-al/manual/dhr/poe/chapter-14-recertification/1402
          excerpt: between the first day and by the 15th day of the last month of
            the certification period
  versions:
  - effective_from: '0001-01-01'
    formula: '15'
- name: minimum_days_to_provide_verification
  kind: parameter
  dtype: Integer
  source: Section 1402.C
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-al/manual/dhr/poe/chapter-14-recertification/1402
          excerpt: The household must be allowed a minimum of 10 days to provide required
            verification information
  versions:
  - effective_from: '0001-01-01'
    formula: '10'
- name: working_days_to_provide_opportunity_to_participate
  kind: parameter
  dtype: Integer
  source: Section 1402.C
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-al/manual/dhr/poe/chapter-14-recertification/1402
          excerpt: opportunity to participate, if eligible, within 5 working days
            after the household submits the missing verification
  versions:
  - effective_from: '0001-01-01'
    formula: '5'
- name: days_after_certification_period_ends_to_complete_recertification
  kind: parameter
  dtype: Integer
  source: Section 1402.D
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-al/manual/dhr/poe/chapter-14-recertification/1402
          excerpt: until the 30th day from the date the certification period ended
            to complete all required actions for recertification without a new application
  versions:
  - effective_from: '0001-01-01'
    formula: '30'
- name: timely_recertification_application_filed
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: Section 1402.A
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-al/manual/dhr/poe/chapter-14-recertification/1402
          excerpt: All households that are certified for one month or certified for
            two months in the second month of certification shall have 15 days from
            the date the Notice of Expiration is received to file a timely application
            for recertification. All other households who submit identifiable applications
            between the first day and by the 15th day of the last month of the certification
            period shall be considered to have filed a timely application for recertification.
            An identifiable recertification application must include a signature and
            a date.
  versions:
  - effective_from: '0001-01-01'
    formula: "application_is_identifiable_with_signature_and_date\nand (\n  (\n  \
      \  household_is_short_certification_eligible_for_notice_window\n    and application_filed_within_15_days_of_notice_of_expiration\n\
      \  )\n  or (\n    not household_is_short_certification_eligible_for_notice_window\n\
      \    and application_filed_between_first_and_fifteenth_of_last_month\n  )\n)"
- name: opportunity_to_participate_within_5_working_days
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: Section 1402.C
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-al/manual/dhr/poe/chapter-14-recertification/1402
          excerpt: Any household whose eligibility is not determined by the end of
            its current certification period due to the time period allowed for submitting
            any missing verification shall receive an opportunity to participate,
            if eligible, within 5 working days after the household submits the missing
            verification and benefits cannot be prorated.
  versions:
  - effective_from: '0001-01-01'
    formula: 'household_is_eligible_after_recertification

      and eligibility_not_determined_by_end_of_certification_period_due_to_verification_time

      and household_submitted_missing_verification'
- name: benefits_must_not_be_prorated
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: Section 1402.C and 1402.D
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-al/manual/dhr/poe/chapter-14-recertification/1402
          excerpt: benefits cannot be prorated
  versions:
  - effective_from: '0001-01-01'
    formula: "(\n  eligibility_not_determined_by_end_of_certification_period_due_to_verification_time\n\
      \  and household_submitted_missing_verification\n)\nor (\n  second_interview_scheduled_before_end_of_certification_period\n\
      \  and verifications_received_on_or_before_10th_day\n)\nor (\n  second_interview_scheduled_after_end_of_certification_period\n\
      \  and household_attended_second_interview\n  and verifications_provided_by_10th_day_after_interview\n\
      )"
- name: application_denied_for_failure_to_provide_verification
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: Section 1402.D
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-al/manual/dhr/poe/chapter-14-recertification/1402
          excerpt: If the verifications are not received on or before the 10th day,
            the case must be denied on the 10th day for failure to provide verification.
  versions:
  - effective_from: '0001-01-01'
    formula: 'household_requested_second_appointment_on_or_before_end_of_certification_period

      and second_interview_scheduled_before_end_of_certification_period

      and not verifications_received_on_or_before_10th_day'
- name: application_denied_for_missing_appointments
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: Section 1402.D
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-al/manual/dhr/poe/chapter-14-recertification/1402
          excerpt: If the household does not request a second appointment by the date
            the certification period ends, the application must be denied for missing
            appointments.
  versions:
  - effective_from: '0001-01-01'
    formula: "household_missed_scheduled_interview\nand (\n  not household_requested_second_appointment_on_or_before_end_of_certification_period\n\
      \  or (\n    second_interview_scheduled_after_end_of_certification_period\n\
      \    and not household_attended_second_interview\n  )\n)"
- name: new_application_not_required_within_30_days
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: Section 1402.D
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-al/manual/dhr/poe/chapter-14-recertification/1402
          excerpt: The household has until the 30th day from the date the certification
            period ended to complete all required actions for recertification without
            a new application.
  versions:
  - effective_from: '0001-01-01'
    formula: household_makes_contact_within_30_days_after_certification_period_ends
- name: case_reopened_with_prorated_benefits
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: Section 1402.D
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-al/manual/dhr/poe/chapter-14-recertification/1402
          excerpt: If the household provides the requested verifications on or before
            the 30th day from the date the original certification period ended, the
            case must be reopened and the benefits must be prorated from the date
            the household completes all required actions for recertification.
  versions:
  - effective_from: '0001-01-01'
    formula: 'application_denied_for_missing_appointments

      and household_makes_contact_within_30_days_after_certification_period_ends

      and verifications_provided_within_30_days_after_certification_period_ends'
