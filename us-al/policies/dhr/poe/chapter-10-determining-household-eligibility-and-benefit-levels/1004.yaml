  summary: 'Calculating Net Income: add gross earned and unearned income minus exclusions;
    subtract 20% earned income deduction; standard deduction; excess medical (over
    $35) for entitled households; dependent care; legally obligated child support;
    compute excess shelter cost = total shelter minus 50% of remaining income, capped
    (or uncapped for entitled households). Allotment = Thrifty Food Plan minus 30%
    of net monthly income. Initial-month allotments less than $10 are not issued.
    Rounding: down for 1-49 cents, up for 50-99 cents.'
