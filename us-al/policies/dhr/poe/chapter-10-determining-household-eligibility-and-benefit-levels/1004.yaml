rules:
- name: excess_medical_threshold
  kind: parameter
  dtype: Money
  unit: USD
  source: Section 1004 A.4 "medical expenses in excess of $35"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-al/manual/dhr/poe/chapter-10-determining-household-eligibility-and-benefit-levels/1004
          excerpt: medical expenses in excess of $35 shall be subtracted
  versions:
  - effective_from: '0001-01-01'
    formula: '35'
- name: shelter_income_share
  kind: parameter
  dtype: Rate
  source: Section 1004 A.7.b "Subtract from the total shelter costs 50% of the household's
    monthly income"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-al/manual/dhr/poe/chapter-10-determining-household-eligibility-and-benefit-levels/1004
          excerpt: Subtract from the total shelter costs 50% of the household's monthly
            income
  versions:
  - effective_from: '0001-01-01'
    formula: '0.50'
- name: benefit_reduction_rate
  kind: parameter
  dtype: Rate
  source: Section 1004 B "Thrifty Food Plan for the household's size reduced by 30%
    of the household's net monthly income"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-al/manual/dhr/poe/chapter-10-determining-household-eligibility-and-benefit-levels/1004
          excerpt: Thrifty Food Plan for the household's size reduced by 30% of the
            household's net monthly income
  versions:
  - effective_from: '0001-01-01'
    formula: '0.30'
- name: minimum_initial_month_allotment
  kind: parameter
  dtype: Money
  unit: USD
  source: Section 1004 B "an allotment of less than $10 no benefits shall be issued"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-al/manual/dhr/poe/chapter-10-determining-household-eligibility-and-benefit-levels/1004
          excerpt: When the calculation of benefits for an initial month yields an
            allotment of less than $10 no benefits shall be issued
  versions:
  - effective_from: '0001-01-01'
    formula: '10'
- name: destitute_new_source_income_threshold
  kind: parameter
  dtype: Money
  unit: USD
  source: Section 1004 C.4 "income of more than $25 from the new source"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-al/manual/dhr/poe/chapter-10-determining-household-eligibility-and-benefit-levels/1004
          excerpt: income of more than $25 from the new source will not be received
            by the 10th calendar day
  versions:
  - effective_from: '0001-01-01'
    formula: '25'
- name: destitute_new_source_days
  kind: parameter
  dtype: Integer
  source: Section 1004 C.4 "by the 10th calendar day after the date of application"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-al/manual/dhr/poe/chapter-10-determining-household-eligibility-and-benefit-levels/1004
          excerpt: by the 10th calendar day after the date of application
  versions:
  - effective_from: '0001-01-01'
    formula: '10'
- name: destitute_household
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: Section 1004 C
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: predicate
        source:
          corpus_citation_path: us-al/manual/dhr/poe/chapter-10-determining-household-eligibility-and-benefit-levels/1004
          excerpt: Migrant or seasonal farm worker households... Households other
            than migrant or seasonal farm worker households shall not be classified
            as destitute.
  versions:
  - effective_from: '0001-01-01'
    formula: 'household_is_migrant_or_seasonal_farm_worker

      and (only_income_from_terminated_source or only_income_from_new_source_delayed
      or both_terminated_and_delayed_new_source)'
