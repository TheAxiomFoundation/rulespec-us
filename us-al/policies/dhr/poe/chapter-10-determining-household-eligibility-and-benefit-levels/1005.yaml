format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-al/manual/dhr/poe/chapter-10-determining-household-eligibility-and-benefit-levels/1005
  summary: |-
    The county department shall establish a definite period of time within which a household shall be eligible to receive benefits. Households must be assigned the longest certification period possible based on the predictability of the household's circumstances. (1) one or two month certification periods when likely to become ineligible in near future; (2) simplified reporting households assigned 12 months (ABAWDS, migrant/seasonal farm workers, homeless, residents of drug and alcoholic treatment centers, students); (3) stable income households, particularly with elderly or disabled adult members, certified for 12 months; (4) all members in single FA grant certified for up to 12 months; (5) all members coded with work registration code "J" assigned 4 months.
rules:
  - name: simplified_reporting_certification_period_months
    kind: parameter
    dtype: Count
    source: Section 1005, Guideline 2 - simplified reporting at certification 12 months
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-10-determining-household-eligibility-and-benefit-levels/1005
              excerpt: "Households subject to simplified reporting at certification should be assigned a certification period of 12 months."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          12
  - name: stable_income_certification_period_months
    kind: parameter
    dtype: Count
    source: Section 1005, Guideline 3 - stable income elderly/disabled 12 months
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-10-determining-household-eligibility-and-benefit-levels/1005
              excerpt: "Households with stable income, particularly households with elderly or disabled adult members, should be certified for 12 months"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          12
  - name: single_fa_grant_certification_period_max_months
    kind: parameter
    dtype: Count
    source: Section 1005, Guideline 4 - single FA grant up to 12 months
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-10-determining-household-eligibility-and-benefit-levels/1005
              excerpt: "Households in which all members are included in a single FA grant should be certified for up to 12 months."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          12
  - name: work_registration_code_j_certification_period_months
    kind: parameter
    dtype: Count
    source: Section 1005, Guideline 5 - work registration code J 4 months
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-10-determining-household-eligibility-and-benefit-levels/1005
              excerpt: "Households with all members coded with a work registration code \"J\" should be assigned a certification period of 4 months."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          4
  - name: short_certification_period_min_months
    kind: parameter
    dtype: Count
    source: Section 1005, Guideline 1 - one or two month certification periods
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-10-determining-household-eligibility-and-benefit-levels/1005
              excerpt: "Households may be assigned one or two month certification periods when it appears likely the household will become ineligible for food assistance in the near future."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1
  - name: short_certification_period_max_months
    kind: parameter
    dtype: Count
    source: Section 1005, Guideline 1 - one or two month certification periods
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-10-determining-household-eligibility-and-benefit-levels/1005
              excerpt: "Households may be assigned one or two month certification periods when it appears likely the household will become ineligible for food assistance in the near future."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          2
  - name: assigned_certification_period_months
    kind: derived
    entity: Household
    dtype: Count
    period: Month
    source: Section 1005 - Guidelines for Establishing the Length of Certification Periods
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-al/manual/dhr/poe/chapter-10-determining-household-eligibility-and-benefit-levels/1005
              excerpt: "Households must be assigned the longest certification period possible based on the predictability of the household's circumstances."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if household_all_members_work_registration_code_j: work_registration_code_j_certification_period_months else: if household_subject_to_simplified_reporting: simplified_reporting_certification_period_months else: if household_all_members_in_single_fa_grant: single_fa_grant_certification_period_max_months else: if household_has_stable_income: stable_income_certification_period_months else: if household_likely_to_become_ineligible_near_future: short_certification_period_max_months else: simplified_reporting_certification_period_months
