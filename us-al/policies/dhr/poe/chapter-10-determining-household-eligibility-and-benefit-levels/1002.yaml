format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-al/manual/dhr/poe/chapter-10-determining-household-eligibility-and-benefit-levels/1002
  summary: For prospectively budgeted households, the county department shall budget
    income by anticipating income reasonably certain to be received. Income received
    more frequently than monthly must be converted to a monthly amount using the appropriate
    conversion factors of 4.3 for income received weekly, 2.15 for biweekly income,
    and 2 for income received on a semi-monthly basis. A minimum of two months of
    income must be used to determine an average. Households which by contract or self-employment
    derive their annual income in a period of time shorter than one year shall have
    that income averaged over a 12-month period (not applicable to migrant or seasonal
    farm work income, or income received on an hourly/piecework basis).
rules:
- name: semi_monthly_to_monthly_conversion_factor
  kind: parameter
  dtype: Decimal
  source: "Chapter 10, Section 1002 C (Income Averaging) \u2014 \"2 for income received\
    \ on a semi-monthly basis\""
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-al/manual/dhr/poe/chapter-10-determining-household-eligibility-and-benefit-levels/1002
          excerpt: 2 for income received on a semi-monthly basis
  versions:
  - effective_from: '0001-01-01'
    formula: '2'
- name: minimum_months_for_income_averaging
  kind: parameter
  dtype: Integer
  source: "Chapter 10, Section 1002 C (Income Averaging) \u2014 \"A minimum of two\
    \ months of income must be used to determine an average\""
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-al/manual/dhr/poe/chapter-10-determining-household-eligibility-and-benefit-levels/1002
          excerpt: A minimum of two months of income must be used to determine an
            average
  versions:
  - effective_from: '0001-01-01'
    formula: '2'
- name: contract_self_employment_averaging_period_months
  kind: parameter
  dtype: Integer
  source: "Chapter 10, Section 1002 C \u2014 \"shall have that income averaged over\
    \ a 12-month period\""
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-al/manual/dhr/poe/chapter-10-determining-household-eligibility-and-benefit-levels/1002
          excerpt: shall have that income averaged over a 12-month period
  versions:
  - effective_from: '0001-01-01'
    formula: '12'
- name: monthly_income_from_weekly
  kind: derived
  entity: Household
  dtype: Money
  period: Month
  unit: USD
  source: "Chapter 10, Section 1002 C \u2014 weekly-to-monthly conversion using factor\
    \ 4.3"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-al/manual/dhr/poe/chapter-10-determining-household-eligibility-and-benefit-levels/1002
          excerpt: 4.3 for income received weekly
  versions:
  - effective_from: '0001-01-01'
    formula: weekly_income_amount * weekly_to_monthly_conversion_factor
- name: monthly_income_from_biweekly
  kind: derived
  entity: Household
  dtype: Money
  period: Month
  unit: USD
  source: "Chapter 10, Section 1002 C \u2014 biweekly-to-monthly conversion using\
    \ factor 2.15"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-al/manual/dhr/poe/chapter-10-determining-household-eligibility-and-benefit-levels/1002
          excerpt: 2.15 for biweekly income
  versions:
  - effective_from: '0001-01-01'
    formula: biweekly_income_amount * biweekly_to_monthly_conversion_factor
- name: monthly_income_from_semi_monthly
  kind: derived
  entity: Household
  dtype: Money
  period: Month
  unit: USD
  source: "Chapter 10, Section 1002 C \u2014 semi-monthly-to-monthly conversion using\
    \ factor 2"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-al/manual/dhr/poe/chapter-10-determining-household-eligibility-and-benefit-levels/1002
          excerpt: 2 for income received on a semi-monthly basis
  versions:
  - effective_from: '0001-01-01'
    formula: semi_monthly_income_amount * semi_monthly_to_monthly_conversion_factor
- name: contract_or_self_employment_income_averaging_applies
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: "Chapter 10, Section 1002 C \u2014 averaging over 12 months applies to households\
    \ that by contract or self-employment derive annual income over a period shorter\
    \ than one year, excluding hourly/piecework contracts and migrant or seasonal\
    \ farm work income"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-al/manual/dhr/poe/chapter-10-determining-household-eligibility-and-benefit-levels/1002
          excerpt: Households which by contract or self-employment derive their annual
            income in a period of time shorter than one year shall have that income
            averaged over a 12-month period provided the income from the contract
            is not received on an hourly or piecework basis. ... The above provisions
            for averaging income from contract or self-employment do not apply to
            migrant or seasonal farm work income.
  versions:
  - effective_from: '0001-01-01'
    formula: 'household_derives_annual_income_by_contract_or_self_employment

      and household_annual_income_period_shorter_than_one_year

      and not household_contract_income_is_hourly_or_piecework

      and not household_income_is_migrant_or_seasonal_farm_work'
imports:
- us-al:policies/dhr/poe/chapter-10-determining-household-eligibility-and-benefit-levels/1003#biweekly_to_monthly_conversion_factor
- us-al:policies/dhr/poe/chapter-10-determining-household-eligibility-and-benefit-levels/1003#weekly_to_monthly_conversion_factor
