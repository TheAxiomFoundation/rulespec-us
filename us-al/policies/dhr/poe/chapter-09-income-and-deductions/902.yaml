  status: deferred
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-al/manual/dhr/poe/chapter-09-income-and-deductions/902
  summary: |-
    Section 902 enumerates the exclusive list of items excluded from household income for the
    Alabama Food Assistance Program, including: vendor payments (non-money/in-kind benefits,
    third-party rent/mortgage/child-care payments); federal energy assistance and one-time
    weatherization payments; PA/GA vendor payments for medical, child care, utility/energy,
    housing, and emergency migrant assistance; nonrecurring lump-sum payments; PASS income;
    irregular income under $30/quarter; student financial assistance; WIOA allowances;
    reimbursements for identified non-living expenses; care/maintenance funds for non-household
    third-party beneficiaries; earned income of school-attending children under 18; cost of
    producing self-employment income; numerous federally-mandated exclusions (Indian tribal
    payments, disaster relief, NCSA/AmeriCorps, Agent Orange, Radiation Exposure Compensation,
    Japanese/Aleut wartime relocation, Nazi persecution victim payments, NFIP, RSVP/VISTA,
    school lunch/WIC, military combat-zone pay, JOBS/TCC child care, etc.); LIHEAA payments;
    Older Americans Act Title V senior employment; cash charitable contributions up to $300
    aggregate per quarter; certain FA dependent-care adjustments; foster care payments for
    non-members; valid loans; non-cashable employer credits; and additional combat-zone pay.
  deferred_outputs:
    - output: us-al:policies/dhr/poe/chapter-09-income-and-deductions/902#excluded_household_income
      reason: |-
        Section 902 is an exhaustive enumeration of income exclusions for Alabama food
        assistance. Faithful encoding requires source-stated upstream definitions
        (POE Section 901A on-the-job training earnings; Section 1100 cost-of-producing
        self-employment income; the "Glossary Manual" definitions of Public Assistance,
        General Assistance, energy assistance, and migrant/seasonal farm worker households;
        the AL Food Assistance Program's underlying income-counting rule that this section
        would offset). None of those upstream RuleSpec sources are present in the supplied
        context, and the section itself references dozens of federal statutes
        (P.L. 93-288 §312(d), P.L. 100-707 §105(i), P.L. 101-500 §5105(a), P.L. 89-642 §11(b),
        P.L. 95-608 (25 USCS 1931), P.L. 103-66 §13736, P.L. 103-322 §230202, etc.) whose
        executable mechanics are not available. The list is not severable into independent
        executable surfaces without those dependencies, since each exclusion modifies the
        common "household income" base defined elsewhere in the POE.
