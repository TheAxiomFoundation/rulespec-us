    corpus_citation_path: us-al/manual/dhr/poe/chapter-09-income-and-deductions/901
  summary: |-
    Household income shall mean all income from whatever source excluding only items specified in Section 903. Earned income includes wages and salaries (including sick pay when wages continue), gross self-employment income (including rental property where a household member is actively engaged at least 20 hours/week and roomer/boarder payments), jury duty pay, training allowances (excluding WIOA reimbursements), Title I Domestic Volunteer Service Act payments, WIOA on-the-job training earnings (excluding household members under 19 under parental control), payments for sale of blood, cafeteria plan diversions, military special pay and allowances including BAQ, and FSSA. Unearned income includes assistance payments (SSI, FA, GA), annuities/pensions/retirement/VA/disability/workers compensation/unemployment/social security/strike benefits, passive rental income, foster care payments, Agent Orange veterans payments, support/alimony, government dividends/interest/royalties, trust withdrawals, guardianship/conservatorship payments, insurance payments to landlord when household is beneficiary, non-employer disability payments, and deemed sponsor income. Certain income withholdings are not counted: repayment withholdings (unless from another means-tested program due to noncompliance or client-error overpayment) and FA recipient child support transferred to DHR.
  deferred_outputs:
    - output: us-al:policies/dhr/poe/chapter-09-income-and-deductions/901#household_income
      reason: |-
        Defining household income requires importing the Section 903 exclusion list to subtract excluded items, plus Section 1100 self-employment cost-of-doing-business rules, Section 902 vendor payment and exclusion provisions, Sections 129 and 134 of WIOA, Section 902(14) FA proration, Section 1108 sponsor income deeming, Sections 1102/1103 non-household member income handling, and Section 1110 means-tested program overpayment recovery rules. None of these upstream RuleSpec sources are available in the supplied context, and the source text itself only enumerates inclusion/exclusion categories that depend on those cross-references for executable computation.
