  summary: |-
    Homeless food assistance households shall be permitted to use their food assistance benefits to purchase prepared meals from homeless meal providers (public or private nonprofit establishments such as soup kitchens or temporary shelters approved by DHR and USDA) and from restaurants approved by DHR and USDA. The provision sets administrative responsibilities for meal providers, restaurants, and the county department (approval, application, on-site visits, contracts specifying meal prices, marking the recipient's ID card with "CD" and an expiration date, optional issuance of monthly allotment in $2.00 books). Meal providers may not redeem food stamps for cash and may not serve as authorized representative for the homeless food assistance household.
