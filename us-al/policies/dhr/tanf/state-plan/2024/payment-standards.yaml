format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-al/policy/dhr/tanf/state-plan/2024
    upstream_source_check:
      status: official_parameter_source
      checked_paths:
        - us:statutes/social-security-act/402
      rationale: |-
        The source is Alabama's TANF State Plan, issued by the administering agency, and Attachment E sets the state-specific Family Assistance Program payment standards. Section 402 is the federal plan authority; the state plan is the official source for these state payment parameters.
  summary: |-
    Alabama's renewal plan is effective October 1, 2024. FINANCIAL CRITERIA - Attachment E: Cash Assistance, Monthly Maximum Payment Standards, Standards for Family Assistance Program, Assistance Unit Size Payment Standard: 1 $264; 2 $304; 3 $344; 4 $392; 5 $440; 6 $488; 7 $536; 8 $584; 9 $632; 10 $680; 11 $728; 12 $776; 13 $824; 14 $872; 15 $920; 16 $968.
rules:
  - name: al_tanf_payment_standard_min_assistance_unit_size
    kind: parameter
    dtype: Count
    source: Alabama TANF State Plan 2024, Attachment E, Cash Assistance, Monthly Maximum Payment Standards
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-al/policy/dhr/tanf/state-plan/2024
              excerpt: "Assistance Unit Size Payment Standard 1 $264"
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          1

  - name: al_tanf_payment_standard_max_assistance_unit_size
    kind: parameter
    dtype: Count
    source: Alabama TANF State Plan 2024, Attachment E, Cash Assistance, Monthly Maximum Payment Standards
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-al/policy/dhr/tanf/state-plan/2024
              excerpt: "16 $968"
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          16

  - name: al_tanf_monthly_payment_standard_by_assistance_unit_size
    kind: parameter
    dtype: Money
    unit: USD
    indexed_by: assistance_unit_size
    source: Alabama TANF State Plan 2024, Attachment E, Cash Assistance, Monthly Maximum Payment Standards
    metadata:
      proof:
        atoms:
          - path: versions[0].values
            kind: parameter_table
            source:
              corpus_citation_path: us-al/policy/dhr/tanf/state-plan/2024
              table:
                header: "STANDARDS FOR FAMILY ASSISTANCE PROGRAM"
                row_key: "Assistance Unit Size"
                column_key: "Payment Standard"
    versions:
      - effective_from: '2024-10-01'
        values:
          1: 264
          2: 304
          3: 344
          4: 392
          5: 440
          6: 488
          7: 536
          8: 584
          9: 632
          10: 680
          11: 728
          12: 776
          13: 824
          14: 872
          15: 920
          16: 968

  - name: al_tanf_payment_standard
    kind: derived
    entity: TanfUnit
    dtype: Money
    period: Month
    unit: USD
    source: Alabama TANF State Plan 2024, Attachment E, Cash Assistance, Monthly Maximum Payment Standards
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-al/policy/dhr/tanf/state-plan/2024
              excerpt: "Assistance Unit Size Payment Standard"
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/policy/dhr/tanf/state-plan/2024
              excerpt: "1 $264 ... 16 $968"
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          if assistance_unit_size >= al_tanf_payment_standard_min_assistance_unit_size and assistance_unit_size <= al_tanf_payment_standard_max_assistance_unit_size: al_tanf_monthly_payment_standard_by_assistance_unit_size[assistance_unit_size] else: 0
