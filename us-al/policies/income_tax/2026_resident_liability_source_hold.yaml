format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_paths:
      - us-al/statute/40-18-15
      - us-al/statute/40-18-19
      - us-al/statute/40-18-5
    upstream_source_check:
      status: checked_higher_authority
      checked_paths:
        - us-al/statute/40-18-15
        - us-al/statute/40-18-19
        - us-al/statute/40-18-5
      rationale: |-
        The pinned official Alabama Code supplies the individual deduction
        framework in section 40-18-15, the resident personal and dependent
        exemptions in section 40-18-19, and the complete ordinary individual
        rate schedule in section 40-18-5.

        The pinned corpus does not contain section 40-18-14 or 40-18-14.2,
        which are necessary to establish Alabama gross income, adjusted gross
        income, and the relationship between federal return outputs and the
        Alabama income base. It also contains no final tax-year-2026 Form 40,
        instructions, schedules, or complete operative credit provisions.
        Consequently, no caller-completed Alabama income, deduction,
        exemption, taxable-income, surtax, or credit amount is accepted.

        The missing income-base and annual return authorities are typed source
        holds. Every public Money stage after the federal/raw-fact boundary is
        a fail-closed zero sentinel while either hold remains active. Those
        sentinels are not legal claims that Alabama income or tax is zero. The
        separately encoded schedule pilot remains the source-complete
        section-40-18-5 calculation for a completed-return taxable-income
        boundary, but its prohibited state-stage input is not composed here.
  summary: |-
    Tax-year-2026 Alabama full-year-resident individual-income-tax
    source-held program boundary. It accepts federal adjusted gross income,
    full-year residency, filing-status facts, aligned filing-unit status, and
    a raw dependent count. It never accepts a completed Alabama income,
    deduction, exemption, taxable-income, surtax, or credit amount.

    Alabama adjusted gross income, deductions and exemptions, taxable income,
    tax before credits including applicable surtaxes, tax after
    nonrefundable credits, refundable credits, and signed net income-tax
    liability before payments all fail closed while the pinned source gaps
    remain. The program is intentionally incomplete and makes no annual
    liability or oracle-parity claim.

    Withholding, estimated payments, extension payments, penalties, interest,
    refunds of payments, filing and collection administration, local income
    taxes, nonresident sourcing, and part-year allocation are outside scope.
  deferred_outputs:
    - output: us-al:policies/income_tax/2026_resident_liability_source_hold#al_pit_2026_adjusted_gross_income
      reason: |-
        The pinned corpus lacks sections 40-18-14 and 40-18-14.2 and the final
        2026 Form 40 income instructions. Federal adjusted gross income cannot
        be transformed into Alabama adjusted gross income from the three
        pinned provisions without inventing inclusions, exclusions, or
        conformity adjustments.
      source_values:
        - us-al:policies/income_tax/2026_resident_liability_source_hold#al_pit_2026_income_base_source_hold_applies
    - output: us-al:policies/income_tax/2026_resident_liability_source_hold#al_pit_2026_deductions_and_exemptions
      reason: |-
        Sections 40-18-15 and 40-18-19 provide deduction and exemption rules,
        but their adjusted-gross-income inputs and complete 2026 return
        election and implementation chain cannot be reached while the Alabama
        income base is source held.
      source_values:
        - us-al:policies/income_tax/2026_resident_liability_source_hold#al_pit_2026_deduction_and_exemption_source_hold_applies
    - output: us-al:policies/income_tax/2026_resident_liability_source_hold#al_pit_2026_taxable_income
      reason: |-
        Alabama taxable income cannot be completed until both the Alabama
        income base and the deduction and exemption chain are source complete.
      source_values:
        - us-al:policies/income_tax/2026_resident_liability_source_hold#al_pit_2026_complete_liability_source_hold_applies
    - output: us-al:policies/income_tax/2026_resident_liability_source_hold#al_pit_2026_tax_before_credits_including_surtaxes
      reason: |-
        Section 40-18-5 supplies the regular rate schedule, but that schedule
        cannot be composed here until Alabama taxable income is source
        complete. The pinned corpus also does not establish a complete 2026
        individual surtax and specialty-tax surface.
      source_values:
        - us-al:policies/income_tax/2026_resident_liability_source_hold#al_pit_2026_tax_and_surtax_source_hold_applies
    - output: us-al:policies/income_tax/2026_resident_liability_source_hold#al_pit_2026_tax_after_nonrefundable_credits
      reason: |-
        The pinned corpus lacks the final 2026 Form 40 credit schedules and a
        complete operative nonrefundable-credit eligibility, limitation,
        ordering, and carryforward chain.
      source_values:
        - us-al:policies/income_tax/2026_resident_liability_source_hold#al_pit_2026_credit_surface_source_hold_applies
    - output: us-al:policies/income_tax/2026_resident_liability_source_hold#al_pit_2026_refundable_credits
      reason: |-
        The pinned corpus lacks the final 2026 Form 40 credit schedules and a
        complete operative refundable-credit eligibility, limitation, and
        ordering chain.
      source_values:
        - us-al:policies/income_tax/2026_resident_liability_source_hold#al_pit_2026_credit_surface_source_hold_applies
    - output: us-al:policies/income_tax/2026_resident_liability_source_hold#al_pit_2026_net_income_tax_liability_before_payments
      reason: |-
        Signed annual resident liability cannot be completed until every
        upstream income-base, deduction, exemption, tax, surtax, and credit
        source hold is cleared.
      source_values:
        - us-al:policies/income_tax/2026_resident_liability_source_hold#al_pit_2026_complete_liability_source_hold_applies

rules:
  - name: al_pit_2026_filing_status_is_valid
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: Ala. Code sections 40-18-5 and 40-18-19, individual return-status branches
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/statute/40-18-5
              excerpt: "For a single person, head of family, or married persons filing separate returns"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/statute/40-18-5
              excerpt: "For married persons filing a joint return"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          (
            al_pit_2026_filing_status_single
            and not al_pit_2026_filing_status_married_separate
            and not al_pit_2026_filing_status_joint
            and not al_pit_2026_filing_status_head_of_family
          )
          or (
            not al_pit_2026_filing_status_single
            and al_pit_2026_filing_status_married_separate
            and not al_pit_2026_filing_status_joint
            and not al_pit_2026_filing_status_head_of_family
          )
          or (
            not al_pit_2026_filing_status_single
            and not al_pit_2026_filing_status_married_separate
            and al_pit_2026_filing_status_joint
            and not al_pit_2026_filing_status_head_of_family
          )
          or (
            not al_pit_2026_filing_status_single
            and not al_pit_2026_filing_status_married_separate
            and not al_pit_2026_filing_status_joint
            and al_pit_2026_filing_status_head_of_family
          )

  - name: al_pit_2026_input_domain_is_valid
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: Ala. Code sections 40-18-5 and 40-18-19, full-year resident individual input domain
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/statute/40-18-19
              excerpt: "personal exemptions allowed resident taxpayers"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/statute/40-18-19
              excerpt: "for each person, other than husband or wife, dependent upon the taxpayer"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          al_pit_2026_is_full_year_alabama_resident_return
          and al_pit_2026_federal_and_alabama_filing_units_are_aligned
          and al_pit_2026_filing_status_is_valid
          and (
            al_pit_2026_federal_adjusted_gross_income >= 0
            or al_pit_2026_federal_adjusted_gross_income < 0
          )
          and al_pit_2026_dependent_count >= 0
          and floor(al_pit_2026_dependent_count) == al_pit_2026_dependent_count

  - name: al_pit_2026_income_base_source_hold_applies
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: Missing Alabama income-base provisions and final 2026 Form 40 income instructions
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/statute/40-18-19
              excerpt: "The following exemptions from income taxation shall be allowed to every individual resident taxpayer"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/statute/40-18-15
              excerpt: "deduction from the taxpayer’s adjusted gross income for state income tax purposes"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: true

  - name: al_pit_2026_deduction_and_exemption_source_hold_applies
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: Alabama deduction and exemption chain cannot execute while adjusted gross income is source held
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/statute/40-18-15
              excerpt: "the optional standard deduction shall be determined as follows"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/statute/40-18-19
              excerpt: "a personal exemption of one thousand five hundred dollars ($1,500)"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: al_pit_2026_income_base_source_hold_applies

  - name: al_pit_2026_tax_and_surtax_source_hold_applies
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: Regular schedule cannot execute before taxable income and the complete 2026 specialty-tax surface is not pinned
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/statute/40-18-5
              excerpt: "The tax levied and imposed by Section 40-18-2 shall be computed as follows"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          al_pit_2026_income_base_source_hold_applies
          or al_pit_2026_deduction_and_exemption_source_hold_applies

  - name: al_pit_2026_credit_surface_source_hold_applies
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: Missing final 2026 Form 40 credit schedules and complete credit ordering authority
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/statute/40-18-5
              excerpt: "The tax levied and imposed by Section 40-18-2 shall be computed as follows"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: true

  - name: al_pit_2026_complete_liability_source_hold_applies
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: Combined source hold for incomplete 2026 Alabama resident liability
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/statute/40-18-15
              excerpt: "there shall be allowed as deductions"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/statute/40-18-19
              excerpt: "The following exemptions from income taxation shall be allowed"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/statute/40-18-5
              excerpt: "The tax levied and imposed by Section 40-18-2 shall be computed as follows"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          al_pit_2026_income_base_source_hold_applies
          or al_pit_2026_deduction_and_exemption_source_hold_applies
          or al_pit_2026_tax_and_surtax_source_hold_applies
          or al_pit_2026_credit_surface_source_hold_applies

  - name: al_pit_2026_adjusted_gross_income
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Fail-closed Alabama adjusted-gross-income sentinel while the income base is source held
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-al/statute/40-18-15
              excerpt: "adjusted gross income for state income tax purposes"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: '0'

  - name: al_pit_2026_deductions_and_exemptions
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Fail-closed Alabama deduction-and-exemption sentinel while the upstream chain is source held
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-al/statute/40-18-15
              excerpt: "there shall be allowed as deductions"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-al/statute/40-18-19
              excerpt: "personal exemptions allowed resident taxpayers"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: '0'

  - name: al_pit_2026_taxable_income
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Fail-closed Alabama taxable-income sentinel while income, deductions, and exemptions are source held
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-al/statute/40-18-5
              excerpt: "taxable income"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: '0'

  - name: al_pit_2026_tax_before_credits_including_surtaxes
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Fail-closed Alabama tax-and-surtax sentinel while taxable income and the complete tax surface are source held
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-al/statute/40-18-5
              excerpt: "The tax levied and imposed by Section 40-18-2 shall be computed as follows"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: '0'

  - name: al_pit_2026_tax_after_nonrefundable_credits
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Fail-closed Alabama tax-after-nonrefundable-credits sentinel while the credit surface is source held
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-al/statute/40-18-5
              excerpt: "The tax levied and imposed by Section 40-18-2"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: '0'

  - name: al_pit_2026_refundable_credits
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Fail-closed Alabama refundable-credit sentinel while the credit surface is source held
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-al/statute/40-18-5
              excerpt: "The tax levied and imposed by Section 40-18-2"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: '0'

  - name: al_pit_2026_net_income_tax_liability_before_payments
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Fail-closed signed Alabama resident income-tax liability sentinel before payments
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-al/statute/40-18-5
              excerpt: "The tax levied and imposed by Section 40-18-2"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: '0'

inputs:
  - name: al_pit_2026_federal_adjusted_gross_income
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    description: Federal adjusted gross income from the aligned federal return; it is not a completed Alabama income amount.
  - name: al_pit_2026_is_full_year_alabama_resident_return
    entity: TaxUnit
    dtype: Judgment
    period: Year
    description: Whether the return is within this program's full-year Alabama resident scope.
  - name: al_pit_2026_federal_and_alabama_filing_units_are_aligned
    entity: TaxUnit
    dtype: Judgment
    period: Year
    description: Whether the federal return and Alabama return cover the same filing unit.
  - name: al_pit_2026_filing_status_single
    entity: TaxUnit
    dtype: Judgment
    period: Year
    description: Raw filing-status fact for a single return.
  - name: al_pit_2026_filing_status_married_separate
    entity: TaxUnit
    dtype: Judgment
    period: Year
    description: Raw filing-status fact for a married-separate return.
  - name: al_pit_2026_filing_status_joint
    entity: TaxUnit
    dtype: Judgment
    period: Year
    description: Raw filing-status fact for a married-joint return.
  - name: al_pit_2026_filing_status_head_of_family
    entity: TaxUnit
    dtype: Judgment
    period: Year
    description: Raw filing-status fact for a head-of-family return.
  - name: al_pit_2026_dependent_count
    entity: TaxUnit
    dtype: Count
    period: Year
    description: Raw count of dependents potentially relevant to section 40-18-19; no completed exemption amount is accepted.
