  input:
    us-al:policies/income_tax/pilot_liability_pipeline#input.al_pit_pilot_state_taxable_income: -1000
    us-al:policies/income_tax/pilot_liability_pipeline#input.al_pit_pilot_joint_schedule_applies: false
