format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-al/regulation/660-4/7/05/block-1
  summary: |-
    The six-month report form should be submitted to the county office by the 10th of the processing month. If not received by the 10th, an automated notice is generated after close of business on the 15th and mailed to inform the household its benefits will be terminated if the completed form is not received by the last day of the processing month.
rules:
  - name: six_month_report_form_due_day
    kind: parameter
    dtype: Integer
    source: Ala. Admin. Code 660-4-7-.05
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/regulation/660-4/7/05/block-1
              excerpt: "submitted to the county office by the 10th of the processing month"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10
  - name: six_month_report_notice_generation_day
    kind: parameter
    dtype: Integer
    source: Ala. Admin. Code 660-4-7-.05
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/regulation/660-4/7/05/block-1
              excerpt: "an automated notice is generated after the close of business on the 15th"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          15
  - name: six_month_report_notice_generated
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Ala. Admin. Code 660-4-7-.05
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/regulation/660-4/7/05/block-1
              excerpt: "If the six-month report form is not received in the county office by the 10th day of the processing month, an automated notice is generated after the close of business on the 15th"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not six_month_report_form_received_by_due_day
  - name: six_month_report_benefits_terminated
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Ala. Admin. Code 660-4-7-.05
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/regulation/660-4/7/05/block-1
              excerpt: "benefits will be terminated if the completed form is not received by the last day of the processing month"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          six_month_report_notice_generated
          and not six_month_report_form_received_by_last_day_of_processing_month
