  summary: |-
    All issuance is accounted for through a reconciliation process. SNAP benefits
    are authorized by eligibility systems (SCI-II and FACETS) and passed through
    the Alabama EBT Interface System to the EBT Contractor. The State uses
    Benefit Batch Posting Reports to ensure all benefits posted, tracks future
    date benefits via Account Management Agent (AMA) warehouse totals, receives
    a Settlement Clearing Statement for daily settlement, and draws Federal
    funds through ASAP via the State Treasury, with funds moved to the
    Contractor's clearing account on the same day as the Settlement Clearing
    Statement is received.
