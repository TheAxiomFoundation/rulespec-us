  status: deferred
  summary: |-
    Food Assistance issuance activity is contracted. EBT cards are mailed to households when initially certified and benefits are issued according to an issuance schedule based on the last two digits of the Food Assistance case number. The Department has adopted the following waivers under 7 CFR 274: (1) Retailer Participation - allow charging retailers a fee to re-install a POS device removed due to FNS disqualification when reauthorized (7 CFR 274.3(a)(2)); (2) PIN Selection via ARU/SIVR/Help Desk (7 CFR 274.8(b)(3)(ii)(C)); (3) Retailer Adjustment - No Hold/15 Calendar Day Debit (7 CFR 274.2(g)(2)(ii)); (4) Expunge Benefits for Deceased Single Person Households (7 CFR 274.2(h)(2)).
