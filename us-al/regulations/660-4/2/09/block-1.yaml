  summary: |-
    Procedures for the hearing process used in fair hearings are in the General Administration Division as Chapter 660-1-5. The county department is responsible for insuring that all final hearing decisions are reflected in the household's allotment within the time limits specified in Section 1502. When the hearing authority determines that a household has been improperly denied program benefits or has been issued a lesser allotment than was due, lost benefits shall be provided in accordance with Chapter 16. The agency shall restore benefits to households leaving the project area before the departure whenever possible. If benefits are not restored prior to the household's departure, the agency shall forward an authorization to the benefits to the household or to the new project area if this information is known. The new project area shall accept an authorization and issue the appropriate benefits whether the notice is presented by the household or received directly from another project area. When the hearing authority upholds the county department's action, a claim against the household for any over-issuance shall be prepared, except for work registration sanction. If the hearing is dismissed and benefits were continued in accordance with Section 1510 rather than the proposed reduction/termination, the county department will take the following actions:
  deferred_outputs:
    - output: us-al:regulations/660-4/2/09/block-1#hearing_decision_implementation
      reason: |-
        The source text describes administrative hearing procedures and references Section 1502 (time limits), Chapter 16 (lost benefits restoration), and Section 1510 (continued benefits). None of those cited sources are available as RuleSpec context. The source text in this block consists of administrative duty clauses (county department responsibilities, agency restoration duties, new project area acceptance duties, claim preparation duties) without computable policy conditions, amounts, rates, thresholds, or caps that affect benefit calculation. The trailing clause introduces actions to be taken but the block ends before enumerating them.
