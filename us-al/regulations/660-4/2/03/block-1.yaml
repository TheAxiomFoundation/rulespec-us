format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-al/regulation/660-4/2/03/block-1
  summary: |-
    A household participating or applying for participation in the Food Assistance Program must provide an SSN for each household member. Refusal or failure without good cause to provide an SSN will result in disqualification of the individual for whom an SSN is not obtained. For individuals without an SSN, refer the household to SSA to apply. Proof of application from SSA is required prior to certification.
rules:
  - name: member_disqualified_for_ssn_noncompliance
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Alabama FAP Manual 660-4-2-.03
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/regulation/660-4/2/03/block-1
              excerpt: "refusal or failure without good cause to provide an SSN will result in disqualification of the individual for whom an SSN is not obtained"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          member_refused_or_failed_to_provide_ssn
          and not member_has_good_cause_for_ssn_noncompliance
  - name: member_satisfies_ssn_requirement
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Alabama FAP Manual 660-4-2-.03
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/regulation/660-4/2/03/block-1
              excerpt: "A household participating or applying for participation in the Food Assistance Program must do one of the following for each household member"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          member_provided_ssn
          or member_provided_proof_of_ssn_application
          or member_has_good_cause_for_ssn_noncompliance
