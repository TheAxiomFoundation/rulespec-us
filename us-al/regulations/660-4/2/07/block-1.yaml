  summary: |-
    Procedural rules for Alabama SNAP county offices handling reported changes during the certification period: ABAWD reporting of work-hour reductions below 20 hours/week by the 10th of the following month; processing voluntarily reported increases (new household member or $50+ income decrease) effective no later than the first allotment available 10 days after report, with supplementary allotments by the 10th of the following month if too late; verification timing rules shifting the 10-day window to the verification date; 10-day action on changes causing decrease/termination with notice of adverse action; treatment of IEVS, SAVE, BENDEX, SDX, UCB matches and verified-upon-receipt information; unclear-information handling (60-day relevance test); and six-month reporting reinstatement procedures including trial budget, Reason Code 19 restoration, prorated benefits for the reinstatement month, and reopening with new application date while preserving the original 12-month certification period.
