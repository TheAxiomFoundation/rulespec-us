  source_verification:
    corpus_citation_path: us-al/regulation/660-4/2/08/block-1
  summary: |-
    Once a household's certification ends, eligibility must be redetermined if benefits are desired. The county department shall complete the application process and approve or deny timely recertification applications prior to the end of the current certification period. Eligible households shall be provided an opportunity to participate by their normal issuance cycle in the month following the end of the current certification period. A household loses its right to uninterrupted benefits upon certain failures but shall not be denied at that time unless it refused to cooperate; if otherwise eligible after correcting failures, benefits shall be provided within 30 days after the date the application was filed. Denials shall be completed either by the end of the current certification period or within 30 days after the date the application was filed. The county department shall not continue benefits beyond the end of the certification period unless the household has been recertified. The joint processing requirements in Section 209 A for PA households shall continue to apply to applications for re-certifications.
  deferred_outputs:
    - output: us-al:regulations/660-4/2/08/block-1#recertification_processing_requirements
      reason: |-
        Source text describes administrative recertification timing, denial windows, joint processing cross-reference to Section 209 A, and the loss-of-uninterrupted-benefits consequence without stating computable household-level amounts, thresholds, or eligibility predicates that can be encoded as executable RuleSpec outputs. The Section 209 A joint processing requirement is an upstream cross-reference (us:statutes/us-al/209) not available in copied context.
