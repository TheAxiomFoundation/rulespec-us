format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-al/regulation/660-4/2/12/block-1
  summary: |-
    Legally obligated child support payments paid by a household member to a
    non-household member shall be allowed as a deduction. The deduction shall
    be only for the amount the household member actually pays, and shall not
    exceed the legally obligated amount. Voluntary child support payments are
    not allowed as a deduction. A court order or other verification of the
    legally obligated amount is needed only for current child support
    payments; arrearage payments must be verified as to amount and as truly
    arrearage.
rules:
  - name: child_support_payment_deduction
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: USD
    source: Alabama Food Assistance Manual 660-4-2-.12 (implementing Section 13921 of the Leland Act, Pub. L. 103-66 Title I, Chapter 3, August 10, 1993, amending Section 5(e) of the Food Stamp Act)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-al/regulation/660-4/2/12/block-1
              excerpt: "Legally obligated child support payments paid by a household member to a non-household member shall be allowed as a deduction. The deduction shall be only for the amount the household member actually pays, and shall not exceed the legally obligated amount. Voluntary child support payments are not allowed as a deduction."
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/regulation/660-4/2/12/block-1
              excerpt: "The amount of the arrearage payments must be verified, as well as that the payments are truly arrearage."
    versions:
      - effective_from: '1993-08-10'
        formula: |-
          min(
            current_child_support_amount_actually_paid_to_non_household_member
            + arrearage_child_support_amount_actually_paid_to_non_household_member,
            current_child_support_legally_obligated_amount
            + arrearage_child_support_verified_amount
          )
  - name: child_support_deduction_allowed
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Alabama Food Assistance Manual 660-4-2-.12
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/regulation/660-4/2/12/block-1
              excerpt: "Legally obligated child support payments paid by a household member to a non-household member shall be allowed as a deduction."
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-al/regulation/660-4/2/12/block-1
              excerpt: "Voluntary child support payments are not allowed as a deduction."
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-al/regulation/660-4/2/12/block-1
              excerpt: "A court order or other types of verification of the legally obligated amount of child support is needed only for the current child support payments. The amount of the arrearage payments must be verified, as well as that the payments are truly arrearage."
    versions:
      - effective_from: '1993-08-10'
        formula: |-
          child_support_is_legally_obligated
          and child_support_paid_to_non_household_member
          and not child_support_payment_is_voluntary
          and current_child_support_legally_obligated_amount_is_verified
          and (
            arrearage_child_support_amount_actually_paid_to_non_household_member == 0
            or (
              arrearage_payment_is_verified_as_arrearage
              and arrearage_child_support_verified_amount
                >= arrearage_child_support_amount_actually_paid_to_non_household_member
            )
          )
