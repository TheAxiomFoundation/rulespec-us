format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-al/regulation/660-4/2/06/block-1
  summary: |-
    Self-employment income for food assistance: S Corporation income is budgeted as earned income annualized over 12 months; net losses are zero. Households with self-employment income receive a standard deduction of 40% of gross proceeds as cost of doing business. Self-employed farmers must receive or anticipate annual gross proceeds of $1,000 or more from farming; fishermen treated same. Households receiving annual support from self-employment may be certified for up to 12 months.
rules:
  - name: self_employment_cost_of_doing_business_rate
    kind: parameter
    dtype: Rate
    source: AL 660-4-2-.06 Allowable Costs of Producing Self-employment Income
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/regulation/660-4/2/06/block-1
              excerpt: "standard deduction of 40% of the gross proceeds from the self-employment income as a cost of doing business"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.40
  - name: earned_income_deduction_rate
    kind: parameter
    dtype: Rate
    source: AL 660-4-2-.06 Other Household Income and Self-employment Income
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/regulation/660-4/2/06/block-1
              excerpt: "less a 20% earned income deduction"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.20
  - name: self_employed_farmer_minimum_annual_gross_proceeds
    kind: parameter
    dtype: Money
    unit: USD
    source: AL 660-4-2-.06 Special Provision for Farmers
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/regulation/660-4/2/06/block-1
              excerpt: "the farmer must receive or anticipate receiving annual gross proceeds of $1000 or more from the farming enterprise"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1000
  - name: self_employment_annualization_months
    kind: parameter
    dtype: Count
    source: AL 660-4-2-.06 S Corporations
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/regulation/660-4/2/06/block-1
              excerpt: "annualized over a 12-month period"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          12
  - name: maximum_self_employment_certification_months
    kind: parameter
    dtype: Count
    source: AL 660-4-2-.06 Assigning Certification Periods
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/regulation/660-4/2/06/block-1
              excerpt: "Households that receive their annual support from self-employment and have no other source of income may be certified for up to 12 months"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          12
  - name: s_corporation_countable_earned_income
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: AL 660-4-2-.06 S Corporations and Other Corporations
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-al/regulation/660-4/2/06/block-1
              excerpt: "If the household reports a net loss, the income attributed to the food assistance household would be zero"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          max(0, s_corporation_annual_income_reported_on_1040) / self_employment_annualization_months
  - name: self_employment_cost_of_doing_business_deduction
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: AL 660-4-2-.06 Determining Monthly Income from Self-employment
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-al/regulation/660-4/2/06/block-1
              excerpt: "standard deduction of 40% of the gross proceeds from the self-employment income as a cost of doing business"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          self_employment_cost_of_doing_business_rate * max(0, monthly_gross_self_employment_income)
  - name: monthly_net_self_employment_income
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: AL 660-4-2-.06 Determining Monthly Income from Self-employment
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-al/regulation/660-4/2/06/block-1
              excerpt: "standard deduction of 40% of the gross proceeds from the self-employment income as a cost of doing business"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          max(0, monthly_gross_self_employment_income - self_employment_cost_of_doing_business_deduction)
  - name: is_self_employed_farmer
    kind: derived
    entity: Household
    dtype: Judgment
    period: Year
    source: AL 660-4-2-.06 Special Provision for Farmers
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-al/regulation/660-4/2/06/block-1
              excerpt: "the farmer must receive or anticipate receiving annual gross proceeds of $1000 or more from the farming enterprise"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_operates_farming_enterprise
          and annual_gross_proceeds_from_farming >= self_employed_farmer_minimum_annual_gross_proceeds
  - name: is_self_employed_fisherman
    kind: derived
    entity: Household
    dtype: Judgment
    period: Year
    source: AL 660-4-2-.06 Special Provision for Farmers
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-al/regulation/660-4/2/06/block-1
              excerpt: "fisherman is self-employed and receives or anticipates receiving annual gross proceeds of $1,000 or more from fishing"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_member_is_self_employed_fisherman
          and annual_gross_proceeds_from_fishing >= self_employed_farmer_minimum_annual_gross_proceeds
  - name: farm_disaster_payment_excluded_from_income
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: AL 660-4-2-.06 Special Provision for Farmers (Disaster Relief Act of 1974)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-al/regulation/660-4/2/06/block-1
              excerpt: "When the Secretary of Agriculture determines that a farm emergency exists due to a natural disaster, any payments to farmers pursuant to such a determination shall be excluded from income and resources"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          secretary_of_agriculture_determined_farm_emergency_due_to_natural_disaster
          and payment_made_to_farmer_pursuant_to_such_determination
  - name: recaptured_depreciation_counted_as_income
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: AL 660-4-2-.06 Recaptured Depreciation
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-al/regulation/660-4/2/06/block-1
              excerpt: "Recaptured depreciation is NOT counted as income for food assistance purposes"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not amount_is_recaptured_depreciation
  - name: recaptured_investment_credit_counted_as_income
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: AL 660-4-2-.06 Recaptured Investment Credit
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-al/regulation/660-4/2/06/block-1
              excerpt: "Recaptured investment credits are NOT counted as income for food assistance purposes"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not amount_is_recaptured_investment_credit
  - name: capital_gain_countable_amount
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: AL 660-4-2-.06 Capital Gains
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-al/regulation/660-4/2/06/block-1
              excerpt: "the State agency shall count the full amount of the capital gain as income for food assistance purposes"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          max(0, proceeds_from_sale_of_capital_goods_or_equipment)
