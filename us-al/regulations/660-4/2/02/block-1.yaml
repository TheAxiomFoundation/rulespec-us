  summary: |-
    Alabama food assistance application procedures: applications may be filed at Food Assistance, Public Assistance, and Social Security Offices; households are entitled to an interview; office interview may be waived case-by-case; SAVE primary/secondary alien verification process using Form G-845 to INS File Control Office; shelter and dependent care expense verification; 30-day processing standard with Notice of Denial/Pending Status; reopening procedures referencing Section 207C for restoration of benefits.
