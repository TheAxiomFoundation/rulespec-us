  summary: |-
    All regulations, notices, and procedures for the certification of food assistance households and subsequent issuance of food assistance to eligible households are promulgated by the United States Department of Agriculture, Food and Consumer Services. The State of Alabama, Department of Human Resources, acting as agent, has no authority to unilaterally issue, amend, or invalidate instructions or regulations. All regulations and definitions in this section are invalid or amended insofar as they conflict with USDA FCS regulations, notice, or instructions.
