format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-al/regulation/alabama-administrative-code/660/2/2/page-8
  summary: |-
    "The amount of assistance payment that a person receives is determined by using the appropriate payment standard ... minus the rounded total net available income." "The minimum grant is $10." A check may be less than $10 for current-assistance recoupment of a prior overpayment or sanctions under rules 660-2-2-.18 or 660-2-2-.23.
rules:
  - name: minimum_grant
    kind: parameter
    dtype: Money
    unit: USD
    period: Month
    source: Ala. Admin. Code r. 660-2-2-.10
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/regulation/alabama-administrative-code/660/2/2/page-8
              excerpt: "The minimum grant is $10."
    versions:
      - effective_from: '2007-09-10'
        formula: |-
          10

  - name: assistance_payment_deficit
    kind: derived
    entity: TanfUnit
    dtype: Money
    unit: USD
    period: Month
    source: Ala. Admin. Code r. 660-2-2-.10
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-al/regulation/alabama-administrative-code/660/2/2/page-8
    versions:
      - effective_from: '2007-09-10'
        formula: |-
          max(0, appropriate_payment_standard - rounded_total_net_available_income)

  - name: grant_amount_before_recoupment_or_sanction
    kind: derived
    entity: TanfUnit
    dtype: Money
    unit: USD
    period: Month
    source: Ala. Admin. Code r. 660-2-2-.10
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-al/regulation/alabama-administrative-code/660/2/2/page-8
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-al/regulation/alabama-administrative-code/660/2/2/page-8
              excerpt: "The minimum grant is $10."
    versions:
      - effective_from: '2007-09-10'
        formula: |-
          if initial_payment_authorized_for_month_of_application_and_prorated_from_date_application_received: initial_prorated_assistance_payment else: if assistance_payment_deficit > 0: max(assistance_payment_deficit, minimum_grant) else: 0

  - name: al_tanf
    kind: derived
    entity: TanfUnit
    dtype: Money
    unit: USD
    period: Month
    source: Ala. Admin. Code r. 660-2-2-.10
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-al/regulation/alabama-administrative-code/660/2/2/page-8
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-al/regulation/alabama-administrative-code/660/2/2/page-8
              excerpt: "A check may be less than $10 if a case is in recoupment ... or due to imposition of sanctions"
    versions:
      - effective_from: '2007-09-10'
        formula: |-
          max(0, grant_amount_before_recoupment_or_sanction - current_assistance_recoupment_for_prior_overpayment - sanction_reduction_under_rule_660_2_2_18 - sanction_reduction_under_rule_660_2_2_23)
