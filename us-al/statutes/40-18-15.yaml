format: rulespec/v1
module:
  status: deferred
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-al/statute/40-18-15
  summary: |-
    40-18-15(a) allows specified deductions while disallowing losses, expenses, or interest deferred or disallowed under 26 U.S.C. § 267 and costs required to be capitalized under 26 U.S.C. § 263A. It includes source-stated limits including medical expenses over 4.0 percent of adjusted gross income, fallout shelter expenses up to $1,000, barrier-removal expenses up to $35,000, a 2 percent adjusted-gross-income floor for certain unreimbursed employee business and § 212 expenses, Alabama college program contributions up to $5,000 per annum, and a 10 percent add-back on nonqualified withdrawals.
  deferred_outputs:
    - output: us-al:statutes/40-18-15/a#allowable_itemized_deductions
      reason: The subsection is a broad deduction provision composed of many cross-referenced federal tax computations and Alabama-specific limitations; faithful execution requires upstream federal deduction outputs and itemized-deduction aggregation surfaces not supplied in this source slice.
