format: rulespec/v1
module:
  summary: |-
    7 CFR 273.5 makes an individual enrolled at least half-time in an
    institution of higher education ineligible for SNAP unless the individual
    satisfies one of the student exemptions. Exemptions include age, physical
    or mental unfitness, TANF, JOBS or other qualifying employment and
    training placements, paid employment, work study, on-the-job training, and
    specified dependent-care responsibilities.
  source_verification:
    corpus_citation_path: us/regulation/7/273/5
imports:
  - us:statutes/7/2012/j
rules:
  - name: snap_member_enrolled_in_institution_of_higher_education
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 7 CFR 273.5(a)
    versions:
      - effective_from: '2019-06-14'
        formula: |-
          enrolled_at_least_half_time
          and (
              enrolled_in_business_technical_trade_or_vocational_school_requiring_high_school_diploma
              or enrolled_in_college_or_university_degree_program
          )
  - name: snap_student_age_exemption
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 7 CFR 273.5(b)(1)
    versions:
      - effective_from: '2019-06-14'
        formula: student_age <= 17 or student_age >= 50
  - name: snap_student_physical_or_mental_unfitness_exemption
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 7 CFR 273.5(b)(2)
    versions:
      - effective_from: '2019-06-14'
        formula: student_physically_or_mentally_unfit
  - name: snap_student_tanf_exemption
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 7 CFR 273.5(b)(3)
    versions:
      - effective_from: '2019-06-14'
        formula: student_receives_tanf
  - name: snap_student_jobs_program_exemption
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 7 CFR 273.5(b)(4)
    versions:
      - effective_from: '2019-06-14'
        formula: enrolled_through_jobs_or_successor_program
  - name: snap_student_employment_exemption
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 7 CFR 273.5(b)(5)
    versions:
      - effective_from: '2019-06-14'
        formula: |-
          student_paid_employment_hours_per_week >= 20
          or (
              student_self_employment_hours_per_week >= 20
              and student_self_employment_weekly_earnings >= federal_minimum_wage * 20
          )
          or state_agency_averaged_student_work_hours_meet_twenty_per_week
  - name: snap_student_work_study_exemption
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 7 CFR 273.5(b)(6)
    versions:
      - effective_from: '2019-06-14'
        formula: |-
          student_participating_in_state_or_federally_financed_work_study
          and work_study_approved_at_snap_application
          and work_study_approved_for_school_term
          and student_anticipates_working_in_work_study
          and work_study_exemption_period_active
          and not known_student_refused_work_study_assignment
  - name: snap_student_on_the_job_training_exemption
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 7 CFR 273.5(b)(7)
    versions:
      - effective_from: '2019-06-14'
        formula: |-
          student_participating_in_on_the_job_training_program
          and student_currently_being_trained_by_employer
  - name: snap_student_dependent_under_six_exemption
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 7 CFR 273.5(b)(8)
    versions:
      - effective_from: '2019-06-14'
        formula: responsible_for_care_of_dependent_household_member_under_age_six
  - name: snap_student_dependent_six_to_under_twelve_exemption
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 7 CFR 273.5(b)(9)
    versions:
      - effective_from: '2019-06-14'
        formula: |-
          responsible_for_care_of_dependent_household_member_age_six_to_under_twelve
          and adequate_child_care_unavailable_to_attend_class_and_meet_student_work_requirement
  - name: snap_student_single_parent_full_time_exemption
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 7 CFR 273.5(b)(10)
    versions:
      - effective_from: '2019-06-14'
        formula: |-
          single_parent_enrolled_full_time_in_higher_education
          and responsible_for_care_of_dependent_child_under_twelve
          and single_parent_household_condition_satisfied
  - name: snap_student_employment_training_program_exemption
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 7 CFR 273.5(b)(11)
    versions:
      - effective_from: '2019-06-14'
        formula: assigned_or_placed_in_higher_education_through_qualifying_employment_training_program
  - name: snap_student_exempt
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 7 CFR 273.5(b)
    versions:
      - effective_from: '2019-06-14'
        formula: |-
          snap_student_age_exemption
          or snap_student_physical_or_mental_unfitness_exemption
          or snap_student_tanf_exemption
          or snap_student_jobs_program_exemption
          or snap_student_employment_exemption
          or snap_student_work_study_exemption
          or snap_student_on_the_job_training_exemption
          or snap_student_dependent_under_six_exemption
          or snap_student_dependent_six_to_under_twelve_exemption
          or snap_student_single_parent_full_time_exemption
          or snap_student_employment_training_program_exemption
  - name: snap_member_student_ineligible
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 7 CFR 273.5(a)
    versions:
      - effective_from: '2019-06-14'
        formula: snap_member_enrolled_in_institution_of_higher_education and not snap_student_exempt
  - name: snap_member_student_eligible
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 7 CFR 273.5
    versions:
      - effective_from: '2019-06-14'
        formula: not snap_member_student_ineligible
