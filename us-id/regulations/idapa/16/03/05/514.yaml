format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-id/regulation/idapa/16/03/05/514
  summary: |-
    Only a participant who receives an SSI payment for the month is eligible for an AABD cash payment in the same month. The payment is the difference between financial need and countable income, paid at the next higher dollar, based on living-arrangement maximums in Subsections 514.01 through 514.04. A participant residing in a RALF or CFH is not eligible.
rules:
  - name: single_participant_maximum_payment
    kind: parameter
    dtype: Money
    period: Month
    unit: USD
    source: IDAPA 16.03.05.514.01
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-id/regulation/idapa/16/03/05/514
              excerpt: "single participant ... maximum monthly AABD cash payment amount is fifty-three dollars ($53)"
    versions:
      - effective_from: '2024-07-01'
        formula: |-
          53
  - name: couple_maximum_payment
    kind: parameter
    dtype: Money
    period: Month
    unit: USD
    source: IDAPA 16.03.05.514.02(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-id/regulation/idapa/16/03/05/514
              excerpt: "A couple receives twenty dollars ($20)"
    versions:
      - effective_from: '2024-07-01'
        formula: |-
          20
  - name: essential_person_maximum_payment
    kind: parameter
    dtype: Money
    period: Month
    unit: USD
    source: IDAPA 16.03.05.514.02(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-id/regulation/idapa/16/03/05/514
              excerpt: "participant living with essential person receives eighteen dollars ($18)"
    versions:
      - effective_from: '2024-07-01'
        formula: |-
          18
  - name: semi_independent_group_maximum_payment
    kind: parameter
    dtype: Money
    period: Month
    unit: USD
    source: IDAPA 16.03.05.514.03
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-id/regulation/idapa/16/03/05/514
              excerpt: "maximum monthly AABD cash payment amount is one hundred sixty-nine dollars ($169)"
    versions:
      - effective_from: '2024-07-01'
        formula: |-
          169
  - name: room_and_board_maximum_payment
    kind: parameter
    dtype: Money
    period: Month
    unit: USD
    source: IDAPA 16.03.05.514.04
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-id/regulation/idapa/16/03/05/514
              excerpt: "maximum monthly AABD cash payment is one hundred ninety-eight dollars ($198)"
    versions:
      - effective_from: '2024-07-01'
        formula: |-
          198
  - name: aabd_living_arrangement_maximum_payment
    kind: derived
    entity: AabdCashPaymentUnit
    dtype: Money
    period: Month
    unit: USD
    source: IDAPA 16.03.05.514.01-.04
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-id/regulation/idapa/16/03/05/514
              excerpt: "based on the participant's living arrangement described in Subsections 514.01 through 514.04"
    versions:
      - effective_from: '2024-07-01'
        formula: |-
          if participant_is_single_under_subsection_501_01: single_participant_maximum_payment else: if participant_is_couple_under_subsection_501_02: couple_maximum_payment else: if participant_lives_with_essential_person_under_subsection_501_02: essential_person_maximum_payment else: if participant_is_in_semi_independent_group_under_subsection_501_03: semi_independent_group_maximum_payment else: if participant_is_room_and_board_participant_under_section_512: room_and_board_maximum_payment else: 0
  - name: aabd_cash_payment
    kind: derived
    entity: AabdCashPaymentUnit
    dtype: Money
    period: Month
    unit: USD
    source: IDAPA 16.03.05.514
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-id/regulation/idapa/16/03/05/514
              excerpt: "Only a participant who receives an SSI payment for the month is eligible"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-id/regulation/idapa/16/03/05/514
              excerpt: "difference between a participant's financial need and their countable income"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-id/regulation/idapa/16/03/05/514
              excerpt: "paid at the next higher dollar"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-id/regulation/idapa/16/03/05/514
              excerpt: "A participant residing in a RALF or CFH is not eligible"
    versions:
      - effective_from: '2024-07-01'
        formula: |-
          if participant_receives_ssi_payment_for_month and not participant_resides_in_ralf_or_cfh: min(aabd_living_arrangement_maximum_payment, ceil(max(0, participant_financial_need - participant_countable_income))) else: 0
