format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-id/regulation/idapa/16/03/04/page-13
  summary: |-
    IDAPA 16.03.04 Section 012 definitions for the Idaho Food Stamp Program, including Sanction, Seasonal Farmworker Household, Self-Employment, Spouse, Standard Utility Allowance (SUA), State, Student, Substance Use Disorder Treatment Program, Supplemental Security Income (SSI), Systematic Alien Verification for Entitlements (SAVE), Telephone Utility Allowance (TUA), Timely Notice, and Tribal General Assistance. A Student is "between the ages of eighteen (18) and fifty (50)". Timely Notice means "mailed electronically, at least ten (10) days before the effective date".
rules:
  - name: student_minimum_age
    kind: parameter
    dtype: Integer
    source: IDAPA 16.03.04.012.17
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-id/regulation/idapa/16/03/04/page-13
              excerpt: "between the ages of eighteen (18) and fifty (50)"
    versions:
      - effective_from: '2024-07-01'
        formula: |-
          18
  - name: student_maximum_age
    kind: parameter
    dtype: Integer
    source: IDAPA 16.03.04.012.17
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-id/regulation/idapa/16/03/04/page-13
              excerpt: "between the ages of eighteen (18) and fifty (50)"
    versions:
      - effective_from: '2024-07-01'
        formula: |-
          50
  - name: timely_notice_minimum_days
    kind: parameter
    dtype: Integer
    source: IDAPA 16.03.04.012.22
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-id/regulation/idapa/16/03/04/page-13
              excerpt: "mailed electronically, at least ten (10) days before the effective date"
    versions:
      - effective_from: '2024-07-01'
        formula: |-
          10
  - name: person_qualifies_as_student
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: IDAPA 16.03.04.012.17
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-id/regulation/idapa/16/03/04/page-13
              excerpt: "An individual between the ages of eighteen (18) and fifty (50), physically and intellectually fit, and enrolled at least half-time in an institution of higher education."
    versions:
      - effective_from: '2024-07-01'
        formula: |-
          person_age >= student_minimum_age
          and person_age <= student_maximum_age
          and person_is_physically_and_intellectually_fit
          and person_is_enrolled_at_least_half_time_in_institution_of_higher_education
  - name: household_is_seasonal_farmworker_household
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: IDAPA 16.03.04.012.12
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-id/regulation/idapa/16/03/04/page-13
              excerpt: "Has a member who does agricultural work of a seasonal or other temporary nature."
    versions:
      - effective_from: '2024-07-01'
        formula: |-
          household_has_member_doing_seasonal_or_temporary_agricultural_work
  - name: persons_are_spouses
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: IDAPA 16.03.04.012.14
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-id/regulation/idapa/16/03/04/page-13
              excerpt: "Persons who are legally married under Idaho law."
    versions:
      - effective_from: '2024-07-01'
        formula: |-
          persons_are_legally_married_under_idaho_law
  - name: person_is_self_employed
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: IDAPA 16.03.04.012.13
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-id/regulation/idapa/16/03/04/page-13
              excerpt: "responsible for obtaining or providing a service or product that generates, or is expected to generate, income"
    versions:
      - effective_from: '2024-07-01'
        formula: |-
          person_actively_earns_income_from_own_business_trade_or_profession
          and person_is_responsible_for_obtaining_or_providing_service_or_product_generating_income
  - name: notice_is_timely
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: IDAPA 16.03.04.012.22
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-id/regulation/idapa/16/03/04/page-13
              excerpt: "Notice that is mailed electronically, at least ten (10) days before the effective date of an action taken by the Department."
    versions:
      - effective_from: '2024-07-01'
        formula: |-
          notice_was_mailed_electronically
          and days_between_notice_mailing_and_action_effective_date >= timely_notice_minimum_days
