format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-id/regulation/idapa/16/03/04/page-16
  summary: |-
    Section 106: New AFA determined per 7 CFR 273.2(g) and (h). Section 113: Household must cooperate; application denied for refusal to cooperate (including failing to act without sound and timely excuse, or purposely giving false information); may reapply but ineligible until cooperation. Section 114: Households may withdraw application any time before eligibility decision; Department documents withdrawal reason and informs of right to reapply. Section 115: Authorized representative rules — designation in writing; conflicts of interest (retailers, certifying employees, IPV-disqualified persons during penalty unless sole adult, homeless meal providers) require supervisor approval; Department responsibilities; representative may be removed up to one (1) year for knowingly giving false information or improperly using Food Stamps.
rules:
  - name: authorized_representative_removal_maximum_period
    kind: parameter
    dtype: Integer
    source: IDAPA 16.03.04.115.04
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-id/regulation/idapa/16/03/04/page-16
              excerpt: "remove an authorized representative for up to one (1) year"
    versions:
      - effective_from: '2024-07-01'
        formula: |-
          1
  - name: application_denied_for_refusal_to_cooperate
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: IDAPA 16.03.04.113
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-id/regulation/idapa/16/03/04/page-16
              excerpt: "The application must be denied if the household refuses to cooperate"
    versions:
      - effective_from: '2024-07-01'
        formula: |-
          household_refuses_to_cooperate
          or household_fails_to_act_without_sound_and_timely_excuse
          or household_purposely_gave_false_information
  - name: household_eligible_after_refusal_to_cooperate
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: IDAPA 16.03.04.113
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-id/regulation/idapa/16/03/04/page-16
              excerpt: "The household is not eligible until it cooperates with the Department"
    versions:
      - effective_from: '2024-07-01'
        formula: |-
          household_has_cooperated_with_department
  - name: application_may_be_withdrawn
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: IDAPA 16.03.04.114
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-id/regulation/idapa/16/03/04/page-16
              excerpt: "Households can withdraw their application any time before the eligibility decision"
    versions:
      - effective_from: '2024-07-01'
        formula: |-
          not eligibility_decision_has_been_made
  - name: person_has_conflict_of_interest_as_authorized_representative
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: IDAPA 16.03.04.115.02
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-id/regulation/idapa/16/03/04/page-16
              excerpt: "Persons with a conflict of interest are listed below: a. Retailers allowed to accept Food Stamps. b. Department employees involved in the certification or issuance process. c. A person disqualified for IPV during the penalty period, unless they are the only adult household member and no one else is available. d. Homeless meal providers."
    versions:
      - effective_from: '2024-07-01'
        formula: |-
          person_is_retailer_allowed_to_accept_food_stamps
          or person_is_department_employee_in_certification_or_issuance
          or (person_is_disqualified_for_ipv_during_penalty_period
              and not (person_is_only_adult_household_member
                       and no_one_else_is_available))
          or person_is_homeless_meal_provider
  - name: person_may_act_as_authorized_representative
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: IDAPA 16.03.04.115.02
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-id/regulation/idapa/16/03/04/page-16
              excerpt: "Persons with a conflict of interest may not act as an authorized representative without the Department's written approval."
    versions:
      - effective_from: '2024-07-01'
        formula: |-
          person_designated_as_authorized_representative
          and (not person_has_conflict_of_interest_as_authorized_representative
               or field_office_supervisor_gave_written_approval)
  - name: authorized_representative_may_be_removed
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: IDAPA 16.03.04.115.04
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-id/regulation/idapa/16/03/04/page-16
              excerpt: "The Department may remove an authorized representative for up to one (1) year if the person knowingly gives false information, or improperly uses the Food Stamps."
    versions:
      - effective_from: '2024-07-01'
        formula: |-
          authorized_representative_knowingly_gave_false_information
          or authorized_representative_improperly_used_food_stamps
