format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-id/regulation/idapa/16/03/04/page-20
  summary: |-
    Section 160 governs postponed proof for expedited Food Stamp certification. Non-migrant households have 30 days from the application date to complete postponed proof; otherwise the Department closes the case. Migrant households applying days 1-15 have 30 days for in-state proof and 60 days for out-of-state proof. Migrant households applying days 16-end of month have the same 30/60-day windows. Migrants are entitled to postponed out-of-state proof only once each season. A reapplying household previously granted postponed proof must provide that proof before again qualifying for expedited certification, unless certified under normal standards since.
rules:
  - name: postponed_proof_days_non_migrant
    kind: parameter
    dtype: Integer
    source: IDAPA 16.03.04.160.02.b
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-id/regulation/idapa/16/03/04/page-20
              excerpt: "the household has thirty (30) days from the application date to complete the proof"
    versions:
      - effective_from: '2024-07-01'
        formula: |-
          30
  - name: postponed_proof_days_migrant_in_state
    kind: parameter
    dtype: Integer
    source: IDAPA 16.03.04.160.03.b, .04.b
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-id/regulation/idapa/16/03/04/page-20
              excerpt: "the household has thirty (30) days from the application date to complete in-state proof"
    versions:
      - effective_from: '2024-07-01'
        formula: |-
          30
  - name: postponed_proof_days_migrant_out_of_state
    kind: parameter
    dtype: Integer
    source: IDAPA 16.03.04.160.03.b, .04.b
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-id/regulation/idapa/16/03/04/page-20
              excerpt: "The household has sixty (60) days from the application date to complete out-of-state proof"
    versions:
      - effective_from: '2024-07-01'
        formula: |-
          60
  - name: migrant_late_out_of_state_issuance_days
    kind: parameter
    dtype: Integer
    source: IDAPA 16.03.04.160.03.c, .04.c
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-id/regulation/idapa/16/03/04/page-20
              excerpt: "the Department will issue benefits within seven (7) calendar days from the date proof is received"
    versions:
      - effective_from: '2024-07-01'
        formula: |-
          7
  - name: non_migrant_case_closes_for_postponed_proof
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: IDAPA 16.03.04.160.02.c
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-id/regulation/idapa/16/03/04/page-20
              excerpt: "If postponed proof is not provided within thirty (30) days from the application date, the Department will close the case."
    versions:
      - effective_from: '2024-07-01'
        formula: |-
          non_migrant_postponed_proof_granted
          and days_since_application_date > postponed_proof_days_non_migrant
          and not postponed_proof_completed
  - name: migrant_case_closes_for_in_state_proof
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: IDAPA 16.03.04.160.03.c, .04.c
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-id/regulation/idapa/16/03/04/page-20
              excerpt: "If postponed in-state proof is not provided within thirty (30) days from the application date, the Department will close the case."
    versions:
      - effective_from: '2024-07-01'
        formula: |-
          migrant_postponed_proof_granted
          and days_since_application_date > postponed_proof_days_migrant_in_state
          and not in_state_postponed_proof_completed
  - name: migrant_case_closes_for_out_of_state_proof
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: IDAPA 16.03.04.160.03.c, .04.c
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-id/regulation/idapa/16/03/04/page-20
              excerpt: "If postponed out-of-state proof is not provided within sixty (60) days from the application date, the Department will close the case."
    versions:
      - effective_from: '2024-07-01'
        formula: |-
          migrant_postponed_proof_granted
          and days_since_application_date > postponed_proof_days_migrant_out_of_state
          and not out_of_state_postponed_proof_completed
  - name: reapplying_household_requires_postponed_proof_for_expedited
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: IDAPA 16.03.04.160.05
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-id/regulation/idapa/16/03/04/page-20
              excerpt: "When a household granted postponed proof at the last expedited certification reapplies, it must provide the postponed proof before it is again eligible for expedited certification. The Department does not require postponed proof if the household was certified under normal standards since the last expedited certification."
    versions:
      - effective_from: '2024-07-01'
        formula: |-
          granted_postponed_proof_at_last_expedited_certification
          and not certified_under_normal_standards_since_last_expedited_certification
