format: rulespec/v1
module:
  proof_validation:
    required: false
  source_verification:
    corpus_citation_paths:
      - us-id/statute/63-3024
    upstream_source_check:
      status: composed_from_supplied_current_authority
      checked_paths:
        - us-id/statute/63-3024
      rationale: |-
        This pipeline computes the Idaho section 63-3024 individual income-tax
        liability for the ordinary resident wage-earner slice: the tax on Idaho
        taxable income. The encoded 63-3024 module carries the statutory rule —
        a single rate on Idaho taxable income above a filing-status threshold
        ($4,489 single / $8,978 joint at the 2018 conformity, indexed) — but
        section 63-3024 directs the State Tax Commission to index that threshold
        each year. The corpus does not yet contain official sources certifying
        either the operative 2026 indexed values or an
        adjusted-gross-income-to-taxable-income deduction chain. Accordingly,
        every year-specific amount and the entire subtraction from adjusted
        gross income are declared caller-supplied, unverified projections. The
        nonrefundable exemption credit is also supplied. The pipeline adds no
        numeric literals of its own; it wires the caller-supplied flat-rate
        mechanics only and does not claim source-certified oracle parity.
  summary: |-
    Composed Idaho individual income-tax liability pipeline for the oracle slice
    at the 2026 tax year. It exposes a TaxUnit-level path from a supplied Idaho
    adjusted gross income into the section 63-3024 tax on Idaho taxable income, so
    a projected comparison does not require the caller to supply the section
    63-3024 rate application itself. It wires: Idaho taxable income (Idaho AGI
    less an unverified caller-supplied subtraction); the tax as the supplied rate
    on Idaho taxable income above the supplied filing-status no-tax threshold;
    and that tax less the supplied nonrefundable exemption credit, floored at
    zero. It deliberately models only a narrow ordinary-resident wage-earner
    slice and excludes the refundable grocery credit and any independently
    encoded deduction chain. Idaho AGI, filing status, the no-tax threshold, the
    rate, the entire subtraction, and the exemption credit are supplied inputs.
    The Tax Commission indexes the threshold each year, and no official 2026
    parameter or deduction-chain source is present in the corpus, so this module
    is bounded to 2026, remains projected scaffolding, and makes no
    source-certified PolicyEngine or TAXSIM parity claim.
rules:
  - name: id_pit_pilot_taxable_income
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Caller-supplied Idaho adjusted gross income less an unverified caller-supplied subtraction, floored at zero
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          max(0, id_pit_pilot_adjusted_gross_income - id_pit_pilot_supplied_personal_exemption)
  - name: id_pit_pilot_schedule_tax
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 63-3024, tax as the supplied rate on Idaho taxable income above the supplied no-tax threshold
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-id/statute/63-3024
              excerpt: "5.3% of taxable income over $2,500, or over $5,000 for joint returns"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          id_pit_pilot_supplied_first_bracket_rate * min(id_pit_pilot_taxable_income, id_pit_pilot_supplied_no_tax_threshold)
          + id_pit_pilot_supplied_excess_rate * max(0, id_pit_pilot_taxable_income - id_pit_pilot_supplied_no_tax_threshold)
  - name: id_pit_pilot_income_tax_liability
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 63-3024 tax less the supplied nonrefundable exemption credit, floored at zero
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-id/statute/63-3024
              excerpt: "a tax measured by Idaho taxable income"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          max(0, id_pit_pilot_schedule_tax - id_pit_pilot_supplied_exemption_credit)
