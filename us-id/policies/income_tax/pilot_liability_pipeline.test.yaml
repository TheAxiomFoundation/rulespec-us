# Fixtures are hand-computed at the 2026 tax year (the author's own shown
# arithmetic from the supplied schedule, which axiom-encode test proves equal the
# engine output to full decimal precision, not an oracle read-back). Idaho
# liability = the section 63-3024 tax on Idaho taxable income (Idaho AGI - the
# entire unverified caller-supplied subtraction) less the supplied nonrefundable
# exemption credit. The fixture inputs use an existing projected comparison
# schedule: rate 0.053, no-tax threshold 4,920 single / 9,840 joint, and
# subtraction 16,100 single / 32,200 joint. Despite the legacy "personal
# exemption" input name, that subtraction represents no source-verified Idaho
# deduction or standard-deduction rule. These fixtures prove only the
# caller-supplied mechanics; they do not certify any 2026 value from an official
# source. The boundary cases exercise the taxable-income floor, the
# caller-supplied no-tax threshold, and the liability floor.
- name: taxable_income_floor
  # taxable max(0, 10000-16100) = 0.
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    us-id:policies/income_tax/pilot_liability_pipeline#input.id_pit_pilot_adjusted_gross_income: 10000
    us-id:policies/income_tax/pilot_liability_pipeline#input.id_pit_pilot_supplied_personal_exemption: 16100
    us-id:policies/income_tax/pilot_liability_pipeline#input.id_pit_pilot_supplied_no_tax_threshold: 4920
    us-id:policies/income_tax/pilot_liability_pipeline#input.id_pit_pilot_supplied_first_bracket_rate: 0
    us-id:policies/income_tax/pilot_liability_pipeline#input.id_pit_pilot_supplied_excess_rate: 0.053
    us-id:policies/income_tax/pilot_liability_pipeline#input.id_pit_pilot_supplied_exemption_credit: 0
  output:
    us-id:policies/income_tax/pilot_liability_pipeline#id_pit_pilot_taxable_income: '0'
    us-id:policies/income_tax/pilot_liability_pipeline#id_pit_pilot_schedule_tax: '0'
    us-id:policies/income_tax/pilot_liability_pipeline#id_pit_pilot_income_tax_liability: '0'
