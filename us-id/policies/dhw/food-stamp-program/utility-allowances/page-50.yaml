format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-id/regulation/idapa/16/03/04/page-50
  summary: |-
    Section 543 states that the shelter deduction is computed using one of four utility allowances: SUA, LUA, MUA, or TUA; utility allowances are not prorated. SUA requires a primary heating or cooling cost separate from rent or mortgage and households are limited to one SUA. LUA requires more than one non-heating-or-cooling utility. MUA requires one utility that is not heating, cooling, or telephone. TUA requires telephone service and no other verified utility expenses.
rules:
  - name: snap_standard_utility_allowance
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: IDAPA 16.03.04.543.01
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-id/regulation/idapa/16/03/04/page-50
    versions:
      - effective_from: '2024-07-01'
        formula: |-
          household_has_primary_heating_or_cooling_cost_separate_from_rent_or_mortgage
  - name: snap_limited_utility_allowance
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: IDAPA 16.03.04.543.02
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-id/regulation/idapa/16/03/04/page-50
              excerpt: "billed for more than one (1) utility that is not for heating or cooling"
    versions:
      - effective_from: '2024-07-01'
        formula: |-
          household_billed_for_more_than_one_utility_not_for_heating_or_cooling
  - name: snap_minimum_utility_allowance
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: IDAPA 16.03.04.543.03
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-id/regulation/idapa/16/03/04/page-50
              excerpt: "billed for one (1) utility that is not for heating, cooling, or telephone service"
    versions:
      - effective_from: '2024-07-01'
        formula: |-
          household_billed_for_one_utility_not_for_heating_cooling_or_telephone
  - name: snap_telephone_utility_allowance
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: IDAPA 16.03.04.543.04
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-id/regulation/idapa/16/03/04/page-50
    versions:
      - effective_from: '2024-07-01'
        formula: |-
          household_billed_for_telephone_service
          and household_has_no_other_verified_utility_expenses
  - name: snap_utility_allowance_for_shelter_costs
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: IDAPA 16.03.04.543
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-id/regulation/idapa/16/03/04/page-50
              excerpt: "computed using one (1) of four (4) utility allowances: SUA, LUA, MUA, or TUA"
          - path: versions[0].formula
            kind: import
            import:
              target: us-id:policies/dhw/food-stamp-program/utility-allowances/page-50#snap_standard_utility_allowance
              output: snap_standard_utility_allowance
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-id:policies/dhw/food-stamp-program/utility-allowances/page-50#snap_limited_utility_allowance
              output: snap_limited_utility_allowance
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-id:policies/dhw/food-stamp-program/utility-allowances/page-50#snap_minimum_utility_allowance
              output: snap_minimum_utility_allowance
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-id:policies/dhw/food-stamp-program/utility-allowances/page-50#snap_telephone_utility_allowance
              output: snap_telephone_utility_allowance
              hash: sha256:local
    versions:
      - effective_from: '2024-07-01'
        formula: |-
          snap_standard_utility_allowance
          or snap_limited_utility_allowance
          or snap_minimum_utility_allowance
          or snap_telephone_utility_allowance
