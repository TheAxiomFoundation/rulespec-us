name: program-artifacts

# Compiles every jurisdiction programs/ spec through axiom-compose + axiom-rules-engine.
# On pull requests this is a gate: any spec outside
# tools/known-broken-specs.txt that fails to compile fails the check, so
# spec/corpus drift is caught at PR time instead of at admission time.
# On pushes to main it additionally publishes the provenance-stamped
# artifacts and manifest as a GitHub release, which downstream consumers
# (axiom-api) pin by tag + sha256.

on:
  pull_request:
    paths:
      - "tools/**"
      - "us/**"
      - "us-*/**"
      - ".axiom/workflow-toolchain.toml"
      - ".github/workflows/program-artifacts.yml"
  push:
    branches: [main]
    paths:
      - "tools/**"
      - "us/**"
      - "us-*/**"
      - ".axiom/workflow-toolchain.toml"
      - ".github/workflows/program-artifacts.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # release publishing on main
      id-token: write # build provenance attestations
      attestations: write # build provenance attestations
    steps:
      - uses: actions/checkout@v4

      - name: Read protected workflow toolchain
        id: toolchain
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import re
          import tomllib
          from pathlib import Path

          toolchain = tomllib.loads(
              Path(".axiom/workflow-toolchain.toml").read_text()
          )["workflow_toolchain"]
          for key in ("axiom_compose_ref", "axiom_rules_engine_ref"):
              value = toolchain.get(key)
              if not isinstance(value, str) or re.fullmatch(r"[0-9a-f]{40}", value) is None:
                  raise SystemExit(f"{key} must be a full lowercase commit SHA")
              print(f"{key}={value}")
          PY

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install axiom-compose
        env:
          AXIOM_COMPOSE_REF: ${{ steps.toolchain.outputs.axiom_compose_ref }}
        run: |
          python -m pip install --quiet pyyaml \
            "axiom-compose @ git+https://github.com/TheAxiomFoundation/axiom-compose@${AXIOM_COMPOSE_REF}"

      - name: Checkout axiom-rules-engine
        uses: actions/checkout@v4
        with:
          repository: TheAxiomFoundation/axiom-rules-engine
          ref: ${{ steps.toolchain.outputs.axiom_rules_engine_ref }}
          path: .engine-src

      - name: Cache engine build
        id: engine-cache
        uses: actions/cache@v4
        with:
          path: .engine-src/target/release/axiom-rules-engine
          key: engine-bin-${{ runner.os }}-${{ steps.toolchain.outputs.axiom_rules_engine_ref }}

      - name: Build engine
        if: steps.engine-cache.outputs.cache-hit != 'true'
        run: cargo build --release --bin axiom-rules-engine
        working-directory: .engine-src

      - name: Compile all program specs
        run: |
          AXIOM_RULES_ENGINE_BIN="$PWD/.engine-src/target/release/axiom-rules-engine" \
            python tools/build_program_artifacts.py --dist dist

      # Attest build provenance for the published artifacts; consumers can
      # verify with `gh attestation verify <file> --repo TheAxiomFoundation/rulespec-us`.
      - name: Attest build provenance
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            dist/manifest.json
            dist/*.compiled.json

      - name: Publish artifacts release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          short_sha="${GITHUB_SHA::12}"
          tag="program-artifacts-${short_sha}"
          gh release create "$tag" \
            --target "$GITHUB_SHA" \
            --title "Program artifacts @ ${short_sha}" \
            --notes "Compiled program artifacts built from ${GITHUB_SHA} by the program-artifacts workflow. Pin these by tag + sha256 (see manifest.json)." \
            dist/manifest.json dist/*.compiled.json dist/*.rulespec.yaml
