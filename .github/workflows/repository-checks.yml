name: Repository Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  repository-guard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Reject obsolete generated files
        run: |
          legacy_ext="r""ac"
          matches="$(find . \( -name "*.${legacy_ext}" -o -name "*.${legacy_ext}.test" \) -print)"
          if [ -n "$matches" ]; then
            printf '%s\n' "$matches" >&2
            exit 1
          fi
