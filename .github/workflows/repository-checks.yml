name: Repository Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    uses: TheAxiomFoundation/.github/.github/workflows/validate-rulespec.yml@main
    secrets: inherit
    with:
      validate-roots: auto
      # TODO(consolidation): re-enable immediately after the monorepo
      # migration PR merges — every file in that PR arrives from an
      # already-validated repo, which the signed-manifest guard cannot
      # distinguish from manual edits.
      run-generated-guard: false
