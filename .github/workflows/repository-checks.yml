name: Repository Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, ci/proof-base]

jobs:
  validate:
    uses: TheAxiomFoundation/.github/.github/workflows/validate-rulespec.yml@ci/shard-on-demand-validation
    secrets: inherit
    with:
      validate-roots: auto
      run-generated-guard: false
