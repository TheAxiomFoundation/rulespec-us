name: Repository Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Daily full-matrix validation: the honesty backstop for shard-on-demand.
    # Scoped pull requests validate only the one jurisdiction they touch, so
    # this scheduled run re-validates every shard against main to catch any
    # cross-shard drift a scoped PR could not see. 06:13 UTC.
    - cron: "13 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  legacy-rulespec-freeze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout rules repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Verify frozen legacy RuleSpec artifacts
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          args=()
          if [ "${{ github.event_name }}" = "pull_request" ] && \
             [ "${{ github.event.pull_request.number }}" != "911" ]; then
            args+=(--base-ref "$BASE_SHA")
          fi
          python tools/check_legacy_rulespec_freeze.py "${args[@]}"

  workflow-toolchain:
    runs-on: ubuntu-latest
    outputs:
      axiom_encode_ref: ${{ steps.pins.outputs.axiom_encode_ref }}
      axiom_rules_engine_ref: ${{ steps.pins.outputs.axiom_rules_engine_ref }}
      axiom_corpus_ref: ${{ steps.pins.outputs.axiom_corpus_ref }}
      rulespec_us_ref: ${{ steps.pins.outputs.rulespec_us_ref }}
    steps:
      - name: Checkout rules repository
        uses: actions/checkout@v6.0.2

      - name: Read protected workflow toolchain
        id: pins
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import re
          import tomllib
          from pathlib import Path

          toolchain = tomllib.loads(
              Path(".axiom/workflow-toolchain.toml").read_text()
          )["workflow_toolchain"]
          for key in (
              "axiom_encode_ref",
              "axiom_rules_engine_ref",
              "axiom_corpus_ref",
              "rulespec_us_ref",
          ):
              value = toolchain.get(key)
              if not isinstance(value, str) or re.fullmatch(r"[0-9a-f]{40}", value) is None:
                  raise SystemExit(f"{key} must be a full lowercase commit SHA")
              print(f"{key}={value}")
          PY

  validate:
    needs: [legacy-rulespec-freeze, workflow-toolchain]
    uses: TheAxiomFoundation/.github/.github/workflows/validate-rulespec.yml@c4956b1a06940ca63247a98d6ddcff4d2ad782be
    secrets: inherit
    with:
      axiom-encode-ref: ${{ needs.workflow-toolchain.outputs.axiom_encode_ref }}
      axiom-rules-engine-ref: ${{ needs.workflow-toolchain.outputs.axiom_rules_engine_ref }}
      axiom-corpus-ref: ${{ needs.workflow-toolchain.outputs.axiom_corpus_ref }}
      rulespec-us-ref: ${{ needs.workflow-toolchain.outputs.rulespec_us_ref }}
      corpus-release-registry-url: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
      corpus-release-registry-anon-key: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      validate-roots: auto
      # PR #911 is the reviewed history-preserving canonical-layout migration.
      # Its one merge push is covered by the immutable retired-schema freeze;
      # the guard runs again on every subsequent push and pull request.
      run-generated-guard: >-
        ${{ !((github.event_name == 'pull_request' && github.event.pull_request.number == 911) || (github.event_name == 'push' && github.ref == 'refs/heads/main' && startsWith(github.event.head_commit.message, 'Merge pull request #911 from '))) }}
      retired-schema-bootstrap-sha256: >-
        ${{ ((github.event_name == 'pull_request' && github.event.pull_request.number == 911) || (github.event_name == 'push' && github.ref == 'refs/heads/main' && startsWith(github.event.head_commit.message, 'Merge pull request #911 from '))) && '6157d16ded390075ca1e73d90f148926e592e84cf413e33c84797821ddfb24f9' || '' }}
      guard-programs-root: false

  drift-alarm:
    # Red-main alarm. Repository validation and the legacy freeze run on every
    # push to main and on the daily schedule; if either goes red, open (or
    # refresh) a tracking issue. Never fires for pull requests.
    needs: [legacy-rulespec-freeze, validate]
    if: ${{ always() && (github.event_name == 'schedule' || github.event_name == 'push') && (needs.legacy-rulespec-freeze.result != 'success' || needs.validate.result != 'success') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Open or refresh the red-main validation alarm
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EVENT_NAME: ${{ github.event_name }}
          FREEZE_RESULT: ${{ needs.legacy-rulespec-freeze.result }}
          VALIDATE_RESULT: ${{ needs.validate.result }}
        run: |
          set -euo pipefail
          title="RuleSpec repository checks are red on main"
          body="A repository check failed on main (${EVENT_NAME}): ${RUN_URL}

          Legacy RuleSpec freeze: ${FREEZE_RESULT}
          Full-matrix validation: ${VALIDATE_RESULT}

          Investigate the failed check in the run above, then close this issue
          once main is green again."
          existing="$(gh issue list --repo "$GITHUB_REPOSITORY" --state open \
            --search "in:title \"$title\"" --json number --jq '.[0].number // empty')"
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --repo "$GITHUB_REPOSITORY" \
              --body "Still red on $(date -u +%Y-%m-%dT%H:%MZ) (${EVENT_NAME}): ${RUN_URL}"
            echo "Refreshed alarm issue #$existing"
          else
            gh issue create --repo "$GITHUB_REPOSITORY" --title "$title" --body "$body"
            echo "Opened new alarm issue"
          fi
