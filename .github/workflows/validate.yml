name: Validate Texas Tax Rules

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install RAC
        run: pip install rac

      - name: Validate syntax
        run: rac check statute/

      - name: Run tests
        run: rac test tests/

      - name: Check coverage
        run: rac test tests/ --coverage
