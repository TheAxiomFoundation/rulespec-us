name: Validate Texas Tax Rules

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Cosilico
        run: pip install cosilico

      - name: Validate syntax
        run: cosilico check statute/

      - name: Run tests
        run: cosilico test tests/

      - name: Check coverage
        run: cosilico test tests/ --coverage
