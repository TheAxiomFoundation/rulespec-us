name: Source staleness and reverse index

# A5 of the Axiom platform plan: wire source-staleness checking into CI and
# maintain the provision -> rules reverse index.
#
# Two independent concerns:
#
# 1. reverse-index (BLOCKING) - `.axiom/index/provisions_to_rules.json` is a
#    generated artifact. This job regenerates it from the tracked RuleSpec YAML
#    and fails if the committed copy is stale. It needs only PyYAML, so it is
#    cheap and deterministic.
#
# 2. source-staleness (REPORT-ONLY) - recompute every
#    `module.source_verification.source_sha256` pin against axiom-corpus@main
#    and report drift. No checked-in module pins a source hash yet (see the
#    A5 follow-up: pin stamping is blocked by the guard-generated signed-apply
#    gate), so this job would be vacuous as a required check. It runs with
#    continue-on-error so the drift report is always visible without blocking
#    merges. Flip `continue-on-error` to false once pins exist repo-wide.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Weekly, aligned with the corpus/oracle cadence: catches corpus drift
    # even when no rulespec PR is open.
    - cron: "17 7 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  reverse-index:
    name: reverse-index
    runs-on: ubuntu-latest
    steps:
      - name: Checkout rules repository
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"

      - name: Install PyYAML
        run: python -m pip install --upgrade pip pyyaml

      - name: Regenerate provision -> rules reverse index
        run: python tests/generate_reverse_index.py

      - name: Fail if the committed reverse index is stale
        run: |
          set -euo pipefail
          if ! git diff --exit-code -- .axiom/index/provisions_to_rules.json; then
            echo "::error::.axiom/index/provisions_to_rules.json is stale." >&2
            echo "Run 'python tests/generate_reverse_index.py' and commit the result." >&2
            exit 1
          fi
          echo "Reverse index is up to date."

  source-staleness:
    name: source-staleness (report-only)
    runs-on: ubuntu-latest
    # Report-only: pins do not exist yet, so a failure here must not block
    # merges. Remove this line once source_sha256 pins are stamped repo-wide.
    continue-on-error: true
    steps:
      - name: Checkout rules repository
        uses: actions/checkout@v6.0.2

      - name: Resolve pinned source-verification toolchain
        id: toolchain
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import re
          import tomllib
          from pathlib import Path

          workflow = tomllib.loads(
              Path(".axiom/workflow-toolchain.toml").read_text()
          )["workflow_toolchain"]
          for key in ("axiom_encode_ref", "axiom_corpus_ref"):
              value = workflow.get(key)
              if not isinstance(value, str) or re.fullmatch(r"[0-9a-f]{40}", value) is None:
                  raise SystemExit(f"{key} must be a full lowercase commit SHA")
              print(f"{key}={value}")

          evidence = tomllib.loads(Path(".axiom/toolchain.toml").read_text())["toolchain"]
          print(f"axiom_corpus_release={evidence['axiom_corpus_release']}")
          print(
              "axiom_corpus_release_content_sha256="
              f"{evidence['axiom_corpus_release_content_sha256']}"
          )
          PY

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.13"

      - name: Set up Go
        uses: actions/setup-go@v6.5.0
        with:
          go-version: "1.26.1"
          cache: false

      # Source pins are meaningful only against authenticated release content;
      # mutable corpus main is not a legal evidence boundary.
      - name: Checkout pinned axiom-corpus
        uses: actions/checkout@v6.0.2
        with:
          repository: TheAxiomFoundation/axiom-corpus
          ref: ${{ steps.toolchain.outputs.axiom_corpus_ref }}
          path: _axiom/axiom-corpus

      - name: Checkout axiom-encode (pinned)
        uses: actions/checkout@v6.0.2
        with:
          repository: TheAxiomFoundation/axiom-encode
          ref: ${{ steps.toolchain.outputs.axiom_encode_ref }}
          path: _axiom/axiom-encode

      - name: Install axiom-encode
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e _axiom/axiom-encode
          rm -rf "$RUNNER_TEMP/axiom-verification-site-packages"
          python -m pip install --target "$RUNNER_TEMP/axiom-verification-site-packages" \
            _axiom/axiom-encode

      - name: Fetch pinned signed corpus release object from public registry
        shell: bash
        env:
          SUPABASE_URL: https://swocpijqqahhuwtuahwc.supabase.co
          SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          RELEASE_NAME: ${{ steps.toolchain.outputs.axiom_corpus_release }}
          RELEASE_CONTENT_SHA256: ${{ steps.toolchain.outputs.axiom_corpus_release_content_sha256 }}
        run: |
          set -euo pipefail
          test -n "$SUPABASE_ANON_KEY"
          destination="$GITHUB_WORKSPACE/_axiom/axiom-corpus/releases/$RELEASE_NAME/$RELEASE_CONTENT_SHA256.json"
          mkdir -p "$(dirname "$destination")"
          url="${SUPABASE_URL%/}/rest/v1/release_objects?select=release_object&release_name=eq.${RELEASE_NAME}&content_sha256=eq.${RELEASE_CONTENT_SHA256}&limit=2"
          curl --fail --silent --show-error --location --proto '=https' --tlsv1.2 \
            --header "apikey: $SUPABASE_ANON_KEY" \
            --header "Authorization: Bearer $SUPABASE_ANON_KEY" \
            --header "Accept-Profile: corpus" \
            --output "$destination.tmp" "$url"
          python - "$destination.tmp" "$destination" "$RELEASE_NAME" "$RELEASE_CONTENT_SHA256" <<'PY'
          import hashlib
          import json
          import sys
          from pathlib import Path

          source, destination = Path(sys.argv[1]), Path(sys.argv[2])
          expected_name, expected_sha = sys.argv[3], sys.argv[4]
          rows = json.loads(source.read_bytes())
          if not isinstance(rows, list) or len(rows) != 1 or not isinstance(rows[0], dict):
              raise SystemExit("public release registry did not return exactly one object")
          payload = rows[0].get("release_object")
          if not isinstance(payload, dict) or payload.get("release") != expected_name:
              raise SystemExit("public release registry returned the wrong object")
          content = payload.get("content")
          actual = hashlib.sha256(json.dumps(
              content, sort_keys=True, separators=(",", ":"), ensure_ascii=True,
          ).encode()).hexdigest()
          if payload.get("content_sha256") != actual or actual != expected_sha:
              raise SystemExit("public release registry returned a content-address mismatch")
          destination.write_text(json.dumps(payload, indent=2, sort_keys=True) + "\n")
          source.unlink()
          PY

      - name: Provision protected corpus-release verifier
        shell: bash
        env:
          TRUST_APPLY_ROOT: ${{ vars.AXIOM_ENCODE_APPLY_SIGNING_PUBLIC_KEY }}
          TRUST_EVAL_ROOT: ${{ vars.AXIOM_ENCODE_EVAL_SIGNING_PUBLIC_KEY }}
          TRUST_CORPUS_RELEASE_ROOT: ${{ vars.AXIOM_CORPUS_RELEASE_PUBLIC_KEY }}
        run: |
          set -euo pipefail
          pushd _axiom/axiom-encode >/dev/null
          CGO_ENABLED=0 go build -trimpath -buildvcs=false -ldflags='-buildid=' \
            -o "$RUNNER_TEMP/axiom-encode-signing-supervisor" \
            ./cmd/axiom-encode-signing-supervisor
          popd >/dev/null
          sudo rm -rf /opt/axiom-staleness-verification
          sudo "$(command -v python)" \
            _axiom/axiom-encode/scripts/provision_verification_supervisor.py \
            --destination /opt/axiom-staleness-verification \
            --supervisor "$RUNNER_TEMP/axiom-encode-signing-supervisor" \
            --site-packages "$RUNNER_TEMP/axiom-verification-site-packages" \
            --apply-root "$TRUST_APPLY_ROOT" \
            --eval-root "$TRUST_EVAL_ROOT" \
            --corpus-release-root "$TRUST_CORPUS_RELEASE_ROOT"
          sudo install -m 0755 "$(command -v git)" \
            /opt/axiom-staleness-verification/python/bin/git
          sudo chown -R 0:0 /opt/axiom-staleness-verification
          sudo chmod -R go-w /opt/axiom-staleness-verification
          sudo chown root:root /opt
          sudo chmod go-w /opt

      - name: Report unpinned-module counts
        id: pins
        shell: bash
        run: |
          set -euo pipefail
          report="$RUNNER_TEMP/staleness-report.txt"
          python - "$report" <<'PY'
          import sys
          from pathlib import Path

          import yaml

          repo = Path(".")
          pinned = 0
          unpinned = 0
          grounded = 0
          # Jurisdiction roots are top-level dirs like ``us`` and ``us-ca``.
          module_paths = sorted(
              {
                  path
                  for entry in repo.iterdir()
                  if entry.is_dir() and entry.name.split("-")[0].isalpha()
                  and len(entry.name.split("-")[0]) == 2
                  and entry.name[0] != "."
                  for pattern in ("*.yaml", "*.yml")
                  for path in entry.rglob(pattern)
              }
          )
          for path in module_paths:
              name = path.name
              if name.endswith((".test.yaml", ".test.yml")):
                  continue
              try:
                  payload = yaml.safe_load(path.read_text(encoding="utf-8"))
              except (OSError, yaml.YAMLError):
                  continue
              if not isinstance(payload, dict):
                  continue
              module = payload.get("module")
              if not isinstance(module, dict):
                  continue
              verification = module.get("source_verification")
              if not isinstance(verification, dict):
                  continue
              grounded += 1
              if str(verification.get("source_sha256") or "").strip():
                  pinned += 1
              else:
                  unpinned += 1

          lines = [
              "# Source staleness report",
              "",
              f"- Modules with source_verification: {grounded}",
              f"- Pinned (source_sha256 present): {pinned}",
              f"- Unpinned (no source_sha256): {unpinned}",
              "",
          ]
          if pinned == 0:
              lines.append(
                  "No modules pin source_sha256 yet, so the staleness check below "
                  "is vacuous. Pin stamping is blocked by the guard-generated "
                  "signed-apply gate; see the A5 follow-up issue."
              )
          Path(sys.argv[1]).write_text("\n".join(lines) + "\n", encoding="utf-8")
          print("\n".join(lines))
          PY
          cat "$report" >> "$GITHUB_STEP_SUMMARY"
          echo "report_path=$report" >> "$GITHUB_OUTPUT"

      - name: Run check-source-staleness (report-only)
        shell: bash
        run: |
          set -euo pipefail
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '## check-source-staleness output' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          set +e
          /opt/axiom-staleness-verification/axiom-encode-signing-supervisor \
            --trusted-signing-roots /opt/axiom-staleness-verification/signing-trust-roots.json \
            --trusted-python-runtime-root /opt/axiom-staleness-verification/python \
            --trusted-python-import-root /opt/axiom-staleness-verification/python/lib/python3.13/site-packages \
            --trusted-python-package-root /opt/axiom-staleness-verification/python/lib/python3.13/site-packages/axiom_encode \
            -- /opt/axiom-staleness-verification/axiom-encode check-source-staleness \
            --rulespec-root "$GITHUB_WORKSPACE" \
            --corpus-path "$GITHUB_WORKSPACE/_axiom/axiom-corpus" \
            | tee -a "$RUNNER_TEMP/staleness-report.txt" | tee -a "$GITHUB_STEP_SUMMARY"
          status=${PIPESTATUS[0]}
          set -e
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "check-source-staleness exit status: $status"
          if [ "$status" -ne 0 ]; then
            echo "::warning::check-source-staleness reported exit status $status; see the job summary and uploaded report."
          fi
          # This phase is explicitly report-only until source verification has
          # been migrated repo-wide. Preserve the result without failing CI.
          exit 0

      - name: Upload staleness report artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4.6.2
        with:
          name: source-staleness-report
          path: ${{ runner.temp }}/staleness-report.txt
          if-no-files-found: warn
