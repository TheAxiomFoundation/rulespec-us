    kind: parameter
    dtype: Money
    unit: USD
    period: Month
    indexed_by: household_size
    source: DWS Eligibility Manual Table 1, Gross Test column
    metadata:
      proof:
        atoms:
          - path: versions[0].values
            kind: parameter_table
