format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/regulation/42/435/320
  summary: |-
    If the agency provides Medicaid to individuals receiving SSI and elects to cover the medically needy, it may provide Medicaid to individuals who are 65 years of age and older and meet the income and resource requirements of subpart I.
imports:
  - us:regulations/42-cfr/435/301#medically_needy_financial_requirements_met
rules:
  - name: aged_individual_minimum_age
    kind: parameter
    dtype: Count
    source: 42 CFR 435.320(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/regulation/42/435/320
              excerpt: "Are 65 years of age and older"
    versions:
      - effective_from: '2014-01-01'
        formula: |-
          65

  - name: aged_individual_age_requirement_met
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 CFR 435.320(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us/regulation/42/435/320
              excerpt: "Are 65 years of age and older"
    versions:
      - effective_from: '2014-01-01'
        formula: |-
          person_age >= aged_individual_minimum_age

  - name: ssi_state_aged_medically_needy_medicaid_may_be_provided
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 CFR 435.320
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/regulation/42/435/320
          - path: versions[0].formula
            kind: import
            import:
              target: us:regulations/42-cfr/435/301#medically_needy_financial_requirements_met
              output: medically_needy_financial_requirements_met
              hash: sha256:520073760aa468e2c24cc6308ccd8dba290221ef746c6475cbc4ebd17908295a
    versions:
      - effective_from: '2014-01-01'
        formula: |-
          agency_provides_medicaid_to_individuals_receiving_ssi
          and agency_elects_to_cover_medically_needy
          and aged_individual_age_requirement_met
          and medically_needy_financial_requirements_met
