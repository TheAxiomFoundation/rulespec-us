format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/regulation/42/435/201
  summary: |-
    The agency may cover specified optional categorically needy groups not receiving cash assistance; if it provides Medicaid to any individual in such an optional group, it must provide Medicaid to all applicants found eligible as members of that group.
rules:
  - name: medicaid_required_for_eligible_optional_group_applicant
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 CFR 435.201(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/regulation/42/435/201
    versions:
      - effective_from: '2014-01-01'
        formula: |-
          agency_provides_medicaid_to_any_individual_in_optional_group_specified_in_paragraph_a
          and person_applied_for_medicaid
          and person_found_eligible_member_of_that_optional_group
