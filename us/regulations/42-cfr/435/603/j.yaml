format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/regulation/42/435/603/j
  summary: |-
    Eligibility groups for which MAGI-based methods do not apply: the agency does not apply the financial methodologies in this section for individuals described in paragraph (j), and must use the financial methods described in 42 CFR 435.601 and 435.602.
rules:
  - name: magi_based_methods_do_not_apply_for_medicaid_eligibility
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 CFR 435.603(j)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/regulation/42/435/603/j
    versions:
      - effective_from: '2014-01-01'
        formula: |-
          medicaid_eligibility_does_not_require_agency_income_determination
          or (individual_is_age_65_or_older and age_is_condition_of_eligibility)
          or eligibility_is_being_determined_on_basis_of_blindness_or_disability
          or long_term_care_services_and_supports_eligibility_group_evaluation
          or medicare_cost_sharing_assistance_eligibility_evaluation
          or medically_needy_coverage_eligibility_evaluation
