format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/regulation/42/435/603/e
  summary: |-
    MAGI-based income uses section 36B(d)(2)(B) financial methodologies, except lump sums count only in the month received, education-purpose scholarships/awards/fellowships not used for living expenses are excluded, and listed American Indian/Alaska Native distributions, payments, property, cultural-item, subsistence, and BIA education assistance items are excluded.
rules:
  - name: payment_excluded_from_magi_based_income
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: 42 CFR 435.603(e)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/regulation/42/435/603/e
    versions:
      - effective_from: '2014-01-01'
        formula: |-
          (scholarship_award_or_fellowship_grant_used_for_education_purposes and not scholarship_award_or_fellowship_grant_used_for_living_expenses)
          or distribution_from_alaska_native_corporation_or_settlement_trust
          or distribution_from_trust_or_restricted_property_under_secretary_of_interior_supervision
          or payment_from_rights_in_trust_or_restricted_land
          or payment_from_federally_protected_off_reservation_natural_resource_rights
          or distribution_from_natural_resource_real_property_interest_on_or_near_reservation
          or distribution_from_exercise_of_federally_protected_real_property_rights
          or payment_from_cultural_religious_traditional_or_subsistence_item_or_right
          or student_financial_assistance_under_bureau_of_indian_affairs_education_program
  - name: magi_based_income
    kind: derived
    entity: Payment
    dtype: Money
    period: Month
    unit: USD
    source: 42 CFR 435.603(e)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/regulation/42/435/603/e
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/regulation/42/435/603/e
              excerpt: "An amount received as a lump sum is counted as income only in the month received."
    versions:
      - effective_from: '2014-01-01'
        formula: |-
          if payment_is_income_under_section_36B_d_2_B_methodologies and not payment_excluded_from_magi_based_income and (not payment_received_as_lump_sum or lump_sum_received_in_current_month): payment_amount else: 0
