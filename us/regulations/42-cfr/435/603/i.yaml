  summary: '42 CFR 435.603(i): If household income determined under this section results
    in Medicaid financial ineligibility, and household income determined under 26
    CFR 1.36B-1(e) is below 100 percent FPL, Medicaid financial eligibility will be
    determined in accordance with 26 CFR 1.36B-1(e).'
