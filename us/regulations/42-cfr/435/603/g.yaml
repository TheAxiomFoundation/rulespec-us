    corpus_citation_path: us/regulation/42/435/603/g
  summary: |-
    In the case of individuals whose financial eligibility for Medicaid is determined in accordance with this section, the agency must not apply any assets or resources test or any income or expense disregards under title XIX, except as provided in paragraph (d)(1).
