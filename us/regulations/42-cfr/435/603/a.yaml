format: rulespec/v1
imports:
- us:regulations/42-cfr/435/603/j#magi_based_methods_do_not_apply_for_medicaid_eligibility
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/regulation/42/435/603/a
  summary: This section implements section 1902(e)(14) of the Act. Effective January
    1, 2014, the agency must apply this section's financial methodologies for Medicaid
    financial eligibility of all individuals, except paragraph (j) individuals and
    the paragraph (a)(3) transition for certain existing beneficiaries.
rules:
- name: legacy_beneficiary_methodology_transition_applies
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: 42 CFR 435.603(a)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us/regulation/42/435/603/a
          excerpt: beneficiaries determined eligible for Medicaid coverage to begin
            on or before December 31, 2013
      - path: versions[0].formula
        kind: effective_period
        source:
          corpus_citation_path: us/regulation/42/435/603/a
          excerpt: until March 31, 2014 or the next regularly-scheduled renewal
  versions:
  - effective_from: '2014-01-01'
    formula: 'beneficiary_coverage_began_on_or_before_legacy_transition_cutoff

      and not methodology_transition_date_has_arrived'
- name: magi_financial_methodologies_apply_for_medicaid_financial_eligibility
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: 42 CFR 435.603(a)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: predicate
        source:
          corpus_citation_path: us/regulation/42/435/603/a
          excerpt: the agency must apply the financial methodologies set forth in
            this section
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us/regulation/42/435/603/a
          excerpt: except for individuals identified in paragraph (j)
      - path: versions[0].formula
        kind: import
        import:
          target: us:regulations/42-cfr/435/603/j#magi_based_methods_do_not_apply_for_medicaid_eligibility
          output: magi_based_methods_do_not_apply_for_medicaid_eligibility
          hash: sha256:987414bc1d8fdf701b3090f8e82829aa6e4fb1e852dbc6cca0ccf80ce02b9d9c
      - path: versions[0].formula
        kind: import
        import:
          target: us:regulations/42-cfr/435/603/a#legacy_beneficiary_methodology_transition_applies
          output: legacy_beneficiary_methodology_transition_applies
          hash: sha256:local
  versions:
  - effective_from: '2014-01-01'
    formula: 'individual_financial_eligibility_for_medicaid_being_determined

      and not magi_based_methods_do_not_apply_for_medicaid_eligibility

      and not legacy_beneficiary_methodology_transition_applies'
