format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/regulation/42/435/603/f
  summary: |-
    Household consists of the taxpayer and expected tax dependents for taxpayers not claimed as dependents; tax dependents use the claiming taxpayer's household except listed cases; non-filers and exception cases include the individual, spouse, children, and for children, parents and siblings living with the individual. The State elects age 19 or age 19 with full-time students age 21. Married spouses living together are included in each other's households.
rules:
  - name: state_plan_child_age_threshold
    kind: parameter
    dtype: Count
    source: 42 CFR 435.603(f)(3)(iv)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/regulation/42/435/603/f
              excerpt: "Age 19"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          19

  - name: state_plan_full_time_student_age_threshold
    kind: parameter
    dtype: Count
    source: 42 CFR 435.603(f)(3)(iv)(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/regulation/42/435/603/f
              excerpt: "in the case of full-time students, age 21"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          21

  - name: under_state_plan_age
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 42 CFR 435.603(f)(3)(iv)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/regulation/42/435/603/f
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_age < state_plan_child_age_threshold
          or (state_plan_elects_full_time_student_age_21 and person_is_full_time_student and person_age < state_plan_full_time_student_age_threshold)

  - name: tax_dependent_exception_uses_non_filer_household_rules
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 42 CFR 435.603(f)(2)(i)-(iii)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/regulation/42/435/603/f
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          tax_dependent_is_not_spouse_or_child_of_claiming_taxpayer
          or (under_state_plan_age and expected_to_be_claimed_by_one_parent_and_living_with_both_parents_and_parents_do_not_expect_joint_return)
          or (under_state_plan_age and expected_to_be_claimed_by_non_custodial_parent)

  - name: non_filer_household_rules_apply
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 42 CFR 435.603(f)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/regulation/42/435/603/f
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (not expects_to_file_federal_tax_return and not expects_to_be_claimed_as_tax_dependent)
          or tax_dependent_exception_uses_non_filer_household_rules

  - name: basic_taxpayer_household_member
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 42 CFR 435.603(f)(1), (f)(5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/regulation/42/435/603/f
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_expects_to_file_tax_return
          and not individual_expects_to_be_claimed_as_tax_dependent_by_another_taxpayer
          and (candidate_is_the_individual or (individual_expects_to_claim_candidate_as_tax_dependent and taxpayer_can_reasonably_establish_candidate_as_tax_dependent))

  - name: claimed_tax_dependent_household_member
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 42 CFR 435.603(f)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/regulation/42/435/603/f
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_expects_to_be_claimed_as_tax_dependent_by_another_taxpayer
          and not tax_dependent_exception_uses_non_filer_household_rules
          and candidate_is_in_household_of_taxpayer_claiming_individual

  - name: non_filer_household_member
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 42 CFR 435.603(f)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/regulation/42/435/603/f
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          non_filer_household_rules_apply
          and (candidate_is_the_individual
          or (candidate_lives_with_individual and candidate_is_individuals_spouse)
          or (candidate_lives_with_individual and candidate_is_individuals_child and candidate_under_state_plan_age)
          or (individual_under_state_plan_age and candidate_lives_with_individual and candidate_is_individuals_parent)
          or (individual_under_state_plan_age and candidate_lives_with_individual and candidate_is_individuals_sibling and candidate_under_state_plan_age))

  - name: spouse_included_in_household
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 42 CFR 435.603(f)(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/regulation/42/435/603/f
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          candidate_is_individuals_spouse and candidate_lives_with_individual

  - name: medicaid_household_member
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 42 CFR 435.603(f)(1)-(5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/regulation/42/435/603/f
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          basic_taxpayer_household_member
          or claimed_tax_dependent_household_member
          or non_filer_household_member
          or spouse_included_in_household
