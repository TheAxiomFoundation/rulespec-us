format: rulespec/v1
imports:
- us:regulations/42-cfr/435/603/f#medicaid_household_member
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/regulation/42/435/603/d
  summary: Household income is generally the sum of MAGI-based income of every individual
    included in the household. Certain non-filing children and tax dependents are
    excluded; State option may include actually available cash support exceeding nominal
    amounts for individuals described in paragraph (f)(2)(i); effective January 1,
    2014, States subtract an amount equivalent to 5 percentage points of the Federal
    poverty level only for the highest MAGI-based income standard eligibility group.
rules:
- name: household_member_income_excluded
  kind: derived
  entity: Person
  dtype: Judgment
  period: Year
  source: 42 CFR 435.603(d)(2)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us/regulation/42/435/603/d
  versions:
  - effective_from: '0001-01-01'
    formula: '(included_in_household_of_natural_adopted_or_step_parent and not expected_required_to_file_return_under_6012_a_1)

      or (tax_dependent_described_in_paragraph_f_2_i and not expected_required_to_file_return_under_6012_a_1)'
- name: household_member_counted_magi_based_income
  kind: derived
  entity: Person
  dtype: Money
  period: Year
  unit: USD
  source: 42 CFR 435.603(d)(1)-(2)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us/regulation/42/435/603/d
  versions:
  - effective_from: '0001-01-01'
    formula: 'if household_member_income_excluded: 0 else: magi_based_income'
- name: state_option_available_cash_support_included
  kind: derived
  entity: Person
  dtype: Money
  period: Year
  unit: USD
  source: 42 CFR 435.603(d)(3)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us/regulation/42/435/603/d
  versions:
  - effective_from: '0001-01-01'
    formula: 'if state_option_includes_actually_available_cash_support and tax_dependent_described_in_paragraph_f_2_i
      and cash_support_exceeds_nominal_amount: actually_available_cash_support_provided_by_claiming_taxpayer
      else: 0'
- name: member_of_individuals_household
  kind: data_relation
  data_relation:
    predicate: member_of_individuals_household
    arity: 2
- name: household_income_before_fpl_disregard
  kind: derived
  entity: Person
  dtype: Money
  period: Year
  unit: USD
  source: 42 CFR 435.603(d)(1)-(3)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us/regulation/42/435/603/d
      - path: versions[0].formula
        kind: import
        import:
          target: us:regulations/42-cfr/435/603/f#medicaid_household_member
          output: medicaid_household_member
          hash: sha256:82e4fc9da0d9256ad56169ef0aa6db2687601b4223ca9cb0846cfc1b25f24832
  versions:
  - effective_from: '0001-01-01'
    formula: 'sum_where(member_of_individuals_household, household_member_counted_magi_based_income,
      medicaid_household_member)

      + sum_where(member_of_individuals_household, state_option_available_cash_support_included,
      medicaid_household_member)'
- name: fpl_five_percentage_point_disregard_rate
  kind: parameter
  dtype: Rate
  source: 42 CFR 435.603(d)(4)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us/regulation/42/435/603/d
          excerpt: 5 percentage points of the Federal poverty level
  versions:
  - effective_from: '2014-01-01'
    formula: '0.05'
- name: fpl_five_percentage_point_disregard_amount
  kind: derived
  entity: Person
  dtype: Money
  period: Year
  unit: USD
  source: 42 CFR 435.603(d)(4)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us/regulation/42/435/603/d
          excerpt: 5 percentage points of the Federal poverty level for the applicable
            family size
  versions:
  - effective_from: '2014-01-01'
    formula: federal_poverty_level_for_applicable_family_size * fpl_five_percentage_point_disregard_rate
- name: household_income_for_highest_magi_income_standard_eligibility
  kind: derived
  entity: Person
  dtype: Money
  period: Year
  unit: USD
  source: 42 CFR 435.603(d)(4)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us/regulation/42/435/603/d
  versions:
  - effective_from: '2014-01-01'
    formula: 'if determining_eligibility_using_magi_based_income and determining_medical_assistance_under_highest_income_standard_group_using_magi_based_methodologies
      and not determining_eligibility_for_particular_eligibility_group: max(0, household_income_before_fpl_disregard
      - fpl_five_percentage_point_disregard_amount) else: household_income_before_fpl_disregard'
