- name: applicant_current_monthly_budget_period_required
  period: 2024-06
  input:
    us:regulations/42-cfr/435/603/h#input.individual_is_applicant_for_medicaid: true
    us:regulations/42-cfr/435/603/h#input.individual_not_receiving_medicaid_benefits_when_eligibility_is_determined: false
  output:
    us:regulations/42-cfr/435/603/h#current_monthly_budget_period_required_for_applicant_or_new_enrollee: holds
- name: current_beneficiary_projected_annual_state_plan_election
  period: 2024-06
  input:
    us:regulations/42-cfr/435/603/h#input.individual_is_current_medicaid_beneficiary: true
    us:regulations/42-cfr/435/603/h#input.individual_determined_financially_eligible_using_magi_based_methods: true
    ? us:regulations/42-cfr/435/603/h#input.state_plan_elects_projected_annual_household_income_and_family_size_budget_period_for_remainder_of_current_calendar_year
    : true
  output:
    us:regulations/42-cfr/435/603/h#current_beneficiary_projected_annual_budget_period_available: holds
- name: current_beneficiary_current_monthly_not_available_without_magi_methods
  period: 2024-06
  input:
    us:regulations/42-cfr/435/603/h#input.individual_is_current_medicaid_beneficiary: true
    us:regulations/42-cfr/435/603/h#input.individual_determined_financially_eligible_using_magi_based_methods: false
    us:regulations/42-cfr/435/603/h#input.state_plan_elects_current_monthly_household_income_and_family_size_budget_period: true
  output:
    us:regulations/42-cfr/435/603/h#current_beneficiary_current_monthly_budget_period_available: not_holds
- name: future_change_adjustment_available_with_contract_and_verification
  period: 2024-06
  input:
    us:regulations/42-cfr/435/603/h#input.eligibility_determined_under_paragraph_h_1_or_h_2: true
    us:regulations/42-cfr/435/603/h#input.agency_adopts_reasonable_prorated_future_change_method: true
    us:regulations/42-cfr/435/603/h#input.signed_employment_contract_evidences_future_change: true
    us:regulations/42-cfr/435/603/h#input.clear_history_evidences_predictable_income_fluctuations: false
    us:regulations/42-cfr/435/603/h#input.other_clear_indicia_evidence_future_income_or_family_size_change: false
    ? us:regulations/42-cfr/435/603/h#input.future_income_or_family_size_change_verified_under_income_and_eligibility_verification_requirements
    : true
  output:
    us:regulations/42-cfr/435/603/h#reasonably_predictable_future_change_budget_adjustment_available: holds
- name: auto_positive_current_beneficiary_current_monthly_budget_period_available
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    us:regulations/42-cfr/435/603/h#input.individual_determined_financially_eligible_using_magi_based_methods: true
    us:regulations/42-cfr/435/603/h#input.individual_is_current_medicaid_beneficiary: true
    us:regulations/42-cfr/435/603/h#input.state_plan_elects_current_monthly_household_income_and_family_size_budget_period: true
  output:
    us:regulations/42-cfr/435/603/h#current_beneficiary_current_monthly_budget_period_available: holds
