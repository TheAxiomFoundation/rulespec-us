format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/regulation/42/435/603/k
  summary: |-
    In the case of an individual whose eligibility is being determined under § 435.214, the agency may consider the household to consist only of the individual, count only the individual's MAGI-based income, and increase the individual's family size by one.
rules:
  - name: section_435_214_family_size_increase_amount
    kind: parameter
    dtype: Count
    source: 42 CFR 435.603(k)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/regulation/42/435/603/k
              excerpt: "Increase the family size of the individual ... by one."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1

  - name: section_435_214_individual_only_household_treatment_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 42 CFR 435.603(k)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/regulation/42/435/603/k
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          eligibility_being_determined_under_section_435_214
          and agency_uses_section_435_214_individual_only_household_option

  - name: section_435_214_individual_only_household_member
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 42 CFR 435.603(k)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/regulation/42/435/603/k
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          section_435_214_individual_only_household_treatment_applies
          and candidate_is_the_individual

  - name: section_435_214_count_only_individual_magi_based_income_treatment_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 42 CFR 435.603(k)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/regulation/42/435/603/k
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          eligibility_being_determined_under_section_435_214
          and agency_uses_section_435_214_count_only_individual_magi_based_income_option

  - name: section_435_214_individual_magi_based_income_counted_for_paragraph_d
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: USD
    source: 42 CFR 435.603(k)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/regulation/42/435/603/k
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if section_435_214_count_only_individual_magi_based_income_treatment_applies: individual_magi_based_income else: 0

  - name: section_435_214_family_size_increase_treatment_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 42 CFR 435.603(k)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/regulation/42/435/603/k
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          eligibility_being_determined_under_section_435_214
          and agency_uses_section_435_214_family_size_increase_option

  - name: section_435_214_family_size_after_optional_increase
    kind: derived
    entity: Person
    dtype: Count
    period: Year
    source: 42 CFR 435.603(k)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/regulation/42/435/603/k
          - path: versions[0].formula
            kind: import
            import:
              target: us:regulations/42-cfr/435/603/k#section_435_214_family_size_increase_amount
              output: section_435_214_family_size_increase_amount
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          family_size_defined_in_paragraph_b + (if section_435_214_family_size_increase_treatment_applies: section_435_214_family_size_increase_amount else: 0)
