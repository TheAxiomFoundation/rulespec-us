    corpus_citation_path: us/regulation/42/435/845
  summary: |-
    To determine resource eligibility for medically needy individuals, the agency must consider only the individual's resources and resources available under § 435.602, deduct amounts under § 435.601 or § 435.121 more restrictive criteria, count resources otherwise excluded under SSI or AFDC conditional eligibility, and apply the resource standard under § 435.840.
  deferred_outputs:
    - output: us:regulations/42-cfr/435/845#medically_needy_resource_eligibility_determined
      reason: |-
        The resource-eligibility determination depends on cross-referenced resource-availability rules under 42 CFR 435.602, deduction methodologies under 42 CFR 435.601 or 435.121, and the resource standard under 42 CFR 435.840. The copied context does not provide executable exports for those exact resource-amount and standard concepts, so the final determination cannot be computed faithfully in this module.
