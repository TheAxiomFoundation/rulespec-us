format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/regulation/42/435/301
  summary: |-
    If the agency chooses the medically needy option, it must provide Medicaid to specified pregnant women, individuals under 18, and qualifying women after pregnancy, and may cover listed optional groups; if it covers any individual in an optional group, it must cover all eligible members of that group.
rules:
  - name: postpregnancy_extended_period_days
    kind: parameter
    dtype: Count
    source: 42 CFR 435.301(b)(1)(iii)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/regulation/42/435/301
              excerpt: "a 60-day period, beginning on the last day of pregnancy"
    versions:
      - effective_from: '2014-01-01'
        formula: |-
          60

  - name: mandatory_child_maximum_age_exclusive
    kind: parameter
    dtype: Count
    source: 42 CFR 435.301(b)(1)(ii)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/regulation/42/435/301
              excerpt: "under 18 years of age"
    versions:
      - effective_from: '2014-01-01'
        formula: |-
          18

  - name: optional_young_person_maximum_age_exclusive
    kind: parameter
    dtype: Count
    source: 42 CFR 435.301(b)(2)(i)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/regulation/42/435/301
              excerpt: "Individuals under age 21"
    versions:
      - effective_from: '2014-01-01'
        formula: |-
          21

  - name: medically_needy_financial_requirements_met
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 CFR 435.301(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/regulation/42/435/301
    versions:
      - effective_from: '2014-01-01'
        formula: |-
          (income_meets_applicable_medically_needy_standard or incurred_medical_expenses_at_least_equal_to_income_standard_difference)
          and resources_meet_applicable_medically_needy_standard

  - name: mandatory_medically_needy_group_member
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 CFR 435.301(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us/regulation/42/435/301
    versions:
      - effective_from: '2014-01-01'
        formula: |-
          (person_is_pregnant and person_except_for_income_and_resources_would_be_mandatory_or_optional_categorically_needy_under_subpart_b_or_c)
          or (person_age < mandatory_child_maximum_age_exclusive and person_except_for_income_and_resources_would_be_mandatory_categorically_needy_under_subpart_b)
          or (woman_received_medically_needy_medicaid_on_day_pregnancy_ends and month_is_within_extended_postpregnancy_period)

  - name: mandatory_medically_needy_medicaid_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 CFR 435.301(b)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/regulation/42/435/301
    versions:
      - effective_from: '2014-01-01'
        formula: |-
          agency_chooses_medically_needy_option
          and medically_needy_financial_requirements_met
          and mandatory_medically_needy_group_member

  - name: postpregnancy_pregnancy_related_services_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 CFR 435.301(b)(1)(iii)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/regulation/42/435/301
    versions:
      - effective_from: '2014-01-01'
        formula: |-
          agency_chooses_medically_needy_option
          and medically_needy_financial_requirements_met
          and woman_received_medically_needy_medicaid_on_day_pregnancy_ends
          and month_is_within_extended_postpregnancy_period

  - name: optional_medically_needy_group_member
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 CFR 435.301(b)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us/regulation/42/435/301
    versions:
      - effective_from: '2014-01-01'
        formula: |-
          (person_age < optional_young_person_maximum_age_exclusive)
          or person_is_parent_or_other_caretaker_relative
          or person_is_aged
          or person_is_blind
          or person_is_disabled

  - name: optional_medically_needy_medicaid_may_be_provided
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 CFR 435.301(b)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/regulation/42/435/301
    versions:
      - effective_from: '2014-01-01'
        formula: |-
          agency_chooses_medically_needy_option
          and medically_needy_financial_requirements_met
          and optional_medically_needy_group_member

  - name: selected_optional_group_all_eligible_members_must_be_covered
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 CFR 435.301(b)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/regulation/42/435/301
    versions:
      - effective_from: '2014-01-01'
        formula: |-
          agency_provides_medicaid_to_any_individual_in_persons_optional_group
          and medically_needy_financial_requirements_met
          and optional_medically_needy_group_member
