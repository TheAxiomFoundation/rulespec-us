format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/regulation/42/435/217
  summary: |-
    The agency may provide Medicaid to groups of individuals in the community if the group would be eligible for Medicaid if institutionalized, would otherwise require specified institutional levels of care absent HCBS waiver services, and receives the waivered services.
rules:
  - name: institutional_medicaid_eligibility_requirement_met
    kind: derived
    entity: MedicaidHcbsWaiverGroup
    dtype: Judgment
    period: Month
    source: 42 CFR 435.217(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/regulation/42/435/217
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          group_would_be_eligible_for_medicaid_if_institutionalized
  - name: hcbs_waiver_institutional_level_of_care_requirement_met
    kind: derived
    entity: MedicaidHcbsWaiverGroup
    dtype: Judgment
    period: Month
    source: 42 CFR 435.217(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/regulation/42/435/217
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          absent_subpart_g_waiver_group_would_require_hospital_nf_or_icf_iid_level_of_care
          or (absent_subpart_h_waiver_group_would_require_nf_level_of_care and group_members_are_age_65_or_older)
  - name: hcbs_waiver_medicaid_may_be_provided
    kind: derived
    entity: MedicaidHcbsWaiverGroup
    dtype: Judgment
    period: Month
    source: 42 CFR 435.217
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/regulation/42/435/217
          - path: versions[0].formula
            kind: import
            import:
              target: us:regulations/42-cfr/435/217#institutional_medicaid_eligibility_requirement_met
              output: institutional_medicaid_eligibility_requirement_met
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us:regulations/42-cfr/435/217#hcbs_waiver_institutional_level_of_care_requirement_met
              output: hcbs_waiver_institutional_level_of_care_requirement_met
              hash: sha256:local
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          institutional_medicaid_eligibility_requirement_met
          and hcbs_waiver_institutional_level_of_care_requirement_met
          and group_receives_waivered_services
