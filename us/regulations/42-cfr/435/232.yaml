format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/regulation/42/435/232
  summary: |-
    If the agency provides Medicaid to individuals receiving SSI under § 435.120, it may provide Medicaid to individuals who receive only an optional State supplement meeting paragraph (b), who would be SSI-eligible except for income, and who are in one or more listed classifications. Optional supplement payments must be based on need, paid in cash regularly, equal the difference between countable income and the supplement income standard, and be available to all individuals in each classification statewide, with allowed cost-of-living variations by political subdivision.
rules:
  - name: optional_state_supplement_meets_payment_conditions
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 CFR 435.232(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/regulation/42/435/232
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          optional_state_supplement_is_based_on_need
          and optional_state_supplement_is_paid_in_cash_on_regular_basis
          and optional_state_supplement_equals_countable_income_gap_to_supplement_standard
          and optional_state_supplement_available_to_all_in_classification_and_statewide_or_allowed_cost_of_living_variation

  - name: optional_state_supplement_recipient_in_covered_classification
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 CFR 435.232(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/regulation/42/435/232
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          (person_is_aged and agency_covers_all_aged_individuals)
          or (person_is_blind and agency_covers_all_blind_individuals)
          or (person_is_disabled and agency_covers_all_disabled_individuals)
          or (person_is_aged and person_is_in_domiciliary_facility_or_other_group_living_arrangement_defined_under_ssi and agency_covers_aged_individuals_in_ssi_group_living_arrangements)
          or (person_is_blind and person_is_in_domiciliary_facility_or_other_group_living_arrangement_defined_under_ssi and agency_covers_blind_individuals_in_ssi_group_living_arrangements)
          or (person_is_disabled and person_is_in_domiciliary_facility_or_other_group_living_arrangement_defined_under_ssi and agency_covers_disabled_individuals_in_ssi_group_living_arrangements)
          or (person_receives_federally_administered_optional_state_supplement and agency_covers_federally_administered_optional_state_supplement_recipients)
          or (person_is_in_secretary_specified_federally_administered_supplementary_payment_classification and agency_covers_secretary_specified_additional_classifications)
          or (person_is_in_state_specified_reasonable_group_receiving_state_administered_supplementary_payments and agency_covers_state_specified_reasonable_groups)

  - name: optional_state_supplement_recipient_medicaid_may_be_provided
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 CFR 435.232(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/regulation/42/435/232
          - path: versions[0].formula
            kind: import
            import:
              target: us:regulations/42-cfr/435/232#optional_state_supplement_meets_payment_conditions
              output: optional_state_supplement_meets_payment_conditions
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us:regulations/42-cfr/435/232#optional_state_supplement_recipient_in_covered_classification
              output: optional_state_supplement_recipient_in_covered_classification
              hash: sha256:local
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          agency_provides_medicaid_to_individuals_receiving_ssi_under_section_435_120
          and person_receives_only_optional_state_supplement
          and person_would_be_eligible_for_ssi_except_for_income_level
          and optional_state_supplement_meets_payment_conditions
          and optional_state_supplement_recipient_in_covered_classification
