- name: single resource standard required
  period:
    period_kind: custom
    name: calendar_year
    start: '2024-01-01'
    end: '2024-12-31'
  input:
    us:regulations/42-cfr/435/840#input.agency_uses_single_resource_standard_for_medically_needy_individuals: true
  output:
    us:regulations/42-cfr/435/840#medically_needy_resource_standard_required: holds
- name: cash assistance floor met
  period:
    period_kind: custom
    name: calendar_year
    start: '2024-01-01'
    end: '2024-12-31'
  input:
    us:regulations/42-cfr/435/840#input.medically_needy_resource_standard_amount: 3000
    us:regulations/42-cfr/435/840#input.lowest_resource_standard_used_under_related_cash_assistance_programs: 2000
  output:
    us:regulations/42-cfr/435/840#resource_standard_meets_cash_assistance_floor: holds
- name: separate aged blind or disabled floor uses higher amount
  period:
    period_kind: custom
    name: calendar_year
    start: '2024-01-01'
    end: '2024-12-31'
  input:
    us:regulations/42-cfr/435/840#input.state_uses_more_restrictive_requirements_than_ssi_for_aged_blind_or_disabled: true
    ? us:regulations/42-cfr/435/840#input.lowest_categorically_needy_resource_standard_currently_applied_under_more_restrictive_criteria
    : 2500
    ? us:regulations/42-cfr/435/840#input.medically_needy_resource_standard_in_effect_under_state_medicaid_plan_on_january_1_1972
    : 3000
    us:regulations/42-cfr/435/840#input.separate_aged_blind_or_disabled_resource_standard_amount: 3000
  output:
    us:regulations/42-cfr/435/840#separate_aged_blind_or_disabled_resource_standard_floor: 3000
    us:regulations/42-cfr/435/840#separate_aged_blind_or_disabled_resource_standard_complies: holds
- name: larger assistance unit standard may not be lower
  period:
    period_kind: custom
    name: calendar_year
    start: '2024-01-01'
    end: '2024-12-31'
  input:
    us:regulations/42-cfr/435/840#input.resource_standard_for_larger_assistance_unit: 1900
    us:regulations/42-cfr/435/840#input.resource_standard_for_smaller_assistance_unit: 2000
  output:
    us:regulations/42-cfr/435/840#resource_standard_does_not_diminish_with_larger_assistance_unit: not_holds
- name: auto_positive_resource_standard_does_not_diminish_with_larger_assistance_unit
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    us:regulations/42-cfr/435/840#input.resource_standard_for_larger_assistance_unit: 999999
    us:regulations/42-cfr/435/840#input.resource_standard_for_smaller_assistance_unit: 0
  output:
    us:regulations/42-cfr/435/840#resource_standard_does_not_diminish_with_larger_assistance_unit: holds
