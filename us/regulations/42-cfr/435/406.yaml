format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/regulation/42/435/406
  summary: |-
    The agency must provide Medicaid to otherwise eligible U.S. citizens and nationals who make a citizenship declaration and have status verified; specified groups are exempt from citizenship documentation. The agency must also cover qualified noncitizens with verified satisfactory immigration status, subject to the 5-year-bar limitation, and must pay for § 440.255(c) services for otherwise eligible state residents who are qualified noncitizens subject to the 5-year bar or non-qualified noncitizens.
  deferred_outputs:
    - output: us:regulations/42-cfr/435/406/a#section_1115_demonstration_applicant_included_for_declaration_and_citizenship_verification
      reason: The paragraph includes applicants under a section 1115 demonstration for declaration and citizenship verification purposes, but no copied context provides the operative section 1115 demonstration dependency.
rules:
  - name: citizenship_documentation_verification_exempt
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 CFR 435.406(a)(1)(iii)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/regulation/42/435/406
    versions:
      - effective_from: '2014-01-01'
        formula: |-
          person_receives_ssi_title_xvi
          or person_entitled_to_or_enrolled_in_medicare
          or person_receives_disability_insurance_or_monthly_disability_based_benefits
          or person_in_foster_care_assisted_under_title_iv_b
          or person_receives_foster_care_maintenance_or_adoption_assistance_under_title_iv_e
          or person_deemed_eligible_in_this_state_as_newborn_to_medicaid_or_chip_eligible_pregnant_woman
          or person_deemed_eligible_in_another_state_as_newborn_to_medicaid_or_chip_eligible_pregnant_woman_and_agency_verifies_deemed_eligibility

  - name: medicaid_required_for_citizen_or_national
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 CFR 435.406(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us/regulation/42/435/406
    versions:
      - effective_from: '2014-01-01'
        formula: |-
          person_otherwise_eligible_for_medicaid
          and person_is_citizen_or_national_of_united_states
          and citizenship_declaration_made_by_individual_or_permitted_declarant
          and citizenship_or_satisfactory_immigration_status_verified_in_accordance_with_section_435_956

  - name: medicaid_required_for_qualified_noncitizen
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 CFR 435.406(a)(2)(i)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us/regulation/42/435/406
    versions:
      - effective_from: '2014-01-01'
        formula: |-
          person_otherwise_eligible_for_medicaid
          and person_is_qualified_noncitizen_described_in_42_cfr_435_4
          and satisfactory_documentary_evidence_of_qualified_noncitizen_status_provided
          and qualified_noncitizen_status_verified_with_dhs
          and noncitizen_declaration_of_satisfactory_immigration_status_made

  - name: qualified_noncitizen_subject_to_five_year_bar_limited_to_emergency_services
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 CFR 435.406(a)(2)(ii)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us/regulation/42/435/406
    versions:
      - effective_from: '2014-01-01'
        formula: |-
          person_is_qualified_noncitizen_described_in_42_cfr_435_4
          and person_subject_to_five_year_bar_under_8_usc_1613

  - name: medicaid_payment_required_for_emergency_services
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 CFR 435.406(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us/regulation/42/435/406
    versions:
      - effective_from: '2014-01-01'
        formula: |-
          person_resident_of_state
          and person_otherwise_meets_state_plan_eligibility_except_receipt_of_cash_assistance
          and (
            person_is_qualified_noncitizen_subject_to_five_year_bar
            or person_is_non_qualified_noncitizen_meeting_all_medicaid_eligibility_criteria_except_ssn_or_immigration_documentation
          )
