format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/regulation/42/435/211
  summary: |-
    Eligibility. The agency may provide Medicaid to individuals specified in § 435.201(a)(1) through (3) who are institutionalized in a title XIX reimbursable medical institution, are ineligible for SSI or an optional State supplement program because of lower institutional income standards, and would be eligible for SSI or a specified optional State supplement program if not institutionalized.
rules:
  - name: institutional_cash_assistance_exception_medicaid_may_be_provided
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 CFR 435.211(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us/regulation/42/435/211
    versions:
      - effective_from: '2014-01-01'
        formula: |-
          person_in_group_specified_in_section_435_201_a_1_through_3
          and person_institutionalized_in_title_xix_reimbursable_medical_institution
          and person_ineligible_for_ssi_or_optional_state_supplement_due_to_lower_institutional_income_standards
          and (
            person_would_be_eligible_for_ssi_if_not_institutionalized
            or person_would_be_eligible_for_optional_state_supplement_under_section_435_232_if_not_institutionalized
            or person_would_be_eligible_for_optional_state_supplement_under_section_435_234_if_not_institutionalized
          )
