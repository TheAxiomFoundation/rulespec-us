format: rulespec/v1
imports:
  - us:regulations/42-cfr/435/602/c#cash_assistance_less_restrictive_methodologies_may_be_applied
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/regulation/42/435/602/b
  summary: |-
    Subject to paragraph (c), for aged, blind, or disabled individuals in States using more restrictive requirements than SSI, the agency must apply SSI relative-responsibility requirements and methodologies or more extensive relative-responsibility requirements than § 435.602(a) but not beyond the Medicaid plan in effect on January 1, 1972.
rules:
  - name: relative_responsibility_requirements_satisfy_more_restrictive_state_financial_eligibility_standard
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 CFR 435.602(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/regulation/42/435/602/b
              excerpt: "aged, blind, or disabled individuals in States that apply eligibility requirements more restrictive than those used under SSI"
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us/regulation/42/435/602/b
              excerpt: "requirements and methodologies for financial responsibility of relatives used under the SSI program"
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us/regulation/42/435/602/b
              excerpt: "More extensive requirements for relative responsibility than specified in § 435.602(a)"
          - path: versions[0].formula
            kind: effective_period
            source:
              corpus_citation_path: us/regulation/42/435/602/b
              excerpt: "no more extensive than the requirements under the Medicaid plan in effect on January 1, 1972"
          - path: versions[0].formula
            kind: import
            import:
              target: us:regulations/42-cfr/435/602/c#cash_assistance_less_restrictive_methodologies_may_be_applied
              output: cash_assistance_less_restrictive_methodologies_may_be_applied
              hash: sha256:4d46655dd3daf52d7719292ea412f0642b273967fe8bf35811bb34e4d91cf011
    versions:
      - effective_from: '2014-01-01'
        formula: |-
          not person_is_aged_blind_or_disabled
          or not state_applies_more_restrictive_eligibility_requirements_than_ssi_for_aged_blind_or_disabled
          or cash_assistance_less_restrictive_methodologies_may_be_applied
          or agency_applies_ssi_financial_responsibility_requirements_and_methodologies_for_relatives
          or (agency_applies_more_extensive_relative_responsibility_requirements_than_section_435_602_a
          and agency_relative_responsibility_requirements_are_no_more_extensive_than_medicaid_plan_in_effect_on_january_1_1972)
