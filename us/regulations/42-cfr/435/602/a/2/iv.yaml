format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/regulation/42/435/602/a/2/iv
  summary: |-
    Eligible institutionalized spouses who are aged, blind, or disabled and shared the same room in a title XIX Medicaid institution may be considered as an eligible couple or as eligible individuals, whichever is more advantageous to the couple.
rules:
  - name: institutionalized_spouse_couple_may_be_counted_as_eligible_couple
    kind: derived
    entity: Family
    dtype: Judgment
    period: Month
    source: 42 CFR 435.602(a)(2)(iv)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/regulation/42/435/602/a/2/iv
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/regulation/42/435/602/a/2/iv
              excerpt: "whichever is more advantageous to the couple"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          spouses_are_eligible_institutionalized_spouses
          and spouses_are_aged_blind_or_disabled
          and spouses_shared_same_room_in_title_xix_medicaid_institution
          and eligible_couple_counting_is_more_advantageous_to_couple
  - name: institutionalized_spouse_couple_may_be_counted_as_eligible_individuals
    kind: derived
    entity: Family
    dtype: Judgment
    period: Month
    source: 42 CFR 435.602(a)(2)(iv)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/regulation/42/435/602/a/2/iv
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/regulation/42/435/602/a/2/iv
              excerpt: "or as eligible individuals, whichever is more advantageous to the couple"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          spouses_are_eligible_institutionalized_spouses
          and spouses_are_aged_blind_or_disabled
          and spouses_shared_same_room_in_title_xix_medicaid_institution
          and eligible_individual_counting_is_more_advantageous_to_couple
