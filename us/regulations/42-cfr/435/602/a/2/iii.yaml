format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/regulation/42/435/602/a/2/iii
  summary: |-
    When a couple ceases to live together, only the individual spouse's income is counted for eligibility beginning the first month following the month they cease living together.
rules:
  - name: individual_spouse_income_only_counting_rule_applies_after_separation
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 CFR 435.602(a)(2)(iii)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/regulation/42/435/602/a/2/iii
              excerpt: "When a couple ceases to live together"
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us/regulation/42/435/602/a/2/iii
              excerpt: "the agency must count only the income of the individual spouse"
          - path: versions[0].formula
            kind: effective_period
            source:
              corpus_citation_path: us/regulation/42/435/602/a/2/iii
              excerpt: "beginning the first month following the month the couple ceases to live together"
    versions:
      - effective_from: '2014-01-01'
        formula: |-
          couple_has_ceased_to_live_together
          and determination_month_is_on_or_after_first_month_following_month_couple_ceased_to_live_together
