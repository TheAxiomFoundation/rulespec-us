format: rulespec/v1
imports:
  - us:regulations/42-cfr/435/602/c#cash_assistance_less_restrictive_methodologies_may_be_applied
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/regulation/42/435/602/a/2/ii
  summary: |-
    For individuals under age 21, financial responsibility requirements include considering income and resources of parents or spouses whose income and resources would be considered if the individual were dependent under the State's approved title IV-A plan in effect as of July 16, 1996, whether or not actually contributed, except as specified under paragraph (c).
