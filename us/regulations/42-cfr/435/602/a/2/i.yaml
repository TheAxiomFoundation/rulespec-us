format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/regulation/42/435/602/a/2/i
  summary: |-
    Except for a spouse or a parent of a child under age 21, blind, or disabled, the agency must not consider a relative's income and resources available to an individual.
rules:
  - name: relative_income_and_resources_must_not_be_considered_available
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 CFR 435.602(a)(2)(i)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/regulation/42/435/602/a/2/i
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us/regulation/42/435/602/a/2/i
    versions:
      - effective_from: '2014-01-01'
        formula: |-
          not relative_is_spouse_of_individual
          and not (
            relative_is_parent_of_individual
            and individual_is_child
            and (individual_is_under_age_21 or individual_is_blind_or_disabled)
          )
