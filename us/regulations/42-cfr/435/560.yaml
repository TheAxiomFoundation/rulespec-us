  summary: |-
    CMS temporarily may exempt a State from the requirement to implement Sec. Sec. 435.550 through 435.559 and 435.561 through 435.563... if a State submits a request... and CMS determines... the State is demonstrating a good faith effort. CMS will consider... actions taken by the State... barriers... the State's detailed plan and timeline... and exigent circumstances. An exemption... shall expire no later than December 31, 2028... initial good faith effort exemptions... not to exceed 6 months. A State granted an exemption... must submit to CMS... a quarterly report...
