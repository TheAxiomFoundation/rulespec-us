format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/regulation/42/435/210
  summary: |-
    The agency may provide Medicaid to groups specified in § 435.201(a)(1) through (3) who meet SSI income and resource requirements or optional State supplement requirements in States providing Medicaid to optional State supplement recipients.
rules:
  - name: optional_aged_blind_disabled_cash_assistance_medicaid_may_be_provided
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 CFR 435.210(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us/regulation/42/435/210
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/regulation/42/435/210
    versions:
      - effective_from: '2014-01-01'
        formula: |-
          agency_provides_medicaid_to_the_optional_group
          and person_is_in_group_specified_in_section_435_201_a_1_through_3
          and (
            person_meets_income_and_resource_requirements_of_ssi
            or (
              person_meets_income_and_resource_requirements_of_optional_state_supplement_program
              and state_provides_medicaid_to_optional_state_supplement_recipients
            )
          )
