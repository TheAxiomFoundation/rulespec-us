format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/regulation/42/435/552
    source_sha256: 7b988e1c29315671eb1b19e63643a82e0485442a1f1acb299476a0bbfdc9ba57
  summary: '"An applicable individual demonstrates community engagement for a month"
    by satisfying one or more stated work, community-service, work-program, educational-enrollment,
    combined-hours, monthly-income, or seasonal-worker-income conditions. "The agency
    must determine the monthly income based on the individual''s MAGI-based income,
    for their MAGI-based household."'
  deferred_outputs:
  - output: us:regulations/42-cfr/435/552#seasonal_worker_average_income_path_demonstrates_community_engagement
    reason: The seasonal-worker pathway requires determining whether the individual
      is a seasonal worker as described in 26 U.S.C. 45R(d)(5)(B), whose definition
      is not supplied as RuleSpec context.
    source_values:
    - us:regulations/42-cfr/435/552#seasonal_worker_income_average_lookback_months
  - output: us:regulations/42-cfr/435/552#community_engagement_demonstrated_for_month
    reason: The complete one-or-more demonstration result includes the deferred seasonal-worker
      pathway in 42 CFR 435.552(a)(7).
imports:
- us:regulations/42-cfr/435/551#applicable_individual
rules:
- name: monthly_community_engagement_hours_requirement
  kind: parameter
  dtype: Count
  source: 42 CFR 435.552(a)(1)-(3), (a)(5)-(7)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us/regulation/42/435/552
          excerpt: not less than 80 hours
  versions:
  - effective_from: '0001-01-01'
    formula: '80'
- name: educational_credit_hour_weekly_multiplier
  kind: parameter
  dtype: Decimal
  source: 42 CFR 435.552(d)(1)(i)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us/regulation/42/435/552
          excerpt: one credit hour of instruction by 3
  versions:
  - effective_from: '0001-01-01'
    formula: '3'
- name: educational_monthly_week_multiplier
  kind: parameter
  dtype: Decimal
  source: 42 CFR 435.552(d)(1)(ii)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us/regulation/42/435/552
          excerpt: by 4.33 weeks
  versions:
  - effective_from: '0001-01-01'
    formula: '4.33'
- name: seasonal_worker_income_average_lookback_months
  kind: parameter
  dtype: Count
  source: 42 CFR 435.552(a)(7), (g)(1)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us/regulation/42/435/552
          excerpt: "(7) The individual had an average monthly income over the preceding\
            \ \n6 months that is not less than the applicable minimum wage requirement\
            \ \nunder 29 U.S.C. 206(a)(1)(C) multiplied by 80 hours, and is a seasonal\
            \ \nworker, as described in section 45R(d)(5)(B) of the Internal Revenue\
            \ \nCode of 1986 (26 U.S.C. 45R(d)(5)(B))."
  versions:
  - effective_from: '0001-01-01'
    formula: '6'
- name: monthly_income_threshold_for_community_engagement
  kind: derived
  entity: Person
  dtype: Money
  period: Month
  unit: USD
  source: 42 CFR 435.552(a)(6), (f)(1)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us/regulation/42/435/552
          excerpt: "(6) The individual has a monthly income that is not less than\
            \ the \napplicable minimum wage requirement under section 6 of the Fair\
            \ Labor \nStandards Act of 1938 (29 U.S.C. 206(a)(1)(C)), multiplied by\
            \ 80 hours."
      - path: versions[0].formula
        kind: import
        import:
          target: us:regulations/42-cfr/435/552#monthly_community_engagement_hours_requirement
          output: monthly_community_engagement_hours_requirement
          hash: sha256:local
  versions:
  - effective_from: '0001-01-01'
    formula: applicable_federal_minimum_wage_requirement * monthly_community_engagement_hours_requirement
- name: work_hours_for_community_engagement
  kind: derived
  entity: Person
  dtype: Decimal
  period: Month
  source: 42 CFR 435.552(a)(1), (e)(2)(i)-(ii), (f)(2)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us/regulation/42/435/552
          excerpt: "(i) If the monthly income is less than the applicable Federal\
            \ \nminimum wage requirement under 29 U.S.C. 206(a)(1)(C) multiplied by\
            \ 80 \nhours, and the agency does not have documentation regarding the\
            \ number \nof hours worked, the agency may calculate the hours for work\
            \ under \nparagraph (a)(1) of this section based on the monthly income\
            \ as \ndetermined under paragraph (f)(2) of this section provided that\
            \ the \nagency must use a reasonable method to allocate work hours between\
            \ \nmembers of the household."
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us/regulation/42/435/552
          excerpt: "(i) If the monthly income is less than the applicable Federal\
            \ \nminimum wage requirement under 29 U.S.C. 206(a)(1)(C) multiplied by\
            \ 80 \nhours, and the agency does not have documentation regarding the\
            \ number \nof hours worked, the agency may calculate the hours for work\
            \ under \nparagraph (a)(1) of this section based on the monthly income\
            \ as \ndetermined under paragraph (f)(2) of this section provided that\
            \ the \nagency must use a reasonable method to allocate work hours between\
            \ \nmembers of the household."
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us/regulation/42/435/552
          excerpt: "(ii) If the agency uses the option under paragraph (e)(2)(i) of\
            \ \nthis section, the agency must calculate the hours for work by dividing\
            \ \nthe monthly income as determined under paragraph (f)(2) of this section\
            \ \nby the applicable Federal minimum wage requirement under 29 U.S.C.\
            \ \n206(a)(1)(C)."
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us/regulation/42/435/552
          excerpt: MAGI-based income, for their MAGI-based household
      - path: versions[0].formula
        kind: import
        import:
          target: us:regulations/42-cfr/435/552#monthly_income_threshold_for_community_engagement
          output: monthly_income_threshold_for_community_engagement
          hash: sha256:local
  versions:
  - effective_from: '0001-01-01'
    formula: 'if agency_uses_income_based_work_hours_calculation and agency_lacks_documentation_of_hours_worked
      and agency_uses_reasonable_method_to_allocate_work_hours_between_household_members
      and magi_based_household_monthly_income < monthly_income_threshold_for_community_engagement:
      reasonably_allocated_individual_monthly_income / applicable_federal_minimum_wage_requirement
      else: documented_work_hours'
- name: less_than_half_time_educational_program_hours
  kind: derived
  entity: Person
  dtype: Decimal
  period: Month
  source: 42 CFR 435.552(d)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us/regulation/42/435/552
          excerpt: Multiply the number of each one credit hour of instruction by 3
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us/regulation/42/435/552
          excerpt: "(ii) Multiply the weekly total as determined under paragraph \n\
            (d)(1)(i) of this section by 4.33 weeks to get total hours in a 1-month\
            \ \nperiod."
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us/regulation/42/435/552
          excerpt: "attending class and participating in educational activities will\
            \ count \ntowards meeting this requirement."
      - path: versions[0].formula
        kind: import
        import:
          target: us:regulations/42-cfr/435/552#educational_credit_hour_weekly_multiplier
          output: educational_credit_hour_weekly_multiplier
          hash: sha256:local
      - path: versions[0].formula
        kind: import
        import:
          target: us:regulations/42-cfr/435/552#educational_monthly_week_multiplier
          output: educational_monthly_week_multiplier
          hash: sha256:local
  versions:
  - effective_from: '0001-01-01'
    formula: 'if individual_enrolled_in_educational_program_less_than_half_time: if
      educational_program_uses_credit_hours: educational_program_credit_hours_of_instruction
      * educational_credit_hour_weekly_multiplier * educational_monthly_week_multiplier
      else: educational_program_class_and_educational_activity_hours else: 0'
- name: combined_activity_hours_for_community_engagement
  kind: derived
  entity: Person
  dtype: Decimal
  period: Month
  source: 42 CFR 435.552(e)(2)-(4)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
