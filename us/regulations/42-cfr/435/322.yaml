  summary: |-
    If the agency provides Medicaid to individuals receiving SSI and elects to cover the medically needy, it may provide Medicaid to blind individuals who meet the blindness requirements in §§ 435.530 and 435.531 and the income and resource requirements of subpart I.
imports:
