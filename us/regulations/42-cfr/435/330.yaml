format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/regulation/42/435/330
  summary: |-
    If an agency covers medically needy individuals and provides categorically needy Medicaid to aged, blind, or disabled individuals only under requirements more restrictive than SSI, it may provide medically needy Medicaid to aged, blind, or disabled individuals who do not qualify under §§ 435.121 or 435.230 and, if applying as blind or disabled, meet the blindness or disability definition under § 435.121. The agency must apply the same nonfinancial requirements as under §§ 435.121 and 435.230 and the financial eligibility requirements of subparts G and I.
rules:
  - name: medically_needy_aged_blind_disabled_medicaid_may_be_provided
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 CFR 435.330(a)-(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/regulation/42/435/330
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/regulation/42/435/330
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/regulation/42/435/330
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          agency_provides_categorically_needy_medicaid_only_to_aged_blind_or_disabled_individuals_under_more_restrictive_requirements_than_ssi
          and agency_elects_to_cover_the_medically_needy
          and person_is_aged_blind_or_disabled
          and not person_qualifies_for_categorically_needy_medicaid_under_section_435_121
          and not person_qualifies_for_categorically_needy_medicaid_under_section_435_230
          and (not person_applies_as_blind_or_disabled or person_meets_blindness_or_disability_definition_established_under_section_435_121)
          and person_meets_same_nonfinancial_requirements_applied_to_categorically_needy_individuals_under_sections_435_121_and_435_230
          and person_meets_financial_eligibility_requirements_of_subparts_g_and_i
