  summary: |-
    For activities under 42 CFR 435.550 through 435.563 occurring on or after the State's implementation date, each State must submit timely, complete, sufficient-quality data to CMS for specified enrollment, retention, eligibility, compliance, and CMS-specified monitoring categories. The agency may be subject to corrective action, additional data collection, or additional outreach notices when reported data are deficient or indicate substantial noncompliance or a need for increased outreach.
