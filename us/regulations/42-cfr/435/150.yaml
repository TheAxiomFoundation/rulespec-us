format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/regulation/42/435/150
  summary: |-
    Eligibility. The agency must provide Medicaid to individuals who are under age 26, are not eligible and enrolled for mandatory coverage under specified Medicaid categories, and were in foster care under State or in-State Tribal responsibility and enrolled in Medicaid upon attaining age 18 or the higher age at which that foster care assistance ends.
rules:
  - name: former_foster_care_child_maximum_age_exclusive
    kind: parameter
    dtype: Integer
    source: 42 CFR 435.150(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/regulation/42/435/150
              excerpt: "Are under age 26"
    versions:
      - effective_from: '2014-01-01'
        formula: |-
          26

  - name: standard_foster_care_attainment_age
    kind: parameter
    dtype: Integer
    source: 42 CFR 435.150(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/regulation/42/435/150
              excerpt: "Age 18"
    versions:
      - effective_from: '2014-01-01'
        formula: |-
          18

  - name: person_under_former_foster_care_child_maximum_age
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 CFR 435.150(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/regulation/42/435/150
              excerpt: "Are under age 26"
    versions:
      - effective_from: '2014-01-01'
        formula: |-
          person_age < former_foster_care_child_maximum_age_exclusive

  - name: attained_standard_foster_care_age_condition_met
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 CFR 435.150(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/regulation/42/435/150
              excerpt: "upon attaining: (i) Age 18"
    versions:
      - effective_from: '2014-01-01'
        formula: |-
          person_was_in_foster_care_under_state_or_tribe_responsibility_upon_attaining_age_18
          and person_was_enrolled_in_medicaid_under_state_plan_or_1115_demonstration_upon_attaining_age_18

  - name: attained_higher_foster_care_assistance_end_age_condition_met
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 CFR 435.150(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/regulation/42/435/150
              excerpt: "A higher age at which the State's or such Tribe's foster care assistance ends"
    versions:
      - effective_from: '2014-01-01'
        formula: |-
          person_was_in_foster_care_under_state_or_tribe_responsibility_upon_attaining_higher_foster_care_assistance_end_age
          and person_was_enrolled_in_medicaid_under_state_plan_or_1115_demonstration_upon_attaining_higher_foster_care_assistance_end_age

  - name: former_foster_care_child_medicaid_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 CFR 435.150(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/regulation/42/435/150
    versions:
      - effective_from: '2014-01-01'
        formula: |-
          person_under_former_foster_care_child_maximum_age
          and not person_eligible_and_enrolled_for_mandatory_coverage_under_435_110_through_435_118_or_435_120_through_435_145
          and (attained_standard_foster_care_age_condition_met or attained_higher_foster_care_assistance_end_age_condition_met)
