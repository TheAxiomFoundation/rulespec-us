format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/regulation/42/435/831
  summary: |-
    The agency must determine medically needy income eligibility under this section. If countable income determined under paragraph (b) is equal to or less than the applicable income standard under § 435.814, the individual is eligible for Medicaid.
  deferred_outputs:
    - output: us:regulations/42-cfr/435/831/b#countable_income
      reason: Paragraph (b) requires applying alternative AFDC, MAGI, SSI, optional State supplement, and more-restrictive-State methodologies, including cited provisions that are not fully executable in the supplied context.
    - output: us:regulations/42-cfr/435/831/h#medical_expense_deduction_order
      reason: Paragraph (h) governs State-selected ordering methods for deducting incurred medical expenses; the required expense relation, service-date and bill-submission ordering ontology is outside the supported executable surface for this artifact.
rules:
  - name: eligible_based_on_countable_income
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 CFR 435.831(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/regulation/42/435/831
              excerpt: "If countable income determined under paragraph (b) of this section is equal to or less than that applicable income standard under § 435.814, the individual is eligible for Medicaid."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          countable_income_determined_under_paragraph_b <= applicable_income_standard_under_section_435_814
