format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/regulation/42/435/601/a
  summary: |-
    "cash assistance financial methodologies refers to the income and resources methodologies of the AFDC, SSI, or State supplement programs" and, for certain aged, blind, and disabled individuals, methodologies established under §§ 435.121 and 435.230.
rules:
  - name: cash_assistance_financial_methodology
    kind: derived
    entity: FinancialMethodology
    dtype: Judgment
    period: Year
    source: 42 CFR 435.601(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/regulation/42/435/601/a
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          methodology_is_income_or_resource_methodology_of_afdc_ssi_or_state_supplement_programs
          or (
            methodology_is_for_aged_blind_or_disabled_individuals_in_state_using_more_restrictive_criteria_than_ssi
            and methodology_is_established_in_accordance_with_435_121_and_435_230
          )
