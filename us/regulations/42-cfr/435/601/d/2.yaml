format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/regulation/42/435/601/d/2
  summary: |-
    Methodologies elected for paragraph (d)(1) groups may be less restrictive, but no more restrictive, than SSI methodologies for aged, blind, and disabled groups, or the most closely categorically related State plan methodologies for all other groups.
imports:
  - us:regulations/42-cfr/435/601/d/1#individual_is_in_group_for_less_restrictive_methodology
rules:
  - name: paragraph_d_2_methodology_limit_satisfied
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 CFR 435.601(d)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us/regulation/42/435/601/d/2
          - path: versions[0].formula
            kind: import
            import:
              target: us:regulations/42-cfr/435/601/d/1#individual_is_in_group_for_less_restrictive_methodology
              output: individual_is_in_group_for_less_restrictive_methodology
              hash: sha256:c17b2a8f6470d56ab54cb3b7fcf17d3e1f827d3158a05e011ddbe50002dc5898
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_is_in_group_for_less_restrictive_methodology
          and (
            (
              group_is_of_aged_blind_or_disabled_individuals
              and (
                state_uses_more_restrictive_requirements_than_ssi
                or agency_elected_income_and_resource_methodology_is_no_more_restrictive_than_ssi_methodologies
              )
            )
            or (
              not group_is_of_aged_blind_or_disabled_individuals
              and agency_elected_income_and_resource_methodology_is_no_more_restrictive_than_most_closely_categorically_related_state_plan_methodologies
            )
          )
