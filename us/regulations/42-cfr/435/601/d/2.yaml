format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/regulation/42/435/601/d/2
  summary: |-
    The income and resource methodologies elected for paragraph (d)(1) groups may be less restrictive, but no more restrictive, than SSI methodologies for aged, blind, and disabled groups, except in States using more restrictive requirements than SSI; for all other groups, no more restrictive than the most closely categorically related State plan methodologies.
rules:
  - name: aged_blind_disabled_group_elected_methodologies_within_restrictiveness_limit
    kind: derived
    entity: StateAgency
    dtype: Judgment
    period: Year
    source: 42 CFR 435.601(d)(2)(i)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/regulation/42/435/601/d/2
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/regulation/42/435/601/d/2
              excerpt: "except in States using more restrictive requirements than SSI"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          agency_elects_income_and_resource_methodologies_for_paragraph_d_1_group
          and paragraph_d_1_group_is_aged_blind_or_disabled
          and (
            state_uses_more_restrictive_requirements_than_ssi
            or elected_methodologies_no_more_restrictive_than_ssi_methodologies
          )
  - name: other_group_elected_methodologies_within_restrictiveness_limit
    kind: derived
    entity: StateAgency
    dtype: Judgment
    period: Year
    source: 42 CFR 435.601(d)(2)(ii)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/regulation/42/435/601/d/2
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          agency_elects_income_and_resource_methodologies_for_paragraph_d_1_group
          and not paragraph_d_1_group_is_aged_blind_or_disabled
          and elected_methodologies_no_more_restrictive_than_most_closely_categorically_related_state_plan_methodologies
