format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/regulation/42/435/601/d/1
  summary: |-
    At State option, and subject to paragraphs (d)(2) through (5), the agency may apply less restrictive income and resource methodologies for specified QMB, optional categorically needy, medically needy, and aged, blind, or disabled groups.
rules:
  - name: individual_is_in_group_for_less_restrictive_methodology
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 CFR 435.601(d)(1)(i)-(iv)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us/regulation/42/435/601/d/1
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_is_qualified_medicare_beneficiary_specified_in_sections_1902_a_10_E_and_1905_p
          or individual_is_optional_categorically_needy_under_subpart_C_and_section_1902_a_10_A_ii
          or individual_is_medically_needy_under_subpart_D_and_section_1902_a_10_C_i_III
          or individual_is_aged_blind_or_disabled_in_state_using_more_restrictive_requirements_than_ssi_under_435_121_and_435_230
  - name: less_restrictive_income_and_resource_methodology_may_be_applied
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 CFR 435.601(d)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us/regulation/42/435/601/d/1
          - path: versions[0].formula
            kind: import
            import:
              target: us:regulations/42-cfr/435/601/d/1#individual_is_in_group_for_less_restrictive_methodology
              output: individual_is_in_group_for_less_restrictive_methodology
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          state_has_elected_less_restrictive_methodology_option
          and agency_income_or_resource_methodology_is_less_restrictive_than_cash_assistance_or_permitted_methodologies
          and conditions_of_paragraph_d_2_are_satisfied
          and conditions_of_paragraph_d_3_are_satisfied
          and conditions_of_paragraph_d_4_are_satisfied
          and conditions_of_paragraph_d_5_are_satisfied
          and individual_is_in_group_for_less_restrictive_methodology
