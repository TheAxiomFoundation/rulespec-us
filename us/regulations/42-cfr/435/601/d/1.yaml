format: rulespec/v1
imports:
  - us:regulations/42-cfr/435/601/d/2#aged_blind_disabled_group_elected_methodologies_within_restrictiveness_limit
  - us:regulations/42-cfr/435/601/d/2#other_group_elected_methodologies_within_restrictiveness_limit
  - us:regulations/42-cfr/435/601/d/3#financial_methodology_is_no_more_restrictive
  - us:regulations/42-cfr/435/601/d/4#less_restrictive_methodology_comparability_requirement_satisfied
  - us:regulations/42-cfr/435/601/d/5#less_restrictive_methodology_ffp_consistency_requirement_satisfied
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/regulation/42/435/601/d/1
  summary: |-
    At State option, and subject to paragraphs (d)(2) through (5), the agency may apply less restrictive income and resource methodologies in determining eligibility for specified qualified Medicare beneficiaries, optional categorically needy individuals, medically needy individuals, and aged, blind, and disabled individuals in States using more restrictive requirements than SSI.
rules:
  - name: individual_is_in_group_for_less_restrictive_methodology
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 CFR 435.601(d)(1)(i)-(iv)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us/regulation/42/435/601/d/1
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_is_qualified_medicare_beneficiary_specified_in_sections_1902_a_10_E_and_1905_p
          or individual_is_optional_categorically_needy_under_subpart_C_and_section_1902_a_10_A_ii
          or individual_is_medically_needy_under_subpart_D_and_section_1902_a_10_C_i_III
          or individual_is_aged_blind_or_disabled_in_state_using_more_restrictive_requirements_than_ssi_under_435_121_and_435_230
  - name: less_restrictive_income_and_resource_methodology_may_be_applied
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 CFR 435.601(d)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/regulation/42/435/601/d/1
          - path: versions[0].formula
            kind: import
            import:
              target: us:regulations/42-cfr/435/601/d/2#aged_blind_disabled_group_elected_methodologies_within_restrictiveness_limit
              output: aged_blind_disabled_group_elected_methodologies_within_restrictiveness_limit
              hash: sha256:cefea742e65f103c3205a86ded2f52c1cb4da946b80fe0260581803793bc1365
          - path: versions[0].formula
            kind: import
            import:
              target: us:regulations/42-cfr/435/601/d/2#other_group_elected_methodologies_within_restrictiveness_limit
              output: other_group_elected_methodologies_within_restrictiveness_limit
              hash: sha256:cefea742e65f103c3205a86ded2f52c1cb4da946b80fe0260581803793bc1365
          - path: versions[0].formula
            kind: import
            import:
              target: us:regulations/42-cfr/435/601/d/3#financial_methodology_is_no_more_restrictive
              output: financial_methodology_is_no_more_restrictive
              hash: sha256:c414f5f53f16c53ca028d3f8480268ef8ca4d30234c1701e0b17df00264d21a4
          - path: versions[0].formula
            kind: import
            import:
              target: us:regulations/42-cfr/435/601/d/4#less_restrictive_methodology_comparability_requirement_satisfied
              output: less_restrictive_methodology_comparability_requirement_satisfied
              hash: sha256:61858d6974e99502d59c971d325f5978599f448cca229e807819d112de8bb1ed
          - path: versions[0].formula
            kind: import
            import:
              target: us:regulations/42-cfr/435/601/d/5#less_restrictive_methodology_ffp_consistency_requirement_satisfied
              output: less_restrictive_methodology_ffp_consistency_requirement_satisfied
              hash: sha256:ec181a9078f2dffc3a654f45693927af4d429b6247992b7869d53485f5206060
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          state_has_elected_less_restrictive_methodology_option
          and agency_income_or_resource_methodology_is_less_restrictive_than_cash_assistance_or_permitted_methodologies
          and individual_is_in_group_for_less_restrictive_methodology
          and financial_methodology_is_no_more_restrictive
          and less_restrictive_methodology_comparability_requirement_satisfied
          and less_restrictive_methodology_ffp_consistency_requirement_satisfied
          and (
            (
              individual_is_aged_blind_or_disabled_in_state_using_more_restrictive_requirements_than_ssi_under_435_121_and_435_230
              and aged_blind_disabled_group_elected_methodologies_within_restrictiveness_limit
            )
            or (
              not individual_is_aged_blind_or_disabled_in_state_using_more_restrictive_requirements_than_ssi_under_435_121_and_435_230
              and other_group_elected_methodologies_within_restrictiveness_limit
            )
          )
