format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/regulation/42/435/601/d/3
  summary: |-
    A financial methodology is considered no more restrictive if additional individuals may be Medicaid eligible and no otherwise eligible individuals are made ineligible by using it.
rules:
  - name: financial_methodology_is_no_more_restrictive
    kind: derived
    entity: FinancialMethodology
    dtype: Judgment
    period: Month
    source: 42 CFR 435.601(d)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/regulation/42/435/601/d/3
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/regulation/42/435/601/d/3
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          using_methodology_additional_individuals_may_be_eligible_for_medicaid
          and using_methodology_no_otherwise_eligible_individuals_are_made_ineligible_for_medicaid
