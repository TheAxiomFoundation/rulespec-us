format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/regulation/42/435/840
  summary: |-
    Medicaid agencies must use a single resource standard for medically needy individuals; in non-more-restrictive SSI States it must be no lower than the lowest related cash assistance resource standard, and in more-restrictive States a separate aged, blind, or disabled standard may not be lower than the higher of the lowest applicable categorically needy standard or the January 1, 1972 medically needy standard. The standard may not diminish as assistance unit size increases.
rules:
  - name: medically_needy_resource_standard_required
    kind: derived
    entity: StateAgency
    dtype: Judgment
    period: Year
    source: 42 CFR 435.840(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us/regulation/42/435/840
    versions:
      - effective_from: '2014-01-01'
        formula: |-
          agency_uses_single_resource_standard_for_medically_needy_individuals

  - name: resource_standard_meets_cash_assistance_floor
    kind: derived
    entity: StateAgency
    dtype: Judgment
    period: Year
    source: 42 CFR 435.840(b), (c)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/regulation/42/435/840
    versions:
      - effective_from: '2014-01-01'
        formula: |-
          medically_needy_resource_standard_amount >= lowest_resource_standard_used_under_related_cash_assistance_programs

  - name: separate_aged_blind_or_disabled_resource_standard_floor
    kind: derived
    entity: StateAgency
    dtype: Money
    unit: USD
    period: Year
    source: 42 CFR 435.840(c)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/regulation/42/435/840
              excerpt: "no lower than the higher of the lowest categorically needy resource standard ... or the medically needy resource standard ... on January 1, 1972"
    versions:
      - effective_from: '2014-01-01'
        formula: |-
          max(lowest_categorically_needy_resource_standard_currently_applied_under_more_restrictive_criteria, medically_needy_resource_standard_in_effect_under_state_medicaid_plan_on_january_1_1972)

  - name: separate_aged_blind_or_disabled_resource_standard_complies
    kind: derived
    entity: StateAgency
    dtype: Judgment
    period: Year
    source: 42 CFR 435.840(c)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/regulation/42/435/840
    versions:
      - effective_from: '2014-01-01'
        formula: |-
          state_uses_more_restrictive_requirements_than_ssi_for_aged_blind_or_disabled
          and separate_aged_blind_or_disabled_resource_standard_amount >= separate_aged_blind_or_disabled_resource_standard_floor

  - name: resource_standard_does_not_diminish_with_larger_assistance_unit
    kind: derived
    entity: StateAgency
    dtype: Judgment
    period: Year
    source: 42 CFR 435.840(d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/regulation/42/435/840
              excerpt: "may not diminish by an increase in the number of persons in the assistance unit"
    versions:
      - effective_from: '2014-01-01'
        formula: |-
          resource_standard_for_larger_assistance_unit >= resource_standard_for_smaller_assistance_unit
