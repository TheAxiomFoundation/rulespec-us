format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/regulation/42/435/559
    source_sha256: 45db3868215fd89201185d029aba673a906634b5e3a1637976a623c37634ae54
  summary: Unless granted an exemption under Sec. 435.560, the agency must require
    applicable individuals to comply with or be deemed to have demonstrated community
    engagement as a condition of eligibility for medical assistance furnished on or
    after January 1, 2027; the agency may elect earlier implementation; verification
    is required at the first renewal for beneficiaries enrolled as of the implementation
    date.
