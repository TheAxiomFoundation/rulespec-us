format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/regulation/42/435/121
  summary: |-
    If an agency does not provide Medicaid under § 435.120 to aged, blind, and disabled SSI beneficiaries, it must provide Medicaid to aged, blind, and disabled individuals meeting this section. If the agency chooses more restrictive requirements than SSI, it must cover specified section 1619, qualified Medicare beneficiary, qualified working disabled, and reference-month groups; may apply nonfinancial and financial restrictions subject to stated limits; and must allow specified spend-down and income deductions.
rules:
  - name: medicaid_required_for_section_1619_b_3_individual
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 CFR 435.121(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us/regulation/42/435/121
              excerpt: "If the agency chooses to apply more restrictive requirements than SSI... it must provide Medicaid to: Individuals who meet the requirements of section 1619(b)(3)"
    versions:
      - effective_from: '2014-01-01'
        formula: |-
          agency_applies_more_restrictive_requirements_than_ssi_to_aged_blind_or_disabled
          and person_meets_requirements_under_section_1619_b_3

  - name: medicaid_required_for_medicare_savings_group_without_restrictive_requirements
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 CFR 435.121(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us/regulation/42/435/121
              excerpt: "Qualified Medicare beneficiaries... and qualified working disabled individuals... without consideration of the more restrictive eligibility requirements"
    versions:
      - effective_from: '2014-01-01'
        formula: |-
          agency_applies_more_restrictive_requirements_than_ssi_to_aged_blind_or_disabled
          and (person_is_qualified_medicare_beneficiary_described_in_section_1905_p
          or person_is_qualified_working_disabled_individual_described_in_section_1905_s)

  - name: medicaid_required_for_recent_section_1619_status_individual
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 CFR 435.121(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us/regulation/42/435/121
              excerpt: "Qualify for benefits under section 1619(a) or are in eligibility status under section 1619(b)(1)... and were eligible for Medicaid... in the reference month"
    versions:
      - effective_from: '2014-01-01'
        formula: |-
          agency_applies_more_restrictive_requirements_than_ssi_to_aged_blind_or_disabled
          and (person_qualifies_for_benefits_under_section_1619_a_as_determined_by_ssa
          or person_is_in_eligibility_status_under_section_1619_b_1_as_determined_by_ssa)
          and person_was_issued_medicaid_card_for_reference_month_under_more_restrictive_state_plan_criteria

  - name: medicaid_required_for_disabled_child_when_state_uses_adult_disabled_age_limit
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 CFR 435.121(d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us/regulation/42/435/121
              excerpt: "If the agency limits eligibility of disabled individuals to individuals age 18 or older, it must provide Medicaid to individuals under age 18 who receive SSI benefits and who would be eligible to receive AFDC"
    versions:
      - effective_from: '2014-01-01'
        formula: |-
          agency_limits_disabled_eligibility_to_individuals_age_18_or_older
          and person_is_under_age_18
          and person_receives_ssi_benefits
          and person_would_be_eligible_to_receive_afdc_under_approved_state_plan_if_not_receiving_ssi

  - name: income_standard_must_use_higher_optional_categorically_needy_standard
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 CFR 435.121(e)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us/regulation/42/435/121
              excerpt: "If the categorically needy income standard... is less than the optional categorically needy standard... the agency must provide Medicaid"
    versions:
      - effective_from: '2014-01-01'
        formula: |-
          agency_applies_more_restrictive_financial_conditions_to_aged_blind_or_disabled
          and categorically_needy_income_standard_selected_under_this_section_is_less_than_optional_categorically_needy_standard
          and person_is_aged_blind_or_disabled
          and person_income_is_equal_to_or_below_optional_categorically_needy_standard

  - name: spend_down_to_categorically_needy_standard_required_without_medically_needy_program
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 CFR 435.121(e)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us/regulation/42/435/121
              excerpt: "In a State that does not have a medically needy program... the agency must allow individuals to deduct... expenses... to become eligible"
    versions:
      - effective_from: '2014-01-01'
        formula: |-
          state_does_not_have_medically_needy_program_covering_aged_blind_and_disabled
          and person_is_aged_blind_or_disabled
          and person_has_income_above_categorically_needy_standards
          and person_can_spend_down_to_state_selected_living_arrangement_standard

  - name: spend_down_to_categorically_needy_standard_required_for_specified_beneficiaries_with_medically_needy_program
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 CFR 435.121(e)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us/regulation/42/435/121
              excerpt: "In a State that elects to provide medically needy coverage... must allow... spend down... when they are SSI beneficiaries... eligible spouses... State supplement beneficiaries..."
    versions:
      - effective_from: '2014-01-01'
        formula: |-
          state_elects_medically_needy_coverage_for_aged_blind_and_disabled
          and (person_is_ssi_beneficiary_or_deemed_ssi_beneficiary
          or person_is_eligible_spouse_of_ssi_beneficiary
          or person_is_state_supplement_beneficiary
          or person_is_eligible_for_state_supplement)
          and person_can_spend_down_to_state_selected_living_arrangement_standard

  - name: spend_down_to_medically_needy_income_standard_required_for_other_individuals
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 CFR 435.121(e)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us/regulation/42/435/121
              excerpt: "Individuals who are not SSI beneficiaries... must spend down to the State's medically needy income standards"
    versions:
      - effective_from: '2014-01-01'
        formula: |-
          state_elects_medically_needy_coverage_for_aged_blind_and_disabled
          and not person_is_ssi_beneficiary_or_deemed_ssi_beneficiary
          and not person_is_eligible_spouse_of_ssi_beneficiary
          and not person_is_state_supplement_beneficiary
          and not person_is_eligible_for_state_supplement
          and person_must_spend_down_to_state_medically_needy_income_standard_for_aged_blind_and_disabled
