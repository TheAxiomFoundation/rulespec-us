        formula: |-
          renewal_review_under_section_1902_e_14_l_completed
          and not sufficient_information_at_renewal_to_determine_demonstrated_or_deemed_community_engagement
          and (renewal_reliable_information_not_sufficient or renewal_form_not_returned_or_not_sufficient)

  - name: unable_to_verify_community_engagement_at_more_frequent_verification
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 CFR 435.558(b)(3)
