format: rulespec/v1
imports:
  - us:regulations/42-cfr/435/551#applicable_individual
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/regulation/42/435/558
  summary: |-
    If a State is unable to verify that an applicable individual has met, is deemed to have met, or is not subject to the community engagement requirement, the State must provide a notice of noncompliance, allow 30 calendar days after receipt for a satisfactory showing, continue Medicaid until ineligibility is determined, take specified steps if no satisfactory showing is made, impose no reapplication restriction, and reconsider MAGI eligibility when information is submitted during the reconsideration period.
rules:
  - name: noncompliance_response_period_calendar_days
    kind: parameter
    dtype: Count
    unit: calendar_day
    source: 42 CFR 435.558(a)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/regulation/42/435/558
              excerpt: "period of 30 calendar days"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: noncompliance_notice_deemed_received_days_after_notice_date
    kind: parameter
    dtype: Count
    unit: day
    source: 42 CFR 435.558(c)(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/regulation/42/435/558
              excerpt: "received 5 days after the date on the notice"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          5

  - name: medically_frail_status_reverification_interval_months
    kind: parameter
    dtype: Count
    unit: month
    source: 42 CFR 435.558
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/regulation/42/435/558
              excerpt: "the agency must reverify this status at least every 12 months"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          12

  - name: unable_to_verify_community_engagement_at_application
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 CFR 435.558(b)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/regulation/42/435/558
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          application_review_completed
          and not sufficient_information_at_application_to_determine_demonstrated_or_deemed_community_engagement

  - name: unable_to_verify_community_engagement_at_renewal
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 CFR 435.558(b)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
