format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/regulation/42/435/236
  summary: |-
    If the agency provides Medicaid under § 435.211 to institutionalized individuals who would be eligible for AFDC, SSI, or State supplements except for institutional status, it may also cover aged, blind, and disabled institutionalized individuals with income too high for SSI or State supplements outside an institution but below the State plan level under § 435.722. Coverage is allowed whether or not the State pays optional supplements.
rules:
  - name: optional_state_supplement_payment_not_required_for_institutional_special_income_level_coverage
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 CFR 435.236(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us/regulation/42/435/236
              excerpt: "whether or not the State pays optional supplements"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          true

  - name: institutional_special_income_level_medicaid_may_be_provided
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 CFR 435.236(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/regulation/42/435/236
          - path: versions[0].formula
            kind: import
            import:
              target: us:regulations/42-cfr/435/236#optional_state_supplement_payment_not_required_for_institutional_special_income_level_coverage
              output: optional_state_supplement_payment_not_required_for_institutional_special_income_level_coverage
              hash: sha256:local
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          agency_provides_medicaid_under_section_435_211_to_institutional_individuals_who_would_be_eligible_except_institutional_status
          and person_is_in_institution
          and person_is_aged_blind_or_disabled
          and person_would_not_be_eligible_for_ssi_or_state_supplements_because_of_income_if_not_institutionalized
          and person_income_below_state_plan_level_under_section_435_722
          and optional_state_supplement_payment_not_required_for_institutional_special_income_level_coverage
