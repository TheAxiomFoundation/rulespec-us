module:
  status: deferred
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/regulation/42/435/120
  summary: |-
    Except as allowed under § 435.121, the agency must provide Medicaid to aged, blind, and disabled individuals or couples who are receiving or are deemed to be receiving SSI, including SSI pending final blindness or disability determination, SSI under a resource-disposal agreement, and benefits under section 1619(a) or section 1619(b) status.
  deferred_outputs:
    - output: us:regulations/42-cfr/435/120#aged_blind_or_disabled_ssi_medicaid_required
      reason: The final mandatory Medicaid eligibility surface is expressly subject to the exception allowed under 42 CFR 435.121, but the copied 42 CFR 435.121 context does not export a displacement condition identifying when that exception allows the agency not to provide Medicaid under this section. The same final surface also includes section 1619(b) status, for which no copied RuleSpec source is available.
