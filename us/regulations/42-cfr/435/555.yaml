format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/regulation/42/435/555
    source_sha256: 4ff9c63c1b2caaf73582482abc32ee6469b7f5244ead61c08ff7907dc4f7ec35
  summary: '"At State option, the agency may provide that an applicable individual
    ... is deemed to have demonstrated community engagement" for a month in which
    the individual experiences a listed short-term hardship event.'
imports:
- us:regulations/42-cfr/435/551#applicable_individual
rules:
- name: short_term_hardship_exception_implements_section_1902_xx
  kind: source_relation
  source_relation:
    type: implements
    target: us:statutes/42/1396a/xx
    basis:
      delegation: us:statutes/42/1396a/xx#state_must_apply_community_engagement_requirement
  source: 42 CFR 435.550
- name: inpatient_psychiatric_service_under_age_limit
  kind: parameter
  dtype: Count
  source: 42 CFR 435.555(d)(1)(i)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us/regulation/42/435/555
          excerpt: under the age of 21
  versions:
  - effective_from: '0001-01-01'
    formula: '21'
- name: high_unemployment_fixed_rate_threshold
  kind: parameter
  dtype: Rate
  source: 42 CFR 435.555(d)(3)(i)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us/regulation/42/435/555
          excerpt: 8 percent
  versions:
  - effective_from: '0001-01-01'
    formula: '0.08'
- name: high_unemployment_national_rate_multiplier
  kind: parameter
  dtype: Decimal
  source: 42 CFR 435.555(d)(3)(ii)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us/regulation/42/435/555
          excerpt: 1.5 times the national unemployment rate
  versions:
  - effective_from: '0001-01-01'
    formula: '1.5'
- name: under_age_for_inpatient_psychiatric_service_category
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: 42 CFR 435.555(d)(1)(i)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us/regulation/42/435/555
          excerpt: "for \nindividuals under the age of 21"
      - path: versions[0].formula
        kind: import
        import:
          target: us:regulations/42-cfr/435/555#inpatient_psychiatric_service_under_age_limit
          output: inpatient_psychiatric_service_under_age_limit
          hash: sha256:local
  versions:
  - effective_from: '0001-01-01'
    formula: individual_age < inpatient_psychiatric_service_under_age_limit
- name: high_unemployment_rate_threshold_for_short_term_hardship
  kind: derived
  entity: Person
  dtype: Rate
  period: Month
  source: 42 CFR 435.555(d)(3)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us/regulation/42/435/555
          excerpt: unemployment rate is at or above the lesser of--
      - path: versions[0].formula
        kind: import
        import:
          target: us:regulations/42-cfr/435/555#high_unemployment_fixed_rate_threshold
          output: high_unemployment_fixed_rate_threshold
          hash: sha256:local
      - path: versions[0].formula
        kind: import
        import:
          target: us:regulations/42-cfr/435/555#high_unemployment_national_rate_multiplier
          output: high_unemployment_national_rate_multiplier
          hash: sha256:local
  versions:
  - effective_from: '0001-01-01'
    formula: min(high_unemployment_fixed_rate_threshold, national_unemployment_rate
      * high_unemployment_national_rate_multiplier)
- name: inpatient_or_similar_acuity_services_short_term_hardship_event
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: 42 CFR 435.555(d)(1)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us/regulation/42/435/555
          excerpt: subject to a request
  versions:
  - effective_from: '0001-01-01'
    formula: "request_for_inpatient_or_similar_acuity_hardship_exception_made_by_applicable_individual_or_representative\n\
      and (\n  individual_received_inpatient_hospital_nursing_facility_intermediate_care_facility_services_for_all_or_part_of_month\n\
      \  or (\n    individual_received_inpatient_psychiatric_hospital_services_for_under_age_service_category_for_all_or_part_of_month\n\
      \    and under_age_for_inpatient_psychiatric_service_category\n  )\n  or individual_received_other_services_of_similar_acuity_for_all_or_part_of_month\n\
      )"
- name: presidential_emergency_or_disaster_short_term_hardship_event
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: 42 CFR 435.555(d)(2)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us/regulation/42/435/555
          excerpt: "The applicable individual resides in a county or equivalent \n\
            unit of local government in which there exists an emergency or disaster"
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us/regulation/42/435/555
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us/regulation/42/435/555
  versions:
  - effective_from: '0001-01-01'
    formula: "(\n  individual_resides_in_county_or_equivalent_with_presidential_national_emergency\n\
      \  and national_emergency_affects_ability_to_demonstrate_community_engagement_in_relevant_area\n\
      )\nor (\n  individual_resides_in_county_or_equivalent_with_presidential_stafford_disaster_or_emergency\n\
      \  and (\n    stafford_incident_period_month_is_within_required_exception_duration\n\
      \    or cms_approved_extended_stafford_exception_duration_based_on_persistent_barriers\n\
      \  )\n)"
- name: high_unemployment_short_term_hardship_event
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: 42 CFR 435.555(d)(3)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us/regulation/42/435/555
          excerpt: the State demonstrates and CMS determines
  versions:
  - effective_from: '0001-01-01'
    formula: 'state_requested_cms_unemployment_rate_hardship_exception

      and cms_determined_high_unemployment_hardship_exception

      and unemployment_rate_data_is_from_us_bls_or_other_reliable_source

      and county_or_equivalent_unemployment_rate >= high_unemployment_rate_threshold_for_short_term_hardship'
- name: outside_community_medical_travel_short_term_hardship_event
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: 42 CFR 435.555(d)(4)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us/regulation/42/435/555
          excerpt: "(4) The applicable individual, or the dependent of such individual,\
            \ \nmust travel outside of their community of residence for an extended\
            \ \nperiod of time (which could be for part or all of a month or longer)\
            \ to \nreceive medical services necessary to treat a serious or complex\
            \ \nmedical condition, as defined at Sec.  435.554(c)(5)(i)(E), that are\
            \ \nnot available within their community of residence."
  versions:
  - effective_from: '0001-01-01'
    formula: "request_for_outside_community_medical_travel_hardship_exception_made_by_applicable_individual_or_representative\n\
      and (\n  individual_must_travel_outside_community_for_extended_period_to_receive_necessary_medical_services\n\
      \  or (\n    dependent_of_applicable_individual_must_travel_outside_community_for_extended_period_to_receive_necessary_medical_services\n\
      \    and (\n      applicable_individual_travels_with_dependent\n      or applicable_individual_took_leave_or_absented_from_community_engagement_activities_for_dependent_condition_or_travel\n\
      \    )\n  )\n)\nand medical_services_are_necessary_to_treat_serious_or_complex_medical_condition\n\
      and necessary_medical_services_are_not_available_within_community_of_residence"
- name: short_term_hardship_event
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: 42 CFR 435.555(d)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: definition
        source:
          corpus_citation_path: us/regulation/42/435/555
          excerpt: "(d) Short-term hardship event. A short-term hardship event exists\
            \ \nwhen, for all or part of a month, and subject to a request in the\
            \ \ncircumstances described in paragraphs (d)(1) and (4) of this section\
            \ by \nan applicable individual or an individual acting on behalf of the\
            \ \napplicable individual, the criteria for any of the following \ncircumstances\
            \ are met:"
  versions:
  - effective_from: '0001-01-01'
    formula: 'inpatient_or_similar_acuity_services_short_term_hardship_event

      or presidential_emergency_or_disaster_short_term_hardship_event

      or high_unemployment_short_term_hardship_event

      or outside_community_medical_travel_short_term_hardship_event'
- name: community_engagement_deemed_demonstrated_for_short_term_hardship
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: 42 CFR 435.555(a), (f)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us/regulation/42/435/555
          excerpt: At State option, the agency may provide
      - path: versions[0].formula
        kind: import
        import:
          target: us:regulations/42-cfr/435/551#applicable_individual
          output: applicable_individual
          hash: sha256:cca95e1fa04f699fa6772bcb8f861f973d78bd86a027414e6be1cb26467e2c01
  versions:
  - effective_from: '0001-01-01'
    formula: 'state_elected_short_term_hardship_exception_option

      and applicable_individual

      and short_term_hardship_event'
- name: short_term_hardship_notice_required
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: 42 CFR 435.555(c)(1)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us/regulation/42/435/555
          excerpt: "(c) Procedures. If the agency elects the option described in \n\
            paragraph (a) of this section, it must provide, including as part of \n\
            the noncompliance procedures at Sec.  435.558(c)(1):"
      - path: versions[0].formula
        kind: import
        import:
          target: us:regulations/42-cfr/435/551#applicable_individual
          output: applicable_individual
          hash: sha256:cca95e1fa04f699fa6772bcb8f861f973d78bd86a027414e6be1cb26467e2c01
  versions:
  - effective_from: '0001-01-01'
    formula: 'state_elected_short_term_hardship_exception_option

      and applicable_individual'
- name: individual_request_hardship_event_process_required
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: 42 CFR 435.555(c)(2)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us/regulation/42/435/555
          excerpt: the State must also provide
      - path: versions[0].formula
        kind: import
        import:
          target: us:regulations/42-cfr/435/551#applicable_individual
          output: applicable_individual
          hash: sha256:cca95e1fa04f699fa6772bcb8f861f973d78bd86a027414e6be1cb26467e2c01
  versions:
  - effective_from: '0001-01-01'
    formula: "state_elected_short_term_hardship_exception_option\nand applicable_individual\n\
      and (\n  request_for_inpatient_or_similar_acuity_hardship_exception_made_by_applicable_individual_or_representative\n\
      \  or request_for_outside_community_medical_travel_hardship_exception_made_by_applicable_individual_or_representative\n\
      )"
- name: individual_request_hardship_event_process_complete
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: 42 CFR 435.555(c)(2)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us/regulation/42/435/555
          excerpt: the State must also provide
  versions:
  - effective_from: '0001-01-01'
    formula: "not individual_request_hardship_event_process_required\nor (\n  notice_of_hardship_request_method_provided\n\
      \  and notice_of_hardship_request_timeframe_provided\n  and timely_hardship_request_process_provided\n\
      \  and notice_of_state_hardship_determination_provided\n  and adverse_hardship_determination_appeal_process_provided\n\
      )"
