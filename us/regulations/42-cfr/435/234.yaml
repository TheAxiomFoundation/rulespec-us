format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/regulation/42/435/234
  summary: |-
    In States using more restrictive eligibility requirements than SSI, or States using SSI criteria without section 1616 or 1634 SSA eligibility-determination agreements, the agency may provide Medicaid to individuals receiving only a State supplement if they meet the non-income criteria and the supplement payment and classification conditions. Payments must be need-based, regular cash payments equal to the countable-income gap and available statewide to all individuals in each covered classification, with allowed cost-of-living variations.
rules:
  - name: more_restrictive_state_supplement_medicaid_state_option_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 CFR 435.234(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/regulation/42/435/234
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          state_uses_more_restrictive_eligibility_requirements_than_ssi
          or (state_uses_ssi_criteria and state_lacks_section_1616_or_1634_ssa_eligibility_determination_agreements)

  - name: person_meets_state_supplement_nonincome_criteria
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 CFR 435.234(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/regulation/42/435/234
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          person_meets_more_restrictive_eligibility_requirements_except_for_income
          or person_meets_ssi_criteria_except_for_income

  - name: more_restrictive_state_supplement_meets_payment_conditions
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 CFR 435.234(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/regulation/42/435/234
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          state_supplement_is_based_on_need
          and state_supplement_is_paid_in_cash_on_regular_basis
          and state_supplement_equals_countable_income_gap_to_supplement_standard
          and state_supplement_available_to_all_in_classification_and_statewide_or_allowed_cost_of_living_variation

  - name: more_restrictive_state_supplement_recipient_in_covered_classification
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 CFR 435.234(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/regulation/42/435/234
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          agency_covers_all_individuals_receiving_only_state_supplements
          or (person_is_aged and agency_covers_all_aged_individuals)
          or (person_is_blind and agency_covers_all_blind_individuals)
          or (person_is_disabled and agency_covers_all_disabled_individuals)
          or (person_is_aged and person_is_in_domiciliary_facility_or_other_group_living_arrangement_defined_under_ssi and agency_covers_aged_individuals_in_ssi_group_living_arrangements)
          or (person_is_blind and person_is_in_domiciliary_facility_or_other_group_living_arrangement_defined_under_ssi and agency_covers_blind_individuals_in_ssi_group_living_arrangements)
          or (person_is_disabled and person_is_in_domiciliary_facility_or_other_group_living_arrangement_defined_under_ssi and agency_covers_disabled_individuals_in_ssi_group_living_arrangements)
          or (person_receives_federally_administered_optional_state_supplement and agency_covers_federally_administered_optional_state_supplement_recipients)
          or (person_is_in_secretary_specified_additional_classification and agency_covers_secretary_specified_additional_classifications)
          or (person_is_in_state_specified_reasonable_group_receiving_state_administered_supplementary_payments and agency_covers_state_specified_reasonable_groups)

  - name: more_restrictive_state_supplement_recipient_medicaid_may_be_provided
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 CFR 435.234(a)-(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/regulation/42/435/234
          - path: versions[0].formula
            kind: import
            import:
              target: us:regulations/42-cfr/435/234#more_restrictive_state_supplement_medicaid_state_option_applies
              output: more_restrictive_state_supplement_medicaid_state_option_applies
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us:regulations/42-cfr/435/234#person_meets_state_supplement_nonincome_criteria
              output: person_meets_state_supplement_nonincome_criteria
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us:regulations/42-cfr/435/234#more_restrictive_state_supplement_meets_payment_conditions
              output: more_restrictive_state_supplement_meets_payment_conditions
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us:regulations/42-cfr/435/234#more_restrictive_state_supplement_recipient_in_covered_classification
              output: more_restrictive_state_supplement_recipient_in_covered_classification
              hash: sha256:local
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          more_restrictive_state_supplement_medicaid_state_option_applies
          and person_receives_only_state_supplement
          and person_meets_state_supplement_nonincome_criteria
          and more_restrictive_state_supplement_meets_payment_conditions
          and more_restrictive_state_supplement_recipient_in_covered_classification
