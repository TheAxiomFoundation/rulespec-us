format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/regulation/7/247/9/a
  summary: |-
    To be eligible for the Commodity Supplemental Food Program, an individual
    must be at least 60 years old and meet the income eligibility requirements
    in 7 CFR 247.9(b). This atomic module encodes the inclusive age condition;
    the cross-paragraph conjunction is assembled in the CSFP eligibility
    pipeline.
rules:
  - name: csfp_minimum_age
    kind: parameter
    dtype: Count
    source: 7 CFR 247.9(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/regulation/7/247/9/a
              excerpt: "at least 60 years of age"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          60

  - name: csfp_age_requirement_met
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 7 CFR 247.9(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us/regulation/7/247/9/a
              excerpt: "individuals must be at least 60 years of age"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_age >= csfp_minimum_age
