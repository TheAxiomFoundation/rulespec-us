format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/regulation/7/273/10
    upstream_source_check:
      status: official_parameter_source
      checked_paths:
        - us/statute/7/2014
        - us/guidance/usda/fns/snap-fy2026-cola/page-2
      rationale: The homeless shelter deduction maximum printed in 273.10(e)
        ($143) is the fiscal year 2019 base value from the Agriculture
        Improvement Act of 2018; 7 USC 2014(e)(6)(D)(ii) adjusts it annually
        and USDA publishes the controlling amount in each fiscal year's
        cost-of-living adjustment memorandum. The deduction cap therefore
        binds the COLA policy module's snap_homeless_shelter_deduction
        rather than the superseded printed figure.
  deferred_outputs:
    - output: us:regulations/7-cfr/273/10/a#month_of_application_eligibility_and_benefit_level_determination
      blocked_by:
        - us:regulations/7-cfr/273/10#state_agency_certification_case_action_context
      reason: >-
        Paragraph (a) governs State agency determinations of eligibility and
        benefit levels for the month of application. This module currently
        encodes the household net-income and allotment calculations in paragraph
        (e); the procedural certification-month determination is deferred until
        the surrounding certification and application-processing context is
        encoded.
    - output: us:regulations/7-cfr/273/10/c#anticipated_income_determination
      blocked_by:
        - us:regulations/7-cfr/273/10#state_agency_income_anticipation_context
      reason: >-
        Paragraph (c) governs how the State agency anticipates income for
        eligibility and benefit-level determinations. This module consumes
        monthly earned and unearned income values for the paragraph (e)
        calculation; the prospective income-determination process is deferred
        until certification-period income projection rules are encoded.
    - output: us:regulations/7-cfr/273/10/d#deductible_expense_determination
      blocked_by:
        - us:regulations/7-cfr/273/10#state_agency_deductible_expense_verification_context
      reason: >-
        Paragraph (d) governs which dependent care, shelter, medical, and child
        support expenses are treated as deductible expenses. This module uses the
        resulting monthly deduction amounts in the paragraph (e) net-income
        calculation; the expense determination and verification process is
        deferred until those upstream deduction-specific rules are encoded.
    - output: us:regulations/7-cfr/273/10/f#certification_period_determination
      blocked_by:
        - us:regulations/7-cfr/273/10#state_agency_certification_period_context
      reason: >-
        Paragraph (f) governs State agency certification periods for eligible
        households. This module encodes the paragraph (e) net-income and
        allotment calculations; certification-period assignment and
        recertification timing are deferred until the surrounding certification
        administration rules are encoded.
    - output: us:regulations/7-cfr/273/10/g#certification_notice_determination
      blocked_by:
        - us:regulations/7-cfr/273/10#state_agency_household_notice_context
      reason: >-
        Paragraph (g) governs eligibility, denial, pending-status, and
        recertification notices sent to households. This module encodes benefit
        calculation rules; household notice generation and timing are deferred
        until the surrounding certification notice workflow is encoded.
  summary: |-
    7 CFR 273.10(e)(1) provides that, to determine a household's net monthly income, the State agency shall add gross earned income and unearned income minus exclusions; subtract 20 percent of earned income; subtract the standard deduction; subtract excess medical expenses over $35; subtract allowable dependent care and, if applicable, child support; subtract the homeless shelter deduction up to the annually adjusted maximum (the regulation's printed $143 is the fiscal year 2019 base value; 7 USC 2014(e)(6)(D)(ii) indexes it each October 1 and the USDA cost-of-living adjustment memoranda publish the controlling amount, bound here from the fiscal-year COLA policy module); compute excess shelter costs as shelter costs exceeding 50 percent of income after the above deductions; and subtract excess shelter costs up to the applicable maximum unless the household is entitled to the full amount. 7 CFR 273.10(e)(2)(ii) provides that, except as otherwise specified, the monthly allotment equals the maximum SNAP allotment for household size reduced by 30 percent of net monthly income, with specified rounding options; initial-month benefits under $10 are not issued; and, except during an initial month, eligible one- and two-person households receive at least the minimum benefit, equal to 8 percent of the maximum allotment for a household of one, rounded to the nearest whole dollar.
imports:
  - us:policies/usda/snap/fy-2026-cola/deductions
  - us:policies/usda/snap/fy-2026-cola/maximum-allotments
  - us:statutes/7/2012/j
rules:
  - name: snap_earned_income_deduction_rate_for_net_income
    kind: parameter
    dtype: Rate
    source: 7 CFR 273.10(e)(1)(i)(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/regulation/7/273/10
              excerpt: Multiply the total gross monthly earned income by 20 percent and subtract that amount from the total gross income.
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          0.20

  - name: snap_medical_expense_threshold
    kind: parameter
    dtype: Money
    unit: USD
    source: 7 CFR 273.10(e)(1)(i)(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/regulation/7/273/10
              excerpt: If the household is entitled to an excess medical deduction as provided in § 273.9(d)(3), determine if total medical expenses exceed $35.
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          35

  - name: snap_excess_shelter_income_share
    kind: parameter
    dtype: Rate
    source: 7 CFR 273.10(e)(1)(i)(H)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/regulation/7/273/10
              excerpt: Subtract from total shelter costs 50 percent of the household's monthly income after all the above deductions have been subtracted.
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          0.50

  - name: snap_allotment_net_income_reduction_rate
    kind: parameter
    dtype: Rate
    source: 7 CFR 273.10(e)(2)(ii)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/regulation/7/273/10
              excerpt: the household's monthly allotment shall be equal to the maximum SNAP allotment for the household's size reduced by 30 percent of the household's net monthly income
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          0.30

  - name: snap_initial_month_minimum_issuance
    kind: parameter
    dtype: Money
    unit: USD
    source: 7 CFR 273.10(e)(2)(ii)(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/regulation/7/273/10
              excerpt: If the calculation of benefits ... for an initial month would yield an allotment of less than $10 for the household, no benefits shall be issued to the household for the initial month.
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          10

  - name: snap_minimum_benefit_rate
    kind: parameter
    dtype: Rate
    source: 7 CFR 273.10(e)(2)(ii)(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/regulation/7/273/10
              excerpt: The minimum benefit is 8 percent of the maximum allotment for a household of one, rounded to the nearest whole dollar.
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          0.08

  - name: snap_minimum_benefit_household_size_limit
    kind: parameter
    dtype: Count
    source: 7 CFR 273.10(e)(2)(ii)(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/regulation/7/273/10
              excerpt: Except during an initial month, all eligible one-person and two-person households shall receive minimum monthly allotments equal to the minimum benefit.
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          2

  - name: snap_total_gross_income
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 7 CFR 273.10(e)(1)(i)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/regulation/7/273/10
              excerpt: Add the gross monthly income earned by all household members and the total monthly unearned income of all household members, minus income exclusions, to determine the household's total gross income.
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          snap_gross_monthly_earned_income + snap_total_monthly_unearned_income - snap_income_exclusions

  - name: snap_earned_income_deduction_for_net_income
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 7 CFR 273.10(e)(1)(i)(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/regulation/7/273/10
              excerpt: Multiply the total gross monthly earned income by 20 percent and subtract that amount from the total gross income.
          - path: versions[0].formula
            kind: import
            import:
              target: us:regulations/7-cfr/273/10#snap_earned_income_deduction_rate_for_net_income
              output: snap_earned_income_deduction_rate_for_net_income
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          snap_gross_monthly_earned_income * snap_earned_income_deduction_rate_for_net_income

  - name: snap_excess_medical_deduction_for_net_income
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 7 CFR 273.10(e)(1)(i)(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/regulation/7/273/10
              excerpt: If so, subtract that portion which exceeds $35.
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if household_entitled_to_excess_medical_deduction: max(0, snap_total_medical_expenses - snap_medical_expense_threshold) else: 0

  - name: snap_homeless_shelter_deduction_for_net_income
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 7 CFR 273.10(e)(1)(i)(G)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/regulation/7/273/10
              excerpt: Subtract the homeless shelter deduction, if any, up to the maximum of $143.
          - path: versions[0].formula
            kind: import
            import:
              target: us:policies/usda/snap/fy-2026-cola/deductions#snap_homeless_shelter_deduction
              output: snap_homeless_shelter_deduction
              hash: sha256:bb28d73d2566eebcd2a6d0b16098d108b35c10a20c892aab5dbc510c462b9264
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          min(snap_claimed_homeless_shelter_deduction, snap_homeless_shelter_deduction)

  - name: snap_net_income_before_shelter
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 7 CFR 273.10(e)(1)(i)(A)-(H)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/regulation/7/273/10
              excerpt: Subtract the standard deduction ... medical ... dependent care ... child support ... homeless shelter deduction.
          - path: versions[0].formula
            kind: import
            import:
              target: us:policies/usda/snap/fy-2026-cola/deductions#snap_standard_deduction
              output: snap_standard_deduction
              hash: sha256:bb28d73d2566eebcd2a6d0b16098d108b35c10a20c892aab5dbc510c462b9264
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          max(
              0,
              snap_total_gross_income
              - snap_earned_income_deduction_for_net_income
              - snap_standard_deduction
              - snap_excess_medical_deduction_for_net_income
              - snap_allowable_monthly_dependent_care_expenses
              - snap_allowable_monthly_child_support_payments
              - snap_homeless_shelter_deduction_for_net_income
          )

  - name: snap_excess_shelter_cost
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 7 CFR 273.10(e)(1)(i)(H)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/regulation/7/273/10
              excerpt: Subtract from total shelter costs 50 percent of the household's monthly income after all the above deductions have been subtracted. The remaining amount, if any, is the excess shelter cost.
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if snap_homeless_shelter_deduction_for_net_income > 0: 0 else: max(0, snap_total_allowable_shelter_expenses - (snap_net_income_before_shelter * snap_excess_shelter_income_share))

  - name: snap_excess_shelter_deduction_for_net_income
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 7 CFR 273.10(e)(1)(i)(I)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/regulation/7/273/10
              excerpt: Subtract the excess shelter cost up to the maximum amount allowed for the area (unless the household is entitled to the full amount of its excess shelter expenses).
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/7/2012/j#snap_household_has_elderly_or_disabled_member
              output: snap_household_has_elderly_or_disabled_member
              hash: sha256:008f221da22fd95306625126232ca22ff7a4c8b622216bc7e8c092532e4e1bb9
          - path: versions[0].formula
            kind: import
            import:
              target: us:policies/usda/snap/fy-2026-cola/deductions#snap_maximum_excess_shelter_deduction_48_states_dc
              output: snap_maximum_excess_shelter_deduction_48_states_dc
              hash: sha256:bb28d73d2566eebcd2a6d0b16098d108b35c10a20c892aab5dbc510c462b9264
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if snap_household_has_elderly_or_disabled_member: snap_excess_shelter_cost else: min(snap_excess_shelter_cost, snap_maximum_excess_shelter_deduction_48_states_dc)

  - name: snap_net_monthly_income
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 7 CFR 273.10(e)(1)(i)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/regulation/7/273/10
              excerpt: The household's net monthly income has been determined.
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          max(0, snap_net_income_before_shelter - snap_excess_shelter_deduction_for_net_income)

  - name: snap_minimum_benefit
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 7 CFR 273.10(e)(2)(ii)(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/regulation/7/273/10
              excerpt: The minimum benefit is 8 percent of the maximum allotment for a household of one, rounded to the nearest whole dollar.
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          floor((snap_one_person_thrifty_food_plan_cost * snap_minimum_benefit_rate) + 0.5)

  - name: snap_calculated_monthly_allotment_before_minimums
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 7 CFR 273.10(e)(2)(ii)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/regulation/7/273/10
              excerpt: If 30 percent of the household's net income ends in cents, the State agency shall round ... up ... or ... round the allotment down to the nearest lower dollar.
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if state_agency_rounds_thirty_percent_net_income_up: max(0, snap_maximum_allotment - ceil(snap_net_monthly_income * snap_allotment_net_income_reduction_rate)) else: max(0, floor(snap_maximum_allotment - (snap_net_monthly_income * snap_allotment_net_income_reduction_rate)))

  - name: snap_monthly_allotment
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 7 CFR 273.10(e)(2)(ii)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/regulation/7/273/10
              excerpt: initial month ... less than $10 ... no benefits; except during an initial month, all eligible one-person and two-person households shall receive minimum monthly allotments equal to the minimum benefit.
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if household_initial_month and snap_calculated_monthly_allotment_before_minimums < snap_initial_month_minimum_issuance: 0 else: if (not household_initial_month) and household_size <= snap_minimum_benefit_household_size_limit and snap_calculated_monthly_allotment_before_minimums < snap_minimum_benefit: snap_minimum_benefit else: snap_calculated_monthly_allotment_before_minimums
