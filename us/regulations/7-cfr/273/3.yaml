format: rulespec/v1
module:
  summary: |-
    7 CFR 273.3 requires a SNAP household to live in the State where it
    applies, bars duplicate participation in more than one household or
    project area in a month, preserves the battered-shelter exception, and
    rejects project-area presence solely for vacation.
  source_verification:
    corpus_citation_path: us/regulation/7/273/3
rules:
  - name: snap_duplicate_participation_exception_applies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 7 CFR 273.3(a)
    versions:
      - effective_from: '2025-10-01'
        formula: resident_of_battered_women_and_children_shelter_and_prior_abusive_household_member
  - name: snap_household_duplicate_participation_barred
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 7 CFR 273.3(a)
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_contains_individual_participating_in_more_than_one_household_or_project_area
          and not snap_duplicate_participation_exception_applies
  - name: snap_household_state_resident
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 7 CFR 273.3(a)
    versions:
      - effective_from: '2025-10-01'
        formula: household_lives_in_application_state and not household_in_project_area_solely_for_vacation
  - name: snap_household_residency_eligible
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 7 CFR 273.3(a)
    versions:
      - effective_from: '2025-10-01'
        formula: snap_household_state_resident and not snap_household_duplicate_participation_barred
