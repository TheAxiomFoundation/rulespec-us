format: rulespec/v1
module:
  summary: |-
    7 CFR 273.6 requires each SNAP household member to provide a Social
    Security number or apply for one before certification. Refusal or failure
    without good cause disqualifies only the individual for whom the SSN is
    not obtained, and disqualification ends when that member provides the
    State agency with an SSN.
  source_verification:
    corpus_citation_path: us/regulation/7/273/6
rules:
  - name: snap_member_ssn_good_cause_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 7 CFR 273.6(d)
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          member_has_documentary_or_collateral_evidence_of_ssn_application_or_every_effort
          or state_agency_fault_in_ssn_application_processing
          or member_unable_to_obtain_documents_required_for_ssn_application_with_caseworker_assistance_needed
          or member_ssn_application_filed_pending_state_agency_notification
  - name: snap_member_ssn_requirement_ineligible
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 7 CFR 273.6(a), 7 CFR 273.6(c), 7 CFR 273.6(e)
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          member_refused_or_failed_to_provide_or_apply_for_ssn
          and not snap_member_ssn_good_cause_applies
          and not member_later_provided_ssn_ending_disqualification
  - name: snap_member_ssn_requirement_eligible
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 7 CFR 273.6(a), 7 CFR 273.6(c), 7 CFR 273.6(e)
    versions:
      - effective_from: '2025-10-01'
        formula: not snap_member_ssn_requirement_ineligible
