format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/regulation/7/246/7/c
  summary: |-
    To qualify for the Program, infants, children, and pregnant, postpartum, and breastfeeding women must reside within the State or required service area, meet paragraph (d) income criteria, and meet paragraph (e) nutritional-risk criteria. Certification requires proof of residency and identity, with specified no-proof alternatives, a pregnancy-documentation period not to exceed 60 days if proof is required, optional citizenship/qualified-alien limits with FNS notice, and no applicant cost.
rules:
  - name: proof_of_pregnancy_documentation_max_days
    kind: parameter
    dtype: Count
    source: 7 CFR 246.7(c)(2)(ii)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/regulation/7/246/7/c
              excerpt: "not to exceed 60 days"
    versions:
      - effective_from: '2008-10-01'
        formula: |-
          60

  - name: applicant_meets_basic_wic_eligibility_criteria
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 7 CFR 246.7(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/regulation/7/246/7/c
    versions:
      - effective_from: '2008-10-01'
        formula: |-
          applicant_is_in_eligible_wic_category
          and applicant_resides_within_required_wic_area
          and applicant_meets_income_criteria_under_paragraph_d
          and applicant_meets_nutritional_risk_criteria_under_paragraph_e

  - name: residency_requirement_complies_with_no_length_of_residency_rule
    kind: derived
    entity: StateAgency
    dtype: Judgment
    period: Month
    source: 7 CFR 246.7(c)(1)(i)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/regulation/7/246/7/c
    versions:
      - effective_from: '2008-10-01'
        formula: |-
          not state_agency_uses_length_of_residency_as_eligibility_requirement

  - name: certification_without_residency_or_identity_proof_authorized
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 7 CFR 246.7(c)(2)(i)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/regulation/7/246/7/c
    versions:
      - effective_from: '2008-10-01'
        formula: |-
          applicant_has_no_residency_or_identity_proof
          and applicant_is_in_no_proof_category
          and applicant_confirms_residency_or_identity_in_writing

  - name: remote_indian_or_native_village_residency_proof_established
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 7 CFR 246.7(c)(2)(i)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/regulation/7/246/7/c
    versions:
      - effective_from: '2008-10-01'
        formula: |-
          applicant_is_remote_indian_or_native_village_or_reservation_person
          and applicant_provides_mailing_address
          and applicant_provides_remote_indian_or_native_village_name

  - name: claimed_pregnancy_benefits_may_be_issued_pending_documentation
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 7 CFR 246.7(c)(2)(ii)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/regulation/7/246/7/c
          - path: versions[0].formula
            kind: import
            import:
              target: us:regulations/7-cfr/246/7/c#proof_of_pregnancy_documentation_max_days
              output: proof_of_pregnancy_documentation_max_days
              hash: sha256:local
    versions:
      - effective_from: '2008-10-01'
        formula: |-
          state_agency_requires_proof_of_pregnancy
          and applicant_claims_to_be_pregnant
          and not applicant_pregnancy_is_visibly_noticeable
          and not applicant_has_documented_proof_of_pregnancy_at_certification
          and applicant_meets_all_other_eligibility_criteria
          and requested_pregnancy_documentation_period_days <= proof_of_pregnancy_documentation_max_days

  - name: pregnant_applicant_no_longer_categorically_eligible_without_requested_documentation
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 7 CFR 246.7(c)(2)(ii)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/regulation/7/246/7/c
    versions:
      - effective_from: '2008-10-01'
        formula: |-
          state_agency_requires_proof_of_pregnancy
          and applicant_claims_to_be_pregnant
          and requested_pregnancy_documentation_not_provided

  - name: state_agency_citizenship_limitation_option_properly_implemented
    kind: derived
    entity: StateAgency
    dtype: Judgment
    period: Month
    source: 7 CFR 246.7(c)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/regulation/7/246/7/c
    versions:
      - effective_from: '2008-10-01'
        formula: |-
          state_agency_limits_wic_participation_to_citizens_nationals_and_qualified_aliens
          and state_agency_informs_fns_of_citizenship_limitation_intention
          and state_agency_provides_fns_copies_of_citizenship_limitation_procedures

  - name: certification_procedure_performed_at_no_cost
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 7 CFR 246.7(c)(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/regulation/7/246/7/c
    versions:
      - effective_from: '2008-10-01'
        formula: |-
          not applicant_charged_for_certification_procedure
