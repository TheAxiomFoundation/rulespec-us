  source_verification:
    corpus_citation_path: us/regulation/7/246/7/e
  summary: |-
    "To be certified as eligible for the Program, applicants who meet the Program's eligibility standards specified in paragraph (c) of this section must be determined to be at nutritional risk." Nutritional risk is determined by a competent professional authority through medical and/or nutritional assessment, documented in the participant file, and used for certification, food-package tailoring, nutrition education, referrals, presumptive eligibility, regression determinations, and waiting-list priority placement.
  deferred_outputs:
    - output: us:regulations/7-cfr/246/7/e#nutritional_risk_certification_and_priority_system
      reason: The provision defines a broad WIC certification workflow involving competent professional authority determinations, medical and referral data, participant-file documentation, breastfeeding dyads, infant status tied to maternal WIC participation or medical records, presumptive pregnant-woman eligibility, regression determinations, State Plan risk criteria, and waiting-list priority administration. Faithful execution requires WIC-specific certification, participant-file, medical-test timing, dyad, State agency plan/discretion, and local-agency waiting-list entities beyond the supported scalar/person/unit surface for this artifact.
