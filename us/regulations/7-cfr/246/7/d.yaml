format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/regulation/7/246/7/d
  summary: |-
    (d) Income criteria and income eligibility determinations. The State agency shall establish, and provide local agencies with, income guidelines, definitions, and procedures to be used in determining an applicant's income eligibility for the Program. Program applicants who meet paragraph (d)(2)(vi)(A) shall not be subject to the income limits established by State agencies under paragraph (d)(1). A pregnant woman who is ineligible because she does not meet income guidelines shall be considered to have satisfied the income guidelines if the guidelines would be met by increasing family size by the number of embryos or fetuses in utero.
rules:
  - name: applicant_adjunctively_income_eligible
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 7 CFR 246.7(d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/regulation/7/246/7/d
    versions:
      - effective_from: '2008-10-01'
        formula: |-
          applicant_documents_snap_full_eligibility
          or applicant_documents_tanf_full_eligibility
          or applicant_documents_tanf_presumptive_eligibility
          or applicant_documents_medicaid_full_eligibility
          or applicant_documents_medicaid_presumptive_eligibility
          or applicant_documents_family_certified_for_tanf
          or applicant_documents_family_with_pregnant_woman_or_infant_certified_for_medicaid

  - name: applicant_subject_to_state_income_limits
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 7 CFR 246.7(d)(1), (d)(2)(vi)(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/regulation/7/246/7/d
    versions:
      - effective_from: '2008-10-01'
        formula: |-
          not applicant_adjunctively_income_eligible

  - name: unemployed_family_member_income_period_eligibility_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 7 CFR 246.7(d)(2)(i)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/regulation/7/246/7/d
    versions:
      - effective_from: '2008-10-01'
        formula: |-
          family_has_unemployed_adult_member
          and loss_of_income_causes_current_rate_below_program_income_guidelines

  - name: pregnant_applicant_income_guidelines_satisfied_with_unborn_children
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 7 CFR 246.7(d)(2)(vii)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/regulation/7/246/7/d
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/regulation/7/246/7/d
    versions:
      - effective_from: '2008-10-01'
        formula: |-
          applicant_is_pregnant
          and applicant_ineligible_only_because_income_guidelines_not_met
          and income_guidelines_would_be_met_by_increasing_family_size_for_embryos_or_fetuses
          and not applicant_waives_unborn_child_family_size_increase

  - name: indian_applicant_income_certification_system_authorized
    kind: derived
    entity: StateAgency
    dtype: Judgment
    period: Year
    source: 7 CFR 246.7(d)(2)(viii)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/regulation/7/246/7/d
    versions:
      - effective_from: '2008-10-01'
        formula: |-
          state_agency_is_indian_or_acts_for_indian_local_agency_or_indian_health_service
          and state_agency_submits_reliable_documentation_majority_indian_households_below_guidelines
          and fns_authorizes_income_certification_system

  - name: instream_migrant_family_satisfies_income_standard_and_documentation
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 7 CFR 246.7(d)(2)(ix)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/regulation/7/246/7/d
    versions:
      - effective_from: '2008-10-01'
        formula: |-
          applicant_is_instream_migrant_farmworker_or_family_member
          and verification_of_certification_card_expired
          and instream_migrant_income_determined_at_least_once_in_prior_twelve_months
          and migrant_is_instream_during_twelve_month_period_after_determination
