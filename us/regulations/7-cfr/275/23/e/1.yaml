format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/regulation/7/275/23
  summary: |-
    FNS shall "Require the State agency to invest up to 50 percent of the liability," "Designate up to 50 percent of the liability as at-risk," or "Choose any combination of these options."
  deferred_outputs:
    - output: us:regulations/7-cfr/275/23/e/1#fns_state_agency_liability_determinations
      reason: The source assigns FNS determinations for State agencies based on payment error rates and liability amounts; supported RuleSpec entities do not include StateAgency or FNS administrative review entities.
rules:
  - name: investment_liability_cap_rate
    kind: parameter
    dtype: Rate
    source: 7 CFR 275.23(e)(1)(i)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/regulation/7/275/23
              excerpt: "invest up to 50 percent of the liability"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.50
  - name: at_risk_repayment_liability_cap_rate
    kind: parameter
    dtype: Rate
    source: 7 CFR 275.23(e)(1)(ii)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/regulation/7/275/23
              excerpt: "Designate up to 50 percent of the liability as at-risk"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.50
  - name: new_investment_federal_match_rate
    kind: parameter
    dtype: Rate
    source: 7 CFR 275.23(e)(1)(i)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/regulation/7/275/23
              excerpt: "new investment money shall not be matched by Federal funds"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0
