- name: liability established and amount computed
  period:
    period_kind: custom
    name: calendar_year
    start: '2003-01-01'
    end: '2003-12-31'
  input:
    us:regulations/7-cfr/275/23/d/2#input.statistical_probability: 0.96
    us:regulations/7-cfr/275/23/d/2#input.is_second_or_subsequent_consecutive_fiscal_year: true
    us:regulations/7-cfr/275/23/d/2#input.payment_error_rate: 0.08
    us:regulations/7-cfr/275/23/d/2#input.national_performance_measure: 0.07
    us:regulations/7-cfr/275/23/d/2#input.value_of_all_allotments_issued: 1000000
  output:
    us:regulations/7-cfr/275/23/d/2#payment_error_rate_exceeds_liability_threshold: holds
    us:regulations/7-cfr/275/23/d/2#payment_liability_established: holds
    us:regulations/7-cfr/275/23/d/2#payment_liability_amount: 2000
- name: statistical probability below threshold blocks liability
  period:
    period_kind: custom
    name: calendar_year
    start: '2003-01-01'
    end: '2003-12-31'
  input:
    us:regulations/7-cfr/275/23/d/2#input.statistical_probability: 0.94
    us:regulations/7-cfr/275/23/d/2#input.is_second_or_subsequent_consecutive_fiscal_year: true
    us:regulations/7-cfr/275/23/d/2#input.payment_error_rate: 0.08
    us:regulations/7-cfr/275/23/d/2#input.national_performance_measure: 0.07
    us:regulations/7-cfr/275/23/d/2#input.value_of_all_allotments_issued: 1000000
  output:
    us:regulations/7-cfr/275/23/d/2#payment_error_rate_exceeds_liability_threshold: holds
    us:regulations/7-cfr/275/23/d/2#payment_liability_established: not_holds
    us:regulations/7-cfr/275/23/d/2#payment_liability_amount: 0
