format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/regulation/7/275/23
  summary: |-
    National performance measure. FNS shall announce a national performance measure not later than June 30 after the end of the fiscal year. The national performance measure is the sum of the products of each State agency's error rate multiplied by that State agency's proportion of the total value of national allotments issued for the fiscal year using the most recent issuance data available at the time the State agency is notified of its payment error rate. Once announced, the national performance measure for a given fiscal year will not be subject to administrative or judicial appeal.
rules:
  - name: state_agencies_for_quality_control_fiscal_year
    kind: data_relation
    data_relation:
      predicate: state_agency_belongs_to_quality_control_fiscal_year
      arity: 2
      arguments:
        - SnapQualityControlFiscalYear
        - StateAgency
    source: 7 CFR 275.23(d)(1)
  - name: state_agency_weighted_error_component
    kind: derived
    entity: StateAgency
    dtype: Rate
    period: Year
    source: 7 CFR 275.23(d)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/regulation/7/275/23
              excerpt: "each State agency's error rate multiplied by that State agency's proportion"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          state_agency_payment_error_rate * state_agency_proportion_of_total_value_of_national_allotments_issued_for_fiscal_year
  - name: national_performance_measure
    kind: derived
    entity: SnapQualityControlFiscalYear
    dtype: Rate
    period: Year
    source: 7 CFR 275.23(d)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/regulation/7/275/23
              excerpt: "the sum of the products of each State agency's error rate multiplied by that State agency's proportion"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          sum_where(state_agencies_for_quality_control_fiscal_year, state_agency_weighted_error_component, state_agency_included_in_national_performance_measure_calculation)
