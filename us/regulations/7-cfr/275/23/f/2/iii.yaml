  source_verification:
    corpus_citation_path: us/regulation/7/275/23
  summary: |-
    If a State agency has provided insufficient information to determine a strike-related waiver amount using factual analysis, the waiver amount is evaluated by the paragraph (f)(1) formula; strike effects ending before the second half of the prior fiscal year are not considered unless the State agency demonstrates a direct uncontrollable impact on the error rate.
  deferred_outputs:
    - output: us:regulations/7-cfr/275/23/f/2/iii#strike_uncontrollable_effects_waiver_amount
      reason: The source defines an administrative State agency waiver amount evaluation and cross-references the formula in paragraph (f)(1); the supported RuleSpec entity set has no State agency or administrative waiver entity to scope this amount faithfully.
