    reason: The operative subject is a State agency and the supported RuleSpec entity
      set has no StateAgency or administrative-claim entity to carry the liability
      and accrual rule faithfully.
  - output: us:regulations/7-cfr/275/23/j/1#state_agency_interest_liability_on_non_expended_new_investment_funds
    reason: The operative subject is a State agency and the supported RuleSpec entity
      set has no StateAgency or administrative-funds entity to carry the liability
      and accrual rule faithfully.
  - output: us:regulations/7-cfr/275/23/j/1#appealed_claim_interest_accrual_start
    reason: The rule requires comparing administrative appeal decision timing with
      one year after bill receipt for a State agency claim, but the supported schema
      lacks the administrative claim entity and date-valued output needed to represent
      it faithfully.
