  source_verification:
    corpus_citation_path: us/regulation/7/275/23
  summary: State agency liability for interest when an at-risk amount or non-expended
    new investment funds are not paid within 30 days; agreement to reduce Federal
    financial participation is treated as payment; appealed-claim interest accrues
    from the administrative appeal decision date or one year after bill receipt, whichever
    is earlier.
