format: rulespec/v1
module:
  status: entity_not_supported
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/regulation/7/275/24
  summary: |-
    A State cannot be awarded two bonuses in the same category. If it is both among the best and most improved in a category, it receives only the best bonus, and the next State in the best category receives a best-State bonus.
  deferred_outputs:
    - output: us:regulations/7-cfr/275/24/a/6#state_bonus_award_by_category
      reason: The source governs State-level SNAP performance bonus awards, categories, rankings, and reassignment to the next State. The supported RuleSpec ontology has no State or StateAgency/FNS aggregate review entity to represent these administrative award rankings faithfully.
rules: []
