  summary: 'FNS will divide $6 million among the 6 States with the lowest and the
    most improved negative error rates: bonuses to the 4 States with the lowest negative
    error rates and the 2 States with the largest percentage point decrease, except
    a State is not eligible for the most-improved criterion if its negative error
    rate is more than 50 percent above the national average.'
