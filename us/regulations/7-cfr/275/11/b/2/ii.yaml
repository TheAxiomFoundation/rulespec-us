  summary: '7 CFR 275.11(b)(2)(ii) provides alternative minimum annual negative-case
    sample sizes for a State agency that includes the required sampling-plan statement:
    680 for 5,000 and over, 150 + [0.1224(N-683)] for 684 to 4,999, and 150 for under
    684. 7 CFR 275.11(e) requires State agencies to select cases for quality control
