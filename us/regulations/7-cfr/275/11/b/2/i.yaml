  source_verification:
    corpus_citation_path: us/regulation/7/275/11
  summary: '7 CFR 275.11(b)(2)(i) states the standard minimum annual sample size table
    for negative cases: 5,000 and over, n = 800; 500 to 4,999, n = 150 + [0.144(N-500)];
    under 500, n = 150. 7 CFR 275.11(e) requires State agencies to select quality-control
    cases from sample frames, ensure complete coverage of active and negative universes,
    and maintain separate active and negative frames.'
  deferred_outputs:
  - output: us:regulations/7-cfr/275/11/b/2/i#negative_case_minimum_annual_sample_size_standard
    reason: The rule computes a State agency annual quality-control sample size from
      agency-level average monthly reviewable negative caseload. The supported RuleSpec
      entities do not include StateAgency, sample plans, annual review periods, or
      quality-control review case frames.
