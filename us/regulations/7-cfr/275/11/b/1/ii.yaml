  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/regulation/7/275/11
  summary: '7 CFR 275.11(b)(1)(ii) provides the default active-case minimum annual
    sample-size schedule: 60,000 and over: n = 2400; 10,000 to 59,999: n = 300 + [0.042(N-10,000)];
    under 10,000: n = 300. 7 CFR 275.11(e) requires State agencies to select quality-control
    cases from sample frames and requires complete coverage so every household subject
    to review has an equal or known chance of selection.'
  deferred_outputs:
  - output: us:regulations/7-cfr/275/11/b/1/ii#active_case_minimum_annual_sample_size_under_default_schedule
    reason: 7 CFR 275.11(b)(1)(ii) is an administrative State-agency sample-size schedule
      keyed to statewide annual-review caseloads; the supported RuleSpec entities
      do not include StateAgency, annual review period, or sample-selection process,
      so encoding it on Household, Person, or another supported entity would misstate
      the legal subject.
