format: rulespec/v1
module:
  status: entity_not_supported
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/regulation/7/275/11
  summary: 7 CFR 275.11(b)(1)(iii) provides that a State agency with the paragraph
    (a)(2)(iii) statement may determine the minimum number of active cases to be selected
    and reviewed during each annual review period using the stated caseload table.
    7 CFR 275.11(e) requires State agencies to select cases for quality control review
    from a sample frame and to assure complete coverage of the active and negative
    sample universes.
  deferred_outputs:
  - output: us:regulations/7-cfr/275/11/b/1/iii#minimum_active_case_sample_size_with_reliability_certification
    reason: The source states a State-agency annual review-period sample-size formula
      based on the State agency's average monthly reviewable caseload. The supported
      RuleSpec ontology has no StateAgency, sampling-plan, sample-frame, or annual
      quality-control review entity, and encoding this as a Household or SnapUnit
      output would mis-scope the legal subject.
rules: []
