    corpus_citation_path: us/regulation/7/275/3
  summary: |-
    FNS will select a subsample of a State agency's completed negative cases. The federal subsample target is 160 for average monthly reviewable negative caseloads of 5,000 and over, .0188 N + 65.7 for 501 to 4,999, and 75 for under 500. FNS may select a lower number in specified State agency shortfall circumstances.
