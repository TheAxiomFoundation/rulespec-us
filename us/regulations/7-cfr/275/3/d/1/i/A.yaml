  summary: |-
    For State agencies that determine their active sample sizes in accordance with § 275.11(b)(1)(ii), the Federal review sample for completed active cases is determined from average monthly reviewable caseload (N): 31,489 and over, n′ = 400; 10,001 to 31,488, n′ = .011634 N + 33.66; 10,000 and under, n′ = 150.
