  summary: |-
    For State agencies that determine their active sample sizes in accordance with § 275.11(b)(1)(iii), the Federal review sample for completed active cases is determined as follows: 60,000 and over, n′ = 400; 10,001 to 59,999, n′ = .005 N + 100; 10,000 and under, n′ = 150.
