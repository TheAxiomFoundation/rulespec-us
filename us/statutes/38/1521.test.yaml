- name: child income counted and spouse apart not estranged
  period:
    period_kind: custom
    name: calendar_year
    start: '2024-01-01'
    end: '2024-12-31'
  input:
    us:statutes/38/1521#input.veteran_annual_income_before_child_income: 10000
    us:statutes/38/1521#input.child_of_veteran_is_in_veterans_custody_or_supported_by_veteran: true
    us:statutes/38/1521#input.counting_child_income_would_work_hardship_on_veteran: false
    us:statutes/38/1521#input.child_annual_income_reasonably_available_to_or_for_veteran: 2000
    us:statutes/38/1521#input.veteran_and_spouse_reside_together: false
    us:statutes/38/1521#input.veteran_and_spouse_reside_apart: true
    us:statutes/38/1521#input.veteran_and_spouse_are_estranged: false
  output:
    us:statutes/38/1521#veteran_annual_income_for_section_1521: 12000
    us:statutes/38/1521#veteran_considered_living_with_spouse_for_section_1521: holds
