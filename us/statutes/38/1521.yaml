format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/38/1521
  summary: |-
    38 USC 1521(h): In determining the annual income of a veteran, child income reasonably available to or for the veteran is considered income of the veteran unless the Secretary judges that doing so would work a hardship. A veteran is considered as living with a spouse, even though they reside apart, unless they are estranged.
rules:
  - name: veteran_annual_income_for_section_1521
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: USD
    source: 38 USC 1521(h)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/38/1521
              excerpt: "that portion of the annual income of the child that is reasonably available to or for the veteran shall be considered to be income of the veteran, unless ... hardship"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          veteran_annual_income_before_child_income
          + (if child_of_veteran_is_in_veterans_custody_or_supported_by_veteran and not counting_child_income_would_work_hardship_on_veteran: child_annual_income_reasonably_available_to_or_for_veteran else: 0)

  - name: veteran_considered_living_with_spouse_for_section_1521
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 38 USC 1521(h)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us/statute/38/1521
              excerpt: "A veteran shall be considered as living with a spouse, even though they reside apart, unless they are estranged."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (veteran_and_spouse_reside_together or veteran_and_spouse_reside_apart)
          and not veteran_and_spouse_are_estranged
