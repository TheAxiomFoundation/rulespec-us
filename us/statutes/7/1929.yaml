  source_verification:
    corpus_citation_path: us/statute/7/1929
  summary: |-
    7 USC 1929 establishes the Agricultural Credit Insurance Fund, governs deposits, investments, notes, collections, use of the fund, transfers from predecessor loan funds, and guaranteed loans. Subsection (h) authorizes guaranteed-loan financial assistance, permits a lower secondary-market rate subject to an average-rate ceiling, bars certain fees for guarantees related to section 1935 loans, caps most guarantees at 90 percent, and provides 95 percent guarantee rules for specified refinanced, beginning-farmer, and tribal-land operating loans.
  deferred_outputs:
    - output: us:statutes/7/1929/h#guaranteed_loan_financial_assistance_and_guarantee_limits
      reason: >-
        Subsection (h) is primarily an administrative loan-guarantee authority and guarantee-coverage framework. Faithful executable encoding requires loan-program entities and unresolved section 1935 dependencies for down-payment-program participation and related direct loans; no copied RuleSpec context provides us:statutes/7/1935 or the needed loan-guarantee ontology.
