format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/7/1928
  summary: |-
    A contract of insurance or guarantee executed by the Secretary under this chapter is backed by the full faith and credit of the United States and is incontestable except for fraud or misrepresentation known, participated in, or condoned by the lender or holder.
rules:
  - name: contract_obligation_supported_by_full_faith_and_credit
    kind: derived
    entity: SecretaryInsuranceOrGuaranteeContract
    dtype: Judgment
    period: Year
    source: 7 USC 1928(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us/statute/7/1928
    versions:
      - effective_from: '2008-10-01'
        formula: |-
          true

  - name: contract_incontestable
    kind: derived
    entity: SecretaryInsuranceOrGuaranteeContract
    dtype: Judgment
    period: Year
    source: 7 USC 1928(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/7/1928
    versions:
      - effective_from: '2008-10-01'
        formula: |-
          not (
            contract_involves_fraud_or_misrepresentation
            and (
              lender_or_holder_had_actual_knowledge_of_fraud_or_misrepresentation_at_execution
              or lender_or_holder_participated_in_or_condoned_fraud_or_misrepresentation
            )
          )
