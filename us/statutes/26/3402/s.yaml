format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/26/3402
  summary: |-
    26 USC 3402(s): an employer may elect not to deduct and withhold chapter 24 tax with respect to a vehicle fringe benefit if the employee is notified and the amount is included on a timely section 6051 statement; vehicle fringe benefits are treated as wages from which amounts are required to be deducted and withheld for section 6051; “vehicle fringe benefit” means a fringe benefit that constitutes wages and consists of providing a highway motor vehicle for employee use.
rules:
  - name: vehicle_fringe_benefit
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Year
    source: 26 USC 3402(s)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/statute/26/3402
              excerpt: "any fringe benefit— (A) which constitutes wages ... and (B) which consists of providing a highway motor vehicle"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          payment_is_fringe_benefit
          and fringe_benefit_constitutes_wages
          and fringe_benefit_consists_of_providing_highway_motor_vehicle_for_employee_use

  - name: vehicle_fringe_benefit_treated_as_wages_for_section_6051
    kind: derived
