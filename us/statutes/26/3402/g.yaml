format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/26/3402
  deferred_outputs:
    - output: us:statutes/26/3402/g#manner_of_withholding_for_special_wage_payment
      reason: >-
        Section 3402(g) requires the manner of withholding to be determined in
        accordance with regulations prescribed by the Secretary. The regulations
        and computational procedures are not included in the supplied source text
        or copied executable context, so the final manner of withholding is
        deferred.
      source_values:
        - us:statutes/26/3402/g#special_wage_payment_regulatory_withholding_rule_applies
    - output: us:statutes/26/3402/g#amount_to_deduct_and_withhold_for_special_wage_payment
      reason: >-
        Section 3402(g) requires the amount to be deducted and withheld under
        this chapter to be determined in accordance with regulations prescribed
        by the Secretary, including an annual-payroll-period approximation for
        the withholding allowance. The Secretary-prescribed regulations and
        computational procedures are not included in the supplied source text or
        copied executable context, so the final withholding amount is deferred.
      source_values:
        - us:statutes/26/3402/g#special_wage_payment_regulatory_withholding_rule_applies
  summary: |-
    26 USC 3402(g): for overlapping periods, no-period payments made on or before a paid period expires, payments for periods spanning calendar years, or payments through an agent/fiduciary/person controlling or paying another employer's wages, withholding manner and amount are determined under Secretary regulations so the calendar-year allowance approximates the allowance for an annual payroll period.
rules:
  - name: special_wage_payment_regulatory_withholding_rule_applies
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Year
    source: 26 USC 3402(g)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/26/3402
              excerpt: "with respect to a payroll period or other period, any part of which is included in a payroll period or other period"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/26/3402
              excerpt: "without regard to any payroll period or other period, but on or prior to the expiration of a payroll period or other period"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/26/3402
              excerpt: "with respect to a period beginning in one and ending in another calendar year"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/26/3402
              excerpt: "through an agent, fiduciary, or other person"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/3402
              excerpt: "shall be determined in accordance with regulations prescribed by the Secretary"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          wages_paid_for_period_partly_included_in_another_paid_period_for_same_employee_and_employer
          or wages_paid_without_regard_to_period_on_or_before_expiration_of_paid_period_for_same_employee_and_employer
          or wages_paid_for_period_beginning_in_one_calendar_year_and_ending_in_another
          or wages_paid_through_agent_fiduciary_or_other_person_who_controls_receives_has_custody_or_disposal_of_or_pays_wages_payable_by_another_employer_to_employee
