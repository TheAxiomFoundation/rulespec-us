format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/26/3402
  deferred_outputs:
    - output: us:statutes/26/3402/r#indian_casino_profit_payment_exception_amount
      reason: >-
        Section 3402(r)(2) requires the sum of the basic standard deduction for
        an individual to whom section 63(c)(2)(C) applies and the exemption
        amount defined in section 151(d). The copied section 63(c) and section
        151 contexts expose those concepts through filing-status- and
        taxable-year-dependent computations, but the filing-status source is not
        available in this workspace and local filing-status inputs are
        prohibited. The exception amount is therefore deferred.
    - output: us:statutes/26/3402/r#payment_exempt_from_subsection_withholding_to_extent
      reason: >-
        Section 3402(r)(2) provides a to-the-extent exception when the payment,
        when annualized under Secretary regulations, does not exceed the sum of
        the section 63(c) basic standard deduction amount and section 151(d)
        exemption amount. The required exception amount and annualization
        regulations are not fully executable from the supplied source and copied
        context.
      source_values:
        - us:statutes/26/3402/r#indian_casino_profit_payment_withholding_predicate
    - output: us:statutes/26/3402/r#annualized_tax
      reason: >-
        Section 3402(r)(3) defines annualized tax by reference to the tax imposed
        by section 1(c), determined without regard to rates above the fourth
        lowest rate applicable under section 1(c). No copied context provides
        the section 1(c) tax computation or rate schedule, so the annualized tax
        cannot be computed here.
    - output: us:statutes/26/3402/r#tax_to_deduct_and_withhold_from_indian_casino_profit_payment
      reason: >-
        Section 3402(r)(1) requires withholding equal to the payment's
        proportionate share of annualized tax, subject to the paragraph (2)
        exception and paragraph (6) alternate Secretary-regulated procedures.
        The section 1(c) annualized-tax computation, the to-the-extent exception
        amount, annualization regulations, and optional Secretary-prescribed
        tables or computational procedures are not fully available in copied
        executable context.
      source_values:
        - us:statutes/26/3402/r#indian_casino_profit_payment_withholding_predicate
    - output: us:statutes/26/3402/r#alternate_withholding_tax_under_secretary_procedures
      reason: >-
        Section 3402(r)(6) allows an Indian tribe to elect determination of the
        tax under Secretary-prescribed tables or computational procedures in
        lieu of paragraphs (2) and (3). Those tables or procedures are not in
        the supplied source text or copied context.
    - output: us:statutes/26/3402/r#payments_subject_to_withholding_treated_as_wages
      reason: >-
        Section 3402(r)(7) treats payments subject to withholding under this
        subsection as wages paid by an employer to an employee. Whether a
        payment is subject to withholding depends on the deferred annualized-tax,
        exception, annualization, and alternate-procedure surfaces for subsection
        (r).
  summary: |-
    26 USC 3402(r): every person, including an Indian tribe, making a payment to
    a member of an Indian tribe from net revenues of class II or class III
    gaming conducted or licensed by the tribe shall deduct and withhold tax
    equal to the payment's proportionate share of annualized tax; paragraph (2)
    provides a to-the-extent annualized-payment exception based on section
    63(c)(2)(C) basic standard deduction plus section 151(d) exemption amount;
    paragraph (3) defines annualized tax by reference to section 1(c); paragraph
    (5) leaves annualization to Secretary regulations; paragraph (6) allows
    elected alternate Secretary procedures; paragraph (7) treats payments
    subject to withholding as wages for this chapter and related subtitle F
    provisions.
rules:
  - name: indian_casino_profit_payment_withholding_predicate
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Year
    source: 26 USC 3402(r)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/26/3402
              excerpt: "Every person, including an Indian tribe, making a payment to a member of an Indian tribe from the net revenues of any class II or class III gaming activity conducted or licensed by such tribe"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/3402
              excerpt: "shall deduct and withhold from such payment a tax"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          payer_makes_payment
          and payment_is_to_member_of_indian_tribe
          and payment_is_from_net_revenues_of_class_II_or_class_III_gaming_activity
          and gaming_activity_is_conducted_or_licensed_by_that_tribe
