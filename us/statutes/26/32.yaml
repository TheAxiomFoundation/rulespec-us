  - name: eitc_demographic_eligible
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: 26 USC 32(c)(1)(A)-(D), 32(d), 32(e), 32(k)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/26/32
              excerpt: "eligible individual with a qualifying child for the taxable year"
              text: "The term “eligible individual” means any individual who has a qualifying child for the taxable year, or any other individual who does not have a qualifying child for the taxable year, if..."
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/26/32
              excerpt: "eligible individual does not include an individual who claims the benefits of section 911"
              text: "The term “eligible individual” does not include any individual who claims the benefits of section 911"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/26/32
              excerpt: "eligible individual shall not include any individual who is a nonresident alien individual"
              text: "The term “eligible individual” shall not include any individual who is a nonresident alien individual for any portion of the taxable year unless..."
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/26/7703#taxpayer_married_under_general_rule
              output: taxpayer_married_under_general_rule
              hash: sha256:f5985ef078c17b2e45080a53e9f2689633ab3c8664c324f28735bfa0c118db68
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          (
              eitc_child_count > 0
              or (
                  childless_taxpayer_principal_place_of_abode_in_united_states_more_than_half_year
                  and childless_taxpayer_or_spouse_age_eligible_for_eitc
                  and not taxpayer_is_dependent_for_section_151_to_another_taxpayer
              )
          )
          and not taxpayer_is_qualifying_child_of_another_taxpayer
          and not taxpayer_claims_section_911_benefits
          and (
              not taxpayer_is_nonresident_alien_for_any_portion_of_year
              or taxpayer_treated_as_resident_by_section_6013_g_or_h_election
          )
          and (
              filing_status == 1
              or not taxpayer_married_under_general_rule
              or satisfies_eitc_separated_spouse_rules
          )
          and (
              taxable_year_is_full_12_months
              or taxable_year_closed_by_reason_of_taxpayer_death
