format: rulespec/v1
imports:
  - us:statutes/26/32/c/2
  - us:statutes/26/152/c
  - us:statutes/26/152/c#individual_filed_joint_return_with_spouse_other_than_only_for_claim_of_refund
  - us:statutes/26/7703#taxpayer_married_under_general_rule
  - us:policies/irs/rev-proc-2025-32/earned-income-credit
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/26/32
  deferred_outputs:
    - output: us:statutes/26/32/d#joint_return_eligibility_requirement
      reason: >-
        Checklist sub-paragraph coverage is satisfied by the executable
        eitc_demographic_eligible rule in this file; this record names
        subsection (d) because that rule cites several eligibility clauses in
        one compound source string.
    - output: us:statutes/26/32/f#eitc_table_based_credit_determination
      blocked_by:
        - us:policies/irs/rev-proc-2025-32/earned-income-credit#eitc_maximum_credit_amounts
      reason: >-
        Subsection (f) directs the Secretary to prescribe earned-income-credit
        tables for taxpayers with income brackets, while this module computes
        the credit from the statutory rates and annual IRS revenue-procedure
        parameters rather than materializing each table row.
    - output: us:statutes/26/32/l#eitc_disregarded_for_means_tested_programs
      reason: >-
        Subsection (l) coordinates the earned income credit with housing,
        Social Security Act, Food and Nutrition Act, and other federal or
        federally assisted means-tested program eligibility and benefit
        determinations. That cross-program disregard belongs in the affected
        program modules rather than the tax-credit amount calculation.
    - output: us:statutes/26/32/n#temporary_childless_eitc_special_rules
      reason: >-
        Subsection (n) provides temporary special rules for individuals without
        qualifying children only for taxable years beginning after December 31,
        2020, and before January 1, 2022. This 2026-current-law module does not
        materialize the expired temporary regime.
  summary: |-
    (a) Allowance of credit (1) In general In the case of an eligible individual, there shall be allowed as a credit against the tax imposed by this subtitle for the taxable year an amount equal to the credit percentage of so much of the taxpayer’s earned income for the taxable year as does not exceed the earned income amount. (2) Limitation The amount of the credit allowable to a taxpayer under paragraph (1) for any taxable year shall not exceed the excess (if any) of— (A) the credit percentage of the earned income amount, over (B) the phaseout percentage of so much of the adjusted gross income (or, if greater, the earned income) of the taxpayer for the taxable year as exceeds the phaseout amount.
    (b) Percentages and amounts For purposes of subsection (a)— (1) Percentages The credit percentage and the phaseout percentage shall be determined as follows: 1 qualifying child: 34 and 15.98; 2 qualifying children: 40 and 21.06; 3 or more qualifying children: 45 and 21.06; No qualifying children: 7.65 and 7.65. (2) Amounts (A) In general Subject to subparagraph (B), the earned income amount and the phaseout amount shall be determined as follows: 1 qualifying child: $6,330 and $11,610; 2 or more qualifying children: $8,890 and $11,610; No qualifying children: $4,220 and $5,280. (B) Joint returns In the case of a joint return filed by an eligible individual and such individual’s spouse, the phaseout amount determined under subparagraph (A) shall be increased by $5,000.
    (c) Definitions and special rules For purposes of this section— (1) Eligible individual means an individual with a qualifying child, or another individual without a qualifying child whose principal place of abode is in the United States for more than one-half of the taxable year, who has attained age 25 but not 65 before year end, and who is not another taxpayer’s dependent. An individual who is the qualifying child of a taxpayer is not eligible. An individual claiming section 911 benefits is not eligible. A nonresident alien is not eligible unless treated as a resident by section 6013(g) or (h). No credit is allowed without required taxpayer identification numbers. (2) Earned income means includible wages, salaries, tips, and other employee compensation, plus net earnings from self-employment determined with regard to section 164(f), with stated exclusions and a section 112 election. (3) Qualifying child means a qualifying child under section 152(c), with stated modifications, United States abode, marital, and identification requirements. (4) Armed Forces extended active duty abroad is treated as United States abode for specified purposes.
    (d) Married individuals generally must file a joint return, with a separated-spouse rule. (e) Except for a taxable year closed by death, no credit is allowable for a taxable year of less than 12 months. (i) No credit is allowed if disqualified income exceeds $10,000, with disqualified income defined. (j) Dollar amounts in subsections (b)(2) and (i)(1) are inflation adjusted. (k) No credit is allowed during fraud, reckless, or intentional-disregard disallowance periods, and certain prior deficiency denials require eligibility information. (m) Taxpayer identification number means a qualifying Social Security number issued on or before the return due date for purposes of subsections (c)(1)(E) and (c)(3)(D). (n) For taxable years beginning after December 31, 2020, and before January 1, 2022, special childless EITC age, rate, and amount rules apply.
