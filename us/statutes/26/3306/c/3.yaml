format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/26/3306
  summary: |-
    service not in the course of the employer’s trade or business performed in any calendar quarter by an employee, unless the cash remuneration paid for such service is $50 or more and such service is performed by an individual who is regularly employed by such employer to perform such service
rules:
  - name: nonbusiness_service_cash_remuneration_quarter_threshold
    kind: parameter
    dtype: Money
    unit: USD
    source: 26 USC 3306(c)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/26/3306
              excerpt: "cash remuneration paid for such service is $50 or more"
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          50

  - name: nonbusiness_service_regular_employment_days_threshold
    kind: parameter
    dtype: Count
    source: 26 USC 3306(c)(3)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/26/3306
              excerpt: "on each of some 24 days during such quarter"
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          24

  - name: nonbusiness_service_cash_remuneration_test_satisfied
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 26 USC 3306(c)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/26/3306
              excerpt: "cash remuneration paid for such service is $50 or more"
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/26/3306/c/3#nonbusiness_service_cash_remuneration_quarter_threshold
              output: nonbusiness_service_cash_remuneration_quarter_threshold
              hash: sha256:local
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          cash_remuneration_paid_for_nonbusiness_service_in_calendar_quarter >= nonbusiness_service_cash_remuneration_quarter_threshold

  - name: nonbusiness_service_current_quarter_regular_employment_test_satisfied
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 26 USC 3306(c)(3)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/statute/26/3306
              excerpt: "on each of some 24 days during such quarter such individual performs"
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/26/3306/c/3#nonbusiness_service_regular_employment_days_threshold
              output: nonbusiness_service_regular_employment_days_threshold
              hash: sha256:local
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          counted_days_in_calendar_quarter_person_performed_nonbusiness_service_for_employer >= nonbusiness_service_regular_employment_days_threshold

  - name: nonbusiness_service_regular_employment_test_satisfied
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 26 USC 3306(c)(3)(A)-(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/statute/26/3306
              excerpt: "only if— (A) on each of some 24 days"
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/statute/26/3306
              excerpt: "during the preceding calendar quarter"
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/26/3306/c/3#nonbusiness_service_current_quarter_regular_employment_test_satisfied
              output: nonbusiness_service_current_quarter_regular_employment_test_satisfied
              hash: sha256:local
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          nonbusiness_service_current_quarter_regular_employment_test_satisfied
          or person_was_regularly_employed_by_employer_for_nonbusiness_service_during_preceding_calendar_quarter

  - name: nonbusiness_service_excepted_from_employment
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 26 USC 3306(c)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/26/3306
              excerpt: "service not in the course of the employer’s trade or business performed in any calendar quarter by an employee, unless"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/26/3306
              excerpt: "unless the cash remuneration paid for such service is $50 or more and such service is performed by an individual who is regularly employed"
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/26/3306/c/3#nonbusiness_service_cash_remuneration_test_satisfied
              output: nonbusiness_service_cash_remuneration_test_satisfied
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/26/3306/c/3#nonbusiness_service_regular_employment_test_satisfied
              output: nonbusiness_service_regular_employment_test_satisfied
              hash: sha256:local
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          person_performed_service_not_in_course_of_employer_trade_or_business_as_employee_in_calendar_quarter
          and not (
            nonbusiness_service_cash_remuneration_test_satisfied
            and nonbusiness_service_regular_employment_test_satisfied
          )
