format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/26/3306
  summary: |-
    service performed by an individual in ... catching, taking, harvesting, cultivating, or farming ... aquatic forms of animal and vegetable life ... except commercial salmon or halibut catching or taking and service on or in connection with a vessel of more than 10 net tons
rules:
  - name: fishing_service_vessel_net_tonnage_exception_threshold
    kind: parameter
    dtype: Decimal
    source: 26 USC 3306(c)(17)(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/26/3306
              excerpt: "vessel of more than 10 net tons"
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          10

  - name: large_vessel_aquatic_life_service_exception_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 26 USC 3306(c)(17)(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/26/3306
              excerpt: "service performed on or in connection with a vessel of more than 10 net tons"
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/26/3306/c/17#fishing_service_vessel_net_tonnage_exception_threshold
              output: fishing_service_vessel_net_tonnage_exception_threshold
              hash: sha256:local
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          service_performed_on_or_in_connection_with_vessel
          and vessel_net_tons_determined_under_merchant_vessel_register_tonnage_laws > fishing_service_vessel_net_tonnage_exception_threshold

  - name: aquatic_life_service_excepted_from_employment
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 26 USC 3306(c)(17)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/26/3306
              excerpt: "catching, taking, harvesting, cultivating, or farming"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/26/3306
              excerpt: "catching or taking of salmon or halibut, for commercial purposes"
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/26/3306/c/17#large_vessel_aquatic_life_service_exception_applies
              output: large_vessel_aquatic_life_service_exception_applies
              hash: sha256:local
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          service_performed_in_aquatic_life_catching_taking_harvesting_cultivating_or_farming_or_as_vessel_officer_or_crew_or_ordinary_incident
          and not service_performed_in_connection_with_commercial_salmon_or_halibut_catching_or_taking
          and not large_vessel_aquatic_life_service_exception_applies
