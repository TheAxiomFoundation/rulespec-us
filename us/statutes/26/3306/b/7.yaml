format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/26/3306
  summary: |-
    remuneration paid in any medium other than cash to an employee for service not in the course of the employer’s trade or business
rules:
