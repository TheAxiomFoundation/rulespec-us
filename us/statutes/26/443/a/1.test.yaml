- name: approved_accounting_period_change_return_matches_required_short_period
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    us:statutes/26/443/a/1#input.taxpayer_changes_annual_accounting_period: true
    us:statutes/26/443/a/1#input.secretary_approves_change_of_annual_accounting_period: true
    us:statutes/26/443/a/1#input.return_is_made_for_short_period: true
    us:statutes/26/443/a/1#input.short_period_begins_on_day_after_close_of_former_taxable_year: true
    us:statutes/26/443/a/1#input.short_period_ends_at_close_of_day_before_first_day_of_new_taxable_year: true
  output:
    us:statutes/26/443/a/1#annual_accounting_period_change_with_secretary_approval: holds
    us:statutes/26/443/a/1#return_made_for_required_short_period_after_accounting_period_change: holds
- name: approved_accounting_period_change_return_does_not_match_required_short_period
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    us:statutes/26/443/a/1#input.taxpayer_changes_annual_accounting_period: true
    us:statutes/26/443/a/1#input.secretary_approves_change_of_annual_accounting_period: true
    us:statutes/26/443/a/1#input.return_is_made_for_short_period: true
    us:statutes/26/443/a/1#input.short_period_begins_on_day_after_close_of_former_taxable_year: true
    us:statutes/26/443/a/1#input.short_period_ends_at_close_of_day_before_first_day_of_new_taxable_year: false
  output:
    us:statutes/26/443/a/1#annual_accounting_period_change_with_secretary_approval: holds
    us:statutes/26/443/a/1#return_made_for_required_short_period_after_accounting_period_change: not_holds
- name: no_secretary_approval_requirement_not_triggered
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    us:statutes/26/443/a/1#input.taxpayer_changes_annual_accounting_period: true
    us:statutes/26/443/a/1#input.secretary_approves_change_of_annual_accounting_period: false
    us:statutes/26/443/a/1#input.return_is_made_for_short_period: false
    us:statutes/26/443/a/1#input.short_period_begins_on_day_after_close_of_former_taxable_year: false
    us:statutes/26/443/a/1#input.short_period_ends_at_close_of_day_before_first_day_of_new_taxable_year: false
  output:
    us:statutes/26/443/a/1#annual_accounting_period_change_with_secretary_approval: not_holds
    us:statutes/26/443/a/1#return_made_for_required_short_period_after_accounting_period_change: holds
