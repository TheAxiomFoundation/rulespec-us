format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/26/25E
  deferred_outputs:
  - output: us:statutes/26/25E/b#credit_allowed_after_modified_adjusted_gross_income_limitation
    reason: Section 25E(b) applies threshold amounts by joint return, surviving spouse
      as defined in section 2(a), head of household as defined in section 2(b), and
      other taxpayer categories. The copied section 2(a) and 2(b) contexts are deferred
      and no executable shared filing-status output is available, so the status-dependent
      limitation is not encoded here.
    source_values:
    - us:statutes/26/25E#modified_adjusted_gross_income_joint_or_surviving_spouse_threshold
    - us:statutes/26/25E#modified_adjusted_gross_income_head_of_household_threshold
    - us:statutes/26/25E#modified_adjusted_gross_income_other_taxpayer_threshold
  - output: us:statutes/26/25E/c#previously_owned_clean_vehicle
    reason: The definition depends on unavailable section 30D(d)(1), section 30B(b)(3),
      and section 30D(d) vehicle definitions and requirements.
    source_values:
    - us:statutes/26/25E#previously_owned_clean_vehicle_model_year_minimum_years_before_acquisition_year
    - us:statutes/26/25E#qualified_sale_price_cap
    - us:statutes/26/25E#section_30b_alternative_vehicle_gross_vehicle_weight_rating_cap
    - us:statutes/26/25E#qualified_buyer_prior_credit_lookback_years
  - output: us:statutes/26/25E/c#qualified_sale
    reason: The definition depends on the unavailable dealer definition in section
      30D(g)(8) and on the unresolved previously-owned clean vehicle context.
    source_values:
    - us:statutes/26/25E#qualified_sale_price_cap
  - output: us:statutes/26/25E/c#qualified_buyer
    reason: The qualified-buyer definition refers to whether a deduction is allowable
      with respect to another taxpayer under section 151 and to the unresolved section
      25E sale/vehicle definition context.
    source_values:
    - us:statutes/26/25E#qualified_buyer_prior_credit_lookback_years
  - output: us:statutes/26/25E/e#section_30d_f_similar_rules_for_section_25e
    reason: Subsection (e) applies rules similar to section 30D(f), except specified
      paragraphs, but no copied RuleSpec context provides section 30D(f).
  - output: us:statutes/26/25E/f#transfer_of_credit
    reason: Subsection (f) applies rules similar to section 30D(g), but no copied
      RuleSpec context provides section 30D(g).
  summary: 'Section 25E allows a credit for a qualified buyer placing in service a

    previously-owned clean vehicle equal to the lesser of $4,000 or 30 percent

    of sale price; denies credit above modified-adjusted-gross-income

    thresholds; defines previously-owned clean vehicle, qualified sale, and

    qualified buyer; requires the VIN on the return; applies certain section

    30D rules; and terminates the credit for vehicles acquired after September

    30, 2025.'
rules:
- name: previously_owned_clean_vehicle_credit_cap
  kind: parameter
  dtype: Money
  unit: USD
  source: 26 USC 25E(a)(1)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us/statute/26/25E
          excerpt: $4,000
  versions:
  - effective_from: '2026-01-01'
    formula: '4000'
- name: previously_owned_clean_vehicle_credit_rate
  kind: parameter
  dtype: Rate
  source: 26 USC 25E(a)(2)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us/statute/26/25E
          excerpt: 30 percent of the sale price
  versions:
  - effective_from: '2026-01-01'
    formula: '0.30'
- name: modified_adjusted_gross_income_joint_or_surviving_spouse_threshold
  kind: parameter
  dtype: Money
  unit: USD
  source: 26 USC 25E(b)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us/statute/26/25E
          excerpt: in the case of a joint return or a surviving spouse ... $150,000
  versions:
  - effective_from: '2026-01-01'
    formula: '150000'
- name: modified_adjusted_gross_income_head_of_household_threshold
  kind: parameter
  dtype: Money
  unit: USD
  source: 26 USC 25E(b)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us/statute/26/25E
          excerpt: in the case of a head of household ... $112,500
  versions:
  - effective_from: '2026-01-01'
    formula: '112500'
- name: modified_adjusted_gross_income_other_taxpayer_threshold
  kind: parameter
  dtype: Money
  unit: USD
  source: 26 USC 25E(b)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us/statute/26/25E
          excerpt: taxpayer not described in subparagraph (A) or (B), $75,000
  versions:
  - effective_from: '2026-01-01'
    formula: '75000'
- name: previously_owned_clean_vehicle_model_year_minimum_years_before_acquisition_year
  kind: parameter
  dtype: Integer
  source: 26 USC 25E(c)(1)(A)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us/statute/26/25E
          excerpt: model year of which is at least 2 years earlier
  versions:
  - effective_from: '2026-01-01'
    formula: '2'
- name: qualified_sale_price_cap
  kind: parameter
  dtype: Money
  unit: USD
  source: 26 USC 25E(c)(2)(B)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us/statute/26/25E
          excerpt: sale price which does not exceed $25,000
  versions:
  - effective_from: '2026-01-01'
    formula: '25000'
- name: section_30b_alternative_vehicle_gross_vehicle_weight_rating_cap
  kind: parameter
  dtype: Decimal
  source: 26 USC 25E(c)(1)(D)(ii)(II)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us/statute/26/25E
          excerpt: gross vehicle weight rating of less than 14,000 pounds
  versions:
  - effective_from: '2026-01-01'
    formula: '14000'
- name: qualified_buyer_prior_credit_lookback_years
  kind: parameter
  dtype: Integer
  source: 26 USC 25E(c)(3)(D)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us/statute/26/25E
          excerpt: 3-year period ending on the date of the sale
  versions:
  - effective_from: '2026-01-01'
    formula: '3'
- name: tentative_previously_owned_clean_vehicle_credit
  kind: derived
  entity: TaxUnit
  dtype: Money
  period: Year
  unit: USD
  source: 26 USC 25E(a)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us/statute/26/25E
          excerpt: "lesser of\u2014 (1) $4,000, or (2) ... 30 percent of the sale\
            \ price"
  versions:
  - effective_from: '2026-01-01'
    formula: "min(\n    previously_owned_clean_vehicle_credit_cap,\n    previously_owned_clean_vehicle_credit_rate\
      \ * max(0, sale_price_with_respect_to_vehicle)\n)"
- name: previously_owned_clean_vehicle_credit_allowed_before_magi_limitation
  kind: derived
  entity: TaxUnit
  dtype: Money
  period: Year
  unit: USD
  source: 26 USC 25E(a), 26 USC 25E(d), 26 USC 25E(g)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us/statute/26/25E
          excerpt: qualified buyer who during a taxable year places in service a previously-owned
            clean vehicle
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us/statute/26/25E
          excerpt: unless the taxpayer includes the vehicle identification number
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us/statute/26/25E
          excerpt: No credit shall be allowed ... with respect to any vehicle acquired
            after September 30, 2025
      - path: versions[0].formula
        kind: import
        import:
          target: us:statutes/26/25E#tentative_previously_owned_clean_vehicle_credit
          output: tentative_previously_owned_clean_vehicle_credit
          hash: sha256:local
  versions:
  - effective_from: '2026-01-01'
    formula: 'if taxpayer_is_qualified_buyer and taxpayer_places_in_service_previously_owned_clean_vehicle_during_taxable_year
      and vehicle_identification_number_included_on_return and not vehicle_acquired_after_termination_date:
      tentative_previously_owned_clean_vehicle_credit else: 0'
