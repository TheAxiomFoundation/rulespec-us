  source_verification:
    corpus_citation_path: us/statute/26/1
  summary: |-
    (h) Maximum capital gains rate (1) In general If a taxpayer has a net capital gain for any taxable year, the tax imposed by this section for such taxable year shall not exceed the sum of— (A) a tax computed at the rates and in the same manner as if this subsection had not been enacted on the greater of— (i) taxable income reduced by the net capital gain; or (ii) the lesser of— (I) the amount of taxable income taxed at a rate below 25 percent; or (II) taxable income reduced by the adjusted net capital gain; (B) 0 percent of so much of the adjusted net capital gain (or, if less, taxable income) as does not exceed the excess (if any) of— (i) the amount of taxable income which would (without regard to this paragraph) be taxed at a rate below 25 percent, over (ii) the taxable income reduced by the adjusted net capital gain; (C) 15 percent of the lesser of— (i) so much of the adjusted net capital gain (or, if less, taxable income) as exceeds the amount on which a tax is determined under subparagraph (B), or (ii) the excess of— (I) the amount of taxable income which would (without regard to this paragraph) be taxed at a rate below 39.6 percent, over (II) the sum of the amounts on which a tax is determined under subparagraphs (A) and (B), (D) 20 percent of the adjusted net capital gain (or, if less, taxable income) in excess of the sum of the amounts on which tax is determined under subparagraphs (B) and (C), (E) 25 percent of the excess (if any) of— (i) the unrecaptured section 1250 gain (or, if less, the net capital gain (determined without regard to paragraph (11))), over (ii) the excess (if any) of— (I) the sum of the amount on which tax is determined under subparagraph (A) plus the net capital gain, over (II) taxable income; and (F) 28 percent of the amount of taxable income in excess of the sum of the amounts on which tax is determined under the preceding subparagraphs of this paragraph. (2) Net capital gain taken into account as investment income For purposes of this subsection, the net capital gain for any taxable year shall be reduced (but not below zero) by the amount which the taxpayer takes into account as investment income under section 163(d)(4)(B)(iii). (3) Adjusted net capital gain For purposes of this subsection, the term “adjusted net capital gain” means the sum of— (A) net capital gain (determined without regard to paragraph (11)) reduced (but not below zero) by the sum of— (i) unrecaptured section 1250 gain, and (ii) 28-percent rate gain, plus (B) qualified dividend income (as defined in paragraph (11)). (4) 28-percent rate gain For purposes of this subsection, the term “28-percent rate gain” means the excess (if any) of— (A) the sum of— (i) collectibles gain; and (ii) section 1202 gain, over (B) the sum of— (i) collectibles loss; (ii) the net short-term capital loss; and (iii) the amount of long-term capital loss carried under section 1212(b)(1)(B) to the taxable year. (11) Dividends taxed as net capital gain (A) In general For purposes of this subsection, the term “net capital gain” means net capital gain (determined without regard to this paragraph) increased by qualified dividend income.

    (j)(5) Application of current income tax brackets to capital gains brackets (A) In general Section 1(h)(1) shall be applied— (i) by substituting “below the maximum zero rate amount” for “which would (without regard to this paragraph) be taxed at a rate below 25 percent” in subparagraph (B)(i), and (ii) by substituting “below the maximum 15-percent rate amount” for “which would (without regard to this paragraph) be taxed at a rate below 39.6 percent” in subparagraph (C)(ii)(I). (B) Maximum amounts defined For purposes of applying section 1(h) with the modifications described in subparagraph (A)— (i) Maximum zero rate amount The maximum zero rate amount shall be— (I) in the case of a joint return or surviving spouse, $77,200, (II) in the case of an individual who is a head of household (as defined in section 2(b)), $51,700, (III) in the case of any other individual (other than an estate or trust), an amount equal to ½ of the amount in effect for the taxable year under subclause (I), and (IV) in the case of an estate or trust, $2,600. (ii) Maximum 15-percent rate amount The maximum 15-percent rate amount shall be— (I) in the case of a joint return or surviving spouse, $479,000 (½ such amount in the case of a married individual filing a separate return), (II) in the case of an individual who is the head of a household (as defined in section 2(b)), $452,400, (III) in the case of any other individual (other than an estate or trust), $425,800, and (IV) in the case of an estate or trust, $12,700.
