format: rulespec/v1
module:
  proof_validation:
    required: true
  summary: 'Internal Revenue Code section 26 limits the aggregate amount of

    nonrefundable personal credits allowed against federal income tax. For

    current-law 2026 individual cases, the aggregate follows the Schedule 3

    ordering of nonrefundable credits and is capped by income tax before

    credits.'
  source_verification:
    corpus_citation_path: us/statute/26/26
  deferred_outputs:
  - output: us:statutes/26/26/b#regular_tax_liability
    reason: Generated module encodes the supported rules from this source, but this
      source subparagraph depends on policy surfaces or entities that are not available
      in the current RuleSpec context. It is deferred instead of being modeled as
      a caller-supplied input or an unsupported local entity.
  - output: us:statutes/26/26/c#tentative_minimum_tax
    reason: Generated module encodes the supported rules from this source, but this
      source subparagraph depends on policy surfaces or entities that are not available
      in the current RuleSpec context. It is deferred instead of being modeled as
      a caller-supplied input or an unsupported local entity.
rules:
- name: income_tax_non_refundable_credits
  kind: derived
  entity: TaxUnit
  dtype: Money
  period: Year
  unit: USD
  source: 26 USC 26(a), Subpart A of Part IV of Subchapter A of Chapter 1
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us/statute/26/26
          span: 26 USC 26(a), Subpart A of Part IV of Subchapter A of Chapter 1
  versions:
  - effective_from: '2026-01-01'
    formula: 'foreign_tax_credit

      + cdcc

      + non_refundable_american_opportunity_credit

      + lifetime_learning_credit

      + savers_credit

      + residential_clean_energy_credit

      + energy_efficient_home_improvement_credit

      + elderly_disabled_credit

      + new_clean_vehicle_credit

      + used_clean_vehicle_credit

      + non_refundable_ctc'
- name: income_tax_unavailable_non_refundable_credits
  kind: derived
  entity: TaxUnit
  dtype: Money
  period: Year
  unit: USD
  source: 26 USC 26(a)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us/statute/26/26
          span: 26 USC 26(a)
  versions:
  - effective_from: '2026-01-01'
    formula: max(0, income_tax_non_refundable_credits - income_tax_before_credits)
- name: income_tax_capped_non_refundable_credits
  kind: derived
  entity: TaxUnit
  dtype: Money
  period: Year
  unit: USD
  source: 26 USC 26(a)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us/statute/26/26
          span: 26 USC 26(a)
  versions:
  - effective_from: '2026-01-01'
    formula: 'income_tax_non_refundable_credits

      - income_tax_unavailable_non_refundable_credits'
- name: income_tax_before_refundable_credits
  kind: derived
  entity: TaxUnit
  dtype: Money
  period: Year
  unit: USD
  source: 26 USC 26(a), 26 USC 1411, and other federal income-tax additions
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us/statute/26/26
          span: 26 USC 26(a), 26 USC 1411, and other federal income-tax additions
  versions:
  - effective_from: '2026-01-01'
    formula: 'income_tax_before_credits

      + net_investment_income_tax

      + recapture_of_investment_credit

      + unreported_payroll_tax

      + qualified_retirement_penalty

      - income_tax_capped_non_refundable_credits'
