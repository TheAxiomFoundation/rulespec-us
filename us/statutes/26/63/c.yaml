  - us:statutes/26/63/c/5#dependent_basic_standard_deduction_limitation_applies
  - us:statutes/26/63/c/5#dependent_basic_standard_deduction_statutory_limit
  - us:statutes/26/443/a/1#annual_accounting_period_change_with_secretary_approval
