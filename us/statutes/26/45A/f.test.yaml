- name: taxable_year_not_after_termination_date_section_applies
  period:
    period_kind: tax_year
    start: '2021-01-01'
    end: '2021-12-31'
  input:
    us:statutes/26/45A/f#input.taxable_year_begins_after_termination_date: false
  output:
    us:statutes/26/45A/f#indian_employment_credit_section_applies_before_termination: holds
- name: taxable_year_after_termination_date_section_does_not_apply
  period:
    period_kind: tax_year
    start: '2022-01-01'
    end: '2022-12-31'
  input:
    us:statutes/26/45A/f#input.taxable_year_begins_after_termination_date: true
  output:
    us:statutes/26/45A/f#indian_employment_credit_section_applies_before_termination: not_holds
