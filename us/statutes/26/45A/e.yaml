format: rulespec/v1
imports:
  - us:statutes/26/45A/a#base_year_1993_indian_employment_costs
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/26/45A
  summary: |-
    (e) Other definitions and special rules For purposes of this section— (1) Wages The term “wages” has the same meaning given to such term in section 51. (2) Controlled groups (A) All employers treated as a single employer under section (a) or (b) of section 52 shall be treated as a single employer for purposes of this section. (B) The credit (if any) determined under this section with respect to each such employer shall be its proportionate share of the wages and qualified employee health insurance costs giving rise to such credit. (3) Certain other rules made applicable Rules similar to the rules of section 51(k) and subsections (c), (d), and (e) of section 52 shall apply. (4) Coordination with nonrevenue laws Any reference in this section to a provision not contained in this title shall be treated for purposes of this section as a reference to such provision as in effect on the date of the enactment of this paragraph. (5) Special rule for short taxable years For any taxable year having less than 12 months, the amount determined under subsection (a)(2) shall be multiplied by a fraction, the numerator of which is the number of days in the taxable year and the denominator of which is 365.
rules:
  - name: short_taxable_year_month_threshold
    kind: parameter
    dtype: Integer
    source: 26 USC 45A(e)(5), "less than 12 months"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/26/45A
              excerpt: "For any taxable year having less than 12 months"
    versions:
      - effective_from: '1994-01-01'
        formula: |-
          12

  - name: short_taxable_year_proration_denominator_days
    kind: parameter
    dtype: Integer
    source: 26 USC 45A(e)(5), "denominator ... 365"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/26/45A
              excerpt: "the denominator of which is 365"
    versions:
      - effective_from: '1994-01-01'
        formula: |-
          365

  - name: base_year_1993_indian_employment_costs_after_short_year_rule
    kind: derived
    entity: Business
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 45A(e)(5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/45A
              excerpt: "For any taxable year having less than 12 months, the amount determined under subsection (a)(2) shall be multiplied by a fraction, the numerator of which is the number of days in the taxable year and the denominator of which is 365."
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/26/45A/a#base_year_1993_indian_employment_costs
              output: base_year_1993_indian_employment_costs
              hash: sha256:a4829ca728e6c5113b1f38e6b745554ee9476e029155f0c18a942a06efc7649a
    versions:
      - effective_from: '1994-01-01'
        formula: |-
          if taxable_year_has_less_than_12_months:
              base_year_1993_indian_employment_costs
              * number_of_days_in_taxable_year
              / short_taxable_year_proration_denominator_days
          else:
              base_year_1993_indian_employment_costs
