format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/26/45A
  summary: |-
    (a) Amount of credit For purposes of section 38, the amount of the Indian employment credit determined under this section with respect to any employer for any taxable year is an amount equal to 20 percent of the excess (if any) of— (1) the sum of— (A) the qualified wages paid or incurred during such taxable year, plus (B) qualified employee health insurance costs paid or incurred during such taxable year, over (2) the sum of the qualified wages and qualified employee health insurance costs (determined as if this section were in effect) which were paid or incurred by the employer (or any predecessor) during calendar year 1993.
rules:
  - name: indian_employment_credit_rate
    kind: parameter
    dtype: Rate
    source: 26 USC 45A(a), "20 percent"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/26/45A
              excerpt: "amount equal to 20 percent"
    versions:
      - effective_from: '1994-01-01'
        formula: |-
          0.20
  - name: current_year_indian_employment_costs
    kind: derived
    entity: Employer
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 45A(a)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/45A
              excerpt: "the sum of— (A) the qualified wages paid or incurred during such taxable year, plus (B) qualified employee health insurance costs paid or incurred during such taxable year"
    versions:
      - effective_from: '1994-01-01'
        formula: |-
          current_year_qualified_wages
          + current_year_qualified_employee_health_insurance_costs
  - name: base_year_1993_indian_employment_costs
    kind: derived
    entity: Employer
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 45A(a)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/45A
              excerpt: "the sum of the qualified wages and qualified employee health insurance costs (determined as if this section were in effect) which were paid or incurred by the employer (or any predecessor) during calendar year 1993"
    versions:
      - effective_from: '1994-01-01'
        formula: |-
          qualified_wages_paid_or_incurred_during_1993
          + qualified_employee_health_insurance_costs_paid_or_incurred_during_1993
  - name: indian_employment_credit_excess_costs
    kind: derived
    entity: Employer
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 45A(a), "excess (if any)"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/45A
              excerpt: "20 percent of the excess (if any) of— (1) the sum of— ... over (2) the sum"
    versions:
      - effective_from: '1994-01-01'
        formula: |-
          max(
              0,
              current_year_indian_employment_costs
              - base_year_1993_indian_employment_costs
          )
  - name: indian_employment_credit
    kind: derived
    entity: Employer
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 45A(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/45A
              excerpt: "the amount of the Indian employment credit determined under this section with respect to any employer for any taxable year is an amount equal to 20 percent of the excess (if any)"
    versions:
      - effective_from: '1994-01-01'
        formula: |-
          indian_employment_credit_excess_costs * indian_employment_credit_rate
