format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/26/65
  summary: |-
    For purposes of this subtitle, “ordinary loss” includes loss from the sale or exchange of property which is not a capital asset; losses treated or considered as ordinary loss under other subtitle provisions are treated as losses from the sale or exchange of property which is not a capital asset.
rules:
  - name: ordinary_loss
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 65
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/statute/26/65
              excerpt: "the term “ordinary loss” includes any loss from the sale or exchange of property which is not a capital asset"
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/statute/26/65
              excerpt: "Any loss from the sale or exchange of property which is treated or considered, under other provisions of this subtitle, as “ordinary loss”"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/65
              excerpt: "shall be treated as loss from the sale or exchange of property which is not a capital asset"
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          max(0, losses_from_sales_or_exchanges_of_property_which_is_not_a_capital_asset)
          + max(0, losses_from_sales_or_exchanges_of_property_treated_or_considered_as_ordinary_loss_under_other_provisions_of_this_subtitle)
