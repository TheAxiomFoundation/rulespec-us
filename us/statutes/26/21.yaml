  - name: cdcc_qualifying_individual
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 26 USC 21(b)(1), 21(e)(1), 21(e)(5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/statute/26/21
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/26/21
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          (
              is_cdcc_child_dependent
              and age < cdcc_child_age_limit
              and not abode_relationship_violates_local_law
              and not noncustodial_parent_exception_applies
          )
          or (
              is_cdcc_dependent_disregarding_listed_subsections
              and physically_or_mentally_incapable_of_self_care
              and same_principal_place_of_abode_more_than_half_year
              and not abode_relationship_violates_local_law
              and not noncustodial_parent_exception_applies
          )
          or (
              is_spouse_of_taxpayer
              and physically_or_mentally_incapable_of_self_care
              and same_principal_place_of_abode_more_than_half_year
              and not abode_relationship_violates_local_law
          )

  - name: cdcc_qualifying_individual_count
