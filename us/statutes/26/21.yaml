format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/26/21
  deferred_outputs:
    - output: us:statutes/26/21/h#dependent_care_credit_possession_payment_administration
      blocked_by:
        - us:statutes/26/21#possession_credit_payment_and_coordination_context
      reason: >-
        Subsection (h) governs payments to U.S. possessions, mirror-code and
        non-mirror-code systems, and coordination with the United States credit.
        This module computes the taxpayer credit and consumes a resolved
        possession coordination predicate; possession payment administration is
        deferred.
  summary: |-
    26 USC 21 allows an individual with one or more qualifying individuals a credit equal to the applicable percentage of employment-related expenses paid during the taxable year. The applicable percentage is 50 percent, reduced (but not below 35 percent) by 1 percentage point for each $2,000 or fraction thereof by which adjusted gross income exceeds $15,000, and further reduced (but not below 20 percent) by 1 percentage point for each $2,000 ($4,000 for a joint return) or fraction thereof by which adjusted gross income exceeds $75,000 ($150,000 for a joint return). A qualifying individual is a dependent described in section 152(a)(1) under age 13, an incapable-of-self-care dependent with the same principal abode for more than half the taxable year, or an incapable-of-self-care spouse with the same principal abode for more than half the taxable year. Creditable employment-related expenses are limited to $3,000 for one qualifying individual or $6,000 for two or more, reduced by the aggregate amount excludable under section 129, and are also limited by the taxpayer's earned income, or for a married individual by the lesser of the taxpayer's and spouse's earned income. Married taxpayers generally must file a joint return; certain married individuals living apart are not considered married. No credit is allowed for payments to specified related individuals, for failures to provide service-provider identifying information absent due diligence, or for failures to include the qualifying individual's TIN. For taxable years beginning in 2021, special rules made the credit refundable for certain U.S.-abode taxpayers, increased expense limits to $8,000 and $16,000, changed phaseout amounts to 50 percent and $125,000, and reduced the 20 percent phaseout percentage toward zero above $400,000.
