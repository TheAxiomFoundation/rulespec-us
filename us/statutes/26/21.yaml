  - name: cdcc_2021_high_income_phaseout_increments
    kind: derived
    entity: TaxUnit
    dtype: Integer
    period: Year
    source: 26 USC 21(g)(4)(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/21
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          ceil(max(0, adjusted_gross_income - cdcc_2021_high_income_phaseout_start) / cdcc_phaseout_increment)

  - name: cdcc_rate
    kind: derived
    entity: TaxUnit
    dtype: Rate
    period: Year
    source: 26 USC 21(a)(2), 21(g)(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/21
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          if cdcc_temporary_expansion_applies:
              if adjusted_gross_income > cdcc_2021_high_income_phaseout_start:
                  max(0, cdcc_second_phaseout_floor - (cdcc_2021_high_income_phaseout_increments * cdcc_phaseout_rate_reduction))
              else:
                  cdcc_first_phaseout_rate
          else:
              max(cdcc_second_phaseout_floor, cdcc_first_phaseout_rate - (cdcc_second_phaseout_increments * cdcc_phaseout_rate_reduction))

