  - name: cdcc_first_phaseout_increments
    kind: derived
    entity: TaxUnit
    dtype: Integer
    period: Year
    source: 26 USC 21(a)(2)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/21
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          ceil(max(0, adjusted_gross_income - cdcc_first_phaseout_start_applicable) / cdcc_phaseout_increment)

  - name: cdcc_first_phaseout_rate
    kind: derived
    entity: TaxUnit
    dtype: Rate
    period: Year
    source: 26 USC 21(a)(2)(A), 21(g)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/21
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          max(
              if cdcc_temporary_expansion_applies: cdcc_max_rate else: cdcc_first_phaseout_floor,
              cdcc_max_rate - (cdcc_first_phaseout_increments * cdcc_phaseout_rate_reduction)
          )

