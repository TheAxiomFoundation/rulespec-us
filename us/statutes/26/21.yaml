  - name: cdcc_expense_limit_before_exclusion
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 21(c)(1)-(2), 21(g)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/21
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          if cdcc_temporary_expansion_applies:
              if cdcc_qualifying_individual_count == 1:
                  cdcc_2021_one_qualifying_individual_expense_limit
              else:
                  if cdcc_qualifying_individual_count >= 2:
                      cdcc_2021_two_or_more_qualifying_individuals_expense_limit
                  else:
                      0
          else:
              if cdcc_qualifying_individual_count == 1:
                  cdcc_one_qualifying_individual_expense_limit
              else:
                  if cdcc_qualifying_individual_count >= 2:
                      cdcc_two_or_more_qualifying_individuals_expense_limit
                  else:
                      0

