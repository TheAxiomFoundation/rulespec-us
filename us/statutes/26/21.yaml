        formula: |-
          max(0, cdcc_expense_limit_before_exclusion - dependent_care_assistance_excludable_under_section_129)

  - name: cdcc_earned_income_limit
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 21(d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/21
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          if married_at_close_of_taxable_year and not treated_as_not_married_under_section_21:
              min(taxpayer_earned_income_for_cdcc, spouse_earned_income_for_cdcc)
          else:
              taxpayer_earned_income_for_cdcc

  - name: cdcc_creditable_expenses
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 21(a)(1), 21(b)(2), 21(c), 21(d)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/21
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/26/21
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          if employment_related_expense_requirements_satisfied:
              min(employment_related_expenses_paid, min(cdcc_dollar_limit, cdcc_earned_income_limit))
          else:
              0

  - name: cdcc_first_phaseout_start_applicable
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 21(a)(2)(A), 21(g)(3)(B)
    metadata:
