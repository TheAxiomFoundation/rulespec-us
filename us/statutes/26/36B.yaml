format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/26/36B
  summary: Section 36B allows a premium assistance credit for applicable taxpayers,
    defines premium assistance credit amounts, applicable taxpayer and coverage-month
    rules, household income/family-size terms, and rules for individuals not lawfully
    present.
  deferred_outputs:
  - output: us:statutes/26/36B/b#premium_assistance_credit_amount
    reason: The premium assistance credit amount requires coverage-month determinations,
      Exchange enrollment, qualified health plan definitions, applicable second lowest
      cost silver plan rules, and ACA/Code cross-references not fully available in
      copied executable context for this parent provision.
  - output: us:statutes/26/36B/e#lawfully_present_individual_adjusted_premium_and_poverty_ratio_rules
    reason: The subsection requires person-level family-size and household-income
      recalculations for individuals not lawfully present, plus HHS-prescribed methods
      and premium attribution facts that are not represented by the available parent
      TaxUnit surface.
  - output: us:statutes/26/36B/d#household_income
    reason: Generated rule ignored a source-stated substitution, modification, or
      limitation parameter. This output is deferred until the upstream cross-referenced
      mechanics can be imported or composed without stranding the modifier.
    source_values:
    - us:statutes/26/36B/c#qualified_small_employer_hra_permitted_benefit_month_count
  - output: us:statutes/26/36B/d#modified_adjusted_gross_income
    reason: Generated rule ignored a source-stated substitution, modification, or
      limitation parameter. This output is deferred until the upstream cross-referenced
      mechanics can be imported or composed without stranding the modifier.
    source_values:
    - us:statutes/26/36B/c#qualified_small_employer_hra_permitted_benefit_month_count
rules:
- name: applicable_taxpayer_minimum_household_income_poverty_line_ratio
  kind: parameter
  dtype: Rate
  source: 26 USC 36B(c)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us/statute/26/36B
          excerpt: household income for the taxable year equals or exceeds 100 percent
  versions:
  - effective_from: '2024-01-01'
    formula: '1.0'
- name: applicable_taxpayer_maximum_household_income_poverty_line_ratio
  kind: parameter
  dtype: Rate
  source: 26 USC 36B(c)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us/statute/26/36B
          excerpt: but does not exceed 400 percent
  versions:
  - effective_from: '2024-01-01'
    formula: '4.0'
- name: employer_sponsored_coverage_affordability_ratio
  kind: parameter
  dtype: Rate
  source: 26 USC 36B(c)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us/statute/26/36B
          excerpt: "exceeds 9.5 percent of the applicable taxpayer\u2019s household\
            \ income"
  versions:
  - effective_from: '2024-01-01'
    formula: '0.095'
- name: employer_sponsored_plan_minimum_value_share
  kind: parameter
  dtype: Rate
  source: 26 USC 36B(c)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us/statute/26/36B
          excerpt: less than 60 percent of such costs
  versions:
  - effective_from: '2024-01-01'
    formula: '0.60'
- name: qualified_small_employer_hra_affordability_ratio
  kind: parameter
  dtype: Rate
  source: 26 USC 36B(c)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us/statute/26/36B
          excerpt: "1/12 of 9.5 percent of the employee\u2019s household income"
  versions:
  - effective_from: '2024-01-01'
    formula: '0.095'
- name: qualified_small_employer_hra_permitted_benefit_month_count
  kind: parameter
  dtype: Count
  source: 26 USC 36B(c)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us/statute/26/36B
          excerpt: "substituting \u201Cthe number of months during the year for which\
            \ such arrangement was provided\u201D for \u201C12\u201D"
  versions:
  - effective_from: '2024-01-01'
    formula: '12'
- name: qualified_small_employer_hra_monthly_permitted_benefit_fraction
  kind: parameter
  dtype: Rate
  source: 26 USC 36B(c)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us/statute/26/36B
          excerpt: "1/12 of the employee\u2019s permitted benefit"
  versions:
  - effective_from: '2024-01-01'
    formula: 1 / qualified_small_employer_hra_permitted_benefit_month_count
- name: applicable_taxpayer_income_percentage_test_met
  kind: derived
  entity: TaxUnit
  dtype: Judgment
  period: Year
  source: 26 USC 36B(c)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us/statute/26/36B
          excerpt: equals or exceeds 100 percent but does not exceed 400 percent
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us/statute/26/36B
          excerpt: "before January 1, 2026, subparagraph (A) shall be applied without\
            \ regard to \u201Cbut does not exceed 400 percent\u201D"
  versions:
  - effective_from: '2024-01-01'
    formula: 'applicable_taxpayer_household_income_as_ratio_of_poverty_line >= applicable_taxpayer_minimum_household_income_poverty_line_ratio

      and (taxable_year_is_in_temporary_applicable_taxpayer_upper_limit_disregard_period

      or applicable_taxpayer_household_income_as_ratio_of_poverty_line <= applicable_taxpayer_maximum_household_income_poverty_line_ratio)'
- name: family_size
  kind: derived
  entity: TaxUnit
  dtype: Count
  period: Year
  source: 26 USC 36B(d)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: definition
        source:
          corpus_citation_path: us/statute/26/36B
          excerpt: family size involved with respect to any taxpayer shall be equal
            to the number of individuals for whom the taxpayer is allowed a deduction
            under section 151
  versions:
  - effective_from: '2024-01-01'
    formula: individuals_for_whom_taxpayer_is_allowed_section_151_deduction_count
