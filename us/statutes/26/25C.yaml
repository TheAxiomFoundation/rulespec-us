format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/26/25C
  deferred_outputs:
  - output: us:statutes/26/25C/c#qualified_energy_efficiency_improvements
    reason: Subsection 25C(c) defines qualified energy efficiency improvements by
      detailed property-level dwelling, original-use, expected-use, Energy Star, and
      International Energy Conservation Code criteria, including a principal-residence
      cross-reference to section 121 that is not available as RuleSpec context. This
      artifact treats qualified improvement expenditure amounts as boundary inputs
      and defers the property classification surface.
    source: 26 USC 25C(c)
    source_values:
    - us:statutes/26/25C#qualified_energy_efficiency_improvement_minimum_expected_use_years
  - output: us:statutes/26/25C/d#residential_energy_property_expenditures
    reason: Subsection 25C(d) defines residential energy property expenditures by
      detailed property-level efficiency, fuel, panelboard, installation, and eligible-fuel
      conditions, with upstream definitions in sections 40A, 40, and 45Z(d)(5) unavailable
      as RuleSpec context. This artifact treats qualifying expenditure and credit-component
      amounts as boundary inputs and defers the property classification surface.
    source: 26 USC 25C(d)
    source_values:
    - us:statutes/26/25C#biomass_stove_or_boiler_minimum_thermal_efficiency_rate
    - us:statutes/26/25C#panelboard_minimum_load_capacity_amps
    - us:statutes/26/25C#eligible_fuel_blend_minimum_volume_rate
  - output: us:statutes/26/25C/e#home_energy_audit
    reason: Subsection 25C(e) defines a home energy audit by inspection, written report,
      principal-residence, improvement-identification, savings-estimate, and auditor-certification
      requirements, including a principal-residence cross-reference to section 121
      and future Secretary requirements. This artifact treats qualified home-energy-audit
      amounts and substantiation as boundary inputs and defers the audit classification
      surface.
    source: 26 USC 25C(e)
    source_values:
    - us:statutes/26/25C#home_energy_auditor_guidance_deadline_days_after_enactment
  - output: us:statutes/26/25C/h#specified_property_product_identification_number_requirement
    reason: Subsection 25C(h) imposes a product-identification-number condition on
      specified property placed in service after December 31, 2024, and defines specified
      property by reference to qualified energy property and building envelope component
      categories whose property-level classifications are deferred in subsections
      (c) and (d). The final credit uses a boundary predicate for whether any applicable
      specified-property PIN requirement is satisfied.
    source: 26 USC 25C(h)
  summary: Section 25C allows an individual a credit equal to 30 percent of qualified
    energy efficiency improvements, residential energy property expenditures, and
    home energy audits, subject to a $1,200 general annual limit, separate $600/$250/$500
    component limits, a $2,000 aggregate heat-pump/biomass limit, a $150 home-energy-audit
    limit, substantiation and product-identification-number requirements, basis reduction,
    subsidized-financing exclusion, and termination for property placed in service
    after December 31, 2025.
rules:
- name: energy_efficient_home_improvement_credit_rate
  kind: parameter
  dtype: Rate
  source: 26 USC 25C(a)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us/statute/26/25C
          excerpt: 30 percent
  versions:
  - effective_from: '2023-01-01'
    formula: '0.30'
- name: general_annual_credit_limit
  kind: parameter
  dtype: Money
  unit: USD
  source: 26 USC 25C(b)(1)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us/statute/26/25C
          excerpt: shall not exceed $1,200
  versions:
  - effective_from: '2023-01-01'
    formula: '1200'
- name: qualified_energy_property_item_credit_limit
  kind: parameter
  dtype: Money
  unit: USD
  source: 26 USC 25C(b)(2)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us/statute/26/25C
          excerpt: with respect to any item of qualified energy property, $600
  versions:
  - effective_from: '2023-01-01'
    formula: '600'
- name: windows_and_skylights_aggregate_credit_limit
  kind: parameter
  dtype: Money
  unit: USD
  source: 26 USC 25C(b)(3)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us/statute/26/25C
          excerpt: all exterior windows and skylights, $600
  versions:
  - effective_from: '2023-01-01'
    formula: '600'
- name: exterior_door_per_door_credit_limit
  kind: parameter
  dtype: Money
  unit: USD
  source: 26 USC 25C(b)(4)(A)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us/statute/26/25C
          excerpt: $250 in the case of any exterior door
  versions:
  - effective_from: '2023-01-01'
    formula: '250'
- name: exterior_doors_aggregate_credit_limit
  kind: parameter
  dtype: Money
  unit: USD
  source: 26 USC 25C(b)(4)(B)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us/statute/26/25C
          excerpt: $500 in the aggregate with respect to all exterior doors
  versions:
  - effective_from: '2023-01-01'
    formula: '500'
- name: heat_pump_biomass_aggregate_credit_limit
  kind: parameter
  dtype: Money
  unit: USD
  source: 26 USC 25C(b)(5)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us/statute/26/25C
          excerpt: shall not, in the aggregate, exceed $2,000
  versions:
  - effective_from: '2023-01-01'
    formula: '2000'
- name: home_energy_audit_credit_limit
  kind: parameter
  dtype: Money
  unit: USD
  source: 26 USC 25C(b)(6)(A)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us/statute/26/25C
          excerpt: shall not exceed $150
  versions:
  - effective_from: '2023-01-01'
    formula: '150'
- name: qualified_energy_efficiency_improvement_minimum_expected_use_years
  kind: parameter
  dtype: Integer
  source: 26 USC 25C(c)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us/statute/26/25C
          excerpt: remain in use for at least 5 years
  versions:
  - effective_from: '2023-01-01'
    formula: '5'
- name: biomass_stove_or_boiler_minimum_thermal_efficiency_rate
  kind: parameter
  dtype: Rate
  source: 26 USC 25C(d)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us/statute/26/25C
          excerpt: thermal efficiency rating of at least 75 percent
  versions:
  - effective_from: '2023-01-01'
    formula: '0.75'
- name: panelboard_minimum_load_capacity_amps
  kind: parameter
  dtype: Integer
  source: 26 USC 25C(d)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us/statute/26/25C
          excerpt: load capacity of not less than 200 amps
  versions:
  - effective_from: '2023-01-01'
    formula: '200'
- name: eligible_fuel_blend_minimum_volume_rate
  kind: parameter
  dtype: Rate
  source: 26 USC 25C(d)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us/statute/26/25C
          excerpt: at least 20 percent of the volume
  versions:
  - effective_from: '2023-01-01'
    formula: '0.20'
- name: home_energy_auditor_guidance_deadline_days_after_enactment
  kind: parameter
  dtype: Integer
  source: 26 USC 25C(e)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us/statute/26/25C
          excerpt: not later than 365 days after the date of the enactment
  versions:
  - effective_from: '2023-01-01'
    formula: '365'
- name: windows_and_skylights_credit
  kind: derived
  entity: TaxUnit
  dtype: Money
  period: Year
  unit: USD
  source: 26 USC 25C(a)(1), 26 USC 25C(b)(3)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us/statute/26/25C
          excerpt: 30 percent of ... qualified energy efficiency improvements
      - path: versions[0].formula
        kind: import
        import:
          target: us:statutes/26/25C#windows_and_skylights_aggregate_credit_limit
          output: windows_and_skylights_aggregate_credit_limit
          hash: sha256:local
  versions:
  - effective_from: '2023-01-01'
    formula: "min(\n    energy_efficient_home_improvement_credit_rate\n    * max(0,\
      \ qualified_exterior_windows_and_skylights_expenditures),\n    windows_and_skylights_aggregate_credit_limit\n\
      )"
- name: exterior_doors_credit
  kind: derived
  entity: TaxUnit
  dtype: Money
  period: Year
  unit: USD
  source: 26 USC 25C(a)(1), 26 USC 25C(b)(4)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us/statute/26/25C
          excerpt: 30 percent of ... qualified energy efficiency improvements
      - path: versions[0].formula
        kind: import
        import:
          target: us:statutes/26/25C#exterior_door_per_door_credit_limit
          output: exterior_door_per_door_credit_limit
          hash: sha256:local
      - path: versions[0].formula
        kind: import
        import:
          target: us:statutes/26/25C#exterior_doors_aggregate_credit_limit
          output: exterior_doors_aggregate_credit_limit
          hash: sha256:local
  versions:
  - effective_from: '2023-01-01'
    formula: "min(\n    energy_efficient_home_improvement_credit_rate\n    * max(0,\
      \ qualified_exterior_door_expenditures),\n    min(\n        exterior_doors_aggregate_credit_limit,\n\
      \        exterior_door_count * exterior_door_per_door_credit_limit\n    )\n)"
- name: other_envelope_improvements_credit
  kind: derived
  entity: TaxUnit
  dtype: Money
  period: Year
  unit: USD
  source: 26 USC 25C(a)(1)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us/statute/26/25C
          excerpt: amount paid or incurred by the taxpayer for qualified energy efficiency
            improvements
  versions:
  - effective_from: '2023-01-01'
    formula: 'energy_efficient_home_improvement_credit_rate

      * max(0, qualified_energy_efficiency_improvements_excluding_windows_skylights_and_doors_expenditures)'
- name: non_heat_pump_residential_energy_property_credit
  kind: derived
  entity: TaxUnit
  dtype: Money
  period: Year
  unit: USD
  source: 26 USC 25C(a)(2), 26 USC 25C(b)(2)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us/statute/26/25C
          excerpt: residential energy property expenditures paid or incurred
      - path: versions[0].formula
        kind: import
        import:
          target: us:statutes/26/25C#qualified_energy_property_item_credit_limit
          output: qualified_energy_property_item_credit_limit
          hash: sha256:local
  versions:
  - effective_from: '2023-01-01'
    formula: "min(\n    energy_efficient_home_improvement_credit_rate\n    * max(0,\
      \ qualified_residential_energy_property_expenditures_excluding_heat_pump_biomass_and_panelboard),\n\
      \    qualified_energy_property_item_credit_limit\n)\n+ min(\n    energy_efficient_home_improvement_credit_rate\n\
      \    * max(0, qualified_panelboard_expenditures),\n    qualified_energy_property_item_credit_limit\n\
      )"
- name: heat_pump_biomass_credit
  kind: derived
  entity: TaxUnit
  dtype: Money
  period: Year
  unit: USD
  source: 26 USC 25C(a)(2), 26 USC 25C(b)(5)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us/statute/26/25C
          excerpt: property described in clauses (i) and (ii) of subsection (d)(2)(A)
            and in subsection (d)(2)(B)
      - path: versions[0].formula
        kind: import
        import:
          target: us:statutes/26/25C#heat_pump_biomass_aggregate_credit_limit
          output: heat_pump_biomass_aggregate_credit_limit
          hash: sha256:local
  versions:
  - effective_from: '2023-01-01'
    formula: "min(\n    energy_efficient_home_improvement_credit_rate\n    * max(0,\
      \ qualified_heat_pump_heat_pump_water_heater_biomass_stove_or_boiler_expenditures),\n\
      \    heat_pump_biomass_aggregate_credit_limit\n)"
- name: home_energy_audit_credit
  kind: derived
  entity: TaxUnit
  dtype: Money
  period: Year
  unit: USD
  source: 26 USC 25C(a)(3), 26 USC 25C(b)(6)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us/statute/26/25C
          excerpt: amount paid or incurred ... for home energy audits
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us/statute/26/25C
          excerpt: "unless the taxpayer includes with the taxpayer\u2019s return ...\
            \ information or documentation"
      - path: versions[0].formula
        kind: import
        import:
          target: us:statutes/26/25C#home_energy_audit_credit_limit
          output: home_energy_audit_credit_limit
          hash: sha256:local
  versions:
  - effective_from: '2023-01-01'
    formula: 'if home_energy_audit_substantiation_included_with_return: min( energy_efficient_home_improvement_credit_rate
      * max(0, qualified_home_energy_audit_expenditures), home_energy_audit_credit_limit
      ) else: 0'
- name: general_limited_credit_before_heat_pump_biomass
  kind: derived
  entity: TaxUnit
  dtype: Money
  period: Year
  unit: USD
  source: 26 USC 25C(a), 26 USC 25C(b)(1)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us/statute/26/25C
          excerpt: shall not exceed $1,200
      - path: versions[0].formula
        kind: import
        import:
          target: us:statutes/26/25C#windows_and_skylights_credit
          output: windows_and_skylights_credit
          hash: sha256:local
      - path: versions[0].formula
        kind: import
        import:
          target: us:statutes/26/25C#exterior_doors_credit
          output: exterior_doors_credit
          hash: sha256:local
      - path: versions[0].formula
        kind: import
        import:
          target: us:statutes/26/25C#other_envelope_improvements_credit
          output: other_envelope_improvements_credit
          hash: sha256:local
      - path: versions[0].formula
        kind: import
        import:
          target: us:statutes/26/25C#non_heat_pump_residential_energy_property_credit
          output: non_heat_pump_residential_energy_property_credit
          hash: sha256:local
      - path: versions[0].formula
        kind: import
        import:
          target: us:statutes/26/25C#home_energy_audit_credit
          output: home_energy_audit_credit
          hash: sha256:local
  versions:
  - effective_from: '2023-01-01'
    formula: "min(\n    general_annual_credit_limit,\n    windows_and_skylights_credit\n\
      \    + exterior_doors_credit\n    + other_envelope_improvements_credit\n   \
      \ + non_heat_pump_residential_energy_property_credit\n    + home_energy_audit_credit\n\
      )"
- name: energy_efficient_home_improvement_credit_before_termination_and_pin_gate
  kind: derived
  entity: TaxUnit
  dtype: Money
  period: Year
  unit: USD
  source: 26 USC 25C(a), 26 USC 25C(b)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us/statute/26/25C
          excerpt: 30 percent of the sum
      - path: versions[0].formula
        kind: import
        import:
          target: us:statutes/26/25C#general_limited_credit_before_heat_pump_biomass
          output: general_limited_credit_before_heat_pump_biomass
          hash: sha256:local
      - path: versions[0].formula
        kind: import
        import:
          target: us:statutes/26/25C#heat_pump_biomass_credit
          output: heat_pump_biomass_credit
          hash: sha256:local
  versions:
  - effective_from: '2023-01-01'
    formula: 'general_limited_credit_before_heat_pump_biomass

      + heat_pump_biomass_credit'
- name: energy_efficient_home_improvement_credit
  kind: derived
  entity: TaxUnit
  dtype: Money
  period: Year
  unit: USD
  source: 26 USC 25C(a), 26 USC 25C(h), 26 USC 25C(i)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us/statute/26/25C
          excerpt: No credit shall be allowed ... specified property placed in service
            after December 31, 2024
      - path: versions[0].formula
        kind: effective_period
        source:
          corpus_citation_path: us/statute/26/25C
          excerpt: shall not apply with respect to any property placed in service
            after December 31, 2025
      - path: versions[0].formula
        kind: import
        import:
          target: us:statutes/26/25C#energy_efficient_home_improvement_credit_before_termination_and_pin_gate
          output: energy_efficient_home_improvement_credit_before_termination_and_pin_gate
          hash: sha256:local
  versions:
  - effective_from: '2023-01-01'
    formula: "if property_placed_in_service_after_termination_date:\n    0\nelse:\n\
      \    if specified_property_pin_requirement_applies_and_is_not_satisfied:\n \
      \       0\n    else:\n        energy_efficient_home_improvement_credit_before_termination_and_pin_gate"
- name: basis_increase_reduction_for_credited_property_expenditure
  kind: derived
  entity: TaxUnit
  dtype: Money
  period: Year
  unit: USD
  source: 26 USC 25C(g)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us/statute/26/25C
          excerpt: increase in the basis ... shall be reduced by the amount of the
            credit so allowed
      - path: versions[0].formula
        kind: import
        import:
          target: us:statutes/26/25C#energy_efficient_home_improvement_credit
          output: energy_efficient_home_improvement_credit
          hash: sha256:local
  versions:
  - effective_from: '2023-01-01'
    formula: energy_efficient_home_improvement_credit
