  - name: section_22_aged_individual
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 26 USC 22(b)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/26/22
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/26/22#section_22_age_threshold
              output: section_22_age_threshold
              hash: sha256:local
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          age >= section_22_age_threshold

  - name: permanently_totally_disabled
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 26 USC 22(e)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/statute/26/22
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/26/22#permanent_total_disability_minimum_duration_months
              output: permanent_total_disability_minimum_duration_months
              hash: sha256:local
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          unable_to_engage_substantial_gainful_activity
          and medically_determinable_impairment
          and (
              impairment_expected_to_result_in_death
              or impairment_duration_months >= permanent_total_disability_minimum_duration_months
          )
          and disability_proof_furnished

  - name: retired_on_permanent_total_disability
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 26 USC 22(b)(2), 22(e)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/26/22
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          retired_on_disability_before_year_end
          and permanently_totally_disabled

  - name: elderly_disabled_qualified_individual
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 26 USC 22(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/statute/26/22
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          section_22_aged_individual
          or retired_on_permanent_total_disability

  - name: under_65_elderly_disabled_qualified_individual
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 26 USC 22(c)(2)(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/26/22
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          elderly_disabled_qualified_individual
          and not section_22_aged_individual

  - name: section_22_qualified_individual_count
    kind: derived
    entity: TaxUnit
    dtype: Integer
    period: Year
    source: 26 USC 22(b), aggregated over taxpayer and spouse
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/22
              excerpt: "section 22 amount or credit for the taxable year"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          count_where(taxpayer_or_spouse_of_tax_unit, elderly_disabled_qualified_individual)

  - name: section_22_aged_qualified_individual_count
    kind: derived
    entity: TaxUnit
    dtype: Integer
    period: Year
    source: 26 USC 22(c)(2)(B)(ii)(II), aggregated over taxpayer and spouse
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/22
              excerpt: "section 22 amount or credit for the taxable year"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          count_where(taxpayer_or_spouse_of_tax_unit, section_22_aged_individual)

  - name: section_22_under_65_disability_income
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 22(c)(2)(B)(iii), aggregated over taxpayer and spouse
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/statute/26/22
              excerpt: "section 22 amount or credit for the taxable year"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          sum_where(taxpayer_or_spouse_of_tax_unit, section_22_disability_income, under_65_elderly_disabled_qualified_individual)

  - name: section_22_initial_amount_before_disability_cap
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 22(c)(2)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/22
              excerpt: "section 22 amount or credit for the taxable year"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          if filing_status == 2:
              section_22_initial_amount_separate
          else:
              if filing_status == 1 and section_22_qualified_individual_count >= 2:
                  section_22_initial_amount_two_qualified
              else:
                  if section_22_qualified_individual_count >= 1:
                      section_22_initial_amount_one_qualified
                  else:
                      0

  - name: section_22_initial_amount_cap
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 22(c)(2)(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/22
              excerpt: "section 22 amount or credit for the taxable year"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          if section_22_qualified_individual_count == 0:
              0
          else:
              if section_22_aged_qualified_individual_count == section_22_qualified_individual_count:
                  section_22_initial_amount_before_disability_cap
              else:
                  if filing_status == 1 and section_22_qualified_individual_count >= 2 and section_22_aged_qualified_individual_count == 1:
                      section_22_initial_amount_one_qualified + section_22_under_65_disability_income
                  else:
                      section_22_under_65_disability_income

  - name: section_22_initial_amount
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 22(c)(1), 22(c)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/22
              excerpt: "section 22 amount or credit for the taxable year"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          min(section_22_initial_amount_before_disability_cap, section_22_initial_amount_cap)

  - name: section_22_service_injury_payment_exclusion
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 22(c)(3)(A), cross-reference to 26 USC 104(a)(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/22
              excerpt: "section 22 amount or credit for the taxable year"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          sum(section_22_payment_of_tax_unit.service_injury_pension_excluded_amount)

  - name: section_22_nontaxable_pension_benefit_reduction
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 22(c)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/22
              excerpt: "section 22 amount or credit for the taxable year"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          max(
              0,
              social_security_title_ii_benefits_excluded_from_gross_income
              + railroad_retirement_act_benefits_excluded_from_gross_income
              + veterans_affairs_pension_annuity_or_disability_benefits_excluded_from_gross_income
              + other_non_title_pension_annuity_or_disability_benefits_excluded_from_gross_income
              + workers_compensation_treated_as_social_security_benefit
              - section_22_service_injury_payment_exclusion
          )

  - name: section_22_amount_after_benefit_reduction
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 22(c)(1), 22(c)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/22
              excerpt: "section 22 amount or credit for the taxable year"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          max(0, section_22_initial_amount - section_22_nontaxable_pension_benefit_reduction)

  - name: section_22_phaseout_threshold
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 22(d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/22
              excerpt: "section 22 amount or credit for the taxable year"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          if filing_status == 1:
              section_22_phaseout_threshold_joint
          else:
              if filing_status == 2:
                  section_22_phaseout_threshold_separate
              else:
                  section_22_phaseout_threshold_single

  - name: section_22_agi_phaseout_excess
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 22(d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/22
              excerpt: "section 22 amount or credit for the taxable year"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          max(0, adjusted_gross_income - section_22_phaseout_threshold)

  - name: section_22_agi_phaseout_reduction
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 22(d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/22
              excerpt: "section 22 amount or credit for the taxable year"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          section_22_agi_phaseout_excess * section_22_phaseout_rate

  - name: section_22_amount
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 22(c)(1), 22(d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/22
              excerpt: "section 22 amount or credit for the taxable year"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          max(0, section_22_amount_after_benefit_reduction - section_22_agi_phaseout_reduction)

  - name: section_22_married_filing_requirement_satisfied
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: 26 USC 22(e)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/26/22
              excerpt: "section 22 amount or credit for the taxable year"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/26/22
              excerpt: "section 22 amount or credit for the taxable year"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          not married_at_close_of_taxable_year
          or filing_status == 1
          or spouses_lived_apart_all_year

  - name: elderly_disabled_credit_eligible
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: 26 USC 22(a), 26 USC 22(e)(1), 26 USC 22(f)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/26/22
              excerpt: "section 22 amount or credit for the taxable year"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/26/22
              excerpt: "section 22 amount or credit for the taxable year"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          section_22_qualified_individual_count >= 1
          and section_22_married_filing_requirement_satisfied
          and not is_nonresident_alien

  - name: elderly_disabled_credit
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 22(a), 26 USC 22(f)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/22
              excerpt: "section 22 amount or credit for the taxable year"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          if elderly_disabled_credit_eligible:
              section_22_amount * section_22_credit_rate
          else:
              0
