format: rulespec/v1
imports:
  - us:statutes/26/104/a/4#service_injury_pension_excluded_amount
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/26/22
  summary: |-
    (a) General rule In the case of a qualified individual, there shall be allowed as a credit against the tax imposed by this chapter for the taxable year an amount equal to 15 percent of such individual’s section 22 amount for such taxable year.
    (b) Qualified individual For purposes of this section, the term “qualified individual” means any individual— (1) who has attained age 65 before the close of the taxable year, or (2) who retired on disability before the close of the taxable year and who, when he retired, was permanently and totally disabled.
    (c) Section 22 amount For purposes of subsection (a)— (1) In general An individual’s section 22 amount for the taxable year shall be the applicable initial amount determined under paragraph (2), reduced as provided in paragraph (3) and in subsection (d). (2) Initial amount (A) In general Except as provided in subparagraph (B), the initial amount shall be— (i) $5,000 in the case of a single individual, or a joint return where only one spouse is a qualified individual, (ii) $7,500 in the case of a joint return where both spouses are qualified individuals, or (iii) $3,750 in the case of a married individual filing a separate return. (B) Limitation in case of individuals who have not attained age 65 (i) In general In the case of a qualified individual who has not attained age 65 before the close of the taxable year, except as provided in clause (ii), the initial amount shall not exceed the disability income for the taxable year. (ii) Special rules in case of joint return In the case of a joint return where both spouses are qualified individuals and at least one spouse has not attained age 65 before the close of the taxable year— (I) if both spouses have not attained age 65 before the close of the taxable year, the initial amount shall not exceed the sum of such spouses’ disability income, or (II) if one spouse has attained age 65 before the close of the taxable year, the initial amount shall not exceed the sum of $5,000 plus the disability income for the taxable year of the spouse who has not attained age 65 before the close of the taxable year. (iii) Disability income For purposes of this subparagraph, the term “disability income” means the aggregate amount includable in the gross income of the individual for the taxable year under section 72 or 105(a) to the extent such amount constitutes wages (or payments in lieu of wages) for the period during which the individual is absent from work on account of permanent and total disability. (3) Reduction (A) In general The reduction under this paragraph is an amount equal to the sum of the amounts received by the individual (or, in the case of a joint return, by either spouse) as a pension or annuity or as a disability benefit— (i) which is excluded from gross income and payable under— (I) title II of the Social Security Act, (II) the Railroad Retirement Act of 1974, or (III) a law administered by the Department of Veterans Affairs, or (ii) which is excluded from gross income under any provision of law not contained in this title. No reduction shall be made under clause (i)(III) for any amount described in section 104(a)(4). (B) Treatment of certain workmen’s compensation benefits For purposes of subparagraph (A), any amount treated as a social security benefit under section 86(d)(3) shall be treated as a disability benefit received under title II of the Social Security Act.
    (d) Adjusted gross income limitation If the adjusted gross income of the taxpayer exceeds— (1) $7,500 in the case of a single individual, (2) $10,000 in the case of a joint return, or (3) $5,000 in the case of a married individual filing a separate return, the section 22 amount shall be reduced by one-half of the excess of the adjusted gross income over $7,500, $10,000, or $5,000, as the case may be.
    (e) Definitions and special rules For purposes of this section— (1) Married couple must file joint return Except in the case of a husband and wife who live apart at all times during the taxable year, if the taxpayer is married at the close of the taxable year, the credit provided by this section shall be allowed only if the taxpayer and his spouse file a joint return for the taxable year. (2) Marital status Marital status shall be determined under section 7703. (3) Permanent and total disability defined An individual is permanently and totally disabled if he is unable to engage in any substantial gainful activity by reason of any medically determinable physical or mental impairment which can be expected to result in death or which has lasted or can be expected to last for a continuous period of not less than 12 months. An individual shall not be considered to be permanently and totally disabled unless he furnishes proof of the existence thereof in such form and manner, and at such times, as the Secretary may require.
    (f) Nonresident alien ineligible for credit No credit shall be allowed under this section to any nonresident alien.
rules:
