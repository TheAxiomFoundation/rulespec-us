format: rulespec/v1
imports:
  - us:statutes/26/1401/a/rate#old_age_survivors_and_disability_insurance_tax_rate
  - us:statutes/26/1401/b/1/rate#self_employment_income_tax_rate
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/26/1402
  summary: |-
    (12) in lieu of the deduction provided by section 164(f), there shall be allowed a deduction equal to the product of the taxpayer's net earnings from self-employment determined without regard to this paragraph and one-half of the sum of the section 1401(a) and 1401(b) rates, excluding the section 1401(b)(2) rate.
rules:
  - name: self_employment_tax_equivalent_deduction_fraction
    kind: parameter
    dtype: Rate
    source: 26 USC 1402(a)(12)(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/26/1402
              excerpt: "one-half"
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          1 / 2

  - name: self_employment_tax_equivalent_deduction_rate
    kind: derived
    entity: Person
    dtype: Rate
    period: Year
    source: 26 USC 1402(a)(12)(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/1402
              excerpt: "one-half of the sum of the rates imposed by subsections (a) and (b) of section 1401"
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/26/1402/a/12#self_employment_tax_equivalent_deduction_fraction
              output: self_employment_tax_equivalent_deduction_fraction
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/26/1401/a/rate#old_age_survivors_and_disability_insurance_tax_rate
              output: old_age_survivors_and_disability_insurance_tax_rate
              hash: sha256:ff4ad3c6a9774807ea9d6ec00e410bb02e656b8878b6f6cf6d67754bc628c02e
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/26/1401/b/1/rate#self_employment_income_tax_rate
              output: self_employment_income_tax_rate
              hash: sha256:4b13c38511ce6cc289677d8d1a1cbb856a68e16bb07485108094867716dccd44
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          self_employment_tax_equivalent_deduction_fraction
          * (
              old_age_survivors_and_disability_insurance_tax_rate
              + self_employment_income_tax_rate
          )

  - name: self_employment_tax_equivalent_deduction
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 1402(a)(12)(A)-(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/1402
              excerpt: "deduction equal to the product of"
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/26/1402/a/12#self_employment_tax_equivalent_deduction_rate
              output: self_employment_tax_equivalent_deduction_rate
              hash: sha256:local
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          max(0, net_earnings_from_self_employment_determined_without_regard_to_paragraph_12)
          * self_employment_tax_equivalent_deduction_rate
