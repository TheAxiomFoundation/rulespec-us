  source_verification:
    corpus_citation_path: us/statute/26/1402
  summary: |-
    26 USC 1402(a) defines “net earnings from self-employment” as gross income from an individual's trade or business, less attributable subtitle deductions, plus partnership ordinary income or loss described in section 702(a)(8), subject to numerous exclusions, disallowed deductions, special community-property, Puerto Rico, minister, limited-partner, church-employee, Indian-fishing-rights, qualified-joint-venture, and optional-method rules.
  deferred_outputs:
    - output: us:statutes/26/1402/a#net_earnings_from_self_employment
      reason: >-
        The requested subsection is the definition of net earnings from self-employment, but faithful computation depends on unavailable upstream legal mechanics and definitions including section 702(a)(8), section 631, section 172, section 933, section 151, section 107, section 119, section 911, section 414(e), section 931, section 164(f), section 1401, section 707(c), section 7873, section 199, section 761(f), and section 3121(g). The source also uses statutory "upper limit" and "lower limit" terms whose values are not provided in this subsection.
