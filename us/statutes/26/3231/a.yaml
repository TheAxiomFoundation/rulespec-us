format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/26/3231
  summary: |-
    For purposes of this chapter, the term “employer” means any carrier as defined in subsection (g), certain carrier-owned or carrier-controlled companies performing railroad transportation-related services, receivers or trustees operating such employers, specified railroad associations and railway labor organizations; it excludes certain street, interurban, or suburban electric railways and certain coal mining or coal-supplying companies.
rules:
  - name: carrier_or_controlled_service_company_included
    kind: derived
    entity: Employer
    dtype: Judgment
    period: Year
    source: 26 USC 3231(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/statute/26/3231
              excerpt: "any carrier (as defined in subsection (g)), and any company which is directly or indirectly owned or controlled by one or more such carriers or under common control therewith"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/26/3231
              excerpt: "except trucking service, casual service, and the casual operation of equipment or facilities"
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          carrier_as_defined_in_subsection_g
          or (
              company_directly_or_indirectly_owned_or_controlled_by_carriers_or_under_common_control
              and (
                  operates_equipment_or_facility_or_performs_service_in_connection_with_railroad_transportation
                  or performs_service_in_connection_with_receipt_delivery_elevation_transfer_refrigeration_icing_storage_or_handling_of_property_transported_by_railroad
              )
              and not performs_only_trucking_service
              and not performs_only_casual_service
              and not performs_only_casual_operation_of_equipment_or_facilities
          )

  - name: receiver_or_trustee_of_employer_included
    kind: derived
    entity: Employer
    dtype: Judgment
    period: Year
    source: 26 USC 3231(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/statute/26/3231
              excerpt: "any receiver, trustee, or other individual or body, judicial or otherwise, when in the possession of the property or operating all or any part of the business of any such employer"
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          receiver_trustee_or_other_individual_or_body_judicial_or_otherwise
          and (
              in_possession_of_property_of_such_employer
              or operating_all_or_any_part_of_business_of_such_employer
          )

  - name: railroad_association_or_organization_included
    kind: derived
    entity: Employer
    dtype: Judgment
    period: Year
    source: 26 USC 3231(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/statute/26/3231
              excerpt: "railroad associations, traffic associations, tariff bureaus, demurrage bureaus, weighing and inspection bureaus, collection agencies and other associations, bureaus, agencies, or organizations"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/26/3231
              excerpt: "controlled and maintained wholly or principally by two or more employers as hereinbefore defined and engaged in the performance of services in connection with or incidental to railroad transportation"
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          railroad_transportation_association_bureau_agency_or_organization
          and controlled_and_maintained_wholly_or_principally_by_two_or_more_employers_as_defined
          and engaged_in_services_in_connection_with_or_incidental_to_railroad_transportation

  - name: railway_labor_organization_included
    kind: derived
    entity: Employer
    dtype: Judgment
    period: Year
    source: 26 USC 3231(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/statute/26/3231
              excerpt: "railway labor organizations, national in scope, which have been or may be organized in accordance with the provisions of the Railway Labor Act"
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/statute/26/3231
              excerpt: "and their State and National legislative committees and their general committees and their insurance departments and their local lodges and divisions"
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          railway_labor_organization_national_in_scope_organized_under_railway_labor_act
          or state_or_national_legislative_committee_general_committee_insurance_department_local_lodge_or_division_of_such_railway_labor_organization

  - name: electric_railway_exception_applies
    kind: derived
    entity: Employer
    dtype: Judgment
    period: Year
    source: 26 USC 3231(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/26/3231
              excerpt: "shall not include any street, interurban, or suburban electric railway, unless such railway is operating as a part of a general steam-railroad system of transportation"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/26/3231
              excerpt: "but shall not exclude any part of the general steam-railroad system of transportation now or hereafter operated by any other motive power"
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          street_interurban_or_suburban_electric_railway
          and not operating_as_part_of_general_steam_railroad_system_of_transportation
          and not part_of_general_steam_railroad_system_operated_by_other_motive_power

  - name: coal_company_exception_applies
    kind: derived
    entity: Employer
    dtype: Judgment
    period: Year
    source: 26 USC 3231(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/26/3231
              excerpt: "shall not include any company by reason of its being engaged in the mining of coal, the supplying of coal to an employer where delivery is not beyond the mine tipple, and the operation of equipment or facilities therefor"
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          company_included_only_by_reason_of_coal_mining
          or company_included_only_by_reason_of_supplying_coal_to_employer_where_delivery_is_not_beyond_mine_tipple
          or company_included_only_by_reason_of_operating_equipment_or_facilities_for_coal_mining_or_supplying

  - name: employer
    kind: derived
    entity: Employer
    dtype: Judgment
    period: Year
    source: 26 USC 3231(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/26/3231/a#carrier_or_controlled_service_company_included
              output: carrier_or_controlled_service_company_included
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/26/3231/a#receiver_or_trustee_of_employer_included
              output: receiver_or_trustee_of_employer_included
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/26/3231/a#railroad_association_or_organization_included
              output: railroad_association_or_organization_included
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/26/3231/a#railway_labor_organization_included
              output: railway_labor_organization_included
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/26/3231/a#electric_railway_exception_applies
              output: electric_railway_exception_applies
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/26/3231/a#coal_company_exception_applies
              output: coal_company_exception_applies
              hash: sha256:local
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          (
              carrier_or_controlled_service_company_included
              or receiver_or_trustee_of_employer_included
              or railroad_association_or_organization_included
              or railway_labor_organization_included
          )
          and not electric_railway_exception_applies
          and not coal_company_exception_applies
