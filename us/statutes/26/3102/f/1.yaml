  kind: parameter
  dtype: Money
  unit: USD
  period: Year
  source: 26 USC 3102(f)(1)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us/statute/26/3102
          excerpt: wages from the employer in excess of $200,000
  versions:
  - effective_from: '2013-01-01'
    formula: '200000'
