format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/26/213
  summary: "(a) Allowance of deduction There shall be allowed as a deduction the expenses\
    \ paid during the taxable year, not compensated for by insurance or otherwise,\
    \ for medical care of the taxpayer, his spouse, or a dependent (as defined in\
    \ section 152, determined without regard to subsections (b)(1), (b)(2), and (d)(1)(B)\
    \ thereof), to the extent that such expenses exceed 7.5 percent of adjusted gross\
    \ income.\n\n(b) Limitation with respect to medicine and drugs An amount paid\
    \ during the taxable year for medicine or a drug shall be taken into account under\
    \ subsection (a) only if such medicine or drug is a prescribed drug or is insulin.\n\
    \n(c) Special rule for decedents (1) Treatment of expenses paid after death For\
    \ purposes of subsection (a), expenses for the medical care of the taxpayer which\
    \ are paid out of his estate during the 1-year period beginning with the day after\
    \ the date of his death shall be treated as paid by the taxpayer at the time incurred.\
    \ (2) Limitation Paragraph (1) shall not apply if the amount paid is allowable\
    \ under section 2053 as a deduction in computing the taxable estate of the decedent,\
    \ but this paragraph shall not apply if (within the time and in the manner and\
    \ form prescribed by the Secretary) there is filed\u2014 (A) a statement that\
    \ such amount has not been allowed as a deduction under section 2053, and (B)\
    \ a waiver of the right to have such amount allowed at any time as a deduction\
    \ under section 2053.\n\n(d)(1) The term \u201Cmedical care\u201D means amounts\
    \ paid\u2014 (A) for the diagnosis, cure, mitigation, treatment, or prevention\
    \ of disease, or for the purpose of affecting any structure or function of the\
    \ body, (B) for transportation primarily for and essential to medical care referred\
    \ to in subparagraph (A), (C) for qualified long-term care services, or (D) for\
    \ insurance covering medical care referred to in subparagraphs (A) and (B) or\
    \ for any qualified long-term care insurance contract. In the case of a qualified\
    \ long-term care insurance contract, only eligible long-term care premiums shall\
    \ be taken into account under subparagraph (D).\n(d)(2) Amounts paid for lodging\
    \ (not lavish or extravagant under the circumstances) while away from home primarily\
    \ for and essential to medical care referred to in paragraph (1)(A) shall be treated\
    \ as amounts paid for medical care if the medical care is provided by a physician\
    \ in a licensed hospital (or related or equivalent facility), and there is no\
    \ significant element of personal pleasure, recreation, or vacation. The amount\
    \ taken into account shall not exceed $50 for each night for each individual.\n\
    (d)(3) \u201CPrescribed drug\u201D means a drug or biological which requires a\
    \ prescription of a physician for its use by an individual.\n(d)(5) Any child\
    \ to whom section 152(e) applies shall be treated as a dependent of both parents\
    \ for purposes of this section.\n(d)(9) \u201CMedical care\u201D does not include\
    \ cosmetic surgery or other similar procedures, unless necessary to ameliorate\
    \ a deformity arising from, or directly related to, a congenital abnormality,\
    \ personal injury resulting from an accident or trauma, or disfiguring disease.\
    \ \u201CCosmetic surgery\u201D means any procedure directed at improving the patient\u2019\
    s appearance and not meaningfully promoting proper body function or preventing\
    \ or treating illness or disease.\n(d)(10) \u201CEligible long-term care premiums\u201D\
    \ means the amount paid during a taxable year for any qualified long-term care\
    \ insurance contract covering an individual, to the extent such amount does not\
    \ exceed: age 40 or less $200; more than 40 but not more than 50 $375; more than\
    \ 50 but not more than 60 $750; more than 60 but not more than 70 $2,000; more\
    \ than 70 $2,500. After 1997, each dollar amount is increased by the medical care\
    \ cost adjustment, with increases rounded to the nearest multiple of $10.\n(d)(11)\
    \ An amount paid for a qualified long-term care service provided to an individual\
    \ shall be treated as not paid for medical care if provided by the spouse or a\
    \ relative unless by a licensed professional, or by a related corporation or partnership.\
    \ This paragraph shall not apply for purposes of section 105(b) with respect to\
    \ reimbursements through insurance.\n\n(e) Exclusion of amounts allowed for care\
    \ of certain dependents Any expense allowed as a credit under section 21 shall\
    \ not be treated as an expense paid for medical care."
