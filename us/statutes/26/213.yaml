- name: eligible_ltc_premium_base_limit
  kind: derived
  entity: Person
  dtype: Money
  period: Year
  unit: USD
  source: 26 USC 213(d)(10)(A)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us/statute/26/213
          text: The limitation table applies by attained age before the close of the
            taxable year.
  versions:
  - effective_from: '2026-01-01'
    formula: "if age <= ltc_premium_age_threshold_40:\n    ltc_premium_limit_age_40_or_less_base\n\
      else:\n    if age <= ltc_premium_age_threshold_50:\n        ltc_premium_limit_age_over_40_through_50_base\n\
      \    else:\n        if age <= ltc_premium_age_threshold_60:\n            ltc_premium_limit_age_over_50_through_60_base\n\
      \        else:\n            if age <= ltc_premium_age_threshold_70:\n      \
      \          ltc_premium_limit_age_over_60_through_70_base\n            else:\n\
      \                ltc_premium_limit_age_over_70_base"
- name: eligible_ltc_premium_indexed_limit_scalar_limit
  kind: parameter
  dtype: Count
  source: 26 USC 213(d)(10)(B)
  metadata:
    proof:
