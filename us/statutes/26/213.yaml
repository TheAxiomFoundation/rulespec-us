      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us/statute/26/213
          text: each dollar amount contained in subparagraph (A) shall be increased
            by the medical care cost adjustment ... rounded to the nearest multiple
            of $10
  versions:
  - effective_from: '2026-01-01'
    formula: '0.5'
- name: eligible_ltc_premium_indexed_limit
  kind: derived
  entity: Person
  dtype: Money
  period: Year
  unit: USD
  source: 26 USC 213(d)(10)(B)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us/statute/26/213
          text: each dollar amount contained in subparagraph (A) shall be increased
            by the medical care cost adjustment ... rounded to the nearest multiple
            of $10
      - path: versions[0].formula
        kind: import
        import:
          target: us:statutes/26/213#eligible_ltc_premium_indexed_limit_scalar_limit
          output: eligible_ltc_premium_indexed_limit_scalar_limit
          hash: sha256:local
  versions:
  - effective_from: '2026-01-01'
    formula: "eligible_ltc_premium_base_limit\n+ floor(\n    (\n        (\n      \
      \      eligible_ltc_premium_base_limit\n            * medical_care_cost_adjustment\n\
      \        )\n        / ltc_premium_increase_rounding_multiple\n    )\n    + eligible_ltc_premium_indexed_limit_scalar_limit\n\
      )\n* ltc_premium_increase_rounding_multiple"
- name: eligible_ltc_premiums_taken_into_account
  kind: derived
  entity: Person
  dtype: Money
  period: Year
  unit: USD
  source: 26 USC 213(d)(1)(D), 213(d)(10)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us/statute/26/213
          text: only eligible long-term care premiums ... shall be taken into account
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us/statute/26/213
          text: means the amount paid during a taxable year ... to the extent such
            amount does not exceed the limitation
  versions:
  - effective_from: '2026-01-01'
    formula: "min(\n    qualified_long_term_care_insurance_premiums_paid,\n    eligible_ltc_premium_indexed_limit\n\
      )"
- name: medicine_or_drug_taken_into_account
  kind: derived
  entity: Payment
  dtype: Judgment
  period: Year
  source: 26 USC 213(b), 213(d)(3)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us/statute/26/213
          text: only if such medicine or drug is a prescribed drug or is insulin
      - path: versions[0].formula
        kind: definition
        source:
          corpus_citation_path: us/statute/26/213
          text: prescribed drug means a drug or biological which requires a prescription
            of a physician for its use by an individual
  versions:
  - effective_from: '2026-01-01'
    formula: "payment_is_for_medicine_or_drug\nand (\n    medicine_or_drug_is_prescribed_drug\n\
      \    or medicine_or_drug_is_insulin\n)"
- name: lodging_treated_as_medical_care
  kind: derived
  entity: Payment
  dtype: Judgment
  period: Year
  source: 26 USC 213(d)(2)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us/statute/26/213
          text: Amounts paid for lodging ... while away from home primarily for and
            essential to medical care ... shall be treated as amounts paid for medical
            care if...
  versions:
  - effective_from: '2026-01-01'
    formula: 'payment_is_for_lodging_away_from_home

      and lodging_is_not_lavish_or_extravagant_under_circumstances

      and lodging_is_primarily_for_and_essential_to_medical_care

      and medical_care_is_provided_by_physician_in_licensed_hospital_or_equivalent_facility

      and not significant_element_of_personal_pleasure_recreation_or_vacation_in_travel'
- name: lodging_amount_taken_into_account
  kind: derived
  entity: Payment
  dtype: Money
  period: Year
  unit: USD
  source: 26 USC 213(d)(2)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us/statute/26/213
          text: The amount taken into account under the preceding sentence shall not
            exceed $50 for each night for each individual.
  versions:
  - effective_from: '2026-01-01'
    formula: "if lodging_treated_as_medical_care:\n    min(\n        lodging_amount_paid,\n\
      \        medical_lodging_nightly_cap * lodging_nights * lodging_individuals\n\
      \    )\nelse:\n    0"
- name: decedent_estate_medical_expense_treated_as_paid_by_taxpayer
  kind: derived
  entity: Payment
  dtype: Judgment
  period: Year
  source: 26 USC 213(c)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us/statute/26/213
          text: expenses ... paid out of his estate during the 1-year period beginning
            with the day after the date of his death shall be treated as paid by the
            taxpayer at the time incurred
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us/statute/26/213
          text: shall not apply if the amount paid is allowable under section 2053
            ... but this paragraph shall not apply if ... there is filed ... a statement
            ... and ... a waiver
  versions:
  - effective_from: '2026-01-01'
    formula: "expense_is_for_medical_care_of_decedent_taxpayer\nand expense_paid_out_of_estate_during_one_year_period_after_death\n\
      and (\n    not estate_tax_deduction_allowable_for_amount\n    or (\n       \
      \ statement_filed_that_estate_tax_deduction_not_allowed_for_amount\n       \
      \ and waiver_filed_of_right_to_estate_tax_deduction_for_amount\n    )\n)"
- name: cosmetic_surgery_excluded_from_medical_care
  kind: derived
  entity: Payment
  dtype: Judgment
  period: Year
  source: 26 USC 213(d)(9)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us/statute/26/213
          text: medical care does not include cosmetic surgery or other similar procedures,
            unless the surgery or procedure is necessary to ameliorate a deformity...
      - path: versions[0].formula
        kind: definition
        source:
          corpus_citation_path: us/statute/26/213
          text: "cosmetic surgery means any procedure which is directed at improving\
            \ the patient\u2019s appearance and does not meaningfully promote the\
            \ proper function of the body or prevent or treat illness or disease"
  versions:
  - effective_from: '2026-01-01'
    formula: 'procedure_is_cosmetic_surgery_or_similar

      and procedure_directed_at_improving_appearance_without_meaningfully_promoting_body_function_or_preventing_or_treating_illness

      and not procedure_necessary_to_ameliorate_deformity_from_congenital_abnormality

      and not procedure_necessary_to_ameliorate_deformity_from_accident_or_trauma

      and not procedure_necessary_to_ameliorate_deformity_from_disfiguring_disease'
- name: qualified_ltc_service_payment_treated_as_not_medical_care
  kind: derived
  entity: Payment
  dtype: Judgment
  period: Year
  source: 26 USC 213(d)(11)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us/statute/26/213
          text: "An amount paid for a qualified long-term care service ... shall be\
            \ treated as not paid for medical care if such service is provided\u2014\
            \ (A) by the spouse ... or by a relative ... unless ... by a licensed\
            \ professional ... or (B) by a corporation or partnership which is related..."
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us/statute/26/213
          text: This paragraph shall not apply for purposes of section 105(b) with
            respect to reimbursements through insurance.
  versions:
  - effective_from: '2026-01-01'
    formula: "payment_is_for_qualified_long_term_care_service\nand not payment_is_section_105_b_reimbursement_through_insurance\n\
      and (\n    (\n        service_provider_is_spouse_or_relative\n        and not\
      \ service_provided_by_licensed_professional_with_respect_to_service\n    )\n\
      \    or service_provider_is_related_corporation_or_partnership\n)"
- name: medical_care_expenses_after_section_21_exclusion
  kind: derived
  entity: TaxUnit
  dtype: Money
  period: Year
  unit: USD
  source: 26 USC 213(a), 213(e)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us/statute/26/213
          text: expenses paid during the taxable year, not compensated for by insurance
            or otherwise, for medical care
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us/statute/26/213
          text: Any expense allowed as a credit under section 21 shall not be treated
            as an expense paid for medical care.
  versions:
  - effective_from: '2026-01-01'
    formula: "max(\n    0,\n    medical_care_expenses_paid_not_compensated_by_insurance_or_otherwise\n\
      \    - dependent_care_expenses_allowed_as_credit\n)"
- name: medical_care_deduction
  kind: derived
  entity: TaxUnit
  dtype: Money
  period: Year
  unit: USD
  source: 26 USC 213(a), 213(e)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us/statute/26/213
          text: There shall be allowed as a deduction ... to the extent that such
            expenses exceed 7.5 percent of adjusted gross income.
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us/statute/26/213
          text: Any expense allowed as a credit under section 21 shall not be treated
            as an expense paid for medical care.
  versions:
  - effective_from: '2026-01-01'
    formula: "max(\n    0,\n    medical_care_expenses_after_section_21_exclusion\n\
      \    - adjusted_gross_income * medical_expense_agi_floor_rate\n)"
