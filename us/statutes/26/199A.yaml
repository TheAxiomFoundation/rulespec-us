format: rulespec/v1
imports:
  - us:statutes/26/1/h#net_capital_gain
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/26/199A
  deferred_outputs:
    - output: us:statutes/26/199A/c#qualified_business_income_definition
      blocked_by:
        - us:statutes/26/199A#qualified_business_income_composition_context
      reason: >-
        Subsection (c) defines qualified business income, qualified items, and
        exclusions. This module consumes resolved qualified business income as
        an input while encoding the deduction arithmetic; QBI composition is
        deferred.
    - output: us:statutes/26/199A/d#qualified_trade_or_business_definition
      blocked_by:
        - us:statutes/26/199A#qualified_trade_or_business_classification_context
      reason: >-
        Subsection (d) defines qualified trade or business, specified service
        trade or business, and related services. This module consumes resolved
        trade-or-business classifications and amounts; classification is
        deferred.
    - output: us:statutes/26/199A/h#anti_abuse_rules
      blocked_by:
        - us:statutes/26/199A#section_199a_anti_abuse_regulatory_context
      reason: >-
        Subsection (h) directs the Secretary to apply and prescribe anti-abuse
        rules. This module does not encode regulatory anti-abuse determinations.
  summary: |-
    (a) Allowance of deduction In the case of a taxpayer other than a corporation, except as provided in subsection (i), there shall be allowed as a deduction for any taxable year an amount equal to the lesser of— (1) the combined qualified business income amount of the taxpayer, or (2) an amount equal to 20 percent of the excess (if any) of— (A) the taxable income of the taxpayer for the taxable year, over (B) the net capital gain (as defined in section 1(h)) of the taxpayer for such taxable year.

    (b) Combined qualified business income amount For purposes of this section— (1) In general The term “combined qualified business income amount” means, with respect to any taxable year, an amount equal to— (A) the sum of the amounts determined under paragraph (2) for each qualified trade or business carried on by the taxpayer, plus (B) 20 percent of the aggregate amount of the qualified REIT dividends and qualified publicly traded partnership income of the taxpayer for the taxable year. (2) Determination of deductible amount for each trade or business The amount determined under this paragraph with respect to any qualified trade or business is the lesser of— (A) 20 percent of the taxpayer’s qualified business income with respect to the qualified trade or business, or (B) the greater of— (i) 50 percent of the W–2 wages with respect to the qualified trade or business, or (ii) the sum of 25 percent of the W–2 wages with respect to the qualified trade or business, plus 2.5 percent of the unadjusted basis immediately after acquisition of all qualified property. (3) Modifications to limit based on taxable income ... threshold amount plus $75,000 ($150,000 in the case of a joint return) ... (7) Special rule with respect to income received from cooperatives ... reduced by the lesser of— (A) 9 percent ... or (B) 50 percent ...

    (e) Other definitions ... (1) Taxable income Except as otherwise provided in subsection (g)(2)(B), taxable income shall be computed without regard to section 68 and without regard to any deduction allowable under this section. (2) Threshold amount (A) In general The term “threshold amount” means $157,500 (200 percent of such amount in the case of a joint return). (B) Inflation adjustment In the case of any taxable year beginning after 2018, the dollar amount in subparagraph (A) shall be increased by an amount equal to— (i) such dollar amount, multiplied by (ii) the cost-of-living adjustment determined under section 1(f)(3) ... The amount of any increase under the preceding sentence shall be rounded as provided in section 1(f)(7).

    (g) Deduction for income attributable to domestic production activities of specified agricultural or horticultural cooperatives (1) ... 9 percent of the lesser of— (i) the qualified production activities income ... or (ii) the taxable income ... (B) Limitation ... shall not exceed 50 percent of the W–2 wages ...

    (i) Minimum deduction for active qualified business income (1) In general In the case of an applicable taxpayer for any taxable year, the deduction allowed under subsection (a) for the taxable year shall be equal to the greater of— (A) the amount of such deduction determined without regard to this subsection, or (B) $400. (2) Applicable taxpayer ... aggregate qualified business income with respect to all active qualified trades or businesses ... is at least $1,000. (3) Inflation adjustment In the case of any taxable year beginning after 2026, the $400 amount ... and the $1,000 amount ... shall each be increased ... If any increase under this paragraph is not a multiple of $5, such increase shall be rounded to the nearest multiple of $5
rules:
  - name: qbi_deduction_rate
    kind: parameter
    dtype: Rate
    source: 26 USC 199A(a)(2), (b)(1)(B), (b)(2)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/26/199A
              excerpt: "20 percent"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          0.20

  - name: wage_limit_rate
    kind: parameter
    dtype: Rate
    source: 26 USC 199A(b)(2)(B)(i)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/26/199A
              excerpt: "50 percent of the W–2 wages"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          0.50

  - name: alternate_wage_limit_rate
    kind: parameter
    dtype: Rate
    source: 26 USC 199A(b)(2)(B)(ii)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/26/199A
              excerpt: "25 percent of the W–2 wages"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          0.25

  - name: qualified_property_limit_rate
    kind: parameter
    dtype: Rate
    source: 26 USC 199A(b)(2)(B)(ii)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/26/199A
              excerpt: "2.5 percent of the unadjusted basis immediately after acquisition of all qualified property"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          0.025

  - name: qbi_phasein_range_other
    kind: parameter
    dtype: Money
    unit: USD
    source: 26 USC 199A(b)(3)(B)(i)(I), (b)(3)(B)(ii)(II)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/26/199A
              excerpt: "threshold amount plus $75,000"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          75000

  - name: qbi_phasein_range_joint
    kind: parameter
    dtype: Money
    unit: USD
    source: 26 USC 199A(b)(3)(B)(i)(I), (b)(3)(B)(ii)(II)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/26/199A
              excerpt: "$150,000 in the case of a joint return"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          150000

  - name: threshold_amount_base
    kind: parameter
    dtype: Money
    unit: USD
    source: 26 USC 199A(e)(2)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/26/199A
              excerpt: "The term “threshold amount” means $157,500"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          157500

  - name: threshold_amount_joint_multiplier
    kind: parameter
    dtype: Decimal
    source: 26 USC 199A(e)(2)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/26/199A
              excerpt: "200 percent of such amount in the case of a joint return"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          2

  - name: cooperative_reduction_rate
    kind: parameter
    dtype: Rate
    source: 26 USC 199A(b)(7)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/26/199A
              excerpt: "9 percent of so much of the qualified business income"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          0.09

  - name: cooperative_wage_reduction_rate
    kind: parameter
    dtype: Rate
    source: 26 USC 199A(b)(7)(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/26/199A
              excerpt: "50 percent of so much of the W–2 wages"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          0.50

  - name: minimum_active_qbi_deduction_base
    kind: parameter
    dtype: Money
    unit: USD
    source: 26 USC 199A(i)(1)(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/26/199A
              excerpt: "$400"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          400

  - name: active_qbi_minimum_threshold_base
    kind: parameter
    dtype: Money
    unit: USD
    source: 26 USC 199A(i)(2)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/26/199A
              excerpt: "at least $1,000"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          1000

  - name: minimum_deduction_rounding_multiple
    kind: parameter
    dtype: Money
    unit: USD
    source: 26 USC 199A(i)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/26/199A
              excerpt: "rounded to the nearest multiple of $5"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          5

  - name: qbi_phasein_range
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 199A(b)(3)(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/199A
              excerpt: "$75,000 ($150,000 in the case of a joint return)"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          if filing_status == 1 or filing_status == 4: qbi_phasein_range_joint else: qbi_phasein_range_other

  - name: threshold_amount
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 199A(e)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/199A
              excerpt: "$157,500 (200 percent of such amount in the case of a joint return)"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          if filing_status == 1 or filing_status == 4:
              threshold_amount_base * threshold_amount_joint_multiplier
          else:
              threshold_amount_base

  - name: trade_or_business_wage_property_limit
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 199A(b)(2)(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/199A
              excerpt: "the greater of— (i) 50 percent of the W–2 wages ... or (ii) the sum of 25 percent of the W–2 wages ... plus 2.5 percent of the unadjusted basis"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          max(
              wage_limit_rate * qualified_trade_or_business_w2_wages,
              alternate_wage_limit_rate * qualified_trade_or_business_w2_wages
              + qualified_property_limit_rate * qualified_trade_or_business_unadjusted_basis
          )

  - name: trade_or_business_qbi_amount_before_limits
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 199A(b)(2)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/199A
              excerpt: "20 percent of the taxpayer’s qualified business income"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          qbi_deduction_rate * qualified_business_income

  - name: trade_or_business_excess_amount
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 199A(b)(3)(B)(iii)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/199A
              excerpt: "the excess of— (I) the amount determined under paragraph (2)(A) ... over (II) the amount determined under paragraph (2)(B)"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          max(0, trade_or_business_qbi_amount_before_limits - trade_or_business_wage_property_limit)

  - name: trade_or_business_phasein_reduction
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 199A(b)(3)(B)(ii)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/199A
              excerpt: "bears the same ratio to the excess amount as ... taxable income ... exceeds the threshold amount, bears to ... $75,000 ($150,000 in the case of a joint return)"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          trade_or_business_excess_amount
          * min(1, max(0, taxable_income_computed_without_section_199A - threshold_amount) / qbi_phasein_range)

  - name: cooperative_reduction
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 199A(b)(7)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/199A
              excerpt: "shall be reduced by the lesser of— (A) 9 percent ... or (B) 50 percent"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          min(
              cooperative_reduction_rate * max(0, qualified_business_income_allocable_to_qualified_cooperative_payments),
              cooperative_wage_reduction_rate * max(0, w2_wages_allocable_to_qualified_cooperative_payments)
          )

  - name: trade_or_business_deductible_amount
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 199A(b)(2), (b)(3), (b)(7)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/199A
              excerpt: "the amount determined under this paragraph ... the lesser of ... Modifications to limit based on taxable income ... Special rule with respect to income received from cooperatives"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          max(
              0,
              (
                  if taxable_income_computed_without_section_199A <= threshold_amount:
                      trade_or_business_qbi_amount_before_limits
                  else:
                      if taxable_income_computed_without_section_199A <= threshold_amount + qbi_phasein_range:
                          trade_or_business_qbi_amount_before_limits - trade_or_business_phasein_reduction
                      else:
                          min(trade_or_business_qbi_amount_before_limits, trade_or_business_wage_property_limit)
              )
              - cooperative_reduction
          )

  - name: qualified_reit_and_ptp_component
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 199A(b)(1)(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/199A
              excerpt: "20 percent of the aggregate amount of the qualified REIT dividends and qualified publicly traded partnership income"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          qbi_deduction_rate * (qualified_reit_dividends + qualified_publicly_traded_partnership_income)

  - name: combined_qualified_business_income_amount
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 199A(b)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/199A
              excerpt: "the sum of the amounts determined under paragraph (2) ... plus ... qualified REIT dividends and qualified publicly traded partnership income"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          trade_or_business_deductible_amount + qualified_reit_and_ptp_component

  - name: qbi_taxable_income_limit
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 199A(a)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/199A
              excerpt: "20 percent of the excess (if any) of— (A) the taxable income ... over (B) the net capital gain"
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/26/1/h#net_capital_gain
              output: net_capital_gain
              hash: sha256:51290fac8ece62a820f0deddcbc0471467c13ee31b62b52b45c8798232b22357
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          qbi_deduction_rate * max(0, taxable_income_computed_without_section_199A - net_capital_gain)

  - name: qbi_deduction_before_minimum_active_qbi
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 199A(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/26/199A
              excerpt: "In the case of a taxpayer other than a corporation"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/199A
              excerpt: "there shall be allowed as a deduction ... the lesser of— (1) the combined qualified business income amount ... or (2) ..."
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          if taxpayer_is_corporation:
              0
          else:
              max(0, min(combined_qualified_business_income_amount, qbi_taxable_income_limit))

  - name: active_qbi_minimum_threshold
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 199A(i)(2)-(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/199A
              excerpt: "the $1,000 amount ... shall each be increased ... rounded to the nearest multiple of $5"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          active_qbi_minimum_threshold_base
          + floor(((active_qbi_minimum_threshold_base * minimum_deduction_cost_of_living_adjustment) / minimum_deduction_rounding_multiple) + 0.5) * minimum_deduction_rounding_multiple

  - name: minimum_active_qbi_deduction_amount
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 199A(i)(1), (i)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/199A
              excerpt: "the $400 amount ... shall each be increased ... rounded to the nearest multiple of $5"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          minimum_active_qbi_deduction_base
          + floor(((minimum_active_qbi_deduction_base * minimum_deduction_cost_of_living_adjustment) / minimum_deduction_rounding_multiple) + 0.5) * minimum_deduction_rounding_multiple

  - name: applicable_taxpayer_for_minimum_active_qbi_deduction
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: 26 USC 199A(i)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/26/199A
              excerpt: "aggregate qualified business income with respect to all active qualified trades or businesses ... is at least $1,000"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          aggregate_qualified_business_income_from_active_qualified_trades_or_businesses >= active_qbi_minimum_threshold

  - name: qualified_business_income_deduction
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 199A(a), (i)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/199A
              excerpt: "deduction allowed under subsection (a) ... equal to the greater of— (A) the amount ... determined without regard to this subsection, or (B) $400"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          if applicable_taxpayer_for_minimum_active_qbi_deduction:
              max(qbi_deduction_before_minimum_active_qbi, minimum_active_qbi_deduction_amount)
          else:
              qbi_deduction_before_minimum_active_qbi

  - name: cooperative_production_deduction_before_wage_limit
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 199A(g)(1)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/199A
              excerpt: "9 percent of the lesser of— (i) the qualified production activities income ... or (ii) the taxable income"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          cooperative_reduction_rate * min(max(0, qualified_production_activities_income), max(0, taxable_income_computed_without_section_199A))

  - name: cooperative_production_deduction
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 199A(g)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/199A
              excerpt: "shall not exceed 50 percent of the W–2 wages of the taxpayer"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          if taxpayer_is_specified_agricultural_or_horticultural_cooperative:
              min(cooperative_production_deduction_before_wage_limit, wage_limit_rate * max(0, cooperative_w2_wages))
          else:
              0
