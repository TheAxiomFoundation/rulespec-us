  summary: |-
    (m) Service in the uniformed services For purposes of this chapter— (1) Inclusion of service The term “employment” shall, notwithstanding the provisions of subsection (b) of this section, include— (A) service performed by an individual as a member of a uniformed service on active duty, but such term shall not include any such service which is performed while on leave without pay, and (B) service performed by an individual as a member of a uniformed service on inactive duty training. (2) Active duty The term “active duty” means “active duty” as described in paragraph (21) of section 101 of title 38 , United States Code, except that it shall also include “active duty for training” as described in paragraph (22) of such section. (3) Inactive duty training The term “inactive duty training” means “inactive duty training” as described in paragraph (23) of such section 101.
  deferred_outputs:
    - output: us:statutes/26/3121/m#uniformed_services_service_included_in_employment
      reason: The inclusion rule depends on the source-defined meanings of “active duty” and “inactive duty training,” which are defined by cross-reference to paragraphs (21), (22), and (23) of section 101 of title 38, United States Code. No copied RuleSpec source provides those upstream definitions, and the cited definitions are essential same-meaning dependencies for this surface.
    - output: us:statutes/26/3121/m#active_duty_for_chapter
      reason: The source defines “active duty” by reference to “active duty” described in paragraph (21) of section 101 of title 38, United States Code, and additionally includes “active duty for training” described in paragraph (22) of that section. No copied RuleSpec source provides those upstream definitions.
