format: rulespec/v1
imports:
  - us:statutes/26/3121/r#election_of_coverage_in_effect
  - us:statutes/26/3121/r
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/26/3121
  summary: |-
    (8)(A) service performed by a duly ordained, commissioned, or licensed minister of a church in the exercise of his ministry or by a member of a religious order in the exercise of duties required by such order, except where an election of coverage under subsection (r) is in effect with respect to such order or autonomous subdivision; (B) service in the employ of a church or qualified church-controlled organization with an election under subsection (w), other than service in an unrelated trade or business within the meaning of section 513(a).
  deferred_outputs:
    - output: us:statutes/26/3121/b/8#church_election_service_excluded_from_employment
      reason: The subparagraph (B) exclusion depends on whether the service is in an unrelated trade or business within the meaning of section 513(a), and no copied RuleSpec context provides the needed section 513(a) definition.
