format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/26/3121
  summary: |-
    (1) in the case of the taxes imposed by sections 3101(a) and 3111(a) that part of the remuneration which, after remuneration (other than remuneration referred to in the succeeding paragraphs of this subsection) equal to the contribution and benefit base (as determined under section 230 of the Social Security Act) with respect to employment has been paid to an individual by an employer during the calendar year with respect to which such contribution and benefit base is effective, is paid to such individual by such employer during such calendar year. If an employer (hereinafter referred to as successor employer) during any calendar year acquires substantially all the property used in a trade or business of another employer (hereinafter referred to as a predecessor), or used in a separate unit of a trade or business of a predecessor, and immediately after the acquisition employs in his trade or business an individual who immediately prior to the acquisition was employed in the trade or business of such predecessor, then, for the purpose of determining whether the successor employer has paid remuneration (other than remuneration referred to in the succeeding paragraphs of this subsection) with respect to employment equal to the contribution and benefit base (as determined under section 230 of the Social Security Act) to such individual during such calendar year, any remuneration (other than remuneration referred to in the succeeding paragraphs of this subsection) with respect to employment paid (or considered under this paragraph as having been paid) to such individual by such predecessor during such calendar year and prior to such acquisition shall be considered as having been paid by such successor employer;
rules:
  - name: successor_employer_base_continuity_applies
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Year
    source: 26 USC 3121(a)(1), second sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/26/3121
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          (successor_employer_acquired_substantially_all_trade_or_business_property_from_predecessor_during_calendar_year or successor_employer_acquired_substantially_all_property_used_in_separate_unit_of_predecessor_trade_or_business_during_calendar_year) and individual_employed_by_successor_immediately_after_acquisition and individual_employed_by_predecessor_immediately_before_acquisition
  - name: predecessor_remuneration_counted_for_successor_base
    kind: derived
    entity: Payment
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 3121(a)(1), second sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/3121
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/26/3121
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          if successor_employer_base_continuity_applies: predecessor_remuneration_other_than_succeeding_paragraphs_paid_or_considered_paid_to_individual_before_acquisition_during_calendar_year else: 0
  - name: remuneration_counted_toward_oasdi_base_before_payment
    kind: derived
    entity: Payment
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 3121(a)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/3121
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          remuneration_other_than_succeeding_paragraphs_paid_to_individual_by_employer_during_calendar_year_before_payment + predecessor_remuneration_counted_for_successor_base
  - name: remaining_oasdi_contribution_and_benefit_base_before_payment
    kind: derived
    entity: Payment
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 3121(a)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/3121
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/statute/26/3121
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          max(0, contribution_and_benefit_base_under_section_230_of_social_security_act - remuneration_counted_toward_oasdi_base_before_payment)
  - name: oasdi_wage_base_excess_excluded_remuneration
    kind: derived
    entity: Payment
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 3121(a)(1), first sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/26/3121
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/3121
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          max(0, remuneration_paid_to_individual_by_employer_with_respect_to_employment - remaining_oasdi_contribution_and_benefit_base_before_payment)
