format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/26/911
  summary: |-
    (6) Denial of double benefits No deduction or exclusion from gross income under this subtitle or credit against the tax imposed by this chapter (including any credit or deduction for the amount of taxes paid or accrued to a foreign country or possession of the United States) shall be allowed to the extent such deduction, exclusion, or credit is properly allocable to or chargeable against amounts excluded from gross income under subsection (a).
rules:
  - name: deduction_allowed_after_double_benefit_denial
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 911(d)(6)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/911
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/26/911
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          max(
              0,
              deduction_under_subtitle_before_section_911_double_benefit_denial
              - deduction_properly_allocable_or_chargeable_to_amounts_excluded_under_subsection_a
          )

  - name: exclusion_allowed_after_double_benefit_denial
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 911(d)(6)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/911
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/26/911
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          max(
              0,
              exclusion_from_gross_income_under_subtitle_before_section_911_double_benefit_denial
              - exclusion_properly_allocable_or_chargeable_to_amounts_excluded_under_subsection_a
