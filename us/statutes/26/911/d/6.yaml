    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/911
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/26/911
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          max(
              0,
              credit_against_chapter_tax_before_section_911_double_benefit_denial
              - credit_properly_allocable_or_chargeable_to_amounts_excluded_under_subsection_a
          )

  - name: section_911_disallowed_deductions_and_exclusions
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 911(d)(6)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/911
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/26/911
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          min(
              deduction_under_subtitle_before_section_911_double_benefit_denial,
              deduction_properly_allocable_or_chargeable_to_amounts_excluded_under_subsection_a
