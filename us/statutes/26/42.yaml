format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/26/42
  summary: Section 42 determines the low-income housing credit as the applicable percentage
    of the qualified basis of each qualified low-income building. The section defines
    applicable percentages, qualified and eligible basis, rehabilitation expenditures,
    credit periods, qualified low-income housing projects, State credit ceilings,
    at-risk rules, certification duties, and housing credit agency responsibilities.
  deferred_outputs:
  - output: us:statutes/26/42/l#certifications_and_reports_to_secretary
    reason: Administrative reporting and certification obligations require Secretary-prescribed
      time, form, manner, and penalty rules not represented as an executable tax amount
      in this artifact.
  - output: us:statutes/26/42/m#housing_credit_agency_responsibilities
    reason: Qualified allocation plan, market study, feasibility, and agency monitoring
      duties are administrative process requirements rather than a computable taxpayer
      amount without housing agency allocation data and procedures.
rules:
- name: new_non_federally_subsidized_building_minimum_applicable_percentage
  kind: parameter
  dtype: Rate
  source: 26 USC 42(b)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us/statute/26/42
          excerpt: the applicable percentage shall not be less than 9 percent
  versions:
  - effective_from: '2024-01-01'
    formula: '0.09'
- name: other_building_minimum_applicable_percentage
  kind: parameter
  dtype: Rate
  source: 26 USC 42(b)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us/statute/26/42
          excerpt: the applicable percentage shall not be less than 4 percent
  versions:
  - effective_from: '2024-01-01'
    formula: '0.04'
- name: supportive_services_qualified_basis_increase_cap_rate
  kind: parameter
  dtype: Rate
  source: 26 USC 42(c)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us/statute/26/42
          excerpt: 20 percent of the qualified basis of such building
  versions:
  - effective_from: '2024-01-01'
    formula: '0.20'
- name: supportive_services_qualified_basis_increase
  kind: derived
  entity: Building
  dtype: Money
  period: Year
  unit: USD
  source: 26 USC 42(c)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us/statute/26/42
          excerpt: shall be increased by the lesser of
      - path: versions[0].formula
        kind: import
        import:
          target: us:statutes/26/42#supportive_services_qualified_basis_increase_cap_rate
          output: supportive_services_qualified_basis_increase_cap_rate
          hash: sha256:local
  versions:
  - effective_from: '2024-01-01'
    formula: 'if qualified_low_income_building_described_in_subsection_i_3_B_iii:
      min(eligible_basis_used_throughout_year_to_provide_supportive_services, supportive_services_qualified_basis_increase_cap_rate
      * qualified_basis_determined_without_supportive_services_increase) else: 0'
- name: high_cost_area_eligible_basis_multiplier
  kind: parameter
  dtype: Decimal
  source: 26 USC 42(d)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us/statute/26/42
          excerpt: the eligible basis of such building shall be 130 percent
  versions:
  - effective_from: '2024-01-01'
    formula: '1.30'
- name: high_cost_area_new_building_eligible_basis
  kind: derived
  entity: Building
  dtype: Money
  period: Year
  unit: USD
  source: 26 USC 42(d)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us/statute/26/42
          excerpt: In the case of any building located in a qualified census tract
            or difficult development area
      - path: versions[0].formula
        kind: import
        import:
          target: us:statutes/26/42#high_cost_area_eligible_basis_multiplier
          output: high_cost_area_eligible_basis_multiplier
          hash: sha256:local
  versions:
  - effective_from: '2024-01-01'
    formula: 'if new_building_located_in_designated_qualified_census_tract_or_difficult_development_area:
      high_cost_area_eligible_basis_multiplier * eligible_basis_determined_without_high_cost_area_increase
      else: eligible_basis_determined_without_high_cost_area_increase'
- name: rehabilitation_minimum_adjusted_basis_rate
  kind: parameter
  dtype: Rate
  source: 26 USC 42(e)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us/statute/26/42
          excerpt: not less than 20 percent of the adjusted basis
  versions:
  - effective_from: '2024-01-01'
    formula: '0.20'
- name: rehabilitation_expenditures_meet_adjusted_basis_minimum
  kind: derived
  entity: Building
  dtype: Judgment
  period: Year
  source: 26 USC 42(e)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us/statute/26/42
          excerpt: "The requirement of this subclause is met if such amount is not less than 20 percent of the adjusted basis of the building (determined as of the 1st day of such period and without regard to paragraphs (2) and (3) of section 1016(a))."
      - path: versions[0].formula
        kind: import
        import:
          target: us:statutes/26/42#rehabilitation_minimum_adjusted_basis_rate
          output: rehabilitation_minimum_adjusted_basis_rate
          hash: sha256:local
  versions:
  - effective_from: '2024-01-01'
    formula: rehabilitation_expenditures_during_eligible_period >= rehabilitation_minimum_adjusted_basis_rate
      * adjusted_basis_at_start_of_rehabilitation_period
- name: first_year_credit_period_months_denominator
  kind: parameter
