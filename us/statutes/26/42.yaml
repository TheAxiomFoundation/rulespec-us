- name: first_year_applicable_fraction
  kind: derived
  entity: Building
  dtype: Rate
  period: Year
  source: 26 USC 42(f)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us/statute/26/42
          excerpt: "the numerator of which is the sum of the applicable fractions determined under subsection (c)(1) as of the close of each full month"
      - path: versions[0].formula
        kind: import
        import:
          target: us:statutes/26/42#first_year_credit_period_months_denominator
          output: first_year_credit_period_months_denominator
          hash: sha256:local
  versions:
  - effective_from: '2024-01-01'
