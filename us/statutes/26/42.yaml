- name: project_meets_twenty_fifty_test
  kind: derived
  entity: Project
  dtype: Judgment
  period: Year
  source: 26 USC 42(g)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us/statute/26/42
          excerpt: 20 percent or more of the residential units in such project are
            both rent-restricted and occupied
      - path: versions[0].formula
        kind: import
        import:
          target: us:statutes/26/42#twenty_fifty_test_minimum_unit_rate
          output: twenty_fifty_test_minimum_unit_rate
          hash: sha256:local
  versions:
