format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/26/62
  deferred_outputs:
  - output: us:statutes/26/62/a#deductions_described_in_subsection_a
    reason: Subsection (a) enumerates above-the-line deductions by reference to many
      other Code sections and legal classifications, including sections 161, 162,
      165, 167, 194, 212, 217, 220, 404, 611, 7623(b), and other external sources
      not provided as executable RuleSpec context. The adjusted gross income arithmetic
      is encoded from a resolved aggregate deduction amount, while the full composition
      of that aggregate is deferred.
  - output: us:statutes/26/62/c#reimbursement_or_other_expense_allowance_arrangement
    reason: Subsection (c) modifies subsection (a)(2)(A) by cross-reference to section
      274(d) substantiation regulations, which are not provided as executable RuleSpec
      context.
  - output: us:statutes/26/62/b#qualified_performing_artist
    reason: Generated rule treated a filing-status or marital-status legal classification
      as a local fact. This output is deferred until the upstream status source can
      be encoded or imported without inventing local tax-status component inputs.
  summary: '26 USC 62(a) defines adjusted gross income for an individual as gross
    income

    minus specified deductions. Subsection (b) defines a qualified performing

    artist using at least 2 employers, a 10 percent expense test, a $16,000 AGI

    ceiling, and a $200 nominal-employer rule, with special married-couple rules.

    Subsection (d) defines eligible educator and the educator-expense cap and

    inflation adjustment. Subsection (e) defines unlawful discrimination by listed

    laws and civil-rights/employment claims for purposes of subsection (a)(20).'
rules:
- name: adjusted_gross_income
  kind: derived
  entity: TaxUnit
  dtype: Money
  period: Year
  unit: USD
  source: 26 USC 62(a)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us/statute/26/62
          excerpt: adjusted gross income means ... gross income minus the following
            deductions
  versions:
  - effective_from: '1990-01-01'
    formula: max(0, gross_income - deductions_described_in_subsection_a)
- name: qualified_performing_artist_minimum_employer_count
  kind: parameter
  dtype: Count
  source: 26 USC 62(b)(1)(A)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us/statute/26/62
          excerpt: for at least 2 employers
  versions:
  - effective_from: '1990-01-01'
    formula: '2'
- name: qualified_performing_artist_expense_gross_income_rate
  kind: parameter
  dtype: Rate
  source: 26 USC 62(b)(1)(B)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us/statute/26/62
          excerpt: "exceeds 10 percent of such individual\u2019s gross income"
  versions:
  - effective_from: '1990-01-01'
    formula: '0.10'
- name: qualified_performing_artist_agi_limit
  kind: parameter
  dtype: Money
  unit: USD
  source: 26 USC 62(b)(1)(C)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us/statute/26/62
          excerpt: does not exceed $16,000
  versions:
  - effective_from: '1990-01-01'
    formula: '16000'
- name: qualified_performing_artist_nominal_employer_receipts_floor
  kind: parameter
  dtype: Money
  unit: USD
  source: 26 USC 62(b)(2)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us/statute/26/62
          excerpt: from such employer ... equals or exceeds $200
  versions:
  - effective_from: '1990-01-01'
    formula: '200'
- name: eligible_educator_minimum_school_hours
  kind: parameter
  dtype: Count
  source: 26 USC 62(d)(1)(A)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us/statute/26/62
          excerpt: for at least 900 hours during a school year
  versions:
  - effective_from: '1990-01-01'
    formula: '900'
- name: eligible_educator_expense_base_cap
  kind: parameter
  dtype: Money
  unit: USD
  source: 26 USC 62(a)(2)(D), 26 USC 62(d)(3)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us/statute/26/62
          excerpt: expenses, not in excess of $250
  versions:
  - effective_from: '1990-01-01'
    formula: '250'
- name: eligible_educator_expense_cap_rounding_multiple
  kind: parameter
  dtype: Money
  unit: USD
  source: 26 USC 62(d)(3)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us/statute/26/62
          excerpt: rounded to the nearest multiple of $50
  versions:
  - effective_from: '1990-01-01'
    formula: '50'
- name: eligible_educator
  kind: derived
  entity: Person
  dtype: Judgment
  period: Year
  source: 26 USC 62(d)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: definition
        source:
          corpus_citation_path: us/statute/26/62
          excerpt: eligible educator means ... a kindergarten through grade 12 teacher,
            instructor, counselor, principal, or aide in a school for at least 900
            hours
      - path: versions[0].formula
        kind: import
        import:
          target: us:statutes/26/62#eligible_educator_minimum_school_hours
          output: eligible_educator_minimum_school_hours
          hash: sha256:local
  versions:
  - effective_from: '1990-01-01'
    formula: 'individual_is_kindergarten_through_grade_12_teacher_instructor_counselor_principal_or_aide

      and individual_serves_in_school

      and hours_in_school_during_school_year >= eligible_educator_minimum_school_hours'
- name: eligible_educator_expense_cap_after_inflation_adjustment
  kind: derived
  entity: Person
  dtype: Money
  period: Year
  unit: USD
  source: 26 USC 62(d)(3)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us/statute/26/62
          excerpt: $250 amount ... increased ... by the cost-of-living adjustment
            ... rounded to the nearest multiple of $50
      - path: versions[0].formula
        kind: import
        import:
          target: us:statutes/26/62#eligible_educator_expense_base_cap
          output: eligible_educator_expense_base_cap
          hash: sha256:local
      - path: versions[0].formula
        kind: import
        import:
          target: us:statutes/26/62#eligible_educator_expense_cap_rounding_multiple
          output: eligible_educator_expense_cap_rounding_multiple
          hash: sha256:local
  versions:
  - effective_from: '1990-01-01'
    formula: "eligible_educator_expense_base_cap\n+ (\n    floor(\n        (\n   \
      \         (eligible_educator_expense_base_cap * cost_of_living_adjustment_for_eligible_educator_expense_cap)\n\
      \            / eligible_educator_expense_cap_rounding_multiple\n        )\n\
      \        + (1 / 2)\n    )\n    * eligible_educator_expense_cap_rounding_multiple\n\
      )"
- name: eligible_educator_expenses_allowable_above_the_line
  kind: derived
  entity: Person
  dtype: Money
  period: Year
  unit: USD
  source: 26 USC 62(a)(2)(D), 26 USC 62(d)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us/statute/26/62
          excerpt: A deduction shall be allowed ... only to the extent the amount
            of such expenses exceeds the amount excludable under section 135, 529(c)(1),
            or 530(d)(2)
      - path: versions[0].formula
        kind: import
        import:
          target: us:statutes/26/62#eligible_educator
          output: eligible_educator
          hash: sha256:local
      - path: versions[0].formula
        kind: import
        import:
          target: us:statutes/26/62#eligible_educator_expense_cap_after_inflation_adjustment
          output: eligible_educator_expense_cap_after_inflation_adjustment
          hash: sha256:local
  versions:
  - effective_from: '1990-01-01'
    formula: 'if eligible_educator: min( max(0, eligible_educator_expenses - education_exclusions_coordination_amount),
      eligible_educator_expense_cap_after_inflation_adjustment ) else: 0'
- name: unlawful_discrimination
  kind: derived
  entity: Claim
  dtype: Judgment
  period: Year
  source: 26 USC 62(e)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: definition
        source:
          corpus_citation_path: us/statute/26/62
          excerpt: "the term \u201Cunlawful discrimination\u201D means an act that\
            \ is unlawful under any of the following"
  versions:
  - effective_from: '1990-01-01'
    formula: 'act_unlawful_under_civil_rights_act_of_1991_section_302

      or act_unlawful_under_congressional_accountability_act_listed_sections

      or act_unlawful_under_national_labor_relations_act

      or act_unlawful_under_fair_labor_standards_act

      or act_unlawful_under_age_discrimination_in_employment_act_listed_sections

      or act_unlawful_under_rehabilitation_act_listed_sections

      or act_unlawful_under_erisa_section_510

      or act_unlawful_under_title_ix_of_education_amendments

      or act_unlawful_under_employee_polygraph_protection_act

      or act_unlawful_under_worker_adjustment_and_retraining_notification_act

      or act_unlawful_under_family_and_medical_leave_act_section_105

      or act_unlawful_under_title_38_chapter_43_uniformed_services_employment_rights

      or act_unlawful_under_revised_statutes_sections_1977_1979_or_1980

      or act_unlawful_under_civil_rights_act_of_1964_listed_sections

      or act_unlawful_under_fair_housing_act_listed_sections

      or act_unlawful_under_americans_with_disabilities_act_listed_sections

      or act_unlawful_under_federal_whistleblower_protection_provision

      or act_unlawful_under_federal_state_or_local_civil_rights_or_employment_law'
