- name: applicable taxpayer ratio met during temporary upper-limit disregard
  period:
    period_kind: tax_year
    start: '2024-01-01'
    end: '2024-12-31'
  input:
    us:statutes/26/36B#input.applicable_taxpayer_household_income_as_ratio_of_poverty_line: 4.5
    us:statutes/26/36B#input.taxable_year_is_in_temporary_applicable_taxpayer_upper_limit_disregard_period: true
    us:statutes/26/36B#input.individuals_for_whom_taxpayer_is_allowed_section_151_deduction_count: 2
  output:
    us:statutes/26/36B#applicable_taxpayer_income_percentage_test_met: holds
    us:statutes/26/36B#family_size: 2
- name: applicable taxpayer ratio fails above maximum outside temporary period
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    us:statutes/26/36B#input.applicable_taxpayer_household_income_as_ratio_of_poverty_line: 4.5
    us:statutes/26/36B#input.taxable_year_is_in_temporary_applicable_taxpayer_upper_limit_disregard_period: false
    us:statutes/26/36B#input.individuals_for_whom_taxpayer_is_allowed_section_151_deduction_count: 1
  output:
    us:statutes/26/36B#applicable_taxpayer_income_percentage_test_met: not_holds
    us:statutes/26/36B#family_size: 1
- name: applicable taxpayer ratio fails below minimum
  period:
    period_kind: tax_year
    start: '2024-01-01'
    end: '2024-12-31'
  input:
    us:statutes/26/36B#input.applicable_taxpayer_household_income_as_ratio_of_poverty_line: 0.9
    us:statutes/26/36B#input.taxable_year_is_in_temporary_applicable_taxpayer_upper_limit_disregard_period: true
    us:statutes/26/36B#input.individuals_for_whom_taxpayer_is_allowed_section_151_deduction_count: 3
  output:
    us:statutes/26/36B#applicable_taxpayer_income_percentage_test_met: not_holds
    us:statutes/26/36B#family_size: 3
