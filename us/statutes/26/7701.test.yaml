- name: motor_vehicle_agreement_qualifies_and_is_treated_as_lease
  period:
    period_kind: tax_year
    start: '2024-01-01'
    end: '2024-12-31'
  input:
    us:statutes/26/7701#input.agreement_is_with_respect_to_motor_vehicle_including_trailer: true
    ? us:statutes/26/7701#input.lessor_personal_liability_plus_eligible_pledged_property_value_equals_or_exceeds_acquisition_financing
    : true
    us:statutes/26/7701#input.lessee_separately_signed_perjury_certification_of_trade_or_business_use_fraction: 0.6
    us:statutes/26/7701#input.lessee_separately_signed_notice_that_lessee_will_not_be_treated_as_owner_for_federal_income_tax: true
    us:statutes/26/7701#input.lessor_knows_certification_is_false: false
    us:statutes/26/7701#input.agreement_contains_terminal_rental_adjustment_clause: true
    us:statutes/26/7701#input.agreement_would_be_treated_as_lease_but_for_terminal_rental_adjustment_clause: true
  output:
    us:statutes/26/7701#qualified_motor_vehicle_operating_agreement: holds
    us:statutes/26/7701#motor_vehicle_agreement_treated_as_lease: holds
    us:statutes/26/7701#lessee_not_owner_during_motor_vehicle_operating_agreement: holds
- name: motor_vehicle_false_certification_blocks_qualified_agreement
  period:
    period_kind: tax_year
    start: '2024-01-01'
    end: '2024-12-31'
  input:
    us:statutes/26/7701#input.agreement_is_with_respect_to_motor_vehicle_including_trailer: true
    ? us:statutes/26/7701#input.lessor_personal_liability_plus_eligible_pledged_property_value_equals_or_exceeds_acquisition_financing
    : true
    us:statutes/26/7701#input.lessee_separately_signed_perjury_certification_of_trade_or_business_use_fraction: 0.6
    us:statutes/26/7701#input.lessee_separately_signed_notice_that_lessee_will_not_be_treated_as_owner_for_federal_income_tax: true
    us:statutes/26/7701#input.lessor_knows_certification_is_false: true
    us:statutes/26/7701#input.agreement_contains_terminal_rental_adjustment_clause: true
    us:statutes/26/7701#input.agreement_would_be_treated_as_lease_but_for_terminal_rental_adjustment_clause: true
  output:
    us:statutes/26/7701#qualified_motor_vehicle_operating_agreement: not_holds
    us:statutes/26/7701#motor_vehicle_agreement_treated_as_lease: not_holds
    us:statutes/26/7701#lessee_not_owner_during_motor_vehicle_operating_agreement: not_holds
- name: transaction_has_economic_substance_and_profit_potential_counts
  period:
    period_kind: tax_year
    start: '2024-01-01'
    end: '2024-12-31'
  input:
    us:statutes/26/7701#input.economic_substance_doctrine_is_relevant_to_transaction: true
    ? us:statutes/26/7701#input.transaction_changes_taxpayer_economic_position_meaningfully_apart_from_federal_income_tax_effects
    : true
    us:statutes/26/7701#input.taxpayer_has_substantial_non_federal_income_tax_purpose_for_transaction: true
    us:statutes/26/7701#input.transaction_relies_on_profit_potential_for_economic_substance: true
    ? us:statutes/26/7701#input.present_value_of_reasonably_expected_pretax_profit_is_substantial_in_relation_to_expected_net_tax_benefits
    : true
  output:
    us:statutes/26/7701#transaction_has_economic_substance: holds
    us:statutes/26/7701#profit_potential_taken_into_account_for_economic_substance: holds
- name: transaction_lacks_substantial_non_tax_purpose
  period:
    period_kind: tax_year
    start: '2024-01-01'
    end: '2024-12-31'
  input:
    us:statutes/26/7701#input.economic_substance_doctrine_is_relevant_to_transaction: true
    ? us:statutes/26/7701#input.transaction_changes_taxpayer_economic_position_meaningfully_apart_from_federal_income_tax_effects
    : true
    us:statutes/26/7701#input.taxpayer_has_substantial_non_federal_income_tax_purpose_for_transaction: false
    us:statutes/26/7701#input.transaction_relies_on_profit_potential_for_economic_substance: true
    ? us:statutes/26/7701#input.present_value_of_reasonably_expected_pretax_profit_is_substantial_in_relation_to_expected_net_tax_benefits
    : false
  output:
    us:statutes/26/7701#transaction_has_economic_substance: not_holds
    us:statutes/26/7701#profit_potential_taken_into_account_for_economic_substance: not_holds
