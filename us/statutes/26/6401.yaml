format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/26/6401
  deferred_outputs:
    - output: us:statutes/26/6401#nonresident_withholding_credit_treated_as_refundable_credit
      blocked_by:
        - us:statutes/26/33#nonresident_withholding_credit
        - us:statutes/26/6013/g#election
        - us:statutes/26/6013/h#election
        - us:statutes/26/1446#partnership_withholding_credit
      reason: >-
        Paragraph (b)(2) depends on the amount of the section 33 credit and on
        elections under section 6013(g) or (h), with an exception for credits
        allowed by reason of section 1446. Those upstream provisions are not
        encoded yet, so this module keeps the necessary facts as external inputs
        until they are available as RuleSpec outputs.
      source_values:
        - us:statutes/26/6401#nonresident_withholding_credit_treated_as_refundable_amount
  summary: |-
    (a) Assessment and collection after limitation period. The term “overpayment” includes that part of the amount of the payment of any internal revenue tax which is assessed or collected after the expiration of the period of limitation properly applicable thereto.

    (b) Excessive credits (1) In general If the amount allowable as credits under subpart C of part IV of subchapter A of chapter 1 (relating to refundable credits) exceeds the tax imposed by subtitle A (reduced by the credits allowable under subparts A, B, D, and G of such part IV), the amount of such excess shall be considered an overpayment. (2) Special rule for credit under section 33 For purposes of paragraph (1), any credit allowed under section 33 (relating to withholding of tax on nonresident aliens and on foreign corporations) for any taxable year shall be treated as a credit allowable under subpart C of part IV of subchapter A of chapter 1 only if an election under subsection (g) or (h) of section 6013 is in effect for such taxable year. The preceding sentence shall not apply to any credit so allowed by reason of section 1446.

    (c) Rule where no tax liability An amount paid as tax shall not be considered not to constitute an overpayment solely by reason of the fact that there was no tax liability in respect of which such amount was paid.
rules:
  - name: limitation_period_overpayment_part
    kind: derived
    entity: Payment
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 6401(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/statute/26/6401
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/26/6401
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/6401
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          if internal_revenue_tax_payment_assessed_or_collected_after_applicable_limitation_period_expired:
              amount_of_internal_revenue_tax_payment_assessed_or_collected_after_limitation_period
          else:
              0

  - name: nonresident_withholding_credit_treated_as_refundable_credit
    kind: derived
