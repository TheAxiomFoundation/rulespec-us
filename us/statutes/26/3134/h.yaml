  deferred_outputs:
    - output: us:statutes/26/3134/h#qualified_wages_after_coordination_with_certain_programs
      reason: >-
        Subsection (h) excludes qualified wages taken into account as payroll
        costs for covered loans, section 324 grants, and section 5003 restaurant
        revitalization grants, and then restores PPP payroll costs to the extent
        covered loans are not forgiven by decisions under section 7(a)(37)(J) or
        section 7A(g) of the Small Business Act. The covered-loan,
        covered-period, forgiveness-decision, and same-meaning terms under those
        cited Small Business Act provisions are not available as executable
        RuleSpec dependencies.
    - output: us:statutes/26/3134/h#payroll_costs_not_disqualified_as_qualified_wages_for_unforgiven_ppp_loans
      reason: >-
        Paragraph (2) depends on whether a covered loan under section 7(a)(37)
        or section 7A of the Small Business Act is not forgiven by reason of a
        decision under section 7(a)(37)(J) or section 7A(g), and also imports
        the meaning of terms used in those cited provisions. Those upstream
        legal dependencies are not present in the copied RuleSpec context.
  summary: |-
    "(h) Coordination with certain programs" provides that this section "shall not apply to so much of the qualified wages paid by an eligible employer as are taken into account as payroll costs" for listed covered loans and grants, and requires guidance that payroll costs "shall not fail to be treated as qualified wages" to the extent specified PPP loans are not forgiven.
