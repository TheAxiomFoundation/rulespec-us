    - output: us:statutes/26/45A#indian_employment_credit
      reason: >-
        The whole-section Indian employment credit requires coordinated effects
        from section 38, section 51 wage coordination, section 52 controlled
        group rules, section 39 carrybacks and carryovers, section 381(a)
        transaction treatment, and subsection (d) early-termination recapture.
        Those upstream computations are not available as executable RuleSpec
        dependencies in the copied context.
    - output: us:statutes/26/45A/b#qualified_wages_and_health_costs_taken_into_account
      reason: >-
        Subsection (b) defines qualified wages and qualified employee health
        insurance costs, applies a $20,000 per-employee cap, and excludes wages
        during work-opportunity-credit coordination periods determined by
        section 51 and section 51(e)(1)(A). The section 51 wage-coordination
        mechanics are not available as executable RuleSpec dependencies here.
    - output: us:statutes/26/45A/c#qualified_employee
      reason: >-
        Subsection (c) defines qualified employee status using Indian tribe and
        reservation definitions, an inflation-adjusted wage limit determined in
        the same manner as section 415(d), exclusions for individuals described
        in section 51(i)(1), 5-percent-owner status under section
        416(i)(1)(B), and Indian Gaming Regulatory Act gaming categories. Those
        cross-referenced legal definitions and adjustment mechanics are not
        fully available as executable RuleSpec dependencies here.
  summary: |-
    Section 45A provides an Indian employment credit equal to 20 percent of the excess of current-year qualified wages and qualified employee health insurance costs over comparable 1993 costs. Subsection (b) defines qualified wages and health insurance costs, coordinates with section 51, and caps the aggregate per employee at $20,000. Subsection (c) defines qualified employee status, including reservation, wage-limit, trade-or-business, owner, section 51(i)(1), and gaming exclusions. Subsections (d), (e), and (f) add early-termination recapture, controlled-group and short-year rules, and termination for taxable years beginning after December 31, 2021.
