    unit: USD
    source: 26 USC 163(h)(4)(C)(i)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/163
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/26/163
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/26/163
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/26/163/h/4/C#qualified_passenger_vehicle_loan_interest_statutory_dollar_limit
              output: qualified_passenger_vehicle_loan_interest_statutory_dollar_limit
              hash: sha256:local
    versions:
