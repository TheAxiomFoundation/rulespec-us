  source_verification:
    corpus_citation_path: us/statute/26/163
  summary: |-
    (C) Limitations (i) Dollar limit The amount of interest taken into account by a taxpayer under subparagraph (B) for any taxable year shall not exceed $10,000. (ii) Limitation based on modified adjusted gross income
rules:
  - name: qualified_passenger_vehicle_loan_interest_statutory_dollar_limit
    kind: parameter
    dtype: Money
    unit: USD
    source: 26 USC 163(h)(4)(C)(i)
    metadata:
