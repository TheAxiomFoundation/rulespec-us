format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/26/163
  summary: |-
    (4) Special rules for taxable years 2025 through 2028 relating to qualified passenger vehicle loan interest (A) In general In the case of taxable years beginning after December 31, 2024 , and before January 1, 2029 , for purposes of this subsection the term “personal interest” shall not include qualified passenger vehicle loan interest. (B) Qualified passenger vehicle loan interest defined (i) In general For purposes of this paragraph, the term “qualified passenger vehicle loan interest” means any interest which is paid or accrued during the taxable year on indebtedness incurred by the taxpayer after December 31, 2024 , for the purchase of, and that is secured by a first lien on, an applicable passenger vehicle for personal use. (ii) Exceptions Such term shall not include any amount paid or incurred on any of the following: ... (IV) A loan to finance the purchase of a vehicle with a salvage title.
