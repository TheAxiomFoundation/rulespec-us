          excerpt: $500 with respect to each half kilowatt of capacity of the qualified
            fuel cell property
  versions:
  - effective_from: '2017-01-01'
    formula: '500'
- name: fuel_cell_joint_occupancy_max_expenditures_per_half_kilowatt
