format: rulespec/v1
module:
  summary: |-
    Internal Revenue Code section 55 imposes the alternative minimum tax. This
    encoding covers the noncorporate AMT income base, exemption and phaseout,
    lower and higher AMT rates, and the excess of tentative minimum tax over
    regular tax. The section 55(b)(3) capital-gain worksheet is represented as
    an upstream worksheet tax when that worksheet applies.
  source_verification:
    corpus_citation_path: us/statute/26/55
  values:
    amt_lower_rate: 0.26
    amt_higher_rate: 0.28
    amt_exemption_phaseout_rate: 0.50
imports:
  - us:policies/irs/rev-proc-2025-32/alternative-minimum-tax
rules:
  - name: amt_lower_rate
    kind: parameter
    dtype: Rate
    source: 26 USC 55(b)(1)(A)(i)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: custom
            source:
              corpus_citation_path: us/statute/26/56
    versions:
      - effective_from: '2026-01-01'
        formula: '0.26'
  - name: amt_higher_rate
    kind: parameter
    dtype: Rate
    source: 26 USC 55(b)(1)(A)(ii)
    versions:
      - effective_from: '2026-01-01'
        formula: '0.28'
  - name: amt_exemption_phaseout_rate
    kind: parameter
    dtype: Rate
    source: 26 USC 55(d)(4)(A)(ii)(IV)
    versions:
      - effective_from: '2026-01-01'
        formula: '0.50'
  - name: amt_excluded_deductions
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 55(b)(2)(D), 26 USC 56(b)(1)(D)
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          if tax_unit_itemizes:
              salt_deduction + misc_deduction
          else:
              standard_deduction
  - name: amt_separate_addition
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 55(d)(2), 55(d)(4)(A)(ii)(IV)
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          if filing_status == 2:
              min(
                  amt_exemption_base_amount,
                  amt_exemption_phaseout_rate
                  * max(
                      0,
                      taxable_income
                      + amt_excluded_deductions
                      - amt_exemption_complete_phaseout_separate
                  )
              )
          else:
              0
  - name: amt_income
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 55(b)(2)(D), 26 USC 56
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          taxable_income
          + amt_excluded_deductions
          + amt_separate_addition
          + exemptions
  - name: amt_exemption_phaseout
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 55(d)(2), 55(d)(4)
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          amt_exemption_phaseout_rate
          * max(0, amt_income - amt_exemption_phaseout_start)
  - name: amt_exemption_before_kiddie_tax_limit
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 55(d)
    versions:
      - effective_from: '2026-01-01'
        formula: max(0, amt_exemption_base_amount - amt_exemption_phaseout)
  - name: amt_kiddie_tax_exemption_limit
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 59(j), Rev. Proc. 2025-32 section 3.11
    versions:
      - effective_from: '2026-01-01'
        formula: filer_adjusted_earnings + amt_kiddie_tax_exemption_addition
  - name: amt_exemption
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 55(d), 26 USC 59(j)
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          if amt_kiddie_tax_applies:
              min(
                  amt_exemption_before_kiddie_tax_limit,
                  amt_kiddie_tax_exemption_limit
              )
          else:
              amt_exemption_before_kiddie_tax_limit
  - name: amt_income_for_exemption_offset
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 55(b)(1)(B), 26 USC 59(j)
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          if amt_kiddie_tax_applies:
              taxable_income
          else:
              amt_income
  - name: amt_income_less_exemptions
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 55(b)(1)(B), 55(d), 26 USC 59(j)
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          max(0, amt_income_for_exemption_offset - amt_exemption)
  - name: amt_lower_base_tax
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 55(b)(1)(A)(i)
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          amt_lower_rate
          * min(amt_income_less_exemptions, amt_twenty_eight_percent_threshold)
  - name: amt_higher_base_tax
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 55(b)(1)(A)(ii)
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          amt_higher_rate
          * max(
              0,
              amt_income_less_exemptions - amt_twenty_eight_percent_threshold
          )
  - name: amt_base_tax
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 55(b)(1)(A)
    versions:
      - effective_from: '2026-01-01'
        formula: amt_lower_base_tax + amt_higher_base_tax
  - name: amt_tax_before_foreign_tax_credit
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 55(b)(1)(A), 55(b)(3)
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          if amt_part_iii_required:
              min(amt_base_tax, amt_tax_including_capital_gains)
          else:
              amt_base_tax
  - name: alternative_minimum_tax
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 55(a), 55(b)(1)(A)
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          max(
              0,
              (
                  amt_tax_before_foreign_tax_credit
                  - alternative_minimum_tax_foreign_tax_credit
              )
              - max(
                  0,
                  regular_tax_before_credits
                  + capital_gains_tax
                  - alternative_minimum_tax_foreign_tax_credit
                  - form_4972_lumpsum_distributions
              )
          )
  - name: income_tax_before_credits
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 1 and 55(a)
    versions:
      - effective_from: '2026-01-01'
        formula: income_tax_main_rates + capital_gains_tax + alternative_minimum_tax
