- name: vehicle_satisfies_new_clean_vehicle_definition
  kind: derived
  entity: Asset
  dtype: Judgment
  period: Year
  source: 26 USC 30D(d)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: definition
        source:
          corpus_citation_path: us/statute/26/30D
      - path: versions[0].formula
        kind: condition
        source:
