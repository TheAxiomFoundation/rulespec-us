format: rulespec/v1
imports:
- us:statutes/26/911/a#section_911_amount_excluded_from_gross_income
- us:statutes/26/931#amount_excluded_from_gross_income_under_section_931
- us:statutes/26/933#income_excluded_from_gross_income_under_section_933
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/26/30D
  deferred_outputs:
  - output: us:statutes/26/30D/a#taxable_year_new_clean_vehicle_credit
    reason: Subsection (a) requires summing per-vehicle credit amounts for each new
      clean vehicle placed in service by the taxpayer during the taxable year. The
      available RuleSpec relation context warns that a taxpayer-to-vehicle relation
      with a raw per-vehicle money field is needed for a valid aggregate; no such
      clean relation is supplied here.
    source_values:
    - us:statutes/26/30D#critical_minerals_credit_amount
    - us:statutes/26/30D#battery_components_credit_amount
  - output: us:statutes/26/30D/c#business_credit_treated_as_general_business_credit
    reason: Subsection (c)(1) treats the depreciable-property portion as a section
      38(b) credit and not as allowed under subsection (a). No copied context provides
      section 38(b) or a depreciation allocation surface for this source.
  - output: us:statutes/26/30D/d#fuel_cell_motor_vehicle_included_in_new_clean_vehicle
    reason: Subsection (d)(6) incorporates the definition of new qualified fuel cell
      motor vehicle under section 30B(b)(3), which is not available as copied RuleSpec
      context.
  - output: us:statutes/26/30D/f#property_used_outside_united_states_credit_disallowance
    reason: Subsection (f)(4) disallows credit for property referred to in section
      50(b)(1). No copied context provides the section 50(b)(1) property classification.
  - output: us:statutes/26/30D/f#credit_denied_by_modified_adjusted_gross_income_limitation
    reason: Subsection (f)(10) requires threshold selection for joint return, surviving
      spouse under section 2(a), head of household under section 2(b), and other taxpayers.
      The copied section 2(a) and 2(b) contexts are deferred and provide no executable
      filing-status output.
    source_values:
    - us:statutes/26/30D#modified_adjusted_gross_income_joint_or_surviving_spouse_threshold
    - us:statutes/26/30D#modified_adjusted_gross_income_head_of_household_threshold
    - us:statutes/26/30D#modified_adjusted_gross_income_other_threshold
  - output: us:statutes/26/30D/g#dealer_advance_payment_excessive_payment_rules
    reason: Subsection (g)(7)(B) applies rules similar to section 6417(d)(6), which
      is not available as copied RuleSpec context.
  - output: us:statutes/26/30D/f#modified_adjusted_gross_income_head_of_household_threshold
    reason: Generated rule used a local name that collides with a sibling RuleSpec
      export. This output is deferred until it can be encoded with a semantic branch-specific
      name without creating ambiguous sibling imports.
  - output: us:statutes/26/30D/f#modified_adjusted_gross_income_joint_or_surviving_spouse_threshold
    reason: Generated rule used a local name that collides with a sibling RuleSpec
      export. This output is deferred until it can be encoded with a semantic branch-specific
      name without creating ambiguous sibling imports.
  summary: 'Section 30D allows a credit equal to the sum of per-vehicle amounts for
    each new clean vehicle

    placed in service. The per-vehicle amount is $3,750 for satisfying the critical-minerals

    requirement and $3,750 for satisfying the battery-components requirement. A new
    clean vehicle must

    satisfy original-use, acquisition, qualified-manufacturer, Clean Air Act motor-vehicle,
    weight,

    battery, final-assembly, and seller-report requirements, with additional excluded-entity
    rules.

    Special rules reduce basis and other deductions/credits, disallow credits for
    elected-out and

    certain ineligible vehicles, require one credit per VIN and VIN reporting, impose
    MAGI and MSRP

    limitations, and allow transfer of the credit to an eligible dealer. No credit
    is allowed for a

    vehicle acquired after September 30, 2025.'
