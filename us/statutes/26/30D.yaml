      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us/statute/26/30D
  versions:
  - effective_from: '2023-01-01'
    formula: 'original_use_of_vehicle_commences_with_taxpayer

      and vehicle_acquired_for_use_or_lease_by_taxpayer

      and not vehicle_acquired_for_resale

      and vehicle_made_by_qualified_manufacturer

      and vehicle_treated_as_motor_vehicle_for_clean_air_act_title_ii

      and gross_vehicle_weight_rating < new_clean_vehicle_gross_vehicle_weight_rating_limit

      and vehicle_propelled_to_significant_extent_by_electric_motor_drawing_electricity_from_battery

      and battery_capacity_kilowatt_hours >= new_clean_vehicle_battery_capacity_minimum_kilowatt_hours

      and battery_capable_of_recharge_from_external_electricity_source

      and final_assembly_occurs_within_north_america

      and seller_report_furnished_to_taxpayer_and_secretary

      and not vehicle_excluded_by_foreign_entity_of_concern_critical_minerals_rule

      and not vehicle_excluded_by_foreign_entity_of_concern_battery_components_rule'
