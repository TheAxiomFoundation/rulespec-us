format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/26/3504
  summary: |-
    The Secretary may designate a fiduciary, agent, or other person with control, receipt, custody, disposal, or payment of wages of employees employed by one or more employers to perform specified employer acts. Except as otherwise prescribed by the Secretary, employer-law provisions, including penalties, apply to the designated person, and the employer remains subject to those provisions except as so provided.
rules:
  - name: secretary_may_designate_wage_control_person_to_perform_employer_acts
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 26 USC 3504
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/26/3504
              excerpt: "a fiduciary, agent, or other person has the control, receipt, custody, or disposal of, or pays the wages"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/26/3504
              excerpt: "wages of an employee or group of employees, employed by one or more employers"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/3504
              excerpt: "the Secretary, under regulations prescribed by him, is authorized to designate"
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          person_is_fiduciary_agent_or_other_person
          and person_has_control_receipt_custody_disposal_or_pays_employee_wages
          and wages_are_of_employee_or_group_employed_by_one_or_more_employers
          and designation_is_under_secretary_regulations

  - name: designated_person_subject_to_employer_law_provisions
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 26 USC 3504
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/26/3504
              excerpt: "a fiduciary, agent, or other person so designated"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/3504
              excerpt: "all provisions of law (including penalties) applicable in respect of an employer shall be applicable"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/26/3504
              excerpt: "Except as may be otherwise prescribed by the Secretary"
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          person_is_designated_by_secretary_under_section_3504
          and not secretary_otherwise_prescribes_employer_law_provisions_not_applicable

  - name: employer_remains_subject_to_employer_law_provisions
    kind: derived
    entity: Employer
    dtype: Judgment
    period: Year
    source: 26 USC 3504
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/26/3504
              excerpt: "the employer for whom such fiduciary, agent, or other person acts"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/3504
              excerpt: "shall remain subject to the provisions of law (including penalties) applicable in respect of employers"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/26/3504
              excerpt: "except as so provided"
    versions:
      - effective_from: '1990-01-01'
        formula: |-
          designated_person_acts_for_employer
          and not secretary_provides_employer_not_subject_to_employer_law_provisions
