format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/12/1701s
  summary: The Secretary may make annual payments to housing owners on behalf of qualified
    tenants. Contracts may not exceed forty years; annual payment amounts are the
    lesser of 70 percent of fair market rent or fair market rent less 30 percent of
    tenant adjusted income. The section defines housing owner and qualified tenant,
    requires annual income recertification, limits certain project/payment categories,
    and establishes timing and application limits for certain State or local agency
    mortgage projects.
  deferred_outputs:
  - output: us:statutes/12/1701s/b#housing_owner
    reason: Definition depends on missing cited National Housing Act and other housing-program
      classifications, including section 221(d)(3), section 221(d)(5), section 231(c)(3),
      section 1701q, and section 236 mechanics not provided as RuleSpec context.
    source_values:
    - us:statutes/12/1701s/a#first_annual_payment_cap_increase
    - us:statutes/12/1701s/j#section_236_property_unit_payment_increased_cap
  - output: us:statutes/12/1701s/c#qualified_tenant
    reason: Definition depends on assistance qualification under 42 USC 1437f and
      pre-December 21, 1979 assistance conditions not available as RuleSpec context.
    source_values:
    - us:statutes/12/1701s/a#first_annual_payment_cap_increase
    - us:statutes/12/1701s/j#section_236_property_unit_payment_increased_cap
  - output: us:statutes/12/1701s/m#state_or_local_agency_mortgage_project_payments
    reason: Payment authority depends on project mortgagee application facts, letter-agreement
      authority balances, existing section 236 contract allocations, and appropriation
      approvals not represented as executable RuleSpec dependencies.
    source_values:
    - us:statutes/12/1701s/a#first_annual_payment_cap_increase
    - us:statutes/12/1701s/j#section_236_property_unit_payment_increased_cap
  - output: us:statutes/12/1701s/d#annual_payment_amount
    reason: Generated rule ignored a source-stated substitution, modification, or
      limitation parameter. This output is deferred until the upstream cross-referenced
      mechanics can be imported or composed without stranding the modifier.
    source_values:
    - us:statutes/12/1701s/g#contract_amendment_rent_increase_coverage_rate
    - us:statutes/12/1701s/a#first_annual_payment_cap_increase
    - us:statutes/12/1701s/j#section_236_property_unit_payment_increased_cap
