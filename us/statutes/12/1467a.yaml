format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/12/1467a
  summary: |-
    12 USC 1467a defines savings and loan holding company terms, acquisition restrictions, qualified thrift lender tests, mutual holding company rules, qualified stock issuance conditions, and penalties for late or inaccurate reports.
  deferred_outputs:
    - output: us:statutes/12/1467a/a#savings_and_loan_holding_company_definition
      reason: Definitions depend on unavailable upstream statutory definitions and same-section cross-references, including sections 1813, 1467b, and Bank Holding Company Act concepts.
    - output: us:statutes/12/1467a/e#acquisition_approval_required
      reason: Acquisition approval and exceptions depend on unavailable upstream definitions and cross-referenced acquisition authorities, including sections 1813, 1818, 408(m), and Bank Holding Company Act concepts.
    - output: us:statutes/12/1467a/l#state_savings_bank_deemed_savings_association
      reason: Treatment depends on unavailable definitions for savings bank and insured bank under section 1813(g) and section 1813(h).
    - output: us:statutes/12/1467a/o#mutual_holding_company_reorganization_authorized
      reason: Mutual holding company regime depends on institutional chartering, ownership-rights, insolvency, and section 1464 cross-references outside the executable local scope.
rules:
  - name: qualified_thrift_investment_percentage_threshold
    kind: parameter
    dtype: Rate
    source: 12 USC 1467a(m)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/12/1467a
              excerpt: "qualified thrift investments equal or exceed 65 percent"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.65

  - name: qualified_thrift_monthly_average_required_months
    kind: parameter
    dtype: Count
    source: 12 USC 1467a(m)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/12/1467a
              excerpt: "on a monthly average basis in 9 out of every 12 months"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          9

  - name: qualified_thrift_lender
    kind: derived
    entity: SavingsAssociation
    dtype: Judgment
    period: Month
    source: 12 USC 1467a(m)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/12/1467a
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/12/1467a
              excerpt: "65 percent"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/12/1467a
              excerpt: "9 out of every 12 months"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          qualifies_as_domestic_building_and_loan_association
          or (
            qualified_thrift_investments_divided_by_portfolio_assets >= qualified_thrift_investment_percentage_threshold
            and months_in_prior_twelve_meeting_monthly_average_requirement >= qualified_thrift_monthly_average_required_months
          )

  - name: qualified_stock_issuance_voting_stock_limit
    kind: parameter
    dtype: Rate
    source: 12 USC 1467a(q)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/12/1467a
              excerpt: "not more than 15 percent of the outstanding voting stock"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.15

  - name: qualified_stock_issuance
    kind: derived
    entity: SavingsAndLoanHoldingCompany
    dtype: Judgment
    period: Day
    source: 12 USC 1467a(q)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/12/1467a
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/12/1467a
              excerpt: "not more than 15 percent"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          issuer_is_undercapitalized_savings_association_or_qualifying_holding_company
          and shares_are_previously_unissued_or_treasury_shares
          and all_shares_purchased_by_registered_savings_and_loan_holding_company
          and board_approved_purchase
          and entire_consideration_paid_in_cash
          and acquiring_company_voting_stock_share_after_issuance <= qualified_stock_issuance_voting_stock_limit
          and not more_than_one_issuer_director_represents_acquiring_company
          and transactions_with_acquiring_company_subject_to_section_1468

  - name: first_tier_report_penalty_daily_cap
    kind: parameter
    dtype: Money
    unit: USD
    source: 12 USC 1467a(r)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/12/1467a
              excerpt: "not more than $2,000 for each day"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          2000

  - name: second_tier_report_penalty_daily_cap
    kind: parameter
    dtype: Money
    unit: USD
    source: 12 USC 1467a(r)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/12/1467a
              excerpt: "not more than $20,000 for each day"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          20000

  - name: third_tier_report_penalty_fixed_daily_cap
    kind: parameter
    dtype: Money
    unit: USD
    source: 12 USC 1467a(r)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/12/1467a
              excerpt: "not more than $1,000,000 or 1 percent of total assets"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1000000

  - name: third_tier_report_penalty_asset_share_cap
    kind: parameter
    dtype: Rate
    source: 12 USC 1467a(r)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/12/1467a
              excerpt: "1 percent of total assets"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.01

  - name: report_penalty_daily_cap
    kind: derived
    entity: SavingsAndLoanHoldingCompany
    dtype: Money
    period: Day
    unit: USD
    source: 12 USC 1467a(r)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/12/1467a
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/12/1467a
              excerpt: "$2,000 ... $20,000 ... $1,000,000 or 1 percent"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if first_tier_report_violation_applies: first_tier_report_penalty_daily_cap else: if second_tier_report_violation_applies: second_tier_report_penalty_daily_cap else: if third_tier_report_violation_applies: min(third_tier_report_penalty_fixed_daily_cap, total_assets * third_tier_report_penalty_asset_share_cap) else: 0
