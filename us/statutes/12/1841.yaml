format: rulespec/v1
module:
  status: deferred
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/12/1841
  summary: |-
    12 USC 1841 defines “bank holding company,” “company,” “bank,” “subsidiary,” “Board,” deemed share control rules, foreign-transaction application and section 2(h)(2) company limits, savings association and insured institution, affiliate, savings bank holding company, capital and interstate-banking terms, and financial holding company.
  deferred_outputs:
    - output: us:statutes/12/1841/a#bank_holding_company
      reason: "Definition depends on control determinations, fiduciary ownership exceptions, underwriting/proxy/debt-acquisition exceptions, thrift/savings-bank ownership exceptions, and Board adjudicatory findings not faithfully representable as a single executable surface here."
    - output: us:statutes/12/1841/b#company
      reason: "Definition requires organization-form classification, trust termination terms, United States or State majority ownership, and qualified family partnership treatment; the latter is defined in subsection (o)(10) and depends on Board determinations and cross-referenced banking restrictions."
    - output: us:statutes/12/1841/c#bank
      reason: "Definition depends on FDIA insured-bank status, demand-deposit and commercial-loan business facts, and multiple statutory exclusions, several of which depend on unavailable cited legal definitions and institutional classifications."
    - output: us:statutes/12/1841/d#subsidiary
      reason: "Definition depends on voting-share ownership/control, director-election control, and Board controlling-influence determinations with notice and hearing, which require entity-relation and administrative-determination modeling outside this artifact."
    - output: us:statutes/12/1841/f#board
      reason: "Institutional identity definition is documentary and not a computable policy condition in the current RuleSpec ontology."
    - output: us:statutes/12/1841/g#deemed_share_control
      reason: "Deeming rules require tracing subsidiary-held shares and trustee-held or controlled shares for company-related beneficiaries, plus Board case-specific appropriateness determinations."
    - output: us:statutes/12/1841/h#foreign_transaction_application_and_section_2_h_2_company_limits
      reason: "Rules depend on application of section 371c and section 1843, foreign-company banking-business classifications, section 2(h)(2) company status, financial-activity definitions by the Board, and domestic office/subsidiary credit and marketing restrictions."
    - output: us:statutes/12/1841/j#savings_association_or_insured_institution
      reason: "Definition depends on federal savings association/bank status, Deposit Insurance Fund membership, and agency determinations under 12 USC 1467a(l), requiring upstream institutional classifications."
    - output: us:statutes/12/1841/k#affiliate
      reason: "Affiliate status depends on the unresolved control definition and common-control relation among companies."
    - output: us:statutes/12/1841/l#savings_bank_holding_company
      reason: "Definition depends on control of qualified savings banks and aggregate asset composition at formation and thereafter; qualified savings bank mechanics are not independently encoded here."
    - output: us:statutes/12/1841/o#other_definitions
      reason: "Definitions incorporate FDIA section 38 capital categories, Board capital standards, antitrust-law cross-references, branch/home-state/host-state rules, lead insured depository institution asset comparisons, well-managed examination ratings, and qualified family partnership requirements."
    - output: us:statutes/12/1841/p#financial_holding_company
      reason: "Definition depends on bank holding company status and requirements of 12 USC 1843(l)(1), which is not available as copied executable RuleSpec context."
