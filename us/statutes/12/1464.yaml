  source_verification:
    corpus_citation_path: us/statute/12/1464
  summary: |-
    12 USC 1464 authorizes and regulates Federal savings associations, including deposit powers, regulatory enforcement and receivership authority, nondiscriminatory State and local taxation, District of Columbia branching approval, fiduciary and trust powers, out-of-State branch limitations, capital standards, loan limits, reports, forfeiture, and related definitions. The requested high-signal subsections depend on regulator charters, regulations, unavailable cross-referenced provisions, institutional entities, supervisory proceedings, or branch/fiduciary operational facts not represented by the current executable schema.
  deferred_outputs:
    - output: us:statutes/12/1464/b#deposit_and_related_powers
      reason: Deposit-account and liability powers are subject to charter terms, Comptroller regulations or written authorization, affiliate-overdraft treatment, withdrawal procedures, State mortgage finance agency law, and capital-standard compliance; the current source slice does not provide enough standalone executable facts or imported dependencies to compute a faithful final authorization surface.
    - output: us:statutes/12/1464/d#regulatory_authority
      reason: Regulatory authority, examinations, subpoenas, conservatorships, receiverships, service-company regulation, compliance procedures, and enforcement orders require administrative-proceeding and agency-action ontology plus cross-referenced Federal Deposit Insurance Act provisions that are not supplied as executable RuleSpec dependencies.
    - output: us:statutes/12/1464/h#discriminatory_state_and_local_taxation_prohibited
      reason: The prohibition compares taxes imposed by State, county, municipal, or local taxing authorities on Federal savings associations against taxes imposed on similar local mutual or cooperative thrift and home financing institutions; the needed tax-comparison relation and local taxing-authority ontology are not represented in the current schema.
    - output: us:statutes/12/1464/m#branching
      reason: District of Columbia branch establishment and relocation require prior written approval and depend on savings-association organization/location facts and the Comptroller-defined meaning of principal office and branch; the current artifact lacks the necessary branch-office entity model and regulatory definitions.
    - output: us:statutes/12/1464/n#trust_powers
      reason: Trust powers depend on Comptroller special permits, State-law fiduciary authority, trust-department asset segregation, State securities-deposit requirements, prohibited trust loans to officers/directors/employees, and revocation proceedings; these require fiduciary-account and proceeding ontology plus State-law dependencies not supplied here.
    - output: us:statutes/12/1464/r#out_of_state_branches
      reason: Out-of-State branch authority depends on qualification as a domestic building and loan association under 26 USC 7701(a)(19), the qualified thrift lender determination under 12 USC 1467a(m), FDIA transaction exceptions, State branch law, and conversion history; the required cited definitions and determinations are unavailable as executable imports.
