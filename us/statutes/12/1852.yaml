format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/12/1852/c
    source_sha256: 43d31a5f843cb5172ca014f9e328281a70bee2e3f5fa67139de85ad39816fa65
  summary: |-
    With the prior written consent of the Board, the concentration limit under subsection (b) shall not apply to an acquisition of a bank in default or in danger of default, an acquisition assisted by the FDIC under section 1823(c), or an acquisition resulting only in a de minimis increase in liabilities.
  deferred_outputs:
    - output: us:statutes/12/1852#concentration_limit_exception_applies
      reason: The full exception requires evaluating the branch for assistance provided by the Federal Deposit Insurance Corporation under 12 U.S.C. 1823(c), but that cited source is not available in copied context.
rules:
  - name: concentration_limit_default_bank_exception_applies
    kind: derived
    entity: Acquisition
    dtype: Judgment
    period: Year
    source: 12 U.S.C. 1852(c)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/12/1852/c
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/12/1852/c
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          acquisition_has_prior_written_consent_of_board
          and acquisition_is_of_bank_in_default_or_danger_of_default

  - name: concentration_limit_de_minimis_liabilities_exception_applies
    kind: derived
    entity: Acquisition
    dtype: Judgment
    period: Year
    source: 12 U.S.C. 1852(c)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/12/1852/c
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/12/1852/c
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          acquisition_has_prior_written_consent_of_board
          and acquisition_would_result_only_in_de_minimis_increase_in_liabilities_of_financial_company
