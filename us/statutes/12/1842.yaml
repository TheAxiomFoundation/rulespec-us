format: rulespec/v1
module:
  status: deferred
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/12/1842
  summary: |-
    12 USC 1842 requires prior Board approval for specified bank holding company formations, bank acquisitions, asset acquisitions, and mergers, subject to enumerated exceptions. Subsection (b) prescribes notice, recommendation, hearing, deemed-grant, emergency, and danger-of-closing procedures. Subsection (d) authorizes certain interstate bank acquisitions subject to age-law, deposit-concentration, community reinvestment, antitrust, and default-or-assistance exceptions.
  deferred_outputs:
    - output: us:statutes/12/1842/b#application_approval_procedure
      reason: >
        Subsection (b) is a Board administrative procedure involving notice to
        federal or State supervisory authorities, written disapproval, hearings,
        deemed grants after record completion, emergency action, and danger-of-closing
        certifications. Faithful execution requires procedural event timing,
        agency notice/hearing ontology, and the certification described in
        12 USC 1823(f)(8)(D), which is not exported by the copied 12 USC 1823
        context.
    - output: us:statutes/12/1842/d#interstate_bank_acquisition_approval
      reason: >
        Subsection (d) is an interstate bank acquisition approval regime that
        depends on missing definitions and external legal determinations,
        including insured depository institution deposit measures under
        12 USC 1813, community reinvestment responsibilities under 12 USC 2903,
        State age laws, State deposit caps, State contingency laws, and bank
        default or danger-of-default determinations. These dependencies are not
        available as executable RuleSpec outputs in the copied context.
