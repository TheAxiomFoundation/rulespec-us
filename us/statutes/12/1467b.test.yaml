- name: internal activity may continue through asset attribution
  period:
    period_kind: custom
    name: day
    start: '2026-01-15'
    end: '2026-01-15'
  input:
    us:statutes/12/1467b#input.otherwise_internal_financial_activity: false
    ? us:statutes/12/1467b#input.internal_financial_activity_conducted_by_grandfathered_savings_and_loan_holding_company_or_affiliate
    : true
    us:statutes/12/1467b#input.activity_is_internal_treasury_investment_or_employee_benefit_function: false
    ? us:statutes/12/1467b#input.grandfathered_unitary_savings_and_loan_holding_company_engaged_in_activity_during_required_lookback_year
    : true
    us:statutes/12/1467b#input.activity_assets_from_or_attributable_to_company_fraction: 0.75
    us:statutes/12/1467b#input.activity_revenues_from_or_attributable_to_company_fraction: 0.4
  output:
    us:statutes/12/1467b#internal_financial_activity: holds
    us:statutes/12/1467b#grandfathered_internal_financial_activity_may_continue: holds
- name: noninternal activity cannot continue under internal activity rule
  period:
    period_kind: custom
    name: day
    start: '2026-01-15'
    end: '2026-01-15'
  input:
    us:statutes/12/1467b#input.otherwise_internal_financial_activity: false
    ? us:statutes/12/1467b#input.internal_financial_activity_conducted_by_grandfathered_savings_and_loan_holding_company_or_affiliate
    : false
    us:statutes/12/1467b#input.activity_is_internal_treasury_investment_or_employee_benefit_function: false
    ? us:statutes/12/1467b#input.grandfathered_unitary_savings_and_loan_holding_company_engaged_in_activity_during_required_lookback_year
    : true
    us:statutes/12/1467b#input.activity_assets_from_or_attributable_to_company_fraction: 0.75
    us:statutes/12/1467b#input.activity_revenues_from_or_attributable_to_company_fraction: 0.75
  output:
    us:statutes/12/1467b#internal_financial_activity: not_holds
    us:statutes/12/1467b#grandfathered_internal_financial_activity_may_continue: not_holds
- name: lookback engagement required for continuation
  period:
    period_kind: custom
    name: day
    start: '2026-01-15'
    end: '2026-01-15'
  input:
    us:statutes/12/1467b#input.otherwise_internal_financial_activity: false
    ? us:statutes/12/1467b#input.internal_financial_activity_conducted_by_grandfathered_savings_and_loan_holding_company_or_affiliate
    : false
    us:statutes/12/1467b#input.activity_is_internal_treasury_investment_or_employee_benefit_function: true
    ? us:statutes/12/1467b#input.grandfathered_unitary_savings_and_loan_holding_company_engaged_in_activity_during_required_lookback_year
    : false
    us:statutes/12/1467b#input.activity_assets_from_or_attributable_to_company_fraction: 0.75
    us:statutes/12/1467b#input.activity_revenues_from_or_attributable_to_company_fraction: 0.4
  output:
