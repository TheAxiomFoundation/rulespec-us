format: rulespec/v1
module:
  status: deferred
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/12/1831o
  summary: Section 1831o defines prompt corrective action capital categories and capital
    standards for insured depository institutions, imposes restrictions and agency
    duties for undercapitalized, significantly undercapitalized, and critically undercapitalized
    institutions, and requires inspector general reviews when the Deposit Insurance
    Fund incurs material losses.
  deferred_outputs:
  - output: us:statutes/12/1831o/b#definitions
    reason: Definitions in subsection (b) depend on regulatory capital measures and
      missing same-meaning statutory definitions in 12 USC 1841 and 12 USC 375b; the
      broad capital-category and institutional-definition surface should be encoded
      after those upstream definitions and regulatory capital standards are available.
    source: 12 USC 1831o(b)
  - output: us:statutes/12/1831o/c#capital_standards
    reason: Capital standards in subsection (c) delegate key levels to Federal banking
      agency regulations and Corporation concurrence; the executable capital-category
      levels cannot be represented faithfully from this statute alone without the
      implementing regulatory standards.
    source: 12 USC 1831o(c)
  - output: us:statutes/12/1831o/k#deposit_insurance_fund_loss_reviews
    reason: Material-loss review rules in subsection (k) require administrative event
      timing, FDIC assistance/receivership valuation determinations, congressional-request
      disclosure workflows, and cross-referenced grounds under 12 USC 1821(c)(5),
      which is not available as copied RuleSpec context.
    source: 12 USC 1831o(k)
rules: []
