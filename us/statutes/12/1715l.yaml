format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/12/1715l
  summary: |-
    12 USC 1715l authorizes mortgage insurance for housing for low and moderate income families and displaced families, establishes eligibility and insurance-benefit conditions, and provides that tenants in eligible multifamily housing whose incomes exceed 80 percent of area median income shall pay rent not more than the lower of 30 percent of adjusted monthly income or the relevant fair market rental.
  deferred_outputs:
    - output: us:statutes/12/1715l/b#mortgage_insurance_authorization
      reason: Authorization depends on Secretary-prescribed terms, application procedure, and mortgage eligibility surfaces not fully represented by this artifact.
    - output: us:statutes/12/1715l/d#mortgage_eligible_for_insurance
      reason: Eligibility depends on missing incorporated definitions and cross-referenced sections including 12 USC 1707, 1712a, 1720, and multiple Secretary-prescribed standards and determinations.
    - output: us:statutes/12/1715l/e#mortgagor_approved_or_released
      reason: Mortgagor approval and release rules depend on missing 12 USC 1715r and Secretary-prescribed agreements, terms, and regulatory supervision.
    - output: us:statutes/12/1715l/f#project_standards_and_occupancy_rules
      reason: Project standards, nondwelling facilities, family definitions, rent-increase mitigation, and classroom-use rules depend on missing cited sections and Secretary regulations.
    - output: us:statutes/12/1715l/g#mortgagee_insurance_benefits
      reason: Mortgagee benefits and debenture mechanics depend on missing 12 USC 1710, 1713, 1715n(c), auction procedures, and historical commitment/default facts.
    - output: us:statutes/12/1715l/h#nonprofit_purchase_rehabilitation_mortgage_insurance
      reason: Nonprofit purchase, rehabilitation, resale, and low-income purchaser mortgage insurance depends on missing 12 USC 1701s(c)(1), Secretary approvals, appraisals, and mortgage release mechanics.
    - output: us:statutes/12/1715l/j#rental_project_conversion_to_cooperative_insurance
      reason: Cooperative conversion and mortgage insurance eligibility depends on the unresolved subsection (d)(3) below-market mortgage framework and Secretary-prescribed income limits and terms.
rules:
  - name: tenant_income_area_median_income_threshold
    kind: parameter
    dtype: Rate
    source: 12 USC 1715l(l)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/12/1715l
              excerpt: "tenants residing in eligible multifamily housing whose incomes exceed 80 percent of area median income"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.80

  - name: rent_adjusted_monthly_income_cap_rate
    kind: parameter
    dtype: Rate
    source: 12 USC 1715l(l)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/12/1715l
              excerpt: "30 percent of the family’s adjusted monthly income"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.30

  - name: eligible_multifamily_housing
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: 12 USC 1715l(l)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/statute/12/1715l
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (housing_financed_by_loan_or_mortgage_insured_or_held_by_secretary_under_subsection_d_3 and housing_assisted_under_section_1701s_or_section_8)
          or (housing_insured_or_held_by_secretary and housing_bears_interest_at_rate_determined_under_subsection_d_5_proviso)

  - name: tenant_income_exceeds_area_median_income_threshold
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 12 USC 1715l(l)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/12/1715l
              excerpt: "incomes exceed 80 percent of area median income"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          tenant_income > tenant_income_area_median_income_threshold * area_median_income

  - name: tenant_rent_cap_in_eligible_multifamily_housing
    kind: derived
    entity: Person
    dtype: Money
    unit: USD
    period: Month
    source: 12 USC 1715l(l)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/12/1715l
              excerpt: "shall pay as rent not more than the lower of the following amounts: (A) 30 percent of the family’s adjusted monthly income; or (B) the relevant fair market rental"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if tenant_resides_in_eligible_multifamily_housing and tenant_income_exceeds_area_median_income_threshold: min(rent_adjusted_monthly_income_cap_rate * adjusted_monthly_income, relevant_fair_market_rental) else: current_rent_limit_without_subsection_l
