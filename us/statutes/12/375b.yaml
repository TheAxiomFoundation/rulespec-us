format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/12/375b
  summary: 12 USC 375b prohibits a member bank from extending credit to its executive
    officers, directors, principal shareholders, and related interests except as permitted
    by the section; it bars preferential terms, requires prior board approval above
    a regulatory amount, limits aggregate insider credit, prohibits certain overdrafts,
    bars knowing receipt of unauthorized credit, treats certain affiliate insiders
    as bank insiders, defines key terms, and authorizes Board regulations.
  deferred_outputs:
  - output: us:statutes/12/375b#single_borrower_limit_compliant_credit_extension
    reason: The paragraph (4) aggregate limit depends on limits on loans to a single
      borrower established by 12 USC 84, and no executable RuleSpec context for section
      84 is available.
  - output: us:statutes/12/375b/b#extension_of_credit
    reason: The definition includes credit exposure arising from derivative transactions
      as defined in section 84(b), and no executable RuleSpec context for section
      84(b) is available.
  - output: us:statutes/12/375b#subsidiary
    reason: The term subsidiary has the same meaning as in 12 USC 1841, but the copied
      context for that source is deferred and has no executable exports.
rules:
- name: small_bank_deposit_exception_deposit_limit
  kind: parameter
  dtype: Money
  unit: USD
  source: 12 USC 375b(5)(C)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us/statute/12/375b
          excerpt: member banks with less than $100,000,000 in deposits
  versions:
  - effective_from: '0001-01-01'
    formula: '100000000'
- name: small_bank_exception_aggregate_credit_cap_multiplier
  kind: parameter
  dtype: Decimal
  source: 12 USC 375b(5)(C)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us/statute/12/375b
          excerpt: "more than 2 times the bank’s unimpaired capital and unimpaired surplus"
  versions:
  - effective_from: '0001-01-01'
    formula: '2'
- name: principal_shareholder_voting_security_threshold
  kind: parameter
  dtype: Rate
  source: 12 USC 375b(9)(F)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us/statute/12/375b
          excerpt: more than 10 percent of any class of voting securities
  versions:
  - effective_from: '0001-01-01'
    formula: '0.10'
- name: control_voting_security_threshold
  kind: parameter
  dtype: Rate
  source: 12 USC 375b(9)(B)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us/statute/12/375b
          excerpt: owns, controls, or has the power to vote 25 percent or more
  versions:
  - effective_from: '0001-01-01'
    formula: '0.25'
- name: subsidiary_asset_exception_ratio_limit
  kind: parameter
  dtype: Rate
  source: 12 USC 375b(8)(B)(ii)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us/statute/12/375b
          excerpt: do not exceed 10 percent of the consolidated assets
  versions:
  - effective_from: '0001-01-01'
    formula: '0.10'
- name: nonpreferential_credit_terms_requirement_satisfied
  kind: derived
  entity: CreditExtension
  dtype: Judgment
  period: Day
  source: 12 USC 375b(2)(A)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us/statute/12/375b
  versions:
  - effective_from: '0001-01-01'
    formula: 'credit_terms_are_substantially_same_as_comparable_noninsider_transactions

      and credit_does_not_involve_more_than_normal_repayment_risk_or_unfavorable_features

      and underwriting_procedures_not_less_stringent_than_comparable_noninsider_transactions'
- name: employee_benefit_program_credit_exception_applies
  kind: derived
  entity: CreditExtension
  dtype: Judgment
  period: Day
  source: 12 USC 375b(2)(B)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us/statute/12/375b
  versions:
  - effective_from: '0001-01-01'
    formula: 'credit_made_pursuant_to_benefit_or_compensation_program

      and benefit_or_compensation_program_widely_available_to_member_bank_employees

      and benefit_or_compensation_program_gives_no_preference_to_officer_director_principal_shareholder_or_related_interest'
- name: preferential_terms_prohibition_satisfied
  kind: derived
  entity: CreditExtension
  dtype: Judgment
  period: Day
  source: 12 USC 375b(2)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us/statute/12/375b
  versions:
  - effective_from: '0001-01-01'
    formula: 'nonpreferential_credit_terms_requirement_satisfied

      or employee_benefit_program_credit_exception_applies'
- name: prior_approval_requirement_satisfied
  kind: derived
  entity: CreditExtension
  dtype: Judgment
  period: Day
  source: 12 USC 375b(3)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us/statute/12/375b
  versions:
  - effective_from: '0001-01-01'
    formula: 'not aggregated_credit_amount_exceeds_regulatory_prior_approval_threshold

      or (extension_approved_in_advance_by_majority_vote_of_entire_board

      and interested_party_abstained_from_deliberations_and_voting)'
- name: aggregate_all_insiders_cap_amount
  kind: derived
  entity: MemberBank
  dtype: Money
  unit: USD
  period: Day
  source: 12 USC 375b(5)(A), (5)(C)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us/statute/12/375b
      - path: versions[0].formula
        kind: import
        import:
          target: us:statutes/12/375b#small_bank_exception_aggregate_credit_cap_multiplier
          output: small_bank_exception_aggregate_credit_cap_multiplier
          hash: sha256:local
  versions:
  - effective_from: '0001-01-01'
    formula: 'if board_regulation_makes_small_bank_exception_to_unimpaired_capital_surplus_limit:
      small_bank_exception_aggregate_credit_cap_multiplier * bank_unimpaired_capital_and_unimpaired_surplus
      else: bank_unimpaired_capital_and_unimpaired_surplus'
- name: aggregate_all_insiders_limit_satisfied
  kind: derived
  entity: MemberBank
  dtype: Judgment
  period: Day
  source: 12 USC 375b(5)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us/statute/12/375b
      - path: versions[0].formula
        kind: import
        import:
          target: us:statutes/12/375b#aggregate_all_insiders_cap_amount
          output: aggregate_all_insiders_cap_amount
          hash: sha256:local
  versions:
  - effective_from: '0001-01-01'
    formula: aggregate_outstanding_credit_to_executive_officers_directors_principal_shareholders_and_related_interests
      <= aggregate_all_insiders_cap_amount
- name: overdraft_payment_allowed
  kind: derived
  entity: AccountPayment
  dtype: Judgment
  period: Day
  source: 12 USC 375b(6)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us/statute/12/375b
  versions:
  - effective_from: '0001-01-01'
    formula: 'not payment_on_behalf_of_executive_officer_or_director_exceeds_funds_on_deposit_in_that_account

      or paid_under_written_preauthorized_interest_bearing_extension_of_credit_specifying_repayment_method

      or paid_under_written_preauthorized_transfer_from_another_account_of_that_executive_officer_or_director_at_that_bank'
- name: knowingly_receives_unauthorized_credit_prohibited
  kind: derived
  entity: Person
  dtype: Judgment
  period: Day
  source: 12 USC 375b(7)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: predicate
        source:
          corpus_citation_path: us/statute/12/375b
  versions:
  - effective_from: '0001-01-01'
    formula: 'person_is_executive_officer_director_or_principal_shareholder

      and person_knowingly_receives_or_permits_related_interest_to_receive_unauthorized_credit_from_member_bank'
- name: principal_shareholder
  kind: derived
  entity: Person
  dtype: Judgment
  period: Day
  source: 12 USC 375b(9)(F)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: definition
        source:
          corpus_citation_path: us/statute/12/375b
      - path: versions[0].formula
        kind: import
        import:
          target: us:statutes/12/375b#principal_shareholder_voting_security_threshold
          output: principal_shareholder_voting_security_threshold
          hash: sha256:local
  versions:
  - effective_from: '0001-01-01'
    formula: 'voting_securities_owned_controlled_or_votable_share > principal_shareholder_voting_security_threshold

      and not company_of_which_member_bank_is_subsidiary'
- name: person_controls_company_or_bank
  kind: derived
  entity: Person
  dtype: Judgment
  period: Day
  source: 12 USC 375b(9)(B)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: definition
        source:
          corpus_citation_path: us/statute/12/375b
      - path: versions[0].formula
        kind: import
        import:
          target: us:statutes/12/375b#control_voting_security_threshold
          output: control_voting_security_threshold
          hash: sha256:local
  versions:
  - effective_from: '0001-01-01'
    formula: 'voting_securities_owned_controlled_or_votable_share >= control_voting_security_threshold

      or controls_election_of_majority_of_directors

      or has_power_to_exercise_controlling_influence_over_management_or_policies'
