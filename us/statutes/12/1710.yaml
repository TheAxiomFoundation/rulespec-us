        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/12/1710
              excerpt: "designed as a dwelling for occupancy by 1 to 4 families"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1

  - name: eligible_asset_dwelling_family_maximum
    kind: parameter
    dtype: Count
    source: 12 USC 1710(h)(2)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/12/1710
              excerpt: "designed as a dwelling for occupancy by 1 to 4 families"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          4

  - name: revitalization_program_regulation_deadline_years
    kind: parameter
    dtype: Count
    source: 12 USC 1710(h)(10)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/12/1710
              excerpt: "not later than the expiration of the 2-year period beginning on October 21, 1998"
