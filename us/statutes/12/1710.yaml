format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/12/1710
  summary: |-
    12 USC 1710 authorizes FHA insurance claim payment procedures, loss mitigation payments, debenture and certificate-of-claim mechanics, Secretary handling and disposal of acquired property, revitalization-area asset disposition, premium cessation, and nullification of redemption rights for Secretary-held single family mortgage foreclosures. Key numeric terms include not less than 3 full monthly installments, a 3 per centum certificate increment, debentures maturing twenty years after date, a $1,000 procurement threshold, revitalization-area income below 60 percent, 1-to-4 family eligible properties, and regulations effective not later than 2 years after October 21, 1998.
  deferred_outputs:
    - output: us:statutes/12/1710/a#insurance_benefits_claim_procedure_outputs
      reason: >
        Subsection (a) depends on unencoded cross-referenced FHA mortgage insurance authorities,
        including sections 1709, 1715u, 1715u(c), 1735d, and 1715t, and defines administrative
        claim procedures that require Secretary determinations and records outside this source slice.
    - output: us:statutes/12/1710/g#property_handling_disposal_and_claim_settlement_powers
      reason: >
        Subsection (g) grants broad discretionary Secretary powers over acquired real and personal
        property, contracts, sales terms, delegations, and claim collection rather than a supported
        computable amount or predicate.
    - output: us:statutes/12/1710/h#revitalization_area_asset_disposition_program
      reason: >
        Subsection (h) establishes a complex administrative sale program with Secretary designations,
        purchaser capacity determinations, sale agreements, discounts, appraisals, rehabilitation
        standards, and regulations. The supported schema cannot faithfully represent the program
        surface as one executable output without external administrative determinations.
    - output: us:statutes/12/1710/l#single_family_mortgagor_redemption_right_nullification
      reason: >
        Subsection (l) turns on foreclosure procedure, title conveyance, state-law redemption
        displacement, and defined mortgage categories. It is a legal-process/title consequence
        rather than a supported computable benefit, amount, or eligibility output.
rules:
  - name: monetary_default_minimum_full_monthly_installments
    kind: parameter
    dtype: Count
    source: 12 USC 1710(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/12/1710
              excerpt: "monetary default for not less than 3 full monthly installments"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          3

  - name: certificate_of_claim_annual_increment_rate
    kind: parameter
    dtype: Rate
    source: 12 USC 1710(e)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/12/1710
              excerpt: "an increment at the rate of 3 per centum per annum"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.03

  - name: debenture_maturity_years_after_date
    kind: parameter
    dtype: Count
    source: 12 USC 1710(d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/12/1710
              excerpt: "shall mature twenty years after the date thereof"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          20

  - name: property_contract_small_purchase_threshold
    kind: parameter
    dtype: Money
    unit: USD
    source: 12 USC 1710(g)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/12/1710
              excerpt: "if the amount thereof does not exceed $1,000"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1000

  - name: revitalization_area_very_low_income_ratio
    kind: parameter
    dtype: Rate
    source: 12 USC 1710(h)(3)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/12/1710
              excerpt: "less than 60 percent of the median household income"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.60

  - name: eligible_asset_dwelling_family_minimum
    kind: parameter
    dtype: Count
    source: 12 USC 1710(h)(2)(A)
    metadata:
