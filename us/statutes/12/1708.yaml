  summary: |-
    The Mutual Mortgage Insurance Fund is created for section 1709 insured mortgages; the Secretary's commitment authority is limited to appropriated aggregate original principal loan amounts. The Secretary must keep the Fund financially sound, provide annual independent actuarial studies and reports to Congress, submit quarterly reports, may make programmatic or premium adjustments when actuarial findings show risk, and must pursue operational goals including fraud prevention quality control screening not later than 18 months after July 30, 2008.
  deferred_outputs:
    - output: us:statutes/12/1708#mutual_mortgage_insurance_fund_administration
      reason: The section states administrative establishment, reporting, fiduciary, appropriations-limited authority, actuarial assessment, and program-adjustment duties for the Secretary and the Fund. Those duties do not define a supported computable benefit, tax, eligibility, amount, or membership formula from local runtime facts.
      source_values:
