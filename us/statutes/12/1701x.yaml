format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/12/1701x
  summary: |-
    The Secretary is authorized to provide or contract for housing information, advice, technical assistance, and counseling; shall make certain housing counseling financial assistance available; may make grants for homeownership counseling; shall carry out a prepurchase and foreclosure-prevention counseling demonstration; shall establish certification, training, counseling procedures, mortgage software, multimedia campaigns, and education programs; and shall track and remedy misuse of covered assistance.
  deferred_outputs:
    - output: us:statutes/12/1701x/a#housing_information_advice_technical_assistance_and_counseling_authority
      reason: "The subsection creates broad Secretarial authorities, duties, grantmaking standards, prioritization, distribution limits, and appropriations whose executable beneficiary and agency-action surfaces require program-administration ontology and cited HUD/FHA/Rural Housing/Veterans program dependencies not provided in context."
    - output: us:statutes/12/1701x/c#homeownership_counseling_grants_and_notice_requirements
      reason: "The subsection defines grant authority, counseling eligibility, creditor notice duties, toll-free administration, reports, and definitions, but full executable treatment depends on mortgage insurance and external program definitions not supplied, including section 203 and title V Housing Act references."
    - output: us:statutes/12/1701x/d#prepurchase_and_foreclosure_prevention_counseling_demonstration
      reason: "The subsection establishes a terminated fiscal year 1994 demonstration program with target/control area selection, mandatory counseling, notices, and FHA mortgage predicates; this historical demonstration and area-selection surface is outside the supported runtime entity scope and depends on external FHA mortgage context."
    - output: us:statutes/12/1701x/f#homeownership_and_rental_counselor_training_and_certification_program
      reason: "The subsection directs the Secretary to contract for a national training and certification program, administer examinations, approve fees, and meet timing requirements; executable encoding requires agency-procurement and certification-program administration ontology beyond the local facts."
    - output: us:statutes/12/1701x/g#housing_counseling_procedures_materials_mortgage_software_campaigns_and_education
      reason: "The subsection coordinates HUD counseling procedures, incorporates many external counseling provisions, certifies mortgage software, and mandates campaigns and education programs; executable coverage depends on numerous unavailable cited statutory provisions and program-administration surfaces."
    - output: us:statutes/12/1701x/h#definitions_for_section_1701x
      reason: "The subsection provides definitions for nonprofit organization, State, unit of general local government, HUD-approved counseling agency, and State housing finance agency; executable definition membership would require external nonprofit-organization definition and organizational/tax-exemption entity support."
