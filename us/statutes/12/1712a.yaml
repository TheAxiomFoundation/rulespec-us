format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/12/1712a
  summary: |-
    The listed National Housing Act dollar amounts "shall be adjusted annually (commencing in 2004)" on the effective date of the Federal Reserve Board's HOEPA adjustment. The adjustment uses the CPI-U percentage change applied by the Federal Reserve Board for that HOEPA adjustment, and "the dollar amount of any adjustment shall be rounded to the next lower dollar."
rules:
  - name: hoepa_reference_figure_for_adjustment_timing
    kind: parameter
    dtype: Money
    unit: USD
    source: 12 USC 1712a(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/12/1712a
              excerpt: "$400 figure in the Home Ownership and Equity Protection Act of 1994"
    versions:
      - effective_from: '2004-01-01'
        formula: |-
          400

  - name: annual_dollar_amount_adjustment_increase
    kind: derived
    entity: DollarAmount
    dtype: Money
    period: Year
    unit: USD
    source: 12 USC 1712a(a)-(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/12/1712a
              excerpt: "calculated using the percentage change in the Consumer Price Index for All Urban Consumers (CPI-U)"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/12/1712a
              excerpt: "The dollar amount of any adjustment shall be rounded to the next lower dollar."
    versions:
      - effective_from: '2004-01-01'
        formula: |-
          floor(dollar_amount_subject_to_indexing * hoepa_cpi_u_percentage_change)

  - name: annual_adjusted_dollar_amount
    kind: derived
    entity: DollarAmount
    dtype: Money
    period: Year
    unit: USD
    source: 12 USC 1712a(a)-(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/12/1712a
              excerpt: "The adjustment of the Dollar Amounts shall be calculated using the percentage change"
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/12/1712a#annual_dollar_amount_adjustment_increase
              output: annual_dollar_amount_adjustment_increase
              hash: sha256:local
    versions:
      - effective_from: '2004-01-01'
        formula: |-
          dollar_amount_subject_to_indexing + annual_dollar_amount_adjustment_increase
