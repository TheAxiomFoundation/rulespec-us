format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/12/2903
  summary: |-
    Financial holding company election is not effective if the Board finds, as of filing, that not all subsidiary insured depository institutions had a satisfactory-or-better community credit needs rating at their most recent examination, and the Board notifies the company within the 30-day period. Newly acquired insured depository institutions may be excluded during a 12-month period if an affirmative plan is submitted and accepted.
rules:
  - name: financial_holding_company_election_notice_period_days
    kind: parameter
    dtype: Count
    source: 12 USC 2903(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/12/2903
              excerpt: "before the end of the 30-day period"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: newly_acquired_institution_lookback_months
    kind: parameter
    dtype: Count
    source: 12 USC 2903(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/12/2903
              excerpt: "during the 12-month period preceding the date of the submission"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          12

  - name: newly_acquired_institution_exclusion_period_months
    kind: parameter
    dtype: Count
    source: 12 USC 2903(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/12/2903
              excerpt: "during the 12-month period beginning on the date of such acquisition"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          12

  - name: newly_acquired_institution_may_be_excluded_from_rating_requirement
    kind: derived
    entity: InsuredDepositoryInstitution
    dtype: Judgment
    period: Month
    source: 12 USC 2903(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/12/2903
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/12/2903#newly_acquired_institution_lookback_months
              output: newly_acquired_institution_lookback_months
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/12/2903#newly_acquired_institution_exclusion_period_months
              output: newly_acquired_institution_exclusion_period_months
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          institution_acquired_during_lookback_period
          and institution_is_within_exclusion_period_beginning_on_acquisition
          and bank_holding_company_submitted_affirmative_plan_for_satisfactory_or_better_rating
          and appropriate_agency_accepted_affirmative_plan
          and newly_acquired_institution_lookback_months == newly_acquired_institution_exclusion_period_months

  - name: financial_holding_company_election_ineffective_due_to_community_credit_rating
    kind: derived
    entity: BankHoldingCompany
    dtype: Judgment
    period: Day
    source: 12 USC 2903(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/12/2903
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/12/2903#financial_holding_company_election_notice_period_days
              output: financial_holding_company_election_notice_period_days
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          bank_holding_company_filed_financial_holding_company_election_declaration_and_certification
          and board_finds_not_all_nonexcluded_subsidiary_insured_depository_institutions_had_satisfactory_or_better_rating_at_most_recent_examination_as_of_filing
          and board_notified_company_of_finding_within_notice_period
          and financial_holding_company_election_notice_period_days == 30
