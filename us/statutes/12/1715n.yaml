format: rulespec/v1
module:
  status: deferred
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/12/1715n
  summary: |-
    12 USC 1715n authorizes the Secretary to insure or commit to insure mortgages for specified Government, public-housing, State, municipal, resale, refinancing, urban-renewal, assigned-mortgage, operating-loss-loan, older-urban-area, existing multifamily/hospital, and non-self-contained multifamily project contexts, subject to multiple cross-referenced FHA eligibility limits, mortgage restructuring rules, insurance-fund obligations, maturities, principal caps, and Secretary determinations.
  deferred_outputs:
    - output: us:statutes/12/1715n/a#mortgage_insurance_authorized_for_projects_covered
      reason: 12 USC 1715n(a) authorizes insurance across multiple sections or subchapters of this chapter while preserving the limitation in section 1709(g), applying maximum maturity and principal-obligation limits from applicable sections or subchapters, and depending on uncopied cited sources including 12 USC 1709(g), 1715z-10, and related FHA mortgage-insurance provisions.
    - output: us:statutes/12/1715n/d#operating_loss_loan_insurance_authorized
      reason: 12 USC 1715n(d) requires entity support for insured project mortgages and operating-loss loans, applies underwriting requirements prescribed by the Secretary, ties the loan to the same section and insurance fund as the original mortgage, and depends on uncopied cited sources including 12 USC 1715e, 1715z-1, subsection (e), and 1715o for insurance-fund and debenture mechanics.
