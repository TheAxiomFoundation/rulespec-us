format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/12/1821
  summary: |-
    12 USC 1821 provides deposit insurance, receivership, conservatorship, claims,
    liquidation, repudiation, resolution, and related FDIC powers. The current
    dependency-closure artifact records the section as deferred because the
    supported RuleSpec entity model does not yet cover FDIC institution-level
    insurance and receivership administration.
  deferred_outputs:
    - output: us:statutes/12/1821/a#deposit_insurance
      reason: Deposit insurance coverage and insured-amount payment depend on account ownership categories, insured depository institution status, Corporation administration, and standard maximum deposit insurance amount mechanics outside the supported executable surface for this dependency closure.
    - output: us:statutes/12/1821/b#liquidation_as_closing
      reason: Liquidation-as-closing treatment depends on depository institution liquidation status and chapter-level FDIC insurance administration facts outside the supported executable model.
    - output: us:statutes/12/1821/c#appointment_as_conservator_or_receiver
      reason: Appointment of the Corporation as conservator or receiver depends on supervisory agency action, appointment grounds, notices, and institutional status facts outside the supported model.
    - output: us:statutes/12/1821/d#conservator_or_receiver_powers_and_duties
      reason: Conservator and receiver powers, claims processing, repudiation, stays, priorities, transfers, and related administrative authorities require FDIC resolution-process ontology not represented here.
    - output: us:statutes/12/1821/e#preappointment_contracts
      reason: Preappointment contract treatment depends on contract timing, conservator or receiver administration, and liability determinations outside the supported model.
    - output: us:statutes/12/1821/f#payment_of_insured_deposits
      reason: Payment of insured deposits depends on depositor account records, insurance limits, payment method, and FDIC administration facts outside the supported model.
    - output: us:statutes/12/1821/g#corporation_subrogation
      reason: Subrogation depends on insured-deposit payments, depositor claims, and receivership asset recovery facts outside the supported model.
    - output: us:statutes/12/1821/h#resolution_proceeding_conditions
      reason: Resolution proceeding conditions require institutional resolution actions and agency determinations outside household, person, or payment RuleSpec surfaces.
    - output: us:statutes/12/1821/i#claims_valuation
      reason: Claims valuation in default depends on receivership accounting, asset valuation, and claimant priority facts outside the supported model.
    - output: us:statutes/12/1821/j#court_action_limitation
      reason: Court action limits depend on receivership or conservatorship procedural posture and jurisdictional facts outside the supported model.
    - output: us:statutes/12/1821/k#director_and_officer_liability
      reason: Director and officer liability depends on conduct findings, applicable standards of care, and institutional governance facts outside the supported model.
    - output: us:statutes/12/1821/l#damages
      reason: Damages treatment depends on receivership claims, liability findings, and compensatory-damages classifications outside the supported model.
    - output: us:statutes/12/1821/m#new_depository_institutions
      reason: New depository institution creation depends on FDIC resolution administration, chartering, transfer, and institutional-operation facts outside the supported model.
    - output: us:statutes/12/1821/n#bridge_depository_institutions
      reason: Bridge depository institution authority depends on default, chartering, capitalization, transfer, and FDIC resolution facts outside the supported model.
    - output: us:statutes/12/1821/o#supervisory_records
      reason: Supervisory records treatment is an agency-records and confidentiality surface outside the supported executable model.
    - output: us:statutes/12/1821/p#prohibited_asset_sales
      reason: Asset sale prohibitions depend on failed-institution conduct findings, purchaser classifications, and FDIC disposition processes outside the supported model.
    - output: us:statutes/12/1821/q#expedited_claims_procedures
      reason: Expedited claims procedures depend on administrative claims processing and claimant or proceeding status facts outside the supported model.
    - output: us:statutes/12/1821/r#foreign_investigations
      reason: Foreign investigation assistance is an interagency authority depending on foreign banking authority requests and investigative facts outside the supported model.
    - output: us:statutes/12/1821/s#secrecy_agreements_and_protective_orders
      reason: Secrecy agreement and protective order restrictions require litigation or proceeding and agency agreement facts outside the supported model.
    - output: us:statutes/12/1821/t#information_sharing_privilege
      reason: Agency information sharing without privilege waiver is an evidentiary and interagency records rule outside the supported executable model.
    - output: us:statutes/12/1821/u#tenant_purchase_rights
      reason: Tenant purchase rights depend on property disposition, tenancy, notice, and offer process facts outside the supported model.
    - output: us:statutes/12/1821/v#homeless_family_sales_preference
      reason: Sales preferences for homeless families depend on property disposition, purchaser program status, and preference administration outside the supported model.
    - output: us:statutes/12/1821/w#commercial_real_property_sales_preferences
      reason: Commercial real property sales preferences depend on covered property, purchaser, and FDIC disposition facts outside the supported model.
    - output: us:statutes/12/1821#institution_deemed_closed_for_liquidation
      reason: Institution liquidation status depends on State or Federal agency actions and FDIC receivership administration facts not represented by the current executable entity model.
    - output: us:statutes/12/1821#requested_stay_maximum_days
      reason: Stay timing depends on receivership/conservatorship proceeding posture and court-request facts outside the supported model.
    - output: us:statutes/12/1821#contract_repudiation_liability_limited_to_actual_direct_compensatory_damages
      reason: Contract repudiation liability depends on FDIC receiver/conservator determinations, contract classification, and compensatory-damages facts outside the supported model.
    - output: us:statutes/12/1821#resolution_local_economic_impact_consideration_required
      reason: Resolution impacts require agency decision-process facts and local economic analysis rather than household/person/payment computation.
    - output: us:statutes/12/1821#failed_institution_asset_sale_prohibited_for_improper_conduct_person
      reason: Asset-sale prohibitions depend on failed-institution conduct findings, party classifications, and FDIC disposition processes outside the supported model.
    - output: us:statutes/12/1821#corporation_foreign_banking_authority_assistance_authorized
      reason: Foreign banking authority assistance is an agency-to-agency administrative power requiring request, authority, and investigation facts not modeled here.
