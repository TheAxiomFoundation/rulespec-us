format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/12/1703
  summary: |-
    12 USC 1703 authorizes the Secretary to insure eligible financial institutions against losses on specified property improvement, manufactured home, lot, historic preservation, fire safety, and related loans. It states insurance percentage caps, loan amount limits, maturity limits, premium charge limits, leasehold requirements, claim finality periods, and related administrative authorities.
  deferred_outputs:
    - output: us:statutes/12/1703/a#financial_institution_credit_insurance_authority
      reason: The subsection establishes a broad discretionary federal insurance authority requiring Secretary approvals, qualifications, regulatory determinations, property standards, and institutional facts outside the supported executable surface; only source-stated numeric limits are encoded here.
