- name: million_dollar_federally_related_transaction_requires_certified_appraiser
  period:
    period_kind: custom
    name: calendar_year
    start: '2024-01-01'
    end: '2024-12-31'
  input:
    us:statutes/12/3342#input.appraisal_is_in_connection_with_federally_related_transaction: true
    us:statutes/12/3342#input.federally_related_transaction_value: 1000000
    us:statutes/12/3342#input.appraisal_is_single_family_residential_1_to_4_unit: true
    us:statutes/12/3342#input.property_to_be_appraised_is_atypical: false
    us:statutes/12/3342#input.form_of_ownership_is_atypical: false
    us:statutes/12/3342#input.property_characteristics_are_atypical: false
    us:statutes/12/3342#input.market_conditions_are_atypical: false
  output:
    us:statutes/12/3342#appraisal_is_1_to_4_unit_single_family_residential: holds
    us:statutes/12/3342#complex_1_to_4_unit_single_family_residential_appraisal: not_holds
    us:statutes/12/3342#state_certified_appraiser_required: holds
    us:statutes/12/3342#state_licensed_appraiser_may_perform: holds
