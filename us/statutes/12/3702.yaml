  summary: |-
    “multifamily mortgage” means a mortgage held by the Secretary pursuant to listed National Housing Act, Housing Act of 1964, Housing Act of 1959, Cranston-Gonzalez National Affordable Housing Act, or Housing Act of 1949 authorities.
rules:
  - name: multifamily_mortgage
    kind: derived
    entity: Asset
