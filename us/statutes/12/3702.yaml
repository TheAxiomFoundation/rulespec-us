        formula: |-
          mortgage_held_by_secretary
          and (
            mortgage_held_pursuant_to_national_housing_act_multifamily_authority
            or mortgage_held_pursuant_to_housing_act_of_1964_section_312_before_repeal
            or mortgage_held_pursuant_to_housing_act_of_1959_section_202_before_cranston_gonzalez_amendment
