- name: default_continuation_days_for_insurance_benefits
  kind: parameter
  dtype: Count
  source: 12 USC 1713(g)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us/statute/12/1713
          excerpt: if such default continues for a period of thirty days
  versions:
  - effective_from: '0001-01-01'
    formula: '30'
- name: mortgage_payment_default_continues_for_benefits
  kind: derived
  entity: Mortgage
  dtype: Judgment
  period: Day
  source: 12 USC 1713(g)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: predicate
        source:
          corpus_citation_path: us/statute/12/1713
          excerpt: "failure of the mortgagor to make any payment due under or provided to be paid by the terms of a mortgage insured under this section shall be considered a default under such mortgage and, if such default continues for a period of thirty days"
      - path: versions[0].formula
        kind: import
        import:
          target: us:statutes/12/1713#default_continuation_days_for_insurance_benefits
          output: default_continuation_days_for_insurance_benefits
          hash: sha256:local
  versions:
  - effective_from: '0001-01-01'
    formula: 'mortgagor_failed_to_make_payment_due

      and default_continues_days >= default_continuation_days_for_insurance_benefits'
- name: mortgagee_assignment_package_delivered
  kind: derived
  entity: Mortgage
  dtype: Judgment
  period: Day
  source: 12 USC 1713(g)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us/statute/12/1713
          excerpt: "upon assignment, transfer, and delivery to the Secretary, within a period and in accordance with rules and regulations to be prescribed by the Secretary of (1) all rights and interests arising under the mortgage so in default; (2) all claims of the mortgagee against the mortgagor or others, arising out of the mortgage transactions; (3) all policies of title or other insurance or surety bonds or other guaranties and any and all claims thereunder; (4) any balance of the mortgage loans not advanced to the mortgagor; (5) any cash or property held by the mortgagee, or to which it is entitled, as deposits made for the account of the mortgagor and which have not been applied in reduction of the principal of the mortgage indebtedness; and (6) all records, documents, books, papers, and accounts"
  versions:
  - effective_from: '0001-01-01'
    formula: 'rights_and_interests_under_defaulted_mortgage_assigned

      and mortgage_transaction_claims_assigned

      and title_or_other_insurance_claims_delivered

      and unadvanced_loan_balance_delivered

      and mortgagor_deposit_cash_or_property_delivered

      and mortgage_transaction_records_delivered'
