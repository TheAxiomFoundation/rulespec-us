          hash: sha256:local
      - path: versions[0].formula
        kind: import
        import:
          target: us:statutes/12/1713#one_bedroom_family_unit_limit
          output: one_bedroom_family_unit_limit
          hash: sha256:local
      - path: versions[0].formula
        kind: import
        import:
          target: us:statutes/12/1713#two_bedroom_family_unit_limit
