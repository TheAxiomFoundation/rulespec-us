    formula: 'if bedroom_count == 0: no_bedroom_family_unit_limit else: if bedroom_count
      == 1: one_bedroom_family_unit_limit else: if bedroom_count == 2: two_bedroom_family_unit_limit
      else: if bedroom_count == 3: three_bedroom_family_unit_limit else: four_or_more_bedroom_family_unit_limit'
