format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/12/1713
  summary: 12 USC 1713 defines mortgage-related terms for this section, authorizes
    insurance of additional multifamily rental-housing mortgages, sets eligibility
    and mortgage-limit conditions including 90 percent value/replacement-cost caps
    and per-unit dollar limits, and provides insurance benefits after a 30-day default
    upon specified assignment, transfer, and delivery.
  deferred_outputs:
  - output: us:statutes/12/1713/a#complete_defined_terms
    reason: Complete defined-term encoding requires ontology for mortgages, leases,
      real estate interests, manufactured-home facilities, rental-housing agreements,
      and territories beyond the currently supported executable entity surface.
  - output: us:statutes/12/1713/c#complete_mortgage_insurance_eligibility
    reason: Complete eligibility depends on Secretary determinations, unavailable
      cross-referenced sections 1709, 1720, 1715a, and externally defined energy-conservation
      measures; this artifact encodes source-stated independent limits and defers
      the full eligibility surface.
  - output: us:statutes/12/1713/g#complete_insurance_benefit_payment
    reason: Full benefit payment amount and entitlement require assignment, transfer,
      delivery, foreclosure, conveyance, regulatory timing, title requirements, and
      mortgage-transaction claim ontology beyond this local scalar encoding.
  - output: us:statutes/12/1713/a#mortgage
    reason: Generated rule used a local name that collides with a sibling RuleSpec
      export. This output is deferred until it can be encoded with a semantic branch-specific
      name without creating ambiguous sibling imports.
rules:
- name: mortgage_fee_simple_or_lease_years_minimum
  kind: parameter
  dtype: Count
  source: 12 USC 1713(a)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us/statute/12/1713
          excerpt: under a lease for not less than ninety-nine years which is renewable
  versions:
  - effective_from: '0001-01-01'
    formula: '99'
- name: mortgage_remaining_lease_years_minimum
  kind: parameter
