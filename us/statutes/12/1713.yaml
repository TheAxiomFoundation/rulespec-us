  dtype: Money
  period: Year
  unit: USD
  source: 12 USC 1713(c)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us/statute/12/1713
      - path: versions[0].formula
        kind: import
        import:
          target: us:statutes/12/1713#no_bedroom_family_unit_limit
