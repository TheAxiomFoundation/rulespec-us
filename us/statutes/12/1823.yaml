format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/12/1823/c/4/g/iv
  summary: |-
    12 USC 1823 authorizes FDIC fund investments, depository accounts, assistance to insured depository institutions, asset sales, emergency interstate acquisitions, loan-loss amortization for agricultural banks, and emergency acquisitions of savings associations. High-signal subsections (f), (j), and (k) contain acquisition eligibility, bidding priorities, asset thresholds, amortization periods, agricultural-bank criteria, and savings-association emergency acquisition conditions that depend on institution status, regulatory approvals, and cited external banking-law definitions.
  deferred_outputs:
    - output: us:statutes/12/1823/f#assisted_emergency_interstate_acquisitions
      reason: Subsection (f) requires modeling acquisition transactions, bank and holding-company status, affiliated insured-bank relations, supervisor approvals, bidding priorities, antitrust findings, and definitions tied to unavailable cited sources including 12 USC 1842(d), 1730a(e)(3), 1841(d), and 461(b)(1)(A).
      source_values:
        - us:statutes/12/1823#defaulted_bank_asset_threshold_for_receiver_sale_authority
        - us:statutes/12/1823#danger_of_default_bank_asset_threshold_for_interstate_acquisition
        - us:statutes/12/1823#affiliated_bank_aggregate_asset_share_threshold
        - us:statutes/12/1823#state_supervisor_minimum_objection_hours
        - us:statutes/12/1823#board_vote_share_required_after_state_supervisor_objection
        - us:statutes/12/1823#reoffer_cost_margin_rate
        - us:statutes/12/1823#reoffer_cost_margin_amount
    - output: us:statutes/12/1823/j#loan_loss_amortization_for_certain_banks
      reason: Subsection (j) requires regulatory implementation by the appropriate Federal banking agency, agricultural-bank classification, qualified agricultural-loan classification, and portfolio-maintenance facts not fully represented as a faithful executable surface here.
      source_values:
        - us:statutes/12/1823#qualified_agricultural_loan_loss_amortization_years
        - us:statutes/12/1823#agricultural_bank_asset_limit
        - us:statutes/12/1823#agricultural_loan_portfolio_share_threshold
        - us:statutes/12/1823#regulation_issuance_deadline_days
    - output: us:statutes/12/1823/k#emergency_acquisitions
      reason: Subsection (k) requires modeling savings-association emergency transactions, agency approvals, State official consultation and objection, thrift-lender status under unavailable 12 USC 1467a(m), and subsidiary authority under unavailable 12 USC 1464(c)(4)(B).
      source_values:
        - us:statutes/12/1823#state_official_minimum_objection_hours
        - us:statutes/12/1823#board_vote_share_required_after_state_official_objection
        - us:statutes/12/1823#dual_service_continuation_year_limit
        - us:statutes/12/1823#branching_transition_year_limit
