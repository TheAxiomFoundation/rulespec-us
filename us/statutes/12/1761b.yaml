format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/12/1761b
  summary: |-
    The board of directors shall meet at least once a month and shall have the general direction and control of the affairs of the Federal credit union. Among other things, the board shall have charge of investments including the right to designate an investment committee of not less than two; if the bylaws so provide, appoint one or more loan officers; and if the bylaws so provide, appoint an executive committee of not less than three directors.
rules:
  - name: minimum_board_meetings_per_month
    kind: parameter
    dtype: Count
    source: 12 USC 1761b, opening sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/12/1761b
              excerpt: "meet at least once a month"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1

  - name: minimum_investment_committee_members
    kind: parameter
    dtype: Count
    source: 12 USC 1761b(6)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/12/1761b
              excerpt: "investment committee of not less than two"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          2

  - name: minimum_loan_officers_when_bylaws_provide
    kind: parameter
    dtype: Count
    source: 12 USC 1761b(10)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/12/1761b
              excerpt: "appoint one or more loan officers"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1

  - name: minimum_executive_committee_directors
    kind: parameter
    dtype: Count
    source: 12 USC 1761b(13)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/12/1761b
              excerpt: "executive committee of not less than three directors"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          3

  - name: monthly_board_meeting_requirement_satisfied
    kind: derived
    entity: FederalCreditUnionBoard
    dtype: Judgment
    period: Month
    source: 12 USC 1761b, opening sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/12/1761b
              excerpt: "The board of directors shall meet at least once a month"
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/12/1761b#minimum_board_meetings_per_month
              output: minimum_board_meetings_per_month
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          board_meetings_in_month >= minimum_board_meetings_per_month

  - name: investment_committee_designation_valid
    kind: derived
    entity: FederalCreditUnionBoard
    dtype: Judgment
    period: Month
    source: 12 USC 1761b(6)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/12/1761b
              excerpt: "designate an investment committee of not less than two"
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/12/1761b#minimum_investment_committee_members
              output: minimum_investment_committee_members
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (not investment_committee_designated)
          or investment_committee_member_count >= minimum_investment_committee_members

  - name: loan_officer_appointment_requirement_satisfied
    kind: derived
    entity: FederalCreditUnionBoard
    dtype: Judgment
    period: Month
    source: 12 USC 1761b(10)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/12/1761b
              excerpt: "if the bylaws so provide, appoint one or more loan officers"
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/12/1761b#minimum_loan_officers_when_bylaws_provide
              output: minimum_loan_officers_when_bylaws_provide
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (not bylaws_provide_for_loan_officers)
          or appointed_loan_officer_count >= minimum_loan_officers_when_bylaws_provide

  - name: executive_committee_appointment_requirement_satisfied
    kind: derived
    entity: FederalCreditUnionBoard
    dtype: Judgment
    period: Month
    source: 12 USC 1761b(13)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/12/1761b
              excerpt: "if the bylaws so provide, appoint an executive committee of not less than three directors"
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/12/1761b#minimum_executive_committee_directors
              output: minimum_executive_committee_directors
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (not bylaws_provide_for_executive_committee)
          or (executive_committee_appointed and executive_committee_director_count >= minimum_executive_committee_directors)
