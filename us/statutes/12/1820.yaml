format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/12/1820/d
  summary: The appropriate Federal banking agency shall, not less than once during
    each 12-month period, conduct a full-scope, on-site examination of each insured
    depository institution. Paragraph (1) shall not apply during any 12-month period
    in which the Corporation has conducted such an examination. State examinations
    may be accepted in alternate 12-month periods. Paragraphs (1), (2), and (3) use
    an 18-month period for certain small, well-capitalized, well-managed institutions
    meeting stated conditions. Paragraph (1) does not apply to institutions for which
    the Corporation is conservator or certain bridge depository institutions.
  deferred_outputs:
  - output: us:statutes/12/1820#small_institution_eighteen_month_examination_interval_applies
    reason: The 18-month substitution depends on whether the institution is well capitalized
      as defined in 12 USC 1831o, but no copied context provides the referenced definition.
    source_values:
    - us:statutes/12/1820#small_institution_total_assets_limit
    - us:statutes/12/1820#small_institution_good_condition_assets_limit
    - us:statutes/12/1820#maximum_regulatory_good_condition_assets_limit
