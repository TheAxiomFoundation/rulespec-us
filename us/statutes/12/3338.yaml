format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/12/3338
  summary: |-
    States must transmit appraiser and appraisal management company reports and collect annual registry fees. Amounts appropriated for or collected by the Appraisal Subcommittee under this section shall be used for listed registry, chapter-support, startup-reimbursement, grant, and reporting purposes.
  deferred_outputs:
    - output: us:statutes/12/3338/b#permitted_uses_of_amounts_appropriated_or_collected
      reason: The subsection states administrative spending purposes for amounts appropriated for or collected by the Appraisal Subcommittee; the supported RuleSpec schema has no faithful executable surface for a multi-purpose administrative fund-use authorization without payment/fund-purpose relation data.
rules:
  - name: individual_annual_registry_fee_cap
    kind: parameter
    dtype: Money
    unit: USD
    period: Year
    source: 12 USC 3338(a)(4)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/12/3338
              excerpt: "an annual registry fee of not more than $40"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          40

  - name: existing_appraisal_management_company_registry_fee_per_appraiser
    kind: parameter
    dtype: Money
    unit: USD
    period: Year
    source: 12 USC 3338(a)(4)(B)(i)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/12/3338
              excerpt: "$25 multiplied by the number of appraisers"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          25

  - name: appraisal_management_company_adjusted_registry_fee_per_appraiser_cap
    kind: parameter
    dtype: Money
    unit: USD
    period: Year
    source: 12 USC 3338(a)(4)(B)(i)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/12/3338
              excerpt: "adjusted, up to a maximum of $50"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          50

  - name: new_appraisal_management_company_registry_fee_multiplier_amount
    kind: parameter
    dtype: Money
    unit: USD
    period: Year
    source: 12 USC 3338(a)(4)(B)(ii)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/12/3338
              excerpt: "$25 multiplied by an appropriate number"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          25

  - name: new_appraisal_management_company_adjusted_multiplier_amount_cap
    kind: parameter
    dtype: Money
    unit: USD
    period: Year
    source: 12 USC 3338(a)(4)(B)(ii)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/12/3338
              excerpt: "adjusted, up to a maximum of $50"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          50

  - name: individual_adjusted_annual_registry_fee_cap
    kind: parameter
    dtype: Money
    unit: USD
    period: Year
    source: 12 USC 3338(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/12/3338
              excerpt: "up to a maximum of $80 per annum"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          80

  - name: registry_fee_inflation_review_interval_years
    kind: parameter
    dtype: Count
    period: Year
    source: 12 USC 3338(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/12/3338
              excerpt: "at least once every 5 years"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          5

  - name: startup_reimbursement_period_months
    kind: parameter
    dtype: Count
    period: Month
    source: 12 USC 3338(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/12/3338
              excerpt: "during the 24-month startup period"
    versions:
