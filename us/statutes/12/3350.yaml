format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/12/3350
  summary: |-
    For purposes of this chapter, “federally related transaction” means any real estate-related financial transaction which a listed federal actor engages in, contracts for, or regulates and requires appraiser services; “appraisal management company” includes an external authorized third party overseeing a network or panel of more than 15 certified or licensed appraisers in a State or 25 or more nationally within a given year for listed appraisal-management functions.
rules:
  - name: state_appraiser_panel_threshold_exclusive
    kind: parameter
    dtype: Count
    source: 12 USC 3350(11)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/12/3350
              excerpt: "more than 15 certified or licensed appraisers in a State"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          15
  - name: national_appraiser_panel_threshold_inclusive
    kind: parameter
    dtype: Count
    source: 12 USC 3350(11)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/12/3350
              excerpt: "25 or more nationally within a given year"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          25
  - name: real_estate_related_financial_transaction
    kind: derived
    entity: FinancialTransaction
    dtype: Judgment
    period: Year
    source: 12 USC 3350(5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/statute/12/3350
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          transaction_involves_sale_lease_purchase_investment_exchange_or_financing_of_real_property
          or transaction_involves_refinancing_of_real_property_or_interests
          or transaction_uses_real_property_or_interests_as_security_for_loan_or_investment
  - name: federally_related_transaction
    kind: derived
    entity: FinancialTransaction
    dtype: Judgment
    period: Year
    source: 12 USC 3350(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/statute/12/3350
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          real_estate_related_financial_transaction
          and transaction_is_engaged_in_contracted_for_or_regulated_by_federal_financial_institutions_regulatory_agency_or_resolution_trust_corporation
          and transaction_requires_services_of_appraiser
  - name: written_appraisal
    kind: derived
    entity: WrittenStatement
    dtype: Judgment
    period: Year
    source: 12 USC 3350(10)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/statute/12/3350
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          statement_is_written
          and statement_used_in_connection_with_federally_related_transaction
          and statement_independently_and_impartially_prepared_by_licensed_or_certified_appraiser
          and statement_sets_forth_opinion_of_defined_value_of_adequately_described_property_as_of_specific_date
          and statement_supported_by_presentation_and_analysis_of_relevant_market_information
  - name: appraisal_management_company
    kind: derived
    entity: Business
    dtype: Judgment
    period: Year
    source: 12 USC 3350(11)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/statute/12/3350
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/12/3350
              excerpt: "more than 15 certified or licensed appraisers in a State or 25 or more nationally"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          business_is_external_third_party
          and business_authorized_by_creditor_of_consumer_credit_transaction_secured_by_consumers_principal_dwelling_or_secondary_mortgage_market_principal
          and business_activity_in_connection_with_valuing_properties_collateralizing_mortgage_loans_or_mortgages_incorporated_into_securitization
          and (state_certified_or_licensed_appraiser_panel_count > state_appraiser_panel_threshold_exclusive or national_certified_or_licensed_appraiser_panel_count >= national_appraiser_panel_threshold_inclusive)
          and (business_recruits_selects_and_retains_appraisers or business_contracts_with_licensed_and_certified_appraisers_to_perform_appraisal_assignments or business_manages_process_of_having_appraisal_performed or business_reviews_and_verifies_work_of_appraisers)
