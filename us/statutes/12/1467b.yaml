format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/12/1467b
  summary: |-
    12 USC 1467b(a) defines “financial activities,” “grandfathered unitary savings and loan holding company,” and “internal financial activities.” Subsection (b)(2) provides that internal financial activities need not be placed in an intermediate holding company and may continue when the company engaged in the activity during the required lookback year and at least 2/3 of the assets or revenues generated from the activity are from or attributable to the company.
  deferred_outputs:
    - output: us:statutes/12/1467b/a#financial_activities
      reason: The definition depends on clauses 1467a(c)(9)(A)(i) and 1467a(c)(9)(A)(ii), but the copied 12 USC 1467a context does not export those clause-specific activity definitions.
    - output: us:statutes/12/1467b/a#grandfathered_unitary_savings_and_loan_holding_company
      reason: The definition depends on the company category described in 1467a(c)(9)(C), but the copied 12 USC 1467a context does not export that category.
    - output: us:statutes/12/1467b/b#intermediate_holding_company_requirement
      reason: The Board's intermediate-holding-company requirement depends on Board determinations, regulations, transfer-date administration, and the unresolved financial-activities and grandfathered-unitary-company definitions.
    - output: us:statutes/12/1467b/c#board_regulations
      reason: Regulation-promulgation authority is administrative and depends on Board rulemaking rather than a directly computable private-party condition.
    - output: us:statutes/12/1467b/d#rules_of_construction
      reason: The construction rules state interpretive presumptions and nonrequirements rather than a standalone computable amount or eligibility output.
rules:
  - name: grandfathered_internal_financial_activity_attribution_fraction
    kind: parameter
    dtype: Rate
    source: 12 USC 1467b(b)(2)(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/12/1467b
              excerpt: "at least ⅔ of the assets or ⅔ of the revenues"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          2 / 3

  - name: internal_financial_activity
    kind: derived
    entity: Activity
    dtype: Judgment
    period: Day
    source: 12 USC 1467b(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/statute/12/1467b
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          otherwise_internal_financial_activity
          or internal_financial_activity_conducted_by_grandfathered_savings_and_loan_holding_company_or_affiliate
          or activity_is_internal_treasury_investment_or_employee_benefit_function

  - name: grandfathered_internal_financial_activity_may_continue
    kind: derived
    entity: Activity
    dtype: Judgment
    period: Day
    source: 12 USC 1467b(b)(2)(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/12/1467b
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/12/1467b
              excerpt: "at least ⅔ of the assets or ⅔ of the revenues"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          internal_financial_activity
          and grandfathered_unitary_savings_and_loan_holding_company_engaged_in_activity_during_required_lookback_year
          and (
            activity_assets_from_or_attributable_to_company_fraction >= grandfathered_internal_financial_activity_attribution_fraction
            or activity_revenues_from_or_attributable_to_company_fraction >= grandfathered_internal_financial_activity_attribution_fraction
          )
