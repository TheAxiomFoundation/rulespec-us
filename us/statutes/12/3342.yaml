format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/12/3342
  summary: State certified appraiser required for federally related transactions valued
    at $1,000,000 or more; 1-to-4 unit single family residential appraisals may be
    performed by State licensed appraisers unless size and complexity requires certification,
    with complex appraisal defined by atypical property, ownership, property characteristics,
    or market conditions.
rules:
- name: state_certified_appraiser_transaction_value_threshold
  kind: parameter
  dtype: Money
  unit: USD
  source: 12 USC 3342(1)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us/statute/12/3342
          excerpt: value of $1,000,000 or more
  versions:
  - effective_from: '0001-01-01'
    formula: '1000000'
- name: appraisal_is_1_to_4_unit_single_family_residential
  kind: derived
  entity: Appraisal
  dtype: Judgment
  period: Year
  source: 12 USC 3342(2)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us/statute/12/3342
          excerpt: 1-to-4 unit, single family residential appraisals
  versions:
  - effective_from: '0001-01-01'
    formula: appraisal_is_single_family_residential_1_to_4_unit
- name: complex_1_to_4_unit_single_family_residential_appraisal
  kind: derived
  entity: Appraisal
  dtype: Judgment
  period: Year
  source: 12 USC 3342(2)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: definition
        source:
          corpus_citation_path: us/statute/12/3342
  versions:
  - effective_from: '0001-01-01'
    formula: "appraisal_is_1_to_4_unit_single_family_residential\nand (\n  property_to_be_appraised_is_atypical\n\
      \  or form_of_ownership_is_atypical\n  or property_characteristics_are_atypical\n\
      \  or market_conditions_are_atypical\n)"
- name: state_certified_appraiser_required
  kind: derived
  entity: Appraisal
  dtype: Judgment
  period: Year
  source: 12 USC 3342(1)-(2)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us/statute/12/3342
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us/statute/12/3342
          excerpt: value of $1,000,000 or more
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us/statute/12/3342
  versions:
  - effective_from: '0001-01-01'
    formula: "appraisal_is_in_connection_with_federally_related_transaction\nand (\n\
      \  federally_related_transaction_value >= state_certified_appraiser_transaction_value_threshold\n\
      \  or complex_1_to_4_unit_single_family_residential_appraisal\n)"
- name: state_licensed_appraiser_may_perform
  kind: derived
  entity: Appraisal
  dtype: Judgment
  period: Year
  source: 12 USC 3342(2)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us/statute/12/3342
  versions:
  - effective_from: '0001-01-01'
    formula: 'appraisal_is_in_connection_with_federally_related_transaction

      and appraisal_is_1_to_4_unit_single_family_residential

      and not complex_1_to_4_unit_single_family_residential_appraisal'
