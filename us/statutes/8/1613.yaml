format: rulespec/v1
imports:
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/8/1613
  summary: |-
    Subsection (a) makes a qualified alien entering the United States on or after August 22, 1996 ineligible for Federal means-tested public benefits for 5 years beginning on entry with qualified-alien status, except as provided in subsections (b), (c), and (d). Subsection (c) provides that the subsection (a) limitation does not apply to listed assistance or benefits, including emergency medical assistance, disaster relief, school lunch and child nutrition benefits, certain public health assistance, certain foster care and adoption assistance, specified community in-kind life-or-safety services, student assistance, ESEA means-tested programs, Head Start, WIOA title I benefits, and food-stamp benefits for individuals under age 18.
  deferred_outputs:
    - output: us:statutes/8/1613/a#qualified_alien_federal_means_tested_public_benefit_ineligibility
      reason: The final subsection (a) ineligibility surface depends on all exceptions in subsections (b), (c), and (d), including unavailable cited veteran, section 1611, section 1612(a)(2)(G), and section 1612(a)(2)(K) legal dependencies. This file retains the source-stated 5-year period and encodes the independent subsection (c) benefit-category exclusion.
      source_values:
        - us:statutes/8/1613#subsection_a_ineligibility_period_years
rules:
  - name: subsection_a_ineligibility_period_years
    kind: parameter
    dtype: Count
    source: 8 USC 1613(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/8/1613
              excerpt: "for a period of 5 years"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          5
  - name: assistance_or_benefit_excluded_from_subsection_a_limitation
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: 8 USC 1613(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/8/1613
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/8/1613
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          medical_assistance_described_in_section_1611_b_1_A
          or short_term_non_cash_in_kind_emergency_disaster_relief
          or assistance_or_benefit_under_richard_b_russell_national_school_lunch_act
          or assistance_or_benefit_under_child_nutrition_act_of_1966
          or public_health_assistance_for_immunizations_or_communicable_disease_testing_or_treatment_not_under_title_xix
          or foster_care_or_adoption_assistance_payment_under_title_iv_parts_b_or_e_with_qualified_alien_foster_or_adoptive_parent
          or (
            attorney_general_specified_program_service_or_assistance
            and delivers_in_kind_services_at_community_level
            and does_not_condition_assistance_on_recipient_income_or_resources
            and necessary_for_protection_of_life_or_safety
          )
          or student_assistance_under_listed_higher_education_or_public_health_service_act_titles
          or means_tested_program_under_elementary_and_secondary_education_act_of_1965
          or benefit_under_head_start_act
          or benefit_under_title_i_of_workforce_innovation_and_opportunity_act
          or assistance_or_benefit_under_food_stamp_act_provided_to_individual_under_age_18
