  summary: |-
    “paragraph (1) shall not apply” to qualifying Compact of Free Association residents of the States or District of Columbia, and at a territory Governor’s written option to qualifying residents of that territory.
rules:
  - name: paragraph_1_nonapplication_exception_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 8 USC 1612(b)(2)(G)
    metadata:
