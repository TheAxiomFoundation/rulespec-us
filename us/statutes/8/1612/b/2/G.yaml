          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/8/1612/b/2/G
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/8/1612/b/2/G
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          eligibility_for_benefits_for_designated_federal_program
          and (
            lawfully_resides_in_state_or_dc_under_compacts
            or (
              lawfully_resides_in_respective_territory_under_compacts
