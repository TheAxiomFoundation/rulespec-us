  summary: |-
    8 USC 1641(b) defines “qualified alien” for this chapter as an alien who, when applying for, receiving, or attempting to receive a Federal public benefit, falls within listed immigration categories including lawful permanent resident, asylee, refugee, parolee for at least 1 year, withholding of deportation/removal, conditional entrant, Cuban and Haitian entrant, or an individual lawfully residing in the United States in accordance with a Compact of Free Association referred to in section 1612(b)(2)(G).
  deferred_outputs:
