format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/8/1641/b
  summary: |-
    “qualified alien” means an alien who, when applying for, receiving, or attempting to receive a Federal public benefit, is in one of the listed categories, including lawful permanent resident, asylee, refugee, parolee for at least 1 year, withholding, conditional entrant, Cuban and Haitian entrant, or qualifying Compact of Free Association resident.
rules:
  - name: minimum_parole_period_years
    kind: parameter
    dtype: Count
    source: 8 USC 1641(b)(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/8/1641/b
              excerpt: "paroled into the United States ... for a period of at least 1 year"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1
  - name: qualified_alien
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 8 USC 1641(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/statute/8/1641/b
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/8/1641/b
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/8/1641/b#minimum_parole_period_years
              output: minimum_parole_period_years
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_alien
          and (
            person_applies_for_federal_public_benefit
            or person_receives_federal_public_benefit
            or person_attempts_to_receive_federal_public_benefit
          )
          and (
            alien_lawfully_admitted_for_permanent_residence_under_immigration_and_nationality_act
            or alien_granted_asylum_under_section_208_of_immigration_and_nationality_act
            or refugee_admitted_to_united_states_under_section_207_of_immigration_and_nationality_act
            or (
              alien_paroled_into_united_states_under_section_212_d_5_of_immigration_and_nationality_act
              and parole_period_years >= minimum_parole_period_years
            )
            or alien_deportation_or_removal_withheld_under_listed_immigration_and_nationality_act_provisions
            or alien_granted_conditional_entry_under_section_203_a_7_as_in_effect_prior_to_april_1_1980
            or alien_is_cuban_and_haitian_entrant_as_defined_in_refugee_education_assistance_act_section_501_e
            or individual_lawfully_resides_in_united_states_in_accordance_with_compact_of_free_association_referred_to_in_section_1612_b_2_G
          )
