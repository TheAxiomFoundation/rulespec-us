      reason: Section 11373(d) assigns administrative reallocation duties to the Secretary and depends on comprehensive plan approval status, unused or returned assistance, State/city/county allocation mechanics, and discretionary determinations of extraordinary need or large numbers of homeless individuals; the current RuleSpec ontology does not faithfully represent this administrative allocation process as an executable benefit or amount surface.
      source_values:
        - us:statutes/42/11373#reallocation_minimum_frequency_per_fiscal_year
        - us:statutes/42/11373#comprehensive_plan_approval_grace_period_days
  summary: |-
    Section 11373 allocates assistance under this part to metropolitan cities, urban counties, States, and territories. Subsection (d) requires the Secretary, not less than once during each fiscal year, to reallocate unused, returned, or subsection (b) funds, and specifies 90-day comprehensive-plan approval consequences for cities, counties, and States.
