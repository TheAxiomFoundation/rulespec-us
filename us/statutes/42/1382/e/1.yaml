    kind: parameter
    dtype: Money
    unit: USD
    source: 42 USC 1382(e)(1)(B)(i)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/42/1382/e/1
              excerpt: "$360 per year"
    versions:
      - effective_from: '1974-01-01'
        formula: |-
          360

  - name: medical_facility_couple_both_in_facility_annual_rate_cap
    kind: parameter
    dtype: Money
