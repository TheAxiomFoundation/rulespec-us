format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/1437n
  summary: |-
    42 USC 1437n sets income targeting for public housing, tenant-based section 1437f assistance, and project-based section 1437f assistance; permits different admission standards with Secretary approval and good cause; imposes asset-based assistance limits and self-certification rules; and requires permanent methamphetamine-manufacturing occupancy and assistance prohibitions.
  deferred_outputs:
    - output: us:statutes/42/1437n/a#over_income_family_required_rent_or_tenancy_termination
      reason: The over-income family rent alternative depends on fair market rent under section 1437f(c) and monthly subsidy amounts including Operating Fund and Capital Fund amounts under section 1437g; the copied 1437f context is deferred and no executable fair-market-rent or monthly-subsidy output is available.
      source_values:
        - us:statutes/42/1437n#over_income_limitation_consecutive_years
        - us:statutes/42/1437n#over_income_tenancy_termination_deadline_months
        - us:statutes/42/1437n#over_income_median_income_limit_rate
    - output: us:statutes/42/1437n/e#asset_based_assistance_limitation
      reason: The full asset-based assistance limitation depends on exclusions for property receiving assistance under section 1437f(y) or 1437f(o)(12), while the copied 1437f context is deferred; independent source-stated asset thresholds and self-certification mechanics are retained.
      source_values:
        - us:statutes/42/1437n#asset_limitation_statutory_base_net_family_assets_cap
        - us:statutes/42/1437n#net_assets_self_certification_statutory_base_limit
        - us:statutes/42/1437n#asset_noncompliance_eviction_delay_limit_months
