format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/18795
  summary: |-
    42 USC 18795(d) defines terms for this section: “disadvantaged community” means a community that the Secretary determines, based on appropriate data, indices, and screening tools, is economically, socially, or environmentally disadvantaged; “HOMES rebate program” means a Home Owner Managing Energy Savings rebate program established by a State energy office as part of an approved State energy conservation plan under the State Energy Program; and “low- or moderate-income household” means an individual or family with total annual income below 80 percent of area median income as reported by HUD, including demonstrated eligibility for another Federal program with income restrictions equal to or below 80 percent of area median income.
  deferred_outputs:
    - output: us:statutes/42/18795/a#appropriation_and_allocation_for_homes_rebate_grants
      reason: |-
        Subsection (a) appropriates and allocates program funding to the Secretary and State energy offices, including Treasury availability, State Energy Program allocation-formula distribution, later redistribution, and Federal administrative-expense limits. A faithful executable model requires administrative grant-allocation entities and fiscal-year fund-reservation/distribution mechanics outside the current encoded surface.
    - output: us:statutes/42/18795/b#state_energy_office_grant_application_requirements
      reason: |-
        Subsection (b) specifies required contents of a State energy office application and plan, including Secretary-approved procedures and software, valuation methods, certificate documentation, contractor or aggregator payments for disadvantaged-community retrofits, and rebate coordination. These are administrative application-plan requirements rather than a single computable household, person, or payment amount in the current schema.
    - output: us:statutes/42/18795/c#homes_rebate_program_rebate_amounts_and_limitations
      reason: |-
        Subsection (c) establishes whole-house retrofit rebate eligibility, modeled and measured savings thresholds, per-home, per-dwelling-unit, per-building, percentage-of-project-cost, and low- or moderate-income household rebate caps, plus program use-of-funds and anti-combination rules. Encoding the final rebate surface would require a retrofit/project/building/portfolio ontology and, for subsection (c)(7), the unavailable definition of a high-efficiency electric home rebate program in 42 USC 18795a(d).
