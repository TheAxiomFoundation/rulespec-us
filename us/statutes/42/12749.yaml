format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/12749
  summary: |-
    Any repayment of funds drawn from a jurisdiction's HOME Investment Trust Fund, and any interest or other return on such funds, shall be deposited in that jurisdiction's HOME Investment Trust Fund, except that if the jurisdiction is not a participating jurisdiction when payment or repayment is made, the amount shall be reallocated in accordance with section 12747(d). Each participating jurisdiction shall enter into an agreement with the Secretary ensuring affordable-housing investments are repayable when the housing no longer qualifies as affordable housing. Repayments deposited under this section shall be immediately available to the participating jurisdiction for investment subject to this part.
rules:
  - name: trust_fund_repayment_deposited_in_jurisdiction_fund
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Year
    source: 42 USC 12749(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us/statute/42/12749
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          payment_is_repayment_of_funds_drawn_from_jurisdiction_home_investment_trust_fund
          and jurisdiction_is_participating_jurisdiction_when_payment_or_repayment_is_made

  - name: investment_return_deposited_in_jurisdiction_fund
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Year
    source: 42 USC 12749(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us/statute/42/12749
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          payment_is_interest_or_other_return_on_investment_of_such_funds
          and jurisdiction_is_participating_jurisdiction_when_payment_or_repayment_is_made

  - name: payment_or_repayment_reallocated_under_section_12747_d
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Year
    source: 42 USC 12749(a), (b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/42/12749
              excerpt: "if the jurisdiction is not a participating jurisdiction when such payment or repayment is made"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          (payment_is_repayment_of_funds_drawn_from_jurisdiction_home_investment_trust_fund
          or payment_is_interest_or_other_return_on_investment_of_such_funds
          or payment_is_repayment_of_affordable_housing_investment_when_housing_no_longer_qualifies)
          and not jurisdiction_is_participating_jurisdiction_when_payment_or_repayment_is_made

  - name: repayment_agreement_requirement_satisfied
    kind: derived
    entity: ParticipatingJurisdiction
    dtype: Judgment
    period: Year
    source: 42 USC 12749(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/42/12749
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          not jurisdiction_is_participating_jurisdiction
          or jurisdiction_has_entered_agreement_with_secretary_ensuring_affordable_housing_investment_repayable_when_housing_no_longer_qualifies

  - name: affordable_housing_repayment_deposited_in_investing_jurisdiction_fund
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Year
    source: 42 USC 12749(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us/statute/42/12749
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          payment_is_repayment_of_affordable_housing_investment_when_housing_no_longer_qualifies
          and jurisdiction_is_participating_jurisdiction_when_payment_or_repayment_is_made

  - name: deposited_repayments_immediately_available_for_part_investment
    kind: derived
    entity: ParticipatingJurisdiction
    dtype: Judgment
    period: Year
    source: 42 USC 12749(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us/statute/42/12749
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          repayments_deposited_in_home_investment_trust_fund_in_accordance_with_this_section
          and secretary_has_taken_actions_necessary_to_ensure_repayments_are_immediately_available_for_investment_subject_to_this_part

  - name: outside_federal_government_account_authorized_for_affordable_housing_investment
    kind: derived
    entity: ParticipatingJurisdiction
    dtype: Judgment
    period: Year
    source: 42 USC 12749(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/42/12749
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          account_is_home_investment_trust_fund_account_outside_federal_government_for_participating_jurisdiction
          and arrangements_for_account_are_satisfactory_to_secretary
          and account_is_used_solely_to_invest_in_affordable_housing_within_participating_jurisdiction_boundaries_in_accordance_with_this_subchapter
          and account_established_so_repayments_are_not_receipts_or_collections_of_federal_government
