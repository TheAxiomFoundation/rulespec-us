format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/5301
  summary: |-
    The primary objective of this chapter and of each grantee's community development program is viable urban communities by providing decent housing, a suitable living environment, and economic opportunities, principally for persons of low and moderate income. Not less than 70 percent of the aggregate covered Federal assistance shall be used for activities that benefit persons of low and moderate income.
rules:
  - name: covered_assistance_low_moderate_income_benefit_minimum_rate
    kind: parameter
    dtype: Rate
    source: 42 USC 5301(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/5301
              excerpt: "not less than 70 percent"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          0.70

  - name: covered_assistance_low_moderate_income_benefit_requirement_satisfied
    kind: derived
    entity: CommunityDevelopmentGrantee
    dtype: Judgment
    period: Year
    source: 42 USC 5301(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/5301
              excerpt: "the aggregate of the Federal assistance provided to States and units of general local government under section 5306 of this title and, if applicable, the funds received as a result of a guarantee or a grant under section 5308 of this title , shall be used for the support of activities that benefit persons of low and moderate income"
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/42/5301#covered_assistance_low_moderate_income_benefit_minimum_rate
              output: covered_assistance_low_moderate_income_benefit_minimum_rate
              hash: sha256:local
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          covered_assistance_used_for_activities_benefiting_low_and_moderate_income_persons >= covered_assistance_low_moderate_income_benefit_minimum_rate * aggregate_covered_federal_assistance
