module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/426
  status: deferred
  summary: |-
    42 USC 426 establishes Medicare Part A (hospital insurance) entitlement for certain individuals based on Social Security or railroad retirement benefit status. Subsection (b) provides for individuals under age 65 who have been entitled for specified periods to disability insurance, disabled child's, disabled widow(er)'s, or disabled railroad retirement benefits; it defines the 24‑month waiting period, the start and end of hospital insurance entitlement, and special trial‑work deeming and termination rules. Subsection (c) specifies what entitlement to hospital insurance benefits under subsection (a) consists of, including the covered services, geographic scope, and timing limits for post‑hospital extended care services. Subsection (d) defines “qualified railroad retirement beneficiary” by reference to certification by the Railroad Retirement Board and sets the month in which such status ceases. Subsection (e) provides special rules for widows and widowers, including disability‑based age 65 substitutions, counting of certain SSI and State supplementary payment months toward the 24‑month disability waiting period, deemed continued entitlement where old‑age benefits replace disability widows/widowers benefits, deemed filing for disability widows/widowers benefits for certain mothers/fathers, and application of these rules notwithstanding section 402(j)(4).
  deferred_outputs:
    - output: us:statutes/42/426/b#disabled_individual_under_65_entitled_to_hospital_insurance
      reason: |-
        Entitlement for individuals under age 65 in subsection (b) depends on detailed entitlement and disability determinations under sections 402, 423, and 45 USC 231f(d), as well as month‑by‑month timing mechanics (24‑month and 25th‑month rules, trial work periods, and modified termination periods) that require a richer temporal and entitlement‑history model than the current schema and available upstream RuleSpec context provide.
    - output: us:statutes/42/426/c#hospital_insurance_entitlement_conditions_under_subsection_a
      reason: |-
        Subsection (c) defines the contents and temporal/service limitations of hospital insurance entitlement “for purposes of subsection (a)” by reference to Medicare Part A benefit types, definitions, and payment conditions in subchapter XVIII (including section 1395f(f)), which are not available in executable RuleSpec form. A faithful computation would require those upstream Medicare benefit definitions and payment rules.
    - output: us:statutes/42/426/d#qualified_railroad_retirement_beneficiary_status_for_medicare
      reason: |-
        The definition and cessation of “qualified railroad retirement beneficiary” in subsection (d) depend on certification mechanics and underlying eligibility requirements under 45 USC 231f(d), which are not encoded. A precise month‑by‑month status predicate cannot be derived without modeling those Railroad Retirement Board determinations and their certified effective months.
    - output: us:statutes/42/426/e#widow_and_widower_disability_rules_for_hospital_insurance_entitlement
      reason: |-
        The special widow and widower rules in subsection (e) modify subsection (b) entitlement by re‑interpreting multiple Social Security provisions (sections 402(d), (e), (f), 402(j)(4), and SSI/State supplementation provisions in subchapter XVI and Public Law 93‑66) and by counting certain months toward the 24‑month disability waiting period. Without executable upstream encodings of those benefit types, disability determinations, and payment histories, these adjustments to the Medicare hospital insurance entitlement rules cannot be represented faithfully.
