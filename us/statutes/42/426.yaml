module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/426
  summary: |-
    42 USC 426 entitles certain individuals over age 65 and under age 65 to hospital insurance benefits under Medicare Part A, defines subsection (a) benefit conditions and death-month deeming, defines “qualified railroad retirement beneficiary,” and states widow/widower special rules. This aggregate composes available executable child outputs for subsection (b), subsection (c)(2) railroad death-month deeming, subsection (d), and subsection (e), while deferring unresolved cross-referenced service/payment and administrative surfaces.
  deferred_outputs:
    - output: us:statutes/42/426/a#hospital_insurance_benefits_entitlement_under_part_a
      reason: |-
        Subsection (a) depends on entitlement or deemed entitlement to monthly insurance benefits under section 402, medicare qualified government employment treatment under sections 410(p) and 410(a), and Medicare Part A hospital-insurance application rules that are not fully available as executable upstream RuleSpec context for this aggregate.
    - output: us:statutes/42/426/c#hospital_insurance_benefits_entitlement_for_subsection_a
      reason: |-
        Subsection (c)(1) defines the content of entitlement to payment under part A of subchapter XVIII for specified services, including part E service definitions and section 1395f(f) conditions for outside-United-States inpatient hospital services, which are not available as executable upstream RuleSpec context.
      source_values:
        - us:statutes/42/426/c#post_hospital_extended_care_age_attainment_threshold
    - output: us:statutes/42/426/f#medicare_waiting_period_prior_period_month_counting
      reason: |-
        Subsection (f) applies a waiting-period counting rule for disability-benefit months by reference to specified monthly benefits, section 1395p(g)(1), section 1395p(f), and 45 U.S.C. 231f(d)(2)(ii). The aggregate does not expose a completed parent-level disability waiting-period count beyond the available subsection (b) entitlement composition.
    - output: us:statutes/42/426/g#federal_employee_medicare_qualified_government_employment_information_procedures
      reason: |-
        Subsection (g) imposes an administrative duty on the Secretary and the Director of the Office of Personnel Management to prescribe and carry out informational procedures. It is not a person-level entitlement, amount, threshold, or other computable benefit rule in the current RuleSpec schema.
    - output: us:statutes/42/426/h#als_special_rule_for_subsection_b_and_subsection_f
      reason: |-
        Subsection (h) modifies subsection (b) and subsection (f) for individuals medically determined to have ALS. The aggregate does not expose a completed parent-level entitlement that integrates the ALS substitution with the subsection (b) imported entitlement window.
    - output: us:statutes/42/426/i#certain_uninsured_individuals_hospital_insurance_entitlement
      reason: |-
        Subsection (i) is a cross-reference directing readers to section 426a for entitlement of certain uninsured individuals; section 426a is not available as executable RuleSpec context.
