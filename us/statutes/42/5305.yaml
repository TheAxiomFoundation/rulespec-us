format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/5305/c/3
    source_sha256: 6d47764bbc6ab6e5daf4aa73c57440d2745821e3673153b3b471f74f9d372fa7
  summary: |-
    42 USC 5305(a) enumerates eligible activities assisted under this chapter, including public services subject to percentage limits, homeownership assistance, tornado-safe shelters, and lead-based paint hazard evaluation and reduction. 42 USC 5305(c) states when assisted activities are considered to principally benefit persons of low and moderate income, including area-benefit, housing-occupancy, and employment-based tests.
  deferred_outputs:
    - output: us:statutes/42/5305/a#eligible_activity_under_chapter
      reason: The subsection enumerates many activity categories and cross-referenced definitions; a faithful executable membership relation needs a modeled assisted-activity ontology and missing cited legal dependencies including sections 5301(c), 1437a(b)(3), 1437, 4851b, and 681(d).
    - output: us:statutes/42/5305/c#activity_principally_benefits_low_and_moderate_income_persons
      reason: The subsection defines alternative benefit tests for assisted activities but depends on activity categories, housing occupancy, employment, census-tract enterprise-zone criteria, and area-service facts not represented by a stable local relation ontology in this artifact.
