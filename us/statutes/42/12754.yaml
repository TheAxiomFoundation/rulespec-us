format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/12754
  summary: |-
    42 USC 12754(a) requires the Secretary to ensure funds under this part are not employed to carry out housing remedies or pay fines, penalties, or costs associated with actions involving adjudicated fair-housing or antidiscrimination violations, or settlements asserting such claims, except to the extent permitted by subsection (b). Subsection (b) permits a jurisdiction, in a settlement described in subsection (a)(2), to use funds under this Act to carry out housing remedies with eligible activities.
rules:
  - name: settlement_housing_remedy_use_with_eligible_activities_permitted
    kind: derived
    entity: ParticipatingJurisdiction
    dtype: Judgment
    period: Year
    source: 42 USC 12754(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/42/12754
              excerpt: "a jurisdiction may use funds provided under this Act to carry out housing remedies with eligible activities"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          settlement_entered_in_case_where_claims_of_fair_housing_or_antidiscrimination_violations_asserted_against_participating_jurisdiction
          and funds_provided_under_this_act
          and jurisdiction_uses_funds_to_carry_out_housing_remedies_with_eligible_activities

  - name: funds_employment_for_violation_action_costs_prohibited
    kind: derived
    entity: ParticipatingJurisdiction
    dtype: Judgment
    period: Year
    source: 42 USC 12754(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us/statute/42/12754
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/42/12754#settlement_housing_remedy_use_with_eligible_activities_permitted
              output: settlement_housing_remedy_use_with_eligible_activities_permitted
              hash: sha256:local
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          funds_provided_under_this_part
          and funds_employed_to_carry_out_housing_remedies_or_pay_fines_penalties_or_costs_associated_with_action
          and (
            participating_jurisdiction_adjudicated_in_violation_of_fair_housing_or_antidiscrimination_law
            or (
              settlement_entered_in_case_where_claims_of_fair_housing_or_antidiscrimination_violations_asserted_against_participating_jurisdiction
              and not settlement_housing_remedy_use_with_eligible_activities_permitted
            )
          )
