- name: reserved funds recaptured after twenty four months uninvested
  period: 2024-01
  input:
    us:statutes/42/12771#input.uninvested_reserved_funds_amount: 100000
    us:statutes/42/12771#input.months_reserved_funds_remain_uninvested: 24
  output:
    us:statutes/42/12771#reserved_funds_subject_to_recapture: holds
    us:statutes/42/12771#recaptured_reserved_funds_amount: 100000
- name: reserved funds not recaptured before twenty four months
  period: 2024-01
  input:
    us:statutes/42/12771#input.uninvested_reserved_funds_amount: 100000
    us:statutes/42/12771#input.months_reserved_funds_remain_uninvested: 23
  output:
    us:statutes/42/12771#reserved_funds_subject_to_recapture: not_holds
    us:statutes/42/12771#recaptured_reserved_funds_amount: 0
- name: direct reallocation categories and preference apply
  period: 2024-01
  input:
    us:statutes/42/12771#input.reallocation_is_to_other_participating_jurisdiction: true
    ? us:statutes/42/12771#input.reallocation_is_for_affordable_housing_developed_sponsored_or_owned_by_community_housing_development_organizations
    : true
    us:statutes/42/12771#input.reallocation_is_to_nonprofit_intermediary_organization: true
    ? us:statutes/42/12771#input.reallocation_activity_develops_capacity_of_community_housing_development_organizations_consistent_with_section_12773
    : true
    ? us:statutes/42/12771#input.reallocation_candidate_is_community_housing_development_organization_serving_jurisdiction_from_which_funds_were_recaptured
    : true
  output:
    us:statutes/42/12771#direct_reallocation_for_other_jurisdiction_chdo_affordable_housing: holds
    us:statutes/42/12771#direct_reallocation_for_nonprofit_intermediary_chdo_capacity: holds
    us:statutes/42/12771#reallocation_preference_for_chdos_serving_recaptured_funds_jurisdiction: holds
