format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/12838
  summary: |-
    The Secretary shall approve release of funds under this section only if, at least 15 days before approval and before any commitment of funds, the jurisdiction or insular area submitted a release request accompanied by a certification meeting subsection (c). For assistance to units of general local government from a State, the State performs the Secretary's subsection (b) actions, and that performance is deemed to satisfy the referenced Secretary responsibilities.
rules:
  - name: home_release_request_minimum_days_before_approval
    kind: parameter
    dtype: Count
    source: 42 USC 12838(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/12838
              excerpt: "at least 15 days prior to such approval"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          15

  - name: release_of_funds_approval_prerequisites_satisfied
    kind: derived
    entity: ReleaseOfFunds
    dtype: Judgment
    period: Day
    source: 42 USC 12838(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/42/12838
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/42/12838#home_release_request_minimum_days_before_approval
              output: home_release_request_minimum_days_before_approval
              hash: sha256:local
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          release_request_submitted_by_jurisdiction_or_insular_area
          and days_between_release_request_and_approval >= home_release_request_minimum_days_before_approval
          and release_request_submitted_before_commitment_of_funds_to_projects
          and release_request_accompanied_by_certification_meeting_subsection_c

  - name: state_performance_deemed_to_satisfy_secretary_responsibilities
    kind: derived
    entity: Assistance
    dtype: Judgment
    period: Day
    source: 42 USC 12838(d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/42/12838
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          assistance_is_to_unit_of_general_local_government_from_state
          and state_performed_secretary_actions_described_in_subsection_b
