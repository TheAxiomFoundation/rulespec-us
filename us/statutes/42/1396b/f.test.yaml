- name: income_limit_rounds_up_and_income_exceeds
  period:
    period_kind: custom
    name: calendar_year
    start: '2024-01-01'
    end: '2024-12-31'
  input:
    ? us:statutes/42/1396b/f#input.highest_amount_ordinarily_paid_to_family_without_income_or_resources_under_state_part_a_subchapter_iv_plan
    : 900
    us:statutes/42/1396b/f#input.secretary_adjusts_for_uniform_maximum_limits_payments_to_families_of_more_than_one_size: false
    us:statutes/42/1396b/f#input.secretary_adjusted_applicable_income_limitation: 0
    us:statutes/42/1396b/f#input.family_annual_income: 1500
    us:statutes/42/1396b/f#input.family_medical_or_remedial_care_costs_incurred: 100
    us:statutes/42/1396b/f#input.state_option_excludes_family_amount_paid_to_state: false
    us:statutes/42/1396b/f#input.family_amount_paid_to_state_for_spenddown: 0
  output:
    us:statutes/42/1396b/f#applicable_income_limitation: 1200
    us:statutes/42/1396b/f#family_income_for_payment_limitation: 1400
    us:statutes/42/1396b/f#family_income_exceeds_applicable_income_limitation: holds
- name: spenddown_payment_reduces_income_below_limit
  period:
    period_kind: custom
    name: calendar_year
    start: '2024-01-01'
    end: '2024-12-31'
  input:
    ? us:statutes/42/1396b/f#input.highest_amount_ordinarily_paid_to_family_without_income_or_resources_under_state_part_a_subchapter_iv_plan
    : 900
    us:statutes/42/1396b/f#input.secretary_adjusts_for_uniform_maximum_limits_payments_to_families_of_more_than_one_size: false
    us:statutes/42/1396b/f#input.secretary_adjusted_applicable_income_limitation: 0
    us:statutes/42/1396b/f#input.family_annual_income: 1500
    us:statutes/42/1396b/f#input.family_medical_or_remedial_care_costs_incurred: 100
    us:statutes/42/1396b/f#input.state_option_excludes_family_amount_paid_to_state: true
    us:statutes/42/1396b/f#input.family_amount_paid_to_state_for_spenddown: 400
    us:statutes/42/1396b/f#input.state_expenditures_for_which_medical_assistance_is_available_under_subsection_a_1: 2000
  output:
    us:statutes/42/1396b/f#family_income_for_payment_limitation: 1000
    us:statutes/42/1396b/f#family_income_exceeds_applicable_income_limitation: not_holds
    us:statutes/42/1396b/f#state_medical_assistance_expenditures_after_family_payment_reduction: 1600
