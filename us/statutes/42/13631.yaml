format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/13631
  summary: |-
    42 USC 13631 requires service coordinators for covered federally assisted housing projects when amounts are made available, provides that no elderly or disabled family may be required to accept services, defines "covered federally assisted housing" by reference to section 13641(2) with specified exclusions, and requires telemarketing-fraud education and outreach standards for service coordinators in federally assisted housing.
  deferred_outputs:
    - output: us:statutes/42/13631/d#covered_federally_assisted_housing
      reason: 42 USC 13631(d) defines covered federally assisted housing by incorporating federally assisted housing as defined in missing section 13641(2) and excluding subparagraphs (C) and (D) of that section. The upstream definition and excluded categories are not available in copied RuleSpec context, so the definition cannot be computed faithfully here.
    - output: us:statutes/42/13631/b#service_coordinator_minimum_qualification_compliance
      reason: 42 USC 13631(b)(4) requires service coordinators to meet qualifications and standards under missing section 8011(d)(4), and no copied RuleSpec context provides that referenced qualification standard.
rules:
  - name: family_may_be_required_to_accept_supportive_services
    kind: derived
    entity: Family
    dtype: Judgment
    period: Month
    source: 42 USC 13631(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us/statute/42/13631
              excerpt: No such elderly or disabled family may be required to accept services.
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          false

  - name: telemarketing_fraud_education_outreach_meets_required_standards
    kind: derived
    entity: ServiceCoordinatorEducationOutreach
    dtype: Judgment
    period: Year
    source: 42 USC 13631(f)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/42/13631
              excerpt: service coordinators in federally assisted housing who are providing education and outreach to elderly persons
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us/statute/42/13631
              excerpt: informs such elderly persons of the dangers of telemarketing fraud and facilitates the investigation and prosecution
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us/statute/42/13631
              excerpt: The standards established under this subsection shall require that any such education and outreach be provided in a manner that
