format: rulespec/v1
imports:
  - us:statutes/42/415/b#average_indexed_monthly_earnings
  - us:policies/ssa/pia-bend-points/2026#first_pia_bend_point
  - us:policies/ssa/pia-bend-points/2026#second_pia_bend_point
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/415/a
  summary: |-
    For individuals covered by the post-1978 PIA formula, the primary insurance amount equals 90 percent of AIME through the first bend point, plus 32 percent of AIME between the first and second bend points, plus 15 percent of AIME above the second bend point. The result is rounded down, if needed, to the next lower multiple of $0.10, then increased under subsection (i).
rules:
  - name: first_pia_formula_factor
    kind: parameter
    dtype: Rate
    source: 42 USC 415(a)(1)(A)(i)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/42/415/a/1
              excerpt: "90 percent of the individual's average indexed monthly earnings"
    versions:
      - effective_from: '1979-01-01'
        formula: |-
          0.90
  - name: second_pia_formula_factor
    kind: parameter
    dtype: Rate
    source: 42 USC 415(a)(1)(A)(ii)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/42/415/a/1
              excerpt: "32 percent of the individual's average indexed monthly earnings"
    versions:
      - effective_from: '1979-01-01'
        formula: |-
          0.32
  - name: third_pia_formula_factor
    kind: parameter
    dtype: Rate
    source: 42 USC 415(a)(1)(A)(iii)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/42/415/a/1
              excerpt: "15 percent of the individual's average indexed monthly earnings"
    versions:
      - effective_from: '1979-01-01'
        formula: |-
          0.15
  - name: pia_rounding_multiple
    kind: parameter
    dtype: Money
    unit: USD
    source: 42 USC 415(a)(1)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/42/415/a/1
              excerpt: "if not a multiple of $0.10"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/415/a/1
              excerpt: "to the next lower multiple of $0.10"
    versions:
      - effective_from: '1979-01-01'
        formula: |-
          0.10
  - name: aime_in_first_pia_segment
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: USD
    source: 42 USC 415(a)(1)(A)(i)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/415/a/1
              excerpt: "to the extent that such earnings do not exceed the amount established for purposes of this clause"
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/42/415/b#average_indexed_monthly_earnings
              output: average_indexed_monthly_earnings
              hash: sha256:27fa5eb3bb8e437cfdf12283d133bca9241c321e7b50f6fc46e66ca3a147ea98
          - path: versions[0].formula
            kind: import
            import:
              target: us:policies/ssa/pia-bend-points/2026#first_pia_bend_point
              output: first_pia_bend_point
              hash: sha256:dd39d3ceda711c0eca7e2a752561c368efd59d64dbf35343b16d1cd5e7c882e0
    versions:
      - effective_from: '1979-01-01'
        formula: |-
          min(average_indexed_monthly_earnings, first_pia_bend_point)
  - name: aime_in_second_pia_segment
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: USD
    source: 42 USC 415(a)(1)(A)(ii)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/415/a/1
              excerpt: "to the extent that such earnings exceed the amount established for purposes of clause (i) but do not exceed the amount established for purposes of this clause"
          - path: versions[0].formula
            kind: import
            import:
              target: us:policies/ssa/pia-bend-points/2026#first_pia_bend_point
              output: first_pia_bend_point
              hash: sha256:dd39d3ceda711c0eca7e2a752561c368efd59d64dbf35343b16d1cd5e7c882e0
          - path: versions[0].formula
            kind: import
            import:
              target: us:policies/ssa/pia-bend-points/2026#second_pia_bend_point
              output: second_pia_bend_point
              hash: sha256:dd39d3ceda711c0eca7e2a752561c368efd59d64dbf35343b16d1cd5e7c882e0
    versions:
      - effective_from: '1979-01-01'
        formula: |-
          min(
              max(average_indexed_monthly_earnings - first_pia_bend_point, 0),
              second_pia_bend_point - first_pia_bend_point
          )
  - name: aime_in_third_pia_segment
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: USD
    source: 42 USC 415(a)(1)(A)(iii)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/415/a/1
              excerpt: "to the extent that such earnings exceed the amount established for purposes of clause (ii)"
          - path: versions[0].formula
            kind: import
            import:
              target: us:policies/ssa/pia-bend-points/2026#second_pia_bend_point
              output: second_pia_bend_point
              hash: sha256:dd39d3ceda711c0eca7e2a752561c368efd59d64dbf35343b16d1cd5e7c882e0
    versions:
      - effective_from: '1979-01-01'
        formula: |-
          max(average_indexed_monthly_earnings - second_pia_bend_point, 0)
  - name: unrounded_primary_insurance_amount
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: USD
    source: 42 USC 415(a)(1)(A)(i)-(iii)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/415/a/1
              excerpt: "be equal to the sum of"
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/42/415/a#aime_in_first_pia_segment
              output: aime_in_first_pia_segment
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/42/415/a#aime_in_second_pia_segment
              output: aime_in_second_pia_segment
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/42/415/a#aime_in_third_pia_segment
              output: aime_in_third_pia_segment
              hash: sha256:local
    versions:
      - effective_from: '1979-01-01'
        formula: |-
          first_pia_formula_factor * aime_in_first_pia_segment
          + second_pia_formula_factor * aime_in_second_pia_segment
          + third_pia_formula_factor * aime_in_third_pia_segment
  - name: primary_insurance_amount
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: USD
    source: 42 USC 415(a)(1)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/415/a/1
              excerpt: "rounded, if not a multiple of $0.10, to the next lower multiple of $0.10"
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/42/415/a#unrounded_primary_insurance_amount
              output: unrounded_primary_insurance_amount
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/42/415/a#pia_rounding_multiple
              output: pia_rounding_multiple
              hash: sha256:local
    versions:
      - effective_from: '1979-01-01'
        formula: |-
          floor(unrounded_primary_insurance_amount / pia_rounding_multiple) * pia_rounding_multiple
