- name: old_age_aime_never_uses_fewer_than_two_benefit_computation_years
  period:
    period_kind: custom
    name: calendar_year
    start: '1984-01-01'
    end: '1984-12-31'
  input:
    us:statutes/42/415/b#input.year_of_death_or_later_sentinel: 9999
    us:statutes/42/415/b#input.year_individual_attained_age_62: 1984
    us:statutes/42/415/b#input.year_individual_attained_age_21: 1981
    # Calendar years after 1981 and before 1984 number 2
    # (1982 and 1983); max(2, 2 - 5) = 2. Eligibility falls after
    # the 1979 amendments, inside every parameter's effective range.
    # Indexing is neutral (all computation base years follow the
    # 1980 indexing year). Highest two adjusted years sum to 24,023;
    # AIME is floor(24,023 / (12 * 2)) = floor(1,000.958...) = 1,000.
    # A round-half reading would give 1,001, so this case pins
    # 415(e)(2)'s reduction to the next LOWER dollar, not nearest.
    us:statutes/42/415/b#input.indexing_year_for_aime: 1980
    us:statutes/42/415/b#input.national_average_wage_index_for_indexing_year: 1
    us:statutes/42/415/b#input.computation_base_year:
      - 1982
      - 1983
      - 1984
    us:statutes/42/415/b#input.national_average_wage_index_for_computation_base_year:
      - 1
      - 1
      - 1
    us:statutes/42/415/b#input.creditable_earnings_for_computation_base_year:
      - 12023
      - 12000
      - 1
  output:
    us:statutes/42/415/b#elapsed_years_for_old_age_benefit_computation: 2
    us:statutes/42/415/b#old_age_benefit_computation_year_count: 2
    us:statutes/42/415/b#old_age_benefit_computation_year_earnings_total: 24023
    us:statutes/42/415/b#average_indexed_monthly_earnings: 1000
- name: old_age_aime_applies_wage_indexing_end_to_end
  period:
    period_kind: custom
    name: calendar_year
    start: '2000-01-01'
    end: '2000-12-31'
  input:
    us:statutes/42/415/b#input.year_of_death_or_later_sentinel: 9999
    us:statutes/42/415/b#input.year_individual_attained_age_62: 2000
    us:statutes/42/415/b#input.year_individual_attained_age_21: 1990
    # Calendar years after 1990 and before 2000 number 9; max(2,
    # 9 - 5) = 4 benefit computation years. Nominal earnings for
    # 1991-1998 are set to 0.6 x that year's wage index, so each
    # indexes to exactly 0.6 x 17,000 = 10,200 (1998 equals the
    # indexing year and takes the indexed branch with ratio one);
    # 1999-2000 follow the indexing year and enter nominal. Top 4 =
    # 11,000 + 3 x 10,200 = 41,600; AIME = floor(41,600 / 48) = 866.
    # Unindexed nominal earnings would give top 4 = 11,000 + 10,200
    # + 9,600 + 8,700 = 39,500 -> 822, so this case fails if the
    # 415(b)(3) adjustment is skipped; round-half division would
    # give 867, so it also pins the 415(e)(2) floor.
    us:statutes/42/415/b#input.indexing_year_for_aime: 1998
    us:statutes/42/415/b#input.national_average_wage_index_for_indexing_year: 17000
    us:statutes/42/415/b#input.computation_base_year:
      - 1991
      - 1992
      - 1993
      - 1994
      - 1995
      - 1996
      - 1997
      - 1998
      - 1999
      - 2000
    us:statutes/42/415/b#input.national_average_wage_index_for_computation_base_year:
      - 10000
      - 10500
      - 11000
      - 12000
      - 13000
      - 14500
      - 16000
      - 17000
      - 1
      - 1
    us:statutes/42/415/b#input.creditable_earnings_for_computation_base_year:
      - 6000
      - 6300
      - 6600
      - 7200
      - 7800
      - 8700
      - 9600
      - 10200
      - 11000
      - 0
  output:
    us:statutes/42/415/b#elapsed_years_for_old_age_benefit_computation: 9
    us:statutes/42/415/b#old_age_benefit_computation_year_count: 4
    us:statutes/42/415/b#old_age_benefit_computation_year_earnings_total: 41600
    us:statutes/42/415/b#average_indexed_monthly_earnings: 866
- name: indexing_applies_only_through_the_aime_indexing_year
  period:
    period_kind: custom
    name: calendar_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    # Before or during the indexing year: 10,000 * 60,000 / 30,000 = 20,000.
    us:statutes/42/415/b#input.computation_base_year: 2024
    us:statutes/42/415/b#input.indexing_year_for_aime: 2024
    us:statutes/42/415/b#input.creditable_earnings_for_computation_base_year: 10000
    us:statutes/42/415/b#input.national_average_wage_index_for_indexing_year: 60000
    us:statutes/42/415/b#input.national_average_wage_index_for_computation_base_year: 30000
  output:
    us:statutes/42/415/b#indexed_creditable_earnings_for_computation_base_year: 20000
- name: post_indexing_year_earnings_are_unindexed
  period:
    period_kind: custom
    name: calendar_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    # After the indexing year, subsection (b)(3)(B) leaves earnings unadjusted.
    us:statutes/42/415/b#input.computation_base_year: 2025
    us:statutes/42/415/b#input.indexing_year_for_aime: 2024
    us:statutes/42/415/b#input.creditable_earnings_for_computation_base_year: 10000
    us:statutes/42/415/b#input.national_average_wage_index_for_indexing_year: 60000
    us:statutes/42/415/b#input.national_average_wage_index_for_computation_base_year: 30000
  output:
    us:statutes/42/415/b#indexed_creditable_earnings_for_computation_base_year: 10000
