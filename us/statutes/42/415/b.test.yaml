- name: old_age_aime_uses_elapsed_years_minus_five_dropout_years
  period:
    period_kind: custom
    name: calendar_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    us:statutes/42/415/b#input.year_of_death_or_later_sentinel: 9999
    us:statutes/42/415/b#input.year_individual_attained_age_62: 2026
    us:statutes/42/415/b#input.year_individual_attained_age_21: 1985
    # Calendar years after attaining age 21 (1985) and before
    # attaining age 62 (2026) number 2026 - 1985 - 1 = 40; 40 - 5
    # dropout years = 35 benefit computation years. Indexing is
    # neutral here (every computation base year 1986-2026 follows the
    # 1985 indexing year, so earnings enter nominal); the highest 35
    # of the 36 years at 96,000 total 35 * 96,000 = 3,360,000, and
    # AIME is floor(3,360,000 / (12 * 35)) = 8,000. The end-to-end
    # indexing case below exercises the 415(b)(3) adjustment.
    us:statutes/42/415/b#input.indexing_year_for_aime: 1985
    us:statutes/42/415/b#input.national_average_wage_index_for_indexing_year: 1
