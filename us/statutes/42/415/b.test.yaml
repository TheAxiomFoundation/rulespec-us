- name: old_age_aime_uses_elapsed_years_minus_five_dropout_years
  period:
    period_kind: custom
    name: calendar_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    us:statutes/42/415/b#input.year_of_death_or_later_sentinel: 9999
    us:statutes/42/415/b#input.year_individual_attained_age_62: 2026
    us:statutes/42/415/b#input.year_individual_attained_age_21: 1985
    # Elapsed years are 2026 - 1985 = 41; 41 - 5 dropout years = 36.
    # With selected indexed earnings of 36 * 12 * 8,000 = 3,456,000,
    # AIME is floor(3,456,000 / (12 * 36)) = 8,000.
    us:statutes/42/415/b#input.indexed_creditable_annual_earnings:
      - 96000
      - 96000
      - 96000
      - 96000
      - 96000
      - 96000
      - 96000
      - 96000
      - 96000
      - 96000
      - 96000
      - 96000
      - 96000
      - 96000
      - 96000
      - 96000
      - 96000
      - 96000
      - 96000
      - 96000
      - 96000
      - 96000
      - 96000
      - 96000
      - 96000
      - 96000
      - 96000
      - 96000
      - 96000
      - 96000
      - 96000
      - 96000
      - 96000
      - 96000
      - 96000
      - 96000
      - 12000
      - 6000
      - 0
      - 0
      - 0
  output:
    us:statutes/42/415/b#elapsed_years_for_old_age_benefit_computation: 41
    us:statutes/42/415/b#old_age_benefit_computation_year_count: 36
    us:statutes/42/415/b#old_age_benefit_computation_year_earnings_total: 3456000
    us:statutes/42/415/b#average_indexed_monthly_earnings: 8000
- name: old_age_aime_never_uses_fewer_than_two_benefit_computation_years
  period:
    period_kind: custom
    name: calendar_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    us:statutes/42/415/b#input.year_of_death_or_later_sentinel: 9999
    us:statutes/42/415/b#input.year_individual_attained_age_62: 1954
    us:statutes/42/415/b#input.year_individual_attained_age_21: 1951
    # Elapsed years are 1954 - 1951 = 3; max(2, 3 - 5) = 2.
    # Highest two adjusted years sum to 24,001; AIME is
    # floor(24,001 / (12 * 2)) = floor(1,000.0416...) = 1,000.
    us:statutes/42/415/b#input.indexed_creditable_annual_earnings:
      - 12001
      - 12000
      - 1
  output:
    us:statutes/42/415/b#elapsed_years_for_old_age_benefit_computation: 3
    us:statutes/42/415/b#old_age_benefit_computation_year_count: 2
    us:statutes/42/415/b#old_age_benefit_computation_year_earnings_total: 24001
    us:statutes/42/415/b#average_indexed_monthly_earnings: 1000
- name: indexing_applies_only_through_the_aime_indexing_year
  period:
    period_kind: custom
    name: calendar_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    # Before or during the indexing year: 10,000 * 60,000 / 30,000 = 20,000.
    us:statutes/42/415/b#input.computation_base_year: 2024
    us:statutes/42/415/b#input.indexing_year_for_aime: 2024
    us:statutes/42/415/b#input.creditable_earnings_for_computation_base_year: 10000
    us:statutes/42/415/b#input.national_average_wage_index_for_indexing_year: 60000
    us:statutes/42/415/b#input.national_average_wage_index_for_computation_base_year: 30000
  output:
    us:statutes/42/415/b#indexed_creditable_earnings_for_computation_base_year: 20000
- name: post_indexing_year_earnings_are_unindexed
  period:
    period_kind: custom
    name: calendar_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    # After the indexing year, subsection (b)(3)(B) leaves earnings unadjusted.
    us:statutes/42/415/b#input.computation_base_year: 2025
    us:statutes/42/415/b#input.indexing_year_for_aime: 2024
    us:statutes/42/415/b#input.creditable_earnings_for_computation_base_year: 10000
    us:statutes/42/415/b#input.national_average_wage_index_for_indexing_year: 60000
    us:statutes/42/415/b#input.national_average_wage_index_for_computation_base_year: 30000
  output:
    us:statutes/42/415/b#indexed_creditable_earnings_for_computation_base_year: 10000
