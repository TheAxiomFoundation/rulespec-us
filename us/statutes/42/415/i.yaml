format: rulespec/v1
imports:
  - us:statutes/42/415/a#primary_insurance_amount
  - us:policies/ssa/cola/2026#social_security_cola_2026_applicable_increase_percentage
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/415/i
    corpus_citation_paths:
      - us/statute/42/415/i
      - us/statute/42/415/i/2
  summary: |-
    When the Commissioner determines that a base quarter is a cost-of-living computation quarter, the primary insurance amount is increased effective with December by applying the applicable increase percentage. The resulting amount is decreased to the next lower multiple of $0.10 if needed. This module imports the 2026 SSA COLA percentage as an operational parameter.
rules:
  - name: cola_pia_rounding_multiple
    kind: parameter
    dtype: Money
    unit: USD
    source: 42 USC 415(i)(2)(A)(ii)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/42/415/i/2
              excerpt: "not a multiple of $0.10"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/415/i/2
              excerpt: "decreased to the next lower multiple of $0.10"
    versions:
      - effective_from: '1975-01-01'
        formula: |-
          0.10
  - name: unrounded_pia_after_cost_of_living_increase
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: USD
    source: 42 USC 415(i)(2)(A)(ii)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/42/415/i/2
              excerpt: "determines that the base quarter in any year is a cost-of-living computation quarter"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/415/i/2
              excerpt: "the primary insurance amount of each other individual"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/415/i/2
              excerpt: "by multiplying each of the amounts described"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/415/i/2
              excerpt: "by the applicable increase percentage"
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/42/415/a#primary_insurance_amount
              output: primary_insurance_amount
              hash: sha256:bf244b9460ead81724d135bb1f806a1ffb45ebc2e04bfdc33f1175ea28357221
          - path: versions[0].formula
            kind: import
            import:
              target: us:policies/ssa/cola/2026#social_security_cola_2026_applicable_increase_percentage
              output: social_security_cola_2026_applicable_increase_percentage
              hash: sha256:5249208f72f03e3909eaa93bb59bf8a6bd6a68b89b5a4ddead2a6859b34af775
    versions:
      - effective_from: '1975-01-01'
        formula: |-
          primary_insurance_amount
          * (1 + social_security_cola_2026_applicable_increase_percentage)
  - name: primary_insurance_amount_after_cost_of_living_increase
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: USD
    source: 42 USC 415(i)(2)(A)(ii)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/415/i/2
              excerpt: "any amount so increased that is not a multiple of $0.10"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/415/i/2
              excerpt: "shall be decreased to the next lower multiple of $0.10"
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/42/415/i#unrounded_pia_after_cost_of_living_increase
              output: unrounded_pia_after_cost_of_living_increase
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/42/415/i#cola_pia_rounding_multiple
              output: cola_pia_rounding_multiple
              hash: sha256:local
    versions:
      - effective_from: '1975-01-01'
        formula: |-
          floor(unrounded_pia_after_cost_of_living_increase / cola_pia_rounding_multiple) * cola_pia_rounding_multiple
