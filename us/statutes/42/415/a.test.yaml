      - 12000
      - 12000
      - 12000
      - 12000
      - 12000
      - 12000
    # PIA = 0.9 * 1,000 = 900, already a multiple of $0.10.
  output:
    us:statutes/42/415/a#aime_in_first_pia_segment: 1000
    us:statutes/42/415/a#aime_in_second_pia_segment: 0
    us:statutes/42/415/a#aime_in_third_pia_segment: 0
    us:statutes/42/415/a#unrounded_primary_insurance_amount: 900
    us:statutes/42/415/a#primary_insurance_amount: 900
