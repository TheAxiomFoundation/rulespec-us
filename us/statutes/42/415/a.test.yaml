- name: pia_formula_uses_2026_bend_points_and_rounds_down_to_dime
  period:
    period_kind: custom
    name: calendar_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    us:statutes/42/415/b#input.year_of_death_or_later_sentinel: 9999
    us:statutes/42/415/b#input.year_individual_attained_age_62: 2026
    us:statutes/42/415/b#input.year_individual_attained_age_21: 1985
    # Section 415(b) inputs yield AIME = 8,000:
    # 36 selected years * 96,000 / (12 * 36) = 8,000.
    us:statutes/42/415/b#input.indexed_creditable_annual_earnings:
      - 96000
      - 96000
      - 96000
      - 96000
      - 96000
      - 96000
      - 96000
      - 96000
      - 96000
      - 96000
      - 96000
      - 96000
      - 96000
      - 96000
      - 96000
      - 96000
      - 96000
      - 96000
      - 96000
      - 96000
      - 96000
      - 96000
      - 96000
      - 96000
      - 96000
      - 96000
      - 96000
      - 96000
      - 96000
      - 96000
      - 96000
      - 96000
      - 96000
      - 96000
      - 96000
      - 96000
      - 12000
      - 6000
      - 0
      - 0
      - 0
    # With 2026 bend points 1,286 and 7,749:
    # first segment = 1,286; second = 7,749 - 1,286 = 6,463;
    # third = 8,000 - 7,749 = 251.
    # PIA = 0.9*1,286 + 0.32*6,463 + 0.15*251
    # = 1,157.40 + 2,068.16 + 37.65 = 3,263.21,
    # rounded down to the next lower $0.10 = 3,263.20.
  output:
    us:statutes/42/415/a#aime_in_first_pia_segment: 1286
    us:statutes/42/415/a#aime_in_second_pia_segment: 6463
    us:statutes/42/415/a#aime_in_third_pia_segment: 251
    us:statutes/42/415/a#unrounded_primary_insurance_amount: 3263.21
    us:statutes/42/415/a#primary_insurance_amount: 3263.20
- name: pia_formula_has_no_second_or_third_segment_below_first_bend_point
  period:
    period_kind: custom
    name: calendar_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    us:statutes/42/415/b#input.year_of_death_or_later_sentinel: 9999
    us:statutes/42/415/b#input.year_individual_attained_age_62: 2026
    us:statutes/42/415/b#input.year_individual_attained_age_21: 1985
    # AIME = 1,000 from 36 selected years * 12,000 / (12 * 36).
    us:statutes/42/415/b#input.indexed_creditable_annual_earnings:
      - 12000
      - 12000
      - 12000
