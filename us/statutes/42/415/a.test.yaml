# The 415(a) PIA formula outputs (segment splits and the rounded /
# unrounded primary insurance amount) all consume
# average_indexed_monthly_earnings, which 42 USC 415(b) computes with
# the engine's sum_top_n_over_periods over-periods reduction. That
# reduction is valid only under lifetime execution, which the
# per-period companion-test harness does not drive, so those derived
# outputs cannot be asserted here (listed in
# known-validation-gaps.yaml#uncovered_derived_rules, tracked by
# TheAxiomFoundation/axiom-encode#1036). The bend-point PIA arithmetic
# is verified by hand in the module: for AIME = 8,000 and the 2026
# bend points 1,286 / 7,749, PIA = 0.9*1,286 + 0.32*6,463 + 0.15*251
# = 3,263.21, rounded down to 3,263.20. The statutory percentage
# parameters are asserted below.
- name: pia_formula_factors_are_ninety_thirty_two_and_fifteen_percent
  period:
    period_kind: custom
    name: calendar_year
    start: '2026-01-01'
    end: '2026-12-31'
  input: {}
  output:
    us:statutes/42/415/a#first_pia_formula_factor: 0.90
    us:statutes/42/415/a#second_pia_formula_factor: 0.32
    us:statutes/42/415/a#third_pia_formula_factor: 0.15
    us:statutes/42/415/a#pia_rounding_multiple: 0.10
