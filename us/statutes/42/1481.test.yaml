- name: direct_loan_obligation_all_requirements_hold
  period:
    period_kind: custom
    name: calendar_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    us:statutes/42/1481#input.obligation_is_note_or_other_obligation: true
    us:statutes/42/1481#input.obligation_is_issued_by_secretary: true
    us:statutes/42/1481#input.obligation_is_for_purchase_by_secretary_of_treasury: true
    us:statutes/42/1481#input.obligation_is_for_making_direct_loans_under_this_subchapter: true
    us:statutes/42/1481#input.obligation_secured_by_obligations_of_borrowers: true
    us:statutes/42/1481#input.obligation_secured_by_secretary_commitments_to_make_contributions_under_this_subchapter: true
    us:statutes/42/1481#input.obligation_repaid_from_borrower_principal_and_interest_payments: true
    us:statutes/42/1481#input.obligation_repaid_from_funds_appropriated_hereunder: true
    us:statutes/42/1481#input.obligation_form_and_denomination_prescribed_by_secretary: true
    us:statutes/42/1481#input.obligation_maturity_prescribed_by_secretary: true
    us:statutes/42/1481#input.obligation_terms_and_conditions_prescribed_by_secretary: true
    us:statutes/42/1481#input.secretary_of_treasury_approved_prescribed_terms: true
    us:statutes/42/1481#input.interest_rate_is_average_rate_determined_by_secretary_of_treasury: true
    ? us:statutes/42/1481#input.average_rate_is_payable_by_treasury_on_marketable_public_obligations_outstanding_at_fiscal_year_start
    : true
    us:statutes/42/1481#input.treasury_public_obligations_neither_due_nor_callable_for_redemption_years: 15
    us:statutes/42/1481#input.obligation_is_issued_by_secretary_under_this_section: true
    us:statutes/42/1481#input.obligation_was_acquired_by_secretary_of_treasury_under_this_section: true
    us:statutes/42/1481#input.transaction_is_redemption_purchase_or_sale_by_secretary_of_treasury: true
    us:statutes/42/1481#input.transaction_involves_note_or_obligation_issued_under_this_section: true
  output:
    us:statutes/42/1481#secretary_direct_loan_obligation_issuance_authorized: holds
    us:statutes/42/1481#secretary_direct_loan_obligation_required_security_satisfied: holds
    us:statutes/42/1481#secretary_direct_loan_obligation_required_repayment_sources_satisfied: holds
    us:statutes/42/1481#secretary_direct_loan_obligation_terms_prescribed_with_treasury_approval: holds
    us:statutes/42/1481#secretary_direct_loan_obligation_interest_rate_basis_satisfied: holds
    us:statutes/42/1481#treasury_purchase_of_secretary_direct_loan_obligation_authorized: holds
    us:statutes/42/1481#treasury_sale_of_acquired_secretary_obligation_authorized: holds
    us:statutes/42/1481#treasury_obligation_transaction_treated_as_public_debt_transaction: holds
- name: issuance_not_authorized_when_not_for_direct_loans
  period:
    period_kind: custom
    name: calendar_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    us:statutes/42/1481#input.obligation_is_note_or_other_obligation: true
    us:statutes/42/1481#input.obligation_is_issued_by_secretary: true
    us:statutes/42/1481#input.obligation_is_for_purchase_by_secretary_of_treasury: true
    us:statutes/42/1481#input.obligation_is_for_making_direct_loans_under_this_subchapter: false
  output:
    us:statutes/42/1481#secretary_direct_loan_obligation_issuance_authorized: not_holds
- name: interest_rate_basis_fails_when_redemption_horizon_differs
  period:
    period_kind: custom
    name: calendar_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    us:statutes/42/1481#input.interest_rate_is_average_rate_determined_by_secretary_of_treasury: true
    ? us:statutes/42/1481#input.average_rate_is_payable_by_treasury_on_marketable_public_obligations_outstanding_at_fiscal_year_start
    : true
    us:statutes/42/1481#input.treasury_public_obligations_neither_due_nor_callable_for_redemption_years: 14
  output:
    us:statutes/42/1481#secretary_direct_loan_obligation_interest_rate_basis_satisfied: not_holds
