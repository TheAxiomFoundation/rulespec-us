format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/1437a/b
  summary: |-
    42 USC 1437a(b) excludes from "rental payments" imputed return on assets except to the extent net family assets exceed $50,000 as annually inflation-adjusted by the Secretary, Social Security Act section 1613(a)(7)-eligible amounts, specified deferred VA disability benefits, aid-and-attendance expenses under 38 USC 1521, and exclusions established by the Secretary or required by Federal law.
rules:
  - name: imputed_return_net_family_assets_statutory_base_threshold
    kind: parameter
    dtype: Money
    unit: USD
    source: 42 USC 1437a(b)(B)(i)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/42/1437a/b
              excerpt: "net family assets exceed $50,000"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          50000

  - name: amount_excluded_from_rental_payments
    kind: derived
    entity: Payment
    dtype: Money
    period: Year
    unit: USD
    source: 42 USC 1437a(b)(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/42/1437a/b
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          if (payment_amount_is_imputed_return_on_assets and not net_family_assets_exceed_secretary_adjusted_imputed_return_exclusion_threshold) or amount_eligible_for_exclusion_under_social_security_act_1613_a_7 or amount_is_deferred_va_disability_benefits_received_in_lump_sum_or_prospective_monthly_amounts or amount_is_expense_related_to_aid_and_attendance_under_38_usc_1521_to_veteran_in_need_regular_aid_and_attendance or amount_excluded_from_income_by_secretary_regulation_or_notice or amount_required_by_federal_law_to_be_excluded_from_income: payment_amount else: 0
