format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/1490a/d
  summary: |-
    In utilizing rental assistance payments authority, the Secretary shall first make assistance available in existing projects for low-income occupied units to extend expiring contracts or provide necessary additional assistance for the full amount authorized under existing contracts; remaining authority is then directed to post-fiscal-year-1983 section 1484, 1485, or 1486 commitments for very-low-income occupancy, with not more than 5 percent assisted units occupied by low-income persons who are not very-low-income; remaining authority may be used for further assistance to existing projects under those sections. The Secretary shall transfer unused authority after initial rentup when not needed because of lack of eligible tenants to projects where needed.
  deferred_outputs:
    - output: us:statutes/42/1490a/d#remaining_authority_use_for_section_1484_1485_1486_projects_after_fiscal_year_1983
      reason: Requires determining whether a project receives commitments under 42 USC 1484, 1485, or 1486 and related project eligibility mechanics; those cited RuleSpec sources are not copied in context.
    - output: us:statutes/42/1490a/d#further_assistance_to_existing_section_1484_1485_1486_projects_allowed
      reason: Requires determining existing-project status under 42 USC 1484, 1485, or 1486; those cited RuleSpec sources are not copied in context.
rules:
  - name: maximum_share_of_assisted_units_occupied_by_low_income_not_very_low_income
    kind: parameter
    dtype: Rate
    source: 42 USC 1490a(d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/1490a/d
              excerpt: "not more than 5 percent of the units assisted"
    versions:
      - effective_from: '1961-01-01'
        formula: |-
          0.05

  - name: existing_project_contract_assistance_must_be_made_available
    kind: derived
    entity: Project
    dtype: Judgment
    period: Month
    source: 42 USC 1490a(d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/42/1490a/d
    versions:
      - effective_from: '1961-01-01'
        formula: |-
          project_is_existing
          and unit_occupied_by_low_income_family_or_person
          and (assistance_extends_expiring_contracts or assistance_provides_additional_assistance_necessary_for_full_amount_authorized_pursuant_to_existing_contracts)

  - name: low_income_not_very_low_income_assisted_unit_share_within_limit
    kind: derived
    entity: Project
    dtype: Judgment
    period: Month
    source: 42 USC 1490a(d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/1490a/d
              excerpt: "not more than 5 percent of the units assisted may be occupied by low income families or persons who are not very low-income"
    versions:
      - effective_from: '1961-01-01'
        formula: |-
          share_of_assisted_units_occupied_by_low_income_families_or_persons_who_are_not_very_low_income <= maximum_share_of_assisted_units_occupied_by_low_income_not_very_low_income

  - name: rental_assistance_contract_authority_transfer_required
    kind: derived
    entity: Project
    dtype: Judgment
    period: Month
    source: 42 USC 1490a(d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/42/1490a/d
    versions:
      - effective_from: '1961-01-01'
        formula: |-
          rental_assistance_contract_authority_unused_after_initial_rentup
          and rental_assistance_contract_authority_not_needed_because_lack_of_eligible_tenants_in_area
          and other_project_needs_rental_assistance_contract_authority
