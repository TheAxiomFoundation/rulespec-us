- name: lease_satisfies_one_year_minimum
  period:
    period_kind: custom
    name: calendar_year
    start: '2024-01-01'
    end: '2024-12-31'
  input:
    us:statutes/42/12755#input.lease_term_years: 1
    us:statutes/42/12755#input.tenant_and_owner_mutually_agreed_to_shorter_lease: false
  output:
    us:statutes/42/12755#lease_term_requirement_satisfied: holds
- name: termination_permitted_with_good_cause_and_required_notice
