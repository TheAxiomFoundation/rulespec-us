- name: tenant_selection_nonpreference_requirements_satisfied
  period:
    period_kind: custom
    name: calendar_year
    start: '2024-01-01'
    end: '2024-12-31'
  input:
    us:statutes/42/12755#input.owner_adopted_written_tenant_selection_policies_and_criteria: true
    us:statutes/42/12755#input.policies_are_consistent_with_providing_housing_for_very_low_income_and_low_income_families: true
    us:statutes/42/12755#input.policies_are_reasonably_related_to_program_eligibility_and_applicant_lease_obligations: true
