- name: existing_project_assistance_required_for_expiring_contract
  period: 2026-01
  input:
    us:statutes/42/1490a#input.project_is_existing: true
    us:statutes/42/1490a#input.unit_occupied_by_low_income_family_or_person: true
    us:statutes/42/1490a#input.assistance_extends_expiring_contracts: true
    ? us:statutes/42/1490a#input.assistance_provides_additional_assistance_necessary_for_full_amount_authorized_pursuant_to_existing_contracts
    : false
  output:
    us:statutes/42/1490a#existing_project_contract_assistance_must_be_made_available: holds
- name: existing_project_assistance_not_required_without_low_income_occupied_unit
  period: 2026-01
