- name: target housing and surface definitions hold for ordinary pre-1978 housing
  period:
    period_kind: custom
    name: calendar_year
    start: '2024-01-01'
    end: '2024-12-31'
  input:
    us:statutes/42/4851b#input.child_resides_or_expected_to_reside_in_housing: true
    us:statutes/42/4851b#input.youngest_resident_or_expected_child_age_years: 5
    us:statutes/42/4851b#input.secretary_designated_earlier_target_housing_date_for_jurisdiction: false
    us:statutes/42/4851b#input.housing_constructed_before_secretary_designated_earlier_target_housing_date: false
    us:statutes/42/4851b#input.housing_construction_year: 1977
    us:statutes/42/4851b#input.housing_for_elderly_or_persons_with_disabilities: false
    us:statutes/42/4851b#input.dwelling_bedroom_count: 2
    us:statutes/42/4851b#input.single_family_dwelling_including_attached_structures: true
    us:statutes/42/4851b#input.single_family_dwelling_unit_in_structure_with_more_than_one_separate_residential_dwelling_unit: false
    us:statutes/42/4851b#input.dwelling_unit_used_or_intended_as_home_or_residence: true
    us:statutes/42/4851b#input.real_property_has_one_or_more_residential_dwellings_used_or_intended_as_home_or_residence: true
    us:statutes/42/4851b#input.interior_or_exterior_paint: true
    us:statutes/42/4851b#input.paint_is_peeling_chipping_chalking_or_cracking: true
    us:statutes/42/4851b#input.paint_on_surface_or_fixture_that_is_damaged_or_deteriorated: false
    us:statutes/42/4851b#input.interior_or_exterior_surface: true
    us:statutes/42/4851b#input.surface_subject_to_abrasion_or_friction: true
    us:statutes/42/4851b#input.surface_subject_to_damage_by_repeated_impacts: true
  output:
    us:statutes/42/4851b#target_housing_child_age_exception_applies: holds
    us:statutes/42/4851b#target_housing: holds
    us:statutes/42/4851b#residential_dwelling: holds
    us:statutes/42/4851b#residential_real_property: holds
    us:statutes/42/4851b#deteriorated_paint: holds
    us:statutes/42/4851b#friction_surface: holds
    us:statutes/42/4851b#impact_surface: holds
