format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/1472/h
    source_sha256: bfa18bd9bf196e67b6a415f01102eeb44f87d534c75f44e2dee285dd0715e8d5
  summary: |-
    42 USC 1472(h) authorizes the Doug Bereuter section 502 single family housing loan guarantee program, subject to appropriations and cross-referenced section 502, section 1487(d), and section 1490a(a)(1)(A) requirements. It states guarantee, borrower-income, loan-term, principal-obligation, fee, refinancing, loss-mitigation, partial-claim, assignment, definition, and delegation provisions, including: loans guaranteed in an amount equal to 90 percent of the loan; borrowers whose incomes do not exceed 115 percent of area median income; terms not to exceed 30 years; first-time homebuyer principal obligation not in excess of 100 percent of appraised value or acquisition cost, whichever is less, plus the guarantee fee; issuance or modification fee not to exceed 3.5 percent; annual fee not to exceed 0.5 percent; partial claim payment not to exceed 30 percent of unpaid principal balance and approved costs; mortgage modifications up to 40 years; first-time homebuyer 3-year no-ownership period; and refinancing discount not exceeding 200 basis points.
  deferred_outputs:
    - output: us:statutes/42/1472/h#loan_guarantee_program_under_subsection_h
      reason: |-
        Program-level guaranteed-loan availability is subject to appropriations and must be provided in accordance with missing upstream legal dependencies: section 502, 42 USC 1487(d), and the last sentence of 42 USC 1490a(a)(1)(A), except as modified by subsection (h). Those upstream mechanics are not supplied in context.
    - output: us:statutes/42/1472/h#eligible_housing_under_subsection_h
      reason: Eligible housing requires eligibility for assistance under this section, section 203(b) of the National Housing Act, or chapter 37 of title 38, plus rural-area status. The cross-referenced assistance eligibility mechanics are outside the supplied source context.
    - output: us:statutes/42/1472/h#loss_mitigation_actions_required
      reason: Loss mitigation actions are to be engaged in upon default or imminent default as provided for by the Secretary, requiring administrative standards not supplied in the source text.
    - output: us:statutes/42/1472/h#partial_claim_and_mortgage_modification_program
      reason: Partial-claim payment and mortgage-modification authorization depends on Secretary-defined default/imminent-default standards and discretionary terms and conditions, beyond the scalar caps encoded here.
