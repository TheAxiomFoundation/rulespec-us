- name: qualifies_by_traveling_width
  period:
    period_kind: custom
    name: calendar_year
    start: '2024-01-01'
    end: '2024-12-31'
  input:
    us:statutes/42/5402#input.structure_transportable_in_one_or_more_sections: true
    us:statutes/42/5402#input.built_on_permanent_chassis: true
    ? us:statutes/42/5402#input.designed_to_be_used_as_dwelling_with_or_without_permanent_foundation_when_connected_to_required_utilities
    : true
    us:statutes/42/5402#input.traveling_mode_width_body_feet: 8
    us:statutes/42/5402#input.traveling_mode_length_body_feet: 20
    us:statutes/42/5402#input.erected_site_square_feet: 200
    us:statutes/42/5402#input.structure_meets_all_manufactured_home_requirements_except_size_requirements: false
    us:statutes/42/5402#input.manufacturer_voluntarily_files_secretary_required_certification: false
    us:statutes/42/5402#input.manufacturer_complies_with_standards_established_under_this_chapter: false
    us:statutes/42/5402#input.structure_is_self_propelled_recreational_vehicle: false
  output:
    us:statutes/42/5402#manufactured_home: holds
