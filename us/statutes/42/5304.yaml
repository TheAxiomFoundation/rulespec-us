format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/5304/b
  summary: |-
    Any grant under section 5306 shall be made only if the grantee certifies enumerated criteria, including compliance with subsection (a)(2)(A)-(C), civil-rights and fair-housing conformity, priority use of funds, a community development plan, limits on recovery of capital costs from low- and moderate-income owner-occupants, and compliance with other applicable law. The specified period for principally benefiting low- and moderate-income persons may not exceed 3 years, and at least 70 percent of covered funds must be used for activities benefiting such persons.
rules:
  - name: maximum_low_and_moderate_income_benefit_period_years
    kind: parameter
    dtype: Count
    source: 42 U.S.C. 5304(b)(3)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/5304/b
              excerpt: "during a period specified by the grantee of not more than 3 years"
    versions:
      - effective_from: '1974-01-01'
        formula: |-
          3
  - name: minimum_low_and_moderate_income_benefit_funds_rate
    kind: parameter
    dtype: Rate
    source: 42 U.S.C. 5304(b)(3)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/5304/b
              excerpt: "not less than 70 percent of such funds"
    versions:
      - effective_from: '1974-01-01'
        formula: |-
          0.70
  - name: covered_funds_principally_benefit_low_and_moderate_income_persons
    kind: derived
    entity: Grantee
    dtype: Judgment
    period: Year
    source: 42 U.S.C. 5304(b)(3)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/5304/b
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/42/5304#maximum_low_and_moderate_income_benefit_period_years
              output: maximum_low_and_moderate_income_benefit_period_years
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/42/5304#minimum_low_and_moderate_income_benefit_funds_rate
              output: minimum_low_and_moderate_income_benefit_funds_rate
              hash: sha256:local
    versions:
      - effective_from: '1974-01-01'
        formula: |-
          grantee_specified_benefit_period_years <= maximum_low_and_moderate_income_benefit_period_years
          and covered_funds_used_for_activities_benefiting_low_and_moderate_income_persons_rate >= minimum_low_and_moderate_income_benefit_funds_rate
  - name: urgent_community_development_needs_projected_use_included
    kind: derived
    entity: Grantee
    dtype: Judgment
    period: Year
    source: 42 U.S.C. 5304(b)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/42/5304/b
    versions:
      - effective_from: '1974-01-01'
        formula: |-
          activities_are_designed_to_meet_other_community_development_needs_having_particular_urgency
          and existing_conditions_pose_serious_and_immediate_threat_to_health_or_welfare_of_community
          and other_financial_resources_are_not_available_to_meet_such_needs
  - name: great_lakes_erosion_or_flooding_projected_use_included
    kind: derived
    entity: Grantee
    dtype: Judgment
    period: Year
    source: 42 U.S.C. 5304(b)(3)(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/42/5304/b
    versions:
      - effective_from: '1974-01-01'
        formula: |-
          grantee_borders_on_great_lakes
          and grantee_experiences_significant_adverse_financial_and_physical_effects_due_to_lakefront_erosion_or_flooding
          and activities_are_clearly_designed_to_alleviate_threat_and_rectify_damage_from_erosion_or_flooding
          and great_lakes_activities_will_principally_benefit_low_and_moderate_income_persons
          and grantee_certifies_great_lakes_activities_are_necessary_to_meet_other_needs_having_particular_urgency
  - name: projected_use_of_funds_certification_satisfied
    kind: derived
    entity: Grantee
    dtype: Judgment
    period: Year
    source: 42 U.S.C. 5304(b)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/5304/b
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/42/5304#covered_funds_principally_benefit_low_and_moderate_income_persons
              output: covered_funds_principally_benefit_low_and_moderate_income_persons
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/42/5304#urgent_community_development_needs_projected_use_included
              output: urgent_community_development_needs_projected_use_included
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/42/5304#great_lakes_erosion_or_flooding_projected_use_included
              output: great_lakes_erosion_or_flooding_projected_use_included
              hash: sha256:local
    versions:
      - effective_from: '1974-01-01'
        formula: |-
          projected_use_gives_maximum_feasible_priority_to_low_moderate_income_or_slums_blight_activities
          and covered_funds_principally_benefit_low_and_moderate_income_persons
          and (not urgent_community_development_needs_activities_are_included or urgent_community_development_needs_projected_use_included)
          and (not great_lakes_erosion_or_flooding_activities_are_included or great_lakes_erosion_or_flooding_projected_use_included)
  - name: capital_cost_recovery_limitation_satisfied
    kind: derived
    entity: Grantee
    dtype: Judgment
    period: Year
    source: 42 U.S.C. 5304(b)(5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/42/5304/b
    versions:
      - effective_from: '1974-01-01'
        formula: |-
          grantee_will_not_recover_capital_costs_by_assessing_low_and_moderate_income_owner_occupied_properties
          or funds_are_used_to_pay_non_chapter_financed_capital_cost_fee_or_assessment_proportion
          or moderate_income_assessment_and_grantee_certifies_insufficient_funds_to_pay_required_proportion
  - name: grant_certification_criteria_satisfied
    kind: derived
    entity: Grantee
    dtype: Judgment
    period: Year
    source: 42 U.S.C. 5304(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/5304/b
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/42/5304#projected_use_of_funds_certification_satisfied
              output: projected_use_of_funds_certification_satisfied
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/42/5304#capital_cost_recovery_limitation_satisfied
              output: capital_cost_recovery_limitation_satisfied
              hash: sha256:local
    versions:
      - effective_from: '1974-01-01'
        formula: |-
          grantee_is_in_full_compliance_with_subsection_a_2_A_B_C_requirements
          and grantee_has_made_final_statement_available_to_public
          and grant_will_be_conducted_and_administered_in_conformity_with_civil_rights_act_of_1964
          and grant_will_be_conducted_and_administered_in_conformity_with_fair_housing_act
          and grantee_will_affirmatively_further_fair_housing
          and projected_use_of_funds_certification_satisfied
          and grantee_has_developed_community_development_plan_identifying_needs_and_short_and_long_term_objectives
          and community_development_plan_developed_in_accordance_with_primary_objective_and_requirements_of_chapter
          and capital_cost_recovery_limitation_satisfied
          and grantee_will_comply_with_other_provisions_of_chapter_and_other_applicable_laws
