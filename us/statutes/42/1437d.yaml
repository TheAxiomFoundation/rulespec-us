format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/1437d
  summary: |-
    42 USC 1437d requires contribution contracts to include public-housing agency duties on admissions, income reviews, management procedures, housing quality, default remedies, and troubled-agency performance. It also requires public housing leases to use a 12-month renewable term, maintain decent, safe, and sanitary housing, provide specified termination notice periods, and include specified termination causes. Criminal-record information must be disclosed to public housing agencies for covered screening and enforcement purposes subject to dispute, confidentiality, records-management, misdemeanor penalty, and civil-action protections. Public housing agencies may maintain site-based waiting lists with civil-rights compliance and full option disclosure.
  deferred_outputs:
    - output: us:statutes/42/1437d/c#contract_contribution_admissions_and_management_requirements
      reason: The subsection is a contract-administration and agency-procedure provision with multiple Secretary-prescribed requirements and local housing-priority determinations, not a single computable output in the current schema.
    - output: us:statutes/42/1437d/j#public_housing_agency_performance_indicator_system
      reason: The subsection directs the Secretary to develop, weight, administer, and enforce an administrative performance-indicator and troubled-agency system, including dependencies on unencoded sections 1437g, 1437l, 1437v, 1437p, and 3536.
rules:
  - name: lease_term_months
    kind: parameter
    dtype: Count
    source: 42 USC 1437d(l)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/1437d
              excerpt: "have a term of 12 months"
    versions:
      - effective_from: '1998-10-21'
        formula: |-
          12

  - name: lease_nonpayment_rent_notice_days
    kind: parameter
    dtype: Count
    source: 42 USC 1437d(l)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/1437d
              excerpt: "14 days in the case of nonpayment of rent"
    versions:
      - effective_from: '1998-10-21'
        formula: |-
          14

  - name: lease_other_case_notice_days
    kind: parameter
    dtype: Count
    source: 42 USC 1437d(l)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/1437d
              excerpt: "30 days in any other case"
    versions:
      - effective_from: '1998-10-21'
        formula: |-
          30

  - name: public_housing_lease_has_required_term
    kind: derived
    entity: PublicHousingAgency
    dtype: Judgment
    period: Year
    source: 42 USC 1437d(l)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/1437d
    versions:
      - effective_from: '1998-10-21'
        formula: |-
          lease_term_in_months == lease_term_months
          and lease_automatically_renews_except_community_service_noncompliance

  - name: lease_nonpayment_rent_notice_satisfies_minimum
    kind: derived
    entity: PublicHousingAgency
    dtype: Judgment
    period: Year
    source: 42 USC 1437d(l)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/1437d
    versions:
      - effective_from: '1998-10-21'
        formula: |-
          lease_nonpayment_rent_notice_days_provided >= lease_nonpayment_rent_notice_days

  - name: adult_criminal_record_request_authorized
    kind: derived
    entity: PublicHousingAgency
    dtype: Judgment
    period: Year
    source: 42 USC 1437d(q)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us/statute/42/1437d
    versions:
      - effective_from: '1998-10-21'
        formula: |-
          information_request_is_for_criminal_conviction_records
          and record_subject_is_adult_applicant_or_tenant_of_covered_housing_assistance
          and request_purpose_is_applicant_screening_lease_enforcement_or_eviction
          and not requested_record_is_juvenile_conviction_not_authorized_for_release_by_applicable_law

  - name: criminal_record_adverse_action_process_satisfied
    kind: derived
    entity: PublicHousingAgency
    dtype: Judgment
    period: Year
    source: 42 USC 1437d(q)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us/statute/42/1437d
    versions:
      - effective_from: '1998-10-21'
        formula: |-
          tenant_or_applicant_received_copy_of_criminal_record_before_adverse_action
          and tenant_or_applicant_had_opportunity_to_dispute_accuracy_and_relevance_before_adverse_action

  - name: site_based_waiting_list_procedure_authorized
    kind: derived
    entity: PublicHousingAgency
    dtype: Judgment
    period: Year
    source: 42 USC 1437d(r)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us/statute/42/1437d
    versions:
      - effective_from: '1998-10-21'
        formula: |-
          waiting_list_procedure_is_for_admissions_to_public_housing_projects
          and procedure_complies_with_title_vi_fair_housing_act_and_other_applicable_civil_rights_laws
          and public_housing_agency_fully_discloses_project_selection_options_to_each_applicant
