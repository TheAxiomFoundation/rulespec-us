- name: reserve_and_interest_difference_for_public_sale
  period:
    period_kind: custom
    name: calendar_year
    start: '2024-01-01'
    end: '2024-12-31'
  input:
    us:statutes/42/1487#input.outstanding_face_amount_of_loans_held_by_public: 200000
    us:statutes/42/1487#input.loan_made_under_this_subchapter_and_insured_or_guaranteed_in_accordance_with_subsection_d: true
    us:statutes/42/1487#input.loan_offered_for_sale_to_public: true
    us:statutes/42/1487#input.market_rate_of_interest_on_comparable_obligations_on_sale_date: 0.08
    us:statutes/42/1487#input.borrower_interest_rate: 0.05
    us:statutes/42/1487#input.agreement_protects_borrower_rights_from_purchaser_or_assignee_diminution: true
    us:statutes/42/1487#input.agreement_requires_assignment_to_secretary_after_substantial_default_before_foreclosure: true
    ? us:statutes/42/1487#input.agreement_requires_secretary_to_afford_subchapter_rights_before_foreclosure_or_dispossession_after_assignment
    : true
  output:
    us:statutes/42/1487#public_loan_sale_reserve_minimum_amount: 10000
    us:statutes/42/1487#public_sale_interest_subsidy_rate_difference: 0.03
    us:statutes/42/1487#public_sale_borrower_protection_agreements_required: holds
- name: borrower_protection_missing_assignment_agreement
  period:
    period_kind: custom
    name: calendar_year
    start: '2024-01-01'
    end: '2024-12-31'
  input:
    us:statutes/42/1487#input.outstanding_face_amount_of_loans_held_by_public: 200000
    us:statutes/42/1487#input.loan_made_under_this_subchapter_and_insured_or_guaranteed_in_accordance_with_subsection_d: true
    us:statutes/42/1487#input.loan_offered_for_sale_to_public: true
    us:statutes/42/1487#input.market_rate_of_interest_on_comparable_obligations_on_sale_date: 0.08
    us:statutes/42/1487#input.borrower_interest_rate: 0.05
    us:statutes/42/1487#input.agreement_protects_borrower_rights_from_purchaser_or_assignee_diminution: true
    us:statutes/42/1487#input.agreement_requires_assignment_to_secretary_after_substantial_default_before_foreclosure: false
    ? us:statutes/42/1487#input.agreement_requires_secretary_to_afford_subchapter_rights_before_foreclosure_or_dispossession_after_assignment
    : true
  output:
    us:statutes/42/1487#public_sale_borrower_protection_agreements_required: not_holds
- name: loan_commitment_authorized_for_compliant_applicant
  period:
    period_kind: custom
    name: calendar_year
    start: '2024-01-01'
    end: '2024-12-31'
  input:
    us:statutes/42/1487#input.applicant_is_lender_builder_or_seller: true
    us:statutes/42/1487#input.applicant_complies_with_secretary_requirements: true
    us:statutes/42/1487#input.commitment_terms_and_conditions_are_prescribed_by_secretary: true
  output:
    us:statutes/42/1487#loan_commitment_authorized: holds
