- name: auto_zero_public_sale_interest_subsidy_rate_difference
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    us:statutes/42/1487#input.agreement_protects_borrower_rights_from_purchaser_or_assignee_diminution: false
    us:statutes/42/1487#input.agreement_requires_assignment_to_secretary_after_substantial_default_before_foreclosure: false
    ? us:statutes/42/1487#input.agreement_requires_secretary_to_afford_subchapter_rights_before_foreclosure_or_dispossession_after_assignment
    : false
    us:statutes/42/1487#input.applicant_complies_with_secretary_requirements: false
    us:statutes/42/1487#input.applicant_is_lender_builder_or_seller: false
    us:statutes/42/1487#input.borrower_interest_rate: 0
    us:statutes/42/1487#input.commitment_terms_and_conditions_are_prescribed_by_secretary: false
    us:statutes/42/1487#input.loan_made_under_this_subchapter_and_insured_or_guaranteed_in_accordance_with_subsection_d: false
    us:statutes/42/1487#input.loan_offered_for_sale_to_public: false
    us:statutes/42/1487#input.market_rate_of_interest_on_comparable_obligations_on_sale_date: 0
    us:statutes/42/1487#input.outstanding_face_amount_of_loans_held_by_public: 0
  output:
    us:statutes/42/1487#public_sale_interest_subsidy_rate_difference: 0
