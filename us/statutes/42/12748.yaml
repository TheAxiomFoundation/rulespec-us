format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/12748
    source_sha256: 2abc8e7a1e63504880cf45990277d0f95a830812f64aad2802aeab76cbaa0201
  summary: |-
    42 USC 12748 establishes a HOME Investment Trust Fund for each participating jurisdiction; permits draws only after certification and only up to the remaining line of credit; requires drawn funds and interest to be invested in the intended affordable housing not later than 15 days after draw; prohibits Secretary interest or fees; and expires the right to draw funds not placed under binding commitment within 24 months after the last day of the deposit month.
  deferred_outputs:
    - output: us:statutes/42/12748#line_of_credit_amount
      reason: |-
        Subsections (b), (c), and (g) define the line of credit by including allocations or reallocations under 42 USC 12747, payments or repayments under 42 USC 12749, reductions for expiring funds, and penalties under 42 USC 12754, and by reallocating expired funds under 42 USC 12747(d). Those cited RuleSpec sources are not copied in context, so the final line-of-credit amount and reallocation mechanics are deferred.
rules:
  - name: affordable_housing_investment_deadline_days
    kind: parameter
    dtype: Count
    source: 42 USC 12748(e)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/12748
              excerpt: "not later than 15 days after funds are drawn"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          15

  - name: binding_commitment_deadline_months_after_deposit_month
    kind: parameter
    dtype: Count
    source: 42 USC 12748(g)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/12748
              excerpt: "within 24 months after the last day of the month in which such funds are deposited"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          24

  - name: home_trust_fund_investment_authorized
    kind: derived
    entity: HomeInvestmentTrustFundInvestment
    dtype: Judgment
    period: Month
    source: 42 USC 12748(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/42/12748
              excerpt: "for use solely to invest in affordable housing within the participating jurisdiction’s boundaries or within the boundaries of contiguous jurisdictions in joint projects which serve residents from both jurisdictions"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          investment_is_in_affordable_housing
          and (investment_is_within_participating_jurisdiction_boundaries or (investment_is_within_boundaries_of_contiguous_jurisdictions and investment_is_joint_project_serving_residents_from_both_jurisdictions))

  - name: home_trust_fund_draw_permitted
    kind: derived
    entity: ParticipatingJurisdiction
    dtype: Judgment
    period: Month
    source: 42 USC 12748(d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/42/12748
              excerpt: "may draw funds ... but not to exceed the remaining line of credit, only after providing certification"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          funds_certified_for_approved_housing_strategy
          and funds_certified_for_compliance_with_all_requirements_of_this_subchapter
          and amount_to_be_drawn_from_home_investment_trust_fund <= remaining_line_of_credit

  - name: drawn_funds_timely_invested
    kind: derived
    entity: ParticipatingJurisdiction
    dtype: Judgment
    period: Day
    source: 42 USC 12748(e)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/42/12748
              excerpt: "not later than 15 days after funds are drawn ... invest such funds, together with any interest earned thereon"
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/42/12748#affordable_housing_investment_deadline_days
              output: affordable_housing_investment_deadline_days
              hash: sha256:local
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          days_after_funds_are_drawn <= affordable_housing_investment_deadline_days
          and drawn_funds_and_interest_earned_invested_in_affordable_housing_for_which_funds_were_withdrawn

  - name: secretary_interest_or_fee_prohibited_for_home_trust_fund
    kind: derived
    entity: HomeInvestmentTrustFund
    dtype: Judgment
    period: Month
    source: 42 USC 12748(f)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us/statute/42/12748
              excerpt: "The Secretary shall not charge any interest or levy any other fee with regard to funds in a HOME Investment Trust Fund."
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          true

  - name: right_to_draw_funds_expired
    kind: derived
    entity: HomeInvestmentTrustFundDeposit
    dtype: Judgment
    period: Month
    source: 42 USC 12748(g)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/42/12748
              excerpt: "not placed under binding commitment to affordable housing within 24 months after the last day of the month in which such funds are deposited"
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/42/12748#binding_commitment_deadline_months_after_deposit_month
              output: binding_commitment_deadline_months_after_deposit_month
              hash: sha256:local
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          funds_not_placed_under_binding_commitment_to_affordable_housing
          and months_after_last_day_of_month_in_which_funds_are_deposited > binding_commitment_deadline_months_after_deposit_month
