format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/12753
    source_sha256: ea0ead504582926b8bf689d3a7d3ac889db1fadc65b35f1c24562b113c09096b
  summary: |-
    If the Secretary finds after reasonable notice and opportunity for hearing that a participating jurisdiction has failed to comply substantially, and until satisfied the failure has ended, the Secretary shall reduce the HOME line of credit by noncompliant expenditures and may prevent withdrawals, restrict activities to model programs, or remove the jurisdiction from allocations or reallocations.
rules:
  - name: home_line_of_credit_reduction_for_noncompliance
    kind: derived
    entity: ParticipatingJurisdiction
    dtype: Money
    period: Year
    unit: USD
    source: 42 U.S.C. 12753, opening clause
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/42/12753
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/12753
              excerpt: "reduce the line of credit in the participating jurisdiction’s HOME Investment Trust Fund by the amount of any expenditures that were not in accordance"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          if secretary_finds_after_reasonable_notice_and_opportunity_for_hearing_that_participating_jurisdiction_failed_to_comply_substantially and secretary_not_satisfied_that_failure_to_comply_has_ended: expenditures_not_in_accordance_with_requirements else: 0
