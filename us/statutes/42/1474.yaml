format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/1474/a
  summary: |-
    The Secretary may make loans, grants, or combined assistance to eligible very low-income applicants for rural dwelling repairs, improvements, modernization, safety, sanitation, or hazard removal; loan portions are secured and repayable within twenty years, with loans under $7,500 evidenced only by a promissory note.
  deferred_outputs:
    - output: us:statutes/42/1474/a#secretary_may_make_rural_dwelling_repair_loan_grant_or_combined_assistance
      status: discretionary_authority
      reason: The subsection grants discretionary authority to the Secretary and depends on Secretary-determined eligibility, purposes, and maximum amount limitations not specified as computable values in this source slice.
    - output: us:statutes/42/1474/a#grant_conditions_for_protection_of_government
      status: cross_reference_dependency
      reason: The grant-condition consequence depends on conditions set forth elsewhere in the subchapter for protection of the Government and cannot be computed from this subsection alone.
rules:
  - name: rural_housing_repair_loan_repayment_maximum_years
    kind: parameter
    dtype: Count
    source: 42 USC 1474(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/1474/a
              excerpt: repayable within twenty years
    versions:
      - effective_from: '1961-01-01'
        formula: |-
