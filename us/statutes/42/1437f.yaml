module:
  status: deferred
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/1437f/o/8
  summary: |-
    42 USC 1437f authorizes housing assistance payments, including existing-housing contracts, project-based assistance, tenant-based voucher assistance, portability, administrative fees, safety-device requirements, contract terms, rent/payment standards, tenant protections, and definitions. Key operative text includes subsection (c) assistance-contract rent and payment rules; subsection (d) required owner/PHA contract provisions; subsection (f) definitions of owner, debt service, project-based assistance, and tenant-based assistance; subsection (o) voucher payment standards, monthly assistance, inspections, rent reasonableness, and project-based voucher rules; subsection (q) administrative fees; and subsection (r) portability.
  deferred_outputs:
    - output: us:statutes/42/1437f/c#assistance_contract_rent_and_payment_rules
      reason: Subsection (c) combines contract drafting requirements, fair market rental publication and adjustment procedures, Secretary determinations, rent comparability studies, subsidy-payment formulas depending on missing 42 USC 1437a(a), and project/contract administration surfaces that are not faithfully representable as a single supported executable entity in this artifact.
    - output: us:statutes/42/1437f/d#required_contract_provisions_and_duration_rules
      reason: Subsection (d) governs assistance-payment contract clauses, lease terms, owner termination standards, management responsibilities, project-based contract duration, and cross-referenced program requirements including missing 42 USC 1437c-1 and 42 USC 13631; the required legal surface is contract-document and project-administration oriented rather than a supported computable benefit output here.
    - output: us:statutes/42/1437f/e#assistance_contract_pledge_restriction_rules
      reason: Subsection (e) concerns whether an owner may pledge an assistance-payment contract as loan security when tied to an approved financing or refinancing for a constructed or rehabilitated project; this requires contract/security-interest and Secretary-approval ontology not represented in the available RuleSpec entity surface.
    - output: us:statutes/42/1437f/f#section_definitions
      reason: Subsection (f) defines multiple terms for use throughout section 1437f, including owner, rent or rental for cooperative members, debt service, participating jurisdiction, drug-related criminal activity, project-based assistance, and tenant-based assistance; these definitions feed many downstream contract and program rules and are not a single executable result without the corresponding supported program entities.
    - output: us:statutes/42/1437f/l#qualifying_smoke_alarm_installation_requirement
      reason: Subsection (l) imposes dwelling-unit and common-area smoke-alarm requirements using building date, substantial rehabilitation date, hardwiring, battery, sealing, tamper-resistance, silencing, and NFPA/ICC standards; the needed housing-unit safety-compliance ontology and external standards are outside the supported local executable surface.
    - output: us:statutes/42/1437f/o#voucher_program_rules
      reason: Subsection (o) is a broad voucher-program framework covering payment standards, monthly assistance formulas, eligible families, selection, leases, inspections, rent reasonableness, PHA-owned units, manufactured housing, project-based vouchers, homeownership, special-purpose vouchers, carbon monoxide alarms, and smoke alarms; many branches depend on missing cited sources such as 42 USC 1437a(a), 42 USC 1437c-1, 42 USC 1437n(b), and external housing standards.
    - output: us:statutes/42/1437f/q#administrative_fee_rules
      reason: Subsection (q) establishes administrative-fee rules for tenant-based assistance, certificate, voucher, and moderate rehabilitation programs, including fiscal-year-specific formulas and Secretary-published geographic fee amounts; faithful execution requires PHA administrative program entities, geographic fee data, wage/cost adjustment determinations, and historical effective-date handling not present in this artifact.
    - output: us:statutes/42/1437f/r#portability_rules
      reason: Subsection (r) governs tenant-based assistance portability, PHA jurisdiction responsibility, compensation procedures, and lease-violation limits with a domestic-violence safety exception; this requires voucher-family movement, PHA jurisdiction, lease-violation, and safety-threat facts not supported as a single computable local output here.
