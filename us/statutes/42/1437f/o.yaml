format: rulespec/v1
imports:
- us:statutes/42/1437f/d#project_based_assistance_common_area_consent_required
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/1437f/o
  summary: 'Voucher program: payment standards generally range from not less than
    90 percent to not more than 110 percent of fair market rental; tenant-based monthly
    assistance equals rent or payment standard minus the greatest tenant contribution
    amount; initial tenant rent may not exceed 40 percent of monthly adjusted income.
    Project-based assistance is subject to 20 percent authorized-unit and 25-unit/25-percent
    project limits, with stated exceptions.'
rules:
- name: payment_standard_general_minimum_fmr_rate
  kind: parameter
  dtype: Rate
  source: 42 USC 1437f(o)(1)(B)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us/statute/42/1437f/o
          excerpt: shall be not less than 90 percent of that fair market rental
  versions:
  - effective_from: '1998-10-21'
    formula: '0.90'
- name: payment_standard_general_maximum_fmr_rate
  kind: parameter
  dtype: Rate
  source: 42 USC 1437f(o)(1)(B)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us/statute/42/1437f/o
          excerpt: shall not exceed 110 percent of the fair market rental
  versions:
  - effective_from: '1998-10-21'
    formula: '1.10'
- name: disability_reasonable_accommodation_payment_standard_without_secretary_approval_maximum_fmr_rate
  kind: parameter
  dtype: Rate
  source: 42 USC 1437f(o)(1)(D)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us/statute/42/1437f/o
          excerpt: not more than 120 percent of the fair market rent
  versions:
  - effective_from: '1998-10-21'
    formula: '1.20'
- name: tenant_rent_adjusted_income_rate
  kind: parameter
  dtype: Rate
  source: 42 USC 1437f(o)(2)(A)(i)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us/statute/42/1437f/o
          excerpt: 30 percent of the monthly adjusted income
  versions:
  - effective_from: '1998-10-21'
    formula: '0.30'
- name: tenant_rent_monthly_income_rate
  kind: parameter
  dtype: Rate
  source: 42 USC 1437f(o)(2)(A)(ii)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us/statute/42/1437f/o
          excerpt: 10 percent of the monthly income
  versions:
  - effective_from: '1998-10-21'
    formula: '0.10'
- name: initial_tenant_based_family_rent_adjusted_income_limit_rate
  kind: parameter
  dtype: Rate
  source: 42 USC 1437f(o)(3)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us/statute/42/1437f/o
          excerpt: may not exceed 40 percent of the monthly adjusted income
  versions:
  - effective_from: '1998-10-21'
    formula: '0.40'
- name: project_based_authorized_units_base_limit_rate
  kind: parameter
  dtype: Rate
  source: 42 USC 1437f(o)(13)(B)(i)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us/statute/42/1437f/o
          excerpt: not more than 20 percent of the authorized units
  versions:
  - effective_from: '2016-07-29'
    formula: '0.20'
- name: project_based_authorized_units_additional_exception_limit_rate
  kind: parameter
  dtype: Rate
  source: 42 USC 1437f(o)(13)(B)(ii)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us/statute/42/1437f/o
          excerpt: up to an additional 10 percent of the authorized units
  versions:
  - effective_from: '2016-07-29'
    formula: '0.10'
- name: project_income_mixing_dwelling_unit_count_limit
  kind: parameter
  dtype: Count
  source: 42 USC 1437f(o)(13)(D)(i)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us/statute/42/1437f/o
          excerpt: not more than the greater of 25 dwelling units or 25 percent
  versions:
  - effective_from: '2016-07-29'
    formula: '25'
- name: project_income_mixing_dwelling_unit_rate_limit
  kind: parameter
  dtype: Rate
  source: 42 USC 1437f(o)(13)(D)(i)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us/statute/42/1437f/o
          excerpt: not more than the greater of 25 dwelling units or 25 percent
  versions:
  - effective_from: '2016-07-29'
    formula: '0.25'
- name: tenant_contribution_greatest_amount
  kind: derived
  entity: Family
  dtype: Money
  period: Month
  unit: USD
  source: 42 USC 1437f(o)(2)(A)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us/statute/42/1437f/o
          excerpt: the greatest of the following amounts
  versions:
  - effective_from: '1998-10-21'
    formula: max(tenant_rent_adjusted_income_rate * monthly_adjusted_income, tenant_rent_monthly_income_rate
      * monthly_income, welfare_housing_cost_designated_amount)
- name: tenant_based_monthly_assistance_payment
  kind: derived
  entity: Family
  dtype: Money
  period: Month
  unit: USD
  source: 42 USC 1437f(o)(2)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us/statute/42/1437f/o
          excerpt: if the rent ... does not exceed the applicable payment standard
            ... rent ... exceeds the greatest
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us/statute/42/1437f/o
          excerpt: if the rent ... exceeds the applicable payment standard ... payment
            standard exceeds the greatest
  versions:
  - effective_from: '1998-10-21'
    formula: 'if rent_including_tenant_paid_utilities <= applicable_payment_standard:
      max(0, rent_including_tenant_paid_utilities - tenant_contribution_greatest_amount)
      else: max(0, applicable_payment_standard - tenant_contribution_greatest_amount)'
- name: initial_tenant_based_family_rent_within_limit
  kind: derived
  entity: Family
  dtype: Judgment
  period: Month
  source: 42 USC 1437f(o)(3)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: predicate
        source:
          corpus_citation_path: us/statute/42/1437f/o
          excerpt: may not exceed 40 percent of the monthly adjusted income
  versions:
  - effective_from: '1998-10-21'
    formula: total_initial_family_rent <= initial_tenant_based_family_rent_adjusted_income_limit_rate
      * monthly_adjusted_income
- name: general_payment_standard_within_fair_market_rental_range
  kind: derived
  entity: PublicHousingAgency
  dtype: Judgment
  period: Month
  source: 42 USC 1437f(o)(1)(B)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: predicate
        source:
          corpus_citation_path: us/statute/42/1437f/o
          excerpt: shall not exceed 110 percent ... and shall be not less than 90
            percent
  versions:
  - effective_from: '1998-10-21'
    formula: 'payment_standard >= payment_standard_general_minimum_fmr_rate * fair_market_rental

      and payment_standard <= payment_standard_general_maximum_fmr_rate * fair_market_rental'
- name: project_based_authorized_units_within_limit
  kind: derived
  entity: PublicHousingAgency
  dtype: Judgment
  period: Month
  source: 42 USC 1437f(o)(13)(B)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: predicate
        source:
          corpus_citation_path: us/statute/42/1437f/o
          excerpt: not more than 20 percent ... up to an additional 10 percent
      - path: versions[0].formula
        kind: import
        import:
          target: us:statutes/42/1437f/d#project_based_assistance_common_area_consent_required
          output: project_based_assistance_common_area_consent_required
          hash: sha256:6b4fcf3eca0e705a3c38348fe896c922d97f52e64497735af48af7a03816db45
  versions:
  - effective_from: '2016-07-29'
    formula: "(project_based_assistance_common_area_consent_required\nand (((additional_exception_units_qualify) and project_based_assistance_units\
      \ <= authorized_units * (project_based_authorized_units_base_limit_rate + (project_based_authorized_units_additional_exception_limit_rate)))\n\
      \  or (not (additional_exception_units_qualify) and project_based_assistance_units\
      \ <= authorized_units * (project_based_authorized_units_base_limit_rate + (0)))))"
- name: project_income_mixing_within_limit
  kind: derived
  entity: HousingProject
  dtype: Judgment
  period: Month
  source: 42 USC 1437f(o)(13)(D)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: predicate
        source:
          corpus_citation_path: us/statute/42/1437f/o
          excerpt: not more than the greater of 25 dwelling units or 25 percent
  versions:
  - effective_from: '2016-07-29'
    formula: 'income_mixing_exception_applies

      or assisted_dwelling_units <= max(project_income_mixing_dwelling_unit_count_limit,
      project_income_mixing_dwelling_unit_rate_limit * project_dwelling_units)'
