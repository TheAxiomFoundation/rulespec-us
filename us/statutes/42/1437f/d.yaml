format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/1437f/d
  summary: |-
    Contracts for existing housing units shall provide tenant-selection, lease, maintenance, and other agreed terms. The lease shall be for at least one year or the contract term, whichever is shorter; termination during the lease is limited to specified causes and written notice. Existing-structure contracts shall run for not less than one month nor more than one hundred and eighty months, with short contracts permitted to avoid assistance disruption near annual-contributions-contract expiration. The Secretary may consider service-coordinator costs, budget authority is authorized to increase by $15,000,000 on or after October 1, 1992 and October 1, 1993, owners must maintain compliance with specified subtitles, agencies may assume management with approval, multi-jurisdiction agencies may prioritize disabled nonelderly families, specified contracts are excluded from the project-based limit, and common-area law-enforcement consent is required for project-based assistance.
  deferred_outputs:
    - output: us:statutes/42/1437f/d#service_coordinator_budget_authority_increase
      reason: The subsection states two date-keyed increases in budget authority for service coordinators, but this slice does not encode the affected budget-authority total or upstream appropriation branch. The source values are deferred until that affected numeric output is encoded.
rules:
  - name: existing_structure_contract_minimum_term_months
    kind: parameter
    dtype: Count
    source: 42 USC 1437f(d)(2)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/1437f/d
              excerpt: "not less than one month"
    versions:
      - effective_from: '1998-10-21'
        formula: |-
          1
  - name: existing_structure_contract_maximum_term_months
    kind: parameter
    dtype: Count
    source: 42 USC 1437f(d)(2)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/1437f/d
              excerpt: "nor more than one hundred and eighty months"
    versions:
      - effective_from: '1998-10-21'
        formula: |-
          180
  - name: short_assistance_contract_duration_threshold_months
    kind: parameter
    dtype: Count
    source: 42 USC 1437f(d)(2)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/1437f/d
              excerpt: "less than 12 months duration"
    versions:
      - effective_from: '1998-10-21'
        formula: |-
          12
  - name: annual_contributions_contract_expiration_window_years
    kind: parameter
    dtype: Count
    source: 42 USC 1437f(d)(2)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/1437f/d
              excerpt: "within 1 year of its expiration date"
    versions:
      - effective_from: '1998-10-21'
        formula: |-
          1
  - name: existing_structure_contract_term_within_limits
    kind: derived
    entity: HousingAssistanceContract
    dtype: Judgment
    period: Month
    source: 42 USC 1437f(d)(2)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/1437f/d
              excerpt: "for a term of not less than one month nor more than one hundred and eighty months"
    versions:
      - effective_from: '1998-10-21'
        formula: |-
          contract_term_months >= existing_structure_contract_minimum_term_months
          and contract_term_months <= existing_structure_contract_maximum_term_months
  - name: short_assistance_contract_permitted_to_avoid_disruption
    kind: derived
    entity: HousingAssistanceContract
    dtype: Judgment
    period: Month
    source: 42 USC 1437f(d)(2)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/42/1437f/d
              excerpt: "permit public housing agencies to enter into contracts for assistance payments of less than 12 months duration in order to avoid disruption in assistance to eligible families if the annual contributions contract is within 1 year of its expiration date"
    versions:
      - effective_from: '1998-10-21'
        formula: |-
          assistance_payment_contract_duration_months < short_assistance_contract_duration_threshold_months
          and assistance_contract_avoids_disruption_to_eligible_families
          and annual_contributions_contract_within_expiration_window
  - name: tenancy_termination_cause_exists
    kind: derived
    entity: Tenancy
    dtype: Judgment
    period: Month
    source: 42 USC 1437f(d)(1)(B)(ii), (iii), (v)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/42/1437f/d
              excerpt: "shall not terminate the tenancy except for serious or repeated violation ... violation of applicable Federal, State, or local law, or for other good cause"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/42/1437f/d
              excerpt: "any criminal activity that threatens the health, safety, or right to peaceful enjoyment ... shall be cause for termination"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/42/1437f/d
              excerpt: "is fleeing to avoid prosecution ... or ... is violating a condition of probation or parole"
    versions:
      - effective_from: '1998-10-21'
        formula: |-
          serious_or_repeated_lease_violation
          or violation_of_applicable_law
          or other_good_cause
          or criminal_activity_threatens_health_safety_or_peaceful_enjoyment
          or drug_related_criminal_activity_on_or_near_premises
          or tenant_fleeing_to_avoid_felony_prosecution_custody_or_confinement
          or tenant_violating_probation_or_parole_condition
  - name: tenancy_termination_during_lease_allowed
    kind: derived
    entity: Tenancy
    dtype: Judgment
    period: Month
    source: 42 USC 1437f(d)(1)(B)(ii)-(v)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/1437f/d
              excerpt: "during the term of the lease, the owner shall not terminate the tenancy except"
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/42/1437f/d#tenancy_termination_cause_exists
              output: tenancy_termination_cause_exists
              hash: sha256:local
    versions:
      - effective_from: '1998-10-21'
        formula: |-
          tenancy_termination_cause_exists
          and owner_provided_written_notice_specifying_grounds_before_termination
  - name: project_based_assistance_common_area_consent_required
    kind: derived
    entity: HousingProject
    dtype: Judgment
    period: Month
    source: 42 USC 1437f(d)(6)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/42/1437f/d
              excerpt: "may not provide any assistance amounts ... and may not enter into a new or renewal contract ... unless the owner ... provides consent ... to enter common areas"
    versions:
      - effective_from: '1998-10-21'
        formula: |-
          owner_provides_law_enforcement_common_area_entry_consent
