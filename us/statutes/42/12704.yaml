format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/12704
  summary: |-
    42 USC 12704 defines terms used in this subchapter and subchapter II, including “very low-income families” as low-income families whose incomes do not exceed 50 percent of area median family income, “low-income families” as families whose incomes do not exceed 80 percent of area median income, “single parent,” “displaced homemaker,” “first-time homebuyer,” “substantial rehabilitation,” and “energy efficient mortgage.”
  deferred_outputs:
    - output: us:statutes/42/12704#unit_of_general_local_government
      reason: The definition depends on recognition of a consortium in accordance with section 12746(2), which is not available in copied RuleSpec context.
    - output: us:statutes/42/12704#participating_jurisdiction
      reason: The definition depends on designation in accordance with section 12746, which is not available in copied RuleSpec context.
    - output: us:statutes/42/12704#families
      reason: The term has the same meaning given by section 1437a, which is not available in copied RuleSpec context.
    - output: us:statutes/42/12704#public_housing_agency
      reason: The term has the meaning given in section 1437a(b), which is not available in copied RuleSpec context.
    - output: us:statutes/42/12704#metropolitan_city
      reason: The term has the meaning given in section 5302(a)(4), which is not available in copied RuleSpec context.
    - output: us:statutes/42/12704#urban_county
      reason: The term has the meaning given in section 5302(a)(6), which is not available in copied RuleSpec context.
rules:
  - name: very_low_income_family_median_income_limit_rate
    kind: parameter
    dtype: Rate
    source: 42 USC 12704(9)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/12704
              excerpt: "do not exceed 50 percent of the median family income for the area"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          0.50

  - name: low_income_family_median_income_limit_rate
    kind: parameter
    dtype: Rate
    source: 42 USC 12704(10)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/12704
              excerpt: "do not exceed 80 percent of the median income for the area"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          0.80

  - name: first_time_homebuyer_prior_homeownership_lookback_years
    kind: parameter
    dtype: Count
    source: 42 USC 12704(14)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/12704
              excerpt: "during the 3-year period prior to purchase"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          3

  - name: substantial_rehabilitation_average_cost_threshold
    kind: parameter
    dtype: Money
    unit: USD
    source: 42 USC 12704(17)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/42/12704
              excerpt: "at an average cost in excess of $25,000 per dwelling unit"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          25000

  - name: elder_cottage_adjacent_dwelling_min_family_count
    kind: parameter
    dtype: Count
    source: 42 USC 12704(8)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/12704
              excerpt: "adjacent to existing 1- to 4-family dwellings"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          1

  - name: elder_cottage_adjacent_dwelling_max_family_count
    kind: parameter
    dtype: Count
    source: 42 USC 12704(8)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/12704
              excerpt: "adjacent to existing 1- to 4-family dwellings"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          4

  - name: low_income_family
    kind: derived
    entity: Family
    dtype: Judgment
    period: Year
    source: 42 USC 12704(10)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/statute/42/12704
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/42/12704#low_income_family_median_income_limit_rate
              output: low_income_family_median_income_limit_rate
              hash: sha256:local
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          family_income <= low_income_family_median_income_limit_rate * area_median_income_adjusted_for_family_size

  - name: very_low_income_family
    kind: derived
    entity: Family
    dtype: Judgment
    period: Year
    source: 42 USC 12704(9)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/statute/42/12704
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/42/12704#very_low_income_family_median_income_limit_rate
              output: very_low_income_family_median_income_limit_rate
              hash: sha256:local
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          low_income_family
          and family_income <= very_low_income_family_median_income_limit_rate * area_median_family_income_adjusted_for_family_size

  - name: substantial_rehabilitation
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: 42 USC 12704(17)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/statute/42/12704
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/42/12704#substantial_rehabilitation_average_cost_threshold
              output: substantial_rehabilitation_average_cost_threshold
              hash: sha256:local
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          residential_property_rehabilitation_average_cost_per_dwelling_unit > substantial_rehabilitation_average_cost_threshold
