              corpus_citation_path: us/statute/42/1486
              excerpt: "Any advance provided under subparagraph (A)(i) shall be repaid on such terms as may be prescribed by the Secretary when the project ceases to be used"
    versions:
      - effective_from: '1990-11-28'
        formula: |-
          if project_ceases_to_be_used_as_housing_under_subsection: max(0, advance_amount_received) * advance_repayment_rate else: 0
  - name: administrative_expense_maximum
