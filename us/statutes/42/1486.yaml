  - name: advance_repayment_rate
    kind: derived
    entity: HousingProject
    dtype: Rate
    source: 42 USC 1486(k)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/1486
              excerpt: "100 percent of the advance if the housing is used for purposes under this subsection for fewer than 10 years following initial occupancy. If the housing is used for such purposes for more than 10 years, the percentage of the amount that shall be required to be repaid shall be reduced by 10 percentage points for each year in excess of 10"
    versions:
      - effective_from: '1990-11-28'
        formula: |-
          if years_used_for_subsection_purposes < full_advance_repayment_use_period_limit_years: full_advance_repayment_rate else: max(0, full_advance_repayment_rate - (advance_repayment_annual_reduction_percentage_points * max(0, years_used_for_subsection_purposes - full_advance_repayment_use_period_limit_years)))
  - name: advance_repayment_amount
