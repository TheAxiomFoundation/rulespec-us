format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/1486
  summary: |-
    The Secretary may provide financial assistance for low-rent domestic farm labor housing subject to applicant contributions, maximum assistance percentages, agreements on rent, safety, priority occupancy, smoke alarms, labor standards, migrant farmworker housing rules, limited use for other families, and a rural homeless/migrant farmworker housing assistance program with stated grant, advance, operating-cost, repayment, recapture, and administrative-expense limits.
  deferred_outputs:
    - output: us:statutes/42/1486/g#low_rent_housing
      reason: Definitions in subsection (g) depend on unencoded cross-referenced definitions in 42 USC 1484(f), 42 USC 1484(f)(3), 42 USC 1485(d)(4), and 15 USC 2225(d).
    - output: us:statutes/42/1486/h#migrant_farmworker_housing_assistance_availability
      reason: The subsection authorizes Secretary discretion and prescriptive requirements; this artifact retains the source-stated scalar assistance rate but does not encode the full discretionary approval surface.
    - output: us:statutes/42/1486/j#other_family_occupancy_under_section_1485
      reason: Occupancy eligibility depends on section 1485 tenants and Secretary determinations; available context does not export an occupancy-eligibility concept for section 1485.
    - output: us:statutes/42/1486/k#housing_for_rural_homeless_and_migrant_farmworkers_program
      reason: The subsection establishes a multi-part discretionary assistance program with applicant definitions depending on unencoded 42 USC 11302 and program-selection procedures outside this schema; independent scalar limits and narrow computable conditions are encoded.
