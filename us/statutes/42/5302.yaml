format: rulespec/v1
module:
  status: deferred
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/5302
  summary: |-
    42 USC 5302 defines terms used in this chapter, including unit of general local government, State, metropolitan area, metropolitan city, city, urban county, nonentitlement area, population, poverty, housing measures, Indian tribe, Secretary, low- and moderate-income persons, microenterprise, small business, and insular area. Subsection (d) governs three-program-year inclusion of local-government populations in urban counties and separate-grant ineligibility unless the urban county receives no grant. Subsection (e) requires urban-county qualification applicants to notify included local governments of exclusion-election opportunities and provides default inclusion when no exclusion election is made.
  deferred_outputs:
    - output: us:statutes/42/5302/a#definitions
      reason: Subsection (a) is a broad definitional section with multiple terms that depend on unavailable cited legal definitions and allocation mechanics, including sections 5306, 4512, 4513, 5318, 1437f, 1391 of title 26, section 632(a) of title 15, and external Census, OMB, Secretary, EPA, Defense, and BRAC classifications. Encoding only selected helper predicates would not faithfully expose the defined terms.
    - output: us:statutes/42/5302/d#local_government_population_included_in_urban_county
      reason: Subsection (d) depends on qualification and grant mechanics under sections 5303 and 5306, plus urban-county inclusion under subsection (a)(6)(A)(ii) or (D). Those upstream allocation and classification outputs are not available in copied RuleSpec context.
    - output: us:statutes/42/5302/e#urban_county_exclusion_election_notification_and_default_population_inclusion
      reason: Subsection (e) depends on urban-county qualification, eligibility to elect exclusion under subsection (a)(6)(A)(ii)(I)(a), Secretary-prescribed timing and manner, and subsection (d) inclusion mechanics. Those administrative and classification dependencies are not available as executable RuleSpec outputs.
