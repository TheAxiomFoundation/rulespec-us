format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/1490m
  summary: |-
    Section 1490m authorizes rural housing preservation grants, states mandatory program uses and limits, establishes State allocation criteria and a 50 percent single-grantee cap, requires grantee statements of activity and Secretary evaluation criteria, imposes rental/cooperative housing agreements including a 5-year low-income occupancy commitment, requires annual review and audit, authorizes advance payments, rulemaking deadlines, and historic-preservation procedures.
  deferred_outputs:
    - output: us:statutes/42/1490m/a#housing_preservation_grant_purpose_and_authorization
      reason: Purpose and broad grant authorization clause is administrative and programmatic, not a computable eligibility, amount, cap, or condition without downstream program application context.
rules:
  - name: single_family_replacement_assistance_per_unit_cap
    kind: parameter
    dtype: Money
    unit: USD
    source: 42 USC 1490m(b)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/42/1490m
              excerpt: "not to exceed $15,000 per unit"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          15000

  - name: rental_rehabilitation_or_replacement_total_cost_cap_rate
    kind: parameter
    dtype: Rate
    source: 42 USC 1490m(b)(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/1490m
              excerpt: "shall not exceed 75 per centum of the total costs"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.75

  - name: very_low_income_area_median_income_limit_rate
    kind: parameter
    dtype: Rate
    source: 42 USC 1490m(b)(5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/1490m
              excerpt: "incomes do not exceed 50 per centum of the area median income"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.50

  - name: state_allocation_single_grantee_cap_rate
    kind: parameter
    dtype: Rate
    source: 42 USC 1490m(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/1490m
              excerpt: "may not receive more than 50 per centum of a State's allocation"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.50

  - name: remote_rural_area_population_threshold
    kind: parameter
    dtype: Count
    source: 42 USC 1490m(d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/1490m
              excerpt: "rural areas having populations below 10,000"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10000

  - name: rental_or_cooperative_low_income_occupancy_required_years
    kind: parameter
    dtype: Count
    source: 42 USC 1490m(e)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/1490m
              excerpt: "during the 5-year period beginning on the date"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          5

  - name: initial_rulemaking_deadline_days_after_enactment
    kind: parameter
    dtype: Count
    source: 42 USC 1490m(h)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/1490m
              excerpt: "within 90 days after November 30, 1983"
    versions:
      - effective_from: '1983-11-30'
        formula: |-
          90

  - name: grant_program_rulemaking_deadline_days_after_amendment
    kind: parameter
    dtype: Count
    source: 42 USC 1490m(h)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/1490m
              excerpt: "not later than the expiration of the 30-day period following February 5, 1988"
    versions:
      - effective_from: '1988-02-05'
        formula: |-
          30

  - name: secretary_review_minimum_frequency_per_year
    kind: parameter
    dtype: Count
    source: 42 USC 1490m(g)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/1490m
              excerpt: "at least on an annual basis"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1
