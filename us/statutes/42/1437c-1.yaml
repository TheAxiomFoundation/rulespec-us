  source_verification:
    corpus_citation_path: us/statute/42/1437c–1
  summary: |-
    42 USC 1437c–1 requires public housing agencies to submit 5-year and annual public housing agency plans, specifies annual-plan contents, resident advisory board and public-hearing procedures, submission deadlines, Secretarial review, streamlined plans, and compliance enforcement. Annual-plan filing is subject to an exemption for qualified public housing agencies, whose definition depends on public housing/voucher counts and troubled/failing-score statuses under cited provisions.
  deferred_outputs:
    - output: us:statutes/42/1437c–1/b#annual_public_housing_agency_plan_requirement
      reason: Annual-plan applicability is subject to the qualified public housing agency exemption, and the qualified-agency definition depends on unavailable section 1437d(j)(2) troubled-agency status and section 8 Management Assessment Program failing-score mechanics.
    - output: us:statutes/42/1437c–1/d#annual_public_housing_agency_plan_contents
      reason: The subsection enumerates documentary plan contents and cross-referenced program categories rather than a computable amount or eligibility formula; several required content items depend on unavailable cited public-housing provisions.
    - output: us:statutes/42/1437c–1/h#public_housing_agency_plan_submission_deadlines
      reason: Submission timing is an administrative filing requirement whose operative timing and form are set by the Secretary or by the public housing agency fiscal year; this source slice lacks a computable runtime date representation for the filing event.
