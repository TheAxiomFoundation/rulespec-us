format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/12745
  summary: |-
    Rental housing qualifies only if it satisfies rent, very-low-income occupancy, low-income occupancy, voucher nondiscrimination, affordability-commitment, and new-construction energy-efficiency conditions; the Secretary may adjust qualifying rent for financial viability. Homeownership housing qualifies only if purchase-price, low-income owner-occupancy, resale/recapture, and new-construction energy-efficiency conditions are met.
  deferred_outputs:
    - output: us:statutes/42/12745/a#rental_housing_qualifies_as_affordable_housing
      reason: Rental qualification depends on fair market rents, vouchers or tenant-based assistance under 42 USC 1437f, rent-restricted residential units under 26 USC 42(g)(2), and energy efficiency standards under 42 USC 12709, none of which is available as copied RuleSpec context.
      source_values:
        - us:statutes/42/12745#rental_median_income_reference_rate
        - us:statutes/42/12745#rental_very_low_income_unit_minimum_rate
        - us:statutes/42/12745#tenant_rent_contribution_income_limit_rate
    - output: us:statutes/42/12745/b#homeownership_housing_qualifies_as_affordable_housing
      reason: Homeownership qualification depends on low-income-family qualification under the subchapter and, for newly constructed housing, energy efficiency standards under 42 USC 12709, which is not available as copied RuleSpec context.
      source_values:
        - us:statutes/42/12745#homeownership_initial_purchase_price_median_purchase_price_limit_rate
rules:
  - name: rental_median_income_reference_rate
    kind: parameter
    dtype: Rate
    source: 42 USC 12745(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/12745
              excerpt: "65 percent of the median income for the area"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          0.65

  - name: rental_very_low_income_unit_minimum_rate
    kind: parameter
    dtype: Rate
    source: 42 USC 12745(a)(1)(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/12745
              excerpt: "not less than 20 percent of the units"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          0.20

  - name: tenant_rent_contribution_income_limit_rate
    kind: parameter
    dtype: Rate
    source: 42 USC 12745(a)(1)(B)(i)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/12745
              excerpt: "not more than 30 percent of the family’s monthly adjusted income"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          0.30

  - name: tenant_income_increase_rent_limit_rate
    kind: parameter
    dtype: Rate
    source: 42 USC 12745(a)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/12745
              excerpt: "30 percent of the family’s adjusted monthly income"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          0.30

  - name: homeownership_initial_purchase_price_median_purchase_price_limit_rate
    kind: parameter
    dtype: Rate
    source: 42 USC 12745(b)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/12745
              excerpt: "does not exceed 95 percent of the median purchase price for the area"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          0.95
