format: rulespec/v1
rules:
- name: public_loan_sale_reserve_minimum_rate
  kind: parameter
  dtype: Rate
  source: 42 USC 1487(d)(4)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us/statute/42/1487
          excerpt: not less than 5 percent of the outstanding face amount
  versions:
  - effective_from: '0001-01-01'
    formula: '0.05'
- name: public_loan_sale_reserve_minimum_amount
  kind: derived
  entity: LoanSale
  dtype: Money
  period: Year
  unit: USD
  source: 42 USC 1487(d)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us/statute/42/1487
          excerpt: shall set aside as a reserve against future losses not less than
            5 percent
      - path: versions[0].formula
        kind: import
        import:
          target: us:statutes/42/1487#public_loan_sale_reserve_minimum_rate
          output: public_loan_sale_reserve_minimum_rate
          hash: sha256:local
  versions:
  - effective_from: '0001-01-01'
    formula: public_loan_sale_reserve_minimum_rate * outstanding_face_amount_of_loans_held_by_public
- name: public_sale_interest_subsidy_rate_difference
  kind: derived
  entity: LoanSale
  dtype: Rate
  period: Year
  source: 42 USC 1487(d)(2)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us/statute/42/1487
          excerpt: "the difference between the rate of interest paid by the borrower of such loan and the market rate of interest"
  versions:
  - effective_from: '0001-01-01'
    formula: 'if loan_made_under_this_subchapter_and_insured_or_guaranteed_in_accordance_with_subsection_d
      and loan_offered_for_sale_to_public: market_rate_of_interest_on_comparable_obligations_on_sale_date
      - borrower_interest_rate else: 0'
- name: public_sale_borrower_protection_agreements_required
  kind: derived
  entity: LoanSale
  dtype: Judgment
  period: Year
  source: 42 USC 1487(d)(3)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us/statute/42/1487
  versions:
  - effective_from: '0001-01-01'
    formula: 'loan_made_under_this_subchapter_and_insured_or_guaranteed_in_accordance_with_subsection_d

      and loan_offered_for_sale_to_public

      and agreement_protects_borrower_rights_from_purchaser_or_assignee_diminution

      and agreement_requires_assignment_to_secretary_after_substantial_default_before_foreclosure

      and agreement_requires_secretary_to_afford_subchapter_rights_before_foreclosure_or_dispossession_after_assignment'
- name: loan_commitment_authorized
  kind: derived
  entity: LoanCommitment
  dtype: Judgment
  period: Year
  source: 42 USC 1487(l)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us/statute/42/1487
  versions:
  - effective_from: '0001-01-01'
    formula: 'applicant_is_lender_builder_or_seller

      and applicant_complies_with_secretary_requirements

      and commitment_terms_and_conditions_are_prescribed_by_secretary'
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/1487
  summary: 42 USC 1487 authorizes Rural Housing Insurance Fund loan insurance, direct
    loans to be sold and insured, loan-sale and borrower-protection agreements, the
    Rural Housing Insurance Fund and its assets, notes, charges, additional fund uses,
    loan-sale treatment, commitments to make or insure loans, and guarantees and servicing
    for eligible residential property loans. Subsection (d) requires public-sale loans
    insured or guaranteed under that subsection to be accompanied by interest-difference
    and borrower-protection agreements and requires a reserve of not less than 5 percent
    of the outstanding face amount of loans held by the public. Subsection (l) authorizes
    commitments to make or insure loans to eligible applicants. Subsection (n) depends
    on eligible residential properties under 12 USC 1441a(c) and section 1490a(a)(1)(A).
  deferred_outputs:
  - output: us:statutes/42/1487/n#eligible_residential_property_loan_guarantee_and_servicing
    reason: Subsection (n) depends on purchase of eligible residential properties
      under missing 12 USC 1441a(c) and on the last sentence of 42 USC 1490a(a)(1)(A);
      the copied 42 USC 1490a context does not export that cited loan-guarantee condition.
