format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/12742/a
  summary: |-
    42 USC 12742(a) authorizes participating jurisdictions to use funds made available under this part for listed affordable rental housing and homeownership affordability activities, tenant-based rental assistance, reasonable administrative and planning costs, operating expenses of community housing development organizations, security-deposit assistance, and lead-based paint hazard evaluation and reduction. Tenant-based rental assistance requires specified certifications and written tenant selection policies, and rental assistance contracts may be for not more than 24 months, with renewal permitted.
  deferred_outputs:
    - output: us:statutes/42/12742/a#rehabilitation_preference_exception
      reason: The preference to rehabilitation depends on determinations about cost effectiveness and unmet housing needs, and the Secretary restriction clause depends on missing section 12753(2) authority.
    - output: us:statutes/42/12742/a#tenant_selection_policy_consistency_with_section_1437d
      reason: Tenant selection policy consistency is tied to preference rules established under missing section 1437d(c)(4)(A); this artifact keeps the source-stated policy compliance as a boundary fact.
    - output: us:statutes/42/12742/a#section_8_fair_share_allocation_unaffected
      reason: The clause concerns section 8 fair share allocation under missing section 1437f and is not executable from the supplied source alone.
    - output: us:statutes/42/12742/a#section_1437f_recipient_tenant_selection_preferences
      reason: The preference rule applies when assistance under missing section 1437f becomes available and requires the upstream section 1437f assistance framework.
    - output: us:statutes/42/12742/a#lead_based_paint_hazard_definition
      reason: Lead-based paint hazards are defined in missing section 4851b; this artifact encodes only the source-stated use authorization when the hazard category is supplied.
rules:
  - name: tenant_based_rental_assistance_contract_maximum_months
    kind: parameter
    dtype: Count
    source: 42 USC 12742(a)(3)(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/12742/a
              excerpt: "Rental assistance contracts ... shall be for not more than 24 months"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          24

  - name: funds_may_be_used_for_housing_uses
    kind: derived
    entity: ParticipatingJurisdiction
    dtype: Judgment
    period: Year
    source: 42 USC 12742(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us/statute/42/12742/a
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          funds_made_available_under_this_part
          and participating_jurisdiction_uses_funds_for_source_listed_housing_use

  - name: tenant_based_rental_assistance_funding_authorized
    kind: derived
    entity: ParticipatingJurisdiction
    dtype: Judgment
    period: Year
    source: 42 USC 12742(a)(3)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/42/12742/a
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          funds_made_available_under_this_part
          and jurisdiction_certifies_tenant_based_rental_assistance_is_essential_element_of_annual_housing_strategy
          and jurisdiction_specifies_local_market_conditions_leading_to_tenant_based_rental_assistance_option
          and tenant_based_rental_assistance_provided_under_written_selection_policies_consistent_with_low_income_housing_purposes_and_section_1437d_preferences

  - name: rental_assistance_contract_within_source_term_limit
    kind: derived
    entity: RentalAssistanceContract
    dtype: Judgment
    period: Month
    source: 42 USC 12742(a)(3)(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/12742/a
              excerpt: "shall be for not more than 24 months"
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/42/12742#tenant_based_rental_assistance_contract_maximum_months
              output: tenant_based_rental_assistance_contract_maximum_months
              hash: sha256:local
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          rental_assistance_contract_months <= tenant_based_rental_assistance_contract_maximum_months

  - name: security_deposit_assistance_funding_authorized
    kind: derived
    entity: ParticipatingJurisdiction
    dtype: Judgment
    period: Year
    source: 42 USC 12742(a)(3)(E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us/statute/42/12742/a
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          jurisdiction_uses_funds_for_tenant_based_rental_assistance
          and assistance_is_loan_or_grant_for_security_deposit_for_rental_dwelling_unit
          and family_is_very_low_or_low_income

  - name: lead_based_paint_hazard_evaluation_reduction_funding_authorized
    kind: derived
    entity: ParticipatingJurisdiction
    dtype: Judgment
    period: Year
    source: 42 USC 12742(a)(5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us/statute/42/12742/a
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          funds_made_available_under_this_part
          and funds_used_for_evaluation_or_reduction_of_lead_based_paint_hazards_as_defined_in_section_4851b
