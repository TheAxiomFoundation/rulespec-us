  - name: housing_covered_by_secretary_program_or_project_based_assistance
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: 42 USC 4822(a)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/42/4822
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/42/4822#project_based_assistance_coverage_threshold
              output: project_based_assistance_coverage_threshold
              hash: sha256:local
    versions:
      - effective_from: '1995-01-01'
        formula: |-
          housing_covered_by_application_for_mortgage_insurance_or_housing_assistance_payments_under_secretary_program
          or project_based_federal_housing_assistance_amount > project_based_assistance_coverage_threshold

  - name: section_exception_applies
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: 42 USC 4822(e)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/42/4822
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/42/4822#section_exception_excluded_bedroom_count
              output: section_exception_excluded_bedroom_count
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/42/4822#section_exception_child_age_limit_years
              output: section_exception_child_age_limit_years
              hash: sha256:local
    versions:
      - effective_from: '1995-01-01'
        formula: |-
          (
            (
              housing_for_elderly_or_persons_with_disabilities
              or dwelling_bedroom_count == section_exception_excluded_bedroom_count
            )
            and not (
              child_resides_or_expected_to_reside_in_housing
              and youngest_resident_or_expected_child_age_years < section_exception_child_age_limit_years
            )
          )
          or project_application_submitted_under_section_1715v_1715w_1715z_6_or_1715z_7

  - name: target_housing_subject_to_hazard_elimination_procedures
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: 42 USC 4822(a)(1), (e)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/42/4822
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/42/4851b#target_housing
              output: target_housing
              hash: sha256:9aed2d17a98907428823cee08bfdfa950e105d4de6fef7d8deaabd1093bc8ca1
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/42/4822#housing_covered_by_secretary_program_or_project_based_assistance
              output: housing_covered_by_secretary_program_or_project_based_assistance
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/42/4822#section_exception_applies
              output: section_exception_applies
              hash: sha256:local
    versions:
      - effective_from: '1995-01-01'
        formula: |-
          existing_housing_may_present_lead_based_paint_poisoning_hazards
          and housing_covered_by_secretary_program_or_project_based_assistance
          and target_housing
          and not section_exception_applies

  - name: inspection_result_disclosure_required
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: 42 USC 4822(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/42/4822
              excerpt: "If the results equal or exceed a level of 1.0 milligrams per centimeter squared or 0.5 percent by weight"
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/42/4822#lead_inspection_result_threshold_milligrams_per_square_centimeter
              output: lead_inspection_result_threshold_milligrams_per_square_centimeter
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/42/4822#lead_inspection_result_threshold_weight_rate
              output: lead_inspection_result_threshold_weight_rate
              hash: sha256:local
    versions:
      - effective_from: '1995-01-01'
        formula: |-
          housing_subject_to_section_inspection_requirements
          and (
            inspection_result_milligrams_per_square_centimeter >= lead_inspection_result_threshold_milligrams_per_square_centimeter
            or inspection_result_weight_rate >= lead_inspection_result_threshold_weight_rate
          )
