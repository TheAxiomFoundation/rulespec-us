format: rulespec/v1
imports:
  - us:statutes/42/4851b#target_housing
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/4822
  summary: |-
    42 USC 4822 requires HUD procedures to eliminate lead-based-paint poisoning hazards in covered existing housing, including target housing beginning January 1, 1995. The section states coverage for housing receiving more than $5,000 in project-based Federal housing assistance, reduction or abatement thresholds at $25,000 per unit in Federal funds, inspection-result disclosure thresholds of 1.0 milligrams per centimeter squared or 0.5 percent by weight, public-housing testing and abatement schedules, exceptions for elderly/disability and 0-bedroom housing unless a child under age 6 resides or is expected to reside there, and exceptions for specified title 12 insurance applications.
  deferred_outputs:
    - output: us:statutes/42/4822#measurement_criteria_guidelines
      reason: Subsection (b) requires procedures to be based on guidelines developed pursuant to section 4852c, but no copied RuleSpec context provides section 4852c.
    - output: us:statutes/42/4822#public_housing_testing_and_abatement_requirements
      reason: Subsection (d) depends on public-housing assistance under section 1437g, public housing concepts, modernization schedules, and section 1437l assistance references not fully executable in copied context.
      source_values:
        - us:statutes/42/4822#demonstration_report_deadline_months
        - us:statutes/42/4822#other_public_housing_inspection_deadline_years
        - us:statutes/42/4822#private_housing_plan_report_deadline_months
