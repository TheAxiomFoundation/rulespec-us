format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/1396d/n
  summary: |-
    The term "qualified pregnant woman or child" means specified pregnant women meeting AFDC-related or State-plan income/resources conditions, and children under 19 born after September 30, 1983 (or an earlier State-designated date) who meet State-plan income/resources requirements.
rules:
  - name: child_age_attainment_threshold
    kind: parameter
    dtype: Count
    source: 42 USC 1396d(n)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/1396d/n
              excerpt: "a child who has not attained the age of 19"
    versions:
      - effective_from: '1983-07-01'
        formula: |-
          19

  - name: qualified_pregnant_woman_or_child
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 USC 1396d(n)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/statute/42/1396d/n
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/1396d/n
              excerpt: "has not attained the age of 19"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/42/1396d/n
              excerpt: "born after September 30, 1983 (or such earlier date as the State may designate)"
    versions:
      - effective_from: '1983-07-01'
        formula: |-
          (
            person_is_pregnant_woman
            and (
              (
                would_be_eligible_for_aid_to_families_with_dependent_children_if_child_had_been_born_and_was_living_with_her_in_month_aid_would_be_paid
                and pregnancy_has_been_medically_verified
              )
              or family_would_be_eligible_for_aid_under_state_plan_pursuant_to_section_607_if_plan_required_payment
              or otherwise_meets_income_and_resources_requirements_of_state_plan_under_part_a_of_subchapter_iv
            )
          )
          or (
            person_is_child
            and age < child_age_attainment_threshold
            and child_was_born_after_september_30_1983_or_state_designated_earlier_date
            and child_meets_income_and_resources_requirements_of_state_plan_under_part_a_of_subchapter_iv
          )
