format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/1437p
  summary: |-
    42 USC 1437p(c) requires, for a proposed disposition of a public housing project or portion, an initial offer to eligible resident organizations, eligible resident management corporations, or resident-supported nonprofit entities in appropriate circumstances, if written interest is timely expressed for continued low-income housing use. Interest may be expressed during the 30-day period beginning on sale notification, and written interest triggers a 60-day no-disposition period except disposition to the interested entity.
rules:
  - name: resident_purchase_interest_expression_period_days
    kind: parameter
    dtype: Count
    source: 42 USC 1437p(c)(2)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/1437p
              excerpt: "during the 30-day period beginning on the date of notification of a proposed sale"
    versions:
      - effective_from: '1998-10-21'
        formula: |-
          30

  - name: resident_purchase_financing_commitment_period_days
    kind: parameter
    dtype: Count
    source: 42 USC 1437p(c)(2)(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/1437p
              excerpt: "during the 60-day period beginning on the date of receipt of that written notice"
    versions:
      - effective_from: '1998-10-21'
        formula: |-
          60

  - name: resident_purchase_written_interest_timely
    kind: derived
    entity: PublicHousingDisposition
    dtype: Judgment
    period: Day
    source: 42 USC 1437p(c)(2)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/1437p
    versions:
      - effective_from: '1998-10-21'
        formula: |-
          resident_supported_entity_expressed_written_purchase_interest
          and days_since_notification_of_proposed_sale <= resident_purchase_interest_expression_period_days

  - name: resident_purchase_initial_offer_required
    kind: derived
    entity: PublicHousingDisposition
    dtype: Judgment
    period: Day
    source: 42 USC 1437p(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/42/1437p
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/1437p
    versions:
      - effective_from: '1998-10-21'
        formula: |-
          proposed_disposition_of_public_housing_project_or_portion
          and secretary_determined_appropriate_circumstances
          and entity_is_eligible_resident_purchaser_for_continued_low_income_housing
          and resident_purchase_written_interest_timely

  - name: resident_purchase_no_disposition_period_applies
    kind: derived
    entity: PublicHousingDisposition
    dtype: Judgment
    period: Day
    source: 42 USC 1437p(c)(2)(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/42/1437p
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/1437p
    versions:
      - effective_from: '1998-10-21'
        formula: |-
          resident_supported_entity_expressed_written_purchase_interest
          and days_since_receipt_of_written_purchase_interest <= resident_purchase_financing_commitment_period_days
          and not disposition_is_to_entity_providing_written_purchase_interest
