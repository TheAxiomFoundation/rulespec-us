format: rulespec/v1
imports:
  - us:statutes/42/416/l#retirement_age_total_months
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/402/q
  summary: |-
    Old-age insurance benefits first claimed before retirement age are reduced for the months in the reduction period. For old-age benefits, the first 36 months are reduced at 5/9 of 1 percent per month and additional months at 5/12 of 1 percent per month. The reduction amount is applied after section 403(a), before section 415(g), and is rounded up to the next higher multiple of $0.10 if needed.

    Input contract: the free inputs (months in the reduction period
    and the pre-reduction benefit amount) are values fixed at the
    claiming determination. Under lifetime execution they must be
    supplied period-invariant (identical in every period) or wrapped
    in an over-periods reduction; the engine rejects period-varying
    bare inputs outside reductions.
rules:
  - name: old_age_first_tier_reduction_month_limit
    kind: parameter
    dtype: Integer
    unit: months
    source: 42 USC 402(q)(9)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/42/402/q
              excerpt: "for the first 36 months"
    versions:
      - effective_from: '1983-01-01'
        formula: |-
          36
  - name: old_age_first_tier_monthly_reduction_rate
    kind: parameter
    dtype: Rate
    source: 42 USC 402(q)(1)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: rate
            source:
              corpus_citation_path: us/statute/42/402/q
              excerpt: "5/9 of 1 percent of such amount"
    versions:
      - effective_from: '1983-01-01'
        formula: |-
          5 / 900
  - name: old_age_additional_month_reduction_rate
    kind: parameter
    dtype: Rate
    source: 42 USC 402(q)(9)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: rate
            source:
              corpus_citation_path: us/statute/42/402/q
              excerpt: "five-twelfths of 1 percent"
    versions:
      - effective_from: '1983-01-01'
        formula: |-
          5 / 1200
  - name: old_age_reduction_rounding_multiple
    kind: parameter
    dtype: Money
    unit: USD
    source: 42 USC 402(q)(8)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/42/402/q
              excerpt: "is not a multiple of $0.10"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/402/q
              excerpt: "increased to the next higher multiple of $0.10"
    versions:
      - effective_from: '1983-01-01'
        formula: |-
          0.10
  - name: old_age_early_claiming_reduction_months
    kind: derived
    entity: Person
    dtype: Integer
    period: Month
    unit: months
    source: 42 USC 402(q)(1), 402(q)(6)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/42/402/q
              excerpt: "before the month in which such individual attains retirement age"
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/statute/42/402/q
              excerpt: "ending with the last day of the month before the month in which such individual attains retirement age"
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/42/416/l#retirement_age_total_months
              output: retirement_age_total_months
              hash: sha256:eebe9105468d83ab4812c4b9ed37c23a72ca4edbcb849b1e4dd78ae2560e4229
    versions:
      - effective_from: '1983-01-01'
        formula: |-
          max(0, retirement_age_total_months - old_age_benefit_entitlement_age_total_months)
  - name: old_age_first_tier_reduction_months
    kind: derived
    entity: Person
    dtype: Integer
    period: Month
    unit: months
    source: 42 USC 402(q)(9)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/402/q
              excerpt: "for the first 36 months of the reduction period"
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/42/402/q#old_age_first_tier_reduction_month_limit
              output: old_age_first_tier_reduction_month_limit
              hash: sha256:local
    versions:
      - effective_from: '1983-01-01'
        formula: |-
          min(old_age_early_claiming_reduction_months, old_age_first_tier_reduction_month_limit)
  - name: old_age_additional_reduction_months
    kind: derived
    entity: Person
    dtype: Integer
    period: Month
    unit: months
    source: 42 USC 402(q)(9)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/402/q
              excerpt: "for any additional months included in such periods"
    versions:
      - effective_from: '1983-01-01'
        formula: |-
          max(0, old_age_early_claiming_reduction_months - old_age_first_tier_reduction_month_limit)
  - name: old_age_early_claiming_reduction_rate
    kind: derived
    entity: Person
    dtype: Rate
    period: Month
    source: 42 USC 402(q)(1)(A), 402(q)(9)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/402/q
              excerpt: "multiplied by the number of months in the reduction period"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/402/q
              excerpt: "five-twelfths of 1 percent for any additional months"
    versions:
      - effective_from: '1983-01-01'
        formula: |-
          old_age_first_tier_reduction_months * old_age_first_tier_monthly_reduction_rate
          + old_age_additional_reduction_months * old_age_additional_month_reduction_rate
  - name: unrounded_old_age_early_claiming_reduction_amount
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: USD
    source: 42 USC 402(q)(1)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/402/q
              excerpt: "reduced by"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/402/q
              excerpt: "of such amount"
    versions:
      - effective_from: '1983-01-01'
        formula: |-
          old_age_insurance_benefit_before_section_402_q_reduction
          * old_age_early_claiming_reduction_rate
  - name: old_age_early_claiming_reduction_amount
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: USD
    source: 42 USC 402(q)(8)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/402/q
              excerpt: "If the amount of any reduction computed under paragraph (1), (2), or (3) is not a multiple of $0.10"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/402/q
              excerpt: "it shall be increased to the next higher multiple of $0.10"
    versions:
      - effective_from: '1983-01-01'
        formula: |-
          ceil(unrounded_old_age_early_claiming_reduction_amount / old_age_reduction_rounding_multiple) * old_age_reduction_rounding_multiple
  - name: old_age_insurance_benefit_after_early_claiming_reduction
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: USD
    source: 42 USC 402(q)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/402/q
              excerpt: "the amount of such benefit for such month and for any subsequent month shall ... be reduced"
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/42/402/q#old_age_early_claiming_reduction_amount
              output: old_age_early_claiming_reduction_amount
              hash: sha256:local
    versions:
      - effective_from: '1983-01-01'
        formula: |-
          max(
              0,
              old_age_insurance_benefit_before_section_402_q_reduction
              - old_age_early_claiming_reduction_amount
          )
