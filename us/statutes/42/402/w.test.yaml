- name: transition_table_birth_year_1935_uses_one_half_percent_per_month
  period: 2026-01
  input:
    # Born in 1935, first eligible in 1997.
    # Transition rate = 1/4 of 1% + floor((1997 - 1985) / 2) * 1/24 of 1%
    # = 0.25% + 6 * 0.041666...% = 0.5% per month.
    # Retirement age is 65; age 70 gives 60 increment months and a 30% credit.
    us:statutes/42/416/l#input.year_of_birth: 1935
    us:statutes/42/402/w#input.year_of_birth: 1935
    us:statutes/42/402/w#input.old_age_benefit_entitlement_age_total_months: 840
    us:statutes/42/402/w#input.old_age_insurance_benefit_before_delayed_retirement_credit: 1000
  output:
    us:statutes/42/402/w#old_age_insurance_benefit_eligibility_year: 1997
    us:statutes/42/402/w#delayed_retirement_credit_applicable_monthly_rate: 0.005
    us:statutes/42/402/w#delayed_retirement_credit_increment_months: 60
    us:statutes/42/402/w#delayed_retirement_credit_total_rate: 0.30
    us:statutes/42/402/w#delayed_retirement_credit_increase_amount: 300
    us:statutes/42/402/w#old_age_insurance_benefit_after_delayed_retirement_credit: 1300
