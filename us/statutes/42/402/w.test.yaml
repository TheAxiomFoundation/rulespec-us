- name: birth_year_1943_claiming_at_70_receives_32_percent_credit
  period: 2026-01
  input:
    # Born in 1943, first eligible for old-age insurance in 2005.
    # Applicable monthly percentage after 2004 is 2/3 of 1%.
    # Retirement age is 66 = 792 months; age 70 = 840 months.
    # Increment months = 48; total credit = 48 * 2/300 = 0.32.
    us:statutes/42/416/l#input.year_of_birth: 1943
    us:statutes/42/402/w#input.year_of_birth: 1943
    us:statutes/42/402/w#input.old_age_benefit_entitlement_age_total_months: 840
    us:statutes/42/402/w#input.old_age_insurance_benefit_before_delayed_retirement_credit: 1000
  output:
    us:statutes/42/402/w#old_age_insurance_benefit_eligibility_year: 2005
    us:statutes/42/402/w#delayed_retirement_credit_age_ceiling_months: 840
    us:statutes/42/402/w#delayed_retirement_credit_applicable_monthly_rate: 0.006666666666666667
    us:statutes/42/402/w#delayed_retirement_credit_increment_months: 48
    us:statutes/42/402/w#delayed_retirement_credit_total_rate: 0.32
    us:statutes/42/402/w#delayed_retirement_credit_increase_amount: 320
    us:statutes/42/402/w#old_age_insurance_benefit_after_delayed_retirement_credit: 1320
