# 42 USC 402(a) old-age insurance benefit entitlement. The entitlement
# predicate is fully insured AND age >= 62 AND (filed an old-age
# application OR was entitled to disability insurance benefits for the
# month before attaining retirement age). Fully-insured status (section
# 414(a)) and disability entitlement (section 423) are unencoded leaf
# inputs. The minimum-age parameter (62) is asserted, and the
# entitlement judgment is exercised across the conjunction and the
# application/disability disjunction.
- name: minimum_age_for_old_age_insurance_benefit_is_62
  period: 2026-01
  input: {}
  output:
    us:statutes/42/402/a#old_age_insurance_benefit_minimum_age_years: 62
- name: fully_insured_age_62_applicant_is_entitled
  period: 2026-01
  input:
    us:statutes/42/402/a#input.individual_is_fully_insured: true
    us:statutes/42/402/a#input.age: 62
    us:statutes/42/402/a#input.individual_has_filed_application_for_old_age_insurance_benefits: true
    ? us:statutes/42/402/a#input.individual_was_entitled_to_disability_insurance_benefits_for_month_before_attaining_retirement_age
    : false
  output:
    us:statutes/42/402/a#individual_is_entitled_to_old_age_insurance_benefit: holds
- name: disability_conversion_without_application_is_entitled
  period: 2026-01
  input:
    us:statutes/42/402/a#input.individual_is_fully_insured: true
    us:statutes/42/402/a#input.age: 66
    us:statutes/42/402/a#input.individual_has_filed_application_for_old_age_insurance_benefits: false
    ? us:statutes/42/402/a#input.individual_was_entitled_to_disability_insurance_benefits_for_month_before_attaining_retirement_age
    : true
  output:
    us:statutes/42/402/a#individual_is_entitled_to_old_age_insurance_benefit: holds
- name: not_fully_insured_is_not_entitled
  period: 2026-01
  input:
    us:statutes/42/402/a#input.individual_is_fully_insured: false
    us:statutes/42/402/a#input.age: 66
    us:statutes/42/402/a#input.individual_has_filed_application_for_old_age_insurance_benefits: true
    ? us:statutes/42/402/a#input.individual_was_entitled_to_disability_insurance_benefits_for_month_before_attaining_retirement_age
    : true
  output:
    us:statutes/42/402/a#individual_is_entitled_to_old_age_insurance_benefit: not_holds
- name: under_age_62_is_not_entitled
  period: 2026-01
  input:
    us:statutes/42/402/a#input.individual_is_fully_insured: true
    us:statutes/42/402/a#input.age: 61
    us:statutes/42/402/a#input.individual_has_filed_application_for_old_age_insurance_benefits: true
    ? us:statutes/42/402/a#input.individual_was_entitled_to_disability_insurance_benefits_for_month_before_attaining_retirement_age
    : false
  output:
    us:statutes/42/402/a#individual_is_entitled_to_old_age_insurance_benefit: not_holds
- name: no_application_and_no_disability_is_not_entitled
  period: 2026-01
  input:
    us:statutes/42/402/a#input.individual_is_fully_insured: true
    us:statutes/42/402/a#input.age: 66
    us:statutes/42/402/a#input.individual_has_filed_application_for_old_age_insurance_benefits: false
    ? us:statutes/42/402/a#input.individual_was_entitled_to_disability_insurance_benefits_for_month_before_attaining_retirement_age
    : false
  output:
    us:statutes/42/402/a#individual_is_entitled_to_old_age_insurance_benefit: not_holds
