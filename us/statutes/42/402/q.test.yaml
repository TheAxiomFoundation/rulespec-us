- name: old_age_claim_60_months_early_has_thirty_percent_reduction
  period: 2026-01
  input:
    # Birth year 1960 gives retirement age 67 = 804 months.
    # Claiming at age 62 = 744 months, so reduction months = 60.
    # First 36 months: 36 * 5/900 = 0.20.
    # Additional 24 months: 24 * 5/1200 = 0.10.
    # Total reduction rate = 0.30.
    us:statutes/42/416/l#input.year_of_birth: 1960
    us:statutes/42/402/q#input.old_age_benefit_entitlement_age_total_months: 744
