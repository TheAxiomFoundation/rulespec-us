format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/1382c/a/2
  summary: |-
    “An individual shall be considered to be blind ... if he has central visual acuity of 20/200 or less in the better eye with the use of a correcting lens”; an eye with visual-field widest diameter no greater than 20 degrees is so considered; legacy State-plan blindness also qualifies while continuously blind.
rules:
  - name: blindness_visual_acuity_threshold_numerator
    kind: parameter
    dtype: Count
    source: 42 USC 1382c(a)(2), first sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/42/1382c/a/2
              excerpt: "central visual acuity of 20/200 or less"
    versions:
      - effective_from: '1974-01-01'
        formula: |-
          20

  - name: blindness_visual_acuity_threshold_denominator
    kind: parameter
    dtype: Count
    source: 42 USC 1382c(a)(2), first sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/42/1382c/a/2
              excerpt: "central visual acuity of 20/200 or less"
    versions:
      - effective_from: '1974-01-01'
        formula: |-
          200

  - name: blindness_visual_field_widest_diameter_max_degrees
    kind: parameter
    dtype: Count
    source: 42 USC 1382c(a)(2), second sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/42/1382c/a/2
              excerpt: "widest diameter of the visual field subtends an angle no greater than 20 degrees"
    versions:
      - effective_from: '1974-01-01'
        formula: |-
          20

  - name: blind_for_subchapter
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 USC 1382c(a)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/statute/42/1382c/a/2
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/42/1382c/a/2#blindness_visual_acuity_threshold_numerator
              output: blindness_visual_acuity_threshold_numerator
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/42/1382c/a/2#blindness_visual_acuity_threshold_denominator
              output: blindness_visual_acuity_threshold_denominator
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/42/1382c/a/2#blindness_visual_field_widest_diameter_max_degrees
              output: blindness_visual_field_widest_diameter_max_degrees
              hash: sha256:local
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/42/1382c/a/2
              excerpt: "with the use of a correcting lens"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/42/1382c/a/2
              excerpt: "State plan approved under subchapter X or XVI as in effect for October 1972"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/42/1382c/a/2
              excerpt: "received aid under such plan (on the basis of blindness) for December 1973"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/42/1382c/a/2
              excerpt: "so long as he is continuously blind as so defined"
    versions:
      - effective_from: '1974-01-01'
        formula: |-
          (
            better_eye_central_visual_acuity_with_correcting_lens <= blindness_visual_acuity_threshold_numerator / blindness_visual_acuity_threshold_denominator
          )
          or (
            better_eye_widest_diameter_visual_field_degrees <= blindness_visual_field_widest_diameter_max_degrees
          )
          or (
            blind_under_referenced_state_plan_historical_definition
            and received_blindness_aid_under_referenced_state_plan_for_reference_month
            and continuously_blind_under_referenced_state_plan_definition
          )
