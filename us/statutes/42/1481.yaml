format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/1481
  summary: |-
    The Secretary may issue notes and other obligations for purchase by the Secretary of the Treasury for making direct loans under this subchapter; such obligations are secured by borrower obligations and contribution commitments, repaid from borrower principal and interest and appropriated funds, bear interest at the Treasury average rate for specified marketable public obligations, and Treasury redemptions, purchases, and sales are treated as public debt transactions.
rules:
  - name: treasury_public_obligation_noncallable_redemption_horizon_years
    kind: parameter
    dtype: Count
    source: 42 USC 1481
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/1481
              excerpt: "neither due nor callable for redemption for 15 years"
    versions:
      - effective_from: '1994-01-01'
        formula: |-
          15

  - name: secretary_direct_loan_obligation_issuance_authorized
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: 42 USC 1481
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us/statute/42/1481
    versions:
      - effective_from: '1994-01-01'
        formula: |-
          obligation_is_note_or_other_obligation
          and obligation_is_issued_by_secretary
          and obligation_is_for_purchase_by_secretary_of_treasury
          and obligation_is_for_making_direct_loans_under_this_subchapter

