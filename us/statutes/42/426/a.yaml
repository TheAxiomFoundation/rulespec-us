module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/426/a
  summary: |-
    Every individual who has attained age 65 and satisfies paragraph (2) shall be entitled to hospital insurance benefits under part A for each month for which paragraph (2) is met, beginning with the first month after June 1966 for which paragraphs (1) and (2) are met.
  deferred_outputs:
    - output: us:statutes/42/426/a#hospital_insurance_benefits_entitlement_under_part_a
      reason: The complete subsection (a) entitlement depends on all paragraph (2) alternatives, including monthly insurance benefits under section 402 and medicare qualified government employment treatment under sections 410(p) and 410(a), which are not available as copied RuleSpec context. This artifact encodes the available qualified-railroad-retirement-beneficiary path only.
      blocked_by:
        - us:statutes/42/426/a/2#paragraph_2_requirement_satisfied
