format: rulespec/v1
imports:
  - us:statutes/42/402/a#individual_is_entitled_to_old_age_insurance_benefit
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/426/e
  summary: |-
    For purposes of determining entitlement to hospital insurance benefits under subsection (b), special rules deem age-60 references to read age 65, include certain SSI or State supplementary payment months in the 24-month widow(er) disability entitlement period, continue deemed widow(er) disability entitlement after conversion to old-age benefits, deem certain disabled mothers or fathers to have filed for widow(er) benefits upon hospital-insurance application, and disregard section 402(j)(4) for clause (iii) widow(er) disability entitlement.
rules:
  - name: widow_widower_disability_age_substitution_threshold
    kind: parameter
    dtype: Count
    source: 42 U.S.C. 426(e)(1)(A)(i)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/426/e
              excerpt: 'the term “age 60” ... shall be deemed to read “age 65”'
    versions:
      - effective_from: '1974-01-01'
        formula: |-
          65

  - name: disabled_mother_father_deemed_filing_age_threshold
    kind: parameter
    dtype: Count
    source: 42 U.S.C. 426(e)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/426/e
              excerpt: "aged 50 or older"
    versions:
      - effective_from: '1974-01-01'
        formula: |-
          50

  - name: supplemental_security_income_month_included_in_widow_widower_disability_entitlement_count
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 U.S.C. 426(e)(1)(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/42/426/e
              excerpt: "each month in the period commencing with the first month for which an individual is first eligible for supplemental security income benefits"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/42/426/e
              excerpt: "or State supplementary payments"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/426/e
              excerpt: "included as one of the 24 months"
    versions:
      - effective_from: '1974-01-01'
        formula: |-
          individual_is_described_in_subsection_b_2_A_iii
          and current_month_is_in_period_commencing_with_first_month_individual_is_first_eligible_for_supplemental_security_income_benefits_or_specified_state_supplementary_payments

  - name: continued_widow_widower_disability_entitlement_after_old_age_conversion_for_hospital_insurance
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 U.S.C. 426(e)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/42/426/e
              excerpt: "individual under age 65"
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/42/402/a#individual_is_entitled_to_old_age_insurance_benefit
              output: individual_is_entitled_to_old_age_insurance_benefit
              hash: sha256:9a07348cbbd80dd48c6fb86df667f275ebd7ce2132658b0dac680958a806d05f
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/42/426/e
              excerpt: "was entitled to widow’s insurance benefits or widower’s insurance benefits based on disability for the month before"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/42/426/e
              excerpt: "ceased to be entitled ... upon becoming entitled to such old-age insurance benefits"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/42/426/e
              excerpt: "for and after such first month"
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/42/426/e#widow_widower_disability_age_substitution_threshold
              output: widow_widower_disability_age_substitution_threshold
              hash: sha256:local
    versions:
      - effective_from: '1974-01-01'
        formula: |-
          age < widow_widower_disability_age_substitution_threshold
          and individual_is_entitled_to_old_age_insurance_benefit
          and individual_was_entitled_to_widows_or_widowers_insurance_benefits_based_on_disability_for_month_before_first_month_entitled_to_old_age_insurance_benefits
          and individual_ceased_to_be_entitled_to_widows_or_widowers_insurance_benefits_upon_becoming_entitled_to_old_age_insurance_benefits
          and current_month_is_first_month_of_old_age_insurance_entitlement_or_later

  - name: disabled_mother_father_deemed_filed_for_widow_widower_benefits_for_hospital_insurance
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 U.S.C. 426(e)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/42/426/e
              excerpt: "any disabled widow aged 50 or older who is entitled to mother’s insurance benefits"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/42/426/e
              excerpt: "any disabled widower aged 50 or older who is entitled to father’s insurance benefits"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/42/426/e
              excerpt: "upon application for such hospital insurance benefits"
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/42/426/e#disabled_mother_father_deemed_filing_age_threshold
              output: disabled_mother_father_deemed_filing_age_threshold
              hash: sha256:local
    versions:
      - effective_from: '1974-01-01'
        formula: |-
          age >= disabled_mother_father_deemed_filing_age_threshold
          and application_for_hospital_insurance_benefits_made
          and (
            (
              individual_is_disabled_widow
              and individual_is_entitled_to_mothers_insurance_benefits
              and individual_would_have_been_entitled_to_widows_insurance_benefits_by_reason_of_disability_if_filed
            )
            or (
              individual_is_disabled_widower
              and individual_is_entitled_to_fathers_insurance_benefits
              and individual_would_have_been_entitled_to_widowers_insurance_benefits_by_reason_of_disability_if_filed
            )
          )

  - name: widow_widower_disability_entitlement_for_clause_iii_disregarding_section_402_j_4
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 U.S.C. 426(e)(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/42/426/e
              excerpt: "individual described in clause (iii) of subsection (b)(2)(A)"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/42/426/e
              excerpt: "entitlement ... to widow’s or widower’s insurance benefits ... by reason of a disability"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/42/426/e
              excerpt: "determined without regard to the provisions of section 402(j)(4)"
    versions:
      - effective_from: '1974-01-01'
        formula: |-
          individual_is_described_in_subsection_b_2_A_iii
          and individual_would_be_entitled_to_widows_or_widowers_insurance_benefits_under_section_402_e_or_f_by_reason_of_disability_if_determined_without_regard_to_section_402_j_4
