format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/426/f
  summary: |-
    For purposes of subsection (b), the 24 months shall not include months from a previous period terminated more than 60 months, or more than 84 months for specified benefit types, before the current disability began, unless the impairment is the same as or directly related to the previous impairment.
rules:
  - name: specified_monthly_benefit_entitlement_month_requirement
    kind: parameter
    dtype: Count
    source: 42 U.S.C. 426(f)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/426/f
              excerpt: "the 24 months"
    versions:
      - effective_from: '1974-01-01'
        formula: |-
          24

  - name: prior_period_termination_month_threshold_for_clause_a_i_or_b_benefits
    kind: parameter
    dtype: Count
    source: 42 U.S.C. 426(f)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/426/f
              excerpt: "more than 60 months"
    versions:
      - effective_from: '1974-01-01'
        formula: |-
          60

  - name: prior_period_termination_month_threshold_for_clause_a_ii_or_a_iii_benefits
    kind: parameter
    dtype: Count
    source: 42 U.S.C. 426(f)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/426/f
              excerpt: "more than 84 months"
    versions:
      - effective_from: '1974-01-01'
        formula: |-
          84

  - name: prior_period_months_excluded_from_disability_entitlement_count
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 U.S.C. 426(f)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/42/426/f
              excerpt: "where such individual had been entitled to specified monthly benefits of the same type during a previous period"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/426/f
              excerpt: "more than 60 months"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/426/f
              excerpt: "more than 84 months"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/42/426/f
              excerpt: "unless the physical or mental impairment ... is the same as (or directly related to)"
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/42/426/f#prior_period_termination_month_threshold_for_clause_a_i_or_b_benefits
              output: prior_period_termination_month_threshold_for_clause_a_i_or_b_benefits
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/42/426/f#prior_period_termination_month_threshold_for_clause_a_ii_or_a_iii_benefits
              output: prior_period_termination_month_threshold_for_clause_a_ii_or_a_iii_benefits
              hash: sha256:local
    versions:
      - effective_from: '1974-01-01'
        formula: |-
          individual_had_been_entitled_to_specified_monthly_benefits_of_same_type_during_previous_period
          and (
            (
              monthly_benefits_were_type_specified_in_clause_a_i_or_b_of_subsection_b_2
              and months_between_previous_period_termination_and_current_disability_begin_month > prior_period_termination_month_threshold_for_clause_a_i_or_b_benefits
            )
            or (
              monthly_benefits_were_type_specified_in_clause_a_ii_or_a_iii_of_subsection_b_2
              and months_between_previous_period_termination_and_current_disability_begin_month > prior_period_termination_month_threshold_for_clause_a_ii_or_a_iii_benefits
            )
          )
          and not current_disability_impairment_is_same_as_or_directly_related_to_previous_period_disability_impairment

  - name: prior_period_months_countable_toward_disability_entitlement_requirement
    kind: derived
    entity: Person
    dtype: Count
    period: Month
    source: 42 U.S.C. 426(f)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/42/426/f
              excerpt: "shall not include any month which occurred during such previous period"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/42/426/f
              excerpt: "unless the physical or mental impairment ... is the same as (or directly related to)"
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/42/426/f#prior_period_months_excluded_from_disability_entitlement_count
              output: prior_period_months_excluded_from_disability_entitlement_count
              hash: sha256:local
    versions:
      - effective_from: '1974-01-01'
        formula: |-
          if prior_period_months_excluded_from_disability_entitlement_count: 0 else: months_which_occurred_during_previous_period
