format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/426/b/1
  summary: |-
    has not attained age 65, and
rules:
  - name: age_attainment_threshold
    kind: parameter
    dtype: Integer
    source: 42 U.S.C. 426(b)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/426/b/1
              excerpt: age 65
    versions:
      - effective_from: '1974-01-01'
        formula: |-
          65

  - name: person_has_not_attained_age_threshold
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 U.S.C. 426(b)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/42/426/b/1
              excerpt: has not attained age 65
    versions:
      - effective_from: '1974-01-01'
        formula: |-
          age < age_attainment_threshold
