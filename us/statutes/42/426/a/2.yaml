module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/426/a/2
  summary: |-
    Eligibility alternative includes an individual who “is a qualified railroad retirement beneficiary”; other alternatives depend on monthly insurance benefits under section 402 or medicare qualified government employment under sections 410(p) and 410(a), plus filing an application for part A hospital insurance benefits.
  deferred_outputs:
    - output: us:statutes/42/426/a/2#monthly_insurance_benefit_alternative_satisfied
      reason: The alternative in subparagraph (A) depends on entitlement or deemed entitlement to monthly insurance benefits under 42 U.S.C. 402, which is not available as copied RuleSpec context for this artifact.
    - output: us:statutes/42/426/a/2#medicare_qualified_government_employment_alternative_satisfied
      reason: The alternative in subparagraph (C) depends on treating medicare qualified government employment as employment under 42 U.S.C. 410(p) and 410(a), which are not available as copied RuleSpec context for this artifact.
    - output: us:statutes/42/426/a/2#paragraph_2_requirement_satisfied
      reason: The complete paragraph (2) disjunction cannot be computed until the unresolved subparagraph (A) and subparagraph (C) alternatives are encoded.
