format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/426/a/1
  summary: |-
    has attained age 65, and
rules:
  - name: attained_age_threshold
    kind: parameter
    dtype: Count
    source: 42 USC 426(a)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/426/a/1
              excerpt: "age 65"
    versions:
      - effective_from: '1974-01-01'
        formula: |-
          65

  - name: attained_age_65_requirement_satisfied
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 USC 426(a)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/42/426/a/1
              excerpt: "has attained age 65"
    versions:
      - effective_from: '1974-01-01'
        formula: |-
          age >= attained_age_threshold
