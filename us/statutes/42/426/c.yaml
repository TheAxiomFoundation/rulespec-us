format: rulespec/v1
imports:
  - us:statutes/42/426/b
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/426/c
  summary: |-
    For purposes of subsection (a), hospital insurance benefits consist of entitlement to payment under part A of subchapter XVIII for specified services, subject to stated post-hospital extended care limitations; and an individual is deemed entitled to monthly insurance benefits under section 402 or 423, or to be a qualified railroad retirement beneficiary, for the month of death if the individual would have had that status for that month had death occurred in the next month.
  deferred_outputs:
    - output: us:statutes/42/426/c#hospital_insurance_benefits_entitlement_for_subsection_a
      reason: The entitlement definition depends on unencoded part A of subchapter XVIII, part E service definitions, and the section 1395f(f) outside-United-States inpatient hospital service conditions.
      source_values:
        - us:statutes/42/426/c#post_hospital_extended_care_age_attainment_threshold
    - output: us:statutes/42/426/c#deemed_entitled_to_monthly_insurance_benefits_under_section_402_or_423_for_month_of_death
      reason: The monthly insurance benefit statuses under sections 402 and 423 are cited upstream legal dependencies not available in copied RuleSpec context.
rules:
  - name: post_hospital_extended_care_age_attainment_threshold
    kind: parameter
    dtype: Count
    source: 42 U.S.C. 426(c)(1)(B)(i)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/426/c
              excerpt: "attains age 65"
    versions:
      - effective_from: '1974-01-01'
        formula: |-
          65

  - name: deemed_qualified_railroad_retirement_beneficiary_for_month_of_death
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 U.S.C. 426(c)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/statute/42/426/c
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/42/426/c
              excerpt: "for the month in which he died"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/42/426/c
              excerpt: "would have been a qualified railroad retirement beneficiary ... had he died in the next month"
    versions:
      - effective_from: '1974-01-01'
        formula: |-
          individual_died_in_current_month
          and individual_would_have_been_qualified_railroad_retirement_beneficiary_for_current_month_had_died_in_next_month
