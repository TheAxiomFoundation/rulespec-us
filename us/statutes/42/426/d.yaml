format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/426/d
  summary: |-
    “qualified railroad retirement beneficiary” means an individual whose name has been certified to the Secretary by the Railroad Retirement Board under 45 U.S.C. 231f(d), and the individual ceases to be qualified at the close of the month preceding the certified cessation month.
rules:
  - name: qualified_railroad_retirement_beneficiary
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 U.S.C. 426(d)
    metadata:
      proof:
        atoms:
