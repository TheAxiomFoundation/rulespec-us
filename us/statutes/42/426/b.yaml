format: rulespec/v1
imports:
  - us:statutes/42/426/b/1#person_has_not_attained_age_threshold
  - us:statutes/42/426/b/2#part_a_disability_or_railroad_condition_satisfied
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/426/b
  summary: |-
    Every individual who has not attained age 65 and meets paragraph (2)(A), (B), or (C) shall be entitled to hospital insurance benefits under part A beginning with the later of July 1973 or the twenty-fifth month of the described entitlement or status, ending with the stated termination-notice or age-65 month. Paragraph (2)(C) special references and the trial-work deemed-entitlement period are also specified.
rules:
  - name: maximum_trial_work_deemed_entitlement_months
    kind: parameter
    dtype: Count
    source: 42 U.S.C. 426(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/426/b
              excerpt: "but not in excess of 78 such months"
    versions:
      - effective_from: '1974-01-01'
        formula: |-
          78

  - name: trial_work_termination_month_substitution_threshold
    kind: parameter
    dtype: Count
    source: 42 U.S.C. 426(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/426/b
              excerpt: "36 months ... shall be applied as though it read “15 months”"
    versions:
      - effective_from: '1974-01-01'
        formula: |-
          15

  - name: hospital_insurance_benefits_entitlement_under_part_a
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 U.S.C. 426(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/42/426/b
              excerpt: "Every individual who ... has not attained age 65"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/42/426/b
              excerpt: "(2) (A) ... or (B) ... or (C)"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/42/426/b
              excerpt: "shall be entitled to hospital insurance benefits under part A"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/42/426/b
              excerpt: "beginning with the later of (I) July 1973 or (II) the twenty-fifth month"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/42/426/b
              excerpt: "ending ... with the month following the month in which notice of termination ... is mailed"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/42/426/b
              excerpt: "or if earlier, with the month before the month in which he attains age 65"
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/42/426/b/1#person_has_not_attained_age_threshold
              output: person_has_not_attained_age_threshold
              hash: sha256:7dde629facacc6753d2e2bf5b644131b43ff9410911c015f82515c8256e43ca8
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/42/426/b/2#part_a_disability_or_railroad_condition_satisfied
              output: part_a_disability_or_railroad_condition_satisfied
              hash: sha256:833ffdf6d0aab3bb7c1ba53dd325d3edf7a10ed72d56e3922de36b1b544cd3f5
    versions:
      - effective_from: '1974-01-01'
        formula: |-
          person_has_not_attained_age_threshold
          and part_a_disability_or_railroad_condition_satisfied
          and current_month_is_july_1973_or_later
          and current_month_is_twenty_fifth_month_or_later_of_entitlement_or_status_described_in_paragraph_2
          and current_month_is_on_or_before_month_following_month_termination_notice_mailed
          and current_month_is_before_month_individual_attains_age_65

  - name: government_employment_application_twenty_fifth_month_reference_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 U.S.C. 426(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/statute/42/426/b
              excerpt: "In applying the previous sentence in the case of an individual described in paragraph (2)(C)"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/42/426/b
              excerpt: "the “twenty-fifth month of his entitlement” refers to the first month after the twenty-fourth month"
    versions:
      - effective_from: '1974-01-01'
        formula: |-
          individual_is_described_in_paragraph_2_C
          and current_month_is_first_month_after_twenty_fourth_month_of_entitlement_to_specified_benefits_referred_to_in_paragraph_2_C

  - name: government_employment_application_termination_notice_reference_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 U.S.C. 426(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/statute/42/426/b
              excerpt: "In applying the previous sentence in the case of an individual described in paragraph (2)(C)"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/42/426/b
              excerpt: "“notice of termination of such entitlement” refers to a notice that the individual would no longer be determined"
    versions:
      - effective_from: '1974-01-01'
        formula: |-
          individual_is_described_in_paragraph_2_C
          and notice_states_individual_would_no_longer_be_determined_entitled_to_specified_benefits_under_paragraph_2_C_conditions

  - name: deemed_entitlement_or_railroad_status_during_trial_work_extended_period
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 U.S.C. 426(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/42/426/b
              excerpt: "an individual who has had a period of trial work which ended as provided"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/42/426/b
              excerpt: "whose entitlement to benefits or status as a qualified railroad retirement beneficiary ... has subsequently terminated"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/42/426/b
              excerpt: "shall be deemed to be entitled to such benefits or to occupy such status"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/42/426/b
              excerpt: "throughout all of which the physical or mental impairment ... continues"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/42/426/b
              excerpt: "would have been entitled to monthly insurance benefits ... had such individual been unable to engage in substantial gainful activity"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/426/b
              excerpt: "but not in excess of 78 such months"
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/42/426/b#maximum_trial_work_deemed_entitlement_months
              output: maximum_trial_work_deemed_entitlement_months
              hash: sha256:local
    versions:
      - effective_from: '1974-01-01'
        formula: |-
          individual_had_period_of_trial_work_ended_as_provided_in_section_422_c_4_A
          and entitlement_to_benefits_or_qualified_railroad_status_described_in_paragraph_2_subsequently_terminated
          and impairment_on_which_entitlement_or_status_was_based_continues_throughout_current_consecutive_month_period
          and individual_would_have_been_entitled_to_monthly_insurance_benefits_or_qualified_railroad_retirement_beneficiary_status_if_unable_to_engage_in_substantial_gainful_activity
          and consecutive_months_in_current_deemed_entitlement_period <= maximum_trial_work_deemed_entitlement_months
