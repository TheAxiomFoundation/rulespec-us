format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/426/h
  summary: |-
    For an individual medically determined to have ALS: subsection (b) has no entitlement/status requirement longer than 1 month, entitlement begins with the first month, and subsection (f) shall not be applied.
rules:
  - name: maximum_entitlement_or_status_months_required_for_als
    kind: parameter
    dtype: Count
    source: 42 U.S.C. 426(h)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/426/h
              excerpt: "no requirement ... longer than 1 month"
    versions:
      - effective_from: '1974-01-01'
        formula: |-
          1

  - name: entitlement_beginning_month_ordinal_for_als
    kind: parameter
    dtype: Count
    source: 42 U.S.C. 426(h)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/426/h
              excerpt: "first month"
    versions:
      - effective_from: '1974-01-01'
        formula: |-
          1

  - name: subsection_b_disability_or_railroad_condition_satisfied_under_als_special_rule
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 U.S.C. 426(h)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/42/426/h
              excerpt: "individual medically determined to have amyotrophic lateral sclerosis (ALS)"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/426/h
              excerpt: "no requirement ... longer than 1 month"
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/42/426/h#maximum_entitlement_or_status_months_required_for_als
              output: maximum_entitlement_or_status_months_required_for_als
              hash: sha256:local
    versions:
      - effective_from: '1974-01-01'
        formula: |-
          individual_medically_determined_to_have_amyotrophic_lateral_sclerosis
          and (
            (
              (
                entitled_to_disability_insurance_benefits_under_section_423
                or entitled_to_childs_insurance_benefits_under_section_402_d_by_reason_of_disability_defined_in_section_423_d
                or entitled_to_widows_or_widowers_insurance_benefits_under_section_402_e_or_402_f_by_reason_of_disability_defined_in_section_423_d
              )
              and calendar_months_entitled_to_specified_disability_related_benefits >= maximum_entitlement_or_status_months_required_for_als
            )
            or (
              disabled_qualified_railroad_retirement_beneficiary_within_meaning_of_section_231f_d
              and months_as_disabled_qualified_railroad_retirement_beneficiary >= maximum_entitlement_or_status_months_required_for_als
            )
            or (
              filed_application_for_hospital_insurance_benefits_under_part_a_in_conformity_with_secretary_regulations
              and counterfactual_disability_criteria_including_reviews_applied_under_this_subchapter_satisfied
              and (
                counterfactually_entitled_to_disability_insurance_benefits_under_section_423_if_medicare_qualified_government_employment_treated_as_employment_and_application_deemed_disability_benefits_filing
                or counterfactually_entitled_to_childs_insurance_benefits_under_section_402_d_by_reason_of_disability_defined_in_section_423_d_if_medicare_qualified_government_employment_treated_as_employment_and_application_deemed_disability_benefits_filing
                or counterfactually_entitled_to_widows_or_widowers_insurance_benefits_under_section_402_e_or_402_f_by_reason_of_disability_defined_in_section_423_d_if_medicare_qualified_government_employment_treated_as_employment_and_application_deemed_disability_benefits_filing
              )
              and counterfactual_months_entitled_to_specified_disability_related_benefits_if_medicare_qualified_government_employment_treated_as_employment_and_application_deemed_disability_benefits_filing >= maximum_entitlement_or_status_months_required_for_als
            )
          )

  - name: subsection_b_entitlement_begin_month_ordinal_under_als_special_rule
    kind: derived
    entity: Person
    dtype: Count
    period: Month
    source: 42 U.S.C. 426(h)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/42/426/h
              excerpt: "individual medically determined to have amyotrophic lateral sclerosis (ALS)"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/426/h
              excerpt: "first month (rather than twenty-fifth month)"
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/42/426/h#entitlement_beginning_month_ordinal_for_als
              output: entitlement_beginning_month_ordinal_for_als
              hash: sha256:local
    versions:
      - effective_from: '1974-01-01'
        formula: |-
          if individual_medically_determined_to_have_amyotrophic_lateral_sclerosis: entitlement_beginning_month_ordinal_for_als else: 0

  - name: subsection_f_not_applied_under_als_special_rule
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 U.S.C. 426(h)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/42/426/h
              excerpt: "individual medically determined to have amyotrophic lateral sclerosis (ALS)"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/42/426/h
              excerpt: "Subsection (f) shall not be applied."
    versions:
      - effective_from: '1974-01-01'
        formula: |-
          individual_medically_determined_to_have_amyotrophic_lateral_sclerosis
