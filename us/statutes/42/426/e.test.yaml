# 42 USC 426(e) hospital-insurance special deeming rules. The
# continued-widow(er) conversion rule (426(e)(2)) now imports old-age
# insurance entitlement from us/statutes/42/402/a rather than taking it
# as a local cross-reference input, so the qualifying cases supply
# 402(a)'s entitlement facts (fully insured, application filed) and a
# realistic age that is at least 62 (required for old-age entitlement
# under 402(a)(2)) and under 65 (required by 426(e)(2)). The 426(e) age
# input and the 402(a) age input resolve to the same Person age slot.
- name: all_special_deeming_rules_apply_for_qualifying_widow_path
  period: 2024-01
  input:
    us:statutes/42/426/e#input.individual_is_described_in_subsection_b_2_A_iii: true
    ? us:statutes/42/426/e#input.current_month_is_in_period_commencing_with_first_month_individual_is_first_eligible_for_supplemental_security_income_benefits_or_specified_state_supplementary_payments
    : true
    us:statutes/42/426/e#input.age: 63
    us:statutes/42/402/a#input.individual_is_fully_insured: true
    us:statutes/42/402/a#input.individual_has_filed_application_for_old_age_insurance_benefits: true
    ? us:statutes/42/402/a#input.individual_was_entitled_to_disability_insurance_benefits_for_month_before_attaining_retirement_age
    : false
    ? us:statutes/42/426/e#input.individual_was_entitled_to_widows_or_widowers_insurance_benefits_based_on_disability_for_month_before_first_month_entitled_to_old_age_insurance_benefits
    : true
    ? us:statutes/42/426/e#input.individual_ceased_to_be_entitled_to_widows_or_widowers_insurance_benefits_upon_becoming_entitled_to_old_age_insurance_benefits
    : true
    us:statutes/42/426/e#input.current_month_is_first_month_of_old_age_insurance_entitlement_or_later: true
    us:statutes/42/426/e#input.application_for_hospital_insurance_benefits_made: true
    us:statutes/42/426/e#input.individual_is_disabled_widow: true
    us:statutes/42/426/e#input.individual_is_entitled_to_mothers_insurance_benefits: true
    ? us:statutes/42/426/e#input.individual_would_have_been_entitled_to_widows_insurance_benefits_by_reason_of_disability_if_filed
    : true
    us:statutes/42/426/e#input.individual_is_disabled_widower: false
    us:statutes/42/426/e#input.individual_is_entitled_to_fathers_insurance_benefits: false
    ? us:statutes/42/426/e#input.individual_would_have_been_entitled_to_widowers_insurance_benefits_by_reason_of_disability_if_filed
    : false
    ? us:statutes/42/426/e#input.individual_would_be_entitled_to_widows_or_widowers_insurance_benefits_under_section_402_e_or_f_by_reason_of_disability_if_determined_without_regard_to_section_402_j_4
    : true
  output:
    us:statutes/42/426/e#supplemental_security_income_month_included_in_widow_widower_disability_entitlement_count: holds
    us:statutes/42/426/e#continued_widow_widower_disability_entitlement_after_old_age_conversion_for_hospital_insurance: holds
    us:statutes/42/426/e#disabled_mother_father_deemed_filed_for_widow_widower_benefits_for_hospital_insurance: holds
    us:statutes/42/426/e#widow_widower_disability_entitlement_for_clause_iii_disregarding_section_402_j_4: holds
