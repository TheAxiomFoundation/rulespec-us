format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/1437a/b/4/b
    source_sha256: 9a3a89b7e44cfedae2af32788671c39c8a4ebd1c5d5271863265014a81751a8e
  summary: '"Such term does not include— (i) any imputed return on assets, except
    to the extent that net family assets exceed $50,000 ...; (ii) any amounts that
    would be eligible for exclusion under section 1613(a)(7) ...; (iii) deferred disability
    benefits from the Department of Veterans Affairs ...; (iv) any expenses related
    to aid and attendance ...; and (v) exclusions from income as established by the
    Secretary ... or any amount required by Federal law to be excluded..."'
  deferred_outputs:
  - output: us:statutes/42/1437a#payment_excluded_from_income
    reason: Payment exclusions in clauses (ii)-(v) depend on external cited law and
      Secretary-established exclusions, including 42 USC 1613(a)(7), 38 USC 1521,
      and federal-law exclusions not encoded in this source-law batch.
rules:
- name: statutory_net_family_assets_imputed_return_exclusion_threshold
  kind: parameter
  dtype: Money
  unit: USD
  source: 42 U.S.C. 1437a, excluded amounts, clause (i)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us/statute/42/1437a/b/4/b
          excerpt: net family assets exceed $50,000
  versions:
  - effective_from: '2024-01-01'
    formula: '50000'
- name: net_family_assets_exceed_statutory_imputed_return_exclusion_threshold
  kind: derived
  entity: Household
  dtype: Judgment
  period: Year
  source: 42 U.S.C. 1437a, excluded amounts, clause (i)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us/statute/42/1437a/b/4/b
          excerpt: except to the extent that net family assets exceed $50,000
      - path: versions[0].formula
        kind: import
        import:
          target: us:statutes/42/1437a#statutory_net_family_assets_imputed_return_exclusion_threshold
          output: statutory_net_family_assets_imputed_return_exclusion_threshold
          hash: sha256:local
  versions:
  - effective_from: '2024-01-01'
    formula: net_family_assets > statutory_net_family_assets_imputed_return_exclusion_threshold
- name: imputed_return_on_assets_excluded_from_income
  kind: derived
  entity: Household
  dtype: Money
  period: Year
  unit: USD
  source: 42 U.S.C. 1437a, excluded amounts, clause (i)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us/statute/42/1437a/b/4/b
          excerpt: any imputed return on assets, except to the extent that net family
            assets exceed $50,000
      - path: versions[0].formula
        kind: import
        import:
          target: us:statutes/42/1437a#statutory_net_family_assets_imputed_return_exclusion_threshold
          output: statutory_net_family_assets_imputed_return_exclusion_threshold
          hash: sha256:local
  versions:
  - effective_from: '2024-01-01'
    formula: 'if net_family_assets > statutory_net_family_assets_imputed_return_exclusion_threshold:
      max(0, imputed_return_on_assets * statutory_net_family_assets_imputed_return_exclusion_threshold
      / net_family_assets) else: max(0, imputed_return_on_assets)'
