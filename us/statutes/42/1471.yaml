format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/1471
  summary: |-
    42 USC 1471 authorizes rural housing assistance, defines terms including “farm” and “adequate dwelling,” states applicant eligibility conditions, and provides that “farm,” “farm dwelling,” and “farm housing” include dwellings or other essential buildings of eligible applicants except in sections 1473 and 1474(b).
  deferred_outputs:
    - output: us:statutes/42/1471/a#authorized_assistance_available
      reason: Broad authorization and purpose clause with multiple program-specific assistance purposes, refinancing conditions, and incorporated lead-based paint hazard definitions; faithful executable encoding requires downstream program surfaces and cited definition mechanics not fully present here.
    - output: us:statutes/42/1471/b#elderly_or_handicapped_persons_or_families
      reason: Definition depends in part on developmental disability as defined in 42 USC 15002, which is not available as copied RuleSpec context.
    - output: us:statutes/42/1471/b#low_income_families_or_persons
      reason: Definition incorporates income levels under the United States Housing Act of 1937, including sections 3(b)(4) and 3(b)(5), which are not available as copied RuleSpec context.
    - output: us:statutes/42/1471/d#farm_terms_include_eligible_applicant_buildings_except_sections_1473_and_1474_b
      reason: Additional definition expressly excludes applications in sections 1473 and 1474(b); 42 USC 1473 is not available as copied RuleSpec context, so the purpose-specific definitional surface is deferred.
rules:
  - name: farm_gross_annual_value_equivalent_1944_minimum
    kind: parameter
    dtype: Money
    unit: USD
    source: 42 USC 1471(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/42/1471
              excerpt: "gross annual value of not less than the equivalent of a gross annual value of $400 in 1944"
    versions:
      - effective_from: '1961-01-01'
        formula: |-
          400

  - name: farm
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: 42 USC 1471(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/statute/42/1471
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/42/1471
              excerpt: "gross annual value of not less than the equivalent of a gross annual value of $400 in 1944"
    versions:
      - effective_from: '1961-01-01'
        formula: |-
          land_operated_as_single_unit
          and land_used_for_production_of_one_or_more_agricultural_commodities
          and land_customarily_produces_or_is_capable_of_producing_commodities_for_sale_and_home_use
          and gross_annual_value_equivalent_1944 >= farm_gross_annual_value_equivalent_1944_minimum

  - name: adequate_dwelling
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: 42 USC 1471(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/statute/42/1471
              excerpt: "the term “adequate dwelling” means a decent, safe, and sanitary dwelling unit"
    versions:
      - effective_from: '1961-01-01'
        formula: |-
          dwelling_unit_is_decent
          and dwelling_unit_is_safe
          and dwelling_unit_is_sanitary

  - name: applicant_meets_resource_and_credit_conditions
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 42 USC 1471(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/42/1471
    versions:
      - effective_from: '1961-01-01'
        formula: |-
          applicant_is_without_sufficient_resources_to_provide_necessary_housing_and_buildings
          and applicant_is_unable_to_secure_necessary_credit_from_other_sources_on_reasonably_fulfillable_terms

  - name: applicant_has_eligible_housing_or_refinancing_need
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 42 USC 1471(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/42/1471
    versions:
      - effective_from: '1961-01-01'
        formula: |-
          applicant_is_owner_of_farm_without_required_decent_safe_sanitary_dwelling_or_adequate_farm_buildings
          or applicant_is_owner_of_other_rural_real_estate_or_rural_resident_without_adequate_dwelling_related_facilities_or_adequate_farm_operation_buildings
          or applicant_is_elderly_or_handicapped_person_or_family_in_rural_area_without_adequate_dwelling_or_related_facility
          or applicant_is_owner_of_farm_or_other_rural_real_estate_needing_refinancing_of_indebtedness_described_in_subsection_a_clause_4

  - name: applicant_assistance_eligible
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 42 USC 1471(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/42/1471
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/42/1471#applicant_has_eligible_housing_or_refinancing_need
              output: applicant_has_eligible_housing_or_refinancing_need
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/42/1471#applicant_meets_resource_and_credit_conditions
              output: applicant_meets_resource_and_credit_conditions
              hash: sha256:local
    versions:
      - effective_from: '1961-01-01'
        formula: |-
          applicant_has_eligible_housing_or_refinancing_need
          and applicant_meets_resource_and_credit_conditions
