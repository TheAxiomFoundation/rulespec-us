- name: auto_zero_advance_repayment_amount
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    us:statutes/42/1486#input.advance_amount_received: 0
    us:statutes/42/1486#input.advance_or_grant_received: false
    us:statutes/42/1486#input.annual_operating_costs: 0
    us:statutes/42/1486#input.applicant_failed_to_obtain_site_ownership_or_control_within_recapture_deadline: false
    ? us:statutes/42/1486#input.assistance_or_supplemental_funds_used_to_replace_other_public_funds_previously_used_or_designated
    : false
    us:statutes/42/1486#input.project_ceases_to_be_used_as_housing_under_subsection: false
    us:statutes/42/1486#input.secretary_finds_area_has_high_acquisition_and_rehabilitation_costs: false
    us:statutes/42/1486#input.years_used_for_subsection_purposes: 11
  output:
    us:statutes/42/1486#advance_repayment_amount: 0
