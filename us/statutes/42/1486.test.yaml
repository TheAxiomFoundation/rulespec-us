  input:
    us:statutes/42/1486#input.years_used_for_subsection_purposes: 9
    us:statutes/42/1486#input.project_ceases_to_be_used_as_housing_under_subsection: true
    us:statutes/42/1486#input.advance_amount_received: 400000
