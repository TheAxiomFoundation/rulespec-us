- name: administrative-and-prohibition-rules
  period:
    period_kind: custom
    name: calendar_year
    start: '2024-01-01'
    end: '2024-12-31'
  input:
    us:statutes/42/1486#input.advance_or_grant_received: 400000
    us:statutes/42/1486#input.applicant_failed_to_obtain_site_ownership_or_control_within_recapture_deadline: true
    ? us:statutes/42/1486#input.assistance_or_supplemental_funds_used_to_replace_other_public_funds_previously_used_or_designated
