      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/18795/c/2
              excerpt: "not less than 20 percent but less than 35 percent"
    versions:
      - effective_from: '2022-08-16'
        formula: |-
          0.20

  - name: modeled_savings_higher_threshold
    kind: parameter
    dtype: Rate
    source: 42 USC 18795(c)(2)(A)(ii), (B)(ii), (C)(ii)
