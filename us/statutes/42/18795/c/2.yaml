module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/18795/c/2
  summary: |-
    Subject to paragraph (3), under a HOMES rebate program, rebate amounts shall not exceed specified modeled and measured savings limits for single-family homes, multifamily buildings, and low- or moderate-income single-family or multifamily projects.
rules:
