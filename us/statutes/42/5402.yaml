    versions:
      - effective_from: '1974-01-01'
        formula: |-
          structure_transportable_in_one_or_more_sections
          and built_on_permanent_chassis
          and designed_to_be_used_as_dwelling_with_or_without_permanent_foundation_when_connected_to_required_utilities
          and (
            traveling_mode_width_body_feet >= manufactured_home_traveling_mode_width_threshold_body_feet
            or traveling_mode_length_body_feet >= manufactured_home_traveling_mode_length_threshold_body_feet
            or erected_site_square_feet >= manufactured_home_erected_site_area_threshold_square_feet
            or (
