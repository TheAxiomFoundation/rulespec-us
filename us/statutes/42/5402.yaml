  source_verification:
    corpus_citation_path: us/statute/42/5402/6
    source_sha256: a7ca160ad0f6979b3700c527d52652f34afa00fe459f99e9cfea0c7aa83cf0ca
  summary: |-
    “manufactured home” means a transportable structure meeting stated traveling-mode or erected-site size thresholds, built on a permanent chassis, designed for dwelling use when connected to required utilities, including qualifying certified undersized structures, and excluding self-propelled recreational vehicles.
rules:
