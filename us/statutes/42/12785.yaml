format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/12785/b/2
    source_sha256: 2c1a62b8a0f702085e21fe2c069f408dd2a00edc4628146b2bdbd28d8df11b64
  summary: |-
    The Secretary shall make available, on request by a participating jurisdiction, a list of HUD-owned or controlled eligible properties. Eligible properties are unoccupied single-family or multifamily dwellings whose acquisition and rehabilitation would not displace residents and whose appraised value does not exceed the stated value limits.
  deferred_outputs:
    - output: us:statutes/42/12785/a#hud_eligible_property_list_made_available_on_request
      reason: Administrative furnishing duty of the Secretary to provide a list on request; no computable benefit, amount, eligibility, or runtime condition is defined for RuleSpec execution.
    - output: us:statutes/42/12785/b#eligible_property_for_dwelling_with_more_than_4_units
      reason: The value limit for dwellings with more than 4 units depends on the applicable maximum dollar amount limitation under 12 USC 1715l(d)(3)(ii), which is not provided in copied context.
    - output: us:statutes/42/12785/b#eligible_property
      reason: The complete eligible-property determination includes the more-than-4-units branch, which depends on the unavailable 12 USC 1715l(d)(3)(ii) elevator-type structure limitation.
rules:
  - name: one_to_four_family_appraised_value_limit_rate
    kind: parameter
    dtype: Rate
    source: 42 USC 12785(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/12785/b/2
              excerpt: "95 percent of the median purchase price for the area"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          0.95

  - name: one_to_four_family_dwelling_minimum_family_count
    kind: parameter
    dtype: Count
    source: 42 USC 12785(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/12785/b/2
              excerpt: "1- to 4-family dwelling"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          1

  - name: one_to_four_family_dwelling_maximum_family_count
    kind: parameter
    dtype: Count
    source: 42 USC 12785(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/12785/b/2
              excerpt: "1- to 4-family dwelling"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          4

  - name: one_to_four_family_appraised_value_limit
    kind: derived
    entity: Property
    dtype: Money
    period: Year
    unit: USD
    source: 42 USC 12785(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/12785/b/2
              excerpt: "95 percent of the median purchase price for the area"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          one_to_four_family_appraised_value_limit_rate * median_purchase_price_for_area_for_one_to_four_family_dwellings_as_determined_by_secretary

  - name: eligible_property_for_one_to_four_family_dwelling
    kind: derived
    entity: Property
    dtype: Judgment
    period: Year
    source: 42 USC 12785(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us/statute/42/12785/b/2
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          property_is_unoccupied_single_family_or_multifamily_dwelling
          and acquisition_and_rehabilitation_would_not_result_in_displacement_of_any_residents
          and dwelling_family_count >= one_to_four_family_dwelling_minimum_family_count
          and dwelling_family_count <= one_to_four_family_dwelling_maximum_family_count
          and appraised_value <= one_to_four_family_appraised_value_limit
