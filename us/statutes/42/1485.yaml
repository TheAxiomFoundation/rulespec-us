module:
  status: deferred
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/1485
    source_sha256: 386568f7efed060a923c9b681995e23daed09d85e85604f5a2fdfb2e4da7d0b1
  summary: The Secretary is authorized to make or insure rural rental or cooperative
    housing loans subject to stated borrower, purpose, term, security, construction,
    transfer, market-feasibility, reserve, fee, occupancy, safety, accounting, recovery,
    and set-aside requirements. The section defines "housing," "related facilities,"
    "congregate housing," and "development cost"; limits certain loan terms and project
    costs; requires carbon monoxide detectors and qualifying smoke alarms in rehabilitated
    or repaired housing; and imposes rules affected by cited provisions including
    sections 1472, 1483, 1490a, 42 of title 26, 1928 and 1929 of title 7, and other
    external standards.
  deferred_outputs:
  - output: us:statutes/42/1485/a#direct_loan_authority_and_limits
    reason: Subsection (a) authorizes direct loans only in accordance with terms and
      conditions substantially identical to missing cited section 1472 of title 42,
      and the operative loan program surface also depends on Secretary-determined
      eligibility, development cost, and security valuation facts not represented
      in the current local schema.
  - output: us:statutes/42/1485/b#insured_loan_authority_and_limits
    reason: Subsection (b) authorizes insured loans using terms substantially identical
      to missing cited section 1472 and incorporates missing insurance-fund authorities
      under sections 1928 and 1929(f)(1) of title 7; the subsection also requires
      Secretary determinations for new final-payment loans.
  - output: us:statutes/42/1485/e#section_definitions
    reason: Subsection (e) supplies definitional scope for housing, related facilities,
      congregate housing, and development cost. These definitions are documentary
      dependencies for other program rules rather than a standalone executable result
      in the available RuleSpec entity model.
  - output: us:statutes/42/1485/l#market_feasibility_determination_requirements
    reason: Subsection (l) requires market-feasibility determinations keyed to rental
      assistance under missing section 1490a and state or local similar-assistance
      programs, including contract duration and funding-availability facts not encoded
      by available local dependencies.
  - output: us:statutes/42/1485/m#rehabilitation_repair_standards_and_alarm_requirements
    reason: Subsection (m) requires Secretary-established rehabilitation standards
      and incorporation of external safety standards from the International Fire Code,
      HUD, the International Code Council, and National Fire Protection Association
      Standard 72; those external standards and inspection predicates are outside
      the copied RuleSpec dependency set.
  - output: us:statutes/42/1485/o#rental_assistance_non_denial_and_occupancy_rules
    reason: Subsection (o) prohibits denying assistance or occupancy based on required
      rental assistance under missing section 1490a unless the authority to provide
      that assistance is unavailable; the operative dependency on section 1490a is
      not copied.
  - output: us:statutes/42/1485/r#operating_reserve_and_equity_contribution_requirements
    reason: Subsection (r) permits or requires operating reserve and equity contribution
      conditions but depends on project-level assistance sufficiency determinations,
      low-income housing tax credit allocation under section 42 of title 26, and negotiated-rulemaking
      implementation details not represented by copied dependencies.
