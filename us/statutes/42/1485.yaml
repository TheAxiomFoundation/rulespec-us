format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/1485
  summary: |-
    The Secretary may make and insure rural rental or cooperative housing loans, subject to limits including development cost or security value, 30-year terms, a $50,000,000 revolving fund, and insurance-fund limits. The section defines housing and development cost, imposes market-feasibility, rehabilitation, carbon monoxide and smoke-alarm, rental-assistance, operating-reserve, equity-contribution, fee, occupancy, set-aside, accounting, and recovery requirements.
  deferred_outputs:
    - output: us:statutes/42/1485/a#direct_loan_authority_under_subsection_a
      reason: Full direct-loan authority depends on terms and conditions substantially identical to 42 USC 1472 and Secretary determinations not fully represented in this artifact; source-stated numeric limits are encoded separately.
    - output: us:statutes/42/1485/b#insured_loan_authority_under_subsection_b
      reason: Full insured-loan authority incorporates 42 USC 1472, 7 USC 1928, and 7 USC 1929(f)(1), plus Secretary determinations for final-payment refinancing; source-stated numeric limits are encoded separately.
    - output: us:statutes/42/1485/e#housing_related_facilities_congregate_housing_and_development_cost_definitions
      reason: Subsection (e) supplies broad definitional scope for program terms; only the source-stated development-cost initial-operating-expense cap and tax-credit exclusion condition are encoded here.
    - output: us:statutes/42/1485/l#complete_market_feasibility_determination
      reason: Complete market-feasibility determinations depend on rental-assistance mechanics under 42 USC 1490a and State or local similar-assistance program facts; the source-stated State/local assistance gates are encoded separately.
    - output: us:statutes/42/1485/m#external_rehabilitation_and_alarm_standards
      reason: Subsection (m) incorporates HUD, International Fire Code, International Code Council, and National Fire Protection Association standards that are not copied as RuleSpec dependencies; source-stated compliance predicates are encoded as boundary facts.
    - output: us:statutes/42/1485/o#complete_rental_assistance_payment_coordination
      reason: Subsection (o) turns on rental assistance payment authority under 42 USC 1490a; the local non-denial and non-occupancy-denial requirements are encoded with boundary facts.
    - output: us:statutes/42/1485/r#final_equity_contribution_requirement_after_secretary_adjustment
      reason: Final equity contribution may be adjusted by the Secretary to ensure assistance is not more than necessary after accounting for Federal, State, and local assistance; baseline source-stated rates are encoded separately.
rules:
  - name: direct_loan_maximum_term_years
    kind: parameter
    dtype: Integer
    source: 42 USC 1485(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/42/1485
              excerpt: "such a loan may be made for a period of up to 30 years"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: direct_loan_revolving_fund_authorization_amount
    kind: parameter
    dtype: Money
    unit: USD
    source: 42 USC 1485(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/42/1485
              excerpt: "There is authorized to be appropriated not to exceed $50,000,000"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          50000000

  - name: insured_loan_maximum_term_years
    kind: parameter
    dtype: Integer
    source: 42 USC 1485(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/42/1485
              excerpt: "such a loan may be made for a period of up to 30 years"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: insured_loan_payment_amortization_schedule_years
    kind: parameter
    dtype: Integer
    source: 42 USC 1485(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/42/1485
              excerpt: "amortization schedule of 50 years"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          50

  - name: secretary_held_insured_loan_principal_outstanding_limit
    kind: parameter
    dtype: Money
    unit: USD
    source: 42 USC 1485(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/42/1485
              excerpt: "shall not exceed $10,000,000 outstanding at any one time"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10000000

  - name: final_payment_new_loan_additional_period_limit_years
    kind: parameter
    dtype: Integer
    source: 42 USC 1485(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/42/1485
              excerpt: "for an additional period not to exceed twenty years"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          20

  - name: development_cost_initial_operating_expense_cap_rate
    kind: parameter
    dtype: Rate
    source: 42 USC 1485(e)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/42/1485
              excerpt: "initial operating expenses up to 2 per centum"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.02

  - name: state_or_local_similar_assistance_minimum_contract_years
    kind: parameter
    dtype: Integer
    source: 42 USC 1485(l)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/42/1485
              excerpt: "rental assistance for a period of not less than five years"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          5

  - name: general_equity_contribution_cap_rate
    kind: parameter
    dtype: Rate
    source: 42 USC 1485(r)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/42/1485
              excerpt: "may require not more than a 3 percent contribution to equity"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.03

  - name: tax_credit_project_equity_contribution_required_rate
    kind: parameter
    dtype: Rate
    source: 42 USC 1485(r)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/42/1485
              excerpt: "shall require a 5 percent contribution in the case of a project that is allocated a low-income housing tax credit"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.05

  - name: direct_loan_principal_within_security_limit
    kind: derived
    entity: Loan
    dtype: Judgment
    period: Month
    source: 42 USC 1485(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/1485
              excerpt: "no such loan shall exceed the development cost or the value of the security, whichever is less"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          requested_loan_principal_amount <= min(development_cost, security_value)

  - name: direct_loan_term_within_limit
    kind: derived
    entity: Loan
    dtype: Judgment
    period: Month
    source: 42 USC 1485(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/1485
              excerpt: "up to 30 years from the making of the loan"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          requested_loan_term_years <= direct_loan_maximum_term_years

  - name: insured_loan_principal_within_security_limit
    kind: derived
    entity: Loan
    dtype: Judgment
    period: Month
    source: 42 USC 1485(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/1485
              excerpt: "no such loan shall exceed the development cost or the value of the security, whichever is less"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          requested_loan_principal_amount <= min(development_cost, security_value)

  - name: insured_loan_term_within_limit
    kind: derived
    entity: Loan
    dtype: Judgment
    period: Month
    source: 42 USC 1485(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/1485
              excerpt: "up to 30 years from the making of the loan"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          requested_loan_term_years <= insured_loan_maximum_term_years

  - name: insured_loan_amortization_schedule_within_limit
    kind: derived
    entity: Loan
    dtype: Judgment
    period: Month
    source: 42 USC 1485(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/1485
              excerpt: "amortization schedule of 50 years"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          periodic_payment_amortization_schedule_years <= insured_loan_payment_amortization_schedule_years

  - name: development_cost_included_initial_operating_expenses
    kind: derived
    entity: Project
    dtype: Money
    period: Month
    unit: USD
    source: 42 USC 1485(e)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/1485
              excerpt: "initial operating expenses up to 2 per centum of the aforementioned costs"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if nonprofit_or_consumer_cooperative_financing_housing_under_this_section and project_allocated_low_income_housing_tax_credit: 0 else: min(approved_initial_operating_expenses, development_cost_base_before_initial_operating_expenses * development_cost_initial_operating_expense_cap_rate)

  - name: state_or_local_similar_assistance_market_feasibility_demonstrated
    kind: derived
    entity: Project
    dtype: Judgment
    period: Month
    source: 42 USC 1485(l)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/42/1485
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          market_exists_for_persons_and_families_eligible_for_state_or_local_similar_assistance
          and state_or_local_similar_assistance_contract_years >= state_or_local_similar_assistance_minimum_contract_years
          and (reasonable_assurance_assistance_contract_will_be_extended_or_renewed or adequate_rental_market_exists_without_assistance_for_remaining_loan_term)
          and state_or_local_government_makes_required_rental_assistance_amounts_available_at_least_annually

  - name: rehabilitation_or_repair_carbon_monoxide_alarm_requirement_satisfied
    kind: derived
    entity: Project
    dtype: Judgment
    period: Month
    source: 42 USC 1485(m)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/42/1485
              excerpt: "shall contain installed carbon monoxide alarms or detectors"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not housing_or_related_facilities_rehabilitated_or_repaired_with_section_loan_amounts
          or installed_carbon_monoxide_alarms_or_detectors_meet_required_standards

  - name: rehabilitation_or_repair_qualifying_smoke_alarm_requirement_satisfied
    kind: derived
    entity: Project
    dtype: Judgment
    period: Month
    source: 42 USC 1485(m)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/42/1485
              excerpt: "shall contain qualifying smoke alarms"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not housing_or_related_facilities_rehabilitated_or_repaired_with_section_loan_amounts
          or qualifying_smoke_alarms_installed_in_required_locations_and_meet_required_standards

  - name: assistance_denial_based_on_rental_assistance_requirement_complies
    kind: derived
    entity: Project
    dtype: Judgment
    period: Month
    source: 42 USC 1485(o)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/42/1485
              excerpt: "may not deny assistance under this section on the basis that rental assistance payments ... may be required unless the authority to provide such assistance is not available"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not assistance_denied_because_rental_assistance_payments_may_be_required
          or authority_to_provide_rental_assistance_payments_is_not_available

  - name: occupancy_denial_based_on_rental_assistance_requirement_complies
    kind: derived
    entity: Project
    dtype: Judgment
    period: Month
    source: 42 USC 1485(o)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/42/1485
              excerpt: "may not ... promulgate any regulation that would have the effect of denying occupancy to eligible persons"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not regulation_denies_occupancy_to_eligible_persons_because_they_require_rental_assistance_payments

  - name: baseline_equity_contribution_rate_before_secretary_adjustment
    kind: derived
    entity: Project
    dtype: Rate
    period: Month
    source: 42 USC 1485(r)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/1485
              excerpt: "not more than a 3 percent contribution ... except that the Secretary shall require a 5 percent contribution"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if project_allocated_low_income_housing_tax_credit: tax_credit_project_equity_contribution_required_rate else: general_equity_contribution_cap_rate

  - name: initial_operating_reserve_letter_of_credit_allowed
    kind: derived
    entity: Project
    dtype: Judgment
    period: Month
    source: 42 USC 1485(r)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/42/1485
              excerpt: "may require that the initial operating reserve under this section may be in the form of an irrevocable letter of credit"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          initial_operating_reserve_under_this_section
          and initial_operating_reserve_is_irrevocable_letter_of_credit
