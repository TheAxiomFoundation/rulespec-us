format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/1437v
  summary: |-
    42 USC 1437v authorizes grants for revitalization of severely distressed public housing and main street affordable housing projects; limits contribution, supportive-service, technical-assistance, set-aside, and smaller-community grant amounts; defines applicant, severely distressed public housing, supportive services, affordable housing, and smaller community; and governs applications, cost limits, administration by other entities, reporting, funding, and sunset.
  deferred_outputs:
    - output: us:statutes/42/1437v/e#grant_application_and_selection_process
      reason: Secretary-prescribed application procedures and discretionary selection criteria are administrative standards, not a computable eligibility formula in this source slice.
    - output: us:statutes/42/1437v/n#main_street_grant_application_and_selection_process
      reason: Smaller-community application and selection criteria are Secretary-established administrative standards and require future discretionary criteria.
rules:
  - name: supplemental_contribution_minimum_rate
    kind: parameter
    dtype: Rate
    source: 42 USC 1437v(c)(1)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/1437v
              excerpt: "not less than 5 percent of the amount provided under this section"
    versions:
      - effective_from: '2017-01-01'
        formula: |-
          0.05
  - name: supportive_services_excess_contribution_threshold_rate
    kind: parameter
    dtype: Rate
    source: 42 USC 1437v(c)(1)(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/1437v
              excerpt: "if the applicant uses more than 5 percent of the amount of assistance"
    versions:
      - effective_from: '2017-01-01'
        formula: |-
          0.05
  - name: supportive_services_grant_use_cap_rate
    kind: parameter
    dtype: Rate
    source: 42 USC 1437v(d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/1437v
              excerpt: "not more than 15 percent of the amount of any grant may be used"
    versions:
      - effective_from: '2017-01-01'
        formula: |-
          0.15
  - name: technical_assistance_program_oversight_cap_rate
    kind: parameter
    dtype: Rate
    source: 42 USC 1437v(m)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/1437v
              excerpt: "may use up to 2 percent for technical assistance or contract expertise"
    versions:
      - effective_from: '2017-01-01'
        formula: |-
          0.02
  - name: main_street_housing_grants_set_aside_cap_rate
    kind: parameter
    dtype: Rate
    source: 42 USC 1437v(m)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/1437v
              excerpt: "shall provide up to 5 percent for use only for grants under subsection (n)"
    versions:
      - effective_from: '2017-01-01'
        formula: |-
          0.05
  - name: fiscal_year_2017_grant_authorization_amount
    kind: parameter
    dtype: Money
    unit: USD
    period: Year
    source: 42 USC 1437v(m)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/42/1437v
              excerpt: "$574,000,000 for fiscal year 2017"
    versions:
      - effective_from: '2017-01-01'
        formula: |-
          574000000
  - name: main_street_single_smaller_community_grant_cap
    kind: parameter
    dtype: Money
    unit: USD
    period: Year
    source: 42 USC 1437v(n)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/42/1437v
              excerpt: "may not exceed $1,000,000"
    versions:
      - effective_from: '2017-01-01'
        formula: |-
          1000000
  - name: smaller_community_population_limit
    kind: parameter
    dtype: Count
    source: 42 USC 1437v(n)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/1437v
              excerpt: "has a population of 50,000 or fewer"
    versions:
      - effective_from: '2017-01-01'
        formula: |-
          50000
  - name: smaller_community_single_pha_unit_limit
    kind: parameter
    dtype: Count
    source: 42 USC 1437v(n)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/1437v
              excerpt: "administers 100 or fewer public housing dwelling units"
    versions:
      - effective_from: '2017-01-01'
        formula: |-
          100
  - name: supportive_services_use_within_cap
    kind: derived
    entity: PublicHousingGrant
    dtype: Judgment
    period: Year
    source: 42 USC 1437v(d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/1437v
    versions:
      - effective_from: '2017-01-01'
        formula: |-
          supportive_services_use_amount <= grant_amount * supportive_services_grant_use_cap_rate
  - name: cost_limits_apply_to_eligible_activities
    kind: derived
    entity: PublicHousingGrant
    dtype: Judgment
    period: Year
    source: 42 USC 1437v(f)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us/statute/42/1437v
    versions:
      - effective_from: '2017-01-01'
        formula: |-
          activity_is_eligible_under_this_section
  - name: secretary_may_require_other_entity_administration
    kind: derived
    entity: PublicHousingGrant
    dtype: Judgment
    period: Year
    source: 42 USC 1437v(h)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us/statute/42/1437v
    versions:
      - effective_from: '2017-01-01'
        formula: |-
          grantee_received_grant_under_this_section
          and secretary_determines_other_entity_will_effectuate_section_purposes
  - name: applicant
    kind: derived
    entity: PublicHousingAgency
    dtype: Judgment
    period: Year
    source: 42 USC 1437v(j)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/statute/42/1437v
    versions:
      - effective_from: '2017-01-01'
        formula: |-
          public_housing_agency_not_designated_troubled
          or private_management_agent_selected_or_receiver_appointed
          or (public_housing_agency_designated_troubled and troubled_agency_capable_branch_satisfied)
  - name: severely_distressed_public_housing
    kind: derived
    entity: PublicHousingProject
    dtype: Judgment
    period: Year
    source: 42 USC 1437v(j)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/statute/42/1437v
    versions:
      - effective_from: '2017-01-01'
        formula: |-
          (requires_major_redesign_reconstruction_redevelopment_or_demolition
          and significantly_contributes_to_surrounding_neighborhood_decline
          and has_severe_resident_or_project_social_distress
          and cannot_be_revitalized_through_other_public_housing_assistance_because_of_cost_constraints
          and (not project_part_is_individual_building or secretary_determines_building_sufficiently_separable))
          or (formerly_met_severely_distressed_project_description
          and legally_vacated_or_demolished
          and not secretary_has_provided_replacement_housing_assistance_other_than_tenant_based_assistance)
  - name: supportive_services
    kind: derived
    entity: PublicHousingActivity
    dtype: Judgment
    period: Year
    source: 42 USC 1437v(j)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/statute/42/1437v
    versions:
      - effective_from: '2017-01-01'
        formula: |-
          activity_promotes_upward_mobility_self_sufficiency_or_improved_quality_of_life_for_project_residents
  - name: smaller_community
    kind: derived
    entity: SmallerCommunity
    dtype: Judgment
    period: Year
    source: 42 USC 1437v(n)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/statute/42/1437v
    versions:
      - effective_from: '2017-01-01'
        formula: |-
          unit_of_general_local_government
          and population <= smaller_community_population_limit
          and (not served_by_public_housing_agency or (served_by_single_public_housing_agency and public_housing_dwelling_units_administered <= smaller_community_single_pha_unit_limit))
  - name: main_street_single_community_grant_within_cap
    kind: derived
    entity: SmallerCommunityGrant
    dtype: Judgment
    period: Year
    source: 42 USC 1437v(n)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/1437v
    versions:
      - effective_from: '2017-01-01'
        formula: |-
          grant_amount <= main_street_single_smaller_community_grant_cap
