  summary: |-
    42 USC 11313(a) directs the Council to develop and annually update a National Strategic Plan to End Homelessness; review, coordinate, monitor, evaluate, and recommend improvements in Federal, State, local, and private activities to assist homeless individuals; provide professional and technical assistance through regional coordinators and workshops; obtain agency resource identifications; conduct research; collect and disseminate information; prepare reports and bulletins; develop alternatives to criminalizing homelessness; and convene a post-study meeting on Federal homelessness definitions and transmit transcripts and recommendations.
  deferred_outputs:
    - output: us:statutes/42/11313/a#council_duties
      reason: 42 USC 11313(a) states administrative planning, coordination, reporting, technical-assistance, research, convening, and policy-development duties of the Council. The provision does not define a computable benefit, tax, eligibility, amount, relation, or entity-scoped legal predicate supported by the RuleSpec runtime; faithful encoding requires an institutional compliance/workflow surface outside the current executable schema.
