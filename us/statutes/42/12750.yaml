format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/12750/b
  summary: |-
    A contribution is recognized for purposes of subsection (a) only if made with respect to qualifying affordable housing or a project portion with not less than 50 percent qualifying affordable units. Contributions for administrative expenses may not be recognized.
rules:
  - name: project_portion_affordable_units_minimum_rate
    kind: parameter
    dtype: Rate
    source: 42 USC 12750(b)(1)(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/12750/b
              excerpt: "not less than 50 percent of the units"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          0.50

  - name: contribution_recognized_for_subsection_a
    kind: derived
    entity: Contribution
    dtype: Judgment
    period: Year
    source: 42 USC 12750(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/42/12750/b
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/12750/b
              excerpt: "not less than 50 percent of the units"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/42/12750/b
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          (
            contribution_made_with_respect_to_housing_that_qualifies_as_affordable_housing_under_section_12745
            or (
              contribution_made_with_respect_to_portion_of_project
              and project_portion_units_qualifying_as_affordable_housing_under_section_12745_rate >= project_portion_affordable_units_minimum_rate
            )
          )
          and not contribution_for_administrative_expenses
