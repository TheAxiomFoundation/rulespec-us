format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/1437g
  summary: |-
    42 USC 1437g establishes Capital and Operating Funds for public housing agencies, authorizes fiscal-year 1999 appropriations, defines selected fund-use flexibility, technical-assistance authority, obligation/expenditure limits, New York City Housing Authority annual use caps, replacement reserves, and heating-guideline publication duties.
  deferred_outputs:
    - output: us:statutes/42/1437g/c#agency_allocation_amount
      reason: Allocation amounts depend on Secretary-developed Capital Fund and Operating Fund formulas under subsections (d)(2) and (e)(2), which are not supplied as executable RuleSpec formulas in this source.
    - output: us:statutes/42/1437g/d#capital_fund_formula_amount
      reason: The source directs the Secretary to develop a formula and lists discretionary factors, but does not provide a computable formula.
    - output: us:statutes/42/1437g/g#new_construction_limitation_applies
      reason: Net-increase and mixed-finance exceptions require project inventory and section 1437f(o) cost comparison mechanics not available as executable RuleSpec context.
    - output: us:statutes/42/1437g/h#technical_assistance_grant_or_contract_amount
      reason: Technical assistance is discretionary to the Secretary and limited by amounts provided in advance in appropriations Acts; the source does not specify an amount formula.
    - output: us:statutes/42/1437g/n#replacement_reserve_maximum_amount
      reason: The reserve ceiling depends on agency-determined anticipated capital needs in a Capital Fund 5-Year Action Plan or Secretary regulations not supplied in this source.
