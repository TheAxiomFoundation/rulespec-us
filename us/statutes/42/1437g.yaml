  - name: full_flexibility_for_small_pha_applies
    kind: derived
    entity: PublicHousingAgency
    dtype: Judgment
    period: Year
    source: 42 USC 1437g(g)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/1437g
              excerpt: "owns or operates less than 250 public housing dwelling units, is not designated ... as a troubled public housing agency, and ... is operating and maintaining its public housing in a safe, clean, and healthy condition"
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/42/1437g#full_flexibility_small_pha_unit_threshold
              output: full_flexibility_small_pha_unit_threshold
              hash: sha256:local
    versions:
      - effective_from: '1998-10-21'
        formula: |-
          public_housing_dwelling_units_owned_or_operated < full_flexibility_small_pha_unit_threshold
          and not public_housing_agency_designated_troubled
          and secretary_determines_public_housing_operated_and_maintained_safe_clean_healthy

