format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/13641
  summary: |-
    For purposes of this title, “federally assisted housing” and “project” mean listed public, section 8, section 1701q, section 1715l(d)(3), section 1715z-1, and section 8013 housing. “Housing assistance” means the grant, contribution, capital advance, loan, mortgage insurance, or other assistance provided for such housing, including related assistance by the Secretary. “Owner” means the entity or private person with the legal right to lease or sublease dwelling units in such housing. “Secretary” means the Secretary of Housing and Urban Development.
  deferred_outputs:
    - output: us:statutes/42/13641#elderly_family
      reason: The term is assigned the meaning given under 42 U.S.C. 1437a(b)(3), but no copied RuleSpec export for that definition is available.
    - output: us:statutes/42/13641#disabled_family
      reason: The term is assigned the meaning given under 42 U.S.C. 1437a(b)(3), but no copied RuleSpec export for that definition is available.
    - output: us:statutes/42/13641#near_elderly_family
      reason: The term is assigned the meaning given under 42 U.S.C. 1437a(b)(3), but no copied RuleSpec export for that definition is available.
