format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/1397ll/d/2
  summary: '"Targeted low-income pregnant woman" means an individual during pregnancy
    and through the applicable postpartum month; whose family income exceeds 185 percent
    or a higher subsection (b)(1)(A) percent of the poverty line, but does not exceed
    the State child health plan income eligibility level for a targeted low-income
    child; and who satisfies specified section 1397jj(b) requirements.'
rules:
- name: standard_postpartum_period_days
  kind: parameter
  dtype: Count
  source: 42 USC 1397ll(d)(2)(A)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us/statute/42/1397ll/d/2
          excerpt: 60-day period
  versions:
  - effective_from: '2021-01-01'
    formula: '60'
- name: extended_postpartum_period_months
  kind: parameter
  dtype: Count
  source: 42 USC 1397ll(d)(2)(A)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us/statute/42/1397ll/d/2
          excerpt: the 12-month period
  versions:
  - effective_from: '2021-01-01'
    formula: '12'
- name: pregnant_woman_income_floor_rate
  kind: parameter
  dtype: Rate
  source: 42 USC 1397ll(d)(2)(B)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us/statute/42/1397ll/d/2
          excerpt: exceeds 185 percent ... of the poverty line
  versions:
  - effective_from: '2021-01-01'
    formula: '1.85'
- name: applicable_pregnant_woman_income_floor_rate
  kind: derived
  entity: Person
  dtype: Rate
  period: Month
  source: 42 USC 1397ll(d)(2)(B)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us/statute/42/1397ll/d/2
          excerpt: 185 percent (or, if higher, the percent applied under subsection
            (b)(1)(A))
  versions:
  - effective_from: '2021-01-01'
    formula: max(pregnant_woman_income_floor_rate, percent_applied_under_subsection_b_1_A)
- name: within_pregnancy_or_applicable_postpartum_period
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: 42 USC 1397ll(d)(2)(A)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us/statute/42/1397ll/d/2
          excerpt: during pregnancy and through the end of the month in which the
            60-day period ... or ... the 12-month period ... ends
  versions:
  - effective_from: '2021-01-01'
    formula: 'individual_is_pregnant_during_month

      or current_month_is_through_end_of_month_in_which_applicable_postpartum_period_ends'
- name: targeted_low_income_pregnant_woman
  kind: derived
  entity: Family
  dtype: Judgment
  period: Month
  source: 42 USC 1397ll(d)(2)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: definition
        source:
          corpus_citation_path: us/statute/42/1397ll/d/2
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us/statute/42/1397ll/d/2
          excerpt: whose family income exceeds 185 percent ... but does not exceed
            the income eligibility level
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us/statute/42/1397ll/d/2
          excerpt: satisfies the requirements of paragraphs (1)(A), (1)(C), (2), and
            (3) of section 1397jj(b)
  versions:
  - effective_from: '2021-01-01'
    formula: 'within_pregnancy_or_applicable_postpartum_period

      and family_income > applicable_pregnant_woman_income_floor_rate * poverty_line_for_family_size

      and family_income <= income_eligibility_level_established_under_state_child_health_plan_for_targeted_low_income_child

      and satisfies_section_1397jj_b_1_A_requirement_in_same_manner_as_child

      and satisfies_section_1397jj_b_1_C_requirement_in_same_manner_as_child

      and satisfies_section_1397jj_b_2_requirement_in_same_manner_as_child

      and satisfies_section_1397jj_b_3_requirement_in_same_manner_as_child'
