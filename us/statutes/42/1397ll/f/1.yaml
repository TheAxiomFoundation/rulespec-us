format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/1397ll/f/1
  summary: |-
    The option to provide assistance in accordance with the preceding subsections shall not limit any other option for a State to provide child health assistance through specified 42 CFR provisions, or pregnancy-related services through waiver authority.
rules:
  - name: child_health_assistance_option_through_specified_regulations_not_limited
