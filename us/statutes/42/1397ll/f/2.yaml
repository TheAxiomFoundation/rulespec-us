format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/1397ll/f/2
  summary: |-
    Any State providing child health assistance under paragraph (1) authority may continue that assistance and postpartum services through the end of the month in which the 60-day period beginning on the last day of pregnancy ends, in the same manner as under subchapter XIX, only if the mother otherwise satisfies State child health plan eligibility requirements other than age.
rules:
  - name: postpartum_continuation_period_days
    kind: parameter
    dtype: Count
    source: 42 U.S.C. 1397ll(f)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/1397ll/f/2
              excerpt: "60-day period (beginning on the last day of the pregnancy)"
    versions:
      - effective_from: '1974-01-01'
        formula: |-
          60

  - name: state_may_continue_child_health_assistance_and_postpartum_services
    kind: derived
    entity: StateAgency
    dtype: Judgment
    period: Month
    source: 42 U.S.C. 1397ll(f)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/42/1397ll/f/2
    versions:
      - effective_from: '1974-01-01'
        formula: |-
          state_provides_child_health_assistance_under_authority_described_in_paragraph_1
          and current_month_is_through_end_of_month_in_which_postpartum_continuation_period_ends
          and assistance_and_postpartum_services_would_be_provided_in_same_manner_as_under_state_plan_under_subchapter_xix
          and mother_would_otherwise_satisfy_state_child_health_plan_eligibility_requirements_other_than_age_during_period
