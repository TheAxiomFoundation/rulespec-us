format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/12746
  summary: |-
    The Secretary shall designate a State or unit of general local government to be a participating jurisdiction when it complies with regulated procedures. A jurisdiction receiving a formula allocation is eligible if its formula allocation is $750,000 or greater, or if local-housing-authority, capacity, and State-transfer or own-source gap-funding conditions are met. If the amount appropriated pursuant to section 12724 for any fiscal year is less than $1,500,000,000, this section substitutes $500,000 for $750,000 in paragraph (3) and substitutes $500,000, $410,000, and $335,000 for the revocation thresholds in paragraph (9).
  deferred_outputs:
    - output: us:statutes/42/12746#participating_jurisdiction_designation
      reason: Designation requires approval of a comprehensive housing affordability strategy in accordance with section 12705 and Secretary designation procedures; the section 12705 source module is present, but this aggregate designation output still requires composition of approval, notice, and designation mechanics.
      source_values:
        - us:statutes/42/12746#strategy_submission_deadline_days_after_intent_notice
    - output: us:statutes/42/12746#reserved_funds_reallocation
      reason: Reallocation after failure or revocation depends on requirements of paragraphs (3), (4), and (5), amendments and resubmissions under section 12705(c)(3), and allocation or selection mechanics under section 12747 that still require cross-module composition.
      source_values:
        - us:statutes/42/12746#state_direct_reallocation_application_window_months
        - us:statutes/42/12746#local_direct_reallocation_application_window_months
