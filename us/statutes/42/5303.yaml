format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/5303
  summary: |-
    The Secretary is authorized to make grants to States, units of general local government, and Indian tribes. For section 5306 assistance, $4,000,000,000 is authorized for fiscal year 1993 and $4,168,000,000 for fiscal year 1994; sums remain available until expended.
rules:
  - name: community_development_grant_authorized
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Year
    source: 42 U.S.C. 5303, first sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us/statute/42/5303
    versions:
      - effective_from: '1993-01-01'
        formula: |-
          (grant_recipient_is_state or grant_recipient_is_unit_of_general_local_government or grant_recipient_is_indian_tribe)
          and grant_activities_are_in_accordance_with_chapter
  - name: section_5306_assistance_authorized_appropriation_fiscal_year_1993
    kind: parameter
    dtype: Money
    unit: USD
    period: Year
    source: 42 U.S.C. 5303, second sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/42/5303
              excerpt: "$4,000,000,000 for fiscal year 1993"
    versions:
      - effective_from: '1993-01-01'
        formula: |-
          4000000000
  - name: section_5306_assistance_authorized_appropriation_fiscal_year_1994
    kind: parameter
    dtype: Money
    unit: USD
    period: Year
    source: 42 U.S.C. 5303, second sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/42/5303
              excerpt: "$4,168,000,000 for fiscal year 1994"
    versions:
      - effective_from: '1994-01-01'
        formula: |-
          4168000000
  - name: authorized_sums_remain_available_until_expended
    kind: derived
    entity: AppropriationAuthorization
    dtype: Judgment
    period: Year
    source: 42 U.S.C. 5303, third sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us/statute/42/5303
    versions:
      - effective_from: '1994-01-01'
        formula: |-
          sum_authorized_pursuant_to_this_section
