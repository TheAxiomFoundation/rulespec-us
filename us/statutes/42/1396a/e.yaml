format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/1396a/e
  summary: |-
    42 USC 1396a(e) includes deeming and continuity rules for Medicaid eligibility, including managed care and group health plan minimum enrollment periods of not more than 6 months; deemed eligibility for certain disabled children age 18 or younger; one year of deemed eligibility for newborns; postpartum continuation through the month containing the end of a 60-day period; 12-month continuous eligibility for children under age 19; Express Lane option limits including 30 percentage points, 3 percent error rate, and child age limits of under 19 or up to 21 at State option; MAGI rules in paragraph (14); a $2,000 clinical-trial compensation disregard for individuals who have attained age 19; and optional 12-month postpartum coverage.
  deferred_outputs:
    - output: us:statutes/42/1396a/e#managed_care_minimum_enrollment_continued_eligibility
      reason: The source depends on managed-care enrollment categories and benefit-limitation mechanics, including cited sources not copied as executable RuleSpec context.
      source_values:
        - us:statutes/42/1396a/e#managed_care_minimum_enrollment_period_max_months
    - output: us:statutes/42/1396a/e#disabled_child_deemed_ssi_recipient_for_medicaid
      reason: The source depends on disability status under section 1382c(a) and institutional-care eligibility mechanics that are not fully available as copied executable RuleSpec context.
      source_values:
        - us:statutes/42/1396a/e#disabled_child_deeming_age_ceiling_years
    - output: us:statutes/42/1396a/e#newborn_deemed_medical_assistance_eligible
      reason: The newborn continuity rule includes identification-number administration and a section 1396b(v) delivery-assistance branch that requires upstream mechanics beyond this parent slice.
      source_values:
        - us:statutes/42/1396a/e#newborn_deemed_eligibility_period_years
    - output: us:statutes/42/1396a/e#qualified_medicare_beneficiary_determination_valid
      reason: The qualified Medicare beneficiary definition in section 1396d(p)(1) is not copied as executable RuleSpec context.
      source_values:
        - us:statutes/42/1396a/e#qualified_medicare_beneficiary_determination_validity_months
        - us:statutes/42/1396a/e#qualified_medicare_beneficiary_redetermination_min_interval_months
    - output: us:statutes/42/1396a/e#respiratory_care_services_optional_medical_assistance
      reason: The rule requires service-category and facility-level care determinations not represented by available copied executable RuleSpec context.
      source_values:
        - us:statutes/42/1396a/e#ventilator_dependency_daily_hours_threshold
        - us:statutes/42/1396a/e#ventilator_dependency_consecutive_inpatient_days_threshold
    - output: us:statutes/42/1396a/e#group_health_plan_minimum_enrollment_continued_eligibility
      reason: The source depends on enrollment under section 1396e, which is not copied as executable RuleSpec context.
      source_values:
        - us:statutes/42/1396a/e#group_health_plan_minimum_enrollment_period_max_months
    - output: us:statutes/42/1396a/e#child_continuous_medicaid_eligibility
      reason: The rule depends on eligibility under subsection (a)(10)(A), a broader parent eligibility surface not composed in this aggregate slice.
      source_values:
        - us:statutes/42/1396a/e#child_continuous_eligibility_period_months
        - us:statutes/42/1396a/e#child_continuous_eligibility_age_ceiling_years
    - output: us:statutes/42/1396a/e#express_lane_option
      reason: The Express Lane option includes screen-and-enroll, citizenship-verification, automatic-enrollment, coding, and CHIP coordination dependencies from cited sources not copied as executable RuleSpec context.
      source_values:
        - us:statutes/42/1396a/e#express_lane_screening_threshold_minimum_percentage_point_excess
        - us:statutes/42/1396a/e#express_lane_error_rate_reduction_threshold
        - us:statutes/42/1396a/e#express_lane_child_default_age_ceiling_years
        - us:statutes/42/1396a/e#express_lane_child_state_option_max_age_years
    - output: us:statutes/42/1396a/e#extended_postpartum_medical_assistance
      reason: The optional extended postpartum rule depends on State election and benefit-scope coordination with CHIP election under section 1397gg(e)(1)(J), which is not copied as executable RuleSpec context.
      source_values:
        - us:statutes/42/1396a/e#extended_postpartum_coverage_period_months
rules:
  - name: managed_care_minimum_enrollment_period_max_months
    kind: parameter
    dtype: Count
    source: 42 USC 1396a(e)(2)(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/1396a/e
              excerpt: not more than six months
    versions:
      - effective_from: '1990-04-01'
        formula: |-
          6

  - name: disabled_child_deeming_age_ceiling_years
    kind: parameter
    dtype: Count
    source: 42 USC 1396a(e)(3)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/1396a/e
              excerpt: is 18 years of age or younger
    versions:
      - effective_from: '1990-04-01'
        formula: |-
          18

  - name: newborn_deemed_eligibility_period_years
    kind: parameter
    dtype: Count
    source: 42 USC 1396a(e)(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/1396a/e
              excerpt: remain eligible for such assistance for a period of one year
    versions:
      - effective_from: '1990-04-01'
        formula: |-
          1

  - name: qualified_medicare_beneficiary_determination_validity_months
    kind: parameter
    dtype: Count
    source: 42 USC 1396a(e)(8)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/1396a/e
              excerpt: valid for an individual for a period of 12 months
    versions:
      - effective_from: '1990-04-01'
        formula: |-
          12

  - name: qualified_medicare_beneficiary_redetermination_min_interval_months
    kind: parameter
    dtype: Count
    source: 42 USC 1396a(e)(8)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/1396a/e
              excerpt: not more frequently than once every 6 months
    versions:
      - effective_from: '1990-04-01'
        formula: |-
          6

  - name: ventilator_dependency_daily_hours_threshold
    kind: parameter
    dtype: Count
    source: 42 USC 1396a(e)(9)(A)(i)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/1396a/e
              excerpt: at least six hours per day
    versions:
      - effective_from: '1990-04-01'
        formula: |-
          6

  - name: ventilator_dependency_consecutive_inpatient_days_threshold
    kind: parameter
    dtype: Count
    source: 42 USC 1396a(e)(9)(A)(ii)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/1396a/e
              excerpt: for at least 30 consecutive days
    versions:
      - effective_from: '1990-04-01'
        formula: |-
          30

  - name: group_health_plan_minimum_enrollment_period_max_months
    kind: parameter
    dtype: Count
    source: 42 USC 1396a(e)(11)(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/1396a/e
              excerpt: not more than 6 months
    versions:
      - effective_from: '1990-04-01'
        formula: |-
          6

  - name: child_continuous_eligibility_period_months
    kind: parameter
    dtype: Count
    source: 42 USC 1396a(e)(12)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/1396a/e
              excerpt: the end of the 12-month period
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          12

  - name: child_continuous_eligibility_age_ceiling_years
    kind: parameter
    dtype: Count
    source: 42 USC 1396a(e)(12)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/1396a/e
              excerpt: under the age of 19
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          19

  - name: express_lane_screening_threshold_minimum_percentage_point_excess
    kind: parameter
    dtype: Rate
    source: 42 USC 1396a(e)(13)(C)(ii)(I)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/1396a/e
              excerpt: exceeds the highest income threshold ... by a minimum of 30 percentage points
    versions:
      - effective_from: '2009-01-01'
        formula: |-
          0.30

  - name: express_lane_error_rate_reduction_threshold
    kind: parameter
    dtype: Rate
    source: 42 USC 1396a(e)(13)(E)(i)(IV), (V)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/1396a/e
              excerpt: error rate exceeds 3 percent
    versions:
      - effective_from: '2009-01-01'
        formula: |-
          0.03

  - name: express_lane_child_default_age_ceiling_years
    kind: parameter
    dtype: Count
    source: 42 USC 1396a(e)(13)(G)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/1396a/e
              excerpt: child means an individual under 19 years of age
    versions:
      - effective_from: '2009-01-01'
        formula: |-
          19

  - name: express_lane_child_state_option_max_age_years
    kind: parameter
    dtype: Count
    source: 42 USC 1396a(e)(13)(G)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/1396a/e
              excerpt: not to exceed 21 years of age
    versions:
      - effective_from: '2009-01-01'
        formula: |-
          21

  - name: clinical_trial_compensation_age_threshold_years
    kind: parameter
    dtype: Count
    source: 42 USC 1396a(e)(15)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/1396a/e
              excerpt: who has attained 19 years of age
    versions:
      - effective_from: '2021-01-01'
        formula: |-
          19

  - name: clinical_trial_compensation_disregard_cap
    kind: parameter
    dtype: Money
    unit: USD
    source: 42 USC 1396a(e)(15)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/42/1396a/e
              excerpt: The first $2,000 received
    versions:
      - effective_from: '2021-01-01'
        formula: |-
          2000

  - name: clinical_trial_compensation_disregarded_for_income_eligibility
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: USD
    source: 42 USC 1396a(e)(15)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/1396a/e
              excerpt: The first $2,000 received by an individual (who has attained 19 years of age) as compensation for participation in a clinical trial ... shall be disregarded
    versions:
      - effective_from: '2021-01-01'
        formula: |-
          if individual_age_years >= clinical_trial_compensation_age_threshold_years and compensation_received_for_qualifying_rare_disease_clinical_trial: min(clinical_trial_compensation_amount, clinical_trial_compensation_disregard_cap) else: 0

  - name: extended_postpartum_coverage_period_months
    kind: parameter
    dtype: Count
    source: 42 USC 1396a(e)(16)(A), (B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/1396a/e
              excerpt: during the 12-month period that begins on the last day of the individual’s pregnancy
    versions:
      - effective_from: '2021-01-01'
        formula: |-
          12
