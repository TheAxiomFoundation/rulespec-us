  - name: is_medicaid_eligible
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 USC 1396a(a)(10)(A), (E), and (F)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us/statute/42/1396a/a/10
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/1396a/a/10
              excerpt: "beginning January 1, 2014, who are under 65 years of age, not pregnant"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/1396a/a/10
              excerpt: "income ... does not exceed 133 percent of the poverty line"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/1396a/a/10
              excerpt: "are under 26 years of age"
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/42/1396d/n#qualified_pregnant_woman_or_child
              output: qualified_pregnant_woman_or_child
              hash: sha256:f765cf0c34cb9bf601564fbe16a05ea00c332d96dc5fd46cb528472e29c0f1bf
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/42/1396a/xx#demonstrated_community_engagement_for_month
              output: demonstrated_community_engagement_for_month
              hash: sha256:48ae645b26d1e6987bbf379424d1a96db6871830473d4671eb786cc3fad6c75c
    versions:
      - effective_from: '2014-01-01'
        formula: |-
          person_is_in_other_mandatory_category_described_in_subparagraph_A_i
          or qualified_pregnant_woman_or_child
          or (
            age < adult_expansion_age_ceiling_years
            and not person_is_pregnant
            and not person_is_entitled_to_or_enrolled_for_medicare_part_a
            and not person_is_enrolled_for_medicare_part_b
            and not person_is_described_in_previous_mandatory_subclause
            and income_determined_for_adult_expansion <= adult_expansion_income_limit_poverty_line_rate * poverty_line_for_family_size
            and demonstrated_community_engagement_for_month
          )
          or (
            age < former_foster_care_age_ceiling_years
            and person_is_not_described_in_or_enrolled_under_mandatory_subclauses_I_through_VII_or_has_income_exceeding_applicable_level
            and person_was_in_foster_care_under_state_responsibility_at_attainment_age
            and person_was_enrolled_in_state_plan_or_waiver_while_in_foster_care
          )
          or person_is_in_state_elected_optional_category_described_in_subparagraph_A_ii
          or person_is_qualified_medicare_beneficiary_or_related_medicare_cost_sharing_group
          or person_is_qualified_cobra_continuation_beneficiary_and_state_elected_cobra_premium_assistance
