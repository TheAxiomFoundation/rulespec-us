module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/1396a/a/10
  summary: |-
    provide for making medical assistance available, including at least specified care and services, to listed mandatory individuals including SSI-related individuals, qualified pregnant women or children, adult-expansion individuals beginning January 1, 2014 with income not exceeding 133 percent of the poverty line, and former foster-care individuals under 26; at State option to additional listed groups; and for comparability, home health services, Medicare cost-sharing, COBRA premiums, SSI disregards, and stated benefit-scope exceptions.
  deferred_outputs:
    - output: us:statutes/42/1396a/a/10#medical_assistance_amount_duration_scope_comparable
      reason: Requires computable medical-assistance package, covered-service, and individual-classification mechanics from subparagraphs (A), (E), and cited section 1396d provisions beyond the executable category predicates composed here.
    - output: us:statutes/42/1396a/a/10#optional_medicaid_category_eligibility
      reason: Optional categories in subparagraph (A)(ii) depend on State elections and multiple cited provisions, including section 1396n, section 1382e, section 1383c, section 9902(2), section 1396d, and subsection-specific definitions not fully available as executable RuleSpec outputs in the copied context.
    - output: us:statutes/42/1396a/a/10#medicare_cost_sharing_medical_assistance_available
      reason: Requires qualified Medicare beneficiary, qualified disabled and working individual, Medicare cost-sharing, and income-level definitions from section 1396d(p), section 1396d(s), section 1396u-3, and related provisions not available here as executable category outputs.
    - output: us:statutes/42/1396a/a/10#limited_benefit_medical_assistance_scope
      reason: Requires benefit-scope definitions and category membership under cited provisions including section 1396d(a), section 1396o, section 1396r-4, section 1396e, section 1320b-5(g), and section 1315.
