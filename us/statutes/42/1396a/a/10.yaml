format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/1396a/a/10
  summary: |-
    State plans must provide for making medical assistance available to mandatory groups and optional groups; impose amount, duration, and scope comparability rules; provide home health services for individuals entitled to nursing facility services; cover Medicare cost-sharing for specified Medicare beneficiaries; optionally cover COBRA premiums; and apply stated limitations and exceptions, including income, age, day-count, and poverty-line thresholds.
  deferred_outputs:
    - output: us:statutes/42/1396a/a/10#medical_assistance_available_to_mandatory_groups
      reason: Requires eligibility categories and medical-assistance definitions from cited provisions not copied into this workspace, including section 1396d(a), section 1396d(n), section 1396d(q), section 1397jj(c)(5), and related provisions.
    - output: us:statutes/42/1396a/a/10#medical_assistance_available_to_optional_groups
      reason: Requires optional-group categories, income/resource standards, institutional-care and waiver-service definitions from cited provisions not copied into this workspace.
    - output: us:statutes/42/1396a/a/10#medical_assistance_amount_duration_scope_comparable
      reason: Requires computable medical-assistance packages and covered individual classifications from subparagraphs (A), (E), and cited section 1396d provisions not copied into this workspace.
    - output: us:statutes/42/1396a/a/10#medicare_cost_sharing_medical_assistance_available
      reason: Requires qualified Medicare beneficiary, cost-sharing, and income-level definitions from section 1396d(p), section 1396d(s), section 1396u-3, and related provisions not copied into this workspace.
    - output: us:statutes/42/1396a/a/10#limited_benefit_medical_assistance_scope
      reason: Requires benefit-scope definitions and category membership under multiple cited provisions, including section 1396d(a), section 1396o, section 1396r-4, section 1396e, and section 1315, which are not copied into this workspace.
