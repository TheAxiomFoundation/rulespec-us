format: rulespec/v1
imports:
  - us:statutes/42/1396a/xx#demonstrated_community_engagement_for_month
  - us:statutes/42/1396d/n#qualified_pregnant_woman_or_child
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/1396a/a/10
  summary: |-
    State plans must provide for making medical assistance available to listed mandatory and optional groups, including qualified pregnant women or children, adults beginning January 1, 2014 with income not exceeding 133 percent of the poverty line, and former foster-care individuals under 26. The provision also states comparability rules, home-health coverage, Medicare cost-sharing coverage, optional COBRA premium coverage, and stated benefit-scope limitations.
  deferred_outputs:
    - output: us:statutes/42/1396a/a/10#medical_assistance_amount_duration_scope_comparable
      reason: Requires computable medical-assistance packages and covered individual classifications from subparagraphs (A), (E), and cited section 1396d provisions not copied into this workspace.
    - output: us:statutes/42/1396a/a/10#medicare_cost_sharing_medical_assistance_available
      reason: Requires qualified Medicare beneficiary, cost-sharing, and income-level definitions from section 1396d(p), section 1396d(s), section 1396u-3, and related provisions not copied into this workspace.
    - output: us:statutes/42/1396a/a/10#limited_benefit_medical_assistance_scope
      reason: Requires benefit-scope definitions and category membership under multiple cited provisions, including section 1396d(a), section 1396o, section 1396r-4, section 1396e, and section 1315, which are not copied into this workspace.
