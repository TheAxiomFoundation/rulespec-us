format: rulespec/v1
imports:
  - us:statutes/26/3304#institution_of_higher_education
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/1396a
  summary: |-
    42 USC 1396a(xx) requires States, beginning not later than the first quarter after December 31, 2026 unless a special implementation exemption applies, to condition Medicaid eligibility for applicable individuals on demonstrating community engagement. An applicable individual demonstrates engagement for a month by work, community service, a work program, half-time education, a qualifying combination totaling not less than 80 hours, qualifying income based on the applicable minimum wage multiplied by 80 hours, or qualifying seasonal-worker average income over the preceding 6 months. The subsection also states mandatory deeming exceptions, optional hardship-event deeming, verification, noncompliance notice and 30-day cure procedures, outreach, definitions, non-waiver, and special implementation exemption rules.
  deferred_outputs:
    - output: us:statutes/42/1396a/xx#state_must_apply_community_engagement_requirement
      reason: The full state implementation obligation depends on paragraph (11) special implementation exemptions, waiver/demonstration project timing under section 1315, Secretary regulations, and state plan choices not fully executable from this source slice alone.
    - output: us:statutes/42/1396a/xx#noncompliant_individual_denial_or_disenrollment_required
      reason: The final denial or disenrollment procedure depends on other bases for Medicaid eligibility, other insurance affordability programs, and fair-hearing procedure under subsection (a)(3), which are not provided as executable RuleSpec dependencies.
rules:
  - name: monthly_activity_hours_requirement
    kind: parameter
    dtype: Decimal
    source: 42 USC 1396a(xx)(2)(A)-(E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/42/1396a
              excerpt: "not less than 80 hours"
    versions:
      - effective_from: '2026-12-31'
        formula: |-
          80

  - name: seasonal_worker_income_lookback_months
    kind: parameter
    dtype: Count
    source: 42 USC 1396a(xx)(2)(G)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/42/1396a
              excerpt: "average monthly income over the preceding 6 months"
    versions:
      - effective_from: '2026-12-31'
        formula: |-
          6

  - name: hardship_unemployment_rate_threshold
    kind: parameter
    dtype: Rate
    source: 42 USC 1396a(xx)(3)(B)(ii)(II)(bb)(AA)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/42/1396a
              excerpt: "8 percent"
    versions:
      - effective_from: '2026-12-31'
        formula: |-
          0.08

  - name: hardship_national_unemployment_rate_multiplier
    kind: parameter
    dtype: Decimal
    source: 42 USC 1396a(xx)(3)(B)(ii)(II)(bb)(BB)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/42/1396a
              excerpt: "1.5 times the national unemployment rate"
    versions:
      - effective_from: '2026-12-31'
        formula: |-
          1.5

  - name: community_engagement_met_by_activity_or_income
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 USC 1396a(xx)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/1396a
              excerpt: "meets 1 or more of the following conditions"
    versions:
      - effective_from: '2026-12-31'
        formula: |-
          monthly_work_hours >= monthly_activity_hours_requirement
          or monthly_community_service_hours >= monthly_activity_hours_requirement
          or monthly_work_program_hours >= monthly_activity_hours_requirement
          or enrolled_in_educational_program_at_least_half_time
          or monthly_combined_engagement_activity_hours >= monthly_activity_hours_requirement
          or monthly_income >= applicable_minimum_wage_hourly_rate * monthly_activity_hours_requirement
          or (seasonal_worker and average_monthly_income_over_preceding_6_months >= applicable_minimum_wage_hourly_rate * monthly_activity_hours_requirement)

  - name: educational_program
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 USC 1396a(xx)(9)(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/statute/42/1396a
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/26/3304#institution_of_higher_education
              output: institution_of_higher_education
              hash: sha256:86fc1e04b86968a3fea7737fce53a8297bc20be9c7896e4527512caed95bff86
    versions:
      - effective_from: '2026-12-31'
        formula: |-
          institution_of_higher_education
          or enrolled_in_career_and_technical_education_program

  - name: mandatory_community_engagement_deeming_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 USC 1396a(xx)(3)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/42/1396a
    versions:
      - effective_from: '2026-12-31'
        formula: |-
          was_specified_excluded_individual_for_part_or_all_of_month
          or was_under_age_19_for_part_or_all_of_month
          or was_entitled_to_or_enrolled_for_medicare_part_a_or_b_for_part_or_all_of_month
          or was_described_in_subsection_a_10_A_i_I_through_VII_for_part_or_all_of_month
          or was_inmate_of_public_institution_during_3_month_period_ending_first_day_of_month

  - name: short_term_hardship_event
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 USC 1396a(xx)(3)(B)(ii)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/statute/42/1396a
    versions:
      - effective_from: '2026-12-31'
        formula: |-
          received_high_acuity_services_for_part_or_all_of_month
          or county_has_presidential_emergency_or_disaster_for_part_or_all_of_month
          or county_unemployment_rate >= min(hardship_unemployment_rate_threshold, hardship_national_unemployment_rate_multiplier * national_unemployment_rate)
          or individual_or_dependent_must_travel_outside_community_for_extended_medically_necessary_services

  - name: optional_hardship_deeming_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 USC 1396a(xx)(3)(B)(i)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/42/1396a
    versions:
      - effective_from: '2026-12-31'
        formula: |-
          state_plan_provides_optional_short_term_hardship_deeming
          and short_term_hardship_event
          and (county_has_presidential_emergency_or_disaster_for_part_or_all_of_month or county_unemployment_rate >= min(hardship_unemployment_rate_threshold, hardship_national_unemployment_rate_multiplier * national_unemployment_rate) or individual_requested_hardship_deeming)

  - name: deemed_to_have_demonstrated_community_engagement
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 USC 1396a(xx)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/1396a
    versions:
      - effective_from: '2026-12-31'
        formula: |-
          mandatory_community_engagement_deeming_applies
          or optional_hardship_deeming_applies

  - name: demonstrated_community_engagement_for_month
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 USC 1396a(xx)(2)-(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/1396a
    versions:
      - effective_from: '2026-12-31'
        formula: |-
          community_engagement_met_by_activity_or_income
          or deemed_to_have_demonstrated_community_engagement

  - name: specified_excluded_individual
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 USC 1396a(xx)(9)(A)(ii)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/statute/42/1396a
    versions:
      - effective_from: '2026-12-31'
        formula: |-
          described_in_subsection_a_10_A_i_IX
          or is_indian_urban_indian_california_indian_or_ihs_eligible_indian
          or is_parent_guardian_caretaker_relative_or_family_caregiver_of_dependent_child_age_13_or_under_or_disabled_individual
          or is_veteran_with_total_disability_rating
          or is_medically_frail_or_has_special_medical_needs
          or complies_with_tanf_work_requirements_or_is_nonexempt_snap_work_requirement_household_member
          or participates_in_drug_addiction_or_alcoholic_treatment_and_rehabilitation_program
          or is_inmate_of_public_institution
          or is_pregnant_or_entitled_to_postpartum_medical_assistance

  - name: applicable_individual
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 USC 1396a(xx)(9)(A)(i)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/statute/42/1396a
    versions:
      - effective_from: '2026-12-31'
        formula: |-
          not specified_excluded_individual
          and (eligible_or_enrolled_under_subsection_a_10_A_i_VIII or (eligible_or_enrolled_under_equivalent_minimum_essential_coverage_waiver and has_attained_age_19_and_is_under_age_65 and not pregnant and not entitled_to_or_enrolled_for_medicare_part_a_or_b and not otherwise_eligible_to_enroll_under_state_plan))
