format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/1396a/m
  summary: |-
    Individuals described are those 65 years of age or older or disabled, whose SSI-determined income does not exceed the State-established level, and whose SSI-determined resources do not exceed the SSI maximum. The State income level may not exceed 100 percent of the official poverty line. For covered optional individuals and qualified Medicare beneficiaries, medical or remedial care costs are generally not taken into account in determining income.
  deferred_outputs:
    - output: us:statutes/42/1396a/m#is_optional_senior_or_disabled_for_medicaid
      reason: The final individual status depends on resources determined under section 1382b and the SSI maximum resource amount, but no copied RuleSpec context provides the section 1382b resource determination or maximum resource concept.
rules:
  - name: optional_senior_age_threshold_years
    kind: parameter
    dtype: Count
    source: 42 U.S.C. 1396a(m)(1)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/1396a/m
              excerpt: "65 years of age or older"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          65

  - name: optional_senior_or_disabled_income_level_maximum_rate
    kind: parameter
    dtype: Rate
    source: 42 U.S.C. 1396a(m)(2)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/1396a/m
              excerpt: "not more than 100 percent"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          1.00

  - name: state_income_level_within_federal_maximum
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 U.S.C. 1396a(m)(2)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/1396a/m
              excerpt: "may not exceed a percentage (not more than 100 percent) of the official poverty line"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          state_established_income_level_poverty_line_rate <= optional_senior_or_disabled_income_level_maximum_rate

  - name: income_does_not_exceed_state_optional_senior_or_disabled_level
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 U.S.C. 1396a(m)(1)(B), (2)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/1396a/m
              excerpt: "whose income ... does not exceed an income level established by the State"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          income_for_supplemental_security_income_program <= state_established_income_level_amount
          and state_income_level_within_federal_maximum

  - name: medical_or_remedial_care_costs_not_taken_into_account_for_optional_individual_income
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 U.S.C. 1396a(m)(3)(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/42/1396a/m
              excerpt: "except as provided in section 1382a(b)(4)(B)(ii)"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/1396a/m
              excerpt: "costs incurred for medical care or for any other type of remedial care shall not be taken into account in determining income"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          covered_under_state_plan_by_subsection_a_10_A_ii_X
          and not section_1382a_b_4_B_ii_exception_applies

  - name: medical_or_remedial_care_costs_not_taken_into_account_for_qualified_medicare_beneficiary_income
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 42 U.S.C. 1396a(m)(4)(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/42/1396a/m
              excerpt: "except as provided in section 1382a(b)(4)(B)(ii)"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/1396a/m
              excerpt: "qualified medicare beneficiaries ... costs incurred for medical care or for any other type of remedial care shall not be taken into account in determining income"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          qualified_medicare_beneficiary_described_in_section_1396d_p_1
          and not section_1382a_b_4_B_ii_exception_applies
