format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/1382f/c
  summary: |-
    Effective July 1, 1983: amounts under section 1382(a)(1)(A) and (b)(1) "shall be increased by $240"; the Public Law 93-66 section 211(a)(1)(A) amount "shall be increased by $120"; amounts under section 1382(a)(2)(A) and (b)(2) "shall be increased by $360."
  deferred_outputs:
    - output: us:statutes/42/1382f/c#increased_amount_for_section_1382_a_1_a
      reason: |-
        The source states the July 1, 1983 additive increase, but computing the final increased amount requires the dollar amount in effect under section 1382(a)(1)(A) after prior increases under section 1382f, which is not supplied in this source text or copied RuleSpec context.
      source_values:
        - us:statutes/42/1382f/c#dollar_amount_increase_for_section_1382_a_1_a_and_b_1
    - output: us:statutes/42/1382f/c#increased_amount_for_section_1382_b_1
      reason: |-
        The source states the July 1, 1983 additive increase, but computing the final increased amount requires the dollar amount in effect under section 1382(b)(1) after prior increases under section 1382f. The copied section 1382(b) context supplies the original statutory base rate, not the amount as previously increased under section 1382f.
      source_values:
        - us:statutes/42/1382f/c#dollar_amount_increase_for_section_1382_a_1_a_and_b_1
    - output: us:statutes/42/1382f/c#increased_amount_for_public_law_93_66_section_211_a_1_a
      reason: |-
        The source states the July 1, 1983 additive increase, but computing the final increased amount requires the dollar amount in effect under Public Law 93-66 section 211(a)(1)(A) after prior increases, which is not supplied in this source text or copied RuleSpec context.
      source_values:
