    - output: us:statutes/42/1382f/c#increased_amount_for_section_1382_a_2_a
      reason: |-
        The source states the July 1, 1983 additive increase, but computing the final increased amount requires the dollar amount in effect under section 1382(a)(2)(A) after prior increases under section 1382f, which is not supplied in this source text or copied RuleSpec context.
      source_values:
