format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/8011
  summary: |-
    42 USC 8011 establishes findings and purposes for congregate housing services; authorizes HUD and Agriculture contracts for congregate services programs and housing adaptation; specifies eligible services, eligibility, applications, selection criteria, cost shares, definitions, reports, regulations, appropriations, and a reserve fund.
  deferred_outputs:
    - output: us:statutes/42/8011/a#findings_and_purposes
      reason: Legislative findings and purposes are non-operative audit text rather than a computable eligibility, amount, or condition.
    - output: us:statutes/42/8011/b#contracts_for_congregate_services_programs
      reason: Administrative contracting authority depends on agency selection and appropriations; only the source-stated contract term scalar is encoded locally.
      source_values:
        - us:statutes/42/8011#congregate_services_contract_term_years
    - output: us:statutes/42/8011/d#eligible_activities
      reason: Eligible services and activities are program-administration categories and cross-referenced service determinations; only independent source-stated numeric limits and rates are encoded locally.
      source_values:
        - us:statutes/42/8011#meal_service_daily_nutritional_needs_minimum_rate
        - us:statutes/42/8011#eligible_project_resident_service_cost_fee_rate
        - us:statutes/42/8011#full_meal_service_adjusted_income_fee_minimum_rate
        - us:statutes/42/8011#full_meal_service_adjusted_income_fee_maximum_rate
        - us:statutes/42/8011#less_than_full_meal_service_adjusted_income_fee_rate
    - output: us:statutes/42/8011/e#eligibility_for_services
      reason: Eligibility determinations require professional assessment committee findings, project residency, and disability definitions including missing 42 USC 8013.
    - output: us:statutes/42/8011/f#eligible_contract_recipients_and_distribution_of_assistance
      reason: Contract-recipient eligibility is an administrative authorization to the Secretary concerned, not a computable benefit output.
    - output: us:statutes/42/8011/g#applications
      reason: Application contents and Secretary review are administrative process requirements; only source-stated timing and support-period scalars are encoded locally.
      source_values:
        - us:statutes/42/8011#qualifying_supportive_services_expected_availability_period_years
        - us:statutes/42/8011#supportive_services_firm_commitment_minimum_years
        - us:statutes/42/8011#secretary_application_action_period_days
    - output: us:statutes/42/8011/h#selection_and_evaluation_of_applications_and_programs
      reason: Selection criteria and evaluation-report procedures require agency judgment and regulations rather than a computable formula.
    - output: us:statutes/42/8011/j#miscellaneous_provisions
      reason: Resident utilization, income-treatment, priority, and administrative-cost rules require program-specific wage, assistance, and recipient facts; only the administrative cost cap is encoded locally.
      source_values:
        - us:statutes/42/8011#administrative_cost_limit_rate
    - output: us:statutes/42/8011/k#definitions
      reason: Most definitions are categorical or depend on missing 42 USC 8013; independent numeric definitional thresholds are encoded locally.
      source_values:
        - us:statutes/42/8011#frail_elderly_activity_of_daily_living_minimum_count
        - us:statutes/42/8011#elderly_person_minimum_age_years
        - us:statutes/42/8011#temporary_disability_expected_duration_limit_months
    - output: us:statutes/42/8011/n#authorization_of_appropriations
      reason: Appropriation allocation depends on program unit counts administered by HUD and Agriculture; fiscal-year authorization amounts are encoded locally.
      source_values:
        - us:statutes/42/8011#authorized_appropriation_fiscal_year_1993
        - us:statutes/42/8011#authorized_appropriation_fiscal_year_1994
    - output: us:statutes/42/8011/o#reserve_fund
      reason: Reserve-fund supplementation requires Secretary determination; the statutory reserve cap rate is encoded locally.
      source_values:
        - us:statutes/42/8011#reserve_fund_amounts_made_available_cap_rate
rules:
  - name: congregate_services_contract_term_years
    kind: parameter
    dtype: Count
    source: 42 USC 8011(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/8011
              excerpt: "shall be for a term of 5 years"
    versions:
      - effective_from: '1990-11-28'
        formula: |-
          5

  - name: meal_service_daily_nutritional_needs_minimum_rate
    kind: parameter
    dtype: Rate
