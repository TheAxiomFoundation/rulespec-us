format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/12709
  summary: The Secretaries shall establish energy efficiency standards for specified
    new construction and rehabilitation housing. The standards shall meet or exceed
    the 2006 IECC, or for multifamily high rises ASHRAE Standard 90.1-2004, and be
    cost-effective on a life-cycle cost basis. If no standards are established by
    the statutory deadline, covered housing must meet those code requirements. Revised
    code requirements trigger amendment unless compliance would not significantly
    increase energy efficiency, be technologically feasible, or be economically justified.
  deferred_outputs:
  - output: us:statutes/42/12709/d#housing_must_meet_revised_code_or_standard_after_failure_to_amend
    reason: Subsection (d) depends on the Secretary of Energy determination under
      section 6833, but no copied RuleSpec context provides the exact cited determination
      output.
rules:
- name: standard_is_multifamily_high_rise_specific
  kind: derived
  entity: HousingProject
  dtype: Judgment
  period: Year
  source: 42 U.S.C. 12709(a)(2), (b), (c)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us/statute/42/12709
          excerpt: in the case of multifamily high rises
  versions:
  - effective_from: '2006-09-30'
    formula: housing_is_multifamily_high_rise
- name: initial_energy_efficiency_standards_satisfy_required_code_and_cost_effectiveness
  kind: derived
  entity: HousingProject
  dtype: Judgment
  period: Year
  source: 42 U.S.C. 12709(a)(2)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: predicate
        source:
          corpus_citation_path: us/statute/42/12709
          excerpt: Such standards shall meet or exceed the requirements of the 2006
            International Energy Conservation Code
      - path: versions[0].formula
        kind: predicate
        source:
          corpus_citation_path: us/statute/42/12709
          excerpt: "or, in the case of multifamily high rises, the requirements of the American Society of Heating, Refrigerating, and Air-Conditioning Engineers Standard 90.1–2004 (hereafter in this section referred to as “ASHRAE Standard 90.1–2004"
      - path: versions[0].formula
        kind: predicate
        source:
          corpus_citation_path: us/statute/42/12709
          excerpt: shall be cost-effective with respect to construction and operating
            costs on a life-cycle cost basis
  versions:
  - effective_from: '2006-09-30'
    formula: "((((standard_is_multifamily_high_rise_specific) and standards_meet_or_exceed_ashrae_standard_90_1_2004)\n\
      \  or (not (standard_is_multifamily_high_rise_specific) and standards_meet_or_exceed_2006_iecc)))\
      \ and standards_are_cost_effective_on_life_cycle_cost_basis"
- name: covered_housing_subject_to_default_code_standard
  kind: derived
  entity: HousingProject
  dtype: Judgment
  period: Year
  source: 42 U.S.C. 12709(b)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us/statute/42/12709
          excerpt: If the Secretaries have not, by September 30, 2006, established
            energy efficiency standards under subsection (a)
      - path: versions[0].formula
        kind: predicate
        source:
          corpus_citation_path: us/statute/42/12709
          excerpt: all new construction and rehabilitation of housing specified in
            such subsection shall meet the requirements of the 2006 IECC
      - path: versions[0].formula
        kind: predicate
        source:
          corpus_citation_path: us/statute/42/12709
          excerpt: "or, in the case of multifamily high rises, the requirements of ASHRAE Standard 90.1–2004"
  versions:
  - effective_from: '2006-09-30'
    formula: "secretaries_have_not_established_energy_efficiency_standards_by_statutory_deadline\
      \ and housing_is_new_construction_or_rehabilitation_specified_in_subsection_a\
      \ and ((((standard_is_multifamily_high_rise_specific) and housing_meets_ashrae_standard_90_1_2004)\n\
      \  or (not (standard_is_multifamily_high_rise_specific) and housing_meets_2006_iecc)))"
- name: revised_standards_amendment_required
  kind: derived
  entity: HousingProject
  dtype: Judgment
  period: Year
  source: 42 U.S.C. 12709(c)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us/statute/42/12709
          excerpt: "If the requirements of the 2006 IECC, or, in the case of multifamily high rises, ASHRAE Standard 90.1–2004, are revised at any time"
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us/statute/42/12709
          excerpt: "unless the Secretaries determine that compliance with such revised code or standard would not result in a significant increase in energy efficiency or would not be technologically feasible or economically justified"
  versions:
  - effective_from: '2006-09-30'
    formula: 'code_or_standard_requirements_are_revised

      and not secretaries_determine_revised_code_or_standard_would_not_significantly_increase_energy_efficiency

      and not secretaries_determine_revised_code_or_standard_would_not_be_technologically_feasible

      and not secretaries_determine_revised_code_or_standard_would_not_be_economically_justified'
