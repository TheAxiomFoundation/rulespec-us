- name: initial standards satisfy iecc path
  period:
    period_kind: custom
    name: calendar_year
    start: '2024-01-01'
    end: '2024-12-31'
  input:
    us:statutes/42/12709#input.housing_is_multifamily_high_rise: false
    us:statutes/42/12709#input.standards_meet_or_exceed_2006_iecc: true
    us:statutes/42/12709#input.standards_meet_or_exceed_ashrae_standard_90_1_2004: false
    us:statutes/42/12709#input.standards_are_cost_effective_on_life_cycle_cost_basis: true
  output:
    us:statutes/42/12709#standard_is_multifamily_high_rise_specific: not_holds
    us:statutes/42/12709#initial_energy_efficiency_standards_satisfy_required_code_and_cost_effectiveness: holds
- name: initial standards fail multifamily high rise ashrae requirement
  period:
    period_kind: custom
    name: calendar_year
    start: '2024-01-01'
    end: '2024-12-31'
  input:
    us:statutes/42/12709#input.housing_is_multifamily_high_rise: true
    us:statutes/42/12709#input.standards_meet_or_exceed_2006_iecc: true
    us:statutes/42/12709#input.standards_meet_or_exceed_ashrae_standard_90_1_2004: false
    us:statutes/42/12709#input.standards_are_cost_effective_on_life_cycle_cost_basis: true
  output:
    us:statutes/42/12709#standard_is_multifamily_high_rise_specific: holds
    us:statutes/42/12709#initial_energy_efficiency_standards_satisfy_required_code_and_cost_effectiveness: not_holds
- name: default code standard applies when standards not timely established
  period:
    period_kind: custom
    name: calendar_year
    start: '2024-01-01'
    end: '2024-12-31'
  input:
    us:statutes/42/12709#input.housing_is_multifamily_high_rise: false
    us:statutes/42/12709#input.secretaries_have_not_established_energy_efficiency_standards_by_statutory_deadline: true
    us:statutes/42/12709#input.housing_is_new_construction_or_rehabilitation_specified_in_subsection_a: true
    us:statutes/42/12709#input.housing_meets_2006_iecc: true
    us:statutes/42/12709#input.housing_meets_ashrae_standard_90_1_2004: false
  output:
    us:statutes/42/12709#covered_housing_subject_to_default_code_standard: holds
- name: revised standards amendment blocked by technological feasibility determination
  period:
    period_kind: custom
    name: calendar_year
    start: '2024-01-01'
    end: '2024-12-31'
  input:
    us:statutes/42/12709#input.code_or_standard_requirements_are_revised: true
    ? us:statutes/42/12709#input.secretaries_determine_revised_code_or_standard_would_not_significantly_increase_energy_efficiency
    : false
    us:statutes/42/12709#input.secretaries_determine_revised_code_or_standard_would_not_be_technologically_feasible: true
    us:statutes/42/12709#input.secretaries_determine_revised_code_or_standard_would_not_be_economically_justified: false
  output:
    us:statutes/42/12709#revised_standards_amendment_required: not_holds
- name: auto_positive_revised_standards_amendment_required
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    us:statutes/42/12709#input.code_or_standard_requirements_are_revised: true
    us:statutes/42/12709#input.secretaries_determine_revised_code_or_standard_would_not_be_economically_justified: false
    us:statutes/42/12709#input.secretaries_determine_revised_code_or_standard_would_not_be_technologically_feasible: false
    ? us:statutes/42/12709#input.secretaries_determine_revised_code_or_standard_would_not_significantly_increase_energy_efficiency
    : false
  output:
    us:statutes/42/12709#revised_standards_amendment_required: holds
