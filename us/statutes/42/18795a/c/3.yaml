format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/18795a/c/3
  summary: |-
    Rebate amounts under a high-efficiency electric home rebate program for qualified electrification project purchases are capped at specified dollar amounts for appliance upgrades, nonappliance upgrades, and at $14,000 total for an eligible entity receiving multiple rebates.
  deferred_outputs:
    - output: us:statutes/42/18795a/c/3#high_efficiency_electric_home_rebate_program_rebate_amount
      reason: |-
        The source states per-item and total maximum rebate caps, but computing a final rebate amount requires representing the eligible entity, the qualified electrification project, whether the purchase is an appliance or nonappliance upgrade of each listed type, multiple rebates received under the section, and the uncapped rebate otherwise provided by the program. Those project/entity/rebate relations are outside the current encoded surface.
      source_values:
        - us:statutes/42/18795a/c/3#heat_pump_water_heater_rebate_cap
        - us:statutes/42/18795a/c/3#heat_pump_space_heating_or_cooling_rebate_cap
        - us:statutes/42/18795a/c/3#electric_stove_cooktop_range_oven_or_heat_pump_clothes_dryer_rebate_cap
        - us:statutes/42/18795a/c/3#electric_load_service_center_upgrade_rebate_cap
        - us:statutes/42/18795a/c/3#insulation_air_sealing_and_ventilation_rebate_cap
        - us:statutes/42/18795a/c/3#electric_wiring_rebate_cap
        - us:statutes/42/18795a/c/3#eligible_entity_multiple_rebate_total_cap
rules:
  - name: heat_pump_water_heater_rebate_cap
    kind: parameter
    dtype: Money
    unit: USD
    source: 42 USC 18795a(c)(3)(A)(i)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/42/18795a/c/3
              excerpt: "not more than $1,750 for a heat pump water heater"
    versions:
      - effective_from: '2022-08-16'
        formula: |-
          1750

