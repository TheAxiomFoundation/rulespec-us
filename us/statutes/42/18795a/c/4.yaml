format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/18795a/c/4
  summary: |-
    A rebate provided using funding under this section shall not exceed 50 percent or 100 percent of the cost of the qualified electrification project, depending on the eligible entity described in subsection (d)(1)(A), (B), or (C), household income relative to area median income, and multifamily resident-income share.
rules:
  - name: household_income_lower_bound_for_partial_project_cost_rebate
    kind: parameter
    dtype: Rate
    source: 42 USC 18795a(c)(4)(A)(i), (B)(i), (C)(i)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/42/18795a/c/4
              excerpt: "not less than 80 percent"
    versions:
      - effective_from: '2022-08-16'
        formula: |-
          0.80

  - name: household_income_upper_bound_for_partial_project_cost_rebate
    kind: parameter
    dtype: Rate
    source: 42 USC 18795a(c)(4)(A)(i), (B)(i), (C)(i)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/42/18795a/c/4
              excerpt: "not greater than 150 percent of the area median income"
    versions:
      - effective_from: '2022-08-16'
        formula: |-
          1.50

  - name: household_income_upper_bound_for_full_project_cost_rebate
    kind: parameter
    dtype: Rate
    source: 42 USC 18795a(c)(4)(A)(ii), (B)(ii), (C)(ii)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/42/18795a/c/4
              excerpt: "less than 80 percent of the area median income"
    versions:
      - effective_from: '2022-08-16'
        formula: |-
          0.80

  - name: multifamily_resident_share_threshold_for_project_cost_rebate
    kind: parameter
    dtype: Rate
    source: 42 USC 18795a(c)(4)(B)(i)-(ii)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/42/18795a/c/4
              excerpt: "not less than 50 percent of the residents"
    versions:
      - effective_from: '2022-08-16'
        formula: |-
          0.50

  - name: partial_project_cost_rebate_cap_rate
    kind: parameter
    dtype: Rate
    source: 42 USC 18795a(c)(4)(A)(i), (B)(i), (C)(i)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/42/18795a/c/4
              excerpt: "50 percent of the cost of the qualified electrification project"
    versions:
      - effective_from: '2022-08-16'
        formula: |-
          0.50

  - name: full_project_cost_rebate_cap_rate
    kind: parameter
    dtype: Rate
    source: 42 USC 18795a(c)(4)(A)(ii), (B)(ii), (C)(ii)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/42/18795a/c/4
              excerpt: "100 percent of the cost of the qualified electrification project"
    versions:
      - effective_from: '2022-08-16'
        formula: |-
          1.00

  - name: project_cost_rebate_cap_rate
    kind: derived
    entity: Payment
    dtype: Rate
    period: Year
    source: 42 USC 18795a(c)(4)(A)-(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/18795a/c/4
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/42/18795a/c/4#household_income_lower_bound_for_partial_project_cost_rebate
              output: household_income_lower_bound_for_partial_project_cost_rebate
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/42/18795a/c/4#household_income_upper_bound_for_partial_project_cost_rebate
              output: household_income_upper_bound_for_partial_project_cost_rebate
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/42/18795a/c/4#household_income_upper_bound_for_full_project_cost_rebate
              output: household_income_upper_bound_for_full_project_cost_rebate
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/42/18795a/c/4#multifamily_resident_share_threshold_for_project_cost_rebate
              output: multifamily_resident_share_threshold_for_project_cost_rebate
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/42/18795a/c/4#partial_project_cost_rebate_cap_rate
              output: partial_project_cost_rebate_cap_rate
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/42/18795a/c/4#full_project_cost_rebate_cap_rate
              output: full_project_cost_rebate_cap_rate
              hash: sha256:local
    versions:
      - effective_from: '2022-08-16'
        formula: |-
          if eligible_entity_described_in_subsection_d_1_A and household_annual_income >= household_income_lower_bound_for_partial_project_cost_rebate * area_median_income and household_annual_income <= household_income_upper_bound_for_partial_project_cost_rebate * area_median_income: partial_project_cost_rebate_cap_rate else: if eligible_entity_described_in_subsection_d_1_A and household_annual_income < household_income_upper_bound_for_full_project_cost_rebate * area_median_income: full_project_cost_rebate_cap_rate else: if eligible_entity_described_in_subsection_d_1_B and multifamily_resident_share_households_income_not_less_than_80_percent_and_not_greater_than_150_percent_area_median_income >= multifamily_resident_share_threshold_for_project_cost_rebate: partial_project_cost_rebate_cap_rate else: if eligible_entity_described_in_subsection_d_1_B and multifamily_resident_share_households_income_less_than_80_percent_area_median_income >= multifamily_resident_share_threshold_for_project_cost_rebate: full_project_cost_rebate_cap_rate else: if eligible_entity_described_in_subsection_d_1_C and eligible_entity_working_on_behalf_of_household and household_annual_income >= household_income_lower_bound_for_partial_project_cost_rebate * area_median_income and household_annual_income <= household_income_upper_bound_for_partial_project_cost_rebate * area_median_income: partial_project_cost_rebate_cap_rate else: if eligible_entity_described_in_subsection_d_1_C and eligible_entity_working_on_behalf_of_household and household_annual_income < household_income_upper_bound_for_full_project_cost_rebate * area_median_income: full_project_cost_rebate_cap_rate else: 0

  - name: project_cost_rebate_cap
    kind: derived
    entity: Payment
    dtype: Money
    period: Year
    unit: USD
    source: 42 USC 18795a(c)(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/18795a/c/4
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/42/18795a/c/4#project_cost_rebate_cap_rate
              output: project_cost_rebate_cap_rate
              hash: sha256:local
    versions:
      - effective_from: '2022-08-16'
        formula: |-
          project_cost_rebate_cap_rate * max(0, qualified_electrification_project_cost)
