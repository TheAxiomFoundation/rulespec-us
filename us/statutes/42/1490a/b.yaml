format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/1490a/b
  summary: |-
    Housing and related facilities provided with loans described in subsection (a) shall be located in rural areas; eligible applicants shall include otherwise qualified nonrural residents who will become rural residents.
rules:
  - name: subsection_a_loan_housing_location_requirement_satisfied
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: 42 USC 1490a(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/42/1490a/b
              excerpt: "Housing and related facilities provided with loans described in subsection (a) shall be located in rural areas"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not housing_or_related_facilities_provided_with_loans_described_in_subsection_a
          or housing_or_related_facilities_located_in_rural_areas

  - name: nonrural_resident_included_in_eligible_applicant_or_occupant_class
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 42 USC 1490a(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us/statute/42/1490a/b
              excerpt: "shall include otherwise qualified nonrural residents who will become rural residents"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_otherwise_qualified_nonrural_resident_who_will_become_rural_resident
          and person_is_applicant_or_occupancy_candidate_for_source_listed_loan_or_housing
