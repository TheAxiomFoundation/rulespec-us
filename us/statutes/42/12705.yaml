format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/12705
  summary: |-
    The Secretary provides assistance directly to a jurisdiction only if it submits a comprehensive housing affordability strategy, submits annual updates, and the strategy and updates are approved. Subsection (b) specifies required contents of a housing strategy. Subsection (c) requires approval within stated review periods unless specified defects are found, and deems approval if written reasons for disapproval are not timely provided. Subsection (g) requires a CHAS for a State or local government containing any troubled public housing agency to describe assistance to that agency.
  deferred_outputs:
    - output: us:statutes/42/12705/b#housing_strategy_content_requirements_satisfied
      reason: Subsection (b) is a broad document-content checklist with cross-referenced statutory program terms and missing section 106/119 displacement mechanics; defer the full document-content compliance surface rather than approximating it.
      source_values:
        - us:statutes/42/12705#housing_needs_projection_period_years
        - us:statutes/42/12705#annual_use_plan_minimum_period_years
rules:
  - name: housing_needs_projection_period_years
    kind: parameter
    dtype: Count
    source: 42 USC 12705(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/12705
              excerpt: "estimated housing needs projected for the ensuing 5-year period"
    versions:
      - effective_from: '1994-01-01'
        formula: |-
          5

  - name: annual_use_plan_minimum_period_years
    kind: parameter
    dtype: Count
    source: 42 USC 12705(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/12705
              excerpt: "during the ensuing year or such longer period as the Secretary determines"
    versions:
      - effective_from: '1994-01-01'
        formula: |-
          1

  - name: initial_review_period_days
    kind: parameter
    dtype: Count
    source: 42 USC 12705(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/12705
              excerpt: "Not later than 60 days after receipt by the Secretary"
    versions:
      - effective_from: '1994-01-01'
        formula: |-
          60

  - name: temporary_review_extension_period_months
    kind: parameter
    dtype: Count
    source: 42 USC 12705(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/12705
              excerpt: "During the 18-month period following November 28, 1990"
    versions:
      - effective_from: '1994-01-01'
        formula: |-
          18

  - name: temporary_extended_review_period_days
    kind: parameter
    dtype: Count
    source: 42 USC 12705(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/12705
              excerpt: "extend the review period to not longer than 90 days"
    versions:
      - effective_from: '1994-01-01'
        formula: |-
          90

  - name: disapproval_reasons_notice_period_days
    kind: parameter
    dtype: Count
    source: 42 USC 12705(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/12705
              excerpt: "Not later than 15 days after the Secretary's disapproval"
    versions:
      - effective_from: '1994-01-01'
        formula: |-
          15

  - name: amendment_resubmission_period_minimum_days
    kind: parameter
    dtype: Count
    source: 42 USC 12705(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/12705
              excerpt: "for a period of not less than 45 days following the date of first disapproval"
    versions:
      - effective_from: '1994-01-01'
        formula: |-
          45

  - name: amendment_review_wait_days
    kind: parameter
    dtype: Count
    source: 42 USC 12705(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/12705
              excerpt: "not less than 30 days after receipt of such amendments or resubmission"
    versions:
      - effective_from: '1994-01-01'
        formula: |-
          30

  - name: housing_strategy_deemed_approved_after_untimely_disapproval_reasons
    kind: derived
    entity: Jurisdiction
    dtype: Judgment
    period: Year
    source: 42 USC 12705(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/12705
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/42/12705#disapproval_reasons_notice_period_days
              output: disapproval_reasons_notice_period_days
              hash: sha256:local
    versions:
      - effective_from: '1994-01-01'
        formula: |-
          secretary_disapproved_housing_strategy
          and days_after_secretary_disapproval_without_written_reasons > disapproval_reasons_notice_period_days

  - name: housing_strategy_approval_required_absent_stated_defects
    kind: derived
    entity: Jurisdiction
    dtype: Judgment
    period: Year
    source: 42 USC 12705(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/12705
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/42/12705#initial_review_period_days
              output: initial_review_period_days
              hash: sha256:local
    versions:
      - effective_from: '1994-01-01'
        formula: |-
          housing_strategy_received_by_secretary
          and days_after_secretary_receipt >= initial_review_period_days
          and not secretary_determined_strategy_inconsistent_with_act_purposes
          and not secretary_determined_subsection_b_information_not_substantially_complete

  - name: chas_complies_with_troubled_public_housing_agency_requirement
    kind: derived
    entity: Jurisdiction
    dtype: Judgment
    period: Year
    source: 42 USC 12705(g)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/12705
    versions:
      - effective_from: '1994-01-01'
        formula: |-
          not troubled_public_housing_agency_located_in_state_or_unit
          or chas_includes_description_of_assistance_to_troubled_public_housing_agency
