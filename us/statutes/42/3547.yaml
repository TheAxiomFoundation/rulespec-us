format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/3547
  summary: |-
    The Secretary may provide for release of funds for particular special projects if a designated State or unit of general local government assumes environmental review responsibilities. The Secretary shall approve release only if, not less than 15 days before approval and before commitment of funds, the recipient submits a request accompanied by a certification meeting paragraph (3).
rules:
  - name: release_request_minimum_days_before_approval
    kind: parameter
    dtype: Count
    source: 42 USC 3547(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/3547
              excerpt: "not less than 15 days prior to such approval"
    versions:
      - effective_from: '1961-01-01'
        formula: |-
          15

  - name: certification_meets_environmental_review_assumption_requirements
    kind: derived
    entity: HudSpecialProject
    dtype: Judgment
    period: Day
    source: 42 USC 3547(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us/statute/42/3547
    versions:
      - effective_from: '1961-01-01'
        formula: |-
          certification_form_acceptable_to_secretary
          and certification_executed_by_qualified_state_or_local_officer
          and certification_specifies_state_or_local_government_fully_carried_out_assumed_responsibilities
          and certifying_officer_consents_to_responsible_federal_official_status
          and certifying_officer_authorized_and_consents_to_federal_court_jurisdiction

  - name: release_approval_prerequisites_satisfied
    kind: derived
    entity: HudSpecialProject
    dtype: Judgment
    period: Day
    source: 42 USC 3547(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/42/3547
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/42/3547#release_request_minimum_days_before_approval
              output: release_request_minimum_days_before_approval
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/42/3547#certification_meets_environmental_review_assumption_requirements
              output: certification_meets_environmental_review_assumption_requirements
              hash: sha256:local
    versions:
      - effective_from: '1961-01-01'
        formula: |-
          project_subject_to_procedures_authorized_by_this_section
          and days_between_release_request_submission_and_approval >= release_request_minimum_days_before_approval
          and release_request_submitted_before_commitment_of_funds
          and certification_meets_environmental_review_assumption_requirements

  - name: state_approval_actions_satisfy_secretary_release_responsibilities_when_permitted
    kind: derived
    entity: HudSpecialProject
    dtype: Judgment
    period: Day
    source: 42 USC 3547(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/42/3547
    versions:
      - effective_from: '1961-01-01'
        formula: |-
          unit_of_general_local_government_carries_out_assumed_environmental_review_responsibilities
          and secretary_permits_state_to_perform_release_approval_actions
          and state_performs_release_approval_actions_described_in_paragraph_2
