        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/5306
              excerpt: "of the amount approved in appropriation Acts under section 5303 ... reserve for grants to Indian tribes 1 percent"
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/42/5306#indian_tribe_reserve_rate
              output: indian_tribe_reserve_rate
              hash: sha256:local
    versions:
