format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/5306
  summary: |-
    For each fiscal year, the Secretary reserves 1 percent for Indian tribes and $7,000,000 for insular areas, then allocates 70 percent of the remaining amount to metropolitan cities and urban counties and 30 percent among States for nonentitlement areas. The section also states weighted allocation formulas, reallocation limits, disaster-assistance limits, State administrative and technical-assistance caps, and pro rata entitlement adjustments.
  deferred_outputs:
    - output: us:statutes/42/5306/b#metropolitan_city_or_urban_county_basic_amount
      reason: Computation requires population, poverty, overcrowding, growth lag, age-of-housing measures, urban county exclusions, consolidation rules, and section 5302 definition composition for metropolitan cities and urban counties.
    - output: us:statutes/42/5306/c#reallocated_undistributed_funds_grant
      reason: Reallocation depends on failure or action mechanics under sections 5304, 5311, metropolitan-area certification, award history, disaster declaration facts, and emergency community-development need determinations that are outside this executable surface; section 5311 context is unavailable.
    - output: us:statutes/42/5306/d#state_nonentitlement_area_allocation
      reason: State allocation and distribution require population, poverty, overcrowding, age-of-housing measures for nonentitlement areas, State elections and certifications, unit certifications, and unavailable cross-referenced grant-administration mechanics.
rules:
