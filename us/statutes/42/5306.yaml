  - name: entitlement_amount_after_pro_rata_adjustment
    kind: derived
    entity: CommunityDevelopmentFiscalYear
    dtype: Money
    unit: USD
    period: Year
    source: 42 USC 5306(f)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/5306
              excerpt: "pro rata reduction of all amounts determined under subsection (b)"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/5306
              excerpt: "pro rata increase of all amounts determined under subsection (b)"
    versions:
      - effective_from: '1974-01-01'
        formula: |-
          if total_amount_available_for_metropolitan_distribution < total_entitlement_amounts_determined_under_subsection_b:
            amount_determined_under_subsection_b * total_amount_available_for_metropolitan_distribution / total_entitlement_amounts_determined_under_subsection_b
          else:
            if total_amount_available_for_metropolitan_distribution > total_entitlement_amounts_determined_under_subsection_b:
              amount_determined_under_subsection_b * total_amount_available_for_metropolitan_distribution / total_entitlement_amounts_determined_under_subsection_b
            else:
              amount_determined_under_subsection_b
