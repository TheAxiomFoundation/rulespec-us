            kind: definition
            source:
              corpus_citation_path: us/statute/42/416/l/2
              excerpt: "The term \"early retirement age\" means age 62 in the case of an old-age"
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/42/416/l#old_age_early_retirement_age_years
              output: old_age_early_retirement_age_years
              hash: sha256:local
