format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/416/l
  summary: |-
    Retirement age is 65 for old-age claimants who attain early retirement age before 2000, rises by 2 months for each early-retirement-age year 2000 through 2004, is 66 for early-retirement-age years 2005 through 2016, rises by 2 months for each early-retirement-age year 2017 through 2021, and is 67 thereafter. For old-age benefits, early retirement age is 62, so this maps to birth years before 1938, 1938-1942, 1943-1954, 1955-1959, and 1960 or later.
rules:
  - name: old_age_early_retirement_age_years
    kind: parameter
    dtype: Integer
    unit: years
    source: 42 USC 416(l)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/42/416/l/2
              excerpt: "age 62 in the case of an old-age"
    versions:
      - effective_from: '1983-04-20'
        formula: |-
          62
  - name: months_per_retirement_age_year
    kind: parameter
    dtype: Integer
    unit: months
    source: 42 USC 416(l)(1); SSA age-increase factor is stated in twelfths of a year of months
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/416/l/3
              excerpt: "two-twelfths of the number of months in the period beginning with January 2000 and ending with December"
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/guidance/ssa/cola/2026/federal-register/block-1
              excerpt: "are exactly 12 times the monthly"
    versions:
      - effective_from: '1983-04-20'
        formula: |-
          12
  - name: retirement_age_increase_months_per_transition_year
    kind: parameter
    dtype: Integer
    unit: months
    source: 42 USC 416(l)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
