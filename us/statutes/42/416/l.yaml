    versions:
      - effective_from: '1983-04-20'
        formula: |-
          if old_age_early_retirement_age_calendar_year < retirement_age_tier_two_start_year: retirement_age_tier_one_years * months_per_retirement_age_year else: if old_age_early_retirement_age_calendar_year <= retirement_age_tier_two_end_year: retirement_age_tier_one_years * months_per_retirement_age_year + retirement_age_increase_months_per_transition_year * (old_age_early_retirement_age_calendar_year - (retirement_age_tier_two_start_year - 1)) else: if old_age_early_retirement_age_calendar_year < retirement_age_tier_four_start_year: retirement_age_tier_three_years * months_per_retirement_age_year else: if old_age_early_retirement_age_calendar_year <= retirement_age_tier_four_end_year: retirement_age_tier_three_years * months_per_retirement_age_year + retirement_age_increase_months_per_transition_year * (old_age_early_retirement_age_calendar_year - (retirement_age_tier_four_start_year - 1)) else: retirement_age_tier_five_years * months_per_retirement_age_year
