format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/1437u
  summary: |-
    42 USC 1437u establishes the Family Self-Sufficiency program; defines eligible families and entities; requires contracts of participation, supportive services, escrow accounts, coordinating committees, action plans, reports, and awards; and states definitions for eligible entity, eligible family, and participating family.
  deferred_outputs:
    - output: us:statutes/42/1437u/a#purpose
      reason: Purpose clause is non-operative and does not define a computable eligibility, amount, threshold, or condition.
    - output: us:statutes/42/1437u/c#eligible_family
      reason: Eligibility depends on assistance, residence, and housing assistance categories under missing cited sections 42 USC 1437f and 42 USC 1437g.
    - output: us:statutes/42/1437u/g#program_coordinating_committee_requirements
      reason: Administrative committee formation and consultation duties are not a computable benefit, amount, or eligibility surface in the supported RuleSpec ontology.
    - output: us:statutes/42/1437u/h#action_plan_requirements
      reason: Administrative action-plan submission, consultation, and content requirements are not a computable benefit, amount, or eligibility surface in the supported RuleSpec ontology.
    - output: us:statutes/42/1437u/j#onsite_facilities_use
      reason: Discretionary use of common areas or unoccupied units subject to Secretarial approval is an administrative permission surface outside the supported executable ontology.
    - output: us:statutes/42/1437u/k#local_program_flexibility
      reason: General flexibility directive to the Secretary is non-computational and does not define a determinate output.
    - output: us:statutes/42/1437u/l#privately_owned_project_based_assistance_programs
      reason: Voluntary owner programs and cooperative agreements depend on project-based assistance categories under missing cited section 42 USC 1437f.
    - output: us:statutes/42/1437u/m#reports
      reason: Reporting duties to the Secretary and Congress are administrative obligations outside the supported executable ontology.
    - output: us:statutes/42/1437u/o#eligible_entity
      reason: Definition cross-references subsection (c)(2), which depends on missing cited sections 42 USC 1437f and 42 USC 1437g.
    - output: us:statutes/42/1437u/o#eligible_family
      reason: Definition cross-references subsection (c)(1), which depends on missing cited sections 42 USC 1437f and 42 USC 1437g.
    - output: us:statutes/42/1437u/o#participating_family
      reason: Definition depends on the deferred eligible-family definition and participation in the program.
rules:
  - name: mandatory_program_reduction_per_completed_contract_family
    kind: parameter
    dtype: Count
    source: 42 USC 1437u(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/42/1437u
              excerpt: "shall be decreased by 1 for each family"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          1

  - name: mandatory_local_program_required_family_count
    kind: derived
    entity: PublicHousingAgency
    dtype: Count
    period: Year
    source: 42 USC 1437u(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/1437u
              excerpt: "at a minimum, the number of families the agency was required to serve on May 24, 2018"
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/42/1437u#mandatory_program_reduction_per_completed_contract_family
              output: mandatory_program_reduction_per_completed_contract_family
              hash: sha256:local
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          max(0, required_families_to_serve_on_relevant_prior_date - (families_after_relevant_date_that_fulfilled_contract_obligations * mandatory_program_reduction_per_completed_contract_family))

  - name: mandatory_program_feasibility_exception_applies
    kind: derived
    entity: PublicHousingAgency
    dtype: Judgment
    period: Year
    source: 42 USC 1437u(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/42/1437u
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          public_housing_agency_requests_not_to_carry_out_mandatory_program
          and secretary_determines_implementation_not_feasible_because_of_local_circumstances

  - name: contract_completion_deadline_years_after_first_recertification
    kind: parameter
    dtype: Count
    source: 42 USC 1437u(d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/42/1437u
              excerpt: "not later than 5 years after the first recertification of income"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          5

  - name: contract_extension_required
    kind: derived
    entity: Family
    dtype: Judgment
    period: Year
    source: 42 USC 1437u(d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us/statute/42/1437u
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          family_requests_contract_extension
          and eligible_entity_finds_good_cause_for_extension

  - name: housing_assistance_may_be_terminated_for_contract_result
    kind: derived
    entity: Family
    dtype: Judgment
    period: Year
    source: 42 USC 1437u(d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us/statute/42/1437u
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          false

  - name: escrow_adjusted_income_limit_rate
    kind: parameter
    dtype: Rate
    source: 42 USC 1437u(e)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/42/1437u
              excerpt: "adjusted income exceeds 80 percent of the area median income"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          0.80

  - name: family_income_at_or_below_escrow_limit
    kind: derived
    entity: Family
    dtype: Judgment
    period: Year
    source: 42 USC 1437u(e)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/1437u
              excerpt: "80 percent of the area median income"
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/42/1437u#escrow_adjusted_income_limit_rate
              output: escrow_adjusted_income_limit_rate
              hash: sha256:local
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          adjusted_income <= area_median_income * escrow_adjusted_income_limit_rate

  - name: secretary_may_escrow_amounts_for_family
    kind: derived
    entity: Family
    dtype: Judgment
    period: Year
    source: 42 USC 1437u(e)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/42/1437u
              excerpt: "shall not escrow any amounts for any family whose adjusted income exceeds 80 percent"
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/42/1437u#family_income_at_or_below_escrow_limit
              output: family_income_at_or_below_escrow_limit
              hash: sha256:local
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          family_income_at_or_below_escrow_limit

  - name: coordinator_base_award_participant_threshold
    kind: parameter
    dtype: Count
    source: 42 USC 1437u(i)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/42/1437u
              excerpt: "serving 25 or more participants"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          25

  - name: coordinator_additional_award_initial_family_threshold
    kind: parameter
    dtype: Count
    source: 42 USC 1437u(i)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/42/1437u
              excerpt: "75 or more participating families"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          75

  - name: coordinator_additional_award_family_increment
    kind: parameter
    dtype: Count
    source: 42 USC 1437u(i)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/42/1437u
              excerpt: "for each additional 50 participating families"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          50

  - name: innovation_and_high_performance_reserve_limit_rate
    kind: parameter
    dtype: Rate
    source: 42 USC 1437u(i)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/42/1437u
              excerpt: "reserve up to 5 percent"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          0.05

  - name: eligible_for_base_coordinator_award
    kind: derived
    entity: EligibleEntity
    dtype: Judgment
    period: Year
    source: 42 USC 1437u(i)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/1437u
              excerpt: "serving 25 or more participants"
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/42/1437u#coordinator_base_award_participant_threshold
              output: coordinator_base_award_participant_threshold
              hash: sha256:local
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          family_self_sufficiency_participant_count >= coordinator_base_award_participant_threshold

  - name: eligible_for_additional_coordinator_award
    kind: derived
    entity: EligibleEntity
    dtype: Judgment
    period: Year
    source: 42 USC 1437u(i)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/1437u
              excerpt: "meets performance standards set by the Secretary"
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/42/1437u#coordinator_additional_award_initial_family_threshold
              output: coordinator_additional_award_initial_family_threshold
              hash: sha256:local
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          entity_meets_secretary_performance_standards
          and participating_family_count >= coordinator_additional_award_initial_family_threshold
