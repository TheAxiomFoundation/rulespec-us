format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/1397jj/c/1
  summary: |-
    The term "child" means an individual under 19 years of age.
rules:
  - name: child_age_limit
    kind: parameter
    dtype: Count
    source: 42 USC 1397jj(c)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/1397jj/c/1
              excerpt: under 19 years of age
    versions:
      - effective_from: '1974-01-01'
        formula: |-
          19

  - name: child
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: 42 USC 1397jj(c)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/statute/42/1397jj/c/1
    versions:
      - effective_from: '1974-01-01'
        formula: |-
          age < child_age_limit
