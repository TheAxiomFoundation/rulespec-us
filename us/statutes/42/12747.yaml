format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/12747/b
    source_sha256: 98f53004f27f25413d1a144a0f3daa64965f5cc5cdee05806832aaf7a5da7e0f
  summary: |-
    Formula allocation: the Secretary shall establish by regulation an allocation formula reflecting each jurisdiction's share of total need; State allocations use 20 percent whole-State need and 80 percent need among non-direct-allocation local governments. Data must be from a standard source available 90 days before the fiscal year. Minimum State allocation is $3,000,000, with a $500,000 increase if no local government receives an allocation. Local allocation threshold is $500,000, reduced to $335,000 when appropriations pursuant to section 12724 are less than $1,500,000,000.
  deferred_outputs:
    - output: us:statutes/42/12747/b#regulated_formula_allocation
      reason: The basic allocation formula requires Secretary-established regulation, objective need measures, fiscal incapacity measures, and unresolved cross-references to sections 12742 and 12746.
    - output: us:statutes/42/12747/b#state_allocation_after_minimums_and_prorations
      reason: The final State allocation requires applying the full Secretary formula and pro rata deductions across other States and local governments, which are outside this source slice and depend on unresolved allocation populations.
    - output: us:statutes/42/12747/b#local_government_initial_allocation
      reason: The local allocation requires formula allocations, successive recalculations, qualifying status under section 12746(2), and consortium renewal facts not encoded in this source slice.
rules:
  - name: whole_state_need_weight
    kind: parameter
    dtype: Rate
    source: 42 USC 12747(b)(1)(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/12747/b
              excerpt: "giving 20 percent weight to measures of need for the whole State"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          0.20

  - name: non_direct_local_government_need_weight
    kind: parameter
    dtype: Rate
    source: 42 USC 12747(b)(1)(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/12747/b
              excerpt: "80 percent weight to measures of need among units of general local government that are not receiving an allocation under section 12746(1)"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          0.80

  - name: formula_allocation_data_availability_lead_days
    kind: parameter
    dtype: Count
    source: 42 USC 12747(b)(1)(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/12747/b
              excerpt: "available to the Secretary 90 days prior to the beginning of that fiscal year"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          90

  - name: formula_publication_submission_lead_days
    kind: parameter
    dtype: Count
    source: 42 USC 12747(b)(1)(F)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/42/12747/b
              excerpt: "Not less than 60 days prior to publishing a formula for comment"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          60

  - name: minimum_state_allocation
    kind: parameter
    dtype: Money
    unit: USD
    period: Year
    source: 42 USC 12747(b)(2)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/42/12747/b
              excerpt: "would allocate less than $3,000,000 to any State, the allocation for such State shall be $3,000,000"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          3000000

  - name: no_local_allocation_state_increase
    kind: parameter
    dtype: Money
    unit: USD
    period: Year
    source: 42 USC 12747(b)(2)(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/42/12747/b
              excerpt: "the State's allocation shall be increased by $500,000"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          500000

  - name: local_allocation_default_threshold
    kind: parameter
    dtype: Money
    unit: USD
    period: Year
    source: 42 USC 12747(b)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/42/12747/b
              excerpt: "jurisdictions that are allocated an amount of $500,000 or more"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          500000

  - name: local_allocation_reduced_threshold
    kind: parameter
    dtype: Money
    unit: USD
    period: Year
    source: 42 USC 12747(b)(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/42/12747/b
              excerpt: "substituting \"$335,000\" for \"$500,000\" where it appears in paragraph (3)"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          335000

  - name: threshold_reduction_appropriation_limit
    kind: parameter
    dtype: Money
    unit: USD
    period: Year
    source: 42 USC 12747(b)(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/42/12746
              excerpt: "If the amount appropriated pursuant to section 12724 of this title for any fiscal year is less than $1,500,000,000"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          1500000000

  - name: applicable_local_allocation_threshold
    kind: derived
    entity: HomeFormulaFiscalYear
    dtype: Money
    unit: USD
    period: Year
    source: 42 USC 12747(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/12747/b
              excerpt: "If the amount appropriated pursuant to section 12724 of this title for any fiscal year is less than $1,500,000,000, then this section shall be applied during that year by substituting \"$335,000\" for \"$500,000\" where it appears in paragraph (3)."
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          if amount_appropriated_pursuant_to_section_12724 < threshold_reduction_appropriation_limit: local_allocation_reduced_threshold else: local_allocation_default_threshold

  - name: state_allocation_after_basic_minimum
    kind: derived
    entity: StateAgency
    dtype: Money
    unit: USD
    period: Year
    source: 42 USC 12747(b)(2)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/12747/b
              excerpt: "If the formula ... would allocate less than $3,000,000 to any State, the allocation for such State shall be $3,000,000"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          max(formula_allocated_state_amount_before_minimum, minimum_state_allocation)

  - name: state_allocation_after_no_local_government_increase
    kind: derived
    entity: StateAgency
    dtype: Money
    unit: USD
    period: Year
    source: 42 USC 12747(b)(2)(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/12747/b
              excerpt: "If no unit of general local government within a State receives an allocation under paragraph (3), the State's allocation shall be increased by $500,000."
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          state_allocation_after_basic_minimum + (if no_unit_of_general_local_government_within_state_receives_allocation_under_paragraph_3: no_local_allocation_state_increase else: 0)
