format: rulespec/v1
module:
  status: deferred
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/3535
  summary: |-
    42 USC 3535(j) authorizes the Secretary to establish fees and charges against program beneficiaries and project participants adequate over the long run to cover specified service costs, and makes collected fees available for similar Department operating expenses. 42 USC 3535(k) authorizes acceptance and use of voluntary services, gifts, and bequests for Department work; treats accepted property as a gift or bequest to or for use of the United States for federal tax purposes; and provides Treasury fund, investment, income-crediting, and disbursement rules.
  deferred_outputs:
    - output: us:statutes/42/3535/j#fees_and_charges_authorization
      reason: 42 USC 3535(j) is an administrative authorization for HUD fee-setting and use of collected fees; the source does not provide a computable fee formula, beneficiary-level entitlement, or supported administrative accounting entity for executable RuleSpec encoding.
    - output: us:statutes/42/3535/k#gift_services_and_fund_administration
      reason: 42 USC 3535(k) governs acceptance, tax characterization, Treasury deposit, investment, income-crediting, and disbursement of gifts, bequests, and voluntary services; the supported schema lacks the necessary HUD gift/fund administration ontology for faithful executable encoding.
