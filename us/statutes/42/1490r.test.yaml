- name: assistance payment capped by rent formula
  period: 2024-01
  input:
    us:statutes/42/1490r#input.appropriation_act_approves_rural_housing_voucher_assistance: true
    us:statutes/42/1490r#input.family_or_person_is_very_low_income: true
    us:statutes/42/1490r#input.family_or_person_resides_or_will_reside_in_rental_housing_in_rural_area: true
    us:statutes/42/1490r#input.payment_standard_for_area: 1000
    us:statutes/42/1490r#input.family_monthly_adjusted_income: 1000
    us:statutes/42/1490r#input.dwelling_unit_rent_including_allowed_utilities: 900
    us:statutes/42/1490r#input.family_monthly_gross_income: 4000
  output:
    us:statutes/42/1490r#rural_housing_voucher_program_assistance_available: holds
    us:statutes/42/1490r#monthly_assistance_payment_before_rent_cap: 700
    us:statutes/42/1490r#monthly_assistance_payment_rent_cap: 500
    us:statutes/42/1490r#monthly_rural_housing_voucher_assistance_payment: 500
- name: assistance unavailable without appropriation approval
  period: 2024-01
  input:
    us:statutes/42/1490r#input.appropriation_act_approves_rural_housing_voucher_assistance: false
    us:statutes/42/1490r#input.family_or_person_is_very_low_income: true
    us:statutes/42/1490r#input.family_or_person_resides_or_will_reside_in_rental_housing_in_rural_area: true
    us:statutes/42/1490r#input.payment_standard_for_area: 1000
    us:statutes/42/1490r#input.family_monthly_adjusted_income: 1000
    us:statutes/42/1490r#input.dwelling_unit_rent_including_allowed_utilities: 900
    us:statutes/42/1490r#input.family_monthly_gross_income: 4000
  output:
    us:statutes/42/1490r#rural_housing_voucher_program_assistance_available: not_holds
    us:statutes/42/1490r#monthly_assistance_payment_before_rent_cap: 700
    us:statutes/42/1490r#monthly_assistance_payment_rent_cap: 500
    us:statutes/42/1490r#monthly_rural_housing_voucher_assistance_payment: 0
