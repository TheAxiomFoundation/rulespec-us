- name: adequate_dwelling_requires_decent_safe_and_sanitary
  period:
    period_kind: custom
    name: calendar_year
    start: '2024-01-01'
    end: '2024-12-31'
  input:
    us:statutes/42/1471#input.dwelling_unit_is_decent: true
    us:statutes/42/1471#input.dwelling_unit_is_safe: true
    us:statutes/42/1471#input.dwelling_unit_is_sanitary: true
  output:
    us:statutes/42/1471#adequate_dwelling: holds
- name: applicant_assistance_eligible_all_conditions_met
  period:
    period_kind: custom
    name: calendar_year
    start: '2024-01-01'
    end: '2024-12-31'
  input:
    ? us:statutes/42/1471#input.applicant_is_owner_of_farm_without_required_decent_safe_sanitary_dwelling_or_adequate_farm_buildings
    : true
    ? us:statutes/42/1471#input.applicant_is_owner_of_other_rural_real_estate_or_rural_resident_without_adequate_dwelling_related_facilities_or_adequate_farm_operation_buildings
    : false
    ? us:statutes/42/1471#input.applicant_is_elderly_or_handicapped_person_or_family_in_rural_area_without_adequate_dwelling_or_related_facility
    : false
    ? us:statutes/42/1471#input.applicant_is_owner_of_farm_or_other_rural_real_estate_needing_refinancing_of_indebtedness_described_in_subsection_a_clause_4
    : false
    us:statutes/42/1471#input.applicant_is_without_sufficient_resources_to_provide_necessary_housing_and_buildings: true
    ? us:statutes/42/1471#input.applicant_is_unable_to_secure_necessary_credit_from_other_sources_on_reasonably_fulfillable_terms
    : true
  output:
    us:statutes/42/1471#applicant_has_eligible_housing_or_refinancing_need: holds
    us:statutes/42/1471#applicant_meets_resource_and_credit_conditions: holds
    us:statutes/42/1471#applicant_assistance_eligible: holds
