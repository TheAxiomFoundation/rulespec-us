- name: farm_definition_holds_at_minimum_value
  period:
    period_kind: custom
    name: calendar_year
    start: '2024-01-01'
    end: '2024-12-31'
  input:
    us:statutes/42/1471#input.land_operated_as_single_unit: true
    us:statutes/42/1471#input.land_used_for_production_of_one_or_more_agricultural_commodities: true
    us:statutes/42/1471#input.land_customarily_produces_or_is_capable_of_producing_commodities_for_sale_and_home_use: true
    us:statutes/42/1471#input.gross_annual_value_equivalent_1944: 400
  output:
    us:statutes/42/1471#farm: holds
- name: farm_definition_fails_below_minimum_value
  period:
    period_kind: custom
    name: calendar_year
    start: '2024-01-01'
    end: '2024-12-31'
  input:
    us:statutes/42/1471#input.land_operated_as_single_unit: true
    us:statutes/42/1471#input.land_used_for_production_of_one_or_more_agricultural_commodities: true
    us:statutes/42/1471#input.land_customarily_produces_or_is_capable_of_producing_commodities_for_sale_and_home_use: true
