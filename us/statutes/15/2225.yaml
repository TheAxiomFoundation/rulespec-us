format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/15/2225
  summary: |-
    The section defines required smoke-detector and automatic-sprinkler contents for guidelines referred to in sections 2224 and 2226, provides sprinkler exceptions, preserves State and local fire-prevention authority, and defines "smoke detector," "automatic sprinkler system," and "governmental authority having jurisdiction."
rules:
  - name: sprinkler_height_exception_maximum_stories
    kind: parameter
    dtype: Count
    source: 15 USC 2225(a)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/statute/15/2225
              excerpt: "except those places that are 3 stories or lower"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          3

  - name: smoke_detector
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Day
    source: 15 USC 2225(d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/statute/15/2225
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          alarm_designed_to_respond_to_visible_or_invisible_particles_of_combustion

  - name: automatic_sprinkler_system
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Day
    source: 15 USC 2225(d)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/statute/15/2225
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          electronically_supervised_integrated_piping_system
          and sprinklers_attached_in_systematic_pattern
          and system_when_activated_by_heat_from_fire_protects_human_lives_by_discharging_water_over_fire_area
          and system_provides_required_warning_signals_through_building_fire_alarm_system

  - name: governmental_authority_having_jurisdiction
    kind: derived
    entity: GovernmentalAuthority
    dtype: Judgment
    period: Day
    source: 15 USC 2225(d)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/statute/15/2225
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          governmental_entity_has_statutory_or_regulatory_authority_for_approval_of_fire_safety_systems_equipment_installations_or_procedures_within_specified_locality

  - name: smoke_detector_guideline_requirement_satisfied
    kind: derived
    entity: PlaceOfPublicAccommodation
    dtype: Judgment
    period: Day
    source: 15 USC 2225(a)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/15/2225
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          place_of_public_accommodation_affecting_commerce
          and each_guest_room_has_hard_wired_single_station_smoke_detector_installed_in_accordance_with_nfpa_standard_74_or_successor

  - name: preexisting_sprinkler_system_exception_applies
    kind: derived
    entity: PlaceOfPublicAccommodation
    dtype: Judgment
    period: Day
    source: 15 USC 2225(b)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/15/2225
              excerpt: "installed before October 25, 1992"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          place_of_public_accommodation_affecting_commerce
          and automatic_sprinkler_system_installed_before_statutory_cutoff_date
          and automatic_sprinkler_system_complied_at_installation_with_applicable_jurisdictional_standard_requiring_sprinkler_head_in_sleeping_area_of_each_guest_room

  - name: conflicting_standard_specific_sprinkler_provision_exception_applies
    kind: derived
    entity: PlaceOfPublicAccommodation
    dtype: Judgment
    period: Day
    source: 15 USC 2225(b)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/15/2225
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          place_of_public_accommodation_affecting_commerce
          and place_subject_to_standard_with_requirement_or_prohibition_preventing_compliance_with_specific_nfpa_13_or_13r_or_successor_provision

  - name: automatic_sprinkler_guideline_requirement_satisfied
    kind: derived
    entity: PlaceOfPublicAccommodation
    dtype: Judgment
    period: Day
    source: 15 USC 2225(a)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/15/2225
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us/statute/15/2225
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          place_of_public_accommodation_affecting_commerce
          and place_story_count > sprinkler_height_exception_maximum_stories
          and automatic_sprinkler_system_installed_in_accordance_with_appropriate_nfpa_standard_13_or_13r_or_successor
          and not preexisting_sprinkler_system_exception_applies
          and not conflicting_standard_specific_sprinkler_provision_exception_applies
