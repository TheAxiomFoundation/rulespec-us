# Hand-computed July 2026 fixtures for the contiguous 48 states and DC.
# Runtime poverty-guideline inputs use the 2026 HHS values: $15,960 for a
# one-person household and $21,640 for two people. At a State ratio of 1.50,
# the annual limits are $23,940 and $32,460; the corresponding monthly limits
# are $1,995 and $2,705.
#
# Source for fixture inputs only:
# https://aspe.hhs.gov/topics/poverty-economic-mobility/poverty-guidelines

- name: age-59-fails-despite-zero-income
  period: 2026-07
  input:
    us:regulations/7-cfr/247/9/a#input.person_age: 59
    us:policies/usda/csfp/eligibility_pipeline#input.csfp_household_size: 1
    us:policies/usda/csfp/eligibility_pipeline#input.csfp_household_income: 0
    us:policies/usda/csfp/eligibility_pipeline#input.csfp_household_income_is_monthly: false
