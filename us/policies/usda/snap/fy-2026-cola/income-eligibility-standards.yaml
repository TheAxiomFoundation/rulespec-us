format: rulespec/v1
module:
  proof_validation:
    required: true
  summary: |-
    USDA SNAP FY 2026 income eligibility standards set monthly income limits
    effective October 1, 2025 through September 30, 2026. For the 48 states,
    District of Columbia, Guam, and Virgin Islands, the net monthly income
    limit at 100 percent of the federal poverty level is 1305, 1763, 2221,
    2680, 3138, 3596, 4055, and 4513 for household sizes 1 through 8, plus
    459 for each additional member. The gross monthly income limit at 130
    percent of the federal poverty level is 1696, 2292, 2888, 3483, 4079,
    4675, 5271, and 5867 for household sizes 1 through 8, plus 596 for each
    additional member. The gross monthly income limit where elderly or
    disabled members are a separate household at 165 percent of the federal
    poverty level is 2152, 2909, 3665, 4421, 5177, 5934, 6690, and 7446 for
    household sizes 1 through 8, plus 757 for each additional member.
  source_verification:
    corpus_citation_paths:
      - us/guidance/usda/fns/snap-fy2026-income-eligibility-standards/page-1
      - us/guidance/usda/fns/snap-fy2026-income-eligibility-standards/page-2
    values:
      snap_net_income_limit_100_percent_fpl_48_states_dc_table:
        1: 1305
        2: 1763
        3: 2221
        4: 2680
        5: 3138
        6: 3596
        7: 4055
        8: 4513
      snap_net_income_limit_100_percent_fpl_48_states_dc_additional_member: 459
      snap_gross_income_limit_130_percent_fpl_48_states_dc_table:
        1: 1696
        2: 2292
        3: 2888
        4: 3483
        5: 4079
        6: 4675
        7: 5271
        8: 5867
      snap_gross_income_limit_130_percent_fpl_48_states_dc_additional_member: 596
      snap_gross_income_limit_165_percent_fpl_48_states_dc_table:
        1: 2152
        2: 2909
        3: 3665
        4: 4421
        5: 5177
        6: 5934
        7: 6690
        8: 7446
      snap_gross_income_limit_165_percent_fpl_48_states_dc_additional_member: 757
  source_claims:
