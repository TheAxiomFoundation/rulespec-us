format: rulespec/v1
module:
  proof_validation:
    required: true
  summary: |-
    USDA SNAP FY 2024 cost-of-living adjustments set maximum monthly
    allotments for the 48 states and the District of Columbia effective
    October 1, 2023 through September 30, 2024. The maximum allotments are
    291, 535, 766, 973, 1155, 1386, 1532, and 1751 for household sizes 1
    through 8, plus 219 for each additional person. The same memorandum sets
    Alaska Urban amounts of 374, 686, 983, 1248, 1482, 1778, 1966, and
    2246, plus 281; Alaska Rural 1 amounts of 477, 875, 1253, 1591, 1890,
    2268, 2506, and 2865, plus 358; Alaska Rural 2 amounts of 581, 1065,
    1525, 1937, 2300, 2760, 3051, and 3487, plus 436; Guam amounts of
    430, 788, 1129, 1434, 1703, 2044, 2259, and 2581, plus 323; Hawaii
    amounts of 527, 967, 1385, 1759, 2088, 2506, 2770, and 3166, plus
    396; and Virgin Islands amounts of 375, 688, 985, 1251, 1485, 1782,
    1970, and 2252, plus 282.
  source_verification:
    upstream_source_check:
      status: official_parameter_source
      checked_paths:
        - us/statute/7/2012
        - us/statute/7/2017
      rationale: 7 USC 2012(u) defines the thrifty food plan and requires the
        Secretary to adjust its cost each October 1, and 7 USC 2017(a) computes
        allotments from that adjusted cost without fixing dollar amounts in
        statute. The USDA FY 2024 cost-of-living adjustment memorandum is the
        controlling published source for the FY 2024 maximum allotment dollar
        values, effective October 1, 2023 through September 30, 2024.
    corpus_citation_paths:
      - us/guidance/usda/fns/snap-fy2024-cola/page-3
      - us/guidance/usda/fns/snap-fy2024-cola/page-4
    values:
      snap_maximum_allotment_table:
        1: 291
        2: 535
        3: 766
        4: 973
        5: 1155
        6: 1386
        7: 1532
        8: 1751
      snap_maximum_allotment_additional_member: 219
      snap_maximum_allotment_alaska_urban_table:
