format: rulespec/v1
module:
  proof_validation:
    required: true
  summary: |-
    USDA SNAP FY 2024 income eligibility standards set monthly income limits
    effective October 1, 2023 through September 30, 2024. For the 48 states,
    District of Columbia, Guam, and Virgin Islands, the net monthly income
    limit at 100 percent of the federal poverty level is 1215, 1644, 2072,
    2500, 2929, 3357, 3785, and 4214 for household sizes 1 through 8, plus
    429 for each additional member. The gross monthly income limit at 130
    percent of the federal poverty level is 1580, 2137, 2694, 3250, 3807,
    4364, 4921, and 5478 for household sizes 1 through 8, plus 557 for each
    additional member. The gross monthly income limit where elderly or
    disabled members are a separate household at 165 percent of the federal
    poverty level is 2005, 2712, 3419, 4125, 4832, 5539, 6246, and 6952 for
    household sizes 1 through 8, plus 707 for each additional member.
  source_verification:
    upstream_source_check:
      status: official_parameter_source
      checked_paths:
        - us/statute/7/2014
      rationale: 7 USC 2014(c) fixes the income eligibility standards as
        percentages of the federal poverty guidelines (100 percent net and
        130 percent gross, with 165 percent governing when elderly or
        disabled members constitute a separate household under 7 USC
        2012(m)) and delegates the annual dollar computation to the annual
        poverty guideline update. The USDA FY 2024 cost-of-living adjustment
        memorandum is the controlling published source for the FY 2024
        monthly dollar standards, effective October 1, 2023 through
        September 30, 2024.
    corpus_citation_paths:
      - us/guidance/usda/fns/snap-fy2024-cola/page-2
    values:
      snap_net_income_limit_100_percent_fpl_48_states_dc_table:
        1: 1215
        2: 1644
        3: 2072
        4: 2500
        5: 2929
        6: 3357
        7: 3785
        8: 4214
      snap_net_income_limit_100_percent_fpl_48_states_dc_additional_member: 429
      snap_gross_income_limit_130_percent_fpl_48_states_dc_table:
        1: 1580
        2: 2137
        3: 2694
        4: 3250
        5: 3807
        6: 4364
        7: 4921
        8: 5478
      snap_gross_income_limit_130_percent_fpl_48_states_dc_additional_member: 557
      snap_gross_income_limit_165_percent_fpl_48_states_dc_table:
        1: 2005
        2: 2712
        3: 3419
        4: 4125
        5: 4832
        6: 5539
        7: 6246
        8: 6952
      snap_gross_income_limit_165_percent_fpl_48_states_dc_additional_member: 707
