- name: ptc-410fpl-single
  # P4 exact case: single; size 1; 410% FPL.
  # MAGI = 4.10 * $15,650 = $64,165.
  # Rev. Proc. band = -1 and applicable % = 0, so ungated section 36B(b)
  # assistance would be min($7,000, $7,500 - $0) = $7,000.
  # Section 36B(c)(1)(A)'s restored over-400% cliff makes the final credit $0.
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    us:policies/aca/ptc_pipeline#input.aca_ptc_household_magi: 64165
    us:policies/aca/ptc_pipeline#input.aca_ptc_family_size: 1
    us:policies/aca/ptc_pipeline#input.aca_ptc_poverty_line_for_household: 15650
    us:policies/aca/ptc_pipeline#input.aca_ptc_annual_slcsp_benchmark_premium: 7500
    us:policies/aca/ptc_pipeline#input.aca_ptc_annual_enrolled_premium: 7000
    us:policies/aca/ptc_pipeline#input.aca_ptc_coverage_month_count: 12
  output:
    us:policies/aca/ptc_pipeline#household_income_percentage_of_federal_poverty_line: '4.1'
    us:policies/aca/ptc_pipeline#aca_ptc_applicable_percentage_band_lower_bound: '0'
    us:policies/aca/ptc_pipeline#aca_ptc_applicable_percentage_band_upper_bound: '0'
    us:policies/aca/ptc_pipeline#aca_ptc_applicable_percentage_band: -1
    us:policies/aca/ptc_pipeline#aca_ptc_applicable_percentage: '0'
    us:policies/aca/ptc_pipeline#aca_ptc_applicable_taxpayer: not_holds
    us:policies/aca/ptc_pipeline#aca_ptc_annual_premium_assistance_amount: '7000'
    us:policies/aca/ptc_pipeline#aca_ptc_annual_premium_tax_credit: '0'

- name: ptc-95fpl-single
  # P4 exact case: single; size 1; 95% FPL.
  # MAGI = .95 * $15,650 = $14,867.50.
  # Band <133% gives 2.10%; contribution = $14,867.50 * .021
  # = $312.2175; raw assistance = min($4,800, $5,000 - $312.2175)
  # = $4,687.7825. With no lawfully-present exception case, income below
  # 100% fails section 36B(c)(1)(A), so the final credit is $0.
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    us:policies/aca/ptc_pipeline#input.aca_ptc_household_magi: 14867.5
    us:policies/aca/ptc_pipeline#input.aca_ptc_family_size: 1
    us:policies/aca/ptc_pipeline#input.aca_ptc_poverty_line_for_household: 15650
    us:policies/aca/ptc_pipeline#input.aca_ptc_annual_slcsp_benchmark_premium: 5000
    us:policies/aca/ptc_pipeline#input.aca_ptc_annual_enrolled_premium: 4800
    us:policies/aca/ptc_pipeline#input.aca_ptc_coverage_month_count: 12
  output:
    us:policies/aca/ptc_pipeline#household_income_percentage_of_federal_poverty_line: '0.95'
    us:policies/aca/ptc_pipeline#aca_ptc_applicable_percentage_band: 0
    us:policies/aca/ptc_pipeline#aca_ptc_applicable_percentage: '0.021'
    us:policies/aca/ptc_pipeline#aca_ptc_applicable_taxpayer: not_holds
    us:policies/aca/ptc_pipeline#aca_ptc_annual_premium_assistance_amount: '4687.7825'
    us:policies/aca/ptc_pipeline#aca_ptc_annual_premium_tax_credit: '0'

- name: exact-100fpl-enrolled-premium-cap
  # Inclusive lower boundary: $15,650 / $15,650 = 100% FPL.
  # Band <133% gives 2.10%; contribution = $15,650 * .021 = $328.65.
  # Benchmark excess = $6,000 - $328.65 = $5,671.35.
  # Assistance = min($3,600 enrolled premium, $5,671.35) = $3,600.
  # Monthly plumbing: $3,600/12 = $300; $6,000/12 = $500;
  # $328.65/12 = $27.3875; min($300, $472.6125) = $300.
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    us:policies/aca/ptc_pipeline#input.aca_ptc_household_magi: 15650
    us:policies/aca/ptc_pipeline#input.aca_ptc_family_size: 1
    us:policies/aca/ptc_pipeline#input.aca_ptc_poverty_line_for_household: 15650
    us:policies/aca/ptc_pipeline#input.aca_ptc_annual_slcsp_benchmark_premium: 6000
    us:policies/aca/ptc_pipeline#input.aca_ptc_annual_enrolled_premium: 3600
    us:policies/aca/ptc_pipeline#input.aca_ptc_coverage_month_count: 12
  output:
    us:policies/aca/ptc_pipeline#household_income_for_taxable_year: 15650
    us:policies/aca/ptc_pipeline#poverty_line_for_family_size_involved: 15650
    us:policies/aca/ptc_pipeline#household_income_percentage_of_federal_poverty_line: '1'
    us:policies/aca/ptc_pipeline#aca_ptc_applicable_percentage_band_lower_bound: '0'
    us:policies/aca/ptc_pipeline#aca_ptc_applicable_percentage_band_upper_bound: '1.33'
    us:policies/aca/ptc_pipeline#aca_ptc_applicable_percentage_band: 0
    us:policies/aca/ptc_pipeline#aca_ptc_applicable_percentage: '0.021'
    us:policies/aca/ptc_pipeline#applicable_percentage_for_taxable_year: '0.021'
    us:policies/aca/ptc_pipeline#monthly_premiums_for_exchange_qualified_health_plans_covering_taxpayer_spouse_or_dependents: '300'
    us:policies/aca/ptc_pipeline#adjusted_monthly_premium_for_applicable_second_lowest_cost_silver_plan: '500'
    us:policies/aca/ptc_pipeline#aca_ptc_full_year_runtime_inputs_valid: holds
    us:policies/aca/ptc_pipeline#aca_ptc_applicable_taxpayer: holds
    us:policies/aca/ptc_pipeline#aca_ptc_required_monthly_contribution: '27.387500000000000000000000001'
    us:policies/aca/ptc_pipeline#aca_ptc_monthly_premium_assistance_amount: '300'
    us:policies/aca/ptc_pipeline#aca_ptc_annual_premium_assistance_amount: '3600'
    us:policies/aca/ptc_pipeline#aca_ptc_annual_premium_tax_credit: '3600'

- name: exact-400fpl-inclusive-upper-boundary
  # Inclusive upper boundary: $62,600 / $15,650 = 400% FPL.
  # Band 300%-400% gives 9.96%; contribution = $62,600 * .0996
  # = $6,234.96. Assistance = min($7,000, $7,500 - $6,234.96)
  # = $1,265.04. Exact 400% remains an applicable taxpayer.
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    us:policies/aca/ptc_pipeline#input.aca_ptc_household_magi: 62600
    us:policies/aca/ptc_pipeline#input.aca_ptc_family_size: 1
    us:policies/aca/ptc_pipeline#input.aca_ptc_poverty_line_for_household: 15650
    us:policies/aca/ptc_pipeline#input.aca_ptc_annual_slcsp_benchmark_premium: 7500
    us:policies/aca/ptc_pipeline#input.aca_ptc_annual_enrolled_premium: 7000
    us:policies/aca/ptc_pipeline#input.aca_ptc_coverage_month_count: 12
  output:
    us:policies/aca/ptc_pipeline#household_income_percentage_of_federal_poverty_line: '4'
    us:policies/aca/ptc_pipeline#aca_ptc_applicable_percentage_band: 5
    us:policies/aca/ptc_pipeline#aca_ptc_applicable_percentage: '0.0996'
    us:policies/aca/ptc_pipeline#aca_ptc_applicable_taxpayer: holds
    us:policies/aca/ptc_pipeline#aca_ptc_annual_premium_tax_credit: '1265.04'

- name: contribution-exceeds-slcsp-zero-credit
  # Eligible interpolation/floor case: $35,212.50 / $15,650 = 225% FPL.
  # Band 200%-<250% endpoints are 6.60% and 8.44%.
  # Applicable % = .066 + ((2.25 - 2.00) / (2.50 - 2.00))
  #                    * (.0844 - .066)
  #              = .0752.
  # Contribution = $35,212.50 * .0752 = $2,647.98, which exceeds the
  # $2,400 SLCSP. Section 36B(b)'s excess floor gives zero assistance and
  # therefore zero annual credit despite income-band eligibility.
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    us:policies/aca/ptc_pipeline#input.aca_ptc_household_magi: 35212.5
    us:policies/aca/ptc_pipeline#input.aca_ptc_family_size: 1
    us:policies/aca/ptc_pipeline#input.aca_ptc_poverty_line_for_household: 15650
    us:policies/aca/ptc_pipeline#input.aca_ptc_annual_slcsp_benchmark_premium: 2400
    us:policies/aca/ptc_pipeline#input.aca_ptc_annual_enrolled_premium: 3000
    us:policies/aca/ptc_pipeline#input.aca_ptc_coverage_month_count: 12
  output:
    us:policies/aca/ptc_pipeline#household_income_percentage_of_federal_poverty_line: '2.25'
    us:policies/aca/ptc_pipeline#aca_ptc_applicable_percentage_band_lower_bound: '2'
    us:policies/aca/ptc_pipeline#aca_ptc_applicable_percentage_band_upper_bound: '2.5'
    us:policies/aca/ptc_pipeline#aca_ptc_applicable_percentage_band: 3
    us:policies/aca/ptc_pipeline#aca_ptc_applicable_percentage: '0.0752'
    us:policies/aca/ptc_pipeline#aca_ptc_applicable_taxpayer: holds
    us:policies/aca/ptc_pipeline#aca_ptc_required_monthly_contribution: '220.665'
    us:policies/aca/ptc_pipeline#aca_ptc_monthly_premium_assistance_amount: '0'
    us:policies/aca/ptc_pipeline#aca_ptc_annual_premium_tax_credit: '0'
