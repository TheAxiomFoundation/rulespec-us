# Hand-computed tax-year-2026 fixtures for the narrow full-year ACA premium
# tax credit pipeline. Under IRC 36B(d)(3)(B), 2026 coverage uses the poverty
# guideline most recently published when regular open enrollment began on
# November 1, 2025: the 2025 HHS guideline. The contiguous-48/DC amounts used
# below are $15,650 (size 1), $21,150 (size 2), and $32,150 (size 4).
# Cases labeled single are unmarried; cases labeled joint are married filing
# jointly; no taxpayer can be claimed as another taxpayer's dependent. Those
# section 36B(c)(1)(C)-(D) screens are declared module boundaries, not inputs.
#
# Source: HHS, Annual Update of the HHS Poverty Guidelines, 90 FR 5917
# (Jan. 17, 2025), https://www.govinfo.gov/content/pkg/FR-2025-01-17/html/2025-01377.htm
#
# Rev. Proc. 2025-25 section 3.01 supplies the 2026 band endpoints. Expected
# Money values preserve exact RuleSpec arithmetic; nearest-cent displays are
# noted where an exact result has more than two decimal places. No expected
# value is sourced from PolicyEngine.

- name: ptc-150fpl-family4
  # P4 exact case: joint; size 4; 150% FPL.
  # MAGI = 1.50 * $32,150 = $48,225.
  # Band 150%-<200%: at its lower endpoint, applicable % = 4.19%.
  # Contribution = $48,225 * .0419 = $2,020.6275.
  # Assistance = min($17,000, $18,000 - $2,020.6275)
  #            = $15,979.3725 (nearest cent: $15,979.37).
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    us:policies/aca/ptc_pipeline#input.aca_ptc_household_magi: 48225
    us:policies/aca/ptc_pipeline#input.aca_ptc_family_size: 4
    us:policies/aca/ptc_pipeline#input.aca_ptc_poverty_line_for_household: 32150
    us:policies/aca/ptc_pipeline#input.aca_ptc_annual_slcsp_benchmark_premium: 18000
    us:policies/aca/ptc_pipeline#input.aca_ptc_annual_enrolled_premium: 17000
    us:policies/aca/ptc_pipeline#input.aca_ptc_coverage_month_count: 12
  output:
    us:policies/aca/ptc_pipeline#household_income_percentage_of_federal_poverty_line: '1.5'
    us:policies/aca/ptc_pipeline#aca_ptc_applicable_percentage_band: 2
    us:policies/aca/ptc_pipeline#aca_ptc_applicable_percentage: '0.0419'
    us:policies/aca/ptc_pipeline#aca_ptc_applicable_taxpayer: holds
    us:policies/aca/ptc_pipeline#aca_ptc_required_monthly_contribution: '168.385625'
    us:policies/aca/ptc_pipeline#aca_ptc_monthly_premium_assistance_amount: '1331.614375'
    us:policies/aca/ptc_pipeline#aca_ptc_annual_premium_tax_credit: '15979.3725'

- name: ptc-250fpl-single
  # P4 exact case: single; size 1; 250% FPL.
  # MAGI = 2.50 * $15,650 = $39,125.
  # Band 250%-<300%: at its lower endpoint, applicable % = 8.44%.
  # Contribution = $39,125 * .0844 = $3,302.15.
  # Assistance = min($5,800, $6,000 - $3,302.15) = $2,697.85.
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    us:policies/aca/ptc_pipeline#input.aca_ptc_household_magi: 39125
    us:policies/aca/ptc_pipeline#input.aca_ptc_family_size: 1
    us:policies/aca/ptc_pipeline#input.aca_ptc_poverty_line_for_household: 15650
    us:policies/aca/ptc_pipeline#input.aca_ptc_annual_slcsp_benchmark_premium: 6000
    us:policies/aca/ptc_pipeline#input.aca_ptc_annual_enrolled_premium: 5800
    us:policies/aca/ptc_pipeline#input.aca_ptc_coverage_month_count: 12
  output:
    us:policies/aca/ptc_pipeline#household_income_percentage_of_federal_poverty_line: '2.5'
    us:policies/aca/ptc_pipeline#aca_ptc_applicable_percentage_band: 4
    us:policies/aca/ptc_pipeline#aca_ptc_applicable_percentage: '0.0844'
    us:policies/aca/ptc_pipeline#aca_ptc_applicable_taxpayer: holds
    us:policies/aca/ptc_pipeline#aca_ptc_annual_premium_tax_credit: '2697.85'

- name: ptc-300fpl-joint
  # P4 exact case: joint; size 2; 300% FPL.
  # MAGI = 3.00 * $21,150 = $63,450.
  # Band 300%-400% has a constant applicable percentage of 9.96%.
  # Contribution = $63,450 * .0996 = $6,319.62.
  # Assistance = min($15,000, $14,000 - $6,319.62) = $7,680.38;
  # the benchmark, not the higher enrolled premium, controls.
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    us:policies/aca/ptc_pipeline#input.aca_ptc_household_magi: 63450
    us:policies/aca/ptc_pipeline#input.aca_ptc_family_size: 2
    us:policies/aca/ptc_pipeline#input.aca_ptc_poverty_line_for_household: 21150
    us:policies/aca/ptc_pipeline#input.aca_ptc_annual_slcsp_benchmark_premium: 14000
    us:policies/aca/ptc_pipeline#input.aca_ptc_annual_enrolled_premium: 15000
    us:policies/aca/ptc_pipeline#input.aca_ptc_coverage_month_count: 12
  output:
    us:policies/aca/ptc_pipeline#household_income_percentage_of_federal_poverty_line: '3'
    us:policies/aca/ptc_pipeline#aca_ptc_applicable_percentage_band: 5
    us:policies/aca/ptc_pipeline#aca_ptc_applicable_percentage: '0.0996'
    us:policies/aca/ptc_pipeline#aca_ptc_applicable_taxpayer: holds
    us:policies/aca/ptc_pipeline#aca_ptc_annual_premium_tax_credit: '7680.3800000000000000000000004'

