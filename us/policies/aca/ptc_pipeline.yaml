  - name: aca_ptc_applicable_percentage
    kind: derived
    entity: TaxUnit
    dtype: Rate
    period: Year
    source: 26 USC 36B(b)(3)(A)(i), using Rev. Proc. 2025-25 adjusted endpoints
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/36B
              excerpt: "shall increase, on a sliding scale in a linear manner, from the initial premium percentage to the final premium percentage"
          - path: versions[0].formula
            kind: import
            import:
              target: us:policies/irs/rev-proc-2025-25/aca-ptc#applicable_initial_percentage
              output: applicable_initial_percentage
              hash: sha256:201158994296816a54f387c58f0415badbfb9b3e97cf6bbfb3c9f82f1ca9be6f
          - path: versions[0].formula
            kind: import
            import:
              target: us:policies/irs/rev-proc-2025-25/aca-ptc#applicable_final_percentage
              output: applicable_final_percentage
              hash: sha256:201158994296816a54f387c58f0415badbfb9b3e97cf6bbfb3c9f82f1ca9be6f
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if aca_ptc_applicable_percentage_band < 0:
            0
          else:
            if applicable_initial_percentage == applicable_final_percentage:
              applicable_initial_percentage
            else:
              applicable_initial_percentage
              + (
                  (household_income_percentage_of_federal_poverty_line - aca_ptc_applicable_percentage_band_lower_bound)
                  / (aca_ptc_applicable_percentage_band_upper_bound - aca_ptc_applicable_percentage_band_lower_bound)
                )
                * (applicable_final_percentage - applicable_initial_percentage)

