    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 36B(d)(2), caller-supplied completed annual household MAGI
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us/statute/26/36B
              excerpt: "The term “household income” means, with respect to any taxpayer, an amount equal to the sum of the modified adjusted gross income of the taxpayer"
