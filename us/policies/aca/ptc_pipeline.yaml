format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_paths:
      - us/statute/26/36B
      - us/statute/26/36B/c/1/A
      - us/statute/26/36B/d/3
      - us/guidance/irs/rev-proc-2025-25
    upstream_source_check:
      status: official_parameter_source
      checked_paths:
        - us/statute/26/36B
        - us/statute/26/36B/c/1/A
        - us/statute/26/36B/d/3
        - us/guidance/irs/rev-proc-2025-25
      rationale: |-
        Section 36B supplies the applicable-taxpayer income band, linear
        applicable-percentage interpolation, monthly required contribution,
        monthly premium-assistance amount, and annual sum. Rev. Proc. 2025-25
        supplies the adjusted initial and final percentages for taxable year
        2026. The separate 9.96-percent required-contribution percentage in
        section 3.02 of the revenue procedure is an employer-coverage
        affordability parameter and is not used as every household's premium
        tax credit contribution rate.

        Section 36B(d)(3)(B) requires the poverty line most recently published
        on the first day of the regular enrollment period for the coverage
        year. The 2026 Marketplace open-enrollment period began November 1,
        2025, so callers must supply the applicable 2025 HHS poverty guideline.
        This module accepts that exact annual amount as a runtime input instead
        of inventing or embedding a poverty-guideline table.
  summary: |-
    Annual premium tax credit pipeline for the narrow full-year 2026 case in
    which one TaxUnit is the household and coverage family, all members have
    the same qualified Marketplace enrollment for all 12 months, and annual
    enrolled-plan and applicable SLCSP premiums are supplied by the caller.

    The pipeline derives the household-income/FPL ratio, uses the Rev. Proc.
    2025-25 band selector and adjusted endpoints, applies section
    36B(b)(3)(A)'s linear interpolation, bridges the resulting percentage into
    section 36B(b)'s required monthly contribution and premium-assistance
    amount, and multiplies the identical monthly amount by the caller-supplied
    12 coverage months. Section 36B(c)(1)(A)'s inclusive 100-through-400-percent
    applicable-taxpayer predicate gates the final annual credit.

    Annual premium inputs are divided by section 36B(b)'s encoded divisor of
    12. This is neutral plumbing for the stated full-year, level-month fixture
    surface; it does not model changing monthly premiums or coverage. Money and
    applicable-percentage values remain at RuleSpec arithmetic precision.
    Regulatory and filing-form rounding are deferred below.
  deferred_outputs:
    - output: us:statutes/26/36B/b/3/A#applicable_percentage
      reason: |-
        The encoded subparagraph-(3)(A) output closes over the unindexed
        statutory base percentage tables and exposes no caller boundary for
        the adjusted Rev. Proc. 2025-25 endpoints. RuleSpec imports cannot
        substitute those internal tables. This pipeline therefore uses the
        revenue procedure's encoded band and endpoints and applies the same
        source-stated linear interpolation in a local proofed rule.
      source_values:
        - us:policies/irs/rev-proc-2025-25/aca-ptc#applicable_percentage_band
        - us:policies/irs/rev-proc-2025-25/aca-ptc#applicable_initial_percentage
        - us:policies/irs/rev-proc-2025-25/aca-ptc#applicable_final_percentage
    - output: us:statutes/26/36B/b#premium_assistance_credit_amount
      reason: |-
        The encoded annual output sums a coverage-month data relation. This
        aggregate-input pipeline cannot synthesize twelve relation members, so
        it applies the mathematically equivalent monthly amount times the
        required runtime coverage-month count after requiring a full 12 months.
    - output: us:statutes/26/36B/c/2#coverage_month_and_minimum_essential_coverage_eligibility
      reason: |-
        Employer-sponsored coverage affordability and minimum value, other
        minimum essential coverage, Exchange/QHP enrollment, and coverage-month
        determinations are not encoded as one executable dependency surface.
        This narrow pipeline assumes the caller's enrolled-premium inputs are
        for a qualifying full-year Marketplace case with no employer offer.
    - output: us:statutes/26/36B/c/4#qualified_small_employer_health_reimbursement_arrangement_coordination
      reason: |-
        QSEHRA permitted-benefit reductions and affordability coordination are
        outside the encoded monthly assistance surface. All fixtures assume no
        QSEHRA.
    - output: us:statutes/26/36B/e#lawfully_present_individual_adjusted_premium_and_poverty_ratio_rules
      reason: |-
        Person-level lawfully-present modifications require family-size,
        household-income, and premium attribution mechanics that are deferred
        in the parent section 36B module. All fixtures are U.S. citizens and do
        not use the former below-100-percent exception.
    - output: us:regulations/26-cfr/1.36B-3/g#rounded_applicable_percentage
      reason: |-
        The current regulation rounds an interpolated applicable percentage to
        the nearest 0.01 percentage point, but that regulation is not encoded
        in this repository and RuleSpec has no imported rounding rule here.
        Required fixtures use table endpoints, constant bands, or an exact
        midpoint, so this missing operation does not change their rates.
    - output: us:forms/irs/8962#filing_form_percentage_and_money_rounding
      reason: |-
        Form 8962 percentage truncation and whole-dollar filing mechanics are
        not encoded, and final 2026 form instructions are not available in the
        pinned source surface. Outputs retain exact statutory-module arithmetic.
