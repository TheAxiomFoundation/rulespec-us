format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/guidance/ssa/cola/2026/block-1
  summary: |-
    SSA states that Social Security and SSI benefits for 75 million Americans increase by 2.8 percent in 2026, and its historical automatic COLA table lists January 2026 as 2.8 percent.
rules:
  - name: social_security_cola_2026_applicable_increase_percentage
    kind: parameter
    dtype: Rate
    source: Social Security Cost-of-Living Adjustment Information for 2026
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: rate
            source:
              corpus_citation_path: us/guidance/ssa/cola/2026/block-1
              excerpt: "will increase 2.8 percent in 2026"
          - path: versions[0].formula
            kind: rate
            source:
              corpus_citation_path: us/guidance/ssa/cola/2026/block-1
              excerpt: "January 2026 -- 2.8%"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          0.028
