format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/guidance/ssa/cola/2026/block-1
  summary: |-
    SSA's official 2026 cost-of-living determination states that the latest COLA is 2.8 percent, and that Social Security benefits will increase by 2.8 percent beginning with the December 2025 benefits, which are payable in January 2026.
  deferred_outputs:
    - output: us:policies/ssa/cola/2026#social_security_benefit_after_2026_cost_of_living_increase
      reason: |-
        This policy module supplies only the 2026 cost-of-living increase percentage as an operational parameter. Applying it to a primary insurance amount is the year-general statutory operation of 42 USC 415(i)(2)(A)(ii), encoded in us/statutes/42/415/i, which takes the applicable increase percentage as a free input (cola_applicable_increase_percentage) rather than importing any determination year's value, and produces primary_insurance_amount_after_cost_of_living_increase. This year's percentage is bound to that free input where the statute is applied. No benefit-bearing numeric output is computed in this policy module itself.
      source_values:
        - us:policies/ssa/cola/2026#social_security_cola_2026_applicable_increase_percentage
rules:
  - name: social_security_cola_2026_applicable_increase_percentage
    kind: parameter
    dtype: Rate
    source: Social Security Cost-of-Living Adjustment Information for 2026
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/guidance/ssa/cola/2026/block-1
              excerpt: "The latest COLA is 2.8 percent for Social Security benefits and SSI payments"
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/guidance/ssa/cola/2026/block-1
              excerpt: "Social Security benefits will increase by 2.8 percent beginning with the December 2025 benefits"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          0.028
