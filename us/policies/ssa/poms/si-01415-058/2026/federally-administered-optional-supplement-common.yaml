format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/guidance/ssa/poms/si-01415-058/2026/block-11
  summary: 'Shared SSA POMS SI 01415.058 facts for federally administered optional
    supplementary payment programs: OS code Y applies when a recipient eligible for
    an optional supplement waives the supplement, the 2026 Federal Code A individual
    FBR is 994.00, the 2026 Federal Code A individual no-supplement total payment
    level is 994.00, the 2026 Federal Code B individual FBR less the VTR reduction
    is 662.67, the 2026 Federal Code B individual no-supplement total payment level
    is 662.67, the 2026 Federal Code C individual FBR is 994.00, the 2026 Federal
    Code C individual no-supplement total payment level is 994.00, the 2026 Federal
    Code D individual Title XIX payment cap is 30.00, the 2026 Federal Code A couple
    FBR is 1491.00, the 2026 Federal Code A couple no-supplement total payment level
    is 1491.00, the 2026 Federal Code B couple FBR less the VTR reduction is 994.00,
    the 2026 Federal Code B couple no-supplement total payment level is 994.00, and
    the 2026 Federal Code D couple Title XIX payment cap is 60.00.'
