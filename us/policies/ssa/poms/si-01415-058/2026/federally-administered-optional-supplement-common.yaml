format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_paths:
    - us/guidance/ssa/poms/si-01415-058/2026/block-11
    - us/guidance/ssa/poms/si-01415-058/2026/block-13
    - us/guidance/ssa/poms/si-01415-058/2026/block-14
    upstream_source_check:
      status: official_parameter_source
      checked_paths:
      - us/statute/42/1382/b
      - us/statute/42/1382e
      - us/statute/42/1382f
      - us/guidance/ssa/poms/si-01415-058/2026/block-11
      - us/guidance/ssa/poms/si-01415-058/2026/block-13
      - us/guidance/ssa/poms/si-01415-058/2026/block-14
      rationale: SSA POMS SI 01415.058 is the official current federally administered
        optional supplementary payment program source for January 2026. Blocks 11,
        13, and 14 state the shared optional-supplement waived OS-code predicate and
        the Federal Code A individual and couple FBR amounts used by state payment
        tables.
  summary: 'Shared SSA POMS SI 01415.058 facts for federally administered optional
    supplementary payment programs: OS code Y applies when a recipient eligible for
    an optional supplement waives the supplement, the 2026 Federal Code A individual
    FBR is 994.00, and the 2026 Federal Code A couple FBR is 1491.00.'
rules:
- name: optional_supplement_waived_os_code_applies
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: POMS SI 01415.058, block 11, OS code Y definition
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: definition
        source:
          corpus_citation_path: us/guidance/ssa/poms/si-01415-058/2026/block-11
          excerpt: Optional supplementation waived
  versions:
  - effective_from: '2026-01-01'
    formula: 'recipient_eligible_for_optional_supplement

      and recipient_waived_optional_supplement'
- name: federal_code_a_individual_fbr
  kind: parameter
  dtype: Money
  unit: USD
  source: POMS SI 01415.058, block 13, Federal Code A rows
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us/guidance/ssa/poms/si-01415-058/2026/block-13
          excerpt: A A All 994.00 681.00 1675.00
  versions:
  - effective_from: '2026-01-01'
    formula: '994.00'
- name: federal_code_a_couple_fbr
  kind: parameter
  dtype: Money
  unit: USD
  source: POMS SI 01415.058, block 14, Federal Code A rows
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us/guidance/ssa/poms/si-01415-058/2026/block-14
          excerpt: A A All 1491.00 968.00 2459.00
  versions:
  - effective_from: '2026-01-01'
    formula: '1491.00'
