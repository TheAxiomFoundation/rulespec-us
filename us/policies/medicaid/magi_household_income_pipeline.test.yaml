# Hand-computed Medicaid MAGI household-income fixtures. No expected value is
# sourced from PolicyEngine.
#
# The boundary cases use the 2026 HHS poverty guideline for a family of two in
# the 48 contiguous States and District of Columbia: $21,640. Therefore:
#
#   133% FPL = $21,640 * 1.33 = $28,781.20
#     5% FPL = $21,640 * 0.05 =  $1,082.00
#   138% FPL = $28,781.20 + $1,082.00 = $29,863.20
#
# Source: https://aspe.hhs.gov/topics/poverty-economic-mobility/poverty-guidelines

- name: member_contribution_adds_counted_magi_and_qualifying_cash_support
  # Counted MAGI $500 + State-option paragraph-(d)(3) cash support $300 = $800.
  period: &january_2026 2026-01
  input:
    <<: &countable_payment_defaults
      us:regulations/42-cfr/435/603/e#input.payment_is_income_under_section_36B_d_2_B_methodologies: true
      us:regulations/42-cfr/435/603/e#input.payment_received_as_lump_sum: false
      us:regulations/42-cfr/435/603/e#input.lump_sum_received_in_current_month: false
      us:regulations/42-cfr/435/603/e#input.scholarship_award_or_fellowship_grant_used_for_education_purposes: false
      us:regulations/42-cfr/435/603/e#input.scholarship_award_or_fellowship_grant_used_for_living_expenses: false
      us:regulations/42-cfr/435/603/e#input.distribution_from_alaska_native_corporation_or_settlement_trust: false
      us:regulations/42-cfr/435/603/e#input.distribution_from_trust_or_restricted_property_under_secretary_of_interior_supervision: false
      us:regulations/42-cfr/435/603/e#input.payment_from_rights_in_trust_or_restricted_land: false
      us:regulations/42-cfr/435/603/e#input.payment_from_federally_protected_off_reservation_natural_resource_rights: false
      us:regulations/42-cfr/435/603/e#input.distribution_from_natural_resource_real_property_interest_on_or_near_reservation: false
      us:regulations/42-cfr/435/603/e#input.distribution_from_exercise_of_federally_protected_real_property_rights: false
      us:regulations/42-cfr/435/603/e#input.payment_from_cultural_religious_traditional_or_subsistence_item_or_right: false
      us:regulations/42-cfr/435/603/e#input.student_financial_assistance_under_bureau_of_indian_affairs_education_program: false
    us:regulations/42-cfr/435/603/d#input.included_in_household_of_natural_adopted_or_step_parent: false
    us:regulations/42-cfr/435/603/d#input.expected_required_to_file_return_under_6012_a_1: true
    us:regulations/42-cfr/435/603/d#input.tax_dependent_described_in_paragraph_f_2_i: true
    us:regulations/42-cfr/435/603/d#input.state_option_includes_actually_available_cash_support: true
    us:regulations/42-cfr/435/603/d#input.cash_support_exceeds_nominal_amount: true
    us:regulations/42-cfr/435/603/d#input.actually_available_cash_support_provided_by_claiming_taxpayer: 300
    us:regulations/42-cfr/435/603/e#input.payment_amount: 500
    us:regulations/42-cfr/435/603/d#input.federal_poverty_level_for_applicable_family_size: 21640
  output:
    us:policies/medicaid/magi_household_income_pipeline#medicaid_magi_household_member_contribution: '800'

- name: tax_filer_exactly_138_percent_is_eligible_at_highest_133_percent_standard
  # Self $18,000 + established dependent $11,863.20 = $29,863.20 (138%).
  # Candidate = $29,863.20 - $1,082.00 = $28,781.20 (133%), inclusive.
  period: *january_2026
  input:
    <<: &common_two_person_adult_inputs
      us:policies/medicaid/magi_household_income_pipeline#input.applicable_family_size: 2
      us:policies/medicaid/magi_household_income_pipeline#input.highest_applicable_magi_income_standard_fpl_ratio: 1.33
      us:policies/medicaid/magi_household_income_pipeline#input.state_plan_parent_or_caretaker_income_standard_fpl_ratio: 1.00
      us:regulations/42-cfr/435/603/d#input.federal_poverty_level_for_applicable_family_size: 21640
      us:regulations/42-cfr/435/119#input.person_age: 30
      us:regulations/42-cfr/435/119#input.person_is_pregnant: false
      us:regulations/42-cfr/435/119#input.person_entitled_to_or_enrolled_in_medicare_part_a_or_b: false
      us:regulations/42-cfr/435/119#input.person_eligible_and_enrolled_for_mandatory_medicaid_under_subpart_b: false
      us:regulations/42-cfr/435/119#input.person_is_parent_or_caretaker_relative: true
      us:regulations/42-cfr/435/119#input.person_lives_with_dependent_child_under_age_threshold: false
      us:regulations/42-cfr/435/119#input.dependent_child_receiving_medicaid: false
      us:regulations/42-cfr/435/119#input.dependent_child_receiving_chip: false
      us:regulations/42-cfr/435/119#input.dependent_child_enrolled_in_minimum_essential_coverage: false
      us:regulations/42-cfr/435/119#input.state_elected_435_222_higher_age_as_of_march_23_2010: false
      us:regulations/42-cfr/435/119#input.state_elected_435_222_higher_age: 19
      us:regulations/42-cfr/435/110#input.person_is_parent_or_caretaker_relative: true
      us:regulations/42-cfr/435/110#input.person_is_spouse_of_parent_or_caretaker_relative_living_with_them: false
    us:regulations/42-cfr/435/603/d#relation.member_of_individuals_household:
      - &tax_filer_self_at_138
        <<:
          - *countable_payment_defaults
          - &tax_filer_member_context
            us:regulations/42-cfr/435/603/f#input.person_age: 30
            us:regulations/42-cfr/435/603/f#input.state_plan_elects_full_time_student_age_21: false
            us:regulations/42-cfr/435/603/f#input.person_is_full_time_student: false
            us:regulations/42-cfr/435/603/f#input.tax_dependent_is_not_spouse_or_child_of_claiming_taxpayer: false
            us:regulations/42-cfr/435/603/f#input.expected_to_be_claimed_by_one_parent_and_living_with_both_parents_and_parents_do_not_expect_joint_return: false
            us:regulations/42-cfr/435/603/f#input.expected_to_be_claimed_by_non_custodial_parent: false
            us:regulations/42-cfr/435/603/f#input.expects_to_file_federal_tax_return: true
            us:regulations/42-cfr/435/603/f#input.expects_to_be_claimed_as_tax_dependent: false
            us:regulations/42-cfr/435/603/f#input.individual_expects_to_file_tax_return: true
            us:regulations/42-cfr/435/603/f#input.individual_expects_to_be_claimed_as_tax_dependent_by_another_taxpayer: false
            us:regulations/42-cfr/435/603/f#input.candidate_is_in_household_of_taxpayer_claiming_individual: false
            us:regulations/42-cfr/435/603/f#input.candidate_lives_with_individual: false
            us:regulations/42-cfr/435/603/f#input.candidate_is_individuals_spouse: false
            us:regulations/42-cfr/435/603/f#input.candidate_is_individuals_child: false
            us:regulations/42-cfr/435/603/f#input.candidate_under_state_plan_age: false
            us:regulations/42-cfr/435/603/f#input.individual_under_state_plan_age: false
            us:regulations/42-cfr/435/603/f#input.candidate_is_individuals_parent: false
            us:regulations/42-cfr/435/603/f#input.candidate_is_individuals_sibling: false
        us:regulations/42-cfr/435/603/d#input.tax_dependent_described_in_paragraph_f_2_i: false
        us:regulations/42-cfr/435/603/d#input.included_in_household_of_natural_adopted_or_step_parent: false
        us:regulations/42-cfr/435/603/d#input.expected_required_to_file_return_under_6012_a_1: true
        us:regulations/42-cfr/435/603/d#input.state_option_includes_actually_available_cash_support: false
        us:regulations/42-cfr/435/603/d#input.cash_support_exceeds_nominal_amount: false
        us:regulations/42-cfr/435/603/d#input.actually_available_cash_support_provided_by_claiming_taxpayer: 0
        us:regulations/42-cfr/435/603/e#input.payment_amount: 18000
        us:regulations/42-cfr/435/603/f#input.candidate_is_the_individual: true
        us:regulations/42-cfr/435/603/f#input.individual_expects_to_claim_candidate_as_tax_dependent: false
        us:regulations/42-cfr/435/603/f#input.taxpayer_can_reasonably_establish_candidate_as_tax_dependent: false
      - &tax_filer_dependent_at_138
        <<:
          - *countable_payment_defaults
          - *tax_filer_member_context
        us:regulations/42-cfr/435/603/d#input.tax_dependent_described_in_paragraph_f_2_i: false
        us:regulations/42-cfr/435/603/d#input.included_in_household_of_natural_adopted_or_step_parent: false
        us:regulations/42-cfr/435/603/d#input.expected_required_to_file_return_under_6012_a_1: true
        us:regulations/42-cfr/435/603/d#input.state_option_includes_actually_available_cash_support: false
        us:regulations/42-cfr/435/603/d#input.cash_support_exceeds_nominal_amount: false
        us:regulations/42-cfr/435/603/d#input.actually_available_cash_support_provided_by_claiming_taxpayer: 0
        us:regulations/42-cfr/435/603/e#input.payment_amount: 11863.20
        us:regulations/42-cfr/435/603/f#input.candidate_is_the_individual: false
        us:regulations/42-cfr/435/603/f#input.individual_expects_to_claim_candidate_as_tax_dependent: true
        us:regulations/42-cfr/435/603/f#input.taxpayer_can_reasonably_establish_candidate_as_tax_dependent: true
  output:
    us:policies/medicaid/magi_household_income_pipeline#medicaid_household_pre_disregard_magi: '29863.2'
    us:policies/medicaid/magi_household_income_pipeline#medicaid_applicable_federal_poverty_level_amount: '21640'
    us:policies/medicaid/magi_household_income_pipeline#medicaid_household_income_as_fraction_of_fpl: '1.38'
    us:policies/medicaid/magi_household_income_pipeline#highest_applicable_magi_income_standard_amount: '28781.2'
    us:policies/medicaid/magi_household_income_pipeline#medicaid_household_income_after_five_percentage_point_subtraction: '28781.2'
    us:policies/medicaid/magi_household_income_pipeline#five_percentage_point_disregard_changes_overall_magi_eligibility: holds
    us:policies/medicaid/magi_household_income_pipeline#medicaid_household_eligibility_comparison_income: '28781.2'
    us:policies/medicaid/magi_household_income_pipeline#medicaid_household_eligibility_comparison_income_as_fraction_of_fpl: '1.33'
    us:policies/medicaid/magi_household_income_pipeline#eligible_under_highest_applicable_magi_income_standard: holds
    us:policies/medicaid/magi_household_income_pipeline#medicaid_magi_household_runtime_inputs_valid: holds
    us:policies/medicaid/magi_household_income_pipeline#household_income_as_fraction_of_fpl: '1.33'
    us:policies/medicaid/magi_household_income_pipeline#household_income_at_or_below_state_plan_income_standard: not_holds
    us:policies/medicaid/magi_household_income_pipeline#medicaid_adult_group_eligible: holds
    us:policies/medicaid/magi_household_income_pipeline#medicaid_parent_or_caretaker_relative_eligible: not_holds
