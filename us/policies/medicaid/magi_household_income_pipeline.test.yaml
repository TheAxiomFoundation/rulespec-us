  period: *january_2026
  input:
    <<:
      - *common_two_person_household_inputs
      - *common_adult_consumer_inputs
    us:regulations/42-cfr/435/603/d#relation.member_of_individuals_household:
      -
        <<:
          - *countable_payment_defaults
          - *tax_filer_member_context
          - *tax_filer_self_static
        us:regulations/42-cfr/435/603/e#input.payment_amount: 18000
      -
        <<:
          - *countable_payment_defaults
          - *tax_filer_member_context
          - *tax_filer_dependent_static
        us:regulations/42-cfr/435/603/e#input.payment_amount: 10781.19
  output:
    us:policies/medicaid/magi_household_income_pipeline#medicaid_household_pre_disregard_magi: '28781.19'
