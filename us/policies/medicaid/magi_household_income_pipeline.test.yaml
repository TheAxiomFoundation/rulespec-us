    us:policies/medicaid/magi_household_income_pipeline#five_percentage_point_disregard_changes_overall_magi_eligibility: not_holds
    us:policies/medicaid/magi_household_income_pipeline#medicaid_household_eligibility_comparison_income: '28781.19'
    us:policies/medicaid/magi_household_income_pipeline#eligible_under_highest_applicable_magi_income_standard: holds
    us:policies/medicaid/magi_household_income_pipeline#medicaid_adult_group_eligible: holds

