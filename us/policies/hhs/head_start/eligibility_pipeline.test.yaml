- name: preschool_income_below_100_percent_is_eligible
  period:
    period_kind: custom
    name: calendar_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    <<: &standard_preschool_no_routes
      us:policies/hhs/head_start/eligibility_pipeline#input.participant_is_child: true
      us:policies/hhs/head_start/eligibility_pipeline#input.participant_is_pregnant_woman: false
