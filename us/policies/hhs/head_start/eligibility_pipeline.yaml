format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/regulation/45/1302/12
  summary: |-
    Person-level Head Start Preschool and Early Head Start eligibility
    composition under 45 CFR 1302.12. It combines the ordinary paragraph-(c)
    income, public-assistance, homelessness, and foster-care paths; the
    child-only 10-percent over-income exception; the below-130-percent
    additional allowance; and the Tribal and Migrant or Seasonal paths with
    the paragraph-(b) age predicates.

    Federal poverty-line dollars, verified family income, categorical facts,
    program enrollment-share and priority-policy facts, program context, and
    school-age/date determinations remain explicit runtime inputs in their
    encoded source modules. The 100-percent ordinary threshold is the direct
    paragraph-(c) comparison to the poverty line. The encoded 1.00 multiplier
    is only the lower bound of paragraph (d)(2)'s reporting interval; it is not
    repurposed as an eligibility parameter. The 130-percent allowance is
    strict: income exactly at 130 percent does not enter that path.

    These outputs mean that a person satisfies an eligibility or expressly
    authorized enrollment path. They do not determine selection, actual
    enrollment, funded-slot availability, take-up, continuity, priority among
    eligible applicants, or any imputed service value.
  deferred_outputs:
    - output: us:regulations/45-cfr/1302/12/g#community_with_1000_or_fewer_individuals_program_eligibility_criteria
      reason: |-
        Paragraph (g) depends on section 645(a)(2) of the Head Start Act and
        program-established criteria not represented by this Federal
        paragraph-(b)-(f) comparison surface.
    - output: us:regulations/45-cfr/1302/12/h#program_staff_age_verification_compliance
      reason: |-
        Paragraph (h) governs program verification policies and document
        barriers. The pipeline consumes the completed paragraph-(b) age facts
        and does not infer verification compliance.
    - output: us:regulations/45-cfr/1302/12/j#participant_eligibility_duration
      reason: |-
        Eligibility duration depends on actual program participation,
        succeeding-program-year continuity, funding authority, transition,
        and compelling-reason determinations. This pipeline determines the
        current eligibility surface only and never treats current eligibility
        as actual enrollment or continued participation.
    - output: us:regulations/45-cfr/1302/12/k#eligibility_determination_recordkeeping_compliance
      reason: |-
        Paragraph (k) imposes recordkeeping and retention duties rather than a
        scalar current-eligibility result.
    - output: us:regulations/45-cfr/1302/12/l#eligibility_violation_policy_compliance
      reason: |-
        Paragraph (l) governs written program policies and staff consequences,
        which are outside this person-level eligibility composition.
