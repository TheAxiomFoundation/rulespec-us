- name: adult_expansion_mandatory_group_eligible
  period: 2024-01
  input:
    us:policies/hhs/medicaid/eligibility#input.person_age: 30
    us:policies/hhs/medicaid/eligibility#input.person_is_pregnant: false
    us:policies/hhs/medicaid/eligibility#input.person_entitled_to_or_enrolled_in_medicare_part_a_or_b: false
    us:policies/hhs/medicaid/eligibility#input.person_described_in_subparagraph_a_i_previous_subclause: false
    us:policies/hhs/medicaid/eligibility#input.household_income_as_fraction_of_poverty_line: 1.0
    us:policies/hhs/medicaid/eligibility#input.person_described_in_or_enrolled_under_subparagraph_a_i_i_through_vii: false
    ? us:policies/hhs/medicaid/eligibility#input.person_income_exceeds_applicable_state_plan_level_for_subparagraph_a_i_i_through_vii
    : false
    ? us:policies/hhs/medicaid/eligibility#input.person_was_in_foster_care_under_state_responsibility_on_attaining_applicable_age
    : false
    us:policies/hhs/medicaid/eligibility#input.person_was_enrolled_in_medicaid_state_plan_or_waiver_while_in_foster_care: false
    us:policies/hhs/medicaid/eligibility#input.state_has_elected_optional_medicaid_group: false
    us:policies/hhs/medicaid/eligibility#input.person_is_in_state_elected_optional_group_under_subparagraph_a_ii: false
    ? us:policies/hhs/medicaid/eligibility#input.person_is_in_mandatory_group_under_subparagraph_a_i_other_than_adult_expansion_or_former_foster_care
    : false
    us:policies/hhs/medicaid/eligibility#input.person_is_entitled_to_medicare_cost_sharing_assistance_under_subparagraph_e: false
    us:policies/hhs/medicaid/eligibility#input.state_has_elected_cobra_premium_assistance: false
    us:policies/hhs/medicaid/eligibility#input.person_is_qualified_cobra_continuation_beneficiary: false
  output:
    us:policies/hhs/medicaid/eligibility#adult_expansion_mandatory_eligible: holds
    us:policies/hhs/medicaid/eligibility#former_foster_care_mandatory_eligible: not_holds
    us:policies/hhs/medicaid/eligibility#optional_group_eligible: not_holds
    us:policies/hhs/medicaid/eligibility#is_medicaid_eligible: holds
