format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/statute/42/1396a/a/10
  summary: "\"provide ... for making medical assistance available ... to\u2014 (i)\
    \ all individuals\" in listed mandatory groups, including the adult expansion\
    \ group and former foster-care group; \"at the option of the State\" to listed\
    \ optional groups; and separately for Medicare cost-sharing and optional COBRA\
    \ premiums, subject to stated amount, duration, scope, age, income, day-count,\
    \ and limited-benefit exceptions."
  deferred_outputs:
  - output: us:policies/hhs/medicaid/eligibility#medical_assistance_amount_duration_scope_comparable
    reason: Requires computable medical-assistance packages and covered individual
      classifications under subparagraphs (A), (B), (C), and (E), plus cited section
      1396d service definitions not supplied by this source slice.
  - output: us:policies/hhs/medicaid/eligibility#limited_benefit_medical_assistance_scope
    reason: Requires benefit-scope definitions and category membership under multiple
      cited provisions, including sections 1396d(a), 1396d(p), 1396o, 1396r-4, 1396e,
      and 1315.
rules:
- name: child_ssi_deeming_age_ceiling_years
  kind: parameter
  dtype: Count
  source: 42 USC 1396a(a)(10)(A)(i)(II)(cc)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us/statute/42/1396a/a/10
          excerpt: who are under 21 years of age
  versions:
  - effective_from: '1974-01-01'
    formula: '21'
- name: specified_low_income_medicare_beneficiary_income_limit_poverty_line_rate
  kind: parameter
  dtype: Rate
  source: 42 USC 1396a(a)(10)(E)(iii)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us/statute/42/1396a/a/10
          excerpt: less than 110 percent in 1993 and 1994
      - path: versions[1].formula
        kind: parameter
        source:
          corpus_citation_path: us/statute/42/1396a/a/10
          excerpt: 120 percent in 1995 and years thereafter
  versions:
  - effective_from: '1993-01-01'
    formula: '1.10'
  - effective_from: '1995-01-01'
    formula: '1.20'
- name: inpatient_hospital_durational_limit_exception_age_ceiling_years
  kind: parameter
  dtype: Count
  source: 42 USC 1396a(a)(10), exception (X)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us/statute/42/1396a/a/10
          excerpt: individuals under one year of age
  versions:
  - effective_from: '1974-01-01'
    formula: '1'
- name: adult_expansion_mandatory_eligible
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: 42 USC 1396a(a)(10)(A)(i)(VIII)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us/statute/42/1396a/a/10
          excerpt: under 65 years of age, not pregnant, not entitled to, or enrolled
            for ... Medicare ... not described in a previous subclause ... income
            ... does not exceed 133 percent
  versions:
  - effective_from: '2014-01-01'
    formula: 'person_age < adult_expansion_age_ceiling_years

      and not person_is_pregnant

      and not person_entitled_to_or_enrolled_in_medicare_part_a_or_b

      and not person_described_in_subparagraph_a_i_previous_subclause

      and household_income_as_fraction_of_poverty_line <= adult_expansion_income_limit_poverty_line_rate'
- name: former_foster_care_mandatory_eligible
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: 42 USC 1396a(a)(10)(A)(i)(IX)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us/statute/42/1396a/a/10
          excerpt: under 26 years of age ... were in foster care under the responsibility
            of a State ... and ... were enrolled in a State plan ... or under a waiver
  versions:
  - effective_from: '1974-01-01'
    formula: 'person_age < former_foster_care_age_ceiling_years

      and (not person_described_in_or_enrolled_under_subparagraph_a_i_i_through_vii
      or person_income_exceeds_applicable_state_plan_level_for_subparagraph_a_i_i_through_vii)

      and person_was_in_foster_care_under_state_responsibility_on_attaining_applicable_age

      and person_was_enrolled_in_medicaid_state_plan_or_waiver_while_in_foster_care'
- name: optional_group_eligible
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: 42 USC 1396a(a)(10)(A)(ii)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us/statute/42/1396a/a/10
          excerpt: at the option of the State ... any group or groups of individuals
            described in section 1396d(a)
  versions:
  - effective_from: '1974-01-01'
    formula: 'state_has_elected_optional_medicaid_group

      and person_is_in_state_elected_optional_group_under_subparagraph_a_ii'
- name: is_medicaid_eligible
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: 42 USC 1396a(a)(10)(A), (E), (F)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us/statute/42/1396a/a/10
          excerpt: "for making medical assistance available ... to\u2014 (i) all individuals\
            \ ... (ii) at the option of the State ...; (E) ... medicare cost-sharing\
            \ ...; (F) at the option of a State ... COBRA premiums"
  versions:
  - effective_from: '2014-01-01'
    formula: 'person_is_in_mandatory_group_under_subparagraph_a_i_other_than_adult_expansion_or_former_foster_care

      or adult_expansion_mandatory_eligible

      or former_foster_care_mandatory_eligible

      or optional_group_eligible

      or person_is_entitled_to_medicare_cost_sharing_assistance_under_subparagraph_e

      or (state_has_elected_cobra_premium_assistance and person_is_qualified_cobra_continuation_beneficiary)'
imports:
- us:statutes/42/1396a/a/10#adult_expansion_age_ceiling_years
- us:statutes/42/1396a/a/10#adult_expansion_income_limit_poverty_line_rate
- us:statutes/42/1396a/a/10#former_foster_care_age_ceiling_years
