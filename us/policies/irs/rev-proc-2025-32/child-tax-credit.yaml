format: rulespec/v1
module:
  summary: |-
    IRS Revenue Procedure 2025-32 publishes the tax year 2026
    inflation-adjusted child tax credit and refundable child tax credit
    amounts under IRC section 24.
  source_verification:
    corpus_citation_path: us/guidance/irs/rev-proc-2025-32/page-14
  values:
    ctc_child_maximum_amount: 2200
    ctc_refundable_child_amount: 1700
rules:
  - name: ctc_child_maximum_amount
    kind: parameter
    dtype: Money
    unit: USD
    source: Rev. Proc. 2025-32 section 3.05(1)
    versions:
      - effective_from: '2026-01-01'
        formula: '2200'
  - name: ctc_refundable_child_amount
    kind: parameter
    dtype: Money
    unit: USD
    source: Rev. Proc. 2025-32 section 3.05(2)
    versions:
      - effective_from: '2026-01-01'
        formula: '1700'
