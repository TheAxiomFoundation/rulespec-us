format: rulespec/v1
module:
  summary: |-
    IRS Revenue Procedure 2025-32 publishes tax year 2026 inflation-adjusted
    alternative minimum tax exemption amounts, exemption phaseout thresholds,
    and 28 percent rate thresholds under IRC section 55.
  source_verification:
    corpus_citation_path: us/guidance/irs/rev-proc-2025-32/page-16
  values:
    amt_exemption_joint: 140200
    amt_exemption_unmarried: 90100
    amt_exemption_separate: 70100
    amt_exemption_estate_trust: 31400
    amt_twenty_eight_percent_threshold_all_other: 244500
    amt_twenty_eight_percent_threshold_separate: 122250
    amt_exemption_phaseout_start_joint: 1000000
    amt_exemption_phaseout_start_unmarried: 500000
    amt_exemption_phaseout_start_separate: 500000
    amt_exemption_phaseout_start_estate_trust: 104800
    amt_exemption_complete_phaseout_separate: 640200
    amt_kiddie_tax_exemption_addition: 9750
rules:
  - name: amt_exemption_joint
    kind: parameter
    dtype: Money
    unit: USD
    source: Rev. Proc. 2025-32 section 3.10
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/guidance/irs/rev-proc-2025-32/page-17
    versions:
      - effective_from: '2026-01-01'
        formula: '140200'
  - name: amt_exemption_unmarried
    kind: parameter
    dtype: Money
    unit: USD
    source: Rev. Proc. 2025-32 section 3.10
    versions:
      - effective_from: '2026-01-01'
        formula: '90100'
  - name: amt_exemption_separate
    kind: parameter
    dtype: Money
    unit: USD
    source: Rev. Proc. 2025-32 section 3.10
    versions:
      - effective_from: '2026-01-01'
        formula: '70100'
  - name: amt_exemption_estate_trust
    kind: parameter
    dtype: Money
    unit: USD
    source: Rev. Proc. 2025-32 section 3.10
    versions:
      - effective_from: '2026-01-01'
        formula: '31400'
  - name: amt_exemption_base_amount
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Rev. Proc. 2025-32 section 3.10
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          match filing_status:
              1 => amt_exemption_joint
              4 => amt_exemption_joint
              2 => amt_exemption_separate
              3 => amt_exemption_unmarried
              0 => amt_exemption_unmarried
  - name: amt_twenty_eight_percent_threshold_all_other
    kind: parameter
    dtype: Money
    unit: USD
    source: Rev. Proc. 2025-32 section 3.10
    versions:
      - effective_from: '2026-01-01'
        formula: '244500'
  - name: amt_twenty_eight_percent_threshold_separate
    kind: parameter
    dtype: Money
    unit: USD
    source: Rev. Proc. 2025-32 section 3.10
    versions:
      - effective_from: '2026-01-01'
        formula: '122250'
  - name: amt_twenty_eight_percent_threshold
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Rev. Proc. 2025-32 section 3.10
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          if filing_status == 2:
              amt_twenty_eight_percent_threshold_separate
          else:
              amt_twenty_eight_percent_threshold_all_other
  - name: amt_exemption_phaseout_start_joint
    kind: parameter
    dtype: Money
    unit: USD
    source: Rev. Proc. 2025-32 section 3.10
    versions:
      - effective_from: '2026-01-01'
        formula: '1000000'
  - name: amt_exemption_phaseout_start_unmarried
    kind: parameter
    dtype: Money
    unit: USD
    source: Rev. Proc. 2025-32 section 3.10
    versions:
      - effective_from: '2026-01-01'
        formula: '500000'
  - name: amt_exemption_phaseout_start_separate
    kind: parameter
    dtype: Money
    unit: USD
    source: Rev. Proc. 2025-32 section 3.10
    versions:
      - effective_from: '2026-01-01'
        formula: '500000'
  - name: amt_exemption_phaseout_start_estate_trust
    kind: parameter
    dtype: Money
    unit: USD
    source: Rev. Proc. 2025-32 section 3.10
    versions:
      - effective_from: '2026-01-01'
        formula: '104800'
  - name: amt_exemption_phaseout_start
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Rev. Proc. 2025-32 section 3.10
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          match filing_status:
              1 => amt_exemption_phaseout_start_joint
              4 => amt_exemption_phaseout_start_joint
              2 => amt_exemption_phaseout_start_separate
              3 => amt_exemption_phaseout_start_unmarried
              0 => amt_exemption_phaseout_start_unmarried
  - name: amt_exemption_complete_phaseout_separate
    kind: parameter
    dtype: Money
    unit: USD
    source: Rev. Proc. 2025-32 section 3.10
    versions:
      - effective_from: '2026-01-01'
        formula: '640200'
  - name: amt_kiddie_tax_exemption_addition
