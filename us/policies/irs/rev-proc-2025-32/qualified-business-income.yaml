              excerpt: "Married Individuals Filing Joint Returns $403,500 $553,500"
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us/guidance/irs/rev-proc-2025-32/page-21
              excerpt: "For taxable years beginning in 2026"
          - path: versions[0].effective_to
            kind: effective_period
            source:
              corpus_citation_path: us/guidance/irs/rev-proc-2025-32/page-21
