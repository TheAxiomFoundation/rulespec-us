format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_paths:
      - us/guidance/irs/rev-proc-2025-32/page-21
      - us/guidance/irs/rev-proc-2025-32/page-22
      - us/statute/26/199A
    upstream_source_check:
      status: official_parameter_source
      checked_paths:
        - us/statute/26/199A
        - us/guidance/irs/rev-proc-2025-32/page-21
        - us/guidance/irs/rev-proc-2025-32/page-22
      rationale: |-
        Section 199A(e)(2)(B) requires annual inflation adjustment of the
        threshold amount and section 199A(b)(3)(B) prescribes the phase-in
        widths, but the statute does not state the indexed tax-year-2026
        thresholds. Revenue Procedure 2025-32 section 4.26 is the controlling
        official parameter source for those thresholds and publishes the
        corresponding range endpoints.
    values:
      qualified_business_income_threshold_joint: 403500
      qualified_business_income_phase_in_range_end_joint: 553500
      qualified_business_income_threshold_separate: 201775
      qualified_business_income_phase_in_range_end_separate: 276775
      qualified_business_income_threshold_all_other: 201750
      qualified_business_income_phase_in_range_end_all_other: 276750
      qualified_business_income_phase_in_width_joint: 150000
      qualified_business_income_phase_in_width_separate: 75000
      qualified_business_income_phase_in_width_all_other: 75000
  summary: |-
    Revenue Procedure 2025-32 section 4.26 publishes the tax-year-2026
    threshold and phase-in range endpoint under section 199A for each return
    category: $403,500 and $553,500 for married individuals filing jointly,
    $201,775 and $276,775 for married individuals filing separately, and
    $201,750 and $276,750 for all other returns.

    The corresponding phase-in widths are $150,000 for joint returns and
    $75,000 for separate and all-other returns. Those widths equal each
    published endpoint minus its threshold and agree with the current amounts
    stated in 26 USC 199A(b)(3)(B). Qualifying surviving spouse status is an
    all-other return for this table because it is not a joint return.
