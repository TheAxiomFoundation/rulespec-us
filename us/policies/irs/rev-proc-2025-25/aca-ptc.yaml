format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/guidance/irs/rev-proc-2025-25
  summary: "Rev. Proc. 2025-25 section 3.01: \"For taxable years beginning in calendar\
    \ year 2026, the Applicable Percentage Table for purposes of \xA7 36B(b)(3)(A)(i)\
    \ and \xA7 1.36B-3(g)\" lists initial and final percentages by household income\
    \ percentage of Federal poverty line: less than 133% (2.10%/2.10%); at least 133%\
    \ but less than 150% (3.14%/4.19%); at least 150% but less than 200% (4.19%/6.60%);\
    \ at least 200% but less than 250% (6.60%/8.44%); at least 250% but less than\
    \ 300% (8.44%/9.96%); at least 300% but not more than 400% (9.96%/9.96%). Section\
    \ 3.02: \"For plan years beginning in calendar year 2026, the Required Contribution\
    \ Percentage ... is 9.96%.\" Section 5: effective for taxable years and plan years\
    \ beginning in calendar year 2026."
