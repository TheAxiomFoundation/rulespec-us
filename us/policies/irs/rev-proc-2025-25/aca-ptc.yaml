- name: applicable_percentage_band_scalar_limit
  kind: parameter
  dtype: Count
  source: Rev. Proc. 2025-25, section 3.01
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us/guidance/irs/rev-proc-2025-25
          excerpt: 'Household income percentage of Federal poverty line: Less than
            133%; At least 133% but less than 150%; At least 150% but less than 200%;
            At least 200% but less than 250%; At least 250% but less than 300%; At
            least 300% but not more than 400%'
          table: &id001
            header: Applicable Percentage Table for 2026
            row_key: household_income_percentage_of_federal_poverty_line
            column_key: income_band
  versions:
  - effective_from: '2026-01-01'
    formula: '1.33'
