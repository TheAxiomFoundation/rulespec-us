- name: amt-single-wage-se
  # Exact GRID-CONTRACT boundary:
  # taxable SE income = 150,000 * 0.9235 = 138,525.
  # Wage leg = 0; reduced SE threshold = 200,000 - 100,000 = 100,000.
  # SE leg = 0.009 * (138,525 - 100,000) = 346.725.
  period: *tax_year_2026
  input:
    <<: *no_international_agreement_inputs
    us:statutes/26/3101/b/2#input.filing_status: 0
    us:policies/income_tax/additional_medicare_tax_pipeline#input.wages: 100000
    us:policies/income_tax/self_employment_tax_pipeline#relation.self_employed_individual_of_tax_unit:
      - <<: *domestic_se_person_inputs
        us:policies/income_tax/self_employment_tax_pipeline#input.gross_self_employment_profit: 150000
        us:statutes/26/1402/b#input.wages_paid_to_individual_during_taxable_year_for_section_1401_a: 100000
  output:
    us:policies/income_tax/additional_medicare_tax_pipeline#wages_taken_into_account_for_additional_medicare_tax: 100000
    us:policies/income_tax/self_employment_tax_pipeline#federal_self_employment_income: '138525'
    us:policies/income_tax/additional_medicare_tax_pipeline#pipeline_additional_medicare_self_employment_threshold: 200000
    us:policies/income_tax/additional_medicare_tax_pipeline#pipeline_reduced_additional_medicare_self_employment_threshold: 100000
    us:policies/income_tax/additional_medicare_tax_pipeline#pipeline_taxable_self_employment_income_for_additional_medicare_tax: '138525'
    us:policies/income_tax/additional_medicare_tax_pipeline#pipeline_additional_medicare_self_employment_tax_base: '38525'
    us:policies/income_tax/additional_medicare_tax_pipeline#federal_additional_medicare_wage_tax: '0'
    us:policies/income_tax/additional_medicare_tax_pipeline#federal_additional_medicare_self_employment_tax: '346.725'
    us:policies/income_tax/additional_medicare_tax_pipeline#federal_additional_medicare_tax: '346.725'

