# Hand-computed tax-year-2026 fixtures for 26 USC 3101(b)(2),
# 1401(b)(2), and the imported section 1402 path. Wages on a joint return are
# the sum of the GRID-CONTRACT primary and spouse columns. For each related
# Person, the imported SE pipeline derives:
#
#   taxable SE income = gross_self_employment_profit * 0.9235,
#
# subject to its encoded section 1402(b) floor and exclusions. Every expected
# amount is statutory decimal arithmetic at the section 1401(b)(2) 0.009 rate;
# none is sourced from PolicyEngine.

- name: amt-single-150k
  # Wage leg: 0.009 * max(0, 150,000 - 200,000) = 0.
  # Gross SE profit and the derived SE leg are both zero.
  period: &tax_year_2026
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    <<: &no_international_agreement_inputs
      us:policies/income_tax/additional_medicare_tax_pipeline#input.international_social_security_agreement_under_section_233_in_effect: false
      us:policies/income_tax/additional_medicare_tax_pipeline#input.self_employment_income_is_subject_exclusively_to_foreign_social_security_laws_under_agreement: false
      us:policies/income_tax/additional_medicare_tax_pipeline#input.self_employment_income_amount_subject_exclusively_to_foreign_social_security_laws_under_agreement: 0
    us:statutes/26/3101/b/2#input.filing_status: 0
    us:policies/income_tax/additional_medicare_tax_pipeline#input.wages: 150000
    us:policies/income_tax/self_employment_tax_pipeline#relation.self_employed_individual_of_tax_unit:
      - <<: &domestic_se_person_inputs
          us:statutes/26/1402/b#input.individual_is_nonresident_alien: false
          us:statutes/26/1402/b#input.agreement_under_social_security_act_section_233_provides_for_individual: false
          us:statutes/26/1402/b#input.individual_is_not_united_states_citizen_and_resident_of_puerto_rico_virgin_islands_guam_or_american_samoa: false
        us:policies/income_tax/self_employment_tax_pipeline#input.gross_self_employment_profit: 0
        us:statutes/26/1402/b#input.wages_paid_to_individual_during_taxable_year_for_section_1401_a: 150000
  output:
    us:policies/income_tax/additional_medicare_tax_pipeline#wages_taken_into_account_for_additional_medicare_tax: 150000
    us:policies/income_tax/self_employment_tax_pipeline#federal_self_employment_income: '0'
    us:policies/income_tax/additional_medicare_tax_pipeline#federal_additional_medicare_wage_tax: '0'
    us:policies/income_tax/additional_medicare_tax_pipeline#federal_additional_medicare_self_employment_tax: '0'
    us:policies/income_tax/additional_medicare_tax_pipeline#federal_additional_medicare_tax: '0'

- name: amt-single-250k
