    us:policies/income_tax/additional_medicare_tax_pipeline#federal_additional_medicare_wage_tax: '1800'
    us:policies/income_tax/additional_medicare_tax_pipeline#federal_additional_medicare_self_employment_tax: '0'
    us:policies/income_tax/additional_medicare_tax_pipeline#federal_additional_medicare_tax: '1800'

- name: amt-single-wage-completed-se-income-replacement
  # Proposed replacement for the ill-posed gross-profit row:
  # reduced SE threshold = 200,000 - 100,000 wages = 100,000.
  # Wage leg = 0; SE leg = 0.009 * (150,000 - 100,000) = 450.
  period: *tax_year_2026
  input:
    <<: *no_international_agreement_inputs
    us:statutes/26/3101/b/2#input.filing_status: 0
    us:policies/income_tax/additional_medicare_tax_pipeline#input.wages: 100000
    us:statutes/26/1401#input.self_employment_income: 150000
  output:
    us:policies/income_tax/additional_medicare_tax_pipeline#wages_taken_into_account_for_additional_medicare_tax: 100000
    us:policies/income_tax/additional_medicare_tax_pipeline#federal_additional_medicare_wage_tax: '0'
    us:policies/income_tax/additional_medicare_tax_pipeline#federal_additional_medicare_self_employment_tax: '450'
    us:policies/income_tax/additional_medicare_tax_pipeline#federal_additional_medicare_tax: '450'

