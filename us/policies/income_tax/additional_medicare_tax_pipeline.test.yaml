  output:
    us:policies/income_tax/additional_medicare_tax_pipeline#wages_taken_into_account_for_additional_medicare_tax: 250000
    us:policies/income_tax/self_employment_tax_pipeline#federal_self_employment_income: '0'
    us:policies/income_tax/additional_medicare_tax_pipeline#federal_additional_medicare_wage_tax: '450'
