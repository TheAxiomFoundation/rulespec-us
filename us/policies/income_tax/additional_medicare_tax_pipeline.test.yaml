# Hand-computed tax-year-2026 fixtures for 26 USC 3101(b)(2) and
# 1401(b)(2). Wages on a joint return are the sum of the GRID-CONTRACT
# primary and spouse columns. Every expected amount is statutory arithmetic
# at the encoded 0.009 rate; none is sourced from PolicyEngine.
#
# GRID-CONTRACT case `amt-single-wage-se` is intentionally absent. Its
# `$150,000 SE net profit` is not the completed section 1402(b)
# `self_employment_income` required by the encoded section 1401 rule, and the
# GRID supplies none of the deferred section 1402(a) facts needed to produce
# that amount. The `amt-single-wage-completed-se-income-replacement` case below
# is the proposed well-posed replacement.

- name: amt-single-150k
  # Wage leg: 0.009 * max(0, 150,000 - 200,000) = 0.
  # SE leg: 0.009 * max(0, 0 - (200,000 - 150,000)) = 0.
  period: &tax_year_2026
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    <<: &no_international_agreement_inputs
      us:statutes/26/1401#input.international_social_security_agreement_under_section_233_in_effect: false
      us:statutes/26/1401#input.self_employment_income_is_subject_exclusively_to_foreign_social_security_laws_under_agreement: false
      us:statutes/26/1401#input.self_employment_income_amount_subject_exclusively_to_foreign_social_security_laws_under_agreement: 0
    us:statutes/26/3101/b/2#input.filing_status: 0
    us:policies/income_tax/additional_medicare_tax_pipeline#input.wages: 150000
    us:statutes/26/1401#input.self_employment_income: 0
  output:
    us:policies/income_tax/additional_medicare_tax_pipeline#wages_taken_into_account_for_additional_medicare_tax: 150000
    us:policies/income_tax/additional_medicare_tax_pipeline#federal_additional_medicare_wage_tax: '0'
    us:policies/income_tax/additional_medicare_tax_pipeline#federal_additional_medicare_self_employment_tax: '0'
    us:policies/income_tax/additional_medicare_tax_pipeline#federal_additional_medicare_tax: '0'

- name: amt-single-250k
  # Wage leg: 0.009 * (250,000 - 200,000) = 450; SE leg = 0.
  period: *tax_year_2026
  input:
    <<: *no_international_agreement_inputs
    us:statutes/26/3101/b/2#input.filing_status: 0
    us:policies/income_tax/additional_medicare_tax_pipeline#input.wages: 250000
    us:statutes/26/1401#input.self_employment_income: 0
  output:
    us:policies/income_tax/additional_medicare_tax_pipeline#wages_taken_into_account_for_additional_medicare_tax: 250000
    us:policies/income_tax/additional_medicare_tax_pipeline#federal_additional_medicare_wage_tax: '450'
    us:policies/income_tax/additional_medicare_tax_pipeline#federal_additional_medicare_self_employment_tax: '0'
    us:policies/income_tax/additional_medicare_tax_pipeline#federal_additional_medicare_tax: '450'

- name: amt-joint-300k
  # Joint wages: 150,000 + 150,000 = 300,000.
  # Wage leg: 0.009 * (300,000 - 250,000) = 450; SE leg = 0.
  period: *tax_year_2026
  input:
    <<: *no_international_agreement_inputs
    us:statutes/26/3101/b/2#input.filing_status: 1
    us:policies/income_tax/additional_medicare_tax_pipeline#input.wages: 300000
    us:statutes/26/1401#input.self_employment_income: 0
  output:
    us:policies/income_tax/additional_medicare_tax_pipeline#wages_taken_into_account_for_additional_medicare_tax: 300000
    us:policies/income_tax/additional_medicare_tax_pipeline#federal_additional_medicare_wage_tax: '450'
    us:policies/income_tax/additional_medicare_tax_pipeline#federal_additional_medicare_self_employment_tax: '0'
    us:policies/income_tax/additional_medicare_tax_pipeline#federal_additional_medicare_tax: '450'

- name: amt-mfs-150k
  # Wage leg: 0.009 * (150,000 - 125,000) = 225; SE leg = 0.
  period: *tax_year_2026
  input:
    <<: *no_international_agreement_inputs
    us:statutes/26/3101/b/2#input.filing_status: 2
    us:policies/income_tax/additional_medicare_tax_pipeline#input.wages: 150000
    us:statutes/26/1401#input.self_employment_income: 0
  output:
    us:policies/income_tax/additional_medicare_tax_pipeline#wages_taken_into_account_for_additional_medicare_tax: 150000
    us:policies/income_tax/additional_medicare_tax_pipeline#federal_additional_medicare_wage_tax: '225'
    us:policies/income_tax/additional_medicare_tax_pipeline#federal_additional_medicare_self_employment_tax: '0'
    us:policies/income_tax/additional_medicare_tax_pipeline#federal_additional_medicare_tax: '225'

- name: amt-joint-450k
  # Joint wages: 400,000 + 50,000 = 450,000.
  # Wage leg: 0.009 * (450,000 - 250,000) = 1,800; SE leg = 0.
  period: *tax_year_2026
  input:
    <<: *no_international_agreement_inputs
