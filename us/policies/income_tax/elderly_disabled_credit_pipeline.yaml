format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_paths:
      - us/statute/26/22
      - us/statute/26/104
    upstream_source_check:
      status: checked_higher_authority
      checked_paths:
        - us/statute/26/22
        - us/statute/26/104
      rationale: |-
        Section 22's executable module derives qualified-individual status,
        the $5,000/$7,500/$3,750 initial amounts, the disability-income bound,
        the nontaxable-benefit reduction, the one-half AGI-excess reduction,
        filing and nonresident-alien gates, and the final 15-percent credit.
        Section 104(a)(4) was checked because section 22(c)(3) subtracts
        qualifying service-injury pensions from the benefit reduction.
  summary: |-
    Thin federal credit for the elderly and permanently and totally disabled
    composition under 26 USC 22 for tax year 2026. The caller supplies
    completed-return AGI, filing and residency facts, excluded-benefit totals,
    taxpayer/spouse person facts, and any section 104(a)(4) payment facts
    consumed by the encoded module's two relations. This composition imports
    and exposes the encoded final `elderly_disabled_credit`; it does not
    reconstruct qualification, initial amounts, reductions, or the
    15-percent rate.

    The companion verifies both aged and under-65 disability branches. The
    joint case with only one qualified spouse uses the encoded and statutory
    $5,000 initial amount. Every expected value is the statutory section 22
    credit before section 26 applies.
imports:
  - us:statutes/26/22#elderly_disabled_credit
rules:
  - name: federal_elderly_disabled_credit
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 22(a), imported encoded final credit for the elderly and permanently and totally disabled
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/26/22#elderly_disabled_credit
              output: elderly_disabled_credit
              hash: sha256:b8f25c27474cb04699f57c9f68da133f38eb5555c01fcf0a3521d4e9efb8d242
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/22
              excerpt: "an amount equal to 15 percent of such individual’s section 22 amount"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: elderly_disabled_credit

inputs:
  - name: filing_status
    entity: TaxUnit
    dtype: Integer
    period: Year
    description: Section 22 filing-status code; 0 single/other, 1 joint, 2 married filing separately, 3 head of household, 4 surviving spouse.
  - name: adjusted_gross_income
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    description: Completed-return adjusted gross income used by section 22(d).
  - name: social_security_title_ii_benefits_excluded_from_gross_income
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    description: Nontaxable title II benefits included in the section 22(c)(3) reduction.
  - name: railroad_retirement_act_benefits_excluded_from_gross_income
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    description: Nontaxable Railroad Retirement Act benefits included in the section 22(c)(3) reduction.
  - name: veterans_affairs_pension_annuity_or_disability_benefits_excluded_from_gross_income
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    description: Nontaxable Department of Veterans Affairs benefits before the section 104(a)(4) exception.
  - name: other_non_title_pension_annuity_or_disability_benefits_excluded_from_gross_income
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    description: Other non-title pension, annuity, or disability benefits included in the section 22(c)(3) reduction.
  - name: workers_compensation_treated_as_social_security_benefit
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    description: Workers' compensation treated as a social security benefit under section 86(d)(3).
  - name: married_at_close_of_taxable_year
    entity: TaxUnit
    dtype: Boolean
    period: Year
    description: Whether the taxpayer is married at the close of the taxable year.
  - name: spouses_lived_apart_all_year
    entity: TaxUnit
    dtype: Boolean
    period: Year
    description: Whether married spouses lived apart at all times during the taxable year.
  - name: is_nonresident_alien
    entity: TaxUnit
    dtype: Boolean
    period: Year
    description: Section 22(f) nonresident-alien ineligibility fact.
  - name: age
    entity: Person
    dtype: Integer
    period: Year
    description: Taxpayer or spouse age at the close of the taxable year.
  - name: retired_on_disability_before_year_end
    entity: Person
    dtype: Boolean
    period: Year
    description: Whether the person retired on disability before the close of the taxable year.
  - name: unable_to_engage_substantial_gainful_activity
    entity: Person
    dtype: Boolean
    period: Year
    description: Whether the person cannot engage in substantial gainful activity.
  - name: medically_determinable_impairment
    entity: Person
    dtype: Boolean
    period: Year
    description: Whether a medically determinable physical or mental impairment causes the inability.
  - name: impairment_expected_to_result_in_death
    entity: Person
    dtype: Boolean
    period: Year
    description: Whether the impairment can be expected to result in death.
  - name: impairment_duration_months
    entity: Person
    dtype: Integer
    period: Year
    description: Actual or expected continuous duration of the impairment in months.
  - name: disability_proof_furnished
    entity: Person
    dtype: Boolean
    period: Year
    description: Whether the individual furnished the proof required by section 22(e)(3).
  - name: section_22_disability_income
    entity: Person
    dtype: Money
    period: Year
    unit: USD
    description: Section 72 or 105(a) wages or wage-substitute disability income for an under-65 qualified individual.
  - name: payment_amount
    entity: Payment
    dtype: Money
    period: Year
    unit: USD
    description: Amount of a payment considered under the transitive section 104(a)(4) exception.
  - name: payment_received_as_pension_annuity_or_similar_allowance
    entity: Payment
