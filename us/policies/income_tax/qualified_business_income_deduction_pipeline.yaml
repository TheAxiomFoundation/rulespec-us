  - name: qualified_business_income_allocable_to_qualified_cooperative_payments
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    description: Resolved QBI allocable to qualified cooperative payments.
  - name: w2_wages_allocable_to_qualified_cooperative_payments
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    description: Resolved W-2 wages allocable to qualified cooperative payments.
  - name: qualified_reit_dividends
    entity: TaxUnit
