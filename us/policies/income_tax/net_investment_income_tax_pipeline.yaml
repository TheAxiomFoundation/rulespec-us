format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_paths:
      - us/statute/26/1411
      - us/statute/26/911
    upstream_source_check:
      status: checked_higher_authority
      checked_paths:
        - us/statute/26/1411
        - us/statute/26/911
      rationale: |-
        Section 1411's executable module already derives modified adjusted
        gross income, filing-status thresholds, net investment income,
        statutory exclusions, nonapplication rules, tax base, and final tax.
        Section 911 was checked because section 1411(d) expressly modifies AGI
        using the section 911(a)(1) exclusion and section 911(d)(6)
        disallowances; those encoded concepts are transitive imports of the
        section 1411 module.
  summary: |-
    Thin federal individual net investment income tax composition under
    26 USC 1411 for tax year 2026. Adjusted gross income is a completed-return
    TaxUnit boundary. The caller supplies the investment-income components,
    allocable deductions, qualified-plan distributions, self-employment income
    already taxed under section 1401(b), filing status, section 911 facts, and
    section 1411(e) applicability facts consumed by the encoded section 1411
    module. This composition imports and exposes that module's final
    `net_investment_income_tax`; it does not reconstruct MAGI, net investment
    income, thresholds, the 3.8-percent rate, or the lesser-of tax base.

    The individual companion cases have no section 911 amounts, so encoded
    modified adjusted gross income equals supplied AGI. Their AGI values equal
    the GRID-CONTRACT wages plus listed investment items, but wages remain
    fixture documentation rather than a second AGI computation.
  deferred_outputs:
    - output: us:policies/income_tax/net_investment_income_tax_pipeline#federal_estate_or_trust_net_investment_income_tax
      reason: |-
        This pipeline's declared runtime surface and companion cases cover
        individuals only. Section 1411(a)(2)(B)(ii) requires the tax-year
        amount at which section 1(e)'s highest estate/trust bracket begins;
        no executable 2026 encoding of that amount was found in the surveyed
        federal tree. Estate/trust wiring is therefore deferred rather than
        assigning an invented policy value.
imports:
  - us:statutes/26/1411#net_investment_income_tax
rules:
  - name: federal_net_investment_income_tax
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 1411(a)(1), imported encoded final individual net investment income tax
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/26/1411#net_investment_income_tax
              output: net_investment_income_tax
              hash: sha256:8443d708729dfbb96068f13dae059614117dffac45ee0b3e721044c40ef05bfd
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/1411
              excerpt: "a tax equal to 3.8 percent of the lesser of"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: net_investment_income_tax

