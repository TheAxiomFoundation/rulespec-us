# Hand-computed tax-year-2026 individual fixtures for 26 USC 1411. All
# section 911 inputs are zero, so MAGI = AGI. Investment income is the sum of
# the listed interest, dividends, gain, and passive rent; all other encoded
# components and exclusions are zero. Expected tax is:
#
#   0.038 * min(net investment income, max(0, MAGI - status threshold)).
#
# AGI in each GRID-CONTRACT case equals documented wages plus the listed
# investment items. Wages are comments only because the encoded rule consumes
# completed-return AGI. No expected value is sourced from PolicyEngine.

- name: niit-under
  # AGI = 150,000 wages + 20,000 interest = 170,000.
  # NII = 20,000; single MAGI excess = max(0, 170,000 - 200,000) = 0.
  # Tax = 0.038 * min(20,000, 0) = 0.
  period: &tax_year_2026
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    <<: &common_individual_niit_inputs
      us:statutes/26/911/a/1#input.elected_foreign_earned_income_exclusion_amount: 0
      us:statutes/26/911/d/6#input.deduction_under_subtitle_before_section_911_double_benefit_denial: 0
      us:statutes/26/911/d/6#input.deduction_properly_allocable_or_chargeable_to_amounts_excluded_under_subsection_a: 0
      us:statutes/26/911/d/6#input.exclusion_from_gross_income_under_subtitle_before_section_911_double_benefit_denial: 0
      us:statutes/26/911/d/6#input.exclusion_properly_allocable_or_chargeable_to_amounts_excluded_under_subsection_a: 0
      us:statutes/26/1411#input.annuity_income: 0
      us:statutes/26/1411#input.royalty_income: 0
      us:statutes/26/1411#input.passive_activity_business_income: 0
      us:statutes/26/1411#input.financial_trading_business_income: 0
      us:statutes/26/1411#input.investment_of_working_capital_income: 0
      us:statutes/26/1411#input.allocable_investment_deductions: 0
      us:statutes/26/1411#input.qualified_plan_distributions: 0
      us:statutes/26/1411#input.self_employment_income_subject_to_1401_b: 0
      us:statutes/26/1411#input.is_nonresident_alien: false
      us:statutes/26/1411#input.trust_all_unexpired_interests_devoted_to_section_170_c_2_B_purposes: false
      us:statutes/26/1411#input.is_individual: true
    us:statutes/26/1411#input.filing_status: 0
    us:statutes/26/1411#input.adjusted_gross_income: 170000
    us:statutes/26/1411#input.taxable_interest_income: 20000
    us:statutes/26/1411#input.dividend_income: 0
    us:statutes/26/1411#input.rental_income: 0
    us:statutes/26/1411#input.taxable_net_gain_from_dispositions_after_active_partnership_s_corporation_exception: 0
  output:
    us:policies/income_tax/net_investment_income_tax_pipeline#federal_net_investment_income_tax: '0'

- name: niit-single-mixed
  # AGI = 190,000 wages + 10,000 interest + 15,000 dividends + 15,000 gain
  # = 230,000. NII = 40,000; single excess = 30,000.
  # Tax = 0.038 * min(40,000, 30,000) = 1,140.
  period: *tax_year_2026
  input:
    <<: *common_individual_niit_inputs
    us:statutes/26/1411#input.filing_status: 0
    us:statutes/26/1411#input.adjusted_gross_income: 230000
    us:statutes/26/1411#input.taxable_interest_income: 10000
    us:statutes/26/1411#input.dividend_income: 15000
    us:statutes/26/1411#input.rental_income: 0
    us:statutes/26/1411#input.taxable_net_gain_from_dispositions_after_active_partnership_s_corporation_exception: 15000
  output:
    us:policies/income_tax/net_investment_income_tax_pipeline#federal_net_investment_income_tax: '1140'

- name: niit-joint-gains
  # AGI = 200,000 wages + 100,000 gain = 300,000.
  # NII = 100,000; joint excess = 300,000 - 250,000 = 50,000.
  # Tax = 0.038 * min(100,000, 50,000) = 1,900.
  period: *tax_year_2026
  input:
    <<: *common_individual_niit_inputs
    us:statutes/26/1411#input.filing_status: 1
    us:statutes/26/1411#input.adjusted_gross_income: 300000
    us:statutes/26/1411#input.taxable_interest_income: 0
    us:statutes/26/1411#input.dividend_income: 0
    us:statutes/26/1411#input.rental_income: 0
    us:statutes/26/1411#input.taxable_net_gain_from_dispositions_after_active_partnership_s_corporation_exception: 100000
  output:
    us:policies/income_tax/net_investment_income_tax_pipeline#federal_net_investment_income_tax: '1900'

- name: niit-mfs
  # AGI = 150,000 wages + 10,000 interest + 10,000 dividends + 10,000 gain
  # = 180,000. NII = 30,000; separate-return excess = 55,000.
  # Tax = 0.038 * min(30,000, 55,000) = 1,140.
  period: *tax_year_2026
  input:
    <<: *common_individual_niit_inputs
    us:statutes/26/1411#input.filing_status: 2
    us:statutes/26/1411#input.adjusted_gross_income: 180000
    us:statutes/26/1411#input.taxable_interest_income: 10000
    us:statutes/26/1411#input.dividend_income: 10000
    us:statutes/26/1411#input.rental_income: 0
    us:statutes/26/1411#input.taxable_net_gain_from_dispositions_after_active_partnership_s_corporation_exception: 10000
  output:
    us:policies/income_tax/net_investment_income_tax_pipeline#federal_net_investment_income_tax: '1140'

- name: niit-inv-only
  # AGI = NII = 100,000 interest + 100,000 dividends + 300,000 gain = 500,000.
  # Single excess = 500,000 - 200,000 = 300,000.
  # Tax = 0.038 * min(500,000, 300,000) = 11,400.
  period: *tax_year_2026
  input:
    <<: *common_individual_niit_inputs
    us:statutes/26/1411#input.filing_status: 0
    us:statutes/26/1411#input.adjusted_gross_income: 500000
    us:statutes/26/1411#input.taxable_interest_income: 100000
    us:statutes/26/1411#input.dividend_income: 100000
    us:statutes/26/1411#input.rental_income: 0
    us:statutes/26/1411#input.taxable_net_gain_from_dispositions_after_active_partnership_s_corporation_exception: 300000
  output:
    us:policies/income_tax/net_investment_income_tax_pipeline#federal_net_investment_income_tax: '11400'

- name: niit-rental
  # AGI = 240,000 wages + 60,000 passive rent = 300,000.
  # NII = 60,000; joint excess = 300,000 - 250,000 = 50,000.
  # Tax = 0.038 * min(60,000, 50,000) = 1,900.
  period: *tax_year_2026
  input:
    <<: *common_individual_niit_inputs
    us:statutes/26/1411#input.filing_status: 1
    us:statutes/26/1411#input.adjusted_gross_income: 300000
    us:statutes/26/1411#input.taxable_interest_income: 0
    us:statutes/26/1411#input.dividend_income: 0
    us:statutes/26/1411#input.rental_income: 60000
    us:statutes/26/1411#input.taxable_net_gain_from_dispositions_after_active_partnership_s_corporation_exception: 0
  output:
    us:policies/income_tax/net_investment_income_tax_pipeline#federal_net_investment_income_tax: '1900'

- name: niit-zero
  # AGI = NII = 0, so tax = 0.
  period: *tax_year_2026
  input:
    <<: *common_individual_niit_inputs
    us:statutes/26/1411#input.filing_status: 0
    us:statutes/26/1411#input.adjusted_gross_income: 0
    us:statutes/26/1411#input.taxable_interest_income: 0
    us:statutes/26/1411#input.dividend_income: 0
    us:statutes/26/1411#input.rental_income: 0
    us:statutes/26/1411#input.taxable_net_gain_from_dispositions_after_active_partnership_s_corporation_exception: 0
  output:
    us:policies/income_tax/net_investment_income_tax_pipeline#federal_net_investment_income_tax: '0'

- name: niit-single-at-threshold
  # Implied wages are 199,999 and interest is 1, so AGI = MAGI = 200,000.
  # NII = 1 but MAGI excess is zero; tax = 0.
  period: *tax_year_2026
  input:
    <<: *common_individual_niit_inputs
    us:statutes/26/1411#input.filing_status: 0
    us:statutes/26/1411#input.adjusted_gross_income: 200000
    us:statutes/26/1411#input.taxable_interest_income: 1
    us:statutes/26/1411#input.dividend_income: 0
    us:statutes/26/1411#input.rental_income: 0
    us:statutes/26/1411#input.taxable_net_gain_from_dispositions_after_active_partnership_s_corporation_exception: 0
  output:
    us:policies/income_tax/net_investment_income_tax_pipeline#federal_net_investment_income_tax: '0'

- name: niit-single-one-dollar-over
  # Implied wages are 200,000 and interest is 1, so AGI = MAGI = 200,001.
  # NII = 1 and MAGI excess = 1; tax = 0.038 * min(1, 1) = 0.038.
  period: *tax_year_2026
  input:
    <<: *common_individual_niit_inputs
    us:statutes/26/1411#input.filing_status: 0
    us:statutes/26/1411#input.adjusted_gross_income: 200001
    us:statutes/26/1411#input.taxable_interest_income: 1
    us:statutes/26/1411#input.dividend_income: 0
    us:statutes/26/1411#input.rental_income: 0
    us:statutes/26/1411#input.taxable_net_gain_from_dispositions_after_active_partnership_s_corporation_exception: 0
  output:
    us:policies/income_tax/net_investment_income_tax_pipeline#federal_net_investment_income_tax: '0.038'
