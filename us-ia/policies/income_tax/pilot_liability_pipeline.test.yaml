- name: noneligible_filer_uses_regular_tax
  # Regular tax is $380. The otherwise lower alternate calculation is ignored.
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    us-ia:policies/income_tax/pilot_liability_pipeline#input.ia_pit_pilot_state_taxable_income: 10000
    us-ia:policies/income_tax/pilot_liability_pipeline#input.ia_pit_pilot_modified_income: 14000
    us-ia:policies/income_tax/pilot_liability_pipeline#input.ia_pit_pilot_supplied_regular_tax_rate: 0.038
    us-ia:policies/income_tax/pilot_liability_pipeline#input.ia_pit_pilot_supplied_alternate_tax_rate: 0.043
    us-ia:policies/income_tax/pilot_liability_pipeline#input.ia_pit_pilot_alternate_tax_eligible: false
    us-ia:policies/income_tax/pilot_liability_pipeline#input.ia_pit_pilot_head_or_spouse_age_65_or_older: false
  output:
    us-ia:policies/income_tax/pilot_liability_pipeline#ia_pit_pilot_taxable_income: '10000'
    us-ia:policies/income_tax/pilot_liability_pipeline#ia_pit_pilot_schedule_tax: '380'
    us-ia:policies/income_tax/pilot_liability_pipeline#ia_pit_pilot_income_tax_liability: '380'
- name: nonelderly_alternate_tax_is_less
  # Alternate tax is 4.3% * (15,000 - 13,500) = $64.50, below $380 regular tax.
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    us-ia:policies/income_tax/pilot_liability_pipeline#input.ia_pit_pilot_state_taxable_income: 10000
    us-ia:policies/income_tax/pilot_liability_pipeline#input.ia_pit_pilot_modified_income: 15000
    us-ia:policies/income_tax/pilot_liability_pipeline#input.ia_pit_pilot_supplied_regular_tax_rate: 0.038
    us-ia:policies/income_tax/pilot_liability_pipeline#input.ia_pit_pilot_supplied_alternate_tax_rate: 0.043
    us-ia:policies/income_tax/pilot_liability_pipeline#input.ia_pit_pilot_alternate_tax_eligible: true
    us-ia:policies/income_tax/pilot_liability_pipeline#input.ia_pit_pilot_head_or_spouse_age_65_or_older: false
  output:
    us-ia:policies/income_tax/pilot_liability_pipeline#ia_pit_pilot_taxable_income: '10000'
    us-ia:policies/income_tax/pilot_liability_pipeline#ia_pit_pilot_schedule_tax: '380'
    us-ia:policies/income_tax/pilot_liability_pipeline#ia_pit_pilot_income_tax_liability: '64.5'
