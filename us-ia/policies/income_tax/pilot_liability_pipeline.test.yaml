# Hand-computed 2026 fixtures for the Iowa Code § 422.5 regular/alternate-tax
# selector. The supplied inputs are completed-return TaxUnit boundaries.
- name: zero_taxable_income
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    us-ia:policies/income_tax/pilot_liability_pipeline#input.ia_pit_pilot_state_taxable_income: 0
    us-ia:policies/income_tax/pilot_liability_pipeline#input.ia_pit_pilot_modified_income: 0
    us-ia:policies/income_tax/pilot_liability_pipeline#input.ia_pit_pilot_supplied_regular_tax_rate: 0.038
    us-ia:policies/income_tax/pilot_liability_pipeline#input.ia_pit_pilot_supplied_alternate_tax_rate: 0.043
    us-ia:policies/income_tax/pilot_liability_pipeline#input.ia_pit_pilot_alternate_tax_eligible: false
    us-ia:policies/income_tax/pilot_liability_pipeline#input.ia_pit_pilot_head_or_spouse_age_65_or_older: false
  output:
    us-ia:policies/income_tax/pilot_liability_pipeline#ia_pit_pilot_taxable_income: '0'
    us-ia:policies/income_tax/pilot_liability_pipeline#ia_pit_pilot_schedule_tax: '0'
    us-ia:policies/income_tax/pilot_liability_pipeline#ia_pit_pilot_income_tax_liability: '0'
