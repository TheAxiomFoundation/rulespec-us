format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_paths:
      - us-ia/statute/422.4
      - us-ia/statute/422.5
      - us-ia/statute/422.7
      - us-ia/statute/422.9
      - us-ia/statute/422.12
      - us-ia/statute/422.12B
      - us-ia/statute/422.12C
    upstream_source_check:
      status: checked_higher_authority
      checked_paths:
        - us-ia/statute/422.4
        - us-ia/statute/422.5
        - us-ia/statute/422.7
        - us-ia/statute/422.9
        - us-ia/statute/422.12
        - us-ia/statute/422.12B
        - us-ia/statute/422.12C
      rationale: |-
        The pinned official corpus contains the Iowa Code 2026 PDFs for the
        individual-income-tax base, the 3.8 percent regular rate, the 4.3
        percent alternate-tax mechanics, personal/tuition/service credits,
        the refundable earned-income credit, and the refundable child-care or
        early-childhood-development credit.

        The pinned corpus does not contain tax-year-2026 IA 1040 annual-return
        forms or instructions. It also does not supply the operative 2026
        indexed contribution limits needed for Iowa 529, ABLE, and first-time
        homebuyer deductions, or all cross-referenced eligibility law and
        ordering instructions for the many Chapter 422 specialty credits.
        This module therefore starts with the allowed federal taxable-income
        output and raw categorized transaction facts, computes a bounded
        ordinary full-year-resident core, and stops after the encoded
        refundable credits. It does not claim complete Iowa net income,
        taxable income, or final liability. Married-separate, dependent-filer,
        unresolved adjustment, tuition-credit, and early-childhood-credit
        branches are excluded instead of accepting caller-completed Iowa legal
        results. All tax-unit Money rules are private composition helpers; the
        supported-profile Judgment is the public executable surface.
  summary: |-
    Iowa tax-year-2026 full-year-resident individual-income-tax core for
    nondependent filers using a supported federal filing status other than
    married filing separately. It starts with federal taxable income, applies
    directly supported raw-fact Iowa adjustments, computes the 3.8 percent
    regular tax and the source-directed low-income or 4.3 percent alternate
    limitation, includes a nonexempt separately taxed lump-sum distribution
    in the low-income test, and applies supported personal, dependent, age,
    source-derived blindness, service, earned-income, and child-care credits.
    Every tax-unit Money rule is private so an invalid profile cannot resolve a
    public Iowa amount.

    The terminal amount may be negative because the encoded earned-income and
    care credits are refundable. It remains a partial core, not final Iowa
    liability, because legacy Iowa NOLs, indexed deductions, complex
    business/farm modifications, lifetime-election adjustments,
    married-separate and dependent-filer mechanics, tuition and
    early-childhood credits, foreclosure caps, claim-of-right relief,
    specialty credits, carryforwards, and the official 2026 annual-return
    ordering are not complete in the pinned source chain.
  deferred_outputs:
    - output: us-ia:policies/income_tax/2026_full_year_resident_core#ia_2026_resident_net_income
      reason: |-
        Complete section 422.7 net income additionally requires the
        cross-referenced disability-income computation, qualifying-employee
        per-worker wage deductions, farm-election history and allocation,
        section 163(j) recomputation, indexed Iowa 529/ABLE/homebuyer
        contribution limits, and other complex adjustments not encoded here.
    - output: us-ia:policies/income_tax/2026_full_year_resident_core#ia_2026_resident_taxable_income
      reason: |-
        Complete taxable income depends on all section 422.7 adjustments and
        the availability and carryover amount of every pre-2023 Iowa NOL under
        the incorporated Code 2018 rule.
    - output: us-ia:policies/income_tax/2026_full_year_resident_core#ia_2026_unsupported_adjustment_branch
      reason: |-
        The bounded executable profile requires zero applicability for
        pre-2023 Iowa NOL carryovers, nonmilitary retirement exclusions,
        Iowa 529/ABLE and first-time-homebuyer transactions, qualifying
        family-caregiver and employer student-loan exclusions, guard/reserve
        retirement withdrawals, employee-owner stock elections, education
        savings account payments, and disaster-recovery grants. These
        branches require indexed limits, cross-referenced eligibility,
        lifetime history, or allocation mechanics not fully available in the
        pinned source chain, so the module does not accept caller-completed
        deduction results.
    - output: us-ia:policies/income_tax/2026_full_year_resident_core#ia_2026_dependent_filer_low_income_or_alternate_tax
      reason: |-
        Section 422.5 conditions a dependent filer's benefit on the claimant's
        and claimant-spouse's Iowa net income. The bounded profile does not
        accept those completed legal-result amounts and therefore excludes
        taxpayers claimed as dependents.
    - output: us-ia:policies/income_tax/2026_full_year_resident_core#ia_2026_married_separate_low_income_or_alternate_tax
      reason: |-
        Sections 422.5(2) and (3) require combined spouse net income and spouse
        NOL-election facts for separately filed returns. This module does not
        accept a completed spouse Iowa-net-income shortcut, so married-separate
        returns are outside the executable profile.
    - output: us-ia:policies/income_tax/2026_full_year_resident_core#ia_2026_tuition_or_early_childhood_credit
      reason: |-
        The pinned source chain does not provide all executable federal
        dependent and cross-referenced education-setting definitions needed
        to derive these credits from raw facts. Potential claims are therefore
        excluded rather than accepting caller-completed eligibility inputs.
    - output: us-ia:policies/income_tax/2026_full_year_resident_core#ia_2026_resident_final_income_tax_before_payments
      reason: |-
        Final liability requires the TY2026 IA 1040 annual-return package,
        foreclosure and claim-of-right rules when applicable, all Chapter 422
        nonrefundable/refundable specialty credits and carryforwards, and their
        authoritative ordering. Those sources and surfaces are not complete in
        the pinned corpus.
