  - name: ia_2026_resident_input_profile_valid
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: Iowa Code §§ 422.5, 422.7, 422.9, 422.12, 422.12B, and 422.12C; fail-closed supported full-year-resident domain
    metadata:
