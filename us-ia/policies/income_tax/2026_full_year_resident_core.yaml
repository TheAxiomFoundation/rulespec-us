        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ia/statute/422.5
              excerpt: "a taxpayer shall use the same filing status for Iowa income tax purposes as the taxpayer used for federal income tax purposes"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ia/statute/422.5
              excerpt: "Taxpayers electing to file separately shall compute the alternate tax described in this paragraph using the total net income of the spouses."
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ia/statute/422.5
              excerpt: "A person who is claimed as a dependent by another person as defined in section 422.12 shall not receive the benefit of this subsection"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ia/statute/422.12
              excerpt: "divided by twelve, multiplied by the number of months in the tax year"
          - path: versions[0].formula
            kind: import
