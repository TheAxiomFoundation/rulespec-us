              excerpt: "has attained the age of sixty-five years before the close of the tax year or on the first day following the end of the tax year"
          - path: versions[0].formula
            kind: import
            import:
              target: us-ia:statutes/422/12#blind_additional_exemption_credit
              output: blind_additional_exemption_credit
              hash: sha256:6978efccd2f2cdab9e82b1d5814866468fb47b7c357c2e00d5040be097468c96
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ia/statute/422.12
              excerpt: "blind at the close of the tax year"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ia/statute/422.12
              excerpt: "central visual acuity does not exceed 20/200 in the better eye with correcting lenses"
          - path: versions[0].formula
