format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ia/manual/hhs/em/7-e/page-60
    upstream_source_check:
      status: delegated_parameter_source
      checked_paths:
        - us:regulations/7-cfr/273/9#snap_state_standard_utility_allowance_delegation
      rationale: |-
        Iowa HHS Employees' Manual supplies the state-specific standard utility allowance amount and household conditions under the federal SNAP utility-allowance delegation cited by the source.
  summary: |-
    Households responsible for utility expenses are eligible for one standard utility allowance, except households choosing the homeless standard deduction. The big standard utility allowance is $539 per month per household and applies when the household pays any portion of heat or air-conditioning costs, receives LIHEAP energy assistance, or incurs certification-period costs above non-LIHEAP energy assistance reimbursements.
rules:
  - name: snap_big_sua_monthly_amount
    kind: parameter
    dtype: Money
    period: Month
    unit: USD
    source: Iowa HHS Employees' Manual Title 7, Chapter E, Standard Utility Allowances, Big Standard Utility Allowance
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ia/manual/hhs/em/7-e/page-60
              excerpt: The big standard utility allowance is $539 per month, per household.
    versions:
      - effective_from: '2024-09-27'
        formula: |-
          539

  - name: snap_big_sua_entitled
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Iowa HHS Employees' Manual Title 7, Chapter E, Standard Utility Allowances, Big Standard Utility Allowance
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ia/manual/hhs/em/7-e/page-60
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ia/manual/hhs/em/7-e/page-60
    versions:
      - effective_from: '2024-09-27'
        formula: |-
          (
            household_responsible_for_any_portion_of_heat_or_air_conditioning_costs
            or household_receives_liheap_energy_assistance
            or household_incurs_certification_period_utility_costs_above_non_liheap_energy_assistance_reimbursement
          )
          and not snap_claimed_homeless_shelter_deduction

  - name: snap_big_sua
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: Iowa HHS Employees' Manual Title 7, Chapter E, Standard Utility Allowances, Big Standard Utility Allowance
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ia/manual/hhs/em/7-e/page-60
    versions:
      - effective_from: '2024-09-27'
        formula: |-
          if snap_big_sua_entitled: snap_big_sua_monthly_amount else: 0
