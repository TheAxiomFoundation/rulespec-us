module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/form/cms/medicaid-chip-bhp-eligibility-levels
  summary: |-
    The table provides MAGI eligibility levels as percentages of FPL, based on state decisions as of December 1, 2023. Iowa row: Children Medicaid Ages 0-1 375%; Children Medicaid Ages 1-5 167%; Children Medicaid Ages 6-18 167%; Children Separate CHIP 302% (1 up to 19); Pregnant Women Medicaid 375%; Pregnant Women CHIP N/A; Adults (Medicaid) Parent/Caretaker 44%($); Adults (Medicaid) Expansion to Adults 133%. The MAGI-based rules generally include a 5% FPL disregard.
