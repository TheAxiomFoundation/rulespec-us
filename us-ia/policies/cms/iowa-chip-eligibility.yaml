    period: Year
    source: CMS Medicaid, CHIP and BHP Eligibility Levels table, Iowa row
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: import
            import:
              target: us-ia:policies/cms/iowa-medicaid-chip-bhp-eligibility-levels#iowa_pregnant_women_chip_available
              output: iowa_pregnant_women_chip_available
              hash: sha256:8b85c40ed6f4355cb6312407d62a972953bc895aacd35a5fb50a6402f5c67ab1
    versions:
      - effective_from: '2023-12-01'
        formula: |-
          iowa_pregnant_women_chip_available
  - name: is_chip_eligible_standard_pregnant_person
