format: rulespec/v1
imports:
  - us:statutes/42/1397jj/c/1#child
  - us-ia:policies/cms/iowa-medicaid-chip-bhp-eligibility-levels#iowa_children_separate_chip_effective_fpl_limit
  - us-ia:policies/cms/iowa-medicaid-chip-bhp-eligibility-levels#iowa_pregnant_women_chip_available
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/form/cms/medicaid-chip-bhp-eligibility-levels
  summary: |-
    Iowa CHIP eligibility composition applies the federal CHIP child and standard-pregnant eligibility framework to the CMS state eligibility-level outputs. It intentionally does not encode FCEP state income limits until primary state-plan or CMS source coverage is available.
rules:
  - name: iowa_separate_chip_child_eligibility_available
    kind: derived
    dtype: Boolean
    period: Year
    source: CMS Medicaid, CHIP and BHP Eligibility Levels table, Iowa row
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/1397ll/d/2
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/form/cms/medicaid-chip-bhp-eligibility-levels
              excerpt: "Children Separate CHIP"
    versions:
      - effective_from: '2023-12-01'
        formula: |-
          true
  - name: is_chip_eligible_child
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 42 USC 1397jj(b)(1), 42 USC 1397jj(c)(1), and CMS state CHIP eligibility levels
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/42/1397jj/c/1#child
              output: child
              hash: sha256:5983f9bd1c30a824da826ee4bc8fc3351cd2c631d4a0ce198b156446493ef9e0
          - path: versions[0].formula
            kind: import
            import:
              target: us-ia:policies/cms/iowa-medicaid-chip-bhp-eligibility-levels#iowa_children_separate_chip_effective_fpl_limit
              output: iowa_children_separate_chip_effective_fpl_limit
              hash: sha256:8b85c40ed6f4355cb6312407d62a972953bc895aacd35a5fb50a6402f5c67ab1
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/1397jj/b/1
              excerpt: "not found eligible for medical assistance under subchapter XIX"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/form/cms/medicaid-chip-bhp-eligibility-levels
              excerpt: "Children Separate CHIP"
    versions:
      - effective_from: '2023-12-01'
        formula: |-
          child
          and person_meets_chip_immigration_requirement
          and not found_eligible_for_medical_assistance_under_subchapter_xix
          and medicaid_income_level <= iowa_children_separate_chip_effective_fpl_limit
  - name: iowa_standard_pregnant_chip_eligibility_available
