- name: eligible_group_basic_needs
  kind: derived
  entity: TanfUnit
  dtype: Money
  period: Month
  unit: USD
  source: 441 IAC 41.28(2), Schedule of Needs
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-ia/regulation/iac/441/41/41.28
          excerpt: The schedule of basic needs is used to determine the basic needs
  versions:
  - effective_from: '2025-07-01'
    formula: 'if eligible_group_size <= schedule_max_listed_person_count: schedule_of_basic_needs[eligible_group_size]
      else: schedule_of_basic_needs[schedule_max_listed_person_count] + ((eligible_group_size
      - schedule_max_listed_person_count) * schedule_each_additional_person_basic_needs)'
- name: allowable_school_expenses
  kind: derived
  entity: TanfUnit
  dtype: Money
  period: Month
  unit: USD
  source: 441 IAC 41.28(3)(a)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-ia/regulation/iac/441/41/41.28
          excerpt: Any specific charge, excluding tuition, for a child's education
            made by the school
  versions:
  - effective_from: '2025-07-01'
    formula: 'if school_expense_is_specific_nontuition_charge_required_for_participating_course:
      reasonable_school_expense_cost else: 0'
- name: allowable_guardian_conservator_fee
  kind: derived
  entity: TanfUnit
  dtype: Money
  period: Month
  unit: USD
  source: 441 IAC 41.28(3)(b)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-ia/regulation/iac/441/41/41.28
          excerpt: not to exceed $10 per case per month
  versions:
  - effective_from: '2025-07-01'
    formula: 'if guardian_conservator_fee_authorized_by_court_order: min(requested_guardian_conservator_fee,
      guardian_conservator_fee_monthly_cap) else: 0'
- name: ia_fip
  kind: derived
  entity: TanfUnit
  dtype: Money
  period: Month
  unit: USD
  source: 441 IAC 41.28(2)-(3)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-ia/regulation/iac/441/41/41.28
          excerpt: On the basis of demonstrated need the following special needs will
            be allowed, in addition to the basic needs.
  versions:
  - effective_from: '2025-07-01'
    formula: max(0, eligible_group_basic_needs + allowable_school_expenses + allowable_guardian_conservator_fee)
