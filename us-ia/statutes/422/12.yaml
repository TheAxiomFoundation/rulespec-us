format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ia/statute/422.12
  summary: |-
    There shall be deducted from but not to exceed the tax: personal exemption credits of forty dollars, eighty dollars for head of household or joint return, forty dollars for each dependent, twenty dollars additional age/blindness exemptions; a tuition credit equal to twenty-five percent of the first two thousand dollars paid for each dependent for qualifying tuition and textbooks; volunteer fire fighter/emergency medical services personnel and reserve peace officer credits equal to two hundred fifty dollars for a full year, prorated by months served and rounded to the nearest dollar, with only one volunteer/reserve position creditable for the same month.
  deferred_outputs:
    - output: us-ia:statutes/422/12#personal_exemption_credit
      reason: Personal exemption credit depends on filing status, marital determination under Internal Revenue Code section 7703, and dependent meaning under the Internal Revenue Code, none of which is supplied as executable RuleSpec context.
      source_values:
        - us-ia:statutes/422/12#estate_trust_single_or_separate_return_personal_exemption_credit
        - us-ia:statutes/422/12#head_of_household_or_joint_return_personal_exemption_credit
        - us-ia:statutes/422/12#dependent_personal_exemption_credit
        - us-ia:statutes/422/12#age_sixty_five_additional_exemption_credit
        - us-ia:statutes/422/12#blind_additional_exemption_credit
    - output: us-ia:statutes/422/12#tuition_credit
      reason: Tuition credit requires determining whether the student is a dependent as defined by the Internal Revenue Code and whether private instruction/accredited school conditions are met under cited Iowa sections not supplied as executable RuleSpec context.
      source_values:
        - us-ia:statutes/422/12#tuition_credit_rate
        - us-ia:statutes/422/12#tuition_credit_expense_cap_per_dependent
rules:
  - name: estate_trust_single_or_separate_return_personal_exemption_credit
    kind: parameter
    dtype: Money
    unit: USD
    source: Iowa Code section 422.12(2)(a)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ia/statute/422.12
              excerpt: "For an estate or trust, a single individual, or a married person filing a separate return, forty dollars."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          40
  - name: head_of_household_or_joint_return_personal_exemption_credit
    kind: parameter
    dtype: Money
    unit: USD
    source: Iowa Code section 422.12(2)(a)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ia/statute/422.12
              excerpt: "For a head of household, or a husband and wife filing a joint return, eighty dollars."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          80
  - name: dependent_personal_exemption_credit
    kind: parameter
    dtype: Money
    unit: USD
    source: Iowa Code section 422.12(2)(a)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ia/statute/422.12
              excerpt: "For each dependent, an additional forty dollars."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          40
  - name: age_sixty_five_additional_exemption_credit
    kind: parameter
    dtype: Money
    unit: USD
    source: Iowa Code section 422.12(2)(a)(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ia/statute/422.12
              excerpt: "an additional exemption of twenty dollars"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          20
  - name: blind_additional_exemption_credit
    kind: parameter
    dtype: Money
    unit: USD
    source: Iowa Code section 422.12(2)(a)(5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ia/statute/422.12
              excerpt: "an additional exemption of twenty dollars"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          20
  - name: tuition_credit_rate
    kind: parameter
    dtype: Rate
    source: Iowa Code section 422.12(2)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ia/statute/422.12
              excerpt: "A tuition credit equal to twenty-five percent"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.25
  - name: tuition_credit_expense_cap_per_dependent
    kind: parameter
    dtype: Money
    unit: USD
    source: Iowa Code section 422.12(2)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ia/statute/422.12
              excerpt: "the first two thousand dollars"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          2000
  - name: full_year_volunteer_firefighter_or_ems_credit
    kind: parameter
    dtype: Money
    unit: USD
    source: Iowa Code section 422.12(2)(c)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ia/statute/422.12
              excerpt: "credit equal to two hundred fifty dollars"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          250
  - name: full_year_reserve_peace_officer_credit
    kind: parameter
    dtype: Money
    unit: USD
    source: Iowa Code section 422.12(2)(d)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ia/statute/422.12
              excerpt: "credit equal to two hundred fifty dollars"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          250
  - name: months_in_tax_year_for_proration
    kind: parameter
    dtype: Count
    source: Iowa Code section 422.12(2)(c)(2), (2)(d)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ia/statute/422.12
              excerpt: "divided by twelve, multiplied by the number of months"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          12
  - name: volunteer_firefighter_or_ems_credit
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Iowa Code section 422.12(2)(c)(1)-(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ia/statute/422.12
              excerpt: "divided by twelve, multiplied by the number of months in the tax year the taxpayer was a volunteer"
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ia/statute/422.12
              excerpt: "credit equal to two hundred fifty dollars"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          floor(((full_year_volunteer_firefighter_or_ems_credit * volunteer_firefighter_or_ems_verified_month_count_for_credit / months_in_tax_year_for_proration) / 1) + 0.5) * 1
  - name: reserve_peace_officer_credit
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Iowa Code section 422.12(2)(d)(1)-(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ia/statute/422.12
              excerpt: "divided by twelve, multiplied by the number of months in the tax year the taxpayer was a reserve peace officer"
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ia/statute/422.12
              excerpt: "credit equal to two hundred fifty dollars"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          floor(((full_year_reserve_peace_officer_credit * reserve_peace_officer_verified_month_count_for_credit / months_in_tax_year_for_proration) / 1) + 0.5) * 1
  - name: volunteer_and_reserve_service_credit
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Iowa Code section 422.12(2)(c), (2)(d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ia/statute/422.12
              excerpt: "If the taxpayer is a volunteer fire fighter and a volunteer emergency medical services personnel member during the same month, a credit may be claimed for only one volunteer position for that month."
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ia/statute/422.12
              excerpt: "a credit may be claimed for only one position for that month under either paragraph “c” or this paragraph “d”."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          volunteer_firefighter_or_ems_credit + reserve_peace_officer_credit
