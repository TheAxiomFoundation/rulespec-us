- name: child_and_dependent_care_credit_percentage
  kind: parameter
  dtype: Rate
  indexed_by: child_and_dependent_care_income_band
  source: Iowa Code section 422.12C(1)(a)-(g)
  metadata:
    proof:
      atoms:
      - path: values
        kind: parameter_table
        source:
          corpus_citation_path: us-ia/statute/422.12C
          excerpt: seventy-five percent ... sixty-five percent ... fifty-five percent
            ... fifty percent ... forty percent ... thirty percent ... zero percent
          table:
            header: child and dependent care credit percentages by net income
            row_key: income band
            column_key: percentage of federal child and dependent care credit
  versions:
  - effective_from: '0001-01-01'
    values:
      0: 0.75
      1: 0.65
      2: 0.55
      3: 0.5
      4: 0.4
      5: 0.3
      6: 0
- name: child_and_dependent_care_credit_before_residency_ratio
  kind: derived
  entity: TaxUnit
  dtype: Money
  unit: USD
  period: Year
  source: Iowa Code section 422.12C(1)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-ia/statute/422.12C
          excerpt: equal to the following percentages of the federal child and dependent
            care credit provided in section 21
  versions:
  - effective_from: '0001-01-01'
    formula: max(0, federal_child_and_dependent_care_credit_provided_in_section_21_before_federal_tax_liability_limit)
      * child_and_dependent_care_credit_percentage[child_and_dependent_care_income_band]
