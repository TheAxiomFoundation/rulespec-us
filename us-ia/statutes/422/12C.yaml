        source:
          corpus_citation_path: us-ia/statute/422.12C
          excerpt: first one thousand dollars
  versions:
  - effective_from: '0001-01-01'
    formula: '1000'
- name: minimum_early_childhood_dependent_age
  kind: parameter
  dtype: Count
  source: Iowa Code section 422.12C(2)(a)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-ia/statute/422.12C
          excerpt: ages three through five
  versions:
  - effective_from: '0001-01-01'
    formula: '3'
- name: maximum_early_childhood_dependent_age
  kind: parameter
  dtype: Count
  source: Iowa Code section 422.12C(2)(a)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-ia/statute/422.12C
          excerpt: ages three through five
  versions:
  - effective_from: '0001-01-01'
    formula: '5'
- name: dependent_qualifies_for_early_childhood_development_credit
  kind: derived
  entity: Person
  dtype: Judgment
  period: Year
  source: Iowa Code section 422.12C(2)(a)-(b)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-ia/statute/422.12C
          excerpt: for each dependent ... ages three through five for early childhood
            development expenses
  versions:
  - effective_from: '0001-01-01'
    formula: 'person_is_dependent_as_defined_in_internal_revenue_code

      and age >= minimum_early_childhood_dependent_age

      and age <= maximum_early_childhood_dependent_age

      and expenses_are_early_childhood_development_expenses

      and not expenses_are_for_teaching_religious_tenets_doctrines_or_worship'
- name: early_childhood_development_credit_per_dependent
  kind: derived
  entity: TaxUnit
  dtype: Money
  unit: USD
  period: Year
  source: Iowa Code section 422.12C(2)(a)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-ia/statute/422.12C
          excerpt: twenty-five percent of the first one thousand dollars which the
            taxpayer has paid to others for each dependent
  versions:
  - effective_from: '0001-01-01'
    formula: 'if dependent_qualifies_for_early_childhood_development_credit: early_childhood_development_credit_rate
      * min(max(0, early_childhood_development_expenses_paid_for_dependent), early_childhood_development_expense_cap_per_dependent)
      else: 0'
- name: dependent_of_tax_unit
  kind: data_relation
  data_relation:
    predicate: dependent_of_tax_unit
    arity: 2
    arguments:
    - Person
    - TaxUnit
  source: Iowa Code section 422.12C(2)(a)
- name: early_childhood_development_credit_before_residency_ratio
  kind: derived
  entity: TaxUnit
  dtype: Money
  unit: USD
  period: Year
  source: Iowa Code section 422.12C(2)(a)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-ia/statute/422.12C
          excerpt: This credit is available to a taxpayer whose net income is less
            than ninety thousand dollars.
  versions:
  - effective_from: '0001-01-01'
    formula: 'if net_income < early_childhood_development_credit_net_income_limit
      and early_childhood_development_tax_credit_claimed_for_tax_year: sum_where(dependent_of_tax_unit,
      early_childhood_development_credit_per_dependent, dependent_qualifies_for_early_childhood_development_credit)
      else: 0'
- name: iowa_credit_residency_ratio
  kind: derived
  entity: TaxUnit
  dtype: Rate
  period: Year
  source: Iowa Code section 422.12C(4)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-ia/statute/422.12C
          excerpt: in the ratio of their Iowa source net income to their all source
            net income
  versions:
  - effective_from: '0001-01-01'
    formula: 'if taxpayer_is_nonresident_or_part_year_resident_of_iowa: iowa_source_net_income
      / all_source_net_income else: 1'
- name: iowa_child_and_dependent_care_credit
  kind: derived
  entity: TaxUnit
  dtype: Money
  unit: USD
  period: Year
  source: Iowa Code section 422.12C(1), (2)(a), and (4)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-ia/statute/422.12C
          excerpt: If the early childhood development tax credit is claimed for a
            tax year, the taxpayer and the taxpayer's spouse shall not claim the child
            and dependent care credit
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-ia/statute/422.12C
          excerpt: Nonresidents or part-year residents of Iowa must determine their
            Iowa child and dependent care credit ... in the ratio
  versions:
  - effective_from: '0001-01-01'
    formula: 'if early_childhood_development_tax_credit_claimed_for_tax_year: 0 else:
      child_and_dependent_care_credit_before_residency_ratio * iowa_credit_residency_ratio'
- name: iowa_early_childhood_development_tax_credit
  kind: derived
  entity: TaxUnit
  dtype: Money
  unit: USD
  period: Year
  source: Iowa Code section 422.12C(2)(a) and (4)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-ia/statute/422.12C
          excerpt: early childhood development tax credit ... Nonresidents or part-year
            residents ... in the ratio
  versions:
  - effective_from: '0001-01-01'
    formula: early_childhood_development_credit_before_residency_ratio * iowa_credit_residency_ratio
- name: refundable_excess_credit_amount
  kind: derived
  entity: TaxUnit
  dtype: Money
  unit: USD
  period: Year
  source: Iowa Code section 422.12C(3)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-ia/statute/422.12C
          excerpt: Any credit in excess of the tax liability shall be refunded.
  versions:
  - effective_from: '0001-01-01'
    formula: max(0, iowa_child_and_dependent_care_credit + iowa_early_childhood_development_tax_credit
      - taxes_imposed_less_nonrefundable_credits)
- name: credit_applied_to_current_year_tax
  kind: derived
  entity: TaxUnit
  dtype: Money
  unit: USD
  period: Year
  source: Iowa Code section 422.12C(1)-(3)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-ia/statute/422.12C
          excerpt: taxes imposed ... less the amounts of nonrefundable credits ...
            shall be reduced
  versions:
  - effective_from: '0001-01-01'
    formula: min(taxes_imposed_less_nonrefundable_credits, iowa_child_and_dependent_care_credit
      + iowa_early_childhood_development_tax_credit)
