format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ia/statute/422.12C
  summary: Taxes imposed under this subchapter, less nonrefundable credits, are reduced
    by a child and dependent care credit equal to stated percentages of the federal
    section 21 credit by net income bands. A taxpayer with net income less than $90,000
    may instead claim an early childhood development tax credit equal to 25% of the
    first $1,000 paid for each dependent ages three through five for early childhood
    development expenses. Excess credit is refundable, and nonresidents or part-year
    residents determine the credit in the ratio of Iowa source net income to all source
    net income.
rules:
- name: child_and_dependent_care_income_band
  kind: derived
  entity: TaxUnit
  dtype: Integer
  period: Year
  source: Iowa Code section 422.12C(1)(a)-(g)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter_table
        source:
          corpus_citation_path: us-ia/statute/422.12C
          excerpt: net income of less than ten thousand dollars ... ninety thousand
            dollars or more
          table:
            header: child and dependent care credit percentages by net income
            row_key: taxpayer net income bands
            column_key: income band
  versions:
  - effective_from: '0001-01-01'
    formula: 'if net_income < child_and_dependent_care_band_0_upper_net_income: 0
      else: if net_income >= child_and_dependent_care_band_1_lower_net_income and
      net_income < child_and_dependent_care_band_1_upper_net_income: 1 else: if net_income
      >= child_and_dependent_care_band_2_lower_net_income and net_income < child_and_dependent_care_band_2_upper_net_income:
      2 else: if net_income >= child_and_dependent_care_band_3_lower_net_income and
      net_income < child_and_dependent_care_band_3_upper_net_income: 3 else: if net_income
      >= child_and_dependent_care_band_4_lower_net_income and net_income < child_and_dependent_care_band_4_upper_net_income:
      4 else: if net_income >= child_and_dependent_care_band_5_lower_net_income and
      net_income < child_and_dependent_care_band_5_upper_net_income: 5 else: 6'
- name: child_and_dependent_care_band_0_upper_net_income
