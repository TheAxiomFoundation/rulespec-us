# The six 2026 expected values are independently hand-computed from section
# 11-21-4J using PolicyEngine's completed-return wv_taxable_income values. They
# exactly match wv_income_tax_before_non_refundable_credits. The final case is
# a statutory-boundary test proving that 2027 uses a supplied section 4H result
# rather than silently carrying forward section 4J.
- name: single_30000
  # 632.50 + 3.16% * (28,000 - 25,000) = 727.30.
  period: {period_kind: tax_year, start: '2026-01-01', end: '2026-12-31'}
  input:
    us-wv:policies/income_tax/pilot_liability_pipeline#input.wv_pit_pilot_supplied_taxable_income: 28000
    us-wv:policies/income_tax/pilot_liability_pipeline#input.wv_pit_pilot_supplied_bracket_base: 632.5
    us-wv:policies/income_tax/pilot_liability_pipeline#input.wv_pit_pilot_supplied_bracket_floor: 25000
    us-wv:policies/income_tax/pilot_liability_pipeline#input.wv_pit_pilot_supplied_marginal_rate: 0.0316
  output:
    us-wv:policies/income_tax/pilot_liability_pipeline#wv_pit_pilot_taxable_income: '28000'
    us-wv:policies/income_tax/pilot_liability_pipeline#wv_pit_pilot_schedule_tax: '727.3'
    us-wv:policies/income_tax/pilot_liability_pipeline#wv_pit_pilot_income_tax_liability: '727.3'
