# Independently hand-computed from the tax-year-2026 schedules in W. Va. Code
# section 11-21-4J. The separate schedule is exactly half the thresholds and
# cumulative amounts of the schedule for every other individual status.
- name: general schedule zero income
  period: {period_kind: tax_year, start: '2026-01-01', end: '2026-12-31'}
  input:
    us-wv:policies/income_tax/pilot_liability_pipeline#input.wv_pit_pilot_state_taxable_income: 0
    us-wv:policies/income_tax/pilot_liability_pipeline#input.wv_pit_pilot_filing_status_is_separate: false
  output:
    us-wv:policies/income_tax/pilot_liability_pipeline#wv_pit_pilot_taxable_income: '0'
    us-wv:policies/income_tax/pilot_liability_pipeline#wv_pit_pilot_schedule_tax: '0'
    us-wv:policies/income_tax/pilot_liability_pipeline#wv_pit_pilot_income_tax_liability: '0'

