format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-wv/statute/11-21-3
  summary: |-
    "(a) Imposition of tax. — A tax ... is hereby imposed for each taxable year on the West Virginia taxable income of every individual, estate, electing pass-through entity, and trust: Provided, That, for tax years beginning on or after January 1, 2024, the income of a non-grantor trust administered by a licensed private trust company ... shall have no tax imposed upon it by this section." Partnerships and other pass-through entities are not subject unless they elect under §11-21-3a, with an additional audit-adjustment election rule; associations taxable as corporations and federally exempt trusts or organizations are not subject.
rules:
  - name: individual_west_virginia_taxable_income_tax_imposed
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: W. Va. Code §11-21-3(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-wv/statute/11-21-3
    versions:
      - effective_from: '2022-01-01'
        formula: |-
          individual_has_west_virginia_taxable_income

  - name: estate_west_virginia_taxable_income_tax_imposed
    kind: derived
    entity: Estate
    dtype: Judgment
    period: Year
    source: W. Va. Code §11-21-3(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-wv/statute/11-21-3
    versions:
      - effective_from: '2022-01-01'
        formula: |-
          estate_has_west_virginia_taxable_income

  - name: trust_west_virginia_taxable_income_tax_imposed
    kind: derived
    entity: Trust
    dtype: Judgment
    period: Year
    source: W. Va. Code §11-21-3(a), (c), (d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-wv/statute/11-21-3
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-wv/statute/11-21-3
              excerpt: "for tax years beginning on or after January 1, 2024, the income of a non-grantor trust administered by a licensed private trust company ... shall have no tax imposed"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-wv/statute/11-21-3
    versions:
      - effective_from: '2022-01-01'
        formula: |-
          trust_has_west_virginia_taxable_income
          and not trust_is_association_trust_or_unincorporated_organization_taxable_as_corporation_for_federal_income_tax_purposes
          and not trust_is_exempt_from_federal_income_tax_by_reason_of_purposes_or_activities
          and not (taxable_year_is_in_private_trust_exception_period and trust_is_non_grantor_trust_administered_by_licensed_private_trust_company)

  - name: electing_pass_through_entity_west_virginia_taxable_income_tax_imposed
    kind: derived
    entity: Business
    dtype: Judgment
    period: Year
    source: W. Va. Code §11-21-3(a), (b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-wv/statute/11-21-3
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-wv/statute/11-21-3
    versions:
      - effective_from: '2022-01-01'
        formula: |-
          pass_through_entity_has_west_virginia_taxable_income
          and pass_through_entity_elects_tax_under_section_11_21_3a

  - name: pass_through_entity_subject_to_article_tax
    kind: derived
    entity: Business
    dtype: Judgment
    period: Year
    source: W. Va. Code §11-21-3(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-wv/statute/11-21-3
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-wv/statute/11-21-3
    versions:
      - effective_from: '2022-01-01'
        formula: |-
          pass_through_entity_elects_tax_under_section_11_21_3a
          or pass_through_entity_elects_to_pay_additional_west_virginia_income_taxes_attributable_to_final_federal_partnership_audit_adjustments

  - name: unincorporated_organization_subject_to_article_tax
    kind: derived
    entity: Business
    dtype: Judgment
    period: Year
    source: W. Va. Code §11-21-3(c), (d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-wv/statute/11-21-3
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-wv/statute/11-21-3
    versions:
      - effective_from: '2022-01-01'
        formula: |-
          unincorporated_organization_would_otherwise_be_subject_to_article_tax
          and not unincorporated_organization_is_taxable_as_corporation_for_federal_income_tax_purposes
          and not unincorporated_organization_is_exempt_from_federal_income_tax_by_reason_of_purposes_or_activities
