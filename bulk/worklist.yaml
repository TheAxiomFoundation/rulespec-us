# Bulk-encoding worklist for the durable queue -> runner -> PR dispatcher.
#
# This file is the committed queue that .github/workflows/bulk-encode.yml
# matrixes over. Each entry is one atomic RuleSpec module the encoder will
# produce with `axiom-encode encode <citation> --apply`. The runner never
# invents values; the encoder and the CI gate battery own quality. This file
# only decides *which* already-ingested provisions to encode and tracks their
# status.
#
# How the pilot was derived (mechanically, not hand-curated):
#   1. Enumerate section-level provisions per target statute family from the
#      public Axiom corpus endpoint (corpus.current_provisions PostgREST view;
#      the same endpoint `axiom-encode` resolves against as a Supabase fallback
#      when a provision is absent from the local axiom-corpus checkout).
#   2. Cross-reference each provision's citation_path against the encoded YAML
#      already on rulespec-us main (has_rulespec in the view is stale post-merge,
#      so the check is done against the actual `<state>/statutes/**` files).
#   3. Keep only un-encoded, non-empty, self-contained rate / credit / deduction
#      / exemption / withholding-credit sections. Score cross-reference density
#      from the provision body; prefer 0-1 external Section references.
#   4. SKIP cross-reference-heavy sections (they trip encode#1058's self-import
#      bug) and the known gate-held sections
#      (CA RTC 17043 / 17045 / 17073.5, NY Tax 606 / 616).
#
# Family inventory at derivation time (un-encoded / total section provisions):
#   us-il  35 ILCS 5      : 239 / 242 pending
#   us-ma  G.L. c.62      :  64 /  67 pending
#   us-ca  RTC (Part 10)  : 797 / 800 pending  (RTC as a whole; Part 10 = 17xxx)
#   us-ny  Tax Law Art 22 : 102 / 104 pending
#
# Statuses (see bulk/README.md for the full taxonomy):
#   pending        - queued; the next dispatch may pick it up.
#   in-progress    - a run is currently encoding it (set transiently by the job).
#   needs-fixtures - encoded + applied, but the gpt-5.5 companion fixtures failed
#                    the #1060 ceiling; a follow-up fixture pass must be run.
#   pr-open        - a PR exists and is set to auto-merge on green.
#   merged         - the module's PR merged to main. Terminal success.
#   failed         - the encode or a gate failed for a non-fixture reason; needs
#                    human triage. Never auto-retried, never merged.
#
# Extending the worklist: append entries in the same shape. `citation` is the
# corpus citation path the encoder resolves (jurisdiction/statute/<path>). Keep
# `batch` so a dispatch can target a subset. Run
# `python bulk/compute_matrix.py --status pending` to preview what a dispatch
# would encode.

version: 1

defaults:
  backend: openai
  model: gpt-5.5

entries:
  # ---------------------------------------------------------------------------
  # Batch A - first pilot dispatch (8). Highest-confidence, self-contained.
  # ---------------------------------------------------------------------------
  - citation: us-il/statute/35/5/402
    repo: rulespec-us
    batch: A
    status: pending
    heading: "Methods of accounting"
    class: mechanics
    note: "Self-contained; base/net income accounting method follows federal. No external Section refs."

  - citation: us-il/statute/35/5/306
    repo: rulespec-us
    batch: A
    status: pending
    heading: "Allocation or apportionment of income by estates and trusts"
    class: allocation
    note: "Self-contained pro-rata allocation; refers to 301-304 descriptively."

  - citation: us-il/statute/35/5/707
    repo: rulespec-us
