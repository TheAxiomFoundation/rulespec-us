format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ak/regulation/aac/title-7/chapter-45/7 AAC 45.400
  summary: Except as provided in (c), cash child support payments are income when
    actually received by an ATAP applicant between the first day of the application
    month and benefit authorization or by a recipient after authorization. A recipient
    may keep up to $50 of direct child support payments received after authorization;
    retained amounts over $50 in one month are unearned income. Non-cash child support
    payments are not income.
rules:
- name: atap_monthly_direct_child_support_retention_disregard
  kind: parameter
  dtype: Money
  unit: USD
  period: Month
  source: 7 AAC 45.400(c)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-ak/regulation/aac/title-7/chapter-45/7 AAC 45.400
          excerpt: A recipient may keep up to $50 of a child support payment
  versions:
  - effective_from: '2026-01-01'
    formula: '50'
- name: ak_atap_countable_unearned_income
  kind: derived
  entity: Family
  dtype: Money
  unit: USD
  period: Month
  source: us-ak/regulation/aac/title-7/chapter-45/7 AAC 45.400(a)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-ak/regulation/aac/title-7/chapter-45/7 AAC 45.400
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-ak/regulation/aac/title-7/chapter-45/7 AAC 45.400
          excerpt: amount in excess of $50 is considered unearned income
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-ak/regulation/aac/title-7/chapter-45/7 AAC 45.400
  versions:
  - effective_from: '2026-01-01'
    formula: 'if child_support_payment_made_in_cash: cash_child_support_payments_actually_received_by_applicant_between_application_month_start_and_authorization
      + cash_child_support_payments_actually_received_by_recipient_after_authorization_except_direct_retained_payments
      + max(0, direct_child_support_payments_kept_by_recipient_after_authorization
      - atap_monthly_direct_child_support_retention_disregard) else: 0'
- name: atap_child_support_overpayment_repayment_required
  kind: derived
  entity: Family
  dtype: Judgment
  period: Month
  source: 7 AAC 45.400(d)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: predicate
        source:
          corpus_citation_path: us-ak/regulation/aac/title-7/chapter-45/7 AAC 45.400
  versions:
  - effective_from: '2026-01-01'
    formula: atap_overpayment_resulted_from_retention_of_child_support_payment
- name: atap_child_support_noncooperation_due_to_excess_retention
  kind: derived
  entity: Family
  dtype: Judgment
  period: Month
  source: 7 AAC 45.400(d)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-ak/regulation/aac/title-7/chapter-45/7 AAC 45.400
          excerpt: Keeping more than $50 of the total amount of direct child support
            payments actually received in one month
  versions:
  - effective_from: '2026-01-01'
    formula: direct_child_support_payments_kept_by_recipient_after_authorization >
      atap_monthly_direct_child_support_retention_disregard
