format: rulespec/v1
imports:
  - us-ak:regulations/aac/title-7/chapter-45/45-280-resource-limit#ak_atap_resources_eligible
  - us-ak:policies/dpa/atap/standards/2026/adult-included-gross-income-limit#ak_atap_gross_income_limit
  - us-ak:policies/dpa/atap/standards/2026/adult-included#ak_atap_need_standard
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ak/regulation/aac/title-7/chapter-45/7 AAC 45.470
  summary: |-
    The department first determines whether resources are within 7 AAC 45.280 limits and total nonexempt gross monthly income is equal to or less than the applicable 185 percent standard in 7 AAC 45.520. Countable income is total gross monthly income less applicable deductions and disregards under 7 AAC 45.475 - 7 AAC 45.500. The assistance unit is income eligible if countable income is equal to or less than the applicable need standard; income exceeding either income standard by $.01 or more requires denial, suspension, or termination.
rules:
  - name: atap_gross_income_standard_percentage
    kind: parameter
    dtype: Rate
    source: us-ak/regulation/aac/title-7/chapter-45/7 AAC 45.470(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ak/regulation/aac/title-7/chapter-45/7 AAC 45.470
              excerpt: "applicable 185 percent standard"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          1.85

  - name: atap_income_excess_denial_threshold
    kind: parameter
    dtype: Money
    unit: USD
    source: us-ak/regulation/aac/title-7/chapter-45/7 AAC 45.470(d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ak/regulation/aac/title-7/chapter-45/7 AAC 45.470
              excerpt: "exceeds by $.01 or more"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          0.01

  - name: ak_atap_countable_income_for_income_eligibility
    kind: derived
    entity: Family
    dtype: Money
    period: Month
    unit: USD
    source: us-ak/regulation/aac/title-7/chapter-45/7 AAC 45.470(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ak/regulation/aac/title-7/chapter-45/7 AAC 45.470
              excerpt: "adding an assistance unit's total gross monthly income; and ... deductions and disregards from income under 7 AAC 45.475 - 7 AAC 45.500"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          max(0, total_gross_monthly_income - applicable_deductions_and_disregards_from_income_under_7_aac_45_475_to_45_500)

  - name: ak_atap_gross_income_initial_screen_met
    kind: derived
    entity: Family
    dtype: Judgment
    period: Month
    source: us-ak/regulation/aac/title-7/chapter-45/7 AAC 45.470(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-ak/regulation/aac/title-7/chapter-45/7 AAC 45.470
              excerpt: "resources are within the limits of 7 AAC 45.280 ... total nonexempt gross monthly income is equal to, or less than, the applicable 185 percent standard"
          - path: versions[0].formula
            kind: import
            import:
              target: us-ak:regulations/aac/title-7/chapter-45/45-280-resource-limit#ak_atap_resources_eligible
              output: ak_atap_resources_eligible
              hash: sha256:8dcd6decfb5ac75413d0b49dfbae5771c012ad160bdf93a7ecdf8a1ec8bf223e
          - path: versions[0].formula
            kind: import
            import:
              target: us-ak:policies/dpa/atap/standards/2026/adult-included-gross-income-limit#ak_atap_gross_income_limit
              output: ak_atap_gross_income_limit
              hash: sha256:2b89d55b987784accd9991342f5a4fb58447071b0f9f0c432152800c95cc7c34
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          ak_atap_resources_eligible
          and total_nonexempt_gross_monthly_income <= ak_atap_gross_income_limit

  - name: ak_atap_gross_income_eligible
    kind: derived
    entity: Family
    dtype: Judgment
    period: Month
    source: us-ak/regulation/aac/title-7/chapter-45/7 AAC 45.470(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-ak/regulation/aac/title-7/chapter-45/7 AAC 45.470
              excerpt: "income eligible if that assistance unit's countable income is equal to, or less than, the applicable need standard"
          - path: versions[0].formula
            kind: import
            import:
              target: us-ak:policies/dpa/atap/standards/2026/adult-included#ak_atap_need_standard
              output: ak_atap_need_standard
              hash: sha256:411eb1d3f9005d2a5b239fa4b2ec70e61107e84389f8917c45b8ef6becded052
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          ak_atap_gross_income_initial_screen_met
          and ak_atap_countable_income_for_income_eligibility <= ak_atap_need_standard

  - name: atap_payment_calculation_required_after_income_eligibility
    kind: derived
    entity: Family
    dtype: Judgment
    period: Month
    source: us-ak/regulation/aac/title-7/chapter-45/7 AAC 45.470(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-ak/regulation/aac/title-7/chapter-45/7 AAC 45.470
              excerpt: "calculate the ATAP payment under 7 AAC 45.525 when the assistance unit ... is determined to be income eligible ... and meets all other eligibility requirements"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          ak_atap_gross_income_eligible
          and all_other_eligibility_requirements_of_this_chapter_met

  - name: atap_income_excess_requires_denial_suspension_or_termination_under_gross_income_rule
    kind: derived
    entity: Family
    dtype: Judgment
    period: Month
    source: us-ak/regulation/aac/title-7/chapter-45/7 AAC 45.470(d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-ak/regulation/aac/title-7/chapter-45/7 AAC 45.470
              excerpt: "income exceeds by $.01 or more either the applicable 185-percent limit or the applicable need standard"
          - path: versions[0].formula
            kind: import
            import:
              target: us-ak:policies/dpa/atap/standards/2026/adult-included-gross-income-limit#ak_atap_gross_income_limit
              output: ak_atap_gross_income_limit
              hash: sha256:2b89d55b987784accd9991342f5a4fb58447071b0f9f0c432152800c95cc7c34
          - path: versions[0].formula
            kind: import
            import:
              target: us-ak:policies/dpa/atap/standards/2026/adult-included#ak_atap_need_standard
              output: ak_atap_need_standard
              hash: sha256:411eb1d3f9005d2a5b239fa4b2ec70e61107e84389f8917c45b8ef6becded052
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          total_nonexempt_gross_monthly_income >= ak_atap_gross_income_limit + atap_income_excess_denial_threshold
          or ak_atap_countable_income_for_income_eligibility >= ak_atap_need_standard + atap_income_excess_denial_threshold
