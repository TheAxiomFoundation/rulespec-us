format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ak/regulation/aac/title-7/chapter-45/7 AAC 45.280
  deferred_outputs:
  - output: us-ak:regulations/aac/title-7/chapter-45/45-280-resource-limit/b#eligibility_determination_date
    reason: The source states applicant and recipient timing rules keyed to the interview
      date under 7 AAC 45.170(a) or the first day of the eligibility month; the supported
      executable surface here computes monthly resource eligibility from the source-stated
      limits, not a date-valued determination event.
  summary: An assistance unit is not eligible for ATAP benefits if nonexempt resources,
    valued under 7 AAC 45.310, exceed $2,000, or $3,000 if the assistance unit includes
    an individual age 60 or older. Eligibility is determined for an applicant as of
    the interview date and for a recipient as of the first day of the eligibility
    month.
rules:
- name: atap_standard_resource_limit
  kind: parameter
  dtype: Money
  unit: USD
  source: us-ak/regulation/aac/title-7/chapter-45/7 AAC 45.280(a)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-ak/regulation/aac/title-7/chapter-45/7 AAC 45.280
          excerpt: in excess of $2,000
  versions:
  - effective_from: '2026-01-01'
    formula: '2000'
- name: atap_resource_limit_with_older_individual
  kind: parameter
  dtype: Money
  unit: USD
  source: us-ak/regulation/aac/title-7/chapter-45/7 AAC 45.280(a)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-ak/regulation/aac/title-7/chapter-45/7 AAC 45.280
          excerpt: if the assistance unit includes an individual age 60 or older,
            $3,000
  versions:
  - effective_from: '2026-01-01'
    formula: '3000'
- name: older_individual_resource_limit_minimum_age
  kind: parameter
  dtype: Count
  source: us-ak/regulation/aac/title-7/chapter-45/7 AAC 45.280(a)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-ak/regulation/aac/title-7/chapter-45/7 AAC 45.280
          excerpt: individual age 60 or older
  versions:
  - effective_from: '2026-01-01'
    formula: '60'
- name: ak_atap_resources_eligible
  kind: derived
  entity: Family
  dtype: Judgment
  period: Month
  source: us-ak/regulation/aac/title-7/chapter-45/7 AAC 45.280(a)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: predicate
        source:
          corpus_citation_path: us-ak/regulation/aac/title-7/chapter-45/7 AAC 45.280
          excerpt: not eligible for ATAP benefits if the assistance unit has nonexempt
            resources ... in excess of $2,000 or ... $3,000
  versions:
  - effective_from: '2026-01-01'
    formula: "(((oldest_individual_age_in_assistance_unit >= older_individual_resource_limit_minimum_age)\
      \ and total_nonexempt_resources_value_determined_under_7_aac_45_310 <= (atap_resource_limit_with_older_individual))\n\
      \  or (not (oldest_individual_age_in_assistance_unit >= older_individual_resource_limit_minimum_age)\
      \ and total_nonexempt_resources_value_determined_under_7_aac_45_310 <= (atap_standard_resource_limit)))"
