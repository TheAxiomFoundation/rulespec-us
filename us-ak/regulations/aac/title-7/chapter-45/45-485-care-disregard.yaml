format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ak/regulation/aac/title-7/chapter-45/7 AAC 45.485
  summary: |-
    Except as provided in 7 AAC 45.495 and 7 AAC 45.500, the department disregards anticipated child or incapacitated-parent care costs paid by an individual included in ATAP eligibility/payment calculations, limited to hourly charges for work plus reasonable commuting time and monthly caps of $200 for each dependent child under age two, $175 for each dependent child age two or older, and $175 for an incapacitated parent.
rules:
  - name: dependent_child_under_two_monthly_care_disregard_cap
    kind: parameter
    dtype: Money
    period: Month
    unit: USD
    source: us-ak/regulation/aac/title-7/chapter-45/7 AAC 45.485(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ak/regulation/aac/title-7/chapter-45/7 AAC 45.485
              excerpt: "$200 each month for each dependent child under the age of two"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          200

  - name: dependent_child_two_or_older_monthly_care_disregard_cap
    kind: parameter
    dtype: Money
    period: Month
    unit: USD
    source: us-ak/regulation/aac/title-7/chapter-45/7 AAC 45.485(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ak/regulation/aac/title-7/chapter-45/7 AAC 45.485
              excerpt: "$175 each month for each dependent child age two or older"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          175

  - name: incapacitated_parent_monthly_care_disregard_cap
    kind: parameter
    dtype: Money
    period: Month
    unit: USD
    source: us-ak/regulation/aac/title-7/chapter-45/7 AAC 45.485(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ak/regulation/aac/title-7/chapter-45/7 AAC 45.485
              excerpt: "$175 each month for an incapacitated parent"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          175

  - name: ak_atap_childcare_deduction
    kind: derived
    entity: Family
    dtype: Money
    period: Month
    unit: USD
    source: us-ak/regulation/aac/title-7/chapter-45/7 AAC 45.485(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ak/regulation/aac/title-7/chapter-45/7 AAC 45.485
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ak/regulation/aac/title-7/chapter-45/7 AAC 45.485
              excerpt: "$200 each month for each dependent child under the age of two"
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ak/regulation/aac/title-7/chapter-45/7 AAC 45.485
              excerpt: "$175 each month for each dependent child age two or older"
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ak/regulation/aac/title-7/chapter-45/7 AAC 45.485
              excerpt: "$175 each month for an incapacitated parent"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ak/regulation/aac/title-7/chapter-45/7 AAC 45.485
              excerpt: "Except as provided in 7 AAC 45.495 and 7 AAC 45.500"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          if care_disregard_displaced_by_7_aac_45_495: 0 else: if care_disregard_displaced_by_7_aac_45_500: 0 else: min(anticipated_paid_care_cost_for_dependent_children_under_two_included_in_atap, dependent_child_under_two_monthly_care_disregard_cap * dependent_children_under_two_included_in_atap_count) + min(anticipated_paid_care_cost_for_dependent_children_two_or_older_included_in_atap, dependent_child_two_or_older_monthly_care_disregard_cap * dependent_children_two_or_older_included_in_atap_count) + min(anticipated_paid_care_cost_for_incapacitated_parents_included_in_atap, incapacitated_parent_monthly_care_disregard_cap * incapacitated_parents_included_in_atap_count)
