  source_verification:
    corpus_citation_path: us/form/cms/medicaid-chip-bhp-eligibility-levels/block-1
  summary: |-
    The table provides MAGI eligibility levels as percentages of FPL, based on state decisions as of December 1, 2023. Alaska row: Children Medicaid Ages 0-1 203%; Children Medicaid Ages 1-5 203%; Children Medicaid Ages 6-18 203%; Children Separate CHIP N/A; Pregnant Women Medicaid 200%; Pregnant Women CHIP N/A; Adults (Medicaid) Parent/Caretaker 130%($); Adults (Medicaid) Expansion to Adults 133%. The MAGI-based rules generally include a 5% FPL disregard.
