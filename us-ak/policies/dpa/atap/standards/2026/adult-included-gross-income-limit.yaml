format: rulespec/v1
imports:
  - us-ak:policies/dpa/atap/standards/2026/adult-included#adult_included_family_size_minimum
  - us-ak:policies/dpa/atap/standards/2026/adult-included#adult_included_family_size_table_maximum
  - us-ak:policies/dpa/atap/standards/2026/adult-included#adult_included_185_percent_standard_by_family_size
  - us-ak:policies/dpa/atap/standards/2026/adult-included#adult_included_185_percent_standard_each_additional
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ak/guidance/dpa/atap/standards/2026/page-2
  summary: |-
    43.13% Ratable Reduction - 1/1/2026 Family Size 185% STD NEED STD MAX SHELTER MAX PAYMENT ... 2 $3,529 ... 10 $7,091 Each Additional $447.
rules:
  - name: ak_atap_gross_income_limit_family_size_lookup
    kind: derived
    entity: Family
    dtype: Count
    period: Month
    source: DPA ATAP Standards 2026, page 2, adult-included family-size rows and each-additional row
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ak/guidance/dpa/atap/standards/2026/page-2
              excerpt: "Family Size ... 2 ... 10 Each Additional"
          - path: versions[0].formula
            kind: import
            import:
              target: us-ak:policies/dpa/atap/standards/2026/adult-included#adult_included_family_size_minimum
              output: adult_included_family_size_minimum
              hash: sha256:411eb1d3f9005d2a5b239fa4b2ec70e61107e84389f8917c45b8ef6becded052
          - path: versions[0].formula
            kind: import
            import:
              target: us-ak:policies/dpa/atap/standards/2026/adult-included#adult_included_family_size_table_maximum
              output: adult_included_family_size_table_maximum
              hash: sha256:411eb1d3f9005d2a5b239fa4b2ec70e61107e84389f8917c45b8ef6becded052
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          if assistance_unit_size < adult_included_family_size_minimum: adult_included_family_size_minimum else: if assistance_unit_size > adult_included_family_size_table_maximum: adult_included_family_size_table_maximum else: assistance_unit_size

  - name: ak_atap_gross_income_limit
    kind: derived
    entity: Family
    dtype: Money
    period: Month
    unit: USD
    source: DPA ATAP Standards 2026, page 2, adult-included 185% standard table
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ak/guidance/dpa/atap/standards/2026/page-2
              excerpt: "185% STD ... 2 $3,529 ... 10 $7,091 Each Additional $447"
          - path: versions[0].formula
            kind: import
            import:
              target: us-ak:policies/dpa/atap/standards/2026/adult-included#adult_included_185_percent_standard_by_family_size
              output: adult_included_185_percent_standard_by_family_size
              hash: sha256:411eb1d3f9005d2a5b239fa4b2ec70e61107e84389f8917c45b8ef6becded052
          - path: versions[0].formula
            kind: import
            import:
              target: us-ak:policies/dpa/atap/standards/2026/adult-included#adult_included_family_size_table_maximum
              output: adult_included_family_size_table_maximum
              hash: sha256:411eb1d3f9005d2a5b239fa4b2ec70e61107e84389f8917c45b8ef6becded052
          - path: versions[0].formula
            kind: import
            import:
              target: us-ak:policies/dpa/atap/standards/2026/adult-included#adult_included_185_percent_standard_each_additional
              output: adult_included_185_percent_standard_each_additional
              hash: sha256:411eb1d3f9005d2a5b239fa4b2ec70e61107e84389f8917c45b8ef6becded052
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          adult_included_185_percent_standard_by_family_size[ak_atap_gross_income_limit_family_size_lookup] + max(0, assistance_unit_size - adult_included_family_size_table_maximum) * adult_included_185_percent_standard_each_additional
