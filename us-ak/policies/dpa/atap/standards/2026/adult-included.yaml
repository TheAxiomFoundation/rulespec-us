  - name: adult_included_family_size_lookup
    kind: derived
    entity: Family
    dtype: Count
    period: Month
    source: DPA ATAP Standards 2026, page 2, adult-included family-size rows and each-additional row
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ak/guidance/dpa/atap/standards/2026/page-2
              excerpt: "Family Size ... 2 ... 10 Each Additional"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          if assistance_unit_size < adult_included_family_size_minimum: adult_included_family_size_minimum else: if assistance_unit_size > adult_included_family_size_table_maximum: adult_included_family_size_table_maximum else: assistance_unit_size

  - name: ak_atap_need_standard
    kind: derived
    entity: Family
    dtype: Money
    period: Month
    unit: USD
    source: DPA ATAP Standards 2026, page 2, adult-included need standard table
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ak/guidance/dpa/atap/standards/2026/page-2
              excerpt: "NEED STD ... 2 $1,908 ... 10 $3,833 Each Additional $242"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          adult_included_need_standard_by_family_size[adult_included_family_size_lookup] + max(0, assistance_unit_size - adult_included_family_size_table_maximum) * adult_included_need_standard_each_additional
