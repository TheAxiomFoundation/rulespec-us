format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ak/guidance/dpa/atap/standards/2026/page-2
    upstream_source_check:
      status: official_parameter_source
      checked_paths:
        - us-ak/regulation/aac/title-7/chapter-45/7 AAC 45.520
      rationale: |-
        7 AAC 45.520 establishes ATAP qualifying standards and annual SSI cost-of-living adjustment mechanics; this DPA standards page supplies the official adjusted dollar table effective January 1, 2026 for the encoded values.
  summary: |-
    43.13% Ratable Reduction - 1/1/2026 Family Size 185% STD NEED STD MAX SHELTER MAX PAYMENT ... 2 $3,529 $1,908 $572 $821 ... 10 $7,091 $3,833 $1,149 $1,637 Each Additional $447 $242 $72 $102.
