format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ak/guidance/dpa/apa/standards/2026/page-1
  summary: |-
    2026 APA Need and Maximum Payment Standards list payment codes A1E $1,356, B1E $1,031, H1E $1,094, A2S $1,515, B2S $1,127, H2S $1,094, A2C $2,019, B2C $1,537, H2C $1,691, and NHP $200. 2026 SSI Eligibility/Payment Standards list A Individual $994, B Individual $662.67, A Couple Both Eligible $1,491, B Couple Both Eligible $994.00, and D Eligible Institution $30.
rules:
