    kind: parameter
    dtype: Money
    unit: USD
    source: 2026 Adult Public Assistance Need and Maximum Payment Standards, A Individual (A1E), 1/1/2026
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ak/guidance/dpa/apa/standards/2026/page-1
              excerpt: A Individual (A1E) ... 1/1/2026 ... $1,356
