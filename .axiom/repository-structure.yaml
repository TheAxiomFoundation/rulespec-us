version: 1
allowed_root_directories:
  - .axiom
  - .claude
  - .github
  - bulk
  - programs
  - tests
  # Repo build tooling (program-artifacts pipeline).
  - tools
  - us
  - us-ak
  - us-al
  - us-ar
  - us-az
  - us-ca
  - us-co
  - us-ct
  - us-dc
  - us-de
  - us-fl
  - us-ga
  - us-hi
  - us-ia
  - us-id
  - us-il
  - us-in
  - us-ks
  - us-ky
  - us-la
  - us-ma
  - us-md
  - us-me
  - us-mi
  - us-mn
  - us-mo
  - us-ms
  - us-mt
  - us-nc
  - us-nd
  - us-ne
  - us-nh
  - us-nj
  - us-nm
  - us-nv
  - us-ny
  - us-oh
  - us-ok
  - us-or
  - us-pa
  - us-ri
  - us-sc
  - us-sd
  - us-tn
  - us-tx
  - us-ut
  - us-va
  - us-vt
  - us-wa
  - us-wi
  - us-wv
  - us-wy
allowed_root_files:
  - .gitattributes
  - .gitignore
  - CLAUDE.md
  - LICENSE
  - LICENSE-CODE
  - NOTICE
  - README.md
  - known-dangling.yaml
  - known-missing-money-atoms.yaml
  - known-validation-gaps.yaml
  - oracle-coverage-pending.yaml
path_rules:
  - patterns:
      - ".axiom/**"
    allow_extensions:
      - ".json"
      - ".txt"
      - ".toml"
      - ".yaml"
  - patterns:
      - ".claude/**"
    allow_extensions:
      - ".json"
  - patterns:
      - ".github/**"
    allow_extensions:
      - ".yml"
      - ".yaml"
  - patterns:
      - "bulk/**"
    allow_extensions:
      - ".md"
      - ".py"
      - ".yaml"
  - patterns:
      - "programs/**"
    allow_extensions:
      - ".yaml"
  - patterns:
      - "tests/**"
    allow_extensions:
      - ".py"
  - patterns:
      - "tools/**"
    allow_extensions:
      - ".py"
      - ".txt"
      - ".md"
  - patterns:
      - "us/**"
      - "us-*/**"
    allow_extensions:
      - ".json"
      - ".md"
      - ".toml"
      - ".yaml"
    allow_filenames:
      - ".gitignore"
