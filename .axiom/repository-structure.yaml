version: 1
allowed_root_directories:
  - .axiom
  - .github
  - programs
  - tests
  - us
  - us-al
  - us-ar
  - us-az
  - us-ca
  - us-co
  - us-de
  - us-fl
  - us-ga
  - us-id
  - us-in
  - us-il
  - us-ma
  - us-md
  - us-ks
  - us-la
  - us-nc
  - us-nh
  - us-ny
  - us-ok
  - us-sc
  - us-tn
  - us-tx
  - us-wa
  - us-wy
allowed_root_files:
  - .gitattributes
  - .gitignore
  - CLAUDE.md
  - README.md
  - known-dangling.yaml
  - known-validation-gaps.yaml
path_rules:
  - patterns:
      - ".axiom/**"
    allow_extensions:
      - ".json"
      - ".toml"
      - ".yaml"
  - patterns:
      - ".github/**"
    allow_extensions:
      - ".yml"
      - ".yaml"
  - patterns:
      - "programs/**"
    allow_extensions:
      - ".yaml"
  - patterns:
      - "tests/**"
    allow_extensions:
      - ".py"
  - patterns:
      - "us/**"
      - "us-*/**"
    allow_extensions:
      - ".json"
      - ".md"
      - ".toml"
      - ".yaml"
    allow_filenames:
      - ".gitignore"
