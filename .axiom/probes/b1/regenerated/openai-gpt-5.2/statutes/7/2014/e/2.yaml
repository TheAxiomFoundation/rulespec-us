format: rulespec/v1
module:
  summary: "Defines \u201Cearned income\u201D to exclude (i) income excluded by subsection\
    \ (d) and (ii) work supplementation or support program income attributable to\
    \ public assistance; allows a 20% earned income deduction except when determining\
    \ an overissuance due to failure to timely report earned income."
  source_verification:
    corpus_citation_path: us/statute/7/2014/e/2
  proof_validation:
    required: true
imports:
- us:statutes/7/2014/e/2/B#snap_earned_income_deduction_rate
rules:
- name: snap_earned_income_subject_to_deduction
  kind: derived
  entity: Household
  dtype: Money
  period: Month
  unit: USD
  source: 7 USC 2014(e)(2)(A)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us/statute/7/2014/e/2
          excerpt: "\u201Cearned income\u201D does not include\u2014 ... any portion\
            \ of income earned under a work supplementation or support program ...\
            \ that is attributable to public assistance"
  versions:
  - effective_from: '2008-10-01'
    formula: max(0, snap_countable_earned_income - work_supplementation_earned_income)
- name: snap_earned_income_deduction
  kind: derived
  entity: Household
  dtype: Money
  period: Month
  unit: USD
  source: 7 USC 2014(e)(2)(B)-(C)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us/statute/7/2014/e/2
          excerpt: a household with earned income shall be allowed a deduction of
            20 percent of all earned income ... [but] shall not be allowed with respect
            to determining an overissuance due to the failure of a household to report
            earned income in a timely manner
      - path: versions[0].formula
        kind: import
        import:
          target: us:statutes/7/2014/e/2/B#snap_earned_income_deduction_rate
          output: snap_earned_income_deduction_rate
          hash: sha256:f6df3554f1b7dfc588d313652f77c9331ae2272e3086a537fd72bbdebd7cfe66
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us/statute/7/2014/e/2
  versions:
  - effective_from: '2008-10-01'
    formula: 'if determining_overissuance_due_to_failure_to_report_earned_income_timely:
      0 else: snap_earned_income_subject_to_deduction * snap_earned_income_deduction_rate'
