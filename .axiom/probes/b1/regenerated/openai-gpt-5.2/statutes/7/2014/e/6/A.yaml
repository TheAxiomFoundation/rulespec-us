format: rulespec/v1
module:
  summary: |-
    Entitles a household (excluding third-party-paid expenses) to an excess shelter expense deduction to the extent monthly shelter costs exceed 50 percent of monthly household income after all other applicable deductions.
  source_verification:
    corpus_citation_path: us/statute/7/2014/e/6/A
  proof_validation:
    required: true
rules:
  - name: snap_shelter_excess_threshold_rate
    kind: parameter
    dtype: Rate
    source: 7 USC 2014(e)(6)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us/statute/7/2014/e/6/A
              excerpt: "exceeds an amount equal to 50 percent of monthly household income after all other applicable deductions have been allowed"
    versions:
      - effective_from: '2008-10-01'
        formula: |-
          0.50

  - name: snap_net_income_pre_shelter
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 7 USC 2014(e)(6)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/7/2014/e/6/A
              excerpt: "monthly household income after all other applicable deductions have been allowed"
    versions:
      - effective_from: '2008-10-01'
        formula: |-
          max(
            0,
            snap_total_gross_income
            - snap_standard_deduction
            - snap_earned_income_deduction
            - dependent_care_deduction
            - child_support_deduction
            - medical_deduction
          )

  - name: snap_net_income
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 7 USC 2014(e)(6)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/7/2014/e/6/A
              excerpt: "to an excess shelter expense deduction"
    versions:
      - effective_from: '2008-10-01'
        formula: |-
          max(0, snap_net_income_pre_shelter - snap_excess_shelter_deduction)
