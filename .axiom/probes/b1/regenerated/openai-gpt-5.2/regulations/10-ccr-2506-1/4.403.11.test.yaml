- name: applies_when_household_has_self_employment_income_and_anticipated_capital_gains_are_averaged
  period: 2024-01
  input:
    us-co:regulations/10-ccr-2506-1/4.403.11#input.household_has_self_employment_income: true
    us-co:regulations/10-ccr-2506-1/4.403.11#input.self_employment_income_calculated_on_anticipated_basis: true
    us-co:regulations/10-ccr-2506-1/4.403.11#input.anticipated_capital_gains_next_twelve_months: 1200
    us-co:regulations/10-ccr-2506-1/4.403.11#input.gross_anticipated_self_employment_income_monthly: 2000
    us-co:regulations/10-ccr-2506-1/4.403.11#input.anticipated_monthly_allowable_business_costs: 500
  output:
    us-co:regulations/10-ccr-2506-1/4.403.11#snap_self_employment_expense_based_deduction_applies: holds
    us-co:regulations/10-ccr-2506-1/4.403.11#anticipated_monthly_capital_gains: 100
    us-co:regulations/10-ccr-2506-1/4.403.11#monthly_net_self_employment_income: 1600
- name: does_not_apply_when_household_has_no_self_employment_income
  period: 2024-01
  input:
    us-co:regulations/10-ccr-2506-1/4.403.11#input.household_has_self_employment_income: false
    us-co:regulations/10-ccr-2506-1/4.403.11#input.self_employment_income_calculated_on_anticipated_basis: false
    us-co:regulations/10-ccr-2506-1/4.403.11#input.anticipated_capital_gains_next_twelve_months: 1200
    us-co:regulations/10-ccr-2506-1/4.403.11#input.gross_anticipated_self_employment_income_monthly: 2000
    us-co:regulations/10-ccr-2506-1/4.403.11#input.anticipated_monthly_allowable_business_costs: 500
  output:
    us-co:regulations/10-ccr-2506-1/4.403.11#snap_self_employment_expense_based_deduction_applies: not_holds
    us-co:regulations/10-ccr-2506-1/4.403.11#anticipated_monthly_capital_gains: 0
    us-co:regulations/10-ccr-2506-1/4.403.11#monthly_net_self_employment_income: 1500
