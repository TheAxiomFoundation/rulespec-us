format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.407.6
  summary: Household receives a deduction for total medical expenses more than $35
    per month incurred by household member(s) aged 60+ or a person with disabilities,
    net of reimbursements. If reimbursement cannot be verified, no deduction is allowed
    until reimbursement is received or verified as not provided.
rules:
- name: medical_expense_deduction_threshold
  kind: parameter
  dtype: Money
  unit: USD
  source: 10 CCR 2506-1, 4.407.6 (intro paragraph)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.407.6
          excerpt: deduction for total medical expenses more than thirty-five dollars
            ($35) per month
      - path: versions[0].formula
        kind: unit
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.407.6
  versions:
  - effective_from: '0001-01-01'
    formula: '35'
- name: net_allowable_medical_expenses_for_aged_or_disabled_members
  kind: derived
  entity: Household
  dtype: Money
  unit: USD
  period: Month
  source: 10 CCR 2506-1, 4.407.6(A) (allowable medical costs less reimbursements)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.407.6
          excerpt: The following medical costs, less the cost of reimbursements from
            another source, are allowable
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.407.6
          excerpt: incurred by any household member(s) who is aged sixty (60) and
            older or a person with disabilities
  versions:
  - effective_from: '0001-01-01'
    formula: "max(\n  0,\n  medical_expenses_incurred_by_aged_or_disabled_members\n\
      \  - medical_expense_reimbursements_from_another_source\n)"
- name: medical_expense_deduction
  kind: derived
  entity: Household
  dtype: Money
  unit: USD
  period: Month
  source: 10 CCR 2506-1, 4.407.6 (intro paragraph); 4.407.6(A) (reimbursement verification
    rule)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.407.6
          excerpt: deduction for total medical expenses more than thirty-five dollars
            ($35) per month
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.407.6
          excerpt: no medical expense deduction shall be allowed until the household
            either receives reimbursement... or is able to verify that reimbursement
            will not be provided
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.407.6
          excerpt: aged sixty (60) and older or a person with disabilities
  versions:
  - effective_from: '0001-01-01'
    formula: 'if household_has_aged_or_disabled_member and reimbursement_status_is_verified_or_received:
      max( 0, net_allowable_medical_expenses_for_aged_or_disabled_members - medical_expense_deduction_threshold
      ) else: 0'
