format: rulespec/v1
module:
  summary: Households eligible under expanded or basic categorical eligibility are
    exempt from the resource eligibility criteria. Effective 10/1/2024, SNAP resource
    limits are $4,500 (households with an aged 60+ and/or disabled member) and $3,000
    (all other households). Sponsor resources counted toward a non-citizen household
    are sponsor total resources less $2,000.
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.408
rules:
- name: snap_sponsor_resource_disregard
  kind: parameter
  dtype: Money
  unit: USD
  source: 10 CCR 2506-1, 4.408(B)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.408
          excerpt: The resources of a sponsor and spouse ... shall be the sponsor's
            total resources less two thousand dollars ($2,000).
  versions:
  - effective_from: '0001-01-01'
    formula: '2000'
- name: snap_resource_limit_household_with_elderly_or_disabled_member
  kind: parameter
  dtype: Money
  unit: USD
  source: 10 CCR 2506-1, 4.408(E)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.408
          excerpt: Effective October 1, 2024, the resource limit for households that
            include a member who is aged sixty (60) and older and/or a person with
            a disability is ... ($4,500).
  versions:
  - effective_from: '2024-10-01'
    formula: '4500'
- name: snap_resource_limit_household_without_elderly_or_disabled_member
  kind: parameter
  dtype: Money
  unit: USD
  source: 10 CCR 2506-1, 4.408(E)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.408
          excerpt: Effective October 1, 2024, ... The resource limit for households
            that do not include a member who is aged sixty (60) and older and/or a
            person with a disability is ... ($3,000).
  versions:
  - effective_from: '2024-10-01'
    formula: '3000'
- name: snap_household_exempt_from_resource_eligibility_criteria_due_to_categorical_eligibility
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: 10 CCR 2506-1, 4.408(A)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.408
          excerpt: households eligible under either expanded or basic categorical
            eligibility exempt from the resource eligibility criteria
  versions:
  - effective_from: '0001-01-01'
    formula: 'household_is_eligible_under_expanded_categorical_eligibility

      or household_is_eligible_under_basic_categorical_eligibility'
- name: snap_resource_eligibility_criteria_apply
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: 10 CCR 2506-1, 4.408(A)-(B)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.408
          excerpt: Households ... eligible under ... categorical eligibility exempt
            from the resource eligibility criteria ... Households that do not meet
            ... criteria shall have their nonexempt resources ... used to determine
            household eligibility.
  versions:
  - effective_from: '0001-01-01'
    formula: not snap_household_exempt_from_resource_eligibility_criteria_due_to_categorical_eligibility
- name: snap_household_resource_limit
  kind: derived
  entity: Household
  dtype: Money
  unit: USD
  period: Month
  source: 10 CCR 2506-1, 4.408(D)-(E)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.408
          excerpt: There are currently two (2) resource limits ... Effective October
            1, 2024 ... $4,500 ... $3,000.
  versions:
  - effective_from: '2024-10-01'
    formula: 'if household_includes_member_aged_60_or_older_or_person_with_disability:
      snap_resource_limit_household_with_elderly_or_disabled_member else: snap_resource_limit_household_without_elderly_or_disabled_member'
- name: snap_sponsor_resources_counted_toward_noncitizen_household
  kind: derived
  entity: Household
  dtype: Money
  unit: USD
  period: Month
  source: 10 CCR 2506-1, 4.408(B)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.408
          excerpt: The resources of a sponsor and spouse considered toward a non-citizen
            household shall be the sponsor's total resources less ... ($2,000).
  versions:
  - effective_from: '0001-01-01'
    formula: 'if household_is_noncitizen_household_with_sponsor_resources_considered:
      max(0, sponsor_total_resources - snap_sponsor_resource_disregard) else: 0'
