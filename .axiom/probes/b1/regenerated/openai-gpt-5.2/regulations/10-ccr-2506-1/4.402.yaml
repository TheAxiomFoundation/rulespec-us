format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.402
  summary: |-
    Income eligibility shall be determined prospectively. Income converted to a monthly amount using: Weekly * 4.3; Bi-Weekly * 2.15; Semi-Monthly * 2; Every Other Month * 0.5; Quarterly * 0.333333; Twice a Year * 0.166666; Annual * .083.
rules:
  - name: monthly_income_conversion_multiplier_weekly
    kind: parameter
    dtype: Decimal
    source: 10 CCR 2506-1, Section 4.402(A)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.402
              excerpt: "Weekly Multiply Weekly Average by 4.3."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          4.3

  - name: monthly_income_conversion_multiplier_biweekly
    kind: parameter
    dtype: Decimal
    source: 10 CCR 2506-1, Section 4.402(A)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.402
              excerpt: "Bi-Weekly (Every Two Weeks) Multiply Bi-Weekly Average by 2.15."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          2.15

  - name: monthly_income_conversion_multiplier_semi_monthly
    kind: parameter
    dtype: Decimal
    source: 10 CCR 2506-1, Section 4.402(A)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.402
              excerpt: "Semi-Monthly (Twice a Month) Multiply Semi-Monthly Average by 2."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          2

  - name: monthly_income_conversion_multiplier_every_other_month
    kind: parameter
    dtype: Decimal
    source: 10 CCR 2506-1, Section 4.402(A)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.402
              excerpt: "Every Other Month Multiply Average by 0.5."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.5

  - name: monthly_income_conversion_multiplier_quarterly
    kind: parameter
    dtype: Decimal
    source: 10 CCR 2506-1, Section 4.402(A)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.402
              excerpt: "Quarterly Multiply Average by 0.333333."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.333333

  - name: monthly_income_conversion_multiplier_twice_a_year
    kind: parameter
    dtype: Decimal
    source: 10 CCR 2506-1, Section 4.402(A)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.402
              excerpt: "Twice a Year Multiply Average by 0.166666."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.166666

  - name: monthly_income_conversion_multiplier_annual
    kind: parameter
    dtype: Decimal
    source: 10 CCR 2506-1, Section 4.402(A)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.402
              excerpt: "Annual Multiply Average by .083."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.083

  - name: monthly_income_from_periodic_income
    kind: derived
    entity: Household
    dtype: Money
    unit: USD
    period: Month
    source: 10 CCR 2506-1, Section 4.402(A)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.402
              excerpt: "households shall have income converted to a monthly amount... Weekly...4.3... Bi-Weekly...2.15... Semi-Monthly...2... Every Other Month...0.5... Quarterly...0.333333... Twice a Year...0.166666... Annual... .083."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if income_is_weekly:
            periodic_income_amount * monthly_income_conversion_multiplier_weekly
          else:
            if income_is_biweekly:
              periodic_income_amount * monthly_income_conversion_multiplier_biweekly
            else:
              if income_is_semi_monthly:
                periodic_income_amount * monthly_income_conversion_multiplier_semi_monthly
              else:
                if income_is_every_other_month:
                  periodic_income_amount * monthly_income_conversion_multiplier_every_other_month
                else:
                  if income_is_quarterly:
                    periodic_income_amount * monthly_income_conversion_multiplier_quarterly
                  else:
                    if income_is_twice_a_year:
                      periodic_income_amount * monthly_income_conversion_multiplier_twice_a_year
                    else:
                      if income_is_annual:
                        periodic_income_amount * monthly_income_conversion_multiplier_annual
                      else:
                        0
