format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.402.1
  summary: Prospective budgeting computes a household's SNAP allotment based on anticipated
    income/circumstances during the issuance month; required for all SNAP households.
    Uncertain anticipated income is not counted unless it can be anticipated with
    reasonable certainty. Income received within the past thirty (30) days may be
    used as an indication of issuance-month income unless changes require adjustment.
rules:
- name: snap_prospective_budgeting_standard_past_income_lookback_days
  kind: parameter
  dtype: Integer
  source: 10 CCR 2506-1, 4.402.1(C)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.402.1
          excerpt: Income received within the past thirty (30) days may be used
  versions:
  - effective_from: '0001-01-01'
    formula: '30'
- name: snap_prospective_budgeting_required
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: 10 CCR 2506-1, 4.402.1(A)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.402.1
  versions:
  - effective_from: '0001-01-01'
    formula: 'true'
- name: snap_anticipated_income_portion_counted
  kind: derived
  entity: Household
  dtype: Money
  unit: USD
  period: Month
  source: 10 CCR 2506-1, 4.402.1(B)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.402.1
  versions:
  - effective_from: '0001-01-01'
    formula: 'if anticipated_income_portion_is_reasonably_certain: anticipated_income_portion_amount
      else: 0'
- name: snap_past_income_may_be_used_as_issuance_month_indication
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: 10 CCR 2506-1, 4.402.1(C)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.402.1
  versions:
  - effective_from: '0001-01-01'
    formula: '(past_income_observation_window_days <= snap_prospective_budgeting_standard_past_income_lookback_days)

      and not income_changes_occurred_or_anticipated_requiring_adjustment'
