format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.407.3
  summary: '"Households shall receive a deduction for the allowable monthly shelter
    costs that are in excess of fifty percent (50%) of the household''s income after
    all other deductions."

    "A shelter deduction cap... applies to households that do not contain a person
    who is aged sixty (60) and older or a person with a disability as defined in Section
    4.000.1... Effective October 1, 2025 $744"

    "Households in which all individuals are experiencing homelessness... shall be
    entitled to use a standard estimate... Homeless Shelter Deduction... Effective
    October 1, 2025 $198.99"'
rules:
- name: snap_shelter_excess_income_share_rate
  kind: parameter
  dtype: Rate
  source: 10 CCR 2506-1, 4.407.3(A)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.407.3
          excerpt: in excess of fifty percent (50%) of the household's income after
            all other deductions
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.407.3
          excerpt: fifty percent (50%)
  versions:
  - effective_from: '0001-01-01'
    formula: '0.50'
- name: snap_shelter_deduction_cap
  kind: parameter
  dtype: Money
  unit: USD
  source: 10 CCR 2506-1, 4.407.3(B)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.407.3
          excerpt: Shelter Deduction Cap Effective October 1, 2025 $744
  versions:
  - effective_from: '2025-10-01'
    formula: '744'
- name: snap_homeless_shelter_deduction_standard_estimate
  kind: parameter
  dtype: Money
  unit: USD
  source: 10 CCR 2506-1, 4.407.3(C)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.407.3
          excerpt: Homeless Shelter Deduction Effective October 1, 2025 $198.99
  versions:
  - effective_from: '2025-10-01'
    formula: '198.99'
- name: snap_excess_shelter_costs
  kind: derived
  entity: Household
  dtype: Money
  period: Month
  unit: USD
  source: 10 CCR 2506-1, 4.407.3(A)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.407.3
          excerpt: deduction for the allowable monthly shelter costs that are in excess
            of fifty percent (50%) of the household's income after all other deductions
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.407.3
          excerpt: fifty percent (50%)
  versions:
  - effective_from: '0001-01-01'
    formula: "max(\n  0,\n  snap_allowable_monthly_shelter_costs\n  - (snap_shelter_excess_income_share_rate\
      \ * snap_income_after_all_other_deductions)\n)"
- name: snap_shelter_deduction_cap_applies
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: 10 CCR 2506-1, 4.407.3(B)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.407.3
          excerpt: cap... applies to households that do not contain a person who is
            aged sixty (60) and older or a person with a disability as defined in
            Section 4.000.1
  versions:
  - effective_from: '0001-01-01'
    formula: '(not household_contains_person_aged_60_or_older)

      and (not household_contains_person_with_disability_as_defined_in_section_4_000_1)'
- name: snap_excess_shelter_deduction
  kind: derived
  entity: Household
  dtype: Money
  period: Month
  unit: USD
  source: 10 CCR 2506-1, 4.407.3(A)-(B)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.407.3
          excerpt: deduction... in excess of fifty percent (50%)...
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.407.3
          excerpt: A shelter deduction cap... applies to households that do not contain
            a person who is aged sixty (60) and older or a person with a disability...
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.407.3
          excerpt: Effective October 1, 2025 $744
  versions:
  - effective_from: '2025-10-01'
    formula: 'if snap_shelter_deduction_cap_applies: min(snap_excess_shelter_costs,
      snap_shelter_deduction_cap) else: snap_excess_shelter_costs'
- name: snap_homeless_shelter_standard_estimate_applies
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: 10 CCR 2506-1, 4.407.3(C)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.407.3
          excerpt: Households in which all individuals are experiencing homelessness
            and are not receiving free shelter throughout the calendar month shall
            be entitled to use a standard estimate of shelter expenses.
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.407.3
          excerpt: Households experiencing homelessness that incur no shelter costs
            during the month shall not be eligible for the homeless shelter deduction.
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.407.3
          excerpt: unless higher shelter costs are verified, at which point the household
            may use actual shelter costs rather than the estimate
  versions:
  - effective_from: '0001-01-01'
    formula: 'household_all_individuals_experiencing_homelessness

      and (not household_receives_free_shelter_throughout_calendar_month)

      and household_incurred_or_reasonably_expects_to_incur_shelter_costs_during_month

      and (not household_verified_higher_shelter_costs_than_standard_estimate)'
- name: snap_allowable_shelter_costs_for_homeless_household
  kind: derived
  entity: Household
  dtype: Money
  period: Month
  unit: USD
  source: 10 CCR 2506-1, 4.407.3(C)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.407.3
          excerpt: eligible for the estimate, unless higher shelter costs are verified,
            at which point the household may use actual shelter costs rather than
            the estimate
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.407.3
          excerpt: Effective October 1, 2025 $198.99
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.407.3
          excerpt: incur no shelter costs during the month shall not be eligible for
            the homeless shelter deduction
  versions:
  - effective_from: '2025-10-01'
    formula: "if snap_homeless_shelter_standard_estimate_applies:\n  snap_homeless_shelter_deduction_standard_estimate\n\
      else:\n  if household_all_individuals_experiencing_homelessness\n     and (not\
      \ household_receives_free_shelter_throughout_calendar_month)\n     and household_incurred_or_reasonably_expects_to_incur_shelter_costs_during_month\n\
      \     and household_verified_higher_shelter_costs_than_standard_estimate:\n\
      \    snap_actual_monthly_shelter_costs\n  else:\n    0"
