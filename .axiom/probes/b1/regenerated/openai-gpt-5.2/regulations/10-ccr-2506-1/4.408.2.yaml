format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.408.2
  summary: |-
    Households not eligible under expanded or basic categorical eligibility rules must report certain resource transfers within the three-month period preceding application. Knowingly transferring resources to qualify (within 3 months before application or after eligibility) results in disqualification up to one year. Disqualification length is based on the amount by which nonexempt transferred resources, when added to other countable resources, exceed allowable resource limits, using the provided dollar-to-month chart. Certain transfers do not affect eligibility (excluded/under-limit resources; fair market value; within-household transfers; other reasons).
rules:
  - name: transfer_lookback_period_months
    kind: parameter
    dtype: Integer
    source: 10 CCR 2506-1, 4.408.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.408.2
              excerpt: "transferred within the three (3) month period immediately preceding the date of application"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          3

  - name: transfer_disqualification_max_months
    kind: parameter
    dtype: Integer
    source: 10 CCR 2506-1, 4.408.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.408.2
              excerpt: "shall be disqualified ... for up to one (1) year"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          12

  - name: excess_amount_band_0_lower
    kind: parameter
    dtype: Money
    unit: USD
    source: 10 CCR 2506-1, 4.408.2(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.408.2
              excerpt: "$1 to $249"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1

  - name: excess_amount_band_0_upper
    kind: parameter
    dtype: Money
    unit: USD
    source: 10 CCR 2506-1, 4.408.2(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.408.2
              excerpt: "$1 to $249"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          249

  - name: excess_amount_band_1_lower
    kind: parameter
    dtype: Money
    unit: USD
    source: 10 CCR 2506-1, 4.408.2(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.408.2
              excerpt: "$250 to $999"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          250

  - name: excess_amount_band_1_upper
    kind: parameter
    dtype: Money
    unit: USD
    source: 10 CCR 2506-1, 4.408.2(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.408.2
              excerpt: "$250 to $999"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          999

  - name: excess_amount_band_2_lower
    kind: parameter
    dtype: Money
    unit: USD
    source: 10 CCR 2506-1, 4.408.2(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.408.2
              excerpt: "$1,000 to $2,999"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1000

  - name: excess_amount_band_2_upper
    kind: parameter
    dtype: Money
    unit: USD
    source: 10 CCR 2506-1, 4.408.2(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.408.2
              excerpt: "$1,000 to $2,999"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          2999

  - name: excess_amount_band_3_lower
    kind: parameter
    dtype: Money
    unit: USD
    source: 10 CCR 2506-1, 4.408.2(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.408.2
              excerpt: "$3,000 to $4,999"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          3000

  - name: excess_amount_band_3_upper
    kind: parameter
    dtype: Money
    unit: USD
    source: 10 CCR 2506-1, 4.408.2(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.408.2
              excerpt: "$3,000 to $4,999"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          4999

  - name: excess_amount_band_4_lower
    kind: parameter
    dtype: Money
    unit: USD
    source: 10 CCR 2506-1, 4.408.2(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.408.2
              excerpt: "$5,000 12 months"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          5000

  - name: transfer_disqualification_months_by_excess_amount_band
    kind: parameter
    dtype: Integer
    indexed_by: excess_amount_band
    source: 10 CCR 2506-1, 4.408.2(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].values
            kind: parameter_table
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.408.2
              table:
                header: "Amount in Excess of the Resource Limit / Period of Disqualification"
                row_key: "Amount in Excess of the Resource Limit"
                column_key: "Period of Disqualification (months)"
    versions:
      - effective_from: '0001-01-01'
        values:
          0: 1
          1: 3
          2: 6
          3: 9
          4: 12

  - name: excess_amount_band
    kind: derived
    entity: Household
    dtype: Integer
    period: Month
    source: 10 CCR 2506-1, 4.408.2(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.408.2
              excerpt: "Amount in Excess of the Resource Limit ... $1 to $249 ... $250 to $999 ... $1,000 to $2,999 ... $3,000 to $4,999 ... $5,000"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if nonexempt_transferred_resources_amount_in_excess_of_resource_limit < excess_amount_band_0_lower: -1 else: if nonexempt_transferred_resources_amount_in_excess_of_resource_limit <= excess_amount_band_0_upper: 0 else: if nonexempt_transferred_resources_amount_in_excess_of_resource_limit <= excess_amount_band_1_upper: 1 else: if nonexempt_transferred_resources_amount_in_excess_of_resource_limit <= excess_amount_band_2_upper: 2 else: if nonexempt_transferred_resources_amount_in_excess_of_resource_limit <= excess_amount_band_3_upper: 3 else: 4

  - name: resource_transfer_exempt_from_disqualification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1, 4.408.2(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.408.2
              excerpt: "Eligibility for the program shall not be affected by the following transfers"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          transfer_of_excluded_or_under_limit_resources
          or transfer_at_or_near_fair_market_value
          or transfer_between_members_of_same_household
          or transfer_for_reasons_other_than_qualifying_for_snap

  - name: resource_transfer_disqualification_applies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1, 4.408.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.408.2
              excerpt: "Households that have transferred resources knowingly for the purpose of qualifying or attempting to qualify for SNAP benefits shall be disqualified"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.408.2
              excerpt: "applied if the resources are transferred knowingly in the three (3) month period prior to application, or ... after the household is determined eligible"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.408.2
              excerpt: "Eligibility for the program shall not be affected by the following transfers"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_not_eligible_under_expanded_or_basic_categorical_eligibility_rules
          and transfer_knowingly_for_purpose_of_qualifying_for_snap
          and (transfer_occurred_within_lookback_period_prior_to_application or transfer_occurred_after_household_determined_eligible)
          and (
            not resource_transfer_exempt_from_disqualification
          )

  - name: resource_transfer_disqualification_months
    kind: derived
    entity: Household
    dtype: Integer
    period: Month
    source: 10 CCR 2506-1, 4.408.2(B)-(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.408.2
              excerpt: "length ... based on the amount by which nonexempt transferred resources, when added to other countable resources, exceed the allowable resource limits"
          - path: versions[0].formula
            kind: table_cell
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.408.2
              table:
                header: "Amount in Excess of the Resource Limit / Period of Disqualification"
                row: "$1 to $249"
                column: "Period of Disqualification"
          - path: versions[0].formula
            kind: table_cell
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.408.2
              table:
                header: "Amount in Excess of the Resource Limit / Period of Disqualification"
                row: "$250 to $999"
                column: "Period of Disqualification"
          - path: versions[0].formula
            kind: table_cell
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.408.2
              table:
                header: "Amount in Excess of the Resource Limit / Period of Disqualification"
                row: "$1,000 to $2,999"
                column: "Period of Disqualification"
          - path: versions[0].formula
            kind: table_cell
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.408.2
              table:
                header: "Amount in Excess of the Resource Limit / Period of Disqualification"
                row: "$3,000 to $4,999"
                column: "Period of Disqualification"
          - path: versions[0].formula
            kind: table_cell
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.408.2
              table:
                header: "Amount in Excess of the Resource Limit / Period of Disqualification"
                row: "$5,000"
                column: "Period of Disqualification"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if not resource_transfer_disqualification_applies: 0 else: if excess_amount_band < 0: 0 else: transfer_disqualification_months_by_excess_amount_band[excess_amount_band]
