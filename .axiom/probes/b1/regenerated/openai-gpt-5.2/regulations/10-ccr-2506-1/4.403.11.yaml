format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.403.11
  summary: Self-employment income counted in the month of application is the gross
    anticipated income plus capital gains less anticipated costs of doing business.
    For anticipated self-employment income, capital gains anticipated in the next
    twelve (12) months beginning with the application date are added and divided by
    twelve (12); this amount is used in successive certification periods over the
    next twelve months unless a change occurs.
rules:
- name: capital_gains_averaging_months
  kind: parameter
  dtype: Integer
  source: 10 CCR 2506-1, 4.403.11(D)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.403.11
          excerpt: capital gains that the household anticipates receiving in the next
            twelve (12) months ... are added, and divided by twelve (12).
  versions:
  - effective_from: '0001-01-01'
    formula: '12'
- name: anticipated_monthly_capital_gains
  kind: derived
  entity: Household
  dtype: Money
  unit: USD
  period: Month
  source: 10 CCR 2506-1, 4.403.11(D)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.403.11
          excerpt: capital gains ... anticipated receiving in the next twelve (12)
            months ... are added, and divided by twelve (12).
  versions:
  - effective_from: '0001-01-01'
    formula: 'if self_employment_income_calculated_on_anticipated_basis: anticipated_capital_gains_next_twelve_months
      / capital_gains_averaging_months else: 0'
- name: monthly_net_self_employment_income
  kind: derived
  entity: Household
  dtype: Money
  unit: USD
  period: Month
  source: 10 CCR 2506-1, 4.403.11 (intro), (D)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.403.11
          excerpt: gross amount of anticipated income plus capital gains less anticipated
            costs of doing business.
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.403.11
          excerpt: The anticipated monthly amount of capital gains and the anticipated
            monthly self-employment income then are added and the anticipated cost
            of producing the income deducted.
  versions:
  - effective_from: '0001-01-01'
    formula: '(gross_anticipated_self_employment_income_monthly + anticipated_monthly_capital_gains)

      - anticipated_monthly_allowable_business_costs'
- name: snap_self_employment_expense_based_deduction_applies
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: 10 CCR 2506-1, 4.403.11 (intro), (A), (D)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: predicate
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.403.11
          excerpt: gross amount of anticipated income plus capital gains less anticipated
            costs of doing business.
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.403.11
          excerpt: The allowable costs of producing the self-employment income are
            excluded...
  versions:
  - effective_from: '0001-01-01'
    formula: household_has_self_employment_income
