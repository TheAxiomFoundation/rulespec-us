  summary: Dependent care expenses for care of a child or dependent with disabilities
    are deductible when necessary for employment (accept/continue/seek), training,
    or education preparatory to employment. Only direct monetary payments to an agency
    or person outside the household are allowable; in-kind benefits (e.g., meals)
    are not. Reimbursed/paid child care by JOBS (Title IV-F) or TCC is not deductible.
    Special proration applies when paid/billed to certain disqualified persons; IPV/fraud
    disqualified payments allowed in entirety. Attendant costs (including meals) are
    considered a medical expense; refer to Section 4.407.6 for certain household members.
rules:
- name: allowable_dependent_care_deduction
  kind: derived
  entity: Household
  dtype: Money
  unit: USD
  period: Month
  source: 10 CCR 2506-1, Section 4.407.4(A)-(D)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.407.4
  versions:
  - effective_from: '0001-01-01'
    formula: "if dependent_care_is_for_child_or_dependent_with_disabilities\n   and\
      \ dependent_care_is_necessary_for_employment_or_job_search_or_training_or_education_preparatory\n\
      \   and dependent_care_paid_as_direct_monetary_payment_to_outside_household\n\
      \   and not dependent_care_reimbursed_or_paid_by_jobs_or_tcc:\n  if dependent_care_paid_or_billed_to_person_disqualified_for_ipv_or_fraud:\n\
      \    dependent_care_direct_monetary_payment_amount\n  else:\n    if dependent_care_paid_or_billed_to_person_disqualified_for_ineligible_non_citizen_or_ssn\n\
      \       and dependent_care_paid_by_or_billed_to_disqualified_person:\n     \
      \ dependent_care_direct_monetary_payment_amount\n      - (\n        (dependent_care_direct_monetary_payment_amount\n\
      \         / (eligible_household_member_count_for_proration + disqualified_person_count_for_proration))\n\
      \        * disqualified_person_count_for_proration\n      )\n    else:\n   \
      \   dependent_care_direct_monetary_payment_amount\nelse:\n  0"
- name: attendant_care_costs_treated_as_medical_expense_amount
