format: rulespec/v1
module:
  summary: 'Unearned income includes (not limited to): assistance payments; retirement/disability
    payments; support/alimony; rental income where the household member (or disqualified
    individual) is not actively managing the property an average of at least twenty
    (20) hours a week; income of non-citizen sponsors (for households containing sponsored
    non-citizens); certain post-termination vacation/sick/bonus pay; certain gifts
    (including nonprofit gifts exceeding $300 in a quarter); dividends/interest/royalties
    and other gain/benefit; certain trust withdrawals/dividends; and substantial lottery/gambling
    winnings.'
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.404
rules:
- name: rental_active_management_hours_per_week_threshold
  kind: parameter
  dtype: Decimal
  source: 10 CCR 2506-1, 4.404(D)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.404
          excerpt: not actively managing the property an average of at least twenty
            (20) hours a week
      - path: versions[0].formula
        kind: unit
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.404
          excerpt: hours a week
  versions:
  - effective_from: '0001-01-01'
    formula: '20'
- name: nonprofit_gift_quarterly_amount_threshold
  kind: parameter
  dtype: Money
  unit: USD
  source: 10 CCR 2506-1, 4.404(G)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.404
          excerpt: exceed three hundred dollars ($300) in a quarter
  versions:
  - effective_from: '0001-01-01'
    formula: '300'
- name: payment_is_unearned_income
  kind: derived
  entity: Payment
  dtype: Judgment
  period: Month
  source: 10 CCR 2506-1, 4.404(A)-(I)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: definition
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.404
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.404
          excerpt: 'Unearned income shall include, but not be limited to, the following:
            A. ... I.'
  versions:
  - effective_from: '0001-01-01'
    formula: "match payment_unearned_income_category:\n  \"assistance_payment\" =>\
      \ true\n  \"retirement_or_disability_payment\" => true\n  \"support_or_alimony_payment\"\
      \ => true\n  \"income_of_non_citizen_sponsor\" => true\n  \"other_gain_or_benefit\"\
      \ => true\n  \"trust_withdrawal\" => true\n  \"trust_dividend_available\" =>\
      \ true\n  \"substantial_lottery_or_gambling_winnings\" => payment_is_substantial_lottery_or_gambling_winnings_under_4_000_1\n\
      \  \"rental_income\" =>\n    rental_property_management_hours_per_week < rental_active_management_hours_per_week_threshold\n\
      \  \"post_termination_vacation_sick_or_bonus_pay\" =>\n    post_termination_pay_received_after_employment_terminated\n\
      \    and (\n      match post_termination_pay_form:\n        \"installments\"\
      \ => true\n        \"lump_sum\" => false\n    )\n  \"gift\" =>\n    (gift_source_is_nonprofit\
      \ and (gift_amount_received_in_quarter > nonprofit_gift_quarterly_amount_threshold))\n\
      \    or ((not gift_source_is_nonprofit) and gift_can_be_anticipated)"
