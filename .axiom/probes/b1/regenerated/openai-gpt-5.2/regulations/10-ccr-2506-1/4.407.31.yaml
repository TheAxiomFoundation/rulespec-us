format: rulespec/v1
module:
  summary: |-
    Establishes four-tier mandatory standard utility allowance deductions for SNAP excess shelter: Heating and Cooling Utility Allowance (HCUA), Basic Utility Allowance (BUA), One Utility Allowance (OUA), and Telephone allowance, with standards effective October 1, 2025: HCUA $594; BUA $377; OUA $71; Telephone $97. Households may not claim actual utility expenses and are entitled to only one of the four allowances.
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.407.31
rules:
  - name: heating_and_cooling_utility_allowance_standard
    kind: parameter
    dtype: Money
    unit: USD
    source: 10 CCR 2506-1, 4.407.31(A)(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.407.31
              excerpt: "HCUA Standard Effective October 1, 2025 $594"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          594

  - name: basic_utility_allowance_standard
    kind: parameter
    dtype: Money
    unit: USD
    source: 10 CCR 2506-1, 4.407.31(B)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.407.31
              excerpt: "BUA Standard Effective October 1, 2025 $377"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          377

  - name: one_utility_allowance_standard
    kind: parameter
    dtype: Money
    unit: USD
    source: 10 CCR 2506-1, 4.407.31(C)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.407.31
              excerpt: "OUA Standard Effective October 1, 2025 $71"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          71

  - name: telephone_utility_allowance_standard
    kind: parameter
    dtype: Money
    unit: USD
    source: 10 CCR 2506-1, 4.407.31(D)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.407.31
              excerpt: "Telephone Standard Effective October 1, 2025 $97"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          97

  - name: heating_and_cooling_utility_allowance_eligible
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1, 4.407.31(A)(1)-(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.407.31
              excerpt: "A heating and cooling utility allowance (HCUA) is available only to households that: (a) Incur or anticipate heating or cooling costs separate and apart from their rent or mortgage; (b) Received ... LEAP ... or ... E-EBT ... within the previous twelve (12) month period; (c) Live in private rental housing and are billed ...; (d) Share a residence and incur at least a portion ...; (e) Live in public housing and are responsible for excess heating and/or cooling costs."
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.407.31
              excerpt: "supplemental heating source ... are allowable costs when determining eligibility for the basic utility allowance (BUA), but do not qualify a household for the HCUA."
    versions:
      - effective_from: '2008-10-01'
        formula: |-
          (
            household_incur_or_anticipate_heating_or_cooling_costs_separate_from_rent_or_mortgage
            or household_received_leap_or_e_ebt_within_previous_twelve_months
            or household_private_rental_billed_by_landlord_based_on_individual_usage_or_flat_rate_separate_from_rent_for_heating_and_cooling
            or household_shares_residence_and_incur_portion_of_heating_or_cooling_cost
            or household_public_housing_responsible_for_excess_heating_or_cooling_costs
          )
          and not household_only_has_supplemental_heating_source_costs

  - name: basic_utility_allowance_eligible
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1, 4.407.31(B)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.407.31
              excerpt: "The Basic Utility Allowance (BUA) is mandated for any households that are not entitled to the HCUA and that incur at least two (2) non-heating or non-cooling utility costs"
    versions:
      - effective_from: '2008-10-01'
        formula: |-
          (not heating_and_cooling_utility_allowance_eligible)
          and (household_non_heating_non_cooling_utility_cost_count >= 2)

  - name: one_utility_allowance_eligible
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1, 4.407.31(C)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.407.31
              excerpt: "OUA ... mandated for any household that is not entitled to the HCUA or BUA but is responsible for only one (1) non-heating or one (1) non-cooling utility expense. The OUA is not allowed if the household’s only utility expense is a telephone."
    versions:
      - effective_from: '2008-10-01'
        formula: |-
          (not heating_and_cooling_utility_allowance_eligible)
          and (not basic_utility_allowance_eligible)
          and (household_non_heating_non_cooling_utility_cost_count == 1)
          and not household_only_utility_expense_is_telephone

  - name: telephone_utility_allowance_eligible
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10 CCR 2506-1, 4.407.31(D)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.407.31
              excerpt: "The telephone allowance is available to households whose only utility cost is for a telephone."
    versions:
      - effective_from: '2008-10-01'
        formula: |-
          household_only_utility_expense_is_telephone

  - name: mandatory_standard_utility_allowance_deduction
    kind: derived
    entity: Household
    dtype: Money
    unit: USD
    period: Month
    source: 10 CCR 2506-1, 4.407.31 (intro), (A)-(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: ordering
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.407.31
              excerpt: "Households ... are only entitled to one (1) of the four (4) utility allowances."
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.407.31
              excerpt: "The four (4) allowances are as follows: A. ... HCUA ... B. ... BUA ... C. ... OUA ... D. Telephone allowance"
    versions:
      - effective_from: '2008-10-01'
        formula: |-
          if heating_and_cooling_utility_allowance_eligible:
            heating_and_cooling_utility_allowance_standard
          else:
            if basic_utility_allowance_eligible:
              basic_utility_allowance_standard
            else:
              if one_utility_allowance_eligible:
                one_utility_allowance_standard
              else:
                if telephone_utility_allowance_eligible:
                  telephone_utility_allowance_standard
                else:
                  0
