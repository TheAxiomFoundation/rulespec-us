format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.403.3
  summary: "Households with members who receive income other than hourly piece-work\
    \ basis from annually renewable contract employment: average such income over\
    \ twelve (12) months to determine household eligibility; treat as compensation\
    \ for full year regardless of payment frequency; add other household members\u2019\
    \ monthly income to the average monthly income."
rules:
- name: annual_contract_income_averaging_months
  kind: parameter
  dtype: Integer
  source: 10 CCR 2506-1, 4.403.3(A), (D)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.403.3
          excerpt: averaged over a twelve (12) month period
  versions:
  - effective_from: '0001-01-01'
    formula: '12'
- name: annual_contract_employment_income_is_averaged_over_year
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: 10 CCR 2506-1, 4.403.3(A)-(C)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.403.3
          excerpt: income other than that which is paid on an hourly piece-work basis
            from employment under a contract which is renewable on an annual basis
  versions:
  - effective_from: '0001-01-01'
    formula: 'person_has_income_from_annually_renewable_contract_employment

      and not person_income_is_hourly_piecework_basis'
- name: annual_contract_employment_average_monthly_income
  kind: derived
  entity: Person
  dtype: Money
  period: Month
  unit: USD
  source: 10 CCR 2506-1, 4.403.3(A), (D)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.403.3
          excerpt: shall be averaged over a twelve (12) month period to determine
            the member's average monthly income
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.403.3
          excerpt: twelve (12) month period
  versions:
  - effective_from: '0001-01-01'
    formula: 'if annual_contract_employment_income_is_averaged_over_year: annual_contract_employment_income
      / annual_contract_income_averaging_months else: 0'
- name: household_monthly_income_for_eligibility_with_annual_contract_averaging
  kind: derived
  entity: Household
  dtype: Money
  period: Month
  unit: USD
  source: 10 CCR 2506-1, 4.403.3(D)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.403.3
          excerpt: To determine household eligibility all other monthly income from
            other household members will be added to this average monthly income.
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.403.3
          excerpt: annual income ... shall be averaged over a twelve (12) month period
  versions:
  - effective_from: '0001-01-01'
    formula: '(sum_where(member_of_household, annual_contract_employment_income, annual_contract_employment_income_is_averaged_over_year)
      / annual_contract_income_averaging_months)

      + household_other_monthly_income'
