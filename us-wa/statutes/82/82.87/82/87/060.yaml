format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-wa/statute/82/82.87/82.87.060
  summary: |-
    In computing tax for a taxable year, a taxpayer may deduct from Washington capital gains: a standard deduction of $250,000 per individual, with spouses or domestic partners limited to a combined $250,000; constitutionally prohibited amounts; qualified family-owned small business amounts; and charitable donations.
  deferred_outputs:
    - output: us-wa:statutes/82/82.87/82/87/060#washington_capital_gains_deductions
      reason: The source states that the standard deduction amount is adjusted pursuant to RCW 82.87.150, but that adjustment source is not provided in this context. The final combined deduction cannot be computed faithfully without the adjusted standard deduction amount.
      source_values:
        - us-wa:statutes/82/82.87/82/87/060#statutory_standard_deduction_per_individual
        - us-wa:statutes/82/82.87/82/87/060#statutory_combined_standard_deduction_limit_for_spouses_or_domestic_partners
rules:
  - name: statutory_standard_deduction_per_individual
    kind: parameter
    dtype: Money
    unit: USD
    period: Year
    source: RCW 82.87.060(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-wa/statute/82/82.87/82.87.060
              excerpt: "A standard deduction of $250,000 per individual"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          250000

  - name: statutory_combined_standard_deduction_limit_for_spouses_or_domestic_partners
    kind: parameter
    dtype: Money
    unit: USD
    period: Year
    source: RCW 82.87.060(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-wa/statute/82/82.87/82.87.060
              excerpt: "spouses or domestic partners, their combined standard deduction is limited to $250,000"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          250000
