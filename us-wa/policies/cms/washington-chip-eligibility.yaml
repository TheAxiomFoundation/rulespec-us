format: rulespec/v1
imports:
  - us:statutes/42/1397jj/c/1#child
  - us-wa:policies/cms/washington-medicaid-chip-bhp-eligibility-levels#washington_children_separate_chip_effective_fpl_limit
  - us-wa:policies/cms/washington-medicaid-chip-bhp-eligibility-levels#washington_pregnant_women_chip_available
  - us:policies/cms/medicaid-chip-bhp-eligibility-levels#magi_fpl_disregard_rate
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/form/cms/medicaid-chip-bhp-eligibility-levels
  summary: |-
    Washington CHIP eligibility composition applies the federal CHIP child and standard-pregnant eligibility framework to the CMS state eligibility-level outputs. It also applies the CMS CHIP FCEP SPA source for state-set coverage from conception to birth income eligibility.
rules:
  - name: washington_separate_chip_child_eligibility_available
    kind: derived
    dtype: Boolean
    period: Year
    source: CMS Medicaid, CHIP and BHP Eligibility Levels table, Washington row
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/1397ll/d/2
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/regulation/42/457/10
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/form/cms/medicaid-chip-bhp-eligibility-levels
              excerpt: "Children Separate CHIP"
    versions:
      - effective_from: '2023-12-01'
        formula: |-
          true
  - name: is_chip_eligible_child
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 42 USC 1397jj(b)(1), 42 USC 1397jj(c)(1), and CMS state CHIP eligibility levels
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/42/1397jj/c/1#child
              output: child
              hash: sha256:5983f9bd1c30a824da826ee4bc8fc3351cd2c631d4a0ce198b156446493ef9e0
          - path: versions[0].formula
            kind: import
            import:
              target: us-wa:policies/cms/washington-medicaid-chip-bhp-eligibility-levels#washington_children_separate_chip_effective_fpl_limit
              output: washington_children_separate_chip_effective_fpl_limit
              hash: sha256:c35200acc859a9857d14cdd9e0a462a58ec0ce3b0e61bf9aec02dd8fe8448424
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/1397jj/b/1
              excerpt: "not found eligible for medical assistance under subchapter XIX"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/form/cms/medicaid-chip-bhp-eligibility-levels
              excerpt: "Children Separate CHIP"
    versions:
      - effective_from: '2023-12-01'
        formula: |-
          child
          and person_meets_chip_immigration_requirement
          and not found_eligible_for_medical_assistance_under_subchapter_xix
          and medicaid_income_level <= washington_children_separate_chip_effective_fpl_limit
  - name: washington_standard_pregnant_chip_eligibility_available
    kind: derived
    dtype: Boolean
    period: Year
    source: CMS Medicaid, CHIP and BHP Eligibility Levels table, Washington row
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: import
            import:
              target: us-wa:policies/cms/washington-medicaid-chip-bhp-eligibility-levels#washington_pregnant_women_chip_available
              output: washington_pregnant_women_chip_available
              hash: sha256:c35200acc859a9857d14cdd9e0a462a58ec0ce3b0e61bf9aec02dd8fe8448424
    versions:
      - effective_from: '2023-12-01'
        formula: |-
          washington_pregnant_women_chip_available
  - name: is_chip_eligible_standard_pregnant_person
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 42 USC 1397ll(d)(2) and CMS state CHIP eligibility levels
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/form/cms/medicaid-chip-bhp-eligibility-levels
              excerpt: "Pregnant Women CHIP"
    versions:
      - effective_from: '2023-12-01'
        formula: |-
          false
  - name: washington_fcep_eligibility_available
    kind: derived
    dtype: Boolean
    period: Year
    source: CMS CHIP FCEP SPA source, Washington
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/policy/cms/chip-spa/wa/wa-24-3000-and-wa-24-5000/summary/block-1
              excerpt: "Through these SPAs, the state increases the income level from 193 to 210 percent of the federal poverty level (FPL) for the from-conception-to-end-of-pregnancy (FCEP) population."
    versions:
      - effective_from: '2024-11-01'
        formula: |-
          true
  - name: washington_fcep_fpl_limit
    kind: parameter
    dtype: Rate
    period: Year
    source: CMS CHIP FCEP SPA source, Washington
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/policy/cms/chip-spa/wa/wa-24-3000-and-wa-24-5000/summary/block-1
              excerpt: "Through these SPAs, the state increases the income level from 193 to 210 percent of the federal poverty level (FPL) for the from-conception-to-end-of-pregnancy (FCEP) population."
    versions:
      - effective_from: '2024-11-01'
        formula: |-
          2.10
  - name: washington_fcep_effective_fpl_limit
    kind: derived
    dtype: Rate
    period: Year
    source: CMS CHIP FCEP SPA source, Washington, including the MAGI 5% FPL disregard
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: import
            import:
              target: us:policies/cms/medicaid-chip-bhp-eligibility-levels#magi_fpl_disregard_rate
              output: magi_fpl_disregard_rate
              hash: sha256:ea0071602a4a4441e584a16bdbab3d8a3c36b40b7cea1151165533669423f5f5
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/regulation/42/435/603/d
              excerpt: "5 percentage points of the Federal poverty level"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/policy/cms/chip-spa/wa/wa-24-3000-and-wa-24-5000/summary/block-1
              excerpt: "Through these SPAs, the state increases the income level from 193 to 210 percent of the federal poverty level (FPL) for the from-conception-to-end-of-pregnancy (FCEP) population."
    versions:
      - effective_from: '2024-11-01'
        formula: |-
          washington_fcep_fpl_limit + magi_fpl_disregard_rate
  - name: is_chip_fcep_eligible_person
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 42 USC 1397ll(f)(1), 42 CFR 457.10, and CMS CHIP FCEP SPA source for Washington
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/policy/cms/chip-spa/wa/wa-24-3000-and-wa-24-5000/summary/block-1
              excerpt: "Through these SPAs, the state increases the income level from 193 to 210 percent of the federal poverty level (FPL) for the from-conception-to-end-of-pregnancy (FCEP) population."
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/1397ll/f/1
              excerpt: "through the application of sections 457.10"
    versions:
      - effective_from: '2024-11-01'
        formula: |-
          person_is_pregnant
          and not found_eligible_for_medical_assistance_under_subchapter_xix
          and medicaid_income_level <= washington_fcep_effective_fpl_limit
