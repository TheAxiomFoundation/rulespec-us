# Expected values are hand-computed from the supplied 2026 schedule. The supplied
# Washington-capital-gains grid and final liabilities were independently checked
# against PolicyEngine wa_income_tax_before_refundable_credits for tax year 2026.
# PolicyEngine projects the inflation-adjusted RCW 82.87.060 standard deduction
# to $284,000; the supplied RCW 82.87.080 charitable deduction is zero here.
- name: single_300000
  # Taxable 16,000; tax = .07 * 16,000 = 1,120.
  period: {period_kind: tax_year, start: '2026-01-01', end: '2026-12-31'}
  input:
    us-wa:policies/income_tax/pilot_liability_pipeline#input.wa_pit_pilot_supplied_washington_capital_gains: 300000
    us-wa:policies/income_tax/pilot_liability_pipeline#input.wa_pit_pilot_supplied_standard_deduction: 284000
    us-wa:policies/income_tax/pilot_liability_pipeline#input.wa_pit_pilot_supplied_charitable_deduction: 0
    us-wa:policies/income_tax/pilot_liability_pipeline#input.wa_pit_pilot_supplied_base_rate: 0.07
    us-wa:policies/income_tax/pilot_liability_pipeline#input.wa_pit_pilot_supplied_additional_rate: 0.029
    us-wa:policies/income_tax/pilot_liability_pipeline#input.wa_pit_pilot_supplied_additional_threshold: 1000000
  output:
    us-wa:policies/income_tax/pilot_liability_pipeline#wa_pit_pilot_taxable_income: '16000'
    us-wa:policies/income_tax/pilot_liability_pipeline#wa_pit_pilot_schedule_tax: '1120'
    us-wa:policies/income_tax/pilot_liability_pipeline#wa_pit_pilot_income_tax_liability: '1120'
