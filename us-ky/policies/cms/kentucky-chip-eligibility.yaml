format: rulespec/v1
imports:
  - us-ky:policies/cms/kentucky-medicaid-chip-bhp-eligibility-levels#kentucky_children_separate_chip_available
  - us-ky:policies/cms/kentucky-medicaid-chip-bhp-eligibility-levels#kentucky_pregnant_women_chip_fpl_limit
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/form/cms/medicaid-chip-bhp-eligibility-levels
  summary: |-
    Kentucky CHIP eligibility composition applies the federal CHIP child and standard-pregnant eligibility framework to the CMS state eligibility-level outputs. It intentionally does not encode FCEP state income limits until primary state-plan or CMS source coverage is available.
rules:
  - name: kentucky_separate_chip_child_eligibility_available
    kind: derived
    dtype: Boolean
    period: Year
    source: CMS Medicaid, CHIP and BHP Eligibility Levels table, Kentucky row
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: custom
            source:
              corpus_citation_path: us/statute/42/1397jj/b/1
          - path: versions[0].formula
            kind: import
            import:
              target: us-ky:policies/cms/kentucky-medicaid-chip-bhp-eligibility-levels#kentucky_children_separate_chip_available
              output: kentucky_children_separate_chip_available
              hash: sha256:6b864a56970e477eb0c1599e9bb6527f82043fd405f26029fccbe27cd0030970
    versions:
      - effective_from: '2023-12-01'
        formula: |-
          kentucky_children_separate_chip_available
  - name: is_chip_eligible_child
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 42 USC 1397jj(b)(1), 42 USC 1397jj(c)(1), and CMS state CHIP eligibility levels
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/form/cms/medicaid-chip-bhp-eligibility-levels
              excerpt: "Children Separate CHIP"
    versions:
      - effective_from: '2023-12-01'
        formula: |-
          false
  - name: kentucky_standard_pregnant_chip_eligibility_available
    kind: derived
    dtype: Boolean
    period: Year
    source: CMS Medicaid, CHIP and BHP Eligibility Levels table, Kentucky row
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/form/cms/medicaid-chip-bhp-eligibility-levels
              excerpt: "Pregnant Women CHIP"
    versions:
      - effective_from: '2023-12-01'
        formula: |-
          true
  - name: is_chip_eligible_standard_pregnant_person
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 42 USC 1397ll(d)(2) and CMS state CHIP eligibility levels
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: import
            import:
              target: us-ky:policies/cms/kentucky-medicaid-chip-bhp-eligibility-levels#kentucky_pregnant_women_chip_fpl_limit
              output: kentucky_pregnant_women_chip_fpl_limit
              hash: sha256:6b864a56970e477eb0c1599e9bb6527f82043fd405f26029fccbe27cd0030970
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/1397ll/d/2
              excerpt: "targeted low-income pregnant woman"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/form/cms/medicaid-chip-bhp-eligibility-levels
              excerpt: "Pregnant Women CHIP"
    versions:
      - effective_from: '2023-12-01'
        formula: |-
          person_is_pregnant
          and person_meets_chip_immigration_requirement
          and not found_eligible_for_medical_assistance_under_subchapter_xix
          and medicaid_income_level <= kentucky_pregnant_women_chip_fpl_limit
