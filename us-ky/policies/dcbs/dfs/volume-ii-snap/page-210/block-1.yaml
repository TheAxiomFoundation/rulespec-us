    source_relation:
      type: sets
      target: us:regulations/7-cfr/273/9#snap_individual_utility_allowance_state_option
      authority: state
      value: us-ky:policies/dcbs/dfs/volume-ii-snap/page-210/block-1#kentucky_snap_individual_utility_allowance_state_option
      basis:
        delegation: us:regulations/7-cfr/273/9#snap_state_standard_utility_allowance_delegation

  - name: kentucky_snap_standard_utility_allowance_amount
    kind: parameter
    dtype: Money
    period: Month
    unit: USD
    source: Kentucky SNAP Manual MS 5490, Standard Utility Allowance amount
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ky/manual/dcbs/dfs/volume-ii-snap/page-210
              excerpt: "is $388"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          388

  - name: kentucky_snap_basic_utility_allowance_amount
    kind: parameter
    dtype: Money
    period: Month
    unit: USD
    source: Kentucky SNAP Manual MS 5498, Basic Utility Allowance amount
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ky/manual/dcbs/dfs/volume-ii-snap/page-212
              excerpt: "is $331"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          331

  - name: kentucky_snap_basic_utility_minimum_expense_count
    kind: parameter
    dtype: Count
    source: Kentucky SNAP Manual MS 5498, Basic Utility Allowance count
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ky/manual/dcbs/dfs/volume-ii-snap/page-212
              excerpt: "at least two of the following utility expenses"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          2

  - name: kentucky_snap_telephone_standard_amount
    kind: parameter
    dtype: Money
    period: Month
    unit: USD
    source: Kentucky SNAP Manual MS 5498 and MS 5500, Telephone Standard
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ky/manual/dcbs/dfs/volume-ii-snap/page-212
              excerpt: "telephone standard of $64"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          64

  - name: kentucky_snap_energy_assistance_threshold
    kind: parameter
    dtype: Money
    period: Year
    unit: USD
    source: Kentucky SNAP Manual MS 5490, energy assistance threshold
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ky/manual/dcbs/dfs/volume-ii-snap/page-210
              excerpt: "greater than $20 annually"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          20

  - name: kentucky_snap_homeless_standard_allowance_amount
    kind: parameter
    dtype: Money
    period: Month
    unit: USD
    source: Kentucky SNAP Manual MS 5485, Homeless Standard allowance
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ky/manual/dcbs/dfs/volume-ii-snap/page-208
              excerpt: "is $199 per month"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          199

  - name: kentucky_snap_standard_utility_allowance_entitled
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Kentucky SNAP Manual MS 5490, Standard Utility Allowance eligibility
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ky/manual/dcbs/dfs/volume-ii-snap/page-210
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ky/manual/dcbs/dfs/volume-ii-snap/page-211
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          snap_household_incurred_out_of_pocket_heating_or_cooling_cost
          or snap_household_rental_housing_billed_monthly_for_primary_heating_or_cooling_by_landlord
          or snap_household_owner_billed_for_primary_heating_or_cooling
          or snap_household_reasonably_expects_primary_heating_or_cooling_expense_during_certification
          or snap_household_shared_utilities_and_any_household_billed_for_heating_or_cooling
          or snap_household_receives_hud_or_fmha_utility_payment
          or snap_household_public_housing_billed_or_expected_to_be_billed_for_excess_heating_or_cooling
          or (
            snap_household_contains_elderly_or_disabled_member
            and snap_household_liheap_or_indirect_energy_assistance_received_current_or_prior_12_months
            and snap_household_energy_assistance_annual_amount > kentucky_snap_energy_assistance_threshold
          )

  - name: kentucky_snap_basic_utility_allowance_entitled
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Kentucky SNAP Manual MS 5498, Basic Utility Allowance eligibility
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ky/manual/dcbs/dfs/volume-ii-snap/page-212
              excerpt: "must be billed for at least two"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          not kentucky_snap_standard_utility_allowance_entitled
          and snap_household_non_heating_non_cooling_utility_expense_count >= kentucky_snap_basic_utility_minimum_expense_count

  - name: kentucky_snap_telephone_standard_entitled
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Kentucky SNAP Manual MS 5498 and MS 5500, Telephone Standard
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ky/manual/dcbs/dfs/volume-ii-snap/page-214
              excerpt: "only responsible for a telephone expense"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          not kentucky_snap_standard_utility_allowance_entitled
          and not kentucky_snap_basic_utility_allowance_entitled
          and snap_household_only_responsible_for_telephone_expense

  - name: kentucky_snap_standard_utility_allowance_state_option
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: Kentucky SNAP Manual MS 5490, Standard Utility Allowance
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ky/manual/dcbs/dfs/volume-ii-snap/page-210
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if kentucky_snap_standard_utility_allowance_entitled:
            kentucky_snap_standard_utility_allowance_amount
          else:
            0

  - name: kentucky_snap_basic_utility_allowance_state_option
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: Kentucky SNAP Manual MS 5498, Basic Utility Allowance
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ky/manual/dcbs/dfs/volume-ii-snap/page-212
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if kentucky_snap_basic_utility_allowance_entitled:
            kentucky_snap_basic_utility_allowance_amount
          else:
            0

  - name: kentucky_snap_individual_utility_allowance_state_option
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: Kentucky SNAP Manual MS 5498 and MS 5500, Telephone Standard
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ky/manual/dcbs/dfs/volume-ii-snap/page-214
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if kentucky_snap_telephone_standard_entitled:
            kentucky_snap_telephone_standard_amount
          else:
            0

  - name: kentucky_snap_utility_allowance
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: Kentucky SNAP Manual MS 5490, MS 5498, and MS 5500 utility standards
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ky/manual/dcbs/dfs/volume-ii-snap/page-213
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          kentucky_snap_standard_utility_allowance_state_option
          + kentucky_snap_basic_utility_allowance_state_option
          + kentucky_snap_individual_utility_allowance_state_option

  - name: kentucky_snap_shared_utility_household_uses_sua
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Kentucky SNAP Manual MS 5500, shared utility expenses
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ky/manual/dcbs/dfs/volume-ii-snap/page-214
              excerpt: "if EITHER of the households is billed for heating/cooling costs"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          snap_two_or_more_households_live_together_and_share_utility_expenses
          and snap_any_sharing_household_billed_for_heating_or_cooling_costs

  - name: kentucky_snap_shared_utility_household_uses_bua
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Kentucky SNAP Manual MS 5500, shared utility expenses
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ky/manual/dcbs/dfs/volume-ii-snap/page-214
              excerpt: "billed for two allowable non-heating/non-cooling costs"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          snap_two_or_more_households_live_together_and_share_utility_expenses
          and not snap_any_sharing_household_billed_for_heating_or_cooling_costs
          and snap_household_non_heating_non_cooling_utility_expense_count >= kentucky_snap_basic_utility_minimum_expense_count

  - name: kentucky_snap_homeless_standard_allowance_entitled
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Kentucky SNAP Manual MS 5485, Homeless Standard allowance
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ky/manual/dcbs/dfs/volume-ii-snap/page-208
              excerpt: "reasonably expect to incur a shelter expense"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          snap_household_is_homeless
          and snap_household_reasonably_expects_shelter_expense_for_rent_or_utilities

  - name: kentucky_snap_homeless_standard_allowance
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: Kentucky SNAP Manual MS 5485, Homeless Standard allowance
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ky/manual/dcbs/dfs/volume-ii-snap/page-208
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if kentucky_snap_homeless_standard_allowance_entitled:
            kentucky_snap_homeless_standard_allowance_amount
          else:
            0

  - name: kentucky_snap_no_additional_shelter_deduction_when_homeless_standard_used
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Kentucky SNAP Manual MS 5485, Homeless Standard allowance
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ky/manual/dcbs/dfs/volume-ii-snap/page-208
              excerpt: "not entitled to any additional shelter deduction"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          kentucky_snap_homeless_standard_allowance_entitled
          and snap_worker_portal_uses_homeless_standard_allowance
