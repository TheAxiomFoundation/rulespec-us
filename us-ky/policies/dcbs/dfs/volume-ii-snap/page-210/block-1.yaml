format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ky/manual/dcbs/dfs/volume-ii-snap/page-210
    corpus_citation_paths:
      - us-ky/manual/dcbs/dfs/volume-ii-snap/page-208
      - us-ky/manual/dcbs/dfs/volume-ii-snap/page-210
      - us-ky/manual/dcbs/dfs/volume-ii-snap/page-211
      - us-ky/manual/dcbs/dfs/volume-ii-snap/page-212
      - us-ky/manual/dcbs/dfs/volume-ii-snap/page-213
      - us-ky/manual/dcbs/dfs/volume-ii-snap/page-214
    upstream_source_check:
      status: delegated_parameter_source
      checked_paths:
        - us:regulations/7-cfr/273/9#snap_utility_allowance_for_shelter_costs
      rationale: |-
        7 CFR 273.9 delegates SNAP utility allowance treatment to state standards. Kentucky SNAP manual pages 210-214 supply the state-specific utility allowance amounts and conditions, and page 208 supplies the homeless standard allowance rule.
  summary: |-
    Kentucky SNAP households with heating or cooling utility expenses must use the Standard Utility Allowance (SUA) of $388. Households not eligible for the SUA may use the Basic Utility Allowance (BUA) of $331 when billed for at least two non-heating/non-cooling utility expenses. Households responsible only for telephone expense use the $64 telephone standard. Homeless households reasonably expecting shelter costs may use the $199 Homeless Standard allowance, with no additional shelter deduction when that allowance is used.
imports:
  - us:regulations/7-cfr/273/9
rules:
  - name: sets_kentucky_snap_standard_utility_allowance
    kind: source_relation
    source: Kentucky SNAP Manual MS 5490, Standard Utility Allowance
    source_relation:
      type: sets
      target: us:regulations/7-cfr/273/9#snap_standard_utility_allowance_state_option
      authority: state
      value: us-ky:policies/dcbs/dfs/volume-ii-snap/page-210/block-1#kentucky_snap_standard_utility_allowance_state_option
      basis:
        delegation: us:regulations/7-cfr/273/9#snap_state_standard_utility_allowance_delegation

  - name: sets_kentucky_snap_basic_utility_allowance
    kind: source_relation
    source: Kentucky SNAP Manual MS 5498, Basic Utility Allowance
    source_relation:
      type: sets
      target: us:regulations/7-cfr/273/9#snap_limited_utility_allowance_state_option
      authority: state
      value: us-ky:policies/dcbs/dfs/volume-ii-snap/page-210/block-1#kentucky_snap_basic_utility_allowance_state_option
      basis:
        delegation: us:regulations/7-cfr/273/9#snap_state_standard_utility_allowance_delegation

  - name: sets_kentucky_snap_individual_utility_allowance
    kind: source_relation
