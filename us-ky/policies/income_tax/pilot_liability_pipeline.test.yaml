  output:
    us-ky:policies/income_tax/pilot_liability_pipeline#ky_pit_pilot_net_income: '0.01'
    us-ky:policies/income_tax/pilot_liability_pipeline#ky_pit_pilot_income_tax_before_credits: '0.00035'

