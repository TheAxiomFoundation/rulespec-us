format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ar/policy/dhs/tea/manual/2024/page-92
  summary: |-
    Section 2361 states TEA maximum payment levels by family size: 1 $81, 2 $162, 3 $204, 4 $247, 5 $286, 6 $331, 7 $373, 8 $415, and 9 or more $457.
rules:
  - name: ar_tea_maximum_payment_level_family_size_floor
    kind: parameter
    dtype: Count
    source: TEA Policy Manual section 2361, maximum payment levels table
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ar/policy/dhs/tea/manual/2024/page-92
              excerpt: "Family Size Maximum Amount 1 $ 81"
    versions:
      - effective_from: '2011-12-06'
        formula: |-
          1
  - name: ar_tea_maximum_payment_level_open_ended_family_size
    kind: parameter
    dtype: Count
    source: TEA Policy Manual section 2361, maximum payment levels table
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ar/policy/dhs/tea/manual/2024/page-92
              excerpt: "9 or more $457"
    versions:
      - effective_from: '2011-12-06'
        formula: |-
          9
  - name: ar_tea_payment_level_family_size
    kind: derived
    entity: TanfUnit
    dtype: Count
    period: Month
    source: TEA Policy Manual section 2361, maximum payment levels table
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ar/policy/dhs/tea/manual/2024/page-92
              excerpt: "Family Size Maximum Amount ... 9 or more $457"
          - path: versions[0].formula
            kind: import
            import:
              target: us-ar:policies/dhs/tea/manual/2024/payment-levels#ar_tea_maximum_payment_level_family_size_floor
              output: ar_tea_maximum_payment_level_family_size_floor
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-ar:policies/dhs/tea/manual/2024/payment-levels#ar_tea_maximum_payment_level_open_ended_family_size
              output: ar_tea_maximum_payment_level_open_ended_family_size
              hash: sha256:local
    versions:
      - effective_from: '2011-12-06'
        formula: |-
          if assistance_unit_size < ar_tea_maximum_payment_level_family_size_floor: ar_tea_maximum_payment_level_family_size_floor else: if assistance_unit_size >= ar_tea_maximum_payment_level_open_ended_family_size: ar_tea_maximum_payment_level_open_ended_family_size else: assistance_unit_size
  - name: ar_tea_maximum_payment_amount_by_family_size
    kind: parameter
    dtype: Money
    unit: USD
    indexed_by: ar_tea_payment_level_family_size
    source: TEA Policy Manual section 2361, maximum payment levels table
    metadata:
      proof:
        atoms:
          - path: versions[0].values
            kind: parameter_table
            source:
              corpus_citation_path: us-ar/policy/dhs/tea/manual/2024/page-92
              table:
                header: "Family Size Maximum Amount"
                row_key: family_size
                column_key: maximum_amount
    versions:
      - effective_from: '2011-12-06'
        values:
          1: 81
          2: 162
          3: 204
          4: 247
          5: 286
          6: 331
          7: 373
          8: 415
          9: 457
  - name: ar_tea_maximum_benefit
    kind: derived
    entity: TanfUnit
    dtype: Money
    period: Month
    unit: USD
    source: TEA Policy Manual section 2361, maximum payment levels table
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ar/policy/dhs/tea/manual/2024/page-92
              excerpt: "The payment levels by family size are as follows"
          - path: versions[0].formula
            kind: import
            import:
              target: us-ar:policies/dhs/tea/manual/2024/payment-levels#ar_tea_payment_level_family_size
              output: ar_tea_payment_level_family_size
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-ar:policies/dhs/tea/manual/2024/payment-levels#ar_tea_maximum_payment_amount_by_family_size
              output: ar_tea_maximum_payment_amount_by_family_size
              hash: sha256:local
    versions:
      - effective_from: '2011-12-06'
        formula: |-
          ar_tea_maximum_payment_amount_by_family_size[ar_tea_payment_level_family_size]
