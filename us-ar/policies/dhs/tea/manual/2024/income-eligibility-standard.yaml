format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ar/policy/dhs/tea/manual/2024/page-88
    upstream_source_check:
      status: checked_higher_authority
      checked_paths:
        - us:statutes/social-security-act/402
      rationale: Social Security Act section 402 is the federal TANF state-plan authority; the Arkansas DHS TEA manual supplies the state-specific income eligibility standard encoded here.
  summary: |-
    Section 2351 states the Income Eligibility Standard is the same amount for all family sizes, is used to determine initial and on-going income eligibility, and is $513 per month. Countable unearned income plus net earned income is compared to that standard; if total countable income exceeds the standard, the family is ineligible.
rules:
  - name: ar_tea_income_eligibility_standard
    kind: parameter
    dtype: Money
    unit: USD
    source: TEA Policy Manual section 2351, Income Eligibility Standard
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ar/policy/dhs/tea/manual/2024/page-88
              excerpt: "The Income Eligibility Standard is $513 per month."
    versions:
      - effective_from: '2023-01-01'
        formula: |-
          513
  - name: ar_tea_income_limit
    kind: derived
    entity: TanfUnit
    dtype: Money
    period: Month
    unit: USD
    source: TEA Policy Manual section 2351, Income Eligibility Standard
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ar/policy/dhs/tea/manual/2024/page-88
              excerpt: "The Income Eligibility Standard is the same amount for all family sizes"
          - path: versions[0].formula
            kind: import
            import:
              target: us-ar:policies/dhs/tea/manual/2024/income-eligibility-standard#ar_tea_income_eligibility_standard
              output: ar_tea_income_eligibility_standard
              hash: sha256:local
    versions:
      - effective_from: '2023-01-01'
        formula: |-
          ar_tea_income_eligibility_standard
  - name: ar_tea_total_countable_income_for_income_eligibility
    kind: derived
    entity: TanfUnit
    dtype: Money
    period: Month
    unit: USD
    source: TEA Policy Manual section 2351, Income Eligibility Standard
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ar/policy/dhs/tea/manual/2024/page-88
              excerpt: "Countable unearned income plus net earned income"
    versions:
      - effective_from: '2023-01-01'
        formula: |-
          countable_unearned_income + net_earned_income
  - name: ar_tea_income_eligible
    kind: derived
    entity: TanfUnit
    dtype: Judgment
    period: Month
    source: TEA Policy Manual section 2351, Income Eligibility Standard
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-ar/policy/dhs/tea/manual/2024/page-88
              excerpt: "If the total countable income exceeds the Standard, the family is ineligible for TEA benefits."
          - path: versions[0].formula
            kind: import
            import:
              target: us-ar:policies/dhs/tea/manual/2024/income-eligibility-standard#ar_tea_total_countable_income_for_income_eligibility
              output: ar_tea_total_countable_income_for_income_eligibility
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-ar:policies/dhs/tea/manual/2024/income-eligibility-standard#ar_tea_income_limit
              output: ar_tea_income_limit
              hash: sha256:local
    versions:
      - effective_from: '2023-01-01'
        formula: |-
          ar_tea_total_countable_income_for_income_eligibility <= ar_tea_income_limit
