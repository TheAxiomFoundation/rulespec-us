format: rulespec/v1
imports:
- us-ar:policies/dhs/tea/manual/2024/earned-income-deductions#ar_tea_work_related_earned_income_deduction_rate
- us-ar:policies/dhs/tea/manual/2024/earned-income-deductions#ar_tea_work_incentive_earned_income_deduction_rate
- us-ar:policies/dhs/tea/manual/2024/income-eligibility-standard#ar_tea_income_eligibility_standard
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ar/policy/dhs/tea/manual/2024/page-90
  summary: Applicant income at or below $513 meets the income requirement; income
    over $513 makes the family ineligible. For recipients, compute countable unearned
    income and monthly gross earned income, deduct 20% from gross earnings, deduct
    60% from that amount to arrive at net countable earnings, add net earnings to
    unearned income, and compare monthly countable income to the $513 Income Eligibility
    Standard.
rules:
- name: ar_tea_applicant_countable_earned_income
  kind: derived
  entity: TanfUnit
  dtype: Money
  period: Month
  unit: USD
  source: TEA Policy Manual section 2353.1, Applicant Income Eligibility Budget
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-ar/policy/dhs/tea/manual/2024/page-90
          excerpt: When the 20% work-related deduction is applied to the gross earnings
      - path: versions[0].formula
        kind: import
        import:
          target: us-ar:policies/dhs/tea/manual/2024/earned-income-deductions#ar_tea_work_related_earned_income_deduction_rate
          output: ar_tea_work_related_earned_income_deduction_rate
          hash: sha256:adac679d33abd02e7646e786cf9c25d7d89bf664470c6773cb6ee045df9196e9
  versions:
  - effective_from: '2023-01-01'
    formula: monthly_countable_gross_earned_income * (1 - ar_tea_work_related_earned_income_deduction_rate)
- name: ar_tea_applicant_total_countable_income_for_income_eligibility
  kind: derived
  entity: TanfUnit
  dtype: Money
  period: Month
  unit: USD
  source: TEA Policy Manual section 2353.1, Applicant Income Eligibility Budget
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-ar/policy/dhs/tea/manual/2024/page-90
          excerpt: Their monthly countable income is computed to be $541.75.
      - path: versions[0].formula
        kind: import
        import:
          target: us-ar:policies/dhs/tea/manual/2024/income-eligibility-budget#ar_tea_applicant_countable_earned_income
          output: ar_tea_applicant_countable_earned_income
          hash: sha256:local
  versions:
  - effective_from: '2023-01-01'
    formula: countable_unearned_income + ar_tea_applicant_countable_earned_income
- name: ar_tea_recipient_countable_earnings_after_work_related_deduction
  kind: derived
  entity: TanfUnit
  dtype: Money
  period: Month
  unit: USD
  source: TEA Policy Manual section 2353.2, Recipient Income Eligibility Budget, steps
    2-3
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-ar/policy/dhs/tea/manual/2024/page-90
          excerpt: From the monthly gross earnings, deduct 20% of the gross amount
      - path: versions[0].formula
        kind: import
        import:
          target: us-ar:policies/dhs/tea/manual/2024/earned-income-deductions#ar_tea_work_related_earned_income_deduction_rate
          output: ar_tea_work_related_earned_income_deduction_rate
          hash: sha256:adac679d33abd02e7646e786cf9c25d7d89bf664470c6773cb6ee045df9196e9
  versions:
  - effective_from: '2023-01-01'
    formula: monthly_countable_gross_earned_income * (1 - ar_tea_work_related_earned_income_deduction_rate)
- name: ar_tea_recipient_net_countable_earned_income
  kind: derived
  entity: TanfUnit
  dtype: Money
  period: Month
  unit: USD
  source: TEA Policy Manual section 2353.2, Recipient Income Eligibility Budget, step
    4
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-ar/policy/dhs/tea/manual/2024/page-90
          excerpt: From the amount arrived at in Step 3, deduct 60% to arrive at the
            net countable earnings.
      - path: versions[0].formula
        kind: import
        import:
          target: us-ar:policies/dhs/tea/manual/2024/income-eligibility-budget#ar_tea_recipient_countable_earnings_after_work_related_deduction
          output: ar_tea_recipient_countable_earnings_after_work_related_deduction
          hash: sha256:local
      - path: versions[0].formula
        kind: import
        import:
          target: us-ar:policies/dhs/tea/manual/2024/earned-income-deductions#ar_tea_work_incentive_earned_income_deduction_rate
          output: ar_tea_work_incentive_earned_income_deduction_rate
          hash: sha256:adac679d33abd02e7646e786cf9c25d7d89bf664470c6773cb6ee045df9196e9
  versions:
  - effective_from: '2023-01-01'
    formula: ar_tea_recipient_countable_earnings_after_work_related_deduction * (1
      - ar_tea_work_incentive_earned_income_deduction_rate)
- name: ar_tea_recipient_total_countable_income_for_income_eligibility
  kind: derived
  entity: TanfUnit
  dtype: Money
  period: Month
  unit: USD
  source: TEA Policy Manual section 2353.2, Recipient Income Eligibility Budget, step
    5
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-ar/policy/dhs/tea/manual/2024/page-90
          excerpt: Add the net earnings to the unearned income to arrive at the monthly
            countable income.
      - path: versions[0].formula
        kind: import
        import:
          target: us-ar:policies/dhs/tea/manual/2024/income-eligibility-budget#ar_tea_recipient_net_countable_earned_income
          output: ar_tea_recipient_net_countable_earned_income
          hash: sha256:local
  versions:
  - effective_from: '2023-01-01'
    formula: countable_unearned_income + ar_tea_recipient_net_countable_earned_income
- name: local_ar_tea_income_eligible
  kind: derived
  entity: TanfUnit
  dtype: Judgment
  period: Month
  source: TEA Policy Manual section 2353.1 and section 2353.2, Income Eligibility
    Budget
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: predicate
        source:
          corpus_citation_path: us-ar/policy/dhs/tea/manual/2024/page-90
          excerpt: If the income is equal to or less than $513, then the family meets
            the income requirement
      - path: versions[0].formula
        kind: predicate
        source:
          corpus_citation_path: us-ar/policy/dhs/tea/manual/2024/page-90
          excerpt: If the income is over $513, then the family is no longer eligible.
      - path: versions[0].formula
        kind: import
        import:
          target: us-ar:policies/dhs/tea/manual/2024/income-eligibility-standard#ar_tea_income_eligibility_standard
          output: ar_tea_income_eligibility_standard
          hash: sha256:cd2ed40250f913fc19c58416abbc1548d46321183163b2daad44df8f3f4da9a8
      - path: versions[0].formula
        kind: import
        import:
          target: us-ar:policies/dhs/tea/manual/2024/income-eligibility-budget#ar_tea_applicant_total_countable_income_for_income_eligibility
          output: ar_tea_applicant_total_countable_income_for_income_eligibility
          hash: sha256:local
      - path: versions[0].formula
        kind: import
        import:
          target: us-ar:policies/dhs/tea/manual/2024/income-eligibility-budget#ar_tea_recipient_total_countable_income_for_income_eligibility
          output: ar_tea_recipient_total_countable_income_for_income_eligibility
          hash: sha256:local
  versions:
  - effective_from: '2023-01-01'
    formula: '(tanf_unit_is_recipient_family and ar_tea_recipient_total_countable_income_for_income_eligibility
      <= ar_tea_income_eligibility_standard)

      or ((not tanf_unit_is_recipient_family) and ar_tea_applicant_total_countable_income_for_income_eligibility
      <= ar_tea_income_eligibility_standard)'
