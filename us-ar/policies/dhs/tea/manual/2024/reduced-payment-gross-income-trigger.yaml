format: rulespec/v1
imports:
  - us-ar:policies/dhs/tea/manual/2024/income-eligibility-budget#local_ar_tea_income_eligible
  - us-ar:policies/dhs/tea/manual/2024/payment-levels#ar_tea_maximum_benefit
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ar/policy/dhs/tea/manual/2024/page-93
  summary: |-
    Section 2362 states that the payment amount for the family size will be reduced by 50% when countable monthly gross income, excluding assigned child support payments, is equal to or more than $1026. If the reduction does not result in a whole dollar amount, cents of $.49 or less round down and $.50 or more round up.
rules:
  - name: ar_tea_reduced_payment_gross_income_trigger
    kind: parameter
    dtype: Money
    unit: USD
    source: TEA Policy Manual section 2362, Reduced Payment - Gross Income Trigger
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ar/policy/dhs/tea/manual/2024/page-93
              excerpt: "equal to or more than $1026"
    versions:
      - effective_from: '2023-01-01'
        formula: |-
          1026

  - name: ar_tea_reduced_payment_rate
    kind: parameter
    dtype: Rate
    source: TEA Policy Manual section 2362, Reduced Payment - Gross Income Trigger
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ar/policy/dhs/tea/manual/2024/page-93
              excerpt: "reduced by 50%"
    versions:
      - effective_from: '2023-01-01'
        formula: |-
          0.50

  - name: ar_tea_reduced_payment_rounding_increment
    kind: parameter
    dtype: Decimal
    source: TEA Policy Manual section 2362, Reduced Payment - Gross Income Trigger
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ar/policy/dhs/tea/manual/2024/page-93
              excerpt: "up if $ .50 or more"
    versions:
      - effective_from: '2023-01-01'
        formula: |-
          0.50

  - name: ar_tea
    kind: derived
    entity: TanfUnit
    dtype: Money
    period: Month
    unit: USD
    source: TEA Policy Manual section 2362, Reduced Payment - Gross Income Trigger
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ar/policy/dhs/tea/manual/2024/page-93
              excerpt: "payment amount for the family size will be reduced by 50%"
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ar/policy/dhs/tea/manual/2024/page-93
              excerpt: "countable monthly gross income, excluding assigned child support payments, is equal to or more than $1026"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ar/policy/dhs/tea/manual/2024/page-93
              excerpt: "rounded down if the remaining cents are $ .49 or less, and up if $ .50 or more"
          - path: versions[0].formula
            kind: import
            import:
              target: us-ar:policies/dhs/tea/manual/2024/income-eligibility-budget#local_ar_tea_income_eligible
              output: local_ar_tea_income_eligible
              hash: sha256:28a2683d4675d4a3313db02567a72370340c4a2441ec7437b6883dae361c462a
          - path: versions[0].formula
            kind: import
            import:
              target: us-ar:policies/dhs/tea/manual/2024/payment-levels#ar_tea_maximum_benefit
              output: ar_tea_maximum_benefit
              hash: sha256:c73337a43af976d35f0bda6e1b8f06757330a8c0966edebd45ab9da57c8390c4
          - path: versions[0].formula
            kind: import
            import:
              target: us-ar:policies/dhs/tea/manual/2024/reduced-payment-gross-income-trigger#ar_tea_reduced_payment_gross_income_trigger
              output: ar_tea_reduced_payment_gross_income_trigger
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-ar:policies/dhs/tea/manual/2024/reduced-payment-gross-income-trigger#ar_tea_reduced_payment_rate
              output: ar_tea_reduced_payment_rate
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-ar:policies/dhs/tea/manual/2024/reduced-payment-gross-income-trigger#ar_tea_reduced_payment_rounding_increment
              output: ar_tea_reduced_payment_rounding_increment
              hash: sha256:local
    versions:
      - effective_from: '2023-01-01'
        formula: |-
          if local_ar_tea_income_eligible: if countable_monthly_gross_income_excluding_assigned_child_support_payments >= ar_tea_reduced_payment_gross_income_trigger: floor((ar_tea_maximum_benefit * ar_tea_reduced_payment_rate) + ar_tea_reduced_payment_rounding_increment) else: ar_tea_maximum_benefit else: 0
