format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ar/policy/dhs/tea/manual/2024/page-58
  summary: |-
    Resource eligibility is determined as of the first day of a calendar month. If countable resources are equal to or less than $3000.00 on the first day of the month, the family is resource eligible for the entire month even if resource value later increases. A resource is real or personal property currently available, or legally available, to meet needs; payments counted as income in the month received cannot also be counted as resources in that month.
rules:
  - name: ar_tea_resource_limit
    kind: parameter
    dtype: Money
    unit: USD
    source: TEA Policy Manual section 2200, Resource Eligibility
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ar/policy/dhs/tea/manual/2024/page-58
              excerpt: "equal to or less than $3000.00"
    versions:
      - effective_from: '1997-07-01'
        formula: |-
          3000
  - name: ar_tea_resources_eligible
    kind: derived
    entity: TanfUnit
    dtype: Judgment
    period: Month
    source: TEA Policy Manual section 2200, Resource Eligibility
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-ar/policy/dhs/tea/manual/2024/page-58
              excerpt: "If the countable resources are equal to or less than $3000.00 on the first day of the month"
          - path: versions[0].formula
            kind: import
            import:
              target: us-ar:policies/dhs/tea/manual/2024/resource-eligibility#ar_tea_resource_limit
              output: ar_tea_resource_limit
              hash: sha256:local
    versions:
      - effective_from: '1997-07-01'
        formula: |-
          countable_resources_on_first_day_of_month <= ar_tea_resource_limit
