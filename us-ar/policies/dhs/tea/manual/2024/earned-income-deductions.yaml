format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ar/policy/dhs/tea/manual/2024/page-89
  summary: |-
    Section 2352 allows deductions from monthly gross earnings before comparison to the Income Eligibility Standard: "Work-Related Deduction (20%)" and "Work Incentive Deduction" for recipients who start or continue work while receiving TEA benefits, described as "this 60% incentive deduction."
rules:
  - name: ar_tea_work_related_earned_income_deduction_rate
    kind: parameter
    dtype: Rate
    source: TEA Policy Manual section 2352, Earned Income Deductions for Income Eligibility
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ar/policy/dhs/tea/manual/2024/page-89
              excerpt: "Work-Related Deduction (20%)"
    versions:
      - effective_from: '1999-01-04'
        formula: |-
          0.20
  - name: ar_tea_work_incentive_earned_income_deduction_rate
    kind: parameter
    dtype: Rate
    source: TEA Policy Manual section 2352, Earned Income Deductions for Income Eligibility
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ar/policy/dhs/tea/manual/2024/page-89
              excerpt: "this 60% incentive deduction"
    versions:
      - effective_from: '1999-01-04'
        formula: |-
          0.60
