format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ar/manual/dhs/snap-policy-manual/page-342
    upstream_source_check:
      status: checked_higher_authority
      checked_paths:
      - us:regulations/7-cfr/273/9/d/6/iii
      rationale: Federal utility-allowance context was checked for delegated SNAP
        utility-allowance rules. This Arkansas manual page supplies state implementation
        details for LIHEAP-based SUA entitlement, shared-utility treatment, expedited
        household defaults, and specific heating/wood-cost qualification.
  summary: Renters and homeowners in separate residences are entitled to the entire
    Standard Utility Allowance if they receive at least $20 per year in LIHEAP for
    their current residence. Shared utility costs are not prorated. Expedited households
    may be certified using BUA when SUA expenses are not timely verified, and absent
    a choice BUA is assumed. Heating qualifies only when the household incurs the
    full primary heating cost separate from rent or mortgage; qualifying wood-purchase
    costs count, while supplemental heat, blower-only costs, and wood-cutting costs
    do not.
rules:
