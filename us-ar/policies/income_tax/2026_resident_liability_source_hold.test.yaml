# The pinned corpus contains Arkansas's 2026 rate schedule but not the annual
# resident income, deduction, exemption, and credit chain. These fixtures
# prove the federal/raw-fact boundary and every fail-closed public stage.

- name: valid full-year resident return is source held through signed liability
  period: {period_kind: tax_year, start: '2026-01-01', end: '2026-12-31'}
  input:
    us-ar:policies/income_tax/2026_resident_liability_source_hold#input.ar_pit_2026_federal_adjusted_gross_income: 60000
    us-ar:policies/income_tax/2026_resident_liability_source_hold#input.ar_pit_2026_is_full_year_arkansas_resident_return: true
    us-ar:policies/income_tax/2026_resident_liability_source_hold#input.ar_pit_2026_federal_and_arkansas_filing_units_are_aligned: true
  output:
    us-ar:policies/income_tax/2026_resident_liability_source_hold#ar_pit_2026_input_domain_is_valid: holds
    us-ar:policies/income_tax/2026_resident_liability_source_hold#ar_pit_2026_income_base_source_hold_applies: holds
    us-ar:policies/income_tax/2026_resident_liability_source_hold#ar_pit_2026_deduction_and_exemption_source_hold_applies: holds
    us-ar:policies/income_tax/2026_resident_liability_source_hold#ar_pit_2026_tax_and_surtax_source_hold_applies: holds
    us-ar:policies/income_tax/2026_resident_liability_source_hold#ar_pit_2026_credit_surface_source_hold_applies: holds
    us-ar:policies/income_tax/2026_resident_liability_source_hold#ar_pit_2026_complete_liability_source_hold_applies: holds
    us-ar:policies/income_tax/2026_resident_liability_source_hold#ar_pit_2026_net_income: '0'
    us-ar:policies/income_tax/2026_resident_liability_source_hold#ar_pit_2026_deductions_and_exemptions: '0'
    us-ar:policies/income_tax/2026_resident_liability_source_hold#ar_pit_2026_taxable_income: '0'
    us-ar:policies/income_tax/2026_resident_liability_source_hold#ar_pit_2026_tax_before_credits_including_surtaxes: '0'
    us-ar:policies/income_tax/2026_resident_liability_source_hold#ar_pit_2026_tax_after_nonrefundable_credits: '0'
    us-ar:policies/income_tax/2026_resident_liability_source_hold#ar_pit_2026_refundable_credits: '0'
    us-ar:policies/income_tax/2026_resident_liability_source_hold#ar_pit_2026_net_income_tax_liability_before_payments: '0'

- name: negative federal adjusted gross income remains a valid federal output
  period: {period_kind: tax_year, start: '2026-01-01', end: '2026-12-31'}
  input:
    us-ar:policies/income_tax/2026_resident_liability_source_hold#input.ar_pit_2026_federal_adjusted_gross_income: -5000
    us-ar:policies/income_tax/2026_resident_liability_source_hold#input.ar_pit_2026_is_full_year_arkansas_resident_return: true
    us-ar:policies/income_tax/2026_resident_liability_source_hold#input.ar_pit_2026_federal_and_arkansas_filing_units_are_aligned: true
  output:
    us-ar:policies/income_tax/2026_resident_liability_source_hold#ar_pit_2026_input_domain_is_valid: holds
    us-ar:policies/income_tax/2026_resident_liability_source_hold#ar_pit_2026_net_income: '0'
    us-ar:policies/income_tax/2026_resident_liability_source_hold#ar_pit_2026_net_income_tax_liability_before_payments: '0'

- name: part-year return is outside the program domain
  period: {period_kind: tax_year, start: '2026-01-01', end: '2026-12-31'}
  input:
    us-ar:policies/income_tax/2026_resident_liability_source_hold#input.ar_pit_2026_federal_adjusted_gross_income: 60000
    us-ar:policies/income_tax/2026_resident_liability_source_hold#input.ar_pit_2026_is_full_year_arkansas_resident_return: false
    us-ar:policies/income_tax/2026_resident_liability_source_hold#input.ar_pit_2026_federal_and_arkansas_filing_units_are_aligned: true
  output:
    us-ar:policies/income_tax/2026_resident_liability_source_hold#ar_pit_2026_input_domain_is_valid: not_holds
    us-ar:policies/income_tax/2026_resident_liability_source_hold#ar_pit_2026_net_income_tax_liability_before_payments: '0'

- name: misaligned federal and Arkansas filing units are outside the domain
  period: {period_kind: tax_year, start: '2026-01-01', end: '2026-12-31'}
  input:
    us-ar:policies/income_tax/2026_resident_liability_source_hold#input.ar_pit_2026_federal_adjusted_gross_income: 60000
    us-ar:policies/income_tax/2026_resident_liability_source_hold#input.ar_pit_2026_is_full_year_arkansas_resident_return: true
    us-ar:policies/income_tax/2026_resident_liability_source_hold#input.ar_pit_2026_federal_and_arkansas_filing_units_are_aligned: false
  output:
    us-ar:policies/income_tax/2026_resident_liability_source_hold#ar_pit_2026_input_domain_is_valid: not_holds
    us-ar:policies/income_tax/2026_resident_liability_source_hold#ar_pit_2026_net_income_tax_liability_before_payments: '0'
