format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_paths:
      - us-ar/statute/act-2-2026
      - us-ar/statute/act-2-2026/section-1
    upstream_source_check:
      status: checked_higher_authority
      checked_paths:
        - us-ar/statute/act-2-2026
        - us-ar/statute/act-2-2026/section-1
        - us-ar/statute/act-2-2026/section-2
        - us-ar/statute/act-2-2026/section-3
      rationale: |-
        The pinned official corpus contains Arkansas Act 2 of 2026. Section 1
        supplies the ordinary resident individual rate schedules and bracket
        adjustment for tax years beginning on or after January 1, 2026.
        Sections 2 and 3 concern corporations and do not supply any part of
        the resident individual return chain.

        The pinned corpus does not establish how federal return outputs and
        raw taxpayer facts become Arkansas net income. It also contains no
        operative 2026 resident deduction, exemption, surtax, nonrefundable-
        credit, refundable-credit, credit-ordering, or final-return authority.
        Consequently, this module accepts no caller-completed Arkansas income,
        deduction, exemption, taxable-income, surtax, or credit amount.

        Those missing authorities are typed source holds. Every public Money
        stage after the federal/raw-fact boundary is a fail-closed zero
        sentinel while the holds remain active. The sentinels are not legal
        claims that Arkansas income or tax is zero. The separately encoded
        schedule pilot remains the source-complete Act 2 calculation from a
        completed-return net-income boundary, but that prohibited state-stage
        input is not composed into this end-to-end surface.
  summary: |-
    Tax-year-2026 Arkansas full-year-resident individual-income-tax
    source-held program boundary. It accepts federal adjusted gross income,
    full-year Arkansas residency, and aligned filing-unit status. It never
    accepts a completed Arkansas income, deduction, exemption, taxable-income,
    surtax, or credit amount.

    Arkansas net income, deductions and exemptions, taxable income, tax before
    credits including applicable surtaxes, tax after nonrefundable credits,
    refundable credits, and signed net income-tax liability before payments
    all fail closed while the pinned source gaps remain. The program is
    intentionally incomplete and makes no annual-liability or oracle-parity
    claim.

    Withholding, estimated payments, extension payments, penalties, interest,
    refunds of payments, filing and collection administration, local income
    taxes, nonresident sourcing, and part-year allocation are outside scope.
  deferred_outputs:
    - output: us-ar:policies/income_tax/2026_resident_liability_source_hold#ar_pit_2026_net_income
      reason: |-
        Act 2 section 1 starts from Arkansas net income. The pinned corpus does
        not define that amount or establish the additions, subtractions, and
        conformity rules required to transform federal adjusted gross income.
      source_values:
        - us-ar:policies/income_tax/2026_resident_liability_source_hold#ar_pit_2026_income_base_source_hold_applies
    - output: us-ar:policies/income_tax/2026_resident_liability_source_hold#ar_pit_2026_deductions_and_exemptions
      reason: |-
        The pinned corpus contains no complete operative 2026 resident
        deduction and exemption authority.
      source_values:
        - us-ar:policies/income_tax/2026_resident_liability_source_hold#ar_pit_2026_deduction_and_exemption_source_hold_applies
    - output: us-ar:policies/income_tax/2026_resident_liability_source_hold#ar_pit_2026_taxable_income
      reason: |-
        Arkansas taxable income cannot be completed until the Arkansas income
        base and deduction and exemption chain are source complete.
      source_values:
        - us-ar:policies/income_tax/2026_resident_liability_source_hold#ar_pit_2026_complete_liability_source_hold_applies
    - output: us-ar:policies/income_tax/2026_resident_liability_source_hold#ar_pit_2026_tax_before_credits_including_surtaxes
      reason: |-
        Act 2 section 1 supplies the ordinary rate schedules, but they cannot
        be composed until Arkansas taxable net income is source complete. The
        pinned corpus also does not establish the complete 2026 individual
        surtax and specialty-tax surface.
      source_values:
        - us-ar:policies/income_tax/2026_resident_liability_source_hold#ar_pit_2026_tax_and_surtax_source_hold_applies
    - output: us-ar:policies/income_tax/2026_resident_liability_source_hold#ar_pit_2026_tax_after_nonrefundable_credits
      reason: |-
        The pinned corpus lacks complete operative 2026 nonrefundable-credit
        eligibility, limitation, ordering, and carryforward authority.
      source_values:
        - us-ar:policies/income_tax/2026_resident_liability_source_hold#ar_pit_2026_credit_surface_source_hold_applies
    - output: us-ar:policies/income_tax/2026_resident_liability_source_hold#ar_pit_2026_refundable_credits
      reason: |-
        The pinned corpus lacks complete operative 2026 refundable-credit
        eligibility, limitation, and ordering authority.
      source_values:
        - us-ar:policies/income_tax/2026_resident_liability_source_hold#ar_pit_2026_credit_surface_source_hold_applies
    - output: us-ar:policies/income_tax/2026_resident_liability_source_hold#ar_pit_2026_net_income_tax_liability_before_payments
      reason: |-
        Signed annual resident liability cannot be completed until every
        upstream income-base, deduction, exemption, tax, surtax, and credit
        source hold is cleared.
      source_values:
        - us-ar:policies/income_tax/2026_resident_liability_source_hold#ar_pit_2026_complete_liability_source_hold_applies

rules:
  - name: ar_pit_2026_input_domain_is_valid
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: Arkansas Act 2 of 2026 section 1, full-year resident individual input domain
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ar/statute/act-2-2026/section-1
              excerpt: "Every resident, individual, trust, or estate having net income"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          ar_pit_2026_is_full_year_arkansas_resident_return
          and ar_pit_2026_federal_and_arkansas_filing_units_are_aligned
          and (
            ar_pit_2026_federal_adjusted_gross_income >= 0
            or ar_pit_2026_federal_adjusted_gross_income < 0
          )

  - name: ar_pit_2026_income_base_source_hold_applies
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: Missing Arkansas net-income construction and final 2026 resident-return authority
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ar/statute/act-2-2026/section-1
              excerpt: "Every resident, individual, trust, or estate having net income"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: true

  - name: ar_pit_2026_deduction_and_exemption_source_hold_applies
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: Missing complete operative 2026 Arkansas resident deduction and exemption authority
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ar/statute/act-2-2026/section-1
              excerpt: "shall determine the amount of income tax due under this subsection"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: true

  - name: ar_pit_2026_tax_and_surtax_source_hold_applies
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: Act 2 schedule cannot execute before taxable net income and the complete 2026 specialty-tax surface is not pinned
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ar/statute/act-2-2026/section-1
              excerpt: "For tax years beginning on or after January 1, 2026"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ar/statute/act-2-2026/section-1
              excerpt: "shall determine the amount of income tax due under this subsection"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          ar_pit_2026_income_base_source_hold_applies
          or ar_pit_2026_deduction_and_exemption_source_hold_applies

  - name: ar_pit_2026_credit_surface_source_hold_applies
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: Missing complete operative 2026 Arkansas credit and ordering authority
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ar/statute/act-2-2026/section-1
              excerpt: "shall determine the amount of income tax due under this subsection"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: true

  - name: ar_pit_2026_complete_liability_source_hold_applies
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: Combined source hold for incomplete 2026 Arkansas resident liability
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ar/statute/act-2-2026/section-1
              excerpt: "Every resident, individual, trust, or estate having net income"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ar/statute/act-2-2026/section-1
              excerpt: "shall determine the amount of income tax due under this subsection"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          ar_pit_2026_income_base_source_hold_applies
          or ar_pit_2026_deduction_and_exemption_source_hold_applies
          or ar_pit_2026_tax_and_surtax_source_hold_applies
          or ar_pit_2026_credit_surface_source_hold_applies

  - name: ar_pit_2026_net_income
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Fail-closed Arkansas net-income sentinel while the income base is source held
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ar/statute/act-2-2026/section-1
              excerpt: "Every resident, individual, trust, or estate having net income"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: '0'

  - name: ar_pit_2026_deductions_and_exemptions
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Fail-closed Arkansas deduction-and-exemption sentinel while the authority is source held
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ar/statute/act-2-2026/section-1
              excerpt: "shall determine the amount of income tax due under this subsection"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: '0'

  - name: ar_pit_2026_taxable_income
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Fail-closed Arkansas taxable-income sentinel while income, deductions, and exemptions are source held
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ar/statute/act-2-2026/section-1
              excerpt: "net income less than or equal to ninety-four thousand seven hundred dollars"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: '0'

  - name: ar_pit_2026_tax_before_credits_including_surtaxes
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Fail-closed Arkansas tax-and-surtax sentinel while taxable net income and the complete tax surface are source held
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ar/statute/act-2-2026/section-1
              excerpt: "shall determine the amount of income tax due under this subsection"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: '0'

  - name: ar_pit_2026_tax_after_nonrefundable_credits
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Fail-closed Arkansas tax-after-nonrefundable-credits sentinel while the credit surface is source held
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ar/statute/act-2-2026/section-1
              excerpt: "amount of income tax due"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: '0'

  - name: ar_pit_2026_refundable_credits
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Fail-closed Arkansas refundable-credit sentinel while the credit surface is source held
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ar/statute/act-2-2026/section-1
              excerpt: "amount of income tax due"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: '0'

  - name: ar_pit_2026_net_income_tax_liability_before_payments
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Fail-closed signed Arkansas resident income-tax liability sentinel before payments
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ar/statute/act-2-2026/section-1
              excerpt: "amount of income tax due"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: '0'

inputs:
  - name: ar_pit_2026_federal_adjusted_gross_income
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    description: Federal adjusted gross income from the aligned federal return; it is not a completed Arkansas income amount.
  - name: ar_pit_2026_is_full_year_arkansas_resident_return
    entity: TaxUnit
    dtype: Judgment
    period: Year
    description: Whether the return is within this program's full-year Arkansas resident scope.
  - name: ar_pit_2026_federal_and_arkansas_filing_units_are_aligned
    entity: TaxUnit
    dtype: Judgment
    period: Year
    description: Whether the federal return and Arkansas return cover the same filing unit.
