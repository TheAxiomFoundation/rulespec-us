  - name: ar_pit_pilot_uses_high_income_schedule
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: Arkansas Act 2 of 2026 section 1(A)-(B), schedule switch above $94,700
    metadata:
      private: true
      proof:
        atoms:
