format: rulespec/v1
imports:
  - us-ri:policies/cms/rhode-island-medicaid-chip-bhp-eligibility-levels#rhode_island_children_separate_chip_available
  - us-ri:policies/cms/rhode-island-medicaid-chip-bhp-eligibility-levels#rhode_island_pregnant_women_chip_fpl_limit
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/form/cms/medicaid-chip-bhp-eligibility-levels
  summary: |-
    Rhode Island CHIP eligibility composition applies the federal CHIP child and standard-pregnant eligibility framework to the CMS state eligibility-level outputs. It intentionally does not encode FCEP state income limits until primary state-plan or CMS source coverage is available.
rules:
  - name: rhode_island_separate_chip_child_eligibility_available
    kind: derived
    dtype: Boolean
    period: Year
    source: CMS Medicaid, CHIP and BHP Eligibility Levels table, Rhode Island row
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/1397jj/b/1
          - path: versions[0].formula
            kind: import
            import:
              target: us-ri:policies/cms/rhode-island-medicaid-chip-bhp-eligibility-levels#rhode_island_children_separate_chip_available
              output: rhode_island_children_separate_chip_available
              hash: sha256:b50a0f42c20a58b1ab79257a71a15230e0fce5b391585a6620bdb6504eb2f8c6
    versions:
      - effective_from: '2023-12-01'
        formula: |-
          rhode_island_children_separate_chip_available
  - name: is_chip_eligible_child
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 42 USC 1397jj(b)(1), 42 USC 1397jj(c)(1), and CMS state CHIP eligibility levels
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/form/cms/medicaid-chip-bhp-eligibility-levels
              excerpt: "Children Separate CHIP"
    versions:
      - effective_from: '2023-12-01'
        formula: |-
          false
  - name: rhode_island_standard_pregnant_chip_eligibility_available
    kind: derived
    dtype: Boolean
    period: Year
    source: CMS Medicaid, CHIP and BHP Eligibility Levels table, Rhode Island row
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/form/cms/medicaid-chip-bhp-eligibility-levels
              excerpt: "Pregnant Women CHIP"
    versions:
      - effective_from: '2023-12-01'
        formula: |-
          true
  - name: is_chip_eligible_standard_pregnant_person
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 42 USC 1397ll(d)(2) and CMS state CHIP eligibility levels
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: import
            import:
              target: us-ri:policies/cms/rhode-island-medicaid-chip-bhp-eligibility-levels#rhode_island_pregnant_women_chip_fpl_limit
              output: rhode_island_pregnant_women_chip_fpl_limit
              hash: sha256:b50a0f42c20a58b1ab79257a71a15230e0fce5b391585a6620bdb6504eb2f8c6
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/1397ll/d/2
              excerpt: "targeted low-income pregnant woman"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/form/cms/medicaid-chip-bhp-eligibility-levels
              excerpt: "Pregnant Women CHIP"
    versions:
      - effective_from: '2023-12-01'
        formula: |-
          person_is_pregnant
          and person_meets_chip_immigration_requirement
          and not found_eligible_for_medical_assistance_under_subchapter_xix
          and medicaid_income_level <= rhode_island_pregnant_women_chip_fpl_limit
