format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_paths:
      - us-ri/statute/44-30-1
      - us-ri/statute/44-30-1.1
      - us-ri/statute/44-30-2.6
      - us-ri/statute/44-30-2.8
      - us-ri/statute/44-30-3
      - us-ri/statute/44-30-5
      - us-ri/statute/44-30-11
      - us-ri/statute/44-30-12
      - us-ri/statute/44-30-18
      - us-ri/statute/44-30-25
      - us-ri/statute/44-30-25.1
    upstream_source_check:
      status: checked_higher_authority
      checked_paths:
        - us-ri/statute/44-30-1
        - us-ri/statute/44-30-1.1
        - us-ri/statute/44-30-2.6
        - us-ri/statute/44-30-2.8
        - us-ri/statute/44-30-3
        - us-ri/statute/44-30-5
        - us-ri/statute/44-30-11
        - us-ri/statute/44-30-12
        - us-ri/statute/44-30-18
        - us-ri/statute/44-30-25
        - us-ri/statute/44-30-25.1
      rationale: |-
        The pinned official Rhode Island General Laws Chapter 44-30 snapshot
        supplies the resident-income starting point and the additions,
        subtractions, deduction and exemption structure, ordinary schedule,
        and credit inventory. The snapshot does not contain the Division of
        Taxation's tax-year-2026 final resident return, instructions, advisory,
        tax tables, or the annually indexed 2026 schedule, standard-deduction,
        exemption, Social Security, and retirement thresholds.

        This module therefore starts with federal adjusted gross income and raw
        facts and computes the source-grounded, non-indexed resident
        modifications for a fail-closed ordinary full-year resident profile.
        It does not accept completed Rhode Island adjusted gross income,
        taxable income, a completed deduction, exemption, credit, rate,
        bracket, tax-before-credit amount, or final tax. The only executable
        credit amounts are uncapped statutory candidates derived from allowed
        federal credit outputs. All annual values and return-order-dependent
        stages remain typed source holds.
  summary: |-
    Tax-year-2026 Rhode Island full-year resident personal-income-tax core for
    an individual with exactly one valid filing status. Within its explicit
    fail-closed profile, it computes additions for non-Rhode-Island obligation
    income, federally exempt United States-instrumentality income that remains
    state taxable, federally excluded unemployment compensation, the qualified
    motor-vehicle sales-tax deduction, and Paycheck Protection Program
    forgiveness above $250,000 for one direct loan. It computes subtractions for qualifying United
    States obligation income net of related interest expense, qualified
    tuition-program distributions, current-year Rhode Island tuition-savings
    contributions, taxable dependent-insurance benefits, qualifying living
    organ-donation expenses, Rhode Island opportunity-zone incremental
    benefits, military-service pensions, federally included 2021 child
    rebates, and qualifying section 280E expenditures.

    The result is a profile-candidate Rhode Island resident income from federal
    adjusted gross income, not completed Rhode Island adjusted gross income.
    The profile excludes multiple or pass-through PPP-loan threshold
    allocation, any nonqualified tuition withdrawal, prior-year tuition
    contribution carryover, artist exemption, family-education-account
    modification, Scituate medical-savings-account modification, fiduciary or
    partnership adjustment, Rhode Island NOL, indexed Social Security or
    nonmilitary retirement subtraction, and special-tax computation.

    Separately, the module computes the statutory sixteen-percent Rhode Island
    earned-income-credit candidate and the uncapped twenty-five-percent
    child/dependent-care candidate. It does not combine or order credits.
    Missing 2026 indexed deduction, exemption, schedule, tax-table, and
    threshold material prevents a supported taxable-income, tax-before-credit,
    tax-after-credit, or final-liability output. Payments, withholding,
    penalties, interest, local taxes, and nonresident allocation are outside
    scope.
  deferred_outputs:
    - output: us-ri:policies/income_tax/resident_core_liability_pipeline#ri_pit_2026_complete_rhode_island_income
      reason: |-
        Section 44-30-12 incorporates cross-section family-education-account,
        Scituate medical-savings-account, fiduciary, partnership, NOL, artist,
        indexed Social Security, and indexed retirement modifications. This
        core exposes a profile candidate only when every held category is
        absent.
      source_values:
        - us-ri:policies/income_tax/resident_core_liability_pipeline#ri_pit_2026_supported_profile_applies
        - us-ri:policies/income_tax/resident_core_liability_pipeline#ri_pit_2026_profile_candidate_rhode_island_income
    - output: us-ri:policies/income_tax/resident_core_liability_pipeline#ri_pit_2026_standard_deduction
      reason: |-
        Section 44-30-2.6(c)(3)(B) requires annual inflation adjustment. The
        pinned corpus does not contain the official tax-year-2026 indexed
        standard-deduction table or final return instructions.
      source_values:
        - us-ri:policies/income_tax/resident_core_liability_pipeline#ri_pit_2026_profile_candidate_rhode_island_income
    - output: us-ri:policies/income_tax/resident_core_liability_pipeline#ri_pit_2026_personal_exemption
      reason: |-
        Section 44-30-2.6(c)(3)(C)-(E) requires an annually indexed exemption
        amount and phaseout threshold. Those tax-year-2026 values are absent
        from the pinned corpus.
      source_values:
        - us-ri:policies/income_tax/resident_core_liability_pipeline#ri_pit_2026_profile_candidate_rhode_island_income
    - output: us-ri:policies/income_tax/resident_core_liability_pipeline#ri_pit_2026_taxable_income
      reason: |-
        Taxable income requires the missing official tax-year-2026 standard
        deduction, exemption amount, and phaseout values.
      source_values:
        - us-ri:policies/income_tax/resident_core_liability_pipeline#ri_pit_2026_profile_candidate_rhode_island_income
    - output: us-ri:policies/income_tax/resident_core_liability_pipeline#ri_pit_2026_income_tax_before_credits
      reason: |-
        Section 44-30-2.6(c)(3)(A) requires annually indexed schedule values,
        and section 44-30-3 permits administrator-promulgated tax tables. The
        pinned corpus has neither the 2026 schedule cells nor 2026 tables and
        instructions.
      source_values:
        - us-ri:policies/income_tax/resident_core_liability_pipeline#ri_pit_2026_profile_candidate_rhode_island_income
    - output: us-ri:policies/income_tax/resident_core_liability_pipeline#ri_pit_2026_tax_after_nonrefundable_credits
      reason: |-
        The pinned Chapter 44-30 source identifies credits but omits the other
        governing chapters and the tax-year-2026 return ordering needed to cap
        and combine the other-state, property-tax-relief, lead-paint,
        historic, motion-picture, scholarship, Wavemaker, Rebuild Rhode
        Island, qualified-jobs, child/dependent-care, and carryforward credits.
      source_values:
        - us-ri:policies/income_tax/resident_core_liability_pipeline#ri_pit_2026_uncapped_child_and_dependent_care_credit_candidate
    - output: us-ri:policies/income_tax/resident_core_liability_pipeline#ri_pit_2026_net_income_tax_liability
      reason: |-
        Final liability requires the held taxable-income and schedule stages,
        complete nonrefundable-credit ordering, and the split between the
        nonrefundable and refundable portions of the Rhode Island earned-income
        credit after all controlling annual-return rules are applied.
      source_values:
        - us-ri:policies/income_tax/resident_core_liability_pipeline#ri_pit_2026_earned_income_credit_candidate

rules:
  - name: ri_pit_2026_ppp_forgiveness_addition_threshold
    kind: parameter
    dtype: Money
    period: Year
    unit: USD
    source: R.I. Gen. Laws 44-30-12(b)(8), forgiven-loan threshold
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ri/statute/44-30-12
              excerpt: "to the extent that the amount of the loan forgiven exceeds $250,000"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: '250000'

  - name: ri_pit_2026_ri529_single_contribution_cap
    kind: parameter
    dtype: Money
    period: Year
    unit: USD
    source: R.I. Gen. Laws 44-30-12(c)(4)(i), nonjoint cap
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ri/statute/44-30-12
              excerpt: "shall not exceed five hundred dollars ($500)"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: '500'

  - name: ri_pit_2026_ri529_joint_contribution_cap
    kind: parameter
    dtype: Money
    period: Year
    unit: USD
    source: R.I. Gen. Laws 44-30-12(c)(4)(i), joint-return cap
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ri/statute/44-30-12
              excerpt: "one thousand dollars ($1,000) if a joint return"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: '1000'

  - name: ri_pit_2026_organ_donation_subtraction_cap
    kind: parameter
    dtype: Money
    period: Year
    unit: USD
    source: R.I. Gen. Laws 44-30-12(c)(7)(i), lifetime organ-donation claim cap
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ri/statute/44-30-12
              excerpt: "An individual may subtract up to ten thousand dollars ($10,000) from federal adjusted gross income"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: '10000'

  - name: ri_pit_2026_input_domain_is_valid
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: Fail-closed nonnegative-domain guard for unsigned raw inputs
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ri/statute/44-30-12
              excerpt: "There shall be added to federal adjusted gross income"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ri/statute/44-30-12
              excerpt: "There shall be subtracted from federal adjusted gross income"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          ri_pit_2026_non_rhode_island_obligation_interest >= 0
          and ri_pit_2026_federally_exempt_us_instrumentality_income_state_taxable >= 0
          and ri_pit_2026_unemployment_compensation_excluded_from_federal_agi >= 0
          and ri_pit_2026_qualified_motor_vehicle_sales_tax_deduction >= 0
          and ri_pit_2026_ppp_loan_forgiveness >= 0
          and ri_pit_2026_qualifying_us_obligation_income_in_federal_agi >= 0
          and ri_pit_2026_related_interest_expense_deducted_federally >= 0
          and ri_pit_2026_qualified_tuition_distribution_in_federal_agi >= 0
          and ri_pit_2026_current_year_ri529_contributions >= 0
          and ri_pit_2026_taxable_dependent_insurance_benefits >= 0
          and ri_pit_2026_unreimbursed_organ_donation_expenses >= 0
          and ri_pit_2026_ri_opportunity_zone_incremental_benefit >= 0
          and ri_pit_2026_military_service_pension_in_federal_agi >= 0
          and ri_pit_2026_child_rebate_in_federal_agi >= 0
          and ri_pit_2026_section_280e_eligible_expenditures >= 0
          and ri_pit_2026_taxable_social_security_in_federal_agi >= 0
          and ri_pit_2026_nonmilitary_taxable_pension_or_annuity >= 0
          and ri_pit_2026_federal_earned_income_credit >= 0
          and ri_pit_2026_federal_child_and_dependent_care_credit >= 0

  - name: ri_pit_2026_filing_status_is_valid
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: Exactly one section 44-30-2.6 filing-status class must apply
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ri/statute/44-30-2.6
              excerpt: "married individuals filing joint returns, qualifying widow(er), every head of household, unmarried individuals, married individuals filing separate returns"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          (
            ri_pit_2026_is_single
            and not ri_pit_2026_is_married_filing_jointly
            and not ri_pit_2026_is_head_of_household
            and not ri_pit_2026_is_married_filing_separately
            and not ri_pit_2026_is_qualifying_surviving_spouse
          )
          or (
            not ri_pit_2026_is_single
            and ri_pit_2026_is_married_filing_jointly
            and not ri_pit_2026_is_head_of_household
            and not ri_pit_2026_is_married_filing_separately
            and not ri_pit_2026_is_qualifying_surviving_spouse
          )
          or (
            not ri_pit_2026_is_single
            and not ri_pit_2026_is_married_filing_jointly
            and ri_pit_2026_is_head_of_household
            and not ri_pit_2026_is_married_filing_separately
            and not ri_pit_2026_is_qualifying_surviving_spouse
          )
          or (
            not ri_pit_2026_is_single
            and not ri_pit_2026_is_married_filing_jointly
            and not ri_pit_2026_is_head_of_household
            and ri_pit_2026_is_married_filing_separately
            and not ri_pit_2026_is_qualifying_surviving_spouse
          )
          or (
            not ri_pit_2026_is_single
            and not ri_pit_2026_is_married_filing_jointly
            and not ri_pit_2026_is_head_of_household
            and not ri_pit_2026_is_married_filing_separately
            and ri_pit_2026_is_qualifying_surviving_spouse
          )

  - name: ri_pit_2026_supported_profile_applies
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: Fail-closed status for the source-grounded ordinary full-year resident profile
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ri/statute/44-30-1
              excerpt: "The Rhode Island income of every individual"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ri/statute/44-30-5
              excerpt: "Who is domiciled in this state"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ri/statute/44-30-11
              excerpt: "their tax shall be determined on their joint Rhode Island income"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ri/statute/44-30-1.1
              excerpt: "exemption applies to works of art sold by the writers, composers, and artists who created them"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ri/statute/44-30-2.8
              excerpt: "net operating loss deduction"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ri/statute/44-30-25
              excerpt: "family education account"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ri/statute/44-30-25.1
              excerpt: "medical savings account"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          ri_pit_2026_input_domain_is_valid
          and ri_pit_2026_filing_status_is_valid
          and ri_pit_2026_is_full_year_resident
          and ri_pit_2026_uses_standard_deduction
          and not ri_pit_2026_is_nonresident_alien
          and not ri_pit_2026_has_multiple_or_pass_through_ppp_loans
          and not ri_pit_2026_has_nonqualified_tuition_withdrawal
          and not ri_pit_2026_has_prior_year_ri529_contribution_carryover
          and not ri_pit_2026_has_section_1_1_artist_exemption
          and not ri_pit_2026_has_family_education_account_modification
          and not ri_pit_2026_has_scituate_medical_savings_account_modification
          and not ri_pit_2026_has_fiduciary_adjustment
          and not ri_pit_2026_has_partnership_modification
          and not ri_pit_2026_has_rhode_island_net_operating_loss
          and not ri_pit_2026_has_special_tax_computation
          and ri_pit_2026_taxable_social_security_in_federal_agi == 0
          and ri_pit_2026_nonmilitary_taxable_pension_or_annuity == 0

  - name: ri_pit_2026_profile_candidate_statutory_additions
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: R.I. Gen. Laws 44-30-12(b)(1), (2), (6), (7), and (8)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ri/statute/44-30-12
              excerpt: "Interest income on obligations of any state, or its political subdivisions, other than Rhode Island or its political subdivisions"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ri/statute/44-30-12
              excerpt: "Interest or dividend income on obligations or securities of any authority, commission, or instrumentality of the United States"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ri/statute/44-30-12
              excerpt: "The amount equal to any unemployment compensation received but not included in federal adjusted gross income"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ri/statute/44-30-12
              excerpt: "The amount equal to the deduction allowed for sales tax paid for a purchase of a qualified motor vehicle"
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ri/statute/44-30-12
              excerpt: "to the extent that the amount of the loan forgiven exceeds $250,000"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if ri_pit_2026_supported_profile_applies:
            ri_pit_2026_non_rhode_island_obligation_interest
            + ri_pit_2026_federally_exempt_us_instrumentality_income_state_taxable
            + ri_pit_2026_unemployment_compensation_excluded_from_federal_agi
            + ri_pit_2026_qualified_motor_vehicle_sales_tax_deduction
            + max(
              0,
              ri_pit_2026_ppp_loan_forgiveness
              - ri_pit_2026_ppp_forgiveness_addition_threshold
            )
          else:
            0

  - name: ri_pit_2026_profile_candidate_us_obligation_subtraction
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: R.I. Gen. Laws 44-30-12(c)(1), qualifying income net of related deducted interest
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ri/statute/44-30-12
              excerpt: "Any interest income on obligations of the United States and its possessions to the extent includible in gross income for federal income tax purposes"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ri/statute/44-30-12
              excerpt: "the amount to be subtracted shall in any case be reduced by any interest on indebtedness incurred or continued to purchase or carry obligations or securities"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if ri_pit_2026_supported_profile_applies:
            max(
              0,
              ri_pit_2026_qualifying_us_obligation_income_in_federal_agi
              - ri_pit_2026_related_interest_expense_deducted_federally
            )
          else:
            0

  - name: ri_pit_2026_profile_candidate_ri529_contribution_subtraction
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: R.I. Gen. Laws 44-30-12(c)(4)(i) and (iii), current-year contributions only
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ri/statute/44-30-12
              excerpt: "shall not exceed five hundred dollars ($500) or one thousand dollars ($1,000) if a joint return"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ri/statute/44-30-12
              excerpt: "shall not reduce the taxpayer’s federal adjusted gross income to less than zero (0)"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if ri_pit_2026_supported_profile_applies:
            min(
              ri_pit_2026_current_year_ri529_contributions,
              (
                if ri_pit_2026_is_married_filing_jointly:
                  ri_pit_2026_ri529_joint_contribution_cap
                else:
                  ri_pit_2026_ri529_single_contribution_cap
              ),
              max(0, ri_pit_2026_federal_adjusted_gross_income)
            )
          else:
            0

  - name: ri_pit_2026_profile_candidate_organ_donation_subtraction
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: R.I. Gen. Laws 44-30-12(c)(7), one-time living organ-donation subtraction
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ri/statute/44-30-12
              excerpt: "An individual may subtract up to ten thousand dollars ($10,000) from federal adjusted gross income"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ri/statute/44-30-12
              excerpt: "may be claimed in the taxable year in which the human organ transplantation occurs"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ri/statute/44-30-12
              excerpt: "may claim that subtract modification hereunder only once"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if (
            ri_pit_2026_supported_profile_applies
            and ri_pit_2026_organ_transplantation_occurred_this_year
            and ri_pit_2026_organ_donation_subtraction_not_previously_claimed
          ):
            min(
              ri_pit_2026_organ_donation_subtraction_cap,
              ri_pit_2026_unreimbursed_organ_donation_expenses
            )
          else:
            0

  - name: ri_pit_2026_profile_candidate_other_statutory_subtractions
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: R.I. Gen. Laws 44-30-12(c)(3), (6), (10), (11), (12), and (13)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ri/statute/44-30-12
              excerpt: "The amount of any withdrawal or distribution from the “tuition savings program”"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ri/statute/44-30-12
              excerpt: "Amounts deemed taxable income to the taxpayer due to payment or provision of insurance benefits to a dependent"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ri/statute/44-30-12
              excerpt: "a modification to income shall be allowed for the incremental difference"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ri/statute/44-30-12
              excerpt: "in the case of any investment in a Rhode Island opportunity zone by the taxpayer for at least seven (7) years"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ri/statute/44-30-12
              excerpt: "the taxpayer’s military service pension benefits included in federal adjusted gross income"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ri/statute/44-30-12
              excerpt: "Any rebate issued to the taxpayer pursuant to § 44-30-103 to the extent included in gross income for federal tax purposes"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ri/statute/44-30-12
              excerpt: "the amount equal to any expenditure that is eligible to be claimed as a federal income tax deduction but is disallowed under 26 U.S.C. § 280E"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ri/statute/44-30-12
              excerpt: "in the case of a taxpayer that is licensed in accordance with chapters 28.6 and/or 28.11 of title 21"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if ri_pit_2026_supported_profile_applies:
            ri_pit_2026_qualified_tuition_distribution_in_federal_agi
            + ri_pit_2026_taxable_dependent_insurance_benefits
            + (
              if ri_pit_2026_ri_opportunity_zone_investment_held_at_least_seven_years:
                ri_pit_2026_ri_opportunity_zone_incremental_benefit
              else:
                0
            )
            + ri_pit_2026_military_service_pension_in_federal_agi
            + ri_pit_2026_child_rebate_in_federal_agi
            + (
              if ri_pit_2026_is_licensed_for_section_280e_subtraction:
                ri_pit_2026_section_280e_eligible_expenditures
              else:
                0
            )
          else:
            0

  - name: ri_pit_2026_profile_candidate_statutory_subtractions
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Sum of source-grounded section 44-30-12(c) subtraction branches
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ri/statute/44-30-12
              excerpt: "There shall be subtracted from federal adjusted gross income"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          ri_pit_2026_profile_candidate_us_obligation_subtraction
          + ri_pit_2026_profile_candidate_ri529_contribution_subtraction
          + ri_pit_2026_profile_candidate_organ_donation_subtraction
          + ri_pit_2026_profile_candidate_other_statutory_subtractions

  - name: ri_pit_2026_profile_candidate_rhode_island_income
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: R.I. Gen. Laws 44-30-12(a), federal adjusted gross income with supported modifications
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ri/statute/44-30-12
              excerpt: "The Rhode Island income of a resident individual means the individual’s adjusted gross income for federal income tax purposes, with the modifications specified in this section"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if ri_pit_2026_supported_profile_applies:
            ri_pit_2026_federal_adjusted_gross_income
            + ri_pit_2026_profile_candidate_statutory_additions
            - ri_pit_2026_profile_candidate_statutory_subtractions
          else:
            0

  - name: ri_pit_2026_earned_income_credit_rate
    kind: parameter
    dtype: Rate
    period: Year
    source: R.I. Gen. Laws 44-30-2.6(c)(2)(N)(1), rate beginning in 2024
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ri/statute/44-30-2.6
              excerpt: "For tax years beginning on or after January 1, 2024, a taxpayer entitled to a federal earned-income credit shall be allowed a Rhode Island earned-income credit equal to sixteen percent (16%) of the federal earned-income credit"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: '0.16'

  - name: ri_pit_2026_earned_income_credit_candidate
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: R.I. Gen. Laws 44-30-2.6(c)(2)(N), total statutory EITC candidate before return ordering
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ri/statute/44-30-2.6
              excerpt: "a taxpayer entitled to a federal earned-income credit shall be allowed a Rhode Island earned-income credit"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ri/statute/44-30-2.6
              excerpt: "one hundred percent (100%) of the amount by which the Rhode Island earned-income credit exceeds the Rhode Island income tax"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if ri_pit_2026_supported_profile_applies:
            ri_pit_2026_earned_income_credit_rate
            * ri_pit_2026_federal_earned_income_credit
          else:
            0

  - name: ri_pit_2026_child_and_dependent_care_credit_rate
    kind: parameter
    dtype: Rate
    period: Year
    source: R.I. Gen. Laws 44-30-2.6(c)(3)(F)(I)(g)
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ri/statute/44-30-2.6
              excerpt: "twenty-five percent (25%) of the federal child and dependent care credit allowable for the taxable year for federal purposes"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: '0.25'

  - name: ri_pit_2026_uncapped_child_and_dependent_care_credit_candidate
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: R.I. Gen. Laws 44-30-2.6(c)(3)(F)(I)(g), uncapped candidate
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ri/statute/44-30-2.6
              excerpt: "such credit shall not exceed the Rhode Island tax liability"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if ri_pit_2026_supported_profile_applies:
            ri_pit_2026_child_and_dependent_care_credit_rate
            * ri_pit_2026_federal_child_and_dependent_care_credit
          else:
            0

inputs:
  - {name: ri_pit_2026_federal_adjusted_gross_income, entity: TaxUnit, dtype: Money, period: Year, unit: USD, description: Federal adjusted gross income for the full-year resident tax unit.}
  - {name: ri_pit_2026_is_full_year_resident, entity: TaxUnit, dtype: Judgment, period: Year, description: Whether the individual is a Rhode Island resident for the entire 2026 taxable year.}
  - {name: ri_pit_2026_is_single, entity: TaxUnit, dtype: Judgment, period: Year, description: Whether the 2026 filing status is single.}
  - {name: ri_pit_2026_is_married_filing_jointly, entity: TaxUnit, dtype: Judgment, period: Year, description: Whether the 2026 filing status is married filing jointly.}
  - {name: ri_pit_2026_is_head_of_household, entity: TaxUnit, dtype: Judgment, period: Year, description: Whether the 2026 filing status is head of household.}
  - {name: ri_pit_2026_is_married_filing_separately, entity: TaxUnit, dtype: Judgment, period: Year, description: Whether the 2026 filing status is married filing separately.}
  - {name: ri_pit_2026_is_qualifying_surviving_spouse, entity: TaxUnit, dtype: Judgment, period: Year, description: Whether the 2026 filing status is qualifying surviving spouse.}
  - {name: ri_pit_2026_uses_standard_deduction, entity: TaxUnit, dtype: Judgment, period: Year, description: Whether the taxpayer uses the Rhode Island standard deduction; false is outside this core.}
  - {name: ri_pit_2026_is_nonresident_alien, entity: TaxUnit, dtype: Judgment, period: Year, description: Whether section 44-30-2.6 denies the standard deduction as a nonresident alien.}
  - {name: ri_pit_2026_non_rhode_island_obligation_interest, entity: TaxUnit, dtype: Money, period: Year, unit: USD, description: Interest on obligations of another state or its political subdivisions excluded from federal adjusted gross income.}
  - {name: ri_pit_2026_federally_exempt_us_instrumentality_income_state_taxable, entity: TaxUnit, dtype: Money, period: Year, unit: USD, description: Federally exempt United States authority, commission, or instrumentality income that federal law does not exempt from state income tax.}
  - {name: ri_pit_2026_unemployment_compensation_excluded_from_federal_agi, entity: TaxUnit, dtype: Money, period: Year, unit: USD, description: Unemployment compensation received but excluded from federal adjusted gross income.}
  - {name: ri_pit_2026_qualified_motor_vehicle_sales_tax_deduction, entity: TaxUnit, dtype: Money, period: Year, unit: USD, description: Federal section 164(a)(6) qualified-motor-vehicle sales-tax deduction.}
  - {name: ri_pit_2026_ppp_loan_forgiveness, entity: TaxUnit, dtype: Money, period: Year, unit: USD, description: Federally forgiven amount of the taxpayer's one direct PPP loan; multiple loans and pass-through shares are outside this branch.}
  - {name: ri_pit_2026_has_multiple_or_pass_through_ppp_loans, entity: TaxUnit, dtype: Judgment, period: Year, description: Whether multiple-loan or pass-through-entity threshold allocation is required; true places the taxpayer outside the single-direct-loan branch.}
  - {name: ri_pit_2026_qualifying_us_obligation_income_in_federal_agi, entity: TaxUnit, dtype: Money, period: Year, unit: USD, description: Qualifying United States obligation and instrumentality income included in federal adjusted gross income but exempt from Rhode Island tax.}
  - {name: ri_pit_2026_related_interest_expense_deducted_federally, entity: TaxUnit, dtype: Money, period: Year, unit: USD, description: Interest expense federally deducted for debt incurred or continued to purchase or carry the exempt obligations.}
  - {name: ri_pit_2026_qualified_tuition_distribution_in_federal_agi, entity: TaxUnit, dtype: Money, period: Year, unit: USD, description: Qualified Rhode Island tuition-savings distribution included in federal adjusted gross income and not a nonqualified withdrawal.}
  - {name: ri_pit_2026_current_year_ri529_contributions, entity: TaxUnit, dtype: Money, period: Year, unit: USD, description: Raw current-year contributions made by the participant to Rhode Island tuition-savings accounts, excluding transfers, rollovers, and beneficiary changes.}
  - {name: ri_pit_2026_taxable_dependent_insurance_benefits, entity: TaxUnit, dtype: Money, period: Year, unit: USD, description: Insurance benefits for a dependent or domestic partner included in federal adjusted gross income.}
  - {name: ri_pit_2026_unreimbursed_organ_donation_expenses, entity: TaxUnit, dtype: Money, period: Year, unit: USD, description: Unreimbursed qualifying travel, lodging, and lost-wage expenses from the taxpayer's living organ donation.}
  - {name: ri_pit_2026_organ_transplantation_occurred_this_year, entity: TaxUnit, dtype: Judgment, period: Year, description: Whether the qualifying living-organ transplantation occurred in tax year 2026.}
  - {name: ri_pit_2026_organ_donation_subtraction_not_previously_claimed, entity: TaxUnit, dtype: Judgment, period: Year, description: Whether the taxpayer has never previously claimed the one-time organ-donation subtraction.}
  - {name: ri_pit_2026_ri_opportunity_zone_incremental_benefit, entity: TaxUnit, dtype: Money, period: Year, unit: USD, description: Raw incremental federal benefit for a Rhode Island opportunity-zone investment held at least seven years.}
  - {name: ri_pit_2026_ri_opportunity_zone_investment_held_at_least_seven_years, entity: TaxUnit, dtype: Judgment, period: Year, description: Whether the Rhode Island opportunity-zone investment has been held for at least seven years.}
  - {name: ri_pit_2026_military_service_pension_in_federal_agi, entity: TaxUnit, dtype: Money, period: Year, unit: USD, description: Military-service pension benefits included in federal adjusted gross income.}
  - {name: ri_pit_2026_child_rebate_in_federal_agi, entity: TaxUnit, dtype: Money, period: Year, unit: USD, description: A section 44-30-103 child rebate included in federal gross income.}
  - {name: ri_pit_2026_section_280e_eligible_expenditures, entity: TaxUnit, dtype: Money, period: Year, unit: USD, description: Otherwise deductible expenditure disallowed federally by section 280E for a taxpayer licensed under the specified Rhode Island chapters.}
  - {name: ri_pit_2026_is_licensed_for_section_280e_subtraction, entity: TaxUnit, dtype: Judgment, period: Year, description: Whether the taxpayer is licensed under Rhode Island title 21 chapter 28.6 or 28.11 for the section 280E subtraction.}
  - {name: ri_pit_2026_taxable_social_security_in_federal_agi, entity: TaxUnit, dtype: Money, period: Year, unit: USD, description: Taxable Social Security included in federal adjusted gross income; any positive amount is held pending the official indexed 2026 threshold.}
  - {name: ri_pit_2026_nonmilitary_taxable_pension_or_annuity, entity: TaxUnit, dtype: Money, period: Year, unit: USD, description: Nonmilitary taxable pension or annuity income; any positive amount is held pending the official indexed 2026 threshold.}
  - {name: ri_pit_2026_has_nonqualified_tuition_withdrawal, entity: TaxUnit, dtype: Judgment, period: Year, description: Whether a section 44-30-12(b)(4) nonqualified tuition withdrawal requires the three-taxable-year recapture calculation.}
  - {name: ri_pit_2026_has_prior_year_ri529_contribution_carryover, entity: TaxUnit, dtype: Judgment, period: Year, description: Whether prior-year Rhode Island tuition-savings contribution carryover exists; true is outside the current-year-only branch.}
  - {name: ri_pit_2026_has_section_1_1_artist_exemption, entity: TaxUnit, dtype: Judgment, period: Year, description: Whether the certified writer composer or artist exemption requires calculation.}
  - {name: ri_pit_2026_has_family_education_account_modification, entity: TaxUnit, dtype: Judgment, period: Year, description: Whether a section 44-30-25 family-education-account modification applies.}
  - {name: ri_pit_2026_has_scituate_medical_savings_account_modification, entity: TaxUnit, dtype: Judgment, period: Year, description: Whether a section 44-30-25.1 Scituate medical-savings-account modification applies.}
  - {name: ri_pit_2026_has_fiduciary_adjustment, entity: TaxUnit, dtype: Judgment, period: Year, description: Whether a beneficiary share of the section 44-30-17 fiduciary adjustment applies.}
  - {name: ri_pit_2026_has_partnership_modification, entity: TaxUnit, dtype: Judgment, period: Year, description: Whether section 44-30-15 partnership modification allocation applies.}
  - {name: ri_pit_2026_has_rhode_island_net_operating_loss, entity: TaxUnit, dtype: Judgment, period: Year, description: Whether a Rhode Island net-operating-loss deduction or limitation must be computed.}
  - {name: ri_pit_2026_has_special_tax_computation, entity: TaxUnit, dtype: Judgment, period: Year, description: Whether lump-sum distribution child-investment-income federal-credit-recapture or farm-income-averaging tax applies.}
  - {name: ri_pit_2026_federal_earned_income_credit, entity: TaxUnit, dtype: Money, period: Year, unit: USD, description: Federal earned-income credit to which the taxpayer is entitled for 2026.}
  - {name: ri_pit_2026_federal_child_and_dependent_care_credit, entity: TaxUnit, dtype: Money, period: Year, unit: USD, description: Federal child and dependent care credit allowable for 2026.}
