format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_paths:
      - us-ri/guidance/tax/adv-2025-22/page-1
      - us-ri/guidance/tax/adv-2025-22/page-2
      - us-ri/statute/44-30-1
      - us-ri/statute/44-30-1.1
      - us-ri/statute/44-30-2.6
      - us-ri/statute/44-30-2.8
      - us-ri/statute/44-30-3
      - us-ri/statute/44-30-5
      - us-ri/statute/44-30-11
      - us-ri/statute/44-30-12
      - us-ri/statute/44-30-15
      - us-ri/statute/44-30-17
      - us-ri/statute/44-30-18
      - us-ri/statute/44-30-25
      - us-ri/statute/44-30-25.1
      - us-ri/statute/44-30-32
      - us-ri/statute/44-30-87.1
    upstream_source_check:
      status: checked_higher_authority
      checked_paths:
        - us-ri/guidance/tax/adv-2025-22/page-1
        - us-ri/guidance/tax/adv-2025-22/page-2
        - us-ri/statute/44-30-1
        - us-ri/statute/44-30-1.1
        - us-ri/statute/44-30-2.6
        - us-ri/statute/44-30-2.8
        - us-ri/statute/44-30-3
        - us-ri/statute/44-30-5
        - us-ri/statute/44-30-11
        - us-ri/statute/44-30-12
        - us-ri/statute/44-30-15
        - us-ri/statute/44-30-17
        - us-ri/statute/44-30-18
        - us-ri/statute/44-30-25
        - us-ri/statute/44-30-25.1
        - us-ri/statute/44-30-32
        - us-ri/statute/44-30-87.1
      rationale: |-
        The pinned official Chapter 44-30 snapshot supplies the resident-income
        construction, deduction and exemption rules, optional tax-table rule,
        ordinary schedule authority, other-state credit and sourcing rules,
        and credit inventory. Official Division of Taxation Advisory
        ADV 2025-22 supplies the operative tax-year-2026 indexed standard
        deductions, exemption unit, phaseout range and increment, and uniform
        individual schedule.

        The advisory displays cumulative schedule bases of $3,076.88 and
        $8,035.88. This module uses those official cent amounts. It does not
        substitute the old pilot's mathematically derived $3,076.875 and
        $8,035.875 bases. Consequently, the first band computes $3,076.875 at
        exactly $82,050, while the official second-band formula begins with
        $3,076.88 for income over $82,050. That half-cent display transition is
        deliberate and tested.

        Pages 3 and 4 of ADV 2025-22 expressly publish Social Security,
        pension/annuity, and property-tax-relief values for tax year 2025, not
        2026. They are not used here. The pinned corpus also lacks the 2026
        optional tax tables, final resident return and instructions, and the
        other chapters that govern several listed credits. Those surfaces
        remain typed holds.

        No input is a completed Rhode Island adjusted gross income, taxable
        income, deduction, exemption, credit, schedule parameter, tax, or final
        liability. Inputs are federal outputs, raw monetary facts, filing and
        eligibility facts, other jurisdictions' imposed taxes, and raw
        sourcing-category income and deductions. Federal opportunity-zone
        benefit components are supplied separately and differenced here.
  summary: |-
    Tax-year-2026 Rhode Island full-year resident individual-income-tax core.
    For a fail-closed ordinary profile it starts with federal adjusted gross
    income, computes direct non-indexed section 44-30-12 additions and
    subtractions, derives the filing-status standard deduction, applies the
    2026 five-step deduction and exemption phaseout, applies dependent and TIN
    rules to the exemption count, and derives profile-candidate taxable income.

    When the taxpayer does not elect the optional administrator tax table, the
    core applies the official 2026 uniform schedule. An elected table is an
    explicit hold, never a silent schedule fallback. For the ordinary
    non-dual-residence, non-apportioned branch, the module computes income
    derived from other taxing states from raw section 44-30-32 categories and
    caps the aggregate other-state tax credit under section 44-30-18.

    If every unsupported credit branch is explicitly absent and at most one
    of the ordinary other-state or child/dependent-care credits is positive,
    the bounded credit chain applies that supported nonrefundable credit and
    then divides the sixteen-percent Rhode Island earned-income credit into
    nonrefundable and fully refundable portions. When both nonrefundable
    credits are positive, their tax-year-2026 ordering is a typed hold because
    the pinned corpus lacks the 2026 return and instructions. The resulting
    bounded net-liability candidate may be negative. It is not the campaign
    final output because taxpayers with any held modification, elected tax
    table, specialty source allocation, ambiguous credit order, or other
    listed credit fail closed.
  deferred_outputs:
    - output: us-ri:policies/income_tax/resident_core_liability_pipeline#ri_pit_2026_complete_rhode_island_income
      reason: |-
        Artist, family-education-account, Scituate medical-savings-account,
        partnership, fiduciary, NOL, nonqualified tuition, indexed Social
        Security, indexed nonmilitary retirement, and specialty-tax branches
        are explicitly excluded from the ordinary profile.
      source_values:
        - us-ri:policies/income_tax/resident_core_liability_pipeline#ri_pit_2026_supported_profile_applies
        - us-ri:policies/income_tax/resident_core_liability_pipeline#ri_pit_2026_profile_candidate_rhode_island_income
    - output: us-ri:policies/income_tax/resident_core_liability_pipeline#ri_pit_2026_social_security_and_nonmilitary_retirement_subtractions
      reason: |-
        ADV 2025-22 labels its Social Security and pension thresholds as
        tax-year-2025 values. The official tax-year-2026 indexed thresholds are
        absent from the pinned corpus.
      source_values:
        - us-ri:policies/income_tax/resident_core_liability_pipeline#ri_pit_2026_supported_profile_applies
    - output: us-ri:policies/income_tax/resident_core_liability_pipeline#ri_pit_2026_elected_optional_tax_table_tax
      reason: |-
        Section 44-30-3 permits an eligible resident to elect administrator
        tables. The pinned corpus does not contain the tax-year-2026 tables or
        eligibility instructions, so elected-table taxpayers fail closed.
      source_values:
        - us-ri:policies/income_tax/resident_core_liability_pipeline#ri_pit_2026_schedule_branch_applies
        - us-ri:policies/income_tax/resident_core_liability_pipeline#ri_pit_2026_profile_candidate_schedule_tax
    - output: us-ri:policies/income_tax/resident_core_liability_pipeline#ri_pit_2026_complete_tax_after_nonrefundable_credits
      reason: |-
        Property-tax-relief, lead-paint, historic, motion-picture,
        scholarship, Wavemaker, Rebuild Rhode Island, qualified-jobs, and
        historic-homeownership credits require governing chapters. The
        tax-year-2026 return ordering between the ordinary other-state and
        child/dependent-care credits is also absent from the pinned corpus, so
        a return with both positive candidates is held.
      source_values:
        - us-ri:policies/income_tax/resident_core_liability_pipeline#ri_pit_2026_all_held_credit_branches_absent
        - us-ri:policies/income_tax/resident_core_liability_pipeline#ri_pit_2026_nonrefundable_credit_order_is_unambiguous
        - us-ri:policies/income_tax/resident_core_liability_pipeline#ri_pit_2026_bounded_tax_after_nonrefundable_credits
    - output: us-ri:policies/income_tax/resident_core_liability_pipeline#ri_pit_2026_net_income_tax_liability
      reason: |-
        The bounded net-liability candidate is complete only for the explicit
        ordinary no-table, no-held-credit profile. The campaign final output
        remains deferred until every held modification, table, sourcing, and
        credit branch is supported.
      source_values:
        - us-ri:policies/income_tax/resident_core_liability_pipeline#ri_pit_2026_bounded_credit_chain_applies
        - us-ri:policies/income_tax/resident_core_liability_pipeline#ri_pit_2026_bounded_net_income_tax_liability_candidate

