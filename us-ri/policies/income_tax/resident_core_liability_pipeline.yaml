          elif ri_pit_2026_profile_candidate_rhode_island_income <= ri_pit_2026_phaseout_first_step_ceiling:
            ri_pit_2026_eighty_percent_allowed
          elif ri_pit_2026_profile_candidate_rhode_island_income <= ri_pit_2026_phaseout_second_step_ceiling:
            ri_pit_2026_sixty_percent_allowed
          elif ri_pit_2026_profile_candidate_rhode_island_income <= ri_pit_2026_phaseout_third_step_ceiling:
            ri_pit_2026_forty_percent_allowed
          elif ri_pit_2026_profile_candidate_rhode_island_income <= ri_pit_2026_phaseout_end:
            ri_pit_2026_twenty_percent_allowed
          else:
            0

  - name: ri_pit_2026_status_standard_deduction_before_phaseout
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: ADV 2025-22 page 1 filing-status standard deductions
    metadata:
      proof:
        atoms:
          - {path: 'versions[0].formula', kind: parameter_table, source: {corpus_citation_path: us-ri/guidance/tax/adv-2025-22/page-1, excerpt: "Rhode Island standard deduction amounts by Tax Year Filing status 2025 2026"}}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if not ri_pit_2026_supported_profile_applies:
            0
          elif ri_pit_2026_is_married_filing_jointly or ri_pit_2026_is_qualifying_surviving_spouse:
            ri_pit_2026_standard_deduction_joint_or_surviving_spouse
          elif ri_pit_2026_is_head_of_household:
            ri_pit_2026_standard_deduction_head_of_household
          else:
            ri_pit_2026_standard_deduction_single_or_separate

  - name: ri_pit_2026_profile_candidate_standard_deduction
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Section 44-30-2.6(c)(3)(B) and ADV 2025-22 phaseout
    metadata: {proof: {atoms: [{path: 'versions[0].formula', kind: formula, source: {corpus_citation_path: us-ri/guidance/tax/adv-2025-22/page-1, excerpt: "if a taxpayer’s federal adjusted gross income (as modified for Rhode Island tax purposes) falls within a certain income range, these amounts are limited"}}]}}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          ri_pit_2026_status_standard_deduction_before_phaseout
          * ri_pit_2026_deduction_and_exemption_allowed_percentage

  - name: ri_pit_2026_exemption_before_phaseout
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Section 44-30-2.6(c)(3)(C), dependent disallowance and exemption count
    metadata:
      proof:
        atoms:
          - {path: 'versions[0].formula', kind: formula, source: {corpus_citation_path: us-ri/statute/44-30-2.6, excerpt: "exemption amount means three thousand five hundred dollars ($3,500) multiplied by the number of exemptions allowed"}}
          - {path: 'versions[0].formula', kind: exception, source: {corpus_citation_path: us-ri/statute/44-30-2.6, excerpt: "with respect to whom a deduction under this section is allowable to another taxpayer for the same taxable year, the exemption amount applicable to such individual for such individual’s taxable year shall be zero"}}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if (
            ri_pit_2026_supported_profile_applies
            and not ri_pit_2026_taxpayer_is_claimed_as_dependent
          ):
            ri_pit_2026_exemption_unit
            * ri_pit_2026_pre_tcja_federal_exemption_count
          else:
            0

  - name: ri_pit_2026_profile_candidate_exemption
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Section 44-30-2.6(c)(3)(C)-(E) and ADV 2025-22 TY2026 phaseout
    metadata: {proof: {atoms: [{path: 'versions[0].formula', kind: formula, source: {corpus_citation_path: us-ri/guidance/tax/adv-2025-22/page-1, excerpt: "Phase-out range for standard deduction, exemption amounts by Tax Year"}}]}}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          ri_pit_2026_exemption_before_phaseout
          * ri_pit_2026_deduction_and_exemption_allowed_percentage

  - name: ri_pit_2026_profile_candidate_taxable_income
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: R.I. Gen. Laws 44-30-2.6(c)(3)
    metadata: {proof: {atoms: [{path: 'versions[0].formula', kind: formula, source: {corpus_citation_path: us-ri/statute/44-30-2.6, excerpt: "Rhode Island taxable income” means federal adjusted gross income as determined under the Internal Revenue Code, 26 U.S.C. § 1 et seq., and as modified for Rhode Island purposes pursuant to § 44-30-12 less the amount of Rhode Island Basic Standard Deduction"}}, {path: 'versions[0].formula', kind: formula, source: {corpus_citation_path: us-ri/statute/44-30-2.6, excerpt: "less the amount of personal exemption allowed"}}]}}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          max(
            0,
            if ri_pit_2026_supported_profile_applies:
              ri_pit_2026_profile_candidate_rhode_island_income
              - ri_pit_2026_profile_candidate_standard_deduction
              - ri_pit_2026_profile_candidate_exemption
            else:
              0
          )

  - name: ri_pit_2026_schedule_branch_applies
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: Explicit ordinary schedule branch when no optional tax table is elected
    metadata:
      proof:
        atoms:
          - {path: 'versions[0].formula', kind: formula, source: {corpus_citation_path: us-ri/guidance/tax/adv-2025-22/page-2, excerpt: "uniform tax rate schedule, which is used by all filers"}}
          - {path: 'versions[0].formula', kind: exception, source: {corpus_citation_path: us-ri/statute/44-30-3, excerpt: "may elect to use or not to use any tax table"}}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          ri_pit_2026_supported_profile_applies
          and not ri_pit_2026_elects_optional_tax_table

  - name: ri_pit_2026_profile_candidate_schedule_tax
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: ADV 2025-22 official TY2026 uniform schedule and displayed cumulative bases
    metadata:
      proof:
        atoms:
          - {path: 'versions[0].formula', kind: parameter_table, source: {corpus_citation_path: us-ri/guidance/tax/adv-2025-22/page-2, excerpt: "Uniform tax rate schedule for Tax Year 2026 (Personal Income Tax)"}}
          - {path: 'versions[0].formula', kind: parameter, source: {corpus_citation_path: us-ri/guidance/tax/adv-2025-22/page-2, excerpt: "82,050 186,450 3,076.88 4.75% 82,050"}}
          - {path: 'versions[0].formula', kind: parameter, source: {corpus_citation_path: us-ri/guidance/tax/adv-2025-22/page-2, excerpt: "8,035.88 5.99% 186,450"}}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if not ri_pit_2026_schedule_branch_applies:
            0
          elif ri_pit_2026_profile_candidate_taxable_income <= ri_pit_2026_first_bracket_ceiling:
            ri_pit_2026_first_rate
            * ri_pit_2026_profile_candidate_taxable_income
          elif ri_pit_2026_profile_candidate_taxable_income <= ri_pit_2026_second_bracket_ceiling:
            ri_pit_2026_second_bracket_displayed_base
            + ri_pit_2026_second_rate
            * (
              ri_pit_2026_profile_candidate_taxable_income
              - ri_pit_2026_first_bracket_ceiling
            )
          else:
            ri_pit_2026_top_bracket_displayed_base
            + ri_pit_2026_top_rate
            * (
              ri_pit_2026_profile_candidate_taxable_income
              - ri_pit_2026_second_bracket_ceiling
            )

  - name: ri_pit_2026_other_taxing_states_sourced_income
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Raw section 44-30-32 category construction for the section 44-30-18 numerator
    metadata:
      proof:
        atoms:
          - {path: 'versions[0].formula', kind: formula, source: {corpus_citation_path: us-ri/statute/44-30-32, excerpt: "ownership or disposition of any interest in real or tangible personal property"}}
          - {path: 'versions[0].formula', kind: formula, source: {corpus_citation_path: us-ri/statute/44-30-32, excerpt: "A business, trade, profession, or occupation carried on in this state"}}
          - {path: 'versions[0].formula', kind: formula, source: {corpus_citation_path: us-ri/statute/44-30-32, excerpt: "Gambling winnings from the state lottery and gambling winnings from pari-mutuel betting events"}}
          - {path: 'versions[0].formula', kind: condition, source: {corpus_citation_path: us-ri/statute/44-30-32, excerpt: "intangible personal property is employed in a business, trade, profession, or occupation"}}
          - {path: 'versions[0].formula', kind: formula, source: {corpus_citation_path: us-ri/statute/44-30-32, excerpt: "portion of the modifications described in subsections (b) and (c) of § 44-30-12 which relate to income derived from Rhode Island sources"}}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if ri_pit_2026_supported_profile_applies:
            max(
              0,
              ri_pit_2026_other_states_property_income
              - ri_pit_2026_other_states_property_deductions
              + ri_pit_2026_other_states_business_income
              - ri_pit_2026_other_states_business_deductions
              + ri_pit_2026_other_states_gambling_winnings
              - ri_pit_2026_other_states_gambling_deductions
              + ri_pit_2026_other_states_business_intangible_income
              - ri_pit_2026_other_states_business_intangible_deductions
              + ri_pit_2026_other_states_related_ri_additions
              - ri_pit_2026_other_states_related_ri_subtractions
            )
          else:
            0

  - name: ri_pit_2026_ordinary_other_state_credit_branch_applies
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: Ordinary aggregate section 44-30-18 credit without held allocation or dual-residence branches
    metadata:
      proof:
        atoms:
          - {path: 'versions[0].formula', kind: condition, source: {corpus_citation_path: us-ri/statute/44-30-18, excerpt: "A resident shall be allowed a credit"}}
          - {path: 'versions[0].formula', kind: exception, source: {corpus_citation_path: us-ri/statute/44-30-32, excerpt: "carried on partly within and partly without this state"}}
          - {path: 'versions[0].formula', kind: exception, source: {corpus_citation_path: us-ri/statute/44-30-32, excerpt: "including: (i) His or her distributive share of partnership income and deductions"}}
          - {path: 'versions[0].formula', kind: exception, source: {corpus_citation_path: us-ri/statute/44-30-18, excerpt: "Double residence"}}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          ri_pit_2026_schedule_branch_applies
          and not ri_pit_2026_has_partly_in_and_partly_out_business_income
          and not ri_pit_2026_has_other_state_partnership_or_fiduciary_sourcing
          and not ri_pit_2026_has_dual_residence_credit_branch

  - name: ri_pit_2026_ordinary_aggregate_other_state_credit_candidate
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: R.I. Gen. Laws 44-30-18(a)-(b), aggregate imposed tax capped by RI tax proportion
    metadata:
      proof:
        atoms:
          - {path: 'versions[0].formula', kind: formula, source: {corpus_citation_path: us-ri/statute/44-30-18, excerpt: "aggregate of net income taxes imposed on him or her for the taxable year by other states"}}
          - {path: 'versions[0].formula', kind: formula, source: {corpus_citation_path: us-ri/statute/44-30-18, excerpt: "credit shall not exceed the proportion of the taxpayer’s Rhode Island personal income tax that the taxpayer’s Rhode Island income derived from the other taxing states bears to his or her entire Rhode Island income"}}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if (
            ri_pit_2026_ordinary_other_state_credit_branch_applies
            and ri_pit_2026_profile_candidate_rhode_island_income > 0
          ):
            min(
              max(0, ri_pit_2026_aggregate_other_state_net_income_taxes),
              max(
                0,
                ri_pit_2026_profile_candidate_schedule_tax
                * min(
                  ri_pit_2026_full_allowed_percentage,
                  max(0, ri_pit_2026_other_taxing_states_sourced_income)
                  / max(0, ri_pit_2026_profile_candidate_rhode_island_income)
                )
              )
            )
          else:
            0

  - name: ri_pit_2026_all_held_credit_branches_absent
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: Explicit gate for every unsupported section 44-30-2.6(c)(3)(F) credit branch
    metadata:
      proof:
        atoms:
          - {path: 'versions[0].formula', kind: exception, source: {corpus_citation_path: us-ri/statute/44-30-2.6, excerpt: "Property Tax Relief Credit"}}
          - {path: 'versions[0].formula', kind: exception, source: {corpus_citation_path: us-ri/statute/44-30-2.6, excerpt: "Lead Paint Credit"}}
          - {path: 'versions[0].formula', kind: exception, source: {corpus_citation_path: us-ri/statute/44-30-2.6, excerpt: "Historic Structures Tax Credit"}}
          - {path: 'versions[0].formula', kind: exception, source: {corpus_citation_path: us-ri/statute/44-30-2.6, excerpt: "Motion Picture Productions Tax Credit"}}
          - {path: 'versions[0].formula', kind: exception, source: {corpus_citation_path: us-ri/statute/44-30-2.6, excerpt: "Tax credits for contributions to Scholarship Organizations"}}
          - {path: 'versions[0].formula', kind: exception, source: {corpus_citation_path: us-ri/statute/44-30-2.6, excerpt: "Stay Invested in RI Wavemaker Fellowship"}}
          - {path: 'versions[0].formula', kind: exception, source: {corpus_citation_path: us-ri/statute/44-30-2.6, excerpt: "Rebuild Rhode Island"}}
          - {path: 'versions[0].formula', kind: exception, source: {corpus_citation_path: us-ri/statute/44-30-2.6, excerpt: "Rhode Island Qualified Jobs Incentive Program"}}
          - {path: 'versions[0].formula', kind: exception, source: {corpus_citation_path: us-ri/statute/44-30-2.6, excerpt: "historic homeownership assistance act"}}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          not ri_pit_2026_has_property_tax_relief_credit
          and not ri_pit_2026_has_lead_paint_credit
          and not ri_pit_2026_has_historic_structures_credit
          and not ri_pit_2026_has_motion_picture_credit
          and not ri_pit_2026_has_scholarship_organization_credit
          and not ri_pit_2026_has_wavemaker_credit
          and not ri_pit_2026_has_rebuild_rhode_island_credit
          and not ri_pit_2026_has_qualified_jobs_credit
          and not ri_pit_2026_has_historic_homeownership_carryforward_credit

  - name: ri_pit_2026_bounded_credit_chain_applies
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: Ordinary schedule, sourcing, held-credit, and unambiguous-order gate
    metadata:
      proof:
        atoms:
          - {path: 'versions[0].formula', kind: exception, source: {corpus_citation_path: us-ri/statute/44-30-18, excerpt: "credit, against the Rhode Island personal income tax otherwise due"}}
          - {path: 'versions[0].formula', kind: exception, source: {corpus_citation_path: us-ri/statute/44-30-2.6, excerpt: "such credit shall not exceed the Rhode Island tax liability"}}
          - {path: 'versions[0].formula', kind: ordering, source: {corpus_citation_path: us-ri/statute/44-30-2.6, excerpt: "In the event the Rhode Island earned-income credit allowed under paragraph (N)(1) of this section exceeds the amount of Rhode Island income tax"}}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          ri_pit_2026_ordinary_other_state_credit_branch_applies
          and ri_pit_2026_all_held_credit_branches_absent
          and ri_pit_2026_nonrefundable_credit_order_is_unambiguous

  - name: ri_pit_2026_uncapped_child_and_dependent_care_credit_candidate
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Twenty-five percent of allowable federal child/dependent-care credit
    metadata: {proof: {atoms: [{path: 'versions[0].formula', kind: formula, source: {corpus_citation_path: us-ri/statute/44-30-2.6, excerpt: "twenty-five percent (25%) of the federal child and dependent care credit allowable"}}]}}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if ri_pit_2026_supported_profile_applies:
            ri_pit_2026_child_and_dependent_care_credit_rate
            * ri_pit_2026_federal_child_and_dependent_care_credit
          else:
            0

  - name: ri_pit_2026_nonrefundable_credit_order_is_unambiguous
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: Typed hold when both separately capped nonrefundable credits are positive without TY2026 return-order authority
    metadata:
      proof:
        atoms:
          - {path: 'versions[0].formula', kind: exception, source: {corpus_citation_path: us-ri/statute/44-30-18, excerpt: "credit shall not exceed the proportion of the taxpayer’s Rhode Island personal income tax"}}
          - {path: 'versions[0].formula', kind: exception, source: {corpus_citation_path: us-ri/statute/44-30-2.6, excerpt: "such credit shall not exceed the Rhode Island tax liability"}}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          ri_pit_2026_ordinary_aggregate_other_state_credit_candidate == 0
          or ri_pit_2026_uncapped_child_and_dependent_care_credit_candidate == 0

  - name: ri_pit_2026_bounded_child_and_dependent_care_credit_applied
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Supported CDCC capped only on the unambiguous branch where the other-state candidate is zero
    metadata: {proof: {atoms: [{path: 'versions[0].formula', kind: formula, source: {corpus_citation_path: us-ri/statute/44-30-2.6, excerpt: "such credit shall not exceed the Rhode Island tax liability"}}]}}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if ri_pit_2026_bounded_credit_chain_applies:
            min(
              ri_pit_2026_uncapped_child_and_dependent_care_credit_candidate,
              max(
                0,
                ri_pit_2026_profile_candidate_schedule_tax
                - ri_pit_2026_ordinary_aggregate_other_state_credit_candidate
              )
            )
          else:
            0

  - name: ri_pit_2026_earned_income_credit_candidate
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Sixteen percent of federal EITC before nonrefundable/refundable split
    metadata: {proof: {atoms: [{path: 'versions[0].formula', kind: formula, source: {corpus_citation_path: us-ri/statute/44-30-2.6, excerpt: "sixteen percent (16%) of the federal earned-income credit"}}]}}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if ri_pit_2026_supported_profile_applies:
            ri_pit_2026_earned_income_credit_rate
            * ri_pit_2026_federal_earned_income_credit
          else:
            0

  - name: ri_pit_2026_bounded_tax_before_eitc
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Schedule tax after supported ordinary nonrefundable credits and before EITC
    metadata: {proof: {atoms: [{path: 'versions[0].formula', kind: ordering, source: {corpus_citation_path: us-ri/statute/44-30-2.6, excerpt: "Such credit shall not exceed the amount of the Rhode Island income tax"}}]}}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if ri_pit_2026_bounded_credit_chain_applies:
            max(
              0,
              ri_pit_2026_profile_candidate_schedule_tax
              - ri_pit_2026_ordinary_aggregate_other_state_credit_candidate
              - ri_pit_2026_bounded_child_and_dependent_care_credit_applied
            )
          else:
            0

  - name: ri_pit_2026_bounded_nonrefundable_eitc
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: EITC applied through remaining Rhode Island income tax
    metadata: {proof: {atoms: [{path: 'versions[0].formula', kind: formula, source: {corpus_citation_path: us-ri/statute/44-30-2.6, excerpt: "Such credit shall not exceed the amount of the Rhode Island income tax"}}]}}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if ri_pit_2026_bounded_credit_chain_applies:
            min(
              ri_pit_2026_bounded_tax_before_eitc,
              ri_pit_2026_earned_income_credit_candidate
            )
          else:
            0

  - name: ri_pit_2026_bounded_refundable_eitc
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Fully refundable post-2015 EITC excess
    metadata:
      proof:
        atoms:
          - {path: 'versions[0].formula', kind: formula, source: {corpus_citation_path: us-ri/statute/44-30-2.6, excerpt: "one hundred percent (100%) of the amount by which the Rhode Island earned-income credit exceeds the Rhode Island income tax"}}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if ri_pit_2026_bounded_credit_chain_applies:
            max(
              0,
              ri_pit_2026_earned_income_credit_candidate
              - ri_pit_2026_bounded_tax_before_eitc
            )
          else:
            0

  - name: ri_pit_2026_bounded_tax_after_nonrefundable_credits
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Remaining tax after supported nonrefundable credits and nonrefundable EITC
    metadata: {proof: {atoms: [{path: 'versions[0].formula', kind: formula, source: {corpus_citation_path: us-ri/statute/44-30-2.6, excerpt: "In no event shall the tax imposed under this section be reduced to less than zero"}}]}}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if ri_pit_2026_bounded_credit_chain_applies:
            max(
              0,
              ri_pit_2026_bounded_tax_before_eitc
              - ri_pit_2026_bounded_nonrefundable_eitc
            )
          else:
            0

  - name: ri_pit_2026_bounded_net_income_tax_liability_candidate
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Bounded net tax after fully refundable EITC and before payments
    metadata:
      proof:
        atoms:
          - {path: 'versions[0].formula', kind: ordering, source: {corpus_citation_path: us-ri/statute/44-30-2.6, excerpt: "a refundable earned-income credit shall be allowed"}}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if ri_pit_2026_bounded_credit_chain_applies:
            ri_pit_2026_bounded_tax_after_nonrefundable_credits
            - ri_pit_2026_bounded_refundable_eitc
          else:
            0

inputs:
