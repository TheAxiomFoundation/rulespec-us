# Rhode Island Division of Taxation Advisory ADV 2025-22 (November 3, 2025)
# publishes the Tax Year 2026 personal-income-tax schedule for all filing-status
# types: 3.75% through $82,050, 4.75% through $186,450, then 5.99%. It also
# publishes standard deductions of $11,200 single/separate, $22,400
# joint/surviving-spouse, and $16,800 head-of-household, plus a $5,250 personal
# or dependency exemption. The exact cumulative bases below are $3,076.875 and
# $8,035.875; the advisory displays those amounts rounded to cents as $3,076.88
# and $8,035.88. Exact bases preserve continuity in this decimal RuleSpec.
#
# The six canonical single/joint cases retain the state-oracle grid names.
# PolicyEngine 4.18.9 does not yet implement ADV 2025-22 and exposes a stale,
# hybrid projected parameter set at period 2026. Its grid residuals are a
# documented oracle-vintage issue and are not used to source these Tax Year 2026
# fixture values. In canonical order, Axiom minus PolicyEngine is -13.125,
# -13.125, -38.125, -26.25, -54.75, and -81.0200390625 dollars; each difference
# is explained by the stale, hybrid thresholds, deductions, and exemptions.
# Section 44-30-12 modifications are zero in the grid, so modified Rhode Island
# AGI equals wages.
- name: single_30000
  period: {period_kind: tax_year, start: '2026-01-01', end: '2026-12-31'}
  input:
    us-ri:policies/income_tax/pilot_liability_pipeline#input.ri_pit_pilot_modified_adjusted_gross_income: 30000
    us-ri:policies/income_tax/pilot_liability_pipeline#input.ri_pit_pilot_supplied_deductions_and_exemptions: 16450
    us-ri:policies/income_tax/pilot_liability_pipeline#input.ri_pit_pilot_supplied_bracket_base: 0
    us-ri:policies/income_tax/pilot_liability_pipeline#input.ri_pit_pilot_supplied_bracket_floor: 0
    us-ri:policies/income_tax/pilot_liability_pipeline#input.ri_pit_pilot_supplied_marginal_rate: 0.0375
  output:
    us-ri:policies/income_tax/pilot_liability_pipeline#ri_pit_pilot_taxable_income: '13550'
    us-ri:policies/income_tax/pilot_liability_pipeline#ri_pit_pilot_schedule_tax: '508.125'
    us-ri:policies/income_tax/pilot_liability_pipeline#ri_pit_pilot_income_tax_liability: '508.125'
