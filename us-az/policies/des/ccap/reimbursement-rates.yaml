- name: virtual_school_supervision_hours_may_count_toward_daily_rate
  kind: derived
  entity: Person
  dtype: Judgment
  period: Day
  source: Virtual, remote, or online school work supervision statement
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-az/manual/des/ccap/reimbursement-rates/page-1
          excerpt: "The hours of care provided to school-age children completing virtual,\
            \ remote, or online school work while under the provider\u2019s supervision\
            \ may count towards the daily rate. The provider must not provide any\
            \ instruction or services associated with academic credit or a school\u2019\
            s program."
  versions:
  - effective_from: '2024-08-01'
    formula: 'child_is_school_age

      and child_completes_virtual_remote_or_online_school_work_under_provider_supervision

      and not provider_provides_instruction_or_services_associated_with_academic_credit_or_school_program'
