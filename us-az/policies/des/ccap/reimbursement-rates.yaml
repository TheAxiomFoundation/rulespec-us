format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-az/manual/des/ccap/reimbursement-rates/page-1
  summary: CCA-1227A FORENG (08/24), Arizona Department of Economic Security, Division
    of Child Care, Maximum Reimbursement Rates for Child Care, effective August 1,
    2024. Rates are daily rates by provider category and age group; children under
    age 1 use the 75th percentile of the 2022 Market Rate Survey, ages 1 through 12
    use the 50th percentile, and the daily rate is paid when attending for 15 minutes
    or more. Quality First/national accreditation/Head Start-compliant enhanced rates
    reflect a 50% increase; CDA family child care rates reflect a 35% increase. School-age
    children receive summer daily rates during May-July and school-year daily rates
    during August-April.
  deferred_outputs:
  - output: us-az:policies/des/ccap/reimbursement-rates#daily_reimbursement_payable_for_attendance
    reason: Generated rule ignored a source-stated substitution, modification, or
      limitation parameter. This output is deferred until the upstream cross-referenced
      mechanics can be imported or composed without stranding the modifier.
    source_values:
    - us-az:policies/des/ccap/reimbursement-rates#reimbursement_rate_cda_enhancement_rate
    - us-az:policies/des/ccap/reimbursement-rates#reimbursement_rate_quality_enhancement_rate
  - output: us-az:policies/des/ccap/reimbursement-rates#selected_daily_reimbursement_rate
    reason: Generated rule ignored a source-stated substitution, modification, or
      limitation parameter. This output is deferred until the upstream cross-referenced
      mechanics can be imported or composed without stranding the modifier.
    source_values:
    - us-az:policies/des/ccap/reimbursement-rates#reimbursement_rate_cda_enhancement_rate
    - us-az:policies/des/ccap/reimbursement-rates#reimbursement_rate_quality_enhancement_rate
rules:
- name: market_rate_survey_percentile_for_children_under_one
  kind: parameter
  dtype: Rate
  source: Basis statement for children under age 1
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-az/manual/des/ccap/reimbursement-rates/page-1
          excerpt: Rates are based on the 75th percentile of the 2022 Market Rate
            Survey (MRS) for children under age 1
      - path: versions[0].effective_from
        kind: effective_period
        source:
          corpus_citation_path: us-az/manual/des/ccap/reimbursement-rates/page-1
          excerpt: Effective August 1, 2024
  versions:
  - effective_from: '2024-08-01'
    formula: '0.75'
- name: market_rate_survey_percentile_for_children_age_one_through_twelve
  kind: parameter
  dtype: Rate
  source: Basis statement for ages 1 through 12
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-az/manual/des/ccap/reimbursement-rates/page-1
          excerpt: the 50th percentile of the 2022 MRS for ages 1 through age 12
      - path: versions[0].effective_from
        kind: effective_period
        source:
          corpus_citation_path: us-az/manual/des/ccap/reimbursement-rates/page-1
          excerpt: Effective August 1, 2024
  versions:
  - effective_from: '2024-08-01'
    formula: '0.50'
- name: reimbursement_rate_quality_enhancement_rate
  kind: parameter
  dtype: Rate
  source: Quality First, national accreditation, and Head Start-compliant enhanced
    rate statement
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-az/manual/des/ccap/reimbursement-rates/page-1
          excerpt: "A 50% increase for child care providers with a three-star, four-star,\
            \ or five-star rating by First Things First\u2019s Quality First program\
            \ or nationally accredited by a DES-approved accreditation program."
      - path: versions[0].effective_from
        kind: effective_period
        source:
          corpus_citation_path: us-az/manual/des/ccap/reimbursement-rates/page-1
          excerpt: Effective August 1, 2024
  versions:
  - effective_from: '2024-08-01'
    formula: '0.50'
- name: reimbursement_rate_cda_enhancement_rate
  kind: parameter
  dtype: Rate
  source: Child Development Associate credential enhanced rate statement
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-az/manual/des/ccap/reimbursement-rates/page-1
          excerpt: A 35% increase for family child care providers with a Child Development
            Associate (CDA) credential.
      - path: versions[0].effective_from
        kind: effective_period
        source:
          corpus_citation_path: us-az/manual/des/ccap/reimbursement-rates/page-1
          excerpt: Effective August 1, 2024
  versions:
