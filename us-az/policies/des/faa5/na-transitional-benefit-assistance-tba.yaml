format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-az/manual/des/faa5/na-transitional-benefit-assistance-tba
  summary: |-
    Certain eligible NA budgetary units who no longer meet eligibility for CA, transition to TBA. TBA budgetary units are potentially eligible to receive up to five consecutive months of TBA benefits.
rules:
  - name: tba_max_consecutive_months
    kind: parameter
    dtype: Count
    source: DES FAA5, NA Transitional Benefit Assistance, Policy
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-az/manual/des/faa5/na-transitional-benefit-assistance-tba
              excerpt: "up to five consecutive months of TBA benefits"
    versions:
      - effective_from: '2023-01-01'
        formula: |-
          5

  - name: tba_closure_reason_qualifies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: DES FAA5, NA Transitional Benefit Assistance, TBA Eligibility
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/manual/des/faa5/na-transitional-benefit-assistance-tba
              excerpt: "closed for one of the following reasons: Excessive Income ... Needy Family criteria"
    versions:
      - effective_from: '2023-01-01'
        formula: |-
          ca_case_closed_for_excessive_income
          or ca_case_closed_for_not_meeting_needy_family_criteria

  - name: tribal_tanf_transition_program_qualifies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: DES FAA5, NA Transitional Benefit Assistance, Tribal TANF transition programs
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/manual/des/faa5/na-transitional-benefit-assistance-tba
              excerpt: "Hopi Family Assistance Program ... Salt River Pima Maricopa Indian Community LEARN"
    versions:
      - effective_from: '2023-01-01'
        formula: |-
          tribal_tanf_transition_from_hopi_family_assistance_program
          or tribal_tanf_transition_from_salt_river_pima_maricopa_indian_community_learn

  - name: na_tba_potentially_eligible
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: DES FAA5, NA Transitional Benefit Assistance, TBA Eligibility
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/manual/des/faa5/na-transitional-benefit-assistance-tba
              excerpt: "The NA budgetary unit is potentially eligible ... when the related CA case is closed"
          - path: versions[0].formula
            kind: import
            import:
              target: us-az:policies/des/faa5/na-transitional-benefit-assistance-tba#tba_closure_reason_qualifies
              output: tba_closure_reason_qualifies
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-az:policies/des/faa5/na-transitional-benefit-assistance-tba#tribal_tanf_transition_program_qualifies
              output: tribal_tanf_transition_program_qualifies
              hash: sha256:local
    versions:
      - effective_from: '2023-01-01'
        formula: |-
          current_ca_related_case_is_closed
          and tba_closure_reason_qualifies
          and (
            not na_tba_transition_is_from_tribal_tanf_benefits
            or tribal_tanf_transition_program_qualifies
          )

  - name: na_tba_five_month_period_ended
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: DES FAA5, NA Transitional Benefit Assistance, TBA Closures
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/manual/des/faa5/na-transitional-benefit-assistance-tba
              excerpt: "The five-month approval period ends"
    versions:
      - effective_from: '2023-01-01'
        formula: |-
          tba_five_month_approval_period_has_ended

  - name: na_tba_no_longer_eligible
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: DES FAA5, NA Transitional Benefit Assistance, TBA Closures
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/manual/des/faa5/na-transitional-benefit-assistance-tba
              excerpt: "no longer eligible for TBA when any of the following occur"
          - path: versions[0].formula
            kind: import
            import:
              target: us-az:policies/des/faa5/na-transitional-benefit-assistance-tba#na_tba_five_month_period_ended
              output: na_tba_five_month_period_ended
              hash: sha256:local
    versions:
      - effective_from: '2023-01-01'
        formula: |-
          na_tba_five_month_period_ended
          or any_tba_budgetary_unit_participant_applies_and_is_approved_for_ca

  - name: na_tba_eligible
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: DES FAA5, NA Transitional Benefit Assistance, TBA Eligibility and TBA Closures
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/manual/des/faa5/na-transitional-benefit-assistance-tba
          - path: versions[0].formula
            kind: import
            import:
              target: us-az:policies/des/faa5/na-transitional-benefit-assistance-tba#na_tba_potentially_eligible
              output: na_tba_potentially_eligible
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-az:policies/des/faa5/na-transitional-benefit-assistance-tba#na_tba_no_longer_eligible
              output: na_tba_no_longer_eligible
              hash: sha256:local
    versions:
      - effective_from: '2023-01-01'
        formula: |-
          na_tba_potentially_eligible
          and (
            na_case_status_is_open
            or na_case_status_is_received
            or na_case_status_is_renewal
          )
          and na_benefits_issued_in_month_of_ca_closure
          and na_case_is_not_eligible_no_pay_case
          and closure_action_resulted_from_timely_reported_information
          and no_na_budgetary_unit_participant_continues_to_be_eligible_for_ca
          and na_and_ca_budgetary_unit_participants_comply_with_social_security_enumeration_process
          and na_and_ca_budgetary_unit_participants_comply_with_na_work_requirements
          and na_and_ca_budgetary_unit_participants_are_not_disqualified_due_to_voluntary_quit_or_reduced_work_effort_without_good_cause
          and na_and_ca_budgetary_unit_participants_are_not_disqualified_due_to_intentional_program_violation
          and na_and_ca_budgetary_unit_participants_are_not_disqualified_due_to_fleeing_to_avoid_prosecution_custody_or_confinement_after_felony_conviction
          and na_and_ca_budgetary_unit_participants_are_not_disqualified_due_to_fraudulent_statements_concerning_residency_or_identity
          and na_and_ca_budgetary_unit_participants_are_not_disqualified_due_to_felony_drug_conviction
          and na_and_ca_budgetary_unit_participants_are_not_disqualified_due_to_probation_or_parole_violation
          and na_budgetary_unit_participants_have_no_conviction_for_trading_na_benefits_for_controlled_substances
          and na_budgetary_unit_participants_have_no_conviction_for_trading_controlled_substances_for_na_benefits
          and na_budgetary_unit_participants_have_no_conviction_for_trafficking_na_benefits
          and ca_case_closure_not_due_to_addition_of_new_participant_and_new_participant_income
          and not na_tba_no_longer_eligible
