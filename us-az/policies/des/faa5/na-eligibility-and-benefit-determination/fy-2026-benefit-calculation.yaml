format: rulespec/v1
module:
  source_verification:
    corpus_citation_path: us-az/manual/des/faa5/na-eligibility-and-benefit-determination/block-9
  summary: |-
    Arizona Nutrition Assistance FY 2026 benefit calculation composition. This
    module composes the federal USDA FY 2026 SNAP chain (maximum allotments,
    deductions, income standards, and the 7 CFR 273.10 whole-dollar benefit
    computation) with Arizona's encoded FAA5 utility-allowance eligibility
    rules and the FAA6.J.09 utility allowance amounts, and exposes the issued
    monthly benefit (snap_benefit) on the 273.10 chain. Arizona's own
    manual-literal benefit-amount rule remains exposed as
    na_regular_month_allotment, fed by the same net income; the budgetary-unit
    eligibility determination remains an input bridge until the full Arizona
    NA eligibility chain is wired.
imports:
  - us:policies/usda/snap/state-plan-composition
  - us-az:policies/des/faa5/na-utility-expenses-and-allowances/utility-allowance-eligibility
  - us-az:policies/des/faa6/utility-allowance-current-amount
  - us-az:policies/des/faa5/na-eligibility-and-benefit-determination/benefit-amount
rules:
  - name: az_applied_utility_allowance
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: Arizona Nutrition Assistance FY 2026 benefit calculation composition
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if snap_standard_utility_allowance:
              az_standard_utility_allowance_amount
          else:
              if snap_limited_utility_allowance:
                  az_limited_utility_allowance_amount
              else:
                  if snap_telephone_utility_allowance_eligible:
                      az_telephone_utility_allowance_amount
                  else:
                      0

  - name: shelter_costs
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: Arizona Nutrition Assistance FY 2026 benefit calculation composition
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_shelter_costs_incurred + az_applied_utility_allowance

  - name: na_net_income
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: Arizona Nutrition Assistance FY 2026 benefit calculation composition
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          snap_net_monthly_income

  - name: snap_total_allowable_shelter_expenses
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: Arizona Nutrition Assistance FY 2026 benefit calculation composition
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          shelter_costs

  - name: snap_excess_shelter_deduction
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: Arizona Nutrition Assistance FY 2026 benefit calculation composition
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          max(0, snap_excess_shelter_deduction_for_net_income)

  - name: snap_eligible
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Arizona Nutrition Assistance FY 2026 benefit calculation composition
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          na_budgetary_unit_is_eligible

  - name: na_regular_month_allotment
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: FAA5 NA Eligibility and Benefit Determination, block 9
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          benefit_amount_after_allotment_test
