format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-az/manual/des/faa5/disqualified-na-participant-s-effect-on-the-na/block-2
  summary: |-
    "Disqualified participants are not included when determining the budgetary unit size or when assigning a benefit level." They are included for the correct utility allowance. Depending on the disqualification reason, income and expenses are counted in full or prorated to remaining eligible participants; utility expenses are not prorated.
rules:
  - name: disqualified_participant_excluded_from_budgetary_unit_size_and_benefit_level
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: DES FAA5, Disqualified NA Participant's Effect on the NA, block 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-az/manual/des/faa5/disqualified-na-participant-s-effect-on-the-na/block-2
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          participant_is_disqualified

  - name: disqualified_participant_included_for_utility_allowance
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: DES FAA5, Disqualified NA Participant's Effect on the NA, block 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-az/manual/des/faa5/disqualified-na-participant-s-effect-on-the-na/block-2
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          participant_is_disqualified

  - name: disqualified_participant_income_and_expenses_counted_in_full
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: DES FAA5, Disqualified NA Participant's Effect on the NA, block 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-az/manual/des/faa5/disqualified-na-participant-s-effect-on-the-na/block-2
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          participant_disqualified_for_na_work_requirement
          or participant_disqualified_for_intentional_program_violation
          or participant_disqualified_as_fleeing_felon
          or participant_disqualified_for_felony_drug_conviction
          or participant_disqualified_for_trading_na_benefits_for_controlled_substances
          or participant_disqualified_for_trading_controlled_substances_for_na_benefits
          or participant_disqualified_for_trafficking_na_benefits
          or participant_disqualified_for_fraudulent_identity_or_residence_statements_to_receive_multiple_na_benefits
          or participant_disqualified_for_refusing_job_offer_voluntarily_quitting_or_reducing_work_hours
          or participant_is_nonqualified_noncitizen_diplomat
          or participant_is_nonqualified_noncitizen_student
          or participant_is_nonqualified_noncitizen_tourist
          or participant_is_undocumented_noncitizen
          or participant_is_nonqualified_noncitizen_visitor

  - name: disqualified_participant_income_and_some_expenses_prorated
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: DES FAA5, Disqualified NA Participant's Effect on the NA, block 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-az/manual/des/faa5/disqualified-na-participant-s-effect-on-the-na/block-2
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          participant_disqualified_for_noncompliance_with_ssn_requirements
          or participant_is_nonqualified_noncitizen_lpr_subject_to_and_not_meeting_five_year_residency_requirement
          or participant_is_nonqualified_noncitizen_parolee_disqualified_for_na
          or participant_is_nonqualified_noncitizen_special_agricultural_worker_admitted_for_temporary_residence

  - name: expense_subject_to_proration
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: DES FAA5, Disqualified NA Participant's Effect on the NA, block 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-az/manual/des/faa5/disqualified-na-participant-s-effect-on-the-na/block-2
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (expense_is_shelter or expense_is_dependent_care or expense_is_child_support)
          and not expense_is_utility
