format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-az/manual/des/faa5/two-parent-employment-program-tpep-jobs/block-1
  summary: |-
    "It serves two-parent budgetary units in which the primary wage earning parent (PWE) is unemployed or underemployed." "TPEP services are time limited and are available state wide." "Once the TPEP participants comply, the Jobs case manager releases the benefits."
rules:
  - name: tpep_service_unit
    kind: derived
    entity: TanfUnit
    dtype: Judgment
    period: Month
    source: DES FAA5 Two Parent Employment Program (TPEP) Jobs, block 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/manual/des/faa5/two-parent-employment-program-tpep-jobs/block-1
              excerpt: "serves two-parent budgetary units in which the primary wage earning parent (PWE) is unemployed or underemployed"
    versions:
      - effective_from: '2023-01-01'
        formula: |-
          budgetary_unit_has_two_parents
          and primary_wage_earning_parent_is_unemployed_or_underemployed
  - name: tpep_services_available
    kind: derived
    entity: TanfUnit
    dtype: Judgment
    period: Month
    source: DES FAA5 Two Parent Employment Program (TPEP) Jobs, block 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: import
            import:
              target: us-az:policies/des/faa5/two-parent-employment-program-tpep-jobs#tpep_service_unit
              output: tpep_service_unit
              hash: sha256:local
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-az/manual/des/faa5/two-parent-employment-program-tpep-jobs/block-1
              excerpt: "TPEP services are time limited and are available state wide"
    versions:
      - effective_from: '2023-01-01'
        formula: |-
          tpep_service_unit
  - name: tpep_benefits_released_after_compliance
    kind: derived
    entity: TanfUnit
    dtype: Judgment
    period: Month
    source: DES FAA5 Two Parent Employment Program (TPEP) Jobs, block 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: import
            import:
              target: us-az:policies/des/faa5/two-parent-employment-program-tpep-jobs#tpep_service_unit
              output: tpep_service_unit
              hash: sha256:local
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/manual/des/faa5/two-parent-employment-program-tpep-jobs/block-1
              excerpt: "Once the TPEP participants comply, the Jobs case manager releases the benefits"
    versions:
      - effective_from: '2023-01-01'
        formula: |-
          tpep_service_unit
          and tpep_participants_comply
