format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-az/manual/des/faa5/ca-jobs-program-preliminary-orientation-jppo/block-1
  summary: |-
    All new CA participants who are CA Jobs mandatory referrals are required to complete the Jobs Program Preliminary Orientation (JPPO) before CA approval. The JPPO requirement does not apply to TPEP, HFAP, SRPMIC LEARN, Grant Diversion participants, or participants that meet a CA Jobs Exemption.
imports:
  - us-az:policies/des/faa5/ca-jobs-mandatory-referrals#ca_jobs_referral_required
rules:
  - name: jppo_requirement_exception_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: JPPO requirement exceptions
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-az/manual/des/faa5/ca-jobs-program-preliminary-orientation-jppo/block-1
    versions:
      - effective_from: '2023-01-01'
        formula: |-
          participant_is_in_two_parent_employment_program
          or participant_is_in_hopi_family_assistance_program
          or participant_is_in_srpmic_learn
          or participant_is_grant_diversion_participant
          or participant_meets_ca_jobs_exemption

  - name: jppo_completion_required_before_ca_approval
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: JPPO preapproval requirement
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/manual/des/faa5/ca-jobs-program-preliminary-orientation-jppo/block-1
          - path: versions[0].formula
            kind: import
            import:
              target: us-az:policies/des/faa5/ca-jobs-mandatory-referrals#ca_jobs_referral_required
              output: ca_jobs_referral_required
              hash: sha256:2656911e7cad5b1784c96315dc3846c0b5770d8378534b194376e9b253bc7fdc
          - path: versions[0].formula
            kind: import
            import:
              target: us-az:policies/des/faa5/ca-jobs-program-preliminary-orientation-jppo#jppo_requirement_exception_applies
              output: jppo_requirement_exception_applies
              hash: sha256:local
    versions:
      - effective_from: '2023-01-01'
        formula: |-
          participant_is_new_ca_participant
          and ca_jobs_referral_required
          and not jppo_requirement_exception_applies

  - name: jppo_compliance_completed_with_faa_worker
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: JPPO compliance methods
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/manual/des/faa5/ca-jobs-program-preliminary-orientation-jppo/block-1
    versions:
      - effective_from: '2023-01-01'
        formula: |-
          participant_completes_jppo_with_faa_worker
          and (
            participant_completes_jppo_video
            or participant_completes_jppo_audio
            or jppo_script_read_to_participant_in_english_or_spoken_language
          )
