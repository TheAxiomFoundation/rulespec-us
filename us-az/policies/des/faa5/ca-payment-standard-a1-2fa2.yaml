format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-az/manual/des/faa5/ca-payment-standard-a1-2fa2
  summary: |-
    A1 and A2 are the two payment standards for CA which determine the CA payment level. The annual A1 payment standard is 36% of the 1992 Federal Poverty Level (FPL). The annual A2 Payment Standard is 23% of the 1992 Federal Poverty Level (FPL). The A2 standard is used when the budgetary unit is not eligible for the A1 Payment Standard.
rules:
  - name: a1_annual_payment_standard_percentage_of_base_year_fpl
    kind: parameter
    dtype: Rate
    source: FAA5 CA Payment Standard (A1/A2), A1 CA Payment Standard
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-az/manual/des/faa5/ca-payment-standard-a1-2fa2
              excerpt: "annual A1 payment standard is 36% of the 1992 Federal Poverty Level"
    versions:
      - effective_from: '2025-09-02'
        formula: |-
          0.36

  - name: a2_annual_payment_standard_percentage_of_base_year_fpl
    kind: parameter
    dtype: Rate
    source: FAA5 CA Payment Standard (A1/A2), A2 CA Payment Standard
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-az/manual/des/faa5/ca-payment-standard-a1-2fa2
              excerpt: "annual A2 Payment Standard is 23% of the 1992 Federal Poverty Level"
    versions:
      - effective_from: '2025-09-02'
        formula: |-
          0.23

  - name: a1_payment_standard_applies
    kind: derived
    entity: TanfUnit
    dtype: Judgment
    period: Year
    source: FAA5 CA Payment Standard (A1/A2), A1 CA Payment Standard
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/manual/des/faa5/ca-payment-standard-a1-2fa2
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-az/manual/des/faa5/ca-payment-standard-a1-2fa2
              excerpt: "obligation to pay shelter costs but fails to provide verification"
    versions:
      - effective_from: '2025-09-02'
        formula: |-
          (
            budgetary_unit_has_obligation_to_pay_shelter_cost
            or participant_is_on_lease_and_resides_in_government_subsidized_housing_unit
            or participant_works_in_exchange_for_rent
            or shelter_costs_paid_by_third_party_for_fewer_than_three_months
            or participant_in_military_receives_basic_allowance_for_housing
            or participant_with_shelter_cost_obligation_is_in_foreclosure_and_mortgage_company_accepts_back_payments
            or kinship_care_case
            or kinship_foster_care_case
            or legal_permanent_guardian_case
          )
          and not budgetary_unit_has_shelter_cost_obligation_but_fails_to_provide_verification

  - name: a2_payment_standard_applies
    kind: derived
    entity: TanfUnit
    dtype: Judgment
    period: Year
    source: FAA5 CA Payment Standard (A1/A2), A2 CA Payment Standard
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/manual/des/faa5/ca-payment-standard-a1-2fa2
              excerpt: "not eligible for the A1 Payment Standard"
          - path: versions[0].formula
            kind: import
            import:
              target: us-az:policies/des/faa5/ca-payment-standard-a1-2fa2#a1_payment_standard_applies
              output: a1_payment_standard_applies
              hash: sha256:local
    versions:
      - effective_from: '2025-09-02'
        formula: |-
          not a1_payment_standard_applies

  - name: ca_payment_standard_percentage_of_base_year_fpl
    kind: derived
    entity: TanfUnit
    dtype: Rate
    period: Year
    source: FAA5 CA Payment Standard (A1/A2), Policy
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-az/manual/des/faa5/ca-payment-standard-a1-2fa2
          - path: versions[0].formula
            kind: import
            import:
              target: us-az:policies/des/faa5/ca-payment-standard-a1-2fa2#a1_payment_standard_applies
              output: a1_payment_standard_applies
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-az:policies/des/faa5/ca-payment-standard-a1-2fa2#a1_annual_payment_standard_percentage_of_base_year_fpl
              output: a1_annual_payment_standard_percentage_of_base_year_fpl
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-az:policies/des/faa5/ca-payment-standard-a1-2fa2#a2_annual_payment_standard_percentage_of_base_year_fpl
              output: a2_annual_payment_standard_percentage_of_base_year_fpl
              hash: sha256:local
    versions:
      - effective_from: '2025-09-02'
        formula: |-
          if a1_payment_standard_applies: a1_annual_payment_standard_percentage_of_base_year_fpl else: a2_annual_payment_standard_percentage_of_base_year_fpl

  - name: ca_annual_payment_standard
    kind: derived
    entity: TanfUnit
    dtype: Money
    period: Year
    unit: USD
    source: FAA5 CA Payment Standard (A1/A2), Policy
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-az/manual/des/faa5/ca-payment-standard-a1-2fa2
              excerpt: "used to determine the maximum CA benefit amount"
          - path: versions[0].formula
            kind: import
            import:
              target: us-az:policies/des/faa5/ca-payment-standard-a1-2fa2#ca_payment_standard_percentage_of_base_year_fpl
              output: ca_payment_standard_percentage_of_base_year_fpl
              hash: sha256:local
    versions:
      - effective_from: '2025-09-02'
        formula: |-
          federal_poverty_level_for_payment_standard_base_year * ca_payment_standard_percentage_of_base_year_fpl
