format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-az/manual/des/faa5/ca-jobs-exempt-age-18-not-referred/block-1
  summary: |-
    "A child that is age 18 and does not meet CA Student criteria is exempt from Jobs Program participation until the month after they turn age 18."
    "EXCEPTION A minor parent, age 18, who is the head of household or the spouse of the head of household, is not exempt."
rules:
  - name: minor_parent_age_18_head_or_spouse_exception_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: DES FAA5 CA Jobs Exemptions, Age 18 - Not Referred, Revision 14
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-az/manual/des/faa5/ca-jobs-exempt-age-18-not-referred/block-1
              excerpt: "A minor parent, age 18, who is the head of household or the spouse of the head of household, is not exempt."
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-az/manual/des/faa5/ca-jobs-exempt-age-18-not-referred/block-1
              excerpt: "10/01/10 –12/31/10"
    versions:
      - effective_from: '2010-10-01'
        formula: |-
          minor_parent
          and person_is_age_18
          and (
            head_of_household
            or spouse_of_head_of_household
          )

  - name: age_18_non_student_month_of_turning_18_exemption_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: DES FAA5 CA Jobs Exemptions, Age 18 - Not Referred, Revision 14
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/manual/des/faa5/ca-jobs-exempt-age-18-not-referred/block-1
              excerpt: "A child that is age 18 and does not meet CA Student criteria is exempt from Jobs Program participation until the month after they turn age 18."
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-az/manual/des/faa5/ca-jobs-exempt-age-18-not-referred/block-1
              excerpt: "A minor parent, age 18, who is the head of household or the spouse of the head of household, is not exempt."
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-az/manual/des/faa5/ca-jobs-exempt-age-18-not-referred/block-1
              excerpt: "10/01/10 –12/31/10"
    versions:
      - effective_from: '2010-10-01'
        formula: |-
          child
          and person_is_age_18
          and not meets_ca_student_criteria
          and person_is_in_month_child_turns_age_18
          and not minor_parent_age_18_head_or_spouse_exception_applies
