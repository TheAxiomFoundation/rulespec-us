format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-az/manual/des/faa5/ca-jobs-exempt-age/block-1
  summary: |-
    All dependent children under the age of 18 are exempt from Jobs Program participation.
    Dependent children that are age 18, and meet CA Student criteria are also exempt from Jobs Program participation.
    EXCEPTION A minor parent who is the head of household or the spouse(g) of the head of household is not exempt.
rules:
  - name: minor_parent_head_or_spouse_exception_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: DES FAA5 CA Jobs Exempt Age, Revision 07
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-az/manual/des/faa5/ca-jobs-exempt-age/block-1
              excerpt: "A minor parent who is the head of household or the spouse(g) of the head of household is not exempt."
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-az/manual/des/faa5/ca-jobs-exempt-age/block-1
              excerpt: "01/01/09 – 03/31/09"
    versions:
      - effective_from: '2009-01-01'
        formula: |-
          minor_parent
          and (
            head_of_household
            or spouse_of_head_of_household
          )

  - name: jobs_program_participation_age_exemption_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: DES FAA5 CA Jobs Exempt Age, Revision 07
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/manual/des/faa5/ca-jobs-exempt-age/block-1
              excerpt: "All dependent children under the age of 18 are exempt from Jobs Program participation."
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/manual/des/faa5/ca-jobs-exempt-age/block-1
              excerpt: "Dependent children that are age 18, and meet CA Student criteria are also exempt"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-az/manual/des/faa5/ca-jobs-exempt-age/block-1
              excerpt: "A minor parent who is the head of household or the spouse(g) of the head of household is not exempt."
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-az/manual/des/faa5/ca-jobs-exempt-age/block-1
              excerpt: "01/01/09 – 03/31/09"
    versions:
      - effective_from: '2009-01-01'
        formula: |-
          dependent_child
          and (
            person_is_under_age_18
            or (
              person_is_age_18
              and meets_ca_student_criteria
            )
          )
          and not minor_parent_head_or_spouse_exception_applies
