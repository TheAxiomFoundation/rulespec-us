format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-az/manual/des/faa5/transitional-child-care-tcc
  summary: |-
    "A CA budgetary unit may be eligible to receive up to 24 consecutive months of TCC when the budgetary unit becomes ineligible for CA." "The CA budgetary unit must meet all of the following requirements to be eligible for TCC." "TCC coverage begins from the date of the TCC application. There is no retroactive reimbursement for TCC."
rules:
  - name: tcc_maximum_consecutive_months
    kind: parameter
    dtype: Count
    source: DES FAA5 Transitional Child Care (TCC), TCC Time Limits
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-az/manual/des/faa5/transitional-child-care-tcc
              excerpt: "up to 24 consecutive months of TCC"
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-az/manual/des/faa5/transitional-child-care-tcc
              excerpt: "effective 09/02/2025"
    versions:
      - effective_from: '2025-09-02'
        formula: |-
          24

  - name: tcc_prior_ca_receipt_lookback_months
    kind: parameter
    dtype: Count
    source: DES FAA5 Transitional Child Care (TCC), TCC Requirements
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-az/manual/des/faa5/transitional-child-care-tcc
              excerpt: "within the six months before becoming CA ineligible"
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-az/manual/des/faa5/transitional-child-care-tcc
              excerpt: "effective 09/02/2025"
    versions:
      - effective_from: '2025-09-02'
        formula: |-
          6

  - name: tcc_case_closure_request_window_months
    kind: parameter
    dtype: Count
    source: DES FAA5 Transitional Child Care (TCC), TCC Requirements
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-az/manual/des/faa5/transitional-child-care-tcc
              excerpt: "any time within six months of case closure"
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-az/manual/des/faa5/transitional-child-care-tcc
              excerpt: "effective 09/02/2025"
    versions:
      - effective_from: '2025-09-02'
        formula: |-
          6

  - name: tcc_closure_reason_qualifies
    kind: derived
    entity: TanfUnit
    dtype: Judgment
    period: Month
    source: DES FAA5 Transitional Child Care (TCC), Policy
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/manual/des/faa5/transitional-child-care-tcc
              excerpt: "budgetary units who become ineligible"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-az/manual/des/faa5/transitional-child-care-tcc
              excerpt: "other than ... Intentional Program Violation (IPV) conviction ... DCSS ... Jobs Program"
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-az/manual/des/faa5/transitional-child-care-tcc
              excerpt: "effective 09/02/2025"
    versions:
      - effective_from: '2025-09-02'
        formula: |-
          budgetary_unit_becomes_ineligible_for_ca
          and not ca_ineligibility_due_to_ipv_conviction
          and not ca_ineligibility_due_to_dcss_noncompliance
          and not ca_ineligibility_due_to_jobs_program_noncompliance

  - name: tcc_requirements_met
    kind: derived
    entity: TanfUnit
    dtype: Judgment
    period: Month
    source: DES FAA5 Transitional Child Care (TCC), TCC Requirements and TCC Eligibility
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: import
            import:
              target: us-az:policies/des/faa5/transitional-child-care-tcc#tcc_closure_reason_qualifies
              output: tcc_closure_reason_qualifies
              hash: sha256:local
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/manual/des/faa5/transitional-child-care-tcc
              excerpt: "Received CA in Arizona at least one month within the six months"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/manual/des/faa5/transitional-child-care-tcc
              excerpt: "Request and apply ... Provide information necessary"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/manual/des/faa5/transitional-child-care-tcc
              excerpt: "caretaker relative was receiving CA at the time of CA closure"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/manual/des/faa5/transitional-child-care-tcc
              excerpt: "request TCC services any time within six months of case closure"
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-az/manual/des/faa5/transitional-child-care-tcc
              excerpt: "effective 09/02/2025"
    versions:
      - effective_from: '2025-09-02'
        formula: |-
          tcc_closure_reason_qualifies
          and caretaker_relative_was_receiving_ca_at_time_of_ca_closure
          and budgetary_unit_received_arizona_ca_at_least_one_month_within_prior_six_months
          and budgetary_unit_requested_and_applied_for_childcare_services_with_ccsd
          and budgetary_unit_provided_information_necessary_for_ccsd_to_determine_tcc_eligibility
          and (
            not ca_case_closed
            or tcc_services_requested_within_six_months_of_ca_case_closure
          )

  - name: tcc_coverage_month_authorizable
    kind: derived
    entity: TanfUnit
    dtype: Judgment
    period: Month
    source: DES FAA5 Transitional Child Care (TCC), TCC Time Limits and CCSD Responsibilities
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: import
            import:
              target: us-az:policies/des/faa5/transitional-child-care-tcc#tcc_requirements_met
              output: tcc_requirements_met
              hash: sha256:local
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/manual/des/faa5/transitional-child-care-tcc
              excerpt: "24 months begins with the month following the month the CA case is closed"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/manual/des/faa5/transitional-child-care-tcc
              excerpt: "coverage begins from the date of the TCC application"
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-az/manual/des/faa5/transitional-child-care-tcc
              excerpt: "effective 09/02/2025"
    versions:
      - effective_from: '2025-09-02'
        formula: |-
          tcc_requirements_met
          and current_month_is_on_or_after_tcc_application_date
          and current_month_is_within_tcc_consecutive_month_limit_beginning_month_after_ca_case_closure

  - name: tcc_new_24_month_period_established
    kind: derived
    entity: TanfUnit
    dtype: Judgment
    period: Month
    source: DES FAA5 Transitional Child Care (TCC), TCC Time Limits
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/manual/des/faa5/transitional-child-care-tcc
              excerpt: "participant reapplies and is found eligible for CA"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/manual/des/faa5/transitional-child-care-tcc
              excerpt: "CA is subsequently stopped for reasons other than IPV ... DCSS ... Jobs Program"
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-az/manual/des/faa5/transitional-child-care-tcc
              excerpt: "effective 09/02/2025"
    versions:
      - effective_from: '2025-09-02'
        formula: |-
          participant_reapplied_and_was_found_eligible_for_ca
          and participant_ca_was_subsequently_stopped_for_reason_other_than_ipv_dcss_or_jobs_noncompliance

  - name: tcc_remaining_balance_eligibility
    kind: derived
    entity: TanfUnit
    dtype: Judgment
    period: Month
    source: DES FAA5 Transitional Child Care (TCC), TCC Time Limits and CCSD Responsibilities
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/manual/des/faa5/transitional-child-care-tcc
              excerpt: "becomes ineligible for TCC during the 24 month period"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/manual/des/faa5/transitional-child-care-tcc
              excerpt: "eligible for any remaining balance when all eligibility conditions are met"
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-az/manual/des/faa5/transitional-child-care-tcc
              excerpt: "effective 09/02/2025"
    versions:
      - effective_from: '2025-09-02'
        formula: |-
          budgetary_unit_became_ineligible_for_tcc_during_24_month_period
          and tcc_remaining_months_balance_available
          and all_current_tcc_eligibility_conditions_are_met

  - name: tcc_budgetary_unit_tcc_eligible
    kind: derived
    entity: TanfUnit
    dtype: Judgment
    period: Month
    source: DES FAA5 Transitional Child Care (TCC), Policy and TCC Time Limits
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: import
            import:
              target: us-az:policies/des/faa5/transitional-child-care-tcc#tcc_coverage_month_authorizable
              output: tcc_coverage_month_authorizable
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-az:policies/des/faa5/transitional-child-care-tcc#tcc_remaining_balance_eligibility
              output: tcc_remaining_balance_eligibility
              hash: sha256:local
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/manual/des/faa5/transitional-child-care-tcc
              excerpt: "may be eligible to receive up to 24 consecutive months of TCC"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/manual/des/faa5/transitional-child-care-tcc
              excerpt: "may be eligible for any remaining balance"
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-az/manual/des/faa5/transitional-child-care-tcc
              excerpt: "effective 09/02/2025"
    versions:
      - effective_from: '2025-09-02'
        formula: |-
          tcc_coverage_month_authorizable
          or tcc_remaining_balance_eligibility

  - name: tcc_participant_potentially_eligible
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: DES FAA5 Transitional Child Care (TCC), TCC Eligibility
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/manual/des/faa5/transitional-child-care-tcc
              excerpt: "Participants who were CA eligible prior to CA case closure"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/manual/des/faa5/transitional-child-care-tcc
              excerpt: "Children under the age of 13 who were not receiving CA due to ... SSI, Foster Care ... FBCP"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/manual/des/faa5/transitional-child-care-tcc
              excerpt: "Participants who have received a Grant Diversion payment"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/manual/des/faa5/transitional-child-care-tcc
              excerpt: "born, adopted, or moved into the budgetary unit after CA closure"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/manual/des/faa5/transitional-child-care-tcc
              excerpt: "did not receive CA due to failure to provide a Social Security number"
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-az/manual/des/faa5/transitional-child-care-tcc
              excerpt: "effective 09/02/2025"
    versions:
      - effective_from: '2025-09-02'
        formula: |-
          participant_was_ca_eligible_prior_to_ca_case_closure
          or (
            participant_is_child_under_age_13
            and (
              participant_was_not_receiving_ca_due_to_ssi
              or participant_was_not_receiving_ca_due_to_foster_care
              or participant_was_not_receiving_ca_due_to_family_benefit_cap_period
            )
          )
          or participant_received_grant_diversion_payment
          or (
            dependent_child_was_born_adopted_or_moved_into_budgetary_unit_after_ca_closure
            and participant_is_child_under_age_13
            and participant_would_have_been_mandatory_ca_participant_at_closure_if_in_home_before_ca_closed
          )
          or participant_did_not_receive_ca_due_to_failure_to_provide_ssn
