- name: needy_family_with_income_below_payment_standard_is_prospectively_eligible
  period:
    period_kind: custom
    name: calendar_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    us-az:policies/des/faa5/ca-benefit-determination/payment-standard-test#input.gross_countable_income: 2000
    us-az:policies/des/faa5/ca-benefit-determination/payment-standard-test#input.ca_earned_income_deductions: 500
    us-az:policies/des/faa5/ca-benefit-determination/payment-standard-test#input.needy_family_criteria_met: true
    us-az:policies/des/faa5/ca-payment-standard-a1-2fa2#input.budgetary_unit_has_obligation_to_pay_shelter_cost: true
    ? us-az:policies/des/faa5/ca-payment-standard-a1-2fa2#input.participant_is_on_lease_and_resides_in_government_subsidized_housing_unit
    : false
    us-az:policies/des/faa5/ca-payment-standard-a1-2fa2#input.participant_works_in_exchange_for_rent: false
    us-az:policies/des/faa5/ca-payment-standard-a1-2fa2#input.shelter_costs_paid_by_third_party_for_fewer_than_three_months: false
    us-az:policies/des/faa5/ca-payment-standard-a1-2fa2#input.participant_in_military_receives_basic_allowance_for_housing: false
    ? us-az:policies/des/faa5/ca-payment-standard-a1-2fa2#input.participant_with_shelter_cost_obligation_is_in_foreclosure_and_mortgage_company_accepts_back_payments
    : false
    us-az:policies/des/faa5/ca-payment-standard-a1-2fa2#input.kinship_care_case: false
    us-az:policies/des/faa5/ca-payment-standard-a1-2fa2#input.kinship_foster_care_case: false
    us-az:policies/des/faa5/ca-payment-standard-a1-2fa2#input.legal_permanent_guardian_case: false
    ? us-az:policies/des/faa5/ca-payment-standard-a1-2fa2#input.budgetary_unit_has_shelter_cost_obligation_but_fails_to_provide_verification
    : false
    us-az:policies/des/faa5/ca-payment-standard-a1-2fa2#input.federal_poverty_level_for_payment_standard_base_year: 10000
  output:
    us-az:policies/des/faa5/ca-benefit-determination/payment-standard-test#minimum_positive_net_unrounded_payment: 0.01
    us-az:policies/des/faa5/ca-benefit-determination/payment-standard-test#ca_payment_standard_net_income: 1500
    us-az:policies/des/faa5/ca-benefit-determination/payment-standard-test#ca_payment_standard_net_unrounded_payment: 2100
    us-az:policies/des/faa5/ca-benefit-determination/payment-standard-test#ca_payment_standard_test_met: holds
    us-az:policies/des/faa5/ca-benefit-determination/payment-standard-test#ca_prospective_eligibility_requirements_met: holds
