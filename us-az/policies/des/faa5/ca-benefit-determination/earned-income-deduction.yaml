format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-az/manual/des/faa5/ca-benefit-determination/block-8
  summary: |-
    The earned income deduction is equal to 30% of each CA employed participant's countable earned income.
rules:
  - name: ca_earned_income_deduction_rate
    kind: parameter
    dtype: Rate
    source: FAA5 CA Benefit Determination, Earned Income Deduction
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-az/manual/des/faa5/ca-benefit-determination/block-8
              excerpt: "30% of each CA employed participant's countable earned income"
    versions:
      - effective_from: '2025-09-02'
        formula: |-
          0.30

  - name: ca_earned_income_deduction_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FAA5 CA Benefit Determination, Earned Income Deduction
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/manual/des/faa5/ca-benefit-determination/block-8
              excerpt: "each CA employed participant"
    versions:
      - effective_from: '2025-09-02'
        formula: |-
          participant_is_ca_participant
          and participant_is_employed

  - name: ca_earned_income_deduction
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: USD
    source: FAA5 CA Benefit Determination, Earned Income Deduction
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-az/manual/des/faa5/ca-benefit-determination/block-8
              excerpt: "equal to 30% of each CA employed participant's countable earned income"
          - path: versions[0].formula
            kind: import
            import:
              target: us-az:policies/des/faa5/ca-benefit-determination/earned-income-deduction#ca_earned_income_deduction_rate
              output: ca_earned_income_deduction_rate
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-az:policies/des/faa5/ca-benefit-determination/earned-income-deduction#ca_earned_income_deduction_applies
              output: ca_earned_income_deduction_applies
              hash: sha256:local
    versions:
      - effective_from: '2025-09-02'
        formula: |-
          if ca_earned_income_deduction_applies: ca_earned_income_deduction_rate * max(0, countable_earned_income) else: 0
