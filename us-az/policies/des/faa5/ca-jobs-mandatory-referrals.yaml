format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-az/manual/des/faa5/ca-jobs-mandatory-referrals
  summary: |-
    "Refer the following CA participants to the Jobs Program (unless Jobs exempt):" Employed, Felony Drug Conviction, Fleeing Felon, Referred Hopi, Referred Mandatory, Referred Pascua Yaqui, Refugee, and Victims or Survivors of Domestic Violence, Sexual Harassment, Sexual Assault, or Stalking.
rules:
  - name: ca_jobs_mandatory_referral_category_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: CA Jobs Mandatory Referrals, mandatory referral categories
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/manual/des/faa5/ca-jobs-mandatory-referrals
              excerpt: "Employed ... Felony Drug Conviction ... Fleeing Felon ... Referred Hopi ... Referred Mandatory ... Referred Pascua Yaqui ... Refugee ... Victims or Survivors"
    versions:
      - effective_from: '2023-01-01'
        formula: |-
          ca_participant_is_employed
          or ca_participant_has_felony_drug_conviction
          or ca_participant_is_fleeing_felon
          or ca_participant_is_referred_hopi
          or ca_participant_is_referred_mandatory
          or ca_participant_is_referred_pascua_yaqui
          or ca_participant_is_refugee
          or ca_participant_is_victim_or_survivor_of_domestic_violence_sexual_harassment_sexual_assault_or_stalking

  - name: ca_jobs_referral_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: CA Jobs Mandatory Referrals, general referral rule
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/manual/des/faa5/ca-jobs-mandatory-referrals
              excerpt: "Refer the following CA participants to the Jobs Program"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-az/manual/des/faa5/ca-jobs-mandatory-referrals
              excerpt: "unless Jobs exempt"
          - path: versions[0].formula
            kind: import
            import:
              target: us-az:policies/des/faa5/ca-jobs-mandatory-referrals#ca_jobs_mandatory_referral_category_applies
              output: ca_jobs_mandatory_referral_category_applies
              hash: sha256:local
    versions:
      - effective_from: '2023-01-01'
        formula: |-
          ca_participant
          and ca_jobs_mandatory_referral_category_applies
          and not ca_participant_is_jobs_exempt
