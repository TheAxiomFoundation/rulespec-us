format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-az/manual/des/faa6/utility-allowance-current-amount/block-1
  summary: |-
    DES FAA6.J Standards, Fees, and Amounts, section 09: the Utility Allowance
    current amounts effective 10/01/2025. The Standard Utility Allowance (SUA)
    is 323 dollars for a budgetary unit with 1 to 3 participants and 438
    dollars for a budgetary unit with 4 or more participants; the Limited
    Utility Allowance (LUA) is 149 dollars for 1 to 3 participants and 201
    dollars for 4 or more; the Telephone Utility Allowance (TUA) is 44
    dollars. The bracket counts NA participants: disqualified participants
    are excluded from budgetary-unit size and benefit level but are
    included for the correct utility allowance (FAA5, Disqualified NA
    Participant's Effect on the NA), so the bracket input is the
    participant count, not the benefit household size.
rules:
