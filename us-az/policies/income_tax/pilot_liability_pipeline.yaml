format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-az/form/individual-income-tax/2026/140es-booklet/document-1
    upstream_source_check:
      status: official_parameter_source
      checked_paths:
        - us-az/statute/43-1011
      rationale: |-
        A.R.S. 43-1011 was checked as the higher-authority individual-income-
        tax provision. This narrow component accepts completed-return Arizona
        taxable income as an explicit upstream boundary and imports the live
        2026 rate from the official Department of Revenue Form 140ES booklet,
        whose worksheet applies that rate directly to Arizona taxable income.
  summary: |-
    Composed Arizona individual-income-tax component for tax year 2026 before
    nonrefundable credits. It accepts one TaxUnit-level nonnegative completed-
    return Arizona taxable-income boundary, normalizes that already-nonnegative
    value defensively at zero, and applies the 2.5-per-cent rate imported from
    the official 2026 Form 140ES rate module. The normalization is an identity
    over the declared caller boundary rather than a separate legal parameter. It
    deliberately excludes nonrefundable credits and makes no independent claim
    about the upstream adjusted-gross-income, additions, subtractions, or
    deduction chain. This narrow boundary matches PolicyEngine's
    az_taxable_income feeding az_income_tax_before_non_refundable_credits for
    full-year resident tax units. Both calculations are bounded to 2026 so
    adjacent years fail closed.
imports:
  - us-az:policies/income_tax/2026_rate#individual_income_tax_rate
rules:
  - name: az_pit_pilot_taxable_income
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Supplied nonnegative completed-return Arizona taxable income
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-az/form/individual-income-tax/2026/140es-booklet/document-1
              excerpt: "Step 1 Estimated Arizona Taxable Income"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          max(0, az_pit_pilot_state_taxable_income)
  - name: az_pit_pilot_income_tax_liability
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Arizona Form 140ES worksheet line 19, 2.5 per cent of Arizona taxable income before nonrefundable credits
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: import
            import:
              target: us-az:policies/income_tax/2026_rate#individual_income_tax_rate
              output: individual_income_tax_rate
              hash: sha256:3afa12de4a8f63636b4bcdaa8be39ab85124efc9af6b0bea2cb0db6512bd1875
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-az/form/individual-income-tax/2026/140es-booklet/document-1
              excerpt: "Multiply line 18 by 2.5% (.025) to calculate your Arizona estimated tax liability."
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          az_pit_pilot_taxable_income * individual_income_tax_rate
inputs:
  - name: az_pit_pilot_state_taxable_income
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    description: Nonnegative completed-return Arizona taxable income supplied by the caller as the sole upstream oracle boundary.
