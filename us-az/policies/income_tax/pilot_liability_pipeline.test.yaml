# Hand-computed tax-year-2026 fixtures for the nonnegative completed-return
# Arizona taxable-income boundary. Form 140ES line 19 applies 2.5 per cent
# before credits.
- name: zero taxable income produces zero tax
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    us-az:policies/income_tax/pilot_liability_pipeline#input.az_pit_pilot_state_taxable_income: 0
  output:
    us-az:policies/income_tax/pilot_liability_pipeline#az_pit_pilot_taxable_income: 0
    us-az:policies/income_tax/pilot_liability_pipeline#az_pit_pilot_income_tax_liability: 0
- name: one hundred dollars taxable income
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    us-az:policies/income_tax/pilot_liability_pipeline#input.az_pit_pilot_state_taxable_income: 100
  output:
    us-az:policies/income_tax/pilot_liability_pipeline#az_pit_pilot_taxable_income: 100
    us-az:policies/income_tax/pilot_liability_pipeline#az_pit_pilot_income_tax_liability: '2.5'
- name: representative thirty thousand dollar taxable income
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    us-az:policies/income_tax/pilot_liability_pipeline#input.az_pit_pilot_state_taxable_income: 30000
  output:
    us-az:policies/income_tax/pilot_liability_pipeline#az_pit_pilot_taxable_income: 30000
    us-az:policies/income_tax/pilot_liability_pipeline#az_pit_pilot_income_tax_liability: 750
- name: representative sixty thousand dollar taxable income
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    us-az:policies/income_tax/pilot_liability_pipeline#input.az_pit_pilot_state_taxable_income: 60000
  output:
    us-az:policies/income_tax/pilot_liability_pipeline#az_pit_pilot_taxable_income: 60000
    us-az:policies/income_tax/pilot_liability_pipeline#az_pit_pilot_income_tax_liability: 1500
- name: representative one hundred fifty thousand dollar taxable income
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    us-az:policies/income_tax/pilot_liability_pipeline#input.az_pit_pilot_state_taxable_income: 150000
  output:
    us-az:policies/income_tax/pilot_liability_pipeline#az_pit_pilot_taxable_income: 150000
    us-az:policies/income_tax/pilot_liability_pipeline#az_pit_pilot_income_tax_liability: 3750
- name: high taxable income remains linear
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    us-az:policies/income_tax/pilot_liability_pipeline#input.az_pit_pilot_state_taxable_income: 1000000
  output:
    us-az:policies/income_tax/pilot_liability_pipeline#az_pit_pilot_taxable_income: 1000000
    us-az:policies/income_tax/pilot_liability_pipeline#az_pit_pilot_income_tax_liability: 25000
