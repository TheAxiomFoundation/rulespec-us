format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-az/form/individual-income-tax/2026/140es-booklet/document-1
    upstream_source_check:
      status: official_parameter_source
      checked_paths:
        - us-az/statute/43-1011
      rationale: |-
        A.R.S. 43-1011 was checked as the higher-authority individual-income-
        tax provision, but the pinned statute snapshot predates the live flat-
        rate schedule and does not establish the tax-year-2026 numeric rate.
        The Arizona Department of Revenue's official 2026 Form 140ES booklet
        is therefore the controlling current numeric source: its instructions
        state the 2.5-per-cent rate, and worksheet line 19 applies that rate to
        estimated Arizona taxable income.
  summary: |-
    The Arizona Department of Revenue's official 2026 Form 140ES booklet states
    that the tax rate for estimating 2026 Arizona income-tax liability is 2.5
    per cent. Worksheet line 19 operationalizes the same rate by multiplying
    estimated Arizona taxable income by 2.5 per cent. This module encodes only
    that tax-year-2026 rate and expires it at year end rather than extrapolating
    the agency's current-year determination to adjacent years.
  deferred_outputs:
    - output: us-az:policies/income_tax/2026_rate#individual_income_tax_rate
      reason: Later-year rates require a refreshed official tax-year source.
    - output: us-az:policies/income_tax/2026_rate#individual_income_tax
      reason: Complete liability requires the upstream Arizona taxable-income chain and downstream credits outside this rate-only module.
      source_values:
        - us-az:policies/income_tax/2026_rate#individual_income_tax_rate
rules:
  - name: individual_income_tax_rate
    kind: parameter
    dtype: Rate
    period: Year
    source: Arizona Department of Revenue 2026 Form 140ES booklet and worksheet line 19
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-az/form/individual-income-tax/2026/140es-booklet/document-1
              excerpt: "Multiply line 18 by 2.5% (.025) to calculate your Arizona estimated tax liability."
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-az/form/individual-income-tax/2026/140es-booklet/document-1
              excerpt: "For tax year 2026 estimated tax payments, the tax rate for estimating your tax liability is 2.5%."
          - path: versions[0].effective_to
            kind: effective_period
            source:
              corpus_citation_path: us-az/form/individual-income-tax/2026/140es-booklet/document-1
              excerpt: "For tax year 2026 estimated tax payments, the tax rate for estimating your tax liability is 2.5%."
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          0.025
