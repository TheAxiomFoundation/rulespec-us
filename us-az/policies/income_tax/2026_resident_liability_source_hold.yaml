format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_paths:
      - us-az/statute/43-1011
      - us-az/statute/43-1023
      - us-az/statute/43-1041
      - us-az/statute/43-1072
      - us-az/statute/43-1072.01
      - us-az/statute/43-1073
      - us-az/statute/43-1073.01
      - us-az/form/individual-income-tax/2026/140es-booklet/document-1
    upstream_source_check:
      status: checked_higher_authority
      checked_paths:
        - us-az/statute/43-1011
        - us-az/statute/43-1023
        - us-az/statute/43-1041
        - us-az/statute/43-1072
        - us-az/statute/43-1072.01
        - us-az/statute/43-1073
        - us-az/statute/43-1073.01
        - us-az/form/individual-income-tax/2026/140es-booklet/document-1
      rationale: |-
        The pinned official Arizona corpus was checked for the full annual
        resident-return chain. It contains current copies of selected statutes
        governing the tax levy, special exemptions, the inflation-adjusted
        standard-deduction framework, and several credits. It does not contain
        the statutes or annual return instructions needed to reconstruct
        Arizona adjusted gross income from federal adjusted gross income,
        including the complete additions, subtractions, and conformity
        surface.

        Section 43-1041 states base standard-deduction amounts but requires the
        Department to adjust them for inflation. The pinned corpus does not
        supply the tax-year-2026 adjusted amounts or the Department-adjusted
        charitable percentage. The pinned section 43-1011 snapshot supplies an
        older bracket schedule and an indexing rule, not a source-complete
        tax-year-2026 annual rate implementation. The official 2026 Form 140ES
        booklet supplies a 2.5-per-cent rate only for estimating liability and
        is not substituted for final annual-return authority.

        Selected credit statutes are pinned, but the final 2026 Form 140,
        schedules, complete credit inventory, ordering, limitations, and
        carryforward treatment are not. These gaps are represented as typed
        source holds. Existing narrow statute and estimated-tax modules remain
        available independently but are not composed into a false annual
        liability.
  summary: |-
    Tax-year-2026 Arizona full-year-resident individual-income-tax annual-return
    interface with explicit typed source holds. It validates a raw
    full-year-residency assertion, federal/Arizona filing-unit alignment, and
    one mutually exclusive filing status without accepting any caller-completed
    Arizona legal outcome.

    Arizona adjusted gross income, deductions and exemptions, taxable income,
    tax and surtaxes before credits, nonrefundable credits, tax after
    nonrefundable credits, refundable credits, and signed net liability before
    payments all fail closed to zero while the pinned annual sources remain
    incomplete. These zeros are non-applicable sentinels, not claims of zero
    tax. This module makes no annual-liability or oracle-parity claim.

    Withholding, estimated payments, extensions, penalties, interest, filing
    administration, local taxes, nonresident allocation, and part-year
    allocation are outside scope.
  deferred_outputs:
    - output: us-az:policies/income_tax/2026_resident_liability_source_hold#az_pit_2026_arizona_adjusted_gross_income
      reason: |-
        The pinned corpus lacks the complete annual Arizona additions,
        subtractions, conformity rules, and Form 140 instructions needed to
        derive Arizona adjusted gross income from federal adjusted gross income.
      source_values:
        - us-az:policies/income_tax/2026_resident_liability_source_hold#az_pit_2026_income_and_modification_source_hold_applies
    - output: us-az:policies/income_tax/2026_resident_liability_source_hold#az_pit_2026_deductions_and_exemptions
      reason: |-
        The pinned corpus lacks the 2026 inflation-adjusted standard-deduction
        amounts, adjusted charitable percentage, complete itemized-deduction
        implementation, and final annual-return election mechanics.
      source_values:
        - us-az:policies/income_tax/2026_resident_liability_source_hold#az_pit_2026_deduction_and_exemption_source_hold_applies
    - output: us-az:policies/income_tax/2026_resident_liability_source_hold#az_pit_2026_taxable_income
      reason: |-
        Taxable income cannot be completed until Arizona adjusted gross income
        and the annual deduction and exemption chain are source-complete.
      source_values:
        - us-az:policies/income_tax/2026_resident_liability_source_hold#az_pit_2026_complete_liability_source_hold_applies
    - output: us-az:policies/income_tax/2026_resident_liability_source_hold#az_pit_2026_tax_before_credits
      reason: |-
        The pinned section 43-1011 snapshot and estimated-payment booklet do
        not establish a complete final annual tax and surtax computation for
        tax year 2026.
      source_values:
        - us-az:policies/income_tax/2026_resident_liability_source_hold#az_pit_2026_annual_tax_source_hold_applies
    - output: us-az:policies/income_tax/2026_resident_liability_source_hold#az_pit_2026_nonrefundable_credits
      reason: |-
        The complete 2026 nonrefundable-credit inventory, eligibility,
        ordering, limitations, and carryforward treatment are not pinned.
      source_values:
        - us-az:policies/income_tax/2026_resident_liability_source_hold#az_pit_2026_credit_surface_source_hold_applies
    - output: us-az:policies/income_tax/2026_resident_liability_source_hold#az_pit_2026_tax_after_nonrefundable_credits
      reason: |-
        Annual tax before credits and the complete nonrefundable-credit surface
        are both source held.
      source_values:
        - us-az:policies/income_tax/2026_resident_liability_source_hold#az_pit_2026_complete_liability_source_hold_applies
    - output: us-az:policies/income_tax/2026_resident_liability_source_hold#az_pit_2026_refundable_credits
      reason: |-
        The final 2026 Form 140 and complete refundable-credit eligibility,
        ordering, and limitation surface are not pinned.
      source_values:
        - us-az:policies/income_tax/2026_resident_liability_source_hold#az_pit_2026_credit_surface_source_hold_applies
    - output: us-az:policies/income_tax/2026_resident_liability_source_hold#az_pit_2026_net_income_tax_liability_before_payments
      reason: |-
        Signed annual resident liability cannot be completed until every
        upstream annual source hold is cleared.
      source_values:
        - us-az:policies/income_tax/2026_resident_liability_source_hold#az_pit_2026_complete_liability_source_hold_applies

rules:
  - name: az_pit_2026_federal_adjusted_gross_income_boundary
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Federal adjusted gross income supplied from the aligned federal return
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-az/statute/43-1072.01
              excerpt: "federal adjusted gross income is"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          az_pit_2026_federal_adjusted_gross_income + 0

  - name: az_pit_2026_filing_status_is_valid
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: A.R.S. sections 43-1011(A) and 43-1041(A), individual filing-status branches
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/statute/43-1011
              excerpt: "a single person or a married person filing separately"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/statute/43-1011
              excerpt: "a married couple filing a joint return or a single person who is a head of a household"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          (
            az_pit_2026_filing_status_single
            and not az_pit_2026_filing_status_married_separate
            and not az_pit_2026_filing_status_joint
            and not az_pit_2026_filing_status_head_of_household
          )
          or (
            not az_pit_2026_filing_status_single
            and az_pit_2026_filing_status_married_separate
            and not az_pit_2026_filing_status_joint
            and not az_pit_2026_filing_status_head_of_household
          )
          or (
            not az_pit_2026_filing_status_single
            and not az_pit_2026_filing_status_married_separate
            and az_pit_2026_filing_status_joint
            and not az_pit_2026_filing_status_head_of_household
          )
          or (
            not az_pit_2026_filing_status_single
            and not az_pit_2026_filing_status_married_separate
            and not az_pit_2026_filing_status_joint
            and az_pit_2026_filing_status_head_of_household
          )

  - name: az_pit_2026_input_domain_is_valid
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: A.R.S. section 43-1011(A), full-year resident annual-return input domain
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/statute/43-1011
              excerpt: "the entire taxable income of every resident of this state"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          az_pit_2026_is_full_year_arizona_resident_return
          and az_pit_2026_federal_and_arizona_filing_units_are_aligned
          and az_pit_2026_filing_status_is_valid

  - name: az_pit_2026_income_and_modification_source_hold_applies
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: Missing complete Arizona adjusted-gross-income construction authority
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/statute/43-1073
              excerpt: "Arizona adjusted gross income, plus the amount subtracted for exemptions under section 43-1023"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: true

  - name: az_pit_2026_deduction_and_exemption_source_hold_applies
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: Missing tax-year-2026 deduction values and complete annual election mechanics
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/statute/43-1041
              excerpt: "the department shall adjust the dollar amounts prescribed by subsection A, paragraphs 1, 2 and 3 of this section for inflation"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/statute/43-1041
              excerpt: "the department shall adjust the percentage prescribed in this subsection"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: true

  - name: az_pit_2026_annual_tax_source_hold_applies
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: Missing source-complete final annual 2026 tax and surtax authority
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/statute/43-1011
              excerpt: "the department shall adjust the income dollar amount for each rate bracket"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/form/individual-income-tax/2026/140es-booklet/document-1
              excerpt: "For tax year 2026 estimated tax payments, the tax rate for estimating your tax liability is 2.5%."
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: true

  - name: az_pit_2026_credit_surface_source_hold_applies
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: Missing complete final 2026 annual credit inventory and ordering
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/statute/43-1073
              excerpt: "may not exceed"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/statute/43-1072
              excerpt: "If the allowable amount of such claim exceeds the income taxes otherwise due"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: true

  - name: az_pit_2026_complete_liability_source_hold_applies
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: Combined source hold for incomplete 2026 annual resident liability
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/statute/43-1011
              excerpt: "There shall be levied, collected and paid for each taxable year"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          az_pit_2026_income_and_modification_source_hold_applies
          or az_pit_2026_deduction_and_exemption_source_hold_applies
          or az_pit_2026_annual_tax_source_hold_applies
          or az_pit_2026_credit_surface_source_hold_applies

  - name: az_pit_2026_arizona_adjusted_gross_income
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Fail-closed Arizona adjusted-gross-income sentinel while source held
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-az/statute/43-1073
              excerpt: "Arizona adjusted gross income"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: '0'

  - name: az_pit_2026_deductions_and_exemptions
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Fail-closed Arizona deductions-and-exemptions sentinel while source held
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-az/statute/43-1041
              excerpt: "The standard deduction is allowed if the taxpayer so elects."
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-az/statute/43-1023
              excerpt: "A taxpayer is allowed an exemption"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: '0'

  - name: az_pit_2026_taxable_income
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Fail-closed Arizona taxable-income sentinel while source held
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-az/statute/43-1011
              excerpt: "the entire taxable income of every resident of this state"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: '0'

  - name: az_pit_2026_tax_before_credits
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Fail-closed Arizona annual tax-and-surtax sentinel while source held
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-az/statute/43-1011
              excerpt: "taxes determined in the following manner"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: '0'

  - name: az_pit_2026_nonrefundable_credits
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Fail-closed Arizona nonrefundable-credit sentinel while source held
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-az/statute/43-1073
              excerpt: "a credit is allowed against the taxes imposed by this chapter"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: '0'

  - name: az_pit_2026_tax_after_nonrefundable_credits
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Fail-closed Arizona tax-after-nonrefundable-credits sentinel while source held
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-az/statute/43-1073
              excerpt: "the amount of taxes due under this chapter for the taxable year"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: '0'

  - name: az_pit_2026_refundable_credits
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Fail-closed Arizona refundable-credit sentinel while source held
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-az/statute/43-1072
              excerpt: "the amount of the claim not used as an offset against income taxes"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: '0'

  - name: az_pit_2026_net_income_tax_liability_before_payments
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Fail-closed signed annual Arizona resident liability sentinel before payments
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-az/statute/43-1011
              excerpt: "There shall be levied, collected and paid for each taxable year"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-az/statute/43-1072
              excerpt: "the amount of the claim not used as an offset against income taxes"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: '0'

inputs:
  - name: az_pit_2026_federal_adjusted_gross_income
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    description: Federal adjusted gross income from the aligned federal return.
  - name: az_pit_2026_is_full_year_arizona_resident_return
    entity: TaxUnit
    dtype: Bool
    period: Year
    description: True only for a full-year Arizona resident annual return.
  - name: az_pit_2026_federal_and_arizona_filing_units_are_aligned
    entity: TaxUnit
    dtype: Bool
    period: Year
    description: True only when the federal and Arizona individual filing units are aligned.
  - name: az_pit_2026_filing_status_single
    entity: TaxUnit
    dtype: Bool
    period: Year
    description: True only for a single filer.
  - name: az_pit_2026_filing_status_married_separate
    entity: TaxUnit
    dtype: Bool
    period: Year
    description: True only for a married-filing-separately filer.
  - name: az_pit_2026_filing_status_joint
    entity: TaxUnit
    dtype: Bool
    period: Year
    description: True only for a married couple filing a joint return.
  - name: az_pit_2026_filing_status_head_of_household
    entity: TaxUnit
    dtype: Bool
    period: Year
    description: True only for a head-of-household filer.
