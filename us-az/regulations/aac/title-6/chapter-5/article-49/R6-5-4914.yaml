  - name: monthly_income_multiplier_bi_weekly
    kind: parameter
    dtype: Decimal
    source: R6-5-4914(I)(7)(a)(iii)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-az/regulation/aac/title-6/chapter-5/article-49/R6-5-4914
              excerpt: "2.15, if bi-weekly"
    versions:
      - effective_from: '2006-12-31'
        formula: |-
          2.15

  - name: monthly_income_multiplier_semi_monthly
    kind: parameter
    dtype: Decimal
    source: R6-5-4914(I)(7)(a)(iv)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-az/regulation/aac/title-6/chapter-5/article-49/R6-5-4914
              excerpt: "2, if semi-monthly"
