  - name: income_eligibility_determination_not_required
    kind: derived
    entity: Family
    dtype: Judgment
    period: Month
    source: R6-5-4914(A)(1)-(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/regulation/aac/title-6/chapter-5/article-49/R6-5-4914
    versions:
      - effective_from: '2006-12-31'
        formula: |-
          (family_has_jobs_participant_needing_child_care_to_participate_in_jobs_program
          and family_referred_to_cca_as_prescribed_in_r6_5_4904_b)
          or family_has_cash_assistance_participant_needing_child_care_to_maintain_employment
          or (family_is_cps_referred_cps_foster_or_ddd_foster_family
          and family_needs_child_care_documented_in_cps_or_foster_care_case_plan
          and family_referred_to_cca_as_prescribed_in_r6_5_4904_b)

  - name: income_eligibility_determination_required
    kind: derived
    entity: Family
    dtype: Judgment
    period: Month
    source: R6-5-4914(B)(1)-(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/regulation/aac/title-6/chapter-5/article-49/R6-5-4914
    versions:
      - effective_from: '2006-12-31'
        formula: |-
          family_has_former_cash_assistance_participant_needing_child_care_to_maintain_employment
          or family_has_non_cash_assistance_client_needing_child_care_to_maintain_employment
          or family_has_teen_parent_needing_child_care_for_educational_activities
          or family_has_client_unable_or_unavailable_to_care_for_own_children_due_to_listed_condition

  - name: monthly_income_from_regular_pay_period
    kind: derived
    entity: Family
    dtype: Money
    unit: USD
    period: Month
    source: R6-5-4914(I)(7)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-az/regulation/aac/title-6/chapter-5/article-49/R6-5-4914
          - path: versions[0].formula
            kind: import
            import:
              target: us-az:regulations/aac/title-6/chapter-5/article-49/R6-5-4914#monthly_income_multiplier_monthly
              output: monthly_income_multiplier_monthly
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-az:regulations/aac/title-6/chapter-5/article-49/R6-5-4914#monthly_income_multiplier_weekly
              output: monthly_income_multiplier_weekly
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-az:regulations/aac/title-6/chapter-5/article-49/R6-5-4914#monthly_income_multiplier_bi_weekly
              output: monthly_income_multiplier_bi_weekly
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-az:regulations/aac/title-6/chapter-5/article-49/R6-5-4914#monthly_income_multiplier_semi_monthly
              output: monthly_income_multiplier_semi_monthly
              hash: sha256:local
    versions:
      - effective_from: '2006-12-31'
        formula: |-
          if income_is_received_monthly: regular_pay_period_income_amount * monthly_income_multiplier_monthly else: if income_is_received_weekly: regular_pay_period_income_amount * monthly_income_multiplier_weekly else: if income_is_received_bi_weekly: regular_pay_period_income_amount * monthly_income_multiplier_bi_weekly else: if income_is_received_semi_monthly: regular_pay_period_income_amount * monthly_income_multiplier_semi_monthly else: 0

  - name: monthly_income_from_less_often_than_monthly_income
    kind: derived
    entity: Family
    dtype: Money
    unit: USD
    period: Month
    source: R6-5-4914(I)(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-az/regulation/aac/title-6/chapter-5/article-49/R6-5-4914
              excerpt: "prorate the total income over the number of months that the income is intended to cover"
    versions:
      - effective_from: '2006-12-31'
        formula: |-
          less_often_than_monthly_total_income / months_income_is_intended_to_cover

  - name: monthly_countable_income_after_child_support_deduction
    kind: derived
    entity: Family
    dtype: Money
    unit: USD
    period: Month
    source: R6-5-4914(H)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-az/regulation/aac/title-6/chapter-5/article-49/R6-5-4914
    versions:
      - effective_from: '2006-12-31'
        formula: |-
          max(0, gross_monthly_countable_income - child_support_paid_for_dependents_not_residing_with_eligible_family)

  - name: monthly_countable_income_whole_dollars
    kind: derived
    entity: Family
    dtype: Money
    unit: USD
    period: Month
    source: R6-5-4914(I)(8)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-az/regulation/aac/title-6/chapter-5/article-49/R6-5-4914
              excerpt: "any amount that is a fraction of a whole dollar shall be rounded down to the next whole dollar"
          - path: versions[0].formula
            kind: import
            import:
              target: us-az:regulations/aac/title-6/chapter-5/article-49/R6-5-4914#monthly_countable_income_after_child_support_deduction
              output: monthly_countable_income_after_child_support_deduction
              hash: sha256:local
    versions:
      - effective_from: '2006-12-31'
        formula: |-
          floor(monthly_countable_income_after_child_support_deduction)

  - name: child_care_assistance_income_limit
    kind: derived
    entity: Family
    dtype: Money
    unit: USD
    period: Month
    source: R6-5-4914(C)(1)-(2)
    metadata:
