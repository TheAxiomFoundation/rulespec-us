            kind: parameter
            source:
              corpus_citation_path: us-az/regulation/aac/title-6/chapter-5/article-49/R6-5-4914
              excerpt: "no earlier than 10 days after the first full paycheck has been received"
    versions:
      - effective_from: '2006-12-31'
        formula: |-
