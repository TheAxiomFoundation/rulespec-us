format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-az/regulation/aac/title-6/chapter-5/article-49/R6-5-4914
  summary: |-
    R6-5-4914 provides that the Department shall not determine income eligibility for specified Jobs, Cash Assistance, CPS-referred, CPS foster, and DDD foster families; shall determine income eligibility for specified former Cash Assistance, employment, teen-parent education, and unable/unavailable-to-care clients; and shall determine income eligibility by calculating gross monthly income of family members unless excluded. A family meets the income eligibility requirement if gross monthly income is equal to or less than 165% FPL and does not meet it if income exceeds 165% FPL. Child support paid for dependents outside the eligible-family household is deducted before income calculation, and fractional dollars are rounded down.
rules:
  - name: child_care_income_eligibility_ceiling_fpl_rate
    kind: parameter
    dtype: Rate
    source: R6-5-4914(C)(1)-(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-az/regulation/aac/title-6/chapter-5/article-49/R6-5-4914
              excerpt: "equal to or less than 165% FPL"
    versions:
      - effective_from: '2006-12-31'
        formula: |-
          1.65

  - name: unwed_minor_parent_parental_income_deeming_fpl_rate
    kind: parameter
    dtype: Rate
    source: R6-5-4914(D)(8)(c)(ii)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-az/regulation/aac/title-6/chapter-5/article-49/R6-5-4914
              excerpt: "monthly gross countable income that equates to 165% FPL"
    versions:
      - effective_from: '2006-12-31'
        formula: |-
          1.65

  - name: negative_action_notice_days_for_new_or_increased_income
    kind: parameter
    dtype: Count
    period: Day
    source: R6-5-4914(I)(6)(c)
    metadata:
      proof:
        atoms:
