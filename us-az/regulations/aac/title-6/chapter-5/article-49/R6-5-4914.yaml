            source:
              corpus_citation_path: us-az/regulation/aac/title-6/chapter-5/article-49/R6-5-4914
              excerpt: "exceeds 165% FPL"
          - path: versions[0].formula
            kind: import
            import:
              target: us-az:regulations/aac/title-6/chapter-5/article-49/R6-5-4914#monthly_countable_income_whole_dollars
              output: monthly_countable_income_whole_dollars
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-az:regulations/aac/title-6/chapter-5/article-49/R6-5-4914#child_care_assistance_income_limit
              output: child_care_assistance_income_limit
              hash: sha256:local
    versions:
      - effective_from: '2006-12-31'
        formula: |-
          monthly_countable_income_whole_dollars > child_care_assistance_income_limit

  - name: unwed_minor_parent_deemed_parental_income
    kind: derived
    entity: Family
    dtype: Money
    unit: USD
    period: Month
    source: R6-5-4914(D)(8)(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-az/regulation/aac/title-6/chapter-5/article-49/R6-5-4914
          - path: versions[0].formula
            kind: import
            import:
              target: us-az:regulations/aac/title-6/chapter-5/article-49/R6-5-4914#unwed_minor_parent_parental_income_deeming_fpl_rate
              output: unwed_minor_parent_parental_income_deeming_fpl_rate
              hash: sha256:local
    versions:
      - effective_from: '2006-12-31'
        formula: |-
          if unwed_minor_parent_applies_for_own_child_and_resides_with_parents and not parent_of_minor_parent_is_tax_claimant_for_minor_parent_or_child: max(0, parents_of_minor_parent_monthly_gross_countable_income - (unwed_minor_parent_parental_income_deeming_fpl_rate * federal_poverty_level_monthly_for_parents_and_siblings_only)) else: 0

  - name: new_or_increased_income_available_for_fee_or_ineligibility_action
    kind: derived
    entity: Family
    dtype: Judgment
    period: Day
    source: R6-5-4914(I)(6)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/regulation/aac/title-6/chapter-5/article-49/R6-5-4914
              excerpt: "not be considered available ... until the date that the first full payment is received"
          - path: versions[0].formula
            kind: import
            import:
              target: us-az:regulations/aac/title-6/chapter-5/article-49/R6-5-4914#negative_action_notice_days_for_new_or_increased_income
              output: negative_action_notice_days_for_new_or_increased_income
              hash: sha256:local
    versions:
      - effective_from: '2006-12-31'
        formula: |-
          first_full_payment_of_new_or_increased_income_received
          and days_since_first_full_payment_received >= negative_action_notice_days_for_new_or_increased_income
          and department_sent_negative_action_notice_before_fee_increase_or_termination
