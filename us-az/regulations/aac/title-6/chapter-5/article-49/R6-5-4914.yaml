    source: R6-5-4914(I)(7)(a)(i)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-az/regulation/aac/title-6/chapter-5/article-49/R6-5-4914
              excerpt: "1, if monthly"
    versions:
      - effective_from: '2006-12-31'
        formula: |-
