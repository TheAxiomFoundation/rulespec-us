format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-az/regulation/aac/title-6/chapter-5/article-49/R6-5-4915
  summary: |-
    The Department shall assign a fee level based on family size and monthly gross countable income and individual minimum required copayments for each child needing care, as specified in Appendix A. The Department shall not assign a fee level or minimum required copayment to Jobs participants, Cash Assistance participants needing Child Care Assistance for employment, or families determined eligible and referred by CPS or DDD. A client who fails to pay or arrange payment of the DES-required copayment is ineligible for Child Care Assistance and remains ineligible for copayment-required programs until past-due copayments are paid or satisfactory arrangements are made.
  deferred_outputs:
    - output: us-az:regulations/aac/title-6/chapter-5/article-49/R6-5-4915#assigned_fee_level
      reason: The source states that fee levels are determined by family size and monthly gross countable income as specified in Appendix A, but Appendix A's fee-level table is not included in this source unit.
    - output: us-az:regulations/aac/title-6/chapter-5/article-49/R6-5-4915#individual_minimum_required_copayment_amount
      reason: The source states that individual minimum required copayment amounts are assigned as specified in Appendix A, but Appendix A's copayment table is not included in this source unit.
rules:
  - name: fee_assignment_exempt_family
    kind: derived
    entity: Family
    dtype: Judgment
    period: Month
    source: R6-5-4915(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-az/regulation/aac/title-6/chapter-5/article-49/R6-5-4915
    versions:
      - effective_from: '2006-12-31'
        formula: |-
          family_has_jobs_participant
          or family_has_cash_assistance_participant_needing_child_care_assistance_for_employment
          or family_determined_eligible_and_referred_by_cps_or_ddd

  - name: fee_level_assignment_required
    kind: derived
    entity: Family
    dtype: Judgment
    period: Month
    source: R6-5-4915(A), (C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/regulation/aac/title-6/chapter-5/article-49/R6-5-4915
          - path: versions[0].formula
            kind: import
            import:
              target: us-az:regulations/aac/title-6/chapter-5/article-49/R6-5-4915#fee_assignment_exempt_family
              output: fee_assignment_exempt_family
              hash: sha256:local
    versions:
      - effective_from: '2006-12-31'
        formula: |-
          family_has_family_size_and_monthly_gross_countable_income_for_appendix_a_fee_level_assignment
          and not fee_assignment_exempt_family

  - name: minimum_required_copayment_assignment_required
    kind: derived
    entity: Family
    dtype: Judgment
    period: Month
    source: R6-5-4915(B), (C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/regulation/aac/title-6/chapter-5/article-49/R6-5-4915
          - path: versions[0].formula
            kind: import
            import:
              target: us-az:regulations/aac/title-6/chapter-5/article-49/R6-5-4915#fee_assignment_exempt_family
              output: fee_assignment_exempt_family
              hash: sha256:local
    versions:
      - effective_from: '2006-12-31'
        formula: |-
          family_has_child_needing_care_for_appendix_a_copayment_assignment
          and family_has_number_of_children_needing_care_for_appendix_a_copayment_assignment
          and not fee_assignment_exempt_family

  - name: client_ineligible_for_child_care_assistance_due_to_copayment_nonpayment
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: R6-5-4915(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/regulation/aac/title-6/chapter-5/article-49/R6-5-4915
    versions:
      - effective_from: '2006-12-31'
        formula: |-
          client_fails_to_pay_des_required_copayment
          and client_fails_to_make_satisfactory_arrangements_for_payment_with_child_care_provider

  - name: client_ineligible_for_copayment_required_child_care_assistance_program
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: R6-5-4915(E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/regulation/aac/title-6/chapter-5/article-49/R6-5-4915
    versions:
      - effective_from: '2006-12-31'
        formula: |-
          department_has_determined_client_ineligible_due_to_copayment_nonpayment
          and child_care_assistance_program_requires_copayment
          and not past_due_copayments_have_been_paid
          and not satisfactory_arrangements_have_been_made_with_provider_for_payment
