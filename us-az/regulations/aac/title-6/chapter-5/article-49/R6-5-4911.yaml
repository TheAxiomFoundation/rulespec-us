format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-az/regulation/aac/title-6/chapter-5/article-49/R6-5-4911
  summary: |-
    Applicant and recipient responsibility: a client must give complete and truthful information, report listed changes within two business days, and comply with Department procedural requirements; failure or refusal to cooperate may result in denial, reduction, or termination. Eligible applicants must reside with the child needing care and be the parent, specified caretaker relative, or legal guardian/initiated guardian. Arizona residency, child age birth through 12, citizenship/legal residency, eligible activity or need, availability, and provider-selection requirements apply. Where a caretaker relative or legal guardian acts as caretaker at least 51 percent of the time and the parent lives separately or indefinitely outside the home, that caretaker relative or legal guardian is the eligible applicant.
rules:
  - name: change_reporting_deadline_business_days
    kind: parameter
    dtype: Count
    source: R6-5-4911(A)(1)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-az/regulation/aac/title-6/chapter-5/article-49/R6-5-4911
              excerpt: "Within two business days from the date the change becomes known"
    versions:
      - effective_from: '2006-12-31'
        formula: |-
          2

  - name: eligible_child_minimum_age_years
    kind: parameter
    dtype: Count
    source: R6-5-4911(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-az/regulation/aac/title-6/chapter-5/article-49/R6-5-4911
              excerpt: "birth through 12 years of age only"
    versions:
      - effective_from: '2006-12-31'
        formula: |-
          0

  - name: eligible_child_maximum_age_years
    kind: parameter
    dtype: Count
    source: R6-5-4911(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-az/regulation/aac/title-6/chapter-5/article-49/R6-5-4911
              excerpt: "birth through 12 years of age only"
    versions:
      - effective_from: '2006-12-31'
        formula: |-
          12

  - name: child_age_ineligibility_threshold_years
    kind: parameter
    dtype: Count
    source: R6-5-4911(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-az/regulation/aac/title-6/chapter-5/article-49/R6-5-4911
              excerpt: "a child aged 13 or older is ineligible"
    versions:
      - effective_from: '2006-12-31'
        formula: |-
          13

  - name: caretaker_time_required_rate
    kind: parameter
    dtype: Rate
    source: R6-5-4911(B)(2)(d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-az/regulation/aac/title-6/chapter-5/article-49/R6-5-4911
              excerpt: "acting as caretaker at least 51 percent of the time"
    versions:
      - effective_from: '2006-12-31'
        formula: |-
          0.51

  - name: client_change_reporting_timely
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: R6-5-4911(A)(1)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/regulation/aac/title-6/chapter-5/article-49/R6-5-4911
              excerpt: "Within two business days from the date the change becomes known, inform the Department of all changes"
          - path: versions[0].formula
            kind: import
            import:
              target: us-az:regulations/aac/title-6/chapter-5/article-49/R6-5-4911#change_reporting_deadline_business_days
              output: change_reporting_deadline_business_days
              hash: sha256:local
    versions:
      - effective_from: '2006-12-31'
        formula: |-
          client_reported_change_business_days_after_known <= change_reporting_deadline_business_days

  - name: client_cooperates_with_department
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: R6-5-4911(A)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/regulation/aac/title-6/chapter-5/article-49/R6-5-4911
              excerpt: "shall cooperate with the Department as a condition of initial and continuing eligibility"
    versions:
      - effective_from: '2006-12-31'
        formula: |-
          client_gives_complete_and_truthful_information
          and client_timely_informs_department_of_known_changes
          and client_complies_with_department_procedural_requirements

  - name: applicant_relationship_or_guardianship_eligible
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: R6-5-4911(B)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/regulation/aac/title-6/chapter-5/article-49/R6-5-4911
              excerpt: "shall reside with the child needing care and shall be: the parent ... caretaker relative ... legal guardian ... or ... process of legal guardianship has been initiated"
    versions:
      - effective_from: '2006-12-31'
        formula: |-
          client_resides_with_child_needing_care
          and (client_is_parent_of_child_requesting_assistance
          or client_is_caretaker_relative_related_by_blood_adoption_or_marriage
          or client_is_court_appointed_legal_guardian
          or client_has_documentation_guardianship_process_initiated)

  - name: child_age_eligible_for_child_care_assistance
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: R6-5-4911(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/regulation/aac/title-6/chapter-5/article-49/R6-5-4911
              excerpt: "An eligible child is birth through 12 years of age only; a child aged 13 or older is ineligible"
          - path: versions[0].formula
            kind: import
            import:
              target: us-az:regulations/aac/title-6/chapter-5/article-49/R6-5-4911#eligible_child_minimum_age_years
              output: eligible_child_minimum_age_years
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-az:regulations/aac/title-6/chapter-5/article-49/R6-5-4911#eligible_child_maximum_age_years
              output: eligible_child_maximum_age_years
              hash: sha256:local
    versions:
      - effective_from: '2006-12-31'
        formula: |-
          child_age_years >= eligible_child_minimum_age_years
          and child_age_years <= eligible_child_maximum_age_years

  - name: child_age_ineligible_for_child_care_assistance
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: R6-5-4911(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/regulation/aac/title-6/chapter-5/article-49/R6-5-4911
              excerpt: "a child aged 13 or older is ineligible"
          - path: versions[0].formula
            kind: import
            import:
              target: us-az:regulations/aac/title-6/chapter-5/article-49/R6-5-4911#child_age_ineligibility_threshold_years
              output: child_age_ineligibility_threshold_years
              hash: sha256:local
    versions:
      - effective_from: '2006-12-31'
        formula: |-
          child_age_years >= child_age_ineligibility_threshold_years

  - name: client_arizona_residency_and_presence_satisfied
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: R6-5-4911(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/regulation/aac/title-6/chapter-5/article-49/R6-5-4911
              excerpt: "The client and the child ... shall be Arizona residents and shall be physically present within Arizona"
    versions:
      - effective_from: '2006-12-31'
        formula: |-
          client_is_arizona_resident
          and child_is_arizona_resident
          and client_is_physically_present_in_arizona
          and child_is_physically_present_in_arizona

  - name: client_citizenship_or_legal_residency_satisfied
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: R6-5-4911(E)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/regulation/aac/title-6/chapter-5/article-49/R6-5-4911
              excerpt: "The client shall be a United States citizen or shall be a legal resident of the United States"
    versions:
      - effective_from: '2006-12-31'
        formula: |-
          client_is_united_states_citizen
          or client_is_legal_resident_of_united_states

  - name: caretaker_or_guardian_time_rule_makes_eligible_applicant
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: R6-5-4911(B)(2)(d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/regulation/aac/title-6/chapter-5/article-49/R6-5-4911
              excerpt: "caretaker relative or legal guardian who is acting as caretaker at least 51 percent of the time"
          - path: versions[0].formula
            kind: import
            import:
              target: us-az:regulations/aac/title-6/chapter-5/article-49/R6-5-4911#caretaker_time_required_rate
              output: caretaker_time_required_rate
              hash: sha256:local
    versions:
      - effective_from: '2006-12-31'
        formula: |-
          (client_is_caretaker_relative_related_by_blood_adoption_or_marriage
          or client_is_court_appointed_legal_guardian)
          and caretaker_time_rate >= caretaker_time_required_rate
          and (parent_maintains_separate_residence_and_visits_child_intermittently
          or parent_resides_outside_child_home_for_indefinite_period)
