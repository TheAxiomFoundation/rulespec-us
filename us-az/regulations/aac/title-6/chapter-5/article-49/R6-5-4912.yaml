  - name: cash_assistance_jobs_sanction_blocks_education_training
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: R6-5-4912(A)(3)(c), (A)(4)(g)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-az/regulation/aac/title-6/chapter-5/article-49/R6-5-4912
              excerpt: "ineligible ... in any month when a Jobs sanction is applied ... unless the education and training activities are Jobs approved"
    versions:
      - effective_from: '2006-12-31'
        formula: |-
          client_receives_cash_assistance
          and jobs_noncompliance_sanction_applied_to_cash_assistance_case
          and not education_and_training_activities_are_jobs_approved

  - name: postsecondary_education_training_activity_eligible_for_child_care_assistance
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: R6-5-4912(A)(3)(a), (c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/regulation/aac/title-6/chapter-5/article-49/R6-5-4912
              excerpt: "Post-secondary education in a college or trade school"
          - path: versions[0].formula
            kind: import
            import:
              target: us-az:regulations/aac/title-6/chapter-5/article-49/R6-5-4912#postsecondary_minimum_average_weekly_work_hours
              output: postsecondary_minimum_average_weekly_work_hours
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-az:regulations/aac/title-6/chapter-5/article-49/R6-5-4912#postsecondary_education_lifetime_limit_months
              output: postsecondary_education_lifetime_limit_months
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-az:regulations/aac/title-6/chapter-5/article-49/R6-5-4912#cash_assistance_jobs_sanction_blocks_education_training
              output: cash_assistance_jobs_sanction_blocks_education_training
              hash: sha256:local
    versions:
      - effective_from: '2006-12-31'
        formula: |-
          client_attends_postsecondary_college_or_trade_school
          and (client_average_weekly_employment_hours_per_calendar_month >= postsecondary_minimum_average_weekly_work_hours
          or client_self_employed_monthly_net_profit / current_minimum_wage_standard >= postsecondary_minimum_average_weekly_work_hours)
          and education_or_training_activity_related_to_employment_goal
          and (client_educational_level_is_freshman_or_sophomore
          or client_pursues_associate_degree
          or client_in_vocational_or_trade_school_training)
          and client_maintains_satisfactory_progress_and_good_standing
          and client_countable_postsecondary_education_training_assistance_months < postsecondary_education_lifetime_limit_months
          and not cash_assistance_jobs_sanction_blocks_education_training
          and not activity_is_correspondence_course
          and not activity_is_home_study_course
          and not requested_care_time_is_study_time

  - name: adult_basic_education_training_activity_eligible_for_child_care_assistance
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: R6-5-4912(A)(3)(b), (c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/regulation/aac/title-6/chapter-5/article-49/R6-5-4912
              excerpt: "High School, G.E.D., E.S.O.L., and Remedial Educational Activities for Adults age 20 and Older"
          - path: versions[0].formula
            kind: import
            import:
              target: us-az:regulations/aac/title-6/chapter-5/article-49/R6-5-4912#adult_basic_education_minimum_average_weekly_work_hours
              output: adult_basic_education_minimum_average_weekly_work_hours
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-az:regulations/aac/title-6/chapter-5/article-49/R6-5-4912#adult_basic_education_lifetime_limit_months
              output: adult_basic_education_lifetime_limit_months
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-az:regulations/aac/title-6/chapter-5/article-49/R6-5-4912#cash_assistance_jobs_sanction_blocks_education_training
              output: cash_assistance_jobs_sanction_blocks_education_training
              hash: sha256:local
    versions:
      - effective_from: '2006-12-31'
        formula: |-
          client_age_years >= teen_parent_age_threshold_years
          and client_attends_high_school_ged_esol_or_department_allowable_remedial_education
          and (client_average_weekly_employment_hours_per_calendar_month >= adult_basic_education_minimum_average_weekly_work_hours
          or client_self_employed_monthly_net_profit / current_minimum_wage_standard >= adult_basic_education_minimum_average_weekly_work_hours)
          and education_or_training_activity_related_to_employment_goal
          and client_maintains_satisfactory_progress_and_good_standing
          and client_countable_adult_basic_education_training_assistance_months < adult_basic_education_lifetime_limit_months
          and not cash_assistance_jobs_sanction_blocks_education_training
          and not activity_is_correspondence_course
          and not activity_is_home_study_course
          and not requested_care_time_is_study_time

  - name: teen_parent_education_training_activity_eligible_for_child_care_assistance
