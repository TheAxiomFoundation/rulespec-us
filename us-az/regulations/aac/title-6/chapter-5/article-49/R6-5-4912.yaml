format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-az/regulation/aac/title-6/chapter-5/article-49/R6-5-4912
  summary: |-
    Eligible activities and needs for Child Care Assistance include employment, self-employment, education and training with minimum work requirements, teen parent education, Jobs-approved activities, and inability or unavailability to provide care. Education assistance has 20-hour work requirements for specified adult education paths, 24-month and 12-month lifetime limits for specified activities, sanctions exceptions for Jobs-approved activities, and authorization limits for class, between-class, and travel time. Assistance may continue during no more than two 30-day gaps in employment in each 12-month period, ending after 30 or 60 days unless a new eligible activity is verified.
rules:
  - name: postsecondary_minimum_average_weekly_work_hours
    kind: parameter
    dtype: Count
    source: R6-5-4912(A)(3)(a)(i)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-az/regulation/aac/title-6/chapter-5/article-49/R6-5-4912
              excerpt: "employed an average of at least 20 hours per week"
    versions:
      - effective_from: '2006-12-31'
        formula: |-
          20

  - name: postsecondary_education_lifetime_limit_months
    kind: parameter
