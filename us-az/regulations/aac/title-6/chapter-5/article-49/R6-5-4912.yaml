              target: us-az:regulations/aac/title-6/chapter-5/article-49/R6-5-4912#teen_parent_age_threshold_years
              output: teen_parent_age_threshold_years
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-az:regulations/aac/title-6/chapter-5/article-49/R6-5-4912#cash_assistance_jobs_sanction_blocks_education_training
              output: cash_assistance_jobs_sanction_blocks_education_training
              hash: sha256:local
    versions:
      - effective_from: '2006-12-31'
        formula: |-
          client_is_teen_parent
          and client_age_years < teen_parent_age_threshold_years
          and client_attends_high_school_ged_esol_or_remedial_education_in_pursuit_of_high_school_diploma
          and not client_has_received_diploma_or_certificate
          and not cash_assistance_jobs_sanction_blocks_education_training
          and not activity_is_correspondence_course
          and not activity_is_home_study_course
          and not requested_care_time_is_study_time

  - name: jobs_approved_activity_eligible_for_child_care_assistance
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: R6-5-4912(A)(5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/regulation/aac/title-6/chapter-5/article-49/R6-5-4912
              excerpt: "Individuals participating in the Jobs Program and who receive Cash Assistance shall be eligible"
    versions:
      - effective_from: '2006-12-31'
        formula: |-
          client_participates_in_jobs_program
          and client_receives_cash_assistance
          and jobs_program_specialist_referred_client_to_cca
          and client_contacted_local_des_child_care_office_and_cooperated_to_arrange_services
          and requested_activity_is_jobs_approved_activity

  - name: unable_or_unavailable_need_eligible_for_child_care_assistance
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: R6-5-4912(A)(6)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/regulation/aac/title-6/chapter-5/article-49/R6-5-4912
              excerpt: "Clients who are unable or unavailable to care for their own children for a portion of a 24-hour day are eligible"
    versions:
      - effective_from: '2006-12-31'
        formula: |-
          (client_disability_inability_and_recovery_or_evaluation_date_verified_by_required_professional
          or client_participates_in_drug_rehabilitation_program
          or client_participates_in_court_ordered_community_service_program
          or client_resides_in_homeless_or_domestic_violence_shelter_with_authorized_verification)
          and not requested_care_is_for_intermittent_or_routine_appointment_outside_ongoing_treatment_plan

  - name: employment_gap_continued_child_care_assistance_eligible
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: R6-5-4912(B)(1)-(6)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-az/regulation/aac/title-6/chapter-5/article-49/R6-5-4912
              excerpt: "eligible for continued assistance during gaps in employment"
          - path: versions[0].formula
            kind: import
            import:
              target: us-az:regulations/aac/title-6/chapter-5/article-49/R6-5-4912#employment_gap_maximum_gaps_per_period
              output: employment_gap_maximum_gaps_per_period
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-az:regulations/aac/title-6/chapter-5/article-49/R6-5-4912#employment_gap_days_per_gap
              output: employment_gap_days_per_gap
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-az:regulations/aac/title-6/chapter-5/article-49/R6-5-4912#employment_gap_consecutive_end_day_limit
              output: employment_gap_consecutive_end_day_limit
              hash: sha256:local
    versions:
      - effective_from: '2006-12-31'
        formula: |-
          client_was_receiving_child_care_assistance_for_employment_activity
          and client_verified_job_termination_date
          and client_employment_gaps_used_in_lookback_period < employment_gap_maximum_gaps_per_period
          and (days_after_last_day_worked <= employment_gap_days_per_gap
          or (client_requested_consecutive_second_gap
          and days_after_last_day_worked <= employment_gap_consecutive_end_day_limit))
          and not client_verified_participation_in_new_eligible_activity
