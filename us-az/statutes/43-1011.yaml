- name: combined_surcharge_and_highest_income_tax_rate_cap
  kind: parameter
  dtype: Rate
  source: "A.R.S. \xA7 43-1011(E)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-az/statute/43-1011
          excerpt: the combined tax rate ... may not exceed four and one-half percent
  versions:
  - effective_from: '2021-01-01'
    formula: '0.045'
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-az/statute/43-1011
  summary: "A.R.S. \xA7 43-1011 levies Arizona individual income tax on resident taxable\
    \ income and Arizona-source nonresident taxable income. Subsection A prescribes\
    \ rate-bracket tables for taxable years beginning after Dec. 31, 1996, through\
    \ after Dec. 31, 2018, separately for single/married-filing-separately and joint/head-of-household\
    \ schedules. Subsections B-D require CPI adjustment of bracket dollar amounts,\
    \ raised to the nearest whole dollar and not below the prior taxable year. Subsection\
    \ E provides that, for taxable years beginning after Dec. 31, 2020, the combined\
    \ \xA7 43-1013 surcharge and highest \xA7 43-1011 rate may not exceed 4.5%."
  deferred_outputs:
  - output: us-az:statutes/43-1011#individual_income_tax
    reason: The source requires applying filing-status schedules and CPI-adjusted
      bracket dollar amounts for later taxable years. No upstream Arizona filing-status
      classification or current department-adjusted bracket-dollar authority is supplied
      in this prompt, so the final tax computation is not encoded here. The statutory
      bracket cells and surcharge-rate cap stated in this source are retained as parameters.
