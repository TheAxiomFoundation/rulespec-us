format: rulespec/v1
module:
  status: deferred
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-az/statute/43-1073
  summary: |-
    A credit is allowed for taxpayers whose Arizona adjusted gross income plus specified subtractions is at or below listed thresholds by return category and dependent count. The credit equals $40 for each resident taxpayer, nonfiling spouse, or dependent, capped at $240 for joint/head-of-household filers, $120 for single/separate filers, and taxes due.
  deferred_outputs:
    - output: us-az:statutes/43-1073#family_income_tax_credit
      reason: The credit computation depends on federal-style filing-status classifications, including joint return, head of household, single, and married filing separately. No source-backed filing-status RuleSpec output or copied context is available, and RuleSpec instructions prohibit synthesizing local filing-status inputs.
      source_values:
        - us-az:statutes/43-1073#joint_or_head_of_household_credit_cap
        - us-az:statutes/43-1073#single_or_separate_credit_cap
        - us-az:statutes/43-1073#resident_person_credit_amount
        - us-az:statutes/43-1073#joint_not_more_than_one_dependent_income_limit
        - us-az:statutes/43-1073#joint_two_dependents_income_limit
        - us-az:statutes/43-1073#joint_three_dependents_income_limit
        - us-az:statutes/43-1073#joint_four_or_more_dependents_income_limit
        - us-az:statutes/43-1073#head_not_more_than_one_dependent_income_limit
        - us-az:statutes/43-1073#head_two_dependents_income_limit
        - us-az:statutes/43-1073#head_three_dependents_income_limit
        - us-az:statutes/43-1073#head_four_dependents_income_limit
        - us-az:statutes/43-1073#head_five_or_more_dependents_income_limit
        - us-az:statutes/43-1073#single_or_separate_income_limit
rules:
  - name: resident_person_credit_amount
    kind: parameter
    dtype: Money
    unit: USD
    source: A.R.S. 43-1073(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-az/statute/43-1073
              excerpt: "$40 for each person who is a resident of this state"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          40

  - name: joint_or_head_of_household_credit_cap
    kind: parameter
    dtype: Money
    unit: USD
    source: A.R.S. 43-1073(B)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-az/statute/43-1073
              excerpt: "$240 in the case of a married couple filing a joint return or a single person who is a head of a household"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          240

  - name: single_or_separate_credit_cap
