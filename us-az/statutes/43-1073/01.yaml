format: rulespec/v1
module:
  status: deferred
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-az/statute/43-1073.01
  summary: |-
    A credit is allowed for each dependent. The credit is $100 for each dependent under seventeen and $25 for each dependent at least seventeen, with thresholds of $200,000 or $400,000 and a five percent reduction for each $1,000 or fraction of excess federal adjusted gross income. Nonresident and part-year resident credits are prorated by Arizona gross income over federal adjusted gross income.
  deferred_outputs:
    - output: us-az:statutes/43-1073/01#dependent_credit
      reason: The final credit depends on the taxpayer's filing-status classification to select the $200,000 or $400,000 threshold. No source-backed upstream Arizona or federal filing-status RuleSpec output was supplied, and local filing-status inputs are prohibited.
      source_values:
        - us-az:statutes/43-1073/01#young_dependent_credit_amount
        - us-az:statutes/43-1073/01#older_dependent_credit_amount
        - us-az:statutes/43-1073/01#non_joint_federal_adjusted_gross_income_threshold
        - us-az:statutes/43-1073/01#joint_return_federal_adjusted_gross_income_threshold
        - us-az:statutes/43-1073/01#phaseout_rate_per_excess_income_increment
        - us-az:statutes/43-1073/01#phaseout_excess_income_increment
rules:
  - name: young_dependent_credit_amount
    kind: parameter
    dtype: Money
    unit: USD
    source: A.R.S. 43-1073.01(B)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-az/statute/43-1073.01
              excerpt: "$100 for each dependent who is under seventeen years of age"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          100

  - name: older_dependent_credit_amount
    kind: parameter
    dtype: Money
    unit: USD
    source: A.R.S. 43-1073.01(B)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-az/statute/43-1073.01
              excerpt: "$25 for each dependent who is at least seventeen years of age"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          25

  - name: non_joint_federal_adjusted_gross_income_threshold
    kind: parameter
    dtype: Money
    unit: USD
    source: A.R.S. 43-1073.01(B), (C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-az/statute/43-1073.01
              excerpt: "$200,000 for a taxpayer who is a single person, a married person filing separately or a head of household"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          200000

  - name: joint_return_federal_adjusted_gross_income_threshold
    kind: parameter
    dtype: Money
    unit: USD
    source: A.R.S. 43-1073.01(B), (C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-az/statute/43-1073.01
              excerpt: "$400,000 for a married couple filing a joint return"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          400000

  - name: phaseout_rate_per_excess_income_increment
    kind: parameter
    dtype: Rate
    source: A.R.S. 43-1073.01(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-az/statute/43-1073.01
              excerpt: "minus five percent for each $1,000, or fraction thereof"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.05

  - name: phaseout_excess_income_increment
    kind: parameter
    dtype: Money
    unit: USD
    source: A.R.S. 43-1073.01(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-az/statute/43-1073.01
              excerpt: "for each $1,000, or fraction thereof"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1000
