    kind: parameter
    dtype: Money
    unit: USD
    period: Year
    source: A.R.S. § 43-1041(A)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-az/statute/43-1041
              excerpt: "married couple filing a joint return, the standard deduction is $24,400"
    versions:
