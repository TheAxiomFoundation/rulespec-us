format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-pa/statute/act-1971-2/article-3/section-302
  summary: |-
    Composed Pennsylvania personal-income-tax pipeline for the 2026 before-
    forgiveness target. It accepts one TaxUnit-level completed-return
    Pennsylvania adjusted-taxable-income boundary, floors it at zero, and
    applies the rate imported from the official Department of Revenue table.
    It deliberately excludes tax forgiveness and credits and makes no
    independent claim about the upstream income-classification and adjustment
    chain. The statute supplies the operative liability rule, the imported
    Department table supplies the numeric 3.07-per-cent parameter, and zero is
    only the nonnegative taxable-income floor. This narrow boundary is suitable
    for comparison with PolicyEngine's pa_adjusted_taxable_income feeding
    pa_income_tax_before_forgiveness for full-year resident tax units.
imports:
  - us-pa:policies/income_tax/2026_rate_table#personal_income_tax_rate
rules:
  - name: pa_pit_pilot_taxable_income
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Tax Reform Code section 302(a), supplied completed-return Pennsylvania adjusted taxable income
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-pa/statute/act-1971-2/article-3/section-302
              excerpt: "a tax upon each dollar of income received by that resident during that resident's taxable year"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          max(0, pa_pit_pilot_state_taxable_income)
  - name: pa_pit_pilot_income_tax_liability
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Tax Reform Code section 302(a), resident tax before forgiveness at the imported Department of Revenue rate
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: import
            import:
              target: us-pa:policies/income_tax/2026_rate_table#personal_income_tax_rate
              output: personal_income_tax_rate
              hash: sha256:16019c7f247dbac604e5c0f479eff3361832c2a0dbcaa71d82ec686661df178a
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-pa/statute/act-1971-2/article-3/section-302
              excerpt: "every resident individual, estate or trust shall be subject to, and shall pay"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          pa_pit_pilot_taxable_income * personal_income_tax_rate
inputs:
  - name: pa_pit_pilot_state_taxable_income
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    description: Completed-return Pennsylvania adjusted taxable income supplied by the caller as an upstream oracle boundary.
