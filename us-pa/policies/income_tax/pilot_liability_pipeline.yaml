format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_paths:
      - us-pa/statute/act-1971-2/article-3/section-302
      - us-pa/guidance/department-of-revenue/resources/tax-rates/personal-income-tax-rates/rate-table
    upstream_source_check:
      status: official_parameter_source
      checked_paths:
        - us-pa/statute/act-1971-2/article-3/section-302
        - us-pa/guidance/department-of-revenue/resources/tax-rates/personal-income-tax-rates/rate-table
      rationale: |-
        Tax Reform Code section 302(a) imposes the resident tax on each dollar
        of the enumerated income classes. The caller supplies completed-return
        Pennsylvania adjusted taxable income as the explicit upstream boundary;
        this module does not claim to reconstruct the section 303 classification
        and adjustment chain that produces that amount. The imported Department
        of Revenue rate table supplies the numeric 3.07-per-cent parameter.
        Tax forgiveness and credits remain outside this before-forgiveness
        target. Zero is used only as the nonnegative taxable-income floor.
  summary: |-
    Composed Pennsylvania personal-income-tax pipeline for the 2026 before-
    forgiveness target. It accepts one TaxUnit-level completed-return
    Pennsylvania adjusted-taxable-income boundary, floors it at zero, and
    applies the rate imported from the official Department of Revenue table.
    It deliberately excludes tax forgiveness and credits and makes no
    independent claim about the upstream income-classification and adjustment
    chain. This narrow boundary is suitable for comparison with PolicyEngine's
    pa_adjusted_taxable_income feeding pa_income_tax_before_forgiveness for
    full-year resident tax units.
imports:
  - us-pa:policies/income_tax/2026_rate_table#personal_income_tax_rate
rules:
  - name: pa_pit_pilot_taxable_income
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Tax Reform Code section 302(a), supplied completed-return Pennsylvania adjusted taxable income
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-pa/statute/act-1971-2/article-3/section-302
              excerpt: "a tax upon each dollar of income received by that resident during that resident's taxable year"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          max(0, pa_pit_pilot_state_taxable_income)
  - name: pa_pit_pilot_income_tax_liability
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Tax Reform Code section 302(a), resident tax before forgiveness at the imported Department of Revenue rate
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: import
            import:
              target: us-pa:policies/income_tax/2026_rate_table#personal_income_tax_rate
              output: personal_income_tax_rate
              hash: sha256:326e196bc213c6e67a2a0e20bcca3db5b52d8c1c63eb8e594114339a3515e2ca
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-pa/statute/act-1971-2/article-3/section-302
              excerpt: "every resident individual, estate or trust shall be subject to, and shall pay"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          pa_pit_pilot_taxable_income * personal_income_tax_rate
inputs:
  - name: pa_pit_pilot_state_taxable_income
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    description: Completed-return Pennsylvania adjusted taxable income supplied by the caller as an upstream oracle boundary.
