format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-pa/statute/act-1971-2/article-3/section-302
    upstream_source_check:
      status: composed_from_supplied_current_authority
      checked_paths:
        - us-pa/statute/act-1971-2/article-3/section-302
      rationale: |-
        Tax Reform Code section 302(a), codified at 72 P.S. section 7302(a),
        imposes a tax at 3.07 percent on every dollar of the enumerated classes
        of income received by a resident during the taxable year. This narrow
        composition accepts completed-return Pennsylvania taxable income and
        the active flat bracket's cumulative base tax, floor, and marginal rate
        as caller-supplied current-authority inputs. Classification under
        section 303, deductions, tax forgiveness, special income classes, and
        refundable credits remain outside this rate-section module.
  summary: |-
    Composed Pennsylvania personal-income-tax schedule for the 2026 ordinary
    full-year resident wage-earner slice. It normalizes supplied completed-
    return Pennsylvania taxable income and applies the supplied active section
    302 flat bracket in cumulative-base-plus-marginal form before tax
    forgiveness. Its exact PolicyEngine 4.18.9 / PolicyEngine-US 1.752.2 analog
    is `pa_income_tax_before_forgiveness` on the six-case childless age-40 grid:
    single at $30,000/$60,000/$150,000 of wages and one-earner joint at
    $60,000/$120,000/$300,000. PolicyEngine supplies completed taxable income;
    expected outputs are independently hand-computed at the statutory 3.07
    percent rate.
rules:
  - name: pa_pit_pilot_taxable_income
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Tax Reform Code section 302(a), supplied Pennsylvania taxable income
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-pa/statute/act-1971-2/article-3/section-302
              excerpt: "a tax upon each dollar of income received by that resident during that resident's taxable year"
    versions:
      - effective_from: '2026-01-01'
        formula: max(0, pa_pit_pilot_supplied_taxable_income)

  - name: pa_pit_pilot_schedule_tax
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Tax Reform Code section 302(a), 3.07-percent resident schedule
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-pa/statute/act-1971-2/article-3/section-302
              excerpt: "at the rate of three and seven hundredths per cent."
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          pa_pit_pilot_supplied_bracket_base
          + pa_pit_pilot_supplied_marginal_rate * max(0, pa_pit_pilot_taxable_income - pa_pit_pilot_supplied_bracket_floor)

  - name: pa_pit_pilot_income_tax_liability
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Tax Reform Code section 302(a), resident tax before forgiveness
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-pa/statute/act-1971-2/article-3/section-302
              excerpt: "every resident individual, estate or trust shall be subject to, and shall pay"
    versions:
      - effective_from: '2026-01-01'
        formula: max(0, pa_pit_pilot_schedule_tax)
