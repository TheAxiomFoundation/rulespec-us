format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-pa/guidance/department-of-revenue/resources/tax-rates/personal-income-tax-rates/rate-table
  summary: |-
    Pennsylvania Department of Revenue's official personal-income-tax rate
    table lists the rate for 2004 through the present as 3.07 per cent,
    consistent with Tax Reform Code section 302(a), which was checked as the
    higher authority imposing the resident tax. The Department's table is the
    controlling numeric source. This module encodes the observed rate for tax
    year 2026 only and does not extrapolate beyond that source horizon.
  deferred_outputs:
    - output: us-pa:policies/income_tax/2026_rate_table#personal_income_tax_rate
      reason: The official table is current through the 2026 observation date; later tax years require a refreshed official determination or source observation.
    - output: us-pa:policies/income_tax/2026_rate_table#personal_income_tax
      reason: Complete liability requires the section 303 income-classification and adjustment chain, tax forgiveness, and credits outside this rate-only module.
      source_values:
        - us-pa:policies/income_tax/2026_rate_table#personal_income_tax_rate
rules:
  - name: personal_income_tax_rate
    kind: parameter
    dtype: Rate
    period: Year
    source: Pennsylvania Department of Revenue current personal-income-tax rate table and Tax Reform Code section 302(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-pa/guidance/department-of-revenue/resources/tax-rates/personal-income-tax-rates/rate-table
              excerpt: "2004 – Present 3.07%"
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-pa/guidance/department-of-revenue/resources/tax-rates/personal-income-tax-rates/rate-table
              excerpt: "2004 – Present 3.07%"
          - path: versions[0].effective_to
            kind: effective_period
            source:
              corpus_citation_path: us-pa/guidance/department-of-revenue/resources/tax-rates/personal-income-tax-rates/rate-table
              excerpt: "2004 – Present 3.07%"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          0.0307
