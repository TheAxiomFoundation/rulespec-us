# Expected values are independently hand-computed from Tax Reform Code section
# 302(a)'s 3.07-percent rate. Supplied taxable-income inputs equal
# PolicyEngine's pa_adjusted_taxable_income for this ordinary wage-only grid;
# all six liabilities match pa_income_tax_before_forgiveness exactly.
- name: single_30000
  # 3.07% * 30,000 = 921.
  period: {period_kind: tax_year, start: '2026-01-01', end: '2026-12-31'}
  input:
    us-pa:policies/income_tax/pilot_liability_pipeline#input.pa_pit_pilot_supplied_taxable_income: 30000
    us-pa:policies/income_tax/pilot_liability_pipeline#input.pa_pit_pilot_supplied_bracket_base: 0
    us-pa:policies/income_tax/pilot_liability_pipeline#input.pa_pit_pilot_supplied_bracket_floor: 0
    us-pa:policies/income_tax/pilot_liability_pipeline#input.pa_pit_pilot_supplied_marginal_rate: 0.0307
  output:
    us-pa:policies/income_tax/pilot_liability_pipeline#pa_pit_pilot_taxable_income: '30000'
    us-pa:policies/income_tax/pilot_liability_pipeline#pa_pit_pilot_schedule_tax: '921'
    us-pa:policies/income_tax/pilot_liability_pipeline#pa_pit_pilot_income_tax_liability: '921'
