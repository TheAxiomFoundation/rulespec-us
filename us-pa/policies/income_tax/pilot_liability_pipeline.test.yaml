# Hand-computed fixtures for the completed-return Pennsylvania adjusted taxable
# income boundary. Section 302(a) imposes 3.07 percent before tax forgiveness.
- name: negative_taxable_income_is_floored
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    us-pa:policies/income_tax/pilot_liability_pipeline#input.pa_pit_pilot_state_taxable_income: -100
  output:
    us-pa:policies/income_tax/pilot_liability_pipeline#pa_pit_pilot_taxable_income: '0'
    us-pa:policies/income_tax/pilot_liability_pipeline#pa_pit_pilot_income_tax_liability: '0'

