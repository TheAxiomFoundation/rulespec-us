format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-la/statute/47:32
  summary: |-
    Louisiana Revised Statutes 47:32(A) assesses individual income tax at
    three per cent of net income. This module encodes only that rate for tax
    year 2026 and deliberately expires it at the end of 2026 so later law is
    not inferred from this campaign's current-law source window.
rules:
  - name: individual_income_tax_rate
    kind: parameter
    dtype: Rate
    period: Year
    source: La. Rev. Stat. 47:32(A), individual income tax rate
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-la/statute/47:32
              excerpt: "computed at the rate of three percent on net income"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          0.03
