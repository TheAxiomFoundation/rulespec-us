format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-la/statute/47:294
  summary: |-
    A standard deduction shall be allowed. For tax year 2025: Single Individual and Married-Separate $12,500.00; Married-Joint Return, Qualified Surviving Spouse, and Head of Household 200% of the dollar amount provided for Single Individuals. Beginning January 1, 2026, and thereafter, the standard deduction is adjusted annually by multiplying the prior year's standard deduction by the CPI-U percentage increase for the previous calendar year.
  deferred_outputs:
    - output: us-la:statutes/47:294#standard_deduction
      reason: The final taxpayer standard deduction depends on the taxpayer's federal filing status, which must be imported from an upstream filing-status source, and on the post-2025 annual CPI-U adjustment mechanics beginning January 1, 2026. No executable upstream filing-status RuleSpec context or period-indexed prior-year parameter mechanism is supplied here.
      source_values:
        - us-la:statutes/47:294#standard_deduction_single_individual_married_separate_2025
        - us-la:statutes/47:294#standard_deduction_joint_surviving_spouse_head_of_household_multiplier
