      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-la/statute/47:297.8
          excerpt: credit against Louisiana income tax for resident individuals exceeds
            the amount of such individual's tax liability
      - path: versions[0].formula
