- name: child_care_expense_credit
  kind: derived
  entity: Person
  dtype: Money
  unit: USD
  period: Year
  source: R.S. 47:297.4(A)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-la/statute/47:297.4
          excerpt: resident individual is eligible pursuant to the federal income
            tax credit provided by Internal Revenue Code Section 21
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-la/statute/47:297.4
          excerpt: The credit shall be calculated using the following percentages
  versions:
  - effective_from: '2006-01-01'
    formula: "if individual_is_resident and eligible_for_federal_child_care_credit_under_section_21:\n\
      \  if federal_adjusted_gross_income <= low_income_federal_adjusted_gross_income_limit:\n\
      \    max(0, unreduced_federal_child_care_credit) * (if taxable_year_is_in_initial_low_income_credit_period:\
      \ initial_low_income_unreduced_federal_credit_percentage else: later_low_income_unreduced_federal_credit_percentage)\n\
      \  else:\n    if federal_adjusted_gross_income > middle_income_federal_adjusted_gross_income_lower_bound\
      \ and federal_adjusted_gross_income <= middle_income_federal_adjusted_gross_income_limit:\n\
      \      max(0, federal_child_care_credit_claimed_on_federal_return) * middle_income_claimed_federal_credit_percentage\n\
      \    else:\n      if federal_adjusted_gross_income > upper_middle_income_federal_adjusted_gross_income_lower_bound\
      \ and federal_adjusted_gross_income <= upper_middle_income_federal_adjusted_gross_income_limit:\n\
      \        max(0, federal_child_care_credit_claimed_on_federal_return) * upper_income_claimed_federal_credit_percentage\n\
      \      else:\n        if federal_adjusted_gross_income > high_income_federal_adjusted_gross_income_lower_bound:\n\
      \          min(max(0, high_income_credit_cap), max(0, max(0, federal_child_care_credit_claimed_on_federal_return)\
      \ * upper_income_claimed_federal_credit_percentage))\n        else:\n      \
      \    0\nelse:\n  0"
- name: child_care_expense_credit_refundable_overpayment
  kind: derived
  entity: Person
  dtype: Money
  unit: USD
  period: Year
  source: R.S. 47:297.4(B)(1)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-la/statute/47:297.4
          excerpt: If the credit against Louisiana income tax for resident individuals
            whose federal adjusted gross income is equal to or less than twenty-five
            thousand dollars exceeds the amount of such individual's tax liability
  versions:
  - effective_from: '2006-01-01'
    formula: 'if individual_is_resident and federal_adjusted_gross_income <= low_income_federal_adjusted_gross_income_limit:
      max(0, child_care_expense_credit - max(0, louisiana_income_tax_liability)) else:
      0'
- name: child_care_expense_credit_carryforward
  kind: derived
  entity: Person
  dtype: Money
  unit: USD
  period: Year
  source: R.S. 47:297.4(B)(2)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-la/statute/47:297.4
          excerpt: If the credit against Louisiana income tax for resident individuals
            whose federal adjusted gross income is greater than twenty-five thousand
            dollars exceeds the amount of such individual's tax liability for the
            taxable period, then such excess tax credit may be carried forward as
            a credit against any subsequent tax liability of such individual imposed
            by this Part for a period not exceeding five years.
  versions:
  - effective_from: '2006-01-01'
    formula: 'if individual_is_resident and federal_adjusted_gross_income > middle_income_federal_adjusted_gross_income_lower_bound:
      max(0, child_care_expense_credit - max(0, louisiana_income_tax_liability)) else:
      0'
