format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-la/manual/dcfs/economic-independence/b-650-snap-deductions-398997/page-6
    upstream_source_check:
      status: delegated_parameter_source
      checked_paths:
      - us:regulations/7-cfr/273/9#snap_state_standard_utility_allowance_delegation
      - us:regulations/7-cfr/273/9/d/6/iii
      rationale: Federal SNAP regulations delegate standard utility allowance implementation
        to state agency standards. This Louisiana DCFS manual page is the state source
        for the BUA and telephone standard amounts and local utility-allowance conditions
        effective March 1, 2026.
  summary: '"Do not allow the SUA for an unoccupied home." "If a SNAP household incurs
    out-of-pocket expenses for either a heating or cooling cost, it is eligible for
    the SUA year round." HUD or FmHA households receive SUA only if heating or cooling
    costs exceed those payments. Elderly or disabled households with LIHEAP payments
    greater than $20 annually in the current month or immediately preceding 12 months
    are entitled to SUA. "Allow a basic utility allowance (BUA) of $258.00" for qualifying
    non-heating/cooling utility expenses. If the only out-of-pocket utility expense
    is telephone, allow "the telephone standard of $76.00 for one telephone."'
