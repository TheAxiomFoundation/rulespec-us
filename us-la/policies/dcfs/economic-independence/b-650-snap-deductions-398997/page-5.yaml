format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-la/manual/dcfs/economic-independence/b-650-snap-deductions-398997/page-5
    corpus_citation_paths:
      - us-la/manual/dcfs/economic-independence/b-650-snap-deductions-398997/page-5
      - us-la/manual/dcfs/economic-independence/b-650-snap-deductions-398997/page-6
      - us-la/manual/dcfs/economic-independence/b-650-snap-deductions-398997/page-7
      - us-la/manual/dcfs/economic-independence/b-650-snap-deductions-398997/page-8
      - us-la/manual/dcfs/economic-independence/b-650-snap-deductions-398997/page-15
      - us-la/manual/dcfs/economic-independence/b-650-snap-deductions-398997/page-16
    upstream_source_check:
      status: delegated_parameter_source
      checked_paths:
        - us:regulations/7-cfr/273/9#snap_utility_allowance_for_shelter_costs
      rationale: |-
        7 CFR 273.9 delegates SNAP utility allowance treatment to state standards. Louisiana B-650-SNAP pages 5-8 provide the state-specific utility standards and homeless shelter deduction, and pages 15-16 provide the state shelter cap and uncapped elderly/disabled exception.
  summary: |-
    Louisiana SNAP shelter and utility deductions include a $465 Standard Utility Allowance for households with heating or cooling costs, a $258 Basic Utility Allowance for other utility costs, a $76 telephone standard when the only out-of-pocket utility is telephone, a $198.99 homeless shelter deduction, and a $744 maximum shelter deduction unless the household includes an elderly or disabled member.
imports:
  - us:regulations/7-cfr/273/9
