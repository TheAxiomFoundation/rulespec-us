    kind: parameter
    dtype: Money
    period: Month
    unit: USD
    source: Louisiana B-650-SNAP, B-654-6 Homeless Shelter Deduction
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-la/manual/dcfs/economic-independence/b-650-snap-deductions-398997/page-8
              excerpt: "$198.99 per month"
    versions:
      - effective_from: '2026-03-01'
