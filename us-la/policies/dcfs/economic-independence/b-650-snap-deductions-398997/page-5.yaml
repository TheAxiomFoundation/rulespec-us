      basis:
        delegation: us:regulations/7-cfr/273/9#snap_state_standard_utility_allowance_delegation

  - name: sets_louisiana_snap_basic_utility_allowance
    kind: source_relation
    source: Louisiana B-650-SNAP, B-654-2 Basic Utility Allowance
    source_relation:
      type: sets
      target: us:regulations/7-cfr/273/9#snap_limited_utility_allowance_state_option
      authority: state
      value: us-la:policies/dcfs/economic-independence/b-650-snap-deductions-398997/page-5#louisiana_snap_basic_utility_allowance_state_option
