  - name: louisiana_snap_maximum_shelter_deduction
    kind: parameter
    dtype: Money
    period: Month
    unit: USD
    source: Louisiana B-650-SNAP, B-654 shelter deduction
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-la/manual/dcfs/economic-independence/b-650-snap-deductions-398997/page-15
              excerpt: "maximum shelter deduction is $744.00"
    versions:
      - effective_from: '2026-03-01'
        formula: |-
          744

  - name: louisiana_snap_excess_shelter_income_share
    kind: parameter
    dtype: Rate
    source: Louisiana B-650-SNAP, shelter deduction
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-la/manual/dcfs/economic-independence/b-650-snap-deductions-398997/page-15
              excerpt: "exceed 50% of the income remaining"
    versions:
      - effective_from: '2026-03-01'
        formula: |-
          0.50

  - name: louisiana_snap_standard_utility_allowance_entitled
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Louisiana B-650-SNAP, B-654-1 and B-654-4 SUA eligibility
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-la/manual/dcfs/economic-independence/b-650-snap-deductions-398997/page-5
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-la/manual/dcfs/economic-independence/b-650-snap-deductions-398997/page-6
    versions:
      - effective_from: '2026-03-01'
        formula: |-
          snap_household_has_primary_heating_or_cooling_costs_separate_from_rent_or_mortgage
          or snap_household_renter_billed_monthly_by_landlord_for_heating_or_cooling
          or snap_household_uses_portable_space_heater_as_primary_heat_source
          or snap_household_public_housing_responsible_for_excess_heating_or_cooling_utilities
          or snap_household_shares_utility_costs_that_include_heating_or_cooling
          or snap_household_hud_or_fmha_payment_less_than_heating_or_cooling_expenses
          or (
            snap_household_contains_elderly_or_disabled_member
            and snap_household_receives_liheap_current_or_prior_12_months
            and snap_household_energy_assistance_annual_amount > louisiana_snap_energy_assistance_threshold
          )

  - name: louisiana_snap_basic_utility_allowance_entitled
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Louisiana B-650-SNAP, B-654-2 and B-654-4 BUA eligibility
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-la/manual/dcfs/economic-independence/b-650-snap-deductions-398997/page-6
    versions:
      - effective_from: '2026-03-01'
        formula: |-
          not louisiana_snap_standard_utility_allowance_entitled
          and (
            snap_household_has_non_heating_or_cooling_utility_expenses
            or snap_household_public_housing_responsible_for_excess_non_heating_or_cooling_utilities
            or snap_household_has_utility_expenses_for_unoccupied_home
            or snap_household_hud_or_fmha_payment_less_than_non_heating_or_cooling_utility_expenses
            or snap_household_shares_utility_costs_that_do_not_include_heating_or_cooling
          )

  - name: louisiana_snap_telephone_standard_entitled
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Louisiana B-650-SNAP, B-654-3 Telephone Standard
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-la/manual/dcfs/economic-independence/b-650-snap-deductions-398997/page-6
              excerpt: "only out-of-pocket utility expense is for a telephone"
    versions:
      - effective_from: '2026-03-01'
        formula: |-
          not louisiana_snap_standard_utility_allowance_entitled
          and not louisiana_snap_basic_utility_allowance_entitled
          and snap_household_only_out_of_pocket_utility_expense_is_telephone
          and not snap_household_telephone_service_included_in_rent

  - name: louisiana_snap_standard_utility_allowance_state_option
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: Louisiana B-650-SNAP, B-654-1 Standard Utility Allowance
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-la/manual/dcfs/economic-independence/b-650-snap-deductions-398997/page-5
    versions:
      - effective_from: '2026-03-01'
        formula: |-
          if louisiana_snap_standard_utility_allowance_entitled:
            louisiana_snap_standard_utility_allowance_amount
          else:
            0

  - name: louisiana_snap_basic_utility_allowance_state_option
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: Louisiana B-650-SNAP, B-654-2 Basic Utility Allowance
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-la/manual/dcfs/economic-independence/b-650-snap-deductions-398997/page-6
    versions:
      - effective_from: '2026-03-01'
        formula: |-
          if louisiana_snap_basic_utility_allowance_entitled:
            louisiana_snap_basic_utility_allowance_amount
          else:
            0

  - name: louisiana_snap_individual_utility_allowance_state_option
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: Louisiana B-650-SNAP, B-654-3 Telephone Standard
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-la/manual/dcfs/economic-independence/b-650-snap-deductions-398997/page-6
    versions:
      - effective_from: '2026-03-01'
        formula: |-
          if louisiana_snap_telephone_standard_entitled:
            louisiana_snap_telephone_standard_amount
          else:
            0

  - name: louisiana_snap_utility_allowance
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: Louisiana B-650-SNAP, B-654 utility standards
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-la/manual/dcfs/economic-independence/b-650-snap-deductions-398997/page-7
    versions:
      - effective_from: '2026-03-01'
        formula: |-
          louisiana_snap_standard_utility_allowance_state_option
          + louisiana_snap_basic_utility_allowance_state_option
          + louisiana_snap_individual_utility_allowance_state_option

  - name: louisiana_snap_homeless_shelter_deduction_entitled
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Louisiana B-650-SNAP, B-654-6 Homeless Shelter Deduction
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-la/manual/dcfs/economic-independence/b-650-snap-deductions-398997/page-8
              excerpt: "all members are homeless"
    versions:
      - effective_from: '2026-03-01'
        formula: |-
          snap_household_all_members_are_homeless
          and snap_household_has_out_of_pocket_shelter_expense
          and snap_household_chooses_standard_homeless_shelter_deduction
          and not snap_household_receives_free_housing_and_utilities_throughout_month

  - name: louisiana_snap_homeless_shelter_deduction
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: Louisiana B-650-SNAP, B-654-6 Homeless Shelter Deduction
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-la/manual/dcfs/economic-independence/b-650-snap-deductions-398997/page-8
    versions:
      - effective_from: '2026-03-01'
        formula: |-
          if louisiana_snap_homeless_shelter_deduction_entitled:
            louisiana_snap_homeless_shelter_deduction_amount
          else:
            0

  - name: louisiana_snap_excess_shelter_deduction_before_cap
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: Louisiana B-650-SNAP, shelter deduction
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-la/manual/dcfs/economic-independence/b-650-snap-deductions-398997/page-15
              excerpt: "exceed 50% of the income remaining"
    versions:
      - effective_from: '2026-03-01'
        formula: |-
          max(0, snap_household_monthly_shelter_costs + louisiana_snap_utility_allowance - snap_household_income_after_other_deductions * louisiana_snap_excess_shelter_income_share)

  - name: louisiana_snap_excess_shelter_deduction
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: Louisiana B-650-SNAP, shelter deduction cap and elderly/disabled exception
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-la/manual/dcfs/economic-independence/b-650-snap-deductions-398997/page-16
    versions:
      - effective_from: '2026-03-01'
        formula: |-
          if snap_household_contains_elderly_or_disabled_member:
            louisiana_snap_excess_shelter_deduction_before_cap
          else:
            min(louisiana_snap_excess_shelter_deduction_before_cap, louisiana_snap_maximum_shelter_deduction)
