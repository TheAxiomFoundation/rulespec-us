# Hand-computed tax-year-2026 fixtures. The pipeline applies the
# La. Rev. Stat. 47:32(A) rate of three per cent to completed-return Louisiana
# taxable income. Credits and the upstream deduction construction are excluded.
- name: zero Louisiana taxable income produces zero tax before credits
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    us-la:policies/income_tax/pilot_liability_pipeline#input.la_pit_pilot_louisiana_taxable_income: 0
  output:
    us-la:policies/income_tax/pilot_liability_pipeline#la_pit_pilot_income_tax_liability: '0'
- name: negative Louisiana taxable income is floored at zero
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    us-la:policies/income_tax/pilot_liability_pipeline#input.la_pit_pilot_louisiana_taxable_income: -1000
  output:
    us-la:policies/income_tax/pilot_liability_pipeline#la_pit_pilot_income_tax_liability: '0'
