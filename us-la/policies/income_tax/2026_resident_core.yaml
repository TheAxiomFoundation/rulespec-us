  - name: la_2026_resident_nominal_child_care_credit
    kind: derived
    entity: TaxUnit
    dtype: Money
    unit: USD
    period: Year
    source: La. R.S. 47:297.4(A), nominal current-year amount before liability and carryforward ordering
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-la/statute/47:297.4
              excerpt: "The credit shall be calculated using the following percentages"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if la_2026_resident_eligible_for_federal_child_care_credit_under_section_21:
            if la_2026_resident_federal_adjusted_gross_income <= low_income_federal_adjusted_gross_income_limit:
              max(0, la_2026_resident_unreduced_federal_child_care_credit)
              * later_low_income_unreduced_federal_credit_percentage
            else:
              if la_2026_resident_federal_adjusted_gross_income <= middle_income_federal_adjusted_gross_income_limit:
                max(0, la_2026_resident_federal_child_care_credit_claimed)
                * middle_income_claimed_federal_credit_percentage
              else:
                if la_2026_resident_federal_adjusted_gross_income <= upper_middle_income_federal_adjusted_gross_income_limit:
                  max(0, la_2026_resident_federal_child_care_credit_claimed)
                  * upper_income_claimed_federal_credit_percentage
                else:
                  min(
                    max(0, high_income_credit_cap),
                    max(
                      0,
                      la_2026_resident_federal_child_care_credit_claimed
                      * upper_income_claimed_federal_credit_percentage
                    )
                  )
          else:
            0

