        - us-la/statute/47:297.20
        - us-la/statute/47:297.21
        - us-la/statute/47:297.23
        - us-la/statute/47:297.26
        - us-la/statute/47:1675
        - us-la/form/individual-income-tax/2026/it-540es-instructions/document-1
      rationale: |-
        Current Louisiana statutes establish the resident tax-table-income
        framework, the three-percent rate, the directly encoded exclusions and
        deductions, the child-care credit schedule, and the five-percent
        Louisiana earned-income credit. The official tax-year-2026 IT-540ESi
        worksheet supplies the operative $12,875 single/separate and $25,750
        joint/head/surviving-spouse estimated standard deductions and confirms
        the three-percent computation.

        The same worksheet expressly tells taxpayers to use the 2025 annual
        return as a guide and calls its credit lines "Estimated 2025" credits.
        Louisiana DOR has not published a tax-year-2026 annual IT-540 package.
        The current statutes also index the age-65 retirement exemption
        beginning in 2026, but the operative 2026 indexed amount is absent from
        the cited official sources. Account deductions that depend on Title 17,
        child-level school-expense allocations, bonus depreciation, other-state
        tax credit allocation, prior-year carryforwards, and numerous
        certification-, cap-, registry-, or program-dependent specialty
        credits require additional source and fact surfaces. LAC 61:I.1937,
        which governs construction-retrofit eligibility and documentation, is
        not present in the pinned corpus. This module therefore exposes only
        explicitly partial income and tax amounts before held adjustments,
        plus nominal amounts for three calculations. It does not claim
        complete tax-table income, tax before credits, annual after-credit tax,
        or final liability.
  summary: |-
    Louisiana tax-year-2026 full-year resident partial income-tax calculation.
    It starts with federal adjusted gross income and raw taxpayer facts; adds
    taxable interest on other-state obligations; subtracts the specifically
    encoded exempt income, pass-through income or loss, the operative
    filing-status standard deduction, excess federal medical itemized
    deduction, volunteer deductions, two adoption deductions, and
    terminal-illness hardship distributions; floors the partial income amount
    at zero; and applies the enacted three-percent rate. Filing status fails
    closed unless exactly one recognized status is selected.

    The module separately computes the current statutory nominal child-care
    credit and Louisiana earned-income credit from permitted federal outputs,
    and a nominal construction-retrofit arithmetic amount before the regulatory
    eligibility and documentation rules in LAC 61:I.1937. The retrofit amount
    is not subtracted from the partial income calculation. Tax-year-2026
    annual-return ordering, complete tax-table income and tax-before-credits,
    the indexed age-65 retirement exemption, account and bonus-depreciation
    adjustments, other-state tax credits, carryforwards, school-readiness and
    other specialty credits remain source holds described below.
  deferred_outputs:
    - output: us-la:policies/income_tax/2026_resident_core#la_2026_resident_construction_code_retrofit_deduction
      reason: |-
        R.S. 47:293(2) supplies the percentage, incentive offset, and cap, but
        makes the deduction subject to LAC 61:I.1937. That regulation is not
        present in the pinned corpus, so regulatory eligibility and
        documentation cannot be source-certified. Only a nominal statutory
        arithmetic amount is exposed, and it is not included in aggregate
        deductions.
    - output: us-la:policies/income_tax/2026_resident_core#la_2026_resident_tax_table_income
      reason: |-
        Complete tax-table income requires the held indexed retirement,
        account, bonus-depreciation, school-expense, retrofit, and specialty
        adjustment surfaces described below. The executable aggregate is
        explicitly partial and excludes those held adjustments.
    - output: us-la:policies/income_tax/2026_resident_core#la_2026_resident_income_tax_before_credits
      reason: |-
        Complete income tax before credits depends on complete tax-table
        income. The executable three-percent amount is explicitly partial and
        remains before the held adjustments.
    - output: us-la:policies/income_tax/2026_resident_core#la_2026_resident_tax_after_nonrefundable_credits
      reason: |-
        The official tax-year-2026 annual IT-540 and its credit schedules have
        not been published. Current Louisiana law contains nonrefundable,
        carryforward, transferable, capped, certified, and program-dependent
        credits that are not fully encoded here, so applying only the nominal
        child-care amount would overstate completion.
    - output: us-la:policies/income_tax/2026_resident_core#la_2026_resident_net_income_tax_before_payments
      reason: |-
        Final net liability requires all current nonrefundable and refundable
        credits, carryforwards, the ordering in R.S. 47:1675 as administered on
        the tax-year-2026 annual return, and the operative indexed retirement
        exemption. Those surfaces are not fully source-certified for 2026.
    - output: us-la:policies/income_tax/2026_resident_core#la_2026_resident_age_65_retirement_income_exemption
      reason: |-
        R.S. 47:44.1 requires annual CPI-U adjustment beginning January 1,
        2026, but neither the statute nor the official IT-540ESi worksheet
        publishes the operative tax-year-2026 indexed exemption amount.
    - output: us-la:policies/income_tax/2026_resident_core#la_2026_resident_remaining_account_bonus_and_specialty_adjustments
      reason: |-
        Medical-, education-, K-12-, and disability-savings accounts depend on
        cross-title eligibility and withdrawal rules. School-expense
        deductions require child-level qualified expenses and per-child caps,
        which cannot be truthfully derived from an aggregate expense and child
        count. Bonus depreciation depends on asset-level elections and prior
        Louisiana deductions, and multiple specialty deductions require agency
        certification or additional program authority. None is represented by
        a completed caller-supplied state adjustment.
