    kind: parameter
    dtype: Money
    unit: USD
    period: Year
    source: 2026 IT-540ESi worksheet, line 3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-la/form/individual-income-tax/2026/it-540es-instructions/document-1
              excerpt: "Single $12,875"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          12875

  - name: la_2026_standard_deduction_joint_head_or_surviving_spouse
    kind: parameter
    dtype: Money
    unit: USD
    period: Year
    source: 2026 IT-540ESi worksheet, line 3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-la/form/individual-income-tax/2026/it-540es-instructions/document-1
              excerpt: "Married Filing Joint $25,750"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          25750

  - name: la_2026_disability_income_exemption_cap
    kind: parameter
    dtype: Money
    unit: USD
    period: Year
    source: La. R.S. 47:44.1(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-la/statute/47:44.1
              excerpt: "Six thousand dollars of annual disability income"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          6000

  - name: la_2026_active_duty_outside_louisiana_exclusion_cap
    kind: parameter
    dtype: Money
    unit: USD
    period: Year
    source: La. R.S. 47:293(9)(e)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-la/statute/47:293
              excerpt: "the exclusion shall be up to fifty thousand dollars"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          50000

  - name: la_2026_volunteer_deduction_amount
    kind: parameter
    dtype: Money
    unit: USD
    period: Year
    source: La. R.S. 47:293(7)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-la/statute/47:293
              excerpt: "a deduction in the amount of five hundred dollars per tax year"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          500

  - name: la_2026_retrofit_deduction_rate
    kind: parameter
    dtype: Rate
    period: Year
    source: La. R.S. 47:293(2)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-la/statute/47:293
              excerpt: "an amount equal to fifty percent of the cost paid or incurred"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          0.50

  - name: la_2026_retrofit_deduction_cap
    kind: parameter
    dtype: Money
    unit: USD
    period: Year
    source: La. R.S. 47:293(2)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-la/statute/47:293
              excerpt: "shall not exceed ten thousand dollars per retrofitted residential structure"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          10000

  - name: la_2026_adoption_deduction_per_finalized_adoption
    kind: parameter
    dtype: Money
    unit: USD
    period: Year
    source: La. R.S. 47:297.20(A) and 47:297.21(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-la/statute/47:297.20
              excerpt: "shall be equal to five thousand dollars"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          5000

  - name: la_2026_earned_income_tax_credit_rate
    kind: parameter
    dtype: Rate
    period: Year
    source: La. R.S. 47:297.8(A)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-la/statute/47:297.8
              excerpt: "five percent"
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-la/statute/47:297.8
              excerpt: "For tax years beginning on or after January 1, 2019, through December 31, 2030"
          - path: versions[0].effective_to
            kind: effective_period
            source:
              corpus_citation_path: us-la/statute/47:297.8
              excerpt: "For tax years beginning on or after January 1, 2019, through December 31, 2030"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          0.05

  - name: la_2026_resident_adjusted_gross_income
    kind: derived
    entity: TaxUnit
    dtype: Money
    unit: USD
    period: Year
    source: La. R.S. 47:293(1), federal adjusted gross income
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-la/statute/47:293
              excerpt: "the adjusted gross income of the individual for the taxable year that is reportable on the individual's federal income tax return"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          la_2026_resident_federal_adjusted_gross_income

  - name: la_2026_resident_filing_status_selection_count
    kind: derived
    entity: TaxUnit
    dtype: Count
    period: Year
    source: 2026 IT-540ESi worksheet, line 3 filing-status choices
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-la/form/individual-income-tax/2026/it-540es-instructions/document-1
              excerpt: "If your filing status is:"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          (
            if la_2026_resident_filing_status_single:
              1
            else:
              0
          )
          + (
            if la_2026_resident_filing_status_married_separate:
              1
            else:
              0
          )
          + (
            if la_2026_resident_filing_status_joint:
              1
            else:
              0
          )
          + (
            if la_2026_resident_filing_status_head_of_household:
              1
            else:
              0
          )
          + (
            if la_2026_resident_filing_status_qualifying_surviving_spouse:
              1
            else:
              0
          )

  - name: la_2026_resident_filing_status_selection_valid
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: 2026 IT-540ESi worksheet, line 3 filing-status choices
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-la/form/individual-income-tax/2026/it-540es-instructions/document-1
              excerpt: "If your filing status is:"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          la_2026_resident_filing_status_selection_count == 1

  - name: la_2026_resident_standard_deduction
    kind: derived
    entity: TaxUnit
    dtype: Money
    unit: USD
    period: Year
    source: La. R.S. 47:294 and 2026 IT-540ESi worksheet, line 3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-la/form/individual-income-tax/2026/it-540es-instructions/document-1
              excerpt: "Enter on Line 3 the Louisiana estimated standard deduction"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if la_2026_resident_filing_status_selection_valid:
            if la_2026_resident_filing_status_joint
               or la_2026_resident_filing_status_head_of_household
               or la_2026_resident_filing_status_qualifying_surviving_spouse:
              la_2026_standard_deduction_joint_head_or_surviving_spouse
            else:
              la_2026_standard_deduction_single_or_separate
          else:
            0

  - name: la_2026_resident_disability_income_exemption
    kind: derived
    entity: TaxUnit
    dtype: Money
    unit: USD
    period: Year
    source: La. R.S. 47:44.1(B), permanent-total-disability income only
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-la/statute/47:44.1
              excerpt: "Six thousand dollars of annual disability income received by an individual shall be exempt"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          (
            if la_2026_resident_taxpayer_has_qualifying_permanent_total_disability_income:
              min(
                la_2026_disability_income_exemption_cap,
                max(0, la_2026_resident_taxpayer_qualifying_disability_income_in_federal_agi)
              )
            else:
              0
          )
          + (
            if la_2026_resident_filing_status_selection_valid
               and la_2026_resident_filing_status_joint
               and la_2026_resident_spouse_has_qualifying_permanent_total_disability_income:
              min(
                la_2026_disability_income_exemption_cap,
                max(0, la_2026_resident_spouse_qualifying_disability_income_in_federal_agi)
              )
            else:
              0
          )

  - name: la_2026_resident_active_duty_outside_louisiana_exclusion
    kind: derived
    entity: TaxUnit
    dtype: Money
    unit: USD
    period: Year
    source: La. R.S. 47:293(9)(e), qualifying continuous active duty
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-la/statute/47:293
              excerpt: "total compensation paid for services performed outside this state by the armed forces of the United States"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          (
            if la_2026_resident_taxpayer_active_duty_outside_louisiana_for_at_least_120_consecutive_days:
              min(
                la_2026_active_duty_outside_louisiana_exclusion_cap,
                max(0, la_2026_resident_taxpayer_active_duty_compensation_for_services_outside_louisiana)
              )
            else:
              0
          )
          + (
            if la_2026_resident_filing_status_selection_valid
               and la_2026_resident_filing_status_joint
               and la_2026_resident_spouse_active_duty_outside_louisiana_for_at_least_120_consecutive_days:
              min(
                la_2026_active_duty_outside_louisiana_exclusion_cap,
                max(0, la_2026_resident_spouse_active_duty_compensation_for_services_outside_louisiana)
              )
            else:
              0
          )

  - name: la_2026_resident_encoded_positive_exempt_income
    kind: derived
    entity: TaxUnit
    dtype: Money
    unit: USD
    period: Year
    source: La. R.S. 47:44.2, 47:293(9), 47:297.3, and 47:297.17
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-la/statute/47:293
              excerpt: "Income exempt from taxation under the laws of Louisiana"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          max(0, la_2026_resident_social_security_benefits_in_federal_agi)
          + max(0, la_2026_resident_federal_retirement_income_in_federal_agi)
          + max(0, la_2026_resident_railroad_retirement_income_in_federal_agi)
          + la_2026_resident_disability_income_exemption
          + max(0, la_2026_resident_s_bank_nontaxable_income_in_federal_agi)
          + max(0, la_2026_resident_hurricane_recovery_benefits_in_federal_agi)
          + max(0, la_2026_resident_covid_relief_benefits_in_federal_agi)
          + max(0, la_2026_resident_fortify_homes_grants_in_federal_agi)
          + max(0, la_2026_resident_military_survivor_benefits_in_federal_agi)
          + la_2026_resident_active_duty_outside_louisiana_exclusion

  - name: la_2026_resident_excess_federal_medical_itemized_deduction
    kind: derived
    entity: TaxUnit
    dtype: Money
    unit: USD
    period: Year
    source: La. R.S. 47:293(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-la/statute/47:293
              excerpt: "the amount by which the federal itemized personal deduction for expenses for medical care"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          max(
            0,
            la_2026_resident_federal_itemized_medical_expense_deduction
            - la_2026_resident_federal_standard_deduction_designated_for_filing_status
          )

  - name: la_2026_resident_volunteer_deduction
    kind: derived
    entity: TaxUnit
    dtype: Money
    unit: USD
    period: Year
    source: La. R.S. 47:293(7)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-la/statute/47:293
              excerpt: "serve as a volunteer for thirty or more hours during the taxable year"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          (
            if la_2026_resident_taxpayer_qualifies_as_recreation_volunteer
               or la_2026_resident_taxpayer_qualifies_as_volunteer_firefighter:
              la_2026_volunteer_deduction_amount
            else:
              0
          )
          + (
            if la_2026_resident_filing_status_selection_valid
               and la_2026_resident_filing_status_joint
               and (
                 la_2026_resident_spouse_qualifies_as_recreation_volunteer
                 or la_2026_resident_spouse_qualifies_as_volunteer_firefighter
               ):
              la_2026_volunteer_deduction_amount
            else:
              0
          )

  - name: la_2026_resident_nominal_construction_code_retrofit_amount_before_regulatory_eligibility
    kind: derived
    entity: TaxUnit
    dtype: Money
    unit: USD
    period: Year
    source: La. R.S. 47:293(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-la/statute/47:293
              excerpt: "an amount equal to fifty percent of the cost paid or incurred by a taxpayer to voluntarily retrofit an existing residential structure"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-la/statute/47:293
              excerpt: "less the value of any municipally sponsored, state-sponsored, or federally sponsored financial incentives for the retrofitting cost paid"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          min(
            la_2026_retrofit_deduction_cap,
            max(
              0,
              la_2026_retrofit_deduction_rate
              * max(0, la_2026_resident_qualifying_retrofit_cost)
              - max(0, la_2026_resident_retrofit_financial_incentives)
            )
          )

  - name: la_2026_resident_adoption_deductions
    kind: derived
    entity: TaxUnit
    dtype: Money
    unit: USD
