# Texas Tax Code Chapter 171 - Franchise Tax Parameters
#
# Source: Texas Tax Code Chapter 171, as amended
# Reference: https://statutes.capitol.texas.gov/Docs/TX/htm/TX.171.htm

# Revenue thresholds and triggers
no_tax_due_threshold:
  description: "Total revenue threshold below which no franchise tax is due"
  unit: currency-USD
  values:
    # These thresholds are adjusted annually
    2024-01-01: 2470000
    2023-01-01: 2470000
    2022-01-01: 1230000
    2021-01-01: 1180000
    2020-01-01: 1180000
    2019-01-01: 1180000
    2018-01-01: 1130000
    2017-01-01: 1110000
    2016-01-01: 1080000
    2015-01-01: 1080000
    2014-01-01: 1030000
    2012-01-01: 1000000
    2008-01-01: 300000
  citations:
    - "Tex. Tax Code § 171.002(d)(2)"
    - "Texas Comptroller Rule 3.584"

# Discounted tax rate threshold
discounted_rate_threshold:
  description: "Total revenue threshold for discounted tax rates"
  unit: currency-USD
  values:
    2024-01-01: 20000000
    2023-01-01: 20000000
    2022-01-01: 20000000
    2014-01-01: 20000000
    2012-01-01: 10000000
    2008-01-01: 10000000
  citations:
    - "Tex. Tax Code § 171.0021"

# Tax rates
tax_rate_retail_wholesale:
  description: "Franchise tax rate for retail and wholesale trade"
  unit: rate
  values:
    2014-01-01: 0.375
    2012-01-01: 0.475
    2008-01-01: 0.5
  citations:
    - "Tex. Tax Code § 171.002(a)(1)"

tax_rate_other:
  description: "Franchise tax rate for entities not in retail/wholesale"
  unit: rate
  values:
    2014-01-01: 0.75
    2012-01-01: 0.95
    2008-01-01: 1.0
  citations:
    - "Tex. Tax Code § 171.002(a)(2)"

tax_rate_ez:
  description: "E-Z Computation tax rate (revenue-based alternative)"
  unit: rate
  values:
    2016-01-01: 0.331
    2014-01-01: 0.3313
    2012-01-01: 0.419
    2008-01-01: 0.575
  citations:
    - "Tex. Tax Code § 171.1013"

