# Texas Tax Code Chapter 11 - Taxable Property and Exemptions
#
# Property Tax Parameters - primarily exemption amounts
# Note: Texas has no state property tax (abolished 1982)
# Local taxing entities set their own rates
#
# Source: Texas Tax Code Chapter 11
# Reference: https://statutes.capitol.texas.gov/Docs/TX/htm/TX.11.htm

# Residence Homestead Exemptions

# General homestead exemption (school districts)
school_homestead_exemption:
  description: "Mandatory homestead exemption for school district taxes"
  unit: currency-USD
  values:
    2023-01-01: 100000
    2022-01-01: 40000
    2015-01-01: 25000
    1997-01-01: 15000
  citations:
    - "Tex. Tax Code § 11.13(b)"
    - "Tex. Const. Art. VIII, § 1-b(c)"

# Over-65/Disabled homestead exemption (school districts)
over_65_disabled_exemption:
  description: "Additional homestead exemption for persons 65+ or disabled"
  unit: currency-USD
  values:
    2023-01-01: 10000
    1997-01-01: 10000
  citations:
    - "Tex. Tax Code § 11.13(c)"

# Optional homestead exemption (non-school taxing units)
optional_homestead_percentage:
  description: "Percentage of appraised value taxing units may exempt"
  unit: rate
  values:
    2022-01-01: 20.0
  citations:
    - "Tex. Tax Code § 11.13(n)"

optional_homestead_minimum:
  description: "Minimum optional homestead exemption amount"
  unit: currency-USD
  values:
    2022-01-01: 5000
  citations:
    - "Tex. Tax Code § 11.13(n)"

# Appraisal Cap (Homestead)
homestead_appraisal_cap:
  description: "Maximum annual increase in appraised value for homestead"
  unit: rate
  values:
    2024-01-01: 10.0   # 10% per year
    2015-01-01: 10.0
  citations:
    - "Tex. Tax Code § 23.23(a)"

# Disabled Veteran Exemptions
disabled_veteran_exemption_100_percent:
  description: "Full exemption for 100% disabled veterans"
  unit: percentage
  values:
    2009-01-01: 100  # 100% exemption of appraised value
  citations:
    - "Tex. Tax Code § 11.131"

disabled_veteran_partial_exemptions:
  description: "Partial exemptions for disabled veterans by disability rating"
  unit: currency-USD
  brackets:
    2024-01-01:
      - disability_rating_min: 10
        disability_rating_max: 29
        exemption: 5000
      - disability_rating_min: 30
        disability_rating_max: 49
        exemption: 7500
      - disability_rating_min: 50
        disability_rating_max: 69
        exemption: 10000
      - disability_rating_min: 70
        disability_rating_max: 99
        exemption: 12000
  citations:
    - "Tex. Tax Code § 11.22"

# Surviving Spouse Exemptions
surviving_spouse_exemption:
  description: "Exemption for surviving spouses of deceased veterans"
  unit: boolean
  values:
    2014-01-01: true  # Full exemption continues if spouse was 100% disabled
  citations:
    - "Tex. Tax Code § 11.131(c)"

# Charitable/Religious Organization Exemptions
charitable_exemption:
  description: "Property tax exemption for charitable organizations"
  unit: boolean
  values:
    1876-01-01: true
  citations:
    - "Tex. Tax Code § 11.18"
    - "Tex. Const. Art. VIII, § 2"

religious_exemption:
  description: "Property tax exemption for religious organizations"
  unit: boolean
  values:
    1876-01-01: true
  citations:
    - "Tex. Tax Code § 11.20"
    - "Tex. Const. Art. VIII, § 2"

# Agricultural/Timber Land Valuation
agricultural_special_valuation:
  description: "Whether agricultural land qualifies for productivity valuation"
  unit: boolean
  values:
    1978-01-01: true
  citations:
    - "Tex. Tax Code § 23.41"
    - "Tex. Const. Art. VIII, § 1-d-1"

timber_special_valuation:
  description: "Whether timber land qualifies for productivity valuation"
  unit: boolean
  values:
    1978-01-01: true
  citations:
    - "Tex. Tax Code § 23.71"
