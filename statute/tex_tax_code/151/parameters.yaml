# Texas Tax Code Chapter 151 - Limited Sales, Excise, and Use Tax Parameters
#
# Source: Texas Tax Code Chapter 151
# Reference: https://statutes.capitol.texas.gov/Docs/TX/htm/TX.151.htm

# State sales tax rate
state_sales_tax_rate:
  description: "Texas state sales and use tax rate"
  unit: rate
  values:
    1990-01-01: 6.25
    1987-10-01: 6.0
    1984-08-01: 5.125
    1971-10-01: 5.0
    1969-10-01: 4.0
    1968-10-01: 3.25
    1961-09-01: 2.0
  citations:
    - "Tex. Tax Code § 151.051"

# Maximum local sales tax rate
max_local_sales_tax_rate:
  description: "Maximum combined local sales tax rate (city, county, transit, etc.)"
  unit: rate
  values:
    1987-10-01: 2.0
  citations:
    - "Tex. Tax Code § 321.101"
    - "Tex. Tax Code § 323.101"

# Maximum combined sales tax rate
max_combined_rate:
  description: "Maximum combined state and local sales tax rate"
  unit: rate
  values:
    1990-01-01: 8.25
  citations:
    - "Tex. Tax Code § 151.051"
    - "Tex. Tax Code § 321.101"

# Standard exemptions

# Grocery food exemption (Texas exempts most grocery items)
grocery_food_exempted:
  description: "Whether grocery food is exempt from sales tax"
  unit: boolean
  values:
    1984-10-02: true
  citations:
    - "Tex. Tax Code § 151.314"

# Prescription medicine exemption
prescription_medicine_exempted:
  description: "Whether prescription medicines are exempt from sales tax"
  unit: boolean
  values:
    1961-09-01: true
  citations:
    - "Tex. Tax Code § 151.313"

# Over-the-counter medicine exemption
otc_medicine_exempted:
  description: "Whether over-the-counter medicines are exempt from sales tax"
  unit: boolean
  values:
    2012-01-01: true
  citations:
    - "Tex. Tax Code § 151.314"

# Medical equipment exemption
medical_equipment_exempted:
  description: "Whether certain medical equipment is exempt from sales tax"
  unit: boolean
  values:
    1984-10-02: true
  citations:
    - "Tex. Tax Code § 151.313"
