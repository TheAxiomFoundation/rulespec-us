  - name: maryland_fcep_effective_fpl_limit
    kind: derived
    dtype: Rate
    period: Year
    source: CMS CHIP FCEP SPA source, Maryland, including the MAGI 5% FPL disregard
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: import
            import:
              target: us:policies/cms/medicaid-chip-bhp-eligibility-levels#magi_fpl_disregard_rate
              output: magi_fpl_disregard_rate
              hash: sha256:ea0071602a4a4441e584a16bdbab3d8a3c36b40b7cea1151165533669423f5f5
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/regulation/42/435/603/d
              excerpt: "5 percentage points of the Federal poverty level"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/policy/cms/chip-spa/md/md-23-0002-chip-and-md-23-0003-chip-and-md-23-0004-chip/pdf/page-2
              excerpt: "Collectively, through these SPAs, the state creates a separate CHIP for the from-conception-to- end-of-pregnancy population (FCEP, otherwise known as the “unborn” option), with household incomes up to 259 percent of the federal poverty level (FPL), for birth parents that are not otherwise eligible for Medicaid or CHIP."
    versions:
      - effective_from: '2023-07-01'
        formula: |-
          maryland_fcep_fpl_limit + magi_fpl_disregard_rate
  - name: is_chip_fcep_eligible_person
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 42 USC 1397ll(f)(1), 42 CFR 457.10, and CMS CHIP FCEP SPA source for Maryland
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/policy/cms/chip-spa/md/md-23-0002-chip-and-md-23-0003-chip-and-md-23-0004-chip/pdf/page-2
              excerpt: "Collectively, through these SPAs, the state creates a separate CHIP for the from-conception-to- end-of-pregnancy population (FCEP, otherwise known as the “unborn” option), with household incomes up to 259 percent of the federal poverty level (FPL), for birth parents that are not otherwise eligible for Medicaid or CHIP."
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/1397ll/f/1
              excerpt: "through the application of sections 457.10"
    versions:
      - effective_from: '2023-07-01'
        formula: |-
          person_is_pregnant
          and not found_eligible_for_medical_assistance_under_subchapter_xix
          and medicaid_income_level <= maryland_fcep_effective_fpl_limit
