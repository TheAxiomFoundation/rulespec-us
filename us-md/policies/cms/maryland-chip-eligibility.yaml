  - name: maryland_fcep_eligibility_available
    kind: derived
    dtype: Boolean
    period: Year
    source: CMS CHIP FCEP SPA source, Maryland
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/policy/cms/chip-spa/md/md-23-0002-chip-and-md-23-0003-chip-and-md-23-0004-chip/pdf/page-2
              excerpt: "Collectively, through these SPAs, the state creates a separate CHIP for the from-conception-to- end-of-pregnancy population (FCEP, otherwise known as the “unborn” option), with household incomes up to 259 percent of the federal poverty level (FPL), for birth parents that are not otherwise eligible for Medicaid or CHIP."
    versions:
      - effective_from: '2023-07-01'
        formula: |-
          true
  - name: maryland_fcep_fpl_limit
    kind: parameter
    dtype: Rate
    period: Year
    source: CMS CHIP FCEP SPA source, Maryland
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/policy/cms/chip-spa/md/md-23-0002-chip-and-md-23-0003-chip-and-md-23-0004-chip/pdf/page-2
              excerpt: "Collectively, through these SPAs, the state creates a separate CHIP for the from-conception-to- end-of-pregnancy population (FCEP, otherwise known as the “unborn” option), with household incomes up to 259 percent of the federal poverty level (FPL), for birth parents that are not otherwise eligible for Medicaid or CHIP."
