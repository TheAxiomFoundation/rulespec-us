format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-md/guidance/dhs/fia/at-26-05/page-4
  summary: |-
    Maryland FIA Action Transmittal 26-05 (SNAP Mass Changes for October
    2025), utility allowance deductions effective October 1, 2025: the
    Standard Utility Allowance (SUA) is 572 dollars, the Limited Utility
    Allowance (LUA) is 350 dollars, and the Telephone Allowance is 40
    dollars, statewide with no mid-year revision.
