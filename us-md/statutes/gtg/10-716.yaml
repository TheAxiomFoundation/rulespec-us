format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-md/statute/gtg/10-716
  summary: |-
    Resident taxpayers may claim a Maryland State income tax credit for expenses paid for care of a qualifying individual, subject to federal adjusted gross income thresholds, a 32% federal-credit percentage, income-based reductions, State tax limitation, refundability thresholds, and annual cost-of-living increases rounded down to the next lowest $50 multiple.
  deferred_outputs:
    - output: us-md:statutes/gtg/10-716/a#defined_terms
      reason: Definitions of “Federal child and dependent care credit” and “qualifying individual” depend on IRC § 21 meanings; this artifact uses semantic boundary inputs for the completed federal credit and qualifying-individual care facts instead of re-encoding IRC § 21.
rules:
  - name: individual_claim_income_threshold_base
    kind: parameter
    dtype: Money
    unit: USD
    source: 10-716(b)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-md/statute/gtg/10-716
              excerpt: "$92,000, in the case of an individual"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          92000

  - name: joint_claim_income_threshold_base
    kind: parameter
    dtype: Money
    unit: USD
    source: 10-716(b)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-md/statute/gtg/10-716
              excerpt: "$143,000, in the case of a married couple filing a joint income tax return"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          143000

  - name: credit_percentage_of_federal_credit
    kind: parameter
    dtype: Rate
    source: 10-716(c)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-md/statute/gtg/10-716
              excerpt: "32% of the federal child and dependent care credit"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.32

  - name: individual_reduction_income_threshold
    kind: parameter
    dtype: Money
    unit: USD
    source: 10-716(d)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-md/statute/gtg/10-716
              excerpt: "exceeds $30,000"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30000

  - name: individual_reduction_income_increment
    kind: parameter
    dtype: Money
    unit: USD
    source: 10-716(d)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-md/statute/gtg/10-716
              excerpt: "for each $2,000 or fraction of $2,000"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          2000

  - name: joint_reduction_income_threshold
    kind: parameter
    dtype: Money
    unit: USD
    source: 10-716(d)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-md/statute/gtg/10-716
              excerpt: "exceeds $50,000"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          50000

  - name: joint_reduction_income_increment
    kind: parameter
    dtype: Money
    unit: USD
    source: 10-716(d)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-md/statute/gtg/10-716
              excerpt: "for each $3,000 or fraction of $3,000"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          3000

  - name: reduction_rate_per_income_increment
    kind: parameter
    dtype: Rate
    source: 10-716(d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-md/statute/gtg/10-716
              excerpt: "reduced by 1%"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.01

  - name: individual_refund_income_threshold_base
    kind: parameter
    dtype: Money
    unit: USD
    source: 10-716(e)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-md/statute/gtg/10-716
              excerpt: "$50,000 in the case of an individual"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          50000

  - name: joint_refund_income_threshold_base
    kind: parameter
    dtype: Money
    unit: USD
    source: 10-716(e)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-md/statute/gtg/10-716
              excerpt: "$75,000 in the case of a married couple filing a joint income tax return"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          75000

  - name: cost_of_living_rounding_multiple
    kind: parameter
    dtype: Money
    unit: USD
    source: 10-716(f)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-md/statute/gtg/10-716
              excerpt: "not a multiple of $50"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          50

  - name: individual_claim_income_threshold
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 10-716(f)(1)-(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-md/statute/gtg/10-716
              excerpt: "maximum income thresholds under subsection (b) ... increased ... product ... cost-of-living adjustment"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_claim_income_threshold_base + floor((individual_claim_income_threshold_base * cost_of_living_adjustment_for_taxable_year) / cost_of_living_rounding_multiple) * cost_of_living_rounding_multiple

  - name: joint_claim_income_threshold
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 10-716(f)(1)-(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-md/statute/gtg/10-716
              excerpt: "maximum income thresholds under subsection (b) ... increased ... rounded down to the next lowest multiple of $50"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          joint_claim_income_threshold_base + floor((joint_claim_income_threshold_base * cost_of_living_adjustment_for_taxable_year) / cost_of_living_rounding_multiple) * cost_of_living_rounding_multiple

  - name: individual_refund_income_threshold
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 10-716(f)(1)-(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-md/statute/gtg/10-716
              excerpt: "maximum income thresholds under subsection (e) ... increased ... rounded down"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_refund_income_threshold_base + floor((individual_refund_income_threshold_base * cost_of_living_adjustment_for_taxable_year) / cost_of_living_rounding_multiple) * cost_of_living_rounding_multiple

  - name: joint_refund_income_threshold
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 10-716(f)(1)-(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-md/statute/gtg/10-716
              excerpt: "maximum income thresholds under subsection (e) ... increased ... product ... cost-of-living adjustment"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          joint_refund_income_threshold_base + floor((joint_refund_income_threshold_base * cost_of_living_adjustment_for_taxable_year) / cost_of_living_rounding_multiple) * cost_of_living_rounding_multiple

  - name: claim_income_threshold
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 10-716(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-md/statute/gtg/10-716
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if taxpayer_is_married_couple_filing_joint_income_tax_return: joint_claim_income_threshold else: individual_claim_income_threshold

  - name: refund_income_threshold
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 10-716(e)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-md/statute/gtg/10-716
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if taxpayer_is_married_couple_filing_joint_income_tax_return: joint_refund_income_threshold else: individual_refund_income_threshold

  - name: taxpayer_may_claim_child_and_dependent_care_credit
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: 10-716(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-md/statute/gtg/10-716
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          taxpayer_is_resident
          and taxpayer_paid_expenses_for_care_of_qualifying_individual
          and federal_adjusted_gross_income <= claim_income_threshold

  - name: income_reduction_percentage
    kind: derived
    entity: TaxUnit
    dtype: Rate
    period: Year
    source: 10-716(d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-md/statute/gtg/10-716
              excerpt: "reduced by 1% for each $2,000 ... $3,000 ... exceeds"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if taxpayer_is_married_couple_filing_joint_income_tax_return: ceil(max(0, federal_adjusted_gross_income - joint_reduction_income_threshold) / joint_reduction_income_increment) * reduction_rate_per_income_increment else: ceil(max(0, federal_adjusted_gross_income - individual_reduction_income_threshold) / individual_reduction_income_increment) * reduction_rate_per_income_increment

  - name: reduced_credit_before_state_tax_limit
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 10-716(c)-(d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-md/statute/gtg/10-716
              excerpt: "equals the lesser of: (1) 32% ... reduced by 1%"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if taxpayer_may_claim_child_and_dependent_care_credit: max(0, federal_child_and_dependent_care_credit * credit_percentage_of_federal_credit * max(0, 1 - income_reduction_percentage)) else: 0

  - name: child_and_dependent_care_credit
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 10-716(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-md/statute/gtg/10-716
              excerpt: "the credit ... equals the lesser of ... 32% ... or the State income tax"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          min(reduced_credit_before_state_tax_limit, max(0, state_income_tax))

  - name: refundable_excess_child_and_dependent_care_credit
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 10-716(e)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-md/statute/gtg/10-716
              excerpt: "may claim a refund in the amount of the excess if the taxpayer’s federal adjusted gross income does not exceed"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if federal_adjusted_gross_income <= refund_income_threshold: max(0, reduced_credit_before_state_tax_limit - max(0, state_income_tax)) else: 0
