transformations:
  - pattern: all_of
    name: snap_member_eligible
    effective_from: '2026-01-01'
    entity: Person
    dtype: Judgment
    period: Month
    source: us:statutes/7/2014
    conditions:
      - snap_member_citizenship_or_alien_status_eligible
      - snap_member_ssn_requirement_eligible
      - snap_member_work_requirement_eligible
      - snap_member_student_eligible

  - pattern: any_related
    name: snap_eligible
    effective_from: '2026-01-01'
    entity: Household
    period: Month
    source: us:statutes/7/2014
    relation: member_of_household
    condition: snap_member_eligible

  - pattern: all_of
    name: household_is_elderly_or_disabled
    effective_from: '2026-01-01'
    entity: Household
    dtype: Judgment
    period: Month
    source: axiom-programs/us-tn/snap/fy-2026 income-standard input alias
    conditions:
      - snap_household_has_elderly_or_disabled_member

  - pattern: all_of
    name: household_is_regular
    effective_from: '2026-01-01'
    entity: Household
    dtype: Judgment
    period: Month
    source: axiom-programs/us-tn/snap/fy-2026 income-standard input alias
    conditions:
      - gross_monthly_income_standard_applies

  - pattern: all_of
    name: net_monthly_income_standard_met
    effective_from: '2026-01-01'
    entity: Household
    dtype: Judgment
    period: Month
    source: axiom-programs/us-tn/snap/fy-2026 income-standard input alias
    conditions:
      - snap_standard_net_income_eligible

  - pattern: sum_terms
    name: gross_monthly_income
    effective_from: '2026-01-01'
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: axiom-programs/us-tn/snap/fy-2026 income-standard input alias
    terms:
      - snap_gross_monthly_income

  - pattern: sum_terms
    name: gross_monthly_income_standard_for_household_size
    effective_from: '2026-01-01'
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: axiom-programs/us-tn/snap/fy-2026 income-standard input alias
    terms:
      - snap_gross_income_limit_130_percent_fpl_48_states_dc

  - pattern: any_of
    name: snap_income_eligible
    effective_from: '2026-01-01'
    entity: Household
    dtype: Judgment
    period: Month
    source: axiom-programs/us-tn/snap/fy-2026 income-standard composition
    conditions:
      - income_eligibility_standards_met
      - snap_standard_income_eligible

  - pattern: sum_terms
    name: snap_countable_earned_income
    effective_from: '2026-01-01'
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: axiom-programs/us-tn/snap/fy-2026 income composition
    terms:
      - snap_gross_monthly_earned_income

  - pattern: sum_terms
    name: snap_countable_unearned_income
    effective_from: '2026-01-01'
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: axiom-programs/us-tn/snap/fy-2026 income composition
    terms:
      - snap_total_monthly_unearned_income

  - pattern: sum_terms
    name: snap_gross_monthly_income
    effective_from: '2026-01-01'
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: axiom-programs/us-tn/snap/fy-2026 income composition
    terms:
      - snap_countable_earned_income
      - snap_countable_unearned_income

  - pattern: sum_terms
    name: snap_monthly_household_income
    effective_from: '2026-01-01'
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: axiom-programs/us-tn/snap/fy-2026 income composition
    terms:
      - snap_countable_earned_income
      - snap_countable_unearned_income

  - pattern: sum_terms
    name: snap_total_allowable_shelter_expenses
    effective_from: '2026-01-01'
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: axiom-programs/us-tn/snap/fy-2026 shelter-cost composition
    terms:
      - household_shelter_costs_incurred

  - pattern: sum_terms
    name: snap_excess_shelter_deduction
    effective_from: '2026-01-01'
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: axiom-programs/us-tn/snap/fy-2026 shelter deduction composition
    terms:
      - snap_excess_shelter_deduction_for_net_income

  - pattern: conditional_value
    name: snap_benefit
    effective_from: '2026-01-01'
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: axiom-programs/us-tn/snap/fy-2026 benefit composition
    condition: snap_eligible
    when_true: snap_monthly_allotment
    when_false: 0
