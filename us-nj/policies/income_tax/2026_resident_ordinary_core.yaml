        effective_to: '2026-12-31'
        formula: nj_pit_2026_supported_profile_tax_before_credits

  - name: nj_pit_2026_supported_profile_property_tax_credit
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: N.J. Stat. section 54A:3A-20
    metadata:
      proof:
        atoms:
          - path: 'versions[0].formula'
            kind: amount
            source: {corpus_citation_path: us-nj/statute/54a:3a-20, excerpt: "may elect to take a credit instead of the deduction provided"}
          - path: 'versions[0].formula'
            kind: amount
            source: {corpus_citation_path: us-nj/statute/54a:3a-20, excerpt: "in the amount of $50"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if nj_pit_2026_supported_profile_applies and nj_pit_2026_elect_property_tax_credit:
            if nj_pit_2026_filing_status_is_married_separate:
              nj_pit_2026_mfs_property_benefit_share * nj_pit_2026_property_tax_credit_amount
            else:
              nj_pit_2026_property_tax_credit_amount
          else:
            0

  - name: nj_pit_2026_child_and_dependent_care_credit_selector
    kind: derived
    entity: TaxUnit
    dtype: Integer
    period: Year
    source: N.J. Stat. section 54A:4-17(a) taxable-income band selection
    metadata:
      private: true
      proof:
        atoms:
          - path: 'versions[0].formula'
            kind: condition
            source:
              corpus_citation_path: us-nj/statute/54a:4-17
              table: {header: "NJ taxable income is: Amount of NJ credit is:", row_key: taxable_income, column_key: federal_credit_percentage}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if nj_pit_2026_profile_candidate_taxable_income <= nj_pit_2026_child_and_dependent_care_first_upper_bound: 0
          else: if nj_pit_2026_profile_candidate_taxable_income <= nj_pit_2026_child_and_dependent_care_second_upper_bound: 1
          else: if nj_pit_2026_profile_candidate_taxable_income <= nj_pit_2026_child_and_dependent_care_third_upper_bound: 2
          else: if nj_pit_2026_profile_candidate_taxable_income <= nj_pit_2026_child_and_dependent_care_fourth_upper_bound: 3
          else: if nj_pit_2026_profile_candidate_taxable_income <= nj_pit_2026_child_and_dependent_care_fifth_upper_bound: 3 + 1
          else: 3 + 2

