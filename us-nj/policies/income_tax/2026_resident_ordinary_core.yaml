          - path: 'versions[0].formula'
            kind: exception
            source: {corpus_citation_path: us-nj/statute/54a:4-17, excerpt: "the amount of excess shall be treated as a refundable overpayment"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if nj_pit_2026_supported_profile_applies and nj_pit_2026_child_and_dependent_care_filing_status_eligible:
            nj_pit_2026_child_and_dependent_care_credit_rate
            * nj_pit_2026_federal_child_and_dependent_care_credit
          else:
