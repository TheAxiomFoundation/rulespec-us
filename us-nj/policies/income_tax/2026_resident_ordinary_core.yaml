        formula: |-
          if nj_pit_2026_profile_candidate_taxable_income <= nj_pit_2026_child_credit_first_upper_bound: 0
          else: if nj_pit_2026_profile_candidate_taxable_income <= nj_pit_2026_child_credit_second_upper_bound: 1
          else: if nj_pit_2026_profile_candidate_taxable_income <= nj_pit_2026_child_credit_third_upper_bound: 2
          else: if nj_pit_2026_profile_candidate_taxable_income <= nj_pit_2026_child_credit_fourth_upper_bound: 3
