            - nj_pit_2026_supported_profile_child_and_dependent_care_credit
            - nj_pit_2026_supported_profile_child_tax_credit
            - nj_pit_2026_supported_profile_earned_income_tax_credit
          else:
            0

inputs:
  - {name: nj_pit_2026_is_full_year_resident_return, entity: TaxUnit, dtype: Judgment, period: Year, description: Whether this is a full-year New Jersey resident return for the full tax year.}
  - {name: nj_pit_2026_filing_status_is_joint, entity: TaxUnit, dtype: Judgment, period: Year, description: Whether married filing jointly applies.}
  - {name: nj_pit_2026_filing_status_is_married_separate, entity: TaxUnit, dtype: Judgment, period: Year, description: Whether married filing separately applies.}
  - {name: nj_pit_2026_filing_status_is_head_of_household, entity: TaxUnit, dtype: Judgment, period: Year, description: Whether federal head-of-household status applies.}
  - {name: nj_pit_2026_filing_status_is_surviving_spouse, entity: TaxUnit, dtype: Judgment, period: Year, description: Whether federal surviving-spouse status applies.}
  - {name: nj_pit_2026_service_remuneration, entity: TaxUnit, dtype: Money, period: Year, unit: USD, description: Total cash and property remuneration received for services before the two expressly encoded exclusions but excluding the separately reported employer-furnished residence value or housing allowance.}
  - {name: nj_pit_2026_service_remuneration_excludes_employer_housing_value, entity: TaxUnit, dtype: Judgment, period: Year, description: Whether service remuneration excludes every amount separately reported as employer housing value, making the two inputs mutually exclusive.}
  - {name: nj_pit_2026_excluded_combat_zone_compensation, entity: TaxUnit, dtype: Money, period: Year, unit: USD, description: Service remuneration excluded federally under IRC section 112 for combat-zone service.}
  - {name: nj_pit_2026_excluded_election_board_compensation, entity: TaxUnit, dtype: Money, period: Year, unit: USD, description: Compensation received for qualifying district-board-of-elections services.}
  - {name: nj_pit_2026_property_disposition_proceeds, entity: TaxUnit, dtype: Money, period: Year, unit: USD, description: Aggregate proceeds from supported taxable property dispositions.}
  - {name: nj_pit_2026_property_adjusted_basis, entity: TaxUnit, dtype: Money, period: Year, unit: USD, description: Adjusted basis of the supported disposed property.}
  - {name: nj_pit_2026_property_disposition_expenses, entity: TaxUnit, dtype: Money, period: Year, unit: USD, description: Direct expenses of the supported property dispositions.}
  - {name: nj_pit_2026_rent_royalty_patent_and_copyright_receipts, entity: TaxUnit, dtype: Money, period: Year, unit: USD, description: Gross receipts in the supported rent royalty patent and copyright category.}
  - {name: nj_pit_2026_rent_royalty_patent_and_copyright_expenses, entity: TaxUnit, dtype: Money, period: Year, unit: USD, description: Direct expenses in the supported rent royalty patent and copyright category.}
