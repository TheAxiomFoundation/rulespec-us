      rationale: |-
        The pinned official New Jersey Legislature Title 54A package is current
        through July 16, 2026 and supplies the gross-income categories,
        exclusions, deductions, exemptions, no-tax thresholds, enacted
        post-2020 schedules, and the individual-credit inventory. The separately
        pinned official section 54A:4-7 record supplies the current 40-percent
        earned-income-credit rule.

        This bounded module starts from raw receipts, basis, expenses,
        household facts, and named federal credit outputs. It never accepts a
        completed New Jersey gross income, taxable income, deduction, exemption,
        rate, bracket, credit, or tax result. Interest or fund-distribution
        exclusion classification, gambling or New Jersey Lottery activity,
        alimony, and unresolved shared-responsibility-tax facts fail closed
        through typed holds. Medical disallowances and the simple homestead
        owner/renter shares are computed from raw payment and ownership facts.

        The pinned corpus does not contain the tax-year-2026 NJ-1040 and
        instructions, Director-prescribed credit ordering, cross-title program
        certifications, or the federal-law snapshots needed to compute every
        specialty branch from raw facts. The supported ordinary profile can
        nevertheless reach a source-grounded candidate through the refundable
        property-tax, child/dependent-care, child, and earned-income credits
        because their statutes provide their formulas and the profile excludes
        every competing credit. This candidate is not represented as complete
        statewide annual-return liability.
  summary: |-
    Incremental New Jersey tax-year-2026 full-year resident ordinary-income
    core. It
    constructs New Jersey gross income from raw service remuneration, property
    proceeds and basis, rent and royalty receipts and expenses, ordinary
    taxable interest and dividends, prizes, separately reported
    employer-provided housing, and illegal income. It applies category loss
    isolation, expressly supported exclusions, personal and dependent
    exemptions, medical
    deductions, conservation and organ-donor deductions, the NJBEST, NJCLASS,
    and in-State tuition deductions, and the simple owner-or-renter homestead
    property-tax deduction. It then applies the no-tax threshold and every
    enacted wide or narrow schedule bracket.

    For the supported profile, the module exposes tax before credits, tax after
    nonrefundable credits, and a net-liability candidate after the refundable
    $50 property-tax credit, New Jersey child/dependent-care credit, New Jersey
    child tax credit, and 40-percent earned-income credit. Unsupported or
    invalid profiles return zero from every public Money output; private
    candidate amounts remain diagnostic only.

    This module does not compute the State shared responsibility tax imposed by
    N.J.S.54A:11-3, and its net output is an income-tax-only candidate rather
    than total return tax. A typed hold excludes returns on which that special
    tax may apply.

    PolicyEngine parity remains unverified. The blanket `us-nj:` oracle
    `not_comparable` prefix is not evidence for these outputs. A separate
    axiom-oracles change must replace it, for this module, with output-specific
    evaluations for: supported gross income against `nj_total_income`;
    supported deductions/exemptions against `nj_total_deductions` and
    `nj_total_exemptions`; supported taxable income against `nj_taxable_income`;
    schedule tax against `nj_main_income_tax`; tax after nonrefundable credits
    against `nj_income_tax_before_refundable_credits`; property deduction and
    refundable credits against `nj_property_tax_deduction`,
    `nj_property_tax_credit`, `nj_cdcc`, `nj_ctc`, and `nj_eitc`; and the
    signed net-income-tax candidate against `nj_income_tax`. Each evaluation
    must use fixtures inside this module's supported profile, account for
    PolicyEngine's tax-sign convention, and remain pending until direct
    comparison passes. Private selectors, bounds, and fail-closed gates require
    exact output-specific incompatibility rationales rather than a state-wide
    prefix.
  deferred_outputs:
    - output: us-nj:policies/income_tax/2026_resident_ordinary_core#nj_pit_2026_complete_gross_income
      reason: |-
        Complete gross income requires transaction-level business, partnership,
        S-corporation, estate, trust, pension, annuity, IRA, benefit-plan,
        reorganization, qualified-fund, small-business-stock, education-account,
        and cross-title exclusion computations not established from raw facts
        by the pinned annual-return materials.
      source_values:
        - us-nj:policies/income_tax/2026_resident_ordinary_core#nj_pit_2026_supported_profile_gross_income
    - output: us-nj:policies/income_tax/2026_resident_ordinary_core#nj_pit_2026_complete_taxable_income
      reason: |-
        Complete taxable income additionally requires alternative-business-loss
        carryforwards, MSA and self-employed-health deductions, Health
        Enterprise Zone receipts, mixed and shared homestead allocations,
        reimbursement-base limitations, and current return instructions.
      source_values:
        - us-nj:policies/income_tax/2026_resident_ordinary_core#nj_pit_2026_supported_profile_taxable_income
    - output: us-nj:policies/income_tax/2026_resident_ordinary_core#nj_pit_2026_complete_tax_after_nonrefundable_credits
      reason: |-
        Title 54A contains other-jurisdiction, business, employment,
        apprenticeship, veteran, Gold Star, organ-donor-employer,
        environmental, and authority-certified credits whose cross-title
        eligibility and Director-prescribed ordering are absent.
      source_values:
        - us-nj:policies/income_tax/2026_resident_ordinary_core#nj_pit_2026_supported_profile_tax_after_nonrefundable_credits
    - output: us-nj:policies/income_tax/2026_resident_ordinary_core#nj_pit_2026_net_income_tax_liability
      reason: |-
        Complete net liability also requires the refundable pass-through entity
        credit, unemployment-contribution credit, veteran-caregiver credit, and
        all annual-return ordering. The exposed net amount is valid only for
        the explicit ordinary supported profile.
      source_values:
        - us-nj:policies/income_tax/2026_resident_ordinary_core#nj_pit_2026_supported_profile_candidate_net_income_tax_liability
    - output: us-nj:policies/income_tax/2026_resident_ordinary_core#nj_pit_2026_state_shared_responsibility_tax
      reason: |-
        N.J.S.54A:11-3 and 54A:11-4 create a separate State shared
        responsibility tax whose 2026 computation depends on the federal
        section 5000A rules frozen on December 15, 2017, State bronze-plan
        premiums, coverage-month facts, affordability, and exemptions not
        present in the pinned annual-return materials.
      source_values:
        - us-nj:policies/income_tax/2026_resident_ordinary_core#input.nj_pit_2026_state_shared_responsibility_tax_may_apply
    - output: us-nj:policies/income_tax/2026_resident_ordinary_core#nj_pit_2026_total_return_tax_liability
      reason: |-
        Total return tax must combine completed gross-income-tax liability with
        any State shared responsibility tax and other return-level liabilities.
        This incremental module exposes neither completed component nor their
        total.
      source_values:
        - us-nj:policies/income_tax/2026_resident_ordinary_core#nj_pit_2026_supported_profile_candidate_net_income_tax_liability

