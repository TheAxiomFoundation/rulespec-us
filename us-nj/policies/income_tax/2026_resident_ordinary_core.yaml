  - name: nj_pit_2026_child_and_dependent_care_filing_status_eligible
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: N.J. Stat. section 54A:4-17(c)
    metadata:
      private: true
      proof:
        atoms:
          - path: 'versions[0].formula'
            kind: condition
            source: {corpus_citation_path: us-nj/statute/54a:4-17, excerpt: "Married couples shall file a joint return in order to claim the credit"}
          - path: 'versions[0].formula'
            kind: exception
            source: {corpus_citation_path: us-nj/statute/54a:4-17, excerpt: "A taxpayer eligible to receive a credit pursuant to paragraph (3) or (4) of subsection (e) of section 21"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          not nj_pit_2026_filing_status_is_married_separate
          or (
            nj_pit_2026_mfs_spouses_lived_apart_last_six_months
            and nj_pit_2026_mfs_qualifying_individual_lived_with_taxpayer_more_than_half_year
            and nj_pit_2026_federal_cdcc_married_living_apart_exception_applies
          )

  - name: nj_pit_2026_supported_profile_child_and_dependent_care_credit
