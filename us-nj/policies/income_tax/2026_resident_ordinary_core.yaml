      proof:
        atoms:
          - path: 'versions[0].formula'
            kind: formula
            source: {corpus_citation_path: us-nj/statute/54a:4-7, excerpt: "after all other credits and payments"}
          - path: 'versions[0].formula'
            kind: formula
            source: {corpus_citation_path: us-nj/statute/54a:4-17.1, excerpt: "after all other credits and deductions"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if nj_pit_2026_supported_profile_applies:
