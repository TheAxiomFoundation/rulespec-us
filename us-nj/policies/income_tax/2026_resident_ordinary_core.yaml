  - name: nj_pit_2026_profile_candidate_schedule_tax
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: N.J. Stat. section 54A:2-1(a)(7) and (b)(7)
    metadata:
      private: true
      proof:
        atoms:
          - path: 'versions[0].formula'
            kind: formula
            source: {corpus_citation_path: us-nj/statute/54a:2-1, excerpt: "If the taxable income is: The tax is:"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if nj_pit_2026_profile_candidate_gross_income <= nj_pit_2026_no_tax_gross_income_threshold[nj_pit_2026_no_tax_threshold_selector]:
            0
          else: if nj_pit_2026_wide_schedule_applies:
            nj_pit_2026_wide_bracket_base[nj_pit_2026_wide_bracket_selector]
            + nj_pit_2026_wide_bracket_rate[nj_pit_2026_wide_bracket_selector]
            * max(0, nj_pit_2026_profile_candidate_taxable_income - nj_pit_2026_wide_bracket_floor[nj_pit_2026_wide_bracket_selector])
          else:
            nj_pit_2026_narrow_bracket_base[nj_pit_2026_narrow_bracket_selector]
            + nj_pit_2026_narrow_bracket_rate[nj_pit_2026_narrow_bracket_selector]
            * max(0, nj_pit_2026_profile_candidate_taxable_income - nj_pit_2026_narrow_bracket_floor[nj_pit_2026_narrow_bracket_selector])

  - name: nj_pit_2026_supported_profile_tax_before_credits
