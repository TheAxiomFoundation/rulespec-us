  - name: nj_pit_2026_filing_and_household_input_domain_is_valid
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: Fail-closed domain for mutually exclusive filing statuses and household counts
    metadata:
      private: true
      proof:
        atoms:
          - path: 'versions[0].formula'
            kind: condition
            source: {corpus_citation_path: us-nj/statute/54a:1-2, excerpt: '"Head of household," "married," "filing jointly," and "filing separately"'}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          not (nj_pit_2026_filing_status_is_joint and nj_pit_2026_filing_status_is_married_separate)
          and not (nj_pit_2026_filing_status_is_joint and nj_pit_2026_filing_status_is_head_of_household)
          and not (nj_pit_2026_filing_status_is_joint and nj_pit_2026_filing_status_is_surviving_spouse)
          and not (nj_pit_2026_filing_status_is_married_separate and nj_pit_2026_filing_status_is_head_of_household)
          and not (nj_pit_2026_filing_status_is_married_separate and nj_pit_2026_filing_status_is_surviving_spouse)
          and not (nj_pit_2026_filing_status_is_head_of_household and nj_pit_2026_filing_status_is_surviving_spouse)
          and nj_pit_2026_dependent_count >= 0
          and nj_pit_2026_full_time_student_dependent_count >= 0
          and nj_pit_2026_full_time_student_dependent_count <= nj_pit_2026_dependent_count
          and nj_pit_2026_child_under_age_six_count >= 0
          and nj_pit_2026_child_under_age_six_count <= nj_pit_2026_dependent_count
          and nj_pit_2026_taxpayer_and_joint_spouse_age_65_count >= 0
          and nj_pit_2026_taxpayer_and_joint_spouse_age_65_count <= 2
          and nj_pit_2026_taxpayer_and_joint_spouse_blind_or_disabled_count >= 0
          and nj_pit_2026_taxpayer_and_joint_spouse_blind_or_disabled_count <= 2
          and nj_pit_2026_taxpayer_and_joint_spouse_veteran_count >= 0
          and nj_pit_2026_taxpayer_and_joint_spouse_veteran_count <= 2
          and (nj_pit_2026_filing_status_is_joint or nj_pit_2026_taxpayer_and_joint_spouse_age_65_count <= 1)
          and (nj_pit_2026_filing_status_is_joint or nj_pit_2026_taxpayer_and_joint_spouse_blind_or_disabled_count <= 1)
          and (nj_pit_2026_filing_status_is_joint or nj_pit_2026_taxpayer_and_joint_spouse_veteran_count <= 1)

