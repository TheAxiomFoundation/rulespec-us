          - path: 'versions[0].formula'
            kind: exception
            source: {corpus_citation_path: us-nj/statute/54a:5-1, excerpt: "Distributive share of partnership income"}
          - path: 'versions[0].formula'
            kind: exception
            source: {corpus_citation_path: us-nj/statute/54a:5-1, excerpt: "Net pro rata share of S corporation income"}
          - path: 'versions[0].formula'
            kind: exception
            source: {corpus_citation_path: us-nj/statute/54a:4-1, excerpt: "credit against the tax otherwise due under this act"}
          - path: 'versions[0].formula'
            kind: exception
            source: {corpus_citation_path: us-nj/statute/54a:12-5, excerpt: "refundable credit against the tax imposed"}
          - path: 'versions[0].formula'
            kind: exception
            source: {corpus_citation_path: us-nj/statute/54a:6-11, excerpt: "New Jersey Lottery winnings from a prize in an amount exceeding $10,000 shall be included in gross income"}
          - path: 'versions[0].formula'
            kind: exception
            source: {corpus_citation_path: us-nj/statute/54a:11-3, excerpt: "there shall be imposed a State shared responsibility tax"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          nj_pit_2026_input_domain_is_valid
          and nj_pit_2026_is_full_year_resident_return
          and nj_pit_2026_no_deferred_income_branch_applies
          and nj_pit_2026_no_deferred_credit_or_total_tax_branch_applies
          and nj_pit_2026_supported_election_consistency

  - name: nj_pit_2026_profile_candidate_service_income
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: N.J. Stat. sections 54A:5-1(a), 54A:6-32, and 54A:6-33
    metadata:
      private: true
      proof:
        atoms:
          - path: 'versions[0].formula'
            kind: formula
            source: {corpus_citation_path: us-nj/statute/54a:5-1, excerpt: "Salaries, wages, tips, fees, commissions, bonuses, and other remuneration received for services rendered"}
          - path: 'versions[0].formula'
            kind: exception
            source: {corpus_citation_path: us-nj/statute/54a:6-32, excerpt: "Gross income shall not include amounts received as combat zone compensation"}
          - path: 'versions[0].formula'
            kind: exception
            source: {corpus_citation_path: us-nj/statute/54a:6-33, excerpt: "shall not include any compensation received"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: nj_pit_2026_service_remuneration - nj_pit_2026_excluded_combat_zone_compensation - nj_pit_2026_excluded_election_board_compensation

  - name: nj_pit_2026_profile_candidate_property_gain
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: N.J. Stat. sections 54A:5-1(c) and 54A:5-2
    metadata:
      private: true
      proof:
        atoms:
          - path: 'versions[0].formula'
            kind: formula
            source: {corpus_citation_path: us-nj/statute/54a:5-1, excerpt: "Net gains or net income, less net losses, derived from the sale, exchange or other disposition of property"}
          - path: 'versions[0].formula'
            kind: condition
            source: {corpus_citation_path: us-nj/statute/54a:5-2, excerpt: "a net loss in one category of gross income may not be applied against gross income in another category"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: max(0, nj_pit_2026_property_disposition_proceeds - nj_pit_2026_property_adjusted_basis - nj_pit_2026_property_disposition_expenses)

  - name: nj_pit_2026_profile_candidate_rent_royalty_patent_and_copyright_income
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: N.J. Stat. sections 54A:5-1(d) and 54A:5-2
    metadata:
      private: true
      proof:
        atoms:
          - path: 'versions[0].formula'
            kind: formula
            source: {corpus_citation_path: us-nj/statute/54a:5-1, excerpt: "Net gains or net income derived from or in the form of rents, royalties, patents, and copyrights"}
          - path: 'versions[0].formula'
            kind: condition
            source: {corpus_citation_path: us-nj/statute/54a:5-2, excerpt: "a net loss in one category of gross income may not be applied against gross income in another category"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: max(0, nj_pit_2026_rent_royalty_patent_and_copyright_receipts - nj_pit_2026_rent_royalty_patent_and_copyright_expenses)

  - name: nj_pit_2026_profile_candidate_gross_income
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: N.J. Stat. section 54A:5-1 ordinary supported categories
    metadata:
      private: true
      proof:
        atoms:
          - path: 'versions[0].formula'
            kind: formula
            source: {corpus_citation_path: us-nj/statute/54a:5-1, excerpt: "New Jersey gross income shall consist of the following categories of income"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          nj_pit_2026_profile_candidate_service_income
          + nj_pit_2026_profile_candidate_property_gain
          + nj_pit_2026_profile_candidate_rent_royalty_patent_and_copyright_income
          + nj_pit_2026_interest_receipts
          + nj_pit_2026_dividend_receipts
          + nj_pit_2026_prizes_and_awards
          + nj_pit_2026_employer_housing_value
          + nj_pit_2026_illegal_income

  - name: nj_pit_2026_supported_profile_gross_income
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Supported-profile New Jersey gross income
    metadata:
      proof:
        atoms:
          - path: 'versions[0].formula'
            kind: formula
            source: {corpus_citation_path: us-nj/statute/54a:5-1, excerpt: "New Jersey gross income shall consist of the following categories of income"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: "if nj_pit_2026_supported_profile_applies: nj_pit_2026_profile_candidate_gross_income else: 0"

  - name: nj_pit_2026_profile_candidate_personal_and_dependent_exemptions
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: N.J. Stat. sections 54A:3-1 and 54A:3-1.1
    metadata:
      private: true
      proof:
        atoms:
          - path: 'versions[0].formula'
            kind: amount
            source: {corpus_citation_path: us-nj/statute/54a:3-1, excerpt: "Each taxpayer shall be allowed a personal exemption of $1,000.00"}
          - path: 'versions[0].formula'
            kind: amount
            source: {corpus_citation_path: us-nj/statute/54a:3-1, excerpt: "For each dependent who qualifies as a dependent of the taxpayer during the taxable year for federal income tax purposes - $1,500.00"}
          - path: 'versions[0].formula'
            kind: amount
            source: {corpus_citation_path: us-nj/statute/54a:3-1, excerpt: "Taxpayer who is a veteran honorably discharged or released under honorable circumstances"}
          - path: 'versions[0].formula'
            kind: amount
            source: {corpus_citation_path: us-nj/statute/54a:3-1.1, excerpt: "an additional exemption which may be taken as a deduction from his New Jersey gross income in amount of $1,000.00"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          nj_pit_2026_personal_exemption_amount
          * (
            1
            + (if nj_pit_2026_filing_status_is_joint: 1 else: 0)
            + nj_pit_2026_taxpayer_and_joint_spouse_age_65_count
            + nj_pit_2026_taxpayer_and_joint_spouse_blind_or_disabled_count
            + nj_pit_2026_full_time_student_dependent_count
          )
          + nj_pit_2026_dependent_exemption_amount * nj_pit_2026_dependent_count
          + nj_pit_2026_veteran_exemption_amount * nj_pit_2026_taxpayer_and_joint_spouse_veteran_count

  - name: nj_pit_2026_profile_candidate_allowable_medical_expenses
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: N.J. Stat. sections 54A:1-2(g) and 54A:3-3(c)
    metadata:
      private: true
      proof:
        atoms:
          - path: 'versions[0].formula'
            kind: formula
            source: {corpus_citation_path: us-nj/statute/54a:3-3, excerpt: "Disallowance of amounts allowed for other purposes"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          max(
            0,
            nj_pit_2026_medical_care_payments
            - nj_pit_2026_medical_expense_reimbursements
            - nj_pit_2026_medical_expenses_used_for_household_and_dependent_care
            - nj_pit_2026_medical_expenses_paid_from_excluded_medical_savings_account_distributions
            - nj_pit_2026_medical_expenses_used_for_self_employed_health_insurance_deduction
          )

  - name: nj_pit_2026_profile_candidate_medical_expense_deduction
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: N.J. Stat. section 54A:3-3(a)
    metadata:
      private: true
      proof:
        atoms:
          - path: 'versions[0].formula'
            kind: formula
            source: {corpus_citation_path: us-nj/statute/54a:3-3, excerpt: "to the extent that such medical expenses exceed 2% of the taxpayer's gross income"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: max(0, nj_pit_2026_profile_candidate_allowable_medical_expenses - nj_pit_2026_medical_expense_gross_income_floor_rate * nj_pit_2026_profile_candidate_gross_income)

  - name: nj_pit_2026_profile_candidate_organ_donor_deduction
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: N.J. Stat. section 54A:3-10
    metadata:
      private: true
      proof:
        atoms:
          - path: 'versions[0].formula'
            kind: amount
            source: {corpus_citation_path: us-nj/statute/54a:3-10, excerpt: "allowed to deduct from gross income up to $10,000 of unreimbursed expenses"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: "if nj_pit_2026_organ_donation_occurred: min(nj_pit_2026_organ_donor_deduction_cap, max(0, nj_pit_2026_organ_donor_unreimbursed_travel_lodging_and_lost_wages)) else: 0"

  - name: nj_pit_2026_profile_candidate_education_deductions
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: N.J. Stat. sections 54A:3-12 through 54A:3-14
    metadata:
      private: true
      proof:
        atoms:
          - path: 'versions[0].formula'
            kind: amount
            source: {corpus_citation_path: us-nj/statute/54a:3-12, excerpt: "gross income of $200,000 or less"}
          - path: 'versions[0].formula'
            kind: amount
            source: {corpus_citation_path: us-nj/statute/54a:3-12, excerpt: "not to exceed $10,000"}
          - path: 'versions[0].formula'
            kind: amount
            source: {corpus_citation_path: us-nj/statute/54a:3-13, excerpt: "not to exceed $2,500"}
          - path: 'versions[0].formula'
            kind: amount
            source: {corpus_citation_path: us-nj/statute/54a:3-14, excerpt: "not to exceed $10,000"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if nj_pit_2026_profile_candidate_gross_income <= nj_pit_2026_education_deduction_gross_income_limit:
            min(nj_pit_2026_njbest_deduction_cap, nj_pit_2026_njbest_contributions)
            + min(nj_pit_2026_njclass_deduction_cap, nj_pit_2026_njclass_principal_and_interest_paid)
            + min(nj_pit_2026_tuition_deduction_cap, nj_pit_2026_in_state_higher_education_tuition_paid)
          else:
            0

  - name: nj_pit_2026_profile_candidate_property_tax_benefit_base
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: N.J. Stat. sections 54A:3A-16 through 54A:3A-18
    metadata:
      private: true
      proof:
        atoms:
          - path: 'versions[0].formula'
            kind: parameter
            source: {corpus_citation_path: us-nj/statute/54a:3a-16, excerpt: "\"Rent constituting property taxes\" means 18% of the rent paid"}
          - path: 'versions[0].formula'
            kind: amount
            source: {corpus_citation_path: us-nj/statute/54a:3a-17, excerpt: "the total of which shall not exceed $15,000"}
          - path: 'versions[0].formula'
            kind: amount
            source: {corpus_citation_path: us-nj/statute/54a:3a-18, excerpt: "rent constituting property taxes not in excess of $15,000"}
          - path: 'versions[0].formula'
            kind: formula
            source: {corpus_citation_path: us-nj/statute/54a:3a-17, excerpt: "that husband and wife shall each be entitled to one-half of the deduction"}
          - path: 'versions[0].formula'
            kind: formula
            source: {corpus_citation_path: us-nj/statute/54a:3a-18, excerpt: "shall each be entitled to one-half of the property tax deduction"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if nj_pit_2026_filing_status_is_married_separate and nj_pit_2026_mfs_spouses_own_or_rent_same_homestead:
            nj_pit_2026_mfs_property_benefit_share
            * min(
              nj_pit_2026_property_tax_deduction_cap,
              nj_pit_2026_homestead_total_property_taxes_due_and_paid
              + nj_pit_2026_rent_constituting_property_tax_rate
              * nj_pit_2026_homestead_total_rent_paid
            )
          else:
            min(
              nj_pit_2026_property_tax_deduction_cap,
              nj_pit_2026_homestead_taxpayer_title_interest_rate
              * nj_pit_2026_homestead_total_property_taxes_due_and_paid
              + nj_pit_2026_rent_constituting_property_tax_rate
              * nj_pit_2026_homestead_rent_paid_by_taxpayer
            )

  - name: nj_pit_2026_profile_candidate_property_tax_deduction
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: N.J. Stat. section 54A:3A-20 election of credit instead of deduction
    metadata:
      private: true
      proof:
        atoms:
          - path: 'versions[0].formula'
            kind: exception
            source: {corpus_citation_path: us-nj/statute/54a:3a-20, excerpt: "may elect to take a credit instead of the deduction"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: "if nj_pit_2026_elect_property_tax_credit: 0 else: nj_pit_2026_profile_candidate_property_tax_benefit_base"

  - name: nj_pit_2026_profile_candidate_total_deductions_and_exemptions
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: N.J. Stat. chapter 54A:3 supported deductions and exemptions
    metadata:
      private: true
      proof:
        atoms:
          - path: 'versions[0].formula'
            kind: formula
            source: {corpus_citation_path: us-nj/statute/54a:3-1, excerpt: "personal exemptions and deductions against his gross income"}
          - path: 'versions[0].formula'
            kind: formula
            source: {corpus_citation_path: us-nj/statute/54a:3-2, excerpt: "There shall be allowed as a deduction amounts includible under section 54A:5-1(n)"}
          - path: 'versions[0].formula'
            kind: formula
            source: {corpus_citation_path: us-nj/statute/54a:3-6, excerpt: "allowed a deduction against gross income for a qualified conservation contribution"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          nj_pit_2026_profile_candidate_personal_and_dependent_exemptions
          + nj_pit_2026_profile_candidate_medical_expense_deduction
          + nj_pit_2026_federal_qualified_conservation_contribution_deduction
          + nj_pit_2026_profile_candidate_organ_donor_deduction
          + nj_pit_2026_profile_candidate_education_deductions
          + nj_pit_2026_profile_candidate_property_tax_deduction

  - name: nj_pit_2026_supported_profile_total_deductions_and_exemptions
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Supported-profile deductions and exemptions
    metadata:
      proof:
        atoms:
          - path: 'versions[0].formula'
            kind: formula
            source: {corpus_citation_path: us-nj/statute/54a:3-1, excerpt: "personal exemptions and deductions against his gross income"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: "if nj_pit_2026_supported_profile_applies: nj_pit_2026_profile_candidate_total_deductions_and_exemptions else: 0"

  - name: nj_pit_2026_profile_candidate_taxable_income
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: N.J. Stat. section 54A:2-1 taxable income after deductions and limitations
    metadata:
      private: true
      proof:
        atoms:
          - path: 'versions[0].formula'
            kind: formula
            source: {corpus_citation_path: us-nj/statute/54a:2-1, excerpt: "subject to the deductions, limitations and modifications hereinafter provided"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: max(0, nj_pit_2026_profile_candidate_gross_income - nj_pit_2026_profile_candidate_total_deductions_and_exemptions)

  - name: nj_pit_2026_supported_profile_taxable_income
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Supported-profile taxable income
    metadata:
      proof:
        atoms:
          - path: 'versions[0].formula'
            kind: formula
            source: {corpus_citation_path: us-nj/statute/54a:2-1, excerpt: "subject to the deductions, limitations and modifications hereinafter provided"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: "if nj_pit_2026_supported_profile_applies: max(0, nj_pit_2026_profile_candidate_taxable_income) else: 0"

  - name: nj_pit_2026_wide_schedule_applies
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: N.J. Stat. section 54A:2-1(a)(7)
    metadata:
      private: true
      proof:
        atoms:
          - path: 'versions[0].formula'
            kind: condition
            source: {corpus_citation_path: us-nj/statute/54a:2-1, excerpt: "For married individuals filing a joint return, individuals filing as head of household or as surviving spouse"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: nj_pit_2026_filing_status_is_joint or nj_pit_2026_filing_status_is_head_of_household or nj_pit_2026_filing_status_is_surviving_spouse

  - name: nj_pit_2026_no_tax_threshold_selector
    kind: derived
    entity: TaxUnit
    dtype: Integer
    period: Year
    source: N.J. Stat. section 54A:2-4 filing-status threshold selection
    metadata:
      private: true
      proof:
        atoms:
          - path: 'versions[0].formula'
            kind: condition
            source: {corpus_citation_path: us-nj/statute/54a:2-4, excerpt: "The taxpayer is determining tax pursuant to subsection a. of N.J.S.54A:2-1, or is a married couple filing a joint return"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: "if nj_pit_2026_wide_schedule_applies: 1 else: 0"

  - name: nj_pit_2026_no_tax_gross_income_threshold
    kind: parameter
    dtype: Money
    unit: USD
    indexed_by: nj_pit_2026_no_tax_threshold_selector
    source: N.J. Stat. section 54A:2-4
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].values
            kind: parameter_table
            source:
              corpus_citation_path: us-nj/statute/54a:2-4
              table: {header: "Post-2001 no-tax gross-income thresholds", row_key: filing_status_group, column_key: gross_income_threshold}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        values: {0: 10000, 1: 20000}

  - name: nj_pit_2026_wide_bracket_selector
    kind: derived
    entity: TaxUnit
    dtype: Integer
    period: Year
    source: N.J. Stat. section 54A:2-1(a)(7)
    metadata:
      private: true
      proof:
        atoms:
          - path: 'versions[0].formula'
            kind: formula
            source: {corpus_citation_path: us-nj/statute/54a:2-1, excerpt: "for taxable years beginning on or after January 1, 2020"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if nj_pit_2026_profile_candidate_taxable_income <= nj_pit_2026_wide_first_upper_bound: 0
          else: if nj_pit_2026_profile_candidate_taxable_income <= nj_pit_2026_wide_second_upper_bound: 1
          else: if nj_pit_2026_profile_candidate_taxable_income <= nj_pit_2026_wide_third_upper_bound: 2
          else: if nj_pit_2026_profile_candidate_taxable_income <= nj_pit_2026_wide_fourth_upper_bound: 3
          else: if nj_pit_2026_profile_candidate_taxable_income <= nj_pit_2026_wide_fifth_upper_bound: 4
          else: if nj_pit_2026_profile_candidate_taxable_income <= nj_pit_2026_wide_sixth_upper_bound: 5
          else: if nj_pit_2026_profile_candidate_taxable_income <= nj_pit_2026_wide_seventh_upper_bound: 6
          else: 7

  - name: nj_pit_2026_narrow_bracket_selector
    kind: derived
    entity: TaxUnit
    dtype: Integer
    period: Year
    source: N.J. Stat. section 54A:2-1(b)(7)
    metadata:
      private: true
      proof:
        atoms:
          - path: 'versions[0].formula'
            kind: formula
            source: {corpus_citation_path: us-nj/statute/54a:2-1, excerpt: "for taxable years beginning on or after January 1, 2020"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if nj_pit_2026_profile_candidate_taxable_income <= nj_pit_2026_narrow_first_upper_bound: 0
          else: if nj_pit_2026_profile_candidate_taxable_income <= nj_pit_2026_narrow_second_upper_bound: 1
          else: if nj_pit_2026_profile_candidate_taxable_income <= nj_pit_2026_narrow_third_upper_bound: 2
          else: if nj_pit_2026_profile_candidate_taxable_income <= nj_pit_2026_narrow_fourth_upper_bound: 3
          else: if nj_pit_2026_profile_candidate_taxable_income <= nj_pit_2026_narrow_fifth_upper_bound: 4
          else: if nj_pit_2026_profile_candidate_taxable_income <= nj_pit_2026_narrow_sixth_upper_bound: 5
          else: 6

