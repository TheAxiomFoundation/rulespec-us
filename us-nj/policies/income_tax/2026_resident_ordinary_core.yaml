  - name: nj_pit_2026_supported_profile_child_tax_credit
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: N.J. Stat. section 54A:4-17.1
    metadata:
      proof:
        atoms:
          - path: 'versions[0].formula'
            kind: formula
            source: {corpus_citation_path: us-nj/statute/54a:4-17.1, excerpt: "for each child who has not attained the age of six years"}
          - path: 'versions[0].formula'
            kind: exception
            source: {corpus_citation_path: us-nj/statute/54a:4-17.1, excerpt: "the amount of excess shall be treated as a refundable overpayment"}
          - path: 'versions[0].formula'
            kind: condition
            source: {corpus_citation_path: us-nj/statute/54a:4-17.1, excerpt: "a taxpayer shall file a joint return if the taxpayer is married"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if nj_pit_2026_supported_profile_applies and not nj_pit_2026_filing_status_is_married_separate:
            nj_pit_2026_child_under_age_six_count * nj_pit_2026_child_credit_per_child
          else:
            0

  - name: nj_pit_2026_earned_income_credit_rate
