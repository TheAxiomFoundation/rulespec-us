module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/form/cms/medicaid-chip-bhp-eligibility-levels
  summary: |-
    The table provides MAGI eligibility levels as percentages of FPL, based on state decisions as of December 1, 2023. New Jersey row: Children Medicaid Ages 0-1 194%; Children Medicaid Ages 1-5 142%; Children Medicaid Ages 6-18 142%; Children Separate CHIP 350%; Pregnant Women Medicaid 194%; Pregnant Women CHIP 200%; Adults (Medicaid) Parent/Caretaker 26%($); Adults (Medicaid) Expansion to Adults 133%. The MAGI-based rules generally include a 5% FPL disregard.
