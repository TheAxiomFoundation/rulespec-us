format: rulespec/v1
imports:
  - us:statutes/42/1397jj/c/1#child
  - us-nj:policies/cms/new-jersey-medicaid-chip-bhp-eligibility-levels#new_jersey_children_separate_chip_effective_fpl_limit
  - us-nj:policies/cms/new-jersey-medicaid-chip-bhp-eligibility-levels#new_jersey_pregnant_women_chip_fpl_limit
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/form/cms/medicaid-chip-bhp-eligibility-levels
  summary: |-
    New Jersey CHIP eligibility composition applies the federal CHIP child and standard-pregnant eligibility framework to the CMS state eligibility-level outputs. It intentionally does not encode FCEP state income limits until primary state-plan or CMS source coverage is available.
rules:
  - name: new_jersey_separate_chip_child_eligibility_available
    kind: derived
    dtype: Boolean
    period: Year
    source: CMS Medicaid, CHIP and BHP Eligibility Levels table, New Jersey row
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/form/cms/medicaid-chip-bhp-eligibility-levels
              excerpt: "Children Separate CHIP"
    versions:
      - effective_from: '2023-12-01'
        formula: |-
          true
  - name: is_chip_eligible_child
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 42 USC 1397jj(b)(1), 42 USC 1397jj(c)(1), and CMS state CHIP eligibility levels
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: import
            import:
              target: us:statutes/42/1397jj/c/1#child
              output: child
              hash: sha256:5983f9bd1c30a824da826ee4bc8fc3351cd2c631d4a0ce198b156446493ef9e0
          - path: versions[0].formula
            kind: import
            import:
              target: us-nj:policies/cms/new-jersey-medicaid-chip-bhp-eligibility-levels#new_jersey_children_separate_chip_effective_fpl_limit
              output: new_jersey_children_separate_chip_effective_fpl_limit
              hash: sha256:6526c35b389e3c596dc6114df30ac1f890beabe4b7a4c88d52107730916c8610
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/1397jj/b/1
              excerpt: "not found eligible for medical assistance under subchapter XIX"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/form/cms/medicaid-chip-bhp-eligibility-levels
              excerpt: "Children Separate CHIP"
    versions:
      - effective_from: '2023-12-01'
        formula: |-
          child
          and person_meets_chip_immigration_requirement
          and not found_eligible_for_medical_assistance_under_subchapter_xix
          and medicaid_income_level <= new_jersey_children_separate_chip_effective_fpl_limit
  - name: new_jersey_standard_pregnant_chip_eligibility_available
    kind: derived
    dtype: Boolean
    period: Year
    source: CMS Medicaid, CHIP and BHP Eligibility Levels table, New Jersey row
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/form/cms/medicaid-chip-bhp-eligibility-levels
              excerpt: "Pregnant Women CHIP"
    versions:
      - effective_from: '2023-12-01'
        formula: |-
          true
  - name: is_chip_eligible_standard_pregnant_person
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 42 USC 1397ll(d)(2) and CMS state CHIP eligibility levels
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: import
            import:
              target: us-nj:policies/cms/new-jersey-medicaid-chip-bhp-eligibility-levels#new_jersey_pregnant_women_chip_fpl_limit
              output: new_jersey_pregnant_women_chip_fpl_limit
              hash: sha256:6526c35b389e3c596dc6114df30ac1f890beabe4b7a4c88d52107730916c8610
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/42/1397ll/d/2
              excerpt: "targeted low-income pregnant woman"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/form/cms/medicaid-chip-bhp-eligibility-levels
              excerpt: "Pregnant Women CHIP"
    versions:
      - effective_from: '2023-12-01'
        formula: |-
          person_is_pregnant
          and person_meets_chip_immigration_requirement
          and not found_eligible_for_medical_assistance_under_subchapter_xix
          and medicaid_income_level <= new_jersey_pregnant_women_chip_fpl_limit
