format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nj/regulation/njac-10-90/10-90-3.19
  summary: |-
    Exempt income is not considered in determining initial and continued eligibility for assistance or in computing the amount of WFNJ cash assistance payments. The listed exempt sources include tax refunds, property tax rebates, EITC payments, specified WIA income and allowances, qualifying student earnings and aid, SSI for WFNJ/TANF, income-in-kind, kinship subsidies, Individual Development Accounts, specified special-purpose and Federal funds, criminal injury compensation, temporary census earnings, and supplemental participant allowance payments.
rules:
  - name: tax_training_and_student_income_exempt_source
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: us-nj/regulation/njac-10-90/10-90-3.19(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nj/regulation/njac-10-90/10-90-3.19
              excerpt: "The following sources of income shall be exempt: 1. Income tax refunds; 2. Homestead property tax rebates; 3. Earned income tax credit (EITC) payments"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          payment_is_income_tax_refund
          or payment_is_homestead_property_tax_rebate
          or payment_is_earned_income_tax_credit_payment
          or payment_is_unearned_wia_income_received_by_wfnj_dependent_child
          or payment_is_earned_wia_income_received_by_wfnj_dependent_child
          or payment_is_wia_training_expense_allowance_for_wfnj_recipient
          or payment_is_earned_income_of_qualifying_middle_or_secondary_school_student_in_assistance_unit
          or payment_is_qualifying_student_financial_aid
  - name: benefit_subsidy_and_account_income_exempt_source
    kind: derived
    entity: Payment
