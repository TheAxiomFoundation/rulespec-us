format: rulespec/v1
imports:
  - us-nj:regulations/njac-10-90/10-90-3/3#tanf_initial_maximum_allowable_income_level
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nj/regulation/njac-10-90/10-90-3.2
  summary: |-
    "For the initial financial eligibility test" for WFNJ/TANF new applicants, reapplicants, or reopened cases, all countable income available to the assistance unit is compared to the initial maximum allowable income level in Schedule I at N.J.A.C. 10:90-3.3. Eligibility exists if income is equal to or less than that level. Initial maximum allowable income levels are based on 150 percent of maximum benefit payment levels.
rules:
  - name: dependent_children_tanf_initial_income_limit_percentage
    kind: parameter
    dtype: Rate
    source: N.J.A.C. 10:90-3.2(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nj/regulation/njac-10-90/10-90-3.2
              excerpt: "based on 150 percent of the maximum benefit payment levels"
    versions:
      - effective_from: '2023-07-10'
        formula: |-
          1.50

  - name: nj_wfnj_gross_income_eligible
    kind: derived
    entity: TanfUnit
    dtype: Judgment
    period: Month
    source: N.J.A.C. 10:90-3.2(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nj/regulation/njac-10-90/10-90-3.2
              excerpt: "assistance units applying for WFNJ/TANF as a new applicant, reapplicant or reopened case"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nj/regulation/njac-10-90/10-90-3.2
              excerpt: "all countable income available to the assistance unit shall be considered and compared to the initial maximum allowable income levels"
          - path: versions[0].formula
            kind: import
            import:
              target: us-nj:regulations/njac-10-90/10-90-3/3#tanf_initial_maximum_allowable_income_level
              output: tanf_initial_maximum_allowable_income_level
              hash: sha256:c28a7f8daa9e557b791fb08e1cd3a5e2563b32b30b17247d30f5396c69f8a35e
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nj/regulation/njac-10-90/10-90-3.2
              excerpt: "If the assistance unit has income equal to or less than the initial maximum allowable income level"
    versions:
      - effective_from: '2023-07-10'
        formula: |-
          assistance_unit_has_dependent_children
          and case_is_new_reapplicant_or_reopened
          and countable_income_available_to_assistance_unit <= tanf_initial_maximum_allowable_income_level
