format: rulespec/v1
imports:
- us-nj:regulations/njac-10-90/10-90-3/19#income_source_exempt_for_wfnj_cash_assistance
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nj/regulation/njac-10-90/10-90-3.9
  summary: Income is either countable or exempt; exempt income is addressed at N.J.A.C.
    10:90-3.19. Income includes earned or unearned sources. Earned income includes
    wages, tips, salaries, commissions, self-employment income, and certain one-payment
    settlements; renewable-contract earnings are averaged over 12 months. Self-employment
    earned income is total profit from gross receipts compared with business expenses.
    Farmer net-loss offsets, failing-business assistance limits, and lump-sum income
    treatment require separate accounting or cross-referenced mechanics.
  deferred_outputs:
  - output: us-nj:regulations/njac-10-90/10-90-3/9/d/3#self_employed_farmer_net_loss_offset
    reason: Self-employed farmer net-loss proration and ordered offsets require a
      broader income-deduction accounting model not defined in this source slice.
    source_values:
    - us:regulations/njac-10-90/10-90-3/9#self_employed_farmer_annual_gross_earnings_loss_offset_threshold
  - output: us-nj:regulations/njac-10-90/10-90-3/9/d/5#failing_business_assistance_limitation
    reason: The failing-business rule depends on State minimum wage and agency judgment
      about whether additional time would enable a new business to show a profit.
    source_values:
    - us:regulations/njac-10-90/10-90-3/9#established_business_operation_months_for_failing_business_test
    - us:regulations/njac-10-90/10-90-3/9#failing_business_minimum_weekly_hours_multiplier
    - us:regulations/njac-10-90/10-90-3/9#new_business_initial_evaluation_months
    - us:regulations/njac-10-90/10-90-3/9#new_business_additional_extension_months
  - output: us-nj:regulations/njac-10-90/10-90-3/9/f#lump_sum_income_treatment
    reason: Lump sum income treatment is cross-referenced to N.J.A.C. 10:90-3.18,
      which is not supplied as executable context for this source unit.
rules:
- name: renewable_contract_average_months
  kind: parameter
  dtype: Count
  source: N.J.A.C. 10:90-3.9(c)1
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-nj/regulation/njac-10-90/10-90-3.9
          excerpt: averaged over a 12-month period
  versions:
  - effective_from: '2024-12-16'
    formula: '12'
- name: self_employed_farmer_annual_gross_earnings_loss_offset_threshold
  kind: parameter
  dtype: Money
  unit: USD
  period: Year
  source: N.J.A.C. 10:90-3.9(d)3
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-nj/regulation/njac-10-90/10-90-3.9
          excerpt: annual gross earnings of $ 1,000 or more
  versions:
  - effective_from: '2024-12-16'
    formula: '1000'
- name: established_business_operation_months_for_failing_business_test
  kind: parameter
  dtype: Count
  source: N.J.A.C. 10:90-3.9(d)5i
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-nj/regulation/njac-10-90/10-90-3.9
          excerpt: in operation for at least 24 months
  versions:
  - effective_from: '2024-12-16'
    formula: '24'
- name: failing_business_minimum_weekly_hours_multiplier
  kind: parameter
  dtype: Count
  source: N.J.A.C. 10:90-3.9(d)5i
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-nj/regulation/njac-10-90/10-90-3.9
          excerpt: State minimum wage multiplied by 35 hours per week
  versions:
  - effective_from: '2024-12-16'
    formula: '35'
- name: new_business_initial_evaluation_months
  kind: parameter
  dtype: Count
  source: N.J.A.C. 10:90-3.9(d)5ii
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-nj/regulation/njac-10-90/10-90-3.9
          excerpt: not to exceed 12 months from the start of the new business
  versions:
  - effective_from: '2024-12-16'
    formula: '12'
- name: new_business_additional_extension_months
  kind: parameter
  dtype: Count
  source: N.J.A.C. 10:90-3.9(d)5ii
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-nj/regulation/njac-10-90/10-90-3.9
          excerpt: extended for up to 12 additional months
  versions:
  - effective_from: '2024-12-16'
    formula: '12'
- name: income_source_earned_for_wfnj_cash_assistance
  kind: derived
  entity: Payment
  dtype: Judgment
  period: Month
  source: N.J.A.C. 10:90-3.9(c)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: definition
        source:
          corpus_citation_path: us-nj/regulation/njac-10-90/10-90-3.9
          excerpt: Earned income refers to gross income received by an individual
            through the receipt of wages, tips, salaries or commissions or receipt
            of income from self-employment.
      - path: versions[0].formula
        kind: definition
        source:
          corpus_citation_path: us-nj/regulation/njac-10-90/10-90-3.9
          excerpt: It includes earnings over a period of time for which settlement
            is made in one payment
  versions:
  - effective_from: '2024-12-16'
    formula: 'payment_is_wages_tips_salaries_or_commissions

      or payment_is_income_from_self_employment

      or payment_is_earnings_over_time_settled_in_one_payment'
- name: renewable_contract_average_monthly_earnings
  kind: derived
  entity: Payment
  dtype: Money
  period: Month
  unit: USD
  source: N.J.A.C. 10:90-3.9(c)1
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-nj/regulation/njac-10-90/10-90-3.9
          excerpt: Earnings payable under the terms of a renewable contract ... are
            to be averaged over a 12-month period.
      - path: versions[0].formula
        kind: import
        import:
          target: us-nj:regulations/njac-10-90/10-90-3/9#renewable_contract_average_months
          output: renewable_contract_average_months
          hash: sha256:local
  versions:
  - effective_from: '2024-12-16'
    formula: renewable_contract_total_earnings / renewable_contract_average_months
- name: self_employment_earned_income
  kind: derived
  entity: Business
  dtype: Money
  period: Month
  unit: USD
  source: N.J.A.C. 10:90-3.9(d)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: definition
        source:
          corpus_citation_path: us-nj/regulation/njac-10-90/10-90-3.9
          excerpt: earned income means the total profit from a business enterprise
            ... resulting from a comparison of the gross receipts with the business
            expenses
      - path: versions[0].formula
        kind: definition
        source:
          corpus_citation_path: us-nj/regulation/njac-10-90/10-90-3.9
          excerpt: Business expenses are those costs directly related to producing
            the goods or services
  versions:
  - effective_from: '2024-12-16'
    formula: gross_business_receipts - allowable_self_employment_business_expenses
- name: income_source_unearned_for_wfnj_cash_assistance
  kind: derived
  entity: Payment
  dtype: Judgment
  period: Month
  source: N.J.A.C. 10:90-3.9(e)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: definition
        source:
          corpus_citation_path: us-nj/regulation/njac-10-90/10-90-3.9
          excerpt: Unearned income includes, but is not limited to, returns from capital
            investments such as dividends and interest; benefits and pensions; RSDI;
            annuities
  versions:
  - effective_from: '2024-12-16'
    formula: 'payment_is_return_from_capital_investment

      or payment_is_benefit_pension_rsdi_annuity_compensation_contribution_disability_unemployment_or_workers_compensation'
- name: income_source_income_for_wfnj_cash_assistance
  kind: derived
  entity: Payment
  dtype: Judgment
  period: Month
  source: N.J.A.C. 10:90-3.9(b)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: definition
        source:
          corpus_citation_path: us-nj/regulation/njac-10-90/10-90-3.9
          excerpt: Income refers to earned or unearned and means, but is not limited
            to, child support, commissions, salaries, self-employed earnings
      - path: versions[0].formula
        kind: import
        import:
          target: us-nj:regulations/njac-10-90/10-90-3/9#income_source_earned_for_wfnj_cash_assistance
          output: income_source_earned_for_wfnj_cash_assistance
          hash: sha256:local
      - path: versions[0].formula
        kind: import
        import:
          target: us-nj:regulations/njac-10-90/10-90-3/9#income_source_unearned_for_wfnj_cash_assistance
          output: income_source_unearned_for_wfnj_cash_assistance
          hash: sha256:local
  versions:
  - effective_from: '2024-12-16'
    formula: 'income_source_earned_for_wfnj_cash_assistance

      or income_source_unearned_for_wfnj_cash_assistance

      or payment_is_other_source_construed_or_defined_as_income'
- name: income_source_countable_for_wfnj_cash_assistance
  kind: derived
  entity: Payment
  dtype: Judgment
  period: Month
  source: us-nj/regulation/njac-10-90/10-90-3.9(a)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: definition
        source:
          corpus_citation_path: us-nj/regulation/njac-10-90/10-90-3.9
          excerpt: Income is either countable or exempt.
      - path: versions[0].formula
        kind: import
        import:
          target: us-nj:regulations/njac-10-90/10-90-3/19#income_source_exempt_for_wfnj_cash_assistance
          output: income_source_exempt_for_wfnj_cash_assistance
          hash: sha256:0b38e77b1465a7493deb5d9f49ace97594a91691d419cca869f59e8c63d352d5
      - path: versions[0].formula
        kind: import
        import:
          target: us-nj:regulations/njac-10-90/10-90-3/9#income_source_income_for_wfnj_cash_assistance
          output: income_source_income_for_wfnj_cash_assistance
          hash: sha256:local
  versions:
  - effective_from: '2024-12-16'
    formula: 'income_source_income_for_wfnj_cash_assistance

      and not income_source_exempt_for_wfnj_cash_assistance'
