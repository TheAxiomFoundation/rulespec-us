format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nj/regulation/njac-10-90/10-90-3.20
  summary: |-
    Exempt resources are not subject to liquidation and are not considered in determining WFNJ eligibility or the cash assistance benefit. Exempt resources include up to $2,000 in resources, special minor-parent alternate-living-arrangement savings accounts, approved Individual Development Accounts, motor vehicles other than recreational vehicles, a home temporarily absent up to four months with possible additional four months, personal and income-producing property, nominal gifts, bona fide loans, burial plots and funeral agreements, life insurance, and listed special-purpose Federal, State, and private aid.
  deferred_outputs:
    - output: us-nj:regulations/njac-10-90/10-90-3/20#resource_exempt_from_wfnj_eligibility_and_benefit_determination
      reason: The provision enumerates many resource-category exemptions and cross-references exempt income at N.J.A.C. 10:90-3.19 and related supportive-services provisions not supplied in this workspace; the final asset-level classification should be encoded with those dependencies and a complete resource ontology rather than approximated here.
rules:
  - name: general_resource_exemption_limit
    kind: parameter
    dtype: Money
    unit: USD
    source: us-nj/regulation/njac-10-90/10-90-3.20(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nj/regulation/njac-10-90/10-90-3.20
              excerpt: "Up to a total of $ 2,000 in resources (including savings)"
    versions:
      - effective_from: '2024-11-18'
        formula: |-
          2000
  - name: temporary_home_absence_initial_exemption_months
    kind: parameter
    dtype: Count
    source: us-nj/regulation/njac-10-90/10-90-3.20(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nj/regulation/njac-10-90/10-90-3.20
              excerpt: "during temporary absence ... for a period up to four months"
    versions:
      - effective_from: '2024-11-18'
        formula: |-
          4
  - name: temporary_home_absence_additional_exemption_months
    kind: parameter
    dtype: Count
    source: us-nj/regulation/njac-10-90/10-90-3.20(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nj/regulation/njac-10-90/10-90-3.20
              excerpt: "may allow it to remain in exempt status for an additional four months"
    versions:
      - effective_from: '2024-11-18'
        formula: |-
          4
  - name: temporary_home_absence_permanent_absence_months
    kind: parameter
    dtype: Count
    source: us-nj/regulation/njac-10-90/10-90-3.20(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nj/regulation/njac-10-90/10-90-3.20
              excerpt: "Continued absence through the entire eight months shall be deemed to be permanent"
    versions:
      - effective_from: '2024-11-18'
        formula: |-
          8
  - name: prepaid_burial_plot_limit_per_assistance_unit_member
    kind: parameter
    dtype: Count
    source: us-nj/regulation/njac-10-90/10-90-3.20(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nj/regulation/njac-10-90/10-90-3.20
              excerpt: "Prepaid burial plots (limited to one for each member"
    versions:
      - effective_from: '2024-11-18'
        formula: |-
          1
  - name: prepaid_funeral_agreement_total_value_limit_per_member
    kind: parameter
    dtype: Money
    unit: USD
    source: us-nj/regulation/njac-10-90/10-90-3.20(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
