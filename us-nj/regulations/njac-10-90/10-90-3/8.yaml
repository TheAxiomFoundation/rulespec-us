format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nj/regulation/njac-10-90/10-90-3.8
  summary: |-
    N.J.A.C. 10:90-3.8 provides that earned income disregards are not applied in the initial financial eligibility determination for employed applicants; after eligibility, WFNJ recipients receive a 100 percent disregard for the first full counted month, then either 75 percent for six consecutive months if employed 20 or more hours weekly or covered by the disability waiver, and 50 percent thereafter. It also provides child support disregards of the actual amount up to $100 for one child and up to $200 for two or more children, and special treatment for reductions, garnishments, sanctioned or disqualified individuals, and overpayments.
rules:
  - name: minimum_weekly_employment_hours_for_enhanced_earned_income_disregard
    kind: parameter
    dtype: Decimal
    source: N.J.A.C. 10:90-3.8(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nj/regulation/njac-10-90/10-90-3.8
              excerpt: "20 hours or more per week"
    versions:
      - effective_from: '2023-07-10'
        formula: |-
          20

  - name: first_full_month_earned_income_disregard_rate
    kind: parameter
    dtype: Rate
    source: N.J.A.C. 10:90-3.8(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nj/regulation/njac-10-90/10-90-3.8
              excerpt: "100 percent of the gross earned income shall be disregarded"
    versions:
      - effective_from: '2023-07-10'
        formula: |-
          1.00

  - name: enhanced_earned_income_disregard_rate
    kind: parameter
    dtype: Rate
    source: N.J.A.C. 10:90-3.8(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nj/regulation/njac-10-90/10-90-3.8
              excerpt: "75 percent of the gross earned income shall be disregarded"
    versions:
      - effective_from: '2023-07-10'
        formula: |-
          0.75

  - name: enhanced_earned_income_disregard_months
    kind: parameter
    dtype: Count
    source: N.J.A.C. 10:90-3.8(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nj/regulation/njac-10-90/10-90-3.8
              excerpt: "for six consecutive months"
    versions:
      - effective_from: '2023-07-10'
        formula: |-
          6

  - name: continuing_earned_income_disregard_rate
    kind: parameter
    dtype: Rate
    source: N.J.A.C. 10:90-3.8(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nj/regulation/njac-10-90/10-90-3.8
              excerpt: "50 percent of the gross earned income shall be disregarded"
    versions:
      - effective_from: '2023-07-10'
        formula: |-
          0.50

  - name: earned_income_reporting_days_after_first_paycheck
    kind: parameter
    dtype: Count
    period: Day
    source: N.J.A.C. 10:90-3.8(b)1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nj/regulation/njac-10-90/10-90-3.8
              excerpt: "no later than 10 days from the date the recipient receives his or her first paycheck"
    versions:
      - effective_from: '2023-07-10'
        formula: |-
          10

  - name: agency_action_days_after_income_report
    kind: parameter
    dtype: Count
    period: Day
    source: N.J.A.C. 10:90-3.8(b)1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nj/regulation/njac-10-90/10-90-3.8
              excerpt: "CSSAs/MWAs have 10 days from the date that such income is reported to act on the change"
    versions:
      - effective_from: '2023-07-10'
        formula: |-
          10

  - name: reemployment_disregard_repeat_interval_months
    kind: parameter
    dtype: Count
    period: Month
    source: N.J.A.C. 10:90-3.8(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nj/regulation/njac-10-90/10-90-3.8
              excerpt: "only once every 12 months"
    versions:
      - effective_from: '2023-07-10'
        formula: |-
          12

  - name: one_child_child_support_disregard_cap
    kind: parameter
    dtype: Money
    period: Month
    unit: USD
    source: N.J.A.C. 10:90-3.8(h)1-2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nj/regulation/njac-10-90/10-90-3.8
              excerpt: "$ 100.00 per month for one child"
    versions:
      - effective_from: '2024-11-18'
        formula: |-
          100.00

  - name: multiple_children_child_support_disregard_cap
    kind: parameter
    dtype: Money
    period: Month
    unit: USD
    source: N.J.A.C. 10:90-3.8(h)3-4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nj/regulation/njac-10-90/10-90-3.8
              excerpt: "$ 200.00 per month for two or more children"
    versions:
      - effective_from: '2024-11-18'
        formula: |-
          200.00

  - name: earned_income_disregard_rate
    kind: derived
    entity: Person
    dtype: Rate
    period: Month
    source: N.J.A.C. 10:90-3.8(a)-(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nj/regulation/njac-10-90/10-90-3.8
          - path: versions[0].formula
            kind: import
            import:
              target: us-nj:regulations/njac-10-90/10-90-3/8#first_full_month_earned_income_disregard_rate
              output: first_full_month_earned_income_disregard_rate
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-nj:regulations/njac-10-90/10-90-3/8#enhanced_earned_income_disregard_rate
              output: enhanced_earned_income_disregard_rate
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-nj:regulations/njac-10-90/10-90-3/8#continuing_earned_income_disregard_rate
              output: continuing_earned_income_disregard_rate
              hash: sha256:local
    versions:
      - effective_from: '2023-07-10'
        formula: |-
          if initial_financial_eligibility_determination_for_employed_applicant: 0 else: if not financial_eligibility_exists: 0 else: if first_full_month_in_which_earned_income_would_be_counted: first_full_month_earned_income_disregard_rate else: if reemployed_after_no_fault_job_loss and first_full_month_and_enhanced_disregards_already_applied_within_last_twelve_months: continuing_earned_income_disregard_rate else: if within_six_consecutive_month_enhanced_disregard_period and (employed_average_at_least_minimum_weekly_hours or documented_disability_waiver_of_minimum_weekly_hours or returned_to_minimum_weekly_hours_with_unused_enhanced_months_after_no_fault_reduction): enhanced_earned_income_disregard_rate else: if continuous_month_of_employment_after_first_full_month: continuing_earned_income_disregard_rate else: 0

  - name: countable_earned_income_after_disregard
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: USD
    source: N.J.A.C. 10:90-3.8(b), (g), (i), (j)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nj/regulation/njac-10-90/10-90-3.8
          - path: versions[0].formula
            kind: import
            import:
              target: us-nj:regulations/njac-10-90/10-90-3/8#earned_income_disregard_rate
              output: earned_income_disregard_rate
              hash: sha256:local
    versions:
      - effective_from: '2023-07-10'
        formula: |-
          if sanctioned_or_intentional_program_violation_disqualified_individual or overpayment_due_to_untimely_earned_income_report_without_good_cause: gross_earned_income else: max(0, gross_earned_income - (gross_earned_income * earned_income_disregard_rate))

  - name: child_support_payment_disregarded_by_household_member
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: USD
    source: N.J.A.C. 10:90-3.8(g)1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nj/regulation/njac-10-90/10-90-3.8
    versions:
      - effective_from: '2023-07-10'
        formula: |-
          child_support_and_spousal_support_payments_paid_by_household_assistance_unit_member

  - name: child_support_received_disregard
    kind: derived
    entity: TanfUnit
    dtype: Money
    period: Month
    unit: USD
    source: N.J.A.C. 10:90-3.8(h)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nj/regulation/njac-10-90/10-90-3.8
          - path: versions[0].formula
            kind: import
            import:
              target: us-nj:regulations/njac-10-90/10-90-3/8#one_child_child_support_disregard_cap
              output: one_child_child_support_disregard_cap
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-nj:regulations/njac-10-90/10-90-3/8#multiple_children_child_support_disregard_cap
              output: multiple_children_child_support_disregard_cap
              hash: sha256:local
    versions:
      - effective_from: '2024-11-18'
        formula: |-
          if not initial_eligibility_test_passed_and_child_support_receipt_verified: 0 else: if child_count_with_verified_child_support == 1: min(verified_child_support_received, one_child_child_support_disregard_cap) else: if child_count_with_verified_child_support >= 2: min(verified_child_support_received, multiple_children_child_support_disregard_cap) else: 0

  - name: actual_state_or_federal_benefit_received_counted_after_overpayment_reduction
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: USD
    source: N.J.A.C. 10:90-3.8(f)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nj/regulation/njac-10-90/10-90-3.8
    versions:
      - effective_from: '2023-07-10'
        formula: |-
          actual_state_or_federal_benefit_amount_received_after_overpayment_reduction
