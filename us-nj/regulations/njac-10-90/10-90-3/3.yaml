format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nj/regulation/njac-10-90/10-90-3.3
  summary: Schedule I identifies WFNJ/TANF initial maximum allowable income eligibility
    levels by assistance unit size. Schedule II identifies maximum allowable benefit
    payment levels by assistance unit size. Eligibility exists while countable income
    is less than the applicable benefit level; income equaling or exceeding that level
    ends eligibility except earned-income six-month reporting cases until total income
    exceeds 130 percent of FPL.
rules:
- name: listed_assistance_unit_size_limit
  kind: parameter
  dtype: Count
  source: N.J.A.C. 10:90-3.3, WFNJ/TANF Schedules I and II
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-nj/regulation/njac-10-90/10-90-3.3
          excerpt: More than 8
  versions:
  - effective_from: '2023-07-10'
    formula: '8'
- name: tanf_initial_maximum_allowable_income_level_schedule
  kind: parameter
  dtype: Money
  unit: USD
  period: Month
  indexed_by: assistance_unit_size
  source: N.J.A.C. 10:90-3.3(a), Schedule I
  metadata:
    proof:
      atoms:
      - path: versions[0].values
        kind: parameter_table
        source:
          corpus_citation_path: us-nj/regulation/njac-10-90/10-90-3.3
          table:
            header: WFNJ/TANF Initial Maximum Allowable Income Levels and Maximum
              Benefit Payment Levels
            row_key: Number in Assistance Unit
            column_key: Schedule I Initial Maximum Allowable Income Levels
  versions:
  - effective_from: '2023-07-10'
    values:
      1: 321
      2: 638
      3: 839
      4: 966
      5: 1092
      6: 1221
      7: 1341
      8: 1442
- name: tanf_maximum_benefit_payment_level_schedule
  kind: parameter
  dtype: Money
  unit: USD
  period: Month
  indexed_by: assistance_unit_size
  source: N.J.A.C. 10:90-3.3(b), Schedule II
  metadata:
    proof:
      atoms:
      - path: versions[0].values
        kind: parameter_table
        source:
          corpus_citation_path: us-nj/regulation/njac-10-90/10-90-3.3
          table:
            header: WFNJ/TANF Initial Maximum Allowable Income Levels and Maximum
              Benefit Payment Levels
            row_key: Number in Assistance Unit
            column_key: Schedule II Maximum Benefit Payment Levels
  versions:
  - effective_from: '2023-07-10'
    values:
      1: 214
      2: 425
      3: 559
      4: 644
      5: 728
      6: 814
      7: 894
      8: 961
- name: tanf_initial_maximum_allowable_income_additional_person_amount
  kind: parameter
  dtype: Money
  unit: USD
  period: Month
  source: N.J.A.C. 10:90-3.3(a), Schedule I
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-nj/regulation/njac-10-90/10-90-3.3
          excerpt: Add $ 99 for each additional person
  versions:
  - effective_from: '2023-07-10'
    formula: '99'
- name: tanf_maximum_benefit_payment_additional_person_amount
  kind: parameter
  dtype: Money
  unit: USD
  period: Month
  source: N.J.A.C. 10:90-3.3(b), Schedule II
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-nj/regulation/njac-10-90/10-90-3.3
          excerpt: Add $ 66 for each additional person
  versions:
  - effective_from: '2023-07-10'
    formula: '66'
- name: earned_income_six_month_reporting_fpl_limit
  kind: parameter
  dtype: Rate
  source: N.J.A.C. 10:90-3.3(b)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-nj/regulation/njac-10-90/10-90-3.3
          excerpt: exceeds 130 percent of the Federal Poverty Level (FPL)
  versions:
  - effective_from: '2023-07-10'
    formula: '1.30'
- name: tanf_initial_maximum_allowable_income_level
  kind: derived
  entity: TanfUnit
  dtype: Money
  unit: USD
  period: Month
  source: N.J.A.C. 10:90-3.3(a), Schedule I
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-nj/regulation/njac-10-90/10-90-3.3
          excerpt: Add $ 99 for each additional person
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-nj/regulation/njac-10-90/10-90-3.3
  versions:
  - effective_from: '2023-07-10'
    formula: 'if assistance_unit_size <= listed_assistance_unit_size_limit: tanf_initial_maximum_allowable_income_level_schedule[assistance_unit_size]
      else: tanf_initial_maximum_allowable_income_level_schedule[listed_assistance_unit_size_limit]
      + ((assistance_unit_size - listed_assistance_unit_size_limit) * tanf_initial_maximum_allowable_income_additional_person_amount)'
- name: tanf_maximum_benefit_payment_level
  kind: derived
  entity: TanfUnit
  dtype: Money
  unit: USD
  period: Month
  source: N.J.A.C. 10:90-3.3(b), Schedule II
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-nj/regulation/njac-10-90/10-90-3.3
          excerpt: Add $ 66 for each additional person
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-nj/regulation/njac-10-90/10-90-3.3
  versions:
  - effective_from: '2023-07-10'
    formula: 'if assistance_unit_size <= listed_assistance_unit_size_limit: tanf_maximum_benefit_payment_level_schedule[assistance_unit_size]
      else: tanf_maximum_benefit_payment_level_schedule[listed_assistance_unit_size_limit]
      + ((assistance_unit_size - listed_assistance_unit_size_limit) * tanf_maximum_benefit_payment_additional_person_amount)'
- name: tanf_initial_financial_eligibility_exists
  kind: derived
  entity: TanfUnit
  dtype: Judgment
  period: Month
  source: N.J.A.C. 10:90-3.3(a)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: predicate
        source:
          corpus_citation_path: us-nj/regulation/njac-10-90/10-90-3.3
          excerpt: shall be used for new applicant, reapplicant and reopened cases
            to determine initial financial eligibility
      - path: versions[0].formula
        kind: import
        import:
          target: us-nj:regulations/njac-10-90/10-90-3/3#tanf_initial_maximum_allowable_income_level
          output: tanf_initial_maximum_allowable_income_level
          hash: sha256:local
  versions:
  - effective_from: '2023-07-10'
    formula: 'assistance_unit_has_dependent_children

      and case_is_new_reapplicant_or_reopened

      and countable_income <= tanf_initial_maximum_allowable_income_level'
- name: tanf_financial_eligibility_exists
  kind: derived
  entity: TanfUnit
  dtype: Judgment
  period: Month
  source: N.J.A.C. 10:90-3.3(b)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: predicate
        source:
          corpus_citation_path: us-nj/regulation/njac-10-90/10-90-3.3
          excerpt: countable income is less than the applicable benefit level
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-nj/regulation/njac-10-90/10-90-3.3
          excerpt: except for cases with earned income that are subject to six-month
            reporting requirements
      - path: versions[0].formula
        kind: import
        import:
          target: us-nj:regulations/njac-10-90/10-90-3/3#tanf_maximum_benefit_payment_level
          output: tanf_maximum_benefit_payment_level
          hash: sha256:local
  versions:
  - effective_from: '2023-07-10'
    formula: "assistance_unit_has_dependent_children\nand (\n  countable_income <\
      \ tanf_maximum_benefit_payment_level\n  or (\n    case_has_earned_income_subject_to_six_month_reporting\n\
      \    and total_income <= earned_income_six_month_reporting_fpl_limit * federal_poverty_level\n\
      \  )\n)"
