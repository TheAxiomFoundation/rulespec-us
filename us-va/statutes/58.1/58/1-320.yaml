format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-va/statute/58.1/58.1-320
  summary: |-
    "A tax is hereby annually imposed on the Virginia taxable income for each taxable year of every individual as follows:" 2% on income not exceeding $3,000; 3% on income in excess of $3,000 but not in excess of $5,000; 5% on income in excess of $5,000 up to the stated upper bracket for the taxable-year period; and 5.75% on income in excess of that upper bracket.
