  - name: mo_2026_noncombined_resident_adjusted_gross_income_core
    kind: derived
    entity: TaxUnit
    dtype: Money
    unit: USD
    period: Year
    source: Mo. Rev. Stat. § 143.121, encoded ordinary-income modifications to federal adjusted gross income
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-mo/statute/143.121
              excerpt: "The Missouri adjusted gross income of a resident individual shall be the taxpayer's federal adjusted gross income subject to the modifications in this section"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-mo/statute/143.121
              excerpt: "one hundred percent of all income reported as a capital gain for federal income tax purposes by an individual"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          mo_2026_federal_adjusted_gross_income
          + max(0, mo_2026_completed_partial_prior_year_federal_refund_missouri_benefit_addition)
          + max(
              0,
              mo_2026_non_missouri_government_obligation_interest
              - (
                  if mo_2026_expenses_allocable_to_non_missouri_government_obligation_interest >= mo_2026_modification_expense_threshold:
                    mo_2026_expenses_allocable_to_non_missouri_government_obligation_interest
                  else:
                    0
                )
            )
          + max(0, mo_2026_completed_partial_missouri_disallowed_federal_nol_addition)
          + max(0, mo_2026_carried_business_interest_deducted_federally)
          - max(
              0,
              mo_2026_us_obligation_interest_and_dividends
              - (
                  if mo_2026_expenses_allocable_to_us_obligations >= mo_2026_modification_expense_threshold:
                    mo_2026_expenses_allocable_to_us_obligations
                  else:
                    0
                )
            )
          - max(0, mo_2026_state_income_tax_refund_in_federal_agi)
          - max(0, mo_2026_current_business_interest_disallowed_federally)
          - max(0, mo_2026_military_retirement_benefits_in_federal_agi)
          - max(0, mo_2026_broadband_grants_in_federal_agi)
          - max(0, mo_2026_federal_capital_gain_income)
          - max(0, mo_2026_combat_zone_income_in_federal_agi)
          - max(0, mo_2026_agricultural_disaster_income_in_federal_agi)

  - name: mo_2026_noncombined_resident_itemized_deduction
    kind: derived
    entity: TaxUnit
    dtype: Money
    unit: USD
    period: Year
    source: Mo. Rev. Stat. § 143.141, federal itemized deductions with Missouri modifications
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-mo/statute/143.141
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          max(
            0,
            mo_2026_federal_itemized_deductions
            - max(0, mo_2026_missouri_income_tax_in_federal_itemized_deductions)
            - max(0, mo_2026_other_jurisdiction_income_tax_in_federal_itemized_deductions)
            + max(0, mo_2026_completed_partial_created_work_appraisal_itemized_increase)
            + max(0, mo_2026_fica_rrta_and_self_employment_taxes_not_deducted_federally)
          )

  - name: mo_2026_noncombined_resident_elected_deduction
    kind: derived
    entity: TaxUnit
    dtype: Money
    unit: USD
    period: Year
    source: Mo. Rev. Stat. §§ 143.131 and 143.141, allowable federal standard deduction or Missouri itemized deduction
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-mo/statute/143.131
              excerpt: "The Missouri standard deduction shall be the allowable federal standard deduction."
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-mo/statute/143.141
              excerpt: "may elect to deduct his Missouri itemized deduction in lieu of his Missouri standard deduction"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if mo_2026_itemizes:
            mo_2026_noncombined_resident_itemized_deduction
          else:
            max(0, mo_2026_allowable_federal_standard_deduction)

  - name: mo_2026_section_151_conditioned_personal_and_dependency_exemptions
    kind: derived
    entity: TaxUnit
    dtype: Money
    unit: USD
    period: Year
    source: Mo. Rev. Stat. §§ 143.151 and 143.161.1; 26 USC 151(d)(5)(A), zero because the federal exemption amount is zero
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-mo/statute/143.151
              excerpt: "provided that the exemption amount as defined under 26 U.S.C. Section 151 is not zero"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-mo/statute/143.161
              excerpt: "provided that the exemption amount as defined under 26 U.S.C. Section 151 is not zero"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/statute/26/151
              excerpt: "In the case of a taxable year beginning after December 31, 2017 — (A) Exemption amount The term “exemption amount” means zero."
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: '0'

  - name: mo_2026_head_of_household_or_surviving_spouse_deduction
    kind: derived
    entity: TaxUnit
    dtype: Money
    unit: USD
    period: Year
    source: Mo. Rev. Stat. § 143.161.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-mo/statute/143.161
              excerpt: "may deduct an additional one thousand four hundred dollars"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if filing_status == 3 or filing_status == 4:
            mo_2026_head_of_household_or_surviving_spouse_deduction_amount
          else:
            0

  - name: mo_2026_federal_tax_deduction_band
    kind: derived
    entity: TaxUnit
    dtype: Integer
    period: Year
    source: Mo. Rev. Stat. § 143.171.2(1), Missouri-gross-income percentage band
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-mo/statute/143.171
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if mo_2026_noncombined_resident_adjusted_gross_income_core <= mo_2026_federal_tax_deduction_band_upper[0]: mo_2026_federal_tax_deduction_band_index[0]
          else: if mo_2026_noncombined_resident_adjusted_gross_income_core <= mo_2026_federal_tax_deduction_band_upper[1]: mo_2026_federal_tax_deduction_band_index[1]
          else: if mo_2026_noncombined_resident_adjusted_gross_income_core <= mo_2026_federal_tax_deduction_band_upper[2]: mo_2026_federal_tax_deduction_band_index[2]
          else: if mo_2026_noncombined_resident_adjusted_gross_income_core <= mo_2026_federal_tax_deduction_band_upper[3]: mo_2026_federal_tax_deduction_band_index[3]
          else: mo_2026_federal_tax_deduction_band_index[4]

  - name: mo_2026_noncombined_federal_income_tax_deduction
    kind: derived
    entity: TaxUnit
    dtype: Money
    unit: USD
    period: Year
    source: Mo. Rev. Stat. § 143.171.2(1), percentage of federal liability capped for a noncombined return
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-mo/statute/143.171
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          min(
            mo_2026_noncombined_federal_tax_deduction_cap,
            max(0, mo_2026_federal_income_tax_liability_after_relevant_credits)
            * mo_2026_federal_tax_deduction_rate[mo_2026_federal_tax_deduction_band]
          )

  - name: mo_2026_noncombined_resident_taxable_income_core
    kind: derived
    entity: TaxUnit
    dtype: Money
    unit: USD
    period: Year
    source: Mo. Rev. Stat. §§ 143.111, 143.113, 143.118, 143.125, 143.161, 143.171, 143.174, and 143.175, encoded deductions from partial Missouri AGI
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-mo/statute/143.111
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-mo/statute/143.113
              excerpt: "shall only be deductible to the extent that such amounts are not deducted on the taxpayer's federal income tax return for that taxable year"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-mo/statute/143.118
              excerpt: "an amount equal to the amount which the taxpayer has paid during the taxable year as a member of a health care sharing ministry"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-mo/statute/143.125
              excerpt: "For all taxable years beginning on or after January 1, 2012"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-mo/statute/143.174
              excerpt: "one hundred percent of the income received by any person as salary or compensation in any form as a member of the active duty component of the Armed Forces"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-mo/statute/143.175
              excerpt: "For all tax years beginning on January 1, 2024, and thereafter, one hundred percent of such income"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          max(
            0,
            mo_2026_noncombined_resident_adjusted_gross_income_core
            - mo_2026_noncombined_resident_elected_deduction
            - mo_2026_section_151_conditioned_personal_and_dependency_exemptions
            - mo_2026_head_of_household_or_surviving_spouse_deduction
            - mo_2026_noncombined_federal_income_tax_deduction
            - max(0, mo_2026_self_employed_health_insurance_not_deducted_federally)
            - max(0, mo_2026_health_care_sharing_ministry_payments_not_deducted_federally)
            - max(0, mo_2026_social_security_benefits_in_federal_agi)
            - max(0, mo_2026_active_duty_military_compensation_in_federal_agi)
            - max(0, mo_2026_guard_or_reserve_compensation_in_federal_agi)
          )

  - name: mo_2026_noncombined_resident_tax_bracket
    kind: derived
    entity: TaxUnit
    dtype: Integer
    period: Year
    source: Mo. Rev. Stat. §§ 143.011 and 143.021, official 2026 bracket selected from partial taxable income
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-mo/statute/143.011
              excerpt: "The tax shall be determined by applying the tax table or the rate provided in section 143.021"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if mo_2026_noncombined_resident_taxable_income_core <= mo_2026_income_tax_bracket_upper[0]: mo_2026_income_tax_bracket_index[0]
          else: if mo_2026_noncombined_resident_taxable_income_core <= mo_2026_income_tax_bracket_upper[1]: mo_2026_income_tax_bracket_index[1]
          else: if mo_2026_noncombined_resident_taxable_income_core <= mo_2026_income_tax_bracket_upper[2]: mo_2026_income_tax_bracket_index[2]
          else: if mo_2026_noncombined_resident_taxable_income_core <= mo_2026_income_tax_bracket_upper[3]: mo_2026_income_tax_bracket_index[3]
          else: if mo_2026_noncombined_resident_taxable_income_core <= mo_2026_income_tax_bracket_upper[4]: mo_2026_income_tax_bracket_index[4]
          else: if mo_2026_noncombined_resident_taxable_income_core <= mo_2026_income_tax_bracket_upper[5]: mo_2026_income_tax_bracket_index[5]
          else: if mo_2026_noncombined_resident_taxable_income_core <= mo_2026_income_tax_bracket_upper[6]: mo_2026_income_tax_bracket_index[6]
          else: mo_2026_income_tax_bracket_index[7]

  - name: mo_2026_noncombined_resident_income_tax_before_credits_core
    kind: derived
    entity: TaxUnit
    dtype: Money
    unit: USD
    period: Year
    source: Mo. Rev. Stat. §§ 143.011 and 143.021, official 2026 noncombined schedule before credits
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-mo/statute/143.011
              excerpt: "The tax shall be determined by applying the tax table or the rate provided in section 143.021"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          mo_2026_income_tax_bracket_base[mo_2026_noncombined_resident_tax_bracket]
          + mo_2026_income_tax_bracket_rate[mo_2026_noncombined_resident_tax_bracket]
          * (
              mo_2026_noncombined_resident_taxable_income_core
              - mo_2026_income_tax_bracket_floor[mo_2026_noncombined_resident_tax_bracket]
            )

  - name: mo_2026_noncombined_resident_other_state_income_tax_credit
    kind: derived
    entity: TaxUnit
    dtype: Money
    unit: USD
    period: Year
    source: Mo. Rev. Stat. § 143.081, other-jurisdiction income tax limited by Missouri tax ratio
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-mo/statute/143.081
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-mo/statute/143.081
              excerpt: "shall not exceed an amount which bears the same ratio to the tax otherwise due"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if mo_2026_noncombined_resident_adjusted_gross_income_core > 0:
            min(
              max(0, mo_2026_completed_partial_other_jurisdiction_creditable_income_tax),
              max(0, mo_2026_noncombined_resident_income_tax_before_credits_core)
              * min(
                  1,
                  max(0, mo_2026_completed_partial_other_jurisdiction_missouri_agi)
                  / max(0, mo_2026_noncombined_resident_adjusted_gross_income_core)
                )
            )
          else:
            0

  - name: mo_2026_noncombined_resident_income_tax_after_encoded_nonrefundable_credit_core
    kind: derived
    entity: TaxUnit
    dtype: Money
    unit: USD
    period: Year
    source: Mo. Rev. Stat. §§ 143.011 and 143.081, partial tax after encoded other-state credit
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-mo/statute/143.011
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-mo/statute/143.081
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          max(
            0,
            mo_2026_noncombined_resident_income_tax_before_credits_core
            - mo_2026_noncombined_resident_other_state_income_tax_credit
          )

inputs:
  - name: mo_2026_completed_partial_prior_year_federal_refund_missouri_benefit_addition
    entity: TaxUnit
    dtype: Money
    unit: USD
    period: Year
    description: |-
      Completed partial Missouri addition for the portion of a prior-year
      federal refund that produced a Missouri income-tax benefit. The caller
      computes the Missouri-benefit classification; this is not a raw fact.

  - name: mo_2026_completed_partial_missouri_disallowed_federal_nol_addition
    entity: TaxUnit
    dtype: Money
    unit: USD
    period: Year
    description: |-
      Completed partial Missouri addition for a federal net-operating-loss
      deduction disallowed under Missouri's carry rules. The caller computes
      the Missouri carry-rule amount; this is not a raw federal-return fact.

  - name: mo_2026_completed_partial_created_work_appraisal_itemized_increase
    entity: TaxUnit
    dtype: Money
    unit: USD
    period: Year
    description: |-
      Completed partial Missouri itemized-deduction increase for a qualifying
      created-work appraisal amount. Qualification and the increase are
      computed upstream rather than derived from appraisal facts here.

  - name: mo_2026_completed_partial_other_jurisdiction_missouri_agi
    entity: TaxUnit
    dtype: Money
    unit: USD
    period: Year
    description: |-
      Completed partial Missouri-adjusted-gross-income numerator derived from
      sources in the other jurisdiction for the section 143.081 ratio. This
      module does not source or recompute that amount.

  - name: mo_2026_completed_partial_other_jurisdiction_creditable_income_tax
    entity: TaxUnit
    dtype: Money
    unit: USD
    period: Year
    description: |-
      Completed partial other-jurisdiction income tax eligible for section
      143.081 after applying its reciprocal-benefit definition. This module
      does not determine reciprocity or recompute the other jurisdiction's tax.
