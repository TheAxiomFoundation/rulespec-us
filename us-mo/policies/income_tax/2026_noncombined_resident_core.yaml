format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_paths:
      - us-mo/statute/143.011
      - us-mo/statute/143.021
      - us-mo/statute/143.022
      - us-mo/statute/143.031
      - us-mo/statute/143.081
      - us-mo/statute/143.111
      - us-mo/statute/143.113
      - us-mo/statute/143.118
      - us-mo/statute/143.121
      - us-mo/statute/143.124
      - us-mo/statute/143.125
      - us-mo/statute/143.131
      - us-mo/statute/143.141
      - us-mo/statute/143.151
      - us-mo/statute/143.161
      - us-mo/statute/143.171
      - us-mo/statute/143.174
      - us-mo/statute/143.175
      - us-mo/statute/143.177
      - us/statute/26/151
    upstream_source_check:
      status: checked_higher_authority
      checked_paths:
        - us-mo/statute/143.011
        - us-mo/statute/143.021
        - us-mo/statute/143.022
        - us-mo/statute/143.031
        - us-mo/statute/143.081
        - us-mo/statute/143.111
        - us-mo/statute/143.113
        - us-mo/statute/143.118
        - us-mo/statute/143.121
        - us-mo/statute/143.124
        - us-mo/statute/143.125
        - us-mo/statute/143.131
        - us-mo/statute/143.141
        - us-mo/statute/143.151
        - us-mo/statute/143.161
        - us-mo/statute/143.171
        - us-mo/statute/143.174
        - us-mo/statute/143.175
        - us-mo/statute/143.177
        - us/statute/26/151
      rationale: |-
        The pinned official corpus contains the current Missouri Chapter 143
        and the Department of Revenue's operative 2026 MO-1040ES rate chart
        composed into section 143.011. It does not contain a tax-year-2026
        MO-1040 annual return or instructions, Chapter 135 specialty-credit
        provisions, or pinned current-year evidence for the section 143.022
        business-income subtraction and section 143.177 working-family credit.
        The official 2025 instructions report the then-current twenty-percent
        amounts and continued operation, but those instructions are not
        ingested in the pinned corpus and do not establish a pinned TY2026
        authority. The source hold is missing corpus ingestion/current-year
        evidence, not an assumption that a 2026 trigger is undetermined.

        This source-certified partial core is therefore limited to a
        noncombined full-year resident return with nonnegative federal adjusted
        gross income and no fiduciary, partnership, public-pension,
        legacy-basis/depreciation, beginning-farmer, or other unencoded Missouri
        modification. It starts with allowed federal return outputs and
        categorized transaction/payment facts. It also accepts five explicitly
        named completed partial boundaries that it does not derive: the
        prior-year federal-refund Missouri-benefit addition, the
        Missouri-disallowed federal-NOL addition, the created-work appraisal
        itemized increase, the other-jurisdiction Missouri-AGI numerator, and
        the other-jurisdiction income tax eligible under the reciprocal-credit
        definition. Consequently this is a disclosed partial composition
        boundary, not a raw-fact or complete end-to-end resident return. It
        never accepts completed total Missouri adjusted gross income, taxable
        income, schedule tax, total deductions/exemptions, or a completed
        Missouri credit.
  summary: |-
    Missouri tax-year-2026 noncombined resident ordinary-income core. It
    constructs a partial Missouri adjusted-gross-income stage for supported
    returns with nonnegative federal AGI from federal outputs, categorized
    facts, and disclosed completed partial components; applies the
    federal-output standard deduction or a source-computed Missouri itemized
    deduction; applies the surviving head-of-household deduction, the
    income-tiered federal-tax deduction, health and military deductions, and
    the 2026 eight-bracket schedule; and computes the section 143.081
    other-state tax credit.

    The terminal output is tax after that encoded nonrefundable credit, not
    final liability, and this module is not a raw-input end-to-end return.
    Negative-federal-AGI returns, combined-return allocation, provisions whose
    current-year values lack pinned evidence, public-pension limits, additional
    Chapter 143 modifications, Chapter 135 and specialty credits, refundable
    credits, return rounding, and final annual-return ordering remain outside
    this partial core.
  deferred_outputs:
    - output: us-mo:policies/income_tax/2026_noncombined_resident_core#mo_2026_resident_adjusted_gross_income
      reason: |-
        Complete Missouri adjusted gross income additionally requires the
        section 143.022 business-income percentage under pinned current-year
        evidence and unencoded fiduciary, partnership,
        legacy-basis/depreciation, beginning-farmer, and other specialty
        modifications. Official 2025 instructions are not ingested in the
        pinned corpus and are not substituted as TY2026 authority.
    - output: us-mo:policies/income_tax/2026_noncombined_resident_core#mo_2026_resident_core_for_negative_federal_adjusted_gross_income
      reason: |-
        The pinned authority establishes Missouri modifications to federal
        adjusted gross income but does not establish a zero floor for negative
        federal adjusted gross income. This core therefore supports federal
        adjusted gross income of zero or more and does not normalize a negative
        amount to zero.
    - output: us-mo:policies/income_tax/2026_noncombined_resident_core#mo_2026_resident_taxable_income
      reason: |-
        Complete taxable income additionally requires public-pension and other
        specialty deductions plus combined-return allocation under section
        143.031 when applicable.
    - output: us-mo:policies/income_tax/2026_noncombined_resident_core#mo_2026_resident_net_income_tax_liability
      reason: |-
        Final liability requires the official 2026 annual-return ordering,
        pinned current-year evidence for the section 143.177 working-family
        credit percentage, and all applicable Chapter 135 and specialty
        refundable/nonrefundable credits, none of which are complete in the
        pinned corpus. Official 2025 instructions report a twenty-percent
        amount but are not ingested or used as TY2026 authority here.
