format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-mo/manual/dss/snap/1105-000-00/1105-015-00/block-1
    upstream_source_check:
      status: no_higher_authority_found
      checked_paths:
        - us:regulations/7-cfr/273/1
      rationale: |-
        The supplied context provides no copied higher-authority text for this Missouri DSS manual slice. The manual remains the only available corpus-backed source for the state manual household-grouping rule encoded here.
  summary: |-
    One or more persons who live together, purchases and prepares meals together are grouped together as one SNAP household. There are some exceptions for boarders, foster persons, and certain elderly and disabled individuals.
rules:
  - name: persons_grouped_together_as_one_snap_household
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: us-mo/manual/dss/snap/1105-000-00/1105-015-00/block-1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-mo/manual/dss/snap/1105-000-00/1105-015-00/block-1
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-mo/manual/dss/snap/1105-000-00/1105-015-00/block-1
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_has_one_or_more_persons
          and (
            household_has_exactly_one_person
            or (
              persons_live_together
              and persons_purchase_meals_together
              and persons_prepare_meals_together
            )
          )
          and not boarder_exception_applies
          and not foster_person_exception_applies
          and not certain_elderly_or_disabled_individual_exception_applies
