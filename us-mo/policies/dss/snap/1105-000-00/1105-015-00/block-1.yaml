format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-mo/manual/dss/snap/1105-000-00/1105-015-00/block-1
  summary: |-
    One or more persons who live together, purchases and prepares meals together are grouped together as one SNAP household. There are some exceptions for boarders, foster persons, and certain elderly and disabled individuals.
rules:
  - name: persons_grouped_together_as_one_snap_household
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: us-mo/manual/dss/snap/1105-000-00/1105-015-00/block-1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-mo/manual/dss/snap/1105-000-00/1105-015-00/block-1
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/7/2012
              excerpt: "an individual who lives alone or who, while living with others, customarily purchases food and prepares meals for home consumption separate and apart from the others"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us/statute/7/2012
              excerpt: "Spouses who live together, parents and their children 21 years of age or younger who live together, and children (excluding foster children) under 18 years of age who live with and are under the parental control of a person other than their parent"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-mo/manual/dss/snap/1105-000-00/1105-015-00/block-1
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_has_one_or_more_persons
          and (
            (
              household_has_exactly_one_person
              and (
                single_person_lives_alone
                or single_person_living_with_others_customarily_purchases_and_prepares_meals_separately
              )
            )
            or (
              not household_has_exactly_one_person
              and persons_live_together
              and persons_purchase_meals_together
              and persons_prepare_meals_together
            )
            or co_resident_spouses_must_be_grouped
            or co_resident_parent_and_child_age_21_or_younger_must_be_grouped
            or co_resident_child_under_18_and_nonparent_exercising_parental_control_must_be_grouped
            or certain_elderly_or_disabled_individual_exception_applies
          )
          and not boarder_exception_applies
          and not foster_person_exception_applies
