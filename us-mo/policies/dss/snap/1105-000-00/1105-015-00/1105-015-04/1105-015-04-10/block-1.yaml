format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_paths:
    - us-mo/manual/dss/snap/1105-000-00/1105-015-00/1105-015-04/1105-015-04-10/block-1
    - us/statute/7/2012
    upstream_source_check:
      status: checked_higher_authority
      checked_paths:
      - us:regulations/7-cfr/273/1
      - us:statutes/7/2012/m/2
      - us:statutes/7/2012/m/3
      rationale: The source is a Missouri DSS SNAP manual provision applying household/eligibility-group
        composition rules. 7 U.S.C. 2012(m)(2)-(3) supplies the controlling
        cohabiting-spouse and elderly-disabled separate-household rules, and 7 CFR
        273.1 supplies their implementing regulation. The federal permanent-under-
        the-Social-Security-Act and nondisease-related severe permanent disability
        tests and licensed-physician certification requirement govern over the
        manual's abbreviated receipt and medical-review-team wording.
  summary: '"An eligibility group is made up of two or more individuals" who meet
    listed living, meal-purchase/preparation, delivered-meals/communal-dining, spouse,
    residential-treatment, or disabled-age-60 conditions. For the disabled-age-60
    path, "The countable income of the others with whom the individual resides ...
    cannot exceed 165 percent of the poverty level."'
rules:
- name: others_countable_income_poverty_level_limit_ratio
  kind: parameter
  dtype: Number
  source: IM-56 June 11, 2013, note on countable income of others
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-mo/manual/dss/snap/1105-000-00/1105-015-00/1105-015-04/1105-015-04-10/block-1
          excerpt: cannot exceed 165 percent of the poverty level
  versions:
  - effective_from: '2013-06-11'
    formula: '1.65'
- name: eligibility_group_customarily_purchases_and_prepares_food_together_path
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: IM-56 June 11, 2013, first eligibility-group path
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-mo/manual/dss/snap/1105-000-00/1105-015-00/1105-015-04/1105-015-04-10/block-1
  versions:
  - effective_from: '2013-06-11'
    formula: 'household_individual_count >= 2

      and individuals_live_together

      and individuals_customarily_purchase_food_together

      and individuals_customarily_prepare_meals_together_for_home_consumption'
- name: eligibility_group_delivered_meals_or_communal_dining_path
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: IM-56 June 11, 2013, delivered-meals or communal-dining path
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-mo/manual/dss/snap/1105-000-00/1105-015-00/1105-015-04/1105-015-04-10/block-1
  versions:
  - effective_from: '2013-06-11'
    formula: 'household_individual_count >= 2

      and individuals_live_together

      and some_or_all_individuals_are_eligible_for_delivered_meals_or_communal_dining_program'
- name: eligibility_group_cohabiting_spouse_path
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: IM-56 June 11, 2013, 7 U.S.C. 2012(m)(2), and 7 CFR 273.1(b)(1)(i), cohabiting-spouse path
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-mo/manual/dss/snap/1105-000-00/1105-015-00/1105-015-04/1105-015-04-10/block-1
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us/statute/7/2012
          excerpt: Spouses who live together
  versions:
  - effective_from: '2013-06-11'
    formula: person_lives_with_spouse
- name: eligibility_group_residential_treatment_program_path
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: IM-56 June 11, 2013, residential treatment program path
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-mo/manual/dss/snap/1105-000-00/1105-015-00/1105-015-04/1105-015-04-10/block-1
  versions:
  - effective_from: '2013-06-11'
    formula: 'household_individual_count >= 2

      and household_lives_in_residential_treatment_program_authorized_by_fns_which_provides_meals

      and all_children_living_with_parent_at_residential_treatment_center_are_included_in_household'
- name: eligibility_group_disabled_age_60_unable_to_purchase_prepare_path_scalar_limit
  kind: parameter
  dtype: Count
  source: IM-56 June 11, 2013, 7 U.S.C. 2012(m)(3), and 7 CFR 273.1(b)(2), disabled
    age-60 unable-to-purchase-and-prepare path and income note
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-mo/manual/dss/snap/1105-000-00/1105-015-00/1105-015-04/1105-015-04-10/block-1
  versions:
  - effective_from: '2013-06-11'
    formula: '60'
- name: eligibility_group_disabled_age_60_unable_to_purchase_prepare_path
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: IM-56 June 11, 2013, 7 U.S.C. 2012(m)(3), and 7 CFR 273.1(b)(2), disabled
    age-60 unable-to-purchase-and-prepare path and income note
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-mo/manual/dss/snap/1105-000-00/1105-015-00/1105-015-04/1105-015-04-10/block-1
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us/statute/7/2012
          excerpt: a disability which would be considered a permanent disability under section 221(i) of the Social Security Act
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us/statute/7/2012
          excerpt: a severe, permanent, and disabling physical or mental infirmity which is not symptomatic of a disease
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us/statute/7/2012
          excerpt: as certified by a licensed physician
      - path: versions[0].formula
        kind: import
        import:
          target: us-mo:policies/dss/snap/1105-000-00/1105-015-00/1105-015-04/1105-015-04-10/block-1#others_countable_income_poverty_level_limit_ratio
          output: others_countable_income_poverty_level_limit_ratio
          hash: sha256:local
      - path: versions[0].formula
        kind: import
        import:
          target: us-mo:policies/dss/snap/1105-000-00/1105-015-00/1105-015-04/1105-015-04-10/block-1#eligibility_group_disabled_age_60_unable_to_purchase_prepare_path_scalar_limit
          output: eligibility_group_disabled_age_60_unable_to_purchase_prepare_path_scalar_limit
          hash: sha256:local
  versions:
  - effective_from: '2013-06-11'
    formula: "person_lives_with_others\nand person_is_unable_to_purchase_and_prepare_meals_because_disabled\n\
      and person_age >= eligibility_group_disabled_age_60_unable_to_purchase_prepare_path_scalar_limit\n\
      and person_disability_certified_by_licensed_physician\nand (\n  person_disability_is_considered_permanent_under_social_security_act\n  or (\n    person_has_nondisease_related_permanent_disability\n    and person_nondisease_related_permanent_disability_is_severe\n  )\n\
      )\nand others_countable_income_as_ratio_of_poverty_level <= others_countable_income_poverty_level_limit_ratio"
