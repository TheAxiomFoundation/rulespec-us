format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-mo/manual/dss/snap/1105-000-00/1105-015-00/1105-015-04/block-1
    upstream_source_check:
      status: checked_higher_authority
      checked_paths:
        - us:statutes/7/2012/m/4
      rationale: |-
        7 U.S.C. 2012(m)(4) supplies the controlling institution and boarding-house
        household prohibition. This manual provision applies that prohibition and
        identifies the authorized-institution exception and named roles Missouri
        treats as potentially participating; it does not replace other SNAP
        household-composition or eligibility requirements.
  summary: |-
    An EU may be composed of individuals or groups including homeless persons, provided they are not residents of a commercial boarding house or an institution, except institutions authorized to participate. FNS-authorized retail store owners or managers, cooperative buying club managers, and commercial boarding house proprietors may participate as part of an eligibility EU; proprietors are considered separate from resident boarders.
rules:
  - name: person_not_barred_from_eligibility_eu_by_residence
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: us-mo/manual/dss/snap/1105-000-00/1105-015-00/1105-015-04/block-1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-mo/manual/dss/snap/1105-000-00/1105-015-00/1105-015-04/block-1
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not resident_of_commercial_boarding_house
          and (
            not resident_of_institution
            or institution_authorized_to_participate_in_snap
          )

