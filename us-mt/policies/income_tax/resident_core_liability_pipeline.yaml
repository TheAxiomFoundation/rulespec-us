format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_paths:
      - us-mt/statute/15-30-2101
      - us-mt/statute/15-30-2103
      - us-mt/statute/15-30-2105
      - us-mt/statute/15-30-2120
      - us-mt/statute/15-30-2302
      - us-mt/statute/15-30-2318/block-1
      - us-mt/statute/15-30-2321
      - us-mt/statute/15-30-2328
      - us-mt/statute/15-30-2334
      - us-mt/statute/15-30-2335
      - us-mt/statute/15-30-2337
      - us-mt/statute/15-30-2338
      - us-mt/statute/15-30-2340
      - us-mt/statute/15-30-2341
      - us-mt/statute/15-30-2342
      - us-mt/statute/15-30-2357
      - us-mt/statute/15-30-2359
      - us-mt/statute/15-30-2361
      - us-mt/statute/15-30-2380
      - us-mt/statute/15-30-3005
      - us-mt/statute/15-30-3328
      - us-mt/statute/15-30-3703
      - us-mt/statute/15-30-3704
      - us-mt/statute/15-62-208
    upstream_source_check:
      status: checked_higher_authority
      checked_paths:
        - us-mt/statute/15-30
        - us-mt/statute/15-30-2101
        - us-mt/statute/15-30-2103
        - us-mt/statute/15-30-2105
        - us-mt/statute/15-30-2120
        - us-mt/statute/15-30-23
        - us-mt/statute/15-30-30
        - us-mt/statute/15-30-33
        - us-mt/statute/15-30-37
        - us-mt/statute/15-62-208
      rationale: |-
        The pinned official Montana Code package supplies the current Title 15
        individual-income-tax chapter, the temporary schedule that terminates
        after tax year 2026, federal-taxable-income modifications, and the
        earned-income, adoption, and public-land-access refundable credits
        encoded here.

        The package does not include the department's November 2025 inflation
        determinations for the tax-year-2026 age-65 and volunteer subtractions.
        The section 2120 family-education base caps and account-owner
        relationship constraints are encoded for this bounded profile. The elderly
        property-tax-credit tables are absent from the normalized provision,
        and annual-return instructions and credit ordering are not pinned.
        Cross-title eligibility and certification rules for the remaining
        specialty credits are also outside the pinned Title 15 chain. Those
        branches are typed holds, never caller-completed amounts. Separate
        taxes and recoveries under sections 15-30-2105, 15-30-3005,
        15-62-208, 53-25-118, 15-30-2328(3), and 15-30-2359(6), plus the
        refundable pass-through-entity-tax credit under 15-30-3328, are
        represented by distinct raw applicability facts and must be absent.
  summary: |-
    Tax-year-2026 Montana full-year resident individual-income-tax core. It
    starts from federal taxable income, applies the directly source-grounded
    additions and subtractions in MCA 15-30-2120, computes Montana taxable
    income without forcing a nonnegative floor, floors only the schedule base,
    separates the federal section 1222 net-long-term-capital-gain portion when
    no Montana modification changes character, and applies every filing-status branch of the temporary section
    15-30-2103 schedule. Montana law defines this modified federal-taxable-
    income result directly as Montana taxable income, so there is no separate
    Montana adjusted-gross-income or state deduction stage to invent.

    Within the disclosed supported profile, tax after nonrefundable credits
    equals schedule tax because all specialty nonrefundable-credit branches are
    excluded. The module then computes the refundable earned-income and
    a single child-level adoption claim and the refundable credit for fully owned, independently
    certified public-land accesses. Net liability may therefore be negative.
    The candidate is not a
    complete annual-return liability outside this profile: indexed deductions,
    the elderly property-tax credit, separate taxes and recaptures,
    pass-through-entity credit, entrepreneur-magnet gain, other-state credit,
    shared-ownership or same-property access allocation, and specialty credits
    remain typed holds. Cross-title modification amounts are required to be
    zero unless their complete eligibility chain is encoded here.
  deferred_outputs:
    - output: us-mt:policies/income_tax/resident_core_liability_pipeline#mt_pit_2026_complete_montana_taxable_income
      reason: |-
        The November 2025 department inflation determinations for the 2026
        age-65 and volunteer amounts are not in the pinned corpus. Fiduciary,
        military-retirement, medical-savings, cross-title modification, and
        recapture branches also depend on held eligibility chains.
      source_values:
        - us-mt:policies/income_tax/resident_core_liability_pipeline#mt_pit_2026_supported_profile_applies
        - us-mt:policies/income_tax/resident_core_liability_pipeline#mt_pit_2026_profile_candidate_signed_section_2101_amount
    - output: us-mt:policies/income_tax/resident_core_liability_pipeline#mt_pit_2026_complete_tax_after_nonrefundable_credits
      reason: |-
        The pinned corpus lacks the annual-return ordering and cross-title
        eligibility or certification chain for the other-state, endowment,
        education, historic-building, apprentice, trades-training, job-growth,
        and other Title 15 nonrefundable credits.
      source_values:
        - us-mt:policies/income_tax/resident_core_liability_pipeline#mt_pit_2026_supported_profile_candidate_tax_after_nonrefundable_credits
    - output: us-mt:policies/income_tax/resident_core_liability_pipeline#mt_pit_2026_net_income_tax_liability
      reason: |-
        Complete annual liability additionally requires the missing elderly
        property-tax-credit tables, all held modification and separate-tax
        branches, the refundable pass-through-entity-tax credit, full credit
        ordering, and shared-ownership public-access allocation when present.
      source_values:
        - us-mt:policies/income_tax/resident_core_liability_pipeline#mt_pit_2026_supported_profile_candidate_net_income_tax_liability

rules:
  - name: mt_pit_2026_ordinary_lower_rate
    kind: parameter
    dtype: Rate
    period: Year
    source: MCA 15-30-2103(1)
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source: {corpus_citation_path: us-mt/statute/15-30-2103, excerpt: "on the first $95,000 of Montana taxable income or any part of that income, 4.7%"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: '0.047'

  - name: mt_pit_2026_ordinary_upper_rate
    kind: parameter
    dtype: Rate
    period: Year
    source: MCA 15-30-2103(1)
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source: {corpus_citation_path: us-mt/statute/15-30-2103, excerpt: "on any Montana taxable income in excess of $95,000 or any part of that income, 5.65%"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: '0.0565'

  - name: mt_pit_2026_capital_gain_lower_rate
