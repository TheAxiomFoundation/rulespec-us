          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-mt/statute/15-30-2103, excerpt: "there must be levied, collected, and paid for each tax year"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: mt_pit_2026_profile_candidate_ordinary_income_tax + mt_pit_2026_profile_candidate_capital_gains_tax

  - name: mt_pit_2026_supported_profile_candidate_tax_after_nonrefundable_credits
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Supported profile excludes every held nonrefundable credit
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source: {corpus_citation_path: us-mt/statute/15-30-2357, excerpt: "The credit may not exceed the taxpayer's tax liability"}
          - path: versions[0].formula
            kind: exception
            source: {corpus_citation_path: us-mt/statute/15-30-2361, excerpt: "The credit allowed by this section may not be refunded"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: mt_pit_2026_supported_profile_candidate_tax_before_credits

  - name: mt_pit_2026_adopted_child_is_eligible
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: MCA 15-30-2321(1), (5), and (7)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source: {corpus_citation_path: us-mt/statute/15-30-2321, excerpt: "for the legal adoption of an eligible child"}
          - path: versions[0].formula
            kind: condition
            source: {corpus_citation_path: us-mt/statute/15-30-2321, excerpt: '"eligible child" means a child under the age of 18 or a person who is physically or mentally incapable of providing self-care'}
          - path: versions[0].formula
            kind: condition
            source: {corpus_citation_path: us-mt/statute/15-30-2321, excerpt: "Only one credit is allowed for each eligible child."}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          mt_pit_2026_has_adoption_claim
          and mt_pit_2026_adoption_became_final_in_2026
          and mt_pit_2026_adopted_child_credit_claimed_only_once
          and (
            mt_pit_2026_adopted_child_age_years < mt_pit_2026_adopted_child_age_limit
            or mt_pit_2026_adopted_child_is_incapable_of_self_care
          )

  - name: mt_pit_2026_refundable_adoption_credit
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: MCA 15-30-2321
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source: {corpus_citation_path: us-mt/statute/15-30-2321, excerpt: "$7,500 in the tax year the adoption is final if the eligible child was in foster care"}
          - path: versions[0].formula
            kind: amount
            source: {corpus_citation_path: us-mt/statute/15-30-2321, excerpt: "$5,000 in the tax year the adoption is final if the eligible child does not meet the requirements"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if not mt_pit_2026_supported_profile_applies:
            0
          elif not mt_pit_2026_adopted_child_is_eligible:
            0
          elif mt_pit_2026_adopted_child_was_in_montana_foster_care_at_adoption:
            mt_pit_2026_foster_care_adoption_amount
          else:
            mt_pit_2026_other_eligible_adoption_amount

  - name: mt_pit_2026_earned_income_credit_reduction_rate
    kind: derived
    entity: TaxUnit
    dtype: Rate
    period: Year
    source: MCA 15-30-2318(3) and (5)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-mt/statute/15-30-2318/block-1, excerpt: '"Reduction percentage" means a percentage that is calculated by dividing the earned income that is disallowed'}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if mt_pit_2026_federal_eitc_earned_income == 0:
            0
          else:
            mt_pit_2026_section_501d_disallowed_earned_income / mt_pit_2026_federal_eitc_earned_income

  - name: mt_pit_2026_refundable_earned_income_credit
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: MCA 15-30-2318
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-mt/statute/15-30-2318/block-1, excerpt: "a resident taxpayer is allowed as a credit against the tax imposed by 15-30-2103"}
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-mt/statute/15-30-2318/block-1, excerpt: "the amount of the state tax credit provided for in subsection (2) is reduced by the reduction percentage"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if mt_pit_2026_supported_profile_applies:
            mt_pit_2026_federal_earned_income_credit
            * mt_pit_2026_earned_income_credit_rate
            - mt_pit_2026_federal_earned_income_credit
            * mt_pit_2026_earned_income_credit_rate
            * mt_pit_2026_earned_income_credit_reduction_rate
          else:
            0

  - name: mt_pit_2026_refundable_public_access_credit
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: MCA 15-30-2380
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-mt/statute/15-30-2380, excerpt: "in the amount of $750 for each qualified access to public land that is provided"}
          - path: versions[0].formula
            kind: amount
            source: {corpus_citation_path: us-mt/statute/15-30-2380, excerpt: "The maximum credit that a taxpayer may claim in a year under this section is $3,000."}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if mt_pit_2026_supported_profile_applies:
            min(mt_pit_2026_public_access_annual_cap, mt_pit_2026_public_access_amount * mt_pit_2026_fully_owned_certified_public_access_count)
          else:
            0

  - name: mt_pit_2026_supported_profile_candidate_refundable_credits
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: MCA 15-30-2318(4), 15-30-2321(4), and 15-30-2380(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-mt/statute/15-30-2318/block-1, excerpt: "The taxpayer is entitled to a refund equal to the amount by which the credit exceeds the taxpayer's tax liability"}
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-mt/statute/15-30-2321, excerpt: "The taxpayer is entitled to a refund equal to the amount by which the credit exceeds the taxpayer's tax liability"}
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-mt/statute/15-30-2380, excerpt: "If the amount of the credit exceeds the taxpayer's liability"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          mt_pit_2026_refundable_earned_income_credit
          + mt_pit_2026_refundable_adoption_credit
          + mt_pit_2026_refundable_public_access_credit

  - name: mt_pit_2026_supported_profile_candidate_net_income_tax_liability
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Net Montana income-tax liability before payments
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-mt/statute/15-30-2321, excerpt: "or, if the taxpayer has no tax liability under this chapter, a refund equal to the amount of the credit"}
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-mt/statute/15-30-2380, excerpt: "The credit may be claimed even if the claimant has no taxable income."}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: mt_pit_2026_supported_profile_candidate_tax_after_nonrefundable_credits - mt_pit_2026_supported_profile_candidate_refundable_credits

