format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_paths:
      - us-mt/statute/15-30-2101
      - us-mt/statute/15-30-2103
      - us-mt/statute/15-30-2120
      - us-mt/statute/15-30-2302
      - us-mt/statute/15-30-2318/block-1
      - us-mt/statute/15-30-2321
      - us-mt/statute/15-30-2328
      - us-mt/statute/15-30-2334
      - us-mt/statute/15-30-2335
      - us-mt/statute/15-30-2337
      - us-mt/statute/15-30-2338
      - us-mt/statute/15-30-2340
      - us-mt/statute/15-30-2341
      - us-mt/statute/15-30-2342
      - us-mt/statute/15-30-2357
      - us-mt/statute/15-30-2359
      - us-mt/statute/15-30-2361
      - us-mt/statute/15-30-2380
      - us-mt/statute/15-30-3703
      - us-mt/statute/15-30-3704
    upstream_source_check:
      status: checked_higher_authority
      checked_paths:
        - us-mt/statute/15-30
        - us-mt/statute/15-30-2101
        - us-mt/statute/15-30-2103
        - us-mt/statute/15-30-2120
        - us-mt/statute/15-30-23
        - us-mt/statute/15-30-37
      rationale: |-
        The pinned official Montana Code package supplies the current Title 15
        individual-income-tax chapter, the temporary schedule that terminates
        after tax year 2026, federal-taxable-income modifications, and the
        earned-income, adoption, and public-land-access refundable credits
        encoded here.

        The package does not include the department's November 2025 inflation
        determinations for the tax-year-2026 age-65 and volunteer subtractions
        or the indexed family-education contribution deduction. The elderly
        property-tax-credit tables are absent from the normalized provision,
        and annual-return instructions and credit ordering are not pinned.
        Cross-title eligibility and certification rules for the remaining
        specialty credits are also outside the pinned Title 15 chain. Those
        branches are typed holds, never caller-completed amounts.
  summary: |-
    Tax-year-2026 Montana full-year resident individual-income-tax core. It
    starts from federal taxable income, applies the directly source-grounded
    additions and subtractions in MCA 15-30-2120, computes Montana taxable
    income, separates the federal section 1222 net-long-term-capital-gain
    portion, and applies every filing-status branch of the temporary section
    15-30-2103 schedule. Montana law defines this modified federal-taxable-
    income result directly as Montana taxable income, so there is no separate
    Montana adjusted-gross-income or state deduction stage to invent.

    Within the disclosed supported profile, tax after nonrefundable credits
    equals schedule tax because all specialty nonrefundable-credit branches are
    excluded. The module then computes the refundable earned-income and
    adoption credits and the refundable credit for fully owned, independently
    certified public-land accesses. Net liability may therefore be negative.
    The candidate is not a
    complete annual-return liability outside this profile: indexed deductions,
    the elderly property-tax credit, entrepreneur-magnet gain, other-state
    credit, shared-access allocation, and specialty credits remain typed holds.
  deferred_outputs:
    - output: us-mt:policies/income_tax/resident_core_liability_pipeline#mt_pit_2026_complete_montana_taxable_income
      reason: |-
        The November 2025 department inflation determinations for the 2026
        age-65, volunteer, and family-education contribution amounts are not in
        the pinned corpus. Fiduciary, military-retirement, and medical-savings
        branches also depend on held eligibility chains.
      source_values:
        - us-mt:policies/income_tax/resident_core_liability_pipeline#mt_pit_2026_supported_profile_applies
        - us-mt:policies/income_tax/resident_core_liability_pipeline#mt_pit_2026_profile_candidate_montana_taxable_income
    - output: us-mt:policies/income_tax/resident_core_liability_pipeline#mt_pit_2026_complete_tax_after_nonrefundable_credits
      reason: |-
        The pinned corpus lacks the annual-return ordering and cross-title
        eligibility or certification chain for the other-state, endowment,
        education, historic-building, apprentice, trades-training, job-growth,
        and other Title 15 nonrefundable credits.
      source_values:
        - us-mt:policies/income_tax/resident_core_liability_pipeline#mt_pit_2026_supported_profile_candidate_tax_after_nonrefundable_credits
    - output: us-mt:policies/income_tax/resident_core_liability_pipeline#mt_pit_2026_net_income_tax_liability
      reason: |-
        Complete annual liability additionally requires the missing elderly
        property-tax-credit tables, all held modification branches, full credit
        ordering, and shared-ownership public-access allocation when present.
      source_values:
        - us-mt:policies/income_tax/resident_core_liability_pipeline#mt_pit_2026_supported_profile_candidate_net_income_tax_liability

rules:
  - name: mt_pit_2026_ordinary_lower_rate
    kind: parameter
    dtype: Rate
    period: Year
    source: MCA 15-30-2103(1)
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source: {corpus_citation_path: us-mt/statute/15-30-2103, excerpt: "on the first $95,000 of Montana taxable income or any part of that income, 4.7%"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: '0.047'

  - name: mt_pit_2026_ordinary_upper_rate
    kind: parameter
    dtype: Rate
    period: Year
    source: MCA 15-30-2103(1)
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source: {corpus_citation_path: us-mt/statute/15-30-2103, excerpt: "on any Montana taxable income in excess of $95,000 or any part of that income, 5.65%"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: '0.0565'

  - name: mt_pit_2026_capital_gain_lower_rate
    kind: parameter
    dtype: Rate
    period: Year
    source: MCA 15-30-2103(2)
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source: {corpus_citation_path: us-mt/statute/15-30-2103, excerpt: "on the first $95,000 less nonqualified taxable income of net long-term capital gains, 3.0%"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: '0.03'

  - name: mt_pit_2026_capital_gain_upper_rate
    kind: parameter
    dtype: Rate
    period: Year
    source: MCA 15-30-2103(2)
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source: {corpus_citation_path: us-mt/statute/15-30-2103, excerpt: "all of the net long-term capital gains are taxed at 4.1%"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: '0.041'

  - name: mt_pit_2026_single_or_separate_threshold
    kind: parameter
    dtype: Money
    period: Year
    unit: USD
    source: MCA 15-30-2103(1)(c)-(d)
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source: {corpus_citation_path: us-mt/statute/15-30-2103, excerpt: "on the first $47,500 of Montana taxable income or any part of that income, 4.7%"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: '47500.0'

  - name: mt_pit_2026_head_of_household_threshold
    kind: parameter
    dtype: Money
    period: Year
    unit: USD
    source: MCA 15-30-2103(1)(b)
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source: {corpus_citation_path: us-mt/statute/15-30-2103, excerpt: "on the first $71,250 of Montana taxable income or any part of that income, 4.7%"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: '71250.0'

  - name: mt_pit_2026_joint_or_surviving_spouse_threshold
    kind: parameter
    dtype: Money
    period: Year
    unit: USD
    source: MCA 15-30-2103(1)(a)
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source: {corpus_citation_path: us-mt/statute/15-30-2103, excerpt: "on the first $95,000 of Montana taxable income or any part of that income, 4.7%"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: '95000.0'

  - name: mt_pit_2026_able_single_or_separate_cap
    kind: parameter
    dtype: Money
    period: Year
    unit: USD
    source: MCA 15-30-2120(6)(a)
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source: {corpus_citation_path: us-mt/statute/15-30-2120, excerpt: "may reduce taxable income by the lesser of $3,000 or the amount of the contribution"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: '3000.0'

  - name: mt_pit_2026_able_joint_cap
    kind: parameter
    dtype: Money
    period: Year
    unit: USD
    source: MCA 15-30-2120(6)(a)
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source: {corpus_citation_path: us-mt/statute/15-30-2120, excerpt: "Married taxpayers filing a joint return are entitled to a reduction, not to exceed $6,000"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: '6000.0'

  - name: mt_pit_2026_foster_care_adoption_amount
    kind: parameter
    dtype: Money
    period: Year
    unit: USD
    source: MCA 15-30-2321(2)(a)
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source: {corpus_citation_path: us-mt/statute/15-30-2321, excerpt: "$7,500 in the tax year the adoption is final if the eligible child was in foster care"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: '7500.0'

  - name: mt_pit_2026_other_eligible_adoption_amount
    kind: parameter
    dtype: Money
    period: Year
    unit: USD
    source: MCA 15-30-2321(2)(b)
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source: {corpus_citation_path: us-mt/statute/15-30-2321, excerpt: "$5,000 in the tax year the adoption is final if the eligible child does not meet the requirements"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: '5000.0'

  - name: mt_pit_2026_public_access_amount
    kind: parameter
    dtype: Money
    period: Year
    unit: USD
    source: MCA 15-30-2380(1)
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source: {corpus_citation_path: us-mt/statute/15-30-2380, excerpt: "in the amount of $750 for each qualified access to public land that is provided"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: '750.0'

  - name: mt_pit_2026_public_access_annual_cap
    kind: parameter
    dtype: Money
    period: Year
    unit: USD
    source: MCA 15-30-2380(1)
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source: {corpus_citation_path: us-mt/statute/15-30-2380, excerpt: "The maximum credit that a taxpayer may claim in a year under this section is $3,000."}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: '3000.0'

  - name: mt_pit_2026_earned_income_credit_rate
    kind: parameter
    dtype: Rate
    period: Year
    source: MCA 15-30-2318(2)
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source: {corpus_citation_path: us-mt/statute/15-30-2318/block-1, excerpt: "20% of the amount of the credit determined for the tax year"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: '0.20'

  - name: mt_pit_2026_input_domain_is_valid
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: Fail-closed domain for the statutory resident core
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source: {corpus_citation_path: us-mt/statute/15-30-2101, excerpt: '"Montana taxable income" means federal taxable income as determined for federal income tax purposes and adjusted as provided in 15-30-2120.'}
          - path: versions[0].formula
            kind: condition
            source: {corpus_citation_path: us-mt/statute/15-30-2103, excerpt: "for every married individual who files a joint return and for every surviving spouse"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          not (mt_pit_2026_filing_status_joint and mt_pit_2026_filing_status_surviving_spouse)
          and not (mt_pit_2026_filing_status_joint and mt_pit_2026_filing_status_head_of_household)
          and not (mt_pit_2026_filing_status_joint and mt_pit_2026_filing_status_married_separate)
          and not (mt_pit_2026_filing_status_surviving_spouse and mt_pit_2026_filing_status_head_of_household)
          and not (mt_pit_2026_filing_status_surviving_spouse and mt_pit_2026_filing_status_married_separate)
          and not (mt_pit_2026_filing_status_head_of_household and mt_pit_2026_filing_status_married_separate)
          and mt_pit_2026_federal_taxable_income >= 0
          and mt_pit_2026_section_1222_net_long_term_capital_gain >= 0
          and mt_pit_2026_federal_itemized_deduction >= 0
          and mt_pit_2026_federal_standard_deduction >= 0
          and mt_pit_2026_other_state_obligation_interest >= 0
          and mt_pit_2026_s_corporation_federal_tax_reduction >= 0
          and mt_pit_2026_title_plant_depreciation_or_amortization >= 0
          and mt_pit_2026_prior_deduction_recovery_with_montana_tax_benefit >= 0
          and mt_pit_2026_item_used_for_federal_income_and_montana_credit >= 0
          and mt_pit_2026_estate_or_trust_distribution_federal_deduction >= 0
          and mt_pit_2026_nonqualified_medical_savings_withdrawal >= 0
          and mt_pit_2026_nonqualified_first_home_withdrawal >= 0
          and mt_pit_2026_federal_qualified_business_income_deduction >= 0
          and mt_pit_2026_individual_state_income_tax_itemized_deduction >= 0
          and mt_pit_2026_pass_through_state_income_tax_deduction >= 0
          and mt_pit_2026_us_obligation_interest >= 0
          and mt_pit_2026_railroad_retirement_benefits >= 0
          and mt_pit_2026_qualifying_active_duty_regular_forces_salary >= 0
          and mt_pit_2026_qualifying_national_guard_salary >= 0
          and mt_pit_2026_qualifying_military_beneficiary_payment >= 0
          and mt_pit_2026_qualifying_veterans_bonus_payment >= 0
          and mt_pit_2026_qualified_529_withdrawals_and_earnings >= 0
          and mt_pit_2026_pre_2024_first_home_interest_and_qualified_withdrawals >= 0
          and mt_pit_2026_student_scholarship_organization_scholarship >= 0
          and mt_pit_2026_public_access_payment >= 0
          and mt_pit_2026_state_income_tax_refund_in_federal_income >= 0
          and mt_pit_2026_recovery_without_prior_montana_tax_benefit >= 0
          and mt_pit_2026_mobile_home_park_qualifying_gain >= 0
          and mt_pit_2026_end_of_watch_trust_payment >= 0
          and mt_pit_2026_ammunition_component_manufacturing_income >= 0
          and mt_pit_2026_ammunition_manufacturer_loan_income >= 0
          and mt_pit_2026_property_tax_rebate_received_before_termination >= 0
          and mt_pit_2026_federal_credit_reduced_business_expenses_without_state_credit >= 0
          and mt_pit_2026_qualified_able_contributions >= 0
          and mt_pit_2026_foster_care_adoptions_finalized_count >= 0
          and mt_pit_2026_foster_care_adoptions_finalized_count == floor(mt_pit_2026_foster_care_adoptions_finalized_count)
          and mt_pit_2026_other_eligible_adoptions_finalized_count >= 0
          and mt_pit_2026_other_eligible_adoptions_finalized_count == floor(mt_pit_2026_other_eligible_adoptions_finalized_count)
          and mt_pit_2026_fully_owned_certified_public_access_count >= 0
          and mt_pit_2026_fully_owned_certified_public_access_count == floor(mt_pit_2026_fully_owned_certified_public_access_count)
          and mt_pit_2026_federal_earned_income_credit >= 0
          and mt_pit_2026_federal_eitc_earned_income >= 0
          and mt_pit_2026_section_501d_disallowed_earned_income >= 0
          and mt_pit_2026_section_501d_disallowed_earned_income <= mt_pit_2026_federal_eitc_earned_income

  - name: mt_pit_2026_supported_profile_applies
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: Bounded full-year resident annual-liability profile
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source: {corpus_citation_path: us-mt/statute/15-30-2101, excerpt: '"Resident" applies only to natural persons and includes, for the purpose of determining liability to the tax imposed by this chapter'}
          - path: versions[0].formula
            kind: exception
            source: {corpus_citation_path: us-mt/statute/15-30-2120, excerpt: "By November 1 of each year, the department shall multiply the subtractions from federal taxable income"}
          - path: versions[0].formula
            kind: exception
            source: {corpus_citation_path: us-mt/statute/15-30-2302, excerpt: "The allowable credit must be computed by a formula prescribed by the department."}
          - path: versions[0].formula
            kind: exception
            source: {corpus_citation_path: us-mt/statute/15-30-2340, excerpt: "Property tax billed and rent-equivalent tax paid are reduced according to the following schedule"}
          - path: versions[0].formula
            kind: exception
            source: {corpus_citation_path: us-mt/statute/15-30-3704, excerpt: "Subject to the conditions of 15-30-3703, an alternative tax rate of 0% is imposed"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          mt_pit_2026_input_domain_is_valid
          and mt_pit_2026_is_full_year_resident_return
          and not mt_pit_2026_has_estate_trust_or_pass_through_modification
          and mt_pit_2026_estate_or_trust_distribution_federal_deduction == 0
          and mt_pit_2026_pass_through_state_income_tax_deduction == 0
          and not mt_pit_2026_has_medical_savings_subtraction
          and not mt_pit_2026_has_age_65_indexed_subtraction
          and not mt_pit_2026_has_military_retirement_subtraction
          and not mt_pit_2026_has_volunteer_indexed_subtraction
          and not mt_pit_2026_has_family_education_contribution_deduction
          and not mt_pit_2026_has_entrepreneur_magnet_qualifying_gain
          and not mt_pit_2026_has_other_state_or_country_tax_credit
          and not mt_pit_2026_has_qualified_endowment_credit
          and not mt_pit_2026_has_education_donation_credit
          and not mt_pit_2026_has_elderly_property_tax_credit
          and not mt_pit_2026_has_historic_building_credit
          and not mt_pit_2026_has_apprentice_credit
          and not mt_pit_2026_has_trades_training_credit
          and not mt_pit_2026_has_job_growth_credit
          and not mt_pit_2026_has_other_title_15_nonrefundable_credit
          and not mt_pit_2026_has_shared_or_duplicate_public_access_claim

  - name: mt_pit_2026_individual_state_income_tax_addback
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: MCA 15-30-2120(2)(j)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-mt/statute/15-30-2120, excerpt: "an additional amount equal to the state income tax deduction claimed, not to exceed the amount required to reduce the federal itemized amount"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          min(
            mt_pit_2026_individual_state_income_tax_itemized_deduction,
            max(0, mt_pit_2026_federal_itemized_deduction - mt_pit_2026_federal_standard_deduction)
          )

  - name: mt_pit_2026_profile_candidate_additions
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: MCA 15-30-2120(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-mt/statute/15-30-2120, excerpt: "The following are added to federal taxable income"}
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-mt/statute/15-30-2120, excerpt: "an amount equal to the qualified business income deduction claimed"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          mt_pit_2026_other_state_obligation_interest
          + mt_pit_2026_s_corporation_federal_tax_reduction
          + mt_pit_2026_title_plant_depreciation_or_amortization
          + mt_pit_2026_prior_deduction_recovery_with_montana_tax_benefit
          + mt_pit_2026_item_used_for_federal_income_and_montana_credit
          + mt_pit_2026_estate_or_trust_distribution_federal_deduction
          + mt_pit_2026_nonqualified_medical_savings_withdrawal
          + mt_pit_2026_nonqualified_first_home_withdrawal
          + mt_pit_2026_federal_qualified_business_income_deduction
          + mt_pit_2026_individual_state_income_tax_addback
          + mt_pit_2026_pass_through_state_income_tax_deduction

  - name: mt_pit_2026_qualified_able_contribution_subtraction
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: MCA 15-30-2120(6)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-mt/statute/15-30-2120, excerpt: "may reduce taxable income by the lesser of $3,000 or the amount of the contribution"}
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-mt/statute/15-30-2120, excerpt: "Married taxpayers filing a joint return are entitled to a reduction, not to exceed $6,000"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if mt_pit_2026_filing_status_joint:
            min(mt_pit_2026_able_joint_cap, mt_pit_2026_qualified_able_contributions)
          else:
            min(mt_pit_2026_able_single_or_separate_cap, mt_pit_2026_qualified_able_contributions)

  - name: mt_pit_2026_profile_candidate_subtractions
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: MCA 15-30-2120(3)-(6)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-mt/statute/15-30-2120, excerpt: "the following are subtracted from federal taxable income"}
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-mt/statute/15-30-2120, excerpt: "is allowed to deduct the amount of the business expense paid when there is no corresponding state income tax credit or deduction"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          mt_pit_2026_us_obligation_interest
          + mt_pit_2026_railroad_retirement_benefits
          + mt_pit_2026_qualifying_active_duty_regular_forces_salary
          + mt_pit_2026_qualifying_national_guard_salary
          + mt_pit_2026_qualifying_military_beneficiary_payment
          + mt_pit_2026_qualifying_veterans_bonus_payment
          + mt_pit_2026_qualified_529_withdrawals_and_earnings
          + mt_pit_2026_pre_2024_first_home_interest_and_qualified_withdrawals
          + mt_pit_2026_student_scholarship_organization_scholarship
          + mt_pit_2026_public_access_payment
          + mt_pit_2026_state_income_tax_refund_in_federal_income
          + mt_pit_2026_recovery_without_prior_montana_tax_benefit
          + mt_pit_2026_mobile_home_park_qualifying_gain
          + mt_pit_2026_end_of_watch_trust_payment
          + mt_pit_2026_ammunition_component_manufacturing_income
          + mt_pit_2026_ammunition_manufacturer_loan_income
          + mt_pit_2026_property_tax_rebate_received_before_termination
          + mt_pit_2026_federal_credit_reduced_business_expenses_without_state_credit
          + mt_pit_2026_qualified_able_contribution_subtraction

  - name: mt_pit_2026_profile_candidate_montana_taxable_income
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: MCA 15-30-2101(22) and 15-30-2120(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-mt/statute/15-30-2120, excerpt: "The items in subsection (2) are added to and the items in subsection (3) are subtracted from federal taxable income to determine Montana taxable income."}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          max(
            0,
            mt_pit_2026_federal_taxable_income
            + mt_pit_2026_profile_candidate_additions
            - mt_pit_2026_profile_candidate_subtractions
          )

  - name: mt_pit_2026_profile_candidate_net_long_term_capital_gain
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: MCA 15-30-2103(2)-(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-mt/statute/15-30-2103, excerpt: "that portion of a taxpayer's Montana taxable income that consists of net long-term capital gains"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: min(mt_pit_2026_profile_candidate_montana_taxable_income, mt_pit_2026_section_1222_net_long_term_capital_gain)

  - name: mt_pit_2026_profile_candidate_nonqualified_taxable_income
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: MCA 15-30-2103(3)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-mt/statute/15-30-2103, excerpt: '"Nonqualified taxable income" means Montana taxable income that is not considered net long-term capital gains.'}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: max(0, mt_pit_2026_profile_candidate_montana_taxable_income - mt_pit_2026_profile_candidate_net_long_term_capital_gain)

  - name: mt_pit_2026_filing_status_threshold
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: MCA 15-30-2103(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-mt/statute/15-30-2103, excerpt: "for every married individual who files a joint return and for every surviving spouse"}
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-mt/statute/15-30-2103, excerpt: "for every head of household"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if mt_pit_2026_filing_status_joint or mt_pit_2026_filing_status_surviving_spouse:
            mt_pit_2026_joint_or_surviving_spouse_threshold
          else:
            if mt_pit_2026_filing_status_head_of_household:
              mt_pit_2026_head_of_household_threshold
            else:
              mt_pit_2026_single_or_separate_threshold

  - name: mt_pit_2026_profile_candidate_ordinary_income_tax
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: MCA 15-30-2103(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-mt/statute/15-30-2103, excerpt: "a tax on the brackets of taxable income as follows"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          mt_pit_2026_ordinary_lower_rate * min(mt_pit_2026_profile_candidate_nonqualified_taxable_income, mt_pit_2026_filing_status_threshold)
          + mt_pit_2026_ordinary_upper_rate * max(0, mt_pit_2026_profile_candidate_nonqualified_taxable_income - mt_pit_2026_filing_status_threshold)

  - name: mt_pit_2026_profile_candidate_capital_gain_lower_band
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: MCA 15-30-2103(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-mt/statute/15-30-2103, excerpt: "the first $95,000 less nonqualified taxable income of net long-term capital gains"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: max(0, mt_pit_2026_filing_status_threshold - mt_pit_2026_profile_candidate_nonqualified_taxable_income)

  - name: mt_pit_2026_profile_candidate_capital_gains_tax
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: MCA 15-30-2103(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-mt/statute/15-30-2103, excerpt: "subject to a tax on the brackets of net long-term capital gains as follows"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          mt_pit_2026_capital_gain_lower_rate * min(mt_pit_2026_profile_candidate_net_long_term_capital_gain, mt_pit_2026_profile_candidate_capital_gain_lower_band)
          + mt_pit_2026_capital_gain_upper_rate * max(0, mt_pit_2026_profile_candidate_net_long_term_capital_gain - mt_pit_2026_profile_candidate_capital_gain_lower_band)

  - name: mt_pit_2026_supported_profile_candidate_tax_before_credits
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: MCA 15-30-2103
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-mt/statute/15-30-2103, excerpt: "there must be levied, collected, and paid for each tax year"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: mt_pit_2026_profile_candidate_ordinary_income_tax + mt_pit_2026_profile_candidate_capital_gains_tax

  - name: mt_pit_2026_supported_profile_candidate_tax_after_nonrefundable_credits
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Supported profile excludes every held nonrefundable credit
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source: {corpus_citation_path: us-mt/statute/15-30-2357, excerpt: "The credit may not exceed the taxpayer's tax liability"}
          - path: versions[0].formula
            kind: exception
            source: {corpus_citation_path: us-mt/statute/15-30-2361, excerpt: "The credit allowed by this section may not be refunded"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: mt_pit_2026_supported_profile_candidate_tax_before_credits

  - name: mt_pit_2026_refundable_adoption_credit
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: MCA 15-30-2321
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source: {corpus_citation_path: us-mt/statute/15-30-2321, excerpt: "$7,500 in the tax year the adoption is final if the eligible child was in foster care"}
          - path: versions[0].formula
            kind: amount
            source: {corpus_citation_path: us-mt/statute/15-30-2321, excerpt: "$5,000 in the tax year the adoption is final if the eligible child does not meet the requirements"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          mt_pit_2026_foster_care_adoption_amount * mt_pit_2026_foster_care_adoptions_finalized_count
          + mt_pit_2026_other_eligible_adoption_amount * mt_pit_2026_other_eligible_adoptions_finalized_count

  - name: mt_pit_2026_earned_income_credit_reduction_rate
    kind: derived
    entity: TaxUnit
    dtype: Rate
    period: Year
    source: MCA 15-30-2318(3) and (5)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-mt/statute/15-30-2318/block-1, excerpt: '"Reduction percentage" means a percentage that is calculated by dividing the earned income that is disallowed'}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if mt_pit_2026_federal_eitc_earned_income == 0:
            0
          else:
            mt_pit_2026_section_501d_disallowed_earned_income / mt_pit_2026_federal_eitc_earned_income

  - name: mt_pit_2026_refundable_earned_income_credit
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: MCA 15-30-2318
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-mt/statute/15-30-2318/block-1, excerpt: "a resident taxpayer is allowed as a credit against the tax imposed by 15-30-2103"}
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-mt/statute/15-30-2318/block-1, excerpt: "the amount of the state tax credit provided for in subsection (2) is reduced by the reduction percentage"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          mt_pit_2026_federal_earned_income_credit
          * mt_pit_2026_earned_income_credit_rate
          - mt_pit_2026_federal_earned_income_credit
          * mt_pit_2026_earned_income_credit_rate
          * mt_pit_2026_earned_income_credit_reduction_rate

  - name: mt_pit_2026_refundable_public_access_credit
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: MCA 15-30-2380
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-mt/statute/15-30-2380, excerpt: "in the amount of $750 for each qualified access to public land that is provided"}
          - path: versions[0].formula
            kind: amount
            source: {corpus_citation_path: us-mt/statute/15-30-2380, excerpt: "The maximum credit that a taxpayer may claim in a year under this section is $3,000."}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: min(mt_pit_2026_public_access_annual_cap, mt_pit_2026_public_access_amount * mt_pit_2026_fully_owned_certified_public_access_count)

  - name: mt_pit_2026_supported_profile_candidate_refundable_credits
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: MCA 15-30-2318(4), 15-30-2321(4), and 15-30-2380(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-mt/statute/15-30-2318/block-1, excerpt: "The taxpayer is entitled to a refund equal to the amount by which the credit exceeds the taxpayer's tax liability"}
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-mt/statute/15-30-2321, excerpt: "The taxpayer is entitled to a refund equal to the amount by which the credit exceeds the taxpayer's tax liability"}
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-mt/statute/15-30-2380, excerpt: "If the amount of the credit exceeds the taxpayer's liability"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          mt_pit_2026_refundable_earned_income_credit
          + mt_pit_2026_refundable_adoption_credit
          + mt_pit_2026_refundable_public_access_credit

  - name: mt_pit_2026_supported_profile_candidate_net_income_tax_liability
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Net Montana income-tax liability before payments
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-mt/statute/15-30-2321, excerpt: "or, if the taxpayer has no tax liability under this chapter, a refund equal to the amount of the credit"}
          - path: versions[0].formula
            kind: formula
            source: {corpus_citation_path: us-mt/statute/15-30-2380, excerpt: "The credit may be claimed even if the claimant has no taxable income."}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: mt_pit_2026_supported_profile_candidate_tax_after_nonrefundable_credits - mt_pit_2026_supported_profile_candidate_refundable_credits

