            source: {corpus_citation_path: us-mt/statute/15-30-2103, excerpt: "on the first $95,000 less nonqualified taxable income of net long-term capital gains, 3.0%"}
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: '0.03'

  - name: mt_pit_2026_capital_gain_upper_rate
