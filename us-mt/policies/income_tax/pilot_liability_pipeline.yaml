format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-mt/statute/15-30-2103
    upstream_source_check:
      status: composed_from_supplied_current_authority
      checked_paths:
        - us-mt/statute/15-30-2103
      rationale: |-
        Montana Code Annotated 15-30-2103 contains a temporary schedule that
        terminates December 31, 2026. Subsection (1) taxes nonqualified Montana
        taxable income at 4.7 percent through a filing-status threshold and
        5.65 percent above it. Subsection (2) taxes the portion of Montana
        taxable income consisting of net long-term capital gains at 3 percent
        through the unused part of the same threshold and 4.1 percent above it.
        The fixed thresholds are $95,000 for joint and surviving-spouse filers,
        $71,250 for heads of household, and $47,500 for single and separate
        filers. This module accepts completed-return Montana taxable income,
        the taxable net-long-term-capital-gain portion, and two mutually
        exclusive filing-status classifications as caller boundaries. It does
        not reconstruct Montana taxable income or the federal section 1222
        capital-gain classification. The module fails closed outside 2026.
  summary: |-
    Montana 2026 individual-income-tax liability before nonrefundable credits.
    The pipeline composes the complete temporary MCA 15-30-2103 schedule,
    including every individual filing-status threshold and the separate
    net-long-term-capital-gain rates. The caller supplies completed-return
    Montana taxable income, its section 1222 net-long-term-capital-gain portion,
    and filing-status classifications. Net long-term capital gains are capped
    at taxable income at this boundary, nonqualified taxable income is the
    remainder, and both portions consume the same filing-status threshold in
    the order required by subsection (2). Credits and the upstream taxable-
    income calculation remain outside this narrow target.
rules:
  - name: mt_pit_pilot_ordinary_lower_rate
    kind: parameter
    dtype: Rate
    period: Year
    source: MCA 15-30-2103(1), 2026 ordinary-income lower rate
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-mt/statute/15-30-2103
              excerpt: "on the first $95,000 of Montana taxable income or any part of that income, 4.7%"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: '0.047'

  - name: mt_pit_pilot_ordinary_upper_rate
    kind: parameter
    dtype: Rate
    period: Year
    source: MCA 15-30-2103(1), 2026 ordinary-income upper rate
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-mt/statute/15-30-2103
              excerpt: "on any Montana taxable income in excess of $95,000 or any part of that income, 5.65%"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: '0.0565'

  - name: mt_pit_pilot_capital_gain_lower_rate
    kind: parameter
    dtype: Rate
    period: Year
    source: MCA 15-30-2103(2), 2026 net-long-term-capital-gain lower rate
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-mt/statute/15-30-2103
              excerpt: "on the first $95,000 less nonqualified taxable income of net long-term capital gains, 3.0%"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: '0.03'

  - name: mt_pit_pilot_capital_gain_upper_rate
    kind: parameter
    dtype: Rate
    period: Year
    source: MCA 15-30-2103(2), 2026 net-long-term-capital-gain upper rate
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-mt/statute/15-30-2103
              excerpt: "all of the net long-term capital gains are taxed at 4.1%"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: '0.041'

  - name: mt_pit_pilot_single_or_separate_threshold
    kind: parameter
    dtype: Money
    period: Year
    unit: USD
    source: MCA 15-30-2103(1)(c)-(d), 2026 single and separate threshold
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-mt/statute/15-30-2103
              excerpt: "on the first $47,500 of Montana taxable income or any part of that income, 4.7%"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: '47500.0'

  - name: mt_pit_pilot_head_of_household_threshold
    kind: parameter
    dtype: Money
    period: Year
    unit: USD
    source: MCA 15-30-2103(1)(b), 2026 head-of-household threshold
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-mt/statute/15-30-2103
              excerpt: "on the first $71,250 of Montana taxable income or any part of that income, 4.7%"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: '71250.0'

  - name: mt_pit_pilot_joint_or_surviving_spouse_threshold
    kind: parameter
    dtype: Money
    period: Year
    unit: USD
    source: MCA 15-30-2103(1)(a), 2026 joint and surviving-spouse threshold
    metadata:
      private: true
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-mt/statute/15-30-2103
              excerpt: "on the first $95,000 of Montana taxable income or any part of that income, 4.7%"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: '95000.0'

  - name: mt_pit_pilot_taxable_income
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: MCA 15-30-2103, supplied completed-return Montana taxable income
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-mt/statute/15-30-2103
              excerpt: "on the Montana taxable income of each taxpayer subject to this chapter"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: max(0, mt_pit_pilot_state_taxable_income)

  - name: mt_pit_pilot_net_long_term_capital_gain
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 15-30-2103(a), supplied section 1222 net-long-term-capital-gain portion capped at Montana taxable income
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-mt/statute/15-30-2103
              excerpt: "that portion of a taxpayer's Montana taxable income that consists of net long-term capital gains"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: min(mt_pit_pilot_taxable_income, max(0, mt_pit_pilot_section_1222_net_long_term_capital_gain))

  - name: mt_pit_pilot_nonqualified_taxable_income
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 15-30-2103(b), taxable income not considered net long-term capital gains
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-mt/statute/15-30-2103
              excerpt: '"Nonqualified taxable income" means Montana taxable income that is not considered net long-term capital gains.'
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: max(0, mt_pit_pilot_taxable_income - mt_pit_pilot_net_long_term_capital_gain)

  - name: mt_pit_pilot_filing_status_threshold
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: MCA 15-30-2103(1), 2026 threshold selected by filing status
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-mt/statute/15-30-2103
              excerpt: "for every married individual who files a joint return and for every surviving spouse"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-mt/statute/15-30-2103
              excerpt: "for every head of household"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-mt/statute/15-30-2103
              excerpt: "for every individual other than a surviving spouse or head of household who is not a married individual"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-mt/statute/15-30-2103
              excerpt: "for every married individual who does not make a joint return"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          if mt_pit_pilot_filing_status_joint_or_surviving_spouse:
            mt_pit_pilot_joint_or_surviving_spouse_threshold
          else:
            if mt_pit_pilot_filing_status_head_of_household:
              mt_pit_pilot_head_of_household_threshold
            else:
              mt_pit_pilot_single_or_separate_threshold

  - name: mt_pit_pilot_ordinary_income_tax
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: MCA 15-30-2103(1), ordinary schedule applied to nonqualified taxable income
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-mt/statute/15-30-2103
              excerpt: "a tax on the brackets of taxable income as follows"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          mt_pit_pilot_ordinary_lower_rate * min(mt_pit_pilot_nonqualified_taxable_income, mt_pit_pilot_filing_status_threshold)
          + mt_pit_pilot_ordinary_upper_rate * max(0, mt_pit_pilot_nonqualified_taxable_income - mt_pit_pilot_filing_status_threshold)

  - name: mt_pit_pilot_capital_gain_lower_band
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: MCA 15-30-2103(2), filing-status threshold reduced by nonqualified taxable income
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-mt/statute/15-30-2103
              excerpt: "the first $95,000 less nonqualified taxable income of net long-term capital gains"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: max(0, mt_pit_pilot_filing_status_threshold - mt_pit_pilot_nonqualified_taxable_income)

  - name: mt_pit_pilot_capital_gains_tax
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: MCA 15-30-2103(2), net-long-term-capital-gain schedule
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-mt/statute/15-30-2103
              excerpt: "subject to a tax on the brackets of net long-term capital gains as follows"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: |-
          mt_pit_pilot_capital_gain_lower_rate * min(mt_pit_pilot_net_long_term_capital_gain, mt_pit_pilot_capital_gain_lower_band)
          + mt_pit_pilot_capital_gain_upper_rate * max(0, mt_pit_pilot_net_long_term_capital_gain - mt_pit_pilot_capital_gain_lower_band)

  - name: mt_pit_pilot_income_tax_liability
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: MCA 15-30-2103, ordinary and net-long-term-capital-gain tax before credits
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-mt/statute/15-30-2103
              excerpt: "there must be levied, collected, and paid for each tax year"
    versions:
      - effective_from: '2026-01-01'
        effective_to: '2026-12-31'
        formula: mt_pit_pilot_ordinary_income_tax + mt_pit_pilot_capital_gains_tax
inputs:
  - name: mt_pit_pilot_state_taxable_income
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    description: Completed-return Montana taxable income supplied by the caller as an upstream oracle boundary.
  - name: mt_pit_pilot_section_1222_net_long_term_capital_gain
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    description: Net long-term capital gain under IRC section 1222, after netting short-term capital loss, supplied by the caller.
  - name: mt_pit_pilot_filing_status_joint_or_surviving_spouse
    entity: TaxUnit
    dtype: Bool
    period: Year
    description: True for a joint return or surviving-spouse filing status.
  - name: mt_pit_pilot_filing_status_head_of_household
    entity: TaxUnit
    dtype: Bool
    period: Year
    description: True for head-of-household filing status; mutually exclusive with joint or surviving spouse.
